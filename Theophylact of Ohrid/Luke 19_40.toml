[[commentary]]
quote='''
But Jesus said: "if they keep silent, the stones will cry out." Or: the people say this not out of flattery toward Me, but they utter this doxology because they are convinced and compelled by all those signs and mighty works which they have seen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'
