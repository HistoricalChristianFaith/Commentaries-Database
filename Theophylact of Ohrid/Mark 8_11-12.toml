[[commentary]]
quote='''
And the Pharisees demand a sign from heaven, for example, to stop the sun or the moon, to bring down lightning, to produce a change in the air. They thought that He was unable to perform a heavenly sign, having the power to produce by the power of Beelzebub only earthly signs. But Jesus does not heed them, for another time has been appointed for signs from heaven — I mean the time of the second coming, when the powers of heaven shall be shaken and the moon shall not give its light; but the time of the first coming has nothing of the sort, but everything is filled with meekness. And therefore "no sign shall be given to this generation" from heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'
