[[commentary]]
quote='''
And whosoever shall compel thee to go a mile, go with him two. "Why should I speak of cloaks and tunics?" the Lord is saying. Give even your body to him who wrongfully compels you, and do more than he wants you to do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
