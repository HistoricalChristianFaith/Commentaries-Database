[[commentary]]
quote='''
But from the beginning it was not so: God joins two persons in the bond of marriage so that they become one, even leaving their own parents. Note that the Lord says: God does not permit polygamy, so that one wife could be divorced and another taken, and then that one abandoned and another married. If this had been pleasing to God, He would have created one husband and many wives; but it did not happen so, rather "God made them male and female," so that they would be joined — one husband with one wife.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
