[[commentary]]
quote='''
In that He calls it a cup, He shows how pleasing and acceptable death for the salvation of men was to Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The Lord restrains Peter and says with a threat: "Put your sword into its sheath." At the same time He also comforts, saying: "Shall I not drink the cup which the Father has given Me?" For by this He shows that the sufferings depend not on their power, but on His own consent, and that He is not an opponent of God, but fulfills the will of the Father even unto death. By calling the sufferings a "cup," He indicates that death for the salvation of mankind is pleasant and desirable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John'
