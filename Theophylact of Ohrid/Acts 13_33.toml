[[commentary]]
quote='''
"Unto us their children, raising up Jesus." The name "Jesus" the brothers of the God-slayers take as the name of a man. Having said above that the Word was laid in the tomb, Paul — lest anyone think that he called the Word incorporeal — again calls Him Jesus and does not allow, for a single moment after the union of the two natures, any division in the incarnate Word.
"You are My Son: today I have begotten You." Understand these words in relation to the incarnation of Christ, which took place in time, since the expressions "today and tomorrow" contain within themselves the meaning of days. But from the Father the Son is born, as even the heretics acknowledge, timelessly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
