[[commentary]]
quote='''
And being warned by God in a dream not to return to Herod, they departed into their own country another way. Consider the sequence of events. First God guided them to faith by means of the star. Then they came to Jerusalem and He taught them through the prophet Micah that Christ was to be born in Bethlehem. And finally, they were warned by means of the angel. They obeyed the warning, that is, the divine speech. Therefore, having received the warning, that is, having accepted the revelation from God, they deceived Herod. They were not afraid of pursuit, but were bold in the power of Him that had been born. Thus they were true witnesses and confessors.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
