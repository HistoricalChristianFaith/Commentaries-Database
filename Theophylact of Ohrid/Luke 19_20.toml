[[commentary]]
quote='''
Let us see what he says: "Lord! here is your mina," take it; "I kept it, wrapped in a handkerchief." A cloth was placed on the head of the deceased Lord (John 20:7), and the face of Lazarus in the tomb was wrapped with a handkerchief (John 11:44). Therefore this negligent man rightly says that he wrapped the gift in a handkerchief. For having made it dead and inactive, he made no use of it and brought no profit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
For with a napkin the face of the dead is covered; well then is this idler said to have wrapped up his pound in a napkin, because leaving it dead and unprofitable he neither touched nor increased it.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
