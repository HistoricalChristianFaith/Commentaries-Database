[[commentary]]
quote='''
She says, "Give me here John Baptist's head." Why did she add the word "here"? She feared that Herod might later come to his senses and change his mind, so she urges him on by saying, "Give me it here and now."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
