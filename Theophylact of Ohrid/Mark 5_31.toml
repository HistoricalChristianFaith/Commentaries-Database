[[commentary]]
quote='''
But see how the crowd pressed upon Him from all sides, and yet not one of them touched Him; on the contrary, the woman, who did not press upon Him, touched Him. From this we learn the mystery that of people occupied with a multitude of worldly cares, no one touches Christ: they only press upon Him; on the contrary, whoever does not press upon Jesus and does not burden his mind with vain concerns, that person touches Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'
