[[commentary]]
quote='''
And when he had gathered all the chief priests and scribes of the people together, he inquired of them where the Christ was to be born. The scribes were the teachers of the people, like those whom we call "scholars." God ordained in His providence that these men be asked, so that they would confess the truth, and by this confession be condemned. For those who crucified Him had first confessed Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
