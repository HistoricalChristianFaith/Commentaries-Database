[[commentary]]
quote='''
But why were the disciples so astonished at these words? After all, they themselves were never rich. I think that in this case they were concerned for all people, since they had already begun to be lovers of mankind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
