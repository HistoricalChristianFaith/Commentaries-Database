[[commentary]]
quote='''
But the Lord, showing that His suffering would be for the salvation of them and of many, and that Satan alone does not want Him to suffer and save people, calls Peter "Satan" for his thoughts befitting Satan, for his not wanting Christ to suffer but contradicting Him; Satan means adversary. "Get behind Me," He says, that is, follow My will, do not contradict and do not be My adversary, but follow Me. Peter, according to the Lord's words, was thinking about "human things," for he was thinking in a fleshly manner, wanting the Lord to remain at ease, not to give Himself over to the Crucifixion, and not to endure affliction for the salvation of the world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For the Lord, wishing to show that His Passion was to take place on account of the salvation of men, and that Satan alone was unwilling that Christ should suffer, and the race of man be saved, called Peter Satan, because he savoured the things that were of Satan, and, from unwillingness that Christ should suffer, became His adversary; for Satan is interpreted 'the adversary.'

He says that Peter savours the things which be of men, in that he in some way savoured carnal affections, for Peter wished that Christ should spare Himself and not be crucified.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
