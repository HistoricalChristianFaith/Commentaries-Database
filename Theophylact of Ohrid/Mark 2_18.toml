[[commentary]]
quote='''
John's disciples, being still imperfect, held to Jewish customs. Therefore some of those who came to Christ presented them as an example and blamed Him because His disciples did not fast equally with them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25202.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For the disciples of John being in an imperfect state, continued in Jewish customs.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
