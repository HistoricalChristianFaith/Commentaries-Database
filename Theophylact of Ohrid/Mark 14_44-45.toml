[[commentary]]
quote='''
But look at his madness, how he thought to hide from the Lord by a kiss, hoping to be received as a friend. If you are indeed a friend, why did you come with enemies? Truly, senseless cunning!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
