[[commentary]]
quote='''
But look at his madness, how he thought to hide from the Lord by a kiss, hoping to be received as a friend. If you are indeed a friend, why did you come with enemies? Truly, senseless cunning!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
See how in his blindness he thought to deceive Christ by the kiss, so as to be looked upon by Him as His friend. But if thou wert a friend, Judas, how didst thou come with His enemies? But wickedness is ever without foresight. And as soon as he was come, he goeth straightway to him, and saith, Master, master; and kissed him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
