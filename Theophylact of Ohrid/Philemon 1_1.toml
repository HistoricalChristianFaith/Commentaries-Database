[[commentary]]
quote='''
"Paul, a prisoner of Jesus Christ." Straightaway from the very beginning he teaches the master not to be ashamed of his slave who has become a fellow slave. For on account of Christ all things are noble, even bonds, in which he himself also rejoices, so that he is even named after them. By this he strongly entreats, showing that it is only right to do a favor for one who is held in bonds for Christ.

"And Timothy the brother." As if considering himself not sufficient for the entreaty, he joins Timothy also as a fellow-petitioner, so that Philemon might yield to the request of many.

"Philemon, our beloved and fellow worker." If he is beloved, he will show mercy. If he is a fellow worker, he will not detain his servant, but will send him back again to the ministry of preaching, which he himself also serves. For the servant too will fulfill such a task of the master, if he is returned again.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Philemon%2FPhilemon.html'
source_title='Commentary on Philemon'
