[[commentary]]
quote='''
It seems to me that these people, hearing about the Kingdom of God, understood it in the sense of a supposed divine favor toward the liberation of the Jewish people, and therefore assumed that Jesus, going up to Jerusalem, would receive this kingdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
The Lord points out the vanity of their imaginations, for the senses cannot embrace the kingdom of God; He also plainly shows to them, that as God He knew their thoughts, putting to them the following parable, A certain nobleman, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
