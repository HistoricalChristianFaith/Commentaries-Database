[[commentary]]
quote='''
The "way" which he commands to prepare is the manner of life according to the teaching of Christ, for the Lord was soon to preach. The "paths" are the commandments of the Law, as if already worn away. He commands to make them "straight" because the Pharisees had perverted the commandments. By "way" one can also understand the soul, and by "paths" the thoughts and deeds. Thus we must prepare the soul and make right our deeds and thoughts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Commentary on Luke'
