[[commentary]]
quote='''
"And when He was entered into a boat, His disciples followed Him. And, behold, there arose a great tempest in the sea, insomuch that the boat was covered with waves: but He was asleep." He took only His disciples, so that they could see the miracle. He allows them to be tossed by the waves so as to train them to endure trials and temptations, and also so that their faith would be even greater as a result of the miracle. Jesus slept so that when they had become terrified they would recognize their own weakness and call upon Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
