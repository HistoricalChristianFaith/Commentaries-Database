[[commentary]]
quote='''
But in what sense was Isaac the only-begotten, when he also had Ishmael? Yet with regard to the promise, he was the only-begotten, for he was the seed in the proper sense: "for in Isaac shall thy seed be called" (Gen. 21:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%252011.html'
source_title='Commentary on Hebrews'
