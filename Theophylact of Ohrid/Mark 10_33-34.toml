[[commentary]]
quote='''
Why does Jesus predict to the disciples what will happen to Him? To strengthen their spirit, so that having heard about it beforehand, they would bear it courageously when it came to pass, and not be struck by its suddenness; and at the same time they were to know that He suffers of His own will. For he who foresaw the sufferings could have avoided them, and if he did not flee, it is clear that he voluntarily gives himself over to suffering. But since it was fitting to reveal His suffering only to the closest disciples, He goes ahead of everyone on the road, wishing to separate the disciples from the crowd. Moreover, by going ahead of everyone and by His haste on the road, the Lord also shows that He hastens toward His suffering and does not flee from death for the sake of our salvation. Everything He says in this instance, though sorrowful, He consoles them for all of it by saying that "on the third day He will rise."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title="Commentary on Mark"

[[commentary]]
quote='''
He did this to confirm the hearts of the disciples, that from hearing these things beforehand, they might the better bear them afterwards, and might not be alarmed at their suddenness, and also in order to show them that He suffered voluntarily; for he who foreknows a danger, and flies not, though flight is in his power, evidently of his own will gives himself up to suffering. But He takes His disciples apart, because it was fitting that He should reveal the mystery of His Passion to those who were more closely connected with Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
