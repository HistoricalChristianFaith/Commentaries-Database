[[commentary]]
quote='''
Notice God's economy. God did not allow Peter's speech to be brought to completion or for baptism to be performed by Peter's order; but as soon as He saw that their minds were filled with amazement and a beginning of instruction had been laid, and they fully believed that baptism is the remission of sins, then the Spirit descended.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
