[[commentary]]
quote='''
Since the disciples too were troubled regarding the divorce of husband and wife, they also approach Him and ask about the same thing. Their way of thinking was not yet completely sound.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But the disciples were offended, as not being fully satisfied with what had been said; for this reason they again question Him, wherefore there follows, And in the house, his disciples asked him again of the same matter.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
