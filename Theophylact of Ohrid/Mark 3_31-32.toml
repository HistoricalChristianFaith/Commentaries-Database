[[commentary]]
quote='''
The brothers of the Lord came out of envy to seize Him, as one who was mad and possessed. And His Mother probably came out of a sense of honor to draw Him away from teaching, thus showing the people that she had authority over Him whom they admired and could draw Him away from teaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'
