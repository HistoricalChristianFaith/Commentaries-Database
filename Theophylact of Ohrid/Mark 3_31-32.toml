[[commentary]]
quote='''
The brothers of the Lord came out of envy to seize Him, as one who was mad and possessed. And His Mother probably came out of a sense of honor to draw Him away from teaching, thus showing the people that she had authority over Him whom they admired and could draw Him away from teaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Because the relations of the Lord had come to seize upon Him, as if beside Himself, His mother, urged by the sympathy of her love, came to Him; wherefore it is said, And there came unto him his mother, and, standing without, sent unto him, calling him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'
