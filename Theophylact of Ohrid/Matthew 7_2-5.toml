[[commentary]]
quote='''
"For with what judgement ye judge, ye shall be judged: and with what measure ye mete, it shall be measured to you again. And why beholdest thou the speck that is in thy brother's eye, but considerest not the beam that is in thine own eye? Or how wilt thou say to thy brother, Let me pull out the speck out of thine eye; and, behold, a beam is in thine own eye? Thou hypocrite, first cast out the beam out of thine own eye; and then shalt thou see clearly to cast out the speck out of thy brother's eye." He who would rebuke others ought to be blameless himself. If he himself has a plank in his eye, that is, some great sin, and he finds fault with another who has only a speck, he causes that man to be even more shameless in his sin. The Lord shows that he who has sinned greatly is not even able to see clearly the sin of his brother. For how could one who has a plank in his eye even see another man who is only slightly injured.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
