[[commentary]]
quote='''
The Lord, having entered Jerusalem with glory, as proof of His authority does that which cleanses the house of His Father from traders (Lk 19:45–46). He did this also at the beginning of His preaching, as the evangelist John says (Jn 2:13–18). And now He does the same again, a second time. This serves as a greater accusation against the Jews, that they were not brought to their senses by His first open admonition, but continued trading in the temple and called Him an opponent of God, whereas He honors the Father and God to such a degree that He cleanses His house from traders. In reproach of them He also brings forward the words of Isaiah: "My house shall be called a house of prayer" (Is 56:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'
