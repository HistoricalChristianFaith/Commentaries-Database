[[commentary]]
quote='''
But how is it that Mark says Christ was crucified at the third hour, while Matthew says that the darkness occurred at the sixth hour? It may be said that He was crucified at the third hour, and that the darkness began from the sixth hour and lasted until the ninth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'
