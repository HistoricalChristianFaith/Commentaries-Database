[[commentary]]
quote='''
And Jesus called a little child unto Him, and set him in the midst of them, and said, Verily I say unto you, Except ye be turned back, and become as little children, ye shall not enter into the kingdom of heaven. Whosoever therefore shall humble himself as this little child, the same is greatest in the kingdom of heaven. When the Lord sees the disciples under the sway of the passion of vainglory, He restrains them, showing them the way of humility by means of an unassuming child. For we must be as children in the humility of our mind, but not be infantile in our thoughts; and we must be as children in guilelessness, but not in foolishness. By saying, "Except ye be turned back," He showed that they had gone from humility to vainglory. You must turn back again to that place, which is humility, from which you departed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
