[[commentary]]
quote='''
Then answered all the people, and said, His blood be on us, and on our children. The people took upon themselves the punishment for His murder, and this punishment indeed overtook them when the Romans destroyed them and their children. But even to this day, the Jews, who are children of those who slew the Lord, have His blood upon them. Because of their disbelief in the Lord they have been persecuted by all, and they have had no boldness before their persecutors on account of those words spoken to Pilate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
