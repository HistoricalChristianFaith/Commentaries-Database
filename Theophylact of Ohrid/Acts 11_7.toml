[[commentary]]
quote='''
"I heard a voice saying to me." The appearance of the sheet alone would have been sufficient to convince him; but to this, however, a voice was also added: "Rise, Peter, kill and eat."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252011.html'
source_title='Commentary on Acts'
