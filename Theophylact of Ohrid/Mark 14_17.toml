[[commentary]]
quote='''
How then were they reclining, when the Law commanded that the Passover be eaten standing? One must think that the Lord first performed the Passover according to the Law, and then reclined in order to impart His own Passover.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
