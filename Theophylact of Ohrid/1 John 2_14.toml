[[commentary]]
quote='''
These very names the apostle previously applied from the perspective of age to moral teaching, and now repeats them from the perspective of disposition, without interrupting his instruction.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520John%2FChapter%25202.html'
source_title='Commentary on 1 John'
