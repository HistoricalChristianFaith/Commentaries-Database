[[commentary]]
quote='''
How did He say that "five in one house will be divided," yet in the enumeration mentioned "six" persons? We answer: one person is counted twice, namely: the daughter and the daughter-in-law are the same person. In relation to the mother she is called a daughter, and in relation to the mother-in-law she is called a daughter-in-law. Thus, "three" — the father, the mother, and the mother-in-law — will be divided "against two" — the son and the daughter. For the daughter, as we said, being one person but bearing a twofold relation, namely: in reference to the mother and to the mother-in-law, is therefore presented as two persons.
The father and mother and mother-in-law should be understood, perhaps, as simply everything old, and the son and daughter as everything new. In that case, the Lord desires that His new Divine commandments and teaching overcome all that is old in us—sinful customs and teaching.
Understand it also in this way. The father is the mind, and the son is reason. Between them in a single house, that is, in a person, division occurred. I shall speak more clearly. The mind of Dionysius the Areopagite was illumined and accepted the preaching. But his mind, which accepted the faith without proofs, was opposed by pagan reason, which tries to prove and compels one to follow dialectical methods. Do you see the division between father and son, warring against each other for the sake of Christ and the preaching? You may call the mother and mother-in-law thought, and the daughter and daughter-in-law sensation. And between them too there is a struggle for the sake of Christ. Thought has enmity against sensation when thought persuades one to honor the imperishable above the perishable, the invisible above the visible, and has many strong proofs for this. It happens that from the side of sensation as well a struggle is directed against thought. For sensation, guided in faith by miracles and visible signs, is not persuaded by the arguments of thought, and does not wish to follow the pagan proofs either, which urge those who heed them not to believe that God became man or that a Virgin gave birth. So foolish are the syllogisms of the pagans who deify nature. Meanwhile, sensation through visible miracles leads to the knowledge of God better than any proof. Thus, not every peace and harmony is good, but it happens that enmity and division appear to be a certain divine work. Therefore let no one remain in friendship with the wicked, but even if father and mother prove to be opponents of the Law of Christ, one must be at enmity with them as enemies of the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'
