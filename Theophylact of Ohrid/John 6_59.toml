[[commentary]]
quote='''
Why did He teach in the synagogue? Partly in order to attract more people, partly in order to show that He is not an opponent of the law read in the synagogues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John'
