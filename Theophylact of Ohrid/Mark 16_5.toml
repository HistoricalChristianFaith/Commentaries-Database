[[commentary]]
quote='''
If Matthew says that the Angel was sitting on the stone, while Mark says that the women, having entered the tomb, saw him sitting inside, one should not be troubled by this. For they could have seen the Angel sitting outside on the stone, as stated in Matthew, and could have seen him again inside the tomb, as having preceded them and gone in. However, some say that the women mentioned in Matthew were different from those in Mark, and that the Magdalene was the companion of all, as the most zealous and fervent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Though Matthew says that the Angel was sitting on the stone, whilst Mark relates that the women entering into the sepulchre saw a young man sitting, yet we need not wonder, for they afterwards saw sitting within the sepulchre the same Angel as sat without on the stone.

But some say the women mentioned by Matthew were different from those in Mark. But Mary Magdalene was with all parties, from her burning zeal and ardent love.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
