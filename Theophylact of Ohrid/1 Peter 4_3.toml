[[commentary]]
quote='''
The Apostle speaks as if to say: have you really not had your fill, having spent so much time in worldly pleasures? Did you not live in the same impurity as the pagans? And then he names certain types of impurity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'
