[[commentary]]
quote='''
He asks Him moreover of His doctrine, what it was, whether opposed to Moses and the law, that he might take occasion thereby to put Him to death as an enemy of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The high priest asks Jesus about the disciples, perhaps in this manner: "Where are they, who are they, for what purpose did He gather them, and what is His intention?" He wanted to convict Him as some kind of innovator or instigator.
He also asks about the teaching: what it consists of, whether it differs from the Law, whether it is contrary to Moses, so that he might find in the teaching as well a pretext to kill Him, as one who opposes God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John'
