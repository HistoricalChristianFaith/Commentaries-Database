[[commentary]]
quote='''
This means: whoever speaks blasphemy against Me, who in appearance am a simple son of man, eating, drinking, associating with tax collectors and harlots, whether he repents or does not repent of his blasphemy, will be forgiven. For such a person's unbelief is not imputed to him as sin. For what did he see that would dispose him to faith? On the contrary, what did he not see that was worthy of blasphemy? He saw a man associating with harlots and speaks blasphemy against him, and therefore the sin is not imputed to him. For he could naturally think, what kind of Son of God is one who associates with harlots? Therefore, one who acts in this way and yet claims to be the Son of God, he may revile and call an impostor.
But whoever, seeing Divine signs and great and extraordinary works, does not believe and reviles the actions of the Holy Spirit, attributing them to Beelzebub, that person, spewing forth "blasphemy against the Holy Spirit" and saying that these signs are performed by an evil spirit and not by God's, if he does not repent, will not be excused and forgiven. For the one who speaks blasphemy against the Son of Man, the sin is not imputed, and therefore he is forgiven even without repentance, but for the one who sees the works of the Spirit of God and blasphemes without repentance, it will not be forgiven, but will be imputed as the greatest sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'
