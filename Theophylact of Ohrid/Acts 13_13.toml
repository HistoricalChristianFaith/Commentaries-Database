[[commentary]]
quote='''
John, called Mark, accompanied them in their evangelical journey from Palestine to Perga of Pamphylia. Then, when the apostles hastened their journey and with a firm, unyielding spirit began to arm themselves for labors, Mark, being a weak man who did not dare to undertake such a journey and those labors, dangers, and struggles that presented themselves in every city, fell behind the apostles and returned to Palestine — not denying Christ, but refusing to continue the journey, since it was difficult for him. Paul and Barnabas returned to Jerusalem with abundant fruits of faith and proclaimed to the church in Jerusalem the conversion and repentance of the Gentiles. And when all began to praise Paul and Barnabas for their successful labors, Mark grew sorrowful, troubled in soul, and perhaps thought: "If I too had been with the apostles, I too would have become a partaker in their glory" — and again desired to set out together with the apostles to preach.
They come again to Perga, because they were hastening to the metropolis of Antioch.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
