[[commentary]]
quote='''
"God has made this Jesus both Lord and Christ." The expression "has made" is used instead of "appointed," because the speech is not about existence nor about hypostatic being.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25202.html'
source_title='Commentary on Acts'
