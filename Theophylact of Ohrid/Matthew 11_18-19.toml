[[commentary]]
quote='''
He compares John's way of life to mourning, for John showed great severity both in words and deeds, and His own life on earth He compares to piping, that is, to the sound of the flute. For the Lord was most gracious and pleasing, condescending to all that He might win all, bringing the good tidings of the kingdom, and He was not severe in appearance as was John. "But Wisdom is justified by her children." This is what He is saying: so, then, since neither John's life nor My own pleases you, but you scorn all the means of salvation, I Who am Wisdom am justified [that is, shown to be righteous, and vindicated]. Therefore you will have no excuse but will be utterly condemned. For I, on My part, have done everything, yet you, by your refusal to believe, prove that I Who omitted nothing am justified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
