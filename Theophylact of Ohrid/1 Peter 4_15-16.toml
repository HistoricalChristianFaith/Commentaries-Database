[[commentary]]
quote='''
"One who meddles in others' affairs" is he who is excessively curious about the business of others in order to have occasion for slander. But such an occupation is characteristic of an impure soul, one that is villainous and ready for every evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'
