[[commentary]]
quote='''
When He spoke about preaching, and called it a sword, His hearers may have been troubled, not knowing what He meant. And therefore our Lord adds, that as men determine the state of the weather by certain signs, so ought they to know His coming. And this is what he means by saying, When ye see a cloud rise out of the west, straightway ye say, There cometh a shower. And when ye see the south wind blowing, ye say, There will be heat, &c. As if He says, Your words and works show me to be opposed to you. Ye may therefore suppose that I came not to give peace, but the storm and whirlwind. For I am a cloud, and I come out of the west, that is, from human nature; which has been long since clothed with the thick darkness of sin. I came also to send fire, that is, to stir up heat. For I am the strong south wind, opposed to the northern coldness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Since the Lord was speaking about preaching and called it fire and a sword, it is very likely that the listeners, not understanding the meaning of His words, were troubled. Therefore He says: just as you recognize changes in the weather by certain signs, so too you should have recognized My coming from what I say and what I do. My words, as well as My deeds, show Me to be your adversary. For you are tax collectors and robbers, while I have nowhere "to lay My head" (Luke 9:58). Therefore, just as from a cloud you foretell rain and from a south wind a hot day, so you should have recognized the time of My coming and understood that I came to bring not peace, but rain and turmoil. For I Myself am a cloud, and I come from the west, that is, from human nature, which had previously been brought low and was in thick darkness from sin. I came to bring down fire as well, and I made a hot day. For I am the south—a warm wind and the opposite of the coldness of the north. Therefore I also appeared from Bethlehem, which lies to the south.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'