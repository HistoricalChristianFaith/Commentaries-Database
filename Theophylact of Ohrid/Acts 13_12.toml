[[commentary]]
quote='''
"Turning here and there, he sought a guide." This is proof of his blindness. It was necessary through precisely such a punishment to bring to his senses the one who had previously been carried away by magic. In this way, punishments served, as it were, to bring even the sorcerers to their senses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
