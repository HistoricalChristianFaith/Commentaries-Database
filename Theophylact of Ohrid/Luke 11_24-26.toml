[[commentary]]
quote='''
Truly, such a thought arose in you because you are now in greater fellowship with demons. The unclean spirit dwelt in you even before, when you served idols and killed the prophets. Then, apparently, he went out from you. But now he has returned again "to his house," that is, to your souls, with "seven spirits," that is, many (for the number "seven" in Scripture is often used in the sense of "many"), and made "the last state worse than the first" for you. For then, when you served idols, you killed the prophets, but you had not yet offered open insult to the Son of God, who for your sake appeared in the flesh. But now what hope of salvation is there, when you remain in the same ingratitude and audacity even after the Son became incarnate and works miracles for your sake?

"Waterless places" are the souls of those who have no softness whatsoever — souls that are hardened and preoccupied with themselves. Since the evil one has no place to dwell in such souls, he returns to the Jews, and the last state becomes worse for them than the first. Thus, they now no longer have prophets, for they killed the Word, nor anointing, for they crucified Christ (the Anointed One). Before, although they served idols, prophets and anointing were seen among them; but now they have lost everything, because they sinned against the Son of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke'
