[[commentary]]
quote='''
But He foretold that, nevertheless, of all this not even one stone would be left upon another. Against this, some say that many remnants of the ancient city of Jerusalem have survived, and thus they attempt to make Christ out to be a liar. But this is in vain, for even if some remnants have been preserved (which, however, is not true), before the universal end not one stone will be left upon another. Moreover, history testifies that Aelius Hadrian dug up the very foundations of the city and the temple, so that through him the prophecy was fulfilled that not one stone would be left upon another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'
