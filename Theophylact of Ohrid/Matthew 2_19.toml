[[commentary]]
quote='''
But when Herod was dead. Herod came to a bitter end. For with fever, torment of the bowels, itching, swelling of the feet, rotting of the private parts, breeding of worms, difficulty in breathing, trembling and spasms in every member, he cast off his evil soul.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
