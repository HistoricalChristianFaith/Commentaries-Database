[[commentary]]
quote='''
"And Satan entered into Judas," "one of the number of the twelve," that is, one of the close and sincere disciples. Let no one rely on himself, but be attentive to his life, for he has a fearsome enemy. Some understood the words "one of the number of the twelve" thus: one who merely filled out the number of the apostles, but was not a true apostle and disciple. For what kind of true disciple is one who stole what was put into the money box? (John 12:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Having already said that the Chief Priests sought means how they might slay Jesus without incurring any danger, he next goes on to relate the means which occurred to them, as it is said, Then entered Satan into Judas.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
