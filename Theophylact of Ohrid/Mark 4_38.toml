[[commentary]]
quote='''
And He sleeps during this with the purpose that the miracle would seem all the more important to them, after they had become frightened. Otherwise, if the storm had occurred while Christ was awake, they would not have been frightened or would not have turned to Him with a plea for salvation. And so He allows them to be in fear from danger, so that they would come to an awareness of His power. Since they had only seen Christ's benefactions toward others but had not themselves experienced anything similar, there was a danger that they would become careless; therefore the Lord allows the storm to occur. He sleeps at the stern of the ship (it was, of course, wooden).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But He was sleeping upon the pillow of the ship, that is, on a wooden one.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
