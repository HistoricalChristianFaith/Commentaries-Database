[[commentary]]
quote='''
Tyre and Sidon were pagan cities, while Bethsaida and Chorazin were Jewish. Therefore, He says that at the judgment it will be more tolerable for the pagans than for you, who saw miracles and did not believe; for if they had seen them, they would have believed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'
