[[commentary]]
quote='''
David, He says, calls Him Lord (Ps. 109:1): how then is He merely his Son? He was indeed a son of David according to the flesh, but at the same time also his God, yet they considered Him only the son of David. Therefore He refutes this opinion of theirs, that Christ is merely a son of David, and declares that He is not opposed to the Father, but has great unity of mind with Him, for the Father vanquishes His enemies. This He said to the scribes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Therefore He asks the question, and having excited their doubts, leaves them to deduce the consequence; as it follows, David therefore calleth him Lord, how is he then his son?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
