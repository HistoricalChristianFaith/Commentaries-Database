[[commentary]]
quote='''
In another way also they are deceived, not understanding the Scriptures; for if they had understood them, they should also have understood how by the Scriptures the resurrection of the dead may be proved; wherefore He adds, And as touching the dead, that they rise, have ye not read in the book of Moses, how in the bush God spake unto him, saying, I am the God of Abraham, and the God of Isaac, and the God of Jacob?

But I say, I am the God of Abraham, the God of Isaac, and the God of Jacob. As if He had said, The God of the living, wherefore He adds, He is not the God of the dead, but of the living; for He did not say, I have been, but I am, as if they had been present. But some one perhaps will say, that God spake this only of the soul of Abraham, not of his body; to which I answer, that Abraham implies both, that is, soul and body, so that He also is the God of the body, and the body lives with God, that is, in God's ordinance.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
In yet another respect the Sadducees show themselves ignorant of the Scriptures. If they understood them, they would have grasped why it was said, "I am the God of Abraham, Isaac, and Jacob" — which refers to the living. For the Lord did not say "I was," but "I am" their God, as though they are present, not perished. But perhaps someone will say that the Lord said this only about the soul of the patriarchs, and not also about the body, and that from this one cannot conclude anything about the resurrection of bodies. To this I will say that the name Abraham refers not to the soul alone, but to soul and body together, since God is God of the body as well, and it is alive before God and has not passed into non-existence. Furthermore, since the Sadducees disbelieved only in the resurrection of bodies, the Lord also spoke about bodies — that they are alive before God — and not about souls; the latter even the Sadducees acknowledged. Then pay attention also to this: resurrection is the rising up of what has fallen (into the earth, into dust); but it was not the soul that fell (for it is immortal), but the body; therefore it is the body that shall rise again, being reunited with its allied soul.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Commentary on Mark'
