[[commentary]]
quote='''
This is not said of Nicodemus, but of the Jewish race, who to the very last persisted in unbelief.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"Moreover, I speak of what I know and what I have seen, that is, I know with precision." For by the word "have seen" He indicates not bodily sight, but the most precise knowledge.
"But you do not accept Our testimony, that is, Mine." The Lord says this not to Nicodemus alone, but extends it to the entire race of the Jews, who to the end remained in unbelief.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John'
