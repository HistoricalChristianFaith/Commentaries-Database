[[commentary]]
quote='''
"Who came up with Him from Galilee to Jerusalem, and who are now His witnesses before the people." Which they could in no way have been, if the power of God had not sustained them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
