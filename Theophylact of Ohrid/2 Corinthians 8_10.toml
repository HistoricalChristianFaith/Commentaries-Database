[[commentary]]
quote='''
See how he takes care not to be a burden to them. "I give my advice," he says, that is, I counsel, and do not impose necessity; and I counsel so that there may be more benefit to you than to those who receive.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%25208.html'
source_title='Commentary on 2 Corinthians'
