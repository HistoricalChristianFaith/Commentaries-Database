[[commentary]]
quote='''
In a figurative sense, understand this also concerning human nature. It was suffering from a flow of blood, because it was producing sin, which is the murder of the soul and which sheds the blood of our souls. Our nature could not receive healing from many physicians, that is, neither from the wise men of this age, nor even from the Law and the prophets. But it was healed as soon as it touched the garment of Christ, that is, His flesh. For whoever believes that Christ became incarnate is the one who touches His garment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Most faithful indeed is this woman, who hoped for healing from His garments. For which reason she obtains health; wherefore it goes on, And straightway the fountain of her blood was dried up, and she felt in her body that she was healed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Or else, by the woman, who had a bloody flux, understand human nature; for sin rushed in upon it, which since it killed the soul, might be said to spill its blood. It could not be cured by many physicians, that is, by the wise men of this world, and of the Law and the Prophets; but the moment that it touched the hem of Christ's garment, that is, His flesh, it was healed, for whosoever believes the Son of man to be Incarnate is he who touches the hem of His garment.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
