[[commentary]]
quote='''
They answer that some take Him for John, others for Elijah; for many thought that John had risen, as Herod also supposed, and that upon his resurrection he had received the power of miracles, whereas during his lifetime John had not performed a single sign.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For many thought that John had risen from the dead, as even Herod believed, and that he had performed miracles after his resurrection.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
