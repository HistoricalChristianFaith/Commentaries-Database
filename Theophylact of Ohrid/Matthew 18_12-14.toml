[[commentary]]
quote='''
How think ye? If a man have a hundred sheep, and one of them be gone astray, doth he not leave the ninety and nine on the mountains, and goeth to seek that which is gone astray? And if so be that he find it, verily I say unto you, he rejoiceth more of that sheep, than of the ninety and nine which went not astray. Even so it is not the will of your Father Who is in the heavens, that one of these little ones should perish. What man had a hundred sheep? Christ. For all of the reason-endowed creation, both angels and men, are the hundred sheep, of which Christ is the shepherd, not another sheep. For He is not a creature but the Son of God. So He left the ninety and nine in the heavens, and taking on the form of a servant He came to seek the one sheep, which is the fallen human nature. And He rejoices more over it than over the steadfastness of the angels. This shows in a few words how diligently God pursues the conversion of sinners, and rejoices more over them than over those who are constant in virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
