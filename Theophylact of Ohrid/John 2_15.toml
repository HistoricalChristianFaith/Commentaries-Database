[[commentary]]
quote='''
Nor did He cast out only those who bought and sold, but their goods also: The sheep, and the oxen, and poured out the changers' money, and overthrew the tables, i. e. of the money changers, which were coffers of pence.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Why does He drive such people out of the temple altogether? Not without reason: He will heal on the Sabbath and, as it were, violate the law concerning it; therefore, so that they would not then consider Him an opponent of God, He forestalls such a thought by the present occasion. For he who showed such zeal for the temple would not reject God, the Lord of the temple. And He drove them out not simply, but striking with a whip made of cords, and overturned the tables, and scattered the coin or money of the money-changers, and undertook a very dangerous deed. And he who subjects himself to danger for the house of God would permit a departure from the law of God not as an opponent of God, but undoubtedly as the Son, having equal authority with God the Father, who gave the law concerning the Sabbath.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John'
