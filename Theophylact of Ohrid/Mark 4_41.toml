[[commentary]]
quote='''
The disciples said among themselves, "Who then is this?" because they still had an indefinite conception of Him. Since Christ calmed the sea by a single command, and not with a rod, like Moses, not with a prayerful cry, like Elisha at the Jordan, not with an ark, like Joshua, for this reason He appeared to them as more than a man; but in that He slept, He appeared to them again as a man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'
