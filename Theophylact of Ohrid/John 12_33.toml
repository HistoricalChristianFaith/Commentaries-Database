[[commentary]]
quote='''
"When I am lifted up" – He said this, giving to understand what kind of death He would die, that is, He would be crucified, for by this is signified the height of the Cross.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John'
