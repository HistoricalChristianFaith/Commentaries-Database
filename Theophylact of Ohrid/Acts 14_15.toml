[[commentary]]
quote='''
"Men! Why are you doing this? We too are men of like nature with you." We are men, they say, but we are above the idols, because they are dead. You see what a common occurrence it was among the Greeks to make gods out of men? Indeed, in their books, where their ancient history is recorded, you will find that Zeus, being a man, made himself a god, saying that he was a god. In exactly the same way, many of the Roman and Macedonian kings were called divine. Therefore there is no reason not to believe the ancient accounts that some of the nations were deceived and called certain men gods, just as these people were deceived by Barnabas and Paul. And Simon the sorcerer was called by the inhabitants of Samaria the great power of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252014.html'
source_title='Commentary on Acts'
