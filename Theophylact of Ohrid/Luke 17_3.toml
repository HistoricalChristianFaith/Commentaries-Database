[[commentary]]
quote='''
Therefore the Lord warns the disciples: "Take heed to yourselves." Behold, He says, I tell you beforehand that evil will come; do not be held accountable. For evil must come, but there is no necessity for you to perish, if you are careful and arm yourselves. The wolf must come, but if the shepherd is watchful, there is no necessity for the sheep to perish, and the wolf must depart with an empty maw. The Lord said this about those who cause offense and those who harm the preaching, that is, who hinder it. Since there is a great difference among them, for some are incurable like the Pharisees, while others are curable like the Lord's brothers in relation to the Lord Himself, for even they did not believe in Him (John 7:5).
So, since there is a great difference among those who hinder the preaching, for among them there could be some who are even of the same faith, the Lord says: "if your brother sins against you," "rebuke him" privately, and "if he listens to you, you have gained" him, "but if he does not listen, take with you one or two more," and the rest, which the evangelist Matthew (Matt. 18:15–17) set forth more extensively, while the evangelist Luke passed over in silence, as it had already been said by the evangelist Matthew. Whoever heeds the rebuke is worthy of forgiveness; but whoever does not heed, let him "be to you as a heathen and a tax collector," that is, abominable and unworthy of being called a brother.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke'
