[[commentary]]
quote='''
The Holy Spirit descended upon Jesus so that we might learn from this that upon us also, when we are baptized, the Spirit comes. For the Lord had no need of the Spirit, but He does all things for our sake and Himself becomes the firstborn in all things (Col. 1:18) that we were to receive afterward, so as to be the firstborn among many brethren. The Spirit descended in bodily form, like a dove, so that we might learn that we need to be meek and pure. And just as in the time of Noah the dove depicted the abating of the wrath of God (Gen. 8:8–11), so here too the Holy Spirit, having drowned sin, reconciled us with God. And the Son hears the voice uttered by the Father, saying, "Thou art My Beloved Son," in order to show that to us who are baptized He also granted the adoption as sons. "In You is My good pleasure" means: In You I found rest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Commentary on Luke'
