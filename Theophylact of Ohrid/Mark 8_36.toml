[[commentary]]
quote='''
Do not tell Me that this latter person will preserve his life, for even if he were to gain the whole world, it is all useless. Salvation cannot be purchased with any wealth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'
