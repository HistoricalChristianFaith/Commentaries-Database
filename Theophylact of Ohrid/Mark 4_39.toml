[[commentary]]
quote='''
Having awakened, Christ rebukes first the wind, since it is the cause of the agitation of the sea, and then calms the sea as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But He arising, rebukes first the wind, which was raising the tempest of the sea, and causing the waves to swell, and this is expressed in what follows, And he arose, and rebuked the wind; then He commands the sea; wherefore it goes on, And he said to the sea, Peace, be still.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
