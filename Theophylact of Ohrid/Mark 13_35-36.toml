[[commentary]]
quote='''
But let us also consider what is said from another perspective. Evening signifies the end when someone dies in old age; midnight, when someone reaches the middle of life; cockcrow, when reason begins to unfold in us, for the cock signifies reason, which awakens us from the sleep of unconsciousness, and therefore, when a youth begins to exercise reason and to understand, then the cock, as it were, crows in him. Finally, morning signifies the very earliest age of childhood. Thus, all must think about the end of life. Even if there is an infant, care must be taken for it, lest it die unbaptized.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
See again that He has not said, I know not when the time will be, but, Ye know not. For the reason why He concealed it was that it was better for us; for if, now that we know not the end, we are careless, what should we do if we knew it? We should keep on our wickednesses even unto the end. Let us therefore attend to His words; for the end comes at even, when a man dies in old age; at midnight, when he dies in the midst of his youth; and at cockcrow, when our reason is perfect within us; for when a child begins to live according to his reason, then the cock cries loud within him, rousing him from the sleep of sense; but the age of childhood is the morning.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
