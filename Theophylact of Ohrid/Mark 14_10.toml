[[commentary]]
quote='''
When the woman showed fitting honor to Christ, then a disciple wages war against Him, and moreover one of the twelve. For it is not without reason that it says "one of the twelve," but to show that he too was among the most chosen disciples.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
