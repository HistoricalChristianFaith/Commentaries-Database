[[commentary]]
quote='''
But the reckless and lustful Herod feared to break his oath and therefore kills the righteous man, when he ought in this case to have violated the oath and not committed so terrible a crime (to keep an oath is not always good). A guardsman was the name for such a military man who was appointed by the community to execute and put to death criminals. One may also understand the passage under consideration in a figurative, spiritual sense. Thus, Herod represents the coarsely carnal Jewish people: he took a wife—false and absurd glory, whose daughter even now still dances and is in motion among the Jews—this is their deceptive knowledge of the Scriptures. They think they know the Scriptures, when in reality they do not know them, for they beheaded John, that is, the prophetic word, because they did not accept the Head of prophecy—I mean Christ. Therefore, if they possess the prophetic word, they possess it without the Head, that is, without Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
There follows, And the king was exceeding sorry.

Herod not being his own master, but full of lust, fulfilled his oath, and slew the just man; it would have been better however to break his oath, than to commit so great a sin.

'Spiculator' is the name for the public servant commissioned to put men to death.

In a mystical way, however, Herod, whose name means, 'of skin,' is the people of the Jews, and the wife to whom he was wedded means vain glory, whose daughter even now encircles the Jews with her dance, namely, a false understanding of the Scriptures; they indeed beheaded John, that is, the word of prophecy, and hold to him without Christ, his head.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
