[[commentary]]
quote='''
Another also brought benefit, but to a lesser number. The one who follows the first receives a proportionate reward. But the one who brought no profit is condemned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'
