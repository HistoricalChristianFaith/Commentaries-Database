[[commentary]]
quote='''
Such anxiety, as drawing us away from God, or rather such frivolity, the Lord forbids, saying that "all these things do the people of this world seek after." For anxiety does not stop at what is necessary, but always seeks something higher, which is why it is called a lifting upward. For example, we have no bread. We first concern ourselves with where to obtain it, but we do not stop there; rather, we desire to obtain bread made from the finest wheat; then we desire wine as well, and indeed one that is fragrant and aromatic; then we desire roasted meat too, and indeed of grouse or pheasants. Do you see what anxiety and frivolity are like? Therefore the Lord decisively cuts it short, for these are the things the pagans seek.
Then He presents another reason as well, namely: that our Father knows what we have need of, and He presents not one, but many reasons. He says: He is "Father," and if He is Father, how will He not give? Moreover, He "knows," for He is not unaware. And you "have need," for this is not superfluous, but necessary. Therefore, if He is Father, and you have need, and He knows, then how will He not give?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'
