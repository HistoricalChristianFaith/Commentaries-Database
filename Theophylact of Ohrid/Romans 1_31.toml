[[commentary]]
quote='''
"Senseless" — and rightly so. For how could those who did not obey their parents understand anything? "Faithless" — that is, they are not steadfast in agreements. "Unloving, implacable, unmerciful" — the root of all evils is the very cooling of love: for from this it follows that one does not make peace with another, one does not love another, one does not show mercy to another. About this Christ also said: "Because of the increase of wickedness, the love of many will grow cold" (Matt. 24:12). Nature itself unites us with one another, as it does other animals; but people have not understood this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25201.html'
source_title='Commentary on Romans'
