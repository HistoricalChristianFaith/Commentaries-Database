[[commentary]]
quote='''
So that you would not deprive one another before the time, I said this, says the apostle, "as a concession" (κατά συγγνώμην), that is, out of condescension to your weakness, "and not as a commandment" that is absolute.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25207.html'
source_title='Commentary on 1 Corinthians'
