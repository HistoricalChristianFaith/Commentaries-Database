[[commentary]]
quote='''
"And when He was in Bethany, in the house of Simon the leper, and was reclining at table, a woman came." The ointment is mentioned by all four Evangelists. And some think that in all of them the same woman is meant. But this is incorrect: these are two different women, one of whom is mentioned by John (Jn. 12:3), she being the sister of Lazarus, and the other by the three remaining Evangelists. But if you look more carefully, you will find that there were three: one is mentioned by John, another by Luke (Lk. 7:37–38), and a third by the other two Evangelists. For the one mentioned by Luke was a harlot and anointed the Lord in the midst of His preaching, while the one mentioned by Matthew did the same near the time of the Passion, and moreover she was not a known harlot. The Lord accepts her devotion, as one who spent so much on the ointment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But although the four Evangelists record the anointing by a woman, there were two women and not one; one described by John, the sister of Lazarus; it was she who six days before the Passover anointed the feet of Jesus; another described by the other three Evangelists. Nay, if you examine, you will find three; for one is described by John, another by Luke, a third by the other two. For that one described by Luke is said to be a sinner and to have come to Jesus during the time of His preaching; but this other described by Matthew and Mark is said to have come at the time of the Passion, nor did she confess that she had been a sinner.

Or as is said in Greek, of pistic nard, that is, faithful, because the ointment of the nard was made faithfully and without counterfeit.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
