[[commentary]]
quote='''
The angel appears not to all, but to the pure in heart, such as Zacharias was. The altar is called the altar of incense because there was also another altar—that of burnt offerings.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke'
