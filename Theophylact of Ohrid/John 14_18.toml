[[commentary]]
quote='''
"Do not be afraid," He says, "that I said to you 'I will send another Comforter.' Do not think that you will no longer see Me. For I will not depart from you forever. I will come and will not leave you orphans." Since at the beginning of the discourse He called them children, He now fittingly says "I will not leave you orphans."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
