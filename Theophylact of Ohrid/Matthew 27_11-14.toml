[[commentary]]
quote='''
And Jesus stood before the governor: and the governor asked Him, saying, Art thou the King of the Jews? And Jesus said unto him, Thou sayest. And when He was accused by the chief priests and elders, He answered nothing. Then said Pilate unto Him, Hearest Thou not how many things they witness against Thee? And He answered him never a word; insomuch that the governor marvelled greatly. He was brought to Pilate accused of crimes against the state, which is why Pilate asked Him if He had fomented an insurrection or attempted to make Himself king of the Jews. But Jesus said to him, "Thou sayest," giving a most wise answer. For He neither said that He was or that He was not, but He said, somewhere between the two, "Thou sayest." For this could be interpreted either as "I am what you say," or, "I do not say it, but you do." He gave no other answer, however, for He knew that the tribunal was an unjust proceeding. Pilate marveled at the Lord because He scorned death, and because, though He was eloquent and could have said a myriad of things in His own defense, He made no answer and disregarded His accusers. May we also learn from this to say nothing when we are brought before a corrupt court lest we cause a greater stir and provoke those who refuse to hear our defense to condemn us all the more.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
