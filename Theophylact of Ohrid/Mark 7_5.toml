[[commentary]]
quote='''
Meanwhile the Pharisees, wishing to find a pretext for reproach, seize upon this occasion and accuse the apostles, though not as violators of the Law, but as violators of the tradition of the elders, for there is no commandment in the Law to wash one's hands up to the elbows before eating, but they held to this as a tradition of the elders.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Commentary on Mark'
