[[commentary]]
quote='''
That is, one who unwaveringly follows after the virtues and never ceases to practice them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520John%2FChapter%25203.html'
source_title='Commentary on 1 John'
