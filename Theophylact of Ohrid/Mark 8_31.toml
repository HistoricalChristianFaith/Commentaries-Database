[[commentary]]
quote='''
Having received from His disciples the confession that He is the true Christ, the Lord also revealed to them the mystery of the Cross. But He did not yet reveal it fully, for the apostles did not understand what He was saying, and did not comprehend what it means to rise again, but thought that it would be better for Him not to suffer at all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But after the Lord had accepted the confession of the disciples, who called Him the true God, He then reveals to them the mystery of the Cross. Wherefore it goes on, And he began to teach them that the Son of man must suffer many things, and be rejected of the elders and of the chief priests, and the scribes, and be killed, and after three days rise again; and he spake that saying openly, that is, concerning His future passion.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
