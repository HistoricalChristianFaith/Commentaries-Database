[[commentary]]
quote='''
The apostle added this to what was said before. He noticed that some were scandalized by the afflictions befalling them, since in the law peace is promised to those who serve the Lord (Rom. 2:10); and although above, when he gave instructions to servants, he briefly consoled them in a similar manner, now he gives free rein to his speech and says: "Beloved!" By this very appellation he immediately shows that afflictions come upon them not because God hates them, but because He loves them very much. "Do not think it strange" is the same as "do not be surprised" (ξενίζεσθε). Then he called the afflictions a "fiery trial" (burning), and thereby showed that they are sent upon them for testing. And testing makes the tested object very valuable, just as gold and silver. To this he added something most blessed of all, namely, that those who endure this are like their Teacher Christ, and now suffer dishonor together with Him, in order to be glorified together with Him in the age to come. In this all aspirations find their end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'
