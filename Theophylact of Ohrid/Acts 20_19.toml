[[commentary]]
quote='''
"With all humility of mind." Not simply with humility of mind, but with "all," because there are many kinds of humility: in word, in deed, toward superiors, toward subordinates.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252020.html'
source_title='Commentary on Acts'
