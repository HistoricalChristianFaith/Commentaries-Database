[[commentary]]
quote='''
Since above Paul condemned some as enemies of the cross, he now urges the Philippians not to treat them with hostility, but to deal with them mercifully, even if they were enemies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Philippians%2FChapter%25204.html'
source_title='Commentary on Philippians'
