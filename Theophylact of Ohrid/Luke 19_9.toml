[[commentary]]
quote='''
Christ proclaims salvation to him. "Today," He says, "you give, today salvation is yours." For by the words "to this house," He undoubtedly points to Zacchaeus as the one receiving salvation. By "house" is meant Zacchaeus, because the Lord would not have called a soulless building a son of Abraham, but clearly called the living master of the house such. He called him a son of Abraham, perhaps because he believed and was justified by faith, or perhaps because he magnanimously despised riches and loved the poor, like that patriarch. Note: the Lord called Zacchaeus a son of Abraham now, when He saw in him a likeness in way of life. He did not say, "because this man also was a son of Abraham," but that he now is. For before, being a chief tax collector and a gatherer of tribute, and having no resemblance to the righteous man, he was not his son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
To such Christ announces salvation; Jesus saith unto him, This day is salvation come to this house, signifying that Zacchaeus had attained to salvation, meaning by the house the inhabitant thereof. And it follows, forasmuch as he also is a son of Abraham. For He would not have given the name of a son of Abraham to a lifeless building.

He said not that he "was" a son of Abraham, but that he now is. For before when he was the chief among the publicans, and bore no likeness to the righteous Abraham, he was not his son.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
