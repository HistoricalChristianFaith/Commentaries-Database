[[commentary]]
quote='''
He resolves a naturally arising objection. Someone might perhaps object: if Abraham was justified before circumcision, then why was he circumcised? The Apostle answers: he "received the sign of circumcision" — in place of a seal, confirming that he was justified by faith, which he demonstrated earlier, while being uncircumcised.
So, regarding Abraham, two things are presented: uncircumcision and circumcision. Through uncircumcision he proves to be the father of the uncircumcised. But which ones? Those who, like him, believe, "that righteousness might be imputed to them also," that is, so that they too might be justified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25204.html'
source_title='Commentary on Romans'
