[[commentary]]
quote='''
The Lord leaves the Pharisees as incorrigible people. For one should linger where there is hope of correction, but where the evil is incorrigible, one must flee from there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'
