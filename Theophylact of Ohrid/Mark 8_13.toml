[[commentary]]
quote='''
The Lord leaves the Pharisees as incorrigible people. For one should linger where there is hope of correction, but where the evil is incorrigible, one must flee from there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The Lord indeed quits the Pharisees, as men uncorrected; for where there is a hope of correction, there it is right to remain; but where the evil is incorrigible, we should go away.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
