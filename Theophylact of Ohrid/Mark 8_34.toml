[[commentary]]
quote='''
Since Peter was opposing Christ, Who desired to give Himself over to Crucifixion, Christ calls the people and speaks aloud, directing His words primarily against Peter: You do not approve of My taking the Cross, but I say to you that neither you nor anyone else will be saved unless you die for virtue and truth. Note that the Lord did not say: let him die even if he does not wish to die, but "whoever wishes." I, He says, compel no one. I call not to evil but to good, and therefore whoever does not wish it is not worthy of it. What does it mean to deny oneself? We will understand this when we learn what it means to deny someone else. Whoever denies another person — whether father, brother, or any member of the household — even if he watches him being beaten or killed, pays no attention and feels no sympathy, having become estranged from him. In the same way the Lord commands us also to despise our own body for His sake and not to spare it, even if we are beaten or reviled. "Take up your cross," it says, that is, a shameful death, for the cross was then regarded as an instrument of shameful execution. And since many robbers were also crucified, He adds that along with crucifixion one must also have other virtues, for this is what the words "follow Me" mean.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For a man who denies another, be it brother or father, does not sympathize with him, nor grieve at his fate, though he be wounded and die; thus we ought to despise our body, so that if it should be wounded or hurt in any way, we should not mind its suffering.

For at that time the cross appeared shameful, because malefactors were fixed to it.

But because after the cross we must have a new strength, He adds, and follow me.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
