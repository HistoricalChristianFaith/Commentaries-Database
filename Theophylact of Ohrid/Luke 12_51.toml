[[commentary]]
quote='''
Christ "is our peace" (Eph. 2:14), yet He says: "I did not come to bring peace." This means His words are enigmatic. So we say that not every peace is blameless and good, but it is often dangerous and drives one away from Divine love — for example, when we make peace and agreement to overthrow the truth. Christ did not come to bring such a peace; on the contrary, He desires that we be divided against one another for the sake of what is good, which is exactly what happened during the persecutions. For in one house a pagan father was divided against a believing son, and a mother against a daughter, and vice versa.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'
