[[commentary]]
quote='''
Those whom God predestined, He also called. Having called them, He also justified them, having freed them from sins and made them righteous through the laver of regeneration. And whom He justified, them He also glorified, having deemed them worthy of adoption and given them the other gifts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25208.html'
source_title='Commentary on Romans'
