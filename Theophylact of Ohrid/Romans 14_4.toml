[[commentary]]
quote='''
He says this to the perfect one, dissuading him both from contempt and from judgment, for the perfect ones, doing both, both despised and judged the imperfect. However, in a hidden manner the rebuke falls here also upon the imperfect. I do not forbid you to judge, he says, because the conduct of the other does not deserve judgment, but because he is another's servant, that is, not yours, but God's. For although he is weak, he has not ceased to be a servant; wherefore one must not despair concerning him. And encouraging the weak one, he did not say "falls," but "stands or falls." Whether one or the other happens to him, it belongs to the Lord to judge both concerning the loss of the one who falls and the gain of the one who stands. By the words "he will be raised up" he shows that he is so shaken and has fallen so far that only God can raise him up. We say this about people who are utterly hopeless.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252014.html'
source_title='Commentary on Romans'
