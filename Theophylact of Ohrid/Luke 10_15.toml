[[commentary]]
quote='''
And you, Capernaum, exalted to the heavens, as one glorified by the many miracles performed in you, shall be brought down to Hades; you will be condemned for the very reason that even after so many miracles you do not believe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'
