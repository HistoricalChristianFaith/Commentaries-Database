[[commentary]]
quote='''
Moreover, He rebuked the spirit upon seeing the crowd gathering toward Him — again because He did not wish to heal before a multitude of people, for the display of His power and for His own glory. And by the rebuke and the words, "Come out of him and enter him no more," He makes known that because of the man's unbelief the demon could have entered him again, had it not been forbidden by His command. But He permitted the demon to convulse the boy, so that all might understand the demonic assault and that the demon could kill a person were it not for the hand of God protecting them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Commentary on Mark'
