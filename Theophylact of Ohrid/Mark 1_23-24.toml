[[commentary]]
quote='''
Evil spirits are called "unclean" because they love all manner of unclean deeds. To come out of a man the demon considers "destruction" for itself. Malicious demons in general count it as suffering for themselves when they are not permitted to do evil to people. Moreover, being lovers of the flesh and accustomed to taking pleasure in matter, they endure as it were a great hunger when they do not dwell in bodies. Therefore the Lord also says that the demonic race is cast out by fasting. The unclean spirit did not say to Christ: You are holy, since many of the prophets too were holy, but said "the Holy One," that is, the Only One, Holy in His very essence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For to come out of man the devil considers as his own perdition; for devils are ruthless, thinking that they suffer some evil, so long as they are not troubling men. There follows, I know that thou art the Holy One of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title='Catena Aurea by Aquinas'
