[[commentary]]
quote='''
There is nothing more wretched than a soul hardened in obstinacy. For see what the Lord says: "Behold, the hand of him who betrays Me is with Me on the table," yet the madman did not come to his senses. The Lord says this not only to show that He knows what is about to happen, but also to reveal to us His goodness and the malice of the betrayer, by which the latter was not ashamed to be at His supper, and afterwards did not abandon the carrying out of his intention. The Lord also gives us by this an example, that we should strive to the end for the benefit of those who are falling.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
And this He said not only to show that He knew all things, but also to declare unto us His own especial goodness, in that He left nothing undone of those things which belonged to Him to do; (for He gives us an example, that even unto the end we should be employed in reclaiming sinners;) and moreover to point out the baseness of the traitor who blushed not to be His guest.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
