[[commentary]]
quote='''
"For this reason." Why then? Because you, having believed, received the seal of the Spirit and obtained the pledge of future blessings and perfect redemption, and are to receive what has been prepared for those who rightly believe and live piously — "I unceasingly give thanks for you." Do you see what a compassionate heart? He offers thanksgiving for all, as if he himself had received the benefit. For he writes this not only to the Ephesians, but to all. So then, although it is worthy to thank God for all else that we have been deemed worthy of, it is also worthy to give thanks for the faith of the believers, because they were so enlightened that they fled to the cross of the Savior, turning away from the destroyer. For such is the nature of brotherly love.
Note how many he has in his mind, how many he remembered in his prayers. But we do not even remember ourselves as we ought.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Ephesians%2FChapter%25201.html'
source_title='Commentary on Ephesians'
