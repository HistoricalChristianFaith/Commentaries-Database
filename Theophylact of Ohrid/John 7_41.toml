[[commentary]]
quote='''
Others, from among the unlearned and undiscerning, said that He is the Christ, not understanding that Christ and that Prophet are one and the same person, and not different.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John'
