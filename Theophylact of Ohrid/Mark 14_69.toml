[[commentary]]
quote='''
As for whether there was one servant girl who accused Peter, or yet another — Matthew says there was another, while Mark says that the same servant girl accused Peter both times. But this causes us no difficulty whatsoever regarding the truth of the Gospel. For here the disagreement of the Evangelists does not concern anything important or pertaining to our salvation. One did not say that the Lord was crucified while another said He was not crucified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
