[[commentary]]
quote='''
Neither shalt thou swear by thy head, because thou canst not make one hair white or black. God alone swears by Himself as He is not subject to anyone or anything. Since we do not have authority over ourselves, how can we swear by our own head? It is the property of another. But if you think your head is your own, then change one hair of it if you can.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
