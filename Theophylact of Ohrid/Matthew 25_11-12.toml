[[commentary]]
quote='''
The Lord therefore says to them, "I know you not." For the merciful God Who loves mankind does not know those who lack mercy, for how could He know those who are alien and dissimilar to Him?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
