[[commentary]]
quote='''
Having spoken of love, he adds what is closely connected with love — "hospitality," which he commands to perform without grumbling; and to those who abound in every gift, he commands to share with a brother in need. For example, one who has the word of teaching (for this is what "as the oracles of God" (1 Pet. 4:11) indicates) — let him impart it to the one who needs it; one who has an abundance of food, let him give to the one who lacks it, and give not sparingly, but as much as the power of God's gift allows. To this, he says, I exhort you so that God may be glorified in all, whether they be pagans or your own people.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'
