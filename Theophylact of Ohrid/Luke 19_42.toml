[[commentary]]
quote='''
He weeps over the insensibility of Jerusalem and says: "if you, even you, had known in this your day the things that make for your peace." That is, if only you had known even now what is to your benefit and leads to peace and tranquility, namely: that you must believe in Me and turn away from your evil design against Me! But now it is hidden from your eyes that unbearable calamities will come upon you for your rejection of Me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'
