[[commentary]]
quote='''
The Pharisees tried to catch the Lord in His words in order to turn the people away from Him, but the opposite happened. Even more people gathered: many "thousands" assembled, and each one so strove to draw near to Him that they "trampled one another." So powerful is truth, and so powerless is falsehood everywhere!
Jesus, knowing the cunning of the Pharisees and seeing that they only pretended to be asking questions while in reality they were plotting against Him, spoke to His disciples about the hypocrisy of the Pharisees, undoubtedly in order to expose them and reveal their hearts full of hypocrisy. The Lord calls hypocrisy "leaven" because it is bitter, full of ancient malice, and alters and corrupts the way of thinking of those people whom it assails. For nothing changes morals so much as hypocrisy. Therefore the disciples of Christ must flee from hypocrisy. For Christ, being the Truth (John 14:6), is obviously opposed to falsehood. And all hypocrisy, appearing as one thing outwardly while being another in reality, is full of falsehood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
The Pharisees sought indeed to catch Jesus in His talk, that they might lead away the people from Him. But this design of theirs is reversed. For the people came all the more unto Him gathered together by thousands, and so desirous to attach themselves to Christ, that they pressed one upon another. So mighty a thing is truth, so feeble every where deceit. Whence it is said, And when there were gathered together a great multitude, insomuch that they trode upon one another, he began to sag unto his disciples, Beware ye of the leaven of the Pharisees, which is hypocrisy.

He calls their hypocrisy leaven, as perverting and corrupting the intentions of the men in whom it has sprung up. For nothing so changes the characters of men as hypocrisy.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
