[[commentary]]
quote='''
By the parable of the tower, the Lord teaches us that, having once resolved to follow Him, we should preserve this very intention and not merely lay "a foundation" alone — that is, begin to follow but not follow through to the end, as those who lack sufficient preparation and zeal. Such were those of whom the evangelist John says: "many of His disciples went back from Him" (John 6:66). And every person who has resolved to practice virtue but has not attained to Divine knowledge, since he began virtue imperfectly and unwisely, builds imperfectly, for he cannot reach the tower of lofty knowledge. Therefore he becomes a laughingstock to the people and demons who look upon him. And in another sense: by the foundation you may understand the word of teaching. For the word of a teacher discoursing, for example, on temperance, cast upon the soul of a disciple, is like a foundation. Upon this word, as upon a foundation, there must also be "building" — that is, the accomplishment of deeds — so that the "tower," that is, the virtue which we have intended to practice, may be completed by us, and moreover may be strong before the face of the enemy. And that the word is the foundation, while the deed is the building, the apostle teaches us sufficiently when he says: "I have laid the foundation," Jesus Christ, "and another builds upon it" (1 Cor. 3:10), and further enumerates various buildings (1 Cor. 3:12–15), that is, the accomplishment of deeds either good or evil. Therefore, let us fear lest the demons begin to mock us, of whom the prophet says: "children shall rule over them" (Isa. 3:4) — that is, over those rejected by God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
For we ought not to lay a foundation, i. e. begin to follow Christ, and not bring the work to an end, as those of whom St. John writes, That many of his disciples went backward. (John 6:66.) Or by the foundation understand the word of teaching, as for instance concerning abstinence. There is need therefore of the above-mentioned foundation, that the building up of our works be established, a tower of strength from the face of the enemy. (Ps. 61:3.) Otherwise, man is laughed at by those who see him, men as well as devils.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
