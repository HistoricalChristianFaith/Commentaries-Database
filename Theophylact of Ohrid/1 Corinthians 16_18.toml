[[commentary]]
quote='''
He declares that his peace is their peace. Since they have set me at ease, and my peace is beneficial for you yourselves, then on your part let nothing unpleasant be declared against them.

That is, honor them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252016.html'
source_title='Commentary on 1 Corinthians'
