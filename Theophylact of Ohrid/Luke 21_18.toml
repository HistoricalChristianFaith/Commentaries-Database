[[commentary]]
quote='''
Having said this and that they will be hated and some of them will be put to death, He adds the greatest consolation: "not a hair of your head shall perish." You, He says, will be saved, and not the slightest part of you shall perish, even though to many it will seem that it has perished; only one must endure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
