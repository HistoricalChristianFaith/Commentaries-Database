[[commentary]]
quote='''
Simeon blessed them both, but directed his words to the true Mother, leaving aside the supposed father. "Behold," he says, "this Child is set for the fall and rising of many in Israel"; "for the fall" of the unbelieving, and for the believing — "for the rising." Or in another sense: the Lord is set "for the fall" of the evil nestled in our souls, and "for the rising" of good; fornication falls, chastity rises. It can also be understood in yet another way: Christ "is set... for the fall" means: He Himself is to suffer and undergo death, and through His fall many are to rise. So after the words "for the fall," place a period, then begin: "And for the rising of many." "The sign" is the cross, which to this day finds contradiction against itself, that is, it is not accepted by unbelievers. The Incarnation of the Lord is also called a sign, and a wondrous sign, since God became man and a Virgin became a Mother. And this sign, that is, the Incarnation of Christ, is contradicted. For some say the body is from heaven, others that it is phantasmal, and still others babble other nonsense.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke'
