[[commentary]]
quote='''
The aforementioned ability to bridle the whole body is confirmed by examples: bits on horses, rudders on ships. "Indeed" is used in place of "look." "Bits in horses' mouths" should be read in this order: "we put bits in horses' mouths." Without such an arrangement the speech would have no sense. Look: we place a bridle on horses, and ships with a small rudder, just as horses with a small bridle, we direct wherever we wish. So also the tongue must be governed by sound reason, although it is a world of unrighteousness in the usage of the common people. For by "world" the apostle here means a multitude.

Or: although the tongue is an adornment of human nature, for through it we communicate our thoughts to one another (in this sense some wish to understand the word "world"), yet in the usage of common people it is unjust; it defiles the whole body and sets on fire the whole course of life, being itself set on fire by hell. However, it is not difficult to make it move properly and as the one who governs it wishes. For if every kind of beast, reptile, bird, and sea creature is tamed and has been tamed by human nature, then I cannot say that the tongue is an unruly evil, that it is full of deadly poison, and that no one among men can tame it; for if the tongue is untamable and not directed toward anything good, then how is it that with it we bless God and Father and with it we curse men? See, it is directed by the will of the one using it. But this, my brethren, ought not to be so. For if we bless with it, is it not shameful for us to curse men who are made in the likeness of God? It is wrong for blessing and cursing to come from the same mouth. Therefore, guard the tongue more than the apple of your eye! The tongue is a royal horse. If you put a bridle on it and teach it to walk evenly, the king will sit upon it peacefully; but if you let it run and leap without a bridle, it will become the chariot of the devil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520James%2FChapter%25203.html'
source_title='Commentary on James'
