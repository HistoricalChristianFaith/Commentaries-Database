[[commentary]]
quote='''
That the prayer was from the human nature, which by permission had the attachment to life common to all, and not from the Divinity, as the accursed Arians say, is evident from the fact that Jesus was in sweat and such agony that, as it were, drops of blood fell from Him. For of those who labor greatly, it is customary to say that they sweat blood, just as of those who bitterly grieve, it is said that they weep blood. Wishing to show precisely this — that what flowed from Him was not some thin moisture appearing merely for show, but that large drops of sweat were falling — the Evangelist used drops of blood to depict the reality. From this it is clear that the nature which produced the sweat and was in agony was human, not divine. For human nature was permitted to experience such states, and it did experience them, on the one hand to show that He was not a man only in appearance, and on the other — a hidden purpose — to heal the timidity common to human nature, by exhausting it in Himself and subjecting it to the divine will.
Another may say that the sweat issuing from the body and falling to the ground signifies that, with the encouragement and strengthening of our nature in Christ, the fountains of fearfulness in us evaporate, turn into drops, and fall away from us. For if He had not had this in mind, that is, the desire to heal our human fearfulness, He would not have sweated so, even if He were very fearful and fainthearted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'
