[[commentary]]
quote='''
But so that they would not become proud because He sent the others away and took them, and at the same time, to teach them to endure dangers, He allows them to be in danger from the storm.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'
