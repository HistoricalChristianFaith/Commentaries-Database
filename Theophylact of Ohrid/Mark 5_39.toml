[[commentary]]
quote='''
At His words, "the girl is not dead, but sleeping," they laugh; this was permitted so that afterward they would have no pretext to say that she had been in a faint and that it was no wonder if He raised her. On the contrary, they would convict themselves by their own testimony of His raising one who was truly dead, since they had even laughed at His words that she was not dead but sleeping.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'
