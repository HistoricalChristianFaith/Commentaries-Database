[[commentary]]
quote='''
But pay attention also to the sorcerer: when the apostles were preaching to the other people, he was not very indignant; but he became especially indignant when they came to the proconsul.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
