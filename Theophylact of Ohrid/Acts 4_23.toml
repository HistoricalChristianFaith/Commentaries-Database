[[commentary]]
quote='''
The Apostles Peter and John "went to their own and reported" everything that had happened to them. They reported not out of ambition, but to show clear evidences of the grace of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25204.html'
source_title='Commentary on Acts'
