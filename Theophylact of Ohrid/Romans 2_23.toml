[[commentary]]
quote='''
He sets forth the gravest charge, saying: "you boast in the law," as one exalted with honor from God through the law, "yet by transgressing the law you dishonor God." Here there are three charges. First: the Jews dishonor; second: they dishonor God, who exalted them with honor; third: they dishonor the law by violating it, when it served to their honor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25202.html'
source_title='Commentary on Romans'
