[[commentary]]
quote='''
These two apostles are shown everywhere as having great unanimity: Peter makes a sign to John (see Jn. 13:24); both came together to the tomb (see Jn. 20:3). Incidentally, the writer of this book passes over the other signs, but speaks of this sign as one that made an impression on everyone. And why were they "going up to the temple"? Could it be that they were still living in the Jewish manner? This could not be. They acted this way, adapting themselves to the people and considering it a useful thing. See how they constantly devoted themselves to prayer and at the ninth hour prayed together. Luke makes precise mention of both the place and the time in order to give an account of what he describes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25203.html'
source_title='Commentary on Acts'
