[[commentary]]
quote='''
Since the Lord mentioned sorrows and dangers, He also offers the remedy for them. This remedy is prayer, and not simply prayer, but constant and fervent prayer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke'
