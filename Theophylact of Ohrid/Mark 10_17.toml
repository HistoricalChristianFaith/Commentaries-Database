[[commentary]]
quote='''
Some falsely portray this young man as a cunning and deceitful tempter. This is not so: he was merely a covetous man, not a tempter. For listen to what the Evangelist notes: "Jesus, looking at him, loved him." However, I marvel at this young man in that, while all others came to Christ seeking healing from diseases, he himself asks about inheriting eternal life — if only he were not possessed by an even stronger passion of love of money.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
I wonder at this young man, who when all others come to Christ to be healed of their infirmities, begs of Him the possession of everlasting life, notwithstanding his love of money, the malignant passion which afterwards caused his sorrow.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
