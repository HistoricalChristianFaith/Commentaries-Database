[[commentary]]
quote='''
My work is to gather the scattered children of God, while his work consists in scattering those who have been gathered. How then do you conclude about Me that I have fellowship with Satan?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke'
