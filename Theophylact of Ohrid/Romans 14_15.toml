[[commentary]]
quote='''
Here he turns his speech to the perfect one, teaching: even if foods were a thousandfold not unclean by nature, you still ought to have abstained from pork, so that your brother who is scandalized would not be grieved, if only you wish to preserve love. You, he says, by a dispute over food are ruining and corrupting a brother who is so precious in the eyes of Christ that He died for him. For that person, noticing that you eat pork in opposition to him, becomes more obstinate and therefore, fearing lest he fall away from Christ, ultimately attaches himself entirely to the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252014.html'
source_title='Commentary on Romans'
