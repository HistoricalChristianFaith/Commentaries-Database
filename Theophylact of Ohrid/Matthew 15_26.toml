[[commentary]]
quote='''
Christ speaks of her as a dog, because the Gentiles led an unclean life and were involved with the blood of meat sacrificed to idols, while the Jews He speaks of as children.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
