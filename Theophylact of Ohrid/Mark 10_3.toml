[[commentary]]
quote='''
But Christ, Self-Existent Wisdom, answers them in such a way that He escapes their snares. He asks them: what did Moses command them?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
