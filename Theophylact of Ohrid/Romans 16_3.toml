[[commentary]]
quote='''
They, he says, helped me in word and teaching and shared with me labors and dangers. Some supposed that these co-workers were Paul's helpers in tent-making (Acts 18:3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252016.html'
source_title='Commentary on Romans'
