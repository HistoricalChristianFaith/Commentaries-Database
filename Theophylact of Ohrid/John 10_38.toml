[[commentary]]
quote='''
And you will know and believe that I am nothing other than the Father. For while remaining the Son and being distinct in Person, I have one and the same Essence; just as the Father also, while remaining the Father and being distinct in Person, is nothing other than the Son, that is, in Essence and Nature. Although We are distinguished by Persons, the Persons are inseparable and indivisible, and the Father and the Son abide in one another without confusion.
Among us, a father exists separately from a son, though they are one by nature. But in the Divine Persons it is not as it is among us; rather, They abide one in another without confusion. Therefore, concerning us it is said "three men," for we are separate Persons and do not properly constitute one; but of the Holy Trinity it is said "one" God, and not three, because the Persons abide together with One Another without confusion. Add to this the identity of will and desire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John'
