[[commentary]]
quote='''
"And there was a good way off from them a herd of many swine grazing. So the demons besought Him, saying, If Thou cast us out, suffer us to go away into the herd of swine. And He said unto them, Go. And when they were come out, they went into the herd of swine." The demons asked this so that they could drown the swine, and thus the owners would be grieved and would not welcome Christ. Christ granted the demons their request in order to show how great is their bitterness towards men, and that if they had the power, and were not prevented as they are by God, they would do worse things to us than they did to the swine. For God protects those possessed by demons so that they do not kill themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
