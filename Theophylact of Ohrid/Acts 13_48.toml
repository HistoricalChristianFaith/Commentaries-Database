[[commentary]]
quote='''
"Who were ordained to eternal life." Ordained not by compulsion, for it is said, "whom He foreknew, He also predestined" (Rom. 8:29). Thus, the kindred of the Lord is essentially the entire human race, but Israel is His especially close kindred. And since He came to Israel, and enlightened the other nations through the apostles, it is said: "God according to His promise raised up for Israel a Savior, Jesus" (Acts 13:23), while the Gentiles through Him were illumined with light (cf. Luke 2:32), and salvation was granted to all, for this is precisely what is signified by the words "to the end of the earth," and the promises made to their fathers were fulfilled.
Although they were appointed or predestined to eternal life according to foreknowledge, they believed by their own desire, by their own will. God's foreknowledge does not destroy the freedom of our will. Appointed before the foundation of the world, according to God's foreknowledge, to be a chosen vessel, Paul did not become one immediately at birth or in his youth, but after a considerable time, when he had formed a notion of his own significance and his own virtues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
