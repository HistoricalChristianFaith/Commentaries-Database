[[commentary]]
quote='''
"Were filled with envy" means that they were aroused, agitated by what was being said. Now they attack the apostles with greater ferocity, but do not immediately begin to judge them, thinking that the public prison would strike them more forcefully. Look, if you will, at how the life of the apostles unfolds. First — sorrow on account of the Ascension of Christ, then — joy on account of the descent of the Holy Spirit; again — sorrow from people who mocked them, and again joy — from the multiplication of believers and from the sign (miracle); then — sorrow again as a result of the imprisonment of Peter and John (see Acts 4:3), and again — joy as a result of their acquittal; finally now from the splendor at the appearance of the Angel in the prison and from the signs — joy, and from the high priest and from those who seized them — sorrow. Yes, their life, one might say, is such as is the life of all who live according to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25205.html'
source_title='Commentary on Acts'
