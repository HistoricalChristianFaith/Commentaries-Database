[[commentary]]
quote='''
"By nature," that is, not proselytes, but born of Jewish fathers and raised in the law, yet we abandoned our accustomed way of life and turned to faith in Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Galatians%2FChapter%25202.html'
source_title='Commentary on Galatians'
