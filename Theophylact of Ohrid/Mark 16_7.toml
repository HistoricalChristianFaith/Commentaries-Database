[[commentary]]
quote='''
"But go, tell His disciples and Peter." He separates Peter from the disciples either as the chief one, naming him specially apart from the others by preeminence, or for this reason: since Peter had denied, if the women had said they were commanded to announce only to the disciples, he would have said: I denied Him, therefore I am no longer His disciple, and so the Lord has rejected me and been disgusted with me. Therefore the Angel also added "and Peter," so that Peter would not be troubled by the thought that he was not deemed worthy even of a word, as one who had denied and was therefore no longer worthy to be numbered among the disciples. He sends them "to Galilee," drawing them away from the turmoil and great fear of the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Commentary on Mark'
