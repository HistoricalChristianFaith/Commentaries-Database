[[commentary]]
quote='''
Then all the disciples forsook Him, and fled. And they that had laid hold on Jesus led Him away to Caiaphas the high priest, where the scribes and the elders were assembled. But Peter followed Him afar off unto the high priest's court, and went in, and sat with the servants, to see the end. The other disciples fled, but Peter, who was more fervently devoted to the Master, followed at a distance. If John also followed, it was not as a disciple but as an acquaintance of the high priest (Jn. 18:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
