[[commentary]]
quote='''
As if wishing to buy something from them, He asks: "Children, do you have anything to eat?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John'
