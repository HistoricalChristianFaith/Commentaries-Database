[[commentary]]
quote='''
Paul preaches here for the first time, and see with what prudence: those places where the discussion concerns God the Word, he passes over and stops at places that did not mention the seed of David, as he himself says when writing to the Romans: "I strived to preach the gospel not where the name of Christ was already known" (Rom. 15:20). Notice: Barnabas also yields to Paul, just as John everywhere yields to Peter. Although Barnabas enjoyed great respect, he acted this way with the common good in mind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
