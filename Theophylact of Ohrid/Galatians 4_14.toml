[[commentary]]
quote='''
And you, however, did not turn away from me; these trials of mine, that is, persecutions, wounds, and the like, did not lead you into temptation and did not cause you to despise and abhor me. And at the same time, in a subtle way, he also shames them, showing how much he endured for their sake from his opponents.

You so honored me, he says, as if I were more than a man. Is it not strange that at the time when I was being persecuted and driven out, you received me as an angel and as Christ, and were not offended, but now, when I counsel what is proper, you consider me an enemy and do not accept me?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Galatians%2FChapter%25204.html'
source_title='Commentary on Galatians'
