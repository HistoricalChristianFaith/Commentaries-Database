[[commentary]]
quote='''
He did not say: if we punished ourselves, but only: if we judged and condemned ourselves, then even here we would not be judged by God, and we would avoid punishments both here and there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252011.html'
source_title='Commentary on 1 Corinthians'
