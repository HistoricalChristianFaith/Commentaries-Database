[[commentary]]
quote='''
Yet even here He was not hidden from those who sought Him. On the contrary, the people watched so attentively lest the Lord be hidden from them that they went ahead, that is, outran the apostles themselves and went to the place where Jesus intended to rest. So you too should go ahead of Jesus: do not wait for Him to call you, but rather hasten forward yourself to anticipate Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'
