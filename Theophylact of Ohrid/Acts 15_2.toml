[[commentary]]
quote='''
But Paul did not say: "Why is this? Am I not worthy of trust after having performed so many signs?" Rather, he decided to go to Jerusalem for their sake. How then does he say in the Epistle to the Galatians: "I did not go up to Jerusalem to those who were apostles before me" (1:17)? The first time he came to Jerusalem not on his own, but was sent by others; the second time he went there not in order to learn, but in order to bring others around to his opinion, because he himself from the beginning of his conversion held the same opinion that the council of apostles later established, namely that Gentile converts should not be circumcised. And since it seemed to certain Christians from among the Jews that Paul alone could not be trusted to decide the question, and since they turned their eyes to the apostles who were in Jerusalem, Paul went there — he went not in order to learn anything more, but in order to convince those who were saying the opposite that the apostles in Jerusalem also decided this question in agreement with him and Barnabas.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
