[[commentary]]
quote='''
But observe the disciples, how they are distinguished by their love for mankind! Taking pity on the people, they approach Christ and begin to entreat Him on their behalf.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The Lord, placing before them, first, what is most profitable, that is, the food of the word of God, afterwards also gave the multitude food for their bodies; in beginning to relate which, the Evangelist says, And when the day was now far spent, his disciples came unto him, and said, This is a desert place.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
