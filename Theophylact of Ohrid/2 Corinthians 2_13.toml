[[commentary]]
quote='''
That is, he was not there for a long time due to difficult circumstances. For although a great door was opened, that is, there was much work to do, yet for lack of a helper it met with hindrance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%25202.html'
source_title='Commentary on 2 Corinthians'
