[[commentary]]
quote='''
"To him who has, it will be given," that is, whoever through good dealings has accumulated rich means, to him even more will be given. For if he increased a small amount tenfold, then obviously, having multiplied a greater amount tenfold, he will bring the master even greater profit. But from the negligent and lazy one, who did not take care to multiply what he received, even that which he has will be taken away, so that the master's property does not lie useless when it can be given to another and increased many times over. We understand this not only of the word and teaching, but also of moral virtues. For in these too God has given us gifts — to one the gift of fasting, to another of almsgiving, to another of meekness, to another of humility. And if we are watchful, we will multiply these gifts; but if we are careless and willingly die, then afterwards we will lay the blame on God, as we commonly say: what am I to do? If such-and-such a person is holy, it is because God favors him and he is holy; but He does not favor me, and I am not holy; and that one was Peter, the other was Paul. Foolish man! The very mina given to you makes you a Peter and a Paul. Work according to your ability and bring something to the One who gave it, if not as much as Peter and Paul — for they received a mina each, and you too received a mina. And then, having not advanced at all in doing good, you accuse God! Therefore, proving ourselves unworthy of the gifts, we are deprived of them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But from the slothful and idle, who stirs not himself to increase what he has received, shall be taken away even that which he possesses, that there may be no gap in the Lord's account when it is given to others and multiplied. But this is not to be applied only to the words of God and teaching, but also to the moral virtues; for in respect of these also, God sends us His gracious gifts, endowing one man with fasting, another with prayer, another with mildness or humility; but all these so long as we watch strictly over ourselves we shall multiply, but if we grow cold we shall extinguish.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
