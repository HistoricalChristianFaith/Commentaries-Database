[[commentary]]
quote='''
For you will receive from Me both wisdom and eloquence, so that all who oppose you, even if they unite together, will not be able to withstand you either in wisdom, that is, the power of thought, or in eloquence and unerring speech. Often someone is skilled in forming arguments and resourceful in thought, but is quickly flustered by noise, and because of this mixes everything up when speaking before the people. But to them, that is the apostles, grace was given in both respects. Therefore the priests were also amazed at the extraordinary wisdom of Peter and John, knowing that they had previously been simple men (Acts 4:13). And Festus said to Paul: You are out of your mind, Paul! "Much learning is driving you mad" (Acts 26:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
And He adds the cause, For I will give you a mouth and wisdom, which all your adversaries shall not be able to gainsay or resist. As if He said, Ye shall forthwith receive of me eloquence and wisdom, so that all your adversaries, were they gathered together in one, shall not be able to resist you, neither in wisdom, that is, the power of the understanding, nor in eloquence, that is, excellence of speech, for many men have often wisdom in their mind, but being easily provoked to their great disturbance, mar the whole when their time of speaking comes, But not such were the Apostles, for in both these gifts they were highly favoured.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
