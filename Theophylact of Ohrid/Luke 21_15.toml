[[commentary]]
quote='''
For you will receive from Me both wisdom and eloquence, so that all who oppose you, even if they unite together, will not be able to withstand you either in wisdom, that is, the power of thought, or in eloquence and unerring speech. Often someone is skilled in forming arguments and resourceful in thought, but is quickly flustered by noise, and because of this mixes everything up when speaking before the people. But to them, that is the apostles, grace was given in both respects. Therefore the priests were also amazed at the extraordinary wisdom of Peter and John, knowing that they had previously been simple men (Acts 4:13). And Festus said to Paul: You are out of your mind, Paul! "Much learning is driving you mad" (Acts 26:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
