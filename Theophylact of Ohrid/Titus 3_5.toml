[[commentary]]
quote='''
He saved us not by works which we had done, in other words: we had not even done works worthy of justification, nor were we saved by them, but His grace accomplished everything.
Alas, we were so immersed in evil that we could no longer be cleansed, but had need of regeneration. For this is what regeneration and renewal mean — a second birth and a new formation. Just as we do not prop up a completely dilapidated house, but tear it down to its foundations and build it anew, so God did not merely repair us, but fully recreated us. In what manner? By the Holy Spirit. Lest you inquire in what manner, he says: the Spirit set everything right.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Titus%2FChapter%25203.html'
source_title='Commentary on Titus'
