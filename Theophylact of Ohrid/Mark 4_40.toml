[[commentary]]
quote='''
He also rebukes the disciples for not having faith. For if they had had faith, they would have believed that even while sleeping He could preserve them unharmed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'
