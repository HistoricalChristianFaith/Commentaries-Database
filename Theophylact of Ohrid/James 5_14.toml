[[commentary]]
quote='''
The apostles were already doing this even when the Lord still lived among men: they anointed the sick with oil (Mark 6:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520James%2FChapter%25205.html'
source_title='Commentary on James'
