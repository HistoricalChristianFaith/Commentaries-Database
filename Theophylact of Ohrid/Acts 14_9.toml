[[commentary]]
quote='''
As for the words "looking at him and seeing that he had faith to be healed," it seems to me that these words express the idea that Paul penetrated into his soul, because to attend to what Paul was saying was possible only for a philosophical soul.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252014.html'
source_title='Commentary on Acts'
