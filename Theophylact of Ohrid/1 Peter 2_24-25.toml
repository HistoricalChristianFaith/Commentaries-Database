[[commentary]]
quote='''
When, by Pilate's order, He was scourged, He endured on His body the wounds from the blows as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25202.html'
source_title='Commentary on 1 Peter'
