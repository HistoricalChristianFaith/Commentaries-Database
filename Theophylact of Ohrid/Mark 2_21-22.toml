[[commentary]]
quote='''
Just as an "unshrunk," that is, new patch, by its firmness will only tear the old garment if sewn onto it, and just as new wine by its strength will burst old wineskins, so too My disciples have not yet grown strong, and therefore, if we burden them, we will thereby do them harm, since in the weakness of their understanding they are still like an old garment. Thus, one should not impose upon them the heavy commandment of fasting. Or you can also understand it this way: Christ's disciples, being already new people, cannot serve old customs and laws.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25202.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Or else the disciples are likened to old garments on account of the infirmity of their minds, on which it was not fitting to impose the heavy command of fasting.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
