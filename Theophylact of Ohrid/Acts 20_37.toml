[[commentary]]
quote='''
The strength of their affection for Paul, as they embraced him for the last time and felt deep love and friendship from his final conversation, is evident in the words: "falling on Paul's neck."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252020.html'
source_title='Commentary on Acts'
