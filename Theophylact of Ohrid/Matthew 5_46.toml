[[commentary]]
quote='''
For if ye love them which love you, what reward have ye? Do not even the publicans do the same? Let us tremble with fear since we are not the equal of the publicans, but hate even those who love us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
