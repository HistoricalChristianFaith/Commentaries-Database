[[commentary]]
quote='''
He commands them to take nothing — neither a bag, nor money in their belt, nor bread — so as to teach them detachment from possessions and so that others, looking at them, might be moved to compunction when they teach non-possessiveness by themselves having nothing. Indeed, who would not be moved to compunction and stirred toward non-possessiveness, seeing that an apostle takes neither a bag nor bread, which is the most necessary thing for us?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'
