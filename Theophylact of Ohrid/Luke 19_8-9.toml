[[commentary]]
quote='''
We have two kinds of goods in us, bodily, and spiritual; the just man gives up all his bodily goods to the poor, but he forsakes not his spiritual goods, but if he has extorted any thing from any one, he restores to him fourfold; signifying thereby that if a man by repentance walks in the opposite path to his former perverseness, he by the manifold practice of virtue heals all his old offences, and so merits salvation, and is called the son of Abraham, because he went out from his own kindred, that is, from his ancient wickedness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
