[[commentary]]
quote='''
The women think nothing great or worthy of the divinity of Jesus, as they sit at the tomb and buy myrrh in order to anoint the body according to the Jewish custom, so that it would be fragrant and not give off an unpleasant smell from decay, and so that the body would be preserved unharmed by the power of the myrrh, which dries and absorbs the moisture of the body. This is what the women were thinking.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For they do not understand the greatness and dignity of the wisdom of Christ. But they came according to the custom of the Jews to anoint the body of Christ, that it might remain sweet-smelling, and might not burst forth into moisture, for spices have the property of drying up, and absorb the moisture of the body, so that they keep the body from corruption.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
