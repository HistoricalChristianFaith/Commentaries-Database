[[commentary]]
quote='''
"And know His will," that is, God's. "And approve the things that are excellent," that is, you determine what must be done and what must not be done. By "excellent" (διαφέροντα) one should understand what is fitting or beneficial for each person.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25202.html'
source_title='Commentary on Romans'
