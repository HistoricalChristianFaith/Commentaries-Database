[[commentary]]
quote='''
Again he says that God "gave them over to passions" because they served the creature. Just as in the doctrine of God they became corrupt, having abandoned the guidance of creation, so also in their life they became abominable, having abandoned natural pleasure (which is the most convenient and pleasant of all) and having given themselves over to unnatural pleasure (which is the most difficult and unpleasant of all). This is what the word "exchanged" means, which shows that they abandoned what they had and chose something else. Thus he presents nature, which they transgressed, as a great accuser of both sexes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25201.html'
source_title='Commentary on Romans'
