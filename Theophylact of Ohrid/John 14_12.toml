[[commentary]]
quote='''
Christ, showing that He can perform not only these works, but also others far greater than these, speaks of this with extraordinary power. For He does not say "I can perform works even greater than these," but — what is far more astonishing — "I can also give others the authority to perform works greater than these."

Do you see how great is the power of the Only-Begotten? He gives others also the power to do works greater than those which He Himself did. "Because I go to My Father," that is, now you yourselves will work miracles, for I am already departing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
