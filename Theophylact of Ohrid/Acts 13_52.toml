[[commentary]]
quote='''
"And the disciples were filled with joy and with the Holy Spirit." The teachers were being persecuted, yet they rejoiced: such is the power of the Gospel. The suffering of the teacher does not take away boldness from the disciple, but makes him more courageous.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
