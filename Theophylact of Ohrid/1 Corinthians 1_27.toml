[[commentary]]
quote='''
Indeed, for the Greeks it is the greatest shame to see that a common craftsman surpasses them in philosophy, and that the weak and despised humbles the strong and wealthy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25201.html'
source_title='Commentary on 1 Corinthians'
