[[commentary]]
quote='''
And therefore she says, all generations, not only Elisabeth, but also every nation that believed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"From now on all generations will call Me blessed," not Elizabeth alone, but also the generations of believers. And for what reason will they call Her blessed? Is it for Her virtue? No! But because God has shown His greatness upon Me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke'