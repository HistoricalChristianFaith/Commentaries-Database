[[commentary]]
quote='''
Since the Lord, by working miracles, had saved many, the chief priests, like the passersby, also said: He saved others, but He cannot save Himself? They said this mocking His miracles and considering them illusory apparitions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'
