[[commentary]]
quote='''
Since the Lord, by working miracles, had saved many, the chief priests, like the passersby, also said: He saved others, but He cannot save Himself? They said this mocking His miracles and considering them illusory apparitions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Likewise also the Chief Priests mocking said among themselves with the Scribes, He saved others, himself he cannot save. They said this, to do away with His miracles, as though those which He had done were but the semblance of them, for by working miracles He saved many.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
