[[commentary]]
quote='''
These shepherds are a type of the spiritual shepherds — the bishops. Thus, bishops must guard their flock and play, that is, sing something spiritual and teach the people, and then they will be deemed worthy of divine visions and hearings.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke'
