[[commentary]]
quote='''
Some of them that stood there, when they heard that, said, This man calleth for Elijah. The multitude did not understand His cry, being uncouth and ignorant of the prophets, and thought that He was calling upon Elijah. For not all the Jews knew the prophets, just as now not all Christians, perhaps, know the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
