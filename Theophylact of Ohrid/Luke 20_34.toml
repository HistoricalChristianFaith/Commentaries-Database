[[commentary]]
quote='''
But the Lord refutes their premise and declares that life there is not bodily. And together with this weak premise and assumption He destroys their teaching as well, saying: you are mistaken, not knowing the Scriptures and misinterpreting their meaning. "The children of this age," that is, those who beget and are begotten in this world, "marry and are given in marriage," that is, "are wed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'
