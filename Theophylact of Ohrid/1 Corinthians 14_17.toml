[[commentary]]
quote='''
You might think he is completely disparaging the gift of tongues, but he says: you, for your part, give thanks well, but since there is no benefit to your neighbor in this, your thanksgiving is useless.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252014.html'
source_title='Commentary on 1 Corinthians'
