[[commentary]]
quote='''
Or else, in a place where two roads meet, that is, in this life, but it was loosed by the disciples, through faith and baptism.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
