[[commentary]]
quote='''
"To send relief to the brethren." From this it becomes clear that the apostles held the dignity of elders as well, although, besides this, they were at the rank of deacons and bishops.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252011.html'
source_title='Commentary on Acts'
