[[commentary]]
quote='''
This miracle also hints at the universal salvation that was for the entire human race. The ten lepers signify all of human nature, leprous with evil, bearing upon itself the disfigurement of sin, living outside the heavenly city because of its uncleanness, and standing far from God. This very standing far from God interceded for mercy. For the God who loves mankind and desires to save and bless all, the strongest motivation for mercy is to see that no one partakes in goodness. For this very reason He condescended to heal those in such a condition. And although He healed all of leprous nature by becoming incarnate and tasting death for every person, nevertheless the Jews, despite being cleansed on the Lord's part from all the impurities of leprous sin, proved ungrateful and did not turn from their vain way to give glory to God the Savior, that is, to believe in Him — that He, the true God, deigned to endure the most grievous sufferings. For the Flesh and the Cross are the glory of God. Thus they did not acknowledge the Incarnate and Crucified One as the Lord of glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke'
