[[commentary]]
quote='''
And when the disciples heard it, they fell on their faces, and were sore afraid. Not able to endure the brightness of the cloud, nor the voice, the disciples fell to the ground. Their eyes were also heavy with sleep, as Luke says (See Lk. 9:32), ("sleep" indicating the daze caused by the vision).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
