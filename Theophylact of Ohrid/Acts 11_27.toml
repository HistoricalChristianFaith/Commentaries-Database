[[commentary]]
quote='''
In what sense does Christ say that "all the prophets and the law prophesied until John" (Matt. 11:13)? He speaks of those prophets who foretold His coming.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252011.html'
source_title='Commentary on Acts'
