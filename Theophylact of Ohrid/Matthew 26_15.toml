[[commentary]]
quote='''
"They covenanted with him for thirty pieces of silver," that is, they agreed, they determined an amount to give, and not as many think, that they weighed out and paid the money.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
