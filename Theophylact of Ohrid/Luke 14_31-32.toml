[[commentary]]
quote='''
And this parable teaches us not to be double-minded, not to be nailed to the flesh while cleaving to God, but, if we intend to wage war against the evil powers, to advance against them as against enemies and to oppose them by deed itself.
Sin also becomes a king, reigning in our mortal body (Rom. 6:12), when we allow it. But our mind too was created as a king. Therefore, if it intends to rise up against sin, it must wage war against it with all its soul, for its soldiers are strong and terrible, and appear greater and more numerous than us; since the soldiers of sin are demons, who against our ten thousand direct, it seems, a force of twenty thousand. And they, being bodiless and contending with us who live in the body, appear to have greater strength. Nevertheless, we can fight against them, even though they seem stronger than us. For it is said: "Through God we shall do valiantly" (Ps. 60:12) and "The Lord is my light and my salvation; whom shall I fear?... Though a host should encamp against me, my heart shall not fear" (Ps. 27:1, 3). Moreover, God, who became incarnate for our sake, gave us "authority to tread... over all the power of the enemy" (Luke 10:19). Therefore we, though in the flesh, yet have weapons that are not carnal (2 Cor. 10:3–4). Although by reason of our bodily nature we constitute, it seems, ten thousand against their twenty thousand, by reason of their bodiless nature, nevertheless we must say: "The Lord God is my strength" (Hab. 3:19)!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
