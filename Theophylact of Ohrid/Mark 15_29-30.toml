[[commentary]]
quote='''
"Those passing by," that is, those passing along the road where the Lord was crucified, even they, says the Evangelist, blasphemed the Lord, reproaching Him as a deceiver.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For the passers by blasphemed Christ, reproaching Him as a seducer. But the devil moved them to bid Him come down from the Cross; for he knew that salvation was being won by the Cross, therefore he again proceeded to tempt Christ, so that if He came down from the Cross, he might be certain that He is not truly the Son of God, and so the salvation, which is by the Cross, might be done away. But He being truly the Son of God, did not come down; for if He ought to have come down, He would not have ascended there at all; but since He saw that in this way salvation must be effected, He underwent the crucifixion, and many other sufferings, unto the finishing of His work.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
