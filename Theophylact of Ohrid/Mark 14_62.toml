[[commentary]]
quote='''
Jesus said, "I am." Although He knew that they would not believe, He was nevertheless compelled to answer, so that they could not later say, "If we had heard from Him a direct testimony about Himself, we would have believed." Therefore their condemnation will be all the greater, since even having heard this testimony, they did not believe. "And you will see," He says, "the Son of Man sitting at the right hand of power," that is, of the Father (here He calls the Father "power"). For He will come again not without a body, but in such a way that He can be seen and recognized by those who crucified Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For He knew that they would not believe, nevertheless He answered them, lest they should afterwards say, If we had heard any thing from Him, we would have believed on Him; but this is their condemnation, that they heard and did not believe.

As if He had said, Ye shall see Me as the Son of Man sitting on the right hand of the Father, for He here calls the Father power. He will not however come without a body, but as He appeared to those who crucified Him, so will He appear in the judgment.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
