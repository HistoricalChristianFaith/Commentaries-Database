[[commentary]]
quote='''
Some of the ancient fathers explained the words "the gospel was preached to the dead" as a separate section, paying no attention whatsoever to their connection with the preceding discourse — to the fact that what is presented as a cause must be referred to what precedes it. For these words must be understood as a cause. But they, as has been said, explained them separately, namely thus: the dead, they said, Scripture calls people of two kinds: either those who died in sins, who never knew life at all, or those who conformed themselves to the death of Christ and died to this world, that is, to worldly lusts, and live for Christ alone, as Paul also says: "And the life which I now live in the flesh I live by faith in the Son of God" (Gal. 2:20). So then, they say, those who died in this manner for Christ condemn themselves in the flesh for their former careless and dissipated life, but they live in the spirit, that is, a life after the example of Christ. For the condemnation of their former conduct makes them more courageous and careful regarding the present. So they explain it. One might even approve of such an explanation, but the saying has not yet been fully clarified. Since it was said above concerning those in Hades, that "He preached also to the spirits in prison" (1 Pet. 3:19), it is to that passage that the present saying, expressed as a cause, must be referred, and it should not be regarded as a new saying. Therefore we say: since before this the apostle said, "Him who is ready to judge the living and the dead" (1 Pet. 4:5), and to this one could object: where then are the living judged, and where the dead? — he confirms this by what was said above, namely that He preached also to the spirits in prison, and that this preaching served as a judgment, that is, as a condemnation. Some, those who recognized their life as good, when Goodness appeared there, immediately united themselves with It; but those who were evil were filled with shame because of this, and received condemnation upon themselves. This is what "Judge of the dead" means. "Judge of the living": when the Lord came into this corruptible life, people found in His coming a judgment upon themselves. Some, the good, eagerly accepted His teaching, while others, the evil, rejected the truth and shut their own eyes against it. Which is why it is said: "For judgment," that is, for condemnation, "I have come into this world" (John 9:39). Thus Christ is the Judge of the living and the dead!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'

[[commentary]]
quote='''
"Having been judged in the flesh." The complete thought is this: when the Lord visited those in Hades, some, who in this world had lived according to the flesh, were condemned, while others, who had lived spiritually, either rose together with the Lord, for "many bodies of the saints who had fallen asleep were raised" (Matt. 27:52), or were enlivened by good hope.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'
