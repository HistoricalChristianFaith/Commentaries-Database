[[commentary]]
quote='''
Peter, as one who cared for all and who out of brotherly love was zealous for the benefit of his listeners, and as one who had already received the Church into his trust, asked (the Lord): whether He was speaking this parable "to all." The Lord does not answer his question directly, but in a veiled manner shows that although the parable spoken is common and extends to all believers, whoever they may be, it also applies to you — the apostles and generally those deemed worthy of teaching or leadership. Listen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Peter, to whom the Church had already been committed, as having the care of all things, inquires whether our Lord put forth this parable to all. As it follows, Then Peter said unto him, Lord, speakest thou this parable unto us, or even unto all?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
