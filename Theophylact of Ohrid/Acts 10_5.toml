[[commentary]]
quote='''
Pay attention also to the Angel: he first elevates and raises the thoughts of Cornelius to the highest, and only then says: "Send men to Joppa and call for Simon, who is called Peter."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
