[[commentary]]
quote='''
The Pharisees, being ravenous wolves, did not shepherd the people but devoured them. Therefore the people, bypassing them, gather to Christ, the true Shepherd. And Christ gives them food—first the more profitable and precious kind, in word, and then bodily food as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'
