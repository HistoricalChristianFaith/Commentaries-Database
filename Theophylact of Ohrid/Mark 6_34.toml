[[commentary]]
quote='''
The Pharisees, being ravenous wolves, did not shepherd the people but devoured them. Therefore the people, bypassing them, gather to Christ, the true Shepherd. And Christ gives them food—first the more profitable and precious kind, in word, and then bodily food as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
There follows, And Jesus when he came out saw much people, and was moved with compassion towards them, because they were as sheep having no shepherd. The Pharisees being ravening wolves did not feed the sheep, but devoured them; for which reason they gather themselves to Christ, the true Shepherd, who gave them spiritual food, that is, the word of God. Wherefore it goes on, And he began to teach them many things. For seeing that those who followed Him on account of His miracles were tired from the length of the way, He pitied them, and wished to satisfy their wish by teaching them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
