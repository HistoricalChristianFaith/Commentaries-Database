[[commentary]]
quote='''
He sat in the boat so that He could face all His listeners, and so that all could hear. Then as a fisherman He casts His net from the sea toward those on land.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
