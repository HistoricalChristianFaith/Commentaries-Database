[[commentary]]
quote='''
Having uttered such a threat against those who cause others to stumble—that it would be better for them to be cast into the sea—the Lord now instructs those who are tempted to beware of people ready to lead them astray and divert them from the path of truth. Whether a foot, or a hand, or an eye causes you to stumble—that is, whether the one who causes you to stumble and trips you up in the matter of salvation is from among your household, or from those close to you by flesh—cut him off, that is, reject your love and friendship for him. And the worm and fire that torment sinners are the conscience of each person and the remembrance of the vile deeds committed in this life. This gnaws like a worm and burns like a fire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Commentary on Mark'
