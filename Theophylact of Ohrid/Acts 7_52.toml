[[commentary]]
quote='''
"Which of the prophets did your fathers not persecute?" If your fathers killed these foreheralds, then there is nothing surprising that I, who preach the One foretold by them, will be killed by you, who take too much pride in your ancestors.
"They killed those who foretold the coming of the Righteous One." He says "the Righteous One," showing that He was unjustly killed by them, because if He is righteous, then those who killed Him are very much in the wrong. He calls Him righteous because even they could not deny this. They nowhere condemned Him as unrighteous, for how would they condemn on this count one who did not even have a shelter? But he sets before them two of their crimes: murder and betrayal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25207.html'
source_title='Commentary on Acts'
