[[commentary]]
quote='''
The disciples, still reasoning in a human manner, fell into envy, and therefore they are indignant at the two apostles. However, when? When they saw that the request of the latter was not accepted by the Lord but rejected, then they began to be indignant. As long as the Lord Himself showed preference to James and John, the other disciples, seeing this, endured it; but when those two disciples began to seek honors for themselves, the others could no longer endure it. So imperfect were they still at that time! But later we shall see how each of them yielded precedence to the other.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The other Apostles are indignant at seeing James and John seeking for honour; wherefore it is said, And when the ten heard it, they began to be much displeased with James and John. For being influenced by human feelings, they were moved with envy; and their first displeasure arose from their seeing that they were not taken up by the Lord; before that time they were not displeased because they saw that they themselves were honoured before other men. At this time the Apostles were thus imperfect, but afterwards they yielded the chief place one to another.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
