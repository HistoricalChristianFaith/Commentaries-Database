[[commentary]]
quote='''
But the blind man himself also did not have perfect faith. Therefore the Lord does not give him sight all at once, but gradually, as to a man whose faith is not complete, for healings are given in proportion to faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But the reason why he did not see at once perfectly, but in part, was, that he had not perfect faith; for healing is bestowed in proportion to faith.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
