[[commentary]]
quote='''
The Pharisees, always grasping at the sensible, thought that He was speaking of sensible blindness, and said: "Are we blind also?" They were ashamed of this bodily blindness alone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John'
