[[commentary]]
quote='''
Jesus "grew" in body. Although He could have attained the measure of manhood from the very womb, He would then have appeared to be a phantom; therefore He grows little by little. With age, the wisdom of God the Word was manifested. For He was not wise through progress in learning — away with such a thought! But since He revealed His innate wisdom little by little, it is said that He advanced and "grew strong in spirit" in proportion to His bodily growth. For if He had displayed all wisdom at His very earliest age, He would have appeared monstrous. But now, revealing Himself as much as possible in accordance with His age, He was fulfilling the dispensation, not receiving wisdom. For what could be more perfect than He who was perfect from the beginning? Yet He reveals His inherent wisdom little by little.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Now our Lord might have come forth from the womb in the stature of mature age, but this would seem like something imaginary; therefore His growth is gradual, as it follows, And the child grew, and waxed strong.

For if while yet a little child, He had displayed His wisdom, He would have seemed a miracle, but together with the advance of age He gradually showed Himself, so as to fill the whole world. For not as receiving wisdom is He said to be strengthened in spirit. For that which is most perfect in the beginning, how can that become any more perfect. Hence it follows, Filled with wisdom, and the grace of God was in him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
