[[commentary]]
quote='''
This Herod was the son of the Herod who slaughtered the infants. Though he was a tetrarch, Mark calls him king, using this title in a loose sense. Having heard of the Lord's miracles and being conscious that he had killed the righteous John without cause, Herod began to think that he had risen from the dead and upon his resurrection had received the power of working miracles. Previously John had not performed a single sign, but after the resurrection — so Herod thought — he received the power to work signs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'
