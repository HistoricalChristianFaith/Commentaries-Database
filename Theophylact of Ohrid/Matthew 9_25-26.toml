[[commentary]]
quote='''
"But when the people were put forth, He went in, and took her by the hand, and the maid arose. And the fame hereof went abroad into all that land." Where there are crowds and distractions, Christ does not perform miracles. He takes her by the hand, thus imparting strength. And you, O reader, who are dead in sins, He will also resurrect when He puts outside the crowd and its tumult and takes you by the hand so that you might act.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
