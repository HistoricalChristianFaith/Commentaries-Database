[[commentary]]
quote='''
But when asked a second time, Christ answered nothing and thereby brought Pilate to amazement. For Pilate marveled that He, being learned in the law and eloquent and having the ability to overthrow with a single answer the slanders brought against Him, said nothing, but on the contrary, humbly endured the accusations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'
