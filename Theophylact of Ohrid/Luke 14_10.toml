[[commentary]]
quote='''
On the contrary, how praiseworthy it is when one who is worthy of the first place initially sits below others, and then turns out to be the one presiding, so that everyone yields precedence to him. Does it really seem to you a small thing, this teaching of the Lord, which prescribes the highest of virtues — humility, plants it in the souls of the listeners, and leads the one who is obedient to it toward propriety? The same thing was later taught by the disciple of Christ, Paul: "all things," he says, "should be done decently and in order" (1 Cor. 14:40). And how shall this be? "Let each of you look not only to his own interests, but also to the interests of others" (Phil. 2:4). Do you see that the disciple preaches the same thing as the Teacher?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
