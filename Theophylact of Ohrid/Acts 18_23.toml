[[commentary]]
quote='''
To visit the faithful and strengthen them was the constant rule of Paul, so that, if he found them growing weak, he might lighten their burden with pastoral instruction.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252018.html'
source_title='Commentary on Acts'
