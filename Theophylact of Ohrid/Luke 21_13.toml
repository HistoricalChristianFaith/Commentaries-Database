[[commentary]]
quote='''
The apostles were also brought before kings and governors: for example, Paul was brought before Festus, before Agrippa, before Caesar himself (Acts 25:6-23, 26:32). And this turned into the glory of testimony for them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
