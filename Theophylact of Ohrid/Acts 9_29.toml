[[commentary]]
quote='''
"He also spoke and disputed with the Hellenists," or with those Jews who spoke Greek. Because the other Hebrews, hardened, could not even look at him, or rather, they even resolved to kill him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25209.html'
source_title='Commentary on Acts'
