[[commentary]]
quote='''
Blessed Joseph, while still serving the Law, recognized Christ as God, which is why he dared to undertake this praiseworthy feat. He did not reason thus: here I am, a wealthy man, and I may lose my wealth if I ask for the body of One Who was condemned for claiming royal power for Himself, and I shall become hateful to the Jews — no, he did not deliberate on anything of the sort within himself, but, setting aside everything as less important, he asked for one thing alone — to commit the body of the Condemned One to burial.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'
