[[commentary]]
quote='''
The centurion, that is, the commander over a hundred soldiers, seeing that He died so sovereignly, was amazed and confessed. Notice how the order was reversed! The Jews put Him to death, a pagan confesses; the disciples scatter, the women remain.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'
