[[commentary]]
quote='''
The centurion, that is, the commander over a hundred soldiers, seeing that He died so sovereignly, was amazed and confessed. Notice how the order was reversed! The Jews put Him to death, a pagan confesses; the disciples scatter, the women remain.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
And when the centurion who stood over against him saw. He who commands a hundred soldiers is called a centurion. But seeing that He died with such power as the Lord, he wondered and confessed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
