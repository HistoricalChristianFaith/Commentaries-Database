[[commentary]]
quote='''
When they replied that they had none, and, at His command, having cast the net on the right side of the boat, received a catch, then the disciple whom Jesus loved says to Peter: "It is the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John'
