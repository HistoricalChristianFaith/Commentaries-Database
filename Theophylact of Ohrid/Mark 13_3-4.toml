[[commentary]]
quote='''
When the Lord was sitting on the Mount of Olives, the disciples came to Him asking: "When will this be?" — that is, when will what was foretold about Jerusalem be fulfilled? But He, before answering their question, strengthens their minds so that they would not be led astray. For at the beginning of the calamities in Judea, men appeared who called themselves teachers; therefore the Lord also says: "Take heed that no one deceive you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'
