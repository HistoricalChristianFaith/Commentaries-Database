[[commentary]]
quote='''
"And, behold, certain of the scribes said within themselves, This man blasphemeth. And Jesus knowing their thoughts said, Wherefore think ye evil in your hearts? For which is easier to say, Thy sins be forgiven thee; or to say, Arise, and walk?" By knowing their thoughts, Jesus shows that He is God. He rebukes them by saying, "You think that I am blaspheming by promising to forgive sins, which is a great thing, and that I resort to this because it is something which can not be verified. But by healing the body, I shall guarantee that the soul has been healed as well. By doing the lesser deed, though it appears to be more difficult, I shall also confirm the remission of sins, which is indeed something great even though it appears easier to you since it is not visible to the eye."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
