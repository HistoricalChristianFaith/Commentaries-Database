[[commentary]]
quote='''
But we, being of God and having departed from worldly lusts, become unpleasant to them. The one who lives chastely listens to us, and therefore knows God, and is ready to listen to us. About this Christ also says: "He who has ears to hear, let him hear" (Matt. 11:15), that is, He testifies that the one who has prepared himself to listen with obedience has ears.
Above, the apostle showed with whom one should associate and with whom one should not; now he applies, as it were, a seal to what was said: therefore we know who has the Spirit of truth and who has the spirit of error, of false prophecy. Then he begins speaking about love again.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520John%2FChapter%25204.html"
source_title = "Commentary on 1 John"
