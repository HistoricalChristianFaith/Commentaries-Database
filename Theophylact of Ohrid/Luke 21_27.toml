[[commentary]]
quote='''
"And then they will see the Son of Man." Who? All believers and unbelievers. "Coming on a cloud," that is, as God, with power and great glory. For then both He Himself and His cross will shine more brightly than the sun, and will be recognized by all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
It follows, And then shall they see the Son of man coming in the clouds. Both the believers and unbelievers shall see Him, for He Himself as well as His cross shall glisten brighter than the sun, and so shall be observed of all.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
