[[commentary]]
quote='''
The fruit of the works of sin is shame; the fruit of righteousness is sanctification, purity, innocence. The end of the former is death; the end of the latter is eternal life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25206.html'
source_title='Commentary on Romans'
