[[commentary]]
quote='''
The expression "My soul is sorrowful unto death" — some understand it thus: I grieve not because I must die, but because the Israelites — My own kinsmen — are crucifying Me, and for this they will be cast out from the Kingdom of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
And he saith unto them, My soul is exceeding sorrowful unto death.

But some have understood this, as if He had said, I am sorrowful, not because I am to die, but because the Jews, my countrymen, are about to crucify me, and by these means to be shut out from the kingdom of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
