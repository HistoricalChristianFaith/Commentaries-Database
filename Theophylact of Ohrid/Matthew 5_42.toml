[[commentary]]
quote='''
Give to him that asketh thee, and from him that would borrow of thee turn thou not away. Give to him whether he be friend, enemy, or infidel, and whether he asks for money or any other kind of help. The loan here means one without interest, the simple giving of the use of the money. For even under the law they would lend without charging interest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
