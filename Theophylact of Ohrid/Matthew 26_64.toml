[[commentary]]
quote='''
Nevertheless I say unto you, Hereafter shall ye see the Son of Man sitting on the right hand of power, and coming upon the clouds of heaven. He is speaking to them from the prophecy of Daniel who said, "I saw one coming as the Son of Man upon the clouds" (Daniel 7:13). For since they thought that He was deluded, as He appeared to them in humble form, He said, "You shall see Me then coming in power and seated with the Father." "Power" here means that of the Father, and the Son of Man will be coming not from earth but from heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
