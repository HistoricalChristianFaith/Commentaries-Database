[[commentary]]
quote='''
He asks them about Himself, having led them far from the Jews, so that they would have no one to fear in confessing the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
After taking His disciples afar from the Jews, He then asks them concerning Himself, that they might speak the truth without fear of the Jews; wherefore it is said, And Jesus entered, and his disciples, into the towns of Caesarea Philippi.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
