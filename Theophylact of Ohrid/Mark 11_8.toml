[[commentary]]
quote='''
Let us also strew the way of our life with branches which we cut from the trees, that is, imitate the saints, for these are holy trees, from which, he who imitates their virtues cuts down branches.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
