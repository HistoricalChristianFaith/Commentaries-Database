[[commentary]]
quote='''
"God of this people chose our fathers." Having reminded them of ancient events, he points out, just as Stephen did, the great benefactions of God that occurred at that time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
