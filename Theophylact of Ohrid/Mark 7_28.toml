[[commentary]]
quote='''
But since the woman answered wisely and with faith, she received what she asked for. The Jews, she says, have the bread, that is, all of You who came down from heaven, and Your benefactions, while I ask for a "crumb," that is, a small portion of Your benefactions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Commentary on Mark'
