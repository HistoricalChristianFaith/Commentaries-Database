[[commentary]]
quote='''
But since the woman answered wisely and with faith, she received what she asked for. The Jews, she says, have the bread, that is, all of You who came down from heaven, and Your benefactions, while I ask for a "crumb," that is, a small portion of Your benefactions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
As if she had said, The Jews have the whole of that bread which comes down from heaven, and Thy benefits also; I ask for the crumbs, that is, a small portion of the benefit.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
