[[commentary]]
quote='''
And now also the axe is laid unto the root of the trees. The axe means the judgement of Christ, and the trees stand for each one of us. Therefore he who has not believed, and thus is rooted only in himself, is now and henceforward being cut down and cast into gehenna. Therefore every tree, even though descended from Abraham, which bringeth not forth good fruit. He did not say, "which hath not brought forth," but "which bringeth not forth," for one must continually be bringing forth fruit. For if you gave alms yesterday but today you are greedy and grasping, you are not pleasing to God. Is hewn down and cast into the fire. The fire, that is, of gehenna.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
