[[commentary]]
quote='''
An important praise of theirs is also in the fact that, while he was in the metropolis, he was sustained at the expense of a small city. For by "need" he means necessary expenses, not pleasures and luxury.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Philippians%2FChapter%25204.html'
source_title='Commentary on Philippians'
