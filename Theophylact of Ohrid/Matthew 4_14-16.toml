[[commentary]]
quote='''
That it might be fulfilled which was spoken by Isaiah the prophet, saying, The land of Zabulon, and the land of Nephthalim, by the way of the sea, beyond Jordan, Galilee of the Gentiles; the people which sat in darkness saw a great light; and on them which sat in the region and shadow of death light hath dawned. "By the way of the sea" means "which is situated along the road of the sea." The "great light" is the Gospel, for the law, too, was a light, but a small one. "The shadow of death" is sin, for sin is the likeness and silhouette of death. Just as death overpowers the body, so too does sin overpower the soul. The light has dawned on us, for we were not seeking it, but it appeared to us as if it were pursuing us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
