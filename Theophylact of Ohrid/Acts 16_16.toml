[[commentary]]
quote='''
What spirit possessed the servant girl? They call it, after the place, the god Python. He wanted to lead the apostles into temptation. Otherwise, this is that woman, Pythia, of whom they say that she sat on the tripod of Apollo with her legs spread apart, and that an evil spirit, rising from the cavity beneath the tripod, entered into her and drove her into a frenzy; then she would go into a rage, foam at the mouth, and in such a state of frenzy utter incoherent words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252016.html'
source_title='Commentary on Acts'
