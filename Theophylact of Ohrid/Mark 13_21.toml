[[commentary]]
quote='''
The Lord finished His discourse about Jerusalem; next He begins to speak about the coming of the Antichrist. The word "then" should not be understood as meaning that when the above-mentioned things concerning Jerusalem begin to be fulfilled, then do not believe if someone says to you, "Behold, here is Christ"; but know that this is a particular characteristic of Scripture. Thus, the evangelist Matthew, having spoken of the Nativity of Christ, says, "In those days John comes" (Mt. 3:1). In what days? In those which immediately followed the Nativity of Christ? No, but indefinitely. So here too Christ says: then do not be deceived, that is, not at the time when Jerusalem will be devastated, but at the time of the coming of the Antichrist.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
After that the Lord had finished all that concerned Jerusalem, He now speaks of the coming of Antichrist, saying, Then if any man shall say to you, Lo, here is Christ; or, lo, he is there; believe him not. But when He says, then, think not that it means immediately after these things are fulfilled about Jerusalem; as Matthew also says after the birth of Christ, In those days came John the Baptist; (Matt. 3:1) does he mean immediately after the birth of Christ? No, but he speaks indefinitely and without precision. So also here, then may be taken to mean not when Jerusalem shall be made desolate, but about the time of the coming of Antichrist.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
