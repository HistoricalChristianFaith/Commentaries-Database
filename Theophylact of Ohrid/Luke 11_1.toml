[[commentary]]
quote='''
The disciple of Christ is zealous for the disciples of John and therefore desires to learn how to pray. The Savior did not reject the desire of the disciples, but teaches them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke'
