[[commentary]]
quote='''
The darkness was not in one place, but over all the earth. And if at that time it had been the period of the waning of the moon, then someone might still say that this was a natural eclipse. But now it was the fourteenth day of the month, when a natural eclipse is impossible.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
If this had been the time for an eclipse, some one might have said that this that happened was natural, but it was the fourteenth moon, when no eclipse can take place. There follows: And at the ninth hour Jesus cried with a loud voice, saying, Eloi, Eloi, lama sabachthani.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
