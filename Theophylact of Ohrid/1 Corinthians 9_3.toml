[[commentary]]
quote='''
To those wishing to know whence it is evident that I am an apostle, I will present you in my defense. For having proved that you were taught everything by me, I will strike down those who condemn me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25209.html'
source_title='Commentary on 1 Corinthians'
