[[commentary]]
quote='''
Remarkably, the Jews so neglected the law that they gave their daughters in marriage to Greeks and married Greek women.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252016.html'
source_title='Commentary on Acts'
