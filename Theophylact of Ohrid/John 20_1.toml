[[commentary]]
quote='''
Or thus: The Jews called the days of the week sabbath, and the first day, one of the sabbaths, which day is a type of the life to come; for that life will be one day not cut short by any night, since God is the sun there, a sun which never sets. On this day then our Lord rose again, with an incorruptible body, even as we in the life to come shall put on incorruption.

But how came they to the sepulchre, while the soldiers were guarding it? an easy question to answer. After our Lord's resurrection and the earthquake, and the appearance of the angel at the sepulchre, the guards withdrew, and told the Pharisees what had happened.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"The first day of the week" the Evangelist calls that day which we call the Lord's Day. For he calls the week of days "sabbath," and "the first day of the week" means the first day. In essence, every day is one. But one, taken many times and added together, makes up many. Thus, the first day is one; taken twice, it is the second; three times, the third; and so on. Such a day is an image of the future age, which is one day, neither interrupted by night nor having a midday. God is its Sun, never setting. Just as the Lord rose on this day, making His corruptible body incorruptible, so also shall we in the future age receive incorruption.
So, on the first day of the week "Mary Magdalene comes." Since the Sabbath had passed, and movement was no longer forbidden by the law, she sets out, wishing to find some consolation from the place of the Lord's burial.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John'
