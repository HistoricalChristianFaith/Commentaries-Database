[[commentary]]
quote='''
And if He died out of love and by His death justified us, how much more will He now save us from wrath, us whom He has already justified. He granted us the greater thing—justification: how will He not save us from wrath? And to those saved from wrath He will also grant blessings—according to His great love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25205.html'
source_title='Commentary on Romans'
