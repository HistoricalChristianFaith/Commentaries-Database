[[commentary]]
quote='''
"He was once useless to you." He knows that confession of sin extinguishes wrath; therefore he speaks thus.

"But now is useful both to you and to me; I am sending him back." Since he became pious and holy, and therefore, he says, he is useful to both of us. If he is useful to Paul, who requires such great zeal, then certainly to Philemon as well. At the same time, he also implies that if he is useful to me, then he ought to be sent back to me. That is, I hand him over to you; use him as you wish. By handing him over, he all the more appeases his anger.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Philemon%2FPhilemon.html'
source_title='Commentary on Philemon'
