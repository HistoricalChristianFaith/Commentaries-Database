[[commentary]]
quote='''
Furthermore, the great providence of God is also evident, because it says: "I have seen the oppression of My people… and have heard their groaning, and I have come down to deliver them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25207.html'
source_title='Commentary on Acts'
