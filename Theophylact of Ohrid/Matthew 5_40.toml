[[commentary]]
quote='''
And if any man will sue thee at the law, and take away thy tunic, let him have thy cloak also. If he drags you into court and harasses you, give him your cloak as well, and not only what he asks for. The "tunic" is what we would call the inner garment, and the "cloak" is the outer garment. But the names are sometimes used one for the other.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
