[[commentary]]
quote='''
He convinces the Thessalonians of this as well, to show them the greatest honor (1 Thess. 5:13). And just as those teachers made them partakers of the word of God, so they in turn ought to assist them as much as possible in material needs. Regarding this, he hints to them with the word "remember." Or he urges them to imitate them.

That is, more precisely, observe. And just as the pupils of a painter look at the original, so you too, always looking "at the outcome," that is, at the end of their life, at their way of life which had a good end, imitate their faith. For from faith comes a pure life. And if they had not believed in the future but had doubted, they would not have proven blameless in conduct. Again he heals their faintheartedness; or he speaks of faith in doctrines.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%252013.html'
source_title='Commentary on Hebrews'
