[[commentary]]
quote='''
So too after the sorrowful time of the Antichrist, the second coming of Christ will immediately follow, which for the righteous will be exactly like the harvest after winter, and for sinners — winter after the harvest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
As if He had said, As when the fig tree puts forth its leaves, summer follows at once, so also after the woes of Antichrist, at once, without an interval, shall be the coming of Christ, who will be to the just as summer after winter, but to sinners, winter after summer.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
