[[commentary]]
quote='''
Knowing how tyrannical is the pride of status, requiring a severe rebuke, He touches them to the quick by consigning them to the lot of Gentiles and infidels if they would be vainglorious. So He shames them by saying, "Other men are renowned as princes and rulers, and the lust for high position is a passion of the Gentiles; but My disciples are made honorable by their humility. So that he who would be great ought to serve the most inferior in rank; this is the mark of extreme humility. I Myself show this. I am the Prince and King of those who dwell in the heavens, Who humbled Myself to minister to you for your salvation, and I am your servant to the extent that I even give My life as a ransom for many, that is, for all." For "all" are "many."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
