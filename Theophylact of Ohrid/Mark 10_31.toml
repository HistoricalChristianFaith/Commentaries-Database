[[commentary]]
quote='''
For those who appeared last in the present age, on account of the sorrows and persecutions they endured, will be first in the age to come for their steadfast hope in God. The Pharisees, who were first, became last, and those who left everything and followed Christ became first.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But many that are first shall be last, and the last first. For the Pharisees who were first became the last; but those who left all and followed Christ were last in this world through tribulation and persecutions, but shall be first by the hope which is in God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
