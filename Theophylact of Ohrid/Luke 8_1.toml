[[commentary]]
quote='''
He who descended from heaven, for our example and imitation, gives us a lesson not to be slothful in teaching. Hence it is said, And it came to pass afterward that he went, &c.

Not teaching or preaching, but to be instructed by Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
