[[commentary]]
quote='''
Since the command to give oneself over to death would seem harsh and cruel, the Lord says that on the contrary it is most merciful; for whoever loses his soul, but for My sake — and not as a robber being executed or a suicide (for in that case the death would not be for My sake) — he, He says, will find his soul, while the one who thinks to save his soul will lose it, if during the time of torment he does not stand firm.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'
