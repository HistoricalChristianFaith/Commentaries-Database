[[commentary]]
quote='''
What kind and what kind? Both by the fact that He simply spoke and promised, and by the fact that He joined an oath to the promise. Since among people that which is confirmed with an oath is considered more trustworthy, God also joined one. "In which," instead of "from them" — from these two things the promise is most trustworthy, and "it is impossible for God to lie." Therefore, just as He swore for our sake, even though it is unworthy of Him to swear, so also understand that He "learned from the things which He suffered" (Heb. 5:8). For people also consider more trustworthy that which is known from experience.

That is, great consolation and encouragement. This is said not so much in relation to Abraham as in relation to us who have fled to Him, that is, who have placed our hope in Him. In what then do we have encouragement? In holding fast to "the hope set before us": that is, that we, on the basis of what was given to Abraham, would be convinced also regarding the promises concerning us, and would not doubt regarding the future and heavenly blessings for which we hope; on the contrary, that we would firmly and securely hold fast to this hope and not lose it. For the promise to Abraham is a promise to us as well, and preeminently to us who have believed in Christ, as was said above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25206.html'
source_title='Commentary on Hebrews'
