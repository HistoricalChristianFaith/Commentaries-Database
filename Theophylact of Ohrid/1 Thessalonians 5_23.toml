[[commentary]]
quote='''
To his instruction the apostle also joins prayer, so that from both sides they might have security. What does "in all fullness" mean? That is, in body and soul, as is evident further on. The Spirit, that is, the gift of the Holy Spirit, which we received through baptism. If we keep His lamp bright and unextinguished, then we shall enter the bridal chamber of the Bridegroom; and both soul and body will then be blameless, if the spirit within us shines brightly. Gregory of Nyssa says: since man is composed of every kind of soul — the physical soul, the sensory soul, and the rational soul — the apostle by the word "spirit" designated the rational part; by "soul" the sensory part; and by "body" the physical life within us. Thus, he prays that all of them and in all things be preserved blameless, in all things well-pleasing to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25205.html'
source_title='Commentary on 1 Thessalonians'
