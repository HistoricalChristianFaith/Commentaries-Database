[[commentary]]
quote='''
Note also the word "goes," for the death of Christ was only a departure, not a death. "It would have been better for that man not to have been born." This is said in regard to the punishment to which the betrayer will be subjected. For it is better not to be born at all than to be born for torment. Thus, in regard to his final destiny, it would have been better if Judas had not existed at all. For God created him for good works, but since he himself fell into such a terrible crime, it truly would have been better for him not to have been born at all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The word here used, goeth, shows that the death of Christ was not forced but voluntary.

For as respects the end for which he was designed, it would have been better for him to have been born, if he had not been the betrayer, for God created him for good works; but after he had fallen into such dreadful wickedness, it would have been better for him never to have been born.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
