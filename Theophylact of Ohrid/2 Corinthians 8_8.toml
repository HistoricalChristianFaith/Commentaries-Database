[[commentary]]
quote='''
That is, not compelling you and not doing you violence.

That is, I praise the Macedonians for the purpose of showing your love for the poor saints, through their zeal, as more praiseworthy and more illustrious.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%25208.html'
source_title='Commentary on 2 Corinthians'
