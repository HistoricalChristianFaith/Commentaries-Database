[[commentary]]
quote='''
Again he overthrows pride here, showing that the one who considers himself to be something is nothing, and by this very opinion proves his own nothingness, and deceives not anyone else, but himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Galatians%2FChapter%25206.html'
source_title='Commentary on Galatians'
