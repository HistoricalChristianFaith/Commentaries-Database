[[commentary]]
quote='''
Now when Jesus had heard that John had been handed over, He departed into Galilee; and leaving Nazareth, He came and dwelt in Capernaum, which is upon the sea coast, in the borders of Zabulon and Nephthalim. Jesus departs, teaching us not to throw ourselves into dangers. He departs into Galilee, which means "rolling down," for the Gentiles had rolled down into sin. He dwells in Capernaum, which means "house of comfort and consolation," because Christ came down from heaven to make the Gentiles the house of the Comforter. "Zabulon" means "nocturnal" and "Nephthalim," "a broadening." The life of the Gentiles, therefore, was both dark and broad, for they were walking not the narrow way, but the way leading to destruction (Mt. 7:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
