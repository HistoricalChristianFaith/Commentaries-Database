[[commentary]]
quote='''
Why did Paul "say with a loud voice"? So that the people would believe. That the lame man jumped up is proof of a complete healing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252014.html'
source_title='Commentary on Acts'
