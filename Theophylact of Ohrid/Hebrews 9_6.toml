[[commentary]]
quote='''
Though this was so, he says, the Jews did not participate in it, since the veil held them back. This was preserved for us, for whom it was a foreshadowing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25209.html'
source_title='Commentary on Hebrews'
