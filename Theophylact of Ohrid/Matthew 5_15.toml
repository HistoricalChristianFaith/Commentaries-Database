[[commentary]]
quote='''
Neither do men light a lamp, and put it under a bushel, but on a lamp stand; and it giveth light unto all that are in the house. Christ says, "It is I Who have kindled the light in you, but it is for you to labor zealously so that you do not extinguish that grace; in this way, the brightness of your life will shine upon others." He says, therefore:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
