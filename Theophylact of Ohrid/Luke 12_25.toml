[[commentary]]
quote='''
Tell me, pray, what profit do you gain from worrying? Do you add to your stature even the smallest measure? No, on the contrary, you even exhaust your body, for worry withers it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'
