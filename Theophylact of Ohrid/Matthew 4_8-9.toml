[[commentary]]
quote='''
Again, the devil taketh Him up onto an exceeding high mountain, and showeth Him all the kingdoms of the world, and the glory of them; and saith unto Him, All these things will I give Thee, if Thou wilt fall down and worship me. Some think that the high mountain is the passion of avarice into which the enemy strives to lead Jesus. But those who think this do not reason well. The devil appeared to Him visibly, for the Lord did not entertain any evil thoughts - far from it! The devil, therefore, visibly showed Him all the kingdoms, presenting them before His eyes in an image, and said, "All these things will I give Thee." In his pride, he considers the world to be his own. Even now the devil makes this offer to the greedy, with the result that those who worship him do possess these things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
