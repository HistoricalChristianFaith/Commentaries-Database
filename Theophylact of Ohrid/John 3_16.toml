[[commentary]]
quote='''
(in loc.) As He said above, that the Son of man came down from heaven, not meaning that His flesh did come down from heaven, on account of the unity of person in Christ, attributing to man what belonged to God: so now conversely what belongs to man, he assigns to God the Word. The Son of God was impassible; but being one in respect of person with man, who was passible, the Son is said to be given up to death; inasmuch as He truly suffered, not in His own nature, but in His own flesh. From this death follows an exceeding great and incomprehensible benefit: viz. that whosoever believeth in Him should not perish, but have everlasting life. The Old Testament promised to those who obeyed it, length of days: the Gospel promises life eternal, and imperishable.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The love of God for the world is great and extended so far that He gave not an angel, not a prophet, but His Son, and moreover His Only-Begotten (1 John 4:9). If He had given even an angel, that deed would not have been small. Why? Because an angel is His faithful and obedient servant, while we are enemies and apostates. But now, when He gave His Son, what surpassing love He showed! Again, if He had many sons and gave one, even that would have been a very great thing. But now He gave His Only-Begotten. Can His goodness then be worthily praised?
The Arians say that the Son is called Only-begotten because He alone was produced and created by God, while everything else was then created by Him. The answer to them is simple. If He had been called Only-begotten without the word "Son," then your subtle invention would have had a basis. But now, since He is called both Only-begotten and Son, the word "Only-begotten" cannot be understood as you understand it, but rather that He alone was begotten of the Father.
Note, I ask you, that just as above He said that the Son of Man came down from heaven, not meaning that His flesh did come down from heaven, but He attributed what belongs to God to the man on account of the unity of the Person and the unity of the Hypostasis, so here again He attributes what belongs to the man to God the Word. "God gave," He says, "His Son to death." Although God remained impassible, yet since by Hypostasis One and the Same was both God the Word and Man subject to suffering, it is said that the Son is given over to death, who indeed also suffered in His own flesh.
What is the benefit of the Son being given? It is great and inconceivable for man — that everyone who believes in Him should receive two blessings: one, that he should not perish; the other, that he should have life, and moreover eternal life. The Old Testament promised long life to those who pleased God in it, but the Gospel rewards such people with life not temporal, but eternal and indestructible.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John'
