[[commentary]]
quote='''
Those who stumble against the Rock of Christ and take offence at Him will not only be crushed at the second coming, but already here in this life they have been scattered like powder by Christ. They have been scattered over all the earth, as we now see the pitiable Jews to be. Understand that he who is "crushed to powder to be scattered" is dispersed abroad and scattered in diaspora.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
