[[commentary]]
quote='''
Jesus said unto him, It is written again, Thou shalt not tempt the Lord thy God. Christ calmly repels the devil, teaching us to defeat the demons with meekness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
