[[commentary]]
quote='''
"For you have tasted," that is, through the practice of the sacred evangelical commandments you have tangibly come to know how good this teaching is. And experience in the matter of knowledge is stronger than any word, just as what is experienced in practice is more pleasant than any word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25202.html'
source_title='Commentary on 1 Peter'
