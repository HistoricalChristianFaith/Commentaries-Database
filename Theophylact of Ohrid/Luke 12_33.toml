[[commentary]]
quote='''
So then, do not think that if you do not embrace poverty, there will be no Provider for you, but sell your possessions, give alms, and make your treasure inexhaustible.
Then He persuades us with irrefutable reasoning as well. Here, He says, the moth consumes, but in heaven it does not. Therefore, is it not madness to store up treasure in a place where it is damaged? Then, since the moth does not consume gold, He added: "where no thief approaches." For if the moth does not consume gold, the thief steals it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
As if He said, "Here the moth corrupts, but there is no corruption in heaven." Then because there are some things which the moth does not corrupt, He goes on to speak of the thief. For gold the moth corrupts not, but the thief takes away.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
