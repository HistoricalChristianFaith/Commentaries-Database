[[commentary]]
quote='''
He did not say "I am being offered as a sacrifice," but something stronger. For in a sacrifice, not everything is offered to God, whereas a drink offering of wine was offered in its entirety.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Timothy%2FChapter%25204.html'
source_title='Commentary on 2 Timothy'
