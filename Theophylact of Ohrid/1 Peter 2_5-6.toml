[[commentary]]
quote='''
Draw closer to one another through the union of love, and join together into the fullness of a spiritual house, caring nothing for the contempt of men, because the cornerstone — Christ — was also rejected by them. Having attained unity of mind among yourselves, and having built yourselves into a spiritual house, and having acquired a holy priesthood, offer spiritual sacrifices. And do not think that you can offer unblemished sacrifices to God when you do not preserve among yourselves the bond of love. "Lift up holy hands," it is said, "without wrath and doubting" (1 Tim. 2:8); how then shall one who desires to be united with God through prayer achieve this, when he himself tears himself away from his brother through wrath and evil doubts?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25202.html'
source_title='Commentary on 1 Peter'
