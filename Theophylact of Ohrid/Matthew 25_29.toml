[[commentary]]
quote='''
Do you see that he who applies the greater diligence draws to himself the greater gift? To him who has the greater diligence, more grace will be given and in abundance. But from him who is not diligent, even the gift which he thinks he has will be taken away. For he who is not diligent and does not work and trade with what he has received, does not have the gift, but only appears to have it. For he has blotted it out by his neglect.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
