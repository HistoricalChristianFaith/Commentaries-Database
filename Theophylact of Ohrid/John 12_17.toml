[[commentary]]
quote='''
The people, having seen the miracle over Lazarus, bore witness and proclaimed the power of Jesus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John'
