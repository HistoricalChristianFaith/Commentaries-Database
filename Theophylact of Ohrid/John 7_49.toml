[[commentary]]
quote='''
The people they call accursed for having believed, while they themselves, both for their unbelief and for hindering others from believing, are worthy of countless curses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John'
