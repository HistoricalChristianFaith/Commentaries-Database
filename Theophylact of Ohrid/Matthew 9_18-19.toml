[[commentary]]
quote='''
"While He spake these things unto them, behold, there came a certain ruler, and fell prostrate before Him, saying, My daughter is even now dead: but come and lay Thy hand upon her, and she shall live. And Jesus arose, and followed him, and so did His disciples." It is apparent that this man had faith, although not as great as that of the centurion (Mt. 8:8). For this man beseeches Jesus, not to speak the word only, but to come and lay His hand upon his daughter. Although Luke says that she had not yet died (Lk. 8:42), the ruler says here that his daughter has already died, either because he thought he had left her as she was breathing her last breath, or to exaggerate the calamity so as to move Christ to have mercy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
