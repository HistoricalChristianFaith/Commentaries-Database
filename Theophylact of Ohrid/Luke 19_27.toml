[[commentary]]
quote='''
"But as for my enemies – He says – those who did not want me to reign over them, bring them here and slay them before me," that is, the Jews, whom He will deliver to destruction, sending them into eternal fire. Yes, the wretches were slain here too, that is, in this world, by the Roman armies, and they are still kept and will be kept for slaughter there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
He adds of His adversaries, But those mine enemies who would not that I should reign over them, bring them hither, and slay them before me. Whom he will deliver to death, casting them into the outer fire. But even in this world they were most miserably slain by the Roman army.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
