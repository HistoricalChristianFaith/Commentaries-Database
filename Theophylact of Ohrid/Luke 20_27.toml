[[commentary]]
quote='''
The Sadducees, basing their speculations on a weak foundation, did not believe in the teaching of the resurrection. Assuming that after the resurrection there would be a bodily life, they naturally fell into error. Therefore, mocking the teaching of the resurrection as absurd, they invented the present senseless story.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Now the Sadducees resting upon a weak foundation, did not believe in the doctrine of the resurrection. For imagining the future life in the resurrection to be carnal, they were justly misled, and hence reviling the doctrine of the resurrection as a thing impossible they invent the story, There were seven brothers, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
