[[commentary]]
quote='''
Therefore Thomas also says: "Lord! we do not know where You are going; and how can we know the way?" Thomas says this out of great fear, and not out of a desire to follow the Lord, as Peter did.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
