[[commentary]]
quote='''
"There will be," He says, "signs in the sun and moon and stars." For with the transformation of creation, it is natural for there to be a new order in the elements as well. Nations will have "despondency," that is, grief mixed with perplexity in all things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Or else, When the higher world shall be changed, then also the lower elements shall suffer loss; whence it follows, And on the earth distress of nations, &c. As if He said, the sea shall roar terribly, and its shores shall be shaken with the tempest, so that of the people and nations of the earth there shall be distress, that is, a universal misery, so that they shall pine away from fear and expectation of the evils which are coming upon the world.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
