[[commentary]]
quote='''
And Solomon begat Rehoboam; and Rehoboam begat Abia; and Abia begat Asa; and Asa begat Jehoshaphat; and Jehoshaphat begat Joram; and Joram begat Ahaziah; and Ahaziah begat Jotham; and Jotham begat Ahaz; and Ahaz begat Hezekiah; and Hezekiah begat Manasseh; and Manasseh begat Amon; and Amon begat Josiah; and Josiah begat Jeconiah and his brethren, about the time of the deportation to Babylon. The "deportation to Babylon" means the captivity which they later endured when they were all led away into Babylon. For the Babylonians campaigned against them on another occasion, causing less affliction. But on this occasion, the Babylonians carried them all away from their homeland.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
