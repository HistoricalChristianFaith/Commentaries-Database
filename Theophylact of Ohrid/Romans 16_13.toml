[[commentary]]
quote='''
A double good: both the son is blameless and the mother is irreproachable. For he would certainly not have said, "his mother and mine," if he did not attribute great virtue to this woman.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252016.html'
source_title='Commentary on Romans'
