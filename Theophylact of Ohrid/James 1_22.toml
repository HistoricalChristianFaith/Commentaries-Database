[[commentary]]
quote='''
"Deceiving yourselves" means deluding yourselves, counting your own salvation as nothing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520James%2FChapter%25201.html'
source_title='Commentary on James'
