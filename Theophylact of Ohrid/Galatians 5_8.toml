[[commentary]]
quote='''
That is, this attention to deceivers is not from Christ; for He did not call you to that end, that you should give heed to those who incline toward Judaism.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Galatians%2FChapter%25205.html'
source_title='Commentary on Galatians'
