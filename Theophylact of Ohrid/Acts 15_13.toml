[[commentary]]
quote='''
This James was a bishop, which is why he also speaks after. Pay attention also to his wisdom: he confirms his word both with new testimony and with Old Testament prophecies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
