[[commentary]]
quote='''
If one must not repay evil for evil, then how much more so — evil for good, or to begin doing evil and harming one who has done no harm at all. It is not enough not to repay evil for evil; one must, he says, repay with good the one who has done evil. This is exactly what the apostle teaches when he says: "seek what is good." That is, earnestly strive to do good, both toward one another, that is, toward the faithful, and toward all, that is, toward the unfaithful as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25205.html'
source_title='Commentary on 1 Thessalonians'
