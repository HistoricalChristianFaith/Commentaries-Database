[[commentary]]
quote='''
When the Jews saw that the Lord was doing this with great authority and saying "do not make My Father's house a marketplace," they said: "Convince us by some miracle that You are the Son of God and that You were sent by Him. For how is it evident that the Lord of this house is Your Father?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John'

[[commentary]]
quote='''
The Jews seeing Jesus thus acting with power, and having heard Him say, Make not My Father's house an house of merchandize, ask of Him a sign; Then answered the Jews and said unto Him, What sign shewest Thou unto us, seeing that Thou doest these things?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
