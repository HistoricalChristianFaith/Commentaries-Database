[[commentary]]
quote='''
But they would not have allowed this, if the Divine power had not been upon them, to compel them, especially, as they were country people and farmers, and yet allowed them to take away the colt.

Or else, those who prevent them are the devils, who were weaker than the Apostles.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
