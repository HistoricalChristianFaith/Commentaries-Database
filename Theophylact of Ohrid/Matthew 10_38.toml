[[commentary]]
quote='''
"And he that taketh not his cross, and followeth after Me, is not worthy of Me." Whoever, He says, does not renounce this present life and give himself over to shameful death, for this is what the cross signified to the ancients, is not worthy of Me. But since there are many who are crucified, such as robbers and thieves, He added, "and followeth after Me," that is, live according to My laws.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
