[[commentary]]
quote='''
When the servant says that the master is hard, he condemns himself. For the servant ought all the more to have been diligent knowing that his master was hard and severe. For if the master required this of others, so too would the master require this of him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
