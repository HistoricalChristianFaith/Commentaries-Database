[[commentary]]
quote='''
Before the coming of the Savior, Moses was read every Sabbath in the synagogues alone, but after His coming the Law of Moses was read without hindrance in the churches of Christ as well. And this is evident from the fact that it is read constantly even to this day. Moreover, if the Old Testament Scripture were not read in the churches, the apostle would not have written so injudiciously in the Epistle to the Galatians: "Tell me, you who desire to be under the law: do you not listen to the law?" (Gal. 4:21).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
