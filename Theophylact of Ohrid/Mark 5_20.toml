[[commentary]]
quote='''
Therefore he began to preach, and all marveled. But see how the Savior is free from boasting! He did not say, "Tell what I have done for you," but, "what the Lord has done for you." So you also, when you do something good, ascribe what was done not to yourself, but to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'
