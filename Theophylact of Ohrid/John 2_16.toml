[[commentary]]
quote='''
Therefore here He said with restraint: "Do not make My Father's house a house of trade." For the miracles were only just beginning, and He did not yet have that boldness which the miracles would give. But there, that is in Matthew, He says: "Do not make it a den of robbers." He openly called them robbers, as people profiting by unjust means. For whoever prices a thing of little worth dearly and seizes the opportunity to extract gain from the poor and widows (as those who buy up necessities and then resell them typically do), what else does he do but rob, extracting gain from the misfortune of his neighbors? Therefore He did not say "the house of God," but "the house of My Father," showing that He, as the Son, has authority over all that belongs to the Father.
The money changers are those who sell small coins or nummi. Like those merchants of old, many of the chief priests also sin when they sell "oxen" in the church, not giving honor to those who excel in the teaching word, but giving it to those who wish to do evil; when they sell "sheep" — the simple and common people; "doves" — spiritual gifts; and when they elevate to the highest rank those who give more. Such persons the Lord "drives out" of the sanctuary, finding them by His judgment unworthy of the chief priesthood. Likewise, if someone sells large and small coin, that is, opinion and word, and being a teacher but not foreseeing the benefit, does not proclaim the evangelical word, the Lord "overturns" his "table" as well, that is, the rank of teacher, and the teaching which he out of malice withholds, not giving it to all; meanwhile the Lord Jesus removes such a one from authority and seats another, a worthy one, at the teaching table.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John'
