[[commentary]]
quote='''
"Grace," because we are saved freely, contributing nothing of our own. "Peace," because, having offended the Master, we were numbered among His enemies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25201.html'
source_title='Commentary on 1 Peter'
