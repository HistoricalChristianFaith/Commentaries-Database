[[commentary]]
quote='''
He sends two of His disciples, Peter and John — as Luke says — to an unknown man, showing them through this that He could have avoided suffering, had He so willed. For He who disposed an unknown man to receive Him, what could He not have produced in others? Meanwhile He gives the disciples a sign by which to find the house they sought, namely: He commands them to follow a man carrying a pitcher of water. But this can also be explained in a figurative sense. The one who carries a "pitcher of water" is one who has been baptized. He goes "into a house" befitting his rational (spiritual) state. For the one who bears baptism enters into rest, according to the word of life, and reposes in this state as in a house.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
He sends two of His disciples, that is, Peter and John, as Luke says, to a man unknown to Him, implying by this that He might, if He had pleased, have avoided His Passion. For what could not He work in other men, who influenced the mind of a person unknown to Him, so that he received them? He also gives them a sign how they were to know the house, when He adds, And there shall meet you a man bearing a pitcher of water.

He who is baptized carries the pitcher of water, and he who bears baptism upon him comes to his rest, if he lives according to his reason; and he obtains rest, as being in the house. Wherefore it is added, Follow him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
