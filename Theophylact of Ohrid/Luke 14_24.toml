[[commentary]]
quote='''
This supper is prepared daily, and we are all called to the Kingdom which God prepared for people even before the creation of the world (Matt. 25:34). But we are not deemed worthy of it—some because of curiosity for wisdom, others because of love for material things, and still others because of love for the flesh. And the love of God for mankind grants this Kingdom to other sinners who are blind in their rational eyes, who do not understand what the will of God is, or even if they understand, are lame and immobile toward fulfilling it, and poor, as having been deprived of heavenly glory, and maimed, as not manifesting in themselves a blameless life. To these sinners, wandering along the wide and broad paths of sin, the Heavenly Father sends an invitation to the supper through His Son, who became a servant in the flesh, who came to call not the righteous but sinners (Matt. 9:13), and He abundantly feasts them in place of those who are wise and wealthy and who indulge the flesh. Upon many He sends diseases and calamities, and through this involuntarily compels them to renounce such a life, by judgments that He alone knows, and brings them to His supper, turning the infliction of calamities into a motivation for them. There are many examples of this.
In a simpler sense, the parable teaches us to give to the poor and maimed rather than to the rich. What the Lord was urging a little earlier, to that very thing, it seems, He also spoke this parable, affirming all the more that one ought to feast the poor. We are taught by this parable yet another thing as well, namely: that we ought to be so zealous and generous in receiving the brethren (the least), that we should persuade them to partake of our goods even when they do not wish to. In this there is a powerful admonition for teachers, that they should instruct their disciples in what is proper even when they do not wish it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
