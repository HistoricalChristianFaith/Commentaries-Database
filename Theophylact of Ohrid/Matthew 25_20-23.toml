[[commentary]]
quote='''
Both of those who had worked and traded with the talents given to them are praised equally by the master, each one hearing, "Well done, thou good and faithful servant." "Good" we understand here to mean "loving all mankind" and "without spite," he who imparts his own goodness to his neighbors. Those who have shown themselves to be faithful over a few things are made rulers over many things. But even if we are deemed worthy of gifts in this life, that is nothing in comparison to the good things that are to come. "The joy of the Lord" is the unending gladness which God has, rejoicing in His works, as David says (Ps. 103:31). With such a joy do the saints also rejoice in their works, just as the sinners grieve over their own deeds and regret them. The saints have the Lord as their wealth and they rejoice in Him. See that he who received the five talents and he who received two were deemed worthy of the same good things. Though a man may have received but a few things, if he is a good steward even of his small gift, he will enjoy the same honor as he who was deemed worthy of, and accomplished, great things. For each one, according to what he has received, is seen to be perfect to the degree that he accomplishes what he has been given to do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
