[[commentary]]
quote='''
Pay your other debts, he says. But love—never wish to pay it off; rather, always keep it as a permanent debt. If you always show your neighbor the disposition of one who loves, do not imagine that therefore tomorrow you may neglect him; on the contrary, always consider that the debt of loving your neighbor rests upon you.

He who loves his neighbor fulfills the law. Therefore everyone should love his neighbor, because he receives from him and from love toward him so many benefits that he fulfills the whole law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252013.html'
source_title='Commentary on Romans'
