[[commentary]]
quote='''
Furthermore, "you are not living according to the flesh," that is, you do not serve the fleshly life, but the spiritual. Why then did he not say: you do not live in sins? So that you would know that Christ not only extinguished the tyranny of sin, but also made the flesh lighter and more spiritual. Just as iron, from prolonged contact with fire, itself becomes fire, so too the flesh of those who have received the Spirit through baptism entirely becomes spiritual.
"If so be" is used here not to denote doubt, but with full certainty, in place of: since (έπειδήπερ) the Spirit of God is in you, you are in the Spirit.
He did not say: "if you do not have the Spirit of Christ," for such an expression is very unpleasant, but speaks indefinitely: "if anyone does not have the Spirit," he is not Christ's. And rightly so. For the Spirit is a seal. Therefore whoever does not have the seal does not belong to the Lord who is marked by this seal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25208.html'
source_title='Commentary on Romans'
