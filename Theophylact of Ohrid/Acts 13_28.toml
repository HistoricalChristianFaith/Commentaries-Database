[[commentary]]
quote='''
"Finding no cause of death in Him, they asked Pilate to kill Him." He says that the death penalty was desired by them. He brings Pilate onto the scene so that, on the one hand, the suffering might be made widely known, and on the other, they might subject themselves to a greater accusation as having handed Christ over to a foreign man. And he did not say "demanded," but "asked." They requested, he says, permission for the killing, although Pilate was, as it were, unwilling. Peter speaks more clearly about this: "When he was resolved to let Him go" (Acts 3:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
