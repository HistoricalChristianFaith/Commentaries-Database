[[commentary]]
quote='''
Washing us through baptism from the impurity of former sins, He no longer remembers them, as they have already been washed away.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25208.html'
source_title='Commentary on Hebrews'
