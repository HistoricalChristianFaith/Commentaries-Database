[[commentary]]
quote='''
He said "that you may eat and drink" not because there will be food there or because His Kingdom is a sensory one. For by His answer to the Sadducees He Himself taught that the life there is angelic (Luke 20:36); and Paul teaches that the Kingdom of God is not "food and drink" (Rom. 14:17). Therefore, hearing the words "that you may eat and drink at My table," let no one be scandalized, but let him understand that they were spoken in reference to those who enjoy honor from the kings of this world. For those who share the king's table are considered to have preeminence over all. So also concerning the apostles the Lord says that He will prefer them above all.
Likewise, when you hear of sitting "on thrones," understand not thrones, but glory and honor. For of those created and born, no one will sit there. To sit is fitting for the One Holy Trinity alone, the Uncreated God and King of all, while the creature, as a servant, must stand — and even this we speak of sitting and standing in a bodily sense. "To judge," that is, to condemn those from the "twelve tribes" who will not believe. For the apostles, who are themselves Israelites yet believed, serve as no small condemnation of the Israelites who did not believe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'
