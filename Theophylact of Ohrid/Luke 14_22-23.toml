[[commentary]]
quote='''
But after the Israelites entered, that is, the chosen ones among them, whom God predestined to His glory (Rom. 8:29–30), such as Peter, the sons of Zebedee, and the rest of the multitude who believed — after that, the grace of God was poured out also upon the Gentiles. For by those found on the "roads" and "lanes" one can understand the Gentiles. The Israelites were inside the city, since they received the law and inherited a civic way of life. But the Gentiles, being strangers to the covenants and alienated from the legislation of Christ, and not being fellow citizens with the saints (Col. 1:21, 12; Eph. 2:12, 3), led their lives not on one road, but on many "roads" of lawlessness and ignorance, and in "hedges," that is, in sins; for sin is a great hedge and partition wall, separating us from God (Isa. 59:2). By the word "on the roads" is hinted the brutish life of the Gentiles, divided into many opinions, and by the word "in the lanes" is indicated their life in sins.
He does not simply command to call those (who are along the roads and by the hedges), but to compel them, even though faith is a matter of each person's free will. He said "compel" so that we might understand that the conversion of the Gentiles, who were in deep ignorance, is a sign of the great power of God. For if the power of the One being preached were small and the truth of the teaching were not great, how could people who served idols and performed shameful deeds have been persuaded, suddenly coming to know the true God and to lead a spiritual life? Wishing to point out the wondrousness of this conversion, he called it compulsion. As if someone were to say: the Gentiles did not even wish to leave their idols and sensual pleasures, yet by the truth of the preaching they were compelled to leave them. Or alternatively: the power of signs constituted a great compulsion to turn to faith in Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
