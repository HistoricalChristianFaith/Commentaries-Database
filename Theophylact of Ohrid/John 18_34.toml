[[commentary]]
quote='''
He intimates here that Pilate was judging blindly and indiscreetly: If thou sayest this thing of thyself, He says, bring forward proofs of My rebellion; if thou hast heard it from others, make regular enquiry into it.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
And Christ asks him whether he says this of himself, or from others? Not because He does not know, but because He wishes to expose the evil intent of the Jews in such a way that even Pilate would condemn them.
And in another way. The Lord asks Pilate whether he asks this of himself or at the suggestion of others, and thereby exposes him of foolishness and unjust judgment. He speaks to Pilate as if to say: "If you say this of yourself, then point out the signs of My insurrection; but if others have reported this to you, then conduct a thorough investigation."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John'
