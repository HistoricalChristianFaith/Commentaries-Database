[[commentary]]
quote='''
And consider this additional foolishness of Herod's, that he promised to give whatever she asked. If she had asked for your own head, would you have given it to her?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
