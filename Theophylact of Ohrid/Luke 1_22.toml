[[commentary]]
quote='''
Zechariah made signs to the people, who were probably asking about the reason for his silence; but since he could not speak, he explained it through signs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But Zacharias beckoned to the people, who perhaps enquired the cause of his silence, which, as he was not able to speak, he signified to them by nodding. Hence it follows, And he beckoned to them, and remained speechless.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Catena Aurea by Aquinas'
