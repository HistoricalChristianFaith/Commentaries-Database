[[commentary]]
quote='''
For amen, I say unto you. The "amen" is an assurance, meaning, "Yes, truly I say unto you." Till heaven and earth pass away, one jot or one tittle shall in no wise pass from the law, till all be accomplished. He indicates here that the world passes away and undergoes a change in form. He is saying, therefore, that while the universe subsists, not the least letter of the law will pass away. Some say that the "jot" [i.e. the Greek letter iota] and the "tittle" [i.e. accent mark] signify the ten commandments of the law; others say that they indicate the Cross, for the iota is the upright beam of the Cross, and the accent, the transverse beam. Christ is saying, therefore, that everything that was spoken concerning the Cross will be fulfilled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
