[[commentary]]
quote='''
And upon the coming of the Antichrist, all creation will be changed: the sun and moon will grow dark from the superabundance of Christ's light.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But after the coming of Antichrist, the frame of the world shall be altered and changed, for the stars shall be obscured on account of the abundance of the brightness of Christ. Wherefore it goes on: But in those days, after that tribulation, the sun shall be darkened, and the moon shall not give her light; and the stars of heaven shall fall.

That is, the Angelic virtues shall be astonished, seeing that such great things are done, and that their fellow-servants are judged.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
