[[commentary]]
quote='''
The Pharisees prepared a net which, in their opinion, the Lord would find difficult to escape, but in this net "their foot was caught" (Ps. 9:16). See what cunning! If the Lord says that tribute ought to be given to Caesar, then they will accuse Him before the people as one who was enslaving the people who are "Abraham's seed" and never served anyone (Jn. 8:33). If He forbids giving tribute, then they will lead Him to the governor as a seditious person.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
They laid snares for our Lord, but got their own feet entangled in them. Listen to their cunning, And they asked Him, saying, Master, we know that thou sayest and teachest rightly.

Therefore it was intended, in case He said they ought to give tribute to Cæsar, that He should be accused by the people, as placing the nation under the yoke of slavery, but if He forbade them to pay the tax, that they should denounce Him as a stirrer up of divisions to the governor.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
