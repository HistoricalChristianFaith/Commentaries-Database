[[commentary]]
quote='''
Jesus, having approached, went with them. For, having a body already spiritual and most Divine, He found no hindrance in distance of places to being with those with whom He wished.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'
