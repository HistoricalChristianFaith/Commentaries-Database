[[commentary]]
quote='''
"Therefore whosoever heareth these sayings of Mine, and doeth them, I will liken him unto a wise man, who built his house upon a rock: and the rain descended, and the rivers came, and the winds blew, and beat upon that house; and it fell not: for it was founded upon a rock." No virtue can be accomplished without God, which is why Jesus said, "I will liken him unto a wise man." The rock is Christ and the house is the soul. Therefore nothing will shake the man who builds his soul upon the doing of Christ's commandments. Neither the rain, which is the devil who fell from heaven, nor the rivers, which are mean and harmful men filled to overflowing by such a rain, nor the winds, which are evil spirits, nor, in short, can any temptations cast down such a man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
