[[commentary]]
quote='''
He constantly introduces the subject of love, and by these many discourses shows us that the commandment of love is more important than the others and requires great diligence. He also presents the greatest proof of His love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John'
