[[commentary]]
quote='''
The others wept, but Paul comforted them: and he who did not fear his own trials grieved on account of their tears.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252021.html'
source_title='Commentary on Acts'
