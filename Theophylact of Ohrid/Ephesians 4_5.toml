[[commentary]]
quote='''
For it is not so that you have a higher Lord, and he a lower one; that you are saved by faith, and he by works; that baptism sets you free, but not him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Ephesians%2FChapter%25204.html'
source_title='Commentary on Ephesians'
