[[commentary]]
quote='''
Having said that a person's life does not become longer from an abundance of possessions, the Lord also brings a parable in confirmation of His words. And see how He depicts for us the insatiable thoughts of the foolish rich man. God was carrying out His intention and showed special compassion. For not in one small place, but in the entire "field of the rich man there was a good harvest"; yet he was so barren in mercy that, before he even received, he was already keeping it for himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Having said that the life of man is not extended by abundance of wealth, he adds a parable to induce belief in this, as it follows, And he spake a parable unto them, saying, The ground of a certain rich man brought forth plentifully.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
