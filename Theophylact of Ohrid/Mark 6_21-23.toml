[[commentary]]
quote='''
The feast goes merrily: Satan dances in the maiden, and an oath is given—lawless and godless, and above all senseless.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For during the banquet, Satan danced in the person of the damsel, and the wicked oath is completed. For it goes on, And he sware unto her, Whatsoever thou shalt ask of me, I will give it thee, unto the half of my kingdom.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
