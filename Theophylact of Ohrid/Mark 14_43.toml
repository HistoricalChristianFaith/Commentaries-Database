[[commentary]]
quote='''
Not without reason was it added: "one of the twelve," but in condemnation of the betrayer, because he, being in the first rank of the apostles, plotted against his own Master.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
This is not put without reason, but to the greater conviction of the traitor, since though he was of the chief company amongst the disciples, he turned himself to furious enmity against our Lord. And with him a great multitude with swords and staves from the Chief Priests and the Scribes and the elders.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
