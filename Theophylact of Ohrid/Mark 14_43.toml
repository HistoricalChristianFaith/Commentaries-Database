[[commentary]]
quote='''
Not without reason was it added: "one of the twelve," but in condemnation of the betrayer, because he, being in the first rank of the apostles, plotted against his own Master.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
