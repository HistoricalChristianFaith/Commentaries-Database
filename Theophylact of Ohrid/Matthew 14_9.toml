[[commentary]]
quote='''
He was sorry because of John's virtue, for even the enemy in war marvels at valor displayed by his adversary. But because of his oaths, he gives the inhuman gift. Let us learn from this that it is sometimes better to perjure oneself than to do something ungodly because of an oath.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
