[[commentary]]
quote='''
"And Jesus said unto the centurion, Go thy way; and as thou hast believed, so be it done unto thee. And his servant was healed in the selfsame hour. And when the centurion returned to his house, at the same hour, he found his servant well." By healing the servant by His word alone, Jesus showed that He also spoke the truth when He said that the Jews would be cast out from the kingdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
