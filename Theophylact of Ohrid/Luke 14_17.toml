[[commentary]]
quote='''
Who is this servant? The Son of God, who took the form of a servant, having become Man (Phil. 2:7), and of whom as Man it is said that He was sent. Pay attention to the fact that it does not simply say "a servant," but "that" servant, who in the proper sense pleased God according to His humanity and served well. For not only as the Son and God who is well-pleasing to the Father, but also as the Man who alone and by Himself sinlessly submitted to all the decrees and commandments of the Father and "fulfilled all righteousness" (Matt. 3:15), is it said of Him that He served God and the Father. Which is why He alone can properly be called the servant of God.
He was sent "when the time of supper came," that is, at a definite and fitting time. For no other time was more fitting for our salvation than the time of the reign of Augustus Caesar, when evil had reached its very peak and needed to fall. Just as physicians leave a festering and foul disease alone until it has drained all the bad fluid, and only then apply remedies, so it was necessary for sin to manifest all the forms proper to it, and then for the great Physician to apply the remedy. Therefore the Lord allowed the devil to fill up the measure of evil, and then, having become incarnate, healed every form of evil through His perfectly holy life. He sent "at the hour," that is, at the present and fitting time, as David also says: "Gird Your sword upon Your thigh, and Your beauty" (Ps. 45:3). The sword, without doubt, is the Word of God. The thigh signifies the birth in the flesh, which was accomplished at the ripeness of the fruit, that is, at the proper time.
He was sent "to tell those who were bidden." Who are these bidden ones? Perhaps all people, since God called everyone to the knowledge of Himself, whether through the good ordering of visible things or through the natural law; or perhaps especially the Israelites, who were called through the Law and the prophets. To them, to the lost sheep of the house of Israel, the Lord was especially sent (Matt. 15:24).
Go, for all is already prepared. For the Lord proclaimed to all: The Kingdom of Heaven is at hand (Matt. 4:17), and it is within you (Luke 17:21).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
