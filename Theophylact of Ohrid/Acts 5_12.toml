[[commentary]]
quote='''
From the time people began to fear them, Peter and the rest of the apostles performed more miracles. The apostles continued no longer in a house, but in the temple.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25205.html'
source_title='Commentary on Acts'
