[[commentary]]
quote='''
The apostles answer without harshness, both because they were teachers and because they were not angry at the Jews, but pitied them and wished to free them from delusion and pride.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25205.html'
source_title='Commentary on Acts'
