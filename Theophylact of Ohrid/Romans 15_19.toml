[[commentary]]
quote='''
And there is a difference between a sign and a wonder. A sign is something that is accomplished in accordance with nature, only in an extraordinary manner. Such was the sudden healing of Peter's mother-in-law, who was sick with a fever. Here the healing of the fever is a deed in accordance with nature, but it was accomplished in an extraordinary manner: as soon as Christ touched her, the fever left (Matt. 8:14-15). But a wonder is an action performed upon that which does not occur in accordance with nature. Such was the healing of the man blind from birth (John 9:1-7). But since signs and wonders can also be performed by the power of demons, he added: "by the power of the Spirit of God." Here the dignity of the Spirit is also shown, Who is able to perform true signs and wonders.

Do you want, he says, to have proof of what I am speaking about? Behold the multitude of my disciples from Jerusalem even unto Illyricum, which constitutes the borders of present-day Bulgaria. He did not say: I preached, but: I have fully preached the gospel, in order to show that his word was not fruitless, but effective. When you hear: "from Jerusalem unto Illyricum," do not think that the apostle traveled by a straight and main road. "And the surrounding regions," he says, that is, I went around the nations with preaching both to the north and to the south.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252015.html'
source_title='Commentary on Romans'
