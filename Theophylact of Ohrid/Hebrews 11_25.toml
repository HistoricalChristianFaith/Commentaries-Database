[[commentary]]
quote='''
See how he calls it sin — not to suffer together with one's brethren. This God also reproaches through the prophets: "and are not grieved for the affliction of Joseph" (Amos 6:6); and again: she did not go out to mourn for the house of her neighbor (general thought from Amos 5). And upon those who mourn in the prophet Ezekiel a mark is placed; but concerning those who endured nothing of the sort, the angels are given a command to slay them (Ezek. 9:4–6). If those who do not voluntarily suffer together with the suffering are sinning, then what must one think of those who inflict evil on others and generally commit evil? Thus he calls participation in royal luxury "the passing pleasures of sin."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%252011.html'
source_title='Commentary on Hebrews'
