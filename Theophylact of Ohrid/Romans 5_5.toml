[[commentary]]
quote='''
And such hope is not fruitless; it "does not put to shame" the one who hopes. Human hopes, when unfulfilled, put to shame those who hoped, but divine hopes are not of this kind. For the One who bestows good things is immortal and good, and we, even though we die, shall live again, and then nothing will any longer prevent our hopes from being fulfilled.
He assures us of the future by the love that God has already shown to us. He speaks as if to say: do not lose faith; the hope for divine blessings is not in vain, for He Who so loved us that He made us children of God, without any labor on our part, through the Holy Spirit — how will He not give crowns after labors? "The love of God has been poured out," he says, "into our hearts," that is, it appears abundant and rich in us, who have in our hearts the Spirit Himself, Whom God has given to us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25205.html'
source_title='Commentary on Romans'
