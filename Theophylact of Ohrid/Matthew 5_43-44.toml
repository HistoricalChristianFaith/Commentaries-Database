[[commentary]]
quote='''
Ye have heard that it hath been said, Thou shalt love thy neighbour and hate thine enemy. But I say unto you, Love your enemies. Here the Lord has reached the very pinnacle of the virtues. For what is greater than to love one's enemies? But it is not impossible to accomplish. For Moses and Paul loved the Jews who were raging against them more than they loved themselves, and all the saints have loved their enemies. Bless them that curse you, do good to them that hate you, and pray for them which despitefully use you, and persecute you. We bless them because we must consider them our benefactors. For anyone who persecutes us and puts us to the test, lightens the punishment that we will suffer for our own sins. We will also bless them when God gives us the great crown of the contest. For hear what He says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
