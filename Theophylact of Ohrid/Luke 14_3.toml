[[commentary]]
quote='''
The Lord exposes the foolishness of those who intended to reproach Him; therefore He asks whether it is lawful to heal on the Sabbath or not. Does He not clearly put them to shame as fools? For while God Himself blessed the Sabbath, they forbid doing good on it, and thus make it accursed. For that day is not blessed in which no good deed is performed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
