[[commentary]]
quote='''
They were especially vexed by the fact that, with the approach of the feast, everyone was going to Bethany, learning of the miracle, and seeing the risen man with their own eyes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John'
