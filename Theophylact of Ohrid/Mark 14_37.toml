[[commentary]]
quote='''
After the prayer, coming to the disciples, He found those three disciples sleeping; but He rebukes Peter alone, as if saying to him: did you not promise to die with Me, yet could not watch even one hour — and can you despise death?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
