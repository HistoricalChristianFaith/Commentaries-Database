[[commentary]]
quote='''
On the contrary, the demoniac asked Him for permission to be with Him, as he feared that the demons, finding him alone, might enter into him again.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For he feared lest some time or other the devils should find him, and enter into him a second time.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
