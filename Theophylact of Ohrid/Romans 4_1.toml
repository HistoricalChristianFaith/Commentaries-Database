[[commentary]]
quote='''
Having sufficiently proven that faith is necessary for all, he confirms this further with the example of Abraham, who enjoyed great respect among the Jews, and says that he too, having excellently accomplished many great things, was justified not by works, but by faith. He calls him father "according to the flesh," in order to show that the Jews do not have a spiritual kinship with him, or rather, in order to oblige them to imitate him in all things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25204.html'
source_title='Commentary on Romans'
