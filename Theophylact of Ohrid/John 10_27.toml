[[commentary]]
quote='''
Having told them that they are not of His sheep, He now inclines them to become His sheep. For this reason He also adds: "My sheep hear My voice, and they follow Me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John'
