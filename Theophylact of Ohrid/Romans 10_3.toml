[[commentary]]
quote='''
But further he shows their passion for disputes and love of authority. They strove to establish their own righteousness, that is, the righteousness from the law, composed of their own deeds and labors, which, having already fallen, cannot stand, and thus they neither established their own righteousness nor submitted to the righteousness of God. This is indeed a sign of self-praise and love of authority, even of foolishness—to strive to establish that which cannot stand, and to spend all one's time in this. The righteousness of God here refers to that which is from faith, which does not depend on our labors, but is entirely a gift of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252010.html'
source_title='Commentary on Romans'
