[[commentary]]
quote='''
And whoever is on the housetop, let him not return to his house for anything: he should be glad even if he escapes naked. And whoever already stands on the height, let him not come down from it. For when any passionate thought arises in us, then we must through confession hasten to the height of virtue and not descend from that height. And let the one doing good not turn back to take up his former conscience — the old garment which he had stripped off.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'
