[[commentary]]
quote='''
He sends them to an unknown man in order to show that He accepts His sufferings voluntarily. For if He had not wished to suffer, then, having inclined the mind of this unknown man to receive them (Himself and the disciples), He could also have produced in the Jews whatever He pleased. Some say that the Lord did not mention the name of this man nor reveal it, but leads the disciples to his house by a certain sign so that the betrayer, having learned the name, would not point out this house to the Pharisees, and they would not come to seize Him before He established the supper, before He imparted His spiritual mysteries. Therefore Christ, a little later, says: "I have earnestly desired to eat this Passover with you before My suffering." That is, I took every care for us to hide from the betrayer, so as not to undergo suffering before the time, before I impart the mysteries. Whoever wishes may accept this explanation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'
