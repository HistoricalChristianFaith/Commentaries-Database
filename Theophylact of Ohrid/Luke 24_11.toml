[[commentary]]
quote='''
When they returned from the tomb and told the apostles about this, they were regarded as dreamers. So, by nature, the miracle of the resurrection seems incredible to people!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Now the miracle of the resurrection is naturally incredible to mankind. Hence it follows, And their words seemed to them as idle tales.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
