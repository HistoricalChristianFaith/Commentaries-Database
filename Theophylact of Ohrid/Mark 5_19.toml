[[commentary]]
quote='''
But the Lord sends him home, showing that His power and providence would guard him even in His absence. He sends him away also so that he might benefit others who would see him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'
