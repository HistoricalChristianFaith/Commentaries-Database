[[commentary]]
quote='''
Since they were thinking in human terms and suffered from great doubt, the Lord calls them "foolish and slow" to believe all that "the prophets had foretold." For it is possible to believe in part and to believe wholly. For example, whoever hopes that Christ will come for the salvation of the people, yet not for the salvation of souls, but for the restoration and deliverance of the Jewish nation, that person does not believe as much as one ought to believe. Likewise, whoever believes the words of David, "They pierced my hands and my feet" (Ps. 21:17), and the other words concerning the cross and the circumstances on the cross, as a prophecy spoken in the person of the Lord, and accepts the passages of Scripture about the suffering, but does not take into consideration the passages about the resurrection, such as, for example, these: "You will not leave my soul in Hades, nor will You allow Your Holy One to see corruption" (Ps. 15:10), "among the dead" (Ps. 87:6), "He releases the prisoners from their bonds" (Ps. 67:7), and similar ones — that person has a faith that is not perfect, but believes only in part.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Because the above-mentioned disciples were troubled with too much doubt, the Lord reproves them, saying, O fools, (for they almost used the same words as those who stood by the cross, He saved others, himself he cannot save.) And He proceeds, and slow of heart to believe all that the prophets have spoken. For it is possible to believe some of these things and not all; as if a man should believe what the Prophets say of the cross of Christ, as in the Psalms, They pierced my hands and my feet; (Ps. 22:16.) but should not believe what they say of the resurrection, as, Thou shall not suffer thy Holy One to see corruption. (Ps. 16:10.) But it becomes us in all things to give faith to the Prophets, as well in the glorious things which they predicted of Christ, as the inglorious, since through the suffering of evil things is the entrance into glory.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
