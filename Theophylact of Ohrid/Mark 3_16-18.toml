[[commentary]]
quote='''
The Evangelist lists the names of the apostles on account of the false apostles, so that the true apostles might be known. He calls the sons of Zebedee Sons of Thunder, as especially great preachers and theologians.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'
