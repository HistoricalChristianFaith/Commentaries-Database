[[commentary]]
quote='''
Here again he shows that we are brothers of Christ and are so greatly honored. For, he says, "He who sanctifies," that is, Christ, and "those who are sanctified," that is, we, "are all from One," that is, the Father. But He is truly the genuine Son and from the very essence of the Father, while we are creatures. Notice also the superiority in the expressions. He sanctifies, we are sanctified. Hence both the identity and the superiority.

"Therefore He is not ashamed to call them brethren" — look, here too is His superiority. For by the expression "is not ashamed" he shows that this does not belong to nature, but to the tender love of the One Who is not ashamed. Although we are indeed from One, there is a great difference between us, as between the Creator and creatures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25202.html'
source_title='Commentary on Hebrews'
