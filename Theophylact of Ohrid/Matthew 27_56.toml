[[commentary]]
quote='''
Among which was Mary Magdalene, and Mary the mother of James and Joses, and the mother of the sons of Zebedee. "Mary the mother of James and Joses" means the Theotokos, the Virgin Mother of God, for James and Joses were the sons of Joseph by his first wife. And since the Theotokos was called the "wife" of Joseph, she is rightly called the "mother" of his children, meaning "stepmother." The mother of the sons of Zebedee was named Salome. They say that she also was a daughter of Joseph.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
