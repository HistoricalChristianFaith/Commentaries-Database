[[commentary]]
quote='''
If I had gone away to prepare a place for you, then in that case I would not have left you, but would have taken you with Me, so that you also would be where I am. Do you see how much consolation and encouragement is in the words "that you also may be where I am"? Therefore, it is unreasonable for you to be troubled, when you will be with Me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
