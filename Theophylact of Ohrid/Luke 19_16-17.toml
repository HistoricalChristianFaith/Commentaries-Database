[[commentary]]
quote='''
It is revealed that one brought benefit to many and multiplied the gift tenfold. Therefore, the one who multiplied what he received tenfold is set over ten cities, that is, he receives authority over ten cities, and consequently is rewarded many times over.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'
