[[commentary]]
quote='''
"But beware of men: for they will deliver you up to the councils, and they will scourge you in their synagogues; and ye shall be brought before governors and kings for My sake, for a testimony against them and the Gentiles." You see, this is what it means to be wise: beware not to give cause to those who would afflict you, but to conduct yourselves wisely. If the persecutor wants money or honor, give it to him, that he have no cause against you. But if he would take your faith, then guard your Head. Christ intends to send the disciples not only to the Jews, but to the Gentiles as well, which is why He says, "for a testimony against them and the Gentiles," that is, as a reproof to those who do not believe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
