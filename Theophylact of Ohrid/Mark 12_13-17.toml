[[commentary]]
quote='''
We have said elsewhere of the Herodians, that they were a certain new heresy, who said that Herod was the Christ, because the succession of the kingdom of Judah had failed. Others however say that the Herodians were the soldiers of Herod, whom the Pharisees brought as witnesses of the words of Christ, that they might take Him, and lead Him away. But observe how in their wickedness they wished to deceive Christ by flattery; for it goes on: Master, we know that thou art true.

So that thou wilt not honour Cæsar, that is, against the truth; therefore they add, But teachest the way of God in truth. Is it lawful to give tribute to Cæsar, or not? Shall we give, or shall we not give? For their whole plot was one which had a precipice on both sides, so that if He said that it was lawful to give tribute to Cæsar, they might provoke the people against Him, as though He wished to reduce the nation itself to slavery; but if He said, that it was not lawful, they might accuse Him, as though He was stirring up the people against Cæsar; but the Fountain of wisdom escaped their snares. Wherefore there follows: But he, knowing their hypocrisy, said unto them, Why tempt ye me? bring me a penny, that I may see it. And they brought it.

As if He had said, Give what bears an image to him whose image it bears, that is, the penny to Cæsar; for we can both pay Cæsar his tribute, and offer to God what is His own.

The inevitable wants of our bodies is as Cæsar unto each of us; the Lord therefore orders that there should be given to the body its own, that is, food and raiment, and to God the things that are God's. It goes on: And they marvelled at him. They who ought to have believed, wondered at such great wisdom, because they had found no place for their craftiness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Concerning the Herodians, we have said elsewhere that this was a certain newly-appeared sect of people who called Herod the Christ, for the reason that in his time the succession of Jewish kings came to an end. But others say that the Herodians here refers to the soldiers of Herod, whom the Pharisees brought along so that they might be witnesses of what Christ would say, and then could seize Him and bring Him to trial. But observe their malice, with what flattery they attempt to deceive the Lord! "We know," they say, "that You do not regard the persons of men, and therefore You will not fear even Caesar himself." Yet all this was nothing but cunning, so as to trap Him in any case. For if He had said that one must pay tribute to Caesar, they would have accused Him before the people of enslaving the nation to a foreign yoke; and if He had said that one must not, then they could have accused Him of inciting the people against Caesar. But the Fountain of wisdom evades their snares. "Show Me," He says, "a coin," and seeing upon it the image of Caesar, He said: what bears such an image upon it, render to the one depicted, that is, to Caesar; for we can both pay Caesar his tribute, and offer to God what is His own. That is, the obligation to pay tribute to Caesar in no way hinders you in the matter of worshipping God, for you can both render to Caesar what is due and give to God what is owed. But each of us has a Caesar of his own sort: it is the unavoidable necessity of the body. And so the Lord commands us to give to the body its proper food and needful clothing, and "the things of God to God," that is, vigil to the extent of one's ability, prayer, and the rest. But to the devil as well — to this Caesar too — throw back what was given to you by him, such as anger and evil desire; and to God bring what is God's: humility, temperance in all things, and the rest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Commentary on Mark'