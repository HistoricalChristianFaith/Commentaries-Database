[[commentary]]
quote='''
Every time I remember you, says the apostle (and this I do always), I glorify God for the fact that you have advanced so much in virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Philippians%2FChapter%25201.html'
source_title='Commentary on Philippians'
