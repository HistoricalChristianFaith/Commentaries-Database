[[commentary]]
quote='''
It is shown that there is nothing that the believers lacked; on the contrary, it is sufficient for them to "abstain from things offered to idols" and so on. By the expression "to abstain from…things strangled," murder is forbidden.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
