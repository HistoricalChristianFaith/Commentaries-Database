[[commentary]]
quote='''
And He sowed; but of the seeds, one fell on a soul like a road trampled by many, and the birds of the air, that is, the demons who rule in the air, devoured this seed. To such people belong the people-pleasers; they are the same as a road trampled by many. Whoever does everything only to please this person or that is trampled by many. But notice, the Lord did not say that the seed was thrown by the wayside, but that it fell by the wayside, because the Sower casts the seed on the ground as on good ground, but the ground itself, having proved to be bad, destroys the seed, that is, the word. However, some have well understood what fell by the wayside in the sense that it fell on an unbelieving heart. For the Way is Christ, and those by the wayside are the unbelievers who are outside the Way, that is, Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Take notice, that He says not that He threw it in the way, but that it fell, for a sower, as far as he can, throws it into good ground, but if the ground be bad, it corrupts the seed. Now the way is Christ; but infidels are by the way-side, that is, out of Christ.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
