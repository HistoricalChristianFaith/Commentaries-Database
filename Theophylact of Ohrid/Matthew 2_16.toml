[[commentary]]
quote='''
Then Herod, when he saw that he had been tricked by the Magi, was exceedingly wroth, and sent forth, and slew all the children that were in Bethlehem. As God used Moses to trick Pharaoh, so, too, He used the Magi to trick Herod. For both Herod and Pharaoh were child slayers: Pharaoh slew the male children of the Hebrews in Egypt, and Herod slew the male children of the Hebrews in Bethlehem. Herod vents his wrath against the Magi upon those who had wronged him in nothing. Why were the children allowed to be slaughtered? So that Herod's wickedness might be revealed. But perhaps you will ask me, "Why did the children suffer wrong to show Herod's wickedness?" Listen then. They were not wronged but were made worthy of crowns. For anyone who suffers some evil here, suffers either so that his sins might be absolved, or so that his crowns might be multiplied. So it is with these children; for their suffering they will receive a greater crown in heaven. And in all the region thereof, from two years old and under, according to the time which he had carefully ascertained of the Magi.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
