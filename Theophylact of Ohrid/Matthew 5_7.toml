[[commentary]]
quote='''
Blessed are the merciful, for they shall obtain mercy. Not only with money does one show mercy in almsgiving, but also with words. And should you have nothing at all to give, show mercy with tears of compassion. "They shall obtain mercy" even here in this life from men; for if he who showed mercy yesterday should be in want today, he will obtain mercy from all. And in the next life, how much more shall he obtain mercy from God?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
