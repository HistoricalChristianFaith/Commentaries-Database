[[commentary]]
quote='''
The grace of God was pleased to ordain from the beginning that the word of the apostles should be effective; for what use are preachers if there are no listeners? And since the firstfruits from among the Gentiles were to become partakers in the faith from the very first days, Luke adds: "and they began to speak in other tongues." Why then did the apostles receive the gift of tongues before other gifts? Because they were to go forth into all lands; and just as at the time of the building of the tower one language was divided into many, so now many languages were united in one man, and one and the same man, by the inspiration of the Holy Spirit, began to speak in Persian, and in Roman, and in Indian, and in many other languages. And this gift was called the gift of tongues, because the apostles could speak in many languages.
"As the Spirit gave them utterance." The apostles did not speak of themselves, but spoke forth from the Spirit of God, proclaiming, that is, understanding and declaring, the testimonies concerning Christ spoken by the holy prophets.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25202.html'
source_title='Commentary on Acts'
