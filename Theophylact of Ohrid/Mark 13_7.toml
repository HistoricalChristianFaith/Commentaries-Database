[[commentary]]
quote='''
"You will hear," He says, "of wars"; these are the wars about which Josephus Flavius also recounts and which took place before the destruction of Jerusalem. The Jews at that time revolted and ceased paying tribute to the Romans, and the angered Romans went to war against them and made constant attacks. "But this is not yet the end" of Jerusalem, for the Romans still showed clemency.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
That is, the Romans against the Jews, which Josephus relates happened before the destruction of Jerusalem. For when the Jews refused to pay tribute, the Romans arose, in anger; but because at that time they were merciful they took indeed their spoils, but did not destroy Jerusalem.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
