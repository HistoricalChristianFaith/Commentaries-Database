[[commentary]]
quote='''
"You will hear," He says, "of wars"; these are the wars about which Josephus Flavius also recounts and which took place before the destruction of Jerusalem. The Jews at that time revolted and ceased paying tribute to the Romans, and the angered Romans went to war against them and made constant attacks. "But this is not yet the end" of Jerusalem, for the Romans still showed clemency.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'
