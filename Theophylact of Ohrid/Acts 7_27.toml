[[commentary]]
quote='''
But pay attention to the response: "Who made you a ruler and judge over us?" The very same words that were later said to Christ. To repay good with insult — that is in the spirit of the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25207.html'
source_title='Commentary on Acts'
