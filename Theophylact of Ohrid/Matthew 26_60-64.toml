[[commentary]]
quote='''
At the last came two false witnesses, and said, This fellow said, I am able to destroy the temple of God, and to build it in three days. And the high priest arose, and said unto Him, Answerest thou nothing? What is it which these witness against thee? But Jesus was silent. And the high priest answered and said unto Him, I adjure thee by the living God, that thou tell us whether thou be the Christ, the Son of the living God. Jesus saith unto him, Thou hast said. Truly these were false witnesses. For Christ had not said, "I am able to destroy," but "You shall destroy." And He had not said, "the temple of God," but "this temple," that is, "My Body." And again, He had not said, "I shall build," but "I shall raise." So they were clearly false witnesses, the Lord having said one thing while they reported that He had said another. Jesus therefore kept silent, knowing that their tribunal was unlawful. For how would a verbal defense persuade those whom signs had not persuaded? The high priest asks the question, wanting to induce Him to blaspheme; so that if He should say, "I am the Son of God," He might be condemned as a blasphemer, but if He should deny it, the High priest would have Him as a witness against Himself. But the Lord caught those sophists in their own cunning, and answers, "Thou hast said," meaning, "Your mouth has confessed that I am the Son of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
