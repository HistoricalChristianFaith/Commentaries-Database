[[commentary]]
quote='''
Dispelling such an opinion, he says: the difference between me and Christ is, first, that "I baptize... with water," but "He... with the Spirit... and fire," and the other is that "I am not worthy even to untie the strap of His sandal." What the words "baptize you with the Holy Spirit and fire" mean is perfectly clear, for He sent the Spirit to the apostles, and divided tongues of fire appeared over them (Acts 2:3–4). And the words "not worthy to untie the strap of His sandal" clearly mean that I am not worthy to count myself even among the least of His servants. In a more hidden sense, the sandals of both feet of the Lord are His appearing from heaven to earth and His descent from earth to Hades. The manner of these two appearings no one can explain, even if he were like John himself. For who can say how the Lord became incarnate, or how He descended into Hades?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Commentary on Luke'
