[[commentary]]
quote='''
Nevertheless, Christ Himself had determined for Himself the day of His Passion; for He wished to be crucified on the Passover, because He was the true Passover.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The council against Christ was assembled on Wednesday. And this is the reason why we fast on Wednesdays. The enemies wanted to wait until after the feast time, but this was not permitted to them. The Lord, appointing the sufferings for Himself, willed to deliver Himself to the Crucifixion on Pascha itself, for He Himself was the True Pascha. Here one must marvel at His power. For when the enemies wanted to seize Him, they could not, but when they did not want to, on account of the feast, then He Himself willingly delivered Himself to them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'