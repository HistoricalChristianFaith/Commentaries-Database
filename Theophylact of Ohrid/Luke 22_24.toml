[[commentary]]
quote='''
They are now troubled not only by the suspicion of betrayal among themselves, but from this confusion they pass to a dispute, arguing about which of them is the greatest. They arrived at this dispute in a natural progression. Probably one of them was saying to another: you intend to betray, and the other replied: no, you intend to betray. From this they moved on to saying: I am better, I am greater, and the like. What then does the Lord do?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
While they were enquiring among themselves who should betray the Lord, they would naturally go on to say to one another, "Thou art the traitor," and so become impelled to say, "I am the best, I am the greatest." Hence it is said, And there was also a strife among them which should be accounted the greatest.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
