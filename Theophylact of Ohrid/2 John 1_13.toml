[[commentary]]
quote='''
Some, on the basis of these words, think to affirm that this epistle was written not to a woman, but to the Church. With him who thinks so, I do not at all argue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520John%2F2%2520John.html'
source_title='Commentary on 2 John'
