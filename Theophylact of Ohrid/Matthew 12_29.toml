[[commentary]]
quote='''
I do not, He says, keep demons as friends; just the opposite, I war against them and bind them who were strong men before My coming. For when Christ entered the house, that is, the world, He seized from the demons their goods, which are men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
