[[commentary]]
quote='''
"And it came to pass, when Jesus had ended these sayings, the people were astonished at His teaching: for He taught them as one having authority, and not as the scribes." It was not the rulers who were astonished: how could that be when they viewed Him with spite? Rather it was the guileless multitude that was astonished. They did not marvel at His turns of phrase, but at His straightforward speech, and that He showed authority beyond that of the prophets. The prophets said, "Thus saith the Lord," but Christ spoke as God, "I say to you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
