[[commentary]]
quote='''
Notice then the bloodthirstiness of the Jews and the moderation of Pilate (although he too is worthy of condemnation, because he did not firmly stand up for the righteous man). For they cried out, "Crucify Him," while he, though feebly, nevertheless attempted to free Jesus from condemnation. Therefore he asked again, "What shall I do with Jesus?" — trying to give them the opportunity to release the Lord as innocent, which is why he delayed and put it off.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'
