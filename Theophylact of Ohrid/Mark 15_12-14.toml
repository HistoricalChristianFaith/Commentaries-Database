[[commentary]]
quote='''
Notice then the bloodthirstiness of the Jews and the moderation of Pilate (although he too is worthy of condemnation, because he did not firmly stand up for the righteous man). For they cried out, "Crucify Him," while he, though feebly, nevertheless attempted to free Jesus from condemnation. Therefore he asked again, "What shall I do with Jesus?" — trying to give them the opportunity to release the Lord as innocent, which is why he delayed and put it off.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Now see the wickedness of the Jews, and the moderation of Pilate, though he too was worthy of condemnation for not resisting the people. For they cried out, Crucify; he faintly tries to save Jesus from their determined sentence, and again puts a question to them. Wherefore there follows, Then Pilate said unto them, Why, what evil hath he done? For he wished in this way to find an opportunity for releasing Christ, who was innocent.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
