[[commentary]]
quote='''
"Having arrived there" (in Antioch) "and having gathered the church, they reported all that God had done with them." The apostle did not say: "what they had done," but "what God had done with them." "God opened the door of faith to the Gentiles." He calls the opening of the door the teaching which the Gentiles received through the apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252014.html'
source_title='Commentary on Acts'
