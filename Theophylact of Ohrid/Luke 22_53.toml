[[commentary]]
quote='''
He says to them: every day I taught in the temple, and you did not wish to seize Me, but now you have come as against a robber. However, you are truly undertaking works of the night, and your authority is the authority of darkness. Therefore you have chosen precisely such a time as befits both you and the deed you are undertaking.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'
