[[commentary]]
quote='''
Therefore, he says, having been cleansed from all these evils, draw near as newborn babes, "for of such," said the Lord, "is the Kingdom of God" (Luke 18:16). And, being nourished by guileless teaching, grow up into "the measure of the stature of the fullness of Christ" (Eph. 4:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25202.html'
source_title='Commentary on 1 Peter'
