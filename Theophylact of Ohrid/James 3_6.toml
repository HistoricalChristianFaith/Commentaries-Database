[[commentary]]
quote='''
So also the tongue, a world of iniquity, is fire, for as fire destroys everything, so does the tongue. Some understand "world" here as multitude, as also in the words: "the world did not know Him" (John 1:10). The tongue is a world, that is, a mass of iniquity.

Thus the tongue, setting ablaze the wheel of birth, defiles life. Life is also called a crown by the psalmist, when he says to God: "You shall bless the crown of the year of Your goodness" ("You crown the year with Your goodness") (Ps. 65:11). A crown and a wheel do not differ from each other in shape, being round. Life is a wheel in the sense that it revolves within itself. This is how this passage should be explained if the text reads "the wheel of hell," as in certain manuscripts; but if one reads "the wheel of birth," then by the wheel of birth one should understand our life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520James%2FChapter%25203.html'
source_title='Commentary on James'
