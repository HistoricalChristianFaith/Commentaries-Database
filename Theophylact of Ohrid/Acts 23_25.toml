[[commentary]]
quote='''
Here is a letter written in defense of him and in accusation of the Jews. Look: Paul is acknowledged as innocent not by the Jews, but by foreigners, just as Christ was by Pilate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252023.html'
source_title='Commentary on Acts'
