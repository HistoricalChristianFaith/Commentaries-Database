[[commentary]]
quote='''
As He was walking by the Sea of Galilee, He saw two brethren, Simon called Peter, and Andrew his brother, casting a net into the sea: for they were fishermen; and He saith unto them. These two had been disciples of John, and while John was still living they had approached Christ. But when they saw John arrested, they returned again to their fishing, and so Christ comes, fishing for them, and says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
