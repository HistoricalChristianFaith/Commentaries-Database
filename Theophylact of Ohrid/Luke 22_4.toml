[[commentary]]
quote='''
By "captains" he here means the overseers of the temple buildings, or the supervisors of good order. For the Romans had appointed certain overseers over the people, so that they would not revolt, for they were rebellious. These are the ones he calls captains (in Church Slavonic — "voevody," i.e., military commanders). Or perhaps the military commanders were those who, belonging to the priestly order, held military positions. For, suffering from a love of preeminence, they involved themselves in such offices as well. Therefore he also called them captains of the temple, perhaps in order to reproach them more keenly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
The magistrates here mentioned were those appointed to take care of the buildings of the temple, or it may be those whom the Romans had set over the people to keep them from breaking forth into tumult; for they were seditious.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
