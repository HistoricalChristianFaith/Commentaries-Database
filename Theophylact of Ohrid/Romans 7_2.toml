[[commentary]]
quote='''
He hints at this at the beginning, and further on speaks of it from another side. Namely: when the husband dies, the wife has the right to join in marriage with another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25207.html'
source_title='Commentary on Romans'
