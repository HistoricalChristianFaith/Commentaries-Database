[[commentary]]
quote='''
Although Peter left little for the sake of Christ, he still calls this little "everything." It is evident that even a little has the bonds of attachment, and therefore even one who leaves little is worthy of being blessed. Peter alone asked Christ, but the Lord gives an answer common to all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Although Peter had left but few things, still he calls these his all; for even a few things keep us by the bond of affection, so that he shall be beatified who leaves a few things.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
