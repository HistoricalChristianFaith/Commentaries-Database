[[commentary]]
quote='''
After then that He had prayed for believers, and promised them so many good things, another prayer follows worthy of His mercy and benignity: O righteous Father, the world hath not known Thee; as if to say, I would wish that all men obtained these good things, which I have asked for the believing. But inasmuch as they have not known Thee, they shall not obtain the glory and crown.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
After such a prayer for the believers and the promise to them of so many blessings, He finally utters something merciful and worthy of His love for mankind. He says: "Righteous Father! I would wish that all people also receive such blessings as I have asked for the faithful, but they have not known Thee and therefore will not receive that glory and those rewards."
"And I have known You." He hints here also at the Jews, who said that they know God, and shows that they do not know the Father. For by "the world" in many places he means the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John'
