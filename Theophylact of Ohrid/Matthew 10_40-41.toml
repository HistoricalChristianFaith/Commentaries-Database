[[commentary]]
quote='''
"He that receiveth you receiveth Me, and he that receiveth Me receiveth Him that sent Me. He that receiveth a prophet in the name of a prophet shall receive a prophet's reward; and he that receiveth a righteous man in the name of a righteous man shall receive a righteous man's reward." He incites us to welcome those whom Christ sends, for he who honors a disciple of Christ, honors Christ Himself and, through Him, the Father as well. But we must welcome righteous men and prophets in the name of a righteous man and prophet, that is, because they are righteous men and prophets, and not because of any protection or aid of the sort which kings provide. But even if a man should have the appearance of a prophet but in conduct fall short, you should still receive him as a prophet. And God will reward you for having received a true prophet, for this is what it means "shall receive a righteous man's reward." Or you may understand it in another way, that he who receives a righteous man will himself be counted as a righteous man and will receive the reward which the righteous receive.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
