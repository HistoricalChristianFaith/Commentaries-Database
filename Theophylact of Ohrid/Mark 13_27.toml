[[commentary]]
quote='''
Do you see that the Son also sends the Angels, just as the Father does? Where then are those who say that He is not equal to God the Father? The Angels will come then in order to gather the elect, who, having been caught up on the clouds, will in this manner meet the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Observe that Christ sends the Angels as well as the Father; where then are they who say that He is not equal to the Father? For the Angels go forth to gather together the faithful, who are chosen, that they may be carried into the air to meet Jesus Christ. Wherefore it goes on: And gather together his elect from the four winds.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
