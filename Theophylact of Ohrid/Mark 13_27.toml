[[commentary]]
quote='''
Do you see that the Son also sends the Angels, just as the Father does? Where then are those who say that He is not equal to God the Father? The Angels will come then in order to gather the elect, who, having been caught up on the clouds, will in this manner meet the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'
