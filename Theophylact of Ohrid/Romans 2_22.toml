[[commentary]]
quote='''
By sacrilege he means the theft of things dedicated to idols; for although they abhorred idols, yet, being possessed by love of money, they laid hands on things dedicated to idols out of shameful greed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25202.html'
source_title='Commentary on Romans'
