[[commentary]]
quote='''
Their "heart" was "burning" either from the fire of the Lord's words, when through the Lord's explanation they were inwardly inflamed and agreed with His words as true, or, when He explained the Scriptures to them, their heart was beating and inwardly saying: This very One Who is explaining to us is the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
And they said one to another, Did not our hearts burn, within us while he talked with us by the way, and while he opened to us the scriptures?

Their hearts then were turned either by the fire of our Lord's words, to which they listened as the truth, or because as He expounded the Scriptures, their hearts wore greatly struck within them, that He who was speaking was the Lord.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
