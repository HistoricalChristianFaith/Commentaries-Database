[[commentary]]
quote='''
However, teaching the disciples not to be high-minded, the Lord says: "nevertheless do not... rejoice in this... that the demons are subject to you" (for from this others receive benefit, namely those who receive healing), "but rather rejoice that your names are... written... in heaven" not with ink, but by God's remembrance and grace. The devil falls from heaven, while people living on earth are written in heaven. Therefore, the true joy is in this, "that your names are written in heaven" and are not forgotten by God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
For the names of the saints are written in the book of life not in ink, but in the memory and grace of God. And the devil indeed fell from above; but men being below have their names inscribed above in heaven.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
