[[commentary]]
quote='''
Here he shows the fulfilled prophecy; and whoever resolves to teach the ignorant, to which Paul resorted, much labor and sweat awaits him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252015.html'
source_title='Commentary on Romans'
