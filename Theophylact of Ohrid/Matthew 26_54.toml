[[commentary]]
quote='''
All these things must be, He says, in order to fulfill the Scriptures which had foretold them. The Jews were not wicked because the Scriptures had foretold that they would be; rather, these events were described in the Scriptures beforehand by the inspiration of the Holy Spirit because the Jews would do these things of their own evil will.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
