[[commentary]]
quote='''
But some one has observed that the two coats are the spirit and letter of Scripture, but John advises him that hath these two to instruct the ignorant, and give him at least the letter.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'
