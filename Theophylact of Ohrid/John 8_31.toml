[[commentary]]
quote='''
As He said to the unbelievers alone, Ye shall die in your sin, so now to them who continue in the faith He proclaims absolution.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
And that they were not believers in the precise sense is obvious. For He said to the Jews who had believed: "If you abide in My word." By this He shows that although they believed, it was superficially, and therefore they would not remain in the faith. And by exposing them in this, He shows that He knows their hearts and is God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John'
