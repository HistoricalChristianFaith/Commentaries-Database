[[commentary]]
quote='''
They were unsteady and more fainthearted than their son. But he was becoming a fearless witness of the truth; he had begun to see well with the eyes of his mind also.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John'
