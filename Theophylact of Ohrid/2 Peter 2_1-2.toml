[[commentary]]
quote='''
By false teachers the apostle means the like-minded followers of Nicolaus and Cerinthus, and by the name of prophecy, commonly attributed to both prophets and false teachers, he warns the faithful not to heed false prophets. What the difference is between the one and the other, Paul taught when he said that no one calls Jesus Lord "except by the Holy Spirit" (1 Cor. 12:3). Then he begins to expose the heresy of the Nicolaitans, saying that they are doubly wicked. For in doctrine they are extremely impious, since they blaspheme the Master Christ; in life they are utterly depraved, which he now expresses by mentioning their "debauchery," and a little further on he will explain even more.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Peter%2FChapter%25202.html'
source_title='Commentary on 2 Peter'
