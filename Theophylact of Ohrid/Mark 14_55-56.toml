[[commentary]]
quote='''
People who are themselves worthy of condemnation set up the appearance of a tribunal, in order to show that they put Him (Christ) to death by judgment. But where is the justice of a trial when witnesses are brought forward who cannot say anything just, but only violence and absurdities? And even those very ones who thought they were saying something substantial spoke a lie.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
