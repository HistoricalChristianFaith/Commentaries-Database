[[commentary]]
quote='''
Soon about to go to His sufferings, the Lord preaches about His Divinity, and not openly or with pride, but very humbly. For He asks them and, having brought them to perplexity, leaves it to them to draw the conclusion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Although our Lord was shortly about to enter on His Passion, He proclaims His own Godhead, and that too neither incautiously nor boastfully, but with modesty. For He puts a question to them, and having thrown them into perplexity, leaves them to reason out the conclusion; as it follows, And he said unto them, How say they that Christ is David's son?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
