[[commentary]]
quote='''
"They commissioned Barnabas to go to Antioch." Why did they not write about this to Paul, but sent Barnabas? Because they did not yet know about the virtue of this man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252011.html'
source_title='Commentary on Acts'
