[[commentary]]
quote='''
And from this passage also one can conclude that the apostles had a certain special dignity, by which they stood above the elders, otherwise Luke would have designated all of them by one common name together with the elders.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
