[[commentary]]
quote='''
And see how they, out of their malice, tempt the Lord, not tolerating that the people should believe in Him, but constantly approaching Him with the intention of putting Him in difficulty and cornering Him with their questions. They pose to Him a question that placed Him between two abysses: is it lawful, they say, for a man to divorce his wife? For whether He says that it is lawful, or says that it is unlawful, in either case they thought to accuse Him of contradicting the Law of Moses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
They come to Him indeed, and do not quit Him, lest the multitudes should believe on Him; and by continually coming to Him, they thought to bring Him into difficulty, and to confuse Him by their questions. For they proposed to Him a question, which had on either side a precipice, so that whether He said that it was lawful for a man to put away his wife, or that it was not lawful, they might accuse Him, and contradict what He said, out of the doctrines of Moses. Christ, therefore, being Very Wisdom, in answering their question, avoids their snares.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
