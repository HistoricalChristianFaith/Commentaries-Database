[[commentary]]
quote='''
He mentions Barnabas first, since Paul had not yet become famous and had not yet performed any sign. But it should be noted that both Paul and Barnabas were numbered among the rank of the apostles.
"Manaen, who had been brought up with Herod the tetrarch." Here is what the character of each person means, and upbringing does not have an influence: look how Herod remained such a wicked man, while his foster-brother Manaen changed so much that he was even deemed worthy of the gift of prophecy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
