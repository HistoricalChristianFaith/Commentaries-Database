[[commentary]]
quote='''
Then all Israel also will be saved, evidently having believed. Again he brings forth Isaiah, who exclaims that one will come from Zion who is able to save and cleanse the sins of the Israelites.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252011.html'
source_title='Commentary on Romans'
