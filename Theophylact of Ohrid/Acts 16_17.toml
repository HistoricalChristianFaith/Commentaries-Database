[[commentary]]
quote='''
"Following Paul and us, she cried out, saying: these men are servants of the Most High God." O unclean spirit! If you know that they "proclaim the way of salvation," then why do you not depart from them?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252016.html'
source_title='Commentary on Acts'
