[[commentary]]
quote='''
It is not enough to have inner faith alone: a confession of the lips is also required. For since man is twofold, his sanctification must also be twofold, that is, the sanctification of the soul through faith and the sanctification of the body through confession. Therefore, whoever "is ashamed" to confess the Crucified One as his God, him He also "will be ashamed of," recognizing him as an unworthy servant of His, when He "comes" no longer in a humble appearance, not in the abasement in which He appeared here before and for which some are ashamed of Him, but "in glory" and with an Angelic host.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For that faith which only remains in the mind is not sufficient, but the Lord requires also the confession of the mouth; for when the soul is sanctified by faith, the body ought also to be sanctified by confession.

Him then who shall have confessed that his God was crucified, Christ Himself also shall confess, not here, where He is esteemed poor and wretched, but in His glory and with a multitude of Angels.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
