[[commentary]]
quote='''
Matthew says "these parables" because in a short time He would tell them other ones. He departed so that He could benefit others by His presence. "His own country" means Nazareth, for He was raised there. He was teaching in the synagogue, speaking openly in public, that they might not later have grounds to claim that He was teaching things contrary to the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
The Nazarenes were foolish to think that low birth and plain ancestry hinder anyone from pleasing God. Let us suppose that Jesus was simply man and not God. What would have prevented Him from being a great wonderworker? So they are proven to be foolish and spiteful. They ought rather to have taken pride that their native city had produced such a good man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
