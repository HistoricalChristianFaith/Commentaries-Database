[[commentary]]
quote='''
Therefore they also begged Jesus to depart from their region. They were afraid of suffering something even greater. Having lost the swine and grieving over this loss, they refuse even the presence of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But amazed at the miracle, which they had heard, they were afraid, and for this reason they beseech him to depart out of their borders; which is expressed in what follows: And they began to pray him to depart out of their coasts; for they feared lest some time or other they should suffer a like thing: for, saddened at the loss of their swine, they reject the presence of the Saviour.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
