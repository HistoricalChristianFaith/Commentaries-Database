[[commentary]]
quote='''
They (the Pharisees) loved for every person to pay them honor and for people "in public assemblies" to call them by the title "teacher" (Matt. 23:7); this is what the words "greeting" and "chief seat" mean.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Or He means, "That which is uppermost." For wealth rules the covetous man's heart.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
