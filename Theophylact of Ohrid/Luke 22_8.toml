[[commentary]]
quote='''
So then, on Thursday, perhaps in the morning, the Lord sends the disciples Peter and John, one as the loving one, the other as the beloved one, and sends them to a "stranger's" house; for neither He Himself nor the disciples had their own, otherwise He would have celebrated the Passover at the home of one of the disciples. See what poverty!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'
