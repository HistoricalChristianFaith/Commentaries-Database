[[commentary]]
quote='''
He answers them in a parable, saying "Destroy this temple," without a doubt speaking of His own body, because in it dwelt the fullness of the Godhead of the Only-Begotten. By the word "destroy" He does not encourage them to murder (far be such a thought!), but, knowing their intention to do this, He hints at what will happen without delay.
Let the Arians also hear how the Lord and destroyer of death says "I will raise it up." He did not say "the Father will raise it up," but "I" will raise it up, employing His own power and not needing another's from without.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John'

[[commentary]]
quote='''
He does not however provoke them to commit murder, by saying, Destroy; but only shows that their intentions were not hidden from Him. Let the Arians observe how our Lord, as the destroyer of death, says, I will raise it up; that is to say, by My own power.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
