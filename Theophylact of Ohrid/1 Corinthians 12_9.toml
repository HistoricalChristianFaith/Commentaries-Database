[[commentary]]
quote='''
Faith not in dogmas, but wonder-working faith, which even moves mountains (Matt. 17:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252012.html'
source_title='Commentary on 1 Corinthians'

[[commentary]]
quote='''
The gift of healing every disease and every infirmity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252012.html'
