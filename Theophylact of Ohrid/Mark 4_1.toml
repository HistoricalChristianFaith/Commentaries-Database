[[commentary]]
quote='''
Though He seemed to have sent His Mother away, He nevertheless obeys Her again, for on account of Her He goes out to the sea. He sits in a boat so that, having everyone before His eyes, He might speak within the hearing of all and have no one behind Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Although the Lord appears in the transactions mentioned above to neglect His mother, nevertheless He honours her; since on her account He goes forth about the borders of the sea: wherefore it is said, And Jesus began to teach again by the sea-side, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
