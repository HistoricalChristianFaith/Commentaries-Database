[[commentary]]
quote='''
Sons of Gehenna are those who do things worthy of Gehenna, and sons of disobedience are the disobedient; so also sons of light and day are those who do the deeds of light. "We are not sons of night, nor of darkness." That is, of sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25205.html'
source_title='Commentary on 1 Thessalonians'
