[[commentary]]
quote='''
Showing that this is not merely a greeting but also a blessing, He says: if the householder is worthy, then he will be blessed, and if he is an offender and incapable of receiving peace, if he is an enemy and opponent of your word and teaching, then the blessing will not come to him, but "will return to you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'
