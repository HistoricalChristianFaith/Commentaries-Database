[[commentary]]
quote='''
Notice God's arrangement: after some were dissuaded, others, out of fear that the rest might also be dissuaded, attack Paul. Their restless character is visible everywhere.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252021.html'
source_title='Commentary on Acts'
