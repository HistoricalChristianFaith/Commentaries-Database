[[commentary]]
quote='''
And the soul of the blind man was prudent, for after his healing he did not leave Jesus, but followed Him. And allegorically one may understand this as follows: Jericho signifies a low place, that is, the world; the blind man sitting here is an image of human nature, which was once adopted by God, above every earthly honor; and it cried out to Christ as He passed through Jericho, that is, this world. And Christ had mercy on it and saved it by its faith, when it cast off the old garment of sin. And upon receiving salvation, it followed Him, fulfilling the commandments on its path, that is, in this life. For only in this life is it possible to follow Christ, and after it the doors of salvation are shut, and there will no longer be time for the fulfillment of God's commandments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The mind of the blind man is grateful, for when he was made whole, he did not leave Jesus, but followed Him.

Further, it says that he followed the Lord in the way, that is, in this life, because after it all are excluded who follow Him not here, by working His commandments.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
