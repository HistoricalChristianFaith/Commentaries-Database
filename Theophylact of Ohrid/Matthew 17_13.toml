[[commentary]]
quote='''
Then the disciples understood that He spake unto them of John the Baptist. Then the disciples became keener in perception and understood that He was calling John Elijah, as John was the Forerunner of the first coming, just as Elijah would be the forerunner of the second coming.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
