[[commentary]]
quote='''
"When He was come down from the mountain, great multitudes followed Him. And, behold, a leper approached and fell prostrate before Him, saying, Lord, if Thou wilt, Thou canst make me clean." Being a man of good sense, the leper did not go up on to the mountain, so as not to interrupt Jesus' teaching. But when Jesus came down from the mountain, then the leper worshipped Him. And the leper did not say, "If you beseech God, then you will heal me." But he showed great faith, saying, "If Thou wilt." And Christ did.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
