[[commentary]]
quote='''
The expression "even so the tongue" (Jas. 3:5) means precisely this: that the tongue must be directed by sound reason, for although it is small, it does great things — it kindles for us a great fire, because it itself is fire. And what else does it do? It embellishes unrighteousness with eloquence and elegance; it defiles the body, persuading women through allurements; through temptation it commits murders; through false oaths it appropriates what belongs to others; it inflames the wheel of hell, being itself inflamed by hell, as is evident in the case of the rich man "suffering in the flame" by his tongue (Luke 16:24).

"Even so," that is, in the same manner, by rational direction, the tongue too must be moved, for it is a small member, yet it does much, that is, both evil and good. "Boasts great things" is said in place of "produces great deeds."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520James%2FChapter%25203.html'
source_title="Commentary on James"
