[[commentary]]
quote='''
The veil was torn as a sign that the grace of the Spirit had departed from the temple, that the Holy of Holies would become visible and accessible to all, as indeed came to pass when the Romans entered, and that the temple itself mourns. Just as the Jews customarily did in misfortunes and tore their garments, so too the temple, as if animate, showed the same during the sufferings of the Creator, tearing its garment. But something else is signified by this as well. Our flesh is the veil of our temple, that is, of the mind. So then, the power that the flesh had over the spirit was torn by the sufferings of Christ "from top to bottom," that is, from Adam to the last human being. For Adam too was sanctified by the sufferings of Christ, and his flesh is no longer subject to the curse and corruption; on the contrary, we have all been honored with incorruption.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Again, God by the rending of the veil implied that the grace of the Holy Spirit goes away and is rent from the temple, so that the Holy of holies might be seen by all; also that the temple will mourn amongst the Jews, when they shall deplore their calamities, and rend their clothes. This also is a figure of the living temple, that is, the body of Christ, in whose Passion His garment is torn, that is, His flesh. Again, it means another thing; for the flesh is the veil of our temple, that is, of our mind. But the power of the flesh is torn in the Passion of Christ, from the top to the bottom, that is, from Adam even down to the latest man; for also Adam was made whole by the Passion of Christ, and his flesh does not remain under the curse, nor does it deserve corruption, but we all are gifted with incorruption.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
