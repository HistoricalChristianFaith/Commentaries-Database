[[commentary]]
quote='''
From this it is also evident that the obstinate receive no benefit from having mysteries revealed to them, but rather incur far greater condemnation. Therefore one must conceal these things from such people, for this is in fact the more compassionate thing to do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'
