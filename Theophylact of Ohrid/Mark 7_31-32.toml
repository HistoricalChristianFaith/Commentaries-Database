[[commentary]]
quote='''
The Lord does not linger in pagan places, but quickly withdraws from them, so as not to give the Jews, as I said, a pretext for saying about Him that He acts unlawfully by mingling with pagans. Having therefore withdrawn from the region of Tyre and Sidon, He comes to Galilee and there heals the deaf-mute, whose affliction was from a demon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The Lord did not wish to stay in the parts of the Gentiles, lest He should give the Jews occasion to say, that they esteemed Him a transgressor of the law, because He held communion with the Gentiles, and therefore He immediately returns; wherefore it is said, And again departing from the coasts of Tyre, he came through Sidon, to the sea of Galilee, through the midst of the borders of Decapolis.

Which is rightly placed after the deliverance of one possessed with a devil, for such an instance of suffering came from the devil. There follows, And he took him aside from the multitude, and put his fingers into his ears.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
