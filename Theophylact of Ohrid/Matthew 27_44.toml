[[commentary]]
quote='''
The thieves also, which were crucified with Him, likewise reproached Him. The two thieves were symbolic of the two races, the Jewish and the Gentile, for both races had transgressed the law and reviled Christ, just as both these thieves at first reviled Him. But later the one thief understood Who He was and confessed Him as King; whereupon he also said, "Remember me, Lord, in Thy kingdom" (Lk. 23:42). So, too, did the Gentile race confess Christ, while the other thief, the Jewish race, blasphemed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
