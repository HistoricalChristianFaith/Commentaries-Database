[[commentary]]
quote='''
He did not say, "Declare unto John that I am He that cometh." But knowing that John had sent his disciples to see the miracles, He said, "Tell John what you see, and certainly he will use that opportunity to bear witness more fully to you concerning Me." By the words "the poor have the good tidings" understand either those preaching the Gospel, that is, the apostles, who were poor fishermen and despised as common lowly people, or those listening to the Gospel and hearing of the eternal good things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
