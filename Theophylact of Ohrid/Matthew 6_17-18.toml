[[commentary]]
quote='''
"But thou, when thou fastest, anoint thine head, and wash thy face; that thou appear not unto men to fast, but unto thy Father Who is in secret: and thy Father Who seeth in secret shall reward thee openly." Men of old would anoint themselves with oil after bathing as a mark of their joy and well-being. So you also, O reader, should appear joyful when you fast. The oil used to anoint we also understand to mean almsgiving. Our Head is Christ, Which we should anoint with deeds of mercy; and our face, that is our senses, we should wash with tears of repentance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
