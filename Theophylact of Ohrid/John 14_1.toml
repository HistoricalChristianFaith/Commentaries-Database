[[commentary]]
quote='''
When the apostles heard concerning the chief Peter that he would deny, naturally confusion fell upon them. Therefore the Lord comforts them and calms the confusion of their hearts. For if the chief and fervent Peter would deny three times before the rooster crows, obviously they should expect some great circumstance.

Then, the disciples as if said: "How can we not be troubled, when such difficulties will come upon us?" He answers: "Believe in God, and believe in Me," and all your difficulties will be resolved, and the trouble will be calmed through faith in God and in Me. Therefore He also said to them "let not your heart be troubled," so that by this very thing they would be assured that He sees the state of their heart and knows the hidden trouble, that He is God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
