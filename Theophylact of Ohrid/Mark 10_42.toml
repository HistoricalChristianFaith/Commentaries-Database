[[commentary]]
quote='''
But now Christ heals them, first calming them and drawing them near to Himself — which is what is meant by the word "summoning." Then He shows that seizing honor from others and striving for preeminence is a matter of paganism. For pagan rulers forcibly subject others to their authority.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Christ however cures them; first indeed by drawing them to Himself in order to comfort them; and this is meant, when it is said, But Jesus called them to him; then by showing them that to usurp honour, and to desire the chief place, belongs to Gentiles. Wherefore there follows: And saith unto them, Ye know that they which are accounted to rule over the Gentiles exercise lordship; and their great ones exercise authority over them. The great ones of the Gentiles thrust themselves into the chief place tyrannically and as lords. It goes on: But so shall it not be among you.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
