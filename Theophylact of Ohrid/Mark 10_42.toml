[[commentary]]
quote='''
But now Christ heals them, first calming them and drawing them near to Himself — which is what is meant by the word "summoning." Then He shows that seizing honor from others and striving for preeminence is a matter of paganism. For pagan rulers forcibly subject others to their authority.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
