[[commentary]]
quote='''
"He who is of God hears the words of God." Therefore, if you too were sons of God, you would not turn away from Me, the Son of God, who came down from heaven and exalts the words of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John'
