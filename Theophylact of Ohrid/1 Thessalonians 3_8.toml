[[commentary]]
quote='''
He did not say: we were comforted, but: "we live," showing by this that their stumbling he considers death for himself, and their progress, standing, and firmness in Christ – life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25203.html'
source_title='Commentary on 1 Thessalonians'
