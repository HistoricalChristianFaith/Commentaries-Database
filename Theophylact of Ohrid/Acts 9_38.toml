[[commentary]]
quote='''
The disciples who were in Joppa sent to Peter "asking him not to delay in coming to them." Notice the simplicity of the others and the complete absence of arrogance in Peter. They do not go themselves, but ask through two men for healing, and he comes. Why did they not call him while she was still alive? They considered it unworthy to trouble the disciples with this and to distract them and impose difficulties upon them in the work of preaching. This is precisely why Luke says that it was nearby.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25209.html'
source_title='Commentary on Acts'
