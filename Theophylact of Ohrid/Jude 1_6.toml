[[commentary]]
quote='''
And those who, having received the honor of angelic dignity, through negligence did not remain in their original state, but cast off the heavenly manner of life given to them by grace, God has hidden away in punishment for the judgment, that is, for the condemnation, of the great day; for this is what the word "keeps" means. Therefore the Lord also says: "Depart into the fire prepared for the devil and his angels" (Matt. 25:41).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Jude%2FJude.html'
source_title='Commentary on Jude'
