[[commentary]]
quote='''
Seeing that she insists on receiving, and urges Him to give, He says: "Call your husband," as if showing that he too must share with you in this gift of Mine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John'
