[[commentary]]
quote='''
Bethsaida and Chorazin, it seems, suffered from great unbelief, for which Christ also reproached them, as He says: "Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works which were done in you had been done in Tyre and Sidon, they would have repented long ago in sackcloth and ashes" (Mt. 11:21). Upon the Lord's arrival here, they bring a blind man to Him. But the faith of those who brought him was not pure, which is why the Lord leads the blind man out of the village, and only then heals him. He spits on the eyes of the blind man and lays His hands upon him, so that we may know that the Divine word and the action that follows the word can work miracles: for the hand is an image of action, and the spittle is an image of the word, since it comes forth from the mouth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For Bethsaida appears to have been infected with much infidelity, wherefore the Lord reproaches it, (Matt. 11:21) Woe to thee, Bethsaida, for if the mighty works which were done in you had been done in Tyre and Sidon, they would have repented long ago in sackcloth and ashes. He then takes out of the town the blind man, who had been brought to Him, for the faith of those who brought him was not true faith. It goes on; And when he had spit in his eyes, and put his hands upon him, he asked him if he saw ought.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
