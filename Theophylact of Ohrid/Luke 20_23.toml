[[commentary]]
quote='''
But the Lord escapes their snares like a "gazelle," for so the Bride called Him in the Song of Songs (Song 2:9), and He teaches that bodily subjection to the one who rules over our bodies, whether he be a king or a tyrant, in no way hinders us from spiritually pleasing the God of spirits.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But He escapes their snares, as it follows, Perceiving their craftiness, he said unto them, Why tempt ye me? show me a penny. Whose image and superscription has it?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
