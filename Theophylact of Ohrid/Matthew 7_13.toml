[[commentary]]
quote='''
"Enter ye in at the narrow gate: for wide is the gate and broad is the way that leadeth to destruction, and many there be which go in thereat." The narrow gate means both trials that are voluntarily undertaken, such as fasting and the like, and trials that are involuntarily experienced, such as imprisonment and persecution. Just as a man who is fat, or who is carrying a great load, cannot go in through a narrow gate, neither can a gourmandizer or a rich man. These go in through the wide gate. To show that narrowness is temporary and that width is likewise transitory, He calls them a "gate" and a "way." For the gate is hardship, and he who undergoes hardship passes through his hardship as quickly as he would pass through a gate. And the pleasures of the gourmandizer's feast are as transitory as any moment in a journey along a road. Since both are temporary, we ought to choose the better of the two.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
