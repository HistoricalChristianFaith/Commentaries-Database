[[commentary]]
quote='''
He did not simply say "love," but "exceedingly," as children love parents. For whoever loves Christ will also love His servant, whatever kind he may be, because through him he was deemed worthy of the dread Mysteries. If you have taken an honorable wife, do you not respect and love the one who brought her to you? You have received the Kingdom of Heaven, and you despise the one who brought it to you. Heed Paul: "for their work's sake," he says, love them. Some also read: "with them," that is, with the teachers. For he knew the possibility of the arising of displeasures against them. Since they rebuke and restrain them from evil, they are hated. Therefore one must "be at peace" with them, and moreover not in outward appearance, but within themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25205.html'
source_title='Commentary on 1 Thessalonians'
