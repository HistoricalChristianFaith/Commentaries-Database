[[commentary]]
quote='''
"Thrice I besought" — that is, "many times I besought." It also serves as a sign of his humility that he confessed he could not endure the snares of the devil and the sufferings, and asked for help.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%252012.html'
source_title='Commentary on 2 Corinthians'
