[[commentary]]
quote='''
The Jews were sons of the patriarchs by nature, yet were broken off by unbelief. All the more should you fear, you who are grafted in, whether God will spare you in the case of your fall.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252011.html'
source_title='Commentary on Romans'
