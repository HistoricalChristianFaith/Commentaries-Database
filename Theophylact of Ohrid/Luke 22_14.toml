[[commentary]]
quote='''
They ate the Passover standing; so how is it said of the Lord that He reclined? They say that, having eaten the lawful Passover, they then reclined afterward, according to the common custom, to eat whatever other foods there were.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But how is our Lord said to sit down, whereas the Jews eat the Passover standing? They say, that when they had eaten the legal Passover, they sat down, according to the common custom, to eat their other food.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
