[[commentary]]
quote='''
By "the second and third watch" you may understand different times of our life. I will explain with an example. Just as he who does not sleep "in the second and... third watch" is considered the most vigilant, for these hours of the night especially bring sleep upon people, and the deepest sleep at that: so understand, if you will, that in the various conditions of our life there are times which, if we are found watchful during them, make us blessed. Has someone seized your property? Have your children died? Has someone slandered you? If in such circumstances you were found watchful before God and Master and did not allow yourself to do anything contrary to His commandments, then He has truly found you watchful "in the second and... third watch," that is, in a difficult time, in which careless souls fall and fall asleep with the sleep of death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Or since the watches are the hours of the night which lull men to sleep, you must understand that there are also in our life certain hours which make us happy if we are found awake. Does any one seize your goods? Are your children dead? Are you accused? But if at these times you have done nothing against the commandments of God, He will find you watching in the second and third watch, that is, at the evil time, which brings destructive sleep to idle souls.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
