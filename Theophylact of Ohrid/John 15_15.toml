[[commentary]]
quote='''
As if He said, The servant knoweth not the counsels of his lord; but since I esteem you friends, I have communicated my secrets to you.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"I," He says, "love you so much that I have revealed to you ineffable mysteries. For I have communicated to you all that I heard from My Father."
How then does He say in another place (John 16:12): "I have many things to say to you, but you cannot bear them now"? He communicated to them everything that they were able to hear and that they could now understand. And when He says "all things that I have heard from My Father," do not think that He needs to be taught, but rather He shows that He proclaims nothing foreign, but only what belongs to the Father, and that all His words are the words of the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John'
