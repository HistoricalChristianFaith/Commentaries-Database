[[commentary]]
quote='''
When they could not persuade him, they fell silent, because they recognized that this was the will of God. It should be noted that one ought to restrain those who hinder someone from doing a noble deed, even if they weep. And these tears moved even Paul himself and weakened his resolve. Therefore he also rebukes them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252021.html'
source_title='Commentary on Acts'
