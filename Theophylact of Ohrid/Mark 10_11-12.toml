[[commentary]]
quote='''
The Lord answered them: whoever divorces his wife and marries another commits adultery with this second wife; likewise a wife who has left her husband and joined with another becomes an adulteress.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
