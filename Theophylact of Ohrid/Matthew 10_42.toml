[[commentary]]
quote='''
"And whosoever shall give to drink unto one of these little ones a cup of cold water only in the name of a disciple, verily I say unto you, he shall in no wise lose his reward." Lest anyone use poverty as an excuse, He says, "If you give even a cup of cold water because he is My disciple, you will receive a reward even for this." He who gives a cup of cold water is also he who teaches one burning with the fire of anger and desire and causes him to be named a disciple of Christ. The teacher will not lose his reward.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
