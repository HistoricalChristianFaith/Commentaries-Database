[[commentary]]
quote='''
Do you see what the suppers of Christ are like, how they are turned to the profit of souls and not to the stuffing of the belly? For look, He healed the man suffering from dropsy, He taught the Pharisees that doing good on the Sabbath is a good deed. Then, when He saw that they were making a commotion over sitting in the front seats, He heals this passion too, one arising not from a small cause but from a great and hard-to-avoid one, namely vainglory. And let no one consider the teaching about this to be trivial and unworthy of the majesty of God. For you could by no means call that physician benevolent who promises to cure gout and whatever serious disease there may be, but refuses to treat a bruised finger or a toothache. Moreover, how can one consider the passion of vainglory trivial when it troubles in every way those who love to sit in the front seats? Therefore it was necessary for the Teacher, the Author and Perfecter of humility — Christ — it was necessary to cut off every branch of this evil root: vainglory. Please also take this into consideration: if it had not been the time of the meal and the Lord had begun speaking about this, setting aside discussion of other matters, they could have reproached Him. But as it was, when it was the time of the supper and when the passion for preeminence was tormenting the wretches before the Savior's eyes, His admonition was most timely.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
