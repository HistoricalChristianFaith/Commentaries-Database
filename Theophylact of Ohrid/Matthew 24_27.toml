[[commentary]]
quote='''
For the coming of Christ needs no one to point it out, but it will be utterly clear to all, like the lightning. For just as the lightning is sudden and seen by all, so too will the Lord's coming be visible to everyone on earth. It will not be as in the first coming when He went about from place to place, but at the second coming He will appear in a twinkling of an eye.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
