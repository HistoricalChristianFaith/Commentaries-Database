[[commentary]]
quote='''
The pagans will be surprised (ξενίζονται) at you, that you do not participate with them in the same impiety. Therefore, after being surprised at your change and being perplexed, they will not only be put to shame, but will also speak evil; for piety is repulsive to a sinner. But they will not remain unpunished for such slander, and will give an answer to the Judge of all, Who for this purpose sits immovably and firmly. And that the Judge is the judge of the living and the dead, the apostle writes about further.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'
