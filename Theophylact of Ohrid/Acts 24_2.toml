[[commentary]]
quote='''
"To you… we owe much peace." You see how from the very first he predisposes the judge in his favor with praises, and how he tries to portray Paul as an innovator and troublemaker.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252024.html'
source_title='Commentary on Acts'
