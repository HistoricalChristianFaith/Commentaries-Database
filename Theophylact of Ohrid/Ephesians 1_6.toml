[[commentary]]
quote='''
Because, he says, He predestined us to adoption, He desired, strongly desired, strove (for this is what "good pleasure" means) to show the glory of His grace and His beneficence. But does God seek glory? Not at all: Divinity has need of nothing, yet desires glorification from us, so that we might love Him as much as possible. For he who marvels at the benefactions shown to him will strive not to offend his benefactor, and the more he remembers these good things, the more he will love the one who gave them. Thus, good pleasure (εὐδοκία) is the primary desire of God (the foundation of His other desires). For example: the first will of God is that no one should perish; the second will is that those who have become wicked should perish; because He truly does not punish out of necessity, but by His own volition. Thus, good pleasure is the primary will of God.
He did not say "graced" (echarisato), but "made gracious" (echaritōse), that is, He made us pleasant and beloved. Just as if someone, having encountered an old man covered with sores and worn out by hunger and ugly, were suddenly to make him into another person, comely and youthful, adorning him with every kind of gift, so too God, finding us morally disfigured and vile, made us pleasant and beautiful. "And the King shall desire," it says, "your beauty" (Ps. 44:12). "And He made us gracious in the Beloved Son," that is, through the Beloved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Ephesians%2FChapter%25201.html'
source_title='Commentary on Ephesians'
