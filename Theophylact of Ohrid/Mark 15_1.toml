[[commentary]]
quote='''
The Jews delivered the Lord to the Romans; therefore they themselves were delivered by the Lord into the hands of the Romans. And the words of Scripture were fulfilled: "Woe to the lawless one, for he shall be repaid according to the works of his hands" (Isa. 3:11); and again: "Repay them according to their deeds" (Ps. 28:4); and again: "As you have done, so shall it be done to you" (Obad. 1:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
They then gave Jesus up to the Romans, but were themselves given up by God into the hands of the Romans, that the Scriptures might be fulfilled, which say, Recompense them after the work of their hands. (Ps. 28:5) It goes on: And Pilate asked him, Art thou the King of the Jews?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
