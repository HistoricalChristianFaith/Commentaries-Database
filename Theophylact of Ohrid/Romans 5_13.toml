[[commentary]]
quote='''
The Apostle wants to prove that even those who did not eat from the forbidden tree and did not sin like Adam were, on account of his sin, also counted as having sinned and died. He proves this as follows: sin reigned before the giving of the law, that is, even before the law. But what sin was this? Was it sin from transgression of the law? But how could there be such sin when there was no law? Sin is imputed when there is a law, and people who transgress the law are necessarily called sinners.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25205.html'
source_title='Commentary on Romans'
