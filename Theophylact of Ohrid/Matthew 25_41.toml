[[commentary]]
quote='''
He sends those on the left into the fire which had been prepared for the devil. For as the demons are without compassion and are cruelly and maliciously disposed towards us, it is fitting that they who are of like mind with them, and who have been cursed by their own deeds, should merit the same punishment. See that God did not prepare the fire for men, nor did He make hell for us, but for the devil; but I make myself liable to hell.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
