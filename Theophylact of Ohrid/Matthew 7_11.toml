[[commentary]]
quote='''
"If ye then, being evil, know how to give good gifts unto your children, how much more shall your Father Who is in heaven give good things to them that ask Him?" He calls men evil by comparison with God, for our nature is good, being God's creation. But we become evil by our own choice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
