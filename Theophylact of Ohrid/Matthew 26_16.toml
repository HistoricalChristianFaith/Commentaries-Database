[[commentary]]
quote='''
"He sought an opportunity" to betray Him to them when He was alone, for they feared the multitude, and for this reason they paid Judas to inform them when Jesus would be alone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
