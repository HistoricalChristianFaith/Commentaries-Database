[[commentary]]
quote='''
Having said above that the Jews have a certain advantage, because the law was entrusted and committed to them, he now proves that they have no advantage by their deeds. For, as those who did not preserve what was entrusted to them, they will be subjected to great condemnation. Therefore, although they had a certain advantage, as chosen by God, yet since by their deeds they dishonored the One who honored them and chose them, they not only no longer have any advantage, but will also be subjected to greater condemnation.
He speaks as if from the person of the Jews: "What then? Do we have an advantage," do we surpass others, are we more pleasing to God than the rest, we Jews who received the law and circumcision? "Not at all." For the Jews, not to say more, sinned just as the Gentiles did. And from where is this evident? From the prophets, namely David and Isaiah.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25203.html'
source_title='Commentary on Romans'
