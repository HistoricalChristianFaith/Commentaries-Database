[[commentary]]
quote='''
He persuades even on the basis of prophecy and does not say that David said, but: "the Holy Spirit foretold through the mouth of David."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25201.html'
source_title='Commentary on Acts'
