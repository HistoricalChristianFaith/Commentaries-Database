[[commentary]]
quote='''
Blessed are ye, when men shall revile you and persecute you. He addresses the apostles directly, showing that it is especially the mark of a teacher to be reviled. And shall say all manner of evil against you falsely, for My sake. It is not simply he that is reviled who is blessed, but when he is reviled for Christ's sake, and falsely. If these two conditions are lacking, he is a wretch, as he has been a cause of temptation to many.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
