[[commentary]]
quote='''
After the miracle of the loaves, the Lord immediately departs to another place, fearing that the people, as a result of such a miracle, might revolt and decide to make Him king.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'
