[[commentary]]
quote='''
He shows here that He will rise again in glory, and sit at the right hand of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Why does He so often say to them, "I am going away, and you will seek Me"? In order to shake and terrify their souls. For see what concern they immediately fell into. Although they wanted to be rid of Him, asked Him to depart from them, and even wanted to kill Him, nevertheless they regarded the present circumstance as so important that they were thrown into perplexity by it.
"I am going away." He says this often, also in order to show that He knows beforehand about His death, and that the Cross is a matter not of their power, but of His own will. "I," He says, "am going away": you are not leading Me, but I go voluntarily.
"Where I go, you cannot come." By these words He shows that He will truly rise in glory and sit at the right hand of God, while they will die in their sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John'
