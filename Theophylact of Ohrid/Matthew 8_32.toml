[[commentary]]
quote='''
Christ granted the demons their request in order to show how great is their bitterness towards men, and that if they had the power, and were not prevented as they are by God, they would do worse things to us than they did to the swine. For God protects those possessed by demons so that they do not kill themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
