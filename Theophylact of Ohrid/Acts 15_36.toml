[[commentary]]
quote='''
It should be noted that it was the duty of leaders to care for those whom they had enlightened with the light of the Gospel — to examine whether they were sound in faith, whether they were faltering, and whether they needed to be corrected.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
