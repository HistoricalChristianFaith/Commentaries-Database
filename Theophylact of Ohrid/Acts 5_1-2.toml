[[commentary]]
quote='''
Intending to narrate what happened with Ananias and Sapphira, and wishing to show that they sinned, Luke first mentions a man who acted rightly — Joses. Despite such a multitude of persons who did the same — sold their possessions and gave the money to the apostles, despite such great signs and such an abundance of grace, Ananias drew no edification from all of this and brought destruction upon himself. But what is remarkable is that the transgression was by agreement with his wife, and no one else was a witness to the sale. This is where the idea arose in this wretched man to act as he did.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25205.html'
source_title='Commentary on Acts'
