[[commentary]]
quote='''
Then assembled together the high priests, and the scribes, and the elders of the people, at the palace of the high priest, who was called Caiaphas, and took counsel together that they might take Jesus by guile, and kill Him. But they said, Not on the feast, lest there be an uproar among the people. The law commanded that there be one high priest for life, but they, contrary to the law, had then the practice of making a new high priest each year, so that there were many. So they approached the high priest of that year to deliberate a murder with him whose duty it was to punish murderers. "The high priests" are those who had already fulfilled their year of service. Intending to commit this unholy murder, they were fearful, not of God, but of the multitude. For the high priests were afraid that if they murdered Jesus on the feast, the multitude would rise up in His defense, or that the people would refrain from offering the prescribed sacrifices on account of the murder, and so the high priests would lose the profit they gained from the sacrifices. Perhaps the high priests also feared that if He were murdered on the feast, His death would become all the more renowned and noteworthy; for they wished to erase all memory of Him. So in this manner they plotted before the feast to murder Him immediately after the feast. But He allows them to arrest Him at the time of Pascha, thus showing that He goes to His Passion not when they wished, but rather when He so desired. So that when the figurative Pascha took place, then it was that the true Pascha occurred. We can also understand from this the degree of their bloodthirstiness. For though they had not wished to slay Jesus on the feast, when they found the betrayer they did slay Jesus at that very time, forgetting even the multitude in their eagerness to accomplish their will.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
