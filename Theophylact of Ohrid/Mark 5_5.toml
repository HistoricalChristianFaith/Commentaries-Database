[[commentary]]
quote='''
The demoniac lived among the tombs, because the demon wanted to instill through this the false idea that the souls of the dead become demons, which one must by no means believe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'
