[[commentary]]
quote='''
But the Scribes used to come to women, who were left without the protection of their husbands, as though they were their protectors; and by a pretence of prayer, a reverend exterior and hypocrisy, they used to deceive widows, and thus also devour the houses of the rich. It goes on, These shall receive a greater damnation, that is, than the other Jews, who sinned.

Now there was a praiseworthy custom amongst the Jews, that those who were able and willing should put something into the treasury, for the maintenance of the priests, the poor, and the widows; wherefore there is added, And many that were rich cast in much. But whilst many people were so engaged, a poor widow came up, and showed her love by offering money according to her ability; wherefore it is said, And there came a certain poor widow, and she threw in two mites, which make a farthing.

Or else; That widow is the soul of man, which leaving Satan to which it had been joined, casts into the temple two mites, that is, the flesh and the mind, the flesh by abstinence, the mind by humility, that so it may be able to hear that it has cast away all its living, and has consecrated it, leaving nothing for the world of all that it possessed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Among the Jews there was preserved a particular custom, whereby those who had the means and the desire made contributions to the church treasury, which was called the "gazophylakion," from which the priests, the poor, and widows received their sustenance. While many were doing this, a widow also came forward and showed her zeal to be greater than that of the rich. Glory to Thee, O Christ, that Thou dost accept even what is small as better than what is great! Oh, if only my soul would become a widow, having renounced Satan, with whom it had been united through unseemly deeds, and would resolve to cast into the church treasury "two mites"—the flesh and the mind—having refined them, the flesh through abstinence and the mind through humility, so that I too might hear that I have devoted my whole life to God, having within me neither worldly thoughts nor fleshly impulses!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Commentary on Mark'