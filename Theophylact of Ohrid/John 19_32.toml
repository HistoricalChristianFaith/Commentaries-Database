[[commentary]]
quote='''
They ask for the legs to be broken for what reason? So that, even if they remain alive, they would be incapable of action (for they were robbers).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John'
