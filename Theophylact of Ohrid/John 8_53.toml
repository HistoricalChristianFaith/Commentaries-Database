[[commentary]]
quote='''
As if to say, Thou a person of no account, a carpenter's son of Galilee, to take glory to Thyself!
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The foolish ones, not understanding what kind of death the Lord was speaking of — that it would not touch those who believe in Him — say something senseless and foolish to Him. See how they answer: "Are You greater than our father Abraham?" They should have said: "Are You greater than God? Those who heard the word of God died, yet those who hear Yours will not die?" But they do not say this. Wishing to show that He is less even than Abraham, they say: "Are You greater than our father Abraham?"
The Lord Himself does not reveal to them what kind of death He spoke of. And that He is greater than Abraham, He demonstrates shortly after.
They say "what do You make Yourself out to be" as an insult. You, unworthy of a single word, Son of a carpenter, Galilean, whom do You make Yourself? Neither deeds, nor truth, nor the Scriptures, but You Yourself — whom do You make Yourself? For You Yourself appropriate glory to Yourself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John'
