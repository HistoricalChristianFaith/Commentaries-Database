[[commentary]]
quote='''
Since Luke said "in Solomon's Porch," lest you wonder how the crowd permitted this, he says that "none of the rest dared join them, but the people" of the Jews "magnified" the apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25205.html'
source_title='Commentary on Acts'
