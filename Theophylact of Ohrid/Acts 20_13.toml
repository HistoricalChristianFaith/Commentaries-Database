[[commentary]]
quote='''
He himself went on foot, giving them what was easier, while choosing for himself what was harder, and at the same time teaching them much and accustoming them to being separated from him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252020.html'
source_title='Commentary on Acts'
