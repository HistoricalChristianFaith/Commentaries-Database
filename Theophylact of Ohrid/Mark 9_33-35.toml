[[commentary]]
quote='''
The disciples, still having human thoughts, were arguing among themselves about which of them was greater and more honored by Christ. But the Lord, although He does not forbid the aspiration toward greater honor (for He commands us to desire the higher degrees), nevertheless does not permit us to seize primacy from others; on the contrary, He wants us to attain exaltation through humility.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Commentary on Mark'
