[[commentary]]
quote='''
Since the one reclining with the Lord said: "blessed is he who shall eat bread in the Kingdom of God," the Lord teaches him at considerable length how we ought to understand the feast of God, and delivers the present parable, calling His man-loving Father a man. For in Scripture, when an allusion is made to the punishing power of God, God is called a lion and a bear (in Church Slavonic — a panther, a leopard) (Hos. 13:7–8); but when the intention is to indicate some act of His love for mankind, then God is presented in the person of a man (Luke 15:11–24), just as in the present passage.
Since the parable speaks of the most philanthropic economy which God accomplished in us, having made us partakers of the Flesh of His Son, He is called a man. This economy is called a "great supper." It is called a "supper" because the Lord came in the last times and, as it were, at the "supper" of the age, and a "great supper" because the mystery of our salvation is undeniably great (1 Tim. 3:16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
