[[commentary]]
quote='''
Now when the even was come, He sat down with the twelve. And as they did eat, He said, Verily I say unto you, that one of you shall betray Me. And they were exceeding sorrowful, and began every one of them to say unto Him, Lord, is it I? From this some believe that the Lord did not eat the Pascha that year. For they say that only while standing was the Paschal lamb to be eaten. Yet Christ sat down; hence it could not have been the Pascha which He ate. But we might say that first He ate the Pascha standing, and then He sat down and gave them His own Mystery and Sacrament. For having first kept the Pascha in type, He then kept it in truth. He foretells the things that Judas would do, in order to correct him by making him ashamed of what he planned to do while they ate together, and by filling him with dread and awe as he realized that he was about to betray God Who knows the hearts of men. The other disciples were agonized, for though the conscience of each was clear, they put more trust in Christ than in themselves since He knew their hearts better than they did.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
