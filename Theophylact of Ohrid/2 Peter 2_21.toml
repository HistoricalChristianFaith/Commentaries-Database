[[commentary]]
quote='''
For this reason the apostle says that, given such a future for those who willingly return to evil, it would have been better for them not to have known the truth than, having known it, to fall into greater evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Peter%2FChapter%25202.html'
source_title='Commentary on 2 Peter'
