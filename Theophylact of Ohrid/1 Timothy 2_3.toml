[[commentary]]
quote='''
Prayer for all, both unbelievers and heretics, is what the word "this" points to. This is also "good" by nature, because we are all of one and the same nature, and it is also "pleasing" to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Timothy%2FChapter%25202.html'
source_title='Commentary on 1 Timothy'
