[[commentary]]
quote='''
The stars will fall from heaven, and the angelic powers "will be shaken," that is, they will be horrified, looking upon such an upheaval in the world and seeing their fellow servants being judged.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'
