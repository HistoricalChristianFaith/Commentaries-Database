[[commentary]]
quote='''
Taking advantage of the occasion, Mark inserts here an introductory discourse on the death of the Baptist. Some say that Herod took Herodias while Philip was still alive, and for this he was rebuked as a lawbreaker who had married the wife of his living brother. On the contrary, others maintain that Philip had already died, but left behind a daughter. And since Philip left a daughter, Herod should not have married his brother's wife even after his brother's death; for the Law commanded a brother to take his brother's wife only in the case when the latter had died childless. But in the present case a daughter remained; therefore, Herod's marriage was unlawful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The Evangelist Mark, taking occasion from what went before, here relates the death of the Forerunner, saying, For Herod himself had sent forth and laid hold upon John, and bound him in prison for Herodias' sake, his brother Philip's wife: for he had married her.

The law also commanded a brother to marry his brother's wife, if he died without children; but in this case there was a daughter, which made the marriage criminal: there follows, Therefore Herodias had a quarrel against him, and would have killed him; but she could not.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
