[[commentary]]
quote='''
Or to show others it. He was not ignorant of His disciple's heart Himself.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
He says this testing Philip, that is, wishing to reveal what faith he has. Without doubt, He asks Philip not because He Himself does not know his thoughts, but because He wishes to reveal them before the others. "For the Lord Himself knew what He was going to do."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John'
