[[commentary]]
quote='''
But Christ was silent, knowing that they would not heed His words, as Luke indeed observes that when they questioned the Lord, He said: "If I tell you, you will not believe; and if I also ask you, you will not answer Me" (Luke 22:67–68). The high priest again questions Jesus, not in order to learn the truth and believe, but to have some pretext for condemnation. To the words "Are You the Christ" (the Anointed One), he adds "the Son of the Blessed." For many were anointed, since both kings and high priests were called by this name, but none of them was the Son of God, eternally blessed and glorified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
