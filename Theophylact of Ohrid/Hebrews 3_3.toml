[[commentary]]
quote='''
Here too is the superiority that the Lord has over Moses. He says that Moses too was faithful in all his house, that is, among the people, yet he himself was one of that house: he too was a man, like the rest; although holy, he was a servant together with them; just as stewards in households, although they surpass the others, are nevertheless servants together with them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25203.html'
source_title='Commentary on Hebrews'
