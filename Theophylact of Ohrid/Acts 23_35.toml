[[commentary]]
quote='''
"In Herod's praetorium." It is noteworthy that in Caesarea there was a praetorium of Herod.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252023.html'
source_title='Commentary on Acts'
