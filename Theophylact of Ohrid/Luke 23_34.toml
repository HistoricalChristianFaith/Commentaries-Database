[[commentary]]
quote='''
Jesus, displaying extraordinary meekness, prays for them, saying: "Father! forgive them, for they know not what they do." And indeed, this sin would have been forgiven them, had they not after this remained in unbelief.
Why do they divide His garments? Perhaps many were in need of them, or perhaps (which is more likely) they did this out of insolence and with the intention of mocking Him. For in their view, what was precious about these garments? Thus, they did this as a form of mockery and insult.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
For perhaps many of them were in want. Or perhaps rather they did this as a reproach, and from a kind of wantonness. For what treasure did they find in His garments?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Catena Aurea by Aquinas'
