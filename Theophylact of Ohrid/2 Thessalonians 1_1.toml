[[commentary]]
quote='''
And in the first epistle there is the same beginning. Therefore, all that we said there, apply here.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Thessalonians%2FChapter%25201.html'
source_title='Commentary on 2 Thessalonians'
