[[commentary]]
quote='''
But not only those who are gifted with the grace of teachers, but private individuals also He requires to become like salt, useful to those around them. But if he who is to be useful to others becomes reprobate, he cannot be profited, as it follows, But if the salt has lost his savour, where-with shall it be seasoned?

But because His discourse was in parables and dark sayings, our Lord, in order to rouse His hearers that they might not receive indifferently what was said of the salt, adds, He that hath ears to hear, let him hear, that is, as he has wisdom let him understand. For we must take the ears here as the perceptive power of the mind and capacity of understanding.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
A disciple of Christ must be "salt," that is, he must not only be good in himself and free from evil, but must also communicate goodness to others. For such is salt. It, itself remaining unharmed and free from corruption, preserves from corruption other things to which it imparts this property. But if salt loses its natural power, it is of no use for anything, "it is fit neither for the land nor for the dunghill." These words have the following meaning: I desire that every Christian be useful and able to edify, not only the one entrusted with the gift of teaching, such as the apostles, teachers, and pastors, but I require that the laypeople themselves also be fruitful and useful to their neighbors. But if the one who is supposed to serve for the benefit of others is himself worthless and falls from the condition befitting a Christian, then he will be able neither to give benefit nor to receive benefit. "It is fit neither for the land nor for the dunghill," it says. The word "land" hints at receiving benefit, and the word "dunghill" at giving benefit. Therefore, as one who neither serves for benefit nor receives benefit, he must be rejected and cast out.
Since the speech was obscure and parabolic, the Lord, rousing the listeners so that they would not take what He said simply about salt, said: "He who has ears to hear, let him hear," that is, he who has a mind, let him understand. For by "ears" here one must understand the perceptive faculty of the soul and the capacity for understanding. Thus, every one of us believers is salt, having received this property from the Divine words and from grace above. And that grace is salt, listen to the Apostle Paul: "Let your speech be always with grace, seasoned with salt" (Col. 4:6), so that speech, when it is without grace, may be called unsalted. Therefore, if we neglect this property of the Divine words and do not receive it into ourselves and do not make it our own, then we shall be foolish and senseless, and our salt has truly lost its strength, as not possessing the property of heavenly grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
