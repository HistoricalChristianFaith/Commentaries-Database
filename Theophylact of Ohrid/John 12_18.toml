[[commentary]]
quote='''
Therefore those who had heard of the performance of this miracle also met Him with glory, that is, they believed; for if they had not believed, they would not have changed so quickly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John'
