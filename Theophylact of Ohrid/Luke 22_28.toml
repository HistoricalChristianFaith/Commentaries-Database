[[commentary]]
quote='''
Having said "woe" to the one betraying Me, and meanwhile having taught them (the disciples) that one must be humble-minded, the Lord, just as He assigns "woe" as the portion of the betrayer, so conversely He says to them: but you are those who have continued with Me in My trials; therefore I also bequeath to you a recompense, that is, I make a covenant with you, so that — just as My Father bequeathed to Me, that is, appointed a Kingdom for Me — you also may eat and drink at My table.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
As the Lord had denounced woe to the traitor, so on the other hand to the rest of the disciples He promises blessings, saying, Ye are they which have continued with me, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
