[[commentary]]
quote='''
"And none of you asks Me: 'Where are You going?'" For from sorrow you were confounded and thrown into a frenzy; your hearts were shaken by the expectation of calamities.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John'
