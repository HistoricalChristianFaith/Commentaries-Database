[[commentary]]
quote='''
Our Lord remonstrates with them; Many good works have I showed you from My Father, showing that they had no just reason for their anger.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The Lord, reproving them and showing that they have no reasonable cause for their fury against Him, but rage in vain, reminds them of the miracles He performed and says: "I have shown you many good works; for which of them do you wish to stone Me?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John'
