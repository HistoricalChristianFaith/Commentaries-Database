[[commentary]]
quote='''
When they entered inside, two men appear to them. One, mentioned by Matthew (Matt. 28:2), was sitting on the stone, while these two men stood inside the tomb. These are different visions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'
