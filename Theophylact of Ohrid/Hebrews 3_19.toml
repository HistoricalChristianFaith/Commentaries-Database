[[commentary]]
quote='''
From this we see that the disobedient did not enter; that is, the punishment for sin is before our eyes and is acknowledged by all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25203.html'
source_title='Commentary on Hebrews'
