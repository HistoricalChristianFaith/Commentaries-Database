[[commentary]]
quote='''
He could have said nothing that would have revealed his humility more than his appeal to the testimony of the brethren. He does not speak of what the Angel said to Cornelius: "your prayers and your alms" (Acts 10:14), nor does he recount the righteousness of this man, nor does he report that he did so because the Spirit sent him, that God commanded him, having called him from there through an Angel, but confirms with the words "These six brothers also went with me." Because this in itself was undeniable proof.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252011.html'
source_title='Commentary on Acts'
