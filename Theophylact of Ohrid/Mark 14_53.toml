[[commentary]]
quote='''
The law commanded that the Jews should have one high priest for his entire life; yet at that time they had many high priests, who one after another each year purchased their authority from the Romans. Thus the evangelist calls "high priests" those who, having served for some time in the high priesthood, had left it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Though the law commanded that there should be but one High Priest, there were then many put into the office, and stripped of it, year by year, by the Roman emperor. He therefore calls chief priests those who had finished the time allotted to them, and had been stripped of their priesthood.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
