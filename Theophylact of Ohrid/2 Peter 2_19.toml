[[commentary]]
quote='''
They themselves, he says, being slaves of the aforementioned impurity, which he rightly also called corruption, promise freedom to those they deceive. And as to why they promise freedom to others while themselves being slaves of sin, he brings forth a fine proof of this: whoever is overcome by any passion is also a slave to it. But this will be explained more fully further on.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Peter%2FChapter%25202.html'
source_title='Commentary on 2 Peter'
