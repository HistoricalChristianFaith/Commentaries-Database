[[commentary]]
quote='''
Having said this and diminished their fear of being unlearned, the Lord brings up yet another circumstance, both necessary and capable of shaking their souls, namely: that they will be betrayed by friends and relatives. He foretells this circumstance so that, should it happen suddenly, it would not confound them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
