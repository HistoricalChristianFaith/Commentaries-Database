[[commentary]]
quote='''
Having said this and diminished their fear of being unlearned, the Lord brings up yet another circumstance, both necessary and capable of shaking their souls, namely: that they will be betrayed by friends and relatives. He foretells this circumstance so that, should it happen suddenly, it would not confound them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Having in what has gone before dispelled the fear of inexperience, He goes on to warn them of another very certain event, which might agitate their minds, lest falling suddenly upon them, it should dismay them; for it follows, And ye shall be betrayed both by parents, and brethren, and kinsfolk, and some of you shall they cause to be put to death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
