[[commentary]]
quote='''
Then his lord, after he had called him, said unto him, O thou wicked servant, I forgave thee all that debt, because thou desiredst me: shouldest not thou also have had compassion on thy fellowservant, even as I had pity on thee? And his lord was wroth, and delivered him to the tormentors, till he should pay all his debt. The master in his love for mankind takes issue with the servant, to show that it is not the master, but the savagery and the ingratitude of the servant that has revoked the gift. To what tormentors does he deliver him? To the punitive powers for eternal punishment. For the meaning of "till he should pay all his debt" is this: "let him be punished till that he should pay all that was due." But he will never be able to pay his debt, and therefore his punishment will never end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
