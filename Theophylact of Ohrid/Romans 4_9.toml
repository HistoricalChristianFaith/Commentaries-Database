[[commentary]]
quote='''
If, he says, blessedness belongs to the one whom the Lord does not impute sin to, that is, to the one who is justified, and Abraham was justified, then he most certainly received blessedness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25204.html'
source_title='Commentary on Romans'
