[[commentary]]
quote='''
"You will not allow Your Holy One to see corruption." The body of the Lord and Savior Christ is called incorruptible and immortal, because it is clear that it possessed the property of incorruption from the time of the incarnation itself, since Christ was sinless.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
