[[commentary]]
quote='''
Here, together with Saul's ordination, his name is also changed. He was renamed so that in this respect too he would be no less than the apostles. And as for the preeminence that the chief of Christ's disciples, Peter, had, Paul too, it seems, enjoyed the same esteem and had occasion to win even greater favor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
