[[commentary]]
quote='''
They "were talking with each other about all these events" not as believers, but as people perplexed and amazed by the extraordinary occurrences, and not quickly able to come to terms with such a wondrous phenomenon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But the disciples above mentioned talked to one another of the things which had happened, not as believing them, but as bewildered at events so extraordinary.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
