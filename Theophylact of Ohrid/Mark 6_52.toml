[[commentary]]
quote='''
As for the apostles, not having recognized Christ from the miracle of the loaves, they recognized Him from the present miracle on the sea. Therefore one may suppose that Christ allowed them to be in danger also so that, not having recognized Him from the miracle of the loaves, they might now recognize Him from the miracle on the sea and derive benefit for themselves from it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Great indeed is the miracle of our Lord's walking on the sea, but the tempest and the contrary wind were there as well, to make the miracle greater. For the Apostles, not understanding from the miracle of the five loaves the power of Christ, now more fully knew it from the miracle of the sea. Wherefore it goes on, And they were sore amazed in themselves. For they understood not concerning the loaves.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
