[[commentary]]
quote='''
The Lord sees that it is on their mind to ask and learn where He is going. Therefore He gives them an occasion to ask about this. "You," He says, "know where I am going, and the way you know." And by this He leads them to the question.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
