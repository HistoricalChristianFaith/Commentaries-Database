[[commentary]]
quote='''
His words have this meaning: if those who received deification by grace are gods (Ps. 81:6), and this is not imputed to them as a fault, then what justice is there when you condemn Me, Who am God by nature, Whom the Father sanctified, that is, set apart for sacrifice for the world? For that which is set apart for God is called holy. Clearly, when the Father sanctified Me and appointed Me for the salvation of the world, I am not equal to the other gods, but am the true God. And if those to whom the Word of God came — that is, I, for I am the Word of God, and having dwelt in them, I granted them adoption — if they are gods, then all the more can I call Myself God without any fault, I Who am God by My very Nature and grant deification to others.
Let the Arians and Nestorians be put to shame by these words. For Christ is the Son of God and God by Essence and Nature, and not a creature, and He grants deification to the rest, to whom the Word of God came, and is not Himself deified by grace. Clearly, by these present words He distinguishes Himself from those deified by grace and shows that He, being the Word of God and having dwelt in them, bestowed deification upon them. For this is what is meant by the words "to whom the Word of God came" — with whom it was, in whom it dwelt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John'
