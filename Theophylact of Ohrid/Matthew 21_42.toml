[[commentary]]
quote='''
The stone means Christ Himself; the builders are the teachers of the Jews who rejected Him as if He were useless, saying, "Thou art a Samaritan and hast a demon." But when He rose from the dead, He was set in place as the head of the corner, that is, He became the head of the Church, joining Jews and Gentiles in one faith. For as the stone which forms the corner of a building makes continuous the walls leading to it and from it, so Christ has bound all together in one faith. This corner is marvelous, and is the Lord's doing (Ps. 117:22-23). For the Church which connects us and makes us one in faith is the Lord's doing, and is worthy of all wonder, so well is it built. And in another sense is it marvelous, because the Word of Christ has been confirmed and substantiated by marvels, that is, miracles, so that the composition of the Church is marvelous.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
