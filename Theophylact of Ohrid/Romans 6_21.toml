[[commentary]]
quote='''
And what fruit did you have from impurity? None, except dishonor — and why do I speak of dishonor? You had death as your fruit: "for the end of those things is death," both bodily very often, and spiritual always. But from death you have been delivered by the grace of Christ, and the shame still remains not without benefit; for now you are ashamed of those sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25206.html'
source_title='Commentary on Romans'
