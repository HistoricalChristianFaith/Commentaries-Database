[[commentary]]
quote='''
Therefore He endures mockery and beatings, and though He is the Master of the prophets, He is mocked as a false prophet. For the words "prophesy" to us, "who is the one who struck You," were meant to mock Him as an impostor who claims for Himself the gift of prophecy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'
