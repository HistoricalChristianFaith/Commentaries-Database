[[commentary]]
quote='''
Therefore He endures mockery and beatings, and though He is the Master of the prophets, He is mocked as a false prophet. For the words "prophesy" to us, "who is the one who struck You," were meant to mock Him as an impostor who claims for Himself the gift of prophecy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Likewise the Lord of prophets is derided as a false prophet. It follows, And they blindfolded him. This they did as a dishonour to Him who wished to be accounted by the people as a prophet. But He who was struck with the blows of the Jews, is struck also now by the blasphemies of false Christians. And they blindfolded Him, not that He should not see their wickedness, but that they might hide His face from them. But heretics, and Jews, and wicked Catholics, provoke Him with their vile actions, as it were mocking Him, saying, Who smote thee? while they flatter themselves that their evil thoughts and works of darkness are not known by Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
