[[commentary]]
quote='''
At first they were even offended that I preached the resurrection, because after this preaching it was easy to add also what pertains to Christ — that He rose from the dead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252024.html'
source_title='Commentary on Acts'
