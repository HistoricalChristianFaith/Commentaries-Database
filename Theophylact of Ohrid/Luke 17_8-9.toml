[[commentary]]
quote='''
By this parable it is declared that one must not boast of any attainment, not even of the fulfillment of all the commandments. For upon a servant lies the necessary obligation to carry out the orders of his master, yet the fulfillment of them should not be reckoned to him as a virtue. For if the servant does not do his work, he is worthy of blows; but when he has done it, let him be content that he has escaped blows, and should not for this necessarily demand payment. For to pay him, and especially to give him something as a gift, depends on the generosity of the master.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke'
