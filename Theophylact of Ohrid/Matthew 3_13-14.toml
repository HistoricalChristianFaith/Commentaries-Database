[[commentary]]
quote='''
Then cometh Jesus from Galilee to Jordan unto John, to be baptized of him. But John forbade Him. Jesus is pure, yet He is baptized in order to wash us, and to show us that if we intend to be baptized we must first be cleansed. Otherwise we might stain our baptism, being easily sullied afterwards because of our evil habits. John forbade Him so that those who saw the baptism would not think that Christ was being baptized unto repentance like one of the multitude. Saying, It is I that needeth to be baptized of Thee. The Forerunner was in need of cleansing by the Lord; for as he was descended from Adam, he too carried with him the stain of disobedience. But when Christ took flesh, He cleansed all mankind. And comest Thou to me? John did not dare to say, "Art Thou baptized by me?" but "Comest Thou to me?" such reverence did he have for the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
