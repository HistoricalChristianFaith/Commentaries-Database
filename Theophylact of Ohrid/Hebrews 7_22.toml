[[commentary]]
quote='''
That is, since He swore that He would always be a priest. For He would not have sworn if He were not superior. Hence the New Testament is also superior to the Old.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25207.html'
source_title='Commentary on Hebrews'
