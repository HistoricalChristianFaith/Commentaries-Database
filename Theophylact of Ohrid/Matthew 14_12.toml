[[commentary]]
quote='''
The body of the Baptist was buried in Sebaste Caesarea. But his precious head was buried the first time in Emesa. "And they went and told Jesus." What did they tell Jesus? Not that John had died, for the account of John's death was given parenthetically. But rather, they told Jesus what Herod was saying about Him, that Jesus was John.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
