[[commentary]]
quote='''
At what "time" was that? During the reign of Emperor Claudius. For the Roman Emperor Claudius appointed Agrippa as king of the Jews, having banished Herod together with Herodias to Lugdunum, a Galilean city. This is the same Herod under whom John suffered, as Josephus and Eusebius recount. So this discrepancy in the name, that is, Herod being said instead of Agrippa, occurred either because he bore two names, or from a scribal error.

"On some of those belonging to the church." Note that he calls the faithful men and the society composed of them the church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252012.html'
source_title='Commentary on Acts'
