[[commentary]]
quote='''
The law commanded that there be one high priest for life, but they, contrary to the law, had then the practice of making a new high priest each year, so that there were many. So they approached the high priest of that year to deliberate a murder with him whose duty it was to punish murderers. "The high priests" are those who had already fulfilled their year of service.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
