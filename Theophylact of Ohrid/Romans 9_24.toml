[[commentary]]
quote='''
And he did not say: He saved all the Gentiles, but: "from among the Gentiles," that is, some. Therefore do not be offended, O Jew. Behold, even among the Gentiles some receive mercy, and others do not.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25209.html'
source_title='Commentary on Romans'
