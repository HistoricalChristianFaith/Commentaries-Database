[[commentary]]
quote='''
He retired then as the custom was on the sabbath-day about evening to eat in His disciples' house. But she who ought to have ministered was prevented by a fever. Wherefore it goes on, But Simon's wife's mother was lying sick of a fever.

By this it is signified, that God will heal a sick man, if he ministers to the Saints, through love to Christ.

But he has a fever who is angry, and in the unruliness of his anger stretches forth his hands to do hurt; but if reason restrains his hands, he will arise, and so serve reason.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Toward evening on the Sabbath, as was customary, the Lord went to the house of the disciples to take a meal. Meanwhile, she who was supposed to serve on this occasion was seized with a fever. But the Lord heals her, and she begins to serve them. These words let you know that you too, when God heals you from illness, should use your health for serving the saints and for pleasing God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title='Commentary on Mark'