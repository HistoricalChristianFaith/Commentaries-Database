[[commentary]]
quote='''
John was related to Jesus, in the following manner. Joseph, the Betrothed of the most pure Theotokos, had seven children by his previous wife—four sons, and three daughters whose names were Martha, Esther, and Salome. John was the son of Salome; therefore, Jesus was John’s uncle. Because Salome was the daughter of Joseph—the "father of the Lord"—she was considered to be the Lord’s sister; and her son, John, the Lord’s nephew. Salome means "peaceful"; John means "the grace of her." May every soul understand that Christ’s peace, which is offered to all men, calms the passions of the soul, and gives birth to divine grace within us. But a soul in turmoil, always battling with others and with itself, cannot be counted worthy of divine grace. Consider another marvelous thing about John. Only he is said to have three mothers: first, Salome, his natural mother; second, thunder, for he is a "son of thunder" (Mk 3:17), on account of his powerful proclamation of the Gospel ; and third, Mary, the Theotokos, concerning whom the Lord said to John, "Behold thy mother" (Jn 19:27).
'''
source_url='https://web.archive.org/web/20220629013331/https://www.johnsanidopoulos.com/2010/12/preface-to-four-gospels-by-saint.html'
source_title='Preface to the Four Gospels'

[[commentary]]
quote='''
Why is Mary of Cleopas called the sister of His Mother, when Joachim had no other child? Cleopas was a brother of Joseph. When Cleopas died childless, according to the account of some, Joseph took his wife for himself and begat children for his brother. One of them is the Mary now mentioned. She is called a sister of the Theotokos, that is, a relative. For Scripture has the custom of calling kinsmen brothers. For example, Isaac says of Rebekah that she is his sister, although she was his wife. So here too the reputed daughter of Cleopas is called the sister of the Theotokos by kinship.
In the Gospels there appear four Marys: one is the Theotokos, who is called the Mother of James and Joses, for they were children of Joseph, born from his first wife, perhaps the wife of Cleopas. The Theotokos is called their Mother, as a stepmother, for She was considered the wife of Joseph. Another is the Magdalene, from whom the Lord cast out seven demons; the third is the wife of Cleopas, and the fourth is the sister of Lazarus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John'