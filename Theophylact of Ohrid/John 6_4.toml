[[commentary]]
quote='''
The persecutions of the Jews gave Him reason for retiring, and thus setting aside the Law. The truth being now revealed, types were at an end, and He was under no obligation to keep the Jewish feasts. Observe the expression, a feast of the Jews, (Mat. 14:13) not a feast of Christ.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"The Passover, the feast of the Jews, was near," he says. And yet He does not go to it, but withdraws into Galilee, because He was no longer subject to the ordinances of the law, so as to observe the legal feasts.
And in another sense: since the malice of the Jews was pursuing Him, He, having found occasions, little by little weakens the law; the type has ceased.
Note this also: "a feast of the Jews." It was not a feast of Christ, since Christ did not go to it, but only the Jews alone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John'
