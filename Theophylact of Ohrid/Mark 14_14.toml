[[commentary]]
quote='''
The "master of the house" is the mind, which shows a "large upper room" — the loftiness of its thoughts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Or else, the lord of the house is the intellect, which points out the large upper room, that is, the loftiness of intelligences, and which, though it be high, yet has nothing of vain glory, or of pride, but is prepared and made level by humility. But there, that is, in such a mind Christ's Passover is prepared by Peter and John, that is by action and contemplation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
