[[commentary]]
quote='''
For it is not the flesh of man simply, but of God: and it makes man divine, by inebriating him, as it were, with divinity.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The Jews, having heard about the eating of the Lord's Flesh, do not believe; therefore they also utter the word of unbelief, "how?" For when thoughts of unbelief enter the soul, then the word "how?" also enters along with them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John'
