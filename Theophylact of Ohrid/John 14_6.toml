[[commentary]]
quote='''
When thou art engaged in the practical, He is made thy way; when in the contemplative, He is made thy truth. And to the active and the contemplative is joined life: for we should both act and contemplate with reference to the world to come.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Therefore Christ, wishing to show that following Him is easy and pleasant for them, declares where He is going and what the way is. He goes to the Father, and the "way" is He Himself – Christ. If the way am I, then through Me you will undoubtedly ascend to the Father. I am not only the way, but "also the truth"; therefore you must be vigilant, because by Me you will not be deceived. I am also "the life"; therefore, even if you die, death will not prevent you from coming to the Father. So be watchful, for everyone comes to the Father through Me. And since it is in My power to bring you to the Father, you will undoubtedly come to Him. For it is impossible to arrive there by any other way than through Me.

And you, perhaps, may understand from this as well that the Son is equal to the One who begot Him. For in another place He says that the Father brings people to Him: "No one can come to Me unless the Father draws him" (John 6:44). But here He says that He brings people to the Father. Therefore, the power of the Father and the Son is equal, for their action is also one.

So when you walk by the path of action, then Christ becomes the way for you, and when you engage in contemplation, He becomes the truth for you. But since many, walking by the path of action and engaging in contemplation, still did not obtain life — either because, performing virtue out of vainglory, they received their reward here, or because in their dogmatic opinions they strayed from the right path — therefore to the way and truth, that is, to action and contemplation, life is added. For this reason we too must walk and theologize, striving for the glory that lives forever, and not for the perishing glory that comes from men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
