[[commentary]]
quote='''
Above he gave a promise to come to them. In the meantime he still needed to delay. Therefore, lest they think he was mocking them, he states the reason for his delay and says: "I go to Jerusalem to minister to the saints." He did not say: carrying alms with me, but: "to minister," so that we might learn how lofty, by whom it is performed, and how important this is.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252015.html'
source_title='Commentary on Romans'
