[[commentary]]
quote='''
Explaining to us how one who believes in Him can perform great and wondrous deeds, He says: "If you ask anything in My name." Here He shows us the manner of working miracles: anyone can work miracles through petition and prayer and the invocation of His name. So too the apostles said to the lame man: "In the name of Jesus Christ, rise up and walk" (Acts 3:6). Therefore He did not say "whatever you ask, I will entreat the Father, and He will do it," but rather "I will do it," showing His own authority.

For when a son is shown to possess great power, then glory also comes to the one who begot such a son. See, then, how glory flows to the Father. Miracles were performed in the name of our Lord Jesus Christ; because of the miracles, people believed the preaching of the apostles; and finally, advancing to the knowledge of God, they came to know the Father, and thus He was glorified in the Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
