[[commentary]]
quote='''
It should be noted that in these cities Luke was also with Paul. This is evident from the fact that the latter unites his own person with the former, when he says: "we resolved to set out... we sailed a straight course... we stayed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252016.html'
source_title='Commentary on Acts'
