[[commentary]]
quote='''
During these hours, of course, the Lord also appeared to Simon, while these two men were making their way back to Jerusalem.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'
