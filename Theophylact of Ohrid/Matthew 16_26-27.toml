[[commentary]]
quote='''
For what is a man profited, if he shall gain the whole world, and lose his own soul? Or what shall a man give in exchange for his soul? For the Son of Man shall come in the glory of His Father with His angels; and then He shall reward every man according to His works. Let us suppose, He says, that you have gained the whole world: what profit is it if your body prospers while your soul suffers ill? That would be as if the lady of the house dressed in tattered rags, while her maidservants were gorgeously arrayed. For in the age to come a man can give nothing in exchange for his soul. Here one can give tears, sighs, and alms, but there, nothing. For it is a Judge who takes no bribes that will receive us, and He judges each one according to his deeds. But He is also awesome and dreadful, and comes in His glory with His angels, not in lowly form.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
