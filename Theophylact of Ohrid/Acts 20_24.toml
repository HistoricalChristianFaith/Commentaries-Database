[[commentary]]
quote='''
Why then do you go, if "bonds and afflictions" await you? In order to be a prisoner for Christ, in order to die for Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252020.html'
source_title='Commentary on Acts'
