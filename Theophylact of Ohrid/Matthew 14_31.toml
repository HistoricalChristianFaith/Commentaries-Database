[[commentary]]
quote='''
Showing that the cause of his sinking was not the wind but faintheartedness, Christ does not rebuke the wind, but the fainthearted Peter. This is why He raised him up and set him on the water, but allowed the wind to blow. Peter did not doubt in everything, but in part. Inasmuch as he was afraid, he showed lack of faith; but by crying out, "Lord, save me," he was healed of his unbelief. This is why he hears the words "O thou of little faith" and not "O thou of no faith." See also how Peter's later denial, return, and repentance were prefigured by what happened to him here on the sea. Just as there he says boldly, "I will not deny Thee," so here he says, "Bid me to come on the water." And just as then he was permitted to deny, so now he was permitted to sink. Here the Lord gives His hand to him and does not let Him drown, but there, by Peter's repentance, Christ drew him out of the abyss of denial.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
