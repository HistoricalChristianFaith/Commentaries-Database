[[commentary]]
quote='''
For he was told: "Go with them, doubting nothing; for I have sent them." Great is the authority of the Spirit, because what God the Father does, the same does the Holy Spirit also. The angel said: "Your prayers and your alms" (v. 4), to show that he was sent from there; but the Spirit does not act this way, but says: "For I have sent them." Therefore, one must obey the Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
