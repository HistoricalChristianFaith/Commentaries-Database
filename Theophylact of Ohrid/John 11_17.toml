[[commentary]]
quote='''
The Lord deliberately delayed until Lazarus had been dead four days, then went, so that the miracle would be from every side free from slander.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John'
