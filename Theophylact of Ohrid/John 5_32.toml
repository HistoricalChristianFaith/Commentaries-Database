[[commentary]]
quote='''
"I," He says, "have three witnesses: John, My works, and My Father." He puts forward John first.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John'
