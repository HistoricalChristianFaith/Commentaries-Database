[[commentary]]
quote='''
Now the first day of the feast of unleavened bread the disciples came to Jesus, saying unto Him, Where wilt Thou that we prepare for Thee to eat the Pascha? And He said, Go into the city to such a man, and say unto him, The Master saith, My time is at hand; I will keep the Pascha at thy house with My disciples. And the disciples did as Jesus had appointed them; and they made ready the Pascha. He says, "The first day of the feast of the unleavened bread," meaning "the day before the feast of the unleavened bread," as we would say it. They intended to eat the Pascha on Friday evening, which was called "the feast of the unleavened bread." The Lord, therefore, sends the disciples on Thursday, which the evangelist calls "the first day of the feast of the unleavened bread," being the day before the Friday on the evening of which they would eat the unleavened bread. The disciples then approach and ask, "Where wilt Thou that we prepare for Thee to eat the Pascha?" For neither they, nor He, had their own house. He sends them to a man whom they did not know and who did not know them, just as He had done before entering Jerusalem when He sent them to find the ass, showing them that He is able by His words alone to persuade even those who do not know Him at all to accept Him. He wanted to keep the Pascha, lest He appear opposed to the law. He calls His slaying His "time," so that we may learn that He was not slain unknowingly or unwillingly. And to the words, "I will keep the Pascha at thy house," He adds "with My disciples," so that there would be sufficient preparation for the large number of those who intended to eat.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
