[[commentary]]
quote='''
Then, in order to remove the fear that comes with humility, he says: do not be afraid, but cast all your care upon the Lord, for He cares, that is, He is concerned about all this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25205.html'
source_title='Commentary on 1 Peter'
