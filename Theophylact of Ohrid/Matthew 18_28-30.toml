[[commentary]]
quote='''
But the same servant went out, and found one of his fellow-servants, who owed him an hundred pence: and he laid hands on him, and took him by the throat, saying, Pay me that thou owest. And his fellowservant fell down at his feet, and besought him, saying, Have patience with me, and I will pay thee all. And he would not: but went and cast him into prison, till he should pay the debt. He who had been forgiven "went out," departed, and as a consequence, took his fellow servant by the throat: the one who lacks compassion is not he who remains in God, but rather he who departs from God and is a stranger to Him. So great was the servant's inhumanity that, although he had been forgiven the greater amount (ten thousand talents), he could not at all forgive the smallest amount (a hundred pence), nor even grant a postponement. And this despite the fact that the fellow servant spoke the very same words to him, reminding him of the words by which he himself had been saved: "Have patience with me and I will pay thee all."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
