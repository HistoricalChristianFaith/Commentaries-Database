[[commentary]]
quote='''
The disciples did not allow Paul to rush into the agitated crowd — so much did all the believers love him. And Paul listens to them, since he was not ambitious.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252019.html'
source_title='Commentary on Acts'
