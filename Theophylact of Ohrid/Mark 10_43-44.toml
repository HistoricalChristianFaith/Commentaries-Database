[[commentary]]
quote='''
But My disciples, He says, are not so: rather, whoever among them wishes to be great, let him serve all, because this too is a mark of a great soul — to endure from all and to serve all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
