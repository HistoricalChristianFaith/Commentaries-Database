[[commentary]]
quote='''
But see, as we also said at the beginning, out of ten men nine, although they were Israelites, remained ungrateful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But out of the ten, the nine Israelites were ungrateful, whereas the Samaritan stranger returned and lifted up his voice in thanksgiving, as it follows, And one of them turned back, and with a loud voice glorified God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Catena Aurea by Aquinas'
