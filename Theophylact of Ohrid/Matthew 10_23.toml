[[commentary]]
quote='''
"But when they persecute you in this city, flee ye into another: for verily I say unto you, Ye shall not have gone through the cities of Israel, till the Son of Man be come." The fearful things spoken of above, such as "They will hand you over" and "You will be hated," concerned those things which would take place after the Ascension. What is spoken of now concerns that which would take place before the Cross. "You will not be persecuted through all the cities of Israel before I shall come to you." He commands them to flee from their persecutors. For it is of the devil for a man to throw himself into manifest danger and thus become the cause of condemnation to those who would slay him and the detriment of those whom he was about to benefit by his preaching. "Till the Son of Man be come" - do not understand by this the second coming, but rather, His drawing together with them and the comfort that He would give them yet before the Cross. For when they had been sent out and had preached, they again returned to Christ and were together with Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
