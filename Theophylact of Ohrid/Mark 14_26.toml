[[commentary]]
quote='''
They gave thanks both before drinking and after drinking, so that we too might know that we ought to give thanks and sing hymns both before food and after food. By this the Lord also shows that death for our sake is not fearful to Him, so that He glorifies God even as He goes to be handed over to death. By this, without doubt, He also teaches us not to lose heart when we fall into sorrows for the salvation of many, but to give thanks to God, who through our sorrow works the salvation of many. The Lord goes "to the Mount of Olives" so that the Jews, having found and seized Him in seclusion, would not cause a disturbance among the people. For if they had attacked Him in the city, the people might have risen up on His behalf; and in that case the enemies, taking advantage of this plausible pretext, would have thought that they killed Him justly, as a rebel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
As they returned thanks, before they drank, so they return thanks after drinking; wherefore it is said, And when they had sung a hymn, they went out into the mount of Olives, to teach us to return thanks both before and after our food.

He also shows by this that He was glad to die for us, because when about to be betrayed, He deigned to praise God. He also teaches us when we fall into troubles for the sake of the salvation of many, not to be sad, but to give thanks to God, who through our distress works the salvation of many.

Again, He went out into a mountain, that they might come to Him in a lonely place, and take Him without tumult. For if they had come to Him, whilst He was abiding in the city, the multitude of the people would have been in an uproar, and then His enemies, who took occasion against Him, should seem to have slain Him justly, because He stirred up the people.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
