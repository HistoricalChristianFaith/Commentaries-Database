[[commentary]]
quote='''
He speaks of tribulation because there are many who, when they are hard-pressed by their parents, or by some misfortunes, immediately blaspheme. And of persecution, on account of those who fall into the hands of tyrants.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
