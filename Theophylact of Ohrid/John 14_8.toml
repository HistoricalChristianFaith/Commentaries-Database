[[commentary]]
quote='''
Philip thought that he knew Christ well, but did not know the Father. Therefore he also said: "Show us the Father, and it is sufficient for us." For no matter how much You tell us that if you had known Me, you would have known My Father also, we cannot come to know the Father in this way. But You show Him to us, to our bodily eyes. Philip had heard that the prophets saw God, and he himself wished to see Him in the same bodily manner, not knowing that the visions of the prophets were acts of condescension.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
