[[commentary]]
quote='''
Notice the complete absence of arrogance in Peter. Having performed such a great miracle, he seeks lodging not with her nor with any other notable person, but with Simon the tanner; he is not ashamed of lowly people and does not give the great occasion to boast.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25209.html'
source_title='Commentary on Acts'
