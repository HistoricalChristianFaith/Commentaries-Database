[[commentary]]
quote='''
To the disciples who asked Him privately, He says, "To you it has been given to know the mysteries" (Mt. 13:11). But surely this was not given to some and not to others by allotment and appointment of nature? It cannot be; rather it was given to them as seekers: "Seek," it says, "and it will be given to you" (cf. Mt. 7:7), while the rest God left in blindness, so that knowledge of what is right might not serve for their greater condemnation when they fail to do what is right.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'
