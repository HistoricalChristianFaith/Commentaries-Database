[[commentary]]
quote='''
In that same hour came the disciples unto Jesus, saying, Who is the greatest in the kingdom of heaven? When they saw that Peter had been honored by Christ (for he had been honored by being instructed to give the coin for Christ and for himself), they fell prey to a human weakness and were stung by jealousy. So they approached and asked the Lord craftily, "Who is the greatest?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
