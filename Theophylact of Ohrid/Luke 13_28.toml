[[commentary]]
quote='''
These words are fitting both for the Jews, to whom the Lord spoke them, and for the unbelievers of the last times.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
This also refers to the Israelites with whom He was speaking, who receive from this their severest blow, that the Gentiles have rest with the fathers, while they themselves are shut out. Hence He adds, When you shall see Abraham, Isaac, and Jacob, in the kingdom of God, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
