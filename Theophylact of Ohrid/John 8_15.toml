[[commentary]]
quote='''
As if to say: Ye judge untruly, according to the flesh, thinking, because I am in the flesh, that I am flesh only, and not God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"I," He says, "as God and the One who has come from above, bear witness concerning Myself the truth; but you look only at what is visible, and, since I am in the flesh, you take Me for mere flesh, and not for God and the One who has come from God."
"You judge according to the flesh," that is, erroneously. Just as one who lives according to the flesh is said to live viciously, so too of one who judges according to the flesh it must be said that he is an unrighteous judge.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John'
