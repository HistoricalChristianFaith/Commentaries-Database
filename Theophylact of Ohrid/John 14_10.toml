[[commentary]]
quote='''
The Son is in the Father, since He exists in His essence, and again the Father is in the essence of the Son, just as a king is present in his image, and the image in the king. For the features of the image and the king are the same. And that My essence and the Father's are one, this is clear. For "the words that I speak, I speak not from Myself," that is, I speak them no differently, but as the Father would say, so I also speak; because I have nothing of My own, nothing separate from the Father, but all things are common; for the essence is one, though the persons are different.

But to the Father belong not only the words that I speak, but also the deeds, the Divine deeds. If the deeds are God's, and the Father and I are God, then the deeds belong to one Essence, so that if I act, the Father acts, and if the Father acts, I act.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
