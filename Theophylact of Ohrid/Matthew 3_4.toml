[[commentary]]
quote='''
Now this John wore a garment of camel's hair. Even by his appearance John called them to repentance, for he wore the garb of mourning. It is said that the camel is somewhere between a clean and unclean animal: it is clean in that it chews its cud, but it is unclean in that its hoof is not cloven (Levit. 11:1-8). Another reason, then, that John wore camel's hair is that he was leading to God both the Jewish people, who appeared clean, and the Gentiles, who were unclean, and he was a mediator between the Old and the New Testaments. And a leather belt about his loins. All the saints appear in Scripture girt about the waist with a belt, for they labored continuously; but the careless and the gluttonous are not girt, but let their robes flow to the ground, like the Saracens of today. Or, the saints are girt because they have mortified the desires of the flesh, for leather is a part of a dead animal. And his food was locusts and wild honey. Some say that "locusts" refer to a type of herb; others say that the word refers to the fruit of wild pod-bearing trees. Wild honey is produced by wild bees, and is to be found in trees and rocks.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
