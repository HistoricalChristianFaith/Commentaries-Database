[[commentary]]
quote='''
By the priest and the Levite, understand, perhaps, the Law and the prophets. For they desired to justify man, but could not. "It is impossible," says the Apostle Paul, "that the blood of bulls and goats should take away sins" (Heb. 10:4). They took pity on man and considered how to heal him, but, overcome by the severity of the wounds, they withdrew again. For this is what it means to pass by. The Law came and stood over the one lying there, but then, not having the power to heal, it departed. This is what "passed by" means.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But He says, passed by, (Rom. 3:20; 8:3.) because the Law came and stood till its time foreordained, then, not being able to cure, departed. Mark also that the Law was not given with this previous intention that it should cure man, for man could not from the beginning receive the mystery of Christ. And therefore it is said, And by chance there came a certain priest, which expression we use with respect to those things which happen without forethought.

They pitied him, I say, when they thought about him, but afterwards, overcome by selfishness, they went away again. For this is signified by the word, passed him by.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
