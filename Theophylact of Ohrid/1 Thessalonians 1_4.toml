[[commentary]]
quote='''
He says, we remember you because we know that you are chosen by God: for you have been chosen for the faith preferentially over many others. But how is this evident, holy Paul? Listen, he says, to what follows next.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25201.html'
source_title='Commentary on 1 Thessalonians'
