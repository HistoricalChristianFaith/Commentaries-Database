[[commentary]]
quote='''
The prophet Habakkuk exclaims: "Look, you scoffers, marvel and perish," and God answers the people of lawlessness that misfortunes threaten them both now and in the future. And it was worthy of great wonder how Israel, enrolled among the company of the children of God and called the firstborn — that Israel, for whose sake Egypt perished — is handed over to the Babylonians, handed over not only to their sword, but even to captivity, and slavery, and every possible suffering.
"You would not believe, even if someone were telling you." The matter is so magnificent that it would seem even incredible, if someone were to report it to you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
