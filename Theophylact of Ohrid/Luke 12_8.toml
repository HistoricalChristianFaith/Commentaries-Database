[[commentary]]
quote='''
Now He offers a reward for the confession of faith. Since He said, "do not fear those who kill the body" and added that "the very hairs of your head are all numbered," lest someone should say: then give me some reward as well, for what good does it do me that You have numbered my hairs.
He says (to such a person): do you desire a reward as well? Listen. Whoever confesses (faith) in Me, that one will be acknowledged by Me before God. He said: will confess "in Me," that is, with My assistance and by My power, and I will confess him "in him," that is, with his assistance. For just as we first need God, since without Him we can do nothing (John 15:5), so also God needs us. For if He does not find in us worthy deeds, He does not accept us either; otherwise He would be a respecter of persons. So we confess "in Him," that is, with His assistance, and He "in us," that is, with our assistance. For if we do not give Him cause, He will not bear witness for us either.
Since every saint abides in Christ, and Christ in him (John 15:5), then perhaps is it not for this reason also that He said thus: whoever confesses (Me) "in Me," that is, abiding, that one I too will confess, abiding in him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'
