[[commentary]]
quote='''
At this the high priest fulfilled the custom (he tore his garment). For whenever some calamity or sorrow befell the Jews, they would tear their garments. In the present case the high priest tore his garment as a sign that Jesus had supposedly uttered blasphemy against God, and that thus a great evil had occurred. But it is fitting to say here with David: "They were divided, and were not moved to compunction" (Ps. 34:15). But this tearing was at the same time also a figure of the tearing apart and abolition of the Jewish high priesthood, although the high priest himself was unaware of this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
