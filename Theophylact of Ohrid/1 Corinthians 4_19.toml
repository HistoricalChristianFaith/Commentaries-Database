[[commentary]]
quote='''
By these words he humbles the proud and rouses them to sobriety. And he well added: "if the Lord wills," for all things happen according to His command.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25204.html'
source_title='Commentary on 1 Corinthians'
