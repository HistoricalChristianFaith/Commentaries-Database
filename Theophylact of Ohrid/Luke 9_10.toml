[[commentary]]
quote='''
But our Lord went into a desert place because He was about to perform the miracle of the loaves of bread, that no one should say that the bread was brought from the neighbouring cities.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
