[[commentary]]
quote='''
The other disciples were agonized, for though the conscience of each was clear, they put more trust in Christ than in themselves since He knew their hearts better than they did.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
