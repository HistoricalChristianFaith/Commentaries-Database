[[commentary]]
quote='''
This is evident from the example which the Lord adds, saying: "It is easier for a camel to go through the eye of a needle than for a rich man to enter the Kingdom of God." By the name "camel" understand either the animal itself or a thick rope (cable) used on large ships. Thus, for a man, so long as he is rich, it is impossible to be saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
It may be that by camel, we should understand the animal itself, or else that thick cable, which is used for large vessels.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
