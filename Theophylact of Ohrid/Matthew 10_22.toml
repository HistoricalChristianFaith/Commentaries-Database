[[commentary]]
quote='''
"And ye shall be hated by all men for My name's sake: but he that patiently endureth to the end shall be saved." "Hated by all men" means "hated by many." For not everyone hated them, as there were those who accepted the faith. It is he who patiently endures until the end, and not only in the beginning, who will partake in eternal life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
