[[commentary]]
quote='''
He foretells the things that Judas would do, in order to correct him by making him ashamed of what he planned to do while they ate together, and by filling him with dread and awe as he realized that he was about to betray God Who knows the hearts of men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
