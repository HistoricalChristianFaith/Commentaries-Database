[[commentary]]
quote='''
"If anyone keeps My word," that is, joins to faith a pure life as well (for only he truly keeps the Lord's teaching who also has a pure life), such a person shall not see the death by which sinners die, being delivered in the age to come to endless torment and falling away from the true life.
At the same time, He lets them know that if the one who keeps My word does not die, then all the more so do I not die. Why then do you want to kill Me, over Whom death has so little power that I even grant true life to others? For although believers die bodily, they are alive in God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John'
