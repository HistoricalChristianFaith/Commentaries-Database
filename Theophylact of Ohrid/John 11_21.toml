[[commentary]]
quote='''
She did not know that He could have restored her brother as well absent as present.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Martha had faith in Christ, but not complete, not proper faith. Therefore she also says: "Lord, if You had been here, my brother would not have died." She said this, undoubtedly, because she did not believe that He, if He had wished, could have prevented the death of her brother even without being personally present.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John'
