[[commentary]]
quote='''
He rightly called the Lord the "Firstborn" Son of the Virgin, even though she bore no other child, for the one born first is called the firstborn, even if no other is born after him. He is laid in a manger, perhaps in order to teach us humility from the very beginning, or perhaps also to symbolically show that He appeared in this world — a place inhabited by us who have become like senseless beasts (Ps. 48:13, 21). For just as the manger belongs to the cattle, so also this world belongs to us. Thus, the world is a manger, and we are senseless animals; and to redeem us from senselessness, He appeared here for this very reason.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke'
