[[commentary]]
quote='''
He says, On the first of the sabbaths, (μιᾱς σαββάτων.) that is, on the first of the days of the week. For the days of the week are called sabbaths, and by the word 'una' is meant 'prima.'
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
