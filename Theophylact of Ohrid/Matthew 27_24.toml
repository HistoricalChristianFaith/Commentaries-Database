[[commentary]]
quote='''
When Pilate saw that he could prevail nothing, but that rather a tumult was made, he took water, and washed his hands before the multitude, saying, I am innocent of the blood of this righteous Man: see ye to it yourselves. Pilate washed his hands as if to show that he was clean of defilement, but his thoughts were evil. For he called Jesus a righteous man and yet handed Him over to murderers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
