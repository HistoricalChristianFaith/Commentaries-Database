[[commentary]]
quote='''
Bring forth therefore fruits worthy of repentance. Do you see what he is saying? One must not only flee from wickedness, but also bring forth fruits of virtue. For it is written, "Turn away from evil and do good" (Ps. 33:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
