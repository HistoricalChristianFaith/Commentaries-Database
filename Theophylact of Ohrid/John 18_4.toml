[[commentary]]
quote='''
He asks not because He needed to know, for He knew all things that should come upon Him; but because He wished to show, that though present, they could not see or distinguish Him: Jesus saith unto them, I am He.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The Lord asks them not because He had need to know; the Evangelist says that He knew "all that would happen to Him." And since He knew what would happen to Him, He asks not out of need to know, but with the purpose of showing that even when He was right before them, they did not see Him and did not recognize Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John'
