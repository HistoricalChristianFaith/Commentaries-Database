[[commentary]]
quote='''
But you, He says, take heed, for they will deliver you up to councils. He introduces the discourse about them at the right moment — that they will be delivered up to councils — so that from the common calamities they might receive some consolation in their own personal afflictions. But when the Lord said, "before governors and kings you shall be brought for My sake," by these words too He gave no small consolation to the disciples, namely that they would suffer for His sake. "For a testimony against them," that is, so that they would be without excuse and would see their own condemnation in this very fact: that while persecuting you, they cannot overcome the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Fitly also did He premise a recital of those things which concerned the Apostles, that in their own tribulations they might find some consolation in the community of troubles and sufferings. There follows: And ye shall be brought before rulers and kings for my sake, for a testimony against them. He says kings and rulers, as, for instance, Agrippa, Nero, and Herod. Again, His saying, for my sake, gave them no small consolation, in that they were about to suffer for His sake. For a testimony against them, means, as a judgment beforehand against them, that they might be inexcusable, in that though the Apostles were labouring for the truth, they would not join themselves to it.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
