[[commentary]]
quote='''
I indeed baptize you with water unto repentance; but He that cometh after me is mightier than I. He had told them to bring forth fruit; now he shows them what fruit to bring forth: to believe in Him that is coming after John. After him came Christ. For just as Christ came after John in birth, by only six months, so it was also in His public manifestation. First the Forerunner was made manifest, and then came Christ, after the testimony of the Forerunner. Whose sandals I am not worthy to bear. I am not even the least of His servants, he says, who carries His sandals. By "sandals" understand the Lord's two descents, the one from heaven to earth, and the other from earth to hades. For the sandals, being leather, represent flesh and mortification. The Forerunner, then, is not able to carry these two descents, that is, not able to understand how they occurred. He shall baptize you with the Holy Spirit. That is, He shall flood you with the gifts and the grace of the Holy Spirit. For my baptism, John says, provides neither spiritual grace nor forgiveness of sins, but He will forgive you and give you the Spirit in abundance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
