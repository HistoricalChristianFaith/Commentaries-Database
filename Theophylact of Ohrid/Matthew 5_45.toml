[[commentary]]
quote='''
That ye may be the sons of your Father Who is in heaven. For He maketh His sun to rise on the evil and on the good, and sendeth rain on the righteous and on the unrighteousness. Do you see how good a gift is given to you by him who hates and abuses you, if only you will endure it with patience? By rain and sun, understand knowledge and teaching, for God enlightens and teaches all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
