[[commentary]]
quote='''
And when they had departed, behold, the angel of the Lord appeareth to Joseph in a dream, saying, Arise, and take the young Child and His mother. Do you see now the reason why God permitted the Virgin to be betrothed? It is revealed to you here: that Joseph might care for her and watch over her. The angel did not say, "take thy wife," but "take the mother of the Child." For once his suspicion had been allayed, and the righteous man had understood from the miracles attendant at His birth that everything was of the Holy Spirit, the angel no longer calls her Joseph's "wife." And flee into Egypt. Even the Lord flees, to confirm that He was truly man. For if He had fallen into the hands of Herod and had not been slain, it would have seemed that He had been made flesh only in appearance. He flees into Egypt to sanctify even that place. For there were two lands that were the workshops of every iniquity: Babylon and Egypt. By means of the Magi He accepted the adoration of Babylon, and Egypt He sanctified by His own presence. And be thou there until I bring thee word. Remain there until you receive God's command. So we, too, should do nothing apart from the will of God. For Herod will seek the young Child to destroy Him. Behold the foolishness of a man who labors to prevail against the will of God. For if it is not of God, what do you fear? But if it is of God, how can you destroy the Child?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
