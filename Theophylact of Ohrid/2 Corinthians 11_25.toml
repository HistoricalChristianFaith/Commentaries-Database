[[commentary]]
quote='''
Luke did not record for us everything that Paul endured, for you see that he omitted much of what is enumerated here; because he labored in his writing not for the glorification of himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%252011.html'
source_title='Commentary on 2 Corinthians'
