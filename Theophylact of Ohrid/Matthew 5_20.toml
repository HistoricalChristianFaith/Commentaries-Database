[[commentary]]
quote='''
For I say unto you, That except your righteousness shall exceed the righteousness of the scribes and pharisees, ye shall in no case enter into the kingdom of heaven. "Righteousness" means all the virtues, as in "Job was a righteous man, holy and blameless" (Job 1:1). Tremble then, O man, when you have understood how much is required of us. Then He teaches us how we can exceed the righteousness of the Scribes and Pharisees, and He enumerates the virtues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
