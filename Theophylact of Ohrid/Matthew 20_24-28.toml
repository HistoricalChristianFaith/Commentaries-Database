[[commentary]]
quote='''
And when the ten heard it, they were moved with indignation against the two brethren. But Jesus called them unto Him, and said, Ye know that the princes of the Gentiles lord it over them, and they that are great exercise authority upon them. But it shall not be so among you: but whosoever will be great among you, let him be your minister; and whosoever will be chief among you, let him be your servant: even as the Son of Man came not to be ministered unto, but to minister, and to give His life a ransom for many. When the ten saw the two being rebuked by the Lord, then they, too, became indignant, revealing that even prior to this they had been annoyed at the honor which these two were given. For they were yet imperfect, the two rising up against the ten, and the ten envious of the two. As the ten were stirred up when they heard this, He called them to Himself, and by His calling, before any words were spoken, He calmed them. For the sons of Zebedee spoke to Him after they had separated themselves from the others. Therefore He speaks to them all together. Knowing how tyrannical is the pride of status, requiring a severe rebuke, He touches them to the quick by consigning them to the lot of Gentiles and infidels if they would be vainglorious. So He shames them by saying, "Other men are renowned as princes and rulers, and the lust for high position is a passion of the Gentiles; but My disciples are made honorable by their humility. So that he who would be great ought to serve the most inferior in rank; this is the mark of extreme humility. I Myself show this. I am the Prince and King of those who dwell in the heavens, Who humbled Myself to minister to you for your salvation, and I am your servant to the extent that I even give My life as a ransom for many, that is, for all." For "all" are "many."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
