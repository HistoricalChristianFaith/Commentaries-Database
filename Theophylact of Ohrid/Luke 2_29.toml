[[commentary]]
quote='''
For to say, "Now You are releasing Your servant, O Master," could only be said by one who confessed that He is the Lord of life and death. See how the saints considered the body to be bonds. Therefore he also says, "Now You are releasing," loosing as if from bonds. "According to Your word": he speaks of the prophecy he had received, that he would not die until he had seen Christ. "In peace" means: in tranquility. For a man, as long as he lives, "is troubled," as David says (Ps. 38:7); but the one who has died is at peace. "In peace" can also be understood in another way, namely: with the obtaining of what was expected. Before I saw the Lord, he says, I was not at peace in my thoughts, but I was awaiting Him and always pondered with anxiety when He would come; but now, when I have seen Him, I am at rest and have ceased to think — I am released.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
When he says Lord, he confesses that He is the very Lord of both life and death, and so acknowledges the Child whom he held in his arms to be God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
