[[commentary]]
quote='''
The disciples found great obscurity in the words spoken by Christ, and being solicitous of the common people came to Him and asked the question. And He said, "It is given unto you to know the mysteries," that is, since you have willingness and zeal to learn, it is given to you. But to those who do not have zeal, it is not given. For it is he that asks who receives. Ask, therefore, He says, and it will be given to you. See here how the Lord told the parable and only the disciples, who asked, received.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
