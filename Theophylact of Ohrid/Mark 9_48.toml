[[commentary]]
quote='''
And the worm and fire that torment sinners are the conscience of each person and the remembrance of the vile deeds committed in this life. This gnaws like a worm and burns like a fire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Commentary on Mark'
