[[commentary]]
quote='''
He also gives the reason for this, namely that out of vanity they utter swelling words, enticing through fleshly lust into debauchery those who had completely escaped it, or who, if they were once in error, had afterwards submitted themselves to the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Peter%2FChapter%25202.html'
source_title='Commentary on 2 Peter'
