[[commentary]]
quote='''
So that the words "you make yourselves unworthy of eternal life" might not be interpreted by someone as evidence of their humility, Paul first said "as you reject it." Then he added "we turn to the Gentiles." He does not say "we are leaving you," but expresses himself in such a way that allows for the possibility of his return to Antioch.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
