[[commentary]]
quote='''
It seems that the apostle is as if praising the Athenians, saying that "they are as if especially devout," instead of calling them pious.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252017.html'
source_title='Commentary on Acts'
