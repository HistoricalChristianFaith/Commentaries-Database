[[commentary]]
quote='''
Since they were simple and unlearned men, lest they be troubled that wise men would demand an account from them, He says that they should not be concerned about this at all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
