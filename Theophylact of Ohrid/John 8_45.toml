[[commentary]]
quote='''
But you do not believe Me, because I speak the truth. Having nothing to accuse Me of other than the truth, you rise up against Me for this very reason, as sons of the father of lies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John'
