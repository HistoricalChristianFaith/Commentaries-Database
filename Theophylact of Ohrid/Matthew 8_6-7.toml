[[commentary]]
quote='''
"Lord, my servant lieth at home a paralytic, grievously tormented. And Jesus saith unto him, I will come and heal him." The centurion did not bring his servant lying on his bed to Jesus, as he believed that Jesus could heal him even from a distance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
