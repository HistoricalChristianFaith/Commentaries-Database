[[commentary]]
quote='''
After their preaching, the apostles gather to Jesus. This should be a lesson for us that we too, having been chosen for some ministry, should not depart from obedience to the one who chose us or exalt ourselves before him, but should acknowledge him as head, turn to him, and report to him everything we have done and taught (one must not only teach but also act).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Let us also learn, when we are sent on any mission, not to go far away, and not to overstep the bounds of the office committed, but to go often to him, who sends us, and report all that we have done and taught; for we must not only teach but act.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
