[[commentary]]
quote='''
It is not with us, says Paul, that you wage war and fight, but you turn people away "from the straight paths of the Lord. And now behold, the hand of the Lord is upon you: you shall be blind and not see the sun for a time." By the same means by which he himself was converted, he wanted to convert him as well. Therefore, this was not a punishment, but a healing, because Paul said: "It is not I who do this, but 'behold, the hand of the Lord is upon you.'" And "for a time" was evidently the word not of one punishing, but of one converting, because if it had been the word of one punishing, Paul would have made him blind permanently; but here it is not so, but rather "for a time." He speaks thus in order to make an impression on the proconsul, for he gives him to understand by this that it depends on the sorcerer himself to receive his sight again: he needs to change his way of life for the better.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
