[[commentary]]
quote='''
"Sat at Jesus' feet and listened to His word." By the feet one can understand active virtue, for they signify movement and walking. And sitting is a sign of immobility. So whoever sits at the feet of Jesus, that is, whoever becomes firmly established in active virtue and through imitation of the walking and life of Jesus is strengthened in it, that person after this arrives at the hearing of divine utterances or at contemplation. Since Mary also first sat down, and then listened to the words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'
