[[commentary]]
quote='''
"Do you wish," He says, "to know My equality with the Father?" You cannot know the equality according to Essence, because it is impossible to know the Essence of God; but accept the equality and identity of works as proof of the identity of power, for the works will be testimony for you of My Divinity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John'
