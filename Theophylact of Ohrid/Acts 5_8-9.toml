[[commentary]]
quote='''
Peter wanted to save her, because the husband was the instigator of the sin. That is why he gives her time to justify herself and repent. Perhaps someone will say that Peter acted cruelly toward them, but what cruelty is there? If the one who gathered wood contrary to the law was stoned (see Num. 15:32–36), then all the more should a sacrilegious person be punished, because this money was sacred.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25205.html'
source_title='Commentary on Acts'
