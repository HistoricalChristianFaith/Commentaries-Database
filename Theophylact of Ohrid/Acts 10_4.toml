[[commentary]]
quote='''
Since the True Eye and Great Judge knows that even great deeds, without faith, are dead, He also sends an Angel who affirms the significance of their deeds, so that those who strive well may be crowned with faith. From the vision, fear was aroused in Cornelius, however, a moderate fear, only as much as was necessary to arouse his attention. Then the words of the Angel dispelled the fear. "Your prayers and your alms have come up as a memorial before God." See where prayer goes — to the highest heaven, and stands before the very royal throne.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
