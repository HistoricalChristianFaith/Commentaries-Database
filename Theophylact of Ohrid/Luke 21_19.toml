[[commentary]]
quote='''
For by your patience you can acquire your souls. The enemy approaches as if with the intention of taking captive, and tries to seize your souls by bringing calamities upon you; but instead of silver, give patience, and by this ransom you will acquire your souls and suffer no harm in them. Pay attention to the expression: "some of you they will put to death," and you will understand it somewhat more deeply, namely: they will not put you to death entirely. You consist of two parts: soul and body. Not both, but one of these, that is the body, they will put to death, while your souls you will acquire through patience. About this He also said in another place: "And do not fear those who kill the body but cannot kill the soul" (Matt. 10:28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
