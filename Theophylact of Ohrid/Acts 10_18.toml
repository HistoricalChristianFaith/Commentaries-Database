[[commentary]]
quote='''
And moreover, he did not have to remain in perplexity for long, nor did it arise beforehand, but at the very moment when they were asking whether he was staying there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
