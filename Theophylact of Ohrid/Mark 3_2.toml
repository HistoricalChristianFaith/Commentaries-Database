[[commentary]]
quote='''
On the occasion of the Jews accusing the disciples for plucking ears of grain on the Sabbath, the Lord had already shut the mouths of the accusers with the example of David, and in order to instruct them even more now, He works a miracle, through which He expresses the following: behold how guiltless of sin My disciples are — I Myself also act on the Sabbath day, manifesting this miracle. If working miracles is a sin, then doing anything necessary on the Sabbath is altogether a sin; but to perform a miracle for the salvation of a person is a work of God, and consequently, neither does one who does something not evil on the Sabbath violate the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'
