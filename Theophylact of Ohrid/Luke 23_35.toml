[[commentary]]
quote='''
For, what must one conclude about the common people, when their rulers were mocking?
This is the devil speaking through them. Just as on the pinnacle of the temple (Luke 4:9), so also here he says this, envying the salvation through the cross and desiring by every possible cunning to prevent it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
They did it then mockingly. For when the rulers scoffed, what can we say of the crowd? for it follows, And the people stood, who in truth had entreated that He should be crucified, waiting, namely, for the end. And the rulers also with them derided.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Catena Aurea by Aquinas'
