[[commentary]]
quote='''
"Truly I say to you: this generation shall not pass away," that is, the generation of the faithful or of Christians, "until all these things come to pass" — everything said concerning Jerusalem and the coming of the Antichrist. The Lord speaks here not of the apostolic generation, for the apostles will not continue living until the end of the world: many of them did not even live to see the destruction of Jerusalem. Therefore, by "this generation" He here means the Christian generation, thus comforting the apostles, lest they think that amid such grievous calamities the faith might perhaps utterly fail.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Or else, This generation shall not pass away, that is, the generation of Christians, until all things be fulfilled, which were spoken concerning Jerusalem and the coming of Antichrist; for He does not mean the generation of the Apostles, for the greater part of the Apostles did not live up to the destruction of Jerusalem. But He says this of the generation of Christians, wishing to console His disciples, lest they should believe that the faith should fail at that time.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
