[[commentary]]
quote='''
What took place was a plot: therefore Luke also calls them spies (Lk. 20:20), or waylayers, sent secretly to set a trap for Christ. "Herodians" were either soldiers of Herod or those who thought Herod was the Christ. For since the princely line of Judah had failed when Herod, who was not of that line, became king, the Herodians thought that Herod himself was the Christ. So the Pharisees, then, come with these men to set a trap for Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
