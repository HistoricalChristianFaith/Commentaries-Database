[[commentary]]
quote='''
The Lord arrived at this place, it seems, after no small time of absence; therefore the evangelist also says: "when they recognized Him... they began to bring the sick."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'
