[[commentary]]
quote='''
So that they would not think this was an invention, Paul shows that he did everything out of love and zeal, and not out of vainglory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252022.html'
source_title='Commentary on Acts'
