[[commentary]]
quote='''
As if intending to give testimony before a court, he resorts to these words in order to appear most worthy of trust.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Galatians%2FChapter%25201.html'
source_title='Commentary on Galatians'
