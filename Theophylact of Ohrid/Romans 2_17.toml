[[commentary]]
quote='''
Having said that nothing more is needed for the salvation of a Gentile who fulfills the law, he finally enumerates the advantages of the Jews, upon which they relied and boasted before the Gentiles. First of all, he speaks of the name of Jew; for it constituted a great advantage, as now the name of Christian. He did not say: you are a Jew, but: "you are called"; for the true Jew is the one who is confessed to be a Jew, because Judah means confession. "And rest in the law" — meaning you do not labor, do not go about, do not inquire what must be done, but you have the law, which instructs you in all things without effort. "And boast in God," that is, that you are loved by God and preferred above other people; but to turn the love of God into a means of despising beings of the same nature is a sign of the utmost folly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25202.html'
source_title='Commentary on Romans'
