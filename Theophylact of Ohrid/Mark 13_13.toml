[[commentary]]
quote='''
Then follows consolation: for My sake, He says, you will be hated. This is the greatest relief in misfortune. Great consolation also lies in the fact that he who endures to the end will be saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'
