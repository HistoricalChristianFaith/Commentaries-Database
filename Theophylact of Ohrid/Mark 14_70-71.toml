[[commentary]]
quote='''
So Peter, troubled by fear and forgetting the Lord's word — "whoever denies Me before men, I will also deny him before My Father who is in heaven" (Mt. 10:33) — denied Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Therefore Peter was seized with fear, and for-getting the word of the Lord, which said, Whosoever shall confess me before men, him will I confess before my Father, (Matt. 30, 32) he denied our Lord; wherefore there follows: But he began to curse and to swear, saying, I know not this man of whom ye speak.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
