[[commentary]]
quote='''
So Peter, troubled by fear and forgetting the Lord's word — "whoever denies Me before men, I will also deny him before My Father who is in heaven" (Mt. 10:33) — denied Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
