[[commentary]]
quote='''
When the Lord had calmed and quieted the hearts of the disciples, having assured them of the reality of the resurrection of His body through His words, by allowing them to touch Him, and by partaking of food, then He opened their mind to understand the Scriptures. For if their soul had not been calmed, how would they have understood, being in a state of disorder, in a state of confusion? For "Be still," it is said, "and know" (Ps. 46:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Otherwise, how would their agitated and perplexed minds have learnt the mystery of Christ.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
