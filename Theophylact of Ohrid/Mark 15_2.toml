[[commentary]]
quote='''
To Pilate's question, "Are You the King of the Jews?" the Lord gives an ambiguous answer. For the words "You say so" can be understood thus: you speak the truth — you yourself have declared Who I am; but they can also be understood thus: I do not say this, but you say it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'
