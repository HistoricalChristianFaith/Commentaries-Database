[[commentary]]
quote='''
To Pilate's question, "Are You the King of the Jews?" the Lord gives an ambiguous answer. For the words "You say so" can be understood thus: you speak the truth — you yourself have declared Who I am; but they can also be understood thus: I do not say this, but you say it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For His answer is doubtful, since it may mean, Thou sayest, but I say not so. And observe that He does somewhere answer Pilate, who condemned Him unwillingly, but does not choose to answer the priests and great men, and judges them unworthy of a reply. It goes on: And the Chief Priests accused him of many things.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
