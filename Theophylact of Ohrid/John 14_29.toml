[[commentary]]
quote='''
That is: I am so calm, I do not fear death and do not grieve, that I even foretell it; therefore I command you also to rejoice, so that when it comes to pass, you may believe Me, that just as I knew about the sorrows that would befall you and, having foretold them, did not lie, so also in My prediction concerning your consolation and guidance I will not prove false, but all joyful things will come to you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
