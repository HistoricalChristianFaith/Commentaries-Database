[[commentary]]
quote='''
"And Saul was ravaging the church." Great was his madness, both to be alone and to break into houses. This was because he had devoted his soul to the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25208.html'
source_title='Commentary on Acts'
