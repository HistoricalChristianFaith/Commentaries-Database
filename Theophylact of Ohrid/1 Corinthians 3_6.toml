[[commentary]]
quote='''
I, he says, was the first to sow the preaching; but Apollos, by his constant teaching, did not allow the seed to wither from the heat of the temptations of the evil one, but God made you grow.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25203.html'
source_title='Commentary on 1 Corinthians'
