[[commentary]]
quote='''
Betrayers of friendship.

That is, unsteady, inconstant.

Filled with arrogance.

Otherwise it cannot be but so: for where there is love of worldly pleasures, there is no place for the desire of divine things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Timothy%2FChapter%25203.html'
source_title='Commentary on 2 Timothy'
