[[commentary]]
quote='''
And he arose and took the young Child and His mother by night, and departed into Egypt; and was there until the death of Herod: that it might be fulfilled which was spoken by the Lord through the prophet, saying, "Out of Egypt have I called My Son" (Hosea 11:1).

The Jews say that this was said of the people whom Moses led out of Egypt. We reply, is it anything remarkable that something which was spoken of the people in type as a foreshadowing, was realized by Christ in truth? Furthermore, who is the Son of God? The Hebrew people who worshipped the idols and carvings of Beelphegor, or He Who truly is the Son of God?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
