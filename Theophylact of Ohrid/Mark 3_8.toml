[[commentary]]
quote='''
Even the Tyrians and Sidonians received benefit, despite being foreigners. Meanwhile His own kinsmen persecuted Him. So there is no benefit in kinship if there is no good character! Here even strangers came to Christ from afar, while the Jews persecuted Him who had come to them. On the contrary, those who went out from their homes and from their fatherland, that is, from the carnal way of life, follow Him; and therefore their wounds are healed, that is, the sins that wound the conscience, and the unclean spirits are driven out.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Syrians and Sidonians, being foreigners, receive benefit from Christ; but His kindred the Jews persecute Him: thus there is no profit in relationship, if there be not a similarity in goodness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
But those who quit their country, that is, a carnal mode of living, follow Christ, and their plagues are healed, that is, the sins which wound their conscience.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'
