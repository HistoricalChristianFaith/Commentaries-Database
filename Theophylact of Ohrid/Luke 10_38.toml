[[commentary]]
quote='''
Great is the good that comes from hospitality, as Martha showed, and it should not be neglected; but an even greater good is to attend to spiritual discourse. For by the former the body is nourished, but by the latter the soul is given life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'
