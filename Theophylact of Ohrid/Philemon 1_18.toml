[[commentary]]
quote='''
He did not say: stole, but more gently: "wronged, or owes anything." It is likely that he had spent what was stolen. Therefore he says: charge it to my account, consider me the debtor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Philemon%2FPhilemon.html'
source_title='Commentary on Philemon'
