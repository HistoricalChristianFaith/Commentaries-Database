[[commentary]]
quote='''
The law had a yoke and slavery, but in the law of the Spirit and in the Gospel there is freedom, so that the glory of the Lord is contemplated without hindrance and freely.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%25203.html'
source_title='Commentary on 2 Corinthians'
