[[commentary]]
quote='''
Such are the good servants; but the wicked and slothful servant justifies himself differently, in a manner befitting to him. For he calls his master "hard," as many today call their teachers "hard" or "exacting." It is indeed exacting to look for obedience from men, for God did not create obedience within man, nor did He sow in him an obedient disposition, [but instead God gave man free will]. This is what the unprofitable servant means when he says, "You reap where you have not sown," that is, You require an obedient disposition from all men, although You have implanted in no man an obedient disposition.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
