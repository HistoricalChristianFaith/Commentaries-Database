[[commentary]]
quote='''
Christ cometh from above, as descending from the Father; and is above all, as being elected in preference to all.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The Forerunner compares himself with Christ and says that He comes "from above," from the Father, and is "above all," surpassing all and preserving the supremacy of the Father, while I, being of the earth, speak earthly things, imperfect and lowly in comparison with the teaching of Christ. Although the teaching of the Forerunner himself was also divine, in comparison with the teaching of Christ it contains much that is earthly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John'
