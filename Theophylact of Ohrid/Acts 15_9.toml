[[commentary]]
quote='''
Where faith cleanses sins proceeding from the heart, there is no distinction between believers, whether they be Jews or Greeks. And this cleansing replaced circumcision; instead of fleshly circumcision, spiritual circumcision is granted, which through faith in Christ cleanses even secret sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
