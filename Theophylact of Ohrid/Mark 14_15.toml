[[commentary]]
quote='''
But this upper room is "furnished," that is, although it is lofty, it contains nothing harsh or proud; on the contrary, it is furnished and smoothed with humility. It is here, in such a mind, I say, that the Passover is prepared for Christ by the two disciples, Peter and John, that is, by action and contemplation, for Peter was fervent and active, while John, as the Theologian, was contemplative.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
