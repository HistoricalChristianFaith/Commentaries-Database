[[commentary]]
quote='''
Look from the other side also at this: from what mockery He delivers man and how He teaches him propriety. For how much shame there is in the case where you take a place unbefitting to you, and then someone more honored than you arrives, and the one who invited you says: "Give him your place!" And this can happen often. And you yourself will have to yield, while they will sit higher.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
