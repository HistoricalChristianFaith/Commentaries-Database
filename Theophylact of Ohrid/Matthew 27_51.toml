[[commentary]]
quote='''
And, behold, the veil of the temple was rent in twain from the top to the bottom; and the earth did quake, and the rocks rent. The veil of the temple was a cloth of fine linen hanging in the middle of the temple, separating the inner sanctuary from the outer like a partition wall. This veil was rent, and God thereby showed that the inaccessible and unseen temple, whose innermost part, the Holy of Holies, had been secluded by the veil, would be made common and profane so as to be visible and accessible to all. Some give further explanations. The veil being rent, they say, indicated that the letter of the law had been stripped away to reveal the entirety of the law which formerly had been concealed by the letter as if by a veil; and what before had been obscure and enigmatic in the law would now be made clear by its fulfillment in Christ (II Cor. 3:14-16). One might also mention that it was the custom of Jews to rend their clothing when they heard blasphemies against God. So now the divine temple rent its own clothing, the veil, as if abhorring the death of Christ. There is more that one could say, but this suffices. The elements quaked, showing at one and the same time that it was the Creator Who suffered and that all things would be changed. For earthquakes are mentioned in Scripture to mark a change in the course of affairs. And there did occur a change in the scope of God's supervision of mankind, namely, from the Jews to the Gentiles. Even the stones, which are the stony hearts of the Gentiles, were split open to accept the seed of Truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
