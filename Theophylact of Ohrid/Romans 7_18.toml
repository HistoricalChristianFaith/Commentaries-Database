[[commentary]]
quote='''
What then do those babble who arm themselves against the flesh and exclude it from the number of God's creations? They object: the apostle says, "there dwells not in me, that is, in my flesh, anything good." Listen in what sense he said this. Man consists of two parts: the soul and the flesh; of these, the first, that is, the soul, rules over everything, while the flesh is a servant. Therefore the expression "there dwells not in my flesh anything good" means: it does not lie in the power of the flesh, but in the power of the soul; whatever the soul chooses, the flesh does. It is just as if someone were to say that harmonious sound is not in the harp but in the harpist — he does not disparage the harp, but shows the superiority of the musician over the instrument.
By the words "I do not find" he indicated the assault and scheming of sin; for he removes the blame both from the essence of the soul and from the essence of the flesh, and ascribes everything to vicious activity and will.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25207.html'
source_title='Commentary on Romans'
