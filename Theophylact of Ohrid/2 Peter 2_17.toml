[[commentary]]
quote='''
Having inserted much into the middle of his discourse, including among other things the example of Balaam, the apostle again begins to speak about the impure Gnostics. He likens them to waterless springs, because they have lost the purity of preaching and the sweet water of life. He compares them to clouds driven by the wind, meaning an adverse wind, which is why he also called it a tempest, since a tempest brings whatever it drives into complete disorder. They are, he says, clouds that are not bright, as the saints are, but dark, full of gloom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Peter%2FChapter%25202.html'
source_title='Commentary on 2 Peter'
