[[commentary]]
quote='''
And seeing the disciples sleeping again, He no longer rebukes them, because they were weighed down with sleep. From this, recognize human fickleness and weakness! We cannot even resist sleep, yet we often promise what is impossible for us!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
And when he returned, he found them asleep again; He however did not rebuke them severely. For their eyes were heavy, (that is, with sleep,) neither wist they what to answer him. By this learn the weakness of men, and let us not, whom even sleep can overcome, promise things which are impossible to us.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
