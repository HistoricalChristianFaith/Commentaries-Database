[[commentary]]
quote='''
And seeing the disciples sleeping again, He no longer rebukes them, because they were weighed down with sleep. From this, recognize human fickleness and weakness! We cannot even resist sleep, yet we often promise what is impossible for us!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
