[[commentary]]
quote='''
Everyone who leaves wife or mother — He says this not so that we would leave our parents helpless or separate from our wives, but teaches us to prefer pleasing God above all things of the flesh. Since from the preaching of the Gospel war was to be kindled among people, so that children would have to renounce their fathers, the Lord says: whoever leaves for the sake of the Gospel fleshly kinship and in general all things of the flesh, that one will receive all this a hundredfold in this age, and in the age to come, eternal life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
