[[commentary]]
quote='''
And think not to say within yourselves, We have Abraham as our father. This was to their destruction, that they put their trust in their noble lineage. For I say unto you, that God is able of these stones to raise up children unto Abraham. The "stones" mean the Gentiles, many of whom believed; but John is also saying simply that God is able to make children for Abraham out of stones. For the womb of Sarah was a stone on account of her sterility, but she gave birth nevertheless (Gen. 18:11-12; 21:1-2). When also did the Lord raise up children unto Abraham from stones? At His crucifixion, when many believed upon seeing the stones which were sundered (Mt. 27:51).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
