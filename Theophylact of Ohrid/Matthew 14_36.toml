[[commentary]]
quote='''
So much so that they even desired to touch the hem of His garment, and indeed, when they did so, they were healed. You also, O reader, touch the edge of Christ's garment, which is the end of His sojourning in the flesh. For if you believe that He ascended, you will be saved. The garment means His flesh, and its hem, the end of His life on earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
