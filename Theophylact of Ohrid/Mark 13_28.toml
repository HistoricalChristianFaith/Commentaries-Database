[[commentary]]
quote='''
And what I say, the Lord continues, you can understand from the example of the fig tree. Just as the fig tree, having covered itself with leaves, shows that the harvest is near.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'
