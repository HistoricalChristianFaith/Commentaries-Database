[[commentary]]
quote='''
He calls the blessings of the New Testament "things to come," for they were "things to come" in relation to the Old Testament, which existed as long as its time lasted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Colossians%2FChapter%25202.html'
source_title='Commentary on Colossians'
