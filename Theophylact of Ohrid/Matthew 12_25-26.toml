[[commentary]]
quote='''
"And Jesus, knowing their thoughts, said unto them, Every kingdom divided against itself is brought to desolation; and every city or house divided against itself shall not stand: and if Satan cast out Satan, he is divided against himself; how then shall his kingdom stand?" By divulging their thoughts He shows that He is God. He defends Himself from their accusation by means of everyday examples, and reveals their foolishness. For how is it that demons cast out one another when in fact they strive to assist one another? "Satan" means "the adversary."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
