[[commentary]]
quote='''
For this reason, when the Lord healed, those who were healed proclaim Him, despite the fact that He forbade them this and commanded them to say nothing. From this let us also learn, when we do good to others, not to accept praise from them, but when we receive good deeds, to glorify our benefactors and spread word of them, even if they do not wish it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
By this we are taught, when we confer benefits on any, by no means to seek for applause and praise; but when we have received benefits, to proclaim and praise our benefactors, even though they be unwilling.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
