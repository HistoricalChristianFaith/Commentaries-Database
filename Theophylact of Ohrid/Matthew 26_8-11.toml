[[commentary]]
quote='''
But when His disciples saw it, they were indignant, saying, To what purpose is this waste? For this myrrh might have been sold for much, and given to the poor. When Jesus understood it, He said unto them, Why trouble ye the woman? For she hath wrought a good work upon Me. For ye have the poor always with you; but Me ye have not always. Since the disciples had heard much about almsgiving and had given it much consideration, they found fault with the woman, thinking that God desired mercy towards others more than honor for Himself. But He rebukes the disciples for their unwarranted criticism of the woman. For one should not expect exalted things from those who have only recently approached Christ, and especially from those whose emotions are unrestrained, but one should accept even their measure of faith. For whenever someone wants to offer a gift to God, do not scorn him, or cut him off in his eagerness by sending him away to give to the poor, but let him fulfill his offering. But if he should ask your advice as to whether he should give to the poor or make an offering to God, advise him to give to the poor. However, if he has already made the offering to God, there is no reason to scorn him, for one should prefer honor rendered to God above everything else, even almsgiving itself. Nor should you think that because Christ in His love for mankind accepts mercy shown to others as something offered to Himself, that we should overlook God and only practice almsgiving. For if this were so, we ought then to steal from the temples and use what is stolen for almsgiving. But it is not so; and that you may understand that it is not the same thing to show mercy to the poor and to honor Christ Himself and to serve Him, listen: "For ye have the poor always with you; but Me ye have not always." Do you see, then, that it is one thing to serve Christ and another thing to show mercy to the poor, even though Christ in His love for mankind accepts for Himself the things that are done for the poor?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
