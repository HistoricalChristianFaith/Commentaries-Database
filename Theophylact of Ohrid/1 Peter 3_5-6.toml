[[commentary]]
quote='''
Here he calls obedience an adornment, saying: they adorned themselves by being obedient to their own husbands. Having spoken indefinitely of "holy women," he calls them daughters of Sarah either by faith or by descent. For daughters must necessarily imitate their mothers. Along with the adornment befitting Christian women, he urges them to be merciful as well, not fearing punishment from their husbands for it. This is what he means by the words: "you are not troubled by any fear." For it is natural that husbands will sometimes demand an accounting from them of expenditures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25203.html'
source_title='Commentary on 1 Peter'
