[[commentary]]
quote='''
And it is not surprising that the Jews did not understand the words of Jesus, nor did the disciples. For them there were two greatest difficulties: one — that the matter of the resurrection is very hard to comprehend, all the more so since it was entirely unknown to them; the other — that He who lives in the body is God. However, after the resurrection the disciples understood and believed the Scripture. Which Scripture? Both every Scripture that foretells the resurrection, and, as the clearest, this one: "You will not leave my soul in Hades" (Ps. 16:10), and this one: "The Lord desires to cleanse him of his wound and to show him light" (Isa. 53:11). For these passages of Scripture very clearly foretell the resurrection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John'
