[[commentary]]
quote='''
And He laid His hands on them, and departed thence. And, behold, one came and said unto Him, Good Teacher, what good thing shall I do, that I may have eternal life? And He said unto him, Why callest thou Me good? There is none good but One, that is, God. The man did not come testing Christ, but desiring to learn and thirsting for eternal life. He approached Christ as if Christ were a mere man. That is why the Lord says, "Why callest thou Me good? There is none good but One, that is, God." This means, if you call Me good thinking I am one of the teachers, you speak wrongly, for no man is essentially good; both because we are changeable and easily turned away from good, and because, by comparison with God's goodness, human goodness is counted as wickedness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
