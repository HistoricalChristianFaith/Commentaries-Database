[[commentary]]
quote='''
"Fear not, but speak and hold not thy peace." At last the Lord says to Paul that which he especially needed, because nothing grieved him so much as unbelief.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252018.html'
source_title='Commentary on Acts'
