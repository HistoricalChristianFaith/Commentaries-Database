[[commentary]]
quote='''
You cannot, he says, say that they, being sinners, suffered this, but rather such people who are more precious than the world itself. "World" Scripture calls both the multitude of people and creation itself. Here one can understand both meanings. Therefore, he says, if you set against them all of creation together with the people contained in it, you will find nothing equal to them in dignity. Here he stirs their hearts so that they would not care about anything worldly, if the world is not worthy of the saints. It is a disgrace for you if you receive your reward here. For you have shown that you yourself are worth nothing. If the whole world is not worthy of one saint, then why do you care to have your share in it?

They wandered in deserts and mountains, in caves and holes in the ground. For example, Elijah, as well as the prophets whom Obadiah secretly fed in a cave (1 Kings 18:4). They did not even dare to inhabit the wilderness without fear, he says, but were driven from there too by fear, and they moved from one place to another. However, they believed that they would receive eternal consolation from God, and therefore endured this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%252011.html'
source_title='Commentary on Hebrews'
