[[commentary]]
quote='''
Thus He explained everything to the disciples privately, since they came directly to Him and asked. He explained only those things about which they asked and did not know, and not absolutely everything, including what was already clear. For when they understood what they had asked about, other things became clear to them from this as well, and in this way everything was resolved for them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'
