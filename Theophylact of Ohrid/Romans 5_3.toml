[[commentary]]
quote='''
Not only, he says, do we boast in the good things to come, but, what is even more, even in our present afflictions. Do not be troubled, he says, by the fact that we are in afflictions: this is itself a matter of boasting for a Christian.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25205.html'
source_title='Commentary on Romans'
