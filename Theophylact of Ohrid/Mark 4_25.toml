[[commentary]]
quote='''
Whoever has zeal and diligence will also be given a reward, but whoever does not have zeal and diligence, even what he thinks he has will be taken from him. For on account of laziness, even that small spark which he formerly had is extinguished in him, just as through diligence it is kindled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'
