[[commentary]]
quote='''
"Having called the saints and widows, he presented her before them alive" – to the former as a consolation, and to the latter as a protectress.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25209.html'
source_title='Commentary on Acts'
