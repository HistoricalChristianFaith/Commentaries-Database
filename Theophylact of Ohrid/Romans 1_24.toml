[[commentary]]
quote='''
The word "gave over" is used instead of "permitted," just as a physician treating a sick person, seeing that he neglects his diet and does not obey him, gives him over to a greater illness, that is, leaves him and permits him to follow his own will and thus not be freed from the illness. Some, however, understood the expression "God gave them over" as follows: He gave them over to the insult and insolence they had committed against God, just as we say: so-and-so was ruined by money, whereas money does not ruin, but the misuse of it does; or: Saul was corrupted by his kingdom, that is, by the misuse of his kingdom. Thus the pagans were given over to uncleanness by their own depravity, so that there was no need for others to dishonor them, but they themselves brought dishonor upon themselves; for such are impure passions. And for what were they given over to uncleanness? For having dishonored God; for whoever does not wish to know God is immediately corrupted in morality as well, as David also says: "The fool has said in his heart, There is no God," and then: "they are corrupt and have done abominable works" (Ps. 13:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25201.html'
source_title='Commentary on Romans'
