[[commentary]]
quote='''
Not by works of the law, as was said, for example circumcision and the like, but by works of righteousness and similar virtues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520James%2FChapter%25202.html'
source_title='Commentary on James'
