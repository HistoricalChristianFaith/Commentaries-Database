[[commentary]]
quote='''
He puts forward the first parable about the seed in order to make the listeners more attentive. Since He intends to say that the seed is the word and that it perishes when it falls among the inattentive, He speaks of this first of all, so that the listeners might take care to be attentive and not resemble that soil which destroys the seed. But who is the Sower? Christ Himself, Who in His love for mankind and condescension went forth inseparably from the bosom of the Father, and went forth not to burn the accursed earth and evil hearts, not to cut down the thorns, but to sow seed. What seed? That of Moses? That of the prophets? No, His own — that is, to preach His own Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Hearken: behold, there went out a sower to sow. Now the Sower is Christ.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
