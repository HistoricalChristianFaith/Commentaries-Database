[[commentary]]
quote='''
He adds that "we ourselves also, having the firstfruits of the Spirit," that is, having tasted the future blessings, "groan," because we do not yet possess them, for we form our conception of the future blessings from the gifts we have received (for these gifts are the firstfruits). Then, lest the heretics have occasion to think that the world is evil and that this is why we groan, he says: "waiting for the adoption." How so? We have already been adopted: what other adoption then shall we receive? I speak, he answers, not of the adoption that is accomplished through baptism (for we have already received that adoption), but of the perfect glory, consisting in the incorruption of the body. This is the perfect redemption, the freedom and liberation from death and suffering, when from the state of adoption we shall no longer return to the slavery of sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25208.html'
source_title='Commentary on Romans'
