[[commentary]]
quote='''
Some say that Judas did not partake of the Holy Mysteries, but went out before the Lord imparted these Mysteries. On the contrary, others maintain that the Lord gave His Holy Things even to this ungrateful one. Having blessed, that is, having given thanks, the Lord broke the bread. We do the same, pronouncing prayers. "This," He says, "which you now receive, is My Body," for the bread is not an image of the Lord's Body, but the very Body of Christ, into which the bread is changed. And the Lord says: "the bread that I shall give is My Flesh" (Jn. 6:51); He did not say: an image of My Flesh, but "My Flesh." And again: "unless you eat the Flesh of the Son of Man" (Jn. 6:53). But how is this? someone may perhaps say: for no Flesh is visible here? This is because of our weakness, O man! Since bread and wine are ordinary things for us, and to see Flesh and Blood set before us would be unbearable for us, and we would turn away from them, God the Lover of mankind, in His condescension toward us, preserves the appearance of bread and wine, but they are changed into the power of Flesh and Blood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
That is, giving thanks, He brake it, which we also do, with the addition of some prayers.

That, namely, which I now give and which ye take. But the bread is not a mere figure of the Body of Christ, but is changed into the very Body of Christ. For the Lord said, The bread which I give you is my flesh. But the flesh of Christ is veiled from our eyes on account of our weakness, for bread and wine are things to which we are accustomed, if however we saw flesh and blood we could not bear to take them. For this reason the Lord bending Himself to our weakness keeps the forms of bread and wine, but changes the bread and wine into the reality of His Body and Blood.

Some say that Judas did not partake in these mysteries, but that he went out before the Lord gave the Sacrament. Some again say that He gave him also of that Sacrament.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
