[[commentary]]
quote='''
He who, he says, distinguishes days, distinguishes them for the Lord, as one who is reverent; and he who does not distinguish days, does not distinguish them for the Lord, as one who is already perfect in Christ and has risen above the observances of the Law. We ask about one thing only, he says: whether they do this for Christ's sake, and whether the one who eats and the one who does not eat give thanks to God? For what is done in this way is not subject to accusation and slander. He says this, as I said, because the Romans were still new in the faith. But in a hidden way he also strikes a blow against those who hold to Judaism. How can one who still holds to the law give thanks? Therefore, only the one who eats gives thanks.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252014.html'
source_title='Commentary on Romans'
