[[commentary]]
quote='''
"He that findeth his life shall lose it: and he that loseth his life for My sake shall find it." He who pampers his life in the flesh appears to "find his life," while in fact he is losing it by sending it to eternal punishment. But he who loses his life and dies, not as a thief or one who strangles himself, but for Christ's sake, he it is that saves his life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
