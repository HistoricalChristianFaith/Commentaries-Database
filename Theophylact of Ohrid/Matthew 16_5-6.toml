[[commentary]]
quote='''
And when His disciples were come to the other side, they had forgotten to take bread. Then Jesus said unto them, Take heed and beware of the leaven of the Pharisees and of the Sadducees. Just as leaven is both sour and old, so too the sour teaching of the Pharisees and Sadducees, with its moldering traditions of the elders, ate away at souls. And just as leaven is a mixture of water and flour, so the teaching of the Pharisees is a mixture of their speech and their corrupted life. He did not say openly to them, "Beware of the teaching of the Pharisees," so that He might remind them of the signs done with the loaves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
