[[commentary]]
quote='''
Since he said: "exhort one another," then, lest they conclude that he himself elevates them to the dignity of teachers, and lest they rise up against their teachers, he says: even if I have entrusted to you the edification of one another, I still urge you to treat them with honor. For teachers are compelled to endure many hardships, which honor for them will, of course, somewhat alleviate. If you honor those who intercede for you before man, then how much more should you show full gratitude to those who intercede for you before God? "In the Lord," that is, he does not preside over worldly things, but over spiritual things, which are in the Lord — he prays for you, regenerates you through baptism, watches over you, admonishes and heals you — at midnight, if you call, he comes. You see how he intercedes for you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25205.html'
source_title='Commentary on 1 Thessalonians'
