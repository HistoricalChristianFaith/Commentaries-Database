[[commentary]]
quote='''
Or, the Holy Spirit is the porter, by whom the Scriptures are unlocked, and reveal the truth to us.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"The doorkeeper opens to Him." By the doorkeeper, understand perhaps Moses as well, for to him were entrusted the words of God. Moses opened the door to the Lord, without doubt, by speaking about Him. The Lord Himself said: "If you believed Moses, you would believe Me also" (John 5:46). Or the doorkeeper is the Holy Spirit. Since the Scriptures, understood through the illumination of the Holy Spirit, point us to Christ, it is rightly said that the Holy Spirit is the doorkeeper. By Him, as the Spirit of wisdom and knowledge, the Scriptures are opened, through which the Lord enters into His care for us and through which He is shown to be the Shepherd. And the sheep listen to the voice of the Shepherd.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John'
