[[commentary]]
quote='''
I turn you away from idols not because they have the power to do harm or good, for they are decidedly nothing, but because the sacrifice offered to them does not go to your Master. Therefore he continues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252010.html'
source_title='Commentary on 1 Corinthians'
