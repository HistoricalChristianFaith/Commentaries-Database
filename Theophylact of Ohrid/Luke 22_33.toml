[[commentary]]
quote='''
Relying on his strong love, he promises what is for now impossible for him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
He burns forth indeed with too much love, and promises what is impossible to him. But it behoved him as soon as he heard from the Truth that he was to be tempted, to be no longer confident.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
