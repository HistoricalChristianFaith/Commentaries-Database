[[commentary]]
quote='''
The Lord sits upon the colt for two purposes at one and the same time: first, to fulfill the prophecy which says, "Behold, your King comes," sitting upon a beast of burden (Zech. 9:9); and second, to figuratively let us know that He would subdue to Himself a new, unclean, and untamed people of the Gentiles. Judging by the distance of the journey, the Lord doubtless had no need of a beast of burden. For having traversed all of Galilee and Judea on foot, how would He have need of a colt for the passage from Bethany to Jerusalem, where the distance, as everyone knows, is insignificant? And so He does this, as I said, with a mystical meaning.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'
