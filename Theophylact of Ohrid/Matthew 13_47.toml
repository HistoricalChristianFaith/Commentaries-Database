[[commentary]]
quote='''
Fearful is this parable, for it shows that though we believe, if we do not lead a good life we shall be cast into the fire. The net is the teaching of the fishermen apostles, woven from miracles and the prophets' testimonies. For what the apostles taught, they confirmed with miracles and the voices of the prophets. This net, then, caught all kinds - barbarians, Greeks, Jews, harlots, publicans, and thieves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
