[[commentary]]
quote='''
The species of animals are taken in place of human characteristics, and from the description of Peter's vision it is known that in the vessel that descended from heaven there were all kinds of animals: creeping things, birds, and four-footed beasts. This is because the word figuratively depicts that those who are to turn to the faith are under the dominion of various sins, that they have become like either four-footed beasts in cruelty, or creeping things in venomousness, or birds in the lightness and inconstancy of their nature. And moreover, serpents are taken as a symbol of the Sadducees and Pharisees, and the fox as a symbol of Herod, and horses aroused by the passion for sexual union as a symbol of lustful people; sheep stand for the most gentle people, goats for the unsociable and indifferent, and hedgehogs for the rich; of them the Lord said that with their thorns they pierce the word and make it barren.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
