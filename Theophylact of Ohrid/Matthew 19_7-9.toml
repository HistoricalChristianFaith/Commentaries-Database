[[commentary]]
quote='''
They say unto Him, Why did Moses then command to give a writing of divorcement, and to put her away? He saith unto them, Moses because of the hardness of your hearts permitted you to put away your wives: but from the beginning it was not so. And I say unto you, Whosoever shall put away his wife, except it be for fornication, and shall marry another, committeth adultery: and whoso marrieth her who is put away doth commit adultery. When the Pharisees saw that the Lord had confuted them, they were compelled to bring forward Moses as a lawgiver who contradicted Christ, and they asked, "Why did Moses then command to give a writing of divorcement, and to put her away?" Then the Lord, turning every accusation upon their own head, defends Moses by saying, "Moses did not set this law in contradiction to God, but rather he addressed this law to your depravity, so that when you in your licentiousness desired to come together with other women, you would not put to death your first wife." For the Israelites, being cruel, would have murdered their wives if they were constrained to keep them. So Moses provided in the law for a writ of divorce to be given to those wives who were hated by their husbands. But I say to you, Christ says, that it is good to divorce as an adulteress a wife who has committed fornication, but if one divorces a wife who has not committed fornication, he becomes in part the cause of adultery for her if she should marry again. Understand this also, that "he that is joined unto the Lord is of one spirit with Him" (I Cor. 6:17) and a union takes place between the believer and Christ. For we have all become one body with Him and we are, each one of us, members of Christ. So indeed no one can separate such a union, as Paul said, Who can separate us from the love of Christ? For what God has joined together, nothing can separate, as Paul says, neither man nor any other created thing, not angels, principalities, or powers (See Rom. 8:38-39).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
