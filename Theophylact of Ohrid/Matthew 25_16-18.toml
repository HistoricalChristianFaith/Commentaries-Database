[[commentary]]
quote='''
Immediately he who had received the five talents went and traded with them. See the speed with which he acts, not in the least bit negligent, but immediately trading and doubling what he had received. For whether a man be gifted with speech, wealth, the authority of kingship, or any other power or skill, if he desires to benefit not only himself but others as well, he doubles what has been given to him. But he who buries the talent is he who cares only for his own benefit and not for that of others, and he is condemned. But if you should see an intelligent and skilled man misusing his intelligence in various pursuits, in deceitfulness, and in earthly affairs, you may say that such a man has buried his talent in the earth, that is, in earthly matters.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
