[[commentary]]
quote='''
By the Kingdom of God He means God's providence concerning us. The "man" is God Himself, Who for our sake became man. He cast "seed into the ground," that is, the evangelical preaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'
