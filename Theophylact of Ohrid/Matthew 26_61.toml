[[commentary]]
quote='''
Truly these were false witnesses. For Christ had not said, "I am able to destroy," but "You shall destroy." And He had not said, "the temple of God," but "this temple," that is, "My Body." And again, He had not said, "I shall build," but "I shall raise." So they were clearly false witnesses, the Lord having said one thing while they reported that He had said another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
