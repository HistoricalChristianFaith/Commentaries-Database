[[commentary]]
quote='''
Having spoken of His glory and wishing to teach that He does not mention it in vain, the Lord then says that "there are some of those standing here," that is, Peter, James, and John, who will not die until I show them in My Transfiguration that with which glory I shall appear at the time of My coming. For the Transfiguration is nothing other than a foreshadowing of the Second Coming. So shall He Himself shine at that time; so too shall the righteous shine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But because He had spoken of His glory, in order to show that His promises were not vain, He subjoins, Verily I say unto you, That there be some of them that stand here who shall not taste of death, till they have seen the kingdom of God come with power. As if He said, Some, that is, Peter, James, and John, shall not taste of death, until I show them, in my transfiguration, with what glory I am to come in my second advent; for the transfiguration was nothing else, but an announcement of the second coming of Christ, in which also Christ Himself and the Saints will shine.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
