[[commentary]]
quote='''
Then went one of the twelve, called Judas Iscariot, unto the high priests, and said unto them, What will ye give me, and I will hand him over to you? And they covenanted with him for thirty pieces of silver. And from that time he sought an opportunity to betray Him. When the woman who was a stranger and a harlot had shown Jesus such honor, then it was that His own disciple departed to betray Him. For it was not without meaning that the evangelist says, "Then went...," but in order to show the shamelessness of Judas. He adds the name "Iscariot" to better identify him. For there was another Judas who was also called Lebbaeus (Mt. 10:3 and Lk. 6:16). The betrayer, however, was from a certain village named Iscara. "They covenanted with him for thirty pieces of silver," that is, they agreed, they determined an amount to give, and not as many think, that they weighed out and paid the money. "He sought an opportunity" to betray Him to them when He was alone, for they feared the multitude, and for this reason they paid Judas to inform them when Jesus would be alone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
