[[commentary]]
quote='''
When He wills it, then their eyes are opened, and they recognize Him. This also signifies something else, namely: that those who partake of the blessed bread have their eyes opened to behold Him. For the flesh of the Lord possesses great and ineffable power.
He becomes invisible to them, because He no longer had such a body as to remain with them bodily for a long time, and also in order that by such an action He might strengthen their love even more.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But He also implies another thing, that the eyes of those who receive the sacred bread are opened that they should know Christ. For the Lord's flesh has in it a great and ineffable power.

For He had not such a body as that He was able to abide longer with them, that thereby likewise He might increase their affections.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
