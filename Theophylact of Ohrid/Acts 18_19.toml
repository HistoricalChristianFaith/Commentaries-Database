[[commentary]]
quote='''
He left Aquila and Priscilla in Ephesus, no doubt so that they might teach, for having spent so much time with Paul, they had learned much.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252018.html'
source_title='Commentary on Acts'
