[[commentary]]
quote='''
"Being at a loss regarding the resolution of this question." The examination of such a case left the judge perplexed, since the matter was beyond his understanding.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252025.html'
source_title='Commentary on Acts'
