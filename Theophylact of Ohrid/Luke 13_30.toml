[[commentary]]
quote='''
These words are directed at us when we act in a manner inconsistent with the faith. For we too boast in the Law of Christ, but then trample upon it when we transgress it, and therefore, although we seem to be "first," as having received Christ and His teaching from our very swaddling clothes, we shall be "last," because the pagans who believed at the end of their lives and lived in a God-pleasing manner for the remaining time will be placed above us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But we as it seems are the first who have received from our very cradles the rudiments of Christian teaching, and perhaps shall be last in respect of the heathens who have believed at the end of life.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
