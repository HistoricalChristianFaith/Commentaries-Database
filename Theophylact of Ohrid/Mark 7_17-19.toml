[[commentary]]
quote='''
As for the apostles, who understood the Lord's speech more deeply and approached to ask Him about the "parable," that is, about this veiled speech (a parable is a veiled speech), the Lord first rebuked them, saying: "Are even you so lacking in understanding?" but then resolved for them what had been difficult to comprehend.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The Lord begins by chiding them, wherefore there follows, Are ye so without understanding also?

Then the Lord shows them what was hidden, saying, Do ye not perceive, that whatsoever thing from without entereth into the man, it cannot make him common?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
