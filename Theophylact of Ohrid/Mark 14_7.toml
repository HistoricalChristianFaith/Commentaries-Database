[[commentary]]
quote='''
Let those be ashamed, then, who prefer the poor to Christ! For I have heard goldsmiths who say that if one breaks a church vessel into pieces and gives them to the poor, there will be no sin. Let them hear, then, how Christ values service to Him above service to the poor. And on the golden diskos is the true Body of Christ, and in the chalice is the Blood of Christ. Therefore, whoever carries off a precious diskos from the church and causes the Body of Christ to be placed on a poor diskos, citing the poor as his excuse, let him know whose companion he becomes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
