[[commentary]]
quote='''
He did not say: partook of the likeness of His death, but says "united," indicating by the word "union" the fruit of Christ's death in us. The body of Christ, buried in the earth, brought forth the fruit of salvation. Since we are buried in water, while Christ in the earth, and moreover we are buried to sin, while He in body, he did not say "death," but "the likeness of death." Therefore we shall also be partakers of the resurrection, inheriting eternal life, as those who have shown forth the resurrection consisting in good works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25206.html'
source_title='Commentary on Romans'
