[[commentary]]
quote='''
He calls His death "baptism." Since this fire was to be kindled in no other way than after His death, for from there the preaching and zeal grew, He adds a word about death, calling it a baptism. Strongly desiring it, He says: "how I am distressed," that is, how much I care and "am distressed until it is accomplished!" For I thirst for death for the salvation of all.
The Lord came to bring down fire not only upon the earth, on which His teaching and faith spread, but also upon the soul of each person, which (in itself) is thorny and barren ground, but is kindled as if by fire through the Word of God and becomes capable of receiving Divine seeds and spiritually fruitful. For when the grace of God invisibly touches someone's soul, it seems to burn with such love for God that it cannot even be expressed. Just so Cleopas and his companion, being invisibly inflamed by the fire of God's grace, said: "Did not our heart burn within us" (Luke 24:32). Whoever has experienced such a state will understand our words. And many people often experience this while reading the Divine Scriptures or the lives of the holy fathers, or when being persuaded and instructed by someone, their souls being inflamed toward the doing of good; and some burn to the end, while others immediately grow cold.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'
