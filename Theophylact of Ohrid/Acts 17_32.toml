[[commentary]]
quote='''
Having heard this great and lofty truth, they said not a word to Paul, but mocked the resurrection: "The natural man does not receive the things of the Spirit of God" (1 Cor. 2:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252017.html'
source_title='Commentary on Acts'
