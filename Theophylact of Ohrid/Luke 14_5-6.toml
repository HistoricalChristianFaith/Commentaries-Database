[[commentary]]
quote='''
Then by this act He also shames the Pharisees, saying to them as if thus: if the Law forbade showing mercy on the Sabbath, would you not care for your son who fell into misfortune on the Sabbath? And why do I speak of a son? Would you leave an ox without help if you saw it in distress? How is it not madness, then, to lie in wait to accuse someone for healing on the Sabbath a man suffering from dropsy?
Every person who has become gravely ill in soul from a dissolute and careless life and is in need of Christ also suffers from dropsy. Such a person will be healed if he presents himself before Christ. For whoever constantly keeps in mind that he is before God and that God sees him will sin as little as possible.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
