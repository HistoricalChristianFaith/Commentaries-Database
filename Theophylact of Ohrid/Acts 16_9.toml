[[commentary]]
quote='''
"There was a vision to Paul in the night: a certain man, a Macedonian, stood before him, asking him and saying." No longer through an Angel, as with Philip and Cornelius, but in a vision Paul receives the revelation — in a more human manner. Where it is easy to persuade, there it is in a more human manner, but where great effort is required, there the revelation comes in a more Divine form.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252016.html'
source_title='Commentary on Acts'
