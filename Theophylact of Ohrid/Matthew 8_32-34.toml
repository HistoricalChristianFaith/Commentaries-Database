[[commentary]]
quote='''
"And, behold, the whole herd of swine ran violently down a steep place into the sea, and perished in the waters. And they that kept them fled, and went their ways into the city, and told everything, and what was befallen to those possessed of the demons. And, behold, the whole city came out to meet Jesus: and when they saw Him, they besought Him that He would depart out of their region." The inhabitants of the city begged Jesus to leave because they were grieved and thought that they would suffer something worse thereafter. You, O reader, learn that where there is swinish life, it is not Christ Who dwells there, but demons.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
