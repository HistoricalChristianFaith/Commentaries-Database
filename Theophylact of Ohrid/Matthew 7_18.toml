[[commentary]]
quote='''
"A good tree cannot bring forth evil fruit, neither can a corrupt tree bring forth good fruit." A corrupt tree cannot bring forth good fruit as long as it is diseased. But if it has changed its condition, it can bring forth good fruit. See that He did not say, "it will not be able," but only that as long as it is corrupt it does not bear good fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
