[[commentary]]
quote='''
As if He said, Though I shall die, I shall rise again. And ye shall live also, i. e. when ye see Me risen again, ye will rejoice, and be as dead men brought to life again.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
And lest they think that He would appear in the body to them and to everyone as before, He says: "The world will no longer see Me. You alone will see Me after the resurrection. For I live; though I will accept death, yet I will rise again."

"And you shall live," that is, having seen Me, you will rejoice and, as if after death, will come alive from My appearing. Or also thus: "Just as My death served unto life, so you also, though you die, shall live." Therefore, do not grieve either over Me dying, or over yourselves. For even if you die, you shall live in the life to come.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
