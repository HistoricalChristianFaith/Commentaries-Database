[[commentary]]
quote='''
What then does Christ do? Teaching the disciples to be humble-minded and to reject worldly pride, He receives and embraces the children. By this He shows that He accepts the innocent; therefore He also says: "for of such is the Kingdom of God." Note, He did not say "of these children is the Kingdom," but "of such," that is, of those who have acquired the same innocence that children possess by nature. For a child does not envy, does not remember wrongs, and when punished by its mother does not run from her, but even if she wore rags, would prefer her to a queen; so also one who lives virtuously prefers his mother — I mean the Church — to all things, and is not carried away by worldly pleasures. For this reason the Lord also embraces such ones, saying: "Come unto Me, all you who labor and are heavy laden" (Matt. 11:28), and blesses them, saying: "Come, you blessed of My Father" (Matt. 25:34).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
