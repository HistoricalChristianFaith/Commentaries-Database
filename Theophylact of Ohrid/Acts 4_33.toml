[[commentary]]
quote='''
"With great power they witnessed of the resurrection." Luke presents the apostles as people who have been entrusted with something, and speaks as if of a duty—that is what "witnessed" means.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25204.html'
source_title='Commentary on Acts'
