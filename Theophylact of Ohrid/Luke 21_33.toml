[[commentary]]
quote='''
Since He said that there would be commotions and wars, and changes both in the elements and in things themselves, lest anyone should come to think that perhaps Christianity too might someday be overthrown, He says: no! this generation, that is, the generation of Christians, shall never pass away. Heaven and earth shall change, but My words and My Gospel shall not be overthrown, but shall abide forever, even if everything were shaken, and faith in Me shall not fail. From this it is also evident that He prefers the Church to all creation: for creation shall change, but of the Church of the faithful, as well as of His words and Gospel, nothing shall perish.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
For because He had foretold that there should be commotions, and wars, and changes, both of the elements and in other things, lest any one might suspect that Christianity itself also would perish, He adds, Heaven and earth shall pass away, but my words shall not pass away: as if He said, Though all things should be shaken, yet shall my faith fail not. Whereby He implies that He sets the Church before the whole creation. The creation shall suffer change, but the Church of the faithful and the words of the Gospel shall abide for ever.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
