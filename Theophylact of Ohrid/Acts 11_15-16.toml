[[commentary]]
quote='''
But he is not content even with what was said above, and recalls also the saying of the Lord: "You shall be baptized with the Holy Spirit." Nothing new happened, he says, but only what He had foretold. But, they will say, there was no need even to baptize; yet baptism was performed. And he does not say "I commanded them to be baptized," but shows that he did nothing new.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252011.html'
source_title='Commentary on Acts'
