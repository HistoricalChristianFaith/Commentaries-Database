[[commentary]]
quote='''
He tames their agitation with two examples. First, with the example of the Gentiles, whom they considered unclean, declaring that if they think this way, they will be like the Gentiles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'
