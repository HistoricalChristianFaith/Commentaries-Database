[[commentary]]
quote='''
And if you cannot add even the least thing, why do you worry about the rest? It is obvious that just as God grants growth in stature, so too will He provide the rest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'
