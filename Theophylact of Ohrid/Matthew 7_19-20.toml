[[commentary]]
quote='''
"Every tree that bringeth not forth good fruit is hewn down, and cast into the fire. Wherefore by their fruits ye shall know them." He addresses the Jews, speaking the same words as did John (Mt. 3:10). Jesus likens man to a tree. For by the introduction of a graft, a fruitless tree can bear fruit; so, too, a sinful and fruitless man when engrafted with Christ can bear fruits of virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
