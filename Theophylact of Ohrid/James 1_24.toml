[[commentary]]
quote='''
To hearing the apostle added doing, because for the salvation of the soul the hearing of the law alone is not sufficient, but hearing must be confirmed by fulfillment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520James%2FChapter%25201.html'
source_title='Commentary on James'
