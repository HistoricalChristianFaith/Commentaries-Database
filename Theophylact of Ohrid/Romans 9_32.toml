[[commentary]]
quote='''
You ask: why did the Israelites not attain righteousness, even though they earnestly pursued it? Know that they sought justification not in faith, but as if in the works of the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25209.html'
source_title='Commentary on Romans'
