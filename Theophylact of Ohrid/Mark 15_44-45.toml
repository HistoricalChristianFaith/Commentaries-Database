[[commentary]]
quote='''
"Pilate marveled that He was already dead," for he thought that Christ would endure suffering for a long time, as the robbers did, which is why he asked the centurion, "Has He been dead long?" That is, could He really have died before the expected time?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
It goes on: And Pilate marvelled if he were already dead. For he thought that He should continue long alive upon the cross, as also the thieves used to live long, upon the instrument of their execution. It goes on: And calling unto him the centurion, he asked him if he had been any while dead; that is, before the time when other executed persons usually died. There follows: And when he knew it of the centurion, (that is, that He was dead,) he gave the body to Joseph.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
