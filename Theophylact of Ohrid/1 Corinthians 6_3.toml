[[commentary]]
quote='''
Angels he calls the demons. So then, we shall judge even the demons if, despite being clothed in flesh, we prove ourselves more perfect than they who have no flesh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25206.html'
source_title='Commentary on 1 Corinthians'
