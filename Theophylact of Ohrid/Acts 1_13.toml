[[commentary]]
quote='''
He prudently enumerates the disciples. Since one of them betrayed, another denied, and a third did not believe, he shows that, apart from the betrayer, all were present.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25201.html'
source_title='Commentary on Acts'
