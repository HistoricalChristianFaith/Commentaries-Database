[[commentary]]
quote='''
Before going to other cities, he visits those which had already received the word of God. We do the same: we first instruct the earliest people, so that they do not become an obstacle to the instruction of those who come after.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
