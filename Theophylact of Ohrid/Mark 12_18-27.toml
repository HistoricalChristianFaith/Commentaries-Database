[[commentary]]
quote='''
A certain heretical sect of the Jews called Sadducees denied the resurrection, and said that there was neither angel nor spirit. These then coming to Jesus, craftily proposed to Him a certain tale, in order to show that no resurrection should take place, or had taken place; and therefore there is added, And they asked him, saying, Master. And in this tale they lay down that seven men had married one woman, in order to make men draw back from belief in the resurrection.

As if He had said, Ye understand not what sort of a resurrection the Scriptures announce; for ye believe that there will be a restoration of our bodies, such as they are now, but it shall not be so. Thus then ye know not the Scriptures; neither again do ye know the power of God; for ye consider it as a difficult thing, saying, How can the limbs, which have been scattered, be united together and joined to the soul? But this in respect of the Divine power is as nothing. There follows: For when they shall rise from the dead, they neither marry, nor are given in marriage; but are as the angels which are in heaven; as if He had said, There will be a certain heavenly and angelic restoration to life, when there shall be no more decay, and we shall remain unchanged; and for this reason marriage shall cease. For marriage now exists on account of our decay, that we may be carried on by succession of our race, and not fail; but then we shall be as the Angels, who need no succession by marriage, and never come to an end.

In another way also they are deceived, not understanding the Scriptures; for if they had understood them, they should also have understood how by the Scriptures the resurrection of the dead may be proved; wherefore He adds, And as touching the dead, that they rise, have ye not read in the book of Moses, how in the bush God spake unto him, saying, I am the God of Abraham, and the God of Isaac, and the God of Jacob?

But I say, I am the God of Abraham, the God of Isaac, and the God of Jacob. As if He had said, The God of the living, wherefore He adds, He is not the God of the dead, but of the living; for He did not say, I have been, but I am, as if they had been present. But some one perhaps will say, that God spake this only of the soul of Abraham, not of his body; to which I answer, that Abraham implies both, that is, soul and body, so that He also is the God of the body, and the body lives with God, that is, in God's ordinance.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The Sadducees were such heretics among the Jews who said that there is neither Resurrection, nor Angel, nor Spirit. Being crafty people, they invented such a story in order to overthrow thereby the truth of the Resurrection. They pose a question about something that never happened and could never happen. And that seven husbands took (one after another) one and the same wife — this they invented for greater mockery of the Resurrection. What then does the Lord say? Since they presented the Law of Moses as the basis of their question, He convicts them of ignorance of the Scriptures. You, He says, do not understand what kind of Resurrection is spoken of in Scripture: you think that in the Resurrection the condition of people (in body and in soul) will be the same as now; no, not so: you do not understand the meaning of Scripture, nor do you comprehend the power of God. You evidently pay attention only to the difficulty of the matter, and therefore are perplexed as to how bodies that have decomposed can again be reunited with souls, but for the power of God this means nothing. After the Resurrection, the condition of the risen will not be sensual but God-like, and the manner of life will be angelic. For we shall no longer be subject to corruption, but shall live eternally, and for this reason marriage will then be abolished. Now marriage exists because of mortality, so that, being sustained by the succession of the race, we might not perish. But then, like the Angels, people will exist without the mediation of marriage, will never diminish in number, and will abide forever without decrease. In yet another respect the Sadducees show themselves ignorant of the Scriptures. If they understood them, they would have grasped why it was said, "I am the God of Abraham, Isaac, and Jacob" — which refers to the living. For the Lord did not say "I was," but "I am" their God, as though they are present, not perished. But perhaps someone will say that the Lord said this only about the soul of the patriarchs, and not also about the body, and that from this one cannot conclude anything about the resurrection of bodies. To this I will say that the name Abraham refers not to the soul alone, but to soul and body together, since God is God of the body as well, and it is alive before God and has not passed into non-existence. Furthermore, since the Sadducees disbelieved only in the resurrection of bodies, the Lord also spoke about bodies — that they are alive before God — and not about souls; the latter even the Sadducees acknowledged. Then pay attention also to this: resurrection is the rising up of what has fallen (into the earth, into dust); but it was not the soul that fell (for it is immortal), but the body; therefore it is the body that shall rise again, being reunited with its allied soul.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Commentary on Mark'