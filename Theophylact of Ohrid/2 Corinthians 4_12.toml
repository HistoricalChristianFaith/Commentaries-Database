[[commentary]]
quote='''
He calls death here temptations, saying: we are in dangers, while you enjoy the life that flows from these dangers, namely through the preaching of the Gospel to you, through which you live eternal life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%25204.html'
source_title='Commentary on 2 Corinthians'
