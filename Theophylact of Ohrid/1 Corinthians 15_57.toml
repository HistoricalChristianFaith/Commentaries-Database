[[commentary]]
quote='''
The Lord Jesus fought the contest, and to us the victory was given — not by merit, not by obligation, but by the grace and love of God the Father, Who made us victors through the contest of His Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252015.html'
source_title='Commentary on 1 Corinthians'
