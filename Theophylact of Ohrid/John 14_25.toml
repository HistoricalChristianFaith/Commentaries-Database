[[commentary]]
quote='''
Since the Lord's words were unclear to the disciples, and some of them they did not understand, while about the greater part they had doubts, then, lest they again ask Him and say, which commandments must we keep, He frees them from anxiety and confusion, saying that the Comforter will make what is unclear and difficult to understand easy to understand for you. This, which seems unclear to you, I said while remaining with you and being with you; but if I depart, then you will be taught all things. Therefore, you need not grieve on account of separation from Me, when it will bring you so many blessings and so much wisdom. For as long as I Myself remain with you and the Spirit does not come, you can comprehend nothing great or lofty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
