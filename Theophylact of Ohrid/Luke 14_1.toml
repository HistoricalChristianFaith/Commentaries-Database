[[commentary]]
quote='''
The Lord, although He knew the corruption of the Pharisees, nevertheless entered into their house; He entered because He was concerned for the benefit of their souls. For they, if they had wished, could have received benefit both from His words and teaching, and from the manifestation of signs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
