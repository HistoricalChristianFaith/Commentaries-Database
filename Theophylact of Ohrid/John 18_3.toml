[[commentary]]
quote='''
Judas knew that at the feast time our Lord was wont to teach His disciples high and mysterious doctrines, and that He taught in places like this. And as it was then a solemn season, he thought He would be found there, teaching His disciples things relating to the feast.

They carry torches and lanterns, to guard against Christ escaping in the dark.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
They persuade a detachment of soldiers to assist them for money; for soldiers are such that they can be bribed with gold. Many of them come, because they fear the followers of Jesus, who were attached to Him on account of His teaching and miracles.
They carry with them lanterns and torches, so that Jesus, having hidden in the darkness, would not flee from them. But He so little needed to flee that He Himself goes out to meet them and gives Himself up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John'
