[[commentary]]
quote='''
Christ, he says, brought benefit not merely to the same degree that Adam caused harm. If sin was so powerful that through the fall of one all his descendants were condemned, even though they themselves did not fall, then how much greater and more abundant will be the effect of the grace of God the Father upon many, and not only His, but also of His Son. And the gift of God cannot be equal to the condemnation through the one who sinned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25205.html'
source_title='Commentary on Romans'
