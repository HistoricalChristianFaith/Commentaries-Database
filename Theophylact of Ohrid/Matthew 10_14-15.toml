[[commentary]]
quote='''
"And whosoever shall not receive you, nor hear your words, when ye depart out of that house or city, shake off the dust from your feet. Verily I say unto you, It shall be more tolerable for the land of Sodom and Gomorrah in the day of judgement, than for that city." He wants them to shake the dust from their feet to show that the apostles received nothing from that place because of the inhabitants' unbelief; or, as a testimony to the great distance the apostles had walked, which nonetheless brought no benefit to the inhabitants. It will be more tolerable for the Sodomites than for the unbelievers because the Sodomites, having been chastised here in this life, will be punished less severely there in the next life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
