[[commentary]]
quote='''
But they thought it was a phantom, so extraordinary and strange was the sight. For they did not recognize Him by figure, because it was night and because of fear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
