[[commentary]]
quote='''
Again, ye have heard that it hath been said, Thou shalt not swear falsely, but shalt perform unto the Lord thine oaths. That is, when you take an oath, speak the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
