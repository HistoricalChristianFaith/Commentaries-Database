[[commentary]]
quote='''
From this some believe that the Lord did not eat the Pascha that year. For they say that only while standing was the Paschal lamb to be eaten. Yet Christ sat down; hence it could not have been the Pascha which He ate. But we might say that first He ate the Pascha standing, and then He sat down and gave them His own Mystery and Sacrament. For having first kept the Pascha in type, He then kept it in truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
