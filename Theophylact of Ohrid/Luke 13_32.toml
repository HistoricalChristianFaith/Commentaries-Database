[[commentary]]
quote='''
He, knowing their hearts, according to His custom, answers them meekly, in a veiled manner, and says: "tell that fox." It appears that He is calling Herod a fox, but if one examines more carefully, it seems rather that He is calling the Pharisees this. For He did not say: "that" fox, but "this" fox, using a somewhat ambiguous expression with a particular intent. By saying "fox" in the singular, He gave them to understand Herod, but by saying the demonstrative "this," He hinted at their own craftiness. For the Pharisees truly displayed in their conduct the cunning and carelessness of a fox.
Look, if you will, how He responds to their malice. Since they were trying to frighten Him with Herod out of envy at the healings He performed, He, knowing what brought them grief, says the following: behold, I "perform healings" and "cast out demons." For, as was said before, they persecuted Him so that He might not, by the display of miracles, draw many into faith in Himself. The words "today and tomorrow" signify a large number of days. Just as we in ordinary conversation usually say: today and tomorrow such-and-such will happen, yet we do not at all limit this matter to such a span, but only express that it will be soon, so also Christ by the words "today and tomorrow... I perform healings,... and on the third day I finish" did not at all mean that on the third day He would necessarily die, but rather expresses that His death would be soon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
As if He says, What think ye of My death? Behold, a little while, and it will come to pass. But by the words, To day and to morrow, are signified many days; as we also are wont to say in common conversation, "To day and to morrow such a thing takes place," not that it happens in that interval of time. And to explain more clearly the words of the Gospel, you must not understand them to be, I must walk to day and to morrow, but place a stop after to day and to morrow, then add, and walk on the day following, as frequently in reckoning we are accustomed to say, "The Lord's day and the day after, and on the third I will go out," as if by reckoning two, to denote the third. So also our Lord speaks as if calculating, I must do so to day, and so to morrow, and then afterward on the third day I must go to Jerusalem.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
