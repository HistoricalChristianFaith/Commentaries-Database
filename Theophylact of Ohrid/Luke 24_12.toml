[[commentary]]
quote='''
However, Peter does not delay, like fire that has taken hold of material, but runs to the tomb and sees only the linen cloths lying there. And from the fact that he reached the tomb, the first benefit is that instead of mocking, he marvels: "and he went away (it says), wondering in himself at what had happened." For how did the linen cloths alone remain, and that when the body had been anointed with myrrh? How much leisure did the thief have, when he left them properly folded, carried out the body, and that when soldiers had been posted? By "Mary, the mother of James," understand the Theotokos, for she was so called as the supposed mother of James, the son of Joseph, who was called the Less; I mean the Brother of God. For there was also James the Greater, one of the Twelve, the son of Zebedee.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Peter, as soon as he heard this, delays not, but runs to the sepulchre; for fire when applied to matter knows no delay; as it follows, Then arose Peter, and ran to the sepulchre.

But now when he was at the tomb, he first of all obtained that he should marvel at those things which had before been derided by himself or the others; as it is said, And departed, wondering in himself at that which was come to pass; that is, wondering in himself at the way in which it had happened, how the linen clothes had been left behind, since the body was anointed with myrrh; or what opportunity the thief had obtained, that putting away the clothes wrapped up by themselves, he should take away the body with the soldiers standing round.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
