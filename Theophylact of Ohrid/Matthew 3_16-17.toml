[[commentary]]
quote='''
And he saw the Spirit of God descending like a dove, and lighting upon Him; and, lo, a voice from heaven, saying. The Spirit came down to bear witness that He Who is baptized is greater than he who baptizes. For the Jews held John in high regard, but they did not esteem Christ so highly. They all saw the Spirit descending upon Jesus so that they would not think that the voice which said, "This is My beloved Son," was referring to John; but by seeing the Spirit they might believe that this voice spoke concerning Jesus. It was like a dove because of the dove's innocence and meekness, and because the dove is very clean, not remaining in any place where there is foul odor. So it is with the Holy Spirit. But also, as in the time of Noah a dove announced the deliverance from the flood by bearing an olive twig, so too, here, the Holy Spirit reveals the deliverance from sins. There, the twig of olive; here, the mercy of God. This is My beloved Son, in Whom I am well pleased. That is, in Whom I am content, and He is pleasing to Me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
