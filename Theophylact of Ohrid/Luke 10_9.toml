[[commentary]]
quote='''
He commands to heal the sick who are in the cities, so that the apostles through their miracles might draw people to the preaching. For see what He says: "and say to them: the Kingdom of God has drawn near to you." For if you first heal and then begin to teach, your preaching will be successful, and people will believe that the Kingdom of God has reached them. For they would not have been healed if some Divine power had not accomplished this. And the Kingdom of God drew near to the sick when they were healed in soul. For it is far from the sick person over whom sin still reigns.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Although they be few and poor, ask for nothing more; He also tells them to work miracles, and their word shall draw men to their preaching. Hence he adds, And heal the sick that are therein, and say to them, The kingdom of God is come nigh unto you. For if you first heal and then teach, the word will prosper, and men believe that the kingdom of God is come nigh. For they would not be cured unless by the working of some divine power. But also when they are healed in their soul, the kingdom of God comes nigh unto them, for it is far off from him over whom sin has the dominion.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
