[[commentary]]
quote='''
The Jews were not limited to feelings of envy, but resorted to actions as well. By "devout women" he means not believing women, but Jewish or Greek ones, and by "honorable" he means wealthy. Do you see what a vile deed they persuaded the women to commit? They strive to block people's path to salvation with the help of women, in imitation of the ancient deceiver — the devil, who chose Eve as the instrument for blocking people's entrance into paradise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
