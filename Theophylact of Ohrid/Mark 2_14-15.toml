[[commentary]]
quote='''
However, He departed from there as well, and along the way He caught Levi-Matthew. He who is now called Levi by Mark is Matthew, for he had two names. Therefore Luke and Mark, concealing his real name, call him Levi. But he himself is not ashamed; on the contrary, he openly says of himself: Jesus saw Matthew the tax collector (Mt. 9:9). So too let us not be ashamed to reveal our sins. Levi was sitting at the tax booth, occupied, as was his duty, either with collecting taxes from someone, or with drawing up accounts, or with something else that tax collectors usually did at their places of business. But now he proved so zealous for Christ that, leaving everything, he followed Him, and in great joy invited many to a meal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25202.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The Lord passing on from thence called Matthew; wherefore there follows, And as he passed by, he saw Levi the son of Alphæus sitting, &c.

For he sat at the receipt of custom, either, as is often done, exacting from some, or making up accounts, (λογοπραγῶν apud Theo.) or doing some actions of that sort, which publicans are wont to do in their abodes, yea this man, who was raised on high from this state of life that he might leave all things and follow Christ. Wherefore it goes on, And he saith to him, Follow me, &c.

But he who used to plot against others becomes so benevolent, that he invites many persons to eat with him. Wherefore it goes on; And it came to pass, that as Jesus sat at meat in his house.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
