[[commentary]]
quote='''
You see, the apostles were subjected to trials both external and internal. It was not simply said that circumcision was necessary, but: "unless you are circumcised according to the custom of Moses, you cannot be saved." The opposite opinion to this was that by being circumcised, believers could not be saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
