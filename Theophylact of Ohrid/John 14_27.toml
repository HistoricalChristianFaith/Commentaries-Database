[[commentary]]
quote='''
The Apostles again felt sorrow when they heard the Lord's words "I am going away, and the Spirit will come." Therefore, seeing their hearts in turmoil, and especially because of the sorrows and tribulations awaiting them, He says: "Peace I leave with you," speaking to them as if to say: "What harm can the world's upheavals do to you, so long as you are at peace with Me? For My peace is not such as the world's peace. That peace is often harmful and useless, but I give such a peace by which you will be at peace with one another and will form one body. And this will make you stronger than all. Though many will rise against you, yet with your unity of mind and mutual peace you will suffer no harm at all."

Then, since He again said "I leave," and this indicated His departure and could bring them into confusion, He therefore adds: "Let not your heart be troubled, neither let it be afraid." They experienced trouble from their attachment and love for Him, because they were about to be deprived of Him, and fear because after His death calamities might befall them. But the Lord does not leave without healing either their trouble from attachment or their dread of future calamities, but calms both the one and the other, saying "Let not your heart be troubled, neither let it be afraid."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
