[[commentary]]
quote='''
Meanwhile, those who do not partake of it will have no share in eternal life, as not having received Jesus, Who is the true Life. For what is eaten is the Flesh not of a mere man, but of God, and able to deify as being united with the Godhead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John'
