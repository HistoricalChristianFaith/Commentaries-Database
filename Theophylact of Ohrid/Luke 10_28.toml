[[commentary]]
quote='''
So, to the lawyer He says: "you have answered correctly." Since you, He says, are still subject to the Law, then you answer correctly; for according to the Law you reason rightly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'
