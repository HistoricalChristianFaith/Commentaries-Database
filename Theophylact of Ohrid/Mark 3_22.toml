[[commentary]]
quote='''
Likewise, the scribes from Jerusalem also said that He had a demon in Himself. Since they could not deny the miracles that had been performed before them, they revile them in another way, attributing them to demons.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'
