[[commentary]]
quote='''
And again going away from them, He began to pray and say the same words as before, so that by this second prayer He might confirm that He was essentially and truly Man, and also to teach us to pray more frequently, and not in such a way that, having said something in prayer once, we immediately abandon it; one must repeat the prayer with diligence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
That by His second prayer He might show Himself to be very man.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
