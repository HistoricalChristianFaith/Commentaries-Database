[[commentary]]
quote='''
Expressing vain fervor, all the other disciples as well, like Peter, made promises not to forsake the Lord, as if thereby turning into a lie the word of Self-Existent Truth. Therefore the Lord also permits it, and human nature reveals its own weakness. For there is no doubt that the Lord could have preserved them, especially Peter; yet He permitted it, so that they, and we as well, would not be self-reliant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The other disciples also showed a fearless zeal. For there follows, Likewise also said they all, but nevertheless they acted against the truth, which Christ had prophesied.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
