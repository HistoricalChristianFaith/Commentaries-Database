[[commentary]]
quote='''
The Lord finished His discourse about Jerusalem; next He begins to speak about the coming of the Antichrist. The word "then" should not be understood as meaning that when the above-mentioned things concerning Jerusalem begin to be fulfilled, then do not believe if someone says to you, "Behold, here is Christ"; but know that this is a particular characteristic of Scripture. Thus, the evangelist Matthew, having spoken of the Nativity of Christ, says, "In those days John comes" (Mt. 3:1). In what days? In those which immediately followed the Nativity of Christ? No, but indefinitely. So here too Christ says: then do not be deceived, that is, not at the time when Jerusalem will be devastated, but at the time of the coming of the Antichrist. Do not be deceived, He says, for many will call themselves by the name of Christ, in order to lead astray even the elect. And upon the coming of the Antichrist, all creation will be changed: the stars will grow dark from the superabundance of Christ's light, and the angelic powers "will be shaken," that is, they will be horrified, looking upon such an upheaval in the world and seeing their fellow servants being judged. And then they will see the Lord as the Son of Man, that is, in the flesh, for what is visible in Him is His body. But although He will come both in the body and as the Son of Man, nevertheless it will be "with great power and glory."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title="Commentary on Mark"

[[commentary]]
quote='''
But they shall see the Lord as the Son of Man, that is, in the body, for that which is seen is body.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
