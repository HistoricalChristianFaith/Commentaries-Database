[[commentary]]
quote='''
Again he points to the Father, although the previous indication was sufficient. But he knew how beneficial this was for the listeners in their acceptance of what was especially necessary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25202.html'
source_title='Commentary on Acts'
