[[commentary]]
quote='''
He only means His perfect agreement with His Father.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
For My hand and the Father's hand are one; I and the Father are one, that is, in authority and power. By "hand" He means authority and power. So then, I and the Father are one in Nature and in Essence, and in authority. The Jews also understood it this way, that by these words He declares Himself Consubstantial with God, and because He makes Himself the Son of God, they picked up stones to stone Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John'
