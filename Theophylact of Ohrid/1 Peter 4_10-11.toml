[[commentary]]
quote='''
Not to make proper use of what belongs to us and over which we are masters is a matter of extreme injustice. For not only he who has money ought to share with the one who has not, but also he who has other natural gifts, for he who did not have them himself received them from God in order to share with those who have not.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'
