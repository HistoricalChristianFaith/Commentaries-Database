[[commentary]]
quote='''
When Herod the king had heard these things, he was troubled, and all Jerusalem with him. Herod was troubled because he was a foreigner and feared for his kingdom; for he knew that he was unworthy of it. But why were the Jews troubled? They ought instead to have rejoiced that they would have a king to whom the kings of Persia paid homage. But evil is indeed a senseless thing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
