[[commentary]]
quote='''
Wishing to restrain the disciples from curiosity about the last day and hour, the Lord says that neither the Angels nor the Son know of this. If He had said, "I know, but I do not wish to reveal it to you," then He would have grieved them. But now, when He says that neither the Angels nor I know, He acts most wisely and completely restrains them from the desire to know and to pester Him. You can understand this from an example. Small children, seeing something in their fathers' hands, often ask them for it, and if the fathers do not wish to give it, the children, not receiving what they ask for, begin to cry. In such a case, fathers usually hide the thing held in their hands and, showing the children their empty hands, restrain them from tears. So also the Lord, dealing with the apostles as with children, hid the last day from them. Otherwise, if He had said, "I know, but I will not tell you," they would have been grieved that He did not wish to tell them. But that the Lord knows about the last day and hour is obvious, for He Himself created the ages. How then could He not know what He Himself created?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The Lord wishing to prevent His disciples from asking about that day and hour, says, But of that day and that hour knoweth no man, no, not the angels which are in heaven, neither the Son, but the Father. For if He had said, I know, but I will not reveal it to you, He would have saddened them not a little; but He acted more wisely, and prevents their asking such a question, lest they should importune Him, by saying, neither the Angels nor I.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
