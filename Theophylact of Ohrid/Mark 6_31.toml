[[commentary]]
quote='''
Christ gives His disciples rest; this is a lesson for leaders, so that they know how to give rest to those who labor in word and teaching, and not always keep them in tension and toil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'
