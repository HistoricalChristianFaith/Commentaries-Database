[[commentary]]
quote='''
Then, lest they be inwardly troubled by thoughts (such as, for example), how shall we, simple people, bear witness and be sent to the Gentiles, how shall we stand directly against the people of Jerusalem, who even killed You, Lord — for this reason He says: take courage, for I will soon send upon you "the promise of My Father," of which I spoke through Joel: "I will pour out of My Spirit upon all flesh" and so forth (Joel 2:28). So then, you who are now fearful and faint-hearted, remain in the city of Jerusalem until you are clothed with power not human, but heavenly. He did not say: until you "receive," but: until you "are clothed," showing through this that the spiritual armor would guard them from all sides.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Afterwards, lest they should be troubled at the thought, How shall we private individuals give our testimony to the Jews and Gentiles who have killed Thee? He subjoins, And, behold, I send the promise of my Father upon you, &c. which indeed He had promised by the mouth of the prophet Joel, I will pour my Spirit upon all flesh. (Joel 2:18.)

That is, not with human but heavenly power. He said not, until ye receive, but be endued with, showing the entire protection of the spiritual armour.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
