[[commentary]]
quote='''
The Lord, however, testing and trying them to see whether they had recognized His power—that He could feed the people—says, "You give them something to eat." To this the disciples, as if in reproach, point out to Him, on the one hand, the greatness of their own poverty, and on the other, the multitude of the people, as though He did not know this. In this difficulty they say, "Shall we go and buy two hundred denarii worth of bread and give it to them to eat?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
See now, how those who are disciples of Christ grow in love to man, for they pity the multitudes, and come to Christ to intercede for them. But the Lord tried them, to see whether they would know that His power was great enough to feed them. Wherefore it goes on, He answered, and said unto them, Give ye them to eat.

But the disciples thought that He did not know what was necessary for the feeding of so large a multitude, for their answer shows that they were troubled. For it goes on, And they said unto him, Let us go and buy two hundred pennyworth, of bread, and give them to eat.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
