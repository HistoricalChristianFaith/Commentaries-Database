[[commentary]]
quote='''
So God takes the gift away from that wicked and slothful servant. He who has received a gift by which to benefit others, and does not so use it, forfeits the gift itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
