[[commentary]]
quote='''
The Pharisees slander the miracle and revile the Lord as a deceiver. They say: He is in league with the prince of demons and with his assistance "casts out demons."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke'
