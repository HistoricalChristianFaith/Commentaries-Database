[[commentary]]
quote='''
That is, both to those who were justified during their life, and to those who were justified in Hades. For at the second coming of the Lord, what is due shall be fully rendered to each one. If someone should reject the Lord's preaching in Hades, saying that for those in Hades, the dead, there is no benefit from it, according to what is said: "In the grave, who will praise You?" (Ps. 6:6); then such a person understands the preaching that took place in Hades in a crude way, and under confession understands not praise to God, but confession of sins, not understanding the saying: "The dead will not praise You, O Lord" (Ps. 113:25). Since with the present life the accomplishment of all deeds comes to an end (for everything will die without activity), it is rightly said: "In the grave, who will praise You?" — because no one will accomplish anything for which he might be set free and give thanks.
"The end" is the same as fulfillment, completion. "The end of all things is at hand" (1 Pet. 4:7), and this "end" in the true sense is Christ. For He is the perfection of all things, and not what the pagans vainly consider to be the end of all things, when some say, for example Epicurus, that the end of all things is pleasure, others say knowledge or contemplation, and still others say virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'

[[commentary]]
quote='''
And since the perfection of all things, Christ, has come, and you are being conformed to this perfection, let there be found in you no deficiency in anything — neither in chastity, nor in sobriety, nor in watchfulness for prayer (for prayer belongs to those who are watchful), nor in love for one another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'
