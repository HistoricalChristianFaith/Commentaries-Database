[[commentary]]
quote='''
When you lived in vices, he says, you were estranged from righteousness; at that time you did not submit to it, you did not at all wish to serve it, and you freed yourselves from it. Therefore now too, serving righteousness, do not submit to sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25206.html'
source_title='Commentary on Romans'
