[[commentary]]
quote='''
The queen, He says, came from a great distance, despite her tender womanhood, to hear about trees and woods and certain things of nature. But though I came to you, speaking of ineffable things, you have not accepted Me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
