[[commentary]]
quote='''
You, he says, have heard about the horrors and commotions. All of them sensibly prefigure those calamities that will befall sinners. But against these misfortunes there is a powerful and counteracting remedy – prayer and attentiveness to oneself. For constant readiness and expectation of the end can overcome all of this. And you will have it on this condition, he says, if you are watchful and your hearts are not weighed down with "carousing and drunkenness, and the cares of this life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Our Lord declared above the fearful and sensible signs of the evils which should overtake sinners, against which the only remedy is watching and prayer, as it is said, And take heed to yourselves, lest at any time, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
