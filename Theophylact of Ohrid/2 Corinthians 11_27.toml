[[commentary]]
quote='''
Not only were the afflictions coming from without insufficient; he also burdened himself with his own labors, anxieties, and sleepless nights.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%252011.html'
source_title='Commentary on 2 Corinthians'
