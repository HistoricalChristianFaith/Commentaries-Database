[[commentary]]
quote='''
"Now the names of the twelve apostles are these; The first, Simon, who is called Peter, and Andrew his brother." He lists the names of the apostles because of the false apostles. He first gives Peter and Andrew because they were also the First-called, and then the sons of Zebedee. He places James before John, not ranking them by honor, but simply listing them as the names occur.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
