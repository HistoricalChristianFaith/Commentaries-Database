[[commentary]]
quote='''
"Most of those who had gathered did not know why they had gathered." Such is the nature of a crowd: it rushes here or there without reason, like fire thrown into a forest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252019.html'
source_title='Commentary on Acts'
