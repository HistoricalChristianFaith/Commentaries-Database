[[commentary]]
quote='''
Our Lord gave up His ghost to God the Father, showing that the souls of the saints do not remain in the tomb, but go into the hand of the Father of all; while sinners are reserved for the place of punishment, i. e. hell.

For it was commanded in the Law that the sun should not set on the punishment of any one; or they were unwilling to appear tormentors and homicides on a feast day.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
But those who swallow a camel and strain out a gnat (Matt. 23:24), having committed so great a crime, show particular concern about the day. "For," he says, "so that the bodies would not remain on the cross, they asked Pilate," that is, they asked that they be taken down.
So, they did not want to appear as avengers and murderers on the day of the feast. Otherwise: the law also commanded that the sun should not go down on a man's anger (Eph. 4:26). See how through the schemes of the Jews the prophecies are fulfilled. Here two prophecies are fulfilled at once, as the evangelist says further.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John'
