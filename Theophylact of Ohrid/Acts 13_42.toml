[[commentary]]
quote='''
You saw the wise resourcefulness of Paul. In order to attach and endear the Gentiles to himself, and also so as not to scatter their attention by communicating everything to them all at once, he first offered several hints and did not resolve them, and by this aroused in the Gentiles a desire to hear him another time. He said that the forgiveness of sins was being proclaimed, but how this forgiveness would be accomplished, he did not explain. He did not baptize them immediately, because it was untimely.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
