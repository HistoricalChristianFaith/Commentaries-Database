[[commentary]]
quote='''
To His logical argument the Lord also adds testimony from Scripture. Moses says that God said to him from the bush: "I am the God of Abraham" and so forth (Exod. 3:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Or to the reason above given the Lord added the testimony of Scripture, Now that the dead are raised, Moses also showed at the bush, (Exod. 3:6.) as the Lord saith, I am the God of Abraham, the God of Isaac, and the God of Jacob. As if he said, If the patriarchs have once returned to nothing so as not to live with God in the hope of a resurrection, He would not have said, I am, but, I was, for we are accustomed to speak of things dead and gone thus, I was the Lord or Master of such a thing; but now that He said, I am, He shows that He is the God and Lord of the living.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
