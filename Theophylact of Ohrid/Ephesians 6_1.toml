[[commentary]]
quote='''
As a sculptor, reproducing the figure of the human body, first creates the head, then the neck, and finally the legs, so too Paul, having spoken of the husband as the first principle, and the wife as the second principle, now speaks of the third principle — children. For over the wife one husband has authority, but over children the wife also has authority. So "obey," he says, "your parents," but "in the Lord," that is, when their commands are in agreement with the law of the Lord. Because if a father urges toward impiety, or wishes to make his daughter a harlot, or wants to teach his son a shameful way of conduct, such commands are contrary to the Lord, and they must not be obeyed. "For justice demands this."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Ephesians%2FChapter%25206.html'
source_title='Commentary on Ephesians'
