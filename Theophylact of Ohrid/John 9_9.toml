[[commentary]]
quote='''
And the blind man, not ashamed of his former wretchedness, not fearing the crowd, openly says: "It is I."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John'
