[[commentary]]
quote='''
The Lord looks up to heaven, first, to teach us to ask for our food from God, and not from the devil, as do people who live by unrighteous gains; and second, to show the people that Christ is not an opponent of God, but on the contrary, He Himself calls upon God. He gives the loaves to the disciples so that they would not forget the miracle after having received the loaves with their own hands.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
It goes on, And when he had taken the five loaves and the two fishes, he looked up to heaven, and blessed, and brake the loaves, and gave them to his disciples to set before them: and the two fishes divided he among them all.

He also looks up to heaven, that He may teach us to seek our food from God, and not from the devil, as they do who unjustly feed on other men's labours. By this also He intimated to the crowd, that He could not be opposed to God, since He called upon God. And He gives the bread to His disciples to set before the multitude, that by handling the bread, they might see that it was an undoubted miracle.

Or the two fishes are the discourses of fishermen, that is, their Epistles and Gospel.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
