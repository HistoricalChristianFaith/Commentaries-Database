[[commentary]]
quote='''
The order is as follows: as the anointing which you received from Him abides in you, there is no need for anyone to teach you; but you must abide in that which it has taught you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520John%2FChapter%25202.html'
source_title='Commentary on 1 John'
