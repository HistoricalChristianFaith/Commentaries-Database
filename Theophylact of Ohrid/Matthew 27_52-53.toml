[[commentary]]
quote='''
And the graves were opened, and many bodies of the saints which slept arose, and came out of the graves after His resurrection, and went into the Holy City, and appeared unto many. And those who were dead in sins arose and entered the Holy City, the heavenly Jerusalem, and appeared to the many who were walking the broad road [leading to perdition]. By appearing to them, they became an exemplary model of a good life and of repentance. For if one sees a man who was formerly deadened by many passions now changed and ascending to the holy heavenly City, he imitates that man in every way, and himself repents. These things have been explained in a rather elaborate manner; but you, O reader, understand that the raising of the dead which occurred at the Lord's crucifixion, also revealed the freeing of the souls in hades. Those who arose at that time were seen by many, lest the event appear to have been only an apparition. They arose as a sign from God, and it is evident that they again died. Some say that after Christ's resurrection, these arose and have not yet died; but I do not know if this should be accepted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
