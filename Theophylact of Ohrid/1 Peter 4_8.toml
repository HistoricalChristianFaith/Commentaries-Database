[[commentary]]
quote='''
Love the Apostle Paul called "the fulfillment of the law" (Rom. 13:10), while Peter calls it able to cover sins: this is because mercy toward our neighbor makes God merciful toward us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25204.html'
source_title='Commentary on 1 Peter'
