[[commentary]]
quote='''
The Judas mentioned now thought that just as we see the dead in dreams, so too would He appear to them; therefore he also says: "Lord, what is it that You intend to manifest Yourself to us, and not to the world?" He says this out of intense amazement and horror. He speaks as if to say: "Alas for us! You are dying and intend to appear to us in a dream, just as the dead appear." For "what is it" are the words of one frightened and alarmed. What then does the Lord answer to this? By what does He overthrow his opinion as false?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
