[[commentary]]
quote='''
Behold, the wantonness! The princess dances, and the better she dances, the more evil it is. For it is shameful for a princess to be skilled at doing something unbefitting.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
