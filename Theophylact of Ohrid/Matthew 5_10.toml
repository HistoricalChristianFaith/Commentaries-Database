[[commentary]]
quote='''
Blessed are they that are persecuted for righteousness' sake, for theirs is the kingdom of heaven. It is not only the martyrs who are persecuted; many others are persecuted as well, for helping those who have been wronged, and simply for every virtue which they possess. For "righteousness" means every virtue. Thieves and murderers are also persecuted, but they are not blessed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
