[[commentary]]
quote='''
The lawyer recklessly subjects himself to exposure. The lawyers were different from the Pharisees. The Pharisees were considered ascetics and separated from the rest, while the lawyers were scribes and teachers who resolved questions from the Law for those who wished.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Now the Lawyers were different from the Pharisees. For the Pharisees being separated from the rest had the appearance of a religious sect; but those skilled in the Law were the Scribes and Doctors who solved legal questions.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
