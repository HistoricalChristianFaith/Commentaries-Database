[[commentary]]
quote='''
But see how the Lord also acts! He did not say: My power has saved you, but what did He say? "For this word," that is, for your faith, "go," your daughter has been healed. Draw from this a useful lesson for yourself as well. Every one of us, when he commits sin, is a "woman," that is, a weak soul. Such a soul is a "Phoenician," as having a crimson, that is, a bloody and murderous sin. Such a soul has a "daughter" — wicked deeds, demonic deeds. Being sinners, we are called "dogs," full of impurities, which is why we are also unworthy to receive the "bread" of God, that is, to partake of the most pure Mysteries. But if in humility we acknowledge that we are dogs, if we confess and reveal our sins, then our daughter will be healed, that is, our demonic deeds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Because therefore the woman answered with much wisdom, she obtained what she wanted; wherefore there follows, And he said unto her, &c. He said not, My virtue hath made thee whole, but for this saying, that is, for thy faith, which is shown by this saying, go thy way, the devil is gone out of thy daughter. It goes on, And when she was come into her house, she found her daughter laid upon the bed, and the devil gone out.

The soul of each of us also, when he falls into sin, becomes a woman; and this soul has a daughter who is sick, that is, evil actions; this daughter again has a devil, for evil actions arise from devils. Again, sinners are called dogs, being filled with uncleanness. For which reason we are not worthy to receive the bread of God, or to be made partakers of the immaculate mysteries of God; if however in humility, knowing ourselves to be dogs, we confess our sins, then the daughter, that is, our evil life, shall be healed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
