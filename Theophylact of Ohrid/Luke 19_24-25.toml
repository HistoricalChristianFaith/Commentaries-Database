[[commentary]]
quote='''
The gift is taken away and given to the good worker. Although he already has, for that very reason it is profitable for him to receive more.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
For seeing that he gained ten, by multiplying his pound tenfold, it is plain that by having more to multiply, he would be an occasion of greater gain to his Lord.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
