[[commentary]]
quote='''
With these few words He so captivated Pilate that Pilate asked about truth, what it is. For it had nearly vanished among men, and no one knew it, and all were already in unbelief.
But since this question required special time for resolution, and now it was necessary to deliver Jesus from the fury of the Jews, Pilate goes out to them and says: "I find no fault in Him," and he says this reasonably.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John'

[[commentary]]
quote='''
For it had almost vanished from the world, and become unknown in consequence of the general unbelief.

Pilate is judicious in replying that Jesus had done nothing wrong, and that there was no reason to suspect Him of aiming at a kingdom. For they might be sure that if He set Himself up as a King, and a rival of the Roman empire, a Roman prefect would not release Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'
