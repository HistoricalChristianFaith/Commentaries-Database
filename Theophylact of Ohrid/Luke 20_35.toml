[[commentary]]
quote='''
But the sons of that age do none of such things, for they cannot even die; therefore there is no marriage there either, but life is angelic, divine. Here there is marriage because there is death, and there is death because there is marriage. But there, when death is abolished, what need is there for marriage? For marriage was established as an aid to mortality and to make up for what is lacking. And where there is no lack whatsoever, what need is there for replenishment?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'
