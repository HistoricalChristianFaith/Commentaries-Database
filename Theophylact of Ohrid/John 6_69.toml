[[commentary]]
quote='''
For they had already accepted the truth of the resurrection and all the teaching. Therefore, the cause of the offense was not the words of Christ, but the inattentiveness, negligence, and ingratitude of the listeners. For these twelve also heard the same things, and yet were not offended, but remained faithful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John'
