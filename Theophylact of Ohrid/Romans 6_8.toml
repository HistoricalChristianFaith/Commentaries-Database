[[commentary]]
quote='''
Here, it would seem, there is a repetition of what was said; but in reality there is not. Above, the apostle said that we must always remain dead to sin, and now he reasons about the resurrection of the new life according to God, which we must always have. If through baptism we died with Christ, then we believe that we shall always have the resurrection belonging to us, consisting in the new life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25206.html'
source_title='Commentary on Romans'
