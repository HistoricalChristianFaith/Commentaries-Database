[[commentary]]
quote='''
That you may learn that the wisdom which is in us is distributed into word and work, and that it becomes us to speak of what has been done, and to do what we speak of.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
