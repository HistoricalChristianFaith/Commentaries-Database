[[commentary]]
quote='''
Therefore, since he too was part of the house, he too was created by someone, and the one who created him undoubtedly surpasses him. And the Son of God created him, He who took on flesh and was called high priest for his sake: consequently, He also surpasses him. See how the apostle began with a comparison according to the flesh, but led up to the Divinity and showed that the Creator incomparably surpasses the creature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25203.html'
source_title='Commentary on Hebrews'
