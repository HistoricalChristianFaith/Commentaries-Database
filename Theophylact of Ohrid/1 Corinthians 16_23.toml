[[commentary]]
quote='''
The duty of a teacher is not only to persuade, but also to pray, and thus to confirm in a twofold manner: by teaching and by drawing down help from above through his prayers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252016.html'
source_title='Commentary on 1 Corinthians'
