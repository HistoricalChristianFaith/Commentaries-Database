[[commentary]]
quote='''
Although they were free from this sin, they were nevertheless troubled, for they believed God, who knows their hearts, more than they believed themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But the other disciples began to be saddened on account of the word of the Lord; for although they were free from this passion, yet they trust Him who knows all hearts, rather than themselves. It goes on: And he answered and said unto them, It is one of the twelve, that dippeth with me in the dish.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
