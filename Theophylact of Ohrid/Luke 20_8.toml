[[commentary]]
quote='''
With this question He both silences them and shows us that if they did not believe such a prophet as John, who in their opinion was greater than He, when John testified concerning Him, then how would they have believed His answer as to by what authority He does these things? For whatever He might have said, they could in any case have twisted it and mocked it, just as they had also despised the words of John, who was held in great esteem among them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'
