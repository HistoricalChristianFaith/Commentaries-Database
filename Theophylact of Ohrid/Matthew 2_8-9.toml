[[commentary]]
quote='''
And he sent them to Bethlehem, and said, Go and search diligently for the Child. He did not say, "search for the king" but "search for the Child," for he could not endure even to utter Christ's name. From this it is clear that he was in a rage against Christ. And when ye have found Him, bring me word again, that I may come and worship Him also. And when they had heard the king, they departed. The Magi were guileless and thought that Herod, too, spoke without guile. And lo, the star which they saw in the east went before them. The star was hidden for a time by God's providence so that they would inquire of the Jews, and Herod would be troubled, and thus the truth would be made all the more apparent. But when they had departed from Jerusalem, it again appeared and guided them; from which it is clear that the star was a divine power. Until it came and stood over where the young Child was. This, too, was extraordinary. For the star descended from the heights and came closer to the earth to show them the place. For if it had appeared to them from the heights, how would they have been able to know the particular spot where Christ was? For the stars are visible over a great area. So it is that you may see the moon over your house, while it appears to me that it is over my house alone; and, in short, to each one the moon, or a star, appears to stand over them alone. Neither could this star have pointed out where Christ was if it had not descended and all but stood over the head of the Child.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
