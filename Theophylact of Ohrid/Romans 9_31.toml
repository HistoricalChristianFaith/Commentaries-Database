[[commentary]]
quote='''
While the Israelites, ceaselessly seeking the "law of righteousness," that is, the law of works, did not attain to righteousness; because the law, which consisted of works, was not able to justify.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25209.html'
source_title='Commentary on Romans'
