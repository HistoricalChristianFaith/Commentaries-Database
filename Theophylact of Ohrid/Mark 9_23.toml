[[commentary]]
quote='''
So that man, having come to Jesus, blamed the disciples for being unable to heal his son; but Christ turns the accusation back upon the man himself and speaks as if to say: you have no faith, and therefore you yourself are to blame that your son was not healed... However, He does not stop merely at reproach, but also grants healing, displaying in the healing of the boy not haughtiness, but much more — humility. For observe that He attributes the healing not to His own power, but to the faith of that man, saying: "All things are possible to him who believes."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title="Commentary on Mark"
