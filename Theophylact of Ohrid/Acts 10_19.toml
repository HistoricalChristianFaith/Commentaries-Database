[[commentary]]
quote='''
"Meanwhile, as Peter was reflecting on the vision, the Spirit said to him: 'Behold, three men are looking for you.'" Again, this too serves as an apology for Peter before the disciples, so that they might see that he was deliberating and received instruction not to deliberate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
