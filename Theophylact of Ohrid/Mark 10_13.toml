[[commentary]]
quote='''
Great was the faith among the people, when they accepted the mere laying on of hands by Christ as a blessing for the children brought to Him, while the disciples would not allow those bringing them, thinking this was unworthy of Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
The wickedness of the Pharisees in tempting Christ, has been related above, and now is shown the great faith of the multitude, who believed that Christ conferred a blessing on the children whom they brought to Him, by the mere laying on of His hands. Wherefore it is said: And they brought young children to him, that he might touch them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
