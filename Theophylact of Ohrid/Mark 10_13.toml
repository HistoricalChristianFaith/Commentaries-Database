[[commentary]]
quote='''
Great was the faith among the people, when they accepted the mere laying on of hands by Christ as a blessing for the children brought to Him, while the disciples would not allow those bringing them, thinking this was unworthy of Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
