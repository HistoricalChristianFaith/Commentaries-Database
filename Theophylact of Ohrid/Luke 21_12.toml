[[commentary]]
quote='''
"Before... all these things" that are to happen at the end of the world, or also at the captivity (for, as I said, He joins the discourse about the end with the discourse about the captivity), "they shall lay hands on you," that is, My disciples. And indeed, before the captivity of Jerusalem the apostles were driven out of it, by a special providence of God, namely: so that all the horrors would fall only upon the crucifiers, while they, that is the apostles, would fill the whole world with preaching. The apostles were also brought before kings and governors: for example, Paul was brought before Festus, before Agrippa, before Caesar himself (Acts 25:6-23, 26:32).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
