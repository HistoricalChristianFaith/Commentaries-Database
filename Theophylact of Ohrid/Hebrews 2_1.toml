[[commentary]]
quote='''
Since, he says, so great is the superiority of the Son who spoke to us over the prophets and angels, the ministers of the Old Testament, what He said must be heeded more than the law. But he did not say this directly, so as not to shock them at the beginning; he left it to them to draw this conclusion from what follows. He says this not comparing the Old Testament with the New — no, but against the opinion of those who speak with great glory of the Old Testament and neglect the New.

"Lest we drift away," that is, so that we might not perish. He borrowed the expression from Proverbs: "my son," says the Wise One, "do not let them slip away" (μὴ παραρρύης) (Prov. 3:21), expressing both the ease of falling away and the gravity of perdition. For what has fallen away is difficult to restore.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25202.html'
source_title='Commentary on Hebrews'
