[[commentary]]
quote='''
He calls the "weapon" perhaps the grief that occurred during the Passion, or perhaps the scandal that assailed Her upon seeing the Lord crucified. For She, perhaps, pondered how He Who was born without seed, worked miracles, and raised the dead, was crucified, put to death, and spat upon. This means that "the thoughts of many" who are scandalized "will be opened and revealed," and once exposed, they will find swift healing. For example, You too, O Virgin, will be opened and revealed in Your thinking about Christ, and then will be confirmed in faith in Him. Likewise, Peter was shown to have denied; but the power of God was revealed, having received him again through repentance. And in another sense: "the thoughts of many hearts" were opened when the betrayer was exposed and those who loved Him were revealed, such as, for example, Joseph, who came to Pilate, and the women who stood at the Cross.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke'
