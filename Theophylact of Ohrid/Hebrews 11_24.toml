[[commentary]]
quote='''
He arrived at the example most dear to them — that of Moses, which is why he dwells on it at greater length. The structure of his thought is as follows: "By faith Moses refused to be called the son of Pharaoh's daughter." When? "When he was come to years," that is, having already reached manhood. Evidently because he hoped to receive something greater in return. The word "refused" shows a strong hatred and inner aversion to the decrees of the king.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%252011.html'
source_title='Commentary on Hebrews'
