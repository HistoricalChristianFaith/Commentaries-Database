[[commentary]]
quote='''
The Lord, having left Samaria, comes to Galilee. Then, lest someone begin to investigate and wonder why He did not always remain in Galilee, but came to it at intervals, even though He apparently came from Galilee, he says: "The reason He did not live in Galilee was that the Galileans showed Him no honor." For Jesus Himself testified that a prophet has no honor in his own country. For we people ordinarily despise what has become commonplace, while we always pay attention to what is strange and unusual. And if some are honored even in their own country, in a foreign land they will be esteemed far more, so that the honor shown in one's homeland, when compared with the honor in a foreign land, will seem like dishonor. For envy does not allow fellow countrymen to render due glory, but they render it diminished, considering it a shame to themselves to glorify one of their own tribe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title="Commentary on John"
