[[commentary]]
quote='''
But He rebukes the disciples for their unwarranted criticism of the woman. For one should not expect exalted things from those who have only recently approached Christ, and especially from those whose emotions are unrestrained, but one should accept even their measure of faith. For whenever someone wants to offer a gift to God, do not scorn him, or cut him off in his eagerness by sending him away to give to the poor, but let him fulfill his offering. But if he should ask your advice as to whether he should give to the poor or make an offering to God, advise him to give to the poor. However, if he has already made the offering to God, there is no reason to scorn him, for one should prefer honor rendered to God above everything else, even almsgiving itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
