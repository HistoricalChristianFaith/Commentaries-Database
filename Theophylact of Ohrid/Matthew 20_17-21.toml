[[commentary]]
quote='''
And Jesus going up to Jerusalem took the twelve disciples apart in the way, and said unto them, Behold, we go up to Jerusalem; and the Son of Man shall be betrayed unto the chief priests and unto the scribes, and they shall condemn Him to death, and shall deliver Him to the Gentiles to mock, and to scourge, and to crucify Him: and the third day He shall rise again. Then came to Him the mother of Zebedee's children with her sons, falling prostrate before Him and desiring a certain thing of Him. And He said unto her, What wilt thou? She saith unto Him, Grant that these my two sons may sit, the one on Thy right hand, and the other on the left, in Thy kingdom. The sons of Zebedee, James and John, were thinking that if the Lord went to Jerusalem, He would rule over a temporal kingdom. For they heard Him say continually, "We go up to Jerusalem." They fell, then, to human weakness and persuaded their mother to approach Him, as they themselves were afraid to approach openly. For they too approached secretly, as Mark says (Mk. 10:35), writing that James and John came to Him, meaning that they approached Him secretly and by themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
