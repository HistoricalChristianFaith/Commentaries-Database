[[commentary]]
quote='''
Then his lord, after he had called him, said unto him, O thou wicked servant, I forgave thee all that debt, because thou desiredst me: shouldest not thou also have had compassion on thy fellowservant, even as I had pity on thee? The master in his love for mankind takes issue with the servant, to show that it is not the master, but the savagery and the ingratitude of the servant that has revoked the gift.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
