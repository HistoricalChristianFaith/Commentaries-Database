[[commentary]]
quote='''
The Lord, saying this, turns us away from trading in friendliness. And a certain man, having heard this and thinking that God would honor and treat the righteous with sensible foods, said: "Blessed is he who shall eat bread in the Kingdom of God." He was probably not spiritual enough to understand, that is, he was guided by human reasoning. For a natural man is such that he believes nothing supernatural, for he judges everything by the laws of nature. There are three states in man: carnal, natural, and spiritual. "Carnal" is when someone desires to enjoy pleasures and rejoice, even if this is accompanied by causing harm to others. Such are all the covetous. The "natural" state is when someone desires neither to harm nor to be harmed. Such is life according to the law of nature. For nature itself suggests this to us. And the "spiritual" state is when someone for the sake of good is willing even to endure harm and insult. The first state is close to nature, the middle one is in accordance with nature, and the third is above nature. Anyone who thinks about human things and cannot understand anything supernatural is called natural (1 Cor. 2:14), since he is guided by the soul and spirit. But when someone is guided by the spirit and no longer lives himself, but Christ lives in him (Gal. 2:20), that one is spiritual, that one has risen above nature. So then, the one who thought that the reward of the saints would be sensible was natural, since he could not understand anything supernatural.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
