[[commentary]]
quote='''
Because Christ was coming to His Passion, He corrects a false opinion of the Jews, who said that Christ was the Son of David, not his Lord; wherefore it is said, And Jesus answered and said, while he taught in the temple.

But Christ shows Himself to be the Lord, by the words of David. For it goes on: For David himself said by the Holy Ghost, The Lord said to my Lord, Sit thou on my right hand; as if He had said, Ye cannot say that David said this without the grace of the Holy Spirit, but he called Him Lord in the Holy Spirit; and that He is Lord, he shows, by this that is added, Till I make thine enemies thy footstool; for they themselves were His enemies, whom God put under the footstool of Christ.

But they used to walk in honourable garments, because they wished to be highly esteemed for it, and in like manner they desired other things, which lead to glory. For it goes on: And love salutations in the marketplaces, and the chief seats in the synagogues, and the uppermost rooms at feasts.

He also especially teaches the Apostles, not to have any communication with the scribes, but to imitate Christ Himself; and in ordaining them to be masters in the duties of life, He places others under themv.

But the Scribes used to come to women, who were left without the protection of their husbands, as though they were their protectors; and by a pretence of prayer, a reverend exterior and hypocrisy, they used to deceive widows, and thus also devour the houses of the rich. It goes on, These shall receive a greater damnation, that is, than the other Jews, who sinned.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Since the Lord was about to go to His passion, He corrects the false opinion of the scribes, who thought that Christ is only the Son of David and not the Son of God. Therefore, from the very words of David, He shows that He (Christ) is God; and not simply, but with a warning, He says: "until I make Thine enemies Thy footstool." And they (the scribes and Pharisees) were those very enemies whom God the Father made the footstool of Christ's feet. Notice also how He asks the question! So as not to disturb them, He did not say: what do you think about Me, but about Christ. But you cannot say that David spoke this not by the inspiration of the Holy Spirit; no, he in the Spirit called Him (Christ) Lord, that is, being moved by the grace of the Holy Spirit. How then can one think that Christ is only the Son of David, and not also his Lord and God? The common people, it is said, heard "Him gladly," and He began to say to the people: beware of the scribes, who wear magnificent garments and on account of them demand honors for themselves; who love to receive greetings and praises in the marketplaces and all other marks of glory; who devour the houses of widows, insinuating themselves to these defenseless women under the guise of being their protectors; who, by hypocritical lengthy prayer, outward piety, and hypocrisy deceiving the inexperienced, devour the houses of the poor. For this they shall receive even more severe condemnation than the other sinning Jews: "the mighty shall be mightily tested" (Wis. 6:6). Speaking thus to the people, the Lord at the same time instructs the apostles as well, so that they would not act after the example of the scribes, but would imitate Him. Since He was appointing them as teachers of the Church, He rightly sets forth for them the rules of life as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Commentary on Mark'