[[commentary]]
quote='''
She, in order to more quickly conceal and at the same time obtain, says: "I have no husband." Now the Lord, through prophetic knowledge, reveals His power, enumerates her former husbands, and exposes the one whom she is now concealing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title="Commentary on John"
