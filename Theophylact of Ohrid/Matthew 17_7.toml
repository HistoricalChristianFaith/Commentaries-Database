[[commentary]]
quote='''
And Jesus came and touched them, and said, Arise, and be not afraid. Lest the fear grip them for a long time and obliterate the memory of what they had seen, the Lord rouses them and reassures them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
