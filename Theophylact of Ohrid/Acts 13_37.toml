[[commentary]]
quote='''
The One Whom God raised up did not see corruption, but made the place of the tomb a place of incorruption, because Christ, having risen by His own power, truly shone forth as the author of incorruption, so that we too might rise from the tombs and go out "to meet the Lord" (1 Thess. 4:17), when, on the day of the expected resurrection, He comes a second time with glory upon the clouds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
