[[commentary]]
quote='''
After He had spoken about food and saw that the Jews did not believe, the Lord crosses over into the regions of the Gentiles, for with the unbelief of the Jews, salvation was to pass to the Gentiles. At first the Lord tried to remain hidden, so that the Jews would not have a pretext to accuse Him of having gone over to the side of the unclean Gentiles. Yet He could not be hidden, for it was impossible for Him to be concealed and recognized by no one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
After that the Lord had finished His teaching concerning food, seeing that the Jews were incredulous, He enters into the country of the Gentiles, for the Jews being unfaithful, salvation turns itself to the Gentiles; wherefore it is said, And from thence he arose, and went into the borders of Tyre and Sidon.

(Pseudo-Aug. Quaest. e Vet. et Nov. Test. 77) Or else His reason for coming in secret was that the Jews should not find occasion of blame against Him, as if He had passed over to the unclean Gentiles. It goes on, But he could not be hid.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
