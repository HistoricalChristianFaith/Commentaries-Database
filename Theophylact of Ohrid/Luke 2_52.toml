[[commentary]]
quote='''
To explain what it means "to increase in wisdom," the Evangelist adds: "and stature," for the increase "in stature" he calls an increase "in wisdom." That is, he did what was pleasing to God and praiseworthy before men; but first he was acceptable before God, and then before men; for one must first please God, and then men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke'
