[[commentary]]
quote='''
"Every day they continued with one accord in the temple." Not one day or two or three, but daily and with one accord, as if in one soul. Notice: the Jews who believed did nothing else but constantly remained in the temple, since, having become more attentive to the true faith, they were also filled with great reverence for this sacred place. And the apostles did not draw them away from there, so as not to harm them.
"Breaking bread from house to house." He means the sacred house even now, because they ate in this house. And the expression "breaking bread" shows their great abstinence and moderation in food, because it says "they partook of food," not "they gorged themselves on food." Thus, by faith they changed their very way of life for the better.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25202.html'
source_title='Commentary on Acts'
