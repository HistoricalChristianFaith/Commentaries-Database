[[commentary]]
quote='''
Therefore, when the man "suffering from dropsy" came forward into the midst, the Lord looked not to avoiding giving them offense, but to bestowing a kindness on the one in need of healing. For where very great benefit is at hand, we ought not to concern ourselves with those who are foolishly scandalized.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
