[[commentary]]
quote='''
The Evangelist wishes to show us, that He knew all things before the foundation of the world: which was a proof of His divinity.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Manifesting a property of divinity, namely revealing what is hidden, He tells them that some of you do not believe; by saying "some," He excluded the disciples. And the evangelist, wishing to show us that He knew all things before the foundation of the world, says that Jesus knew from the beginning who the unbelievers were, and knew also the malice of the betrayer. And this was proof of true Divinity. For the prophet says of God: "who knows all things before their coming to be" (Dan. 13:42).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John'
