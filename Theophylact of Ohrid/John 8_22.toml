[[commentary]]
quote='''
I affect nothing worldly, nothing earthly: I could never come to such madness as to kill Myself.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
In perplexity they say, "Will He kill Himself, that He says: 'Where I am going, you cannot come'?" Although they wanted to be rid of Him, asked Him to depart from them, and even wanted to kill Him, nevertheless they regarded the present circumstance as so important that they were thrown into perplexity by it. What then do they say to this? "Will He kill Himself?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John'
