[[commentary]]
quote='''
Here He speaks with a reference to those whom He was about to raise from the dead: viz. the daughter of the ruler of the synagogue, the son of the widow, and Lazarus.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Above He said that whoever does not honor the Son does not honor the Father, and He proclaimed something lofty about Himself. Lest His words be taken for pomposity and empty arrogance, He presents confirmation from deeds as well.
He says: "the hour is coming." Then, lest they think of a distant time, He says: "and now is, when the dead shall hear the voice of the Son," that is, of Me, now living among you. He says this concerning the dead whom He was going to raise, namely: the son of the widow, the daughter of the ruler of the synagogue, and Lazarus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John'