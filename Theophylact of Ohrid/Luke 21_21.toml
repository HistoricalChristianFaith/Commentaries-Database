[[commentary]]
quote='''
"Let those who are in Judea," He says, "flee to the mountains"; let those in the surrounding areas not hope that the walls of the city will protect them, but even those who are inside the city, let them go out of it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
