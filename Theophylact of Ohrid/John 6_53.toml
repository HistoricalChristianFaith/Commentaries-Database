[[commentary]]
quote='''
Therefore He also, wishing to show that this is not impossible, but even very necessary, and that one cannot otherwise have life, says: "unless you eat the Flesh," and so forth. So too Nicodemus spoke from unbelief: "How can a man enter into his mother's womb?" (John 3:4) Therefore when we hear that without partaking of the Flesh of the Son we cannot have life, we must have undoubting faith when receiving the Divine Mysteries, and not ask "how?" For "the natural man," that is, one who follows human, natural, or psychical reasoning, "does not receive" what is supernatural and spiritual (1 Cor. 2:14). So too he does not comprehend the spiritual food, the Flesh of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John'
