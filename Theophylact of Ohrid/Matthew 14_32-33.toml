[[commentary]]
quote='''
Those in the boat were also delivered from fear, for "the wind ceased." And then, indeed, recognizing Jesus by these things, they confessed His divinity. For it is not an attribute of man to walk on the sea, but of God, as David says, "In the sea are Thy byways, and Thy paths in many waters" (Ps. 76:19). The spiritual meaning of the miracle is this: the boat is the earth; the waves, man's life that is troubled by evil spirits; the night is ignorance. In the fourth watch, that is, at the end of the ages, Christ appeared. The first watch was the covenant with Abraham; the second, the law of Moses; the third, the prophets; and the fourth, the coming of Christ. For He saved those who were drowning when He came and was with us so that we might know and worship Him as God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
