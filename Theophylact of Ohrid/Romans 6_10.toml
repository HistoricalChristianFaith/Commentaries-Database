[[commentary]]
quote='''
"For in that He died, He died unto sin once" means: Christ died for our sin, whereas He Himself was not subject to death. "And in that He lives, He lives unto God," that is, He lives by divine power; for He always lives in the power of God the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25206.html'
source_title='Commentary on Romans'
