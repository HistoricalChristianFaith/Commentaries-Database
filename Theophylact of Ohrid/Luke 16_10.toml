[[commentary]]
quote='''
The Lord further teaches that wealth must be managed according to God's will. "Faithful in little," that is, one who managed well the property entrusted to him in this world, is faithful "also in much," that is, in the age to come he is also worthy of true riches. He calls earthly wealth "little," since it is truly small, even insignificant, because it is fleeting, and "much" he calls heavenly wealth, since it always abides and increases. Therefore, whoever proved unfaithful in this earthly wealth and appropriated for himself what was given for the common benefit of the brethren, that one will not be worthy of that much either, but will be rejected as unfaithful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke'
