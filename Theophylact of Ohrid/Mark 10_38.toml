[[commentary]]
quote='''
Therefore the Lord also rebukes them as not understanding what they are asking: "You do not know," He says, "what you are asking." You think that My Kingdom will be an earthly one, and therefore you ask for an earthly seat; no, it is not so: this is beyond human comprehension, and to sit at My right hand is the greatest thing, surpassing even the angelic ranks. Moreover, you dream of glory, while I am calling you to death. He calls the Cross a Cup and a Baptism — a Cup because the Cross, like a cup of wine, was soon to bring Him to the sleep of death, and He was ready to accept the cup of sufferings as a sweet drink for Himself; and a Baptism because through the Cross He accomplished the cleansing of our sins. But the disciples, not having understood the Lord's words, give their promise on their part, thinking that He was speaking of a literal cup and of the kind of baptism that the Jews practiced, who washed themselves before partaking of food.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
It will not be as ye think, that I am to reign as a temporal king in Jerusalem, but all these things, that is, these which belong to My kingdom, are beyond your understanding; for to sit on My right hand is so great a thing that it surpasses the Angelic orders.

But by the cup and baptism, He means the cross; the cup, that is, as being a potion by Him sweetly received, but baptism as the cause of the cleansing of our sins.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
