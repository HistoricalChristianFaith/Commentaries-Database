[[commentary]]
quote='''
Again the excessive scrupulousness of the Jews is revealed: they did not object to killing him, but they objected to doing it at such a time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252012.html'
source_title='Commentary on Acts'
