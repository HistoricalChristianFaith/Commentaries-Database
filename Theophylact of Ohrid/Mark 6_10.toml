[[commentary]]
quote='''
He bids them remain in one house, lest people think they change places for the sake of gluttony, wandering from one house to another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
That is, lest they should be accused of gluttony in passing from one to another.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
