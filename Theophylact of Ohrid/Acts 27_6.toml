[[commentary]]
quote='''
A ship, he says, "Alexandrian, sailing to Italy." Probably they too had departed for Asia Minor to announce what had happened to Paul, as Aristarchus had for Macedonia.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252027.html'
source_title='Commentary on Acts'
