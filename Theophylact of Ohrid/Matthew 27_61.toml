[[commentary]]
quote='''
And there was Mary Magdalene, and the other Mary, sitting over against the sepulchre. Mary Magdalene and "the other Mary," that is, the Theotokos, who above was called the mother of James and Joses, were sitting opposite the tomb and waiting for the frenzy of the Jews to subside, so that they could go and embrace the Body and anoint it with myrrh. Isaiah spoke concerning these women, "Ye women coming from the sight, come hither; for this is a people without understanding" (Is. 27:11). He is clearly saying that the Jewish people who crucified the Lord lacked understanding (Lk. 23:34). He is calling upon the women, then, to forsake the mindless people and to go to the apostles and bring them the good tidings of the Resurrection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
