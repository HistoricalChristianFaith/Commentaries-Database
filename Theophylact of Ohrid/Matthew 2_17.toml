[[commentary]]
quote='''
Then was fulfilled that which was spoken by Jeremiah the prophet, saying. Lest anyone think that the slaying of the children took place against the will of God, the evangelist shows that God both knew of it beforehand and foretold it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
