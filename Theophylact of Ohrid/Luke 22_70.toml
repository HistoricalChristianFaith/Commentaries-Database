[[commentary]]
quote='''
At this they should have been terrified, but after such words they became even more enraged and in their frenzy ask: "Are You then the Son of God?" He, with moderation and pointing out the absurdity of their question, answers them: "You say that I am," for He despised their fury and spoke to them fearlessly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke'
