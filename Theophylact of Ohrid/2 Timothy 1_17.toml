[[commentary]]
quote='''
Not only did he not avoid my misfortune, but he even sought me out and found me: such is courage! such is faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Timothy%2FChapter%25201.html'
source_title='Commentary on 2 Timothy'
