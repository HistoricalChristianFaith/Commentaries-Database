[[commentary]]
quote='''
Moved by God, the children confess Jesus as King, coming "in the name of the Lord," that is, as God, and say: "peace in heaven." Otherwise put: the former enmity that we had with God has ceased. For there was no King-God on earth. But now, when God comes upon the earth, there is truly peace in heaven, and therefore "glory in the highest," since the Angels also glorify that unity and reconciliation which the King and God riding on the donkey has granted us. For the very fact that the true God appears on earth and walks in our land, the land of His enemies, shows that reconciliation has been concluded between Him and us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'
