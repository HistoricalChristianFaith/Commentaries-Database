[[commentary]]
quote='''
They loosened the ropes when day came; and by day the ship is also taken down, so that those on board would not perish from fear and so that they might see the fulfillment of the prophecy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252027.html'
source_title='Commentary on Acts'
