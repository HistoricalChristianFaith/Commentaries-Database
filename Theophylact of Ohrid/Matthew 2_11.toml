[[commentary]]
quote='''
And when they were come into the house, they saw the young child with Mary His mother. At the time of His birth, the Virgin laid the Child in the manger as they could not find a house then. But later it is most likely that they found a house, and it is there that the Magi found them. Joseph and Mary had gone up to Bethlehem to be enrolled there, as Luke says (Lk 2), and as there was a great number of people assembled there for the census, they did not have a house for a time, and so He was born in the cave. Later a house was found and there the Magi saw the Lord. And they fell down and worshipped Him. Behold, what enlightened souls! They saw a pauper, and worshipped. For they had been informed that He was God, and therefore they also offered Him gifts, as to God and man. Listen, then: And when they had opened their treasures, they offered Him gifts: gold and frankincense and myrrh. Gold they offered to Him as to a king, for we pay tribute of gold to the king to whom we are subject. They offered frankincense as to God, for we burn incense to God. They offered myrrh since He would taste of death. For the Jews would prepare the dead for burial with myrrh to preserve the body from corruption. Myrrh, which is dry, desiccates the body and prevents worms from breeding. Do you see the faith of the Magi? They had been taught by the prophecy of Balaam alone that the Lord was both God and King and would be born for our sake. Listen to the prophecy: "He reclined and rested as a lion, and as a young lion; may they be blessed that call Thee blessed" (Num. 24:9). Behold the kingship in the lion, and death in the reclining. Behold the divinity; for only the divine nature has the power to bless.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
