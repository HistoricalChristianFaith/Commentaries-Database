[[commentary]]
quote='''
The rulers of the Jews were rejected, and none of them believed in Christ, as they themselves even boasted of their malice. "Has any of the rulers believed in Him?" they said (John 7:48). So these lawyers and scribes, as the prophet said, having become foolish fell away from grace, while the simple-hearted among the Jews, who are likened to the lame and blind and maimed, "the base things of the world and the despised" (1 Cor. 1:27–28), were called. For the people "wondered at the gracious words which proceeded out of the mouth" of Jesus (Luke 4:22), and rejoiced at His teaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
