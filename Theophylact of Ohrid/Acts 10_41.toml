[[commentary]]
quote='''
"Witnesses… chosen before." Although Jesus Christ Himself chose them, the expression "chosen before" he ascribes to God the Father. "Who ate and drank with Him." Look at how he confirms the truth of the resurrection. Why did Jesus Christ, after rising, not perform any miracle, but ate and drank? Because the resurrection itself was a great miracle. Moreover, there is not and could not be in this case a greater miracle than that He ate and drank.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
