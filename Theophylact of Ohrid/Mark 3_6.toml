[[commentary]]
quote='''
Who were the Herodians? Either soldiers of Herod, or some new sect that recognized Herod as the Christ, for the reason that under him the succession of Jewish kings came to an end. The prophecy of Jacob determined that when the princes of Judah would be exhausted, then Christ would come (Gen. 49). And so, since in the times of Herod no one from among the Jews was a prince any longer, but Herod the foreigner ruled (he was an Idumean), some accepted him as Christ and formed a sect. These were the people who wanted to kill the Lord. In a figurative sense, pay attention also to the fact that the Herodians, these carnal and coarse people (Herod means "of leather"), want to kill Jesus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But the soldiers of Herod the king are called Herodians, because a certain new heresy had sprung up, which asserted that Herod was the Christ. For the prophecy of Jacob intimated, that when the princes of Judah failed, then Christ should come; because therefore in the time of Herod none of the Jewish princes remained, and he, an alien, was the sole ruler, some thought that he was the Christ, and set on foot this heresy. These, therefore, were with the Pharisees trying to kill Christ.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Morally again, the Herodians, that is, persons who love the lusts of the flesh, wish to slay Christ. For the meaning of Herod is, 'of skin.' (pelliceus. v. Hier. de Nom. Hebr)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'
