[[commentary]]
quote='''
Who were the Herodians? Either soldiers of Herod, or some new sect that recognized Herod as the Christ, for the reason that under him the succession of Jewish kings came to an end. The prophecy of Jacob determined that when the princes of Judah would be exhausted, then Christ would come (Gen. 49). And so, since in the times of Herod no one from among the Jews was a prince any longer, but Herod the foreigner ruled (he was an Idumean), some accepted him as Christ and formed a sect. These were the people who wanted to kill the Lord. In a figurative sense, pay attention also to the fact that the Herodians, these carnal and coarse people (Herod means "of leather"), want to kill Jesus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'
