[[commentary]]
quote='''
The Lord urges the disciples to vigilance. Take heed, He says, what you hear; do not let anything I have said pass you by. "With what measure you mete, it shall be measured to you," that is, to the degree that you are attentive, to that degree you will also receive benefit. To the listener who is always attentive, and moreover to the highest degree, God will also give a great reward, while for the sluggish person the profit of recompense will be proportionate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
With what measure ye mete, it shall be measured to you, that is, whatsoever degree of application ye bring, in that degree ye will receive profit.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
