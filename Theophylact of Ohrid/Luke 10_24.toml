[[commentary]]
quote='''
For the ancient prophets and kings, though they greatly desired to see the Lord in the flesh and to hear Him, were nevertheless not deemed worthy of this. And in another sense: since He said above that he knows the Father to whom the Son reveals Him, He now blesses the disciples as those who have already received this revelation. For through Himself He revealed the Father to them, since he who saw Him saw the Father (John 14:9). And no one among those saints who lived before the appearing and working of the Son of God in the flesh attained this blessing. Since they did not see the Lord in the flesh, through Whom the Father was known, it follows that they did not see the Father in the way the apostles saw Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'
