[[commentary]]
quote='''
Whosoever therefore shall disregard one of these least commandments, and shall teach men so, he shall be called least in the kingdom of heaven. The "least commandments" are those which He Himself is about to give, not those of the law of Moses. He calls them "least" out of humility, to instruct you, O reader, to have moderate thoughts of yourself as you give your teachings. He who "shall be called least in the kingdom of heaven" means he who will be last in the resurrection and who will be cast into gehenna. For such a one shall not enter the kingdom of heaven, far from it! By "kingdom" understand the resurrection. But whosoever shall do and teach them, the same shall be called great in the kingdom of heaven. First Christ says, "whosoever shall do," and then, "and shall teach"; for how can I guide another along a road that I have not myself travelled? By the same token, if I practice the commandments, but do not teach them, my reward is not so great. There can even be condemnation, if I do not teach because of spite or sloth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
