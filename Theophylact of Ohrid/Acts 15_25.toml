[[commentary]]
quote='''
He says that "we, having gathered, unanimously decided," because all so determined and write this after careful deliberation. It is remarkable that neither Peter nor James dared, without the whole church, to establish a decree concerning circumcision, although they recognized it as necessary. But even all together they would not have relied upon themselves, if they had not been convinced that it was also well-pleasing to the Holy Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252015.html'
source_title='Commentary on Acts'
