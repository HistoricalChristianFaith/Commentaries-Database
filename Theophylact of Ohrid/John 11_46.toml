[[commentary]]
quote='''
Others reported it to the Pharisees, undoubtedly with the intent of discrediting Him, as one who had done something unlawful, since He had ordered a buried man to be dug up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John'
