[[commentary]]
quote='''
i. e. Apart, because he had a strong suspicion that He was innocent, and thought he could examine Him more accurately, away from the crowd: and said unto Him, Art Thou the King of the Jews?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Pilate called Jesus aside privately. Since there was a high opinion about Him, he wanted to learn everything more precisely, away from the tumult of the Jews. So he asks Him whether He is a king. What everyone was saying, that is what he brings up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John'
