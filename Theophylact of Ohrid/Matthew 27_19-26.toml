[[commentary]]
quote='''
When he was seated upon the judgement seat, his wife sent unto him, saying, Have thou nothing to do with that righteous man: for I have suffered many things this day in a dream because of Him. But the chief priests and elders persuaded the multitude that they should ask for Barabbas, and kill Jesus. The governor answered and said unto them, Which of the two will ye that I release unto you? They said, Barabbas. Pilate saith unto them, What then shall I do with Jesus who is called Christ? They all say unto him, Let him be crucified. And the governor said, Why, what evil hath He done? But they cried out the more, saying, Let him be crucified. When Pilate saw that he could prevail nothing, but that rather a tumult was made, he took water, and washed his hands before the multitude, saying, I am innocent of the blood of this righteous Man: see ye to it yourselves. Then answered all the people, and said, His blood be on us, and on our children. Then released he Barabbas unto them: and when he had scourged Jesus, he delivered Him to be crucified. O, how miraculous! While being judged by Pilate, Christ caused his wife to suffer a fright. It was not Pilate who saw the dream, but his wife; either because he was unworthy, or because the people would not have believed that he had seen such a dream and would think that he said this only with a view towards granting a pardon. And perhaps he would have kept silent if he had seen the dream, as he was the judge. The dream was a work of providence, not occurring so that Christ would be released, but so that the woman would be saved. Why, then, did Pilate not release Him? Because it was not politic to do so as Jesus had been charged with accusations concerning kingship. But Pilate should have asked for evidence either that Jesus had enlisted soldiers or that He had forged weapons. Instead, Pilate let himself be drawn to their side, like one who is mute and cowardly, and because of this he is not without blame. For when they demanded the man who was notorious for wickedness, he handed Barabbas over; but when it came to Christ, he asked them, "What then shall I do with Jesus?" thus making them masters of the decision. Yet he was the governor and could have snatched Christ away from them, as the chief captain did with Paul (Acts 21:31-33). They said, "Let him be crucified," desiring not only to kill Him but to mark Him as a criminal, for the cross was reserved as a punishment for criminals. Pilate washed his hands as if to show that he was clean of defilement, but his thoughts were evil. For he called Jesus a righteous man and yet handed Him over to murderers. The people took upon themselves the punishment for His murder, and this punishment indeed overtook them when the Romans destroyed them and their children. But even to this day, the Jews, who are children of those who slew the Lord, have His blood upon them. Because of their disbelief in the Lord they have been persecuted by all, and they have had no boldness before their persecutors on account of those words spoken to Pilate. Pilate scourged Jesus, that is, he had Him whipped, either to gratify the people, or else to show that it was he himself who had condemned Christ, and to make it appear that they were not about to crucify an innocent man, but rather one who was dishonorable. Thus was fulfilled this prophecy of Isaiah as well, "I gave My back to scourges" (Is. 50:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
