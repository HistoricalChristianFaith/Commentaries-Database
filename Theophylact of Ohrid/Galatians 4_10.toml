[[commentary]]
quote='''
From this it is evident that the false apostles preached not only circumcision, but also the observance of feasts and new moons.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Galatians%2FChapter%25204.html'
source_title='Commentary on Galatians'
