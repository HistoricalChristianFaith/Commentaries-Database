[[commentary]]
quote='''
By the cross, He speaks of an ignominious death, meaning, that if any one will follow Christ, he must not for his own sake flee from even an ignominious death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
