[[commentary]]
quote='''
The people of the ruler of the synagogue regarded Christ as one of the ordinary teachers, which is why they asked Him to come and pray over the girl, and in the end, when she died, they thought that He was no longer needed after her death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Those who were about the ruler of the synagogue, thought that Christ was one of the prophets, and for this reason they thought that they should beg of Him to come and pray over the damsel. But because she had already expired, they thought that He ought not to be asked to do so. Therefore it is said, While he yet spake, there came messengers to the ruler of the synagogue, which said, Thy daughter is dead; why troublest thou the Master any further?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
