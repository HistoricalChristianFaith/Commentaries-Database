[[commentary]]
quote='''
The people of the ruler of the synagogue regarded Christ as one of the ordinary teachers, which is why they asked Him to come and pray over the girl, and in the end, when she died, they thought that He was no longer needed after her death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'
