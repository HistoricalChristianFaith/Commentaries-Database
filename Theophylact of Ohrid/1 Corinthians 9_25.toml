[[commentary]]
quote='''
They already stand convicted. They practice self-control to receive a perishable crown: and we do not do this even for an imperishable crown?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25209.html'
source_title='Commentary on 1 Corinthians'
