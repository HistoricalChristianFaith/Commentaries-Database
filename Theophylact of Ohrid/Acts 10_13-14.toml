[[commentary]]
quote='''
Everyone would have begun to accuse Peter as a lawbreaker, and therefore it is arranged by the Spirit so that he would have a defense; that is why he objects to the Angel. For he had to fully observe the law. So this is arranged so that they would not begin to accuse him. Perhaps, having knelt down, he saw the vision. And what happened was a Divine act, that is, that he saw things above and was in a state of ecstasy, and heard a voice from there. Because Peter himself heard the Lord's command: "Do not go on the road to the Gentiles" (Matt. 10:5). If even Paul had need of circumcision and the offering of sacrifice, then all the more so at that time, at the beginning of the preaching, when they were very weak. But Peter did not say that all things are defiled and unclean, but only those which the law also called defiled and unclean.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
