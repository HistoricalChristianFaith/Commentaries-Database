[[commentary]]
quote='''
Look how, by humbling himself and Apollos, he makes bearable the humbling of the wise and rich leaders of the Corinthians, teaching that He attributes to Himself all the blessings bestowed upon us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25203.html'
source_title='Commentary on 1 Corinthians'
