[[commentary]]
quote='''
"For they are equal to the Angels and are sons of God." Why? Because they are sons of the resurrection. These words have the following meaning: I, He says, called them sons of God because in their birth nothing bodily is perceived, but everything is divine. For in the resurrection there is no preceding of union, nor seed, nor womb, nor conception, but God gives birth to our bodies in a way known to Him. Since God acts in the resurrection, those who are reborn through the resurrection are rightly called sons of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
As if He said, Because it is God who worketh in the resurrection, rightly are they called the sons of God, who are regenerated by the resurrection. For there is nothing carnal seen in the regeneration of them that rise again, there is neither coming together, nor the womb, nor birth.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
