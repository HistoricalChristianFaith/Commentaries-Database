[[commentary]]
quote='''
What does the expression "to betray Him" mean? It means: to inform them when Christ would be alone. They were afraid to seize Him while He was teaching, lest they bring trouble upon themselves from the people; therefore Judas promised to betray Him to them when He would withdraw from everyone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'
