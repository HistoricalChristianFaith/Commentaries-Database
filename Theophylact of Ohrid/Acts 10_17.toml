[[commentary]]
quote='''
The sheet (shroud) signifies the earth, and the beasts in it signify the Gentiles. The saying "kill and eat" (v. 13) means that they too must come to Christ, and the fact that this is repeated three times signifies baptism. Thus, the true meaning of the vision points him to the teaching of the Trinity, just as faith in the Trinity constitutes true worship of God. "Behold, the men sent by Cornelius." These men arrive at just the right moment to resolve the perplexity. For Christ also allowed Joseph first to become frightened, and then sent the Angel, because the soul readily accepts a resolution after having first experienced perplexity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
