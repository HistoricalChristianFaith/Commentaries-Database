[[commentary]]
quote='''
Meanwhile, on the Lord's way, the woman with the flow of blood is also healed. This woman had great faith, because she hoped to be healed by the Lord's garment alone; and for this she received healing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'
