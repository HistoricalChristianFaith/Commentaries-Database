[[commentary]]
quote='''
Then he proves that it is not difficult for us not to sin. Consider, he urges, in your mind which is better: to be slaves of sin, having surrendered to it of your own will (this is what "you yield" means), and to receive as a reward death, that is, eternal punishment (for the sin of Adam produced bodily and temporal death, but sin committed now subjects a person to eternal death, that is, eternal punishment), or to obey God and receive as a reward righteousness and the blessings that flow from it?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25206.html'
source_title='Commentary on Romans'
