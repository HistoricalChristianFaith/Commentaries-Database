[[commentary]]
quote='''
"And when ye come into a house, salute it, saying, Peace be unto this house. And if the house be worthy, let your peace come upon it: but if it be not worthy, let your peace return to you." By "salutation" and "peace" understand "blessing," which remains only upon those who are worthy. Learn, then, from this that it is primarily our own deeds that bring blessing upon us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
