[[commentary]]
quote='''
But bitter is the fact that "they will deliver him into the hands of the Gentiles." Notice: as soon as he heard that he was about to endure many sufferings, he begins to hasten. Agabus did not say that they would bind Paul, lest they think he was speaking by prior arrangement; no, he said: "the man whose belt this is."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252021.html'
source_title='Commentary on Acts'
