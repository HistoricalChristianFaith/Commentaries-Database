[[commentary]]
quote='''
"And when they heard that he spoke… in the Hebrew language." You see how it affected them that he spoke the same language as they did — they had a certain kind of respect for that language.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252022.html'
source_title='Commentary on Acts'
