[[commentary]]
quote='''
Peter's girding himself is a sign of modesty. He girt himself with a linen coat, such as Thamian and Tyrian fishermen throw over them, when they have nothing else on, or even over their other clothes.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Here again we find an indication of the distinctive qualities of the disciples: John was more perceptive, while Peter was more ardent. Therefore John was the first to recognize the Lord, while Peter was the first to hasten to Him. By girding himself, Peter expressed his reverence for Jesus, and by throwing himself into the sea, he displayed his love. For he did not hold back like the others, but set out swimming, even though they were about two hundred cubits from the shore.
The "ependytes" is a garment of linen cloth, with which Phoenician and Syrian fishermen gird themselves, either over the naked body or over their clothing — simply put, as painters depict the apostles girded over their clothing. Since Peter, being occupied with fishing, was naked, he girds himself with the ependytes out of reverence (for this is what the girding signifies) and is the first to hasten to the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John'
