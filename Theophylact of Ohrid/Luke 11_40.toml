[[commentary]]
quote='''
Foolish ones! Is it not the same One who created the soul, who also created the body, upon which you dwell so much? Therefore you ought to cleanse the soul as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke'
