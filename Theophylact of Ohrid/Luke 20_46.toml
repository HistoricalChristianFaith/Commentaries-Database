[[commentary]]
quote='''
Since He was sending the disciples as teachers into the world, He rightly urges them not to imitate the Pharisees in their love of glory, their love of preeminence, and in general their worldliness and people-pleasing. For to carefully seek out greetings in the marketplaces is characteristic of those who flatter every person they meet and curry a favorable opinion of themselves, or who use this as a means of collecting money.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
For as He was sending them to teach the world, He rightly warns them not to imitate the pride of the Pharisees. Beware of the Scribes, who desire to walk in long robes, that is, to go forth into public, dressed in fine clothes, which was one of the sins remarked in the rich man. (Luke 16:19.)

Which is the way of those who court and hunt after a good reputation, or they do it for the sake of collecting money.
It follows, And the chief seats in synagogues.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
