[[commentary]]
quote='''
Do you see how the prophet long ago foretold the present regeneration and adoption that is accomplished in us through baptism?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%25206.html'
source_title='Commentary on 2 Corinthians'
