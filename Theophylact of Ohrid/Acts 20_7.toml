[[commentary]]
quote='''
Then it was the feast of Pentecost and a Sunday. And even at night Paul did not rest, but conversed then all the more, since it was a time of leisure. See how long he spoke even after supper.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252020.html'
source_title='Commentary on Acts'
