[[commentary]]
quote='''
But the fourth seed fell on good ground. So observe how rare goodness is and how few are being saved! Only a fourth part of the seed proved to have survived!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
See also how the bad are the greatest number, and the few are those who are saved, for the fourth part of the ground is found to be saved.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
