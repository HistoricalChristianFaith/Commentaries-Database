[[commentary]]
quote='''
The demons consider it a torment to come out of a man, which is why they said: "do not torment us," that is, do not cast us out of our dwelling, that is, out of the man. On the other hand, they thought that the Lord would no longer tolerate them because of their excessive audacity, but would immediately deliver them to torment, and therefore they begged Him not to torment them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'
