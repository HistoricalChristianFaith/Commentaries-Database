[[commentary]]
quote='''
By the word "covetousness" he shows that they acquire gain in a shameful manner. For covetousness sometimes means injustice, and sometimes the baseness of acquisition in general. That is why the word "exploit" is fittingly used. To show that they are completely foreign to divine teaching, he says that they use flattering words. But, he says, they will receive what is due for their impiety, namely death. The phrase "long ago prepared" signifies God's foreknowledge. For God by foreknowledge prepared good things for the good, and likewise for the wicked the place proper to them. For judgment has long been prepared.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Peter%2FChapter%25202.html'
source_title='Commentary on 2 Peter'
