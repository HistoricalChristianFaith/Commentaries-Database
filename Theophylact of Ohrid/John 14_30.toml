[[commentary]]
quote='''
Having comforted the disciples with the foregoing discourse, the Lord again speaks of His death. "For the prince of this world is coming," He says, that is, the devil. That he is the prince of this world, understand this not of creation in general, but of wicked people who are worldly-minded. For he has dominion not over heaven and earth—otherwise he would have overthrown and ruined everything—but over those who give themselves over to him. For this reason he is also called the prince of darkness, and by darkness understand evil deeds.

But since some might think that Christ too is being handed over to death for sins, He added: "And has nothing in Me"; I am not deserving of death, I owe nothing to the devil, but I accept suffering voluntarily, out of love for the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
