[[commentary]]
quote='''
Showing further the superiority of the Son over the angels, he says that God subjected the universe, that is, this world, not to them but to the Son. He calls it "the world to come," because the Son of God always existed, while it was yet to appear, since obviously it did not exist before. Therefore, in relation to the eternal existence of the Son, the universe was indeed the world to come.

"Of which we speak" — that is, about the universe, of which it was said above: "when He brings the Firstborn into the world" (Heb. 1:6). Therefore, let not your erring mind seek another universe. Some understood the coming universe as the future world. About this world, he says, is our entire discourse. Then the angels will stand by as servants, while the Son will be seated as Judge.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25202.html'
source_title='Commentary on Hebrews'
