[[commentary]]
quote='''
He came at three appointed times: once through Moses, another time through the prophets, and the third time He came personally.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke'
