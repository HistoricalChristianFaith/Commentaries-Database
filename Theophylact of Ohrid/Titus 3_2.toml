[[commentary]]
quote='''
Do not speak evil of anyone, even if someone acts badly — that is, do not reproach. Our mouths should be clean from reproach. Whether justly or falsely — it is not for us to judge. Consider what danger there may be.
To show all meekness to all men — to both Jews and Greeks, and to those who cause harm, and to the unjust.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Titus%2FChapter%25203.html'
source_title='Commentary on Titus'
