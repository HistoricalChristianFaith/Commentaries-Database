[[commentary]]
quote='''
By the Kingdom of God He here means the preaching of the Gospel and the promise of future blessings. Therefore, whoever receives the Divine preaching as a child, that is, without any hesitation and admitting no unbelief in himself, shall enter into the Kingdom of God and inherit those blessings which he has already acquired by faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
