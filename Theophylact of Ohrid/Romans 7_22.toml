[[commentary]]
quote='''
I knew the good even before the law, and when I find it depicted in writings, I praise the law and agree with it "according to the inner man," or according to my mind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25207.html'
source_title='Commentary on Romans'
