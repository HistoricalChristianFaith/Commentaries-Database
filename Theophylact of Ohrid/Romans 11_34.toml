[[commentary]]
quote='''
He alone, he says, knows His own works, and besides Him no one else. Being all-wise, He does not borrow wisdom from counsel with another, but of Himself was and is self-sufficient.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%252011.html'
source_title='Commentary on Romans'
