[[commentary]]
quote='''
Thus, he rebukes not circumcision (which he apparently respects), but the one who insults or transgresses it. Then, having proved this, he clearly defines who is a true Jew, and gives to understand that the Jews did everything out of vainglory. "For he is not a Jew," he says, "who is one outwardly, but he who is one inwardly," who does nothing in a merely sensory manner, but understands spiritually both the sabbaths, and the sacrifices, and the purifications.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25202.html'
source_title='Commentary on Romans'
