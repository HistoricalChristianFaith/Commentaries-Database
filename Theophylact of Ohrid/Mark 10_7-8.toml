[[commentary]]
quote='''
In a figurative sense, this can be understood as follows: the word of Teaching, sowing good seeds in the soul of a believing person, has the significance of a husband to the soul that receives it. And it leaves its father, that is, lofty thought, and its mother, that is, embellished speech, and cleaves to its wife, that is, to the benefit of the soul, adapting itself to it and often preferring humble thoughts and simple speech. And then they both become one flesh, that is, the soul believes that "the Word of God became flesh," and no human thought can any longer separate the soul from such faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'
