[[commentary]]
quote='''
When he says: "circumcision is that of the heart, in the spirit," he paves the way for the Christian way of life and shows the necessity of faith; for believing with the heart and spirit has praise from God, who searches the hearts and judges nothing according to the flesh. From all this it follows that everywhere a righteous life is needed. By the name of the uncircumcised or gentile he means, as was said above, not an idolater, but a pious and virtuous person who does not, however, observe Jewish rites.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25202.html'
source_title='Commentary on Romans'
