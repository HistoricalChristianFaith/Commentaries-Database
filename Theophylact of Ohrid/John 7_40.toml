[[commentary]]
quote='''
Shamed by the boldness of His speech, some from the people — not from the rulers (for the rulers out of envy were always against Him) — confess that He is that Prophet whom they await.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John'
