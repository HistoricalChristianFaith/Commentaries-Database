[[commentary]]
quote='''
"Now when Jesus saw great multitudes about Him, He gave commandment to depart unto the other side." Jesus gave this order because He was not a seeker after glory, and also because He wished to avoid the spiteful envy of the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
