[[commentary]]
quote='''
How should we understand the words: "everyone who exalts himself will be humbled"? For many who exalt themselves in this life enjoy honor. "Will be humbled" means that whoever enjoys great honor in this world is wretched and lowly before God. Moreover, such a person is not honored to the end nor by all, but as much as some respect him, so much do others revile him, perhaps even among those very ones who respect him. Thus, this saying of truth is just. And everyone unworthy of a high position, yet claiming it for himself, will be humbled both before God at the time of the last judgment, even if in this life he were above all.
No one is worthy of exaltation by nature. Therefore let no one exalt himself, lest he be humbled to the utmost.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke'
