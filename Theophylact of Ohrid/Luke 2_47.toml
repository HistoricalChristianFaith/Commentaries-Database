[[commentary]]
quote='''
And all "were amazed." Do you see how He was advancing in wisdom, so that for many He became an object of curiosity and wonder? For the manifestation of His wisdom is His very advancement.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke'
