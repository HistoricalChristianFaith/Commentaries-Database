[[commentary]]
quote='''
So as not to grieve like the rest, who have no hope of the resurrection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25204.html'
source_title='Commentary on 1 Thessalonians'
