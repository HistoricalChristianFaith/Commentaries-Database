[[commentary]]
quote='''
For having eyes, they look at nothing other than lust, and unceasingly having this in mind and sinning, as sons of cursing, they entice unstable souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Peter%2FChapter%25202.html'
source_title='Commentary on 2 Peter'
