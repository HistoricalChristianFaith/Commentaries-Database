[[commentary]]
quote='''
The Lord commands this to all in general — both to people in the world and to hermits. Therefore, we must watch and pray, fulfilling both the one and the other, for many, although they watch, spend the nights not in prayer but in wicked deeds. Note also that Christ did not now say, "I do not know when the time of the end will come," but "you do not know," for He hid this time for our benefit. If even in the uncertainty of the end we are hostile toward one another, what would we not have done if we knew the time of the end? Then we would spend all the time of life until death in exceedingly wicked deeds, and on the last day, expressing repentance, we would fall into an even worse state.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Now all these ages must look out for the end; for even a child must be watched, lest he die unbaptized.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
