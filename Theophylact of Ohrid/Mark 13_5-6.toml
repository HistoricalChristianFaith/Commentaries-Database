[[commentary]]
quote='''
"Many will come," such as, for example, Judas the Galilean and Theudas, who passed themselves off as God's anointed ones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But before answering their question, He strengthens their minds that they may not be deceived, wherefore there follows: And Jesus answering them began to say, Take heed lest any man deceive you? And this He says, because when the sufferings of the Jews began, some arose professing to be teachers, wherefore there follows: For many shall come in my name, saying, I am Christ; and shall deceive many.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
