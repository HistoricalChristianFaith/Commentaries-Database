[[commentary]]
quote='''
Behold, he shows yet another superiority: Moses was faithful as a servant, appointed to convey the Lord's commands to the other servants and to be a witness before God at the judgment concerning what was told to them. For if he calls heaven and earth as witnesses, as for example: "Give ear, O heavens, and hear, O earth" (Deut. 32:1; cf. Isa. 1:2), and the valleys, as for example: "Hear, O strong foundations of the earth" (Mic. 6:2), then how much more a man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25203.html'
source_title='Commentary on Hebrews'
