[[commentary]]
quote='''
Here the Apostle reasons about the life of faith, so that after he has said so much in praise of faith and disparaged works, we would not become negligent. Since faith has justified us, let us sin no more, but "let us have peace with God" through a life pleasing to Him. How will this be? "Through our Lord Jesus Christ." He who justified us when we were sinners will also help us to be preserved in His righteousness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25205.html'
source_title='Commentary on Romans'
