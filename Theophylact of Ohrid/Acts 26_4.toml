[[commentary]]
quote='''
"All the Jews know; they have known about me for a long time." This means: the Jews know the truth, but do not want to testify to it, and willfully lie and sin against him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252026.html'
source_title='Commentary on Acts'
