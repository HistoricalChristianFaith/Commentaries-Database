[[commentary]]
quote='''
Preaching in the wilderness of Judea, and saying, Repent ye. The Jews were arrogant, and so he urges them to repent. For the kingdom of heaven is at hand. The kingdom of heaven means the first and second comings of Christ, and also the virtuous life. For when we walk on earth as if we lived in heaven, not living according to the passions, then we possess the kingdom of heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
