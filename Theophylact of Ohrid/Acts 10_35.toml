[[commentary]]
quote='''
"In every nation." He says this so that you would not think that the Gentiles belong to the category of the rejected. "He who works righteousness is acceptable to Him." The expression "righteousness" is used in place of "with every virtue." He did not say "is saved," but "is acceptable to Him," that is, worthy of being accepted by God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
