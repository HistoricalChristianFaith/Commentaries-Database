[[commentary]]
quote='''
What does "when they served" mean? It means "preached." And the expression "for the work" is used instead of "for apostleship." By whom is Paul ordained? By Lucius and Manaen, or rather by the Holy Spirit. He is ordained so that he might preach with authority. How then does Paul himself say: "chosen not by men nor through man" (Gal. 1:1)? This is in the sense that no man called him and converted him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
