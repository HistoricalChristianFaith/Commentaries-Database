[[commentary]]
quote='''
But if thou wilt enter into life, keep the commandments. He saith unto Him, Which? Jesus said, Thou shalt do no murder, Thou shalt not commit adultery, Thou shalt not steal, Thou shalt not bear false witness, Honour thy father and thy mother, and, Thou shalt love thy neighbour as thyself. The Lord directs the enquirer to the commandments of the law, so that the Jews could not say that He despised the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
