[[commentary]]
quote='''
"Jesus, standing at the right hand of God." By standing he signifies firmness and immovability. And even they already admitted this: they already at that time considered Him to be standing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25207.html'
source_title='Commentary on Acts'
