[[commentary]]
quote='''
Indeed, before the decisive war of the Romans against the Jews began, what did the apostles not suffer from them, being delivered up to courts and led before kings: Herod, Agrippa, and Nero? But you, He says, "do not worry beforehand what you will" answer: at that very hour the Holy Spirit will give you what you must say.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Commentary on Mark'
