[[commentary]]
quote='''
Then were there two thieves crucified with Him, one on the right hand, and the other on the left. And they that passed by reviled Him, shaking their heads, and saying, Thou that destroyest the temple, and buildest it in three days, save Thyself. If Thou be the Son of God, come down from the cross. Likewise also the chief priests mocking Him, with the scribes and elders, said, He saved others; Himself he cannot save. If He be the King of Israel, let him now come down from the cross, and we will believe in Him. He trusted in God; let Him deliver Him now, if He will have Him: for He said, I am the Son of God. The thieves also, which were crucified with Him, likewise reproached Him. As a slander against Christ the two thieves were crucified with Him, so that people would think that He, too, was such a transgressor of the law as they were. The two thieves were symbolic of the two races, the Jewish and the Gentile, for both races had transgressed the law and reviled Christ, just as both these thieves at first reviled Him. But later the one thief understood Who He was and confessed Him as King; whereupon he also said, "Remember me, Lord, in Thy kingdom" (Lk. 23:42). So, too, did the Gentile race confess Christ, while the other thief, the Jewish race, blasphemed. The devil prompted them to say, "If thou be the Son of God, come down from the cross," in order to provoke Him to come down and thus overturn the salvation of all being accomplished on the cross. But Christ, Who is indeed the Son of God, was not persuaded by the enemy, so that you, O reader, might learn that we ought not to be persuaded by the ploys of the devil, but do what is good even if men think ill of us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
