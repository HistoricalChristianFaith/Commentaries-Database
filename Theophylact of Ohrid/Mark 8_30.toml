[[commentary]]
quote='''
The Lord commanded them to tell no one, because He wished to conceal His glory, lest many be scandalized by Him and, in their unbelief, become liable to greater punishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'
