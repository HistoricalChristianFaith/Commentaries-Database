[[commentary]]
quote='''
The Lord commanded them to tell no one, because He wished to conceal His glory, lest many be scandalized by Him and, in their unbelief, become liable to greater punishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For He wished in the mean time to hide His glory, lest many should be offended because of Him, and so earn a worse punishment.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
