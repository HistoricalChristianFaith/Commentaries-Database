[[commentary]]
quote='''
The Lord was also crucified with the robbers so that people would think ill of Him, that He too was an evildoer. But this was by God's dispensation, for on the one hand the prophecy was fulfilled: "He was numbered with the transgressors" (Isa. 53:12), and on the other hand the two robbers were figures of the two peoples — the Jewish and the Gentile. Both of these peoples were lawless — the Gentile, as having transgressed the natural law, and the Jewish, as having transgressed both this law and the written law that God had given them. But the Gentile people proved to be the wise robber, while the Jewish people, on the contrary, remained blasphemers to the end. The Lord is crucified between these two peoples, inasmuch as He is the Cornerstone who unites us in Himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
They did this that men might have a bad opinion of Him, as though He also were a robber and a malefactor. But it was done by Providence to fulfil the Scriptures. There follows: And the Scripture was fulfilled which saith, And he was numbered with the transgressors.

Or else; the two robbers were meant to point out the two people, that is, the Jews and the Gentiles, for both were evil, the Gentile as transgressing natural law, but the Jew by breaking the written law, which the Lord had delivered to them; but the Gentile was penitent, the Jew a blasphemer unto the end. Between whom our Lord is crucified, for He is the corner stone, which binds us together.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
