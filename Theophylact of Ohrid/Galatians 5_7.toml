[[commentary]]
quote='''
This is not a question, but a lament. He says: you had attained perfection, but what happened? Who gained such power as to hinder you from obeying not the evangelical truth, but the abolished law?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Galatians%2FChapter%25205.html'
source_title='Commentary on Galatians'
