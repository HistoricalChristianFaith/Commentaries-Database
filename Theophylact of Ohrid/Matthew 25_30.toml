[[commentary]]
quote='''
"Outer darkness" is that which is furthest from the light of God and for that reason renders the punishment more harsh. There is another reason that could be mentioned, and that is that the sinner is in darkness even in this life, as he has fallen away from the Sun of Righteousness, but as there is still hope of conversion, this is not yet the "outer" darkness. But when he has died and an examination has been made of the things he has done, then the outer darkness in its turn receives him. For there is no longer any hope of conversion, but he undergoes a complete deprivation of the good things of God. While he is here in this life he enjoys to some degree the good things of God, I mean, the tangible things of creation, and he believes that he is in some manner a servant of God, living out his life in God's house, which is this creation, being fed by Him and provided with the necessities of life. But then he will be altogether cut off from God, having no share at all in the good things of God. This is that darkness which is called "outer" by comparison to the darkness here, which is not "outer" because the sinner is not yet completely cut off from this time onward.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
