[[commentary]]
quote='''
Then, having attacked their lawlessness, he tries to relieve them of responsibility for it and says: "by the determined counsel," showing by this that they did not do what they dared by their own power, but because He Himself consented to it and because it was determined from above.
Furthermore, lest it should seem that they were innocent — since although this was determined, yet they were the murderers — lest it should seem so, he adds: "by the hands of lawless men," that is, either through the traitor Judas, or through the soldiers who crucified Christ. Although it is known that those who nailed Him to the cross committed lawlessness, nevertheless Peter first speaks of this unclearly, so as not to drive them to despair.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25202.html'
source_title='Commentary on Acts'
