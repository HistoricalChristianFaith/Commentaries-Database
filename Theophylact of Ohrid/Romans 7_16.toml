[[commentary]]
quote='''
That the law is good, he says, is evident from the fact that I naturally know what ought to be done, and that my reason is not impaired, even though I give myself over to vice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25207.html'
source_title='Commentary on Romans'
