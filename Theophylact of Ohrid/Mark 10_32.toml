[[commentary]]
quote='''
Why does Jesus predict to the disciples what will happen to Him? To strengthen their spirit, so that having heard about it beforehand, they would bear it courageously when it came to pass, and not be struck by its suddenness; and at the same time they were to know that He suffers of His own will. For he who foresaw the sufferings could have avoided them, and if he did not flee, it is clear that he voluntarily gives himself over to suffering. But since it was fitting to reveal His suffering only to the closest disciples, He goes ahead of everyone on the road, wishing to separate the disciples from the crowd. Moreover, by going ahead of everyone and by His haste on the road, the Lord also shows that He hastens toward His suffering and does not flee from death for the sake of our salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
To show that He runs to meet His Passion, and that He does not refuse death, for the sake of our salvation; and they were amazed, and as they followed, they were afraid.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
