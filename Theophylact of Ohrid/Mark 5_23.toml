[[commentary]]
quote='''
He was a man of half-faith: by falling at the feet of Christ, he shows himself to be a believer, but by asking Him to come, he reveals a faith not of the kind it should be; he ought to have said: "only speak the word."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Now this man was faithful in part, inasmuch as he fell at the feet of Jesus, but in that he begged of Him to come, he did not show as much faith as he ought. For he ought to have said, Speak the word only, and my daughter shall be healed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
