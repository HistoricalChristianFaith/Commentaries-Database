[[commentary]]
quote='''
"I will put my trust in Him" — through this He also shows that He became man and our brother. For just as each of men, so He Himself also hopes in Him, that is, in the Father. At the same time He shows us that we should hope in God alone, since He Himself, being the Son and lacking nothing, nevertheless says that He hopes in the Father. Some have interpreted it thus: since, they say, above he called Christ a brother, and below a Father, in the middle he shows that these are names of the dispensation of the last times; but His pre-eternal name is God. Who in the proper sense hopes in another, if not in God? As if he were saying: hearing that He is brother and father, do not think that He is one of many; He is God, he says, in Him, as Scripture testifies, one must hope, so that here the speech is not from the person of Christ, but from the prophet, saying: I, the prophet, will hope in Christ Himself, as God. But such an understanding is not perfect.

"Here I am and the children whom God has given Me" — here he calls Christ our Father. "Gave" signifies the Father's good pleasure that He should become incarnate. If He had not been well pleased for the Son to become incarnate, He would not have had children either.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25202.html'
source_title='Commentary on Hebrews'
