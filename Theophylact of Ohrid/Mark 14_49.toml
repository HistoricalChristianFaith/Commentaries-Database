[[commentary]]
quote='''
Every day I taught in the temple! But this testifies to His Divinity. For when He taught in the temple, they could not seize Him, even though He was in their hands, since the time of His suffering had not yet come. But when He Himself willed it, then He also gave Himself up to them, that the prophetic Scriptures might be fulfilled, that "like a sheep He was led to the slaughter" (Isa. 53:7), not arguing, not crying out, but voluntarily following those who led Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
This, however, is a proof of His divinity, for when He taught in the temple they were unable to take Him, although He was in their power, because the time of His Passion had not yet come; but when He Himself was willing, then He gave Himself up, that the Scriptures might be fulfilled, for he was led as a lamb to the slaughter, not crying nor raising His voice, but suffering willingly.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
