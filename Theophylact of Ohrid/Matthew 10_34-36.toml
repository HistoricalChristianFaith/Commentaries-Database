[[commentary]]
quote='''
"Think not that I am come to send peace on earth: I came not to send peace, but a sword. For I am come to set a man at variance against his father, and the daughter against her mother, and the daughter in law against her mother in law. And a man's foes shall be they of his own household." Harmony is not always a good thing, while separation sometimes is. The sword, then, is the word of faith which severs our bond to our families and relatives when they hinder our piety towards God. For He does not tell us simply to separate ourselves from them, but only when they will not come with us, and especially when they hinder us in our faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
