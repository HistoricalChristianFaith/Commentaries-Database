[[commentary]]
quote='''
Therefore if thou bring thy gift to the altar, and there rememberest that thy brother have aught against thee, leave there thy gift before the altar, and go thy way; first be reconciled to thy brother, and then come and offer thy gift. God disregards His own honor solely that we might love one another. He said, "If thy brother have aught against thee," and added nothing more. Whether rightly or wrongly your brother has anything against you, be reconciled. And Jesus did not say, "If thou hast aught against him," but, "If he hath aught against thee" hasten to make him your friend. He commands you to leave the gift so that you will be compelled to be reconciled. For when you intend to make an offering, you must first be reconciled. At the same time the Lord shows that love is the true sacrifice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
