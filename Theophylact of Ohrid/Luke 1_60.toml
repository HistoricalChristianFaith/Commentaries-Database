[[commentary]]
quote='''
Elizabeth spoke of the name, that his name is John, as a prophetess. Or perhaps John himself assigned his own name, for he imparted the gift of prophecy to his mother.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke'
