[[commentary]]
quote='''
Furthermore, not only did He Himself teach, but He also sends His disciples, and moreover in pairs of two, so that they might be bolder. For if He had sent them one by one, one alone could not have acted so boldly, and if He had sent more than two together, the number of apostles would not have sufficed for all the villages. So He sends them two by two: "Two are better than one," says Ecclesiastes (Eccl. 4:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Again He sends the Apostles two and two that they, might become more active; for, as says the Preacher, Two are better than one. (Eccl. 4:9) But if He had sent more than two, there would not have been a sufficient number to allow of their being sent to many villages.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
