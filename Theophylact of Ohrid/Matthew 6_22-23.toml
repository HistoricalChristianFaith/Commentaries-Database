[[commentary]]
quote='''
"The eye is the lamp of the body: if therefore thine eye be sound, thy whole body shall be full of light. But if thine eye be evil, thy whole body shall be full of darkness. If therefore the light that is in thee be darkness, how great is that darkness." This means, if you fill your mind with worries over money, you have extinguished the lamp and darkened your soul. For just as the eye that is "sound" or "healthy" brings light to the body, and the eye that is "evil" or "diseased" brings darkness, so also does the state of the mind affect the soul. If the mind is blinded by these worries, it is cast into darkness; then the soul becomes dark, and how much more so the body as well?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
