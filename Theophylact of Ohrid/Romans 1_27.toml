[[commentary]]
quote='''
Having spoken in a veiled manner about women something shameful and such as is indecent to express clearly, he speaks also about men, that they "burned in their lust for one another," showing that they gave themselves over to licentiousness and frenzied love. He did not say they were "doing" desire, but "shame," showing that they outraged nature, and he said "burned in their lust" with the intent that no one would think that their disease was mere desire. "Doing what is shameful." That is, they zealously gave themselves over to impurity, committing it in actual deed, and received recompense for their departure from God and idolatrous error in this very shame and in this very pleasure, having in it, as something unnatural and full of impurity, punishment for themselves. And Paul says this because it was not yet possible to convince them of the existence of Gehenna. If, he says, you do not believe the teaching about Gehenna, then believe that the punishment for them consists in the very impure activity itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25201.html'
source_title='Commentary on Romans'
