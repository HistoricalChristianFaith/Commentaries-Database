[[commentary]]
quote='''
After performing the miracle on the paralytic, the Lord went away to the sea, probably seeking solitude, but the crowd gathers around Him again. Learn, then, that to the degree you flee from glory, it will pursue you; but if you pursue it, it will flee from you. Here the Lord had just withdrawn to the sea, and the people again run after Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25202.html'
source_title='Commentary on Mark'
