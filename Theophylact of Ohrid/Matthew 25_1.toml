[[commentary]]
quote='''
This parable is on mercy and almsgiving. In telling the parable the Lord uses the person of virgins to teach those who understand the greatness of the virtue of virginity not to strive to accomplish this one virtue alone and neglect the others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
