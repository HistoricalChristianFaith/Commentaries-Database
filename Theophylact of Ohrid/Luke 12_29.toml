[[commentary]]
quote='''
"Seek not what ye shall eat, or what ye shall drink, neither be ye of doubtful mind." By doubtful mind (in Church Slavonic, "lifting up") He means, without a doubt, nothing other than distraction and the unstable direction of the mind, which thinks now of one thing, now of another, leaping from one thing to the next and always dreaming of something loftier. Is this not chasing after meteors?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Or by being lifted up he means nothing else but an unsteady motion of the mind, meditating first one thing, then another, and jumping from this to that, and imagining lofty things.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
