[[commentary]]
quote='''
So great is the intolerance of envy! Many utterly grow faint and die from seeing others held in honor. And people of this sort are capable of opposing not only man, but also the will of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
