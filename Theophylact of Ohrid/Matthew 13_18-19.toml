[[commentary]]
quote='''
He urges us to understand what is spoken by those who teach, lest we too be like those who are "by the way side." For it may be said, since Christ is the way, those who are outside of Christ are by the way side. For they are not in the way, but outside of the way.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
