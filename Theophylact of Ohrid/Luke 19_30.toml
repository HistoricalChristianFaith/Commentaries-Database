[[commentary]]
quote='''
The colt was tied up and had many masters, but by those who were sent, that is, the apostles, it is untied. They bring the colt from a certain "village," so that we may know that the Gentile people were in great simplicity and ignorance. For they had never submitted to either the teaching of Moses or the prophets, but were an untrained colt. And if, as another evangelist said (Matt. 21:15), children also cried out, "Hosanna to the Son of David," they too can signify that same new people who, believing in Jesus who appeared in the flesh from the seed of David, sent up glory to God, as it is written: "The generation to come shall praise the Lord" (Ps. 102:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But they bring the colt from a certain village, that it may be known to us that this people was rude and unlearned.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
