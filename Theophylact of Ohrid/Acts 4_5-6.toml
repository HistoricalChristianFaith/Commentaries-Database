[[commentary]]
quote='''
Besides other injustices toward the apostles, they (the rulers, elders, scribes, and chief priests of the Jews) did not even observe the requirements of the law. Pay attention at least to the multitude of chief priests, whereas according to the law there should be one, as long as he lives.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25204.html'
source_title='Commentary on Acts'
