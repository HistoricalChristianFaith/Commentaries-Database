[[commentary]]
quote='''
That is, what they speak falsely about, they do not speak falsely out of ignorance, but knowing that it is false, they hypocritically teach it as though it were true.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Timothy%2FChapter%25204.html'
source_title='Commentary on 1 Timothy'
