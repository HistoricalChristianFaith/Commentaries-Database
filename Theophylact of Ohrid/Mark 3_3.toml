[[commentary]]
quote='''
In the figurative sense, the right hand is withered in everyone who does not perform the works of the right side. To such a person Christ says: "Rise up," that is, depart from sin; "stand in the midst," that is, in the midst of the virtues, since every virtue is a mean, inclining neither toward deficiency nor toward excess. So when he stands in this middle, then his hand will again become healthy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Or, he has his right hand withered, who does not the works which belong to the right side; for from the time that our hand is employed in forbidden deeds, from that time it is withered to the working of good. But it will be restored whenever it stands firm in virtue; wherefore Christ saith, Arise, that is, from sin, and stand in the midst; that thus it may stretch itself forth neither too little or too much.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'
