[[commentary]]
quote='''
They also wrote the charge for which the Lord was crucified: "The King of the Jews," in order to disgrace His glory, as though He were a seditious man who called Himself a king, so that all who passed by would not only have no pity for Him but, on the contrary, would assail Him as a usurper of royal power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'
