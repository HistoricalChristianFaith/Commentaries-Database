[[commentary]]
quote='''
They also wrote the charge for which the Lord was crucified: "The King of the Jews," in order to disgrace His glory, as though He were a seditious man who called Himself a king, so that all who passed by would not only have no pity for Him but, on the contrary, would assail Him as a usurper of royal power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
They wrote this superscription, as the reason why He was crucified, thus wishing to reprove His vainglory in making Himself a king, that so the passers by might not pity Him, but rather hate Him as a tyrant.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
