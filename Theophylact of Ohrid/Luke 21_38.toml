[[commentary]]
quote='''
The Evangelists, especially the first three, did not transmit a great deal of what the Lord taught. It is true that John himself also passed over very much in silence, yet he, beyond what the three transmitted, set forth certain higher teachings of the Lord. The Lord, as one may surmise, taught many lofty truths to those gathered in the temple. That the Evangelists said little, for they did not even wish to declare everything, is evident from much else, and one may conclude no less about this from the fact that, although the Lord taught for nearly three years, they recorded so few of His teachings that, in my opinion, one who said they could be delivered in less than a single day would not deserve censure. Thus the holy Evangelists wrote little out of much, so as merely to convey a taste of the sweetness. The Lord did not speak to everyone in the same way, but offered to each what was profitable. Therefore the people came to Him early in the morning, for grace poured forth from His lips. Looking at how the people came early in the morning to Jesus to hear Him, one might say that the words of David apply to Him: "O God, You are my God; early will I seek You; my soul thirsts for You" (Ps. 63:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
