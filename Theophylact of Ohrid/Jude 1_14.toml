[[commentary]]
quote='''
To what was said above he adds that Enoch also prophesied about the punishment awaiting them from God in the last days, that is, on the day of God's righteous judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Jude%2FJude.html'
source_title='Commentary on Jude'
