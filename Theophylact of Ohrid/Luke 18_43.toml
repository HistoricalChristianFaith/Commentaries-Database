[[commentary]]
quote='''
Note also the gratitude of the healed man. For he followed Jesus, "glorifying God," and disposing others to glorify Him as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke'
