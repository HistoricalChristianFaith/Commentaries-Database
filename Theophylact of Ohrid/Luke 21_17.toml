[[commentary]]
quote='''
For it strikes the soul powerfully, as David also says: "For it is not an enemy who reproaches me, – that I could bear; ...but you, who were to me as myself" (Ps. 55:13-14); and again: "who ate my bread, has lifted up his heel against me" (Ps. 41:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke'
