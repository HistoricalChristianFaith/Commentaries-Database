[[commentary]]
quote='''
The apostle is not speaking about one who holds the rank of presbyter in the Church, but about every aged person. But what if he needs correction? In that case, he says, treat him as a father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Timothy%2FChapter%25205.html'
source_title='Commentary on 1 Timothy'
