[[commentary]]
quote='''
He says that a cry was made in the middle of the night to show that the Lord comes when least expected, as at midnight when we all have fallen into a deep sleep. He also comes with a cry, for a trumpet will sound at the second coming.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
