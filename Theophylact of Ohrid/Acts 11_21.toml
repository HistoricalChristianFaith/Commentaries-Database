[[commentary]]
quote='''
The expression "the hand of the Lord was with them" shows that they were performing miracles. Do you see why miracles were needed now as well? So that they would believe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252011.html'
source_title='Commentary on Acts'
