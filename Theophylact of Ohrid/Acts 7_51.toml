[[commentary]]
quote='''
Why does he who until now had been speaking to the people gently here use harsh words? Because he saw that they were paying no attention to what was being said. "You always resist the Holy Spirit" – not only now. By this he shows that what he said was from the Holy Spirit, and especially so when the hour of his death was approaching, because he, of course, knew this, being filled with the Holy Spirit. He displayed great and fearless boldness, and what he said to them was not his own, but the words of the prophets. "You always," he says, "resist." When God did not want sacrifices, you offered sacrifices, and then, when He wants a sacrifice, you do not offer it. Again, when the temple existed, you served idols, and when He wants you to renounce the temple, you do the opposite. Moreover, he did not say "you resist God," but "the Spirit." For there is no distinction between the Spirit and God.
"You resist… as your fathers did, so do you." He shows that this evil falls upon them all the more because it has come down to them from of old. Christ did the same, because they greatly boasted of their ancestors.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%25207.html'
source_title='Commentary on Acts'
