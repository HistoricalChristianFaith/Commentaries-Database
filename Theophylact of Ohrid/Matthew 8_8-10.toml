[[commentary]]
quote='''
"The centurion answered and said, Lord, I am not worthy that Thou shouldest enter under my roof: but speak the word only, and my servant shall be healed. For I am a man under authority, having soldiers under me: and I say to this man, Go, and he goeth; and to another, Come, and he cometh; and to my servant, Do this, and he doeth it. When Jesus heard it, He marvelled, and said to them that followed, Verily I say unto you, I have not found so great faith, no, not in Israel." The centurion says, "If I who am the servant of the emperor command the soldiers who are under me, how much more so art Thou able to command death and the illnesses, so that they depart from one and beset another?" For illnesses of the body are God's soldiers and officers of punishment. Christ marvels, therefore, saying, "I have not found such great faith among the Israelites as I have in this Gentile."

Others have interpreted these words thus: When Jacob, the renowned patriarch, beheld the ladder reaching up to heaven and the angels of God ascending and descending, he understood that God was present in that place, but not that He is everywhere present. Thus he said, "How fearful is this place! This is none other than the house of God" (Gen. 28:16-17). The Lord now marvels at the great and supernatural faith of this Gentile, saying, "Not even in Israel" - that is, in Jacob - "did I find such faith. For Jacob understood that I could appear in one place, but this man understands that I am everywhere in all places and that by word alone I can do all things." For he said, "Only speak the word, and my servant shall be healed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
