[[commentary]]
quote='''
"They show that the work of the law is written in their hearts." Of which law? The law in deeds. On the day of judgment our own thoughts will stand forth, now condemning, now justifying, and a person will need at that tribunal neither another accuser nor another defender.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25202.html'
source_title='Commentary on Romans'
