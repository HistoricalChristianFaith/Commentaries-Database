[[commentary]]
quote='''
He calls Himself the true bread not because the manna was false, but because it was an image and a shadow, and not the truth itself. For the Only-begotten Son of God, having become Man, is in the proper sense "Manna," an astonishing word and hearing. Manna means: "What is this?" For the Hebrews, each one having seen it fallen in abundance around his tent, struck by the extraordinariness and strangeness of the sight, asked one another: what is this? And the Lord, the Son of God, having become Man, is Himself the Manna that astonishes all, so that each one says in bewilderment: what is This? How is He both the Son of God and the Son of Man? How from two opposite natures is there one Person? What is this Mystery?
So this Bread, being Life by nature, as the Son of the living Father, does what is proper to Him: He gives life to all things. Just as earthly bread sustains the weak nature of the flesh and does not allow it to decompose, so also Christ by the operation of the Spirit gives life to the soul, and indeed sustains even the body itself in incorruption. For through Christ the resurrection from the dead and the incorruption of bodies have been granted to human nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John'
