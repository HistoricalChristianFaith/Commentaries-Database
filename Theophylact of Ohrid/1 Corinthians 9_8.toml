[[commentary]]
quote='''
That is, do I confirm this only by human examples, and have no testimony from Scripture? I can prove that this is also pleasing to God; the Law commands the same thing, which is not from men, but from God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%25209.html'
source_title='Commentary on 1 Corinthians'
