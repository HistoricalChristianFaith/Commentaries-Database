[[commentary]]
quote='''
He Who gave the greater thing, namely the soul, will He not also give food? He Who gave the body, will He not also give clothing? Then He proves this by the example of the ravens.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'
