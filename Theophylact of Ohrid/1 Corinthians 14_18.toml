[[commentary]]
quote='''
Lest they think that he disparages this gift because he himself does not possess it, he says: I speak in tongues more than all of you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Corinthians%2FChapter%252014.html'
source_title='Commentary on 1 Corinthians'
