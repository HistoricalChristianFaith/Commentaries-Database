[[commentary]]
quote='''
Let your light so shine before men, that they may see your good works, and glorify your Father Who is in heaven. He did not say, "You must display your virtue," for that is not good; but rather He said only, "Let it shine," so that even your enemies will marvel and glorify not you, but your Father. If we practice virtue, we must practice it for the glory of God, and not for our own glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
