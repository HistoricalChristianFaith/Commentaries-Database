[[commentary]]
quote='''
Many, He says, think that those who die for the truth are abandoned by God; but do not think so. You will die not because you will supposedly be abandoned by Me. For if not one of the sparrows, which are sold cheaply, is forgotten by God, how much more should your death not be forgotten, My friends, as though I do not care for you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Or these five senses are sold for two farthings, that is, the New and Old Testament, and are therefore not forgotten by God. Of those whose senses are given up to the word of life that they may be fit for the spiritual food, the Lord is ever mindful.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
