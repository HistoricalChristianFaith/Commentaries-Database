[[commentary]]
quote='''
"Whoever believes," and this alone is not enough, but also "is baptized," for whoever has believed but has not been baptized and still remains a catechumen, that one is not yet saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
It goes on: He that believeth and is baptized shall be saved. For it is not enough to believe, for he who believeth and is not baptized, but is a catechumen, has not yet attained to perfect salvation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
