[[commentary]]
quote='''
But lest they think he was accusing the Jews himself, he brought forward the prophet Isaiah as their accuser, setting forth two charges against them. For they not only offend God themselves, but also lead others to do the same, and not only do they not teach others to live according to the law, but they even teach the opposite—they teach others to blaspheme God, which is contrary to the law; for those who see their corruption say: is it these whom God should love? Can a God who loves such people truly be God?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25202.html'
source_title='Commentary on Romans'
