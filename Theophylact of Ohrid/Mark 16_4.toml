[[commentary]]
quote='''
But while they were pondering this, the Angel rolled away the stone, though the women did not perceive it. So too Matthew says that the Angel rolled away the stone after the women had arrived. But Mark was silent about this, because Matthew had already said by whom the stone was rolled away.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Commentary on Mark'
