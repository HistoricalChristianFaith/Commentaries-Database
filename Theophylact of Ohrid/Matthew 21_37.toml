[[commentary]]
quote='''
Later the Son of God was sent and He appeared in the flesh. He said, "They will reverence My Son," not unaware that they would kill Him, but signifying what ought to be. For, He says, they ought to honor the dignity of the Son even if they had killed the servants.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
