[[commentary]]
quote='''
Above he said: "was it not against those who sinned," but now: "the disobedient." He seems to be alluding to such believers from among the Hebrews, because many of them fell into other transgressions as well, besides faintheartedness and unbelief in the future.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%25203.html'
source_title='Commentary on Hebrews'
