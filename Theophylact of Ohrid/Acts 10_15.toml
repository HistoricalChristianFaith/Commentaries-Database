[[commentary]]
quote='''
"Again a voice came to him: 'What God has cleansed, do not call unclean.'" Apparently, the voice is addressed to Peter, but in the meantime everything is being said to the Jews. Because if this teacher endures reproach, then all the more do they deserve it. But God, who traced the image of His Church, said that she should not consider anything unclean for herself. Because everything is clean for a person that he receives with thanksgiving and the blessing of God. But if here there was contained a parabolic indication concerning the calling of the nations, so as not to consider those who have uncircumcised foreskin as defiled and unclean, still Peter's speech contained an indication not about people, but about animals forbidden by the law of Moses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252010.html'
source_title='Commentary on Acts'
