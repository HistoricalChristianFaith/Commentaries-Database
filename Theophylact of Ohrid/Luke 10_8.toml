[[commentary]]
quote='''
"Eat," He says, "and drink what they have," that is, whatever they set before you, and even if it be little and poor, do not demand more. Accept food in place of a reward, that is, do not seek to receive food and payment separately, but accept the food itself as your reward. See how He makes His disciples firm against poverty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke'
