[[commentary]]
quote='''
The divine teaching "is like leaven, which a woman," that is, human nature, "took and hid in three measures of meal," that is, in body, soul, and spirit, so that all was sanctified, as the blessed Paul says (1 Tim. 4:5), and became one lump of dough through communion with the Holy Spirit.
By the woman you may understand the soul, and by the three measures its three powers: the mind, the heart, and the will. Whoever hides the word of God in these powers will make them entirely spiritual, so that neither will the mind doubt the teaching, nor will the heart and will strive toward what is unreasonable, but they will be leavened and become like the Word of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Or, for the woman you must understand the soul; but the three measures, its three parts, the reasoning part, the affections, and the desires. If then any one has hidden in these three the word of God, he will make the whole spiritual, so as not by his reason to lie in argument, nor by his anger or desire to be transported beyond control, but to be conformed to the word of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
