[[commentary]]
quote='''
And when they had lifted up their eyes, they saw no man, save Jesus only. He is seen to be alone, so that you will not imagine that the voice was for Moses or Elijah; indeed, the voice was for Christ, as He is the Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
