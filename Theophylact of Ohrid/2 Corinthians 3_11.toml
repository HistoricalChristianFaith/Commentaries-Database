[[commentary]]
quote='''
He presents another syllogism. If the law that was ceasing and subject to abolition was given in glory, then how much more shall the law that is unshakeable and eternal – the New Testament – be in glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%25203.html'
source_title='Commentary on 2 Corinthians'
