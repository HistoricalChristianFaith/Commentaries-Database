[[commentary]]
quote='''
Then there were brought unto Him little children, that He should put His hands on them, and pray: and the disciples rebuked them. But Jesus said, Let the little children come unto Me and forbid them not: for of such is the kingdom of heaven. Mothers were bringing their children to be blessed by the touch of His hands. But they were crowding in towards Him in an unruly manner, which is why the disciples forbade them. The disciples also thought that bringing children to Him diminished His dignity as Teacher and Master. Christ therefore shows that He especially accepts the guilelessness of a little child, saying, "Let the little children come unto Me, for of such is the kingdom of heaven." He does not say, "of these," but "of such," that is, the kingdom of heaven belongs to those who have simplicity, guilelessness and innocence. And if one is teaching and some draw near asking childish questions, let the teacher accept them and not forbid them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
