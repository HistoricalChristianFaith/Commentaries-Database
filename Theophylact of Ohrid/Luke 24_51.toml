[[commentary]]
quote='''
And He began "to be carried up into heaven." Elijah ascended "into heaven" (4 Kings 2:11), for it seemed that he was carried up as if into heaven; but the Savior ascended into heaven itself as the forerunner of all, so that with His holy flesh He might appear before the face of God and seat it with the Father (Heb. 9:24): and now our nature in Christ receives worship from every angelic power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
And Elias indeed was seen, as it were, to be taken up into heaven, but the Saviour, the forerunner of all, Himself ascended into heaven to appear in the Divine sight in His sacred body; and already is our nature honoured in Christ by a certain Angelic power.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
