[[commentary]]
quote='''
Why does the rich man address his request not to Lazarus, but to Abraham? Perhaps he was ashamed, or perhaps he thought that Lazarus remembered his evil, and judged Lazarus by his own deeds. If I (he might have thought), enjoying such happiness, despised him while he was oppressed by such misfortune, and did not give him even crumbs, then all the more will he, whom I despised, remember the evil and not agree to show me mercy. This is why he addresses his words to Abraham, thinking, probably, that the patriarch did not know how things had been. And what does Abraham say?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
He does not however direct his words to Lazarus, but to Abraham, because he was perhaps ashamed, and thought Lazarus would remember his injuries; but he judged of him from himself. Hence it follows, And he cried and said.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
