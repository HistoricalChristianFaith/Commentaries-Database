[[commentary]]
quote='''
Here the apostle addresses the teachers. Not with severity, he says, or with haughtiness make reproofs, but with meekness "admonish." For, having fallen into despair, a person becomes more insolent when given a harsh reproof. "The unruly" are those who act contrary to what God has ordained. God has appointed to each his own rank; the one who transgresses it is unruly. The drunkard, the reviler, the covetous person, and all who sin live in a disorderly manner. Fainthearted is he who does not endure temptation. He is precisely the one sown on the rock (Matt. 13:5). Thus, he too is in need of support. "Support the weak" — that is, support the weak in faith, as he says in another place: "Him that is weak in the faith receive" (Rom. 14:1). "Be patient with everyone" — and to the disorderly, and the fainthearted, and the weak. For this is the most fitting means for a teacher, capable of converting all, even the most coarse.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Thessalonians%2FChapter%25205.html'
source_title='Commentary on 1 Thessalonians'
