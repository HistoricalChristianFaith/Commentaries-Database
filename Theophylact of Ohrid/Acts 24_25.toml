[[commentary]]
quote='''
"Felix became afraid." Such was the power contained in Paul's words that even the governor was frightened.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252024.html'
source_title='Commentary on Acts'
