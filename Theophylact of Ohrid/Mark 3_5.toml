[[commentary]]
quote='''
Note also the word "was restored"; there was a time when we had our hands, or active powers, healthy — namely, when the transgression had not yet been committed; but from the time our hand reached out for the forbidden fruit, it became withered with respect to the doing of good. But it will again return to its former healthy state when we stand in the midst of the virtues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'
