[[commentary]]
quote='''
And there is an example of this close at hand: "For even the Son of Man did not come to be served, but to serve and to give His soul as a ransom for many." And this is more than service. Indeed, not only to serve but also to die for the one whom you serve — what could be higher and more wondrous than this? But such service and humility of the Lord was exaltation and glory both for Himself and for all. For before the Incarnation He was known to Angels alone, but having become man and endured the Crucifixion, He not only has that glory (the heavenly one) but also received another, and reigns over the whole universe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Which is a greater thing than to minister. For what can be greater or more wonderful than that a man should die for him to whom he ministers? Nevertheless, this serving and condescension of humility was His glory, and that of all; for before He was made man, He was known only to the Angels; but now that He has become man and has been crucified, He not only has glory Himself, but also has taken up others to a participation in His glory, and ruled by faith over the whole world.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
