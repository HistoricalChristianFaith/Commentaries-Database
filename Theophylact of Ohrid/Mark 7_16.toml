[[commentary]]
quote='''
To the crowd the Lord spoke in this manner not quite clearly, which is why He also remarked: "he who has ears to hear, let him hear," that is: let him who understands, understand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Commentary on Mark'
