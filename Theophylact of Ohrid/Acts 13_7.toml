[[commentary]]
quote='''
What is remarkable about the proconsul is that, having already been previously captivated by the sorcerer's magic, he still desired to listen to the apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
