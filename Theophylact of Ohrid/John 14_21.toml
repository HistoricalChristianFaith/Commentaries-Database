[[commentary]]
quote='''
As if He said, Ye think that by sorrowing, as ye do, for my death ye prove your affection; but I esteem the keeping of My commandments the evidence of love. And then He shows the privileged state of one who loves: And he that loveth Me shall be loved of My Father, and I will love him.

Or, as after the resurrection He was to appear to them in a body more assimilated to His divinity, that they might not take Him then for a spirit, or a phantom, He tells them now beforehand not to have misgivings upon seeing Him, but to remember that He shows Himself to them as a reward for their keeping His commandments; and that therefore they are bound ever to keep them, that they may ever enjoy the sight of Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
With such words, as we said above, He calms their sorrow, teaching them that the one who loves Him is not the one who grieves over His death — which grief they themselves were experiencing — but the one who keeps His commandments and precepts about not being attached to the present life, but laying down one's life for God and for the good. He speaks to them as if to say: "You think that you grieve over My death out of love, but I, on the contrary, place the sign of love in your not grieving." That such is the thought in His words is evident from what He says a little further on: "If you loved Me, you would rejoice that I am going to My Father" (John 14:28). So then, whoever loves Me has My commandments, and not only has them but also keeps them, lest the thief — the devil — should come and steal this treasure, for careful vigilance is needed so as not to lose them.

He who loves Me, what reward shall he receive? "He shall be loved by My Father, and I will love him, and will manifest Myself to him."

Why did He say this: "I will manifest Myself to him"? Since after the resurrection He was to appear to them in a body of divine form, so that they would not take Him for a spirit and a phantom, He foretells this to them, so that when they saw Him then, they would not remain in unbelief, but would remember that He had foretold this to them, and that He appears to them for keeping His commandments, so that they would always strive to keep them, and He would always appear to them. The mystery of the resurrection is great, and they would have accepted it with difficulty; therefore He prepares them, saying that He will appear to them Himself. For after the resurrection He also ate for the very reason that they would not consider Him a phantom — which was precisely the thought Judas had now.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
