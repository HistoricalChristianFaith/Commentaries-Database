[[commentary]]
quote='''
After this He teaches them that "thus it was necessary for Christ to suffer." How then is it "thus"? On the wood of the Cross. Since destruction entered through a tree, corruption also had to be destroyed through a tree, and the delight of the tree had to be abolished by the Lord, who unconquerably endured the sufferings on the tree.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
But He taught them by His words; for it follows, And said unto them, Thus it is written, and thus it behoved Christ to suffer, that is, by the wood of the Cross.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
