[[commentary]]
quote='''
And straightway one of them ran, and took a sponge, and filled it with vinegar, and put it on a reed, and gave Him to drink. The rest said, Let be, let us see whether Elijah will come to save Him. The multitude did not understand His cry, being uncouth and ignorant of the prophets, and thought that He was calling upon Elijah. For not all the Jews knew the prophets, just as now not all Christians, perhaps, know the Gospel. They gave Him vinegar to drink so that He might die more quickly, before Elijah could come to help Him. This is why the others say, "Let be, let us see whether Elijah will come to save Him;" that is, "Do not make Him die, for we want to know if Elijah will help Him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
