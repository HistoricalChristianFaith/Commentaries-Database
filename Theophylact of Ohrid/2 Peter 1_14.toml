[[commentary]]
quote='''
And in explanation of the reason for the constant reminder, he added that he knows that the dissolution of his body will soon follow.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Peter%2FChapter%25201.html'
source_title='Commentary on 2 Peter'
