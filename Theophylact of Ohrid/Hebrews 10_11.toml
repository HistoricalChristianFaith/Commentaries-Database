[[commentary]]
quote='''
Thus, to stand is the distinction of one who serves; but to sit, as Christ does, is the distinction of the one who is served.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Hebrews%2FChapter%252010.html'
source_title='Commentary on Hebrews'
