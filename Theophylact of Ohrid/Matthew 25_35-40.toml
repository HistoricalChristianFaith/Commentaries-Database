[[commentary]]
quote='''
By "the least brethren" He means either His own disciples or, simply, all the poor. For every poor man is Christ's brother for the very reason that Christ, too, spent His life in poverty. See also God's righteousness, how He acclaims the saints; and see the good disposition of their mind, how they deny, with befitting modesty, that they have cared for Him. But the Lord accepts as for Himself the things that were done for the poor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
