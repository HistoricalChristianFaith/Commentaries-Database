[[commentary]]
quote='''
"And one of those who stood by" — this was Peter. Mark concealed his name so that no one would think he was praising Peter, his teacher, for his zeal for Christ. But Peter, fittingly, cut off the ear of the high priest's servant: this indicates that the Jews were a disobedient, rebellious, and inattentive people with regard to the Scriptures. Otherwise, if they had ears attentive to the Scriptures, they would not have crucified the Lord of glory. And Peter struck not some other servant, but the high priest's, for the high priests were the first to disobey the Scriptures, having become slaves of envy and self-love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Mark conceals his name, lest he should seem to be praising his master for his zeal for Christ. Again, the action of Peter points out that they were disobedient and unbelieving, despising the Scriptures; for if they had had ears to hear the Scriptures, they would not have crucified the Lord of glory. But he cut off the ear of a servant of the High Priest, for the Chief Priests especially passed over the Scriptures, like disobedient servants.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
