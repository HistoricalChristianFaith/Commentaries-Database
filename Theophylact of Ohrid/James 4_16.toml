[[commentary]]
quote='''
The proud person and pride occupy themselves with unreal things, which is why the proud one is so called — meaning "one living in delusion or deception." All such boasting is evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520James%2FChapter%25204.html'
source_title='Commentary on James'
