[[commentary]]
quote='''
"And nothing is hidden that will not be revealed." Whatever anyone does in secret—whether good or evil—will all be made manifest both here and especially in the age to come. What was more hidden than God? Yet even He was manifested in the flesh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For each of us, whether he have done good or evil, is brought to light in this life, much more in that which is to come. For what can be more hidden than God, nevertheless He Himself is manifested in the flesh.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
