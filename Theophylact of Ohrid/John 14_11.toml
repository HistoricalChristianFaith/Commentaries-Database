[[commentary]]
quote='''
"Believe that I am in the Father and the Father is in Me," that is, you who hear of the Father and the Son should not seek any other proof of Their kinship in essence. But if this is not sufficient for you as proof of consubstantiality and co-equal honor, and that the Father is present in My essence and I in the essence of the Father, then at least believe Me on account of the works, for the works are God's.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John'
