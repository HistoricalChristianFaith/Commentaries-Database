[[commentary]]
quote='''
But if death resulted from it, the commandment is not to blame for this: for sin deceived me and put me to death through the commandment, that is, the inclination toward the worse and the corrupt and sin-loving heart, or rather — pleasure. For if there were no commandment showing sin, then I would not have been regarded as one committing sin, nor would I have been subject to punishment; for the word "put to death" should be understood in both senses, both of sin and of punishment, as was also said above concerning the word "I died."
The entire essence of the apostle's thought is this: when there is no law, sin is not imputed; but when the law came and was transgressed, sin was revealed and came to life, so that through the transgression of the commandment, sin—that is, the exposure and condition of sin—emerges, whereas before it neither existed nor was imputed, because there was no law either. Therefore the law in itself was not the cause of sin; but neither could it deliver from sin, so that because of this weakness of the law we came to have need of grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Romans%2FChapter%25207.html'
source_title='Commentary on Romans'
