[[commentary]]
quote='''
Since not all Hebrews were Israelites (for the Moabites and Ammonites also passed themselves off as Israelites), purifying the superiority of his lineage, he adds the following as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%252011.html'
source_title='Commentary on 2 Corinthians'

[[commentary]]
quote='''
Referring to Isaac.
'''
