[[commentary]]
quote='''
So, he says, "laying aside all malice and all guile, and hypocrisy, and envy, and all evil speaking." With these few words he embraces the entire multitude and variety of evil. For those who have been reborn to an incorruptible life must not fall into the snares of malice and prefer the non-existent to the real. For evil is not a substance, but consists in the error of a created substance. And there is a great difference between life itself and what merely accompanies it. They, he says, must show themselves free from guile and hypocrisy and envy and all evil speaking. For guile and evil speaking are far from the truth and from the teaching proclaimed to you. Guile seeks the destruction of the one it deceives; hypocrisy thrives on disparity with reality, while the saving teaching with which you have been instructed thrives on the opposite. And what place is there in you for envy and evil speaking — in you who, being bound by the inseparable bond of brotherly love, can suffer no harm from anyone who would separate you? That envy and evil speaking are the cause of strife and mutual hatred is unknown only to one who does not know the sorrowful history of Cain, who through envy broke the bond of brotherhood and then fell into guile, hypocrisy, and murder (Gen. 4). And that the envious person is not free from evil speaking can be confirmed by the example of Joseph's brothers, who slandered him greatly to their father (Gen. 37).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25201%2520Peter%2FChapter%25202.html'
source_title='Commentary on 1 Peter'
