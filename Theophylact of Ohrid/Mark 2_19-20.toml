[[commentary]]
quote='''
But He said to them: now I, the Bridegroom, am with them, and therefore they ought to rejoice, not fast; but when I am taken from this life, then, being subjected to afflictions, they will both fast and grieve. He calls Himself the "Bridegroom" not only because He betrothed to Himself virgin souls, but also because the time of His first coming is not a time of weeping and sorrow for those who believe in Him, nor a burdensome time, but one that gives us rest through baptism without the works of the law. Indeed, what labor is it to be baptized? And yet in this easy act we find salvation. The "sons of the bridechamber" are the apostles, because they were deemed worthy of the joy of the Lord and were made partakers of every heavenly good and consolation. You may also understand it this way: that every person, when he practices virtue, is a "son of the bridechamber," and as long as he has the Bridegroom Christ with him, he does not fast, that is, he does not perform works of repentance; for why should he repent who does not fall? But when the Bridegroom Christ is taken from him, that is, when he falls into sin, then he begins to fast and repent, in order to heal the sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25202.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
He also calls Himself a bridegroom, not only as betrothing to Himself virgin minds, but because the time of His first coming is not a time of sorrow, nor of sadness to believers, neither does it bring with it toil, but rest. For it is without any works of the law, giving rest by baptism, by which we easily obtain salvation without toil. But the sons of the nuptials or of the Bridegroom are the Apostles; because they, by the grace of God, are made worthy of every heavenly blessing, by the grace of God, and partakers of every joy.

We must also understand, that every man whose works are good is the son of the Bridegroom; he has the Bridegroom with him, even Christ, and fasts not, that is, does no works of repentance, because he does not sin: but when the Bridegroom is taken away by the man's falling into sin, then he fasts and is penitent, that he may cure his sin.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
