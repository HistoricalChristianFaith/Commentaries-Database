[[commentary]]
quote='''
John does not simply testify, but denies the very glory that everyone attributed to him. It is not the same thing to refuse honor when no one offers it, and to do so when everyone bestows it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252013.html'
source_title='Commentary on Acts'
