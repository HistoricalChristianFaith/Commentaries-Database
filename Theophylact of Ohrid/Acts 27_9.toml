[[commentary]]
quote='''
I think Paul is speaking here of the Jewish fast, since he had departed a long time after Pentecost, so that he arrived at the borders of Crete almost by winter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252027.html'
source_title='Commentary on Acts'
