[[commentary]]
quote='''
Knowing, he says, that you love him and are grieved by his illness, he therefore desires to see you, in order to free you from the sorrow that came upon you because of his illness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Philippians%2FChapter%25202.html'
source_title='Commentary on Philippians'
