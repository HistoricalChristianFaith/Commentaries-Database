[[commentary]]
quote='''
And that He also chooses Judas as an apostle, from this we should understand that God does not reject a person who is going to do evil on account of his future evil deed, but for his present virtue deems him worthy of honor, even if he should afterwards become a wicked man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
Whom he reckons amongst the Apostles, that we may learn that God does not repel any man for wickedness, which is future, but counts him worthy on account of his present virtue.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'
