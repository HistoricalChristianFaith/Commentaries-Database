[[commentary]]
quote='''
And that He also chooses Judas as an apostle, from this we should understand that God does not reject a person who is going to do evil on account of his future evil deed, but for his present virtue deems him worthy of honor, even if he should afterwards become a wicked man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Commentary on Mark'
