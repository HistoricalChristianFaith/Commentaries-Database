[[commentary]]
quote='''
"Then Barnabas went to Tarsus to look for Saul." Barnabas was a very good and simple and condescending man. He sought, says Luke, a fighter, a commander.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Acts%2FChapter%252011.html'
source_title='Commentary on Acts'
