[[commentary]]
quote='''
They also cast lots for His garments in mockery of Him, that is, dividing among themselves what were, as it were, royal garments, when in fact they were poor ones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
But their casting lots for His garments was also meant as an insult, as though they were dividing the clothes of a king; for they were coarse and of no great value. And John's Gospel shows this more clearly, for the soldiers, though they divided every thing else into four parts, according to their number, cast lots for the coat, which was without seam, woven from the top throughout. (John 19:23)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
