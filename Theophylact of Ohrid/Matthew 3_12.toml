[[commentary]]
quote='''
His winnowing fan is in His hand. Do not think, if you are baptized by Him and then remain an unrepentant sinner, that He will forgive you. For He also has a winnowing fan, that is, judgement and examination. He will clean His threshing floor, namely, the Church, which holds many who are baptized, just as the threshing floor holds all the crop. But some of those who are baptized are chaff, those who are light-minded and moved about by the evil spirits, while others are the wheat, who bring benefit to others and nourish them with teachings and deeds. And gather the wheat into His granary, but He will burn up the chaff with unquenchable fire. That fire is unquenchable. Therefore Origen is babbling nonsense when he says that there will be an end to hell.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
