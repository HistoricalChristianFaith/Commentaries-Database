[[commentary]]
quote='''
The disciples forgot to take bread by a special dispensation of God, so that after Christ's stern rebuke they would become wiser and come to know the power of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Commentary on Mark'
