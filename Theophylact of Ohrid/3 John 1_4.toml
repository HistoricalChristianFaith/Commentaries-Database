[[commentary]]
quote='''
The expression μειζοτέραν is not in accord with the elegance of the Greek language; for to the comparative degree (μείζονα) yet another comparative suffix (-τερ) has been added.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25203%2520John%2F3%2520John.html'
source_title='Commentary on 3 John'
