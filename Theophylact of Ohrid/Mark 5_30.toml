[[commentary]]
quote='''
Power goes out from Christ not in such a way as to change place; on the contrary, it is communicated to others and at the same time remains in Christ without diminution, just as the lessons of teaching both remain with the teachers and are imparted to the students.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'

[[commentary]]
quote='''
For the Lord wished to declare the woman, first to give His approbation to her faith, secondly to urge the chief of the synagogue to a confident hope that He could thus cure his child, and also to free the woman from fear.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
