[[commentary]]
quote='''
Power goes out from Christ not in such a way as to change place; on the contrary, it is communicated to others and at the same time remains in Christ without diminution, just as the lessons of teaching both remain with the teachers and are imparted to the students.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Commentary on Mark'
