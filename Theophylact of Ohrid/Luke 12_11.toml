[[commentary]]
quote='''
Our weakness is of two kinds: we flee from the confession of faith either out of fear of punishments or out of simplicity and inability to give an answer for our faith. The fear of punishments the Lord healed with the words: "fear not them which kill the body." Now He heals the fear that comes from simplicity. Since few of the "wise after the flesh" (1 Cor. 1:26) believed, and the greater part were simple folk, He says: do not be afraid, you who are uneducated and simple, and do not worry how or what to answer when examined by a ruler, or what to say on another occasion — you will have a different manner of speech.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
Since then our weakness is twofold, and either from fear of punishment we shun martyrdom, or because we are ignorant and can not give a reason of our faith, he has excluded both; the fear of punishment in that He said, Fear not them which kill the body, but the fear of ignorance, when He said, Take no thought how or what ye shall answer, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
