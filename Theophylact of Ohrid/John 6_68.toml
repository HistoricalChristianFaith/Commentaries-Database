[[commentary]]
quote='''
Peter, having a tender love for Him and for the brethren, answers on behalf of the entire company of the apostles. He did not say "Lord! to whom shall I go?" and "I have known and believed," but "to whom shall we go?" and so forth. He says that the Lord has the words of eternal life, because he had heard Him say: "I will raise up the one who believes in Me, and he will have eternal life." For they had already accepted the truth of the resurrection and all the teaching. Therefore, the cause of the offense was not the words of Christ, but the inattentiveness, negligence, and ingratitude of the listeners. For these twelve also heard the same things, and yet were not offended, but remained faithful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title="Commentary on John"
