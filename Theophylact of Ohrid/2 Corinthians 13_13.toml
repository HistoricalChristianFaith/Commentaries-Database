[[commentary]]
quote='''
The present he unites with a kiss, the absent with a greeting, but even here the lips are joined, because the greeting proceeds from them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%25202%2520Corinthians%2FChapter%252013.html'
source_title='Commentary on 2 Corinthians'
