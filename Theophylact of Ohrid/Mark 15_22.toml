[[commentary]]
quote='''
There is a tradition that has come down to us from the holy fathers that Adam was buried on Golgotha. Here the Lord is also crucified, He who heals the fall and death of Adam, so that in the same place the destruction of death would follow where death had its beginning.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Commentary on Mark'
