[[commentary]]
quote='''
The leper was prudent and believed; therefore he did not say: if You ask God; but believing in Him as God, he said: "if You will." Christ touches him as a sign that nothing is unclean. The Law forbade touching a leper as unclean; but the Savior, wishing to show that nothing is unclean by nature, that the requirements of the Law must be abolished, and that they have power only over men, touches the leper — whereas even Elisha so feared the Law that he did not even wish to see Naaman, who was leprous and asking for healing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title="Commentary on Mark"

[[commentary]]
quote='''
For he said not, If thou wilt, pray unto God, but, If thou wilt, as thinking Him very God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title="Catena Aurea by Aquinas"
