[[commentary]]
quote='''
Saying that "the whole multitude of disciples" praised God, Luke calls disciples all the followers of Jesus in general, not only the twelve and not the seventy, but all the people who, either being in need of miracles or at times being carried along by His teaching, followed Jesus. Among them naturally there were also children, as the other Evangelists relate (Matt. 21:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophylact%2520of%2520Ohrid%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke'

[[commentary]]
quote='''
He calls by the name of disciples not only the twelve, or the seventy-two, but all who followed Christ, whether for the sake of the miracles, or from a certain charm in His teaching, and to them may be added the children, as the other Evangelists relate. Hence it follows, For all the mighty works which they had seen.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
