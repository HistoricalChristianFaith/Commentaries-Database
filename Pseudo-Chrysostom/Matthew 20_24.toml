[[commentary]]
quote='''
But as the two had asked carnally, so now the ten are grieved carnally. For as to seek to be above all is blame-worthy, so to have another above us is mortifying to our vanity.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
