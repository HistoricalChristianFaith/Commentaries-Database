[[commentary]]
quote='''
Or; Into the sea, that is, into the world where the waters are salt, i. e. the people are wicked.

That is, nigh to the world; for if a man lives nigh to the world, he cannot preserve in himself the fruit of righteousness.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
