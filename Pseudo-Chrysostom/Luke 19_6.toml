[[commentary]]
quote='''
(Hom. de caec. et Zacc.) Observe the gracious kindness of the Saviour. The innocent associates with the guilty, the fountain of justice with covetousness, which is the source of injustice. Having entered the publican's house, He suffers no stain from the mists of avarice, but disperses them by the bright beam of His righteousness.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
