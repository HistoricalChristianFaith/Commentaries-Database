[[commentary]]
quote='''
He came to Him and besought Him, saying, Lord, my servant lieth at home sick of the palsy, and is grievously afflicted. Mark the goodness of the centurion, who for the health of his servant was in so great haste and anxiety, as though by his death he should suffer loss, not of money, but of his well being. For he reckoned no difference between the servant and the master; their place in this world may be different, but their nature is one. Mark also his faith, in that he said not, Come and heal him, because that Christ who stood there was present in every place; and his wisdom, in that he said not, Heal him here on this spot, for he knew that He was mighty to do, wise to understand, and merciful to hearken, therefore he did but declare the sickness, leaving it to the Lord, by His merciful power to heal. And he is grievously afflicted; this shows how he loved him, for when any that we love is pained or tormented, though it be but slightly, yet we think him more afflicted than he really is.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
