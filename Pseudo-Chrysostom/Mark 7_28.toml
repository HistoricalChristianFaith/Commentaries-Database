[[commentary]]
quote='''
(Vict. Ant. e Cat. in Marc.) For the woman did not take it ill, but with much reverence assented to what the Lord had said. Wherefore it goes on, And she answered and said unto him, Truth, Lord, but the dogs under the table eat of the children's crumbs.

(Vict. Ant. e Cat. in Marc.) Her placing herself therefore in the rank of dogs is a mark of her reverence; as if she said, I hold it as a favour to be even in the position of a dog, and to eat not from another table, but from that of the Master himself.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
