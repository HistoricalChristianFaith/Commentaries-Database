[[commentary]]
quote='''
(Vict. Ant. e Cat. in Marc.) Not that He required prayer; for it was He who Himself received the prayers of men; but He did this by way of an economy, and became to us the model of good works.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title='Catena Aurea by Aquinas'
