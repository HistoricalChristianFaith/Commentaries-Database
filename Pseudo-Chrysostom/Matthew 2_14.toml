[[commentary]]
quote='''
But why into Egypt? The Lord, who keepeth not His anger for ever, remembered the woes He had brought upon Egypt, and therefore sent His Son thither, and gives it this sign of great reconciliation, that with this one remedy He might heal the ten plagues of Egypt, and the nation that had been the persecutor of this first-born people, might be the guardian of His first-born Son. As formerly they had cruelly tyrannized, now they might devoutly serve; nor go to the Red Sea to be drowned, but be called to the waters of baptism to receive life.

The straitness of every persecution may be called night—the relief from it in like manner, day.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
