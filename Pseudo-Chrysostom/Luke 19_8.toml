[[commentary]]
quote='''
(Hom. de caec. et Zacc.) And so it happened here, for the publican was converted, and lived a better life. Zacchaeus stood, and said unto the Lord, Behold, Lord, the half of my goods I give to the poor; and if I have defrauded any man, I restore him fourfold. Behold here is a marvel: without learning he obeys. And as the sun pouring its rays into a house enlightens it not by word, but by work, so the Saviour by the rays of righteousness put to flight the darkness of sin; for the light shineth in darkness. Now every thing united is strong, but divided, weak; therefore Zacchaeus divides into two parts his substance. But we must be careful to observe, that his wealth was not made up from unjust gains, but from his patrimony, else how could he restore fourfold what he had unjustly extorted. He knew that the law ordered what was wrongly taken away to be restored fourfold, that if the law deterred not, a man's losses might soften him. Zacchaeus waits not for the judgment of the law, but makes himself his own judge.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
