[[commentary]]
quote='''
(ut sup.) But the wicked steward aptly contrived the remission of debts, to provide for himself an escape from his misfortunes among his fellow-servants; for it follows, I am resolved what to do, that when I am put out of the stewardship, they may receive me into their houses. For as often as a man, perceiving his end approaching, lightens by a kind deed the load of his sins, (either by forgiving a debtor his debts, or by giving abundance to the poor,) dispensing those things which are his Lord's, he conciliates to himself many friends, who will afford him before the judge a real testimony, not by words, but by the demonstration of good works, nay moreover will provide for him by their testimony a resting-place of consolation. But nothing is our own, all things are in the power of God. Hence it follows, So he called every one of his Lord's debtors unto him, and said unto the first, How much owest thou unto my Lord? And he said, A hundred casks of oil.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
