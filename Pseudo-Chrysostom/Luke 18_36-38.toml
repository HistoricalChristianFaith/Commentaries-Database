[[commentary]]
quote='''
(Hom. de caeco et Zacchaeo) There was a great multitude gathered round Christ, and the blind man indeed knew Him not, but felt a drawing towards Him, and grasped with his heart what his sight embraced not. As it follows, And when he heard the multitude passing by, he asked what it was. And those that saw spoke indeed according to their own opinion. And they told him that Jesus of Nazareth passeth by. But the blind man cried out. He is told one thing, he proclaims another; for it follows, And he cried out, saying, Jesus, thou Son of David, have mercy on me. Who taught thee this, O man? Hast thou that art deprived of sight read books? Whence then knowest thou the Light of the world? Verily the Lord giveth sight to the blind. (Ps. 146:8.)
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'
