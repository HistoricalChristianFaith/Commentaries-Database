[[commentary]]
quote='''
(Hom. de Div.) But sickness has some comfort if it receives help. How great then was the punishment in that body, in which with such wounds he remembered not the pain of his sores, but only his hunger; for it follows, desiring to be fed with the crumbs, &c. As if he said, What thou throwest away from thy table, afford for alms, make thy losses gain.

(ut sup.) Those sores which no man deigned to wash and dress, the beasts tenderly lick.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
