[[commentary]]
quote='''
(Vict. Ant. e Cat. in Marc.) He at the same time also groaned, as taking our cause upon Himself, and pitying human nature, seeing the misery into which it had fallen.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
