[[commentary]]
quote='''
But who loves man is as who loves God; for man is God's image, wherein God is loved, as a King is honoured in his statue. For this cause this commandment is said to be like the first.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
