[[commentary]]
quote='''
In some places it is, He cured many; but here, He cured them, meaning 'all;' as a new physician first entering a town cures all who come to him. to beget a good opinion concerning himself.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
