[[commentary]]
quote='''
Also the other Prophets were sent to announce Christ's coming, but John to prepare His way, as it follows, who shall make ready thy way before thee;
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
