[[commentary]]
quote='''
Or, because his venerable conversation smote the hearts of sinners, as it follows, But the Publicans and harlots believed on him. Mark how the good life of the preacher gives its force to his preaching, so as to subdue unsubdued hearts. And ye, when ye had seen it, repented not afterward, that ye might believe him; as much as to say, They have done that which is more by believing on Him, ye have not even repented, which is less.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
