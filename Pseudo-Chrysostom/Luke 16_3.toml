[[commentary]]
quote='''
(ut sup.) But he whose wishes are on earth is troubled at his departing. Hence it is added of this steward, Then the steward said within himself, What shall I do, for my Lord taketh away from me the stewardship? I cannot dig, to beg I am ashamed. Weakness in action is the fault of a slothful life. For no one would shrink who had been accustomed to apply himself to labour. But if we take the parable allegorically, after our departure hence there is no more time for working; the present life contains the practice of what is commanded, the future, consolation. If thou hast done nothing here, in vain then art thou careful for the future, nor wilt thou gain any thing by begging. The foolish virgins are an instance of this, who unwisely begged of the wise, but returned empty. (Matt 25:8.) For every one puts on his daily life as his inner garment; it is not possible for him to put it off or exchange it with another.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
