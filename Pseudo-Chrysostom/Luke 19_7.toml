[[commentary]]
quote='''
(Hom. de caec. et Zacc.) But those who deal with biting words and reproaches, try to cast a slur upon the things which were done by Him; for it follows, And when they saw it, they all murmured, saying, That he was gone to be guest with a man that is a sinner. But He, though accused of being a wine-bibber and a friend of publicans, regarded it not, so long as He could accomplish His end. As a physician sometimes can not save his patients from their diseases without the defilement of blood.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
