[[commentary]]
quote='''
But afterwards turning their backs, they lied unto God, according to that in the Psalms, The sons of the strangers have lied unto me. (Ps. 18:44.) This is what is said, But he went not.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
