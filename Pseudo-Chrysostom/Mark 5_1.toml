[[commentary]]
quote='''
(Vict. Ant. e Cat. in Marc.) Nevertheless the exact reading contains neither Gadarenes, nor Gerasines, but Gergesenes. For Gadara is a city of Judæa, which has no sea at all about it; and Geraza is a city of Arabia, having neither lake nor sea near it. And that the Evangelists may not be thought to have spoken so manifest a falsehood, well acquainted as they were with the parts around Judæa, Gergese, from which come the Gergesenes, was an ancient city, now called Tiberias, around which is situated a considerable lake. It continues, And when he was come out of the ship, immediately there met him, &c.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
