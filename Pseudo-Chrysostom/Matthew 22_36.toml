[[commentary]]
quote='''
He who now enquires for the greatest commandment had not observed the least. He only ought to seek for a higher righteousness who has fulfilled the lower.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
