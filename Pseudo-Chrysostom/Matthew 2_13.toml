[[commentary]]
quote='''
He says not, 'the Mother and her young Child,' but, the young Child and His mother; for the Child was not born for the mother, but the mother prepared for the Child. How is this that the Son of God flies from the face of man? or who shall deliver from the enemy's hand, if He Himself fears His enemies? First; He ought to observe, even in this, the law of that human nature which He took on Him; and human nature and infancy must flee before threatening power. Next, that Christians when persecution makes it necessary should not be ashamed to fly.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
