[[commentary]]
quote='''
For the Gentiles from the beginning leaving God and his righteousness, and going over to idols and sins, seem to make answer in their thoughts, We will not do the righteousness of God.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
