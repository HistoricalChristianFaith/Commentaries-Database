[[commentary]]
quote='''
Yet He says not, Thou shalt not tempt me thy Lord God; but, Thou shalt not tempt the Lord thy God; which every man of God when tempted by the Devil might say; for whoso tempts a man of God, tempts God.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
