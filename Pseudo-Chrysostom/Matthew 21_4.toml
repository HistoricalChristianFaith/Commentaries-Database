[[commentary]]
quote='''
For the Prophet knowing the malice of the Jews, that they would speak against Christ when He went up to the Temple, gave them this sign beforehand, whereby they might know their King, Say ye to the daughter of Sion.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
