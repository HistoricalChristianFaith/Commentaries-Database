[[commentary]]
quote='''
Or, it points to the difference of punishment inflicted on sinners. Outer darkness being the deepest, inward darkness the lesser, as it were the outskirts of the place.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
