[[commentary]]
quote='''
For it were an unworthy thing that a believer should stand in his cause before an unbelieving judge. Or if one who is a believer, though (as he must be) a worldly man, though he should have reverenced you for the worthiness of the faith, sues you because the cause is a necessary one, you will lose the worthiness of Christ for the business of the world. Further, every lawsuit irritates the heart and excites bad thoughts; for when you see dishonesty or bribery employed against you, you hasten to support your own cause by like means, though originally you might have intended nothing of the sort.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
