[[commentary]]
quote='''
If, moreover, it chance that we go to a place in which there are no Christians, and it be important for us to stay there a few days, let us be "wise as serpents, and harmless as doves;" [Matthew 10:16] and let us "not be as the foolish, but as the wise," [Ephesians 5:15] in all the self-restraint of the fear of God, that God may be glorified in everything through our Lord Jesus Christ, through our chaste and holy behaviour. For, "whether we eat, or drink, or do anything else, let us do it as for the glory of God." [1 Corinthians 10:31] Let "all those who see us acknowledge that we are a blessed seed," "sons of the living God," in everything — in all our words in shamefastness, in purity, in humility, forasmuch as we do not copy the heathen in anything, nor are as believers like other men, but in everything are estranged from the wicked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FTwo%2520Epistles%2520on%2520Virginity%2FEpistle%25202.html'
source_title="Two Epistles on Virginity, Epistle 2"
