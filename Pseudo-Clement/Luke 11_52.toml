[[commentary]]
quote='''
"For when the rising of Christ was at hand for the abolition of sacrifices, and for the bestowal of the grace of baptism, the enemy, understanding from the predictions that the time was at hand, wrought various schisms among the people, that, if haply it might be possible to abolish the former sin, the latter fault might be incorrigible. The first schism, therefore, was that of those who were called Sadducees, which took their rise almost in the time of John. These, as more righteous than others, began to separate themselves from the assembly of the people, and to deny the resurrection of the dead, and to assert that by an argument of infidelity, saying that it was unworthy that God should be worshipped, as it were, under the promise of a reward. The first author of this opinion was Dositheus; the second was Simon. Another schism is that of the Samaritans; for they deny the resurrection of the dead, and assert that God is not to be worshipped in Jerusalem, but on Mount Gerizim. They indeed rightly, from the predictions of Moses, expect the one true Prophet; but by the wickedness of Dositheus they were hindered from believing that Jesus is He whom they were expecting. The scribes also, and Pharisees, are led away into another schism; but these, being baptized by John, and holding the word of truth received from the tradition of Moses as the key of the kingdom of heaven, have hid it from the hearing of the people. [Luke 11:52] Yea, some even of the disciples of John, who seemed to be great ones, have separated themselves from the people, and proclaimed their own master as the Christ. But all these schisms have been prepared, that by means of them the faith of Christ and baptism might be hindered."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Recognitions%2FBook%25201.html'
source_title="Recognitions (Book I)"

[[commentary]]
quote='''
For He alone is the true God, who is the God of the Jews; and for this reason our Lord Jesus Christ did not teach them that they must inquire after God, for Him they knew well already, but that they must seek His kingdom and righteousness, [Matthew 6:33] which the scribes and Pharisees, having received the key of knowledge, had not shut in, but shut out. [Luke 11:52] For if they had been ignorant of the true God, surely He would never have left the knowledge of this thing, which was the chief of all, and blamed them for small and little things, as for enlarging their fringes, and claiming the uppermost rooms in feasts, and praying standing in the highways, and such like things; which assuredly, in comparison of this great charge, ignorance of God, seem to be small and insignificant matters."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Recognitions%2FBook%25202.html'
source_title="Recognitions (Book II)"