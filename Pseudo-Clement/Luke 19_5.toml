[[commentary]]
quote='''
"But of those who are present, whom shall I choose but Zacchaeus, to whom also the Lord went in and rested, judging him worthy to be saved?" And having said this, he laid his hand upon Zacchaeus, who stood by, and forced him to sit down in his own chair. But Zacchaeus, falling at his feet, begged that he would permit him to decline the rulership; promising, at the same time, and saying, "Whatever it behoves the ruler to do, I will do; only grant me not to have this name; for I am afraid of assuming the name of the rulership, for it teems with bitter envy and danger."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Homilies%2FHomily%25203.html'
source_title="Clementine Homilies, Homily 3"