[[commentary]]
quote='''
It is therefore the peculiar gift bestowed by God upon the Hebrews, that they believe Moses; and the peculiar gift bestowed upon the Gentiles is that they love Jesus. For this also the Master intimated, when He said, 'I will confess to Thee, O Father, Lord of heaven and earth, because Thou hast concealed these things from the wise and prudent, and hast revealed them to babes.' By which it is certainly declared, that the people of the Hebrews, who were instructed out of the law, did not know Him; but the people of the Gentiles have acknowledged Jesus, and venerate Him; on which account also they shall be saved, not only acknowledging Him, but also doing His will. But he who is of the Gentiles, and who has it of God to believe Moses, ought also to have it of his own purpose to love Jesus also. And again, the Hebrew, who has it of God to believe Moses, ought to have it also of his own purpose to believe in Jesus; so that each of them, having in himself something of the divine gift, and something of his own exertion, may be perfect by both.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Recognitions%2FBook%25204.html'
source_title="Clementine Recognitions, Book 4"

[[commentary]]
quote='''
For on this account Jesus is concealed from the Jews, who have taken Moses as their teacher, and Moses is hidden from those who have believed Jesus. For, there being one teaching by both, God accepts him who has believed either of these. But believing a teacher is for the sake of doing the things spoken by God. And that this is so our Lord Himself says, 'I thank thee, Father of heaven and earth, because Thou hast concealed these things from the wise and elder, and hast revealed them to sucking babes.' Thus God Himself has concealed a teacher from some, as foreknowing what they ought to do, and has revealed him to others, who are ignorant what they ought to do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Homilies%2FHomily%25208.html'
source_title="Clementine Homilies, Homily 8"