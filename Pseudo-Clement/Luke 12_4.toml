[[commentary]]
quote='''
Wherefore, brethren, leaving willingly our sojourn in this present world, let us do the will of Him that called us, and not fear to depart out of this world. For the Lord saith, "Ye shall be as lambs in the midst of wolves." And Peter answered and said unto Him, "What, then, if the wolves shall tear in pieces the lambs?" Jesus said unto Peter, "The lambs have no cause after they are dead to fear the wolves; and in like manner, fear not ye them that kill you, and can do nothing more unto you; but fear Him who, after you are dead, has power over both soul and body to cast them into hell-fire." And consider, brethren, that the sojourning in the flesh in this world is but brief and transient, but the promise of Christ is great and wonderful, even the rest of the kingdom to come, and of life everlasting.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FSecond%2520Epistle%2520to%2520the%2520Corinthians.html'
source_title="Second Epistle To The Corinthians (Pseudo-Clement)"
time=140