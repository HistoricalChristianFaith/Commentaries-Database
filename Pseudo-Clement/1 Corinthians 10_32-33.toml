[[commentary]]
quote='''
For the hearts of men are firmly set on evil. And, that we may not give a pretext to those who desire to get a pretext against us and to speak evil of us, and that we may not be a stumbling-block to any one, on this account we cut off the pretext of those who desire to get a pretext against us; on this account we must be "on our guard that we be to no one a stumbling-block, neither to the Jews, nor to the Gentiles, nor yet to the Church of God; and we must not seek that which is profitable to ourselves only, but that which is for the profit of many, so that they may be saved." [1 Corinthians 10:32-33] For this does not profit us, that another stumble because of us. Let us, therefore, be studiously on our guard at all times, that we do not smite our brethren and give them to drink of a disquieting conscience through our being to them a stumbling-block. For "if for the sake of meat our brother be made sad, or shocked, or made weak, or caused to stumble, we are not walking in the love of God. For the sake of meat thou causest him to perish for whose sake Christ died." [Romans 14:15] For, in "thus sinning against your brethren and wounding their sickly consciences, ye sin against Christ Himself. For, if for the sake of meat my brother is made to stumble," let us who are believers say, "Never will we eat flesh, that we may not make our brother to stumble." [1 Corinthians 8:12-13]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FTwo%2520Epistles%2520on%2520Virginity%2FEpistle%25202.html'
source_title="Two Epistles on Virginity, Epistle 2"