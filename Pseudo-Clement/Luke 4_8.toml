[[commentary]]
quote='''
"This we would have you know assuredly, that a demon has no power against a man, unless one voluntarily submit himself to his desires. Whence even that one who is the prince of wickedness, approached Him who, as we have said, is appointed of God King of peace, tempting Him, and began to promise Him all the glory of the world; because he knew that when he had offered this to others, for the sake of deceiving them, they had worshipped him. Therefore, impious as he was, and unmindful of himself, which indeed is the special peculiarity of wickedness, he presumed that he should be worshipped by Him by whom he knew that he was to be destroyed. Therefore our Lord, confirming the worship of one God, answered him: 'It is written, Thou shall worship the Lord thy God, and Him only shalt thou serve.' And he, terrified by this answer, and fearing lest the true religion of the one and true God should be restored, hastened straightway to send forth into this world false prophets, and false apostles, and false teachers, who should speak indeed in the name of Christ, but should accomplish the will of the demon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Recognitions%2FBook%25204.html'
source_title="Clementine Recognitions, Book 4"


[[commentary]]
quote='''
"Therefore you shall be able to persuade yourselves with respect to the things that are profitable, if, like charmers, you say to the horrible serpent which lurks in your heart, 'The Lord God thou shall fear, and Him alone thou shall serve.' On every account it is advantageous to fear Him alone, not as an unjust, but as a righteous God. For one fears an unjust being, lest he be wrongfully destroyed, but a righteous one, lest he be caught in sin and punished. You can therefore, by fear towards Him, be freed from many hurtful fears. For if you do not fear the one Lord and Maker of all, you shall be the slaves of all evils to your own hurt, I mean of demons and diseases, and of everything that can in any way hurt you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Homilies%2FHomily%252010.html'
source_title="Clementine Homilies, Homily 10"