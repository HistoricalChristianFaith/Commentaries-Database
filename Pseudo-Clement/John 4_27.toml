[[commentary]]
quote='''
And, not to extend our discourse to too great length, what shall we say concerning our Lord Jesus Christ? Our Lord Himself was constantly with His twelve disciples when He had come forth to the world. And not only so; but also, when He was sending them out, He sent them out two and two together, men with men; but women were not sent with them, and neither in the highway nor in the house did they associate with women or with maidens: and thus they pleased God in everything. Also, when our Lord Jesus Christ Himself was talking with the woman of Samaria by the well alone, "His disciples came" and found Him talking with her, "and wondered that Jesus was standing and talking with a woman." [John 4:27] Is He not a rule, such as may not be set aside, an example, and a pattern to all the tribes of men? And not only so; but also, when our Lord was risen from the place of the dead, and Mary came to the place of sepulture, she ran and fell at the feet of our Lord and worshipped Him, and would have taken hold of Him. But He said to her: "Touch Me not; for I am not yet ascended to My Father." [John 20:17]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FTwo%2520Epistles%2520on%2520Virginity%2FEpistle%25202.html'
source_title="Two Epistles on Virginity"
