[[commentary]]
quote='''
For, "he that is born of the flesh is flesh; and he that is of the earth speaketh of the earth," and his thoughts are of the earth. And "the mind of the flesh is enmity towards God. For it does not submit itself to the law of God; for it cannot do so," because it is in the flesh, "in which dwells no good," because the Spirit of God is not in it. For this cause justly does the Scripture say regarding such a generation as this: "My Spirit shall not dwell in men for ever, because they are flesh." "Whosoever, therefore, has not the Spirit of God in him, is none of His:" as it is written, "The Spirit of God departed from Saul, and an evil spirit troubled him, which was sent upon him from God." [1 Samuel 16:14]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FTwo%2520Epistles%2520on%2520Virginity%2FEpistle%25201.html'
source_title="Two Epistles on Virginity, Epistle 1"