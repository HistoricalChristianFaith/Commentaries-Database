[[commentary]]
quote='''
To this Simon replied: "From the words of your master I shall refute you, because even he introduces to all men a certain God who was known. For although both Adam knew the God who was his creator, and the maker of the world; and Enoch knew him, inasmuch as he was translated by him; and Noah, since he was ordered by him to construct the ark; and although Abraham, and Isaac, and Jacob, and Moses, and all, even every people and all nations, know the maker of the world, and confess him to be a God, yet your Jesus, who appeared long after the patriarchs, says: 'No one knows the Son, but the Father; neither knoweth any one the Father, but the Son, and he to whom the Son has been pleased to reveal Him.' Thus, therefore, even your Jesus confesses that there is another God, incomprehensible and unknown to all."

Then Peter says: "You do not perceive that you are making statements in opposition to yourself. For if our Jesus also knows Him whom you call the unknown God, then He is not known by you alone. Yea, if our Jesus knows Him, then Moses also, who prophesied that Jesus should come, assuredly could not himself be ignorant of Him. For he was a prophet; and he who prophesied of the Son doubtless knew the Father. For if it is in the option of the Son to reveal the Father to whom He will, then the Son, who has been with the Father from the beginning, and through all generations, as He revealed the Father to Moses, so also to the other prophets; but if this be so, it is evident that the Father has not been unknown to any of them. But how could the Father be revealed to you, who do not believe in the Son, since the Father is known to none except him to whom the Son is pleased to reveal Him? But the Son reveals the Father to those who honour the Son as they honour the Father." [John 5:23]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Recognitions%2FBook%25202.html'
source_title="Recognitions (Book II)"
