[[commentary]]
quote='''
And Peter said: "It is impossible for me to deny the assertion of my Teacher. Wherefore I allow that the evil one exists, because my Teacher, who spoke the truth in all things, has frequently asserted that he exists. For instance, then, he acknowledges that he conversed with Him, and tempted Him for forty days. And I know that He has said somewhere else, 'If Satan casts out Satan, he is divided against himself: how then is his kingdom to stand?' And He pointed out that He saw the evil one like lightning falling down from heaven. And elsewhere He said, 'He who sowed the bad seed is the devil.' And again, 'Give no pretext to the evil one.' Moreover, in giving advice, He said, 'Let your yea be yea, and your nay nay; for what is more than these is of the evil one.' Also, in the prayer which He delivered to us, we have it said, 'Deliver us from the evil one.' And in another place, He promised that He would say to those who are impious, 'Go ye into outer darkness, which the Father prepared for the devil and his angels.' And not to prolong this statement further, I know that my Teacher often said that there is an evil one. Wherefore I also agree in thinking that he exists. If, then, in future you have anything to say in accordance with this belief, say it, as you promised."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Homilies%2FHomily%252019.html'
source_title="Clementine Homilies, Homily 19"