[[commentary]]
quote='''
Let us, therefore, fear the judgment which awaits teachers. For a severe judgment will those teachers receive "who teach, but do not," [Matthew 23:3] and those who take upon them the name of Christ falsely, and say: We teach the truth, and yet go wandering about idly, and exalt themselves, and make their boast in the mind of the flesh. [Colossians 2:18] These, moreover, are like "the blind man who leads the blind man, and they both fall into the ditch." [Matthew 15:14] And they will receive judgment, because in their talkativeness and their frivolous teaching they teach natural wisdom and the "frivolous error of the plausible words of the wisdom of men," [Colossians 2:8] "according to the will of the prince of the dominion of the air, and of the spirit which works in those men who will not obey, according to the training of this world, and not according to the doctrine of Christ." [Ephesians 2:2] But if you have received "the word of knowledge, or the word of instruction, or of prophecy," [1 Corinthians 12:8-10] blessed be God, "who helps every man without grudging — that God who gives to every man and does not upbraid him." [James 1:5] 
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FTwo%2520Epistles%2520on%2520Virginity%2FEpistle%25201.html'
source_title="Two Epistles on Virginity, Epistle 1"