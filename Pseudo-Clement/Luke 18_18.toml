[[commentary]]
quote='''
And Peter said: "I shall explain to you how goodness itself is just. Our teacher Himself first said to the Pharisee who asked Him, 'What shall I do to inherit eternal life?' 'Do not call me good; for one is good, even the Father who is in the heavens;' and straightway He introduced these words, 'But if thou shalt wish to enter into life, keep the commandments.' And when he said, 'What commandments?' He pointed him to those of the law. Now He would not, if He were indicating some other good being, have referred him to the commandments of the Just One. That indeed justice and goodness are different I allow, but you do not know that it is within the power of the same being to be good and just. For He is good, in that He is now long-suffering with the penitent, and welcomes them; but just, when acting as judge He will give to every one according to his deserts."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FClementine%2520Homilies%2FHomily%252018.html'
source_title="Clementine Homilies, Homily 18"