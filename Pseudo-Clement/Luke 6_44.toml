[[commentary]]
quote='''
For virgins are a beautiful pattern to believers, and to those who shall believe. The name alone, indeed, without works, does not introduce into the kingdom of heaven; but, if a man be truly a believer, such an one can be saved. For, if a person be only called a believer in name, whilst he is not such in works, he cannot possibly be a believer. "Let no one," therefore, "lead you astray with the empty words of error." For, merely because a person is called a virgin, if he be destitute of works excellent and comely, and suitable to virginity, he cannot possibly be saved. For our Lord called such virginity as that "foolish," as He said in the Gospel; and because it had neither oil nor light, it was left outside of the kingdom of heaven, and was shut out from the joy of the bridegroom, and was reckoned with His enemies. For such persons as these "have the appearance only of the fear of God, but the power of it they deny." For they "think with themselves that they are something, whilst they are nothing, and are deceived. But let every one constantly try his works," and know himself; for empty worship does he offer, whosoever he be that makes profession of virginity and sanctity, "and denies its power." For virginity of such a kind is impure, and disowned by all good works. For "every tree whatsoever is known from its fruits." "See that thou understand what I say: God will give thee understanding." [2 Timothy 2:7]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FTwo%2520Epistles%2520on%2520Virginity%2FEpistle%25201.html'
source_title="Two Epistles on Virginity, Epistle 1"
