[[commentary]]
quote='''
Beloved brethren! That a man should build up and establish the brethren on the faith in one God, this also is manifest and well-known. This too, again, is comely, that a man should not be envious of his neighbour. And moreover, again, it is suitable and comely that all those who work the works of the Lord should work the works of the Lord in the fear of God. Thus is it required of them to conduct themselves. That "the harvest is great, but the workmen are few," this also is well-known and manifest. Let us, therefore, "ask of the Lord of the harvest" that He would send forth workmen into the harvest; [Matthew 9:37-38] such workmen as "shall skilfully dispense the word of truth;" workmen "who shall not be ashamed;" faithful workmen; workmen who shall be "the light of the world;" [Matthew 5:14] workmen who "work not for the food that perishes, but for that food which abides unto life eternal;" [John 6:27] workmen who shall be such as the apostles; workmen who imitate the Father, and the Son, and the Holy Spirit; who are concerned for the salvation of men; not "hireling" [John 10:12-13] workmen; not workmen to whom the fear of God and righteousness appear to be gain; not workmen who "serve their belly;" not workmen who "with fair speeches and pleasant words mislead the hearts of the innocent;" [Romans 16:18] not workmen who imitate the children of light, while they are not light but darkness — "men whose end is destruction;" [Philippians 3:9] not workmen who practise iniquity and wickedness and fraud; not "crafty workmen;" [2 Corinthians 11:13] not workmen "drunken" and "faithless;" nor workmen who traffic in Christ; not misleaders; not "lovers of money; not malevolent." [1 Timothy 3:3; Titus 1:7] Let us, therefore, contemplate and imitate the faithful who have conducted themselves well in the Lord, as is becoming and suitable to our calling and profession. Thus let us do service before God in justice and righteousness, and without blemish, "occupying ourselves with things good and comely before God and also before men." [Romans 12:17] For this is comely, that God be glorified in us in all things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FPseudo-Clement%2FTwo%2520Epistles%2520on%2520Virginity%2FEpistle%25201.html'
source_title="Two Epistles on Virginity"