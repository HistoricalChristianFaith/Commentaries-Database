[[commentary]]
quote='''
For the naming of Christ is the confession of the whole, shewing forth as it does the God who gave, the Son who received, and the Spirit who is, the unction. So we have learned from Peter, in the Acts, of "Jesus of Nazareth whom God anointed with the Holy Ghost;" and in Isaiah, "The Spirit of the Lord is upon me, because the Lord hath anointed me;" and the Psalmist, "Therefore God, even thy God, hath anointed thee with the oil of gladness above thy fellows."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="ON THE SPIRIT, Ch. XII"


[[commentary]]
quote='''
Let no one be misled by the fact of the apostle's frequently omitting the name of the Father and of the Holy Spirit when making mention of baptism, or on this account imagine that the invocation of the names is not observed. "As many of you," he says, "as were baptized into Christ have put on Christ;" and again, "As many of you as were baptized into Christ were baptized into his death." For the naming of Christ is the confession of the whole, shewing forth as it does the God who gave, the Son who received, and the Spirit who is, the unction. So we have learned from Peter, in the Acts, of "Jesus of Nazareth whom God anointed with the Holy Ghost;" and in Isaiah, "The Spirit of the Lord is upon me, because the Lord hath anointed me;" and the Psalmist, "Therefore God, even thy God, hath anointed thee with the oil of gladness above thy fellows." Scripture, however, in the case of baptism, sometimes plainly mentions the Spirit alone. "For into one Spirit," it says, "we were all baptized in one body." And in harmony with this are the passages: "You shall be baptized with the Holy Ghost," and "He shall baptize you with the Holy Ghost." But no one on this account would be justified in calling that baptism a perfect baptism wherein only the name of the Spirit was invoked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="ON THE SPIRIT, Ch. XII"
