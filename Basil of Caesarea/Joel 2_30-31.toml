[[commentary]]
quote='''
Further, the Lord has announced to us that at the dissolution of the universe, signs will appear in the sun, in the moon and in the stars. The sun shall be turned into blood and the moon shall not give her light, signs of the consummation of all things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FThe%2520Hexaemeron%2FHomily%25206-The%2520Creation%2520of%2520Luminous%2520Bodies.html'
source_title="HOMILIES ON THE HEXAEMERON 6:4"
