[[commentary]]
quote='''
Let us rather, in a sense befitting the Godhead, perceive a transmission of will, like the reflexion of an object in a mirror, passing without note of time from Father to Son. "For the Father loveth the Son and sheweth him all things," so that "all things that the Father hath" belong to the Son, not gradual accruing to Him little by little, but with Him all together and at once.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="ON THE SPIRIT 8.20"


[[commentary]]
quote='''
"The Son can do nothing of himself." And the self-complete Wisdom? I received "a commandment what I should say and what I should speak." Through all these words He is guiding us to the knowledge of the Father, and referring our wonder at all that is brought into existence to Him, to the end that "through Him" we may know the Father. For the Father is not regarded from the difference of the operations, by the exhibition of a separate and peculiar energy; for whatsoever things He sees the Father doing, "these also doeth the Son likewise;" but He enjoys our wonder at all that comes to pass out of the glory which comes to Him from the Only Begotten, rejoicing in the Doer Himself as well as in the greatness of the deeds, and exalted by all who acknowledge Him as Father of our Lord Jesus Christ, "through whom are all things, and for whom are all things."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="ON THE SPIRIT 8.19"
