[[commentary]]
quote='''
(In Esai. 5.) Hell is a certain common place in the interior of the earth, shaded on all sides and dark, in which there is a kind of opening stretching downward, through which lies the descent of the souls who are condemned to perdition.
But he receives a meet reward, fire and the torments of hell; the parched tongue; for the tuneful lyre, wailing; for drink, the intense longing for a drop; for curious or wanton spectacles, profound darkness; for busy flattery, the undying worm. Hence it follows, That he may cool my tongue, for I am tormented in the flame.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"
