[[commentary]]
quote='''
"Who hath woe? Who hath sorrow?" For whom is distress and darkness? For whom eternal doom? Is it not for the transgressors? For them that deny the faith? And what is the proof of their denial? Is it not that they have set at naught their own confessions? And when and what did they confess? Belief in the Father and in the Son and in the Holy Ghost, when they renounced the devil and his angels, and uttered those saving words. What fit title then for them has been discovered, for the children of light to use? Are they not addressed as transgressors, as having violated the covenant of their salvation?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="ON THE SPIRIT 11:27"
