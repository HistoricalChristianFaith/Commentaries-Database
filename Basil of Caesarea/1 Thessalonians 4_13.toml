[[commentary]]
quote='''
All things are ordained by the Lord's love. We must not accept anything that befalls us as grievous, even if, for the present, it affects our weakness. We are ignorant, peradventure, of the reasons why each thing that happens to us is sent to us as a blessing by the Lord; but we ought to be convinced that all that happens to us is for our good, either for the reward of our patience, or for the soul which we have received, lest, by lingering too long in this life, it be filled with the wickedness to be found in this world. If the hope of Christians is limited to this life, it might rightly have been reckoned a bitter lot to be prematurely parted from the body; but if, to them that love God, the sundering of the soul from these bodily fetters is the beginning of our real life, why do we grieve like them which have no hope? Be comforted then, and do not fall under your troubles, but show that you are superior to them and can rise above them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FLetters%2FLetter%2520101.html'
source_title="LETTERS 101"
