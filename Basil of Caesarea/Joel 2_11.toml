[[commentary]]
quote='''
If then the beginning of time is called "one day" rather than "the first day," it is because Scripture wishes to establish its relationship with eternity. It was, in reality, fit and natural to call "one" the day whose character is to be one wholly separated and isolated from all the others. If Scripture speaks to us of many ages, saying everywhere, "age of age, and ages of ages," we do not see it enumerate them as first, second, and third. It follows that we are hereby shown not so much limits, ends and succession of ages, as distinctions between various states and modes of action. "The day of the Lord," Scripture says, "is great and very terrible," and elsewhere "Woe unto you that desire the day of the Lord: to what end is it for you? The day of the Lord is darkness and not light." A day of darkness for those who are worthy of darkness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FThe%2520Hexaemeron%2FHomily%25202-%2522The%2520Earth%2520Was%2520Invisible%2520and%2520Unfinished%2522.html'
source_title="Homilies on the Hexaemeron 2.8"
