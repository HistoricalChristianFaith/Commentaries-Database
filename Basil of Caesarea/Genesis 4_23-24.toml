[[commentary]]
quote='''
Some suppose that Cain was slain by Lamech, and that he survived to this generation that he might suffer a longer punishment. But this is not the case. Lamech evidently committed two murders, from what he says himself, "I have slain a man and a young man," the man to his wounding, and the young man to his hurt. There is a difference between wounding and hurt. And there is a difference between a man and a young man. "If Cain shall be avenged sevenfold, truly Lamech seventy and sevenfold." It is right that I should undergo four hundred and ninety punishments, if God's judgment on Cain was just, that his punishments should be seven. Cain had not learned to murder from another, and had never seen a murderer undergoing punishment. But I, who had before my eyes Cain groaning and trembling, and the mightiness of the wrath of God, was not made wiser by the example before me. Wherefore I deserve to suffer four hundred and ninety punishments. There are, however, some who have gone so far as the following explanation, which does not jar with the doctrine of the Church; from Cain to the flood, they say, seven generations passed by, and the punishment was brought on the whole earth, because sin was everywhere spread abroad. But the sin of Lamech requires for its cure not a Flood, but Him Who Himself takes away the sin of the world. Count the generations from Adam to the coming of Christ, and you will find, according to the genealogy of Luke, that the Lord was born in the seventy-seventh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FLetters%2FLetter%2520260.html'
source_title="Letter 260"
