[[commentary]]
quote='''
I am sure that a work done by one or two pious men is not done without the cooperation of the Holy Spirit. For when nothing merely human is put before us, when holy men are moved to action with no thought of their own personal gratification, and with the sole object of pleasing God, it is plain that it is the Lord Who is directing their hearts. When spiritually-minded men take the lead in counsel, and the Lord's people follow them with consentient hearts, there can be no doubt that their decisions are arrived at with the participation of our Lord Jesus Christ, Who poured out His blood for the Churches' sake.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FLetters%2FLetter%2520229.html'
source_title="LETTERS 229"
