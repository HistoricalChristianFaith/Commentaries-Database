[[commentary]]
quote='''
Men like this are ravening wolves covered with sheep's clothing, as the Lord calls them. Flee then fickleness and pliability; seek truth, sincerity, simplicity. The serpent is shifty; so he has been condemned to crawl. The just is an honest man, like Job. Wherefore God setteth the solitary in families. So is this great and wide sea, wherein are things creeping innumerable, both small and great beasts. Yet a wise and marvellous order reigns among these animals. Fish do not always deserve our reproaches; often they offer us useful examples. How is it that each sort of fish, content with the region that has been assigned to it, never travels over its own limits to pass into foreign seas? No surveyor has ever distributed to them their habitations, nor enclosed them in walls, nor assigned limits to them; each kind has been naturally assigned its own home. One gulf nourishes one kind of fish, another other sorts; those which swarm here are absent elsewhere. No mountain raises its sharp peaks between them; no rivers bar the passage to them; it is a law of nature, which according to the needs of each kind, has allotted to them their dwelling places with equality and justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FThe%2520Hexaemeron%2FHomily%25207-The%2520Creation%2520of%2520Moving%2520Creatures.html'
source_title="HOMILIES ON THE HEXAEMERON 7:3"
