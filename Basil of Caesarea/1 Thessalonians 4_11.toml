[[commentary]]
quote='''
Any display in cloak or shoes is to be avoided; it is idle ostentation. Cheap things ought to be used for bodily necessity; and nothing ought to be spent beyond what is necessary, or for mere extravagance; this is a misuse of our property. The Christian ought not to seek for honour, or claim precedence. Every one ought to put all others before himself. The Christian ought not to be unruly. He who is able to work ought not to eat the bread of idleness, but even he who is busied in deeds well done for the glory of Christ ought to force himself to the active discharge of such work as he can do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FLetters%2FLetter%252022.html'
source_title="LETTERS 22"
