[[commentary]]
quote='''
Beasts bear witness to the faith. Hast thou confidence in the Lord? "Thou shalt walk upon the asp and the basilisk and thou shalt trample under feet the lion and the dragon." With faith thou hast the power to walk upon serpents and scorpions. Do you not see that the viper which attached itself to the hand of Paul, whilst he gathered sticks, did not injure him, because it found the saint full of faith? If you have not faith, do not fear beasts so much as your faithlessness, which renders you susceptible of all corruption.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FThe%2520Hexaemeron%2FHomily%25209-The%2520Creation%2520of%2520Terrestrial%2520Animals.html'
source_title="HOMILIES ON THE HEXAEMERON 9.6"
