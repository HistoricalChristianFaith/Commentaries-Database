[[commentary]]
quote='''
If he assigns to the Father the upper place by way of precedence, and asserts that the only begotten Son sits below, he will find that to the creature of his imagination attach all the consequent conditions of body. And if these are the imaginations of drunken delusion and phrensied insanity, can it be consistent with true religion for men taught by the Lord himself that "He that honoureth not the Son honoureth not the Father" to refuse to worship and glorify with the Father him who in nature, in glory, and in dignity is conjoined with him? What shall we say? What just defence shall we have in the day of the awful universal judgment of all-creation, if, when the Lord clearly announces that He will come "in the glory of his Father;" when Stephen beheld Jesus standing at the right hand of God; when Paul testified in the spirit concerning Christ "that he is at the right hand of God;" when the Father says, "Sit thou on my right hand;" when the Holy Spirit bears witness that he has sat down on "the right hand of the majesty" of God; we attempt to degrade him who shares the honour and the throne, from his condition of equality, to a lower state? Standing and sitting, I apprehend, indicate the fixity and entire stability of the nature, as Baruch, when he wishes to exhibit the immutability and immobility of the Divine mode of existence, says, "For thou sittest for ever and we perish utterly." Moreover, the place on the right hand indicates in my judgment equality of honour. Rash, then, is the attempt to deprive the Son of participation in the doxology, as though worthy only to be ranked in a lower place of honour.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="On the Spirit 6.15"
