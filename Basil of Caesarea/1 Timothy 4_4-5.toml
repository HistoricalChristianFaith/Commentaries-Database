[[commentary]]
quote='''
It has seemed to me ridiculous that any one should make a vow to abstain from swine's flesh. Be so good as to teach men to abstain from foolish vows and promises. Represent the use to be quite indifferent. No creature of God, received with thanksgiving, is to be rejected. The vow is ridiculous; the abstinence unnecessary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FLetters%2FLetter%2520199.html'
source_title="Letter 199, Canon 28"
