[[commentary]]
quote='''
Whence is it that we are Christians? Through our faith, would be the universal answer. And in what way are we saved? Plainly because we were regenerate through the grace given in our baptism. How else could we be? And after recognising that this salvation is established through the Father and the Son and the Holy Ghost, shall we fling away "that form of doctrine" which we received? Would it not rather be ground for great groaning if we are found now further off from our salvation "than when we first believed," and deny now what we then received? Whether a man have departed this life without baptism, or have received a baptism lacking in some of the requirements of the tradition, his loss is equal. And whoever does not always and everywhere keep to and hold fast as a sure protection the confession which we recorded at our first admission, when, being delivered "from the idols," we came "to the living God," constitutes himself a "stranger" from the "promises" of God, fighting against his own handwriting, which he put on record when he professed the faith. For if to me my baptism was the beginning of life, and that day of regeneration the first of days, it is plain that the utterance uttered in the grace of adoption was the most honourable of all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="On the Spirit 10.26"
