[[commentary]]
quote='''
For He Himself has bound the strong man and spoiled his goods, that is, us men, whom our enemy had abused in every evil activity, and made "vessels meet for the Master's use" us who have been perfected for every work through the making ready of that part of us which is in our own control. Thus we have had our approach to the Father through Him, being translated from "the power of darkness to be partakers of the inheritance of the saints in light." We must not, however, regard the oeconomy through the Son as a compulsory and subordinate ministration resulting from the low estate of a slave, but rather the voluntary solicitude working effectually for His own creation in goodness and in pity, according to the will of God the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="On The Holy Spirit, Chapter 8"
