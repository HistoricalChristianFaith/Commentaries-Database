[[commentary]]
quote='''
Although, however, waters above the heaven are invited to give glory to the Lord of the Universe, do not let us think of them as intelligent beings; the heavens are not alive because they "declare the glory of God," nor the firmament a sensible being because it "sheweth His handiwork." And if they tell you that the heavens mean contemplative powers, and the firmament active powers which produce good, we admire the theory as ingenious without being able to acknowledge the truth of it. For thus dew, the frost, cold and heat, which in Daniel are ordered to praise the Creator of all things, will be intelligent and invisible natures. But this is only a figure, accepted as such by enlightened minds, to complete the glory of the Creator. Besides, the waters above the heavens, these waters privileged by the virtue which they possess in themselves, are not the only waters to celebrate the praises of God. "Praise the Lord from the earth, ye dragons and all deeps." Thus the singer of the Psalms does not reject the deeps which our inventors of allegories rank in the divisions of evil; he admits them to the universal choir of creation, and the deeps sing in their language a harmonious hymn to the glory of the Creator.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FThe%2520Hexaemeron%2FHomily%25203-On%2520the%2520Firmament.html'
source_title="HOMILIES ON THE HEXAEMERON 3:9"
