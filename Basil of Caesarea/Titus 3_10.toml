[[commentary]]
quote='''
He who has been corrected in first faults, and received pardon, if he sins again prepares for himself a judgment of wrath worse than the former. He, who after the first and second admonition abides in his fault, ought to be brought before the person in authority, if haply after being rebuked by more he may be ashamed. If even thus he fail to be set right he is to be cut off from the rest as one that maketh to offend, and regarded as a heathen and a publican, for the security of them that are obedient, according to the saying, When the impious fall the righteous tremble.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FLetters%2FLetter%252022.html'
source_title="LETTERS 22"
