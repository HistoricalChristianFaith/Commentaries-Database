[[commentary]]
quote='''
He invites us to produce fruits in abundance, for fear lest our sterility should condemn us to the fire. He constantly compares our souls to vines. "My well beloved," says He, "hath a vineyard in a very fruitful hill," and elsewhere, I have "planted a vineyard and hedged it round about." Evidently He calls human souls His vine, those souls whom He has surrounded with the authority of His precepts and a guard of angels. "The angel of the Lord encampeth round about them that fear him." And further: He has planted for us, so to say, props, in establishing in His Church apostles, prophets, teachers; and raising our thoughts by the example of the blessed in olden times, He has not allowed them to drag on the earth and be crushed under foot. He wishes that the claspings of love, like the tendrils of the vine, should attach us to our neighbours and make us rest on them, so that, in our continual aspirations towards heaven, we may imitate these vines, which raise themselves to the tops of the tallest trees. He also asks us to allow ourselves to be dug about; and that is what the soul does when it disembarrasses itself from the cares of the world, which are a weight on our hearts. He, then, who is freed from carnal affections and from the love of riches, and, far from being dazzled by them, disdains and despises this miserable vain glory, is, so to say, dug about and at length breathes, free from the useless weight of earthly thoughts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FThe%2520Hexaemeron%2FHomily%25205-The%2520Germination%2520of%2520the%2520Earth.html'
source_title="Homilies on the Hexaemeron 5.6"
