[[commentary]]
quote='''
Moreover, Joshua, the son of Nun, even set up a stone as witness of his words (already a heap somewhere had been called a witness by Jacob), for he says, "Behold this stone shall be a witness unto you this day to the end of days, when ye lie to the Lord our God," perhaps believing that by God's power even the stones would speak to the conviction of the transgressors; or, if not, that at least each man's conscience would be wounded by the force of the reminder. In this manner they who have been entrusted with the stewardship of souls provide witnesses, whatever they may be, so as to produce them at some future day. But the Spirit is ranked together with God, not on account of the emergency of the moment, but on account of the natural fellowship; is not dragged in by us, but invited by the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="ON THE SPIRIT 13.30"
