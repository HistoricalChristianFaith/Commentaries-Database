[[commentary]]
quote='''
Now every soul in the hour of the Passion was subjected, as it were, to a kind of searching. According to the word of the Lord it is said, "All ye shall be offended because of me." Simeon therefore prophesies about Mary herself, that when standing by the cross, and beholding what is being done, and hearing the voices, after the witness of Gabriel, after her secret knowledge of the divine conception, after the great exhibition of miracles, she shall feel about her soul a mighty tempest. The Lord was bound to taste of death for every man—to become a propitiation for the world and to justify all men by His own blood. Even thou thyself, who hast been taught from on high the things concerning the Lord, shalt be reached by some doubt. This is the sword. "That the thoughts of many hearts may be revealed." He indicates that after the offence at the Cross of Christ a certain swift healing shall come from the Lord to the disciples and to Mary herself, confirming their heart in faith in Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FLetters%2FLetter%2520260.html'
source_title="LETTERS 260.9"
