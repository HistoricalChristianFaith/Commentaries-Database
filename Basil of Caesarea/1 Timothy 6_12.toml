[[commentary]]
quote='''
Remember the good profession which you witnessed before God, angels, and men. Remember the hallowed intercourse, the sacred company of virgins, the assembly of the Lord, the Church of the holy. Remember your grandmother, grown old in Christ, still youthful and vigorous in virtue; and your mother vying with her in the Lord, and striving to break with ordinary life in strange and unwonted toils; remember your sister, who copies their doings, nay, endeavours to surpass them, and goes beyond the good deeds of her fathers in her virgin graces, and earnestly challenges by word and deed you her sister, as she thinks, to like efforts, while she earnestly prays that your virginity be preserved. All these call to mind, and your holy service of God with them, your life spiritual, though in the flesh; your conversation heavenly, though on earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FLetters%2FLetter%252046.html'
source_title="Letter 46, To a Fallen Virgin"
