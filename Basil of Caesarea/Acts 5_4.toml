[[commentary]]
quote='''
Peter's words to Sapphira, "How is it that ye have agreed together to tempt the Spirit of the Lord? Ye have not lied unto men, but unto God," show that sins against the Holy Spirit and against God are the same; and thus you might learn that in every operation the Spirit is closely conjoined with, and inseparable from, the Father and the Son. God works the differences of operations, and the Lord the diversities of administrations, but all the while the Holy Spirit is present too of His own will, dispensing distribution of the gifts according to each recipient's worth. For, it is said, "there are diversities of gifts, but the same Spirit; and differences of administrations, but the same Lord; and there are diversities of operations, but it is the same God which worketh all in all."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FON%2520THE%2520SPIRIT.html'
source_title="ON THE SPIRIT 16.37"
