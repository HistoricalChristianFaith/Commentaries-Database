[[commentary]]
quote='''
In sober earnest, both our ears tingled on hearing of the shameless and inhuman heresy of your persecutors. They have reverenced neither age, nor services to society, nor people's affection. They inflicted torture, ignominy, and exile; they plundered all the property they could find; they were careless alike of human condemnation and of the awful retribution to come at the hands of the righteous Judge.… To my reflections has been added this thought too; can the Lord have wholly abandoned His Churches? Has the last hour come, and is "the falling away" thus coming upon us, that now the lawless one "may be revealed the son of perdition who opposeth and exalteth himself above all that is called God and is worshipped"? But if the temptation is for a season, bear it, ye noble athletes of Christ.… If all creation is to be dissolved, and the fashion of this world transformed, why should we be surprised that we, who are a part of creation, should feel the general woe, and be delivered to afflictions which our just God inflicts on us according to the measure of our strength?… Brothers, martyrs' crowns await you. The companies of the confessors are ready to reach out their hands to you and to welcome you into their own ranks.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Basil%2520of%2520Caesarea%2FLetters%2FLetter%2520139.html'
source_title="Letter 139"
