[[commentary]]
quote='''
See, therefore, how for our consolation all nature suggests a future resurrection. The sun sinks down and arises, the stars pass away and return, the flowers die and revive again, after their win-try decay the shrubs resume their leaves, seeds do not flourish again. unless they are rotted: thus the body in the sepulchre is like the trees which in winter hide their verdure with a deceptive dryness. Why are you in haste for it to revive and return, while the winter is still raw? We must wait also for the spring-time of the body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Marcus%2520Minucius%2520Felix%2FThe%2520Octavius%2520of%2520Minucius%2520Felix.html'
source_title="The Octavius of Minucius Felix"
