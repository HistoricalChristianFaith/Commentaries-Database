[[commentary]]
quote='''
And, looking to the grace of Christ, they despised all the torments of this world, redeeming themselves from eternal punishment by [the suffering of] a single hour. For this reason the fire of their savage executioners appeared cool to them. For they kept before their view escape from that fire which is eternal and never shall be quenched, and looked forward with the eyes of their heart to those good things which are laid up for such as endure; things "which ear hath not heard, nor eye seen, neither have entered into the heart of man," but were revealed by the Lord to them, inasmuch as they were no longer men, but had already become angels.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Polycarp%2520of%2520Smyrna%2FMartyrdom%2520of%2520Polycarp.html'
source_title="MARTYRDOM OF POLYCARP 2"
