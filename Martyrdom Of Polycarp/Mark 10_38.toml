[[commentary]]
quote='''
They did not nail him then, but simply bound him. And he, placing his hands behind him, and being bound like a distinguished ram [taken] out of a great flock for sacrifice, and prepared to be an acceptable burnt-offering unto God, looked up to heaven, and said, "O Lord God Almighty, the Father of thy beloved and blessed Son Jesus Christ, by whom we have received the knowledge of Thee, the God of angels and powers, and of every creature, and of the whole race of the righteous who live before thee, I give Thee thanks that Thou hast counted me, worthy of this day and this hour, that I should have a part in the number of Thy martyrs, in the cup of thy Christ, to the resurrection of eternal life, both of soul and body, through the incorruption [imparted] by the Holy Ghost."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Polycarp%2520of%2520Smyrna%2FMartyrdom%2520of%2520Polycarp.html'
source_title="MARTYRDOM OF POLYCARP 14"
