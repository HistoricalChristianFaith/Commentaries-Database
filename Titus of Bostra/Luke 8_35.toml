[[commentary]]
quote='''
But the severity of their loss led them to the Saviour; for it follows, Then they went out to see what was done, and came to Jesus; and here remark, that while God punishes men in their substance, He confers a blessing upon their souls. But when they had set out, they see him in his right mind who had been long vexed. It follows, And they found the man out of whom the devils had departed sitting at the feet of Jesus clothed, (whereas before he was naked,) and in his right mind. For he departed not from those feet, where he obtained safety; and so acknowledging the miracle, they were astonished at the cure of the malady, and marvelled at the event; for it follows, And they were afraid.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
