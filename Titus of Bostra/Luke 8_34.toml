[[commentary]]
quote='''
(Vide Victor. Ant. in Mark 5.) But the shepherds take flight, lest they should perish with the swine. Hence it follows, When they that fed them saw what was done they fled, and went and told it in the city and in the country, and excited the like alarm among the citizens.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
