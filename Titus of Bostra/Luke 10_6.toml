[[commentary]]
quote='''
Hence it is added, And if the son of peace be there, your peace shall rest upon it. As if he says, You indeed shall utter the word, but the blessing of peace shall be applied wherever I shall deem men worthy of it. But if any one is not worthy, ye are not mocked, the grace of your word has not perished, but is returned unto you. And this is what is added, But if not, it shall return unto you again.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
