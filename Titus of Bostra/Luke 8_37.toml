[[commentary]]
quote='''
But they ought to have besought the Lord not to depart from them, but to be the guardian of their country, that no evil spirits might come near them; but through fear they lost their own salvation, asking the Saviour to depart. It follows, Then the whole multitude of the country of the Gadarenes round about besought him to depart from, them, for they were taken with great fear.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
