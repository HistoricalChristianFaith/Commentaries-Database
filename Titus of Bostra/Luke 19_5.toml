[[commentary]]
quote='''
Now Zacchæus desired no more than to see, but He who is able to do more than we ask for, granted to Him far above what he expected; as it follows, And when Jesus came to the place, he looked up, and saw him. He saw the soul of the man striving earnestly to live a holy life, and converts him to godliness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
