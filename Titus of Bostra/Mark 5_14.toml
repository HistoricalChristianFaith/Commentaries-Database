[[commentary]]
quote='''
But the herdsmen also took to flight, lest they should perish with the swine, and spread the same fear amongst the inhabitants of the town. Wherefore there follows: And they that fed them, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
