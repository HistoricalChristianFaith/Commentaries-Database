[[commentary]]
quote='''
Who are ignorant what shall be tomorrow. For what is your life? It is a vapor appearing for a little while, and afterward it shall vanish away;
"For what is your life?" This says, pointing out the vanity and wretchedness of our life: and shaming us for the fact that throughout all the time of our life we consume ourselves in temporary evils, and in those things that arise and vanish simultaneously, all our labor is fulfilled. This is also echoed by David, saying: "Yet man passes away like a shadow; yet he is in vain troubled," (Ps. 38:7) that is, about that which is not, but exists only in a mere illusion: for such are the things and the image; or about that which does not exist, but insofar as it has a resemblance and image with life that truly proceeds.
"It is a vapor." Vapor is a condensation of air expiring from the moisture due to the heat of fire, having minimal existence. For due to its extreme low density, it easily yields to the surrounding body and vanishes and dissolves, like a moderate moisture when water is added. Thus, it has similarity to our life: and that very cleverly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on James'
