[[commentary]]
quote='''
For there are three that bear witness: the Spirit, the water, and the blood; and these three are one.
Therefore, since three bear witness to Jesus' adoption, namely baptism, crucifixion, and resurrection, there is no uncertainty in the Lord's adoption: by which adoption He also granted us, as He who was the first fruits of the entire human mass (Rom. 11:16), to be children of God. And these three are united in one Christ: for this is what it signifies, saying: "These three are one," that is, as a testimony concerning Christ. It should be noted that some of the fathers received the Spirit, not because of the resurrection, but the Father Himself when He cried out in the Jordan: "This is my beloved Son (Matt. 17:5);" because God is also called Spirit, as we have predicted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
