[[commentary]]
quote='''
"The law is not of faith," but from works. And from this it is clear that "the one who does them shall live by them." Therefore salvation in the law is through works, and not through faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
