[[commentary]]
quote='''
There was great unity and friendship between these two. For Peter here implies that the Lord's suffering was to be learned from the teacher, and again they ran together to the tomb, and concerning them Peter again says to Christ, "But what about this one?" (Jn. 21:21) They used to go up into the sanctuary, not any longer as those who observe Jewish customs, but appropriately and accommodatingly doing this, and so that when the lame man had been healed in the temple, they would have all who had seen it as witnesses. For many gathered there because of the reverence of the place. By indicating the hour he teaches that they were always attentive in their prayers. And he also mentions the temple, I say, relied on by both time and place for what he writes. And although many miracles were performed by the apostles, as Luke who wrote this also remembered above, he does not mention any of them by name, but he writes only that from which all began; for perhaps they overlooked those things as insignificant, or because this composition was undertaken by him not for the sake of flashiness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
