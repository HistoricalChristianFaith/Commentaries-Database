[[commentary]]
quote='''
It is shown that she was therefore named after her conduct, being alert and sober like a gazelle. For many names are given with reference to character, indicating by the nickname the operation that followed. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
