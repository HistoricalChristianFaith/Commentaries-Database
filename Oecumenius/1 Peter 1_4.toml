[[commentary]]
quote='''
In an incorruptible and undefiled inheritance, and that does not fade away, reserved in heaven for you
If there is an inheritance in heaven, the restoration of things is magnificent in a thousand years.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
