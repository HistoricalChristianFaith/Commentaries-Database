[[commentary]]
quote='''
And we sailed on to Cyprus and allowed Syria to remain. For the phrase "leaving it to port" is not simple, it has been said, but that they were in no hurry to approach Syria. So they came to Lycia, and leaving Cyprus, sailed to Tyre; for there the ship unloaded its cargo. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
