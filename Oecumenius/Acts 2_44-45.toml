[[commentary]]
quote='''
As for selling and distributing their possessions according to whatever need one had, not merely, but in an economical manner. For they distributed according to value.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
