[[commentary]]
quote='''
"and have recourse to the courts and to the magistrates." There was a class of judges in Asia called the magistrates, of humble status, who in some cases judged the poor and market-people; therefore they were called magistrates, just as there are public prosecutors in certain cities. The proconsuls, however, listened to cases concerning the rich or crimes. The term magistrates is also applied to advocates, from the word ἀγορεύειν, that is, "to speak publicly." [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
