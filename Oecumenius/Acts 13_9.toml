[[commentary]]
quote='''
"Saul, who is also Paul." So that Paul might not seem lesser than the other apostles in this respect, God changed his name, and calling Saul Paul, and whatever preeminence the chief of the disciples possessed, he also obtained, and received a position of greater familiarity. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'

[[commentary]]
quote='''
Therefore to show that Paul's words to Elymas the sorcerer were not spoken in anger, he anticipated and said, "filled with the Holy Spirit." For these words were not of punishment but of conversion. If they had been disciplinary, he would have made him blind forever; now, however, not that, but for a time, that he might convince the proconsul. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
