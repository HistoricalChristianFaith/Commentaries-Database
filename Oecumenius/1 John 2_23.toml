[[commentary]]
quote='''
"Whoever denies the Son does not have the Father either."
For some heretics, from whom the impure Valentinus arose, claimed that there is another unnamed Father besides him who is called the Father of Christ. They also deny the Son, because they say he is merely a unveiled man and not God by nature, as if he were from God. "Whoever denies the Son does not have the Father," just as the Jews, while denying the Son, pretend to know the Father and claim this for themselves. But let them know that they have not known the Father either; for if they had known, they would have known that He is also the Father of the Only Begotten Son. The same nonsense was also uttered by those who followed Simon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
