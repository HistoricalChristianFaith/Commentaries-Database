[[commentary]]
quote='''
"But the one of the bondwoman." Properly he speaks of Ishmael according to the flesh. For by the law of nature he was born of the flesh; for Isaac was not by the law of the flesh (How could a hundred-year-old man beget?) but by the individual promise.

— [PHOTIUS] Therefore do not assume that being related to Abraham according to the flesh is enough; let this be corrected and let it be believed that unless you are born as children by the promise of Abraham, that is, members and fellow-body of Christ (for he is, by promise, the seed of Abraham), you are outside the promise. [end of the excerpt by Photius] —
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
