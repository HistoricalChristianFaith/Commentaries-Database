[[commentary]]
quote='''
Mount Sinai is in Arabia. There the law was given to Moses. It is near Jerusalem. That mountain Sinai itself, in the language of the Arabs, is called Hagar. And, it is said, therefore: Hagar and Sarah were types of the two covenants. The slave-girl was a type of the Old Covenant, for she begets servants of the law. The free woman is a type of the New Covenant, for she bears those freed from the yoke of the law. For, it is said, Mount Sinai, where the law was given, is neighboring to Jerusalem, and in the Arabs' tongue it has the same name as Hagar the slave, Hagar herself being likewise called, as from the name, the type becoming near to the truth:

"corresponds to," that is, it touches, it borders.

— [PHOTIUS] "to Jerusalem." That is, to the one here on earth. So the upper and the free one, both stand apart. [end of the excerpt by Photius] —

"And she serves." This, he says, is the old covenant given on Mount Sinai; it serves with her children, the Jews. It serves under the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
