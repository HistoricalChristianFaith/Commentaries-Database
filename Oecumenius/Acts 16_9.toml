[[commentary]]
quote='''
No longer through an angel as with Philip or Cornelius, but through a vision it appears to Paul more humanly. For there persuasion is easy, more human; there, however, great force, more divine. Since he was only about to preach, it appears to him as a dream for this purpose. But he did not presume to preach; for by this the Holy Spirit reveals. For, he says, when they came, they attempted to go through Mysia and Bithynia, and the Spirit did not allow them. For the Spirit did not work even the easy things, but a vision sufficed. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
