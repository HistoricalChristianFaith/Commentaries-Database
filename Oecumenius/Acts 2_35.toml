[[commentary]]
quote='''
And he sets before them a fear by the phrase, "until I make your enemies." And so that they may not disbelieve, he assigns the submission to the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
