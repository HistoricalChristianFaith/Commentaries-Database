[[commentary]]
quote='''
And then having sent for, they summoned Peter. They did not do this before her death, considering it unworthy to disturb the disciples for such matters and to distract them from the preaching. Wherefore he also says that he was near. For they requested this as an additional matter; for she was a disciple. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
