[[commentary]]
quote='''
See how matters are managed. First they were all mocked together. Then, after they became respected in the public speeches and afterward wrought a great marvel, therefore indeed thereafter, having grown bold, God permitting, they enter into dangers, and undertake the contests. See the progress of the Jews to boldness, since seeking the one who will deliver up Christ, now they lay hands themselves, having become bolder after the cross. For they even had the commander, so that they might again cast a public charge upon those who had been, and not avenge as private persons, which they everywhere endeavor to do. Before the multitude they bound the apostles, that seeing them they might work with greater cowardice. But the opposite happened. For many of those who heard the message believed. Do you see a visible divine operation? And indeed even those who had already believed became weaker. But Peter's speech, being formed by the divine Spirit, touched their very souls. Privately they examine them, so that the hearers might not profit from their boldness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
