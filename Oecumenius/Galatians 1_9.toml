[[commentary]]
quote='''
So that they may not think I have said these things out of anger, as if not truly believing them, he adds the verb second.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
