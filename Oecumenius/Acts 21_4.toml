[[commentary]]
quote='''
He does not say that he made the urging through the Spirit, but that, being guided by the Spirit, they knew. For he did not merely foretell dangers to him, but that he must not go up, sparing him. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
