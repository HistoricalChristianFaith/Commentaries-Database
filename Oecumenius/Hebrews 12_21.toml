[[commentary]]
quote='''
"And so terrifying was the sight." It wishes to show that the New Testament also excels in relation to the Old. For indeed, even if the Old had nothing of this kind that the New has, it was to be feared in some way; however, the New, having perfection, is gentle and without terror.
"that Moses said, "I am exceedingly afraid and trembling."" This was also said by the one who was about to enter into darkness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FPseudo-Oecumenian%2520Catena%2520on%2520Hebrews%2FTranslation-Litteral.html'
source_title='The Pseudo-Oecumenian Catena on Hebrews'
