[[commentary]]
quote='''
Little children, let no one deceive you. Whoever practices righteousness is righteous, just as He is righteous.
But he proceeds more firmly with these words, saying: "let no one deceive you." For it cannot be otherwise than this: He who does righteousness knows the Righteous One, and is righteous, just as He is, that is, God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
