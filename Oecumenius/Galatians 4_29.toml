[[commentary]]
quote='''
— [THEODORET] Let this not trouble us either, that those entrusted are driven out by the unbelievers. For we find something of this kind also in the type, but it in no way prevailed against Isaac. [end of the excerpt by Theodoret] —

"Yet as at that time." And from that very fact that the faithful were persecuted by the Jews (for they were then persecuted), he shows the pattern to be true. For even Ishmael, who was born according to the flesh, persecuted Isaac, who was born according to the Spirit and the promise. "But what does the Scripture say?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
