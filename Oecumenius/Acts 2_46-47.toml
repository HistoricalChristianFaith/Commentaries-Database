[[commentary]]
quote='''
They now call the house the sacred one; for in it they used to eat. And the phrase "breaking bread" he said so that their simple and humble sustenance of life might be revealed. For when they were breaking bread they partook of food, but did not live luxuriously. Therefore, too they regulated their life by faith, and were mutually loving with all the people. For even if the chief priests rose up against them from envy, yet they had favor with the people. This was shown by their mercy and pure conduct. And the phrase "with simplicity of heart" instead of "in humility and lowliness," not thinking anything high about the things by which they practiced good deeds and acts of mercy, which was especially Jewish, as is clear from the boasting Pharisee. (see Luke 18:10-14)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
