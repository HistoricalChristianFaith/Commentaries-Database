[[commentary]]
quote='''
"walk by the Spirit." Live and conduct yourselves according to the Spirit, he says, and do what seems to belong to it, and you will not fulfill the desire of the flesh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
