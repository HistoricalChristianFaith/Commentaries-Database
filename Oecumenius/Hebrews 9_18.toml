[[commentary]]
quote='''
"even the first was not." And thus, he says, by death, the covenant is confirmed, for the first had the blood as a symbol of death; but the new has the actual death. As those were types, the truth is in the new.
"not dedicated without blood." As if he were saying: The blood has not ceased or been interrupted for a short time, but immediately as the covenant was dedicated, it also had successive blood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FPseudo-Oecumenian%2520Catena%2520on%2520Hebrews%2FTranslation-Litteral.html'
source_title='The Pseudo-Oecumenian Catena on Hebrews'
