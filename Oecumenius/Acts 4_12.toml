[[commentary]]
quote='''
Observe also that the psalmist saying, "there is salvation in no one else," is purely clear: "This came from the Lord" is as it were the logic and the salvific bond, by which every person is not saved by any other than by the one cornerstone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'

[[commentary]]
quote='''
For "There is no other name," that is, no venerable glory, unless this one faith centered on Christ the cornerstone alone favors and accepts the other faiths, as if the saving grace were given only in it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
