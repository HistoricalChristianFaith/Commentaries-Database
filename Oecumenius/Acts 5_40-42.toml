[[commentary]]
quote='''
But if they were persuaded, how were they beaten? They were persuaded to refrain from the slaughter. For this was raging wildly among the lazy. And they beat them so that they would not rashly be driven to boast and act beyond bounds. And in truth, one thing was that their violence was to be abolished, another that the virtue of the adviser was to be chastised, and another that the scourge was to curb the madness of those who had been advised. See also the apostles' devotion to the better cause. For by the afflictions by which they hoped to be subdued, they were the more exercised, so that they might proceed to a more effective and more fearless doctrine, and not in secret, but immediately even in the temple from which they had been seized, and everywhere else also, they would proclaim Christ, showing to the listeners the futility of those who had used force against them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
