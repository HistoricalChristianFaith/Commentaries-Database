[[commentary]]
quote='''
When they questioned how much of the field they had sold, that opportunity of grace offered itself to him, as if the power to sell and to cheat were not in her but in the man; and since they found the woman to be like the man in deceit, they condemned her to a like penalty. For he knew that contempt of divine things also kindles into anger one who is free from anger. This tradition under Moses, most gentle, also makes them faithful by words, so that those who gathered wood on the Sabbath were overwhelmed with stones. (see Num. 15:52) And indeed a transgression appeared in those things which were proper, but here sacrilege: for those things which had been set aside for the support of the needy belonging to God, they were using for the needs of their additions. For it was necessary that from those things which were kept in the common store they should fill the lack of the needy. Consider also this, how strongly the household servants are affected. For they do not want those who have once obtained spiritual grace to be either thieves or sacrilegious in their conduct. And they were not wanting to put strangers to punishment, for fear that they seemed to compel even unwilling people by fear of punishment to come to the faith. But if Satan filled the heart of Ananias and accomplished the whole matter, what is this great severity against Ananias? Yet it was done not rashly but justly, since he had shown himself so capable of Satan.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
