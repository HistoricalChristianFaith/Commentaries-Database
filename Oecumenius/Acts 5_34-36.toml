[[commentary]]
quote='''
Therefore he does not use great violence, but as if they were drunk with passion he says: "be careful about these men; consider what you propose to do," as if, "Do not act as chance carries you." Then, bringing examples of those who have acted thoughtlessly in such matters and to their own ruin, he adduces Theudas and Judas the Galilean, who did not reach a favorable end for themselves. The examples are not old but recent, and many eyewitnesses to them exist. So that experience may guard against coming to a similar end, he cites these examples; then, having therefore smoothed the discourse with them, he tries to turn aside the hearers from plotting against the apostles, for fear that, if they set out upon an unhindered occasion, we should, he says, by dying in opposition to God, fall into godlessness, and therefore, not being armed against those men but being armed for ourselves by the very nature of one who attacks what seems to be God, come to ruin for ourselves. For if there is a movement of mere human passion, fury against them is excessive. For destruction is attendant upon beginnings, as the examples suggest. Nor did he say plainly that the apostles were moved by God or by human impulse, but vaguely. For if he had said that they were from God, they would immediately have argued against him. But if he had said they were from men, he would again have made them easy targets for attack against the apostles. Therefore, having wisely ordered his discourse, he bids them await the outcome and not hurry into conduct about matters not yet known. For to fight against one who seems to be God does not destroy that thing but oneself. For if it is human, he says, what need have you of matters? But if it is divine, you will not be able by matters even to destroy it, so that it may not be thought rashly to proceed where the facts are unknown. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
