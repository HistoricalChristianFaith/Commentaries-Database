[[commentary]]
quote='''
See how great was the modesty of those who were questioned: for they did not answer with fierceness; since they were instructors, they were not outraged, but had pity on them, and they attempted to free them from error. For they did not quarrel against them, nor did they reply crudely to them because of the gift of signs given by God through them, teaching them rather to kick against the whip; but first indeed they say that obedience ought to be rendered more readily to God rather than to men, secretly accusing them as despising those things which had been done on their account. Then also that he whom they themselves call a mere man was both Savior and God, and God had such concern for him that he raised him from the dead. For to say that he had risen by his own power was not yet safe, in case it be thought that he was contrary to God. But in order to rouse them from profound sleep, he insists them to understand to what condemnation they were subject for having killed by exaltation from God this man by a death on a cross.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
