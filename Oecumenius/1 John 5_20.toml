[[commentary]]
quote='''
And we know that the Son of God has come and has given us an understanding, that we may know Him who is true; and we are in Him who is true, in His Son Jesus Christ. This is the true God and eternal life.
But since, John says, the Son of God has come and has given us an understanding by which we may know the true God through internal understanding, and be in His true Son Jesus Christ: we have come to know through this glory that He is the true God and eternal life, and by knowing we are safe from the onslaught of evil and its offenses. "This is the true God." This, also, serves as a demonstrative article. Here, the article indicates relationship.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
