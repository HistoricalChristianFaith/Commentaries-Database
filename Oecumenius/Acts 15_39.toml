[[commentary]]
quote='''
"A sharp disagreement," he said, "arose," nor a love of conflict. Yet the sharp disagreement was such that it separated them from one another; and with the highest righteousness, which each considered to be beneficial, he later confirmed this by an act of sharing toward him. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'

[[commentary]]
quote='''
It seems reasonable that the separation arose from mutual understanding, and to say to one another that "Since I wish it and you do not, so that we do not quarrel, let us divide the regions." Therefore they entirely yielded to one another in this. For Barnabas wished that Paul should remain, and therefore he departed. Yet we also find this among the prophets: different dispositions and different temperaments, as Elijah is severe, Moses gentle, so likewise here Paul is the more intense of the two compared to Barnabas. This battle was very beneficial to Mark. For it turned back Paul's harshness, and made Barnabas kind so that he would no longer be abandoned. Therefore they fight, but in the end increase is accomplished. For seeing Paul lifted up to depart, he became very afraid and condemned himself, and seeing Barnabas therefore opposing him, he would very much love him. And the student was corrected through the struggle of the teachers, so that he kept far from being scandalized. For when he saw himself therefore cast out because of his idleness by Paul, he hurried with zeal on the second course to cover up his former annoyance, greatly benefited by Paul's correctness. What then? Did the enemies withdraw? By no means! That there was not hostility toward the apostles is shown everywhere afterward by Barnabas enjoying many praises from Paul in his letters. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
