[[commentary]]
quote='''
And for fear that he should say, "If the Gentiles learn this, they will be scandalized," they therefore add: "As for the Gentile believers, we wrote," he says, "commanding them to observe nothing of that sort." Just as then we imposed upon them, although preaching to Jews, so also, you preaching to the Gentiles, cooperate with us: for this is condescension, do not suspect anything. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
