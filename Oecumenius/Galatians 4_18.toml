[[commentary]]
quote='''
He wishes to show that those who now are overturning them, and persuading them to observe to the law, and by this preparing them to become zealous imitators of it, had long ago envied them in the knowledge of the Gospel, when Paul was present and was teaching them.

"It is good, however," he says, "to strive enthusiastically in what is good always, and not only when I am present with you." And he shows that they have been deceived during his absence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
