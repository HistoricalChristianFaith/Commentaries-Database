[[commentary]]
quote='''
"Whoever says, 'I know him,' but does not keep his commandments is a liar, and the truth is not in him."
Then, on the contrary, he confirms the same, using a more abundant proof, and says: Whoever says, "I know him," or "I have fellowship with him," and does not keep his commandments is a liar. For how can it be that the same person is joined to him and yet not joined? Certainly, keeping the commandments indicates obedience, while not observing them indicates that one is by no means a friend.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
