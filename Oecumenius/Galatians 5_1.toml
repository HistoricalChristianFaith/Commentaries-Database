[[commentary]]
quote='''
"in the freedom by which Christ has made us free." The law enslaved; Christ has freed us from the curse of the law. Therefore, he says, one must stand in the freedom given by Christ. But the "Stand firm" [Στήκετε] indicates being unshaken.

"do not again submit yourselves to a yoke of slavery." The word again indicates their insensitivity. And by saying yoke, it shows the heavy burden of the law's slavery.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
