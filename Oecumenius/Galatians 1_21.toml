[[commentary]]
quote='''
"into the regions of Syria." After seeing Peter, the way to the Gentiles was again kept. He says toward the regions of Syria and Cilicia; for he had been sent to those places.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
