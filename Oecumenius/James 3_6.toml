[[commentary]]
quote='''
And the tongue is fire, a whole world of iniquity. The tongue is set among our members, which defiles the whole body, and inflames the wheel of our birth, inflamed of hell.
"world of iniquity." In this place, some wish to signify the multitude, just as where it is said: "The world did not know him," (Jn. 1:10) that is, the popular multitude. Therefore, the world is also the tongue, that is, the multitude of iniquity. And how great if a multitude was said there when it was sent before, how great the matter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on James'
