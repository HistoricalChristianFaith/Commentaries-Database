[[commentary]]
quote='''
And a second time they raised the same hymn, and again he uttered it even more softly, that with the three times repeated alleluia the holy and much-praised Trinity might be glorified by them; for this is God. ...

But to have the elders and the living creatures say Amen denotes assent to the doxology brought by the holy angels; for the Amen signifies the voice transferred into Greek from the Hebrews, "so be it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Revelation%2FTranslation-Litteral.html'
source_title="Commentary on Revelation"
