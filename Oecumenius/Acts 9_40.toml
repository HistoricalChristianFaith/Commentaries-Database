[[commentary]]
quote='''
What then did Peter do? He put them all out, so that they might not be disturbed by tears nor be agitated. And having knelt down he prayed. For not always did the miracles follow immediately upon his prayer. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
