[[commentary]]
quote='''
Which nations rose up against Christ? The nations of the Jews, namely. For although they were all Jews, nevertheless they came from various nations among which they were scattered. "Do whatever your hand and your will have ordained" (Acts 4:28): that is, they could not do it themselves, but you are the one who permitted and brought the whole matter to completion, namely prudent and wise. Indeed they had come together as enemies with savage intent, but they were doing what you wished.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
