[[commentary]]
quote='''
"But let each person prove." Let each person examine his own deeds which he himself performed in life. For by doing this he will prepare himself for better things. Yet this is not the act of one who judges, but of one who humbles himself. For it is not fitting, he says, to boast; if anything, at least do not, he says, boast as the Pharisee did against your neighbor, but against yourself. (see Luke 18:9-14)

— [THEODORET] In another way. But if you wish to make a display of your dignity, he says, inspect your own life; and even if you find it blameless, boast of yourself according to your own standard, provided indeed that this is what you ought to do. [end of the excerpt by Theodoret] —
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
