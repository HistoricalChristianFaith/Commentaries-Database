[[commentary]]
quote='''
By a certain arrangement the Apostle fled here, not seized by fear, but both wishing to increase his preaching and to extinguish the madness by which they were afflicted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
