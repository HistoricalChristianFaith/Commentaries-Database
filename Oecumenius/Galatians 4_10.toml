[[commentary]]
quote='''
Paul argues with those from the Jews, showing that the observance of days and months and seasons and years and whatever in the law is observance is idolatry. For this, he says, is nothing else than worshiping the moon and the sun, by which the days have their observance. He said this about property, wanting to depart from the law. For those who preach circumcision also proclaimed such observances.

You observe days. From this it is clear that the false apostles proclaimed not only circumcision, but also observances of these, having taken their origin from the law, yet having deviated from the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
