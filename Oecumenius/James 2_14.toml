[[commentary]]
quote='''
What shall it profit my brethren, if a man say he has faith: but has not works? Shall faith be able to save him?
Notice the spiritual understanding. For James did not only say: If you have faith, but also: What is the benefit? As if he were saying: Show me the work from which I can judge that this title suits you: for that is the benefit of faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on James'
