[[commentary]]
quote='''
"to choose men from among them to send." They decided that it should not serve merely to have the letter present, for fear that they say that they had seized one thing for another by speaking falsely, but so that the matter might also become more credible, they send those from among them, that Barnabas and Paul may be beyond suspicion. And so that it may not seem to be slander that Paul and Barnabas were the ones sent, they entrust them. They say that men who have risked their lives for the name of our Lord Jesus Christ. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
