[[commentary]]
quote='''
From John's baptism he prophesies, and he leads them to understand that this was John's baptism. From this point it is shown that John's baptism was incomplete. For he did not say that it was forgiveness, but that it was of repentance. Then, having been baptized into the name of the Lord, he says that by the laying on of Paul's hands they immediately receive the Spirit. But this he did not see; for it is invisible. Yet grace gave some perceptible proof of that operation. And one spoke in the Persian tongue, another in the Roman, another in the Indian, another in some other such language; he uttered speech. And this was revealed to those outside, that the Spirit was in the one who uttered, God showing that this is of the highest authority. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
