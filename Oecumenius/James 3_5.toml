[[commentary]]
quote='''
So the tongue also is certainly a little member, and boasts great things. Behold how much fire what a great wood it kindles?
"So the tongue also." As if it were said: In the same way, the tongue must be rightly moved, which, although it is a small member, nevertheless accomplishes great things, both good and bad: however, the discourse is not so explicit, since the one who writes this is a disciple of a condensed writing style.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on James'
