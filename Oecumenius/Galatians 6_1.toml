[[commentary]]
quote='''
Many, overcome by an ambitious striving for dominion, satisfied their desire in reproving the faults of their neighbors; which he corrects by saying: If anyone is caught in a sin. For this is the kind of thing, anticipated, "you who are spiritual." Those who live according to the spirit, "restore," that is, correct such a one. Then, casting out self-love, he says, "in a spirit of gentleness." That is to say, in gentleness, which is a gift of the Holy Spirit.

"Be watching yourself." Then, so that the one correcting might not become arrogant, he says: Be watching yourself also, and guard yourself, for fear that you fall by the same snares.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
