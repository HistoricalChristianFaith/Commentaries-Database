[[commentary]]
quote='''
And the phrase, "to you has been sent this message," shows the Jewish courtesy; and he mentions Pilate, so that they are accused more heavily as having handed him over to a foreigner. And the phrase, "they asked," he says, received favor, as if he were unwilling; which Peter also states more clearly: judging him to be released. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
