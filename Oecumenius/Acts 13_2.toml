[[commentary]]
quote='''
What does "they were worshiping" mean? That is, of those preaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'

[[commentary]]
quote='''
"Set apart for me for the work." That is, to a mission. By whom, then, is he ordained? By Lucius and Manaen, but more by the Spirit. He is ordained so as to preach with authority.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
