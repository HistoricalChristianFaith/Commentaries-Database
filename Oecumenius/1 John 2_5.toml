[[commentary]]
quote='''
"But whoever keeps his word, in him truly the love of God is perfected. By this we know that we are in him."
Therefore, whoever knows God is also known by Him, either having become a partner with God and united with God; and in this, the love of God is evident, through which love he will have the perfection that is in God, and by this, he will judge his closeness to God. For perfect love is indeed exhibited through works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
