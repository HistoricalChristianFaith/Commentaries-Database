[[commentary]]
quote='''
"For it is written." And therefore, he says, Sarah was a type of the Jerusalem above, that is, of the Church, because she too being barren and without children, like the church once from the Gentiles, triumphed in offspring over Hagar; and the Church triumphed over the synagogue. And Isaiah is witness to these things: "Rejoice, you barren, who do not bear." (Isa. 54:1) Is Isaiah speaking to the Church composed of Gentiles? He commands her to cry out with joy. "Break forth now," either the barrenness into fruitfulness, or break forth the voice of gladness.

"because many are the children of the desert." He calls the Church from among the nations a desert and barren. For it was a desert of every good thing before they believed in Christ.

"more than of her who has a husband." He called him a man having or directing, governing and providing for the synagogue of the Jews: or as formerly enjoying the providence of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
