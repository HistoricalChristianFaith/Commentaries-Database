[[commentary]]
quote='''
If therefore you are partakers and companions of the heavenly calling, seek those things which are above, and let no one speak to you of the things here below; there is the reward, there is the recompense.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FPseudo-Oecumenian%2520Catena%2520on%2520Hebrews%2FTranslation-Litteral.html'
source_title='The Pseudo-Oecumenian Catena on Hebrews'
