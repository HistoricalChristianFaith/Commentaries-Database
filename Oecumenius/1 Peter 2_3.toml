[[commentary]]
quote='''
For when you have tasted, that is, when you have progressed through the practice of the sacred commandments according to the Gospel, you have recognized the sweetness of the doctrine by sense: for sense is more effective than any word for knowledge, since that which reaches experience is more pleasing than any word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
