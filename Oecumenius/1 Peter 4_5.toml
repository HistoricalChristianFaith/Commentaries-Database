[[commentary]]
quote='''
However, they will not bear such slander unpunished, but will give an account to the judge of all, who sits unchallengeable and firmly for this very purpose: for this is what it signifies in this place to be prepared: just as when it is said, "Preparing mountains in your strength," (Ps. 65:6) and, "Your throne is prepared." (Ps. 93:2) Therefore, those who slander you will give an account to him who judges the living and the dead unchangeably and firmly. How he is the judge of the living and the dead will be made manifest in due course.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
