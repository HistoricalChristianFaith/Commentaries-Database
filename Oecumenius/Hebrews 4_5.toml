[[commentary]]
quote='''
Indeed, he says, "the third rest is the kingdom of heaven. And there again, "If they shall enter into my rest." Behold, therefore, two works, the other indeed of which David said: "If they shall enter into my rest."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FPseudo-Oecumenian%2520Catena%2520on%2520Hebrews%2FTranslation-Litteral.html'
source_title='The Pseudo-Oecumenian Catena on Hebrews'
