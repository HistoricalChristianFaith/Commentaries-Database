[[commentary]]
quote='''
But the wisdom that is from above, first certainly is faithful: then peaceable, modest, vulnerable, consenting to the good, full of mercy and good fruits, not judging, without distinction.
"first certainly is faithful." That is, pure and without stain, adhering to no fleshly thing.
"without distinction." Not discerning the observance of foods and various washings. Paul discusses these matters in detail in the Epistle to the Colossians. (Col. 2:1)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on James'
