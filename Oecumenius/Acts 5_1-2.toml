[[commentary]]
quote='''
Entirely full of Satanic madness, he who seizes what is good impulsively and by necessity and violence, while at the same time lukewarm in his zeal for the value of the good things, having squandered all his possessions. Three signs occurring at the same time: knowledge of secrets; dread of inquiry of the mind; and, in addition to these, removal through commands.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
