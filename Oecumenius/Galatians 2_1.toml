[[commentary]]
quote='''
Regarding the first, Peter stated the cause; regarding the second, the revelation.

"with Barnabas, taking Titus along also." These Paul was bringing as witnesses of his own preaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
