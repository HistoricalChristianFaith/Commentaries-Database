[[commentary]]
quote='''
Little children, keep yourselves from idols. Amen.
"keep yourself from idols." Some have questioned: If John writes this to the perfect, why does he now command them to beware of idols? We therefore say that because he wrote to the whole Church, which was not made up of a select people, but there were also some among them who were less affected. Therefore, he commands all these, looking at their slippery nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
