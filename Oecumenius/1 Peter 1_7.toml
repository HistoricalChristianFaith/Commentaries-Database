[[commentary]]
quote='''
that the genuineness of your faith, being much more precious than gold that perishes, though it is tested by fire, may be found in praise, honor, and glory at the revelation of Jesus Christ,
"In praise, honor." It signifies the reason why the righteous are afflicted through these things, while also comforting them, because through afflictions they become more manifest: and making them more diligent by adding:
at the revelation of Jesus Christ, at that time, through the demonstration of sufferings, a great nobility will be added to those who have competed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
