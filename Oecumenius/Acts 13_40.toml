[[commentary]]
quote='''
The prophecy of the prophet Habakkuk denouncing unrighteous judgment and the excessive forbearance of God, and saying: Why have You shown me toil and trouble? For judgment has arisen against me, and the righteous judge takes, and the wicked oppresses the just, and judgment is not executed to the end; (Hab. 1:3-4) God answers, announcing beforehand the calamities to those who do wrong. He says, moreover, that the things which will happen to them are wondrous. These things, he says, are so many and so great in magnitude that one would even doubt if someone should foretell them to you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
