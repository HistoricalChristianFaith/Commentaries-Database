[[commentary]]
quote='''
Why, I ask, did he not bring any one of the great men who was worthy of trust, or hand him over to the instruction of Paul, but Ananias who was one of the seventy? Since he was not to be led by men, but by Christ himself. For this one neither taught him anything, but only baptized him. For having been enlightened at once he was about to draw much grace of the Spirit from zeal and eagerness. From this it must be noted that those dreams ought to be told which are of public benefit, and contribute to piety, whatever has the presence of the Lord or of angels. There are also private dreams which ought not to be spoken. Yet, if the benefit is private to Saul but a strange healing has occurred, the man is again invited to piety; and therefore it ought to have been spoken of as beneficial to all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
