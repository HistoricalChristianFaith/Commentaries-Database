[[commentary]]
quote='''
In this, love is made perfect with us, so that we may have confidence on the day of judgment, because as he is, so are we in this world.
But having mentioned love, John also refers to all that he has said about love, attributing great faith to the discourse on love. "In this, love is made perfect." He wishes, he says, for us to be perfect in love, so that we may have confidence on the day of judgment, towards Him who was incarnate: for He himself will be the judge, according to his own statement, where he says: "The Father judges no one, but has given all judgment to the Son." (Jn. 5:22) And that there will be confidence towards him who was incarnate, John signified through what he said in the following, that just as he is, we are in this world, saying this: Since it has been shown before that God abides in us, and we are in God, he says, we attest to the perfection of love for ourselves. Just as he was blameless and pure in the world, he also said: "The ruler of this world is coming, and he has nothing in me (Jn. 14:30):" so also we, John says, will be in the world. For there is and we are placed through άντιχρονιαν (where one time is taken for another time), as is the custom of Scripture. Or it signifies something deeper through this. For John has often said that God is in us and we are in God. If this is indeed the case, He is holy in us, that is, the Leader and Prince of holiness: so we should also refer to him in this world sacredly and purely, dead to the world, always bearing his mortification in the body. (1 Cor. 4:10)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
