[[commentary]]
quote='''
Not those faithful from the Gentiles, but those from the Jews demanded that the faithful be circumcised, and that they perform other fleshly things of the law; whom, wishing to boast in their own peculiar circumcision, the disciples did not receive, although they themselves were of the circumcision; for they sought not their own, but the common good and salvation of the world. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
