[[commentary]]
quote='''
"What we have seen and heard, we also declare to you, so that you may have fellowship with us, and our fellowship is with the Father and His Son Jesus Christ."
And what profit do we bring you from this announcement? Namely, that just as we have taken you as partners [κοινωνοὺς] through the words of what we have seen and heard, so you may also be partners of the Father and of his Son Jesus Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
