[[commentary]]
quote='''
But will you know O vain man, that faith without works is dead?
James called a man vain who boasts of a bare faith, when he has obtained nothing of substance for completion through works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on James'
