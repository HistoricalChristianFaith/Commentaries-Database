[[commentary]]
quote='''
Since custom commonly escapes notice, especially in the New Testament calling bishops [ἐπισκόπους] elders [πρεσβυτέρους] and elders bishops, note this here, also from the Epistle to Titus, and moreover to the Philippians, and from the First to Timothy. From Acts therefore there is grounds to be convinced about this. For it is written therefore: From Miletus having sent to Ephesus, he called the elders of the church together, and did not say the bishops.

Then he adds: "In which the Holy Spirit appointed you bishops [ἐπισκόπους] to shepherd the church." (Acts 20:28) And from the Epistle to Titus: "You shall appoint elders [πρεσβυτέρους] in every city, as I directed you." (Titus 1:5) To those who are in Philippi, "with the bishops and deacons." (Philip. 1:1) I think that this should also be assumed from the earlier passage addressed to Timothy. For he says, "If anyone aspires to the office of bishop, he desires a noble task. Therefore, a bishop must be blameless." (1 Tim. 3:1-2) And after a short time: "Let a widow be counted who is not less than sixty years old." (1 Tim. 5:9) For indeed there is a rule of the church, setting forth what such a one ought to be.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
