[[commentary]]
quote='''
Peter does not remain attached to any one of the notable men, but to the tanner, leading us through all things into humility, neither letting the lowly be ashamed nor the great be proud. For those who believed through the miracles desired his teaching concerning God Jesus the Christ, who was proclaimed by him. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
