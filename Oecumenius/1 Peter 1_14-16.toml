[[commentary]]
quote='''
as obedient children, not conforming yourselves to the former lusts, in your ignorance: but as He who called you is holy, you also be holy in all your conduct, because it is written: "Be holy, for I am holy." [Lev. 19:2]
Conforming [Συσχηματιζειν], however, means to shape and adapt oneself to the present circumstances. This is also what some foolish people now say: Conform yourself to affairs and business. Therefore, it commands to renounce such vanities: whether those who were previously knowledgeable and wise, or those who ignorantly clung to these. But now, he says, you, and those like you, be holy yourselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
