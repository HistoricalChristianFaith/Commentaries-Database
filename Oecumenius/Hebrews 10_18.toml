[[commentary]]
quote='''
"Now where there is forgiveness of these things." Of sins, obviously.
"there is no longer an offering for sin." For who, he says, has need of many offerings, when the one that Christ presented is sufficient to take away sins?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FPseudo-Oecumenian%2520Catena%2520on%2520Hebrews%2FTranslation-Litteral.html'
source_title='The Pseudo-Oecumenian Catena on Hebrews'
