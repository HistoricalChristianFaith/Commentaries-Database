[[commentary]]
quote='''
"they saw his face." It even happens that someone who is in a lower rank appears graceful and splendid. Therefore, so that those to whom he was about to speak might be struck dumb by his words, he begins with a facial display, by which his words are more easily received.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
