[[commentary]]
quote='''
For fear that they should think that God proclaimed by him was one of the common gods, he adds in correction: "He does not dwell in hand-made temples." For indeed he dwells in temples, but not in these, rather in the human soul. For he is not said to dwell in the temple of Jerusalem, but to operate there. Nor was he worshiped among the Jews by the hands of men, but with the mind: for he did not so desire those things as if he were in need. For he says, "Shall I eat the flesh of bulls? Or shall I drink the blood of goats?" (Ps. 50:13) and the following.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
