[[commentary]]
quote='''
There is fire, for this reason, that God may appear more fearsome to those who were delivering the law. "And to darkness and gloom." Darkness and gloom signify the shadow of the Old Testament. For if those were figures, it is evident that until the truth came, the figures were obscure, while it was not known what they signified. Moreover, darkness also signifies the invisibility of God. "and to darkness," he says, "under his feet." (Ps. 17:10)
"and a storm." By the word, storm, he excites them when they were sluggish. Indeed, the storm is a twisting of the wind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FPseudo-Oecumenian%2520Catena%2520on%2520Hebrews%2FTranslation-Litteral.html'
source_title='The Pseudo-Oecumenian Catena on Hebrews'
