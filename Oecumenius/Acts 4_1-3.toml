[[commentary]]
quote='''
See how matters are managed. First they were all mocked together. Then, after they became respected in the public speeches and afterward wrought a great marvel, therefore indeed thereafter, having grown bold, God permitting, they enter into dangers, and undertake the contests. See the progress of the Jews to boldness, since seeking the one who will deliver up Christ, now they lay hands themselves, having become bolder after the cross. For they even had the commander, so that they might again cast a public charge upon those who had been, and not avenge as private persons, which they everywhere endeavor to do. Before the multitude they bound the apostles, that seeing them they might work with greater cowardice. Privately they examine them, so that the hearers might not profit from their boldness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'

[[commentary]]
quote='''
While the apostles had not yet recovered from their previous afflictions, they fell into other ones by a certain providential way. For at first they were all mocked as drunk, suspected of the operation of languages unknown to them. Secondly, they enter into dangers. And not successively these things, but first, having been approved in public speeches, and as it were having been trained for boldness through the miracle of the lame man, especially God having granted it, they from that time take up the challenges. Consider for me from that time the ill-deeds of the Jews. For concerning Christ they sought the one who would betray him, whereas here they themselves lay hands on them, becoming more brazen and daring from now after the cross. From which also they used the chief of the temple for daring, converting what had happened into a public accusation and not a private one, as is their custom. They did not, however, immediately make use of the assembly against the apostles, alleging that it occurred in the evening. And to the Jews it was possible to make use of the truce for wrongdoing, by putting them into terror through imprisonment, and therefore to soften them by intriguing beforehand. But the delay toward the apostles was contrived in order that they might become bolder.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
