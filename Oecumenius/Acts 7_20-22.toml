[[commentary]]
quote='''
At that time, then, Moses was born, it says, and he was pleasing to God, that is, well-pleasing or beloved of God. The word "pleasing" primarily signifies one sinless in body in childhood. When he was exposed and Pharaoh's daughter took him up, she taught him all the wisdom of the Egyptians. From this it is clear that external instruction outside the Scriptures is not entirely rejectable. For in the manner of praise it is said that Moses was educated in all the wisdom of the Egyptians. And concerning the three youths and Daniel, that they excelled all in Chaldean philosophy and in the other sciences. (Dan. 1:17) Yet one must attend to these things briefly, remaining faithful to the God-breathed Scripture.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'

[[commentary]]
quote='''
For neither Moses nor those about Ananias and Daniel would have learned foreign education except under force and by power of masters. And indeed they made no use of it at all, unless one might say perhaps that it was good to learn it for the purpose of overthrowing their deceits. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
