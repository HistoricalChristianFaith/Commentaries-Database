[[commentary]]
quote='''
"And we declare to you eternal life, which was with the Father and was revealed to us."
"And we declare to you the life." Therefore, what we have seen, we also declare to you, John says. What is that? That he who is eternal life has been revealed to us, and we have become witnesses of him both before his crucifixion and after his resurrection. For he was indeed nailed to the cross in the flesh, and in that same flesh he rose again.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
