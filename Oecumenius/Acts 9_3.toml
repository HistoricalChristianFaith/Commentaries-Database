[[commentary]]
quote='''
The vision does not occur in a city, but on the road in quiet, so that it might not be possible for others to relate otherwise what happened about him, but that he himself would be credible to relate that he had seen the vision and undergone the suffering.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
