[[commentary]]
quote='''
"for the one who sows to his own flesh." What, then, does one sow in the flesh? Drunkenness, corruption, gluttony, wastefulness. Such a person, from the flesh, that is, on account of the defective flesh, will receive a punishment there. But "to his own flesh" means through the sins sown in the flesh.

"But the one who sows to the Spirit." What does it mean to sow to the Holy Spirit? What else but almsgiving, and self-discipline, and every virtue?

"will from the Spirit reap eternal life." For as the seeds of the flesh and of the spirit are different, so also is the harvest. There corruption, here eternal life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
