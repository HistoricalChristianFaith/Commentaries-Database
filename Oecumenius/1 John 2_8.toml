[[commentary]]
quote='''
"Again, I write a new commandment to you, which is true in Him and in you: because the darkness is passing away, and the true light is already shining."
Thus, concerning the commandment of love for one's neighbor, which has long been established for both Jews and Greeks, John says: "Besides the old commandment that you heard about loving your neighbor, I am writing a new commandment to you: which is true in him who made you familiar with God, and in you who have communion with Him. For he himself says: "I have come as a light into the world," (Jn. 12:46) and the true light, according to his word, now shines (Jn. 1:9); furthermore, in the light, darkness cannot stand (Jn. 1:5): let the true light of love shine from now on (Matt. 5:16), with genuine affection towards your brother, and let the darkness of hatred pass away, that is, let it depart, let it perish."
The phrase means passing away also, as the blessed Paul, where he says, "For the form of this world is passing away." (1 Cor. 7:31) — In another manner concerning this: "I write a new commandment to you." This commandment is new, in that the commandment of Moses was not universal, but distinct according to those who were of the same kin or tribe, urging to love only friends (Lev. 19:18), while having hatred for enemies, as it says: "You shall love your friend and hate your enemy." (Matt. 5:43) The command of the Lord and His apostles, however, is very new, instructing: "Love your enemies and do good to those who hate you," (Luke 6:27) holding to natural existence, and not to that natural affection which clings to wicked men given over to evil arts out of malice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
