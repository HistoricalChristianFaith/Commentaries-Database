[[commentary]]
quote='''
whom having not seen, you love. Though now you do not see Him, yet believing, you rejoice with joy, inexpressible and full of glory,
Moreover, he adds another thing that attracts to the endurance of afflictions. What is that?
"whom having not seen, you love." For if, when you do not see him with bodily eyes, you love him solely by hearing, he says, consider how great a love you will show when you see him, and that when he is manifested in glory: for if his passion has so attracted you, how much will his manifestation affect you with incredible splendor, when he will even grant you the salvation of souls as a reward?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
