[[commentary]]
quote='''
Agabus, the one who long ago foretold the famine. But the troubling thing is that they will hand him over into the hands of Gentiles. And see that when Paul heard that he would suffer countless terrible things, then he was hastening. And Agabus did not say that they would bind Paul, so as not to seem to speak from an agreement; but "the man whose belt this is."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
