[[commentary]]
quote='''
"But you know that because of weakness." That is, because of bodily weakness, namely, after bonds and blows and imprisonments, which I endured at the hands of those opposed to the preaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
