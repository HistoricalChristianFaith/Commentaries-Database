[[commentary]]
quote='''
Therefore, if this is so, he says, who are afflicted according to will of God, so that we do not become sluggish, but rather entrust their souls to a faithful Creator by doing good. He said, according to the will of God, either signifying that our afflictions are not without divine providence but are distributed to us as a test from Him; or that, being afflicted by the will of God, we attribute the outcome to Him. For He is indeed faithful, that is, secure and who does not lie in His promises: nor will He allow us to be afflicted beyond what we can bear. But how should one commit oneself to God? (1 Cor. 10:13)
By doing good, Peter says. And what is that? By the modesty of the soul, committing oneself to Him without exalting oneself because of what one suffers: but the greater the suffering seems, the more firmly one should cling to Him, so that one considers oneself useless and says, "for you are righteous in all the things that you have done to us." (Dan. 3:27) Moreover, the wicked and the sinner differ in this respect: for the wicked is completely alien to God, while the sinner clings to God somewhat, but as one who despises Him and transgresses His laws. However, one can be both wicked and a sinner: for whoever works iniquity acts wickedly, in that he sins, thinking that God does not exist.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
