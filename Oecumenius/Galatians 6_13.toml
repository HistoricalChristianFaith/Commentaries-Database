[[commentary]]
quote='''
"but they desire that you be circumcised." He shows that vanity is the aim of all their actions. For he says that these who are circumcised and who circumcise you do not do this as if keeping and observing a law, but in order that they may have an occasion for boasting by circumcising you. For that is what he means by "in your flesh," namely, that they may be teachers, he says, and have you as disciples.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
