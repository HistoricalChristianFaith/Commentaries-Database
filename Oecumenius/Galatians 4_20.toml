[[commentary]]
quote='''
"I would indeed be present with you now." — [OECUMENIUS] See love. "I am not content," he says, with letters; I sought to be present with you, and to exchange weeping and mourning for teaching delivered in words, so that, he says, I taught you with weeping. For I too am at a loss what to say about you. How is it that you who were exalted by the knowledge of the Gospel have been cast down and dragged to the ground, again held by the law? [end of the excerpt by Oecumenius] —

"and to change my tone." For some, to turn it into weeping; for others, to marvel at the certainty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
