[[commentary]]
quote='''
Knowing only John's baptism. It is worth asking how, if he knew only John's baptism, he nevertheless possessed the Spirit; for the Spirit was not given in that way. And if those who came after him needed the baptism of Christ, much more would he have needed it. What then is one to say? For he did not simply set both side by side. It seems, therefore, that he was one of the one hundred and twenty who were baptized after the apostles. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
