[[commentary]]
quote='''
"For by one offering," which Christ offered, he perfected, having made perfect, he completely freed from sins.
"those who are being sanctified."That is, the faithful. For they are sanctified by the aforementioned offering.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FPseudo-Oecumenian%2520Catena%2520on%2520Hebrews%2FTranslation-Litteral.html'
source_title='The Pseudo-Oecumenian Catena on Hebrews'
