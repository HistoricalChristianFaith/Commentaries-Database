[[commentary]]
quote='''
"And those who will walk by this rule." He says, "May those who are satisfied with this rule and this teaching regard everything as a new creation, and not subject themselves to the law."

"and upon the Israel of God." Israel is a faithful people, as if devoted to God. And whoever has been unfaithful, even if he descends from Jacob, is cast out from the kinship that is toward him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
