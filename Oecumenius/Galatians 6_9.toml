[[commentary]]
quote='''
"Let us not become weary," nor grow tired, because rewards are in the future. For there will surely come a time when we will receive the good things and reap the generous things now sown for us. Then, since he mentioned a harvest and that it requires toil and labor, he added, "do not give up," as if to say: The one who reaps then does not grow tired nor become exhausted, as in this present world. Therefore do not, having heard of the harvest, again prepare yourselves to labor. For even in regard to perceptible things [αἰσθητῶν] the seed had labor, and the sickle likewise. For ploughing undoes many things, both the ploughing itself and the heat of the season. But that reaping is not such; the sickle is free from labor. For it is free from pain and sweat. For he said, "do not give up."

— [PHOTIUS] Or "do not give up." That is, not becoming unpracticed, nor withdrawing from generous action. For the crown belongs to those who are led on to the end. [end of the Photius excerpt] —
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
