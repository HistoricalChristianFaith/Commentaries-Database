[[commentary]]
quote='''
For whatever is born of God overcomes the world. And this is the victory that overcomes the world, our faith.
After he has arranged these things in this way, he adds to what has already been said another thing that leads to the showing of love, what is that? Victory (ὴν νίκην). For John says: you who establish yourselves as sons of God by love for your neighbor, you already have this that accompanies that excellent deed, namely, to conquer the world; For whatever is born of God overcomes the world. Then John adds victory, and what is the cause of victory, and he says that both agree with faith, namely, that which is towards God, which also born of God, has conquered and driven away all disbelief; neither Jew, nor Greek, nor Heretic can do anything against it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
