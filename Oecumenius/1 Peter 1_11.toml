[[commentary]]
quote='''
inquiring what person or time the Spirit of Christ within them was indicating when he testified in advance about the sufferings that would come upon Christ and the glories that would follow.
"inquiring what person or time the Spirit." To that, namely the consummation of the age: such as when the Jews, through various captivities, deviating from the perfect worship of God, were constituted towards the mystery of Christ. Note, however, that the spirit of Christ openly contemplates and discusses Christ. Moreover, this Spirit signified the afflictions of Christ, as Isaiah indeed says: "He was led like a sheep to the slaughter." (Isa. 53:7) And through Jeremiah: "Come, let us put wood in his bread." (Jer. 11:19) Moreover, the resurrection through Hosea: "On the third day we will be raised up before Him, and we will pursue Him to know the Lord; as the dawn is ready, we will find Him." (Hos. 6:2-3)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
