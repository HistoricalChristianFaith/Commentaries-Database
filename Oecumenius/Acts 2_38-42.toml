[[commentary]]
quote='''
As the mouth of all the apostles put forward, Peter says, Repent and be baptized, not believe, but, "Be baptized." For this is the foundation of those who believe in Christ. Therefore he requires this first, and after this he brings the end toward the foundation, saying "the gift of the Holy Spirit," as revealed through this faith. And by saying, "For to you is the promise and to your children and to all who are far off, and to those who are near," he indicates the greatness of the gift, that it is sufficient not only for them but also for their children. And it is bestowed upon the Gentiles as well. For he hinted at this by "those who are far off"; but if to those who are far off, then all the more to you who are near. Consider also that then he hinted at the faith of the Gentiles, when he found them humbled and having judged themselves. For when a soul condemns itself, it is no longer able to envy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
