[[commentary]]
quote='''
A trance denotes also a wonder-struck astonishment, and the soul's being led outside the senses toward spiritual things. From this it is clear that some kind of spiritual vision came to him, as it were, his body being out of the soul's ordinary state.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
