[[commentary]]
quote='''
"Whoever says he abides in him ought to walk in the same way in which he walked."
However, since it happens that someone may convey precepts rightly and precisely, while their own affections are sluggish: this is far from God. Therefore, it is said that one who abides in God should also direct the paths of their own life according to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
