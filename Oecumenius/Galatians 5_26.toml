[[commentary]]
quote='''
"Let us not become conceited." For this is the source of all evils.

"provoking one another." Clearly into quarrels.

"envying one another." For envy comes from conceit, and from envy, countless evils.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
