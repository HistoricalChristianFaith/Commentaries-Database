[[commentary]]
quote='''
"no one is justified before God." For perhaps he may seem righteous before men.

"the righteous shall live by faith." For there is one way of being justified, he says, the one through faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
