[[commentary]]
quote='''
Thus, therefore, according to the ages, with the spirit tempered by its own discourse: while these were indeed affected by his treatises, others would approach faith in such a way that they ought to be instructed in various ways according to their quality, John subsequently adds a discourse of exhortation, and says:
"Do not love the world." (1 Jn. 2:15) He speaks these things as if to children. For children are always affected by apparent pleasure. Then, stating the reason why one should not love the world and the things that are in the world, he confirms the doctrine handed down to the fathers and the young men: for they are helped by a more perfect disposition. And do not think that he has signified by his discourse what the world is, gathered from heaven and earth; he adds who the world is, and what those things are that are in the world.
And indeed, it says that the world is a vile crowd, which has no love of the Father in it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'

[[commentary]]
quote='''
"Do not love the world, nor the things that are in the world. If anyone loves the world, the love of the Father is not in him."
We have already mentioned what John is calling the world, "a vile crowd", for which the Lord also says to the disciples: "You are not of the world, just as I am not of the world." (Jn. 17:16) The father of this world is the Devil (see Jn. 8:44 and 2 Cor. 4:4), I say, of worldly pleasure and confusion. Therefore, the Lord says to the Father about His disciples: "I do not ask that You take them out of the world, but that You keep them from the Evil One," (Jn. 17:15) or from the world: whom He also says elsewhere is "established in the evil one" (1 Jn. 5:19). — In another way: If the Evil One opposes the good Father, then he who serves the desires of the world is not from the Father, but is of the world; it is clear that he who is not from the Father, but from the world, is also from the Devil: as He says to the Jews in the Gospels: "You are not from the Father, but from the Devil" (Jn. 8:44): that is, from worldly pursuits and exercises, of which the Devil is the sower and planter. (see Matt. 13:24-43)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
