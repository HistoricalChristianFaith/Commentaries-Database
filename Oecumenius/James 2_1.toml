[[commentary]]
quote='''
My brothers, do not hold the faith of our Lord Jesus Christ with bias to individuals.
"with bias to individuals." For he who does something with respect to individuals fills himself with many blemishes and much reproach, afflicting his neighbor with disgrace, and also himself before him: for the treatment of a companion transmits what is done even to oneself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on James'
