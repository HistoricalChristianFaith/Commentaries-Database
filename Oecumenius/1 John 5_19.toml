[[commentary]]
quote='''
We know that we are of God, and the whole world lies under the sway of the wicked one.
For unless it were so, since the world is established in evil (and the world refers to those who have not committed themselves to God through good works), nothing would prevent us from being examined along with those who perish: because the mind of man is continually inclined to evil from early youth, as God revealed during the time of the flood. (Gen. 8:22)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
