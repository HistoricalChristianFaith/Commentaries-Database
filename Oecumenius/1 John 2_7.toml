[[commentary]]
quote='''
"Brothers, I am not writing a new commandment to you, but an old commandment which you had from the beginning. The old commandment is the word which you heard from the beginning."
Since this letter was general and directed commonly to all, both Jews and Greeks: to the Jews indeed he directs his speech when he says, "I am not writing a new commandment to you, but an old one," speaking of love. For it is written in the tablets of Moses: "You shall love your neighbor as yourself." (Lev. 19:18) To the Greeks, indeed (let someone say), what is written about the ancient commandment, when this is found nowhere? Therefore, we say that there was also a written law concerning love for neighbors. Where and how? Indeed, it is written on the tablet of the heart through natural understanding. And that the natural intelligences sown in us are called law, Paul is correct to confirm this statement, who says: "I see another law opposing the law of my mind which is in me." (Rom. 7:23) The law, therefore, or the old commandment, was also received by the Greeks, as nature itself is a lawgiver, that they should be kind to all relatives and love one another, inasmuch as man is a social animal: which could not happen without love. Moreover, the ancients write in history that many men have exposed themselves to death for one another. Our Savior gives a greater sign of love when he says, "Greater love has no one than this, that someone lay down his life for his friends." (Jn. 15:13)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
