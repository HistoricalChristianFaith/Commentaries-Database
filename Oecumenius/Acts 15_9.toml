[[commentary]]
quote='''
"and he made no distinction," he says, "between us and them, cleansing their hearts by faith," that is, having affected a cleansing of the sins coming from their hearts. And this cleansing seemed like circumcision, and instead of circumcision in the flesh is given circumcision in the Spirit, which cleanses the hidden things by faith toward Christ. That physical circumcision is not of benefit is shown from the fact that it was given to the male alone. But in Christ Jesus, by true faith, "there is neither male nor female, there is neither slave nor free, there is neither Greek nor Barbarian, but we are all one." (Gal. 3:28) [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
