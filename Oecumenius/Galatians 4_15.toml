[[commentary]]
quote='''
— [PHOTIUS] "Who then was the blessing to you?" He was someone, not asked as a question, but as if marveling and lifting up their former faith and the blessing upon that faith. What it was, how great it was, wondrous, he says: from what great blessedness you have fallen. Or by interrogation, What was it? Remember, he says, how great your blessedness was: for I was blessing you very greatly; but now what? I reproach; therefore I am held in hatred. But why do I reproach? For your salvation. For if this were not so, how could I, without offering any other pretext of yours, the one who praises and blesses, have come to reproach?" [end of the excerpt by Photius] —

"the blessing to you." Who was, he says, the blessing to you, whom I and many others blessed you for, concerning obedience and submission to the Gospel? Who then was he? he says; for now I do not see him. Where, he says, are the zealously accomplished works of faith? for he has put the who instead of where.

"your eyes." I know, Paul says, that you regard me as more precious than your own eyes because of my long-standing preaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
