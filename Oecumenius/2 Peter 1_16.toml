[[commentary]]
quote='''
When Peter had said that they should diligently attend to themselves, and that those things which had been announced to them were indeed so, and he had explained this at length, frequently: although he knew and they had heard in various ways, he now adds their confirmation and says: I do not apply a vain diligence to these matters, but since I know the truth of them to be certain and undoubted, I dwell on them. And what is this?
We made known to you the power and coming of our Lord, not by human wisdom with adorned speeches, as if deceiving your hearing with tricks, as the Greeks and heretics do: indeed, the Greeks using elaborate speech and deception; the heretics, however, with fabricated words: just as the Valentinians fleeing into profound depths and silence. For it is likely that they were beginning to arise. Therefore, there is nothing of this kind to be found in us, but we have delivered to you the teaching in a simple and humble manner: which Paul also says to the Corinthians (1 Cor. 2:1): and those things which we have from the sight of our own eyes, we who ascended with him to the holy mountain. Peter says, however, that the Lord showed them on the holy mountain the glory of the Only Begotten (Matt. 17:1), and the voice that they heard from the Father brought down from heaven concerning the Lord. Moreover, since we have known through the things themselves and experience what was proclaimed by the prophets, he says, we judge their prophecy to be more sure through these things: for the things themselves have followed the sayings and oracles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 2 Peter'
