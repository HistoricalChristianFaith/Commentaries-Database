[[commentary]]
quote='''
"Therefore, let what you heard from the beginning remain in you. If what you heard from the beginning remains in you, then you will remain in the Son and in the Father."
Therefore, John says this: but you, let what you have heard from the beginning, namely the divine teaching about Christ, remain in you. The name means, "Let it remain in you."
"For if what you heard from the beginning remains in you, you will also remain in the Son and in the Father." This is, you will be his partners.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
