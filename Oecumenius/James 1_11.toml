[[commentary]]
quote='''
For the sun is no sooner risen with a burning heat, but it withers the grass, and the flower thereof falls, and the beauty of its appearance perishes: so also shall the rich man fade away in his ways.
"in his ways." James speaks of ways or paths of the rich, in prosperous success, or business, among which he unexpectedly receives a change to unhappiness and misfortune.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on James'
