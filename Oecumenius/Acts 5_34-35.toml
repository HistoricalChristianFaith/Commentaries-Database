[[commentary]]
quote='''
This Gamaliel was the teacher of Paul. (see Acts 22:3) That a teacher who was respected for his legal judgments should not believe this, even if not entirely understanding it, is extreme folly. And from his words themselves, which differed also in understanding, he shows sufficient evidence. And it is also evident from those very actions. For ordering the apostles to be expelled from the council, in order to intimidate them, he even made the innocent appear to himself, not as one pardoned by shared opinion, but as making excuses for their words. Therefore he does not use great violence, but as if they were drunk with passion he says: "be careful about these men; consider what you propose to do," as if, "Do not act as chance carries you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title="Commentary on Acts"
