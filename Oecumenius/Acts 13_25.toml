[[commentary]]
quote='''
John testifies, not simply, but bringing all glory upon him, he himself rejects it. For it is not equal for honor to be repelled from one who gives nothing and from many who grant it. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
