[[commentary]]
quote='''
While the apostles had not yet recovered from their previous afflictions, they fell into other ones by a certain providential way. For at first they were all mocked as drunk, suspected of the operation of languages unknown to them. Secondly, they enter into dangers. And not successively these things, but first, having been approved in public speeches, and as it were having been trained for boldness through the miracle of the lame man, especially God having granted it, they from that time take up the challenges. Consider for me from that time the ill-deeds of the Jews. For concerning Christ they sought the one who would betray him, whereas here they themselves lay hands on them, becoming more brazen and daring from now after the cross. From which also they used the chief of the temple for daring, converting what had happened into a public accusation and not a private one, as is their custom. They did not, however, immediately make use of the assembly against the apostles, alleging that it occurred in the evening. And to the Jews it was possible to make use of the truce for wrongdoing, by putting them into terror through imprisonment, and therefore to soften them by intriguing beforehand. But the delay toward the apostles was contrived in order that they might become bolder. Indeed the ploy was to bind them before the multitude, but examine them secretly: for they feared those who were bound in the sight of the crowd, and examined them supposedly before a court as lawbreakers; privately, however, that the audience might choose the better course not by their bluntness, and by the wonder of those being examined. But they nevertheless question them with authority, though knowing (for how could they have been ignorant, who had arrested them because they proclaimed Christ's resurrection?), thinking that they would deny it out of fear of the tribunal: and as if, by questioning them, the whole matter would be resolved. "You did it," they say, namely, "By what authority did you do it?" as if it had been carried out by their own authority, not by the authority of Christ. But they did not say "the lame man" by name: for they were so distressed by this that they did not even want to mention the healing. Therefore Peter answered: "in the name of Jesus Christ of Nazareth, whom you crucified, whom God raised from the dead." (Acts 4:10) We preach, he says, humility, boasting on account of the excellent resurrection. But when he had urged them with these words, he also adds what is from Scripture, saying "the stone which the builders rejected is become the head of the corner," (Ps. 118:22) and whatever formerly on this matter was treated by us. Consider also that where it is fitting to teach, they even bring forward prophecies, as in the earlier sermon: but when they speak freely alone, they express an opinion: "For there is no other name given," he says. (Acts 4:12) And what this is has already been said. Yet they do not lead the apostles before Pilate as they did Christ, but they themselves judge: first indeed affected by shame and modesty, then fearing for fear that they too be accused by these concerning him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
