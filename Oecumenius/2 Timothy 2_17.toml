[[commentary]]
quote='''
like gangrene. Gangrene is a infected ulcer, consuming the place, causing rotting; some say it is a creeping ulcer, or erysipelas.

He who is Hymenaeus..." Of those ones who utter profane and empty chatter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='COMMENTARY ON 2 TIMOTHY'
