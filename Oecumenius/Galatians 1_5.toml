[[commentary]]
quote='''
"to whom be the glory forever and ever." Reflecting on the indescribable benefits of God through the things said, he finished his speech in doxology. For he could not express them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
