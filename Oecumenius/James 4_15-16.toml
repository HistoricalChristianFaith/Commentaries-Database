[[commentary]]
quote='''
for that you should say, If the Lord wills, and if we live, we will do this or that. But now you glory in your arrogance. All such rejoicing is wicked.
Furthermore, having intercepted such speech by this example, it again returns from the perspective to what was following. For the whole particle is to be ordered in this way: Now you who say, "Today or tomorrow we will go to that city, and we will spend a year there, and we will trade and make a profit," for what you ought to say. If the Lord wills, and if we live, we will do this or that. "But now you glory in your arrogance." Since this was truly a consequence of the discourse, it does not do this, but after it interrupts the continuity of the discourse with an example, it subsequently adds what it intended, by portraying the thing and proving the vanity that lies beneath what distracts us regarding this world. It is to be understood in this way:
"Glory in your arrogance." Who are you that do not know what will happen the next day? What is your life? etc. By saying, "What is your life?" it despises life, and by this, it paves the way with an example set against brittleness, thus it also adds an example, rendering this most solid.
"Glory in your arrogance." The arrogant and arrogance are affections for non-sustaining things. Therefore, it is also called ἁλαζών, which means "living with the sea," that is, living with something unstable and lacking permanence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on James'
