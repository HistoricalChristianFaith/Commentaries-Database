[[commentary]]
quote='''
receiving the end of your faith, the salvation of your souls.
Therefore, in order that you may be known in such a way, also receiving such glory, show the briefest endurance in time, and you will have the highest goal of your purpose.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
