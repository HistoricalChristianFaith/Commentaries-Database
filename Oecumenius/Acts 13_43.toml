[[commentary]]
quote='''
Respecting here and going forward those who are fervent and passionate in the worship surrounding it, he calls them rather zealots than the others. For such persons accepted the faith in Christ sooner than others, being able to perceive its superiority and greatness, and not from human passion, but from a regard for truth and a love of devotion and the reverence they previously held, becoming zealots for that. And again such persons were more incited and enraged against the disciples and the preaching, as showing greater zeal for their own worship than the others. Or he calls proselytes those who worship privately. And speaking publicly and saying: "Men of Israel and you who fear God," (Acts 13:16) he called the proselytes those who fear God, praising some as belonging to the nation and naming them Israelites, and, because he could not say that of others, equating them with respect to religion. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
