[[commentary]]
quote='''
They replied, saying, as if something had been entrusted to them, and this they speak as if concerning a debt. For by divine signs they were showing divine power of Him who had risen from the dead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
