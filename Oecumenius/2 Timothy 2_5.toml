[[commentary]]
quote='''
And if anyone competes as an athlete, he is not crowned unless he competes according to the rules.

unless he competes according to the rules. For it is not enough merely to be anointed, or to enter the place of combat, or to engage in hand-to-hand fighting with the enemy, but it is also necessary to endure and to win: for this is the law of combat.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Pastoral%2520Epistles%2FTranslation-Litteral.html'
source_title="COMMENTARY ON 2 TIMOTHY"
