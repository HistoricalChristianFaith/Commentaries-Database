[[commentary]]
quote='''
Here, in the passage "bound," it is necessary to insert, so that either the mind be such: I am going to Jerusalem, having foreknowledge through the Spirit of the things that will be; and yet I go as a prisoner. Then, for fear that anyone suppose it is bondage or compulsion, and to show that he departs willingly, he says that "in every city, saying that bonds and afflictions await me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
