[[commentary]]
quote='''
He is about to say that Peter went down from there; so that you may not think this a cause for alarm, he prefaced it by saying that the churches enjoyed peace. For when the height of the persecution was on, the apostles stayed in Jerusalem; but when there was peace, they preached also to the other places.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
