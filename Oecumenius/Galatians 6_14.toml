[[commentary]]
quote='''
How sad a thing it has become! But what is the boast? That he accepted to be crucified for us the unworthy. For this is the occasion of our boasting. May it be my boast, then, to boast in the cross of Christ, which seems to be foolishness and a thing of reproach to unbelievers.

"through which the world has been crucified to me." He says "world" meaning the things of livelihood, the praise of men, the glory. Therefore all those things that are with me are dead. Then he says with emphasis: "And I," he says, "am dead to these," indicating by the double deadness the utter avoidance of them and their complete inactivity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
