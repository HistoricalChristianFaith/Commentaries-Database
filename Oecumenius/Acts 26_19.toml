[[commentary]]
quote='''
A heavenly vision [Ὀπτασία] is the pure sight that transcends man. What a person in the flesh is unable to see, unless his eyes are revealed to him, cannot be seen. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
