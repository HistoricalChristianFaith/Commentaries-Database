[[commentary]]
quote='''
How at his feet? For she stood near him. And he set her near, so that if she wished to repent and confess, she might not be ashamed before the others as one overheard. The fear of the wisest Peter toward those who have stumbled is not of hardheartedness, but of predictive teaching concerning the many sins of people that lie ahead. For when the seeds of the Gospel begin to be sown, and immediately the weeds which we have seen spring up, they would at once have uprooted them. Therefore Moses also ordered that the transgressor mentioned in the introductions of the law, and one who is to be destroyed for a slight sin, be declared by God to be cut off. The same thing likewise upon the first-created ones, therefore condemned by tasting of the tree. (see Gen. 3) For when a plague scourges, the more cunning becomes more senseless, according to the sacred proverb. (see Prov. 19:25) Therefore upon these things the punishment advanced as a gain for those present and seeing the things that happened. And indeed there were other signs that appeared, but there was not so great a fear. Therefore the Lord is known for executing judgment. (Ps. 9:5) For in the deeds of his hands, in the drama concerning the sinner, a beneficial fear is born in others. Even as in the case of Uzzah's punishment. (2 Sam. 6, 1 Chron. 13) For his chastisement became a fear to many, so that things placed before God were kept untouched by the disrespectful. It must be noted also from here, namely from the carrying out of the dead Ananias and his wife, through the same funeral rites, the law being disregarded. For even those who touched the corpse of Ananias did not remain unclean until evening, but the same persons also served the dead wife.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
