[[commentary]]
quote='''
There is nothing contrary to this in what the Lord said, "The law and the prophets" up to John. (Matt. 2:12) For this concerns those prophets who proclaimed his coming beforehand. So that they would not think the famine occurred because of this, that Christianity had arrived, the Holy Spirit foretold it beforehand. And Christ himself also said this (see Matt. 24:7), not because it was necessary that this happen from the beginning, but because of the evils that befell the apostles. And God was patient; but when the time came, a great famine occurred, announcing the evils that would come upon the Jews. And if it was on their account, it was nevertheless fitting that even those present should cease. For it would have been better if they had prospered, since they committed their own deeds: they murdered, punished, scourged, and everywhere persecuted. Therefore the famine occurred, even if the wretched people did not understand, and Christians shared in their suffering because of this. It should be noted that the apostles also had the rank of elders. And elsewhere it is noted in other chapters that they had the order of deacons and bishops. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
