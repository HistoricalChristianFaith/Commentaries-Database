[[commentary]]
quote='''
"Take these and be purified with them." They counsel him to make his defense by deed, not by word. They therefore say this: Provide the offerings prescribed by the law on their behalf, so that you may remove suspicion, and show that not only do you not teach outside the law, but that you yourself also observe what is in the law. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
