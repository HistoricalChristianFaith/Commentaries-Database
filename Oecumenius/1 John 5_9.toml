[[commentary]]
quote='''
If we receive the testimony of men, the testimony of God is greater: for this is the testimony of God, which he has testified of his Son.
Having said these things, he adds a persuasion of the things that are said, by a lesser argument, saying: If we receive the testimony of men about any common matter, ought we not to receive the testimony from God who is greater? Indeed, is not this testimony about His Son or Christ from God?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
