[[commentary]]
quote='''
This James, appointed by the Lord as bishop of the Jerusalem church, was the son of Joseph the carpenter, and a brother according to the flesh of our Lord Jesus Christ. From youth he was wise, and the message of the prophets is confirmed by both ancient and recent events. For he had no need to display any work, as Peter and, indeed, Paul did. It is well managed through those things that events not destined to delay for the people of Jerusalem come to pass. But this one who taught them was not to be held responsible, nor indeed to be torn away from his conviction.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
