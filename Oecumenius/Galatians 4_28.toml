[[commentary]]
quote='''
Not only was the Church barren as Sarah was, nor afterwards did she have much offspring like her, but it was begotten in the same manner. For Sarah did not bear Isaac by the law of nature, but by divine grace. Nor does the Church give birth by the law of nature in the baptismal font, but by divine grace. Do you see how the type in every respect agrees with the truth?

"according to Isaac." For we were not begotten according to nature, but according to grace, as Isaac through the promise.

He says, "But we, brothers, are children of the promise according to Isaac." Therefore being free, we ought not to be enslaved under the law of Moses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
