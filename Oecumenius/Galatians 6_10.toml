[[commentary]]
quote='''
"as we have opportunity." For in this life, the opportunity is for work; there it is no longer.

"let us do good to all people." Toward Jews, toward Greeks, and especially toward the faithful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
