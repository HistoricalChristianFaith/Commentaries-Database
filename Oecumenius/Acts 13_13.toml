[[commentary]]
quote='''
"John, having withdrawn." This is John, also called Mark, the cousin of Barnabas, who also wrote the Gospel according to Mark and was a disciple of Peter the chief, of whom he says in the Epistle: "Mark my son greets you." (1 Peter 5:13) Therefore this man, since the journey concerning Paul was to be prolonged, withdrew from them, although being a servant, because he would not undergo the dangers. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
