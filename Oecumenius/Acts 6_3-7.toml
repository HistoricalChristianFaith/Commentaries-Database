[[commentary]]
quote='''
They remained filled with the Holy Spirit and wisdom, the appeal of the apostles required those who were to be chosen. For it is not for anyone to bear the curse of orphans and widows, nor of those who consume and devour them. For although he may not have been a thief, yet through sloth and his own negligence losing everything, or rashly perverting whatever he meets, they would bring no benefit to the office, nothing from the toleration of nothings, which is the greatest sign of wisdom. He says moreover that the word of God was growing through such a kind of descent (showing how great is the power of almsgiving), so that not even the assembly of the priests deviated from the purpose without being taken up together.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
