[[commentary]]
quote='''
Here Paul first preaches in Antioch of Pisidia. He would enter the synagogues in the appearance of a Jew so as not to be driven away, and therefore everything succeeded.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
