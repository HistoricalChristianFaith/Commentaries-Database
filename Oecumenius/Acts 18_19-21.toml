[[commentary]]
quote='''
He left Priscilla and Aquila in Ephesus, he said, [and did this with good reason], as if they were teaching there. For since they had been associated with him for so long, they had learned very many things; yet he had not been able to dissuade them from the Jewish custom. For this reason, when Paul was a prophet, and knew that he would return, he did not simply promise that he would return, but added, if God wills. Clearly teaching us not to promise anything about the future except by adding, if God wills. For no one knows what a coming day will bring forth. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
