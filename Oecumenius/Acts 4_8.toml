[[commentary]]
quote='''
"Rulers of the people," according to the position of the rough crowd.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'

[[commentary]]
quote='''
"Elders of Israel," according to the teaching and solid authority of the people raised toward greater sanctity. For he divided the assembly of hearers into two, so that those of them who are not equally capable of understanding what is said, some only casually hearing the words, others receiving the announced matter more effectively and more deeply into the soul, might be addressed suitably. Since therefore, as you have taken upon yourselves the care of the order to which you were preferred, you chose to examine us today, the men who have ministered in kindness to a person's weakness, and not to distribute to that work itself with wonder and reverence the honor due to it, by which name such a good has been conversed, for I say, since you have fallen into such great error, what else remains to be done here than that we awaken you from this deep sleep, saying both to you and to the people that by this name we have accomplished it? The name in this place means the reputation that is held about him and the glory. As the Psalmist also says when he speaks: "How wonderful is your name in all the earth!" (Ps. 8:1) Such a reputation has been poured out among you, that not only it is not honored in glory, but even he who bears such a name you have subjected to the death of evildoers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
