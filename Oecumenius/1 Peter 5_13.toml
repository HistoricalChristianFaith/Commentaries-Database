[[commentary]]
quote='''
Peter calls Rome Babylon, because it was so remarkable and distinguished, as it had been for a long time in Babylon.
Peter calls his son Mark according to the spirit, and not according to the flesh. To him, he entrusted the task of writing the Gospel. However, some have dared to assert that Mark was the son of the divine Peter according to the flesh, using as an argument what was said by Luke in the Acts of the Apostles. (Acts 12:1) For he says that Peter was miraculously brought out of prison by the angel of God, in which Herod had kept him, and after being released from the angelic conversation, Peter came to the house of the mother of John, who was surnamed Mark, as if he had come to his own house and to his lawful wife.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 Peter'
