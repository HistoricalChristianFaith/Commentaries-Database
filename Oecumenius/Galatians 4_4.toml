[[commentary]]
quote='''
"But when the fullness of time had come," namely the time which it was necessary, he says, for Christ to come. For Daniel the prophet assigned the time of Christ's coming, which reached its accomplishment in the reign of Caesar Augustus, when also the incarnate economy of Christ began. (Dan. 9:24-27)

"born of a woman." Therefore he did not say "by a woman," so that you would not suppose his coming to have been by way of the Mother of God [Θεοτόκου], but "of a woman," showing that from her the Lord took his body.

— [PHOTIUS] "born under the law." For he became under the law, having also been circumcised, in order, he says, to redeem those who were under the law and under the curse, by the cross, and to be altogether made under the law. [end of the excerpt by Photius] —
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
