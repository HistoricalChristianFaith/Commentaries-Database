[[commentary]]
quote='''
"appealed to the Emperor." He calls the king "Emperor" in a habitual way, as he does Caesar; and addressing him as master he says, "Concerning whom I have nothing certain to write to the master."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
