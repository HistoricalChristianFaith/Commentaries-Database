[[commentary]]
quote='''
"His head and his hair were white like wool, as white as snow." For the mystery according to Christ is new in its appearance, but indeed eternal in its good pleasure. For the divine apostle wrote concerning him the mystery hidden from the ages and from the generations, which now has been revealed to his saints, to whom he willed. Therefore, the ancient aspect of the mystery, as far as it reached into divine favor, reveals the gray of the head intermingled with "wool" and "snow."

"and his eyes were like a flame." It is shown since Christ is also light, and He calls Himself this, saying "I am the light and the truth," (Jn. 8:12; 14:6) or He reveals the fearful things and the threat against the seven churches to which the things of the Revelation are sent, as those who are not following His laws perfectly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Revelation%2FTranslation-Litteral.html'
source_title="Commentary on Revelation"
