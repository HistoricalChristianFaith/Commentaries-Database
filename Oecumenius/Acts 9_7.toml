[[commentary]]
quote='''
Why then did those with him not believe? So that they might be credible witnesses attesting concerning Paul. For if they had believed, they would have seemed to testify in favor out of courtesy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'

[[commentary]]
quote='''
Those who were with Paul did not hear a voice from above, but Paul's voice. And they saw no one to whom he answered; Paul alone saw the one from above. For when they led him in, Paul himself says, "Those who were with me saw the light and became afraid, but they did not hear the voice of the one speaking to me." (Acts 22:9) For if they had heard that voice, they would not have believed. Seeing Paul answer, they were amazed. And this did not happen at first so that it might be shown truly that Christ rose. For the man who was persecuting him and disbelieving in his resurrection, and who was persecuting his disciples, how could he have believed unless the power of the resurrection were great? [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
