[[commentary]]
quote='''
Notably, Luke was with Paul in those cities, as appears from these words in which he includes himself at the same time, saying: We sought, we came by a straight course, and other similar things. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
