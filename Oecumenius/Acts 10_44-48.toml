[[commentary]]
quote='''
When they had believed that by baptism there is altogether the remission of sins, then the Spirit descended upon them. This, however, happened by God's ordaining for the great defense of Peter. Nor did the Spirit come in a common way, but they also spoke in tongues, which put those who had been companions into astonishment; because of which Peter immediately ordered them to be baptized in the name of the Lord. Nor did he say: Why is water needed, when the Holy Spirit has come upon them? For he knew that in the water divine signs are accomplished, namely burial and mortification, resurrection and life. Just as it is easy for us to be baptized and to emerge, so it is easy for God to bury the old man and show the new. This, however, is done on the third day, so that we may recognize that by the power of the Father and of the Son and of the Holy Spirit this is affected. Some, however, say that the resurrection of Christ made on the third day is shown, which brings this about in us. [SEVERIAN OF GABALA]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
