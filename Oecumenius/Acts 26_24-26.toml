[[commentary]]
quote='''
Since he was always conversing with the king, as if Festus had suffered something, and seeing the boldness, from anger and outrage, he says, "You are mad." But Paul explains the reason for which he turned his speech to the king. Then, showing that this doctrine had become everywhere in the inhabited world, he added: "this has not been done in a corner," speaking about the cross and the resurrection of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
