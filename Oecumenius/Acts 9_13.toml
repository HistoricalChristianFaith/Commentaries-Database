[[commentary]]
quote='''
Therefore says Ananias, not as one disbelieving the reports, nor thinking that Christ had been deceived, God forbid! but fearing and trembling. For it was reasonable that, being in fear, they would analyze him to learn what had been determined concerning them (for how else could it be clear to them that he even held authority from the chief priests?), and say, since these things are so, how can these things happen? What then did the Lord, who searches the hearts, testify concerning Paul? He shows that wickedness is not natural to him. [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
