[[commentary]]
quote='''
Not only where the synagogue was, but also outside they prayed, as if separating some particular place for this purpose, namely the Jews being excessively given to bodily things. Or rather, perhaps there was no synagogue there because of the thin population; beside the river outside the city the supposedly pious used to meet secretly. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
