[[commentary]]
quote='''
Note, then, that it is not necessary to say that the body of our Savior and God Jesus Christ, after the resurrection, is passible, that is, susceptible to suffering, nor imperishable and immortal before the resurrection. For the incorruption according to sinlessness was noticeably present from that very time of the Incarnation. [SEVERUS THE HOLY ARCHBISHOP OF ANTIOCH FROM THE EPISTLE ADDRESSED TO TIMOTHY, ARCHBISHOP OF ALEXANDRIA]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
