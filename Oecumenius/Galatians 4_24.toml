[[commentary]]
quote='''
"which things are spoken allegorically." That is, they were types of the future covenants: the births of these two children. For not only the visible things, but also other matters are signified by the births. "which things are spoken allegorically." Instead of what is otherwise meant. For it does not recount the history, but teaches the things foreshadowed in the history. For he introduces:

"She is born into slavery." That of the law.

"or is someone named Hagar." He says: "someone" is a covenant, which has the form of Hagar. And therefore: for the mountain Sinai in the language of the Arabs is called Hagar.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
