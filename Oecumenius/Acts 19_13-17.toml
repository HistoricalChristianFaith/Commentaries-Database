[[commentary]]
quote='''
"Some of the roaming Jewish exorcists." This statement shows that they did not, like exorcists believing in Jesus, adjure unclean spirits in the name of the Lord, but were testing them: wherefore also, since they were not faithful, as the evil spirit says, they shortly paid the penalty of their foolishness. For the spirit exposed them, and wholly exposed their deceit, moved by anger: as when one placed in extreme dangers is attacked by some enemy, and all wrath is poured out upon him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
