[[commentary]]
quote='''
In Asia and Bithynia the Spirit forbids the apostles to speak the word, foreknowing that the heresy of those who fight against the spirits will prevail.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
