[[commentary]]
quote='''
"And we write this to you, so that your joy may be complete."
However, having seized this, let us be complete with joy as if united with God. Or because while you are participants with us, we have our joy to the fullest; which the joyful sower will establish for the reapers, rejoicing in what they may enjoy from their labors.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
