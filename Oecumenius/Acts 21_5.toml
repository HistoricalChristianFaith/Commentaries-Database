[[commentary]]
quote='''
"Completed those days." The verb "completed" [ἐξαρτίσαι] is used in place of πληρῶσαι. For after the days had been completed, that is, after the days of unleavened bread, they came to Troas five days later. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
