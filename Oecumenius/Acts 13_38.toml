[[commentary]]
quote='''
Why did he not produce testimony by which they would have been persuaded that the forgiveness of sins is affected through him? That this was what was being sought, namely to show first that he had risen. This being admitted, the other is indisputable. For Israel was indeed of great astonishment, called the first-born son, for fear that Egypt be destroyed, handed over to the enemies, the Babylonians, by sword and captivity and servitude. [CHRYSOSTOM]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
