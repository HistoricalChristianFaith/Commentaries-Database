[[commentary]]
quote='''
He who believes in the Son of God has the testimony in himself. He who does not believe God has made him a liar, because he does not believe the testimony that God has given of his Son. And this is the testimony, that God has given us eternal life: and this life is in his Son.
Therefore, whoever believes in the Son of God, that He is God as the Son of God, has testimony in himself, that is, in himself, believing that he too has been adopted by God through Jesus, the adopted one. Whoever does not believe the truth is subject to two evils, namely disbelief, making God a liar: and furthermore depriving himself of adoption, and thus also of eternal life, which Christ has promised to those who would be adopted by Him: which he also has in himself as it is written in the Gospel: "In Him was life." (Jn. 1:4)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520the%2520Catholic%2520Epistles%2FTranslation-Litteral.html'
source_title='Commentary on 1 John'
