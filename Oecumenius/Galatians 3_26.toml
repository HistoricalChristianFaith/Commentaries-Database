[[commentary]]
quote='''
— [CHRYSOSTOM] "through faith in Christ Jesus." Through the faith in Christ Jesus. For such is the construction. See also earlier, when he says "sons of Abraham," now he calls them "sons of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
