[[commentary]]
quote='''
The same intention remains evident. For there is no need for counsel where power is present. Therefore whatever things you ordained from the beginning were done by the Apostles, and so the prayer was not to repel troubles, but for the success of evangelical prayer; for they did not say, Free them, but, "grant to your servants to speak your word with all boldness." (Acts 4:29)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'

[[commentary]]
quote='''
"Do whatever your hand and your will have ordained" (Acts 4:28): that is, they could not do it themselves, but you are the one who permitted and brought the whole matter to completion, namely prudent and wise. Indeed they had come together as enemies with savage intent, but they were doing what you wished.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
