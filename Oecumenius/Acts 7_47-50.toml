[[commentary]]
quote='''
In the four hundred eightieth year after the exodus of the sons of Israel from Egypt, Solomon began to build the temple in Jerusalem, as the third book of Kings relates. (1 Kings 6:1) Moreover the temple was built so long after the ascent of Israel from Egypt that, after they had toiled wandering in the mountains, they chose one place, which was in Jerusalem, which God had held in honor. These men, however, being slow of understanding and ignorant of the words of God, thinking that Jerusalem was the city of God, said that God dwelt only therein. God therefore refutes them because they excessively glorified him, and he says: What house will you build for me, who have heaven for a throne, and the earth for the footstool of my feet? For to those who supposed his nature to be confined and limited it was necessary to show openly that He is everywhere and that nothing is capable of containing him, but rather that he passes through all things, and the heaven is full of him, and the earth is full as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
