[[commentary]]
quote='''
"and fled." It should be noted here that we ought not to throw ourselves into danger, but if necessary, to flee for the time being, since the leaders of the church have done this, as if deliberately wishing to extend the proclamation, and to increase it rather through persecutions. [CYRIL ON THE 12 MINOR PROPHETS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
