[[commentary]]
quote='''
"Ananias, why has?" etc. For we do not, he says, drag you unwillingly; that which has been randomly taken from you as an offering to God, again they spend for their own need, an indisputable sacrilege. Therefore they were subjected to a penalty for having committed sacrilege. By what? by death; for that extinguished it, as if it dried it up, that is, it deprived it of the vital moisture. Wherefore also the living thing is said by the ancients to be moist in its essence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
