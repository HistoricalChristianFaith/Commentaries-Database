[[commentary]]
quote='''
"Seize him." It is the custom among the Jews to use this cry against the righteous, as also against the Lord, "Seize him," instead of "Raise him up from the living." Others say it therefore, that is, those who speak according to our Roman usage: "Cast him into the pits." [AMMONIUS]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Acts%2FTranslation-Litteral.html'
source_title='Commentary on Acts'
