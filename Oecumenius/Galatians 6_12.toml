[[commentary]]
quote='''
"Those who desire to make a good showing." He says: those who wish to be approved by men, these compel you to be circumcised. By what kind of men? Either by Jews as keepers of the ancestral law, or by outsiders as though you were their disciples.

For "in the flesh," that is, in men.

"be circumcised." They wish to have others circumcised, so that they not be harassed on account of the cross and the faith, and so that they may endure persecution. But if it is "they are persecuted" [διοικῶνται], then understand it therefore: they do everything and want to please men, only that they may not be ruled and persecuted through faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Oecumenius%2FCommentary%2520on%2520Galatians%2FTranslation-Litteral.html'
source_title='Commentary on Galatians'
