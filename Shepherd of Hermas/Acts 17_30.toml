[[commentary]]
quote='''
"Hear," again he replied: "Keep this flesh pure and stainless, that the Spirit which inhabits it may bear witness to it, and your flesh may be justified. See that the thought never arise in your mind that this flesh of yours is corruptible, and you misuse it by any act of defilement. If you defile your flesh, you will also defile the Holy Spirit; and if you defile your flesh and spirit, you will not live." "And if any one, sir," I said, "has been hitherto ignorant, before he heard these words, how can such man be saved who has defiled his flesh?" "Respecting former sins of ignorance," he said, "God alone is able to heal them, for to Him belongs all power. But be on your guard now, and the all-powerful and compassionate God will heal former transgressions, if for the time to come you defile not your body nor your spirit; for both are common, and cannot be defiled, the one without the other: keep both therefore pure, and you will live unto God."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FThird%2520Book%2520-%2520Similitudes%2FSimilitude%25205.html"
source_title="Shepherd of Hermas, Similitude 5"
