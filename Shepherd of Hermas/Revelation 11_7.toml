[[commentary]]
quote='''
But the sun now shone out a little, and, lo! I see a mighty beast like a whale, and out of its mouth fiery locusts proceeded. But the size of that beast was about a hundred feet, and it had a head like an urn. I began to weep, and to call on the Lord to rescue me from it. Then I remembered the word which I had heard, "Doubt not, O Hermas." Clothed, therefore, my brethren, with faith in the Lord and remembering the great things which He had taught me, I boldly faced the beast. Now that beast came on with such noise and force, that it could itself have destroyed a city. I came near it, and the monstrous beast stretched itself out on the ground, and showed nothing but its tongue, and did not stir at all until I had passed by it. Now the beast had four colours on its head-black, then fiery and bloody, then golden, and lastly white.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FFirst%2520Book%2520-%2520Visions%2FVision%25204.html"
source_title="Shepherd of Hermas, Vision 4"

