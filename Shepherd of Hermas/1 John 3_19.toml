[[commentary]]
quote='''
On hearing these words, I wept most violently. When he saw me weeping, he said to me, "Why do you weep?" And I said, "Because, sir, I know not if I can be saved." "Why?" said he. And I said, "Because, sir, I never spake a true word in my life, but have ever spoken cunningly to all, and have affirmed a lie for the truth to all; and no one ever contradicted me, but credit was given to my word. How then can I live, since I have acted thus?" And he said to me, "Your feelings are indeed right and sound, for you ought as a servant of God to have walked in truth, and not to have joined an evil conscience with the spirit of truth, nor to have caused sadness to the holy and true Spirit." And I said to him, "Never, sir, did I listen to these words with so much attention." And he said to me, "Now you hear them, and keep them, that even the falsehoods which you formerly told in your transactions may come to be believed through the truthfulness of your present statements. For even they can become worthy of credit. If you keep these precepts, and from this time forward you speak nothing but the truth, it will be possible for you to obtain life."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FSecond%2520Book%2520-%2520Commandments%2FCommandment%25203.html"
source_title="Shepherd of Hermas, Commandment 3"
