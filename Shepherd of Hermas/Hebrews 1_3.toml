[[commentary]]
quote='''
"Because," he answered, "God planted the vineyard, that is to say, He created the people, and gave them to His Son; and the Son appointed His angels over them to keep them; and He Himself purged away their sins, having suffered many trials and undergone many labours, for no one is able to dig without labour and toil. He Himself, then, having purged away the sins of the people, showed them the paths of life by giving them the law which He received from His Father. [You see," he said, "that He is the Lord of the people, having received all authority from His Father.]"
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FThird%2520Book%2520-%2520Similitudes%2FSimilitude%25205.html"
source_title="Shepherd of Hermas, Similitude 5"

[[commentary]]
quote='''
"Listen," he said: "the name of the Son of God is great, and cannot be contained, and supports the whole world. If, then, the whole creation is supported by the Son of God, what think ye of those who are called by Him, and bear the name of the Son of God, and walk in His commandments? do you see what kind of persons He supports? Those who bear His name with their whole heart. He Himself, accordingly, became a foundation to them, and supports them with joy, because they are not ashamed to bear His name."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FThird%2520Book%2520-%2520Similitudes%2FSimilitude%25209.html"
source_title="Shepherd of Hermas, Similitude 9"
