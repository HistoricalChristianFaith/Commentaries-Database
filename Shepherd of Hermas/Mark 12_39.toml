[[commentary]]
quote='''
Give heed, therefore, ye who glory in your wealth, lest those who are needy should groan, and their groans should ascend to the Lord, and ye be shut out with all your goods beyond the gate of the tower. Wherefore I now say to you who preside over the Church and love the first seats, "Be not like to drug-mixers. For the drug-mixers carry their drugs in boxes, but ye carry your drug and poison in your heart. Ye are hardened, and do not wish to cleanse your hearts, and to add unity of aim to purity of heart, that you may have mercy from the great King. Take heed, therefore, children, that these dissensions of yours do not deprive you of your life. How will you instruct the elect of the Lord, if you yourselves have not instruction? Instruct each other therefore, and be at peace among yourselves, that I also, standing joyful before your Father, may give an account of you all to your Lord."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FFirst%2520Book%2520-%2520Visions%2FVision%25203.html"
source_title="Shepherd of Hermas, Vision 3"
