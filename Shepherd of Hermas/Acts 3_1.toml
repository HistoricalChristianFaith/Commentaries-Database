[[commentary]]
quote='''
Having fasted frequently, and having prayed to the Lord that He would show me the revelation which He promised to show me through that old woman, the same night that old woman appeared to me, and said to me, "Since you are so anxious and eager to know all things, go into the part of the country where you tarry; and about the fifth hour I shall appear unto you, and show you all that you ought to see." ... Accordingly, I went to the country, and counted the hours, and reached the place where I had promised to meet her. ... But on coming back to myself and calling to mind the glory of God, I took courage, bent my knees, and again confessed my sins to God as I had done before. Whereupon the old woman approached, accompanied by six young men whom I had also seen before; and she stood behind me, and listened to me, as I prayed and confessed my sins to the Lord.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FFirst%2520Book%2520-%2520Visions%2FVision%25203.html"
source_title="Shepherd of Hermas, Vision 3"
