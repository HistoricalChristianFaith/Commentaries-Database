[[commentary]]
quote='''
"Fear," said he, "the Lord, and keep His commandments. For if you keep the commandments of God, you will be powerful in every action, and every one of your actions will be incomparable. For, fearing the Lord, you will do all things well. This is the fear which you ought to have, that you may be saved. But fear not the devil; for, fearing the Lord, you will have dominion over the devil, for there is no power in him. ... For fears are of two kinds: for if you do not wish to do that which is evil, fear the Lord, and you will not do it; but, again, if you wish to do that which is good, fear the Lord, and you will do it. Wherefore the fear of the Lord is strong, and great, and glorious. Fear, then, the Lord, and you will live to Him, and as many as fear Him and keep His commandments will live to God." ... "All creation fears the Lord, but all creation does not keep His commandments. They only who fear the Lord and keep His commandments have life with God; but as to those who keep not His commandments, there is no life in them."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FSecond%2520Book%2520-%2520Commandments%2FCommandment%25207.html"
source_title="Shepherd of Hermas, Commandment 7"
