[[commentary]]
quote='''
"Do you only keep your house pure, as they will delight to dwell in a pure abode. For they are pure, and chaste, and industrious, and have all influence with the Lord. Therefore, if they find your house to be pure, they will remain with you; but if any defilement, even a little, befall it, they will immediately withdraw from your house. For these virgins do not at all like any defilement." I said to him, "I hope, sir, that I will please them, so that they may always be willing to inhabit my house. And as he to whom you entrusted me has no complaint against me, so neither will they have." He said to the Shepherd, "I see that the servant of God wishes to live, and to keep these commandments, and will place these virgins in a pure habitation."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FThird%2520Book%2520-%2520Similitudes%2FSimilitude%252010.html"
source_title="Shepherd of Hermas, Similitude 10"
