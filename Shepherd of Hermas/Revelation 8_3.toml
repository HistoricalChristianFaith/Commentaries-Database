[[commentary]]
quote='''
Now after the angel had finished these things, he said to the Shepherd, "I am going away, and you will send these away within the walls, according as each one is worthy to have his dwelling. And examine their branches carefully, and so dismiss them; but examine them with care. See that no one escape you," he added; "and if any escape you, I will try them at the altar." Having said these words to the Shepherd, he departed.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FThird%2520Book%2520-%2520Similitudes%2FSimilitude%25208.html"
source_title="Shepherd of Hermas, Similitude 8"

