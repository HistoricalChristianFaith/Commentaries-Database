[[commentary]]
quote='''
And the Shepherd bade me call them as each one was placed. And they came, rank by rank, and gave their branches to the Shepherd. And the Shepherd received the branches, and planted them in rows; and after he had planted them he poured much water upon them, so that the branches could not be seen for the water; and after the branches had drunk it in, he said to me, "Let us go, and return after a few days, and inspect all the branches; for He who created this tree wishes all those to live who received branches from it. And I also hope that the greater part of these branches which received moisture and drank of the water will live."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FThird%2520Book%2520-%2520Similitudes%2FSimilitude%25208.html"
source_title="Shepherd of Hermas, Similitude 8"
