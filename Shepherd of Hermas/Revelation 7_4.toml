[[commentary]]
quote='''
"Now, sir," I continued, "explain to me, with respect to the mountains, why their forms are various and diverse." "Listen," he said: "these mountains are the twelve tribes, which inhabit the whole world. The Son of God, accordingly, was preached unto them by the apostles." "But why are the mountains of various kinds, some having one form, and others another? Explain that to me, sir." "Listen," he answered: "these twelve tribes that inhabit the whole world are twelve nations. And they vary in prudence and understanding. As numerous, then, as are the varieties of the mountains which you saw, are also the diversities of mind and understanding among these nations. And I will explain to you the actions of each one." "First, sir," I said, "explain this: why, when the mountains are so diverse, their stones, when placed in the building, became one colour, shining like those also that had ascended out of the pit." "Because," he said, "all the nations that dwell under heaven were called by hearing and believing upon the name of the Son of God. Having, therefore, received the seal, they had one understanding and one mind; and their faith became one, and their love one, and with the name they bore also the spirits of the virgins."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Shepherd%2520of%2520Hermas%2FTranslation-ANF%2FThird%2520Book%2520-%2520Similitudes%2FSimilitude%25209.html"
source_title="Shepherd of Hermas, Similitude 9"

