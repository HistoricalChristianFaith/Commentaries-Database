[[commentary]]
quote='''
But though He endured these things, having come for the salvation of all, yet the people returned Him an evil recompense. Jesus saith, I thirst,—He who had brought forth the waters for them out of the craggy rock; and He asked fruit of the Vine which He had planted. But what does the Vine? This Vine, which was by nature of the holy fathers, but of Sodom by purpose of heart;—for their Vine is of Sodom, and their tendrils of Gomorrah;—this Vine, when the Lord was athirst, having filled a sponge and put it on a reed, offers Him vinegar. They gave Me also gall for My meat, and in My thirst, they gave Me vinegar to drink. Thou seest the clearness of the Prophets' description. But what sort of gall put they into My mouth? They gave Him, it says, wine mingled with myrrh. Now myrrh is in taste like gall, and very bitter. Are these things what ye recompense unto the Lord? Are these thy offerings, O Vine, unto thy Master? Rightly did the Prophet Esaias aforetime bewail you, saying, My well-beloved had a vineyard in a hill in a fruitful place; and (not to recite the whole) I waited, he says, that it should bring forth grapes; I thirsted that it should give wine; but it brought forth thorns; for thou seest the crown, wherewith I am adorned. What then shall I now decree? I will command the clouds that they rain no rain upon it; for the clouds which are the Prophets were removed from them, and are for the future in the Church...
'''
source_title="Catechetical Lectures, Lecture 13"
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Jerusalem%2FCATECHETICAL%2520LECTURES%2FLecture%252013.html'
