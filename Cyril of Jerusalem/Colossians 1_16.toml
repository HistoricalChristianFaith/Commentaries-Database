[[commentary]]
quote='''
Christ then is the Only-begotten Son of God, and Maker of the world. For He was in the world, and the world was made by Him; and He came unto His own, as the Gospel teaches us. And not only of the things which are seen, but also of the things which are not seen, is Christ the Maker at the Father's bidding. For in Him, according to the Apostle, were all things created that are in the heavens, and that are upon the earth, things visible and invisible, whether thrones, or dominions, or principalities, or powers; all things have been created by Him and for Him; and He is before all, and in Him all things consist. Even if thou speak of the worlds, of these also Jesus Christ is the Maker by the Father's bidding. For in these last days God spake unto us by His Son, whom He appointed heir of all things, by whom also He made the worlds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Jerusalem%2FCATECHETICAL%2520LECTURES%2FLecture%252011.html'
source_title="Catechetical Lecture 11:24"
