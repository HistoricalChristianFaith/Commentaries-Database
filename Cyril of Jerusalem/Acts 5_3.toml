[[commentary]]
quote='''
Peter was not with Ananias and Sapphira when they sold their possessions, but he was present by the Spirit; Why, he says, hath Satan filled thine heart to lie to the Holy Ghost? There was no accuser; there was no witness; whence knew he what had happened? Whiles it remained was it not thine own? and after it was sold, was it not in thine own power? why hast thou conceived this thing in thine heart? The unlettered Peter, through the grace of the Spirit, learnt what not even the wise men of the Greeks had known.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Jerusalem%2FCATECHETICAL%2520LECTURES%2FLecture%252016.html'
source_title="Catechetical Lecture 16:17"
