[[commentary]]
quote='''
This design and love of his, which the Lord deigns with unwearying kindness to benefit us with and which he wishes to express by an act of human affection, although he discovers no such loving disposition in his creation to which he could worthily compare it, he has compared with the most tender heart of a loving mother. He uses this example because he can find nothing dearer in the nature of human beings. - "Conference 13.17.4"
'''


[[commentary]]
quote='''
This providence and love of God therefore, which the Lord in His unwearied goodness vouchsafes to show us, He compares to the tenderest heart of a kind mother, as He wishes to express it by a figure of human affection, and finds in His creatures no such feeling of love, to which he could better compare it. And He uses this example, because nothing dearer can be found in human nature, saying: "Can a mother forget her child, that she should not have compassion on the son of her womb?" But not content with this comparison He at once goes beyond it, and subjoins these words: "And though she may forget, yet will not I forget thee."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Cassian%2FConferences%2520of%2520John%2520Cassian%2520-%2520Part%2520II%2F13.%2520The%2520Third%2520Conference%2520of%2520Abbot%2520Chaeremon.html'
source_title="The Third Conference of Abbot Chaeremon, Chapter 17"
