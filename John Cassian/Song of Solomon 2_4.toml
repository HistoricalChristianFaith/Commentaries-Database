[[commentary]]
quote='''
There is a properly ordered love that, while hating no one, loves certain persons more by reason of their good qualities. Although it loves everyone in a general way, nonetheless it makes an exception for itself of those whom it should embrace with a particular affection. - "Conference 16.14.3"
'''


[[commentary]]
quote='''
Something of this sort too we have in the character of the bride in the Song of Songs, where she says: "Set in order love in me." For this is true love set in order, which, while it hates no one, yet loves some still more by reason of their deserving it, and which, while it loves all in general, singles out for itself some from those, whom it may embrace with a special affection, and again among those, who are the special and chief objects of its love, singles out some who are preferred to others in affection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Cassian%2FConferences%2520of%2520John%2520Cassian%2520-%2520Part%2520II%2F16.%2520The%2520First%2520Conference%2520of%2520Abbot%2520Joseph.html'
source_title="The First Conference of Abbot Joseph, Chapter 14"
