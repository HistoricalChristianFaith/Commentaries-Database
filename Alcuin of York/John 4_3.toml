[[commentary]]
quote='''
Our Lord left Judaea also mystically, i. e. He left the unbelief of those who condemned Him, and by His Apostles, went into Galilee, i. e. into the ficklenessa of the world; thus teaching His disciples to pass from vices to virtues.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
