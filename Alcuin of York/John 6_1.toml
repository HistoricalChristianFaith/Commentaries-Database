[[commentary]]
quote='''
This sea hath different names, from the different places with which it is connected; the sea of Galilee, from the province; the sea of Tiberias, from the city of that name. It is called a sea, though it is not salt water, that name being applied to all large pieces of water, in Hebrew. This sea our Lord often passes over, in going to preach to the people bordering on it.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Mystically, the sea signifies this tumultuous world. In the fulness of time, when Christ had entered the sea of our mortality by His birth, trodden it by His death, passed over it by His resurrection, then followed Him crowds of believers, both from the Jews and Gentiles.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
