[[commentary]]
quote='''
Now the inheritance of everlasting life was unto all the righteous, and just, and merciful, and doers of good works while they were in this world, and these are they who were also called "blessed" by the living word of our Lord, in the words which He spake unto them, "Come, ye blessed of my Father, and inherit the kingdom which hath been prepared for you from before the foundations of the world. I was an hungered, and ye gave me to eat; I was athirst, and ye gave me to drink," together with the rest of the things which were spoken unto them by our Lord, for they all are applicable unto the righteous men of olden time, and unto the just who were also owners of possessions. And it is well known that clothing the naked, and receiving strangers, and setting a table for the hungry, and providing the needy with all things for their bodily wants, belong unto the owner of possessions, for without riches these things cannot be.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
