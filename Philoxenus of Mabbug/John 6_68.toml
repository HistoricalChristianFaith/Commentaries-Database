[[commentary]]
quote='''
"If ye wish to go away, depart," He once said unto them, and by reason of the hardness of His word many left him and departed. Simon saith unto Him, "Unto whom shall we go?" We have once and for all gone forth after Thee, and we have no place to go away from following Thee. "For Thou hast the words of eternal life," that is to say, "Thy words are life, and how shall we forsake life and go after death? For we have forsaken everything and come after Thee, because we believe and know that Thou art the Son of the Living God." Therefore then, O disciple, if thou believest as Simon believed, go thou also forth even as Simon went forth; forsake everything and follow after thy rich Lord. He Himself lacketh nothing, therefore thou needest not provisions from the riches of a strange country, and His riches are not by measure that thou shouldst support Him by the superfluities of thy wealth lest He should want; for this reason be thou strenuous to leave everything. For it belongeth unto Him to give thee everything, even as He promised thee by the hand of Simon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
