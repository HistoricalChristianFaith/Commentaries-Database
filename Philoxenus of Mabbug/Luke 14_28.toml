[[commentary]]
quote='''
The disciple of God, then, should seek to have the remembrance of his Master Jesus Christ fixed in his soul and to meditate upon it day and night. And it is right for him to know where he should begin, and how and where he must raise the structure of his building, and how he should begin and finish it, that he be not laughed at by all those who pass along the road, even as our Lord spake concerning that man who began to build a tower and was not able to finish it, that he became a laughing-stock and a mockery to all who saw him. And who is this man who began the building of the tower of whom our Redeemer spake, if it be not the man who setteth out on the path of the Gospel of Christ? Now the beginning of the building of this disciple who hath agreed to go forth from the world and to keep the commandments is his promise and his covenant with God; and he should begin, and run his course, and finish it, collecting and bringing together from all places fine stones of a noble life and character for the building of the tower which reacheth up to heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25201%2520--%2520Prologue.html'
source_title="13 Ascetic Discourses, Discourse 1 -- Prologue"

[[commentary]]
quote='''
And He hath exposed of old this deceitful thought in His word, and by the hand of that one hath rebuked all the disciples of falsehood, and prevented them from being His disciples. And those who were slack, and slothful, and feeble, either through the love of pleasure, or through the labour of the building, He kept back by saying, "If thou hast money sufficient for building the tower, build it, but if not, it is better that thou shouldst not begin, than that thou shouldst begin and not finish." And behold, by these things He Who called thee to be His disciple hath taught thee that thou shouldst not begin in this path unless thou art determined to finish in it, and that thou shouldst not lay the foundations to build a tower, if thou hast it not in thy mind to finish it, and that thou shouldst not go forth to war against Satan, unless the hosts of mighty thoughts be gathered together about thee, lest having gone forth to war the Enemy overcome thee, and thy discipleship be blasphemed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
