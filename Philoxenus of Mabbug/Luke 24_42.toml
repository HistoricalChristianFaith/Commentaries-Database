[[commentary]]
quote='''
And therefore he would remember the passage concerning the eating of our Lord, where it is written of Him that, "He made the festival, and ate the passover;" or where it is said that, "They set before Him a piece of broiled fish and a piece of honeycomb;" or where again it is written, "They had fishes and bread." And these and such like things doth the glutton bring forward as proofs when he wisheth to eat everything freely, and the rule of the freedom of Christ, Who like God was above laws and commandments, doth he set forth to be a stumbling-block to his life, and he understandeth not the reason of that rule and conduct, and he perceiveth not that other types were inscribed therein.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252010%2520--%2520On%2520Gluttony.html'
source_title="13 Ascetic Discourses, Discourse 10 -- On Gluttony"
