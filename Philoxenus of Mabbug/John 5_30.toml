[[commentary]]
quote='''
"I do not seek My own will, but the will of Him that sent Me. And I did not come down from heaven to do My own will, but the will of Him that sent Me." These things were spoken when He was fulfilling within Himself perfection, in order that spiritual beings who are outside the world might understand that not only to natural parents should they not be obedient and keep in subjection unto them, but also that they should not be persuaded by their own will, neither by their own wants and pleasures in any thing, but that they should deny themselves, even as it was said by the Redeemer, "Whosoever denieth not himself cannot be My disciple."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"
