[[commentary]]
quote='''
When the Pharisees said "Herod desireth to kill thee," He called Herod a fox because of his cunning, saying, "Go ye and say to this fox"—for because he hath no power to do what he desireth by authority, behold he contriveth artful schemes and plots in order that cunning may take the place of power, even as cunning taketh the place of strength in the fox—"by My own freewill will I go, but thy cunning which is outside My freewill, is not able to make Me go forth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
