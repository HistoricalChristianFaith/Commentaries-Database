[[commentary]]
quote='''
When he wisheth to eat everything, and not to restrain himself by forbearance from any meat, he beginneth to repeat that which was written by our Lord, "It is not that which goeth into a man which defileth him;" for his ear is only pierced to hear such things as can be thought to support his lust, and in the face of the hearing of other things he shutteth the door of his attention. For he is not willing to hearken unto the other verse which saith, "Whosoever wisheth to be My disciple, let him deny himself, and take up his cross and follow Me;" nor unto the other which saith, "Whosoever wisheth to make his life to live shall destroy it," nor that which He spake unto His disciples, saying, "In the world ye shall have tribulations;" nor the words, "When the Bridegroom shall be taken from the children of the bridechamber, then shall ye fast."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252010%2520--%2520On%2520Gluttony.html'
source_title="13 Ascetic Discourses, Discourse 10 -- On Gluttony"

[[commentary]]
quote='''
And again He saith, "Whosoever wisheth to save his soul shall destroy it; and whosoever wisheth to destroy his soul for My sake shall make it to live." And again He saith, "Whosoever destroyeth his soul shall preserve it unto everlasting life; and whosoever ministereth unto Me the Father shall honour."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
