[[commentary]]
quote='''
For our Lord proclaimed and revealed His kingdom to corporeal beings, and said, "Repent ye, for the kingdom of heaven hath drawn nigh." Thou hast heard the voice of him that proclaimed concerning His kingdom, believe it then undoubtingly, especially since thou hast learned that it is the voice of God. Meditate not in thy soul how this kingdom can be, and try not to search out these spiritual countries in thy imagination; take not upon thyself the customary habit of the thoughts of the body when thou hearest of incorporeal countries, and fashion not imaginary forms out of thy heart concerning these glorious mansions which the Ascension of the Son hath prepared [for thee]; and think not to order in thy knowledge that which the knowledge of God hath fashioned aforetime. Thou wast not called to search out the kingdom, neither its preparation nor construction, but only to be an heir and a guest, that thou mightest enjoy thyself out of the overflowing abundance of its spiritual delights. Thou hast heard the word concerning the kingdom which Jesus speaketh to thee, "Repent, for the kingdom of heaven hath drawn nigh;" to thee He hath said, "Repent," and not that thou shouldst be one who should try to examine into the kingdom, for that is near unto thee if thou wilt draw nigh unto it. Now the drawing nigh unto the kingdom cannot be arrived at by the questionings of these words which enquire, "How, and in what manner, and what the kingdom is like;" but let each of us keep the laws of the kingdom, and perform the commandments which have been committed unto us by the Ruler of the kingdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25202%2520--%2520On%2520Faith.html'
source_title="13 Ascetic Discourses, Discourse 2 -- On Faith"

[[commentary]]
quote='''
Even as it is written concerning Him, "From the time of His baptism by John He began to work and to teach," even until that day in which He was taken up into heaven. These were the fair deeds and the excellent manner of life which He shewed forth in His own Person. And although the raising of the dead, and the cleansing of the lepers, and the opening of the eyes of the blind, and the making the lame to walk, and the straightening of the crooked limbed, and the making upright of those bent double, and the driving away of devils, and the walking upon the waves, and the stilling of the winds, were also works, because they were signs and wonders, yet the writer calleth the spiritual life and conduct which appeared in the Person of Christ, the work which was closely united to teaching. For if He came only for the sake of doing good deeds, and not to work wonders, His teaching also was for spiritual life and conduct, and to this He also united work, in order that He might show us in Himself the type of all perfection. And He forsook the world and all the conversation among the children of men immediately after the baptism of John, and went forth to the wilderness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"
