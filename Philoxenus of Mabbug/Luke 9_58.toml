[[commentary]]
quote='''
And by the hand of that one feeble disciple, concerning whom it is written in the Gospel of our Redeemer, Jesus hath rebuked this wicked thought in all His foot-soldiers. "And one came and drew nigh and said unto Him, Master, I will follow Thee whithersoever thou goest. Jesus saith unto him, The foxes have holes, and the birds of heaven have nests, but the Son of man hath not where to lay His head." "Depart thou from me, O disciple of iniquity, for I have not that to give unto thee which thou desirest, and that which I can give thee thou dost not wish to receive. I know that which thy desire asketh, and that which thou seekest, but I will not give them unto thee, for through the love of the thought of riches thou hast been pleased to come after Me, and being in the light thou hast come forth to seek darkness, and having the true possession, to seek poverty, and having life, to seek death. That which I command every man, to forsake the world and to cleave unto Me, I desire that thou shouldst possess in thy coming unto Me. By the door through which I desire to bring thee out, by that same door thou pressest to come in unto Me, and therefore I will not receive thee. For in My outward appearance I am poor, and for this reason I have not things which are manifest to give in the world into which I have come. I am in appearance a stranger, for I have neither house nor roof, and whosoever seeketh to be My disciple must inherit poverty from Me. Why dost thou wish to inherit from Me that of the possession of which I have made thee destitute?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
