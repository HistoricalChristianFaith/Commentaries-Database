[[commentary]]
quote='''
For as in that case it called to Abraham only, so in this He calleth every one He pleaseth by His Gospel, and inviteth them to go forth after Him. For in that He said, "Whosoever wisheth to come after Me, let him deny himself and take up his cross and follow Me," He shewed a universal calling to all the children of men. And instead of choosing one person, Abraham, as He did at that time, He now inviteth every man to be like unto Abraham.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"

[[commentary]]
quote='''
Christ hath said that the man who desireth to be a perfect disciple of Him must also deny himself. If a man denieth his life according to the word of our Redeemer, then will he be a disciple, but without this there is no means of a man arriving at perfection. And how can a man who denieth not himself the possessions of the world, and who despiseth not all the riches which are seen, and bodily pleasures, arrive at that perfection which Jesus delivered? And I do not speak these things of myself, but I follow after the desire of the Holy Books, and I take my stand upon the law which hath been ordained by the King.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"

[[commentary]]
quote='''
Not only to natural parents should they not be obedient and keep in subjection unto them, but also they should not be persuaded by their own will, neither by their own wants and pleasures in any thing, but they should deny themselves, even as it was said by the Redeemer, "Whosoever denieth not himself cannot be My disciple."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"

[[commentary]]
quote='''
When he wisheth to eat everything, and not to restrain himself by forbearance from any meat, he beginneth to repeat that which was written by our Lord, "It is not that which goeth into a man which defileth him;" for his ear is only pierced to hear such things as can be thought to support his lust, and in the face of the hearing of other things he shutteth the door of his attention. For he is not willing to hearken unto the other verse which saith, "Whosoever wisheth to be My disciple, let him deny himself, and take up his cross and follow Me;" nor unto the other which saith, "Whosoever wisheth to make his life to live shall destroy it," nor that which He spake unto His disciples, saying, "In the world ye shall have tribulations;" nor the words, "When the Bridegroom shall be taken from the children of the bridechamber, then shall ye fast."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252010%2520--%2520On%2520Gluttony.html'
source_title="13 Ascetic Discourses, Discourse 10 -- On Gluttony"

[[commentary]]
quote='''
Now therefore for this reason those who desire perfection strip themselves of their riches, in order that they may be able to do their own labours, and that, being free from everything in the world, they may wage war with the lusts of the body. Therefore whosoever wisheth to draw nigh unto this rule of life must be destitute of riches, and having been born again, he may enter therein, according to the testimony of Christ: "If thou wishest to be perfect, go and sell thy possessions, and give to the poor, and thou shalt have treasure in heaven, and take up thy cross, and follow Me." Observe, then, how perfect is the doctrine of Christ, for not even when a man hath stripped himself of everything that he hath, hath he yet begun to walk in the way of His doctrine, for poverty is the end of the path of the righteousness which can be wrought in this world; but the words, "Take thy cross, and follow Me," are the beginning of the path of the spiritual life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
