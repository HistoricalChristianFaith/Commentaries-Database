[[commentary]]
quote='''
Now His own righteousness is that which is above the law, concerning which He said, "Enter in at the narrow gate." In the one case, with the law, sometimes thou art afflicted, and sometimes thou hast ease, sometimes thou labourest, and sometimes thou restest, and by these and such like things all thy life of righteousness is woven; but as concerning the rule of Christ it is written, "Enter in at the narrow gate." For well did our Lord go step by step, and like a wise and good Teacher did He bring things from the Old Testament and things from the New Testament unto His disciples, that He might shew, firstly, that He was the Giver of that which was at the beginning and of that which was at the end, and secondly, that He might make His disciples go step by step from lesser unto greater things, and from the command, "Thou shalt love thy God as thyself," unto the command, "Thou shalt love Him more than thyself"; and from the command, "Give of what thou hast," unto the command, "Give away everything that thou hast."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"

[[commentary]]
quote='''
"Enter ye in at the strait gate," proclaimeth the word of the Redeemer unto all true disciples of His word, for without this gate a man cannot enter into the kingdom of God. For a man is not wholly worthy of the experience of the rule and life of Christ until he hath put to an end in him all feeling for the meats of the world, and he is not able to cut off and to cast away from him this affection, except through the power of patience he cut off from himself pleasure in all things which are lusted after. Now the beginning of abstinence is bitter and severe, but the end thereof is pleasant and sweet. Its burden is heavy unto those who do not feel how light it is, and its load is difficult unto those who do not look into the spiritual riches which are therein, for it is the strait gate which leadeth into the broad country of spiritual beings; and as poverty of possessions is the end of the way of the world, even so is abstinence the beginning of the path of the rule and life of the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
