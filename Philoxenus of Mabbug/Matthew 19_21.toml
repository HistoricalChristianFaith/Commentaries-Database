[[commentary]]
quote='''
And after He had laid down these limitations for us, and had explained unto us the various grades in the righteousness of the just, Jesus continued in His speech to teach us perfection, and said unto that learned man who asked Him, that is to say, in teaching him He taught all His disciples, "If thou wishest to be perfect, go, sell all thy possessions, and give them to the poor, and thou shalt have treasure in heaven." And here even we have not as yet begun to walk in the path of righteousness, for that a man should take up his cross and go forth after Jesus is one rule of life, for as the dwelling in the womb is one thing, and the going forth of the child from the belly is another, and the existence of a man in the world, after being born from the womb, is another. Even so the righteousness which is in the world is like unto the substance of the child within the womb, and the commandment, "Go and sell all thy possessions, and give to the poor, and there shall be treasure for thee in heaven," is the belly from which is born out of the old womb the new creation, and it is that door through which he goeth forth from one world to the other; but that commandment, "Take up thy cross and come after Me," belongs to the perfect rule and conduct, and it is the path of spiritual life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"

[[commentary]]
quote='''
Now the reward hath Jesus set in the midst between the righteous and the perfect, "Go, sell thy possessions, and give to the poor, and thou shalt have treasure in heaven"; behold the reward for righteousness! And He calleth this reward "treasure," because the men who hasten after the righteousness of the world do good works on the condition that there is a reward, and well did Jesus in His words place the treasure at the end of the way of the righteousness which is in the world, that their wages being set before them they may run direct to where they are, even as do those who contend in a game, and before whom is set the crown which will make them to gain the victory. Into the land of the perfect our Lord did not make a reward to enter, because it would be a disgrace unto the perfect to labour in the rule of the spirit for wages; for behold the spiritual mindedness in which the perfect stand is the wages of the just and righteous, because they have wrought good things in the world on the condition that they should be changed and become spiritual beings, and be freed from all the carnal mindedness, and the passions, and the subjection of the world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
