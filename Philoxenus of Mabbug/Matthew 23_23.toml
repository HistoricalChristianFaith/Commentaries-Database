[[commentary]]
quote='''
Now this is the first lust which conquered the world, and because of it the first transgression of the law took place. Through it the scribes and Pharisees received "Woe" from our Redeemer, because it had taught them to keep festival, and Sabbath, and to pay tithe of cummin. For the lust of the belly is the captain of the host of the left side, and to it are fettered all the hosts of sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
