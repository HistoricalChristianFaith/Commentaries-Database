[[commentary]]
quote='''
And everywhere, if thou seekest, O disciple, thou wilt find that none of the righteous pleased God in the world without tribulations and labours, for this is the road of the royal city which is above, and that "strait and narrow is the way which leadeth unto life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
