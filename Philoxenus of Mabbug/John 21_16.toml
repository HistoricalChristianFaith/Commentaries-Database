[[commentary]]
quote='''
And our Lord also called the faithful ones of His pastures by names in which simplicity is indicated: "If thou lovest Me", He said to Simon, the chief of His disciples, "feed My sheep, and My lambs, and My ewes." And as He was called symbolically by the word of the prophecy, "lamb", and "sheep", and John also called Him, "The Lamb of God", even so did He call the disciples of His word by the names which indicate simpleness. And He did this that when all believers heard what names were given to them by the Shepherd they might, like sheep, and lambs, and ewes, be incited to abide in all simpleness, and might not go forth from the law of simplicity, and that like these innocent animals, which are led to death, and are brought to slaughter, and are bound for shearing, and are hunted by wild beasts, they might neither cry out nor complain, but remain in quietness and in the innocency of their nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25205%2520--%2520Second%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 5 -- Second Discourse on Simplicity"
