[[commentary]]
quote='''
And again He saith, "Whosoever destroyeth his soul shall preserve it unto everlasting life; and whosoever ministereth unto Me the Father shall honour." And again He said unto His disciples, "Arise, let us go hence," and by this speech He shewed that this world was not the country either of Himself or of His disciples. Whither shall we go, O Lord? "Where I am there also shall My servant be."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
