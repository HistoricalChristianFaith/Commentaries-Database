[[commentary]]
quote='''
Our Lord and our Redeemer Jesus Christ in His living Gospel invited us to draw nigh in wisdom to the work of keeping His commandments, and to lay within ourselves the foundation of His discipline rightly, in order that the edifice of our life and character might mount up straightly. For he who knoweth not how to begin wisely the building of this tower which goeth up to heaven is not able to complete it or to bring it to the finish which is of wisdom. For knowledge and wisdom should order, and arrange, and work the beginning and end and founding of the edifice, and whosoever beginneth thus is called a wise man by the word of our Redeemer, "Whosoever heareth these My words, and doeth them, is like unto a wise man who hath dug, and made deep, and set his building upon the rock: and the rain descended, and the rivers came, and the winds blew, and beat upon that house; and it fell not; for its foundations were laid upon the rock. But whosoever heareth and doeth not, is like unto a foolish man who set his building upon the sand, and even if feeble things beat upon his building they will sweep it away". We are therefore bound by the word of our Teacher not to be constant listeners only to the Word of God but also constant doers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25201%2520--%2520Prologue.html'
source_title="13 Ascetic Discourses, Discourse 1 -- Prologue"
