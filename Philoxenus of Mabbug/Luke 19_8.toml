[[commentary]]
quote='''
In that Zacchaeus heard the rumour concerning Him and believed, he shewed faith, and in that he promised to give half of his goods to the poor, and to restore fourfold that which he had exacted he shewed that the simplicity of faith had dawned in him. For if at that time the mind of Zacchaeus had not been filled with the simplicity which befitted faith, he would never have made this free and full promise to Jesus to spend and distribute in a short time what had taken him years to collect in this world; for what cunning hath gathered together simplicity maketh to flow away, and the things which have been collected by the schemes of artifice sincerity scattereth. And whatsoever fraud hath been able to acquire faith repudiateth, and crieth out that it existeth not, for God Himself only is the possession of faith, and it cannot be persuaded to possess anything else with Him. To faith all possessions are little, except that One everlasting Possession, which is God. And, moreover, for this reason faith is implanted in us, that it may find and possess God only, and that everything which is beyond may be accounted a loss.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
