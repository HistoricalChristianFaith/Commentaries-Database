[[commentary]]
quote='''
Therefore, O thou who wishest to become a disciple of God, do thou also get faith, the mistress of all possessions. Let this thing be to thee the beginning of thy instruction, and lay it as the foundation of the building of thy tower, in such a way that if it were to seize the height of heaven it would not fall, for the edifice of faith is its foundation, which cannot be shaken by waves and winds. And Jesus also set this faith [as] a foundation by the hand of Simon, and as our Lord made it the beginning, so also is it meet that the disciple, who would draw nigh to discipleship in systematic order, should first of all begin with it. Faith Jesus made the foundation of the whole Church, do thou also lay the foundation for thine own rule and manner of life therewith. He built thereupon excellent rules of life and conduct for the whole world, and do thou build upon it thine own triumphs and order of life. He laid it out as a foundation for all the generations of the world after His coming, and do thou make it the beginning of thy life which is in God. See then how great faith is, in that it is sufficient to bear all children of men!

And Jesus also made faith the foundation of the edifice of the Church because He saw aforetime its invincible might, its unconquerable assurance, its never-diminishing strength, its irreproachable triumph, its power which cannot be overthrown, its unenfeebled strength, its irresistible command, its decree of judgment which never turneth back, its never-failing word, and its dominion which can never fall into contempt. This faith, the mistress of triumphant deeds, did Jesus make the foundation of the Church, and the beginning of the building of His holy Body, that He might teach all men to begin therewith, and that the disciple might make it the foundation of all his rule and conduct of life. It was not set by Him to be the foundation of the Church to show its power only, but also to teach every man who might wish to begin to build the new edifice of his discipleship to make it the beginning [thereof], and in all other parts of the building it will support and raise up the mansions of the virtues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25202%2520--%2520On%2520Faith.html'
source_title="13 Ascetic Discourses, Discourse 2 -- On Faith"
