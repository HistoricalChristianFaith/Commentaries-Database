[[commentary]]
quote='''
The door of the Giver is opened to the petitions of faith, even as He said, "Whatsoever ye shall ask, not being doubtful, ye shall receive." In the house of God faith giveth her commands like a mistress of wealth and a ruler of possessions. The mystery of faith is a wonderful and exalted thing, and no man is able to fathom its mystery; and it is so great that it is a place of habitation for God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25202%2520--%2520On%2520Faith.html'
source_title="13 Ascetic Discourses, Discourse 2 -- On Faith"
