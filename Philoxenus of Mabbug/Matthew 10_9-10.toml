[[commentary]]
quote='''
To all the others who wished to walk in the lofty path of perfection He said, "Possess not gold, nor silver, nor money in your wallets, nor two coats, nor shoes, nor staff, for the labourer is worthy of his food," that is to say, "Such freedom befitteth such labour." So then Jesus sent them from all the world, and then He brought them out of the world, saying, "Go forth, and leave everything in its place in the world, and take not out with you to the country of life things which are mortal. Ye have been called to put on purple, cast off first the filthy rags of the world, and then put on royal purple. For who that wisheth to put on the glory which is for eternity would not first cast off the garments which are worn out, and then put on that glory which never becometh old? And whosoever wisheth to be enrolled in Jerusalem above will not have a dwelling in the earth, but he will dwell in that city. Whosoever wisheth not to be received in that world by Grace shall be received in this world graciously by every man; and whosoever wisheth to be a dweller in the marriage chamber, let him not possess in this world either a wallet or a cloak; and whosoever seeketh to obtain God, let him not possess money in his wallet; for it is an endless disgrace that together with God a man should be possessed of money. For he who possesseth the things of time, together with those of eternity, is not sensible of the greatness of his possession, and therefore he runneth to obtain poverty together with riches. And neither is it possible that these two treasures can be contained in one vessel, for no man ever put scourings together with gold in one vessel, nor did any one ever account straw and wood of equal value with precious stones." This commandment then was given by the Master to His disciples when He sent them to be fishers of men unto life; He cut off first from them all the fetters of the world, and He loosed from them all human ties, and then He sent them to loose others, for the man that is fettered cannot loose him that is in bondage. The possession of the things of the world is a fetter to all the members, and a curb of all the senses, and the whole man is bound and fettered in his inward and outward things thereby. And well did our Lord first loose the fetters of the world from His disciples, and then send them to loose the bonds of others, that those who were in bonds might see that those whose bonds were loosed bore the mark of freedom, and the sign of the Kingdom, and that He that loosed them might be believed in by them, especially when they saw that those from whom they had cut off the bonds of the world were free.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"

[[commentary]]
quote='''
Let us then be strong in the war against this evil lust which although it be a good thing when coupled with marriage in the world, is accounted a vice if it be wrought by disciples; for not every thing is good for every man, even though it be very fair and good in its nature, for riches in the nature of their creation by their Maker are good, but if solitaries, who are commanded not to have two tunics, and not to take care for the morrow, acquire them, the possession thereof to them is a vice. And the eating of flesh and the drinking of wine is pure unto those who devote themselves unto the life of the world, but for those who of their own will have given themselves unto the maintenance of the election of the discipleship of Christ, it is not right to make use of things, except for necessity's sake. And, moreover, good and fair also are the powers and dominions of this world, for it is written, "There is no dominion which is not from God", but for those who have separated themselves from human habitation, and have promised to do great and sublime things, to desire human grades of honour is a subject for rebuke and reproach. And dwelling in cities and villages, and the habitation in the world, and life and intercourse among the children of men are not blameworthy, but for those who have become destitute for the love of God, and who have once cast off the world of their own free-will, and have gone forth to become solitaries and ascetics outside it, the dwelling among and intercourse with the children of men are unto them subjects for reprehension and blame; and there are many things like these, the doing of which is blameless unto those who have not already bound themselves by a covenant against them, but if they be done by those who have promised to abstain from them they are blameworthy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252012%2520--%2520First%2520Discourse%2520on%2520Fornication.html'
source_title="13 Ascetic Discourses, Discourse 12 -- First Discourse on Fornication"
