[[commentary]]
quote='''
And unto another, who by the perfection of the doctrine of Christ wished to satisfy his lust for oppression, He answered, "Who hath made Me a judge and a ruler over you?" And unto another who, in His name, wished to gather together riches, and who was scheming that by the mighty deeds, and the signs, and the wonders, which he wrought by His power, he might become the owner of possessions, He said, "I am poor, and I have not where to lay my head."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
