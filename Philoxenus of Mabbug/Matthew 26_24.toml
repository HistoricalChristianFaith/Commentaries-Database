[[commentary]]
quote='''
And when they have come they are only His disciples in name, while in truth they belong to the world; to the Christian life they belong falsely and according to the sight of the eye only, and to the world in thought and deed; to the Christian life for custom's sake only, and to the world for their will's sake; to the Christian life by forcible consent, and to the world by the intelligence of their own freewill. And to speak briefly, in the Christian life is their shadow, and in the world is their body; in the Christian life they exist in form and appearance only, and in the world in their true person, being made the cause of stumbling to themselves and also to their brethren. And for those who are thus, it would have been better, according to the word of Christ, if they had never been born, or if they were born that they had remained in the infirm country of the life of this world in which they were, and had not come to make others sick with themselves, or to make living limbs die, being themselves dead before God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25203%2520--%2520On%2520Faith.html'
source_title="13 Ascetic Discourses, Discourse 3 -- On Faith"
