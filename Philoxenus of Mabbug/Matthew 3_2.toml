[[commentary]]
quote='''
"The kingdom of God is within you," and in another place the Book saith, "Repent, for the kingdom of heaven is at hand," and two things are certain: the kingdom of heaven which the righteous shall inherit at the end of the world, above the heavens, and the kingdom which is in you, which is the knowledge of the spirit which is revealed unto spiritual beings, and as it were, we have already been in the kingdom of heaven in unspeakable happiness. Now neither of these can be found without afflictions and labours of the body, for those who bear labours in the body are heirs of the kingdom of heaven, and those who, together with labours, possess innocency of soul also, become the discoverers of the kingdom which is in them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
