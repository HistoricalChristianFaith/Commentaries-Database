[[commentary]]
quote='''
Now poverty is a light thing to those who possess it, and if a man were to call the poverty which is for the sake of God "riches," he would call it rightly, and even as it is. Therefore our Lord also lifted a heavy yoke from His disciples in that He made them destitute of the riches of the world, saying, "Come unto Me, all ye that are weary and are laden with heavy burdens, and I will give you rest." And who are these, unless it be those who are wearied by the superfluities of riches, and who bear the heavy yoke of the cares and anxieties of the world? And what weariness is so oppressive as this? For when thou hast come to enjoy thyself, thou art the more tired. The care for human riches is a path which hath no ending in this life, for however far a man may travel along it, it lengtheneth out before his footsteps, and there is nothing which breaketh it except death. And when a man hath gathered together riches and mammon that he may enjoy himself, and live daintily and luxuriously, his enjoyment is weariness, and if the enjoyment of the world be weariness, what shall weariness itself be called? And if the enjoyments and luxuries are heavy labours, what shall labour itself be called? For the world is heavy in all its conversation, but because of the love thereof they who carry its burdens perceive them not, and they stumble therein like blind men, but discern it not, and though they carry heavy burdens, they are light unto them, and they weary and exert themselves painfully after the merchandise of loss, but know not that it is loss. And because our Lord saw them in this empty labour, He cried unto them, saying, "Come unto Me, and I will give you rest, for in your weariness there is no rest. But your weariness begetteth weariness, and your labour bringeth forth labour, and your riches gather together poverty, and your rest is tribulation, and your enjoyment is affliction, and your refreshing is toil; for the path of the desire of riches which ye have trodden of your own freewill hath no end; but if ye will come to Me by My road it will come to an end."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
