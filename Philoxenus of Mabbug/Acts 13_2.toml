[[commentary]]
quote='''
And in every place is it written concerning them that they fasted and prayed. "And while they were fasting and praying, the Holy Spirit said to them, Separate ye unto Me Paul and Barnabas for the work whereunto I have called them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
