[[commentary]]
quote='''
When He saw all the sinners who were running to the baptism of John, the prophet of God, He also went with them, and He bowed His head under the hand of the Herald, and He received baptism from him as one who was in need thereof----from him who needed to be baptized of Him; and He forsook the habitation of man, and went forth to the wilderness to John with all the multitudes. And why did He do these things unless it were to teach those who were masters of wealth, and those who dwelt in the world, to go forth to the saints, and to run to the solitary dwellers, and to honour the prophets and righteous men, and to be obedient to the admonition of their words by the discretion of their faith?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"
