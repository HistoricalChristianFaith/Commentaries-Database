[[commentary]]
quote='''
It is meet for every man that would draw nigh to God that he should possess the mind of a child; and as a child is towards his father and mother, so should he be towards God and towards His dispensation. And as the child receiveth instruction from his master without searching into his words or examining his doctrine, and without judging in his thoughts that which he teacheth him—for he hath not sufficient ability in his own thoughts to be a judge of what he heareth—so also is it meet for the man to be towards God, neither enquiring into Him with his words, nor judging His deeds and actions in secret thoughts; for he is a child, and like a child he should incline his ear unto His instruction, and receive it with faith. And it was also for this reason that God gave birth to us a second time, that He might teach us that we were children and infants of the world born unto faith, for the womb which gave us birth—that is, baptism in which the Spirit is mingled—has been made the means. Now we have been born in faith, and as the natural child who is born from the womb existeth wholly in natural simplicity and knoweth nothing of the world, and seeketh not to know, and enquireth not, and thinketh not, and speaketh not, except that he moveth only with the living motions of nature, being remote from all power of the mind, so also this child, of the Spirit, who hath been brought forth by the womb of baptism instead of by the natural womb, is not bound to enquire concerning Him that begot him while he listeneth to His words with sincerity, and he should become like a child to His doctrine, accepting [His] commands and drawing not nigh to enquire into them. And as that natural child learneth the names of the things of the world without understanding their power, so also let [the child of the Spirit] accept the names and words, and God shall give him the secret of understanding them. For in respect of that knowledge we are children and infants compared to the unspeakable wisdom of God, and thus also are we called by the word of our Redeemer, [Who said], "Suffer little children to come unto Me, and restrain them not, for of those who are like these is the kingdom of God." And again in another place He said, "Whosoever will not receive the kingdom of God like a little child shall not enter into it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25202%2520--%2520On%2520Faith.html'
source_title="13 Ascetic Discourses, Discourse 2 -- On Faith"
