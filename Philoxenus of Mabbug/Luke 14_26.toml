[[commentary]]
quote='''
"Unless a man deny his father, and his mother, and his brothers, and his sisters, and the whole world, and also himself, he cannot be My disciple;" hear this voice, O disciple, and go forth from the world, and this Gospel which promiseth spiritual blessings alone can lead thee away from the life and conduct and habits of this world. Thou hast heard this voice, believe it then, and of it be a disciple and of nothing else, and let nothing else be the cause of thy going forth from the world, otherwise thy going forth will not prosper. For as is the first cause, so also happeneth it with the rest of the matters which follow after it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25203%2520--%2520On%2520Faith.html'
source_title="13 Ascetic Discourses, Discourse 3 -- On Faith"

[[commentary]]
quote='''
And again in the case of the holy Apostles, He renewed that call of Abraham; and observe their faith also, that it was like unto the faith of Abraham; for as Abraham heard immediately he was called, so also immediately He called the Apostles, they heard and went forth after Him. "He saw them casting nets into the sea, and He called them, and straightway they forsook their nets and their father, and went after Him;" and before they had heard from Him the words, "If a man forsake not his father and mother, and everything that he hath, and cometh after me, he cannot be My disciple," they forsook everything and went after Jesus. For He did not propound for the disciples lengthy doctrine, but only the hearing of the word of faith; and because the faith which was in them was living, immediately it received the living word it became obedient unto life, and they ran thereafter straightway, and delayed not.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"

[[commentary]]
quote='''
Accept thou as a proof the life of this righteous man, and learn also therefrom that a man cannot become a perfect disciple of Christ unless he make himself a stranger to the whole world after the manner of this righteous man, even as the word of Christ also hath taught us openly, "Except a man renounce the whole world, and his brethren, and his kinsfolk, and his family, and his father, and his mother, and everything that he hath, and that which is greater than them all, even his own life, he cannot be My disciple."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
