[[commentary]]
quote='''
He sat among the teachers, and listened unto them, and asked them questions, and He bowed His ear, and received instruction, that thou also mightest hear and ask questions, and incline thine ear continually to the hearing of the divine commandments, and that thou mightest ask questions and learn those things which are beneficial to thy life, even from those who are inferior to thee in knowledge, even as our Lord Himself asked questions of those who were inferior to Him in knowledge, and He received doctrine from those who had gathered together doctrine from the law which He Himself had given.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"
