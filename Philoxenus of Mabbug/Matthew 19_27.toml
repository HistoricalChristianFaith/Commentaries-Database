[[commentary]]
quote='''
And, moreover, let us also see from the speech of Simon to our Lord, and let us also learn from the first disciple how it is meet for us to become disciples. "Behold we have left everything, and have come after thee." What then shall we have? Thou hast heard what this disciple said, and how he hath revealed unto thee the truth of his absolute poverty, and that they, that is, the disciples, possessed nothing besides Jesus. "We have left everything, and have come after thee." Behold the definite law of discipleship. They did not have one thing and not the other, and they did not renounce one thing and hold fast to the other; but they left everything, and followed Jesus. Do thou then forsake everything and go forth after Him, and observe, immediately the might of the Apostles clotheth thee, that thou wilt feel and know in very deed that the Word is not a lie; for thou canst not ask Him to make thee worthy of the sight of His hidden and spiritual riches whilst thou hast not made thyself destitute of everything which is visible. So long as thou holdest fast that which is thine own, He will not shew thee the things which are His. Give everything that thou hast for the love of Him only, being in thy gift watchful against the thought that seeketh human praise, and go forth and travel along the road a little, bearing afflictions and labours with purity of the thoughts; and observe, immediately His glory riseth in thy soul, and He mingleth the spirit in thee, how thy whole being will be smitten with the love of Him, and thou wilt also forget the weight of thy afflictions, and He will suddenly change thee from one being into another, that is to say, from the old into the new.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
