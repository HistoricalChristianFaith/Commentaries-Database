[[commentary]]
quote='''
The custom of faith which is mingled with simplicity is that it receiveth not doctrine by much persuasion, but as the sound and healthy eye receiveth not the ray which is sent therein by contrivances and cunning inventions—but immediately that it is opened it looketh with strength upon the light, because its natural sight is sound—so also the eye of faith, which is set in the pupil of simplicity, immediately it heareth the voice of God recogniseth it, and there riseth in it the light of His Word. And joyfully it draweth towards Him and receiveth Him, even as our Lord said in His Gospel, "My sheep hear My voice and come after Me." Wherever natural faith is preserved in its original state, that man, with whom this faith is preserved, is a sheep of the Shepherd.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
