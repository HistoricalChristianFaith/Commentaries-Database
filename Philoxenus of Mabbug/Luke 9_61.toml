[[commentary]]
quote='''
Hear also again another proof, which like the preceding will bring instruction nigh unto thee, and the example of the testimony of which will urge thee to deny thyself everything, and to go forth after Jesus. "And one of His disciples drew nigh and said unto Jesus, Suffer me to bid farewell to them that are at my house, and I will come after Thee." Hear also in this case what the Master answered the disciple, and receive it as if it had been spoken unto thee by that disciple: "No man, having put his hand upon the ploughshare, and looking back, is fit for the kingdom of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
