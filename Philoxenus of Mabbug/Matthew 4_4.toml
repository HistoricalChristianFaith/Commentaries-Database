[[commentary]]
quote='''
"Man shall not live by bread alone, but by every word which goeth forth from the mouth of God." Now He said "shall live," and not, "shall be sound," nor, "shall be strong," nor, "shall be filled its lust's need;" and although this word is of little importance in its utterance, yet a great distinction is apparent therein. For He taught us clearly by that word that not by bread alone should man live, but that he should eat only to live, and not for the sake of lust, or strength, or healthy condition; for according to these things is life stablished also in sickness, and in weakness a man liveth unto them in the world. And as whosoever hath a severe disease in his body, that is to say, in those members which are the receptacles of meat, the food which he receiveth nourisheth his disease and not his strength, even so also whosoever feedeth the lust which is in him, his meat nourisheth his lust and not his human life; and it is manifest that whosoever nourisheth his lust giveth birth to other lusts, for as is the nature of the ground, so is also the taste of the fruit of trees which grow up therefrom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
