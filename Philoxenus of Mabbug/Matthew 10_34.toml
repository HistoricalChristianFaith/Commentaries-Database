[[commentary]]
quote='''
"I have not come to cast peace upon the earth," why then dost thou hasten to have peace with the children of the earth? I cry War, and yet thou hastenest to peace; I preach Division, and thou hastenest to strengthen concord. I have come to set a man against his father, and the daughter against her mother, and the bridegroom against the bride, and thou hastenest to salute the children of thy house, and to sew together with thy folly the rent which I have made in the world. I have rent this garment of concord because it was woven wholly of error, and in its place I have woven another garment of heavenly peace; do thou also weave this garment, and hasten not to sew an old garment. I have put an end to the world which was wont to increase wickedness in every man, and I have scattered that brotherhood which was assembled for the gathering together of sins; hasten thou not to become a companion of those who work iniquity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
