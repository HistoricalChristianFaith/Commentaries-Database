[[commentary]]
quote='''
Let us now consider the answer of our Lord unto that young man who drew nigh unto Him, and who asked Him to teach him the doctrine of perfection, from which he might also receive perfect knowledge, and be born from one rule of life into another. Now when in order to learn he asked, "What shall I do that I may inherit eternal life," Jesus said unto him, "Thou shalt not kill, Thou shalt not commit adultery, Thou shalt not steal, Thou shalt not bear false witness," which things constitute remoteness from wickedness; and He taught after these the working of good by the word which He spake, saying, "Honour thy father and thy mother, and that which is hateful unto thee, thou shalt not do unto thy neighbour," and He said, "If a man keep these things, he shall inherit life everlasting."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
