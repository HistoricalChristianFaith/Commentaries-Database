[[commentary]]
quote='''
"Verily I say unto you that He shall make His chosen ones sit down, and He shall gird up His loins and shall go in and minister unto them." Be thou then at all times mindful of this table, that from the remembrance thereof thou mayest receive strength, and mayest be able to despise the natural table; for there is no man who would exchange the dainty table of the kingdom for the coarse and common table of the bread of wheat, and more than this the table of meats of the body is smaller and inferior in comparison to that spiritual table.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
