[[commentary]]
quote='''
Now although the saying, "Whoso shall cause one of these little ones to stumble, it were better for him that the millstone turned by an ass should be hanged about his neck, and that he should be sunk in the depths of the sea", admitteth of other significations, yet it is particularly applicable to the simple, that no man may dare to scoff at the simplicity of the upright. For when thou hast laughed at and hast mocked and made scorn of his simplicity, and hast blamed his pacific nature and hast despised his integrity, and he is accounted by thee fit for nothing and useless, the indignation of thy blasphemies against him will drive him to strip off and to cast away his innocency and to deny his simplicity, as if it were the cause why he should be mocked, and to flee from that childlikeness by reason of which he was deemed by the audacious to be a fool, and instead of what he was, to become what he was not, and through thy indignation and thy blasphemies against him thou wilt make him to stumble in his first rule and conduct, and to forsake it, and instead thereof to lay hold upon other things which are the opposite of his innocency. And although he be leading a life of silent meditation he will reject this, and will honour and choose speech rather than silent meditation, and craftiness rather than his early simplicity, and subtlety rather than his ignorance, and from being a sweet-tempered and peaceful man thou wilt make him a furious and wrathful man. Now therefore when thou thus hast caused him to stumble, and he hath been driven by thy indignation to change his good qualities into bad ones, it were better for thee that the millstone turned by an ass should be hanged about thy neck, and that thou shouldst be cast into the depths of the sea, rather than that thou shouldst cause one of these little ones who believe on the Son to stumble.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25205%2520--%2520Second%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 5 -- Second Discourse on Simplicity"
