[[commentary]]
quote='''
And in this respect also they are to be compared to Christ God, who in some cases wrought things like a Being of power, and in others He [first] entreated and afterwards worked. He did not raise Lazarus until He had prayed; He did not bless the bread and distribute it to the multitudes until He had looked up to heaven; and He did not give the command for the ears of the deaf man to be opened until He had spit, and laid His fingers upon his ears, and looked up to heaven. For in this manner Jesus also wrought marvellous things, so that He might also bring Himself down to those whom, by His grace, He called, His "brethren"; and that it might not be grievous unto them that they were not answered until they had prayed He humbled Himself and prayed, and was afterwards answered. For the Lord took upon Himself equality with His servants in order that that which is written might be fulfilled, "In everything it was meet that He should be like unto His brethren."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25202%2520--%2520On%2520Faith.html'
source_title="13 Ascetic Discourses, Discourse 2 -- On Faith"
