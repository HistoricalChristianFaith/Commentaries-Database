[[commentary]]
quote='''
And remember how the Holy Book recounteth unto thee concerning his abstinent rule of life, which was new and different from that of all the other children of men, for his clothing was of camel's hair, and skin girded his loins, like the prophets, and his food was locusts and wild honey, and his dwelling-place was the desert wilderness which was destitute of peace, and he lived among the beasts of the wilderness. And from his youth up he fulfilled all this stern life of abstinence, and after these things he was held to be worthy of the revelation, and to become a herald of the advent of the Highest, and before the Crucifixion to be equal unto those who were after the Crucifixion; and although as yet human nature was not born unto spirituality he alone was born thereto before the birth of all other men. And of this sight which is above speech, and the change which is to be wondered at and admired, together with the power of that Grace unto which everything is easy, he was held to be worthy by reason of his strict abstinence; for it is the nature of this rule of life that when purity of the soul is nigh thereunto, it giveth birth unto man that he may be in the world of the spirit, and a counterpart of the angels, although he still sojourneth in the world of the body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
