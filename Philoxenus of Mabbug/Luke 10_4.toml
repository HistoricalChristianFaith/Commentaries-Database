[[commentary]]
quote='''
"I will go and bid farewell to the children of my house," but Christ said unto him, "Thou hast no peace with them," for "Ye shall salute no man by the way"; and the meaning of this speech is that Christ thereby denied His disciples also that salutation of the peace of the world. These things were said in the person of one disciple unto every man, that is to say, unto all those who have dedicated themselves unto discipleship, for it is better that a man should not be a disciple unto God in name, being in truth a disciple of the world, and that he should not hire himself unto One, and serve the other.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
