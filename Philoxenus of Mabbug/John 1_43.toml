[[commentary]]
quote='''
And concerning Philip also it is written that He said, "Come after Me," and straightway he went after Him. In this sincerity and simplicity then the Apostles went after the word of Christ, and the world was not able to impede them, nor human customs to hold them back, nor was any of those things which are esteemed of any value in this world able to impede those souls which had perceived God. Now there is nothing stronger in the world to the man who hath in him the life of faith than the word of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
