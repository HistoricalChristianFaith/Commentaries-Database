[[commentary]]
quote='''
And how superior is the grade of perfect and spiritual men to that of the righteous and the merciful who are in the world the words of our Redeemer, which were spoken unto the lords of wealth in this world, are sufficient to shew: "Be strenuous to make unto yourselves friends of the mammon of iniquity, that when it hath come to an end, they may receive you into their everlasting habitations." Behold, therefore, the perfect, like the lords of the country and citizens, receive the righteous strangers who go into their world, because they are sons of the inheritance of Christ, and heirs of the Father Who is in heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
