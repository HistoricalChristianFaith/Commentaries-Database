[[commentary]]
quote='''
The Apostle Paul considered Him as one "of no reputation", and the crucifiers considered Him to lack understanding, and His enemies accounted Him to be without knowledge and intelligence, and concerning Jesus Paul spake against them, "The foolishness of God is wiser than the children of men."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25205%2520--%2520Second%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 5 -- Second Discourse on Simplicity"
