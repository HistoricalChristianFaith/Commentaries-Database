[[commentary]]
quote='''
"No man, having put his hand upon the ploughshare, and looking back, is fit for the kingdom of God," that is to say, "Whosoever fulfilleth this work in nature, and who guideth the plough with oxen according to the custom of man, and who suffereth himself to look behind him instead of in front — now in this manner the work would never be completed — is not able to advance, nor are his furrows cut straight, and the oxen also do not travel forwards; and although this work be visible, and one which can be seen, and it taketh place in the very earth itself, yet if the ploughman look behind him, his labour is spoiled. Now as concerning My own discipleship, one labour differeth from another, even as world differeth from world, and life from life, and immortal from mortal beings, and God from the children of men; if then thou takest the yoke of My discipleship upon thy soul and body, thou must perform the service of My commandments, and thou must turn thyself back to the world, and it must not be a care to thee to make peace with thy kinsfolk, and thou must not be anxious to pay unto them the obligation of honour according to the body, and to fulfil unto them the law of the fulness of the world, and then to come after Me. For if thou wouldest pay the obligations of the world, those which are due unto Me cannot be paid; and if thou art anxious not to offend the world in anything, why then shouldst thou set thyself to provoke Me? Let there be no peace between thee and the world, in order that thou thyself mayest have peace with Me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
