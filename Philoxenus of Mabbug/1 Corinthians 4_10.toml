[[commentary]]
quote='''
And again in another place he saith, "We are fools for Christ's sake, and sick, and despised, and dishonoured, and we have nothing." And while in this world in which we live we possess nothing, we hold everything in that which is ours.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25203%2520--%2520On%2520Faith.html'
source_title="13 Ascetic Discourses, Discourse 3 -- On Faith"
