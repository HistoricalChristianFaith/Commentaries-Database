[[commentary]]
quote='''
And moreover our Lord also maketh known that heretics are cunning and crafty, for He said, "Beware of false prophets, which come to you in sheep's clothing, but inwardly are ravening wolves;" and He maketh known also, that when a man appeareth to be one thing and is another, he is a worker of cunning. To appear in sheep's clothing, being actually wolves, was taught unto them by cunning; for cunning ministereth unto two things, it maketh wickedness to grow, and it maketh wickedness to increase, and moreover, it schemeth how it may teach itself to others. Where it is meet to hide, it hideth, and where it knoweth that it is meet to reveal, it revealeth; for wickedness is blind, but cunning hath eyes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
