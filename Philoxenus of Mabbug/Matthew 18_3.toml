[[commentary]]
quote='''
And again to the disciples who asked craftily which should be greatest in the kingdom of heaven, and who lusted with crafty mind to rise a step above the others, He taught the simplicity of children, in whom there is no desire for dominion and rule, and whose thought hath never experienced the love of the honour of the world. "Verily I say unto you, that except ye be converted and become childlike and simple as children ye shall not enter into the kingdom of heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"

[[commentary]]
quote='''
After our Lord had rejected the companies of the wise, and the bands of cunning and crafty men, and had chosen those fishermen who were innocent and without instruction, He moreover taught them also to increase their simplicity, and not to abide in that first grade of their childlikeness only. And He took a child and set him in the midst of them, and looking at them all, He said, "Except ye be converted, and become like this child, ye shall not enter into the kingdom of heaven." And this our Lord did because He saw that they sought to depart from the mind of their simplicity through a question of position of honour and to receive one a grade above the other. A question such as this the simple never seek to enquire into, but this question was born of a mind which desired to examine into matters with craftiness. And our Lord rebuked this outcome of a troublesome question, and said to His disciples, chiding and reproving them, "If ye are Mine ye must be simple men, and if ye desire the kingdom of heaven, ye must be like unto this child; as ye desire to receive the life which is to come abide in sincerity. If ye wish to become wise in the word of life abide in your ignorance, for from being simple I do not desire that ye become cunning, but from being simple become ye wise. For he that runneth to become cunning from being simple goeth downwards, but he that runneth to become simple from being cunning goeth upwards. The cunning man receiveth not My doctrine, and for the reason that ye are simple children I have chosen you. Ye have rejected cunning in others, beware lest it be in you and I reject you because of it. Let this child be a proof to you that as he desireth nothing of the world, and asketh for nothing of the children of men, neither rank nor honour, neither riches nor power, but only the mere food and clothing of which his childhood hath need, so also do ye become children like unto him, and upright and simple like unto him, that ye may be to Me chosen disciples, and that ye may be found by Me to be even as I have chosen you." Behold then, by this command also did Jesus our Lord incite us to simplicity, and He warned us to become innocent and upright.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25205%2520--%2520Second%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 5 -- Second Discourse on Simplicity"
