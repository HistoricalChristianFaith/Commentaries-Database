[[commentary]]
quote='''
And who of all the ancients, who were accounted worthy of the sublime and wonderful gift, was like unto John the Baptist? According to the testimony, which Christ spake concerning him, "He was the greatest of all the Prophets"; and again He said, "Verily I say unto you, among those born of women there is none greater than John the Baptist." Now let us understand and see how and what was the rule and conduct of life of this marvellous man who arrived at such greatness as this, and why he was accounted worthy of all this gift, and with what increase and with how great labours, and after what asceticism, and for how long a time he lived a solitary life away from human intercourse; and when we have seen and have understood these matters of his life, let us consider the greatness of the things which were unto him, and let us understand first of all the things which concern the will, and afterwards the things which concern grace, for until the will shewed its fruits the Spirit gave not its gift.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
