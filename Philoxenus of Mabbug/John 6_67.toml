[[commentary]]
quote='''
And observe also the love of the Apostles, which was a wonderful thing, for while as yet the Holy Spirit was not mingled in their nature, they accompanied Jesus in all fervour, and without His stimulating or flattering them, as He to-day flattereth thee with all manner of entreaties, but He spake unto them haughtily, and from outward signs it might be thought that He was driving them away from Him. "If ye wish to go away, depart," He once said unto them, and by reason of the hardness of His word many left him and departed. Simon saith unto Him, "Unto whom shall we go?" We have once and for all gone forth after Thee, and we have no place to go away from following Thee. "For Thou hast the words of eternal life," that is to say, "Thy words are life, and how shall we forsake life and go after death? For we have forsaken everything and come after Thee, because we believe and know that Thou art the Son of the Living God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
