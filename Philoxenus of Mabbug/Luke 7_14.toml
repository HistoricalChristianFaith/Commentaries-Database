[[commentary]]
quote='''
Others, however, He healed by a command of power, without either looking up to heaven or asking His Father. For by a command of power He raised up the young man, the son of the widow; with a word He called to the daughter of the chief of the congregation and straightway she stood up; He commanded the sea and it was silent, and the wind and it was stilled; He spake only, "Fill the water pots with water and draw out and bear to the governor of the feast," and created matter delayed not [to do] His will. "I say unto thee," He spake to the dumb spirit, and immediately it departed from the man. "I will, be thou clean," He spake to the leper, and as He willed, straightway the leprosy fled from his body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25202%2520--%2520On%2520Faith.html'
source_title="13 Ascetic Discourses, Discourse 2 -- On Faith"
