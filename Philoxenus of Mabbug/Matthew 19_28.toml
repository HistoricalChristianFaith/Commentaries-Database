[[commentary]]
quote='''
And behold both the manner of thy going forth, and the wages thereof are inscribed in one place; and as to how thou shouldst go forth, thou mayest learn from the words, "We have left everything, and come after Thee." And what the wages of this going forth are the word of our Lord sheweth thee, saying, "Verily I say unto you, that in the new world, when the Son of Man sitteth upon the throne of His glory, ye also shall sit upon twelve thrones, and judge the twelve tribes of Israel." Behold the wages of going forth is participation with Jesus in sublime honour! For He will set the thrones for the disciples opposite to His own throne; and that which with nature is impossible He shewed by His word that it cometh to pass. For He did not promise those disciples who loved His word to honour them like servants and like men who were in subjection, but to make them worthy of the majesty of thrones like unto friends and like unto those who were similar unto Him in His glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
