[[commentary]]
quote='''
And again in another place He restrained that man who wished to perform two things in one, that is, honour to his parents and discipleship to Himself, and told him that it was impossible that two things which were the opposites of each other could happen at the same time: "Teacher, suffer me to go and bury my father and my mother, and I will come after Thee," that is to say, "I will keep the first commandment which God commanded me, Honour thy parents and be obedient unto them, and then I will come after Thee and minister unto Thee." And what answer did Jesus return to this? "Leave the dead to bury their own dead; and go thou and preach the kingdom of God. It is not necessary for thee to keep the law, for it hath been kept and is dissolved, neither hast thou any need to minister unto natural parents, because I have been obedient unto parents according to the body, and I have ministered unto them on behalf of everyone. The yoke of the law and nature is henceforth lifted from off thee, and thou art left a free man unto thyself, there being no worldly power that can subdue thee, for thou art dead unto the world, and thou art dead unto it. Dead bodies have not service paid unto them, they are only wrapped in shrouds and buried; leave the dead then to bury their dead, and do thou go and preach the kingdom of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
