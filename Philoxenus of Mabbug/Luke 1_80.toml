[[commentary]]
quote='''
And also it was because the marvellous preacher, John the Baptist, according to the testimony of the Book, lived in the wilderness until the day of his showing himself to the children of Israel, that he was able to receive and to teach Divine mysteries, and to receive the power of the baptism of the Spirit. And of the things which none of the early prophets had perceived, he, through the natural simplicity in which he had been brought up, became a receptacle in the wilderness; and Grace led him forth to the wilderness that he might remain in the simplicity of nature, and be able to receive the knowledge of the mysteries which were above nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
