[[commentary]]
quote='''
And it is moreover like unto another speech which Jesus spake unto them when they sought to take Him with them to the feast as they were going up to Jerusalem, to that feast, according to His former wont before baptism, when He separated Himself from them, saying, "Go ye up to the feast, but I will not go up to the feast," and after He had dismissed them, and had not gone up with them, He turned back, and went up in the midst of the feast. And His going up is not contrary to that which He said, "I will not go up," for He said, "I will not go up as one who is subject unto the law," because they were going up as men who were subject to the law, that they might do the works of the law; but Jesus went up as one having authority, to gather together unto Him those who were bidden to the new feast. And in that He said, "I will not go up," He shewed two things; that He was subject neither unto parents, nor unto the law. For he that is subject unto parents doeth whatsoever they command him, and he also who is under the law must, together with the commandments, observe all its works. He was from the beginning of the feast bound to go up, because at this feast all the Jews also were going up to the Temple, and, moreover, they went up thither a few days before the feast, to purify themselves, that when they came to the first day of the feast they might be pure. But Jesus did none of these things, for He went not up with them in order that He might shew them that He was not subject unto them, and He did not go up at the beginning of the feast that He might teach them that He did not go up to keep the feast; but He went up in the middle thereof, going up of His own freewill. And His going up after He had told His parents that He was not going up was like unto that which He did at the feast of Cana, for after He had said to Mary, "What hast thou to do with me, O woman"----a speech which seemed to indicate that He would not be obedient unto what she had said----He turned and did that thing which she had said, not because she had commanded Him, but because of His power, and because the time had come for Him to begin to work miracles, that thereby it might be seen Who He was, and that He might make His glory known and gather together unto Him disciples, and also that He might shew that henceforth He would do everything with authority like One that was free, and not according to the feebleness of human nature, and not according to the subjection of parents, and not according to the law's command.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"
