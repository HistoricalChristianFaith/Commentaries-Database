[[commentary]]
quote='''
Our Lord also called Zacchaeus from the fig tree, and he came down immediately, and received Him into his house, for he was waiting to see Him, and to be His disciple, even before He called him. And it is a marvellous thing that though our Lord had neither spoken to him nor seen him in the flesh, yet he had believed in Him through the words of others; now the faith which was in him was preserved by the life and soundness of its nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
