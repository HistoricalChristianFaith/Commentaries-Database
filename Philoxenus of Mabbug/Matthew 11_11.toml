[[commentary]]
quote='''
And who of all the ancients, who were accounted worthy of the sublime and wonderful gift, was like unto John the Baptist? According to the testimony, which Christ spake concerning him, "He was the greatest of all the Prophets"; and again He said, "Verily I say unto you, among those born of women there is none greater than John the Baptist." Now let us understand and see how and what was the rule and conduct of life of this marvellous man who arrived at such greatness as this, and why he was accounted worthy of all this gift, and with what increase and with how great labours, and after what asceticism, and for how long a time he lived a solitary life away from human intercourse; and when we have seen and have understood these matters of his life, let us consider the greatness of the things which were unto him, and let us understand first of all the things which concern the will, and afterwards the things which concern grace, for until the will shewed its fruits the Spirit gave not its gift. Observe then the life of this marvellous man, who from the time of his childhood was set apart from dwelling in the world, and from intercourse with the children of men; and he was not first of all denied and polluted, and afterwards cleansed and purified, but his youth passed in purity before it arrived at the motions of nature which distinguish between good and evil things. And he was brought up in the wilderness, and he had not in him any worldly care whatsoever; and he did not taste by experience the wickedness of the children of men, and then cast it away, neither was he first moved by lusts and by passions, and afterwards came to peace of the thoughts by the labours of his freewill.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
