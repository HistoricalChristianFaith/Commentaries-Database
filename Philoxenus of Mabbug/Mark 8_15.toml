[[commentary]]
quote='''
And again in another place our Lord taught His disciples to beware of the cunning of the Pharisees and Sadducees, saying, "Beware of the leaven of the Pharisees and of the Sadducees, and of the leaven of Herod;" and thou mayest know that He here calleth cunning and wickedness by the name of leaven. Our Lord did not bid them beware of the doctrine of Moses which the Pharisees taught, but of their traditions which they invented in their cunning that they might be material for the merchandise of iniquity; and of their feigning to be righteous before the children of men; and of their being careful of the honour of God while in their secret works they belittled Him; and of their making long their prayers in order to devour widow's houses; and of their disfiguring their countenances that they might appear to be men who fasted; and of their washing the outside of the cup and platter—that is to say, they beautified and made fair the parts of them which were manifest—being filled within with iniquity and all impurity; and of their adorning their persons outside with a reverent and venerable demeanour to be observed with the eye, being secretly filled with rapine, and deceit, and wantonness, and the desire for all objects of lust. Of all this doctrine then of the Pharisees our Lord commanded His disciples to beware. All these things which arise from deceit, and which are wrought under a false disguise are born of cunning.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
