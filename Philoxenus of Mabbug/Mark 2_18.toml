[[commentary]]
quote='''
Now the Pharisees and the disciples of John, not having understood the power of this freedom, reproached Christ boldly, saying, "Why do we fast so much, and thy disciples fast not?" But Jesus made answer unto them in words the meaning of which was above the power of their understanding, saying, "The children of the bride-chamber cannot fast so long as the bridegroom is with them, for as at a feast it is not only the bridegroom who is clothed in white, and who is occupied with pleasure, but also those who have been bidden to the feast, and similarly, it is not only I, Who, after the conquest and the payment of the debt of all sufferings having arrived at this freedom of the feast, rejoice and am glad, but also My disciples, who have been invited unto the kingdom, and them do I make to participate with Me; but the days shall come when I shall be taken from them, and then shall they fast in those days, that is to say, when the full light of the power of free-will hath been gathered unto Me, then shall they also kindle the lamps of their endurance."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
