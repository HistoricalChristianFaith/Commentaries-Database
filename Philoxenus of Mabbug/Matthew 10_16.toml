[[commentary]]
quote='''
Why then instead of these things did our Lord command His disciples to be harmless as doves in respect of good things, and cunning as serpents, in respect of evil things? towards faith that they should offer simplicity, and against error that they should oppose craftiness? It was in order that the upright might save their life, and that the crafty might not destroy it. For for the acquiring of virtues simplicity must be employed by us; but that we may not perish craft is necessary for us; towards God sincerity of mind, and towards the children of men, who plot to take away from us the things of God, craftiness of thought. So then well did our Lord command us to be harmless as doves towards each other and towards Him, and crafty as serpents towards those who scheme to deprive us of spiritual things. For even the craftiness of the serpent is directed against the man, and not against itself, and it delivereth its body to blows by the craftiness of its nature, but it guardeth its head from injury, for from it death is transmitted throughout its entire length.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"

[[commentary]]
quote='''
Let us then, like disciples of Christ, run in the path which He hath shewn us, and let us walk in the way which He hath trodden for us, and let the invention of simplicity be precious in our sight, and let us be simple children to receive the doctrine which is good. And let us be wise as serpents against the Enemy who schemeth to do us harm, and let us remember at all times that which was spoken by Christ our Lord to all the disciples in His word, "Whosoever receiveth not the kingdom of God like a little child shall not enter therein"; may we by His grace be held worthy of this kingdom, and may we inherit it together with all the saints, through the mercy of Christ God, to Whom be glory for ever and ever.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25205%2520--%2520Second%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 5 -- Second Discourse on Simplicity"
