[[commentary]]
quote='''
Together with the work the Teacher set forth doctrine, not only in deed but also by His word, even as He did to Mary and Martha, who both offered service unto Him, but the service of Mary was more perfect than that of Martha, and both ministered unto Him, the one only according to the body, and the other according to the spirit, and our Lord received both services, and pronounced blessed the service which was superior to its fellow, saying, "Mary hath chosen the good part, which shall not be taken away from her." As if a man should say, "Do thou also, O Martha, forsake that service which is imperfect, and be exalted in thy service to the more excellent grade." And Jesus did not reject the ministration of Martha, for according to the measure of her knowledge and of her love was the measure of her ministration; but He wished that she would offer great instead of little things, and instead of the service of the body the service of the spirit. And the service of Mary and of Martha was like exactly unto the service of the holy Apostles of the old and of the latter times, for that bodily service which they also offered unto Him in one place after another was like unto that of Martha; but that other service which He taught them to offer unto Him in the commandment, "Ye shall possess nothing," was the counterpart of the service of the blessed Mary. For there are many who, like Martha and Zacchaeus, and those women who clave to Him, and who ministered unto Him from their possessions, are justified, and there are some whose service like that of Mary and the Apostles is wholly of the spirit; and Jesus wished and desired this service, so that all the children of men might arrive at perfection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"
