[[commentary]]
quote='''
When he wisheth to eat everything, and not to restrain himself by forbearance from any meat, he beginneth to repeat that which was written by our Lord, "It is not that which goeth into a man which defileth him;" for his ear is only pierced to hear such things as can be thought to support his lust, and in the face of the hearing of other things he shutteth the door of his attention. For he is not willing to hearken unto the other verse which saith, "Whosoever wisheth to be My disciple, let him deny himself, and take up his cross and follow Me;" nor unto the other which saith, "Whosoever wisheth to make his life to live shall destroy it," nor that which He spake unto His disciples, saying, "In the world ye shall have tribulations;" nor the words, "When the Bridegroom shall be taken from the children of the bridechamber, then shall ye fast." And therefore he would remember the passage concerning the eating of our Lord, where it is written of Him that, "He made the festival, and ate the passover;" or where it is said that, "They set before Him a piece of broiled fish and a piece of honeycomb;" or where again it is written, "They had fishes and bread." And these and such like things doth the glutton bring forward as proofs when he wisheth to eat everything freely, and the rule of the freedom of Christ, Who like God was above laws and commandments, doth he set forth to be a stumbling-block to his life, and he understandeth not the reason of that rule and conduct, and he perceiveth not that other types were inscribed therein. And again, when the Apostle Paul is read, and he heareth from him, "Everything which was created by God is holy, and nothing is to be rejected if it be received with thanksgiving; for it is sanctified through the word of God and prayer;" or another verse, "The belly for meats, and meats for the belly;" or that also which he spake, "Let not him that eateth not judge him that eateth." And in the other things like unto these which are written in the doctrine of Paul, the fool rejoiceth, and receiveth them gladly, without understanding the reason of the words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252010%2520--%2520On%2520Gluttony.html'
source_title="13 Ascetic Discourses, Discourse 10 -- On Gluttony"
