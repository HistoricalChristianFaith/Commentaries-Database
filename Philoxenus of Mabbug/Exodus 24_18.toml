[[commentary]]
quote='''
And like this holy man the blessed Moses also was twice deemed worthy to go unto the thick darkness and to receive the law upon the tablets; and he was made pure by fasting like unto this, and then he was deemed worthy of the terrible sight.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%252011%2520--%2520On%2520Abstinence.html'
source_title="13 Ascetic Discourses, Discourse 11 -- On Abstinence"
