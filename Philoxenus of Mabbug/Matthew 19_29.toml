[[commentary]]
quote='''
And our Lord Himself said unto the Apostles, "Not ye only, but every man who leaveth houses, or family, or brethren, or sisters, or children, for My sake, and for My Gospel's sake, shall receive an hundred-fold in this world, and in the world to come life everlasting." What sleeper would not wake up at the sound of these promises? What dead man would not come to life at this breath of spiritual life? And what sluggard would not be quickened at the pointing out of this path which goeth up to heaven? And who would not wish to despise himself and to make himself of no account at the hearing of His incomparable promise? Who would not deny the whole world, even if it happened that he possessed it, to become a consort of God upon the throne? And who would not be willing to exchange the things of time for those of eternity?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
