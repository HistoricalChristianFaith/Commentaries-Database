[[commentary]]
quote='''
And for this reason it is especially meet that every one who becometh a disciple of Christ should, from his earliest age, lay the foundation of his instruction in such a way that all his subsequent growth may receive goodly habits, and that the world may not exhaust the power of his soul and body, after which he may draw nigh to this service like an old and worn out vessel; but, according to what is said by our Lord, "Let us put new wine into new bottles, and both will be preserved". And thus in the beginning of our youth, when as yet our foundation is new, and while our strength is yet in us, and our freshness hath not been made old by sin, let us put within ourselves the new wine of the doctrine of Christ, that we may be able to endure the fervour of the love of the doctrine of Christ, so that while we preserve it we may ourselves be preserved through it from all evil things, more especially when the power of our soul hath not been violated and carried off by the work of the service of profane things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25201%2520--%2520Prologue.html'
source_title="13 Ascetic Discourses, Discourse 1 -- Prologue"

[[commentary]]
quote='''
Now this our Redeemer Himself shewed aforetime in His luminous teaching, saying, "No man poureth new wine into old bottles, lest the wine burst the skins, and the wine be poured out, and the skins be destroyed; but they pour new wine into new bottles, and both are preserved." So long as sin liveth or is wrought in thee by deed or in thought, or a carnal wish belonging to the world ariseth in thee, thou art still an old vessel, and thou art not able to receive the new wine of the wisdom of Christ. Make new thyself then by the dismissal of thy passions, and thou shalt be able to take within thee immediately the new wine of the doctrine of Christ. Forsake everything, even as the Apostles forsook everything, and then thou mayest seek boldly to be set to rule over the treasures of the spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
