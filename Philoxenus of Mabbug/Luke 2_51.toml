[[commentary]]
quote='''
It is written that before His baptism He was subject unto His parents; "He went back with them to Nazareth, and was subject unto them." But observe that, after the baptism, when He was delivering a rule of life which was more perfect than this to the children of men, He was not persuaded to acknowledge parents after the body. And although He was obedient and subject unto His parents before baptism, in the time which followed, when He was delivering the rule and course of life of spiritual beings, He said, "I know them not"; and they called Him to go forth to them, but He would not be persuaded. Now if our Lord had done this before baptism when He was keeping the law, that is, if He had been called by His mother, and He had not obeyed, He would have transgressed the law; but in this case, He did not transgress except to shew that He was more obedient to the Father of nature than to the parents of grace, and that He might also teach those who are perfect to be more obedient unto the Father of grace than unto natural parents.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"
