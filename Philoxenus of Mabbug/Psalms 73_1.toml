[[commentary]]
quote='''
David sheweth in a psalm that the grace of God aboundeth specially with the pure in heart, saying, "God is good to Israel, even to the pure in heart;" now he uniteth purity of heart with the sight of God, for the name Israel is interpreted "He hath seen God". And whosoever is simple and pure in heart is able to see God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
