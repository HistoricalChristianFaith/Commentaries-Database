[[commentary]]
quote='''
Wherever natural faith is preserved in its original state, that man, with whom this faith is preserved, is a sheep of the Shepherd. For thus is it written concerning Matthew, "Our Lord saw him sitting at the place of toll, and He called him, and straightway he forsook his merchandise and all his possession, and went after Him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
