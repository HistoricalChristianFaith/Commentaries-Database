[[commentary]]
quote='''
Behold also we learn from this testimony that the man who becometh a disciple of Jesus hath not even power to minister unto his natural parents, because he hath a true Father, Who by His grace hath enrolled him for Himself as a son, and Who hath set him apart for the ministration of His will. And unto the man who sought to honour his parents according to the body, so long as they were alive, and after their death to become His disciple, He said, "Let the dead bury their dead."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
