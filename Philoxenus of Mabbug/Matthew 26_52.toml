[[commentary]]
quote='''
And when Simon wished to throw off the simpleness of the sheep, and took a sword to avenge the insult of his Master, He rebuked him, and commanded him to carry it in its sheath, saying, "Put back thy sword into its place", for I have no need of thy help. The doctor and teacher of all wisdom stood before the judge, and He refrained and answered not a word. He kept the command of simplicity that He might confirm the prophecy, "He was led as a lamb to the slaughter."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25205%2520--%2520Second%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 5 -- Second Discourse on Simplicity"
