[[commentary]]
quote='''
For the Judge Who can torment the soul is God Himself only, because He Who is more subtle of nature than the soul is alone able to be the Judge thereof; but the children of men may be judges of the body, and they are able even to kill it, although in their judgment they have no power over the soul, even according to the testimony of the word of Christ which saith, "Fear not those which kill the body, but who are not able to kill the soul;" for the dominion of judges extendeth over the body only, and it can they judge, and torment, and slay. But as for the soul, its nature is exalted above the injury of those who can slay [it], and it cannot burn in their fire, and their stripes cannot fall upon its spiritual nature, and it cannot be cut in pieces by their swords, and its person cannot be lacerated by their tools of torture; for he that judgeth is of the body, and the sentence which he passeth on evil doers he uttereth with the tongue of the body, although the soul moveth inwardly the deliberation of the penalty. And all the members which are ready [to receive] the sufferings are of the body, and through bodily sufferings the body alone receiveth injury; but the nature of the soul, because of its spirituality, is exalted and raised above these things. And however deeply the sufferings may penetrate, they sink into the body only, and however far in and deep they may pierce, the soul is situated more deeply within, and the death of these members hath no power over its life. Now judges are not able to kill the soul, and therefore it is not meet for men to be afraid of their judgment; "but fear Him that is able to destroy both the body and the soul in Gehenna." The Lord Himself alone is the Judge of the soul, and He that made it a living thing is Himself able to bring death upon its life, and to torment its spiritual nature by a spiritual sentence of judgment; and because the soul perceiveth that the Lord alone is its Judge it is afraid of Him naturally. And as with those who are alive in the body and are dead in their souls the remembrance of the judgment of [the] world restraineth them from their evil actions, so also doth the remembrance of the judgment of God check the man who is alive in his soul from his wickedness, and as long as he remembereth His judgment he keepeth himself from sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25206%2520--%2520First%2520Discourse%2520on%2520the%2520Fear%2520of%2520God.html'
source_title="13 Ascetic Discourses, Discourse 6 -- First Discourse on the Fear of God"

[[commentary]]
quote='''
Our Lord abrogated one fear, and established another; He lifted from us the fear of the death which belongeth to time, and He laid upon us the fear of the death which is for eternity. "Fear ye not the death [which is of time]", but fear the death [which is for eternity]. "Let not those who kill the body terrify you, but fear ye Him Who can destroy the soul and the body." Those who kill [the body] are not to be feared, for Another quickeneth, but He is to be feared Who is able to put to death so that there is none who can quicken, and when He hath killed, there is none who can bring to life. For that which is transitory the fear thereof also is transitory, but the fear of Him Who neither passeth away nor changeth cometh not to an end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25207%2520--%2520Second%2520Discourse%2520on%2520the%2520Fear%2520of%2520God.html'
source_title="13 Ascetic Discourses, Discourse 7 -- Second Discourse on the Fear of God"
