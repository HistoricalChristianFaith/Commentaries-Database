[[commentary]]
quote='''
Now this speech is like unto the words, "Who is My mother?" and unto that which He said to John, "Behold thy mother!" and again He said to Mary, "Behold thy son!" And it is moreover like unto another speech which Jesus spake unto them when they sought to take Him with them to the feast as they were going up to Jerusalem, when He separated Himself from them, saying, "Go ye up to the feast, but I will not go up to the feast." For He said, "I will not go up as one who is subject unto the law." And in that He said, "I will not go up," He shewed two things; that He was subject neither unto parents, nor unto the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"
