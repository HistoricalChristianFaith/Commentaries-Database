[[commentary]]
quote='''
And since the building itself is fixed in the ground every man can build and raise upon it whatsoever he pleaseth, until the day which shall decide is revealed, and He shall come of Whom it is said, "He holdeth His fan in His hand and He will purify His threshing-floors; and He will gather His wheat into the garner, but the straw He will burn up with unquenchable fire." And the Husbandman who planted in the world the tree of our mankind will shew Himself to be the Judge, and He will hold in His hand the axe for cutting down, and every tree which beareth not good fruit He will cut down and cast into the fire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25201%2520--%2520Prologue.html'
source_title="13 Ascetic Discourses, Discourse 1 -- Prologue"
