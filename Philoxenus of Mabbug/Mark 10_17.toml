[[commentary]]
quote='''
"And one drew nigh unto Him while He was teaching in the temple, and said unto Him, Good Teacher, what shall I do to inherit life?" Now what did Jesus say unto this man? "Why callest thou me 'Good'? There is none Good save One, even God. Thou knowest the commandments, Thou shalt not kill, Thou shalt not commit adultery, Thou shalt not steal, Thou shalt not bear false witness. Behold I have taught thee restraint from wickedness, and to remove thy desire from the paths of sin; but if after this thou wishest to go forward, and also in addition to the command not to do wickedness thou wouldst come to the doing of good, and wouldst keep the commandments of the law, honour thy father and thy mother, and thou shalt keep all those which appertain unto this. But if also above the power of the law thou wishest to be in the dominion of thy righteousness, and of thy freewill to be led into fair deeds above the fear of the judgment, then love the Lord thy God with all thy soul, and with all thy strength, and with all thy mind, and that which is hateful unto thee, do not unto thy neighbour. This is the rule of conduct of the righteous, which is above the power of the law. Whosoever observeth this, the law by its threat hath no power over his righteousness. Go and keep these things which are written, and lift thyself up above them also unto the love of God, and unto the love of thy neighbour, which is above the fear of the law, because it is of love. When thou hast kept these things, thou shalt inherit eternal life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
