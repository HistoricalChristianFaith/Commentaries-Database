[[commentary]]
quote='''
And again in the case of the holy Apostles, He renewed that call of Abraham; and observe their faith also, that it was like unto the faith of Abraham; for as Abraham heard immediately he was called, so also immediately He called the Apostles, they heard and went forth after Him. "He saw them casting nets into the sea, and He called them, and straightway they forsook their nets and their father, and went after Him;" and before they had heard from Him the words, "If a man forsake not his father and mother, and everything that he hath, and cometh after me, he cannot be My disciple," they forsook everything and went after Jesus. For He did not propound for the disciples lengthy doctrine, but only the hearing of the word of faith; and because the faith which was in them was living, immediately it received the living word it became obedient unto life, and they ran thereafter straightway, and delayed not. Now in this they show themselves to have been disciples before they were called. For the custom of faith which is mingled with simplicity is that it receiveth not doctrine by much persuasion, but as the sound and healthy eye receiveth not the ray which is sent therein by contrivances and cunning inventions—but immediately that it is opened it looketh with strength upon the light, because its natural sight is sound—so also the eye of faith, which is set in the pupil of simplicity, immediately it heareth the voice of God recogniseth it, and there riseth in it the light of His Word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
