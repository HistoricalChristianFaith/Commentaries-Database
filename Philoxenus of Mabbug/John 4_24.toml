[[commentary]]
quote='''
And all his life is like unto theirs, and like unto them he crieth "Holy" in the spirit, and he singeth in the spirit, and he serveth God in spirit and in truth, even as it hath been said by the word of God concerning the perfect, "God is a Spirit, and those who serve Him in spirit and in truth serve Him." Behold, then, they serve in a divine manner, and they are also exalted by the degree of spiritual beings, that, in the likeness of God, they also may serve in power and in the freedom which is not made subject, and which is above laws and commandments even as is God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
