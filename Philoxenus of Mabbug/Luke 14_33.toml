[[commentary]]
quote='''
Do thou then, O disciple, hearken unto the divine voices which exhort thee to go forth after Jesus, and to become absolutely destitute, and then thou wilt become a perfect disciple: "Whosoever denieth not everything that he hath cannot be My disciple." After this what hast thou to say or to answer? For behold with one word all thy doubts and all thy obscure ideas are destroyed; and the word of truth is a sublime path for thee in which to tread. And again in another place He said, "Whosoever doth not forsake everything that he hath, and doth not take up his cross and follow Me, cannot be My disciple." And again, teaching us that we should not only forsake our possessions for the sake of His glory, and deny the world for the sake of confessing Him, but also our transitory life, He said, "Except a man deny himself he cannot be My disciple."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
