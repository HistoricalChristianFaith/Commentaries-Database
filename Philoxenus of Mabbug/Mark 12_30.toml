[[commentary]]
quote='''
And that commandment, "Love the Lord thy God with all thy heart, and with all thy soul, and with all thy mind, and thy neighbour as thyself," is like unto the words, "The law is not ordained for the righteous," because these commandments are above the fear of the law. He said particularly, "Love thy God," which is above the law, and not, "Thou shalt fear God," for the law hath dominion over fear, and not over love. Love is above the commandment of the law, and over those who are ruled thereby the law hath no power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25209%2520--%2520Second%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 9 -- Second Discourse on Poverty"
