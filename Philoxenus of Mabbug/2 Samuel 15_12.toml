[[commentary]]
quote='''
And the book of his history also sheweth us David's innocency, for on account of his simplicity in the direction of the affairs of this world he had one to give him counsel concerning human business with him continually; for the Book maketh known to us that Ahithophel was David's counsellor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25204%2520--%2520On%2520Faith-%2520First%2520Discourse%2520on%2520Simplicity.html'
source_title="13 Ascetic Discourses, Discourse 4 -- On Faith: First Discourse on Simplicity"
