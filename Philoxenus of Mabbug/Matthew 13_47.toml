[[commentary]]
quote='''
When that Fisherman who hath cast His net into the sea of the world, and hath filled it with fish, both great and small, which are the races and families of mankind, and the nations and tribes of the children of flesh, of divers tongues and innumerable kinds, shall appear He will strike and bring up His net to the sea shore, even as He Himself hath said, and He will gather together the fine fish and cast them into His baskets, which are the living treasuries of His kingdom, and the poor ones He will cast forth into outer darkness, where there will be weeping and gnashing of teeth. These things are laid up to take place through Him at that time when the Prince of the shepherds shall be revealed in the glory of His kingdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25201%2520--%2520Prologue.html'
source_title="13 Ascetic Discourses, Discourse 1 -- Prologue"
