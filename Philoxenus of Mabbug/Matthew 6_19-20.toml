[[commentary]]
quote='''
"Lay not up for yourselves treasures upon earth, where the moth and the rust corrupt, and where thieves break through and steal; but lay up for yourselves treasures in heaven where the moth and the rust do not corrupt, and where thieves break not through nor steal." And it is evident that this commandment is not applicable to solitaries and to those who are perfect, for how could "Lay not up for thyself treasure upon earth" be said to him to whom it was commanded, "Take no thought for the morrow?" And how could the words, "Lay up for yourselves treasures in heaven of your alms," apply to the man to whom it was said, "Thou shalt not possess two coats, nor wallet, nor cloak, nor money in the wallet." And what hath the thief who stealeth, or the moth which destroyeth to do with him to whom it is commanded that, save himself, he should possess nothing?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Philoxenus%2520of%2520Mabbug%2F13%2520Ascetic%2520Discourses%2FDiscourse%25208%2520--%2520First%2520Discourse%2520on%2520Poverty.html'
source_title="13 Ascetic Discourses, Discourse 8 -- First Discourse on Poverty"
