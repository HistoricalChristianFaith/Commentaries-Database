[[commentary]]
quote='''
Yea, rather with us is the living water, the very water which springeth from Christ; but thou, separated from the everlasting Fountain, whence receivest thou thy birth? Nor hath the Holy Spirit departed from the chief mother; whence then came He to thee? Unless perchance He hath followed one that is in strife, and abandoning so many priests, nor pleased to abide in His consecrated dwelling-place, hath preferred the broken cisterns of an adulterated fountain? Whence have your people the Spirit, not having been sealed by an anointed priest? Whence the water, being separated from its mother's womb? Whence renewal, who have lost the cradle of Bridal Peace?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25203.html'
source_title="Letter 3: Against the Treatise of the Novatians"
