[[commentary]]
quote='''
"Eli the priest," thou sayest, "speaketh, saying, If one man sin against another, they shall pray for him: but if a man sin against the Lord, who shall intreat for him? In like manner John, If any man see his brother sin a sin which is not unto death, he shall ask, and He shall give him life for them that sin not unto death. There is a sin unto death: I do not say that thou shall pray for it." Thou seest that all this has reference to sins still remaining, not to those persons who have at any time sinned, and begun to repent before any one asketh for them. It were a long task to unfold the instances. Remark all the sins which God threatens, thou wilt at once see that they are present sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25203.html'
source_title="LETTER 3.16.2"
