[[commentary]]
quote='''
In the mean time, whom will you be able to persuade that by receiving the lapsed the whole Church hath perished? That by the admission of penitents, the people of those who admit them has been made a denier of the Faith? But even if the people here or there have been too lax, have the other peoples also who approved not of their deed, but followed custom and peace, lost the Christian name? Hear the voice of Jeremiah, In those days shall they not say, The fathers have eaten a sour grape, and the children's teeth are set on edge. But every one shall die for his own iniquity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25203.html'
source_title="LETTER 3:3.3"
