[[commentary]]
quote='''
But we understand, as thou reproachest us, that the Church of God is a dove, not bitter with gall, not fierce nor rending with talons, white moreover with small and tender plumage. We know likewise that, being the well of living water, and a fountain sealed, it is defiled with no filth of engulfing heresy, and that it is a garden enclosed and full of herbs great alike and small, vile and precious; that it is the eight souls from the Ark, among whom, however, was Ham also, and those thousands of birds and beasts, in pairs and in sevens, clean alike and unclean.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25203.html'
source_title="LETTER 3:21"
