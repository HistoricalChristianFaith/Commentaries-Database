[[commentary]]
quote='''
Your cruelty is a false faith. An heretical congregation is an adulteress woman; for the Catholic hath never from the beginning left the couch and the chamber of her Spouse, nor gone after other and strange lovers. Ye have painted a divorced form in new colours, ye have withdrawn your couch from the old wedlock, ye have left the body of a mother, the wife of One Husband, decking yourselves out with new arts of pleasing, new allurements of corruption.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25203.html'
source_title="Letter 3: Against the Treatise of the Novatians"
