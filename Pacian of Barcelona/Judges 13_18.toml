[[commentary]]
quote='''
On the name Catholic I answered fully and with calmness. For I said, that it mattered to neither, what the other was called. And if you demanded the meaning of the name, I said that, whatever it might be, it was wonderful, whether it was 'one in all,' or 'one over all,' or (an interpretation which I have not mentioned before,) 'the king's son,' that is, 'the Christian people.' Certainly too that was no accessory name which endured through so many ages. And indeed I am glad for thee that although thou mayest have preferred others, yet thou agreest that the name attaches to us. What, should you deny? Nature would cry out. But and if you still have doubts, let us hold our peace. We will both be that which we shall be named, witness the antiquity of the name. If, however, thou perseverest in asking, beware lest that man of might exclaim, Why askest thou thus after My Name, seeing it is wonderful? I next added, that we need not consider, whence Catholics derived this name, because neither was it wont to be any imputation against the Valentinians, if they were called after Valentinus, nor the Phrygians, if from Phrygia, nor the Novatians, if after Novatian.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25202.html'
source_title="LETTER 2.2"
