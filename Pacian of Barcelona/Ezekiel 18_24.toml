[[commentary]]
quote='''
Remark all the sins which God threatens, thou wilt at once see that they are present sins. But if his past righteousness shall not profit the righteous in the time of his iniquity, neither shall his wickedness which he hath forsaken hurt the wicked man in the time of his righteousness; for it is written, Let the wicked forsake his way, and the unrighteous man his thoughts: and let him return unto the Lord, and he shall obtain mercy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25203.html'
source_title="Letter 3: Against the Treatise of the Novatians"
