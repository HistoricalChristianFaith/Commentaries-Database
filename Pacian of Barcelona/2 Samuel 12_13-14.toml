[[commentary]]
quote='''
Be we indeed ashamed to sin, but not ashamed to repent. Be we ashamed to hazard ourselves, but not ashamed to be delivered. Who will snatch the plank from the shipwrecked, that he escape not? Who will grudge the curing of a wound? Doth not David say, Every night I will wash my bed, I will water my couch with my tears; and again, I acknowledge my sin, and mine unrighteousness have I not hid; and yet more, I said, I will confess my sins unto the Lord, and so Thou forgavest the wickedness of my heart. Did not the Prophet answer him when, after the guilt of murder and adultery, penitent for Bathsheba, The Lord also hath put away from thee thy sin?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25201.html'
source_title="Letter 1: On the Catholic Name"
