[[commentary]]
quote='''
Doth not David say, Every night I will wash my bed, I will water my couch with my tears; and again, I acknowledge my sin, and mine unrighteousness have I not hid; and yet more, I said, I will confess my sins unto the Lord, and so Thou forgavest the wickedness of my heart. Did not the Prophet answer him when, after the guilt of murder and adultery, penitent for Bathsheba, The Lord also hath put away from thee thy sin? Did not confession deliver the king of Babylon, when condemned after so many sins of idolatry? And what is it that the Lord saith, Shall he who has fallen not arise, and he who has turned not return?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25201.html'
source_title="LETTER 1:5.3"


[[commentary]]
quote='''
Behold! I promise, I engage, if ye return to your Father with true satisfaction, erring no more, adding nothing to former sins, saying also some humble and mournful words, as, Father, we have sinned before Thee, and are no more worthy to be called Thy sons; straightway shall leave you both that filthy herd, and the unseemly food of husks. Straightway on your return shall the robe be put upon you, and the ring adorn you, and your Father's embrace again receive you. Lo! He saith Himself, I have no pleasure in the death of the wicked; but that he turn from his way and live. And again He saith, Shall they fall, and not arise? Shall he turn away, and not return? And the Apostle saith, God is able to make him stand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FTreatise%2520of%2520exhortation%2520to%2520penance.html'
source_title="ON PENITENTS 12:2"
