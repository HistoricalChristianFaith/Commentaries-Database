[[commentary]]
quote='''
Thou sayest it is further written, If thy hand or thy foot offend thee, cast them from thee. The meaning of this Moses foretold by the testimony of the Book of Deuteronomy, If thy brother, (for these are our eyes and our hands,) or thy daughter, or thy wife, which is in thy bosom, or thy friend, which is as thine own soul, entice thee, saying, Let us go and serve other gods, which thou hast not known: then he added below, Thou shalt accuse him, and thine hand shall be upon him to put him to death. Dost thou see then that this was not spoken of penitents, but of those who not only themselves persevere in wickedness, but also cease not to put stumblingblocks in our way? These, however dear they be, we must relinquish; however useful, we must abandon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pacian%2520of%2520Barcelona%2FLetter%25203.html'
source_title="Letter 3: Against the Treatise of the Novatians"
