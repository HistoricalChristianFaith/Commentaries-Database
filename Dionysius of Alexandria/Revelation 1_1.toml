[[commentary]]
quote='''
That this person was called John, therefore, and that this was the writing of a John, I do not deny. And I admit further, that it was also the work of some holy and inspired man. But I could not so easily admit that this was the apostle, the son of Zebedee, the brother of James, and the same person with him who wrote the Gospel which bears the title according to John, and the catholic epistle. But from the character of both, and the forms of expression, and the whole disposition and execution of the book, I draw the conclusion that the authorship is not his. For the evangelist nowhere else subjoins his name, and he never proclaims himself either in the Gospel or in the epistle.

John, moreover, nowhere gives us the name, whether as of himself directly (in the first person), or as of another (in the third person). But the writer of the Revelation puts himself forward at once in the very beginning, for he says: "The Revelation of Jesus Christ, which He gave to him to show to His servants quickly; and He sent and signified it by His angel to His servant John, who bare record of the Word of God, and of his testimony, and of all things that he saw." And then he writes also an epistle, in which he says: "John to the seven churches which are in Asia, grace be unto you, and peace." The evangelist, on the other hand, has not prefixed his name even to the catholic epistle; but without any circumlocution, he has commenced at once with the mystery of the divine revelation itself in these terms: "That which was from the beginning, which we have heard, which we have seen with our eyes." And on the ground of such a revelation as that the Lord pronounced Peter blessed, when He said: "Blessed art thou, Simon Bar-jona; for flesh and blood hath not revealed it unto thee, but my Father which is in heaven." And again in the second epistle, which is ascribed to John, the apostle, and in the third, though they are indeed brief, John is not set before us by name; but we find simply the anonymous writing, "The elder." This other author, on the contrary, did not even deem it sufficient to name himself once, and then to proceed with his narrative; but he takes up his name again, and says: "I John, who also am your brother and companion in tribulation, and in the kingdom and patience of Jesus Christ, was in the isle that is called Patmos for the Word of God, and for the testimony of Jesus Christ." And likewise toward the end he speaks thus: "Blessed is he that keepeth the sayings of the prophecy of this book; and I John who saw these things and heard them." That it is a John, then, that writes these things we must believe, for he himself tells us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Dionysius%2520of%2520Alexandria%2FContaining%2520Various%2520Sections%2520of%2520the%2520Works.html'
source_title="From the Two Books on the Promises"

[[commentary]]
quote='''
What John this is, however, is uncertain. For he has not said, as he often does in the Gospel, that he is the disciple beloved by the Lord, or the one that leaned on His bosom, or the brother of James, or one that was privileged to see and hear the Lord. And surely he would have given us some of these indications if it had been his purpose to make himself clearly known. But of all this he offers us nothing; and he only calls himself our brother and companion, and the witness of Jesus, and one blessed with the seeing and hearing of these revelations. I am also of opinion that there were many persons of the same name with John the apostle, who by their love for him, and their admiration and emulation of him, and their desire to be loved by the Lord as he was loved, were induced to embrace also the same designation, just as we find many of the children of the faithful called by the names of Paul and Peter. There is, besides, another John mentioned in the Acts of the Apostles, with the surname Mark, whom Barnabas and Paul attached to themselves as companion, and of whom again it is said: "And they had also John to their minister." But whether this is the one who wrote the Revelation, I could not say. For it is not written that he came with them into Asia. But the writer says: "Now when Paul and his company loosed from Paphos, they came to Perga in Pamphylia: and John, departing from them, returned to Jerusalem." I think, therefore, that it was some other one of those who were in Asia. For it is said that there were two monuments in Ephesus, and that each of these bears the name of John.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Dionysius%2520of%2520Alexandria%2FContaining%2520Various%2520Sections%2520of%2520the%2520Works.html'
source_title="From the Two Books on the Promises"
