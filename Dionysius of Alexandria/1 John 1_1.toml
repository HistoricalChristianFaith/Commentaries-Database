[[commentary]]
quote='''
But the writer of the Revelation puts himself forward at once in the very beginning, for he says: "The Revelation of Jesus Christ, which He gave to him to show to His servants quickly; and He sent and signified it by His angel to His servant John, who bare record of the Word of God, and of his testimony, and of all things that he saw." And then he writes also an epistle, in which he says: "John to the seven churches which are in Asia, grace be unto you, and peace." The evangelist, on the other hand, has not prefixed his name even to the catholic epistle; but without any circumlocution, he has commenced at once with the mystery of the divine revelation itself in these terms: "That which was from the beginning, which we have heard, which we have seen with our eyes." And on the ground of such a revelation as that the Lord pronounced Peter blessed, when He said: "Blessed art thou, Simon Bar-jona; for flesh and blood hath not revealed it unto thee, but my Father which is in heaven."
'''
source_title="Containing Various Sections of the Works"
source_url="https://historicalchristian.faith/by_father.php?file=Dionysius%2520of%2520Alexandria%2FContaining%2520Various%2520Sections%2520of%2520the%2520Works.html"

[[commentary]]
quote='''
For the Gospel and the Epistle agree with each other, and both commence in the same way. For the one opens thus, "In the beginning was the Word;" while the other opens thus, "That which was from the beginning." The one says: "And the Word was made flesh, and dwelt among us; and we beheld His glory, the glory as of the Only-begotten of the Father." The other says the same things, with a slight alteration: "That which we have heard, which we have seen with our eyes, which we have looked upon, and our hands have handled, of the Word of life: and the life was manifested." For these things are introduced by way of prelude, and in opposition, as he has shown in the subsequent parts, to those who deny that the Lord is come in the flesh. For which reason he has also been careful to add these words: "And that which we have seen we testify, and show unto you that eternal life which was with the Father, and was manifested unto us: that which we have seen and heard declare we unto you."
'''
source_title="Containing Various Sections of the Works"
source_url="https://historicalchristian.faith/by_father.php?file=Dionysius%2520of%2520Alexandria%2FContaining%2520Various%2520Sections%2520of%2520the%2520Works.html"
