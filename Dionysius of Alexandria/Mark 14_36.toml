[[commentary]]
quote='''
And surely it is the fact that the Saviour asks neither what is impossible, nor what is impracticable, nor what is contrary to the will of the Father. It is something possible, for Mark makes mention of His saying, "Abba, Father, all things are possible unto Thee;" and they are possible if He wills them, for Luke tells us that He said, "Father, if Thou be willing, remove this cup from me." The Holy Spirit therefore, apportioned among the evangelists, makes up the full account of our Saviour's whole disposition by the expressions of these several narrators together. He does not then ask of the Father what the Father wills not. For the words, "if Thou be willing," were demonstrative of subjection and docility, not of ignorance or hesitancy. And just as when we make any request that may be accordant with his judgment, at the hand of father or ruler or any one of those whom we respect, we are accustomed to use the address, though not certainly as if we were in doubt about it, "if you please;" so the Saviour also said, "if Thou be willing:" not that He thought that He willed something different, and thereafter learned the fact, but that He understood exactly God's willingness to remove the cup from Him, and as doing so also apprehended justly that what He wills is also possible unto Him. For this reason the other scripture says, "All things are possible unto Thee." And Matthew again admirably describes the submission and the humility, when he says, "if it be possible." For unless we adapt the sense in this way, some will perhaps assign an impious signification to this expression "if it be possible," as if there were anything impossible for God to do, except that only which He does not will to do. Therefore the request which He made was nothing independent, nor one which pleased Himself only, or opposed His Father's will, but one also in conformity with the mind of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Dionysius%2520of%2520Alexandria%2FOn%2520Luke%252022.%252042%252C%2520Etc.html'
source_title="On Luke XXII. 42, Etc."
