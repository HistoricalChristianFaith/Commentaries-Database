[[commentary]]
quote='''
The Saviour's first request is that the temptation which has come softly and plainly upon Him, and associated itself lightly with Him, may be turned aside. And this is the first form of that freedom from falling into temptation, which He also counsels the weaker disciples to make the subject of their prayers; that, namely, which concerns the approach of temptation: for it must needs be that offences come, but yet those to whom they come ought not to fall into the temptation. But the most perfect mode in which this freedom from entering into temptation is exhibited, is what He expresses in His second request, when He says not merely, "Not as I will," but also, "but as Thou wilt." For with God there is no temptation in evil; but He wills to give us good exceeding abundantly above what we ask or think.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Dionysius%2520of%2520Alexandria%2FOn%2520Luke%252022.%252042%252C%2520Etc.html'
source_title="On Luke XXII. 42, Etc."
