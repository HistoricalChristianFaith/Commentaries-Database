[[commentary]]
quote='''
It is known that the blessed apostle and evangelist John composed this book of Revelation; although there have been some who have said that it was not by him, but by someone else: but the following make it clear that it was indeed his.

The Revelation of Jesus Christ, which God gave Him. Revelation is interpreted as unveiling or manifestation. This gift of revelation the Father gave to the Son, inasmuch as He was man, and the Son Himself, the divinity, to man, whom He assumed. To make known to His servants what must quickly take place. Though this book narrates not only future events but also present and past ones, why did He say that only future events about our Lord Jesus Christ would be revealed to His servants here? Because indeed, things present are known by sight, past things by hearing are easily recognized: but future things, can only be known either through the teaching of divine Scriptures, or through revelation. And He signified it, sending through His angel to His servant John. In this place, such a meaning seems to me to be: the Lord Jesus sent His angel, and through the same angel He revealed to His servant John the things that must soon happen.

He who bore witness to the Word of God. This passage openly demonstrates that not John, but the one who wrote the Gospel, composed this book. He also reclined at the Lord's table, where all the treasures of wisdom and knowledge were hidden, from which he deserved to draw from the immense fountain of wisdom. Therefore, he bore witness to the Word of God when he said: In the beginning was the Word, and the Word was with God, and the Word was God (John 1:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Berengaudus%2FCommentary%2520on%2520Revelation%2FEnglish.html'
source_title="Commentary on Revelation"
