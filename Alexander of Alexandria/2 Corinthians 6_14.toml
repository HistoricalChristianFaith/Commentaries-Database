[[commentary]]
quote='''
For He, indeed, is of an immutable nature, every way perfect, and wanting in nothing; but these, since they are every way subject to change, stand in need of help from Him. For what progress can the wisdom of God make? What increase can the truth itself and God the Word receive? In what respect can the life and the true light be made better? And if this be so, how much more unnatural is it that wisdom should ever be capable of folly; that the power of God should be conjoined with infirmity; that reason should be obscured by unreason; or that darkness should be mixed up with the true light? And the apostle says, on this place, "What communion hath light with darkness? and what concord hath Christ with Belial?"
But they will not prevail; for the truth prevails, and there is no communion betwixt light and darkness, no concord between Christ and Belial.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Alexander%2520of%2520Alexandria%2FEpistles%2520on%2520the%2520Arian%2520Heresy.html'
source_title="Epistles on the Arian Heresy"
