[[commentary]]
quote='''
It is sufficiently discovered that He suffered shame for man's sake, to set him free from death; and that He exclaimed, as in the words of the prophet, "I have endured as a travailing woman." In very deed did He endure for our sakes sorrow, ignominy, torment, even death itself, and burial. For thus He says Himself by the prophet: "I went down into the deep." Who made Him thus to go down? The impious people. Behold, ye sons of men, behold what recompense Israel made unto Him! She slew her Benefactor, returning evil for good, affliction for joy, death for life. They slew by nailing to the tree Him who had brought to life their dead, had healed their maimed, had made their lepers clean, had given light to their blind. Behold, ye sons of men! behold, all ye people, these new wonders! They suspended Him on the tree, who stretches out the earth; they transfixed Him with nails who laid firm the foundation of the world; they circumscribed Him who circumscribed the heavens; they bound Him who absolves sinners; they gave Him vinegar to drink who hath made them to drink of righteousness; they fed Him with gall who hath offered to them the Bread of Life; they caused corruption to come upon His hands, and feet who healed their hands and feet; they violently closed His eyes who restored sight to them; they gave Him over to the tomb, who raised their dead to life both in the time before His Passion and also whilst He was hanging on the tree.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Alexander%2520of%2520Alexandria%2FEpistles%2520on%2520the%2520Arian%2520Heresy.html'
source_title="EPISTLES ON THE ARIAN HERESY 5:5"
