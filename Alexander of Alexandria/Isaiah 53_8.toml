[[commentary]]
quote='''
And in one Lord Jesus Christ, the only-begotten Son of God; not begotten of things which are not, but of Him who is the Father; not in a corporeal manner, by excision or division as Sabellius and Valentinus thought, but in a certain inexplicable and unspeakable manner, according to the words of the prophet cited above: "Who shall declare His generation?" Since that His subsistence no nature which is begotten can investigate, even as the Father can be investigated by none; because that the nature of rational beings cannot receive the knowledge of His divine generation by the Father. But men who are moved by the Spirit of truth, have no need to learn these things from me, for in our ears are sounding the words before uttered by Christ on this very thing, "No man knoweth the Father, save the Son; and no man knoweth who the Son is, save the Father."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Alexander%2520of%2520Alexandria%2FEpistles%2520on%2520the%2520Arian%2520Heresy.html'
source_title="EPISTLES ON THE ARIAN HERESY 1:12"
