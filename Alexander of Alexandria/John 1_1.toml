[[commentary]]
quote='''
But they will not prevail; for the truth prevails, and there is no communion betwixt light and darkness, no concord between Christ and Belial. For who ever heard such things? or who, now hearing them, is not astonished, and does not stop his ears that the pollution of these words should not touch them? Who that hears John saying, "In the beginning was the Word," does not condemn those who say there was a time when He was not? Who that hears these words of the Gospel, "the only-begotten Son;" and, "by Him were all things made," will not hate those who declare He is one of the things made? For how can He be one of the things made by Him?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Alexander%2520of%2520Alexandria%2FEpistles%2520on%2520the%2520Arian%2520Heresy.html"
source_title="Epistles on the Arian Heresy - Epistle Catholic"

[[commentary]]
quote='''
Now that also the Word of God is not comprehended in the number of things that were created "from things which are not," the same John says, "All things were made by Him." For he set forth His proper personality, saying, "In the beginning was the Word, and the Word was with God, and the Word was God. All things were made by Him; and without Him was not anything made that was made." For if all things were made by Him, how comes it that He who gave to the things which are made their existence, at one time Himself was not? For the Word which makes is not to be defined as being of the same nature with the things which are made; since He indeed was in the beginning, and all things were made by Him, and fashioned "from things which are not." Moreover, that which is seems to be contrary to and far removed from those things which are made "from things which are not." For that indeed shows that there is no interval between the Father and the Son, since not even in thought can the mind imagine any distance between them. But that the world was created "from things which are not," indicates a more recent and later origin of substance, since the universe receives an essence of this sort from the Father by the Son. When, therefore, the most pious John contemplated the essence of the divine Word at a very great distance, and as placed beyond all conception of those things that are begotten, he thought it not meet to speak of His generation and creation; not daring to designate the Creator in the same terms as the things that are made. Not that the Word is unbegotten, for the Father alone is unbegotten, but because the inexplicable subsistence of the only-begotten Son transcends the acute comprehension of the evangelists, and perhaps also of angels.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Alexander%2520of%2520Alexandria%2FEpistles%2520on%2520the%2520Arian%2520Heresy.html"
source_title="Epistles on the Arian Heresy - To Alexander, Bishop of the City of Constantinople"
