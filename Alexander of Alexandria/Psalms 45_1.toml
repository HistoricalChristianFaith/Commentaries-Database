[[commentary]]
quote='''
Who that hears these words of the Gospel, "the only-begotten Son;" and, "by Him were all things made," will not hate those who declare He is one of the things made? For how can He be one of the things made by Him? or how shall He be the only-begotten who, as they say, is reckoned with all the rest, if indeed He is a thing made and created? And how can He be made of things which are not, when the Father says, "My heart belched forth a good Word;" and, "From the womb, before the morning have I begotten Thee?" Or how is He unlike to the substance of the Father, who is the perfect image and brightness of the Father, and who says, "He that hath seen Me hath seen the Father?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Alexander%2520of%2520Alexandria%2FEpistles%2520on%2520the%2520Arian%2520Heresy.html'
source_title="EPISTLES ON THE ARIAN HERESY 2:3"
