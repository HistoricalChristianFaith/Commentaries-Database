[[commentary]]
quote='''
Because "for a righteous man the law was not made;" and yet "the law is good, if a man use it lawfully." Now by connecting together these two seemingly contrary statements, the apostle warns and urges his reader to sift the question and solve it too. For how can it be that "the law is good, if a man use it lawfully," if what follows is also true: "Knowing this, that the law is not made for a righteous man?" For who but a righteous man lawfully uses the law? Yet it is not for him that it is made, but for the unrighteous. Must then the unrighteous man, in order that he may be justified,—that is, become a righteous man,—lawfully use the law, to lead him, as by the schoolmaster's hand, to that grace by which alone he can fulfil what the law commands? Now it is freely that he is justified thereby,—that is, on account of no antecedent merits of his own works; "otherwise grace is no more grace," since it is bestowed on us, not because we have done good works, but that we may be able to do them,—in other words, not because we have fulfilled the law, but in order that we may be able to fulfil the law. ... The unrighteous man therefore lawfully uses the law, that he may become righteous; but when he has become so, he must no longer use it as a chariot, for he has arrived at his journey's end,—or rather (that I may employ the apostle's own simile, which has been already mentioned) as a schoolmaster, seeing that he is now fully learned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 1.10.16"
