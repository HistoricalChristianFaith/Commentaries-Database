[[commentary]]
quote='''
For, when showing, in his letter to Antonianus, that no man ought to sever himself from the unity of the Church before the time of the final separation of the just and unjust, merely because of the admixture of evil men in the Church, when he makes it manifest how holy he was, and deserving of the illustrious martyrdom which he won, he says, "What swelling of arrogance it is, what forgetfulness of humility and gentleness, that any one should dare or believe that he can do what the Lord did not grant even to the apostles,—to think that he can distinguish the tares from the wheat, or, as if it were granted to him to carry the fan and purge the floor, to endeavor to separate the chaff from the grain! And whereas the apostle says, 'But in a great house there are not only vessels of gold and of silver, but also of wood and of earth,' that he should seem to choose those of gold and of silver, and despise and cast away and condemn those of wood and of earth, when really the vessels of wood are only to be burned in the day of the Lord by the burning of the divine conflagration, and those of earth are to be broken by Him to whom the 'rod of iron has been given.'" By this argument, therefore, against those who, under the pretext of avoiding the society of wicked men, had severed themselves from the unity of the Church, Cyprian shows that by the great house of which the apostle spoke, in which there were not only vessels of gold and of silver, but also of wood and of earth, he understood nothing else but the Church, in which there should be good and bad, till at the last day it should be cleansed as a threshing-floor by the winnowing-fan.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Baptism%2FBook%25204.html'
source_title="ON BAPTISM, AGAINST THE DONATISTS 4.12.19"

[[commentary]]
quote='''
That law of charity was pronounced by the lips of the Lord Christ, for those parables are his about the cockle scattered through the world in the unity of the field until the time of the harvest and about the bad fishes which are to be left in the same net until the time for landing on the shore.
'''
source_url=''
source_title="LETTERS 108.3.11"


[[commentary]]
quote='''
But in the Christian community, as far as sharing and communion in the sacraments goes, they have been multiplied beyond number. So number is one thing; beyond number is something else. Number is those of whom the apostle says, The Lord knows who are his. There are some beyond number, though, because in a great house there are not only vessels of gold and silver but also ones of wood and earthenware; some for noble, others for ignoble use. Number, then, applies to vessels for noble use; beyond number are vessels for ignoble use.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252015.html'
source_title="SERMONS 15.2"
