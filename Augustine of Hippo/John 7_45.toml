[[commentary]]
quote='''
But they who had been sent to take Him returned clear of the crime and full of admiration. For they even gave witness to His divine doctrine, when those by whom they had been sent asked, "Why have ye not brought him?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252033.html'
source_title='Tractates on John 33'

[[commentary]]
quote='''
(Tract. xxxiii. 1) They however who were sent to take Him, returned guiltless of the offence, and full of admiration: Then came the officers to the chief priests and Pharisees; and they said unto them, Why have ye not brought Him?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
