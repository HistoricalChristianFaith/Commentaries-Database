[[commentary]]
quote='''
Do not think that it is impossible for any one to please God while engaged in active military service. Among such persons was the holy David, to whom God gave so great a testimony; among them also were many righteous men of that time; among them was also that centurion who said to the Lord: "I am not worthy that Thou shouldest come under my roof, but speak the word only, and my servant shall be healed: for I am a man under authority, having soldiers under me: and I say to this man, Go, and he goeth; and to another, Come, and he cometh; and to my servant, Do this, and he doeth it;" and concerning whom the Lord said: "Verily, I say unto you, I have not found so great faith, no, not in Israel." Among them was that Cornelius to whom an angel said: "Cornelius, thine alms are accepted, and thy prayers are heard," when he directed him to send to the blessed Apostle Peter, and to hear from him what he ought to do, to which apostle he sent a devout soldier, requesting him to come to him. Among them were also the soldiers who, when they had come to be baptized by John,—the sacred forerunner of the Lord, and the friend of the Bridegroom, of whom the Lord says: "Among them that are born of women there hath not arisen a greater than John the Baptist,"—and had inquired of him what they should do, received the answer, "Do violence to no man, neither accuse any falsely; and be content with your wages." Certainly he did not prohibit them to serve as soldiers when he commanded them to be content with their pay for the service.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTER 189"
