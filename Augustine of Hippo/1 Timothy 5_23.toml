[[commentary]]
quote='''
Seek nothing from them beyond health of body. For this is a blessing not to be despised, because of its being necessary to the work of life until "this mortal shall have put on immortality"—in other words, the true, perfect, and everlasting health, which is neither reduced by earthly infirmities nor repaired by corruptible gratification, but, enduring with celestial rigour, is animated with a life eternally incorruptible. For the apostle himself says, "Make not provision for the flesh, to fulfil the lusts thereof," because we must take care of the flesh, but only in so far as is necessary for health; "For no man ever yet hated his own flesh," as he himself likewise says. Hence, also, he admonished Timothy, who was, as it appears, too severe upon his body, that he should "use a little wine for his stomach's sake, and for his often infirmities."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="Letters 130.3.7"


[[commentary]]
quote='''
Thus many do not eat flesh, and yet do not superstitiously regard it as unclean. And so the same people who abstain when in health take it when unwell without any fear, if it is required as a cure. Many drink no wine; but they do not think that wine defiles them; for they cause it to be given with the greatest propriety and moderation to people of languid temperament, and, in short, to all who cannot have bodily health without it. When some foolishly refuse it, they counsel them as brothers not to let a silly superstition make them weaker instead of making them holier. They read to them the apostle's precept to his disciple to "take a little wine for his many infirmities."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOf%2520the%2520Morals%2520of%2520the%2520Catholic%2520Church.html'
source_title="OF THE MORALS OF THE CATHOLIC CHURCH 1.33.72"
