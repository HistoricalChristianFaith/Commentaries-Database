[[commentary]]
quote='''
Not only if a man, but if anyone, like an angel or by some visitation or by a dream, tries to tempt you and says: "Do this for me, celebrate this for me, because I am an angel," for instance, "Gabriel," do not believe it. Worship securely the one God, who is Father and Son and Holy Spirit. Such worship pleases if it is an angel; but if he gets angry because you did not give anything outside, he is to be understood as the one about whom the Apostle says that he transforms himself into an angel of light: he wants to block the way, he intervenes wrongly; he is not a mediator reconciling, but rather separating. For that angel in the Apocalypse and others like him do not want themselves to be worshipped, but God. They are messengers, announcing what they have received to be announced; they are ministers, doing what they were ordered to do, bringing our prayers to God, not demanding those prayers themselves for God. The angel says to a man: I presented your petition in the sight of God's glory. However, he was not praying to the angel himself, and the angel was praying to God: the minister presented his prayer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520198%2520augm.html'
source_title="NEWLY DISCOVERED SERMONS 198:48"
