[[commentary]]
quote='''
"With a mighty Hand and stretched-out Arm" [Psalm 136:12]. What more powerful, what more out-stretched, than that of which is said "To whom is the Arm of the Lord revealed?" [Isaiah 53:1]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520136.html'
source_title="Exposition on Psalm 136"
