[[commentary]]
quote='''
Now this propagation of children which among the ancient saints was a most bounden duty for the purpose of begetting and preserving a people for God, amongst whom the prophecy of Christ's coming must needs have had precedence over everything, now has no longer the same necessity. For from among all nations the way is open for an abundant offspring to receive spiritual regeneration, from whatever quarter they derive their natural birth. So that we may acknowledge that the scripture which says there is "a time to embrace, and a time to refrain from embracing," is to be distributed in its clauses to the periods before Christ and since. The former was the time to embrace, the latter to refrain from embracing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Marriage%2520and%2520Concupiscence%2FBook%25201.html'
source_title="ON MARRIAGE AND CONCUPISCENCE 14"


[[commentary]]
quote='''
But thou who both hast sons, and livest in that end of the world, wherein now is the time not of casting stones, but of gathering; not of embracing, but of abstaining from embracing; when the Apostle cries out, "But this I say, brethren, the time is short; it remains, that both they who have wives be as not having;" assuredly if thou hadst sought a second marriage, it would have been no obedience of prophecy or law, no carnal desire even of family, but a mark of incontinence alone. For you would have done what the Apostle says, after he had said, "It is good for them, if they shall have so continued, even as I;" forsooth he straightway added, "But if they contain not themselves, let them marry; for I had rather that they marry than be burned."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Good%2520of%2520Widowhood.html'
source_title="ON THE GOOD OF WIDOWHOOD 11"
