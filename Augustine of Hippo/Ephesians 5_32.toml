[[commentary]]
quote='''
And then this will be the answer of the sacramental bond of marriage,—the third good: "Of me was that word spoken in paradise before the entrance of sin: 'A man shall leave his father and his mother, and shall cleave unto his wife; and they two shall become one flesh.'" This the apostle applies to the case of Christ and of the Church, and calls it then "a great sacrament." What, then, in Christ and in the Church is great, in the instances of each married pair it is but very small, but even then it is the sacrament of an inseparable union.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Marriage%2520and%2520Concupiscence%2FBook%25201.html'
source_title="ON MARRIAGE AND CONCUPISCENCE 1.23"
