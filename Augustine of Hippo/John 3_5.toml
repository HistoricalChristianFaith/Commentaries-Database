[[commentary]]
quote='''
But now, that the Lord Christ forgives sins in the Holy Spirit, just as He casts out demons in the Holy Spirit, can be understood from this: after He rose from the dead, when He said to His disciples: "Receive the Holy Spirit," He immediately added: "If you forgive anyone's sins, they are forgiven; if you do not forgive them, they are not forgiven." For that regeneration, where there is remission of all past sins, happens in the Holy Spirit, as the Lord says: "Unless one is born of water and the Spirit, he cannot enter the kingdom of God." But being born of the Spirit is one thing, and being fed by the Spirit is another; just as being born of the flesh, which happens when a mother gives birth, is one thing, and being fed by the flesh, which happens when she nurses the infant, is another—designed to drink with pleasure from where he was born so that he might live; to receive nourishment for living from where he received the beginning of being born. Therefore, the first benefit of the believers is the remission of sins by the kindness of God in the Holy Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252071.html'
source_title="Sermon 71"

[[commentary]]
quote='''
The Lord says to Nicodemus, and explains to him: "Verily, verily, I say unto thee, Except a man be born again of water and of the Spirit, he cannot enter into the kingdom of God." Thou, says He, understandest a carnal generation, when thou sayest, Can a man return into his mother's bowels? The birth for the kingdom of God must be of water and of the Spirit. If one is born to the temporal inheritance of a human father, be he born of the bowels of a carnal mother; if one is born to the everlasting inheritance of God as his Father, be he born of the bowels of the Church. A father, as one that will die, begets a son by his wife to succeed him; but God begets of the Church sons, not to succeed Him, but to abide with Himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252012.html'
source_title="Tractates on John 12"

[[commentary]]
quote='''
Opportunely then it occurs, that to-day you should hear from the Gospel, that, "Except a man be born again of water and of the Spirit, he shall not see the kingdom of God." For it is time that we exhort you, who are still catechumens, who have believed in Christ in such wise, that you are still bearing your sins. And none shall see the kingdom of heaven while burdened with sins; for none shall reign with Christ, but he to whom they have been forgiven: but forgiven they cannot be, but to him who is born again of water and of the Holy Spirit. But let us observe all the words what they imply, that here the sluggish may find with what earnestness they must haste to put off their burden. For were they bearing some heavy load, either of stone, or of wood, or even of some gain; if they were carrying corn, or wine, or money, they would run to put off their loads: they are carrying a burden of sins, and yet are sluggish to run. You must run to put off this burden; it weighs you down, it drowns you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252011.html'
source_title="Tractates on John 11"

[[commentary]]
quote='''
Whither does He bring over, my brethren? Whither does Jesus bring over by baptism, of which Moses then showed the figure, when he brought them through the sea? Whither? To the manna. What is the manna? "I am," saith He, "the living bread, which came down from heaven." The faithful receive the manna, having now been brought through the Red Sea. Why Red Sea? Besides sea, why also "red"? That "Red Sea" signified the baptism of Christ. How is the baptism of Christ red, but as consecrated by Christ's blood? Whither, then, does He lead those that believe and are baptized? To the manna. Behold, "manna," I say: what the Jews, that people Israel, received, is well known, well known what God had rained on them from heaven; and yet catechumens know not what Christians receive. Let them blush, then, for their ignorance; let them pass through the Red Sea, let them eat the manna, that as they have believed in the name of Jesus, so likewise Jesus may trust Himself to them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252011.html'
source_title="Tractates on John 11"

[[commentary]]
quote='''
He that is born of the Catholic Church, is born, as it were, of Sarah, of the free woman; he that is born of heresy is, as it were, born of the bond woman, but of Abraham's seed. Consider, beloved, how great a mystery. God testifies, saying, "I am the God of Abraham, and the God of Isaac, and the God of Jacob." Were there not other patriarchs? Before these, was there not holy Noah, who alone of the whole human race, with all his house, was worthy to be delivered from the flood,-he in whom, and in his sons, the Church was prefigured? Borne by wood, they escaped the flood. Then afterwards great men whom we know, whom Holy Scriptures commends, Moses faithful in all his house. And yet those three are named, just as if they alone deserved well of him: "I am the God of Abraham, and the God of Isaac, and the God of Jacob: this is my name for ever." Sublime mystery! It is the Lord that is able to open both our mouth and your hearts, that we may speak as He has deigned to reveal, and that you may receive even as it is expedient for you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252011.html'
source_title="Tractates on John 11"

[[commentary]]
quote='''
(Tr. xii. c. 5) As if He said, Thou understandest me to speak of a carnal birth; but a man must be born of water and of the Spirit, if he is to enter into the kingdom of God. If to obtain the temporal inheritance of his human father, a man must be born of the womb of his mother; to obtain the eternal inheritance of his heavenly Father, he must be born of the womb of the Church. And since man consists of two parts, body and soul, the mode even of this latter birth is twofold; water the visible part cleansing the body; the Spirit by His invisible cooperation, changing the invisible soul.

(lib. i. de Bapt. per. c. 30) Because He does not say, Except a man be born again of water and of the Spirit, he shall not have salvation, or eternal life; but, he shall not enter into the kingdom of God; from this, some infer that children are to be baptized in order to be with Christ in the kingdom of God, where they would not be, were they not baptized; but that they will obtain salvation and eternal life even if they die without baptism, not being bound with any chain of sin. But why is a man born again, except to be changed from his old into a new state? Or why doth the image of God not enter into the kingdom of God, if it be not by reason of sin?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
And as the catechumens have the sign of the cross on their forehead, they are already of the great house; but from servants let them become sons. For they are something who already belong to the great house. But when did the people Israel eat the manna? After they had passed the Red Sea. And as to what the Red Sea signifies, hear the apostle: "Moreover, brethren, I would not have you ignorant, that all our fathers were under the cloud, and all passed through the sea." To what purpose passed they through the sea? As if thou wert asking of him, he goes on to say, "And all were baptized by Moses in the cloud and in the sea." Now, if the figure of the sea had such efficacy, how great will be the efficacy of the true form of baptism! If what was done in a figure brought the people, after they had crossed over, to the manna, what will Christ impart, in the verity of His baptism, to His own people: brought over through Himself? By His baptism He brings over them that believe; all their sins, the enemies as it were that pursue them, being slain, as all the Egyptians perished in that sea.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252011.html'
source_title="Tractates on John 11"
