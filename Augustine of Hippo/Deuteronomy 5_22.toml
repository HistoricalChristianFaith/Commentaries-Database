[[commentary]]
quote='''
There it was on tables of stone that the finger of God operated; here it was on the hearts of men. There the law was given outwardly, so that the unrighteous might be terrified; here it was given inwardly, so that they might be justified. For this, "Thou shalt not commit adultery, Thou shalt not kill, Thou shalt not covet; and if there be any other commandment,"—such, of course, as was written on those tables,—"it is briefly comprehended," says he, "in this saying, namely, Thou shalt love thy neighbour as thyself. Love worketh no ill to his neighbour: therefore love is the fulfilling of the law." Now this was not written on the tables of stone, but "is shed abroad in our hearts by the Holy Ghost, which is given unto us." God's law, therefore, is love. "To it the carnal mind is not subject, neither indeed can be;" but when the works of love are written on tables to alarm the carnal mind, there arises the law of works and "the letter which killeth" the transgressor; but when love itself is shed abroad in the hearts of believers, then we have the law of faith, and the spirit which gives life to him that loves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 17.29"
