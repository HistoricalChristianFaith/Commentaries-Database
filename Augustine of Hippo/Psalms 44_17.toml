[[commentary]]
quote='''
"All this is come upon us; yet have we not forgotten Thee." What is meant by, "have not forgotten Thee"? "Neither have we behaved ourselves frowardly in Thy covenant."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252044.html'
source_title="Exposition on Psalm 44"
