[[commentary]]
quote='''
And when we confess that we have lied, we speak that which is true; for we say what we know, for we know that we lied. But that Word which is God, and can do more than we, cannot do this. For it "can do nothing except what it sees the Father do;" and it "speaks not of itself," but it has from the Father all that it speaks, since the Father speaks it in a special way; and the great might of that Word is that it cannot lie, because there cannot be there "yea and nay," but "yea yea, nay nay." Well, but that is not even to be called a word, which is not true.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252015.html'
source_title="ON THE TRINITY 15.15"
