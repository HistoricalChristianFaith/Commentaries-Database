[[commentary]]
quote='''
"I am troubled, I am bowed down even unto the end" [Psalm 38:6]. Wherefore was he "bowed down"? Because he had been "lifted up." If thou art "humble, thou shalt be exalted;" if thou exaltest thyself, thou shalt be "bowed down;" for God will be at no loss to find a weight wherewith to bow thee down. ...Let him groan on these things; that he may receive the other; let him "call the Sabbath to remembrance," that he may deserve to arrive at it. For that which the Jews used to celebrate was but a sign. Of what thing was it the sign? Of that which he calls to remembrance, who saith, "I am troubled, and am bowed down even unto the end." What is meant by even "unto the end"? Even to death.

"I go mourning all the day long." "All day long," that is, "without intermission." By "all the day long," he means, "all my life long." But from what time hath he known it? From the time that he began to "call the Sabbath to remembrance." For so long as he "calls to remembrance" what he no longer possesses, wouldest thou not have him "go mourning"? "All the day long have I gone mourning."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252038.html'
source_title="Exposition on Psalm 38"
