[[commentary]]
quote='''
Now look at my Zacchaeus, see him, I beg you, wanting to see Jesus in the crowd and not able. For he was humble, the crowd was haughty; and the crowd itself, as often happens, hindered the view of the Lord; he ascended from the crowd, and saw Jesus with the crowd not hindering him. For the crowd says to the humble, walking the path of humility, leaving their injuries to God, not seeking revenge on their enemies, the crowd insults, and says: Defenseless one, who cannot avenge yourself. The crowd hinders that Jesus may not be seen: the crowd rejoices and exults when it can avenge itself, hindering the view of Him who hanging said: Father, forgive them, for they do not know what they do. So Zacchaeus, wanting to see this one, in whom the person of the humble was prefigured, did not heed the impeding crowd; but climbed the sycamore, as if the tree of a foolish fruit. For, says the Apostle, we preach Christ crucified, indeed a stumbling block to Jews: behold the sycamore; but foolishness to Gentiles. Hence, the wise of this world insult us because of the cross of Christ, and say: What kind of heart do you have, who worship a crucified God? What kind of heart do we have? Certainly not like yours. The wisdom of this world is foolishness with God. Our heart is not like yours. But you call our heart foolish. Say what you will: we will climb the sycamore, and we will see Jesus. For this reason, you cannot see Jesus, because you are ashamed to climb the sycamore. Let Zacchaeus grasp the sycamore, let the humble ascend the cross. It is not enough if he ascends; let him not be ashamed of the cross of Christ, let him fix it on his forehead, where the seat of shame is: there indeed, there in the part of the body where one feels shame, let there be fixed what should not be ashamed. I think you mock the sycamore: yet it made me see Jesus. But you mock the sycamore, because you are human: but the foolishness of God is wiser than men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520174.html'
source_title="SERMON 174.3"
