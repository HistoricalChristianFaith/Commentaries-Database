[[commentary]]
quote='''
And who observed and noticed the cause of his groaning? "All my desire is before Thee." For it is not before men who cannot see the heart, but it is before Thee that all my desire is open! Let your desire be before Him; and "the Father, who seeth in secret, shall reward thee." For it is thy heart's desire that is thy prayer; and if thy desire continues uninterrupted, thy prayer continueth also. For not without a meaning did the Apostle say, "Pray without ceasing." Are we to be "without ceasing" bending the knee, prostrating the body, or lifting up our hands, that he says, "Pray without ceasing"? Or if it is in this sense that we say that we "pray," this, I believe, we cannot do "without ceasing." There is another inward kind of prayer without ceasing, which is the desire of the heart. Whatever else you are doing, if you do but long for that Sabbath, you do not cease to pray. If you would never cease to pray, never cease to long after it. The continuance of thy longing is the continuance of thy prayer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252038.html'
source_title="COMMENTARY ON THE PSALMS 37.14"
