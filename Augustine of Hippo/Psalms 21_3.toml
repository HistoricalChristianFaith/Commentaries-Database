[[commentary]]
quote='''
"For You have presented Him with the blessings of sweetness" [Psalm 21:3]. Because He had first quaffed the blessing of Your sweetness, the gall of our sins did not hurt Him. " Diapsalma. You have set a crown of precious stone on His Head."  At the beginning of His discoursing precious stones were brought, and compassed Him about;  His disciples, from whom the commencement of His preaching should be made.
'''
source_url='https://www.newadvent.org/fathers/1801021.htm'
source_title="Exposition on Psalm 21"


[[commentary]]
quote='''
May God by all means turn away this folly of making ourselves first in His gifts, Himself last,—because "His mercy shall prevent me." And it is He to whom is faithfully and truthfully sung, "For Thou hast prevented him with the blessings of sweetness." And what is here more fitly understood than that very desire of good of which we are speaking? For good begins then to be longed for when it has begun to grow sweet. But when good is done by the fear of penalty, not by the love of righteousness good is not yet well done. Nor is that done in the heart which seems to be done in the act when a man would rather not do it if he could evade it with impunity. Therefore the "blessing of sweetness" is God's grace, by which is caused in us that what He prescribes to us delights us, and we desire it,—that is, we love it; in which if God does not precede us, not only is it not perfected, but it is not even begun, from us. For, if without Him we are able to do nothing actually, we are able neither to begin nor to perfect,—because to begin, it is said "His mercy shall prevent me;" to finish, it is said, "His mercy shall follow me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25202.html'
source_title="AGAINST TWO LETTERS OF THE PELAGIANS 2:21"
