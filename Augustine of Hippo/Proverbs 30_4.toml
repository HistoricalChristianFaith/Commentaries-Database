[[commentary]]
quote='''
The objector who has brought forward these questions from Porphyry has added this one in the next place: Will you have the goodness to instruct me as to whether Solomon said truly or not that God has no Son?

The answer is brief: Solomon not only did not say this, but, on the contrary, expressly said that God hath a Son. For in one of his writings Wisdom saith: "Before the mountains were settled, before the hills was brought forth." And what is Christ but the Wisdom of God? Again, in another place in the book of Proverbs, he says: "God hath taught me wisdom, and I have learned the knowledge of the holy. Who hath ascended up into heaven and descended? who hath gathered the winds in His fists? who hath bound the waters in a garment? who hath established all the ends of the earth? What is His name, and what is His Son's name?" Of the two questions concluding this quotation, the one referred to the Father, namely, "What is His name?"—with allusion to the foregoing words, "God hath taught me wisdom,"—the other evidently to the Son, since he says, "or what is His Son's name?"—with allusion to the other statements, which are more properly understood as pertaining to the Son, viz. "Who hath ascended up into heaven and descended?"—a question brought to remembrance by the words of Paul: "He that descended is the same also that ascended up far above all heavens;"—"Who hath gathered the winds in His fists?" i.e. the souls of believers in a hidden and secret place, to whom, accordingly, it is said, "Ye are dead, and your life is hid with Christ in God;"—"Who hath bound the waters in a garment?" whence it could be said, "As many of you as have been baptized into Christ have put on Christ;"—"Who hath established all the ends of the earth?" the same who said to His disciples, "Ye shall be witnesses unto Me, both in Jerusalem, and in all Judea, and in Samaria, and unto the uttermost part of the earth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTER 102:5"
