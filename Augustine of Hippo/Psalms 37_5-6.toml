[[commentary]]
quote='''
"Behold" (you say), "I do long after it, I do ask for it, I do desire it. Shall I then accomplish it?" No. Who shall then? "Reveal thy way unto the Lord: trust also in Him, and He shall bring it to pass" (ver. 5). Mention to Him what thou sufferest, mention to Him what thou dost desire. For what is it that thou sufferest? "The flesh lusteth against the spirit, and the spirit against the flesh." What is it then that thou dost desire? "Wretched man that I am! Who shall deliver me from the body of this death?" And because it is He "Himself" that "will bring it to pass," when thou shall have "revealed thy ways unto Him;" hear what follows: "The grace of God through Jesus Christ our Lord." What is it then that He is to bring to pass, since it is said, "Reveal thy way unto Him, and He will bring it to pass"? What will He bring to pass?

"And He shall bring forth thy righteousness as the light" (ver. 6). For now, "thy righteousness" is hid. Now it is a thing of faith; not yet of sight. You believe something that you may do it. You do not yet see that in which you believe. But when thou shall begin to see that, which thou didst believe before, "thy righteousness will be brought forth to the light," because it is thy faith that was thy righteousness. For "the just lives by faith."

"And He shall bring forth thy judgment as the noon-day." That is to say, "as the clear light." It was too little to say, "as the light." For we call it "light" already, even when it but dawns: we call it light even while the sun is rising. But never is the light brighter than at mid-day. Therefore He will not only "bring forth thy righteousness as the light," but "thy judgment shall be as the noon-day." For now dost thou make thy "judgment" to follow Christ. This is thy purposé: this is thy choice: this is thy "judgment."...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252037.html'
source_title="ON THE PSALMS - Psalm 37"
