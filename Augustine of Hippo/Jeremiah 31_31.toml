[[commentary]]
quote='''
What say we to this? One nowhere, or hardly anywhere, except in this passage of the prophet, finds in the Old Testament Scriptures any mention so made of the New Testament as to indicate it by its very name. It is no doubt often referred to and foretold as about to be given, but not so plainly as to have its very name mentioned. Consider then carefully, what difference God has testified as existing between the two testaments - the old covenant and the new.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 33"


[[commentary]]
quote='''
It is then on account of the offence of the old man, which was by no means healed by the letter which commanded and threatened, that it is called the old covenant; whereas the other is called the new covenant, because of the newness of the spirit, which heals the new man of the fault of the old. Then consider what follows, and see in how clear a light the fact is placed, that men who bare faith are unwilling to trust in themselves: "Because," says he, "this is the covenant which I will make with the house of Israel; After those days, saith the Lord, I will put my law in their inward parts, and write it in their hearts."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 35"


[[commentary]]
quote='''
Finally, that we may not be disturbed by the words I have quoted and many others of like importance, about returning the sins of the parents on the children—words written truthfully, yet that might be thought contrary to this prophecy—he solves this very vexed question by adding, "Behold, the days shall come, says the Lord, and I will make a new covenant with the house of Israel and with the house of Judah, not according to the covenant that I made with their ancestors." In this new covenant through the blood of the Mediator, the paternal decree having been cancelled, humankind by rebirth begins to be no longer subject to the paternal debts that bind them at birth, as the Mediator says: "And call no one on earth your father," inasmuch as we but shall live forever with the Father.
'''
source_url=''
source_title="AGAINST JULIAN 6:25.82"
