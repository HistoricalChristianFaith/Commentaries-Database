[[commentary]]
quote='''
But lest any should contend that not every lie is to be called false witness, what will he say to that which is written, "The mouth that lieth slayeth the soul:" and lest any should suppose that this may be understood with the exception of some liars, let him read in another place, "Thou wilt destroy all that speak leasing." Whence with His own lips the Lord saith, "Let your communication be yea, yea; nay, nay; for whatsoever is more than these cometh of evil." Hence the Apostle also in giving precept for the putting off of the old man, under which name all sins are understood, says straightway, "Wherefore putting away lying, speak ye truth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Lying.html'
source_title="ON LYING 6"


[[commentary]]
quote='''
Let no one mistake this. The apostle is not giving us room to tell a lie to those who are not yet members of Christ with us. The point of the saying is that each of us should consider everyone as we wish him to become, even if he has not become so.… We ought to deal with a person in such a way that he will cease to be an outsider. Regard him as your neighbor already, rather than as an outsider. It may be that, because of the fact that he is not yet a partaker of our faith and sacraments, certain truths must be concealed from him. But that is no reason for telling him falsehoods.
'''
source_url='https://www.newadvent.org/fathers/1313.htm'
source_title="Against Lying 15"
