[[commentary]]
quote='''
The Son, therefore, is not properly said to have been sent in that He is begotten of the Father; but either in that the Word made flesh appeared to the world, whence He says, "I came forth from the Father, and am come into the world;" or in that from time to time, He is perceived by the mind of each, according to the saying, "Send her, that, being present with me, she may labor with me." What then is born from eternity is eternal, "for it is the brightness of the everlasting light;" but what is sent from time to time, is that which is apprehended by each. But when the Son of God was made manifest in the flesh, He was sent into this world in the fullness of time, made of a woman. "For after that, in the wisdom of God, the world by wisdom knew not God" (since "the light shineth in darkness, and the darkness comprehended it not"), it "pleased God by the foolishness of preaching to save them that believe," and that the Word should be made flesh, and dwell among us. But when from time to time He comes forth and is perceived by the mind of each, He is said indeed to be sent, but not into this world; for He does not appear sensibly, that is, He does not present Himself to the corporeal senses. For we ourselves, too, are not in this world, in respect to our grasping with the mind as far as we can that which is eternal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4:20.28"
