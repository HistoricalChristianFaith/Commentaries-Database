[[commentary]]
quote='''
Why, then, does he not listen to the Spirit of his Father, speaking through Christ's apostle, or even Christ Himself, who says in His gospel, "Seek and ye shall find;" and who also says to us, speaking by His apostle: "If any one of you lack wisdom, let him ask of God, that giveth to all men liberally, and upbraideth not, and it shall be given to him. Let him, however, ask in faith, nothing wavering?" This is the faith by which the just man lives; this is the faith whereby he believes on Him who justifies the ungodly; this is the faith through which boasting is excluded, either by the retreat of that with which we become self-inflated, or by the rising of that with which we glory in the Lord. This, again, is the faith by which we procure that largess of the Spirit, of which it is said: "We indeed through the Spirit wait for the hope of righteousness by faith."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 56"


[[commentary]]
quote='''
Remember what the Scriptures say: "If any of you lack wisdom, let him ask of God, who giveth to all men liberally, and upbraideth not; and it shall be given to him." Wisdom itself cometh down from above, as the Apostle James himself tells us.… What blessing, then, will that man not have who has prayed for this wisdom and obtained it of the Lord? And from this you may understand what grace is; because if this wisdom were of ourselves, it would not be from above; nor would it be an object to be asked for of the God who created us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520on%2520Grace%2520and%2520Free%2520Will.html'
source_title="ON GRACE AND FREE WILL 24"


[[commentary]]
quote='''
Because, although wisdom is obtained from faith, even as James himself, when he had said, "If any of you lack wisdom, let him ask of God, who giveth to all liberally and upbraideth not, and it shall be given," immediately added, "But let him ask in faith, nothing wavering:" it is not, nevertheless, because faith is given before it is asked for by him to whom it is given, that it must therefore be said not to be the gift of God, but to be of ourselves, because it is given to us without our asking for it! For the apostle very plainly says, "Peace be to the brethren, and love with faith from God the Father and the Lord Jesus Christ." From whom, therefore, are peace and love, from Him also is faith; wherefore, from Him we ask not only that it may be increased to those that possess it, but also that it may be given to those that possess it not.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520on%2520the%2520Predestination%2520of%2520the%2520Saints%2FBook%25202.html'
source_title="ON THE GIFT OF PERSEVERANCE 44"
