[[commentary]]
quote='''
So the heretics discuss not to find the truth, but with a dogged determination to gain the victory one way or another, that they may gather, as the prophet says, what they have not brought forth. For those whom they lead astray are Christians already born of the gospel, whom the Christian profession of the heretics misleads. Thus they make riches not with judgment, but with inconsiderate haste. For they do not consider that the followers whom they gather as their riches are taken from the genuine original Christian society, and deprived of its benefits; and as the apostle describes these heretics in the words: "As Jannes and Jambres withstood Moses, so they also resist the truth: men of corrupt minds, reprobate concerning the faith. But they shall proceed no further: for their folly shall be manifest to all men, as theirs also was." So the prophet goes on to say of the partridge, which gathers what it has not brought forth: "In the midst of his days they shall leave him, and in the end he shall be a fool;" that is, he who at first misled people by a promising display of superior wisdom, shall be a fool, that is, shall be seen to be a fool. He will be seen when his folly is manifest to all men, and to those to whom he was at first a wise man he will then be a fool.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252013.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 13.12"
