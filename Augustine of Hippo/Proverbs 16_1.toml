[[commentary]]
quote='''
But assuredly, as to what is written, "The preparation of the heart is man's part, and the answer of the tongue is from the Lord," they are misled by an imperfect understanding, so as to think that to prepare the heart—that is, to begin good—pertains to man without the aid of God's grace. Be it far from the children of promise thus to understand it! As if, when they heard the Lord saying, "Without me ye can do nothing," they would convict Him by saying, "Behold without Thee we can prepare the heart." Therefore, since it is written, "It is man's part to prepare the heart, and the answer of the tongue is from the Lord," it is that man prepares his heart, not, however, without the aid of God, who so touches the heart that man prepares the heart. But in the answer of the tongue—that is, in that which the divine tongue answers to the prepared heart—man has no part; but the whole is from the Lord God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25202.html'
source_title="AGAINST TWO LETTERS OF THE PELAGIANS 2:19"
