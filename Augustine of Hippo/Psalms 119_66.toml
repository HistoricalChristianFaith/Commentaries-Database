[[commentary]]
quote='''
"O learn me sweetness, and understanding, and knowledge," he saith, "for I have believed Thy commandments" [Psalm 119:66]. He prayeth these things may be increased and perfected. For they who said, "Lord, increase our faith," [Luke 17:5] had faith. And as long as we live in this world, these are the words of those who are making progress. But he addeth, "understanding," or, as most copies read, "discipline." Now the word discipline, for which the Greeks use παιδεία, is employed in Scripture, where instruction through tribulation is to be understood: according to the words, "Whom the Lord loveth He disciplineth, and scourgeth every son whom He receiveth." [Hebrews 12:6] In the literature of the Church this is usually called discipline. For this word, παιδεία, is used in the Greek in the Epistle to the Hebrews, where the Latin translator saith, "No discipline for the present seemeth to be joyous, but grievous," etc. [Hebrews 12:11] He therefore toward whom the Lord dealeth in sweetness, that is, he in whom He mercifully inspires delight in that which is good, ought to pray instantly, that this gift may be so increased unto him, that he may not only despise all other delights in comparison with it, but also that he may endure any amount of sufferings for its sake. Thus is discipline healthfully added to sweetness. This discipline ought not to be desired, and prayed for, for a small measure of grace and goodness, that is, holy love; but for so great, as may not be extinguished by the weight of the chastening: ...so much in fact as to enable him to endure with the utmost patience the discipline. In the third place is mentioned knowledge; since, if knowledge in its greatness outstrips the increase of love, it doth not edify, but "puffeth up." [1 Corinthians 8:1] ...

But in that he saith, not, Give unto me; but, "O learn me;" how is the sweetness taught, if it be not given? Since many know what doth not delight them, and find no sweetness in things of which they have knowledge. For sweetness cannot be learnt, unless it please. Also discipline, which signifieth the tribulation which chasteneth, is learnt by receiving; that is, not by hearing, or reading, or thinking, but by feeling. ...

He addeth, "for I have believed Thy commandments," and herein we may justly enquire, why he said not, I obeyed, rather than, I believed. For commandments are one thing, promises another. We undertake to obey commandments, that we may deserve to receive promises. We therefore believe promises, obey commandments. ...Teach me therefore sweetness by inspiring charity, teach me discipline by giving patience, teach me knowledge by enlightening my understanding: "for I have believed Thy commandments." I have believed that Thou who art God, and who givest unto man whence Thou mayest cause him to do what Thou commandest, hast commanded these things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520119.html'
source_title="ON THE PSALMS, Psalm 119"
