[[commentary]]
quote='''
The Apostle Peter also says, "Why do ye wish to put a yoke upon the heathen, which neither we nor our fathers have been able to bear? But, by the grace of the Lord Jesus Christ, we believe that we shall be saved, even as they." You who are enemies to this grace do not wish this, that the ancients should be believed to have been saved by the same grace of Jesus Christ; but you distribute the times according to Pelagius, in whose books this is read, and you say that before the law men were saved by nature, then by the law, lastly by Christ, as if to men of the two former times, that is to say, before the law and under the law, the blood of Christ had not been necessary; making void what is said: "For there is one God and one Mediator between God and men, the man Christ Jesus."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25201.html'
source_title="AGAINST TWO LETTERS OF THE PELAGIANS 1.39"
