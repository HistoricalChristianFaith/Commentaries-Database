[[commentary]]
quote='''
On hearing this curse pronounced in the figurative language of prophecy on him that trusts in man, and the blessing in similar style on him that trusts in God, the inquirer might have doubts about our doctrine, in which we teach not only that Christ is God, so that our trust is not in man, but also that He is man because He took our nature. So some err by denying Christ's humanity, while they allow His divinity. Others, again, assert His humanity, but deny His divinity, and so either become infidels or incur the guilt of trusting in man. The inquirer, then, might say that the prophet says only that Christ is God, without any reference to His human nature; whereas, in our apostolic doctrine, Christ is not only God in whom we may safely trust, but the Mediator between God and man—the man Jesus. The prophet explains this in the words in which he seems to check himself, and to supply the omission: "His heart," he says "is sorrowful throughout; and He is man, and who shall know Him?" He is man, in order that in the form of a servant He might heal the hard in heart, and that they might acknowledge as God Him who became man for their sakes, that their trust might be not in man, but in God-man. He is man taking the form of a servant. And who shall know Him? For "He was in the form of God, and thought it not robbery to be equal to God." He is man, for "the Word was made flesh, and dwelt among us." And who shall know Him? For "in the beginning was the Word, and the Word was with God, and the Word was God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252013.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 13:8"


[[commentary]]
quote='''
So also, notwithstanding the surpassing justice and wisdom of Christ, His manhood was much more plainly and readily recognized by strangers, who, indeed, were not wrong in believing Him to be man, but they did not understand His being God as well as man. Hence Jeremiah says: "He is both a man, and who shall know Him?" He is a man, for it is made manifest that He is a brother. And who shall know Him? for it is concealed that He is a husband. This must suffice as a defense of our father Abraham against Faustus' impudence and ignorance and malice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252022.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 22:40"
