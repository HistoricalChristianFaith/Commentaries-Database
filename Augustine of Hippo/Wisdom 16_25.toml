[[commentary]]
quote='''
Our present inquiry then is, whether the angels were then the agents both in showing those bodily appearances to the eyes of men and in sounding those words in their ears, when the sensible creature itself, serving the Creator at His beck, was turned for the time into whatever was needful; as it is written in the book of Wisdom, "For the creature serveth Thee, who art the Maker, increaseth his strength against the unrighteous for their punishment, and abateth his strength for the benefit of such as put their trust in Thee. Therefore, even then was it altered into all fashions, and was obedient to Thy grace, that nourisheth all things according to the desire of them that longed for Thee." For the power of the will of God reaches through the spiritual creature even to visible and sensible effects of the corporeal creature. For where does not the wisdom of the omnipotent God work that which He wills, which "reacheth from one end to another mightily, and sweetly doth order all things"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3:1.6"
