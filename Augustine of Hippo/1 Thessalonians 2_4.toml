[[commentary]]
quote='''
The great Teacher has accordingly taught us by His apostle, that we ought not to do good with a view to be praised by men, that is, we ought not to make the praises of men the motive for our well-doing; and yet, for the sake of men themselves, He teaches us to seek their approbation. For when good men are praised, the praise does not benefit those on whom it is bestowed, but those who bestowed it. For to the good, so far as they are themselves concerned, it is enough that they are good; but those are to be congratulated whose interest it is to imitate the good when the good are praised by them, since they thus show that the persons whom they sincerely praise are persons whose conduct they appreciate. The apostle says in a certain place, "If I yet pleased men, I should not be the servant of Christ;" and the same apostle says in another place, "I please all men in all things," and adds the reason, "Not seeking mine own profit, but the profit of many, that they may be saved." … What the apostle says, then, in the first of these passages, "If I yet pleased men, I should not be the servant of Christ," is to be understood as if he said, If the good things which I do were done by me with human praise as my motive, if I were puffed up with the love of praise, I should not be the servant of Christ. The apostle, then, wished to please all men, and rejoiced in pleasing them, not that he might himself be inflated with their praises, but that he being praised might build them up in Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="Letters 231.4"
