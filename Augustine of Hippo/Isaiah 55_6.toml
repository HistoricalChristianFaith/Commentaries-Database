[[commentary]]
quote='''
How then am I to seek for you, Lord? When I seek for you, my God, my quest is for the happy life. I will seek you that "my soul may live," for my body derives life from my soul, and my soul derives life from you.… Is not the happy life that which all desire, which indeed no one fails to desire?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FConfessions%2FBook%252010.html'
source_title="Confessions 10.20"


[[commentary]]
quote='''
And yet the prophet Isaiah testifies, that the Lord God can be found when He is sought, when he says: "Seek ye the Lord; and as soon as ye have found Him, call upon Him: and when He has drawn near to you, let the wicked man forsake his ways, and the unrighteous man his thoughts." If, then, when sought, He can be found, why is it said, "Seek ye His face evermore?" Is He perhaps to be sought even when found? For things incomprehensible must so be investigated, as that no one may think he has found nothing, when he has been able to find how incomprehensible that is which he was seeking. Why then does he so seek, if he comprehends that which he seeks to be incomprehensible, unless because he may not give over seeking so long as he makes progress in the inquiry itself into things incomprehensible, and becomes ever better and better while seeking so great a good, which is both sought in order to be found, and found in order to be sought? For it is both sought in order that it may be found more sweetly, and found in order that it may be sought more eagerly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252015.html'
source_title="ON THE TRINITY 15:2.2"
