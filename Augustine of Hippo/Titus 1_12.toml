[[commentary]]
quote='''
If you were to hear even from any one that was profane the prayer of the priest couched in the words suitable to the mysteries of the gospel, can you possibly say to him, Your prayer is not true, though he himself may be not only no true priest, but not a priest at all? seeing that the Apostle Paul said that certain testimony of I know not what Cretan prophet was true, though he was not reckoned among the prophets of God for he says, "One of themselves, even a prophet of their own, said the Cretians are always liars, evil beasts, slow bellies: this witness is true." If, therefore, the apostle even himself bore witness to the testimony of some obscure prophet of a foreign race, because he found it to be true, why do not we, when we find in any one what belongs to Christ, and is true even though the man with whom it may be found be deceitful and perverse, why do not we in such a case make a distinction between the fault which is found in the man, and the truth which he has not of his own but of God's? and why do we not say, This sacrament is true, as Paul said, "This witness is true"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FIn%2520Answer%2520to%2520the%2520Letters%2520of%2520Petilian%2FBook%25202.html'
source_title="The Letters of Petilian the Donatist 2.30.69"
