[[commentary]]
quote='''
Holy Job says, when speaking about his own sins, "for man that is born of a woman is short-lived and full of wrath: as the flower of grass, so does he fall; and he departs like a shadow, nor shall he stay. Hast Thou not taken account even of him, and caused him to enter into judgment in Thy sight? For who shall be pure from uncleanness? Not even one, even if his life should be but of one day upon the earth." Now when he speaks of uncleanness here, the mere perusal of the passage is enough to show that he meant sin to be understood. It is plain from the words, of what he is speaking. The same phrase and sense occur in the prophet Zechariah, in the place where "the filthy garments" are removed from off the high priest, and it is said to him, "I have taken away thy sins." Well now, I rather think that all these passages, and others of like import, which point to the fact that man is born in sin and under the curse, are not to be read among the dark recesses of the Manicheans, but in the sunshine of catholic truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Marriage%2520and%2520Concupiscence%2FBook%25202.html'
source_title="ON MARRIAGE AND CONCUPISCENCE 2:50"
