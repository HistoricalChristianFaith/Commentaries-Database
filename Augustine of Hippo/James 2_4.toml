[[commentary]]
quote='''
Nor, indeed, in my opinion, are we to esteem it a trifling sin "to have the faith of our Lord Jesus Christ with respect of persons," if we take the difference between sitting and standing, of which mention is made in the context, to refer to ecclesiastical honours; for who can bear to see a rich man chosen to a place of honour in the Church, while a poor man, of superior qualifications and of greater holiness, is despised? If, however, the apostle speaks there of our daily assemblies, who does not offend in the matter? At the same time, only those really offend here who cherish in their hearts the opinion that a man's worth is to be estimated according to his wealth; for this seems to be the meaning of the expression, "Are ye not then partial in yourselves, and are become judges of evil thoughts?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 167.18"
