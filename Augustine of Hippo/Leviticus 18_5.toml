[[commentary]]
quote='''
The righteousness of the law is proposed in these terms,-that whosoever shall do it shall live in it; and the purpose is, that when each has discovered his own weakness, he may not by his own strength, nor by the letter of the law (which cannot be done), but by faith, conciliating the Justifier, attain, and do, and live in it. For the work in which he who does it shall live, is not done except by one who is justified. His justification, however, is obtained by faith; and concerning faith it is written, "Say not in thine heart, Who shall ascend into heaven? (that is, to bring down Christ therefrom;) or, Who shall descend into the deep? (that is, to bring up Christ again from the dead.) But what saith it? The word is nigh thee, even in thy mouth, and in thy heart: that is (says he), the word of faith which we preach: That if thou shalt confess with thy mouth the Lord Jesus, and shalt believe in thine heart that God hath raised Him from the dead, thou shalt be saved." As far as he is saved, so far is he righteous.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 29.50"
