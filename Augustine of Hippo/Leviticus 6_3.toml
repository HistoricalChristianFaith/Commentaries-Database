[[commentary]]
quote='''
For if Christ took away from us that very heavy yoke of many observances, so that we are not circumcised according to the flesh, we do not immolate victims of the cattle, we do not rest even from necessary works on the Sabbath, retaining the seventh in the revolution of the days, and other things of this kind; but keep them as spiritually understood, and, the symbolizing shadows being removed, are watchful in the light of those things which are signified by them; shall we therefore say, that when it is written that whoever finds another man's property of any kind that has been lost, should return it to him who has lost it, it does not pertain to us? and many other like things whereby people learn to live piously and uprightly? and especially the Decalogue itself, which is contained in those two tables of stone, apart from the carnal observance of the Sabbath, which signifies spiritual sanctification and rest? For who can say that Christians ought not to be observant to serve the one God with religious obedience, not to worship an idol, not to take the name of the Lord in vain, to honour one's parents, not to commit adulteries, murders, thefts, false witness, not to covet another man's wife, or anything at all that belongs to another man? Who is so impious as to say that he does not keep those precepts of the law because he is a Christian, and is established not under the law, but under grace?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25203.html'
source_title="AGAINST TWO LETTERS OF THE PELAGIANS 3.10"
