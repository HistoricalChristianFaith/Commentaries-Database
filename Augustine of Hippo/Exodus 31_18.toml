[[commentary]]
quote='''
This law was "written with the finger of God," and this finger of God the New Testament explicitly identifies with the Holy Spirit. For when one Evangelist has "By the finger of God, I cast out devils," another says this same thing thus: "By the spirit of God, I cast out devils." Who would not have this joy in the divine mysteries, when the redemptive doctrine shines with so clear a light, rather than all the powers of this world though they be infused with unwonted peace and happiness?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTER 55"


[[commentary]]
quote='''
Now, to make our statement all the clearer, let us look at the Decalogue itself. It is certain, then, that Moses on the mount received the law, that he might deliver it to the people, written on tables of stone by the finger of God. It is summed up in these ten commandments, in which there is no precept about circumcision, nor anything concerning those animal sacrifices which have ceased to be offered by Christians. Well, now, I should like to be told what there is in these ten commandments, except the observance of the Sabbath, which ought not to be kept by a Christian,—whether it prohibit the making and worshipping of idols and of any other gods than the one true God, or the taking of God's name in vain; or prescribe honour to parents; or give warning against fornication, murder, theft, false witness, adultery, or coveting other men's property? Which of these commandments would any one say that the Christian ought not to keep? Is it possible to contend that it is not the law which was written on those two tables that the apostle describes as "the letter that killeth," but the law of circumcision and the other sacred rites which are now abolished? But then how can we think so, when in the law occurs this precept, "Thou shall not covet," by which very commandment, notwithstanding its being holy, just, and good, "sin," says the apostle, "deceived me, and by it slew me?" What else can this be than "the letter" that "killeth"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 14.23"
