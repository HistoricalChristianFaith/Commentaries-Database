[[commentary]]
quote='''
And therefore the apostle calls himself both perfect and imperfect,—imperfect, to wit, in the thought of how much is wanting to him for the righteousness for the fulness of which he is still hungering and thirsting; but perfect in that he does not blush to confess his own imperfection, and goes forward in good that he may attain. As we can say that the wayfarer is perfect whose approach is well forwarded, although his intention is not carried out unless his arrival be actually effected.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25203.html'
source_title="ON TWO LETTERS OF PELAGIUS 3.19"


[[commentary]]
quote='''
Let us therefore, as many as be perfect, be thus minded. In other words, let us, as many as are running perfectly, be thus resolved, that, being not yet perfected, we pursue our course to perfection along the way by which we have thus far run perfectly, in order that "when that which is perfect is come, then that which is in part may be done away;" that is, may cease to be but in part any longer, but become whole and complete.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FConcerning%2520Man%2527s%2520Perfection%2520in%2520Righteousness.html'
source_title="ON THE PERFECTION OF HUMAN RIGHTEOUSNESS 19"
