[[commentary]]
quote='''
"He that speaketh of himself seeketh his own glory: `This will be he who is called Antichrist,' exalting himself," as the apostle says, "above all that is called God, and that is worshipped." The Lord, declaring that this same it is that will seek his own glory, not the glory of the Father, says to the Jews: "I am come in my Father's name, and ye have not received me; another will come in his own name, him ye will receive." He intimated that they would receive Antichrist, who will seek the glory of his own name, puffed up, not solid; and therefore not stable, but assuredly ruinous. But our Lord Jesus Christ has shown us a great example of humility.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252029.html'
source_title="TRACTATES ON JOHN 29.8"
