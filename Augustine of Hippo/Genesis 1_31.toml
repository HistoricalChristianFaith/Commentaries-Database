[[commentary]]
quote='''
Certainly we should not carelessly pass over the words of Scripture that say, "And God saw that all the things that he had made were very good." For when dealing with individual things, it only says, "God saw that it is good," but in speaking of all things, it was not enough to say "good" without adding "very" as well. For if prudent observers consider the single works of God, they find that individually in their own species, they have praiseworthy measures, numbers and orders. How much more then will this be true of all of them together, that is, of the universe that is filled with these individual things gathered into unity? For every beauty that is composed of parts is much more praiseworthy in the whole than in a part.
'''
source_url=''
source_title="TWO BOOKS ON GENESIS AGAINST THE MANICHAEANS 1.21.32"

[[commentary]]
quote='''
No one doubts that God himself is the primal good. Indeed things can be said to be similar to God in many ways. Some, created in accordance with power and wisdom, are similar to God because uncreated power and wisdom are in him. Other created things are similar to God in the simple fact that they are alive, and God is incomparably alive and the source of life. Other created things are similar to God in that they have being, for God is the highest being and the source of being. And even those things that merely exist and yet do not live or know are in his likeness, not completely but in a slight degree, because even they are good in their own order, while God is incomparably good in a way transcending all other goods and from whom everything good proceeds.
'''
source_url=''
source_title="EIGHTY-THREE QUESTIONS 51.2"


[[commentary]]
quote='''
And this number is on that account called perfect, because it is completed in its own parts: for it has these three, sixth, third, and half; nor is there any other part found in it, which we can call an aliquot part. The sixth part of it, then, is one; the third part, two; the half, three. But one and two and three complete the same six. And Holy Scripture commends to us the perfection of this number, especially in this, that God finished His works in six days, and on the sixth day man was made in the image of God. And the Son of God came and was made the Son of man, that He might re-create us after the image of God, in the sixth age of the human race. For that is now the present age, whether a thousand years apiece are assigned to each age, or whether we trace out memorable and remarkable epochs or turning-points of time in the divine Scriptures, so that the first age is to be found from Adam until Noah, and the second thence onwards to Abraham, and then next, after the division of Matthew the evangelist, from Abraham to David, from David to the carrying away to Babylon, and from thence to the travail of the Virgin, which three ages joined to those other two make five. Accordingly, the nativity of the Lord began the sixth, which is now going onwards until the hidden end of time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4.4.7"
