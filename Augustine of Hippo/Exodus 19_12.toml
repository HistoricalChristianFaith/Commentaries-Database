[[commentary]]
quote='''
Now, amidst this admirable correspondence, there is at least this very considerable diversity in the cases, in that the people in the earlier instance were deterred by a horrible dread from approaching the place where the law was given; whereas in the other case the Holy Ghost came upon them who were gathered together in expectation of His promised gift. There it was on tables of stone that the finger of God operated; here it was on the hearts of men. There the law was given outwardly, so that the unrighteous might be terrified; here it was given inwardly, so that they might be justified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 17.29"
