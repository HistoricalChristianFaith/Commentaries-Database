[[commentary]]
quote='''
The knowledge of things terrestrial and celestial is commonly thought much of by men. Yet those doubtless judge better who prefer to that knowledge, the knowledge of themselves; and that mind is more praiseworthy which knows even its own weakness, than that which, without regard to this, searches out, and even comes to know, the ways of the stars, or which holds fast such knowledge already acquired, while ignorant of the way by which itself to enter into its own proper health and strength. But if any one has already become awake towards God, kindled by the warmth of the Holy Spirit, and in the love of God has become vile in his own eyes; and through wishing, yet not having strength to come in unto Him, and through the light He gives, has given heed to himself, and has found himself, and has learned that his own filthiness cannot mingle with His purity; and feels it sweet to weep and to entreat Him, that again and again He will have compassion, until he have put off all his wretchedness; and to pray confidently, as having already received of free gift the pledge of salvation through his only Saviour and Enlightener of man:—such an one, so acting, and so lamenting, knowledge does not puff up, because charity edifieth; for he has preferred knowledge to knowledge, he has preferred to know his own weakness, rather than to know the walls of the world, the foundations of the earth, and the pinnacles of heaven. And by obtaining this knowledge, he has obtained also sorrow; but sorrow for straying away from the desire of reaching his own proper country, and the Creator of it, his own blessed God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4, PREFACE"


[[commentary]]
quote='''
It is evident, then, that the oldness of the letter, in the absence of the newness of the spirit, instead of freeing us from sin, rather makes us guilty by the knowledge of sin. Whence it is written in another part of Scripture, "He that increaseth knowledge, increaseth sorrow,"—not that the law is itself evil, but because the commandment has its good in the demonstration of the letter, not in the assistance of the spirit; and if this commandment is kept from the fear of punishment and not from the love of righteousness, it is servilely kept, not freely, and therefore it is not kept at all. For no fruit is good which does not grow from the root of love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 26"
