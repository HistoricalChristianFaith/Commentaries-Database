[[commentary]]
quote='''
Even this man, whose case John had taken up, and thus had given occasion for the Lord to commence the discourse referred to, was not separating himself from the society of the disciples to any such effect as to scorn it like a heretic. But his position was something parallel to the familiar one of men who, while not going the length yet of receiving the sacraments of Christ, nevertheless favour the Christian name so far as even to receive Christians, and accommodate themselves to them for this very reason, and none other, that they are Christian; of which type of persons it is that He tells us that they do not lose their reward. This does not mean, however, that they ought at once to think themselves quite safe and secure simply on account of this kindness which they cherish towards Christians, while at the same time they are neither cleansed by Christ's baptism, nor incorporated into the unity of His body. But the import is, that they are now being guided by the mercy of God in such a way that they may also come to these higher things, and so quit this present world in safety. And such persons assuredly are more profitable [servants], even before they become associated with the number of Christians, than those individuals who, while already bearing the Christian name and partaking in the Christian sacraments, recommend courses which are only fitted to drag others, whom they may persuade to adopt them, along with themselves into eternal punishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520Harmony%2520of%2520the%2520Gospels%2FBook%25204.html'
source_title="HARMONY OF THE GOSPELS 4.6"

[[commentary]]
quote='''
But "whatsoever is without the Catholic Church is mere pretense," yet only in so far as it is not Catholic. But there may be something Catholic outside the Catholic Church, just as the name of Christ could exist outside the congregation of Christ, in which name he who did not follow with the disciples was casting out devils. For there may be pretense also within the Catholic Church, as is unquestionable in the case of those "who renounce the world in words and not in deeds," and yet the pretense is not Catholic. As, therefore, there is in the Catholic Church something which is not Catholic, so there may be something which is Catholic outside the Catholic Church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Baptism%2FBook%25207.html'
source_title="ON BAPTISM, AGAINST THE DONATISTS 7.39 (76)"
