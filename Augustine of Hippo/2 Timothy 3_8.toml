[[commentary]]
quote='''
A great encomium on grace, my brethren,—one that will instruct the souls of the humble, and stop the mouths of the proud. Let those now answer it, if they dare, who, ignorant of God's righteousness, and going about to establish their own, have not submitted themselves unto the righteousness of God. Let the self-complacent answer it, who think they have no need of God for the performance of good works. Fight they not against such a truth, those men of corrupt mind, reprobate concerning the faith, whose reply is only full of impious talk, when they say: It is of God that we have our existence as men, but it is of ourselves that we are righteous? What is it you say, you who deceive yourselves, and, instead of establishing freewill, cast it headlong down from the heights of its self-elevation through the empty regions of presumption into the depths of an ocean grave? Why, your assertion that man of himself worketh righteousness, that is the height of your self-elation. But the Truth contradicts you, and declares, "The branch cannot bear fruit of itself, except it abide in the vine."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252081.html'
source_title="TRACTATES ON JOHN 81.2"
