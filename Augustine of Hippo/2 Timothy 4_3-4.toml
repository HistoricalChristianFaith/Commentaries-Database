[[commentary]]
quote='''
And yet all these utterly senseless heretics, who wish to be styled Christians, attempt to color the audacities of their devices, which are perfectly abhorrent to every human feeling, with the chance presented to them of that gospel sentence uttered by the Lord, "I have yet many things to say unto you, but ye cannot bear them now:" as if these were the very things which the apostles could not then bear, and as if the Holy Spirit had taught them what the unclean spirit, with all the length he can carry his audacity, blushes to teach and to preach in broad daylight. It is such whom the apostle foresaw through the Holy Spirit, when he said: "For the time will come when they will not endure sound doctrine; but after their own lusts shall they heap to themselves teachers, having itching ears; and they shall turn away their ears from the truth, and shall be turned unto fables."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252097.html'
source_title="TRACTATES ON JOHN 97.3-4"
