[[commentary]]
quote='''
(Prosper. Lib. Sentent. 318.) How great strength the love of human glory has, none feels, but he who has proclaimed war against it. For though it is easy for any not to wish for praise when it is denied him, it is difficult not to be pleased with it when it is offered.

(Serm. in Mont. ii. 1.) In saying only, That ye be seen of men, without any addition, He seems to have forbidden that we should make that the end of our actions. For the Apostle who declared, If I yet pleased men, I should not be the servant of Christ; (Gal. 1:10.) says in another place, I please all men in all things. (1 Cor. 10:33.) This he did not that he might please men, but God, to the love of whom he desires to turn the hearts of men by pleasing them. As we should not think that he spoke absurdly, who should say. In this my pains in seeking a ship, it is not the ship I seek, but my country.

(Serm. 54. 2.) He says this, that ye be seen of men, because there are some who so do their righteousness before men that themselves may not be seen, but that the works themselves may be seen, and their Father who is in heaven may be glorified; for they reckon not their own righteousness, but His, in the faith of whom they live.

(Serm. in Mont. ii. 1.) That He adds, Otherwise ye shall not have your reward before your Father who is in heaven, signifies no more than that we ought to take heed that we seek not praise of men in reward of our works.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"Take heed," says He, "that ye do not your righteousness before men, to be seen of them; otherwise ye have no reward of your Father which is in heaven." Here He has mentioned righteousness generally, then He follows it up in detail. For a deed which is done in the way of alms is a certain part of righteousness, and therefore He connects the two by saying, "Therefore, when thou doest thine alms, do not sound a trumpet before thee, as the hypocrites do in the synagogues and in the streets, that they may have glory of men." In this there is a reference to what He says before, "Take heed that ye do not your righteousness before men, to be seen of them." But what follows, "Verily I say unto you, They have received their reward," refers to that other statement which He has made above, "Otherwise ye have no reward of your Father which is in heaven." Then follows, "But when thou doest alms." When He says, "But thou," what else does He mean but, Not in the same manner as they? What, then, does He bid me do? "But when thou doest alms," says He, "let not thy left hand know what thy right hand doeth." Hence those other parties so act, that their left hand knoweth what their right hand doeth. What, therefore, is blamed in them, this thou art forbidden to do. But this is what is blamed in them, that they act in such a way as to seek the praises of men. And therefore the left hand seems to have no more suitable meaning than just this delight in praise. But the right hand means the intention of fulfilling the divine commands. When, therefore, with the consciousness of him who does alms is mixed up the desire of man's praise, the left hand becomes conscious of the work of the right hand: "Let not, therefore, thy left hand know what thy right hand doeth;" i.e. Let there not be mixed up in thy consciousness the desire of man's praise, when in doing alms thou art striving to fulfil a divine command.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOUR%2520LORD%2527S%2520SERMON%2520ON%2520THE%2520MOUNT%2FBook%25202.html'
source_title="SERMON ON THE MOUNT 2.2.8"
