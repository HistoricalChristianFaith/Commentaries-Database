[[commentary]]
quote='''
For when the Lord not only shed his blood but also expended his very death for the making of the medicine; he rose again to demonstrate the example of resurrection. By his patience, he suffered to teach our patience; and in his resurrection, he demonstrated the reward of patience. Also, as you know and as we all confess, he ascended into heaven, then from him the Holy Spirit was sent, formerly promised. For he had said to his disciples: Stay in the city, until you are clothed with power from on high. Therefore, his promise came, the Holy Spirit came, filled the disciples, they began to speak in the tongues of all nations: a sign of unity proceeded in them. For then one man spoke in all tongues; because the unity of the Church was going to speak in all tongues. Those who heard were astonished. For they knew that they were simple men, of only one language; and they marveled and were amazed that men of one language, or at most two, spoke in the tongues of all nations: they were stunned with amazement, lost their arrogance, turned from mountains into valleys. Now if they are humble, they are valleys; they hold what is poured in, they do not release it. If water comes upon a high place, it runs down and flows away: if water comes to a concave and low place, it is held and stays. They were now such; they were astonished, they marveled, they had lost their cruelty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520175.html'
source_title="SERMON 175.3"

[[commentary]]
quote='''
Listen further. He ascended into heaven, and was taken from the sight of the disciples; he left those watching and made them witnesses. It was said to them: Why do you stand? This Jesus, who was taken up from you, will come in the same way. In the same way, how is that? In the same form, in the same flesh: They will see the one whom they pierced. He will come in the same manner as you saw Him going into heaven. Certainly, they saw, certainly they touched, they felt: they strengthened their faith both by seeing and by touching. They escorted Him ascending into heaven with their eyes: they listened attentively to the angel's voice proclaiming the coming Christ. Yet, now that all these things have been accomplished in them so that they might become witnesses of Christ, and endure all things bravely for the preaching of the truth, and contend against falsehood even unto blood, it was not that vision alone, nor the touching of the Lord's limbs that afforded them this power. But who granted them this? Hear the Lord Himself: But stay in the city, until you are clothed with power from on high. You have seen and touched; but you cannot yet preach and die for what you have seen and touched until you are clothed with power from on high. Let them go now, and ascribe to men their abilities, if they can. Peter was there, but he was not yet established on the rock; he was not yet clothed with power from on high; for no one can receive it unless it is given to him from heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520265D.html'
source_title="SERMON 265D.6"

[[commentary]]
quote='''
(de Trin. 15. c. 26.) Or the Lord after His resurrection gave the Holy Spirit twice, once on earth, because of the love of our neighbour, and again from heaven, because of the love of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title="Catena Aurea by Aquinas"
