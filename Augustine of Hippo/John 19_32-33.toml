[[commentary]]
quote='''
And, as the Gospel tells us, they who were present were most astonished at this, that after that [last] word, in which He set forth the figure of our sin, He immediately gave up His spirit. For they who are hung on the cross are commonly tortured by a prolonged death. Whence it was that the legs of the thieves were broken, in order that they might die directly, and be taken down from the cross before the Sabbath. And that He was found to be dead already, caused wonder. And it was this also, at which, as we read, Pilate marvelled, when the body of the Lord was asked of him for burial.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4.13.16"
