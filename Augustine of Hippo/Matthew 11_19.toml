[[commentary]]
quote='''
But as Christ, comparing Himself with John, who came neither eating nor drinking, says that He came eating and drinking, I should like to know what He ate and drank. When exposing the perversity which found fault with both, He says: "John came neither eating nor drinking; and ye say, He hath a devil. The Son of man cometh eating and drinking; and ye say, Behold a glutton and a wine-bibber, a friend of publicans and sinners." We know what John ate and drank. For it is not said that he drank nothing, but that he drank no wine or strong drink; so he must have drunk water. He did not live without food, but his food was locusts and wild honey. When Christ says that John did not eat or drink, He means that he did not use the food which the Jews used. And because the Lord used this food, He is spoken of, in contrast with John, as eating and drinking. Will it be said that it was bread and vegetables which the Lord ate, and which John did not eat? It would be strange if one was said not to eat, because he used locusts and honey, while the other is said to eat simply because he used bread and vegetables. But whatever may be thought of the eating, certainly no one could be called a wine-bibber unless he used wine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252016.html'
source_title="Reply to Faustus the Manichaean 16.31"

[[commentary]]
quote='''
(Quæst. Ev. ii. 11.) Or, Wisdom is justified of her children, because the holy Apostles understood that the kingdom of God was not in meat and drink, but in patient enduring; such persons neither does abundance lift up, nor want cast down, but as Paul spoke, I know how to abound, and to suffer want. (Phil. 4:12)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
