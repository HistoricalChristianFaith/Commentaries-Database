[[commentary]]
quote='''
The first stage of liberty, then, is to be free from crimes. And so the Apostle Paul, when he determined on the ordination of either elders or deacons, or whoever was to be ordained to the superintendence of the Church, says not, If any one is without sin; for had he said so, every one would be rejected as unfit, none would be ordained: but he says, "If any one is without crime," such as, murder, adultery, any uncleanness of fornication, theft, fraud, sacrilege, and others of that sort. When a man has begun to be free from these (and every Christian man ought to be so), he begins to raise his head to liberty; but that is liberty begun, not completed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252041.html'
source_title="TRACTATES ON JOHN 41.10.1"
