[[commentary]]
quote='''
But somebody will perhaps think that we lack nothing for the knowledge of righteousness, since the Lord, when He summarily and briefly expounded His word on earth, informed us that the whole law and the prophets depend on two commandments; nor was He silent as to what these were, but declared them in the plainest words: "Thou shalt love," said He, "the Lord thy God, with all thy heart, and with all thy soul, and with all thy mind;" and "Thou shalt love thy neighbour as thyself." What is more surely true than that, if these be fulfilled, all righteousness is fulfilled?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 36"
