[[commentary]]
quote='''
We must look into this passage in order to show that it contains nothing inconsistent with Luke's version, which states that certain charges were brought against Him, and also specifies their terms. For Luke's words are these: "And they began to accuse Him, saying, We found this fellow perverting the nation, and forbidding to give tribute to Caesar, saying that he himself is Christ a king." On the other hand, according to the paragraph which I have now cited from John, the Jews seem to have been unwilling to state any specific accusations, when Pilate asked them, "What accusation bring ye against this man?" For their reply was, "If he were not a malefactor, we would not have delivered him up unto thee;" the purport of which was, that he should accept their authority, cease to inquire what fault was alleged against Him, and believe Him guilty for the simple reason that He had been [reckoned] worthy of being delivered up by them to him. This being the case, then, we ought to suppose that both these versions report words which were actually said, both the one before us at present, and the one given by Luke. For among the multitude of sayings and replies which passed between the parties, these writers have made their own selections as far as their judgment allowed them to go, and each of them has introduced into his narrative just what he considered sufficient. It is also true that John himself mentions certain charges which were alleged against Him, and which we shall find in their proper connections.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520Harmony%2520of%2520the%2520Gospels%2FBook%25203.html'
source_title="The Harmony of the Gospels, Book 3"

[[commentary]]
quote='''
"Pilate then went out unto them, and said, What accusation bring ye against this man? They answered and said unto him, If he were not a malefactor, we would not have delivered him up unto thee." Let the question be put to, and the answer come from, those who had been delivered from foul spirits, from the sickly who had been healed, the lepers who had been cleansed, the deaf who were hearing, the dumb who were speaking, the blind who were seeing, the dead who were raised to life, and, above all, the foolish who were become wise, whether Jesus were a malefactor. But these things were said by those of whom He Himself had already foretold by the prophet, "They rewarded me evil for good."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%2520114.html'
source_title="Tractates on John 114"

[[commentary]]
quote='''
(Tr. cxiv) Ask the freed from unclean spirits, the blind who saw, the dead who came to life again, and, what is greater than all, the fools who were made wise, and let them answer, whether Jesus was a malefactor. But they spoke, of whom He had Himself prophesied in the Psalms, They rewarded Me evil for good. (Ps. 39.)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title="Catena Aurea by Aquinas"
