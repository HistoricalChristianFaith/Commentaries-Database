[[commentary]]
quote='''
Therefore all these things which are made by divine skill, show in themselves a certain unity, and form, and order; for each of them is both some one thing, as are the several natures of bodies and dispositions of souls; and is fashioned in some form, as are the figures or qualities of bodies, and the various learning or skill of souls; and seeks or preserves a certain order, as are the several weights or combinations of bodies and the loves or delights of souls. When therefore we regard the Creator, who is understood by the things that are made, we must needs understand the Trinity of whom there appear traces in the creature, as is fitting.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6:10.12"
