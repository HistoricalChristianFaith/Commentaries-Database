[[commentary]]
quote='''
And think not that, because we are bishops, it is impossible for unjust passionate resentment to gain secretly upon us; let us rather remember that, because we are men, your life in the midst of temptation's snares is beset with the greatest possible dangers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 250"
