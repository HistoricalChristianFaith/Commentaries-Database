[[commentary]]
quote='''
You may read that it was possible for the nations to be exterminated at once out of the land which was given to the children of Israel, and yet that God willed it to be gradually effected. And one may meet with a thousand other incidents, the past or the future possibility of which we might readily admit, and yet be unable to produce any proofs of their having ever really happened. Accordingly, it would not be right for us to deny the possibility of a man's living without sin, on the ground that amongst men none can be found except Him who is in His nature not man only, but also God, in whom we could prove such perfection of character to have existed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 1"
