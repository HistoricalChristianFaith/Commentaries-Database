[[commentary]]
quote='''
"Make Thy Face to shine upon Thy servant." Make it known to men, who do not think that I belong unto Thee, that Thy Face is bent upon me, and that I serve Thee. "Save me in Thy mercy."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252031.html'
source_title="Exposition on Psalm 31"
