[[commentary]]
quote='''
"Thy mercy, O Lord, is in the heavens, and Thy truth reacheth even unto the clouds" (ver. 5). I know not what Mercy of Him he meaneth, which is in the heavens. For the Mercy of the Lord is also in the earth. Thou hast it written, "The earth is full of the Mercy of the Lord." Of what Mercy then speaketh He, when He saith, "Thy Mercy, O Lord, is in the heavens"? The gifts of God are partly temporal and earthly, partly eternal and heavenly. Whoso for this worshippeth God, that he may receive those temporal and earthly goods, which are open to all, is still as it were like the brutes: he enjoyeth indeed the Mercy of God, but not that which is excepted, which shall not be given, save only to the righteous, to the holy, to the good. What are the gifts which abound to all? "He maketh His sun to rise on the evil and on the good, and sendeth rain on the just and on the unjust." Who hath not this Mercy of God, first that he hath being, that he is distinguished from the brutes, that he is a rational animal, so as to understand God; secondly, that he enjoys this light, this air, rain, fruits, diversity of seasons, and all the earthly comforts, health of body, the affection of friends, the safety of his family? All these are good, and they are God's gifts. ...

But this man rightly understood what mercy he should pray for from God. "Thy Mercy, O Lord, is in the Heavens; and Thy Truth reacheth even to the clouds." That is, the Mercy which Thou givest to Thy Saints, is Heavenly, not earthly; is Eternal, not temporal. And how couldest Thou declare it unto men? Because "Thy Truth reacheth even unto the clouds." What are the clouds? The Preachers of the Word of God. ...Truth reached even to the clouds: therefore unto us could be declared the Mercy of God, which is in Heaven and not in earth. And truly, Brethren, the clouds are the Preachers of the Word of Truth. When God threateneth through His Preachers, He thunders through the clouds. When God worketh miracles through His Preachers, He lightneth through the clouds, He terrifieth through the clouds, and watereth by the rain. Those Preachers, then, by whom is preached the Gospel of God, are the clouds of God. Let us then hope for Mercy, but for that which is in the Heavens.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252036.html'
source_title="Exposition on Psalm 36"
