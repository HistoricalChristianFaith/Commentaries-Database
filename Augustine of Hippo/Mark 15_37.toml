[[commentary]]
quote='''
Did the thieves, who were nailed beside Him, expire when they would? They were held by the bonds of flesh, for they were not the creators of the flesh; fixed by nails, they were a long time tormented, because they had not lordship over their weakness. The Lord, however, when He would, took flesh in a virgin's womb: came forth to men when He would; lived among men so long as He would; and when He would He quitted the flesh. This is the part of power, not of necessity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252037.html'
source_title="TRACTATES ON JOHN 37.9"

[[commentary]]
quote='''
While hanging on the tree, He said, "I thirst." They, having heard this, offered to Him on the cross vinegar by a sponge on a reed. He received it, and said, "It is finished;" and, bowing His head, gave up the ghost. You see His power of dying, that He waited for this—until all things should be fulfilled that had been foretold concerning Him—to take place before His death. For the prophet had said, "They gave me gall for my meat; and in my thirst they gave me vinegar to drink." He waited for all these things to be fulfilled: after they were completed, He said, "It is finished;" and He departed by power, because He came not by necessity. Hence some wondered more at this His power to die than at His ability to work miracles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252031.html'
source_title="TRACTATES ON JOHN 31.6"
