[[commentary]]
quote='''
Let me say something about this; I am helped, you see, by their words, which have gone out to the ends of the whole wide world. Notice first of all his holy act of pouring himself out. He said he was being immolated, not that he was dying. It is not because one who is immolated doesn't die but that not everyone who dies is immolated. So being immolated he is dying for God. The word is taken from sacrifice. Everything that is sacrificed is slaughtered for God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520299.html'
source_title="SERMONS 299.3"


[[commentary]]
quote='''
Listen to the Apostle Paul acknowledging grace, and afterwards desiring the payment of a debt. What acknowledgment of grace is there in Paul? "Who was before a blasphemer, and a persecutor, and injurious; but I obtained," saith he, "mercy." He said that he who obtained it was unworthy; that he had, however, obtained it, not through his own merits, but through the mercy of God. Listen to him now demanding the payment of a debt, who had first received unmerited grace: "For," saith he, "I am now ready to be offered up, and the time of my departure is at hand. I have fought a good fight, I have finished my course, I have kept the faith: henceforth there is laid up for me a crown of righteousness." Now he demands a debt, he exacts what is due. For consider the following words: "Which the Lord, the righteous Judge, shall render unto me in that day."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%25203.html'
source_title="TRACTATES ON JOHN 3.10"
