[[commentary]]
quote='''
Consider, however, I pray you, whether all that the Apostle Peter says concerning spirits shut up in prison, who were unbelieving in the days of Noah, may not after all have been written without any reference to hell, but rather to those times the typical character of which he has transferred to the present time. For that transaction had been typical of future events, so that those who do not believe the gospel in our age, when the Church is being built up in all nations, may be understood to be like those who did not believe in that age while the ark was a preparing; also, that those who have believed and are saved by baptism may be compared to those who at that time, being in the ark, were saved by water; wherefore he says, "So baptism by a like figure saves you." Let us therefore interpret the rest of the statements concerning them that believed not so as to harmonise with the analogy of the figure, and refuse to entertain the thought that the gospel was once preached, or is even to this hour being preached in hell in order to make men believe and be delivered from its pains, as if a Church had been established there as well as on earth.…

And let it not be regarded as an objection to the interpretation now given, that the Apostle Peter says that Christ Himself preached to men shut up in prison who were unbelieving in the days of Noah, as if we must consider this interpretation inconsistent with the fact that at that time Christ had not come. For although he had not yet come in the flesh, as He came when afterwards He "showed Himself upon earth, and conversed with men," nevertheless he certainly came often to this earth, from the beginning of the human race, whether to rebuke the wicked, as Cain, and before that, Adam and his wife, when they sinned, or to comfort the good, or to admonish both, so that some should to their salvation believe, others should to their condemnation refuse to believe, — coming then not in the flesh but in the spirit, speaking by suitable manifestations of Himself to such persons and in such manner as seemed good to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 164"
