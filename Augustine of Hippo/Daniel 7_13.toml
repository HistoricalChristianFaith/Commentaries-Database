[[commentary]]
quote='''
I do not know in what manner these men understand that the Ancient of Days appeared to Daniel, from whom the Son of man, which He deigned to be for our sakes, is understood to have received the kingdom; namely, from Him who says to Him in the Psalms, "Thou art my Son; this day have I begotten Thee; ask of me, and I shall give Thee the heathen for Thine inheritance;" and who has "put all things under His feet." If, however, both the Father giving the kingdom, and the Son receiving it, appeared to Daniel in bodily form, how can those men say that the Father never appeared to the prophets, and, therefore, that He only ought to be understood to be invisible whom no man has seen, nor can see? For Daniel has told us thus: "I beheld," he says, "till the thrones were set, and the Ancient of Days did sit, whose garment was white as snow, and the hair of His head like the pure wool: His throne was like the fiery flame, and His wheels as burning fire; a fiery stream issued and came forth from before Him: thousand thousands ministered unto Him, and ten thousand times ten thousand stood before Him: the judgment was set, and the books were opened," etc. And a little after, "I saw," he says, "in the night visions, and behold, one like the Son of man came with the clouds of heaven, and came to the Ancient of Days, and they brought Him near before Him. And there was given Him dominion, and glory, and a kingdom, that all peoples, nations, and languages should serve Him: His dominion is an everlasting dominion, which shall not pass away, and His kingdom that which shall not be destroyed." Behold the Father giving, and the Son receiving, an eternal kingdom; and both are in the sight of him who prophesies, in a visible form. It is not, therefore, unsuitably believed that God the Father also was wont to appear in that manner to mortals.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25202.html'
source_title="ON THE TRINITY 2:18.33"
