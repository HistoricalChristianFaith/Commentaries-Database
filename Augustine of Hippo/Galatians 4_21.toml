[[commentary]]
quote='''
People might suppose that in the case of Hagar Abraham acted [merely from human desire for procreation]. But the apostle makes the reverse clear, viewing this in relation to prophecy.
'''
source_url=''
source_title="QUESTIONS ON GENESIS 1.70"


[[commentary]]
quote='''
But because in it was prefigured the new testament, the men of God who at that time understood this according to the ordering of the times, were indeed the stewards and bearers of the old testament, but are shown to be the heirs of the new. Shall we deny that he belongs to the new testament who says, "Create in me a clean heart, O God; and renew a right spirit within me"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25203.html'
source_title="AGAINST TWO LETTERS OF PELAGIUS 3.6"
