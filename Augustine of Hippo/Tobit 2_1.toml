[[commentary]]
quote='''
We are often asked: "If we celebrate the day of Pentecost because of the coming of the Holy Spirit, why do the Jews celebrate Pentecost?" For they too have Pentecost. You heard this morning, those of you who were attentive, when the reading from Tobit was read in memory of the blessed Theogenes, that on the day of Pentecost he prepared a meal, intending to invite some of his own who were worthy to share the table with him, because of their fear of the Lord. He says, "On the day of Pentecost, which is holy from the weeks." For seven times seven make forty-nine: one is added here for unity, so that we return to the head, because unity confirms all multitude, and multitude, unless bound by unity, is contentious and quarrelsome; but a multitude that consorts makes one soul, just as those who received the Holy Spirit, as Scripture says, had one soul and one heart towards God. Therefore, fifty are made, which is the sacrament of Pentecost. Why then do the Jews celebrate it, unless because it was a figure there? Pay attention: you know - and there is no Christian at all who is ignorant of what I am going to say - that the lamb is killed among the Jews and the Passover is celebrated as a figure of the future passion of the Lord. For this was also commanded to them, to seek a lamb from goats and sheep. Where can a lamb be found from goats and sheep? But what was commanded there as impossible was announcing the future possibility of the Lord: for a lamb was found from goats and sheep, because our Lord Jesus Christ, according to the flesh born from the seed of David, has his origin from sinners and the just. You find in the origin of the Lord, according to the generations that the evangelists recount, both many sinners and the just: therefore, he also called such, that is, sinners, because he came through such. For he gathers his Church from the just and sinners.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520272B%2520augm.html'
source_title="NEWLY DISCOVERED SERMONS 31:2"
