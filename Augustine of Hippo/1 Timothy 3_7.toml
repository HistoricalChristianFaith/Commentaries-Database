[[commentary]]
quote='''
The fruit represents a good character; not the praise given a man by a few just and wise people, but popular report, which bestows greatness and renown on a man, and which is not desirable for its own sake, but is essential to the success of good men in their endeavors to benefit their fellow-men. So the apostle says, that it is proper to have a good report of those that are without; for though they are not infallible, the lustre of their praise and the odor of their good opinion are a great help to the efforts of those who seek to benefit them. And this popular renown is not obtained by those that are highest in the Church, unless they expose themselves to the toils and hazards of an active life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252022.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 22.56"
