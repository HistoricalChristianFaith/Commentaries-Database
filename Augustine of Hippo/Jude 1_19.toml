[[commentary]]
quote='''
Outside this body the Holy Spirit giveth life to no one, seeing that, as the apostle says himself, "The love of God is shed abroad in our hearts by the Holy Ghost which is given unto us;" but he is not a partaker of the divine love who is the enemy of unity. Therefore they have not the Holy Ghost who are outside the Church; for it is written of them, "They separate themselves being sensual, having not the Spirit." But neither does he receive it who is insincerely in the Church, since this is also the intent of what is written: "For the Holy Spirit of discipline will flee deceit." If any one, therefore, wishes to receive the Holy Spirit, let him beware of continuing in alienation from the Church, let him beware of entering it in the spirit of dissimulation; or if he has already entered it in such wise, let him beware of persisting in such dissimulation, in order that he may truly and indeed become united with the tree of life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Concerning%2520the%2520Correction%2520of%2520the%2520Donatists.html'
source_title="A Treatise Concerning the Correction of the Donatists, 50 (Letter 185)"
