[[commentary]]
quote='''
"Show me a sign for good" (ver. 17). What sign, but that of the Resurrection? The Lord says: "This wicked and provoking generation seeketh after a sign; and there shall no sign be given it, but the sign of the Prophet Jonah." Therefore in our Head a sign has been shown already for good; each one of us also may say, "Show me a sign for good:" because at the last trumpet, at the coming of the Lord, both "the dead shall be raised incorruptible, and we shall be changed." This will be a sign for good. "That they who hate me may see it, and be ashamed." In the judgment they shall be ashamed unto their destruction, who will not now be ashamed unto their healing. Now therefore let them be ashamed: let them accuse their own ways, let them keep the good way: because none of us liveth without being ashamed, unless he first be ashamed and live anew. Now God grants them the approach of a healthy shame, if they despise not the medicine of confession: but if they will not now be ashamed, then they shall be ashamed, when "their iniquities shall convince them to their face." How shall they be ashamed? When they shall say, "These are they whom we had sometimes in derision, and a parable of reproach. We fools counted their life madness: how are they numbered among the children of God! What hath pride profited us?" Then shall they say this: let them say it now, and they say it to their health. For let each one turn humbly to God, and now say, What hath my pride profited me? and hear from the Apostle, "For what glory had ye in those things of which ye are now ashamed?" Ye see that there is even now a wholesome shame while there is a place of penitence: but then one which will be late, useless, fruitless.

"For Thou, Lord, hast holpen me, and comforted me." "Hast holpen me," in struggle; "and comforted me," in sorrow. For no one seeketh comfort, but he who is in misery...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252086.html'
source_title="Exposition on Psalm 86"
