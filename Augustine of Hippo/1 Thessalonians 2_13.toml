[[commentary]]
quote='''
For our word is so made in some way into an articulate sound of the body, by assuming that articulate sound by which it may be manifested to men's senses, as the Word of God was made flesh, by assuming that flesh in which itself also might be manifested to men's senses. And as our word becomes an articulate sound, yet is not changed into one; so the Word of God became flesh, but far be it from us to say He was changed into flesh. For both that word of ours became an articulate sound, and that other Word became flesh, by assuming it, not by consuming itself so as to be changed into it. And therefore whoever desires to arrive at any likeness, be it of what sort it may, of the Word of God, however in many respects unlike, must not regard the word of ours that sounds in the ears, either when it is uttered in an articulate sound or when it is silently thought. For the words of all tongues that are uttered in sound are also silently thought, and the mind runs over verses while the bodily mouth is silent. And not only the numbers of syllables, but the tunes also of songs, since they are corporeal, and pertain to that sense of the body which is called hearing, are at hand by certain incorporeal images appropriate to them, to those who think of them, and who silently revolve all these things. But we must pass by this, in order to arrive at that word of man, by the likeness of which, be it of what sort it may, the Word of God may be somehow seen as in an enigma. Not that word which was spoken to this or that prophet, and of which it is said, "Now the word of God grew and multiplied;" and again, "Faith then cometh by hearing, and hearing by the word of Christ;" and again, "When ye received the word of God which ye heard of us, ye received it not as the word of men but, as it is in truth, the word of God" (and there are countless other like sayings in the Scriptures respecting the word of God, which is disseminated in the sounds of many and diverse languages through the hearts and mouths of men; and which is therefore called the word of God, because the doctrine that is delivered is not human, but divine).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252015.html'
source_title="ON THE TRINITY 15.11.20"


[[commentary]]
quote='''
What then? Does that not appear as the beginning of the faith of the Thessalonians, for which, nevertheless, the same apostle gives thanks to God when he says, "For this cause also we thank God without ceasing, because when ye had received from us the word of the hearing of God, ye received it not as the word of men, but as it is in truth the word of God, which effectually worketh in you and which ye believed"? What is that for which he here gives thanks to God? Assuredly it is a vain and idle thing if He to whom he gives thanks did not Himself do the thing. But, since this is not a vain and idle thing, certainly God, to whom he gave thanks concerning this work, Himself did it; that when they had received the word of the hearing of God, they received it not as the word of men, but as it is in truth the word of God. God, therefore, worketh in the hearts of men with that calling according to His purpose, of which we have spoken a great deal, that they should not hear the gospel in vain, but when they heard it, should be converted and believe, receiving it not as the word of men, but as it is in truth the word of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520on%2520the%2520Predestination%2520of%2520the%2520Saints%2FBook%25201.html'
source_title="ON THE PREDESTINATION OF THE SAINTS 19.39"
