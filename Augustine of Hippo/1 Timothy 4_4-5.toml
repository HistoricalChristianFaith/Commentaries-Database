[[commentary]]
quote='''
It is not the uncleanness of meat that I fear, but the uncleanness of an incontinent appetite.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FConfessions%2FBook%252010.html'
source_title="Confessions 10.31.46"


[[commentary]]
quote='''
As there is an unconscious worship of idols and devils in the fanciful legends of the Manichaeans, so they knowingly serve the creature in their worship of the sun and moon. And in what they call their service of the Creator they really serve their own fancy, and not the Creator at all. For they deny that God created those things which the apostle plainly declares to be the creatures of God, when he says of food, "Every creature of God is good, and nothing to be refused, if it is received with thanksgiving." This is sound doctrine, which you cannot bear, and so turn to fables. The apostle praises the creature of God, but forbids the worship of it; and in the same way Moses gives due praise to the sun and moon, while at the same time he states the fact of their having been made by God, and placed by Him in their courses,—the sun to rule the day, and the moon to rule the night. And if earthly bodies are good, of which the apostle spoke when he said that no food is unclean, because every creature of God is good, much more the heavenly bodies, of which the sun and moon are the chief.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252014.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 14.11"
