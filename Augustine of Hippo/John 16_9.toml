[[commentary]]
quote='''
For which reason, in what the Lord said of the Holy Spirit, "He shall convict the world of sin," He meant unbelief to be understood; for He said this when He was explaining, "Of sin because they believed not on me," and when He says, "If I had not come and spoken to them, they should not have sin." For He meant not that before they had no sin, but He wished to indicate that very want of faith by which they did not believe Him even when He was present to them and speaking to them; since they belonged to him of whom the apostle says, "According to the prince of the power of the air, who now worketh in the children of unbelief." Therefore they in whom there is not faith are the children of the devil, because they have not in the inner man any reason why there should be forgiven them whatever is committed either by human infirmity, or by ignorance, or by any evil will whatever. But those are the children of God who certainly, if they should "say that they have no sin, deceive themselves, and the truth is not in them, but immediately" (as it continues) "when they confess their sins" (which the children of the devil do not do, or do not do according to the faith which is peculiar to the children of God), "He is faithful and just to forgive them their sins, and to cleanse them from all unrighteousness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25203.html'
source_title="AGAINST TWO LETTERS OF THE PELAGIANS 3.4"


[[commentary]]
quote='''
Now there is a great difference between believing in Christ and in believing that Jesus is the Christ. For even the devils believe that he was the Christ. But the one who believes in Christ both loves Christ and puts his hope in him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520144.html'
source_title="SERMON 144.2"

[[commentary]]
quote='''
He next explains what He has said "of sin, and of righteousness, and of judgment." "Of sin indeed," He says, "because they have believed not on me." For this sin, as if it were the only one, He has put before the others; because with the continuance of this one, all others are retained, and in the removal of this, the others are remitted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252095.html'
source_title="Tractates on John 95"

[[commentary]]
quote='''
(Tr. xcv. 1) He then explains what He has said: Of sin, because they believed not in Me. He mentions this as the sin above all others, because while it remains, the others are retained, when it departs, the others are remitted.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
(de Verb. Dom. s. lxi) But it makes a great difference whether one believes in Christ, or only that He is Christ. For that He was Christ, even the devils believed: but e believes in Christ, who both hopes in Christ and loves Christ.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
(de Qu. N. et V. Test. qu. 89) In this way too the Holy Ghost reproved the world of sin, i. e. by the mighty works He did in the name of the Saviour, Who was condemned by the world.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"
