[[commentary]]
quote='''
(de Qu. Evan. l. ii. q. 13.) Or, by the herdsmen of the swine flying and telling these things, He represents certain rulers of the wicked, who though they evade the law of Christianity, yet proclaim it among the nations by their astonishment and wonder.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"
