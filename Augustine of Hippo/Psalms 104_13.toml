[[commentary]]
quote='''
"Watering the mountains from the higher places" [Psalm 104:13]. Now if a Gentile uncircumcised man comes to us, about to believe in Christ, we give him baptism, and do not call him back to those works of the Law. And if a Jew asks us why we do that, we sound from the rock, we say, This Peter did, this Paul did: from the midst of the rocks we give our voice. But that rock, Peter himself, that great mountain, when he prayed and saw that vision, was watered from above.

..."From the fruit of Thy works shall the earth be satisfied." What is, "From the fruit of Thy works"? Let no man glory in his own works: but "he that glorieth, let him glory in the Lord." With Thy grace he is satisfied, when he is satisfied: let him not say that grace was given for his own merits. If it is called grace, "it is gratuitously given;" if it is returned for works, wages are paid. Freely therefore receive, because ungodly thou art justified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520104.html'
source_title="Exposition on Psalm 104"
