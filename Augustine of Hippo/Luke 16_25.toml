[[commentary]]
quote='''
"Remember, son, that you received good things in your life, and Lazarus likewise bad things." He assigns pain in return for riches, refreshment in return for poverty, flames in return for purple and joy in return for nakedness. The equal balance of the scales will be maintained. The standard of measurement will not be proved false that says, "The measure you give will be the measure you get." The reason he refuses to show mercy to the rich man in his pain is that while he lived the rich man neglected to show mercy. The reason why he ignored the rich man's pleas in his torment is that he ignored the poor man's pleas on earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520367.html'
source_title="SERMON 367.2"

[[commentary]]
quote='''
(Quæst. Ev. Lib. ii. qu. 38.) All this then is said to Him because he chose the happiness of the world, and loved no other life but that in which he proudly boasted; but he says, Lazarus received evil things, because he knew that the perishableness of this life, its labours, sorrows, and sickness, are the penalty of sin, for we all die in Adam who by transgression was made liable to death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"
