[[commentary]]
quote='''
He who had come as the Redeemer, not the condemner (for He had come to redeem what was lost) turned away from them, as if not wishing to look at them. This turning away from them is no trivial thing. Something is implied in this turning away. As if He would say: "You bring a sinner to Me, you sinners. If you think I should condemn sins, I begin with you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252016A.html'
source_title="Sermon 16A"

[[commentary]]
quote='''
He wrote with His finger upon the ground, as if He would indicate that people of the character of these men would be written on earth, and not in heaven, as He also admonished His disciples to rejoice that their names were written in heaven! Or, it may be that He meant to convey the idea that it was by humbling Himself (which He expressed by bending down His head) that He wrought signs upon the earth; or, that the time was now come when His law should be written, not, as formerly, on the sterile stone, but on a soil which would yield fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520Harmony%2520of%2520the%2520Gospels%2FBook%25204.html'
source_title="The Harmony of the Gospels, Book 4"

[[commentary]]
quote='''
What did this indulgence signify? Grace. What did that hardness signify? The law given on stones. Therefore, the Lord was writing with His finger, but now on the ground, from which fruit could be received. However, whatever is sown on stone does not sprout, because it cannot send down roots. The finger of God, and the finger of God: the law was written by the finger of God, the finger of God, the Holy Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520272B.html'
source_title="Sermon 272B"

[[commentary]]
quote='''
(de Con. Evang. lib. ii. c. 10) As if to signify that such persons were to be written in earth, not in heaven, where He told His disciples they should rejoice they were written. Or His bowing His head (to write on the ground), is an expression of humility; the writing on the ground signifying that His law was written on the earth which bore fruit, not on the barren stone, as before.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"
