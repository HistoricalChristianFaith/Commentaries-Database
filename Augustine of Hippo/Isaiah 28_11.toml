[[commentary]]
quote='''
Just as sometimes all the utterances of the Old Testament together in the Holy Scriptures are signified by the name of the Law. For the apostle, in citing a text from the prophet Isaiah, where he says, "With divers tongues and with divers lips will I speak to this people," yet prefaced it by, "It is written in the Law." And the Lord Himself says, "It is written in their Law, They hated me without a cause," whereas this is read in the Psalm.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252015.html'
source_title="ON THE TRINITY 15:17.30"
