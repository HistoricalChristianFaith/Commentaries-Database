[[commentary]]
quote='''
In like manner, the apostle said in words already quoted, "She that is a widow indeed, and desolate, trusteth in God and continueth in supplications and prayers night and day;" and the Lord, when exhorting men to pray always and not to faint, made mention of a widow, who, by persevering importunity, persuaded a judge to attend to her cause, though he was an unjust and wicked man, and one who neither feared God nor regarded man. How incumbent it is on widows to go beyond others in devoting time to prayer may be plainly enough seen from the fact that from among them are taken the examples set forth as an exhortation to all to earnestness in prayer. Now what makes this work specially suitable to widows but their bereaved and desolate condition? Whosoever, then, understands that he is in this world bereaved and desolate as long as he is a pilgrim absent from his Lord, is careful to commit his widowhood, so to speak, to his God as his shield in continual and most fervent prayer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 130.16.29-30"
