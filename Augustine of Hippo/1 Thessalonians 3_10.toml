[[commentary]]
quote='''
But to those who are still babes in mind, and who as carnal, the apostle says, require to be nourished with milk, all discoursing on such a subject, wherein we deal not only with the believing, but also with the understanding and the knowing of what is spoken, must be burdensome, as being still unable to perceive such things, and be more fitted to oppress than to feed them. Whence it comes to pass that the spiritual, while not altogether silent on such subjects to the carnal, because of the Catholic faith which is to be preached to all, yet do not so handle them as, in their wish to simplify them to understandings that are still deficient in capacity, to bring their discourse on the truth into disrepute, rather than the truth that is in their discourse within the perceptions of their hearers. Accordingly in his Epistle to the Colossians he says: "And though I be absent in the flesh, yet am I with you in the spirit, joying and beholding your order, and that which is lacking in your faith in Christ." And in that to the Thessalonians: "Night and day," he says, "praying more abundantly, that we might see your face, and might perfect that which is lacking in your faith."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252098.html'
source_title="Tractates on John 98.5"


[[commentary]]
quote='''
And let not the admonition of the most blessed apostle by any means lose its place in your hearts: "If any man preach any other gospel unto you than that ye have received, let him be accursed." He does not say, More than ye have received; but, "Other than ye have received." For had he said the former, he would be prejudging himself, inasmuch as he desired to come to the Thessalonians to supply what was lacking in their faith. But one who supplies, adds to what was deficient, without taking away what existed: while he that transgresses the rule of faith, is not progressing in the way, but turning aside from it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252098.html'
source_title="TRACTATES ON JOHN 98.7"
