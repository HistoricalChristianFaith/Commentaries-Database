[[commentary]]
quote='''
Did not the Virgin Mary do the will of the Father, who believed in faith, conceived in faith, was chosen from whom salvation would be born among men, was created by Christ before Christ was created in her? Holy Mary indeed did the will of the Father: and for this reason, it is greater for Mary to have been a disciple of Christ than to have been the mother of Christ: it is greater, it is more blessed to have been a disciple of Christ than to have been the mother of Christ. Therefore Mary was blessed because, even before giving birth, she carried the Master in her womb. See if it is not what I say. While the Lord was passing by with the following crowds and performing divine miracles, a certain woman said: "Blessed is the womb that carried you!" And the Lord, so that happiness would not be sought in the flesh, what did He reply? "Rather, blessed are they who hear the word of God and keep it." Hence, therefore, also Mary is blessed because she heard the word of God and kept it: she preserved the truth in her mind more than the flesh in her womb. Christ the truth, Christ the flesh: Christ the truth in Mary's mind, Christ the flesh in Mary's womb; greater is what is in the mind than what is carried in the womb. Holy Mary, blessed Mary, but the Church is better than the Virgin Mary. Why? Because Mary is a portion of the Church, a holy member, an excellent member, an outstanding member, but still a member of the whole body. If of the whole body, surely the body is greater than the member. The Lord is the head, and the whole Christ is head and body. What shall I say? We have a divine head, we have God as the head.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252072A.html'
source_title="Sermon 72/A"
