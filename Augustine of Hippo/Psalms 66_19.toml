[[commentary]]
quote='''
...Consider now, brethren, how easily, how daily men blushing for fear of men do censure iniquities; He hath done ill, He hath done basely, a villain the fellow is: this perchance for man's sake he saith. See whether thou beholdest no iniquity in thy heart, whether perchance that which thou censurest in another, thou art meditating to do, and therefore against him dost exclaim, not because he hath done it, but because he hath been found out. Return to thyself, within be to thyself a judge. Behold in thy hid chamber, in the very inmost recess of the heart, where thou and He that seeth are alone, there let iniquity be displeasing to thee, in order that thou mayest be pleasing to God. Do not regard it, that is, do not love it, but rather despise it, that is, contemn it, and turn away from it. Whatever pleasing thing it hath promised to allure thee to sin; whatever grievous thing it hath threatened, to drive thee on to evil doing; all is nought, all passeth away: it is worthy to be despised, in order that it may be trampled upon; not to be eyed lest it be accepted. ...

"Therefore God hath hearkened to me" (ver. 19). Because I have not beheld iniquity in my heart. "And He hath listened to the voice of my prayer."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252066.html'
source_title="Exposition on Psalm 66"
