[[commentary]]
quote='''
How, then, I beseech you, are we to understand the words: "Whosoever shall keep the whole law, and yet offend in one point, he is guilty of all"? Does this affirm that the person who shall have committed theft, nay, who even shall have said to the rich man, "Sit thou here" and to the poor man, "Stand thou there," is guilty of homicide, and adultery, and sacrilege? And if he is not so, how can it be said that a person who has offended in one point has become guilty of all? Or are the things which the apostle said concerning the rich man and the poor man not to be reckoned among those things in one of which if any man offend he becomes guilty of all?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 167.3"
