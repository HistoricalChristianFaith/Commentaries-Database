[[commentary]]
quote='''
Nor think that it was foretold that the nations should come unto some one place of God, in that it was said, "Unto Thee shall the nations come from the extremity of the earth." Understand, if you can, that unto the God of the Christians, Who is the Supreme and True God, the peoples of the nations come, not by walking but by believing. For the same thing was by another prophet thus foretold, "The Lord," saith he, "shall prevail against them, and shall utterly destroy all the gods of the nations of the earth: and all the isles of the nations shall worship Him, each man from his place." Whereas the one says, "Unto Thee all nations shall come;" this the other says, "They shall worship Him, each man from his place." Therefore they shall come unto Him, not departing from their own place, because believing in Him they shall find Him in their hearts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FConcerning%2520Faith%2520of%2520Things%2520Not%2520Seen.html'
source_title="ON FAITH IN THINGS UNSEEN 4"


[[commentary]]
quote='''
And they, though they had for so long a time been silent in their temples about these things that were to come, things that were predicted, as they could not have been unaware, through the prophets, after their fulfilment began to draw nigh, they wished to foretell them (so to speak), so as not to seem ignorant and defeated. Therefore, since Zephaniah the prophet had made the following prediction (to omit the other prophecies for now) and written it down so long ago—The Lord will prevail against them and exterminate all the gods of the nations of the earth, and they will adore him, each and every one from his own place, all the islands of the nations—three possibilities remain. First, they did not believe that these things were going to happen to themselves, who were worshipped in the temples of the nations, and so they did not want to repeat these things through their seers and fanatics.
'''
source_url='https://www.roger-pearse.com/weblog/2020/06/10/augustine-de-divinatione-daemonorum-on-the-divination-of-demons-now-online-in-english/'
source_title="ON THE DIVINATION OF DEMONS 7"
