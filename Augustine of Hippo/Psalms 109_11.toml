[[commentary]]
quote='''
"Let there be no man to help him" [Psalm 109:11]: that is, to guard his posterity; wherefore followeth, "nor to have compassion on his fatherless children."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520109.html'
source_title="Exposition on Psalm 109"
