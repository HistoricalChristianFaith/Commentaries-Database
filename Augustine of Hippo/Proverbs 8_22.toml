[[commentary]]
quote='''
According to the form of God, it is said "Before all the hills He begat me," that is, before all the loftinesses of things created and, "Before the dawn I begat Thee," that is, before all times and temporal things: but according to the form of a servant, it is said, "The Lord created me in the beginning of His ways." Because, according to the form of God, He said, "I am the truth;" and according to the form of a servant, "I am the way." For, because He Himself, being the first-begotten of the dead, made a passage to the kingdom of God to life eternal for His Church, to which He is so the Head as to make the body also immortal, therefore He was "created in the beginning of the ways" of God in His work. For, according to the form of God, He is the beginning, that also speaketh unto us, in which "beginning" God created the heaven and the earth; but according to the form of a servant, "He is a bridegroom coming out of His chamber."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25201.html'
source_title="ON THE TRINITY 1:12.24"


[[commentary]]
quote='''
The beginning of his ways is the head of the church, which is Christ incarnate, through whom there was to be given us an example of living, that is, a certain way by which we might reach God.… So the Word by which all things were made was created man in the beginning of his ways.
'''
source_url='https://www.newadvent.org/fathers/1304.htm'
source_title="On Faith and the Creed 4:6"
