[[commentary]]
quote='''
"He is not far from every one of us," as the apostle says, who adds, "For in Him we live, and are moved, and have our being." And if this were said in respect to the body, it might be understood even of this corporeal world; for in it too in respect to the body, we live, and are moved, and have our being. And therefore it ought to be taken in a more excellent way, and one that is spiritual, not visible, in respect to the mind, which is made after His image. For what is there that is not in Him, of whom it is divinely written, "For of Him, and through Him, and in Him, are all things"? If, then, all things are in Him, in whom can any possibly live that do live, or be moved that are moved, except in Him in whom they are? Yet all are not with Him in that way in which it is said to Him, "I am continually with Thee." Nor is He with all in that way in which we say, The Lord be with you. And so it is the especial wretchedness of man not to be with Him, without whom he cannot be. For, beyond a doubt, he is not without Him in whom he is; and yet if he does not remember, and understand, and love Him, he is not with Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252014.html'
source_title="ON THE TRINITY 14.16"
