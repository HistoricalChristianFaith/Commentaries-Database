[[commentary]]
quote='''
Attend a little, beloved, and fear their devices; nay, beware of them, and listen to the words of gainsayers only to reject them, not to swallow them and take them into your bowels. Do therein what the Lord did when they offered Him the bitter draught, "He tasted, and spat it out;" so also you hear and cast away.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%25206.html'
source_title="Tractates on John 6"

[[commentary]]
quote='''
(de Con. Evan. iii. 11) This we must understand to be what Matthew expresses by, mixed with gall; for he put gall for any thing bitter, and wine mingled with myrrh is most bitter; although there may have been both gall and myrrh to make the wine most bitter.

(ubi sup.) That which follows, But he received it not, must' mean, He received it not to drink, but only tasted it, as Matthew witnesses. And what the same Matthew relates, he would not drink, Mark expresses by, he received it not, but was silent as to His tasting it.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
