[[commentary]]
quote='''
[B]oth prophet and apostle have said gifts for this reason, because many gifts, which are proper to each, are divided in common to all the members of Christ, by the Gift, which is the Holy Spirit. For each severally has not all, but some have these and some have those; although all have the Gift itself by which that which is proper to each is divided to Him, i.e. the Holy Spirit. For elsewhere also, when he had mentioned many gifts, "All these," he says, "worketh that one and the self-same Spirit, dividing to each severally as He will."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252015.html'
source_title="ON THE TRINITY 15"
