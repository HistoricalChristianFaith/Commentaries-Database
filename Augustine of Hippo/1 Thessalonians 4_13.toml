[[commentary]]
quote='''
In the Gospel it is written, "And the bridegroom tarrying, they all slept"? If we understand that sleep as caused by the delay of the last judgment, to which Christ is to come to judge, and the fact that because iniquity has abounded, the charity of many grows cold, how shall we put the wise virgins there, when they are rather of those of whom it is said, "But he that shall persevere to the end, he shall be saved"? It says, "they all slept," because it is not only the foolish who do their good works for the sake of human praise, but also the wise who do them that God may be glorified, who experience that death. Both kinds die. And that death is often spoken of in the Scripture as sleep, as the resurrection is called an awakening. Hence the apostle says, "But I will not have you ignorant, brothers, concerning them that are asleep," and in another place, "of whom many remain until this present, and some are fallen asleep."
'''
source_url=''
source_title="Letters 140.32.76"

[[commentary]]
quote='''
For you ought not to consider yourself desolate while you have Christ dwelling in your heart by faith; nor ought you to sorrow as those heathens who have no hope, seeing that in regard to those friends, who are not lost, but only called earlier than ourselves to the country whither we shall follow them, we have hope, resting on a most sure promise, that from this life we shall pass into that other life, in which they shall be to us more beloved as they shall be better known, and in which our pleasure in loving them shall not be alloyed by any fear of separation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 92.1"


[[commentary]]
quote='''
Therefore, the Apostle also says: "Concerning those who are asleep, I do not want you to be ignorant, brothers, so that you do not grieve as others who have no hope." He did not merely say: "so that you do not grieve;" but, "so that you do not grieve as others who have no hope." For it is necessary that you grieve: but where you grieve, let hope console you. For how can you not grieve, when the body that lives by the soul becomes lifeless, with the soul departing? He who walked now lies down, he who spoke is silent, shut eyes do not perceive light, ears are not open to any sound: all the functions of the members have ceased; there is no one to move steps for walking, hands for working, or senses for perceiving. … This is the cause of grief. If this is the cause of grief, let this grief have consolation. What consolation? Because the Lord himself, with a command and with the voice of the archangel, and with the last trumpet, will descend from heaven, and the dead in Christ will rise first: then we who are alive, who remain, will be caught up together with them in the clouds to meet Christ in the air. … And thus we shall always be with the Lord. Let sorrow perish where there is such great consolation; let mourning be wiped away from the soul, let faith expel grief.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520173.html'
source_title="Sermons 173.3"
