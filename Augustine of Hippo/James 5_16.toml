[[commentary]]
quote='''
Everyone claims this consideration from others whenever possible, for what each of us would punish if it occurred in our house, we want to leave unpunished in someone else's house. For if we are called to a friend's house and find him about to punish someone over whom he has power, it is considered most inhumane for us not to intervene.
'''
source_url=''
source_title="LETTERS 153"


[[commentary]]
quote='''
Let us listen to the Apostle James, who states this precept with the greatest clearness when he says, "Confess your faults one to another, and pray one for another." For of this also the Lord gave us the example. For if He who neither has, nor had, nor will have any sin, prays for our sins, how much more ought we to pray for one another's in turn! And if He forgives us, whom we have nothing to forgive; how much more ought we, who are unable to live here without sin, to forgive one another!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252058.html'
source_title="TRACTATES 58.2"
