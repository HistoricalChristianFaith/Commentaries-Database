[[commentary]]
quote='''
This disease of concupiscence is what the apostle refers to, when, speaking to married believers, he says: "This is the will of God, even your sanctification, that ye should abstain from fornication: that every one of you should know how to possess his vessel in sanctification and honour; not in the disease of desire, even as the Gentiles which know not God." The married believer, therefore, must not only not use another man's vessel, which is what they do who lust after others' wives; but he must know that even his own vessel is not to be possessed in the disease of carnal concupiscence. And this counsel is not to be understood as if the apostle prohibited conjugal—that is to say, lawful and honourable—cohabitation; but so as that that cohabitation (which would have no adjunct of unwholesome lust, were it not that man's perfect freedom of choice had become by preceding sin so disabled that it has this fatal adjunct) should not be a matter of will, but of necessity, without which, nevertheless, it would be impossible to attain to the fruition of the will itself in the procreation of children.... Whosoever possesses his vessel (that is, his wife) with this intention of heart, certainly does not possess her in the "disease of desire," as the Gentiles which know not God, but in sanctification and honour, as believers who hope in God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Marriage%2520and%2520Concupiscence%2FBook%25201.html'
source_title="ON MARRIAGE AND CONCUPISCENCE 1.8.9"
