[[commentary]]
quote='''
"Gird Thy sword upon Thy thigh, O most Mighty" (ver. 3). What is meant by "Thy sword, but "Thy word"? It was by that sword He scattered His enemies; by that sword he divided the son from the father, "the daughter from the mother, the daughter-in-law from the mother-in-law." We read these words in the Gospel, "I came not to send peace, but a sword." And, "In one house shall five be divided against each other; three against two, and two against three;" i.e. "the father against the son, the daughter against the mother, the daughter-in-law against the mother-in-law." By what "sword," but that which Christ brought, was this division wrought? And indeed, my brethren, we see this exemplified daily. Some young man is minded to give himself up to God's service; his father is opposed to it; they are "divided against each other:" the one promises an earthly inheritance, the other loves an heavenly; the one promises one thing, the other prefers another. The father should not think himself wronged: God alone is preferred to him. And yet he is at strife with the son, who would fain give himself to God's service. But the spiritual sword is mightier to separate them, than the ties of carnal nature to bind them together. This happens also in the case of a mother against her daughter; still more also in that of a daughter-in-law against a mother-in-law. For sometimes in one house mother-in-law and daughter-in law are found orthodox and heretical respectively. And where that sword is forcibly felt, we do not dread the repetition of Baptism. Could daughter be divided against mother; and could not daughter-in-law be divided against mother-in-law? ...

What does he mean to express by the "thigh"? The flesh. Whence those words, "A prince shall not depart from Judah; and a lawgiver from his thighs"? Did not Abraham himself (to whom was promised the seed in which "all the nations of the earth were to be blessed"), when he sent his servant to seek and to bring home a wife for his son, being by faith fully persuaded, that in that, so to speak, contemptible seed was contained the great Name; that is, that the Son of God was to come of the seed of Abraham, out of all the children of men; did not he, I say, cause his servant to swear unto him in this manner, saying, "Put thy hand under my thigh," and so swear; as if he had said, "Put thy hand on the altar, or on the Gospel, or on the Prophet, or on any holy thing." "Put" (he says) "thy hand under my thigh;" having full confidence, not ashamed of it as unseemly, but understanding therein a truth. ...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252045.html'
source_title="Exposition on Psalm 45"
