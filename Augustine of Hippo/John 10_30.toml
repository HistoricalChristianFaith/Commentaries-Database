[[commentary]]
quote='''
Now He is raised up and becomes as another shepherd. But not another. Not another according to the form of God, because in the form of God He and the Father are one God. But in the form of a servant He is raised up as another to shepherd, because the Father is greater. Hear one shepherding, and Christ shepherding: "I and the Father are one." Hear Christ shepherding being raised up: "The Father is greater than I." Therefore, one shepherds; because when He was in the form of God, He did not consider it robbery to be equal with God. But He is raised up to shepherd because He emptied Himself, taking the form of a servant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252047.html'
source_title="SERMON 47.20"


[[commentary]]
quote='''
By such a great and ineffable sacrament, Christ our God is considered both man and God; man through the mother, God through the Father. Thus it comes to be true, that which He said: "The Father is greater than I"; and: "I and the Father are one." For He is equal to the Father in divinity, subordinated to the Father in incarnation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520371.html'
source_title="SERMON 371.2"


[[commentary]]
quote='''
...that the Father is not anything in respect to His own substance; and that not only that He is the Father, but that He is, is said relatively to the Son. How then can the Son be of the same essence as the Father, seeing that the Father, in respect to Himself, is neither His own essence, nor is at all in respect to Himself, but even His essence is in relation to the Son? But, on the contrary, much more is He of one and the same essence, since the Father and Son are one and the same essence; seeing that the Father has His being itself not in respect to Himself, but to the Son, which essence He begat, and by which essence He is whatever He is. Therefore neither [person] is in respect to Himself alone; and both exist relatively the one to the other.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25207.html'
source_title="ON THE TRINITY 7.1.2"


[[commentary]]
quote='''
(Tract. xxxvi. non occ.) Mark both those words, one and are, and thou wilt be delivered from Scylla and Charybdis. In that He says, one the Arian, in we are the Sabellian, is answered. There are both Father and Son. And if one, then there is no difference of persons between them.

(vii. de Trin. c. 2) We are one. What He is, that am I, in respect of essence, not of relation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
How are the Father and the Son inseparable, since Himself said, "I and the Father are one?" Because the Father and the Son are not two Gods, but one God, the Word and He whose the Word is, One and the Only One, Father and Son bound together by charity, One God, and the Spirit of Charity also one, so that Father, Son, and Holy Spirit is made the Trinity. Therefore, not only of the Father and Son, but also of the Holy Spirit; as there is equality and inseparability of persons, so also the works are inseparable. I will tell you yet more plainly what is meant by "the works are inseparable." The catholic faith does not say that God the Father made something, and the Son made some other thing; but what the Father made, that also the Son made, that also the Holy Spirit made. For all things were made by the Word; when "He spoke and they were done," it is by the Word they were done, by Christ they were done.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252020.html'
source_title="Tractates on John 20"

[[commentary]]
quote='''
But that there may be no more room for hesitation, hear what follows: "I and my Father are one." Up to this point the Jews were able to bear Him; they heard, "I and my Father are one," and they bore it no longer; and hardened in their own way, they had recourse to stones. "They took up stones to stone Him." ...And they answered, "For a good work we stone thee not, but for blasphemy, and because that thou, being a man, makest thyself God." Such was their reply to His words, "I and my Father are one." You see here that the Jews understood what the Arians understand not. For they were angry on this account, that they felt it could not be said, "I and my Father are one," save where there was equality of the Father and the Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252048.html'
source_title="Tractates on John 48"
