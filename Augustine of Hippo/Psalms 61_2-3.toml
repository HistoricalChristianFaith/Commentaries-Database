[[commentary]]
quote='''
For that Church is founded on a rock, as the Lord says, "Upon this rock I will build my Church." But they build on the sand, as the same Lord says, "Every one that heareth these sayings of mine, and doeth them not, shall be likened unto a foolish man, which built his house upon the sand." But that you may not suppose that the Church which is upon a rock is in one part only of the earth, and does not extend even to its furthest boundaries, hear her voice groaning from the psalm, amid the evils of her pilgrimage. For she says, "From the end of the earth have I cried unto Thee; when my heart was distressed Thou didst lift me up upon the rock; Thou hast led me, Thou, my hope, hast become a tower of courage from the face of the enemy." See how she cries from the end of the earth. She is not therefore in Africa alone, nor only among the Africans, who send a bishop from Africa to Rome to a few Montenses, and into Spain to the house of one lady. See how she is exalted on a rock. All, therefore, are not to be deemed to be in her which build upon the sand, that is, which hear the words of Christ and do them not, even though both among us and among you they have and transmit the sacrament of baptism. See how her hope is in God the Father, the Son, and the Holy Ghost,—not in Peter or in Paul, still less in Donatus or Petilianus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FIn%2520Answer%2520to%2520the%2520Letters%2520of%2520Petilian%2FBook%25202.html'
source_title="LETTERS OF PETILIAN THE DONATIST 2:109-246"
