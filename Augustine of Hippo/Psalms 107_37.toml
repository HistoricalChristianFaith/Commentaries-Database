[[commentary]]
quote='''
"And they sowed fields, and planted vineyards, and gat fruit of corn" [Psalm 107:37]: at which that workman rejoiceth, who saith, "Not because I desire a gift, but I seek fruit." [Philippians 4:17]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520107.html'
source_title="Exposition on Psalm 107"
