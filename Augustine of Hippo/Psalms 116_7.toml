[[commentary]]
quote='''
"Turn again then unto thy rest, O my soul; for the Lord hath done good to thee" (ver. 7): not for thy deservings, or through thy strength; but because the Lord hath done good to thee.
'''
source_url = 'https://www.newadvent.org/fathers/1801116.htm'
source_title="Exposition on Psalm 116"
