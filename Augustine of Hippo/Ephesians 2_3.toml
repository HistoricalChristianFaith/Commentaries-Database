[[commentary]]
quote='''
Of nature itself we speak in one sense, when we properly describe it as that human nature in which man was created faultless after his kind; and in another sense as that nature in which we are born ignorant and carnally minded, owing to the penalty of condemnation, after the manner of the apostle, "We ourselves likewise were by nature children of wrath, even as others."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Nature%2520and%2520Grace%252C%2520Against%2520Pelagius.html'
source_title="ON NATURE AND GRACE 81"


[[commentary]]
quote='''
Accordingly, the Apostle Paul, in a certain passage, having both conditions in view,—even the wrath of God with which we are born, and the grace whereby we are delivered,—says: "Among whom also we all had our conversation in times past in the lusts of our flesh, fulfilling the desires of the flesh and of the mind; and were by nature the children of wrath, even as others. But God, who is rich in mercy, for His great love wherewith He loved us, even when we were dead in sins, hath quickened us together with Christ; by whose grace we are saved." What, then, is man's "natural malice," and "the seed cursed from the beginning;" and what are "the natural brute beasts made to be taken and destroyed," and what the "by nature children of wrath"? Was this the condition of the nature which was formed in Adam? God forbid! Inasmuch as his pure nature, however, was corrupted in him, it has run on in this condition by natural descent through all, and still is running; so that there is no deliverance for it from this ruin, except by the grace of God through our Lord Jesus Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Marriage%2520and%2520Concupiscence%2FBook%25202.html'
source_title="ON MARRIAGE AND CONCUPISCENCE 2.20"
