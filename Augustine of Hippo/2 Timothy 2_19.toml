[[commentary]]
quote='''
Such as these were they who were signified to Timothy, where, when it had been said that Hymenaeus and Philetus had subverted the faith of some, it is presently added, "Nevertheless the foundation of God standeth sure, having this seal, The Lord has known them that are His." The faith of these, which worketh by love, either actually does not fail at all, or, if there are any whose faith fails, it is restored before their life is ended, and the iniquity which had intervened is done away, and perseverance even to the end is allotted to them. But they who are not to persevere, and who shall so fall away from Christian faith and conduct that the end of this life shall find them in that case, beyond all doubt are not to be reckoned in the number of these, even in that season wherein they are living well and piously. For they are not made to differ from that mass of perdition by the foreknowledge and predestination of God, and therefore are not called according to God's purpose, and thus are not elected; but are called among those of whom it was said, "Many are called," not among those of whom it was said, "But few are elected." And yet who can deny that they are elect, since they believe and are baptized, and live according to God? Manifestly, they are called elect by those who are ignorant of what they shall be, but not by Him who knew that they would not have the perseverance which leads the elect forward into the blessed life, and knows that they so stand, as that He has foreknown that they will fall.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTreatise%2520on%2520Rebuke%2520and%2520Grace.html'
source_title="ADMONITION AND GRACE 7.16"

[[commentary]]
quote='''
The abundance of bad people in the world is the big heap of stuff needed for refining the good. Although the good can't be seen, mixed up in the vast multitude of the bad, the Lord knows who are his own. Under the hand of such a great craftsman, the speck of gold cannot get lost in the huge pile of straw. How much straw is there, how little gold! But have no fear: the craftsman is so great that he can refine it and cannot lose it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252015.html'
source_title="SERMONS 15.5"

[[commentary]]
quote='''
Something is always going on in this olive press. The world is the press; there is no end to its pressures. Be oil, not dregs. Let each of you be converted to God and change your manner of life. The oil goes by hidden channels to its own secluded vats. Others sin, mock, blaspheme, make loud accusations in the streets—the dregs are oozing out. Yet the Lord of the press does not cease from operating it through his workmen, the holy angels. He knows his oil; he knows how much it can take, the exact pressure needed to squeeze it out. "The Lord knows," you see, "who are his own." Avoid the dregs. They are murky, out in the open for all to see.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252019.html'
source_title="SERMONS 19.6"


[[commentary]]
quote='''
And we know that the apostle said of the vessels placed in the great house, "If a man therefore purge himself from these, he shall be a vessel unto honor, sanctified, and meet for the Master's use, and prepared unto every good work." But in what manner each man ought to purge himself from these he shows a little above, saying, "Let every one that nameth the name of Christ depart from iniquity," that he may not in the last day, with the chaff, whether with that which has already been driven from the threshing-floor, or with that which is to be separated at the last, hear the command, "Depart from me, ye that work iniquity."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Baptism%2FBook%25204.html'
source_title="On Baptism, Against the Donatists 4.13.21"
