[[commentary]]
quote='''
For who is "drawn," if he was already willing? And yet no man comes unless he is willing. Therefore he is drawn in wondrous ways to will, by Him who knows how to work within the very hearts of men. Not that men who are unwilling should believe, which cannot be, but that they should be made willing from being unwilling. That this is true we do not surmise by human conjecture, but we discern by the most evident authority of the divine Scriptures. It is read in the books of the Chronicles: "Also in Judah, the hand of God was made to give them one heart, to do the commandment of the king and of the princes in the word of the Lord." … Did the men of God who wrote these things-nay, did the Spirit of God Himself, under whose guidance such things were written by them-assail the free will of man? Away with the notion! But He has commended both the most righteous judgment and the most merciful aid of the Omnipotent in all cases. For it is enough for man to know that there is no unrighteousness with God. But how He dispenses those benefits, making some deservedly vessels of wrath, others graciously vessels of mercy,-who has known the mind of the Lord, or who has been His counsellor? If, then, we attain to the honour of grace, let us not be ungrateful by attributing to ourselves what we have received. "For what have we which we have not received?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25201.html'
source_title="AGAINST TWO LETTERS OF THE PELAGANS 37-38"
