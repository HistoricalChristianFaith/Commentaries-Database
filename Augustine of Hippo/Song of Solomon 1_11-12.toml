[[commentary]]
quote='''
The Father will then be revealed by the Son, "when He shall have put down all rule, and all authority, and all power;" that is, in such wise that there shall be no more need of any economy of similitudes, by means of angelic rulers, and authorities, and powers. Of whom that is not unfitly understood, which is said in the Song of Songs to the bride, "We will make thee borders of gold, with studs of silver, while the King sitteth at His table;" that is, as long as Christ is in His secret place: since "your life is hid with Christ in God; when Christ, who is our life, shall appear, then shall ye also appear with Him in glory." Before which time, "we see now through a glass, in an enigma," that is, in similitudes, "but then face to face."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25201.html'
source_title="ON THE TRINITY 1:8.16"
