[[commentary]]
quote='''
Inasmuch as he was quite aware of the fact that the Lord was suspended on the cross by the soldiers, and not by the Jews, as John most plainly affirms, his hidden object [in bringing in the said clause] was to convey the idea that those parties who cried out that He should be crucified were the Lord's real crucifiers, rather than the men who simply discharged their service to their chief in accordance with their duty. We understand, accordingly, that it was the third hour when the Jews cried out that the Lord should be crucified. And thus it is intimated most truly that these persons did really crucify Christ at the time when they cried out. All the more, too, did this merit notice, because they were unwilling to have the appearance of having done the deed themselves, and with that view delivered Him up unto Pilate, as their words indicate clearly enough in the report given by John. For, after stating how Pilate said to them, "What accusation bring ye against this man?" his version proceeds thus: "They answered and said unto him, If he were not a malefactor, we would not have delivered him up unto thee. Then said Pilate unto them, Take ye him, and judge him according to your law. The Jews therefore said unto him, It is not lawful for us to put any man to death." Consequently, what they were especially unwilling to have the appearance of doing, that Mark here shows that they actually did do at the third hour. For he judged most truly that the Lord's murderer was rather the tongue of the Jews than the hand of the soldiers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520Harmony%2520of%2520the%2520Gospels%2FBook%25203.html'
source_title="The Harmony of the Gospels, Book 3"

[[commentary]]
quote='''
(ubi sup.) It now is clear enough that Mark means by King of the Jews what Matthew means by the word Christ; for no kings but those of the Jews were called Christs. For in this place according to Matthew it is said, What then shall I do with Jesus which is called Christ? There follows, And they cried out again, Crucify him. (Matt. 27:22)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
