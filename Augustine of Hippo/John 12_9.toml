[[commentary]]
quote='''
(Tr. l. 14) Much people of the Jews therefore knew that He was there, and they came not for Jesus' sake only, but that they might see Lazarus also, whom He had raised from the dead. Curiosity brought them, not love.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"Much people of the Jews therefore knew that He was there: and they came not for Jesus' sake only, but that they might see Lazarus, whom He had raised from the dead." They were drawn by curiosity, not by charity: they came and saw.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252050.html'
source_title='Tractates on John 50'
