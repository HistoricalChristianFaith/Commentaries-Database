[[commentary]]
quote='''
For the soul loving its own power, slips onwards from the whole which is common, to a part, which belongs especially to itself. And that apostatizing pride, which is called "the beginning of sin," whereas it might have been most excellently governed by the laws of God, if it had followed Him as its ruler in the universal creature, by seeking something more than the whole, and struggling to govern this by a law of its own, is thrust on, since nothing is more than the whole, into caring for a part; and thus by lusting after something more, is made less; whence also covetousness is called "the root of all evil."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252012.html'
source_title="ON THE TRINITY 12.9.14"


[[commentary]]
quote='''
So love God, and love your neighbor as yourself. I mean, I can see that you love yourself, because you love God. Charity is the root of all good works. Just as greed, after all, is the root of all evil, so charity is the root of all good things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520179A.html'
source_title="SERMONS 179A.5"
