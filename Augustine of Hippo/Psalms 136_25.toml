[[commentary]]
quote='''
"Who giveth food to all flesh" [Psalm 136:25], that is, to the whole race of mankind, not Israelites only, but Gentiles too; and of this Food is said, "My Flesh is meat indeed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520136.html'
source_title="Exposition on Psalm 136"
