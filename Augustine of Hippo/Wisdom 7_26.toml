[[commentary]]
quote='''
What wonder, therefore, if He is sent, not because He is unequal with the Father, but because He is "a pure emanation issuing from the glory of the Almighty God?" For there, that which issues, and that from which it issues, is of one and the same substance. For it does not issue as water issues from an aperture of earth or of stone, but as light issues from light. For the words, "For she is the brightness of the everlasting light," what else are they than, she is light of everlasting light? For what is the brightness of light, except light itself? and so co-eternal with the light, from which the light is. But it is preferable to say, "the brightness of light," rather than "the light of light;" lest that which issues should be thought to be darker than that from which it issues. For when one hears of the brightness of light as being light itself, it is more easy to believe that the former shines by means of the latter, than that the latter shines less. But because there was no need of warning men not to think that light to be less, which begat the other (for no heretic ever dared say this, neither is it to be believed that any one will dare to do so), Scripture meets that other thought, whereby that light which issues might seem darker than that from which it issues; and it has removed this surmise by saying, "It is the brightness of that light," namely, of eternal light, and so shows it to be equal. For if it were less, then it would be its darkness, not its brightness; but if it were greater, then it could not issue from it, for it could not surpass that from which it is educed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4:20.27"

[[commentary]]
quote='''
See God, see His Word inhering to the Word speaking, that the speaker speaks not by syllables, but this his speaking is a shining out in the brightness of wisdom. What is said of the Wisdom itself? "It is the radiance of eternal light." Observe the radiance of the sun. The sun is in the heaven, and spreads out its brightness over all lands and over all seas, and it is simply a corporal light. If, indeed, thou canst separate the brightness from the sun, then separate the Word from the Father. I am speaking of the sun. One small, slender flame of a lamp, which can be extinguished by one breath, spreads its light over all that lies near it: thou seest the light generated by the flame spread out; thou seest its emission, but not a separation. Understand, then, beloved brethren, that the Father, and the Son, and the Holy Ghost are inseparably united in themselves; that this Trinity is one God; that all the works of the one God are the works of the Father, of the Son, and of the Holy Ghost.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252020.html'
source_title="TRACTATES ON THE GOSPEL OF JOHN 20:13"
