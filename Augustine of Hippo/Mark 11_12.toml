[[commentary]]
quote='''
Again, if we have understood the sackcloth, how understand we the fasting? Wished Christ to eat, when He sought fruit on the tree, and if He had found, would He have eaten? Wished Christ to drink, when He said to the woman of Samaria, "Give Me to drink"? when He said on the Cross, "I thirst"? For what hungered, for what thirsted Christ, but our good works? Because in them that crucified and persecuted Him He had found no good works, He fasted; for they rewarded barrenness to His soul. For what a fast was His, who found barely one thief, whom on the Cross He might taste! For the Apostles had fled, and had hidden themselves in the multitude. And even Peter, who even to the death of his Lord had promised to persevere, had now thrice denied Him, had now wept, and still lay hid in the multitude, still feared lest He should be known. Lastly, having seen Him dead, all of them despaired of their own safety and despairing He found them, after His resurrection, and when He spake with them, found them grieving and mourning, no longer hoping anything. ...In great fasting had the Lord remained, had He not refreshed them that He might feed on them. For He refreshed them, He comforted them, He confirmed them, and into His Own Body converted them. In this manner then was our Lord also in fasting.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252035.html'
source_title="EXPOSITIONS ON THE PSALMS 35.15"

[[commentary]]
quote='''
Mark also records this occurrence in due succession. He does not, however, follow the same order in his narrative. For first of all, the fact which is related by Matthew, namely, that Jesus went into the temple, and cast out those who sold and bought there, is not mentioned at that point by Mark. On the other hand, Mark tells us that He looked round about upon all things, and, when the eventide was now come, went out into Bethany with the twelve. Next he informs us that on another day, when they were coming from Bethany, He was hungry, and cursed the fig-tree, as Matthew also intimates. Then the said Mark subjoins the statement that He came into Jerusalem, and that, on going into the temple, He cast out those who sold and bought there, as if that incident took place not on the first day specified, but on a different day. But inasmuch as Matthew puts the connection in these terms, "And He left them, and went out of the city into Bethany," and tells us that it was when returning in the morning into the city that He cursed the tree, it is more reasonable to suppose that he, rather than Mark, has preserved the strict order of time so far as regards the incident of the expulsion of the sellers and buyers from the temple. For when he uses the phrase, "And He left them, and went out," who can be understood by those parties whom He is thus said to have left, but those with whom He was previously speaking,—namely, the persons who were so sore displeased because the children cried out, "Hosanna to the Son of David"? It follows, then, that Mark has omitted what took place on the first day, when He went into the temple; and in mentioning that He found nothing on the fig-tree but leaves, he has introduced what He called to mind only there, but what really occurred on the second day, as both evangelists testify. Then, further, his account bears that the astonishment which the disciples expressed at finding how the fig-tree had withered away, and the reply which the Lord made to them on the subject of faith, and the casting of the mountain into the sea, belonged not to this same second day on which He said to the tree, "No man eat fruit of thee hereafter for ever," but to a third day. For in connection with the second day, the said Mark has recorded the incident of the casting of the sellers out of the temple, which he had omitted to notice as belonging to the first day. Accordingly, it is in connection with this second day that he tells us how Jesus went out of the city, when even was come, and how, when they passed by in the morning, the disciples saw the fig-tree dried up from the roots, and how Peter, calling to remembrance, said unto Him, "Master, behold the fig-tree which Thou cursedst is withered away." Then, too, he informs us that He gave the answer relating to the power of faith. On the other hand, Matthew recounts these matters in a manner importing that they all took place on this second day; that is to say, both the word addressed to the tree, "Let no fruit grow on thee from henceforward for ever," and the withering that ensued so speedily in the tree, and the reply which He made on the subject of the power of faith to His disciples when they observed that withering and marvelled at it. From this we are to understand that Mark, on his side, has recorded in connection with the second day what he had omitted to notice as occurring really on the first,—namely, the incident of the expulsion of the sellers and buyers from the temple. On the other hand, Matthew, after mentioning what was done on the second day,—namely, the cursing of the fig-tree as He was returning in the morning from Bethany into the city,—has omitted certain facts which Mark has inserted, namely, His coming into the city, and His going out of it in the evening, and the astonishment which the disciples expressed at finding the tree dried up as they passed by in the morning; and then to what had taken place on the second day, which was the day on which the tree was cursed, he has attached what really took place on the third day,—namely, the amazement of the disciples at seeing the tree's withered condition, and the declaration which they heard from the Lord on the subject of the power of faith. These several facts Matthew has connected together in such a manner that, were we not compelled to turn our attention to the matter by Mark's narrative, we should be unable to recognise either at what point or with regard to what circumstances the former writer has left anything unrecorded in his narrative. The case therefore stands thus: Matthew first presents the facts conveyed in these words, "And He left them, and went out of the city into Bethany; and He lodged there. Now in the morning, as He returned into the city, He hungered; and when He saw a single fig-tree in the way, He came to it, and found nothing thereon but leaves only, and said unto it, Let no fruit grow on thee henceforward for ever; and presently the fig-tree withered away." Then, omitting the other matters which belonged to that same day, he has immediately subjoined this statement, "And when the disciples saw it, they marvelled, saying, How soon is it withered away!" although it was on another day that they saw this sight, and on another day that they thus marvelled. But it is understood that the tree did not wither at the precise time when they saw it, but presently when it was cursed. For what they saw was not the tree in the process of drying up, but the tree already dried completely up; and thus they learned that it had withered away immediately on the Lord's sentence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520Harmony%2520of%2520the%2520Gospels%2FBook%25202.html'
source_title="HARMONY OF THE GOSPELS 2.68.131"
