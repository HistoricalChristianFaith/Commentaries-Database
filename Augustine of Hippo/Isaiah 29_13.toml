[[commentary]]
quote='''
Leah, too, got children by her handmaid, from the desire of having a numerous family. Zilpah, her handmaid, is, interpreted, an open mouth. So Leah's handmaid represents those who are spoken of in Scripture as engaging in the preaching of the gospel with open mouth, but not with open heart. Thus it is written of some: "This people honor me with their lips, but their heart is far from me." To such the apostle says: "Thou that preachest that a man should not steal, dost thou steal? Thou that sayest a man should not commit adultery, dost thou commit adultery?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252022.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 22:55"

[[commentary]]
quote='''
"My friends and my neighbours" then "drew near and stood over against me, and my neighbours stood afar off." You understand what I said. I called those neighbours who "drew nigh," and at the same time "stood afar off." For they "drew nigh" in the body, but "stood afar off" in their heart. Who were in the body so near to Him as those who lifted Him on the Cross? Who in heart so as those who blasphemed Him? Hear this sort of distance described by the Prophet Isaiah; observe this nearness and distance at one and the same time. "This people honours Me with their lips:" behold, with their body they draw near; "but their heart is far from Me." The same persons are at the same time "near" and "afar off" also: with their lips they are near, in heart afar off. However, because the Apostles also stood afar off, through fear, we understand it more simply and properly of them; so that we mean by it, that some drew near, and others stood afar off; since even Peter, who had followed more boldly than the rest, was still so far off, that being questioned and alarmed, he thrice denied the Lord, with whom he had promised to "be ready to die."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252038.html'
source_title="EXPLANATIONS OF THE PSALMS 37:17"


[[commentary]]
quote='''
"Lo! I will not refrain my lips, O Lord, and that Thou knowest." My lips speak; I will not "refrain" them from speaking. My lips indeed sound audibly in the ears of men; but "Thou knowest" mine heart. "I will not refrain my lips, O Lord; that Thou knowest." It is one thing that man heareth; another that God "knoweth." That the "declaring" of it should not be confined to the lips alone, and that it might not be said of us, "Whatsoever things they say unto you, do; but do not after their works;" or lest it should be said to the people, "praising God with their lips, but not with their heart," "This people honoureth Me with their lips, but their heart is far from Me;" do thou make audible confession with thy lips; draw nigh with thine heart also. "For with the heart man believeth unto righteousness; but with the mouth confession is made unto salvation." In case like unto which that thief was found, who, hanging on the Cross with the Lord, did on the Cross acknowledge the Lord. Others had refused to acknowledge Him while working miracles; this man acknowledged Him when hanging on the Cross. That thief had every other member pierced through; his hands were fastened by the nails; his feet were pierced also; his whole body was fastened to the tree; the body was not disengaged in its other members; the heart and the tongue were disengaged; "with the heart" he "believed; with the tongue" he made "confession." "Remember me, O Lord," he said, "when Thou comest into Thy kingdom." He hoped for the coming of his salvation at a time far remote; he was content to receive it after a long delay; his hope rested on an object far remote. The day, however, was not postponed! The answer was, "This day shalt thou be with Me in Paradise."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252040.html'
source_title="EXPLANATIONS OF THE PSALMS 39:15"
