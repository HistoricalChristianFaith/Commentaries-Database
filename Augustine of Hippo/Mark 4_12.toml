[[commentary]]
quote='''
And accordingly the very thing that seemed to be spoken by Himself in secret, was in a certain sense not spoken in secret; for it was not so spoken to remain unuttered by those to whom it was spoken; but rather so in order to be preached in every possible direction. A thing therefore may be uttered at once openly, and not openly; or at the same time in secret, and yet not in secret, as it is said, "That seeing, they may see, and not see." For how "may they see," save only because it is openly, and not in secret; and again, how is it that the same parties "may not see," save that it is not openly, but in secret? Howbeit the very things which they had heard without understanding, were such as could not with justice or truth be turned into a criminal charge against Him: and as often as they tried by their questions to find something whereof to accuse Him, He gave them such replies as utterly discomfited all their plots, and left no ground for the calumnies they devised.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%2520113.html'
source_title="TRACTATES ON JOHN 113"

[[commentary]]
quote='''
(Quaest. 14, in Matt.) Or else they deserved this, their not understanding, and yet this in itself was done in mercy to them, that they might know their sins, and, being converted, merit pardon.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title="Catena Aurea by Aquinas"
