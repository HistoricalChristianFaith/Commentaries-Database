[[commentary]]
quote='''
In disputing, then, about wisdom, they have defined it thus: Wisdom is the knowledge of things human and divine. And hence, in the last book, I have not withheld the admission, that the cognizance of both subjects, whether divine or human, may be called both knowledge and wisdom. But according to the distinction made in the apostle's words, "To one is given the word of wisdom, to another the word of knowledge," this definition is to be divided, so that the knowledge of things divine shall be called wisdom, and that of things human appropriate to itself the name of knowledge.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252014.html'
source_title="ON THE TRINITY 14"
