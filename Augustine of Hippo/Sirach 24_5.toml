[[commentary]]
quote='''
Hence also it follows by consequence, that the Apostle Paul did not say, "Who alone has immortality," of the Father merely; but of the One and only God, which is the Trinity itself. For that which is itself eternal life is not mortal according to any changeableness; and hence the Son of God, because "He is Eternal Life," is also Himself understood with the Father, where it is said, "Who only hath immortality." For we, too, are made partakers of this eternal life, and become, in our own measure, immortal. But the eternal life itself, of which we are made partakers, is one thing; we ourselves, who, by partaking of it, shall live eternally, are another. For if He had said, "Whom in His own time the Father will show, who is the blessed and only Potentate, the King of kings, and Lord of lords; who only hath immortality;" not even so would it be necessarily understood that the Son is excluded. For neither has the Son separated the Father from Himself, because He Himself, speaking elsewhere with the voice of wisdom (for He Himself is the Wisdom of God), says, "I alone compassed the circuit of heaven." And therefore so much the more is it not necessary that the words, "Who hath immortality," should be understood of the Father alone, omitting the Son; when they are said thus: "That thou keep this commandment without spot, unrebukeable, until the appearing of our Lord Jesus Christ: whom in His own time He will show, who is the blessed and only Potentate, the King of kings, and Lord of lords; who only hath immortality, dwelling in the light which no man can approach unto; whom no man hath seen, nor can see: to whom be honor and power everlasting. Amen." In which words neither is the Father specially named, nor the Son, nor the Holy Spirit; but the blessed and only Potentate, the King of kings, and Lord of lords; that is, the One and only and true God, the Trinity itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25201.html'
source_title="ON THE TRINITY 1:6.10"
