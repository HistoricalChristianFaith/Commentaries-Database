[[commentary]]
quote='''
If He made man out of filth, will He not make an angel out of man? He absolutely will. He made men His friends, will He not make them angels? I no longer call you servants, but friends. To those still bearing flesh, still dying, still dwelling in this poverty and frailty of life, He said, I no longer call you servants, but friends. And what will He give to His friends? What He showed in Himself when He rose again. They will be crowned and converted into heavenly glory and will be equal to the angels of God. There will be no corruption, no temptation. There we will not be told: Cleanse yourselves from all defilement of flesh and spirit. We will not labor, nor will we be promised a reward, because we will already have received it. Nor will we be told to groan, because we will already be praising. Thus, mortal flesh will be converted into the body of an angel. Thus, will groans be converted into praises. Here, penance, distress, and groans; there, praises, joy, and gladness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252045.html'
source_title="Sermon 45.10"

[[commentary]]
quote='''
It is a worthy subject of inquiry how these words of the Lord are to be understood, "But I have called you friends: for all things that I have heard of my Father I have made known unto you." For who is there that dare affirm or believe that any man knoweth all things that the only-begotten Son hath heard of the Father; when there is no one that can comprehend even how He heareth any word of the Father, being as He is Himself the only Word of the Father? Nay more, is it not the case that a little afterwards, in this same discourse, which He delivered to the disciples between the Supper and His passion, He said, "I have yet many things to say unto you, but ye cannot bear them now"? How, then, are we to understand that He made known unto the disciples all that He had heard of the Father, when there are many things that He saith not, just because He knows that they cannot bear them now? Doubtless what He is yet to do He says that He has done as the same Being who hath made those things which are yet to be. For as He says by the prophet, "They pierced my hands and my feet," and not, They will yet pierce; but speaking as it were of the past, and yet predicting what was still in the future: so also in the passage before us He declares that He has made known to the disciples all, that He knows He will yet make known in that fullness of knowledge, whereof the apostle says, "But when that which is perfect is come, then that which is in part shall be done away." For in the same place he adds: "Now I know in part, but then shall I know, even as also I am known; and now through a glass in a riddle, but then face to face." For the same apostle also says that we have been saved by the washing of regeneration, and yet declares in another place, "We are saved by hope: but hope that is seen is no hope; for what a man seeth, why doth he yet hope for? But if we hope for that we see not, then do we with patience wait for it." To a similar purpose it is also said by his fellow-apostle Peter, "In whom, though now seeing Him not, ye believe; and in whom, when ye see Him, ye shall rejoice with a joy unspeakable and glorious: receiving the reward of faith, even the salvation of your souls." If, then, it is now the season of faith, and faith's reward is the salvation of our souls; who, in that faith which worketh by love, can doubt that the day must come to an end, and at its close the reward be received; not only the redemption of our body, whereof the Apostle Paul speaketh, but also the salvation of our souls, as we are told by the Apostle Peter? For the felicity springing from both is at this present time, and in the existing state of mortality, a matter rather of hope than of actual possession. But this it concerns us to remember, that our outward man, to wit the body, is still decaying; but the inward, that is, the soul, is being renewed day by day. Accordingly, while we are waiting for the immortality of the flesh and salvation of our souls in the future, yet with the pledge we have received, it may be said that we are saved already; so that knowledge of all things which the Only-begotten hath heard of the Father we are to regard as a matter of hope still lying in the future, although declared by Christ as something He had already imparted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252086.html'
source_title="Tractates on John 86"

[[commentary]]
quote='''
But let us mark what follows. "Henceforth I call you not servants; for the servant knoweth not what his lord doeth." How, then are we to understand the good servant to be both servant and friend, when He says, "Henceforth I call you not servants; for the servant knoweth not what his lord doeth"? He introduces the name of friend in such a way as to withdraw that of servant; not as if to include both in the one term, but in order that the one should succeed to the place vacated by the other. What does it mean? Is it this, that even in doing the Lord's commandments we shall not be servants? Or this, that then we shall cease to be servants, when we have been good servants? And yet who can contradict the Truth, when He says, "Henceforth I call you not servants?" and shows why He said so: "For the servant," He adds, "knoweth not what his lord doeth." Is it that a good and tried servant is not likewise entrusted by his master with his secrets? What does He mean, then, by saying, "The servant knoweth not what his lord doeth"? Be it that "he knoweth not what he doeth," is he ignorant also of what he commands? For if he were so, how can he serve? Or how is he a servant who does no service? And yet the Lord speaks thus: "Ye are my friends, if ye do whatsoever I command you. Henceforth I call you not servants." Truly a marvellous statement! Seeing we cannot serve the Lord but by doing His commandments, how is it that in doing so we shall cease to be servants? If I be not a servant in doing His commandments, and yet cannot be in His service unless I so do, then, in my very service, I am no longer a servant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252085.html'
source_title="Tractates on John 85"

[[commentary]]
quote='''
Let us understand, and may the Lord enable us to understand, and enable us also to do what we understand. And if we know this, we know of a truth what the Lord doeth; for it is only the Lord that so enables us, and by such means only do we attain to His friendship. For just as there are two kinds of fear, which produce two classes of fearers; so there are two kinds of service, which produce two classes of servants. There is a fear, which perfect love casteth out; and there is another fear, which is clean, and endureth for ever. The fear that lies not in love, the apostle pointed to when he said, "For ye have not received the spirit of service again to fear." But he referred to the clean fear when he said, "Be not high-minded, but fear." In that fear which love casteth out, there has also to be cast out the service along with it: for both were joined together by the apostle, that is, the service and the fear, when he said, "For ye have not received the spirit of service again to fear." And it was the servant connected with this kind of service that the Lord also had in His eye when He said, "Henceforth I call you not servants; for the servant knoweth not what his lord doeth." Certainly not the servant characterized by the clean fear, to whom it is said, "Well done, thou good servant: enter thou into the joy of thy lord;" but the servant who is characterized by the fear which love casteth out, of whom He elsewhere saith, "The servant abideth not in the house for ever, but the Son abideth ever." Since, therefore, He hath given us power to become the sons of God, let us not be servants, but sons: that, in some wonderful and indescribable but real way, we may as servants have the power not to be servants; servants, indeed, with that clean fear which distinguishes the servant that enters into the joy of his lord, but not servants with the fear that has to be cast out, and which marketh him that abideth not in the house for ever.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252085.html'
source_title="Tractates on John 85"

[[commentary]]
quote='''
But let us bear in mind that it is the Lord that enableth us to serve so as not to be servants. And this it is that is unknown to the servant, who knoweth not what his Lord doeth; and who, when he doeth any good thing, is lifted up as if he did it himself, and not his Lord; and so, glories not in the Lord, but in himself, thereby deceiving himself, because glorying, as if he had not received. But let us, beloved, in order that we may be the friends of the Lord, know what our Lord doeth. For it is He who makes us not only men, but also righteous, and not we ourselves. And who but He is the doer, in leading us to such a knowledge? For "we have received not the spirit of this world, but the Spirit which is of God, that we might know the things that are freely given to us of God." Whatever good there is, is freely given by Him. And so because this also is good, by Him who graciously imparteth all good is this gift of knowing likewise bestowed; that, in respect of all good things whatever, he that glorieth may glory in the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252085.html'
source_title="Tractates on John 85"
