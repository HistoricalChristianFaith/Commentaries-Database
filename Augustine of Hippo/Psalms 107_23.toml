[[commentary]]
quote='''
..."They who go down on the sea in ships, doing their business on the mighty waters" [Psalm 107:23]; that is, among many peoples. For that waters are often put for peoples, the Apocalypse of John is witness, when on John's asking what those waters were, it was answered him, they are peoples.
'''
source_url='https://www.newadvent.org/fathers/1801107.htm'
source_title='Exposition on Psalm 107'
