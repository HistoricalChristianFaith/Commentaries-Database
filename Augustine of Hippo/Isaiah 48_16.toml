[[commentary]]
quote='''
Now it is Jesus Christ who is speaking here as the "Lord God"; yet this would not have been obvious if he had not added the final words, "And now the Lord God has sent me and his Spirit." These words were spoken by Christ in his "form" as a "servant." He used a verb in the past tense to indicate a future event.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520City%2520of%2520God%2FBook%252020.html'
source_title="City of God 20.30"


[[commentary]]
quote='''
Moreover, He could not be sent by the Father without the Holy Spirit, not only because the Father, when He sent Him, that is, when He made Him of a woman, is certainly understood not to have so made Him without His own Spirit; but also because it is most plainly and expressly said in the Gospel in answer to the Virgin Mary, when she asked of the angel, "How shall this be?" "The Holy Ghost shall come upon thee, and the power of the Highest shall overshadow thee." And Matthew says, "She was found with child of the Holy Ghost." Although, too, in the prophet Isaiah, Christ Himself is understood to say of His own future advent, "And now the Lord God and His Spirit hath sent me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25202.html'
source_title="ON THE TRINITY 2:2.8"
