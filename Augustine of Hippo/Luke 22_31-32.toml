[[commentary]]
quote='''
For what else does the Lord's Passion itself commend to us in our head, Christ Jesus, if not this very temptation of life most significantly? Hence, upon the arrival of the time of His death, He said to Peter: "Satan has demanded to sift you like wheat, but I have prayed for you, Peter, that your faith may not fail; go and strengthen your brethren." And indeed, he strengthened us through his apostleship, his martyrdom, and his letters. Where also, admonishing about the night of which I speak as one to be feared, he taught us with the consolation of prophecy as with nocturnal light, so that we might vigilantly keep watch. "We have," he says, "the more sure prophetic word, to which you do well to attend as to a lamp shining in a dark place, until the day dawns and the morning star arises in your hearts."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520210.html'
source_title="SERMON 210.6"
