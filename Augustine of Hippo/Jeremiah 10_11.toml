[[commentary]]
quote='''
In reading what is said in this Psalm of Christ and of the Church, he would find that what is there foretold is fulfilled in the present state of the world. He would see the idols of the nations perishing from off the earth, and he would find that this is predicted by the prophets, as in Jeremiah, "Then shall ye say unto them, The gods that have not made the heavens and the earth shall perish from the earth, and from under heaven;" and again, "O Lord, my strength, and my fortress, and my refuge in the day of affliction, the Gentiles shall come unto Thee from the ends of the earth, and shall say, Surely our fathers have inherited lies, vanity, and things wherein there is no profit. Shall a man make gods unto himself, and they are no gods? Therefore, behold, I will at that time cause them to know, I will cause them to know mine hand and my might; and they shall know that I am the Lord." Hearing these prophecies, and seeing their actual fulfillment, I need not say that he would be affected; for we know by experience how the hearts of believers are confirmed by seeing ancient predictions now receiving their accomplishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252013.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 13:7"
