[[commentary]]
quote='''
Three crosses stood in one place: on one was the thief who was to be saved; on the second, the thief who was to be condemned; on the third, between them, was Christ, who was about to save the one thief and condemn the other. What could be more similar than these crosses? what more unlike than the persons who were suspended on them? Paul was given up to be imprisoned and bound, but Satan is unquestionably worse than any gaoler: yet to him Paul himself gave up one man for the destruction of the flesh, that the spirit might be saved in the day of the Lord Jesus. And what say we to this? Behold, both deliver a man to bondage; but he that is cruel consigns his prisoner to one less severe, while he that is compassionate consigns his to one who is more cruel. Let us learn, my brother, in actions which are similar to distinguish the intentions of the agents; and let us not, shutting our eyes, deal in groundless reproaches, and accuse those who seek men's welfare as if they did them wrong. In like manner, when the same apostle says that he had delivered certain persons unto Satan, that they might learn not to blaspheme, did he render to these men evil for evil, or did he not rather esteem it a good work to correct evil men by means of the evil one?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 93.2.7"

[[commentary]]
quote='''
We see the same in the apostle, who, not in cruelty, but in love, delivered a man up to Satan for the destruction of the flesh, that the spirit might be saved in the day of the Lord Jesus. Others, too, he delivered up, that they might learn not to blaspheme.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252022.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 22.79"


[[commentary]]
quote='''
Again they say, "Who made the devil?" He made himself; for the devil was made by sinning, not by nature. "Or," they say, "God should not have made him if he knew that he would sin." On the contrary, why should he not have made him? For through his own justice and providence God corrects many as a result of the malice of the devil. Or have you perhaps not heard the apostle Paul saying, "And I handed them over to Satan so that they might learn not to blaspheme"?
'''
source_url=''
source_title="ON GENESIS, AGAINST THE MANICHAEANS 2.28.42"
