[[commentary]]
quote='''
And then, demonstrating by plain consequence that as at that time the word was spoken by the angels, so now by the Son; "Therefore," he says, "we ought to give the more earnest heed to the things which we have heard, lest at any time we should let them slip. For if the word spoken by angels was steadfast, and every transgression and disobedience received a just recompense of reward; how shall we escape, if we neglect so great salvation?" And then, as though you asked, What salvation?—in order to show that he is now speaking of the New Testament, that is, of the word which was spoken not by angels, but by the Lord, he says, "Which at the first began to be spoken by the Lord, and was confirmed unto us by them that heard Him; God also bearing them witness, both with signs and wonders, and with divers miracles, and gifts of the Holy Ghost, according to His own will."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3.11.22"
