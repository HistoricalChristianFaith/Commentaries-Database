[[commentary]]
quote='''
"How great" is "the multitude of Your sweetness, O Lord" [Psalm 31:19]. Here the Prophet exclaims, having sight of all this, and admiring how manifoldly plenteous is Your sweetness, O Lord. "Which You have hid for them that fear You." Even those, whom Thou correctest, You love much: but lest they should go on negligently from relaxed security, Thou hidest from them the sweetness of Your love, for whom it is profitable to fear You. "You have perfected it for them that hope in You." But You have perfected this sweetness for them that hope in You. For Thou dost not withdraw from them what they look for perseveringly even unto the end. "In sight of the sons of men." For it does not escape the notice of the sons of men, who now live no more after Adam, but after the Son of Man. "You will hide them in the hidden place of Your Countenance:" which seat You shall preserve for everlasting in the hidden place of the knowledge of You for them that hope in You. "From the troubling of men." So that now they suffer no more trouble from men.
'''
source_url='https://www.newadvent.org/fathers/1801031.htm'
source_title="Exposition on Psalm 31"


[[commentary]]
quote='''
"How abundant," says the Psalmist, "is the multitude of Thy goodness, O Lord, which Thou hast laid up for them that fear Thee, and hast perfected for them that hope in Thee!" By the law we fear God; by faith we hope in God: but from those who fear punishment grace is hidden. And the soul which labours under this fear, since it has not conquered its evil concupiscence, and from which this fear, like a harsh master, has not departed,—let it flee by faith for refuge to the mercy of God, that He may give it what He commands, and may, by inspiring into it the sweetness of His grace through His Holy Spirit, cause the soul to delight more in what He teaches it, than it delights in what opposes His instruction. In this manner it is that the great abundance of His sweetness,—that is, the law of faith,—His love which is in our hearts, and shed abroad, is perfected in them that hope in Him, that good may be wrought by the soul, healed not by the fear of punishment, but by the love of righteousness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 51"
