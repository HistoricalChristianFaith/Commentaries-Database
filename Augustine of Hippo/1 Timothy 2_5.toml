[[commentary]]
quote='''
Christ Jesus, himself man, is the true Mediator, for, inasmuch as he took the "form of a slave," he became "the Mediator between God and men." In his character as God, he received sacrifices in union with the Father, with whom he is one God. Yet he chose, in his character as a slave, to be himself the sacrifice rather than to receive it, lest any one might take occasion to think that sacrifice could be rendered to a creature. Thus it is that he is both the Priest who offers and the Oblation that is offered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520City%2520of%2520God%2FBook%252010.html'
source_title="City of God 10.20"

[[commentary]]
quote='''
But how are we reconciled, save by the removal of that which separates between us and Himself? For He says by the prophet, "He hath not made the ear heavy that it should not hear; but your iniquities have separated between you and your God." And so, then, we are not reconciled, unless that which is in the midst is taken away, and something else is put in its place. For there is a separating medium, and, on the other hand, there is a reconciling Mediator. The separating medium is sin, the reconciling Mediator is the Lord Jesus Christ: "For there is one God and Mediator between God and men, the man Christ Jesus." To take then away the separating wall, which is sin, that Mediator has come, and the priest has Himself become the sacrifice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252041.html'
source_title="TRACTATES ON JOHN 41.5"

[[commentary]]
quote='''
It was in order to make the mind able to advance more confidently toward the truth that Truth itself, the divine Son of God, put on humanity without putting off his divinity and built this firm path of faith so that man, by means of the God-Man, could find his way to man's God. I speak of the "mediator between God and men, himself man, Christ Jesus." For it is as man that he is the Mediator and as man that he is the way.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520City%2520of%2520God%2FBook%252011.html'
source_title="City of God 11.2"

[[commentary]]
quote='''
Hence we respond to this objection of theirs, which they propose from the gospel, in a way which allows no man to be so lacking in understanding that he thinks we are compelled by this text to believe and confess that the mediator between God and men, the man Christ Jesus, did not have a human soul. In the same way I inquire how they respond to objections so palpable as ours, whereby we show through countless places in the Gospel writings what was narrated of him by the Evangelists, namely, that he was found with feelings that are impossible without a soul.
'''
source_url=''
source_title="EIGHTY-THREE DIFFERENT QUESTIONS 80.3"

[[commentary]]
quote='''
Now, we could not be redeemed, even through "the one mediator between God and man, Man himself, Christ Jesus," if he were not also God. For when Adam was made—being made an upright man—there was no need for a mediator. Once sin, however, had widely separated the human race from God, it was necessary for a mediator, who alone was born, lived and was put to death without sin, to reconcile us to God and provide even for our bodies a resurrection to life eternal—and all this in order that a man's pride might be exposed and healed through God's humility.
'''
source_url='https://www.newadvent.org/fathers/1302.htm'
source_title="Enchiridion 108.28"


[[commentary]]
quote='''
He then adds: "After this, Jesus knowing that all things were now accomplished, that the scripture might be fulfilled, saith, I thirst. Now there was set a vessel full of vinegar: and they filled a sponge with vinegar, and fixed it upon hyssop, and put it to His mouth. When Jesus therefore had received the vinegar, He said, It is finished: and He bowed His head, and gave up the ghost." Who has the power of so adjusting what he does, as this Man had of arranging all that He suffered? But this Man was the Mediator between God and men; the Man of whom we read in prophecy, He is man also, and who shall acknowledge Him? for the men who did such things acknowledged not this Man as God. For He who was manifest as man, was hid as God: He who was manifest suffered all these things, and He Himself also, who was hid, arranged them all. He saw, therefore, that all was accomplished that required to be done before He received the vinegar, and gave up the ghost.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%2520119.html'
source_title="TRACTATES ON JOHN 119.4"
