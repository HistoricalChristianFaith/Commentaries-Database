[[commentary]]
quote='''
The entire mass of mankind was struck in the first man by that venomous one; no one passes from the first to the second except through the sacrament of Baptism. In newborn infants who are not yet baptized, let Adam be recognized: in newborn infants who are baptized and thus reborn, let Christ be recognized. Whoever does not recognize Adam in newborns cannot recognize Christ in the reborn. But why, they say, does a faithful man baptized and already forgiven of sin, generate one who is with the sin of the first man? Because he generates him by flesh, not by spirit. What is born of flesh is flesh. And if our outward man, says the Apostle, is corrupted, yet the inward man is renewed day by day. From that which is renewed in you, you do not generate a little one; from that which is corrupted in you, you generate a little one. You have been born and reborn so as not to die eternally; he has been born but not yet reborn. If you live by being reborn, allow him also to be reborn and live; allow him, I say, to be reborn, allow him to be reborn. Why do you contradict? Why do you attempt to break the ancient rule of faith with new arguments? What is it that you say: Little ones have no original sin at all? What is it that you say, except that you do not want them to come to Jesus? But to you, Jesus cries out: Allow the little ones to come to me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520174.html'
source_title="Sermon 174"

[[commentary]]
quote='''
"That which is born of the flesh is flesh; and that which is born of the Spirit is spirit." We are born spiritually then, and spirit we are born by the word and sacrament. The Spirit is present that we may be born; the Spirit is invisibly present whereof thou art born, for thou too must be invisibly born.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252012.html'
source_title="Tractates on John 12"
