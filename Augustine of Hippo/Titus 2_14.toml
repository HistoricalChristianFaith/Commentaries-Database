[[commentary]]
quote='''
For the same Church of holy and good believers is both small if compared with the number of the wicked, which is greater, and large if considered by itself; "for the desolate hath more sons than she which hath an husband," and "many shall come from the east and from the west, and shall sit down with Abraham, and Isaac, and Jacob, in the kingdom of God." God, moreover, presents unto Himself a "numerous people, zealous of good works." And in the Apocalypse, many thousands "which no man can number," from every tribe and tongue, are seen clothed in white robes, and with palms of victory. It is the same Church which is occasionally obscured, and, as it were, beclouded by the multitude of offences, when sinners bend the bow that they may shoot under the darkened moon at the upright in heart. But even at such a time the Church shines in those who are most firm in their attachment to her.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 93.9.30"
