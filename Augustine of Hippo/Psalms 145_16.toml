[[commentary]]
quote='''
"Thou openest Thine Hand, and fillest every living thing with blessing" (ver. 16). Though sometimes Thou givest not, yet "in due season" Thou givest: Thou delayest, not deniest, and that in due season.
'''
source_url = 'https://www.newadvent.org/fathers/1801145.htm'
source_title="Exposition on Psalm 145"
