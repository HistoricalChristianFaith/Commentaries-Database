[[commentary]]
quote='''
For the truth is, one does a good deal of good when he does what the Scripture enjoins, "Go not after thy lusts;" yet he falls short of perfection, in that he fails to keep the great commandment, "Thou shalt not covet." The law said, "Thou shalt not covet," in order that, when we find ourselves lying in this diseased state, we might seek the medicine of Grace, and by that commandment know both in what direction our endeavours should aim as we advance in our present mortal condition, and to what a height it is possible to reach in the future immortality. For unless perfection could somewhere be attained, this commandment would never have been given to us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Marriage%2520and%2520Concupiscence%2FBook%25201.html'
source_title="ON MARRIAGE AND CONCUPISCENCE 1.32"

[[commentary]]
quote='''
There you are then, the law tells you "you shall not covet." You know the law which says, "You shall not covet." Covetousness surges up in you, which you didn't know. It was there inside, you see, but it wasn't known. You started to make an effort to overcome what was inside, and what was hidden came to light. Proud fellow, through the law you have been made into a transgressor. Acknowledge grace, and become a singer of praise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252026.html'
source_title="SERMON 26.9"

[[commentary]]
quote='''
Even a lion can be shooed off its prey by the terrifying threat of arms and weapons and the crowd of people perhaps surrounding it or coming to attack it; and yet the lion comes, the lion returns. It hasn't seized its prey; it hasn't either laid aside its evil intention. If that's what you're like, your justice is still the sort by which you take care not to get tortured. What's so great about being afraid of punishment? Who isn't afraid of it?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520169.html'
source_title="SERMON 169.8"

[[commentary]]
quote='''
"To will," he says, "is present with me; but not so, how to perfect that which is good." Has he said, To do good is not present with me? Had he said so, hope would be wanting. He does not say, To do is not present with me, but, "To perfect is not present with me." For what is the perfecting of good, but the elimination and end of evil? And what is the elimination of evil, but what the law says, "Thou shalt not lust [covet]"? To lust not at all is the perfecting of good, because it is the eliminating of evil. This he said, "To perfect that which is good is not present with me," because his doing could not get the length of setting him free from lust. He labored only to bridle lust, to refuse consent to lust, and not to yield his members to its service.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252041.html'
source_title="TRACTATE ON THE GOSPEL OF JOHN 41.12"


[[commentary]]
quote='''
To save me from saying a lot, among other commandments it contains "You shall not covet your neighbor's property." Don't covet; don't go up and down in front of that country house belonging to someone else and sigh because it's such a fine one. Do not covet your neighbor's property. "The Lord's is the earth and its fullness." What haven't you acquired, if you have got hold of God? So don't covet your neighbor's property.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520252A.html'
source_title="SERMON 252A.6"
