[[commentary]]
quote='''
...lest in his ornate style they may drink poison, as out of a choice goblet, at your instance, though not after your own example, because they know not precisely what it is you have drunk yourself, and what you have left untasted, and because, from your high character, they suppose that whatever is drunk out of this fountain would be for their health. For what else are hearing, and reading, and copiously depositing things in the memory, than several processes of drinking? The Lord, however, foretold concerning His faithful followers, that even "if they should drink any deadly thing, it should not hurt them." And thus it happens that they who read with judgment, and bestow their approbation on whatever is commendable according to the rule of faith, and disapprove of things which ought to be reprobated, even if they commit to their memory statements which are declared to be worthy of disapproval, they receive no harm from the poisonous and depraved nature of the sentences.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Soul%2520and%2520Its%2520Origin%2FBook%25202.html'
source_title="ON THE SOUL AND ITS ORIGIN 2.23"
