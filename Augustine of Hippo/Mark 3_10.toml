[[commentary]]
quote='''
What then is to touch, if not to believe? For we touch Christ by faith and it is better to touch by faith and not by the hand, than to palpate by hand and not touch by faith. It was not a great thing to touch Christ. The Jews touched Him when they apprehended Him, touched Him when they bound Him, touched Him when they hung Him, touched Him and by touching wickedly, they lost what they touched. Touch by faith, O Catholic Church, touch by faith. If you think Christ is only a man, you have touched Him on earth. If you believe Christ is Lord equal to the Father, then you have touched Him when He ascended to the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520246.html'
source_title="Sermon 246"
