[[commentary]]
quote='''
"Thou with rebukes hast chastened man for iniquity; Thou hast made my life to consume away like a spider" (ver. 11). There is much that is discerned by this Idithun; by every one who discerns as he does; who overleaps as he does. For he says, that he has fainted in God's corrections; and would fain have the stroke removed away from him, "because it is He who made him." Let Him renew me, who also made me; let Him who created me, create me anew. But yet, Brethren, do we suppose that there was no cause for his fainting, so that he wishes to be "renewed," to be "created anew"? It is "for iniquity," saith he, "that Thou hast chastened man." All this, my having fainted, my being weak, my "crying out of the deep," all of this is because of "iniquity;" and in this Thou hast not condemned, but hast "chastened" me. "Thou hast chastened man for sin." Hear this more plainly from another Psalm: "It is good for me that Thou hast afflicted me, that I might learn Thy righteousness." I have been "afflicted," and at the same time "it is good for me;" it is at once a punishment, and an act of favour. What hath He in store for us after punishment is over, who inflicts punishment itself by way of favour? For He it is of whom it was said, "I was brought low, and He made me whole:" and, "It is good for me that Thou hast afflicted me, that I might learn Thy righteousness." "Thou chastenest man for iniquity." And that which is written, "Thou formest my grief in teaching me," could only be said unto God by one who was "leaping beyond" his fellows; "Thou formest my grief in teaching me;" Thou makest, that is to say, a lesson for me out of my sorrow. It is Thou that formest that very grief itself; Thou dost not leave it unformed, but formest it; and that grief, that has been inflicted by Thee, when formed, will be a lesson unto me, that I may be set free by Thee. For the word finges is used in the sense of "forming," as it were moulding, my grief; not in the sense of "feigning" it; in the same way that fingit is applied to the artist, in the same sense that figulus is derived from fingere. Thou therefore "hast chastened man for iniquity." I see myself in afflictions; I see myself under punishment; and I see no unrighteousness in Thee. If I therefore am under punishment, and if there is no unrighteousness with Thee, it remains that Thou must have been "chastening man for iniquity."

And by what means hast Thou "chastened" him? Tell us, O Idithun, the manner of thy chastening; tell us in what way thou hast been "chastened." "And Thou hast made my life consume like a spider." This is the chastening! What consumes away sooner than the spider? I speak of the creature itself; though what can be more liable to "consume away" than the spider's webs? Observe too how liable to decay is the creature itself. Do but set your finger lightly upon it, and it is a ruin: there is nothing at all more easily destroyed. To such a state hast Thou brought my life, by chastening me "because of iniquity." When chastening makes us weak, there is a kind of strength that would be a fault. ...It was by a kind of strength that man offended, so as to require to be corrected by weakness: for it was by a certain "pride" that he offended; so as to require to be chastened by humility. All proud persons call themselves strong men. Therefore have many "come from the East and the West," and have attained "to sit down with Abraham, and Isaac, and Jacob, in the kingdom of Heaven." Wherefore was it that they so attained? Because they would not be strong. What is meant by "would not be strong"? They were afraid to presume of their own merits. They did not "go about to establish their own righteousness," that they might "submit themselves to the righteousness of God." ...Behold! you are mortal; and you bear about you a body of flesh that is corrupting away: "And ye shall fall like one of the princes. Ye shall die like men," and shall fall like the devil. What good does the remedial discipline of mortality do you? The devil is proud, as not having a mortal body, as being an angel. But as for you, who have received a mortal body, and to whom even this does no good, so as to humble you by so great weakness, you shall "fall like one of the princes." This then is the first grace of God's gift, to bring us to the confession of our infirmity, that whatever good we can do, whatever ability we have, we may be that in Him; that "He that glorieth, may glory in the Lord." "When I am weak," saith he, "then am I strong."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252039.html'
