[[commentary]]
quote='''
"With You is My praise" [Psalm 22:25]. For I seek not My own praise, [John 8:50] for You are My praise, who dwellest in the holy place; and, praise of Israel, You hear The Holy One now beseeching You. "In the great Church I will confess You." In the Church of the whole world "I will confess You." "I will offer My vows in the sight of them that fear Him." I will offer the sacraments of My Body and Blood in the sight of them that fear Him.
'''
source_url='https://www.newadvent.org/fathers/1801022.htm'
source_title="Exposition on Psalm 22"


[[commentary]]
quote='''
He calls, however, "the circumcision of the heart" the will that is pure from all unlawful desire; which comes not from the letter, inculcating and threatening, but from the Spirit, assisting and healing. Such doers of the law have their praise therefore, not of men but of God, who by His grace provides the grounds on which they receive praise, of whom it is said, "My soul shall make her boast of the Lord;" and to whom it is said, "My praise shall be of Thee:" but those are not such who would have God praised because they are men; but themselves, because they are righteous.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 13"
