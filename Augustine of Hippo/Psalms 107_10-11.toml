[[commentary]]
quote='''
"Them that sit in darkness, and in the shadow of death, fast bound in beggary and iron" [Psalm 107:10]. Whence this, but that you were attributing things to yourself? That you were not owning the grace of God? That you were rejecting the counsel of God [Luke 7:30] concerning you? For see what He adds: "Because they rebelled against the words of the Lord through pride" [Psalm 107:11], not knowing the righteousness of God, and wishing to establish their own, [Romans 10:3] "and they were bitter against the counsel of the Most High."
'''
source_url='https://www.newadvent.org/fathers/1801107.htm'
source_title='Exposition on Psalm 107'
