[[commentary]]
quote='''
Man was indeed made in the image of God, and as it is written elsewhere, He gave him the power of containing all things: everything was under him, but above him was the One who made all things. Thus, man ought to have regarded those things that were under him, so that he might more regard the One who was above him; for clinging to the superior, he would more securely possess the inferior; but departing from the superior, he would be subjected to the inferior. Just as if we suppose three men: one man having a servant and a master, as often happens that peculiar servants have servants. Consider this: he has a servant, he has a master; subject to one, superior to another; he is superior to the servant, inferior to his master. We have placed a third as the servant of a servant, but the first as the master of a master, and the middle one both servant and master: master of his servant and servant of his master. That third is only a servant, the first is only a master, the middle one is both a servant and a master. And he securely possesses his servant if he does not offend his master. And, indeed, we have mentioned three men: all are of the same kind, all subsist from the same substance and nature. Not so are those three: God, man, and the creature inferior to man. For the Creator and the created, the maker and the made, the craftsman and the work, the creator and the creature are of a different kind and not of the same substance. However, those things which were created are generally called created things, but they differ by natures, orders, merits, and places.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520159B.html'
source_title="Sermon 159B"
