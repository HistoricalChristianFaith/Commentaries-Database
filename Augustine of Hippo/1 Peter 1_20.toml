[[commentary]]
quote='''
In this redemption, the blood of Christ was given, as it were, as a price for us, by accepting which the devil was not enriched, but bound: that we might be loosened from his bonds, and that he might not with himself involve in the meshes of sins, and so deliver to the destruction of the second and eternal death, any one of those whom Christ, free from all debt, had redeemed by pouring out His own blood unindebtedly; but that they who belong to the grace of Christ, foreknown, and predestinated, and elected before the foundation of the world should only so far die as Christ Himself died for them, i.e. only by the death of the flesh, not of the spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252013.html'
source_title="ON THE TRINITY 13.15"
