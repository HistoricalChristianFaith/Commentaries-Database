[[commentary]]
quote='''
"I have dealt judgment and righteousness; O give me not over unto mine oppressors" (ver. 121). It is not wonderful that he should have dealt judgment and righteousness, since he had above prayed for a chaste fear from God, whereby to fix with nails his flesh, that is, his carnal lusts, which are wont to hinder our judgment from being right. But although in our customary speech judgment is either right or wrong, whence it is said unto men in the Gospel, "Judge not according to the persons, but judge righteous judgment:" nevertheless in this passage judgment is used as though, if it were not righteous, it ought not to be called judgment; otherwise it would not be enough to say, "I have dealt judgment," but it would be said, I have dealt righteous judgment. ...

Whoso therefore in the chaste fear of God hath his flesh crucified, and corrupted by no carnal allurement, dealeth judgment and the work of righteousness, ought to pray that he may not be given up to his adversaries; that is, that he may not, through his dread of suffering evils, yield unto his adversaries to do evil. For he receiveth power of endurance, which guardeth him from being overcome with pain, from Him from whom he receiveth the victory over lust, which preventeth his being seduced by pleasure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520119.html'
source_title="Exposition on Psalm 119"
