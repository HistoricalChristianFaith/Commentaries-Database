[[commentary]]
quote='''
The robber escaped, Christ was condemned. He who was loaded with criminal accusations received pardon; He who has released from their crimes all who confess Him, was condemned. Nevertheless even the cross itself, if thou considerest it well, was a judgment-seat; for the Judge being set up in the middle, one thief who believed was delivered, the other who reviled was condemned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252031.html'
source_title="TRACTATES ON JOHN 31.11"

[[commentary]]
quote='''
For Christ was not discerned by the ungodly, but was condemned with the ungodly; for it was said concerning Him, "He was accounted among the wicked." The robber escaped, Christ was condemned. He who was loaded with criminal accusations received pardon; He who has released from their crimes all who confess Him, was condemned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252031.html'
source_title="TRACTATES ON JOHN 31.11"
