[[commentary]]
quote='''
Therefore Cyprian and all those bishops were partakers in the sins of other men, inasmuch as they remained in communion with such men, when they removed no one from the right of communion who entertained a different opinion. Where, then, is the Church, which, according to these words must be held to have perished from that very moment by the contagion of their sins? But if, as is the most firmly established truth, the Church both has remained and does remain, the partaking of the sins of others, which is forbidden by the apostle, must be considered only to consist in consenting to them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Baptism%2FBook%25207.html'
source_title="ON BAPTISM, AGAINST THE DONATISTS 7.5.9"


[[commentary]]
quote='''
The apostle writes to Timothy: "Practice self-control." It's a command; it's an order; it has to be listened to; it has to be carried out. But unless God comes to our help, we get stuck. We try, indeed, to do it by willpower, and the will makes some effort. It shouldn't, though, rely on its ability unless it is assisted in its debility.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520348A.html'
source_title="SERMONS 348A.4"
