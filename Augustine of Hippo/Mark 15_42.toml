[[commentary]]
quote='''
Scripture again witnesses that the space of those three days themselves was not whole and entire, but the first day is counted as a whole from its last part, and the third day is itself also counted as a whole from its first part; but the intervening day, i.e. the second day, was absolutely a whole with its twenty-four hours, twelve of the day and twelve of the night. For He was crucified first by the voices of the Jews in the third hour, when it was the sixth day of the week. Then He hung on the cross itself at the sixth hour, and yielded up His spirit at the ninth hour. But He was buried, "now when the even was come," as the words of the evangelist express it; which means, at the end of the day.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4.6, 10"
