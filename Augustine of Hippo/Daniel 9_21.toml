[[commentary]]
quote='''
Let them read Daniel, saying, "Behold the man Gabriel." But why do we delay any longer to stop their mouths by another most clear and most weighty proof, where not an angel in the singular nor men in the plural are spoken of, but simply angels; by whom not any particular word was wrought, but the Law itself is most distinctly declared to be given; which certainly none of the faithful doubts that God gave to Moses for the control of the children of Israel, or yet, that it was given by angels. So Stephen speaks: "Ye stiff-necked," he says, "and uncircumcised in heart and ears, ye do always resist the Holy Ghost: as your fathers did, so do ye. Which of the prophets have not your fathers persecuted? and they have slain them which showed before of the coming of the Just One; of whom ye have been now the betrayers and murderers: who have received the Law by the disposition of angels, and have not kept it." What is more evident than this? What more strong than such an authority? The Law, indeed, was given to that people by the disposition of angels; but the advent of our Lord Jesus Christ was by it prepared and pre-announced; and He Himself, as the Word of God, was in some wonderful and unspeakable manner in the angels, by whose disposition the Law itself was given. And hence He said in the Gospel, "For had ye believed Moses, ye would have believed me; for he wrote of me." Therefore then the Lord was speaking by the angels; and the son of God, who was to be the Mediator of God and men, from the seed of Abraham, was preparing His own advent by the angels, that He might find some by whom He would be received, confessing themselves guilty, whom the Law unfulfilled had made transgressors.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3:10"
