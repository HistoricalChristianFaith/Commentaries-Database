[[commentary]]
quote='''
What else, then, is the meaning of the evangelist Mark saying, "And it was the third hour, and they crucified Him," but this, that the Lord was crucified at the third hour by the tongues of the Jews, at the sixth hour by the hands of the soldiers? That we may understand that the fifth hour was now completed, and there was some beginning made of the sixth, when Pilate took his seat before the tribunal, which is expressed by John as "about the sixth hour;" and when He was led forth, and nailed to the tree with the two robbers, and the events recorded were enacted beside His cross, the completion of the sixth hour was fully reached, being the hour from which, on to the ninth, the sun was obscured, and the darkness took place, we have it jointly attested on the authority of the three evangelists, Matthew, Mark, and Luke.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%2520117.html'
source_title="TRACTATES ON JOHN 117.1"

[[commentary]]
quote='''
(de Con. Evan. 3, 17) Luke added to this account the cause of the darkness, that is, the darkening of the sun.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
