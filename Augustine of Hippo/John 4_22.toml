[[commentary]]
quote='''
Different walls came to the cornerstone, from there the Jews, from there the Gentiles; from different directions, but not to different ones. You have seen and known that the walls are as far apart from each other as they are distant from the corner. As they draw near to the corner, they draw near to each other: when they come to the corner, they cling to each other. Christ did this. The Jews and Gentiles, circumcision and uncircumcision, those with the Law and without the Law, worshippers of the one true God and of many false gods, were far from each other. How far? But He is our peace, who made both one. But those who came from the Jews are numbered in the good wall: for those who came, did not remain in ruin. They and we have been made one: but in one, not in us. Whence was Christ born? From the Jews. Thus you have written: "Salvation is from the Jews," but not for the Jews alone. For He did not say: "Salvation to the Jews"; but: "Salvation from the Jews." They comprehended, and they lost it; they bound him, and He fled from them; they saw Him, and they killed Him: we neither comprehended Him, and we hold Him; nor saw Him, and we believe; we are last, and precede. Those who preceded us lost the way: but we have found the way and, walking in it, we will come to the homeland.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520375.html'
source_title="Sermon 375"

[[commentary]]
quote='''
(in Joan. Tr. xv. c. 26) It is saying much for the Jews, to declare in their name, We worship what we know. But He does not speak for the reprobate Jews, but for that party from whom the Apostles and the Prophets came. Such were all those saints who laid the prices of their possessions at the Apostle's feet.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"The hour cometh, and now is, when the true worshippers shall worship the Father in spirit and in truth. We worship that which we know: ye worship ye know not what; for salvation is of the Jews." A great thing has He attributed to the Jews; but do not understand Him to mean those spurious Jews. Understand that wall to which another is joined, that they may be joined together, resting on the corner-stone, which is Christ. For there is one wall from the Jews, another from the Gentiles; these walls are far apart, only until they are united in the Corner. Now the aliens were strangers and foreigners from the covenants of God. According to this, it is said, "We worship what we know." It is said, indeed, in the person of the Jews, but not of all Jews, not of reprobate Jews, but of such as were the apostles, as were the prophets, as were all those saints who sold all their goods, and laid the price of their goods at the apostles' feet. "For God hath not rejected His people which He foreknew."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252015.html'
source_title="Tractates on John 15"
