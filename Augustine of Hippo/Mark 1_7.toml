[[commentary]]
quote='''
John therefore was a foreteller of Christ nearer to Him in time than all who went before him. And because all the righteous men and prophets of former times desired to see the fulfillment of what, through the revelation of the Spirit, they foresaw would come to pass—whence also the Lord Himself says, "That many prophets and righteous men have desired to see those things which ye see, and have not seen them; and to hear those things which ye hear, and have not heard them,"—therefore it was said of John that he was more than a prophet, and that among all that were born of women there was none greater than he; because to the righteous men who went before him it was only granted to foretell the coming of Christ, but to John it was given both to foretell Him in His absence and to behold His presence, so that it should be found that to him was made manifest what the others had desired. ... And John, therefore, though the nearest to Christ in point of time, and within one year of the same age with Him, yet, while he was baptizing, went before the way of Christ who was still to come; for which reason it was said of him, "Behold, I send my messenger before Thy face, which shall prepare Thy way before Thee." And he himself preached, saying, "There cometh one mightier than I after me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FIn%2520Answer%2520to%2520the%2520Letters%2520of%2520Petilian%2FBook%25202.html'
source_title="ANSWER TO THE LETTERS OF PETILIAN, THE DONATIST 2.37"
