[[commentary]]
quote='''
Sometimes the meaning is altogether latent, as in Genesis: "Let us make man after our image and likeness." Both let us make and our is said in the plural, and ought not to be received except as of relatives. For it was not that gods might make, or make after the image and likeness of gods; but that the Father, and Son, and Holy Spirit might make after the image of the Father, and Son, and Holy Spirit, that man might subsist as the image of God. And God is the Trinity. But because that image of God was not made altogether equal to Him, as being not born of Him, but created by Him; in order to signify this, he is in such way the image as that he is "after the image," that is, he is not made equal by parity, but approaches to Him by a sort of likeness. For approach to God is not by intervals of place, but by likeness, and withdrawal from Him is by unlikeness. ... For how our, when the Son is the image of the Father alone? But man is said to be "after the image," on account, as we have said, of the inequality of the likeness; and therefore after our image, that man might be the image of the Trinity; not equal to the Trinity as the Son is equal to the Father, but approaching to it, as has been said, by a certain likeness; just as nearness may in a sense be signified in things distant from each other, not in respect of place, but of a sort of imitation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25207.html'
source_title="On the Trinity 7.6.12"

[[commentary]]
quote='''
No doubt every thing in the creatures which is in any way like God, is not also to be called His image; but that alone than which He Himself alone is higher. For that only is in all points copied from Him, between which and Himself no nature is interposed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252011.html'
source_title="On the Trinity 11.5.8"


[[commentary]]
quote='''
For God said, "Let us make man in our image, after our likeness;" and a little after it is said, "So God created man in the image of God." Certainly, in that it is of the plural number, the word "our" would not be rightly used if man were made in the image of one person, whether of the Father, or of the Son, or of the Holy Spirit; but because he was made in the image of the Trinity, on that account it is said, "After our image." But again, lest we should think that three Gods were to be believed in the Trinity, whereas the same Trinity is one God, it is said, "So God created man in the image of God," instead of saying, "In His own image."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252012.html'
source_title="On the Trinity 12.6.6"
