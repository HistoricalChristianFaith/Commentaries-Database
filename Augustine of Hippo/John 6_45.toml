[[commentary]]
quote='''
Or think of it in this way. When a schoolmaster is the only one in a town, we say loosely, “This person teaches all here to read,” not that all learn from him but that he teaches all who do learn. And in the same way we say that God teaches all to come to Christ: not that all do come but that no one comes in any other way.
'''
source_url=''
source_title='PREDESTINATION OF THE SAINTS 14'

[[commentary]]
quote='''
For it is written in the prophets, "And they shall all be taught of God." Why have I said this, O Jews? The Father has not taught you; how can ye know me? For all the men of that kingdom shall be taught of God, not learn from men. And though they do learn from men, yet what they understand is given them within, flashes within, is revealed within. What do men that proclaim tidings from without? What am I doing even now while I speak? I am pouring a clatter of words into your ears. What is that that I say or that I speak, unless He that is within reveal it? Without is the planter of the tree, within is the tree's Creator. He that planteth and He that watereth work from without: this is what we do. But "neither he that planteth is anything, nor he that watereth; but God that giveth the increase." That is, "they shall be all taught of God." All who? "Every one who has heard and learned of the Father cometh unto me." See how the Father draws: He delights by teaching, not by imposing a necessity. Behold how He draws: "They shall be all taught of God." This is God's drawing. "Every man that hath heard, and hath learned of the Father, cometh unto me." This is God's drawing.

What then, brethren? If every man who has heard and learned of the Father, the same cometh unto Christ, has Christ taught nothing here? What shall we say to this, that men who have not seen the Father as their teacher have seen the Son? The Son spake, but the Father taught. I, being a man, whom do I teach? Whom, brethren, but him who has heard my word? If I, being a man, do teach him who hears my word, the Father also teacheth him who hears His word. And if the Father teacheth him that hears His word, ask what Christ is, and thou wilt find the word of the Father. "In the beginning was the Word." Not in the beginning God made the Word, just as "in the beginning God made the heaven and the earth." Behold how that He is not a creature. Learn to be drawn to the Son by the Father: that the Father may teach thee, hear His Word. What Word of Him, sayest thou, do I hear? "In the beginning was the Word" (it is not "was made," but "was"), "and the Word was with God, and the Word was God." How can men abiding in the flesh hear such a Word? "The Word was made flesh, and dwelt among us."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252026.html'
source_title='Tractates on John 26'

[[commentary]]
quote='''
(de Prædest. Sanctorum, c. viii) Or thus; When a schoolmaster is the only one in a town, we say loosely, This man teaches all here to read; not that all learn of him, but that he teaches all who do learn. And in the same way we say that God teaches all men to come to Christ: not that all do come, but that no one comes in any other way.

(super Joan. Tr. xxv. 7) All the men of that kingdom shall be taught of God; they shall hear nothing from men: for, though in this world what they hear with the outward ear is from men, yet what they understand is given them from within; from within is light and revelation. I force certain sounds into your ears, but unless He is within to reveal their meaning, how, O ye Jews, can ye acknowledge Me, ye whom the Father hath not taught?

(de Prædest. Sanctorum, c. viii. et seq.) All that are taught of God come to the Son, because they have heard and learnt from the Father of the Son: wherefore He proceeds, Every man that hath heard, and hath learned of the Father, cometh to Me. But if every one that hath heard and learnt of the Father cometh, every one that hath not heard of the Father hath not learnt. For beyond the reach of the bodily senses is this school, in which the Father is heard, and men taught to come to the Son. Here we have not to do with the carnal ear, but the ear of the heart; for here is the Son Himself, the Word by which the Father teacheth, and together with Him the Holy Spirit: the operations of the three Persons being inseparable from each other. This is attributed however principally to the Father, because from Him proceeds the Son, and the Holy Spirit. Therefore the grace which the Divine bounty imparts in secret to men's hearts, is rejected by none from hardness of heart: seeing it is given in the first instance, in order to take away hard-heartedness. Why then does He not teach all to come to Christ? Because those whom He teaches, He teaches in mercy; and those whom He teaches not, He teaches not in judgment. But if we say, that those, whom He teaches not, wish to learn, we shall be answered, Why then is it said, Wilt thou not turn again, and quicken us? (Ps. 84:6) If God does not make willing minds out of unwilling, why prayeth the Church, according to our Lord's command, for her persecutors? For no one can say, I believed, and therefore He called me: rather the preventing mercy of God called him, that he might believe.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
