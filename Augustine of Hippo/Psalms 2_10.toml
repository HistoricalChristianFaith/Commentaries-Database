[[commentary]]
quote='''
And there was as yet no sign of that which is spoken a little later in the same psalm: "Be wise now, therefore, O ye kings; be instructed, ye judges of the earth. Serve the Lord with fear, and rejoice with trembling." How then are kings to serve the Lord with fear, except by preventing and chastising with religious severity all those acts which are done in opposition to the commandments of the Lord? For a man serves God in one way in that he is man, in another way in that he is also king. In that he is man, he serves Him by living faithfully; but in that he is also king, he serves Him by enforcing with suitable rigor such laws as ordain what is righteous, and punish what is the reverse. Even as Hezekiah served Him, by destroying the groves and the temples of the idols, and the high places which had been built in violation of the commandments of God; or even as Josiah served Him, by doing the same things in his turn; or as the king of the Ninevites served Him, by compelling all the men of his city to make satisfaction to the Lord; or as Darius served Him, by giving the idol into the power of Daniel to be broken, and by casting his enemies into the den of lions; or as Nebuchadnezzar served Him, of whom I have spoken before, by issuing a terrible law to prevent any of his subjects from blaspheming God. In this way, therefore, kings can serve the Lord, even in so far as they are kings, when they do in His service what they could not do were they not kings.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Concerning%2520the%2520Correction%2520of%2520the%2520Donatists.html'
source_title="A Treatise Concerning the Correction of the Donatists (Letter 185), 19"

[[commentary]]
quote='''
"And now understand, you kings" [Psalm 2:10]. "And now;" that is, being now renewed, your covering of clay worn out, that is, the carnal vessels of error which belong to your past life, "now understand," you who now are "kings;" that is, able now to govern all that is servile and brutish in you, able now too to fight, not as "they who beat the air, but chastening your bodies, and bringing them into subjection." [1 Corinthians 9:26-27] "Be instructed, all you who judge the earth." This again is a repetition; "Be instructed" is instead of "understand;" and "you who judge the earth" instead of "you kings." For He signifies the spiritual by "those who judge the earth." For whatsoever we judge, is below us; and whatsoever is below the spiritual man, is with good reason called "the earth;" because it is defiled with earthly corruption.
'''
source_url='https://www.newadvent.org/fathers/1801002.htm'
source_title="Exposition on Psalm 2"
