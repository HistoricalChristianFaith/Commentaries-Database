[[commentary]]
quote='''
Nevertheless even the cross itself, if thou considerest it well, was a judgment-seat; for the Judge being set up in the middle, one thief who believed was delivered, the other who reviled was condemned. Already He signified what He is to do with the quick and the dead: some He will set on His right hand and others on His left. That thief was like those that shall be on the left hand, the other like those that shall be on the right. He was undergoing judgment, and He threatened judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252031.html'
source_title="TRACTATES ON JOHN 31.11"
