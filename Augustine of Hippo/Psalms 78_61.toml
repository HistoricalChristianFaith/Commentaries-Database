[[commentary]]
quote='''
"And He gave over unto captivity their strength, and their beauty unto the hands of the enemy." The very Ark whereby they thought themselves invincible, and whereon they plumed themselves, he calls their "virtue" and "beauty." Lastly, also afterward, when they were living ill, and boasting of the temple of the Lord, He does terrify them by a Prophet, saying, "See ye what I have done to Selom, where was My tabernacle." [Jeremiah 7:12]
'''
source_url='https://www.newadvent.org/fathers/1801078.htm'
source_title='Exposition on Psalm 78'
