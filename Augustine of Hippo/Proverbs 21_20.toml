[[commentary]]
quote='''
No doubt the animal is pronounced unclean by the law, because it does not chew the cud; which is not a fault but its nature. But the men of whom this animal is a symbol are unclean, not by nature, but from their own fault; because, though they gladly hear the words of wisdom, they never reflect on them afterwards. For to recall, in quiet repose, some useful instruction from the stomach of memory to the mouth of reflection, is a kind of spiritual rumination. The animals above mentioned are a symbol of those people who do not do this. And the prohibition of the flesh of these animals is a warning against this fault. Another passage of Scripture speaks of the precious treasure of wisdom, and describes ruminating as clean, and not ruminating as unclean: "A precious treasure resteth in the mouth of a wise man; but a foolish man swallows it up." Symbols of this kind, either in words or in things, give useful and pleasant exercise to intelligent minds in the way of inquiry and comparison. But formerly people were required not only to hear, but to practise many such things. For at that time it was necessary that, by deeds as well as by words, those things should be foreshadowed which were in after times to be revealed. After the revelation by Christ and in Christ, the community of believers is not burdened with the practice of the observances, but is admonished to give heed to the prophecy. This is our reason for accounting no animals unclean, in accordance with the saying of the Lord and of the apostle, while we are not opposed to the Old Testament, where some animals are pronounced unclean.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%25206.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 6:7"


[[commentary]]
quote='''
So those who hear and out of carelessness forget, so to say swallow what they have heard, so that they no longer have a taste of it in their mouth but just bury what they hear under forgetfulness. But those who meditate on "the law of the Lord day and night" are chewing the cud, as it were, and enjoying the flavor of the word with a kind of palate of the heart.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520149.html'
source_title="SERMON 149:4"
