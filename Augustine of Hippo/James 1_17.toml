[[commentary]]
quote='''
And I am never so much delighted in my treatment of a subject as when Scripture comes most copiously to my aid; and when the question to be discussed requires that "he that glorieth should glory in the Lord;" and that we should in all things lift up our hearts and give thanks to the Lord our God, from whom, "as the Father of lights, every good and every perfect gift cometh down." Now if a gift is not God's gift, because it is wrought by us, or because we act by His gift, then it is not a work of God that "a mountain should be removed into the sea," inasmuch as, according to the Lord's statement, it is by the faith of men that this is possible. Moreover, He attributes the deed to their actual operation: "If ye have faith in yourselves as a grain of mustard-seed, ye shall say unto this mountain, 'Be thou removed, and be thou cast into the sea; and it shall be done, and nothing shall be impossible to you.'" Observe how He said "to you," not "to Me" or "to the Father;" and yet it is certain that no man does such a thing without God's gift and operation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 63"


[[commentary]]
quote='''
You, therefore, ought also to hope for that perseverance in obedience from the Father of Lights, from whom cometh down every excellent gift and every perfect gift, and to ask for it in your daily prayers; and in doing this ought to trust that you are not aliens from the predestination of His people, because it is He Himself who bestows even the power of doing this. And far be it from you to despair of yourselves, because you are bidden to have your hope in Him, not in yourselves. For cursed is every one who has hope in man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520on%2520the%2520Predestination%2520of%2520the%2520Saints%2FBook%25202.html'
source_title="ON THE GIFT OF PERSEVERANCE 22.62"


[[commentary]]
quote='''
Man's merit is a free gift, and no one deserves to receive anything from the Father of lights, from whom every good gift comes down, except by receiving what he does not deserve.
'''
source_url=''
source_title="LETTERS 186"
