[[commentary]]
quote='''
The temptation of Peter, which took place during the time that the Lord was enduring these injuries, is not placed by all Evangelists in the same order. Matthew and Mark first narrate the injuries inflicted on the Lord and then this temptation of Peter. Luke first describes Peter’s temptation, and only after this does he record the reproaches borne by the Lord. John begins with Peter’s temptation but then introduces some verses that record what the Lord had to bear, appending the statement that the Lord was sent away from Annas to Caiaphas the high priest, and then at this point he resumes and sums up what he had been relating about Peter’s temptation in the house to which Jesus was first conducted. He then gives a full account of that incident and thereafter reverts to the succession of events that happened to the Lord, telling us how Jesus was brought to Caiaphas.
'''
source_url=''
source_title="HARMONY OF THE GOSPELS 3.6.21"

[[commentary]]
quote='''
(de Con. Evang. iii. vi) The temptation of Peter, which took place in the midst of the contumelies offered to our Lord, is not placed by all in the same order. Matthew and Mark put the contumelies first, the temptation of Peter afterwards; Luke the temptation first, the contumelies after. John begins with the temptation: And Simon Peter followed Jesus, and so did another disciple.

(Tr. cxiii) Who that other disciple was we cannot hastily decide, as his name is not told us. John however is wont to signify himself by this expression, with the addition of, whom Jesus loved. Perhaps therefore he is the one.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'
