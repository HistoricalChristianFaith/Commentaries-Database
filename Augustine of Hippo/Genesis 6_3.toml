[[commentary]]
quote='''
By the justice of God in some sense, the human race was delivered into the power of the devil; the sin of the first man passing over originally into all of both sexes in their birth through conjugal union, and the debt of our first parents binding their whole posterity. This delivering up is first signified in Genesis, where, when it had been said to the serpent, "Dust shalt thou eat," it was said to the man, "Dust thou art, and unto dust thou shall return." In the words, "Unto dust shalt thou return," the death of the body is fore-announced, because he would not have experienced that either, if he had continued to the end upright as he was made; but in that it is said to him whilst still living, "Dust thou art," it is shown that the whole man was changed for the worse. For "Dust thou art" is much the same as, "My spirit shall not always remain in these men, for that they also are flesh." Therefore it was at that time shown, that he was delivered to him, in that it had been said to him, "Dust shall thou eat."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252013.html'
source_title="On the Trinity 13.12.16"
