[[commentary]]
quote='''
The Lord, in that He came to the marriage to which He was invited, wished, apart from the mystical signification, to assure us that marriage was His own institution. For there were to be those of whom the apostle spoke, "forbidding to marry," and asserting that marriage was an evil, and of the devil's institution: notwithstanding the same Lord declares in the Gospel, on being asked whether it be lawful for a man to put away his wife for any cause, that it is not lawful save for the cause of fornication. In His answer, if you remember, He said, "What God hath joined together let not man put asunder." And they that are well instructed in the catholic faith know that God instituted marriage; and as the union of man and wife is from God, so divorce is from the devil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%25209.html'
source_title="TRACTATES ON JOHN 9.2"


[[commentary]]
quote='''
The Church of God, however, being meanwhile so constituted as to enclose much chaff and many tares, bears with many things; yet if anything be contrary to faith or to holy life, she does not approve of it either by silence or by practice. Accordingly, that which you wrote as to certain brethren abstaining from the use of animal food, on the ground of its being ceremonially unclean, is most clearly contrary to the faith and to sound doctrine. If I were to enter on anything like a full discussion of this matter, it might be thought by some that there was some obscurity in the precepts of the apostle in this matter whereas he, among many other things which he said on this subject, expressed his abhorrence of this opinion of the heretics in these words: "Now the Spirit speaketh expressly, that in the latter times some shall depart from the faith, giving heed to seducing spirits and doctrines of devils; speaking lies in hypocrisy; having their conscience seared with a hot iron; forbidding to marry, and commanding to abstain from meats, which God hath created to be received with thanksgiving of them which believe and know the truth. For every creature of God is good, and nothing to be refused, if it be received with thanksgiving: for it is sanctified by the word of God and prayer."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 55.19.35-20.36"
