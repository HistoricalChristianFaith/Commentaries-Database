[[commentary]]
quote='''
The "strong man" in this passage means the devil who was able to hold the human race in bondage. By his "goods," which Christ was coming to plunder, the devil was keeping for himself those who would in time become faithful, but had remained in the clutches of ungodliness and various sins. It was for the purpose of binding up this strong man that John, in the Apocalypse, saw "an angel coming down from heaven, having the key of the abyss and a great chain in his hand. And he laid hold on the dragon, the ancient serpent, who is the devil and Satan, and bound him for a thousand years." The angel checked and repressed his power to seduce and possess those destined to be set free.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520City%2520of%2520God%2FBook%252020.html'
source_title="City of God 20.7"

[[commentary]]
quote='''
And therefore He conquered the devil first by righteousness, and afterwards by power: namely, by righteousness, because He had no sin, and was slain by him most unjustly; but by power, because having been dead He lived again, never afterwards to die. But He would have conquered the devil by power, even though He could not have been slain by him: although it belongs to a greater power to conquer death itself also by rising again, than to avoid it by living. But the reason is really a different one, why we are justified in the blood of Christ, when we are rescued from the power of the devil through the remission of sins: it pertains to this, that the devil is conquered by Christ by righteousness, not by power. For Christ was crucified, not through immortal power, but through the weakness which He took upon Him in mortal flesh; of which weakness nevertheless the apostle says, "that the weakness of God is stronger than men."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252013.html'
source_title="ON THE TRINITY 13.14.18"

[[commentary]]
quote='''
It is not then difficult to see that the devil was conquered, when he who was slain by Him rose again. It is something more, and more profound of comprehension, to see that the devil was conquered when he thought himself to have conquered, that is, when Christ was slain. For then that blood, since it was His who had no sin at all, was poured out for the remission of our sins; that, because the devil deservedly held those whom, as guilty of sin, he bound by the condition of death, he might deservedly loose them through Him, whom, as guilty of no sin, the punishment of death undeservedly affected. The strong man was conquered by this righteousness, and bound with this chain, that his vessels might be spoiled, which with himself and his angels had been vessels of wrath while with him, and might be turned into vessels of mercy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252013.html'
source_title="ON THE TRINITY 13.15.19"
