[[commentary]]
quote='''
The Jews are wont to glory in this Psalm which we have sung, saying, "Known in Judaea is God, in Israel great is the name of Him:" and to revile the Gentiles to whom God is not known, and to say that to themselves alone God is known; seeing that the Prophet saith, "Known in Judaea is God." ...But God is known in very deed in Judaea, if they understand what is Judaea. For indeed God is not known except in Judaea. Behold even we say this, that except a person shall have been in Judaea, known to him God cannot be. But what saith the Apostle? He that in secret is a Jew, he that is so in circumcision of the heart, not in letter but in spirit. There are therefore Jews in circumcision of the flesh, and there are Jews in circumcision of the heart. ...They then are more truly Jews, who have been made Christians out of Jews: the rest of the Jews, who in Christ have not believed, have deserved to lose even the very name. The true Judaea, then, is the Church of Christ, believing in that King, who hath come out of the tribe of Judah through the Virgin Mary; believing in Him of whom the Apostle was just now speaking, in writing to Timothy, "Be thou mindful that Jesus Christ hath risen from the dead, of the seed of David, after my Gospel." For of Judah is David, and out of David is the Lord Jesus Christ. We believing in Christ do belong to Judah: and we acknowledge Christ. We, that with eyes have not seen, in faith do keep Him. Let not therefore the Jews revile, who are no longer Jews. ...

"Known in Judaea is God, in Israel great is the Name of Him" (ver. 1). Concerning Israel also we ought so to take it as we have concerning Judaea: as they were not the true Jews, so neither was that the true Israel. For what is Israel said to be? One seeing God. And how have they seen God, among whom He walked in the flesh; and while they supposed Him to be man, they slew Him? ..."In Israel great is His Name." Wilt thou be Israel? Observe that man concerning whom the Lord saith, "Behold an Israelite indeed, in whom guile is not." If a true Israelite is he in whom guile is not, the guileful and lying are not true Israelites. Let them not say then, that with them is God, and great is His name in Israel. Let them prove themselves Israelites, and I grant that "in Israel great is His Name."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252076.html'
source_title="Exposition on Psalm 76"
