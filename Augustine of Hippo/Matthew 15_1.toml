[[commentary]]
quote='''
(de Cons. Ev. ii. 49.) The Evangelist thus constructs the order of his narrative, Then came unto him, that, as appeared in the passage over the lake, the order of the events that followed that might be shewn.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
