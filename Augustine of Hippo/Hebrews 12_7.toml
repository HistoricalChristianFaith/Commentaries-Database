[[commentary]]
quote='''
Although the same word, indeed, is employed in a different sense, where any one suffers evils for his sins, that he may be corrected. Whence is that in the Epistle to the Hebrews, "For what son is he to whom the father giveth not discipline?" And this is still more apparent in the same epistle: "Now no chastening for the present seemeth to be joyous, but grievous: nevertheless afterward it yieldeth the peaceable fruit of righteousness unto them which are exercised thereby."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252014.html'
source_title="ON THE TRINITY 14.1.1"
