[[commentary]]
quote='''
"Many calves came about Me." The multitude of the wanton populace came about Me. "Fat bulls closed Me in" (ver. 12). And their leaders, glad at My oppression, "closed Me in."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252022.html'
source_title="Exposition on Psalm 22"
