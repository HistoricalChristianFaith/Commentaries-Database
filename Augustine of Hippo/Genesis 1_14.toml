[[commentary]]
quote='''
We should not interpret the signs as something other than times. For Scripture is now speaking of these times that by their distinct intervals convey to us that eternity remains immutable above them so that time might appear as a sign, that is, as a vestige of eternity. Likewise, when it adds, "and for days and for years," it shows of what times it is speaking. These days come about by the revolution of the fixed stars, and from this it becomes obvious when the sun completes its starry course in a particular year.
'''
source_url=''
source_title="ON THE LITERAL INTERPRETATION OF GENESIS 13.38"


[[commentary]]
quote='''
But who can fail to perceive how great is the difference between useful observations of the heavenly bodies in connection with the weather, such as farmers or sailors make; or in order to mark the part of the world in which they are, and the course which they should follow, such as are made by pilots of ships or men going through the trackless sandy deserts of southern Africa; or in order to present some useful doctrine under a figure borrowed from some facts concerning heavenly bodies;—and the vain hallucinations of men who observe the heavens not to know the weather, or their course, or to make scientific calculations, or to find illustrations of spiritual things, but merely to pry into the future and learn now what fate has decreed?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="Letters 55"
