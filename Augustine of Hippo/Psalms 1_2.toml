[[commentary]]
quote='''
"But his delight is in the law of the Lord, and in His law will he meditate by day and by night (ver. 2). The law is not made for a righteous man," says the Apostle. But it is one thing to be in the law, another under the law. Whoso is in the law, acteth according to the law; whoso is under the law, is acted upon according to the law: the one therefore is free, the other a slave. Again, the law, which is written and imposed upon the servant, is one thing; the law, which is mentally discerned by him who needeth not its "letter," is another thing. "He will meditate by day and by night," is to be understood either as without ceasing; or "by day" in joy, "by night" in tribulations. For it is said, "Abraham saw my day, and was glad:" and of tribulation it is said, "my reins also have instructed me, even unto the night."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%25201.html'
source_title="On the Psalms, Psalm 1"


[[commentary]]
quote='''
Yet, for my part, "I meditate in the law of the Lord," if not "day and night," at least such short times as I can; and I commit my meditations to writing, lest they should escape me through forgetfulness; hoping by the mercy of God that He will make me hold steadfastly all truths of which I feel certain; "but if in anything I be otherwise minded, that He will himself reveal even this to me," whether through secret inspiration and admonition, or through His own plain utterances, or through the reasonings of my brethren. This I pray for, and this my trust and desire I commit to Him, who is sufficiently able to keep those things which He has given me, and to render those which He has promised.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25201.html'
source_title="ON THE TRINITY 1:3.5"
