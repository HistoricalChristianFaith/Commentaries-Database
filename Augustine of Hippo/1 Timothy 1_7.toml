[[commentary]]
quote='''
Two walls must adhere to the cornerstone in order to preserve "the unity of the Spirit in the bond of peace"—one from the Jews and the other from the Gentiles. We mustn't let our minds be put off by the great number of reprobate Jews, among whom were the builders; those, that is, who "wished to be teachers of the law," but as the apostle says about them, "do not understand either what they are saying or the things about which they are making their assertions." It was as a result of this mental blindness, after all, that they rejected the stone which was put at the head of the corner. But it wouldn't be put at the head of the corner unless it offered to the two peoples coming from different points a peaceful joining, a coupling of grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520204.html'
source_title="SERMONS 204.3"

[[commentary]]
quote='''
Let us, then, love not ourselves, but Him; and in feeding His sheep, let us be seeking the things which are His, not the things which are our own. For in some inexplicable way, I know not what, every one that loveth himself, and not God, loveth not himself; and whoever loveth God, and not himself, he it is that loveth himself. For he that cannot live by himself will certainly die by loving himself; he therefore loveth not himself who loves himself to his own loss of life. But when He is loved by whom life is preserved, a man by not loving himself only loveth the more, when it is for this reason that he loveth not himself [namely] that he may love Him by whom he lives. Let not those, then, who feed Christ's sheep be "lovers of their own selves," lest they feed them as if they were their own, and not His, and wish to make their own gain of them, as "lovers of money;" or to domineer over them, as "boastful;" or to glory in the honors which they receive at their hands, as "proud;" or to go the length even of originating heresies, as "blasphemers;" and not to give place to the holy fathers, as those who are "disobedient to parents;" and to render evil for good to those who wish to correct them, because unwilling to let them perish, as "unthankful;" to slay their own souls and those of others, as "wicked;" to outrage the motherly bowels of the Church, as "irreligious;" to have no sympathy with the weak, as those who are "without affection;" to attempt to traduce the character of the saints, as "false accusers;" to give loose reins to the basest lusts, as "incontinent;" to make lawsuits their practice, as "implacable;" to know nothing of loving service, as those who are "without kindness;" to make known to the enemies of the godly what they are well aware ought to be kept secret, as "traitors;" to disturb human modesty by shameless discussions, as "heady;" to understand neither what they say nor whereof they affirm, as "blinded;" and to prefer carnal delights to spiritual joys, as those who are "lovers of pleasures more than lovers of God." For these and such like vices, whether all of them meet in a single individual, or whether some dominate in one and others in another, spring up in some form or another from this one root, when men are "lovers of their own selves."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%2520123.html'
source_title="TRACTATES ON JOHN 123.5"


[[commentary]]
quote='''
What, therefore, if the soul and spirit of a human being in like manner is given by God Himself, whenever it is given; and given, too, by propagation from its own kind? Now this is a position which I neither maintain nor refute. Nevertheless, if it must be defended or confuted, I certainly recommend its being done by clear, and not doubtful proofs. Nor do I deserve to be compared with senseless cattle because I avow myself to be as yet incapable of determining the question, but rather with cautious persons, because I do not recklessly teach what I know nothing about. But I am not disposed on my own part to return railing for railing and compare this man with brutes; but I warn him as a son to acknowledge that he is really ignorant of that which he knows nothing about; nor to attempt to teach that which he has not yet learnt, lest he should deserve to be compared with those persons whom the apostle mentions as "desiring to be teachers of the law, understanding neither what they say nor whereof they affirm."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Soul%2520and%2520Its%2520Origin%2FBook%25201.html'
source_title="On the Soul and Its Origin 1.16.26"
