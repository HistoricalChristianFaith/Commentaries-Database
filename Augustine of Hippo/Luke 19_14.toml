[[commentary]]
quote='''
(de Quæst. Ev. lib. ii. qu. 40.) And they sent a message after Him, because after His resurrection also, they persecuted His Apostles, and refused the preaching of the Gospel.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"
