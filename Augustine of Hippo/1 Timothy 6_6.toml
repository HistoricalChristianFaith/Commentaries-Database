[[commentary]]
quote='''
He, therefore, is truly happy who has all that he wishes to have, and wishes to have nothing which he ought not to wish.… But when men have obtained this health for themselves, and for those whom they love, are we at liberty to say that they are now happy? They have, it is true, something which it is quite becoming to desire; but if they have not other things which are greater, better, and more full both of utility and beauty, they are still far short of possessing a happy life.… Shall we then say, that in addition to this health of body men may desire for themselves and for those dear to them honour and power? By all means, if they desire these in order that by obtaining them they may promote the interest of those who may be their dependants. If they seek these things not for the sake of the things themselves, but for some good thing which may through this means be accomplished, the wish is a proper one; but if it be merely for the empty gratification of pride, and arrogance, and for a superfluous and pernicious triumph of vanity, the wish is improper. Wherefore, men do nothing wrong in desiring for themselves and for their kindred the competent portion of necessary things, of which the apostle speaks when he says: "Godliness with a competency is great gain; for we brought nothing into this world, and it is certain we can carry nothing out: and having food and raiment, let us be therewith content."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 130.5.11"


[[commentary]]
quote='''
I've been wagging a finger at the rich. Poor people, you listen too. You should pay out too; you shouldn't go plundering either. You should give of your means too. You too curb your greed. Listen, you poor, to the same apostle, "There is great gain," he says, "in godliness with contentment." You have the world in common with the rich. You don't have a house in common with the rich, but you do have the sky, you do have the light in common with them. Just look for a sufficiency, look for what is enough, not for more than that. Anything more is a weighing down, not a lifting up of the spirit; a burden, not a reward.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252085.html'
source_title="SERMONS 85.6"
