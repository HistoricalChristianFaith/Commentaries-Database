[[commentary]]
quote='''
I know it is written, "In the multitude of speech, thou shalt not escape sin." But O that I might speak only in preaching Thy word, and in praising Thee! Not only should I so flee from sin, but I should earn good desert, however much I so spake. For a man blessed of Thee would not enjoin a sin upon his own true son in the faith, to whom he wrote, "Preach the word: be instant in season, out of season." Are we to say that he has not spoken much, who was not silent about Thy word, O Lord, not only in season, but out of season? But therefore it was not much, because it was only what was necessary. Set me free, O God, from that multitude of speech which I suffer inwardly in my soul, wretched as it is in Thy sight, and flying for refuge to Thy mercy; for I am not silent in thoughts, even when silent in words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252015.html'
source_title="ON THE TRINITY 15:51"
