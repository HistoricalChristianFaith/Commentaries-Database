[[commentary]]
quote='''
Now, amidst this admirable correspondence, there is at least this very considerable diversity in the cases, in that the people in the earlier instance were deterred by a horrible dread from approaching the place where the law was given; whereas in the other case the Holy Ghost came upon them who were gathered together in expectation of His promised gift. There it was on tables of stone that the finger of God operated; here it was on the hearts of men. There the law was given outwardly, so that the unrighteous might be terrified; here it was given inwardly, so that they might be justified. For this, "Thou shalt not commit adultery, Thou shalt not kill, Thou shalt not covet; and if there be any other commandment,"—such, of course, as was written on those tables,—"it is briefly comprehended," says he, "in this saying, namely, Thou shalt love thy neighbour as thyself. Love worketh no ill to his neighbour: therefore love is the fulfilling of the law." Now this was not written on the tables of stone, but "is shed abroad in our hearts by the Holy Ghost, which is given unto us." God's law, therefore, is love. "To it the carnal mind is not subject, neither indeed can be;" but when the works of love are written on tables to alarm the carnal mind, there arises the law of works and "the letter which killeth" the transgressor; but when love itself is shed abroad in the hearts of believers, then we have the law of faith, and the spirit which gives life to him that loves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 17.29"


[[commentary]]
quote='''
For that same manifest bestowal of the Holy Spirit the Lord made, not once, but on two separate occasions. For close on the back of His resurrection from the dead He breathed on them and said, "Receive ye the Holy Spirit." And because He then gave [the Spirit], did He on that account fail in afterwards sending Him according to His promise? Or was it not the very same Spirit who was both then breathed upon them by Himself, and afterwards sent by Him from heaven? And so, why that same giving on His part which took place publicly, also took place twice, is another question: for it may be that this twofold bestowal of His in a public way took place because of the two Commandments of love, that is, to our neighbor and to God, in order that love might be impressively intimated as pertaining to the Holy Spirit. And if any other reason is to be sought for, we cannot at present allow our discourse to be improperly prolonged by such an inquiry: provided, however, it be admitted that, without the Holy Spirit, we can neither love Christ nor keep His commandments; while the less experience we have of His presence, the less also can we do so; and the fuller our experience, so much the greater our ability. Accordingly, the promise is no vain one, either to him who has not [the Holy Spirit], or to him who has. For it is made to him who has not, in order that he may have; and to him who has, that he may have more abundantly. For were it not that He was possessed by some in smaller measure than by others, St. Elisha would not have said to St. Elijah, "Let the spirit that is in thee be in a twofold measure in me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252074.html'
source_title="TRACTATES ON THE GOSPEL OF JOHN 74.2.2-3"
