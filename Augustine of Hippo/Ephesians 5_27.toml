[[commentary]]
quote='''
For in this sense must be understood that which the apostle whom we have so often quoted says elsewhere: "Christ loved the Church, and gave Himself for it; that He might sanctify and cleanse it by the washing of water by the word that He might present it to Himself a glorious Church, not having spot, or wrinkle, or any such thing." It must, I say, be understood as implying, that by this laver of regeneration and word of sanctification all the evils of regenerate men of whatever kind are cleansed and healed,—not the sins only which are all now remitted in baptism, but those also which after baptism are committed by human ignorance and frailty; not, indeed, that baptism is to be repeated as often as sin is repeated, but that by its one only ministration it comes to pass that pardon is secured to the faithful of all their sins both before and after their regeneration.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Marriage%2520and%2520Concupiscence%2FBook%25201.html'
source_title="ON MARRIAGE AND CONCUPISCENCE 1.38"
