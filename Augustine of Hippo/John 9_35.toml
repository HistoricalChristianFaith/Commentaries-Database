[[commentary]]
quote='''
Surely God hears sinners. But the one who spoke these words had not yet washed the face of his heart with the waters of Siloam. The sacrament had preceded in his eyes; but the effect of grace had not yet occurred in his heart. When did this blind man wash the face of his heart? When the Lord, having sent him out by the Jews, brought him to Himself. For He found him and said to him, as we have heard: "Do you believe in the Son of God?" And he replied, "Who is He, Lord, that I might believe in Him?" Surely he already saw with his eyes, but with his heart? Not yet. Wait: he would soon see. Jesus answered him, "I am He, who speaks with you." Did he doubt? Immediately he washed his face. For He spoke with him, Siloam, which is interpreted as "Sent." Who is sent but Christ, who often testified, saying: "I do the will of my Father who sent me." Therefore, He was Siloam. The blind man approached with his heart, heard, believed, worshipped: he washed his face, he saw.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520136.html'
source_title="Sermon 136"

[[commentary]]
quote='''
But, as I have already said before, brethren, when they expel, the Lord receiveth; for the rather that he was expelled, was he made a Christian. "Jesus heard that they had cast him out; and when He had found him, He said unto him, Dost thou believe on the Son of God?" Now He washes the face of his heart. "He answered and said," as one still only anointed, "Who is he, Lord, that I might believe on him? And Jesus said unto him, Thou hast both seen Him, and it is He that talketh with thee." The One is He that is sent; the other is one washing his face in Siloam, which is interpreted, Sent. And now at last, with the face of his heart washed, and a conscience purified, acknowledging Him not only as the son of man, which he had believed before, but now as the Son of God, who had assumed our flesh, "he said, Lord, I believe." It is but little to say, "I believe:" wouldst thou also see what he believes Him? "He fell down and worshipped Him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252044.html'
source_title="Tractates on John 44"
