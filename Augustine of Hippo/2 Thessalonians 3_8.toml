[[commentary]]
quote='''
Unless any one have the boldness to imagine or to affirm, that the Apostle Paul attained not to the perfection of those who left all and followed Christ, seeing that, in order not to become a burden to any of those to whom he preached the gospel, he worked with his own hands for his support: wherein we find rather the fulfillment of his own words, "I labored more abundantly than they all;" and to which he added, "yet not I, but the grace of God that was with me:" to make it manifest that this also was to be imputed to the grace of God, that both with mind and body he was able to labor so much more abundantly than they all, that he neither ceased from preaching the gospel, nor drew, like them, his present support out of the gospel; while he was sowing it much more widely and fruitfully through multitudes of nations where the name of Christ had never previously been proclaimed. Whereby he showed that living, that is, deriving their subsistence, by the gospel, was not imposed on the apostles as a necessity, but conferred on them as a power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%2520122.html'
source_title="TRACTATES ON JOHN 122.3"


[[commentary]]
quote='''
Of course, there are those who misunderstand the same apostle when he writes, "He who was apt to steal, let him steal no longer; but let him labor, doing good with his hands, that he may have something to give to one who has need." For, when he is ordering such persons to work so efficiently with their hands that they will also have something to bestow on others, his misinterpreters believe that he is going counter to the instruction which the Lord gives when he says, "Look at the birds of the air: they do not sow, or reap, or gather into barns.… Consider the lilies of the field: They neither toil nor spin." Paul does not seem to have imitated the birds of the air and lilies of the field. He has repeatedly said of himself that he was working with his own hands so as not to burden anyone, and it is written of him that he joined with Aquila because of the similarity of their handicraft, so that they might work together to maintain a livelihood. From these and other such passages of the Scripture it is clear enough that our Lord does not reprove a man for procuring these things in the usual manner.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOUR%2520LORD%2527S%2520SERMON%2520ON%2520THE%2520MOUNT%2FBook%25202.html'
source_title="SERMON ON THE MOUNT 2.17.57"
