[[commentary]]
quote='''
"Bringing forth grass for the cattle, and green herb for the service of men" [Psalm 104:14]. This is true, I perceive; I recognise the creation: the earth doth bring forth grass for the cattle, and green herb for the service of men. But I perceive the words, "Thou shall not muzzle the mouth of the ox which treadeth out the corn: Doth God take care for oxen? For our sakes therefore the Scripture saith it." How then doth the earth bring forth grass for the cattle? Because "the Lord hath ordained that they which preach the Gospel should live of the Gospel." He sent preachers, saying unto them, "Eat such things as are set before you of them: for the labourer is worthy of his hire." ...They give spiritual, they receive carnal things; they give gold, they receive grass. ..."If we have sown unto you spiritual things, is it a great matter if we shall reap your carnal things?" This the Apostle said, a preacher so laborious, so indefatigable, so well tried, that he giveth this very grass to the earth. "Nevertheless," he saith, "we have not used this power." He showeth that it is due to him, yet he received it not; nor hath he condemned those who have received what was due. For those were to be condemned who exact what is not due, not they who accept their recompense: yet he gave up even his own recompense. Thou dost not cease to owe to another, because one hath given up his dues, otherwise thou wilt not be the watered earth which bringeth forth grass for the cattle. ...Thou receivest spiritual things, give carnal things in return: to the soldier they are due, to the soldier thou returnest them; thou art the paymaster of Christ. "Who goeth a warfare any time at his own charges? who planteth a vineyard, and eateth not of the fruit thereof? or who feedeth a flock, and eateth not of the milk of the flock? I speak not thus, that it should be so done unto me." There has been such a soldier as gave up his rations of food even to the paymaster: yet let the paymaster pay the rations.

..."That it may bring forth bread out of the earth." What bread? Christ. Out of what earth? From Peter, from Paul, from the other stewards of the truth. Hear that it is from the earth: "We have," saith St. Paul, "this treasure in earthen vessels, that the excellency of the power may be of God, and not of us." He is the bread who descended from heaven, that He might be brought forth out of the earth, when He is preached through the flesh of His servants. The earth bringeth forth grass, that it may bring forth bread from the earth. What earth bringeth forth grass? Pious, holy nations. That bread may be brought forth out of what earth? The word of God out of the Apostles, out of the stewards of God's Sacraments, who still walk upon the earth, who still carry an earthly body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520104.html'
source_title="Exposition on Psalm 104"
