[[commentary]]
quote='''
Considering the signs mentioned by Gospel and prophecy which we see happening, would anyone deny that we ought to hope for the coming of the Lord? Manifestly, it is nearer and nearer every day. But the exact span of the nearness, that, as we said, "is not for you to know." Notice when the apostle said this, "For our salvation is nearer than when we believed. The night is past and the day is at hand," and look how many years have passed! Yet, what he said was not untrue. How much more probable is it to say now that the coming of the Lord is near when there has been such an increase of time toward the end! Certainly the apostle said, "The Spirit manifestly says that in the last times some shall depart from the faith." Obviously, those were not yet the times of heretics such as he describes them in the same sentence, but they have now come. According to this, we seem to be in the last times, and the heretics seem to be a warning of the end of the world.
'''
source_url=''
source_title="LETTERS 199.8.22"


[[commentary]]
quote='''
Assuredly there are predictions of the Manichaeans, less clear in the prophets, and most explicit in the apostle. For example: "The Spirit," he says, "speaketh expressly, that in the last times some shall depart from the faith, giving heed to seducing spirits, and to doctrines of devils, speaking lies in hypocrisy, having their conscience seared, forbidding to marry, abstaining from meats, which God has created to be received with thanksgiving by believers, and those who know the truth. For every creature of God is good, and nothing to be refused, if it be received with thanksgiving." The fulfillment of this in the Manichaeans is as clear as day to all that know them, and has already been proved as fully as time permits.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FReply%2520to%2520Faustus%2520the%2520Manichaean%2FBook%252015.html'
source_title="REPLY TO FAUSTUS THE MANICHAEAN 15.10"
