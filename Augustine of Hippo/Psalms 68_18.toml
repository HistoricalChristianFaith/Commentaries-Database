[[commentary]]
quote='''
Paul the apostle also says, "To each of us is given grace according to the measure of the gift of Christ;" and then, that he might show that by the gift of Christ he meant the Holy Spirit, he has gone on to add, "Wherefore He saith, He hath ascended up on high, He hath led captivity captive, and hath given gifts to men." And every one knows that the Lord Jesus, when He had ascended into heaven after the resurrection from the dead, gave the Holy Spirit, with whom they who believed were filled, and spake with the tongues of all nations. And let no one object that he says gifts, not gift: for he quoted the text from the Psalm. And in the Psalm it is read thus, "Thou hast ascended up on high, Thou hast led captivity captive, Thou hast received gifts in men." For so it stands in many Mss., especially in the Greek Mss., and so we have it translated from the Hebrew. The apostle therefore said gifts, as the prophet did, not gift. But whereas the prophet said, "Thou hast received gifts in men," the apostle has preferred saying, "He gave gifts to men:" and this in order that the fullest sense may be gathered from both expressions, the one prophetic, the other apostolic; because both possess the authority of a divine utterance. For both are true, as well that He gave to men, as that He received in men. He gave to men, as the head to His own members: He Himself that gave, received in men, no doubt as in His own members; on account of which, namely, His own members, He cried from heaven, "Saul, Saul, why persecutest thou me?" And of which, namely, His own members, He says, "Since ye have done it to one of the least of these that are mine, ye have done it unto me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252015.html'
source_title="ON THE TRINITY 15:5.34"
