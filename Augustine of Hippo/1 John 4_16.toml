[[commentary]]
quote='''
Therefore the Holy Spirit, whatever it is, is something common both to the Father and Son. But that communion itself is consubstantial and co-eternal; and if it may fitly be called friendship, let it be so called; but it is more aptly called love. And this is also a substance, since God is a substance, and "God is love," as it is written. ... And therefore they are not more than three: One who loves Him who is from Himself, and One who loves Him from whom He is, and Love itself. And if this last is nothing, how is "God love"? If it is not substance, how is God substance?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.5.7"

[[commentary]]
quote='''
But when we came to treat of love, which in the Holy Scriptures is called God, then a trinity began to dawn upon us a little, i.e. one that loves, and that which is loved, and love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252015.html'
source_title="ON THE TRINITY 15.10"

[[commentary]]
quote='''
"And we have known and believed the love which God hath in us." And again, by what hast thou come to know this? "Love is God." He hath already said it above, behold he saith it again. Love could not be more exceedingly commended to thee than that it should be called God. Haply thou wast ready to despise a gift of God. And dost thou despise God? "Love is God: and he that dwelleth in love dwelleth in God, and God dwelleth in him." Each mutually inhabiteth the other; He that holdeth, and he that is holden. Thou dwellest in God, but that thou mayest be holden: God inhabiteth thee, but that He may hold thee, lest thou fall. Lest haply thou imagine that thou becomest an house of God in such sort as thine house supports thy flesh: if the house in which thou art withdraw itself from under thee, thou fallest; but if thou withdraw thyself, God falleth not. When thou forsakest Him, He is none the less; when thou hast returned unto Him, He is none the greater. Thou art healed, on Him thou wilt bestow nothing; thou art made clean, thou art new-made, thou art set right: He is a medicine to the unhealthy, is a rule for the crooked, is light for the bedarkened, is an habitation for the deserted. All therefore is conferred on thee: see thou imagine not that ought is conferred upon God by thy coming unto Him: no, not so much as a slave.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTen%2520Homilies%2520on%2520the%2520First%2520Epistle%2520of%2520John%2FHomily%25208.html'
source_title="Ten Homilies on 1 John 8"