[[commentary]]
quote='''
Now, certainly, it is written most clearly in the Epistle to the Hebrews, when the dispensation of the New Testament was to be distinguished from the dispensation of the Old, according to the fitness of ages and of times, that not only those visible things, but also the word itself, was wrought by angels. For it is said thus: "But to which of the angels said He at any time, Sit on my right hand, until I make thine enemies thy footstool? Are they not all ministering spirits, sent forth to minister for them who shall be heirs of salvation?" Whence it appears that all those things were not only wrought by angels, but wrought also on our account, that is, on account of the people of God, to whom is promised the inheritance of eternal life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 11.22"
