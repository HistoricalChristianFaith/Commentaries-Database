[[commentary]]
quote='''
"Thou hatest them that hold to vanity uselessly." Thou hatest them that hold to the false happiness of the world. "But I have trusted in the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252031.html'
source_title="Exposition on Psalm 31"
