[[commentary]]
quote='''
"He smote their vines also and fig-trees; and brake every tree of their coasts" (ver. 33). This was done by the violence of the hail, and by lightnings; whence he spoke of the fire as "burning."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520105.html'
source_title="On the Psalms, Psalm 105"
