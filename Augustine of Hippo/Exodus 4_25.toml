[[commentary]]
quote='''
If I had been a Jew in the times of the ancient people, when there was nothing better to be, I would surely have accepted circumcision. That "seal of the justice of the faith" had so much power at that time, before it was rendered void by the coming of the Lord, that the angel would have strangled the infant son of Moses if his mother had not taken up a stone and circumcised the child and thus by this sacrament warded off his imminent destruction. This sacrament even tamed the river Jordan and reduced it to a brook. The Lord himself received this sacrament after birth, although on the cross he made it void.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTER 23"

[[commentary]]
quote='''
Why, therefore, was it commanded him that he should circumcise every male child in order on the eighth day, though it could not yet believe with the heart, that it should be counted unto it for righteousness, because the sacrament in itself was of great avail? And this was made manifest by the message of an angel in the case of Moses' son; for when he was carried by his mother, being yet uncircumcised, it was required, by manifest present peril, that he should be circumcised, and when this was done, the danger of death was removed. As therefore in Abraham the justification of faith came first, and circumcision was added afterwards as the seal of faith; so in Cornelius the spiritual sanctification came first in the gift of the Holy Spirit, and the sacrament of regeneration was added afterwards in the laver of baptism.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Baptism%2FBook%25204.html'
source_title="ON BAPTISM 4.24.32"


[[commentary]]
quote='''
Now there was a forecast of His coming undoubtedly contained not only in other sacred institutions of the ancient Jews, but also in their circumcision of the foreskin. For the eighth day, in the recurrence of weeks, became the Lord's day, on which the Lord arose from the dead; and Christ was the rock whence was formed the stony blade for the circumcision; and the flesh of the foreskin was the body of sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520on%2520the%2520Grace%2520of%2520Christ%252C%2520and%2520on%2520Original%2520Sin%2FBook%25202.html'
source_title="ON THE GRACE OF CHRIST AND ORIGINAL SIN 2.31.36"
