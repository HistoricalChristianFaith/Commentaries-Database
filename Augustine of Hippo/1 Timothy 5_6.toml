[[commentary]]
quote='''
And there is a death which the apostle denounces, saying of the widow, "But she that liveth in pleasure is dead while she liveth." Therefore the soul, which was before ungodly and is now godly, is said to have come alive again from the dead and to live, on account of the righteousness of faith. But the body is not only said to be about to die, on account of that departure of the soul which will be; but on account of the great infirmity of flesh and blood it is even said to be now dead, in a certain place in the Scriptures, namely, where the apostle says, that "the body is dead because of sin, but the spirit is life because of righteousness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4.3.5"
