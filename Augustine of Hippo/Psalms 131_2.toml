[[commentary]]
quote='''
"If I had not lowly thoughts, but have lifted up my soul, as one taken from his mother's breast, such the reward for my soul" [Psalm 131:2]. He seemeth as it were to have bound himself by a curse: ...as though he had been going to say, Let it so happen to me. "As one taken away from his mother's breast, may be my soul's reward." Ye know that the Apostle saith to some weak brethren, "I have fed you with milk, and not with meat; for hitherto ye were not able to bear it, neither yet now are ye able." [1 Corinthians 3:2] There are weak persons who are not fit for strong meat; they wish to grasp at that which they cannot receive: and if they ever do receive, or seem to themselves to receive what they have not received, they are puffed up thereby, and become proud thereupon; they seem to themselves wise men. Now this happeneth to all heretics; who since they were animal and carnal, by defending their depraved opinions, which they could not see to be false, were shut out of the Catholic Church. ...

...It has been evidently explained, my brethren, where God would have us to be humble, where lofty. Humble, in order to provide against pride; lofty, to take in wisdom. Feed upon milk, that thou mayest be nourished; be nourished, so that thou mayest grow; grow, so that thou mayest eat bread. But when thou hast begun to eat bread, thou wilt be weaned, that is, thou wilt no longer have need of milk, but of solid food. This he seemeth to have meant: "If I had not lowly thoughts, but have lifted up my soul:" that is, if I was not an infant in mind, I was in wickedness. In this sense, he said before, "Lord, my heart was not lifted up, nor mine eyes raised on high: I do not exercise myself in great matters, nor in wonderful things above me." Behold, in wickedness I am an infant. But since I am not an infant in understanding, "If I had not lowly thoughts, but have lifted up my soul," may that reward be mine which is given unto the infant that is weaned from his mother, that I may at length be able to eat bread.

...For it is not an infant, but a grown child that is taken away from milk; he who is weak in his earliest infancy, which is his true infancy, is upon his mother's breast: if perchance he hath been taken away from the milk, he perisheth. It is not without a reason then that it is added, "Upon his mother's breast." For all may be weaned by growing. He who groweth, and is thus taken away from milk, it is good for him; but hurtful for him who is still upon his mother's breast. We must therefore beware, my brethren, and be fearful, lest any one be taken away from milk before his time. ...Let him not therefore wish to lift up his soul, when perchance he is not fit to take meat, but let him fulfil the commandments of humility. He hath wherein he may exercise himself: let him believe in Christ, that he may understand Christ. He cannot see the Word, he cannot understand the equality of the Word with the Father, he cannot as yet see the equality of the Holy Spirit with the Father and the Word; let him believe this, and suck it. He is safe, because, when he hath grown, he will eat, which he could not do before he grew by sucking: and he hath a point to stretch towards. Seek not out the things that are too hard for thee, and search not the things that are above thy strength; that is, things which thou art not as yet fit to understand. And what am I to do? thou repliest. Shall I remain thus? "But what things the Lord hath commanded thee, think thereupon always." What hath the Lord commanded thee? Do works of mercy, part not with the peace of the Church, place not thy trust in man, tempt not God by longing for miracles. ...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520131.html'
source_title="Exposition on Psalm 131"
