[[commentary]]
quote='''
Nor let us be disturbed by what he wrote to the Philippians: "Touching the righteousness which is in the law, one who is without blame." For he could be within in evil affections a transgressor of the law, and yet fulfil the open works of the law, either by the fear of men or of God Himself; but by terror of punishment, not by love and delight in righteousness. For it is one thing to do good with the will of doing good, and another thing to be so inclined by the will to do evil, that one would actually do it if it could be allowed without punishment. For thus assuredly he is sinning within in his will itself, who abstains from sin not by will but by fear. And knowing himself to have been such in these his internal affections, before the grace of God which is through Jesus Christ our Lord, the apostle elsewhere confesses this very plainly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25201.html'
source_title="ON TWO LETTERS OF PELAGIUS 1.15"
