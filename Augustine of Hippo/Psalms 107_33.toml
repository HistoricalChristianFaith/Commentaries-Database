[[commentary]]
quote='''
...What then did God, resisting the proud, but giving grace to the humble; cutting off the natural branches for their pride; grafting in the wild olive for its humility?

"He made the rivers a wilderness" (ver. 33). Waters did run there, prophecies were in course. Seek now a prophet among the Jews; thou findest none. For "He made the outgoings of waters to be thirst." Let them say, "Now there is no prophet more, and He will not know us any more."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520107.html'
source_title="Exposition on Psalm 107"
