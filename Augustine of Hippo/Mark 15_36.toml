[[commentary]]
quote='''
Among the rest that was prophesied of Him, it is also written: "They gave me gall for meat, and in my thirst they gave me vinegar to drink." How this happened, we know from the Gospel. First, they gave Him gall; He received it, tasted it, and spat it out. Thereafter, as He hung on the cross, that all that was foretold might be fulfilled, He said, "I thirst." They took a sponge filled with vinegar, bound it to a reed, and put it to His mouth; He received it, and said, "It is finished." What did that mean? All things which were prophesied before my death are completed, then what do I here any longer? In a word, when He said "It is finished," He bowed His head, and gave up the ghost.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252037.html'
source_title="TRACTATES ON JOHN 37.9"

[[commentary]]
quote='''
(ubi sup.) Matthew has not related, that the man who brought the sponge filled with vinegar, but that the others spoke about Elias; from whence we gather that both said it.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
