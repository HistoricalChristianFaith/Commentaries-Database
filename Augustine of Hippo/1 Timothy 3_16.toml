[[commentary]]
quote='''
But when the fullness of time was come, she [Wisdom] was sent, not to fill angels, nor to be an angel, except in so far as she announced the counsel of the Father, which was her own also; nor, again, to be with men or in men, for this too took place before, both in the fathers and in the prophets; but that the Word itself should be made flesh, that is, should be made man. In which future mystery, when revealed, was to be the salvation of those wise and holy men also, who, before He was born of the Virgin, were born of women; and in which, when done and made known, is the salvation of all who believe, and hope, and love. For this is "the great mystery of godliness, which was manifest in the flesh, justified in the Spirit, seen of angels, preached unto the Gentiles, believed on in the world, received up into glory."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4.20.27"
