[[commentary]]
quote='''
This is the reason, if I am not mistaken, why in the above-mentioned Prophet Ezekiel a certain most haughty person is asked, "Art thou then wiser than Daniel?" Nor on this point can that be possibly said which some contend for in opposition to the Lord's Prayer: "For although," they say, "that prayer was offered by the apostles, after they became holy and perfect, and had no sin whatever, yet it was not in behalf of their own selves, but of imperfect and still sinful men that they said, 'Forgive us our debts, as we also forgive our debtors.' They used the word our," they say, "in order to show that in one body are contained both those who still have sins, and themselves, who were already altogether free from sin." Now this certainly cannot be said in the case of Daniel, who (as I suppose) foresaw as a prophet this presumptuous opinion, when he said so often in his prayer, "We have sinned;" ... but he expresses himself in language so distinct and precise, as if he were full of the distinction himself, and wanted above all things to commend it to our notice: "My sins," says he, "and the sins of my people." Who can gainsay such evidence as this, but he who is more pleased to defend what he thinks than to find out what he ought to think?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Merits%2520and%2520Forgiveness%2520of%2520Sins%252C%2520and%2520on%2520the%2520Baptism%2520of%2520Infants%2FBook%25202.html'
source_title="ON THE MERITS AND FORGIVENESS OF SINS AND ON INFANT BAPTISM 2:13.10"


[[commentary]]
quote='''
Can anyone claim to be without sin, when Daniel confesses his own sins? I mean, some proud person or other was asked through the prophet Ezekiel, "Are you wiser than Daniel?" Again, the prophet also placed this Daniel among the three holy men in whom God signifies the three sorts of human beings he is going to deliver when the great tribulation comes on the human race.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520397.html'
source_title="SERMON 397:1"


[[commentary]]
quote='''
Nay, can we be better men than Daniel himself, concerning whom God, speaking to the prince of Tyre, says by the prophet Ezekiel, "Art thou wiser than Daniel?" who also is placed among the three righteous men to whom alone God saith that He would grant deliverance,—pointing, doubtless, in them to three representative righteous men,—declaring that he would deliver only Noah, Daniel, and Job, and that they should save along with themselves neither son nor daughter, but only their own souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 111"
