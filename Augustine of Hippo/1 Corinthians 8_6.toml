[[commentary]]
quote='''
You have made not only what is created and formed but also whatever can be created and formed. Everything which is formed from the formless must first be formless before it can be a formed thing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FConfessions%2FBook%252012.html'
source_title="Confessions 12.19"

[[commentary]]
quote='''
Also, when the same apostle says, "But to us there is but one God, the Father, of whom are all things, and we in Him; and one Lord Jesus Christ, by whom are all things, and we by Him," who can doubt that he speaks of all things which are created; as does John, when he says, "All things were made by Him"? I ask, therefore, of whom he speaks in another place: "For of Him, and through Him, and in Him, are all things: to whom be glory for ever. Amen." For if of the Father, and the Son, and the Holy Spirit, so as to assign each clause severally to each person: of Him, that is to say, of the Father; through Him, that is to say, through the Son; in Him, that is to say, in the Holy Spirit,—it is manifest that the Father, and the Son, and the Holy Spirit is one God, inasmuch as the words continue in the singular number, "To whom be glory for ever."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25201.html'
source_title="ON THE TRINITY 1.13"
