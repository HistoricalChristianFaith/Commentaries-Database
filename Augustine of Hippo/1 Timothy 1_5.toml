[[commentary]]
quote='''
The end of all divine Scriptures is the love for the Being in which we should rejoice and love for the being that can rejoice with us in that love. … Whoever … thinks that he understands the divine Scriptures or any part of them so that it does not build the double love of God and of our neighbor does not understand it at all. Whoever finds a lesson there useful to the building of charity, even though he has not said what the author may be shown to have intended in that place, has not been deceived.… But anyone who understands in the Scriptures something other than that intended by them is deceived, although they do not lie.
'''
source_url='https://www.newadvent.org/fathers/12021.htm'
source_title="ON CHRISTIAN DOCTRINE 1.35.39-1.36.40-41"

[[commentary]]
quote='''
When all these things have been said and considered, I am unwilling to contend about words, for such contention is profitable for nothing but the subverting of the hearer. But the law is profitable for edification if one uses it lawfully. For the end of the law "is love out of a pure heart, and a good conscience and faith unfeigned." And our Master knew it well, for it was on these two commandments that he hung all the law and the prophets.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FConfessions%2FBook%252012.html'
source_title="Confessions 12.18"

[[commentary]]
quote='''
For where are there those three, in order to build up which in the mind the whole apparatus of the divine Scriptures has been raised up, namely Faith, Hope, and Charity, except in a mind believing what it does not yet see, and hoping and loving what it believes? Even He therefore who is not known, but yet is believed, can be loved. But indisputably we must take care, lest the mind believing that which it does not see, feign to itself something which is not, and hope for and love that which is false. For in that case, it will not be charity out of a pure heart, and of a good conscience, and of faith unfeigned, which is the end of the commandment, as the same apostle says.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.4.6"

[[commentary]]
quote='''
When anyone knows the end of the commandments to be charity "from a pure heart, and a good conscience and an unfeigned faith" and has related all of his understanding of the divine Scriptures to these three, he may approach the treatment of these books with security. For when he says "charity" he adds "from a pure heart," so that nothing else would be loved except that which should be loved. And he joins with this "a good conscience" for the sake of hope, for he in whom there is the smallest taint of bad conscience despairs of attaining that which he believes in and loves. Third, he says "an unfeigned faith." If our faith involves no lie, then we do not love that which is not to be loved, and living justly, we hope for that which will in no way deceive our hope.
'''
source_url='https://www.newadvent.org/fathers/12021.htm'
source_title="ON CHRISTIAN DOCTRINE 1.40.44"

[[commentary]]
quote='''
But when the sight shall have come which is promised anew to us face to face, we shall see this not only incorporeal but also absolutely indivisible and truly unchangeable Trinity far more clearly and certainly than we now see its image which we ourselves are: and yet they who see through this glass and in this enigma, as it is permitted in this life to see, are not those who behold in their own mind the things which we have set in order and pressed upon them; but those who see this as if an image, so as to be able to refer what they see, in some way be it what it may, to Him whose image it is, and to see that also by conjecturing, which they see through the image by beholding, since they cannot yet see face to face. For the apostle does not say, We see now a glass, but, We see now through a glass. They, then, who see their own mind, in whatever way that is possible, and in it that Trinity of which I have treated as I could in many ways, and yet do not believe or understand it to be an image of God, see indeed a glass, but do not so far see through the glass Him who is now to be seen through the glass, that they do not even know the glass itself which they see to be a glass, i.e. an image. And if they knew this, perhaps they would feel that He too whose glass this is, should by it be sought, and somehow provisionally be seen, an unfeigned faith purging their hearts, that He who is now seen through a glass may be able to be seen face to face. And if they despise this faith that purifies the heart, what do they accomplish by understanding the most subtle disputes concerning the nature of the human mind, unless that they be condemned also by the witness of their own understanding?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252015.html'
source_title="ON THE TRINITY 15.23.44-15.24.44"


[[commentary]]
quote='''
You have now, if I am not mistaken, an answer to two questions—what kind of person you ought to be if you would pray, and what things you should ask in prayer; and the answer has been given not by my teaching, but by His who has condescended to teach us all. A happy life is to be sought after, and this is to be asked from the Lord God. Many different answers have been given by many in discussing wherein true happiness consists; but why should we go to many teachers, or consider many answers to this question? It has been briefly and truly stated in the divine Scriptures, "Blessed is the people whose God is the Lord." That we may be numbered among this people, and that we may attain to beholding Him and dwelling for ever with Him, "the end of the commandment is, charity out of a pure heart, and of a good conscience, and of faith unfeigned."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 130.13.24"
