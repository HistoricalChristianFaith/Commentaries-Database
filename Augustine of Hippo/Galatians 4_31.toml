[[commentary]]
quote='''
Let us, therefore, choose whether to call the righteous men of old the children of the bondwoman or of the free. Be it far from us to say, of the bondwoman; therefore if of the free, they pertain to the new testament in the Holy Spirit, whom, as making alive, the apostle opposes to the killing letter. For on what ground do they not belong to the grace of the new testament, from whose words and looks we convict and rebut such most frantic and ungrateful enemies of the same grace as these?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25203.html'
source_title="AGAINST TWO LETTERS OF PELAGIUS 3.12"
