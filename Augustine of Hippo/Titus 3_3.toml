[[commentary]]
quote='''
Nor let us be disturbed by what he wrote to the Philippians: "Touching the righteousness which is in the law, one who is without blame." For he could be within in evil affections a transgressor of the law, and yet fulfil the open works of the law, either by the fear of men or of God Himself; but by terror of punishment, not by love and delight in righteousness.… And knowing himself to have been such in these his internal affections, before the grace of God which is through Jesus Christ our Lord, the apostle elsewhere confesses this very plainly.… Again to Titus he says: "For we ourselves also were sometime foolish and unbelieving, erring, serving various lusts and pleasures, living in malice and envy, hateful, and holding one another in hatred." Such was Saul when he says that he was, touching the righteousness which is in the law, without reproach. For that he had not pressed on in the law, and changed his character so as to be without reproach after this hateful life, he plainly shows in what follows, when he says that he was not changed from these evils except by the grace of the Saviour.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25201.html'
source_title="AGAINST TWO LETTERS OF THE PELAGIANS 1.9.15"
