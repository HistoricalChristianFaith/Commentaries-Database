[[commentary]]
quote='''
What, then, is the path of duty, seeing that it often happens that if you inflict punishment on one he goes to destruction; whereas, if you leave him unpunished, another is destroyed? I confess that I make mistakes daily in regard to this, and that I know not when and how to observe the rule of Scripture: "Them that sin rebuke before all, that others may fear;" and that other rule, "Tell him his fault between thee and him alone;" and the rule, "Judge nothing before the time;" "Judge not, that ye be not judged."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 95"


[[commentary]]
quote='''
Who is the hireling that seeth the wolf coming, and fleeth? He that seeketh his own, not the things which are Jesus Christ's. He is one that does not venture plainly to rebuke an offender. Look, some one or other has sinned—grievously sinned; he ought to be rebuked, to be excommunicated: but once excommunicated, he will turn into an enemy, hatch plots, and do all the injury he can. At present, he who seeketh his own, not the things that are Jesus Christ's, in order not to lose what he follows after, the advantages of human friendship, and incur the annoyances of human enmity, keeps quiet and does not administer rebuke. See, the wolf has caught a sheep by the throat; the devil has enticed a believer into adultery: thou holdest thy peace—thou utterest no reproof. O hireling, thou hast seen the wolf coming and hast fled!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252046.html'
source_title="TRACTATES ON JOHN 46.8"
