[[commentary]]
quote='''
For without this love, wherewith we are commanded to love even our enemies and persecutors, who can fully carry out those things which are mentioned above? Moreover, the perfection of that mercy, wherewith most of all the soul that is in distress is cared for, cannot be stretched beyond the love of an enemy; and therefore the closing words are: Be therefore perfect, even as your Father who is in heaven is perfect. Yet in such a way that God is understood to be perfect as God, and the soul to be perfect as a soul.
'''

[[commentary]]
quote='''
(Serm. in Mont. i. 21.) That there were degrees in the righteousness of the Pharisees which was under the old Law is seen herein, that many hated even those by whom they were loved. He therefore who loves his neighbour, has ascended one degree, though as yet he hate his enemy; which is expressed in that, and shalt hate his enemy; which is not to be understood as a command to the justified, but a concession to the weak.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"
