[[commentary]]
quote='''
For without this love, wherewith we are commanded to love even our enemies and persecutors, who can fully carry out those things which are mentioned above? Moreover, the perfection of that mercy, wherewith most of all the soul that is in distress is cared for, cannot be stretched beyond the love of an enemy; and therefore the closing words are: "Be ye therefore perfect, even as your Father who is in heaven is perfect." Yet in such a way that God is understood to be perfect as God, and the soul to be perfect as a soul.

That there is, however, a certain step [in advance] in the righteousness of the Pharisees, which belongs to the old law, is perceived from this consideration, that many men hate even those by whom they are loved; as, for instance, luxurious children hate their parents for restraining them in their luxury. That man therefore rises a certain step, who loves his neighbour, although as yet he hates his enemy. But in the kingdom of Him who came to fulfil the law, not to destroy it, he will bring benevolence and kindness to perfection, when he has carried it out so far as to love an enemy. For the former stage, although it is something, is yet so little that it may be reached even by the publicans as well. And as to what is said in the law, "Thou shalt hate thine enemy," it is not to be understood as the voice of command addressed to a righteous man, but rather as the voice of permission to a weak man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOUR%2520LORD%2527S%2520SERMON%2520ON%2520THE%2520MOUNT%2FBook%25201.html'
source_title="SERMON ON THE MOUNT 1.21.69-70"

[[commentary]]
quote='''
(Serm. in Mont. i. 21.) That there were degrees in the righteousness of the Pharisees which was under the old Law is seen herein, that many hated even those by whom they were loved. He therefore who loves his neighbour, has ascended one degree, though as yet he hate his enemy; which is expressed in that, and shalt hate his enemy; which is not to be understood as a command to the justified, but a concession to the weak.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"
