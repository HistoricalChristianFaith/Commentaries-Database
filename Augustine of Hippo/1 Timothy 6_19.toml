[[commentary]]
quote='''
It becomes you, therefore, out of love to this true life, to account yourself "desolate" in this world, however great the prosperity of your lot may be. For as that is the true life, in comparison with which the present life, which is much loved, is not worthy to be called life, however happy and prolonged it be, so is it also the true consolation promised by the Lord in the words of Isaiah, "I will give him the true consolation, peace upon peace," without which consolation men find themselves, in the midst of every mere earthly solace, rather desolate than comforted. For as for riches and high rank, and all other things in which men who are strangers to true felicity imagine that happiness exists, what comfort do they bring, seeing that it is better to be independent of such things than to enjoy abundance of them?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 130.2.3"
