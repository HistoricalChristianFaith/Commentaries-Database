[[commentary]]
quote='''
And first we have had to be persuaded how much God loved us, lest from despair we should not dare to look up to Him. And we needed to be shown also what manner of men we are whom He loved, lest being proud, as if of our own merits, we should recede the more from Him, and fail the more in our own strength. And hence He so dealt with us, that we might the rather profit by His strength, and that so in the weakness of humility the virtue of charity might be perfected. And this is intimated in the Psalm, where it is said, "Thou, O God, didst send a spontaneous rain, whereby Thou didst make Thine inheritance perfect, when it was weary." For by "spontaneous rain" nothing else is meant than grace, not rendered to merit, but given freely, whence also it is called grace; for He gave it, not because we were worthy, but because He willed. And knowing this, we shall not trust in ourselves; and this is to be made "weak." But He Himself makes us perfect, who says also to the Apostle Paul, "My grace is sufficient for thee, for my strength is made perfect in weakness." Man, then, was to be persuaded how much God loved us, and what manner of men we were whom He loved; the former, lest we should despair; the latter, lest we should be proud.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4:1.2"
