[[commentary]]
quote='''
But now, with respect to paying the uttermost farthing, it may be understood without absurdity either as standing for this, that nothing is left unpunished; just as in common speech we also say "to the very dregs," when we wish to express that something is so drained out that nothing is left: or by the expression "the uttermost farthing" earthly sins may be meant. For as a fourth part of the separate component parts of this world, and in fact as the last, the earth is found; so that you begin with the heavens, you reckon the air the second, water the third, the earth the fourth. It may therefore seem to be suitably said, "till thou hast paid the last fourth," in the sense of "till thou hast expiated thy earthly sins:" for this the sinner also heard, "Earth thou art, and unto earth shall thou return." Then, as to the expression "till thou hast paid," I wonder if it does not mean that punishment which is called eternal. For whence is that debt paid where there is now no opportunity given of repenting and of leading a more correct life? For perhaps the expression "till thou hast paid" stands here in the same sense as in that passage where it is said, "Sit Thou at my right hand, until I make Thine enemies Thy footstool;" for not even when the enemies have been put under His feet, will He cease to sit at the right hand: or that statement of the apostle, "For He must reign, till He hath put all enemies under His feet;" for not even when they have been put under His feet, will He cease to reign. Hence, as it is there understood of Him respecting whom it is said, "He must reign, till He hath put His enemies under His feet" that He will reign for ever, inasmuch as they will be for ever under His feet: so here it may be understood of him respecting whom it is said, "Thou shalt by no means come out thence, till thou hast paid the uttermost farthing," that he will never come out; for he is always paying the uttermost farthing, so long as he is suffering the everlasting punishment of his earthly sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOUR%2520LORD%2527S%2520SERMON%2520ON%2520THE%2520MOUNT%2FBook%25201.html'
source_title="SERMON ON THE MOUNT 1.11.30"

[[commentary]]
quote='''
(ubi sup.) By the Judge I understand Christ, for, the Father hath committed all judgment to the Son; (John 5:22.) and by the officer, or minister, an Angel, for, Angels came and ministered unto Him; and we believe that He will come with his Angels to judge.

(ubi sup.) By the prison I understand the punishment of the darkness. And that none should despise that punishment, He adds, Verily I say unto thee, thou shalt not come out thence till thou hast paid the very last farthing.

(ubi sup.) Or it is an expression to denote that there is nothing that shall go unpunished; as we say 'To the dregs,' when we are speaking of any thing so emptied that nothing is left in it. Or by the last farthing (quadrans.) may be denoted earthly sins. For the fourth and last element of this world is earth. Paid, that is in eternal punishment; and until used in the same sense as in that, Sit thou on my right hand until I make thy enemies thy footstool; (Ps. 110:1.) for He does not cease to reign when His enemies are put under His feet. So here, until thou hast paid, is as much as to say, thou shalt never come out thence, for that he is always paying the very last farthing while he is enduring the everlasting punishment of earthly sins.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"
