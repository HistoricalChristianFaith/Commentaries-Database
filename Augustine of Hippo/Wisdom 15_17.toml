[[commentary]]
quote='''
You say God lies, but you are convicted by the very one you made. Nor because you are convicted by it, will it be better than you; even if you lie, it does not lie, you call it god, it calls itself wood, it will not be better than you. Not for you to have a reason to want to worship something better. You feel, it does not feel; you hear and it does not hear; you see and it does not see; you walk and it does not walk; you live and I cannot say: It is dead, because it never lived. You are better than the one you made; worship the one better than you, who made you. It is an insult to you to be like the one you made. What sort of thing should you worship? You get angry at someone cursing you if they say: "Be like this," and yet you worship what you detest being, and by worshiping you become somewhat similar, not that you become wood and cease to be human, but you make your inner man somewhat like the thing you made outwardly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%252023B.html'
source_title="Sermon 23B"
