[[commentary]]
quote='''
In the book of Wisdom, it is written thus: Therefore there shall be a regard even for the idols of the nations. For God did not look for a long time on the idols that were worshipped for a long time, and on the sacrifices made to idols. He who always sees, at some point condescends to look. He saw with patience, he regarded with vengeance. He says there shall be a regard for the idols of the nations, because they were made from God's creations to incite hatred. For they provoke God with the creations of God. How do they provoke God with the creations? For a craftsman made a god, but God made wood. A goldsmith made an idol, but God made gold. Why do you make out of his creation something that he would detest; out of God's creation, you shape something that he would detest? You should shape well what he would love. You want to put your own image in wood, take the image of God into yourself. Why do you erase inwardly and carve outwardly? He says, the creations of God were made to provoke hatred, and as trials for the souls of men, and as a snare for the feet of the foolish. For the beginning of fornication is the seeking of idols. If a woman having many husbands is praised, let also the soul worshipping many gods be praised. If a woman is an adulteress through true husbands, how much more is a soul through false gods? For the beginning of fornication is the seeking of idols, and their invention is the corruption of life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520360A.html'
source_title="Sermon 360A"
