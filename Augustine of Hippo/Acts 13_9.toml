[[commentary]]
quote='''
Accordingly Paul, who, although he was formerly called Saul, chose this new designation, for no other reason, as it seems to me, than because he would show himself little, — the "least of the apostles," — contends with much courage and earnestness against the proud and arrogant, and such as plume themselves on their own works, in order that he may commend the grace of God. This grace, indeed, appeared more obvious and manifest in his case, inasmuch as, while he was pursuing such vehement measures of persecution against the Church of God as made him worthy of the greatest punishment, he found mercy instead of condemnation, and instead of punishment obtained grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 7.12"
