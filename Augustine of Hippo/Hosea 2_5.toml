[[commentary]]
quote='''
Who is that adulterous woman whom the prophet Hosea points out, who said, "I will go after my lovers, that give me my bread and my water, my wool and my flax, and everything that befits me?" Let us grant that we may understand this also of the people of the Jews that went astray; yet whom else are the false Christians (such as are all heretics and schismatics) wont to imitate, except false Israelites?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Baptism%2FBook%25203.html'
source_title="ON BAPTISM 3:26"


[[commentary]]
quote='''
They, therefore, who are wicked, evildoers, carnal, fleshly, devilish, think that they receive at the hands of their seducers what are the gifts of God alone, whether sacraments, or any spiritual workings about present salvation. But these men have not love towards God, but are busied about those by whose pride they are led astray, and are compared to the adulterous woman, whom the prophet introduces as saying, "I will go after my lovers, that give me my bread and my water, my wool and my flax, and my oil, and everything that befits me." For thus arise heresies and schisms, when the fleshly people which is not founded on the love of God says, "I will go after my lovers," with whom, either by corruption of her faith, or by the puffing up of her pride, she shamefully commits adultery. But for the sake of those who, having undergone the difficulties, and straits, and barriers of the empty reasoning of those by whom they are led astray, afterwards feel the prickings of fear, and return to the way of peace, to seeking God in all sincerity,—for their sake He goes on to say, "Therefore, behold, I will hedge up thy way with thorns, and make a wall, that she shall not find her paths. And she shall follow after her lovers, but she shall not overtake them: and she shall seek them, but she shall not find them: then shall she say, I will go and return to my first husband; for then was it better with me than now." Then, that they may not attribute to their seducers what they have that is sound, and derived from the doctrine of truth, by which they lead them astray to the falseness of their own dogmas and dissensions; that they may not think that what is sound in them belongs to them, he immediately added, "And she did not know that I gave her corn, and wine, and oil, and multiplied her money; but she made vessels of gold and silver for Baal."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Baptism%2FBook%25203.html'
source_title="ON BAPTISM 3:27"
