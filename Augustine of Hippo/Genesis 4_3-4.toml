[[commentary]]
quote='''
[The pagans say:] "They find fault with the sacred ceremonies, the sacrificial victims, the burning of incense, and all the other parts of worship in our temples; and yet the same kind of worship had its origin in antiquity with themselves, or from the God whom they worship, for He is represented by them as having been in need of the first-fruits." This question is obviously founded upon the passage in our Scriptures in which it is written that Cain brought to God a gift from the fruits of the earth, but Abel brought a gift from the firstlings of the flock. Our reply, therefore, is, that from this passage the more suitable inference to be drawn is, how ancient is the ordinance of sacrifice which the infallible and sacred writings declare to be due to no other than to the one true God; not because God needs our offerings, seeing that, in the same Scriptures, it is most clearly written, "I said unto the Lord, Thou art my Lord, for Thou hast no need of my good," but because, even in the acceptance or rejection or appropriation of these offerings, He considers the advantage of men, and of them alone. For in worshipping God we do good to ourselves, not to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="Letters 102.3"
