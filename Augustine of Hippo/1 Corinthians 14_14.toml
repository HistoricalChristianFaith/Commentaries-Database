[[commentary]]
quote='''
And we speak also of a spirit in man distinct from the mind, to which spirit belong the images that are formed after the likeness of bodies; and of this the apostle speaks to the Corinthians, where he says, "But if I shall have prayed with a tongue, my spirit prayeth, but my understanding is unfruitful." For he speaks thus, when that which is said is not understood; since it cannot even be said, unless the images of the corporeal articulate sounds anticipate the oral sound by the thought of the spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252014.html'
source_title="ON THE TRINITY 14.16"
