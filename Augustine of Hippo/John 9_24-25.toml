[[commentary]]
quote='''
"Then again called they the man who had been blind, and said unto him, Give God the glory." What is that, "Give God the glory"? Deny what thou hast received. Such conduct is manifestly not to give God the glory, but rather to blaspheme Him. "Give God," they say, "the glory: we know that this man is a sinner. Then said he, If he is a sinner, I know not: one thing I know, that whereas I was blind, now I see."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252044.html'
source_title="Tractates on John 44"
