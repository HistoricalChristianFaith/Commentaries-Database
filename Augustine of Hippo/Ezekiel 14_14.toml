[[commentary]]
quote='''
Nay, can we be better men than Daniel himself, concerning whom God, speaking to the prince of Tyre, says by the prophet Ezekiel, "Art thou wiser than Daniel?" who also is placed among the three righteous men to whom alone God saith that He would grant deliverance,—pointing, doubtless, in them to three representative righteous men,—declaring that he would deliver only Noah, Daniel, and Job, and that they should save along with themselves neither son nor daughter, but only their own souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 111"


[[commentary]]
quote='''
Now, I suppose it is not easy to find in God's Scripture so weighty a testimony of holiness given of any man as that which is written of His three servants, Noah, Daniel, and Job, whom the Prophet Ezekiel describes as the only men able to be delivered from God's impending wrath. In these three men he no doubt prefigures three classes of mankind to be delivered: in Noah, as I suppose, are represented righteous leaders of nations, by reason of his government of the ark as a type of the Church; in Daniel, men who are righteous in continence; in Job, those who are righteous in wedlock;—to say nothing of any other view of the passage, which it is unnecessary now to consider. It is, at any rate, clear from this testimony of the prophet, and from other inspired statements, how eminent were these worthies in righteousness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Merits%2520and%2520Forgiveness%2520of%2520Sins%252C%2520and%2520on%2520the%2520Baptism%2520of%2520Infants%2FBook%25202.html'
source_title="ON THE MERITS AND FORGIVENESS OF SINS AND ON INFANT BAPTISM 2:12.10"
