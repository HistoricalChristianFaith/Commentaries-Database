[[commentary]]
quote='''
It is not, however, to be for a moment supposed, because he said, "It is God that worketh in you both to will and to do of his own good pleasure," that free will is taken away. If this, indeed, had been his meaning, he would not have said just before, "Work out your own salvation with fear and trembling." For when the command is given "to work," their free will is addressed; and when it is added, "with fear and trembling," they are warned against boasting of their good deeds as if they were their own, by attributing to themselves the performance of anything good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520on%2520Grace%2520and%2520Free%2520Will.html'
source_title="ON GRACE AND FREE WILL 21"

[[commentary]]
quote='''
He must cease to say, "That we are able to do, say, think any good, is from Him who has given us this ability, and who also assists this ability; whereas that we really do a good thing, or speak a good word, or think a good thought, proceeds from our own selves." He must, I repeat, cease to say this. For God has not only given us the ability and aids it, but He further works in us "to will and to do."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520on%2520the%2520Grace%2520of%2520Christ%252C%2520and%2520on%2520Original%2520Sin%2FBook%25201.html'
source_title="ON THE GRACE OF CHRIST 26"

[[commentary]]
quote='''
It is certain that it is we that will when we will, but it is He who makes us will what is good, of whom it is said (as he has just now expressed it), "The will is prepared by the Lord." Of the same Lord it is said, "The steps of a man are ordered by the Lord, and his way doth He will." Of the same Lord again it is said, "It is God who worketh in you, even to will!" It is certain that it is we that act when we act; but it is He who makes us act, by applying efficacious powers to our will, who has said, "I will make you to walk in my statutes, and to observe my judgments, and to do them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520on%2520Grace%2520and%2520Free%2520Will.html'
source_title="ON GRACE AND FREE WILL 32"


[[commentary]]
quote='''
And that no one is forced by God's power unwillingly either into evil or good, but that when God forsakes a man, he deservedly goes to evil, and that when God assists, without deserving he is converted to good. For a man is not good if he is unwilling, but by the grace of God he is even assisted to the point of being willing; because it is not vainly written, "For it is God that worketh in you, both to will and to do for His good pleasure," and, "The will is prepared by God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25201.html'
source_title="ON TWO LETTERS OF PELAGIUS 1.36"
