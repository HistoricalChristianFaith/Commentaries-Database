[[commentary]]
quote='''
We are placed over you; you are the flock of God. Consider and see that our dangers are greater than yours, and pray for us, for this becomes both us and you, that we may give a good account of you to the Chief Shepherd and Head over us all, and may escape both from the trials of this world and its allurements, which are still more dangerous, except when the peace of this world has the effect for which the apostle has directed us to pray, "That we may lead a quiet and peaceable life in all godliness and honesty." For if godliness and honesty be wanting, what is a quiet and peaceful exemption from the evils of the world but an occasion either of inviting men to enter, or assisting men to follow, a course of self-indulgence and perdition? Do you, then, ask for us what we ask for you, that we may lead a quiet and peaceable life in all godliness and honesty. Let us ask this for each other wherever you are and wherever we are, for He whose we are is everywhere present.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 231"
