[[commentary]]
quote='''
Wherefore, since the spirit is to be preferred to the body, and the death of the spirit means that God has left it, but the death of the body that the spirit has left it; and since herein lies the punishment in the death of the body, that the spirit leaves the body against its will, because it left God willingly; so that, whereas the spirit left God because it would, it leaves the body although it would not; nor leaves it when it would, unless it has offered violence to itself, whereby the body itself is slain: the spirit of the Mediator showed how it was through no punishment of sin that He came to the death of the flesh, because He did not leave it against His will, but because He willed, when He willed, as He willed. For because He is so commingled [with the flesh] by the Word of God as to be one, He says: "I have power to lay down my life, and I have power to take it again. No man taketh it from me, but I lay down my life that I might take it again."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4.13.16"

[[commentary]]
quote='''
He had the authority to lay down his life, as he himself had declared. And he gave up the spirit in humility, that is, with a bowed head. He would receive it back again by rising again with a raised head. This death and bowing of the head were acts of great power, as was shown by that ancestor Jacob when he blessed Judah and said, "You have gone up lying down; you have slept like a lion." By "going up" he signified his death; by "like a lion" he signified his power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520218.html'
source_title="SERMON 218.12"

[[commentary]]
quote='''
"When Jesus therefore had received the vinegar, He said, It is finished." What, but all that prophecy had foretold so long before? And then, because nothing now remained that still required to be done before He died, as if He, who had power to lay down His life and to take it up again, had at length completed all for whose completion He was waiting, "He bowed His head, and gave up the ghost." Who can thus sleep when he pleases, as Jesus died when He pleased? Who is there that thus puts off his garment when he pleases, as He put off His flesh at His pleasure? Who is there that thus departs when he pleases, as He departed this life at His pleasure? How great the power, to be hoped for or dreaded, that must be His as judge, if such was the power He exhibited as a dying man!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%2520119.html'
source_title="Tractates on John 119"

[[commentary]]
quote='''
(Tr. cxix) viz. what prophecy had foretold so long before.

(Tr. cxix) Then as there was nothing left Him to do before He died, it follows, And He bowed His head, and gave up the ghost, only dying when He had nothing more to do, like Him who had to lay down His life, and to take it up again.

(Tr. cxix) For who ever had such power to sleep when he wished, as our Lord had to die when He wished? What power must He have, for our good or evil, Who had such power dying?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"
