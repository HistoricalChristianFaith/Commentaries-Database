[[commentary]]
quote='''
"And He brought forth His people with joy, and His chosen with gladness" [Psalm 105:43]. What he said, "His people," he has repeated in, "His chosen." So also what he said, "with joy," he has repeated in, "with gladness."
'''
source_url='https://www.newadvent.org/fathers/1801105.htm'
source_title='Exposition on Psalm 105'
