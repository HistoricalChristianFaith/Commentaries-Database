[[commentary]]
quote='''
Just as Jacob, again, was not the creator of the colors in the flocks, because he placed the various colored rods for the several mothers, as they drank, to look at in conceiving. Yet neither were the cattle themselves creators of the variety of their own offspring, because the variegated image, impressed through their eyes by the sight of the varied rods, clave to their soul, but could affect the body that was animated by the spirit thus affected only through sympathy with this commingling, so far as to stain with color the tender beginnings of their offspring. For that they are so affected from themselves, whether the soul from the body, or the body from the soul, arises in truth from suitable reasons, which immutably exist in that highest wisdom of God Himself, which no extent of place contains; and which, while it is itself unchangeable, yet quits not one even of those things which are changeable, because there is not one of them that is not created by itself. For it was the unchangeable and invisible reason of the wisdom of God, by which all things are created, which caused not rods, but cattle, to be born from cattle; but that the color of the cattle conceived should be in any degree influenced by the variety of the rods, came to pass through the soul of the pregnant cattle being affected through their eyes from without, and so according to its own measure drawing inwardly within itself the rule of formation, which it received from the innermost power of its own Creator.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25203.html'
source_title="On the Trinity 3.2.15"
