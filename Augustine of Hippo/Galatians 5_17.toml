[[commentary]]
quote='''
The fact is that both are good: the spirit is good and the flesh too is good. And the whole person who consists of both, one ruling and one obeying, is indeed good but a changeable good. Yet these changing goods could not arise were it not for the immutable good, which is the source of every created good, whether small or great. But however small might be one particular good, it is nonetheless made by the one incomparably good. Yet however great, it is in no way comparable to the greatness of its Maker. But in this human nature, good as it is in origin and constitution, there is now war, because there is not yet salvation.
'''
source_url='https://www.newadvent.org/fathers/1308.htm'
source_title="On Continence 18"

[[commentary]]
quote='''
To the body of this death then is understood to be owing the circumstance that there is in our members another law which wars against the law of the mind, so long as the flesh lusts against the spirit—without, however, subjugating the mind, inasmuch as on its side, too, the spirit has a concupiscence contrary to the flesh. Thus, although the actual law of sin partly holds the flesh in captivity (whence comes its resistance to the law of the mind), still it has not an absolute empire in our body, notwithstanding its mortal state, since it refuses obedience to its desires. For in the case of hostile armies between whom there is an earnest conflict, even the side which is inferior in the fight usually holds a something which it has captured; and although in some such way there is somewhat in our flesh which is kept under the law of sin, yet it has before it the hope of redemption: and then there will remain not a particle of this corrupt concupiscence; but our flesh, healed of that diseased plague, and wholly clad in immortality, shall live for evermore in eternal blessedness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Marriage%2520and%2520Concupiscence%2FBook%25201.html'
source_title="On Marriage and Concupiscence 1.35"

[[commentary]]
quote='''
Now let us see whether we anywhere read about the flesh being contrary in the baptized also. And here, I ask, to whom did the apostle say, "The flesh lusteth against the Spirit, and the Spirit against the flesh: and these are contrary the one to the other; so that ye do not the things that ye would?" He wrote this, I apprehend, to the Galatians, to whom he also says, "He therefore that ministereth to you the Spirit, and worketh miracles among you, doeth he it by the works of the law or by the hearing of faith?" It appears, therefore, that it is to Christians that he speaks, to whom, too, God had given His Spirit: therefore, too, to the baptized. Observe, therefore, that even in baptized persons the flesh is found to be contrary; so that they have not that capacity which, our author says, is inseparably implanted in nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520Nature%2520and%2520Grace%252C%2520Against%2520Pelagius.html'
source_title="On Nature and Grace 61"


[[commentary]]
quote='''
People think that the apostle here denies that we possess free will. They do not perceive what he is saying to them: If they refuse to hold fast to the grace they have received, through which alone they are able to walk in the Spirit and avoid fulfilling the desires of the flesh, they will not be able to do as they wish.… It is love that "fulfills the law." But "the wisdom of the flesh" by following temporal goods opposes spiritual love. How can it be made subject to the law of God (that is, freely and obediently fulfill righteousness and not be opposed to it) when even as it tries it must be vanquished? The flesh imagines that it can procure a greater temporal good by iniquity than by maintaining righteousness. The first stage, the natural life of a human being, precedes the law, when no wrongdoing or malice is prohibited. The natural being makes no resistance at all to base desires, since there is no one to prohibit them. The second stage is under law before grace, when he is indeed prohibited and tries to abstain from sin but is overcome because he does not yet love righteousness for God's sake and its own but wishes to observe it in the hope of earthly acquisitions. And therefore, when he sees righteousness on one side and temporal good on another, he is dragged by the weight of his temporal desire and thus forsakes righteousness, which he was trying to maintain only in order to have that which he now sees that he is going to lose by maintaining it. The third stage of life is the one under grace, when no temporal good is preferred to righteousness. This cannot happen except by spiritual love, which the Lord has taught by his example and bestowed by grace. For in this life, even if there remain desires of the flesh from the mortality of the body, yet they do not subdue the mind to consent to sin.
'''
source_url=''
source_title="EPISTLE TO THE GALATIANS 46 [1B.5.17]"
