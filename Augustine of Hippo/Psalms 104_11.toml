[[commentary]]
quote='''
For it follows, "All the beasts of the wood shall drink" [Psalm 104:11]. We do indeed see this also in the visible creation, that the beasts of the wood drink of springs, and of streams that run between the mountains: but now since it hath pleased God to hide His own wisdom in the figures of such things, not to take it away from earnest seekers, but to close it to them that care not, and open it to them that knock; it hath also pleased our Lord God Himself to exhort you by us to this, that in all these things which are said as if of the bodily and visible creation, we may seek something spiritually hidden, in which when found we may rejoice. The beasts of the wood, we understand the Gentiles, and Holy Scripture witnesses this in many places.

..."The onagers shall take for their thirst." By onagers he meaneth some great beasts. For who knoweth not that wild asses are called onagers? He meaneth, therefore, some great untrained ones. For the Gentiles had no yoke of the Law: many nations lived after their own customs, ranging in proud boastfulness as in a wilderness. And so indeed did all the beasts, but the wild asses are put to signify the greater sort. They too shall drink for their thirst, for for them too the waters flow. Thence drinks the hare, thence the wild ass: the hare little, the wild ass great; the hare timid, the wild ass fierce: either sort drinks thence, but each for his thirst. ...So faithfully and gently doth it flow, as at once to satisfy the wild ass, and not to alarm the hare. The sound of Tully's voice rings out, Cicero is read, it is some book, it is a dialogue of his, whether his own, or Plato's, or by whatever such writer: some hear that are unlearned, weak ones of less mind; who dareth to aspire to such a thing? It is a sound of water, and that perchance turbid, but certainly flowing so violently, that a timid animal dare not draw near and drink. To whom soundeth a Psalm, and he saith, It is too much for me? Behold now what the Psalm soundeth; certainly they are hidden mysteries, yet so it soundeth, that even children are delighted to hear, and the unlearned come to drink, and when filled burst forth in singing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%2520104.html'
source_title="Exposition on Psalm 104"
