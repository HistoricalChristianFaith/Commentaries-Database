[[commentary]]
quote='''
For the apostle also says, "I determined not to know anything among you, save Jesus Christ, and Him crucified;" because he was speaking to those who were not able to receive higher things concerning the Godhead of Christ. To whom also a little while after he says, "I could not speak unto you as unto spiritual, but as unto carnal." He was "ignorant," therefore, among them of that which they were not able to know from him. And that only he said that he knew, which it was fitting that they should know from him. In short, he knew among the perfect what he knew not among babes; for he there says: "We speak wisdom among them that are perfect." For a man is said not to know what he hides, after that kind of speech, after which a ditch is called blind which is hidden. For the Scriptures do not use any other kind of speech than may be found in use among men, because they speak to men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25201.html'
source_title="ON THE TRINITY 1.12"
