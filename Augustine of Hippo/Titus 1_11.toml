[[commentary]]
quote='''
But could I do otherwise than utter my feelings when my heart was pierced with such grief? Shall they do such things, and am I to be commanded to hold my peace? When He commands me by the mouth of the apostle saying that those who teach what they ought not must be rebuked by the bishop, shall I be silent through dread of their displeasure? The Lord deliver me from such folly!… For, since the Lord commands us to speak and proclaim the truth, and in teaching to rebuke what is wrong, and to labour in season and out of season, as I can prove by the words of the Lord and of the apostles, let no man think that I am to be persuaded to be silent concerning these things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FLetters.html'
source_title="LETTERS 34.4, 35.3"
