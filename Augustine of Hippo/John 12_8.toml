[[commentary]]
quote='''
(Tr. l. 13) He was speaking of His bodily presence; for in respect of His majesty, providence, ineffable and invisible grace, those words are fulfilled, Lo, I am with you alway, even unto the end of the world. (Mat. 28:20) (c. 12.). Or thus: In the person of Judas are represented the wicked in the Church; for if thou art a good man, thou hast Christ now by faith, and the Sacrament, and thou shalt have Him always, for when thou hast departed hence, thou shalt go to Him who said to the thief, To-day shalt thou be with Me in paradise. (Luke 23:43) But if thou art wicked, thou seemest to have Christ, because thou art baptized with the baptism of Christ, because thou approachest to the altar of Christ: but by reason of thy wicked life, thou shalt not have Him alway. It is not thou hast, but ye have, the whole body of wicked men being addressed in Judas.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"For the poor ye have always with you, but me ye will not have always." We can certainly understand, "the poor ye have always;" what He has thus said is true. When were the poor wanting in the Church? "But me ye will not have always;" what does He mean by this? How are we to understand, "Me ye will not have always"? Don't be alarmed: it was addressed to Judas. Why, then, did He not say, thou wilt have, but, ye will have? Because Judas is not here a unit. One wicked man represents the whole body of the wicked; in the same way as Peter, the whole body of the good, yea, the body of the Church, but in respect to the good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252050.html'
source_title='Tractates on John 50'
