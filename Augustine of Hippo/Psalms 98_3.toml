[[commentary]]
quote='''
"He hath remembered His mercy to Jacob, and His truth unto the house of Israel" [Psalm 98:3]. What meaneth this, "He hath remembered His mercy and truth"? He hath pitied, so that He promised; because He promised and showed His mercy, truth hath followed: mercy hath gone before promise, promise hath been fulfilled in truth....

"And His truth unto the house of Israel." Who is this Israel? That ye may not perchance think of one nation of the Jews, hear what followeth: "All the ends of the world have seen the salvation of our God." It is not said, all the earth: but, "all the ends of the world:" as it is said, from one end to the other. Let no man cut this down, let no man scatter it abroad; strong is the unity of Christ. He who gave so great a price, hath bought the whole: "All the ends of the world."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FON%2520THE%2520PSALMS%2FPsalm%252098.html'
source_title="Exposition on Psalm 98"
