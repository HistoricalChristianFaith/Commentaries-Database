[[commentary]]
quote='''
(Tr. lii. 13) Yet a little while is the light with you. Hence it is that ye understand that Christ abideth for ever. Wherefore walk while ye have the light, approach, understand the whole, that Christ will both die, and live for ever: do this while ye have the light.

(Tr. lii. 13) i. e. if ye so believe in the eternity of Christ, as to deny His humiliation and death.
For he that walketh in darkness, knoweth not whither he goeth.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"Then said Jesus unto them, Yet a little light is in you." And by this it is you understand that Christ abideth for ever. "Walk, then, while ye have the light, test darkness come upon you." Walk, draw near, come to the full understanding that Christ shall both die and shall live for ever; that He shall shed His blood to redeem us, and ascend on high to carry His redeemed along with Him. But darkness will come upon you, if your belief in Christ's eternity is of such a kind as to refuse to admit in His case the humiliation of death. "And he that walketh in darkness knoweth not whither he goeth." So may he stumble on that stone of stumbling and rock of offence which the Lord Himself became to the blinded Jews: just as to those who believed, the stone which the builders despised was made the head of the corner. Hence, they thought Christ unworthy of their belief; because in their impiety they treated His dying with contempt, they ridiculed the idea of His being slain: and yet it was the very death of the grain of corn that was to lead to its own multiplication, and the lifting up of one who was drawing all things after Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252052.html'
source_title='Tractates on John 52'
