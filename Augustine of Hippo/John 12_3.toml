[[commentary]]
quote='''
Let us therefore notice how harmony is maintained here between these three evangelists, Matthew, Mark, and John, regarding whom there is no doubt that they record the self-same occurrence at Bethany, on occasion of which the disciples also, as all three mention, murmured against the woman, ostensibly on the ground of the waste of the very precious ointment. Now the further fact that Matthew and Mark tell us that it was the Lord's head on which the ointment was poured, while John says it was His feet, can be shown to involve no contradiction, if we apply the principle which we have already expounded in dealing with the scene of the feeding of the multitudes with the five loaves. ... And this example ought to have made it plain to us, as I pressed it upon my readers in discussing that section, that even where the several evangelists introduce only the one fact each, we should take the case to have been really, that both things were elements in the actual occurrence. In the same way, our conclusion with regard to the passage now before us should be, that the woman poured the ointment not only upon the Lord's head, but also on His feet. It is true that some person may possibly be found absurd and artful enough to argue, that because Mark states that the ointment was poured out only after the alabaster vase was broken there could not have remained in the shattered vessel anything with which she could anoint His feet. But while a person of that character, in his endeavours to disprove the veracity of the Gospel, may contend that the vase was broken, in a manner making it impossible that any portion of the contents could have been left in it, how much better and more accordant with piety must the position of a very different individual appear, whose aim will be to uphold the truthfulness of the Gospel, and who may therefore contend that the vessel was not broken in a manner involving the total outpouring of the ointment! Moreover, if that calumniator is so persistently blinded as to attempt to shatter the harmony of the evangelists on this subject of the shattering of the vase, he should rather accept the alternative, that the Lord's feet were anointed before the vessel itself was broken, and that it thus remained whole, and filled with ointment sufficient for the anointing also of the head, when, by the breakage referred to, the entire contents were discharged. For we allow that there is a due regard to the several parts of our nature when the act commences with the head, but we may also say that an equally natural order is preserved when we ascend from the feet to the head.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520Harmony%2520of%2520the%2520Gospels%2FBook%25202.html'
source_title="The Harmony of the Gospels, Book 2"

[[commentary]]
quote='''
(Tr. li. 7) The house was filled with the odour; the world was filled with the good fame.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
(Tr. l. 6) The word pistici seems to be the name of some place, from which this precious ointment came.

(Tr. l) Remember the Apostle's words: To the one we are the savour of death unto death; and to the other the savour of life unto life. (2 cor. 11:16)

(Tr. li. 6) The ointment with which Mary anointed the feet of Jesus was justice. It was therefore a pound. It was ointment of spikenard (pistici) too, very precious. Πίστις is Greek for faith. Dost thou seek to do justice? The just liveth by faith. (Heb. 10:38) Anoint the feet of Jesus by good living, follow the Lord's footsteps: if thou hast a superfluity, give to the poor, and thou hast wiped the Lord's feet; for the hair is a superfluous part of the body.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
But "Mary," the other sister of Lazarus, "took a pound of ointment of pure nard, very precious, and anointed the feet of Jesus, and wiped His feet with her hair; and the house was filled with the odor of the ointment." Such was the incident, let us look into the mystery it imported. Whatever soul of you wishes to be truly faithful, anoint like Mary the feet of the Lord with precious ointment. That ointment was righteousness, and therefore it was exactly a pound weight: but it was ointment of pure nard, very precious. From his calling it "pistici," we ought to infer that there was some locality from which it derived its preciousness: but this does not exhaust its meaning, and it harmonizes well with a sacramental symbol. The root of the word "pure" in the Greek is by us called "faith." Thou wast seeking to work righteousness: the just shall live by faith. Anoint the feet of Jesus: follow by a good life the Lord's footsteps. Wipe them with thy hair: what thou hast of superfluity, give to the poor, and thou hast wiped the feet of the Lord; for the hair seems to be the superfluous part of the body. Thou hast something to spare of thy abundance: it is superfluous to thee, but necessary for the feet of the Lord. Perhaps on this earth the Lord's feet are still in need. For of whom but of His members is He yet to say in the end, "Inasmuch as ye did it to one of the least of mine, ye did it unto me"? Ye spent what was superfluous for yourselves, but ye have done what was grateful to my feet.

"And the house was filled with the odor." The world is filled with the fame of a good character: for a good character is as a pleasant odor. Those who live wickedly and bear the name of Christians, do injury to Christ: of such it is said, that through them "the name of the Lord is blasphemed." If through such God's name is blasphemed, through the good the name of the Lord is honored. Listen to the apostle, when he says, "We are a sweet savor of Christ in every place." As it is said also in the Song of Songs, "Thy name is as ointment poured forth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252050.html'
source_title="Tractates on John 50"
