[[commentary]]
quote='''
If the Son is equal, how is the Father greater? For the Lord himself says: "because the Father is greater than I." However, the rule of Catholic faith is this: when the Scriptures say of the Son that he is less than the Father, the Scriptures mean in respect to the assumption of humanity. But when the Scriptures point out that he is equal, they are understood in respect to his deity.
'''
source_url=''
source_title="QUESTIONS 69.1"

[[commentary]]
quote='''
And that sight is face to face, the very sight that is promised as the highest reward to the just, and which will then take place when He "shall have delivered up the kingdom to God, even the Father;" and in this "kingdom" He means the sight of His own form also to be understood, the whole creature being made subject to God, including that wherein the Son of God was made the Son of man. Because, according to this creature, "The Son also Himself shall be subject unto Him, that put all things under Him, that God may be all in all."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25201.html'
source_title="ON THE TRINITY 1.12.28"

[[commentary]]
quote='''
God will be the consummation of all our desiring—the object of our unending vision, of our unlessening love, of our unwearying praise. And in this gift of vision, the response of love, this paean of praise, all alike will share, as all will share in everlasting life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520City%2520of%2520God%2FBook%252022.html'
source_title="City of God 22.30"

[[commentary]]
quote='''
Even if there is no chance of manumission, slaves are now to make their slavery a kind of freedom by serving with love and loyalty, free from fear and feigning, until injustice becomes a thing of the past and every human sovereignty and power is done away with, so that God may be all in all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520City%2520of%2520God%2FBook%25206.html'
source_title="City of God 6.15"

[[commentary]]
quote='''
The allusion here is to the transformation of the saints when they pass from the old shadows of time into the new lights of eternity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520City%2520of%2520God%2FBook%252020.html'
source_title="City of God 20.22"

[[commentary]]
quote='''
Therefore, we shall not be in need: and for this reason, we shall be blessed. For we will be filled, but with our God: and all that we desire here greatly, He Himself will be for us. Here you seek food greatly: God will be your food. Here you seek the embrace of flesh: But for me, it is good to cling to God. Here you seek riches: how will all things be lacking to you, when you have Him who made all things? And to make you secure with the Apostle's words, he said this about that life: That God may be all in all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FSermons%2FSermon%2520255.html'
source_title="EASTER SERMON 255.8"
