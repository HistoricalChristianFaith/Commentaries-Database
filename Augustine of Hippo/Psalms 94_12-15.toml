[[commentary]]
quote='''
For how great can be the power of mortals? Therefore let mortals cleave to righteousness; power will be given to immortals. And compared to this, the power, how great soever, of those men who are called powerful on earth, is found to be ridiculous weakness, and a pitfall is dug there for the sinner, where the wicked seem to be most powerful. And the righteous man says in his song, "Blessed is the man whom Thou chasteneth, O Lord, and teachest him out of Thy law: that Thou mayest give him rest from the days of adversity, until the pit be digged for the wicked. For the Lord will not cast off His people, neither will He forsake His inheritance, until righteousness return unto judgment, and all who follow it are upright in heart." At this present time, then, in which the might of the people of God is delayed, "the Lord will not cast off His people, neither will He forsake His inheritance," how bitter and unworthy things soever it may suffer in its humility and weakness; "until the righteousness," which the weakness of the pious now possesses, "shall return to judgment," that is, shall receive the power of judging; which is preserved in the end for the righteous when power in its due order shall have followed after righteousness going before.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%252013.html'
source_title="ON THE TRINITY 13:13.17"
