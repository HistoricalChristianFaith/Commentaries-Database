[[commentary]]
quote='''
Now if a gift is not God's gift, because it is wrought by us, or because we act by His gift, then it is not a work of God that "a mountain should be removed into the sea," inasmuch as, according to the Lord's statement, it is by the faith of men that this is possible. Moreover, He attributes the deed to their actual operation: "If ye have faith in yourselves as a grain of mustard-seed, ye shall say unto this mountain, Be thou removed, and be thou cast into the sea; and it shall be done, and nothing shall be impossible to you." Observe how He said "to you," not "to Me" or "to the Father;" and yet it is certain that no man does such a thing without God's gift and operation. See how an instance of perfect righteousness is unexampled among men, and yet is not impossible. For it might be achieved if there were only applied so much of will as suffices for so great a thing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520the%2520Spirit%2520and%2520the%2520Letter.html'
source_title="ON THE SPIRIT AND THE LETTER 63"
