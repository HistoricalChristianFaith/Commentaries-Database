[[commentary]]
quote='''
Matthew goes on with his narrative in the following terms: "And when He was come into Jerusalem, all the city was moved, saying, Who is this? And the multitude said, This is Jesus, the prophet of Nazareth of Galilee. And Jesus went into the temple of God, and cast out all them that sold and bought in the temple," and so on, down to where we read, "But ye have made it a den of thieves." This account of the multitude of sellers who were cast out of the temple is given by all the evangelists; but John introduces it in a remarkably different order. For, after recording the testimony borne by John the Baptist to Jesus, and mentioning that He went into Galilee at the time when He turned the water into wine, and after he has also noticed the sojourn of a few days in Capharnaum, John proceeds to tell us that He went up to Jerusalem at the season of the Jews' passover, and when He had made a scourge of small cords, drove out of the temple those who were selling in it. This makes it evident that this act was performed by the Lord not on a single occasion, but twice over; but that only the first instance is put on record by John, and the last by the other three.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520Harmony%2520of%2520the%2520Gospels%2FBook%25202.html'
source_title="HARMONY OF THE GOSPELS 2.67.129"

[[commentary]]
quote='''
Mark also records this occurrence in due succession. He does not, however, follow the same order in his narrative. For first of all, the fact which is related by Matthew, namely, that Jesus went into the temple, and cast out those who sold and bought there, is not mentioned at that point by Mark. On the other hand, Mark tells us that He looked round about upon all things, and, when the eventide was now come, went out into Bethany with the twelve. Next he informs us that on another day, when they were coming from Bethany, He was hungry, and cursed the fig-tree, as Matthew also intimates. Then the said Mark subjoins the statement that He came into Jerusalem, and that, on going into the temple, He cast out those who sold and bought there, as if that incident took place not on the first day specified, but on a different day. But inasmuch as Matthew puts the connection in these terms, "And He left them, and went out of the city into Bethany," and tells us that it was when returning in the morning into the city that He cursed the tree, it is more reasonable to suppose that he, rather than Mark, has preserved the strict order of time so far as regards the incident of the expulsion of the sellers and buyers from the temple. For when he uses the phrase, "And He left them, and went out," who can be understood by those parties whom He is thus said to have left, but those with whom He was previously speaking,—namely, the persons who were so sore displeased because the children cried out, "Hosanna to the Son of David"? It follows, then, that Mark has omitted what took place on the first day, when He went into the temple; and in mentioning that He found nothing on the fig-tree but leaves, he has introduced what He called to mind only there, but what really occurred on the second day, as both evangelists testify. Then, further, his account bears that the astonishment which the disciples expressed at finding how the fig-tree had withered away, and the reply which the Lord made to them on the subject of faith, and the casting of the mountain into the sea, belonged not to this same second day on which He said to the tree, "No man eat fruit of thee hereafter for ever," but to a third day. For in connection with the second day, the said Mark has recorded the incident of the casting of the sellers out of the temple, which he had omitted to notice as belonging to the first day. Accordingly, it is in connection with this second day that he tells us how Jesus went out of the city, when even was come, and how, when they passed by in the morning, the disciples saw the fig-tree dried up from the roots, and how Peter, calling to remembrance, said unto Him, "Master, behold the fig-tree which Thou cursedst is withered away." Then, too, he informs us that He gave the answer relating to the power of faith. On the other hand, Matthew recounts these matters in a manner importing that they all took place on this second day; that is to say, both the word addressed to the tree, "Let no fruit grow on thee from henceforward for ever," and the withering that ensued so speedily in the tree, and the reply which He made on the subject of the power of faith to His disciples when they observed that withering and marvelled at it. From this we are to understand that Mark, on his side, has recorded in connection with the second day what he had omitted to notice as occurring really on the first,—namely, the incident of the expulsion of the sellers and buyers from the temple. On the other hand, Matthew, after mentioning what was done on the second day,—namely, the cursing of the fig-tree as He was returning in the morning from Bethany into the city,—has omitted certain facts which Mark has inserted, namely, His coming into the city, and His going out of it in the evening, and the astonishment which the disciples expressed at finding the tree dried up as they passed by in the morning; and then to what had taken place on the second day, which was the day on which the tree was cursed, he has attached what really took place on the third day,—namely, the amazement of the disciples at seeing the tree's withered condition, and the declaration which they heard from the Lord on the subject of the power of faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FThe%2520Harmony%2520of%2520the%2520Gospels%2FBook%25202.html'
source_title="HARMONY OF THE GOSPELS 2.68.131"
