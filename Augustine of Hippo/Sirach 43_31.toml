[[commentary]]
quote='''
For with what understanding can man apprehend God, who does not yet apprehend that very understanding itself of his own, by which he desires to apprehend Him? And if he does already apprehend this, let him carefully consider that there is nothing in his own nature better than it; and let him see whether he can there see any outlines of forms, or brightness of colors, or greatness of space, or distance of parts, or extension of size, or any movements through intervals of place, or any such thing at all. Certainly we find nothing of all this in that, than which we find nothing better in our own nature, that is, in our own intellect, by which we apprehend wisdom according to our capacity. What, therefore, we do not find in that which is our own best, we ought not to seek in Him who is far better than that best of ours; that so we may understand God, if we are able, and as much as we are able, as good without quality, great without quantity, a creator though He lack nothing, ruling but from no position, sustaining all things without "having" them, in His wholeness everywhere, yet without place, eternal without time, making things that are changeable, without change of Himself, and without passion. Whoso thus thinks of God, although he cannot yet find out in all ways what He is, yet piously takes heed, as much as he is able, to think nothing of Him that He is not.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FOn%2520The%2520Trinity%2FBook%25205.html'
source_title="ON THE TRINITY 5:1.2"
