[[commentary]]
quote='''
Our Lord’s driving out of the temple people who were seeking their own ends, who came to the temple to buy and sell, is symbolic. For if that temple was a symbol it obviously follows that the body of Christ, the true temple of which the other was an image, has within it some who are buyers and sellers, or in other words, people who are seeking their own interests and not those of Jesus Christ.But the temple was not destroyed by the people who wanted to turn the house of God into a den of thieves, and neither will those who live evil lives in the Catholic church and do all they can to convert God’s house into a robber’s den succeed in destroying the temple. The time will come when they will be driven out by a whip made of their own sins.
This temple of God, this body of Christ, this assembly of believers, has but one voice and sings the psalms as though it were but one person. If we wish, it is our voice; if we wish, we may listen to the singer with our ears and ourselves sing in our hearts. But if we choose not to do so it will mean that we are like buyers and sellers, preoccupied with our own interests.
'''
source_url=''
source_title="EXPLANATION OF PSALM 130.2-3"

[[commentary]]
quote='''
(Tr. x. in Joan. c. 4) So that temple was still a figure only, and our Lord cast out of it all who came to it as a market. And what did they sell? Things that were necessary for the sacrifice of that time. What if He had found men drunken? If the house of God ought not to be a house of merchandize, ought it to be a house of drunkenness?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
(Tr. x. c. 6) Or, those who sell in the Church, are those who seek their own, not the things of Jesus Christ. They who will not be bought, think they may sell earthly things. Thus Simon wished to buy the Spirit, that he might sell Him: for he was one of those who sell doves. (The Holy Spirit appeared in the form of a dove.) The dove however is not sold, but is given of free grace; for it is called grace.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
However, to seek the mystery of the deed in the figure, who are they that sell oxen? Who are they that sell sheep and doves? They are they who seek their own in the Church, not the things which are Christ's. They account all a matter of sale, while they will not be redeemed: they have no wish to be bought, and yet they wish to sell. Yes; good indeed is it for them that they may be redeemed by the blood of Christ, that they may come to the peace of Christ. Now, what does it profit to acquire in this world any temporal and transitory thing whatsoever, be it money, or pleasure of the palate, or honor that consists in the praise of men? Are they not all wind and smoke? Do they not all pass by and flee away? Are they not all as a river rushing headlong into the sea? And woe to him who shall fall into it, for he shall be swept into the sea. Therefore ought we to curb all our affections from such desires. My brethren, they that seek such things are they that sell. For that Simon too, wished to buy the Holy Ghost, just because he meant to sell the Holy Ghost; and he thought the apostles to be just such traders as they whom the Lord cast out of the temple with a scourge. For such an one he was himself, and desired to buy what he might sell: he was of those who sell doves. Now it was in a dove that the Holy Ghost appeared. Who, then, are they, brethren, that sell doves, but they who say, "We give the Holy Ghost"? But why do they say this, and at what price do they sell? At the price of honor to themselves. They receive as the price, temporal seats of honor, that they may be seen to be sellers of doves. Let them beware of the scourge of small cords. The dove is not for sale: it is given freely; for grace, or favor, it is called.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FTRACTATES%2520ON%2520JOHN%2FTractate%252010.html'
source_title='Tractates on John 10'
