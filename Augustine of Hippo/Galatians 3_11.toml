[[commentary]]
quote='''
Here, indeed, they ought at least to concede that "in the law no one is justified," as the same apostle says elsewhere; but that the law avails for the knowledge of sin, and for the transgression of the law itself, so that sin, being known and increased, grace may be sought for through faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Augustine%2520of%2520Hippo%2FA%2520Treatise%2520Against%2520Two%2520Letters%2520of%2520the%2520Pelagians%2FBook%25201.html'
source_title="AGAINST TWO LETTERS OF PELAGIUS 1.14"
