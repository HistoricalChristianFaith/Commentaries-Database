[[commentary]]
quote='''
For these, having acquired the fear of God from boyhood, did not want to partake from the table of the king nor to drink from the wine which he drank. O blessed boys, who guarded the covenant of the fathers and did not transgress the law which was given through Moses, but who feared God on account of his preaching! These captives who were in a strange land were not beguiled by the many foods nor enslaved by the pleasure of the wine, nor enticed by the kingly glory. They who were plundered kept their mouths undefiled and pure, as a pure word, which comes forth from a pure mouth, hymns through the mouth to the heavenly Father, just as it is written, "If you shall bring forth honor from worthlessness you will be as my mouth." [Jeremiah 15:19] And so, you know, O man, what has been spoken. A mouth brings forth the paternal honorable Word from itself, so that again a second time the Word is shown as being begotten by the saints, which always begets the saints and itself is begotten by the saints.

And so Scripture says, "And Daniel set in his heart not to be defiled with what was on the table of the king and with the wine which he drank and he asked the chief eunuch to give them vegetables", so that it may be shown that a man does not live by bread alone. [Matthew 4:4; Deuteronomy 8:3]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.10.2-11.1"
