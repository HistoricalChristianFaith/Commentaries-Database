[[commentary]]
quote='''
But someone will say, "You are making sophistries." Be educated, O man, about the things which happen under Antiochus Epiphanes. While the seven brothers together with their mother were taken, they were struck with scourges and whips, but one of them answered the whips, and he said, "Why do you delay to ask and to learn? For we are prepared to die rather than to transgress our patriarchal laws." [2 Maccabees 7:1-2]

"But the king, becoming stirred up at this, commanded pans and cauldrons to be heated at once, and he commanded that the one of them who spoke first, that his tongue be rooted out and having been scalped, to be maimed. While the rest of the brothers looked on, and while the steam of the pans grew sufficiently, he exhorted one another in the voice of their fatherland saying, 'The Lord God watches over us, and in truth, he comforts us just as Moses through the song which he spoke before God's face long ago saying, "He will be comforted in his slaves."'" [2 Maccabees 7:3-6; Deuteronomy 32:36]

You see how the Spirit of the Father cares for martyrs, he teaches, while urging and encouraging them, to despise this death and to hasten to what is better. For if anyone is apart from the Holy Spirit, this one cowers in agony and is afraid, and he hides and avoids the temporary death and cringes before the sword and does not submit to retribution. He holds this world before his eyes, the cares of life, and he prefers his wife and he loves his own children and seeks the riches of property. Such a one does not procure heavenly power and is recklessly destroyed.

And so it is necessary for every man who accepts the Word, to listen to what the heavenly king and master prescribes, "Whoever does not take up his cross and follow after me, is not worthy of me," [Matthew 10:38] and "He who does not renounce all his belongings is not able to be my disciple." [Luke 14:33]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.20.1-21.3"
