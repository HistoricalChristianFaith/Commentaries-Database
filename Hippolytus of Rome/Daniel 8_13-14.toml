[[commentary]]
quote='''
He says, "And on account of him the sacrifice was disturbed," [Daniel 8:11] and "righteousness was hurled to the ground." [Daniel 8:12] For Antiochus, who was called Epiphanes, being from the race of Alexander, was king. And having reigned over Syria and seizing all Egypt under himself, later he came to Jerusalem and he entered into the Most Holy Place and took all the treasures which were in the house of the Lord and the golden lampstand and the table and the altar and he committed great murder in the land and he spoke immoderate words and prevented sacrifice and offering, and he built a sacred grove and built idols in the city, and sacrificed a pig, even a common animal, so that what was spoken by the prophet may be fulfilled, "And on account of him the sacrifice was disturbed and righteousness was hurled to the ground and the Most Holy Place and the power was trampled until evening and morning one thousand and three hundred days." [Daniel 8:11-14]

For it occurred in that time three and half years the most Holy Place continued desolate, and the one thousand three hundred days were fulfilled up to the uprising of Judas Maccabee after the death of Mathias his father and he withstood Antiochus and routed the army of Antiochus and freed the city and recovered the holy vessels and renewed the temple doing everything according to the law.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.26.7-8"
