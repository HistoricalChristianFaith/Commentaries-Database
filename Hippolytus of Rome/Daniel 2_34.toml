[[commentary]]
quote='''
"Thou sawest till that a stone was cut." Thou sawest, as it were, a stone cut without hands, and smiting the image upon its feet. For the human kingdom was decisively separated from the divine; with reference to which it is written, "as it were cut." The stroke, however, smites the extremities, and in these it broke all dominion that is upon earth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Exegetical.%2520Fragments%2520from%2520Commentaries%2520on%2520Various%2520Books%2520of%2520Scripture.html"
source_title="Hippolytus Exegetical Fragments - Scholia on Daniel"

[[commentary]]
quote='''
After these things, what does Daniel say? "A stone was cut without hands and struck the image." [Daniel 2:34]

For in all events after the iron was mixed with clay and spread to the tips of the toes and while they are discordant with one another of the seed of men, what is left which is necessary to await but Christ who comes from the heavens as a stone which is cut from a mountain, so that he removes the kingdoms of this world, but also sets up the heavenly kingdom of the saints which will never be destroyed, and the same mountain also became the city of the saints which fills all the earth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.13"
