[[commentary]]
quote='''
And so after the death of Nebuchadnezzar his son Evil Merodoch succeeded to his kingdom, of whom the Scripture does not mention, surely because he lived reverently, surely because there was nothing monstrous in him. He reigned twelve years and after him his brother Belshazzar reigned, concerning whom Scripture now makes a narrative. He made a great supper for his thousand magistrates in the fourth year of his kingdom.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.14.1-3"
