[[commentary]]
quote='''
But perhaps someone will say that this is said to be unwritten and it is not possible to know if Daniel saw an angel and cried out, "I am innocent of this woman's blood." [Susannah 46] If you wait a little, O man, Daniel himself will teach you!

"For after the people heard the voice and were amazed, Daniel answered them, 'Are you so dull, sons of Israel? Having not examined, nor discovered what is clear, you condemn a daughter of Israel? And now return to the place of judgment, for they have falsely-testified lies against her.' And the people turned back with haste." [Susannah 47-49] But the lawless ones, jeered at Daniel and set him at naught, as just a young boy, not seeing the power of the Word in him, but the people considered and said, "Come sit in the midst of us and explain this to us because God has given to you the presbytery." [Susannah 50]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.29.1-3"
