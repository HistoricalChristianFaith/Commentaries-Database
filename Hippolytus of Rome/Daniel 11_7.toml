[[commentary]]
quote='''
Accordingly, a meeting between Ptolemy and Antiochus happened again. For Scripture says thusly, "And the king of the south rose up against the king of the north and he rose up seed from her." [Daniel 11:6-7] But what kind of seed except Ptolemy, who joined war with Antiochus? At this Antiochus marched out and did not overpower him, being set to flight, he turned again to Antioch gathering a greater crowd.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.45.3-5"
