[[commentary]]
quote='''
"And I lifted," he says, "my eyes and I saw, and behold, one man clothed in linen." And so in the first vision he says, "Behold, the angel Gabriel came flying," [Daniel 9:21] Here however he does not speak in this way, but he sees the Lord himself, not yet perfectly man, but appearing in the shape of a man just as he says, "And behold, one man clothed in linen." [Daniel 10:5] For Christ being clothed with many cloaks of mystery, points out the manifold calling of gifts. Because the priestly cloak was equipped from different gifts in order to indicate that many nations await the advent of Christ, so that with many gifts we may be able to be equipped.

"And his loins were girt in the gold of Ophaz." [Daniel 10:5] Ophaz from the Hebrew indicates, having been translated into Greek, "pure gold." And so purity was around his loins like his belt. For the Word is about to bear all of us around his own body with his own love, as a strong belt. For his own body was itself perfect and we are its members, and have been united in a perfect body and are embraced by his word.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.36.5-37.2"
