[[commentary]]
quote='''
And so of the things which will be in this way he adds saying, "And many of they who sleep in the dust of the earth shall arise, some to eternal life and some to reproach and eternal shame and they who understand shall shine as the splendor of the firmament and the many righteous as the stars in the age to come." [Daniel 12:2-3]

And so who are they who sleep in the dust of the earth, but the bodies of men who receive their own souls to be raised, who are of the resurrection of life, who are pure and radiant and shine as splendor of the firmament, who receive these things. But they who have the resurrection of judgment, sufficient in themselves for eternal punishment, receive these things, just as Paul says, "But he himself shall be saved as through fire." [1 Corinthians 3:15]

And Isaiah says, "Rise sleeper, and wake from the dead and Christ shall shine on you." [Isaiah 26:19, Ephesians 5:14] And the Lord again, "Truly I say to you, an hour comes and now is when the dead shall hear the voice of the Son of God and those who practice good shall rise to the resurrection of life, but those who practice evil to the resurrection of judgment." [John 5:25,29]

These, he says, shall be resurrected to life, they who really have believed in life and who are written in the Book of Life. And they to eternal reproach and shame, who partnered with the Antichrist, and with him are cast into eternal punishment.

Concerning whom Isaiah prophesies saying, "In which manner a garment which has been defiled in blood will not be pure, thus you will not be pure, because you have desolated my earth and have killed my people. The evil seed shall never remain forever. Prepare your children for the slaughter for the sins of your fathers, that they may not raise up and inherit my land." [Isaiah 14:19-21]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.55.1-7"
