[[commentary]]
quote='''
Then, addressing all creation as through one mouth, they hymned and glorified and blessed God saying, "Blessed are you Lord God of our fathers, praiseworthy are you and exalted unto the ages."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.29.3"
