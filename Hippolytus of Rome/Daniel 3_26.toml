[[commentary]]
quote='''
"Then Nebuchadnezzar came to the door of the burning furnace and he said, 'Shadrach, Meshach and Abednego, slaves of God Most High, come out and come here.'" [Daniel 3:26]

For since he himself was not able to come into the furnace, he called them to come outside. And he called the names of the three, but he found he was not able to declare the fourth. For Jesus had not yet been born of the virgin.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.34.1-3"
