[[commentary]]
quote='''
The dream which was seen by Nebuchadnezzar was displayed as a punishment for the king himself, whose heart was exalted and lifted up against God, having set up a golden image and having forced all to be idolaters, it was shown to him through a vision that even he might see that he has the lot of being under the authority of God, even if he seems to at some time reign over all the kings of the earth. And so that it may be shown that the kingdom which was given to him was from God, Daniel said to him, "You O king, are a king of kings, to whom the God of heaven has given a strong and powerful and honorable kingdom in every place where the sons of men dwell." [Daniel 2:37-38] And the king himself, having been amazed at the dream which Daniel interpreted, spoke similarly, "In truth your God, he is God of gods and Lord of lords because he is able to reveal this mystery." [Daniel 2:47]

And so when he forgot the first matters and he was later arrogantly lifted up, he received this punishment from God as an example and a model which was meant for all human tyrants and kings, so as they who think they are above man may not brag, and that they who are lifted up may not boast against God, but they may foresee their danger and may fear God, seeing that they also have a Lord in the heavens.

For also Antiochus who was called Epiphanes, who became the king of Syria, who tortured the slaves of God with various torments, and having undertaken baser things at last even he came upon the deserved retribution from God and was punished with divine scourges, and he was not even able to endure his own stench, but while he was still living, worms swarmed from his impious eyes, and though proclaiming many entreaties and confessions to God, his salvation did come upon him. Who also having despaired of himself and coming to the knowledge of the rest of mankind, when he was about to die he spoke in this way, "It is just to be subject to God, and a man who is mortal should not consider himself equal to gods." [2 Maccabees 9:12]

So that as many kings reverently and God-lovingly are turned back from sin, these also are honored by God, but as many are lifted up in accordance with their pride, these receive deserved and righteous retribution from God. In which manner also Sennacherib, who boasted of his own great might and reproached God with lying words, was struck by an angel and on one night, one hundred eighty five thousand were destroyed. Later he himself also was done away with by his sons in his own land, according to the word of the Lord which was spoken through Isaiah the prophet, so that all men may know the heavenly authority.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.4.1-8"
