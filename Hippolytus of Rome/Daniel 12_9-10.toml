[[commentary]]
quote='''
After these things were spoken in this way, the prophet, wishing to more precisely investigate what would be the kind of things which would happen after the resurrection, he answered him and said, "'Lord what will be the end of these?' And he said, 'Come Daniel, because these words are closed and sealed until the end of time, until many are chosen and are made white and are tried with fire and the lawless shall be lawless and the wise shall understand and you, come and rest. For there are still many days to the fulfillment of the consummation and to the resurrection, to your inheritance at the consummation of days.'" [Daniel 12:8-10] For since what God prepared for the saints a man is now not able to describe, for neither his eye sees, nor his ear hears, nor the heart of a man ascends to it, for which even the angels desire to glimpse, he spoke in this way to him, "These words are sealed until the end of time until many are chosen and are made white and are tried with fire." [Daniel 12:9-10] But who are the chosen, but they who are found worthy of the kingdom? And who is whitened, but they who believe the word of truth so that they are whitened through it and casting off the filth of sins they are clothed with purity from heaven and the radiant Holy Spirit, so that when the cloud is present they may immediately enter with him? And who are they who are tried with fire except they who pass through fire and water through the washing of rebirth of the Spirit and do the will of the Father through many fiery trials and afflictions. "And the lawless shall be lawless and the wise shall understand." [Daniel 12:10] They who are lawless are that way through their own choice and the wise again, through their own choice, are satisfied.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.58.1-6"
