[[commentary]]
quote='''
For he spoke in this way, "And I saw, and behold, as an appearance of a son of man he touched me." [Daniel 10:16] And so at first he said, "as the hand of a man," [Daniel 10:8] but now he says, "as an appearance of a son of man," so that at first it was partially shown to him, but secondly the whole human nature was put on and shown to him.

For the Word of God in the figure of a man is proclaimed as a man and is displayed in the world as an incarnate man, though not yet then being a son of man. But when the fullness of time came, God sent his Son, born of a woman, so that the Son of God may put on manhood from the Virgin and may be demonstrated as being the Son of God and the Son of Man.

"And he opened," he says, "my mouth and I spoke to him who stood before me, 'Lord in your appearance my insides were turned within me and I have no strength,'" [Daniel 10:16] for it is necessary that the advent of the Lord happened upon the people above and below, so that those below may be able to come to those above.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.39.4-6"
