[[commentary]]
quote='''
Then he says, "after sixty-two weeks, times shall be spun out and he shall set forth a covenant with many for one week. And in half of the week sacrifice and the drink offering shall be taken away and upon the Temple shall be an abomination of desolation." [Daniel 9:27]

For after sixty-two weeks was fulfilled and after Christ has come and the Gospel has been preached in every place, times having been spun out, the end remains one week away, in which Elijah and Enoch shall be present and in its half the abomination of desolation, the Antichrist, shall appear who threatens desolation of the world. After he comes, sacrifice and drink offering, which now in every way is offered by the nations to God, shall be taken away.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.35.2-3"


[[commentary]]
quote='''
This one will kill the two witnesses and precursors of Christ who herald his glorious advent from heaven, as he says through the prophet, "And I will give power to my two witnesses and they shall prophesy one thousand two hundred sixty days wearing sack cloth." [Revelation 11:3] Just as also he spoke to Daniel, "And he shall establish a covenant with many for one week and it will be that in the half of the week he shall take away my sacrifice and drink offering," [Daniel 9:27] so that the one week may be shown as divided into two, after the two witnesses will have preached for three and a half years, the Antichrist will wage war against the saints the remainder of the week and will desolate all the world so that what was spoken may be fulfilled, "And they will give the abomination of desolation one thousand two hundred ninety days. Blessed is he who endures to Christ and reaches the one thousand three hundred thirty-five days!" [Daniel 12:11-12]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.50.1-2"
