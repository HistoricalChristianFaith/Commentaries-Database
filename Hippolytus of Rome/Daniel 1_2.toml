[[commentary]]
quote='''
"And the Lord gave," etc. These words, "and the Lord gave," are written, that no one, in reading the introduction to the book, may attribute their capture to the strength of the captors and the slackness of their chief. And it is well said. "with part," for the deportation was for the correction, not the ruin, of the whole nation, that there might be no misapplication of the cause.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Exegetical.%2520Fragments%2520from%2520Commentaries%2520on%2520Various%2520Books%2520of%2520Scripture.html"
source_title="Hippolytus Exegetical Fragments - Scholia on Daniel"

[[commentary]]
quote='''
And so after his deportation his son Jehoiakim reigned three years. And so Nebuchadnezzar arose against him and deported both him and ten thousand men of the people into Babylon and set in his place Jeconiah the brother of his father, whom also changed his name to Zedekiah, with whom he, having made oaths and covenants, returned to Babylon. He, after reigning eleven years, withdrew from Nebuchadnezzar and gave himself to Pharaoh king of Egypt.

But in the twelfth year, Nebuchadnezzar and all the power of the Chaldeans came against him and besieged the city and camped around it and pressed in on it from all sides; from then on many of them were destroyed by famine, others killed by the sword, and some of them were taken as captives. The city was burned in fire and the temple and the wall were demolished. And the power of the Chaldeans took all the treasures which were found in the House of the Lord and all the vessels, both the gold and silver and all the copper vessels. Nebuzaradan the captain cut them out and brought them into Babylon, and Zedekiah himself, who was also called Jeconiah, fled through the night with seven-hundred men, but the powers of the Chaldeans pursued Zedekiah and seized him in Jericho and brought him to the king of Babylon in Deblatha.

And the king and those with him were judged in spirit because he transgressed the oath of the Lord and the covenant, which Nebuchadnezzar set before him. And taking his sons, Nebuchadnezzar slaughtered them before him and he blinded the eyes of Zedekiah who was also called Jeconiah, and shackled him in iron fetters and brought him into Babylon and he ground at the mill until the day in which he died. And when he died they took his body and hurled it behind the wall of Nineveh.

At this the prophecy of Jeremiah the prophet was fulfilled, who said, "As I live, says the Lord, though Jeconiah, who is the son of Josiah the king of Judah, is the signet ring upon my right hand, I will remove you from there and I will deliver you into the hands of those who seek your life, of whom you were wary of their face, into the hands of the Chaldeans. And I will cast you and your mother who bore you into a land, in which you were not born, and there you will die. But to the land which they pray for in their souls, they will certainly not return. Jeconiah is dishonored as a useless vessel which is not needed, on account of this he is cast out and banished to a land which he does not know. O Land, land! Hear the word of the Lord! Mark this man as an exiled man, because in truth he is not worthy to have one from his seed grow to sit upon the throne of David, a ruler still in Judah." [Jeremiah 22:24-30]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.3"
