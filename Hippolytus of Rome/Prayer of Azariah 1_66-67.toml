[[commentary]]
quote='''
And at the end of all this they named themselves as last and least and lowly, "Bless the Lord, Ananiah, Azariah, and Misahl, hymn and exalt him forever, because he took us from Hades and saved us from the hand of death and rescued us from the midst of burning flame and from the midst of fire he rescued us. We give thanks to the Lord because he is gracious, because his mercy is forever."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.29.12"
