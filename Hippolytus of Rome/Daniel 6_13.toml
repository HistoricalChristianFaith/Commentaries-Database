[[commentary]]
quote='''
And so why did the satraps accuse only Daniel? For always the three boys were also with him praying. For if they did not obey the prescription of Nebuchadnezzar, much more would they not obey the decree of Darius. But this is the reason. For since then in the times of Nebuchadnezzar while Daniel was present, the Chaldeans accused no other except the three boys alone, their testimony was not forgotten. In this way now in the times of Darius they accused only Daniel. For the call to martyrdom was his. For a man does not forsake God on account of time, so that in time he may be glorified. As the prophet says, "He who made his worlds, he shall call each one of them by name." [Isaiah 40:26]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.26.1-3"
