[[commentary]]
quote='''
This one will kill the two witnesses and precursors of Christ who herald his glorious advent from heaven, as he says through the prophet, "And I will give power to my two witnesses and they shall prophesy one thousand two hundred sixty days wearing sack cloth." [Revelation 11:3] Just as also he spoke to Daniel, "And he shall establish a covenant with many for one week and it will be that in the half of the week he shall take away my sacrifice and drink offering," [Daniel 9:27] so that the one week may be shown as divided into two, after the two witnesses will have preached for three and a half years, the Antichrist will wage war against the saints the remainder of the week and will desolate all the world so that what was spoken may be fulfilled, "And they will give the abomination of desolation one thousand two hundred ninety days. Blessed is he who endures to Christ and reaches the one thousand three hundred thirty-five days!" [Daniel 12:11-12]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.50.1-2"


[[commentary]]
quote='''
And so Daniel has foretold two abominations, one of destruction, one of desolation. What is the one of destruction but what was set up there in the time of Antiochus? And what was the one of desolation but the universal abomination when the Antichrist is near? As Daniel says, "And he himself shall stand for the destruction of many and he shall divide the earth in gifts and he shall cast an embankment against her and the land of Egypt shall not be saved, and these shall be saved from his hand, Edom and Moab and the chief of the sons of Ammon." [Daniel 11:41] For these are partners with him on account of kinship who also first proclaimed him king. For Edom is the sons of Esau who dwell at Mount Seir. But Moab and Ammon are the sons of Lot, who were begotten from his two daughters. As also Isaiah says, "And they shall be dispersed in ships of foreigners, carrying them together to the sea and those from the East and the West and from the North shall give glory, but the sons of Ammon first shall obey." [Isaiah 11:14]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.53.1-3"


[[commentary]]
quote='''
This one being proclaimed by them as king and being glorified by them and becoming the abomination of desolation to the world, he shall rule one thousand two hundred ninety days. As Daniel also says, "And they will give the abomination of desolation one thousand two hundred ninety days. Blessed is he who endures and reaches the one thousand three hundred thirty-five days." [Daniel 12:11-12] For when the abomination is present and wages war against the saints, whenever his days have passed, and it draws near to the forty-five other days which approach the fiftieth day, it reaches to the kingdom of heavens. For the Antichrist comes to the portion on the fiftieth day as about to inherit the kingdom together with Christ. And on account of this Isaiah says, "Let the impious be killed, so that he may not see the glory of the Lord." [Isaiah 26:10] And Paul says to the Thessalonians, "Whom the Lord Jesus shall kill with the spirit of his mouth and shall abolish him with the manifestation of his advent," [2 Thessalonians 2:8] but the saints are destined to inherit the kingdom with Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.54.1-5"
