[[commentary]]
quote='''
"And after running, one of the elders opened the doors of the garden," [Susannah 26] exhibiting the broad and wide way, through which they, who are misled to these doors, perish. For the maidens revealed the straight and narrow door to us, through which they also marched.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.24.4-5"
