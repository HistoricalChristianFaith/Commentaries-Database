[[commentary]]
quote='''
But that they zealously watched Susannah walking in the garden every day, this indicates that until now they, who are both from the Gentiles and the Jews of the circumcision, watch and interfere in the business of the church, both of whom wish to bring false testimonies against us, just as the apostle says, "On account of the secretly introduced false brethren, who were brought in to spy out the liberty which we have in Christ Jesus." [Galatians 2:4] And so in this way Scripture says, "And so these zealously watched every day to see her and they turned away their minds and perverted their eyes that they might not see heaven nor remember the righteous judgments." [Susannah 9] For these become plotters and seducers of the church, how then are they able to judge righteous matters or look up to heaven with a pure heart, they who have been enslaved from the beginning of this era?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.16.1-3"
