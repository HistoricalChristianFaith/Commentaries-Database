[[commentary]]
quote='''
But they wished to prove to him that beauty and strength does not come by earthly food which was supplied to the humans, but that the grace of God which was given through the Word supplies beauty and strength, and so they said to him, "Then test your slaves for ten days and give us vegetables and we shall eat them and drink water and our appearances shall be seen and you shall see the appearances of the boys who eat from the table of the king and, just as you see, in this way do to us." [Daniel 1:12-13] Do you see the unalterable faith of the youths and the immutable fear of God? They asked for intervals of time, ten days, so that in this they may prove that they are not able to procure grace from God differently from other men, but only by believing the preaching of the word through Jesus.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.11.4-5"
