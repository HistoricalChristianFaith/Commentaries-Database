[[commentary]]
quote='''
For since he himself humbled himself and declared himself to be the least of all men, the king extolled him and appointed him ruler of all the lands of Babylon. In which manner Pharaoh also did to Joseph, having then appointed him ruler of all the land of Egypt. For none of the men in all Egypt was found who was able to proclaim visions to Pharaoh, except Joseph alone, and none of the wise men in Babylon was able to declare the visions to the king, except Daniel alone.

For God leads forth holy men to himself from generation to generation, who is obligated to be glorified in all the world.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.9"
