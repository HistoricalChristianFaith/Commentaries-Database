[[commentary]]
quote='''
And so it is necessary for us to know the kind-heartedness of God, how to the worthy and to those who fear him, he swiftly reveals and unveils, fulfilling their petitions and requests, as the prophet says, "What wise man understands these things? Does even a man of understanding also know these things." [Hosea 14:9]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.5"
