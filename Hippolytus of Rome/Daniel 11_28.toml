[[commentary]]
quote='''
Then at this point, the army, which dwelt in Syria, having heard what happened, ran against them and made war against them on the day of the Sabbath. Those who feared the law of God and who kept the commandment of God did not lift up their hands against them, nor throw a stone against them, nor devise hiding places. And the soldiers answered them and said, "'Come forth now and do the command of the king and live!' but they said, 'We will not come out, nor will we do the command of the king, we will die in our sincerity. Heaven and earth testifies against you because you kill us recklessly.'" [1 Maccabees 2:29-37]

Then they fell upon them in fire and murder and in captivity and killed from them over a thousand souls. And so what was spoken to the blessed Daniel was fulfilled, "And he will go on a journey and his heart shall be lifted up against the holy covenant, and he shall want to do all according to his heart, and my slaves shall be persecuted and weakened in hunger and in sword and in captivity." [Daniel 11:28]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.43.1-4"
