[[commentary]]
quote='''
And so when the different beast was shown to the blessed prophet Daniel and it was shown that it differed from the others, it is necessary for us to consider that he does not discuss any of the beasts as mere animals, but in a model and image he portrays the kingdoms which have arisen in this world, just as he portrays the beasts destroying humanity.

For the Great Sea indicates the whole world, he says; "The four winds of heaven," [Daniel 7:2] which signal the fourfold creation. And so when he says, "I saw four beasts rising from the sea," [Daniel 7:3] he speaks concerning the kingdoms of this world.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.2.1-3"
