[[commentary]]
quote='''
And by means of this knowledge you shall escape the approaching threat of the fire of judgment, and the rayless scenery of gloomy Tartarus, where never shines a beam from the irradiating voice of the Word! You shall escape the boiling flood of hell's eternal lake of fire and the eye ever fixed in menacing glare of fallen angels chained in Tartarus as punishment for their sins; and you shall escape the worm that ceaselessly coils for food around the body whose scum has bred it.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%252010.html"
source_title="Hippolytus Refutation of All Heresies Book X"
