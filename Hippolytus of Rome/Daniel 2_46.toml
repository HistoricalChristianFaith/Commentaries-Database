[[commentary]]
quote='''
Nebuchadnezzar, after hearing these things, and after remembering the dream, recognized that what was spoken by Daniel was true, and, "he fell on his face and he worshipped Daniel and commanded slaves to offer gifts and perfumes to him." [Daniel 2:46]

How strong is the grace of God, beloved, so that shortly before he was about to be killed with the rest of the wise men of Babylon, the king fell on his face and no longer worshipped this man as a man but as God and commanded slaves to offer gifts and perfumes to him. For also long ago the Lord announced the same thing to Moses saying, "Behold, I have given you as God to Pharaoh," [Exodus 7:1] so that through the signs which happened under him in Egypt, Moses no longer was acknowledged as a man, but as God worshipped by the Egyptians.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.8"
