[[commentary]]
quote='''
"But when the elders said their words the slaves were exceedingly ashamed, because a wicked word was never yet brought against her." [Susannah 27]

When one lives chastely from boyhood, beloved, he forsakes the approval of men, even unto death. For the same happened to Susannah, who from childhood attended precisely to the law of Moses and, having lived chastely and temperately, she made the saying which was spoken through the two elders fruitless.

And in this way every believing man or believing woman, if they, fearing God, keep the faith which one has received, they will not sin. But if one ever should say they are a believer, but does deeds of unbelief, such a one receives from God double judgment, even if now they expect to escape notice in this world.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.25.2-5"
