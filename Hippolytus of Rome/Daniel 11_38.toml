[[commentary]]
quote='''
And so the prophet, having described what has already occurred and has been accomplished in its own time, he proclaims another mystery to us, making an indication of the end of times. For he speaks in this way, "And another shameless king shall arise and he shall be exalted over every god and shall be magnified and he shall say immoderate things and he shall prosper until the wrath is consummated. For it is to be consummated. And he shall not regard any god of his fathers nor desire women and he shall not regard any god, because he shall be magnified over all. And he shall glorify the god of Moazeim in his place and a god which his fathers did not know; he shall honor in gold and silver and precious stones and he shall multiply glory and shall subject many to them and divide the earth in gifts." [Daniel 11:36-39]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.48.1-2"
