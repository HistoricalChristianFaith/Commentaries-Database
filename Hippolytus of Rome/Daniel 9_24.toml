[[commentary]]
quote='''
And on account of this Gabriel says, "And to anoint a Holy of Holies." [Daniel 9:24] But no one is the Holy of Holies, except the Son of God alone, who comes and shows himself to be he who is anointed by the Father and was sent into the world; he said to them, "The Spirit of the Lord is upon me, because he has anointed me, he sent me to evangelize the poor, to heal the broken in heart, to preach freedom to the captives and to restore sight to the blind, to preach an acceptable year of the Lord." [Luke 4:18-19] And so as many as have believed in the heavenly priest, these are cleansed by the same priest, and their sins are wiped away. But as many as have disbelieved him, as setting him up to be nothing but a simple man, their sins are sealed as undiminished. From which the angel, foreseeing that all were not destined to believe in him, said, "to end sin and to seal sin." [Daniel 9:24] For as many as disobeyed him until the end, their sins were ended and were sealed to be kept for judgment. But as many were destined to believe in him and confessed to him as able to forgive sin, their sins were wiped away.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.32.3-7"


[[commentary]]
quote='''
And on account of this he says, "And to seal vision and prophecy." [Daniel 9:24] For after the fullness of the law and the prophets he himself has come, for the law and the prophets were until John, it is necessary that the things which were spoken by them be sealed, so that at the advent of the Lord all things which have been loosed and all things which have been sealed, may be brought to light, and what was not able to be made known may easily be perceived, and that which was bound long ago now may be loosed by him. As the Lord himself has said to the chiefs of the people, when they were angry at him when they saw him commanding powers on the day of the Sabbath and healing every disease and every sickness. But he said to them, "Hypocrites, each of you, looses the ox and the donkey from the stall and leads it away and gives it water. But this daughter, who is of Abraham, whom Satan has bound ten and eight years, is it not necessary for her to be loosed on the day of the Sabbath?" [Luke 13:15-16]

And so as many as Satan has bound and ensnared, when the Lord comes he shall loose them from the bonds of death, having bound the strong man who was against us, and having freed humanity. As Isaiah also says, "Then he will speak to those in bonds, 'Freedom' and to those in darkness, 'Be illuminated.'" [Isaiah 49:9] But on account of all which was spoken long ago through the law and the prophets, which has been sealed and which was unknown to men, Isaiah says, "And they will give the sealed book to a man skilled in letters and they will say to him, 'Read this,' and he will say 'I am not able to read it, for it is sealed.'" [Isaiah 29:11] For it is absolutely necessary that what was spoken long ago through the prophets to the unbelieving Pharisees, who pretended to know the letters of law, that it was sealed, but to those who believe all things, it was opened.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.33.1-6"


[[commentary]]
quote='''
And so all which has been sealed long ago now through the grace of the Lord, has been opened to the saints. For he himself was a perfect seal and key which is from David who opens and no one shuts, and shuts and no one opens.

As also John says, "And I saw at the right hand of him who sat upon the throne a book written inside and out, which was sealed with seven seals. And I saw an angel preaching in a great voice, 'Who is worthy to open the book and to loose its seals?' And no one was able in heaven nor upon the earth nor under the earth to open the book nor to look at it. And many were weeping because no one was found worthy to open the book nor to look at it. And the one from the elders says to me, 'Do not weep. Behold, the lion from the tribe of Judah has conquered, the root and the offspring of David, and he opens the book and looses its seven seals.' And I saw in the midst of the throne and in the midst of the elders a lamb standing, who was slain, who had seven horns and seven eyes, which are the seven spirits of God which are sent on to all the earth. And he came and he took the book from the right hand of him who sat upon the throne, and when he took the book, the four creatures and the twenty-four elders fell before the Lamb, each having a harp and golden bowls filled with incense, which are the prayers of the saints, and they sang a new song saying, 'You are worthy to take the book and to open its seals because you were slain and you purchased us for God by your blood from every tribe and tongue and people and nation and you made a kingdom and priests for God and they shall reign upon the earth.'" [Revelation 5:1-10] And so he took the book and loosed it, so that what was spoken long ago secretly concerning him, now may be preached with boldness upon the rooftops. And on account of this the angel said to Daniel, "Seal these words because the vision is of the end of time." [Daniel 12:4, 9] But they did not say "Seal," to Christ, but, "Loose what was bound long ago," so that through his grace we may recognize the will of the Father and we may believe on that one whom he sent, Jesus Christ our Lord, the Savior of men.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.34.1-4"
