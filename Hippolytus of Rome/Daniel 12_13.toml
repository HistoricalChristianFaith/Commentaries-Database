[[commentary]]
quote='''
And so, when the Lord described this to the disciples concerning the coming kingdom of the saints, that it will be glorious and wonderful, Judas was astounded at the words and said, "And who will then see these things?" But the Lord said, "Those who are worthy will see these things."

Now behold, O man, what was sealed long ago and was not able to be known in openness, is now preached on the rooftops and the Book of Life, which has already clearly been opened, opens wide on the wood of the cross, having an inscription written in Latin and Greek and Hebrew, that also the Romans and Greeks and Hebrews may be taught.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.59.1-2"
