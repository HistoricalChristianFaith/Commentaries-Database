[[commentary]]
quote='''
And the churches, too, will wail with a mighty lamentation, because neither "oblation nor incense" is attended to, nor a service acceptable to God; but the sanctuaries of the churches will become like a garden-watcher's hut, and the holy body and blood of Christ will not be shown in those days. The public service of God shall be extinguished, psalmody shall cease, the reading of the Scriptures shall not be heard; but for men there shall be darkness, and lamentation on lamentation, and woe on woe.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FDubious%2520and%2520Spurious%2520Pieces.html"
source_title="Dubious and Spurious Pieces"
