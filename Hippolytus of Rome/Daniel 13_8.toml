[[commentary]]
quote='''
To this Scripture says, "There was a garden adjoining his house and it happened as the people departed in the middle of the day, that Susannah entered and walked around in the garden of her husband, and the two elders watched her everyday and became lustful for her." [Susannah 7-8] Therefore the chiefs of the Jews now want to mutilate these things of the book of Daniel, claiming that these things did not happen in Babylon, because they are ashamed at what happened under the elders at that time, and thus they fail to recognize the administration of the Spirit.

As the divine writings are not respecters of persons and with openness display all things, not only the righteous works of men, which after they did them they were justified, but also the terrible things which occurred under them, upon which they were disfigured, they died, so that those who have the fear of God imitate the righteous and in this way partake in righteousness, but those who do the opposite have before their eyes what is destined for them, vengeance before the presence of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.15.1-3"
