[[commentary]]
quote='''
And so Daniel, when he knew what was written, having reflected on the plot which came upon him, did not fear it nor was terrified, but was readily holding himself to be handed over as food for beasts rather than to obey the prescription of the king. And he had a pattern of what happened to the three youths, when they did not wish to bow to the king's image, and they were preserved from the furnace of fire. And then he, coming into his house, opened the windows in the upper chambers opposite Jerusalem and three times a day knelt upon his knees and praised and confessed before his God just as he did before. [Daniel 6:10] And so it is needful to see the piety of the blessed Daniel, how he did not even pretend to be devoted to the royal affairs but rather adhering in prayer each day he rendered the things of Caesar to Caesar, and the things of God to God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.21.1-22.1"

[[commentary]]
quote='''
But someone will perhaps say, "And so what of it? Was he not able to pray by heart to God at day, but at night as he wished, devote to prayer secretly in the house so that he might not be endangered?" He was able but he did not want to. For if he did this the governors and satraps would have to say, "How does he fear God when he fears the decree of the king and what is commanded by him he obeys?" And they would bring against him some blame or censure of faithlessness. For this is a work of hypocrisy, not of fear and faith to God.

And on account of this he did not give a pretext of slander to those who opposed him, for whatever one is subject to, by this he is also enslaved. For those who believe in God ought not to feign nor fear what is ordered of them by authorities, lest they otherwise do some evil. If on account of faith to God they are compelled to do some other thing, they would gladly die rather than to do what is commanded by them.

For when the apostle said to be subject to all who are in authority [Romans 13:1], he does not speak concerning this, that deny our faith and deny what is prescribed by God, and that we do these things which men command, instead the apostle said that we should fear the authorities and not do evil, so that we are not punished by them as evildoers. And on account of this he says, "He is a servant of God, an avenger upon those who practice evil. What? Do you wish to not fear authority? He does good and you will have approval from him. But if you do evil be afraid. For he does not bear the sword in vain." [Romans 13:4] So that according to this he said to be subject, to live holily and piously in the present life, having before your eyes the danger of the sword. And so the apostles, being hindered by the chiefs and scribes, were not prevented from speaking the word, and obeyed God rather than men, and on account of this, having vexed the authorities, they, "set them in public prison. But at night an angel led them out and said, 'Go speak the words of this life.'" [Acts 5:18-20]

And so in this way Daniel also was hindered from prayer and he did not submit to the decree of the king, so that he may not place the glory of God under the glory of men. For if on account of God someone dies, he ought to rejoice, having found in this eternal life. And so it is necessary for those who, with purity, labor and live with fear in this world, to not give a pretext to those who seek a pretext, so that in this they would rather be disgraced. In which way then also the governors sought to find pretext against Daniel and they did not find it, because he was faithful. But if some people constrain us to not revere God, nor entreat him and threaten death to us, it is more happy to separate us from the love of God? Persecution or difficulty or oppression or hunger or danger or sword?" [Romans 8:35] And on account of this the blessed Daniel feared God more and handed himself over to death and he was preserved from the lions by the angel. For if he revered the decree and kept quiet during the thirty days, his faith to God would never be pure, for no one is able to serve two lords.

For the cunning of the devil is always like this, to oppress and persecute and to maltreat saints, so that they may not lift up holy hands while praying to God, seeing that the prayer of the saints furnishes peace to the world but punishment to the wicked. Just as Moses also when he lifted up hands in the desert, Israel prevailed, but whenever he set them down, Amalek prevailed. [Exodus 17:11] Just as this happens even now and is fulfilled among us. For whenever we cease praying the adversary prevails against us, but whenever we adhere to prayer, the power and authority of the evil one is abolished.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.22.2-24.9"
