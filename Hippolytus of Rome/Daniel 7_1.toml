[[commentary]]
quote='''
"In the first year of Belshazzar king of the Chaldeans, Daniel saw a dream and the visions of his head were while he was upon his bed, and he wrote down the vision." [Daniel 7:1]

And so as much as was revealed by the Spirit through visions to the blessed prophet, these things also he ungrudgingly described to others, so that he might not only, while prophesying the things which are to come, reveal them to himself, but also that it may be demonstrated to those who wish with faith to search the godly writings of the prophet.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.1.1-2"
