[[commentary]]
quote='''
And so Daniel interrogated him and he utterly destroyed him. For when he said, "Already the angel of God has come taking the sentence from God to cut you in half." [Susannah 55] It is clear that when Susannah prayed to God and was heard, then the angel was sent out to help her. In which manner also happened to Tobit and Sarah. [Tobit 3:16-17] For they, after praying, in the same hour and the same day the entreaty of the two was heard and the angel Raphael was sent out to cure the two.

And so in this way Scripture foretold through the prophet Amos to the house of Israel saying, "If the Lord God does a deed will he not reveal it first to his slaves the prophets?" [Amos 3:7] The vision occurred to Daniel and the Holy Spirit was awakened in him, so that after the examination which was performed by him occurred the angel slayed them as wicked false-witnesses.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.29.5-7"
