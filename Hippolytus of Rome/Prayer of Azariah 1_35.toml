[[commentary]]
quote='''
And so, having begun from the name of the holy and notable and magnificent, they came upon the works of the Lord, first naming the heavenly things, and they glorified him saying, "Bless the Lord all you works of the Lord, hymn and exalt him forever."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.29.4"
