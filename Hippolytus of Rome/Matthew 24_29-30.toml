[[commentary]]
quote='''
"But after the persecution of those days, the sun shall be darkened and the moon shall not give its splendor and the stars shall burn out and fall from heaven and the powers of heaven shall be shaken and then they shall see the Son of Man coming with power and great glory." [Matthew 24:29-30]

For if the devil receives for a little while authority to trouble the earth, as it is written, "God has given to him the authority to test those who dwell upon the earth," [Revelation 13:2, 12] how much more rather that the Son of God, when he takes all authority of heavenly and earthly and subterranean things, shall trouble all the earth and the elements in it, arriving to avenge the saints with angelic power and patriarchal glory, when he comes to be glorified in his saints and to be marveled by all who pray to him and to repay those who persecuted us with persecution, but to repay us who were persecuted with rest.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.52.3-4"
