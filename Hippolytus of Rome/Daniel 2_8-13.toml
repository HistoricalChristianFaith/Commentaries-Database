[[commentary]]
quote='''
Therefore, so that the Chaldeans, who had plotted in some way, would not deceive the king with words of deceit, Nebuchadnezzar, who was sorely pricked, said to them, "'I myself know, in truth, that you are buying time, because you see that the matter has departed from me. And so if you do not report to me the dream, I know that you have contrived to say a false and twisted word before me until the matter is forgotten.' The Chaldeans answered the king saying, 'There is not a man on earth who is able to make known the king's concern, because every great king and ruler does not ask such a matter of an enchanter, magician, sorcerer, or Chaldean, because the word which the king asks is difficult, and there is not another being who is able to proclaim it before the king, except the gods whose dwelling is not with flesh.'" [Daniel 2:8-11]

After these things were said, the king, having become angered, "ordered that all the wise men of Babylon be killed. And the edict went out that the wise men be killed." [Daniel 2:12-13]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.3"
