[[commentary]]
quote='''
And so the angel Gabriel speaks to him in this way, "From the day you gave your face to be humbled before the Lord your God your supplication was heard and I myself was sent to cause you to understand [Daniel 10:12] so that you may not inquire further before the time of time happens, for you are a greatly cherished man. For you desire to see these things, which are about to be ministered through me, but they will be fulfilled in their own time."

And he added saying, "Seventy weeks have been cut out for your people and for the holy city, for sin to be ended and for sin to be sealed and for unrighteousness to be erased and for lawlessness to be atoned and to bring in everlasting righteousness and to seal dreams and prophecy and to anoint a Holy of Holies. And to know and understand from the procession of the words for an answer to build Jerusalem until Christ the ruler, seven weeks and sixty-two weeks." [Daniel 9:24-25]

And so having named seventy weeks he divided them into two, so that what was spoken by him to the prophet may be understood all the more. For he says that thusly, "Until Christ the ruler, seven weeks," [Daniel 9:25] which is forty-nine years. For also in the twenty and first year Daniel sees these things in Babylon. And so when adding forty-nine years to twenty-one years, they fulfill seventy years, which the blessed prophet Jeremiah has spoken, that for seventy years the Most Holy Place shall be desolate [Jeremiah 25:11] from the captivity which happened to them under Nebuchadnezzar and after these things the people shall return and the sacrifices and offerings of Christ their ruler shall be offered. But of which Christ does he speak, except Jesus son of Josedek, who returned together with the people at that time, and in the seventieth year, after the Most Holy Place was built, he offered a sacrifice according to the law? [Ezra 3:8, 5:2] For all kings and priests were called Christs on account of them being anointed with holy oil, which Moses arranged long ago. And so these carried the Lord's name with themselves predicting the future model and bringing to light the image, until he who came from heaven, the perfect king and priest, Christ, who alone does the will of the Father, as is written in the book of kings, "And I shall raise up for myself a faithful priest, who will do all according to my heart." [1 Samuel 2:35]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.30.2-9"


[[commentary]]
quote='''
And so in order that the time when he is about to come may be shown which the blessed Daniel desired to see, he says, "And after seven weeks another sixty-two weeks," [Daniel 9:25] which encompasses the time of four hundred and thirty-four years. For after the people returned from Babylon their ruler Jesus son of Josedek and Ezra the scribe and Zerubbabel the son of Shealtiel, who was from the tribe of Judah, four hundred and thirty-four years occurred, until the advent of Christ, so that the Priest of priests was shown in the world and he who took away the sins of the world was clearly demonstrated as John says concerning him, "Behold, the Lamb of God who takes away the sin of the world." [John 1:29] Similarly Gabriel also says, "and to erase unrighteousness and for sins to be atoned," [Daniel 9:24] But who erases our unrighteousness? Paul the apostle teaches you saying, "He himself became our peace, who has made the two one and who broke up the dividing wall, enmity in the flesh, having abolished the law of commandments in the decrees of the Law," [Ephesians 2:14-15] and "having erased our sins which were written against us, which were opposed to us, and taking it from our midst, affixing it to the cross," [Colossians 2:14] and so "to erase unrighteousness and for unrighteousness to be atoned." [Daniel 9:24] But who are they whose unrighteous are atoned except they who believe in his name and through good works are these atoned before his presence?

Because after the people returned from Babylon four hundred and thirty and four years occurred until the generation of Christ, it is easy to perceive what has been set before. For since the first covenant with the sons of Israel was given after four hundred and thirty-four years, it is absolutely necessary for the second also likewise to be determined in the same time, so that it may be expected by the people and may be easily recognized by the believers.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.31.1-32.2"
