[[commentary]]
quote='''
And these are the Logoi that have been dispersed from above, from the "Joint Fruit of the Pleroma" and (from) Sophia, into this world. And they dwell in an earthly body, with a soul, when demons do not take up their abode with that soul. This, he says, is what has been written in Scripture: "On this account I bend my knees to the God and Father and Lord of our Lord Jesus Christ, that God would grant you to have Christ dwelling in the inner man," -that is, the natural (man), not the corporeal (one),- "that you may be able to understand what is the depth," which is the Father of the universe, "and what is the breadth," which is Staurus, the limit of the Pleroma, "or what is the length," that is, the Pleroma of the Aeons.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25206.html"
source_title="Hippolytus Refutation of All Heresies Book VI"
