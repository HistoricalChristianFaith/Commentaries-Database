[[commentary]]
quote='''
Therefore, in this way the vision was concealed from the king in Babylon, so that he who was chosen by God, was shown as being Daniel the prophet. For whenever a vision is hidden from others, yet is unveiled by another, this inevitably displays the one speaking as a prophet.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.2"
