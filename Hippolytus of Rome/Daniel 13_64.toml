[[commentary]]
quote='''
And so we ought to attend to all matters beloved, not fearing that someone who is caught in some trespass indicts his own soul, knowing that God is an advocate for all, he himself being the all-seeing eye, nothing which is committed in the world escapes his notice. Therefore, wakeful-ones who always live chastely from the heart, imitate Susannah and delight in the garden and enjoy the ever-flowing water and, having been smeared with all filth, consecrate yourselves with heavenly oil, so that you may offer a pure body to God and kindle your lamps and await the bridegroom, so that, striking this chord, you may be admitted and celebrate God through Christ in song, to whom be the glory forever. Amen.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.34.1"
