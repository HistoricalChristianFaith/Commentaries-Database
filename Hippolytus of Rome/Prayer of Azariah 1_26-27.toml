[[commentary]]
quote='''
And as Scripture says, "The angel of God descended into the furnace with those who were around Azariah, and he shook off the flame of the fire of the furnace and made the midst of the furnace like a breeze of dew which whistles, and the whole fire did not singe them nor vex or trouble them."

And so it is needful to ask, who was this angel who was revealed in the furnace and who preserved the boys as his own children under his enfolding arms, and for those in the midst of the furnace he turned the fire into dew, but for those outside the fire he assigned his own standard of judgment, as it is written, "With the measure you measure it will be measured to you"? [Luke 6:38 or Matthew 7:2]

Let me not deceive, he was not any other person, but the very one who judged the Egyptians with the water. In return for they who at that time threw the newborn males of the Hebrews into the river, they in the same way were destroyed in the sea by being plunged righteously into the water, so that a balanced recompense may be rendered to those who practice wickedly.

This was he who received the authority of judgment from the Father. He who also showered fire and divine retribution upon the Sodomites, and destroyed them on account of their lawlessness and wicked impiety. And Ezekiel agrees with this, who received and got possession of fire in his hand, and awaits the voice of the Father, when he shall command him to throw it upon the earth. [Ezekiel 10:2, 6-7] They, having seen this fire in the furnace, and having seen the light of this being eclipsed, trembled. Concerning this Isaiah says, "And his name shall be called Angel of Great Counsel." [Isaiah 9:6] For Scripture also likens this one to be an angel of God. For it was he himself who reported to us the mysteries of the Father. This one descended into the furnace with those who were around Azariah.

The fire, seeing this Angel, recognized his master and, being afraid, fled outside of the furnace and on account of this rose forty-nine cubits. For having been driven from within it gushed out and became delicate dew, which whistled as a wind in the midst of the furnace, from within, which did not at all possess the fragrance of fire. For the angel, who was standing in the furnace, drove the flame outside from within and having driven it he dispersed it in a circle around the furnace for forty-nine cubits.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.31.4-32.10"
