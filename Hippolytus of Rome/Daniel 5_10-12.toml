[[commentary]]
quote='''
Then at this point, "the queen, having heard what happened, came into the house of the drinking bout and said to the king, 'Let not your thoughts trouble you, and let not your form be changed. There is a man in your kingdom in whom is the Spirit of God, and in the days of your father watchfulness and understanding were found in him. And king Nebuchadnezzar your father set him as chief of the enchanters, magicians, Chaldeans, and soothsayers. Because the Spirit of God abounds in him and thoughts and understanding are his, he interprets dreams and explains difficulties, and solves riddles; his name is Daniel. And the king gave him the name Baltasar. And so now let him be called and he will explain the interpretation to you.'" [Daniel 5:10-12]

And so for what reason did the queen enter and call to mind Daniel? For did all the magistrates and friends of the king not know him? Or did they not know the things which occurred to Nebuchadnezzar, as he alone saw the dreams which were meant for him, and he set him as chief of the wise men of Babylon? They themselves also knew, but being destroyed by him, since he was adorned with heavenly wisdom, they did not want to proclaim to the king concerning him, so that he might not come and interpret the writing, and later they would be shamed.

This not only happened to Daniel then, but also even now it occurs to many. For when one of the saints acquires grace from God and is found wiser than others, immediately everyone begins coveting, hating, persecuting, insulting, dishonoring, talking down, and setting him at naught, so that by this they imagine him to be nothing. For similarly it also happened upon the prophets and upon the Lord and upon the apostles. In this way also we observe these things coming upon Daniel in Babylon. For Scripture puts forth these things as a proof that they happened in this way.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.15.5-16.5"
