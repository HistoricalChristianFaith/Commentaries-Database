[[commentary]]
quote='''
For this, he says, is the Resurrection that takes place through the gate of heaven, through which, he says, all those that do not enter remain dead. These same Phrygians, however, he says, affirm again that this very (man), as a consequence of the change, (becomes) a god. For, he says, he becomes a god when, having risen from the dead, he will enter into heaven through a gate of this kind. Paul the apostle, he says, knew of this gate, partially opening it in a mystery, and stating "that he was caught up by an angel, and ascended as far as the second and third heaven into paradise itself; and that he beheld sights and heard unspeakable words which it would not be possible for man to declare."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25205.html"
source_title="Hippolytus Refutation of All Heresies Book V"
