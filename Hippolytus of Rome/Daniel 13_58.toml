[[commentary]]
quote='''
And so in order that the sacredness of the holy writings may be kept in all places and the pure mouth of the blessed prophets may be proclaimed, for words we interpret words and for phrases we reckon phrases. For then while the elders plotted through wicked words to hide their desire and shamelessly said, "We saw them having relations with each other," [Susannah 39] the blessed Daniel examined what was both disgracefully and repulsively spoken by them, saying to them, "Under what tree did you see them lying with one another?" [Susannah 54, 58] For there is another sense of the phrase, "lying with someone," and another sense of "having relations with someone."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.31.1-2"
