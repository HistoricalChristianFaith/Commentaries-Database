[[commentary]]
quote='''
"For God gave them understanding and prudence in all learning and wisdom and Daniel understood all visions and dreams. And after the end of the days the chief eunuch brought them before the king and the king spoke with them and none were found from all of them like Daniel and Hanniah and Mishael and Azariah." [Daniel 1:17-19] And so the Word brought them forth in all wisdom, displaying them as faithful witnesses in Babylon, so that through them the worship of the Babylonians might be disgraced and Nebuchadnezzar might be defeated by the three boys and through their faith the fire in the furnace might be banished and the blessed Susannah might be rescued from death and the profane lust of the lawless Elders might be convicted.

These four boys, heeding God and having the fear of God in their hearts, carried out these victories in the city of Babylon. Therefore, come blessed Daniel, the avenger of Susannah, so that you may also show us the things that are destined to occur!
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.12.3-5"
