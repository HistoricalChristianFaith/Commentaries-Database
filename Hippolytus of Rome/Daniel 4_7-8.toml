[[commentary]]
quote='''
Then he described what happened in his second vision, as none of the magicians, soothsayers, and Chaldeans were able to declare the matter to the king, until Daniel was called who also described to Nebuchadnezzar his first vision, so that in all things God might glorify his own slaves the prophets beyond the other barbarians and foreign nations, who pretend to be flattered in their human wisdom, having practiced earthly learning.

For grace and gifts are from above from God, they are from heaven, which furnish their wealth to the worthy, which the blessed prophets partake by the Holy Spirit and are always made to understand. Just as also the apostle wrote to the Corinthians saying, "And I myself came to you not proclaiming words which are taught by human wisdom, but proclaiming to you the mystery of Christ, rather in words taught by the Spirit, interpreting spiritual things with spiritual things." [1 Corinthians 2:13]

And so in this way also the earthly wisdom of all the wise men in Babylon became foolish, who were not able to interpret the dream of the king, until one came, named Daniel, who had the Holy Spirit of God in him, just as the king himself also testified and proved it in many ways, and he set it forth to the people in writing, so that not only would Daniel be shown as being honored by the king himself, but also by all who were subjected to the king, so that he may be named as a man of God and a great prophet.

Just as also the Egyptians, who long ago saw the wonderful works in the ten plagues which came upon them through Moses, were afraid and so they named him Mennouthim, which is in Egyptian, "Man of God." For "Mennou" is called man, and "Thim" is called God. And in this way Nebuchadnezzar testified concerning Daniel that, "he has the Holy Spirit of God in him." [Daniel 4:8]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.2.2-6"
