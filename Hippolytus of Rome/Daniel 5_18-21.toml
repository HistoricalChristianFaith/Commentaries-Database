[[commentary]]
quote='''
And in this way, having begun, he described to the king all the things which happened to his father in their order, and at the same time he thoroughly explained to him the things which happened, in order to cause him to understand not to brag, nor to be arrogant, but that one must be under the authority of God.

And so he said to him, "God Most High gave to Nebuchadnezzar your father the kingdom and the majesty and the honor and the glory. And from the majesty which was given to him all peoples, tribes, and tongues were trembling and fearing from his face. Whom he wished, he did away with and whom he wished he struck and whom he wished he exalted and whom he wished he humbled. And when his heart was lifted up and his spirit was determined to act arrogantly, he was thrown down from the throne of his kingdom and honor was taken from him. And he was banished from men and his heart was given with beasts and his dwelling with the wild asses, they fed him grass like an ox, and from the dew of heaven his body was bathed, until he knew that the Most High reigns over the kingdom of men and he shall give it to whomever he esteems." [Daniel 5:18-21]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.17.3-4"
