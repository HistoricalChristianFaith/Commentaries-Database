[[commentary]]
quote='''
And so the prophet, having described what has already occurred and has been accomplished in its own time, he proclaims another mystery to us, making an indication of the end of times. For he speaks in this way, "And another shameless king shall arise and he shall be exalted over every god and shall be magnified and he shall say immoderate things and he shall prosper until the wrath is consummated. For it is to be consummated. And he shall not regard any god of his fathers nor desire women and he shall not regard any god, because he shall be magnified over all. And he shall glorify the god of Moazeim in his place and a god which his fathers did not know; he shall honor in gold and silver and precious stones and he shall multiply glory and shall subject many to them and divide the earth in gifts. And these shall be preserved from his hand, Edom and Moab and the chief of the sons of Ammon. And he shall stretch forth his hand upon the earth and the land of Egypt shall not be saved and he shall rule over the secret things of gold and silver and of all the desirable things of Egypt and Libya and Ethiopia in their fortresses. And he shall pitch his tent Efadano between the seas near the holy Mountain of Sabir and he shall come to his lot." [Daniel 11:36-45]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.48.1-2"


[[commentary]]
quote='''
And so these things the prophet described in this way concerning the Antichrist, as he will be shameless and warlike and a tyrant daring to exalt himself over every god, who boasts in his own power and pillages the fortresses of cities, and bearing lofty things in gold and silver and precious stone, he shall speak immoderate words against God, wishing that he himself alone be worshiped as God.

Concerning him all Scripture is not silent and the prophets announced beforehand his coming for the destruction of many, and the Lord has testified to these things, and the apostles taught these things concerning him, and John in the Apocalypse mystically revealed his name through a number. The Lord displayed this abomination of desolation and the apostle taught that this son of the devil arrives according to the working of Satan.

This one, having struck the city of Tyre, will also desolate the land of Egypt, having waged war he will extend and destroy all the land of Libya, and he shall ruin the kingdom of the Ethiopians with his might in the slaughter of the sword. He, being lifted up over every king and every god, shall build the city of Jerusalem and he shall raise the converted Temple, he shall restore both all the land and its borders to the Jews, and having summoned their people from the slavery of the nations, he shall exhibit himself to them as king, and at this the faithless shall worship him as God and shall bend the knee to him, considering him to be the Christ, not apprehending what was spoken by the prophet, how he is a deceiver and not truth. For Jeremiah says, "Instead they disobeyed the truth, then a spirit shall deceptively speak to this people and to Jerusalem." [Jeremiah 4:11] From which the apostle, when he saw a deceiver of the people, who will also be the work of Satan in them, said, "Whenever they say 'Peace,' and 'Security,' then suddenly ruin shall come upon them, just as the pain of birthing, and they shall not escape." [1 Thessalonians 5:3]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.49.1-7"
