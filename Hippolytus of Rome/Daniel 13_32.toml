[[commentary]]
quote='''
"The lawless ones commanded her to be unveiled, for she was covered, in order that her beauty may be fulfilled." [Susannah 32] Let us consider, beloved, of what evil this action was. For while the apostle said, "A woman ought to have a veil upon her head on account of the angels," [1 Corinthians 11:10] these men did the opposite, they commanded that she be unveiled in front of the people and at this they were not ashamed.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.26.4"
