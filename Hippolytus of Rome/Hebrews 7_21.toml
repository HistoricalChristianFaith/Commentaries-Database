[[commentary]]
quote='''
For also our Father, on beholding the Good One, and on being initiated with Him, preserved the mysteries respecting which silence is enjoined, and sware, as it has been written, "The Lord sware, and will not repent." Having, then, in this way set the seal to these tenets, he seeks to inveigle (his followers) with more legends, (which are detailed) through a greater number of books; and so he conducts (his readers) to the Good One, consummating the initiated (by admitting them into) the unspeakable Mysteries. ... And this oath, (Justinus) says, our Father Elohim sware when He was beside the Good One, and having sworn He did not repent (of the oath), respecting which, he says, it has been written, "The Lord sware, and will not repent." Now the oath is couched in these terms: "I swear by that Good One who is above all, to guard these mysteries, and to divulge them to no one, and not to relapse from the Good One to the creature."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25205.html"
source_title="Hippolytus Refutation of All Heresies Book V"
