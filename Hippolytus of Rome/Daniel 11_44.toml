[[commentary]]
quote='''
After these things Antiochus came out a second time raising war against him and he overcame Ptolemy. And then, after these things happened, Antiochus again stirred up the sons of Israel and he dispatched a certain Nicanor with a great army in order to make war against the Jews, while Judas, after the death of his father Matthias, ruled the people.

And so Nicanor, coming to Jerusalem, was defeated by the Maccabee and he reported these things to king Antiochus. But he, having heard this, summoned all his armies and gave to them allowances for one year and he commanded them to be ready for what was necessary. At this point, having failed to fulfill the salaries, he wished to enter into Persia in order to take tributes.

Accordingly, as he was about to depart, he addressed his friend, Lysias by name, and he set before him his own son Antiochus, and he commanded him to do all the things he willed, and he commanded him to send an army into Judea and to destroy the nation. Accordingly, Lysias, having arisen with the boy Antiochus, went with a great army, to wage war against Jerusalem.

And he came and was defeated by the Maccabee and these things were reported in Persia to Antiochus, that all the armies which were sent into Judea were cut down and that Lysias went with an army against them and was overthrown from their faces, and also that the Jews were strong in arms and were strong in every neighborhood and from every camp which he was cut down and that they fortified Mount Zion and that they had built a great and high wall around the city. But Antiochus, having heard this, fell into sickness from grief because just as he did not will, it also happened, and just as he did not want, thus it also occurred. And then being about to die, he called Philip his friend and he gave to him the diadem in order that he might restore it to his child Antiochus. When Philip arrived he entered Antioch and he kept himself safe in the palace. For the greatest armies were with him. And so these things were reported to Lysias and the child Antiochus, for it happened that Lysias had raised a barricade against Jerusalem to besiege it because Philip had arrived carrying the diadem and because he ruled Antioch. But having heard this, he was troubled and said, "Let us give pledges to these men and let us have peace with them. For the place is strong and it is closed to us and to the armies of the kingdom." [1 Maccabees 6:58] And having given pledges, he departed and what was spoken in Scripture was fulfilled, "And rumors and engagements troubled him from the east and west." [Daniel 11:44]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.46.1-13"
