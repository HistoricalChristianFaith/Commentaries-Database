[[commentary]]
quote='''
Then accordingly after the king heard the things concerning him he commanded Daniel to be brought and he said to him, "Are you Daniel who is from the sons of the captivity of Judea, whom my father Nebuchadnezzar brought? I have heard concerning you that you are able to interpret questions. And so now if you are able to read this writing and to make known its interpretation to me you shall be clothed in purple and a golden necklace shall be upon your neck and you shall be the third position in my kingdom." [Daniel 5:13-16]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.17.1"
