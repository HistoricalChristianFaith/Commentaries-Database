[[commentary]]
quote='''
And so Nebuchadnezzar, having been astounded at what was spoken by Daniel, said, "In truth your God, he himself is God of gods and Lord of those who rule, who also reveals mysteries, because he was able to reveal this mystery!' And the king promoted Daniel and gave him many great gifts and appointed him over all the lands of the Babylonians and appointed him as chief of the satraps over all the wise men of Babylon." [Daniel 2:47-48]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.9"
