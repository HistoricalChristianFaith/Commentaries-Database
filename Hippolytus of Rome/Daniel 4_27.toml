[[commentary]]
quote='''
How does that insolence and the mighty arrogance of words and the great and terrible flame of the furnace aid Nebuchadnezzar when he is not master of his own soul? And on account of this the blessed Daniel became his counselor, like a good doctor who wishes to heal his hurts. Now he said, "Let my counsel please you and redeem your sins in alms and your unrighteous deeds by pity on the poor. Perhaps he will be patient upon your trespasses." [Daniel 4:27]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.7.2-3"
