[[commentary]]
quote='''
We, however, he says, are spiritual, who, from the life-giving water of Euphrates, which flows through the midst of Babylon, choose our own peculiar quality as we pass through the true gate, which is the blessed Jesus. And of all men, we Christians alone are those who in the third gate celebrate the mystery, and are anointed there with the unspeakable chrism from a horn, as David (was anointed), not from an earthen vessel, he says, as (was) Saul, who held converse with the evil demon of carnal concupiscence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25205.html'
source_title="THE REFUTATION OF ALL HERESIES 5.4"
