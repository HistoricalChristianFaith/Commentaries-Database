[[commentary]]
quote='''
"And another mighty king shall arise and he shall enter into the strongholds of the king of Egypt." [Daniel 11:3] For one named Antiochus became king of Syria. This one reigned in the one hundredth and thirtieth and seventh year of the kingdom of Greeks. And at this point, then in those times he engaged in war with Ptolemy king of Egypt, and having prevailed over him he ruled. This one, returning from Egypt, went up to Jerusalem in the one hundredth and forty-third year and taking all the treasures which were in the house of the Lord he went to Antioch. After these things happened in this way, two years later the king sent his own tax collector to compel the Jews in the cities of Judea to transgress the laws of their fathers and to be subjected to the decrees and laws of the king.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.42.1-6"
