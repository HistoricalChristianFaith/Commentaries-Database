[[commentary]]
quote='''
And so while they were begging, the heart of the king was disturbed and his form was changed and his magistrates were troubled.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.15.4"
