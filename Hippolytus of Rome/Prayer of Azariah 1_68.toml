[[commentary]]
quote='''
Tell me, you three boys, remember me, I entreat you, that I also may obtain the same lot of martyrdom with you, who was the fourth person with you who was walking in the midst of the furnace and who was hymning to God with you as from one mouth? Describe to us his form and beauty so that we also, seeing him in the flesh, may recognize him. Who was he who in this way orderly described all creation through your mouth, so that you omitted nothing of which is and has been?

Having done this for one hour in the furnace, you taught the workmanship of creation. For the Word was with you and was speaking through you, the Word who understands the workmanship of creation. For it is wonderful, beloved, what was spoken through hymns by the three boys in the furnace. How they left nothing out of what has been created, so that it may not be considered that they did this by some independence or by their own power, but embracing and naming all things, both heavenly and earthly and subterranean, they showed all things to be slaves of God who created all things through the Word, so that no one may boast as being something unborn or created without headship.

Accordingly, let the doctrines according to the arch-heretics cease, which name powers and ages and originators, they invent empty tales, so that through strange words they, having deceived, might easily kill men and compel them to worship things that are not as though they were, others again fashion images in the hearts of men just like Nebuchadnezzar did. For Scripture encompasses all things, whether rulers or authorities or powers or thrones or dominions or every name which is named [Ephesians 1:21] it subordinates and enslaves all things to God, to praise and to bless and glorify him as Lord and Master who made all things.

And on account of this Ananiah, Azariah, Misahl, after declaring all things that exist, they added saying, "All you pious, bless and hymn and praise the Lord God of gods because his mercy is forever."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.30.1-7"
