[[commentary]]
quote='''
For the tree "grew great and strong, which reached unto the height of heaven and its trunk to the limits of all the earth," [Daniel 4:11] Scripture indicates it to be the kingdom of Nebuchadnezzar, as also Daniel distinctly stated, because the king was exalted and became glorious and ruled over all the earth and mastered the farthest nations. Its branches were dignitaries and commanders and governors and all who were appointed by him were as branches which are put forward from a tree. The leaves of the tree represent the edicts through his words, which he sent to all the earth, bidding and appointing just as he planned.

The tree which has great fruit is clearly the great revenue and tribute which was brought up to him from each of the nations. Its trunk which sits upon the earth signals it to be the kingdom of Nebuchadnezzar on account of it being engaged in earthly matters, just as it is established over the earth. The great fruit of it and the food for all, which is in it, signal the salaries and honors and favors which are given to all by the king, which were like food from a tree which is given to men. The wild beasts which dwell under it are signaled to be the armies and the powers which always stand near and remain in service to the king, assisting to the utmost for what has been ordered, like wild beasts who are ready to battle and to destroy and to rend men in pieces as if they were beasts. The birds which dwell in its branches are the obedience of all the nations to him, who come distantly and from afar and submit to those who are appointed chiefs by him, just as branches originate from the tree.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.8.3-10"
