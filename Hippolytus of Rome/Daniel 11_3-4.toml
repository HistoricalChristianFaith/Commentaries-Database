[[commentary]]
quote='''
Alexander of Macedon rose against him, who was the son of Philip, and he seized his kingdom. And after he subjected the Persians, his kingdom was divided to the four winds of heaven. For while dying, Alexander divided his kingdom to four chiefs.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.41.6"
