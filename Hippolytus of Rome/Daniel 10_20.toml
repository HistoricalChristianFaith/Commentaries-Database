[[commentary]]
quote='''
And so he says to him, "Do you know why I came to you? And now I will return to fight with the chief of the Persians, but I will proclaim to you what is written in the Scripture of truth, and there is no one who endures with me concerning these things except Michael your chief, and I left him there, for from the day you gave your face to be afflicted before your Lord God your petition was heard, and I myself was sent to fight with the chief of the Persians. For some plot happened to prevent me from coming to the people so that therefore in haste your request may be answered, I myself stood against him and I left Michael your chief there." [Daniel 10:12-14, 20-21]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.40.3"
