[[commentary]]
quote='''
"The elders said, 'While we were walking around in the garden alone, she entered with two handmaidens and she closed the doors of the garden and she sent away the handmaidens and a young man came to her, who was hidden and he reclined with her. But we, being in a secluded area of the garden, seeing the lawlessness, ran to them. And seeing them having relations with each other there we were not able to get a hold of him on account of the fact that he was stronger than us and, having opened the doors, he escaped. But we, having reached her, asked who the young man was, and she did not wish to tell us. These things we witnessed.' And they believed them as elders of the people and judges and they condemned her to die." [Susannah 36-41]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.27.1"
