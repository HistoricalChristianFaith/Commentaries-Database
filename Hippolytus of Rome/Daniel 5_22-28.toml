[[commentary]]
quote='''
And after saying these things he added the following, at once rebuking the king and not receiving his face so that having heard this the king would be afraid and so that he who committed trespasses might immediately recognize them.

And so it says, "And you his son, Belshazzar, you have not humbled your heart before God; do you not know all these things? And you have been exalted against the Lord God of heaven and have brought the vessels of his house before you and you and your magistrates and your mistresses and your concubines drank wine from them, and you have praised golden and silver and bronze and iron and wooden and stone gods, which do not see and which do not hear and which do not understand, and God, of whom your breath is in his hand and all your ways are as well, you have not glorified him. On account of this the fingers of a hand have been sent from his face and he ordered this writing: 'Mane, Thekel, Fares.' This is the interpretation of the phrase: 'Mane,' God has measured your kingdom and ended it, 'Thekel,' it has been weighed in the balance and been found wanting, 'Fares,' your kingdom is divided and has been given to the Medes and Persians." [Daniel 5:22-28]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.17.5-6"
