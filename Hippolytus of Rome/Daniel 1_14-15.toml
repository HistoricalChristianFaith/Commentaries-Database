[[commentary]]
quote='''
And so Scripture says, "And the chief eunuch heard them and tested them for ten days and after the end of the ten days their appearances appeared better and stronger in body compared to the boys who ate at the table of the king." [Daniel 1:14-15] And so these boys, though nourished with bread and water alone, were equipped with heavenly wisdom, and they had grace beyond all the boys their same age.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.12.1-2"
