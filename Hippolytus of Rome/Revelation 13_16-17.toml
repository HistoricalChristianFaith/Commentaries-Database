[[commentary]]
quote='''
Here the faith and the patience of the saints will appear, for he says: "And he will cause all, both small and great, rich and poor, free and bond, to receive a mark in their right hand or in their forehead; that no man might buy or sell, save he that had the mark, the name of the beast, or the number of his name." For, being full of guile, and exalting himself against the servants of God, with the wish to afflict them and persecute them out of the world, because they give not glory to him, he will order incense-pans to be set up by all everywhere, that no man among the saints may be able to buy or sell without first sacrificing; for this is what is meant by the mark received upon the right hand. And the word-"in their forehead"-indicates that all are crowned, and put on a crown of fire, and not of life, but of death. For in this wise, too, did Antiochus Epiphanes the king of Syria, the descendant of Alexander of Macedon, devise measures against the Jews. He, too, in the exaltation of his heart, issued a decree in those times, that "all should set up shrines before their doors, and sacrifice, and that they should march in procession to the honour of Dionysus, waving chaplets of ivy; "and that those who refused obedience should be put to death by strangulation and torture. But he also met his due recompense at the hand of the Lord, the righteous Judge and all-searching God; for he died eaten up of worms. And if one desires to inquire into that more accurately, he will find it recorded in the books of the Maccabees.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Dogmatical%2520and%2520Historical.html"
source_title="Hippolytus Dogmatical and Historical Fragments"
