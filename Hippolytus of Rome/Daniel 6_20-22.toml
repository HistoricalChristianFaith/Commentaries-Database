[[commentary]]
quote='''
Take heed, O man, because even at that time God rescued whom he wished to still live, so that the magnificent work of God may be shown and it may be preached in all the world until now. But whom he wishes to testify, he, having crowned them, takes them. For he rescued the three boys, so that the boast of Nebuchadnezzar may be shown as being nothing, wishing to demonstrate this, that "what is impossible for men is possible for God." [Luke 18:27] For since Nebuchadnezzar was arrogant and said, "And who is the god who is able to rescue you from the furnace of fire?" [Daniel 3:15] God demonstrated to him that he is able to rescue his slaves whenever he wills. For also similarly it happened to Daniel, for after Darius said, "Is God whom you perpetually serve, able to rescue you from the mouths of the lions?" [Daniel 6:20] Daniel answered and said, "God sent his angel and he stopped the mouths of the lions and they did not hurt me." [Daniel 6:22] For also all the governors and satraps contrived a pretext, so that they handed Daniel over to the beasts in order to kill him. But God, seeing their machinations and the sincerity of the blessed Daniel, rescued him from the mouths of the lions, so that he rescues whom he wills but takes whom he wills.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.35.3-7"
