[[commentary]]
quote='''
He was astounded and said to Daniel, "'Are you able to proclaim the dream which I saw and its interpretation?' And Daniel said, 'The mystery which the king asks about is not for magicians, enchanters, or soothsayers to proclaim to the king, but there is a God in heaven who reveals mysteries, and makes known to king Nebuchadnezzar what must be in the last days.'" [Daniel 2:26-28]

See how through these words he saves the Chaldeans from the danger which was to kill them and he teaches the king not to seek heavenly mysteries from earthly men, mysteries which are about to be fulfilled by God in his own times. And on account of this he, sending the mind of the king up to God, said, "There is a God in heaven who reveals mysteries," [Daniel 2:28] who receives the man who requests mercies and petitions.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.6"
