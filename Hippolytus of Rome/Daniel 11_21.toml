[[commentary]]
quote='''
In this way after these things happened, Alexander, having heard this, engaged in war with Ptolemy, and having not overpowered him, became a fugitive to the king of the Arabs. But he, removing the head of Alexander, sent it to Ptolemy and that one received it and the two diadems of Syria and Egypt were bestowed on him, which after being bestowed he died on the third day. And what was spoken in Scripture was fulfilled, "And they did not give to him the glory of kingdom." [Daniel 11:21] For he died and he did not receive glory from anyone as king.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.47.10"
