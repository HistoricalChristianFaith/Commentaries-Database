[[commentary]]
quote='''
And the apostles, who speak of God, in establishing the truth of the advent of the Lord Jesus Christ, have each of them indicated the appearing of these abominable and ruin-working men, and have openly announced their lawless deeds. First of all Peter, the rock of the faith, whom Christ our God called blessed, the teacher of the Church, the first disciple, he who has the keys of the kingdom, has instructed us to this effect: "Know this first, children, that there shall come in the last days scoffers, walking after their own lusts. And there shall be false teachers among you, who privily shall bring in damnable heresies."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FDubious%2520and%2520Spurious%2520Pieces.html"
source_title="Dubious Hippolytus Fragments"
