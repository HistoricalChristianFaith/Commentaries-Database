[[commentary]]
quote='''
And she perceived that all the rest of the Aeons, as being begotten, generate by conjugal intercourse. The Father, on the other hand, alone, without copulation, has produced (an offspring). She wished to emulate the Father, and to produce (offspring) of herself without a marital partner, that she might achieve a work in no wise inferior to (that of) the Father. (Sophia, however,) was ignorant that the Unbegotten One, being an originating principle of the universe, as well as root and depth and abyss, alone possesses the power of self-generation. But Sophia, being begotten, and born after many more (Aeons), is not able to acquire possession of the power inherent in the Unbegotten One.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25206.html"
source_title="Hippolytus Refutation of All Heresies Book VI"
