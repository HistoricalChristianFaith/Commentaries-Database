[[commentary]]
quote='''
For that which issued from the elders concerning what befell Susannah, these things are now also likewise accomplished by the chiefs of the people in Babylon now. For Susannah foreshadows the church, Jehoiakim her husband foreshadows Christ. The garden is the calling of the saints just like how fruit bearing trees produce fruit in the church. Babylon is the world. But the two elders represent the example of two peoples who scheme against the church, one who is of the circumcision and one who is of the gentiles. For it is said, "They were appointed as chiefs of the people and judges," [Susannah 5] It indicates that in this age they have authority and rule, unrighteously judging the righteous.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.15.4-6"

[[commentary]]
quote='''
And so this well known account occurred long ago in Babylon under the lawless elders, the judges who, forgetting the law of God and being enslaved to fleshly lusts, became plotters against the chaste Susannah, unrighteously grasping to destroy her righteous blood.

Accordingly it was necessary that these things be fulfilled in this way by the elders, so that namely the chosen race of righteousness may be manifested to all and the chastity of the blessed Susannah may be clearly shown and the righteous and holy prophet Daniel, then a young prophet, may be demonstrated to the people.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.1.4-5"
