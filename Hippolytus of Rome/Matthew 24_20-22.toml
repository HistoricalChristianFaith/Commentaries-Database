[[commentary]]
quote='''
On account of this, the Lord, foreseeing these things, says, "Pray that your flight does not happen in winter or on the Sabbath, you ought not to rest from righteousness nor engage in the matters of this life, as in winter, lest that day unknowingly fall upon you as a trap." [Matthew 24:20; Luke 21:34] "For if," he says, "those days were not curtailed, not any flesh would be saved. But on account of the elect those days will be curtailed." [Matthew 24:22]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.52.1-2"
