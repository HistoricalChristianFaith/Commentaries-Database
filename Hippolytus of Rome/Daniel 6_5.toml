[[commentary]]
quote='''
For then how many were they who pretended to be friends with Daniel, who wickedly hated him in heart? They falsely-sent gifts with other intentions and they ordered to give befitting gifts, wishing to test his sincerity, in order to have for the king a future pretext against him that they might appeal to the king that he was obliging himself to the king's possessions, and he in this way be killed as a plotter. And so at all times they resourcefully sought a cause against him. And not finding anything they later deliberated together, saying, "We have not found a pretext against Daniel except in the laws of his God." [Daniel 6:5]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.20.1-2"
