[[commentary]]
quote='''
Scripture says, "And her parents were righteous and taught their daughter according to the Law of Moses." [Susannah 3] For the tree is known from the fruit which it readily brings forth from itself. For reverent men who are also zealous for the law bring into the world children worthy of God, who on the one hand is the prophet and witness of Christ, and on the other is found chaste and faithful in Babylon, whom is proclaimed as the devout and chaste blessed Daniel the prophet.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.14.1-2"
