[[commentary]]
quote='''
Trees are easily recognized from the fruit they have produced. Being devout and full of zeal for the law they bear to the world worthy sons of God, that is, the prophet and witness of Christ and the one who from Babylon has been found tested and faithful, who has manifested the holiness and the wisdom of the blessed Daniel.
'''
source_url=''
source_title="COMMENTARY ON DANIEL 1:13.2"
