[[commentary]]
quote='''
And so when the prophet, wishing to persuade us according to all things and to examine the truth of what was seen by him, he inquired from one of the angels who stood near, that he himself also may be more precisely taught concerning the fourth beast, for he says, "I sought more precisely concerning it because he was fearful and terrible." [Daniel 7:19] And so the angel teaching him, but rather persuading us also through him to believe in what was rightly seen by him, he described to him all which was about to happen in the end, both the division of the fourth beast into the ten horns which arose from it, and the manifestation of the Antichrist in them and his war against the saints and his time, which is about to commence.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.14.1"
