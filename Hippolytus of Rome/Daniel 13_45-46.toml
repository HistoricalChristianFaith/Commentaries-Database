[[commentary]]
quote='''
Scripture says, "And while she was being carried off to be killed, God raised up the holy spirit of a young boy, who was Daniel by name. And he cried out with a great voice, 'I am innocent of this woman's blood.'" [Susannah 45-46] And so what is this which has happened, beloved? For we have been informed beforehand. On account of what reason did this assistance from the Lord not happen before her condemnation, but rather while she was being led away to be killed? It happened in this way so that the majesty and the power of God may be exhibited.

And so how is this right? When one wishes to redeem one of his slaves, he is able to redeem him and to save him, whenever he wishes and as he wishes. But when he wishes to seize a slave, he is allowed to kill him, so that having endured punishments as genuine truth, and after being crowned, God might glorify him. For after Susannah prayed and was heard, an angel of the Lord was sent as her advocate and became her helper, so that he might destroy those who were against her.

Who, after seeing the on-rush, the blessed Daniel, as he was a prophet and possessed the Spirit of God, cried out saying, "I am innocent of this woman's blood," [Susannah 46] so that he himself might not also become guilty of murder, in which manner also Pilate did to Christ, who washed his hands with water, saying "I am innocent of this man's blood." [Matthew 27:24]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.28.1-5"
