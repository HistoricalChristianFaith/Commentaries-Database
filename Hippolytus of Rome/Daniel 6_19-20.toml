[[commentary]]
quote='''
Accordingly, "Then he arose at first light and came to the den of lions in haste, and having called in a strong voice said, 'Daniel, slave of the living God, your God whom you serve perpetually, was he able to take you out from the mouth of the lions?'" [Daniel 6:19-20] And so why, having been disturbed, did the king cry this word, except that he had heard what happened to the boys, who were not willing to obey the prescription of the king, and were preserved from the furnace of fire?... The same happened to him, but he feared God and despised the decree of the Medes and Persians.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.28.5-6"
