[[commentary]]
quote='''
"And it happened, while they watched for a fitting day when she would go into the garden just as the day before and on the third day, with only two maidens, she desired to wash in the garden because it was during the heat of the day." [Susannah 15] "And it happened, while they watched for a fitting day." [Susannah 15] What does Scripture say is fitting, but the day of the Passover in which the washing in the garden prepares those who burn in refining fire and the Church, like Susannah, who is washed, is offered as a pure bride for God?

And so Scripture says, "She would go into the garden just as the day before and on the third day, with only two maidens, she desired to wash in the garden." [Susannah 15] It is clear that whenever the Church, according to custom, longs to receive the spiritual washing, it is necessary in this to follow two handmaidens. For the confessing Church receives the washing through faith unto Christ and through love unto God, and the two handmaidens, as they follow it; faith and love, prepare the oil and the ointments for the washings.

But what then were the ointments, but the commandments of the Word? What was the oil, but the power of the Holy Spirit, in which after washing believers are anointed as with myrrh? Scripture, through the blessed Susannah, long ago foreshadows these things for us, so that now we who believe in God, may now, not as strangers, understand the things which happen in the Church. But let us believe these things which were foreshadowed long ago through the patriarchs, just as also the apostle says, "These things came upon them as examples, and he wrote for your understanding, upon whom the ends of the ages have come." [1 Corinthians 10:11]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.17.1-6"
