[[commentary]]
quote='''
Accordingly, after these things happened, Scripture says, "And these three men, Shadrach, Meshach, Abednego, fell into the midst of the furnace while bound and that they were walking in the midst of the flame, hymning to God and blessing the Lord." [Daniel 3:23; Song of the Three Children 1] And so the bonds which the king put around them, these the fire consumed immediately, yet it did not singe their garments and cloaks so that even in this event the great work of God may be shown. For since the garments were clad around the bodies of the boys, these also with them were made holy and were not consumed by the fire, so that God, with the boys, may be honored in their witness. Let the arch-heretics, who deny the resurrection of themselves, tell me, how do they say there is no resurrection of the flesh, when the perishable garments and sandals, which came from the death of living creatures, are not destroyed by fire on account of the holiness which clothes their bodies? How also does the flesh, which is perishable and which clothes the holy soul, not also with the soul be made holy and be changed into incorruptible?

For if what is corruptible in nature did not receive corruption, how does what is incorruptible in nature, but has died through disobedience, again having been made alive by the power of God, not actually be made alive? So that the Scripture persuades us in every way to believe in God from a whole heart, in which way those who are perfect, who have believed, may be preserved from the furnace of fire as perfect along with their garb and cloaks. For if then the fire did not tame them, how is the eternal fire able to master the saints and they who similarly believe?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.28.1-7"
