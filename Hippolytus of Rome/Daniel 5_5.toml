[[commentary]]
quote='''
Accordingly after this happened, fingers of a man's hand came forth, and they wrote before the lamp upon the plaster of the wall of the house of the king.

In the case of Nebuchadnezzar it said, "A holy one descended from heaven," [Daniel 4:13] here it says, "fingers of a hand came forth," [Daniel 5:5] Scripture signaling that this is the same Word which was about to be embodied in the end and to assume the figure of a man, so that he may never be looked at as through a form, but having become a man in the flesh and the will of the Father having dwelt with men, he is perfected.

And so when the hand wrote writing on the wall, Scripture, in this, indicates this to be the law of God which was engraved on the mountain in tablets. As Scripture says, "and the tablets were written by the finger of God" [Exodus 31:18] and "the writing was the writing of God which was engraved on the tablets." [Exodus 32:16] And so in this way also here, the fingers of a hand were shown to the king alone, which flashed before the lamp, so that what was written there may be considered to be the writing of God. For the light of the hand, after dazzling the light of the lamp, dimmed the light of the lamp, so that the fingers which wrote on the wall might be seen.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.14.5-9"
