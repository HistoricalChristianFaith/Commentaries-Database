[[commentary]]
quote='''
"Then Susannah, having sighed deeply, said 'I am in dire straits for if I would do this now, it is death to me, yet if I would not, I will not escape your hands, but it is better for me, having not done this, to fall into your hands than to sin before the Lord.'" [Susannah 22-23] Behold, the words of the chaste woman who also heeded God. She says "I am in dire straits," for the Church is not only persecuted and oppressed by the Jews, but also by the gentiles and by those who falsely call themselves Christians, who always, beholding the temperance and tranquility of the Church, use force to destroy her.

"And so if," she says, "I would do this, it is death to me." [Susannah 22] For to disobey God and to obey men is death and works eternal punishment. "Yet if I would not, I will not escape your hands." [Susannah 23] And she has said this true word. For those who are brought forward for the sake of the Name of Christ, if they would do what is commanded by men, they die to God, but live to the world; but if they do not do what is commanded, they do not escape the hands of the judges, but being condemned by those same judges, they die.

For it is better for us, having not done what is commanded by men, to fall into their hands than to sin before the Lord. For this is more profitable: to be put to death unrighteously by men, so that we may live with God, than, consenting to them and, after being ruined by them, to fall into the hands of God. "For on account of this our Lord Jesus Christ also lived and died and rose again, so that he might reign over the living and the dead." [Romans 14:9]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.22.1-6"

[[commentary]]
quote='''
Long ago Susannah in every way taught these things to us, foreshadowing in herself, the mysteries of the Church from which faith and reverence and chastity of the body are preached in all the earth until now. And so I exhort all those who read this writing, women and virgins, the small and the great, holding before your eyes the judgment of God, taking her example, imitate her and, as Susannah was justified by God and was able to be delivered from the second death by the word which was administered through Daniel, so too will you be.

For men on the one hand who seek the temperance of Joseph, and, on the other hand, women who seek the purity and faith of Susannah, do not give in to the censure of blasphemy against yourselves, so that you do not credit what is said by the two elders as truth. For many liars and soul-deceivers have crept in, deceiving the pure souls of the saints, who destroy women with persuasive words and drag them on for the sake of their own lust, who upset men with heretical sayings, so that their own will may be accomplished.

On this account the apostle, foreseeing the things which will be, said, "I fear that, as the serpent deceived Eve by his villainy, your thoughts will be destroyed from the knowledge which is in Christ." [2 Corinthians 11:3] I exhort all you saints, be sober-minded, love the truth and take notice of the purity of Susannah, who was not enslaved to the flesh, or to the lust of pleasure, nor was carried away by the persons of the two elders, but fearing God from a whole heart, she chose the temporary death, so that she might escape the second death of fire.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.23.1-6"
