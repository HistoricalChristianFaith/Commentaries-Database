[[commentary]]
quote='''
"And the satraps and captains and governors and princes of the king came together and they saw the men, that the fire did not have lordship of their body and the hair of their head was not burned and their cloaks were not worsened and the scent of fire was not in them." [Daniel 3:27]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.34.4"

[[commentary]]
quote='''
And you mimic the three boys and understand their faith! For they said to the king, "God is able to release us, but if he does not will, we are under the authority of God, we would rather gladly die than do what is prescribed by you." [Daniel 3:18] Whom then Nebuchadnezzar also seeing the pure and blameless boys coming out from the furnace was astounded and amazed. For neither was their hair singed nor their cloaks changed nor was the smell of fire in them.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.37.6-7"
