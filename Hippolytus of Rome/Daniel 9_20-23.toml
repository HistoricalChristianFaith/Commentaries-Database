[[commentary]]
quote='''
And so confessing from the face of the people, he describes these things, declaring the sins of the people and of their fathers, who did not obey his slaves the prophets, who were sent to them to speak in the name of the Lord. And when he was proclaiming every supplication in humility and fastings and sackcloth, the angel Gabriel was sent forth to him, in order to cause him to understand what was sought by him. For Daniel speaks in this way, "And while I was still speaking and praying and declaring my sins and the sins of my people, prostrating my pitiful case before the Lord my God concerning the holy Mountain, and while I was still speaking in prayer, behold, the man Gabriel, whom I saw in the vision in the beginning, came flying and he touched me around the evening sacrifice and he caused me to understand and spoke with me and said, 'Daniel, now I have come to teach you understanding. In the beginning of your supplication the word went out and I myself came to proclaim to you that you are cherished man.'" [Daniel 9:20-23]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.29.1-3"
