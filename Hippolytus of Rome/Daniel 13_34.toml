[[commentary]]
quote='''
"Standing in the midst of the people they placed their hands upon her head," [Susannah 34] so that even while touching her they might slake the glut of their own lust.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.26.5"
