[[commentary]]
quote='''
But the male goat who comes from the south, he says is Alexander the Macedonian king of the Greeks.

And so when the goat comes to the ram and savages him and beats him on his face and shatters and hurls him to the earth and tramples him, it signals this, which also happened. For Alexander having engaged war with Darius, overpowered him and prevailed over all his power destroying and trampling his camp.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.26.3-4"
