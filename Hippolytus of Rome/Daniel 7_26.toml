[[commentary]]
quote='''
For he says, "It was given into his hand for time and times and half a time," [Daniel 7:25] which signals three-and-a-half years, and after these things the coming judgment, for he says, "thrones were set and the judgment sat and the kingdom was … the beast was given to the burning of fire." [Daniel 7:9-11, 26-27]

For, "the time approached," [Daniel 7:22] that is, all at once the time was fulfilled and the saints possessed the kingdom, when the Judge of judges and the King of kings in the future comes from heaven, who shall remove every chief and power which opposes him and shall consume all in an eternal fire, punishing the unrighteous, but he shall give to his slaves both prophets and martyrs and to all who fear him the eternal kingdom.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.14.2-3"
