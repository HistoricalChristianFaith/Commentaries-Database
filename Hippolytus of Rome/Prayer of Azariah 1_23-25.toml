[[commentary]]
quote='''
And so the Babylonians, seeing the three boys hymning in the furnace, did not cease to heat the furnace with resin, pitch, tar, and brushwood and the flame climbed forty-nine cubits above the furnace and spread out against they who fought against the mighty God. Scripture says, "The fire broke out and engulfed those whom it found around the furnace of the Chaldeans."

See how the fire itself was prudent and recognized and punished the culpable? For it did not singe the slaves of God, but consumed the faithless and godless of the Chaldeans, and those who were within the furnace were besprinkled by an angel, but those careless ones who imagined that they stood outside of the furnace, they were destroyed by fire.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.31.1-3"
