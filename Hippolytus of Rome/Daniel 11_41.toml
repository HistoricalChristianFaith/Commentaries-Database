[[commentary]]
quote='''
And so Daniel has foretold two abominations, one of destruction, one of desolation. What is the one of destruction but what was set up there in the time of Antiochus? And what was the one of desolation but the universal abomination when the Antichrist is near? As Daniel says, "And he himself shall stand for the destruction of many and he shall divide the earth in gifts and he shall cast an embankment against her and the land of Egypt shall not be saved, and these shall be saved from his hand, Edom and Moab and the chief of the sons of Ammon." [Daniel 11:41] For these are partners with him on account of kinship who also first proclaimed him king. For Edom is the sons of Esau who dwell at Mount Seir. But Moab and Ammon are the sons of Lot, who were begotten from his two daughters. As also Isaiah says, "And they shall be dispersed in ships of foreigners, carrying them together to the sea and those from the East and the West and from the North shall give glory, but the sons of Ammon first shall obey." [Isaiah 11:14]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.53.1-3"
