[[commentary]]
quote='''
Again he says, "And the daughter of the king of the South will come to the king of the North to make with him agreements and the arms of him who brings her shall not stand and he shall be crushed and both she and he who brings her shall fall." [Daniel 11:6] And this also happened. For a certain Ptolemy, who reigned at this point in Egypt, went out with her two sons Ptolemy and Philometer, making agreements with Antiochus the king of Syria. And then she, having come to Scythopolis, was killed there, for he who led her betrayed her. Then at this point the two brothers engaged in war with one another and Philometer was killed, but Ptolemy ruled.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.45.1-2"
