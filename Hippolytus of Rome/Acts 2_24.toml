[[commentary]]
quote='''
This, he says, is the form of the servant, and this the necessity of the Word of God coming down into the womb of a virgin. But he says it is not sufficient that the Perfect Man, the Word, has entered into the womb of a virgin, and loosed the pangs which were in that darkness. Nay, more than this was requisite; for after his entrance into the foul mysteries of the womb, he was washed, and drank of the cup of life-giving bubbling water. And it was altogether needful that he should drink who was about to strip off the servile form, and assume celestial raiment.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25205.html"
source_title="The Refutation of All Heresies Book 5"
