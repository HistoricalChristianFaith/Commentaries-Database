[[commentary]]
quote='''
And so at that time Nebuchadnezzar, after seeing the marvels which happened to the three boys and being pricked in heart, set forth through a decree to publically announce to all peoples, tribes, and tongues who were under him, that namely they who hear what occurred, should fear God and should glorify him, just as he himself also praised God and said, "His kingdom is an everlasting kingdom and his authority is from generation to generation." [Daniel 4:3]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.2.1"
