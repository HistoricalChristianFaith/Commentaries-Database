[[commentary]]
quote='''
And so after all of the people were deported and both the city was deserted and the Most Holy Place destroyed, in order to fulfill the word of the Lord, which he spoke through the mouth of Jeremiah the prophet, "The Most Holy Place will be deserted seventy years," [Jeremiah 25:11] we find the blessed Daniel in Babylon as a prophet and as an avenger of Susannah.

For Scripture says, "And there was a man living in Babylon and the name for him was Jehoiakim and he took a wife, whose name was Susannah, daughter of Hilkiah, who was exceedingly beautiful and who feared the Lord, and her parents were righteous and taught their daughter according to the Law of Moses." [Susannah 1-3] And so this account occurs later, but it is written before as the beginning of the book. For it was the custom of the scribes to place many things in reverted order in the Scriptures. For we also find in the prophetic visions that some visions which occurred first are even fulfilled at the end, and in turn again what is spoken last occurs even first. This happens by the economy of the Spirit, so that the devil may not understand what was spoken by the prophets in parables and then, having ensnared a man again a second time, kill him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.4.1-5.4"

[[commentary]]
quote='''
And Daniel, being a young boy, refuted the decrepit elders who were engaged in wicked desires, demonstrating in this the heavenly judge, who, though being a youth of twelve years, was destined to refute the elders who were transgressors of the law in the temple.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.1.3"
