[[commentary]]
quote='''
After these things were spoken in this way, Daniel says, "And I saw, and behold, two other men were standing, one on the side of the bank of the river and one on the other side of the bank of the river and they answered to the man who stood above the water of the river and they said to him, 'When will be the end of the wondrous words which you have spoken?' And I heard the man who was clothed in linen, who was above the water of the river and he raised his right and his left hand to heaven and swore by him who lives for ever that in time and times and half of the time, when the dispersion is consummated, they will know all these things." [Daniel 12:5-7]

And so who were the two men who were standing alongside the bank of the river except the law and the prophets? And who was the one who stood above the water except he himself, concerning whom they themselves heralded long ago, who was destined to be visibly testified by the Father at the Jordan in the end and to be shown to the people in openness by John, who carries the ink of a scribe and linen around his loins and being dressed with a multicolored tunic. These, seeing him, learned that to him was given all rule and authority, so that they understood exactly concerning him, when he is about to bring judgment to the world and when what was spoken by him shall be fulfilled. But he, wishing to persuade these according to every way, raised his right hand and his left hand to heaven and swore by him who lives forever.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.56.1-5"
