[[commentary]]
quote='''
For when it says to him, "Leave the stump of the roots of the tree in the earth," [Daniel 4:26] it is clear that he is again according to the purpose of God about to be reestablished over his own office. For this occurred as an education for the king, so that he would not be high-minded and in the future he would be able to say, "And all who walk in arrogance are able to be humbled." [Daniel 4:37]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.10.3-4"

[[commentary]]
quote='''
And so the kind of things which happened to Nebuchadnezzar at that time in those seasons were for admonitions and reminders, and were recorded for all men, as Daniel, also in dreams and visions, really described these things as happening, concerning which if we approach upon the passage in the book, we may interpret both the dreams and visions and shall show these to also be true.

For Nebuchadnezzar saw two dreams: the dream of the many colored image, then the dream concerning the tree, which Daniel interpreted, and in due time it was fulfilled. Likewise that which Daniel also saw, the four beasts rising from the sea, some of whom have already been, some of whom shall be, so that we may demonstrate that the prophecy of Daniel is the same and equal as the rest, differing in nothing, in order to make a proof of the things which already were and are and again shall be.

For if we believe the things which have already been as true, how do we not believe that all the coming events will be true also, which the blessed prophets announced beforehand that they shall be? But all things have been fulfilled, emerging in their own times according to the purpose of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.12.1-4"
