[[commentary]]
quote='''
"The ants have no strength, yet they prepare their meat in the summer." And in like manner, the Gentiles by faith in Christ prepare for themselves eternal life through good works.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Exegetical.%2520Fragments%2520from%2520Commentaries%2520on%2520Various%2520Books%2520of%2520Scripture.html"
source_title="Fragments from Commentaries on Various Books of Scripture - On Proverbs"
