[[commentary]]
quote='''
Next they addressed all things successively: the seven heavens and the authorities and powers in them, and the water which is above heaven, and they came to the firmament and, having named the lights in it, the sun and the moon and the stars, they were saying, "All you planets which move in heaven, bless, praise, and exalt him forever."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.29.5"
