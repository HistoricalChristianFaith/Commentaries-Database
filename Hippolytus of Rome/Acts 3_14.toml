[[commentary]]
quote='''
I produce now the prophecy of Solomon, which speaketh of Christ, and announces clearly and perspicuously things concerning the Jews; and those which not only are befalling them at the present time, but those, too, which shall befall them in the future age, on account of the contumacy and audacity which they exhibited toward the Prince of Life; for the prophet says, "The ungodly said, reasoning with themselves, but not aright," that is, about Christ, "Let us lie in wait for the righteous, because he is not for our turn, and he is clean contrary to our doings and words, and upbraideth us with our offending the law, and professeth to have knowledge of God; and he calleth himself the Child of God." And then he says, "He is grievous to us even to behold; for his life is not like other men's, and his ways are of another fashion. We are esteemed of him as counterfeits, and he abstaineth from our ways as from filthiness, and pronounceth the end of the just to be blessed." And again, listen to this, O Jew! None of the righteous or prophets called himself the Son of God. And therefore, as in the person of the Jews, solomon speaks again of this righteous one, who is Christ, thus: "He was made to reprove our thoughts, and he maketh his boast that God is his Father. Let us see, then, if his words be true, and let us prove what shall happen in the end of him; for if the just man be the Son of God, He will help him, and deliver him from the hand of his enemies. Let us condemn him with a shameful death, for by his own saying he shall be respected."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Dogmatical%2520and%2520Historical.html"
source_title="Fragments - Dogmatical and Historical"
