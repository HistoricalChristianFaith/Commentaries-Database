[[commentary]]
quote='''
See how the prophet likened the swiftness of angels to winged flight, on account of the nimbleness and the lightness of the weight of the angels, who are spirits flying quickly to obey what is commanded as Solomon says, "Do not curse your king in an oath lest a winged bird carries your words to him." [Ecclesiastes 10:20]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.30.1"
