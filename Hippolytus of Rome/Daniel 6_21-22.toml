[[commentary]]
quote='''
"And Daniel said to the king, 'My God sent his angel and he shut the mouth of the lions and they did not harm me because before him uprightness was found in me and before you, O king, I have not committed transgressions.'" [Daniel 6:21-22] What great trust he has to God rather than to men! For men despair and are handed over to death, but God does not abandon his slaves. On account of this the Psalmist teaches saying, "It is better to trust in the Lord than to trust in man. It is better to hope in the Lord than to hope in rulers." [Psalm 118:8-9]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.29.1-2"
