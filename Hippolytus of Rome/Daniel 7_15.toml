[[commentary]]
quote='''
But now the powerful beast is not one nation, but it is of many tongues and it gathers to itself from many races of men and prepares an army in a line of battle, and all are called Romans, though all are not from one country. So that the prophet was rightly amazed and foreseeing what was to come, he did not name from what country the beast was from, but he was amazed, saying, "My spirit shuddered in my being, I Daniel, and the visions of my head confused me. And one of those who stood came forth and sought precisely from him concerning all these things. And he said to me the certainty and made known to me the interpretation of the words." [Daniel 7:15-16]

And so, who are those who stand but the angels who stand before the face of the glory of the Lord and furnish a constant ministry to him, always attending to what has been commanded by him?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.8.7-9"
