[[commentary]]
quote='''
And so it is necessary for us to be steadfast in all matters and not to heed lying words, nor to be easily carried away nor be misled at the persons of rulers, knowing that we have to give an account to God. But rather we ought to attain to the truth and seek the exactness of faith, in order that we may be acceptable to God. For long ago the sons of Israel, who carelessly trusted the rulers and did not examine the truth, became guilty of murder, unrighteously condemning Susannah.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.27.2-3"
