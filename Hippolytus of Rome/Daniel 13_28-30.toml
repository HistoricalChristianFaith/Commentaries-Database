[[commentary]]
quote='''
"And it happened on the next day, as the people came together at the house of her husband Jehoiakim, the two elders came, who were full of designs of lawlessness against Susannah in order to kill her, and they said before the people, 'Send for Susannah, daughter of Hilkiah, who is the wife of Jehoiakim.' And they sent for her and she and her parents and her children and all of her relatives entered." [Susannah 28-30]

This is seen even now. For when one of the saints is seized, he is brought to the court, there all people run together to see what will happen to him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.26.1-2"
