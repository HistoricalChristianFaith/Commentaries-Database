[[commentary]]
quote='''
And so we find in the records that Nebuchadnezzar reigned twenty-five years. For after he reigned the first eighteen years, then after being lifted up, he set up the image. Then after twelve months this happened to him and he was banished from men and his kingdom was taken from him. And when he humbled himself and begged the Lord and confessed and entreated God the Most High, he was sought by his magistrates and having returned, he reigned again for seven years. Just as he himself also described saying, "And after the end of the days, I, Nebuchadnezzar, lifted up my eyes to heaven and my thoughts returned to me and I blessed the Most High and praised and glorified him who lives forever, because his authority is an eternal authority and his kingdom is from generation to generation and all who dwell upon the earth are reckoned as nothing, and according to his will he does in the power of heaven and in the dwelling of the earth, and there is not anyone who shall stand against his hand and will say to him, 'What have you done?' In the same season my thoughts returned to me and I came into the honor of my kingdom. And my form returned to me and my princes and my magistrates sought me, and I was strengthened over my kingdom and extravagant majesty was added to me. And so now I, Nebuchadnezzar, praise and exalt and glorify the King of Heaven, because all his works are true and his paths are just judgments and all who walk in arrogance are able to be humbled." [Daniel 4:34-37]

When he put away the same great arrogance which he acquired, and when he was suffering in the mountains, he confessed to God, recognizing the heavenly authority and he was restored again to the office of his kingdom, after both the magistrates and princes and all of those who were under him sought him, they also bestowed extravagant honor and glory upon him, so that what was spoken in the vision was fulfilled, "Except leave the stump of the roots of the tree in the earth, until you know that the Most High reigns over the kingdom of men and he shall give it to whom he esteems." [Daniel 4:25]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.11.1-5"
