[[commentary]]
quote='''
And so since even the angel Gabriel, just as it is understood by us, described these things in this way to the prophet, these things also happened and all these things are plainly recorded in the Maccabees, let us also see what he says in the vision of the weeks. For in this way, after reading the book of Jeremiah the prophet, in which it is written that the Most Holy Place is to be desolate seventy years, [Jeremiah 25:11] in fasts and petitions, he made confessions and asked that the people would quickly return from captivity to the city of Jerusalem.

And so in this way he describes this and says, "In the first year of Darius son of Ahasuerus, of the seed of the Medes, who reigned over the kingdom of the Chaldeans, I, Daniel, understood in the books the number of years for the completion of the desolation of Jerusalem, that is seventy years, as the word of the Lord came upon Jeremiah the prophet. And I gave my face to the Lord my God, to seek in prayer and supplications, with fastings and in sackcloth. And I prayed to the Lord my God and I confessed and I said, 'Lord, great and wonderful God who keeps your covenant and has mercy to those who love you and to those who keep your commandments, we have sinned, we did wrong, we were lawless, and we departed, and turned from your commandments and from your laws and we did not obey your slaves, the prophets, who spoke in your name to our kings and our chiefs and our fathers and all the people of the land. To you Lord be righteousness and unto us be shame of face as on this day to the men of Judah and to those who dwell in Jerusalem.'" [Daniel 9:1-7]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.28.1-3"
