[[commentary]]
quote='''
"And he came close," he says, "and he touched me as an appearance of a man and he strengthened me and he said to me, 'Do not fear cherished man. Peace to you, be strong like a man.'" [Daniel 10:18-19] For when all the strength and glory of our life is ended, then we are empowered by the outstretched hand of Christ, who also raises us as the living from the dead and as from Hades to the resurrection of life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.39.7"
