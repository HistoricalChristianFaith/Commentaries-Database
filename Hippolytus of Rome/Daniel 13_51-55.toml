[[commentary]]
quote='''
He said, "'Separate them a great distance from one another and I will interrogate them.' When they were separated, one from the other, and after summoning one elder, he said to him 'You are decrepit with wicked days; now your sins, which you did formerly, have arrived, you who propound unrighteous judgments and condemn the innocent, but free the guilty, though the Lord says, "The innocent and righteous you shall not kill." [Exodus 23:7] And so now if you did indeed see her, tell me, under what tree did you see them having relations with one another?' He said, 'Under the Mastic tree.' But Daniel said, 'You have lied directly upon your own head. For already the angel of God has come, taking the sentence from God to cut you in half.'" [Susannah 51-55]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.29.4"
