[[commentary]]
quote='''
In this way, after speaking these things, the prophet describes to us again another vision. For the blessed Daniel meditated on no other vision, lest he not be accurately taught all the things to come and he not teach and reveal these things to us again. Indeed he says, "In the third year of Cyrus king of the Persians a word was revealed to Daniel, who was called the name Baltasar, and the word was true and great power and understanding was given to him in the vision. 'In those days, I, Daniel, was mourning three weeks of days, I did not eat desirable bread and meat and wine did not enter my mouth and I did not anoint myself with oil for three full weeks of days. On the twenty and fourth day of the first month.'" [Daniel 10:1-4]

"I was humbled," he says, "twenty one days praying to the living God requesting from him the revealing of mysteries." And then, after the Father heard, he sent his Word, thus pointing out what is about to happen through him and then that it would happen along the Great River. For the event is necessary to have happened there where the Son was demonstrated, where also he was about to forgive sins.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.36.1-4"
