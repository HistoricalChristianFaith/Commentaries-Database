[[commentary]]
quote='''
"Then Daniel went into his house and made known the matter to Ananiah and Mishael and Azariah. And they sought mercies from the God of the heaven so that they would not also be destroyed with the rest of the wise men of Babylon. Then the mystery was revealed to Daniel in a dream at night and Daniel blessed the God of heaven saying, 'May the name of the Lord be blessed forever and ever, because wisdom and understanding and strength are his. And he himself changes seasons and times, and he appoints kings and removes them, who gives wisdom to the wise and insight to those who see with understanding. He himself reveals deep and hidden things, knowing the things in darkness, and light is with him. To you, God of my fathers, I give thanks and I praise you, because you have given to me wisdom and power and you have made known to me what we asked of you and you have made known to me the matter of the king.'" [Daniel 2:17-23]

And so it is necessary for us to know the kind-heartedness of God, how to the worthy and to those who fear him, he swiftly reveals and unveils, fulfilling their petitions and requests, as the prophet says, "What wise man understands these things? Does even a man of understanding also know these things." [Hosea 14:9]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.5"
