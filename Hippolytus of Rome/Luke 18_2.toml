[[commentary]]
quote='''
He then, having gathered to himself the unbelieving everywhere throughout the world, comes at their call to persecute the saints, their enemies and antagonists, as the apostle and evangelist says: "There was in a city a judge, which feared not God, neither regarded man: and there was a widow in that city, who came unto him, saying, Avenge me of mine adversary. And he would not for a while: but afterward he said within himself, Though I fear not God, nor regard man; yet because this widow troubleth me, I will avenge her." By the unrighteous judge, who fears not God, neither regards man, he means without doubt Antichrist, as he is a son of the devil and a vessel of Satan. For when he has the power, he will begin to exalt himself against God, neither in truth fearing God, nor regarding the Son of God, who is the Judge of all. And in saying that there was a widow in the city, he refers to Jerusalem itself, which is a widow indeed, forsaken of her perfect, heavenly spouse, God. She calls Him her adversary, and not her Saviour; for she does not understand that which was said by the prophet Jeremiah: "Because they obeyed not the truth, a spirit of error shall speak then to this people and to Jerusalem." And Isaiah also to the like effect: "Forasmuch as the people refuseth to drink the water of Siloam that goeth softly, but chooseth to have Rasin and Romeliah's son as king over you: therefore, lo, the Lord bringeth up upon you the water of the river, strong and full, even the king of Assyria." By the king he means metaphorically Antichrist, as also another prophet saith: "And this man shall be the peace from me, when the Assyrian shall come up into your land, and when he shall tread in your mountains."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Dogmatical%2520and%2520Historical.html"
source_title="Hippolytus Dogmatical and Historical Fragments"
