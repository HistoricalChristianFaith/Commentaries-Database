[[commentary]]
quote='''
"And he raised me from my knees and said to me, 'Daniel cherished man, understand in the words which I myself will speak to you and stand up in your place because now I am sent to you.' And when he spoke this word I stood trembling and he said to me, 'Do not be afraid Daniel because from the first day which you gave your heart to understand and to be afflicted before God, your words were heard.'" [Daniel 10:10-12] Behold, how strong the piety of the righteous man, so that the future things which have not yet been manifested in this world, are revealed to the worthy alone. First he was made to understand by the angel Gabriel, then secondly, by the Lord himself he was made wise.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.39.1-3"
