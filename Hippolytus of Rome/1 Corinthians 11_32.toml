[[commentary]]
quote='''
Now the image is the Spirit that is wafted over the water; and whosoever is not fashioned into a figure of this, will perish with the world, inasmuch as he continues only potentially, and does exist actually. This, he says, is what has been spoken, "that we should not be condemned with the world." If one, however, be made into the figure of (the Spirit), and be generated from an indivisible point, as it has been written in the Announcement, (such a one, albeit) small, will become great. But what is great will continue unto infinite and unalterable duration, as being that which no longer is subject to the conditions of a generated entity.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25206.html"
source_title="Hippolytus Refutation of All Heresies Book VI"
