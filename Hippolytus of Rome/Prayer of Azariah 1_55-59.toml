[[commentary]]
quote='''
Then they moved to the waters, rivers, both springs and seas. Next those which move in the waters both sea monsters and fish. Then the birds of heaven and both domestic and wild beasts.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.29.9"
