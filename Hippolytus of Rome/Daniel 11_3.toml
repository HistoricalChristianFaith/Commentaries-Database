[[commentary]]
quote='''
"And another mighty king shall arise and he shall enter into the strongholds of the king of Egypt." [Daniel 11:3] For one named Antiochus became king of Syria. This one reigned in the one hundredth and thirtieth and seventh year of the kingdom of Greeks. And at this point, then in those times he engaged in war with Ptolemy king of Egypt, and having prevailed over him he ruled. This one, returning from Egypt, went up to Jerusalem in the one hundredth and forty-third year and taking all the treasures which were in the house of the Lord he went to Antioch. After these things happened in this way, two years later the king sent his own tax collector to compel the Jews in the cities of Judea to transgress the laws of their fathers and to be subjected to the decrees and laws of the king.

And at this point when he arrived in the city of Modein, he summoned a certain righteous and pious man by the name of Matthias, who was from priestly stock, to whom he, answering, said, "Come now, Matthias, sacrifice and do what is prescribed by the king, just as he made all nations, because you are a great chief and a ruler in the city and are established in children and you will be a friend of the king." [1 Maccabees 2:17-18] But he, answering, said, "Though all nations and every man marches behind the king to do according to his command, I myself and my house and the house of my father will never do according to the prescription of the king; may we never depart from the law and covenant of our fathers; we will not listen to the words of the king to turn from our way right or left!" [1 Maccabees 2:19-22] While he was still speaking these words, behold, a Jewish man, coming before his face, came to sacrifice upon the altar of Modein. But Matthias, seeing him, was zealous for the law and his innards trembled, and he stood up in the fury of judgment and having fixed his mind to the task, he killed the Jewish man and also overpowered the guard of the king, and destroyed the altar and shouted, saying in the city, "Whoever is for the Lord who maintains the holy covenant let him follow after me!" [1 Maccabees 2:23-27]

And they left all their things in the city and fled into the mountains and an assembly of strong men clung to him with might and they became for him a support.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.42.1-10"
