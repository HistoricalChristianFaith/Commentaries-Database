[[commentary]]
quote='''
"And God gave Daniel mercy and favor before the chief eunuch. But the chief eunuch was saying to them, 'I myself fear my lord the king who has marked out your bread and your drink, lest he see that your face is sullen compared to the other youths at your assembly and you condemn my head to the king.'" [Daniel 1:9-10]

And so what was spoken by Melgad was true. For he did not understand them because of their purposes, and was concerned that their appearance would seem sullen compared to the youths who were eating from the table of the king and that by this he, having been found culpable, would be put to death.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.11.2-3"
