[[commentary]]
quote='''
And so, the dream which was seen by the king was not earthly, that it might be interpreted by the wise men of the world, but it was heavenly, according to the plan and foreknowledge of God, which is fulfilled in their own times. And on account of this it was concealed from men who comprehend earthly things, so that to those who seek heavenly things, the heavenly mysteries may be revealed.

For also in Egypt it happened similarly to Pharaoh. For he, seeing dreams, related them to all the interpreters of Egypt, and there was no one who declared them to Pharaoh. But when the blessed Joseph was present, the dreams, which were not apprehended by others, were in good time, unveiled. And on account of this the king, having been astonished, answered all his slaves, saying, "Have we ever found such a man, in whom is the Spirit of God?" [Genesis 41:38] Therefore, Scripture is indicating that no one will be able to describe the heavenly mysteries, unless he should interpret them as a partner of the Holy Spirit.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.2"
