[[commentary]]
quote='''
And having sent out a command he summoned together the governors, captains and rulers and all of those in authority to come to the consecration of the image, which Nebuchadnezzar the king set up.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.15.4"
