[[commentary]]
quote='''
Then, "the king spoke and they brought the men who accused Daniel and they themselves and their sons and their wives were cast into the den of lions, and they did not reach the bottom of the den before the lions mastered them, and they ground all their bones." [Daniel 6:24] And so they who have trusted in a human king and in wealth, they themselves dug a trench, and they fell in it for their destruction. And then this judgment happened to the three boys, who though being in the furnace of fire were not mastered, but the fire passed through to the outside and consumed the Chaldeans. For the eyes of God righteously assigns worthy judgment to men. As also befell Haman, who wished to annihilate on one day Mordecai and his race, and having readied fifty cubit gallows for Mordecai, Haman himself with all his household were hanged on it. Now they who accused Daniel and handed him over as food for beasts, they themselves were destroyed by lions.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.30.1-6"
