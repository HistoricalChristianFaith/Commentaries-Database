[[commentary]]
quote='''
"And Hilkiah and his wife praised God concerning their daughter with Jehoiakim her husband and all the assembly, because a shameful matter was not found in her. And Daniel became great before the people from that day and beyond." [Susannah 63-64]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.33.3"
