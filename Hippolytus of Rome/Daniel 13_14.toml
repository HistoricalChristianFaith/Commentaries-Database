[[commentary]]
quote='''
And so Scripture says, "And they asked one another the reason why they returned, and they acknowledged their lust." [Susannah 14] They prophesied that they themselves are destined to be examined by angels in order to give an account to God because of every sin which they committed, as Solomon says, "Affliction shall destroy the impious." [Proverbs 1:32] For they are caught by the trial of the wicked.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.16.6"
