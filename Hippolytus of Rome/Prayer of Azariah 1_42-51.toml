[[commentary]]
quote='''
Then they moved on to the direction of the air and the winds, which are in the midst of creation, which become windstorms and snows, cold and heat, light and darkness, both day and night and those things similar to them. Next they came to the foundation of the earth.

They began first from the glory of God itself and were glorifying him. Then what is above heaven, what is called super mundane. Next they named the firmament with the lights. Next what is in the midst of the firmament.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.29.6-7"
