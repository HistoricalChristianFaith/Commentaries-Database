[[commentary]]
quote='''
All the prophets, therefore, and the law spoke by means of the Demiurge,-a silly god, he says, (and themselves) fools, who knew nothing. On account of this, he says, the Saviour observes: "All that came before me are thieves and robbers." And the apostle (uses these words) "The mystery which was not made known to former generations." For none of the prophets, he says, said anything concerning the things of which we speak; for (a prophet) could not but be ignorant of all (these) things, inasmuch as they certainly had been uttered by the Demiurge only.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25206.html"
source_title="Hippolytus Refutation of All Heresies Book VI"
