[[commentary]]
quote='''
But after he heard these things, Matthias and his sons lamented concerning their brothers and they spoke to one another, saying, "If we all should do just as our brothers did, our enemies shall come and quickly remove us from the earth. And so if war comes upon us on the Sabbath let us stand and make war on behalf of our souls and on behalf of our customs." [1 Maccabees 2:39-40] Then after that point they ran down upon them and they pursued them from their boundaries and they entered into the city and circumcised the young boys, as many as they found uncircumcised, and they threw down the altars and all the sacred places and the deed brought prosperity into their hand. [1 Maccabees 2:45-47] But Daniel says, "they shall be held with little help." [Daniel 11:34] For then, after Matthias arose, Judas the Maccabee arose and helped them and delivered them from the hand of the Greeks and what was spoken in Scripture was fulfilled.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.44.1-4"
