[[commentary]]
quote='''
Scripture says, "And Jehoiakim was exceedingly wealthy and there was for him a garden adjoining his house, and the Jews gathered to him because he was more honorable than all the others. And in that year two elders were appointed from the people as judges, concerning whom the Master spoke, that lawlessness came from Babylon, from ancient judges, who appeared to govern the people. These remained at the house of Jehoiakim, and all those who had lawsuits came to them." [Susannah 4-6] And so it is necessary to seek the reason why this is so. For how are these who are captives and slaves of the Babylonians able to come together at the house like those who are autonomous?

In this it is necessary to understand that after Nebuchadnezzar deported them he humanely proclaimed privileges for them and allowed them to come together to practice all things according to the law.

Some, taking this authority, appointed two chiefs of the people who appeared to govern the people. These remained at the house of Jehoiakim, because he was more honorable and wealthier than all the others, as he was from the royal lineage.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.14.3-6"
