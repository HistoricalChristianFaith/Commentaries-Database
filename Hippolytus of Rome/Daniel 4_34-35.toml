[[commentary]]
quote='''
And so the dream seems to be self evident and quite clear to all, just as Scripture also teaches that these things happened in this way, and the same king later, while confessing, described what occurred to him. But at all events the grace of God plentifully causes man to understand, so that we, having in all things an unhindered mind, may not devote ourselves to the persons of human kings, for hope in man is vain, let us not, for the sake of gifts, flatter rulers who being in authority marshal men, but rather adhering to God alone and doing what is pleasing to him, let us also now continue in the present less dangerous life and let us readily flee from the judgment which is to come.

For how is a king and a ruler able to aid a man, since he is also mortal and is moved by the same authority of he who made all things? For he is able in this life to furnish to you many great gifts, but even these are earthly and happen to also be temporary. But many obtain honor and gifts under the king and are appointed into some authorities, later however, they endanger themselves either being found as plotters, or done away with by others as being friends of the king. How does friendship with the king aid them, who were not satiated with gifts which they received, but also besides destroy their own souls?

And so flee such persons, O man, never endangering yourself on account of them, "for all flesh is grass and all the glory of men is as the flower of the field. The grass withers and the flower falls." [1 Peter 1:24] Hear what was spoken by the apostle Paul, how he advises Timothy, writing, "Proclaim to the wealthy in the present age not to be high-minded, nor to obey the uncertainty of wealth, but to hope in the living God, [1 Timothy 6:17] who is the Savior of all men who exceedingly believe." [1 Timothy 4:10]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.6.1-8"


[[commentary]]
quote='''
Then he says, "Its feathers were plucked and it was lifted up from the earth and it stood upon human feet and a heart of a man was given to it." [Daniel 7:4]

For this really happened to Nebuchadnezzar, just as has been indicated in the book before this book, and he himself testifies in this way about that which happened to him, as he was banished from his kingdom and his glory was taken away and so was the majesty which he procured at first. And so just as he says to strip the feathers of the whole bird, he is powerless and is easily caught, and in this way at that time the powers of the king were removed, through which he imagined to boast and to be high-minded, but then was afraid and fled into the desert, so that he may not be killed by them.

When Scripture says, "It stood upon human feet and a heart of a man was given to it," [Daniel 7:4] it is clear that Nebuchadnezzar, having humbled himself and recognized that he is a man lying under the authority of God, he, after begging the Lord, obtained from him a good heart, and again his kingdom and glory were reestablished. Just as he himself testifies saying, "And after the end of the days I, Nebuchadnezzar, lifted up my eyes to heaven and my wits returned to me and I blessed the Most High and praised and glorified him that lives forever, because his authority is an eternal authority and his kingdom is from generation to generation and all who dwell upon the earth are reckoned as nothing and they are as nothing." [Daniel 4:34-35]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.2.6-10"
