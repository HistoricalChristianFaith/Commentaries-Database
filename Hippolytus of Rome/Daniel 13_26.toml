[[commentary]]
quote='''
And the slaves, after hearing the voice of Susannah, went in. But these elders, having opened the broad doors, did the opposite, cunningly contriving a certain pretext of death against her.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.25.1"
