[[commentary]]
quote='''
"In the second year of Nebuchadnezzar's kingdom, Nebuchadnezzar dreamed a dream and his spirit was amazed, and his sleep departed from him. And the king said to call the enchanters and the magicians and the sorcerers and the Chaldeans to proclaim to the king his dream. And they came and stood before the king. And the king said to them, 'I dreamed and my spirit was amazed to know the dream.' And the Chaldeans spoke to the king in Syriac, 'O king, live forever! Tell the dream to all your servants, and we will proclaim the interpretation.' But the king answered the Chaldeans, 'The memory has departed from me. And so, if you do not make known the dream to me and its interpretation you shall be destroyed and your houses shall be plundered. But if you do make known the dream and its interpretation to me, you will receive gifts and presents and much honor from me, only proclaim to me the dream and its interpretation.'" [Daniel 2:1-6]

And so, the dream which was seen by the king was not earthly, that it might be interpreted by the wise men of the world, but it was heavenly, according to the plan and foreknowledge of God, which is fulfilled in their own times. And on account of this it was concealed from men who comprehend earthly things, so that to those who seek heavenly things, the heavenly mysteries may be revealed.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.1-2"
