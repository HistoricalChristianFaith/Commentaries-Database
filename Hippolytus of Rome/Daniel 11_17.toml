[[commentary]]
quote='''
After these things happened Scripture says again, "And another king shall arise and he shall prevail over the earth and the king of the south shall arise and he shall take his daughters to wife." For it happened that a certain Alexander, the son of Philip arose. And in that time he rose up against Antiochus and, having made war with him, he killed him, and he ruled the kingdom.

Then he sent to Ptolemy king of Egypt, saying, "Give to me your daughter Cleopatra to wife. For behold, I sit upon the throne of the kingdom of my fathers." [1 Maccabees 10:51-58] And then Ptolemy took his daughter and brought her into Ptolmaeus and gave her to Alexander to wife. And Scripture was fulfilled as it says, "and he shall take his daughters to wife." [Daniel 11:17]

But it says, "And he shall corrupt her, she shall not be for him." [Daniel 11:17] And truly this was fulfilled. For when Ptolemy gave him his own daughter, he turned and saw the wondrous and glorious kingdom of Alexander, of which he was very eager to have, so he spoke deceitfully to Alexander.

But Scripture says, "And the kings shall speak lies to one another at one table." [Daniel 11:27] For Ptolemy desired the kingdom of Alexander and ate with him at his table, but he thought evil and did not have agreement with him. And so Scripture was fulfilled. And at this point Ptolemy, having come to Egypt and having levied a great army, came to the country when Alexander had gone to Cilicia. For it happened at that time that Tarsus and Mallus were thrown into confusion. He wished to repress them and came against them in haste, having left his own wife Cleopatra there.

Accordingly, Ptolemy went up to the country and mustered a watch guard against the city. Having conquered Judea, he came to his own daughter and sent a letter to Demetrius in the islands saying, "Come out and come here and I will give to you my daughter Cleopatra to wife because Alexander sought to kill me." [1 Maccabees 10:58] But he pretended these words wishing to lay blame upon Alexander. Accordingly, Demetrius came and Ptolemy received him and gave his daughter to wife, who was the wife of Alexander. And what was spoken was fulfilled, "He shall corrupt her and she shall not be to him nor remain with him," [Daniel 11:17] because "The kings, their hearts set on evil, even spoke lies to one another at one table." [Daniel 11:27]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.47.1-9"
