[[commentary]]
quote='''
And so all which has been sealed long ago now through the grace of the Lord, has been opened to the saints. For he himself was a perfect seal and key which is from David who opens and no one shuts, and shuts and no one opens.

As also John says, "And I saw at the right hand of him who sat upon the throne a book written inside and out, which was sealed with seven seals. And I saw an angel preaching in a great voice, 'Who is worthy to open the book and to loose its seals?' And no one was able in heaven nor upon the earth nor under the earth to open the book nor to look at it. And many were weeping because no one was found worthy to open the book nor to look at it. And the one from the elders says to me, 'Do not weep. Behold, the lion from the tribe of Judah has conquered, the root and the offspring of David, and he opens the book and looses its seven seals.' And I saw in the midst of the throne and in the midst of the elders a lamb standing, who was slain, who had seven horns and seven eyes, which are the seven spirits of God which are sent on to all the earth. And he came and he took the book from the right hand of him who sat upon the throne, and when he took the book, the four creatures and the twenty-four elders fell before the Lamb, each having a harp and golden bowls filled with incense, which are the prayers of the saints, and they sang a new song saying, 'You are worthy to take the book and to open its seals because you were slain and you purchased us for God by your blood from every tribe and tongue and people and nation and you made a kingdom and priests for God and they shall reign upon the earth.'" [Revelation 5:1-10] And so he took the book and loosed it, so that what was spoken long ago secretly concerning him, now may be preached with boldness upon the rooftops. And on account of this the angel said to Daniel, "Seal these words because the vision is of the end of time." [Daniel 12:4, 9] But they did not say "Seal," to Christ, but, "Loose what was bound long ago," so that through his grace we may recognize the will of the Father and we may believe on that one whom he sent, Jesus Christ our Lord, the Savior of men.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.34.1-4"
