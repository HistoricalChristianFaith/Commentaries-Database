[[commentary]]
quote='''
And so similarly it happened also to Nebuchadnezzar. For indeed after he began the eighteenth year, he set up the image, just as has been said in the book before this, and its dimensions were also made known. After the year with twelve months was fulfilled, his kingdom was taken away from him so that the dream which was seen by him was fulfilled and he who had captured others, himself became a fugitive, and he who punished the Hebrews in a strange land, even he was deservedly punished in a desolate land.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.5.1"

[[commentary]]
quote='''
And so after twelve months all these things happened to king Nebuchadnezzar. For neither did Scripture lie nor did Daniel deceive him, but he taught him beforehand that these things were about to be accomplished in him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.8.1-2"
