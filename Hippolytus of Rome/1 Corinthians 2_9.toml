[[commentary]]
quote='''
But the righteous will remember only the righteous deeds by which they reached the heavenly kingdom, in which there is neither sleep, nor pain, nor corruption, nor care, nor night, nor day measured by time; nor sun traversing in necessary course the circle of heaven, which marks the limits of seasons, or the points measured out for the life of man so easily read; nor moon waning or waxing, or inducing the changes of seasons, or moistening the earth; no burning sun, no changeful Bear, no Orion coming forth, no numerous wandering of stars, no painfully-trodden earth, no abode of paradise hard to find; no furious roaring of the sea, forbidding one to touch or traverse it; but this too will be readily passable for the righteous, although it lacks no water. There will be no heaven inaccessible to men, nor will the way of its ascent be one impossible to find; and there will be no earth unwrought, or toilsome for men, but one producing fruit spontaneously in beauty and order; nor will there be generation of wild beasts again, nor the bursting substance of other creatures. Neither with man will there be generation again, but the number of the righteous remains indefectible with the righteous angels and spirits. Ye who believe these words, O men, will be partakers with the righteous, and will have part in these future blessings, which "eye hath not seen nor ear heard, neither have entered into the heart of man the things which God hath prepared for them that love Him." To Him be the glory and the power, for ever and ever. Amen.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Dogmatical%2520and%2520Historical.html"
source_title="Against Plato, on the Cause of the Universe"