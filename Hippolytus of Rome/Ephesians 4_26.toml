[[commentary]]
quote='''
But in his first steps he will be gentle, loveable, quiet, pious, pacific, hating injustice, detesting gifts, not allowing idolatry; loving, says he, the Scriptures, reverencing priests, honouring his elders, repudiating fornication, detesting adultery, giving no heed to slanders, not admitting oaths, kind to strangers, kind to the poor, compassionate. And then he will work wonders, cleansing lepers, raising paralytics, expelling demons, proclaiming things remote just as things present, raising the dead, helping widows, defending orphans, loving all, reconciling in love men who contend, and saying to such, "Let not the sun go down upon your wrath;" and he will not acquire gold, nor love silver, nor seek riches.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FDubious%2520and%2520Spurious%2520Pieces.html"
source_title="Dubious and Spurious Pieces"
