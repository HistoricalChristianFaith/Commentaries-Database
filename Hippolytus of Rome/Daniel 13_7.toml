[[commentary]]
quote='''
Because the garden, which was planted in Eden by God, was intended to become a model and image of the church, the lovers of learning must recognize this. For it is necessary for the earthly things to reflect the heavenly and for the earthly figures to witness to the spiritual and for the transitory to expect the eternal, as God also commanded Moses to make a tabernacle according to the model which was shown to him on the mountain.

What was that which has been seen, but the images of heavenly glories and heavenly forms, from which Moses fashioned a tabernacle from incorruptible wood corresponding to the fleshly representation, so that for those who regard fleshly things, these same people may be revealed as terrestrial, but for those who regard spiritual things, these same people may become celestial?

And so Eden is called a place of delight, this is the Garden. It was planted in the east, being adorned with seasonable trees and all kinds of fruits, so that the community of the righteous must understand that the place is holy, in which the Church was planted. For neither is a mere place able to be a called the Church, nor a house which is built with stone and clay, nor a man himself able to call himself the Church. For a house is destroyed and a man dies. And so, what is the Church? The community of Saints participating in truth.

Therefore unanimity and way of the saints, this becomes the Church, the spiritual House of God, which was planted in Christ as it was planted in the east, in which diverse and blossoming trees were introduced and appeared, and the generation of the fathers from the beginning were distinguished and the works of the prophets, which were fulfilled after the Law, the chorus of both the apostles, who make men become wise through the Word, and of all the martyrs, who will be saved through the blood of Christ, and the calling of the virgins, who are sanctified through water, the chorus of disciples and the order of bishops, both priests and Levites, these are the Church. And having been adorned in every manner and diversity, all these things flourish in the Church, being unable to be destroyed, and by partaking of their fruit we rejoice because by eating of them we enter into spiritual and heavenly delight. For the blessed patriarchs themselves minister the oracles of God to us, just like the blossoming trees which were planted in the garden also bear fruit among themselves at all times, so that the sweet Christ may be presented; that is the fruit of life which was given to us, so that we may know these things until now.

In this Eden a river of everlasting water flows and four rivers, which stream from it, pour over all the land of men, as also is shown to happen in the Church. For the river, being Christ, though the fourfold saving Gospel, watches carefully over all and is present in all. But also Christ irrigates and waters all who believe in him, as the prophet says, "Rivers gush from his heart." And so in the Garden there was exhibited a tree of knowledge and a tree of life, as now in the Church are the Law and the Word like two trees which were planted. For through the knowledge of the Law came sin, but through the Word, life and forgiveness of trespasses is given. For even then Adam, having disobeyed God and, after tasting from the tree of knowledge, became an outcast of the garden, being cast out from the land into a land where he again wanders.

Similarly again he who has believed and, after not keeping the commandments, strips naked the Holy Spirit, becomes an outcast of the Church, but the earth no longer receives him, and becoming like the man of old, he is bound to wander.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.18.1-13"

[[commentary]]
quote='''
For therefore when Scripture says, "Susannah entered and walked around in the garden of her husband," [Susannah 7] it indicates that all the kings and those in preeminence plant gardens for themselves in cities and lands in order to delight in them, as Jehoiakim did in Babylon. For there was a garden adjacent to his house in which Susannah entered and was walking around in, having been devoted to prayer and having sung hymns and songs to God, who sent forth the two handmaidens to carry the prescribed things in order to wash.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.19.1-2"
