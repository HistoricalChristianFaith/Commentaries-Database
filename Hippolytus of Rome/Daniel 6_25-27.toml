[[commentary]]
quote='''
Then Darius wrote to all peoples, tribes and tongues, to those who dwell in all the earth, declaring peace to all and then through what was published by his decree, compelled them to worship God just as it says, "The decree which was set from my face in every realm of my kingdom that all should tremble and fear before the face of the God of Daniel because he himself is the living God, who endures forever and his kingdom shall not be destroyed and his dominion is forever. He assists and rescues and works wonders and signs in heaven and on the earth, who took Daniel from the mouth of the lions." [Daniel 6:26-27]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.31.1"

[[commentary]]
quote='''
You see, today Babylon is the world, the satraps are its authorities, Darius is their king, the den is Hades, the lions are punishing angels. And so imitate the blessed Daniel who did not fear the satraps and do not obey a human decree, so that after being cast into the den of lions you may be guarded by the angel, and you may tame beasts, and you may be worshipped by them as a slave of God and no destruction may be found in you, but being alive you may be brought up from the den and may be found as a sharer of the resurrection and you may rule over your enemies and you may always give thanks to the living God. For to him be glory and might unto the endless age of ages. Amen.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.31.2-4"
