[[commentary]]
quote='''
And so Darius, who was called Ahasuerus, received the kingdom and "appointed one-hundred-twenty satraps and appointed three governors over them, whom Daniel was one of, for the satraps to give account that the king may not be overburdened. And Daniel was over them because a spirit abounded in him, and the king appointed him over his whole kingdom." [Daniel 5:31-6:3] For Darius the Mede, after hearing the things concerning him, both the wisdom which he acquired and his faith and piety from childhood, he appointed him to be first of all his friends and to rule all his kingdom, as Pharaoh did, having granted to Joseph second honor of the throne of his kingdom and assigning all the chiefs of the Egyptians to be obedient to him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.19.1-2"
