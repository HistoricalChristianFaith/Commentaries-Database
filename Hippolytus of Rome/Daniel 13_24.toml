[[commentary]]
quote='''
And so, after these things happened, Scripture says, "And Susannah lamented with a great voice, but the two elders cried out against her." [Susannah 24] And so to whom did Susannah cry out but to God, as Isaiah also says, "Then you will cry out and God will hear you, while you are still talking he will say 'Behold, I am here.'" [Isaiah 58:9] "But the two elders cried out against her." [Susannah 24] For the lawless do not cease crying out against us and saying, "Take such people from the earth. For it is not proper for them to live."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.24.1-3"
