[[commentary]]
quote='''
And so he says to him, "Behold, still three kings shall arise in Persia and the fourth will be rich with greater riches than all. And after he himself masters his riches he shall rise against all the kingdoms of the Greeks. And a mighty king shall arise, and he shall be lord of a great dominion and he shall do according to his will. And as his kingdom rises it shall be shattered and divided to the four winds of heaven." [Daniel 11:2-4]

And so we have already described these things above when we made the account concerning the four beasts, but since now Scripture describes all these things again in detail, it is absolutely necessary also for us to make a second account, so that we do not forsake Scripture as idle and indemonstrable.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.41.2-3"
