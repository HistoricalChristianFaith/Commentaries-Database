[[commentary]]
quote='''
He washed in Jordan, and when He was baptized He received a figure and a seal in the water of (another spiritual booty beside) the body born of the Virgin. (And the object of this was,) when the Archon condemned his own peculiar figment (of flesh) to death, (that is,) to the cross, that that soul which had been nourished in the body (born of the Virgin) might strip off that body and nail it to the (accursed) tree. (In this way the soul) would triumph by means of this (body) over principalities and powers, and would not be found naked, but would, instead of that flesh, assume the (other) body, which had been represented in the water when he was being baptized.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25208.html"
source_title="Hippolytus Refutation of All Heresies Book VIII"
