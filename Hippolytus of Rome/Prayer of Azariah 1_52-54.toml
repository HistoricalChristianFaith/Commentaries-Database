[[commentary]]
quote='''
Next they moved to the earth saying, "Bless the Lord you earth, hymn and exalt him forever." Then the mountains and hills. Next all things which grow upon the earth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.29.8"
