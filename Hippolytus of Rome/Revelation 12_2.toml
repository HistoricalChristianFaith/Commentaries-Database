[[commentary]]
quote='''
And those, "she, being with child, cries, travailing in birth, and pained to be delivered," mean that the Church will not cease to bear from her heart the Word that is persecuted by the unbelieving in the world.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Dogmatical%2520and%2520Historical.html"
source_title="Hippolytus Dogmatical and Historical Fragments"
