[[commentary]]
quote='''
"And they brought a stone and set at the mouth of the den and the king sealed it with his signet ring," [Daniel 6:17] that the matter may not be changed regarding Daniel. And this was a malicious deed, for the satraps were cautious, lest secretly the king command Daniel to be drawn out of the den and so they thought fit to seal the stone. In which manner also the chiefs of the Pharisees did to the Savior having sealed the stone with a guard. [Matthew 27:66]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.27.3-5"
