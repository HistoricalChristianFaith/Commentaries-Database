[[commentary]]
quote='''
And so as many of you all who reverently draw near to God, observe the person who long ago was shown to the people by Moses and was manifested on the mountain and was proclaimed by the prophets and was seen as a man by the blessed Daniel, concerning whom he says, "I was looking into the vision of the night, and behold, one was coming like a son of man with the clouds of heaven, and he reached the Ancient of Days and was brought near to him and to him was given power and honor and the kingdom and all peoples, tribes, and tongues served him. His authority is an eternal authority, which shall not pass away and his kingdom shall not be destroyed." [Daniel 7:13-14]

And so he does not speak of another Ancient of Days, but indeed the Lord and God and Master of all, the Father of even Christ himself, who is the Ancient of Days, he who does not grow old under time or days, concerning whom was spoken above, "Thrones were set and the Ancient of Days sat and his clothes were white as snow and the hair of his head was as pure wool. His throne was a flame of fire, its wheels blazing fire. A river of fire gushed from before it. A thousand thousands attended him and myriad myriads stood before him." [Daniel 7:9-10]

The Son of Man was brought to him, being borne by a cloud and being carried by archangels, so that he may receive from him every rule and authority and power and kingdom, so that all peoples, tribes, and tongues may serve him. And so that one may not understand that his kingdom, which was given to him by the Father, was temporary or earthly, the prophet says, "His authority is an eternal authority, which shall not pass away and his kingdom shall not be destroyed." [Daniel 7:14]

And so the Father, having subjected all things to his own Son, the things in the heavens and the things of the earth and the things under the earth, through all of them he exhibited him as being firstborn in all things, firstborn from God so that the Son of God, being second after the Father, may be displayed, firstborn before angels, so that also he may be shown as Lord of angels, firstborn from a virgin, so that he may be shown as reforming first-formed Adam in himself, firstborn also from the dead so that he himself may be the first fruits of our resurrection.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.11.1-5"


[[commentary]]
quote='''
"Which shall not pass away." He exhibited all the dominion given by the Father to His own Son, who is manifested as King of all in heaven and on earth, and under the earth, and as Judge of all: of all in heaven, because He was born the Word, of the heart of the Father before all; and of all in earth, because He was made man, and created Adam anew of Himself; and of all under the earth, because He was also numbered among the dead, and preached to the souls of the saints, (and) by death overcame death.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Exegetical.%2520Fragments%2520from%2520Commentaries%2520on%2520Various%2520Books%2520of%2520Scripture.html"
source_title="Hippolytus Exegetical Fragments - Scholia on Daniel"
