[[commentary]]
quote='''
In the same night king Belshazzar the Chaldean was killed and Darius the Mede received the kingdom being sixty-two years old. [Daniel 5:29-31] After the interpretation had been solved by Daniel, just as Scripture encompasses all things, in the same night the phrase was fulfilled and the kingdom of the Babylonians passed to the Medes, just as was spoken by Daniel, "He appoints kings and removes them knowing what is in darkness and light is with him" [Daniel 2:21, 22]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.18.2-3"
