[[commentary]]
quote='''
Then they named the things in the depths, the spirits of the angels who control Tartarus and the souls of the righteous so that they may also hymn to God along with the three boys.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.29.11"
