[[commentary]]
quote='''
"The first was a lioness and feathers were upon it as an eagle." [Daniel 7:4] And so he, while speaking, names a lioness as the kingdom of the Babylonians which Nebuchadnezzar then ruled. Then he says, "feathers were upon it as an eagle," [Daniel 7:4] because the king was lifted up and raised up against God, being puffed up in heart on account of the greatness and glory which came to him. Then he says, "Its feathers were plucked and it was lifted up from the earth and it stood upon human feet and a heart of a man was given to it." [Daniel 7:4]

For this really happened to Nebuchadnezzar, just as has been indicated in the book before this book, and he himself testifies in this way about that which happened to him, as he was banished from his kingdom and his glory was taken away and so was the majesty which he procured at first. And so just as he says to strip the feathers of the whole bird, he is powerless and is easily caught, and in this way at that time the powers of the king were removed, through which he imagined to boast and to be high-minded, but then was afraid and fled into the desert, so that he may not be killed by them.

When Scripture says, "It stood upon human feet and a heart of a man was given to it," [Daniel 7:4] it is clear that Nebuchadnezzar, having humbled himself and recognized that he is a man lying under the authority of God, he, after begging the Lord, obtained from him a good heart, and again his kingdom and glory were reestablished. Just as he himself testifies saying, "And after the end of the days I, Nebuchadnezzar, lifted up my eyes to heaven and my wits returned to me and I blessed the Most High and praised and glorified him that lives forever, because his authority is an eternal authority and his kingdom is from generation to generation and all who dwell upon the earth are reckoned as nothing and they are as nothing." [Daniel 4:34-35]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.2.4-10"


[[commentary]]
quote='''
Now since these things, spoken as they are with a mystical meaning, may seem to some hard to understand, we shall keep back nothing fitted to impart an intelligent apprehension of them to those who are possessed of a sound mind. He said, then, that a "lioness came up from the sea," and by that he meant the kingdom of the Babylonians in the world, which also was the head of gold on the image. In saying that it "had wings as of an eagle," he meant that Nebuchadnezzar the king was lifted up and was exalted against God. Then he says "the wings were plucked," that is to say, his glory was destroyed; for he was driven out of his kingdom. And the words "a man's heart was given to it, and it was made to stand on the feet as a man," refer to the fact that he repented and recognized himself to be only a man and gave the glory to God.
'''
source_url=''
source_title="ON THE ANTICHRIST 23"
