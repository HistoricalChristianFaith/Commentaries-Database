[[commentary]]
quote='''
What and to whom did he swear? The Son swore to Father, saying that the Father lives forever and that they truly shall know all these things in a time and times and half of a time, when the dispersal of the Jews has been consummated. And so he stretched out his hands, and through this he displayed the passion.

But when he says, "In a time and times and half of the time," [Daniel 12:7] he signaled that the things of the Antichrist are for three-and-a-half years. For he says a time is one year, but times are two years, and half of a time is half of one year. These are the one thousand two hundred ninety days which Daniel foretold.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.56.6-8"


[[commentary]]
quote='''
And so, after the dispersion of the Jews happens, the suffering of the people is consummated, in those days the Antichrist is near, then they shall know all these things. And so, O man, why do you still doubt at what was spoken, or how do you not believe what was spoken by the Lord, when his first advent has already occurred, and he who stood upon the water at that time and was seen by Daniel in the world, now is made famous and his passion is declared to all, and the dispersion has happened to the people of the Jews by the Romans?

For when he says, "When the dispersion of the Jews is consummated they shall know all these things," [Daniel 12:7] then, when the Lord came to them and was not recognized by them, they were scattered into all the world, becoming exiles from their own land. And being attacked by enemies, they were banished from the city of Jerusalem, becoming a joy to all nations, so that the Gospel of the Lord may be preached in all the world and all time may be fulfilled and the end of the week may be encompassed and the two precursors of Christ may be dispatched and the abomination of desolation may be shown with them and the Judge of judges may be revealed from heaven and the resurrection of the saints and of all the world may occur and the eternal kingdom may be given to the saints and the unquenchable and sleepless fire of the impious may be inflamed.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.57.1-3"
