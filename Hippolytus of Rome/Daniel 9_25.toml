[[commentary]]
quote='''
Indeed it says, "and to return and a street and wall shall be built." [Daniel 9:25] And it really happened. For the people returned and built this city and temple and its wall in a circle.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.35.1"
