[[commentary]]
quote='''
Some of the historians recorded that these ruled two hundred forty-five years until Darius the chief, whom Alexander of Macedon deposed in the seventh year and transferred the kingdom of the Persians to the Greeks. Just as also Daniel says, "After this I was looking, and behold, another beast like a leopard and four wings of a bird were upon it and four heads were on the beast, and authority was given to it." [Daniel 7:6]

And so having named a leopard, he signals the kingdom of the Greeks, which Alexander of Macedon began, and he compares them to a leopard on account of them being sharp in mind and resourceful in reasoning and relentless in heart, in which manner also the spotted creature is the model of the kingdom of the Greeks, quick to do evil and quick to drink the blood of men.

He says, "Four wings of a bird were upon it and four heads were on the beast." [Daniel 7:6] For after the kingdom of Alexander was lifted up and grew in strength and was named in all the world, his kingdom was divided to his four chiefs. For while dying, Alexander distributed it to his companions who were of his race, four men, Seleucus, Demetrius, Ptolemy, and Philip, and these all put on crowns, just as Daniel predicts and was recorded in the first book of the Maccabees. [1 Maccabees 1:9]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.3.5-8"
