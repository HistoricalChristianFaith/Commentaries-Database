[[commentary]]
quote='''
Do you see the boast of the tyrannical human king, who did not know he who said, "Do not fear men who are able to kill the body, in this they are not able to kill what is inside, but fear rather him who is able to destroy both soul and body in hell." [Matthew 10:28] The boys, who did not cower at these words, answered saying, "We have no need to answer you concerning this matter. For there is a God whom we serve, he is able to deliver us from the burning furnace of fire and from your hands, O king, he will rescue us, and if not, let it be known to you O king that we will not serve your gods and we will not worship the golden image which you set up." [Daniel 3:16-18]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.17.1-2"

[[commentary]]
quote='''
But someone will likely say, "And so why did God rescue the martyrs long ago, but now he does not so rescue them?" For twice we find that the blessed Daniel, having been cast into the den of lions, was not destroyed by the beasts and the three boys in the furnace were not conquered by the fire. Take heed, O man, because even at that time God rescued whom he wished to still live, so that the magnificent work of God may be shown and it may be preached in all the world until now. But whom he wishes to testify, he, having crowned them, takes them. For he rescued the three boys, so that the boast of Nebuchadnezzar may be shown as being nothing, wishing to demonstrate this, that "what is impossible for men is possible for God." [Luke 18:27] For since Nebuchadnezzar was arrogant and said, "And who is the god who is able to rescue you from the furnace of fire?" [Daniel 3:15] God demonstrated to him that he is able to rescue his slaves whenever he wills. For also similarly it happened to Daniel, for after Darius said, "Is God whom you perpetually serve, able to rescue you from the mouths of the lions?" [Daniel 6:20] Daniel answered and said, "God sent his angel and he stopped the mouths of the lions and they did not hurt me." [Daniel 6:22] For also all the governors and satraps contrived a pretext, so that they handed Daniel over to the beasts in order to kill him. But God, seeing their machinations and the sincerity of the blessed Daniel, rescued him from the mouths of the lions, so that he rescues whom he wills but takes whom he wills. For we find also the seven martyrs who, under Antiochus, endured terrible punishments and were taken from the world. And so what of it? Was God not able to smite king Antiochus and to rescue the seven brothers? He was able, but he did not will to do this so that this example may become ours. For if he rescued everyone, who would he destine to testify? But if all were testifying and were killed, he would be reckoned by some of the faithless as being this: a powerless God.

And so it is necessary for a man to not resist the plan of God. "For if we live, we live to the Lord; and if we die, we die to the Lord. Whether we live or we die, we are of the Lord." [Romans 14:8]

He rescued Jonah from the belly of the sea monster when he willed. And he rescued Peter from the hand of Herod and led him out of prison because he wished for him to still live. In time he took him who was crucified on behalf of the name, when he himself willed. He rescued Paul from many dangers because he willed. After a time he took him who was beheaded and this happened when he willed. He permitted Stephen to be stoned by the Jews, but he crowned him who endured.

How do you today delay to testify when those who first, after testifying, were blessed? And so you have in an ancient testament many who have testified, yet many also who were rescued, so that one and the same God is demonstrated both long ago and now who also has authority to do to his slaves the very thing which he wills.

But let us also go to him the King of Glory and let us speak concerning the Son of God. Was God not able to rescue his Christ, so that he may not be betrayed by the Jews? Yes he was able, but he allowed him to suffer so that we, through the cross of his death, may live. And on account of this the Lord seeing the plan of God, said, "Father not my will, but yours be done." [Matthew 26:39; Mark 14:36; Luke 22:42; Matthew 26:53]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.35.1-36.8"
