[[commentary]]
quote='''
Then Nebuchadnezzar seeing what happened "was amazed and rose up in haste and he heard their hymns and he said to his nobles 'Did we not cast three men bound into the midst of the fire?' But they said, 'Truly O king.' He answered and said, 'Here I indeed see four men speaking and walking in the midst of the fire and there is no destruction in them and the appearance of the fourth is like a son of God.'" [Daniel 3:25]

Tell me, Nebuchadnezzar, for when did you see the Son of God, so that you confessed this one to be the Son of God? Who pricked your heart so that you plainly spoke such a word? With what sort of eyes were you able to see the light of him? But why was this shown to you alone and to none of the other satraps? But it is because it is said, "the heart of the king is in the hand of God." [Proverbs 21:1]

The hand of God itself, the very thing which was the Word, pricked the heart of the king, so that you may recognize this one in the furnace and may glorify him. And this is not to be idly understood by us. For when the sons of Israel, seeing the Son of God in the world, were destined to not believe, Scripture proved that the nations were destined to recognize him in the flesh, when long ago Nebuchadnezzar seeing him not of flesh, observed him in the furnace and confessed him to be a son of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.33.1-5"
