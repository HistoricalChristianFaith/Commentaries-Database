[[commentary]]
quote='''
But the blessed Daniel, not taking pleasure in earthly gifts nor being lifted up at kingly glory answered, "Let your gifts, O king, be to you and give the present of your house to another. But I shall read the writing and I shall make known the interpretation to you." [Daniel 5:17]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.17.2"
