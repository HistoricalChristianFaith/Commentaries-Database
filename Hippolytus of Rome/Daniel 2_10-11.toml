[[commentary]]
quote='''
And so since they said that what the king sought was impossible to be recounted by a man, God showed them that the things which are impossible with men, are possible with God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.4"
