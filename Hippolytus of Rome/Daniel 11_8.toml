[[commentary]]
quote='''
Accordingly, Ptolemy took all the military equipment and brought it into Egypt. And the Scripture was fulfilled just as Daniel says, "And indeed he shall carry into Egypt their gods and their things formed from cast metal and every desirable golden vessel." [Daniel 11:8]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.45.6"
