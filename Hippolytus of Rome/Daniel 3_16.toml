[[commentary]]
quote='''
See, the three boys have become examples for all believing men; they who did not fear the crowd of satraps nor, having heard the words of the king, were terrified, nor, having seen the burning fire of the furnace, cringed, but they despised all men and the whole world, holding the fear of God alone before their eyes.

Daniel, who was standing a far way off and keeping silent, taught these three to be courageous, while smiling at them, he himself even rejoicing at their witness, while observing the three boys who were about to be crowned against the devil. They were not deluded by musical skill nor enslaved by the pleasure of the instruments, nor carried away by the deceit of the Babylonians, nor subdued by the decree of the king, nor did they bend their knees before the golden image, which was wrought with a hammer. These three believing witnesses were found in Babylon, so that through them God may be glorified and Nebuchadnezzar may be shamed and the idols of the Babylonians be revealed as nothing.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.18.1-3"
