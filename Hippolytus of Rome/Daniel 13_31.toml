[[commentary]]
quote='''
"Susannah was beautiful to see and exceedingly pleasing to the eye." [Susannah 31] For the beauty that surrounds her, is not the beauty of a harlot's body, which surrounds a woman in the manner of Jezebel, nor the beauty of the face, which is covered with many kinds of makeup, but she had the beauty of faith and of chastity and of holiness.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.26.3"
