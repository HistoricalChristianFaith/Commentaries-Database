[[commentary]]
quote='''
But since we have already described in the prelude, that the two elders refer to a model of two peoples, one from the circumcision the other from the gentiles, who also are always becoming plotters against the church, we see the words of Daniel himself and learn that in nothing does Scripture deceive us. For when he said to the first elder, "You are decrepit with wicked days; now your sins which you did formerly, have arrived, you who propound unrighteous judgments and condemn the innocent, but free the guilty, though the Lord says 'The innocent and righteous you shall not kill' [Exodus 23:7]." Daniel speaks to one who knows and loves the law.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.30.1-2"
