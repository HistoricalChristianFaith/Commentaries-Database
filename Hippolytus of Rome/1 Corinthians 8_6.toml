[[commentary]]
quote='''
This word declares the mystery of the truth rightly and clearly. He who is over all is God; for thus He speaks boldly, "All things are delivered unto me of my Father." He who is over all, God blessed, has been born; and having been made man, He is (yet) God for ever. For to this effect John also has said, "Which is, and which was, and which is to come, the Almighty." And well has he named Christ the Almighty. For in this he has said only what Christ testifies of Himself. For Christ gave this testimony, and said, "All things are delivered unto me of my Father;" and Christ rules all things, and has been appointed Almighty by the Father.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Dogmatical%2520and%2520Historical.html"
source_title="Against the Heresy of One Noetus"
