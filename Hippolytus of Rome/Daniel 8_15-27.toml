[[commentary]]
quote='''
That these things are true, just as has been said, Daniel himself testifies.

For he spoke in this way, "And it happened when I saw the vision and I sought to understand, and behold, there stood before me an appearance of a man, and I heard the voice of a man above the midst of the Ubal, and he called and he said, 'Gabriel cause him to understand that vision.' And he came and stood holding me, and when he came, I was astounded and fell upon my face and he said to me, 'Understand son of man. For the vision is for the end of time.' And while he spoke with me I was astounded and I fell upon my face upon the ground and he touched me and stood me on my feet and he said, 'Behold, I myself make known to you what will be at the end of wrath. For the vision is of the end of time. The ram which you saw, who had horns, he is the king of the Persians and Medes. And the male goat is king of the Greeks. And the great horn which was above the midst of his eyes, he is the first king. And after he is shattered, four horns stood up after him, four kings from his nation shall arise and not in his strength. And at the end of their kingdom, when their sins are full, a king, shameless in countenance, shall arise, and who understands riddles. And his rule shall be strong and not in his own strength and he shall destroy wonderful things and he shall prosper and he shall practice and he shall destroy the mighty and the holy people, and the yoke of his chain shall prosper. Cunning is in his hand and in his heart he shall be magnified and in cunning he shall destroy many and he shall stand for the destruction of many and he shall shatter people as eggs in a hand. And the vision of evening and morning which was said is true. And you, seal the vision because it is in many days.' And I Daniel fell asleep and was weak and I arose and did the works of the king and I wondered at the vision and there was no one who could understand it." [Daniel 8:15-27]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.27.1-2"
