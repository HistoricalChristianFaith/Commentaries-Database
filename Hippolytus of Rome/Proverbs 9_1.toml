[[commentary]]
quote='''
Christ, he means, the wisdom and power of God the Father, hath builded His house, i.e., His nature in the flesh derived from the Virgin, even as he (John) hath said beforetime, "The Word became flesh, and dwelt among us." As likewise the wise prophet testifies: Wisdom that was before the world, and is the source of life, the infinite "Wisdom of God, hath builded her house" by a mother who knew no man,-to wit, as He assumed the temple of the body. "And hath raised her seven pillars; "that is, the fragrant grace of the all-holy Spirit, as Isaiah says: "And the seven spirits of God shall rest upon Him," But others say that the seven pillars are the seven divine orders which sustain the creation by His holy and inspired teaching; to wit, me prophets, the apostles, the martyrs, the hierarchs, the hermits, the saints, and the righteous.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Exegetical.%2520Fragments%2520from%2520Commentaries%2520on%2520Various%2520Books%2520of%2520Scripture.html"
source_title="Hippolytus Exegetical Fragments"
