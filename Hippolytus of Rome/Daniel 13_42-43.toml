[[commentary]]
quote='''
But she, invoking the advocate from heaven, cried out saying, "Eternal God, who knows the secret things, who sees all things before they are, you know that they have falsely testified lies against me." [Susannah 42-43] For as many as call upon him with a pure heart, God listens to them. But as many as call upon him in treachery and hypocrisy, he turns his face from them.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.27.4-5"
