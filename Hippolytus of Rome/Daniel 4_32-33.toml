[[commentary]]
quote='''
And on account of this Scripture says, "He shall lie outside in the grass and in the dew of heaven and with the beasts and his portion shall be in the grass of the earth. His heart shall be changed from men and a heart of a beast shall be given to him." [Daniel 4:15-16] For no longer did the great king and ruler live as a man administering the kingdom, but being alone in the desert he ate grass and herbs until his heart was changed and became as a beast who lived in forests and caverns, until his hair grew as a lion's and his nails grew large as a bird's and seven seasons passed over him. [Daniel 4:32]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.9.3-4"
