[[commentary]]
quote='''
And so, after sufficient time had passed and the eighteenth year had come, the king, having remembered his dream, made a golden image, which was sixty cubits high and its breadth was six cubits. For when the blessed Daniel, when he interpreted the same dream, answered the saying, "You are the head of the golden image," [Daniel 2:38] in this word king Nebuchadnezzar, having been puffed up and having been lifted up in heart, made the image as an anti-type of the dream, so that he might be worshiped as God by all.

And so having furnished it in greatness he set it up in the plain of Deira in the country of Babylon.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.15.1-3"

[[commentary]]
quote='''
For Scripture says, "In the eighteenth year, Nebuchadnezzar the king made a golden image, its height was sixty cubits, and its breadth was six cubits, and he set it in the plain of Deira in the country of Babylon." [Daniel 3:1] And so through eighteen years he imitated Jesus the son of God, who was present in the world, who also raised his own human image from the dead and showed this image, which was pure and blameless as gold, to his disciples.

Through the height of sixty cubits, there are sixty patriarchs, through whom the image of God according to the flesh, that is the Word, is molded and fashioned and is exulted on behalf of all the patriarchs. Through the breadth of six cubits this recalls the six days of creation. For on the sixth day man, having been molded from dust, came to be. And so the gold which Nebuchadnezzar molded into the representative image which he made, he set it up on the plain of Deira, in the country of Babylon, indicating the plain to be the world, and Babylon the great city.

And at that time Nebuchadnezzar made only one image, but now the deceiver devises greater things in the world, so that through the many spectacles he may delude all men, some being carried about in one direction or another, some worshiping golden idols, others silver, others bronze, some that which is composed from ivory, many revering clay and stone. They all, abandoning the heavenly God, submit to empty and lifeless and useless idols, not wishing to look up to the height of heaven, nor wishing to apprehend the beauty of heaven, so that they, who do not recognize the God of this heaven, are not able to be saved. These things are the handiwork of the devil. He worked not only long ago in Babylon, but also now he does the same things and endeavors more reckless things against the slaves of God. Having prepared the furnace of fire beforehand, so that through it he might frighten men, who do not see the eternal punishment through fire which is prepared for the devil by God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.27.5-11"
