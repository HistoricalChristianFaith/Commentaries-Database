[[commentary]]
quote='''
And so even then, in this way the three boys, who were disciples of faith in Babylon, answered the king saying, "We have no need to answer you concerning this matter." [Daniel 3:16] Daniel, having heard these words, approved. But again they said, "There is a God whom we serve, he is able to deliver us from the burning furnace of fire and from your hands, O king." [Daniel 3:17] The Blessed Daniel, being a prophet and foreseeing what is to come, approved as being true what was spoken by them. And the boys, so that they may exhibit to the king their unsurpassable faith, added saying, "And if not, let it be known to you, O king, that we will not serve your gods and we will not serve the golden image which you set up." [Daniel 3:18] Whom again the blessed Daniel, having heard their voice a third time, and having been amazed, crowned them in faith as speaking beautiful truths.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.22.1-5"

[[commentary]]
quote='''
You see the assurance of the words which were spoken through one mouth, so that in no word may they stumble. For after the king threatened them and said, "Why do you not serve my gods and not worship the golden image which I set up?" [Daniel 3:14] They answered, "We have no need to answer you concerning this matter," [Daniel 3:16] not regarding him worthy of a defense of such a statement.

Then, after the king said, "You shall be cast into the burning furnace of fire, and what god is there who shall take you out of my hands?" [Daniel 3:15] They added to the word which was spoken by the king and said, "There is a God whom we serve, he is able to deliver us from the burning furnace of fire and from your hands, O king." After the king again said, "And so, now if you are prepared, when you should hear the sound of the trumpet, pipes and lyres, harp and psaltery and all the family of musical instruments, fall down and worship the golden image." [Daniel 3:15] They said to him, "Let it be known to you O king that we will not serve your gods and we will not worship the golden image which you set up." [Daniel 3:18]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.23.1-4"

[[commentary]]
quote='''
For the king set before them three matters through one word, like those who contend for three prizes in a contest, so that even in one matter, having laid a trap, he might trip these boys up. But they, wishing to be defeated in nothing, genuinely answered in three statements. For they set at naught the first matter of the king, showing that the idol which was worshiped by him was not worthy of any account. Secondly, they taught the king that it is necessary to fear and worship a certain king, saying, "There is a God whom we serve, he is able to deliver us from the burning furnace of fire." [Daniel 3:17] Then thirdly, wishing to demonstrate their faith, they said, "And if not, let it be known to you, O king, that we will not serve your gods and we will not worship the golden image which you set up." [Daniel 3:18] For in this, they fortified themselves through speech, lest, after they were cast into the furnace, they would also be incinerated and the Chaldeans would have boasted and deceived the king saying, "Do not be vexed, O king, you prevailed and you took the prize from them. For they, shrieking and burning in the fire, were saying, 'We beg you, Lord and king, we will do what is commanded by you, we will worship the image.'" Therefore after death believers, who did not wish to give a place of pretext to the devil, are called martyrs, according to every way they fortified themselves. For they who believe have carried up all authority and glory to God, because he is able to deliver us, but if not we would rather gladly die than to do what is prescribed by you, Nebuchadnezzar!
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.24.1-8"
