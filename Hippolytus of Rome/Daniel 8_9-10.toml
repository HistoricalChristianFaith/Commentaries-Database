[[commentary]]
quote='''
For after Alexander ruled all the land of Persia and subjected them, later he died, dividing his kingdom to his four Chiefs as is shown above, that is to Seleucus, to Demetrius, to Ptolemy, and to Philip, from whom one horn was exalted and grew great unto the power of heaven.

For Antiochus, who was called Epiphanes, being from the race of Alexander, was king. And having reigned over Syria and seizing all Egypt under himself, later he came to Jerusalem and he entered into the Most Holy Place and took all the treasures which were in the house of the Lord and the golden lampstand and the table and the altar and he committed great murder in the land and he spoke immoderate words and prevented sacrifice and offering, and he built a sacred grove and built idols in the city, and sacrificed a pig, even a common animal.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.26.6-7"
