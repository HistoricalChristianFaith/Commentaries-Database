[[commentary]]
quote='''
"And now," he says, "I will proclaim to you the truth." [Daniel 11:2] And so was the truth able to proclaim some other thing beyond the truth? The truth was what was seen by Daniel and he proclaimed the truth. He himself, with the truth being revealed in the world, teaches the truth. On account of which the blessed disciples are taught by Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.41.1"


[[commentary]]
quote='''
"Still three," he says, "kings shall arise in Persia and the fourth will be rich with greater riches than all." [Daniel 11:2] For after Cyrus, Darius arose, then Artaxerxes, next Xerxes. These three were kings. Scripture is fulfilled. "And the fourth will be rich with greater riches." [Daniel 11:2] Who is this but Darius, who after reigning and being glorious, became wealthy and rose against all the kingdoms of the Greeks?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.41.4-5"
