[[commentary]]
quote='''
After this happened, Daniel rose and went to Arioch and said to him, "Do not destroy the wise men of Babylon, but bring me before the king and I will proclaim to the king the dream and its interpretation." [Daniel 2:24]

He, after hearing these things "brought in Daniel with haste and said, 'I found a man from the sons of the captivity of Judah, who will proclaim the interpretation to the king.'" [Daniel 2:25]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.6"
