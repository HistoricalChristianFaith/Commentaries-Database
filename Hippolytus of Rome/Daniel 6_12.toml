[[commentary]]
quote='''
And so in this way even at that time the adversary operated in the governors and satraps, so that through them he might accomplish his own will and cast the blessed Daniel into the den of lions. And whom they watched closely and seeing him pray three times a day, came forth saying to the king, "'O king Darius, have you not appointed an edict that any man who should ask from any god and man a petition for thirty days except from you O king, shall be cast into the den of lions?' He said, 'The word is true and the decree of the Medes and the Persians shall not pass away.'" [Daniel 6:12]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.25.1-2"
