[[commentary]]
quote='''
So that we may not turn aside from what is set before, so that what was seen by the prophet may be shown as true and so that what was perceived by us in the grace of the Lord and what was spoken may be sure, let us see if the angel confirms our words, who teaches the blessed Daniel, for he speaks in this way, "These four beasts are four kingdoms which shall arise upon the earth, and which shall be removed, and the saints of the most high shall inherit the kingdom and possess it forever and ever." [Daniel 7:17-18]

And so it is necessary for the three beasts to have already passed away and to have ceased, just as was shown above, and while one beast is yet beginning to culminate, if this also is removed, the remaining earthly things cease, but the heavenly things begin, so that the perpetual and eternal kingdom of the saints may be shown and the heavenly kingdom may be clearly displayed to all, neither through a form as seen on the mountain of Sinai, nor in a pillar of cloud as revealed on the mountain peak, but with powers and armies of angels, incarnate God and man, son of God and of Man, the judge who is coming from the heavens into the world.

Who shall remove all kingdoms which are in this world and shall thresh and shall winnow and shall scatter them as chaff from the summer threshing floor. And shall give the kingdom to the saints of the Most High as he collects grain for his barn, but the chaff heap he burns with unquenchable fire, though now he is despised by the godless and impious, and blasphemed by the unbelievers, who do not consider what is written, nor consider the authority of judgment laid upon them. For though he now also delays for a time, not wishing to bear judgment to the world, and so fulfills the prescription of his Father, but when he comes he will come with his armies and render to each according to his works.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.10.1-4"
