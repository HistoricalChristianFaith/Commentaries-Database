[[commentary]]
quote='''
"And they were both sorely pricked concerning her and they did not report their grief to one another because they were ashamed to report their lust and because they wanted to have intercourse with her." [Susannah 10-11] For even what is spoken has truly overtaken them, for the two peoples are sorely pricked by the working of Satan in the two elders, they wish to work persecutions and oppressions against the church, zealously seeking in such a manner as to utterly destroy her, yet these themselves are not in agreement with each other.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.16.4"
