[[commentary]]
quote='''
Accordingly after this happened, "The king departed to his house and he went to bed without supper and food was not brought to him and sleep left him." [Daniel 6:18] How much did the righteous man do, who feared God, so that the king was so grieved over him to not take sustenance! And the satraps made merry all night, thinking that they were taking a prize from Daniel, but the king being sleepless all night bewailed that such a man was unrighteously destroyed, and so he was cautious lest on account of him he himself also be endangered. For the events which happened to Nebuchadnezzar and what happened to Belshazzar did not escape his notice, the former was banished from his kingdom, the latter on account of drinking from the holy vessels was killed that same night.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.28.1-4"
