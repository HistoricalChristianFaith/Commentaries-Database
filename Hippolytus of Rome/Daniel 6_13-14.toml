[[commentary]]
quote='''
They said to him, "'Behold, Daniel, who is from the sons of the captivity of Judah, does not obey your decree and three times a day he asks from his God his petitions.' Then, the king when he heard the matter, was greatly grieved over it and he fought concerning Daniel in order to release him." [Daniel 6:13-14] For having known their machinations and that they hated Daniel because he was at that time wiser and more reputable than all of them and that they devised this plot against him, wanting to hand him over to beasts through a trap. Therefore the king questioned the satraps and asked whether he could be able to preserve him from danger.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.25.3-4"
