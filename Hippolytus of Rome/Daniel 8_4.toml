[[commentary]]
quote='''
And so as much as he described in the first vision he again recounts in detail these things a second time for the building up of the faithful.

For "the ram butting to the sea and to the north and to the south," [Daniel 8:4] he says is Darius the king of the Persians, who prevailed over all nations. For he says, "all the beasts did not stand before him." [Daniel 8:4]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.26.1-2"
