[[commentary]]
quote='''
For Arioch the Chief-Butcher was about to kill both Daniel and his three friends, for he went out to kill the wise men of Babylon. For Scripture said that the Chief-Butcher himself began to take the sword. For even as a butcher kills all creatures and butchers them, in the same way also the rulers of this world kill men, butchering them as unreasoning animals, but Daniel went forth and said, "'For what reason has this reckless proposition come out from the face of the king?' For he sought to learn from him for what reason the Babylonians were slaughtered." [Daniel 2:15]

And "Arioch made known the matter to Daniel." [Daniel 2:15] Daniel, having heard this, asked him a request, in order that he might give time to him so that he might make known the interpretation to the king. [Daniel 2:14-16]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.4"
