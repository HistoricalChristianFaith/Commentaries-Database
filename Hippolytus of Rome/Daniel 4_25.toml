[[commentary]]
quote='''
Next Scripture says, "And he shall lie outside in the grass and in the dew of heaven and seven seasons shall pass over him until you know that God the Most High rules over the kingdom of men." [Daniel 4:25] And so some count seven seasons as seven years. But some take seven seasons to refer to three months for each year, for one year has four seasons, winter, spring, summer, and autumn, as seven seasons then are given to the king.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.10.1-2"
