[[commentary]]
quote='''
"And when he spoke with me I was strengthened and I said, 'Let my Lord speak because you have strengthened me.'" [Daniel 10:19] For when the Word makes us hope in the coming things, we are also easily able to hear his voice.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.40.1-2"
