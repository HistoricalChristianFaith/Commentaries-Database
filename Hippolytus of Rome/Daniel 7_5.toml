[[commentary]]
quote='''
While these things were then happening in this way to Nebuchadnezzar in those times, just as the blessed Daniel disclosed to us in the vision, the king himself likewise confessed it, and after he died, the office came to Belshazzar. When he himself, on account of the deed which he did at night, was taken away, as has been indicated in the book before this book, then Darius the Mede received the kingdom, being sixty two years old. So suitably the prophet describes another beast rising, which was the bear, so that in this he may display the kingdom of the Persians.

He says, "Three ribs were in its mouth." [Daniel 7:5] He calls three ribs the three regions of nations, which the same beast ruled, which were Medes, Assyrians, and Babylonians. "And that they were speaking in this way to it, 'Rise, eat much flesh.'" [Daniel 7:5] For then in those times the Persians rose up and laid waste to all the land and made many of the men their slaves, and they utterly destroyed everything. For just as the beast, the bear is a sordid and flesh-eating creature, tearing with both its claws and teeth, in this way also the kingdom of the Persians became, which presided for two hundred and thirty years.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.3.1-4"
