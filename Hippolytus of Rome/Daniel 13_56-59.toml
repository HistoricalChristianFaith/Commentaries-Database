[[commentary]]
quote='''
To the other elder he did not speak in this way, but he said to him, "You seed of Canaan and not of Judah." [Susannah 56] He points out Canaan recalling him as being such a gentile, having spoken to him as uncircumcised in this way, "'Has lust deceived you and beauty perverted your heart? You did this thing to the daughters of Israel, and they, fearing you, had relations with you, but the daughter of Judah did not endure your disgrace. And so now if you did indeed see her, tell me, under what tree did you see them having relations with one another?' And he said 'Under the oak.' But Daniel said, 'You have also lied directly against your own head. For the angel of God is about to cut you in half, so that he may destroy you both.'" [Susannah 56-59]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.30.3"
