[[commentary]]
quote='''
"And I," he says, "was the only one left and I fell on my face upon the earth, and behold, with the hand of a man he touched me." [Daniel 10:8] He says, "the hand of a man," not yet a man, but indicating the coming of the economy through grace.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.38.4"
