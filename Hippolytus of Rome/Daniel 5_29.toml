[[commentary]]
quote='''
For the king, after he heard the writing and its interpretation, was grieved at what was spoken, but he commanded Daniel to be clothed in purple and to be the third position in the kingdom.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.18.1"
