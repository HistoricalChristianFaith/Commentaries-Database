[[commentary]]
quote='''
When the king saw this he quaked in fear and was in much distress, and he shouted in strength to bring in magicians, Chaldeans and soothsayers, not knowing that it is not possible for these to read the letters of God, but it is possible for those who from childhood practiced the law of God who also recognize the divine letters from their fathers.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.15.1"
