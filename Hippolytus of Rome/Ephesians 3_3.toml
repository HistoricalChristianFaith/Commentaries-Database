[[commentary]]
quote='''
Now this (mystery) was not made known to previous generations, as he says, it has been written, "By revelation was made known unto me the mystery;" and, "I have heard inexpressible words which it is not possible for man to declare." The light, (therefore,) which came down from the Ogdoad above to the Son of the Hebdomad, descended from the Hebdomad upon Jesus the son of Mary, and he had radiance imparted to him by being illuminated with the light that shone upon him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25207.html"
source_title="Hippolytus Refutation of All Heresies Book VII"
