[[commentary]]
quote='''
For when it says to him, "Leave the stump of the roots of the tree in the earth," [Daniel 4:26] it is clear that he is again according to the purpose of God about to be reestablished over his own office. For this occurred as an education for the king, so that he would not be high-minded and in the future he would be able to say, "And all who walk in arrogance are able to be humbled." [Daniel 4:37]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.10.3-4"

[[commentary]]
quote='''
When he put away the same great arrogance which he acquired, and when he was suffering in the mountains, he confessed to God, recognizing the heavenly authority and he was restored again to the office of his kingdom, after both the magistrates and princes and all of those who were under him sought him, they also bestowed extravagant honor and glory upon him, so that what was spoken in the vision was fulfilled, "Except leave the stump of the roots of the tree in the earth, until you know that the Most High reigns over the kingdom of men and he shall give it to whom he esteems." [Daniel 4:25]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.11.5"
