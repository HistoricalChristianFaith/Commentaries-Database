[[commentary]]
quote='''
And what other light was this but the calling of the Gentiles, which is the trunk, i.e., the tree of the Lord, in whom engrafted it bears fruit? And the word, "giving increase of beauty in the case of the shoot," expresses the excellency of our calling. And if the words, "giving increase of beauty in the case of the shoot," are understood, as perhaps they may, with reference to its, the clause is still quite intelligible. For, by progressing in virtue, and attaining to better things, "reaching forth to those things which are before," according to the word of the blessed Paul, we rise ever to the higher beauty. I mean, however, of course, spiritual beauty, so that to us too it may be said hereafter, "The King greatly desired thy beauty."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Exegetical.%2520Fragments%2520from%2520Commentaries%2520on%2520Various%2520Books%2520of%2520Scripture.html"
source_title="Hippolytus Exegetical Fragments"
