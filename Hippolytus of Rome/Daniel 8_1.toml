[[commentary]]
quote='''
And so the prophet, after ceasing from what lies before, teaches us the certainty of what will be with all precision, he passes again to the kingdom of the Persians and Greeks, describing another vision to us which happened and was fulfilled in his own times, in order that in this he may furnish us faithful and that he may be able to inspire us to be more faithful to God for what is destined to come.

For he speaks in this way, "In the third year of Belshazzar the king, a vision appeared to me, Daniel, after that which appeared to me at first. And I was in Susa, in the palace, which is in the land of Elam, and I was upon the Ubal." [Daniel 8:1-2]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.25.1-2"
