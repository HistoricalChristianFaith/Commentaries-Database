[[commentary]]
quote='''
And so then, while all the men were coming together for the event and while the musical instruments rang out together, at that moment the peoples, tribes, and tongues, fell down and worshipped the image, some of them only because they feared the king, but all became idolaters, and they heeded the word which was prescribed by the king.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.15.5"
