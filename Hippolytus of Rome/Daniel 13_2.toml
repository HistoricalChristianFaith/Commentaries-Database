[[commentary]]
quote='''
For Scripture says, "And there was a man living in Babylon and the name for him was Jehoiakim and he took a wife, whose name was Susannah, daughter of Hilkiah, who was exceedingly beautiful and who feared the Lord." [Susannah 1-2] Concerning whom we have written in the beginning of this book, who, being a stranger in Babylon, took Susannah to wife. But she was a daughter of Hilkiah the priest, who found the book of the law in the house of the Lord, when Josiah the king ordered him to cleanse the Holy of Holies.

Her brother was Jeremiah the prophet, who together with the remaining people, after the captivity of the people in Babylon occurred, was led away into Egypt and dwelt in Tahpanhes, and there, while prophesying, was stoned by them and was killed. And so these people were from the priestly lineage of the tribe of Levi and they mixed with the tribe of Judah, so that through the two righteous tribes and through their united seed, the righteousness of Christ may be shown according to the fleshly seed, and he who was born from them in Bethlehem may be proclaimed King and Priest of God. For also Matthew, wishing to trace the pure and faultless lineage of Christ, according to the flesh, until Joseph, coming to Josiah he omits his five sons and names Jeconiah, who while in Babylon was begotten from Susannah, skipping from righteous seed to righteous seed. For he says, "Josiah begot Jeconiah and his brothers during the deportation to Babylon." [Matthew 1:11] And so how is this declared? For Josiah, having reigned in the land of Judah thirty-one years, died there. And so how is it possible that having died there he begot Jeconiah in Babylon? From this it is necessary to observe that Matthew traced the genealogy of him who was begotten from Jehoiakim and from Susanna, as Jeconiah was the son of Eliakim who was called Jehoiakim the son of Josiah. For Matthew was not able to trace the genealogy of him who was banished by the Holy Spirit, as being in the line of this Jeconiah, as some deceivers maintain. For this cripple, having been brought into Babylon, and having been shut-up there at the mill as a prisoner, died childless. So that Scripture does not idly teach us saying, "And there was a man living in Babylon and the name for him was Jehoiakim and he took a wife, whose name was Susannah, daughter of Hilkiah, who was exceedingly beautiful and who feared the Lord."

And so Jeconiah was begotten from her, and Jeconiah begot Shealtiel, and Shealtiel begot Zerubbabel. He, together with Ezra the scribe and Jesus the son of Jehozadak, came up to Jerusalem according to the command of Cyrus the Persian. And in this way continued the pure lineage of the fathers until the birth of Jesus Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.13.1-8"
