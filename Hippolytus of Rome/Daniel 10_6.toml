[[commentary]]
quote='''
"And his body was like Tharsus." [Daniel 10:6] Tharsus is interpreted as Ethiopian. For the prophet already proclaimed its difficult interpretation, as the Word will be about to appear in the flesh in the world, he will be hard to recognize for many. "And his face was like lightning and his eyes like lamps of fire." [Daniel 10:6] For it is necessary for the fiery nature and the judgment of the Word to be foretold, so that fire, having been righteously inflicted upon the impious, may consume them, but to the righteous and to those who hope in him, he offers deathless eternity.

He adds saying, "And his arms and feet were like burnished bronze," [Daniel 10:6] so that the first calling of the fathers and second of the nations are indicated to be the same. For the last will be as the first, for he says, "I will set your chiefs as at the beginning and your rulers as the first." [Isaiah 1:26] "And his voice was like the voice of a great crowd." [Daniel 10:6] For today all we who believe in him utter the oracles of Christ as through his mouth, speaking what is prescribed by him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.37.3-6"
