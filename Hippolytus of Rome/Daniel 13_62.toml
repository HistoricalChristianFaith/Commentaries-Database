[[commentary]]
quote='''
After this, all the assembly having risen, gave praise to God who saves those who hope in him. "And they stood up against the two elders and did to them in which manner they wickedly wanted to do to their neighbor and killed them, because Daniel convicted them from their own mouth as having borne false witness," [Susannah 60-62] so that what was spoken was fulfilled, "He who digs a trench for his neighbor, he himself falls into it," [Proverbs 26:27] "And blameless blood was saved in that day." [Susannah 62-64]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.33.2"
