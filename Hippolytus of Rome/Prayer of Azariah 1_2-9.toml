[[commentary]]
quote='''
And so then, Azariah, having stood up together with the rest, praised God through a hymn and a prayer in the midst of the furnace. And then they confessed the former sins of themselves and their fathers, giving glory to God as captives worthily and righteously suffering these things in a strange land, even though they were handed over to the most lawless and knavish king in all the earth, instead of their fathers who did not keep the law of their Lord God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.29.1-2"
