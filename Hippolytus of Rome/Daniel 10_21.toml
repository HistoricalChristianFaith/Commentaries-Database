[[commentary]]
quote='''
But who is Michael, but the angel who is granted to the people, as he says to Moses, "I will not go with you on the way because the people are stiff necked, but my angel will go with you"? [Exodus 33:3] This one stood against Moses in the encampment when he carried the uncircumcised boy [Exodus 4:24-25] to Egypt. For it was not possible for Moses to be the elder and mediator of the law, who also announced the covenant of the fathers, and also to lead the uncircumcised boy, so that he may not be considered by the people as a false prophet and a deceiver.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.40.4-5"
