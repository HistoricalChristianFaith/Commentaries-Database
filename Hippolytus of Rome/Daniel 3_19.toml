[[commentary]]
quote='''
And so indeed they prevailed, if it is necessary to speak the truth, the boys… For as strong as the word of the boys was, so was the king wrathful and he said, "Heat the furnace seven times hotter," who was, as always, already defeated by them. For the king prevailed in terrestrial matters, but the three boys prevailed in faith towards God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.25.2-3"

[[commentary]]
quote='''
But someone will say, "And so was not Daniel, being a friend of the king, able to intercede on their behalf and pardon the three boys?" He was able, but it happened in this way so that the great works of God may be shown and the Babylonians may learn to fear God, and on account of this find rest, so that also their faith may be shown and God may be glorified in them. For if this had not happened the Babylonians would be able to say, "If Daniel did not intercede with the king on their behalf, these boys would today be destroyed in fire," and reckon grace to be human rather than the power of God.

But why was the king not sorely pricked, having actually seen Daniel, who was a Jew, and why did he not say to him, "Why do you not worship the image?" He no doubt would have said to the king, "Because I do not worship works made with hands, but the living God who made heaven and earth and has lordship over all flesh." Just as he answered Cyrus in the presence of Bel. The king, having been stunned, said to him… … Bel, except according to the thoughts of the satraps. "For thirty days if one should ask any God or man but from you, he shall be cast into the den of lions." [Daniel 6:7] So it was necessary for the three boys alone to be glorified in the furnace, but before Bel and the reigning Cyrus, it was necessary for Daniel alone to be cast into the den of lions, each of them arranging their own part and observing their own season, so that even Nebuchadnezzar the king of the Babylonians, who saw that the three boys were not destroyed by fire, may glorify God, and Cyrus the Persian, who saw that Daniel was not swallowed by the lions, may be taught that God alone is the God of heaven. And so in this way in due time God administers the affairs of men through his slaves the prophets and persuades all men to come to knowledge of himself. [1 Timothy 2:4; 2 Timothy 3:7]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.25.4-26.4"
