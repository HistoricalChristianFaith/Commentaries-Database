[[commentary]]
quote='''
But it was so that he may not be rescued by man, and his deliverance not be considered to be by the favor of the king, but rather that the work of God may be shown to be accomplished in him. And so it was already evening and the king was conversing on his behalf with the satraps when they spoke saying, "Know, O king, that for the Medes and Persians, the decree of every edict and statute which the king has set, may not be changed," [Daniel 6:15] in this word they wanted to shame the king, lest the decree which had been marked out by him, may not be certain and the rest of the things which were set out by him may be considered to be invalid.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.25.5"
