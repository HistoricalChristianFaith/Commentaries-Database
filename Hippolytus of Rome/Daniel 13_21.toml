[[commentary]]
quote='''
And so after hearing these words, the blessed Susannah was pricked in the heart and girded her body, as she did not want to be defiled by the lawless elders. And this occurrence had to truly overcome Susannah. For you may now also find this fulfilled in the Church. For when the two peoples agree to destroy the lives of saints, they observe a fitting day and after rushing into the house of God, while all the people pray and hymn to God there, they, laying hold of them, drag them into court and arrest them saying, "Come, consent to us and sacrifice to our gods, but if not we will testify against you." Of those not willing, they, leading them to the platform, charge them as practicing what is contrary to the decree of Caesar and they condemn them to death.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.21.1-3"
