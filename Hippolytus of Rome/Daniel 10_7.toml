[[commentary]]
quote='''
"And, I, Daniel alone saw the vision." [Daniel 10:7] For to the saints and to those who fear him, to these only he reveals himself. For if one now expects this also to be conducted in the church, he has not the fear of God, and the assembly of the saints helps him in nothing, having not acquired the power of the Spirit in himself. For also at that time, there were many who were standing with Daniel, but they did not see the vision for they were not worthy, but great astonishment fell upon them and they fled in fear. [Daniel 10:7]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.38.1-3"
