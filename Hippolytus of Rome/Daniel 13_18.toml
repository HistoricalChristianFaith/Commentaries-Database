[[commentary]]
quote='''
"But they shut the doors of the garden, and exited through the narrow doors," [Susannah 17-18] in this proclaiming beforehand the future things, because he who wishes to partake of the water of the garden ought to renounce the wide doors, and enter through the strait and narrow door. [Matthew 7:13-14; Luke 13:24]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.19.3"

[[commentary]]
quote='''
"And they did not see the elders, because they were hidden." [Susannah 18] For just as then in the garden the devil was hidden in the serpent, in this way even now, after hiding himself in the elders he craves lust, so that again a second time he may destroy Eve.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.19.4"
