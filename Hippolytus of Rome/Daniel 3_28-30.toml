[[commentary]]
quote='''
And so in this way Nebuchadnezzar said, "'Blessed be the God of Shadrach, Meshach, and Abednego, who sent his angel and rescued his boys because they obeyed him and they opposed the word of the king and handed their bodies over to the furnace, that they might not serve any God except their God. And I have set out a decree: 'All people, tribes, and tongues who shall ever speak blasphemy against the God of Shadrach, Meshach, and Abednego shall be destroyed and their houses shall be plundered, because there is no other God who is able to rescue in this way.' And he prospered Shadrach, Meshach, and Abednego in the country of Babylon and strengthened them and promoted them to lead all the Jews who were in his kingdom." [Daniel 3:28-30]

And so it is necessary to observe, beloved, how faith towards God pours out such great grace. For even as they handed themselves over to death, they glorified God himself, in this way again they also were not only glorified by God but also by the king and they taught the tribes and the barbarian nations to revere God.

For this truly happens to befall us even now, for when one of the saints is called to martyrdom and magnificent things are done by God for him, immediately all who see wonder, and many believe through the signs and in this way they also become martyrs of God. To whom we also have believed, so let us also inspire ourselves to be worthy before God, being chaste in body, soul, and spirit, so that we ourselves may receive the incorruptible crown together with the blessed martyrs, and may hymn with them to God. For his glory is forever and ever. Amen.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.38.1-5"
