[[commentary]]
quote='''
While they were drunk, the king, being puffed up, commanded that the golden and silver vessels, which Nebuchadnezzar his father had brought out from the Temple which was in Jerusalem, to be brought forth, that the magistrate and his mistresses may drink from them. Those vessels, which were dedicated to God for his glory and honor by other kings, they took with defiled hands, and made a drink offering in them and praised the lifeless and motionless idols.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.14.4"
