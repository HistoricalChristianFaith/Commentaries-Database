[[commentary]]
quote='''
I will dare to say something and I will not venture to say something else while speaking. These boys, having read the contents of Scripture, saw what was spoken by the prophet, that it was written concerning them. For how else did the contents of Scripture say to Babylon, "I shall make mention of Rahab and Babylon to those who know me," [Psalm 87:4] except if it foresees by the Spirit the mysteries of the economy there? For these, having seen all men worshiping the image and heeding the prescription of the king, settled their minds to speak. This is not idly written, brothers, this is similarly fulfilled in us now.

For behold, it happened that even every family received our captives and they became slaves to the Babylonians. Nebuchadnezzar, just as the great devil, tyrannizes against us and having made a golden image compels people to idolatry. We the faithful stand fast unto death, lest we disgrace our teacher, Moses, or lest we permit our family to be ridiculed. Let us, as the three boys, conquer all the power of the Babylonians. God will deliver us from the hand of the king, as he rescued our forefathers from the hand of Pharaoh. Let us recall what happened long ago in the land of Egypt. When the sea was struck with a staff, it was put to flight and the Jordan River, when it saw the Ark, was turned back to its source, and Rahab the prostitute, when she was found faithful in the city of Jericho, she was preserved from the slaughter of the sword. And now God is able to easily quench the fire of the furnace. If you are threatened with the sword, let us submit to death; if thrown to wild beasts let us not cower before the beasts. Let not the crowd of the Babylonians prevail in that faithful day. Urging one another on as living combatants, the three young boys were led on by the Spirit to the pit, contending before myriads of unbelieving men.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.19.1-8"

[[commentary]]
quote='''
But what is better for you O man, having testified to depart from this world in glory, or having been rescued here and waiting patiently to keep sinning? For we have seen many who have confessed before the tribunal who were, through some pretext against the design of God, destroyed, and we have seen they who lived a sufficient time and being found in transgressions, also were destroyed. How does a confession to God aid them? For it is better for them rather that they are taken from this world as pure, having a heavenly crown, then remaining here to heap up sins for themselves concerning which they have to render an account. Therefore let the one who is brought forth on account of the Name pray that at some time having testified in such a way, to depart. For this one will never in any way be judged, but he will judge "having his own share in the first resurrection." [Revelation 20:6] And so be firm O man, never stammering in faith, and whenever you are called to testify obey willingly, so that your faith may be shown. It has happened that God has tested you as he tested Abraham, when he demanded Isaac. Having been brought forward, perhaps he wills to deliver you, and in this you glorify God. And you mimic the three boys and understand their faith! For they said to the king, "God is able to release us, but if he does not will, we are under the authority of God, we would rather gladly die than do what is prescribed by you." [Daniel 3:18] Whom then Nebuchadnezzar also seeing the pure and blameless boys coming out from the furnace was astounded and amazed. For neither was their hair singed nor their cloaks changed nor was the smell of fire in them.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.37.1-7"
