[[commentary]]
quote='''
For in all events after the iron was mixed with clay and spread to the tips of the toes and while they are discordant with one another of the seed of men, what is left which is necessary to await but Christ who comes from the heavens as a stone which is cut from a mountain, so that he removes the kingdoms of this world, but also sets up the heavenly kingdom of the saints which will never be destroyed, and the same mountain also became the city of the saints which fills all the earth.

And on account of this blessed Daniel spoke, "And after the end of those days God shall set up the kingdom which shall not be left for another people." [Daniel 2:44] Therefore, so that one may not mistrust what was spoken and ask whether these things really will be or not, the prophet seals it, saying, "and the dream is true and its interpretation is faithful." [Daniel 2:45]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.13"
