[[commentary]]
quote='''
For then there will be a great persecution like which there has not been such from the foundation of the world, while others from here and there are sent against every city and land in order to kill those who believe, and the Jews cheer at their destruction, and the nations rejoice and the unfaithful celebrate with them, but the saints, coming from the west to the east and others from the east to the south are pursued, but others will hide in the mountains and in caverns, everywhere the abomination will make war against them even through the sea and through dry places. He will kill them through the command and according to every way he will oppress them from the earth and not allow them to sell some of their own possessions nor to buy from another's things, unless one should carry on his hand the name of the beast, or one should bear his mark upon his forehead.

For then all the faithful will be banished from every place and will be displaced from their homes and will be expelled from their cities and will be swept away by the state and they will be punished with every punishment and will be cast out from all the world.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.50.3-4"


[[commentary]]
quote='''
And so it is needful to consider the coming persecution of the saints at that time and the distress, for it is necessary for us, from what has partially occurred already, to reflect on the future things, that such distress and upheaval in all the world will occur, and everywhere all the faithful will be killed and slaughtered in every city and land, and the blood of the righteous will be poured out and men will be burned alive and others shall be thrown to beasts, and infants in the womb shall be murdered, and all shall be hurled away unburied, and shall be eaten by dogs, both virgins and women shall be corrupted in openness and shall be shamefully mocked, and be captured and they shall dig up the graves of saints and destroy the remains and they shall hurl them onto a plain, and they shall become blasphemous. Then there shall be upheaval in the cities, when the saints are persecuted from there. There will be upheaval in roads and in deserts when all wish to be hidden there. There will be upheaval in the sea when all attempt to flee through water. There will be upheaval on the islands when all seek to go there. And then the earth will be barren for the saints and every city uninhabitable and the sea unnavigable and all the world a desert, when they are destroyed by famine, and faint from thirst, but others die from fear and from the great persecution. But then how will a man hide? To whom shall his own children run? How, after his belongings have been carried off, shall he preserve them, when he is not able to save his own soul? Then there will be many wailings of infants, lamentations of both fathers and mothers, loud cryings of both wives and virgins, moans of both brothers and cousins. Then will one mourn another? Brother will not mourn brother, for he also expects death. Mother will not mourn daughter, for she also suspects death. Father will not mourn son, fearing that he also will be killed.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.51.1-6"


[[commentary]]
quote='''
On account of this, the Lord, foreseeing these things, says, "Pray that your flight does not happen in winter or on the Sabbath, you ought not to rest from righteousness nor engage in the matters of this life, as in winter, lest that day unknowingly fall upon you as a trap." [Matthew 24:20; Luke 21:34] "For if," he says, "those days were not curtailed, not any flesh would be saved. But on account of the elect those days will be curtailed." [Matthew 24:22]

"But after the persecution of those days, the sun shall be darkened and the moon shall not give its splendor and the stars shall burn out and fall from heaven and the powers of heaven shall be shaken and then they shall see the Son of Man coming with power and great glory." [Matthew 24:29-30]

For if the devil receives for a little while authority to trouble the earth, as it is written, "God has given to him the authority to test those who dwell upon the earth," [Revelation 13:2, 12] how much more rather that the Son of God, when he takes all authority of heavenly and earthly and subterranean things, shall trouble all the earth and the elements in it, arriving to avenge the saints with angelic power and patriarchal glory, when he comes to be glorified in his saints and to be marveled by all who pray to him and to repay those who persecuted us with persecution, but to repay us who were persecuted with rest.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.52.1-4"
