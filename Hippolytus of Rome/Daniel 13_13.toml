[[commentary]]
quote='''
"And one said to the other 'Let us now go home because it is the hour of the noon time meal.' And having gone out they departed from one another. And after turning back they came to the previous place." [Susannah 13-14] And so to have separated themselves from one another at the hour of the noon time meal and to have turned back to the previous place, this indicates that with terrestrial foods the Jews are not in harmony with the gentiles, but in opinions and in every other worldly matter, meeting at these things, they agree.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.16.5"
