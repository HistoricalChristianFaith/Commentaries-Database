[[commentary]]
quote='''
"But she, while wailing, looked up to heaven. For her heart was relying on the Lord." [Susannah 34] For through her tears she attracted the Word from the heavens, who through her tears was destined to awaken the dead Lazarus. [John 11:43]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.26.6"
