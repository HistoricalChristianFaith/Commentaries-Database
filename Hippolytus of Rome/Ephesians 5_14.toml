[[commentary]]
quote='''
And he enchants the eyes of the dead, as he says, and raises up again those that are slumbering, after having been roused from sleep, and after having been suitors. And concerning these, he says, the Scripture speaks: "Awake thou that sleepest, and arise, and Christ will give thee light." This is the Christ who, he says, in all that have been generated, is the portrayed Son of Man from the unportrayable Logos.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FThe%2520Refutation%2520of%2520All%2520Heresies%2FBook%25205.html"
source_title="Hippolytus Refutation of All Heresies Book V"

[[commentary]]
quote='''
Moreover, concerning the resurrection and the kingdom of the saints, Daniel says, "And many of them that sleep in the dust of the earth shall arise, some to everlasting life, (and some to shame and everlasting contempt)." Esaias says, "The dead men shall arise, and they that are in their tombs shall awake; for the dew from thee is healing to them." The Lord says, "Many in that day shall hear the voice of the Son of God, and they that hear shall live." And the prophet says, "Awake, thou that sleepest, and arise from the dead, and Christ shall give thee light." And John says, "Blessed and holy is he that hath part in the first resurrection: on such the second death hath no power." For the second death is the lake of fire that burneth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Dogmatical%2520and%2520Historical.html"
source_title="Hippolytus Dogmatical and Historical Fragments"
