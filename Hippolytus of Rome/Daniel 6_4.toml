[[commentary]]
quote='''
Accordingly, after this happened, the governors and satraps were stirred with jealousy and sought to find a pretext against Daniel, so that they might take some occasion against him and accuse him and kill him. In which manner the word was fulfilled, which we spoke a little before, that a pious man or one who fears God and has grace and wisdom from God is hated by the rest of men because they also were not honored with the same gift. In this way also the satraps and governors through envy hated Daniel since he was wiser and more faithful than all of them were. For Scripture testified to this, saying, "And not any pretext and transgression and fault was found against him because he was faithful." [Daniel 6:4] For he not only kept the commandments of God according to the law, but also the prescriptions of the king with much diligence and his conduct was exacting, wishing to stain his favor and pure conscience in no sordid matter of little gain.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.19.3-6"
