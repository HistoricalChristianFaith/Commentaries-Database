[[commentary]]
quote='''
44. And that divisions will arise when the falling away takes place, is without doubt. And when divisions arise, love is chilled. The words, "Blessed is he that waiteth and cometh to the thousand three hundred and five and thirty days," have also their value, as the Lord said: "But he that shall endure unto the end, the same shall be saved." Wherefore let us by no means admit the falling away, lest iniquity abound, and the abomination of desolation-that is, the adversary-overtake us. And He said to him, "unto evening"-that is, unto the consummation" and morning." What is "morning? "The day of resurrection. For that is the beginning of another age, as the morning is the beginning of the day. And the thousand and four hundred days are the light of the world. For on the appearing of the light in the world (as He says, "I am the light of the world"), the sanctuary shall be purged, as he said, (of) the adversary. For it cannot by any means be purged but by his destruction.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Exegetical.%2520Fragments%2520from%2520Commentaries%2520on%2520Various%2520Books%2520of%2520Scripture.html"
source_title="Hippolytus Exegetical Fragments - Of the visions of Daniel and Nebuchadnezzar"


[[commentary]]
quote='''
This one being proclaimed by them as king and being glorified by them and becoming the abomination of desolation to the world, he shall rule one thousand two hundred ninety days. As Daniel also says, "And they will give the abomination of desolation one thousand two hundred ninety days. Blessed is he who endures and reaches the one thousand three hundred thirty-five days." [Daniel 12:11-12] For when the abomination is present and wages war against the saints, whenever his days have passed, and it draws near to the forty-five other days which approach the fiftieth day, it reaches to the kingdom of heavens. For the Antichrist comes to the portion on the fiftieth day as about to inherit the kingdom together with Christ. And on account of this Isaiah says, "Let the impious be killed, so that he may not see the glory of the Lord." [Isaiah 26:10] And Paul says to the Thessalonians, "Whom the Lord Jesus shall kill with the spirit of his mouth and shall abolish him with the manifestation of his advent," [2 Thessalonians 2:8] but the saints are destined to inherit the kingdom with Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.54.1-5"
