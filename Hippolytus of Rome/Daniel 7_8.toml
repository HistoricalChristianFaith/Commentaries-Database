[[commentary]]
quote='''
"I considered the horns." That is to say, I looked intently at the beast, and was astonished at everything about it, but especially at the number of the horns. For the appearance of this beast differed from that of the other beasts in kind.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Exegetical.%2520Fragments%2520from%2520Commentaries%2520on%2520Various%2520Books%2520of%2520Scripture.html"
source_title="Hippolytus Exegetical Fragments - Scholia on Daniel"


[[commentary]]
quote='''
On account of which another kingdom is no longer left after this one, except its ten horns which grow up from it and in the midst of them one small horn arises and it roots out three of the first horns.

For just as the prophet foretold the leopard, that "four heads were on the beast," [Daniel 7:6] it happened that also the kingdom of Alexander was divided to the four chiefs, in this way it is necessary to also expect now that ten horns shall arise from this kingdom, whenever the time of the beast should be fulfilled and the small horn, which is the Antichrist, suddenly should show forth among them, and righteousness should be taken from the earth and all the world will then be near the consummation.

So that it is necessary for us to not misconceive the plan of God, but to be long-suffering and to beg that we may not fall upon such times, nor indeed lack faith, as though these things are not destined to be. For if the first things, as much as the prophets foretold, did not happen, neither should you expect these. But if those things happened according to their own times just as was foretold, these things also shall be always accomplished. For when some say, "And when will these things be?" This is a mark of unfaithful men who do not believe. But to foreknow what will be and to believe that it will be in this way, is a mark of a blessed man who sees and is silent, so that he may not, when he is speaking many things, endanger himself.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.5.2-6"


[[commentary]]
quote='''
But let us also demonstrate in another way that these things are true and clear and happen to the slaves of God. For Scripture does not lie in any way, nor does the Holy Spirit deceive his slaves the prophets, through whom he is well pleased to announce the plan of God to men, so that seeing these things happen, we might not fall, nor be troubled as beholding these strange things. For otherwise the consummation is not able to come upon this world except in this way.

For just as upon Sodom when their transgressions were fulfilled, immediately fire descended upon them and they were destroyed, in this way it will be even now, when lawlessness multiplies in the world and the present iron beast is divided into ten horns and anarchy occurs and discord, while others from here and there rend the kingdom, then the end shall come upon them.

And so since we, having also reached this point in another book and explained an account concerning these things, both the advent of the Antichrist and his race, and from where and how the deceiver shall appear, and we were not silent about his works, nevertheless also now I will mention this only a little, so that a man may steadfastly stand against all things, not ever stammering in mind, and be able to believe in God from a whole heart.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 4.6.1-7.1"
