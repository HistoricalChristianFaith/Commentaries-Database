[[commentary]]
quote='''
Only see that you do not give these things over to unbelieving and blasphemous tongues, for that is no common danger. But impart them to pious and faithful men, who desire to live holily and righteously with fear. For it is not to no purpose that the blessed apostle exhorts Timothy, and says, "O Timothy, keep that which is committed to thy trust, avoiding profane and vain babblings, and oppositions of science falsely so called; which some professing have erred concerning the faith." And again, "Thou therefore, my son, be strong in the grace that is in Christ Jesus. And the things that thou hast heard of me in many exhortations, the same commit thou to faithful men, who shall be able to teach others also." If, then, the blessed (apostle) delivered these things with a pious caution, which could be easily known by all, as he perceived in the spirit that "all men have not faith," how much greater will be our danger, if, rashly and without thought, we commit the revelations of God to profane and unworthy men?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Dogmatical%2520and%2520Historical.html"
source_title="Treatise on Christ and Antichrist"
