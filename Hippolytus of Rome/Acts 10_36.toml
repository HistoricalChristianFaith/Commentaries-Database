[[commentary]]
quote='''
Now Jeremiah says, "Who hath stood in the counsel of the Lord, and hath perceived His Word?" But the Word of God alone is visible, while the word of man is audible. When he speaks of seeing the Word, I must believe that this visible (Word) has been sent. And there was none other (sent) but the Word. And that He was sent Peter testifies, when he says to the centurion Cornelius: "God sent His Word unto the children of Israel by the preaching of Jesus Christ. This is the God who is Lord of all." If, then, the Word is sent by Jesus Christ, the will of the Father is Jesus Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FFragments%2520-%2520Dogmatical%2520and%2520Historical.html"
source_title="Fragments - Dogmatical and Historical"
