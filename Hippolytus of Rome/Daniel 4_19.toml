[[commentary]]
quote='''
Therefore he, who also interpreted the dream of the king, was grieved and became tearful and for about one hour was amazed and his thoughts troubled him, not wishing to send out his voice, indicating the affection which he had for the king, so that in this even the king was sorely pricked and when he did what was spoken by the prophet, he was able to be saved.

And so after Daniel stood voiceless for one hour and was greatly silent, he, while looking at everyone, was confused by his thoughts and his face was changed, and Daniel became pale on account of the fear of the interpretation, lest the king, having heard what was spoken concerning him, become angered and command him to be killed; but when he was empowered by the Spirit and assumed the face of an angel, his appearance became fiery and his eyes shining as a flame of fire, so that in this the king, being astounded, was afraid. For if the sons of Israel were not able to look upon the face of the blessed Moses on account of the glory of his face, how then were the Babylonians not afraid who looked at the face of Daniel which had changed? Certainly when he appeared as a man they were not afraid, but when he was also shown as an angel of God, they were afraid.

Then having been calmed from great vision and agony and coming to his own state of human nature, he answered the king and said, "Let, O king, the dream be upon those who hate you and its judgment on your enemies." [Daniel 4:19] And in this way, having begun, he proclaimed to him according to each thing which was to happen to him and encouraged him with comforting words and he again restored his hopes for what was about to be. For he says to him, "And when the king saw a watcher and a holy one descending from heaven who said, 'Cut down the tree and strip its leaves and shake its branches except leave the stump of the roots of the tree in the earth.' Your kingdom will remain, O king, until you know the heavenly authority, because the Most High rules the kingdom of men and he shall give it to whom he wills." [Daniel 4:23-26]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.7.4-9"
