[[commentary]]
quote='''
Then accordingly when the angel appeared in the den, the wild beasts were tamed and the lions, wagging their tails at him, rejoiced as being subjected by a new Adam. They, licking the holy feet of Daniel, rolled around to taste the soles of his feet and they longed to accompany him. For if we believe that, after Paul was condemned to beasts and that a lion was set upon him, it reclined at his feet and licked him all around, how do we not also believe what happened to Daniel, which even Darius himself described to all, having dispatched it through scribes? And in the books of the Persians and Medes it is read up to today that these things really occurred, so that not only the Hebrews nor only the Babylonians, but also the Medes and the Persians and all the nations who live under heaven, having heard the things which happened, they themselves feared God. And then, as Darius heard the voice of Daniel, he was amazed and marveled and commanded the stone to be rolled away and he saw Daniel sitting in the midst of the lions and he was stroking the hair of their heads with his own hands. And then, having invited everyone, he exhibited to them the marvelous spectacle, beasts which were tamed by a man and who were comforted by his hands. Accordingly after taking Daniel up "from the den, no destruction was found in him at all because he trusted in his God." [Daniel 6:23]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.29.3-6"
