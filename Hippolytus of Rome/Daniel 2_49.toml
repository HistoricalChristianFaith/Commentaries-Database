[[commentary]]
quote='''
"And Daniel asked a favor from the king and he appointed Shadrach, Mishach, and Abednego over the affairs of the country of Babylon." [Daniel 2:49]

And this which happened under Daniel is worthy of faith and approval. For since they themselves joined with Daniel in prayer to God, so that the vision might be revealed to him, and because of this Daniel himself received worth and honor from the king, Daniel remembered them and entrusted them with the work which happened under them on behalf of the king, so that they themselves also were esteemed with some honor as fellow-initiates and God-fearing men. For after requesting the heavenly things from the Lord, they were also engaged with the earthy things beside the king.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.10"
