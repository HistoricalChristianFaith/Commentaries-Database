[[commentary]]
quote='''
For after the king had taken Egypt and after taking over the Jewish land and deporting the people, he considered upon his bed what was there to do after these things. But he who knows the secrets of all and searches the considerations of the hearts, revealed to the king what will be through the image, but God hid the vision from him, so that the plans of God would be able to be explained not by the wise men of Babylon, but by the blessed Daniel, in as much as the things which were hidden from all, were revealed by the prophet of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 2.6"
