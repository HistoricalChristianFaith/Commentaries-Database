[[commentary]]
quote='''
Wishing to precisely demonstrate the times of the captivity which befell the sons of Israel and the prophetic dreams of the blessed Daniel, and also the manner of his life from childhood in Babylon, I myself come forward to speak in order to testify to the holy and righteous prophetic man, even to him who became a witness of Christ, who not only then in those times, revealed the visions of king Nebuchadnezzar, but also similarly, having thoroughly taught his youths, led the faithful witnesses onward into the world.

Now this occurred during the kingdom of Jehoiakim the son of Josiah, according to the times of the prophecy of the blessed Jeremiah, who…together with the rest of the captives was captured and brought with them into Babylon.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.1.1-2"

[[commentary]]
quote='''
This is the beginning of the book, "In the third year of the kingdom of Jehoiakim the king of Judah, Nebuchadnezzar the king of Babylon came into Jerusalem and blockaded it. And the Lord gave Jehoiakim king of Judah into his hand as well as some of the vessels of the House of God and he brought them into the land of Shinar, into the house of his god." [Daniel 1:1-2]

And so Scripture describes these things in this way so that it may indicate the occurrence of the captivity of the people, when Jehoiakim, the son of Eliakim who was also called Jehoiakim, was deported and the three youths together with Daniel were taken along with him. Thus, Jehoiakim was the husband of Susannah.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.6.1-3"

[[commentary]]
quote='''
Therefore it is necessary for us, while making a proof of these matters, to precisely take up for the persuasion of our listeners, the things set before us; and we shall not pass over what captivities befell the people, and what befell some of the kings.

For these are the five sons of the blessed Josiah: Jehoahaz, Eliakim who was also called Jehoiakim, Johanan, Zedekiah who was also called Jeconiah, and Shallum.

And Jehoahaz, after the death of his father, was anointed by the people into the kingdom, being twenty-three years old. Pharaoh Necho arose against him in the third month of his kingdom and, taking him prisoner, he brought him into Egypt. And the Jews set a tribute upon the earth of one hundred talents of silver and ten talents of gold and Pharaoh Necho set in his place Eliakim, his brother, as king of the land, who also changed his name to Jehoiakim. He reigned for eleven years. Then, Nebuchadnezzar the king of Babylon arose against him and, taking him prisoner, brought him and some of the vessels of the House of the Lord, which were in Jerusalem, into Babylon. As a friend of Pharaoh he was imprisoned and the king, having been restored by the next king of Babylon in the thirtieth year, was brought out by Evil Merodach king of Babylon. And he raised his head and was his adviser and ate with him at his table until the day in which he died.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 1.2.1-6"
