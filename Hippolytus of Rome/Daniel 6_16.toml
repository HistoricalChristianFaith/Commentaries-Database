[[commentary]]
quote='''
Then accordingly, Darius, not being able to further contradict the satraps, said for Daniel to be brought and they cast him into the den of lions. And the king, answering said to him, "Your God whom you serve perpetually, he himself will rescue you" urging him to be of good cheer. "For since, even though I wish to help, I am not able even though I am king, but God whom you serve will rescue you," [Daniel 6:16] in order to show that what is impossible for men is possible with God. [Luke 18:27]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.27.1-2"
