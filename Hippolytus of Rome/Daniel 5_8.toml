[[commentary]]
quote='''
And so after all were called, the king said to them, "'Whoever shall read this writing and make known to me its interpretation, shall be clothed in purple and a golden necklace shall be upon his neck and he shall rule as third in my kingdom.' And all the wise men of the king came in and they were not able to read the writing nor make known to the king the interpretation." [Daniel 5:7-8]

For then how many of the Babylonians were there who wanted to please the king and were contriving many ways to forge some strange phrase and be clothed in purple and be glorified in the third throne? But the phrase was hidden from them. For their eyes were dull and the perceptions of their hearts were incapacitated. For the Lord knows the thoughts of the wise, that they are empty. [1 Corinthians 3:20; Psalm 94:11]
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.15.2-3"
