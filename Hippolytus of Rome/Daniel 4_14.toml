[[commentary]]
quote='''
And so when the angel came down from heaven and said, "Cut down the tree and strip its branches and shake off its leaves and scatter its fruit. Let the beasts be loosed from under it and the birds from its branches" [Daniel 4:14], this indicates the occurrence of a plot by the satraps against the king and by those who are in power under them. After he was banished by them, he fled to the desert and his kingdom and the authority and majesty which he had formerly were taken, because he boasted and said, "Who is the god, who shall take you from my hands?" [Daniel 3:15] Later stooping piteously to the earth, and wailing in the mountains, he lived with the beasts, fearing his satraps, lest he be killed by them. And on account of this Scripture says, "He shall lie outside in the grass and in the dew of heaven and with the beasts and his portion shall be in the grass of the earth. His heart shall be changed from men and a heart of a beast shall be given to him." [Daniel 4:15-16] For no longer did the great king and ruler live as a man administering the kingdom, but being alone in the desert he ate grass and herbs until his heart was changed and became as a beast who lived in forests and caverns, until his hair grew as a lion's and his nails grew large as a bird's and seven seasons passed over him. [Daniel 4:32] For in this way God the Most High interpreted these things to be, just as Daniel says, "The judgment is of the Most High, which has come upon my lord the king." [Daniel 4:24] The Word, having heard the council of the Father, descended from heaven to proclaim the will of the Father through angels, as Scripture says, "A holy one descended from heaven." [Daniel 4:13]

The angels consulted the Word, "What does the master command us?" For this is the request of the saints. The word to them was that God the Most High says this, "Cut down the tree and strip its branches and shake its leaves." [Daniel 4:14] Those who heard this routed the powers of the king, so that they took away his kingdom. For all the nations were handed over to the angels, as John says in the Apocalypse, "And I heard one saying, 'Release the four angels who reside on the great river Euphrates'" [Revelation 9:13-14] who are Persians, Medes, Assyrians, and Babylonians.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Hippolytus%2520of%2520Rome%2FCommentary%2520on%2520Daniel.pdf"
source_title="Commentary on Daniel 3.9.1-10"
