[[commentary]]
quote='''
But now, lest the terms 'creation' and 'establishing' should be an obstacle to belief in the divine birth, these words follow, "Before He made the earth, before He made firm the mountains, before all the hills He begat Me." Thus He is begotten before the earth, Who is established before the ages; and not only before the earth, but also before the mountains and hills. And indeed in these expressions, since Wisdom speaks of itself, more is meant than is said. For all objects which are used to convey the idea of infinity must be of such a kind as to be subsequent in point of time to no single thing and to no class of things. But things existing in time cannot possibly be fitted to indicate eternity; because, from the very fact that they are posterior to other things, they are incapable of suggesting the thought of infinity as a beginning, themselves having their own beginning in time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252012.html'
source_title="ON THE TRINITY 12:37"
