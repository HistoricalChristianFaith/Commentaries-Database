[[commentary]]
quote='''
For through Himself He creates the things which are created in Him, just as through Himself all things are reconciled in Him. Inasmuch as they are reconciled in Him, recognise in Him the nature of the Father's unity, reconciling all things to Himself in Him. Inasmuch as all things are reconciled through Him, perceive Him reconciling to the Father in Himself all things which He reconciled through Himself. For the same Apostle says, But all things are from God, Who reconciled us to Himself through Christ, and gave unto us the ministry of reconciliation: to wit, that God was in Christ reconciling the world unto Himself. Compare with this the whole mystery of the faith of the Gospel. For He Who is seen when Jesus is seen, Who works in His works, and speaks in His words, also reconciles in His reconciliation. And for this cause, in Him and through Him there is reconciliation, because the Father abiding in Him through a like nature restored the world to Himself by reconciliation through and in Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.51"
