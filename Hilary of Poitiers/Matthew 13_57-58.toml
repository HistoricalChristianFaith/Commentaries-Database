[[commentary]]
quote='''
Further, He makes this answer, that a Prophet is without honour in his own country, because it was in Judæa that He was to be condemned to the sentence of the cross; and forasmuch as the power of God is for the faithful alone, He here abstained from works of divine power because of their unbelief; whence it follows, And he did not there many mighty works because of their unbelief.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
The Lord said to them that a prophet is without honor in his own country, because he was to be despised in Judea until the final fate of the cross. And since God's power is only with those who are faithful, he abstained from all works of divine power while he was there, because of their unbelief.
'''
source_url='https://archive.org/details/commentaryonmatt0125hila/page/40/mode/2up'
source_title="Commentary on Matthew 14.2"
