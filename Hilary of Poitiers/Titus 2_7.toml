[[commentary]]
quote='''
Accordingly he has provided Titus, the person to whom his words were addressed, with an injunction as to the perfect practice of religion to this effect: "In all things shewing thyself an ensample of good works, teaching with gravity sound words that cannot be condemned, that the adversary may be ashamed, having nothing disgraceful or evil to say of us." This teacher of the Gentiles and elect doctor of the Church, from his consciousness of Christ who spoke and dwelt within him, knew well that the infection of tainted speech would spread abroad, and that the corruption of pestilent doctrine would furiously rage against the sound form of faithful words, and infusing the poison of its own evil tenets into the inmost soul, would creep on with deep-seated mischief. For it is of these that he says, "Whose word spreadeth like a cancer," tainting the health of the mind, invaded by it with a secret and stealthy contagion. For this reason, he wished that there should be in the bishop the teaching of sound words, a good conscience in the faith and expertness in exhortation to withstand wicked and false and wild gainsayings.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.1"
