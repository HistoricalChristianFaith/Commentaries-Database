[[commentary]]
quote='''
By the street also is to be understood the time of this world, and they are therefore bid to go to the crossings of the streets, because the past is remitted to all.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252022.html'
source_title="Catena Aurea by Aquinas"
