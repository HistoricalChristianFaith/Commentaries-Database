[[commentary]]
quote='''
For through the Lord Christ all things were created; and therefore it is His proper name that He should be the Creator. Does not both the reality and the title of His creative power belong to Him? Melchisedec is our witness, thus declaring God to be Creator of heaven and earth: "Blessed be Abraham of God most high, Who created heaven and earth." The prophet Hosea also is witness, saying, "I am the Lord thy God, that establish the heavens and create the earth, Whose hands have created all the host of heaven." Peter too is witness, writing thus, "Committing your souls as to a faithful Creator." Why do we apply the name of the work to the Maker of that work? Why do we give the same name to God and to our fellowmen? He is our Creator, He is the Creator of all the heavenly host.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252012.html'
source_title="ON THE TRINITY 12:4"
