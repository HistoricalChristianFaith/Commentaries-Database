[[commentary]]
quote='''
By this the holy Apostles did not understand that He had gone forth, in the sense of having been sent, from God. For they had often heard Him confess, in His earlier discourses, that He was sent; but what they hear now is the express statement that He had gone forth from God. This opens their eyes to perceive from His works His Divine nature. The fact that He had gone forth from God makes clear to them His true Divinity, and so they say, "Now therefore we are sure that Thou knowest all things, and needest not that any man should ask Thee; by this we believe that Thou wentest forth from God." The reason why they believe that He went forth from God is that He both can, and does, perform the works of God. Their perfect assurance of His Divine nature is the result of their knowledge, not that He is come from God, but that He did go forth from God. Accordingly we find that it is this truth, now heard for the first time, which clenches their faith. The Lord had made two statements; "I went forth from God," and "I am come from the Father into this world." One of these, "I am come from the Father into this world," they had often heard, and it awakens no surprise. But their reply makes it manifest that they now believe and understand the other, that is, "I went forth from God." Their answer, "By this we believe that Thou wentest forth from God," is a response to it, and to it only; they do not add, "And art come from the Father into this world." The one statement is welcomed with a declaration of faith; the other is passed over in silence. The confession was wrung from them by the sudden presentation of a new truth, which convinced their reason and constrained them to avow their certainty. They knew already that He, like God, could do all things; but His birth, which accounted for that omnipotence, had not been revealed. They knew that He had been sent from God, but they knew not that He had gone forth from God. Now at last, taught by this utterance to understand the ineffable and perfect birth of the Son, they confess that He had spoken to them without a proverb.

For God is not born from God by the ordinary process of a human childbirth; this is no case of one being issuing from another by the exertion of natural forces. That birth is pure and perfect and stainless; indeed, we must call it rather a proceeding forth than a birth. For it is One from One; no partition, or withdrawing, or lessening, or efflux, or extension, or suffering of change, but the birth of living nature from living nature. It is God going forth from God, not a creature picked out to bear the name of God. His existence did not take its beginning out of nothing, but went forth from the Eternal; and this going forth is rightly entitled a birth, though it would be false to call it a beginning. For the proceeding forth of God from God is a thing entirely different from the coming into existence of a new substance. And though our apprehension of this truth, which is ineffable, cannot be defined in words, yet the teaching of the Son, as He reveals to us that He went forth from God, imparts to it the certainty of an assured faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.34-35"


[[commentary]]
quote='''
(vi. de Trin. c. 34) They believe that He came forth from God, because He does the works of God. For whereas our Lord had said both, I came forth from the Father, and, I am come into the world from the Father, they testified no wonder at the latter words, I am come into the world, which they had often heard before. But their reply shows a belief in and appreciation of the former, I came forth from the Father. And they notice this in their reply: By this we believe that Thou camest forth from God; not adding, and art come into the world, for they knew already that He was sent from God, but had not yet received the doctrine of His eternal generation. That unutterable doctrine they now began to see for the first time in consequence of these words, and therefore reply that He spoke no longer in parables. For God is not born from God after the manner of human birth: His is a coming forth from, rather than a birth from, God. He is one from one; not a portion, not a defection, not a diminution, not a derivation, not a pretension, not a passion, but the birth of living nature from living nature. He is God coming forth from God, not a creature appointed to the name of God; He did not begin to be from nothing, but came forth from an abiding (manente) nature. To come forth, hath the signification of birth, not of beginning.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"
