[[commentary]]
quote='''
All this is indeed as it is: He, Who is by nature God of God, must possess the nature of His origin, which God possesses, and the indistinguishable unity of a living nature cannot be divided by the birth of a living nature. Yet nevertheless the heretics, under cover of the saving confession of the Gospel faith, are stealing on to the subversion of the truth: for by forcing their own interpretations on words uttered with other meanings and intentions, they are robbing the Son of His natural unity. Thus to deny the Son of God, they quote the authority of His own words, Why callest thou Me good? None is good, save one, God. These words, they say, proclaim the Oneness of God: anything else, therefore, which shares the name of God, cannot possess the nature of God, for God is One.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.2"


[[commentary]]
quote='''
The heretics consider it necessary to deny that our Lord Jesus Christ by virtue of His nature was divine, because He said, Why callest thou Me good? None is good save one, God. Now a satisfactory answer must stand in direct relation to the matter of enquiry, for only in that case will it furnish a reply to the question put.… If Christ then did not chide because He was called good, it must have been because He was called "good Master." Further the manner of His reproof shews that it was the disbelief of the questioner, rather than the name of master, or of good, which He resented.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.15-16"
