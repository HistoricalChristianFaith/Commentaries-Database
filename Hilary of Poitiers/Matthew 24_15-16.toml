[[commentary]]
quote='''
Or otherwise; It is a sign of His future coming that the Lord gives, when He says, When ye shall see the abomination. For the Prophet spoke this of the times of Antichrist; and he calls abomination that which coming against God claims to itself the honour of God. It is the abomination of desolation, because it will desolate the earth with wars and slaughter; and it is admitted by the Jews, and set up in the holy place, that where God had been invoked by the prayers of the saints, into that same place admitted by the unbelievers it might be adored with the worship of God. And because this error will be peculiar to the Jews, that having rejected the truth they should adopt a lie, He warns them to leave Judæa, and flee to the mountains, that no pollution or infection might be gathered by admixture with a people who should believe on Antichrist.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252024.html'
source_title="Catena Aurea by Aquinas"
