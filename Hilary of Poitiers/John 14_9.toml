[[commentary]]
quote='''
But there is no danger that the one faith will cease to be such through diversity in its preaching. The Evangelist had taught that our Lord said, He that hath seen Me, hath seen the Father also. But has Paul, the teacher of the Gentiles, forgotten or kept back the meaning of the Lord's words, when he says, Who is the image of the invisible God? I ask whether He is the visible likeness of the invisible God, and whether the infinite God can also be presented to view under the likeness of a finite form? For a likeness must needs repeat the form of that of which it is the likeness. Let those, however, who will have a nature of a different sort in the Son determine what sort of likeness of the invisible God they wish the Son to be. Is it a bodily likeness exposed to the gaze, and moving from place to place with human gait and motion? Nay, but let them remember that according to the Gospels and the Prophets both Christ is a Spirit and God is a Spirit. If they confine this Christ the Spirit within the bounds of shape and body, such a corporeal Christ will not be the likeness of the invisible God, nor will a finite limitation represent that which is infinite.

But, as it is, neither did the Lord leave us in doubt: He who hath seen Me, hath seen the Father also; nor was the Apostle silent as to His nature, Who is the image of the invisible God. For the Lord had said, If I do not the works of My Father, believe Me not, teaching them to see the Father in Himself in that He did the works of the Father; that through perceiving the power of His nature they might understand the nature of that power which they perceived. Wherefore the Apostle proclaiming that this is the image of God, says, Who is the image of the invisible God, the first-born of all creation; for in Him were all things made in the heavens and upon the earth, things visible and things invisible, whether thrones or dominions or principalities or powers; all things have been created through Him and in Him, and He is before all, and for Him all things consist. And He is the head of the body, the Church, Who is the beginning, the first-born from the dead, that in all things He might have the pre-eminence. For it was the good pleasure of the Father that in Him should all the fulness dwell, and through Him all things should be reconciled to Him. So through the power of these works He is the image of God. For assuredly the Creator of things invisible is not compelled by any necessity inherent in His nature to be the visible image of the invisible God. And lest He should be regarded as the likeness of the form and not of the nature, He is styled the likeness of the invisible God in order that we may understand by His exercise of the powers (not the invisible attributes) of the Divine nature, that that nature is in Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.48-49"


[[commentary]]
quote='''
He rebukes the apostle for defective knowledge of himself. For previously he had said that when he was known the Father was known also. But what did they mean when he complained that for so long they had not known him? It means this: that if they had known him, they must have recognized in him the Godhead that belongs to his Father's nature. For his works were the peculiar works of God.
'''
source_url=''
source_title="ON THE TRINITY 7.36"


[[commentary]]
quote='''
(vii. de Trin) He reproves the ignorance of Philip in this respect. For whereas his actions had been strictly divine, such as walking on the water, commanding the winds, remitting sins, raising the dead, He complained that in His assumed humanity, the Divine nature was not discerned. Accordingly to Philip's request, to be shown the Father, Our Lord answers, He that hath seen Me, hath seen the Father.

(vii. de Trin) He does not mean the sight of the bodily eye: for His fleshly part, born of the Virgin, doth not avail towards contemplating the form and image of God in Him; but the Son of God being known with the understanding, it follows that the Father is known also, forasmuch as He is the image of God, not differing from but expressing His Author. For our Lord's expressions do not speak of one person solitary and without relationship, but teach us His birth. The Father also excludes the supposition of a single solitary person, and leaves us no other doctrine but that the Father is seen in the Son, by the incommunicable likeness of birth.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
