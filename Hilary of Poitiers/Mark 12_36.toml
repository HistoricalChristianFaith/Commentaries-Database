[[commentary]]
quote='''
The Scribe is not far from the Kingdom of God when he confesses one God, Who is to be loved above all things. But his own statement of the law is a reproach to him that the mystery of the law has escaped him, that he does not know Christ the Lord, the Son of God, by the nature of His birth to be included in the confession of the one God. The confession of one God according to the law seemed to leave no room for the Son of God in the mystery of the one Lord; so He asks the Scribe, how he can call Christ the Son of David, when David calls Him his Lord, since it is against the order of nature that the son of so great a Patriarch should be also his Lord. He would bid the Scribe, who regards Him only in respect of His flesh, and His birth from Mary, the daughter of David, to remember that, in respect of His Spirit, He is David's Lord rather than his son; that the words, Hear, O Israel, the Lord our God is one Lord, do not sever Christ from the mystery of the One Lord, since so great a Patriarch and Prophet calls Him his Lord, as the Son begotten of the Lord before the morning star.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.26"
