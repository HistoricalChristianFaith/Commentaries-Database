[[commentary]]
quote='''
He who has not grasped the manifest truths of the faith, obviously cannot have an understanding of its mysteries; because he has not the doctrine of the Gospel he is an alien to the hope of the Gospel. We must confess the Father to be in the Son and the Son in the Father, by unity of nature, by might of power, as equal in honour as Begetter and Begotten. But, perhaps you say, the witness of our Lord Himself is contrary to this declaration, for He says, The Father is greater than I. Is this, heretic, the weapon of your profanity? Are these the arms of your frenzy? Has it escaped you, that the Church does not admit two Unbegotten, or confess two Fathers? Have you forgotten the Incarnation of the Mediator, with the birth, the cradle, the childhood, the passion, the cross and the death belonging to it? When you were born again, did you not confess the Son of God, born of Mary? If the Son of God, of Whom these things are true, says, The Father is greater than I, can you be ignorant that the Incarnation for your salvation was an emptying of the form of God, and that the Father, unaffected by this assumption of human conditions, abode in the blessed eternity of His own incorrupt nature without taking our flesh? We confess that the Only-begotten God, while He abode in the form of God, abode in the nature of God, but we do not at once reabsorb into the substance of the divine unity His unity bearing the form of a servant. Nor do we teach that the Father is in the Son, as if He entered into Him bodily; but that the nature which was begotten by the Father of the same kind as His own, possessed by nature the nature which begot it: and that this nature, abiding in the form of the nature which begot it, took the form of human nature and weakness. Christ possessed all that was proper to His nature: but the form of God had departed from Him, for by emptying Himself of it, He had taken the form of a servant. The divine nature had not ceased to be, but still abiding in Him, it had taken upon itself the humility of earthly birth, and was exercising its proper power in the fashion of the humility it assumed. So God, born of God, being found as man in the form of a servant, but acting as God in His miracles, was at once God as His deeds proved, and yet man, for He was found in the fashion of man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.51"


[[commentary]]
quote='''
Why do you distort the Incarnation into a blasphemy? Why pervert the mystery of salvation into a weapon of destruction? The Father, Who glorifies the Son, is greater: The Son, Who is glorified in the Father, is not less. How can He be less, when He is in the glory of God the Father? And how can the Father not be greater? The Father therefore is greater, because He is Father: but the Son, because He is Son, is not less. By the birth of the Son the Father is constituted greater: the nature that is His by birth, does not suffer the Son to be less. The Father is greater, for the Son prays Him to render glory to the manhood He has assumed. The Son is not less, for He receives back His glory with the Father. Thus are consummated at once the mystery of the Birth, and the dispensation of the Incarnation. The Father, as Father, and as glorifying Him Who now is Son of Man, is greater: Father and Son are one, in that the Son, born of the Father, after assuming an earthly body is taken back to the glory of the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.56"


[[commentary]]
quote='''
(de Trin. ix) Or thus: If the Father is greater by virtue of giving, is the Son less by confessing the gift? The giver is the greater, but He to whom unity with that giver is given, is not the less.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
