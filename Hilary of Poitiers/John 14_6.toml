[[commentary]]
quote='''
He who is the way does not lead us into by-paths or trackless wastes. He who is the truth does not mock us with lies. He who is the life does not betray us into delusions, which are death. He himself has chosen these winning names to indicate the methods that he has appointed for our salvation. As the way, he will guide us to the truth. As the truth, he will establish us in the life. And therefore it is all-important for us to know what the mysterious mode is that he reveals for attaining this life. "No one comes to the Father except through me." The way to the Father is through the Son.
'''
source_url=''
source_title="ON THE TRINITY 7.33"


[[commentary]]
quote='''
Except through Him there is no approach to the Father, but there is also no approach to Him, unless the Father draw us. Understanding Him to be the Son of God, we recognise in Him the true nature of the Father. Hence, when we learn to know the Son, God the Father calls us: when we believe the Son, God the Father receives us; for our recognition and knowledge of the Father is in the Son, Who shews us in Himself God the Father, Who draws us, if we be devout, by His fatherly love into a mutual bond with His Son. So then the Father draws us, when, as the first condition, He is acknowledged Father: but no one comes to the Father except through the Son, because we cannot know the Father, unless faith in the Son is active in us, since we cannot approach the Father in worship, unless we first adore the Son, while if we know the Son, the Father draws us to eternal life and receives us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252011.html'
source_title="ON THE TRINITY 11.33"


[[commentary]]
quote='''
(vii. de Trin) For He who is the way doth not lead us into devious courses out of the way; nor does He who is the truth deceive us by falsehoods; nor does He who is the life leave us in the darkness of death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
