[[commentary]]
quote='''
He ordered those whom he healed to be silent. Was it silence about the healing that he ordered? Not at all. For the salvation that was given to each one was its own testimony. But by ordering it to be kept secret Jesus also shunned boasting about himself. It was better that knowledge of him remains in himself. So he admonished them to remain silent about him. The observance of silence springs from that about which one must keep silent.
'''
source_url='https://archive.org/details/commentaryonmatt0125hila/page/40/mode/2up'
source_title="Commentary on Matthew 12.9"

[[commentary]]
quote='''
On those whom He healed He enjoined silence, whence it follows, And he charged them that they should not make him known. For his restored health was a witness to each man. And by commanding them to hold their peace, He avoids all ostentation of Himself, and at the same time notwithstanding affords a knowledge of Himself in that very admonition to hold their peace; for the observance of silence proceeds from that very thing which is to be kept silent.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
