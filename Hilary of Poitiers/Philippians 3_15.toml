[[commentary]]
quote='''
And if, by an error incident to human nature, we be clinging to some preconception of our own, let us not reject the advance in knowledge through the gift of revelation. If we have hitherto used only our own judgment, let that not make us ashamed to change its decisions for the better. Guiding this advance wisely and carefully, the same blessed Apostle writes to the Philippians, Let us therefore as many as be perfect, be thus minded: and if in anything ye are otherwise minded, this also shall God reveal unto you. Only, wherein we have hastened, in that same let us walk. Reason cannot anticipate with preconceptions the revelation of God. For the Apostle has here shewn us wherein consists the wisdom of those who have the perfect wisdom, and for those who are otherwise minded, he awaits the revelation of God, that they may obtain the perfect wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252011.html'
source_title="ON THE TRINITY 11.24"
