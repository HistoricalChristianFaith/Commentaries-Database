[[commentary]]
quote='''
For the Apostle goes on to say, Now there are diversities of gifts, but there is the same Spirit; and there are diversities of ministrations but one and the same Lord; and there are diversities of workings but the same God, Who worketh all things in all. But to each one is given the manifestation of the Spirit for that which profiteth. In this passage before us we perceive a fourfold statement: in the diversity of gifts it is the same Spirit, in the diversity of ministrations it is the very same Lord, in the diversity of workings it is the same God, and in the bestowal of that which is profitable there is a manifestation of the Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.29"
