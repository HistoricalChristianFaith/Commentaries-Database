[[commentary]]
quote='''
In the case of the five loaves a miracle of the same type excites our wonder. By their increase five thousand men and countless women and children are saved from hunger; the method eludes our powers of observation. Five loaves are offered and broken; while the Apostles are dividing them a succession of new-created portions passes, they cannot tell how, through their hands. The loaf which they are dividing grows no smaller, yet their hands are continually full of the pieces. The swiftness of the process baffles sight; you follow with the eye a hand full of portions, and meantime you see that the contents of the other hand are not diminished, and all the while the heap of pieces grows. The carvers are busy at their task, the eaters are hard at work; the hungry are satisfied, and the fragments fill twelve baskets. Sight or sense cannot discover the mode of so noteworthy a miracle. What was not existent is created; what we see passes our understanding. Our only resource is faith in God's omnipotence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3.6"


[[commentary]]
quote='''
(iii. de Trin. c. 18) Five loaves are then set before the multitude, and broken. The broken portions pass through into the hands of those who break, that from which they are broken all the time not at all diminishing. And yet there they are, the bits taken from it, in the hands of the persons breakingd. There is no catching by eye or touch the miraculous operation: that is, which was not, that is seen, which is not understood. It only remains for us to believe that God can do all things.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
