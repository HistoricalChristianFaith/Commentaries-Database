[[commentary]]
quote='''
Thus the dæmons held the two men among the tombs without the town, that is, without the synagogue of the Law and the Prophets; that is, they infested the original seats of the two nations, the abodes of the dead, making the way of this present life dangerous to the passers by.

By their coming forth to meet Him is signified the willingness of men flocking to the faith.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"
