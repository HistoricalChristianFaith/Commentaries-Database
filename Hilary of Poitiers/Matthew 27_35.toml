[[commentary]]
quote='''
Thus on the tree of life the salvation and life of all is suspended.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252027.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
That they distributed his clothes by casting lots for them rather than by cutting them up signifies the eternal incorruptibility of Christ's body.
'''
source_url='https://archive.org/details/commentaryonmatt0125hila/page/40/mode/2up'
source_title="Commentary on Matthew 23.4-5"
