[[commentary]]
quote='''
He is wisdom itself not by His acts, but by His nature. Many indeed evade that saying of the Apostle's, Christ is the wisdom and power of God, (1 Cor. 1:24) by saying, that truly in creating Him of a Virgin the Wisdom and Power of God were shown mightily. (e.g. Paul of Samosata, &c.) Therefore that this might not be so explained, He calls Himself the Wisdom of God, showing that it was verily He, and not the deeds relating to Him, of whom this was meant. For the power itself, and the effect of that power, are not the same thing; the efficient is known from the act.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Nor again did the preaching of the Gospel with freedom of life in Christ please them—by which the hardships and burdens of the Law were remitted, and publicans and sinners only believed in it. Thus, then, so many and so great warnings of all kinds having been offered them in vain, they are neither justified by the Law, and they are cast off from grace; Wisdom, therefore, is justified of her children, by those, that is, who seize the kingdom of heaven by the justification of faith, confessing the work of wisdom to be just, that it has transferred its gift from the rebellious to the faithful.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
