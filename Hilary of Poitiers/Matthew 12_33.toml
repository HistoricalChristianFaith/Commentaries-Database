[[commentary]]
quote='''
Though spoken in the present, Jesus’ words would be borne out in the future. For in the present he refutes the Jews. They could see that the works of Christ were beyond human power, but they were unwilling to declare them as works of God. In saying this Jesus anticipates the future of numerous perversions of faith, especially of those who would divest the Lord of the dignity and union with the Father’s nature and so plunge into heresy. They then wander aimlessly in the arena between those who act with the excuse of ignorance and those who live in the knowledge of truth.…Through a tree’s inherent vitality, fruitfulness abounds. Therefore either the tree must be made good with good fruit or made bad with bad fruit, because by its fruit the tree is known. The meaning is not that a bad tree, according to the nature of trees, can constitute what is good or be good in its branches if it is bad. Rather, it is that Christ must either be left behind as useless or held onto as good because of the usefulness of good fruit.
'''
source_url='https://archive.org/details/commentaryonmatt0125hila/page/40/mode/2up'
source_title="Commentary on Matthew 12.18"

[[commentary]]
quote='''
Thus did He at that present refute the Jews, who seeing Christ's works to be of power more than human, would notwithstanding not allow the hand of God. And at the same time He convicts all future errors of the faith, such as that of those who taking away from the Lord His divinity, and communion of the Father's substance, have fallen into divers heresies; having their habitation neither under the plea of ignorance as the Gentiles, nor yet within the knowledge of the truth. He figures Himself as a tree set in the body, seeing that through the inward fruitfulness of His power sprung forth abundant richness of fruit. Therefore either must be made a good tree with good fruits, or an evil tree with evil fruits; not that a good tree is to be made a bad tree, or the reverse; but that in this metaphor we may understand that Christ is either to be left in fruitlessness, or to be retained in the fruitfulness of good works. But to hold one's self neuter, to attribute some things to Christ, but to deny Him those things that are highest, to worship Him as God, and yet to deny Him a common substance with the Father, is blasphemy against the Spirit. In admiration of His so great works you dare not take away the name of God, yet through malevolence of soul you debase His high nature by denying His participation of the Father's substance.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
