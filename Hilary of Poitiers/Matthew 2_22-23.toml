[[commentary]]
quote='''
But finding the seed of their hereditary unbelief still abiding, they fear and withdraw; admonished by a vision, to wit, seeing the Holy Ghost poured upon the Gentiles, they carry Christ to them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"
