[[commentary]]
quote='''
Is the preparation of the heaven an act of God within time; so that an impulse of thought suddenly surprised His mind, as though it had been previously dull and inert, and after the fashion of men He sought for materials and instruments for fashioning the heaven? Nay, the prophet's conception of the working of God is far different, when He says, By the word of the Lord were the heavens established, and all their power by the breath of His mouth. Yet the heavens needed the command of God, that they might be established; for their arrangement and excellence in this firm unshaken constitution, which they display, did not arise from the blending and commingling of some kind of matter, but from the breath of the mouth of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252012.html'
source_title="ON THE TRINITY 12:39"
