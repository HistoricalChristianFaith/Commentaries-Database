[[commentary]]
quote='''
And so when we are renewed by the water of baptism through the power of the Word, we are separated from the sins and ancestors of our origin; we are cut away from the inordinate love of father and mother as if by an incision from God’s sword, and we are divided from them. And as we shed our former self with its sins and unfaithfulness and are made new by the Spirit in mind and body, we will necessarily detest the habits of our old, inborn way of life.
'''
source_url='https://archive.org/details/commentaryonmatt0125hila/page/40/mode/2up'
source_title="Commentary on Matthew 10.24"

[[commentary]]
quote='''
The five inhabiting one house, whom He divides three against two, and two against three, we may explain thus; The three are the three parts of man, the body, the soul, and the will; for as the soul is bestowed in the body, so the will has power of using both in any way it chooses; and thence when a law is given it is given to the will. But this is only found in those who were first formed by God. By the sin and unbelief of the first parent, all the generations of men since have had sin for the father of their body, and unbelief for the mother of their soul. And as each man has his will within him, there are thus five in one house. When then we are renewed in the laver of baptism, by virtue of the word we are set apart from our original guilt, and severed, as it were, by the sword of God, from the lusts of this our father and mother, and thus there is great discord made in one house.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
