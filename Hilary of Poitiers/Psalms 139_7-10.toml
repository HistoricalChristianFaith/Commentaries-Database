[[commentary]]
quote='''
In devout thoughts such as these my soul, engrossed in the pursuit of truth, took its delight. For it seemed that the greatness of God so far surpassed the mental powers of His handiwork, that however far the limited mind of man might strain in the hazardous effort to define Him, the gap was not lessened between the finite nature which struggled and the boundless infinity that lay beyond its ken. I had come by reverent reflection on my own part to understand this, but I found it confirmed by the words of the prophet, Whither shall I go from Thy Spirit? Or whither shall I flee from Thy face? If I ascend up into heaven, Thou art there; if I go down into hell, Thou art there also; if I have taken my wings before dawn and made my dwelling in the uttermost parts of the sea (Thou art there). For thither Thy hand shall guide me and Thy right hand shall hold me. There is no space where God is not; space does not exist apart from Him. He is in heaven, in hell, beyond the seas; dwelling in all things and enveloping all. Thus He embraces, and is embraced by, the universe, confined to no part of it but pervading all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25201.html'
source_title="ON THE TRINITY 1:6"
