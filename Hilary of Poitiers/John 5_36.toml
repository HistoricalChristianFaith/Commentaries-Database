[[commentary]]
quote='''
The Son speaks thus:—For the works which the Father hath given Me to finish, the same works which I do, bear witness of Me that the Father hath sent Me; and the Father Himself which hath sent Me hath borne witness of Me. God the Only-begotten proves His Sonship by an appeal not only to the name, but to the power; the works which He does are evidence that He has been sent by the Father. What, I ask, is the fact which these works prove? That He was sent. That He was sent, is used as a proof of His sonlike obedience and of His Father's authority: for the works which He does could not possibly be done by any other than Him Who is sent by the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.27"


[[commentary]]
quote='''
(vi. de Trin. c. 27) The Only-begotten God shows Himself to be the Son, on the testimony not of man only, but of His own power. The works which He does, bear witness to His being sent from the Father. Therefore the obedience of the Son and the authority of the Father are set forth in Him who was sent.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"


[[commentary]]
quote='''
Are they blameless, in that they did not know the testimony of the Father, Who was never heard or seen amongst them, and Whose word was not abiding in them? No, for they cannot plead that His testimony was hidden from them; as Christ says, the testimony of His works is the testimony of the Father concerning Him. His works testify of Him that He was sent of the Father; but the testimony of these works is the Father's testimony; since, therefore, the working of the Son is the Father's testimony, it follows of necessity that the same nature was operative in Christ, by which the Father testifies of Him. So Christ, Who works the works, and the Father Who testifies through them, are revealed as possessing one inseparable nature through the birth, for the operation of Christ is signified to be itself the testimony of God concerning Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.20"
