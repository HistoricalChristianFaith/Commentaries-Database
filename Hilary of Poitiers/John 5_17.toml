[[commentary]]
quote='''
It is in reference to the charge of breaking the Sabbath that He says, My Father worketh hitherto, and I work. He wished them to understand that His practice was justified by Divine authority; and He taught them by the same words that His work must be regarded as the work of the Father, Who was working in Him all that He wrought. And again, it was to subdue the jealousy awakened by His speaking of God as His Father that He uttered those words, Verily, verily, I say unto you, the Son can do nothing of Himself, but what He seeth the Father do. Lest this making of Himself equal to God, as having the name and nature of God's Son, should withdraw men's faith from the truth that He had been born, He says that the Son can do nothing but what He sees the Father do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25207.html'
source_title="ON THE TRINITY 7.17"


[[commentary]]
quote='''
Their anger was so kindled against Him, that they desired to kill Him, because He did His works on the Sabbath. But let us see also what the Lord answered, My Father worketh even until now, and I work. … He speaks that we may recognise in Him the power of the Father's nature employing the nature, which has that power, to work on the Sabbath. The Father works in Him while He works; without doubt, then, He works along with the working of the Father, and therefore He says, My Father worketh even until now, that this present work of His words and actions may be regarded as the working of the Father's nature in Himself. This worketh even until now identifies the time with the moment of speaking, and therefore we must regard Him as referring to that very work of the Father's which He was then doing, for it implies the working of the Father at the very time of His words. And lest the Faith, being restricted to a knowledge of the Father only, should fall short of the hope of eternal life, He adds at once, And I work; that is, what the Father worketh even until now, the Son also worketh. Thus He expounds the whole of the faith; for the work which is now, belongs to the present time; and if the Father works, and the Son works, no union exists between them, which merges them into a single Person.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.44"
