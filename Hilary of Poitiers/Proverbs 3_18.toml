[[commentary]]
quote='''
In the book of Genesis, where the lawgiver depicts the paradise planted by God, we are shewn that every tree is fair to look upon and good for food; it is also stated that there stands in the midst of the garden a tree of Life and a tree of the knowledge of good and evil; next that the garden is watered by a stream that afterwards divides into four heads. The Prophet Solomon teaches us what this tree of Life is in his exhortation concerning Wisdom: "She is a tree of life to all them that lay hold upon her, and lean upon her." This tree then is living; and not only living, but, furthermore, guided by reason; guided by reason, that is, in so far as to yield fruit, and that not casually nor unseasonably, but in its own season. And this tree is planted beside the rills of water in the domain of the Kingdom of God, that is, of course, in Paradise, and in the place where the stream as it issues forth is divided into four heads. For he does not say, "Behind the rills of water," but, "Beside the rills of water," at the place where first the heads receive each their flow of waters. This tree is planted in that place whither the Lord, Who is Wisdom, leads the thief who confessed Him to be the Lord, saying: "Verily I say unto thee, to day shalt thou be with Me in Paradise."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FHomilies%2520on%2520the%2520Psalms%2FPsalm%25201.html'
source_title="HOMILIES ON THE PSALMS 1:14"
