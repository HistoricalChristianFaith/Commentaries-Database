[[commentary]]
quote='''
They employ the confession of One God, for which they appeal to the witness of the Law and the Gospels in the words, Hear, O Israel, the Lord thy God is One. They are well aware of the risks involved, whether their assertion be met by contradiction or passed over in silence; and, whichever happens, they see an opening to promote their heresy. If sacred truth, pressed with a blasphemous intent, be met by silence, that silence is construed as consent; as a confession that, because God is One, therefore His Son is not God, and God abides in eternal solitude.… Thus we do not contradict our authorities, but base our teaching upon them, proving that the revelation to Israel of the unity of God gives no sanction to the refusal of Divinity to the Son of God; since he who is our authority for asserting that there is One God is our authority also for confessing the Godhead of His Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25205.html'
source_title="ON THE TRINITY 5.1-2"
