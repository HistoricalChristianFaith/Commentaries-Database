[[commentary]]
quote='''
And why He thus encouraged them to pray that they might not enter into temptation, He adds, For the spirit indeed is willing, but the flesh is weak; this He says not of Himself, but addresses them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"
