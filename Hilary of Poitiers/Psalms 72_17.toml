[[commentary]]
quote='''
But He Who is before the heaven, which in your view is even before time, is also before the ages. Nor is He merely before the ages, but also before the generations of generations which precede the ages. Why do you limit things divine and infinite by what is perishable and earthly and narrow? With regard to Christ, Paul knows of nothing except an eternity of times. Wisdom does not say that it is after anything, but before everything. In your judgment the times were established by the sun and the moon; but David shews that Christ remains before the sun, saying, His name is before the sun. And lest you should think that the things of God began with the formation of this universe, he says again, And for generations of generations before the moon. These great men counted worthy of prophetic inspiration look down upon time: every opening is barred whereby human perception might penetrate behind the birth, which transcends times eternal. Yet let the faith of a devout imagination accept this as limit of its speculations, remembering that the Lord Jesus Christ, God Only-begotten, is born in a manner to be acknowledged as a perfect birth, and in the reverence paid to His divinity, not forgetting that He is eternal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252012.html'
source_title="ON THE TRINITY 12:34"
