[[commentary]]
quote='''
For when the Son says, He that hateth Me hateth My Father also, this My is the assertion of a relation to the Father which is shared by none. On the other hand, He condemns the man who claims God as his Father, and loves not the Son, as using a wrongful liberty with the Father's name; since he who hates Him, the Son, must hate the Father also, and none can be devoted to the Father save those who love the Son. For the one and only reason which He gives for loving the Son is His origin from the Father. The Son, therefore, is from the Father, not by His Advent, but by His birth; and love for the Father is only possible to those who believe that the Son is from Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.30"
