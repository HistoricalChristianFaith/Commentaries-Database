[[commentary]]
quote='''
That we may understand what was the cause of His sadness, let us see what precedes and follows this confession of sadness: for in the Passover supper our Lord completely signified the whole mystery of His Passion and our faith. After He had said that they should all be offended in Him, but promised that He would go before them into Galilee, Peter protested that though all the rest should be offended, he would remain faithful and not be offended. But the Lord knowing by His Divine Nature what should come to pass, answered that Peter would deny Him thrice: that we might know from Peter how the others were offended, since even he lapsed into so great peril to his faith by the triple denial. After that, He took Peter, James and John, chosen, the first two to be His martyrs, John to be strengthened for the proclamation of the Gospel, and declared that He was sorrowful unto death. Then He went before, and prayed, saying, "My Father, if it is possible, let this cup pass from Me; yet, not as I will, but as Thou wilt." He prays that the cup may pass from Him, when it was certainly already before Him: for even then was being fulfilled that pouring forth of His blood of the New Testament for the sins of many. He does not pray that it may not be with Him; but that it may pass away from Him. Then He prays that His will may not be done, and wills that what He wishes to be effected, may not be granted Him. For He says, "Yet not as I will, but as Thou wilt:" signifying by His spontaneous prayer for the cup's removal His fellowship with human anxiety, yet associating Himself with the decree of the Will which He shares inseparably with the Father. To shew, moreover, that He does not pray for Himself, and that He seeks only a conditional fulfilment of what He desires and prays for, He prefaces the whole of this request with the words, "My Father, if it is possible." Is there anything for the Father the possibility of which is uncertain? But if nothing is impossible to the Father, we can see on what depends this condition, "if it is possible": for this prayer is immediately followed by the words, "And He came to His disciples and findeth them sleeping, and saith to Peter, Could ye not watch one hour with Me? Watch and pray that ye enter not into temptation: for the spirit indeed is willing, but the flesh is weak." Is the cause of this sadness and this prayer any longer doubtful? He bids them watch and pray with Him for this purpose, that they may not enter into temptation; "for the spirit indeed is willing, but the flesh is weak." They were under the promise made in the constancy of faithful souls not to be offended, yet, through weakness of the flesh, they were to be offended. It is not, therefore, for Himself that He is sorrowful and prays: it is for those whom He exhorts to watchfulness and prayer, lest the cup of suffering should be their lot: lest that cup which He prays may pass away from Him, should abide with them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252010.html'
source_title="On the Trinity, Book 10.37"
