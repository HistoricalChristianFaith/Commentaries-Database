[[commentary]]
quote='''
For the Father judgeth no man, but hath given all judgment to the Son. The statement that all judgment is given teaches both His birth and His Sonship; for only a nature which is altogether one with the Father's could possess all things; and a Son can possess nothing, except by gift. But all judgment has been given Him for He quickens whom He will. Now we cannot suppose that judgment is taken away from the Father, although He does not exercise it; for the Son's whole power of judgment proceeds from the Father's, being a gift from Him. And there is no concealment of the reason why judgment has been given to the Son, for the words which follow are, But He hath given all judgment to the Son, that all men may honour the Son even as they honour the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25207.html'
source_title="ON THE TRINITY 7.20"


[[commentary]]
quote='''
(de Trin vii. c. 20) Having said that the Son quickeneth whom He will, in order that we might not lose sight of the nativity, and think that He stood upon the ground of His own unborn power, He immediately adds, For the Father judgeth no man, but hath given all judgment unto the Son. In that all judgment is given to Him, both His nature, and His nativity are shewn; because only a self-existent nature can possess all things, and nativity cannot have any thing, except what is given it.

(vii. de Trin. c. 20) All judgment is given to Him, because He quickens whom He will. Nor can the judgment be looked on as taken away from the Father, inasmuch as the cause of His not judging is, that the judgment of the Son is His. For all judgment is given from the Father. And the reason for which He gives it, appears immediately after: That all men may honour the Son even as they honour the Father.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"
