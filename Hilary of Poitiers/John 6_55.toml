[[commentary]]
quote='''
Now I ask those who bring forward a unity of will between Father and Son, whether Christ is in us to-day through verity of nature or through agreement of will. For if in truth the Word has been made flesh and we in very truth receive the Word made flesh as food from the Lord, are we not bound to believe that He abides in us naturally, Who, born as a man, has assumed the nature of our flesh now inseparable from Himself, and has conjoined the nature of His own flesh to the nature of the eternal Godhead in the sacrament by which His flesh is communicated to us? For so are we all one, because the Father is in Christ and Christ in us. Whosoever then shall deny that the Father is in Christ naturally must first deny that either he is himself in Christ naturally, or Christ in him, because the Father in Christ and Christ in us make us one in Them. Hence, if indeed Christ has taken to Himself the flesh of our body, and that Man Who was born from Mary was indeed Christ, and we indeed receive in a mystery the flesh of His body—and for this cause we shall be one, because the Father is in Him and He in us—how can a unity of will be maintained, seeing that the special property of nature received through the sacrament is the sacrament of a perfect unity? For as to what we say concerning the reality of Christ's nature within us, unless we have been taught by Him, our words are foolish and impious. For He says Himself, My flesh is meat indeed, and My blood is drink indeed. He that eateth My flesh and drinketh My blood abideth in Me, and I in him. As to the verity of the flesh and blood there is no room left for doubt. For now both from the declaration of the Lord Himself and our own faith, it is verily flesh and verily blood. And these when eaten and drunk, bring it to pass that both we are in Christ and Christ in us. Is not this true? Yet they who affirm that Christ Jesus is not truly God are welcome to find it false. He therefore Himself is in us through the flesh and we in Him, whilst together with Him our own selves are in God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.13-14"


[[commentary]]
quote='''
(vii. de Trin. c. 14) Of the truth then of the body and blood of Christ, no room for doubting remains: for, by the declaration of our Lord Himself, and by the teaching of our own faith, the flesh is really flesh, and the blood really blood. This then is our principle of life. While we are in the flesh, Christ dwelleth in us by His flesh. (c.14:19) And we shall live by Him, according as He liveth. If then we live naturally by partaking of Him according to the flesh, He also liveth naturally by the indwelling of the Father according to the Spirit. His birth did not give Him an alien or different nature from the Father.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
