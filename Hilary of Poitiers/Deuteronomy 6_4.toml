[[commentary]]
quote='''
And now let us see whether the confession of Thomas the Apostle, when he cried, My Lord and My God, corresponds with this assertion of the Evangelist. We see that he speaks of Him, Whom he confesses to be God, as My God. Now Thomas was undoubtedly familiar with those words of the Lord, Hear, O Israel, the Lord thy God is One. How then could the faith of an Apostle become so oblivious of that primary command as to confess Christ as God, when life is conditional upon the confession of the Divine unity? It was because, in the light of the Resurrection, the whole mystery of the faith had become visible to the Apostle. He had often heard such words as, I and the Father are One, and, All things that the Father hath are Mine, and, I in the Father and the Father in Me; and now he can confess that the name of God expresses the nature of Christ, without peril to the faith. Without breach of loyalty to the One God, the Father, his devotion could now regard the Son of God as God, since he believed that everything contained in the nature of the Son was truly of the same nature with the Father. No longer need he fear that such a confession as his was the proclamation of a second God, a treason against the unity of the Divine nature; for it was not a second God Whom that perfect birth of the Godhead had brought into being. Thus it was with full knowledge of the mystery of the Gospel that Thomas confessed his Lord and his God. It was not a title of honour; it was a confession of nature. He believed that Christ was God in substance and in power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25207.html'
source_title="ON THE TRINITY 7:12"
