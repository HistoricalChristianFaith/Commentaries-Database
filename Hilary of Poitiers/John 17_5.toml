[[commentary]]
quote='''
But what is this glory with the Father, for which He looks? It is that, of course, which He had with Him before the world was. He had the fulness of the Godhead; He has it still, for He is God's Son. But He Who was the Son of God had become the Son of man also, for The Word was made flesh. He had not lost His former being, but He had become what He was not before; He had not abdicated His own position, yet He had taken ours; He prays that the nature which He had assumed may be promoted to the glory which He had never renounced. Therefore, since the Son is the Word, and the Word was made flesh, and the Word was God, and was in the beginning with God, and the Word was Son before the foundation of the world; this Son, now incarnate, prayed that flesh might be to the Father what the Son had been. He prayed that flesh, born in time, might receive the splendour of the everlasting glory, that the corruption of the flesh might be swallowed up, transformed into the power of God and the purity of the Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3.16"
