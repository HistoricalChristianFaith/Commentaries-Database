[[commentary]]
quote='''
Therefore the Lord exhorts us to wait with patient and reverent faith until the end comes: Blessed is He that endureth to the end. It is not a blessed dissolution, which awaits us, nor is non-existence the fruit, and annihilation the appointed reward of faith: but the end is the final attainment of the promised blessedness, and they are blessed who endure until the goal of perfect happiness is reached, when the expectation of faithful hope has no object beyond. Their end is to abide with unbroken rest in that condition, towards which they are pressing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252011.html'
source_title="ON THE TRINITY 11.28"
