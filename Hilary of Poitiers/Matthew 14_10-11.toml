[[commentary]]
quote='''
So among the other gratifications of a debauched people the head of John is brought in in a dish, that is by the loss of the Law, the pleasures of the body, and worldly luxury is increased. It is carried by the damsel to her mother; thus depraved Israel offered up the glory of the Law to pleasure and unbelief.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
