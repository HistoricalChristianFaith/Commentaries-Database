[[commentary]]
quote='''
And how they will be so we are soon told,—And the glory which Thou hast given Me I have given unto them. Now I ask whether glory is identical with will, since will is an emotion of the mind while glory is an ornament or embellishment of nature. So then it is the glory received from the Father that the Son hath given to all who shall believe in Him, and certainly not will. Had this been given, faith would carry with it no reward, for a necessity of will attached to us would also impose faith upon us. However He has shewn what is effected by the bestowal of the glory received, "That they may be one, even as We are one." It is then with this object that the received glory was bestowed, that all might be one. So now all are one in glory, because the glory given is none other than that which was received: nor has it been given for any other cause than that all should be one. And since all are one through the glory given to the Son and by the Son bestowed upon believers, I ask how can the Son be of a different glory from the Father's, since the glory of the Son brings all that believe into the unity of the Father's glory. Now it may be that the utterance of human hope in this case may be somewhat immoderate, yet it will not be contrary to faith; for though to hope for this were presumptuous, yet not to have believed it is sinful, for we have one and the same Author both of our hope and of our faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.12"
