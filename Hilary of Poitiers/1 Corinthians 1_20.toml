[[commentary]]
quote='''
I have read, Where is the wise? Where is the enquirer of this world? In this matter, then, the world's philosophers, the wise men of paganism, are dumb: for they have rejected the wisdom of God. Shall I turn to the Scribe of the law? He is in darkness, for the Cross of Christ is an offence to him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25202.html'
source_title="ON THE TRINITY 2.12"
