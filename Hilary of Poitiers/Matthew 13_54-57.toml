[[commentary]]
quote='''
Thus the Lord is held in no honour by His own; and though the wisdom of His teaching, and the power of His working raised their admiration, yet do they not believe that He did these things in the name of the Lord, and they cast His father's trade in His teeth. Amid all the wonderful works which He did, they were moved with the contemplation of His Body, and hence they ask, Whence hath this man these things? And thus they were offended in him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
The Lord is dishonored by his own. Although his wisdom in teaching and his mighty works excited admiration, their faithlessness held them back from true discernment. For they did not believe that God was doing these things in a man. Moreover, they referred to his father, his mother, brothers and sisters and took offense at him.
'''
source_url='https://archive.org/details/commentaryonmatt0125hila/page/40/mode/2up'
source_title="Commentary on Matthew 14.2"
