[[commentary]]
quote='''
For had ye believed Moses, ye would have believed Me also, for he wrote of Me. Moses, indeed, will refute you with the whole volume of the Law, ordained through angels, which he received by the hand of the Mediator. Enquire whether He, Who gave the Law, were not true God; for the Mediator was the Giver. And was it not to meet God that Moses led out the people to the Mount? Was it not God Who came down into the Mount? Or was it, perhaps, only by a fiction or an adoption, and not by right of nature, that He, Who did all this, bore the name of God? Mark the blare of the trumpets, the flashing of the torches, the clouds of smoke, as from a furnace, rolling over the mountain, the terror of conscious impotence on the part of man in the presence of God, the confession of the people, when they prayed Moses to be their spokesman, that at the voice of God they would die. Is He, in your judgment, not true God, when simple dread lest He should speak filled Israel with the fear of death? He Whose voice could not be borne by human weakness? In your eyes is He not God, because He addressed you through the weak faculties of a man, that you might hear, and live?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25205.html'
source_title="ON THE TRINITY 5.23"
