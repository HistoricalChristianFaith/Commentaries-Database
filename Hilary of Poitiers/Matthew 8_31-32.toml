[[commentary]]
quote='''
The dæmons seeing that there is no longer any place left for them among the Gentiles, pray that they may be suffered to dwell among the heretics; these, seized by them, are drowned in the sea, that is, in worldly desires, by the instigations of the dæmons, and perish in the unbelief of the rest of the Gentiles.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"
