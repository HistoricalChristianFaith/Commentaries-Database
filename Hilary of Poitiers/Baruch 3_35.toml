[[commentary]]
quote='''
As you have listened already to Moses and Isaiah, so listen now to Jeremiah inculcating the same truth as they:—This is our God, and there shall be none other likened unto Him, Who hath found out all the way of knowledge, and hath given it unto Jacob His servant and to Israel His beloved. Afterward did He shew Himself upon earth and dwelt among men. For previously he had said, And He is Man, and Who shall know Him? Thus you have God seen on earth and dwelling among men. Now I ask you what sense you would assign to No one hath seen God at any time, save the Only-begotten Son, which is in the bosom of the Father, when Jeremiah proclaims God seen on earth and dwelling among men? The Father confessedly cannot be seen except by the Son; Who then is This who was seen and dwelt among men? He must be our God, for He is God visible in human form, Whom men can handle. And take to heart the prophet's words, There shall be none other likened to Him. If you ask how this can be, listen to the remainder of the sentence, lest you be tempted to deny to the Father His share of the confession. Hear, O Israel, the Lord thy God is One. The whole passage is, There shall be none likened unto Him, Who hath found out all the way of knowledge, and hath given it unto Jacob His servant and to Israel His beloved. Afterward did He shew Himself upon earth and dwelt among men. For there is one Mediator between God and Men, Who is both God and Man; Mediator both in giving of the Law and in taking of our body. Therefore none other can be likened unto Him, for He is One, born from God into God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25204.html'
source_title="ON THE TRINITY 4:42"
