[[commentary]]
quote='''
On the birthday, that is amidst the enjoyments of the things of the body, the daughter of Herodias danced; for pleasure, as it were springing from unbelief, was carried in its alluring course throughout the whole of Israel, and the nation bound itself thereto as by an oath, for for sin and worldly pleasures the Israelites sold the gifts of eternal life.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
