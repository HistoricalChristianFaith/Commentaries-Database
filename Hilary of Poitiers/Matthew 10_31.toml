[[commentary]]
quote='''
No accident then that can befal our bodies is to be feared; thus He adds, Fear not, ye are better than many sparrows.

Or this, ye are better than many sparrows, teaches that the elect faithful are better than the multitude of the unbelieving, for the one fall to earth, the other fly to heaven.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
