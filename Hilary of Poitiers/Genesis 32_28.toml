[[commentary]]
quote='''
Be with me now in thy faithful spirit, holy and blessed Patriarch Jacob, to combat the poisonous hissings of the serpent of unbelief. Prevail once more in thy wrestling with the Man, and, being the stronger, once more entreat His blessing. Why pray for what thou mightest demand from thy weaker Opponent? Thy strong arm has vanquished Him Whose blessing thou prayest. Thy bodily victory is in broad contrast to thy soul's humility, thy deeds to thy thoughts. It is a Man whom thou holdest powerless in thy strong grasp; but in thine eye this Man is true God, and God not in name only, but in nature. It is not the blessing of a God by adoption that thou dost claim, but the true God's blessing. With Man thou strivest; but face to face thou seest God. What thou seest with the bodily eye is different far from what thou beholdest with the vision of faith. Thou hast felt Him to be weak Man; but thy soul has been saved because it saw God in Him. When thou wast wrestling thou wast Jacob; thou art Israel now, through faith in the blessing which thou didst claim. According to the flesh, the Man is thy inferior, for a type of His passion in the flesh; but thou canst recognise God in that weak flesh, for a sign of His blessing in the Spirit. The witness of the eye does not disturb thy faith; His feebleness does not mislead thee into neglect of His blessing. Though He is Man, His humanity is no bar to His being God, His Godhead no bar to His being true God; for, being God, He must indeed be true.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25205.html'
source_title="ON THE TRINITY 5.19"
