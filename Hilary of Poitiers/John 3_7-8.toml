[[commentary]]
quote='''
For in Thy spiritual things I am dull, as Thy Only-begotten says, "Marvel not that I said unto thee, ye must be born anew. The Spirit breathes where it will, and thou hearest the voice of it; but dost not know whence it comes or whither it goes. So is every one who is born of water and of the Holy Spirit." Though I hold a belief in my regeneration, I hold it in ignorance; I possess the reality, though I comprehend it not. For my own consciousness had no part in causing this new birth, which is manifest in its effects. Moreover the Spirit has no limits; He speaks when He will, and what He will, and where He will. Since, then, the cause of His coming and going is unknown, though the watcher is conscious of the fact, shall I count the nature of the Spirit among created things, and limit Him by fixing the time of His origin?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252012.html'
source_title="ON THE TRINITY 12.56"
