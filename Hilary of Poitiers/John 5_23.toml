[[commentary]]
quote='''
It is only things of the same nature that are equal in honour; equality of honour denotes that there is no separation between the honoured. But with the revelation of the birth is combined, the demand for equality of honour. Since the Son is to be honoured as the Father, and since they seek not the honour of Him, Who is the only God, He is not excluded from the honour of the only God, for His honour is one and the same as that of God: just as He that honoureth not the Son, honoureth not the Father also, so he who seeks not the honour of the only God, seeks not the honour of Christ also. Accordingly the honour of Christ is inseparable from the honour of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.23"


[[commentary]]
quote='''
(vii. de Trin. c. 21) The conclusion then stands good against all the fury of heretical minds. He is the Son, because He does nothing of Himself: He is God, because, whatsoever things the Father doeth, He doeth the same; They are one, because They are equal in honour: He is not the Father, because He is sent.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"
