[[commentary]]
quote='''
Therefore, in the discourse we have expounded above, He had borne witness to the unity of His nature with the Father's: He that hath seen Me, hath seen the Father also: The Father is in Me, and I in the Father. These two passages perfectly agree, since Both Persons are of equal nature; to behold the Son is the same as to behold the Father; that the One abides in the One shows that They are inseparable. And lest they should misunderstand Him, as though when they beheld His body, they beheld the Father in Him, He had added, Believe Me, that I am in the Father and the Father in Me: or else believe Me for the very works' sake. His power belonged to His nature, and His working was the exercise of that power; in the exercise of that power, then, they might recognise in Him the unity with the Father's nature. In proportion as any one recognised Him to be God in the power of His nature, he would come to know God the Father, present in that mighty nature. The Son, Who is equal with the Father, shewed by His works that the Father could be seen in Him: in order that we, perceiving in the Son a nature like the Father's in its power, might know that in Father and Son there is no distinction of nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.52"


[[commentary]]
quote='''
(vii. de Trin) That the Father dwells in the Son, shows that He is not single, or solitary; that the Father works by the Son, shows that He is not different or alien. As He is not solitary who doth not speak from Himself, so neither is He alien and separable who speaketh by Him. Having shown then that the Father spoke and worked in Him, He formally states this union: Believe Me that I am in the Father, and the Father in Me: that they might not think that the Father worketh and speaketh in the Son as by a mere agent or instrument, not by the unity of nature implied in His Divine birth.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
