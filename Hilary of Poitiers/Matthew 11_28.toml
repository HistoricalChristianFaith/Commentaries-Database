[[commentary]]
quote='''
He calls to Him those that were labouring under the hardships of the Law, and those who are burdened with the sins of this world.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
