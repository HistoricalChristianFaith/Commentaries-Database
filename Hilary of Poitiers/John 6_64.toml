[[commentary]]
quote='''
Jesus Christ knows the thoughts of the mind, as it is now, stirred by present motives, and as it will be to-morrow, aroused by the impulse of future desires. Hear the witness of the Evangelist, For Jesus knew from the beginning who they were that believed not, and who it was that should betray Him. By its virtue His nature could perceive the unborn future, and foresee the awakening of passions yet dormant in the mind: do you believe that it did not know what is through itself, and within itself? He is Lord of all that belongs to others, is He not Lord of His own?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.59"
