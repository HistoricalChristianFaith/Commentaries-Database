[[commentary]]
quote='''
For Wisdom had said before, You, O men, I entreat, and I utter my voice to the sons of men. O ye simple, understand subtilty, moreover ye unlearned, apply your heart; and again, Through Me kings reign, and mighty men decree justice. Through Me princes are magnified, and through Me despots possess the earth... Wisdom is not silent about its daily work. And firstly entreating all men, it advises the simple to understand subtilty, and the unlearned to apply their heart, in order that a zealous and diligent reader may ponder the different and separate meanings of the words. And so it teaches that by its methods and ordinances all success, all attainment of knowledge or fame or wealth, is achieved: it shews that within itself are contained the reigns of kings and the prudence of the mighty, and the famous works of princes, and the justice of despots who possess the earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252012.html'
source_title="ON THE TRINITY 12:44"
