[[commentary]]
quote='''
The Lord had given sight to a man blind from his birth; the Lord of nature had removed a defect of nature. Because this blind man had been born for the glory of God, that God's work might be made manifest in the work of Christ, the Lord did not delay till the man had given evidence of his faith by a confession of it. But though he knew not at the time Who it was that had bestowed the great gift of eyesight, yet afterwards he earned a knowledge of the faith. For it was not the dispelling of his blindness that won him eternal life. And so, when the man was already healed and had suffered ejection from the synagogue, the Lord put to him the question, "Dost thou believe on the Son of God?" This was to save him from the thought of loss, in exclusion from the synagogue, by the certainty that confession of the true faith had restored him to immortality. When the man, his soul still unenlightened, made answer, "Who is He, Lord, that I may believe on Him?" The Lord's reply was, "Thou hast both seen Him, and it is He that talketh with thee." For He was minded to remove the ignorance of the man whose sight he had restored, and whom He was now enriching with the knowledge of so glorious a faith. Does the Lord demand from this man, as from others, who prayed Him to heal them, a confession of faith as the price of their recovery? Emphatically not. For the blind man could already see when he was thus addressed. The Lord asked the question in order to receive the answer, "Lord, I believe." The faith which spoke in that answer was to receive not sight, but life. And now let us examine carefully the force of the words. The Lord asks of the man, "Dost thou believe on the Son of God?" Surely, if a simple confession of Christ, leaving His nature in obscurity, were a complete expression of the faith, the terms of the question would have been, "Dost thou believe in Christ?" But in days to come almost every heretic was to make a parade of that name, confessing Christ and yet denying that He is the Son; and therefore He demands, as the condition of faith, that we should believe in what is peculiar to Himself, that is, in His Divine Sonship. What is the profit of faith in the Son of God, if it be faith in a creature, when He requires of us faith in Christ, not the creature, but the Son, of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="On the Trinity, Book 6.48"
