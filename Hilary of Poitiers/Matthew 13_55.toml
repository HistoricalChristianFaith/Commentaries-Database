[[commentary]]
quote='''
And yet some very depraved men take from this the basis of their view that there were many brothers of our Lord as a point of tradition. If there had been sons of Mary who were not rather produced from a previous marriage of Joseph's, Mary never would have been transferred to the apostle John as his mother at the time of the Passion, nor would the Lord have said to them both, "Woman, behold your son," and to John, "Behold your mother," [John 19:26-27] unless perhaps he was leaving his disciple's filial love in order to comfort her who was left behind.
'''
source_url='https://books.google.com/books?id=2398ZZ9dIQoC&lpg=PP1&dq=hilary%20Commentary%20on%20Matthew&pg=PA45#v=onepage&q&f=false'
source_title="Commentary on Matthew verse 1:4, page 45-46"

[[commentary]]
quote='''
And this was the carpenter's son who subdues iron by means of fire, who tries the virtue of this world in the judgment, and forms the rude mass to every work of human need; the figure of our bodies, for example, to the divers ministrations of the limbs, and all the actions of life eternal.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
But clearly this was the son of the carpenter who was subduing iron with fire, melting away all the might of the world with good judgment and forming the mass into every work that was humanly useful. He was molding the formless material of our bodies into members for different ministries and for every work of eternal life. They all became irritated at these things. Among the many astonishing things he did, they were most deeply moved by his contemplativeness and his bodily self-control.
'''
source_url='https://archive.org/details/commentaryonmatt0125hila/page/40/mode/2up'
source_title="Commentary on Matthew 14.2"
