[[commentary]]
quote='''
The Son of God, therefore, having the charge of mankind, was first made man, that men might believe on Him; that He might be to us a witness, sprung from ourselves, of things Divine, and preach to us, weak and carnal as we are, through the weakness of the flesh concerning God the Father, so fulfilling the Father's will, even as He says, I came not to do Mine own will, but the will of Him that sent Me. It was not that He Himself was unwilling, but that He might manifest His obedience as the result of His Father's will, for His own will is to do His Father's. This is that will to carry out the Father's will...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3.9"


[[commentary]]
quote='''
(iii. de Trin. c. 9) Not that He does what He does not wish. He fulfils obediently His Father's will, wishing also Himself to fulfil that will.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
