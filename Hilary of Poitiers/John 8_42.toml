[[commentary]]
quote='''
But let them listen to the reproof which the Son inflicts upon unbelievers for their want of this knowledge, when the Jews said that God was their Father:—If God were your Father, ye would surely love Me; for I went forth from God, and am come; neither am I come of Myself, but He sent Me. The Son of God has here no word of blame for the devout confidence of those who combine the confession that He is true God, the Son of God, with their own claim to be God's sons. What He is blaming is the insolence of the Jews in daring to claim God as their Father, when meanwhile they did not love Him, the Son:—If God were your Father, ye would surely love Me; for I went forth from God. This unbelief has no love for Christ; it is a mockery of the faith for these perverters of the truth to claim God as their Father. If He were their Father, they would love Christ because He had gone forth from God. And now I must enquire the meaning of this going forth from God. His going forth is obviously different from His coming, for the two are mentioned side by side in this passage, I went forth from God and am come. In order to elucidate the separate meanings of I went forth from God and I am come, He immediately subjoins, Neither am I come of Myself, but He sent Me. He tells us that He is not the source of His own existence in the words, Neither am I come of Myself. In them He tells us that He has proceeded forth a second time from God, and has been sent by Him. But when He tells us that they who call God their Father must love Himself because He has gone forth from God, He makes His birth the reason for their love. Went forth carries back our thoughts to the incorporeal birth, for it is by love of Christ, Who was born from Him, that we must gain the right of devoutly claiming God for our Father. For when the Son says, He that hateth Me hateth My Father also, this My is the assertion of a relation to the Father which is shared by none. On the other hand, He condemns the man who claims God as his Father, and loves not the Son, as using a wrongful liberty with the Father's name; since he who hates Him, the Son, must hate the Father also, and none can be devoted to the Father save those who love the Son. For the one and only reason which He gives for loving the Son is His origin from the Father. The Son, therefore, is from the Father, not by His Advent, but by His birth; and love for the Father is only possible to those who believe that the Son is from Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.30"


[[commentary]]
quote='''
(vi. de Trin. c. 30) It was not that the Son of God condemned the assumption of so religious a name; that is, condemned them for professing to be the sons of God, and calling God their Father; but that He blamed the rash presumption of the Jews in claiming God for their Father, when they did not love the Son. For I proceeded forth, and came from God. To proceed forth, is not the same with to come. When our Lord says that those who called God their Father, ought to love Him, because He came forth from God, He means that His being born of God was the reason why He should be loved: the proceeding forth, having reference to His incorporeal birth. Their claim to be the sons of God, was to be made good by their loving Christ, Who was begotten from God. For a true worshipper of God the Father must love the Son, as being from Godf. And he only can love the Father, who believes that the Son is from Him.

(lib. v. ibid.) In what follows, He teaches that His origin is not in Himself; Neither came I of Myself, but He sent Me.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"
