[[commentary]]
quote='''
Mystically; A sword is the sharpest of all weapons, and thence it is the emblem of the right of authority, the impartiality of justice, the correction of offenders. The word of God, we may remember, is likened to a sword; (Eph. 6:17. Heb. 4:12.) so here the sword that is sent upon the earth is His preaching poured into the heart of man.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
