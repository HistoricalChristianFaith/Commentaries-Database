[[commentary]]
quote='''
This refers to the day of judgment, which will make known the hidden conscience of our will and reveal to public knowledge those things that now seem obscure. Jesus is admonishing us, therefore, that we are not to fear our persecutors’ threats or stratagems or power, because the day of judgment will reveal that these all were nothing and empty.
'''
source_url='https://archive.org/details/commentaryonmatt0125hila/page/40/mode/2up'
source_title="Commentary on Matthew 10.16"

[[commentary]]
quote='''
Therefore neither threatening, nor evil speaking, nor power of their enemies should move them, seeing the judgment-day will disclose how empty, how nought all these were.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
