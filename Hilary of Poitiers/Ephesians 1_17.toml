[[commentary]]
quote='''
All this the Apostle confirms in one short and decisive sentence, Making mention of you in my prayers that the God of our Lord Jesus Christ, the Father of glory, may give unto you a spirit of wisdom and revelation. When he speaks of Him as Jesus Christ, he mentions His God: when his theme is the glory of Christ, he calls God His Father. To Christ, as having glory, God is Father: to Christ, as being Jesus, God is God. ... Where the glory of Christ is concerned, God is His Father; where Christ is Jesus, there the Father is His God. In the Dispensation by which He is a servant, He has as God Him Whom, in the glory by which He is God, He has as Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252011.html'
source_title="ON THE TRINITY 11.17"
