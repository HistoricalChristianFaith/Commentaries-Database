[[commentary]]
quote='''
I remember that the Apostle often refers to God the Father as raising Christ from the dead; but he is not inconsistent with himself or at variance with the Gospel faith, for the Lord Himself says:—"Therefore doth the Father love Me, because I lay down My life, that I may take it again. No one shall take it from Me, but I lay it down of Myself. I have power to lay it down, and I have power to take it again. This command have I received from the Father": and again, when asked to shew a sign concerning Himself, that they might believe in Him, He says of the Temple of His body, "Destroy this Temple, and in three days I will raise it up." By the power to take His soul again and to raise the Temple up, He declares Himself God, and the Resurrection His own work: yet He refers all to the authority of His Father's command. This is not contrary to the meaning of the Apostle, when He proclaims Christ, the "power of God and the wisdom of God," thus referring all the magnificence of His work to the glory of the Father: for whatever Christ does, the power and the wisdom of God does: and whatever the power and the wisdom of God does, without doubt God Himself does, Whose power and wisdom Christ is. So Christ was raised from the dead by the working of God; for He Himself worked the works of God the Father with a nature indistinguishable from God's. And our faith in the Resurrection rests on the God Who raised Christ from the dead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.12"
