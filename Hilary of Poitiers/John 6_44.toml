[[commentary]]
quote='''
Was the Apostle ignorant, think you, of the force of these words in the Gospel, No one cometh to Me, except the Father draw Him to Me, which stand side by side with those other words, No one cometh unto the Father but by Me... Except through Him there is no approach to the Father, but there is also no approach to Him, unless the Father draw us. Understanding Him to be the Son of God, we recognise in Him the true nature of the Father. Hence, when we learn to know the Son, God the Father calls us: when we believe the Son, God the Father receives us; for our recognition and knowledge of the Father is in the Son, Who shews us in Himself God the Father, Who draws us, if we be devout, by His fatherly love into a mutual bond with His Son. So then the Father draws us, when, as the first condition, He is acknowledged Father: but no one comes to the Father except through the Son, because we cannot know the Father, unless faith in the Son is active in us, since we cannot approach the Father in worship, unless we first adore the Son, while if we know the Son, the Father draws us to eternal life and receives us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252011.html'
source_title="ON THE TRINITY 11.33"
