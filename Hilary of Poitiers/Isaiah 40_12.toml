[[commentary]]
quote='''
For such an indication of God's infinity the words "I Am that I Am" were clearly adequate; but, in addition, we needed to apprehend the operation of His majesty and power. For while absolute existence is peculiar to Him Who, abiding eternally, had no beginning in a past however remote, we hear again an utterance worthy of Himself issuing from the eternal and Holy God, Who says, "Who holdeth the heaven in His palm and the earth in His hand," and again, "The heaven is My throne and the earth is the footstool of My feet. What house will ye build Me or what shall be the place of My rest?" The whole heaven is held in the palm of God, the whole earth grasped in His hand. Now the word of God, profitable as it is to the cursory thought of a pious mind, reveals a deeper meaning to the patient student than to the momentary hearer. For this heaven which is held in the palm of God is also His throne, and the earth which is grasped in His hand is also the footstool beneath His feet. This was not written that from throne and footstool, metaphors drawn from the posture of one sitting, we should conclude that He has extension in space, as of a body, for that which is His throne and footstool is also held in hand and palm by that infinite Omnipotence. It was written that in all born and created things God might be known within them and without, overshadowing and indwelling, surrounding all and interfused through all, since palm and hand, which hold, reveal the might of His external control, while throne and footstool, by their support of a sitter, display the subservience of outward things to One within Who, Himself outside them, encloses all in His grasp, yet dwells within the external world which is His own. In this wise does God, from within and from without, control and correspond to the universe; being infinite He is present in all things, in Him Who is infinite all are included.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25201.html'
source_title="ON THE TRINITY 1:6"
