[[commentary]]
quote='''
He says, "Father the hour is come; glorify Thy Son, that Thy Son may glorify Thee." He says that the hour, not the day nor the time, is come. An hour is a fraction of a day. What hour must this be? The hour, of course, of which He speaks, to strengthen His disciples, at the time of His passion:—"Lo, the hour is come that the Son of Man should be glorified." This then is the hour in which He prays to be glorified by the Father, that He Himself may glorify the Father. But what does He mean? Does One who is about to give glory look to receive it? Does One who is about to confer honour make request for Himself? Is He in want of the very thing which He is about to repay? The Lord had said, "Father, the hour is come;" He had revealed the hour of His passion, for these words were spoken at the very moment; and then He added, "Glorify Thy Son." But how was the Son to be glorified? He had been born of a virgin, from cradle and childhood He had grown to man's estate, through sleep and hunger and thirst and weariness and tears He had lived man's life: even now He was to be spitted on, scourged, crucified. And why? These things were ordained for our assurance that in Christ is pure man. But the shame of the cross is not ours; we are not sentenced to the scourge, nor defiled by spitting. The Father glorifies the Son; how? He is next nailed to the cross. Then what followed? The sun, instead of setting, fled. How so? It did not retire behind a cloud, but abandoned its appointed orbit, and all the elements of the world felt that same shock of the death of Christ. The stars in their courses, to avoid complicity in the crime, escaped by self-extinction from beholding the scene. What did the earth? It quivered beneath the burden of the Lord hanging on the tree, protesting that it was powerless to confine Him who was dying. Yet surely rock and stone will not refuse Him a resting-place. Yes, they are rent and cloven, and their strength fails. They must confess that the rock-hewn sepulchre cannot imprison the Body which awaits its burial.

And next? The centurion of the cohort, the guardian of the cross, cries out, "Truly this was the Son of God." Creation is set free by the mediation of this Sin-offering; the very rocks lose their solidity and strength. They who had nailed Him to the cross confess that truly this is the Son of God. The outcome justifies the assertion. The Lord had said, "Glorify Thy Son." He had asserted, by that word "Thy," that He was God's Son not in name only, but in nature. Multitudes of us are sons of God; He is Son in another sense. For He is God's true and own Son, by origin and not by adoption, not by name only but in truth, born and not created. So, after He was glorified, that confession touched the truth; the centurion confessed Him the true Son of God, that no believer might doubt a fact which even the servant of His persecutors could not deny.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3.10-11"


[[commentary]]
quote='''
But perhaps some may suppose that He was destitute of that glory for which He prayed, and that His looking to be glorified by a Greater is evidence of want of power. Who, indeed, would deny that the Father is the greater; the Unbegotten greater than the Begotten, the Father than the Son, the Sender than the Sent, He that wills than He that obeys? He Himself shall be His own witness:—"The Father is greater than I." It is a fact which we must recognise, but we must take heed lest with unskilled thinkers the majesty of the Father should obscure the glory of the Son. Such obscuration is forbidden by this same glory for which the Son prays; for the prayer, "Father glorify Thy Son," is completed by, "That the Son may glorify Thee." Thus there is no lack of power in the Son, Who, when He has received this glory, will make His return for it in glory. But why, if He were not in want, did He make the prayer? No one makes request except for something which he needs. Or can it be that the Father too is in want? Or has He given His glory away so recklessly that He needs to have it returned Him by the Son? No; the One has never been in want, nor the Other needed to ask, and yet Each shall give to the Other. Thus the prayer for glory to be given and to be paid back is neither a robbery of the Father nor a depreciation of the Son, but a demonstration of the power of one Godhead resident in Both. The Son prays that He may be glorified by the Father; the Father deems it no humiliation to be glorified by the Son. The exchange of glory given and received proclaims the unity of power in Father and in Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3.12"


[[commentary]]
quote='''
(iii. Tr. c. 10) He doth not say that the day, or the time, but that the hour is come. An hour contains a portion of a day. What was this hour? He was now to be spit upon, scourged, crucified. But the Father glorifies the Son. The sun failed in his course, and with him all the other elements felt that death. The earth trembled under the weight of our Lord hanging on the Cross, and testified that it had not power to hold within it Him who was dying. The Centurion proclaimed, Truly this was the Son of God. (Matt. 27:54) The event answered the prediction. Our Lord had said, Glorify Thy Son, testifying that He was not the Son in name only, but properly the Son. Thy Son, He saith. Many of us are sons of God; but not such is the Son. For He is the proper, true Son by nature, not by adoption, in truth, not in name, by birth, not by creation. Therefore after His glorifying, to the manifestation of the truth there succeeded confession. The Centurion confesses Him to be the true Son of God, that so none of His believers might doubt what one of His persecutors could not deny.

(iii. de. Trin) But perhaps this proves weakness in the Son; His waiting to be glorified by one superior to Himself. And who does not confess that the Father is superior, seeing that He Himself saith, The Father is greater than I? But beware lest the honour of the Father impair the glory of the Son. It follows: That Thy Son also may glorify Thee. So then the Son is not weak, inasmuch as He gives back in His turn glory for the glory which He receives. This petition for glory to be given and repaid, shows the same divinity to be in both.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title="Catena Aurea by Aquinas"
