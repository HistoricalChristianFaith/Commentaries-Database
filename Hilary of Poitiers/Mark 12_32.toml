[[commentary]]
quote='''
The answer of the Scribe seems to accord with the words of the Lord, for He too proclaims the innermost and inmost love of one God, and professes the love of one's neighbour as real as the love of self, and places love of God and love of one's neighbour above all the burnt offerings of sacrifices.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.24"
