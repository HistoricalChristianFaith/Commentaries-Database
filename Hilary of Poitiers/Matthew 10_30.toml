[[commentary]]
quote='''
For when any thing is numbered it is carefully watched over.

For it is an unworthy task to number things that are to perish. Therefore that we should know that nothing of us should perish, we are told that our very hairs are numbered.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
