[[commentary]]
quote='''
We must next ascertain what and whence this glorifying is. God, I am sure, is subject to no change; His eternity admits not of defect or amendment, of gain or of loss. It is the character of Him alone, that what He is, He is from everlasting. What He from everlasting is, it is by His nature impossible that He should ever cease to be. How then can He receive glory, a thing which He fully possesses, and of which His store does not diminish; there being no fresh glory which He can obtain, and none that He has lost and can recover? We are brought to a standstill. But the Evangelist does not fail us, though our reason has displayed its helplessness. To tell us what return of glory it was that the Son should make to the Father, he gives the words: "Even as Thou hast given Him power over all flesh, that whatsoever Thou hast given Him He may give it eternal life. And this is life eternal that they should know Thee, the only true God, and Jesus Christ Whom Thou hast sent." The Father, then, is glorified through the Son, by His being made known to us. And the glory was this, that the Son, being made flesh, received from Him power over all flesh, and the charge of restoring eternal life to us, ephemeral beings burdened with the body. Eternal life for us was the result not of work done, but of innate power; not by a new creation, but simply by knowledge of God, was the glory of that eternity to be acquired. Nothing was added to God's glory; it had not decreased, and so could not be replenished. But He is glorified through the Son in the sight of us, ignorant, exiled, defiled, dwelling in hopeless death and lawless darkness; glorified inasmuch as the Son, by virtue of that power over all flesh which the Father gave Him, was to bestow on us eternal life. It is through this work of the Son that the Father is glorified. So when the Son received all things from the Father, the Father glorified Him; and conversely, when all things were made through the Son, He glorified the Father. The return of glory given lies herein, that all the glory which the Son has is the glory of the Father, since everything He has is the Father's gift. For the glory of Him who executes a charge redounds to the glory of Him Who gave it, the glory of the Begotten to the glory of the Begetter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3.13"


[[commentary]]
quote='''
But perhaps He is weak in that He receives power over all flesh. And indeed the receiving of power might be a sign of weakness if He were not able to give to those whom He receives life eternal. Yet the very fact of receiving is used to prove inferiority of nature. It might, if Christ were not true God by birth as truly as is the Unbegotten. But if the receiving of power signifies neither more nor less than the Birth, by which He received all that He has, that gift does not degrade the Begotten, because it makes Him perfectly and entirely what God is. God Unbegotten brought God Only-begotten to a perfect birth of divine blessedness: it is, then, the mystery of the Father to be the Author of the Birth, but it is no degradation to the Son to be made the perfect image of His Author by a real birth. The giving of power over all flesh, and this, in order that to all flesh might be given eternal life, postulates the Fatherhood of the Giver and the Divinity of the Receiver: for by giving is signified that the One is the Father, and in receiving the power to give eternal life, the Other remains God the Son. All power is therefore natural and congenital to the Son of God; and though it is given, that does not separate Him from His Author, for that which is given is the property of His Author, power to bestow eternal life, to change the corruptible into the incorruptible. The Father gave all, the Son received all; as is plain from His words, "All things, whatsoever the Father hath, are Mine."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.31"


[[commentary]]
quote='''
(iii. de Trin) For being made flesh Himself, He was about to restore eternal life to frail, corporeal, and mortal man.

(ix. de Trin. 31) If Christ be God, not begotten, but unbegotten, then let this receiving be thought weakness. But not if His receiving of power signifies His begetting, in which He received what He is. This gift cannot be counted for weakness. For the Father is such in that He gives; the Son remains God in that He hath received the power of giving eternal life.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title="Catena Aurea by Aquinas"
