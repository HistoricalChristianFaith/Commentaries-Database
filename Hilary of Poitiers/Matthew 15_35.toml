[[commentary]]
quote='''
The multitudes sit down on the ground; for before they had not reposed on the works of the Law, but they had supported themselves on their own sins, as men standing on their feet.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
