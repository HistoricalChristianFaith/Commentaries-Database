[[commentary]]
quote='''
If you will not learn Who Christ is from those that know Him, learn it at least from those that know Him not. So shall the confession, which their ignorance is forced to make, rebuke your blasphemy. The Jews did not recognise Christ, come in the body, though they knew that the true Christ must be the Son of God. And so, when they were employing false witnesses, without one word of truth in their testimony, against Him, their priest asked Him, Art Thou the Christ, the Son of the Blessed? They knew not that in Him the mystery was fulfilled; they knew that the Divine nature was the condition of its fulfilment. They did not ask whether Christ be the Son of God; they asked whether He were Christ, the Son of God. They were wrong as to the Person, not as to the Sonship, of Christ. They did not doubt that Christ is the Son of God; and thus, while they asked whether He were the Christ, they asked without denying that the Christ is the Son of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.50"
