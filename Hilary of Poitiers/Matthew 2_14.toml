[[commentary]]
quote='''
Egypt full of idols; for after this enquiry for Him among the Jews, Christ leaving Judæa goes to be cherished among nations given to the vainest superstitions.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"
