[[commentary]]
quote='''
Far be it from us to imagine vicissitudes of bodily change in the Father and Son, as though the Father sometimes spoke to the Son, and sometimes was silent. We remember, indeed, that a voice was sometimes uttered from heaven for us, that the power of the Father's words might confirm for us the mystery of the Son, as the Lord says, This voice hath not come from Heaven for My sake but for your sakes. But the divine nature can dispense with the various combinations necessary for human functions, the motion of the tongue, the adjustment of the mouth, the forcing of the breath, and the vibration of the air. God is a simple Being: we must understand Him by devotion, and confess Him by reverence. He is to be worshipped, not pursued by our senses, for a conditioned and weak nature cannot grasp with the guesses of its imagination the mystery of an infinite and omnipotent nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.72"
