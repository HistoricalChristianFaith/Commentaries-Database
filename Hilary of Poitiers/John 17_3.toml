[[commentary]]
quote='''
It is clear that the truth, or genuineness, of a thing is a question of its nature and its powers. For instance, true wheat is that which grows to a head with the beard bristling round it, which is purged from the chaff and ground to flour, compounded into a loaf and taken for food, and renders the nature and the uses of bread. Thus natural powers are the evidence of truth; and let us see, by this test, whether He, Whom Moses calls God, be true God.… If all things are through Him, and all were made out of nothing, and none otherwise than through Him, in what element of true Godhead is He defective, Who possesses both the nature and the power of God? He had at His disposal the powers of the Divine nature, to bring into being the non-existent and to create at His pleasure. For God saw that they were good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25205.html'
source_title="ON THE TRINITY 5.3-4"


[[commentary]]
quote='''
But in what does eternity of life consist? His own words tell us:—That they may know Thee the only true God, and Jesus Christ Whom Thou hast sent. Is there any doubt or difficulty here, or any inconsistency? It is life to know the true God; but the bare knowledge of Him does not give it. What, then, does He add? And Jesus Christ Whom Thou hast sent. In Thee, the only true God, the Son pays the honour due to His Father; by the addition, And Jesus Christ Whom Thou hast sent, He associates Himself with the true Godhead. The believer in his confession draws no line between the Two, for his hope of life rests in Both, and indeed, the true God is inseparable from Him Whose Name follows in the creed. Therefore when we read, That they may know Thee, the only true God, and Jesus Christ Whom Thou hast sent, these terms of Sender and of Sent are not intended, under any semblance of distinction or discrimination, to convey a difference between the true Godhead of Father and of Son, but to be a guide to the devout confession of Them as Begetter and Begotten.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25203.html'
source_title="ON THE TRINITY 3.14"


[[commentary]]
quote='''
But perhaps by saying, Thee the only, Christ severs Himself from communion and unity with God? Yes, but after the words, Thee the only true God, does He not immediately continue, and Him Whom Thou didst send, even Jesus Christ? I appeal to the sense of the reader: what must we believe Christ to be, when we are commanded to believe in Him also, as well as the Father the only true God? Or, perhaps, if the Father is the only true God, there is no room for Christ to be God. It might be so, if, because there is one God the Father, Christ were not the one Lord. The fact that God the Father is one, leaves Christ none the less the one Lord: and similarly the Father's one true Godhead makes Christ none the less true God: for we can only obtain eternal life if we believe in Christ, as well as in the only true God.… But the faith of the Church, while confessing the only true God the Father, confesses Christ also. It does not confess Christ true God without the Father the only true God; nor the Father the only true God without Christ. It confesses Christ true God, because it confesses the Father the only true God. Thus the fact that God the Father is the only true God constitutes Christ also true God. The Only-begotten God suffered no change of nature by His natural birth: and He Who, according to the nature of His divine origin was born God from the living God, is, by the truth of that nature, inalienable from the only true God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.34, 36"


[[commentary]]
quote='''
(iii. de Tr. c. 14) And in what eternal life is, He then shews: And this is life eternal, that they might know Thee, the only true God. To know the only true God is life, but this alone does not constitute life. What else then is added? And Jesus Christ whom Thou hast sent.

(iv. de Tr. c. 9) The Arians hold, that as the Father is the only true, only just, only wise God, the Son hath no communion of these attributes; for that which is proper to one, cannot be partaken of by another. And as these are as they think in the Father alone, and not in the Son, they necessarily consider the Son a false and vain God.

(v. de Tr. 3) But it must be clear to every one that the reality of any thing is evidenced by its power. For that is true wheat, which when rising with grain and fenced with ears, and shaken out by the winnowing machine, and ground into corn, and baked into bread, and taken for food, fulfils the nature and function of bread. I ask then wherein the truth of Divinity is wanting to the Son, Who hath the nature and virtue of Divinity. For He so made use of the virtue of His nature, as to cause to be things which were not, and to do every thing which seemed good to Him.

(ix. de Trin) Because He says, Thee the only, does He separate Himself from communion and unity with God? He doth separate Himself, but that He adds immediately, And Jesus Christ Whom Thou hast sent. For the Catholic faith confesses Christ to be true God, in that it confesses the Father to be the only true God; for natural birth did not introduce any change of nature into the Only-Begotten God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title="Catena Aurea by Aquinas"
