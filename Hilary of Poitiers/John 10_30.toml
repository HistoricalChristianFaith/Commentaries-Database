[[commentary]]
quote='''
Now seeing that heretics cannot deny these things because they are so clearly stated and understood, they nevertheless pervert them by the most foolish and wicked lies so as afterwards to deny them. For the words of Christ, "I and the Father are one," they endeavour to refer to a mere concord of unanimity, so that there may be in them a unity of will not of nature, that is, that they may be one not by essence of being, but by identity of will. … the heretics falsely maintain that the union between Father and Son is one of will only, and make use of the example of our own union with God, as though we were trailed to the Son and through the Son to the Father by mere obedience and a devout will, and none of the natural verity of communion were vouchsafed us through the sacrament of the Body and Blood. … It is not through any mysterious appointment of God that they are one, but through a birth of nature, for God loses nothing in begetting Him from Himself. They are one, for the things which are not plucked out of His hand are not plucked out of the hand of the Father, for, when He is known, the Father is known, for, when He is seen, the Father is seen, for what He speaks the Father speaks as abiding in Him, for in His works the Father works, for He is in the Father and the Father in Him. This proceeds from no creation but from birth; it is not brought about by will but by power; it is no agreement of mind that speaks, it is nature; because to be created and to be born are not one and the same, any more than to will and to be able; neither is it the same thing to agree and to abide.
Thus we do not deny a unanimity between the Father and the Son,—for heretics are accustomed to utter this falsehood, that since we do not accept concord by itself as the bond of unity we declare Them to be at variance. But let them listen how it is that we do not deny such a unanimity. The Father and the Son are one in nature, honour, power, and the same nature cannot will things that are contrary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.5, 17-19"


[[commentary]]
quote='''
(viii. de Trin. c. 5) The heretics, since they cannot gainsay these words, endeavour by an impious lie to explain them away. They maintain that this unity is unanimity only; a unity of will, not of nature; i. e. that the two are one, not in that they are the same, but in that they will the same. But they are one, not by any economy merely, but by the nativity of the Son's nature, since there is no falling off of the Father's divinity in begetting Him. They are one whilst the sheep that are not plucked out of the Son's hand, are not plucked out of the Father's hand: whilst in Him working, the Father worketh; whilst He is in the Father, and the Father in Him. This unity, not creation but nativity, not will but power, not unanimity but nature accomplisheth. But we deny not therefore the unanimity of the Father and Son; for the heretics, because we refuse to admit concord in the place of unity, accuse us of making a disagreement between the Father and Son. We deny not unanimity, but we place it on the ground of unity. The Father and Son are one in respect of nature, honour, and virtue: and the same nature cannot will different things.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
