[[commentary]]
quote='''
To this the Lord's words bear witness;—I will not say unto you that I will pray the Father for you, for the Father Himself loveth you, because ye have loved Me, and believe that I went forth from God, and am come from the Father into this world. A complete faith concerning the Son, which accepts and loves the truth that He went forth from God, has access to the Father without need of His intervention. The confession that the Son was born and sent from God wins for it direct audience and love from Him. Thus the narrative of His birth and coming must be taken in the strictest and most literal sense. I went forth from God, He says, conveying that His nature is exactly that which was given Him by His birth; for what being but God could go forth from God, that is, could enter upon existence by birth from Him? Then He continues, And am come from the Father into this world. To assure us that this going forth from God means birth from the Father, He tells us that He came from the Father into this world. The latter statement refers to His incarnation, the former to His nature. And again, His putting on record first the fact of His going forth from God, and then His coming from the Father, forbids us to identify the going with the coming. Coming from the Father, and going forth from God, are not synonymous; they might be paraphrased as `Birth' and `Presence,' and are as different in meaning as these. It is one thing to have gone forth from God, and entered by birth upon a substantial existence; another to have come from the Father into this world to accomplish the mysteries of our salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.31"


[[commentary]]
quote='''
(vi. de. Trin. c. 31) Perfect faith in the Son, which believes and loves what has come forth from God, and deserveth to be heard and loved for its own sake, this faith confessing the Son of God, born from Him, and sent by Him, needeth not an intercessor with the Father: wherefore it follows, And have believed that I came forth from God. His nativity and advent are signified by, I came forth from the Father, and am come into the world. The one is dispensation, the other nature. To have come from the Father, and to have come forth from God, have not the same meaning; because it is one thing to have come forth from God in the relation of Sonship, another thing to have come from the Father into this world to accomplish the mystery of our salvation. Since to come forth from God is to subsist as His Son, what else can He be but God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"
