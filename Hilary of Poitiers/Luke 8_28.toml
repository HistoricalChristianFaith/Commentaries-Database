[[commentary]]
quote='''
Did devils fail to understand the full meaning of this name of Son? For we are valuing the heretics at their true worth if we refute them no longer by the teaching of Apostles, but out of the mouth of devils. They cry, and cry often, What have I to do with Thee, Jesus, Thou Son of God most High? Truth wrung this confession from them against their will; their reluctant obedience is a witness to the force of the Divine nature within Him. When they fly from the bodies they have long possessed, it is His might that conquers them; their confession of His nature is an act of reverence. These transactions display Christ as the Son of God both in power and in name. Can you hear, amid all these cries of devils confessing Him, Christ once styled a creature, or God's condescension in adopting Him once named?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.49"
