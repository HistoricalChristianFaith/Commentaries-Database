[[commentary]]
quote='''
For heaven and earth have in their constitution no necessity of existence, but Christ's words derived from eternity have in them such virtue that they must needs abide.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252024.html'
source_title="Catena Aurea by Aquinas"
