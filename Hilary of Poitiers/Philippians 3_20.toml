[[commentary]]
quote='''
Similarly, as a deterrent, the Apostle warns us of the end of the wicked, "Whose end is perdition, . . . . . but our expectation is in heaven." Suppose then we interpret the end as a dissolution, we are forced to acknowledge that, since there is an end for the blessed and for the wicked, the issue levels the godly with the ungodly, for the appointed end of both is a common annihilation. What of our expectation in heaven, if for us as well as for the wicked the end is a cessation of being? But even if there remains for the saints an expectation, whereas for the wicked there waits the end they have deserved, we cannot conceive that end as a final dissolution. What punishment would it be for the wicked to be beyond the feeling of avenging torments, because the capability of suffering has been removed by dissolution? The end is, therefore, a culminating and irrevocable condition which awaits us, reserved for the blessed and prepared for the wicked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252011.html'
source_title="ON THE TRINITY 11.28"
