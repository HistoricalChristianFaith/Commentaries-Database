[[commentary]]
quote='''
As regards His being in the form of God, by virtue of God's seal upon Him, he still remained God. But inasmuch as He was to take the form of a servant and become obedient unto death, not grasping at His equality with God, He emptied Himself through obedience to take the form of a slave. And He emptied Himself of the form of God, that is, of that wherein He was equal with God—not that He regarded His equality with God as any encroachment,—although He was in the form of God and equal with God and sealed by God as God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.45"

[[commentary]]
quote='''
Christ abode in the form of God when He assumed the form of a servant, not being subjected to change, but emptying Himself; hiding within Himself, and remaining master of Himself though He was emptied. He constrained Himself even to the form and fashion of a man, lest the weakness of the assumed humility should not be able to endure the immeasurable power of His nature. His unbounded might contracted itself, until it could fulfil the duty of obedience even to the endurance of the body to which it was yoked. But since He was self-contained even when He emptied Himself, His authority suffered no diminution, for in the humiliation of the emptying He exercised within Himself the power of that authority which was emptied.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252011.html'
source_title="ON THE TRINITY 11.48"


[[commentary]]
quote='''
Put in the dispensation of the flesh which He assumed, and through the obedience whereby He emptied Himself of the form of God, Christ, born man, took to Himself a new nature, not by loss of virtue or nature but by change of fashion. He emptied Himself of the form of God and took the form of a servant, when He was born. But the Father's nature, with which He was in natural unity, was not affected by this assumption of flesh; while Christ, though abiding in the virtue of His nature, yet in respect of the humanity assumed in this temporal change, lost together with the form of God the unity with the divine nature also. But the Incarnation is summed up in this, that the whole Son, that is, His manhood as well as His divinity, was permitted by the Father's gracious favour to continue in the unity of the Father's nature, and retained not only the powers of the divine nature, but also that nature's self. For the object to be gained was that man might become God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.38"
