[[commentary]]
quote='''
And in like manner the Son Himself teaches us, in words of His own, that He was truly born and truly came;—Ye neither know Me, nor know ye whence I am, for I am not come of Myself, but He that sent Me is true, Whom ye know not, but I know Him, for I am from Him, and He hath sent Me. No man knows the Father; the Son often assures us of this. The reason why He says that none knows Him but Himself, is that He is from the Father. Is it, I ask, as the result of an act of creation, or of a genuine birth, that He is from Him? If it be an act of creation, then all created things are from God. How then is it that none of them know the Father, when the Son says that the reason why He has this knowledge is that He is from Him? If He be created, not born, we shall observe in Him a resemblance to other beings who are from God. Since all, on this supposition, are from God, why is He not as ignorant of the Father as are the others? But if this knowledge of the Father be peculiar to Him, Who is from the Father, must not this circumstance also, that He is from the Father, be peculiar to Him? That is, must He not be the true Son born from the nature of God? For the reason why He alone knows God is that He alone is from God. You observe, then, a knowledge, which is peculiar to Himself, resulting from a birth which also is peculiar to Himself. You recognise that it is not by an act of creative power, but through a true birth, that He is from the Father; and that this is why He alone knows the Father, Who is unknown to all other beings which are from Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.28"


[[commentary]]
quote='''
(de Trin. ult. med.) Every man, ever born in the flesh, is in a certain sense from God. How then could He say that they were ignorant who He was, and whence He wasa? Because our Lord is here referring to His own peculiar birth from God, which they were ignorant of, because they did not know that He was the Son of God. His very saying then that they did not know whence He was, was telling them whence He was. If they did not know whence He was, He could not be from nothing; for then there would be no whence to be ignorant of. He must therefore be from God. And then not knowing whence He is, was the reason that they did not know who He is. He does not know the Son who does not know His birth from the Father.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title="Catena Aurea by Aquinas"
