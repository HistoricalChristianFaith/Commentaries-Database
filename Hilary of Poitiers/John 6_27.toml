[[commentary]]
quote='''
Therefore after this manifold and precise revelation of the presence of the Father's nature in Himself, He goes on to say, For Him hath the Father sealed, even God. It is the nature of a seal to exhibit the whole form of the figure graven upon it, and that an impression taken from it reproduces it in every respect; and since it receives the whole of that which is impressed, it displays also in itself wholly whoever has been impressed upon it. Yet this comparison is not adequate to exemplify the Divine birth, because in seals there is a matter, difference of nature, and an act of impression, whereby the likeness of stronger natures is impressed upon things of a more yielding nature. But the Only-begotten God, Who was also through the Mystery of our salvation the Son of Man, desiring to point out to us the likeness of His Father's proper nature in Himself, said that He was sealed by God; because the Son of Man was about to give the food of eternal life, and that we thereby might perceive in Him the power of giving food unto eternity, in that He possessed within Himself all the fulness of His Father's form, even of the God Who sealed Him: so that what God had sealed should display in itself none other than the form of the God Who sealed it. These things indeed the Lord spoke to the Jews, who could not receive His saying because of unbelief. But in us the preacher of the Gospel by the Spirit of Christ Who spoke through him, instils the knowledge of this His proper nature when he says, Who, being in the form of God, thought it not a thing to grasp at that He was equal with God, but emptied Himself, taking the form of a servant. For He, Whom God had sealed, could be naught else than the form of God, and that which has been sealed in the form of God must needs present at the same time imaged forth within itself all that God possesses. And for this cause the Apostle taught that He Whom God sealed is God abiding in the form of God. As regards His being in the form of God, by virtue of God's seal upon Him, He still remained God. But inasmuch as He was to take the form of a servant and become obedient unto death, not grasping at His equality with God, He emptied Himself through obedience to take the form of a slave. And He emptied Himself of the form of God, that is, of that wherein He was equal with God—not that He regarded His equality with God as any encroachment,—although He was in the form of God and equal with God and sealed by God as God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25208.html'
source_title="ON THE TRINITY 8.44-45"


[[commentary]]
quote='''
(viii. de Trin. c. 44) A seal throws out a perfect impression of the stamp, at the same time that it takes in that impression. This is not a perfect illustration of the Divine nativity: for sealing supposes matter, different kinds of matter, the impression of harder upon softer. Yet He who was God Only-Begotten, and the Son of man only by the Sacrament of our salvation, makes use of it to express the Father's fulness as stamped upon Himself. He wishes to show the Jews He has the power of giving the eternal meat, because He contained in Himself the fulness of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"
