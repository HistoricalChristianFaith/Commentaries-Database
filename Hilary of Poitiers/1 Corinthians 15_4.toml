[[commentary]]
quote='''
He says, For I delivered unto you first of all how that Christ died for our sins, according to the Scriptures, and that He was buried, and that He rose again the third day according to the Scriptures. This is no unsupported statement of his own, which might lead to error, but a warning to us to confess that Christ died and rose after a real manner, not a nominal, since the fact is certified by the full weight of Scripture authority; and that we must understand His death in that exact sense in which Scripture declares it. In his regard for the perplexities and scruples of the weak and sensitive believer, he adds these solemn concluding words, according to the Scriptures, to his proclamation of the death and the resurrection. He would not have us grow weaker, driven about by every wind of vain doctrine, or vexed by empty subtleties and false doubts: he would summon faith to return, before it were shipwrecked, to the haven of piety, believing and confessing the death and resurrection of Jesus Christ, Son of Man and Son of God, according to the Scriptures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252010.html'
source_title="ON THE TRINITY 10.67"
