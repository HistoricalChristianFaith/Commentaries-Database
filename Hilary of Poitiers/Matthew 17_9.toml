[[commentary]]
quote='''
He enjoins silence respecting what they had seen, for this reason, that when they should be filled with the Holy Spirit, they should then become witnesses of these spiritual deeds.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252017.html'
source_title="Catena Aurea by Aquinas"
