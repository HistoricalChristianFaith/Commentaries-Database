[[commentary]]
quote='''
He is not subject to the laws of nature, for nature has received its law from Him: He never suffers weakness or change when He acts, for His power is boundless, as the Lord said, Father, all things are possible unto Thee. He can do more than human sense can conceive. The Lord does not deprive even Himself of the quality of omnipotence, for He says, What things soever the Father doeth, these the Son also doeth in like manner. Nothing is difficult, when there is no weakness; for only a power which is weak to effect, knows the need of effort. The cause of difficulty is the weakness of the motive force; a force of limitless power rises above the conditions of impotence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25209.html'
source_title="ON THE TRINITY 9.72"

[[commentary]]
quote='''
And the reason He prayed that the cup might be removed from Him, if that were possible, was that, though with God nothing is impossible, as Christ Himself says, Father, all things are possible to Thee, yet for man it is impossible to withstand the fear of suffering, and only by trial can faith be proved. Wherefore, as Man He prays for men that the cup may pass away, but as God from God, His will is in unison with the Father's effectual will.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252010.html'
source_title="ON THE TRINITY 10.38"

[[commentary]]
quote='''
Again, He does not pray that the cup may pass over Himself, but that it may pass away from Himself, though before it could pass away He must have drunk it. But, further, 'to pass away' does not mean merely 'to leave the place,' but 'not to exist any more at all:' which is shewn in the language of the Gospels and Epistles: for example, Heaven and earth shall pass away, but My word shall not perish: also the Apostle says, Behold the old things are passed away; they are become new. And again, The fashion of this world shall pass away. The cup, therefore, of which He prays to the Father, cannot pass away unless it be drunk.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252010.html'
source_title="ON THE TRINITY 10.42"


[[commentary]]
quote='''
Although He humbled Himself, His nature knew no humiliation: though He was obedient, it was a voluntary obedience, for He became obedient by humbling Himself. The Only-begotten God humbled Himself, and obeyed His Father even to the death of the Cross: but as what, as man or as God, is He to be subjected to the Father, when all things have been subjected to Him? Of a truth this subjection is no sign of a fresh obedience, but the Dispensation of the Mystery, for the allegiance is eternal, the subjection an event within time. The subjection is then in its signification simply a demonstration of the Mystery.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252011.html'
source_title="ON THE TRINITY 11.30"
