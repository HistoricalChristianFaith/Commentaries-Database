[[commentary]]
quote='''
Mystically; Neither did the preaching of John bend the Jews, to whom the law seemed burdensome in prescribing meats and drinks, difficult and grievous, having in it sin which He calls having a dæmon—for from the difficulty of keeping it they must sin under the Law.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
