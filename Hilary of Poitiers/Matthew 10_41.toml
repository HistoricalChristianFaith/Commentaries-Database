[[commentary]]
quote='''
Or; Seeing beforehand that there would be many who would only glory in the name of Apostleship, but in their whole life and walk would be unworthy of it, He does not therefore deprive of its reward that service which might be rendered to them in belief of their religious life.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
