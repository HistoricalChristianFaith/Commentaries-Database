[[commentary]]
quote='''
If you will not learn Who Christ is from those that know Him, learn it at least from those that know Him not. So shall the confession, which their ignorance is forced to make, rebuke your blasphemy.… Mark the fellowship with Jewish wickedness in which your denial of the Divine Sonship has involved you! For they have put on record the reason of their condemnation:—And by our Law He ought to die, because He made Himself the Son of God. Is not this the same charge which you are blasphemously bringing against Him, that, while you pronounce Him a creature, He calls Himself the Son? He confesses Himself the Son, and they declare Him guilty of death: you too deny that He is the Son of God. What sentence do you pass upon Him? You have the same repugnance to His claim as had the Jews. You agree with their verdict; I want to know whether you will quarrel about the sentence. Your offence, in denying that He is the Son of God, is exactly the same as theirs, though their guilt is less, for they sinned in ignorance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%25206.html'
source_title="ON THE TRINITY 6.50"
