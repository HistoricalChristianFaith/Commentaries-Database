[[commentary]]
quote='''
He does not lack things that are of Him and through Him and in Him. The Source and Maker of all, Who contains all, Who is beyond all, does not need that which is within Him, the Creator His creatures, the Possessor His possessions. Nothing is prior to Him, nothing derived from any other than Him, nothing beyond Him. What element of fulness is still lacking in God, which time will supply to make Him all in all? Whence can He receive it, if outside Him is nothing, and while nothing is outside Him, He is eternally Himself? And if He is eternally Himself, and there is nothing outside Him, with what increase shall He be made full, by what addition shall He be made other than He is? Did He not say, I am and I change not? What possibility is there of change in Him? What scope for progress? What is prior to eternity? What more divine than God? The subjection of the Son will not therefore make God to be all in all, nor will any cause perfect Him, from Whom and through Whom and in Whom are all causes. He remains God as He ever was, and He needs nothing further, for what He is, He is eternally of Himself and for Himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Hilary%2520of%2520Poitiers%2FOn%2520the%2520Trinity%2FBook%252011.html'
source_title="ON THE TRINITY 11:47"
