[[commentary]]
quote='''
There are four spiritual creatures which were composed of four faces, which typify the coming of the Messiah. One had the face of a man, because the Messiah was born a man in Bethlehem, as Matthew teaches. One had the face of a lion, as Mark proclaims him coming up from the Jordan, a lion king, as also somewhere it is written: "The Lord has come up as a lion from the Jordan." One had the face of an ox, as Luke proclaims----not he alone, but also the other Evangelists----him who, at the appointed time of the ninth hour, like an ox in behalf of the world was offered up on the cross. One had the face of an eagle, as John proclaims the Word who came from heaven and was made flesh and flew to heaven like an eagle after the resurrection with the Godhead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Epiphanius%2520of%2520Salamis%2FWeights%2520and%2520Measures%2FEnglish%2520translation.html'
source_title="ON WEIGHTS AND MEASURES 1:8-10"
