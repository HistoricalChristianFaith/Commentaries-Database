[[commentary]]
quote='''
"And we went forth, and saw before the entrance Optatus the bishop at the right hand, and Aspasius the presbyter, a teacher, at the left hand, separate and sad; and they cast themselves at our feet, and said to us, `Restore peace between us, because you have gone forth and have left us thus.' And we said to them, `Art not thou our father, and thou our presbyter, that you should cast yourselves at our feet?' And we prostrated ourselves, and we embraced them; and Perpetua began to speak with them, and we drew them apart in the pleasure-garden under a rose-tree. And while we were speaking with them, the angels said unto them, `Let them alone, that they may refresh themselves; and if you have any dissensions between you, forgive one another.' And they drove them away. And they said to Optatus, `Rebuke thy people, because they assemble to you as if returning from the circus, and contending about factious matters.'"
'''
source_url="https://historicalchristian.faith/by_father.php?file=Passion%2520of%2520Saints%2520Perpetua%2520and%2520Felicity%2FThe%2520Passion%2520of%2520the%2520Holy%2520Martyrs%2520Perpetua%2520and%2520Felicitas.html"
source_title="The Passion of the Holy Martyrs Perpetua and Felicitas"
