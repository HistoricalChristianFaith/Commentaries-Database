[[commentary]]
quote='''
I saw Dinocrates going out from a gloomy place, where also there were several others, and he was parched and very thirsty, with a filthy countenance and pallid colour, and the wound on his face which he had when he died. This Dinocrates had been my brother after the flesh, seven years of age, who died miserably with disease-his face being so eaten out with cancer, that his death caused repugnance to all men. For him I had made my prayer, and between him and me there was a large interval, so that neither of us could approach to the other. And moreover, in the same place where Dinocrates was, there was a pool full of water, having its brink higher than was the stature of the boy; and Dinocrates raised himself up as if to drink. And I was grieved that, although that pool held water, still, on account of the height to its brink, he could not drink.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Passion%2520of%2520Saints%2520Perpetua%2520and%2520Felicity%2FThe%2520Passion%2520of%2520the%2520Holy%2520Martyrs%2520Perpetua%2520and%2520Felicitas.html"
source_title="The Passion of the Holy Martyrs Perpetua and Felicitas"
