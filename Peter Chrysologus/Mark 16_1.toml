[[commentary]]
quote='''
The women were first to honor the risen Christ, the apostles first to suffer for him. The women were ready with spices; the apostles prepared for scourges. The women entered the tomb; the apostles would soon enter the dungeon. The women hastened to express their eulogy; the apostles embraced chains for his sake. The women poured oils; the apostles poured out their blood.
'''
source_url=''
source_title="SERMON 79"


[[commentary]]
quote='''
(occ. ap. Chrysologum, serm. 82) The women in this place run abroad with womanly devotion, for they do not bring Him faith as though He were alive, but ointments as to one dead; and they prepare the service of their grief for Him as buried, not the joys of heavenly triumph for Him as risen.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
