[[commentary]]
quote='''
(Serm. 80.) Thus all nations are created a second time to salvation by that one and the same Power, which created them to being.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252028.html'
source_title='Catena Aurea by Aquinas'
