[[commentary]]
quote='''
(Chrysologus ubi sup.) It is said also in a marked manner, that they said nothing to any one, because it is the part of women to hear, and not to speak, to learn, not to teach.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
