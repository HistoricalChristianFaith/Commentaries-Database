[[commentary]]
quote='''
(Serm. 80.) The Son of God conveyed to the Son of the Virgin, the God to the Man, the Deity to the Flesh, that which He had ever together with the Father.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252028.html'
source_title='Catena Aurea by Aquinas'
