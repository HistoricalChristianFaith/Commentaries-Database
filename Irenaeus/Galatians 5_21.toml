[[commentary]]
quote='''
But as to themselves, they hold that they shall be entirely and undoubtedly saved, not by means of conduct, but because they are spiritual by nature. For, just as it is impossible that material substance should partake of salvation (since, indeed, they maintain that it is incapable of receiving it), so again it is impossible that spiritual substance (by which they mean themselves) should ever come under the power of corruption, whatever the sort of actions in which they indulged. For even as gold, when submersed in filth, loses not on that account its beauty, but retains its own native qualities, the filth having no power to injure the gold, so they affirm that they cannot in any measure suffer hurt, or lose their spiritual substance, whatever the material actions in which they may be involved. Wherefore also it comes to pass, that the "most perfect" among them addict themselves without fear to all those kinds of forbidden deeds of which the Scriptures assure us that "they who do such things shall not inherit the kingdom of God." For instance, they make no scruple about eating meats offered in sacrifice to idols, imagining that they can in this way contract no defilement. Then, again, at every heathen festival celebrated in honour of the idols, these men are the first to assemble; and to such a pitch do they go, that some of them do not even keep away from that bloody spectacle hateful both to God and men, in which gladiators either fight with wild beasts, or singly encounter one another. Others of them yield themselves up to the lusts of the flesh with the utmost greediness, maintaining that carnal things should be allowed to the carnal nature, while spiritual things are provided for the spiritual.
'''
source_title="Against Heresies Book I"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
append_to_author_name="(Reporting Heretical Practices)"
