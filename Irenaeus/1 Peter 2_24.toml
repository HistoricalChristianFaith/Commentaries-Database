[[commentary]]
quote='''
"And he mounted upon his ass." The ass was the type of the body of Christ, upon whom all men, resting from their labours, are borne as in a chariot. For the Saviour has taken up the burden of our sins. Now the angel who appeared to Balaam was the Word Himself; and in His hand He held a sword, to indicate the power which He had from above.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FFragments%2520from%2520the%2520Lost%2520Writings%2520of%2520Irenaeus.html"
source_title="Fragments from the Lost Writings of Irenaeus"
