[[commentary]]
quote='''
Now in the last days, when the fulness of the time of liberty had arrived, the Word Himself did by Himself "wash away the filth of the daughters of Zion," when He washed the disciples' feet with His own hands. For this is the end of the human race inheriting God; that as in the beginning, by means of our first [parents], we were all brought into bondage, by being made subject to death; so at last, by means of the New Man, all who from the beginning [were His] disciples, having been cleansed and washed from things pertaining to death, should come to the life of God. For He who washed the feet of the disciples sanctified the entire body, and rendered it clean. For this reason, too, He administered food to them in a recumbent posture, indicating that those who were lying in the earth were they to whom He came to impart life. As Jeremiah declares, "The holy Lord remembered His dead Israel, who slept in the land of sepulture; and He descended to them to make known to them His salvation, that they might be saved."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4.22.1"
