[[commentary]]
quote='''
But what Isaiah said, "From the height above, or from the depth beneath," was meant to indicate, that "He who descended was the same also who ascended."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
Learn then, ye foolish men, that Jesus who suffered for us, and who dwelt among us, is Himself the Word of God. For if any other of the Aeons had become flesh for our salvation, it would have been probable that the apostle spoke of another. But if the Word of the Father who descended is the same also that ascended, He, namely, the Only-begotten Son of the only God, who, according to the good pleasure of the Father, became flesh for the sake of men, the apostle certainly does not speak regarding any other, or concerning any Ogdoad, but respecting our Lord Jesus Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"