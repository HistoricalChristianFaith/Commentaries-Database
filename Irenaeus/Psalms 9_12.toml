[[commentary]]
quote='''
For He promised to confess before His Father those who should confess His name before men; but declared that He would deny those who should deny Him, and would be ashamed of those who should be ashamed to confess Him. And although these things are so, some of these men have proceeded to such a degree of temerity, that they even pour contempt upon the martyrs, and vituperate those who are slain on account of the confession of the Lord, and who suffer all things predicted by the Lord, and who in this respect strive to follow the footprints of the Lord's passion, having become martyrs of the suffering One; these we do also enrol with the martyrs themselves. For, when inquisition shall be made for their blood, and they shall attain to glory, then all shall be confounded by Christ, who have cast a slur upon their martyrdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="AGAINST HERESIES 3:18.5"
