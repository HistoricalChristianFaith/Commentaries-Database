[[commentary]]
quote='''
That he uses these words with respect to the body of flesh, and to none other, he declares to the Corinthians manifestly, indubitably, and free from all ambiguity: "Always bearing about in our body the dying of Jesus, that also the life of Jesus Christ might be manifested in our body. For if we who live are delivered unto death for Jesus' sake, it is that the life of Jesus may also be manifested in our mortal flesh."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
