[[commentary]]
quote='''
For Matthew the apostle-knowing, as one and the same God, Him who had given promise to Abraham, that He would make his seed as the stars of heaven, and Him who, by His Son Christ Jesus, has called us to the knowledge of Himself, from the worship of stones, so that those who were not a people were made a people, and she beloved who was not beloved-declares that John, when preparing the way for Christ, said to those who were boasting of their relationship [to Abraham] according to the flesh, but who had their mind tinged and stuffed with all manner of evil, preaching that repentance which should call them back from their evil doings, said, "O generation of vipers, who hath shown you to flee from the wrath to come? Bring forth therefore fruit meet for repentance. And think not to say within yourselves, We have Abraham [to our] father: for I say unto you, that God is able of these stones to raise up children unto Abraham." He preached to them, therefore, the repentance from wickedness, but he did not declare to them another God, besides Him who made the promise to Abraham...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
For this reason did Hosea the prophet take "a wife of whoredoms," prophesying by means of the action, "that in committing fornication the earth should fornicate from the Lord," that is, the men who are upon the earth; and from men of this stamp it will be God's good pleasure to take out a Church which shall be sanctified by fellowship with His Son, just as that woman was sanctified by intercourse with the prophet. And for this reason, Paul declares that the "unbelieving wife is sanctified by the believing husband." Then again, the prophet names his children, "Not having obtained mercy," and "Not a people," in order that, as says the apostle, "what was not a people may become a people; and she who did not obtain mercy may obtain mercy. And it shall come to pass, that in the place where it was said, This is not a people, there shall they be called the children of the living God." That which had been done typically through his actions by the prophet, the apostle proves to have been done truly by Christ in the Church.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
