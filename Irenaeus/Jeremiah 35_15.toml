[[commentary]]
quote='''
Now, by these words of His, does the Lord clearly show all these points, that there is one King and Lord, the Father of all, of whom He had previously said, "Neither shalt thou swear by Jerusalem, for it is the city of the great King;" and that He had from the beginning prepared the marriage for His Son, and used, with the utmost kindness, to call, by the instrumentality of His servants, the men of the former dispensation to the wedding feast; and when they would not obey, He still invited them by sending out other servants, yet that even then they did not obey Him, but even stoned and slew those who brought them the message of invitation. He accordingly sent forth His armies and destroyed them, and burned down their city; but He called together from all the highways, that is, from all nations, guests to the marriage feast of His Son, as also He says by Jeremiah: "I have sent also unto you my servants the prophets to say, Return ye now, every man, from his very evil way, and amend your doings." And again He says by the same prophet: "I have also sent unto you my servants the prophets throughout the day and before the light; yet they did not obey me, nor incline their ears unto me. And thou shall speak this word to them: This is a people that obeyeth not the voice of the Lord, nor receiveth correction; faith has perished from their mouth." The Lord, therefore, who has called us everywhere by the apostles, is He who called those of old by the prophets, as appears by the words of the Lord; and although they preached to various nations, the prophets were not from one God, and the apostles from another; but, proceeding from one and the same, some of them announced the Lord, others preached the Father, and others again foretold the advent of the Son of God, while yet others declared Him as already present to those who then were afar off.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:36.5"
