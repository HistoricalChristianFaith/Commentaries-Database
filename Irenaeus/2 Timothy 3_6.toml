[[commentary]]
quote='''
Such are the words and deeds by which, in our own district of the Rhone, they have deluded many women, who have their consciences seared as with a hot iron. Some of them, indeed, make a public confession of their sins; but others of them are ashamed to do this, and in a tacit kind of way, despairing of [attaining to] the life of God, have, some of them, apostatized altogether; while others hesitate between the two courses, and incur that which is implied in the proverb, "neither without nor within;" possessing this as the fruit from the seed of the children of knowledge.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"


[[commentary]]
quote='''
Some of his disciples, too, addicting themselves to the same practices, have deceived many silly women, and defiled them. They proclaim themselves as being "perfect," so that no one can be compared to them with respect to the immensity of their knowledge, nor even were you to mention Paul or Peter, or any other of the apostles. They assert that they themselves know more than all others, and that they alone have imbibed the greatness of the knowledge of that power which is unspeakable. They also maintain that they have attained to a height above all power, and that therefore they are free in every respect to act as they please, having no one to fear in anything.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html'
source_title="Against Heresies Book I"
