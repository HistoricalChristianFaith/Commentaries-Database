[[commentary]]
quote='''
How, then, shall he be a God, who has not as yet been made a man? Or how can he be perfect who was but lately created? How, again, can he be immortal, who in his mortal nature did not obey his Maker? For it must be that thou, at the outset, shouldest hold the rank of a man, and then afterwards partake of the glory of God. For thou dost not make God, but God thee. If, then, thou art God's workmanship, await the hand of thy Maker which creates everything in due time; in due time as far as thou art concerned, whose creation is being carried out. Offer to Him thy heart in a soft and tractable state, and preserve the form in which the Creator has fashioned thee, having moisture in thyself, lest, by becoming hardened, thou lose the impressions of His fingers. But by preserving the framework thou shalt ascend to that which is perfect, for the moist clay which is in thee is hidden [there] by the workmanship of God. His hand fashioned thy substance; He will cover thee over [too] within and without with pure gold and silver, and He will adorn thee to such a degree, that even "the King Himself shall have pleasure in thy beauty." But if thou, being obstinately hardened, dost reject the operation of His skill, and show thyself ungrateful towards Him, because thou weft created a [mere] man, by becoming thus ungrateful to God, thou hast at once lost both His workmanship and life. For creation is an attribute of the goodness of God but to be created is that of human nature. If then, thou shalt deliver up to Him what is thine that is, faith towards Him and subjection, thou shalt receive His handiwork, and shall be a perfect work of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:39.2"
