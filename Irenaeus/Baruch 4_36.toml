[[commentary]]
quote='''
Jeremiah the prophet has pointed out, that as many believers as God has prepared for this purpose, to multiply those left upon earth, should both be under the rule of the saints to minister to this Jerusalem, and that [His] kingdom shall be in it, saying, "Look around Jerusalem towards the east, and behold the joy which comes to thee from God Himself. Behold, thy sons shall come whom thou hast sent forth: they shall come in a band from the east even unto the west, by the word of that Holy One, rejoicing in that splendour which is from thy God. O Jerusalem, put off thy robe of mourning and of affliction, and put on that beauty of eternal splendour from thy God. Gird thyself with the double garment of that righteousness proceeding from thy God; place the mitre of eternal glory upon thine head. For God will show thy glory to the whole earth under heaven. For thy name shall for ever be called by God Himself, the peace of righteousness and glory to him that worships God. Arise, Jerusalem, stand on high, and look towards the east, and behold thy sons from the rising of the sun, even to the west, by the Word of that Holy One, rejoicing in the very remembrance of God. For the footmen have gone forth from thee, while they were drawn away by the enemy. God shall bring them in to thee, being borne with glory as the throne of a kingdom. For God has decreed that every high mountain shall be brought low, and the eternal hills, and that the valleys be filled, so that the surface of the earth be rendered smooth, that Israel, the glory of God, may walk in safety. The woods, too, shall make shady places, and every sweet-smelling tree shall be for Israel itself by the command of God. For God shall go before with joy in the light of His splendour, with the pity and righteousness which proceeds from Him."

Now all these things being such as they are, cannot be understood in reference to super-celestial matters; "for God," it is said, "will show to the whole earth that is under heaven thy glory." But in the times of the kingdom, the earth has been called again by Christ [to its pristine condition], and Jerusalem rebuilt after the pattern of the Jerusalem above, of which the prophet Isaiah says, "Behold, I have depicted thy walls upon my hands, and thou art always in my sight," And the apostle, too, writing to the Galatians, says in like manner, "But the Jerusalem which is above is free, which is the mother of us all."...John, the Lord's disciple, says that the new Jerusalem above shall [then] descend, as a bride adorned for her husband; and that this is the tabernacle of God, in which God will dwell with men. Of this Jerusalem the former one is an image-that Jerusalem of the former earth in which the righteous are disciplined beforehand for incorruption and prepared for salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="Against Heresies 5.35.1-2"
