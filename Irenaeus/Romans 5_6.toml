[[commentary]]
quote='''
But again, showing that Christ did suffer, and was Himself the Son of God, who died for us, and redeemed us with His blood at the time appointed beforehand, he says: "For how is it, that Christ, when we were yet without strength, in due time died for the ungodly? But God commendeth His love towards us, in that, while we were yet sinners, Christ died for us. Much more, then, being now justified by His blood, we shall be saved from wrath through Him. For if, when we were enemies, we were reconciled to God by the death of His Son; much more, being reconciled, we shall be saved by His life." He declares in the plainest manner, that the same Being who was laid hold of, and underwent suffering, and shed His blood for us, was both Christ and the Son of God, who did also rise again, and was taken up into heaven...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
