[[commentary]]
quote='''
But as for us, we still dwell upon the earth, and have not yet sat down upon His throne. For although the Spirit of the Saviour that is in Him "searcheth all things, even the deep things of God," yet as to us "there are diversities of gifts, differences of administrations, and diversities of operations;" and we, while upon the earth, as Paul also declares, "know in part, and prophesy in part." Since, therefore, we know but in part, we ought to leave all sorts of [difficult] questions in the hands of Him who in some measure, [and that only, ] bestows grace on us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"

[[commentary]]
quote='''
But if any lover of strife contradict what I have said, and also what the apostle affirms, that "we know in part, and prophesy in part," and imagine that he has acquired not a partial, but a universal, knowledge of all that exists,-being such an one as Valentinus, or Ptolemaeus, or Basilides, or any other of those who maintain that they have searched out the deep things of God,-let him not (arraying himself in vainglory) boast that he has acquired greater knowledge than others with respect to those things which are invisible, or cannot be placed under our observation; but let him, by making diligent inquiry, and obtaining information from the Father, tell us the reasons (which we know not) of those things which are in this world,-as, for instance, the number of hairs on his own head, and the sparrows which are captured day by day, and such other points with which we are not previously acquainted,-so that we may credit him also with respect to more important points. But if those who are perfect do not yet understand the very things in their hands, and at their feet, and before their eyes, and on the earth, and especially the rule followed with respect to the hairs of their head, how can we believe them regarding things spiritual, and super-celestial, and those which, with a vain confidence, they assert to be above God?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"

[[commentary]]
quote='''
"It is sown an animal body, it rises a spiritual body." He has taught, beyond all doubt, that such language was not used by him, either with reference to the soul or to the spirit, but to bodies that have become corpses. For these are animal bodies, that is, [bodies] which partake of life, which when they have lost, they succumb to death; then, rising through the Spirit's instrumentality, they become spiritual bodies, so that by the Spirit they possess a perpetual life. "For now," he says, "we know in part, and we prophesy in part, but then face to face." And this it is which has been said also by Peter: "Whom having not seen, ye love; in whom now also, not seeing, ye believe; and believing, ye shall rejoice with joy unspeakable." For our face shall see the face of the Lord and shall rejoice with joy unspeakable,-that is to say, when it shall behold its own Delight.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
