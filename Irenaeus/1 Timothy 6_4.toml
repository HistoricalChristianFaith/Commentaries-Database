[[commentary]]
quote = '''
True knowledge, then, consists in the understanding of Christ, which Paul terms the wisdom of God hidden in a mystery, which "the natural man receiveth not," the doctrine of the cross; of which if any man "taste," he will not accede to the disputations and quibbles of proud and puffed-up men, who go into matters of which they have no perception. For the truth is unsophisticated; and "the word is nigh thee, in thy mouth and in thy heart," as the same apostle declares, being easy of comprehension to those who are obedient. For it renders us like to Christ, if we experience "the power of his resurrection and the fellowship of His sufferings." For this is the affinity of the apostolical teaching and the most holy "faith delivered unto us," which the unlearned receive, and those of slender knowledge have taught, not "giving heed to endless genealogies," but studying rather [to observe] a straightforward course of life; lest, having been deprived of the Divine Spirit, they fail to attain to the kingdom of heaven. For truly the first thing is to deny one's self and to follow Christ; and those who do this are borne onward to perfection, having fulfilled all their Teacher's will, becoming sons of God by spiritual regeneration, and heirs of the kingdom of heaven; those who seek which first shall not be forsaken.
'''
source_title="Fragments from the Lost Writings of Irenaeus"
source_url = "https://historicalchristian.faith/by_father.php?file=Irenaeus%2FFragments%2520from%2520the%2520Lost%2520Writings%2520of%2520Irenaeus.html"

[[commentary]]
quote = '''
And that the whole range of the doctrine of the apostles proclaimed one and the same God, who removed Abraham, who made to him the promise of inheritance, who in due season gave to him the covenant of circumcision, who called his descendants out of Egypt, preserved outwardly by circumcision-for he gave it as a sign, that they might not be like the Egyptians-that He was the Maker of all things, that He was the Father of our Lord Jesus Christ, that He was the God of glory,-they who wish may learn from the very words and acts of the apostles, and may contemplate the fact that this God is one, above whom is no other. But even if there were another god above Him, we should say, upon [instituting] a comparison of the quantity [of the work done by each], that the latter is superior to the former. For by deeds the better man appears, as I have already remarked; and, inasmuch as these men have no works of their father to adduce, the latter is shown to be God alone. But if any one, "doting about questions," do imagine that what the apostles have declared about God should be allegorized, let him consider my previous statements, in which I set forth one God as the Founder and Maker of all things, and destroyed and laid bare their allegations; and he shall find them agreeable to the doctrine of the apostles, and so to maintain what they used to teach, and were persuaded of, that there is one God, the Maker of all things. And when he shall have divested his mind of such error, and of that blasphemy against God which it implies, he will of himself find reason to acknowledge that both the Mosaic law and the grace of the new covenant, as both fitted for the times [at which they were given], were bestowed by one and the same God for the benefit of the human race.
'''
source_title="Against Heresies Book 3"
source_url = "https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
