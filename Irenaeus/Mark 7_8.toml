[[commentary]]
quote='''
For the tradition of the elders themselves, which they pretended to observe from the law, was contrary to the law given by Moses. Wherefore also Esaias declares: "Thy dealers mix the wine with water," showing that the elders were in the habit of mingling a watered tradition with the simple command of God; that is, they set up a spurious law, and one contrary to the [true] law; as also the Lord made plain, when He said to them, "Why do ye transgress the commandment of God, for the sake of your tradition?" For not only by actual transgression did they set the law of God at nought, mingling the wine with water; but they also set up their own law in opposition to it, which is termed, even to the present day, the pharisaical. In this [law] they suppress certain things, add others, and interpret others, again, as they think proper, which their teachers use, each one in particular; and desiring to uphold these traditions, they were unwilling to be subject to the law of God, which prepares them for the coming of Christ. But they did even blame the Lord for healing on the Sabbath-days, which, as I have already observed, the law did not prohibit. For they did themselves, in one sense, perform acts of healing upon the Sabbath-day, when they circumcised a man [on that day]; but they did not blame themselves for transgressing the command of God through tradition and the aforesaid pharisaical law, and for not keeping the commandment of the law, which is the love of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="Against Heresies Book 4"
