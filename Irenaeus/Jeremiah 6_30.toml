[[commentary]]
quote='''
And again in like manner does Jeremiah speak: "I set watchmen over you; hearken to the sound of the trumpet; and they said, We will not hearken. Therefore have the Gentiles heard, and they who feed the flocks in them." It is therefore one and the same Father who planted the vineyard, who led forth the people, who sent the prophets, who sent His own Son, and who gave the vineyard to those other husbandmen that render the fruits in their season.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:36.2"
