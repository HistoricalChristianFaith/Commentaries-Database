[[commentary]]
quote='''
And they teach that He pointed out the three kinds of men as follows: the material, when He said to him that asked Him, "Shall I follow Thee?" "The Son of man hath not where to lay His head;"-the animal, when He said to him that declared, "I will follow Thee, but suffer me first to bid them farewell that are in my house," "No man, putting his hand to the plough, and looking back, is fit for the kingdom of heaven" (for this man they declare to be of the intermediate class, even as they do that other who, though he professed to have wrought a large amount of righteousness, yet refused to follow Him, and was so overcome by [the love of] riches, as never to reach perfection)-this one it pleases them to place in the animal class;-the spiritual, again, when He said, "Let the dead bury their dead, but go thou and preach the kingdom of God," and when He said to Zaccheus the publican, "Make haste, and come down, for to-day I must abide in thine house"-for these they declared to have belonged to the spiritual class.
'''
source_title="Against Heresies (Book I, Chapter 8), Section 3"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
append_to_author_name="(Reporting Valentinian Views)"
