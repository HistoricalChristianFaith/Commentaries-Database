[[commentary]]
quote='''
It appears probable enough that this man possesses a demon as his familiar spirit, by means of whom he seems able to prophesy, and also enables as many as he counts worthy to be partakers of his Charis themselves to prophesy. ... But such spirits as are commanded by these men, and speak when they desire it, are earthly and weak, audacious and impudent, sent forth by Satan for the seduction and perdition of those who do not hold fast that well-compacted faith which they received at first through the Church.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
