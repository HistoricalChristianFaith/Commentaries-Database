[[commentary]]
quote='''
It appears probable enough that this man possesses a demon as his familiar spirit, by means of whom he seems able to prophesy, and also enables as many as he counts worthy to be partakers of his Charis themselves to prophesy. He devotes himself especially to women, and those such as are well-bred, and elegantly attired, and of great wealth, whom he frequently seeks to draw after him... On the woman replying, "I have never at any time prophesied, nor do I know how to prophesy;" then engaging, for the second time, in certain invocations, so as to astound his deluded victim, he says to her, "Open thy mouth, speak whatsoever occurs to thee, and thou shalt prophesy." She then, vainly puffed up and elated by these words, and greatly excited in soul by the expectation that it is herself who is to prophesy, her heart beating violently [from emotion], reaches the requisite pitch of audacity, and idly as well as impudently utters some nonsense as it happens to occur to her, such as might be expected from one heated by an empty spirit. (Referring to this, one superior to me has observed, that the soul is both audacious and impudent when heated with empty air.) ... But already some of the most faithful women, possessed of the fear of God, and not being deceived (whom, nevertheless, he did his best to seduce like the rest by bidding them prophesy), abhorring and execrating him, have withdrawn from such a vile company of revellers. This they have done, as being well aware that the gift of prophecy is not conferred on men by Marcus, the magician, but that only those to whom God sends His grace from above possess the divinely-bestowed power of prophesying; and then they speak where and when God pleases, and not when Marcus orders them to do so. For that which commands is greater and of higher authority than that which is commanded, inasmuch as the former rules, while the latter is in a state of subjection. If, then, Marcus, or any one else, does command,-as these are accustomed continually at their feasts to play at drawing lots, and [in accordance with the lot] to command one another to prophesy, giving forth as oracles what is in harmony with their own desires,-it will follow that he who commands is greater and of higher authority than the prophetic spirit, though he is but a man, which is impossible. But such spirits as are commanded by these men, and speak when they desire it, are earthly and weak, audacious and impudent, sent forth by Satan for the seduction and perdition of those who do not hold fast that well-compacted faith which they received at first through the Church.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
