[[commentary]]
quote='''
For it was not because He was angry, like a man, as many venture to say, that He rejected their sacrifices; but out of compassion to their blindness, and with the view of suggesting to them the true sacrifice, by offering which they shall appease God, that they may receive life from Him. As He elsewhere declares: "The sacrifice to God is an afflicted heart: a sweet savour to God is a heart glorifying Him who formed it." For if, when angry, He had repudiated these sacrifices of theirs, as if they were persons unworthy to obtain His compassion, He would not certainly have urged these same things upon them as those by which they might be saved. But inasmuch as God is merciful, He did not cut them off from good counsel. For after He had said by Jeremiah, "To what purpose bring ye Me incense from Saba, and cinnamon from a far country? Your whole burnt-offerings and sacrifices are not acceptable to Me;" He proceeds: "Hear the word of the Lord, all Judah. These things saith the Lord, the God of Israel, Make straight your ways and your doings, and I will establish you in this place. Put not your trust in lying words, for they will not at all profit you, saying, The temple of the Lord, The temple of the Lord, it is here."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:17.2"
