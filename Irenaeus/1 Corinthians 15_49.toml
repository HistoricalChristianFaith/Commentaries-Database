[[commentary]]
quote='''
The flesh, therefore, when destitute of the Spirit of God, is dead, not having life, and cannot possess the kingdom of God: [it is as] irrational blood, like water poured out upon the ground. And therefore he says, "As is the earthy, such are they that are earthy." But where the Spirit of the Father is, there is a living man; [there is] the rational blood preserved by God for the avenging [of those that shed it]; [there is] the flesh possessed by the Spirit, forgetful indeed of what belongs to it, and adopting the quality of the Spirit, being made conformable to the Word of God. And on this account he (the apostle) declares, "As we have borne the image of him who is of the earth, we shall also bear the image of Him who is from heaven." What, therefore, is the earthly? That which was fashioned. And what is the heavenly? The Spirit. As therefore he says, when we were destitute of the celestial Spirit, we walked in former times in the oldness of the flesh, not obeying God; so now let us, receiving the Spirit, walk in newness of life, obeying God. Inasmuch, therefore, as without the Spirit of God we cannot be saved, the apostle exhorts us through faith and chaste conversation to preserve the Spirit of God, lest, having become non-participators of the Divine Spirit, we lose the kingdom of heaven; and he exclaims, that flesh in itself, and blood, cannot possess the kingdom God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"

[[commentary]]
quote='''
Since, therefore, in that passage he recounts those works of the flesh which are without the Spirit, which bring death [upon their doers], he exclaimed at the end of his Epistle, in accordance with what he had already declared, "And as we have borne the image of him who is of the earth, we shall also bear the image of Him who is from heaven. For this I say, brethren, that flesh and blood cannot inherit the kingdom of God." Now this which he says, "as we have borne the image of him who is of the earth," is analogous to what has been declared, "And such indeed ye were; but ye have been washed, but ye have been sanctified, but ye have been justified in the name of our Lord Jesus Christ, and in the Spirit of our God." When, therefore, did we bear the image of him who is of the earth? Doubtless it was when those actions spoken of as "works of the flesh" used to be wrought in us. And then, again, when [do we bear] the image of the heavenly? Doubtless when he says, "Ye have been washed," believing in the name of the Lord, and receiving His Spirit. Now we have washed away, not the substance of our body, nor the image of our [primary] formation, but the former vain conversation. In these members, therefore, in which we were going to destruction by working the works of corruption, in these very members are we made alive by working the works of the Spirit.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
