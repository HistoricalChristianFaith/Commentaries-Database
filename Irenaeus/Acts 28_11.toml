[[commentary]]
quote='''
And all the remaining [details] of his course with Paul he recounts, indicating with all diligence both places, and cities, and number of days, until they went up to Jerusalem; and what befell Paul there, how he was sent to Rome in bonds; the name of the centurion who took him in charge; and the signs of the ships, and how they made shipwreck; and the island upon which they escaped, and how they received kindness there, Paul healing the chief man of that island; and how they sailed from thence to Puteoli, and from that arrived at Rome; and for what period they sojourned at Rome. As Luke was present at all these occurrences, he carefully noted them down in writing, so that he cannot be convicted of falsehood or boastfulness, because all these [particulars] proved both that he was senior to all those who now teach otherwise, and that he was not ignorant of the truth.
'''
source_title="Against Heresies Book III"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
