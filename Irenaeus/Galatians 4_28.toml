[[commentary]]
quote='''
Now, this Jesus did by drawing us off from the religion of stones, and bringing us over from hard and fruitless cogitations, and establishing in us a faith like to Abraham. As Paul does also testify, saying that we are children of Abraham because of the similarity of our faith, and the promise of inheritance.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
For his seed is the Church, which receives the adoption to God through the Lord, as John the Baptist said: "For God is able from the stones to raise up children to Abraham." Thus also the apostle says in the Epistle to the Galatians: "But ye, brethren, as Isaac was, are the children of the promise." And again, in the same Epistle, he plainly declares that they who have believed in Christ do receive Christ, the promise to Abraham thus saying, "The promises were spoken to Abraham, and to his seed. Now He does not say, And of seeds, as if [He spake] of many, but as of one, And to thy seed, which is Christ."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
