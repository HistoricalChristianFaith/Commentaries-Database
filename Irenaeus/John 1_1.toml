[[commentary]]
quote='''
The disciple of the Lord therefore desiring to put an end to all such doctrines, and to establish the rule of truth in the Church, that there is one Almighty God, who made all things by His Word, both visible and invisible; showing at the same time, that by the Word, through whom God made the creation, He also bestowed salvation on the men included in the creation; thus commenced His teaching in the Gospel: "In the beginning was the Word, and the Word was with God, and the Word was God. The same was in the beginning with God. All things were made by Him, and without Him was nothing made. What was made was life in Him, and the life was the light of men. And the light shineth in darkness, and the darkness comprehended it not." "All things," he says, "were made by Him;" therefore in "all things" this creation of ours is [included], for we cannot concede to these men that [the words] "all things" are spoken in reference to those within their Pleroma.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Irenaeus Against Heresies Book 3"

[[commentary]]
quote='''
For that according to John relates His original, effectual, and glorious generation from the Father, thus declaring, "In the beginning was the Word, and the Word was with God, and the Word was God." Also, "all things were made by Him, and without Him was nothing made." For this reason, too, is that Gospel full of all confidence, for such is His person.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Irenaeus Against Heresies Book 3"
