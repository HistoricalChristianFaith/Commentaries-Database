[[commentary]]
quote='''
This is the mystery which he says was made known to him by revelation, that He who suffered under Pontius Pilate, the same is Lord of all, and King, and God, and Judge, receiving power from Him who is the God of all, because He became "obedient unto death, even the death of the cross." And inasmuch as this is true, when [preaching to the Athenians on the Areopagus-where, no Jews being present, he had it in his power to preach God with freedom of speech-he said to them: "God, who made the world, and all things therein, He, being Lord of heaven and earth, dwelleth not in temples made with hands; neither is He touched by men's hands, as though He needed anything, seeing He giveth to all life, and breath, and all things; who hath made from one blood the whole race of men to dwell upon the face of the whole earth, predetermining the times according to the boundary of their habitation, to seek the Deity, if by any means they might be able to track Him out, or find Him, although He be not far from each of us. For in Him we live, and move, and have our being, as certain men of your own have said, For we are also His offspring. Inasmuch, then, as we are the offspring of God, we ought not to think that the Deity is like unto gold or silver, or stone graven by art or man's device. Therefore God, winking at the times of ignorance, does now command all men everywhere to turn to Him with repentance; because He hath appointed a day, on which the world shall be judged in righteousness by the man Jesus; whereof He hath given assurance by raising, Him from the dead." Now in this passage he does not only declare to them God as the Creator of the world, no Jews being present, but that He did also make one race of men to dwell upon all the earth; as also Moses declared: "When the Most High divided the nations, as He scattered the sons of Adam, He set the bounds of the nations after the number of the angels of God;" but that people which believes in God is not now under the power of angels, but under the Lord's [rule]. "For His people Jacob was made the portion of the Lord, Israel the cord of His inheritance."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
