[[commentary]]
quote='''
If therefore the great God showed future things by Daniel, and confirmed them by His Son; and if Christ is the stone which is cut out without hands, who shall destroy temporal kingdoms, and introduce an eternal one, which is the resurrection of the just; as he declares, "The God of heaven shall raise up a kingdom which shall never be destroyed,"-let those thus confuted come to their senses, who reject the Creator (Demiurgum), and do not agree that the prophets were sent beforehand from the same Father from whom also the Lord came, but who assert that prophecies originated from diverse powers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="AGAINST HERESIES 5:26.2"
