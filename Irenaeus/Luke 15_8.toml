[[commentary]]
quote='''
The woman, again, who sweeps the house and finds the piece of money, they declare to denote the Sophia above, who, having lost her enthymesis, afterwards recovered it, on all things being purified by the advent of the Saviour. Wherefore this substance also, according to them, was reinstated in Pleroma.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
append_to_author_name="(Reporting Valentinian Views)"

[[commentary]]
quote='''
And for this reason, because an error occurred in connection with the twelfth number, the sheep frisked off, and went astray; for they assert that a defection took place from the Duodecad. In the same way they oracularly declare, that one power having departed also from the Duodecad, has perished; and this was represented by the woman who lost the drachma, and, lighting a lamp, again found it. Thus, therefore, the numbers that were left, viz., nine, as respects the pieces of money, and eleven in regard to the sheep, when multiplied together, give birth to the number ninety-nine, for nine times eleven are ninety-nine.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
append_to_author_name="(Reporting Marcosian Views)"
