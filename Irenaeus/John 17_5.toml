[[commentary]]
quote='''
In the beginning, therefore, did God form Adam, not as if He stood in need of man, but that He might have [some one] upon whom to confer His benefits. For not alone antecedently to Adam, but also before all creation, the Word glorified His Father, remaining in Him; and was Himself glorified by the Father, as He did Himself declare, "Father, glorify Thou Me with the glory which I had with Thee before the world was." Nor did He stand in need of our service when He ordered us to follow Him; but He thus bestowed salvation upon ourselves. For to follow the Saviour is to be a partaker of salvation, and to follow light is to receive light.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Irenaeus Against Heresies Book 4"
