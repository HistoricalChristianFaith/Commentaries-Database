[[commentary]]
quote='''
In the beginning, therefore, did God form Adam, not as if He stood in need of man, but that He might have [some one] upon whom to confer His benefits. For not alone antecedently to Adam, but also before all creation, the Word glorified His Father, remaining in Him; and was Himself glorified by the Father, as He did Himself declare, "Father, glorify Thou Me with the glory which I had with Thee before the world was." Nor did He stand in need of our service when He ordered us to follow Him; but He thus bestowed salvation upon ourselves. For to follow the Saviour is to be a partaker of salvation, and to follow light is to receive light. But those who are in light do not themselves illumine the light, but are illumined and revealed by it: they do certainly contribute nothing to it, but, receiving the benefit, they are illumined by the light. Thus, also, service [rendered] to God does indeed profit God nothing, nor has God need of human obedience; but He grants to those who follow and serve Him life and incorruption and eternal glory, bestowing benefit upon those who serve [Him], because they do serve Him, and on His followers, because they do follow Him; but does not receive any benefit from them: for He is rich, perfect, and in need of nothing.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies 4.14.1"
