[[commentary]]
quote='''
Thus it was, too, that God formed man at the first, because of His munificence; but chose the patriarchs for the sake of their salvation; and prepared a people beforehand, teaching the headstrong to follow God; and raised up prophets upon earth, accustoming man to bear His Spirit [within him], and to hold communion with God: He Himself, indeed, having need of nothing, but granting communion with Himself to those who stood in need of it, and sketching out, like an architect, the plan of salvation to those that pleased Him. And He did Himself furnish guidance to those who beheld Him not in Egypt, while to those who became unruly in the desert He promulgated a law very suitable [to their condition]. Then, on the people who entered into the good land He bestowed a noble inheritance; and He killed the fatted calf for those converted to the Father, and presented them with the finest robe. Thus, in a variety of ways, He adjusted the human race to an agreement with salvation. On this account also does John declare in the Apocalypse, "And His voice as the sound of many waters." For the Spirit [of God] is truly [like] many waters, since the Father is both rich and great. And the Word, passing through all those [men], did liberally confer benefits upon His subjects, by drawing up in writing a law adapted and applicable to every class [among them].
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="Against Heresies Book IV"
