[[commentary]]
quote='''
Let our opponents—that is, they who speak against their own salvation—inform us [as to this point]: The deceased daughter of the high priest; the widow's dead son, who was being carried out [to burial] near the gate [of the city]; and Lazarus, who had lain four days in the tomb,—in what bodies did they rise again? In those same, no doubt, in which they had also died. For if it were not in the very same, then certainly those same individuals who had died did not rise again. For [the Scripture] says, "The Lord took the hand of the dead man, and said to him, Young man, I say unto thee, Arise. And the dead man sat up, and He commanded that something should be given him to eat; and He delivered him to his mother." Again, He called Lazarus "with a loud voice, saying, Lazarus, come forth; and he that was dead came forth bound with bandages, feet and hands." This was symbolical of that man who had been bound in sins. And therefore the Lord said, "Loose him, and let him depart." As, therefore, those who were healed were made whole in those members which had in times past been afflicted; and the dead rose in the identical bodies, their limbs and bodies receiving health, and that life which was granted by the Lord, who prefigures eternal things by temporal, and shows that it is He who is Himself able to extend both healing and life to His handiwork, that His words concerning its [future] resurrection may also be believed; so also at the end, when the Lord utters His voice "by the last trumpet," the dead shall be raised, as He Himself declares: "The hour shall come, in which all the dead which are in the tombs shall hear the voice of the Son of man, and shall come forth; those that have done good to the resurrection of life, and those that have done evil to the resurrection of judgment."
'''
source_title="Against Heresies (Book V, Chapter 13)"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
