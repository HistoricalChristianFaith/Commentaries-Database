[[commentary]]
quote='''
How, then, could the fruit of ignorance and defect sustain Him who contains the knowledge of all things, and is true and perfect? Or how could that creation which was concealed from the Father, and far removed from Him, have sustained His Word? And if this world were made by the angels (it matters not whether we suppose their ignorance or their cognizance of the Supreme God), when the Lord declared, "For I am in the Father, and the Father in Me," how could this workmanship of the angels have borne to be burdened at once with the Father and the Son? How, again, could that creation which is beyond the Pleroma have contained Him who contains the entire Pleroma? Inasmuch, then, as all these things are impossible and incapable of proof, that preaching of the Church is alone true [which proclaims] that His own creation bare Him, which subsists by the power, the skill, and the wisdom of God; which is sustained, indeed, after an invisible manner by the Father, but, on the contrary, after a visible manner it bore His Word: and this is the true [Word].
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies (Book V, Chapter 18), Section 1"
