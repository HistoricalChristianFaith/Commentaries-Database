[[commentary]]
quote='''
From all these passages are revealed to us, not merely the particulars of the apostasy, and [the doings] of him who concentrates in himself every satanic error, but also, that there is one and the same God the Father, who was declared by the prophets, but made manifest by Christ. For if what Daniel prophesied concerning the end has been confirmed by the Lord, when He said, "When ye shall see the abomination of desolation, which has been spoken of by Daniel the prophet" (and the angel Gabriel gave the interpretation of the visions to Daniel, and he is the archangel of the Creator (Demiurgi), who also proclaimed to Mary the visible coming and the incarnation of Christ), then one and the same God is most manifestly pointed out, who sent the prophets, and made promise of the Son, and called us into His knowledge.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="AGAINST HERESIES 5:25.5"
