[[commentary]]
quote='''
They affirm that the Lord came in the last times of the world to endure suffering, for this end, that He might indicate the passion which occurred to the last of the Aeons, and might by His own end announce the cessation of that disturbance which had risen among the Aeons. They maintain, further, that that girl of twelve years old, the daughter of the ruler of the synagogue, to whom the Lord approached and raised her from the dead, was a type of Achamoth, to whom their Christ, by extending himself, imparted shape, and whom he led anew to the perception of that light which had forsaken her. And that the Saviour appeared to her when she lay outside of the Pleroma as a kind of abortion, they affirm Paul to have declared in his Epistle to the Corinthians [in these words], "And last of all, He appeared to me also, as to one born out of due time." Again, the coming of the Saviour with His attendants to Achamoth is declared in like manner by him in the same Epistle, when he says, "A woman ought to have a veil upon her head, because of the angels."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies (Book I, Chapter 8)"
append_to_author_name="(Reporting Valentinian Views)"
