[[commentary]]
quote='''
Concurring with these statements, Paul, speaking to the Romans, declares: "Much more they who receive abundance of grace and righteousness for [eternal] life, shall reign by one, Christ Jesus." It follows from this, that he knew nothing of that Christ who flew away from Jesus; nor did he of the Saviour above, whom they hold to be impassible. For if, in truth, the one suffered, and the other remained incapable of suffering, and the one was born, but the other descended upon him who was born, and left him gain, it is not one, but two, that are shown forth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
