[[commentary]]
quote='''
Now Adam had been conquered, all life having been taken away from him: wherefore, when the foe was conquered in his turn, Adam received new life; and the last enemy, death, is destroyed, which at the first had taken possession of man. Therefore, when man has been liberated, "what is written shall come to pass, Death is swallowed up in victory. O death, where is thy sting?" This could not be said with justice, if that man, over whom death did first obtain dominion, were not set free. For his salvation is death's destruction. When therefore the Lord vivifies man, that is, Adam, death is at the same time destroyed.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
