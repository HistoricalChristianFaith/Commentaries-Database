[[commentary]]
quote='''
If, again, they maintain that the twelve apostles were a type only of that group of twelve Aeons which Anthropos in conjunction with Ecclesia produced, then let them produce ten other apostles as a type of those ten remaining Aeons, who, as they declare, were produced by Logos and Zoe. For it is unreasonable to suppose that the junior, and for that reason inferior Aeons, were set forth by the Saviour through the election of the apostles, while their seniors, and on this account their superiors, were not thus foreshown; since the Saviour (if, that is to say, He chose the apostles with this view, that by means of them He might show forth the Aeons who are in the Pleroma) might have chosen other ten apostles also, and likewise other eight before these, that thus He might set forth the original and primary Ogdoad. He could not, in regard to the second [Duo] Decad, show forth [any emblem of it] through the number of the apostles being [already] constituted a type. For [He made choice of no such other number of disciples; but] after the twelve apostles, our Lord is found to have sent seventy others before Him. Now seventy cannot possibly be the type either of an Ogdoad, a Decad, or a Triacontad. What is the reason, then, that the inferior Aeons are, as I have said, represented by means of the apostles; but the superior, from whom, too, the former derived their being, are not prefigured at all? But if the twelve apostles were chosen with this object, that the number of the twelve Aeons might be indicated by means of them, then the seventy also ought to have been chosen to be the type of seventy Aeons; and in that case, they must affirm that the Aeons are no longer thirty, but eighty-two in number. For He who made choice of the apostles, that they might be a type of those Aeons existing in the Pleroma, would never have constituted them types of some and not of others; but by means of the apostles He would have tried to preserve an image and to exhibit a type of those Aeons that exist in the Pleroma.
'''
source_title="Irenaeus Against Heresies Book 2"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
