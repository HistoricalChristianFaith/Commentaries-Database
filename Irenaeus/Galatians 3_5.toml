[[commentary]]
quote='''
But that our faith was also prefigured in Abraham, and that he was the patriarch of our faith, and, as it were, the prophet of it, the apostle has very fully taught, when he says in the Epistle to the Galatians: "He therefore that ministereth to you the Spirit, and worketh miracles among you, [doeth he it] by the works of the law, or by the hearing of faith? Even as Abraham believed God, and it was accounted unto him for righteousness. Know ye therefore, that they which are of faith, the same are the children of Abraham. But the Scripture, foreseeing that God would justify the heathen through faith, announced beforehand unto Abraham, that in him all nations should be blessed. So then they which be of faith shall be blessed with faithful Abraham." For which [reasons the apostle] declared that this man was not only the prophet of faith, but also the father of those who from among the Gentiles believe in Jesus Christ, because his faith and ours are one and the same: for he believed in things future, as if they were already accomplished, because of the promise of God; and in like manner do we also, because of the promise of God, behold through faith that inheritance [laid up for us] in the [future] kingdom.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
