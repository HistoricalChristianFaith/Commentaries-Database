[[commentary]]
quote='''
...the dew, which is the Spirit of God, who descended upon the Lord, should be diffused throughout all the earth, "the spirit of wisdom and understanding, the spirit of counsel and might, the spirit of knowledge and piety, the spirit of the fear of God." This Spirit, again, He did confer upon the Church, sending throughout all the world the Comforter from heaven, from whence also the Lord tells us that the devil, like lightning, was cast down.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
