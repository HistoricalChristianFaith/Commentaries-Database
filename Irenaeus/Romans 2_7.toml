[[commentary]]
quote='''
"But glory and honour," he says, "to every one that doeth good." God therefore has given that which is good, as the apostle tells us in this Epistle, and they who work it shall receive glory and honour, because they have done that which is good when they had it in their power not to do it; but those who do it not shall receive the just judgment of God, because they did not work good when they had it in their power so to do.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Irenaeus Against Heresies Book 4"
