[[commentary]]
quote='''
Some passages, also, which occur in the Gospels, receive from them a colouring of the same kind, such as the answer which He gave His mother when He was twelve years of age: "Wist ye not that I must be about My Father's business?" Thus, they say, He announced to them the Father of whom they were ignorant. On this account, also, He sent forth the disciples to the twelve tribes, that they might proclaim to them the unknown God. And to the person who said to Him, "Good Master," He confessed that God who is truly good, saying, "Why callest thou Me good: there is One who is good, the Father in the heavens;" and they assert that in this passage the Aeons receive the name of heavens.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
