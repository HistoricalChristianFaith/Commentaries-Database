[[commentary]]
quote='''
This Spirit did David ask for the human race, saying, "And stablish me with Thine all-governing Spirit;" who also, as Luke says, descended at the day of Pentecost upon the disciples after the Lord's ascension, having power to admit all nations to the entrance of life, and to the opening of the new covenant; from whence also, with one accord in all languages, they uttered praise to God, the Spirit bringing distant tribes to unity, and offering to the Father the first-fruits of all nations. Wherefore also the Lord promised to send the Comforter, who should join us to God. For as a compacted lump of dough cannot be formed of dry wheat without fluid matter, nor can a loaf possess unity, so, in like manner, neither could we, being many, be made one in Christ Jesus without the water from heaven. And as dry earth does not bring forth unless it receive moisture, in like manner we also, being originally a dry tree, could never have brought forth fruit unto life without the voluntary rain from above. For our bodies have received unity among themselves by means of that layer which leads to incorruption; but our souls, by means of the Spirit. Wherefore both are necessary, since both contribute towards the life of God...
'''
source_title="AGAINST HERESIES 3.17.2"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
