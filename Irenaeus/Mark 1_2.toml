[[commentary]]
quote='''
Wherefore also Mark, the interpreter and follower of Peter, does thus commence his Gospel narrative: "The beginning of the Gospel of Jesus Christ, the Son of God; as it is written in the prophets, Behold, I send My messenger before Thy face, which shall prepare Thy way. The voice of one crying in the wilderness, Prepare ye the way of the Lord, make the paths straight before our God." Plainly does the commencement of the Gospel quote the words of the holy prophets, and point out Him at once, whom they confessed as God and Lord; Him, the Father of our Lord Jesus Christ, who had also made promise to Him, that He would send His messenger before His face, who was John, crying in the wilderness, in "the spirit and power of Elias," "Prepare ye the way of the Lord, make straight paths before our God." For the prophets did not announce one and another God, but one and the same; under various aspects, however, and many titles. For varied and rich in attribute is the Father...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
