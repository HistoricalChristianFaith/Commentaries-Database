[[commentary]]
quote='''
And, without using a parable, the Lord said to Jerusalem, `O Jerusalem, Jerusalem, thou that killest the prophets, and stonest those that are sent unto thee; how often would I have gathered thy children together, as a hen gathereth her chickens trader her wings, and ye would not! Behold, your house shall be left unto you desolate." For that which had been said in the parable, "Behold, for three years I come seeking fruit," and in clear terms, again, [where He says], "How often would I have gathered thy children together," shall be [found] a falsehood, if we do not understand His advent, which is [announced] by the prophets-if, in fact, He came to them but once, and then for the first time. But since He who chose the patriarchs and those [who lived under the first covenant], is the same Word of God who did both visit them through the prophetic Spirit, and us also who have been called together from all quarters by His advent; in addition to what has been already said, He truly declared, "Many shall come from the east and from the west, and shall recline with Abraham, and Isaac, and Jacob, in the kingdom of heaven. But the children of the kingdom shall go into outer darkness; there shall be weeping and gnashing of teeth." If, then, those who do believe in Him through the preaching of His apostles throughout the east and west shall recline with Abraham, Isaac, and Jacob, in the kingdom of heaven, partaking with them of the [heavenly] banquet, one and the same God is set forth as He who did indeed choose the patriarchs, visited also the people, and called the Gentiles.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
