[[commentary]]
quote='''
But as He who worketh all things in all is God, [as to the points] of what nature and how great He is, [God] is invisible and indescribable to all things which have been made by Him, but He is by no means unknown: for all things learn through His Word that there is one God the Father, who contains all things, and who grants existence to all, as is written in the Gospel: "No man hath seen God at any time, except the only-begotten Son, who is in the bosom of the Father; He has declared [Him.]"

Therefore the Son of the Father declares [Him] from the beginning, inasmuch as He was with the Father from the beginning, who did also show to the human race prophetic visions, and diversities of gifts, and His own ministrations, and the glory of the Father, in regular order and connection, at the fitting time for the benefit [of mankind]. For where there is a regular succession, there is also fixedness; and where fixedness, there suitability to the period; and where suitability, there also utility. And for this reason did the Word become the dispenser of the paternal grace for the benefit of men, for whom He made such great dispensations, revealing God indeed to men, but presenting man to God, and preserving at the same time the invisibility of the Father, lest man should at any time become a despiser of God, and that he should always possess something towards which he might advance; but, on the other hand, revealing God to men through many dispensations, lest man, failing away from God altogether, should cease to exist. For the glory of God is a living man; and the life of man consists in beholding God. For if the manifestation of God which is made by means of the creation, affords life to all living in the earth, much more does that revelation of the Father which comes through the Word, give life to those who see God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"


[[commentary]]
quote='''
If, then, neither Moses, nor Elias, nor Ezekiel, who had all many celestial visions, did see God; but if what they did see were similitudes of the splendour of the Lord, and prophecies of things to come; it is manifest that the Father is indeed invisible, of whom also the Lord said, "No man hath seen God at any time." But His Word, as He Himself willed it, and for the benefit of those who beheld, did show the Father's brightness, and explained His purposes (as also the Lord said: "The only-begotten God, which is in the bosom of the Father, He hath declared [Him];" and He does Himself also interpret the Word of the Father as being rich and great); not in one figure, nor in one character, did He appear to those seeing Him, but according to the reasons and effects aimed at in His dispensations...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
