[[commentary]]
quote='''
This is also made clear from the words of the Lord, who did truly reveal the Son of God to those of the circumcision-Him who had been foretold as Christ by the prophets; that is, He set Himself forth, who had restored liberty to men, and bestowed on them the inheritance of incorruption. And again, the apostles taught the Gentiles that they should leave vain stocks and stones, which they imagined to be gods, and worship the true God, who had created and made all the human family, and, by means of His creation, did nourish, increase, strengthen, and preserve them in being; and that they might look for His Son Jesus Christ, who redeemed us from apostasy with His own blood, so that we should also be a sanctified people,-who shall also descend from heaven in His Father's power, and pass judgment upon all, and who shall freely give the good things of God to those who shall have kept His commandments. He, appearing in these last times, the chief cornerstone, has gathered into one, and united those that were far off and those that were near; that is, the circumcision and the uncircumcision, enlarging Japhet, and placing him in the dwelling of Shem.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
