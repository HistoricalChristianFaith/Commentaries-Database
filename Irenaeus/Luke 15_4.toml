[[commentary]]
quote='''
Moreover, that Achamoth wandered beyond the Pleroma, and received form from Christ, and was sought after by the Saviour, they declare that He indicated when He said, that He had come after that sheep which was gone astray. For they explain the wandering sheep to mean their mother, by whom they represent the Church as having been sown. The wandering itself denotes her stay outside of the Pleroma in a state of varied passion, from which they maintain that matter derived its origin.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
append_to_author_name="(Reporting Valentinian Views)"

[[commentary]]
quote='''
Blending in one the production of their own Aeons, and the straying and recovery of the sheep [spoken of in the Gospel], these persons endeavour to set forth things in a more mystical style, while they refer everything to numbers, maintaining that the universe has been formed out of a Monad and a Dyad. And then, reckoning from unity on to four, they thus generate the Decad. For when one, two, three, and four are added together, they give rise to the number of the ten Aeons. And, again, the Dyad advancing from itself [by twos] up to six-two, and four, and six-brings out the Duodecad. Once more, if we reckon in the same way up to ten, the number thirty appears, m which are found eight, and ten, and twelve. They therefore term the Duodecad-because it contains the Episemon, and because the Episemon [so to speak] waits upon it-the passion. And for this reason, because an error occurred in connection with the twelfth number, the sheep frisked off, and went astray; for they assert that a defection took place from the Duodecad.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
append_to_author_name="(Reporting Marcosian Views)"

[[commentary]]
quote='''
All therefore speak falsely who disallow his (Adam's) salvation, shutting themselves out from life for ever, in that they do not believe that the sheep which had perished has been found. For if it has not been found, the whole human race is still held in a state of perdition.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
