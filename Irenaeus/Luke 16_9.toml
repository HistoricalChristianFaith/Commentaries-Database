[[commentary]]
quote='''
For, because He knew that we would make a good use of our substance which we should possess by receiving it from another, He says, "He that hath two coats, let him impart to him that hath none; and he that hath meat, let him do likewise." And, "For I was an hungered, and ye gave Me meat; I was thirsty, and ye gave Me drink; I was naked and ye clothed Me." And, "When thou doest thine alms, let not thy left hand know what thy right hand doeth." And we are proved to be righteous by whatsoever else we do well, redeeming, as it were, our property from strange hands. But thus do I say, "from strange hands," not as if the world were not God's possession, but that we have gifts of this sort, and receive them from others, in the same way as these men had them from the Egyptians who knew not God; and by means of these same do we erect in ourselves the tabernacle of God: for God dwells in those who act uprightly, as the Lord says: "Make to yourselves friends of the mammon of unrighteousness, that they, when ye shall be put to flight, may receive you into eternal tabernacles." For whatsoever we acquired from unrighteousness when we were heathen, we are proved righteous, when we have become believers, by applying it to the Lord's advantage.
'''
source_title="Irenaeus Against Heresies Book 4"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
