[[commentary]]
quote='''
For the Lord vindicated Abraham's posterity by loosing them from bondage and calling them to salvation, as He did in the case of the woman whom He healed, saying openly to those who had not faith like Abraham, "Ye hypocrites, doth not each one of you on the Sabbath-days loose his ox or his ass, and lead him away to watering? And ought not this woman, being a daughter of Abraham, whom Satan hath bound these eighteen years, be loosed from this bond on the Sabbath-days?" It is clear therefore, that He loosed and vivified those who believe in Him as Abraham did, doing nothing contrary to the law when He healed upon the Sabbath-day. For the law did not prohibit men from being healed upon the Sabbaths; [on the contrary,] it even circumcised them upon that day, and gave command that the offices should be performed by the priests for the people; yea, it did not disallow the healing even of dumb animals. Both at Siloam and on frequent subsequent occasions, did He perform cures upon the Sabbath; and for this reason many used to resort to Him on the Sabbath-days. For the law commanded them to abstain from every servile work, that is, from all grasping after wealth which is procured by trading and by other worldly business; but it exhorted them to attend to the exercises of the soul, which consist in reflection, and to addresses of a beneficial kind for their neighbours' benefit. And therefore the Lord reproved those who unjustly blamed Him for having healed upon the Sabbath-days. For He did not make void, but fulfilled the law, by performing the offices of the high priest, propitiating God for men, and cleansing the lepers, healing the sick, and Himself suffering death, that exiled man might go forth from condemnation, and might return without fear to his own inheritance.
'''
source_title="Against Heresies Book IV"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
