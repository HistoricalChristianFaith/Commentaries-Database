[[commentary]]
quote='''
And just as a cutting from the vine planted in the ground fructifies in its season, or as a corn of wheat falling into the earth and becoming decomposed, rises with manifold increase by the Spirit of God, who contains all things, and then, through the wisdom of God, serves for the use of men, and having received the Word of God, becomes the Eucharist, which is the body and blood of Christ; so also our bodies, being nourished by it, and deposited in the earth, and suffering decomposition there, shall rise at their appointed time, the Word of God granting them resurrection to the glory of God, even the Father, who freely gives to this mortal immortality, and to this corruptible incorruption, because the strength of God is made perfect in weakness, in order that we may never become puffed up, as if we had life from ourselves, and exalted against God, our minds becoming ungrateful; but learning by experience that we possess eternal duration from the excelling power of this Being, not from our own nature, we may neither undervalue that glory which surrounds God as He is, nor be ignorant of our own nature, but that we may know what God can effect, and what benefits man receives, and thus never wander from the true comprehension of things as they are, that is, both with regard to God and with regard to man. And might it not be the case, perhaps, as I have already observed, that for this purpose God permitted our resolution into the common dust of mortality, that we, being instructed by every mode, may be accurate in all things for the future, being ignorant neither of God nor of ourselves?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"

[[commentary]]
quote='''
Rightly therefore does the apostle declare, "Flesh and blood cannot inherit the kingdom of God;" and, "Those who are in the flesh cannot please God:" not repudiating [by these words] the substance of flesh, but showing that into it the Spirit must be infused. And for this reason, he says, "This mortal must put on immortality, and this corruptible must put on incorruption." And again he declares, "But ye are not in the flesh, but in the Spirit, if so be that the Spirit of God dwell in you." He sets this forth still more plainly, where he says, "The body indeed is dead, because of sin; but the Spirit is life, because of righteousness. But if the Spirit of Him who raised up Jesus from the dead dwell in you, He that raised up Christ from the dead shall also quicken your mortal bodies, because of His Spirit dwelling in you."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"

[[commentary]]
quote='''
For thus they will allege that this passage refers to the flesh strictly so called, and not to fleshly works, as I have pointed out, so representing the apostle as contradicting himself. For immediately following, in the same Epistle, he says conclusively, speaking thus in reference to the flesh: "For this corruptible must put on incorruption, and this mortal must put on immortality. So, when this mortal shall have put on immortality, then shall be brought to pass the saying which is written, Death is swallowed up in victory. O death, where is thy sting? O death, where is thy victory?" Now these words shall be appropriately said at the time when this mortal and corruptible flesh, which is subject to death, which also is pressed down by a certain dominion of death, rising up into life, shall put on incorruption and immortality. For then, indeed, shall death be truly vanquished, when that flesh which is held down by it shall go forth from under its dominion. And again, to the Philippians he says: "But our conversation is in heaven, from whence also we look for the Saviour, the Lord Jesus, who shall transfigure the body of our humiliation conformable to the body of His glory, even as He is able (ita ut possit) according to the working of His own power." What, then, is this "body of humiliation" which the Lord shall transfigure, [so as to be] conformed to "the body of His glory?" Plainly it is this body composed of flesh, which is indeed humbled when it falls into the earth. Now its transformation [takes place thus], that while it is mortal and corruptible, it becomes immortal and incorruptible, not after its own proper substance, but after the mighty working of the Lord, who is able to invest the mortal with immortality, and the corruptible with incorruption. And therefore he says, "that mortality may be swallowed up of life. He who has perfected us for this very thing is God, who also has given unto us the earnest of the Spirit." He uses these words most manifestly in reference to the flesh; for the soul is not mortal, neither is the spirit. Now, what is mortal shall be swallowed up of life, when the flesh is dead no longer, but remains living and incorruptible, hymning the praises of God, who has perfected us for this very thing. In order, therefore, that we may be perfected for this, aptly does he say to the Corinthians, "Glorify God in your body." Now God is He who gives rise to immortality.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"

[[commentary]]
quote='''
In all these passages, therefore, as I have already said, these men must either allege that the apostle expresses opinions contradicting himself, with respect to that statement, "Flesh and blood cannot inherit the kingdom of God;" or, on the other hand, they will be forced to make perverse and crooked interpretations of all the passages, so as to overturn and alter the sense of the words. For what sensible thing can they say, if they endeavour to interpret otherwise this which he writes: "For this corruptible must put on incorruption, and this mortal put on immortality;" and, "That the life of Jesus may be made manifest in our mortal flesh;" and all the other passages in which the apostle does manifestly and clearly declare the resurrection and incorruption of the flesh? And thus shall they be compelled to put a false interpretation upon passages such as these, they who do not choose to understand one correctly.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
