[[commentary]]
quote='''
Since, therefore, He whom these men boast of as their Master, and of whom they affirm that He had a soul greatly better and more highly toned than others, did indeed, with much earnestness, command certain things to be done as being good and excellent, and certain things to be abstained from not only in their actual perpetration, but even in the thoughts which lead to their performance, as being wicked, pernicious, and abominable,-how then can they escape being put to confusion, when they affirm that such a Master was more highly toned [in spirit] and better than others, and yet manifestly give instruction of a kind utterly opposed to His teaching? And, again, if there were really no such thing as good and evil, but certain things were deemed righteous, and certain others unrighteous, in human opinion only, He never would have expressed Himself thus in His teaching: "The righteous shall shine forth as the sun in the kingdom of their Father;" but He shall send the unrighteous, and those who do not the works of righteousness, "into everlasting fire, where their worm shall not die, and the fire shall not be quenched."
'''
source_title="Against Heresies (Book II, Chapter 32), Section 1"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
