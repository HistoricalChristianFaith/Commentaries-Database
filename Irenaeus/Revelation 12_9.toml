[[commentary]]
quote='''
They set forth, indeed, the name of Christ Jesus as a sort of lure, but in various ways they introduce the impieties of Simon; and thus they destroy multitudes, wickedly disseminating their own doctrines by the use of a good name, and, through means of its sweetness and beauty, extending to their hearers the bitter and malignant poison of the serpent, the great author of apostasy.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"

[[commentary]]
quote='''
For as the serpent beguiled Eve, by promising her what he had not himself, so also do these men, by pretending [to possess] superior knowledge, and [to be acquainted with] ineffable mysteries; and, by promising that admittance which they speak of as taking place within the Pleroma, plunge those that believe them into death, rendering them apostates from Him who made them. And at that time, indeed, the apostate angel, having effected the disobedience of mankind by means of the serpent, imagined that he escaped the notice of the Lord; wherefore God assigned him the form and name [of a serpent]. But now, since the last times are [come upon us], evil is spread abroad among men, which not only renders them apostates, but by many machinations does [the devil] raise up blasphemers against the Creator, namely, by means of all the heretics already mentioned.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

