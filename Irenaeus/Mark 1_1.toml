[[commentary]]
quote='''
Wherefore Mark also says: "The beginning of the Gospel of Jesus Christ, the Son of God; as it is written in the prophets." Knowing one and the same Son of God, Jesus Christ, who was announced by the prophets, who from the fruit of David's body was Emmanuel, "the messenger of great counsel of the Father;" through whom God caused the day-spring and the Just One to arise to the house of David, and raised up for him an horn of salvation, "and established a testimony in Jacob;" as David says when discoursing on the causes of His birth: "And He appointed a law in Israel, that another generation might know [Him,] the children which should be born from these, and they arising shall themselves declare to their children, so that they might set their hope in God, and seek after His commandments." And again, the angel said, when bringing good tidings to Mary: "He shall be great, and shall be called the Son of the Highest; and the Lord shall give unto Him the throne of His father David;" acknowledging that He who is the Son of the Highest, the same is Himself also the Son of David. And David, knowing by the Spirit the dispensation of the advent of this Person, by which He is supreme over all the living and dead, confessed Him as Lord, sitting on the right hand of the Most High Father.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
