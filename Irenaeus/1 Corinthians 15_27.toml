[[commentary]]
quote='''
The presbyters, the disciples of the apostles, affirm that this is the gradation and arrangement of those who are saved, and that they advance through steps of this nature; also that they ascend through the Spirit to the Son, and through the Son to the Father, and that in due time the Son will yield up His work to the Father, even as it is said by the apostle, "For He must reign till He hath put all enemies under His feet. The last enemy that shall be destroyed is death." For in the times of the kingdom, the righteous man who is upon the earth shall then forget to die. "But when He saith, All things shall be subdued unto Him, it is manifest that He is excepted who did put all things under Him. And when all things shall be subdued unto Him, then shall the Son also Himself be subject unto Him who put all things under Him, that God may be all in all."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
