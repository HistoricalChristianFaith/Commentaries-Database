[[commentary]]
quote='''
And after these things, seeing the same Lord in a second vision, he says: "For I saw in the midst of the throne, and of the four living creatures, and in the midst of the elders, a Lamb standing as it had been slain, having seven horns, and seven eyes, which are the seven spirits of God, sent forth into all the earth." And again, he says, speaking of this very same Lamb: "And behold a white horse; and He that sat upon him was called Faithful and True; and in righteousness doth He judge and make war. And His eyes were as a flame of fire, and on His head were many crowns; having a name written, that no man knoweth but Himself: and He was girded around with a vesture sprinkled with blood: and His name is called The Word of God. And the armies of heaven followed Him upon white horses, clothed in pure white linen. And out of His mouth goeth a sharp sword, that with it He may smite the nations; and He shall rule them with a rod of iron: and He treadeth the wine-press of the fierceness of the wrath of God Almighty. And He hath upon His vesture and upon His thigh a name written, King of Kings and Lord of Lords." Thus does the Word of God always preserve the outlines, as it were, of things to come, and points out to men the various forms, as it were, of the dispensations of the Father, teaching us the things pertaining to God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

