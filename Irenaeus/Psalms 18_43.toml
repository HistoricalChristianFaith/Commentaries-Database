[[commentary]]
quote='''
For [the word] "son," as one before me has observed, has a twofold meaning: one [is a son] in the order of nature, because he was born a son; the other, in that he was made so, is reputed a son, although there be a difference between being born so and being made so. For the first is indeed born from the person referred to; but the second is made so by him, whether as respects his creation or by the teaching of his doctrine. For when any person has been taught from the mouth of another, he is termed the son of him who instructs him, and the latter [is called] his father. According to nature, then -that is, according to creation, so to speak-we are all sons of God, because we have all been created by God. But with respect to obedience and doctrine we are not all the sons of God: those only are so who believe in Him and do His will. And those who do not believe, and do not obey His will, are sons and angels of the devil, because they do the works of the devil. And that such is the case He has declared in Isaiah: "I have begotten and brought up children, but they have rebelled against Me." And again, where He says that these children are aliens: "Strange children have lied unto Me." According to nature, then, they are [His] children, because they have been so created; but with regard to their works, they are not His children.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:41.2"
