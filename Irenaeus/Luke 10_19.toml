[[commentary]]
quote='''
For the Lord, through means of suffering, "ascending into the lofty place, led captivity captive, gave gifts to men," and conferred on those that believe in Him the power "to tread upon serpents and scorpions, and on all the power of the enemy," that is, of the leader of apostasy. Our Lord also by His passion destroyed death, and dispersed error, and put an end to corruption, and destroyed ignorance, while He manifested life and revealed truth, and bestowed the gift of incorruption.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"

[[commentary]]
quote='''
For this end did He put enmity between the serpent and the woman and her seed, they keeping it up mutually: He, the sole of whose foot should be bitten, having power also to tread upon the enemy's head; but the other biting, killing, and impeding the steps of man, until the seed did come appointed to tread down his head,-which was born of Mary, of whom the prophet speaks: "Thou shalt tread upon the asp and the basilisk; thou shalt trample down the lion and the dragon;"-indicating that sin, which was set up and spread out against man, and which rendered him subject to death, should be deprived of its power, along with death, which rules [over men]; and that the lion, that is, antichrist, rampant against mankind in the latter days, should be trampled down by Him; and that He should bind "the dragon, that old serpent" and subject him to the power of man, who had been conquered so that all his might should be trodden down.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
Just as if any one, being an apostate, and seizing in a hostile manner another man's territory, should harass the inhabitants of it, in order that he might claim for himself the glory of a king among those ignorant of his apostasy and robbery; so likewise also the devil, being one among those angels who are placed over the spirit of the air, as the Apostle Paul has declared in his Epistle to the Ephesians, becoming envious of man, was rendered an apostate from the divine law: for envy is a thing foreign to God. And as his apostasy was exposed by man, and man became the [means of] searching out his thoughts (et examinatio sententiae ejus, homo factus est), he has set himself to this with greater and greater determination, in opposition to man, envying his life, and wishing to involve him in his own apostate power. The Word of God, however, the Maker of all things, conquering him by means of human nature, and showing him to be an apostate, has, on the contrary, put him under the power of man. For He says, "Behold, I confer upon you the power of treading upon serpents and scorpions, and upon all the power of the enemy," in order that, as he obtained dominion over man by apostasy, so again his apostasy might be deprived of power by means of man turning back again to God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
