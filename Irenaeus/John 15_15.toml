[[commentary]]
quote='''
Inasmuch, then, as all natural precepts are common to us and to them (the Jews), they had in them indeed the beginning and origin; but in us they have received growth and completion. For to yield assent to God, and to follow His Word, and to love Him above all, and one's neighbour as one's self (now man is neighbour to man), and to abstain from every evil deed, and all other things of a like nature which are common to both [covenants], do reveal one and the same God. But this is our Lord, the Word of God, who in the first instance certainly drew slaves to God, but afterwards He set those free who were subject to Him, as He does Himself declare to His disciples: "I will not now call you servants, for the servant knoweth not what his lord doeth; but I have called you friends, for all things which I have heard from My Father I have made known." For in that which He says, "I will not now call you servants," He indicates in the most marked manner that it was Himself who did originally appoint for men that bondage with respect to God through the law, and then afterwards conferred upon them freedom. And in that He says, "For the servant knoweth not what his lord doeth," He points out, by means of His own advent, the ignorance of a people in a servile condition. But when He terms His disciples "the friends of God," He plainly declares Himself to be the Word of God, whom Abraham also followed voluntarily and under no compulsion (sine vinculis), because of the noble nature of his faith, and so became "the friend of God." But the Word of God did not accept of the friendship of Abraham, as though He stood in need of it, for He was perfect from the beginning ("Before Abraham was," He says, "I am"), but that He in His goodness might bestow eternal life upon Abraham himself, inasmuch as the friendship of God imparts immortality to those who embrace it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="Against Heresies Book IV"
