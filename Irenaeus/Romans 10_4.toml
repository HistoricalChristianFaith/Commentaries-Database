[[commentary]]
quote='''
For this is what Paul says concerning these men: "For they, being ignorant of God's righteousness, and going about to establish their own righteousness, have not submitted themselves to the righteousness of God. For Christ is the end of the law for righteousness to every one that believeth." And how is Christ the end of the law, if He be not also the final Cause of it? For He who has brought in the end has Himself also wrought the beginning; and it is He who does Himself say to Moses, "I have surely seen the affliction of my people which is in Egypt, and I have come down to deliver them;" it being customary from the beginning with the Word of God to ascend and descend for the purpose of saving those who were in affliction.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
