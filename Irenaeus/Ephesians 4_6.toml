[[commentary]]
quote='''
Now, that this God is the Father of our Lord Jesus Christ, Paul the apostle also has declared, [saying,] "There is one God, the Father, who is above all, and through all things, and in us all." I have indeed proved already that there is only one God; but I shall further demonstrate this from the apostles themselves, and from the discourses of the Lord. For what sort of conduct would it be, were we to forsake the utterances of the prophets, of the Lord, and of the apostles, that we might give heed to these persons, who speak not a word of sense?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"

[[commentary]]
quote='''
For with Him were always present the Word and Wisdom, the Son and the Spirit, by whom and in whom, freely and spontaneously, He made all things, to whom also He speaks, saying, "Let Us make man after Our image and likeness;" He taking from Himself the substance of the creatures [formed], and the pattern of things made, and the type of all the adornments in the world.

Truly, then, the Scripture declared, which says, "First of all believe that there is one God, who has established all things, and completed them, and having caused that from what had no being, all things should come into existence:" He who contains all things, and is Himself contained by no one. Rightly also has Malachi said among the prophets: "Is it not one God who hath established us? Have we not all one Father?" In accordance with this, too, does the apostle say, "There is one God, the Father, who is above all, and in us all." Likewise does the Lord also say: "All things are delivered to Me by My Father;" manifestly by Him who made all things; for He did not deliver to Him the things of another, but His own.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
For the Father bears the creation and His own Word simultaneously, and the Word borne by the Father grants the Spirit to all as the Father wills. To some He gives after the manner of creation what is made; but to others [He gives] after the manner of adoption, that is, what is from God, namely generation. And thus one God the Father is declared, who is above all, and through all, and in all. The Father is indeed above all, and He is the Head of Christ; but the Word is through all things, and is Himself the Head of the Church; while the Spirit is in us all, and He is the living water, which the Lord grants to those who rightly believe in Him, and love Him, and who know that "there is one Father, who is above all, and through all, and in us all."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
