[[commentary]]
quote='''
"The pain of the stroke" means that inflicted at the beginning upon disobedient man in Adam, that is, death; which [stroke] the Lord will heal when He raises us from the dead, and restores the inheritance of the fathers, as Isaiah again says: "And thou shall be confident in the Lord, and He will cause thee to pass over the whole earth, and feed thee with the inheritance of Jacob thy father." This is what the Lord declared: "Happy are those servants whom the Lord when He cometh shall find watching. Verily I say unto you, that He shall gird Himself, and make them to sit down [to meat], and will come forth and serve them. And if He shall come in the evening watch, and find them so, blessed are they, because He shall make them sit down, and minister to them; or if this be in the second, or it be in the third, blessed are they." Again John also says the very same in the Apocalypse: "Blessed and holy is he who has part in the first resurrection." Then, too, Isaiah has declared the time when these events shall occur; he says: "And I said, Lord, how long? Until the cities be wasted without inhabitant, and the houses be without men, and the earth be left a desert. And after these things the Lord shall remove us men far away, and those who shall remain shall multiply upon the earth." Then Daniel also says this very thing: "And the kingdom and dominion, and the greatness of those under the heaven, is given to the saints of the Most High God, whose kingdom is everlasting, and all dominions shall serve and obey Him." And lest the promise named should be understood as referring to this time, it was declared to the prophet: "And come thou, and stand in thy lot at the consummation of the days."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Irenaeus Against Heresies Book 5"
