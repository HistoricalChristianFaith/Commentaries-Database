[[commentary]]
quote='''
And therefore did the Lord say to His disciples, to make us become good workmen: "Take heed to yourselves, and watch continually upon every occasion, lest at any time your hearts be overcharged with surfeiting and drunkenness, and cares of this life, and that day shall come upon you unawares; for as a snare shall it come upon all dwelling upon the face of the earth." "Let your loins, therefore, be girded about, and your lights burning, and ye like to men who wait for their lord, when he shall return from the wedding." "For as it was in the days of Noe, they did eat and drink, they bought and sold, they married and were given in marriage, and they knew not, until Noe entered into the ark, and the flood came and destroyed them all; as also it was in the days of Lot, they did eat and drink, they bought and sold, they planted and builded, until the time that Lot went out of Sodom; it rained fire from heaven, and destroyed them all: so shall it also be at the coming of the Son of man." "Watch ye therefore, for ye know not in what day your Lord shall come." [In these passages] He declares one and the same Lord, who in the times of Noah brought the deluge because of man's disobedience, and who also in the days of Lot rained fire from heaven because of the multitude of sinners among the Sodomites, and who, on account of this same disobedience and similar sins, will bring on the day of judgment at the end of time; on which day He declares that it shall be more tolerable for Sodom and Gomorrah than for that city and house which shall not receive the word of His apostles. "And thou, Capernaum," He said, "is it that thou shalt be exalted to heaven? Thou shalt go down to hell. For if the mighty works which have been done in thee had been done in Sodom, it would have remained unto this day. Verily I say unto you, that it shall be more tolerable for Sodom in the day of judgment than for you."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Irenaeus Against Heresies Book 4"
