[[commentary]]
quote='''
Now this being is the Creator (Demiurgus), who is, in respect of His love, the Father; but in respect of His power, He is Lord; and in respect of His wisdom, our Maker and Fashioner; by transgressing whose commandment we became His enemies. And therefore in the last times the Lord has restored us into friendship through His incarnation, having become "the Mediator between God and men;" propitiating indeed for us the Father against whom we had sinned, and cancelling (consolatus) our disobedience by His own obedience; conferring also upon us the gift of communion with, and subjection to, our Maker. For this reason also He has taught us to say in prayer, "And forgive us our debts;" since indeed He is our Father, whose debtors we were, having transgressed His commandments. But who is this Being? Is He some unknown one, and a Father who gives no commandment to any one? Or is He the God who is proclaimed in the Scriptures, to whom we were debtors, having transgressed His commandment? Now the commandment was given to man by the Word. For Adam, it is said, "heard the voice of the Lord God." Rightly then does His Word say to man, "Thy sins are forgiven thee;" He, the same against whom we had sinned in the beginning, grants forgiveness of sins in the end. But if indeed we had disobeyed the command of any other, while it was a different being who said, "Thy sins are forgiven thee;" such an one is neither good, nor true, nor just. For how can he be good, who does not give from what belongs to himself? Or how can he be just, who snatches away the goods of another? And in what way can sins be truly remitted, unless that He against whom we have sinned has Himself granted remission "through the bowels of mercy of our God," in which "He has visited us" through His Son?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
