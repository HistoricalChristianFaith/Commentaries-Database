[[commentary]]
quote='''
Paul himself also-after that the Lord spoke to him out of heaven, and showed him that, in persecuting His disciples, he persecuted his own Lord, and sent Ananias to him that he might recover his sight, and be baptized-"preached," it is said, "Jesus in the synagogues at Damascus, with all freedom of speech, that this is the Son of God, the Christ." This is the mystery which he says was made known to him by revelation, that He who suffered under Pontius Pilate, the same is Lord of all, and King, and God, and Judge, receiving power from Him who is the God of all, because He became "obedient unto death, even the death of the cross."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
Wherefore he who had received the apostolate to the Gentiles, did labour more than those who preached the Son of God among them of the circumcision. For they were assisted by the Scriptures, which the Lord confirmed and fulfilled, in coming such as He had been announced; but here, [in the case of the Gentiles,] there was a certain foreign erudition, and a new doctrine [to be received, namely], that the gods of the nations not only were no gods at all, but even the idols of demons; and that there is one God, who is "above all principality, and dominion, and power, and every name which is named;" and that His Word, invisible by nature, was made palpable and visible among men, and did descend "to death, even the death of the cross;" also, that they who believe in Him shall be incorruptible and not subject to suffering, and shall receive the kingdom of heaven. These things, too, were preached to the Gentiles by word, without [the aid of] the Scriptures: wherefore, also, they who preached among the Gentiles underwent greater labour. But, on the other hand, the faith of the Gentiles is proved to be of a more noble description, since they followed the word of God without the instruction [derived] from the [sacred] writings.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
And not by the aforesaid things alone has the Lord manifested Himself, but [He has done this] also by means of His passion. For doing away with [the effects of] that disobedience of man which had taken place at the beginning by the occasion of a tree, "He became obedient unto death, even the death of the cross;" rectifying that disobedience which had occurred by reason of a tree, through that obedience which was [wrought out] upon the tree [of the cross]. Now He would not have come to do away, by means of that same [image], the disobedience which had been incurred towards our Maker if He proclaimed another Father. But inasmuch as it was by these things that we disobeyed God, and did not give credit to His word, so was it also by these same that He brought in obedience and consent as respects His Word; by which things He clearly shows forth God Himself, whom indeed we had offended in the first Adam, when he did not perform His commandment. In the second Adam, however, we are reconciled, being made obedient even unto death. For we were debtors to none other but to Him whose commandment we had transgressed at the beginning.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
