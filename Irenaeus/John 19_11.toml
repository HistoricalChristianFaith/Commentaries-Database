[[commentary]]
quote='''
In order, therefore, that their inner wish and thought, being brought to light, may show that God is without blame, and worketh no evil-that God who reveals what is hidden [in the heart], but who worketh not evil-when Cain was by no means at rest, He saith to him: "To thee shall be his desire, and thou shalt rule over him." Thus did He in like manner speak to Pilate: "Thou shouldest have no power at all against Me, unless it were given thee from above;" God always giving up the righteous one [in this life to suffering], that he, having been tested by what he suffered and endured, may [at last] be accepted; but that the evildoer, being judged by the actions he has performed, may be rejected.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies 4.18.3"
