[[commentary]]
quote='''
For one and the same Lord, who is greater than the temple, greater than Solomon, and greater than Jonah, confers gifts upon men, that is, His own presence, and the resurrection from the dead; but He does not change God, nor proclaim another Father, but that very same one, who always has more to measure out to those of His household. And as their love towards God increases, He bestows more and greater [gifts]; as also the Lord said to His disciples: "Ye shall see greater things than these." And Paul declares: "Not that I have already attained, or that I am justified, or already have been made perfect. For we know in part, and we prophesy in part; but when that which is perfect has come, the things which are in part shall be done away." As, therefore, when that which is perfect is come, we shall not see another Father, but Him whom we now desire to see (for "blessed are the pure in heart: for they shall see God"); neither shall we look for another Christ and Son of God, but Him who [was born] of the Virgin Mary, who also suffered, in whom too we trust, and whom we love; as Esaias says: "And they shall say in that day, Behold our Lord God, in whom we have trusted, and we have rejoiced in our salvation;" and Peter says in his Epistle: "Whom, not seeing, ye love; in whom, though now ye see Him not, ye have believed, ye shall rejoice with joy unspeakable;" neither do we receive another Holy Spirit, besides Him who is with us, and who cries, "Abba, Father;" and we shall make increase in the very same things [as now], and shall make progress, so that no longer through a glass, or by means of enigmas, but face to face, we shall enjoy the gifts of God;-so also now, receiving more than the temple, and more than Solomon, that is, the advent of the Son of God, we have not been taught another God besides the Framer and the Maker of all, who has been pointed out to us from the beginning; nor another Christ, the Son of God, besides Him who was foretold by the prophets.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book 4"
