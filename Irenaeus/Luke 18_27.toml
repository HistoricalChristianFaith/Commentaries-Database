[[commentary]]
quote='''
But in respect to His greatness, and His wonderful glory, "no man shall see God and live," for the Father is incomprehensible; but in regard to His love, and kindness, and as to His infinite power, even this He grants to those who love Him, that is, to see God, which thing the prophets did also predict. "For those things that are impossible with men, are possible with God." For man does not see God by his own powers; but when He pleases He is seen by men, by whom He wills, and when He wills, and as He wills. For God is powerful in all things, having been seen at that time indeed, prophetically through the Spirit, and seen, too, adoptively through the Son; and He shall also be seen paternally in the kingdom of heaven, the Spirit truly preparing man in the Son of God, and the Son leading him to the Father, while the Father, too, confers [upon him] incorruption for eternal life, which comes to every one from the fact of his seeing God. For as those who see the light are within the light, and partake of its brilliancy; even so, those who see God are in God, and receive of His splendour. But [His] splendour vivifies them; those, therefore, who see God, do receive life. And for this reason, He, [although] beyond comprehension, and boundless and invisible, rendered Himself visible, and comprehensible, and within the capacity of those who believe, that He might vivify those who receive and behold Him through faith. For as His greatness is past finding out, so also His goodness is beyond expression; by which having been seen, He bestows life upon those who see Him. It is not possible to live apart from life, and the means of life is found in fellowship with God; but fellowship with God is to know God, and to enjoy His goodness.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
For, to attribute the substance of created things to the power and will of Him who is God of all, is worthy both of credit and acceptance. It is also agreeable [to reason], and there may be well said regarding such a belief, that "the things which are impossible with men are possible with God." While men, indeed, cannot make anything out of nothing, but only out of matter already existing, yet God is in this point proeminently superior to men, that He Himself called into being the substance of His creation, when previously it had no existence.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"

[[commentary]]
quote='''
Neither the nature of any created thing, therefore, nor the weakness of the flesh, can prevail against the will of God. For God is not subject to created things, but created things to God; and all things yield obedience to His will. Wherefore also the Lord declares, "The things which are impossible with men, are possible with God." As, therefore, it might seem to the men of the present day, who are ignorant of God's appointment, to be a thing incredible and impossible that any man could live for such a number of years, yet those who were before us did live [to such an age], and those who were translated do live as an earnest of the future length of days; and [as it might also appear impossible] that from the whale's belly and from the fiery furnace men issued forth unhurt, yet they nevertheless did so, led forth as it were by the hand of God, for the purpose of declaring His power: so also now, although some, not knowing the power and promise of God, may oppose their own salvation, deeming it impossible for God, who raises up the dead; to have power to confer upon them eternal duration, yet the scepticism of men of this stamp shall not render the faithfulness of God of none effect.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
