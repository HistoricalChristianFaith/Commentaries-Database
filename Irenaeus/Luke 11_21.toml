[[commentary]]
quote='''
How can they be saved unless it was God who wrought out their salvation upon earth? Or how shall man pass into God, unless God has [first] passed into man? And how shall he (man) escape from the generation subject to death, if not by means of a new generation, given in a wonderful and unexpected manner (but as a sign of salvation) by God-[I mean] that regeneration which flows from the virgin through faith? Or how shall they receive adoption from God if they remain in this [kind of] generation, which is naturally possessed by man in this world? And how could He have been greater than Solomon, or greater than Jonah, or have been the Lord of David, who was of the same substance as they were? How, too, could He have subdued him who was stronger than men, who had not only overcome man, but also retained him under his power, and conquered him who had conquered, while he set free mankind who had been conquered, unless He had been greater than man who had thus been vanquished? But who else is superior to, and more eminent than, that man who was formed after the likeness of God, except the Son of God, after whose image man was created? And for this reason He did in these last days exhibit the similitude; [for] the Son of God was made man, assuming the ancient production [of His hands] into His own nature...
'''
source_title="Irenaeus Against Heresies Book 4"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
