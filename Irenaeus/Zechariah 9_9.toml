[[commentary]]
quote='''
A spiritual disciple of this sort truly receiving the Spirit of God, who was from the beginning, in all the dispensations of God, present with mankind, and announced things future, revealed things present, and narrated things past-[such a man] does indeed "judge all men, but is himself judged by no man." For he judges the Gentiles, "who serve the creature more than the Creator," and with a reprobate mind spend all their labour on vanity. And he also judges the Jews, who do not accept of the word of liberty, nor are willing to go forth free, although they have a Deliverer present [with them]; but they pretend, at a time unsuitable [for such conduct], to serve, [with observances] beyond [those required by] the law, God who stands in need of nothing, and do not recognise the advent of Christ, which He accomplished for the salvation of men, nor are willing to understand that all the prophets announced His two advents: the one, indeed, in which He became a man subject to stripes, and knowing what it is to bear infirmity, and sat upon the foal of an ass, and was a stone rejected by the builders, and was led as a sheep to the slaughter, and by the stretching forth of His hands destroyed Amalek; while He gathered from the ends of the earth into His Father's fold the children who were scattered abroad, and remembered His own dead ones who had formerly fallen asleep, and came down to them that He might deliver them: but the second in which He will come on the clouds, bringing on the day which burns as a furnace, and smiting the earth with the word of His mouth, and slaying the impious with the breath of His lips, and having a fan in His hands, and cleansing His floor, and gathering the wheat indeed into His barn, but burning the chaff with unquenchable fire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="Against Heresies Book IV"
