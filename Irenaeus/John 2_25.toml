[[commentary]]
quote='''
For inasmuch as the Word of God was man from the root of Jesse, and son of Abraham, in this respect did the Spirit of God rest upon Him, and anoint Him to preach the Gospel to the lowly. But inasmuch as He was God, He did not judge according to glory, nor reprove after the manner of speech. For "He needed not that any should testify to Him of man, for He Himself knew what was in man." For He called all men that mourn; and granting forgiveness to those who had been led into captivity by their sins, He loosed them from their chains, of whom Solomon says, "Every one shall be holden with the cords of his own sins." Therefore did the Spirit of God descend upon Him, [the Spirit] of Him who had promised by the prophets that He would anoint Him, so that we, receiving from the abundance of His unction, might be saved.
'''
source_title="Against Heresies Book III, Chapter IX"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
