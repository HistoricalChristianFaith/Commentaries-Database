[[commentary]]
quote='''
And for this reason the apostle says: "Because they received not the love of God, that they might be saved, therefore God shall also send them the operation of error, that they may believe a lie, that they all may be judged who have not believed the truth, but consented to unrighteousness." For when he (Antichrist) is come, and of his own accord concentrates in his own person the apostasy, and accomplishes whatever he shall do according to his own will and choice, sitting also in the temple of God, so that his dupes may adore him as the Christ; wherefore also shall he deservedly "be cast into the lake of fire:" [this will happen according to divine appointment], God by His prescience foreseeing all this, and at the proper time sending such a man, "that they may believe a lie, that they all may be judged who did not believe the truth, but consented to unrighteousness;" whose coming John has thus described in the Apocalypse: "And the beast which I had seen was like unto a leopard, and his feet as of a bear, and his mouth as the mouth of a lion; and the dragon conferred his own power upon him, and his throne, and great might. And one of his heads was as it were slain unto death; and his deadly wound was healed, and all the world wondered after the beast. And they worshipped the dragon because he gave power to the beast; and they worshipped the beast, saying, Who is like unto this beast, and who is able to make war with him? And there was given unto him a mouth speaking great things, and blasphemy and power was given to him during forty and two months. And he opened his mouth for blasphemy against God, to blaspheme His name and His tabernacle, and those who dwell in heaven. And power was given him over every tribe, and people, and tongue, and nation. And all who dwell upon the earth worshipped him, [every one] whose name was not written in the book of the Lamb slain from the foundation of the world. If any one have ears, let him hear. If any one shall lead into captivity, he shall go into captivity. If any shall slay with the sword, he must be slain with the sword. Here is the endurance and the faith of the saints."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"

