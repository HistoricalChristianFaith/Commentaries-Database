[[commentary]]
quote='''
But He taught that they should obey the commandments which God enjoined from the beginning, and do away with their former covetousness by good works, and follow after Christ. But that possessions distributed to the poor do annul former covetousness, Zaccheus made evident, when he said, "Behold, the half of my goods I give to the poor; and if I have defrauded any one, I restore fourfold."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies (Book IV, Chapter 12), Section 5"
