[[commentary]]
quote='''
But as for us, we still dwell upon the earth, and have not yet sat down upon His throne. For although the Spirit of the Saviour that is in Him "searcheth all things, even the deep things of God," yet as to us "there are diversities of gifts, differences of administrations, and diversities of operations;" and we, while upon the earth, as Paul also declares, "know in part, and prophesy in part." Since, therefore, we know but in part, we ought to leave all sorts of [difficult] questions in the hands of Him who in some measure, [and that only,] bestows grace on us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"

[[commentary]]
quote='''
Thus, therefore, was God revealed; for God the Father is shown forth through all these [operations], the Spirit indeed working, and the Son ministering, while the Father was approving, and man's salvation being accomplished. As He also declares through Hosea the prophet: "I," He says, "have multiplied visions, and have used similitudes by the ministry of the prophets." But the apostle expounded this very passage, when he said, "Now there are diversities of gifts, but the same Spirit; and there are differences of ministrations, but the same Lord; and there are diversities of operations, but it is the same God which worketh all in all. But the manifestation of the Spirit is given to every man to profit withal."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
