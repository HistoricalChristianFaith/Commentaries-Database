[[commentary]]
quote='''
And that the Spirit lays hold on the flesh, he says in the same Epistle, "That ye are the epistle of Christ, ministered by us, inscribed not with ink, but with the Spirit of the living God, not in tables of stone, but in the fleshly tables of the heart." If, therefore, in the present time, fleshly hearts are made partakers of the Spirit, what is there astonishing if, in the resurrection, they receive that life which is granted by the Spirit? Of which resurrection the apostle speaks in the Epistle to the Philippians: "Having been made conformable to His death, if by any means I might attain to the resurrection which is from the dead." In what other mortal flesh, therefore, can life be understood as being manifested, unless in that substance which is also put to death on account of that confession which is made of God?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
