[[commentary]]
quote='''
Neither, for a like reason, would he have given them baptism so readily, had he not heard them prophesying when the Holy Ghost rested upon them. And therefore did he exclaim, "Can any man forbid water, that these should not be baptized, who have received the Holy Ghost as well as we?" He persuaded, at the same time, those that were with him, and pointed out that, unless the Holy Ghost had rested upon them, there might have been some one who would have raised objections to their baptism.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"


[[commentary]]
quote='''
...indicating by these words, that he would not have come to them unless he had been commanded. Neither, for a like reason, would he have given them baptism so readily, had he not heard them prophesying when the Holy Ghost rested upon them. And therefore did he exclaim, "Can any man forbid water, that these should not be baptized, who have received the Holy Ghost as well as we?" He persuaded, at the same time, those that were with him, and pointed out that, unless the Holy Ghost had rested upon them, there might have been some one who would have raised objections to their baptism.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
