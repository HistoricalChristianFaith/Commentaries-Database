[[commentary]]
quote='''
For, as much as God is in want of nothing, so much does man stand in need of fellowship with God. For this is the glory of man, to continue and remain permanently in God's service. Wherefore also did the Lord say to His disciples, "Ye have not chosen Me, but I have chosen you;" indicating that they did not glorify Him when they followed Him; but that, in following the Son of God, they were glorified by Him. And again, "I will, that where I am, there they also may be, that they may behold My glory;" not vainly boasting because of this, but desiring that His disciples should share in His glory...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
