[[commentary]]
quote='''
Paul, when writing to the Romans, has explained this very point: "Paul, an apostle of Jesus Christ, predestinated unto the Gospel of God, which He had promised by His prophets in the holy Scriptures, concerning His Son, who was made to Him of the seed of David according to the flesh, who was predestinated the Son of God with power through the Spirit of holiness, by the resurrection from the dead of our Lord Jesus Christ." And again, writing to the Romans about Israel, he says: "Whose are the fathers, and from whom is Christ according to the flesh, who is God over all, blessed for ever." And again, in his Epistle to the Galatians, he says: "But when the fulness of time had come, God sent forth His Son, made of a woman, made under the law, to redeem them that were under the law, that we might receive the adoption;" plainly indicating one God, who did by the prophets make promise of the Son, and one Jesus Christ our Lord, who was of the seed of David according to His birth from Mary; and that Jesus Christ was appointed the Son of God with power, according to the Spirit of holiness, by the resurrection from the dead, as being the first begotten in all the creation; the Son of God being made the Son of man, that through Him we may receive the adoption,-humanity sustaining, and receiving, and embracing the Son of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
With Him is nothing incomplete or out of due season, just as with the Father there is nothing incongruous. For all these things were foreknown by the Father; but the Son works them out at the proper time in perfect order and sequence. This was the reason why, when Mary was urging [Him] on to [perform] the wonderful miracle of the wine, and was desirous before the time to partake of the cup of emblematic significance, the Lord, checking her untimely haste, said, "Woman, what have I to do with thee? mine hour is not yet come"-waiting for that hour which was foreknown by the Father. This is also the reason why, when men were often desirous to take Him, it is said, "No man laid hands upon Him, for the hour of His being taken was not yet come;" nor the time of His passion, which had been foreknown by the Father; as also says the prophet Habakkuk, "By this Thou shalt be known when the years have drawn nigh; Thou shalt be set forth when the time comes; because my soul is disturbed by anger, Thou shalt remember Thy mercy." Paul also says: "But when the fulness of time came, God sent forth His Son." By which is made manifest, that all things which had been foreknown of the Father, our Lord did accomplish in their order, season, and hour, foreknown and fitting, being indeed one and the same, but rich and great. For He fulfils the bountiful and comprehensive will of His Father, inasmuch as He is Himself the Saviour of those who are saved, and the Lord of those who are under authority, and the God of all those things which have been formed, the only-begotten of the Father, Christ who was announced, and the Word of God, who became incarnate when the fulness of time had come, at which the Son of God had to become the Son of man.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
Those, therefore, who allege that He took nothing from the Virgin do greatly err, [since,] in order that they may cast away the inheritance of the flesh, they also reject the analogy [between Him and Adam]. For if the one [who sprang] from the earth had indeed formation and substance from both the hand and workmanship of God, but the other not from the hand and workmanship of God, then He who was made after the image and likeness of the former did not, in that case, preserve the analogy of man, and He must seem an inconsistent piece of work, not having wherewith He may show His wisdom. But this is to say, that He also appeared putatively as man when He was not man, and that He was made man while taking nothing from man. For if He did not receive the substance of flesh from a human being, He neither was made man nor the Son of man; and if He was not made what we were, He did no great thing in what He suffered and endured. But every one will allow that we are [composed of] a body taken from the earth, and a soul receiving spirit from God. This, therefore, the Word of God was made, recapitulating in Himself His own handiwork; and on this account does He confess Himself the Son of man, and blesses "the meek, because they shall inherit the earth." The Apostle Paul, moreover, in the Epistle to the Galatians, declares plainly, "God sent His Son, made of a woman." And again, in that to the Romans, he says, "Concerning His Son, who was made of the seed of David according to the flesh, who was predestinated as the Son of God with power, according to the spirit of holiness, by the resurrection from the dead, Jesus Christ our Lord."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
He has therefore, in His work of recapitulation, summed up all things, both waging war against our enemy, and crushing him who had at the beginning led us away captives in Adam, and trampled upon his head, as thou canst perceive in Genesis that God said to the serpent, "And I will put enmity between thee and the woman, and between thy seed and her seed; He shall be on the watch for (observabit) thy head, and thou on the watch for His heel." For from that time, He who should be born of a woman, [namely] from the Virgin, after the likeness of Adam, was preached as keeping watch for the head of the serpent. This is the seed of which the apostle says in the Epistle to the Galatians, "that the law of works was established until the seed should come to whom the promise was made." This fact is exhibited in a still clearer light in the same Epistle, where he thus speaks: "But when the fulness of time was come, God sent forth His Son, made of a woman." For indeed the enemy would not have been fairly vanquished, unless it had been a man [born] of a woman who conquered him. For it was by means of a woman that he got the advantage over man at first, setting himself up as man's opponent. And therefore does the Lord profess Himself to be the Son of man, comprising in Himself that original man out of whom the woman was fashioned (ex quo ea quae secundum mulierem est plasmatio facta est), in order that, as our species went down to death through a vanquished man, so we may ascend to life again through a victorious one; and as through a man death received the palm [of victory] against us, so again by a man we may receive the palm against death.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
