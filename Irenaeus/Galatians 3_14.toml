[[commentary]]
quote='''
For thus it had behoved the sons of Abraham [to be], whom God has raised up to him from the stones, and caused to take a place beside him who was made the chief and the forerunner of our faith (who did also receive the covenant of circumcision, after that justification by faith which had pertained to him, when he was yet in uncircumcision, so that in him both covenants might be prefigured, that he might be the father of all who follow the Word of God, and who sustain a life of pilgrimage in this world, that is, of those who from among the circumcision and of those from among the uncircumcision are faithful, even as also "Christ is the chief corner-stone" sustaining all things); and He gathered into the one faith of Abraham those who, from either covenant, are eligible for God's building. But this faith which is in uncircumcision, as connecting the end with the beginning, has been made [both] the first and the last. For, as I have shown, it existed in Abraham antecedently to circumcision, as it also did in the rest of the righteous who pleased God: and in these last times, it again sprang up among mankind through the coming of the Lord. But circumcision and the law of works occupied the intervening period.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
