[[commentary]]
quote='''
For the Lord, revealing Himself to His disciples, that He Himself is the Word, who imparts knowledge of the Father, and reproving the Jews, who imagined that they had [the knowledge of] God, while they nevertheless rejected His Word, through whom God is made known, declared, "No man knoweth the Son, but the Father; neither knoweth any man the Father, save the Son, and he to whom the Son has willed to reveal [Him]."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
But the Son, administering all things for the Father, works from the beginning even to the end, and without Him no man can attain the knowledge of God. For the Son is the knowledge of the Father; but the knowledge of the Son is in the Father, and has been revealed through the Son; and this was the reason why the Lord declared: "No man knoweth the Son, but the Father; nor the Father, save the Son, and those to whomsoever the Son shall reveal [Him]." For "shall reveal" was said not with reference to the future alone, as if then [only] the Word had begun to manifest the Father when He was born of Mary, but it applies indifferently throughout all time. For the Son, being present with His own handiwork from the beginning, reveals the Father to all; to whom He wills, and when He wills, and as the Father wills. Wherefore, then, in all things, and through all things, there is one God, the Father, and one Word, and one Son, and one Spirit, and one salvation to all who believe in Him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
Vain, therefore, are those who, because of that declaration, "No man knoweth the Father, but the Son," do introduce another unknown Father.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
