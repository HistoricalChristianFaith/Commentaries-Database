[[commentary]]
quote='''
These [heretics now referred to], being the disciples of those mentioned, render such as assent to them worse than the heathen. For the former "serve the creature rather than the Creator," and "those which are not gods," notwithstanding that they ascribe the first place in Deity to that God who was the Maker of this universe. But the latter maintain that He, [i.e., the Creator of this world,] is the fruit of a defect, and describe Him as being of an animal nature, and as not knowing that Power which is above Him, while He also exclaims, "I am God, and besides Me there is no other God." Affirming that He lies, they are themselves liars, attributing all sorts of wickedness to Him; and conceiving of one who is not above this Being as really having an existence, they are thus convicted by their own views of blasphemy against that God who really exists, while they conjure into existence a god who has no existence, to their own condemnation. And thus those who declare themselves "perfect," and as being possessed of the knowledge of all things, are found to be worse than the heathen, and to entertain more blasphemous opinions even against their own Creator.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"

[[commentary]]
quote='''
And the Apostle Paul also, saying, "For though ye have served them which are no gods; ye now know God, or rather, are known of God," has made a separation between those that were not [gods] and Him who is God. And again, speaking of Antichrist, he says, "who opposeth and exalteth himself above all that is called God, or that is worshipped." He points out here those who are called gods, by such as know not God, that is, idols. For the Father of all is called God, and is so; and Antichrist shall be lifted up, not above Him, but above those which are indeed called gods, but are not. And Paul himself says that this is true: "We know that an idol is nothing, and that there is none other God but one. For though there be that are called gods, whether in heaven or in earth; yet to us there is but one God, the Father, of whom are all things, and we through Him; and one Lord Jesus Christ, by whom are all things, and we by Him." For he has made a distinction, and separated those which are indeed called gods, but which are none, from the one God the Father, from whom are all things, and, he has confessed in the most decided manner in his own person, one Lord Jesus Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
