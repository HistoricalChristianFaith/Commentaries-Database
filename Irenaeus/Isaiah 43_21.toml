[[commentary]]
quote='''
And those of them who declare that God would make a new covenant with men, not such as that which He made with the fathers at Mount Horeb, and would give to men a new heart and a new spirit; and again, "And remember ye not the things of old: behold, I make new things which shall now arise, and ye shall know it; and I will make a way in the desert, and riven in a dry land, to give drink to my chosen people, my people whom I have acquired, that they may show forth my praise," -plainly announced that liberty which distinguishes the new covenant, and the new wine which is put into new bottles, [that is], the faith which is in Christ, by which He has proclaimed the way of righteousness sprung up in the desert, and the streams of the Holy Spirit in a dry land, to give water to the elect people of God, whom He has acquired, that they might show forth His praise, but not that they might blaspheme Him who made these things, that is, God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:33.14"
