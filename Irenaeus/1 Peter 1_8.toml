[[commentary]]
quote='''
And Paul declares: "Not that I have already attained, or that I am justified, or already have been made perfect. For we know in part, and we prophesy in part; but when that which is perfect has come, the things which are in part shall be done away." As, therefore, when that which is perfect is come, we shall not see another Father, but Him whom we now desire to see (for "blessed are the pure in heart: for they shall see God"); neither shall we look for another Christ and Son of God, but Him who [was born] of the Virgin Mary, who also suffered, in whom too we trust, and whom we love; as Esaias says: "And they shall say in that day, Behold our Lord God, in whom we have trusted, and we have rejoiced in our salvation;" and Peter says in his Epistle: "Whom, not seeing, ye love; in whom, though now ye see Him not, ye have believed, ye shall rejoice with joy unspeakable;" neither do we receive another Holy Spirit, besides Him who is with us, and who cries, "Abba, Father;" and we shall make increase in the very same things [as now], and shall make progress, so that no longer through a glass, or by means of enigmas, but face to face, we shall enjoy the gifts of God...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"


[[commentary]]
quote='''
"For now," he says, "we know in part, and we prophesy in part, but then face to face." And this it is which has been said also by Peter: "Whom having not seen, ye love; in whom now also, not seeing, ye believe; and believing, ye shall rejoice with joy unspeakable." For our face shall see the face of the Lord and shall rejoice with joy unspeakable,-that is to say, when it shall behold its own Delight.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
