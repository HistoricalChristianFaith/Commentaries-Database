[[commentary]]
quote='''
For no persons of any kind would act properly, if they should advise blind men, just about to fall over a precipice, to continue their most dangerous path, as if it were the right one, and as if they might go on in safety. Or what medical man, anxious to heal a sick person, would prescribe in accordance with the patient's whims, and not according to the requisite medicine? But that the Lord came as the physician of the sick, He does Himself declare saying, "They that are whole need not a physician, but they that are sick; I came not to call the righteous, but sinners to repentance." How then shall the sick be strengthened, or how shall sinners come to repentance? Is it by persevering in the very same courses? or, on the contrary, is it by undergoing a great change and reversal of their former mode of living, by which they have brought upon themselves no slight amount of sickness, and many sins? But ignorance, the mother of all these, is driven out by knowledge. Wherefore the Lord used to impart knowledge to His disciples, by which also it was His practice to heal those who were suffering, and to keep back sinners from sin. He therefore did not address them in accordance with their pristine notions, nor did He reply to them in harmony with the opinion of His questioners, but according to the doctrine leading to salvation, without hypocrisy or respect of person.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
