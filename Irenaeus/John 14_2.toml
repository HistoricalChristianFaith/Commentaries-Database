[[commentary]]
quote='''
...making in His own person the first-fruits of the resurrection of man; that, as the Head rose from the dead, so also the remaining part of the body-[namely, the body] of every man who is found in life-when the time is fulfilled of that condemnation which existed by reason of disobedience, may arise, blended together and strengthened through means of joints and bands by the increase of God, each of the members having its own proper and fit position in the body. For there are many mansions in the Father's house, inasmuch as there are also many members in the body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="Against Heresies Book 3.19.3"


[[commentary]]
quote='''
[They say, moreover], that there is this distinction between the habitation of those who produce an hundred-fold, and that of those who produce sixty-fold, and that of those who produce thirty-fold: for the first will be taken up into the heavens, the second will dwell in paradise, the last will inhabit the city; and that was on this account the Lord declared, "In My Father's house are many mansions." For all things belong to God, who supplies all with a suitable dwelling-place; even as His Word says, that a share is allotted to all by the Father, according as each person is or shall be worthy. And this is the couch on which the guests shall recline, having been invited to the wedding. The presbyters, the disciples of the apostles, affirm that this is the gradation and arrangement of those who are saved, and that they advance through steps of this nature; also that they ascend through the Spirit to the Son, and through the Son to the Father, and that in due time the Son will yield up His work to the Father...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="AGAINST HERESIES 5.36.2"
