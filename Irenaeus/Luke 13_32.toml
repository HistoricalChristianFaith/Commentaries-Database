[[commentary]]
quote='''
And therefore did the Lord term those whom He knew to be the offspring of men "a generation of vipers;" because after the manner of these animals they go about in subtilty, and injure others. For He said, "Beware of the leaven of the Pharisees and of the Sadducees." Speaking of Herod, too, He says, "Go ye and tell that fox," aiming at his wicked cunning and deceit.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
