[[commentary]]
quote='''
"Thy throne, O God, is for ever and ever; the sceptre of Thy kingdom is a right sceptre. Thou hast loved righteousness, and hated iniquity: therefore God, Thy God, hath anointed Thee." For the Spirit designates both [of them] by the name of God-both Him who is anointed as Son, and Him who does anoint, that is, the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="AGAINST HERESIES 3:6.1"
