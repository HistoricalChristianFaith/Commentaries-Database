[[commentary]]
quote='''
For, while I was yet a boy, I saw thee in Lower Asia with Polycarp, distinguishing thyself in the royal court, and endeavouring to gain his approbation. For I have a more vivid recollection of what occurred at that time than of recent events (inasmuch as the experiences of childhood, keeping pace with the growth of the soul, become incorporated with it); so that I can even describe the place where the blessed Polycarp used to sit and discourse-his going out, too, and his coming in-his general mode of life and personal appearance, together with the discourses which he delivered to the people; also how he would speak of his familiar intercourse with John, and with the rest of those who had seen the Lord; and how he would call their words to remembrance. Whatsoever things he had heard from them respecting the Lord, both with regard to His miracles and His teaching, Polycarp having thus received [information] from the eye-witnesses of the Word of life, would recount them all in harmony with the Scriptures.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FFragments%2520from%2520the%2520Lost%2520Writings%2520of%2520Irenaeus.html"
source_title="Fragments from the Lost Writings of Irenaeus"
