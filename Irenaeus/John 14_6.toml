[[commentary]]
quote='''
He is therefore one and the same God, who called Abraham and gave him the promise. But He is the Creator, who does also through Christ prepare lights in the world, [namely] those who believe from among the Gentiles. And He says, "Ye are the light of the world;" that is, as the stars of heaven. Him, therefore, I have rightly shown to be known by no man, unless by the Son, and to whomsoever the Son shall reveal Him. But the Son reveals the Father to all to whom He wills that He should be known; and neither without the goodwill of the Father nor without the agency of the Son, can any man know God. Wherefore did the Lord say to His disciples, "I am the way, the truth, and the life and no man cometh unto the Father but by Me. If ye had known Me, ye would have known My Father also: and from henceforth ye have both known Him, and have seen Him." From these words it is evident, that He is known by the Son, that is, by the Word.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"


[[commentary]]
quote='''
Since, therefore, the tradition from the apostles does thus exist in the Church, and is permanent among us, let us revert to the Scrip-rural proof furnished by those apostles who did also write the Gospel, in which they recorded the doctrine regarding God, pointing out that our Lord Jesus Christ is the truth, and that no lie is in Him. As also David says, prophesying His birth from a virgin, and the resurrection from the dead, "Truth has sprung out of the earth." The apostles, likewise, being disciples of the truth, are above all falsehood; for a lie has no fellowship with the truth, just as darkness has none with light, but the presence of the one shuts out that of the other. Our Lord, therefore, being the truth, did not speak lies...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"


[[commentary]]
quote='''
But when this name of six letters was manifested (the person bearing it clothing Himself in flesh, that He might come under the apprehension of man's senses, and having in Himself these six and twenty-four letters), then, becoming acquainted with Him, they ceased from their ignorance, and passed from death unto life, this name serving as their guide to the Father of truth. For the Father of all had resolved to put an end to ignorance, and to destroy death. But this abolishing of ignorance was just the knowledge of Him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
