[[commentary]]
quote='''
For there is no coercion with God, but a good will [towards us] is present with Him continually. And therefore does He give good counsel to all. And in man, as well as in angels, He has placed the power of choice (for angels are rational beings), so that those who had yielded obedience might justly possess what is good, given indeed by God, but preserved by themselves. ... But because man is possessed of free will from the beginning, and God is possessed of free will, in whose likeness man was created, advice is always given to him to keep fast the good, which thing is done by means of obedience to God. And not merely in works, but also in faith, has God preserved the will of man free and under his own control, saying, "According to thy faith be it unto thee;" thus showing that there is a faith specially belonging to man, since he has an opinion specially his own. And again, "All things are possible to him that believeth;" and, "Go thy way; and as thou hast believed, so be it done unto thee." Now all such expressions demonstrate that man is in his own power with respect to faith. And for this reason, "he that believeth in Him has eternal life while he who believeth not the Son hath not eternal life, but the wrath of God shall remain upon him." In the same manner therefore the Lord, both showing His own goodness, and indicating that man is in his own free will and his own power, said to Jerusalem, "How often have I wished to gather thy children together, as a hen [gathereth] her chickens under her wings, and ye would not! Wherefore your house shall be left unto you desolate."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies (Book IV, Chapter 37)"
