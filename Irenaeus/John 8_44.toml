[[commentary]]
quote='''
Moreover, since God rules over men and him too, and without the will of our Father in heaven not even a sparrow falls to the ground, it follows that his declaration, "All these things are delivered unto me, and to whomsoever I will I give them," proceeds from him when puffed up with pride. For the creation is not subjected to his power, since indeed he is himself but one among created things. Nor shall he give away the rule over men to men; but both all other things, and all human affairs, are arranged according to God the Father's disposal. Besides, the Lord declares that "the devil is a liar from the beginning, and the truth is not in him." If then he be a liar and the truth be not in him, he certainly did not speak truth, but a lie, when he said, "For all these things are delivered to me, and to whomsoever I will I give them."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"


[[commentary]]
quote='''
He had indeed been already accustomed to lie against God, for the purpose of leading men astray. For at the beginning, when God had given to man a variety of things for food, while He commanded him not to eat of one tree only, as the Scripture tells us that God said to Adam: "From every tree which is in the garden thou shalt eat food; but from the tree of knowledge of good and evil, from this ye shall not eat: for in the day that ye shall eat of it, ye shall die by death;" he then, lying against the Lord, tempted man, as the Scripture says that the serpent said to the woman: "Has God indeed said this, Ye shall not eat from every tree of the garden?" And when she had exposed the falsehood, and simply related the command, as He had said, "From every tree of the garden we shall eat; but of the fruit of the tree which is in the midst of the garden, God hath said, Ye shall not eat of it, neither shall ye touch it, lest ye die:" when he had [thus] learned from the woman the command of God, having brought his cunning into play, he finally deceived her by a falsehood, saying, "Ye shall not die by death; for God knew that in the day ye shall eat of it your eyes shall be opened, and ye shall be as gods, knowing good and evil." In the first place, then, in the garden of God he disputed about God, as if God was not there, for he was ignorant of the greatness of God; and then, in the next place, after he had learned from the woman that God had said that they should die if they tasted the aforesaid tree, opening his mouth, he uttered the third falsehood, "Ye shall not die by death." But that God was true, and the serpent a liar, was proved by the result, death having passed upon them who had eaten. For along with the fruit they did also fall under the power of death, because they did eat in disobedience; and disobedience to God entails death. Wherefore, as they became forfeit to death, from that [moment] they were handed over to it. ...For they died who tasted of the tree; and the serpent is proved a liar and a murderer, as the Lord said of him: "For he is a murderer from the beginning, and the truth is not in him."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
