[[commentary]]
quote='''
And again, the Lord replied to Philip, who wished to behold the Father, "Have I been so long a time with you, and yet thou hast not known Me, Philip? He that sees Me, sees also the Father; and how sayest thou then, Show us the Father? For I am in the Father, and the Father in Me; and henceforth ye know Him, and have seen Him." To these men, therefore, did the Lord bear witness, that in Himself they had both known and seen the Father (and the Father is truth). To allege, then, that these men did not know the truth, is to act the part of false witnesses, and of those who have been alienated from the doctrine of Christ. For why did the Lord send the twelve apostles to the lost sheep of the house of Israel, if these men did not know the truth? How also did the seventy preach, unless they had themselves previously known the truth of what was preached? Or how could Peter have been in ignorance, to whom the Lord gave testimony, that flesh and blood had not revealed to him, but the Father, who is in heaven? Just, then, as "Paul [was] an apostle, not of men, neither by man, but by Jesus Christ, and God the Father," [so with the rest;] the Son indeed leading them to the Father, but the Father revealing to them the Son.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"


[[commentary]]
quote='''
For no one can know the Father, unless through the Word of God, that is, unless by the Son revealing [Him]; neither can he have knowledge of the Son, unless through the good pleasure of the Father. But the Son performs the good pleasure of the Father; for the Father sends, and the Son is sent, and comes. And His Word knows that His Father is, as far as regards us, invisible and infinite; and since He cannot be declared [by any one else], He does Himself declare Him to us; and, on the other hand, it is the Father alone who knows His own Word. And both these truths has our Lord declared. Wherefore the Son reveals the knowledge of the Father through His own manifestation. For the manifestation of the Son is the knowledge of the Father; for all things are manifested through the Word. In order, therefore, that we might know that the Son who came is He who imparts to those believing on Him a knowledge of the Father, He said to His disciples: "No man knoweth the Son but the Father, nor the Father but the Son, and those to whomsoever the Son shall reveal Him;" thus setting Himself forth and the Father as He [really] is, that we may not receive any other Father, except Him who is revealed by the Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="Against Heresies Book IV"
