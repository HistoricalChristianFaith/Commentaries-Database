[[commentary]]
quote='''
For as by the disobedience of the one man who was originally moulded from virgin soil, the many were made sinners, and forfeited life; so was it necessary that, by the obedience of one man, who was originally born from a virgin, many should be justified and receive salvation. Thus, then, was the Word of God made man, as also Moses says: "God, true are His works." But if, not having been made flesh, He did appear as if flesh, His work was not a true one. But what He did appear, that He also was: God recapitulated in Himself the ancient formation of man, that He might kill sin, deprive death of its power, and vivify man; and therefore His works are true.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
For as by one man's disobedience sin entered, and death obtained [a place] through sin; so also by the obedience of one man, righteousness having been introduced, shall cause life to fructify in those persons who in times past were dead. And as the protoplast himself Adam, had his substance from untilled and as yet virgin soil ("for God had not yet sent rain, and man had not tilled the ground"), and was formed by the hand of God, that is, by the Word of God, for "all things were made by Him," and the Lord took dust from the earth and formed man; so did He who is the Word, recapitulating Adam in Himself, rightly receive a birth, enabling Him to gather up Adam [into Himself], from Mary, who was as yet a virgin.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
