[[commentary]]
quote='''
From the words of Peter, therefore, which he addressed in Caesarea to Cornelius the centurion, and those Gentiles with him, to whom the word of God was first preached, we can understand what the apostles used to preach, the nature of their preaching, and their idea with regard to God. For this Cornelius was, it is said, "a devout man, and one who feared God with all his house, giving much alms to the people, and praying to God always. He saw therefore, about the ninth hour of the day, an angel of God coming in to him, and saying, Thine alms are come up for a memorial before God. Wherefore send to Simon, who is called Peter."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
