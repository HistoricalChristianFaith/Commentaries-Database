[[commentary]]
quote='''
From the words of Peter, therefore, which he addressed in Caesarea to Cornelius the centurion, and those Gentiles with him, to whom the word of God was first preached, we can understand what the apostles used to preach, the nature of their preaching, and their idea with regard to God. For this Cornelius was, it is said, "a devout man, and one who feared God with all his house, giving much alms to the people, and praying to God always. He saw therefore, about the ninth hour of the day, an angel of God coming in to him, and saying, Thine alms are come up for a memorial before God. Wherefore send to Simon, who is called Peter." But when Peter saw the vision, in which the voice from heaven said to him, "What God hath cleansed, that call not thou common," this happened [to teach him] that the God who had, through the law, distinguished between clean and unclean, was He who had purified the Gentiles through the blood of His Son-He whom also Cornelius worshipped; to whom Peter, coming in, said, "Of a truth I perceive that God is no respecter of persons: but in every nation, he that feareth Him, and worketh righteousness, is acceptable to Him." He thus clearly indicates, that He whom Cornelius had previously feared as God, of whom he had heard through the law and the prophets, for whose sake also he used to give alms, is, in truth, God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
