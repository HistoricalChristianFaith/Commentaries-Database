[[commentary]]
quote='''
As, therefore, we are by the Word formed in the womb, this very same Word formed the visual power in him who had been blind from his birth; showing openly who it is that fashions us in secret, since the Word Himself had been made manifest to men: and declaring the original formation of Adam, and the manner in which he was created, and by what hand he was fashioned, indicating the whole from a part. For the Lord who formed the visual powers is He who made the whole man, carrying out the will of the Father. And inasmuch as man, with respect to that formation which, was after Adam, having fallen into transgression, needed the layer of regeneration, [the Lord] said to him [upon whom He had conferred sight], after He had smeared his eyes with the clay, "Go to Siloam, and wash;" thus restoring to him both [his perfect] confirmation, and that regeneration which takes place by means of the layer. And for this reason when he was washed he came seeing, that he might both know Him who had fashioned him, and that man might learn [to know] Him who has conferred upon him life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
