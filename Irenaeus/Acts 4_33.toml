[[commentary]]
quote='''
The whole Church, it is then said, "when they had heard that, lifted up the voice to God with one accord, and said, Lord, Thou art God, which hast made heaven, and earth, and the sea, and all that in them is; who, through the Holy Ghost, by the mouth of our father David, Thy servant, hast said, Why did the heathen rage, and the people imagine vain things? The kings of the earth stood up, and the rulers were gathered together against the Lord, and against His Christ. For of a truth, in this city, against Thy holy Son Jesus, whom Thou hast anointed, both Herod and Pontius Pilate, with the Gentiles, and the people of Israel, were gathered together, to do whatsoever Thy hand and Thy counsel determined before to be done." These [are the] voices of the Church from which every Church had its origin; these are the voices of the metropolis of the citizens of the new covenant; these are the voices of the apostles; these are voices of the disciples of the Lord, the truly perfect, who, after the assumption of the Lord, were perfected by the Spirit, and called upon the God who made heaven, and earth, and the sea,-who was announced by the prophets,-and Jesus Christ His Son, whom God anointed, and who knew no other [God]. For at that time and place there was neither Valentinus, nor Marcion, nor the rest of these subverters [of the truth], and their adherents. Wherefore God, the Maker of all things, heard them. For it is said, "The place was shaken where they were assembled together; and they were all filled with the Holy Ghost, and they spake the word of God with boldness" to every one that was willing to believe. "And with great power," it is added, "gave the apostles witness of the resurrection of the Lord Jesus," saying to them, "The God of our fathers raised up Jesus, whom ye seized and slew, hanging [Him] upon a beam of wood: Him hath God raised up by His right hand to be a Prince and Saviour, to give repentance to Israel, and forgiveness of sins. And we are in this witnesses of these words; as also is the Holy Ghost, whom God hath given to them that believe in Him." "And daily," it is said, "in the temple, and from house to house, they ceased not to teach and preach Christ Jesus," the Son of God. For this was the knowledge of salvation, which renders those who acknowledge His Son's advent perfect towards God.
'''
source_title="Against Heresies Book 3.12.5"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
