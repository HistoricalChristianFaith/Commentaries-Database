[[commentary]]
quote='''
But they are altogether full of deceit of every kind, apostate inspiration, demoniacal working, and the phantasms of idolatry, and are in reality the predecessors of that dragon who, by means of a deception of the same kind, will with his tail cause a third part of the stars to fall from their place, and will cast them down to the earth. It behoves us to flee from them as we would from him; and the greater the display with which they are said to perform [their marvels], the more carefully should we watch them, as having been endowed with a greater spirit of wickedness.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"

