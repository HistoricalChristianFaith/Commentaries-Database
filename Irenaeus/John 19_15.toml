[[commentary]]
quote='''
If any one, again, will look into Jacob's actions, he shall find them not destitute of meaning, but full of import with regard to the dispensations. Thus, in the first place, at his birth, since he laid hold on his brother's heel, he was called Jacob, that is, the supplanter-one who holds, but is not held; binding the feet, but not being bound; striving and conquering; grasping in his hand his adversary's heel, that is, victory. For to this end was the Lord born, the type of whose birth he set forth beforehand, of whom also John says in the Apocalypse: "He went forth conquering, that He should conquer." In the next place, [Jacob] received the rights of the first-born, when his brother looked on them with contempt; even as also the younger nation received Him, Christ, the first-begotten, when the elder nation rejected Him, saying, "We have no king but Caesar." But in Christ every blessing [is summed up], and therefore the latter people has snatched away the blessings of the former from the Father, just as Jacob took away the blessing of this Esau. For which cause his brother suffered the plots and persecutions of a brother, just as the Church suffers this self-same thing from the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="Against Heresies 4.21.3"
