[[commentary]]
quote='''
Those, however, who are believed to be presbyters by many, but serve their own lusts, and, do not place the fear of God supreme in their hearts, but conduct themselves with contempt towards others, and are puffed up with the pride of holding the chief seat, and work evil deeds in secret, saying, "No man sees us," shall be convicted by the Word, who does not judge after outward appearance (secundum gloriam), nor looks upon the countenance, but the heart; and they shall hear those words, to be found in Daniel the prophet: "O thou seed of Canaan, and not of Judah, beauty hath deceived thee, and lust perverted thy heart. Thou that art waxen old in wicked days, now thy sins which thou hast committed aforetime are come to light; for thou hast pronounced false judgments, and hast been accustomed to condemn the innocent, and to let the guilty go free, albeit the Lord saith, The innocent and the righteous shalt thou not slay." Of whom also did the Lord say: "But if the evil servant shall say in his heart, My lord delayeth his coming, and shall begin to smite the man-servants and maidens, and to eat and drink and be drunken; the lord of that servant shall come in a day that he looketh not for him, and in an hour that he is not aware of, and shall cut him asunder, and appoint him his portion with the unbelievers."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
For this reason the Lord also said, "Let your light so shine before men, that they may see your good deeds, and glorify your Father who is in heaven." And, "Take heed to yourselves, lest perchance your hearts be overcharged with surfeiting, and drunkenness, and worldly cares." And, "Let your loins be girded about, and your lamps burning, and ye like unto men that wait for their Lord, when He returns from the wedding, that when He cometh and knocketh, they may open to Him. Blessed is that servant whom his Lord, when He cometh, shall find so doing." And again, "The servant who knows his Lord's will, and does it not, shall be beaten with many stripes." And, "Why call ye me, Lord, Lord, and do not the things which I say?" And again, "But if the servant say in his heart, The Lord delayeth, and begin to beat his fellow-servants, and to eat, and drink, and to be drunken, his Lord will come in a day on which he does not expect Him, and shall cut him in sunder, and appoint his portion with the hypocrites." All such passages demonstrate the independent will of man, and at the same time the counsel which God conveys to him, by which He exhorts us to submit ourselves to Him, and seeks to turn us away from [the sin of] unbelief against Him, without, however, in any way coercing us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
