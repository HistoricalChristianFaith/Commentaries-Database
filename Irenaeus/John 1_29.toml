[[commentary]]
quote='''
For this is the knowledge of salvation which was wanting to them, that of the Son of God, which John made known, saying, "Behold the Lamb of God, who taketh away the sin of the world. This is He of whom I said, After me cometh a man who was made before me; because He was prior to me: and of His fulness have all we received." This, therefore, was the knowledge of salvation; but [it did not consist in] another God, nor another Father, nor Bythus, nor the Pleroma of thirty Aeons, nor the Mother of the (lower) Ogdoad: but the knowledge of salvation was the knowledge of the Son of God, who is both called and actually is, salvation, and Saviour, and salutary. Salvation, indeed, as follows: "I have waited for Thy salvation, O Lord." And then again, Saviour: "Behold my God, my Saviour, I will put my trust in Him." But as bringing salvation, thus: "God hath made known His salvation (salutare) in the sight of the heathen." For He is indeed Saviour, as being the Son and Word of God; but salutary, since [He is] Spirit; for he says: "The Spirit of our countenance, Christ the Lord." But salvation, as being flesh: for "the Word was made flesh, and dwelt among us." This knowledge of salvation, therefore, John did impart to those repenting, and believing in the Lamb of God, who taketh away the sin of the world.
'''
source_title="Against Heresies Book III"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
