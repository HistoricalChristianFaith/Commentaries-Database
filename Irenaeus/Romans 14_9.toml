[[commentary]]
quote='''
As it has been clearly demonstrated that the Word, who existed in the beginning with God, by whom all things were made, who was also always present with mankind, was in these last days, according to the time appointed by the Father, united to His own workmanship, inasmuch as He became a man liable to suffering, [it follows] that every objection is set aside of those who say, "If our Lord was born at that time, Christ had therefore no previous existence." For I have shown that the Son of God did not then begin to exist, being with the Father from the beginning; but when He became incarnate, and was made man, He commenced afresh the long line of human beings, and furnished us, in a brief, comprehensive manner, with salvation; so that what we had lost in Adam-namely, to be according to the image and likeness of God-that we might recover in Christ Jesus.

For as it was not possible that the man who had once for all been conquered, and who had been destroyed through disobedience, could reform himself, and obtain the prize of victory; and as it was also impossible that he could attain to salvation who had fallen under the power of sin,-the Son effected both these things, being the Word of God, descending from the Father, becoming incarnate, stooping low, even to death, and consummating the arranged plan of our salvation, upon whom [Paul], exhorting us unhesitatingly to believe, again says, "Who shall ascend into heaven? that is, to bring down Christ; or who shall descend into the deep? that is, to liberate Christ again from the dead." Then he continues, "If thou shall confess with thy mouth the Lord Jesus, and shalt believe in thine heart that God hath raised Him from the dead, thou shall be saved." And he renders the reason why the Son of God did these things, saying, "For to this end Christ both lived, and died, and revived, that He might rule over the living and the dead."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Irenaeus Against Heresies Book 3"
