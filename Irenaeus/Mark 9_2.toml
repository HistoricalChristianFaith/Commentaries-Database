[[commentary]]
quote='''
He asserts that the fruit of this arrangement and analogy has been manifested in the likeness of an image, namely, Him who, after six days, ascended into the mountain along with three others, and then became one of six (the sixth), in which character He descended and was contained in the Hebdomad, since He was the illustrious Ogdoad, and contained in Himself the entire number of the elements, which the descent of the dove (who is Alpha and Omega) made clearly manifest, when He came to be baptized; for the number of the dove is eight hundred and one. And for this reason did Moses declare that man was formed on the sixth day; and then, again, according to arrangement, it was on the sixth day, which is the preparation, that the last man appeared, for the regeneration of the first, Of this arrangement, both the beginning and the end were formed at that sixth hour, at which He was nailed to the tree. For that perfect being Nous, knowing that the number six had the power both of formation and regeneration, declared to the children of light, that regeneration which has been wrought out by Him who appeared as the Episemon in regard to that number. Whence also he declares it is that the double letters contain the Episemon number; for this Episemon, when joined to the twenty-four elements, completed the name of thirty letters.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
