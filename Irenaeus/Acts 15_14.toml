[[commentary]]
quote='''
This is shown in a still clearer light from the letter of the apostles, which they forwarded neither to the Jews nor to the Greeks, but to those who from the Gentiles believed in Christ, confirming their faith. For when certain men had come down from Judea to Antioch-where also, first of all, the Lord's disciples were called Christians, because of their faith in Christ-and sought to persuade those who had believed on the Lord to be circumcised, and to perform other things after the observance of the law; and when Paul and Barnabas had gone up to Jerusalem to the apostles on account of this question, and the whole Church had convened together, Peter thus addressed them: "Men, brethren, ye know how that from the days of old God made choice among you, that the Gentiles by my mouth should hear the word of the Gospel, and believe. And God, the Searcher of the heart, bare them witness, giving them the Holy Ghost, even as to us; and put no difference between us and them, purifying their hearts by faith. Now therefore why tempt ye God, to impose a yoke upon the neck of the disciples, which neither our fathers nor we were able to bear? But we believe that, through the grace of our Lord Jesus Christ, we are to be saved, even as they." After him James spoke as follows: "Men, brethren, Simon hath declared how God did purpose to take from among the Gentiles a people for His name. And thus do the words of the prophets agree, as it is written, After this I will return, and will build again the tabernacle of David, which is fallen down; and I will build the ruins thereof, and I will set it up: that the residue of men may seek after the Lord, and all the Gentiles, among whom my name has been invoked, saith the Lord, doing these things. Known from eternity is His work to God. Wherefore I for my part give judgment, that we trouble not them who from among the Gentiles are turned to God: but that it be enjoined them, that they do abstain from the vanities of idols, and from fornication, and from blood; and whatsoever they wish not to be done to themselves, let them not do to others." ... From all these passages, then, it is evident that they did not teach the existence of another Father, but gave the new covenant of liberty to those who had lately believed in God by the Holy Spirit. But they clearly indicated, from the nature of the point debated by them, as to whether or not it were still necessary to circumcise the disciples, that they had no idea of another god.
'''
source_title="Against Heresies Book 3"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
