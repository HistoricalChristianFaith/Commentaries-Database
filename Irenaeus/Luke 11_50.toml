[[commentary]]
quote='''
For if the flesh were not in a position to be saved, the Word of God would in no wise have become flesh. And if the blood of the righteous were not to be inquired after, the Lord would certainly not have had blood [in His composition]. But inasmuch as blood cries out from the beginning [of the world], God said to Cain, when he had slain his brother, "The voice of thy brother's blood crieth to Me." And as their blood will be inquired after, He said to those with Noah, "For your blood of your souls will I require, [even] from the hand of all beasts;" and again, "Whosoever will shed man's blood, it shall be shed for his blood." In like manner, too, did the Lord say to those who should afterwards shed His blood, "All righteous blood shall be required which is shed upon the earth, from the blood of righteous Abel to the blood of Zacharias the son of Barachias, whom ye slew between the temple and the altar. Verily I say unto you, All these things shall come upon this generation." He thus points out the recapitulation that should take place in His own person of the effusion of blood from the beginning, of all the righteous men and of the prophets, and that by means of Himself there should be a requisition of their blood. Now this [blood] could not be required unless it also had the capability of being saved; nor would the Lord have summed up these things in Himself, unless He had Himself been made flesh and blood after the way of the original formation [of man], saving in His own person at the end that which had in the beginning perished in Adam.
'''
source_title="Irenaeus Against Heresies Book 5"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
