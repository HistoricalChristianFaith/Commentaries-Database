[[commentary]]
quote='''
"He asked life of Thee, and Thou gavest him length of days for ever and ever;" indicating that it is the Father of all who imparts continuance for ever and ever on those who are saved. For life does not arise from us, nor from our own nature; but it is bestowed according to the grace of God. And therefore he who shall preserve the life bestowed upon him, and give thanks to Him who imparted it, shall receive also length of days for ever and ever. But he who shall reject it, and prove himself ungrateful to his Maker, inasmuch as he has been created, and has not recognised Him who bestowed [the gift upon him], deprives himself of [the privilege of] continuance for ever and ever.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html'
source_title="AGAINST HERESIES 2:34.3"
