[[commentary]]
quote='''
Then Daniel also says this very thing: "And the kingdom and dominion, and the greatness of those under the heaven, is given to the saints of the Most High God, whose kingdom is everlasting, and all dominions shall serve and obey Him." And lest the promise named should be understood as referring to this time, it was declared to the prophet: "And come thou, and stand in thy lot at the consummation of the days."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="Against Heresies Book V"
