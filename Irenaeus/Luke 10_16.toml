[[commentary]]
quote='''
Faithfully and strenuously shalt thou resist them in defence of the only true and life-giving faith, which the Church has received from the apostles and imparted to her sons. For the Lord of all gave to His apostles the power of the Gospel, through whom also we have known the truth, that is, the doctrine of the Son of God; to whom also did the Lord declare: "He that heareth you, heareth Me; and he that despiseth you, despiseth Me, and Him that sent Me."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
