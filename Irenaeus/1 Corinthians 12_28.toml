[[commentary]]
quote='''
For all the other prophets preached the advent of the paternal Light, and desired to be worthy of seeing Him whom they preached; but John did both announce [the advent] beforehand, in a like manner as did the others, and actually saw Him when He came, and pointed Him out, and persuaded many to believe on Him, so that he did himself hold the place of both prophet and apostle. For this is to be more than a prophet, because, "first apostles, secondarily prophets;" but all things from one and the same God Himself.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
For this gift of God has been entrusted to the Church, as breath was to the first created man, for this purpose, that all the members receiving it may be vivified; and the [means of] communion with Christ has been distributed throughout it, that is, the Holy Spirit, the earnest of incorruption, the means of confirming our faith, and the ladder of ascent to God. "For in the Church," it is said, "God hath set apostles, prophets, teachers," and all the other means through which the Spirit works; of which all those are not partakers who do not join themselves to the Church, but defraud themselves of life through their perverse opinions and infamous behaviour. For where the Church is, there is the Spirit of God; and where the Spirit of God is, there is the Church, and every kind of grace; but the Spirit is truth. Those, therefore, who do not partake of Him, are neither nourished into life from the mother's breasts, nor do they enjoy that most limpid fountain which issues from the body of Christ; but they dig for themselves broken cisterns out of earthly trenches, and drink putrid water out of the mire, fleeing from the faith of the Church lest they be convicted; and rejecting the Spirit, that they may not be instructed.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
Paul then, teaching us where one may find such, says, "God hath placed in the Church, first, apostles; secondly, prophets; thirdly, teachers." Where, therefore, the gifts of the Lord have been placed, there it behoves us to learn the truth, [namely,] from those who possess that succession of the Church which is from the apostles, and among whom exists that which is sound and blameless in conduct, as well as that which is unadulterated and incorrupt in speech. For these also preserve this faith of ours in one God who created all things; and they increase that love [which we have] for the Son of God, who accomplished such marvellous dispensations for our sake: and they expound the Scriptures to us without danger, neither blaspheming God, nor dishonouring the patriarchs, nor despising the prophets.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
