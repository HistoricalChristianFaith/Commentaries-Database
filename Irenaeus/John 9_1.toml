[[commentary]]
quote='''
They also maintain that the Saviour exhibited an emblem of this mystery in the case of that man who was blind from his birth, since the Aeon was in this manner produced by Monogenes blind, that is, in ignorance, thus falsely ascribing ignorance and blindness to the Word of God, who, according to their own theory, holds the second [place of] production from the Propator. Admirable sophists, and explorers of the sublimities of the unknown Father, and rehearsers of those super-celestial mysteries "which the angels desire to look into!" -that they may learn that from the Nous of that Father who is above all, the Word was produced blind, that is, ignorant of the Father who produced him!
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"
