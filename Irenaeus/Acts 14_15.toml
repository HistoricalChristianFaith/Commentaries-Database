[[commentary]]
quote='''
Paul himself also-after that the Lord spoke to him out of heaven, and showed him that, in persecuting His disciples, he persecuted his own Lord, and sent Ananias to him that he might recover his sight, and be baptized-"preached," it is said, "Jesus in the synagogues at Damascus, with all freedom of speech, that this is the Son of God, the Christ." This is the mystery which he says was made known to him by revelation, that He who suffered under Pontius Pilate, the same is Lord of all, and King, and God, and Judge, receiving power from Him who is the God of all, because He became "obedient unto death, even the death of the cross." ... And again, at Lystra of Lycia (Lycaonia), when Paul was with Barnabas, and in the name of our Lord Jesus Christ had made a man to walk who had been lame from his birth, and when the crowd wished to honour them as gods because of the astonishing deed, he said to them: "We are men like unto you, preaching to you God, that ye may be turned away from these vain idols to [serve] the living God, who made heaven, and earth, and the sea, and all things that are therein; who in times past suffered all nations to walk in their own ways, although He left not Himself without witness, performing acts of goodness, giving you rain from heaven, and fruitful seasons, filling your hearts with food and gladness."
'''
source_title="Against Heresies Book 3"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
