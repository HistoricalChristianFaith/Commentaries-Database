[[commentary]]
quote='''
But now the case stands thus, that the Word has saved that which really was [created, viz., ] humanity which had perished, effecting by means of Himself that communion which should be held with it, and seeking out its salvation. But the thing which had perished possessed flesh and blood. For the Lord, taking dust from the earth, moulded man; and it was upon his behalf that all the dispensation of the Lord's advent took place. He had Himself, therefore, flesh and blood, recapitulating in Himself not a certain other, but that original handiwork of the Father, seeking out that thing which had perished. And for this cause the apostle, in the Epistle to the Colossians, says, "And though ye were formerly alienated, and enemies to His knowledge by evil works, yet now ye have been reconciled in the body of His flesh, through His death, to present yourselves holy and chaste, and without fault in His sight." He says, "Ye have been reconciled in the body of His flesh," because the righteous flesh has reconciled that flesh which was being kept under bondage in sin, and brought it into friendship with God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
