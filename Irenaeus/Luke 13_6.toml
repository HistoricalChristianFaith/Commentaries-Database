[[commentary]]
quote='''
Then, again, this truth was clearly shown forth by the parable of the fig-tree, of which the Lord says, "Behold, now these three years I come seeking fruit on this fig-tree, but I find none" (pointing onwards, by the prophets, to His advent, by whom He came from time to time, seeking the fruit of righteousness from them, which he did not find), and also by the circumstance that, for the reason already mentioned, the fig-tree should be hewn down.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
