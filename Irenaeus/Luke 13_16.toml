[[commentary]]
quote='''
And not only in the case of this woman have the years of her infirmity (which they affirm to fit in with their figment) been mentioned, but, lo! another woman was also healed, after suffering in like manner for eighteen years; concerning whom the Lord said, "And ought not this daughter of Abraham, whom Satan has bound during eighteen years, to be set free on the Sabbath-day?" If, then, the former was a type of the twelfth Aeon that suffered, the latter should also be a type of the eighteenth Aeon in suffering. But they cannot maintain this; otherwise their primary and original Ogdoad will be included in the number of Aeons who suffered together. Moreover, there was also a certain other person healed by the Lord, after he had suffered for eight-and-thirty years: they ought therefore to affirm that the Aeon who occupies the thirty-eighth place suffered. For if they assert that the things which were done by the Lord were types of what took place in the Pleroma, the type ought to be preserved throughout. But they can neither adapt to their fictitious system the case of her who was cured after eighteen years, nor of him who was cured after thirty-eight years. Now, it is in every way absurd and inconsistent to declare that the Saviour preserved the type in certain cases, while He did not do so in others. The type of the woman, therefore, [with the issue of blood] is shown to have no analogy to their system of Aeons.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"
