[[commentary]]
quote='''
But since the writings of Moses are the words of Christ, He does Himself declare to the Jews, as John has recorded in the Gospel: "If ye had believed Moses, ye would have believed Me: for he wrote of Me. But if ye believe not his writings, neither will ye believe My words." He thus indicates in the clearest manner that the writings of Moses are His words. If, then, [this be the case with regard] to Moses, so also, beyond a doubt, the words of the other prophets are His [words], as I have pointed out. And again, the Lord Himself exhibits Abraham as having said to the rich man, with reference to all those who were still alive: "If they do not obey Moses and the prophets, neither, if any one were to rise from the dead and go to them, will they believe him."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
Wherefore also John does appropriately relate that the Lord said to the Jews: "Ye search the Scriptures, in which ye think ye have eternal life; these are they which testify of me. And ye are not willing to come unto Me, that ye may have life." How therefore did the Scriptures testify of Him, unless they were from one and the same Father, instructing men beforehand as to the advent of His Son, and foretelling the salvation brought in by Him? "For if ye had believed Moses, ye would also have believed Me; for he wrote of Me;" [saying this,] no doubt, because the Son of God is implanted everywhere throughout his writings: at one time, indeed, speaking with Abraham, when about to eat with him; at another time with Noah, giving to him the dimensions [of the ark]; at another; inquiring after Adam; at another, bringing down judgment upon the Sodomites; and again, when He becomes visible, and directs Jacob on his journey, and speaks with Moses from the bush. And it would be endless to recount [the occasions] upon which the Son of God is shown forth by Moses. Of the day of His passion, too, he was not ignorant; but foretold Him, after a figurative manner, by the name given to the passover; and at that very festival, which had been proclaimed such a long time previously by Moses, did our Lord suffer, thus fulfilling the passover. And he did not describe the day only, but the place also, and the time of day at which the sufferings ceased, and the sign of the setting of the sun, saying: "Thou mayest not sacrifice the passover within any other of thy cities which the Lord God gives thee; but in the place which the Lord thy God shall choose that His name be called on there, thou shalt sacrifice the passover at even, towards the setting of the sun."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
