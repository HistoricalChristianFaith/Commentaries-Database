[[commentary]]
quote='''
But that this point is true, that that number which is called five, which agrees in no respect with their argument, and does not harmonize with their system, nor is suitable for a typical manifestation of the things in the Pleroma, [yet has a wide prevalence,] will be proved as follows from the Scriptures. ... Again, five men are said to have been with the Lord when He obtained testimony from the Father,-namely, Peter, and James, and John, and Moses, and Elias. The Lord also, as the fifth person, entered into the apartment of the dead maiden, and raised her up again; for, says [the Scripture], "He suffered no man to go in, save Peter and James, and the father and mother of the maiden."
'''
source_title="Against Heresies (Book II, Chapter 24)"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
