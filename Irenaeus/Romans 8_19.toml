[[commentary]]
quote='''
Inasmuch, therefore, as the opinions of certain [orthodox persons] are derived from heretical discourses, they are both ignorant of God's dispensations, and of the mystery of the resurrection of the just, and of the [earthly] kingdom which is the commencement of incorruption, by means of which kingdom those who shall be worthy are accustomed gradually to partake of the divine nature (capere Deum); and it is necessary to tell them respecting those things, that it behoves the righteous first to receive the promise of the inheritance which God promised to the fathers, and to reign in it, when they rise again to behold God in this creation which is renovated, and that the judgment should take place afterwards. For it is just that in that very creation in which they toiled or were afflicted, being proved in every way by suffering, they should receive the reward of their suffering; and that in the creation in which they were slain because of their love to God, in that they should be revived again; and that in the creation in which they endured servitude, in that they should reign. For God is rich in all things, and all things are His. It is fitting, therefore, that the creation itself, being restored to its primeval condition, should without restraint be under the dominion of the righteous; and the apostle has made this plain in the Epistle to the Romans, when he thus speaks: "For the expectation of the creature waiteth for the manifestation of the sons of God. For the creature has been subjected to vanity, not willingly, but by reason of him who hath subjected the same in hope; since the creature itself shall also be delivered from the bondage of corruption into the glorious liberty of the sons of God."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Irenaeus Against Heresies Book 5"
