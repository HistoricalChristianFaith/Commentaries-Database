[[commentary]]
quote='''
For certain of these men used to see the prophetic Spirit and His active influences poured forth for all kinds of gifts; others, again, [beheld] the advent of the Lord, and that dispensation which obtained from the beginning, by which He accomplished the will of the Father with regard to things both celestial and terrestrial; and others [beheld] paternal glories adapted to the times, and to those who saw and who heard them then, and to all who were subsequently to hear them. Thus, therefore, was God revealed; for God the Father is shown forth through all these [operations], the Spirit indeed working, and the Son ministering, while the Father was approving, and man's salvation being accomplished. As He also declares through Hosea the prophet: "I," He says, "have multiplied visions, and have used similitudes by the ministry of the prophets." But the apostle expounded this very passage, when he said, "Now there are diversities of gifts, but the same Spirit; and there are differences of ministrations, but the same Lord; and there are diversities of operations, but it is the same God which worketh all in all. But the manifestation of the Spirit is given to every man to profit withal." But as He who worketh all things in all is God, [as to the points] of what nature and how great He is, [God] is invisible and indescribable to all things which have been made by Him, but He is by no means unknown: for all things learn through His Word that there is one God the Father, who contains all things, and who grants existence to all, as is written in the Gospel: "No man hath seen God at any time, except the only-begotten Son, who is in the bosom of the Father; He has declared [Him.]"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:20.6"


[[commentary]]
quote='''
But that both the apostles and their disciples thus taught as the Church preaches, and thus teaching were perfected, wherefore also they were called away to that which is perfect-Stephen, teaching these truths, when he was yet on earth, saw the glory of God, and Jesus on His right hand, and exclaimed, "Behold, I see the heavens opened, and the Son of man standing on the right hand of God." These words he said, and was stoned; and thus did he fulfil the perfect doctrine, copying in every respect the Leader of martyrdom, and praying for those who were slaying him, in these words: "Lord, lay not this sin to their charge." Thus were they perfected who knew one and the same God, who from beginning to end was present with mankind in the various dispensations; as the prophet Hosea declares: "I have filled up visions, and used similitudes by the hands of the prophets."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="AGAINST HERESIES 3:12.13"
