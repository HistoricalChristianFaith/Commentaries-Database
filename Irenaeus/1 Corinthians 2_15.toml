[[commentary]]
quote='''
...he who is truly spiritual will interpret by pointing out, in regard to every one of the things which have been spoken, to what special point in the dispensation of the Lord is referred, and [by thus exhibiting] the entire system of the work of the Son of God, knowing always the same God, and always acknowledging the same Word of God, although He has [but] now been manifested to us; acknowledging also at all times the same Spirit of God, although He has been poured out upon us after a new fashion in these last times, [knowing that He descends] even from the creation of the world to its end upon the human race simply as such, from whom those who believe God and follow His word receive that salvation which flows from Him. Those, on the other hand, who depart from Him, and despise His precepts, and by their deeds bring dishonour on Him who made them, and by their opinions blaspheme Him who nourishes them, heap up against themselves most righteous judgment. He therefore (i.e., the spiritual man) sifts and tries them all, but he himself is tried by no man: he neither blasphemes his Father, nor sets aside His dispensations, nor inveighs against the fathers, nor dishonours the prophets, by maintaining that they were [sent] from another God [than he worships], or again, that their prophecies were derived from different sources.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies (Book IV, Chapter 33)"
