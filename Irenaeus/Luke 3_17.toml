[[commentary]]
quote='''
They show, further, that that Horos of theirs, whom they call by a variety of names, has two faculties,-the one of supporting, and the other of separating; and in so far as he supports and sustains, he is Stauros, while in so far as he divides and separates, he is Horos. They then represent the Saviour as having indicated this twofold faculty: first, the sustaining power, when He said, "Whosoever doth not bear his cross (Stauros), and follow after me, cannot be my disciple;" and again, "Taking up the cross follow me;" but the separating power when He said, "I came not to send peace, but a word." They also maintain that John indicated the same thing when he said, "The fan is in His hand, and He will thoroughly purge the floor, and will gather the wheat into His garner; but the chaff He will burn with fire unquenchable." By this declaration He set forth the faculty of Horos. For that fan they explain to be the cross (Stauros), which consumes, no doubt, all material objects, as fire does chaff, but it purifies all them that are saved, as a fan does wheat.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies (Book I, Chapter 3)"
append_to_author_name="(Reporting Valentinian Views)"

[[commentary]]
quote='''
...all the prophets announced His two advents: the one, indeed, in which He became a man subject to stripes, and knowing what it is to bear infirmity, and sat upon the foal of an ass, and was a stone rejected by the builders, and was led as a sheep to the slaughter, and by the stretching forth of His hands destroyed Amalek; while He gathered from the ends of the earth into His Father's fold the children who were scattered abroad, and remembered His own dead ones who had formerly fallen asleep, and came down to them that He might deliver them: but the second in which He will come on the clouds, bringing on the day which burns as a furnace, and smiting the earth with the word of His mouth, and slaying the impious with the breath of His lips, and having a fan in His hands, and cleansing His floor, and gathering the wheat indeed into His barn, but burning the chaff with unquenchable fire.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies (Book IV, Chapter 33)"
