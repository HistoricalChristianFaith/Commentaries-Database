[[commentary]]
quote='''
For as in the beginning he enticed man to transgress his Maker's law, and thereby got him into his power; yet his power consists in transgression and apostasy, and with these he bound man [to himself]; so again, on the other hand, it was necessary that through man himself he should, when conquered, be bound with the same chains with which he had bound man, in order that man, being set free, might return to his Lord, leaving to him (Satan) those bonds by which he himself had been fettered, that is, sin. For when Satan is bound, man is set free; since "none can enter a strong man's house and spoil his goods, unless he first bind the strong man himself." The Lord therefore exposes him as speaking contrary to the word of that God who made all things, and subdues him by means of the commandment. Now the law is the commandment of God. The Man proves him to be a fugitive from and a transgressor of the law, an apostate also from God. After [the Man had done this], the Word bound him securely as a fugitive from Himself, and made spoil of his goods,-namely, those men whom he held in bondage, and whom he unjustly used for his own purposes. And justly indeed is he led captive, who had led men unjustly into bondage; while man, who had been led captive in times past, was rescued from the grasp of his possessor, according to the tender mercy of God the Father, who had compassion on His own handiwork, and gave to it salvation, restoring it by means of the Word-that is, by Christ-in order that men might learn by actual proof that he receives incorruptibility not of himself, but by the free gift of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="AGAINST HERESIES 5.21.3"
