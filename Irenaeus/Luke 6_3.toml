[[commentary]]
quote='''
And again, the law did not forbid those who were hungry on the Sabbath-days to take food lying ready at hand: it did, however, forbid them to reap and to gather into the barn. And therefore did the Lord say to those who were blaming His disciples because they plucked and ate the ears of corn, rubbing them in their hands, "Have ye not read this, what David did, when himself was an hungered; how he went into the house of God, and ate the shew-bread, and gave to those who were with him; which it is not lawful to eat, but for the priests alone? " justifying His disciples by the words of the law, and pointing out that it was lawful for the priests to act freely. For David had been appointed a priest by God, although Saul persecuted him. For all the righteous possess the sacerdotal rank. And all the apostles of the Lord are priests, who do inherit here neither lands nor houses, but serve God and the altar continually. Of whom Moses also says in Deuteronomy, when blessing Levi, "Who said unto his father and to his mother, I have not known thee; neither did he acknowledge his brethren, and he disinherited his own sons: he kept Thy commandments, and observed Thy covenant." But who are they that have left father and mother, and have said adieu to all their neighbours, on account of the word of God and His covenant, unless the disciples of the Lord? Of whom again Moses says, "They shall have no inheritance, for the Lord Himself is their inheritance." And again, "The priests the Levites shall have no part in the whole tribe of Levi, nor substance with Israel; their substance is the offerings (fructifications) of the Lord: these shall they eat." Wherefore also Paul says, "I do not seek after a gift, but I seek after fruit." To His disciples He said, who had a priesthood of the Lord, to whom it was lawful when hungry to eat the ears of corn, "For the workman is worthy of his meat." And the priests in the temple profaned the Sabbath, and were blameless. Wherefore, then, were they blameless? Because when in the temple they were not engaged in secular affairs, but in the service of the Lord, fulfilling the law, but not going beyond it, as that man did, who of his own accord carried dry wood into the camp of God, and was justly stoned to death. "For every tree that bringeth not forth good fruit shall be hewn down, and cast into the fire;" and "whosoever shall defile the temple of God, him shall God defile."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies (Book IV, Chapter 8)"
