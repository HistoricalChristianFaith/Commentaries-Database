[[commentary]]
quote='''
With respect, again, to the Decad, they maintain that it is indicated by those ten nations which God promised to Abraham for a possession. The arrangement also made by Sarah when, after ten years, she gave her handmaid Hagar to him, that by her he might have a son, showed the same thing. Moreover, the servant of Abraham who was sent to Rebekah, and presented her at the well with ten bracelets of gold, and her brethren who detained her for ten days; Jeroboam also, who received the ten sceptres (tribes), and the ten courts of the tabernacle, and the columns of ten cubits [high], and the ten sons of Jacob who were at first sent into Egypt to buy corn, and the ten apostles to whom the Lord appeared after His resurrection,-Thomas being absent,-represented, according to them, the invisible Decad.
'''
source_title="Irenaeus Against Heresies Book 1"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
append_to_author_name="(Reporting Valentinian Views)"
