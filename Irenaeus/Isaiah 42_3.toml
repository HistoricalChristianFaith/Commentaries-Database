[[commentary]]
quote='''
The prophets, therefore, did not openly behold the actual face of God, but [they saw] the dispensations and the mysteries through which man should afterwards see God. As was also said to Elias: "Thou shalt go forth tomorrow, and stand in the presence of the Lord; and, behold, a wind great and strong, which shall rend the mountains, and break the rocks in pieces before the Lord. And the Lord [was] not in the wind; and after the wind an earthquake, but the Lord [was] not in the earthquake; and after the earthquake a fire, but the Lord [was] not in the fire; and after the fire a scarcely audible voice" (vox aurae tenuis). For by such means was the prophet-very indignant, because of the transgression of the people and the slaughter of the prophets-both taught to act in a more gentle manner; and the Lord's advent as a man was pointed out, that it should be subsequent to that law which was given by Moses, mild and tranquil, in which He would neither break the bruised reed, nor quench the smoking flax. The mild and peaceful repose of His kingdom was indicated likewise. For, after the wind which rends the mountains, and after the earthquake, and after the fire, come the tranquil and peaceful times of His kingdom, in which the spirit of God does, in the most gentle manner, vivify and increase mankind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:20.10"
