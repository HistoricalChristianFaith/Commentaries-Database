[[commentary]]
quote='''
And therefore did the Lord say to His disciples, to make us become good workmen: "Take heed to yourselves, and watch continually upon every occasion, lest at any time your hearts be overcharged with surfeiting and drunkenness, and cares of this life, and that day shall come upon you unawares; for as a snare shall it come upon all dwelling upon the face of the earth." "Let your loins, therefore, be girded about, and your lights burning, and ye like to men who wait for their lord, when he shall return from the wedding." "For as it was in the days of Noe, they did eat and drink, they bought and sold, they married and were given in marriage, and they knew not, until Noe entered into the ark, and the flood came and destroyed them all; as also it was in the days of Lot, they did eat and drink, they bought and sold, they planted and builded, until the time that Lot went out of Sodom; it rained fire from heaven, and destroyed them all: so shall it also be at the coming of the Son of man." "Watch ye therefore, for ye know not in what day your Lord shall come." [In these passages] He declares one and the same Lord, who in the times of Noah brought the deluge because of man's disobedience, and who also in the days of Lot rained fire from heaven because of the multitude of sinners among the Sodomites, and who, on account of this same disobedience and similar sins, will bring on the day of judgment at the end of time; on which day He declares that it shall be more tolerable for Sodom and Gomorrah than for that city and house which shall not receive the word of His apostles.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Irenaeus Against Heresies Book 4"

[[commentary]]
quote='''
For this reason the Lord also said, "Let your light so shine before men, that they may see your good deeds, and glorify your Father who is in heaven." And, "Take heed to yourselves, lest perchance your hearts be overcharged with surfeiting, and drunkenness, and worldly cares." And, "Let your loins be girded about, and your lamps burning, and ye like unto men that wait for their Lord, when He returns from the wedding, that when He cometh and knocketh, they may open to Him. Blessed is that servant whom his Lord, when He cometh, shall find so doing." And again, "The servant who knows his Lord's will, and does it not, shall be beaten with many stripes." And, "Why call ye me, Lord, Lord, and do not the things which I say?" And again, "But if the servant say in his heart, The Lord delayeth, and begin to beat his fellow-servants, and to eat, and drink, and to be drunken, his Lord will come in a day on which he does not expect Him, and shall cut him in sunder, and appoint his portion with the hypocrites." All such passages demonstrate the independent will of man, and at the same time the counsel which God conveys to him, by which He exhorts us to submit ourselves to Him, and seeks to turn us away from [the sin of] unbelief against Him, without, however, in any way coercing us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Irenaeus Against Heresies Book 4"
