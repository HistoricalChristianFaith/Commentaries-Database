[[commentary]]
quote='''
And therefore did the Lord say to His disciples, to make us become good workmen: "Take heed to yourselves, and watch continually upon every occasion, lest at any time your hearts be overcharged with surfeiting and drunkenness, and cares of this life, and that day shall come upon you unawares; for as a snare shall it come upon all dwelling upon the face of the earth." "Let your loins, therefore, be girded about, and your lights burning, and ye like to men who wait for their lord, when he shall return from the wedding." ... [In these passages] He declares one and the same Lord, who in the times of Noah brought the deluge because of man's disobedience, and who also in the days of Lot rained fire from heaven because of the multitude of sinners among the Sodomites, and who, on account of this same disobedience and similar sins, will bring on the day of judgment at the end of time...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
"Let your loins be girded about, and your lamps burning, and ye like unto men that wait for their Lord, when He returns from the wedding, that when He cometh and knocketh, they may open to Him. Blessed is that servant whom his Lord, when He cometh, shall find so doing." And again, "The servant who knows his Lord's will, and does it not, shall be beaten with many stripes." ... All such passages demonstrate the independent will of man, and at the same time the counsel which God conveys to him, by which He exhorts us to submit ourselves to Him, and seeks to turn us away from [the sin of] unbelief against Him, without, however, in any way coercing us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
