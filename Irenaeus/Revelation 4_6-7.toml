[[commentary]]
quote='''
It is not possible that the Gospels can be either more or fewer in number than they are. For, since there are four zones of the world in which we live, and four principal winds, while the Church is scattered throughout all the world, and the "pillar and ground" of the Church is the Gospel and the spirit of life; it is fitting that she should have four pillars, breathing out immortality on every side, and vivifying men afresh. From which fact, it is evident that the Word, the Artificer of all, He that sitteth upon the cherubim, and contains all things, He who was manifested to men, has given us the Gospel under four aspects, but bound together by one Spirit. As also David says, when entreating His manifestation, "Thou that sittest between the cherubim, shine forth." For the cherubim, too, were four-faced, and their faces were images of the dispensation of the Son of God. For, [as the Scripture] says, "The first living creature was like a lion," symbolizing His effectual working, His leadership, and royal power; the second [living creature] was like a calf, signifying [His] sacrificial and sacerdotal order; but "the third had, as it were, the face as of a man,"-an evident description of His advent as a human being; "the fourth was like a flying eagle," pointing out the gift of the Spirit hovering with His wings over the Church. And therefore the Gospels are in accord with these things, among which Christ Jesus is seated. For that according to John relates His original, effectual, and glorious generation from the Father, thus declaring, "In the beginning was the Word, and the Word was with God, and the Word was God." Also, "all things were made by Him, and without Him was nothing made." For this reason, too, is that Gospel full of all confidence, for such is His person. But that according to Luke, taking up [His] priestly character, commenced with Zacharias the priest offering sacrifice to God. For now was made ready the fatted calf, about to be immolated for the finding again of the younger son. Matthew, again, relates His generation as a man, saying, "The book of the generation of Jesus Christ, the son of David, the son of Abraham;" and also, "The birth of Jesus Christ was on this wise." This, then, is the Gospel of His humanity; for which reason it is, too, that [the character of] a humble and meek man is kept up through the whole Gospel. Mark, on the other hand, commences with [a reference to] the prophetical spirit coming down from on high to men, saying, "The beginning of the Gospel of Jesus Christ, as it is written in Esaias the prophet,"-pointing to the winged aspect of the Gospel; and on this account he made a compendious and cursory narrative, for such is the prophetical character. And the Word of God Himself used to converse with the ante-Mosaic patriarchs, in accordance with His divinity and glory; but for those under the law he instituted a sacerdotal and liturgical service. Afterwards, being made man for us, He sent the gift of the celestial Spirit over all the earth, protecting us with His wings. Such, then, as was the course followed by the Son of God, so was also the form of the living creatures; and such as was the form of the living creatures, so was also the character of the Gospel. For the living creatures are quadriform, and the Gospel is quadriform, as is also the course followed by the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="Against Heresies Book 3"
