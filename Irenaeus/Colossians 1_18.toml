[[commentary]]
quote='''
For He came to save all through means of Himself-all, I say, who through Him are born again to God-infants, and children, and boys, and youths, and old men. He therefore passed through every age, becoming an infant for infants, thus sanctifying infants; a child for children, thus sanctifying those who are of this age, being at the same time made to them an example of piety, righteousness, and submission; a youth for youths, becoming an example to youths, and thus sanctifying them for the Lord. So likewise He was an old man for old men, that He might be a perfect Master for all, not merely as respects the setting forth of the truth, but also as regards age, sanctifying at the same time the aged also, and becoming an example to them likewise. Then, at last, He came on to death itself, that He might be "the first-born from the dead, that in all things He might have the pre-eminence," the Prince of life, existing before all, and going before all.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies 2.22.4"

[[commentary]]
quote='''
But in all things [it is implied that] nothing has been kept back [from Him], and for this reason the same person is the Judge of the living and the dead; "having the key of David: He shall Open, and no man shall shut: He shall shut, and no man shall open." For no one was able, either in heaven or in earth, or under the earth, to open the book of the Father, or to behold Him, with the exception of the Lamb who was slain, and who redeemed us with His own blood, receiving power over all things from the same God who made all things by the Word, and adorned them by [His] Wisdom, when "the Word was made flesh;" that even as the Word of God had the sovereignty in the heavens, so also might He have the sovereignty in earth, inasmuch as [He was] a righteous man, "who did no sin, neither was there found guile in His mouth;" and that He might have the pre-eminence over those things which are under the earth, He Himself being made "the first-begotten of the dead;" and that all things, as I have already said, might behold their King; and that the paternal light might meet with and rest upon the flesh of our Lord, and come to us from His resplendent flesh, and that thus man might attain to immortality, having been invested with the paternal light.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies 4.20.2"
