[[commentary]]
quote='''
For as the good olive, if neglected for a certain time, if left to grow wild and to run to wood, does itself become a wild olive; or again, if the wild olive be carefully tended and grafted, it naturally reverts to its former fruit-bearing condition: so men also, when they become careless, and bring forth for fruit the lusts of the flesh like woody produce, are rendered, by their own fault, unfruitful in righteousness. For when men sleep, the enemy sows the material of tares; and for this cause did the Lord command His disciples to be on the watch. And again, those persons who are not bringing forth the fruits of righteousness, and are, as it were, covered over and lost among brambles, if they use diligence, and receive the word of God as a graft, arrive at the pristine nature of man-that which was created after the image and likeness of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="AGAINST HERESIES 5.10.1"
