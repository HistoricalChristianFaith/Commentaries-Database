[[commentary]]
quote='''
Thou wilt notice, too, that the transgressions of the common people have been described in like manner, not for the sake of those who did then transgress, but as a means of instruction unto us, and that we should understand that it is one and the same God against whom these men sinned, and against whom certain persons do now transgress from among those who profess to have believed in Him. But this also, [as the presbyter states, ] has Paul declared most plainly in the Epistle to the Corinthians, when he says, "Brethren, I would not that ye should be ignorant, how that all our fathers were under the cloud, and were all baptized unto Moses in the sea, and did all eat the same spiritual meat, and did all drink the same spiritual drink: for they drank of that spiritual rock that followed them; and the rock was Christ. But with many of them God was not well pleased, for they were overthrown in the wilderness. These things were for our example (in figuram nostri), to the intent that we should not lust after evil things, as they also lusted; neither be ye idolaters, as were some of them, as it is written: The people sat down to eat and drink, and rose up to play. Neither let us commit fornication, as some of them also did, and fell in one day three and twenty thousand. Neither let us tempt Christ, as some of them also tempted, and were destroyed of serpents. Neither murmur ye, as some of them murmured, and were destroyed of the destroyer. But all these things happened to them in a figure, and were written for our admonition, upon whom the end of the world (saeculorum) is come. Wherefore let him that thinketh he standeth, take heed lest he fall." Since therefore, beyond all doubt and contradiction, the apostle shows that there is one and the same God, who did both enter into judgment with these former things, and who does inquire into those of the present time, and points out why these things have been committed to writing...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
