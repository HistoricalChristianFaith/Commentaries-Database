[[commentary]]
quote='''
But in the times of the kingdom, the earth has been called again by Christ [to its pristine condition], and Jerusalem rebuilt after the pattern of the Jerusalem above, of which the prophet Isaiah says, "Behold, I have depicted thy walls upon my hands, and thou art always in my sight," And the apostle, too, writing to the Galatians, says in like manner, "But the Jerusalem which is above is free, which is the mother of us all." He does not say this with any thought of an erratic Aeon, or of any other power which departed from the Pleroma, or of Prunicus, but of the Jerusalem which has been delineated on [God's] hands. And in the Apocalypse John saw this new [Jerusalem] descending upon the new earth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"



[[commentary]]
quote='''
When these things, therefore, pass away above the earth, John, the Lord's disciple, says that the new Jerusalem above shall [then] descend, as a bride adorned for her husband; and that this is the tabernacle of God, in which God will dwell with men. Of this Jerusalem the former one is an image-that Jerusalem of the former earth in which the righteous are disciplined beforehand for incorruption and prepared for salvation. And of this tabernacle Moses received the pattern in the mount; and nothing is capable of being allegorized, but all things are stedfast, and true, and substantial, having been made by God for righteous men's enjoyment. For as it is God truly who raises up man, so also does man truly rise from the dead, and not allegorically, as I have shown repeatedly. And as he rises actually, so also shall he be actually disciplined beforehand for incorruption, and shall go forwards and flourish in the times of the kingdom, in order that he may be capable of receiving the glory of the Father. Then, when all things are made new, he shall truly dwell in the city of God. For it is said, "He that sitteth on the throne said, Behold, I make all things new. And the Lord says, Write all this; for these words are faithful and true. And He said to me, They are done." And this is the truth of the matter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="Against Heresies Book V"
