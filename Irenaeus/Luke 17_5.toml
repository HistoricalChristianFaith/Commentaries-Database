[[commentary]]
quote='''
Now if any man set Luke aside, as one who did not know the truth, he will, [by so acting, ] manifestly reject that Gospel of which he claims to be a disciple. For through him we have become acquainted with very many and important parts of the Gospel; for instance, the generation of John, the history of Zacharias, the coming of the angel to Mary, the exclamation of Elisabeth, the descent of the angels to the shepherds, the words spoken by them, the testimony of Anna and of Simeon with regard to Christ, and that twelve years of age He was left behind at Jerusalem; also the baptism of John, the number of the Lord's years when He was baptized, and that this occurred in the fifteenth year of Tiberius Caesar. And in His office of teacher this is what He has said to the rich: "Woe unto you that are rich, for ye have received your consolation;" and "Woe unto you that are full, for ye shall hunger; and ye who laugh now, for ye shall weep;" and, "Woe unto you when all men shall speak well of you: for so did your fathers to the false prophets." All things of the following kind we have known through Luke alone (and numerous actions of the Lord we have learned through him, which also all [the Evangelists] notice): the multitude of fishes which Peter's companions enclosed, when at the Lord's command they cast the nets; the woman who had suffered for eighteen years, and was healed on the Sabbath-day; the man who had the dropsy, whom the Lord made whole on the Sabbath, and how He did defend Himself for having performed an act of healing on that day; how He taught His disciples not to aspire to the uppermost rooms; how we should invite the poor and feeble, who cannot recompense us; the man who knocked during the night to obtain loaves, and did obtain them, because of the urgency of his importunity; how, when [our Lord] was sitting at meat with a Pharisee, a woman that was a sinner kissed His feet, and anointed them with ointment, with what the Lord said to Simon on her behalf concerning the two debtors; also about the parable of that rich man who stored up the goods which had accrued to him, to whom it was also said, "In this night they shall demand thy soul from thee; whose then shall those things be which thou hast prepared?" and similar to this, that of the rich man, who was clothed in purple and who fared sumptuously, and the indigent Lazarus; also the answer which He gave to His disciples when they said, "Increase our faith;" also His conversation with Zaccheus the publican; also about the Pharisee and the publican, who were praying in the temple at the same time; also the ten lepers, whom He cleansed in the way simultaneously; also how He ordered the lame and the blind to be gathered to the wedding from the lanes and streets; also the parable of the judge who feared not God, whom the widow's importunity led to avenge her cause; and about the fig-tree in the vineyard which produced no fruit. There are also many other particulars to be found mentioned by Luke alone, which are made use of by both Marcion and Valentinus. And besides all these, [he records] what [Christ] said to His disciples in the way, after the resurrection, and how they recognised Him in the breaking of bread.
'''
source_title="Irenaeus Against Heresies Book 3"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
