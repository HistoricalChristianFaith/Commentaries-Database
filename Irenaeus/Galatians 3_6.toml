[[commentary]]
quote='''
And again, confirming his former words, he says, "Even as Abraham believed God, and it was accounted to him for righteousness. Know ye therefore, that they which are of faith are the children of Abraham. But the Scripture, fore-seeing that God would justify the heathen through faith, declared to Abraham beforehand, That in thee shall all nations be blessed. So then they which are of faith shall be blessed with faithful Abraham." Thus, then, they who are of faith shall be blessed with faithful Abraham, and these are the children of Abraham. Now God made promise of the earth to Abraham and his seed; yet neither Abraham nor his seed, that is, those who are justified by faith, do now receive any inheritance in it; but they shall receive it at the resurrection of the just. For God is true and faithful; and on this account He said, "Blessed are the meek, for they shall inherit the earth."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
