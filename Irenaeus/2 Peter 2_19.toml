[[commentary]]
quote='''
For as the serpent beguiled Eve, by promising her what he had not himself, so also do these men, by pretending [to possess] superior knowledge, and [to be acquainted with] ineffable mysteries; and, by promising that admittance which they speak of as taking place within the Pleroma, plunge those that believe them into death, rendering them apostates from Him who made them. And at that time, indeed, the apostate angel, having effected the disobedience of mankind by means of the serpent, imagined that he escaped the notice of the Lord; wherefore God assigned him the form and name [of a serpent]. But now, since the last times are [come upon us], evil is spread abroad among men, which not only renders them apostates, but by many machinations does [the devil] raise up blasphemers against the Creator, namely, by means of all the heretics already mentioned. For all these, although they issue forth from diverse regions, and promulgate different [opinions], do nevertheless concur in the same blasphemous design, wounding [men] unto death, by teaching blasphemy against God our Maker and Supporter, and derogating from the salvation of man.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
