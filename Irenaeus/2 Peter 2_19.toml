[[commentary]]
quote='''
For as the serpent beguiled Eve, by promising her what he had not himself, so also do these men, by pretending [to possess] superior knowledge, and [to be acquainted with] ineffable mysteries; and, by promising that admittance which they speak of as taking place within the Pleroma, plunge those that believe them into death, rendering them apostates from Him who made them.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
