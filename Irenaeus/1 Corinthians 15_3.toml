[[commentary]]
quote='''
But who is it that has had fellowship with us in the matter of food? Whether is it he who is conceived of by them as the Christ above, who extended himself through Horos, and imparted a form to their mother; or is it He who is from the Virgin, Emmanuel, who did eat butter and honey, of whom the prophet declared, "He is also a man, and who shall know him?" He was likewise preached by Paul: "For I delivered," he says, "unto you first of all, that Christ died for our sins, according to the Scriptures; and that He was buried, and rose again the third day, according to the Scriptures." It is plain, then, that Paul knew no other Christ besides Him alone, who both suffered, and was buried, and rose again, who was also born, and whom he speaks of as man. For after remarking, "But if Christ be preached, that He rose from the dead," he continues, rendering the reason of His incarnation, "For since by man came death, by man [came] also the resurrection of the dead." And everywhere, when [referring to] the passion of our Lord, and to His human nature, and His subjection to death, he employs the name of Christ, as in that passage: "Destroy not him with thy meat for whom Christ died." And again: "But now, in Christ, ye who sometimes were far off are made nigh by the blood of Christ." And again: "Christ has redeemed us from the curse of the law, being made a curse for us: for it is written, Cursed is every one that hangeth upon a tree." And again: "And through thy knowledge shall the weak brother perish, for whom Christ died;" indicating that the impassible Christ did not descend upon Jesus, but that He Himself, because He was Jesus Christ, suffered for us; He, who lay in the tomb, and rose again, who descended and ascended,-the Son of God having been made the Son of man, as the very name itself doth declare.
'''
source_title="Irenaeus Against Heresies Book 3"
source_url = "https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
