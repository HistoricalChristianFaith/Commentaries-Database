[[commentary]]
quote='''
For the Lord, having been born "the First-begotten of the dead," and receiving into His bosom the ancient fathers, has regenerated them into the life of God, He having been made Himself the beginning of those that live, as Adam became the beginning of those who die.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"



[[commentary]]
quote='''
But God the Father was very merciful: He sent His creative Word, who in coming to deliver us came to the very place and spot in which we had lost life, and brake the bonds of our fetters. And His light appeared and made the darkness of the prison disappear, and hallowed our birth and destroyed death, loosing those same fetters in which we were enchained. And He manifested the resurrection, Himself becoming the first-begotten of the dead, and in Himself raising up man that was fallen, lifting him up far above the heaven to the right hand of the glory of the Father: even as God promised by the prophet, saying: "And I will raise up the tabernacle of David that is fallen;" that is, the flesh that was from David. And this our Lord Jesus Christ truly fulfilled, when He gloriously achieved our redemption, that He might truly raise us up, setting us free unto the Father. ...for He Himself was the first-begotten of the dead, the Prince and Author of life unto God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FThe%2520Proof%2520of%2520the%2520Apostolic%2520Preaching%2FTHE%2520DEMONSTRATION%2520OF%2520THE%2520APOSTOLIC%2520PREACHING.html"
source_title="The Demonstration of the Apostolic Preaching"
