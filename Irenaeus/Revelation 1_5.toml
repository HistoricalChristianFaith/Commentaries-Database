[[commentary]]
quote='''
And the prophet, too, indicates the same, saying, "instead of fathers, children have been born unto thee." For the Lord, having been born "the First-begotten of the dead," and receiving into His bosom the ancient fathers, has regenerated them into the life of God, He having been made Himself the beginning of those that live, as Adam became the beginning of those who die. Wherefore also Luke, commencing the genealogy with the Lord, carried it back to Adam, indicating that it was He who regenerated them into the Gospel of life, and not they Him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"



[[commentary]]
quote='''
For we were imprisoned by sin, being born in sinfulness and living under death. But God the Father was very merciful: He sent His creative Word, who in coming to deliver us came to the very place and spot in which we had lost life, and brake the bonds of our fetters. And His light appeared and made the darkness of the prison disappear, and hallowed our birth and destroyed death, loosing those same fetters in which we were enchained. And He manifested the resurrection, Himself becoming the first-begotten of the dead, and in Himself raising up man that was fallen, lifting him up far above the heaven to the right hand of the glory of the Father: even as God promised by the prophet, saying: "And I will raise up the tabernacle of David that is fallen;" that is, the flesh that was from David. And this our Lord Jesus Christ truly fulfilled, when He gloriously achieved our redemption, that He might truly raise us up, setting us free unto the Father. And if any man will not receive His birth from a virgin, how shall he receive His resurrection from the dead? For it is nothing wonderful and astonishing and extraordinary, if one who was not born rose from the dead: nay indeed we cannot speak of a resurrection of him who came unto being without birth. For one who is unborn and immortal, and has not undergone birth, will also not undergo death. For he who took not the beginning of man, how could he receive his end? Now, if He was not born, neither did He die; and, if He died not, neither did He rise from the dead; and, if He rose not from the dead, neither did He vanquish death and bring its reign to nought; and if death be not vanquished, how can we ascend to life, who from the beginning have fallen under death? So then those who take away redemption from man, and believe not in God that He will raise them from the dead, these also despise the birth of our Lord, which He underwent on our behalf, that the Word of God should be made flesh in order that He might manifest the resurrection of the flesh, and might have pre-eminence over all things in the heavens, as the first-born and eldest offspring of the thought of the Father, the Word, fulfilling all things, and Himself guiding and ruling upon earth. For He was the Virgin's first-born, a just and holy man, godfearing, good, well-pleasing to God, perfect in all ways, and delivering from hell all who follow after Him: for He Himself was the first-begotten of the dead, the Prince and Author of life unto God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FThe%2520Proof%2520of%2520the%2520Apostolic%2520Preaching%2FTHE%2520DEMONSTRATION%2520OF%2520THE%2520APOSTOLIC%2520PREACHING.html"
source_title="The Demonstration of the Apostolic Preaching"
