[[commentary]]
quote='''
He declares in the plainest manner, that the same Being who was laid hold of, and underwent suffering, and shed His blood for us, was both Christ and the Son of God, who did also rise again, and was taken up into heaven, as he himself [Paul] says: "But at the same time, [it is] Christ [that] died, yea rather, that is risen again, who is even at the right hand of God." And again, "Knowing that Christ, rising from the dead, dieth no more:" for, as himself foreseeing, through the Spirit, the subdivisions of evil teachers [with regard to the Lord's person], and being desirous of cutting away from them all occasion of cavil...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
