[[commentary]]
quote='''
And therefore did the Lord say to His disciples, to make us become good workmen: "Take heed to yourselves, and watch continually upon every occasion, lest at any time your hearts be overcharged with surfeiting and drunkenness, and cares of this life, and that day shall come upon you unawares; for as a snare shall it come upon all dwelling upon the face of the earth." ...[In these passages] He declares one and the same Lord, who in the times of Noah brought the deluge because of men's disobedience, and who also in the days of Lot rained fire from heaven because of the multitude of sinners among the Sodomites, and who, on account of this same disobedience and similar sins, will bring on the day of judgment at the end of time...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies (Book IV, Chapter 36), Section 3"

[[commentary]]
quote='''
For this reason the Lord also said, "Let your light so shine before men, that they may see your good deeds, and glorify your Father who is in heaven." And, "Take heed to yourselves, lest perchance your hearts be overcharged with surfeiting, and drunkenness, and worldly cares." ...All such passages demonstrate the independent will of man, and at the same time the counsel which God conveys to him, by which He exhorts us to submit ourselves to Him, and seeks to turn us away from [the sin of] unbelief against Him, without, however, in any way coercing us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies (Book IV, Chapter 37), Section 3"
