[[commentary]]
quote='''
If, therefore, even with respect to creation, there are some things [the knowledge of] which belongs only to God, and others which come within the range of our own knowledge, what ground is there for complaint, if, in regard to those things which we investigate in the Scriptures (which are throughout spiritual), we are able by the grace of God to explain some of them, while we must leave others in the hands of God, and that not only in the present world, but also in that which is to come, so that God should for ever teach, and man should for ever learn the things taught him by God? As the apostle has said on this point, that, when other things have been done away, then these three, "faith, hope, and charity, shall endure." For faith, which has respect to our Master, endures unchangeably, assuring us that there is but one true God, and that we should truly love Him for ever, seeing that He alone is our Father; while we hope ever to be receiving more and more from God, and to learn from Him, because He is good, and possesses boundless riches, a kingdom without end, and instruction that can never be exhausted.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"
