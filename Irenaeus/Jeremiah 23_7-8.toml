[[commentary]]
quote='''
Now I have shown a short time ago that the church is the seed of Abraham; and for this reason, that we may know that He who in the New Testament "raises up from the stones children unto Abraham," is He who will gather, according to the Old Testament, those that shall be saved from all the nations, Jeremiah says: "Behold, the days come, saith the Lord, that they shall no more say, The Lord liveth, who led the children of Israel from the north, and from every region whither they had been driven; He will restore them to their own land which He gave to their fathers."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="AGAINST HERESIES 5:34.1"
