[[commentary]]
quote='''
For this reason did the Lord declare that the first should in truth be last, and the last first. And the prophet, too, indicates the same, saying, "instead of fathers, children have been born unto thee." For the Lord, having been born "the First-begotten of the dead," and receiving into His bosom the ancient fathers, has regenerated them into the life of God, He having been made Himself the beginning of those that live, as Adam became the beginning of those who die. Wherefore also Luke, commencing the genealogy with the Lord, carried it back to Adam, indicating that it was He who regenerated them into the Gospel of life, and not they Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="AGAINST HERESIES 3:22.4"
