[[commentary]]
quote='''
This Spirit, again, He did confer upon the Church, sending throughout all the world the Comforter from heaven, from whence also the Lord tells us that the devil, like lightning, was cast down. Wherefore we have need of the dew of God, that we be not consumed by fire, nor be rendered unfruitful, and that where we have an accuser there we may have also an Advocate, the Lord commending to the Holy Spirit His own man, who had fallen among thieves, whom He Himself compassionated, and bound up his wounds, giving two royal denaria; so that we, receiving by the Spirit the image and superscription of the Father and the Son, might cause the denarium entrusted to us to be fruitful, counting out the increase [thereof] to the Lord.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
