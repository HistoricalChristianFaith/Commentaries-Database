[[commentary]]
quote='''
That he uses these words with respect to the body of flesh, and to none other, he declares to the Corinthians manifestly, indubitably, and free from all ambiguity: "Always bearing about in our body the dying of Jesus, that also the life of Jesus Christ might be manifested in our body. For if we who live are delivered unto death for Jesus' sake, it is that the life of Jesus may also be manifested in our mortal flesh." And that the Spirit lays hold on the flesh, he says in the same Epistle, "That ye are the epistle of Christ, ministered by us, inscribed not with ink, but with the Spirit of the living God, not in tables of stone, but in the fleshly tables of the heart." If, therefore, in the present time, fleshly hearts are made partakers of the Spirit, what is there astonishing if, in the resurrection, they receive that life which is granted by the Spirit? Of which resurrection the apostle speaks in the Epistle to the Philippians: "Having been made conformable to His death, if by any means I might attain to the resurrection which is from the dead." In what other mortal flesh, therefore, can life be understood as being manifested, unless in that substance which is also put to death on account of that confession which is made of God?-as he has himself declared, "If, as a man, I have fought with beasts at Ephesus, what advantageth it me if the dead rise not? For if the dead rise not, neither has Christ risen. Now, if Christ has not risen, our preaching is vain, and your faith is vain. In that case, too, we are found false witnesses for God, since we have testified that He raised up Christ, whom [upon that supposition] He did not raise up. For if the dead rise not, neither has Christ risen. But if Christ be not risen, your faith is vain, since ye are yet in your sins. Therefore those who have fallen asleep in Christ have perished. If in this life only we have hope in Christ, we are more miserable than all men. But now Christ has risen from the dead, the first-fruits of those that sleep; for as by man [came] death, by man also [came] the resurrection of the dead."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
