[[commentary]]
quote='''
Moreover, since God rules over men and him too, and without the will of our Father in heaven not even a sparrow falls to the ground, it follows that his declaration, "All these things are delivered unto me, and to whomsoever I will I give them," proceeds from him when puffed up with pride. For the creation is not subjected to his power, since indeed he is himself but one among created things. Nor shall he give away the rule over men to men; but both all other things, and all human affairs, are arranged according to God the Father's disposal. Besides, the Lord declares that "the devil is a liar from the beginning, and the truth is not in him." If then he be a liar and the truth be not in him, he certainly did not speak truth, but a lie, when he said, "For all these things are delivered to me, and to whomsoever I will I give them."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"

[[commentary]]
quote='''
As therefore the devil lied at the beginning, so did he also in the end, when he said, "All these are delivered unto me, and to whomsoever I will I give them." For it is not he who has appointed the kingdoms of this world, but God; for "the heart of the king is in the hand of God." And the Word also says by Solomon, "By me kings do reign, and princes administer justice. By me chiefs are raised up, and by me kings rule the earth." ...As, then, "the powers that be are ordained of God," it is clear that the devil lied when he said, "These are delivered unto me; and to whomsoever I will, I give them." For by the law of the same Being as calls men into existence are kings also appointed, adapted for those men who are at the time placed under their government. ...The devil, however, as he is the apostate angel, can only go to this length, as he did at the beginning, [namely] to deceive and lead astray the mind of man into disobeying the commandments of God, and gradually to darken the hearts of those who would endeavour to serve him, to the forgetting of the true God, but to the adoration of himself as God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
