[[commentary]]
quote='''
Having first of all distinguished these three-God, the Beginning, and the Word-he again unites them, that he may exhibit the production of each of them, that is, of the Son and of the Word, and may at the same time show their union with one another, and with the Father. For "the beginning" is in the Father, and of the Father, while "the Word" is in the beginning, and of the beginning. Very properly, then, did he say, "In the beginning was the Word," for He was in the Son; "and the Word was with God," for He was the beginning; "and the Word was God," of course, for that which is begotten of God is God. "The same was in the beginning with God"-this clause discloses the order of production. "All things were made by Him, and without Him was nothing made;" for the Word was the author of form and beginning to all the Aeons that came into existence after Him. But "what was made in Him," says John, "is life." Here again he indicated conjunction; for all things, he said, were made by Him, but in Him was life. This, then, which is in Him, is more closely connected with Him than those things which were simply made by Him, for it exists along with Him, and is developed by Him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"


[[commentary]]
quote='''
The rule of truth which we hold, is, that there is one God Almighty, who made all things by His Word, and fashioned and formed, out of that which had no existence, all things which exist. Thus saith the Scripture, to that effect "By the Word of the Lord were the heavens established, and all the might of them, by the spirit of His mouth." And again, "All things were made by Him, and without Him was nothing made." There is no exception or deduction stated; but the Father made all things by Him, whether visible or invisible, objects of sense or of intelligence, temporal, on account of a certain character given them, or eternal; and these eternal things He did not make by angels, or by any powers separated from His Ennoea. For God needs none of all these things, but is He who, by His Word and Spirit, makes, and disposes, and governs all things, and commands all things into existence,-He who formed the world (for the world is of all),-He who fashioned man,-He [who] is the God of Abraham, and the God of Isaac, and the God of Jacob, above whom there is no other God, nor initial principle, nor power, nor pleroma,-He is the Father of our Lord Jesus Christ, as we shall prove.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"


[[commentary]]
quote='''
For this is a peculiarity of the pre-eminence of God, not to stand in need of other instruments for the creation of those things which are summoned into existence. His own Word is both suitable and sufficient for the formation of all things, even as John, the disciple of the Lord, declares regarding Him: "All things were made by Him, and without Him was nothing made." Now, among the "all things" our world must be embraced. It too, therefore, was made by His Word, as Scripture tells us in the book of Genesis that He made all things connected with our world by His Word. David also expresses the same truth [when he says] "For He spake, and they were made; He commanded, and they were created."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Against Heresies Book II"


[[commentary]]
quote='''
For that all things, whether Angels, or Archangels, or Thrones, or Dominions, were both established and created by Him who is God over all, through His Word, John has thus pointed out. For when he had spoken of the Word of God as having been in the Father, he added, "All things were made by Him, and without Him was not anything made." David also, when he had enumerated [His] praises, subjoins by name all things whatsoever I have mentioned, both the heavens and all the powers therein: "For He commanded, and they were created; He spake, and they were made." Whom, therefore, did He command? The Word, no doubt, "by whom," he says, "the heavens were established, and all their power by the breath of His mouth." But that He did Himself make all things freely, and as He pleased, again David says, "But our God is in the heavens above, and in the earth; He hath made all things whatsoever He pleased." But the things established are distinct from Him who has established them, and what have been made from Him who has made them. For He is Himself uncreated, both without beginning and end, and lacking nothing. He is Himself sufficient for Himself; and still further, He grants to all others this very thing, existence; but the things which have been made by Him have received a beginning. But whatever things had a beginning, and are liable to dissolution, and are subject to and stand in need of Him who made them, must necessarily in all respects have a different term [applied to them], even by those who have but a moderate capacity for discerning such things; so that He indeed who made all things can alone, together with His Word, properly be termed God and Lord: but the things which have been made cannot have this term applied to them, neither should they justly assume that appellation which belongs to the Creator.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"


[[commentary]]
quote='''
For as by one man's disobedience sin entered, and death obtained [a place] through sin; so also by the obedience of one man, righteousness having been introduced, shall cause life to fructify in those persons who in times past were dead. And as the protoplast himself Adam, had his substance from untilled and as yet virgin soil ("for God had not yet sent rain, and man had not tilled the ground"), and was formed by the hand of God, that is, by the Word of God, for "all things were made by Him," and the Lord took dust from the earth and formed man; so did He who is the Word, recapitulating Adam in Himself, rightly receive a birth, enabling Him to gather up Adam [into Himself], from Mary, who was as yet a virgin. If, then, the first Adam had a man for his father, and was born of human seed, it were reasonable to say that the second Adam was begotten of Joseph. But if the former was taken from the dust, and God was his Maker, it was incumbent that the latter also, making a recapitulation in Himself, should be formed as man by God, to have an analogy with the former as respects His origin. Why, then, did not God again take dust, but wrought so that the formation should be made of Mary? It was that there might not be another formation called into being, nor any other which should [require to] be saved, but that the very same formation should be summed up [in Christ as had existed in Adam], the analogy having been preserved.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"


[[commentary]]
quote='''
But if any one believes in [only] one God, who also made all things by the Word, as Moses likewise says, "God said, Let there be light: and there was light;" and as we read in the Gospel, "All things were made by Him; and without Him was nothing made;" and the Apostle Paul [says] in like manner, "There is one Lord, one faith, one baptism, one God and Father, who is above all, and through all, and in us all" -this man will first of all "hold the head, from which the whole body is compacted and bound together, and, through means of every joint according to the measure of the ministration of each several part, maketh increase of the body to the edification of itself in love." And then shall every word also seem consistent to him, if he for his part diligently read the Scriptures in company with those who are presbyters in the Church, among whom is the apostolic doctrine, as I have pointed out.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
