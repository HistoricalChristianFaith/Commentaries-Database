[[commentary]]
quote='''
Wherefore also did the Lord say to His disciples, "Ye have not chosen Me, but I have chosen you;" indicating that they did not glorify Him when they followed Him; but that, in following the Son of God, they were glorified by Him. And again, "I will, that where I am, there they also may be, that they may behold My glory;" not vainly boasting because of this, but desiring that His disciples should share in His glory: of whom Esaias also says, "I will bring thy seed from the east, and will gather thee from the west; and I will say to the north, Give up; and to the south, Keep not back: bring My sons from far, and My daughters from the ends of the earth; all, as many as have been called in My name: for in My glory I have prepared, and formed, and made him." Inasmuch as then, "wheresoever the carcase is, there shall also the eagles be gathered together," we do participate in the glory of the Lord, who has both formed us, and prepared us for this, that, when we are with Him, we may partake of His glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="Against Heresies 4.14.1"


[[commentary]]
quote='''
Service [rendered] to God brings no profit to God, nor does God need our obedience. However, he grants life, incorruption and eternal glory to those who follow and serve him, bestowing gifts on those who serve [him] because they do serve him and on his followers because they do follow him. But he does not receive any benefit from them because he is already rich, perfect and in need of nothing. Still, God demands service from men and women so that he can benefit those who continue in his service, since he is so good and merciful. For as much as God lacks nothing, that is how much we stand in need of fellowship with God, because our glory consists in continuing and remaining permanently in God's service.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4.14.1"
