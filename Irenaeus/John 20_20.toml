[[commentary]]
quote='''
In the same manner, therefore, as Christ did rise in the substance of flesh, and pointed out to His disciples the mark of the nails and the opening in His side (now these are the tokens of that flesh which rose from the dead), so "shall He also," it is said, "raise us up by His own power."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"


[[commentary]]
quote='''
If, then, the Lord observed the law of the dead, that He might become the first-begotten from the dead, and tarried until the third day "in the lower parts of the earth;" then afterwards rising in the flesh, so that He even showed the print of the nails to His disciples, He thus ascended to the Father;-[if all these things occurred, I say], how must these men not be put to confusion, who allege that "the lower parts" refer to this world of ours, but that their inner man, leaving the body here, ascends into the super-celestial place? For as the Lord "went away in the midst of the shadow of death," where the souls of the dead were, yet afterwards arose in the body, and after the resurrection was taken up [into heaven], it is manifest that the souls of His disciples also, upon whose account the Lord underwent these things, shall go away into the invisible place allotted to them by God, and there remain until the resurrection, awaiting that event; then receiving their bodies, and rising in their entirety, that is bodily, just as the Lord arose, they shall come thus into the presence of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"


[[commentary]]
quote='''
As Christ rose in the substance of flesh and pointed out to his disciples the mark of the nails and the opening in his side (now these are the tokens of that flesh that rose from the dead), so “shall he also,” it is said, “raise us up by his own power.” What, then, are mortal bodies? Can they be souls? Not at all, for souls are incorporeal when compared with mortal bodies.… We must therefore conclude that it is in reference to the flesh that death is mentioned. This [flesh], after the soul’s departure, becomes breathless and inanimate and is decomposed gradually into the earth from which it was taken. This, then, is what is mortal. And it is concerning this that [Paul] says, “He shall also enliven your mortal bodies.”
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="AGAINST HERESIES 5.7.1"
