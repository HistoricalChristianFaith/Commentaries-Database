[[commentary]]
quote='''
The Father of all is called God, and is so; and Antichrist shall be lifted up, not above Him, but above those which are indeed called gods, but are not. And Paul himself says that this is true: "We know that an idol is nothing, and that there is none other God but one. For though there be that are called gods, whether in heaven or in earth; yet to us there is but one God, the Father, of whom are all things, and we through Him; and one Lord Jesus Christ, by whom are all things, and we by Him." For he has made a distinction, and separated those which are indeed called gods, but which are none, from the one God the Father, from whom are all things, and, he has confessed in the most decided manner in his own person, one Lord Jesus Christ. But in this clause, "whether in heaven or in earth," he does not speak of the formers of the world, as these teachers expound it; but his meaning is similar to that of Moses, when it is said, "Thou shalt not make to thyself any image for God, of whatsoever things are in heaven above, whatsoever in the earth beneath, and whatsoever in the waters under the earth."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
