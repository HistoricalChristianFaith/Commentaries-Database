[[commentary]]
quote='''
And the Apostle Paul also, saying, "For though ye have served them which are no gods; ye now know God, or rather, are known of God," has made a separation between those that were not [gods] and Him who is God. And again, speaking of Antichrist, he says, "who opposeth and exalteth himself above all that is called God, or that is worshipped." He points out here those who are called gods, by such as know not God, that is, idols. For the Father of all is called God, and is so; and Antichrist shall be lifted up, not above Him, but above those which are indeed called gods, but are not. And Paul himself says that this is true: "We know that an idol is nothing, and that there is none other God but one. For though there be that are called gods, whether in heaven or in earth; yet to us there is but one God, the Father, of whom are all things, and we through Him; and one Lord Jesus Christ, by whom are all things, and we by Him." For he has made a distinction, and separated those which are indeed called gods, but which are none, from the one God the Father, from whom are all things, and, he has confessed in the most decided manner in his own person, one Lord Jesus Christ. But in this [clause], "whether in heaven or in earth," he does not speak of the formers of the world, as these [teachers] expound it; but his meaning is similar to that of Moses, when it is said, "Thou shalt not make to thyself any image for God, of whatsoever things are in heaven above, whatsoever in the earth beneath, and whatsoever in the waters under the earth." And he does thus explain what are meant by the things in heaven: "Lest when," he says, "looking towards heaven, and observing the sun, and the moon, and the stars, and all the ornament of heaven, falling into error, thou shouldest adore and serve them." And Moses himself, being a man of God, was indeed given as a god before Pharaoh; but he is not properly termed Lord, nor is called God by the prophets, but is spoken of by the Spirit as "Moses, the faithful minister and servant of God," which also he was.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
