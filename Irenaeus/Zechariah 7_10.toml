[[commentary]]
quote='''
And Zechariah also, among the twelve prophets, pointing out to the people the will of God, says: "These things does the Lord Omnipotent declare: Execute true judgment, and show mercy and compassion each one to his brother. And oppress not the widow, and the orphan, and the proselyte, and the poor; and let none imagine evil against your brother in his heart." And again, he says: "These are the words which ye shall utter. Speak ye the truth every man to his neighbour, and execute peaceful judgment in your gates, and let none of you imagine evil in his heart against his brother, and ye shall not love false swearing: for all these things I hate, saith the Lord Almighty." Moreover, David also says in like manner: "What man is there who desireth life, and would fain see good days? Keep thy tongue from evil, and thy lips that they speak no guile. Shun evil, and do good: seek peace, and pursue it." From all these it is evident that God did not seek sacrifices and holocausts from them, but faith, and obedience, and righteousness, because of their salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="Against Heresies Book IV"
