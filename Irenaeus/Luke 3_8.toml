[[commentary]]
quote='''
If, then, God promised him the inheritance of the land, yet he did not receive it during all the time of his sojourn there, it must be, that together with his seed, that is, those who fear God and believe in Him, he shall receive it at the resurrection of the just. For his seed is the Church, which receives the adoption to God through the Lord, as John the Baptist said: "For God is able from the stones to raise up children to Abraham." Thus also the apostle says in the Epistle to the Galatians: "But ye, brethren, as Isaac was, are the children of the promise."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies (Book V, Chapter 32)"
