[[commentary]]
quote='''
The Lord has therefore endured all these things on our behalf, in order that we, having been instructed by means of them all, may be in all respects circumspect for the time to come, and that, having been rationally taught to love God, we may continue in His perfect love: for God has displayed long-suffering in the case of man's apostasy; while man has been instructed by means of it, as also the prophet says, "Thine own apostasy shall heal thee;" God thus determining all things beforehand for the bringing of man to perfection, for his edification, and for the revelation of His dispensations, that goodness may both be made apparent, and righteousness perfected, and that the Church may be fashioned after the image of His Son, and that man may finally be brought to maturity at some future time, becoming ripe through such privileges to see and comprehend God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:37.7"
