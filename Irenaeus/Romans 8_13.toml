[[commentary]]
quote='''
And again he says, in the Epistle to the Romans, "For if ye live after the flesh, ye shall die." [Now by these words] he does not prohibit them from living their lives in the flesh, for he was himself in the flesh when he wrote to them; but he cuts away the lusts of the flesh, those which bring death upon a man. And for this reason he says in continuation, "But if ye through the Spirit do mortify the works of the flesh, ye shall live. For whosoever are led by the Spirit of God, these are the sons of God."
'''
source_title="Irenaeus Against Heresies Book 5"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
