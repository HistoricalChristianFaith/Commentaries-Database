[[commentary]]
quote='''
The Gospel, therefore, knew no other son of man but Him who was of Mary, who also suffered; and no Christ who flew away from Jesus before the passion; but Him who was born it knew as Jesus Christ the Son of God, and that this same suffered and rose again, as John, the disciple of the Lord, verifies, saying: "But these are written, that ye might believe that Jesus is the Christ, the Son of God, and that believing ye might have eternal life in His name," -foreseeing these blasphemous systems which divide the Lord, as far as lies in their power, saying that He was formed of two different substances. For this reason also he has thus testified to us in his Epistle: "Little children, it is the last time; and as ye have heard that Antichrist doth come, now have many antichrists appeared; whereby we know that it is the last time. They went out from us, but they were not of us; for if they had been of us, they would have continued with us: but [they departed], that they might be made manifest that they are not of us. Know ye therefore, that every lie is from without, and is not of the truth. Who is a liar, but he that denieth that Jesus is the Christ? This is Antichrist."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
