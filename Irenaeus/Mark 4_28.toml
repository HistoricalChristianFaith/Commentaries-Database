[[commentary]]
quote='''
Those, again, who maintain that the things around us originated from apostasy, ignorance, and passion, do, while offering unto Him the fruits of ignorance, passion, and apostasy, sin against their Father, rather subjecting Him to insult than giving Him thanks. But how can they be consistent with themselves, [when they say] that the bread over which thanks have been given is the body of their Lord, and the cup His blood, if they do not call Himself the Son of the Creator of the world, that is, His Word, through whom the wood fructifies, and the fountains gush forth, and the earth gives "first the blade, then the ear, then the full corn in the ear."

Then, again, how can they say that the flesh, which is nourished with the body of the Lord and with His blood, goes to corruption, and does not partake of life? Let them, therefore, either alter their opinion, or cease from offering the things just mentioned. But our opinion is in accordance with the Eucharist, and the Eucharist in turn establishes our opinion. For we offer to Him His own, announcing consistently the fellowship and union of the flesh and Spirit. For as the bread, which is produced from the earth, when it receives the invocation of God, is no longer common bread, but the Eucharist, consisting of two realities, earthly and heavenly; so also our bodies, when they receive the Eucharist, are no longer corruptible, having the hope of the resurrection to eternity.
'''
source_title="AGAINST HERESIES 4.18.4-5"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
