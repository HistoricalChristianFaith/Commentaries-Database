[[commentary]]
quote='''
And through the Word Himself who had been made visible and palpable, was the Father shown forth, although all did not equally believe in Him; but all saw the Father in the Son: for the Father is the invisible of the Son, but the Son the visible of the Father. And for this reason all spake with Christ when He was present [upon earth], and they named Him God. Yea, even the demons exclaimed, on beholding the Son: "We know Thee who Thou art, the Holy One of God." And the devil looking at Him, and tempting Him, said: "If Thou art the Son of God;" -all thus indeed seeing and speaking of the Son and the Father, but all not believing [in them].
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies (Book IV, Chapter 6)"
