[[commentary]]
quote='''
...so also, from the beginning, did God permit man to be swallowed up by the great whale, who was the author of transgression, not that he should perish altogether when so engulphed; but, arranging and preparing the plan of salvation, which was accomplished by the Word, through the sign of Jonah, for those who held the same opinion as Jonah regarding the Lord, and who confessed, and said, "I am a servant of the Lord, and I worship the Lord God of heaven, who hath made the sea and the dry land." [This was done] that man, receiving an unhoped-for salvation from God, might rise from the dead, and glorify God, and repeat that word which was uttered in prophecy by Jonah: "I cried by reason of mine affliction to the Lord my God, and He heard me out of the belly of hell;" [Jonah 2:2] and that he might always continue glorifying God, and giving thanks without ceasing, for that salvation which he has derived from Him, "that no flesh should glory in the Lord's presence;" [1 Corinthians 1:29] and that man should never adopt an opposite opinion with regard to God, supposing that the incorruptibility which belongs to him is his own naturally, and by thus not holding the truth, should boast with empty superciliousness, as if he were naturally like to God. For he (Satan) thus rendered him (man) more ungrateful towards his Creator, obscured the love which God had towards man, and blinded his mind not to perceive what is worthy of God, comparing himself with, and judging himself equal to, God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies (Book III, Chapter 20)"
