[[commentary]]
quote='''
For which reason the Lord declared to the disciples: "Behold, I say unto you, Lift up your eyes, and look upon the districts (regiones), for they are white [already] to harvest. For the harvest-man receiveth wages, and gathereth fruit unto life eternal, that both he that soweth and he that reapeth may rejoice together. For in this is the saying true, that one soweth and another reapeth. For I have sent you forward to reap that whereon ye bestowed no labour; other men have laboured, and ye have entered into their labours." Who, then, are they that have laboured, and have helped forward the dispensations of God? It is clear that they are the patriarchs and prophets, who even prefigured our faith, and disseminated through the earth the advent of the Son of God, who and what He should be: so that posterity, possessing the fear of God, might easily accept the advent of Christ, having been instructed by the prophets.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV, Chapter XXIII"
