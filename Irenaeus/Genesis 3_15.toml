[[commentary]]
quote='''
He has therefore, in His work of recapitulation, summed up all things, both waging war against our enemy, and crushing him who had at the beginning led us away captives in Adam, and trampled upon his head, as thou canst perceive in Genesis that God said to the serpent, "And I will put enmity between thee and the woman, and between thy seed and her seed; He shall be on the watch for thy head, and thou on the watch for His heel." For from that time, He who should be born of a woman, [namely] from the Virgin, after the likeness of Adam, was preached as keeping watch for the head of the serpent. This is the seed of which the apostle says in the Epistle to the Galatians, "that the law of works was established until the seed should come to whom the promise was made." This fact is exhibited in a still clearer light in the same Epistle, where he thus speaks: "But when the fulness of time was come, God sent forth His Son, made of a woman." For indeed the enemy would not have been fairly vanquished, unless it had been a man [born] of a woman who conquered him. For it was by means of a woman that he got the advantage over man at first, setting himself up as man's opponent. And therefore does the Lord profess Himself to be the Son of man, comprising in Himself that original man out of whom the woman was fashioned, in order that, as our species went down to death through a vanquished man, so we may ascend to life again through a victorious one; and as through a man death received the palm [of victory] against us, so again by a man we may receive the palm against death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="Against Heresies 5.21.1"
