[[commentary]]
quote='''
He called Lazarus "with a loud voice, saying, Lazarus, come forth; and he that was dead came forth bound with bandages, feet and hands." This was symbolical of that man who had been bound in sins. And therefore the Lord said, "Loose him, and let him depart." As, therefore, those who were healed were made whole in those members which had in times past been afflicted; and the dead rose in the identical bodies, their limbs and bodies receiving health, and that life which was granted by the Lord, who prefigures eternal things by temporal, and shows that it is He who is Himself able to extend both healing and life to His handiwork, that His words concerning its [future] resurrection may also be believed; so also at the end, when the Lord utters His voice "by the last trumpet," the dead shall be raised, as He Himself declares: "The hour shall come, in which all the dead which are in the tombs shall hear the voice of the Son of man, and shall come forth; those that have done good to the resurrection of life, and those that have done evil to the resurrection of judgment."
'''
source_title="Against Heresies Book V"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
