[[commentary]]
quote='''
The sacred books acknowledge with regard to Christ, that as He is the Son of man, so is the same Being not a [mere] man; and as He is flesh, so is He also spirit, and the Word of God, and God. And as He was born of Mary in the last times, so did He also proceed from God as the First-begotten of every creature; and as He hungered, so did He satisfy [others]; and as He thirsted, so did He of old cause the Jews to drink, for the "Rock was Christ" Himself: thus does Jesus now give to His believing people power to drink spiritual waters, which spring up to life eternal. And as He was the son of David, so was He also the Lord of David. And as He was from Abraham, so did He also exist before Abraham. And as He was the servant of God, so is He the Son of God, and Lord of the universe. And as He was spit upon ignominiously, so also did He breathe the Holy Spirit into His disciples. And as He was saddened, so also did He give joy to His people. And as He was capable of being handled and touched, so again did He, in a non-apprehensible form, pass through the midst of those who sought to injure Him, and entered without impediment through closed doors. And as He slept, so did He also rule the sea, the winds, and the storms. And as He suffered, so also is He alive, and life-giving, and healing all our infirmity. And as He died, so is He also the Resurrection of the dead. He suffered shame on earth, while He is higher than all glory and praise in heaven; who, "though He was crucified through weakness, yet He liveth by divine power;" who "descended into the lower parts of the earth," and who "ascended up above the heavens;" for whom a manger sufficed, yet who filled all things; who was dead, yet who liveth for ever and ever. Amen.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FFragments%2520from%2520the%2520Lost%2520Writings%2520of%2520Irenaeus.html"
source_title="Fragments from the Lost Writings of Irenaeus, LII"


[[commentary]]
quote='''
Since the Son of God is always one and the same, He gives to those who believe on Him a well of water [springing up] to eternal life, but He causes the unfruitful fig-tree immediately to dry up; and in the days of Noah He justly brought on the deluge for the purpose of extinguishing that most infamous race of men then existent, who could not bring forth fruit to God, since the angels that sinned had commingled with them, and [acted as He did] in order that He might put a check upon the sins of these men, but [that at the same time] He might preserve the archetype, the formation of Adam. And it was He who rained fire and brimstone from heaven, in the days of Lot, upon Sodom and Gomorrah, "an example of the righteous judgment of God," that all may know, "that every tree that bringeth not forth good fruit shall be cut down, and cast into the fire." And it is He who uses [the words], that it will be more tolerable for Sodom in the general judgment than for those who beheld His wonders, and did not believe on Him, nor receive His doctrine. For as He gave by His advent a greater privilege to those who believed on Him, and who do His will, so also did He point out that those who did not believe on Him should have a more severe punishment in the judgment; thus extending equal justice to all, and being to exact more from those to whom He gives the more; the more, however, not because He reveals the knowledge of another Father, as I have shown so fully and so repeatedly, but because He has, by means of His advent, poured upon the human race the greater gift of paternal grace.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV, Chapter XXXVI"
