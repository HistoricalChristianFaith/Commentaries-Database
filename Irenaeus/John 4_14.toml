[[commentary]]
quote='''
And as He thirsted, so did He of old cause the Jews to drink, for the "Rock was Christ" Himself: thus does Jesus now give to His believing people power to drink spiritual waters, which spring up to life eternal.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FFragments%2520from%2520the%2520Lost%2520Writings%2520of%2520Irenaeus.html"
source_title="Fragments from the Lost Writings of Irenaeus, LII"


[[commentary]]
quote='''
Since the Son of God is always one and the same, He gives to those who believe on Him a well of water [springing up] to eternal life, but He causes the unfruitful fig-tree immediately to dry up...
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV, Chapter XXXVI"
