[[commentary]]
quote='''
He, then, who was adored by the prophets as the living God, He is the God of the living; and His Word is He who also spake to Moses, who also put the Sadducees to silence, who also bestowed the gift of resurrection, thus revealing [both] truths to those who are blind, that is, the resurrection and God [in His true character]. For if He be not the God of the dead, but of the living, yet was called the God of the fathers who were sleeping, they do indubitably live to God, and have not passed out of existence, since they are children of the resurrection. But our Lord is Himself the resurrection, as He does Himself declare, "I am the resurrection and the life." But the fathers are His children; for it is said by the prophet: "Instead of thy fathers, thy children have been made to thee." Christ Himself, therefore, together with the Father, is the God of the living, who spake to Moses, and who was also manifested to the fathers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4.5.2"
