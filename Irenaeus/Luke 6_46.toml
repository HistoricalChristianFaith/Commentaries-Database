[[commentary]]
quote='''
For this reason the Lord also said, "Let your light so shine before men, that they may see your good deeds, and glorify your Father who is in heaven." And, "Take heed to yourselves, lest perchance your hearts be overcharged with surfeiting, and drunkenness, and worldly cares." And, "Let your loins be girded about, and your lamps burning, and ye like unto men that wait for their Lord, when He returns from the wedding, that when He cometh and knocketh, they may open to Him. Blessed is that servant whom his Lord, when He cometh, shall find so doing." And again, "The servant who knows his Lord's will, and does it not, shall be beaten with many stripes." And, "Why call ye me, Lord, Lord, and do not the things which I say?" And again, "But if the servant say in his heart, The Lord delayeth, and begin to beat his fellow-servants, and to eat, and drink, and to be drunken, his Lord will come in a day on which he does not expect Him, and shall cut him in sunder, and appoint his portion with the hypocrites." All such passages demonstrate the independent will of man, and at the same time the counsel which God conveys to him, by which He exhorts us to submit ourselves to Him, and seeks to turn us away from [the sin of] unbelief against Him, without, however, in any way coercing us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies (Book IV, Chapter 37)"

[[commentary]]
quote='''
In like manner, too, those are unclean which have the double hoof but do not ruminate: this is plainly an indication of all heretics, and of those who do not meditate on the words of God, neither are adorned with works of righteousness; to whom also the Lord says, "Why call ye Me Lord, Lord, and do not the things which I say to you? " For men of this stamp do indeed say that they believe in the Father and the Son, but they never meditate as they should upon the things of God, neither are they adorned with works of righteousness; but, as I have already observed, they have adopted the lives of swine and of dogs, giving themselves over to filthiness, to gluttony, and recklessness of all sorts. Justly, therefore, did the apostle call all such "carnal" and "animal," —[all those, namely], who through their own unbelief and luxury do not receive the Divine Spirit, and in their various phases cast out from themselves the life-giving Word, and walk stupidly after their own lusts: the prophets, too, spake of them as beasts of burden and wild beasts; custom likewise has viewed them in the light of cattle and irrational creatures; and the law has pronounced them unclean.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies (Book V, Chapter 8)"
