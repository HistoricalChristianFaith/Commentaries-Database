[[commentary]]
quote='''
And, "The servant who knows his Lord's will, and does it not, shall be beaten with many stripes." And, "Why call ye me, Lord, Lord, and do not the things which I say? " And again, "But if the servant say in his heart, The Lord delayeth, and begin to beat his fellow-servants, and to eat, and drink, and to be drunken, his Lord will come in a day on which he does not expect Him, and shall cut him in sunder, and appoint his portion with the hypocrites." All such passages demonstrate the independent will of man, and at the same time the counsel which God conveys to him, by which He exhorts us to submit ourselves to Him, and seeks to turn us away from [the sin of] unbelief against Him, without, however, in any way coercing us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"

[[commentary]]
quote='''
In like manner, too, those are unclean which have the double hoof but do not ruminate: this is plainly an indication of all heretics, and of those who do not meditate on the words of God, neither are adorned with works of righteousness; to whom also the Lord says, "Why call ye Me Lord, Lord, and do not the things which I say to you? " For men of this stamp do indeed say that they believe in the Father and the Son, but they never meditate as they should upon the things of God, neither are they adorned with works of righteousness; but, as I have already observed, they have adopted the lives of swine and of dogs, giving themselves over to filthiness, to gluttony, and recklessness of all sorts.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
