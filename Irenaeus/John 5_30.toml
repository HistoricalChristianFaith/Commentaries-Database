[[commentary]]
quote='''
For as we do direct our faith towards the Son, so also should we possess a firm and immoveable love towards the Father. In his book against Marcion, Justin does well say: "I would not have believed the Lord Himself, if He had announced any other than He who is our framer, maker, and nourisher. But because the only-begotten Son came to us from the one God, who both made this world and formed us, and contains and administers all things, summing up His own handiwork in Himself, my faith towards Him is steadfast, and my love to the Father immoveable, God bestowing both upon us."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
