[[commentary]]
quote='''
But if, when the Saviour came to this earth, He sent His apostles into the world to proclaim with accuracy His advent, and to teach the Father's will, having nothing in common with the doctrine of the Gentiles or of the Jews, much more, while yet existing in the Pleroma, would He have appointed His own heralds to proclaim His future advent into this world, and having nothing in common with those prophecies originating from the Demiurge. But if, when within the Pleroma, He availed Himself of those prophets who were under the law, and declared His own matters through their instrumentality; much more would He, upon His arrival hither, have made use of these same teachers, and have preached the Gospel to us by their means. Therefore let them not any longer assert that Peter and Paul and the other apostles proclaimed the truth, but that it was the scribes and Pharisees, and the others, through whom the law was propounded. But if, at His advent, He sent forth His own apostles in the spirit of truth, and not in that of error, He did the very same also in the case of the prophets; for the Word of God was always the self-same: and if the Spirit from the Pleroma was, according to these men's system, the Spirit of light, the Spirit of truth, the Spirit of perfection, and the Spirit of knowledge, while that from the Demiurge was the spirit of ignorance, degeneracy, and error, and the offspring of obscurity; how can it be, that in one and the same being there exists perfection and defect, knowledge and ignorance, error and truth, light and darkness? But if it was impossible that such should happen in the case of the prophets, for they preached the word of the Lord from one God, and proclaimed the advent of His Son, much more would the Lord Himself never have uttered words, on one occasion from above, but on another from degeneracy below, thus becoming the teacher at once of knowledge and of ignorance; nor would He have ever glorified as Father at one time the Founder of the world, and at another Him who is above this one, as He does Himself declare: "No man putteth a piece of a new garment upon an old one, nor do they put new wine into old bottles." Let these men, therefore, either have nothing whatever to do with the prophets, as with those that are ancients, and allege no longer that these men, being sent beforehand by the Demiurge, spake certain things under that new influence which pertains to the Pleroma; or, on the other hand, let them be convinced by our Lord, when He declares that new wine cannot be put into old bottles.
'''
source_title="Irenaeus Against Heresies Book 4"
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
