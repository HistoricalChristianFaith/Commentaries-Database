[[commentary]]
quote='''
And everywhere, when [referring to] the passion of our Lord, and to His human nature, and His subjection to death, he employs the name of Christ, as in that passage: "Destroy not him with thy meat for whom Christ died." And again: "But now, in Christ, ye who sometimes were far off are made nigh by the blood of Christ." And again: "Christ has redeemed us from the curse of the law, being made a curse for us: for it is written, Cursed is every one that hangeth upon a tree." And again: "And through thy knowledge shall the weak brother perish, for whom Christ died; " indicating that the impassible Christ did not descend upon Jesus, but that He Himself, because He was Jesus Christ, suffered for us; He, who lay in the tomb, and rose again, who descended and ascended,-the Son of God having been made the Son of man, as the very name itself doth declare.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
But now, by means of communion with Himself, the Lord has reconciled man to God the Father, in reconciling us to Himself by the body of His own flesh, and redeeming us by His own blood, as the apostle says to the Ephesians, "In whom we have redemption through His blood, the remission of sins; " and again to the same he says, "Ye who formerly were far off have been brought near in the blood of Christ; " and again, "Abolishing in His flesh the enmities, [even] the law of commandments [contained] in ordinances." And in every Epistle the apostle plainly testifies, that through the flesh of our Lord, and through His blood, we have been saved.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
