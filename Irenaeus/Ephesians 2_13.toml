[[commentary]]
quote='''
And everywhere, when [referring to] the passion of our Lord, and to His human nature, and His subjection to death, he employs the name of Christ, as in that passage: "Destroy not him with thy meat for whom Christ died." And again: "But now, in Christ, ye who sometimes were far off are made nigh by the blood of Christ." And again: "Christ has redeemed us from the curse of the law, being made a curse for us: for it is written, Cursed is every one that hangeth upon a tree." And again: "And through thy knowledge shall the weak brother perish, for whom Christ died; " indicating that the impassible Christ did not descend upon Jesus, but that He Himself, because He was Jesus Christ, suffered for us; He, who lay in the tomb, and rose again, who descended and ascended,-the Son of God having been made the Son of man, as the very name itself doth declare. For in the name of Christ is implied, He that anoints, He that is anointed, and the unction itself with which He is anointed. And it is the Father who anoints, but the Son who is anointed by the Spirit, who is the unction, as the Word declares by Isaiah, "The Spirit of the Lord is upon me, because He hath anointed me," -pointing out both the anointing Father, the anointed Son, and the unction, which is the Spirit.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"

[[commentary]]
quote='''
If, then, any one allege that in this respect the flesh of the Lord was different from ours, because it indeed did not commit sin, neither was deceit found in His soul, while we, on the other hand, are sinners, he says what is the fact. But if he pretends that the Lord possessed another substance of flesh, the sayings respecting reconciliation will not agree with that man. For that thing is reconciled which had formerly been in enmity. Now, if the Lord had taken flesh from another substance, He would not, by so doing, have reconciled that one to God which had become inimical through transgression. But now, by means of communion with Himself, the Lord has reconciled man to God the Father, in reconciling us to Himself by the body of His own flesh, and redeeming us by His own blood, as the apostle says to the Ephesians, "In whom we have redemption through His blood, the remission of sins; " and again to the same he says, "Ye who formerly were far off have been brought near in the blood of Christ; " and again, "Abolishing in His flesh the enmities, [even] the law of commandments [contained] in ordinances." And in every Epistle the apostle plainly testifies, that through the flesh of our Lord, and through His blood, we have been saved.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"
