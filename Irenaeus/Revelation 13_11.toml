[[commentary]]
quote='''
After this he likewise describes his armour-bearer, whom he also terms a false prophet: "He spake as a dragon, and exercised all the power of the first beast in his sight, and caused the earth, and those that dwell therein, to adore the first beast, whose deadly wound was healed. And he shall perform great wonders, so that he can even cause fire to descend from heaven upon the earth in the sight of men, and he shall lead the inhabitants of the earth astray." Let no one imagine that he performs these wonders by divine power, but by the working of magic. And we must not be surprised if, since the demons and apostate spirits are at his service, he through their means performs wonders, by which he leads the inhabitants of the earth astray. John says further: "And he shall order an image of the beast to be made, and he shall give breath to the image, so that the image shall speak; and he shall cause those to be slain who will not adore it." He says also: "And he will cause a mark [to be put] in the forehead and in the right hand, that no one may be able to buy or sell, unless he who has the mark of the name of the beast or the number of his name; and the number is six hundred and sixty-six," that is, six times a hundred, six times ten, and six units. [He gives this] as a summing up of the whole of that apostasy which has taken place during six thousand years.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"

