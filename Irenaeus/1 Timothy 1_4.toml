[[commentary]]
quote='''
Inasmuch as certain men have set the truth aside, and bring in lying words and vain genealogies, which, as the apostle says, "minister questions rather than godly edifying which is in faith," and by means of their craftily-constructed plausibilities draw away the minds of the inexperienced and take them captive, [I have felt constrained, my dear friend, to compose the following treatise in order to expose and counteract their machinations.] These men falsify the oracles of God, and prove themselves evil interpreters of the good word of revelation. They also overthrow the faith of many, by drawing them away, under a pretence of [superior] knowledge, from Him who rounded and adorned the universe; as if, forsooth, they had something more excellent and sublime to reveal, than that God who created the heaven and the earth, and all things that are therein. By means of specious and plausible words, they cunningly allure the simple-minded to inquire into their system; but they nevertheless clumsily destroy them, while they initiate them into their blasphemous and impious opinions respecting the Demiurge; and these simple ones are unable, even in such a matter, to distinguish falsehood from truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html'
source_title="Against Heresies Book 1, Preface.1"

[[commentary]]
quote='''
True knowledge, then, consists in the understanding of Christ, which Paul terms the wisdom of God hidden in a mystery, which "the natural man receiveth not," the doctrine of the cross; of which if any man "taste," he will not accede to the disputations and quibbles of proud and puffed-up men, who go into matters of which they have no perception. For the truth is unsophisticated; and "the word is nigh thee, in thy mouth and in thy heart," as the same apostle declares, being easy of comprehension to those who are obedient. For it renders us like to Christ, if we experience "the power of his resurrection and the fellowship of His sufferings." For this is the affinity of the apostolical teaching and the most holy "faith delivered unto us," which the unlearned receive, and those of slender knowledge have taught, not "giving heed to endless genealogies," but studying rather [to observe] a straightforward course of life; lest, having been deprived of the Divine Spirit, they fail to attain to the kingdom of heaven. For truly the first thing is to deny one's self and to follow Christ; and those who do this are borne onward to perfection, having fulfilled all their Teacher's will, becoming sons of God by spiritual regeneration, and heirs of the kingdom of heaven; those who seek which first shall not be forsaken.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FFragments%2520from%2520the%2520Lost%2520Writings%2520of%2520Irenaeus.html'
source_title="Fragments from the Lost Writings of Irenaeus, Fragment XXXVI"