[[commentary]]
quote='''
And therefore the scribes and Pharisees, too, who from the times of the law had begun to despise God, did not receive His Word, that is, they did not believe on Christ. Of these Esaias says: "Thy princes are rebellious, companions of thieves, loving gifts, following after rewards, not judging the fatherless, and negligent of the cause of the widows." And Jeremiah, in like manner: "They," he says, "who rule my people did not know me; they are senseless and imprudent children; they are wise to do evil, but to do well they have no knowledge."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4:2.6"
