[[commentary]]
quote='''
For Christ did not at that time descend upon Jesus, neither was Christ one and Jesus another: but the Word of God-who is the Saviour of all, and the ruler of heaven and earth, who is Jesus, as I have already pointed out, who did also take upon Him flesh, and was anointed by the Spirit from the Father-was made Jesus Christ, as Esaias also says, "There shall come forth a rod from the root of Jesse, and a flower shall rise from his root; and the Spirit of God shall rest upon Him: the spirit of wisdom and understanding, the spirit of counsel and might, the spirit of knowledge and piety, and the spirit of the fear of God, shall fill Him. He shall not judge according to glory, nor reprove after the manner of speech; but He shall dispense judgment to the humble man, and reprove the haughty ones of the earth." And again Esaias, pointing out beforehand His unction, and the reason why he was anointed, does himself say, "The Spirit of God is upon Me, because He hath anointed Me: He hath sent Me to preach the Gospel to the lowly, to heal the broken up in heart, to proclaim liberty to the captives, and sight to the blind; to announce the acceptable year of the Lord, and the day of vengeance; to comfort all that mourn." For inasmuch as the Word of God was man from the root of Jesse, and son of Abraham, in this respect did the Spirit of God rest upon Him, and anoint Him to preach the Gospel to the lowly. But inasmuch as He was God, He did not judge according to glory, nor reprove after the manner of speech. For "He needed not that any should testify to Him of man, for He Himself knew what was in man." For He called all men that mourn; and granting forgiveness to those who had been led into captivity by their sins, He loosed them from their chains, of whom Solomon says, "Every one shall be holden with the cords of his own sins." Therefore did the Spirit of God descend upon Him, [the Spirit] of Him who had promised by the prophets that He would anoint Him, so that we, receiving from the abundance of His unction, might be saved. Such, then, [is the witness] of Matthew.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="Against Heresies (Book III, Chapter 9), Section 3"

[[commentary]]
quote='''
...the Son of God having been made the Son of man, as the very name itself doth declare. For in the name of Christ is implied, He that anoints, He that is anointed, and the unction itself with which He is anointed. And it is the Father who anoints, but the Son who is anointed by the Spirit, who is the unction, as the Word declares by Isaiah, "The Spirit of the Lord is upon me, because He hath anointed me," -pointing out both the anointing Father, the anointed Son, and the unction, which is the Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="Against Heresies (Book III, Chapter 18), Section 3"
