[[commentary]]
quote='''
Wherefore also John does appropriately relate that the Lord said to the Jews: "Ye search the Scriptures, in which ye think ye have eternal life; these are they which testify of me. And ye are not willing to come unto Me, that ye may have life." How therefore did the Scriptures testify of Him, unless they were from one and the same Father, instructing men beforehand as to the advent of His Son, and foretelling the salvation brought in by Him?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
