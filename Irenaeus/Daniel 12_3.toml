[[commentary]]
quote='''
For every prophecy, before its fulfilment, is to men [full of] enigmas and ambiguities. But when the time has arrived, and the prediction has come to pass, then the prophecies have a clear and certain exposition. And for this reason, indeed, when at this present time the law is read to the Jews, it is like a fable; for they do not possess the explanation of all things pertaining to the advent of the Son of God, which took place in human nature; but when it is read by the Christians, it is a treasure, hid indeed in a field, but brought to light by the cross of Christ, and explained, both enriching the understanding of men, and showing forth the wisdom of God and declaring His dispensations with regard to man, and forming the kingdom of Christ beforehand, and preaching by anticipation the inheritance of the holy Jerusalem, and proclaiming beforehand that the man who loves God shall arrive at such excellency as even to see God, and hear His word, and from the hearing of His discourse be glorified to such an extent, that others cannot behold the glory of his countenance, as was said by Daniel: "Those who do understand, shall shine as the brightness of the firmament, and many of the righteous as the stars for ever and ever."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="Against Heresies Book IV"
