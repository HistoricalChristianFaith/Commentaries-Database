[[commentary]]
quote='''
In this way, too, Samuel, who judged the people so many years, and bore rule over Israel without any pride, in the end cleared himself, saying, "I have walked before you from my childhood even unto this day: answer me in the sight of God, and before His anointed; whose ox or whose ass of yours have I taken, or over whom have I tyrannized, or whom have I oppressed? or if I have received from the hand of any a bribe or [so much as] a shoe, speak out against me, and I will restore it to you." And when the people had said to him, "Thou hast not tyrannized, neither hast thou oppressed us neither hast thou taken ought of any man's hand," he called the Lord to witness, saying, "The Lord is witness, and His Anointed is witness this day, that ye have not found ought in my hand. And they said to him, He is witness." In this strain also the Apostle Paul, inasmuch as he had a good conscience, said to the Corinthians: "For we are not as many, who corrupt the Word of God: but as of sincerity, but as of God, in the sight of God speak we in Christ;" "We have injured no man, corrupted no man, circumvented no man."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html'
source_title="AGAINST HERESIES 4.26.4"
