[[commentary]]
quote='''
Then, when a multitude had gathered around them from all quarters because of this unexpected deed, Peter addressed them: "Ye men of Israel, why marvel ye at this; or why look ye so earnestly on us, as though by our own power we had made this man to walk? The God of Abraham, the God of Isaac, and the God of Jacob, the God of our fathers, hath glorified His Son, whom ye delivered up for judgment, and denied in the presence of Pilate, when he wished to let Him go. But ye were bitterly set against the Holy One and the Just, and desired a murderer to be granted unto you; but ye killed the Prince of life, whom God hath raised from the dead, whereof we are witnesses. And in the faith of His name, him, whom ye see and know, hath His name made strong; yea, the faith which is by Him, hath given him this perfect soundness in the presence of you all. And now, brethren, I wot that through ignorance ye did this wickedness.... But those things which God before had showed by the mouth of all the prophets, that His Christ should suffer, He hath so fulfilled. Repent ye therefore, and be converted, that your sins may be blotted out, and that the times of refreshing may come to you from the presence of the Lord; and He shall send Jesus Christ, prepared for you beforehand, whom the heaven must indeed receive until the times of the arrangement of all things, of which God hath spoken by His holy prophets. For Moses truly said unto our fathers, Your Lord God Shall raise up to you a Prophet from your brethren, like unto me; Him shall ye hear in all things whatsoever He shall say unto you. And it shall come to pass, that every soul, whosoever will not hear that Prophet, shall be destroyed from among the people. And all [the prophets] from Samuel, and henceforth, as many as have spoken, have likewise foretold of these days. Ye are the children of the prophets, and of the covenant which God made with our fathers, saying unto Abraham, And in thy seed shall all the kindreds of the earth be blessed. Unto you first, God, having raised up His Son, sent Him blessing you, that each may turn himself from his iniquities." Peter, together with John, preached to them this plain message of glad tidings, that the promise which God made to the fathers had been fulfilled by Jesus; not certainly proclaiming another god, but the Son of God, who also was made man, and suffered; thus leading Israel into knowledge, and through Jesus preaching the resurrection of the dead, and showing, that whatever the prophets had proclaimed as to the suffering of Christ, these had God fulfilled.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html"
source_title="Against Heresies Book III"
