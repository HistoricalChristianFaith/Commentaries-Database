[[commentary]]
quote='''
Ye presumptuously maintain that ye are acquainted with the unspeakable mysteries of God; while even the Lord, the very Son of God, allowed that the Father alone knows the very day and hour of judgment, when He plainly declares, "But of that day and that hour knoweth no man, neither the Son, but the Father only." If, then, the Son was not ashamed to ascribe the knowledge of that day to the Father only, but declared what was true regarding the matter, neither let us be ashamed to reserve for God those greater questions which may occur to us. For no man is superior to his master. If any one, therefore, says to us, "How then was the Son produced by the Father?" we reply to him, that no man understands that production, or generation, or calling, or revelation, or by whatever name one may describe His generation, which is in fact altogether indescribable. Neither Valentinus, nor Marcion, nor Saturninus, nor Basilides, nor angels, nor archangels, nor principalities, nor powers [possess this knowledge], but the Father only who begat, and the Son who was begotten. Since therefore His generation is unspeakable, those who strive to set forth generations and productions cannot be in their right mind, inasmuch as they undertake to describe things which are indescribable.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25202.html"
source_title="Irenaeus Against Heresies Book 2"
