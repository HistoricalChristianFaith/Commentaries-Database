[[commentary]]
quote='''
For David has not ascended into the heavens; but he saith himself, The Lord said unto my Lord, Sit Thou on My right hand, until I make Thy foes Thy footstool. Therefore let all the house of Israel know assuredly, that God hath made [that same Jesus, whom ye have crucified, both Lord and Christ." And when the multitudes exclaimed, "What shall we do then?" Peter says to them, "Repent, and be baptized everyone of you in the name of Jesus for the remission of sins, and ye shall receive the gift of the Holy Ghost." Thus the apostles did not preach another God, or another Fulness; nor, that the Christ who suffered and rose again was one, while he who flew off on high was another, and remained impossible; but that there was one and the same God the Father, and Christ Jesus who rose from the dead; and they preached faith in Him, to those who did not believe on the Son of God, and exhorted them out of the prophets, that the Christ whom God promised to send, He sent in Jesus, whom they crucified and God raised up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="Against Heresies Book III"
