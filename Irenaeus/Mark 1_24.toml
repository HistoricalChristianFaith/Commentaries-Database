[[commentary]]
quote='''
And through the Word Himself who had been made visible and palpable, was the Father shown forth, although all did not equally believe in Him; but all saw the Father in the Son: for the Father is the invisible of the Son, but the Son the visible of the Father. And for this reason all spake with Christ when He was present [upon earth], and they named Him God. Yea, even the demons exclaimed, on beholding the Son: "We know Thee who Thou art, the Holy One of God." And the devil looking at Him, and tempting Him, said: "If Thou art the Son of God;"-all thus indeed seeing and speaking of the Son and the Father, but all not believing [in them]. For it was fitting that the truth should receive testimony from all, and should become [a means of] judgment for the salvation indeed of those who believe, but for the condemnation of those who believe not; that all should be fairly judged, and that the faith in the Father and Son should be approved by all, that is, that it should be established by all [as the one means of salvation], receiving testimony from all, both from those belonging to it, since they are its friends, and by those having no connection with it, though they are its enemies. For that evidence is true, and cannot be gainsaid, which elicits even from its adversaries striking testimonies in its behalf; they being convinced with respect to the matter in hand by their own plain contemplation of it, and bearing testimony to it, as well as declaring it.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25204.html"
source_title="Against Heresies Book IV"
