[[commentary]]
quote='''
Now, that the Word of God forms us in the womb, He says to Jeremiah, "Before I formed thee in the womb, I knew thee; and before thou wentest forth from the belly, I sanctified thee, and appointed thee a prophet among the nations." And Paul, too, says in like manner, "But when it pleased God, who separated me from my mother's womb, that I might declare Him among the nations." As, therefore, we are by the Word formed in the womb, this very same Word formed the visual power in him who had been blind from his birth; showing openly who it is that fashions us in secret, since the Word Himself had been made manifest to men: and declaring the original formation of Adam, and the manner in which he was created, and by what hand he was fashioned, indicating the whole from a part. For the Lord who formed the visual powers is He who made the whole man, carrying out the will of the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="AGAINST HERESIES 5:15.3"
