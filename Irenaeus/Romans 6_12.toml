[[commentary]]
quote='''
If, therefore, flesh and blood are the things which procure for us life, it has not been declared of flesh and blood, in the literal meaning (proprie) of the terms, that they cannot inherit the kingdom of God; but [these words apply] to those carnal deeds already mentioned, which, perverting man to sin, deprive him of life. And for this reason he says, in the Epistle to the Romans: "Let not sin, therefore, reign in your mortal body, to be under its control: neither yield ye your members instruments of unrighteousness unto sin; but yield yourselves to God, as being alive from the dead, and your members as instruments of righteousness unto God." In these same members, therefore, in which we used to serve sin, and bring forth fruit unto death, does He wish us to [be obedient] unto righteousness, that we may bring forth fruit unto life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html"
source_title="Against Heresies Book V"


[[commentary]]
quote='''
In these same members, therefore, in which we used to serve sin, and bring forth fruit unto death, does He wish us to [be obedient] unto righteousness, that we may bring forth fruit unto life. Remember, therefore, my beloved friend, that thou hast been redeemed by the flesh of our Lord, re-established by His blood; and "holding the Head, from which the whole body of the Church, having been fitted together, takes increase" -that is, acknowledging the advent in the flesh of the Son of God, and [His] divinity, and looking forward with constancy to His human nature, availing thyself also of these proofs drawn from Scripture -thou dost easily overthrow, as I have pointed out, all those notions of the heretics which were concocted afterwards.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25205.html'
source_title="AGAINST HERESIES 5.14.4"
