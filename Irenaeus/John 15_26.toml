[[commentary]]
quote='''
Wherefore also the Lord promised to send the Comforter, who should join us to God. For as a compacted lump of dough cannot be formed of dry wheat without fluid matter, nor can a loaf possess unity, so, in like manner, neither could we, being many, be made one in Christ Jesus without the water from heaven. And as dry earth does not bring forth unless it receive moisture, in like manner we also, being originally a dry tree, could never have brought forth fruit unto life without the voluntary rain from above. For our bodies have received unity among themselves by means of that layer which leads to incorruption; but our souls, by means of the Spirit. Wherefore both are necessary, since both contribute towards the life of God, our Lord compassionating that erring Samaritan woman -who did not remain with one husband, but committed fornication by [contracting] many marriages-by pointing out, and promising to her living water, so that she should thirst no more, nor occupy herself in acquiring the refreshing water obtained by labour, having in herself water springing up to eternal life. The Lord, receiving this as a gift from His Father, does Himself also confer it upon those who are partakers of Himself, sending the Holy Spirit upon all the earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25203.html'
source_title="AGAINST HERESIES 3.17.2"
