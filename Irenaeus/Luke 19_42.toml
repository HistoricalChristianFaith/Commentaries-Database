[[commentary]]
quote='''
Some passages, also, which occur in the Gospels, receive from them a colouring of the same kind, ... Further, when, as He drew nigh to Jerusalem, He wept over it and said, "If thou hadst known, even thou, in this thy day, the things that belong unto thy peace, but they are hidden from thee," by this word "hidden" He showed the abstruse nature of Bythus.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Irenaeus%2FIrenaeus%2520Against%2520Heresies%2520Book%25201.html"
source_title="Against Heresies Book I"
