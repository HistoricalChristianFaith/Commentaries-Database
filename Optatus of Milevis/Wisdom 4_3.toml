[[commentary]]
quote='''
And with regard to that which you have quoted from the Prophet Solomon:

'The children of adulterers shall not come to perfection, and bastard slips cannot take deep roots,'

this may well be understood to have been said in a literal sense. For, if you take it figuratively, you have excused those who are actually guilty of adultery. But grant that it was said in figure. In that case it has been spoken of heretics, whose sacraments are like invalid wedlock, in whose beds is to be found iniquity, where the very seeds [of life] have been corrupted to the destruction of the Faith.

When Valentinus maintains that the Son of God was on earth in a phantasm, not in Flesh, he corrupted his own faith and that of his followers. The seed of [spiritual] birth has been rooted out in those who have not believed that the Son of God was born in the Flesh of Mary the Virgin, and that in the Flesh He suffered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Optatus%2520of%2520Milevis%2FAgainst%2520the%2520Donatists%2FBook%25204.html'
source_title="AGAINST THE DONATISTS 4:8"
