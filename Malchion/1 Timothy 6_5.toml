[[commentary]]
quote='''
Whereas he was formerly poor and beggarly, having neither inherited a single possession from his fathers, nor acquired any property by art or by any trade, he has now come to have excessive wealth by his deeds of iniquity and sacrilege, and by those means by which he despoils and concusses the brethren, casting the injured unfairly in their suit, and promising to help them for a price, yet deceiving them all the while and to their loss, taking advantage of the readiness of those in difficulties to give in order to get deliverance from what troubled them, and thus supposing that gain is godliness. Neither need I say any thing about his pride and the haughtiness with which he assumed worldly dignities, and his wishing to be styled procurator rather than bishop, and his strutting through the market-places, and reading letters and reciting them as he walked in public, and his being escorted by multitudes of people going before him and following him; so that he brought ill-will and hatred on the faith by his haughty demeanour and by the arrogance of his heart.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Malchion%2FThe%2520Epistle%2520Written%2520by%2520Malchion.html'
source_title="The Epistle Written by Malchion"
