[[commentary]]
quote='''
He says he trusts in this hope concerning them, because they had entered the path of error not willingly, but being deceived. Therefore, having shown them the true way, he believes that they can easily return. But whoever troubles you will bear judgment, whoever he may be. Just as the one who turns a wandering person back is to be rewarded, as James the Apostle says in his letter: Whoever turns a sinner back will save his soul from death and cover a multitude of sins (James 5:20); so too the one who forces the one walking in the right path to turn aside onto a way of error will obtain condemnation, whoever he may be. For this reason, he subjects these; so that they would not defend themselves based on their merit, because they were descendants of Abraham according to the flesh. Finally, exalting themselves, they say to Jesus: We are children of Abraham (John 8:33).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Galatians.html'
source_title="Commentary on Galatians"
