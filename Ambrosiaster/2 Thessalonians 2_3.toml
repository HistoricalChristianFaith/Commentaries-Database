[[commentary]]
quote='''
For this reason, lest they be found unwary because of the disturbance itself, able to be led astray into adoring the devil, who will boast of this in order that, appearing under the name of the Savior and deceiving the saints, he may desire to be adored, to deceive believers in Christ. But in order that the most shameless Satan may not have the opportunity or occasion for deceiving that he thinks he has, he has marked the time and signs of the advent of the Lord, because the Lord will not come before the downfall of the Roman empire occurs, and Antichrist appears, who will kill the saints, even though Roman liberty has been restored, under his own name however. Knowing that the Lord is coming to repress them, he will usurp His name for himself; and in order to appear that his kingdom is true, he will attract with him those who shall perish together with him; so that in the house of the Lord, in the seat of Christ, he may sit and assert himself as God, not as the Son of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title="Commentary on 2 Thessalonians"
