[[commentary]]
quote='''
If, however, something has hurt you, or he is a debtor, impute this to me. Now he undermines the excuse of anger, lest perhaps he would complain that he was hurt by him in such a way that it would not seem fitting to forgive him. But if it were so, he says it must be imputed to himself, through whom the heirs of the kingdom of heaven will be in the future, who have sinned before.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
