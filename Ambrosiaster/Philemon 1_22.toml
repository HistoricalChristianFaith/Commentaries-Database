[[commentary]]
quote='''
To make him more anxious and obedient, it is indicated that he will come; for those who are absent are usually despised. And the reason why the Apostle does not consider himself unworthy to be here yet, who has always suffered weariness and dangers, murders, persecutions, and chains, and whose rest was only in Christ alone? But for the progress of the believers, and to confound the enemies of the cross of Christ, he offered his own flesh to sufferings, in order to obtain crowns of immortality for his soul and body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
