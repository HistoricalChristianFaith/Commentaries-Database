[[commentary]]
quote='''
For in Him dwells all the fullness of the Godhead bodily. For everything that the Father has, He has given to the Son, since He begot Him in the fullness of divinity in bodily form; so that, since He is the head and His creation is the body, everything that is thought to be possible for a heavenly creature is believed to be fully present in Christ; so that no one should believe that anyone else should be worshiped. For whatever one thinks is great in something, they will find even more in it; because all things have it from him, just as the limbs have it from the head: but he himself is always full.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
