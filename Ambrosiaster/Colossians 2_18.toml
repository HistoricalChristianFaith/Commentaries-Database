[[commentary]]
quote='''
What was previously warned under the name of philosophy, now he teaches more openly to be observed by those who, studying earthly wisdom, assert that these things which are adjacent or apparent to the eyes should be worshiped, so that their souls, bound under the firmament, may not strive beyond the firmament towards the higher heavens to worship the God of all. The work of the enemy is such that he always seeks to keep humiliated souls on Earth, where he knows that he, who has been cast down from heaven, will always face the just judgment of God. He simulates religion, although it is the greatest sacrilege. For he inflates the movement of the stars, which he calls angels, not by divine authority, but by human superstition, which is useless and only leads to harm. They refuse to hold onto the faith of Christ, who is the creator and Lord of all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
