[[commentary]]
quote='''
For, as it is said, the one who joins himself to a prostitute is one body with her. Sexual immorality joins them together as one, just as in nature, two become one. As it is written, 'They shall become one flesh' (Genesis 2:24). It is clear that because the woman is from the man, both are one flesh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25201%2520Corinthians.html'
source_title="Commentary on 1 Corinthians"
