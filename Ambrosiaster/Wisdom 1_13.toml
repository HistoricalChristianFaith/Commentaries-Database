[[commentary]]
quote='''
How then does the same Solomon say, "God did not make death," when in another place he says, "Good and evil, life and death, poverty and honor are from God"? (Wis. 1:13; Eccles. 11:14) There is no doubt that all good things are from God, but the evils which He has said are only evils, since vengeance is taken upon us. For punishment, although justly inflicted, still seems evil to the one who suffers it. For God also speaks to sinners through the prophet, saying, "I will bring evils upon you," (Jer. 11:11) that is, "I will subject you to punishments." But life and death are therefore from God, because He gave the law, which promises life to those who keep it, but death to those who despise, though that which is called the second death. For in judging each one what he deserves, from Him is either absolution unto life or guilt unto death. Therefore, He is not the inventor of death, but the judge, because the author of death is sin. How then could God, who knows not how to sin, make death? But when He repays sins, death is said to be from Him, though it is not from Him, but from the one who sinned. By the same reasoning, poverty and riches are from God. For some, having the fear of God, despise luxury, flee wasteful living, and do not turn away their eyes from the needy and the poor: such persons increase good things. For it is written in Proverbs, "Discipline takes away poverty and dishonor" (Prov. 13:18). But those who do not have the fear of God, living more carelessly and despising the needy, as it is written, "in need He shall deliver"; (Ps. 72:12) are not only negligent and foolish toward themselves, but also despise of the law given them. In this way God made the poor and the rich: because while the violation of the law produces want, He is said to do it as the author of the law; and when some, through fear, keep the discipline of the law, they are made rich by God, the author of the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Questions on the Old and New Testaments, PL 35"
