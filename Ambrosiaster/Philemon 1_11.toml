[[commentary]]
quote='''
Therefore, when Onesimus, a fugitive, returned to seek divine assistance, the Apostle baptized him while he was in custody in the city of Rome, seeing the hope of usefulness in him. He commends him in such a way that he indicates his suitability to serve in secular as well as divine duties, having been transformed from useless to useful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
