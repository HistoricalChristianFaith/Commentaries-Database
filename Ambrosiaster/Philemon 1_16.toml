[[commentary]]
quote='''
Onesimus, having offended his own master, fled on a long journey to the Apostle; to show that he did not depart for the purpose of being guilty of a crime, but so that, with sins forgiven, he might return useful to such an extent that he would not only become equal to his master in merits, but also a brother to the master himself. And so that Philemon may not suffer any disdain of pride, as is usual, as if the master were against the servant, he humbles himself when he calls him his brother both in the flesh and in the Lord; so that with the removal of the cause of human condition, because we are all descended from one Adam, we may recognize ourselves as brothers: especially when faith comes in the middle, which cuts off all pride.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
