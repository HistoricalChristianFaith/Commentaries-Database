[[commentary]]
quote='''
I exhort first of all to make supplications, prayers, intercessions, and thanksgivings for all men, for kings, and for all who are in authority, that we may lead a quiet and peaceful life in all godliness and reverence:
This is the ecclesiastical rule, handed down by the master of the Gentiles, which our priests use to supplicate for all, praying for the kings of this world, so that they may have subject nations, so that we may be able to serve our God in peace, with a calm mind and quiet spirit. Also praying for those to whom lofty power is entrusted, that they may govern the republic in justice and truth, with an abundance of resources, so that joy may succeed the removal of disturbance and strife; for bread strengthens the heart, and wine gladdens the mind (Psalm 104:15). Also requesting for those who are in various needs, that they may be rescued and freed, and praise God, the author of their well-being. Also offering thanks for the daily providence of God that is granted to us for life, so that in all these things, God the Father may be praised, from whom all things come (1 Corinthians 8:6); and His Son, through whom all things exist, so that with all opposition and enmity subdued, we may be able to serve God with affectionate piety and chastity; for disturbance and captivity do not preserve piety or chastity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25201%2520Timothy.html'
source_title="Commentary on 1 Timothy"
