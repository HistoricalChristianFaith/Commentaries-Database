[[commentary]]
quote='''
Epaphras, my fellow prisoner in Christ Jesus, sends greetings to you. Mark, Aristarchus, Demas, and Luke, my fellow workers, also send their greetings. They all send their greetings and testify to their share in his glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
