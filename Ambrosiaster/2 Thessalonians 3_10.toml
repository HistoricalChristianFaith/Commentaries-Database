[[commentary]]
quote='''
For when we were with you, we commanded you that if anyone is not willing to work, neither should he eat. He not only taught with words, but also encouraged and acted accordingly; for a suitable teacher is one who fulfills with actions what he teaches with words. For only then do those who are learning know that what they hear is truly so, if they do not see it being neglected by the teacher. Although the things taught are not unknown to be clearly true, if they begin to be neglected by the teacher, it will be difficult for the listeners to progress: for actions persuade more than words. Therefore, those who make progress in both work and understanding, despite negligent teachers, should be rewarded with great prizes. Thus, the purpose was for those of average or humble status in the common people to learn the extent to which they were not losing their freedom. Hence, Solomon also says: Rarely, he says, put your foot toward your friend, lest he become weary of you when he is satisfied (Prov. XXV, 17). For the one who frequently gathers at someone else's table, being devoted to idleness, must flatter the one who feeds him; whereas our religion calls people to freedom. Therefore, if anyone refuses to eat, let them abstain from work; but because no one can live without food, let them devote themselves to the work of laboring, so that living according to their own discretion, they may be able to find favor with God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
