[[commentary]]
quote='''
It is evident that he expresses himself as being joyful because he was ministering to the needs of the saints: from which he rejoices even more, being certain that he was obeying his commands, whom he knows to be superior.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
