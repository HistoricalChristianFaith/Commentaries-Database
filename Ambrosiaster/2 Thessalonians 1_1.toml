[[commentary]]
quote='''
He writes to them with solemn words; for the beginning of the discourse is contained in the head of the letter: and these three, by whose names it is written, are the same as in the first letter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
