[[commentary]]
quote='''
It is clear that if their offense benefited the world, while their loss brought benefit to the Gentiles, then the world must have gained more from their loss. This is because there are many more Gentiles than Jews. And if their loss, which is the loss of the promised wealth of the Gentiles, has brought them eternal life, how much more their fullness! It is clear that the world will be richer for good people if even those who are blind are converted; for the world will be saved in great part by human beings. The word 'world' signifies human beings, as it is said of the Savior: 'Behold, the whole world goes after him.' (John 12:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Romans.html'
source_title="Commentary on Romans"
