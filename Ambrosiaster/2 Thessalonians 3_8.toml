[[commentary]]
quote='''
For it would not be reprehensible if he received bread from those who provided spiritual nourishment to their souls, which also gave immortality with glory to their bodies. Then indeed freedom can be exercised, if one does not subject oneself to the stomach or money, content with one's own bread; especially since it is more beneficial to praise, if, when it is allowed, and there is the opportunity to take, one abstains: such a person can benefit the listeners; for they will have reverence for this strictness, and they cannot disregard the things that are commanded by him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title="Commentary on 2 Thessalonians"
