[[commentary]]
quote='''
He begs them not to lightly and easily receive the opinion of the impending arrival of the Lord, as if it were certain; and he gives such commands, that even if someone were to speak as if inspired by the Spirit, they should not be believed; nor should assent be given if something were written in a treatise or letter, perhaps written in the name of the apostles. For deceivers often fabricate a letter under the name of some famous man, in order to commend by the authority of the name that which could not be accepted on its own merits.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title="Commentary on 2 Thessalonians"
