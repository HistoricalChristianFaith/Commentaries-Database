[[commentary]]
quote='''
So if you consider me as a partner, receive him as you would receive me. He shows such concern for Onesimus that he says Philemon, whom he praises above, should consider him as his own companion if he welcomes him as he would welcome an apostle. This is what Solomon said: A wise servant will have free people serving him (Eccles. 10:28). This saying is meant to scare Philemon, so that he may at least take him in for this reason if he cannot be swayed by love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
