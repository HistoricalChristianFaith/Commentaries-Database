[[commentary]]
quote='''
And they have sent him with the purpose of making their affairs known to you and to be informed of what is happening with you. Although he says above that he is present with them in spirit and sees what they are doing, messengers are still necessary. For someone becomes more anxious when they see someone coming to consider their conversation; they fear even more if they think they are being watched. For although God sees everything and we know that everything is known to him, because we do not see ourselves being seen by him, we act differently.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
