[[commentary]]
quote='''
Over all these things, however, have charity, which is the bond of unity. But because charity is greater than all, it encourages us to strive for it more. For then all that he commanded to be observed above can be brought to the fruition of rewards, if, guided by charity, they walk the path of the law; for whoever does something out of love, operates with their whole mind. Hypocrisy and pretense are not in charity; therefore, John the Apostle says: Fear, he says, is not in love. For whoever fears is not perfect: Perfect love drives out fear (1 John 4:18); hence the Lord prefers to be loved rather than feared. This is indeed the love that encompasses unity, this is the love that makes all one body, this is the love that has true peace, which is guarded by a pure heart. For peace can be called peace, even without charity; for charity always brings peace with it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
