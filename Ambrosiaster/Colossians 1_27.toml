[[commentary]]
quote='''
This is the mystery that has been hidden throughout the ages and generations, but is now revealed to His saints. For God wanted to make known to them the glorious riches of this mystery among the Gentiles, which is Christ in you, the hope of glory. For before the preaching of faith, the Gentiles were obligated to be circumcised if they desired to adhere to the Law. But now, by the mercy of God, they have been accepted as they are into the faith. This was viewed as unworthy by the Jews, that Christ, in whom the hope of the Jews resided, would also make the Gentiles partakers of his glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
