[[commentary]]
quote='''
So we ask and encourage those who have this kind of life in the Lord Jesus Christ to work quietly and earn their own food. In order to persuade them more easily, he urges them by invoking the name of the Lord Jesus Christ to obey what is beneficial for them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
