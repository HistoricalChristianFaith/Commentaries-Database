[[commentary]]
quote='''
And he is the head of the body, the Church, who is the beginning, the firstborn from the dead, that in all things he may have the preeminence. Christ is the head of the Church, if indeed all celestial and terrestrial beings have one mind, so that they may be the Church, which is of one faith. But if, lacking the head, they are cut off from the whole body, that is, from their Creator, they will be carried away by a certain insanity and vanity. He is the beginning, the firstborn from the dead, that in all things he may have the preeminence. Since all things were created through him, through him they were also made subject to a certain negligence, to be reformed; lest his work be restored by another to the detriment of him; that just as he was born before all, so he would be the first again from the resurrection of the dead, having his former life restored; for he was born before all things from God, in order to create all things that did not exist. But again, he was born in the flesh from a virgin, in order to abolish the sin that had entered the world through the virgin Eve. Born, therefore, and dead, he rose again, so that he might recreate what he had first made, because they had been like dead through error, so that he might always be first and foremost in every life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
