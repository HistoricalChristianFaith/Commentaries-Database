[[commentary]]
quote='''
For we dare not join or compare ourselves with some who commend themselves:
They are those who commend themselves, who desire to rule without receiving authority, claiming authority for themselves. For the one who is sent does not assert authority for himself, but rather for the one who sent him, showing himself to be a chosen steward by the Lord. Therefore, he does not join or compare himself with those who preach without being sent, presuming beyond what is permitted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title="Commentary on 2 Corinthians"
