[[commentary]]
quote='''
Therefore, it is not idle because he wanted to go and did not go; for he wants it to be understood that there are some among them for whose sake he did not fulfill his desire, so that, by their efforts, they may be purified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
