[[commentary]]
quote='''
Therefore, if you have died with Christ from the elements of this world, why do you still, as if living in this world, subject yourselves to regulations? Everyone who is baptized in Christ dies to the world; for he renounces all superstitions and worships solely the faith of Christ. For having removed what is added to natural righteousness, the discipline given by God remains, through which one lives for God through the hope that is in Christ; but he dies to those to whom he was subjected by error, denying them to be gods. For by saying 'the world', he signifies the error of the flesh; for everything that is visible is attributed to the flesh. Hence it is where even the Apostle John says: 'Do not love the world, nor the things that are in the world' (1 John 2:15); that is, neither the elements by which the world is composed, nor the errors that human tradition has invented, let us love: but only Christ, who died for us; that he might unite us with his body from the perished ones. Therefore, those who are buried with Christ are dead to the elements, so that they may not care about them; for they have learned to hold onto heavenly things, which can give eternal life. For these things do not give present things and hinder them from being apprehended in the future. But whoever doubts about some things after baptism, thinking that certain things from the past should be revered, shows himself to be living according to the elements, which he determines should be worshipped, or he hesitates to despise them; he will remain within the cycles of the world, separated from God; because, being clothed with the old man, he will not be able to pass through carnal things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
