[[commentary]]
quote='''
He shows the sense of his prayer for them; for he says that he asks God to come to the City for their benefit with the will of God, whose gift he preaches. Then the journey is at hand, if what is to be done is done with the will of God. Therefore, he prays that whatever opportunity might be given, for whatever reason, for him to come to the City; because he was busy preaching to others: thus considering a prosperous journey, if he were to come with God's will; for God's will is provident. Therefore, it is a prosperous journey to undergo the labor of the journey not in vain. He asks that God fulfill this, calling them to His grace. He speaks with eagerness of mind; for he desires them, knowing that it is beneficial for both them and himself, as he says elsewhere: What is our joy and crown? Are you not in the coming of the Lord (I Thess. II, 19)? Indeed, the fruit of the Apostle is more abundant, if he gains many. Furthermore, because it is a greater joy if the powerful of the world are converted to God, for the more serious the enemies are, the more necessary the reconciled ones are. Therefore, his desire was thus given an opportunity, so that he would be compelled to appeal to Caesar and be directed to the city of Rome for another reason, by the will of God; in order to fulfill the purpose of his desire. Finally, after the shipwreck, the Lord stood by and said: Do not be afraid, Paul, for as you have testified about me in Jerusalem, so you must also testify in Rome (Acts 27:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Romans.html'
source_title="Commentary on Romans"
