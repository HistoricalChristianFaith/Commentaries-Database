[[commentary]]
quote='''
In order to make the letter's authority from himself, he began by acknowledging his wrongdoing. Just as being bound is a disgrace because of sin, so on the contrary, for Christ to endure the chains of imprisonment is the greatest glory. For at the time he sent this letter, he was in custody. However, although Philemon was not a cleric, he nevertheless participated in the needs of the Church out of devotion, hence he says that he is a participant in these labors. For there are indeed many who, although worthy, excuse themselves, judging themselves unworthy of such a ministry; hence they appear truly worthy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"


[[commentary]]
quote='''
Philemon was not endowed with the dignity of ecclesiastical ordination, but he was an honorable man, one from the common people. For this reason, Onesimus, his servant and friend, writes him a letter; so that he may not only forgive him, but also give thanks to God; because he received him in such a way that he does not consider him a slave, but a most beloved brother.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
