[[commentary]]
quote='''
God of peace is Christ, who said: "My peace I give to you, my peace I leave you." He is also God of love; for again he says: "A new commandment I give to you, that you love one another. And in this all will know that you are my disciples, if you have love for one another." However, there is a different peace of God and a different peace of the world; for even the wicked and impure have peace, but it is for their damnation; for the peace of Christ is free from sins. Therefore he avoids treachery, despises deceit, and resists evil deeds. This is pleasing to God and friendly, but hostile to the devil. Whoever possesses this will have both love and their God for perpetual protection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title="COMMENTARY ON 2 CORINTHIANS 13.11.2"
