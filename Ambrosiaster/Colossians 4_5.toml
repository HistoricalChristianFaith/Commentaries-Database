[[commentary]]
quote='''
For it is necessary for us to walk among unbelievers and engage in conversations for the sake of worldly conversation. This is what it reminds us, that our conversation should be with wisdom itself because of the offense of the Gentiles, so that they may not take an opportunity to blaspheme through us and be stirred up to persecute. For what need is there to speak with someone whom you know to be stubborn and obstinate in mind, ready to make insults? Therefore, she advises that these things should be spoken with appropriate place and time, under the guidance of modesty and religion: or if such a person is present, who makes a lot of noise, then it should be kept silent. Otherwise, it must be dealt with differently with the powerful of the world, differently with the average, and differently with the humble. Also, it must be dealt with differently with the gentle and differently with the angry, whom one must yield to, that is, redeem the time. For when you yield to the assailant's words on Sundays and the audacity of harmful time, you gain the injuries of dangerous time. For if the head, that is, the king, agrees with the body, then there is freedom to speak the words of God with gentleness, so that they may be provoked to do good. Nevertheless, when they are loud and bold for insults, you must always yield; for you conquer, while yielding.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
