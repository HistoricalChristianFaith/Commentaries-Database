[[commentary]]
quote='''
Which no prince of this century knew; for if they had known, they would never have crucified the Lord of majesty. The princes of this century not only include the men of the Jews and Romans, but also these princes and powers, whom he mentioned above, to whom this saying truly applies, against whom our struggle is a spiritual battle in heavenly places; for it was by their counsel and will that Christ was crucified. Finally, after the temptations, the devil departed, saying, "Until the time." And the Lord Himself said, "The prince of this world has come, and he has found nothing in Me." Therefore, the princes of this world crucified the Lord of majesty in ignorance; for how can the princes of this world be understood as the Jewish princes, who were subject to the Roman kingdom?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25201%2520Corinthians.html'
source_title="COMMENTARY ON 1 CORINTHIANS 2.8.1-2"
