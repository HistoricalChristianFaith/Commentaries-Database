[[commentary]]
quote='''
Because many boast according to the flesh, and I will boast too:
This is what he says, because some of the Jews who believed presumed that they were children of Abraham. This is to boast according to the flesh, to claim nobility for themselves. They defend the privilege of their lineage because they are called children of his who have believed in God: 'The soul that sins shall die' (Ezekiel 18:20). So if this is boasting, he says, then I will boast too; because I am also a son of Abraham. But it profits nothing to be a son of Abraham before God; for it is faith that saves, not the propagation of Abraham's lineage. Therefore, this glory of the flesh is glory, as if, for example, it is said, a noble son of man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title="Commentary on 2 Corinthians"
