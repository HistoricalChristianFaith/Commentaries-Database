[[commentary]]
quote='''
This is the protection of God, which the Apostle explains through the significance of various causes. For he mentions many things that were done, so that the human race might attain forgiveness; not only did he forgive us our own sins, but he also took away that sin which came from Adam's transgression (which he called the handwriting in decrees), which prevented us from rising from the dead; for if he had not also removed this, those who had received forgiveness, upon departing from here, would have been held captive there in the underworld. Moreover, all sins were allowed so that they would rise from the dead. For indeed, death comes from sin, and the resurrection of the dead is achieved by the removal of sin: which could not have happened unless sin had affixed itself to the cross. For while the Savior conquers sin by not sinning, which held humanity captive, He also is killed by Him who is innocent: thus, sin is crucified. For sin, once defeated, is said to be mortified, for the cross is not the death of the Savior but of sin. For the innocent who is killed, makes those who kill him guilty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
