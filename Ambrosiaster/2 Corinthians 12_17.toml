[[commentary]]
quote='''
Did any of those whom I sent to you take advantage of you?:
This is what I mean, that those who were sent did not inform them of this, so that if they wished, they could offer the Apostle a worthy amount in return; for he did not want to accept it, because it was offered in a manner less worthy than he deserved. The Apostles understood this cunningly devised plan; to prove that what he did, he did not out of contempt, but out of greed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title="Commentary on 2 Corinthians"
