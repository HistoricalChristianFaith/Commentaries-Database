[[commentary]]
quote='''
In Wisdom, it says, He who created the world from formless matter: and on the other hand, because we were made from nothing (Wis. 11:18, and Gen. 1:2). That God created confused substances at once, the sense of the Scriptures declares, with darkness, indeed, mingled. He called this confusion of things, that is, air, fire, water, earth, darkness, formless matter, as it is read in Genesis: But the earth was, he says, invisible and unformed (Gen. 1:2). From this confusion therefore He created the world by the established firmament, so that within it, with the waters gathered together into one, there might be a dwelling place for the human race. For the substances having been distinguished and separated, He made in the hollow a habitable home.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Questions on the Old and New Testaments, PL 35"
