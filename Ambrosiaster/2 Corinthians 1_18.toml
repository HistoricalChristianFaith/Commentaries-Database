[[commentary]]
quote='''
This is what he says to the Galatians: If I have destroyed, I also rebuild, I appoint myself a transgressor (Galatians 2:18). Therefore, faithfully proclaim the teaching of God: for this is what deceivers do. Often, in order not to offend people, they omit what is true.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
