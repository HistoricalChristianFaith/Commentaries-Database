[[commentary]]
quote='''
Having confidence in your obedience, I have written to you, knowing that you will do even more than I say. I am now being affectionate, so that his obedience may be voluntary, in order to bear fruit. For by doing so, he provokes him to do more than is demanded of him; it often happens that when one sees themselves being thought highly of, they present themselves as even better.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
