[[commentary]]
quote='''
The Savior does not say that He pleased Himself, but rather God the Father; for He says: "For I have not come down from heaven to do my own will, but the will of Him who sent me, the Father" (John 6:38). And because He said these things, the Jews who were contradicting Him treated Him as a sinner, so the Psalmist speaks on His behalf to God the Father, saying: "The insults of those who reproach you have fallen upon me" (Psalm 69:10); that is to say, when I was doing your will, they accused me of sinning against you. By not receiving me, whom you sent, they insulted you. Because the Jews sinned against God, and not receiving Christ whom He sent, they even killed Him as if He were sinning against God. So the sins of sinners fell upon God Himself; for the innocent is killed by sinners as if He were a blasphemer, as it is written in the Gospel (Mark XV, 28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Romans.html'
source_title="Commentary on Romans"
