[[commentary]]
quote='''
But God himself, the God of peace, grant you peace always in every place. The Lord be with you all. Always, with a good wish, he accompanies them, like dearest children, always desiring to remain in peace with them, which is the guide to eternal life. For the Lord has promised to be with those who are peaceable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
