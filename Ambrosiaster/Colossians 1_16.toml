[[commentary]]
quote='''
The firstborn of all creatures. Before every creature, he testifies that the Son, begotten and not created, was born; so that his birth be distinguished from the creation of creatures: and to make this completely clear, he added: For in him all things were created, in heaven and on earth, visible and invisible, whether thrones or dominions or rulers or authorities—all things were created through him and for him. Therefore, those things which were done by Him, are said to be done through Him, because He was born for this purpose, that He might create the creature: that is, to have made it in Him and through Him. For His birth does not profit Himself, but us; because He who was in these things had no need to be born. And in order to clearly explain what and how great the power of the Son is, he shows what exists through him, namely Thrones, Dominions, and Principalities, and Powers; so that, therefore, it is believed that there is absolutely nothing less in him than in the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
