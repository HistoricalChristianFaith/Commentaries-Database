[[commentary]]
quote='''
He confesses that he rejoices in the tribulations he suffered, because he sees his progress in the faith of the believers. For tribulation is not empty when it is endured for the one for whom it is endured; it acquires for life. The sufferings that Christ speaks of are inflicted, of which they certainly pursue the teaching; so that he may burden the treacherous with the credulity of their impiety, and may proclaim the charity of God to the faithful, whose Son now suffers injuries for us. Therefore, he now wants to be understood for what reason he writes to them, when he says: If indeed you persevere in the founded faith, so that they may know then that the passion of Christ would benefit them if they were to remain in the received faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
