[[commentary]]
quote='''
It cannot be denied that he, who seems weak among the brothers, is of the body; because he is not powerful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25201%2520Corinthians.html'
source_title="Commentary on 1 Corinthians"
