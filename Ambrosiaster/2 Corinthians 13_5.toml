[[commentary]]
quote='''
He instructs that brothers should examine themselves to discuss with one another; they become more concerned if they compare themselves with each other. Therefore, he wanted this temptation to be understood as a test; because every test is a temptation, but not every temptation is a test. For if God is said to test, it is a test; but if the devil is said to test, it is a temptation, because he seeks to overthrow. And a person sometimes tries in order to test; sometimes, in order to capture. This is what he says, that if you do not know how to test yourselves, you do not know that Jesus Christ is in you, and this is to be reprobate, to not know the truth of one's own faith. For whoever has the sense of their faith in their heart, they know that Christ Jesus is in them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
