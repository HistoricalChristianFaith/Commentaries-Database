[[commentary]]
quote='''
So what am I saying, that something is sacrificed to an idol? Not that an idol is something; but those who sacrifice, sacrifice to demons. An idol is truly nothing; because an image appears of a dead thing: but under the cover of idols the devil is worshipped.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25201%2520Corinthians.html'
source_title="Commentary on 1 Corinthians"
