[[commentary]]
quote='''
To them he says that the deception of iniquity of his wonders is advancing, who are about to perish; because they have rejected the charity of truth, through which they could have been saved, as the apostles preached, they are delivered to the devil; for they do not want to be saved, they are abandoned by God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title="Commentary on 2 Thessalonians"
