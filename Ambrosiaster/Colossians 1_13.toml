[[commentary]]
quote='''
For we have been freed from the condition of darkness, that is, rescued from hell, in which we were held by the devil as well as by our own sin, through faith we have been transferred into the heavenly kingdom of the Son of God; so that God might show us the depth of His love for us, when He lifted us up from the depths of hell and brought us into heaven with His true Son. Now all believers, who are devoted with fixed minds, leaving the world, are led into heaven by the guidance of the Father's right hand angel, which was not granted before defeated death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
