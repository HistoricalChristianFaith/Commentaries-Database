[[commentary]]
quote='''
In order that the foreknowledge of God may remain for their salvation, he warns them to stand and persevere in the tradition of the Gospel; so that they may be diligent, lest they become sluggish in the works of God, and not fulfill what they have begun. For in this way, they will know how to believe and be able to remain, if they are constantly urged by frequent admonition.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title="Commentary on 2 Thessalonians"
