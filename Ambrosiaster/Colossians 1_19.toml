[[commentary]]
quote='''
Because it pleased the Father that in Him all fullness should dwell. The fullness is in Him and remains; because He is always able to accomplish everything, so that nothing is excluded, that cannot be achieved through Him; so that He might create, and reform, and raise up what has fallen, and give life to what is dead. Hence He says: As the Father has life in Himself, so He has given the Son to have life in Himself (John 5:26); and: As the Father raises the dead and gives them life, so also the Son gives life to whom He wills. For the Father does not judge anyone, but has given all judgment to the Son (Ibid., 21, 22). What could be more just than that, unless that he who has done all these things through him should give judgment, so that all the fullness of divinity might dwell in him by virtue of what we have said, that he has all power in himself; that is, he is perfect God; for whoever does not have all these things is not God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
