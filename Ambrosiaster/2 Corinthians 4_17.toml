[[commentary]]
quote='''
These present temporary tribulations that are brought upon us for the sake of faith are called momentary and light because they are temporary. However, they are working an eternal weight of glory beyond all measure for those who are patient. For with small labors, great rewards are given, and for light tribulation, a surpassing weight of glory will be repaid for eternity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
