[[commentary]]
quote='''
We give thanks to God always for all of you, making mention of you in our prayers, constantly remembering your work of faith and labor of love and steadfastness of hope in our Lord Jesus Christ in the presence of our God and Father:
For all good things are from God, therefore they first give thanks to Him for their progress, who has deemed it worthy not only to give his gift to people under sin, but to adopt them as his children, at the same time assisting them in enduring all destruction, so that they may become more worthy. Therefore, they say that they remember these things in their speeches because they were increasing in the work of faith in the other churches, in order to complete the work that had been started by the will of God. They were eager in the pursuit of love, patience, and the hope of the coming of the Lord, which is before God, who deigned to incarnate his Son for the salvation of humanity. For it is pleasing to God if progress is made in Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title="Commentary on 1 Thessalonians"
