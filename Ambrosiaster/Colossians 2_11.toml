[[commentary]]
quote='''
He says that the Gentiles were dead: first, because they did not want to accept the law that was given as a testimony by the Creator and to condemn vices; then, because they were unworthy of life due to the impiety of their sins; therefore, he separated them from the Jews as if they were enemies of the one true God. But the Jews, living in the confession of one God, when Christ came, learned the mystery of God, which they had been expecting for their justification: that in Him, what had been taken away from them, because it is impossible to be without sin, they might receive forgiveness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
