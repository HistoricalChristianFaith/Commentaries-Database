[[commentary]]
quote='''
He is said to have become poor as Christ, because God deigned to be born as a man, humbling the power of his divinity, so that he might acquire for mankind the riches of divinity; as the Apostle Peter says, that we might be partakers of the divine nature (2 Peter 1:4). Therefore, he became man, so that he might unite man to God, as it is written, 'I said, 'You are gods'' (Psalm 82:6). In this way, they are encouraged to become poor by giving generously; may their poverty benefit them, just as the poverty of Christ benefited us. And indeed, Christ became poor for our sake, but we in order to benefit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
