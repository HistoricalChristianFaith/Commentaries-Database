[[commentary]]
quote='''
As much as reason required, it was fitting to command a disciple as a master by the authority of the apostolic faith: but because Philemon was a good man, he entices him through affection to obedience, as if he were a companion in age, and a prisoner of Jesus Christ, that is, bound by the affairs of the Lord, or subject to his name in chains, just as the apostles themselves were. For indeed, there were Judas and Silas, who were leaders among the brothers, being from the common people, they had committed themselves to the Lord's work (Acts 15:22 and following); so that they could work together with the apostles for the sake of faith in God. Hence, Silas is found to be a partner in the apostle's labors.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Philemon.html'
source_title="Commentary on Philemon"
