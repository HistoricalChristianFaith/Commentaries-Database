[[commentary]]
quote='''
He exhorts them to boast about these things among the other churches. For this is the proof of their improvement, if they are ready for the ministry of the saints.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
