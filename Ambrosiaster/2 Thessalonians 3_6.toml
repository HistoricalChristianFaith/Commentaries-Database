[[commentary]]
quote='''
For not all obey the message, but they follow their own will and advice. Therefore, we instruct them to separate from them, so that they may come to realize their error.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title="Commentary on 2 Thessalonians"
