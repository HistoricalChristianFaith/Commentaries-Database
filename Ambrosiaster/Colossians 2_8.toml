[[commentary]]
quote='''
See to it that no one deceives you through philosophy and empty deceit, according to human tradition, according to the elemental spirits of the world, and not according to Christ. Philosophy here refers to earthly wisdom, by which those who desire to be esteemed wise in the world are often deceived. It is composed of arguments and subtleties of certain trivial matters, as if it has investigated physical reasons, with some things mixed in that are exhortations to a good life or indications, at times about measurements, as well as about numbers, and at times about the qualities and quantities of elements arranged in order. In whose discussions, whoever falls into them will hardly and rarely escape; for he is held by plausible and fabricated reasons, esteeming nothing as true except what is seen and understood in the basic elements. And because those things that exist in the present and are seen with the eyes appear pleasing and enjoyable; they deceive some, who think that the spiritual reason should be despised and ridiculed due to the despair of the future, assigning all power to the stars, subject to carnal reason. Therefore, he calls this tradition or philosophy deceitful and empty because it is not ordered by the power of God but by the weakness of human reasoning, which restricts the power of God within its own knowledge so as not to believe that He could do otherwise than what carnal reason comprehends. They assign diversity to each element of divinity for the sake of worship, to bind the minds of the ignorant so that they do not extend themselves toward the true God. Therefore, it warns against following this tradition; because it is a worshipper of the world, not of God, who is one: nor does it lead to Christ, but away from Christ, in whom the perfection of divinity resides.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
