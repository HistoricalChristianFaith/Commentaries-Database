[[commentary]]
quote='''
The almighty God, the father of Christ, when all things that he had done through Christ had become perishable and transient, being forgotten by their creator, deigned to come down from his heavenly abode to earth as our Lord Christ, taking on a human form; so that he could be like a model for humans, making peace between themselves and their God, their creator. Therefore, God was in Christ. How? As if in a vicar or ambassador, as he was in the prophets, or in some other way? Is it not the case that just as it was in the prophets, it can be understood to have been in the Son as well? For the Son is naturally the ambassador of the Father. Hence, it is said: "The Father is in me, and I am in the Father"; for the Father is understood to be in the Son, because their substance is one. For there is unity where there is no difference: and thus they are mutually together; for their image and likeness are one. So, seeing the Son, it is said to have seen the Father, just as the Lord Himself says: "Whoever sees me, sees the Father." Therefore, it is rightly said: God was in Christ; that is, the Father in the Son, reconciling the world to himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title="COMMENTARY ON 2 CORINTHIANS 5.19-21.2"
