[[commentary]]
quote='''
And you, who were once alienated and enemies in your mind because of your evil behavior, but now he has reconciled you by Christ's physical body through death, to present you holy, unblemished, and blameless in his sight. This is the message of the gift of God's grace to the Gentiles, that he may show them how indebted they are, and indeed greatly, through their actions of gratitude toward God; for they were once enemies of his plans, which he had determined to carry out through his servant Moses, whose teachings and authority they did not accept, devoted instead to their idols and their wicked deeds; for they worshipped the works of their own hands. But the mercy and providence of God sought them out, so that they might obtain the free grace of God and return to him with a clean conscience; that on the day of judgment, when no trace of their old errors would be found in them, they may join themselves to their Creator, who, in order to benefit the human race, became incarnate as a man to conquer death with his own body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%2520Colossians.html'
source_title="Commentary on Colossians"
