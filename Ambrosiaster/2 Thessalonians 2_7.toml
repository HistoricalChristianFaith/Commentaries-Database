[[commentary]]
quote='''
For the mystery of iniquity is already at work, only that he who now holds back may hold back until he is taken out of the way. The mystery of iniquity began with Nero, who, encouraged by his father the devil, killed the apostles with a zeal for idols, up until Diocletian and finally Julian, who, with a certain art and cunning, could not complete the started persecution because it had not been allowed from above. Satan uses these ministers to deceive men under the guise of a multitude of gods, as long as the Roman kingdom, that is what he says: Until he is taken out of the way.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
