[[commentary]]
quote='''
He says that the mind and affection of Titus are in them, because he has seen their progress; for a holy mind is in all good. Remembering the obedience of all of you, how with fear and trembling you received him. The Corinthians, knowing that Titus was sent to them by the Apostle, were terrified at his arrival, for they had already been rebuked by him for their great vices. And because they had begun to reform their lives, they were anxious to listen to his instructions; so that when he returned, the Apostle could help calm their minds: therefore, he indicates that he praised Titus, for they respected him as an Apostle in Titus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
