[[commentary]]
quote='''
Now he speaks to those who, because they still served the pleasures of the world, were carnal. Although they were already baptized and had received the Holy Spirit, yet because after baptism they immediately returned to the old man, whom they had renounced, they are called carnal. For the Holy Spirit remains in the one in whom he has poured himself, if he remains in the purpose of regeneration: if not, he departs; but in such a way that if a man reforms himself, he returns to him. Always ready for good, diligent in repentance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25201%2520Corinthians.html'
source_title="Commentary on 1 Corinthians"
