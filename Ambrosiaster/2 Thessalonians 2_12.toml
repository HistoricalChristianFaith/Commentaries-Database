[[commentary]]
quote='''
At this place, the foreknowledge of God resounds, because He knows the minds of all before their birth; and He is not unaware of those who will believe. Therefore, from the beginning, he knows that these faithful ones will be, who, by believing, make an increase of faith, not a detriment; for, being sanctified through the faith of the truth of the Gospel of the Son of God, they are acquired for an increase of the glory of the body of Christ, as he also says in another epistle: that all things may grow unto the increase of God (Colossians 2:19). For whoever, having deserted the devil, take refuge in the faith of Christ, makes an increase for God in the body of Christ, which they had previously caused a detriment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrosiaster%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title="Commentary on 2 Thessalonians"
