[[commentary]]
quote='''
He is bruised and wounded, but He healeth every disease and every infirmity. He is lifted up and nailed to the Tree, but by the Tree of Life He restoreth us; yea, He saveth even the Robber crucified with Him; yea, He wrapped the visible world in darkness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252029.html'
source_title="THEOLOGICAL ORATIONS 29.20"
