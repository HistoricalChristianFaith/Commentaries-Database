[[commentary]]
quote='''
He is called Son because He is identical with the Father in Essence; and not only for this reason, but also because He is Of Him. ...And He is called the Word, because He is related to the Father as Word to Mind; not only on account of His passionless Generation, but also because of the Union, and of His declaratory function. ...For every thing that is begotten is a silent word of him that begat it. And if any one should say that this Name was given Him because He exists in all things that are, he would not be wrong. For what is there that consists but by the word? ...And He is called Life, because He is Light, and is the constituting and creating Power of every reasonable soul. For in Him we live and move and have our being, according to the double power of that Breathing into us; for we were all inspired by Him with breath, and as many of us as were capable of it, and in so far as we open the mouth of our mind, with God the Holy Ghost.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252030.html'
source_title="Oration 30, The Fourth Theological Oration"
