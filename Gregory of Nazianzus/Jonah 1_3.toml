[[commentary]]
quote='''
Jonah then was not ignorant of the mighty hand of God, with which he threatened other men, nor did he imagine that he could utterly escape the Divine power; this we are not to believe: but when he saw the falling away of Israel, and perceived the passing over of the grace of prophecy to the Gentiles—this was the cause of his retirement from preaching and of his delay in fulfilling the command; accordingly he left the watchtower of joy, for this is the meaning of Joppa in Hebrew, I mean his former dignity and reputation, and flung himself into the deep of sorrow: and hence he is tempest-tossed, and falls asleep, and is wrecked, and aroused from sleep, and taken by lot, and confesses his flight, and is cast into sea, and swallowed, but not destroyed, by the whale.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%25202.html'
source_title="In Defense of His Flight to Pontus, Oration 2:109"


[[commentary]]
quote='''
But there he calls upon God, and, marvellous as it is, on the third day he, like Christ, is delivered.… yet, in my own case, what could be said, what defence could be made, if I longer remained restive, and rejected the yoke of ministry, which, though I know not whether to call it light or heavy, had at any rate been laid upon me.… On this account I had much toilsome consideration to discover my duty, being set in the midst betwixt two fears, of which the one held me back, the other urged me on. For a long while I was at a loss between them, and after wavering from side to side, and, like a current driven by inconstant winds, inclining first in this direction, then in that, I at last yielded to the stronger, and the fear of disobedience overcame me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%25202.html'
source_title="In Defense of His Flight to Pontus, Oration 2:109-12"


[[commentary]]
quote='''
On the contrary, as my instructor said, and as I am myself convinced, Jonah knew better than any one the purpose of his message to the Ninevites, and that, in planning his flight, although he changed his place, he did not escape from God. Nor is this possible for any one else, either by concealing himself in the bosom of the earth, or in the depths of the sea, or by soaring on wings, if there be any means of doing so, and rising into the air, or by abiding in the lowest depths of hell, or by enveloping himself in a thick cloud, or by any other of the many devices for ensuring escape. For God alone of all things cannot be escaped from or contended with; if He wills to seize and bring them under His hand, He outstrips the swift, He outwits the wise, He overthrows the strong, He abases the lofty, He subdues rashness, He represses power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%25202.html'
source_title="In Defense of His Flight to Pontus, Oration 2:108"
