[[commentary]]
quote='''
Ninthly, they allege, seeing He ever liveth to make intercession for us. O, how beautiful and mystical and kind. For to intercede does not imply to seek for vengeance, as is most men's way (for in that there would be something of humiliation), but it is to plead for us by reason of His Mediatorship, just as the Spirit also is said to make intercession for us. For there is One God, and One Mediator between God and Man, the Man Christ Jesus. For He still pleads even now as Man for my salvation; for He continues to wear the Body which He assumed, until He make me God by the power of His Incarnation; although He is no longer known after the flesh—I mean, the passions of the flesh, the same, except sin, as ours.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252030.html'
source_title="The Theological Orations 30.14"
