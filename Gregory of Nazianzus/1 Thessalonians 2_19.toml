[[commentary]]
quote='''
What then is my defence? If it be false, you must convict me, but if true, you on behalf of whom and in whose presence I speak, must bear witness to it. For you are my defence, my witnesses, and my crown of rejoicing, if I also may venture to boast myself a little in the Apostle's language. This flock was, when it was small and poor, as far as appearances went, nay, not even a flock, but a slight trace and relic of a flock, without order, or shepherd, or bounds, with neither right to pasturage, nor the defence of a fold, wandering upon the mountains and in caves and dens of the earth, scattered and dispersed hither and thither as each one could find shelter or pasture, or could gratefully secure its own safety.… Such then was once this flock, and such it is now, so healthy and well grown, and if it be not yet in perfection, it is advancing towards it by constant increase, and I prophesy that it will advance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252042.html'
source_title="ORATIONS 42.2, 6"
