[[commentary]]
quote='''
For He still pleads even now as Man for my salvation; for He continues to wear the Body which He assumed, until He make me God by the power of His Incarnation; although He is no longer known after the flesh—I mean, the passions of the flesh, the same, except sin, as ours. Thus too, we have an Advocate, Jesus Christ, not indeed prostrating Himself for us before the Father, and falling down before Him in slavish fashion ... Away with a suspicion so truly slavish and unworthy of the Spirit! For neither is it seemly for the Father to require this, nor for the Son to submit to it; nor is it just to think it of God. But by what He suffered as Man, He as the Word and the Counsellor persuades Him to be patient. I think this is the meaning of His Advocacy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252030.html'
source_title="THEOLOGICAL ORATIONS 30.14"
