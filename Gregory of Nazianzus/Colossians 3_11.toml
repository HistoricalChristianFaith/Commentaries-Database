[[commentary]]
quote='''
But God will be all in all in the time of restitution; not in the sense that the Father alone will Be; and the Son be wholly resolved into Him, like a torch into a great pyre, from which it was reft away for a little space, and then put back (for I would not have even the Sabellians injured by such an expression); but the entire Godhead, when we shall be no longer divided (as we now are by movements and passions), and containing nothing at all of God, or very little, but shall be entirely like.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252030.html'
source_title="THE FOURTH THEOLOGICAL ORATION, ORATION 30.6"
