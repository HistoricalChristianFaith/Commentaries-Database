[[commentary]]
quote='''
But look at it in this manner: that as for my sake He was called a curse, Who destroyed my curse; and sin, who taketh away the sin of the world; and became a new Adam to take the place of the old, just so He makes my disobedience His own as Head of the whole body. As long then as I am disobedient and rebellious, both by denial of God and by my passions, so long Christ also is called disobedient on my account. But when all things shall be subdued unto Him on the one hand by acknowledgment of Him, and on the other by a reformation, then He Himself also will have fulfilled His submission, bringing me whom He has saved to God. For this, according to my view, is the subjection of Christ; namely, the fulfilling of the Father's Will.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252030.html'
source_title="THEOLOGICAL ORATION 5"


[[commentary]]
quote='''
Moreover, in no other way was it possible for the Love of God toward us to be manifested than by making mention of our flesh, and that for our sake He descended even to our lower part. For that flesh is less precious than soul, everyone who has a spark of sense will acknowledge. And so the passage, The Word was made Flesh, seems to me to be equivalent to that in which it is said that He was made sin, or a curse for us; not that the Lord was transformed into either of these, how could He be? But because by taking them upon Him He took away our sins and bore our iniquities.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FLetters%2FDivision%25201.html'
source_title="LETTERS ON THE APOLLINARIAN CONTROVERSY 101"
