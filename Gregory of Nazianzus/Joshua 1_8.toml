[[commentary]]
quote='''
Next, on what subjects and to what extent may we philosophize? On matters within our reach, and to such an extent as the mental power and grasp of our audience may extend. No further, lest, as excessively loud sounds injure the hearing, or excess of food the body, or, if you will, as excessive burdens beyond the strength injure those who bear them, or excessive rains the earth; so these too, being pressed down and overweighted by the stiffness, if I may use the expression, of the arguments should suffer loss even in respect of the strength they originally possessed. Now, I am not saying that it is not needful to remember God at all times; ... I must not be misunderstood, or I shall be having these nimble and quick people down upon me again. For we ought to think of God even more often than we draw our breath; and if the expression is permissible, we ought to do nothing else. Yea, I am one of those who entirely approve that Word which bids us meditate day and night, and tell at eventide and morning and noon day, and praise the Lord at every time; or, to use Moses' words, whether a man lie down, or rise up, or walk by the way, or whatever else he be doing -and by this recollection we are to be moulded to purity. So that it is not the continual remembrance of God that I would hinder, but only the talking about God; nor even that as in itself wrong, but only when unseasonable; nor all teaching, but only want of moderation. As of even honey repletion and satiety, though it be of honey, produce vomiting; and, as Solomon says and I think, there is a time for every thing, and that which is good ceases to be good if it be not done in a good way; just as a flower is quite out of season in winter, and just as a man's dress does not become a woman, nor a woman's a man; and as geometry is out of place in mourning, or tears at a carousal; shall we in this instance alone disregard the proper time, in a matter in which most of all due season should be respected?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252027.html'
source_title="THEOLOGICAL ORATIONS 1 (27).3-4"
