[[commentary]]
quote='''
On the contrary, as my instructor said, and as I am myself convinced, Jonah knew better than any one the purpose of his message to the Ninevites, and that, in planning his flight, although he changed his place, he did not escape from God. Nor is this possible for any one else, either by concealing himself in the bosom of the earth, or in the depths of the sea, or by soaring on wings, if there be any means of doing so, and rising into the air, or by abiding in the lowest depths of hell, or by enveloping himself in a thick cloud, or by any other of the many devices for ensuring escape. For God alone of all things cannot be escaped from or contended with; if He wills to seize and bring them under His hand, He outstrips the swift, He outwits the wise, He overthrows the strong, He abases the lofty, He subdues rashness, He represses power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%25202.html'
source_title="IN DEFENCE OF HIS FLIGHT TO PONTUS, ORATION 2.108"

[[commentary]]
quote='''
What then is the story, and wherein lies its application? For, perhaps, it would not be amiss to relate it, for the general security. Jonah also was fleeing from the face of God, or rather, thought that he was fleeing: but he was overtaken by the sea, and the storm, and the lot, and the whale's belly, and the three days' entombment, the type of a greater mystery. He fled from having to announce the dread and awful message to the Ninevites, and from being subsequently, if the city was saved by repentance, convicted of falsehood: not that he was displeased at the salvation of the wicked, but he was ashamed of being made an instrument of falsehood, and exceedingly zealous for the credit of prophecy, which was in danger of being destroyed in his person, since most men are unable to penetrate the depth of the Divine dispensation in such cases.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%25202.html'
source_title="IN DEFENCE OF HIS FLIGHT TO PONTUS, ORATION 2.106"
