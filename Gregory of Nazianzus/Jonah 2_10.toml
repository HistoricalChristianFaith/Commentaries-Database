[[commentary]]
quote='''
Jonah then was not ignorant of the mighty hand of God, with which he threatened other men, nor did he imagine that he could utterly escape the Divine power; this we are not to believe: but when he saw the falling away of Israel, and perceived the passing over of the grace of prophecy to the Gentiles-this was the cause of his retirement from preaching and of his delay in fulfilling the command; accordingly he left the watchtower of joy, for this is the meaning of Joppa in Hebrew, I mean his former dignity and reputation, and flung himself into the deep of sorrow: and hence he is tempest-tossed, and falls asleep, and is wrecked, and aroused from sleep, and taken by lot, and confesses his flight, and is cast into sea, and swallowed, but not destroyed, by the whale; but there he calls upon God, and, marvellous as it is, on the third day he, like Christ, is delivered...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%25202.html'
source_title="In Defense of His Flight to Pontus, Oration 2"
