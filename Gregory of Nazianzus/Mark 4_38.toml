[[commentary]]
quote='''
He was wearied, but He is the Rest of them that are weary and heavy laden. He was heavy with sleep, but He walked lightly over the sea. He rebuked the winds, He made Peter light as he began to sink.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252029.html'
source_title="Oration 29, On the Son"
