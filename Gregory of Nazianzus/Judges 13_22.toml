[[commentary]]
quote='''
And are you not amazed at Manoah the Judge of yore... the one being unable to endure the sight even of one in whom was a representation of God; and saying, "We are undone, O wife, we have seen God;" speaking as though even a vision of God could not be grasped by human beings, let alone the Nature of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252028.html'
source_title="THEOLOGICAL ORATIONS 2 (28).19"
