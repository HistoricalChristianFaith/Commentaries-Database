[[commentary]]
quote='''
Thus Enos "hoped to call upon the Name of the Lord." Hope was that for which he is commended; and that, not that he should know God, but that he should call upon him. And Enoch was translated, but it is not yet clear whether it was because he already comprehended the Divine Nature, or in order that he might comprehend it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252028.html'
source_title="THEOLOGICAL ORATIONS 28.18"
