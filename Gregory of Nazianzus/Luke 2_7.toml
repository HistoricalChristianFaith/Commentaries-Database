[[commentary]]
quote='''
Christ is Born, glorify ye Him. Christ from heaven, go ye out to meet Him. Christ on earth; be ye exalted. Sing unto the Lord all the whole earth; and that I may join both in one word, Let the heavens rejoice, and let the earth be glad, for Him Who is of heaven and then of earth. Christ in the flesh, rejoice with trembling and with joy; with trembling because of your sins, with joy because of your hope. Christ of a Virgin; O ye Matrons live as Virgins, that ye may be Mothers of Christ. Who doth not worship Him That is from the beginning? Who doth not glorify Him That is the Last?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252038.html'
source_title="Oration 38, On the Theophany, or Birthday of Christ"

[[commentary]]
quote='''
He dwelt in the womb-but He was recognized by the Prophet, himself still in the womb, leaping before the Word, for Whose sake He came into being. He was wrapped in swaddling clothes-but He took off the swathing bands of the grave by His rising again. He was laid in a manger-but He was glorified by Angels, and proclaimed by a star, and worshipped by the Magi. Why are you offended by that which is presented to your sight, because you will not look at that which is presented to your mind?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252029.html'
source_title="Oration 29, On the Son"
