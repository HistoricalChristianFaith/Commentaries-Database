[[commentary]]
quote='''
Of the other titles, some are evidently names of His Authority, others of His Government of the world, and of this viewed under a twofold aspect, the one before the other in the Incarnation. For instance the Almighty, the King of Glory, or of The Ages, or of The Powers, or of The Beloved, or of Kings. Or again the Lord of Sabaoth, that is of Hosts, or of Powers, or of Lords; these are clearly titles belonging to His Authority. But the God either of Salvation or of Vengeance, or of Peace, or of Righteousness; or of Abraham, Isaac, and Jacob, and of all the spiritual Israel that seeth God,—these belong to His Government. For since we are governed by these three things, the fear of punishment, the hope of salvation and of glory besides, and the practice of the virtues by which these are attained, the Name of the God of Vengeance governs fear, and that of the God of Salvation our hope, and that of the God of Virtues our practice; that whoever attains to any of these may, as carrying God in himself, press on yet more unto perfection, and to that affinity which arises out of virtues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252030.html'
source_title="ORATIONS 30.19"
