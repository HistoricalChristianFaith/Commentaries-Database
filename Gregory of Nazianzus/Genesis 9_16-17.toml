[[commentary]]
quote='''
What are the storehouses of the winds? What are the treasuries of the snow? Who, as Scripture hath said, hath begotten the drops of dew? Out of Whose womb came the ice? and Who bindeth the waters in the clouds, and, fixing part in the clouds (O marvel!) held by His Word though its nature is to flow, poureth out the rest upon the face of the whole earth, and scattereth it abroad in due season, and in just proportions, and neither suffereth the whole substance of moisture to go out free and uncontrolled (for sufficient was the cleansing in the days of Noah; and He who cannot lie is not forgetful of His own covenant); ... nor yet restraineth it entirely that we should not again stand in need of an Elias to bring the drought to an end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252028.html'
source_title="THEOLOGICAL ORATIONS 28.28"
