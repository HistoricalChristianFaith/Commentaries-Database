[[commentary]]
quote='''
He is lifted up and nailed to the Tree, but by the Tree of Life He restoreth us; yea, He saveth even the Robber crucified with Him; yea, He wrapped the visible world in darkness. He is given vinegar to drink mingled with gall. Who? He who turned the water into wine, who is the destroyer of the bitter taste, who is Sweetness and altogether desire. He lays down His life, but He has power to take it again; and the veil is rent, for the mysterious doors of Heaven are opened; the rocks are cleft, the dead arise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nazianzus%2FOrations%2FOration%252029.html'
source_title="Oration 29, On the Son"
