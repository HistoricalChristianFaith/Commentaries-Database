[[commentary]]
quote='''
Since the angel explained these things clearly, a more detailed explanation of them is superfluous. It is remarkable to me how the devil is both enemy and avenger. For he will work through the ten horns, who are guided by him, to oppose that lover of good and virtue, Christ our God, and to lay waste that populous city that has abandoned the divine laws and become servant to his pleasures, and like a bloodthirsty beast they will glut themselves on its blood. He will regard its conflagration as an occasion for rejoicing and the mutilation of human flesh as proper food, and he who always rejoices in duplicity will grant harmony to those ten apostate horns.
'''
source_url=''
source_title="COMMENTARY ON THE APOCALYPSE 17:15-18"
