[[commentary]]
quote='''
The words that the “smoke from the city goes up forever and ever” show either the unforgettable nature of the punishment that has come upon the city, or that although she meted out punishments in part and to some extent, she will, nonetheless, be punished eternally in the coming age.
'''
source_url=''
source_title="COMMENTARY ON THE APOCALYPSE 19:1-4"
