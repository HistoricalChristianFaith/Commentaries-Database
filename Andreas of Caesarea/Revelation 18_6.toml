[[commentary]]
quote='''
These words may refer to those who, although innocent in [Babylon], yet suffered the most terrible things at the hands of those who ruled her and through their endurance of these agonies were the reason for the punishment of their tormentors. Or these words may refer to a change of persons and circumstances, from those who were tormented to certain holy powers that have acquired the power of punishment and through love of God exercise those torments that had been done by her against their fellow servants. He speaks of the cup as “double,” either because sinners and transgressors are punished both here and in the age to come, or because both the soul and the body are punished for their common deeds, or because of the depth of divine benevolence that is reckoned as double which is lacking of pure justice on account of sin, and punishment is often endured in the conscience.
'''
source_url=''
source_title="COMMENTARY ON THE APOCALYPSE 18:6-8"
