[[commentary]]
quote='''
By a “single day” he means either the suddenness and shortness of the time in which mourning will come to her either from the sword or from famine, and she will be wasted from pestilence and will be consumed by fire. Or it refers to the course of the day itself in which [the city] will experience these things that are prophesied. For after the enemies gain control of the city, only one day will suffice to bring every evil and every form of death upon those who have been defeated. For God is strong both to save those who please him and to punish those who are unrepentant sinners.
'''
source_url=''
source_title="COMMENTARY ON THE APOCALYPSE 18:6-8"
