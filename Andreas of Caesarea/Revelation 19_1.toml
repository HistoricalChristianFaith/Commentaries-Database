[[commentary]]
quote='''
“Hallelujah” signifies divine praise, while “Amen” means “truly” or “let it be so.” This praise is common both from the angelic powers as well as from humankind, which is similar to the angels, and this praise is sent up to God three times on account of the tri-hypostatic deity of the Father and of the Son and of the Holy Spirit, one God.
'''
source_url=''
source_title="COMMENTARY ON THE APOCALYPSE 19:1-4"
