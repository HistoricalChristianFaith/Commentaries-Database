[[commentary]]
quote='''
Let us steadfastly contemplate those who have perfectly ministered to his excellent glory. Let us take (for instance) Enoch, who, being found righteous in obedience, was translated, and death was never known to happen to him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FFirst%2520Epistle%2520to%2520the%2520Corinthians.html'
source_title="Clement's First Letter to the Corinthians, Chapter 9"

[[commentary]]
quote='''
Let us fix our gaze on those who have perfectly served his magnificent glory. Let us take Enoch, who was found righteous in obedience and was taken up without there being a trace of his death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FFirst%2520Epistle%2520to%2520the%2520Corinthians.html'
source_title="THE LETTER TO THE CORINTHIANS 9.2-4"
