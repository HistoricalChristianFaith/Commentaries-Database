[[commentary]]
quote='''
To these men who spent their lives in the practice of holiness, there is to be added a great multitude of the elect, who, having through envy endured many indignities and tortures, furnished us with a most excellent example. Through envy, those women, the Danaids and Dircae, being persecuted, after they had suffered terrible and unspeakable torments, finished the course of their faith with stedfastness, and though weak in body, received a noble reward. Envy has alienated wives from their husbands, and changed that saying of our father Adam, "This is now bone of my bones, and flesh of my flesh." [Genesis 2:23] Envy and strife have overthrown great cities and rooted up mighty nations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Rome%2FFirst%2520Epistle%2520to%2520the%2520Corinthians.html'
source_title="Clement's First Letter to the Corinthians, Chapter 6"