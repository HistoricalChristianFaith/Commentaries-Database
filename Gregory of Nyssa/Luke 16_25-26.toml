[[commentary]]
quote='''
What then, I asked, are the fire and the gulf and the other features in the picture? Are they not that which they are said to be?

I think, she replied, that the Gospel signifies by means of each of them certain doctrines with regard to our question of the soul. For when the patriarch first says to the Rich Man, "Thou in thy lifetime receivedst thy good things," and in the same way speaks of the Poor Man, that he, namely, has done his duty in bearing his share of life's evil things, and then, after that, adds with regard to the gulf that it is a barrier between them, he evidently by such expressions intimates a very important truth.… This, in my opinion, is the "gulf"; which is not made by the parting of the earth, but by those decisions in this life which result in a separation into opposite characters. The man who has once chosen pleasure in this life, and has not cured his inconsiderateness by repentance, places the land of the good beyond his own reach; for he has dug against himself the yawning impassable abyss of a necessity that nothing can break through.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Soul%2520and%2520the%2520Resurrection.html'
source_title="ON THE SOUL AND THE RESURRECTION"
