[[commentary]]
quote='''
But the grosser mind looks down; it bends its energies to bodily pleasures as surely as the sheep stoop to their pasture; it lives for gorging and still lower pleasures; it is alienated from the life of God, and a stranger to the promise of the Covenants; it recognizes no good but the gratification of the body. It is a mind such as this that "walks in darkness," and invents all the evil in this life of ours; avarice, passions unchecked, unbounded luxury, lust of power, vain-glory, the whole mob of moral diseases that invade men's homes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 4"
