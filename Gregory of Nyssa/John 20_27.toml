[[commentary]]
quote='''
For it behoved Him, when He had accustomed men to the miracle of the resurrection in other bodies, to confirm His word in His own humanity. Thou sawest the thing proclaimed working in others—those who were about to die, the child which had just ceased to live, the young man at the edge of the grave, the putrefying corpse, all alike restored by one command to life.… Behold Him Whose hands were pierced with nails: behold Him Whose side was transfixed with a spear; pass thy fingers through the print of the nails, thrust thy hand into the spear-wound; thou canst surely guess how far within it is likely the point would reach, if thou reckonest the passage inwards by the breadth of the external scar; for the wound that gives admission to a man's hand, shows to what depth within the iron entered. If He then has been raised, well may we utter the Apostle's exclamation, "How say some that there is no resurrection of the dead?" Since, then, every prediction of the Lord is shown to be true by the testimony of events, while we not only have learnt this by His words, but also received the proof of the promise in deed, from those very persons who returned to life by resurrection, what occasion is left to those who disbelieve? Shall we not bid farewell to those who pervert our simple faith by "philosophy and vain deceit," and hold fast to our confession in its purity, learning briefly through the prophet the mode of the grace, by his words, "Thou shalt take away their breath and they shall fail, and turn to their dust. Thou shalt send forth Thy Spirit and they shall be created, and Thou shalt renew the face of the earth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="ON THE MAKING OF MAN 25.12-13"
