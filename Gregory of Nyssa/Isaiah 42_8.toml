[[commentary]]
quote='''
[Eunomius says:] "…receiving glory from the Father, not sharing His glory with the Father, for the glory of the Almighty is incommunicable, as He hath said, 'My glory will I not give to another.'" Who is that "other" to whom God has said that He will not give His glory? The prophet speaks of the adversary of God, and Eunomius refers the prophecy to the only begotten God Himself! For when the prophet, speaking in the person of God, had said, "My glory will I not give to another," he added, "neither My praise to graven images." For when men were beguiled to offer to the adversary of God the worship and adoration due to God alone, paying homage in the representations of graven images to the enemy of God, who appeared in many shapes amongst men in the forms furnished by idols, He Who healeth them that are sick, in pity for men's ruin, foretold by the prophet the loving-kindness which in the latter days He would show in the abolishing of idols, saying, "When My truth shall have been manifested, My glory shall no more be given to another, nor My praise bestowed upon graven images: for men, when they come to know My glory, shall no more be in bondage to them that by nature are no gods." All therefore that the prophet says in the person of the Lord concerning the power of the adversary, this fighter against God, refers to the Lord Himself, Who spake these words by the prophet!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2:10"
