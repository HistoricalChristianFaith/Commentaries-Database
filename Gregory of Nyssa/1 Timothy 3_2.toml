[[commentary]]
quote='''
Nay, we entrust iron, to make vessels with, not to those who know nothing about the matter, but to those who are acquainted with the art of the smith; ought we not therefore to trust souls to him who is well-skilled to soften them by the fervent heat of the Holy Spirit, and who by the impress of rational implements may fashion each one of you to be a chosen and useful vessel? It is thus that the inspired Apostle bids us to take thought, in his Epistle to Timothy, laying injunction upon all who hear, when he says that a Bishop must be without reproach. Is this all that the Apostle cares for, that he who is advanced to the priesthood should be irreproachable? and what is so great an advantage as that all possible qualifications should be included in one? But he knows full well that the subject is moulded by the character of his superior, and that the upright walk of the guide becomes that of his followers too. For what the Master is, such does he make the disciple to be.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FLetters%2FLetter%252013%2520To%2520the%2520Church%2520at%2520Nicomedia.html'
source_title="LETTERS 13"
