[[commentary]]
quote='''
Jacob also, hastening to seek a bride, met Rachel unexpectedly at the well. And a great stone lay upon the well, which a multitude of shepherds were wont to roll away when they came together, and then gave water to themselves and to their flocks. But Jacob alone rolls away the stone, and waters the flocks of his spouse. The thing is, I think, a dark saying, a shadow of what should come. For what is the stone that is laid but Christ Himself? for of Him Isaiah says, "And I will lay in the foundations of Sion a costly stone, precious, elect:" and Daniel likewise, "A stone was cut out without hands," that is, Christ was born without a man. For as it is a new and marvellous thing that a stone should be cut out of the rock without a hewer or stone-cutting tools, so it is a thing beyond all wonder that an offspring should appear from an unwedded Virgin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Baptism%2520of%2520Christ.html'
source_title="ON THE BAPTISM OF CHRIST"
