[[commentary]]
quote='''
In this number are those whom Wisdom calls the "slothful ones," who bestrew their "way" with "thorns"; who think it a moral loss to be anxious about keeping the commandments; who erase from their own minds the Apostolic teaching, and instead of eating the bread of their own honest earning fix on that of others, and make their idleness itself into an art of living. From this number, too, come the Dreamers, who put more faith in the illusions of their dreams than in the Gospel teaching, and style their own phantasies "revelations." Hence, too, those who "creep into the houses"; and again others who suppose virtue to consist in savage bearishness, and have never known the fruits of long-suffering and humility of spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="On Virginity, Chapter XXIII"
