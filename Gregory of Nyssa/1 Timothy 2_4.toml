[[commentary]]
quote='''
But I say that to those who with simplicity of heart receive the preaching of the Cross and the resurrection, the same grace should be a cause of equal thankfulness to the Son and to the Father, and now that the Son has accomplished the Father's will (and this, in the language of the Apostle, is "that all men should be saved"), they ought for this boon to honour the Father and the Son alike, inasmuch as our salvation would not have been wrought, had not the good will of the Father proceeded to actual operation for us through His own power. And we have learnt from the Scripture that the Son is the power of the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%252012.html'
source_title="AGAINST EUNOMIUS 12.3"
