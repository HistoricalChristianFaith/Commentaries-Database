[[commentary]]
quote='''
It is obvious that the highest is in need of no exaltation. Only what is lowly can be lifted to the exalted state, becoming now what it was not before. Being united to the Lord the human nature is lifted up to share in his divinity. What is exalted is that which has been lifted up from lowliness.
'''
source_url=''
source_title="ANTIRRHETICUS AGAINST APOLLINARIUS"


[[commentary]]
quote='''
The simplicity of the True Faith assumes God to be that which He is, viz., incapable of being grasped by any term, or any idea, or any other device of our apprehension, remaining beyond the reach not only of the human but of the angelic and of all supramundane intelligence, unthinkable, unutterable, above all expression in words, having but one name that can represent His proper nature, the single name of being "Above every name"; which is granted to the Only-begotten also, because "all that the Father hath is the Son's."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25201.html'
source_title="AGAINST EUNOMIUS 2.587"
