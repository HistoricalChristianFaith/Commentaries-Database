[[commentary]]
quote='''
It is universally admitted that the name of "proverb," in its scriptural use, is not applied with regard to the evident sense, but is used with a view to some hidden meaning, as the Gospel thus gives the name of "proverbs" to dark and obscure sayings; so that the "proverb," if one were to set forth the interpretation of the name by a definition, is a form of speech which, by means of one set of ideas immediately presented, points to something else which is hidden, or a form of speech which does not point out the aim of the thought directly, but gives its instruction by an indirect signification.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25203.html'
source_title="AGAINST EUNOMIUS 3:2"
