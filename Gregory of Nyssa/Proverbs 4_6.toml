[[commentary]]
quote='''
If a man is going to carry out the advice of Solomon and take for helpmate and life-companion that true Wisdom of which he says, "Love her, and she shall keep thee," "honour her, that she may embrace thee," then he will prepare himself in a manner worthy of such a love, so as to feast with all the joyous wedding guests in spotless raiment, and not be cast forth, while claiming to sit at that feast, for not having put on the wedding garment. It is plain moreover that the argument applies equally to men and women, to move them towards such a marriage. "There is neither male nor female," the Apostle says; "Christ is all, and in all"; and so it is equally reasonable that he who is enamoured of wisdom should hold the Object of his passionate desire, Who is the True Wisdom; and that the soul which cleaves to the undying Bridegroom should have the fruition of her love for the true Wisdom, which is God. We have now sufficiently revealed the nature of the spiritual union, and the Object of the pure and heavenly Love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 20"
