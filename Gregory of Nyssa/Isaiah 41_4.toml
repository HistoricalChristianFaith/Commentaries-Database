[[commentary]]
quote='''
The great Isaiah thus speaks of the Divine nature with reference to these doctrines, in his exalted utterance,—who speaks in the person of the Deity, "I am the first, and hereafter am I, and no God was before Me, and no God shall be after Me." … Since, then, neither is that God which was before God, nor is that God which is after God, (for that which is after God is the creation, and that which is anterior to God is nothing, and Nothing is not God;—or one should rather say, that which is anterior to God is God in His eternal blessedness, defined in contradistinction to Nothing;)—since, I say, this inspired utterance was spoken by the mouth of the prophet, we learn by his means the doctrine that the Divine Nature is one, continuous with Itself and indiscerptible, not admitting in Itself priority and posteriority, though it be declared in Trinity. Since, then, the saying is the saying of God, whether you grant that the words are the words of the Father or of the Son, the orthodox doctrine is equally upheld by either. For if it is the Father that speaks thus, He bears witness to the Son that He is not "after" Himself: for if the Son is God, and whatever is "after" the Father is not God, it is clear that the saying bears witness to the truth that the Son is in the Father, and not after the Father. If, on the other hand, one were to grant that this utterance is of the Son, the phrase, "None hath been before Me," will be a clear intimation that He Whom we contemplate "in the Beginning" is apprehended together with the eternity of the Beginning.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25205.html'
source_title="AGAINST EUNOMIUS 5:1"
