[[commentary]]
quote='''
We know too that the flesh is subject to death because of sin, but the Spirit of God is both incorruptible, and life-giving, and deathless. As at our physical birth there comes into the world with us a potentiality of being again turned to dust, plainly the Spirit also imparts a life-giving potentiality to the children begotten by Himself. What lesson, then, results from these remarks? This: that we should wean ourselves from this life in the flesh, which has an inevitable follower, death; and that we should search for a manner of life which does not bring death in its train. Now the life of Virginity is such a life. We will add a few other things to show how true this is. Every one knows that the propagation of mortal frames is the work which the intercourse of the sexes has to do; whereas for those who are joined to the Spirit, life and immortality instead of children are produced by this latter intercourse; and the words of the Apostle beautifully suit their case, for the joyful mother of such children as these "shall be saved in child-bearing;" as the Psalmist in his divine songs thankfully cries, "He maketh the barren woman to keep house, and to be a joyful mother of children."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 14"
