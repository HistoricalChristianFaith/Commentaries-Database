[[commentary]]
quote='''
Just so our nature, becoming passional, had to encounter all the necessary results of a life of passion: but when it shall have started back to that state of passionless blessedness, it will no longer encounter the inevitable results of evil tendencies. Seeing, then, that all the infusions of the life of the brute into our nature were not in us before our humanity descended through the touch of evil into passions, most certainly, when we abandon those passions, we shall abandon all their visible results. No one, therefore, will be justified in seeking in that other life for the consequences in us of any passion. Just as if a man, who, clad in a ragged tunic, has divested himself of the garb, feels no more its disgrace upon him, so we too, when we have cast off that dead unsightly tunic made from the skins of brutes and put upon us (for I take the "coats of skins" to mean that conformation belonging to a brute nature with which we were clothed when we became familiar with passionate indulgence), shall, along with the casting off of that tunic, fling from us all the belongings that were round us of that skin of a brute; and such accretions are sexual intercourse, conception, parturition, impurities, suckling, feeding, evacuation, gradual growth to full size, prime of life, old age, disease, and death. If that skin is no longer round us, how can its resulting consequences be left behind within us?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Soul%2520and%2520the%2520Resurrection.html'
source_title="ON THE SOUL AND THE RESURRECTION"
