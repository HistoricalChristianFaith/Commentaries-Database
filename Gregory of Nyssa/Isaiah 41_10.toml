[[commentary]]
quote='''
For to none other than to God does it belong to implant courage in the fearful, saying to the faint-hearted, "Fear not, for I am with thee, be not dismayed," as says the Psalmist, "Yea though I walk through the valley of the shadow of death I will fear no evil, for Thou art with me." Nay, the Lord Himself says to the fearful,—"Let not your heart be troubled, neither let it be afraid," and, "Why are ye fearful, O ye of little faith?" and, "Be of good cheer, it is I, be not afraid," and again, "Be of good cheer: I have overcome the world."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2:15"
