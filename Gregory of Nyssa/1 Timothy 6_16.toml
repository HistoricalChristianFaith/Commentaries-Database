[[commentary]]
quote='''
But we, even when we are told that God "only hath immortality," understand by "immortality" the Son. For life is immortality, and the Lord is that life, Who said, "I am the Life." And if He be said to dwell "in the light that no man can approach unto," again we make no difficulty in understanding that the true Light, unapproachable by falsehood, is the Only-begotten, in Whom we learn from the Truth itself that the Father is. Of these opinions let the reader choose the more devout, whether we are to think of the Only-begotten in a manner worthy of the Godhead, or to call Him, as heresy prescribes, perishable and temporary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="Against Eunomius 2"
