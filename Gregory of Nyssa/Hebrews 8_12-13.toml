[[commentary]]
quote='''
The mighty Paul, knowing that the Only-begotten God, Who has the pre-eminence in all things, is the author and cause of all good, bears witness to Him that not only was the creation of all existent things wrought by Him, but that when the original creation of man had decayed and vanished away, to use his own language, and another new creation was wrought in Christ, in this too no other than He took the lead, but He is Himself the first-born of all that new creation of men which is effected by the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2.8"
