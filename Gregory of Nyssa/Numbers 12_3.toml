[[commentary]]
quote='''
[T]here are men in whom this struggle has ended in success; it was so with Moses, as we know; he was superior both to anger and to desire; the history testifying of him in both respects, that he was meek beyond all men (and by meekness it indicates the absence of all anger and a mind quite devoid of resentment), and that he desired none of those things about which we see the desiring faculty in the generality so active. This could not have been so, if these faculties were nature, and were referable to the contents of man's essence. For it is impossible for one who has come quite outside of his nature to be in Existence at all. But if Moses was at one and the same time in Existence and not in these conditions, then it follows that these conditions are something other than nature and not nature itself. For if, on the one hand, that is truly nature in which the essence of the being is found, and, on the other, the removal of these conditions is in our power, so that their removal not only does no harm, but is even beneficial to the nature, it is clear that these conditions are to be numbered amongst externals, and are affections, rather than the essence, of the nature; for the essence is that thing only which it is.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Soul%2520and%2520the%2520Resurrection.html'
source_title="ON THE SOUL AND THE RESURRECTION"
