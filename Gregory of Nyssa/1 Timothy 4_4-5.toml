[[commentary]]
quote='''
But as in the sensible world itself, though there is a considerable mutual opposition of its various elements, yet a certain harmony maintained in those opposites has been devised by the wisdom that rules the Universe, and thus there is produced a concord of the whole creation with itself, and the natural contrariety does not break the chain of agreement; in like manner, owing to the Divine wisdom, there is an admixture and interpenetration of the sensible with the intellectual department, in order that all things may equally have a share in the beautiful, and no single one of existing things be without its share in that superior world. For this reason the corresponding locality of the intellectual world is a subtle and mobile essence, which, in accordance with its supramundane habitation, has in its peculiar nature large affinity with the intellectual part. Now, by a provision of the supreme Mind there is an intermixture of the intellectual with the sensible world, in order that nothing in creation may be thrown aside as worthless, as says the Apostle, or be left without its portion of the Divine fellowship. On this account it is that the commixture of the intellectual and sensible in man is effected by the Divine Being, as the description of the cosmogony instructs us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FThe%2520Great%2520Catechism.html'
source_title="The Great Catechism 6"


[[commentary]]
quote='''
For, be it observed, there is no such thing in the world as evil irrespective of a will, and discoverable in a substance apart from that. Every creature of God is good, and nothing of His "to be rejected"; all that God made was "very good." But the habit of sinning entered as we have described, and with fatal quickness, into the life of man; and from that small beginning spread into this infinitude of evil. Then that godly beauty of the soul which was an imitation of the Archetypal Beauty, like fine steel blackened with the vicious rust, preserved no longer the glory of its familiar essence, but was disfigured with the ugliness of sin. This thing so great and precious, as the Scripture calls him, this being man, has fallen from his proud birthright.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="On Virginity 12"
