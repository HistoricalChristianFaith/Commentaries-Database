[[commentary]]
quote='''
But besides other things the action of Miriam the prophetess also gives rise to these surmisings of ours. Directly the sea was crossed she took in her hand a dry and sounding timbrel and conducted the women's dance. By this timbrel the story may mean to imply virginity, as first perfected by Miriam; whom indeed I would believe to be a type of Mary the mother of God. Just as the timbrel emits a loud sound because it is devoid of all moisture and reduced to the highest degree of dryness, so has virginity a clear and ringing report amongst men because it repels from itself the vital sap of merely physical life. Thus, Miriam's timbrel being a dead thing, and virginity being a deadening of the bodily passions, it is perhaps not very far removed from the bounds of probability that Miriam was a virgin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="On Virginity 19"
