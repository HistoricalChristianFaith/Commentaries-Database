[[commentary]]
quote='''
This is the cause why it says, "the Lord our God is one Lord," and also proclaims the Only-begotten God by the name of Godhead, without dividing the Unity into a dual signification, so as to call the Father and the Son two Gods, although each is proclaimed by the holy writers as God. The Father is God: the Son is God: and yet by the same proclamation God is One, because no difference either of nature or of operation is contemplated in the Godhead. For if (according to the idea of those who have been led astray) the nature of the Holy Trinity were diverse, the number would by consequence be extended to a plurality of Gods, being divided according to the diversity of essence in the subjects. But since the Divine, single, and unchanging nature, that it may be one, rejects all diversity in essence, it does not admit in its own case the signification of multitude; but as it is called one nature, so it is called in the singular by all its other names, "God," "Good," "Holy," "Saviour," "Just," "Judge," and every other Divine name conceivable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520%2522Not%2520Three%2520Gods%2522.html'
source_title="On \"Not Three Gods\""
