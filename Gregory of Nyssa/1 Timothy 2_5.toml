[[commentary]]
quote='''
It is not thus that we are taught by the lofty utterance of the Apostle, who says that having made void the law of commandments by His own doctrines, He is the mediator between God and man, declaring it by this saying, "There is one God, and one mediator between God and man, the man Christ Jesus;" where by the distinction implied in the word "mediator" he reveals to us the whole aim of the mystery of godliness. Now the aim is this. Humanity once revolted through the malice of the enemy, and, brought into bondage to sin, was also alienated from the true Life. After this the Lord of the creature calls back to Him His own creature, and becomes Man while still remaining God, being both God and Man in the entirety of the two several natures, and thus humanity was indissolubly united to God, the Man that is in Christ conducting the work of mediation, to Whom, by the first-fruits assumed for us, all the lump is potentially united. Since, then, a mediator is not a mediator of one, and God is one, not divided among the Persons in Whom we have been taught to believe (for the Godhead in the Father, the Son, and the Holy Ghost is one), the Lord, therefore, becomes a mediator once for all betwixt God and men, binding man to the Deity by Himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2.12"
