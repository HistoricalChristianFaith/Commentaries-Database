[[commentary]]
quote='''
Again, prophetic language attests that the conversion of those in error is the work of God. For "they went astray in the wilderness in a thirsty land," says the Psalmist, and he adds, "So He led them forth by the right way, that they might go to the city where they dwelt:" and, "when the Lord turned again the captivity of Sion." In like manner also the comfort of the afflicted is ascribed to God, Paul thus speaking, "Blessed be God, even the Father of our Lord Jesus Christ, Who comforteth us in all our tribulation." Again, the Psalmist says, speaking in the person of God "Thou calledst upon Me in trouble and I delivered thee." And the setting upright of those who stumble is innumerable times ascribed by Scripture to the power of the Lord: "Thou hast thrust sore at me that I might fall, but the Lord was my help," and "Though he fall, he shall not be cast away, for the Lord upholdeth him with His hand," and "The Lord helpeth them that are fallen." And to the loving-kindness of God confessedly belongs the recovery of the distressed, if Eunomius means the same thing of which we learn in prophecy, as the Scripture says, "Thou laidest trouble upon our loins; Thou sufferedst men to ride over our heads; we went through fire and water, and Thou broughtest us out into a wealthy place."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2:15"
