[[commentary]]
quote='''
An example might be found in the patriarch Isaac. He married Rebecca when he was past the flower of his age and his prime was well-nigh spent, so that his marriage was not the deed of passion, but because of God's blessing that should be upon his seed. He cohabited with her till the birth of her only children, and then, closing the channels of the senses, lived wholly for the Unseen; for this is what seems to be meant by the mention in his history of the dimness of the Patriarch's eyes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 7"
