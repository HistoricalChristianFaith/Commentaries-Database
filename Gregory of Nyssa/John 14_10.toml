[[commentary]]
quote='''
He speaks the truth Who says, "I am in the Father, and the Father in Me,"—plainly, the One in His entirety, in the Other in His entirety, the Father not superabounding in the Son, the Son not being deficient in the Father,—and Who says also that the Son should be honoured as the Father is honoured, and "He that hath seen Me hath seen the Father," and "no man knoweth the Father save the Son," in all which passages there is no hint given to those who receive these declarations as genuine, of any variation of glory, or of essence, or anything else, between the Father and the Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2.4"
