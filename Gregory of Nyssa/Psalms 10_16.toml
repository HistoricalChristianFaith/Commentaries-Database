[[commentary]]
quote='''
We find that we are drawn round uninterruptedly and evenly, and that we are always following a circumference where there is nothing to grasp; we find the divine life returning upon itself in an unbroken continuity, where no end and no parts can be recognized. Of God's eternity we say that which we have heard from prophecy; namely, that God is a king "of old," and rules for ages, and for ever, and beyond. Therefore we define him to be earlier than any beginning, and exceeding any end. Entertaining, then, this idea of the Almighty, as one that is adequate, we express it by two titles; that is, "Ungenerate" and "Endless" represent this infinitude and continuity and everlastingness of the Deity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25201.html'
source_title="AGAINST EUNOMIUS 1:42"
