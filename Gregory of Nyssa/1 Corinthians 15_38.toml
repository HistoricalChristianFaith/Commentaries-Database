[[commentary]]
quote='''
When explaining this mystery to the Corinthians, who, perhaps, themselves were bringing forward the same objections to it as its impugners to-day bring forward to overthrow our faith, he proceeds on his own authority to chide the audacity of their ignorance, and speaks thus: "Thou wilt say, then, to me, How are the dead raised up, and with what body do they come? Thou fool, that which thou sowest is not quickened, except it die; And that which thou sowest, thou sowest not that body that shall be, but bare grain, it may chance of wheat or of some other grain; But God giveth it a body as it hath pleased Him." In that passage, as it seems to me, he gags the mouths of men who display their ignorance of the fitting proportions in Nature, and who measure the Divine power by their own strength, and think that only so much is possible to God as the human understanding can take in, but that what is beyond it surpasses also the Divine ability.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Soul%2520and%2520the%2520Resurrection.html'
source_title="ON THE SOUL AND THE RESURRECTION"
