[[commentary]]
quote='''
The great Paul, who was instructed by those ineffable words which he heard, having been initiated in the mysteries within the paradise, clarifies this mystery for us, as he hinted in part through his words to the Ephesians, saying: "That you may have strength to comprehend with all the saints what is the breadth and length and height and depth, and to know the love of Christ that surpasses knowledge, that you may be filled with all the fullness of God." Therefore, the divine eye of the Apostle did not perceive the form of the cross in vain, but clearly showed through it that, having cast off all the scales of ignorance from the eyes, one sees purely the truth of beings; for he saw that this form, divided into four extensions from the central union, signifies the power and providence that was made manifest in it, which pervades all. For this reason, he uniquely names each extension with specific terms, calling the downward extension from the center "depth" and the upward extension "height," while the extensions stretching out laterally from the union on either side he calls "breadth" and "length," as if to say that on one side of the center is breadth and on the other is length. By these terms, it seems to me, he clearly indicates in his discourse that there is nothing in existence that is not utterly sustained by the divine nature, the heavenly, the earthly, and everything stretching out to the ends of existence from every lateral direction; for through the height, it signifies what is above, through the depth, what is below, and with the length and breadth, the extremities in between, held by the power that controls everything.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520three%2520days%2520between%2520the%2520death%2520and%2520resurrection%2520of%2520our%2520Lord%2520Jesus%2520Christ.html'
source_title="ON THE THREE DAYS"
