[[commentary]]
quote='''
There are two ways to "increase": in the body and in the soul. The soul increases by education, progressing toward completion; the body increases (by growing) from small to large. He told, therefore, the senseless animals to increase by the development of the body. But to us he said "increase" in the inner person along ways which lead toward God. This was what Paul did, in his stretching out toward what lay ahead and forgetting what lie behind. This is godly increase.
'''
source_url=''
source_title="ON THE ORIGIN OF MAN"

[[commentary]]
quote='''
Let no one think however that herein we depreciate marriage as an institution. We are well aware that it is not a stranger to God's blessing.… But our view of marriage is this; that, while the pursuit of heavenly things should be a man's first care, yet if he can use the advantages of marriage with sobriety and moderation, he need not despise this way of serving the state.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 8"

[[commentary]]
quote='''
"You will rule over savage beasts." How though, you may ask, since I have a beast within? Actually, there are a myriad, a countless number of beasts within you. You should not take offense in these words. Rage is a small beast, yet when it growls in the heart is any dog more savage? Is not the treacherous soul like fresh bait staked in front of a bear's den? Is not the hypocrite a beast?… [Rule] then over the beasts inside you. Rule your thoughts so that you will become a ruler over all things. So the same one who provides the power to rule over all living things provides power for us to rule over ourselves.
'''
source_url=''
source_title="ON THE ORIGIN OF MAN"


[[commentary]]
quote='''
For I think that from this beginning all our passions issue as from a spring, and pour their flood over man's life; and an evidence of my words is the kinship of passions which appears alike in ourselves and in the brutes; for it is not allowable to ascribe the first beginnings of our constitutional liability to passion to that human nature which was fashioned in the Divine likeness; but as brute life first entered into the world, and man, for the reason already mentioned, took something of their nature (I mean the mode of generation), he accordingly took at the same time a share of the other attributes contemplated in that nature; for the likeness of man to God is not found in anger, nor is pleasure a mark of the superior nature; cowardice also, and boldness, and the desire of gain, and the dislike of loss, and all the like, are far removed from that stamp which indicates Divinity. These attributes, then, human nature took to itself from the side of the brutes; for those qualities with which brute life was armed for self-preservation, when transferred to human life, became passions; for the carnivorous animals are preserved by their anger, and those which breed largely by their love of pleasure; cowardice preserves the weak, fear that which is easily taken by more powerful animals, and greediness those of great bulk; and to miss anything that tends to pleasure is for the brutes a matter of pain. All these and the like affections entered man's composition by reason of the animal mode of generation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="ON THE MAKING OF MAN 18.1-2"
