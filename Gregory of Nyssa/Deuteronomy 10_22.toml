[[commentary]]
quote='''
It is customary for Holy Scripture to imply the whole by the part. For He that said, "Unto Thee shall all flesh come," does not mean that the flesh will be presented before the Judge apart from the souls: and when we read in sacred History that Jacob went down into Egypt with seventy-five souls, we understand the flesh also to be intended together with the souls. So, then, the Word, when He became flesh, took with the flesh the whole of human nature; and hence it was possible that hunger and thirst, fear and dread, desire and sleep, tears and trouble of spirit, and all such things, were in Him. For the Godhead, in its proper nature, admits no such affections, nor is the flesh by itself involved in them, if the soul is not affected co-ordinately with the body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2.13"
