[[commentary]]
quote='''
And now that we have thus distinguished the various modes of generation, it will be time to remark how the benevolent dispensation of the Holy Spirit, in delivering to us the Divine mysteries, imparts that instruction which transcends reason by such methods as we can receive. For the inspired teaching adopts, in order to set forth the unspeakable power of God, all the forms of generation that human intelligence recognizes, yet without including the corporeal senses attaching to the words. For when it speaks of the creative power, it gives to such an energy the name of generation, because its expression must stoop to our low capacity; it does not, however, convey thereby all that we include in creative generation, as time, place, the furnishing of matter, the fitness of instruments, the design in the things that come into being, but it leaves these, and asserts of God in lofty and magnificent language the creation of all existent things, when it says, "He spake the word and they were made, He commanded and they were created." Again when it interprets to us the unspeakable and transcendent existence of the Only-begotten from the Father, as the poverty of human intellect is incapable of receiving doctrines which surpass all power of speech and thought, there too it borrows our language and terms Him "Son,"—a name which our usage assigns to those who are born of matter and nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2:9"
