[[commentary]]
quote='''
Under "thrones" he includes the Cherubim, giving them this Greek name, as more intelligible than the Hebrew name for them. He knew that "God sits upon the Cherubim:" and so he calls these Powers the thrones of Him who sits thereon. In the same way there are included in the list Isaiah's Seraphim, by whom the mystery of the Trinity was luminously proclaimed, when they uttered that marvellous cry "Holy," being awestruck with the beauty in each Person of the Trinity. They are named under the title of "powers" both by the mighty Paul, and by the prophet David. The latter says, "Bless ye the Lord all ye His powers, ye ministers of His that do His pleasure:" and Isaiah instead of saying "Bless ye" has written the very words of their blessing, "Holy, Holy, Holy, Lord God of hosts: the whole earth is full of His glory" and he has revealed by what one of the Seraphim did (to him) that these powers are ministers that do God's pleasure, effecting the `purging of sin' according to the will of Him Who sent them: for this is the ministry of these spiritual beings, viz., to be sent forth for the salvation of those who are being saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25201.html'
source_title="AGAINST EUNOMIUS 1:23"
