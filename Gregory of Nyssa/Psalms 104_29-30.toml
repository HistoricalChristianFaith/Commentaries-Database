[[commentary]]
quote='''
She, however, replied, First, I think, we must briefly run over the scattered proclamations of this doctrine in Holy Scripture; they shall give the finishing touch to our discourse. Observe, then, that I can hear David, in the midst of his praises in the Divine Songs, saying at the end of the hymnody of the hundred and third (104th) Psalm, where he has taken for his theme God's administration of the world, "Thou shalt take away their breath, and they shall die, and return to their dust: Thou shalt send forth Thy Spirit, and they shall be created: and Thou shalt renew the face of the earth." He says that a power of the Spirit which works in all vivifies the beings into whom it enters, and deprives those whom He abandons of their life. Seeing, then, that the dying is declared to occur at the Spirit's departure, and the renewal of these dead ones at His appearance, and seeing moreover that in the order of the statement the death of those who are to be thus renewed comes first, we hold that in these words that mystery of the Resurrection is proclaimed to the Church, and that David in the spirit of prophecy expressed this very gift which you are asking about.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Soul%2520and%2520the%2520Resurrection.html'
source_title="ON THE SOUL AND THE RESURRECTION 10"
