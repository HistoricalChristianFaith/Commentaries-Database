[[commentary]]
quote='''
The Apostle Peter says, "God made this Jesus, Whom ye crucified, Lord and Christ." We, learning this from him, say that the whole context of the passage tends one way,—the Cross itself, the human name, the indicative turn of the phrase. For the word of the Scripture says that in regard to one person two things were wrought,—by the Jews, the Passion, and by God, honour; not as though one person had suffered and another had been honoured by exaltation: and he further explains this yet more clearly by his words in what follows, "being exalted by the right hand of God." Who then was "exalted"? He that was lowly, or He that was the Highest? and what else is the lowly, but the Humanity? what else is the Highest, but the Divinity? Surely, God needs not to be exalted, seeing that He is the Highest. It follows, then, that the Apostle's meaning is that the Humanity was exalted: and its exaltation was effected by its becoming Lord and Christ. And this took place after the Passion. It is not therefore the pre-temporal existence of the Lord which the Apostle indicates by the word "made," but that change of the lowly to the lofty which was effected "by the right hand of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25205.html'
source_title="AGAINST EUNOMIUS 5.3"
