[[commentary]]
quote='''
The Scripture, "given by inspiration of God," as the Apostle calls it, is the Scripture of the Holy Spirit, and its intention is the profit of men. For "every scripture," he says, "is given by inspiration of God and is profitable"; and the profit is varied and multiform, as the Apostle says—"for doctrine, for reproof, for correction, for instruction in righteousness." Such a boon as this, however, is not within any man's reach to lay hold of, but the Divine intention lies hid under the body of the Scripture, as it were under a veil, some legislative enactment or some historical narrative being cast over the truths that are contemplated by the mind. For this reason, then, the Apostle tells us that those who look upon the body of the Scripture have "a veil upon their heart," and are not able to look upon the glory of the spiritual law, being hindered by the veil that has been cast over the face of the law-giver.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25207.html'
source_title="Against Eunomius 7"
