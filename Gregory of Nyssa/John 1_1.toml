[[commentary]]
quote='''
For in order to lead the untrained hearing as far away as possible from passion, he does not speak in his opening words of "Son," or "Father," or "generation," that no one should either, on hearing first of all of a "Father," be hurried on to the obvious signification of the word, or, on learning the proclamation of a "Son," should understand that name in the ordinary sense, or stumble, as at a "stone of stumbling," at the word "generation"; but instead of "the Father," he speaks of "the Beginning": instead of "was begotten," he says "was": and instead of "the Son," he says "the Word": and declares "In the Beginning was the Word."… Then he declares, "And the Word was with God." Once more the Evangelist fears for our untrained state, once more he dreads our childish and untaught condition: he does not yet entrust to our ears the appellation of "Father," lest any of the more carnally minded, learning of "the Father," may be led by his understanding to imagine also by consequence a mother. Neither does he yet name in his proclamation the Son; for he still suspects our customary tendency to the lower nature, and fears lest any, hearing of the Son, should humanize the Godhead by an idea of passion. For this reason, resuming his proclamation, he again calls him "the Word," making this the account of His nature to thee in thine unbelief. For as thy word proceeds from thy mind, without requiring the intervention of passion, so here also, in hearing of the Word, thou shalt conceive that which is from something, and shalt not conceive passion.… Therefore our herald, crying once more aloud, still proclaims in his third utterance "the Word," and not "the Son," saying, "And the Word was God." First he declared wherein He was, then with whom He was, and now he says what He is, completing, by his third repetition, the object of his proclamation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25204.html'
source_title="AGAINST EUNOMIUS 4.1"
