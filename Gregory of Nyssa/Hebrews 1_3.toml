[[commentary]]
quote='''
For as the body of the sun is expressly imaged by the whole disc that surrounds it, and he who looks on the sun argues, by means of what he sees, the existence of the whole solid substratum, so, he says, the majesty of the Father is expressly imaged in the greatness of the power of the Son, that the one may be believed to be as great as the other is known to be: and again, as the radiance of light sheds its brilliancy from the whole of the sun's disc (for in the disc one part is not radiant, and the rest dim), so all that glory which the Father is, sheds its brilliancy from its whole extent by means of the brightness that comes from it, that is, by the true Light; and as the ray is of the sun (for there would be no ray if the sun were not), yet the sun is never conceived as existing by itself without the ray of brightness that is shed from it, so the Apostle delivering to us the continuity and eternity of that existence which the Only-begotten has of the Father, calls the Son "the brightness of His glory."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25208.html'
source_title="AGAINST EUNOMIUS 8.1"


[[commentary]]
quote='''
So that, since we recognize two things in Christ, one Divine, the other human (the Divine by nature, but the human in the Incarnation), we accordingly claim for the Godhead that which is eternal, and that which is created we ascribe to His human nature. For as, according to the prophet, He was formed in the womb as a servant, so also, according to Solomon, He was manifested in the flesh by means of this servile creation. But when they say, "if He was, He was not begotten, and if He was begotten He was not," let them learn that it is not fitting to ascribe to His Divine nature the attributes which belong to His fleshly origin. For bodies which do not exist, are generated, and God makes those things to be which are not, but does not Himself come into being from that which is not. And for this reason also Paul calls Him "the brightness of glory," that we may learn that as the light from the lamp is of the nature of that which sheds the brightness, and is united with it (for as soon as the lamp appears the light that comes from it shines out simultaneously), so in this place the Apostle would have us consider both that the Son is of the Father, and that the Father is never without the Son; for it is impossible that glory should be without radiance, as it is impossible that the lamp should be without brightness. But it is clear that as His being brightness is a testimony to His being in relation with the glory (for if the glory did not exist, the brightness shed from it would not exist), so, to say that the brightness "once was not" is a declaration that the glory also was not, when the brightness was not; for it is impossible that the glory should be without the brightness. As therefore it is not possible to say in the case of the brightness, "If it was, it did not come into being, and if it came into being it was not," so it is in vain to say this of the Son, seeing that the Son is the brightness. Let those also who speak of "less" and "greater," in the case of the Father and the Son, learn from Paul not to measure things immeasurable. For the Apostle says that the Son is the express image of the Person of the Father. It is clear then that however great the Person of the Father is, so great also is the express image of that Person; for it is not possible that the express image should be less than the Person contemplated in it. And this the great John also teaches when he says, "In the beginning was the Word, and the Word was with God." For in saying that he was "in the beginning" and not "after the beginning," he showed that the beginning was never without the Word; and in declaring that "the Word was with God," he signified the absence of defect in the Son in relation to the Father; for the Word is contemplated as a whole together with the whole being of God. For if the Word were deficient in His own greatness so as not to be capable of relation with the whole being of God, we are compelled to suppose that that part of God which extends beyond the Word is without the Word. But in fact the whole magnitude of the Word is contemplated together with the whole magnitude of God: and consequently in statements concerning the Divine nature, it is not admissible to speak of "greater" and "less."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Faith.html'
source_title="ON THE FAITH"


[[commentary]]
quote='''
When he was asking how to give a name to what cannot be grasped in thought and did not discover a word expressing an interpretation of the incomprehensible, he called "glory" and "substance" whatever underlies all good and is not sufficiently known or spoken of. The underlying essence of being he dismissed as unnamable. However, interpreting the unity and inseparability of the Son and the Father, and the Son's being contemplated indefinably and invisibly with the indefinable and unseen Father, he addressed him as "radiance of glory" and "image of substance," indicating the unity of their nature by the word radiance and their equality by the word image. For, in connection with a radiant nature, there is no middle point in a beam of light, nor is there an inferior part of an image in connection with a substance determined by it. The observer of the radiant nature will know the radiance in its entirety, and the person comprehending the size of the substance measures it in its entirety with its accompanying image.
'''
source_url=''
source_title="ON PERFECTION"


[[commentary]]
quote='''
The Logos "upholds the universe by his word of power" from nonexistence to existence. For all things, as many as exist in connection with matter and as many as have received an immaterial nature, have one cause of their substance: the Word of unspeakable power.
'''
source_url=''
source_title="ON PERFECTION"
