[[commentary]]
quote='''
But I must return here to what I said at first; that the perfection of this liberty does not consist only in that one point of abstaining from marriage. Let no one suppose that the prize of virginity is so insignificant and so easily won as that; as if one little observance of the flesh could settle so vital a matter. But we have seen that every man who doeth a sin is the servant of sin; so that a declension towards vice in any act, or in any practice whatever, makes a slave, and still more, a branded slave, of the man, covering him through sin's lashes with bruises and seared spots. Therefore it behoves the man who grasps at the transcendent aim of all virginity to be true to himself in every respect, and to manifest his purity equally in every relation of his life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 18"
