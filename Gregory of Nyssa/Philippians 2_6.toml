[[commentary]]
quote='''
He did not say "having a nature like that of God," as would be said of [a man] who was made in the image of God. Rather Paul says "being in the very form of God." All that is the Father's is in the Son.
'''
source_url=''
source_title="ANTIRRHETICUS AGAINST APOLLINARIUS"


[[commentary]]
quote='''
But He Who is "in the form of God" has been formed by no impression different from the Father, seeing that He is "the express image" of the Father's Person, while the "form of God" is surely the same thing as His essence. For as, "being made in the form of a servant," He was formed in the essence of a servant, not taking upon Him the form merely, apart from the essence, but the essence is involved in the sense of "form," so, surely, he who says that He is "in the form of God" signified essence by "form."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25204.html'
source_title="Against Eunomius, Book 4"
