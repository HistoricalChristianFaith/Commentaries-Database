[[commentary]]
quote='''
These attributes no longer seem to be in either Nature by way of division, but the perishable Nature being, by its commixture with the Divine, made anew in conformity with the Nature that overwhelms it, participates in the power of the Godhead, as if one were to say that mixture makes a drop of vinegar mingled in the deep to be sea, by reason that the natural quality of this liquid does not continue in the infinity of that which overwhelms it. This is our doctrine, which does not, as Eunomius charges against it, preach a plurality of Christs, but the union of the Man with the Divinity, and which calls by the name of "making" the transmutation of the Mortal to the Immortal, of the Servant to the Lord, of Sin to Righteousness, of the Curse to the Blessing, of the Man to Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25205.html'
source_title="AGAINST EUNOMIUS 3.3.67"

[[commentary]]
quote='''
He "emptied himself," as the Scripture says, so that as much as nature could hold it might receive.
'''
source_url=''
source_title="AD THEOPHILUM ADVERSUS APOLLINARISTAS 3"

[[commentary]]
quote='''
The one who says that he "took the form of a slave"—and this form is flesh—is saying that, being himself something else according to his divine form, something else in his nature, he assumed the servile form.
'''
source_url=''
source_title="ANTIRRHETICUS AGAINST APOLLINARIUS"

[[commentary]]
quote='''
The Word is identical with the Word, He who appeared in the flesh with Him Who was with God. But the flesh was not identical with the Godhead, till this too was transformed to the Godhead, so that of necessity one set of attributes befits God the Word, and a different set of attributes befits the "form of the servant."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25205.html'
source_title="AGAINST EUNOMIUS 3.3.62"


[[commentary]]
quote='''
He says of the Son that he has "come to be in the likeness and form of men." If he "came to be" in this likeness, this obviously implies that he was not invested with it from the beginning. Before coming to be in that likeness he was not fashioned according to some corporeal pattern. For no embodied form could become the pattern for what is previously not embodied.
'''
source_url=''
source_title="ANTIRRHETICUS AGAINST APOLLINARIUS"
