[[commentary]]
quote='''
"Call for the mourning women," as says the prophet Jeremiah. In no other way can the burning heart cool down, swelling as it is with its affliction, unless it relieves itself by sobs and tears. Formerly the hope of his return consoled us for the pang of separation, but now he has been torn from us by that final separation. A huge intervening chasm is fixed between the Church and him. He rests indeed in the bosom of Abraham, but there exists not one who might bring the drop of water to cool the tongue of the agonized. Gone is that beauty, silent is that voice, closed are those lips, fled that grace. Our happy state has become a tale that is told. Elijah of old time caused grief to the people of Israel when he soared from earth to God. But Elisha consoled them for the loss by being adorned with the mantle of his master. But now our wound is beyond healing; our Elijah has been caught up, and no Elisha left behind in his place. You have heard certain mournful and lamenting words of Jeremiah, with which he bewailed Jerusalem as a deserted city, and how among other expressions of passionate grief he added this, "The ways of Zion do mourn." These words were uttered then, but now they have been realized. For when the news of our calamity shall have been spread abroad, then will the ways be full of mourning crowds, and the sheep of his flock will pour themselves forth, and like the Ninevites utter the voice of lamentation, or, rather, will lament more bitterly than they. For in their case their mourning released them from the cause of their fear, but with these no hope of release from their distress removes their need of mourning. I know, too, of another utterance of Jeremiah, which is reckoned among the books of the Psalms; it is that which he made over the captivity of Israel. The words run thus: "We hung our harps upon the willows, and condemned ourselves as well as our harps to silence." I make this song my own. For when I see the confusion of heresy, this confusion is Babylon. And when I see the flood of trials that pours in upon us from this confusion, I say that these are "the waters of Babylon by which we sit down, and weep" because there is no one to guide us over them. Even if you mention the willows, and the harps that hung thereon, that part also of the figure shall be mine. For in truth our life is among willows, the willow being a fruitless tree, and the sweet fruit of our life having all withered away. Therefore have we become fruitless willows, and the harps of love we hung upon those trees are idle and unvibrating. "If I forget thee, oh Jerusalem," he adds, "may my right hand be forgotten." Suffer me to make a slight alteration in that text. It is not we who have forgotten the right hand, but the right hand that has forgotten us: and the "tongue has cleaved to the roof of" his own "mouth," and barred the passage of his words, so that we can never again hear that sweet voice. But let me have all tears wiped away, for I feel that I am indulging more than is right in this womanish sorrow for our loss.

Our Bridegroom has not been taken from us. He stands in our midst, though we see him not. The Priest is within the holy place. He is entered into that within the veil, whither our forerunner Christ has entered for us. He has left behind him the curtain of the flesh. No longer does he pray to the type or shadow of the things in heaven, but he looks upon the very embodiment of these realities. No longer through a glass darkly does he intercede with God, but face to face he intercedes with Him: and he intercedes for us, and for the "negligences and ignorances" of the people. He has put away the coats of skin; no need is there now for the dwellers in paradise of such garments as these; but he wears the raiment which the purity of his life has woven into a glorious dress. "Precious in the sight of the Lord is the death" of such a man, or rather it is not death, but the breaking of bonds, as it is said, "Thou hast broken my bonds asunder." Simeon has been let depart. He has been freed from the bondage of the body. The "snare is broken and the bird hath flown away." He has left Egypt behind, this material life. He has crossed, not this Red Sea of ours, but the black gloomy sea of life. He has entered upon the land of promise, and holds high converse with God upon the mount. He has loosed the sandal of his soul, that with the pure step of thought he may set foot upon that holy land where there is the Vision of God. Having therefore, brethren, this consolation, do ye, who are conveying the bones of our Joseph to the place of blessing, listen to the exhortation of Paul: "Sorrow not as others who have no hope."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FFuneral%2520Oration%2520on%2520Meletius.html'
source_title="FUNERAL ORATION ON MELETIUS"
