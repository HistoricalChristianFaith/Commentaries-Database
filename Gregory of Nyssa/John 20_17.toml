[[commentary]]
quote='''
Now that the words addressed to Mary are not applicable to the Godhead of the Only-begotten, one may learn from the intention with which they were uttered. For He Who humbled Himself to a level with human littleness, He it is Who spake the words.… And so He from Whom we were formerly alienated by our revolt has become our Father and our God. Accordingly in the passage cited above the Lord brings the glad tidings of this benefit. And the words are not a proof of the degradation of the Son, but the glad tidings of our reconciliation to God. For that which has taken place in Christ's Humanity is a common boon bestowed on mankind generally. For as when we see in Him the weight of the body, which naturally gravitates to earth, ascending through the air into the heavens, we believe according to the words of the Apostle, that we also "shall be caught up in the clouds to meet the Lord in the air," even so, when we hear that the true God and Father has become the God and Father of our First-fruits, we no longer doubt that the same God has become our God and Father too, inasmuch as we have learnt that we shall come to the same place whither Christ has entered for us as our forerunner.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%252012.html'
source_title="AGAINST EUNOMIUS 12.1"


[[commentary]]
quote='''
He becomes the first-born of the new creation of men in Christ by the two-fold regeneration, alike that by Holy Baptism and that which is the consequence of the resurrection from the dead, becoming for us in both alike the Prince of Life, the first-fruits, the first-born. This first-born, then, hath also brethren, concerning whom He speaks to Mary, saying, "Go and tell My brethren, I go to My Father and your Father, and to My God and your God." In these words He sums up the whole aim of His dispensation as Man. For men revolted from God, and "served them which by nature were no gods," and though being the children of God became attached to an evil father falsely so called. For this cause the mediator between God and man having assumed the first-fruits of all human nature, sends to His brethren the announcement of Himself not in His divine character, but in that which He shares with us, saying, "I am departing in order to make by My own self that true Father, from whom you were separated, to be your Father, and by My own self to make that true God from whom you had revolted to be your God, for by that first-fruits which I have assumed, I am in Myself presenting all humanity to its God and Father." Since, then, the first-fruits made the true God to be its God, and the good Father to be its Father, the blessing is secured for human nature as a whole, and by means of the first-fruits the true God and Father becomes Father and God of all men. Now "if the first-fruits be holy, the lump also is holy." But where the first-fruits, Christ, is (and the first-fruits is none other than Christ), there also are they that are Christ's, as the apostle says.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2.8"
