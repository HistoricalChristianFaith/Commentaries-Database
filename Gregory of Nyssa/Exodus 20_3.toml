[[commentary]]
quote='''
God commands us by His prophet not to esteem any new God to be God, and not to worship any strange God. Now it is clear that that is called new which is not from everlasting, and on the contrary, that is called everlasting which is not new. He, then, who does not believe that the Only-begotten God is from everlasting of the Father does not deny that He is new, for that which is not everlasting is confessedly new; and that which is new is not God, according to the saying of Scripture, "there shall not be in thee any new God." Therefore he who says that the Son "once was not," denies His Godhead. Again, He Who says "thou shalt never worship a strange God" forbids us to worship another God; and the strange God is so called in contradistinction to our own God. Who, then, is our own God? Clearly, the true God. And who is the strange God? Surely, he who is alien from the nature of the true God. If, therefore, our own God is the true God, and if, as the heretics say, the Only-begotten God is not of the nature of the true God, He is a strange God, and not our God. But the Gospel says, the sheep "will not follow a stranger." He that says He is created will make Him alien from the nature of the true God. What then will they do, who say that He is created? Do they worship that same created being as God, or do they not? For if they do not worship Him, they follow the Jews in denying the worship of Christ: and if they do worship Him, they are idolaters, for they worship one alien from the true God. But surely it is equally impious not to worship the Son, and to worship the strange God. We must then say that the Son is the true Son of the true Father, that we may both worship Him, and avoid condemnation as worshipping a strange God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Faith.html'
source_title="ON THE FAITH"
