[[commentary]]
quote='''
Let no one think however that herein we depreciate marriage as an institution. We are well aware that it is not a stranger to God's blessing. But since the common instincts of mankind can plead sufficiently on its behalf, instincts which prompt by a spontaneous bias to take the high road of marriage for the procreation of children, whereas Virginity in a way thwarts this natural impulse, it is a superfluous task to compose formally an Exhortation to marriage. We put forward the pleasure of it instead, as a most doughty champion on its behalf. It may be however, notwithstanding this, that there is some need of such a treatise, occasioned by those who travesty the teaching of the Church. Such persons "have their conscience seared with a hot iron," as the Apostle expresses it; and very truly too, considering that, deserting the guidance of the Holy Spirit for the "doctrines of devils," they have some ulcers and blisters stamped upon their hearts, abominating God's creatures, and calling them "foul," "seducing," "mischievous," and so on.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 7"
