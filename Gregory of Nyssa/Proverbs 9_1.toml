[[commentary]]
quote='''
But we say that in the earlier part of the book, where he says that "Wisdom has builded herself a house," he refers darkly in these words to the preparation of the flesh of the Lord: for the true Wisdom did not dwell in another's building, but built for Itself that dwelling-place from the body of the Virgin. Here, however, he adds to his discourse that which of both is made one—of the house, I mean, and of the Wisdom which built the house, that is to say, of the Humanity and of the Divinity that was commingled with man; and to each of these he applies suitable and fitting terms, as you may see to be the case also in the Gospels, where the discourse, proceeding as befits its subject, employs the more lofty and divine phraseology to indicate the Godhead, and that which is humble and lowly to indicate the Manhood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25203.html'
source_title="AGAINST EUNOMIUS 3:1.44"
