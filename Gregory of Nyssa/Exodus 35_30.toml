[[commentary]]
quote='''
"He was entrusted," he says, "with the construction of things by the Father." But if he had been talking about some artizan executing his work at the pleasure of his employer, would he not have used the same language? For we are not wrong in saying just the same of Bezaleel, that being entrusted by Moses with the building of the tabernacle, he became the constructor of those things there mentioned, and would not have taken the work in hand had he not previously acquired his knowledge by Divine inspiration, and ventured upon the undertaking on Moses' entrusting him with its execution. Accordingly the term "entrusted" suggests that His office and power in creation came to Him as something adventitious, in the sense that before He was entrusted with that commission He had neither the will nor the power to act, but when He received authority to execute the works, and power sufficient for the works, then He became the artificer of things that are, the power allotted to Him from on high being, as Eunomius says, sufficient for the purpose.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%252011.html'
source_title="AGAINST EUNOMIUS 11.5"
