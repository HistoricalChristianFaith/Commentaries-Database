[[commentary]]
quote='''
One who reflecting on this holds cheaply all that mankind prizes, whose only love is the divine life, because "all flesh is grass, and all the glory of man as the flower of grass," can never care for this grass which "to-day is and to-morrow is not"; studying the divine ways, he knows not only that human life has no fixity, but that the entire universe will not keep on its quiet course for ever; he neglects his existence here as an alien and a passing thing; for the Saviour said, "Heaven and earth shall pass away," the whole of necessity awaits its refashioning.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 4"
