[[commentary]]
quote='''
For if He were not of the same nature as the Father, how could He either have had in Himself that which was different? or how could He have shown in Himself that which was unlike, if the foreign and alien nature did not receive the stamp of that which was of a different kind from itself? But he says, "nor has He a divider of His glory." Herein he speaks in accordance with the fact, even though he does not know what he is saying: for the Son does not divide the glory with the Father, but has the glory of the Father in its entirety, even as the Father has all the glory of the Son. For thus He spake to the Father "All Mine are Thine and Thine are Mine." Wherefore also He says that He will appear on the Judgment Day "in the glory of the Father," when He will render to every man according to his works. And by this phrase He shows the unity of nature that subsists between them. For as "there is one glory of the sun and another glory of the moon," because of the difference between the natures of those luminaries (since if both had the same glory there would not be deemed to be any difference in their nature), so He Who foretold of Himself that He would appear in the glory of the Father indicated by the identity of glory their community of nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2.6"
