[[commentary]]
quote='''
The foolish man thinks his own that which never belongs to him, ignorant seemingly in his greed that "the earth is the Lord's, and the fulness thereof," for "God is king of all the earth." It is the passion of having which gives men a false title of lordship over that which can never belong to them. "The earth," says the wise Preacher, "abideth for ever," ministering to every generation, first one, then another, that is born upon it; but men, though they are so little even their own masters, that they are brought into life without knowing it by their Maker's will, and before they wish are withdrawn from it, nevertheless in their excessive vanity think that they are her lords; that they, now born, now dying, rule that which remains continually.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 4"
