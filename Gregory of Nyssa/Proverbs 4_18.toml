[[commentary]]
quote='''
He therefore who keeps away from all bitterness and all the noisome effluvia of the flesh, and raises himself on the aforesaid wings above all low earthly ambitions, or, more than that, above the whole universe itself, will be the man to find that which is alone worth loving, and to become himself as beautiful as the Beauty which he has touched and entered, and to be made bright and luminous himself in the communion of the real Light. We are told by those who have studied the subject, that those gleams which follow each other so fast through the air at night and which some call shooting stars, are nothing but the air itself streaming into the upper regions of the sky under stress of some particular blasts. They say that the fiery track is traced along the sky when those blasts ignite in the ether. In like manner, then, as this air round the earth is forced upwards by some blast and changes into the pure splendour of the ether, so the mind of man leaves this murky miry world, and under the stress of the spirit becomes pure and luminous in contact with the true and supernal Purity; in such an atmosphere it even itself emits light, and is so filled with radiance, that it becomes itself a Light, according to the promise of our Lord that "the righteous should shine forth as the sun."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 11"
