[[commentary]]
quote='''
Now, since it is not mere human wisdom that is claimed for himself by Solomon, who says, "God hath taught me wisdom," and who, where he says "all my words are spoken from God," refers to God all that is spoken by himself, it might be well in this part of the Proverbs to trace out the prophecy that is mingled with his wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25203.html'
source_title="AGAINST EUNOMIUS 3:2"
