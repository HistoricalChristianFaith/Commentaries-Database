[[commentary]]
quote='''
But seeing that Paradise is the home of living spirits, and will not admit those who are dead in sin, and that we on the other hand are fleshly, subject to death, and sold under sin, how is it possible that one who is a subject of death's empire should ever dwell in this land where all is life? What method of release from this jurisdiction can be devised? Here too the Gospel teaching is abundantly sufficient. We hear our Lord saying to Nicodemus, "That which is born of the flesh is flesh; and that which is born of the Spirit is spirit." We know too that the flesh is subject to death because of sin, but the Spirit of God is both incorruptible, and life-giving, and deathless. As at our physical birth there comes into the world with us a potentiality of being again turned to dust, plainly the Spirit also imparts a life-giving potentiality to the children begotten by Himself. What lesson, then, results from these remarks? This: that we should wean ourselves from this life in the flesh, which has an inevitable follower, death; and that we should search for a manner of life which does not bring death in its train.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 13"
