[[commentary]]
quote='''
For, by the arguments wherewith he [Eunomius] endeavours to destroy the truth, he is often himself unwittingly drawn into an advocacy of the very doctrines against which he is contending: Some such thing the history tells us concerning Saul, that once, when moved with wrath against the prophets, he was overcome by grace, and was found as one of the inspired, (the Spirit of prophecy willing, as I suppose, to instruct the apostate by means of himself,) whence the surprising nature of the event became a proverb in his after life, as the history records such an expression by way of wonder, "Is Saul also among the prophets?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25203.html'
source_title="AGAINST EUNOMIUS 3.4"
