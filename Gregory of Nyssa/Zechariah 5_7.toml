[[commentary]]
quote='''
For virtue is a light and buoyant thing, and all who live in her way "fly like clouds," as Isaiah says, "and as doves with their young ones"; but sin is a heavy affair, "sitting," as another of the prophets says, "upon a talent of lead." If, however, this reading of the history appears to any forced and inapplicable, and the miracle at the Red Sea does not present itself to him as written for our profit, let him listen to the Apostle: "Now all these things happened unto them for types, and they are written for our admonition."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="On Virginity 18"
