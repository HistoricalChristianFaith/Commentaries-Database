[[commentary]]
quote='''
So the soul whose life is in God will find her pleasure in no single one of those things which make a beauteous show to deceive her. If she were, in some fit of weakness, to admit the defilement to her heart, she would herself have broken the covenant of her spiritual marriage; and, as the Scripture tells us, "into the malicious soul Wisdom cannot come." It may, in a word, be truly said that the Good Husband cannot come to dwell with the soul that is irascible, or malice-bearing, or harbours any other disposition which jars with that concord. No way has been discovered of harmonizing things whose nature is antagonistic and which have nothing in common.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 15"
