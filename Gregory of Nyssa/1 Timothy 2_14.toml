[[commentary]]
quote='''
And the fact too that this grace was revealed by means of a woman, itself agrees with the interpretation which we have given. For since, as the Apostle tells us, "the woman, being deceived, was in the transgression," and was by her disobedience foremost in the revolt from God, for this cause she is the first witness of the resurrection, that she might retrieve by her faith in the resurrection the overthrow caused by her disobedience, and that as, by making herself at the beginning a minister and advocate to her husband of the counsels of the serpent, she brought into human life the beginning of evil, and its train of consequences, so, by ministering to His disciples the words of Him Who slew the rebel dragon, she might become to men the guide to faith, whereby with good reason the first proclamation of death is annulled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%252012.html'
source_title="AGAINST EUNOMIUS 12.1"
