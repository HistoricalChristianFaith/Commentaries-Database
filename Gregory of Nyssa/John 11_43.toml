[[commentary]]
quote='''
For one is not raised from severe sickness, nor brought back to life when at the last breath—nor is a child just dead brought to life, nor a young man about to be conveyed to the tomb released from his bier; but a man past the prime of life, a corpse, decaying, swollen, yea already in a state of dissolution, so that even his own kinsfolk could not suffer that the Lord should draw near the tomb by reason of the offensiveness of the decayed body there enclosed, brought into life by a single call, confirms the proclamation of the resurrection, that is to say, that expectation of it as universal, which we learn by a particular experience to entertain. For as in the regeneration of the universe the Apostle tells us that "the Lord Himself will descend with a shout, with the voice of the archangel," and by a trumpet sound raise up the dead to incorruption—so now too he who is in the tomb, at the voice of command, shakes off death as if it were a sleep, and ridding himself from the corruption that had come upon his condition of a corpse, leaps forth from the tomb whole and sound, not even hindered in his egress by the bonds of the grave-cloths round his feet and hands.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="ON THE MAKING OF MAN 25.11"
