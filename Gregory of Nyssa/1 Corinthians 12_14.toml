[[commentary]]
quote='''
So is the broad serenity and calm of the soul troubled by one invading passion, and affected by the injury of a single part. They tell us too, those who have investigated the subject, that the virtues are not disunited from each other, and that to grasp the principle of any one virtue will be impossible to one who has not seized that which underlies the rest, and that the man who shows one virtue in his character will necessarily show them all. Therefore, by contraries, the depravation of anything in our moral nature will extend to the whole virtuous life; and in very truth, as the Apostle tells us, the whole is affected by the parts, and "if one member suffer, all the members suffer with it," "if one be honoured, all rejoice."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="On Virginity 15"
