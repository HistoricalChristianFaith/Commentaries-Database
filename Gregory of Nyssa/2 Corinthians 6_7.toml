[[commentary]]
quote='''
But to the higher understanding they are all alike; one is not of greater value than the other; because life runs on to the finish with the same speed through all these opposites, and in the lots of either class there remains the same power of choice to live well or ill, "through armour on the right hand and on the left, through evil report and good report." Therefore the clearseeing mind which measures reality will journey on its path without turning, accomplishing its appointed time from its birth to its exit; it is neither softened by the pleasures nor beaten down by the hardships; but, as is the way with travellers, it keeps advancing always, and takes but little notice of the views presented. It is the travellers way to press on to their journey's end, no matter whether they are passing through meadows and cultivated farms, or through wilder and more rugged spots; a smiling landscape does not detain them; nor a gloomy one check their speed. So, too, that lofty mind will press straight on to its self-imposed end, not turning aside to see anything on the way. It passes through life, but its gaze is fixed on heaven; it is the good steersman directing the bark to some landmark there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="On Virginity 4"

