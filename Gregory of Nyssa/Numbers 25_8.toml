[[commentary]]
quote='''
But when we are aware of his attacks, we ought to repeat to ourselves the apostolic words, "As many of us as were baptized into Christ were baptized into His death." Now if we have been conformed to His death, sin henceforth in us is surely a corpse, pierced through by the javelin of Baptism, as that fornicator was thrust through by the zealous Phinehas. Flee therefore from us, ill-omened one! for it is a corpse thou seekest to despoil, one long ago joined to thee, one who long since lost his senses for pleasures. A corpse is not enamoured of bodies, a corpse is not captivated by wealth, a corpse slanders not, a corpse lies not, snatches not at what is not its own, reviles not those who encounter it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Baptism%2520of%2520Christ.html'
source_title="ON THE BAPTISM OF CHRIST"
