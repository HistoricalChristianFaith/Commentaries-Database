[[commentary]]
quote='''
Do we romance about three Resurrections? Do we promise the gluttony of the Millennium? Do we declare that the Jewish animal-sacrifices shall be restored? Do we lower men's hopes again to the Jerusalem below, imagining its rebuilding with stones of a more brilliant material?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FLetters%2FLetter%252017%2520To%2520Eustathia%252C%2520Ambrosia%252C%2520and%2520Basilissa.html'
source_title="Letter 17, To Eustathia, Ambrosia, and Basilissa"

