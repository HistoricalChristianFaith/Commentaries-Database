[[commentary]]
quote='''
For the prophet says in the person of the Father, "My Hand made all these things," meaning by "Hand," in his dark saying, the power of the Only-begotten. Now the Apostle says that all things are of the Father, and that all things are by the Son, and the prophetic spirit in a way agrees with the Apostolic teaching, which itself also is given through the Spirit. For in the one passage, the prophet, when he says that all things are the work of the Hand of Him Who is over all, sets forth the nature of those things which have come into being in its relation to Him Who made them, while He Who made them is God over all, Who has the Hand, and by It makes all things. And again, in the other passage, the Apostle makes the same division of entities, making all things depend upon their productive cause, yet not reckoning in the number of "all things" that which produces them: so that we are hereby taught the difference of nature between the created and the uncreated, and it is shown that, in its own nature, that which makes is one thing and that which is produced is another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25207.html'
source_title="AGAINST EUNOMIUS 7:1"
