[[commentary]]
quote='''
Now if any one should ask for some interpretation, and description, and explanation of the Divine essence, we are not going to deny that this kind of wisdom we are unlearned, acknowledging only so much as this, that it is not possible that which is by nature infinite should be comprehended in any conception expressed by words. The fact that the Divine greatness has no limit is proclaimed by prophecy, which declares expressly that of His splendour, His glory, His holiness, "there is no end:" and if His surroundings have no limit, much more is He Himself in His essence, whatever it may be, comprehended by no limitation in any way. If then interpretation by way of words and names implies by its meaning some sort of comprehension of the subject, and if, on the other hand, that which is unlimited cannot be comprehended, no one could reasonably blame us for ignorance, if we are not bold in respect of what none should venture upon. For by what name can I describe the incomprehensible? by what speech can I declare the unspeakable? Accordingly, since the Deity is too excellent and lofty to be expressed in words, we have learnt to honour in silence what transcends speech and thought: and if he who "thinketh more highly than he ought to think," tramples upon this cautious speech of ours making a jest of our ignorance of things incomprehensible, and recognizes a difference of unlikeness in that which is without figure, or limit, or size, or quantity (I mean in the Father, the Son, and the Holy Spirit), and brings forward to reproach our ignorance that phrase which is continually alleged by the disciples of deceit, "'Ye worship ye know not what,' if ye know not the essence of that which ye worship," we shall follow the advice of the prophet, and not fear the reproach of fools, nor be led by their reviling to talk boldly of things unspeakable, making that unpractised speaker Paul our teacher in the mysteries that transcend knowledge, who is so far from thinking that the Divine nature is within the reach of human perception, that he calls even the judgments of God "unsearchable," and His ways "past finding out," and affirms that the things promised to them that love Him, for their good deeds done in this life, are above comprehension so that it is not possible to behold them with the eye, nor to receive them by hearing, nor to contain them in the heart.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25203.html'
source_title="AGAINST EUNOMIUS 3:5"


[[commentary]]
quote='''
For it is allowable instead of speaking of Him as "Ungenerate," to call Him the "First Cause" or "Father of the Only-begotten," or to speak of Him as "existing without cause," and many such appellations which lead to the same thought; so that Eunomius confirms our doctrines by the very arguments in which he makes complaint against us, because we know no name significant of the Divine Nature. We are taught the fact of Its existence, while we assert that an appellation of such force as to include the unspeakable and infinite Nature, either does not exist at all, or at any rate is unknown to us. Let him then leave his accustomed language of fable, and show us the names which signify the essences, and then proceed further to divide the subject by the divergence of their names. But so long as the saying of the Scripture is true that Abraham and Moses were not capable of the knowledge of the Name, and that "no man hath seen God at any time," and that "no man hath seen Him, nor can see," and that the light around Him is unapproachable, and "there is no end of His greatness";—so long as we say and believe these things, how like is an argument that promises any comprehension and expression of the infinite Nature, by means of the significance of names; to one who thinks that he can enclose the whole sea in his own hand! for as the hollow of one's hand is to the whole deep, so is all the power of language in comparison with that Nature which is unspeakable and incomprehensible.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25207.html'
source_title="AGAINST EUNOMIUS 7:4"
