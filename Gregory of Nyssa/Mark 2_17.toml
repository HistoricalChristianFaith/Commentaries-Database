[[commentary]]
quote='''
They who use the knife or cautery to remove certain unnatural excrescences in the body, such as wens or warts, do not bring to the person they are serving a method of healing that is painless, though certainly they apply the knife without any intention of injuring the patient. In like manner whatever material excrescences are hardening on our souls, that have been sensualized by fellowship with the body's affections, are, in the day of the judgment, as it were cut and scraped away by the ineffable wisdom and power of Him Who, as the Gospel says, "healeth those that are sick." For, as He says again, "they that are whole have no need of the physician, but they that are sick." Since, then, there has been inbred in the soul a strong natural tendency to evil, it must suffer, just as the excision of a wart gives a sharp pain to the skin of the body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FThe%2520Great%2520Catechism.html'
source_title="THE GREAT CATECHISM 8"
