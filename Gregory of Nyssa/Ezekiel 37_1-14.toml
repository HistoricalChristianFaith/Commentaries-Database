[[commentary]]
quote='''
For instance, Ezekiel leaps in the spirit of prophecy over all the intervening time, with its vast duration; he stands, by his powers of foresight, in the actual moment of the Resurrection, and, as if he had really gazed on what is still to come, brings it in his description before our eyes. He saw a mighty plain, unfolded to an endless distance before him, and vast heaps of bones upon it flung at random, some this way, some that; and then under an impulse from God these bones began to move and group themselves with their fellows that they once owned, and adhere to the familiar sockets, and then clothe themselves with muscle, flesh, and skin (which was the process called "decorating" in the poetry of the Psalms); a Spirit in fact was giving life and movement to everything that lay there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Soul%2520and%2520the%2520Resurrection.html'
source_title="ON THE SOUL AND THE RESURRECTION"
