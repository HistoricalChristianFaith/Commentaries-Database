[[commentary]]
quote='''
If the Son is in nature unlike the Father, how comes it that the likeness He forms of the different natures is one? for He Who said, "Let us make after our image," and by the plural signification revealed the Holy Trinity, would not, if the archetypes were unlike one another, have mentioned the image in the singular: for it would be impossible that there should be one likeness displayed of things which do not agree with one another: if the natures were different he would assuredly have begun their images also differently, making the appropriate image for each: but since the image is one, while the archetype is not one, who is so far beyond the range of understanding as not to know that the things which are like the same thing, surely resemble one another? Therefore He says (the word, it may be, cutting short this wickedness at the very formation of human life), "Let us make man in our image, after our likeness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="On the Making of Man 6.3"

[[commentary]]
quote='''
This same language was not used for (the creation) of other things. The command was simple when light was created; God said, "let there be light." Heaven was also made without deliberation.… These, though, were before (the creation of) humans. For humans, there was deliberation. He did not say, as he did when creating other things, "Let there be a human." See how worthy you are! Your origins are not in an imperative. Instead, God deliberated about the best way to bring to life a creation worthy of honor.
'''
source_url=''
source_title="ON THE ORIGIN OF MAN"


[[commentary]]
quote='''
If, therefore, Scripture tells us that man was made last, after every animate thing, the lawgiver is doing nothing else than declaring to us the doctrine of the soul, considering that what is perfect comes last, according to a certain necessary sequence in the order of things: for in the rational are included the others also, while in the sensitive there also surely exists the vegetative form, and that again is conceived only in connection with what is material: thus we may suppose that nature makes an ascent as it were by steps-I mean the various properties of life-from the lower to the perfect form.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="On the Making of Man 8.7"


[[commentary]]
quote='''
Scripture informs us that the Deity proceeded by a sort of graduated and ordered advance to the creation of man. After the foundations of the universe were laid, as the history records, man did not appear on the earth at once; but the creation of the brutes preceded his, and the plants preceded them. Thereby Scripture shows that the vital forces blended with the world of matter according to a gradation; first, it infused itself into insensate nature; and in continuation of this advanced into the sentient world; and then ascended to intelligent and rational beings. Accordingly, while all existing things must be either corporeal or spiritual, the former are divided into the animate and inanimate. By animate, I mean possessed of life: and of the things possessed of life, some have it with sensation, the rest have no sensation. Again, of these sentient things, some have reason, the rest have not. Seeing, then, that this life of sensation could not possibly exist apart from the matter which is the subject of it, and the intellectual life could not be embodied, either, without growing in the sentient, on this account the creation of man is related as coming last, as of one who took up into himself every single form of life, both that of plants and that which is seen in brutes. His nourishment and growth he derives from vegetable life; for even in vegetables such processes are to be seen when aliment is being drawn in by their roots and given off in fruit and leaves. His sentient organization he derives from the brute creation. But his faculty of thought and reason is incommunicable, and is a peculiar gift in our nature.… But since it is not possible for this reasoning faculty to exist in the life of the body without existing by means of sensations, and since sensation is already found subsisting in the brute creation, necessarily as it were, by reason of this one condition, our soul has touch with the other things which are knit up with it; and these are all those phenomena within us that we call "passions."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Soul%2520and%2520the%2520Resurrection.html'
source_title="On the Soul and the Resurrection"


[[commentary]]
quote='''
"Let us make man in our image, after our likeness." We possess the one by creation; we acquire the other by free will. In the first structure it is given us to be born in the image of God; by free will there is formed in us the being in the likeness of God.… "Let us make man in our image": Let him possess by creation what is in the image, but let him also become according to the likeness. God has given the power for this. If he had created you also in the likeness, where would your privilege be? Why have you been crowned? And if the Creator had given you everything, how would the kingdom of heaven have opened for you? But it is proper that one part is given you, while the other has been left incomplete: this is so that you might complete it yourself and might be worthy of the reward which comes from God.
'''
source_url=''
source_title="ON THE ORIGIN OF MAN"


[[commentary]]
quote='''
God is in His own nature all that which our mind can conceive of good;-rather, transcending all good that we can conceive or comprehend. He creates man for no other reason than that He is good; and being such, and having this as His reason for entering upon the creation of our nature, He would not exhibit the power of His goodness in an imperfect form, giving our nature some one of the things at His disposal, and grudging it a share in another: but the perfect form of goodness is here to be seen by His both bringing man into being from nothing, and fully supplying him with all good gifts: but since the list of individual good gifts is a long one, it is out of the question to apprehend it numerically. The language of Scripture therefore expresses it concisely by a comprehensive phrase, in saying that man was made "in the image of God": for this is the same as to say that He made human nature participant in all good; for if the Deity is the fulness of good, and this is His image, then the image finds its resemblance to the Archetype in being filled with all good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="On the Making of Man 16.10"


[[commentary]]
quote='''
For the soul immediately shows its royal and exalted character, far removed as it is from the lowliness of private station, in that it owns no lord, and is self-governed, swayed autocratically by its own will; for to whom else does this belong than to a king? And further, besides these facts, the fact that it is the image of that Nature which rules over all means nothing else than this, that our nature was created to be royal from the first. For as, in men's ordinary use, those who make images of princes both mould the figure of their form, and represent along with this the royal rank by the vesture of purple, and even the likeness is commonly spoken of as "a king," so the human nature also, as it was made to rule the rest, was, by its likeness to the King of all, made as it were a living image, partaking with the archetype both in rank and in name, not vested in purple, nor giving indication of its rank by sceptre and diadem (for the archetype itself is not arrayed with these), but instead of the purple robe, clothed in virtue, which is in truth the most royal of all raiment, and in place of the sceptre, leaning on the bliss of immortality, and instead of the royal diadem, decked with the crown of righteousness; so that it is shown to be perfectly like to the beauty of its archetype in all that belongs to the dignity of royalty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="On the Making of Man 4.1"
