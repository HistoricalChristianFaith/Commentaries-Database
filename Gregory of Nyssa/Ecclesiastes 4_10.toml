[[commentary]]
quote='''
Therefore, since most embrace virginity while still young and unformed in understanding, this before anything else should be their employment, to search out a fitting guide and master of this way, lest, in their present ignorance, they should wander from the direct route, and strike out new paths of their own in trackless wilds. "Two are better than one," says the Preacher; but a single one is easily vanquished by the foe who infests the path which leads to God; and verily "woe to him that is alone when he falleth, for he hath not another to help him up." Some ere now in their enthusiasm for the stricter life have shown a dexterous alacrity; but, as if in the very moment of their choice they had already touched perfection, their pride has had a shocking fall, and they have been tripped up from madly deluding themselves into thinking that that to which their own mind inclined them was the true beauty. In this number are those whom Wisdom calls the "slothful ones," who bestrew their "way" with "thorns"; who think it a moral loss to be anxious about keeping the commandments; who erase from their own minds the Apostolic teaching, and instead of eating the bread of their own honest earning fix on that of others, and make their idleness itself into an art of living. From this number, too, come the Dreamers, who put more faith in the illusions of their dreams than in the Gospel teaching, and style their own phantasies "revelations." Hence, too, those who "creep into the houses"; and again others who suppose virtue to consist in savage bearishness, and have never known the fruits of long-suffering and humility of spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="On Virginity, Chapter XXIII"
