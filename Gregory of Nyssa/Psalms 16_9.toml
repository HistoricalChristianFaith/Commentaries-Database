[[commentary]]
quote='''
Yea, the prophet David also, according to the interpretation of the great Peter, said with foresight of Him, "Thou wilt not leave My soul in hell, neither wilt Thou suffer Thine Holy One to see corruption," while the Apostle Peter thus expounds the saying, that "His soul was not left in hell, neither His flesh did see corruption." For His Godhead, alike before taking flesh and in the flesh and after His Passion, is immutably the same, being at all times what It was by nature, and so continuing for ever. But in the suffering of His human nature the Godhead fulfilled the dispensation for our benefit by severing the soul for a season from the body, yet without being Itself separated from either of those elements to which it was once for all united, and by joining again the elements which had been thus parted, so as to give to all human nature a beginning and an example which it should follow of the resurrection from the dead, that all the corruptible may put on incorruption, and all the mortal may put on immortality, our first-fruits having been transformed to the Divine nature by its union with God … the Lord, reconciling the world to Himself by the Humanity of Christ, apportioned His work of benevolence to men between His soul and His body, willing through His soul and touching them through His body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2:13"
