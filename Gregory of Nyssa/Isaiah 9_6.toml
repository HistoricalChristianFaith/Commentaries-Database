[[commentary]]
quote='''
For we too say plainly, that the prophet, wishing to make manifest to men the mystery concerning Christ, called the Self-Existent "Angel," that the meaning of the words might not be referred to the Father, as it would have been if the title of "Existent" alone had been found throughout the discourse. But just as our word is the revealer and messenger (or "angel") of the movements of the mind, even so we affirm that the true Word that was in the beginning, when He announces the will of His own Father, is styled "Angel" (or "Messenger"), a title given to Him on account of the operation of conveying the message. And as the sublime John, having previously called Him "Word," so introduces the further truth that the Word was God, that our thoughts might not at once turn to the Father, as they would have done if the title of God had been put first, so too does the mighty Moses, after first calling Him "Angel," teach us in the words that follow that He is none other than the Self-Existent Himself, that the mystery concerning the Christ might be foreshown, by the Scripture assuring us by the name "Angel," that the Word is the interpreter of the Father's will, and, by the title of the "Self-Existent," of the closeness of relation subsisting between the Son and the Father. And if he should bring forward Isaiah also as calling Him "the Angel of mighty counsel," not even so will he overthrow our argument. For there, in clear and uncontrovertible terms, there is indicated by the prophecy the dispensation of His Humanity; for "unto us," he says, "a Child is born, unto us a Son is given, and the government shall be upon His shoulder, and His name is called the Angel of mighty counsel." And it is with an eye to this, I suppose, that David describes the establishment of His kingdom, not as though He were not a King, but in the view that the humiliation to the estate of a servant to which the Lord submitted by way of dispensation, was taken up and absorbed into the majesty of His Kingdom. For he says, "I was established King by Him on His holy hill of Sion, declaring the ordinance of the Lord." Accordingly, He Who through Himself reveals the goodness of the Father is called "Angel" and "Word," "Seal" and "Image," and all similar titles with the same intention. For as the "Angel" (or "Messenger") gives information from some one, even so the Word reveals the thought within, the Seal shows by Its own stamp the original mould, and the Image by Itself interprets the beauty of that whereof It is the image, so that in their signification all these terms are equivalent to one another. For this reason the title "Angel" is placed before that of the "Self-Existent," the Son being termed "Angel" as the exponent of His Father's will, and the "Existent" as having no name that could possibly give a knowledge of His essence, but transcending all the power of names to express.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%252011.html'
source_title="AGAINST EUNOMIUS 11:3"
