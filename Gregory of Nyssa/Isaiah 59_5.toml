[[commentary]]
quote='''
Of such a kind as this, perhaps, is that of which the prophet says, touching the ungodly, "They weave a spider's web." For as in the cobweb there is the appearance of something woven, but no substantiality in the appearance,—for he who touches it touches nothing substantial, as the spider's threads break with the touch of a finger,—just such is the unsubstantial texture of idle phrases. "Not dividing His own essence by begetting and being at once begetter and begotten." Ought we to give his words the name of argument, or to call them rather a swelling of humours secreted by some dropsical inflation? … Who is so distracted, who is so demented, as to make the statement against which Eunomius thinks he is doing battle? For the Church believes that the true Father is truly Father of His own Son, as the Apostle says, not of a Son alien from Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2:7"
