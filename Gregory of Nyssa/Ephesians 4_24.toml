[[commentary]]
quote='''
The divine apostle more clearly sets before us by his own words when he charges us, "Put ye on the Lord Jesus Christ," and also where (using the same word) he says, "Put on the new man which after God is created." For if the garment of salvation is one, and that is Christ, one cannot say that "the new man, which after God is created," is any other than Christ, but it is clear that he who has "put on Christ" has "put on the new man which after God is created." For actually He alone is properly named "the new man," Who did not appear in the life of man by the known and ordinary ways of nature, but in His case alone creation, in a strange and special form, was instituted anew.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25203.html'
source_title="AGAINST EUNOMIUS 3.1.52"
