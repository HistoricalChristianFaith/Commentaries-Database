[[commentary]]
quote='''
Thou, O Lord, hast freed us from the fear of death. Thou hast made the end of this life the beginning to us of true life. Thou for a season restest our bodies in sleep and awakest them again at the last trump. Thou givest our earth, which Thou hast fashioned with Thy hands, to the earth to keep in safety. One day Thou wilt take again what Thou hast given, transfiguring with immortality and grace our mortal and unsightly remains. … As she said these words she sealed her eyes and mouth and heart with the cross. And gradually her tongue dried up with the fever, she could articulate her words no longer, and her voice died away, and only by the trembling of her lips and the motion of her hands did we recognise that she was praying. Meanwhile evening had come and a lamp was brought in… But when she had finished the thanksgiving, and her hand brought to her face to make the Sign had signified the end of the prayer, she drew a great deep breath and closed her life and her prayer together.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FLife%2520of%2520St.%2520Macrina%2FEnglish%2520Translation.html'
source_title="The Life of St. Macrina"
