[[commentary]]
quote='''
We must, then, examine the words carefully: for we find, if we do so, that that which was made "in the image" is one thing, and that which is now manifested in wretchedness is another. "God created man," it says; "in the image of God created He him." There is an end of the creation of that which was made "in the image": then it makes a resumption of the account of creation, and says, "male and female created He them." I presume that every one knows that this is a departure from the Prototype: for "in Christ Jesus," as the apostle says, "there is neither male nor female." Yet the phrase declares that man is thus divided. Thus the creation of our nature is in a sense twofold: one made like to God, one divided according to this distinction: for something like this the passage darkly conveys by its arrangement, where it first says, "God created man, in the image of God created He him," and then, adding to what has been said, "male and female created He them,"—a thing which is alien from our conceptions of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="ON THE MAKING OF MAN 16"


[[commentary]]
quote='''
I think that by these words Holy Scripture conveys to us a great and lofty doctrine; and the doctrine is this. While two natures—the Divine and incorporeal nature, and the irrational life of brutes—are separated from each other as extremes, human nature is the mean between them: for in the compound nature of man we may behold a part of each of the natures I have mentioned,—of the Divine, the rational and intelligent element, which does not admit the distinction of male and female; of the irrational, our bodily form and structure, divided into male and female: for each of these elements is certainly to be found in all that partakes of human life. That the intellectual element, however, precedes the other, we learn as from one who gives in order an account of the making of man; and we learn also that his community and kindred with the irrational is for man a provision for reproduction. For he says first that "God created man in the image of God" (showing by these words, as the Apostle says, that in such a being there is no male or female): then he adds the peculiar attributes of human nature, "male and female created He them."… For this reason, I say, He formed for our nature that contrivance for increase which befits those who had fallen into sin, implanting in mankind, instead of the angelic majesty of nature, that animal and irrational mode by which they now succeed one another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="ON THE MAKING OF MAN 16.7-9; 17.4"
