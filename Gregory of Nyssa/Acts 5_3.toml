[[commentary]]
quote='''
For Ananias became a thief of his own goods, secretly, as he thought, from all men, and concealing his sin: but the Holy Spirit at the same moment was in Peter, and detected his intent, dragged down as it was to avarice, and gave to Peter from Himself the power of seeing the secret, while it is clear that He could not have done this had He not been able to behold hidden things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520%2522Not%2520Three%2520Gods%2522.html'
source_title="On 'Not Three Gods'"


[[commentary]]
quote='''
And of the Holy Spirit also, Peter says to Ananias, "Why hath Satan filled thine heart, to lie to the Holy Ghost?" showing that the Holy Spirit was a true witness, aware of what Ananias had dared to do in secret, and by Whom the manifestation of the secret was made to Peter. For Ananias became a thief of his own goods, secretly, as he thought, from all men, and concealing his sin: but the Holy Spirit at the same moment was in Peter, and detected his intent, dragged down as it was to avarice, and gave to Peter from Himself the power of seeing the secret, while it is clear that He could not have done this had He not been able to behold hidden things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520%2522Not%2520Three%2520Gods%2522.html'
source_title="On 'Not Three Gods'"
