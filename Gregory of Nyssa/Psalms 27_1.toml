[[commentary]]
quote='''
Next he says, "Lightening souls with the light of knowledge." This grace also the doctrine of godliness ascribes alike to the Father, to the Son, and to the Holy Ghost. For He is called a light by David, and from thence the light of knowledge shines in them who are enlightened.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2:15"
