[[commentary]]
quote='''
Basil, great amongst the saints, had departed from this life to God; and the impulse to mourn for him was shared by all the churches. But his sister the Teacher was still living; and so I journeyed to her, yearning for an interchange of sympathy over the loss of her brother. My soul was right sorrow-stricken by this grievous blow, and I sought for one who could feel it equally, to mingle my tears with. But when we were in each other's presence the sight of the Teacher awakened all my pain; for she too was lying in a state of prostration even unto death. Well, she gave in to me for a little while, like a skilful driver, in the ungovernable violence of my grief; and then she tried to check me by speaking, and to correct with the curb of her reasonings the disorder of my soul. She [Macrina] quoted the Apostle's words about the duty of not being "grieved for them that sleep"; because only "men without hope" have such feelings. With a heart still fermenting with my pain, I asked—How can that ever be practised by mankind? There is such an instinctive and deep-seated abhorrence of death in all! Those who look on a death-bed can hardly bear the sight; and those whom death approaches recoil from him all they can.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Soul%2520and%2520the%2520Resurrection.html'
source_title="ON THE SOUL AND THE RESURRECTION"
