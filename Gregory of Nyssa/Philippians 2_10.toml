[[commentary]]
quote='''
This name has become superior to every name. His divinity is such that it cannot be adequately manifested merely through verbal signs, no matter how exalted they are. As the exalted One comes to be in the lowly, so the lowly One may receive in return the properties of the exalted.
'''
source_url=''
source_title="ANTIRRHETICUS AGAINST APOLLINARIUS"


[[commentary]]
quote='''
He signifies, therefore, by the phrase, the dread appearing of the Judge at the end of the ages, when He is seen no more in the form of a servant, but seated in glory upon the throne of His kingdom, and worshipped by all the angels that are around Him. Therefore He Who once entered into the world, becoming the first-born "from the dead," and "of His brethren," and "of all creation," does not, when He comes again into the world as He that judges the world in righteousness, as the prophecy saith, cast off the name of the first-begotten, which He once received for our sakes; but as at the name of Jesus, which is above every name, every knee bows, so also the company of all the angels worships Him Who comes in the name of the First-begotten, in their rejoicing over the restoration of men, wherewith, by becoming the first-born among us, He restored us again to the grace which we had at the beginning.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25204.html'
source_title="Against Eunomius, Book 4"
