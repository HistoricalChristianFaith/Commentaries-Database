[[commentary]]
quote='''
How can you obey Paul when he exhorts you "to present your body a living sacrifice, holy, acceptable unto God," when you are "conformed to this world," and not transformed by the renewing of your mind, when you are not "walking" in this "newness of life," but still pursuing the routine of "the old man"? How can you be a priest unto God, anointed though you are for this very office, to offer a gift to God; a gift in no way another's, no counterfeited gift from sources outside yourself, but a gift that is really your own, namely, "the inner man," who must be perfect and blameless, as it is required of a lamb to be without spot or blemish? How can you offer this to God, when you do not listen to the law forbidding the unclean to offer sacrifices?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 23"
