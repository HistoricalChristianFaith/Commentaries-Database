[[commentary]]
quote='''
For that which has taken place in Christ's Humanity is a common boon bestowed on mankind generally. For as when we see in Him the weight of the body, which naturally gravitates to earth, ascending through the air into the heavens, we believe according to the words of the Apostle, that we also "shall be caught up in the clouds to meet the Lord in the air," even so, when we hear that the true God and Father has become the God and Father of our First-fruits, we no longer doubt that the same God has become our God and Father too, inasmuch as we have learnt that we shall come to the same place whither Christ has entered for us as our forerunner.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%252012.html'
source_title="AGAINST EUNOMIUS 12.1"
