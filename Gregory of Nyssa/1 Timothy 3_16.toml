[[commentary]]
quote='''
We hold it necessary to honour, even as the Father is honoured, the God Who was manifested by the Cross, and they [the Eunomians] find the Passion a hindrance to glorifying the Only-begotten God equally with the Father that begat Him.… Eunomius makes the suffering of the Cross to be a sign of divergence in essence, in the sense of inferiority, considering, I know not how, the surpassing act of power, by which He was able to perform this, to be an evidence of weakness; failing to perceive the fact that, while nothing which moves according to its own nature is looked upon as surprisingly wonderful, all things that overpass the limitations of their own nature become especially the objects of admiration, and to them every ear is turned, every mind is attentive, in wonder at the marvel. And hence it is that all who preach the word point out the wonderful character of the mystery in this respect,—that "God was manifested in the flesh," that "the Word was made flesh," that "the Light shined in darkness," "the Life tasted death," and all such declarations which the heralds of the faith are wont to make, whereby is increased the marvellous character of Him Who manifested the superabundance of His power by means external to His own nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25205.html'
source_title="AGAINST EUNOMIUS 5.3"
