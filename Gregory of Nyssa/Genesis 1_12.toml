[[commentary]]
quote='''
For, whereas we learn from Scripture in the account of the first Creation, that first the earth brought forth "the green herb" (as the narrative says), and that then from this plant seed was yielded, from which, when it was shed on the ground, the same form of the original plant again sprang up, the Apostle, it is to be observed, declares that this very same thing happens in the Resurrection also; and so we learn from him the fact, not only that our humanity will be then changed into something nobler, but also that what we have therein to expect is nothing else than that which was at the beginning. In the beginning, we see, it was not an ear rising from a grain, but a grain coming from an ear, and, after that, the ear grows round the grain: and so the order indicated in this similitude clearly shows that all that blessed state, which arises for us by means of the Resurrection is only a return to our pristine state of grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Soul%2520and%2520the%2520Resurrection.html'
source_title="On the Soul and the Resurrection"
