[[commentary]]
quote='''
That He did not abide in death, that the wounds which His body had received from the iron of the nails and spear offered no impediment to His rising again, that after His resurrection He showed Himself as He pleased to His disciples, that when He wished to be present with them He was in their midst without being seen, as needing no entrance through open doors, and that He strengthened the disciples by the inspiration of the Holy Ghost, and that He promised to be amongst them, and that no partition wall should intervene between them and Him, and that to the sight He ascended to Heaven while to the mind He was everywhere; all these, and whatever like facts the history of Him comprises, need no assistance from arguments to show that they are signs of deity and of a sublime and supereminent power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FThe%2520Great%2520Catechism.html'
source_title="THE GREAT CATECHISM 32"
