[[commentary]]
quote='''
The Gospel implies that he who undertakes the building of a tower, but spends all his labour upon the foundations without ever reaching the completion, is worthy of ridicule; and what else do we learn from the Parable of the Tower, but to strive to come to the finish of every lofty purpose, accomplishing the work of God in all the multiform structures of His commandments? One stone, indeed, is no more the whole edifice of the Tower, than one commandment kept will raise the soul's perfection to the required height. The foundation must by all means first be laid but over it, as the Apostle says, the edifice of gold and precious gems must be built; for so is the doing of the commandment put by the Prophet who cries, "I have loved Thy commandment above gold and many a precious stone."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 18"

[[commentary]]
quote='''
(lib. de Virg. 17.) For we must be ever pressing onward that we may reach the end of each difficult undertaking by successive increases of the commandments of God, and so to the completion of the divine work. For neither is one stone the whole fabric of the tower, nor does a single command lead to the perfection of the soul. But we must lay the foundation, and according to the Apostle, thereupon must be placed store of gold, silver, and precious stones. (1 Cor. 3:12.) Whence it is added, Lest haply after he hath laid the foundation, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
