[[commentary]]
quote='''
Amidst the details of that melancholy history we should be forced to make mention of ourselves; and if we did anything in those struggles for our religion that redounds to our honour in the telling, Wisdom commands us to leave it to others to tell. "Let another man praise thee, and not thine own mouth;" and it is this very thing that our omniscient friend has not been conscious of in devoting the larger half of his book to self-glorification.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25201.html'
source_title="AGAINST EUNOMIUS 1:12"
