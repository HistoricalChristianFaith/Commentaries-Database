[[commentary]]
quote='''
In fact, the Life of Virginity seems to be an actual representation of the blessedness in the world to come, showing as it does in itself so many signs of the presence of those expected blessings which are reserved for us there. That the truth of this statement may be perceived, we will verify it thus. It is so, first, because a man who has thus died once for all to sin lives for the future to God; he brings forth no more fruit unto death; and having so far as in him lies made an end of this life within him according to the flesh, he awaits thenceforth the expected blessing of the manifestation of the great God, refraining from putting any distance between himself and this coming of God by an intervening posterity: secondly, because he enjoys even in this present life a certain exquisite glory of all the blessed results of our resurrection. For our Lord has announced that the life after our resurrection shall be as that of the angels. Now the peculiarity of the angelic nature is that they are strangers to marriage; therefore the blessing of this promise has been already received by him who has not only mingled his own glory with the halo of the Saints, but also by the stainlessness of his life has so imitated the purity of these incorporeal beings.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="ON VIRGINITY 13"
