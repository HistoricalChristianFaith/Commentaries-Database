[[commentary]]
quote='''
Man consists of these three: as we are taught the like thing by the apostle in what he says to the Ephesians, praying for them that the complete grace of their "body and soul and spirit" may be preserved at the coming of the Lord; using the word "body" for the nutritive part, and denoting the sensitive by the word "soul," and the intellectual by "spirit." Likewise too the Lord instructs the scribe in the Gospel that he should set before every commandment that love to God which is exercised with all the heart and soul and mind: for here also it seems to me that the phrase indicates the same difference, naming the more corporeal existence "heart," the intermediate "soul," and the higher nature, the intellectual and mental faculty, "mind."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="ON THE MAKING OF MAN 8.5"
