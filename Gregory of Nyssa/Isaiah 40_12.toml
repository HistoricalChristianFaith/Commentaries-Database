[[commentary]]
quote='''
Accordingly, when we hear the name "Almighty," our conception is this, that God sustains in being all intelligible things as well as all things of a material nature. For this cause He sitteth upon the circle of the earth, for this cause He holdeth the ends of the earth in His hand, for this cause He "meteth out heaven with the span, and measureth the waters in the hollow of His hand"; for this cause He comprehendeth in Himself all the intelligible creation, that all things may remain in existence controlled by His encompassing power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2:11"
