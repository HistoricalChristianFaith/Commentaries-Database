[[commentary]]
quote='''
And so, too, the word that was spoken to Manoah shows the fact that the Divinity is not comprehensible by the significance of His name, because, when Manoah asks to know His name, that, when the promise has come actually to pass, he may by name glorify his benefactor, He says to him, "Why askest thou this? It also is wonderful"; so that by this we learn that there is one name significant of the Divine Nature—the wonder, namely, that arises unspeakably in our hearts concerning It.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25208.html'
source_title="AGAINST EUNOMIUS 8.1"
