[[commentary]]
quote='''
The tree, then, from which comes this fruit of mixed knowledge, is among those things which are forbidden; and that fruit is combined of opposite qualities, which has the serpent to commend it, it may be for this reason, that the evil is not exposed in its nakedness, itself appearing in its own proper nature—for wickedness would surely fail of its effect were it not decked with some fair colour to entice to the desire of it him whom it deceives—but now the nature of evil is in a manner mixed, keeping destruction like some snare concealed in its depths, and displaying some phantom of good in the deceitfulness of its exterior. The beauty of the substance seems good to those who love money: yet "the love of money is a root of all evil"; and who would plunge into the unsavoury mud of wantonness, were it not that he whom this bait hurries into passion thinks pleasure a thing fair and acceptable?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Making%2520of%2520Man.html'
source_title="On the Making of Man 20.2"
