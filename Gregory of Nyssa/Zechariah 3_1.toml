[[commentary]]
quote='''
For in that passage too, in giving the name of High Priest to Him Who made with His own Blood the priestly propitiation for our sins, he does not by the word "made" declare the first existence of the Only-begotten, but says "made" with the intention of representing that grace which is commonly spoken of in connection with the appointment of priests. For Jesus, the great High Priest (as Zechariah says), Who offered up his own lamb, that is, His own Body, for the sin of the world; Who, by reason of the children that are partakers of flesh and blood, Himself also in like manner took part with them in blood (not in that He was in the beginning, being the Word and God, and being in the form of God, and equal with God, but in that He emptied Himself in the form of the servant, and offered an oblation and sacrifice for us), He, I say, became a High Priest many generations later, after the order of Melchisedech. Surely a reader who has more than a casual acquaintance with the discourse to the Hebrews knows the mystery of this matter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25206.html'
source_title="Against Eunomius, Book 6"
