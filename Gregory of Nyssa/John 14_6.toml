[[commentary]]
quote='''
"God," he says, "Who is without beginning, eternally, without end, alone." Once more "understand, ye simple ones," as Solomon says, "his subtlety," lest haply ye be deceived and fall headlong into the denial of the Godhead of the Only-begotten Son. That is without end which admits not of death and decay: that, likewise, is called everlasting which is not only for a time. That, therefore, which is neither everlasting nor without end is surely seen in the nature which is perishable and mortal. Accordingly he who predicates "unendingness" of the one and only God, and does not include the Son in the assertion of "unendingness" and "eternity," maintains by such a proposition, that He Whom he thus contrasts with the eternal and unending is perishable and temporary. But we, even when we are told that God "only hath immortality," understand by "immortality" the Son. For life is immortality, and the Lord is that life, Who said, "I am the Life." And if He be said to dwell "in the light that no man can approach unto," again we make no difficulty in understanding that the true Light, unapproachable by falsehood, is the Only-begotten, in Whom we learn from the Truth itself that the Father is.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25202.html'
source_title="AGAINST EUNOMIUS 2.4"
