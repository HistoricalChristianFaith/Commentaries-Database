[[commentary]]
quote='''
If, on the other hand, we understand that the operation of the Father, the Son, and the Holy Spirit is one, differing or varying in nothing, the oneness of their nature must needs be inferred from the identity of their operation. The Father, the Son, and the Holy Spirit alike give sanctification, and life, and light, and comfort, and all similar graces. And let no one attribute the power of sanctification in an especial sense to the Spirit, when he hears the Saviour in the Gospel saying to the Father concerning His disciples, "Father, sanctify them in Thy name." So too all the other gifts are wrought in those who are worthy alike by the Father, the Son, and the Holy Spirit: every grace and power, guidance, life, comfort, the change to immortality, the passage to liberty, and every other boon that exists, which descends to us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520the%2520Holy%2520Trinity%252C%2520and%2520of%2520the%2520Godhead%2520of%2520the%2520Holy%2520Spirit.html'
source_title="ON THE HOLY TRINITY"
