[[commentary]]
quote='''
But surely He Who is in the bosom of the Father does not permit us to conceive the bosom of the Father as ever void of Himself. He Who is in the beginning is surely not of the things which come to be in that bosom from without, but being the fulness of all good, He is conceived as being always in the Father, not waiting to arise in Him as the result of creation, so that the Father should not be conceived as at any time void of good, but He Who is conceived as being in the eternity of the Father's Godhead is always in Him, being Power, and Life, and Truth, and Wisdom, and the like. Accordingly the words "created me" do not proceed from the Divine and immortal nature, but from that which was commingled with it in the Incarnation from our created nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FAgainst%2520Eunomius%2FBook%25203.html'
source_title="AGAINST EUNOMIUS 3:1.50"
