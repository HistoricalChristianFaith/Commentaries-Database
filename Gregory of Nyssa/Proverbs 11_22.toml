[[commentary]]
quote='''
The foundation must by all means first be laid but over it, as the Apostle says, the edifice of gold and precious gems must be built; for so is the doing of the commandment put by the Prophet who cries, "I have loved Thy commandment above gold and many a precious stone." Let the virtuous life have for its substructure the love of virginity; but upon this let every result of virtue be reared. If virginity is believed to be a vastly precious thing and to have a divine look (as indeed is the case, as well as men believe of it), yet, if the whole life does not harmonize with this perfect note, and it be marred by the succeeding discord of the soul, this thing becomes but "the jewel of gold in the swine's snout" or "the pearl that is trodden under the swine's feet."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Nyssa%2FOn%2520Virginity.html'
source_title="On Virginity, Chapter XVII"
