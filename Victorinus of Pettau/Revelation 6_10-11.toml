[[commentary]]
quote='''
He who sees all things would have us to know that these saints, therefore-that is, the souls of the slain-are asking for vengeance for their blood, that is, of their body, from those that dwell upon the earth; but because in the last time, moreover, the reward of the saints will be perpetual, and the condemnation of the wicked shall come, it was told them to wait. And for a solace to their body, there were given unto each of them white robes. They received, says he, white robes, that is, the gift of the Holy Spirit.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Victorinus%2520of%2520Pettau%2FCommentary%2520on%2520the%2520Apocalypse%2520of%2520the%2520Blessed%2520John.html"
source_title="Commentary on the Apocalypse of the Blessed John"
