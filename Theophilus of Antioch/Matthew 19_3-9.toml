[[commentary]]
quote='''
And concerning chastity, the holy word teaches us not only not to sin in act, but not even in thought, not even in the heart to think of any evil, nor look on another man's wife with our eyes to lust after her. Solomon, accordingly, who was a king and a prophet, said: "Let thine eyes look right on, and let thine eyelids look straight before thee: make straight paths for your feet." [Proverbs 4:25-26] And the voice of the Gospel teaches still more urgently concerning chastity, saying: "Whosoever looketh on a woman who is not his own wife, to lust after her, hath committed adultery with her already in his heart." [Matthew 5:28] "And he that marrieth," says [the Gospel], "her that is divorced from her husband, committeth adultery; and whosoever putteth away his wife, saving for the cause of fornication, causeth her to commit adultery." [Matthew 5:32] Because Solomon says: "Can a man take fire in his bosom, and his clothes not be burned? Or can one walk upon hot coals, and his feet not be burned? So he that goeth in to a married woman shall not be innocent." [Proverbs 6:27-29]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophilus%2520of%2520Antioch%2FTheophilus%2520to%2520Autolycus%2520Book%25203.html'
source_title="To Autolycus, Book III, Chapter 13"
