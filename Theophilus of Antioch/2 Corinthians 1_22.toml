[[commentary]]
quote='''
Wherefore such men have necessarily lost the wisdom of God, and have not found the truth. If you please, then, study these things carefully, that you may have a compendium and pledge of the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theophilus%2520of%2520Antioch%2FTheophilus%2520to%2520Autolycus%2520Book%25203.html'
source_title="Theophilus to Autolycus, Book III, Chapter XXX.—Why the Greeks Did Not Mention Our Histories"
