[[commentary]]
quote='''
And the holy Scriptures bear witness to the Gospel announcements made by the Apostles and to that made by our Saviour. David says of the Apostles, perhaps also of the evangelists: "The Lord shall give the word to those that preach with great power; the King of the powers of the beloved;" teaching at the same time that it is not skilfully composed discourse, nor the mode of delivery, nor well practised eloquence that produces conviction, but the communication of divine power. Hence also Paul says: "I will know not the word that is puffed up, but the power; for the kingdom of God is not in word but in power." And in another passage: "And my word and my preaching were not persuasive words of wisdom, but in demonstration of the spirit and of power." To this power Simon and Cleophas bear witness when they say: "Was not our heart burning within us by the way, as he opened to us the Scriptures?" And the Apostles, since the quantity of the power is great which God supplies to the speakers, had great power, according to the word of David: "The Lord will give the word to the preachers with great power."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520John%2FBook%25201.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 1:48, 50"


[[commentary]]
quote='''
For the word of God declares that the preaching (although in itself true and most worthy of belief) is not sufficient to reach the human heart, unless a certain power be imparted to the speaker from God, and a grace appear upon his words; and it is only by the divine agency that this takes place in those who speak effectually. The prophet says in the Psalms 67, that "the Lord will give a word with great power to them who preach." If, then, it should be granted with respect to certain points, that the same doctrines are found among the Greeks as in our own Scriptures, yet they do not possess the same power of attracting and disposing the souls of men to follow them. And therefore the disciples of Jesus, men ignorant so far as regards Grecian philosophy, yet traversed many countries of the world, impressing, agreeably to the desire of the Logos, each one of their hearers according to his deserts, so that they received a moral amelioration in proportion to the inclination of their will to accept of that which is good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FAgainst%2520Celsus%2FBook%25206.html'
source_title="AGAINST CELSUS 6:2"
