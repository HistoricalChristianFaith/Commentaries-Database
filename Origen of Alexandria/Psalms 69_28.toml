[[commentary]]
quote='''
Let us see if we cannot conclude in the same way that all the sacred books are one book, but that those outside are the "many books" of the preacher. The proof of this must be drawn from Holy Scripture... Observe, in addition to this, if a proof that the sacred writings are one book, and those of an opposite character many, may not be found in the fact that there is one book of the living from which those who have proved unworthy to be in it are blotted out, as it is written: "Let them be blotted out of the book of the living," while of those who are to undergo the judgment, there are books in the plural, as Daniel says: "The judgment was set, and the books were opened." But Moses also bears witness to the unity of the sacred book, when he says: "If Thou forgive the people their sins, forgive, but if not, then wipe me out of the book which Thou hast written."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520John%2FBook%25205.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 5:7"
