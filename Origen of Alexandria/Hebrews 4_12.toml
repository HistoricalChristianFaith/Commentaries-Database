[[commentary]]
quote='''
The texts of the New Testament, which we have discussed, are things said by Himself about Himself. Isaiah, however, He said that His mouth had been set by His Father as a sharp sword, and that He was hidden under the shadow of His hand, made like to a chosen shaft and kept close in the Father's quiver, called His servant by the God of all things, and Israel, and Light of the Gentiles. The mouth of the Son of God is a sharp sword, for "The word of God is living, and active, and sharper than any two-edged sword, and piercing to the dividing of soul and spirit, of both joints and marrow, and quick to discern the thoughts and intents of the heart." And indeed He came not to bring peace on the earth, that is, to corporeal and sensible things, but a sword, and to cut through, if I may say so, the disastrous friendship of soul and body, so that the soul, committing herself to the spirit which was against the flesh, may enter into friendship with God. Hence, according to the prophetic word, He made His mouth as a sword, as a sharp sword. Can any one behold so many wounded by the divine love, like her in the Song of Songs, who complained that she was wounded: "I am wounded with love," and find the dart that wounded so many souls for the love of God, in any but Him who said, "He hath made Me as a chosen shaft."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520John%2FBook%25201.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 1.229"


[[commentary]]
quote='''
Jesus endured the cross, disregarding the shame, and therefore is seated at the right hand of God. And those who imitate him by disregarding the shame shall sit with him and rule in the heavens with him, who came not to bring peace upon the earth but upon the souls of his followers and to bring a sword upon the earth. Since "the Word of God is living and active, sharper than any two-edged sword, piercing to the division of soul and spirit, of joints and marrow, and discerning the thoughts and intentions of the heart," this word above all now bestows on our souls the prize of that peace which surpasses all understanding, which he left to his apostles. And it brings a sword between the earthly image and the heavenly in order that when he receives our heavenly image we may be made fully heavenly, if we are worthy not to be cut in two.
'''
source_url='https://books.google.com/books/about/Prayer.html?id=GEN3tk5GlfEC'
source_title="EXHORTATION TO MARTYRDOM 37"
