[[commentary]]
quote='''
Because Christ was born of the seed of David, according to the flesh, it is said, A horn of salvation to us in the house of his servant David; as it has also elsewhere been said, A vineyard hath been planted in a horn, (Is. 5:1.) i. e. in Jesus Christ.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Zacharias prophesies two general prophecies, the former concerning Christ and the latter concerning John; and it's evident from the words that the former are about Christ as already present and living among us, and later concerning John. He says, "Blessed be the Lord God of Israel, for he has visited and redeemed his people." It may be that during the three months Mary stayed with him, receiving aid through mysterious power, he gradually came to be filled with the Spirit and to prophesy the things written. For since "Christ came in the flesh from the seed of David and was truly a 'horn of salvation for us in the house of David his servant'", he prophesies these things. And that Christ is the horn is indicated by the prophecy, "A vineyard was produced in a horn." In what horn? This Christ, concerning whom it is said, "He has raised up a horn for us." "He has raised up," he says, "a horn of salvation for us"—Christ—according to the proclamation of his "holy prophets"; for the mystery concerning Christ has been announced by all the prophets...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 10.2"