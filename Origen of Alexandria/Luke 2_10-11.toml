[[commentary]]
quote='''
Why then did the angel not go to Jerusalem, why did he not seek out the scribes and Pharisees, why did he not enter the synagogue of the Jews, but found "shepherds living out in the fields and keeping watch over their flock by night" and announced it to them? Does the word not hint at anything but truly the presenting matter, that the angel came to such ignorant shepherds, and does it signify nothing other than that? But the angel announces Christ to the shepherds of the churches. For they, unless that shepherd comes, cannot well shepherd by themselves; their shepherding is incomplete, unless Christ co-works with them. "For," he says, "we are co-workers with God." And indeed he has appointed "in the church apostles, prophets, teachers, evangelists, shepherds, all for the perfecting of the saints."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="Homilies on Luke"
