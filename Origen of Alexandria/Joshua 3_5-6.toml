[[commentary]]
quote='''
In the spirit of this passage let us also pray that we may receive from God to understand the spiritual meaning of Joshua's passage through Jordan. Of it, also, Paul would have said, "I would not, brethren, have you ignorant, that all our fathers went through Jordan, and were all baptized into Jesus in the spirit and in the river." And Joshua, who succeeded Moses, was a type of Jesus Christ, who succeeds the dispensation through the law, and replaces it by the preaching of the Gospel. And even if those Paul speaks of were baptized in the cloud and in the sea, there is something harsh and salt in their baptism. They are still in fear of their enemies, and crying to the Lord and to Moses, saying, "Because there were no graves in Egypt, hast thou brought us forth to slay us in the wilderness? Why hast thou dealt thus with us, to bring us forth out of Egypt?" But the baptism to Joshua, which takes place in quite sweet and drinkable water, is in many ways superior to that earlier one, religion having by this time grown clearer and assuming a becoming order. For the ark of the covenant of the Lord our God is carried in procession by the priests and levites, the people following the ministers of God, it, also, accepting the law of holiness. For Joshua says to the people, "Sanctify yourselves against tomorrow; the Lord will do wonders among you." And he commands the priests to go before the people with the ark of the covenant, wherein is plainly showed forth the mystery of the Father's economy about the Son, which is highly exalted by Him who gave the Son this office; "That at the name of Jesus every knee should bow, of things in heaven and things on earth and things under the earth, and that every tongue should confess that Jesus Christ is Lord, to the glory of God the Father."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520John%2FBook%25206.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 6.228-30"
