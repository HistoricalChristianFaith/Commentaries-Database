[[commentary]]
quote='''
Having related our Lord's baptism, he next enters upon the generation of the Lord, not bringing it down from the higher to the lower, but beginning with Christ, he carries it up to God Himself. Hence he says, And Jesus Himself began. For when He was baptized, and had Himself undergone the mystery of the second birth, then He is said to have begun, that thou also mightest destroy this first birth and be born in the second.

The Lord descending into the world took upon Him the person of all sinners, and was willing to be born of the stock of Solomon, (as Matthew relates,) whose sins have been written down, and of the rest, many of whom did evil in the sight of God. But when He ascended, and is described as being born a second time in baptism, (as Luke relates,) He is not born through Salomon, but Nathan, who reproves the father for the death of Uriah, and the birth of Solomon.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
And the descent and ascent of the genealogy are not through the same persons. For the one who brings him down with the word brings him down also through sinful women, mentioning only those with faults, but the one genealogizing the baptized does not mention women in his genealogy: Tamar, who unlawfully came together with her father-in-law; Ruth the Moabitess; Rahab, whom we do not even know; and the one of Uriah. For since he came to take the sins of men, and "he who knew no sin, for our sake was made sin" by God, thus descending he took on sinful persons and is born through Solomon, whose sins are recorded, and Rehoboam, whose failings are mentioned in the Kings, and the others of whom many "did evil in the sight of the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 28.2"
