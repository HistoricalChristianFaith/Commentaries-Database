[[commentary]]
quote='''
And He settled there the hungry, and they established a city for habitation, the church. There He sowed fields according to the fallen seed into good and rich land yielding a hundredfold, and planted vineyards. For the vines are the disciples of the Lord, who also bore fruit of birth. And He blessed them and they multiplied greatly. But the Lord, who saves both humans and animals, did not deem the smallest among them to be insignificant; for it is written: "And He did not diminish their cattle."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520John%2FBook%252028.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 28:212-15"
