[[commentary]]
quote='''
Some think that this was an officer of King Herod's; others, that he was one of Cæsar's household, then employed on some commission in Judæa. It is not said that He was a Jew.

His rank appears in the fact of his servants meeting him: And as he was now going down, his servants met him, and told him, saying, Thy son liveth.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
There may be an allusion in the two journeys to the two advents of Christ in the soul, the first supplying a spiritual banquet of wine, the second taking away all remains of weakness and death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
