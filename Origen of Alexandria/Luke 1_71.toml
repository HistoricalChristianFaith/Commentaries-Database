[[commentary]]
quote='''
Let us not suppose that this refers to our bodily enemies, but our ghostly. For the Lord Jesus came mighty in battle (Ps. 24:8) to destroy all our enemies, that He might deliver us from their snares and temptation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"He has raised up," he says, "a horn of salvation for us"—Christ—according to the proclamation of his "holy prophets"; for the mystery concerning Christ has been announced by all the prophets, who has saved "us from our enemies and from the hand of all who hate us", not of perceptible enemies, but of intelligible ones. For Christ the Lord came, "mighty in war," to destroy all our enemies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 10.3"