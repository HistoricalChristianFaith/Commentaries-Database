[[commentary]]
quote='''
All the blessings which Jesus pronounced in His Gospel He confirms by His own example, as having declared, Blessed are the meek; He afterwards sanctions it by saying, Learn of me, for I am meek; and because He had said, Blessed are they that weep, He Himself also wept over the city.

I do not deny then that the former Jerusalem was destroyed because of the wickedness of its inhabitants, but I ask whether the weeping might not perhaps concern this your spiritual Jerusalem. For if a man has sinned after receiving the mysteries of truth, he will be wept over. Moreover, no Gentile is wept over, but he only who was of Jerusalem, and has ceased to be.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
I seek, lest the Lord's weeping comes upon us too. For we are the Jerusalem that is wept over, the more discerning ones. If after the mysteries of truth are revealed to us and the word of salvation preached, we sin, we are wept over. No Gentile is wept over, but this kind of Jerusalem is wept over because her enemies surround her in sin, the opposing forces, and they will barricade her and hem her in and not leave one stone upon another in her; if after a long time of sobriety or practicing another virtue, one is conquered, his building is demolished. "For I will not remember," He says, "his former righteousness; in the sin which he sins, in it I will judge him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILY ON THE GOSPEL OF LUKE 38.1-2"
