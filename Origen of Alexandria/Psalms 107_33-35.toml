[[commentary]]
quote='''
Concerning the allegorical interpretation, it might be said as follows: Jesus once walked openly among the Jews when the word of God through the prophets was with them; for Jesus' bold proclamation was "Thus says the Lord." But now, Jesus no longer walks openly among the Jews, and He has departed from them, and there is no word of God among the Jews. And having departed from them (I mean from the Jews), He went to the region near the desert, about which it is said: "Many are the children of the desolate more than of her who has a husband," and to which it is said: "Rejoice, O barren one who does not give birth; break forth and cry aloud, you who are not in labor." Now, the city near the desert is Ephraim, to which Jesus went, no longer walking openly among the Jews. Ephraim is interpreted as "fruitfulness," being the brother of Manasseh, who is the elder of the "people of forgetfulness." After the people left "in oblivion," the fruitfulness of the nations arose, when God "turned rivers in Israel into desert and the watercourses there into thirst and their fruitful land into brine, due to the wickedness of those who dwelled there." But from among the nations, "He turned the desert into lakes of water, and their dry land into watercourses."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520John%2FBook%252028.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 28:212-15"
