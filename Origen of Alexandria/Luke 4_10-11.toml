[[commentary]]
quote='''
Whence knowest thou, Satan, that those things are written? Hast thou read the Prophets, or the oracles of God? Thou hast read them indeed, but not that thyself mightest be the better for the reading, but that from the mere letter thou mightest slay them who are friends to the letter. (2 Cor. 3:6.) Thou knowest that if thou wert to speak from His other books, thou wouldest not deceive.

But mark how wily he is even in this testimony. For he would fain throw a slur upon the glory of the Saviour, as though He needed the assistance of angels, and would stumble were He not supported by their hands. But this was said not of Christ, but of the saints generally; He needs not the aid of angels, Who is greater than angels. But let this teach thee, Satan, that the angels would stumble did not God sustain them; and thou stumblest, because thou refusest to believe in Jesus Christ the Son of God. But why art thou silent as to what follows, Thou shalt walk upon the asp and the basilisk, (Ps. 91:13.) except that thou art the basilisk, thou art the dragon and the lion?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
See, how wickedly he tempts using the scriptures. He wants to take away the glory of the Lord, as if he needed angelic assistance, as if he were about to stumble if angels did not help him. It was not spoken concerning Christ, nor does the master of the angels need angels. But I say the opposite to you, o devil; if Jesus does not help the angels, they stumble. And you have fallen "from heaven" because you considered yourself self-sufficient and not needing the help of Jesus. But to know that the things written are not spoken concerning Jesus, but are referred to a righteous man, listen. For it is written: "He who dwells in the help of the Most High shall lodge in the shelter of the God of heaven." This applies more to a righteous man than to the Son of God. And again: "A thousand shall fall at your side, and ten thousand at your right hand." This also refers to the righteous man. These words are said in the ninety-first Psalm; but they do not speak about Christ, but about the righteous. For Christ does not fear the midday demon nor the night demon, nor does He need the help of angels, He Himself keeping them unscathed to God; but even if it is said concerning Christ, it skillfully omits the intermediate matter. For it continues: "You shall tread upon the adder and the basilisk, and you shall trample the lion and the dragon." For these things were He Himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 31.4"
