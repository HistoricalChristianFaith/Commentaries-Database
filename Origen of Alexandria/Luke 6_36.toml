[[commentary]]
quote='''
[Scripture] says that man was made in the image of God; and in him are manifestly to be discovered traces of the divine image, not by any appearance of the bodily frame, which is corruptible, but by mental wisdom, by justice, moderation, virtue, wisdom, discipline; in fine, by the whole band of virtues, which are innate in the essence of God, and which may enter into man by diligence and imitation of God; as the Lord also intimates in the Gospel, when He says, "Be ye therefore merciful, as your Father also is merciful; " and, "Be ye perfect, even as your Father also is perfect." From which it is clearly shown that all these virtues are perpetually in God, and that they can never approach to or depart from Him, whereas by men they are acquired only slowly, and one by one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FDe%2520Principiis%2FBook%25204.html'
source_title="ON FIRST PRINCIPLES 4.10"
