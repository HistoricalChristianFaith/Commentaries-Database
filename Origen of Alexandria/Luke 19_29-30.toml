[[commentary]]
quote='''
Bethany is interpreted as "house of obedience", while Bethphage as "jaw bones", a place belonging to priests; for the jaw bones were given to the priests, as it is written in the law. Therefore, where there is obedience and a holy place, there the Lord sends the apostles to untie a "colt tied, on which no man ever sat". Instead of: No rational man ever sat on it, neither Moses' word nor Isaiah's nor any other prophet's. When Christ came, He told the disciples to go and loosen the colt. He told them: "If anyone asks you, why are you untying the colt, you will say that the Lord has need of it." Note, however, that Jesus said: "If anyone asks you," and did not name the Lord, but the Evangelist says that they said, "The Lords of it." Many were the lords of the donkey before being dominated by the Savior, but we know that once one becomes the Lord's, he cannot have many masters; for when a man serves evil, he is a slave of many passions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILY ON THE GOSPEL OF LUKE 37.1"
