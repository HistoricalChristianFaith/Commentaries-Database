[[commentary]]
quote='''
Furthermore, man became in the beginning, as it is written in Genesis, "in the image of God," but later due to his disobedience, he also took on an "earthly" image. Just as a coin bears the image of the ruling king of nations, thus the one doing the works of the "ruler of the world" bears his image. The Savior exhorts to give up and put away this image and to bear the image which was from the beginning created in the likeness of God. Following this, Paul also says, "As we have borne the image of the earthly, let us also bear the image of the heavenly." Therefore, this signifies: "Render unto Caesar the things that are Caesar's, and unto God the things that are God's."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILY ON THE GOSPEL OF LUKE 39.4-6"
