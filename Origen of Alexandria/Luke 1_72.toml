[[commentary]]
quote='''
Let us not suppose that this refers to our bodily enemies, but our ghostly. For the Lord Jesus came mighty in battle (Ps. 24:8) to destroy all our enemies, that He might deliver us from their snares and temptation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
But the phrase "to perform mercy with our fathers" I think this indicates how, perhaps during the coming of Christ, both our fathers Abraham, Isaac, and Jacob, and the whole chorus of his holy prophets and righteous ones enjoyed the mercy of God. For I do not say that they were previously benefited, but were not benefited during the coming of Christ. What do I say about this regarding the fathers? I will rise with the word and say, being convinced by the Scriptures, that during the presence of Christ, not only the things on earth benefited from his coming and his dispensation, but also those in the heavens. For the apostle indeed says, "making peace through the blood of his cross, whether things on earth or things in heaven"; and if he made peace, why do you hesitate to accept that even towards the fathers the visitation occurred during the coming of Christ, and this was what his descent to Hades accomplished, in order to fulfill: "to show mercy with our fathers; to remember the covenant made with Abraham."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 10.3"
