[[commentary]]
quote='''
But our present question may, perhaps, be solved in this way, that as every man is a man of God, simply because God created him, but not every man is called a man of God, but only he who has devoted himself to God, such as Elijah and those who are called men of God in the Scriptures, thus every man might be said in ordinary language to be sent from God, but in the absolute sense no one is to be spoken of in this way who has not entered this life for a divine ministry and in the service of the salvation of mankind. We do not find it said of any one but the saints that he is sent by God. It is said of Isaiah as we showed before; it is also said of Jeremiah, "To whomsoever I shall send thee thou shalt go"; and it is said of Ezekiel, "I send thee to nations that are rebellious and have not believed in Me." The examples, however, do not expressly speak of a mission from the region outside life into life, and as it is a mission into life that we are enquiring about, they may seem to have little bearing on our subject. But there is nothing absurd in our transferring the argument derived from them to our question. They tell us that it is only the saints, and we were speaking of them, whom God is said to send, and in this sense they may be applied to the case of those who are sent into this life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520John%2FBook%25202.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 2:184"
