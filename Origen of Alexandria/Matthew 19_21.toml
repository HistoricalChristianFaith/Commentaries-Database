[[commentary]]
quote='''
One might inquire <consequently>, since he is perfect who has all the virtues and no longer practices <anything> connected to vice, how it is that he might become perfect who sells his own substance and gives it to the poor. For should you present someone having done this, how might he become anger-free as a consequence, if he be easily susceptible to anger? How without grief, and better able to endure all such things which are able <to> evoke grief? How will he be beyond all fear, of that which concerns trials, or of death, or of those things such as are able to bring fear to the as-yet unperfected soul? Will the person who gives away [his] substance in such a fashion, and gives to the poor, be free from all desire? For one might say that the ability to give away all one's substance by itself could produce a certain kind of human suffering from poverty leading one to, on the one hand, repent of having done such a daring thing, and on the other to desire possessions equivalent [to that which was given away]. And if indeed that which is called pleasure, being an irrational impulse of the soul, is a passion, how might one give away all substance and give to the poor at one time, and at the same time be released from being impelled irrationally? Someone may also add a question, as to how one is able by having given away one's substance and given to the poor to become wise <and to receive> the wisdom of God, so as to offer a reason to each one who asks concerning the faith that is in him (cf. 1 Pet 3.15), concerning each of those things which have been believed, and concerning those things spoken in a hidden fashion in the holy Scriptures? Take note that this line of questioning is truly genuine and not easily resolved. For were we to say that someone has become perfect through this [act] alone, even if he be not connected to the things we have outlined [above], we would be confronted by a paradox in saying that someone is at the same time perfect and a sinner (for the irascible man is a sinner, as is the one who grieves the grief of the world, and the one who fears tribulations or death, and <who> desires things that are absent, and <who> irrationally impels the soul to things that are not good as though they were good). At the same time, were we to say that someone, by selling a substance and giving it to the poor, assumes all the virtues even becoming inspired of God, as it were, and puts away all vice from himself, we would be speaking with credulity (if I may speak in a more common manner), but I do not know if truly. Perhaps indeed those who hear this explanation for the difficulty raised will mock us, as though we speak without prudence.

Someone, who keeps to the letter and in no way offers a figurative reading of the [contents] of the passage, might seem <to speak> more prudently, offering a rejoinder in this way, as though credulous, but if the things said are worthy or not of the thoughts according to the passage, indeed you yourself will judge. One may say therefore that, since he who distributes to the poor is assisted by their prayer for his own salvation, receiving for his own lack <of spiritual things> an abundance of spiritual things from those who are lacking bodily things (as the Apostle indicated in the second [letter] to the Corinthians), might it be that someone else could experience the same thing and be assisted greatly by it, with God hearkening unto the prayers of those who have found rest in such poverty—[that] among such people there may perhaps be those who are similar to the Apostles though a little inferior to them, people who are poor in bodily things, as were [the Apostles], but who are wealthy in spiritual things? This person then who accepts poverty in exchange for wealth for the sake of becoming perfect (having been persuaded by the words of Jesus) might be assisted quickly, as indeed the Apostles of Christ [were], so as to become wise in Christ, and courageous, and righteous, and modest, and free of all passion. One who defends such an [interpretation] may say that one need not suppose that this [perfection] happened to him on the same day he sold [his] substance and gave [it] to the poor, but perhaps from that day God's providential care would begin to direct him to such things, what I would call the praiseworthy impassibility and every virtue. Advancing as did Isaac on account of the assistance from God given him in Christ, he will become "greater, until such time as" he has increased "greatly," he may become "exceedingly abundant" in every virtue (cf. Gen 26.13), with every shred of vice having been destroyed from his soul. And the person who would offer this explanation is not constrained to say that the man becomes perfect by this [act] itself, namely that he gave his substance over to the poor, while sinning in other matters.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520Matthew%2FBook%252015.pdf'
source_title="Commentary on the Gospel of Matthew (Book XV), 16-17"

[[commentary]]
quote='''
If every commandment is fulfilled in this one word, Thou shalt love thy neighbour as thyself, and if he is perfect who has fulfilled every command, how is it that the Lord said to the young man, If thou wilt be perfect, when he had declared, All these have I kept from my youth up. Perhaps that he says, Thou shalt love thy neighbour as thyself, was not said by the Lord, but added by some one, for neither Mark nor Luke have given it in this place. Or otherwise; It is written in the Gospela according to the Hebrews, that, when the Lord said, Go, and sell all that thou hast, the rich man began to scratch his head, being displeased with the saying. Then the Lord said unto him, How sayest thou, I have kept the Law, and the Prophets, since it is written in the Law, Thou shalt love thy neighbour as thyself? For how many of thy brethren sons of Abraham, clothed in filth, perish for hunger? Thy house is full of many good things, and nothing goes thereout to them. The Lord then, desiring to convict this rich man, says to him, If thou will be perfect, go and sell all that thou hast, and give to the poor; for so it will be seen if thou dost indeed love thy neighbour as thyself. But if he is perfect who has all the virtues, how does he become perfect who sells all that he has and gives to the poor? For suppose one to have done this, will he thereby become forthwith free from anger, desire, having every virtue, and abandoning all vice? Perhaps wisdom may suggest, that he that has given his goods to the poor, is aided by their prayers, receiving of their spiritual abundance to his want, and is made in this way perfect, though he may have some human passions. Or thus; He that thus exchanged his riches for poverty, in order that he might become perfect, shall have assistance to become wise in Christ, just, chaste also, and devoid of all passion; but not so as that in the moment when he gave up all his goods, he should forthwith become perfect; but only that from that day forward the contemplation of God will begin to bring him to all virtues. Or again, it will pass into a moral exposition, and say, that the possessions of a man are the acts of his mind. Christ then bids a man to sell all his evil possessions, and as it were to give them over to the virtues which should work the same, which were poor in all that is good. For as the peace of the Apostles returns to them again, (Mat. 10:13.) unless there be a son of peace, so all sins return upon their actors, when one will no longer indulge his evil propensities; and thus there can be no doubt that he will straightway become perfect who in this sense sells all his possessions. It is manifest that he that does these things, has treasure in heaven, and is himself become of heaven; and he will have in heaven treasure of God's glory, and riches in all God's wisdom. Such an one will be able to follow Christ, for he has no evil possession to draw him off from so following
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252019.html'
