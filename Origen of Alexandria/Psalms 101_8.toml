[[commentary]]
quote='''
Now if these words in the law, "Thou shalt have dominion over many nations, and no one shall rule over thee," were simply a promise to them of dominion, and if they contain no deeper meaning than this, then it is certain that the people would have had still stronger grounds for despising the promises of the law. Celsus brings forward another passage, although he changes the terms of it, where it is said that the whole earth shall be filled with the Hebrew race; which indeed, according to the testimony of history, did actually happen after the coming of Christ, although rather as a result of God's anger, if I may so say, than of His blessing. As to the promise made to the Jews that they should slay their enemies, it may be answered that any one who examines carefully into the meaning of this passage will find himself unable to interpret it literally. It is sufficient at present to refer to the manner in which in the Psalms the just man is represented as saying, among other things, "Every morning will I destroy the wicked of the land; that I may cut off all workers of iniquity from the city of Jehovah." Judge, then, from the words and spirit of the speaker, whether it is conceivable that, after having in the preceding part of the Psalm, as any one may read for himself, uttered the noblest thoughts and purposes, he should in the sequel, according to the literal rendering of his words, say that in the morning, and at no other period of the day, he would destroy all sinners from the earth, and leave none of them alive, and that he would slay every one in Jerusalem who did iniquity. And there are many similar expressions to be found in the law, as this, for example: "We left not anything alive."

...

If I must now explain how the just man "slays his enemies," and prevails everywhere, it is to be observed that, when he says, "Every morning will I destroy the wicked of the land, that I may cut off all workers of iniquity from the city of Jehovah," by "the land" he means the flesh whose lusts are at enmity with God; and by "the city of Jehovah" he designates his own soul, in which was the temple of God, containing the true idea and conception of God, which makes it to be admired by all who look upon it. As soon, then, as the rays of the Sun of righteousness shine into his soul, feeling strengthened and invigorated by their influence, he sets himself to destroy all the lusts of the flesh, which are called "the wicked of the land," and drives out of that city of the Lord which is in his soul all thoughts which work iniquity, and all suggestions which are opposed to the truth. And in this way also the just give up to destruction all their enemies, which are their vices, so that they do not spare even the children, that is, the early beginnings and promptings of evil. In this sense also we understand the language of the Psalms: "O daughter of Babylon, who art to be destroyed; happy shall he be that rewardeth thee as thou hast served us: happy shall he be that taketh and dasheth thy little ones against the stones." For "the little ones" of Babylon (which signifies confusion) are those troublesome sinful thoughts which arise in the soul; and he who subdues them by striking, as it were, their heads against the firm and solid strength of reason and truth, is the man who "dasheth the little ones against the stones;" and he is therefore truly blessed. God may therefore have commanded men to destroy all their vices utterly, even at their birth, without having enjoined anything contrary to the teaching of Christ; and He may Himself have destroyed before the eyes of those who were "Jews inwardly" all the offspring of evil as His enemies. And, in like manner, those who disobey the law and word of God may well be compared to His enemies led astray by sin; and they may well be said to suffer the same fate as they deserve who have proved traitors to the truth of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FAgainst%2520Celsus%2FBook%25207.html'
source_title="AGAINST CELSUS 7:19, 22"
