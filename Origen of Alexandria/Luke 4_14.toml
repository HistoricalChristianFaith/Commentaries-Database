[[commentary]]
quote='''
But John, who had commenced his Gospel from God, saying, In the beginning was the Word, did not describe the temptation of the Lord, because God can not be tempted, of whom he wrote. But because in the Gospels of Matthew and Luke the human generations are given, and in Mark it is man who is tempted, therefore Matthew, Luke, and Mark have described the temptation of the Lord.

The Lord having overcome the tempter, power was added to Him, i. e. as far as regards the manifestation of it. Hence it is said, And Jesus returned in the power of the Spirit.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
For Christ does not fear the midday demon nor the night demon, nor does He need the help of angels, He Himself keeping them unscathed to God; but even if it is said concerning Christ, it skillfully omits the intermediate matter. For it continues: "You shall tread upon the adder and the basilisk, and you shall trample the lion and the dragon." For these things were He Himself. Since He was about to be tested in the temptation against the devil, the term "spirit" is mentioned twice without any addition; but when He had fought and overcome the three recorded temptations, pay attention to the accuracy of the text, what it says about the spirit, that "Jesus returned in the power of the spirit," and it added "in the power" because of the athlete who had overcome.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 32.1"
