[[commentary]]
quote='''
The design of Judas, also, respecting the betrayal of our Lord and Saviour, did not originate in the wickedness of his mind alone. For Scripture testifies that the "devil had already put it into his heart to betray Him." And therefore Solomon rightly commanded, saying, "Keep thy heart with all diligence." And the Apostle Paul warns us: "Therefore we ought to give the more earnest heed to the things which we have heard, lest perhaps we should let them slip." And when he says, "Neither give place to the devil," he shows by that injunction that it is through certain acts, or a kind of mental slothfulness, that room is made for the devil, so that, if he once enter our heart, he will either gain possession of us, or at least will pollute the soul, if he has not obtained the entire mastery over it, by casting on us his fiery darts; and by these we are sometimes deeply wounded, and sometimes only set on fire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FDe%2520Principiis%2FBook%25203.html'
source_title="ON FIRST PRINCIPLES 3.2.4"
