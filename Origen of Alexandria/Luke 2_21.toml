[[commentary]]
quote='''
As we have died with Him at His death, and risen together with Him at His resurrection, so with Him have we been circumcised, and therefore need not now circumcision in the flesh.

But the name of Jesus, a glorious name and worthy of all honour, a name which is above every other, ought not first to be uttered by men, nor by them be brought into the world. Therefore significantly the Evangelist adds, which was called of the Angel, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"Christ who died," "died to sin," not because He sinned—for "He committed no sin, and no deceit was found in His mouth"—but because He died, so that we who died together with Him, the One who died "to sin," might no longer live "for sin." Therefore it is said: "if we died with Him, we will also live with Him;" just as we died with Him dying then, so we were circumcised with Him circumcised then; and after that circumcision, the administration through the former purification took place. For this reason, we no longer circumcise, because His circumcision has taken place on our behalf: "In whom you were circumcised," says Paul, "with a circumcision made without hands, in the removal of the body of the flesh, in the circumcision of Christ; having been buried with Him in baptism, in which you were also raised up with Him through faith." Therefore, His death also happened on our behalf, as well as the resurrection and the circumcision. The evangelist necessarily noted, saying: "His name was called Jesus, which was named by the angel." For He did not need to be first called by men nor glorified by them, but from those who are superior to human nature (He was named) the name worthy of reverence and honorable and "above every name."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 14.1"


[[commentary]]
quote='''
For it is not by incantations that Christians seem to prevail (over evil spirits), but by the name of Jesus, accompanied by the announcement of the narratives which relate to Him; for the repetition of these has frequently been the means of driving demons out of men, especially when those who repeated them did so in a sound and genuinely believing spirit. Such power, indeed, does the name of Jesus possess over evil spirits, that there have been instances where it was effectual, when it was pronounced even by bad men, which Jesus Himself taught (would be the case), when He said: "Many shall say to Me in that day, In Thy name we have cast out devils, and done many wonderful works." Whether Celsus omitted this from intentional malignity, or from ignorance, I do not know.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FAgainst%2520Celsus%2FBook%25201.html'
source_title="AGAINST CELSUS 1.6"
