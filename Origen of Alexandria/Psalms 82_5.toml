[[commentary]]
quote='''
And again that darkness is brought upon men by their evil deeds, we learn from John himself, when he says in his epistle, "If we say that we have fellowship with Him and walk in darkness, we lie and do not the truth," and again, "He that saith he is in the light, and hateth his brother, is in darkness even until now," and again, "He that hateth his brother is in darkness, and walketh in darkness, and knoweth not whither he goeth, because darkness hath blinded his eyes." Walking in darkness signifies evil conduct, and to hate one's brother, is not that to fall away from that which is properly called knowledge? But he also who is ignorant of divine things walks in darkness, just because of that ignorance; as David says, "They knew not, they understood not, they walk in darkness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520John%2FBook%25202.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 2:161"
