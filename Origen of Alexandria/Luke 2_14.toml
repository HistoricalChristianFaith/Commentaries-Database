[[commentary]]
quote='''
But the attentive reader will ask, How then does the Saviour say, I came not to send peace on the earth, whereas now the Angels' song of His birth is, On earth peace to men? It is answered, that peace is said to be to men of goodwill. For the peace which the Lord does not give on the earth is not the peace of good will.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"


[[commentary]]
quote='''
And the angelic host joins in the hymn saying, "Glory to God in the highest," and, "Peace on earth among men of goodwill," since they had labored to assist people and saw that they could not accomplish the work entrusted to them without the Savior. Through "peace on earth," it is revealed that good things be brought about on earth and in heaven through His visitation. For since God's angels saw men as enemies due to sins, they sought to make them friends and did what they could to heal them, yet they were not healed; seeing Him who would heal, they glorified and said, "Peace on earth." But one may inquire within the text: if the Savior says, "I did not come to bring peace on earth, but a sword," how then do the angels at his birth say, "Peace on earth"? He Himself says elsewhere, "Peace I leave with you." But if it were only written, "Peace on earth," stopping there and the text ended at that point, the question would have a point. Now the addition solves the inquiry, which also follows: "peace on earth" is: "among men of good will." If the Savior says that He does not give "peace on earth," it is not "peace of good will." For He does not deny giving peace, but simply says: "I have not come to bring peace on earth." He did not say "peace of good will;" but the angels spoke these things to the shepherds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="Homilies on Luke"
