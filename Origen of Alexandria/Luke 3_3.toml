[[commentary]]
quote='''
Jordan is the same as descending, for there descends from God a river of healing water. But what parts would John be traversing but the country lying about Jordan, that the penitent sinner might soon arrive at the flowing stream, humbling himself to receive the baptism of repentance. For it is added, preaching the baptism of repentance for the remission of sins.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
The Jordan is interpreted as "descending." Truly, the river of God is a descent, the true water, the saving water. And he preaches "a baptism of repentance for the forgiveness of sins." "For the forgiveness of sins" to whom? To the one who no longer sins; for forgiveness of sins is not given to one who still sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 21.4"

[[commentary]]
quote='''
But he was the forerunner of Christ, "the voice of one crying in the desert," to a soul not at war; and not just then, but even now the first "burning and shining lamp" comes "preaching a baptism of repentance for the forgiveness of sins," then after him comes "the true light," about which the lamp says, "He must increase, but I must decrease." "And he went into all the region around the Jordan." For where else should the baptist go except "into the region around the Jordan," so that if anyone wishes to repent, he can easily find the river?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 21.3"
