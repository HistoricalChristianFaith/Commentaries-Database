[[commentary]]
quote='''
They not only denied the resurrection of the body, but took away the immortality of the soul.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252022.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Now it is not one of the prophets merely who predicted the advent of Christ. But although the Samaritans and Sadducees, who receive the books of Moses alone, would say that there were contained in them predictions regarding Christ, yet certainly not in Jerusalem, which is not even mentioned in the times of Moses, was the prophecy uttered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FAgainst%2520Celsus%2FBook%25201.html'
source_title="Against Celsus, Book 1"
