[[commentary]]
quote='''
If at any time in reading the Scripture you stumble at something which is a fair stone of stumbling, and rock of offence, blame yourself; for you must not despair of finding in this stone of stumbling and rock of offence thoughts to justify the saying, "He that believeth shall not be ashamed." First believe, and thou shalt find beneath what is deemed a stumbling-stone much gain in godliness. For if we really received a commandment to speak no idle word, because we shall give account of it in the day of judgment; and if we must with all our might endeavour to make every word proceeding out of our mouths a working word both in ourselves who speak and in those who hear, must we not conclude that every word spoken through the Prophets was fit for work? and it is no wonder if every word spoken by the Prophets had a work adapted to it. Nay, I suppose that every letter, no matter how strange, which is written in the oracles of God, does its work. And there is not one jot or tittle written in the Scripture, which, when men know how to extract the virtue does not work its own work.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FPhilocalia%2FThe%2520Philocalia%2520of%2520Origen.html'
source_title="FRAGMENTS FROM THE PHILOCALIA 10:1"
