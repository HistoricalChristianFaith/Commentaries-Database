[[commentary]]
quote='''
If we marvel to hear that a woman was healed by touching the hem of a garment, what must we think of Simeon, who received an Infant in his arms, and rejoiced seeing that the little one he carried was He who had come to let loose the captive. Knowing that no one could release him from the chains of the body with the hope of future life, but He whom he held in his arms. Therefore it is said, And he blessed God, saying, Lord, now lettest thou thy servant depart.

As if he said, "As long as I held not Christ, I was in prison, and could not escape from my bonds."
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Being in the prison of the body and seeing that no one releases him from it, so as to be released from the world with hope, or the one whom he held "in his arms," he says: "now you release your servant according to your word." And see the addition, "in peace"; he does not simply wish to be released, but "in peace," according to what was said to Abraham, "you shall be gathered to your fathers in peace." And who is the one released "in peace" except the one who has understood that "God was in Christ reconciling the world to Himself" and no longer having any work of enmity with God, but having taken up all peace through good works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="Homilies on Luke"
