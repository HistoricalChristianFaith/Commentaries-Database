[[commentary]]
quote='''
(in Matt. 26:18.) But I think that the man who meets the disciples as they enter into the city, carrying a pitcher of water, was some servant of a master of a house, carrying water in an earthen vessel either for washing or for drinking. And this I think is Moses conveying the spiritual doctrine in fleshly histories. But they who follow him not, do not celebrate the Passover with Jesus.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
