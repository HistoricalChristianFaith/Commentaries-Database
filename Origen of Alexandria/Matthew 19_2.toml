[[commentary]]
quote='''
Only, when Jesus had finished these words, having spoken them in Galilee about Capernaum, then "He departed thence, and came into the borders of Judaea," which were different from Galilee. But He came to the borders of Judaea, and not to the middle of it, but, as it were, to the outermost parts, where great multitudes followed Him, whom He healed at "the borders of Judaea beyond Jordan,"-where baptism had been given. But you will observe the difference between the crowds who simply followed, and Peter and the others who gave up everything and followed, and Matthew, who arose and followed him; he did not simply follow, but "having arisen; "for "having arisen" is an important addition. There are always those, then, who follow like the great multitudes, who have not arisen that they may follow, nor have given up all that was theirs formerly, but few are they who have arisen and followed, who also, in the regeneration, shall sit on twelve thrones. Only, if one wishes to be healed, let him follow Jesus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520Matthew%2FBook%252014.html'
source_title="Commentary on the Gospel of Matthew (Book XIV), 15"

[[commentary]]
quote='''
The Lord healed the multitudes beyond Jordan, where baptism was given. For all are truly healed from spiritual sickness in baptism; and many follow Christ as did these multitudes, but not rising up as Matthew, who arose and followed the Lord,
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"
