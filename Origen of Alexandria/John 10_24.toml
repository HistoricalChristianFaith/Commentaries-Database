[[commentary]]
quote='''
For it may be observed as a trait of the character of Jesus, that He on all occasions avoided unnecessary talk about Himself; and on that account said, "If I speak of Myself, My witness is not true." And since He avoided unnecessary talk about Himself, and preferred to show by acts rather than words that He was the Christ, the Jews for that reason said to Him, "If Thou art the Christ, tell us plainly."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FAgainst%2520Celsus%2FBook%25201.html'
source_title="AGAINST CELSUS 1.48"
