[[commentary]]
quote='''
But since the Apostle understands the words, "And they twain shall be one flesh," of Christ and the church, we must say that Christ keeping the saying, "What God hath joined together let not man put asunder," did not put away His former wife, so to speak—that is, the former synagogue—for any other cause than that that wife committed fornication, being made an adulteress by the evil one, and along with him plotted against her husband and slew Him, saying, "Away with such a fellow from the earth, crucify Him, crucify Him." It was she therefore who herself revolted, rather than her husband who put her away and dismissed her; wherefore, reproaching her for falling away from him, it says in Isaiah, "Of what kind is the bill of your mother's divorcement, with which I sent her away?" And He who at the beginning created Him "who is in the form of God" after the image, made Him male, and the church female, granting to both oneness after the image. And, for the sake of the church, the Lord—the husband—left the Father whom He saw when He was "in the form of God," left also His mother, as He was the very son of the Jerusalem which is above, and was joined to His wife who had fallen down here, and these two here became one flesh. For because of her, He Himself also became flesh, when "the Word became flesh and dwelt among us," and they are no more two, but now they are one flesh, since it is said to the wife, "Now ye are the body of Christ, and members each in his part;" for the body of Christ is not something apart different from the church, which is His body, and from the members each in his part. And God has joined together these who are not two, but have become one flesh, commanding that men should not separate the church from the Lord. And he who takes heed for himself so as not to be separated, is confident as one who will not possibly be separated and says, "Who shall separate us from the love of Christ?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FCommentary%2520on%2520Matthew%2FBook%252014.html'
source_title="Commentary on Matthew, Book 14"
