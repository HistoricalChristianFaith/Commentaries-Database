[[commentary]]
quote='''
Or else, He here introduces four characters, the adversary, the magistrate, the officer, and the judge. But with Matthew the character of the magistrate is left out, and instead of the officer a servant is introduced. They differ also in that the one has written a farthing, the other a mite, but each has called it the last. Now we say that all men have present with them two angels, a bad one who encourages them to wicked deeds, a good one who persuades all that is best. Now the former, our adversary whenever we sin rejoices, knowing that he has an occasion for exultations and boasting with the prince of the world, who sent him. But in the Greek, "the adversary" is written with the article, to signify that he is one out of many, seeing that each individual is under the ruler of his nation. Give diligence then that you may be delivered from your adversary, or from the ruler to whom the adversary drags you, by having wisdom, justice, fortitude, and temperance. But if you have given diligence, let it be in Him who says, I am the life, (John 14:6.) otherwise the adversary will hale thee to the judge. Now he says, hale, to point out that they are forced unwillingly to condemnation. But I know no other judge but our Lord Jesus Christ who delivers to the officer. Each of us have our own officers; the officers exercise rule over us, if we owe any thing. If I paid every man every thing, I come to the officers and answer with a fearless heart, "I owe them nothing." But if I am a debtor, the officer will cast me into prison, nor will he suffer me to go out from thence until I have paid every debt. For the officer has no power to let me off even a farthing. He who forgave one debtor five hundred pence and another fifty, (Luke 7:41.) was the Lord, but the exactor is not the master, but one appointed by the master to demand the debts. But the last mite he calls slight and small, for our sins are either heavy or slight. Happy then is he who sinneth not, and next in happiness he who has sinned slightly. Even among slight sins there is diversity, otherwise he would not say until he has paid the last mite. For if he owes a little, he shall not come out till he pays the last mite. But he who has been guilty of a great debt, will have endless ages for his payment.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"


[[commentary]]
quote='''
The "ruler" is omitted, but instead of "executor" there is "servant"; however, the "adversary" and the "judge" are kept. "For there are two angels," as the Shepherd says, "with every person, one of justice and one of injustice." Some of the little angels in the church "see the face of the Father in heaven"; but those outside the church are not worthy of this, being served by another. And the ruler, as some have said, is the leader of each nation, such as the kingdom of the Persians or Medes, as Daniel says; and the adversary is one of the angels under them. Note that the "ruler" is without the article as one of many, but "adversary" with the article, and that it has "your"; for the adversaries are not indefinite; each one has his own one accompanying him. "So then," he says, "as you are going with your adversary," who wishes to bring you to his own ruler and separate you from your ruler—so "while you are on the way with your adversary to the ruler," before you go "to the judge," before you become worthy of imprisonment, while you are still on the way, "give effort to be freed" from the adversary or the judge, to whom the adversary is dragging you; this means doing good, being temperate, just, brave, prudent, wise—"for behold, the man and his works are before him"—so that you may be able to "be freed from your adversary"; becoming familiar with him, yet estranged from God, making a covenant with the adversary. Therefore, standing on the way that says, "I am the way," "give effort to be freed." The word "drag you" is good, to show that we are dragged against our will, as if going to condemnation unwillingly. The judge is our Lord Jesus Christ; the executor is the angel appointed to each person; a "little thing" is the smallest sin, and a "quadrant," as Matthew says, is the multitude of sins. Blessed is the one who owes nothing, that is, the one who owes little and is worthy of forgiveness. Therefore, let us do good to be freed from the adversary, so that we may become familiar with our Lord Jesus Christ, to whom be the glory and the power unto the ages of ages.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Origen%2520of%2520Alexandria%2FHomilies%2520on%2520Luke.html'
source_title="HOMILIES ON THE GOSPEL OF LUKE 35"
