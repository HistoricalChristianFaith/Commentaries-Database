[[commentary]]
quote='''
Though little among cities that have dominion, yet art thou not the least, for out of thee shall come the Ruler, who shall rule My people Israel; this Ruler is Christ, who rules and guides His faithful people.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
