[[commentary]]
quote='''
And as the offences are referred to the tares, so the righteous are reckoned among the children of the kingdom; concerning whom it follows, Then the righteous shall shine as the sun in the kingdom of their Father. For in the present world the light of the saints shines before men, but after the consummation of all things, the righteous themselves shall shine as the sun in the kingdom of their Father.

That He says, Then shall they shine, implies that they now shine for an example to others, but they shall then shine as the sun to the praise of God. He that hath ears to hear, let him hear.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
