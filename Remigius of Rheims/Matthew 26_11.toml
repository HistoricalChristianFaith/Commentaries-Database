[[commentary]]
quote='''
For the poor ye have ever with you. The Lord shows in these words as of set purpose, that they were not to be blamed who ministered of their substance to Him while He dwelt in a mortal body; forasmuch as the poor were ever in the Church, to whom the believers might do good whensoever they would, but He would abide in the body with them but a very short time; whence it follows, But me ye shall not have always.

Or, it is to be explained by supposing this spoken to Judas only; and He said not, Ye have not, but Ye shall not have, because this was spoken in the person of Judas to all his followers. And He says, Not always, though they have it at no time, because the wicked seem to have Christ in this present world, while they mix among His members and approach His table, but they shall not always so have Him when He shall say to His elect, Come, ye blessed of my Father. (Matt. 25:34.)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title='Catena Aurea by Aquinas'
