[[commentary]]
quote='''
Whereas the holy Apostles fell upon their faces, that was a proof of their sanctity, for the saints are always described to fall upon their faces, but the wicked to fall backwards.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252017.html'
source_title='Catena Aurea by Aquinas'
