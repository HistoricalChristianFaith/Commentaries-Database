[[commentary]]
quote='''
And he commanded the people to sit down on the ground. In the former feeding they lay down on grass, in this one on the ground. And he took the seven loaves, and gave thanks, and brake. In giving thanks, He has left us an example, that for all gifts conferred on us from heaven we should return thanks to Him. And it is to be remarked, that our Lord did not give the bread to the people, but to His disciples, and the disciples to the people; and gave to his disciples to set before them; and they did set them before the people.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
