[[commentary]]
quote='''
Wonderful infatuation in the Devil! To promise earthly kingdoms to Him who gives heavenly kingdoms to His faithful people, and the glory of earth to Him who is Lord of the glory of heaven!
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
