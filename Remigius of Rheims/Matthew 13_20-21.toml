[[commentary]]
quote='''
It follows, That which is sown upon the rock, is he that heareth the word, &c. For the seed or word of God, which is sown in the rock, that is, in the hard and untamed heart, can bring forth no fruit, inasmuch as its hardness is great, and its desire of heavenly things small; and because of this great hardness, it has no root in itself.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
