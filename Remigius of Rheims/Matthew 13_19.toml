[[commentary]]
quote='''
In these words the Lord explains what the seed is, to wit, the word of the kingdom, that is of the Gospel teaching. For there are some that receive the word of the Lord with no devotion of heart, and so that seed of God's word which is sown in their heart, is by dæmons straightway carried off, as it were the seed dropped by the way side.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
