[[commentary]]
quote='''
By this that the Angel appears always to Joseph in sleep, is mystically signified that they who rest from mundane cares and secular pursuits, deserve angelic visitations.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
