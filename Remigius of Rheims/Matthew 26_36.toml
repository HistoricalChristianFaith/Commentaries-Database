[[commentary]]
quote='''
The Evangelist had said a little above, that when they had sung an hymn they went out to the mount of Olives; to point out the part of the mount to which they took their way, he now adds, Then came Jesus with them to a garden called Gethsemane.

He had accepted the disciples' faith and the devotedness of their will, but He foresaw that they would be troubled and scattered abroad, and therefore bade them sit still in their places; for to sit belongs to one at ease, but they would be grievously troubled that they should have denied Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title='Catena Aurea by Aquinas'
