[[commentary]]
quote='''
It was the custom among this people to embalm the bodies of the dead with divers spices, to the end that they might be kept from corruption as long as possible. And as this woman was desirous of embalming the Lord's dead Body, and would not be able because she would be anticipated by His resurrection, it was therefore arranged by Divine Providence that she should anoint the Lord's living Body. This then is what He says, In that she hath poured, that is, By anointing My living Body she shows forth My death and burial.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title='Catena Aurea by Aquinas'
