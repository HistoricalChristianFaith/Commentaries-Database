[[commentary]]
quote='''
The rolling back of the stone signifies the opening of Christ's sacraments, which were covered by the letter of the Law. For the Law having been writen on stones, is here denoted by the stone.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252028.html'
source_title='Catena Aurea by Aquinas'
