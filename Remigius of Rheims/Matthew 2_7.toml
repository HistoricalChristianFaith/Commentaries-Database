[[commentary]]
quote='''
Diligently enquired; craftily, for he feared they would not return to him, and then he should know how he should do to put the young Child to death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'
