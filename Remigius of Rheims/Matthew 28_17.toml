[[commentary]]
quote='''
This is more fully told by Luke; how when the Lord after the Resurrection appeared to the disciples, in their terror they thought they saw a spirit.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252028.html'
source_title='Catena Aurea by Aquinas'
