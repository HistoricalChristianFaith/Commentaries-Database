[[commentary]]
quote='''
And not only the bread, but the fish also He blessed, and ordered to be set before them. For there comes after, And they had a few small fishes: and he blessed, and commanded to set them also before them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
