[[commentary]]
quote='''
Which may be understood thus; Thou sayest it, and thou sayest what is true; or, Thou hast said this, not I; leaving him room for repentance so long as his villainy was not publicly exposed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title='Catena Aurea by Aquinas'
