[[commentary]]
quote='''
These words prove that the Law gave to such as kept it not only temporal promises, but also life eternal. And because the hearing these things made him thoughtful, He saith unto him, Which?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
