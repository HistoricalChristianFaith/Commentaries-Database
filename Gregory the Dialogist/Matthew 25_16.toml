[[commentary]]
quote='''
But he who had received five talents gained another five, because there are some who, although they do not know how to penetrate internal and mystical things, nevertheless for the sake of their intention toward the heavenly homeland teach right things to those they can from those very external things they have received; and while they guard themselves from the wantonness of the flesh and from the pursuit of earthly things and from the pleasure of visible things, they also restrain others from these by admonishing them. Moreover, it is rightly reported that another five or another two came as profit, because when preaching is expended on both sexes, the talents received are, as it were, doubled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 9'

[[commentary]]
quote='''
(ubi sup.) There are also some who though they cannot pierce to things inward and mystical, yet for their measure of view of their heavenly country they teach rightly such things as they can, what they have gathered from things without, and while they keep themselves from wantonness of the flesh, and from ambition of earthly things, and from the delights of the things that are seen, they restrain others also from the same by their admonitions.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title='Catena Aurea by Aquinas'
