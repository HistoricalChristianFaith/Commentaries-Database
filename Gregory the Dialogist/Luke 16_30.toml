[[commentary]]
quote='''
Hence the rich man also replied: "No, my father; but if someone from the dead goes to them, they will believe." To whom a truthful judgment is immediately spoken: "If they do not hear Moses and the prophets, neither will they believe someone who has risen from the dead," because indeed those who despise the words of the law will fulfill the precepts of the Redeemer, who rose from the dead, with greater difficulty the more subtle they are.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 40'

[[commentary]]
quote='''
(in Hom. 40.) But he who had despised the words of God, supposed that his followers could not hear them. Hence it is added, And he said, Nay, father Abraham, but if one went to them from the dead they would repent. For when he heard the Scriptures he despised them, and thought them fables, and therefore according to what he felt himself, he judged the like of his brethren.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
