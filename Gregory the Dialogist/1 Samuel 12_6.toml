[[commentary]]
quote='''
But he himself further adds, saying: 'The Lord, who made Moses and Aaron, and who brought our fathers out of the land of Egypt, He Himself is witness.'

But it should be noted that when he called the Lord as witness of his innocence, he said that the Lord himself had made Moses and Aaron. What else does this mean, except that he both displayed the height of his virtue, yet did not wish to appear alone at so great a height? As if saying with hidden meaning: "I am not to be admired for such great virtue of soul, because I am not alone in it. I possess contempt for worldly things as a gift of virtue, but I do not hold this with any intention of vain praise; in this regard I perceive others far better and more exalted than myself." And because he affirmed that the Lord himself had made Moses and Aaron, it is as if he were saying: "That I was able to guard so strongly against evil ought to be ascribed to the grace of him who made Moses and Aaron what they were."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2FCommentary%2520on%25201%2520Kings%2FBook%25205.html'
source_title="Commentary on 1 Kings, Book 5, Chapter 2"
