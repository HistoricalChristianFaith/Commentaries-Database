[[commentary]]
quote='''
Do not, I pray thee, in such a question trust to humility only or to gravity, which are often deceived. Better by far is a living dog in this problem than a dead lion. For a living saint may correct what had not been corrected by another who came before him.
'''
append_to_author_name=' (Note: letter is FROM Columbanus TO Gregory)'
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2FRegister%2520of%2520Epistles%2FBook%25209.html'
source_title="Register of Epistles, Book 9"