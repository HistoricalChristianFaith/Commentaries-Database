[[commentary]]
quote='''
(Hom. in Evan. 9) Not only, however, those of us who rule over Churches, but all are required to watch the doors of their hearts, lest the evil suggestions of the devil enter into them, and lest our Lord find us sleeping. Wherefore concluding this parable He adds, Watch ye therefore: for ye know not when the master of the house cometh, at even, or at midnight, or at cockcrow, or in the morning: lest coming suddenly he find you sleeping.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
