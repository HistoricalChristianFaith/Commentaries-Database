[[commentary]]
quote='''
And very often, what is more serious, some people not only reject the grace of him who calls but even persecute it. Hence it is added: "But the rest seized his servants, and after treating them with contempt, killed them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 38'

[[commentary]]
quote='''
Nay often, which is worse, some who are called not only reject the grace, but become persecutors, And the remnant took his servants, and entreated them despitefully, and slew them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
