[[commentary]]
quote='''
But to shake off the sloth of our mind, even external losses are brought forward through a comparison, so that through these the soul may be roused to guard itself. For it is said: "Know this, that if the master of the house knew at what hour the thief was coming, he would certainly watch and would not allow his house to be broken into." For while the master of the house is unaware, the thief breaks into the house, because while the spirit sleeps from guarding itself, unforeseen death coming bursts into the dwelling of our flesh, and slays as if sleeping the one it found as master of the house, because when the spirit fails to foresee the coming losses, death snatches him unknowing to punishment. But he would resist the thief if he were watching, because being on his guard against the coming of the judge who secretly seizes the soul, he would meet him by repenting, lest he perish impenitent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 13'

[[commentary]]
quote='''
(ubi sup.) But to shake off the sloth of our minds, even our external losses are by a similitude set before us. For it is added, And this know, that if the goodman of the house had known what hour the thief would come.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
(Hom. 13. in Ev.) Or else; unknown to the master the thief breaks into the house, because while the spirit sleeps instead of guarding itself, death comes unexpectedly, and breaks into the dwelling place of our flesh. But he would resist the thief if he were watching, because being on his guard against the coming of the Judge, who secretly seizes his soul, he would by repentance go to meet Him, lest he should perish impenitent.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
