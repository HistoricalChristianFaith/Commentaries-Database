[[commentary]]
quote='''
Now it happened that both died. The rich man, who was clothed in purple and fine linen, was buried in hell; but Lazarus was led by angels into Abraham's bosom. What does Abraham's bosom signify but the secret rest of the fathers? Of which the Truth says: "Many will come from the East and the West, and will recline with Abraham and Isaac and Jacob in the kingdom of heaven; but the children of the kingdom will be cast out into outer darkness." For he who is said to have been clothed in purple and fine linen is rightly called a child of the kingdom. He who lifts his eyes from afar to see Lazarus, because while the unfaithful are in the depths through the punishments of their damnation, they behold the faithful above them in rest before the day of the last judgment, whose joys afterward they can in no way contemplate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 40'

[[commentary]]
quote='''
And it came to pass that the beggar died, and was carried by the angels into Abraham's bosom. And the rich man also died, and was buried in hell. This rich man, when placed in his own torment, seeks as a patron the one on whom he was unwilling to have mercy in this life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 40'

[[commentary]]
quote='''
(in Hom. 40.) When the two men were below on earth, that is, the poor and the rich, there was one above who saw into their hearts, and by trials exercised the poor man to glory, by endurance awaited the rich man to punishment. Hence it follows, The rich man also died.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
The rich man was buried in hell, but Lazarus was carried by angels into Abraham's bosom, that is, into that secret rest of which the truth says, Many shall come from the east and the west, and shall lie down with Abraham, Isaac, and Jacob in the kingdom of heaven, but the children of the kingdom shall be cast into outer darkness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
