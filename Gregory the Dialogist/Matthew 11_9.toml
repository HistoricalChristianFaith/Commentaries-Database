[[commentary]]
quote='''
But what went you out into the desert to see? A prophet? Yes, I say to you, and more than a prophet. For the office of a prophet is to foretell things to come, not also to show them. John therefore is more than a prophet, because the one whom he had prophesied by going before, he also pointed out by showing. But since he is denied to be a reed shaken by the wind, since he is said not to be clothed in soft garments, since the name of prophet is declared to be inadequate for him, let us now hear what may worthily be said of him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 6'

[[commentary]]
quote='''
(Hom. in Ev. vi. 5.) The office of a prophet is to foretel things to come, not to show them present. John therefore is more than a prophet, because Him whom he had foretold by going before Him, the same he showed as present by pointing Him out.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
