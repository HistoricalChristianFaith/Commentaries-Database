[[commentary]]
quote='''
"So you also, when you see these things happening, know that the kingdom of God is near." As if He openly said: Just as the approaching summer is known from the fruit of trees, so from the ruin of the world it is recognized that the kingdom of God is near. By these words it is certainly shown that the fruit of the world is ruin. For it grows in order to fall. It sprouts forth in order to consume with disasters whatever it has sprouted. But the kingdom of God is rightly compared to summer, because then the clouds of our sorrow pass away, and the days of life shine bright with the radiance of the eternal sun.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 1'

[[commentary]]
quote='''
(ut sup.) That the world ought to be trampled upon and despised, He proves by a wise comparison, adding, Behold the fig tree and all the trees, when they now put forth fruit, ye know that summer is near. As if He says, As from the fruit of the tree the summer is perceived to be near, so from the fall of the world the kingdom of God is known to be at hand. Hereby is it manifested that the world's fall is our fruit. For hereunto it puts forth buds, that whomsoever it has fostered in the bud it may consume in slaughter. But well is the kingdom of God compared to summer; for then the clouds of our sorrow flee away, and the days of life brighten up under the clear light of the Eternal Sun.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
