[[commentary]]
quote='''
But to shake off the sloth of our mind, even external losses are brought forward through a comparison, so that through these the soul may be roused to guard itself. For it is said: "Know this, that if the master of the house knew at what hour the thief was coming, he would certainly watch and would not allow his house to be broken into." For while the master of the house is unaware, the thief breaks into the house, because while the spirit sleeps from guarding itself, unforeseen death coming bursts into the dwelling of our flesh, and slays as if sleeping the one it found as master of the house, because when the spirit fails to foresee the coming losses, death snatches him unknowing to punishment. But he would resist the thief if he were watching, because being on guard against the coming of the judge who secretly seizes the soul, he would meet him by repenting, lest he perish impenitent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 13'

[[commentary]]
quote='''
(Hom. in Ev. xiii. 5.) Or, the thief breaks into the house through the neglect of the master of the house, when the spirit has slept upon its post of guard, and death has come in unawares into the dwelling house of our flesh, and finding the lord of the house sleeping, slays him; that is, the spirit, little providing for coming evils, is taken off unprepared, to punishment, by death. But if he had watched he would have been secure from the thief; that is, looking forward to the coming of the Judge, who takes our lives unawares, he would meet Him with penitence, and not perish impenitent.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
