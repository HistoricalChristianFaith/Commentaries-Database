[[commentary]]
quote='''
(Hom. 35. in Evang.) Or, for a testimony, that is, against those who by persecuting you bring death upon themselves, or living do not imitate you, or themselves becoming hardened perish without excuse, from whom the elect take example that they may live. But as hearing so many terrible things the hearts of men may be troubled, He therefore adds for their consolation, Settle it therefore in your hearts, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
