[[commentary]]
quote='''
(Hom. in Evan. 9) For the earth is properly the place for the flesh, which was as it were carried away to a far country, when it was placed by our Redeemer in the heavens. And he gave his servants power over every work, when, by giving to His faithful ones the grace of the Holy Ghost, He gave them the power of serving every good work. He has also ordered the porter to watch, because He commanded the order of pastors to have a care over the Church committed to them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
