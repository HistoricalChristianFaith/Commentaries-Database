[[commentary]]
quote='''
But because the things foretold concerning the affliction of death are harsh, consolation is immediately added concerning the joy of the resurrection, when it is said: "Not a hair of your head shall perish." We know, brothers, that flesh when cut feels pain, but hair when cut does not feel pain. Therefore He says to His martyrs: "Not a hair of your head shall perish," clearly saying: Why do you fear that what feels pain when cut may perish, when even that which does not feel pain when cut cannot perish in you?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 35'

[[commentary]]
quote='''
(Hom. 35. in Evang.) But because of the hard things foretold concerning the affliction of death, there immediately follows a consolation, concerning the joy of the resurrection, when it is said, But there shall not an hair of your head perish. As though He said to the martyrs, Why fear ye for the perishing of that which when cut, pains, when that can not perish in you, which when cut gives no pain?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
