[[commentary]]
quote='''
What then is designated by John except the Synagogue, what by Peter except the Church? Nor should it seem strange that the Synagogue is said to be signified by the younger and the Church by the elder, because even if the Synagogue is prior to the Church of the Gentiles in the worship of God, nevertheless the multitude of the Gentiles is prior to the Synagogue in the practice of the world, as Paul attests when he says: "Because what is spiritual is not first, but what is natural." Therefore by the elder Peter is signified the Church of the Gentiles, but by the younger John the Synagogue of the Jews. Both ran together, because from the time of its origin until its setting, the Gentile world ran with the Synagogue by a common and equal path, even if not with a common and equal understanding.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 22'

[[commentary]]
quote='''
But this account of the Evangelist must not be thought to be without some mystical meaning. By John, the younger of the two, the synagogue; by Peter, the elder, the Gentile Church is represented: for though the synagogue was before the Gentile Church as regards the worship of God, as regards time the Gentile world was before the synagogue. They ran together, because the Gentile world ran side by side with the synagogue from first to last, in respect of purity and community of life, though a purity and community of understanding they had not.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
