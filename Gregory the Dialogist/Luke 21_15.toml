[[commentary]]
quote='''
"For I will give you a mouth and wisdom, which all your adversaries will not be able to resist or contradict." As if He openly says to His weakening members: Do not be terrified, do not be afraid; you approach the contest, but I fight; you utter the words, but I am the one who speaks.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 35'

[[commentary]]
quote='''
(Hom. 35. in Evang.) As if the Lord said to His disciples, "Be not afraid, go forward to the battle, it is I that fight; you utter the words, I am He that speaketh."
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
