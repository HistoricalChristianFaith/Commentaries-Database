[[commentary]]
quote='''
When wicked pastors are in charge, their principal aim is the plundering of their subjects. For because they know not how to look upon the abundance of eternal goods, the more ardently they desire present things, the more greedily they receive what is offered, and what is not offered they seize by violence. They lay snares for the innocent, oppress the weak, accept bribes, and pervert justice. Concerning these pastors, the Lord reproaches Judea through the prophet, saying: "Your pastors are evening wolves, leaving nothing for the morning" (Zeph. 3:3). He likewise strikes the slanderers of the innocent and the oppressors of the weak, saying: "If anyone does not put something into their mouths, they declare holy war against him. Therefore night shall be to them instead of vision, and darkness instead of divination" (Mic. 3:5–6). For while they recognize the iniquity they commit, through the audacity of their most wicked work they fall into blindness of heart, so that through love of present things they no longer see the light of truth, by which they might recover from their wickedness. Likewise Isaiah rebukes the acceptance of bribes, saying: "They all love bribes, they pursue rewards" (Isa. 1:23). The holy man therefore, while he shows the simplicity of his innocence, appeared exalted by the height of his merits. This commendation of virtue is indeed shown in him alone, so that the same conformity of goodness may be shown to all chosen teachers.

But he who so peacefully leaves the summit of office shows what kind of man he was while he remained at that same height. For because he did not practice the violence of plunder, he says: 'Speak concerning me before the Lord and before His Christ, whether I have taken anyone's ox or donkey.' Likewise, because he sought no occasion of harming anyone, he added, saying: 'If I have falsely accused anyone.' Likewise, because he was not burdensome to the weak, he says: 'If I have oppressed anyone.' Likewise, because from his prelacy he sought not earthly things but heavenly, he says: 'If I have received a gift from anyone's hand, I will despise it today and restore it to you.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2FCommentary%2520on%25201%2520Kings%2FBook%25205.html'
source_title="Commentary on 1 Kings, Book 5, Chapter 2"
