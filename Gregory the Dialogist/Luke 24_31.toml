[[commentary]]
quote='''
Therefore, by hearing the precepts of God they were not enlightened; by doing them they were enlightened, because it is written: "Not the hearers of the law are just before God, but the doers of the law shall be justified." Whoever therefore wishes to understand what he has heard, let him hasten to fulfill in deed those things which he has already been able to understand. Behold, the Lord was not recognized while He was speaking, and He deigned to be recognized while He was being fed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 23'

[[commentary]]
quote='''
(ut sup.) And their eyes were opened, and they knew him.

(ut sup.) Whoever then wishes to understand what he has heard, let him hasten to fulfil in work what he can now understand. Behold the Lord was not known when He was speaking, and He vouchsafed to be known when He is eating. It follows, And he vanished out of their sight.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
