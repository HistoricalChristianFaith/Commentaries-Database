[[commentary]]
quote='''
A general statement is also immediately added, in which it is said: "For to everyone who has, it shall be given, and he shall abound; but from him who has not, even what he seems to have shall be taken away from him." For to him who has it shall be given, and he shall abound, because whoever has charity also receives other gifts. Whoever does not have charity loses even the gifts he seemed to have received. Therefore it is necessary, my brothers, that in everything you do, you watch over the keeping of charity. True charity is to love a friend in God, and to love an enemy for the sake of God. Whoever does not have this loses every good thing he has, is deprived of the talent he had received, and according to the Lord's sentence is cast into the outer darkness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 9'

[[commentary]]
quote='''
(Hom. in Ev. ix. 6.) Then follows a general sentence, For to every one that hath shall be given, and he shall have abundance, but from him that hath not, even that which he seemeth to have shall be taken away. For whosoever has charity receives the other gifts also; but whosoever has not charity loses even the gifts which he seemed to have had.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
(ubi sup.) Or, Whoso has not charity, loses even those things which he seems to have received.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title='Catena Aurea by Aquinas'
