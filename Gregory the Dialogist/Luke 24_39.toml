[[commentary]]
quote='''
(Mor. 14. c. 55.) For in that glory of the resurrection our body will not be incapable of handling, and more subtle than the winds and the air, (as Eutychius said,) but while it is subtle indeed through the effect of spiritual power, it will be also capable of handling through the power of nature.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
