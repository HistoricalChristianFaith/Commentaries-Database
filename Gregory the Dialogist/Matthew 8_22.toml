[[commentary]]
quote='''
He sees and follows who puts into practice the good that he understands. But he sees and does not follow who indeed understands the good, but disdains to do good works. If therefore, dearest brothers, we now recognize the blindness of our pilgrimage, if by believing in the mystery of our Redeemer we sit by the wayside, if by praying daily we seek light from our Creator, if having been illuminated after our blindness we now see that same light through understanding, let us follow in our works the Jesus whom we perceive in our mind. Let us observe where he walks, and by imitating hold to his footsteps. For he follows Jesus who imitates him. For this reason he says: "Follow me, and let the dead bury their dead." For "follow" means "imitate." Again he admonishes on this point, saying: "If anyone serves me, let him follow me." Let us therefore consider where he walks, that we may deserve to follow. Behold, though he is Lord and Creator of the angels, about to take up our nature which he created, he came into the womb of the Virgin. Yet he did not wish to be born in this world through the wealthy; he chose poor parents. Hence even a lamb to be offered for him was lacking; his mother found young doves and a pair of turtledoves for the sacrifice. He did not wish to prosper in the world; he endured reproaches and mockeries; he bore spitting, scourging, blows, a crown of thorns, and the cross; and because we fell from inner joy through delight in bodily things, he showed with what bitterness one returns there. What therefore ought man to suffer for himself, if God endured such things for men? He therefore who has now believed in Christ, but still pursues the gains of avarice, is lifted up in the pride of honor, burns with the torches of envy, pollutes himself with the filth of lust, desires the prosperous things that are in the world—he disdains to follow the Jesus in whom he has believed. For he walks by a different path, if he seeks joys and pleasures, when his guide showed him the way of bitterness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title="Forty Gospel Homilies, Homily 2"

[[commentary]]
quote='''
(Mor. iv. 27.) The dead also bury the dead, when sinners protect sinners. They who exalt sinners with their praises, hide the dead under a pile of words.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"
