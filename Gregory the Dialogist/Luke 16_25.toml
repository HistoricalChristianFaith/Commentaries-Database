[[commentary]]
quote='''
To whom it is answered that in this life he received his good things, because he considered all his joy to be transitory happiness. For the just can have good things here, and yet not receive them as recompense, because while they seek better things, that is eternal things, whatever good things may have been present, in their judgment, when they burn with holy desires, they seem hardly good at all. Hence the prophet David, who was supported by the riches of his kingdom and many attendants, although he perceived that these things were good for necessity, nevertheless panted with longing for one singular good alone, saying: "But for me, to cling to God is good."

Among these things it should be noted what is said to him: "Remember, son." For behold, Abraham calls him son, whom nevertheless he does not free from torment, because the faithful forefathers of this unfaithful people, since they see that many have strayed from their faith, do not rescue from torments by any compassion those whom nevertheless they recognize as sons according to the flesh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 40'

[[commentary]]
quote='''
But this which is said to him through Abraham's response must be considered with very great fear: "Son, remember that you received good things in your life, and Lazarus likewise evil things. But now he is comforted here, and you are tormented." This sentence, my brothers, needs fear rather than exposition. For if any of you have received something of external good in this world, you ought to fear that very external gift, so to speak, lest it be given to you as recompense for certain of your deeds, lest the Judge who here restored external goods reject you from the retribution of inward good, lest honor here or riches be not an aid to virtue but a reward for labor.

For behold, when it is said, "You received good things in your life," it is indicated that this rich man also had something of good, from which he might receive good things in this life. And again, when it is said of Lazarus that he received evil things, it is clearly shown that Lazarus also had some evil that needed to be purged. But the fire of poverty purged the evils of Lazarus, and the happiness of passing life rewarded the goods of the rich man. Poverty afflicted and cleansed the one; abundance rewarded and repelled the other.

Therefore whoever among you have good things in this world, when you recall that you have done good deeds, greatly fear concerning them, lest the prosperity granted to you be the reward of those same goods. And when you see any poor people committing some blameworthy acts, do not despise them, do not despair of them, because perhaps the furnace of poverty purges what the excess of very slight depravity stains. Fear greatly concerning yourselves, because a prosperous life has even followed some evil deeds. But consider carefully concerning them, because the teacher poverty also torments their life until it leads them to righteousness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 40'

[[commentary]]
quote='''
(in Hom. 40.) Whatsoever then ye have well in this world, when ye recollect to have done any thing good, be very fearful about it, lest the prosperity granted you be your recompense for the same good. And when ye behold poor men doing any thing blameably, fear not, seeing that perhaps those whom the remains of the slightest iniquity defiles, the fire of honesty cleanses.

(ubi sup.) It may also be answered, that evil men receive in this life good things, because they place their whole joy in transitory happiness, but the righteous may indeed have good things here, yet not receive them for reward, because while they seek better things, that is, eternal, in their judgment whatever good things are present seem by no means good.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Now Abraham calls him his son, whom at the same time he delivers not from torments; because the fathers of this unbelieving people, observing that many have gone aside from their faith, are not moved with any compassion to rescue them from torments, whom nevertheless they recognise as sons.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
