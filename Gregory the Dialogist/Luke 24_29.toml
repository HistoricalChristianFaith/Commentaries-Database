[[commentary]]
quote='''
But because those with whom Truth walked could not be strangers to charity, they invite Him to lodging as a stranger. But why do we say "invite," when it is written there "And they constrained Him"? From this example indeed it is gathered that strangers should not only be invited to lodging but even compelled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 23'

[[commentary]]
quote='''
(Hom. 22 in Ev.) But because they could not be strangers to charity, with whom charity was walking, they invite Him as if a stranger to partake of their hospitality. Hence it follows, And they compelled him. From which example it is gathered that strangers are not only to be invited to hospitality, but even to be taken by force.

(ut sup.) Now behold Christ since He is received through His members, so He seeks His receivers through Himself; for it follows, And he went in with them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
