[[commentary]]
quote='''
(Hom. xviii. in Evang.) The carnal minds of the Jews are intent on the flesh only; they think only of His age in the flesh: Then said the Jews unto Him, Thou art not fifty years old, and hast Thou seen Abraham? that is to say, Many ages have passed since Abraham died; and how then could he see thy day? For they took His words in a carnal sense.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
For Abraham saw the day of the Lord when, as a figure of the supreme Trinity, he received three angels as guests; and having received them, he spoke to the three as if to one, because although there is a number of Trinity in the persons, there is a unity of divinity in nature. But the carnal minds of the listeners do not raise their eyes above the flesh, while they consider only the age of His flesh, saying: "You are not yet fifty years old, and have you seen Abraham?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title="Forty Gospel Homilies, Homily 18"
