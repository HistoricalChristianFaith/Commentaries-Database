[[commentary]]
quote='''
Again, the kingdom of heaven is said to be like a net cast into the sea, gathering fish of every kind. The Holy Church is compared to a net, because it has been entrusted to fishermen, and through it each person is drawn from the waves of the present age to the eternal kingdom, lest they be plunged into the depths of eternal death. It gathers fish of every kind, because it calls to the forgiveness of sins the wise and the foolish, the free and the enslaved, the rich and the poor, the strong and the weak. Hence it is said to God through the Psalmist: To you all flesh shall come. This net, namely, is universally filled when at its end the sum total of the human race is enclosed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 11'

[[commentary]]
quote='''
(Hom. in Ev. xi. 4.) Or otherwise; The Holy Church is likened to a net, because it is given into the hands of fishers, and by it each man is drawn into the heavenly kingdom out of the waves of this present world, that he should not be drowned in the depth of eternal death. This net gathers of every kind of fishes, because the wise and the foolish, the free and the slave, the rich and the poor, the strong and the weak, are called to forgiveness of sin;
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
