[[commentary]]
quote='''
And there it is added: "And then they shall see the Son of Man coming in the clouds with great power and majesty." As if it were openly said: They shall see in power and majesty Him whom, placed in humility, they refused to hear, so that they may then feel His power all the more strictly, inasmuch as now they do not bow the neck of their heart to His patience.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 1'

[[commentary]]
quote='''
(Hom. 1. in Ev.) For in power and majesty will men see Him, whom in lowly stations they refused to hear, that so much the more acutely they may feel His power, as they are now the less willing to bow the necks of their hearts to His sufferings.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
