[[commentary]]
quote='''
The fact that the disciples were slow to believe in the Lord's resurrection was not so much their weakness as, so to speak, our future strength. For the resurrection itself was demonstrated to them through many proofs while they doubted: and when we recognize these things as we read them, what else happens but that we are strengthened by their doubt? For Mary Magdalene, who believed more quickly, did less for me than Thomas, who doubted for a long time. For by doubting he touched the scars of the wounds, and cut away the wound of doubt from our hearts.

To establish the truth of the Lord's resurrection, we should also note what Luke reports, saying: "Eating together with them, he commanded them not to depart from Jerusalem." And a little later: "While they were watching, he was lifted up, and a cloud received him from their sight." Note the words, mark the mysteries. Eating together he was lifted up. He ate, and he ascended, so that through the act of eating the truth of his flesh might be made evident.

Mark, however, recalls that before the Lord ascended to heaven, he rebuked the disciples for their hardness of heart and unbelief. In this matter, what should be considered except that the Lord rebuked the disciples at that time when he was leaving them bodily, so that the words he spoke as he departed might remain more deeply impressed upon the hearts of his hearers?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 29'

[[commentary]]
quote='''
(ubi sup.) We should observe that Luke says in the Acts, As he was eating with them he commanded that they should not depart from Jerusalem, and shortly afterwards, while they beheld he was taken up. For He ate, and then ascended, that by the act of eating, the truth of the flesh might be declared; wherefore it is also here said, that he appeared to them for the last time as they sat at meat.

(ubi sup.) Another reason also why our Lord rebuked His disciples, when He left them as to His bodily presence, was, that the words which He spoke on leaving them might remain more deeply impressed upon the hearts of His hearers.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
