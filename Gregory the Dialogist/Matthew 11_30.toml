[[commentary]]
quote='''
(Mor. iv. 33.) What burden is it to put upon the neck of our mind that He bids us shun all desire that disturbs, and turn from the toilsome paths of this world?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
