[[commentary]]
quote='''
But because all these things come not from the injustice of the one striking but from the merit of the world that suffers, the deeds of wicked men are set forth first when it is said: "But before all these things they will lay their hands upon you and persecute you, and deliver you to synagogues, leading you before kings and governors for my name's sake." As if he were saying openly: First the hearts of men are disturbed, and afterward the elements, so that when the order of things is thrown into confusion, it may be shown from what retribution this comes. For although the end of the world depends on its own order, it is made known that it finds certain more perverse people who may worthily be crushed by its ruins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 35'

[[commentary]]
quote='''
(Hom. 35. in Evang.) Because the things which have been prophesied of arise not from the injustice of the inflictor of them, but from the deserts of the world which suffers them, the deeds or wicked men are foretold; as it is said, But before all these things, they shall lay their hands upon you: as if He says, First the hearts of men, afterwards the elements, shall be disturbed, that when the order of things is thrown into confusion, it may be plain from what retribution it arises. For although the end of the world depends upon its own appointed course, yet finding some more corrupt than others who shall rightly be overwhelmed in its fall, our Lord makes them known.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
