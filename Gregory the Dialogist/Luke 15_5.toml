[[commentary]]
quote='''
And when he finds the sheep, he lays it on his shoulders rejoicing. He placed the sheep on his shoulders because by taking on human nature he himself bore our sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 34'

[[commentary]]
quote='''
(in Hom. 34.) He placed the sheep upon his shoulders, for taking man's nature upon Him he bore our sins.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
