[[commentary]]
quote='''
And there are some who, as if enriched with two talents, receive understanding and action, understand subtle things about internal matters, work wonders in external things; and when by both understanding and working they preach to others, they bring back, as it were, a doubled profit from their business. Moreover, it is rightly reported that another five or another two came as profit, because when preaching is expended on both sexes, the talents received are, as it were, doubled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 9'

[[commentary]]
quote='''
(ubi sup.) Again, there are some who by their understanding and their actions preach to others, and thence gain as it were a twofold profit in such merchandize. This their preaching bestowed upon both sexes is thus a talent doubled.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title='Catena Aurea by Aquinas'
