[[commentary]]
quote='''
"You gave me no kiss; but she, from the time she entered, has not ceased to kiss my feet." A kiss is indeed a sign of love. And that faithless people did not give God a kiss, because they did not wish to love him out of charity, whom they served out of fear. But the Gentiles, once called, do not cease to kiss the footsteps of their Redeemer, because they continually sigh in love for him. Hence also in the voice of the bride concerning this same Redeemer it is said in the Song of Songs: "Let him kiss me with the kiss of his mouth." Rightly does she desire the kiss of her Creator, who prepares herself to serve him through love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 33'

[[commentary]]
quote='''
(ubi sup.) That unfaithful people also gave no kiss to the Lord, for it was unwilling to embrace Him from love whom it obeyed from fear, (for the kiss is the sign of love,) but the Gentiles being called cease not to kiss the feet of their Redeemer, for they ever breathe in His love.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
