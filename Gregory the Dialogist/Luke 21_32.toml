[[commentary]]
quote='''
All these things are confirmed with great certainty when the sentence is added which says: "Amen I say to you, this generation shall not pass away until all things come to pass. Heaven and earth shall pass away, but my words shall not pass away."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 1'

[[commentary]]
quote='''
(in Hom. 1. in Ev.) But all the things before mentioned are confirmed with great certainty, when He adds, Verily I say unto you, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
