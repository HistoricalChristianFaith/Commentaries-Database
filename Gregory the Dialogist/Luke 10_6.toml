[[commentary]]
quote='''
And if the son of peace be there, your peace shall rest upon him; but if not, it shall return to you. The peace which is offered from the mouth of the preacher either rests in the house, if there be a son of peace in it, or returns to the same preacher; because either someone will be predestined to life, and follows the heavenly word which he hears; or if no one shall have been willing to hear, the preacher himself will not be without fruit, because peace returns to him, since a reward is recompensed to him from the Lord for the labor of his work.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 17'

[[commentary]]
quote='''
(Hom. 17. in Ev.) For the peace which is offered by the mouth of the preacher shall either rest on the house, if there be any one in it predestined to life, who follows the heavenly word which he hears; or if no one be willing indeed to hear, the preacher himself shall not be without fruit, for the peace returns to him, while the Lord gives him the recompense of reward for the labour of his work.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
