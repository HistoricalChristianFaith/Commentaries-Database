[[commentary]]
quote='''
But Simon Peter came following him and entered the tomb, because the Church of the Gentiles, coming after, both recognized the mediator between God and men, the man Jesus Christ, dead in the flesh, and believed him to be the living God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 22'

[[commentary]]
quote='''
Then cometh Simon Peter, and enteredinto the sepulchre: the Gentile Church both knew Jesus Christ as dead man, and believed in Him as living God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
