[[commentary]]
quote='''
"While the bridegroom tarried, they all slumbered and slept," because while the Judge delays His coming to the final judgment, both the elect and the reprobate are lulled in the sleep of death. For to sleep is to die. But to slumber before sleep is to languish from health before death, because through the weight of illness one arrives at the sleep of death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 12'

[[commentary]]
quote='''
(Hom. in Ev. xii. 1.) To sleep is to die, to slumber before sleep is to faint from salvation before death, because, by the burden of sickness we come to the sleep of death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title='Catena Aurea by Aquinas'
