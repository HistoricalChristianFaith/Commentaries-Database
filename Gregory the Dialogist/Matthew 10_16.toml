[[commentary]]
quote='''
But would that if we are not sufficient for the power of preaching, we might at least maintain the duty of our position in innocence of life. For it is added: Behold, I send you as lambs among wolves. But many, when they receive the rights of governance, burn to tear apart their subjects, display the terror of power, and harm those whom they ought to have benefited. And because they do not have the bowels of charity, they desire to be seen as lords, they do not at all recognize themselves to be fathers, they change the place of humility into the exaltation of domination, and if ever they flatter outwardly, inwardly they rage. Concerning whom the Truth says elsewhere: They come to you in sheep's clothing, but inwardly they are ravenous wolves. Against all these things, we must consider that we are sent as lambs among wolves, so that, preserving the sense of innocence, we may not have the bite of malice. For he who undertakes the position of preaching ought not to inflict evils, but to endure them, so that by his very meekness he may soften the anger of those who rage, and he himself, wounded by afflictions, may heal the wounds of sins in others. And if ever the zeal of righteousness demands that he rage against his subjects, let that fury be from love, not from cruelty, so that he may both display the rights of discipline outwardly, and inwardly love with fatherly affection those whom he chastises as if pursuing them outwardly. This a Ruler exhibits well when he does not know how to love himself through private affection, when he desires nothing of the things of the world, when he in no way bends the neck of his mind to the burdens of earthly desire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 17'

[[commentary]]
quote='''
Now the Holy Spirit was shown both in a dove and in fire because all whom He fills He makes both simple and ardent: simple in purity, ardent in zeal. For neither can simplicity without zeal please God, nor zeal without simplicity. Hence the Truth Himself says: "Be wise as serpents and simple as doves." In this matter it should be noted that the Lord wished to admonish His disciples neither about the dove without the serpent nor about the serpent without the dove, so that both the cunning of the serpent might sharpen the simplicity of the dove and the simplicity of the dove might temper the cunning of the serpent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 30'

[[commentary]]
quote='''
(Hom. in Ev. xvii. 4.) For he who undertakes the office of preacher ought not to do evil, but to suffer it, and by his meekness to mollify the wrath of the angry, and by his wounds to heal the wounds of sinners in their affliction. And even should the zeal of right-doing ever require that He should be severe to those that are placed under Him, His very severity will be of love and not of cruelty, outwardly maintaining the rights of discipline, and inwardly loving those whom He corrects. Too many, when they are entrusted with the reins of government, burn to make the subjects feel them, display the terrors of authority, and forgetting that they are fathers, rather desire to be thought lords, changing a station of lowliness into that of lofty dominion, if they ever seem outwardly to fawn on any one, they inwardly hate him; of such He spoke above; They come to you in sheep's clothing, but inwardly they are ravening wolves. (Mat. 7:15.) For prevention whereof we ought to consider that we are sent as sheep among wolves, whose innocence we ought to preserve, not having the tooth of malice.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
