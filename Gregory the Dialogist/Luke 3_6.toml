[[commentary]]
quote='''
There follows: "And all flesh shall see the salvation of God." Because by "all flesh" is meant every person, not every person was able to see the salvation of God, namely Christ, in this life. Where then does the prophet direct the eye of prophecy in this statement except to the day of the last judgment? When, with the heavens opened, angels ministering, apostles seated alongside, Christ shall appear on the throne of His majesty, all—both the elect and the reprobate alike—will see Him, so that the just may rejoice without end in the gift of recompense, and the unjust may groan perpetually in the vengeance of punishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 20'

[[commentary]]
quote='''
(ubi sup.) Or else, All flesh, i. e. Every man can not see the salvation of God in Christ in this life. The Prophet therefore stretches his eye beyond to the last day of judgment, when all men both the elect and the reprobate shall equally see Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'
