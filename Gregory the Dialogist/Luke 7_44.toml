[[commentary]]
quote='''
The good deeds of the sinful woman are enumerated to the Pharisee, the evil deeds of the false righteous man are enumerated, when it is said: "I entered your house, you gave no water for my feet; but she has washed my feet with tears and wiped them with her hair."

In a mystical sense, our Redeemer enumerates the deeds of this woman as if they were the good deeds of the Gentiles, so that the Jewish people might recognize in what evil they lie. For thus the Pharisee is rebuked, so that through him, as we have said, that faithless people might be shown. "I entered your house, you gave no water for my feet, but she has washed my feet with tears." Water indeed is outside us, but the moisture of tears is within us, because that faithless people never gave even those things that were outside themselves for the Lord; but the converted Gentiles poured out not only the substance of their possessions but even their blood for him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 33'

[[commentary]]
quote='''
(ubi sup.) The good deeds of the sinful woman are enumerated to him, and the evils of the pretended righteous; as it follows, And he turned to the woman, and said unto Simon, Seest thou this woman? I entered into thy house, thou gavest me no water for my feet, but she hath washed my feet with her tears.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
(ubi sup.) But this also the Pharisee sees and grudges, for when the Jewish people perceives that the Gentiles preach God, it consumes away by its own malice. But the Pharisee is thus repulsed, that as it were through Him that false people might be made manifest, for in truth that unbelieving people never offered to the Lord even those things which were without them; but the Gentiles being converted, poured forth not only their substance but their blood. Hence He says to the Pharisee, Thou gavest me no water for my feet, but she hath washed my feet with her tears; for water is without us, the moisture of tears is within us.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
