[[commentary]]
quote='''
But as we seek, the watchmen who guard the city find us, because the holy fathers who guard the state of the Church meet our good endeavors, that they may teach us by their word or their writing.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html"
source_title="40 Homilies on the Gospels, Homily 25"
