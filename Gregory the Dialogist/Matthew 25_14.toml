[[commentary]]
quote='''
Who then is this man who goes on a journey, if not our Redeemer, who departed into heaven in the flesh which he had assumed? For the proper place of flesh is earth, which is led as if to foreign lands when it is placed in heaven through our Redeemer. But this man going abroad handed over his goods to his servants, because he granted spiritual gifts to his faithful ones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 9'

[[commentary]]
quote='''
(Hom. in Ev. ix, l.) The man travelling into a far country is our Redeemer, who ascended into heaven in that flesh which He had taken upon Him. For the proper home of the flesh is the earth, and it, as it were, travels into a foreign country, when it is placed by the Redeemer in heaven.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title='Catena Aurea by Aquinas'
