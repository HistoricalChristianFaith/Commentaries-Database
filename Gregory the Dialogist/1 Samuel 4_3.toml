[[commentary]]
quote='''
5. For "why" in this place is not an interrogation of inquiry, but a complaint of amazement. They ask about the defeat, then, with amazement, because they were unable to arrive at the reason by which they had observed that the men of their religion had received the faith of the Redeemer. And it should be noted that those who ask with amazement are recorded to have been the elders of Israel, because indeed all the proud, glorying in their own wisdom, were in no way able to arrive at the knowledge of divine mysteries. Whence also in the Gospel the Lord speaks to the Father, saying: "I confess to you, Father, King of heaven and earth, because you have hidden these things from the prudent and wise, and have revealed them to little ones" (Matt. 11:25). They indeed complain that they were struck, because while they observed that through those who believed the old custom of the law was being dissolved, they supposed that certain wounds of a blow had been inflicted upon them by the incomprehensible judgment of God, which they might proclaim with shared grief. But those who complain that others have fallen add by what plan they prepare themselves to resist: (Verse 3.) "Let us bring to ourselves the ark of the covenant of the Lord from Shiloh, and let it come into our midst, and let it save us from the hand of our enemies." And concerning the carrying out of this same counsel it is immediately added: (Verse 4.) "Therefore the people sent to Shiloh, and brought from there the ark of the covenant of the Lord of hosts sitting upon the cherubim."

6. This is certainly the plan, this is the work of Israel against the battle of those falling by the cup — but indeed an unheard-of plan and work, because it is not of Israel according to the spirit, but of Israel according to the flesh; that is, not of one who sees God, but of one who thinks he sees the God whom he despises. For what is it to send to Shiloh, except to have recourse to the law of Moses, to whom it is said by the Lord: "Come, I will send you to Pharaoh" (Exod. 3:10)? What is it to bring the ark of the Lord, except to bring forward the sacraments of the old law by recalling them in order to refute the truth of the new faith? And because they allow none of their own to be ignorant of the same knowledge of the law, the ark is ordered to be brought into their midst. What likewise is the meaning of what they say, "And let it save us from the hand of our enemies," except that while they stubbornly defend the old things, they repel the new, and they hold this as their confidence of salvation — that they cannot be drawn by the zeal of good preachers to the reasoning of the true faith? Therefore, because they boast that they possess the truth of divine knowledge through the old law, they affirm that the same ark, which they order to be brought for their salvation, belongs to the Lord of hosts. And because they think they excel in incomparable knowledge of the same law, while the ark is said to be brought, it is declared to belong to the Lord of hosts who sits upon the cherubim. ...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2FCommentary%2520on%25201%2520Kings%2FBook%25203.html'
source_title="Commentary on 1 Kings, Book 3, Chapter 2"
