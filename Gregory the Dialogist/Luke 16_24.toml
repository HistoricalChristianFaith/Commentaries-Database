[[commentary]]
quote='''
Moreover he is shown to burn more in his tongue, when he says: "Send Lazarus, that he may dip the tip of his finger in water, to cool my tongue, for I am tormented in this flame." The unbelieving people held the words of the law in their mouth, which they scorned to keep in deed. Therefore he will burn more there, where he showed himself to know what he was unwilling to do. Wherefore it is well said of the learned and negligent through Solomon: "All the labor of man is in his mouth, but his soul will not be filled," because whoever labors only to know what he ought to say, fasts with an empty mind from the very refreshment of his knowledge. He desires to be touched by the tip of a finger, because given over to eternal punishments he wishes to share in even the least work of the just.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 40'

[[commentary]]
quote='''
Although out of the Gospel we also learn that the soul is not only tormented by seeing the fire, but also by the feeling thereof: for the rich glutton, as our Saviour saith, was buried in hell. And he giveth us to understand that his soul was kept in fire, in that he telleth us how he did beseech Abraham, speaking to him in this manner: Send Lazarus, that he may dip the top of his finger into the water and may refresh my tongue: because I am tormented in this flame. Seeing, then, truth itself assureth us that the sinful rich man was condemned into fire, what wise man can deny that the souls of the reprobate be detained in fire?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2FDialogues%2FBook%25204.html"
source_title="Dialogues, Book 4, Chapter 29"

[[commentary]]
quote='''
But it must be carefully noted what it means that the rich man placed in the fire asks for his tongue to be cooled. For it is the custom of sacred Scripture sometimes to say one thing, but to indicate another by that same saying. Now above the Lord had described this proud rich man not as given to talkativeness, but as feasting excessively. And He did not narrate that he sinned by talkativeness, but that he sinned by pride and greed through gluttony. But because talkativeness usually abounds at feasts, he who is said to have feasted wickedly here is reported to burn more grievously in his tongue in hell. For the sin of talkativeness first serves those who feast wickedly, and after talkativeness the levity of jesting also follows. For that jesting follows gluttony, sacred Scripture testifies, which says: "The people sat down to eat and drink, and they rose up to play." But before the body is moved to play, the tongue is moved to jokes and empty words. What therefore is indicated by the fact that the rich man placed in torments asks for his tongue to be cooled, except that he who by feasting had sinned more by talkativeness was burning more fiercely in his tongue through the justice of retribution?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 40'

[[commentary]]
quote='''
(Hom. 40. in Ev.) And this rich man forsooth, now fixed in his doom, seeks as his patron him to whom in this life he would not show mercy.

(ut sup.) For that rich man who would not give to the poor man even the scraps of his table, being in hell came to beg for even the least thing. For he sought for a drop of water, who refused to give a crumb of bread.

We may gather from this, with what torments he will be punished who robs another, if he is smitten with the condemnation to hell, who does not distribute what is his own.

But what means it, that when in torments he desires his tongue to be cooled, except that at his feasts having sinned in talking, now by the justice of retribution, his tongue was in fierce flame; for talkativeness is generally rife at the banquet.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
But he is described to burn chiefly in his tongue, because the unbelieving people held in their mouth the word of the Law, which in their deeds they despised to keep. In that part then a man will have most burning wherein he most of all shews he knew that which he refused to do.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
