[[commentary]]
quote='''
They set the table, they offer food, and the God whom they had not recognized in the exposition of Sacred Scripture, they recognize in the breaking of bread.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 23'

[[commentary]]
quote='''
(ut sup.) They lay out a table, they bring food. And God whom they had not known in the expounding of Scriptures, they knew in the breaking of bread; for it follows, And it came to pass, as he sat at meat with them, he took bread, and blessed it, and brake, and gave it to them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'
