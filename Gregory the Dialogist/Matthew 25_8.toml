[[commentary]]
quote='''
But what does it mean that they then seek oil from the wise, except that at the coming of the judge, when they find themselves empty within, they seek testimony from without? As if, deceived by their own confidence, they say to their neighbors: Since you see us being rejected as if without works, tell us what you saw of our works. But the wise virgins answer, saying: "Lest perhaps there be not enough for us and for you." For on that day (though I speak of certain ones resting in the peace of the Church) the testimony of each one barely suffices for oneself; how much less for both oneself and one's neighbor?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520the%2520Dialogist%2F40%2520Homilies%2520on%2520the%2520Gospels.html'
source_title='Forty Gospel Homilies, Homily 12'

[[commentary]]
quote='''
(ubi sup.) The lamps of the foolish virgins go out, because the works which appeared outwardly to men to be bright, are dimmed within at the coming of the Judge. That they then beg oil of the wise virgins, what is it but that at the coming of the Judge, when they find themselves empty within, they seek for witness from without? As though deceived by their own self-confidence, they say to their neighbours, Whereas ye see us rejected as living without works, do ye witness to our works that ye have seen.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title='Catena Aurea by Aquinas'
