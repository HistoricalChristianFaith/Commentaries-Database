[[commentary]]
quote='''
When then the man with the dropsy came into the midst of them, He rebukes by a question the insolence of the Pharisees, who wished to detect Him; as it is said, And, behold, there was a certain man before him which had the dropsy. And Jesus answering, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
