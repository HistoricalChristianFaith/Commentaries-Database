[[commentary]]
quote='''
The Evangelist pursues his plea that the world knew not its Illuminer, that is the Only-Begotten, and from the worse sin of the children of Israel, he hastens to clench the charges against the Gentiles and shews the disease of ignorance alike and unbelief which lay upon the whole world. For it were no marvel if the world knew not, says he, the Only-Begotten, seeing that it had left the understanding that befits man, and was ignorant that it is and was made in honour, and compared to the beasts that perish, as the Divine Psalmist also said; when the very people who were supposed above all to belong to Him shook Him off when present with the Flesh and would not receive Him when He came among them for salvation to all, recompensing to faith the kingdom of Heaven. But observe how exact is his language about these things. For the world he accuses of not at all knowing Him Who lighteth it, elaborating for it a pardon so to speak just on this account, and preparing beforehand reasonable causes for the grace given to it: but of those of Israel who were reckoned among those specially belonging to Him, he says, Received Him not. For it would not have been true to say, Knew Him not, when the older law preached Him, the Prophets who came after led them by the hand to the apprehension of the truth. The sentence therefore of severity upon them was just, even as the goodness too upon the Gentiles. For the world, or the Gentiles, having lost their relation with God through their downfall into evil, lost besides the knowledge of Him Who enlighteneth them: but the others, who were rich in knowledge through the law and called to a polity pleasing to God, were at length voluntarily falling away from it, not receiving the Word of God Who was already known to them and Who came among them as to His own. For the whole world is God's own, in regard of its creation, and its being brought into being from Him and through Him: but Israel will more fitly be called His own, and will gain the glory hereof, both on account of the election of the holy fathers and for that he was named the beginning and the first-born of the children of God. For Israel is My son, My first-born, says God somewhere to Moses. But when He was not received, He transfers the grace to the Gentiles, and the world which knew Him not at the beginning is lighted through repentance and faith, and Israel returns to the darkness whence he had come forth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25201.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 1.9"
