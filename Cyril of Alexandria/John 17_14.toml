[[commentary]]
quote='''
He says that He Himself is not of the world, and that we are even as He is, since His Divine Word has taken up its abode in our hearts. Furthermore, He declares that as the world hated Him so will it also hate them. The world indeed hateth Christ, because it is in conflict with His words, and accepts not His teaching, men's minds being wholly yielded up to base desires; and even as the world hates our Saviour Christ, it hath hated also the disciples who carry through Him His message, as Paul also did, who said: We are ambassadors, therefore, on behalf of Christ, as though God were intreating by us: we beseech you on behalf of Christ, be ye reconciled to God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252011.html"
source_title="Commentary on the Gospel of John - Book 11"
