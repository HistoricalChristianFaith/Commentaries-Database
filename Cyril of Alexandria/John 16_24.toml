[[commentary]]
quote='''
Hereby he exhorts the disciples to pray for spiritual graces, and at the same time gives them this encouragement----that what they ask they will not fail to obtain; adding the comforting assurance of the word "verily" to His promise that if they will go to the Father's throne and make any request, they will receive it of Him, He Himself acting as Mediator and leading them into the Father's Presence. For this is the meaning of the words in my Name; for we cannot draw nigh unto God the Father save by the Son alone. For through Him we have obtained access in One Spirit unto the Father, according to the Scripture. Therefore also He saith: I am the Door: I am the Way: no one cometh unto the Father but by Me. For inasmuch as the Son is also God, together with the Father He conveys good gifts to the Saints, and associates Himself with Him in granting us the portion of the blessed. Moreover, the inspired Paul most evidently confirms our belief herein by writing these words: Grace to you and peace from God our Father and the Lord Jesus Christ. And in right of His titles, Mediator, High Priest, and Advocate, He conveys to the Father prayers on our behalf, for He gives us all boldness to address the Father. In the Name then of Our Saviour Christ we must make our requests, for so will the Father most readily grant them, and will give to those that ask good gifts, that we may take them and rejoice therein.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252011.html"
source_title="Commentary on the Gospel of John - Book 11"
