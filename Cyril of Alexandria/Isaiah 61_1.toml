[[commentary]]
quote='''
He who said in the preceding words concerning those who would be called in faith: "I the Lord will gather them at the proper times," as the time was already present, in which he promised to gather them, and as one who had already become man, and had undergone the likeness to us, and had lowered himself to emptiness, "The Spirit of the Lord," he says, "is upon me," although being by nature God the Only-begotten is the Holy of holies, and he himself sanctifies all creation, since indeed he is begotten of a holy Father, and pours forth the Spirit from himself, and sends it into the powers above as his own, and moreover to those who have recognized his epiphany. How then was he sanctified? For being at once God and the same one man, he gives the Spirit divinely to creation, but he receives it from God the Father according to his humanity. This we say is the use. And he makes clear the cause of the incarnation. For having said that it was from the Father, he necessarily added, "Because of which he has anointed me; he has sent me to preach good news to the poor, to heal the brokenhearted, to proclaim release to those in captivity, and to grant recovery of sight to the blind, and in addition to these to call also a day of recompense:" many at the same time are the manifest achievements of the incarnation of the Only-begotten. For in order that he might win the world under heaven, and bring those throughout the whole inhabited world to God the Father, having transformed all things to a better state, and as it were renewed the face of the earth, he took the form of a servant, although being Lord of all.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520Isaiah.html"
source_title="Commentary on Isaiah"
