[[commentary]]
quote='''
We shall find, then, in the passage that follows, the words: Thomas, called Didymus, was not with the disciples when Jesus came. How, then, someone may not unreasonably inquire, if he were away, was he in fact made partaker in the Holy Spirit when the Saviour appeared unto the disciples and breathed on them, saying: Receive ye the Holy Ghost? We reply that the power of the Spirit pervaded every man who received grace, and fulfilled the aim of the Lord Who gave Him unto them; and Christ gave the Spirit not to some only but to all the disciples. Therefore, if any were absent, they also received Him, the munificence of the Giver not being confined to those only who were present, but extending to the entire company of the holy Apostles. And that this interpretation is not strained, or our idea extravagant, we may convince you from Holy Writ itself, bringing forward as a proof a passage in the Books of Moses. The Lord God commanded the all-wise Moses to select elders, to the number of seventy, from the assembly of the Jews, and plainly declared: I will take of the Spirit which is upon thee and will put it upon them. Moses, as he was bidden, brought them together, and fulfilled the Divine decree. Two only of the men who were included in the number of the seventy elders were left behind, and remained in the assembly, to wit, Eldad and Medad. Then when God put upon them all the Divine Spirit, as He had promised, those whom Moses had collected together immediately received grace, and prophesied; but none the less also the two who were in the assembly prophesied, and, in fact, the grace from above came upon them first. Nay, further, Joshua, that was called the son of Nun, who was the constant attendant of Moses, not understanding at once the meaning of the mystery, but thinking that after the manner of Dathan and Abiram they were rivals in the art of prophecy to those whom Moses had brought together, said unto him: Eldad and Medad do prophesy in the camp; my lord Moses, forbid them. And what answered that truly wise and great man, seeing in his wisdom the working of the grace given unto them, and the power of the Spirit? Enviest thou for my sake? Would God that all the Lord's people were prophets, and that the Lord would put His Spirit upon them! Observe how he rebukes the saying of Joshua, who knew not what had been done. Would that, he says, the Spirit were given to all the people! Nay, this will indeed come to pass in due season, when the Lord, that is, Christ, will grant unto them His Spirit; breathing upon His holy Apostles as upon the firstfruits of those whose due it is to receive Him, and saying: Receive ye the Holy Ghost. Then, if Thomas were absent, he was not cut off from receiving the Spirit, for the Spirit pervaded all whose due it was to receive Him, and who were included among the number of His honoured disciples.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 12"
