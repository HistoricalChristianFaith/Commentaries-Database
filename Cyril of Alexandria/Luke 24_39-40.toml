[[commentary]]
quote='''
Here then was a most evident sign that He whom they now see was none other but the same whom they had seen dead on the cross, and lain in the sepulchre, who knew every thing that was in man.

Now our Lord testifying that death was overcome, and human nature had now in Christ put on incorruption, first shows them His hands and His feet, and the print of the nails; as it follows, Behold my hands and my feet, that it is I myself.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
In another way, he proves that death is conquered and that human nature has put off corruption in him. He shows his hands, his feet and the holes of the nails. He permits them to touch him and in every way convince themselves that the very body that suffered was risen. Let no one quibble at the resurrection. Although you hear the sacred Scripture say that the human body is sown a physical body but raised a spiritual body, do not deny the return of human bodies to incorruption.
'''
source_url=''
source_title="COMMENTARY ON LUKE, CHAPTER 24"
