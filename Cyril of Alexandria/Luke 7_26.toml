[[commentary]]
quote='''
(ubi sup.) But perhaps it does not concern us to excuse John upon this ground, for you confess that he is worthy of imitation, hence He adds, But what went ye out for to see? A prophet? Verily I say unto you, more than a prophet. For the prophets foretold that Christ would come, but John not only foretold that He would come, but also declared Him to be present, saying, Behold the Lamb of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"What then did you go out to see?" Perhaps you say, "A prophet." Yes, I agree. He is a saint and a prophet. He even surpasses the dignity of a prophet.
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 38"
