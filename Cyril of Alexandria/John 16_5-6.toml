[[commentary]]
quote='''
Did the Saviour then separate from His disciples when He ascended to the Father, and was He still with them, by the working and power and grace of the Spirit? How, or in what way, was He with them? For it is beyond question that He cannot lie when He says, Lo, I am with you alway, even unto the end of the world, except so far as the flesh and His bodily presence were concerned. But the Saviour knew that the ascent into heaven of His own Flesh was most essential to His Human Nature, but, as God, He well knew that the heart of His disciples was overwhelmed by the bitterness of their sorrow. For the departure of Christ was very grievous unto them, because they longed to be ever with Him. But since He had resolved to do this, they do not even ask when or for what reason He will leave them, or what is the motive or inducement of His Ascension. He sympathises then with their suffering, as it proceeded from love; and with their ill-timed preference of silence, which did not allow them to inquire the reason for His departure, although to know it would bring them much profit.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252010.html"
source_title="Commentary on the Gospel of John - Book 10"
