[[commentary]]
quote='''
But O thou malignant, and wicked, and accursed being, how didst thou dare to shew the Lord all the kingdoms of the whole creation, and say, "All these are mine? Now therefore if Thou wilt fall down and worship me, I will give them Thee." How dost thou promise that which is not thine? Who made thee heir of God's kingdom? Who made thee lord of all under heaven? Thou hast seized these things by fraud. Restore them therefore to the incarnate Son, the Lord of all. Hear what the prophet Isaiah says respecting thee; "Hath it been prepared for thee also to reign? a deep gulf, fire, and brimstone, and wood laid in order; the anger of the Lord as a gulf burning with brimstone." How then dost thou, whose lot is the inextinguishable flame, promise to the King of all that which is His own? Didst thou think to have Him as thy worshipper at Whom all things tremble, while the Seraphim, and all the angelical powers hymn His glory?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252012-25%2520%2528Luke%25204-1-6-17%2529.html"
source_title="Commentary on the Gospel of Luke, Sermon 12"
