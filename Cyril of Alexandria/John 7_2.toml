[[commentary]]
quote='''
The Law of Moses then commanded that the Jews should hasten from the whole country round about to Jerusalem, there to celebrate in a type the feast of tabernacles. And the spiritual person will thence perceive the gathering together of all the Saints into Christ, when they shall be brought together from the whole world after the resurrection of the dead to the city which is above, the heavenly Jerusalem, there to offer the thank-offerings of the true pitching of tabernacles, that is of the framing and abidance of bodies, corruption having been destroyed and death fallen into death.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25203.html"
source_title="Commentary on the Gospel of John, Book 3"
