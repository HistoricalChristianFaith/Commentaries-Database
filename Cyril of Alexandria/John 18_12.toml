[[commentary]]
quote='''
Now that all obstacles had been overcome, and Peter had put away his sword, and Christ had, as it were, surrendered Himself to the hand of the Jews, though He need not have died, and it was easier for Him to escape, the soldiers and servants, together with their guide, give way to cruel rage, and are transported with the ardour of victory. They took the Lord, Who gave Himself up wholly to their will, and put fetters upon Him, though He came to us to release us from the bondage of the devil, and to loose us from the chains of sin.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252011.html"
source_title="Commentary on the Gospel of John, Book 11"
