[[commentary]]
quote='''
(Thes. lib. 11. c. 4.) Or he asks the question by economy. For as the forerunner he knew the mystery of Christ's passion, but that his disciples might be convinced how great was the excellence of the Saviour, he sent the more understanding of them, instructing them to enquire and learn from the very words of the Saviour, whether it was He who was expected; as it is added, But when the men were come unto him, they said, John the Baptist hath sent us unto thee, saying, Art thou He, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Inasmuch as Christ by nature and in truth is God, the purpose of John did not escape Him, but as well knowing the cause of his disciples' coming, He especially at that particular time began accomplishing divine miracles many times more numerous than those which He had hitherto wrought. For so the wise Evangelist has told us, saying, "In that same hour He healed many of sicknessess and of scourges, and of evil spirits: and gave sight to many that were blind." Having then been made spectators and eyewitnesses of His greatness, and gathered into them a great admiration of His power and ability, they bring forward the question, and beg in John's name to be informed, whether He is He Who cometh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252027-38%2520(Luke%25206-20-7-28).html'
source_title="Commentary on the Gospel of Luke, Sermon 37"
