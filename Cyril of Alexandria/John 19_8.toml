[[commentary]]
quote='''
The malicious design of the Jews had a result they little expected. For they wished to pile up the indictment against Christ, by saying that He had ventured to sin against the Person of God Himself. But the weighty character of the accusation itself increased Pilate's caution, and he was the more oppressed with alarm, and more careful concerning Christ than before, and questioned Him the more particularly, what He was, and whence He came; not disbelieving, as I think, that though He was a Man, He might be also the Son of God. This idea and belief of his, was not derived from Holy Writ, but the mistaken notions of the Greeks; for Greek fables call many men demi-gods, and sons of gods. The Romans, too, who in such matters were still more superstitious, gave the name of god to the more distinguished of their own monarchs, and set up altars to them, and allotted them shrines, and put them on pedestals. Therefore Pilate was more earnest and anxious than before, in his inquiry Who Christ was, and whence He came.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 12"
