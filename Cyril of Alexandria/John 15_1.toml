[[commentary]]
quote='''
He wishes to show us that it behoves us to love, to hold fast to our love towards Him, and how great a gain we shall have from our union with Him, when He says that He is the Vine, by way of illustration; and that those who are united and fixed and rooted in a manner in Him, and who are already partakers in His nature through their participation in the Holy Spirit are branches; for it is His Holy Spirit Which has united us with the Saviour Christ, since connexion with the Vine produces a choice of those things which belong to It, and our connexion with It holds us fast. From a firm resolve in goodness we proceed onward by faith, and we become His people, obtaining from Him the dignity of Sonship.… here by a similar reflection He says that He is a Vine, as it were the mother and nourisher of its branches. For we are begotten of Him and in Him in the Spirit, to produce the fruits of life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252010.html"
source_title="Commentary on the Gospel of John, Book 10"


[[commentary]]
quote='''
For it is the function of the vine to nourish the branches, and of the tiller of the soil to tend them. And if we think aright, we shall believe that neither the one function, if performed apart from the Father, nor the other apart from the Son or the Holy Ghost, could sustain the whole. For all proceeds from the Father by the Son in the Spirit, as we have said. Very appropriately now the Saviour called the Father a Husbandman, and it is not at all difficult to assign the cause. For it was to the intent that no one might think that the Only-begotten merely exercised care over us that He represents God the Father as co-operating with Him, calling Himself the Vine that quickens His own branches with life and productive power, and the Father a Husbandman, and for this reason teaching us that providential care over us is a sort of distinct activity of the Divine Substance.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252010.html"
source_title="Commentary on the Gospel of John, Book 10"
