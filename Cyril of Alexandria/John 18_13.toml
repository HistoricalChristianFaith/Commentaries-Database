[[commentary]]
quote='''
And they bring Him to Annas, who was the father-in-law of Caiaphas, whence we may conclude that he was the prime mover and contriver of the iniquity against Christ, and that the traitor, when he received his hire, obtained from him the band to take Christ. He is, therefore, taken away to him first of all. For the Jews were bent on showing to us, that that was indeed truly spoken of them which the prophet put into their mouths: *Let us bind the righteous Man, for He is useless unto us.*
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252011.html"
source_title="Commentary on the Gospel of John, Book 11"
