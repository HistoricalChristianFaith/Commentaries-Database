[[commentary]]
quote='''
Herein also the Jews show themselves indeed lawbreakers, and more inclined to give way to their own inclinations than to honour their ancient commandments; for though the Mosaic Law ordered that a man who had committed involuntary homicide should be released, and not a man like Barabbas (for how could such a thing be?), they prefer to ask for a notorious robber. And that the man here named was, in fact, a dangerous and brutal criminal, and not free from blood-guiltiness, the words of the inspired Peter to the people of the Jews will make clear to us: But ye denied the Holy and Righteous One, and asked for a murderer to be granted unto you. For they preferred a robber to Him Who regarded not His equality with God the Father, and took our poverty upon Him for this very end, that He might deliver us from the true murderer, that is, Satan; and they were men adorned with the priesthood of the Law, and who greatly vaunted themselves thereon. Yet they passed by and utterly rejected the commandment, Judge righteous judgment, and justified the murderer, condemning Christ, and cried with one accord: Not this Man, but Barabbas.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html"
source_title="Commentary on the Gospel of John, Book 12"
