[[commentary]]
quote='''
He said not positively to them I am he, but rather leads them to the certainty of the fact, in order that receiving their faith in Him, with their reason agreeing thereto, they might return to him who sent them. Hence He made not answer to the words, but to the intention of him who sent them; as it follows, And Jesus answering said unto them, Go your way, and tell John what things you have seen and heard: as if He said, Go and tell John the things which ye have heard indeed through the Prophets, but have seen accomplished by Me. For He was then performing those things which the Prophets prophesied He would do; that is of which it is added, For the blind see, the lame walk.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Or else, He wished by this to show that whatever was passing in their hearts, could not be hid from His sight. For they were those who were offended at Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Here see I pray the beautiful art of the Saviour's management. For He does not simply say, I am; though had He so spoken, it would have been true: but He rather leads them to the proof given by the works themselves, in order that having accepted faith in Him on good grounds, and being furnished with knowledge from what had been done, they might so return to him who sent them. "For go, He says, tell John the things that ye have seen and heard." For ye have heard indeed, He says, that I have raised the dead by the all-powerful word, and by the touch of the hand: ye have seen also, while ye yourselves stood by, that those things that were spoken of old time by the holy prophets are accomplished: the blind see, the lame walk, the lepers are cleansed, and the dumb hear, and the dead arise, and the poor are preached unto. All these things the blessed prophets had before announced, as about in due time to be wrought by My hands. If then I bring to pass those things that were prophecied long before, and ye are yourselves spectators of them, return and tell those things which ye have seen with your own eyes accomplished by My might and ability, and which at various times the blessed prophets foretold.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252027-38%2520(Luke%25206-20-7-28).html'
source_title="Commentary on the Gospel of Luke, Sermon 37"
