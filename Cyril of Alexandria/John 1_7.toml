[[commentary]]
quote='''
The word This is full of declaration of virtue and praise of person. For he that was sent, he says, from God, he that with reason struck with astonishment the whole of Judaea, by the gravity of his life and its marvellous exercise in virtue, he that is fore-announced by the voice of the holy Prophets: called by Isaiah, The voice of him that crieth in the wilderness, and by the blessed David, a lamp fore-ordained for Christ; This man came for a witness to hear witness of the Light. He here calls God the Word Light, and shows that He is One and strictly the very actual Light, with Whom there is by nature nought else that has the property of illumining, and that is not lacking light. Therefore foreign and, so to say, of other nature than the creature is the Word of God, since verily and truly is He strictly Light, the creature participate of light. He then that is unclassed with things made, and conceived of therefore as being of other nature than they, how will He be originate, rather how will He not be within the limits of Deity and replete with the Good Nature of Him who begat Him?
'''
source_title="Commentary on the Gospel of John, Book 1"
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25201.html"


[[commentary]]
quote='''
And since (according to what was said by God through Moses), At the mouth of two and three witnesses shall every word be established, wisely does he bring in addition to himself the blessed Baptist, and introduces him along with himself a most noteworthy witness. For he did not suppose that he ought, even if of gravest weight, to demand of the readers in his book concerning our Saviour credence above that of the law, and that they should believe him by himself when declaring things above our understanding and sense. Therefore the blessed Evangelist himself testifies that The Word was in the beginning and the Word was God and was in the beginning with God and that all things were made by Him, and He was in the things made as Life, and that the Life was the Light of men, that by all these he might shew that the Son is by Nature God. And the Divine Baptist too testifies in addition to him, crying aloud, Prepare ye the way of the Lord, make straight the paths of our God. For soothly one will say that He is Very God, in Whom is by Nature inherent the dignity of lordship and it accrues not to any other rightly and truly, since to us there is one God the Father, and one Lord Jesus Christ, as Paul saith; and though there be many called gods by grace and lords both in heaven and earth, yet the Son is One with the Father Very God. Therefore, most noteworthy is the pair of holy witnesses, and credence no longer capable of blame is due to the things said, both as having received the fulness of the law, and supported by the notability of the persons.
'''
source_title="Commentary on the Gospel of John, Book 1"
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25201.html"
