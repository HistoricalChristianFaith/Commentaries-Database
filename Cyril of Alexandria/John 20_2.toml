[[commentary]]
quote='''
This excellent and pious woman would never have endured to remain at home and leave the sepulchre, had not her fear of the law for the Sabbath, and the penalty which impended upon those who transgressed it, curbed the vehemence of her zeal, and had she not, allowing ancient custom to prevail, thought she ought to withdraw her thoughts from the object of her most earnest longings. But, when the Sabbath was already past, and the dawn of the next day was appearing, she hurried back to the spot, and then, when she saw the stone rolled away from the mouth of the tomb, well-grounded suspicions seized her mind, and, calling to mind the ceaseless hatred of the Jews, she thought that Jesus had been carried away, accusing them of this crime in addition to their other misdeeds. While she was thus engaged, and revolving in her mind the probabilities of the case, the woman returned to the men who loved the Lord, anxious to obtain the co-operation of the most intimate of His disciples in her quest. And so deep-rooted and impregnable was her faith that she was not induced to esteem Christ less highly because of His death upon the cross, but even when He was dead called Him Lord, as she had been wont to do, thereby showing a truly God-loving spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 12"
