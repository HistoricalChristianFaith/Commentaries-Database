[[commentary]]
quote='''
For Christ does not hold the title Lord as an empty name of honour, like we do ourselves when, although we remain by nature mere servants, we are decorated by favour of others with titles that surpass our nature and merit: but He is in His nature "Lord," possessing authority over the universe as God; concerning Whom it is said somewhere by the voice of the Psalmist: For all things serve Thee. And He is by nature "Master" [or "Teacher"] also, for all wisdom cometh from the Lord, and by Him cometh all understanding. For inasmuch as He is wisdom He makes all intelligent beings wise, and in every rational creature both in heaven and in earth He implants the intelligence that is fitting for it. For just as, being Himself in His nature Life, He vivifies all things capable of receiving life; so also, since He is Himself the wisdom of the Father, He bestows on all the gifts of wisdom, namely, knowledge and perception of all good things. By nature therefore the Son is Lord and Master of all things.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25209.html"
source_title="Commentary on the Gospel of John, Book 9"
