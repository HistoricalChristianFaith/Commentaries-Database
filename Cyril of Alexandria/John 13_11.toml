[[commentary]]
quote='''
For although He well knew that Judas had no kindly feeling or wise consideration for his Master, but that he was full of the poison of devilish bitterness and even then devising the means whereby he might effect the betrayal, He honoured him in the same measure as the rest, and washed even his feet also, continually exhibiting the marks of His own love, and not letting loose His anger till He had tried every kind of remonstrance. For thou mayest perceive how this special characteristic also is peculiar to the Divine Nature. For although God knows what is about to happen, He brings His punishment prematurely on no man: but rather, after bearing with the guilty for the utmost length of needful time, when He sees them in no way profiting thereby, but rather remaining in their self-chosen evil ways, then at length He punishes them; showing it to be the actual result of their perverse folly, and not really an effect of His own counsel or of His will. For instance, Ezekiel on this account says: As I live, saith the Lord, I desire not the death of him that dieth, but rather that he should turn from his evil way and live. Therefore with long-suffering and forbearance our Lord Jesus the Christ still treats the traitor just as He does His other disciples, although the devil had already put into his heart to betray Him, (for this also the Evangelist was constrained to point out at the outset of the narrative;) and washes his feet, thus making his impious conduct absolutely inexcusable, so that his apostasy might be seen to be the fruit of the wickedness which was in him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25209.html"
source_title="Commentary on the Gospel of John, Book 9"
