[[commentary]]
quote='''
For we fight against spiritual wickedness in high places; (Eph. 6:12.) but there presses upon us a multitude also of other enemies, fleshly lust, the law of sin raging in our members, and various passions, that is, a dreadful multitude of enemies.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"Or what king, He says, wishing to make war with another king, does not consider with himself, whether with his ten thousand he can prevail over one who is more mighty than himself?" And what does this mean? "Our wrestle is not against blood and flesh, but against governments; against empires; against the worldholders of this darkness; against wicked spirits in the heavenly regions." We have too a crowd, as it were, of other enemies, the carnal mind, the law that rages in our members, passions of many kinds, the lust of pleasure, the lust of the flesh, the lust of wealth, and others: with these we must wrestle; this is our savage troop of enemies. How therefore shall we conquer? By believing that "in God we shall do valiantly, as Scripture says, and He shall bring to naught those that oppress us:" In this confidence one of the holy prophets said, "Behold the Lord helps me: who shall make me ashamed?" And the divine David also sings, "The Lord is my light, and my Saviour: whom shall I fear? The Lord is the helper of my life, at whom shall I tremble?" For He is our strength, and by Him we shall gain victory: for He has given unto us to tread upon serpents and scorpions, and upon all the power of the enemy.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252099-109%2520%28Luke%252013-22-16-13%29.html"
source_title="Commentary on the Gospel of Luke, Sermon 105"