[[commentary]]
quote='''
But what did he tell them to say? “Behold, I cast out demons and perform cures today and tomorrow, and the third day I finish my course.” You see that he declares his intention of performing what he knew would grieve the troop of Pharisees. So they drive him from Jerusalem, fearing that by the display of miracles he will win many to faith in himself. But inasmuch as their purpose there did not escape him since he was God, he declares his intention of performing what they hated and says that he shall also rebuke unclean spirits and deliver the sick from their sufferings and be perfected. This means that of his own will he will endure the passion on the cross for the salvation of the world. He knew, therefore, as it appears, both how and when he would endure death in the flesh.
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 100"


[[commentary]]
quote='''
Or else the discourse seems to change here, and not to refer so much to the character of Herod as some think, as to the lies of the Pharisees. For He almost represents the Pharisees themselves to be standing near, when He said, Go tell this fox, as it is in the Greek. Therefore he commanded them to say that which might rouse the multitude of Pharisees. Behold, said He, I cast out devils, and I do cures to day and to morrow, and on the third day I shall be perfected. He promises to do what was displeasing to the Jews, namely, to command the evil spirits, and deliver the sick from disease, until in His own person He should undergo the suffering of the cross.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
