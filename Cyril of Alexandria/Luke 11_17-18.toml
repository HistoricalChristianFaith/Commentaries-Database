[[commentary]]
quote='''
And what said Christ to these things? First, indeed, He proves Himself to be God, by knowing even that which was secretly whispered among them: for He knew their thoughts. And it is an act that altogether belongs to God, to be able to know what is in the mind and heart, and even what is spoken anywhere by men secretly. ... Very wisely therefore, omitting these things, He proceeds to arguments, drawn indeed from common things, but which have the force of truth in them; "For every kingdom," He says, "divided against itself, becomes desolate; and every house against a house, falls: and if Satan be divided against himself, how shall his kingdom stand?" For that which establishes kingdoms is the fidelity of subjects, and the obedience of those under the royal sceptre: and houses are established when those who belong to them in no way whatsoever thwart one another, but, on the contrary, accord both in will and deed. And so I suppose it would establish the kingdom too of Beelzebub, had he determined to abstain from every thing contrary to himself. How then does Satan cast out Satan? It follows then that devils do not depart from men of their own accord, but retire unwillingly. Satan, He says, does not fight with himself. He does not rebuke his own satellites. He does not permit himself to injure his own armour-bearers. On the contrary, he aids his kingdom. It remains, therefore for you to understand, that I crush Satan by divine power.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252066-80%2520(Luke%252010-22-11-18).html"
source_title="Commentary on the Gospel of Luke, Sermon 80"
