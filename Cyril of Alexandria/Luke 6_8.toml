[[commentary]]
quote='''
For this is the way of the envious man, he feeds in himself his pang of grief with the praises of others. But the Lord knew all things, and searches the hearts; as it follows, But he knew their thoughts, and said to the man who had the withered hand, Rise up, and stand. And he arose, and stood forth, that perchance he might stir up the cruel Pharisees to pity, and allay the flames of their passion.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Once more he spoke to this; "he reveals deep and mysterious things; he knows what is in the darkness, and the light dwells with him." And why did he do this? Perhaps it might be to move the cruel and unpitying Pharisee to compassion. The man's malady [his withered hand] perhaps might shame them and persuade them to dispel the flames of their envy.
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 23"
