[[commentary]]
quote='''
Great then is the praise of mercy. For this virtue makes us like unto God, and imprints upon our souls certain signs as it were of a heavenly nature. Hence it follows, Be ye then merciful, as your heavenly Father also is merciful.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Closely neighbouring, so to speak, upon the virtues which we have just mentioned is compassion, of which He next makes mention. For it is a most excelling thing, and very pleasing to God, and in the highest degree becoming to pious souls: and concerning which it may suffice for us to imprint upon our mind that it is an attribute of the divine nature. "For be ye, He says, merciful, as also your heavenly Father is merciful." But that we shall be recompensed with bountiful hand by God, Who giveth all things abundantly to them that love Him, He has given us full assurance by saying, that "good measure, and squeezed down, and running over shall they give into your bosom:" adding this too, "for with what measure ye mete, it shall be measured to you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252027-38%2520(Luke%25206-20-7-28).html'
source_title="Commentary on the Gospel of Luke, Sermon 29"
