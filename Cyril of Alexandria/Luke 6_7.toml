[[commentary]]
quote='''
The miracle sometimes converts to faith those who had disbelieved the word, but the Pharisees watched him to see if he would heal on the sabbath. The nature of an envious person is such that he makes the praises of others food for his own disease and is wickedly maddened by their reputation.
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 23"
