[[commentary]]
quote='''
Having now defined the good Will of the Father, He makes it clear, and sets it forth more at large for the consideration of the hearers, through repeating it yet again. For what the mode of bringing is, and what any gain from being brought, He clearly explains. The Father then giveth to the Son Who hath Power to quicken them, things lacking life, He giveth thus, through knowledge inserting in each one, the true apprehension of the Son, and power to understand purely that He is God of Very God the Father, that he thus minded, and adorned with contemplations hereto belonging, may be brought to the reward of faith, that is a lasting and endless life in bliss. The Father then bringeth to the Son by knowledge and God-befitting Contemplation, those to whom He decreed the Divine grace. The Son receiveth and quickeneth them, and engrafting His Own Good into them who are of their own nature apt to decay, and shedding upon them as a spark of fire the life-giving Power of the Spirit, re-formeth them whole wholly unto immortality. But when thou hearest, that the Father brings them, and that the Son gives the power of living anew to them that run to Him, do not go off into absurd fancies, as though Each were supposed to do Individually and severally what belongs by fitness of Nature unto Each, but rather understand that the Father is Co-worker with the Son, and likewise the Son with the Father, and that our salvation and recovery from death to life is the Work (so to say) of the Whole Holy Trinity.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25204.html"
source_title="Commentary on the Gospel of John"
