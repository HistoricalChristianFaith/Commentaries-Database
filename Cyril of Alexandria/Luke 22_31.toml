[[commentary]]
quote='''
To humble therefore our tendency to superciliousness, and to repress ambitious feelings, Christ shows that even he who seemed to be great is nothing and infirm. He therefore passes by the other disciples, and turns to him who is the foremost, and set at the head of the company, and says; "that Satan has many times desired to sift you as wheat:" that is, to search and try you, and expose you to intolerable blows. For it is Satan's wont to attack men of more than ordinary excellence, and, like some fierce and arrogant barbarian, he challenges to single combat those of chief repute in the ways of piety. So he challenged Job, but was defeated by his patience, and the boaster fell, being vanquished by the endurance of that triumphant hero. But human nature he makes his prey, for it is infirm, and easy to be overcome: while he is harsh and pitiless and unappeasable in heart. For, as the sacred Scripture says of him, "His heart is hard as a stone: and he stands like an anvil that cannot be beaten out." Yet he is placed under the feet of the saints by Christ's might: for He has said, "Behold, I have given you to tread on serpents and scorpions, and upon all the power of the enemy, and nothing shall hurt you." "Satan therefore, He says, has desired to sift you like wheat: but I have offered supplication in your behalf, that your faith fail not."

See again, He humbles Himself to us, and speaks according to the limits of man's estate, and yet He is God by nature, even though He became flesh. For though He is the power of the Father, by Whom all things are preserved, and from Whom they obtain the ability to continue in well-being, He yet says that He offers supplication as a man. For it was necessary, yes necessary, for Him Who, for the dispensation's sake, became like to us, to use also our words, when the occasion called Him thereto in accordance with what the dispensation itself required. "I have supplicated therefore, He says, that your faith fail not." Now by this then He shows, that if he had been yielded up to Satan to be tempted, he would have proved altogether unfaithful: since, even when not so yielded up, he proved weak from human feebleness, being unable to bear the fear of death. For he denied Christ, when a young girl troubled him in the high priest's palace by saying, "And you also are one of His disciples."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520135-145%2520%28Luke%252020-19-22-38%29.html"
source_title="Commentary on the Gospel of Luke, Sermon 144"
