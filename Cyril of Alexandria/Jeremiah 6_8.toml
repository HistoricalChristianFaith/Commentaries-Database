[[commentary]]
quote='''
It was that thou mayest learn that God silently and noiselessly observes the affairs of men, and watches the course of each one's life; and so it is written, "The paths of a man are before the eyes of God; and He looks at all his tracks." And as He is good, and willeth that all men should be saved, He often purifies those who are entangled in sins by inflicting sickness upon their body. For so He somewhere says by the voice of Jeremiah, "Thou shalt be taught, O Jerusalem, by labour and the scourge." And the writer of the book of Proverbs also has somewhere said, "My son, despise not thou the teaching of the Lord, nor faint when thou art convicted by Him, for whom the Lord loveth, He chasteneth, and scourgeth every son whom He accepteth." Well, therefore, does Christ announce that He will cut away the cause of the disease, and the very root, as it were, of the malady, even sin: for if this be removed, necessarily must the disease which sprung from it be also at the same time taken away.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252012-25%2520(Luke%25204-1-6-17).html"
source_title="Commentary on the Gospel of Luke, Sermon 18"
