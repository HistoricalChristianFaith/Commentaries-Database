[[commentary]]
quote='''
But what of the publican? He stood, it says, "afar off," not even venturing, so to speak, to raise up his eyes on high. You see him abstaining from all boldness of speech, as having no right thereto, and smitten by the reproaches of conscience: for he was afraid of being even seen by God, as one who had been careless of His laws, and had led an unchaste and dissolute life. You see also that by his external manner, he accuses his own depravity. For the foolish Pharisee stood there bold and broad, lifting up his eyes without scruple, bearing witness of himself, and boastful. But the other feels shame at his conduct: he is afraid of his Judge, he smites upon his breast, he confesses his offences, he shows his malady as to the Physician, he prays that he may have mercy. And what is the result? Let us hear what the Judge says, "This man, He says, went down to his house justified rather than the other."

Let us therefore "pray without ceasing," according to the expression of the blessed Paul: but let us be careful to do so aright. The love of self is displeasing to God, and He rejects empty haughtiness and a proud look, puffed up often on account of that which is by no means excellent. And even if a man be good and sober, let him not on this account suffer himself to fall away into shameful pride: but rather let him remember Christ, Who says to the holy apostles, "When you have done all those things, those namely which have been commanded you, say, We are unprofitable servants, we have done that which was our duty to do." For we owe unto God over all, as from the yoke of necessity, the service of slaves, and ready obedience in all things. Yes, though you lead an excellent and elect life, don't exact wages from the Lord; but rather ask of Him a gift. As being good, He will promise it you: as a loving Father, He will aid you. Restrain not yourself then from saying, "God be merciful to me the sinner."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520110-123%2520(Luke%252016-14-18-27).html'
source_title="COMMENTARY ON LUKE, HOMILY 120"
