[[commentary]]
quote='''
And hereby He teaches them not to be ever scornfully declaiming against the honour bestowed on others, but each one to think his fellow-servant to excel himself and in every possible respect to be superior. And very excellent this teaching is: for I do not think anyone can shew us anything to match a temper that is ever averse to arrogance; and nothing so severs brethren and friends as the unbridled passion for miserable and petty dignities. For somehow we are always grasping after what is greater, and the empty honours of life are ever persuading our easily-yielding minds to vault up towards a more brilliant station. In order therefore that we may save ourselves from this disease, and obtain final relief from so loathsome a passion,—for the passion for vain-glory is a mere fraud, and nothing less,—let us engrave on our inmost hearts the memory of Christ the King of all men washing His disciples' feet, to teach us also to wash one another's feet. For by this means every tendency to arrogance will be kept in restraint, and every form of worldly vain-glory will depart from among us. For if He Who is by nature Lord acts the part of a servant, how shall one that is a servant refuse to undergo any of those things that are altogether proper for his condition, without suffering in consequence the worst possible penalty?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25209.html"
source_title="Commentary on the Gospel of John, Book 9"
