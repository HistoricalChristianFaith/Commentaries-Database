[[commentary]]
quote='''
And He intimates by the words before us, that if they would take pleasure in being rulers of the people they must believe and must receive through Him the Divine call to undertake this dignity, in order that they might have their rule unshaken and well established; which of course was the case with the holy Apostles, and with the Teachers of the holy Churches after them; to whom also the porter openeth. That is, either the Angel who is appointed to preside over the churches and to assist those whose lot is to minister in holy things for the good of the people, or else the Saviour Himself, Who is at the same time both the Door and the Lord of the Door. At all events, He very well asserts that the flock of sheep rightly obey and yield to the voice of the shepherd, but very quickly turn away from the voice of strangers; so that thou mayest understand a true matter by extending the application of the argument to something more general. For in the churches we teach by bringing forward our doctrines from the inspired Scripture, and setting forth the Evangelic and Apostolic Word as a sort of spiritual nourishment. And they who believe in Christ and are conspicuous for unperverted faith, are obedient listeners to such teaching; but they turn away from the voices of falsifiers, and avoid them as a deadly evil.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25206.html"
source_title="Commentary on the Gospel of John, Book 6"
