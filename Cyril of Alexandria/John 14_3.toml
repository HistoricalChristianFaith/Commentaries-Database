[[commentary]]
quote='''
Therefore if the mansions in God the Father's home had not been many in number, He would have said that He was going on before them, namely to prepare beforehand the habitations of the saints: but knowing that there are many such, already fully prepared and awaiting the arrival of those who love God, He says that He will depart not for this purpose, but for the sake of securing the way to the mansions above, to prepare a passage of safety for you, and to smooth the path that was impassable in old time. For heaven was then utterly inaccessible to mortal man, and no flesh as yet had ever trodden that pure and all-holy realm of the angels; but Christ was the first Who consecrated for us the means of access to Himself, and granted to flesh a way of entrance into heaven; presenting Himself as an offering to God the Father, as it were the firstfruits of them that are asleep and are lying in the tomb, and the first of mankind that ever appeared in heaven.… For it is not that He may present Himself before the presence of God the Father that Christ has ascended up on high: for He ever was and is and will be continually in the Father, in the sight of Him Who begat Him, for He it is in Whom the Father ever takes delight: but now He Who of old was the Word with no part or lot in human nature, has ascended in human form that He may appear in heaven in a strange and unwonted manner. And this He has done on our account and for our sakes, in order that He, though found as a man, may still in His absolute power as Son, while yet in human form, obey the command: Sit Thou on My right hand, and so may transfer the glory of adoption through Himself to all the race. For in that He has appeared in human form He is still one of us as He sits at the right hand of God the Father, even though He is far above all creation; and He is also Consubstantial with His Father, in that He has come forth from Him as truly God of God and Light of Light. He has presented Himself therefore as Man to the Father on our behalf, that so He may restore us, who had been removed from the Father's presence by the ancient transgression, again as it were to behold the Father's face.… "I shall not then," He says, "depart to prepare mansions for you, for many there are already, and to make new habitations for creation is needless; but I go to make ready a place for you on account of the sin that has mastery over you, that so those who are on the earth may be able to be mingled with the holy angels; for else the saintly multitude of those above would never have mingled with those who had been so defiled. But now, when I shall have accomplished this work, and united the world below to the world above, and given you a path of access to the city on high, I will return again at the time of the regeneration, and receive you with Myself; that where I am, there ye may be also."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25209.html"
source_title="Commentary on the Gospel of John, Book 9"
