[[commentary]]
quote='''
Now the ruler of the synagogue is convicted a hypocrite, in that he leads his cattle to watering on the Sabbath-day, but this woman, not more by birth than by faith the daughter of Abraham, he thought unworthy to be loosed from the chain of her infirmity. Therefore He adds, And ought not this woman, being a daughter of Abraham, whom Satan has bound, lo, these eighteen years, to be loosed from this bond on the sabbath-day? The ruler preferred that this woman should like the beasts rather look upon the earth than receive her natural stature, provided that Christ was not magnified.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
