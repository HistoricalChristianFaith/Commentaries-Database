[[commentary]]
quote='''
And He says that He gives to those that follow Him as a recompense and reward, eternal life and exemption from death, or corruption, and from the torments that will be brought upon the transgressors by the Judge. And by the fact of His giving life, He shews that He is in His Nature Life, and that He furnishes this from Himself and not as receiving it from another. And we understand by eternal life, not [only] the length of days which all, both good and bad, are going to enjoy after the resurrection, but also the spending it in bliss.

It is possible also to understand by "life" the mystical blessing by which Christ implants in us His own life through the participation of His own Flesh by the faithful, according to that which is written: He that eateth My Flesh and drinketh My Blood hath eternal life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25207%2520(Fragments).html"
source_title="Commentary on the Gospel of John, Book 7"


[[commentary]]
quote='''
The faithful also have the succour of Christ, the devil not being able to snatch them; and they who have an endless enjoyment of good things, remain in it, no one henceforth snatching them away from the bliss that is given to them into punishment or torments. For it is not possible that they who are in Christ's hand should be snatched away to be punished, because of Christ's great might; for "the hand," in the Divine Scripture, signifies "the power:" it cannot be doubted therefore that the hand of Christ is unconquerable and mighty to all things.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25207%2520(Fragments).html"
source_title="Commentary on the Gospel of John, Book 7"
