[[commentary]]
quote='''
We shall find that indeed true that is written by one of the wise men, The Spirit of the Lord hath filled the world, and the ear of hearing heareth all things. But to those who of utter folly, yea rather of blasphemy, suppose that ought they utter will escape the Divine Mind, the Godlike Psalmist says, Understand, ye brutish among the people, and ye fools, when will ye be wise? He that planted the ear, heareth He not? for how could it possibly happen that He should not surely hear all things, who implanteth the sense of hearing into them that were made by Him? See therefore in this too again that the Lord is by Nature God. For the secret whispers of the Jews in the crowd He is not ignorant of; He receives them into His Ears in God-befitting way, albeit from fear of the rulers they say nothing openly concerning Him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25204.html"
source_title="Commentary on the Gospel of John, Book 4"
