[[commentary]]
quote='''
Christ does not wish them to be quit of human affairs, or to be rid of life in the body, when they have not yet finished the course of their apostleship, or distinguished themselves by the virtues of a godly life; but he wishes them, after they have lived their lives in the company of men in the world, and have guided the footsteps of those who are His to a state of life well pleasing to God, then at last, with the glory they have achieved, to be carried into the heavenly city, and to dwell with the company of the holy angels.… Besides, if the Saints chose to keep themselves apart from our daily life, it would infer no small loss to those who are unstable in the faith; nay, they could in nowise be guided in the way of righteousness, without the aid of those who are able to lead them therein. Paul knew this when he said, To depart and be with Christ is far better for me, yet to abide in the flesh is more needful for your sake.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252011.html"
source_title="Commentary on the Gospel of John - Book 11"
