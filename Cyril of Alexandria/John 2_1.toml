[[commentary]]
quote='''
Galilee. Let him that loves learning again note well: for not in Jerusalem is the gathering, but without Judaea is the feast celebrated, as it were in the country of the Gentiles. For it is Galilee of the gentiles, as the prophet saith. It is I suppose altogether plain, that the synagogue of the Jews rejected the Bridegroom from Heaven, and that the church of the Gentiles received Him, and that very gladly.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25202.html"
source_title="Commentary on the Gospel of John, Book 2"
