[[commentary]]
quote='''
But we ought to consider not so much the worker of the miracles, as the grace which was in him, who, by the power of Christ, performed miracles. But what if there should be both those which be numbered together with the Apostles, and those who are crowned with the grace of Christ; there are many diversities in Christ's gifts. But because the Saviour had given the Apostles power to cast out evil spirits, (Matt. 10:8.) they thought no one else but themselves alone was permitted to have this privilege granted to him, and therefore they come to enquire if it were lawful for others also to do this.

As if He said, On the side of you who love Christ, are all they who wish to follow those things which conduce to His glory, being crowned with His grace.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"Teacher, we saw one casting out devils in Thy name, and we forbade him." Has the sting of envy troubled the holy disciples? Do they grudge those highly favoured? Have even they admitted within them a passion so abominable and hateful to God? "We saw one, they say, casting out devils in Thy name, and we forbade him." Tell me, dost thou forbid one who in Christ's name troubles Satan, and crushes evil demons? How was it not thy duty rather to reflect, that he was not the doer of these wonders, but that the grace which was in him wrought the miracle by the power of Christ? How therefore dost thou forbid him who in Christ wins the victory? "Yes," he saith; "for he followeth not with us." Oh blind speech! For what if he be not numbered among the holy Apostles, who is crowned with Christ's grace, yet is he equally with you adorned with apostolic powers. There are many diversities of Christ's gifts, as the blessed Paul teacheth, saying; "that to one is given the word of wisdom, but to another the word of knowledge: and to another faith; and to another gifts of healings."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252047-56%2520(Luke%25209-1-56).html'
source_title="COMMENTARY ON LUKE, HOMILY 55"


[[commentary]]
quote='''
What therefore is the meaning of his "not walking with us," or what is the force of the expression? Look then; for I will tell you as well as I can. The Saviour gave the holy Apostles authority over unclean spirits, to cast them out, and to heal all disease and all sickness among the people. And so they did; nor was the grace given them ineffectual. For they returned with joy, saying; "Lord, even the devils are subject to us in Thy name." They imagined, therefore, that leave was given not to any one else but to themselves alone to be invested with the authority which He had granted them. For this reason they draw near, and want to learn, whether others also might exercise it, even though they had not been appointed to the apostleship, nor even to the office of teacher.

We find something like this also in the ancient sacred Scriptures. For God once said to the hierophant Moses: "Choose thee seventy men of the elders of Israel, and I will take of the Spirit that is upon thee, and give it," He says, "to them." And when those who were chosen had assembled at the former tabernacle, two men only excepted, who had remained in the camp, and the spirit of prophecy descended upon them, not only those who were assembled in the holy tabernacle prophesied, but those also who had remained in the camp. But "Jeshua, it says, who stood before Moses, said, Eldad and Midad, lo! they prophesy in the camp. My lord Moses forbid them. And Moses said unto Jeshua, Enviest thou me? Would that all the Lord's people were prophets, the Lord putting His Spirit upon them." But it was Christ Who at that time made the hierophant Moses thus speak by the Holy Ghost: and here also in person He saith to the holy Apostles; "Forbid not him who is crushing Satan," that is, in His name, "for he is not against you," He says; "for he who is not against you is on your part." For on the part of us who love Christ, are all who wish to act to His glory, and are crowned by His grace. And this is a law to the churches continuing even to this day. For we honour only those who lift up holy hands, and purely and without fault or blame, in Christ's name, rebuke unclean spirits, and deliver multitudes from various diseases: for we know that it is Christ Who worketh in them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252047-56%2520(Luke%25209-1-56).html'
source_title="COMMENTARY ON LUKE, HOMILY 55"
