[[commentary]]
quote='''
But inasmuch as the greatness of the clangor made their terror now unendurable, as having no other hope of safety except Him only Who is the Lord of powers even Christ, they arouse Him, saying, Master, Master, save us, we perish: for the Evangelist says that He was asleep. With most wise purpose, as it seems to me, was this also done. For some one, I imagine, may say, Why did He fall asleep at all? To which we reply, that the event was so arranged as to be good and profitable. For that they might not ask aid of Him immediately when the tempest began to dash upon the ship, but when, so to speak, the evil was at its height, and the terrors of death were troubling the disciples; that so the might of His godlike sovereignty might be more manifest, in calming the raging sea, and rebuking the savage blasts of the wind, and changing the tempest to a calm, and that the event might thus become a means of improvement to them that were sailing with Him, He purposely fell asleep.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252039-46%2520(Luke%25207-31-8-56).html"
source_title="Commentary on the Gospel of Luke, Sermon 43"
