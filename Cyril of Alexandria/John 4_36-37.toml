[[commentary]]
quote='''
That is, raising up the eye of your understanding a little from the affairs of the earth, consider ye the spiritual sowing, that it hath progressed already and whitened unto the floor, and at length calls for the reaper's sickle unto itself. But from the similarity to things in actual life, you will see what is meant. For you will conceive that the spiritual sowing and multitude of spiritual ears, are they who, tilled beforehand by the voice of the Prophets, are brought to the faith that should be shewn through Christ. But it is white, as being already ripe and ready to the faith, and confirmed unto piety. But the sickle of the reaper is the glittering and most sharp word of the Apostle, cutting away the hearers from the worship according to the law, transferring them to the floor, that is, to the Church of God: there they bruised and pressed by good toils shall be set forth pure wheat worthy of the garner of Him Who gathereth it.

This the word of the reapers will effect, yet shall it not be without an hire: for it shall surely gather for them fruit which nourisheth unto life eternal: nor shall they who receive rejoice in themselves alone but as having entered into the labours of the Prophets, and having reaped the seed fore-tilled by them, shall fill up one company with them. But I suppose that the most wise Paul, having throughly learnt the types of things to come, hence says of the holy fathers and Prophets that, These all, perfected through faith, received not the promise, God having provided some better thing for us, that they without us should not be made perfect. For the Saviour thought good, that the reaper should rejoice together with him who before had sown.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25202.html"
source_title="Commentary on the Gospel of John, Book 2"
