[[commentary]]
quote='''
A most base pest, my beloved, is double-dealing and hypocrisy in our actions and conduct; and for a man to make pretence of pleasant-spoken words, and of a tongue anointed, so to speak, with the honey of deception, while the heart is full of utter bitterness. Of such we say, in the words of one of the holy prophets, "Their tongue is a piercing arrow: the words of their mouth are deceitful: he speaks peacefully to his neighbour, and enmity is in his heart." And again; "Their words are smoother than oil, yet are they arrows:" by which is meant that they have the force of darts falling violently and shot forth from bows.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252066-80%2520(Luke%252010-22-11-18).html"
source_title="Commentary on the Gospel of Luke, Sermon 68"


[[commentary]]
quote='''
Christ very justly condemned him with the greater severity, saying, "Judas, do you betray the Son of man with a kiss?" And Matthew says, that when the traitor drew near to Christ, our common Saviour, he both kissed Him, and added thereto, "Hail, Master." Do you say hail to Him Who by your instrumentality is made the prey of death? How could such a word possibly be true? So that we see, that inasmuch as that false one, Satan, was within Him, he used falsehood even in saying, Hail. Because of such deeds the prophet somewhere says, "Their tongue is a piercing spearhead: the words of their mouth are deceitful: to his neighbour he speaks things of peace, but in his soul there is enmity."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520146-156%2520(Luke%252022-39-24-45).html"
source_title="Commentary on the Gospel of Luke, Sermon 148"
