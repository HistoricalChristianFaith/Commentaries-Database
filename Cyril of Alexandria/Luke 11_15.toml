[[commentary]]
quote='''
And upon the accomplishment of this wonderful act, the multitude extolled Him with praises, and hastened to crown the worker of the miracle with godlike honour. But certain of them, it says, being Scribes and Pharisees, with hearts intoxicated with pride and envy, found in the miracle fuel for their malady; and not only did they not praise Him, but betook themselves to the very opposite. For having stripped Him of the godlike deeds He had wrought, they assigned to the Devil almighty power, and made Beelzebub the source of Christ's might. "For by him, they said, He casts out devils."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252066-80%2520(Luke%252010-22-11-18).html"
source_title="Commentary on the Gospel of Luke, Sermon 80"
