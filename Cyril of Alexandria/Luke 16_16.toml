[[commentary]]
quote='''
For Moses, He says, and with him the company of the holy prophets, before announced the import of My mystery to the inhabitants of earth: both the law declaring by shadows and types that to save the world I should even endure the death of the flesh, and abolish corruption by rising from the dead; and the prophets also speaking words of the same import as the writings of Moses. It is nothing strange therefore, He says, or that was not known before, that you spurn My words, and despise everything that would avail for your good. For the word of prophecy concerning Me, and you, extends until the holy Baptist John: but "from the days of John, the kingdom of heaven is preached, and every one takes it by force." And by the kingdom of heaven He here means justification by faith, the washing away of sin by holy baptism, sanctification by the Spirit, worshipping in the Spirit, the service that is superior to shadows and types, the honour of the adoption of sons, and the hope of the glory about to be given to the saints.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520110-123%2520%28Luke%252016-14-18-27%29.html"
source_title="Commentary on the Gospel of Luke, Sermon 110"


[[commentary]]
quote='''
The kingdom of heaven therefore, He says, is preached, for the Baptist has stood forth in the midst saying, "Prepare you the way of the Lord:" and has shown, that lo! He is already near, and as it were within the doors, even the true Lamb of God, Who bears the sin of the world. Whosoever therefore is a hearer and lover of the sacred message takes it by force: by which is meant, that he uses all his earnestness and all his strength in his desire to enter within the hope. For, as He says in another place, "The kingdom of heaven is taken by violence and the violent seize upon it."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520110-123%2520%28Luke%252016-14-18-27%29.html"
source_title="Commentary on the Gospel of Luke, Sermon 110"
