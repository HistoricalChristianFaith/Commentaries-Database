[[commentary]]
quote='''
Christ, when He gave the Spirit unto them, said: Whosesoever sins ye forgive, they are forgiven; and whosesoever sins ye retain, they are retained; though only the living God is able and powerful to grant unto sinners remission of sins; for whom could it befit to pardon the transgressions that sinners have committed against the Divine Law, save the Lawgiver Himself? You may, if you choose, see the meaning of the saying from the analogy of human affairs. Who has authority to meddle with the decrees of earthly monarchs, and who tries to undo that which has been ordained by the will and judgment of rulers, save only someone who is invested with regal honour and dignity? Therefore, wise was the saying, Insolent is he who saith unto the king, Thou breakest the law. In what way, then, and in what sense did the Saviour invest His disciples with the dignity which befits the Nature of God alone? The Word that is in the Father cannot err; and this He did, and whatsoever He doeth, He doeth well. For He thought it meet that they who have once been endued with the Spirit of Him Who is God and Lord, should have power also to remit or retain the sins of whomsoever they would, the Holy Spirit That dwelt in them remitting or retaining them according to His Will, though the deed were done through human instrumentality.

They who have the Spirit of God remit or retain sins in two ways, as I think. For they invite to Baptism those to whom this sacrament is already due from the purity of their lives, and their tried adherence to the faith; and they hinder and exclude others who are not as yet worthy of the Divine grace. And in another sense, also, they remit and retain sins, by. rebuking erring children of the Church, and granting pardon to those who repent; just as, also, Paul gave up him that had committed fornication at Corinth, for the destruction of the flesh, that the spirit may be saved, and admitted him again into fellowship, that he might not be swallowed up with his overmuch sorrow, as he says in his letter. When, then, the Spirit of Christ dwelling in our hearts doeth things which befit God alone, surely He is the living God, invested with the glorious dignity of the Divine Nature, and having power over sacred laws.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html"
source_title="Commentary on the Gospel of John, Book 12"

[[commentary]]
quote='''
After dignifying the holy Apostles with the glorious distinction of the apostleship, and appointing them ministers and priests of the Divine Altar, as I have just said, He at once sanctifies them by vouchsafing His Spirit unto them, through the outward sign of His Breath, that we might be firmly convinced that the Holy Spirit is not alien to the Son, but Consubstantial with Him, and through Him proceeding from the Father; He shows that the gift of the Spirit necessarily attends those who are ordained by Him to be Apostles of God. And why? Because they could have done nothing pleasing unto God, and could not have triumphed over the snares of sin, if they had not been clothed with power from on high, and been transformed into something other than they were before. Therefore, also, it was said to one of old time: The Spirit of the Lord will come upon thee, and thou shalt be turned into another man; and the Prophet Isaiah also declared that those who waited upon the Lord should renew their strength. The wise Paul, too, when he says that he surpassed some in his labours, that is, in the deeds of an Apostle, adds at once: Yet not I, but the grace of God which was with me. Besides, we say this, that the disciples would never at all have understood the mystery that is in Christ, nor have been true guides in this knowledge, if they had not advanced in the light of the Spirit to a revelation of things which surpass man's reason and understanding, a revelation which is able to point out to them the heights to which they were bound to ascend; for no man can say Jesus is Lord, as Paul says, but in the Holy Spirit. As, then, they were destined to proclaim that Jesus was the Lord, that is, to preach that He was God and Lord of necessity, therefore they received the grace of the Holy Spirit in immediate connexion with the office of apostleship, Christ granting Him unto them, not ministering to the desires of another, but rather vouchsafing Him of Himself; for the Spirit could only come down unto us from the Father through the Son. ... Our Lord Jesus Christ, transforming into the power of truth the figure of the Law, consecrates through Himself the ministers of the Divine Altar. For He is the Lamb of consecration, and He consecrates by actual sanctification, making men partakers in His Nature, through participation in the Spirit, and in some sort strengthening the nature of man into a power and glory that is superhuman.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html"
source_title="Commentary on the Gospel of John, Book 12"
