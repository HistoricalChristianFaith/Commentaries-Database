[[commentary]]
quote='''
He took thought for His mother, paying no heed to His own bitter agony, for His sufferings affected Him not. He gave her into the charge of the beloved disciple (this was John, the writer of this book), and bade him take her home, and regard her as a mother; and enjoined His own mother to regard him as none other than her true son----by his tenderness, that is, and affection, fulfilling and stepping into the place of Him, Who was her Son by nature. But as some misguided men have thought that Christ, when He thus spake, gave way to mere fleshly affection----away with such folly! to fall into so stupid an error is only worthy of a madman----what good purpose, then, did Christ hereby fulfil? First, we reply, that He wished to confirm the command on which the Law lays so much stress. For what saith the Mosaic ordinance? Honour thy father and thy mother, that it may be well with thee. His commandment unto us did not cease with exhorting us to perform this duty, but threatened us with the extreme penalty of the Law, if we chose to disregard it, and has put sin against our parents after the flesh on a par with sin against God. As, then, the Lawgiver hath ordained that we should pay such honour to our parents, surely it was right that the commandment thus proclaimed should be confirmed by the approval of the Saviour; and as the perfect form of every excellence and virtue through Him first came into the world, why should not this virtue be put on the same footing as the rest? For, surely, honour to parents is a very precious kind of virtue. And how could we learn that we ought not to lightly regard love toward them, even when we are overwhelmed by a flood of intolerable calamities, save by the example of Christ first of all, and through Him? For best of all, surely, is he who is mindful of the holy commandments, and is not diverted from the pursuit of duty in stormy and troublous times, and not in peace and quietness alone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 12"
