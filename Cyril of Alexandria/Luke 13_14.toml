[[commentary]]
quote='''
But the ungrateful ruler of the synagogue, when he saw the woman, who before was creeping on the ground, now by Christ's single touch made upright, and relating the mighty works of God, sullies his zeal for the glory of the Lord with envy, and condemns the miracle, that he might appear to be jealous for the Sabbath. As it follows, And the ruler of the synagogue answered with indignation, because that Jesus had healed on the sabbath-day, and said unto the people, There are six days in which men ought to work, and not on the sabbath-day. He would have those who are dispersed about on the other days, and engaged in their own works, not come on the Sabbath to see and admire our Lord's miracles, lest by chance they should believe. But the law has not forbidden all manual work on the Sabbath-day, and has it forbidden that which is done by a word or the mouth? Cease then both to eat and drink and speak and sing. And if thou readest not the law, how is it a Sabbath to thee? But supposing the law has forbidden manual works, how is it a manual work to raise a woman upright by a word?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
