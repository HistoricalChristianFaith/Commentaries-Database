[[commentary]]
quote='''
When these men (I mean Peter, and John the writer of this book, for he gives himself the name of the other disciple) heard these tidings from the woman's mouth, they ran with all the speed they could, and came to the sepulchre in haste, and saw the marvel with their own eyes, being in themselves competent to testify to the event, for they were two in number, as the Law enjoined. As yet they did not meet Christ risen from the dead, but infer His Resurrection from the bundle of linen clothes, and henceforth believed that He had burst asunder the bonds of death, as Holy Writ had long ago proclaimed that He would do. When, therefore, they looked at the issues of events in the light of the prophecies which turned out true, their faith was henceforth rooted on a firm basis.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html"
source_title="Commentary on the Gospel of John, Book 12"
