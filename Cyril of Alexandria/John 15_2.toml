[[commentary]]
quote='''
We must know then that being united with Him by faith, and giving effect to the manner of our union in mere barren confessions of faith, and not clenching the bond of our union by the good works that proceed from love, we will be branches indeed, but still dead and without fruit. For faith without works is dead, as the Saint says. If then after this manner the branch be seen to exist fruitlessly, depending, so to speak, from the trunk of the vine, know that such a man will encounter the pruning-knife of the husbandman. For He will wholly cut it off, and will give it to the fire to consume as worthless rubbish; for this is the judgment of the barren.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252010.html"
source_title="Commentary on the Gospel of John, Book 10"


[[commentary]]
quote='''
For God works with those who have chosen to live the best and most perfect life, and to do good works so far as in them lies, and have elected to seek perfection as citizens of God. He, as it were, uses the working-power of the Spirit as a pruning-hook, and circumcising in them sometimes the pleasures which are always calling us to fleshly lusts and bodily passions, and sometimes all those temptations which are wont to assail the souls of men, defiling the mind by divers kinds of evils. For this we say is that circumcision which is not the work of hands, but is truly that of the Spirit… And therefore they say to some, that if the branches of the vine in the figure suffer any purging, that cannot take place, I suppose, without suffering. For it is painful so far as, and to the extent that, the wood can suffer pain.… For our God, Who loves virtue, instructs us by pain and tribulation.… For in wrath will be accomplished the complete severance of the barren branches, for He sends them to punishment; but in judgment rather——that is, consideration and in mercy——will be accomplished the purging of those which bear fruit, which brings but small pain, to the quickening of their fertility, and occasioning a greater abundance of blossom springing up.… Let then the fervour that shows itself in works be combined with the confession of the faith, and let it unite action with the doctrines concerning God. For then shall we be with Christ, and experience the secure and safe power of fellowship with Him, escaping the peril that results from being cut off from Him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252010.html"
source_title="Commentary on the Gospel of John, Book 10"
