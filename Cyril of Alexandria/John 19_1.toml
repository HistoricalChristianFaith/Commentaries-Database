[[commentary]]
quote='''
He scourges Him unjustly, and suffers the crowd of soldiers to insult Him, and put a crown of thorns about His Head, and throw a purple robe upon Him, and buffet Him with the palms of their hands, and otherwise dishonour Him. For he thought he could easily put to shame the people of the Jews, if they saw the Man Who was altogether free from guilt suffering this punishment, only without a cause. He was scourged unjustly, that He might deliver us from merited chastisement; He was buffeted and smitten, that we might buffet Satan, who had buffeted us, and that we might escape from the sin that cleaves to us through the original transgression. For if we think aright, we shall believe that all Christ's sufferings were for us and on our behalf, and have power to release and deliver us from all those calamities we have deserved for our revolt from God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html"
source_title="Commentary on the Gospel of John, Book 12"
