[[commentary]]
quote='''
Observe therefore, that just as Christ described three degrees of loss, so similarly the degrees of success are equal in number. For those seeds that fall upon the pathway are snatched away by the birds: and those upon the rocks, having merely shot up, within a little while wither away: and those among the thorns are choked. But that desirable land brings forth fruit in three several degrees, as I said: a hundred, sixty, and thirtyfold. For as most wise Paul writes, "Each one severally of us has his own gift from God, one in one manner, and another in another." For we do not at all find that the successes of the saints are in equal measure. On us however it is incumbent to emulate these things that are better and superior to those of meaner kind; for so will Christ bountifully bestow happiness upon us: by Whom and with Whom, to God the Father be praise and dominion with the Holy Ghost, for ever and ever, Amen.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252039-46%2520(Luke%25207-31-8-56).html"
source_title="Commentary on the Gospel of Luke, Sermon 41"
