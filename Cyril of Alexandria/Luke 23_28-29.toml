[[commentary]]
quote='''
Signifying that in the time to come women would be bereft of their children. For when war breaks out upon the land of the Jews, all shall perish, both small and great. Hence it follows, For, behold, the days are coming, in the which they shall say, Blessed are the barren, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
"Daughters of Jerusalem, do not weep for me, but weep for yourselves and for your children. For behold, the days are coming when they will say, 'Blessed are the barren, and the wombs that never bore, and the breasts that never gave suck!' " How did this happen? When the war came on the country of the Jews, they all totally perished, small and great. Infants with their mothers and sons with their fathers were destroyed without distinction.
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 152"
