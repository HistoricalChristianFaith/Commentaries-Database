[[commentary]]
quote='''
For it was the bounden duty of the wise Evangelist to make mention of such things, that his hearers might know what even the teachers of the world were in themselves before Christ's Resurrection, and before the Holy Spirit descended upon them; and what they were thereafter, when they had received the grace of the Spirit, Which Christ called power from on high. For any one may see how very jealous they were in assuming virtue; how readily they girded up their loins to follow Christ, and to overcome perils of every sort which they so frequently encountered. But when our Saviour Christ had not yet subdued the power of death, the fear thereof was still stubborn, and altogether invincible; and they who had not yet received the Spirit, nor had their hearts steeled by grace from above, showed that their minds were not yet wholly free from human frailty, and they were not altogether unshaken by the terrors of death. For just as iron, though naturally strong, cannot encounter without injury the harder kinds of stone, if it be not strengthened in the forge; so the soul of man may be buoyed up with unslacking enthusiasm for every thing that is good, but can never be triumphant in the conflicts that so arise, except it be first perfected by the grace of the Spirit of God. Even the disciples, therefore, themselves were frail at first; but, when they had received the Spirit of Almighty God, cast aside their native weakness, and, by communion with Him, attained to exceeding boldness. It was expedient, then, that the frailty of the Saints should be recorded to the praise and glory of God, Who changed their weakness into power, and raised up, like a strong tower, their spirits, which were easily daunted even by slight dangers, and at times broken down by the mere apprehension of suffering. And that which befell a single one, or some few of the Saints, may afford us at the same time a lesson and a consolation. For we are taught thereby, not, through dwelling on our own infirmities inconsiderately, to slacken in God's service, but rather to trust in Him Who is able to make us all strong, and to boast ourselves in His miraculous works and favour shown to us beyond hope.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html"
source_title="Commentary on the Gospel of John, Book 12"
