[[commentary]]
quote='''
"But why," some one perchance may say, "did He not plainly mention the man to those whom He sent? For He did not say, Having gone to such and such a person, whoever it might be, there prepare for us at his house the passover: but simply gave them a sign—a man bearing a pitcher of water." To this then what do we reply? That lo! already Judas the traitor had promised the Jews to deliver Him to them, and was continuing in His company watching for an opportunity; and while still making profession of the love that was the duty of a disciple, he had admitted Satan into his heart, and was travailing with the crime of murder against our common Saviour Christ. He gives a sign therefore, to prevent him from learning who the man was, and running to tell those who had hired him. "For there shall meet you, He says, a man carrying a pitcher of water." Or even perchance He so speaks signifying something mystical and necessary thereby. For whither the waters enter, even those of holy baptism, there lodges Christ. How, or in what manner? In that they free us from all impurity, and we are washed by them from the stains of sin, that we may also become a holy temple of God, and partakers of His divine nature, by participation of the Holy Spirit. In order therefore that Christ may rest and lodge in us, let us receive the saving waters, confessing moreover the faith that justifies the wicked, and raises us aloft so as for us to be accounted "an upper room." For those in whom Christ dwells by faith have a mind raised aloft, unwilling to creep upon the dust, and refusing, so to speak, to be set upon the earth, and everywhere seeking that which is exalted in virtue.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520135-145%2520%28Luke%252020-19-22-38%29.html"
source_title="COMMENTARY ON LUKE, HOMILY 141"
