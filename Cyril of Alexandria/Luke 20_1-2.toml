[[commentary]]
quote='''
For the Saviour Himself reproached them, saying, "And to you, lawyers, woe! for you have taken away the key of knowledge: you enter not in yourselves, and those that are entering in you have hindered." They rise up therefore against Christ as He teaches, and wickedly and abominably call out and say, "Tell us, by what authority You do these things? Who gave You this authority?" "The law," they say, "given by Moses, and the commandment which regulates all these our institutions, enjoined that those only who are of the lineage of Levi should approach these sacred duties: they offer the sacrifices: they regulate whatever is done in the divine temple: to them is given the office of instructing, and the government of the sacred trusts. But You, as being of another tribe—for You are sprung from Judah—seize upon honours which have been set apart for us. Who gave You this authority?" O foolish Pharisee, come and let me tell you somewhat you cannot gainsay, pleading to you the cause of Christ our common Saviour. If you were acquainted with the Scriptures, which are inspired by God, and the words and predictions of the holy prophets, you would have remembered perchance the blessed David, who says in the Spirit to Christ the Saviour of all, "The Lord has sworn, and will not repent, You are a priest for ever after the order of Melchisedek." Explain, therefore, what Pharisee or Scribe has ministered to God after the order of Melchisedek, who blessed and received tithes of Abraham? And as the very wise Paul writes, "Without all contradiction the less is blessed of the better." The root and commencement therefore of the very existence of Israel, even the patriarch Abraham, was blessed by the priesthood of Melchisedek: but Melchisedek and his priesthood was a type of Christ the Saviour of us all, Who has been made our High Priest and Apostle; not bringing near to God the Father those who believe in Him, by means of bloody sacrifices and offerings of incense, but perfecting them to holiness by a service superior to the law: for "such a High Priest have we, Who has sat down at the right hand of the throne of the Majesty on high."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520124-134%2520%28Luke%252018-28-20-18%29.html"
source_title="COMMENTARY ON LUKE, HOMILY 132"
