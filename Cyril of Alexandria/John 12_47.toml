[[commentary]]
quote='''
They will be self-condemned therefore, He says, who refuse to hear Him and do not accept the saving faith. For He that came to illumine, came not in order to judge, but to save. He therefore that disobeys and thereby subjects himself to the greatest miseries, let him blame himself as justly punished. "For I am not the cause thereof, Who desire to save those that are going to fall into judgment, and Who came for this end. For he that makes a law punishing the disobedient, makes it not for the sake of punishing them that transgress it, but in order that they that hear may take heed of it and be safe. I therefore, having come to save, charge you to believe, and not to despise My words; inasmuch as the present is a time of salvation, not of judgment. For in the day of judgment, the word that called you to salvation will bring the penalties of disobedience upon you."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25208%2520(Fragments).html"
source_title="Commentary on the Gospel of John, Book 8"
