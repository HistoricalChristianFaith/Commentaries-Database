[[commentary]]
quote='''
Those whom argument cannot bring to the sure knowledge of Him Who by nature and in truth is God and Lord, may perhaps be won by miracles unto a docile obedience. And therefore usefully, or rather necessarily, He oftentimes completes His lessons by proceeding to the performance of some mighty work. For the inhabitants of Judaea were unready to believe, and slighted the words of those who called them to salvation, and especially the people of Capernaum had this character: for which reason the Saviour reproved them, saying, "And thou Capernaum, that art exalted unto heaven, shalt be brought down unto hell." But although He knows them to be both disobedient, and hard of heart, nevertheless He visits them as a most excellent physician would those who were suffering under a very dangerous disease, and endeavours to rid them of their malady. For He says Himself, that "those who are in health, have no need of a physician, but those who are sick." He taught therefore in their synagogues with great freedom of speech: for this He had foretold by the voice of Isaiah, saying, "I have not spoken in secret, nor in a dark place of the earth." The holy apostles moreover He even commanded to publish their words concerning Him with full boldness of speech, saying, "What I tell you in darkness, speak ye in the light: and what ye have heard (whispered) into the ear, proclaim upon the housetops." On the Sabbath also, when they were at leisure from labour, He conversed with them. They therefore wondered at the power of His teaching, and at the greatness of His authority: "For the word, it says, was with authority;" for He used not flatteries, but urged them to salvation. For the Jews indeed thought that Christ was nothing more than one of the saints, and that He had appeared among them in prophetic rank only: but that they might entertain a higher opinion and idea concerning Him, He exceeds the prophetic measure; for He never said, Thus saith the Lord, as of course was their custom, but as being the Lord of the law He spake things that surpass the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252012-25%2520(Luke%25204-1-6-17).html'
source_title="Commentary on the Gospel of Luke, Sermon 12"

[[commentary]]
quote='''
For although He knew that they were disobedient and hard of heart, He nevertheless visits them, as a good Physician tries to heal those who are suffering from a mortal disease. But He taught them boldly in the synagogues, as Esaias saith, I have not spoken in secret, in a dark place of the earth. (Isa. 45:19.) On the sabbath day also He disputed with them, because they were at leisure. They wondered therefore at the mightiness of His teaching, His virtue, and His power, as it follows, And they were astonished at his doctrine, for his word was with power. That is, not soothing, but urging and exciting them to seek salvation. Now the Jews supposed Christ to be one of the saints or prophets. But in order that they might esteem Him higher, He passes beyond the prophetic limits. For he said not, "Thus saith the Lord," but being the Master of the Law, He uttered things which were above the Law, changing the letter to the truth, and the figures to the spiritual meaning.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title="Catena Aurea by Aquinas"
