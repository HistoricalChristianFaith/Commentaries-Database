[[commentary]]
quote='''
But inasmuch as what you say is not true, but, on the contrary, empty and false, and liable to the charge of calumny, it is plain that I cast out devils by the finger of God. And by the finger of God He means the Holy Ghost. For the Son is called the hand and arm of God the Father; for He does all things by the Son, and the Son in like manner works by the Spirit. For just as the finger is appended to the hand, as something not foreign from it, but belonging to it by nature, so also the Holy Spirit, by reason of His being equal in substance, is joined in oneness to the Son, even though He proceed from God the Father. For, as I said, the Son does every thing by the consubstantial Spirit. Here, however, purposely He says, that by the finger of God He casts out devils, speaking as a man: because the Jews in the infirmity and folly of their mind, would not have endured it, if He had said, "by My own Spirit I cast out devils."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252081-88%2520%2528Luke%252011-19-12-10%2529.html'
source_title="Commentary on the Gospel of Luke, Sermon LXXXI"


[[commentary]]
quote='''
Appeasing therefore their excessive readiness to anger, and the proneness of their mind unto insolence and phrensy, He spake as a man, although He is by nature God, and Himself the Giver of the Spirit from God the Father to those who are worthy, and employs as His own that power which is from Him. For He is consubstantial with Him, and whatsoever is said to be done by God the Father, this necessarily is by the Son in the Spirit. If therefore, He says, I, being a man, and having become like unto you, cast out devils in the Spirit of God, human nature has in Me first attained to a godlike kingdom. For it has become glorious by breaking the power of Satan, and rebuking the impure and abominable spirits: for such is the meaning of the words, that "the kingdom of God has come upon you." But the Jews did not understand the mystery of the dispensation of the Only-begotten in the flesh: and yet how ought they not rather to have reflected, that by the Only-begotten Word of God having become man, without ceasing to be that which He was, He glorified the nature of man, in that He did not disdain to take upon Him its meanness, in order that He might bestow upon it His own riches.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252081-88%2520%2528Luke%252011-19-12-10%2529.html'
source_title="Commentary on the Gospel of Luke, Sermon LXXXI"
