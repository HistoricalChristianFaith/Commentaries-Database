[[commentary]]
quote='''
But, as the time had now come, Christ left the house where He had instructed His disciples in the mystery, and came to the place whither He Himself, the Saviour of all mankind, was wont often to resort, together with His holy disciples. He did this, too, from a wish to make it easy for the traitor to find Him. The place was a garden, typifying the Paradise of old. For in it, as it were, all places were summed up; and in it was consummated our return to man's ancient condition. For in Paradise the troubles of mankind had their origin; while in the garden began Christ's suffering, which brought us deliverance from all evil that had befallen us in time past.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252011.html"
source_title="Commentary on the Gospel of John, Book 11"
