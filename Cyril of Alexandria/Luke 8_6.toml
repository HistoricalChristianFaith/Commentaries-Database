[[commentary]]
quote='''
There are again some who bear faith about them, as if it consisted in the nakedness of words; their faith is without root, of whom it is added, And some fell upon a rock, and as soon as it sprung up, it withered away, because it lacked moisture.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
