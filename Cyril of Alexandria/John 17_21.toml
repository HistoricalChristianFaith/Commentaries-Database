[[commentary]]
quote='''
Our Lord Jesus Christ, then, prays not for the twelve Apostles alone, but rather for all who were destined in every age to yield to and obey the words that exhort those who hear to receive that sanctification that is through faith, and to that purification which is accomplished in them through partaking of the Spirit.… What, then, is the manner of His prayer? *That,* He says, *they may be one; even as Thou, Father, art in Me, and I in Thee, that they also may be one in Us.* He asks, then, for a bond of love, and concord, and peace, to bring into spiritual unity those who believe; so that their unitedness, through perfect sympathy and inseparable harmony of soul, might resemble the features of the natural and essential unity that exists between the Father and the Son.…

The Only-begotten, then, proceeding from the very Substance of God the Father, and having entirely in His own Nature Him That begat Him, became Flesh according to the Scripture, blending Himself, as it were, with our nature by an unspeakable combination and union with this body that is earthy; and thus He That is God by Nature became, and is in truth, a Man from heaven… in order that, uniting as it were in Himself things widely opposed by nature, and averse to fusion with each other, He might enable man to share and partake of the Nature of God. For even unto us has reached the fellowship and abiding Presence of the Spirit, which originated through Christ and in Christ first, when He is in fact become even as we are, that is, a Man, receiving unction and sanctification, though He is by Nature God, insomuch as He proceeded from the Father Himself, sanctifying with His own Spirit the temple of His Body as well as all the creation that to Him owes its being, and to which sanctification is suitable. The mystery, then, that is in Christ is become, as it were, a beginning and a way whereby we may partake of the Holy Spirit and union with God; for in Him are we all sanctified.

In order, then, that we ourselves also may join together, and be blended into unity with God and with each other, although, through the actual difference which exists in each one of us, we have a distinct individuality of soul and body, the Only-begotten has contrived a means which His own due Wisdom and the Counsel of the Father have sought out. For by one Body, that is, His own, blessing through the mystery of the Eucharist those who believe on Him, He makes us of the same Body with Himself and with each other. For who could sunder or divide from their natural union with one another those who are knit together through His holy Body, Which is one in union with Christ? For if *we all partake of the one Bread,* we are all made one Body; for Christ cannot suffer severance. Therefore also the Church is become Christ's Body, and we are also individually His members, according to the wisdom of Paul. For we, being all of us united to Christ through His holy Body, inasmuch as we have received Him Who is one and indivisible in our own bodies, owe the service of our members to Him rather than to ourselves.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252011.html"
source_title="Commentary on the Gospel of John, Book 11"
