[[commentary]]
quote='''
And the Lord also brings forward an argument which convinces us that nothing is better than devotion towards Him. For, He says, love for the poor is very praiseworthy, only let it be put after veneration of God. And what He says amounts to this: The time, He says, which has been appointed for My being honoured, that is to say, the time of My sojourn on earth, does not require that the poor should be honoured before Me. And this He said with reference to the Incarnation. He does not however in any way forbid the sympathetic person to exercise his love towards the poor. Therefore when there is need of service or of singing, these must be honoured before love towards the poor; for it is possible to do good after the spiritual services are over. He says therefore that it is not necessary always without intermission to devote our time to honouring Himself, or to spend everything upon the priestly service, but to lay out the greatest part upon the poor. Or thus: As He bids His disciples to fast after He had ascended to the Father, so also He says that then they may more freely give attention to the care of the poor, and exercise their love for the poor with less disturbance and more leisure: which indeed was the case. For after the Ascension of the Saviour, when they were no longer following their Master on His journeys, but had leisure; then they eagerly spent all the offerings that were brought to them upon the poor.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25208%2520(Fragments).html"
source_title="Commentary on the Gospel of John, Book 8"
