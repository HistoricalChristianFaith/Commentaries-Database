[[commentary]]
quote='''
For every way side is in some measure dry and uncultivated, because it is trodden down by all men, and no seed gains moisture on it. So the divine warning reaches not the unteachable heart, that it should bring forth the praise of virtue. These then are the ways frequented by unclean spirits.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
