[[commentary]]
quote='''
He explains what will happen at the consummation of the world, and, so to speak, warns them and testifies, saying, "Look! Be not deceived: for many shall come in My Name, saying, that I am He, and the time is near. Go you not after them." For before the advent of Christ the Saviour of us all from heaven, various false Christs and false prophets will appear preceding Him, falsely assuming to themselves His person, and coming into the world like eddies of smoke springing up from a fire about to break forth. "But follow them not," He says. For the Only-begotten Word of God consented to take upon Him our likeness, and to endure the birth in the flesh of a woman, in order that He might save all under heaven. And this to Him was an emptying of Himself, and a humiliation. For what is the measure of humanity compared with the divine and supreme majesty and glory? As one therefore Who had humbled Himself to emptiness, He deigned to remain unknown, even charging the holy apostles before His precious cross that they should not reveal Him. For it was necessary that the manner of His dispensation in the flesh should remain hid, that by enduring as a man for our sakes even the precious cross, He might abolish death, and drive away Satan from his tyranny over us all. For, as Paul says; "The wisdom that was in Christ, by which is meant that which is by Christ, none of the rulers of this world knew: for if they had known it, they would not have crucified the Lord of glory." It was necessary therefore that He should remain unknown during the time that preceded His passion: but His second advent from heaven will not happen secretly as did His coming at first, but will be illustrious and terrible. For He shall descend with the holy angels guarding Him, and in the glory of God the Father, to judge the world in righteousness. And therefore He says, "when there arise false Christs and false prophets, go you not after them."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520135-145%2520%28Luke%252020-19-22-38%29.html"
source_title="COMMENTARY ON LUKE, HOMILY 139"
