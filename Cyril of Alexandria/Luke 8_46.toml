[[commentary]]
quote='''
For the miracle which was performed escaped not the Lord, but He who knew all things asks as if He were ignorant.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"


[[commentary]]
quote='''
That woman was delivered, being saved from a state of suffering thus bitter and incurable; and thereby we again obtain the firm assurance, that the Emmanuel is very God. How and in what manner? Both from the miraculous event itself, and from the words which with divine dignity He spake. "For, I know, He said, that power has gone forth from Me." But it transcends our degree, or probably that even of the angels, to send forth any power, and that of their own nature, as something that is of themselves. Such an act is an attribute appropriate solely to the Nature That is above all, and supreme. For every created being whatsoever that is endued with power, whether of healing, or the like, possesses it not of itself, but as a thing given it by God. For to the creature all things are given, and wrought in it, and of itself it can do nothing. As God therefore He said "I knew that power has gone forth from Me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252039-46%2520(Luke%25207-31-8-56).html'
source_title="COMMENTARY ON LUKE, HOMILY 45"
