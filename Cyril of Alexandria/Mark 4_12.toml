[[commentary]]
quote='''
To them therefore it was not granted to know the mysteries of the kingdom of heaven, but rather unto us, who are more ready to embrace the faith. For He hath given unto us, as being perfect wisdom, the ability "to understand parables, and the dark saying, the words of the wise, and their riddles." For parables we may say are the images not of visible objects, but rather of those cognizable by the intellect and spiritual. For that which it is impossible to see with the eyes of the body, the parable points out unto the eyes of the mind, beautifully shaping out the subtilty of things intellectual, by means of the things of sense, and which are as it were palpable to the touch.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252039-46%2520(Luke%25207-31-8-56).html"
source_title="Commentary on the Gospel of Luke, Sermon 41"
