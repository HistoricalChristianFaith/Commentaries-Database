[[commentary]]
quote='''
We therefore also, as I said, must closely examine with the discerning eye of the mind whatever is done, and search into the nature of actions, that so we may approve of that which is without blame, while we reject that which is counterfeit. But if, making no distinctions, we run the risk of passing an evil sentence upon things highly praiseworthy: and of deeming that which is evil fit for commendation and applause, the prophet's words will apply to us: "Woe unto them that call evil good, and good evil: who call bitter sweet, and sweet bitter: who put light for darkness, and darkness for light." Such was the character of the Israelites, and especially of those whose lot it was to be their chiefs, the Scribes namely and Pharisees: of whom Christ said, "To what shall I liken the men of this generation? and so on."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252039-46%2520(Luke%25207-31-8-56).html'
source_title="COMMENTARY ON LUKE, HOMILY 39"
