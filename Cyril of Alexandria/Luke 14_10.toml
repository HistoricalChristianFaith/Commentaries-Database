[[commentary]]
quote='''
For if a man wishes not to be set before others, he obtains this honour according to the divine word. As it follows; That when he that bade thee cometh, he may say unto thee, Friend, go up higher. In these words He does not harshly chide, but gently admonishes; for a word of advice is enough for the wise. And thus for their humility men are crowned with honours; as it follows, Then shall thou have worship.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
But the modest and praiseworthy man, who might without fear of blame have claimed the dignity of sitting among the foremost, seeks it not, but yields to others what might be called his own, that he may not even seem to be overcome by vainglory; and such an one shall receive honour as his due: for he shall hear, He says, him who bade him say, "Come up hither."

A modest mind therefore is a great and surpassing good: for it delivers those who possess it from blame and contempt, and from the charge of vaingloriousness.
'''
source_title="Commentary on the Gospel of Luke, Sermon 102"
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252099-109%2520%28Luke%252013-22-16-13%29.html"
