[[commentary]]
quote='''
There is therefore some saying of Isaiah concerning Christ quoted, His generation who shall declare? for His Life is taken away from the earth. And the blessed Prophet applying the expression to the Word of God, puts generation for Being. For who at all can tell the mode of the Being of the Only-Begotten? what tongue shall declare the unspeakable Birth of the Son from the Father? or what mind will not be powerless for this? For that He was begotten of God the Father we know and have believed: but the how, we say is unattainable by every mind, and the enquiry thereinto most perilous. For we ought not to search into what is too deep, nor to scrutinize what is too hard, but rather to holdfast what we are commanded, and have an unshaken belief concerning God, that He is in truth, and that He is a Rewarder of them that diligently seek Him. But we must not search into, as it is written, the things which surpass understanding and thought, not merely our own, but also that of the whole creation, or even every reasonable creature.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25205.html"
source_title="Commentary on the Gospel of John, Book 5"
