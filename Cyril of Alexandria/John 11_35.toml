[[commentary]]
quote='''
Certainly the Evangelist, seeing the tearless Nature weeping, is astonished, although the suffering was peculiar to the flesh, and not suitable to the Godhead. And the Lord weeps, seeing the man made in His own image marred by corruption, that He may put an end to our tears. For for this cause He also died, even that we may be delivered from death. And He weeps a little, and straightway checks His tears; lest He might seem to be at all cruel and inhuman, and at the same time instructing us not to give way overmuch in grief for the dead. For it is one thing to be influenced by sympathy, and another to be effeminate and unmanly. For this cause therefore He permitted His own flesh to weep a little, although it was in its nature tearless and incapable of any grief, so far as regards its own nature. And even they who hate the Lord, admire His tears. For they who follow philosophy to an extreme and have a brilliant reputation therein, shed tears with the greatest reluctance, as overcoming by manly vigour every misfortune. And the Jews thought that He wept on account of the death of Lazarus, but He wept out of compassion for all humanity, not bewailing Lazarus only, but understanding that which happens to all, that the whole of humanity is made subject to death, having justly fallen under so great a penalty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25207%2520(Fragments).html'
source_title="Commentary on the Gospel of John, Book 7 (Fragments)"
