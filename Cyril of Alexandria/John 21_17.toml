[[commentary]]
quote='''
Herein, also, is a type given to the Churches, that they ought thrice to ask for a confession of Christ from those who have chosen to love Him by coming to Him in Holy Baptism. And, by dwelling on this passage, instructors in religion may arrive at the knowledge that they cannot please the Chief Shepherd, that is Christ, unless they take thought for the health of the sheep of His fold, and their continuance in well-being. Such was the inspired Paul, who shared the infirmities of his weak brethren, and called those who through him believed, and chose to gain repute by the glory of their deeds, the boast, and joy, and crown of his apostleship. For he knew that this was the visible fruit of love for Christ. And this, if he reason well and justly, any one may perceive. For if He died for us, surely He must esteem the salvation and life of us all as deserving of all care. And if they who sin against the brethren, and wound their conscience when it is weak, in truth sin against Christ; surely it is true to say, that they are doing the Lord Himself service who take, as it were, by the hand the mind of those who have been admitted to the faith, and who are expected to be called to perfection therein, and are eager to stablish them firmly in the faith, by every help that they can offer. Therefore, by his thrice-repeated confession the thrice-repeated denial of the blessed Peter was done away, and by the saying of our Lord, Feed my lambs, we must understand a renewal as it were of the apostleship, already given unto him, washing away the disgrace of his fall that came betwixt, and obliterating his faint-heartedness, that arose from human infirmity.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html"
source_title="Commentary on the Gospel of John, Book 12"
