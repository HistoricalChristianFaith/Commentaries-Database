[[commentary]]
quote='''
Leaving Jerusalem, the Saviour seeks a refuge in a place possessing springs of water, that He might signify obscurely as in a type how He would leave Judaea and go over to the Church of the Gentiles which possesses the fountains of Baptism: there also many approach unto Him crossing through the Jordan; for this is signified by Christ taking up His abode beyond Jordan. They therefore having crossed the Jordan by Holy Baptism, are brought unto God: for truly He went across from the synagogue of the Jews unto the Gentiles: and then many came unto Him and believed the words spoken by the saints concerning Him. And they believe on Him there, where the springs of water are, where we are taught the mystery of Christ. For Christ was not in the streams before the Jordan, but somewhere beyond; and He came and abode, continuing constantly in the Church of the Gentiles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25207%2520(Fragments).html'
source_title="Commentary on the Gospel of John, Book 7 (Fragments)"
