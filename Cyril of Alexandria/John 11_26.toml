[[commentary]]
quote='''
Assuredly a fruit and reward of faith in Christ is eternal life, and in no other way does this come to the soul of man. For although we are all raised to life through Christ, yet this [eternal life given to the faithful] is the true life, namely, to live unendingly in bliss; for to be restored to life only for punishment differs nothing from death. If therefore any one notices that even the saints, who have received promises of life, die; this is nothing, for it is only what naturally comes to pass. And until the proper time has been reserved the display of the grace [of resurrection], which is powerful, not partially, but effectually, in the case of all men, even of those saints who have died in time past and are tasting death for a short time, until the general resurrection. For then, together, all will enjoy the good things. And in saying: Though he die, yet shall he live, the Saviour did not take away the death in this present world: but admits that it has such might against the faithful that it naturally happens to them, and no more; because He has reserved the grace of resurrection until the proper time. He certainly says: "He that believeth on Me shall not be without a participation in the death of the flesh in the ordinary course of human nature, but nevertheless he will suffer nothing worthy of fear in this, as God is able easily to make alive whomsoever He will." For he that believeth on Him, hath in the world to come an endless life in bliss and perfect immortality. Wherefore let not any of the unbelieving mock: for Christ did not say: "From this present moment he shall in no wise see death," but when He said absolutely: "He shall never see death in any wise," He spake concerning the world to come, reserving the end of the promise until then.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25207%2520(Fragments).html'
source_title="Commentary on the Gospel of John, Book 7 (Fragments)"


[[commentary]]
quote='''
Having previously explained the force of the mystery in Himself, and shown plainly that He is by Nature Life and Very God, He demands assent to the faith, furnishing in this matter a model to the Churches. For we ought not quite vainly to cast our words into the air when we confess the venerable mystery, but to fix the roots of the faith in heart and mind and then to let it bear fruit in our confession; and we ought to believe without any hesitation or double-mindedness. For the double-minded man is insolent and halting as regards the faith; wherefore also he is unstable in all his ways. Nevertheless, it is necessary to know that we make the confession of our faith unto God, although we are questioned by men, I mean those whose lot it is to minister in sacred things, when we say the "I believe" at the reception of Holy Baptism. Certainly therefore to speak falsely and to slip aside towards unbelief is a most awful thing; lest we may have as both Judge and Witness of our folly the Lord of all Himself, saying: Even I am a Witness, saith the Lord. And we must observe that, as Lazarus was lying dead, on his behalf in a certain way the assent to the faith is demanded of the woman, that the type in this also may have force among the Churches; for when a newborn babe is brought, either to receive the chrism of the catechumenate, or that of the complete-[Christian]-condition at Holy Baptism, the person who brings it repeats aloud the "Amen" on its behalf. And on behalf of those who are assailed by extreme sickness, and on that account are going to be baptized, certain persons make the renunciation [of Satan] and the declaration of attachment [to Christ], by an act of charity lending as it were their voices to those who are disabled by sickness: a thing which we see to have been done in the case of Lazarus and his sister. And Martha wisely and prudently first sows the confession of faith, that afterwards she may reap the fruit of it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25207%2520(Fragments).html'
source_title="Commentary on the Gospel of John, Book 7 (Fragments)"
