[[commentary]]
quote='''
Having shown therefore from so slight an example the degradation of the ambitious and the exaltation of the humbleminded, He adds a great thing to a little, pronouncing a general sentence, as it follows, For every one who exalts himself shall be abased, and he that humbleth himself shall be exalted. This is spoken according to the divine judgment, not after human experience, in which they who desire after glory obtain it, while others who humble themselves remain inglorious.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
But whosoever thinks great things of himself, and is supercilious, and elate in mind, and prides himself on an empty loftiness, is rejected and accursed. He follows a course the contrary of Christ's, Who said; "Learn of Me, for I am meek and lowly in heart." "For the Lord, it says, resists the proud, but gives grace to the humble."
'''
source_title="Commentary on the Gospel of Luke, Sermon 102"
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252099-109%2520%28Luke%252013-22-16-13%29.html"
