[[commentary]]
quote='''
There was perchance a sort of game among the Jewish children, something of this kind. A troop of youths was divided into two parts: who, making sport of the confusion in the world, and the uneven course of its affairs, and the painful and rapid change from one extreme to the other, played some of them on instruments of music: while the rest wailed. But neither did the mourners share the merriment of those who were playing music and rejoicing: nor again did those with the instruments of music join in the sorrow of those who were weeping: and finally, they reproached one another with their want of sympathy, so to speak, and absence of affection. For the one party would say, "We have played unto you, and ye have not danced:" to which the others would rejoin, "We have wailed unto you, and ye have not wept." Christ declares, therefore, that both the Jewish populace, and their rulers, were in some such state of feeling as this...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252039-46%2520(Luke%25207-31-8-56).html'
source_title="COMMENTARY ON LUKE, HOMILY 39"

[[commentary]]
quote='''
There was a certain play among the Jewish children of this kind. A company of boys were collected together, who, mocking the sudden changes in the affairs of this life, some of them sang, some mourned, but the mourners did not rejoice with those that rejoiced, nor did those who rejoiced fall in with those that wept. They then rebuked each other in turn with the charge of want of sympathy. That such were the feelings of the Jewish people and their rulers, Christ implied in the following words, spoken in the person of Christ; Whereunto then shall I liken the men of this generation, and to what are they like? They are like to children sitting in the market-place.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title="Catena Aurea by Aquinas"
