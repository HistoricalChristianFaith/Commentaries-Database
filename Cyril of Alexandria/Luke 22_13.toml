[[commentary]]
quote='''
When then the disciples had prepared the passover, Christ ate it with them, being long-suffering towards the traitor, and deigning to admit him to the table from His infinite loving-kindness: for he was already a traitor, because Satan was lodging within him. And what did Christ also say to the holy apostles? "I have desired a desire to eat this passover with you." Let us examine the deep purport of this expression: let us search out the meaning concealed therein, and what it is which the Saviour intends. As then I have already said that covetous disciple was seeking an opportunity to betray Him: and, that he might not deliver Him to His murderers before the feast of the passover, the Saviour did not declare either the house or the person with whom He would celebrate the feast. To explain therefore to them the cause of His unwillingness openly to tell them with whom He would lodge, He says, "I have desired a desire to eat with you this passover:" apparently meaning, I have used all diligence to enable me to escape the wickedness of the traitor, that I might not endure My passion before the time.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520135-145%2520%28Luke%252020-19-22-38%29.html"
source_title="COMMENTARY ON LUKE, HOMILY 141"
