[[commentary]]
quote='''
These things then God prophesied concerning what should befall the country of the Jews, but the disciples understood not the depth of His words, thinking they had need of swords against the coming attack of the traitor. Whence it follows; But they said, Lord, behold, here are two swords.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
And in foretelling these things, the Lord was speaking of what was about to happen to the country of the Jews. But the divine disciples did not understand the deep meaning of what was said, but supposed rather that He meant that swords were necessary, because of the attack about to be made upon Him by the disciple who betrayed Him, and by those who were assembled to seize Him. For this reason they say, "Lord, behold, here are two swords."
'''
source_title="Commentary on the Gospel of Luke, Sermon 145"
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%2520135-145%2520%28Luke%252020-19-22-38%29.html"
