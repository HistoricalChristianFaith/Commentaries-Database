[[commentary]]
quote='''
Then they see a fire of coals, for the Saviour had kindled a fire miraculously, and put a fish upon it that He had caught by His ineffable power; and this too He had done of design. For it was not the hand of the holy Apostles, or the preaching of these spiritual fishermen among men, but the power of the Saviour that started the work. For He first caught one as the firstfruits of those who were to come (not that we mean one precisely, for by one is signified a small number), then afterwards the disciples caught the multitude in their nets, being enabled by His Divine bidding to take something of what they sought. Peter then hauls up the net; by which it was to be understood, that the labour of the holy Apostles would not be without its effect. For they put the mass of captured fish before Him Who had commanded them to be caught; and the quantity of the fish is indicated by the number 153.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html"
source_title="Commentary on the Gospel of John, Book 12"
