[[commentary]]
quote='''
And He sends messengers to make a place for Him and His companions, who when they came to the country of the Samaritans were not admitted, as it follows, And sent messengers before his face: and they went, and altered into a village of the Samaritans, to make ready for him. And they did not receive him.

But our Lord, Who knew all things before they came to pass, knowing that His messengers would not be received by the Samaritans, nevertheless commanded them to go before Him, because it was His practice to make all things conduce to the good of His disciples. Now He went up to Jerusalem as the time of His suffering drew near. In order then that they might not be offended, when they saw Him suffer, bearing in mind that they must also endure patiently when men persecute them, He ordained beforehand as a kind of prelude this refusal of the Samaritans. It was good for them also in another way. For they were to be the teachers of the world, going through towns and villages, to preach the doctrine of the Gospel, meeting sometimes with men who would not receive the sacred doctrine, allowing not that Jesus sojourned on earth with them. He therefore taught them, that in announcing the divine doctrine, they ought to be filled with patience and meekness, without bitterness, and wrath, and fierce enmity against those who had done any wrong to them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
It would be false to affirm that our Savior did not know what was about to happen, because he knows all things. He knew, of course, that the Samaritans would not receive his messengers. There can be no doubt of this. Why then did he command them to go before him? It was his custom to benefit diligently the holy apostles in every possible way, and because of this, it was his practice sometimes to test them.… On this occasion, he also tested them. He knew that the Samaritans would not receive those who went forward to announce that he would stay with them. He still permitted them to go that this again might be a way of benefiting the holy apostles. What was the purpose of this occurrence? He was going up to Jerusalem, as the time of his passion was already drawing near. He was about to endure the scorn of the Jews. He was about to be destroyed by the scribes and Pharisees and to suffer those things that they inflicted upon him when they went to accomplish all of violence and wicked boldness. He did not want them to be offended when they saw him suffering. He also wanted them to be patient and not to complain greatly, although people would treat them rudely. He, so to speak, made the Samaritans’ hatred a preparatory exercise in the matter. They had not received the messengers.…
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 56"


[[commentary]]
quote='''
It also benefited them in another way. They were to be the instructors of the whole world and to travel through the cities and villages, proclaiming everywhere the good tidings of salvation. Of necessity, while seeking to fulfill their mission, they must fall in with wicked people who would reject the divine tidings and not receive Jesus to stay with them.…
'''
source_url=''
source_title="COMMENTARY ON LUKE, HOMILY 56"
