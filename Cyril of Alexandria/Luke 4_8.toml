[[commentary]]
quote='''
(in Thes. 32.) But how comes it that the Son (if as the heretics say a created being) is worshipped? What charge can be brought against those who served the creature and not the Creator, if the Son (according to them a created being) we are to worship as God?

This command touched him to the quick; for before Christ's coming he was every where worshipped. But the law of God casting him down from his usurped dominion, establishes the worship of Him alone who is really God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
It is written, "Thou shalt worship the Lord thy God, and Him only shalt thou serve." Seasonably He made mention of this commandment, striking as it were his very heart. For before His advent, Satan had deceived all under heaven, and was himself everywhere worshipped: but the law of God, ejecting him from the dominion he had usurped by fraud, has commanded men to worship Him only Who by nature and in truth is God, and to offer service to Him alone.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520Luke%2FSermons%252012-25%2520%2528Luke%25204-1-6-17%2529.html"
source_title="Commentary on the Gospel of Luke, Sermon 12"
