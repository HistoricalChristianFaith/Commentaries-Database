[[commentary]]
quote='''
The first man, being earthy, and of the earth, and having, placed in his own power, the choice between good and evil, being master of the inclination to each, was caught of bitter guile, and having inclined to disobedience, falls to the earth, the mother from whence he sprang, and over-mastered now at length by corruption and death, transmits the penalty to his whole race. The evil growing and multiplying in us, and our understanding ever descending to the worse, sin reigned, and thus at length the nature of man was shewn bared of the Holy Ghost Which indwelt him. For the Holy Spirit of wisdom will flee deceit, as it is written, nor dwell in the body that is subject unto sin. Since then the first Adam preserved not the grace given him of God, God the Father was minded to send us from Heaven the second Adam. For He sendeth in our likeness His own Son Who is by Nature without variableness or change, and wholly unknowing of sin, that as by the disobedience of the first, we became subject to Divine wrath, so through the obedience of the Second, we might both escape the curse, and its evils might come to nought.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25202.html"
source_title="Commentary on the Gospel of John, Book 2"
