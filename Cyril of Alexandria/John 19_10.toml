[[commentary]]
quote='''
Pilate thought this silence the silence of a madman. Therefore, he stretches over Him, as it were, the wand of his official power, and thought that he could induce Him by fear, against His Will, to return a fruitless answer. For he says that nothing could hinder his inclining whichever way he chose, either to punish Him, or to take compassion upon Him; and that there was nothing to turn him aside, to give a verdict against his will, with whom alone rested the fate of the accused. He rebukes Him, therefore, as though he felt himself insulted by untimely silence, and, so far as that went, his indignation were whetted against Him. For he perceived not at all the hidden meaning of Christ's silence. Observe here the accurate fulfilment of that which was foretold by the voice of the Prophet: He was brought as a lamb to the slaughter; and as a sheep before her shearers is dumb, so He openeth not His mouth. In His humiliation His judgment was taken away.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 12"
