[[commentary]]
quote='''
He confesses the wrong he had done, and is not ashamed. For he admitted that he had scourged Him without a cause, and declares that he will show Him unto them, supposing that he would glut their savage passion by so pitiable a spectacle, and well-nigh accuses them henceforth, and that publicly, of putting Him to death unjustly, and of compelling him openly to be a law-breaker, who, if he transgressed his own laws, could not escape scot free. The saying was fulfilled in Christ, and shown to be true, that the prince of this world cometh, and he will find nothing in Me. For observe how Satan, after throwing everything into confusion, finds nothing at all cast out from God, and ranked under the power of sin, which he might, perhaps, if it had been referred to the Saviour Christ, have caused to be rightly condemned and implicated in his accusations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%252012.html'
source_title="COMMENTARY ON THE GOSPEL OF JOHN 12"
