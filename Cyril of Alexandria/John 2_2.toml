[[commentary]]
quote='''
For it was fitting that He, Who was renewing the very nature of man, and refashioning it all for the better, should not only impart His blessing to those already called into being, but also prepare before grace for those soon to be born, and make holy their entrance into being. Receive also yet a third reason. It had been said to the woman by God, In sorrow thou shalt bring forth children. How then was it not needful that we should thrust off this curse too, or how else could we escape a condemned marriage? This too the Saviour, being loving to man, removes. For He, the Delight and Joy of all, honoured marriage with His Presence, that He might expel the old shame of child-bearing.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyril%2520of%2520Alexandria%2FCommentary%2520on%2520the%2520Gospel%2520of%2520John%2FBook%25202.html"
source_title="Commentary on the Gospel of John, Book 2"
