[[commentary]]
quote='''
If thy hand or thy foot injure thee, cut it off, and cast it from thee; for it is better for thee to enter into life being halt or maimed, and not that thou shouldest have two hands or two feet, and fall into the hell of fire that burneth for ever; where their worm dieth not, and their fire is not quenched. And if thine eye seduce thee, pluck it out, and cast it from thee; for it is better for thee to enter the kingdom of God with one eye, than that thou shouldest have two eyes, and fall into the fire of Gehenna; where their worm dieth not, and their fire is not quenched. Every one shall be salted with fire, and every sacrifice shall be salted with salt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tatian%2520the%2520Assyrian%2FDiatessaron.html'
source_title="The Diatessaron of Tatian, Section XXV"
