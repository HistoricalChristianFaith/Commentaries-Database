[[commentary]]
quote='''
God is a Spirit, not pervading matter, but the Maker of material spirits, and of the forms that are in matter; He is invisible, impalpable, being Himself the Father of both sensible and invisible things. Him we know from His creation, and apprehend His invisible power by His works. I refuse to adore that workmanship which He has made for our sakes. The sun and moon were made for us: how, then, can I adore my own servants?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tatian%2520the%2520Assyrian%2FAddress%2520of%2520Tatian%2520to%2520the%2520Greeks.html"
source_title="Address of Tatian to the Greeks"
