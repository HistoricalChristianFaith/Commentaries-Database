[[commentary]]
quote='''
But now this they can by no means effect, for they have not the power; but they make war by means of the lower matter against the matter that is like themselves. Should any one wish to conquer them, let him repudiate matter. Being armed with the breastplate of the celestial Spirit, he will be able to preserve all that is encompassed by it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tatian%2520the%2520Assyrian%2FAddress%2520of%2520Tatian%2520to%2520the%2520Greeks.html'
source_title="Address of Tatian to the Greeks, Chapter XVI"
