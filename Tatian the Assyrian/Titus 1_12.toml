[[commentary]]
quote='''
You possess the commentaries of Leo, and are displeased with our refutations of them; and having in your hands the opinions of Apion concerning the Egyptian gods, you denounce us as most impious. The tomb of Olympian Zeus is shown among you, though some one says that the Cretans are liars. Your assembly of many gods is nothing.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tatian%2520the%2520Assyrian%2FAddress%2520of%2520Tatian%2520to%2520the%2520Greeks.html"
source_title="Address of Tatian to the Greeks"
