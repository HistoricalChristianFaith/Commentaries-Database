[[commentary]]
quote='''
(non occ.) He taught in their synagogues the Gospel of the Kingdom, as it follows, Preaching the Gospel of the Kingdom.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
(ap. Anselm.) By disease we may understand complaints of long standing, by sickness any lesser infirmity.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
