[[commentary]]
quote='''
(ord.) Or; This class of dæmons, that is the variety of carnal pleasures, is not overcome unless the spirit be strengthened by prayer, and the flesh enfeebled by fast.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252017.html'
source_title='Catena Aurea by Aquinas'
