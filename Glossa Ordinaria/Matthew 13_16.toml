[[commentary]]
quote='''
(ap. Anselm.) so then the eyes of them that see, and will not believe, are miserable, but your eyes are blessed; whence it follows; Blessed are your eyes, for they see, and your ears, for they hear.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
(ord.) The mind is called an eye, because it is intently directed upon what is set before it to understand it; and an ear, because it learns from the teaching of another.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
