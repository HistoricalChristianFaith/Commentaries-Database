[[commentary]]
quote='''
(ut sup. 13.) But while these things were so, that it might be shown there was but one Lord of the new and old covenant, and the mouths of heretics might be shut, and men might believe on the resurrection, and He also, who was transfigured, be believed to be the Lord of the living and the dead, Moses and Elias, as servants, stand by their Lord in His glory; hence it follows, And behold there talked with him two men. For it became men, seeing the glory and confidence of their fellow servants, to admire indeed the merciful condescension of the Lord, but to emulate those who had laboured before them, and looking to the pleasantness of future blessings, to be the more strengthened for conflicts. For he who has known the reward of his labours, will the more easily endure them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
