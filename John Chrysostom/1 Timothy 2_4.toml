[[commentary]]
quote='''
Seest thou how great the darkness is; and how everywhere there is need of faith. This it is, that is solid. But, if you will, let us come to things which are less than these. That substance hath an operation. And what in His case is operation? Is it a certain motion? Then He is not immutable: for that which is moved, is not immutable: for, from being motionless it becomes in motion. But nevertheless He is in motion, and never stands still. But what kind of motion, tell me; for amongst us there are seven kinds; down, up, in, out, right, left, circular, or, if not this, increase, decrease, generation, destruction, alteration. But is His motion none of these, but such as the mind is moved with? No, nor this either. Far be it! for in many things the mind is even absurdly moved. Is to will, to operate, or not? If to will is to operate, and He wills all men to be good, and to be saved, how comes it not to pass? But to will is one thing, to operate, another. To will then is not sufficient for operation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Colossians%2FHomily%25205.html'
source_title="Homily on Colossians 5"

[[commentary]]
quote='''
And if we are commanded to pray for our neighbors, not only for the faithful, but for the unbelieving also, consider how wrong it is to pray against your brethren.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%25206.html'
source_title="Homily on 1 Timothy 6"

[[commentary]]
quote='''
Imitate God! if He willeth that all men should be saved, there is reason why one should pray for all, if He hath willed that all should be saved, be thou willing also; and if thou wishest it, pray for it, for wishes lead to prayers. Observe how from every quarter He urges this upon the soul, to pray for the Heathen, showing how great advantage springs from it; "that we may lead a quiet and peaceable life"; and what is much more than this, that it is pleasing to God, and thus men become like Him, in that they will the same that He does. This is enough to shame a very brute. Fear not therefore to pray for the Gentiles, for God Himself wills it; but fear only to pray against any, for that He wills not. And if you pray for the Heathens, you ought of course to pray for Heretics also, for we are to pray for all men, and not to persecute. And this is good also for another reason, as we are partakers of the same nature, and God commands and accepts benevolence and affection towards one another.

But if the Lord Himself wills to give, you say, what need of my prayer? It is of great benefit both to them and to thyself. It draws them to love, and it inclines thee to humanity. It has the power of attracting others to the faith; (for many men have fallen away from God, from contentiousness towards one another;) and this is what he now calls the salvation of God, "who will have all men to be saved"; without this all other is nothing great, a mere nominal salvation, and only in words. "And to come to the knowledge of the truth." The truth: what truth? Faith in Him. And indeed he had previously said, "Charge some that they teach no other doctrine." But that no one may consider such as enemies, and on that account raise troubles against them; he says that "He willeth that all men should be saved, and come to the knowledge of the truth"...
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%25207.html'
source_title="Homily on 1 Timothy 7"
