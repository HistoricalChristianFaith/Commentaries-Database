[[commentary]]
quote='''
For it was not in the power of John to give the Spirit, as those who were baptized by him show when they say, "We have not so much as heard whether there be any Holy Ghost." (Acts xix. 2.) In truth, Christ needed not baptism, neither his nor any other; but rather baptism needed the power of Christ. For that which was wanting was the crowning blessing of all, that he who was baptized should be deemed worthy of the Spirit. This free gift then of the Spirit He added when He came.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252017.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 17"

[[commentary]]
quote='''
"Have ye received the Holy Ghost since ye believed? And they said unto him, We have not so much as heard whether there be any Holy Ghost." He does not say to them, Do ye believe in Jesus? but what? "Have ye received the Holy Ghost?" He knew that they had not, but wishes themselves to say it, that having learnt what they lack, they may ask.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252040.html'
source_title="Homily on Acts 40"
