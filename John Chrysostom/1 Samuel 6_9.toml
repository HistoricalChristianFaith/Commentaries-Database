[[commentary]]
quote='''
For this reason he [Paul] says, "Unto the Jews I became as a Jew, to them that are without law, as without law, to those that are under the Law, as under the Law." Thus does God too, as in the case of the wise men, He does not conduct them by an Angel, nor a Prophet, nor an Apostle, nor an Evangelist, but how? By a star. For as their art made them conversant with these, He made use of such means to guide them. So in the case of the oxen, that drew the ark. "If it goeth up by the way of his own coast, then He hath done us this great evil," as their prophets suggested. Do these prophets then speak the truth? No; but he refutes and confounds them out of their own mouths.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Titus%2FHomily%25203.html'
source_title="Homily on Titus 3"
