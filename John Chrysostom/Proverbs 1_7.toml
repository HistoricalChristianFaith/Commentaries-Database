[[commentary]]
quote='''
Again, nothing maketh men so wise as virtue; it rendereth them thankful and fair-minded, merciful, mild, gentle, and candid; it is wont to be the mother of all other blessings. And what is more understanding than one so disposed? for virtue is the very spring and root of prudence, just as all wickedness hath its beginning in folly. For, the insolent man and the angry become the prey of their respective passions from lack of wisdom; on which account the prophet said, "There is no soundness in my flesh: my wounds stink and are corrupt because of my foolishness": showing that all sin hath its beginning in folly: and so the virtuous man who hath the fear of God is more understanding than any; wherefore a wise man hath said, "The fear of the Lord is the beginning of wisdom." If then to fear God is to have wisdom, and the wicked man hath not that fear, he is deprived of that which is wisdom indeed;—and deprived of that which is wisdom indeed, he is more foolish than any.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252041.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 41"


[[commentary]]
quote='''
Piety toward God is a beginning [of discernment]. It acts as a fountain and source for discerning the divine, according to our inner being, so that we may see the true light, hear the secret oracles, be nourished with the bread of life, obtain the fragrance of Christ and learn the doctrine of this life. When we have piety, our senses too are allied with us, when neither our eyes see nor our mouth speaks evil.
'''
source_url=''
source_title="COMMENTARY ON THE PROVERBS OF SOLOMON, FRAGMENT 1:7"
