[[commentary]]
quote='''
Next, he adduces what indeed is the greatest token of divinity; "of Whom are all things." For this implies also that those others are not gods. For it is said, "Let the gods who made not the heaven and the earth perish." Then he subjoins what is not less than this, "and we unto Him." For when he saith, "of Whom are all things," he means the creation and the bringing of things out of nothing into existence. But when he saith, "and we unto Him," he speaks of the word of faith and mutual appropriation, as also he said before, "but of Him are ye also in Christ Jesus."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252020.html'
source_title="HOMILIES ON 1 CORINTHIANS 20:5"
