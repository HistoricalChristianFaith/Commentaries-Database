[[commentary]]
quote='''
And it is worth our while to admire their truth-loving disposition, how they are not ashamed to relate things which seem to bring disgrace upon their Teacher, but have been even more anxious to report these than other matters. For instance, the writer having passed by many signs and wonders and sermons, has sprung at once to this. For, saith he, "His brethren said unto Him, Depart hence, and go into Judaea, that Thy disciples also may see the works that Thou doest; for there is no man that doeth anything in secret, and he himself seeketh to be known openly. Show thyself to the world. For neither did His brethren believe in Him."

What unbelief, saith some one, is here? They exhort Him to work miracles. It is great deed; for of unbelief come their words, and their insolence, and their unseasonable freedom of speech. For they thought, that owing to their relationship, it was lawful for them to address Him boldly. And their request seems forsooth to be that of friends, but the words were those of great maliciousness. For in this place they reproach Him with cowardice and vainglory: since to say, "no man doeth anything in secret," is the expression of persons charging Him with cowardice, and suspecting the things done by Him as being not really done; and to add, that "he seeketh to be known," was to accuse Him of vainglory. But observe, I pray you, the power of Christ. Of those who said these things, one became first Bishop of Jerusalem, the blessed James, of whom Paul saith, "Other of the Apostles saw I none, save James, the Lord's brother" (Gal. i. 19); and Judas also is said to have been a marvelous man. And yet these persons had been present also at Cana, when the wine was made, but as yet they profited nothing. Whence then had they so great unbelief? From their evil mind, and from envy; for superiority among kindred is wont somehow to be envied by such as are not alike exalted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252048.html'
source_title="Homily on the Gospel of John 48"

[[commentary]]
quote='''
(Hom. xlviii. 1, 2) It is striking to observe the great sincerity of the Evangelists; that they are not ashamed to mention things which appear to be to our Lord's disadvantage, but take particular care to tell us of them. It is a considerable reflexion on our Lord, that His brethren do not believe on Him. The beginning of their speech has a friendly appearance about it: but there is much bitterness in it, thus charging Him with the motives of fear and vain glory; No man, say they, doeth any thing in secret: this was reproaching Him tacitly with fear; and was an insinuation too that His miracles had not been real and solid ones. In what follows, And he himself seeketh to be known openly, they taunt Him with the love of glory.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title="Catena Aurea by Aquinas"
