[[commentary]]
quote='''
It is our part too henceforth to mourn, or rather we have need to say this every day. We profit nothing by our prayers, nothing by our advice and exhortation, it remaineth therefore that we weep. Thus did Christ; after having many times exhorted those in Jerusalem, when they profited nothing, He wept at their hardness. This also do the Prophets, and this let us do now. Henceforth is the season for mourning and tears and wailing; it is seasonable for us also to say now, "Call for the mourning women, and send for the cunning women, that they may cry aloud" (Jer. ix. 17); perhaps thus we shall be able to cast out the malady of those who build splendid houses, of those who surround themselves with lands gotten by rapine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252064.html'
source_title="Homily on the Gospel of John 64"
