[[commentary]]
quote='''
"Shadrach, Meshach, and Abednego, ye servants of the most high God, come forth, and come hither." Mighty dignity! "Ye servants of the most high God, come forth, and come hither." How are they to come forth, O king? Thou didst cast them into the fire bound; they have continued this long time in the fire. Why, had they been made of adamant, had they been blocks of metal, in singing that entire hymn, must they not have perished? On this account then they were saved, because they sang praises to God. The fire reverenced their readiness to suffer and afterwards it reverenced that wonderful song, and their hymns of praise. By what title dost thou call them? I said before, "Ye servants of the most high God." Yes, to the servants of God, all things are possible; for if some, who are the servants of men, have, nevertheless, power, and authority, and the disposal of their concerns, much more have the servants of God. He called them by the name most delightful to them, he knew that by this means he flattered them most: for indeed, if it was in order to continue servants of God, that they entered into the fire, there could be no sound more delightful to them than this. Had he called them kings, had he called them lords of the world, yet would he not so truly have rejoiced them as when he said, "Ye servants of the most high God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25208.html'
source_title="HOMILIES ON EPHESIANS 8"
