[[commentary]]
quote='''
"And when they had fulfilled all that was written of Him, they took Him down from the tree, and laid Him in a sepulchre."

"By condemning Him, they fulfilled the voices of the prophets." Then again from the Scriptures. And observe also, as one moved by the Spirit Himself, he continually preaches the Passion, the Burial. "Having taken Him down from the tree." Observe, what a great point they make of this. He speaks of the manner of His death. Moreover they bring Pilate conspicuously forward, that the fact of the Passion may be proved by the mention of the tribunal by which he was condemned, but at the same time, for the greater impeachment of those His crucifiers, seeing they delivered Him up to an alien. And he does not say, They made a complaint against Him, but, "They desired, though having found no cause of death in Him, that He should be slain."

"And when they had fulfilled all that was written of Him." Observe what a point he makes of showing that the whole thing was a Divine Dispensation. See, by saying what did they persuade men? By telling them that He was crucified? Why, what could be less persuasive than this? That He was buried - by them to whom it was promised that He should be salvation? that He who was buried forgives sins, yea, more than the Law has power to do?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252029.html'
source_title='Homily on Acts 29'
