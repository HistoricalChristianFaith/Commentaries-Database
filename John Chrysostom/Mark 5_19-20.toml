[[commentary]]
quote='''
(non occ.) But although he bade others, whom he healed, to tell it to no one, he nevertheless fitly bids this one proclaim it, since all that region, being possessed by devils, remained without God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
