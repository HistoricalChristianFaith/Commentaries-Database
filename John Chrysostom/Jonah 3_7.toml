[[commentary]]
quote='''
Let us see then how the Ninevites fasted, and how they were delivered from that wrath—"Let neither man nor beast, herd nor flock, taste anything," saith (the prophet). What sayest thou? Tell me—must even the irrational things fast, and the horses and the mules be covered with sackcloth? "Even so," he replies. For as when, at the decease of some rich man, the relatives clothe not only the men servants and maid servants, but the horses also with sackcloth, and give orders that they should follow the procession to the sepulchre, led by their grooms; thus signifying the greatness of the calamity, and inviting all to pity; thus also, indeed, when that city was about to be destroyed, even the irrational nature was enveloped in sackcloth, and subjected to the yoke of fasting. "It is not possible," saith he, "that irrational creatures should learn the wrath of God by means of reason; let them be taught by means of fasting, that this stroke is of divine infliction. For if the city should be overturned, not only would it be one common sepulchre for us, the dwellers therein, but for these likewise. Inasmuch then as these would participate in the punishment, let them also do so in the fast."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25203.html'
source_title="Concerning the Statues, Homily 3"
