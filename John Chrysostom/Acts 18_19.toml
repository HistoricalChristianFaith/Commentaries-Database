[[commentary]]
quote='''
[Paul] left them in Ephesus so that they might teach. Indeed those who had stayed with him for such a long time had learned many things; he had not, however, completely detached them from the Jewish customs.
'''
source_url=''
source_title="CATENA ON THE ACTS OF THE APOSTLES 18.19"

[[commentary]]
quote='''
"And with him Priscilla" - lo, a woman also - "and Aquila." But these he left at Ephesus. With good reason, namely, that they should teach. For having been with him so long time, they were learning many things: and yet he did not at present withdraw them from their custom as Jews. "And he came to Ephesus, and left them there: but he himself entered into the synagogue, and reasoned with the Jews."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252040.html'
source_title="Homily on Acts 40"

[[commentary]]
quote='''
"And they came to Ephesus, and there he left them": for he did not wish to take them about with him, but left them at Ephesus. But they subsequently dwelt at Corinth, and he bears high testimony to them, and writing to the Romans, salutes them. ... It was not for nothing that he left them at Ephesus, but for Apollos' sake, the Spirit so ordered it, that he might come with greater force to the attack upon Corinth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252040.html'
source_title="Homily on Acts 40"
