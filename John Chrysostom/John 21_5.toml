[[commentary]]
quote='''
As they then were laboring and wearied, Jesus presenteth Himself before them, and doth not at once reveal Himself, so that they enter into converse with Him. He therefore saith to them, "Have ye any meat?" For a time He speaketh rather after a human manner, as if about to buy somewhat of them. But when they made signs that they had none, He bade them cast their nets to the right; and on casting they obtained a haul. But when they recognized Him, the disciples Peter and John again exhibited the peculiarities of their several tempers. The one was more fervent, the other more lofty; the one more keen, the other more clear-sighted. On this account John first recognized Jesus, Peter first came to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title="Homily on the Gospel of John 87"

[[commentary]]
quote='''
(Hom. lxxxvii) He did not make Himself known to them immediately, but entered into conversation; and first He speaks after human fashion: Then Jesus saith unto them, Children, have ye any meat? as if He wished to beg some of them. They answered, No.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title="Catena Aurea by Aquinas"
