[[commentary]]
quote='''
As much as to say, If ye believe me not, remember His own words. And then follows further proof, when he adds, Come, see the place where the Lord lay.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252028.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"He is risen." Whence is it evident? "As He said." So that if ye refuse to believe me, he would say, remember His words, and neither will ye disbelieve me. Then also another proof, "Come and see the place where He lay." For this he had lifted up the stone, in order that from this too they might receive the proof.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252089.html'
source_title='Homily on the Gospel of Matthew 89'
