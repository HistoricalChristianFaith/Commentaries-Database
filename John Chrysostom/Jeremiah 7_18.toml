[[commentary]]
quote='''
For this is why He at all threatens punishment; that by fear He may destroy contempt; and when the threat alone is sufficient to cause fear in us, He doth not suffer us to undergo the actual trial. See, for instance, what He saith unto Jeremiah, "Seest thou not what they do? Their fathers light a fire, their children gather sticks together, their women knead dough." It is to be feared lest the same kind of thing be said also concerning us. "Seest thou not what they do? No one seeketh the things of Christ, but all their own. Their children run into uncleanness, their fathers into covetousness and rapine, their wives so far from keeping back their husbands from the pomps and vanities of life, do rather sharpen their appetites for them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%25208.html'
source_title="HOMILIES ON 1 CORINTHIANS 8:8"
