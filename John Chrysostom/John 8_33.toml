[[commentary]]
quote='''
"We be Abraham's seed, and were never in bondage to any man." And yet if they must needs have been vexed, it might have been expected that they would have been so at the former part of His speech, at His having said, "Ye shall know the truth"; and that they would have replied, "What! do we not now know the truth? Is then the Law and our knowledge a lie?" But they cared for none of these things, they are grieved at worldly things, and these were their notions of bondage. And certainly even now, there are many who feel shame at indifferent matters, and at this kind of bondage, but who feel none for the bondage of sin, and who would rather be called servants to this latter kind of bondage ten thousand times, than once to the former. Such were these men, and they did not even know of any other bondage, and they say, "Bondsmen callest thou those who are of the race of Abraham, the nobly born, who therefore ought not to be called bondsmen? For, saith one, we were never in bondage to any man." Such are the boastings of the Jews. "We are the seed of Abraham," "we are Israelites." They never mention their own righteous deeds. Wherefore John cried out to them, saying, "Think not to say that we have Abraham to our father." And why did not Christ confute them, for they had often been in bondage to the Egyptians, Babylonians, and many others? Because His words were not to gain honor for Himself, but for their salvation, for their benefit, and toward this object He was pressing. For He might have spoken of the four hundred years, He might have spoken of the seventy, He might have spoken of the years of bondage during the time of the Judges, at one time twenty, at another two, at another seven; He might have said that they had never ceased being in bondage. But He desired not to show that they were slaves of men, but that they were slaves of sin, which is the most grievous slavery, from which God alone can deliver; for to forgive sins belongeth to none other. And this too they allowed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252054.html'
source_title="Homily on the Gospel of John 54"
