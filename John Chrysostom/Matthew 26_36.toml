[[commentary]]
quote='''
(Hom. Ixxxiii.) He says, Sit ye here, while I go and pray yonder, because the disciples adhered inseparably to Christ; but it was His practice to pray apart from them, therein teaching us to study quiet and retirement for our prayers.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Because they clung to Him inseparably, therefore He saith, "Tarry ye here, while I go away and pray." For it was usual with Him to pray apart from them. And this He did teaching us in our prayers, to prepare silence for ourselves and great retirement.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252083.html'
source_title='Homily on the Gospel of Matthew 83'
