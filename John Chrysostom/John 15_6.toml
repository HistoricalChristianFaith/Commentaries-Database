[[commentary]]
quote='''
(Hom. lxxvi. 1) But He goes on to say more than this: If a man abide not in Me, he is cast forth as a branch, i. e. shall not benefit by the care of the husbandman, and withereth, i. e. shall lose all that it desires from the root, all that supports its life, and shall die.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"He is cast forth," He saith. No longer enjoying the benefit of the husbandman's hand. "And is withered." That is, if he had aught of the root, he loses it; if any grace, he is stripped of this, and is bereft of the help and life which proceed from it. And what the end? "He is cast into the fire." Not such he who abideth with Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252076.html'
source_title='Homily on the Gospel of John 76'
