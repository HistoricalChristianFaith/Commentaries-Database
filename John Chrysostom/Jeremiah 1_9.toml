[[commentary]]
quote='''
Surely these things were said for their sakes, that they might have no pretense of excuse. Since if this were not the case, what shall He have more than Isaiah? for he too saith the very same thing, "The Lord God giveth me the tongue of the learned, that I should know when I ought to speak a word." What more than Jeremiah? for he too when he was sent was inspired. What then Ezekiel? for he too, after eating the roll, so spake.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252069.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 69"
