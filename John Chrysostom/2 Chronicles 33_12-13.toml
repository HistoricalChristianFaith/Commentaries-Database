[[commentary]]
quote='''
"But the delay hath comfort." And what sort of comfort, to be every day looking for punishment and vengeance? Nay, if thou wouldest have some comfort from this delay, take it by gathering for thyself the fruit of amendment after repentance. Since if the mere delay of vengeance seem to thee a sort of refreshment, far more is it gain not to fall into the vengeance. Let us then make full use of this delay, in order to have a full deliverance from the dangers that press upon us. For none of the things enjoined is either burdensome or grievous, but all are so light and easy, that if we only bring a genuine purpose of heart, we may accomplish all, though we be chargeable with countless offenses. For so Manasses had perpetrated innumerable pollutions, having both stretched out his hands against the saints, and brought abominations into the temple, and filled the city with murders, and wrought many other things beyond excuse; yet nevertheless after so long and so great wickedness, he washed away from himself all these things. How and in what manner? By repentance, and consideration. For there is not, yea, there is not any sin, that doth not yield and give way to the power of repentance, or rather to the grace of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252022.html'
source_title="Homily on Matthew 22"


[[commentary]]
quote='''
Manasses, having exceeded all in fury and tyranny, and having subverted the legal form of worship, and shut up the temple, and caused the deceit of idolatry to flourish, and having become more ungodly than all who were before him, when he afterwards repented, was ranked amongst the friends of God. Now if, looking to the magnitude of his own iniquities, he had despaired of restoration and repentance, he would have missed all which he afterwards obtained: but as it was, looking to the boundlessness of God's tender mercy instead of the enormity of his transgressions, and having broken in sunder the bonds of the devil, he rose up and contended with him, and finished the good course.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FAn%2520Exhortation%2520to%2520Theodore%2520After%2520His%2520Fall%2FLetter%25201.html'
source_title="An Exhortation to Theodore After His Fall, Letter 1"
