[[commentary]]
quote='''
Let not then any one account His injunctions impracticable. For He beyond all others knows the nature of things; He knows that fierceness is not quenched by fierceness, but by gentleness. And if in men's actual deeds too thou wouldest see this result, read the book of the Acts of the Apostles, and thou wilt see how often, when the people of the Jews had risen up against them and were sharpening their teeth, these men, imitating the dove, and answering with suitable meekness, did away with their wrath, quenched their madness, broke their impetuosity. As when they said, "Did not we straitly command you, that ye should not speak in this name?" although able to work any number of miracles, they neither said nor did anything harsh, but answered for themselves with all meekness, saying, "Whether it be right to hearken unto you more than unto God, judge ye."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252033.html'
source_title="Homily on Matthew 33"

[[commentary]]
quote='''
"For we cannot but speak the things we have seen and heard:" so that we are witnesses who have a right to be believed. Already these as martyrs have borne testimony: set in the battle against all, they said, "We cannot but speak the things we have seen and heard." If the things we speak be false, reprehend them; if true, why hinderest thou? Such is philosophy! Those, in perplexity, these in gladness: those covered with exceeding shame, these doing all with boldness: those in fear, these in confidence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252010.html'
source_title="Homily on Acts 10"
