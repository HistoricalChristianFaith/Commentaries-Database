[[commentary]]
quote='''
And that they should not say, He slanders us as an enemy, He brings forward the Prophet declaring the same opinion, as it follows, That there might be fulfilled in them the prophecy of Isaiah, who said, With the hearing ye shall hear and shall not understand, and seeing ye shall see and shall not behold. (Is. 6:9)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
After this, lest any one should suppose His words to be a mere accusation, and lest men should say, Being our enemy He is bringing these charges and calumnies against us; He introduces the prophet also, pronouncing the same judgment as Himself.

"For in them is fulfilled," saith He, "the prophecy of Esaias, which saith, By hearing ye shall hear, and shall not understand, and seeing ye shall see, and shall not perceive."

Seest thou the prophet likewise, accusing them with this same accuracy? for neither did He say, Ye see not, but "Ye shall see and not perceive;" nor again, Ye shall not hear, but "Ye shall hear and not understand." So that they first inflicted the loss on themselves, by stopping their ears, by closing their eyes, by making their heart fat.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252045.html'
source_title='Homily on the Gospel of Matthew 45'
