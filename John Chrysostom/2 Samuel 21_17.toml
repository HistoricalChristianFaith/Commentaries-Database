[[commentary]]
quote='''
Entreat God—for this cause entreat Him. It is in our behalf indeed that it is done, but it is wholly for your sakes. For we are appointed for your advantage, and for your interests we are concerned.…For violent is the enemy we have. For each of you indeed anxiously thinks of his own interests, but we the concerns of all together. We stand in the part of the battle that is pressed on. The devil is more violently armed against us. For in wars too, he that is on the opposite side endeavors before all others to overthrow the general. For this reason all his fellow-combatants hasten there. For this reason there is much tumult, every one endeavoring to rescue him; they surround him with their shields, wishing to preserve his person. Hear what all the people said to David (I do not say this, as comparing myself to David, for I am not so mad, but because I wish to show the affection of the people for their ruler), "Thou shalt go no more out with us to battle, that thou quench not the lamp of Israel." See how anxious they were to spare the old man. I am greatly in need of your prayers. Let no one, as I have said, from an excessive humility deprive me of this alliance and succor. If our part be well approved, your own also will be more honorable. If our teaching flow abundantly, the riches will redound to you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Thessalonians%2FHomily%25204.html'
source_title="HOMILIES ON 2 THESSALONIANS 4"
