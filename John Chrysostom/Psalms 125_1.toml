[[commentary]]
quote='''
Such, however, is not the nature of the righteous man. But what manner of man is he? Hear the same prophet, saying, "They that trust in the Lord are as Mount Zion." What means then, "As Mount Zion?" "He shall not be shaken," saith he, "for ever." For whatever engines thou bringest up, whatever darts thou hurlest, desiring to overturn a mountain, thou wilt never be able to prevail; for how canst thou? thou wilt break in pieces all thine engines, and exhaust thine own strength. Such also is the righteous man. Whatever blows he may receive, he suffereth no evil therefrom; but destroyeth the power of those who take counsel against him, and not of men only, but of demons. Thou hast heard often what engines the Devil brought up against Job; but not only did he fail to overthrow that mountain, but drew back exhausted, his darts broken to pieces, and his engines rendered useless, by that assault!
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25208.html'
source_title="HOMILIES CONCERNING THE STATUES 8:4"
