[[commentary]]
quote='''
(Hom. lxxxv) They bring the spices most efficacious for preserving the body from corruption, treating Him as a mere man. Yet this shows great love.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
