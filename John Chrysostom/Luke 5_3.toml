[[commentary]]
quote='''
But our Lord was very desirous to collect the multitudes, that none might remain behind, but they might all behold Him face to face; He therefore enters into a ship, as it is said, And he entered into a ship, which was Simon's, and prayed him.

After having performed many miracles, He again commences His teaching, and being on the sea, He fishes for those who were on the shore. Hence it follows, And he sat down and taught the people out of the ship.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
