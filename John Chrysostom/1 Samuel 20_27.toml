[[commentary]]
quote='''
As for Saul he hated and abhorred him so much after the countless good services which he had done, after his brilliant triumphs, and the salvation which he had wrought in the matter of Goliath, that he could not bear to mention him by his own name, but called him after his father. For once when a festival was at hand, and Saul, having devised some treachery against him, and contrived a cruel plot, did not see him arrive—"where," said he, "is the son of Jesse?" He called him by his father's name, both because on account of his hatred he could not endure the recollection of his proper name, and also because he thought to damage the distinguished position of that righteous man by a reference to his low birth—a miserable and despicable thought: for certainly, even if he had some accusation to bring against the father this could in no wise injure David. For each man is answerable for his own deeds, and by these he can be praised and accused. But as it was, not having any evil deed to mention, he brought forward his low birth, expecting by this means to throw his glory into the shade, which in fact was the height of folly. For what kind of offence is it to be the child of insignificant and humble parents?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FTo%2520Those%2520Who%2520Had%2520Not%2520Attended%2520the%2520Assembly.html'
source_title="HOMILY TO THOSE WHO HAD NOT ATTENDED THE ASSEMBLY 6"
