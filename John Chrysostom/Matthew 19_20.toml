[[commentary]]
quote='''
Then since Jesus mentioned those out of the law, he saith, "All these things have I kept from my youth up." And neither at this did he stop, but again asks, "What lack I yet?" which itself again was a sign of his very earnest desire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252063.html'
source_title='Homily on the Gospel of Matthew 63'

[[commentary]]
quote='''
But because all the commandments that the Lord had recounted were contained in the Law, The young man saith unto him. All these have I kept from my youth up. And did not even rest there, but asked further, What lack I yet? which alone is a mark of his intense desire.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"
