[[commentary]]
quote='''
How then are we to be freed from this pest? If we can drink a potion that is able to kill the worms within us and the serpents. And of what nature, it will be asked, may this potion be, that hath such power? The precious Blood of Christ, if it be received with full assurance, for this will have power to extinguish every disease; and together with this the divine Scriptures carefully heard, and almsgiving added to our hearing; for by means of all these things we shall be enabled to mortify the affections that mar our soul. And then only shall we live; for now surely we are in no better state than the dead: forasmuch as it cannot be, that while those passions live, we should live too, but we must necessarily perish. And unless we first kill them here, they will be sure to kill us in the other life; or rather before that death they will exact of us, even here, the utmost penalty. Yes, for every such passion is both cruel and tyrannical and insatiable, and never ceases to devour us every day. For "their teeth are the teeth of a lion," or rather even far more fierce. For the lion, as soon as ever he is satisfied, is wont to leave the carcass that hath fallen in his way; but these passions neither are satisfied, nor do they leave the man whom they have seized, until they have set him nigh the devil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25204.html'
source_title="Homily on the Gospel of Matthew 4"
