[[commentary]]
quote='''
(Hom. lxxv. 1, 2) It follows, And the word which ye hear is not Mine, but the Father's which sent Me; i. e. He that heareth not My words, inasmuch as he loveth not Me, so loveth he not My Father. This He says to show that He spoke nothing which was not the Father's, nothing beside what seemed good to the Father.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
