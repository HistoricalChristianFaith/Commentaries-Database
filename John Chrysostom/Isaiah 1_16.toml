[[commentary]]
quote='''
Let us become clean to the utmost of our power. Let us wipe away our sins. And how to wipe them away, the prophet teaches, saying, "Wash you, make you clean, put away your wickedness from your souls, before Mine eyes." What is "before Mine eyes"? Because some seem to be free from wickedness, but only to men, while to God they are manifest as being "whited sepulchers." Therefore He says, so put them away as I see.… "Come now, and let us reason together, saith the Lord: and though your sins be as scarlet, I will make you white as snow, and if they be as crimson, I will make you white as wool." Thou seest that we must first cleanse ourselves, and then God cleanses us. For having said first, "Wash you, make you clean," He then added "I will make you white."… Great then is the power of repentance, at least if it makes us as snow, and whitens us as wool, even if sin have first got possession and dyed our souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252012.html'
source_title="ON THE EPISTLE TO THE HEBREWS 12:4"

[[commentary]]
quote='''
For the Prophet also saith, "Wash you, make you clean, put away the wickedness from your souls"; so that such a one is washed and is clean. Since then these men had cast away all wickedness from their souls, and had companied with Him with a pure mind, therefore He saith according to the word of the Prophet, "he that is washed is clean already." For in that place also It meaneth not the "washing" of water, practiced by the Jews; but the cleansing of the conscience. Be we then also clean; learn we to do well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252070.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 70"


[[commentary]]
quote='''
Let us accept the medicine that obliterates our failures. Repentance is not what is spoken in words but what is confirmed by deeds, the repentance that obliterates the filth of impiety from the heart.… Why "before my eyes"? Because the eyes of people see differently, and the eye of God sees differently.… "Do not adulterate repentance with pretense," he says, "but, before my eyes, which examine what is secret, reveal the fruits of repentance."
'''
source_url=''
source_title="HOMILIES ON REPENTANCE AND ALMSGIVING 7:3.10"
