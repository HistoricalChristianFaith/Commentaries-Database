[[commentary]]
quote='''
For so Manasses had perpetrated innumerable pollutions, having both stretched out his hands against the saints, and brought abominations into the temple, and filled the city with murders, and wrought many other things beyond excuse; yet nevertheless after so long and so great wickedness, he washed away from himself all these things. How and in what manner? By repentance, and consideration. For there is not, yea, there is not any sin, that doth not yield and give way to the power of repentance, or rather to the grace of Christ. Since if we would but only change, we have Him to assist us. And if thou art desirous to become good, there is none to hinder us; or rather there is one to hinder us, the devil, yet hath he no power, so long as thou choosest what is best, and so attractest God to thine aid.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252022.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 22.6"
