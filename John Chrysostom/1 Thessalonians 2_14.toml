[[commentary]]
quote='''
And are we worthy then so much as even to mention the name of Paul? He, who had moreover grace to aid him, yet was not satisfied, but contributed to the work ten thousand perils; whilst we, who are destitute of that source of confidence, whence, tell me, do we expect either to preserve those who are committed to our charge, or to gain those who are not come to the fold;—men, as we are, who have been making a study of self-indulgence, who are searching the world over for ease, and who are unable, or rather who are unwilling, to endure even the very shadow of danger, and are as far distant from his wisdom as heaven is from earth? Hence it is too that they who are under us are at so great a distance behind the men of those days; because the disciples of those days were better than the teachers of these, isolated as they were in the midst of the populace, and of tyrants, and having all men on all sides their enemies, and yet not in the slightest degree dragged down or yielding. Hear at least what he saith to the Philippians, "Because to you it hath been granted in the behalf of Christ, not only to believe on Him, but also to suffer in his behalf." And again to the Thessalonians, "For ye, brethren, became imitators of the churches of God which are in Judaea." And again in writing to the Hebrews he said, "And ye took joyfully the spoiling of your possessions." And to the Colossians he testifies, saying, "For ye died, and your life is hid with Christ in God." And indeed to these very Ephesians he bears witness of many perils and dangers. And again in writing to the Galatians, he says, "Did ye suffer so many things in vain? if it be indeed in vain." And you see them too, all employed in doing good. Hence it was that both grace wrought effectually in those days, hence also that they lived in good works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25206.html'
source_title="Homily on Ephesians 6"


[[commentary]]
quote='''
"For ye," he says, "became imitators of the Churches of God which are in Judaea." This is a great consolation. It is no wonder, he says, that they should do these things to you, inasmuch as they have done it also to their own countrymen. And this too is no little proof that the Preaching is true, that even Jews were able to endure all things. "For ye also," he says, "have suffered the same things of your own countrymen, even as they did of the Jews." There is something more in his saying, "as they also did in Judaea"; it shows that everywhere they rejoiced, as having nobly contended. He says therefore, "that ye also suffered the same things." And again, what wonder is it, if to you also, when even to the Lord they dared do such things?

Do you see how he introduces this as containing great consolation? And constantly he adverts to it; and upon a close examination one may find it in nearly all his Epistles, how variously, upon all occasions of temptation, he brings forward Christ. Observe accordingly, that here also, when accusing the Jews, he puts them in mind of the Lord, and of the sufferings of the Lord; so well does he know that this is a matter of the greatest consolation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Thessalonians%2FHomily%25203.html'
source_title="Homily on 1 Thessalonians 3"
