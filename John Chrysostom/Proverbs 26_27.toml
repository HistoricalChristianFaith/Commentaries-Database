[[commentary]]
quote='''
Such a thing is malice! it will give way to nothing, it looks to one thing only, and that is, to destroy the person against whom it plotteth. But what saith the Scripture? "Whoso diggeth a pit for his neighbor, shall fill into it himself." Which was the case then. For they desired to kill Him, to stop, as they thought, His preaching; the result was the opposite. For the preaching flourishes by the grace of Christ, while all that was theirs is quenched and perished; they have lost their country, their freedom, their security, their worship, they have been deprived of all their prosperity, and are become slaves and captives.

Knowing then this, let us never plot against others, aware that by so doing we whet the sword against ourselves, and inflict upon ourselves the deeper wound. Hath any one grieved thee, and desireth thou to avenge thyself on him? Avenge not thyself; so shalt thou be able to be avenged; but if thou avenge thyself, thou art not avenged. Think not that this is a riddle, but a true saying. "How, and in what way?" Because if thou avenge not thyself on him, thou makest God his enemy; but if thou avenge thyself, no longer so. "Vengeance is Mine, I will repay, saith the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252051.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 51"
