[[commentary]]
quote='''
Festus saw the boldness, and what says he? For Paul was all along addressing himself to the king-he was in a manner annoyed, and says to him, "Thou art beside thyself, Paul:" for, "while he thus discoursed, Festus said with a loud voice, Paul, thou art beside thyself: much learning doth make thee mad." What then says Paul? With gentleness, "I am not mad," says he, "most noble Festus; but speak forth the words of truth and soberness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252052.html'
source_title="Homily on Acts 52"
