[[commentary]]
quote='''
For why, O man, dost thou gather gold? Why dost thou make thy bondage more bitter? Why thy watching more grievous? Why thy anxiety more painful? Account for thine own the metals buried in the mines, those in the kings' courts. For indeed if thou hadst all that heap, thou wouldest keep it only, and wouldest not use it. For if now thou hast not used the things thou possessest, but abstainest from them as though they belonged to others, much more would this be the case with thee, if thou hadst more. For it is the way of the covetous, the more they heap up around them, the more to be sparing of it. "But I know," sayest thou, "that these things are mine." The possession then is in supposition only, not in enjoyment. But I should be an object of fear to men, sayest thou. Nay, but thou wouldest by this become a more easy prey both to rich and poor, to robbers, and false accusers, and servants, and in general to all that are minded to plot against thee. For if thou art desirous to be an object of fear, cut off the occasions by which they are able to lay hold of thee and pain thee, whoever have set their hearts thereon. Hearest thou not the parable that saith, that the poor and naked man, not even a hundred men gathered together are ever able to strip? For he hath his poverty as his greatest protection, which not even the king shall ever be able to subdue and take. The covetous man indeed all join in vexing. And why do I say men, when moths and worms war against such a man? And why do I speak of moths? Length of time is enough alone, even when no one troubles him, to do the greatest injury to such a man. What then is the pleasure of wealth? For I see its discomforts, but do thou tell me the pleasure of it. And what are its discomforts? sayest thou: anxieties, plots, enmities, hatred, fear; to be ever thirsting and in pain. For if any one were to embrace a damsel he loves, but were not able to satisfy his desire, he undergoes the utmost torment. Even so also doth the rich man. For he hath plenty, and is with her, but cannot satisfy all his desire; but the same result takes place as some wise man mentions; "The lust of eunuch to deflower a virgin;" and, "Like an eunuch embracing a virgin and groaning;" so are all the rich.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252083.html'
source_title="Homily on the Gospel of Matthew 83"
