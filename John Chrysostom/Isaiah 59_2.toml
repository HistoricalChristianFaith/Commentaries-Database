[[commentary]]
quote='''
What the middle wall of partition is, he interprets by saying, "the enmity having abolished in His flesh, even the law of commandments contained in ordinances." Some indeed affirm that he means the wall of the Jews against the Greeks, because it did not allow the Jews to hold intercourse with the Greeks. To me, however, this does not seem to be the meaning, but rather that he calls "the enmity in the flesh," a middle wall, in that it is a common barrier, cutting us off alike from God. As the Prophet says, "Your iniquities separate between you and Me;" for that enmity which He had both against Jews and Gentiles was, as it were, a middle wall. And this, whilst the law existed, was not only not abolished, but rather was strengthened; "for the law," saith the Apostle, "worketh wrath."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25205.html'
source_title="HOMILIES ON EPHESIANS 5"


[[commentary]]
quote='''
It is the greatest punishment to commit sin, though we may remain unpunished; as on the other hand, it is the greatest honour and repose to live virtuously, though we may be punished. For sins separate us from God; as He Himself speaks; "Have not your sins separated between you and Me?" But punishments lead us back to God. As one saith, "Give peace; for Thou hast recompensed us for all things." Suppose any one hath a wound; which is the most deserving of fear, gangrene, or the surgeon's knife? the steel, or the devouring progress of the ulcer? Sin is a gangrene, punishment is the surgeon's knife. As then, he who hath a gangrene, although he is not lanced, hath to sustain the malady, and is then in the worse condition, when he is not lanced; so also the sinner, though he be not punished, is the most wretched of men; and is then especially wretched, when he hath no punishment, and is suffering no distress.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25206.html'
source_title="HOMILIES CONCERNING THE STATUES 6:14"


[[commentary]]
quote='''
For He Himself never turns away from us, but it is we who put ourselves far off: for "I am a God" we read "at hand and not a God afar off." And again, when He was rebuking them by the mouth of this prophet He said "Do not your sins separate between you and me?" Inasmuch then as this is the cause which puts us far from God, let us remove this obnoxious barrier, which prevents any near approach being made.

But now hear how this has actually occurred in real instances. Amongst the Corinthians some man of mark committed a sin such as was not named even among the Gentiles. This man was a believer and belonged to the household of Christ; and some say that he was actually a member of the priesthood. What then? Did Paul cut him off from the communion of those who were in the way of salvation. By no means: for he himself it is who rebukes the Corinthians countless times, backwards and forwards, because they did not bring the man to a state of repentance: but, desiring to prove to us that there is no sin which cannot be healed, he said again concerning the man who had transgressed more grievously than the Gentiles: "Deliver such an one to Satan for destruction of the flesh that his spirit may be saved in the day of the Lord Jesus Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FAn%2520Exhortation%2520to%2520Theodore%2520After%2520His%2520Fall%2FLetter%25201.html'
source_title="LETTER TO THE FALLEN THEODORE 1:8"
