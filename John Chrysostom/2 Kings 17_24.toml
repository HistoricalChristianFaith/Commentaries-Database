[[commentary]]
quote='''
But he carried them to Babylon and to the Medes, and having brought thence nations from divers places, planted them in Samaria, that his dominion for the future might be sure, his own people occupying the place. After this, God, desiring to show that He had not given up the Jews through weakness, but because of the sins of those who were given up, sent lions against the foreigners, who ravaged all their nation. These things were reported to the king, and he sent a priest to deliver to them the laws of God. Still not even so did they desist wholly from their impiety, but only by halves. But as time went on, they in turn abandoned their idols, and worshiped God. And when things were in this state, the Jews having returned, ever after entertained a jealous feeling towards them as strangers and enemies, and called them from the name of the mountain, "Samaritans."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252031.html'
source_title="Homily 31 on John"
