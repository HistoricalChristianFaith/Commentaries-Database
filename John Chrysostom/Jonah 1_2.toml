[[commentary]]
quote='''
For the same who had been their accuser, and who had said, that "the cry of their wickedness hath ascended up even to heaven," himself again bears testimony of an opposite kind, by saying, "God saw that every one departed from their own evil ways." He does not say, from fornication, or adultery, or theft, but from their "own evil ways." And how did they depart? As God knew, not as man judged of the matter.… These men had, moreover, gone to the extreme of wickedness before; for when you hear it said, "The cry of their wickedness is come up before me," you can understand nothing else than the excess of their wickedness. Nevertheless, within three days they were capable of being transformed to a state of complete virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252020.html'
source_title="HOMILIES CONCERNING THE STATUES 20"
