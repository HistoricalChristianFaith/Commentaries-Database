[[commentary]]
quote='''
The law said "Thou shalt not appear before the Lord empty;" that is, enter not into the temple without sacrifices. Now if it is not right to go into the house of God without sacrifices, much more ought we to enter the assembly accompanied by our brethren: for this sacrifice and offering is better than that, when thou bringest a soul with thee into the Church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FTo%2520Those%2520Who%2520Had%2520Not%2520Attended%2520the%2520Assembly.html'
source_title="HOMILY TO THOSE WHO HAD NOT ATTENDED THE ASSEMBLY 4"
