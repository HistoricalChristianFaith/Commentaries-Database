[[commentary]]
quote='''
But how came Philip to ask this question? Christ had said, "If ye had known Me, ye should have known My Father also" and He had often said the same to the Jews. Since then Peter and the Jews had often asked Him, "Who is the Father?" since Thomas had asked Him, and no one had learnt anything clear, but His words were still not understood; Philip, in order that He might not seem to be importunate and to trouble Him by asking in his turn after the Jews, "Show us the Father," added, "and it sufficeth us," "we seek no more." Yet Christ had said, "If ye had known Me, ye should have known My Father also," and by Himself He declared the Father. But Philip reversed the order, and said, "Show us the Father," as though knowing Christ exactly. But Christ endureth him not, but putteth him in the right way, persuading him to gain the knowledge of the Father through Himself, while Philip desired to see Him with these bodily eyes, having perhaps heard concerning the Prophets, that they "saw God." But those cases, Philip, were acts of condescension. Wherefore Christ said, "No man hath seen God at any time"; and again, "Every man that hath heard and hath learned from God cometh unto Me." "Ye have neither heard His voice at any time, nor seen His shape." And in the Old Testament, "No man shall see My face, and live." What saith Christ? Very reprovingly He saith, "Have I been so long time with you, and hast thou not known Me, Philip?" He said not, "hast thou not seen," but, "hast thou not known Me." "Why," Philip might say, "do I wish to learn concerning Thee? At present I seek to see Thy Father, and Thou sayest unto me, hast thou not known Me?" What connection then hath this with the question? Surely a very close one; for if He is that which the Father is, yet continuing a Son, with reason He showeth in Himself Him who begat Him. Then to distinguish the Persons He saith, "He that hath seen Me hath seen the Father," lest any one should assert that the same is Father, the same Son. For had He been the Father, He would not have said, "He that hath seen Me hath seen Him." Why then did He not reply, "thou askest things impossible, and not allowed to man; to Me alone is this possible"? Because Philip had said, "it sufficeth us," as though knowing Christ, He showeth that he had not even seen Him. For assuredly he would have known the Father, had he been able to know the Son. Wherefore He saith, "He that hath seen Me, hath seen the Father." "If any one hath seen Me, he shall also behold Him." What He saith is of this kind: "It is not possible to see either Me or Him." For Philip sought the knowledge which is by sight, and since he thought that he had so seen Christ, he desired in like manner to see the Father; but Jesus showeth him that he had not even seen Himself, And if any one here call knowledge, sight, I do not contradict him, for, "he that hath known Me," saith Christ, "hath known the Father." Yet He did not say this, but desiring to establish the Consubstantiality, declared, "he that knoweth My Essence, knoweth that of the Father also." "And what is this?" saith some one; "for he who is acquainted with creation knoweth also God." Yet all are acquainted with creation, and have seen it, but all do not know God. Besides, let us consider what Philip seeks to see. Is it the wisdom of the Father? Is it His goodness? Not so, but the very whatever God is, the very Essence. To this therefore Christ answereth, "He that hath seen Me." Now he that hath seen the creation, hath not also seen the Essence of God. "If any one hath seen Me, he hath seen the Father," He saith. Now had He been of a different Essence, He would not have spoken thus. But to make use of a grosser argument, no man that knows not what gold is, can discern the substance of gold in silver. For one nature is not shown by another. Wherefore He rightly rebuked him, saying, "Am I so long with you?" Hast thou enjoyed such teaching, hast thou seen miracles wrought with authority, and all belonging to the Godhead, which the Father alone worketh, sins forgiven, secrets published, death retreating, a creation wrought from earth, and hast thou not known Me? Because He was clothed with flesh, therefore He said, "Hast thou not known Me?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252074.html'
source_title="Homily on the Gospel of John 74"
