[[commentary]]
quote='''
And Paul again, when showing this very thing to the same Timothy wrote and says, "Lay hands suddenly on no man, neither be partaker of other men's sins." What dost thou say? Has another sinned, and do I share his blame and his punishment? Yes, says he, the man who authorizes evil; and just as in the case of any one entrusting into the hands of a raging and insane person a sharply pointed sword, with which the madman commits murder, that man who gave the sword incurs the blame; so any one who gives the authority which arises from this office to a man living in evil, draws down on his own head all the fire of that man's sins and audacity. For he who provides the root, this man is the cause of all that springs from it on every side.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FEulogy%2520Saint%2520Ignatius.html'
source_title="Eulogy on Saint Ignatius"

[[commentary]]
quote='''
"Lay hands," he says, "suddenly on no man, neither be partaker of other men's sins." What is "suddenly"? Not upon a first, nor a second, nor a third trial, but after frequent and strict examination and circumspection. For it is an affair of no common peril. For thou wilt be responsible for the sins committed by him, as well his past as his future sins, because thou hast delegated to him this power. For if thou overlook the past unduly, thou art answerable for the future also, as being the cause of them, by placing him in that station, and of the past too, for not leaving him to mourn over them, and to be in compunction. For as thou art a partaker of his good actions, so art thou of his sins.

"Keep thyself pure." This he says with reference to chastity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%252016.html'
source_title="Homily on 1 Timothy 16"
