[[commentary]]
quote='''
And, behold, he shall go before you, that is, to save you from danger, lest fear should prevail over faith.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252028.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"And tell His disciples, that ye shall see Him in Galilee." And he prepares them to bear good tidings to others, which thing most of all made them believe. And He said well "in Galilee," freeing them from troubles and dangers, so that fear should not hinder their faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252089.html'
source_title='Homily on the Gospel of Matthew 89'
