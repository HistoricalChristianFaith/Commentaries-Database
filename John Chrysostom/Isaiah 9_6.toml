[[commentary]]
quote='''
When Scripture wishes to show that God needs no one, it says that he has no counselor. When it wishes to show the equal honor of the Only Begotten, it calls the Son of God his counselor.
'''
source_url=''
source_title="AGAINST THE ANOMOEANS 11:14"

[[commentary]]
quote='''
"'Messenger' of great counsel," the Son of God is called, because of the other things which He taught, and principally because He announced the Father to men, as also now He saith, "I have manifested Thy Name unto the men." For after having said, "I have finished Thy work," He next explaineth it in detail, telling what sort of work. Now the Name indeed was well known. For Esaias said, "Ye shall swear by the true God." But what I have often told you I tell you now, that though it was known, yet it was so only to Jews, and not to all of these: but now He speaketh concerning the Gentiles. Nor doth He declare this merely, but also that they knew Him as the Father. For it is not the same thing to learn that He is Creator, and that He hath a Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252081.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 81"


[[commentary]]
quote='''
Come now, and let me show you that the Son is called God. "Behold, the virgin shall be with child and shall give birth to a son, and they shall call his name Immanuel, which means, 'God is with us.' " Did you see how both the name Lord is given to the Father and the name God is given to the Son? In the psalm, the sacred writer said, "Let them know that Lord is your name." Here Isaiah says, "They shall call his name Immanuel." And again, he says, "A child is born to us, and a son is given to us; and his name shall be called Angel of Great Counsel, God the Strong, the Mighty One."
'''
source_url=''
source_title="AGAINST THE ANOMOEANS 5:15"
