[[commentary]]
quote='''
What sayest thou? Dost thou believe the demon? Why not here also? He saith, They are "servants of the most high God;" thou sayest, "They exceedingly trouble our city:" he saith, "They show us the way of salvation;" thou sayest, "They teach customs which are not lawful for us to receive." Observe, how they do not attend even to the demon, but look only to one thing, their covetousness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252035.html'
source_title="Homily on Acts 35"

[[commentary]]
quote='''
"And teach customs, which are not lawful for us to receive, neither to observe, being Romans." They made a charge of treason of it. Why did they not say, Because they cast out the demon, they were guilty of impiety against God? For this was a defeat to them: but instead of that, they have recourse to a charge of treason: like the Jews when they said, "We have no king but Caesar: whoso maketh himself a king speaketh against Caesar."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252035.html'
source_title="Homily on Acts 35"
