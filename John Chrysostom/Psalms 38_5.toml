[[commentary]]
quote='''
For nothing is more filthy, nothing more impure, than sin. Wherefore the Prophet declaring its nature cried out, "My wounds stink, and are corrupt." And if thou wilt fully learn how ill-savored sin is, consider it after it hath been done; when thou art delivered from the desire, when the fire no longer troubleth thee, then shalt thou see what sin is. Consider anger, when thou art calm; consider avarice, when thou dost not feel it. There is nothing more shameful, nothing more accursed, than rapine and avarice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252052.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 52"


[[commentary]]
quote='''
But nothing is more offensive than the savor of sin, which made the Psalmist say, "My wounds stink and are corrupt." For sin is more foul than putrefaction itself. What, for instance, is more offensive than fornication? And if this is not perceived at the time of its commission, yet, after it is committed, its offensive nature, the impurity contracted in it, and the curse, and the abomination of it is perceived. So it is with all sin. Before it is committed it has something of pleasure, but after its commission, the pleasure ceases and fades away, and pain and shame succeed. But with righteousness it is the reverse. At the beginning it is attended with toil, but in the end with pleasure and repose. But even here, as in the one case the pleasure of sin is no pleasure, because of the expectation of disgrace and punishment, so in the other the toil is not felt as toil, by reason of the hope of reward.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%25202.html'
source_title="HOMILIES ON 1 TIMOTHY 2:11"
