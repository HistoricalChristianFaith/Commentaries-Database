[[commentary]]
quote='''
Do thou also therefore ask nothing worldly, but all things spiritual, and thou wilt surely receive. For so Solomon, because he asked what he ought, behold how quickly he received. Two things now, you see, should be in him that prays, asking earnestly, and asking what he ought: "since ye too," saith He, "though ye be fathers, wait for your sons to ask: and if they should ask of you anything inexpedient, ye refuse the gifts; just as, if it be expedient, ye consent and bestow it." Do thou too, considering these things, not withdraw until thou receive; until thou have found, retire not; relax not thy diligence, until the door be opened. For if thou approach with this mind, and say, "Except I receive, I depart not;" thou wilt surely receive, provided thou ask such things, as are both suitable for Him of whom thou askest to give, and expedient for thee the petitioner. But what are these? To seek the things spiritual, all of them; to forgive them that have trespassed, and so to draw nigh asking forgiveness; "to lift up holy hands without wrath and doubting." If we thus ask, we shall receive. As it is, surely our asking is a mockery, and the act of drunken rather than of sober men. "What then," saith one, "if I ask even spiritual things, and do not receive?" Thou didst not surely knock with earnestness; or thou madest thyself unworthy to receive; or didst quickly leave off.
"And wherefore," it may be inquired, "did He not say, what things we ought to ask"? Nay verily, He hath mentioned them all in what precedes, and hath signified for what things we ought to draw nigh. Say not then, "I drew nigh, and did not receive." For in no case is it owing to God that we receive not, God who loves us so much as to surpass even fathers, to surpass them as far as goodness doth this evil nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252023.html'
source_title="Homily on Matthew 23"
