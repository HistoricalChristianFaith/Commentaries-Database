[[commentary]]
quote='''
"But she," he says, "that is a widow indeed, and desolate, hath her hope set on God." (1 Tim. v. 5) To whom is this said? To those who have no children, because they are more highly approved, and have a greater opportunity of pleasing God, because all their chains are loosened to them. There is no one to hold them fast, no one to compel them to drag their chains after them. Thou art separated from thy husband, but art united to God. Thou hast not a fellow-servant for thy associate, but thou hast thy Lord. When thou prayest, tell me, dost thou not converse with God? When thou readest, hear Him conversing with thee. And what does He say to thee? Much kinder words than thy husband. For though indeed thy husband should flatter thee, the honor is not great, for he is thy fellow-servant. But when the Lord flatters the slave, then is the courtship great. How then does He court us? Hear by what means he does it. "Come," He says, "unto Me, all ye that labor and are heavy laden, and I will give you rest." (Matt. xi. 28) And again through the Prophet He calls, saying, "Will a woman forget to have compassion on the offspring of her womb? But even if a woman should forget, yet will I not forget thee, saith the Lord." (Isa. xlix. 15, Sept) Of how great a love are these words? Seest thou the conversation of God with thee?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Thessalonians%2FHomily%25206.html'
source_title="HOMILIES ON 1 THESSALONIANS 6"

[[commentary]]
quote='''
"Now she that is a widow indeed, and desolate, trusteth in God, and continueth in supplications and prayers night and day. But she that liveth in pleasure is dead while she liveth." She who being a widow has not made choice of a worldly life, is a widow indeed; she who trusts in God as she ought, and continues instant in prayer night and day, is a widow indeed. Not that she, who has children, is not a widow indeed. For he commends her who brings up children as she ought. But if any one has not children, he means, she is desolate, and her he consoles, saying, that she is most truly a widow, who has lost not only the consolation of a husband, but that arising from children, yet she has God in the place of all. She is not the worse for not having children, but He fills up her need with consolation, in that she is without children. What he says amounts to this. Grieve not, when it is said that a widow ought to bring up children, as if, because thou hast no children thy worth were on that account inferior. Thou art a widow indeed, whereas she who liveth in pleasure is dead while she liveth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%252013.html'
source_title="Homily on 1 Timothy 13"
