[[commentary]]
quote='''
They, it is well known, when they led not a life of toil but indulged in relaxation, not being able to bear prosperity, fell away into ungodliness. What then did God upon this? He laid upon them a multitude of laws with a view to restrain their licence. And to convince you that these laws contribute not to any virtue, but were given to them as a sort of curb, providing them with an occasion of perpetual labor; hear what saith the prophet concerning them; "I gave them statutes which were not good." What means, "not good?" Such as did not much contribute towards virtue. Wherefore he adds also, "and ordinances whereby they shall not live."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%25207.html'
source_title="HOMILIES ON 1 CORINTHIANS 7:9"
