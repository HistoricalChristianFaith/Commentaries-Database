[[commentary]]
quote='''
Still I should like to ask our objectors, what means that which is said by the Prophet, "Before Me there was no God formed, nor is there any after Me"? For if the Son is younger than the Father, how, says He, "Nor is there any after me"? Will you take away the being of the Only-Begotten Himself? You either must dare this, or admit one Godhead with distinct Persons of the Father and Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%25204.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 4"
