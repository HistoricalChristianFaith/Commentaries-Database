[[commentary]]
quote='''
When He had rebuked him that told Him of His mother and His brethren, He then did according to their request; He departed out of the house, having first corrected His brethren for their weak desire of vainglory; He then paid the honour due to His mother, as it is said, The same day Jesus went forth out of the house, and sat down by the sea side.

The Evangelist did not relate this without a purpose, but that he might show the Lord's will therein, who desired so to place the people that He should have none behind Him, but all should be before His face.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Having then said these words, "He came out of the house." Seest thou, how He both rebuked them, and did what they desired? Which He did also at the marriage. For there too He at once reproved her asking unseasonably, and nevertheless did not gainsay her; by the former correcting her weakness. by the latter showing His kindly feeling toward His mother. So likewise on this occasion too, He both healed the disease of vainglory, and rendered the due honor to His mother, even though her request was unseasonable. For, "in the same day," it is said, "went Jesus out of the house, and sat by the sea side."

Why, if ye desire, saith He, to see and hear, behold I come forth and discourse. Thus having wrought many miracles, He affords again the benefit of His doctrine. And He "sits by the sea," fishing and getting into His net them that are on the land.

But He "sat by the sea," not without a purpose; and this very thing the evangelist has darkly expressed. For to indicate that the cause of His doing this was a desire to order His auditory with exactness, and to leave no one behind His back, but to have all face to face,

"And great multitudes," saith He, "were gathered together unto Him, so that He went into a ship and sat, and the whole multitude stood on the shore."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252044.html'
source_title='Homily on the Gospel of Matthew 44'
