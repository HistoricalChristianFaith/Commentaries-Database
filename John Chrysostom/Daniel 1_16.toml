[[commentary]]
quote='''
At the end of the 10 days, Daniel and his three companions looked healthier; this was a miracle, not a proof that fasting is physically beneficial. (Fr. Most)
'''

[[commentary]]
quote='''
For the king commanded them to be partakers of his own table, a luxurious, unclean and profane table, a thing which was forbidden them, and seemed more terrible than death; and they were lonely men hemmed in like lambs amongst so many wolves. And they were constrained to choose between being consumed by famine or rather led off to execution, and tasting of forbidden meats. What then did these youths do, forlorn as they were, captives, strangers, slaves of those who commanded these things. They did not consider that this strait or the absolute power of him who possessed the state sufficed to justify their compliance; but they employed every device and expedient to enable them to avoid the sin, although they were abandoned on every side. For they could not influence men by money: how should they, being captives? nor by friendship and social intercourse? how should they being strangers? nor could they get the better of them by any exertion of power: how was it possible being slaves? nor matter them by force of numbers: how could they being only three? Therefore they approached the eunuch who possessed the necessary authority, and persuaded him by their arguments. For when they saw him fearful and trembling, and in an agony of alarm concerning his own safety, and the dread of death which agitated his soul was intolerable: "for I fear" said he "my lord the king, lest he should see your countenances sadder than the children which are of your sort and so shall ye endanger my head to the king," having released him from this fear they persuaded him to grant them the favour. And inasmuch as they brought to the work all the strength which they had, God also henceforth contributed his strength to it. For it was not God's doing only that they achieved those things for the sake of which they were to receive a reward, but the beginning and starting point was from their own purpose, and having manifested that to be noble and brave, they won for themselves the help of God, and so accomplished their aim.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FA%2520Treatise%2520to%2520Prove%2520that%2520No%2520One%2520Can%2520Harm%2520the%2520Man%2520Who%2520Does%2520Not%2520Injure%2520Himself.html'
source_title="A Treatise to Prove that No One Can Harm the Man Who Does Not Injure Himself"
