[[commentary]]
quote='''
God indeed says that He called him on account of his excellent capacity, as He said to Ananias, "for he is a chosen vessel unto Me, to bear my name before the Gentiles, and kings," that is to say, capable of service, and the accomplishment of great deeds. God gives this as the reason for his call. But he himself everywhere ascribes it to grace, and to God's inexpressible mercy, as in the words, "Howbeit for this cause I obtained mercy," not that I was sufficient or even serviceable, but "that in me as chief might Jesus Christ show forth all His long-suffering, for an ensample of them which should hereafter believe on Him unto eternal life." Behold his overflowing humility; I obtained mercy, says he, that no one might despair, when the worst of men had shared His bounty. For this is the force of the words, "that He might show forth all His long-suffering for an ensample of them which should hereafter believe on Him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Galatians.html'
source_title="COMMENTARY ON GALATIANS 1"

[[commentary]]
quote='''
Even as he rejoicing at the lovingkindness of God, has proclaimed aloud, and has not been ashamed, but having recorded in his writings, as on a pillar, the deeds formerly dared by him, has exhibited them to all; thinking it better that his former life should be placarded in sight of all, so that the greatness of the free gift of God might appear, than that he should obscure His ineffable and indescribable lovingkindness by hesitating to parade before all men his own error. Wherefore continually he treats of his persecution, his plottings, his wars against the Church, at one time saying, "I am not meet to be called an Apostle, because I persecuted the Church of God"; at another, "Jesus came into the world to save sinners, of whom I am chief." And again, "Ye have heard of my conversation in time past in the Jews' religion, how that beyond measure I persecuted the church of God, and wasted it." For making as it were a kind of return to Christ for His longsuffering towards him, by showing who it was, what a hater and enemy that He saved, he declared with much openness the warfare which at the first with all zeal he warred against Christ; and with this he holds forth good hopes to those who despaired of their condition. For he says, that Christ accepted him, in order that in him first He "might show forth all longsuffering," and the abundant riches of His goodness, "for a pattern to them that should hereafter believe in Him to life everlasting."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252010.html'
source_title="HOMILIES ON JOHN 10.1"

[[commentary]]
quote='''
"Howbeit for this cause I obtained mercy, that in me first Jesus Christ might show forth all longsuffering, for a pattern to them which should hereafter believe on Him to life everlasting."

See how he further humbles and depreciates himself, by naming a fresh and less creditable reason. For that he obtained mercy on account of his ignorance, does not so much imply that he who obtained mercy was a sinner, or under deep condemnation; but to say that he obtained mercy in order that no sinner hereafter might despair of finding mercy, but that each might feel sure of obtaining the like favor, this is an excess of humiliation, such that even in calling himself the chief of sinners, "a blasphemer and a persecutor, and one not meet to be called an Apostle," he had said nothing like it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%25204.html'
source_title="Homily on 1 Timothy 4"

[[commentary]]
quote='''
This will appear by an example. Suppose a populous city, all whose inhabitants were wicked, some more so, and some less, but all deserving of condemnation; and let one among that multitude be more deserving of punishment than all the rest, and guilty of every kind of wickedness. If it were declared that the king was willing to pardon all, it would not be so readily believed, as if they were to see this most wicked wretch actually pardoned. There could then be no longer any doubt. This is what Paul says, that God, willing to give men full assurance that He pardons all their transgressions, chose, as the object of His mercy, him who was more a sinner than any; for when I obtained mercy, he argues, there could be no doubt of others: as familiarly speaking we might say, "If God pardons such an one, he will never punish anybody"; and thus he shows that he himself, though unworthy of pardon, for the sake of others' salvation, first obtained that pardon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%25204.html'
source_title="Homily on 1 Timothy 4"

[[commentary]]
quote='''
Therefore, he says, since I am saved, let no one doubt of salvation. And observe the humility of this blessed man; he says not, "that in me he might show forth" His "longsuffering," but "all longsuffering"; as if he had said, greater longsuffering He could not show in any case than in mine, nor find a sinner that so required all His pardon, all His long-suffering; not a part only, like those who are only partially sinners, but "all" His longsuffering.

"For a pattern to those who should hereafter believe." This is said for comfort, for encouragement. But because he had spoken highly of the Son, and of the great love which He hath manifested, lest he should be thought to exclude the Father from this, he ascribes the glory to Him also.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%25204.html'
source_title="Homily on 1 Timothy 4"
