[[commentary]]
quote='''
That thou mayest therefore with confidence draw nigh to God, receive not wrath, when it comes in upon thee, and desires to be with thee, but drive it away like a mad dog. For so Paul too commanded: his phrase being, "lifting up holy hands without wrath and disputing." Dishonor not then thy tongue, for how will it entreat for thee, when it hath lost its proper confidence? but adorn it with gentleness, with humility, make it worthy of the God who is entreated, fill it with blessing, with much almsdoing. For it is possible even with words to do alms. "For a word is a better thing than a gift," and "answer the poor man peaceably with meekness." And all the rest of thy time too adorn it with the rehearsing of the laws of God; "Yea, let all thy communication be in the law of the Most High."

Having thus adorned ourselves, let us come to our King, and fall at His knees, not with the body only, but also with the mind. Let us consider whom we are approaching, and on whose behalf, and what we would accomplish.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252051.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 51:5"
