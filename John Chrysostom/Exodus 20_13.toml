[[commentary]]
quote='''
And that you may learn that we know this from the first, the Lawgiver, when He afterwards gave laws, and said, "Thou shalt not kill," did not add, "since murder is an evil thing," but simply said, "Thou shalt not kill;" for He merely prohibited the sin, without teaching. How was it then when He said, "Thou shalt not kill," that He did not add, "because murder is a wicked thing." The reason was, that conscience had taught this beforehand; and He speaks thus, as to those who know and understand the point.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252012.html'
source_title="HOMILIES CONCERNING THE STATUES 12.9"
