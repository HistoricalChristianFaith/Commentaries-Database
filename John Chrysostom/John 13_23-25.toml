[[commentary]]
quote='''
While all were trembling, and not excepting even Peter, their head, John, as the beloved disciple, lay upon Jesus' breast. He then lying on Jesus' breast saith unto Him, Lord, who is it?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
