[[commentary]]
quote='''
See, for instance, what befell Ruth, how like it is to the things which belong to us. For she was both of a strange race, and reduced to the utmost poverty, yet Boaz when he saw her neither despised her poverty nor abhorred her mean birth, as Christ having received the Church, being both an alien and in much poverty, took her to be partaker of the great blessings. But even as Ruth, if she had not before left her father, and renounced household and race, country and kindred, would not have attained unto this alliance; so the Church too, having forsaken the customs which men had received from their fathers, then, and not before, became lovely to the Bridegroom. Of this therefore the prophet discourses unto her, and saith, "Forget thy people, and thy father's house, so shall the king have pleasure in thy beauty."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25203.html'
source_title="Homily on Matthew 3"
