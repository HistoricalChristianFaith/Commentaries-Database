[[commentary]]
quote='''
Thus when a certain wise man saith, "It is by the Lord that a man is matched with a woman," he means this, God made marriage, and not that it is He that joineth together every man that cometh to be with a woman. For we see many that come to be with one another for evil, even by the law of marriage, and this we should not ascribe to God. But as He said Himself, "He which made them at the beginning, made them male and female, and said, For this cause shall a man leave father and mother, and shall cleave to his wife, and they twain shall be one flesh." And this is what that wise man meant to explain. For since equality of honor does many times lead to fightings, He hath made many governments and forms of subjection; as that, for instance, of man and wife, that of son and father, that of old men and young, that of bond and free, that of ruler and ruled, that of master and disciple.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252023.html'
source_title="HOMILIES ON ROMANS 23:13.1"
