[[commentary]]
quote='''
Even so doth God oftentimes hold out some kind of threat; not that He may bring it upon us, but that He may draw us unto Himself. At any rate, when we return, He doth away with our fear at once; since assuredly, if we were alike in temptations and at ease, there would have been no need of temptations. But why do I speak of us? Since even to those saints of old great was the profit of that, "It is good for me that Thou hast humbled me." And He Himself likewise said to the apostles, "In the world ye shall have tribulation." And Paul signifies this self-same thing, when he saith, "There was given to me a thorn in the flesh, the messenger of Satan to buffet me." Wherefore also when he sought to be delivered from the temptation, he obtained it not, by reason of the great benefit thence ensuing. And if we should go over the whole life of David, we shall find him more glorious in his dangers; both himself and all the others that were like him. For so Job at that season shone forth the more abundantly, and Joseph too in this way became the more approved, and Jacob also, and his father likewise, and his father's father; and all as many as ever put on crowns of peculiar glory, it was by tribulations and temptations that they first won their crowns, then had their names recited. Being conscious of all these things, according to the wise saying, let us "not make haste in time of trouble," but let us teach ourselves one thing only, how to bear all nobly, and not to be curious or inquisitive about any of the things that are coming to pass. For to know when our tribulations should be done away, belongs to God who permits them to befall us; but to bear them, brought upon us, with all thankfulness, all that is the work of a good disposition on our part; and if this be so, then all our blessings will follow.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252010.html'
source_title="Homily on the Gospel of Matthew 10"
