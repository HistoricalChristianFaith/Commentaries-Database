[[commentary]]
quote='''
(Hom. lxii. 1) The disciples however wished to prevent Him going to Judæa: Then said His disciples, Lord, if he sleep, he shall do well. Sleep is a good sign in sickness. And therefore if he sleep, say they, what need to go and awake him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"Then said His disciples, Lord, if he sleep he shall do well." This they said not without a cause, but desiring to hinder the going thither. "Sayest Thou," asks one of them, "that he sleepeth? Then there is no urgent reason for going." Yet on this account He had said, "Our friend," to show that the going there was necessary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252062.html'
source_title='Homily on the Gospel of John 62'
