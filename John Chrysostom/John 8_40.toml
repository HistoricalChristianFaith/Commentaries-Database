[[commentary]]
quote='''
He here repeatedly handleth their murderous intention, and maketh mention of Abraham. And this He doth desiring to draw off their attention from this relationship, and to take away their excessive boasting, and also to persuade them no longer to rest their hopes of salvation in Abraham, nor in the relationship which is according to nature, but in that which is according to the will. For what hindered their coming to Christ was this, their deeming that relationship to be sufficient for them to salvation. But what is the "truth" of which He speaketh? That He is equal with the Father. For it was on this account that the Jews sought to slay Him; and He saith, "Ye seek to kill Me because I have told you the truth, which I have heard of My Father." To show that these things are not opposed to the Father, He again betaketh Himself to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252054.html'
source_title="Homily on the Gospel of John 54"
