[[commentary]]
quote='''
(Hom. liv. 2) This truth, that is, that He was equal to the Father: for it was this that moved the Jews to kill Him. To show, however, that this doctrine is not opposed to the Father, He adds, Which I have heard from God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"Ye seek to kill Me because I have told you the truth, which I have heard of My Father." To show that these things are not opposed to the Father, He again betaketh Himself to Him. They say unto Him, "We be not born of fornication, we have one Father, even God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252054.html'
source_title='Homily on the Gospel of John 54'
