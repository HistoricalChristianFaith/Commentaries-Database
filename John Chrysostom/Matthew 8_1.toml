[[commentary]]
quote='''
But do thou mark, I pray thee, the Lord's consideration, how He varies the mode of profiting His hearers, after miracles entering on words, and again from the instruction by His words passing to miracles. Thus, both before they went up into the mountain, He healed many, preparing the way for His sayings; and after finishing that long discourse to the people, He comes again to miracles, confirming what had been said by what was done. And so, because He was teaching as "one having authority," lest His so teaching should be thought boasting and arrogant, He doth the very same in His works also, as having authority to heal; that they might no more be perplexed at seeing Him teach in this way, when He was working His miracles also in the same.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252025.html'
source_title='Homily on the Gospel of Matthew 25'

[[commentary]]
quote='''
This, I would add, the evangelist too is intimating, when he saith, "great multitudes followed Him," not any of the rulers, nor of the scribes, but as many as were free from vice, and had their judgment uncorrupted. And throughout the whole gospel thou seest that such clave unto Him. For both while He spake, they used to listen in silence, not making any intrusion, nor breaking in upon the connexion of His sayings, nor tempting Him, and desiring to find a handle like the Pharisees; and after His exhortation they followed Him again, marvelling.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252025.html'
source_title='Homily on the Gospel of Matthew 25'
