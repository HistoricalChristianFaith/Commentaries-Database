[[commentary]]
quote='''
Whenever you see a man living in wickedness, and enjoying great prosperity, and suffering no calamity, on this account lament for him the more, because, being under the power of disease and grievous corruption, he increases his own weakness, becoming worse by luxury and indolence. For punishment is not in itself an evil, but the real evil is sin. The latter separates us from God; the former leads us to God, and mitigates His wrath. How is this shown? Hear the prophet saying, "O priests, comfort ye, comfort ye my people. Speak to the heart of Jerusalem, and say that she has received of the Lord's hand double for her sins." And again: "O Lord our God, give us peace, for thou hast repaid all to us."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FFour%2520Discourses%252C%2520chiefly%2520on%2520the%2520parable%2520of%2520the%2520rich%2520man%2520and%2520Lazarus%2FDiscourse%25203.html'
source_title="HOMILIES ON LAZARUS AND THE RICH MAN 3"


[[commentary]]
quote='''
But I say all this now, and select all the histories that contain trials and tribulations, and the wrath of kings, and their evil designs, in order that we may fear nothing, save only offending God. For then also was there a furnace burning; yet they derided it, but feared sin. For they knew that if they were consumed in the fire, they should suffer nothing that was to be dreaded; but that if they were guilty of impiety: they should undergo the extremes of misery. It is the greatest punishment to commit sin, though we may remain unpunished; as on the other hand, it is the greatest honour and repose to live virtuously, though we may be punished. For sins separate us from God; as He Himself speaks; "Have not your sins separated between you and Me?" But punishments lead us back to God. As one saith, "Give peace; for Thou hast recompensed us for all things." Suppose any one hath a wound; which is the most deserving of fear, gangrene, or the surgeon's knife? the steel, or the devouring progress of the ulcer? Sin is a gangrene, punishment is the surgeon's knife. As then, he who hath a gangrene, although he is not lanced, hath to sustain the malady, and is then in the worse condition, when he is not lanced; so also the sinner, though he be not punished, is the most wretched of men; and is then especially wretched, when he hath no punishment, and is suffering no distress.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25206.html'
source_title="HOMILIES CONCERNING THE STATUES 6:14"
