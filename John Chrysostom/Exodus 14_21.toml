[[commentary]]
quote='''
The Jews under the guidance of Moses passed over the Red Sea, but that case is widely different from this. He did all with prayer and as a servant, but Christ with absolute power. There when the south wind blew, the water yielded so as to make them pass over on dry land, but here the miracle was greater. For the sea retaining its proper nature so bare its Lord upon its surface, thus testifying to the Scripture which saith, "Who walketh upon the sea as upon a pavement."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252043.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 43"
