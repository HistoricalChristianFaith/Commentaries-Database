[[commentary]]
quote='''
For such is the nature of sin, that it betrays whilst no one finds fault; it condemns whilst no one accuses; it makes the sinner a timid being; one that trembles at a sound; even as righteousness has the contrary effect. Hear, at least, how the Scripture describes this cowardice of the former, and this boldness of the latter. "The wicked flee when no man pursueth." How doth he flee when no man pursueth? He hath that within which drives him on—an accuser in his conscience; and this he carries about everywhere; and just as it would be impossible to flee from himself, so neither can he escape the persecutor within; but wherever he goeth, he is scourged, and hath an incurable wound! But not such is the righteous man. Of what nature then is he? Hear: "The righteous is bold as a lion!" Such a man was Elias. He saw, for instance, the king coming towards him, and when he said, "Why is it that thou pervertest Israel?" he answered, "I pervert not Israel, but thou and thy father's house." Truly, the just man is bold as a lion; for he stood up against the king just as a lion doth against some vile cur.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25208.html'
source_title="HOMILIES CONCERNING THE STATUES 8:3"
