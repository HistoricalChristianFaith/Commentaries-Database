[[commentary]]
quote='''
Again, elsewhere he says, "What fault have your fathers found in me?" That which is said is great and marvelous, because what he says means, "What wrong have I done?" God tells human beings, "What sin have I committed?"—something that not even slaves tolerate that their master utter. 
'''
source_url=''
source_title="HOMILIES ON REPENTANCE AND ALMSGIVING. 4:5.23"


[[commentary]]
quote='''
And elsewhere again, "What transgression have your fathers found in me?" And again, "O my people, what have I done unto thee? and wherein have I grieved thee?" showing their thankless disposition, and that when in the enjoyment of all things, they requited it by the contraries; but here He expresses it with yet greater force. For He doth not plead, Himself, saying, "What ought I to have done that I have not done?" but brings in themselves to judge, that nothing hath been wanting, and to condemn themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252068.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 68:2"
