[[commentary]]
quote='''
Hence God gave the gift of prayer. But this He doth, not as Himself standing in need of entreaty, but that we might not, from being saved without effort, grow indifferent. ... Wherefore to Jeremiah also He said, "Pray not for this people, for I will not hear thee," not as wishing to stop his praying (for He earnestly longeth for our salvation), but to terrify them: and this the prophet also seeing did not cease praying. And that you may see that it was not through a wish to turn him from it, but to shame them that He said this, hear what it says. "Seest thou not what these are doing?" And when He says to the city "Though thou wash thee with nitre, and take thee much soap, yet thou art stained before Me," it is not that He may cast them into despair that He so speaks, but that He may rouse them to repentance. For as in the case of the Ninevites, by giving the sentence without limitation, and holding out no good hope, He scared them the more, and led them to repentance, so He doth here also, both to rouse them, and to render the prophet more venerated, that in this way at least they may hear him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252014.html'
source_title="HOMILIES ON ROMANS 14"
