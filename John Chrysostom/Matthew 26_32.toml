[[commentary]]
quote='''
He suffers them not however, on the other hand, to wait until the sorrows, but what saith He? "But after I am risen again, I will go before you into Galilee." For not from Heaven doth He appear at once, neither will He depart into any distant country, but in the same nation, in which He had also been crucified, nearly in the same place, so as hereby again to assure them that He that was crucified was the very same that rose again, and in this way to comfort them more abundantly when in sorrow. Therefore also He said "in Galilee," that being freed from the fears of the Jews they might believe His saying. For which cause indeed He appeared there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252082.html'
source_title='Homily on the Gospel of Matthew 82'

[[commentary]]
quote='''
He produces this prophecy to teach them to attend to the things that are written, and to show that His crucifixion was according to the counsel of God, and (as He does throughout) that He was not a stranger to the Old Testament, but that it prophesied of Him. But He did not suffer them to continue in sorrow, but announces glad tidings, saying, When I am risen again, I will go before you into Galilee. After His resurrection He does not appear to them immediately from heaven, nor depart into any far country, but in the very same nation in which He was crucified, almost in the very place, giving them thereby assurance, that He who was crucified was the same as He who rose again, thereby to cheer their cast-down countenances. He fixes upon Galilee, that, being delivered from fear of the Jews, they might believe what He spoke to them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"
