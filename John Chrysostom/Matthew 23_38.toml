[[commentary]]
quote='''
Then He threatens the punishment of which they were ever in fear, to wit, the overthrow of the city and temple, saying, Behold, your house is left unto you desolate.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252023.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"But ye would not," He saith. "Behold your house is left desolate," stripped of the succor which cometh from me. Surely it was the same, who also was before protecting them, and holding them together, and preserving them; surely it was He who was ever chastening them. And He appoints a punishment, which they had ever dreaded exceedingly; for it declared the entire overthrow of their polity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252074.html'
source_title='Homily on the Gospel of Matthew 74'
