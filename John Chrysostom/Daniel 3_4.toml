[[commentary]]
quote='''
Seest thou how difficult these struggles are made; how irresistible the snare; and how deep the gulph, and a precipice on either hand? But be not afraid. In whatever degree the enemy increases his machinations, so much the more does he display the courage of the young men. For this reason is there this symphony of so many musicians; for this reason the burning furnace; in order that both pleasure, and fear, may besiege the souls of those present. Is there any one of harsh and unyielding character among them? "Let the melody of every kind of music," saith he, "enchant and soften him." But is he superior to this artifice, "let the sight of the flame affright and astound him." Thus was fear as well as pleasure present; the one entering to assault the soul by the ears, the other by the eyes. But the noble character of these youths was not by any such means to be conquered; but even as, when they fell into the fire, they mastered the flames, even so they derided all desire and all fear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25204.html'
source_title="HOMILIES CONCERNING THE STATUES 4:8"
