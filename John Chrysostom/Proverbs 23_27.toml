[[commentary]]
quote='''
He who gives to harlots is ridiculous and shameful, and will have many quarrels, and brief pleasure; or rather, not even brief, because, give what he will to the women his mistresses, they will not thank him for it; for, "The house of a stranger is a cask with holes." Besides, that sort of persons is impudent, and Solomon hath compared their love to the grave; and then only do they stop, when they see their lover stripped of all. Or rather, such a woman doth not stop even then, but tricks herself out the more, and tramples on him when he is down, and excites much laughter against him, and works him so much mischief, as it is not possible even to describe by words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 87"
