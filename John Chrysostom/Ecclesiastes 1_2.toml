[[commentary]]
quote='''
What is vanity of mind? It is the being busied about vain things. And what are those vain things, but all things in the present life? Of which the Preacher saith, "Vanity of vanities, all is vanity." But a man will say, If they be vain and vanity, wherefore were they made? If they are God's works, how are they vain? And great is the dispute concerning these things. But hearken, beloved: it is not the works of God which he calls vain; God forbid! The Heaven is not vain, the earth is not vain,—God forbid!—nor the sun, nor the moon and stars, nor our own body. No, all these are "very good." But what is vain? Let us hear the Preacher himself, what he saith; "I planted me vineyards, I gat me men singers and women singers, I made me pools of water, I had great possession of herds and flocks, I gathered me also silver and gold, and I saw that these are vanity." Such is "vanity of vanities," your splendid buildings, your vast and overflowing riches, the herds of slaves that bustle along the public square, your pomp and vainglory, your high thoughts, and your ostentation. For all these are vain; they came not from the hand of God, but are of our own creating. But why then are they vain? Because they have no useful end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%252012.html'
source_title="HOMILIES ON EPHESIANS 12"
