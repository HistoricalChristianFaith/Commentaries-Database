[[commentary]]
quote='''
We have good cause to admire the disciples, how, longing as they do to learn, they know when they ought to ask. For they do it not before all: and this Matthew shows by saying, "And they came." And, as to this assertion not being conjecture, Mark hath expressed it more distinctly, by saying, that "they came to Him privately." This then His brethren and His mother should also have done, and not have called Him out, and made a display.

But mark their kindly affection also, how they have much regard for the others, and seek their good first, and then their own. "For why," it is said, "speakest Thou unto them in parables?" They did not say, why speakest thou unto us in parables? Yea, and on other occasions also their kindliness towards men appears in many ways; as when they say, "Send the multitude away;" and, "Knowest thou that they were offended?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252045.html'
source_title='Homily on the Gospel of Matthew 45'
