[[commentary]]
quote='''
(Hom. 49. in Matt.) Now He did not depart before, but after it was told Him what had happened, manifesting in each particular the reality of His incarnation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
