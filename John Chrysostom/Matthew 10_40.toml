[[commentary]]
quote='''
Enough had been said above to persuade those who should have to entertain the Apostles. For who would not with all willingness take in to his house men who were so courageous, that they despised all dangers that others might be saved? Above He had threatened punishment to those who should not receive them, He now promises reward to such as should receive them. And first He holds out to those who should entertain them the honour, that in so doing they were entertaining Christ, and even the Father; He who receiveth me, receiveth him that sent me. What honour to be compared to this of receiving the Father and the Son?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Now these things were enough to recommend men to receive them, their appointed healers. Yea, who would choose but receive with all readiness them that were so noble, such true heroes, and as lions running about the earth, and despising all that pertained to themselves, so that others might be saved? Yet nevertheless He proffers also another reward, indicating that He is caring here for the entertainers more than for the guests.

And the first honor He confers is by saying,

"He that receiveth you, receiveth me, and he that receiveth me, receiveth Him that sent me."

With this, what may compare? that one should receive the Father and the Son!
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252035.html'
source_title='Homily on the Gospel of Matthew 35'
