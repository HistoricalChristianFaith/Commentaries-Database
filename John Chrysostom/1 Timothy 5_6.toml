[[commentary]]
quote='''
Again, to live in luxury does not seem to be a manifest and admitted crime; but then it brings forth in us great evils,—drunkenness, violence, extortion, and rapine. For the prodigal and sumptuous liver, bestowing extravagant service upon the belly, is often compelled to steal, and to seize the property of others, and to use extortion and violence. If, then, thou avoidest luxurious living, thou removest the foundation of extortion, and rapine, and drunkenness, and a thousand other evils; cutting away the root of iniquity from its extremity. Hence Paul saith, that "she who liveth in pleasure is dead while she liveth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252015.html'
source_title="Concerning the Statues, Homily 15"

[[commentary]]
quote='''
What then? Is it not possible, they say, to enjoy ease both here and hereafter? This, O man, is unattainable; it is one of the things impossible. It cannot, it cannot be, that he who here enjoys ease and plenty, and continually indulges in every luxury—who lives a vain and aimless life—can also enjoy honour hereafter. At the same time, if he be not troubled by poverty, he still is troubled by desire, and from this cause suffers restraint—a cause which gives rise to no small amount of trouble, Again, if disease do not afflict him, yet evil passion burns within, and it is no slight pain that springs from wrath; also, if trials be not laid upon him, yet wicked thoughts constantly arise to vex him. It is by no means a trivial matter to restrain lawless desire, to put a stop to vainglorious thoughts, to check insensate pride, to refrain from excess, to live in self-denial. And he who does not accomplish these things, and such as these, can never attain salvation. For that they who live luxuriously are not saved, hear what St Paul says concerning widows, "She that liveth in pleasure is dead while she liveth." And if this is said concerning a widow, much more is it true concerning a man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FFour%2520Discourses%252C%2520chiefly%2520on%2520the%2520parable%2520of%2520the%2520rich%2520man%2520and%2520Lazarus%2FDiscourse%25203.html'
source_title="On Lazarus and the Rich Man, Discourse 3"

[[commentary]]
quote='''
But since many who have children choose the state of widowhood, not to cut off the occasions of a worldly life, but rather to enhance them, that they may do what they will with the greater license, and indulge the more freely in worldly lusts: therefore he says, "She that liveth in pleasure is dead while she liveth." Ought not a widow then to live in pleasure? Surely not. If then when nature and age is weak, a life of pleasure is not allowable, but leads to death, eternal death; what have men to say, who live a life of pleasure? But he says with reason, "She that liveth in pleasure is dead while she liveth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%252013.html'
source_title="Homily on 1 Timothy 13"
