[[commentary]]
quote='''
(Hom. lxvi. 2) He illustrates His discourse by an example from nature. A grain of corn produces fruit, after it has died. How much more then must the Son of God? The Gentiles were to be called after the Jews had finally offended; i. e. after His crucifixion. Now then that the Gentiles of their own accord offered their faith, He saw that His crucifixion could not be far off.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
