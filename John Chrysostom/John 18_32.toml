[[commentary]]
quote='''
(Hom. lxxxiii. 4) That the saying of Jesus might be fulfilled, which He spake, signifying what death He should die. Which was fulfilled in that He was crucified, or in that He was put to death by Gentiles as well as Jews.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"And how did the expression, 'It is not lawful for us to put any man to death,' declare this?" Either the Evangelist means that He was about to be slain not by the Jews only, but by the Gentiles also, or that it was not lawful for them to crucify. But if they say, "It is not lawful for us to put any man to death," they say it with reference to that season. For that they did slay men, and that they slew them in a different way, Stephen shows, being stoned. But they desired to crucify Him, that they might make a display of the manner of His death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title='Homily on the Gospel of John 83'
