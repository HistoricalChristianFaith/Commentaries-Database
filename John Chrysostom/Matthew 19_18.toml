[[commentary]]
quote='''
Therefore when Christ said, "If thou wilt enter into life, keep the commandments," he saith, "Which?" Not tempting, far from it, but supposing there were some others besides those of the law that should procure him life, which was like one who was very desirous.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252063.html'
source_title='Homily on the Gospel of Matthew 63'

[[commentary]]
quote='''
This he said not to tempt Him, but because he supposed that they were other than the commandments of the Law, which should be the means of life to him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"
