[[commentary]]
quote='''
For in proof that our sin belongs not to nature, nor to necessity and compulsion, hear what He saith to the apostles, "But blessed are your eyes, for they see, and your ears, for they hear;" not meaning this kind of sight nor hearing, but that of the mind. For indeed these too were Jews, and brought up in the same circumstances; but nevertheless they took no hurt from the prophecy, because they had the root of His blessings well settled in them, their principle of choice, I mean, and their judgment.

Seest thou that, "unto you it is given," was not of necessity? For neither would they have been blessed, unless the well-doing had been their own. For tell me not this, that it was spoken obscurely; for they might have come and asked Him, as the disciples did: but they would not, being careless and supine. Why say I, they would not? nay, they were doing the very opposite, not only disbelieving, not only not hearkening, but even waging war, and disposed to be very bitter against all He said: which He brings in the prophet laying to their charge, in the words, "They heard heavily."

But not such were these; wherefore He also blessed them. And in another way too He assures them again, saying,
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252045.html'
source_title='Homily on the Gospel of Matthew 45'
