[[commentary]]
quote='''
And pay heed to the accuracy with which Paul speaks. He did not say, "Who is an unapproachable light" but "Who dwells in unapproachable light." Why? So that you may learn that if the dwelling is unapproachable, so much more so is the God that dwells in it. But Paul did not say this to make you suspect that there is a house or place surrounding God. Rather, he wished you to have a deeper and superior knowledge that God is beyond our comprehension.… A thing is unapproachable which, from the start, cannot be investigated nor can anyone come near to it. We call the sea incomprehensible because, even when divers lower themselves into its waters and go down to a great depth, they cannot find the bottom. We call that thing unapproachable which, from the start, cannot be searched out or investigated.
'''
source_url='https://catholiclibrary.org/library/view?docId=Fathers-OR/John_Chrysostom__De_incomprehensibili_dei_natura.gr.html;chunk.id=00000007'
source_title="ON THE INCOMPREHENSIBLE NATURE OF GOD 3.2"

[[commentary]]
quote='''
And wonder not that Paul saith in another place, "God was manifested in the Flesh"; because the manifestation took place by means of the flesh, not according to (His) Essence. Besides, Paul shows that He is invisible, not only to men, but also to the powers above, for after saying, "was manifested in the Flesh," he adds, "was seen of angels."

So that even to angels He then became visible, when He put on the Flesh; but before that time they did not so behold Him, because even to them His Essence was invisible.

"How then," asks some one, "did Christ say, `Despise not one of these little ones, for I tell you, that their angels do always behold the face of My Father which is in heaven'? Hath then God a face, and is He bounded by the heavens?" Who so mad as to assert this? What then is the meaning of the words? As when He saith, "Blessed are the pure in heart, for they shall see God," He means that intellectual vision which is possible to us, and the having God in the thoughts; so in the case of angels, we must understand that by reason of their pure and sleepless nature they do nothing else, but always image to themselves God. And therefore Christ saith, that "No man knoweth the Father, save the Son." What then, are we all in ignorance? God forbid; but none knoweth Him as the Son knoweth Him. As then many have seen Him in the mode of vision permitted to them, but no one has beheld His Essence, so many of us know God, but what His substance can be none knoweth, save only He that was begotten of Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252015.html'
source_title="HOMILIES ON JOHN 15.1-2"

[[commentary]]
quote='''
"Dwelling in the light which no man can approach unto." Is He then Himself one Light, and is there another in which He dwells? is He then circumscribed by place? Think not of it. By this expression is represented the Incomprehensibleness of the Divine Nature. Thus he speaks of God, in the best way he is able. Observe, how when the tongue would utter something great, it fails in power.

"Whom no man hath seen nor can see." As, indeed, no one hath seen the Son, nor can see Him.

"To whom be honor and power everlasting. Amen." Thus properly, and much to the purpose, has he spoken of God. For as he had called Him to witness, he speaks much of that Witness, that his disciple may be in the greater awe. In these terms he ascribes glory to Him, and this is all we can do, or say. We must not enquire too curiously, who He is. If power everlasting is His, fear not. Yea though now it take not place, to Him is honor, to Him is power evermore.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%252018.html'
source_title="Homily on 1 Timothy 18"
