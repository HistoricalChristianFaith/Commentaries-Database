[[commentary]]
quote='''
From both Christ distinguisheth Himself; from those who came to spoil, by saying, "I am come that they might have life, and that they might have more abundantly"; and from those who cared not for the sheep being carried away by wolves, by never deserting them, but even laying down His life for them, that the sheep might not perish. For when they desired to kill Him, He neither altered His teaching, nor betrayed those who believed on Him, but stood firm, and chose to die. Wherefore He continually said, "I am the good Shepherd."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252060.html'
source_title='Homily on the Gospel of John 60'
