[[commentary]]
quote='''
From both Christ distinguisheth Himself; from those who came to spoil, by saying, "I am come that they might have life, and that they might have more abundantly"; and from those who cared not for the sheep being carried away by wolves, by never deserting them, but even laying down His life for them, that the sheep might not perish. For when they desired to kill Him, He neither altered His teaching, nor betrayed those who believed on Him, but stood firm, and chose to die. Wherefore He continually said, "I am the good Shepherd." Then because His words appeared to be unsupported by testimony, (for though the, "I lay down My life," was not long after proved, yet the, "that they might have life, and that they might have more abundantly," was to come to pass after their departure hence in the life to come,) what doth He? He proveth one from the other; by giving His mortal life (He proveth) that He giveth life immortal. As Paul also saith, "If when we were enemies we were reconciled to God by the death of His Son, much more being reconciled we shall be saved." (Rom. v. 10.) And again in another place, "He that spared not His own Son, but delivered Him up for us all, how shall He not with Him also freely give us all things?" (Rom. viii. 32.)
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252060.html'
source_title="Homily on the Gospel of John 60"
