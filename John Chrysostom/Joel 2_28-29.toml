[[commentary]]
quote='''
Hence we learn that on unessential points one must not spend many words. And besides, the sequel is enough to bear him out on this point: so now the discourse is for all in common. "But this is that which was spoken by the prophet Joel, And it shall come to pass in the last days, saith the Lord God." Nowhere as yet the name of Christ, nor His promises but the promise is that of the Father.... "And I will pour out of My Spirit upon all flesh." He offers even to them excellent hopes, if they would have them. And so far, he does not leave it to be regarded as the exclusive advantage of himself and his company; which would have made them be looked upon with an evil eye; thus cutting off all envious feeling. "And your sons shall prophesy." And yet, he says, not yours this achievement, this distinction; the gift has passed over to your children. Himself and his company he calls their sons, and those whom he is addressing he calls his and their fathers. "And your young men shall see visions, and your old men shall dream dreams; and on My servants and on My handmaidens I will pour out in those days of My Spirit; and they shall prophesy." To some the grace was imparted through dreams, to others it was openly poured forth. For indeed by dreams the prophets saw, and received revelations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%25205.html'
source_title="Homily on the Acts of the Apostles 5"
