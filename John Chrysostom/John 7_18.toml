[[commentary]]
quote='''
"He that speaketh of himself seeketh his own glory." That is, "He that desireth to establish any doctrine of his own, desireth to do so only that he himself may enjoy the glory. Now if I desire not to enjoy glory, wherefore should I desire to establish any doctrine of My own? He that speaketh of himself, that is, who speaketh anything peculiar or different from others, speaketh on this account, that he may establish his own glory; but if I seek the glory of Him that sent Me, wherefore should I choose to teach other things?" Seest thou that there was a cause wherefore He said there too that He "did nothing of Himself"? (c. v. 19, and viii. 28.) What was it? It was that they might believe that He desired not the honor of the many. Therefore when His words are lowly, "I seek," He saith, "the glory of the Father," everywhere desiring to persuade them that He Himself loveth not glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title="Homily on the Gospel of John 49"

[[commentary]]
quote='''
Now there are many reasons for His using lowly words, as that He might not be deemed unbegotten, or opposed to God, His being clothed with flesh, the infirmity of His hearers, that He might teach men to be modest, and to speak no great thing of themselves: while for speaking lofty words one could only find one reason, the greatness of His Nature. And if when He said, "Before Abraham was, I am" (c. viii. 58), they were offended, what would have been their case if they had continually heard high expressions?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title="Homily on the Gospel of John 49"
