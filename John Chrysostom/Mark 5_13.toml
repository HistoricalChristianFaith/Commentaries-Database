[[commentary]]
quote='''
If the devil is a murderer, it is clear that the demons who serve him are murderers, too. What Christ did has taught you this lesson. At any rate, he gave the demons leave to enter into the herd of swine and the demons drove the whole herd down the cliff and drowned them. He did this so that you might know that the demons would have done the same thing to human beings and would have drowned them if God had allowed them to do so. But he restrained the demons, stopped them, and permitted them to do no such thing. Once they had gotten power over the swine, the demons made quite clear what they would have done to us. If they did not spare the swine, it is all the more sure they would not have kept their hands off us. Therefore, beloved, do not be swept off by the deceits of the demons but stand firm in your fear of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FAgainst%2520the%2520Jews%2FHomily%25208.html'
source_title="Against the Jews, Homily 8"
