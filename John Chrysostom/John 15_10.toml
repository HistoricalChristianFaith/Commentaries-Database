[[commentary]]
quote='''
(Hom. lxxvi. 2) And then shows how this is to be done: If ye keep My commandments, ye shall abide in My love.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
And how shall this be? "If ye keep My commandments, even as I have kept my Father's commandments." Again, His discourse proceedeth in a human way; for certainly the Lawgiver would not be subject to commandments. Seest thou that here also, as I am always saying, this is declared because of the infirmity of the hearers?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252076.html'
source_title='Homily on the Gospel of John 76'
