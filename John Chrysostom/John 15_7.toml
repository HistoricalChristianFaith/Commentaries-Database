[[commentary]]
quote='''
Then He showeth what it is to "abide," and saith, "If My words abide in you." Seest thou that with reason I said above, that He seeketh the proof by works? For when He had said, "Whatsoever ye shall ask I will do it," He added, "If ye love Me, ye will keep My commandments." And here, "If ye abide in Me, and My words abide in you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252076.html'
source_title='Homily on the Gospel of John 76'
