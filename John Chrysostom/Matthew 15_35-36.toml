[[commentary]]
quote='''
Now all the rest He doth as on the former occasion; thus He both makes them sit down on the ground, and He makes the loaves multiply themselves in the hands of the disciples. For, "He commanded," it is said, "the multitude to sit down on the ground. And He took the seven loaves, and the fishes, and gave thanks, and brake, and gave to His disciples, and the disciples to the multitude."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252053.html'
source_title='Homily on the Gospel of Matthew 53'

[[commentary]]
quote='''
Some other things also He does like to what had been done before. He makes them to sit down on the ground, and the bread to grow in the hands of the disciples; as it follows, And he commanded the multitude to sit down on the ground.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
