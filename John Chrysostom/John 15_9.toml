[[commentary]]
quote='''
(Hom. lxxvi. 2) If then I love you, be of good cheer; if it is the Father's glory that ye bring forth good fruit, bear no evil. Then to rouse them to exertion, He adds, Continue ye in My love.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"As the Father hath loved Me, so have I loved you." Here at length He speaketh in a more human manner, for this, as spoken to men, has its peculiar force. Since what a measure of love did He manifest, who chose to die, who counted worthy of such honor those who were His slaves, His haters, His open enemies, and led them up to the heavens! "If then I love you, be bold; if it be the glory of My Father that ye bear fruit, imagine nothing ill." Then that He may not make them supine, observe how He braceth them again, "Continue ye in My love." "For this ye have the power to do."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252076.html'
source_title='Homily on the Gospel of John 76'
