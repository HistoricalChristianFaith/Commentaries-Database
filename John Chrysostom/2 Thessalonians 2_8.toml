[[commentary]]
quote='''
"To the one a savor from death unto death, to the other a savor from life unto life." For this sweet savor some so receive that they are saved, others so that they perish. So that should any one be lost, the fault is from himself: for both ointment is said to suffocate swine, and light (as I before observed,) to blind the weak. And such is the nature of good things; they not only correct what is akin to them, but also destroy the opposite: and in this way is their power most displayed. For so both fire, not only when it giveth light and when it purifieth gold, but even when it consumeth thorns, doth very greatly display its proper power, and so show itself to be fire: and Christ too herein also doth discover His own majesty when He "shall consume" Antichrist "with the breath of His mouth, and bring him to nought with the manifestation of His coming."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%25205.html'
source_title="Homily on Second Corinthians 5"

[[commentary]]
quote='''
"And then," he says, "shall be revealed the lawless one." And what after this? The consolation is at hand. "Whom the Lord Jesus shall slay with the breath of His mouth, and bring to nought by the manifestation of His coming, even he whose coming is according to the working of Satan."

For as fire merely coming on even before its arrival makes torpid and consumes the little animals that are afar off; so also Christ, by His commandment only, and Coming. It is enough for Him to be present, and all these things are destroyed. He will put a stop to the deceit, by only appearing. Then who is this, whose coming is after the working of Satan, "With all power," but nothing true, but for deceit. "And lying wonders," he says, that is, false, or leading to falsehood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Thessalonians%2FHomily%25204.html'
source_title="Homily on 2 Thessalonians 4"
