[[commentary]]
quote='''
He must be clean from all the passions who is to hunt after the truth: for whoso is freed from these shall be freed also from his error and attain unto the truth. Wherefore saith Peter, "Of a truth I perceive that God is no respecter of persons; but in every nation he that feareth Him, and worketh righteousness, is acceptable to Him:" that is, He calls and attracts him unto the truth. Peter calls the man irreproachable in all things one that "worketh righteousness," and Paul says "touching the righteousness which is in the law found blameless." Again, "I give thanks to God, whom I serve from my forefathers with a pure conscience." How then, you will say, were unclean persons considered worthy of the Gospel? Because they wished and longed for it. Thus the one sort, though in error, are attracted by Him, because they are clean from passions; the others, of their own accord approaching, are not thrust back. Many also even from their ancestors have received the true religion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%25208.html'
source_title="Homily on 1 Corinthians 8"
