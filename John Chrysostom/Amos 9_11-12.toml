[[commentary]]
quote='''
What then was the tabernacle in which He dwelt? Hear the Prophet say; "I will raise up the tabernacle of David that is fallen." It was fallen indeed, our nature had fallen an incurable fall, and needed only that mighty Hand. There was no possibility of raising it again, had not He who fashioned it at first stretched forth to it His Hand, and stamped it new with His Image, by the regeneration of water and the Spirit. And observe I pray you, the awful and ineffable nature of the mystery. He inhabits this tabernacle for ever, for He clothed Himself with our flesh, not as again to leave it, but always to have it with Him. Had not this been the case, He would not have deemed it worthy of the royal throne, nor would He while wearing it have been worshiped by all the host of heaven, angels, archangels, thrones, principalities, dominions, powers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252011.html'
source_title="HOMILIES ON JOHN 11"
