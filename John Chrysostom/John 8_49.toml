[[commentary]]
quote='''
Let us imitate him, since he also was an imitator of Christ. If he, with enemies, who went even to the length of murder and slaughter, said nothing offensive to them, what pardon shall we deserve, who in reviling and abuse become infuriated, calling our enemies villains, detestable wretches? Just as Christ also said: I have not a devil, but I honor My Father: but ye do dishonor Me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252050.html'
source_title='Homily on Acts 50'

[[commentary]]
quote='''
(Hom. lv. 1) And observe, when He had to teach them, and pull down their pride, He used roughness; but now that He has to suffer rebuke, He treats them with the utmost mildness: a lesson to us to be severe in what concerns God, but careless of ourselves.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
