[[commentary]]
quote='''
This it was which the prophet signified when he said, "The heavens declare the glory of God." How then, tell me, do they declare it? Voice they have none; mouth they possess not; no tongue is theirs! how then do they declare? By means of the spectacle itself. For when thou seest the beauty, the breadth, the height, the position, the form, the stability thereof during so long a period; hearing as it were a voice, and being instructed by the spectacle, thou adorest Him who created a body so fair and strange! The heavens may be silent, but the sight of them emits a voice, that is louder than a trumpet's sound; instructing us not by the ear, but through the medium of the eyes; for the latter is a sense which is more sure and more distinct than the former.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25209.html'
source_title="HOMILIES CONCERNING THE STATUES 9:4"


[[commentary]]
quote='''
… this whole world also is both wonderful and great, and a sure proof of the wisdom of God, and "the heavens declare the glory of God, and day unto day uttereth speech, and night unto night declareth knowledge;" but nevertheless, many have stumbled at it and in contrary directions to one another. And some have admired it so much above its worth as to think it God; whilst others have been so insensible of its beauty as to assert it to be unworthy of God's creating hand, and to ascribe the greater share in it to a certain evil matter. And yet God provided for both points by making it beautiful and great that it might not be deemed alien from his wisdom; yet defective and not sufficient unto itself that it might not be suspected to be God. But nevertheless those who were blinded by their own reasonings fell away into contradictory notions, refuting one another, and becoming each the other's accuser, and vindicating the wisdom of God even by the very reasonings which led them astray.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%252021.html'
source_title="HOMILIES ON 2 CORINTHIANS 21:4"
