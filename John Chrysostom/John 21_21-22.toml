[[commentary]]
quote='''
Wherefore hath he reminded us of that reclining? Not without cause or in a chance way, but to show us what boldness Peter had after the denial. For he who then did not dare to question Jesus, but committed the office to another, was even entrusted with the chief authority over the brethren, and not only doth not commit to another what relates to himself, but himself now puts a question to his Master concerning another. John is silent, but Peter speaks. He showeth also here the love which he bare towards him; for Peter greatly loved John, as is clear from what followed, and their close union is shown through the whole Gospel, and in the Acts. When therefore Christ had foretold great things to him, and committed the world to him, and spake beforehand of his martyrdom, and testified that his love was greater than that of the others, desiring to have John also to share with him, he said, "And what shall this man do?" "Shall he not come the same way with us?" And as at that other time not being able himself to ask, he puts John forward, so now desiring to make him a return, and supposing that he would desire to ask about the matters pertaining to himself, but had not courage, he himself undertook the questioning. What then saith Christ? "If I will that he tarry till I come, what is that to thee?" Since he spake from strong affection, and wishing not to be torn away from him, Christ, to show that however much he might love, he could not go beyond His love, saith, "If I will that he tarry—what is that to thee?" By these words teaching us not to be impatient, nor curious beyond what seemeth good to Him. For because Peter was ever hot, and springing forward to enquiries such as this, to cut short his warmth, and to teach him not to enquire farther, He saith this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252088.html'
source_title="Homily on the Gospel of John 88"
