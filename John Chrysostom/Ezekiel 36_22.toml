[[commentary]]
quote='''
Nay, He is doing and contriving all things, so that even for little He may crown thee; and He goes about seeking excuses, whereby thou mayest be delivered from hell. For this cause, though thou shouldest work but the eleventh hour of the day, He gives thy wages entire; and though thou afford no ground of salvation, He saith, "I do it for mine own sake, that my name be not profaned:" though thou shouldest sigh only, though thou shouldest only weep, all these things He quickly catches hold of, for an occasion of saving thee. Let us not therefore lift up ourselves, but let us declare ourselves unprofitable, that we may become profitable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25203.html'
source_title="Homily on the Gospel of Matthew 3"
