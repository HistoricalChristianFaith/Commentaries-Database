[[commentary]]
quote='''
"And I have declared unto them Thy Name, and will declare it." "Yet thou sayest that perfect knowledge is from the Spirit." "But the things of the Spirit are Mine." "That the love wherewith Thou hast loved Me may remain in them, and I in them." "For if they learn who Thou art, then they shall know that I am not separated from Thee, but one of the greatly beloved, and a true Son, and closely knit to Thee. And those who are rightly persuaded of this, will keep both the faith which is on Me and perfect love; and I will abide in them." Seest thou how He hath arrived at a good end, finishing off the discourse with love, the mother of all blessings?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252082.html'
source_title='Homily on the Gospel of John 82'