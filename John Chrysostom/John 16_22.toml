[[commentary]]
quote='''
"And ye now therefore have sorrow-but I will see you again, and your sorrow shall be turned into joy." Then, to show that He shall die no more, He saith, "And no man taketh it from you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252079.html'
source_title='Homily on the Gospel of John 79'
