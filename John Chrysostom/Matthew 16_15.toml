[[commentary]]
quote='''
Wherefore He seeks for another judgment from themselves, and puts a second question, that they might not fall in with the multitude, who, because they saw His miracles greater than human, accounted Him a man indeed, but one that had appeared after a resurrection, as Herod also said. But He, to lead them away from this notion, saith, "But whom say ye that I am?" that is, "ye that are with me always, and see me working miracles, and have yourselves done many mighty works by me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252054.html'
source_title='Homily on the Gospel of Matthew 54'

[[commentary]]
quote='''
The disciples having recounted the opinion of the common people, He then by a second question invites them to higher thoughts concerning Him, and therefore it follows, Jesus saith unto them, Whom say ye that I am? You who are with Me always, and have seen greater miracles than the multitudes, ought not to agree in the opinion of the multitudes. For this reason He did not put this question to them at the commencement of His preaching, but after He had done many signs; then also He spoke many things to them concerning His Deity.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"
