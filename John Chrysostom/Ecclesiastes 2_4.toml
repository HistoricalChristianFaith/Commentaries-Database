[[commentary]]
quote='''
But what is vain? Let us hear the Preacher himself, what he saith; "I planted me vineyards, I gat me men singers and women singers, I made me pools of water, I had great possession of herds and flocks, I gathered me also silver and gold, and I saw that these are vanity." And again, "Vanity of vanities, all things are vanity." Hear also what the Prophet saith, "He heapeth up riches, and knoweth not who shall gather them." Such is "vanity of vanities," your splendid buildings, your vast and overflowing riches, the herds of slaves that bustle along the public square, your pomp and vainglory, your high thoughts, and your ostentation. For all these are vain; they came not from the hand of God, but are of our own creating. But why then are they vain? Because they have no useful end. Riches are vain when they are spent upon luxury; but they cease to be vain when they are "dispersed and given to the needy."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%252012.html'
source_title="Homilies on Ephesians, Homily 12"


[[commentary]]
quote='''
Hear what Solomon says, who knew the present world by actual experience. "I builded me houses, I planted me vineyards, I made me gardens, and orchards and pools of water. I gathered me also silver and gold. I gat myself men-singers, and women-singers, and flocks, and herds." There was no one who lived in greater luxury, or higher glory. There was no one so wise or so powerful, no one who saw all things so succeeding to his heart's desire. What then? He had no enjoyment from all these things. What after all does he say of it himself? "Vanity of vanities, all is vanity." Vanity not simply but superlatively. Let us believe him, and lay hold on that in which there is no vanity, in which there is truth; and what is based upon a solid rock, where there is no old age, nor decline, but all things bloom and flourish, without decay, or waxing old, or approaching dissolution. Let us, I beseech you, love God with genuine affection, not from fear of hell, but from desire of the kingdom. For what is comparable to seeing Christ? Surely nothing! What to the enjoyment of those good things? Surely nothing! Well may there be nothing; for "eye hath not seen, nor ear heard, neither have entered into the heart of man the things which God hath prepared for them that love Him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%252015.html'
source_title="Homilies on 1 Timothy, Homily 15"


[[commentary]]
quote='''
Serve God with tears, that thou mayest be able to wash away your sins. I know that many mock us, saying, "Tears directly." Therefore it is a time for tears. I know also that they are disgusted, who say, "Let us eat and drink, for to-morrow we die." "Vanity of vanities, all is vanity." It is not I that say it, but he who had had the experience of all things saith thus: "I builded for me houses, I planted vineyards, I made me pools of water, [I had] men servants and women servants." And what then after all these things? "Vanity of vanities, all is vanity." Let us mourn therefore, beloved, let us mourn in order that we may laugh indeed, that we may rejoice indeed in the time of unmixed joy. For with this joy [here] grief is altogether mingled: and never is it possible to find it pure. But that is simple and undeceiving joy: it has nothing treacherous, nor any admixture.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252015.html'
source_title="Homilies on Hebrews, Homily 15"
