[[commentary]]
quote='''
Noble tokens, surely, these, of the rulers of synagogues; in the moment of her death pipes and cymbals raising a dirge! What then doth Christ? All the rest He cast out, but the parents He brought in; to leave no room for saying that He healed her in any other way.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252031.html'
source_title='Homily on the Gospel of Matthew 31'

[[commentary]]
quote='''
We may suppose that He proceeded slowly, and spake longer to the woman whom He had healed, that He might suffer the maid to die, and thus an evident miracle of restoring to life might be wrought. In the case of Lazarus also He waited till the third day. And when he saw the minstrels and the people making a noise; this was a proof of her death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"
