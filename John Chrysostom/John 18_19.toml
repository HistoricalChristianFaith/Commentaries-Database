[[commentary]]
quote='''
(Hom. lxxxiii. 3) As they could bring no charge against Christ, they asked Him of His disciples: The high priest then asked Jesus of His disciples; perhaps where they were, and on what account He had collected them, he wished to prove that he was a seditious and factious person whom no one attended to, except His own disciples.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"The high priest then asked Jesus of His disciples, and of His doctrine." O the wickedness! Though he had continually heard Him speaking in the temple and teaching openly, he now desires to be informed. For since they had no charge to bring, they enquired concerning His disciples, perhaps where they were, and why He had collected them, and with what intention, and on what terms. And this he said, as desiring to prove Him to be a seditious person and an innovator, since no one gave heed to Him, except them alone, as though His were some factory of wickedness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title='Homily on the Gospel of John 83'
