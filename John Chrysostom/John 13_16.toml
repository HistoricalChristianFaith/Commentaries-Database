[[commentary]]
quote='''
(Hom. lxxi. 2) He continues to urge them to wash one another's feet; Verily, verily, I say unto you, The servant is not greater than his lord, neither He that is sent greater than He that sent Him; as if to say, If I do it, much more ought you.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
What He said before, this He saith here also, to shame them; "For if the servant is not greater than his master, nor he that is sent greater than him that sent him, and these things have been done by Me, much more ought they to be done by you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252071.html'
source_title='Homily on the Gospel of John 71'
