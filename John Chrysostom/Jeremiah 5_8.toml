[[commentary]]
quote='''
Yet for all this some are so cold and senseless, as to be always seeking only the things that are here, and uttering those absurd sayings, "Let me enjoy all things present for a time, and then I will consider about things out of sight: I will gratify my belly, I will be a slave to pleasures, I will make full use of the present life; give me to-day, and take tomorrow." Oh excess of folly! Why, wherein do they who talk so differ from goats and swine? For if the prophet permits not them to be accounted men, that "neigh after their neighbors wife," who shall blame us for esteeming these to be goats and swine, and more insensible than asses, by whom those things are held uncertain, which are more evident than what we see?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252013.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 13:7"
