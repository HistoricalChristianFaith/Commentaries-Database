[[commentary]]
quote='''
But when they recognized Him, the disciples Peter and John again exhibited the peculiarities of their several tempers. The one was more fervent, the other more lofty; the one more keen, the other more clear-sighted. On this account John first recognized Jesus, Peter first came to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title='Homily on the Gospel of John 87'

[[commentary]]
quote='''
(Hom. lxxxvii) The recognition of Him brings out Peter and John in their different tempers of mind; the one fervid, the other sublime; the one ready, the other penetrating. John is the first to recognise our Lord: Therefore that disciple whom Jesus loved saith unto Peter, It is the Lord; Peter is the first to come to Him: Now when Simon Peter heard that it was the Lord, he girt his fisher's coat unto Him, for he was naked.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
