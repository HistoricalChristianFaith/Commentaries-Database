[[commentary]]
quote='''
The name of Joshua [Jesus] was a type. For this reason then, and because of the very name, the creation reverenced him. What then! Was no other person called Jesus? Yes; but this man was on this account so called in type; for he used to be called Hoshea. Therefore the name was changed: for it was a prediction and a prophecy. He brought in the people into the promised land, as Jesus [does] into heaven; not the Law; since neither did Moses [bring them in], but remained without. The Law has not power to bring in, but grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252027.html'
source_title="HOMILIES ON HEBREWS 27.6"
