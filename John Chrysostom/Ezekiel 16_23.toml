[[commentary]]
quote='''
For what saith He? "An evil and adulterous generation seeketh after a sign." Now what He saith is to this effect: What marvel if ye behave so to me who have been hitherto unknown to you when even to the Father, of whom ye have had so much experience, ye have done the very same? forsaking Him, ye have run unto the devils, drawing to yourselves wicked lovers. With this Ezekiel too was continually upbraiding them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252043.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 43:1"
