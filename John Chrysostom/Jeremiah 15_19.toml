[[commentary]]
quote='''
Consider to what a dignity one exalts himself who esteems others' salvation to be of great importance. Such a person is imitating God as far as lies within the power of humankind. Hear what God says speaking through his prophet: "He who separates the worthy from the vile shall be as my mouth." What God says is that one who is eager to save a brother who has fallen into careless ways, one who hastens to snatch his brother from the jaws of the devil, that person imitates me as far as lies within human power. What could equal that? This is greater than all good deeds. This is the peak of all virtue.
'''
source_url=''
source_title="BAPTISMAL INSTRUCTIONS 6:19"

[[commentary]]
quote='''
Let us catch them then by our mode of life; and by these souls let us build up the Church, and of these let us amass our wealth. There is nothing to weigh against a soul, not even the whole world. So that although thou give countless treasure unto the poor, thou wilt do no such work as he who converteth one soul. "For he that taketh forth the precious from the vile shall be as my mouth:" so He speaks. A great good it is, I grant, to have pity on the poor; but it is nothing equal to the withdrawing them from error.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%25203.html'
source_title="HOMILIES ON 1 CORINTHIANS 3:9"


[[commentary]]
quote='''
Words full of gentleness and meekness, even as also He Himself used to speak, saying to them that were insulting Him, "I have not a devil;" and again, "If I have spoken evil, bear witness of the evil." If thou also speak in this way; if thou speak for thy neighbor's amendment, thou wilt obtain a tongue like that tongue. And these things God Himself saith; "For he that bringeth out the precious from the vile, shall be as my mouth;" such are His words. When therefore thy tongue is as Christ's tongue, and thy mouth is become the mouth of the Father, and thou art a temple of the Holy Ghost, then what kind of honor could be equal to this?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252078.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 78:2"
