[[commentary]]
quote='''
For if we, when sending children to teachers, should we see them reaping no benefit thereby, begin to be severe in blaming the teachers, and remove them often to others; what excuse shall we have for not bestowing upon virtue even so much diligence as upon these earthly things, but forever bringing our tablets home empty? And yet our teachers here are more in number and greater. For no less than prophets and apostles and patriarchs, and all righteous men, are by us set over you as teachers in every Church. And not even so is there any profit, but if you have joined in chanting two or three Psalms, and making the accustomed prayers at random and anyhow, are so dismissed, ye think this enough for your salvation. Have ye not heard the prophet, saying (or rather God by the prophet), "This people honoreth me with their lips, but their heart is far from me?" Therefore, lest this be our case too, wipe thou out the letters, or rather the impressions, which the devil hath engraven in thy soul; and bring me a heart set free from worldly tumults, that without fear I may write on it what I will.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252011.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 11:9"
