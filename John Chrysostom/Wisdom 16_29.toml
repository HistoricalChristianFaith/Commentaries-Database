[[commentary]]
quote='''
No one hath so labored that we should be approved, and great, and in all things right-minded, as the God who made us. Wherefore both against our will He befriends us often, and without our knowledge oftener than not. And if thou marvel at what I have said, I point to this as having occurred not to any ordinary person, but to the blessed Paul. For even that blessed man, when in much danger and affliction, often besought God that the temptations might depart from him: nevertheless God regarded not his request, but his profit, and to signify this He said, "My grace is sufficient for thee, for my strength is made perfect in weakness." So that before He hath told him the reason, He benefits him against his will, and without his knowing it.

Now what great thing doth He ask, in requiring us to be thankful in return for such tender care? Let us then obey, and everywhere keep up this. Since neither were the Jews by anything ruined so much, as by being unthankful; those many stripes, one after another, were brought upon them by nothing else than this; or rather even before those stripes this had ruined and corrupted their soul. "For the hope of the unthankful," saith one, "is like the winter's hoar frost;" it benumbs and deadens the soul, as that doth our bodies.

And this springs from pride, and from thinking one's self worthy of something. But the contrite will acknowledge grounds of thanksgiving to God, not for good things only, but also for what seem to be adverse; and how much soever he may suffer, will count none of his sufferings undeserved. Let us then also, the more we advance in virtue, so much the more make ourselves contrite; for indeed this, more than anything else is virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252025.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 25:4-5"
