[[commentary]]
quote='''
This was the meaning of her running, and her words declare it. "They have taken away," she saith, "my Lord, and I know not where they have laid Him." Seest thou how she knew not as yet anything clearly concerning the Resurrection, but thought there had been a removal of the body, and tells all simply to the disciples? And the Evangelist hath not deprived the woman of such a praise, nor thought it shame that they should have learnt these things first from her who had passed the night in watching. Thus everywhere doth the truth-loving nature of his disposition shine forth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252085.html'
source_title='Homily on the Gospel of John 85'
