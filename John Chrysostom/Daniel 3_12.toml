[[commentary]]
quote='''
Consider thou also with me the wickedness of those who were their accusers, and how maliciously and bitterly they brought the accusation! "There are," say they, "certain Jews whom thou hast set up over the works of the province of Babylon." They did not merely make mention of the nation, but they also bring to mind their honourable condition, that they may inflame the wrath of the king; almost as if they had said, "These slaves, these captives, who are without a city, thou hast made rulers over us. But they shew contempt for such honour, and treat insolently him who has given them this honour!" Therefore they say this; "The Jews whom thou hast set over the works of the province of Babylon, obey not thy decree, nor serve thy gods." The accusation becomes their greatest praise; and the crimes imputed, their encomium; a testimony indeed that is indubitable, since their enemies bring it forward.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25204.html'
source_title="HOMILIES CONCERNING THE STATUES 4:8"
