[[commentary]]
quote='''
And if ye would fain even number them, let us bring in some one of those that are in honor in kings' courts, and let him have both very much wealth, and great power, and a birthplace excelling others, and distinction of ancestry, and let him be looked up to by all men. Now then let us see, if this be not the very person to be more in slavery than all; and let us set in comparison with him, not a slave merely, but a slave's slave, for many though servants have slaves.… But not such are our circumstances; rather should another fare ill, there are many to grieve with him: should he obtain distinction, many to find pleasure with him. Not so again the apostle: "For whether," saith he, "one member suffer, all the members suffer with it; or one member be honored, all the members rejoice with it." And the words of him who gives these admonitions, are at one time, "What is my hope or joy? are not even ye?" at another, "Now we live, if ye stand fast in the Lord;" at another, "Out of much affliction and anguish of heart I wrote unto you;" and, "Who is weak, and I am not weak? Who is offended, and I burn not?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252058.html'
source_title="Homily on Matthew 58"


[[commentary]]
quote='''
Such ought a Teacher to be, so to regard his disciples, to think them everything. "Now we live," he says, "if ye stand fast in the Lord." And again, "What is our hope, or joy, or crown of rejoicing? are not even ye in the presence of our Lord Jesus Christ?" You see his anxiety in this matter, his regard for the good of his disciples, not less than for his own. For teachers ought to surpass natural parents, to be more zealous than they. And it becomes their children to be kindly affectioned towards them. For he says, "Obey them that have the rule over you, and submit yourselves: for they watch for your souls as they that must give account."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Timothy%2FHomily%25202.html'
source_title="Homily on 2 Timothy 2"
