[[commentary]]
quote='''
On this principle again all the kings whom they had in honor after his time were named from him, both by the people themselves and by God. For both Ezekiel and other prophets besides speak of David as coming and rising again; not meaning him that was dead, but them who were emulating his virtue. And to Hezekiah He saith, "I will defend this city, for mine own sake and for my servant David's sake."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25202.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 2:6"
