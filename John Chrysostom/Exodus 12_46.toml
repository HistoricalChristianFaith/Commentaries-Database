[[commentary]]
quote='''
And that prophecy also is fulfilled, "A bone of Him shall not be broken." (Ex. xii. 46; Num. ix. 12.) For even if this was said with reference to the lamb of the Jews, still it was for the sake of the reality that the type preceded, and in Him the prophecy was more fully accomplished. On this account the Evangelist brought forward the Prophet. For since by continually producing himself as witness he would have seemed unworthy of credit, he brings Moses to help him, and saith, that neither did this come to pass without a purpose, but was written before of old. And this is the meaning of the words, "A bone of Him shall not be broken."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252085.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 85"
