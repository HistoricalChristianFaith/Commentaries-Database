[[commentary]]
quote='''
This cry rent the veil, and opened the tombs, and made the house desolate. And He did this, not as offering insult to the temple (for how should He, who saith, "Make not my Father's house a house of merchandise," but declaring them to be unworthy even of His abiding there; like as also when He delivered it over to the Babylonians. But not for this only were these things done, but what took place was a prophecy of the coming desolation, and of the change into the greater and higher state; and a sign of His might.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252088.html'
source_title='Homily on the Gospel of Matthew 88'

[[commentary]]
quote='''
Marvel not therefore if at this time also they were perverse, being thus altogether prepared to set themselves impudently against all things; but observe this other point, how great signs He had wrought, some from Heaven, some on earth, some in the very temple, at once marking His indignation, and at the same time showing that what were unapproachable are now to be entered, and that Heaven shall be opened; and the work removed to the true Holy of Holies. And they indeed said, "If He be the King of Israel, let Him come down now from the cross," but He shows that He is King of all the world. And whereas those men said, "Thou that destroyest this temple, and buildest it in three days," He shows that it shall be made forever desolate. Again they said, "He saved others, Himself He cannot save." but He while abiding on the cross proved this most abundantly on the bodies of His servants.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252088.html'
source_title='Homily on the Gospel of Matthew 88'
