[[commentary]]
quote='''
Do you wish that I shall speak of the ways of repentance? They are many, and various, and different, and all lead to heaven.… And if thou wouldest learn a fourth way, I will say almsgiving. For this has a great power and unspeakable. For Daniel saith to Nebuchadnezzar when he had come to all kinds of evil, and had entered upon all impiety, "O King let my counsel be acceptable unto thee, redeem thy sins by almsgiving and thine iniquities by compassion on the poor." What could be compared with this lovingkindness? After countless sins, after so many transgressions, he is promised that he will be reconciled with him he has come into conflict with if he will show kindness to his own fellow-servants.… See we have shewn five ways of repentance: first the condemnation of sins, next the forgiveness of our neighbours' sins, thirdly that which comes of prayer, fourth that which comes of almsgiving, fifth that which comes of humility. Do not thou then be lazy; but walk in all these day by day.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Power%2520of%2520Demons%2FHomily%25202.html'
source_title="CONCERNING THE POWER OF DEMONS, HOMILY 2:6"


[[commentary]]
quote='''
Dost thou see, that when the prophet gave that excellent counsel to Nebuchadnezzar, he did not merely consider the poor. For he does not content himself with saying, Give to the poor; but what? "Break off thy sins by almsdeeds, and thine iniquities by showing mercy to the poor." Part with thy wealth, not that others may be fed, but that thou mayest escape punishment. And Christ again says, "Go and sell that thou hast, and give to the poor ...and come and follow Me." Dost thou see that the commandment was given that he might be induced to follow Him? For as riches are an impediment, therefore he commands them to be given to the poor, instructing the soul to be pitiful and merciful, to despise wealth, and to flee from covetousness. For he who has learnt to give to him that needs, will in time learn not to receive from those who have to give. This makes men like God. Yet virginity, and fasting, and lying on the ground, are more difficult than this, but nothing is so strong and powerful to extinguish the fire of our sins as almsgiving. It is greater than all other virtues. It places the lovers of it by the side of the King Himself, and justly. For the effect of virginity, of fasting, of lying on the ground, is confined to those who practice them, and no other is saved thereby. But almsgiving extends to all, and embraces the members of Christ, and actions that extend their effects to many are far greater than those which are confined to one. For almsgiving is the mother of love, of that love, which is the characteristic of Christianity, which is greater than all miracles, by which the disciples of Christ are manifested. It is the medicine of our sins, the cleansing of the filth of our souls, the ladder fixed to heaven; it binds together the body of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Titus%2FHomily%25206.html'
source_title="HOMILIES ON TITUS 6"
