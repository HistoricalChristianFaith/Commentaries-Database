[[commentary]]
quote='''
(Hom. lxxxiii) But that Peter would have entered the palace, if he had been permitted, appears by what immediately follows: Then went out that other disciple who was known to the high priest, and spake unto her who kept the doors, and brought in Peter. He did not bring him in himself, because he kept near Christ.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
And that Peter would have also entered had he been permitted, he shows by the sequel; for when he went out, and bade the damsel who kept the door bring in Peter, he straightway came in. But why did he not bring him in himself? He clung to Christ, and followed Him; on this account he bade the woman bring him in.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title='Homily on the Gospel of John 83'
