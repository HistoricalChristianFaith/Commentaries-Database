[[commentary]]
quote='''
Now that you may understand what is the difference between statements which are diverse and contradictory, one of the evangelists has stated that Christ carried the cross, another that Simon the Cyrenian carried it: but this causes no contradiction or strife. "And how," you say, "is there no contradiction between the statements that he carried and did not carry?" Because both took place. When they went out of the Praetorium Christ was carrying it: but as they proceeded Simon took it from Him and bore it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Paralytic%2520Let%2520Down%2520Through%2520the%2520Roof.html'
source_title="On the Paralytic Let Down Through the Roof"
