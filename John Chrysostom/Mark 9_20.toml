[[commentary]]
quote='''
(ubi sup.) But this the Lord permitted for the sake of the father of the boy, that when he saw the devil vexing his child, he might be brought on to believe that the miracle was to be wrought.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
