[[commentary]]
quote='''
(Hom. lxxvi. 1) The Son then contributes no less than the Father to the help of the disciples. The Father changeth, but the Son keepeth them in Him, which is that which makes the branches fruitful. And again, the cleansing is attributed to the Son also, and the abiding in the root to the Father who begat the root. (c. 2.). It is a great loss to be able to do nothing.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"He that abideth in Me, and I in him." Seest thou that the Son contributeth not less than the Father towards the care of the disciples? The Father purgeth, but He keepeth them in Himself. The abiding in the root is that which maketh the branches to be fruit-bearing. For that which is not purged, if it remain on the root, bears fruit, though perhaps not so much as it ought; but that which remains not, bears none at all. But still the "purging" also hath been shown to belong to the Son, and the "abiding in the root," to the Father, who also begat the Root. Seest thou how all is common, both the "purging," and the enjoying the virtue which is from the root?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252076.html'
source_title='Homily on the Gospel of John 76'
