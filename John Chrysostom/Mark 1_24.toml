[[commentary]]
quote='''
What then, doth no demon call upon God's Name? Did not the demoniacs say, "We know Thee who Thou art, the Holy One of God?" Did they not say to Paul, "these men are the servants of the Most High God?" They did, but upon scourging, upon compulsion; never of their own will and without being scourged.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252029.html'
source_title="HOMILIES ON FIRST CORINTHIANS 29.3"
