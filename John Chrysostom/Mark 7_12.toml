[[commentary]]
quote='''
Christ says, "Spare the poor"; Mammon says, "Even from the naked strip off the things they have." Christ says, "Empty thyself of what thou hast"; Mammon says, "Take also what thou hast not." Seest thou the opposition, seest thou the strife? How is it that a man cannot easily obey both, but must despise one?… Christ says, "Whosoever he be of you that renounceth not all that he hath, he cannot be My disciple"; Mammon says, "Take the bread from the hungry." Christ says, "Cover the naked"; the other says, "Strip the naked." Christ says, "Thou shalt not hide thyself from thine own flesh," and those of thine own house; Mammon says, "Thou shall not pity those of thine own seed; though thou seest thy mother or thy father in want, despise them." Why say I father or mother? "Even thine own soul," he says, "destroy it also." And he is obeyed! Alas! he who commands us cruel, and mad, and brutal things, is listened to rather than He who bids us gentle and healthful things!
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Philippians%2FHomily%25206.html'
source_title="HOMILIES ON PHILIPPIANS 6"
