[[commentary]]
quote='''
"What then, if I have been overtaken?" saith one. Cleanse thyself. "How, and in what way?" Weep, groan, give alms, apologize to him that is affronted, reconcile him to thyself hereby, wipe clean thy tongue, lest thou provoke God more grievously. For so if one had filled his hands with dung, and then should lay hold of thy feet, entreating thee, far from hearing him, thou wouldest rather spurn him with thy foot; how then durst thou in such sort draw nigh to God? Since in truth the tongue is the hand of them that pray, and by it we lay hold on the knees of God. Defile it not therefore, lest to thee also He say, "Though ye make many prayers, I will not hearken."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252051.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 51:5"
