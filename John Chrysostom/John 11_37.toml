[[commentary]]
quote='''
(Hom. lxiii. 1) It was His enemies who said this. The very works, which should have evidenced His power, they turn against Him, as if He had not really done them. This is the way that they speak of the miracle of opening the eyes of the man that was born blind. They even prejudge Christ before He has come to the grave, and have not the patience to wait for the issue of the matter.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
