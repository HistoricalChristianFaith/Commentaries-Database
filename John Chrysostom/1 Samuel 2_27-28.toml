[[commentary]]
quote='''
For with respect to the future, they will not be benefited by the honor done them, but receive the greater condemnation, neither will they be injured as to the future by ill treatment, but will have the more excuse. But all this I desire to be done for your own sakes. For when rulers are honored by their people, this too is reckoned against them; as in the case of Eli it is said, "Did I not choose him out of his father's house?" But when they are insulted, as in the instance of Samuel, God said, "They have not rejected thee, but they have rejected Me." Therefore insult is their gain, honor their burden. What I say, therefore, is for your sakes, not for theirs. He that honors the Priest, will honor God also; and he who has learnt to despise the Priest, will in process of time insult God. "He that receiveth you," He saith, "receiveth Me." "Hold my priests in honor," He says. The Jews learned to despise God, because they despised Moses, and would have stoned him. For when a man is piously disposed towards the Priest, he is much more so towards God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Timothy%2FHomily%25202.html'
source_title="HOMILIES ON 2 TIMOTHY 2"
