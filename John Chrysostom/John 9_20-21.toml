[[commentary]]
quote='''
Now when there were three questions asked, whether he was their son, whether he had been blind, and how he received his sight, the parents only acknowledged two of them, but do not add the third. And this came to pass for the sake of the truth, in order that none other save the man that was healed, who was also worthy of credit, should acknowledge this matter. And how would the parents have favored Christ, when even of what they knew some part they spake not through fear of the Jews? What say they?

"We know that this is our son, and that he was born blind; but by what means he now seeth we know not, or who hath opened his eyes we know not; he is of age, he shall speak for himself."

By making him to be worthy of credit, they begged off themselves; "He is not a child, say they, nor incapable, but able to testify for himself."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252058.html'
source_title="Homily on the Gospel of John 58"
