[[commentary]]
quote='''
Therefore the thief being taken pays fourfold, but he that spoils by violence is worse than he that steals. And if this last ought to give fourfold what he stole, the extortioner should give tenfold and much more; and it is much if even so he can make atonement for his injustice; for of almsgiving not even then will he receive the reward. Therefore saith Zacchaeus, "I will restore what I have taken by false accusation fourfold, and the half of my goods I will give to the poor." And if under the law one ought to give fourfold, much more under grace; if he that steals, much more he that spoils by violence. For besides the damage, in this case the in-suit too is great. So that even if thou give an hundredfold, thou hast not yet given the whole.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252052.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 52.6"
