[[commentary]]
quote='''
(Hom. lxxxvii) He means that they had not confidence to talk to Him, as before, but sat looking at Him in silence and awe, absorbed in regarding His altered and now supernatural form, and unwilling to ask any question. Knowing that it was the Lord, they were in fear, and only ate what, in exercise of His great power, He had created. He again does not look up to heaven, or do any thing after a human sort, thus showing that His former acts of that kind were done only in condescension: Jesus then cometh, and taketh bread, and giveth them, and fish likewise.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
What then doth Jesus? "Come," He saith, "dine." "And none of them durst ask Him." For they no longer had the same boldness, nor were they so confident, nor did they now approach Him with speech, but with silence and great fear and reverence, sat down giving heed to Him. "For they knew that it was the Lord." And therefore they did not ask Him, "Who art Thou?" But seeing that His form was altered, and full of much awfulness, they were greatly amazed, and desired to ask somewhat concerning it; but fear, and their knowledge that He was not some other, but the Same, checked the enquiry, and they only ate what He created for them with a greater exertion of power than before. For here He no more looketh to heaven, nor performeth those human acts, showing that those also which He did were done by way of condescension.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title='Homily on the Gospel of John 87'
