[[commentary]]
quote='''
But if upon them that are chastised by God it is not right to trample, but to grieve with them, much more with them that have sinned against us. For this is love's sign; love God prefers to all things. For as in the royal purple, those are precious amongst the flowers and dyes, which make up this robing; so here too, these virtues are the precious ones, which preserve love. But nothing maintains love so much as the not remembering them that have sinned against us. "Why? did not God guard the other side also? Why? did He not drive him that hath done the wrong to him that is wronged? Doth He not send him from the altar to the other, and so after the reconciliation invite him to the table?" But do not therefore wait for the other to come, since thus thou hast lost all. For to this intent most especially doth He appoint unto thee an unspeakable reward, that thou mayest prevent the other, since, if thou art reconciled by his entreaties, the amity is no longer the result of the divine command, but of the other party's diligence. Wherefore also thou goest away uncrowned, while he receives the rewards. What sayest thou? Hast thou an enemy, and art thou not ashamed? Why is not the devil enough for us, that we bring upon ourselves those of our own race also? Would that not even he had been minded to war against us; would that not even he were a devil! Knowest thou not how great the pleasure after reconciliation? For what, though in our enmity it appear not great? For that it is sweeter to love him that doth us wrong than to hate him, after the enmity is done away thou shalt be able to learn full well. Why then do we imitate the mad, devouring one another, warring against our own flesh? Hear even under the Old Testament, how great regard there was for this, "The ways of revengeful men are unto death. One man keepeth anger against another, and doth he seek healing of God?" "And yet He allowed, 'eye for eye,' and 'tooth for tooth,' how then doth He find fault?" Because He allowed even those things, not that we should do them one to another, but that through the fear of suffering, we might abstain from the commission of crime. And besides, those acts are the fruits of a short-lived anger, but to remember injuries is the part of a soul that practises itself in evil. But hast thou suffered evil? yet nothing so great, as thou wilt do to thyself by remembering injuries.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252079.html'
source_title="Homily on Matthew 79"
