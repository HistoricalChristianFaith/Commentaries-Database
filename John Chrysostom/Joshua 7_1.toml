[[commentary]]
quote='''
Suppose any one should make scrutiny into all the communicants in the world, what kind of transgression is there which he would not detect? and what if he examined those in authority? Would he not find them eagerly bent upon gain? making traffic of high places? envious, malignant, vainglorious, gluttonous, and slaves to money?
Where then there is such impiety as this going on, what dreadful calamity must we not expect? And to be assured how sore vengeance they incur who are guilty of such sins as these, consider the examples of old. One single man, a common soldier, stole the sacred property, and all were smitten. Ye know, doubtless, the history I mean? I am speaking of Acham the son of Carmi, the man who stole the consecrated spoil.…
On account of all these things, let us take heed to ourselves. Do ye not see these wars? Do ye not hear of these disasters? Do ye learn no lesson from these things? Nations and whole cities are swallowed up and destroyed, and myriads as many again are enslaved to the barbarians.
If hell bring us not to our senses, yet let these things. What, are these too mere threats, are they not facts that have already taken place? Great is the punishment they have suffered, yet a greater still shall we suffer, who are not brought to our senses even by their fate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25206.html'
source_title="HOMILIES ON EPHESIANS 6"
