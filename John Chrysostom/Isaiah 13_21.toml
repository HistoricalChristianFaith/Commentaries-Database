[[commentary]]
quote='''
Wherefore I entreat, let us kill the serpent, let us shut up the wild beasts, let us stifle them, let us slay them, and these wicked thoughts let us give over to the sword of the Spirit, lest the prophet threaten us also with such things as he threatened Judea, that "The wild asses shall dance there, and porcupines, and serpents." For there are, there are even men worse than wild asses, living as it were in the wilderness, and kicking; yea the more part of the youth amongst us is like this. For indeed having wild lusts they thus leap, they kick, going about unbridled, and spend their diligence on no becoming object. And the fathers are to blame, who while they constrain the horsebreakers to discipline their horses with much attention, and suffer not the youth of the colt to go on long untamed, but put upon it both a rein, and all the rest, from the beginning; but their own young ones they overlook, going about for a long season unbridled, and without temperance; disgracing themselves, by fornications, and gamings, and continuings in the wicked theatres.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252059.html'
source_title="Homily 59 on the Gospel of Matthew"
