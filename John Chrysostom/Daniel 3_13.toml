[[commentary]]
quote='''
But when all fell down, and were subdued, then the youths alone are led into the midst; in order that from this too the conquest may become the more illustrious, they alone conquering and being proclaimed victors among so vast a multitude. For this would not have been so surprising if they had acted courageously at the first, when as yet no one had been overthrown. But the greatest, and most astonishing fact was, that the multitude of those who fell down, neither affrighted, nor enfeebled them. They did not say to themselves any such things as many are ofttimes wont to say; "If we were the first, and the only persons to worship the image, this would have been a sin: but if we do this with so many myriads, who will not make allowance? who will not think us worthy of defence?" nothing of that sort did they say or think, when they beheld the prostrate forms of so many tyrants.… What then does the king? He commands that they should be brought into the midst, so that he may affright them in every way. But nothing dismayed them, neither the wrath of the king, nor their being left alone in the midst of so many, nor the sight of the fire, nor the sound of the trumpet, nor the whole multitude looking fire at them; for deriding all these things, as if they were about to be cast into a cool fountain of water, they entered the furnace uttering that blessed sentence, "We will not serve thy gods, nor worship the golden image which thou hast set up."… I have not referred to this history without reason, but that ye may learn that whether it be the wrath of a king, or the violence of soldiers, or the envy of enemies, or captivity, or destitution, or fire, or furnace, or ten thousand terrors, nothing will avail to put to shame or terrify a righteous man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25204.html'
source_title="HOMILIES CONCERNING THE STATUES 4:8-9"
