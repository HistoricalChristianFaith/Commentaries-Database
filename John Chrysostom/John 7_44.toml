[[commentary]]
quote='''
But no man laid hands on Him.

(Hom. li. 2) This were sufficient to have raised some compunction in them; but no, such malignity believes nothing; it looks only to one thing, blood.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
This, if nothing else, might have been sufficient to cause compunction in them, but they felt it not, as the Prophet saith, "They were cleft asunder, and were not pricked in heart." (Ps. xxxv. 15 LXX.)
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252051.html'
source_title='Homily on the Gospel of John 51'
