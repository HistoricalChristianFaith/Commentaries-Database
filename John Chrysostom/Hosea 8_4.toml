[[commentary]]
quote='''
Because He is exceedingly desirous, that we should always take refuge in Him, and in everything make our requests unto Him; and do nothing and speak nothing without Him. For men, when we trouble them repeatedly concerning our affairs, become slothful and evasive, and conduct themselves unpleasantly towards us; but with God it is quite the reverse. Not when we apply to him continually respecting our affairs, but when we fail to do so, then is he especially displeased. Hear at least what He reproves the Jews for, when He says, "Ye have taken counsel, but not of Me, and made treaties, but not by My Spirit." For this is the custom of those who love; they desire that all the concerns of their beloved should be accomplished by means of themselves; and that they should neither do anything, nor say anything, without them. On this account did God not only on that occasion, but again elsewhere, uttering a reproof, speak the same language. "They have reigned, but not by Me; they have ruled, and they made it not known to Me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25203.html'
source_title="HOMILIES CONCERNING THE STATUES 3:5"
