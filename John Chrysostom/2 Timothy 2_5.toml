[[commentary]]
quote='''
You say that her clothes are shabby, but virginity resides not in clothing nor in one's complexion but in the body and soul. Is it not strange that we have different standards? We will not judge the philosopher by his hair or his staff or his tunic but by his way of life, his character and soul. The soldier too we will not approve for his mantle or belt but for his strength and manliness. Yet the virgin, who represents a state so admirable and superior to all others, we will simply and offhandedly assume practices her virtue because of the squalor of her hair, her dejected look and gray cloak. We do not strip her soul bare and scrutinize closely its inner state. But he who has drawn up the rules for this contest does not permit this. He orders that those who have entered not be judged by their clothing but by the convictions of their souls. "Athletes," Paul says, "deny themselves all sorts of things," anything that would trouble the health of the soul. "If one takes part in an athletic contest, he cannot receive the winner's crown unless he has kept the rules." What, then, are the laws of this contest? Hear again his words, or rather Christ himself, who has established the contest: "The virgin is concerned with things of the Lord, in pursuit of holiness in body and spirit."
'''
source_url=''
source_title="ON VIRGINITY 7.1-2"

[[commentary]]
quote='''
And, in a word, it is ever necessary that he who would please God and become approved and holy should not lead an easy, free, and dissolute life, but a laborious life, full of hardship and toil. For "no man," it is said, "is crowned except he strive lawfully," and in another place, "Every man that striveth for the mastery is temperate in all things." He abstains from evil words and looks, from base conversation and slander, and from blasphemy and evil speaking. From this we learn that, though trial may not come upon us from any external source, it is our duty to exercise ourselves each day in fasting, self-denial, moderate diet, and a plain table, avoiding extravagance in any way. Otherwise we cannot please God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FFour%2520Discourses%252C%2520chiefly%2520on%2520the%2520parable%2520of%2520the%2520rich%2520man%2520and%2520Lazarus%2FDiscourse%25203.html'
source_title="Four Discourses on the Rich Man and Lazarus, Discourse 3"

[[commentary]]
quote='''
"And if a man also strive for masteries, yet is he not crowned except he strive lawfully." These things are said indeed to Timothy, but through him they are addressed to every teacher and disciple. Let no one therefore of those who hold the office of a Bishop disdain to hear these things, but let him be ashamed not to do them. "If any one strive for masteries," he says, "he is not crowned, except he strive lawfully." What is meant by "lawfully"? It is not enough that he enters into the lists, that he is anointed, and even engages, unless he comply with all the laws of the exercise, with respect to diet, to temperance and sobriety, and all the rules of the wrestling school, unless, in short, he go through all that is befitting for a wrestler, he is not crowned. And observe the wisdom of Paul. He mentions wrestlers and soldiers, the one to prepare him for slaughter and blood, the other with reference to endurance, that he might bear everything with fortitude, and be ever in exercise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Timothy%2FHomily%25204.html'
source_title="Homily on 2 Timothy 4"
