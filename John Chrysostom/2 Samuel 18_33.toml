[[commentary]]
quote='''
So great is the concern and sympathy of a good Pastor. For his bowels were writhed at their falling, as when one's own children are killed. And on this ground he begged that the wrath might come upon himself. And in the beginning of the slaughter he would have done this, unless he had seen it advancing and expected that it would come to himself. When therefore he saw that this did not happen, but that the calamity was raging among them, he no longer forbore, but was touched more than for Amnon his first-born. For then he did not ask for death, but now he begs to fall in preference to the others. Such ought a ruler to be and to grieve rather at the calamities of others than his own. Some such thing he suffered in his son's case likewise, that you might see that he did not love his son more than his subjects, and yet the youth was unchaste, and an ill-user of his father, and still he said, "Would that I might have died for thee!" What sayest thou, thou blessed one, thou meekest of all men? Thy son was set upon killing thee, and compassed thee about with ills unnumbered. And when he had been removed, and the trophy was raised, dost thou then pray to be slain? Yea, he says, for it is not for me that the army has been victorious, but I am warred against more violently than before, and my bowels are now more torn than before.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252029.html'
source_title="HOMILIES ON ROMANS 29"
