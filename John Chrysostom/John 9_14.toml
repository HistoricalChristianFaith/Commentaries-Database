[[commentary]]
quote='''
The Evangelist adds, And it was the sabbath day when Jesus made the clay, and opened his eyes; in order to expose their real design, which was to accuse Him of a departure from the law, and thus detract from the miracle: as appears from what follows, Then again the Pharisees also asked him how he had received his sight.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
