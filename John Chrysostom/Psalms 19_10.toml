[[commentary]]
quote='''
… hear the prophet speaking concerning them, and declaring this superiority; "More to be desired are they," he saith "than gold and much precious stone; sweeter are they also than honey and the honeycomb." But to those (only) who are in health; wherefore he has added, "For thy servant keepeth them." And again in another place calling them sweet he has added, "to my throat." For he saith, "How sweet are thy words unto my throat." And again he insisteth on the superiority, saying, "Above honey and the honeycomb to my mouth." For he was in very sound health. And let not us either come nigh to these while we are sick, but when we have healed our soul, so receive the food that is offered us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%25201.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 1"
