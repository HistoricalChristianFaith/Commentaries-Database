[[commentary]]
quote='''
Therefore also the Scripture has sent the sluggard to the ant, saying, "Go to the ant, thou sluggard, emulate his ways, and be wiser than he." Art thou unwilling, he means, to learn from the Scriptures, that it is good to labour, and that he who will not work, neither ought he to eat? learn it from the irrationals! This also we do in our families, when those who are older, and who are considered superior, have done amiss, we bid them to attend to thoughtful children. We say, "Mark such an one, who is less than you, how earnest and watchful he is." Do thou then likewise receive from this animal the best exhortation to industry; and marvel at thy Lord, not only because He hath made heaven and the sun, but because He hath also made the ant. For although the animal be small, it affords much proof of the greatness of God's wisdom. Consider then how prudent the ant is, and consider how God hath implanted in so small a body, such an unceasing desire of working! But whilst from this animal thou learnest industry; take from the bee at once a lesson of neatness, industry, and social concord! For it is not more for herself than for us, that the bee labours, and toils every day; which is indeed a thing especially proper for a Christian; not to seek his own things, but the things of others. As then she traverses all the meadows that she may prepare a banquet for another, so also, O man, do thou likewise; and if thou hast accumulated wealth, expend it upon others; if thou hast the faculty of teaching, do not bury the talent, but bring it out publicly for the sake of those who need it! Or if thou hast any other advantage, become useful to those who require the benefit of thy labours!
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252012.html'
source_title="Homily concerning the Statues 12"

[[commentary]]
quote='''
I do not say these things haphazardly now, but rather because many are often overly intrusive in their investigation of the needy. They examine their lineage, life, habits, vocation and the vigor of their body. They make complaints and demand immense public scrutiny for their health. For this precise reason, many of the poor simulate physical disabilities, so that by dramatizing their misfortunes they may deflect our cruelty and inhumanity. And although when it is summertime, it is terrible to make these complaints, it is not quite so dreadful. However, during the frost and the cold, for someone to become such a savage and inhuman judge and not impart any forgiveness to the unemployed, does this not involve extreme cruelty? "Therefore, what did Paul ordain by law," they say, "when he said to the Thessalonians, 'If any one does not wish to work, neither let him eat'?" So that you, too, may also hear these things, you should discuss the words of Paul not only with the poor individual but even with yourself. For the laws of Paul are laid down not only for the poor but also for all. Let me say something burdensome and grievous. I know that you will grow angry. Nevertheless, I will say it; for I do not say it to strike you but to correct you. We criticize them for their laziness, something which is worthy of forgiveness for the most part. However, we too often do things which are even more grievous than any laziness.… Therefore, when you say, "What then shall we say to Paul?" converse with yourself, too, and say these things not only to the poor. Read not only the threat of punishment but also Paul's admonition to forgiveness, for the one who said, "If anyone does not wish to work, neither let him eat," added, "And you, brothers, do not lose heart in doing good."
'''
source_url=''
source_title="ON REPENTANCE AND ALMSGIVING 10.6.23-24"

[[commentary]]
quote='''
"For even when we were with you, this we commanded you, If any will not work, neither let him eat."

See how in the former Epistle indeed he discourses somewhat more mildly concerning these things; as when he says, "We beseech you, brethren,-that ye would abound more and more-and that ye study"-and nowhere does he say, "we command," nor "in the Name of our Lord Jesus Christ," which was fearful and implied danger, but that "ye abound," he says, and "study," which are the words of one exhorting to virtue; "that ye may walk honestly" (becomingly), he says. But here is nothing of this kind, but "if any one will not work," says he, "neither let him eat." For if Paul, not being under a necessity, and having a right to be idle, and having undertaken so great a work, did nevertheless work, and not merely work, but "night and day," so that he was able even to assist others,-much more ought others to do this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Thessalonians%2FHomily%25205.html'
source_title="Homily on 2 Thessalonians 5"
