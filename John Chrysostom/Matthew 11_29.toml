[[commentary]]
quote='''
Such a spirit as this let us too acquire, and whatever we may suffer we shall bear it easily, and before the Kingdom, we shall reap here the gain accruing from lowliness of mind. Thus "learn," saith He, "of me, for I am meek and lowly in heart, and ye shall find rest unto your souls." Therefore in order that we may enjoy rest both here and hereafter, let us with great diligence implant in our souls the mother of all things that are good, I mean humility. For thus we shall be enabled both to pass over the sea of this life without waves, and to end our voyage in that calm harbor; by the grace and love towards man of our Lord Jesus Christ, to whom be glory and might for ever and ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25203.html'
source_title="Homily on the Gospel of Matthew 3"

[[commentary]]
quote='''
Seest thou how everywhere practice is required, and the proof by works? "For by their fruits," saith He, "ye shall know them." And what commends our own life? Is it indeed a display of miracles, or the perfection of an excellent conversation? Very evidently it is the second; but as to the miracles, they both have their origin from hence, and terminate herein. For both He that shows forth an excellent life, draws to Himself this gift, and he that receives the gift, receives it for this end, that he may amend other men's lives. Since even Christ for this end wrought those miracles, that having made Himself thereby credible, and drawn men unto Him, He might bring virtue into our life. Wherefore also He lays more stress of the two on this. For He is not at all satisfied with the signs only, but He also threatens hell, and promises a kingdom, and lays down those startling laws, and all things He orders to this end, that He may make us equal to the angels.

And why say I, that Christ doth all for this object? Why, even thou, should one give thee thy choice, to raise dead men by His name, or to die for His name; which I pray thee, of the two wouldest thou rather accept? Is it not quite plain, the latter? and yet the one is a miracle, the other but a work. And what, if one offered thee to make grass gold, or to be able to despise all wealth as grass, wouldest thou not rather accept this latter? and very reasonably. For mankind would be attracted by this more than any way. For if they saw the grass changed into gold, they would covet themselves also to acquire that power, as Simon did, and the love of money would be increased in them; but if they saw us all contemning and neglecting gold, as though it were grass, they would long ago have been delivered from this disease.

Seest thou that our practice has more power to do good? By practice I mean, not thy fasting, nor yet thy strewing sackcloth and ashes under thee, but if thou despise wealth, as it ought to be despised; if thou be kindly affectioned, if thou give thy bread to the hungry, if thou control anger, if thou cast out vainglory, if thou put away envy. So He Himself used to teach: for, "Learn of me," saith He, "for I am meek and lowly in heart." He did not say, "for I fasted," although surely He might have spoken of the forty days, yet He saith not this; but, "I am meek and lowly in heart." And again, when sending them out, He said not, "Fast," but, "Eat of all that is set before you." With regard to wealth, however, He required of them great strictness, saying, "Provide not gold, or silver, or brass, in your purses."

And all this I say, not to depreciate fasting, God forbid, but rather highly to commend it. But I grieve when other duties being neglected, ye think it enough for salvation, having but the last place in the choir of virtue. For the greatest thing is charity, and moderation, and almsgiving; which hits a higher mark even than virginity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252046.html'
source_title="Homily on the Gospel of Matthew 46"
