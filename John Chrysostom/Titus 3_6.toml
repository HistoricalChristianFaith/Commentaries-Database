[[commentary]]
quote='''
Ver. 6. "Which He shed on us abundantly through Jesus Christ our Saviour."

Thus we need the Spirit abundantly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Titus%2FHomily%25205.html'
source_title='Homily on Titus 5'
