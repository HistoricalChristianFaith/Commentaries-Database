[[commentary]]
quote='''
For both this man hath sinned and his parents, but his blindness proceedeth not from that. And this He said, not signifying that though this man indeed was not in such case, yet that others had been made blind from such a cause, the sins of their parents, since it cannot be that when one sinneth another should be punished. For if we allow this, we must also allow that he sinned before his birth. As therefore when He declared, "neither hath this man sinned," He said not that it is possible to sin from one's very birth, and be punished for it; so when He said, "nor his parents," He said not that one may be punished for his parents' sake. This supposition He removeth by the mouth of Ezekiel; "As I live saith the Lord, this proverb shall not be, that is used, The fathers have eaten sour grapes, and the children's teeth are set on edge." And Moses saith, "The father shall not die for the child, neither shall the child die for the father."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252056.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 56"
