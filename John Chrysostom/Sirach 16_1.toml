[[commentary]]
quote='''
"Desire not a multitude of unprofitable children." Such bring more blasphemy against God, than if they were not Christians. What need have I of a multitude? It is only more food for the fire. This one might see even in the body, that better is moderate food with health, than a fatted calf with damage. This is more food than the other: this is food, but that is disease. This too one may see in war: that better are ten expert and brave men, than ten thousand of no experience. These latter, besides that they do no work, hinder also those that do work. The same too one may see to be the case in a ship, viz. that better are two experienced mariners, than ever so great a number of unskilful ones: for these will sink the ship.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252024.html'
source_title='Homily on Acts 24'
