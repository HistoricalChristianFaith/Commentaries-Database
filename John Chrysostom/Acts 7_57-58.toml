[[commentary]]
quote='''
Just what they did in Christ's case, the same they do here also. For as He said, "Ye shall see the Son of Man sitting on the right hand of God" (Matt. xxvi. 64), and they, calling it blasphemy, "ran upon Him;" just so was it here. There, they "rent their garments;" here, they "stopped their ears." ... And yet, if he lied, they ought to have thought him beside himself, and to have let him go.-But he wished to bring them over, "and said, Behold," etc., for, since he had spoken of Christ's death, and had said nothing of His resurrection, he would fain add this doctrine also. "Standing at the right hand of God." And in this manner He appeared to him: that, were it but so, the Jews might receive Him: for since the (idea of His) sitting (at the right hand of God) was offensive to them, for the present he brings forward only what relates to His Resurrection. This is the reason also why his face was glorified. For God, being merciful, desired to make their machinations the means of recalling them unto Himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252018.html'
source_title="Homily on Acts 18"

[[commentary]]
quote='''
And see, how many signs are wrought! "And cast him out of the city, and stoned him." Here again, "without the city," and even in death, Confession and Preaching. "And the witnesses laid down their clothes at a young man's feet, whose name was Saul." Observe how particularly he relates what concerns Paul, to show thee that the Power which wrought in him was of God. But after all these things, not only did he not believe, but also aimed at Him with a thousand hands: for this is why it says, "And Saul was consenting unto his death."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252018.html'
source_title="Homily on Acts 18"
