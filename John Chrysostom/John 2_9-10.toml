[[commentary]]
quote='''
(Hom. xxii. 2, 3) Our Lord wished the power of His miracles to be seen gradually; and therefore He did not reveal what He had done Himself, nor did the ruler of the feast call upon the servants to do so; (for no credit would have been given to such testimony concerning a mere man, as our Lord was supposed to be,) but He called the bridegroom, who was best able to see what was done. Christ moreover did not only make wine, but the best wine. And (the ruler of the feast) saith unto him, Every man at the beginning doth set forth good wine, and when men have well drunk, then that which is worse; but thou hast kept the good wine until now. The effects of the miracles of Christ are more beautiful and better than the productions of nature. So then that the water was made wine, the servants could testify; that it was made good wine, the ruler of the feast and the bridegroom. It is probable that the bridegroom made some answer; but the Evangelist omits it, only mentioning what it was necessary for us to know, viz. the water being made wine.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Thus when he was about to heal the nobleman's son, the Evangelist has shown that it had already become more clearly known; for it was chiefly because the nobleman had become acquainted with the miracle that he called upon Him, as John incidentally shows when he says, "Jesus came into Cana of Galilee, where He made the water wine." (c. iv. 46.) And not wine simply, but the best wine.

For such are the miraculous works of Christ, they are far more perfect and better than the operations of nature. This is seen also in other instances; when He restored any infirm member of the body, He made it better than the sound.

That it was wine then, and the best of wine, that had been made, not the servants only, but the bridegroom and the ruler of the feast would testify; and that it was made by Christ, those who drew the water; so that although the miracle were not then revealed, yet it could not in the end be passed in silence, so many and constraining testimonies had He provided for the future. That He had made the water wine, He had the servants for witnesses; that the wine was good that had been made, the ruler of the feast and the bridegroom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252022.html'
source_title='Homily on the Gospel of John 22'
