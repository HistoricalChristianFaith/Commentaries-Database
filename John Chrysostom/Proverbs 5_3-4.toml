[[commentary]]
quote='''
Therefore one gives this admonition; "Observe not the beauty of a strange woman, and meet not a woman addicted to fornication. For honey distils from the lips of an harlot, which at the time may seem smooth to thy throat, but afterward thou wilt find it more bitter than gall, and sharper than a two-edged sword." For the harlot knows not how to love, but only to ensnare; her kiss hath poison, and her mouth a pernicious drug. And if this does not immediately appear, it is the more necessary to avoid her on that account, because she veils that destruction, and keeps that death concealed, and suffers it not to become manifest at the first. So that if any one pursues pleasure, and a life full of gladness, let him avoid the society of fornicating women, for they fill the minds of their lovers with a thousand conflicts and tumults, setting in motion against them continual strifes and contentions, by means of their words, and all their actions. And just as it is with those who are the most virulent enemies, so the object of their actions and schemes is to plunge their lovers into shame and poverty, and the worst extremities. And in the same manner as hunters, when they have spread out their nets, endeavour to drive thither the wild animals, in order that they may put them to death, so also is it with these women. When they have spread out on every side the wings of lasciviousness by means of the eyes, and dress, and language, they afterwards drive in their lovers, and bind them; nor do they give over until they have drunk up their blood, insulting them at last, and mocking their folly, and pouring over them a flood of ridicule.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252014.html'
source_title="HOMILIES CONCERNING THE STATUES 14:10"
