[[commentary]]
quote='''
For, if "those delivered it unto us, who from the beginning were eyewitnesses and ministers of the word;" then, what he says, is theirs. And why did he not say, `As they who were counted worthy of the Holy Spirit delivered them unto us;' but "Those who were eyewitnesses?" Because, in matter of belief, the very thing that gives one a right to be believed, is the having learned from eyewitnesses: whereas the other appears to foolish persons mere parade and pretension. And therefore John also speaks thus: "I saw, and bare record that this is the Son of God." And Christ expresses Himself in the same way to Nicodemus, while he was dull of apprehension, "We speak that we do know, and testify that we have seen; and no one receiveth our witness." Accordingly, He gave them leave to rest their testimony in many particulars on the fact of their having seen them, when He said, "And do ye bear witness concerning Me, because ye have been with Me from the beginning." The Apostles themselves also often speak in a similar manner; "We are witnesses, and the Holy Spirit which God hath given to those that obey Him."; and on a subsequent occasion, Peter, still giving assurance of the Resurrection, said, "Seeing we did eat and drink with Him." For they more readily received the testimony of persons who had been His companions, because the notion of the Spirit was as yet very much beyond them. Therefore John also at that time, in his Gospel, speaking of the blood and water, said, he himself saw it, making the fact of his having seen it equivalent, for them, to the highest testimony, although the witness of the Spirit is more certain than the evidence of sight, but not so with unbelievers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%25201.html'
source_title="Homily on the Acts of the Apostles 1"
