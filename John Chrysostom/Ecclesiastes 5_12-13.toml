[[commentary]]
quote='''
The same thing happens as every one may perceive with regard to sleep. For not a soft couch, nor a bedstead overlaid with silver, nor the quietness that exists throughout the house, nor anything else of this kind, are so generally wont to make sleep sweet and pleasant, as labour and fatigue, and the need of sleep, and drowsiness when one lies down. And to this particular the experience of facts, nay, before actual experience, the assertion of the Scriptures bears witness. For Solomon, who had passed his life in luxury, when he wished to make this matter evident, said, "The sleep of a labouring man is sweet, whether he eat little or much?" Why does he add, "whether he eat little or much?" Both these things usually bring sleeplessness, viz. indigence, and excess of food; the one drying up the body, stiffening the eyelids and not suffering them to be closed; the other straitening and oppressing the breath, and inducing many pains. But at the same time so powerful a persuasive is labour, that though both these things should befall him, the servant is able to sleep. For since throughout the whole day, they are running about everywhere, ministering to their masters, being knocked about and hard pressed, and having but little time to take breath, they receive a sufficient recompense for their toils and labours in the pleasure of sleeping. And thus it hath happened through the goodness of God toward man, that these pleasures are not to be purchased with gold and silver, but with labour, with hard toil, with necessity, and every kind of discipline. Not so the rich. On the contrary, whilst lying on their beds, they are frequently without sleep through the whole night; and though they devise many schemes, they do not obtain such pleasure. But the poor man when released from his daily labours, having his limbs completely tired, falls almost before he can lie down into a slumber that is sound, and sweet, and genuine, enjoying this reward, which is not a small one, of his fair day's toils. Since therefore the poor man sleeps, and drinks, and eats with more pleasure than the rich man, what further value is left to riches, now deprived of the one advantage they seemed to have over poverty?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25202.html'
source_title="Homilies Concerning the Statues, Homily 2"
