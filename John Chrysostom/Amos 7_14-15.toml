[[commentary]]
quote='''
Amos also said, "I was no prophet, nor the son of a prophet, but only a herdsman, a gatherer of sycamore fruit. And God took me." But he did not say this to exalt himself, but to stop their mouths that suspected him as no prophet, and to show that he is no deceiver, nor says of his own mind the things which he says.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%252024.html'
source_title="Homily 24 on 2 Corinthians"
