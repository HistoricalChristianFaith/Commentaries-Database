[[commentary]]
quote='''
All which things the prophet Isaiah foretold, thus proclaiming beforehand, and by one word intimating all this insolence. For "like as many were astonished at thee," he saith, "so shall thy form be held inglorious of men, and thy glory of the sons of men." For what could be equal to this insolence? On that face which the sea, when it saw it, had reverenced, from which the sun, when it beheld it on the cross, turned away his rays, they did spit, and struck it with the palms of their hands, and some upon the head; giving full swing in every way to their own madness. For indeed they inflicted the blows that are most insulting of all, buffeting, smiting with the palms of their hands, and to these blows adding the insult of spitting at Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252085.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 85:1"
