[[commentary]]
quote='''
For our Lord Jesus Christ came, not only that we might behold His glory here, but also that which shall be. For therefore He saith, "I will that these also be with Me where I am, that they may behold My glory." Now if the glory here was so bright and splendid, what can one say of that which shall be? for it shall appear not on this corruptible earth, nor while we are in perishable bodies, but in a creation which is imperishable, and waxes not old, and with such brightness as it is not possible even to represent in words. O blessed, thrice blessed, yea many times so, they who are deemed worthy to be beholders of that glory! It is concerning this that the prophet says, "Let the unrighteous be taken away, that he behold not the glory of the Lord." God grant that not one of us be taken away nor excluded ever from beholding it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252012.html'
source_title="HOMILIES ON JOHN 12"
