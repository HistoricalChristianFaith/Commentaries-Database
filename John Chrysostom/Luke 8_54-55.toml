[[commentary]]
quote='''
(ubi sup.) But that He might by sight dispose to the belief of the resurrection, He takes the hand of the maid. As it follows, But he took her by the hand, and called, saying, Maid, arise. And when He had taken her by the hand, He awoke her. As it follows, And her spirit returned, and she arose straightway. For He poured not into her another soul, but restored the same which she had breathed forth. Nor does he only awake the maid, but orders her to take food. For it follows, And he commanded to give her meat. That it might not seem like a vision what was done. Nor did He Himself give to her, but He commanded others to do it. As also He said in the case of Lazarus, Loose him. (John 11:44.) And afterwards He made him partake of meat with Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
