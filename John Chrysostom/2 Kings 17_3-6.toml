[[commentary]]
quote='''
And it may be worth while to relate from what sources the Samaritans were made up; since all this country is called Samaria. Whence then did they receive their name? The mountain was called "Somor" from its owner, as also Esaias saith, "and the head of Ephraim is Somoron;" but the inhabitants were termed not "Samaritans" but "Israelites." But as time went on, they offended God, and in the reign of Pekah, Tiglath-Pileser came up, and took many cities, and set upon Elah, and having slain him, gave the kingdom to Hoshea. Against him Shalmaneser came and took other cities, and made them subject and tributary. At first he yielded, but afterwards he revolted from the Assyrian rule, and betook himself to the alliance of the Ethiopians. The Assyrian learnt this, and having made war upon them and destroyed their cities, he no longer allowed the nation to remain there, because he had such suspicions that they would revolt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252031.html'
source_title="Homily 31 on John"
