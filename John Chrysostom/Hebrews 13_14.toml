[[commentary]]
quote='''
"Let us go forth therefore to Him without the camp, bearing His reproach," that is, suffering the same things; having communion with Him in His sufferings. He was crucified without as a condemned person: neither let us then be ashamed to "go forth out" of the world. "For we have here no continuing city" (he says) "but we seek one to come."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252033.html'
source_title="Homily on Hebrews 33"
