[[commentary]]
quote='''
"Having therefore received it, He saith, It is finished." Seest thou how He doth all things calmly, and with power? And what follows shows this. For when all had been completed, "He bowed His head, (this had not been nailed,) and gave up the ghost." That is, "died." Yet to expire does not come after the bowing the head; but here, on the contrary, it doth. For He did not, when He had expired, bow His head, as happens with us, but when He had bent His head, then He expired. By all which things the Evangelist hath shown, that He was Lord of all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252085.html'
source_title='Homily on the Gospel of John 85'
