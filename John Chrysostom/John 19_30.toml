[[commentary]]
quote='''
(Hom. lxxxv) He did not bow His head because He gave up the ghost, but He gave up the ghost because at that moment He bowed His head. Whereby the Evangelist intimates that He was Lord of all.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
