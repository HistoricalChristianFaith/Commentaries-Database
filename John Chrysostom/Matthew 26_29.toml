[[commentary]]
quote='''
Then, when He had delivered it, He saith, "I will not drink of the fruit of this wine, until that day when I drink it new with you in my Father's kingdom." For because He had discoursed with them concerning passion and cross, He again introduces what He has to say of His resurrection, having made mention of a kingdom before them, and so calling His own resurrection.

And wherefore did He drink after He was risen again? Lest the grosser sort might suppose the resurrection was an appearance. For the common sort made this an infallible test of His having risen again. Wherefore also the apostles also persuading them concerning the resurrection say this, "We who did eat and drink with Him."

To show therefore that they should see Him manifestly risen, again, and that He should be with them once more, and that they themselves shall be witnesses to the things that are done, both by sight, and by act, He saith, "Until I drink it new with you," you bearing witness. For you shall see me risen again.

But what is "new." In a new, that is, a strange manner, not having a passible body, but now immortal and incorruptible, and not needing food.

It was not then for want that He both ate and drank after the resurrection, for neither did His body need these things any more, but for the full assurance of His resurrection.

And wherefore did He not drink water after He was risen again, but wine. To pluck up by the roots another wicked heresy. For since there are certain who use water in the mysteries; to show that both when He delivered the mysteries He had given wine, and that when He had risen and was setting before them a mere meal without mysteries, He used wine, "of the fruit," He saith, "of the vine." But a vine produces wine, not water.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252082.html'
source_title='Homily on the Gospel of Matthew 82'

[[commentary]]
quote='''
And having spoken of His Passion and Cross, He proceeds to speak of His resurrection, I say unto you, I will not drink henceforth, &c. By the kingdom He means His resurrection. And He speaks this of His resurrection, because He would then drink with the Apostles, that none might suppose His resurrection a phantasy. Thus when they would convince any of His resurrection, they said, We did eat and drink with him after he rose from the dead. (Acts 10:41.) This tells them that they shall see Him after He is risen, and that He will be again with them. That He says, New, is plainly to be understood, after a new manner, He no longer having a passible body, or needing food. For after His resurrection He did not eat as needing food, but to evidence the reality of the resurrection. And forasmuch as there are some heretics who use water instead of wine in the sacred mysteriesn, He shows in these words, that when He now gave them these holy mysteries, He gave them wine, and drank the like after He was risen; for He says, Of this fruit of the vine, but the vine produces wine, and not water.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"
