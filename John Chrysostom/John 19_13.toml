[[commentary]]
quote='''
(Hom. lxxxiv. 2) He went out to examine into the matter: his sitting down on the judgment seat shows this.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
But O what shamelessness and ill-time cowardice! For Pilate, deeming that he should now incur some danger were he to overlook these words, comes forth as though to enquire into the matter, (for the "sitting down" showed this,) but without making any enquiry, he gave Him up to them, thinking to shame them. For to prove that he did it for this purpose, hear what he saith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252084.html'
source_title='Homily on the Gospel of John 84'
