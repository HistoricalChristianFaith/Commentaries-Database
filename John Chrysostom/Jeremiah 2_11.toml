[[commentary]]
quote='''
For since you are not persuaded out of the Scriptures, I am compelled to shame you by them that are without. This God also did unto the Jews, when He said, "Go ye forth unto the Isles of Chittim, and send unto Kedar, and know if nations will change their gods; which yet are no gods." And to the brutes likewise He sends us oftentimes, saying on this wise, "Go to the ant, thou sluggard, and emulate her ways:" and "go forth to the bee."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252017.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 17:6"


[[commentary]]
quote='''
And what wonder? for He permitted opinions erroneous, and unworthy of Himself, to prevail, as that He was a body formerly, and that He was visible. In opposition to which He says, "God is a Spirit." Again, that He delighted in sacrifices, which is far from His nature. And He utters words at variance with His declarations of Himself, and many such things. For He nowhere considers His own dignity, but always what will be profitable to us. And if a father considers not his own dignity, but talks lispingly with his children, and calls their meat and drink not by their Greek names, but by some childish and barbarous words, much more doth God. Even in reproving He condescends, as when He speaks by the prophet, "Hath a nation changed their gods?", and in every part of Scripture there are instances of His condescension both in words and actions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Titus%2FHomily%25203.html'
source_title="HOMILIES ON TITUS 3"
