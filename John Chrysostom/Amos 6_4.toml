[[commentary]]
quote='''
Let us not be careless, dearly beloved, in dealing with matters concerning our salvation; recognizing instead the troubles that could come from that evil source, let us avoid the harm it produces. After all, we are warned against intemperance not only in the new dispensation by its greater attention to right thinking, its more frequent struggles and greater effort, its many rewards and ineffable consolations. Not even people living under the old law were permitted to indulge themselves in that way, even though they were sitting in the dark dependent upon tapers and were brought forward gradually into the light, like children being weaned off milk. Lest you think I am idly finding fault with intemperance in what I say, listen to what the prophet says: "Woe to those who fall on evil days in sleeping on beds of ivory, luxuriating on their couches, living on a diet of goats picked from the flocks and suckling calves from the herds, and drinking strained wines, anointed with precious unguents—like men treating this as a lasting city, and not seeking one to come." Do you see the heavy accusation the prophet levels against intemperance in charging the Jews with these faults of stupidity, sensuality and daily gluttony? I mean, note the accuracy of the words: after attacking their gluttony and their drinking to excess, he added, "like men treating this as a lasting city, and not seeking one to come," all but stating that their satisfaction got as far as lips and palate, and they went on to nothing better. Pleasure however, is brief and fleeting, whereas pain never lets up and has no end. The truth of this comes from experience, the true meaning of lasting realities—"like men treating this as a lasting city"—and fleeting things—"not seeking one to come"—that is, not lasting for a moment.
'''
source_url=''
source_title="HOMILIES ON GENESIS 1:10"


[[commentary]]
quote='''
Since therefore the Jews, separating themselves from worldly things, devoted not themselves to spiritual things, to temperance, and gentleness, and hearing the divine word, but did the very opposite, feasting, drinking, indulging in excess and luxury; on this account it is, that the prophet condemns them. For he says, "Woe to them that come to an evil day," and, in continuation, "that make a Sabbath of lies." He shows by that which follows how their Sabbath became unprofitable. How then did they make it unprofitable? By their working wickedness, living in luxury, drinking, and doing numberless other base and vile acts. And that this charge is true, hear what follows; for he intimates that which I am affirming, by that which he immediately adds, saying: "That lie upon beds of ivory, and stretch themselves upon their couches, and eat the lambs out of the flock, and the calves out of the midst of the stall; that drink refined wine, and anoint themselves with the chief ointments," (Amos vi. 4, 6.)

Thou didst receive the Sabbath that thou mightest purify thy soul from wickedness; but thou hast increased wickedness. For what can be worse than this effeminacy—this "sleeping upon beds of ivory?" The other sins, as drinking, covetousness, or prodigality, may be accompanied with some small amount of pleasure; but the sleeping on beds of ivory, what pleasure is there in it? Is more refreshing or sweeter sleep brought to us by the beauty of the couch? Nay, rather this beauty is more burdensome and more troublesome to us, if we reflect upon the matter. For whenever thou dost consider that while thou art sleeping on an ivory couch, another fellow-creature is not even able to enjoy the certainty of having bread to eat, will not conscience condemn thee and rise up to accuse this wrong?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FFour%2520Discourses%252C%2520chiefly%2520on%2520the%2520parable%2520of%2520the%2520rich%2520man%2520and%2520Lazarus%2FDiscourse%25201.html'
source_title="Four Discourses on the Rich Man and Lazarus, Discourse 1"
