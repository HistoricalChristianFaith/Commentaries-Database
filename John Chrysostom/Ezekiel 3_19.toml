[[commentary]]
quote='''
For even though the soil which we cultivate bring forth no fruit, if we have shown all industry, the Lord of it and of us will not suffer us to depart with disappointed hopes, but will give us a recompense; for, says St. Paul, "Every man shall receive his own reward according to his own labor," not according to the event of things. And that it is so, hearken: "And Thou," he saith, "Son of man, testify unto this people, if they will hear, and if they will understand." And Ezekiel says, "If the watchman give warning what it behooves to flee from, and what to choose, he hath delivered his own soul, although there be none that will take heed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252013.html'
source_title="Homily on the Gospel of John 13"
