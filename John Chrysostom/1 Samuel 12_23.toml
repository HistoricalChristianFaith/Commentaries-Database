[[commentary]]
quote='''
Wherefore also to Peter Christ saith, "If thou lovest Me, feed My sheep." For he who loveth Christ loveth also His flock. And Moses too did He then set over the people of the Jews, when he had shown a kindly feeling towards them. And David in this way came to be king, having been first seen to be affectionately-minded towards them; so much indeed, though yet young, did he grieve for the people, as to risk his life for them, when he killed that barbarian.… And Samuel too was very affectionate; whence it was that he said, "But God forbid that I should sin in ceasing to pray unto the Lord for you." In like way Paul also, or rather not in like way, but even in a far greater degree, burned towards all his subjects.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252029.html'
source_title="HOMILIES ON ROMANS 29"


[[commentary]]
quote='''
What did Samuel profit Saul? Did he not mourn for him even to his last day, and not merely pray for him only? What did he profit the Israelites? Did he not say, "God forbid that I should sin in ceasing to pray for you"? Did they not all perish? Do prayers then, you say, profit nothing? They profit even greatly: but it is when we also do something. For prayers indeed coöperate and assist, but a man coöperates with one that is operating, and assists one that is himself also working. But if thou remainest idle, thou wilt receive no great benefit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Thessalonians%2FHomily%25201.html'
source_title="HOMILIES ON 1 THESSALONIANS 1"
