[[commentary]]
quote='''
"For yourselves know how ye ought to imitate us: for we behaved not ourselves disorderly among you; neither did we eat bread for nought at any man's hand."

And yet even if they had eaten, it would not have been for nought. "For the laborer," he says, "is worthy of his hire." (Luke x. 7.)

"But in labor and travail, working night and day, that we might not burden any of you. Not because we have not the right, but to make ourselves an ensample unto you that ye should imitate us."

...For if Paul, not being under a necessity, and having a right to be idle, and having undertaken so great a work, did nevertheless work, and not merely work, but "night and day," so that he was able even to assist others, much more ought others to do this.

...Great is the confidence of the Teacher, when from his own good actions he is entitled to reprove his disciples. Wherefore also Paul said, "For yourselves know how ye ought to imitate us." (2 Thess. iii. 7.) And he ought to be a Teacher more of life than of the word. And let no one think that this is said from a spirit of boasting. For it was as reduced to necessity that he spoke it, and with a view to general advantage. "For we behaved not ourselves," he says, "disorderly among you." From this do you not see his humility, in that he calls it "for nought," and "disorderly behavior"? "We did not behave ourselves disorderly among you," he says, "neither did we eat any man's bread for nought." Here he shows that perhaps also they were poor; and tell me not, that they were poor. For he is discoursing concerning the poor, and those who obtained their necessary subsistence from no other source than from the work of their hands. For he has not said, that they may have it from their fathers, but that by working they should eat their own bread. For if I, he says, a herald of the word of doctrine, was afraid to burden you, much more he who does you no service. For this is truly a burden. And it is a burden too, when one does not give with much alacrity; but this is not what he hints at, but as if they were not able to do it easily. For why dost thou not work? For God hath given thee hands for this purpose, not that thou shouldest receive from others, but that thou shouldest impart to others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Thessalonians%2FHomily%25205.html'
source_title="Homily on 2 Thessalonians 5"
