[[commentary]]
quote='''
The enemy prepares the theatre, and he himself collects together the spectators, and prepares the lists; a theatre too, not of chance persons, or of some private individuals, but of all those who were honourable and in authority, to the end that their testimony may be worthy of credit with the multitude. They had come summoned for one thing; but they all departed having beheld another thing. They came in order to worship the image; and they departed, having derided the image, and struck with wonder at the power of God, through the signs which had taken place with respect to these young men. And observe, where the field for this display was spread out. No city, nor select enclosure furnished room for this theatre of the whole world, but smooth and naked plains. For in the plain of Dura, outside the city, he set up the image.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25204.html'
source_title="HOMILIES CONCERNING THE STATUES 4:8"
