[[commentary]]
quote='''
Again, observe also the piety of the Children: they showed no indignation, no anger, no gain-saying, but they came forth. Had they regarded it as an act of vengeance that they had been thrown into the furnace, they would have been grieved against the man who had cast them in; as it is, there is nothing of the kind; but, as though they were going forth from Heaven itself, so went they forth. And what the Prophet says of the Sun, that "He is as a bridegroom coming forth out of his chamber," one would not go amiss in saying also of them. But though he goes forth thus, yet came they forth there more gloriously than he, for he indeed comes forth to enlighten the world with natural light, they to enlighten the world in a different way, I mean, spiritually. For because of them the king straightway issued a decree, containing these words, "It hath seemed good unto me to show the signs and wonders that the Most High God hath wrought toward me. How great are His signs! And how mighty are His wonders!" So that they went forth, shedding a yet more glorious radiance, beaming indeed in that region itself, but, what is more than all, capable, by means of the king's writings, of being diffused over the world and thus of dispelling the darkness which every where prevails.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25208.html'
source_title="HOMILIES ON EPHESIANS 8"
