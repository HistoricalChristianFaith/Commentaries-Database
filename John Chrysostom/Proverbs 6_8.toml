[[commentary]]
quote='''
For example; the ant is industrious, and performs a laborious task. By giving heed then, thou wilt receive the strongest admonition from this animal not to indulge in sloth, nor to shun labour and toil. Therefore also the Scripture has sent the sluggard to the ant, saying, "Go to the ant, thou sluggard, emulate his ways, and be wiser than he." Art thou unwilling, he means, to learn from the Scriptures, that it is good to labour, and that he who will not work, neither ought he to eat? learn it from the irrationals! Do thou then likewise receive from this animal the best exhortation to industry; and marvel at thy Lord, not only because He hath made heaven and the sun, but because He hath also made the ant. For although the animal be small, it affords much proof of the greatness of God's wisdom. Consider then how prudent the ant is, and consider how God hath implanted in so small a body, such an unceasing desire of working! But whilst from this animal thou learnest industry; take from the bee at once a lesson of neatness, industry, and social concord! For it is not more for herself than for us, that the bee labours, and toils every day; which is indeed a thing especially proper for a Christian; not to seek his own things, but the things of others. As then she traverses all the meadows that she may prepare a banquet for another, so also, O man, do thou likewise; and if thou hast accumulated wealth, expend it upon others; if thou hast the faculty of teaching, do not bury the talent, but bring it out publicly for the sake of those who need it! Or if thou hast any other advantage, become useful to those who require the benefit of thy labours! Seest thou not that for this reason, especially, the bee is more honoured than the other animals; not because she labours, but because she labours for others? For the spider also labours, and toils, and spreads out his fine textures over the walls, surpassing the utmost skill of woman; but the creature is without estimation, since his work is in no way profitable to us; such are they that labour and toil, but for themselves!
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252012.html'
source_title="HOMILIES CONCERNING THE STATUES 12:5"


[[commentary]]
quote='''
"Go to the bee." Run to the church and learn the works of light which are done in it, and how the church in holiness accomplishes what it does. See how sensible and chaste it represents itself before kings and private citizens alike. Both the rich and the poor respect its prescription for their own salvation—although it is certainly weak and despised in this world. But when the church puts its faith in Christ it is exalted. In Christ, in fact, there is a rich and luxurious banquet for the time which he has appointed. The church does not look so much at what is present but rather envisions plans for the future. It prepares supplies in the summer and stores a great crop at harvest. Notice, I say, how the bee is solicitous about the future. You also should enjoy security in this life, but be careful lest, with the coming of winter, your house may be found empty and deprived of food. Notice how the bee treats everyone equally: not only is it useful to kings but to private citizens as well. Its medicine cures both alike; it serves nature but does not look for reward. You also should imitate it by valuing not so much the person but the nature of the works done. And does the bee have any beauty in its body? Not at all! For this reason, in order that lazy people might not find excuses in their weakness, Solomon chose the weakest among animals so that he might take away from them any excuses. The bee is pleasing to everybody, even to those who have no means or properties. Every day in the fields and in the cities we hear everyone speak countless praise of this insect.
'''
source_url=''
source_title="COMMENTARY ON THE PROVERBS OF SOLOMON, FRAGMENT 6:8"
