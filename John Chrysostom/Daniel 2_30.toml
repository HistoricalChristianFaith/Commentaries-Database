[[commentary]]
quote='''
For nothing is so advantageous, and so likely to pacify the hearers, as to say nothing about one's self of an honorable nature, but, on the contrary, to obviate all surmise of wishing to do so. And, in truth, much more did they increase their glory by despising glory, and showing that what had just taken place was no human act, but a Divine work; and that it was their part to join with the beholders in admiration, rather than to receive it from them. Do you see how clear of all ambition he is, and how he repels the honor paid to him? In the same manner also did the ancient fathers; for instance, Daniel said, "Not for any wisdom that is in me." And again Joseph, "Do not interpretations belong to God?" And David, "When the lion and the bear came, in the name of the Lord I rent them with my hands." And so likewise here the Apostles, "Why look ye so earnestly on us, as though by our own power or holiness we had made this man to walk?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%25209.html'
source_title="Homily 9 on Acts"
