[[commentary]]
quote='''
There were, it is likely, in the time of our forefathers also, some who "weakened the hands of the people," and brought into practice that which is mentioned by Ezekiel,—or rather who did the works of the false prophets, who "profaned God among His people for handfuls of barley"; a thing, by the way, done methinks by some even at this day. When, for example, we say that he who calleth his brother a fool shall depart into hell-fire, others say, "What? Is he that calls his brother a fool to depart into hell-fire? Impossible," say they. And again, when we say that "the covetous man is an idolater," in this too again they make abatements, and say the expression is hyperbolical. And in this manner they underrate and explain away all the commandments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%252018.html'
source_title="HOMILIES ON EPHESIANS 18"
