[[commentary]]
quote='''
Do thou also, when about to perform any duty to God, look forward to manifold dangers, manifold punishments, manifold deaths; and be not surprised, nor be disturbed, if such things happen. For it is said, "My Son, if thou come to serve the Lord, prepare thy soul for temptation." For surely no one choosing to fight, expects to carry off the crown without wounds! And thou, therefore, who hast undertaken to wage a complete combat with the devil, think not to pursue a life without danger, and full of luxury! God hath not pledged to thee His recompense and His promise here; but everything that is splendid for thee in the future life! Be glad and rejoice then, if when thou hast thyself done any good action, thou receive the contrary, or if thou see another suffering this; inasmuch as this becomes to thee the source of a higher recompense! Do not be downcast: nor give up thy zeal, nor become the more torpid; but rather press onward with more eagerness; since even the Apostles, when they preached, although scourged, stoned, and constant inmates of the prisons, did not only after deliverance from dangers, but also in those very dangers, announce with greater forwardness the message of Truth. Paul is to be seen in prison, yea, even in chains, instructing and initiating: and moreover doing the very same in a court of justice, in shipwreck, in tempest, and in a thousand dangers. Do thou too imitate these saints, and cease not from good works, so long as thou art able; and although thou seest the devil thwarting thee ten thousand times, never fall back! Thou perchance, bearing with thee thy wealth, hast met with shipwreck; but Paul carrying the word, far more precious than all wealth, was going to Rome, and was wrecked; and sustained innumerable hardships. And this he himself signified, when he said, "Many times we desired to come unto you, but Satan hindered us." And God permitted it; thus revealing the more abundantly His power, and showing that the multitude of things which the devil did, or prevented from being done, neither lessened nor interrupted the preaching of the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25201.html'
source_title="Homilies Concerning the Statues, Homily 1"

[[commentary]]
quote='''
"Wherefore we would fain have come unto you, I Paul once and again, and Satan hindered us."

Which is the part of love; yet here he mentions no other necessity but "that we might see you."

What sayest thou? does Satan hinder? Yes, truly, for this was not the work of God. For in the Epistle to the Romans, he says this, that God hindered him (from Rom. xv. 22); and elsewhere Luke says, that "the Spirit" hindered them from going into Asia. (Acts xvi. 7) And in the Epistle to the Corinthians he says, that it is the work of the Spirit, but here only of Satan. But what hindrance of Satan is he speaking of? Some unexpected and violent temptations: for a plot, it says, being formed against him by the Jews, he was detained three months in Greece. But it is another thing to remain for the sake of the dispensation, and willingly. For there he says, "Wherefore having no more place in these parts" (Rom. xv. 23), and, "To spare you I forbare to come unto Corinth." (2 Cor. i. 23) But here nothing of this sort. But what? That "Satan hindered" him. "Even I Paul," he says, "both once and again." Observe, how ambitious he is, and what a display he makes, in his willingness to show that he loved them most of all. "I Paul," he says, instead of Although no others. For they indeed were only willing, but I even attempted it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Thessalonians%2FHomily%25203.html'
source_title="Homily on 1 Thessalonians 3"
