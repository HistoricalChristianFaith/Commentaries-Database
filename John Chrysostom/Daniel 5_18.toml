[[commentary]]
quote='''
And in the Old Testament also this may be found, in that grace hath oftentimes wrought upon unworthy persons, that it might do good to others.… And why marvel if He hath bestowed gifts on men that have believed on Him, though without life suitable to their faith, when even on those who have fallen from both these, He is unquestionably found working? For so Salaam was an alien both from faith and from a truly good life; nevertheless grace wrought on him for the service of other men. And Pharaoh too was of the same sort: yet for all that even to him He signified the things to come. And Nebuchadnezzar was very full of iniquity; yet to him again He revealed what was to follow after many generations. And again to the son of this last, though surpassing his father in iniquity, He signified the things to come, ordering a marvellous and great dispensation. Accordingly because then also the beginnings of the gospel were taking place, and it was requisite that the manifestation of its power should be abundant, many even of the unworthy used to receive gifts. Howbeit, from those miracles no gain accrued to them; rather they are the more punished.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252024.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 24:2"
