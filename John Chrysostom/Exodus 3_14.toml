[[commentary]]
quote='''
Wouldest thou learn also His eternity? Hear what Moses saith concerning the Father. When he asked what he was commanded to answer should the Jews enquire of him, "Who it was that had sent him," he heard these words: "Say, I AM hath sent me." Now the expression "I AM," is significative of Being ever, and Being without beginning, of Being really and absolutely.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252015.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 15"
