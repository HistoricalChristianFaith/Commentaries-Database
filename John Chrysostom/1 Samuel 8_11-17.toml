[[commentary]]
quote='''
And observe the wisdom of the prophet, or rather the loving kindness of God. For because he wished to turn them from [their design,] bringing together a number of grievous things he asserted them of their future king, as, for instance, that he would make their wives grind at the mill, the men shepherds and muleteers; for he went through all the service appertaining to the kingdom with minuteness. But when he saw that they would not be hindered by any of these things, but were incurably distempered; he thus both spareth them and composeth their king to gentleness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%252024.html'
source_title="Homily on 2 Corinthians 24"
