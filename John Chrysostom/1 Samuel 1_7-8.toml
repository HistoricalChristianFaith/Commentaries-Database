[[commentary]]
quote='''
Wouldest thou understand what watchfulness in prayer is? Go to Hannah, hearken to her very words, "Adonai Eloi Sabaoth." Nay, rather, hear what preceded those words; "they all rose up," says the history, "from the table," and she, forthwith, did not betake herself to sleep, nor to repose. Whence she appears to me even when she was sitting at the table to have partaken lightly, and not to have been made heavy with viands. Otherwise never could she have shed so many tears; for if we, when we are fasting and foodless, hardly pray thus, or rather never pray thus, much more would not she ever have prayed thus after a meal, unless even at the meal she had been as they that eat not. Let us be ashamed, us that are men, at the example of this woman; let us be ashamed, that are suing and gasping for a kingdom, at her, praying and weeping for a little child.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%252024.html'
source_title="HOMILIES ON EPHESIANS 24"
