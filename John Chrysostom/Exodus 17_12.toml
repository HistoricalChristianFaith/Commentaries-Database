[[commentary]]
quote='''
See how the type was "given by Moses," but the "Truth came by Jesus Christ." Again, when the Amalekites warred in Mount Sinai, the hands of Moses were supported, being stayed up by Aaron and Hur standing on either side of him; but when Christ came, He of Himself stretched forth His Hands upon the Cross. Hast thou observed how the type "was given," but "the Truth came"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252014.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 14"
