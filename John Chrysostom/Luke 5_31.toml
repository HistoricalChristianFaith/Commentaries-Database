[[commentary]]
quote='''
(ubi sup.) But our Lord refutes all their charges, showing, that so far from its being a fault to mix with sinners, it is but a part of His merciful design, as it follows, And Jesus answering said unto them, They that are whole need not a physician; in which He reminds them of their common infirmities, and shows them that they are of the number of the sick, but adds, He is the Physician.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
