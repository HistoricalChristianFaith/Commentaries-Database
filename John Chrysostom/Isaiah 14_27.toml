[[commentary]]
quote='''
They were ready to expose him [Joseph] to death, or to sorrow, or to slavery—to the uttermost ills. But the overruling God used the wickedness of the conspirators for the trial and approval of him who was sold and betrayed. In order that this result may not be thought to arise from any casual coincidence or accidental revolution of things, God, by means of the very men who opposed it, brought to pass the very result which they opposed, using His enemies for the approval of His servants, in order that you may learn, that what God has willed no one will hinder, and that none will turn aside His high hand; in order that whenever you are plotted against, you may not stumble or be downcast, but be enabled to know that the plot will result in good in the end, if only you bear your lot well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FFour%2520Discourses%252C%2520chiefly%2520on%2520the%2520parable%2520of%2520the%2520rich%2520man%2520and%2520Lazarus%2FDiscourse%25204.html'
source_title="Discourse 4 on Lazarus and the Rich Man"


[[commentary]]
quote='''
They did not realize that if human hands had put an end to those things, then human hands could get them back for them. But it was God who destroyed their city, and no human power could ever change what God had decreed. "For what God, the Holy One, has planned who shall dissipate? His hand is stretched out; who will turn it back?" What God has reared up and wishes to remain, no man can tear down. In the same way, what he has destroyed and wishes to stay destroyed, no man can rebuild.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FAgainst%2520the%2520Jews%2FHomily%25205.html'
source_title="Homily 5 Against the Jews"
