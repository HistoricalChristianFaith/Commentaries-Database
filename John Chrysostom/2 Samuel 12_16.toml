[[commentary]]
quote='''
And I say not this to overturn fasting, (God forbid!) but to exhort you that with fasting ye do that which is better than fasting, the abstaining from all evil. David also sinned. Let us see then how he too repented. Three days he sat on ashes. But this he did not for the sin's sake, but for the child's, being as yet stupefied with that affliction. But the sin by other means did he wipe away, by humbleness, contrition of heart, compunction of soul, by falling into the like no more, by remembering it always, by bearing thankfully every thing that befalls him, by sparing those that grieve him, by forbearing to requite those who conspire against him; yea, even preventing those who desire to do this. For instance, when Shimei was bespattering him with reproaches without number and the captain who was with him was greatly indignant, he said, "Let him curse me, for the Lord hath bidden him:" for he had a contrite and humbled heart, and it was this especially which wiped away his sins. For this is confession, this is repentance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%25204.html'
source_title="HOMILIES ON 2 CORINTHIANS 4.6"
