[[commentary]]
quote='''
Then, lest any one should allege poverty, He saith,

"Or whosoever shall give to drink unto one of these little ones a cup of cold water only in the name of a disciple, verily I say unto you, he shall in no wise lose his reward."

"Though a cup of cold water be thy gift, on which there is nothing laid out, even of this shall a reward be stored up for thee. For I do all things for the sake of you the receivers."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252035.html'
source_title='Homily on the Gospel of Matthew 35'

[[commentary]]
quote='''
But who now is like this? one may say. Therefore He added, "In the name of a disciple, and of a prophet, and of a righteous man;" to instruct thee that not for the worthiness of the visitor, but for the purpose of him that gives welcome, is His reward appointed. For though here He speak of prophets, and righteous men, and disciples, yet elsewhere He bids men receive the veriest outcasts, and punishes such as fail to do so. For, "Inasmuch as ye did it not to one of the least of these, ye did it not to me;" and the converse again He affirms with respect to the same persons.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252035.html'
source_title='Homily on the Gospel of Matthew 35'
