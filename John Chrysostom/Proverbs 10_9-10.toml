[[commentary]]
quote='''
Absalom was a treacherous man, and "stole all men's hearts." And observe how great was his treachery. "He went about," it saith, "and said, `Hast thou no judgment?'" wishing to conciliate every one to himself. But David was guileless. What then? Look at the end of them both, look, how full of utter madness was the former! For inasmuch as he looked solely to the hurt of his father, in all other things he was blinded. But not so David. For "he that walketh uprightly, walketh surely"; and reasonably; he is one that manages nothing over-subtilely, the man who devises no evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%252015.html'
source_title="Homilies on Ephesians 15"
