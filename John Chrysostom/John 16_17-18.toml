[[commentary]]
quote='''
(Hom. lxxix. 1) Either sorrow had confused their minds, or the obscurity of the words themselves prevented their understanding them, and made them appear contradictory. If we shall see Thee, they say, how goest Thou? If Thou goest, how shall we see Thee? What is this that He saith unto us, A little while? We cannot tell what He saith.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"If," saith one of them, "we shall see Thee, whither goest Thou? And if Thou goest, how shall we see Thee?" Therefore they say, "We cannot tell what He saith." That He was about to depart, they knew; but they knew not that He would shortly come to them. On which account He rebuketh them, because they did not understand His saying.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252079.html'
source_title='Homily on the Gospel of John 79'
