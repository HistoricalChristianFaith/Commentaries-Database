[[commentary]]
quote='''
Since then such is the power of the Spirit, let us live therein and be content therewith... being governed by His laws. For this is the force of the words "let us walk," that is, let us be content with the power of the Spirit, and seek no help from the Law. ...
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Galatians.html'
source_title="Homily on Galatians 5"
