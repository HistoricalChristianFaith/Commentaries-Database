[[commentary]]
quote='''
That no one may despair of himself, though hitherto he have been careless, that he may set his hopes on nothing else, after God's mercy, but on his own virtue. For if these were nothing the better for such a kindred, though they were of the same house and lineage with Christ, until they gave proof of virtue; what favor can we possibly receive, when we plead righteous kinsmen and brethren, unless we be exceeding dutiful, and have lived in virtue? As the prophet too said, intimating the selfsame thing, "A brother redeemeth not, shall a man redeem?"… Yea, if it be Ezekiel who entreats, he will be told, "Though Noah stand forth, and Job, and Daniel, they shall deliver neither sons nor daughters." Though the patriarch Abraham be supplicating for them that are most incurably diseased, and change not, God will leave him and go His way, that he may not receive his cry in their behalf.… For it is true, the prayers of the saints have the greatest power; on condition however of our repentance and amendment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25205.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 5:7"


[[commentary]]
quote='''
Considering then all these things, let us betake ourselves unto the preparation for our departure hence. For even if the common day of the consummation never overtake us, the end of each one is at the doors, whether he be old or young; and it is not possible for men after they have gone hence, either to buy oil any more, or to obtain pardon by prayers, though he that entreats be Abraham, or Noah, or Job, or Daniel. While then we have opportunity, let us store up for ourselves beforehand much confidence, let us gather oil in abundance, let us remove all into Heaven, that in the fitting time, and when we most need them, we may enjoy all: by the grace and love towards man of our Lord Jesus Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252020.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 20:6"
