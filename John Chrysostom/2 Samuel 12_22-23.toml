[[commentary]]
quote='''
King David loved his child, and sat indeed in sackcloth and ashes, but he neither brought soothsayers, nor enchanters, (although there were such then, as Saul shows,) but he made supplication to God. So do thou likewise: as that just man did, so do thou also; the same words say thou, when thy child is dead, "I shall go to him, but he will not come to me." This is true wisdom, this is affection. However much thou mayst love thy child, thou wilt not love so much as he did then. For even though his child were born of adultery, yet that blessed man's love of the mother was at its height, and ye know that the offspring shares the love of the parents. And so great was his love toward it, that he even wished it to live, though it would be his own accuser, but still he gave thanks to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Colossians%2FHomily%25208.html'
source_title="HOMILIES ON COLOSSIANS 8"
