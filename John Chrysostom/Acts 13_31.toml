[[commentary]]
quote='''
"And He was seen many days of them which came up with Him from Galilee to Jerusalem, who are His witnesses unto the people."

"Who appeared," he says, "for many days to them that came up with Him from Galilee to Jerusalem." Instead of which he says, "Who are His witnesses unto the people," to wit, "The men which came up with Him from Galilee to Jerusalem." Then he produces David and Isaiah bearing witness.

"Who are His witnesses," he says, "unto the people" - the people that slew Him. Who would never have been so, were they not strengthened by a Divine Power: for they would never have borne such witness to blood-thirsty men, to the very persons that killed Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252029.html'
source_title='Homily on Acts 29'
