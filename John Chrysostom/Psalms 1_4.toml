[[commentary]]
quote='''
Hear then how the prophet intimates both these particulars. "The ungodly," saith he, "are not so, but are like the chaff which the wind scattereth away from the face of the earth." For even as chaff lies exposed to the gusts of wind, and is easily caught up and swept along, so is also the sinner driven about by every temptation; for whilst he is at war with himself, and bears the warfare about with him, what hope of safety does he possess; betrayed as he is at home, and carrying with him that conscience, which is a constant enemy?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25208.html'
source_title="HOMILIES CONCERNING THE STATUES 8:4"
