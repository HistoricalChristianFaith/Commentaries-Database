[[commentary]]
quote='''
For He never makes a public display of our sins, except at any time He sees men insensible to them. For when He says "ye saw me hungry, and fed me not: and thirsty and gave me no drink," He speaks thus at the present time in order that we may not hear these words in time to come. He threatens, He exposes us in this world, that He may not have to expose us in the other: even as He threatened to overthrow the city of the Ninevites for the very reason that He might not overthrow it. For if He wished to publish our sins He would not announce beforehand that He would publish them: but as it is He does make this announcement in order that being sobered by the fear of exposure, if not also by the fear of punishment we may purge ourselves from them all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Paralytic%2520Let%2520Down%2520Through%2520the%2520Roof.html'
source_title="Homily on the Paralytic Let Down Through the Roof, 3"


[[commentary]]
quote='''
If you want, let us also hear this story: "Now the word of the Lord," it says, "came to Jonah, saying, 'Rise and go to Nineveh, the great city.' " He wanted to put Jonah to shame by sending him to the great city of Nineveh, because he foresaw the prophet's escape. However, let us also listen to the preaching: "Yet three days, and Nineveh shall be overthrown." Why do you, God, foretell the sufferings that you will inflict upon Nineveh? "So that I will not do what I announced." This is why God threatened with hell—so he would not lead anyone away to hell. He says, "Fear that which is spoken to you, and do not be saddened about what has been done." Why does he establish the appointed time to be only a period of three days? So that you may learn even the virtue of the barbarians—I call the Ninevites barbarians, who were able to annul in three days such anger caused by sin. I want you to marvel at the philanthropy of God, who was satisfied with three days of repentance for so many transgressions. I do not want you to sink into despair, even though you have innumerable sins.
'''
source_url=''
source_title="HOMILIES ON REPENTANCE AND ALMSGIVING 5:4"
