[[commentary]]
quote='''
Then say not thou either, "I am clothed with flesh, I cannot get the mastery, nor undertake the toils which are for the sake of virtue." Do not accuse the Creator. For if the wearing the flesh make virtue impossible, then the fault is not ours. But that it does not make it impossible, the band of saints has shown. A nature of flesh did not prevent Paul from becoming what he was, nor Peter from receiving the keys of heaven; and Enoch also, having worn flesh, was translated, and not found. So also Elias was caught up with the flesh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252075.html'
source_title="HOMILIES ON JOHN 75.5"
