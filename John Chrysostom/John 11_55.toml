[[commentary]]
quote='''
A marvelous purification, with a murderous will, with homicidal intentions, and bloodstained hands!
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252065.html'
source_title='Homily on the Gospel of John 65'
