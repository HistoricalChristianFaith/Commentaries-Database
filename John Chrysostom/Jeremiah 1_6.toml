[[commentary]]
quote='''
Therefore, you see, they had power either to speak or to refrain from speaking. For they were not bound by necessity, but were honored with a privilege. For this cause Jonah fled; for this cause Ezekiel delayed; for this cause Jeremiah excused himself. And God thrusts them not on by compulsion, but advising, exhorting, threatening; not darkening their mind; for to cause distraction and madness and great darkness, is the proper work of a demon: but it is God's work to illuminate and with consideration to teach things needful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252029.html'
source_title="HOMILIES ON 1 CORINTHIANS 29:2"
