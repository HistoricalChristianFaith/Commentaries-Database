[[commentary]]
quote='''
For this end he hath mentioned Ruth also and Rahab, the one an alien, the other an harlot, that thou mayest learn that He came to do away with all our ills. For He hath come as a Physician, not as a Judge. Therefore in like manner as those of old took harlots for wives, even so God too espoused unto Himself the nature which had played the harlot: and this also prophets from the beginning declare to have taken place with respect to the Synagogue. But that spouse was ungrateful towards Him who had been an husband to her, whereas, the Church, when once delivered from the evils received from our fathers, continued to embrace the Bridegroom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25203.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 3:5"


[[commentary]]
quote='''
And you will find the prophets filled with examples of this kind, when they address Jerusalem; for she fell into fornication, and a novel form of it, even as Ezekiel says: "To all harlots wages are given, but thou hast given wages to thy lovers, and there hath been perversion in thee beyond all other women," and again another saith "Thou didst sit waiting for them like a deserted bird." This one then who hath committed fornication in this fashion God calls back again. For the captivity which took place was not so much by way of vengeance as for the purpose of conversion and amendment since if God had wished to punish them out-right He would not again have brought them back to their home. He would not have established their city and their temple in greater splendour than before: "For the final glory of this house" He said "shall exceed the former." Now if God did not exclude from repentance her who had many times committed fornication, much more will He embrace my soul, which has now fallen for the first time. For certainly there is no lover of corporeal beauty, even if he be very frantic, who is so inflamed with the love of his mistress as God longs after the salvation of our souls; and this we may perceive both from the divine Scriptures. See at least, both in the introduction of Jeremiah, and many other places of the prophets, when He is despised and contemned, how He again hastens forward and pursues the friendship of those who turn away from him; which also He Himself made clear in the Gospels saying, "O Jerusalem! Jerusalem! thou that killest the prophets and stonest them that are sent unto thee, how often would I have gathered thy children together even as a hen gathereth her chickens under her wings, and ye would not?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FAn%2520Exhortation%2520to%2520Theodore%2520After%2520His%2520Fall%2FLetter%25201.html'
source_title="LETTER TO THE FALLEN THEODORE 1:13"
