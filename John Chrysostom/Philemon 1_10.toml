[[commentary]]
quote='''
And mark, on the other hand, the fervency of Paul also. Bound, scourged, thus he preached the Gospel. Oh, that blessed chain, with how great travail did it travail that night, what children did it bring forth! Yea of them too may he say, "Whom I have begotten in my bonds." Mark thou, how he glories, and will have the children thus begotten, to be on that account the more illustrious! Mark thou, how transcendant is the glory of those bonds, in that they give lustre not only to him that wore them, but also to them who were on that occasion begotten by him. They have some advantage, who were begotten in Paul's bonds, I say not in respect of grace, (for grace is one and the same,) nor in respect of remission, (for remission is one and the same to all,) but in that they are thus from the very outset taught to rejoice and to glory in such things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25208.html'
source_title="Homilies on Ephesians 8"

[[commentary]]
quote='''
Again the chains are mentioned to shame him into compliance, and then the name. For he has not only extinguished his anger, but has caused him to be delighted. For I would not have called him my son, he says, if he were not especially profitable. What I called Timothy, that I call him also. And repeatedly showing his affection, he urges him by the very period of his new birth, "I have begotten him in my bonds," he says, so that on this account also he was worthy to obtain much honor, because he was begotten in his very conflicts, in his trials in the cause of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Philemon%2FHomily%25202.html'
source_title="Homily on Philemon 2"
