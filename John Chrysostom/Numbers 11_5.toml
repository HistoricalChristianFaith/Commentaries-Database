[[commentary]]
quote='''
'Successes' have terrible power to cast down or draw aside those who take not heed. Thus the Jews, who at first enjoyed the influence of God, sought the law of royalty from the Gentiles, and in the wilderness after the manna remembered the onions. In the same way here, refusing the Kingdom of Christ, they invited to themselves that of Caesar.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252085.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 85"
