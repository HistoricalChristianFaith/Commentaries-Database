[[commentary]]
quote='''
And what sort of connexion may this have with what was said before? Much, assuredly, and in full accordance therewith. Yea, by this topic also He proceeds to urge and press them into the faith of Himself; and at the same time likewise, He is speaking in agreement with what had been before said by John. "For if all things are fulfilled even down to John, I am "He that should come." For all the prophets," saith He, "and the law prophesied until John." For the prophets would not have ceased, unless I were come. Expect therefore nothing further, neither wait for any one else. For that I am He is manifest both from the prophets ceasing, and from those that every day "take by force" the faith that is in me. For so manifest is it and certain, that many even take it by force. Why, who hath so taken it? tell me. All who approach it with earnestness of mind.
Then He states also another infallible sign, saying, "If ye will receive it, he is Elias, which was for to come." For "I will send you," it is said, "Elias the Tishbite, who shall turn the heart of the father to the children." This man then is Elias, if ye attend exactly, saith He. For "I will send," saith He, "my messenger before Thy face." And well hath He said, "If ye will receive it," to show the absence of force. For I do not constrain, saith He. And this He said, as requiring a candid mind, and showing that John is Elias, and Elias John. For both of them received one ministry, and both of them became forerunners. Wherefore neither did He simply say, "This is Elias," but, "If ye are willing to receive it, this is he," that is, if with a candid mind ye give heed to what is going on. And He did not stop even at this, but to the words, "This is Elias, which was for to come," He added, to show that understanding is needed, "He that hath ears to hear, let him hear."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252037.html'
source_title="Homily on the Gospel of Matthew 37"
