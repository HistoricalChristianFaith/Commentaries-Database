[[commentary]]
quote='''
"And having taken him, they brought him to the Areopagus" - not to punish, but in order to learn - "to the Areopagus" where the trials for murder were held. Thus observe, in hope of learning they ask him, saying, "May we know what is this new doctrine spoken of by thee? For thou bringest certain strange matters to our ears": everywhere novelty is the charge: "we would fain know therefore, what these things may mean."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252038.html'
source_title='Homily on Acts 38'
