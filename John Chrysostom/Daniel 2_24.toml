[[commentary]]
quote='''
Let us not then be looking open-mouthed towards others. For it is true, the prayers of the saints have the greatest power; on condition however of our repentance and amendment. Since even Moses, who had rescued his own brother and six hundred thousand men from the wrath that was then coming upon them from God, had no power to deliver his sister.… And Samuel again was not able to save Saul from the wrath from above, yet he oftentimes preserved the Israelites. And Jeremiah prevailed not for the Jews, but some one else he did haply cover from evil by his prophecy. And Daniel saved the barbarians from slaughter, but he did not deliver the Jews from their captivity.… So that on the one hand, if we be careless, we shall not be able to obtain salvation, no not even by the help of others; if, on the other hand, we be watchful, we shall be able to do this by ourselves, and by ourselves rather than by others. Yes; for God is more willing to give His grace to us, than to others for us; that we by endeavoring ourselves to do away His wrath, may both enjoy confidence towards Him, and become better men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25205.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 5:7"
