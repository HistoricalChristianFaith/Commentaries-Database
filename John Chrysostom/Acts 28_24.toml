[[commentary]]
quote='''
"And some believed the things which were spoken, and some believed not." They said not, we speak against it, but "it is spoken against."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252055.html'
source_title="Homily on Acts 55"

[[commentary]]
quote='''
See again how not by miracles but by Law and Prophets he puts them to silence, and how we always find him doing this. And yet he might also have wrought signs; but then it would no longer have been matter of faith. In fact, this itself was a great sign, his discoursing from the Law and the Prophets. Then that you may not deem it strange that they believed not, he introduces the prophecy which saith "Hearing ye shall hear and not understand," more now than then: "and ye shall see and not perceive" more now than then. This is not spoken for the former sort, but for the unbelievers. How then? Was it contrary to the prophecy, that those believed? "Go," it says, "unto this people," that is, to the unbelieving people. He did not say this to insult them, but to remove the offence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252055.html'
source_title="Homily on Acts 55"
