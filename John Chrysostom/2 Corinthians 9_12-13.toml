[[commentary]]
quote='''
What he says is this; 'in the first place ye not only supply the wants of the saints, but ye are abundant even;' that is, 'ye furnish them with even more than they need: next, through them ye send up thanksgiving to God, for they glorify Him for the obedience of your confession.' For that he may not represent them as giving thanks on this account solely, (I mean, because they received somewhat,) see how high-minded he makes them, exactly as he himself says to the Philippians, "Not that I desire a gift." (Philippians chapter 4, verse 17) 'To them too I bear record of the same thing. For they rejoice indeed that ye supply their wants and alleviate their poverty; but far more, in that ye are so subjected to the Gospel; whereof this is an evidence, your contributing so largely.' For this the Gospel enjoins.

"And for the liberality of your contribution unto them and unto all." 'And on this account,' he says, 'they glorify God that ye are so liberal, not unto them only, but also unto all.' And this again is made a praise unto them that they gave thanks even for that which is bestowed upon others. 'For,' saith he, 'they do honor, not to their own concerns only, but also to those of others, and this although they are in the extremest poverty; which is an evidence of their great virtue. For nothing is so full of envy as the whole race of such as are in poverty. But they are pure from this passion; being so far from feeling pained because of the things ye impart to others, that they even rejoice over it no less than over the things themselves receive.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%252020.html'
source_title='Homily 20 on 2 Corinthians'
