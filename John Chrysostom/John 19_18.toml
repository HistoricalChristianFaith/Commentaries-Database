[[commentary]]
quote='''
(Hom. lxxxv. 1) They crucified Him with the thieves: And two others with Him, on either side one, and Jesus in the midst; thus fulfilling the prophecy, And He was numbered with the transgressors. (Isa. 53:12) What they did in wickedness, was a gain to the truth. The devil wished to obscure what was done, but could not. Though three were nailed on the cross, it was evident that Jesus alone did the miracles; and the arts of the devil were frustrated. Nay, they even added to His glory; for to convert a thief on the cross, and bring him into paradise, was no less a miracle than the rending of the rocks.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
What matter if the Jews did these things with a different intent. They crucified Him too with thieves, in this also unintentionally fulfilling prophecy; for what they did for insult contributed to the truth, that thou mayest learn how great is its power, since the Prophet had foretold of old, that "He was numbered with the transgressors." (Isa. liii. 12.) The devil therefore wished to cast a veil over what was done, but was unable; for the three were crucified, but Jesus alone was glorious, that thou mayest learn, that His power effected all. Yet the miracles took place when the three had been nailed to the cross; but no one attributed anything of what was done to either of those others, but to Jesus only; so entirely was the plot of the devil rendered vain, and all returned upon his own head. For even of these two, one was saved. He therefore did not insult the glory of the Cross, but contributed to it not a little. For it was not a less matter than shaking the rocks, to change a thief upon the cross, and to bring him unto Paradise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252085.html'
source_title='Homily on the Gospel of John 85'
