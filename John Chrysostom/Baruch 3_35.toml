[[commentary]]
quote='''
Wherefore not men only, but angels also and archangels; both the nations of heaven, and all we on the earth, are commanded to give praise. For, "Bless the Lord," it is said, "all His works." Yea, for His are no small achievements, rather they surpass all speech, and thought, and understanding of man. And these things the prophets proclaim every day, each of them in a different way publishing this glorious triumph. For one saith, "Thou hast gone up on high, Thou hast led captivity captive, and hast received gifts amongst men." And, "The Lord strong and mighty in battle." And another saith, "He shall divide the spoils of the strong." For indeed to this purpose He came, that He might "preach deliverance to captives, and recovery of sight to the blind." And raising aloud the cry of victory over death, he said, "Where, O Death, is thy victory? Where, O Grave, is thy sting?" And another again, declaring glad tidings of the most profound peace, said, "They shall beat their swords into ploughshares, and their spears into pruning hooks." And while one calls on Jerusalem, saying, "Rejoice greatly, O daughter of Sion, for lo! thy King cometh to thee meek, riding upon an ass, and a young colt;" another proclaims His second coming also, saying on this wise, "The Lord, whom ye seek, will come, and who will abide the day of His coming? Leap ye as calves set free from bonds." And another again, amazed at such things, said, "This is our God; there shall none other be accounted of in comparison of Him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252019.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 19:9"
