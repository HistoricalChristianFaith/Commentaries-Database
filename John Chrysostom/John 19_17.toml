[[commentary]]
quote='''
(Hom. lxxxv. 1) They compel Jesus to bear the cross, regarding it as unholy, and therefore avoiding the touch of it themselves. And He bearing His cross went forth into a place called the place of a skull, which is called in Hebrew Golgotha, where they crucified Him. The same was done typically by Isaac, who carried the wood. But then the matter only proceeded as far as his father's good pleasure ordered, but now it was fully accomplished, for the reality had appeared.

(Hom. lxxxv) He carried the badge of victory on His shoulders, as conquerors do. Some say that the place of Calvary was where Adam died and was buried; so that in the very place where death reigned, there Jesus erected His trophy.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
And now they laid the cross upon Him as a malefactor. For even the wood they abominated, and endured not even to touch it. This was also the case in the type; for Isaac bare the wood. But then the matter stopped at the will of his father, for it was the type; while here it proceeded to action, for it was the reality.

"And He came to the place of a skull." Some say that Adam died there, and there lieth; and that Jesus in this place where death had reigned, there also set up the trophy. For He went forth bearing the Cross as a trophy over the tyranny of death: and as conquerors do, so He bare upon His shoulders the symbol of victory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252085.html'
source_title='Homily on the Gospel of John 85'
