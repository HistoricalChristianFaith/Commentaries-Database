[[commentary]]
quote='''
"When the Son of Man shall come in His glory." For now is He come in dishonor, now in affronts and reproaches; but then shall He sit upon the throne of His glory.

And continually doth He make mention of glory. For since the cross was near, a thing that seemed to be matter of reproach, for this cause He raises up the hearer; and brings before his sight the judgment seat, and setteth round him all the world.

And not in this way only doth He make His discourse awful, but also by showing the Heavens opened. For all the angels will be present with Him, He saith, themselves also to bear witness, in how many things they had ministered, when sent by the Lord for the salvation of men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252079.html'
source_title='Homily on the Gospel of Matthew 79'

[[commentary]]
quote='''
(Hom. lxxix.) To this most sweet section of Scripture which we cease not continually to ponder, let us now listen with all attention and compunction of spirit, for Christ does indeed clothe this discourse with more terrors and vividness. He does not accordingly say of this as of the others, The kingdom of heaven is like, but shows of Himself by direct revelation, saying, When the Son of man shall come in his majesty.

For all his Angels shall be with him to bear witness to the things wherein they have administered to men's salvation at His bidding.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title="Catena Aurea by Aquinas"
