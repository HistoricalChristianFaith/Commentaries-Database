[[commentary]]
quote='''
(Hom. 63. in Matt.) These weighty words so far exceeded the capacity of the disciples, that when they heard them, they asked, Who then can be saved? not that they feared for themselves, but for the whole world.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'
