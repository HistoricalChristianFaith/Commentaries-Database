[[commentary]]
quote='''
(ubi sup.) But to cry, Prepare ye the way of the Lord, was not the office of the king, but of the forerunner. And so they called John the voice, because he was the forerunner of the Word.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
See, at least, how both the prophet and the Baptist go upon the same ideas, although not upon the same words. Thus the prophet saith that he shall come saying, "Prepare ye the way of the Lord, make his paths straight." And he himself when he was come said, "Bring forth fruits meet for repentance," which corresponds with, "Prepare ye the way of the Lord." Seest thou that both by the words of the prophet, and by his own preaching, this one thing is manifested alone; that he was come, making a way and preparing beforehand, not bestowing the gift, which was the remission, but ordering in good time the souls of such as should receive the God of all?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252010.html'
source_title="Homily on the Gospel of Matthew 10"
