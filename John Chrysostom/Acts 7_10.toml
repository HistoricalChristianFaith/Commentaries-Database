[[commentary]]
quote='''
"And God was with him"-this also is for them-"and delivered him out of all his afflictions." He shows that unknowingly they helped to fulfil the prophecy, and that they were themselves the cause, and that the evils recoiled on their own selves. "And gave him favor and wisdom in the sight of Pharaoh king of Egypt, Gave him favor," in the eyes of a barbarian, to him, the slave, the captive: his brethren sold him, this (barbarian) honored him.

Thus also him who was sold for a slave, makes He to reign as king there, where he was thought to be a slave. Thus also does Christ in His death give proof of His power: thus also does He there reign as king where they sold Him. "And gave him favor and wisdom," etc. This was not only by way of honor, but that he should have confidence in his own power. "And he made him governor over Egypt and all his house."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252016.html'
source_title="Homily on Acts 16"
