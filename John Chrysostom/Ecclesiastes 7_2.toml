[[commentary]]
quote='''
"It is better," we read, "to go into the house of mourning, than into the house of laughter." But, likely enough, you do not like the saying, and want to evade it. Let us however see, what sort of man Adam was in Paradise, and what he was afterwards: what sort of man Cain was before, and what he was afterwards. The soul does not stand fast in its proper place, but, like as by a running tide, is raised and buoyed up by pleasure, having no steadfastness; facile in making professions, prompt at promising; the thoughts all in restless commotion: laughter ill-timed, causeless hilarity, idle clatter of unmeaning talk. And why speak of others? Let us take in hand some one of the saints, and let us see what he was while in pleasure, what again, when in distress. Shall we look at David himself? When he was in pleasure and rejoicing, from his many trophies, from his victory, from his crowns, from his luxurious living, from his confidence, see what sort of things he said and did: "But I said in my prosperity," says he, "I shall never be moved." But when he has come to be in affliction, hear what he says: "And if He say to me, I have no mind for thee; lo! here am I, let Him do that which is pleasing in His sight." What can be more truly philosophic than these words? "Whatsoever may be pleasing to God," saith he, "so let it be." And again he said to Saul: "If the Lord stirreth thee up against me, may thy sacrifice be acceptable." And then too, being in affliction, he spared even his enemies: but afterwards, not friends even, nor those who had done him no injury.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252016.html'
source_title="Homilies on the Acts of the Apostles, Homily 16"
