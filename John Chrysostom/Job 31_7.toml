[[commentary]]
quote='''
“The Lord,” he says, “knows my innocence, if my foot has turned aside out of the way or if my heart has followed my eye.” Is this a further detail? Yes, truly, it was important at that time as well as now. It is important, in fact, to overturn inordinate desires, and it is not less important, after receiving those desires, not to satisfy them. And proceeding further, he states something that is even more important, that is, that not even his eyes have ever accepted anything of that kind.
'''
source_url=''
source_title="COMMENTARY ON JOB 31:6A-7"
