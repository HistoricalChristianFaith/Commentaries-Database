[[commentary]]
quote='''
(Hom. lvii. 2) The Jews, whom they asked, Where is He? were desirous of finding Him, in order to bring Him to the Pharisees; but, as they could not find Him, they bring the blind man. They brought to the Pharisees him that aforetime was blind; i. e. that they might examine him still more closely.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
