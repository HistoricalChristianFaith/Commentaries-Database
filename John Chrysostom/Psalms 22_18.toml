[[commentary]]
quote='''
The soldiers parted the garments, but not the coat. See the prophecies in every instance fulfilled by their wickednesses; for this also had been predicted of old; yet there were three crucified, but the matters of the prophecies were fulfilled in Him. For why did they not this in the case of the others, but in His case only? Consider too, I pray you, the exactness of the prophecy. For the Prophet saith not only, that they "parted," but that they "did not part." The rest therefore they divided, the coat they divided not, but committed the matter to a decision by lot.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252085.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 85"
