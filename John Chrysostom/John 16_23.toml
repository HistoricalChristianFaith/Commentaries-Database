[[commentary]]
quote='''
"And in that day ye shall ask Me nothing." Again He proveth nothing else by these words, but that He is from God. "For then ye shall for the time to come know all things." But what is, "Ye shall not ask Me"? "Ye shall need no intercessor, but it is sufficient that ye call on My Name, and so gain all things."

"Verily, verily, I say unto you, Whatsoever ye shall ask My Father in My Name."

He showeth the power of His Name, if at least being neither seen nor called upon, but only named, He even maketh us approved by the Father. But where hath this taken place? Where they say, "Lord, behold their threatenings, and grant unto Thy servants that with boldness they may speak Thy word" (Acts iv. 29, Acts iv. 31), "and work miracles in Thy Name." "And the place was shaken where they were."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252079.html'
source_title="Homily on the Gospel of John 79"
