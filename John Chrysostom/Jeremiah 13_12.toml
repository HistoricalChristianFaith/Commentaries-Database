[[commentary]]
quote='''
And these things He said, setting laws and rules for His own disciples, that when they should have to receive as disciples those of all sorts that should come from the whole world, they might deal with them very gently. "Neither do men put new wine into old bottles." Seest thou His illustrations, how like the Old Testament? the garment? the wine skins? For Jeremiah too calls the people "a girdle," and makes mention again of "bottles" and of "wine." Thus, the discourse being about gluttony and a table, He takes His illustrations from the same.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252030.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 30:5"
