[[commentary]]
quote='''
Then we wash our hands when we enter into church, but our hearts not so. Why, do our hands send forth a voice? It is the soul that utters the words: to that God looketh; cleanness of the body is of no use, while that is defiled. What profits it, if thou wipe clean thine outward hands, while thou hast those within impure? For the terrible thing and that which subverts all good is this, that while we are fearful about trifles, we care not for important matters. To pray with unwashed hands is a matter indifferent; but to do it with an unwashed mind, this is the extreme of all evils. Hear what was said to the Jews who busied themselves about such outward impurities. "Wash thine heart from wickedness, how long shall there be in thee thoughts of thy labors?" Let us also wash ourselves, not with mire, but with fair water, with alms-doing, not with covetousness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252073.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 73"
