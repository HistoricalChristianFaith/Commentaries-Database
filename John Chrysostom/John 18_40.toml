[[commentary]]
quote='''
Again when they insulted Him by offering Him gall and vinegar on the sponge how many think you were offended? or when the robbers reviled Him? or when as I have already said, they made that dreadful and monstrous assertion that the robber and housebreaker, the man laden with the crime of murder deserved to be released rather than Jesus, and having received permission from the judge to make their choice preferred Barabbas, desiring not only to crucify Christ, but also to involve Him in infamy? For they thought that by these means they should be able to manufacture the belief that He was worse than the robber, and such a great transgressor that neither on the plea of mercy, nor of the privilege of the Festival was it possible to save Him. For they did everything with a view to slander His fame; which also was the reason why they crucified the two robbers with Him. Nevertheless the truth was not obscured, but shone forth all the more clearly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FLetters%2520to%2520Olympias%2F1%2520-%2520To%2520My%2520Lady.html'
source_title="Letters to Olympias, To My Lady 4"

[[commentary]]
quote='''
O accursed decision! They demand those like mannered with themselves, and let the guilty go; but bid him punish the innocent. For this was their custom from old time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252084.html'
source_title="Homily on the Gospel of John 84"
