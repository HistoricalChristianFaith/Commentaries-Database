[[commentary]]
quote='''
"Since the world began was it not heard that any man opened the eyes of one that was born blind."

"If now ye acknowledge that God heareth not sinners, and this Person hath wrought a miracle, and such a miracle as no man ever wrought, it is clear that He hath surpassed all things in virtue, and that His power is greater than belongeth to man."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252058.html'
source_title='Homily on the Gospel of John 58'

[[commentary]]
quote='''
Then he extols His deed: Since the world began, was it not heard that any man opened the eyes of one that was born blind: as if to say, If ye confess that God heareth not sinners; and this Man has worked a miracle, such an one, as no other man has; it is manifest that the virtue whereby He has wrought it, is more than human: If this Man were not of God, He could do nothing.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
