[[commentary]]
quote='''
(Hom. lxxxiii. 4) They in reply bring forward no positive charge but only their own conjectures: They answered and said unto him, If He were not a malefactor, we would not have delivered Him up unto thee.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
What then say they? "If he were not a malefactor, we would not have delivered him up unto thee." O madness! for why do ye not mention His evil deeds, instead of concealing them? Why do ye not prove the evil?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title='Homily on the Gospel of John 83'
