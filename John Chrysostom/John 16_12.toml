[[commentary]]
quote='''
"I have yet many things to say unto you, but ye cannot bear them now." "Therefore it is expedient for you that I depart, if ye then will bear them when I departed." "And what hath come to pass? the Spirit greater than Thou, that now indeed we bear not, but It will fit us to bear? Is It working more powerful and more perfect?" "Not so; for He too shall speak My words."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252078.html'
source_title="Homily on the Gospel of John 78"

[[commentary]]
quote='''
Because He was clothed with the flesh, and because He would not seem to speak concerning Himself, and because they did not yet know clearly concerning the Resurrection, and were too imperfect, and also because of the Jews, that they might not think they were punishing Him as a transgressor; therefore He spake no great thing continually, nor plainly drew them away from the Law. But when the disciples were cut off from them, and were for the future without; and when many were about to believe, and to be released from their sins; and when there were others who spake of Him, He with good reason spake not great things concerning Himself. "So that it proceeded not from ignorance of Mine," He saith, "that I told you not what I should have told you, but from the infirmity of the hearers."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252078.html'
source_title="Homily on the Gospel of John 78"
