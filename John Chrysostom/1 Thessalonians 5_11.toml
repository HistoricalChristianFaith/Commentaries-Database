[[commentary]]
quote='''
You see, I wish and pray that you would all hold fast to right order as teachers, that you would not simply be listeners to what is said by us but also transmit it to others, casting your net for those still in error so as to bring them to the way of truth—as Paul says, "Edify one another," and "With fear and trembling work out your own salvation." In this way we will have the satisfaction of seeing the church grow in strength, and you will enjoy more abundant favor from above through the great care you show for your members. God, you know, does not wish Christians to be concerned only for themselves but also to edify others, not simply through their teaching but also through their behavior and the way they live. After all, nothing is such an attraction to the way of truth as an upright life—in other words, people pay less attention to what we say than to what we do.
'''
source_url=''
source_title="HOMILIES ON GENESIS 8.4-5"


[[commentary]]
quote='''
Dost thou see how everywhere he puts the common salvation into the hands of each individual? "Exhorting one another daily" (he says) "while it is called To-day." Do not then cast all [the burden] on your teachers; do not [cast] all upon them who have the rule over you: ye also (he means) are able to edify one another. Which also he said in writing to the Thessalonians, "Edify one another, even as also ye do." And again, "Comfort one another with these words." This we also now exhort you.… If ye be willing, ye will have more success with each other than we can have. For ye both are with one another for a longer time, and ye know more than we of each other's affairs, and ye are not ignorant of each other's failings, and ye have more freedom of speech, and love, and intimacy; and these are no small [advantages] for teaching, but great and opportune introductions for it: ye will be more able than we both to reprove and to exhort. And not this only, but because I am but one, whereas ye are many; and ye will be able, however many, to be teachers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252030.html'
source_title="Homily on Hebrews 30"
