[[commentary]]
quote='''
This was a sign of leisure, but according to Matthew He finds them mending their nets. For so great was their poverty, that they patched up their old nets, not being able to buy new ones.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
