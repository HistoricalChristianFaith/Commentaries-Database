[[commentary]]
quote='''
Nor does Christ's goodness rest here, but He manifests His care for them, opening the bowels of His mercy towards them; whence it follows, And seeing the multitudes, he had compassion upon them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
This is an accusation against the rulers of the Jews, that being shepherds they appeared like wolves; not only not improving the multitude, but hindering their progress. For when the multitude marvelled and said, It was never so seen in Israel, these opposed themselves, saying, He casteth out dæmons by the prince of the dæmons. (vid. Ps. 102:19.)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
And contemplate Him here too beginning from love to man, not with any requital. "For He had compassion, because they were troubled and scattered abroad as sheep having no shepherd." This is His charge against the rulers of the Jews, that being shepherds they acted the part of wolves. For so far from amending the multitude, they even marred their progress. For instance, when they were marvelling and saying, "It was never so seen in Israel:" these were affirming the contrary, "He casteth out devils through the prince of the devils."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252032.html'
source_title='Homily on the Gospel of Matthew 32'
