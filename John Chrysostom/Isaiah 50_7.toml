[[commentary]]
quote='''
Nevertheless, you will say, adversity is a terrible thing and grievous to be borne. Yet look at it again compared with another image and then also learn to despise it. For the railings, and insults, and reproaches, and gibes inflicted by enemies, and their plots are compared to a worn-out garment, and moth-eaten wool when God says "Fear ye not the reproach of men, neither be ye afraid of their revilings, for they shall wax old as doth a garment, and like moth-eaten wool so shall they be consumed." Therefore let none of these things which are happening trouble thee, but ceasing to invoke the aid of this or that person, and to run after shadows (for such are human alliances), do thou persistently call upon Jesus, whom thou servest, merely to bow his head; and in a moment of time all these evils will be dissolved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FLetters%2520to%2520Olympias%2F1%2520-%2520To%2520My%2520Lady.html'
source_title="LETTERS TO OLYMPIAS 7:2"
