[[commentary]]
quote='''
And He said not, "I have done a thing greater than circumcision," but abundantly refuteth them by saying, "If a man receive circumcision." "Seest thou that the Law is most established when a man breaketh it? Seest thou that the breaking of the Sabbath is the keeping of the Law? that if the Sabbath were not broken, the Law must needs have been broken? so that I also have established the Law." He said not, "Ye are wroth with Me because I have wrought a thing which is greater than circumcision," but having merely mentioned what had been done, He left it to them to judge, whether entire health was not a more necessary thing than circumcision. "The Law," He saith, "is broken, that a man may receive a sign which contributeth nothing to health; are ye vexed and indignant at its being broken, that one might be freed from so grievous a disease?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title="Homily on the Gospel of John 49"
