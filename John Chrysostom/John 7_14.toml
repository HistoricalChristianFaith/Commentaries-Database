[[commentary]]
quote='''
(Hom. xlix. 1. Aug.) Our Lord delays His visit, in order to excite men's attention, and goes up not the first day, but about the middle of the feast: Now about the midst of the feast Jesus went up into the temple, and taught. Those who had been searching for Him, when they saw Him thus suddenly appear, would be more attentive to His teaching, both favourers and enemies; the one to admire and profit by it; the other to find an opportunity of laying hands on Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"Now about the middle of the feast Jesus went up and taught." By the delay He made them more attentive; for they who had sought Him on the first days and said, "Where is He?" when they saw Him suddenly present, observe how they drew near, and were like to press upon Him as He was speaking, both those who said that He was a good man, and those who said that He was not such; the former so as to profit by and admire Him, the latter to lay hold on and detain Him. One party then said, "He deceiveth the people," by reason of the teaching and the doctrines, not understanding His meaning; the other on account of the miracles said, "He is a good man." He therefore thus came among them when He had slackened their anger, so that they might hear His words at leisure, when passion no longer stopped their ears.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title='Homily on the Gospel of John 49'
