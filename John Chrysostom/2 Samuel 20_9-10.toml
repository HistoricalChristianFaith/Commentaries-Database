[[commentary]]
quote='''
Would ye that in another way also I should make what I say plainer? Let us look into their case, who avenge themselves even justly. For as to the wrong doers, that they are the most worthless of all men, warring against their own soul; this is surely plain to every one. But who avenged himself justly, yet kindled innumerable ills, and pierced himself through with many calamities and sorrows? The captain of David's host. For he both stirred up a grievous war, and suffered unnumbered evils; not one whereof would have happened, had he but known how to command himself. Let us flee therefore from this sin, and neither in words nor deeds do our neighbors wrong.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252042.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 42.2"
