[[commentary]]
quote='''
For indeed there is nothing equal to this virtue. Wouldest thou learn the power of this virtue? "Though Moses and Samuel stood before Me," saith God, "my soul would not regard them." Nevertheless, those whom Moses and Samuel were not able to snatch away from God's wrath, this precept when observed was able to snatch away. Hence it is, that He continually exhorts those to whom He had spoken these things, saying, "Let none of you revengefully imagine evil against his brother in your heart," and "let none of you think of his neighbour's malice." It is not said merely, forego wrath; but retain it not in thy mind; think not of it; part with all thy resentment; do away the sore. For thou supposest that thou art paying him back the injury; but thou art first tormenting thyself, and setting up thy rage as an executioner within thee in every part, and tearing up thine own bowels. For what can be more wretched than a man perpetually angry? And just as maniacs, who never enjoy tranquility, so also he who is resentful, and retains an enemy, will never have the enjoyment of any peace; incessantly raging, as he does, and daily increasing the tempest of his thoughts, calling to mind his words and acts, and detesting the very name of him who has aggrieved him. Do you but mention his enemy, he becomes furious at once, and sustains much inward anguish; and should he chance to get only a bare sight of him, he fears and trembles, as if encountering the worst evils. Yea, if he perceives any of his relations, if but his garment, or his dwelling, or street, he is tormented by the sight of them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252020.html'
source_title="HOMILIES CONCERNING THE STATUES 20:6"
