[[commentary]]
quote='''
But why, it may be asked, did he use a girdle with his raiment? This was customary with them of old time, before men passed into this soft and loose kind of dress. Thus, for instance, both Peter appears to have been "girded," and Paul; for it saith, "the man that owneth this girdle." And Elijah too was thus arrayed, and every one of the saints, because they were at work continually, laboring, and busying themselves either in journeyings, or about some other necessary matter; and not for this cause only, but also with a view of trampling under foot all ornaments, and practising all austerity. This very kind of thing accordingly Christ declares to be the greatest praise of virtue, thus saying, "What went ye out for to see? a man clothed in soft raiment? behold, they that wear soft clothing are in king's houses."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252010.html'
source_title="Homily on Matthew 10"

[[commentary]]
quote='''
"And as we tarried there many days, there came down from Judea a certain prophet, named Agabus. And when he was come unto us, he took Paul's girdle, and bound his own hands and feet, and said, Thus saith the Holy Ghost, So shall the Jews at Jerusalem bind the man that owneth this girdle, and shall deliver him into the hands of the Gentiles." He who formerly had declared about the famine, the same says, This "man, who owneth this girdle, thus shall they bind." The same that the prophets used to do, representing events to the sight, when they spoke about the captivity - as did Ezekiel - the same did this Agabus. And Agabus does not say, "They shall bind" Paul, that he may not seem to speak upon agreement with Paul, but "the man that owneth this girdle" - so then he had a girdle also.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252045.html'
source_title="Homily on Acts 45"
