[[commentary]]
quote='''
So also His Father makes great account of prophecy, when He sets Himself against the honor paid to idols: "Let them declare to you," saith He, "what shall come upon you"; and again, "I have declared, and have saved, and there was no foreign God amongst you"; and He brings this forward through all prophecy. Because prophecy is especially the work of God, which devils cannot even imitate, though they strive exceedingly. For in the case of miracles there may be delusion; but exactly to foretell the future belongs to that pure Nature alone. Or if devils ever have done so, it was by deceiving the simpler sort; whence their oracles are always easily detected.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252019.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 19"
