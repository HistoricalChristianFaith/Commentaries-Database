[[commentary]]
quote='''
For the Prophets ever rebuked them, saying, "Hear, ye rulers of Sodom"; and, "Thy rulers are disobedient"; and again, "Is it not for you to know judgment?" And everywhere they attack them vehemently. What then? Shall one blame God for this? Away with the thought. This blame is theirs. And what other proof can a man bring of your not knowing the Law than your not obeying it?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252052.html'
source_title="HOMILIES ON JOHN 52"
