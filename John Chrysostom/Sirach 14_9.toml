[[commentary]]
quote='''
Wherefore also one saith, "There is not a more wicked thing than a covetous man." For such a one both setteth himself to sale, and goeth about, a common enemy of the world, grieving that the earth doth not bear gold instead of the corn, and the fountains instead of streams, and the mountains instead of stone; vexed at the fruitfulness of the seasons, troubled at common benefits; shunning every means whence one cannot obtain money; undergoing all things whence one can scrape together so much as two farthings; hating all men, the poor and the rich; the poor, lest they should come and beg of him; the rich, because he hath not their possessions. All men he accounts to be possessed of what is his, and as though he had been injured by all, so is he displeased with all. He knows not plenty, he has no experience of satiety, he is more wretched than any, even as, on the other hand, he that is freed from these things, and practises self-restraint, is the most enviable. For the virtuous man, though he be a servant, though a prisoner, is the most happy of all men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252080.html'
source_title="Homily on Matthew 80"
