[[commentary]]
quote='''
...and that we received this law in our very nature, and that our Creator entrusted to us the impartial rule of conscience, these I say, are proofs of the greatest grace and unspeakable lovingkindness. And the recovery of this law after it had become corrupt, by means of the written (Law), this too was the work of grace. For what might have been expected to follow was, that they who falsified the law once given should suffer correction and punishments; but what actually took place was not this, but, on the contrary, an amending of our nature, and pardon, not of debt, but given through mercy and grace. For to show that it was of grace and mercy, hear what David saith; "The Lord executeth righteousness and judgment for all that are oppressed; He made known His ways unto Moses, His acts unto the children of Israel": and again; "Good and upright is the Lord, therefore will He give laws to them that are in the way."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252014.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 14"
