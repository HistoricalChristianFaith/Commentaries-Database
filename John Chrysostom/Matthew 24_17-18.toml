[[commentary]]
quote='''
Then to show how inevitable the evils that should come upon the Jews, and how infinite their calamity, He adds, And let him which is on the housetop, not come down to take any thing out of his house, for it was better to be saved, and to lose his clothes, than to put on a garment and perish; and of him who is in the field He says the same. For if those who are in the city fly from it, little need is there for those who are abroad to return to the city.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252024.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Therefore them also that are on the housetop, He suffers not to enter into the house to take their clothes, indicating the evils to be inevitable, and the calamity without end, and that it must needs be that he that was involved therein should surely perish. Therefore He adds also, him that is in the field, saying, neither let this man turn back to take his clothes. For if they that are in doors flee, much more they that are out of doors ought not to take refuge within.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252076.html'
source_title='Homily on the Gospel of Matthew 76'
