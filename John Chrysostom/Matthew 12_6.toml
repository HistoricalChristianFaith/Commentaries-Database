[[commentary]]
quote='''
Wherefore He said also, "But I say unto you, That in this place is one greater than the temple."

Nevertheless, great as the sayings were which they heard, they made no reply, for the salvation of men was not their object.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252039.html'
source_title='Homily on the Gospel of Matthew 39'

[[commentary]]
quote='''
But are the disciples Priests? yea, they are yet greater than Priests, forasmuch as He was there who is the Lord of the Temple, who is the reality and not the type; and therefore it is added, But I say unto you, one greater than the Temple is here.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
