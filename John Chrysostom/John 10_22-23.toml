[[commentary]]
quote='''
(Hom. lxi. 1) It was the feast of the dedication of the temple, after the return from the Babylonish captivity.

(Hom. lxi. 1.) Christ was present with much zeal at this feast, and thenceforth stayed in Judæa; His passion being now at hand. And Jesus walked in the temple in Solomon's porch.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"It was," It saith, "at Jerusalem, the Feast of the dedication, and it was winter." This feast was a great and national one. For they celebrated with great zeal the day on which the Temple was rebuilt, on their return from their long captivity in Persia. At this feast Christ also was present, for henceforth He continually abode in Judaea, because the Passion was nigh. "Then came the Jews round about Him, and said, How long dost thou make us to doubt?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252061.html'
source_title='Homily on the Gospel of John 61'
