[[commentary]]
quote='''
For love "doth nothing unseemly," but as it were with certain golden wings covereth up all the offences of the beloved. Jonathan loved David; and hearing his father say, "Thou son of damsels that have run away from their homes, thou womanly bred," he was not ashamed, though the words be full of great reproach. For what he means is this: "Thou son of mean harlots who are mad after men, who run after the passers-by, thou unnerved and effeminate wretch, who hast nothing of a man, but livest to the shame of thyself and the mother who bare thee." What then? Did he grieve at these things, and hide his face, and turn away from his beloved? Nay, quite the contrary; he displayed his fondness as an ornament. And yet the one was at that time a king, and a king's son, even Jonathan; the other a fugitive and a wanderer, I mean, David. But not even thus was he ashamed of his friendship. "For love doth not behave itself unseemly." Yea, this is its wonderful quality that not only it suffers not the injured to grieve and feel galled, but even disposes him to rejoice. Accordingly, he too, of whom we are speaking, after all these things, just as though he had a crown put on him, went away and fell on David's neck. For love knows not what sort of thing shame may be. Therefore it glories in those things for which another hides his face. Since the shame is, not to know how to love; not, when thou lovest, to incur danger and endure all for the beloved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252033.html'
source_title="HOMILIES ON 1 CORINTHIANS 33.2"
