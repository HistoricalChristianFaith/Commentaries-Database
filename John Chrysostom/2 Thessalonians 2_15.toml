[[commentary]]
quote='''
Not by letters alone did Paul instruct his disciple in his duty, but before by words also which he shows, both in many other passages, as where he says, "whether by word or our Epistle," and especially here. Let us not therefore suppose that anything relating to doctrine was spoken imperfectly. For many things he delivered to him without writing. Of these therefore he reminds him, when he says, "Hold fast the form of sound words, which thou hast heard of me." After the manner of artists, I have impressed on thee the image of virtue, fixing in thy soul a sort of rule, and model, and outline of all things pleasing to God. These things then hold fast, and whether thou art meditating any matter of faith or love, or of a sound mind, form from hence your ideas of them. It will not be necessary to have recourse to others for examples, when all has been deposited within thyself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Timothy%2FHomily%25203.html'
source_title="Homily on Second Timothy 3"

[[commentary]]
quote='''
"So then, brethren, stand fast, and hold the traditions which ye were taught, whether by word, or by Epistle of ours."

Hence it is manifest, that they did not deliver all things by Epistle, but many things also unwritten, and in like manner both the one and the other are worthy of credit. Therefore let us think the tradition of the Church also worthy of credit. It is a tradition, seek no farther. Here he shows that there were many who were shaken.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Thessalonians%2FHomily%25204.html'
source_title="Homily on 2 Thessalonians 4"
