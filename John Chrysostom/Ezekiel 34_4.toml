[[commentary]]
quote='''
Do you see a shepherd's vigilance? Do you see his heightened interest? What excuse could they have to whom rational flocks are entrusted but who are guilty of great negligence and day after day, in the prophet's words, slaughter some of them and look on without intending to take any care of others made the prey of wild beasts or the spoils of other people—even when the labor involved is slight and attention easy? It is a soul, after all, that is to be instructed; but that involves much labor for body and soul.
'''
source_url=''
source_title="HOMILIES ON GENESIS 57:32"


[[commentary]]
quote='''
Having therefore mentioned the marks of a shepherd, Christ hath put two kinds of spoilers; one, the thief who kills and steals; the other, one who doth not these things, but who when they are done doth not give heed nor hinder them. By the first, pointing to Theudas and those like him; by the second, exposing the teachers of the Jews, who neither cared for nor thought about the sheep entrusted to them. On which account Ezekiel of old rebuked them, and said, "Woe, ye shepherds of Israel! Do the shepherds feed themselves? Do not the shepherds feed the sheep?" But they did the contrary, which is the worst kind of wickedness, and the cause of all the rest. Wherefore It saith, "They have not turned back the strayed, nor sought the lost, nor bound up the broken, nor healed the sick, because they fed themselves and not the sheep."... From both Christ distinguisheth Himself; from those who came to spoil, by saying, "I am come that they might have life, and that they might have more abundantly"; and from those who cared not for the sheep being carried away by wolves, by never deserting them, but even laying down His life for them, that the sheep might not perish.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252060.html'
source_title="Homily on the Gospel of John 60"
