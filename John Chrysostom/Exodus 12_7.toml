[[commentary]]
quote='''
This blood cleansed the secret place, and the Holy of Holies. And if the type of it had such great power in the temple of the Hebrews, and in the midst of Egypt, when smeared on the door-posts, much more the reality. This blood sanctified the golden altar; without it the high priest dared not enter into the secret place. This blood consecrated priests, this in types cleansed sins. But if it had such power in the types, if death so shuddered at the shadow, tell me how would it not have dreaded the very reality?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252046.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 46"
