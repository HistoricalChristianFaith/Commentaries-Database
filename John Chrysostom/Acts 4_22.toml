[[commentary]]
quote='''
The miracles shut their mouths: they would not so much as let them finish their speech, but cut them short in the middle, most insolently. "For all men glorified God for that which was done. For the man was above forty years old, on whom this miracle of healing was showed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252010.html'
source_title="Homily on Acts 10"
