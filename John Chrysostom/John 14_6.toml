[[commentary]]
quote='''
(Hom. lxxiii. 2) For if, He says, ye have Me for your guide to the Father, ye shall certainly come to Him. Nor can ye come by any other way. (c. 6:44) Whereas He had said above, No man can come to Me, except the Father draw him, now He says, No man cometh unto the Father but by Me, thus equalling Himself to the Father. The next words explain, Whither I go ye know, and the way ye know.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
