[[commentary]]
quote='''
Since He says, "a vessel of election," that thou mayest not imagine that God is to do all, He adds, "to bear My Name before Gentiles and kings, and the children of Israel." Ananias has heard what he most desired-that against the Jews also he will take his stand: this above all gave him courage. "For I," saith He, "will show him how great things he must suffer for My Name's sake." At the same time also this is said by way of putting Ananias to the blush: If he, that was so frantic, shall suffer all things, and thou not willing even to baptize him! "It is well," saith he: "let him continue blind" (this is why he says these words): "he is blind: why dost Thou at all bid me open his eyes, that he may bind men again?" Fear not the future: for that opening of his eyes he will use not against you, but for you (with reference to that saying, "That he may receive his sight," these words are spoken): for not only will he do you no harm, but he "will suffer many things." And what is wonderful indeed is, that he shall first know "how great things he shall suffer," and then shall take the field against the perils.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252020.html'
source_title="Homily on Acts 20"

[[commentary]]
quote='''
Here he establishes two things: both that they are without excuse, since they persecuted him contrary to all likelihood or calculation of reason; and, that Christ was God, as prophesying things contrary to expectation, and as not looking to past things, but foreknowing the things to come. How then does He say, "He shall bear My name before the Gentiles and kings and children of Israel?" Not, certainly persuade. Besides which, on other occasions we find the Jews were persuaded, but here they were not. Where most of all they ought to have been persuaded, as knowing his former zeal in their cause, here they were not persuaded.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252048.html'
source_title="Homily on Acts 48"
