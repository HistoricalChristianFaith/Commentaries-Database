[[commentary]]
quote='''
On this point then declaring himself, Pilate replied, "Am I a Jew? Thine own nation and the chief priests have delivered thee unto me; what hast thou done?" Here desiring to clear himself of the matter. Then because he had said, "Art thou the King?" Jesus reproving him answereth, "This thou hast heard from the Jews. Why dost thou not make accurate enquiry? They have said that I am a malefactor; ask them what evil I have done. But this thou doest not, but art simply framing charges against Me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title='Homily on the Gospel of John 83'
