[[commentary]]
quote='''
Casting away therefore all anxiety and superfluous care, let us return to ourselves; and let us adorn the body and the soul with the ornament of virtue; converting our bodily members into instruments of righteousness and not instruments of sin. And first of all, let us discipline our tongue to be the minister of the grace of the Spirit, expelling from the mouth all virulence and malignity, and the practice of using disgraceful words. For it is in our power to make each one of our members an instrument of wickedness, or of righteousness. Hear then how men make the tongue an instrument, some of sin, others of righteousness! "Their tongue is a sharp sword." But another speaks thus of his own tongue: "My tongue is the pen of a ready writer." The former wrought destruction; the latter wrote the divine law. Thus was one a sword, the other a pen, not according to its own nature, but according to the choice of those who employed it. For the nature of this tongue and of that was the same, but the operation was not the same.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25204.html'
source_title="HOMILIES CONCERNING THE STATUES 4:10-11"
