[[commentary]]
quote='''
Accordingly, neither did He present Himself to them at once. For, "in the fourth watch," so it is said, "of the night, He went unto them, walking upon the sea;" instructing them not hastily to seek for deliverance from their pressing dangers, but to bear all occurrences manfully. At all events, when they looked to be delivered, then was their fear again heightened.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252050.html'
source_title='Homily on the Gospel of Matthew 50'

[[commentary]]
quote='''
But He suffers them to be tossed the whole night, exciting their hearts by fear, and inspiring them with greater desire and more lasting recollection of Him; for this reason He did not stand by them immediately, but as it follows, in the fourth watch of the night he came to them walking upon the sea.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
