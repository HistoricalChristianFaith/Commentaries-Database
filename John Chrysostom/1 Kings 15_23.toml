[[commentary]]
quote='''
"What then," saith one, "do all diseases proceed from sin?" Not all, but most of them; and some proceed from different kinds of loose living, since gluttony, intemperance, and sloth, produce such like sufferings. But the one rule we have to observe, is to bear every stroke thankfully; for they are sent because of our sins, as in the Kings we see one attacked by gout; they are sent also to make us approved, as the Lord saith to Job, "Thinkest thou that I have spoken to thee, save that thou mightest appear righteous?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252038.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 38.1"
