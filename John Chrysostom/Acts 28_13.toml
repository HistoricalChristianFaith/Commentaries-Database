[[commentary]]
quote='''
Already the preaching has reached to Sicily: see how it has run through (even to those lands): at Puteoli also they found some: others also came to meet them. Such was the eagerness of the brethren, it nothing disconcerted them, that Paul was in bonds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252054.html'
source_title="Homily on Acts 54"

[[commentary]]
quote='''
See, when the judgment is right, and not preoccupied by some passion, how immediately it gets right judgings, and gives sound verdicts. "And after three months we departed in a ship of Alexandria, which had wintered in the isle, whose sign was Castor and Pollux. And landing at Syracuse, we tarried there three days. And from thence we fetched a compass, and came to Rhegium: and after one day the south wind blew, and we came the next day to Puteoli: where we found brethren, and were desired to tarry with them seven days: and so we went toward Rome. And from thence, when the brethren heard of us, they came to meet us as far as Appii forum, and the Three Taverns: whom when Paul saw, he thanked God, and took courage." Already the preaching has reached to Sicily: see how it has run through (even to those lands): at Puteoli also they found some: others also came to meet them. Such was the eagerness of the brethren, it nothing disconcerted them, that Paul was in bonds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252054.html'
source_title="Homily on Acts 54"
