[[commentary]]
quote='''
And I have heard many, after such experience, blame themselves, and say, What advantage is it that I have grieved? I have not recovered my money, and I have injured myself. But if thou hast grieved on account of sin, thou hast blotted it out, and hast reaped the greatest pleasure. If thou hast grieved for thy brethren who have fallen, thou hast both encouraged and comforted thyself, and hast also restored them; and even if thou wert not to profit them, thou hast an abundant recompense. And that thou mayest learn that this grieving for those who have fallen, though we should not at all benefit them, still brings us a large reward, hear what Ezekiel says; or rather, what God Himself speaks through him. For when He had sent certain messengers to overturn the city, and to consume all the dwellings with sword and fire, along with their inhabitants, He thus charges one of them: "Set a mark upon the forehead of the men that groan, and are in anguish." And after charging the others, and saying, "Begin ye from mine holy ones," He goes on to add, "But upon whomsoever the sign is, touch them not." For what reason, tell me? Because although they avail nothing, they nevertheless lament the things which are done, and deplore them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252018.html'
source_title="Concerning the Statues, Homily 18"
