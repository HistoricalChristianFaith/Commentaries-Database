[[commentary]]
quote='''
Therefore, let us fear nothing so much as sin and transgression. Let us not fear punishment, and then we shall escape punishment. Even as the Three Children were not afraid of the furnace, and so escaped from the furnace. Such indeed it becomes the servants of God to be. For if those who were brought up under the Old dispensation, when death was not yet slain, nor his "brazen gates broken down," nor his "iron bars smitten in sunder;" so nobly encountered their end, how destitute of all defence or excuse shall we be, if, after having had the benefit of such great grace, we attain not even to the same measure of virtue as they did, now when death is only a name, devoid of reality. For death is nothing more than a sleep, a journey, a migration, a rest, a tranquil haven; an escape from trouble, and a freedom from the cares of this present life!
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25207.html'
source_title="HOMILIES CONCERNING THE STATUES 7:1"
