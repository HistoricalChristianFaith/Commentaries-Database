[[commentary]]
quote='''
What then saith the mouth of the apostles, Peter, the ever fervent, the leader of the apostolic choir? When all are asked, he answers. And whereas when He asked the opinion of the people, all replied to the question; when He asked their own, Peter springs forward, and anticipates them, and saith, "Thou art the Christ, the Son of the living God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252054.html'
source_title='Homily on the Gospel of Matthew 54'

[[commentary]]
quote='''
When the Lord enquires concerning the opinion of the multitudes, all the disciples answer; but when all the disciples are asked, Peter as the mouth and head of the Apostles answers for all, as it follows, Simon Peter answered and said, Thou art Christ, the Son of the living God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"
