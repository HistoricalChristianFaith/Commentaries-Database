[[commentary]]
quote='''
(Hom. lxxxvii) Inasmuch, however, as He did not converse with them regularly, or in the same way as before, the Evangelist adds, This is now the third time that Jesus showed Himself to His disciples, after that He was risen from the dead.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
And to show that He remained not with them continually, nor in like manner as before, It saith that, "This was the third time that Jesus appeared to them, after that He arose from the dead."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title='Homily on the Gospel of John 87'
