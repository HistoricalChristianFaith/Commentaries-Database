[[commentary]]
quote='''
And to show that He remained not with them continually, nor in like manner as before, It saith that, "This was the third time that Jesus appeared to them, after that He arose from the dead."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title='Homily on the Gospel of John 87'
