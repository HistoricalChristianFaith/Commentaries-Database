[[commentary]]
quote='''
For here He no more looketh to heaven, nor performeth those human acts, showing that those also which He did were done by way of condescension. And to show that He remained not with them continually, nor in like manner as before, It saith that, "This was the third time that Jesus appeared to them, after that He arose from the dead." And He biddeth them "to bring of the fish," to show that what they saw was no appearance. But here indeed it saith not that He ate with them, but Luke, in another place, saith that He did; for "He was eating together with them." But the, "how," it is not ours to say; for these things came to pass in too strange a manner, not as though His nature now needed food, but from an act of condescension, in proof of the Resurrection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title="Homily on the Gospel of John 87"
