[[commentary]]
quote='''
And for this reason, even after this He speaks, that they might learn that He was still alive, and that He Himself did this, and that they might become by this also more gentle, and He saith, "Eli, Eli, lama sabachthani?" that unto His last breath they might see that He honors His Father, and is no adversary of God. Wherefore also He uttered a certain cry from the prophet, even to His last hour bearing witness to the Old Testament, and not simply a cry from the prophet, but also in Hebrew, so as to be plain and intelligible to them, and by all things He shows how He is of one mind with Him that begat Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252088.html'
source_title='Homily on the Gospel of Matthew 88'

[[commentary]]
quote='''
He uttered this word of prophecy, that He might bear witness to the very last hour to the Old Testament, and that they might see that He honours the Father, and is not against God. And therefore too, He used the Hebrew tongue, that what He said might be intelligible to them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252027.html'
source_title="Catena Aurea by Aquinas"
