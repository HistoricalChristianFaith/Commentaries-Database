[[commentary]]
quote='''
(Hom. lxxxvii) He says, Afterwards, because He did not go continually with His disciples as before; and, manifested Himself, because His body being incorruptible, it was a condescension to allow Himself to be seen. He mentions the place, to show that our Lord had taken away a good deal of their fear, and that they no longer kept within doors, though they had gone to Galilee to avoid the persecution of the Jews.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Seest thou that He remaineth not with them continually, nor as before? He appeared, for instance, in the evening, and flew away; then after eight days again once, and again flew away; then after these things by the sea, and again with great terror. But what is the, "showed"? From this it is clear that He was not seen unless He condescended, because His body was henceforth incorruptible, and of unmixed purity. But wherefore hath the writer mentioned the place? To show that he had now taken away the greater part of their fear, so that they now ventured forth from their dwelling, and went about everywhere. For they were no longer shut up at home, but had gone into Galilee, avoiding the danger from the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title='Homily on the Gospel of John 87'
