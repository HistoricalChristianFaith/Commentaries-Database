[[commentary]]
quote='''
"For when the devil was cast out," it saith, "the dumb spake: and the multitudes marvelled, saying, It was never so seen in Israel."

Now this especially vexed the Pharisees, that they preferred Him to all, not only that then were, but that had ever been. And they preferred Him, not for His healing, but for His doing it easily and quickly, and to diseases innumerable and incurable.

And thus the multitude; but the Pharisees quite contrariwise; not only disparaging the works, but saying things contradictory to themselves, and not ashamed. Such a thing is wickedness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252032.html'
source_title='Homily on the Gospel of Matthew 32'

[[commentary]]
quote='''
They set Him thus above others, because He not only healed, but with such ease, and quickness; and cured diseases both infinite in number, and in quality incurable. This most grieved the Pharisees, that they set Him before all others, not only those that then lived, but all who had lived before, on which account it follows, But the Pharisees said, He casteth out dæmons through the Prince of dæmons.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"
