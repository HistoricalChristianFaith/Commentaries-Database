[[commentary]]
quote='''
"I," saith he, "baptize with water: but there standeth one among you, whom ye know not; He it is, who coming after me is preferred before me, whose shoe's latchet I am not worthy to unloose." What could the Jews have left to say to this? for even from this the accusation against them cannot be evaded, the decision against them admits not of pardon, they have given sentence against themselves. How? In what way? They deemed John worthy of credit, and so truthful, that they might believe him not only when he testified of others, but also when he spoke concerning himself. For had they not been so disposed, they would not have sent to learn from him what related to himself. Because you know that the only persons whom we believe, especially when speaking of themselves, are those whom we suppose to be more veracious than any others. And it is not this alone which closes their mouths, but also the disposition with which they had approached him; for they came forth to him at first with great eagerness, even though afterwards they altered. Both which things Christ declared, when He said, "He was a burning (and a shining) light, and ye were willing for a season to rejoice in his light." Moreover, his answer made him yet more worthy of credit. For (Christ) saith, "He that seeketh not his own glory, the same is true, and no unrighteousness is in him." Now this man sought it not, but refers the Jews to another. And those who were sent were of the most trustworthy among them, and of the highest rank, so that they could have in no way any refuge or excuse, for the unbelief which they exhibited towards Christ. Wherefore did ye not receive the things spoken concerning Him by John? you sent men who held the first rank among you, you enquired by them, you heard what the Baptist answered, they manifested all possible officiousness, sought into every point, named all the persons you suspected him to be; and yet most publicly and plainly he confessed that he was neither "Christ," nor "Elias" nor "that Prophet." Nor did he stop even there, but also informed them who he was, and spoke of the nature of his own baptism, that it was but a slight and mean thing, nothing more than some water, and told of the superiority of the Baptism given by Christ; he also cited Esaias the prophet, testifying of old very long ago, and calling Christ "Lord," but giving him the names of "minister and servant." What after this ought they to have done? Ought they not to have believed on Him who was witnessed of, to have worshiped Him, to have confessed Him to be God? For the character and heavenly wisdom of the witness showed that his testimony proceeded, not from flattery, but from truth; which is plain also from this, that no man prefers his neighbor to himself, nor, when he may lawfully give honor to himself, will yield it up to another, especially when it is so great as that of which we speak. So that John would not have renounced this testimony (as belonging) to Christ, had He not been God. For though he might have rejected it for himself as being too great for his own nature, yet he would not have assigned it to another nature that was beneath it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252016.html'
source_title="Homily on the Gospel of John 16"

[[commentary]]
quote='''
"But there standeth One among you, whom ye know not." Reasonable it was that Christ should mingle among the people as one of the many, because everywhere He taught men not to be puffed up and boastful. And in this place by "knowledge" the Baptist means a perfect acquaintance with Him, who and whence He was. And immediately next to this he puts, "Who cometh after me"; all but saying, "Think not that all is contained in my baptism, for had that been perfect, Another would not have arisen after me to offer you a different One, but this of mine is a preparation and a clearing the way for that other. Mine is but a shadow and image, but One must come who shall add to this the reality. So that His very coming 'after me' especially declares His dignity: for had the first been perfect, no place would have been required for a second."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252016.html'
source_title="Homily on the Gospel of John 16"