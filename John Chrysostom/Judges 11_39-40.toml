[[commentary]]
quote='''
For Jephthah likewise, when he had promised that the first thing that met him, after a victorious battle, he would sacrifice, fell into the snare of child-murder; for his daughter first meeting him, he sacrificed her and God did not forbid it. And I know, indeed, that many of the unbelievers impugn us of cruelty and inhumanity on account of this sacrifice; but I should say, that the concession in the case of this sacrifice was a striking example of providence and clemency; and that it was in care for our race that He did not prevent that sacrifice. For if after that vow and promise He had forbidden the sacrifice, many also who were subsequent to Jephthah, in the expectation that God would not receive their vows, would have increased the number of such vows, and proceeding on their way would have fallen into child-murder. But now, by suffering this vow to be actually fulfilled, He put a stop to all such cases in future. And to shew that this is true, after Jephthah's daughter had been slain, in order that the calamity might be always remembered, and that her fate might not be consigned to oblivion, it became a law among the Jews, that the virgins assembling at the same season should bewail during forty days the sacrifice which had taken place; in order that renewing the memory of it by lamentation, they should make all men wiser for the future; and that they might learn that it was not after the mind of God that this should be done, for in that case He would not have permitted the virgins to bewail and lament her. And that what I have said is not conjectural, the event demonstrated; for after this sacrifice, no one vowed such a vow unto God. Therefore also He did not indeed forbid this; but what He had expressly enjoined in the case of Isaac, that He directly prohibited; plainly shewing through both cases, that He doth not delight in such sacrifices.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252014.html'
source_title="HOMILIES CONCERNING THE STATUES 14.7"
