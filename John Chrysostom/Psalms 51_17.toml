[[commentary]]
quote='''
Other things too must be added to humbleness of mind if it be such as the blessed David knew, when he said, "A broken and a contrite heart God will not despise." For that which is broken does not rise up, does not strike, but is ready to be ill-treated and itself riseth not up. Such is contrition of heart: though it be insulted, though it be evil entreated, it is quiet, and is not eager for vengeance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%25209.html'
source_title="ON THE EPISTLE TO THE HEBREWS 9:8"


[[commentary]]
quote='''
But how shall a man find grace with God? How else, except by lowliness of mind? "For God," saith one, "resisteth the proud, but giveth grace unto the humble; and, the sacrifice of God is a broken spirit, and a heart that is brought low God will not despise." For if with men humility is so lovely, much more with God. Thus both they of the Gentiles found grace and the Jews no other way fell from grace; "for they were not subject unto the righteousness of God." The lowly man of whom I am speaking, is pleasing and delightful to all men, and dwells in continual peace, and hath in him no ground for contentions. For though you insult him, though you abuse him, whatsoever you say, he will be silent and will bear it meekly, and will have so great peace towards all men as one cannot even describe. Yea, and with God also. For the commandments of God are to be at peace with men: and thus our whole life is made prosperous, through peace one with another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%25201.html'
source_title="HOMILIES ON 1 CORINTHIANS 1:4"
