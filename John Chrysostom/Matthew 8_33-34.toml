[[commentary]]
quote='''
And mark also His meekness together with His power. For when the inhabitants of that country, after having received such benefits, were driving Him away, He resisted not, but retired, and left those who had shown themselves unworthy of His teaching, having given them for teachers them that had been freed from the demons, and the swine-herds, that they might of them learn all that had happened; whilst Himself retiring leaves the fear vigorous in them. For the greatness withal of the loss was spreading the fame of what had been done, and the event penetrated their mind. And from many quarters were wafted sounds, proclaiming the strangeness of the miracle; from the cured, and from the drowned, from the owners of the swine, from the men that were feeding them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252028.html'
source_title='Homily on the Gospel of Matthew 28'

[[commentary]]
quote='''
The greatness of the loss also added to the fame of that which was done; for it was published by many persons; namely, by the men that were healed, by the owners of the swine, and by those that fed them; as it follows, But they that fed them fled, and went into the town, and told all, and concerning them that had the dæmons; and, behold, the whole town went out to meet Jesus. But when they should have adored Him, and wondered at His excellent power, they cast Him from them, as it follows, And when they saw him, they besought him that he would depart out of their coasts. Observe the clemency of Christ next to His excellent power; when those who had received favours from Him would drive Him away, He resisted not, but departed, and left those who thus pronounced themselves unworthy of His teaching, giving them as teachers those who had been delivered from the dæmons, and the feeders of the swine.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"
