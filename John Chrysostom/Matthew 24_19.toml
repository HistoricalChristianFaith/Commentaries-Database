[[commentary]]
quote='''
But it is easy to despise money, and not hard to provide other raiment; but how can one avoid natural circumstances? How can a woman with child be made active for flight, or how can she that gives suck desert the child she has brought forth? Woe, therefore, to them that are with child, and to them that give suck in those days; to the one, because they are encumbered, and cannot easily fly, bearing about the burden of the womb; to the other, because they are held by compassion for their children, and cannot save with them those whom they are suckling.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252024.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"Woe unto them that are with child, and to them that give suck," to the one because of their greater inertness, and because they cannot flee easily, being weighed down by the burden of their pregnancy; to the other, because they are held by the tie of feeling for their children, and cannot save their sucklings. For money it is a light thing to despise, and an easy thing to provide, and clothes; but the bonds of nature how could any one escape? how could the pregnant woman become active? how could she that gives suck be able to overlook that which she had borne?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252076.html'
source_title='Homily on the Gospel of Matthew 76'
