[[commentary]]
quote='''
So did Christ at that time also, and did not discover Himself before they cried out. For the more intense their alarm, the more did they welcome His coming. Afterward when they had exclaimed, it is said,

"Straightway Jesus spake unto them, saying, Be of good cheer, it is I; be not afraid."

This word removed their fear, and caused them to take confidence. For as they knew Him not by sight, because of His marvellous kind of motion, and because of the time, He makes Himself manifest by His voice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252050.html'
source_title='Homily on the Gospel of Matthew 50'

[[commentary]]
quote='''
Christ then did not reveal Himself to His disciples until they cried out; for the more intense their fear, the more did they rejoice in His presence; whence it follows, And immediately Jesus spoke to them, saying, Be of good cheer, it is J, be not afraid. This speech took away their fear, and prepared their confidence.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
