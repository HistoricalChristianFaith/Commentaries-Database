[[commentary]]
quote='''
Next, having brought them by His words to an earnest desire, and having signified His unspeakable power, He after that invites them, saying. "Come unto me, all ye that labor and are heavy laden, and I will give you rest." Not this or that person, but all that are in anxiety, in sorrows, in sins. Come, not that I may call you to account, but that I may do away your sins; come, not that I want your honor, but that I want your salvation. "For I," saith He, "will give you rest." He said not, "I will save you," only; but what was much more, "I will place you in all security."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252038.html'
source_title='Homily on the Gospel of Matthew 38'

[[commentary]]
quote='''
By what He had said, He brought His disciples to have a desire towards Him, showing them His unspeakable excellence; and now He invites them to Him, saying, Come unto me, all ye that labour and are heavy laden.

He said not, Come ye, this man and that man, but All whosoever are in trouble, in sorrow, or in sin, not that I may exact punishment of you, but that I may remit your sins. Come ye, not that I have need of your glory, but that I seek your salvation. And I will refresh you; not, I will save you, only; but that is much greater, I will refresh you, that is, I will set you in all quietness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
