[[commentary]]
quote='''
And in another place: Now when our Lord had done many mighty works in Capernaum, and had Himself dwelt there, it seemed to be exalted above the other cities, but through unbelief fell to destruction. Hence it follows, And thou, Capernaum, which art exalted to heaven, shall be thrust down to hell; that, in fact, the judgment might be in proportion to the honour.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
