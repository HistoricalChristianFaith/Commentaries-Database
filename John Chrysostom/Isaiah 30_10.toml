[[commentary]]
quote='''
Say, when is a person most insulted—when he is silent, and one makes no answer, or, when he does speak (and is unheeded)? So that the insult is greater in the present case, when He does speak and thou wilt not hear: greater the contempt. "Speak not to us," we read, they said of old to the Prophets: but ye do worse, saying, Speak: we will not do. For there they turned them away that they should not even speak, as feeling that from the voice itself they got some sort of awe and obligation; whereas you, in the excess of your contempt, do not even this. Believe me, if you stopped our mouths by putting your hands over them, the insult would not be so great as it is now. For say, whether shows greater contempt, he that hears, even when hindering by this action, or, he that will not even hear? Say—if we shall look at it as a case of an insult offered—suppose one person to check the party insulting him, and to stop his mouth, as being hurt by the insults, and another person to show no concern, but pretend not even to hear them: whether will show most contempt? Would you not say the latter? For the former shows that he feels himself hit: the latter all but stops the mouth of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252019.html'
source_title="HOMILIES ON THE ACTS OF THE APOSTLES 19"
