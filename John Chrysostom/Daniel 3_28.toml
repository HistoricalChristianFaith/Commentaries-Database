[[commentary]]
quote='''
"Blessed be God, who hath sent His Angel, and delivered his servants out of the furnace, because they trusted in Him and have changed the word of the king." "How sayest thou? Hast thou been despised, and dost thou admire those who have spit upon you?" "Yes," saith he, "and for this very reason, that I was despised." … For how can it be otherwise than astonishing for the Emperor of the world, with so many arms around him, and legions, and generals, and viceroys, and consuls, and land and sea subject to his sway, to be despised by captive children; for the bound to overcome the binder and conquer all that army? Neither was there any power in the king and his company to do what they would, no, not even with the furnaces for an ally. But they who were naked, and slaves, and strangers, and few, (for what number could be more contemptible than three?) being in chains, vanquished an innumerable army. For already now was death despised, since Christ was henceforth about to sojourn in the world. And as when the sun is on the point of rising, even before his rays appear the light of the day groweth bright; so also when the Sun of Righteousness was about to come, death henceforth began to withdraw himself. What could be more splendid than that theatre? What more conspicuous than that victory? What more signal than those new trophies of theirs?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252018.html'
source_title="HOMILIES ON 1 CORINTHIANS 18:5"


[[commentary]]
quote='''
Contemplate with me also, how first he proclaims the Arbiter of the contest. "Blessed be God, who hath sent His angel and delivered His servants." This of the power of God. He speaks also of the virtue of the combatants. "Because they trusted in Him, and have changed the king's word, and have yielded their bodies, that they might not worship any god except their own God." Could anything equal the virtue of this? Before this, when they said, "We will not serve thy gods," he was inflamed more fiercely than the very furnace; but now, when by their deeds they had taught him this, he was so far from being indignant, that he praised and admired them, for not having obeyed him! So good a thing is virtue, that it has even its enemies themselves to applaud and admire it! These had fought and conquered, but the vanquished party gave thanks, that the sight of the fire had not terrified them, but that the hope in their Lord had comforted them.… For this reason he both applauds those who had despised him, and passing by so many governors, kings, and princes, those who had obeyed him, he stands in admiration of the three captives and slaves, who derided his tyranny! For they did these things, not for the sake of contention, but for the love of wisdom; not of defiance, but of devotion; not as being puffed up with pride, but fired with zeal. For great indeed is the blessing of a hope in God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25206.html'
source_title="HOMILIES CONCERNING THE STATUES 6:13"
