[[commentary]]
quote='''
"And when they had set them in the midst, they asked, By what power, or by what name, have ye done this?" And yet they knew it well; for it was because they were "grieved that they preached through Jesus the resurrection" that they arrested them. Then for what purpose do they question them? They expected the numbers present would make them recant, and thought by this means to have put all right again.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252010.html'
source_title="Homily on Acts 10"

[[commentary]]
quote='''
His maid-servant it was that questioned Peter, and he could not bear it: in his house it was that Peter denied, when Another was in bonds there: but now, when he has come into the midst of them all, see how he speaks! "By what name have ye done this?" Why dost thou not speak it, what it is, but keepest that out of sight? "By what name have ye done this?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252010.html'
source_title="Homily on Acts 10"
