[[commentary]]
quote='''
What then, saith one, is the head of virtue? Humility. Wherefore Christ also begins with it, saying, "Blessed are the poor." This head hath not locks and ringlets, but beauty, such as to gain God's favor. For, "Unto whom shall I look," saith He, "but unto him that is meek and humble, and trembleth at my words?" And, "Mine eyes are upon the meek of the earth." And, "The Lord is nigh unto them that are of a contrite heart." This head, instead of locks, and flowing hair, bears sacrifices acceptable to God. It is a golden altar, and a spiritual place of sacrifice; "For a contrite spirit is a sacrifice to God." This is the mother of wisdom. If a man have this, he will have the rest also. Hast thou seen a head such as thou hadst never seen? Wilt thou see the face too, or rather mark it? Mark then for the present its color, how ruddy, and blooming, and very engaging; and observe what are its ingredients. "Well, and what are they?" Shame-facedness and blushing. Wherefore also some one saith, "Before a shamefaced man shall go favor." This sheds much beauty over the other members also. Though thou mix ten thousand colors, thou wilt not produce such a bloom. And if thou wilt see the eyes also, behold them exactly delineated with decency and temperance. Wherefore they become also so beautiful and sharpsighted, as to behold even the Lord Himself. For, "Blessed," saith He, "are the pure in heart, for they shall see God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252047.html'
source_title="Homily on the Gospel of Matthew 47"
