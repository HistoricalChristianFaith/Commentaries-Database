[[commentary]]
quote='''
For a work indeed it was of power, of mighty power, and such as no human diligence was equal to. For he brought three qualifications to the preaching of the word, a zeal fervent and venturous, a soul ready to undergo any possible hardship, and knowledge and wisdom combined. For his love of enterprise, his blamelessness of life, had availed nothing, had he not also received the power of the Spirit. And look at it as seen first in himself, or rather hear his own words. "That our ministration be not blamed." And again, "For our exhortation, is not of error, nor of uncleanness, nor in guile, nor a cloke of covetousness." Thus thou hast seen his blamelessness. And again, "For we take thought for things honorable, not only in the sight of the Lord, but also in the sight of men." … Without these things, the work had been impossible. It was not then by his miracles that men were made believers; no, it was not the miracles that did this, nor was it upon the ground of these that he claimed his high pretension, but upon those other grounds. For a man must be alike irreproachable in conduct, prudent and discreet in his dealings with others, regardless of danger, and apt to teach. It was by these qualifications that the greater part of his success was achieved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25206.html'
source_title="Homily on Ephesians 6"
