[[commentary]]
quote='''
"And Jesus came and touched them, and said, Arise, and be not afraid. And when they lifted up their eyes, they saw no man, save Jesus only."

But that the fear abiding so long might not drive out their recollection, presently He puts an end to their alarm, and is seen Himself alone, and commands them to tell no man this, until He is risen from the dead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252056.html'
source_title='Homily on the Gospel of Matthew 56'
