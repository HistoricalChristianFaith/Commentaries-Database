[[commentary]]
quote='''
For, when we are abandoned by God, we are given up to the devil, and when so given up, we suffer ten thousand dreadful things. To terrify the hearer, therefore, the writer saith, "He hardened," and "gave over." For to show that He doth not only not give us over, but doth not even leave us, except we will it, hear what He saith, "Do not your iniquities separate between Me and you?" And again, "They that go far away from Thee shall perish." And Hosea saith, "Thou hast forgotten the law of thy God, and I will also forget thee"; and He saith Himself also in the Gospels, "How often would I have gathered your children—and ye would not." Esaias also again, "I came, and there was no man; I called, and there was none to hearken." These things He saith, showing that we begin the desertion, and become the causes of our perdition; for God not only desireth not to leave or to punish us, but even when He punisheth, doth it unwillingly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252068.html'
source_title="Homily on John 68"
