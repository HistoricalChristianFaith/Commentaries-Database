[[commentary]]
quote='''
For which of the things in our present life seems to thee pleasant? A sumptuous table, and health of body, and glory, and wealth? Nay, these delights, if thou set them by that pleasure, will prove the bitterest of all things, compared thereunto. For nothing is more pleasurable than a sound conscience, and a good hope. And if ye would learn this, let us inquire of him who is on the point of departing hence, or of him that is grown old; and when we have reminded him of sumptuous banqueting which he hath enjoyed, and of glory and honor, and of good works which he hath some time practised and wrought, let us ask in which he exults the more; and we shall see him for the other ashamed, and covering his face, but for these soaring and leaping with joy. So Hezekiah, too, when he was sick, called not to mind sumptuous feasting, nor glory, nor royalty, but righteousness. For "remember," saith he, "how I walked before Thee in an upright way."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252053.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 53.6-7"
