[[commentary]]
quote='''
"But he that is joined unto the Lord is one spirit."

For the conjunction suffers the two no longer to be two, but makes them both one.

Now mark again, how he proceeds by means of the bare terms, conducting his accusation in the names of the harlot and of Christ.

Wherefore he saith, "He that is joined to a harlot is one body; but he that is joined to the Lord is one Spirit." For such an one becomes thenceforth Spirit, although a body envelope him. For when nothing corporeal nor gross nor earthly is around him, the body doth but merely envelope him; since the whole government of him is in the soul and the Spirit. In this way God is glorified. Wherefore both in the Prayer we are commanded to say, "Hallowed be Thy Name:" and Christ saith also, "Let your light shine before men, that they may see your good works, and glorify your Father which is in heaven."

So do the heavens also glorify Him, uttering no voice, but by the view of them attracting wonder and referring the glory unto the Great Artificer. So let us glorify Him also, or rather more than they. For we can if we will. For not so much do the heaven nor day nor night glorify God, as a holy soul. For as one that gazeth upon the beauty of the heaven, saith, "Glory be to Thee, O God! How fair a work hast thou formed!" so too when beholding virtue in any man: nay, and much more so in the latter instance. For from these works of creation all do not glorify God; but many even assert that the things which exist are self-moving: and others impute to demons the workmanship of the world and providence; and these indeed greatly and unpardonably err: but in regard to the virtue of man, no one shall have power to hold these shameless opinions, but shall assuredly glorify God when he seeth him that serveth Him living in goodness. For who shall help being astonished when one being a man, and partaking of our common nature, and living among other men, like adamant yields not at all to the swarm of passions? when he is injured, and blesses; when he is evil reported of, and praises; when he is despitefully used, and prays for those who injure him; when he is plotted against, and does good to those that fight with him and lay snares for him? For these things, and such as these, will glorify God far more than the heaven. For the Greeks when they behold the heavens feel no awe; but when they see a holy man exhibiting a severe course of life with all strictness, they shrink away and condemn themselves. Since when he that partakes of the same nature as themselves is so much above them, a great deal more so than the heaven is above the earth, even against their inclination they think that it is a Divine power which works these things. Wherefore He saith, "And glorify your Father which is in heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252018.html'
source_title="Homily on 1 Corinthians 18"
