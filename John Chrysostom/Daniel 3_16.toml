[[commentary]]
quote='''
Observe that they by a special dispensation are ignorant of the future: for if they had foreknown, there would have been nothing wonderful in their doing what they did. For what marvel is it if when they had a guarantee for safety, they defied all terrors? Then God indeed would have been glorified in that He was able to deliver from the furnace: but they would not have been wondered at, inasmuch as they would not have cast themselves into any dangers. For this cause He suffered them to be ignorant of the future that He might glorify them the more. And as they cautioned the king that he was not to condemn God of weakness though they might be burnt, so God accomplished both purposes; the shewing forth His own power and the causing the zeal of the children to appear more conspicuous.… With these words then, they entered into the fire; and they neither cast insult upon the king, nor overturned the statue.… And this is what they did at that time; shewing forth all fortitude and gentleness, and doing nothing for reward nor for recompense or return.… We then also having already our recompense, (for indeed we have it in that we have been vouchsafed the full knowledge of Him, vouchsafed to be made members of Christ,) let us take care that we make them not members of an harlot.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252018.html'
source_title="HOMILIES ON 1 CORINTHIANS 18"


[[commentary]]
quote='''
Nevertheless the reason why I admire those youths, and pronounce them blessed, and enviable, is not because they tramped on the flame, and vanquished the force of the fire: but because they were bound, and cast into the furnace, and delivered to the fire for the sake of true doctrine. For this it was which constituted the completeness of their triumph, and the wreath of victory was placed on their brows as soon as they were cast into the furnace and before the issue of events it began to be weaved for them from the moment that they uttered those words which they spoke with much boldness and freedom of speech to the king when they were brought into his presence. "We have no need to answer thee concerning this thing: for our God in Heaven whom we serve is able to rescue us out of the burning fiery furnace: and He will deliver us out of thy hands, O King. But if not, be it known unto thee, O King, that we will not serve thy Gods nor worship the golden image which thou hast set up." After the utterance of these words I proclaimed them conquerors; after these words having grasped the prize of victory, they hastened on to the glorious crown of martyrdom, following up the confession which they made through their words with the confession made through their deeds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FA%2520Treatise%2520to%2520Prove%2520that%2520No%2520One%2520Can%2520Harm%2520the%2520Man%2520Who%2520Does%2520Not%2520Injure%2520Himself.html'
source_title="NONE CAN HARM HIM WHO DOES NOT INJURE HIMSELF 17"
