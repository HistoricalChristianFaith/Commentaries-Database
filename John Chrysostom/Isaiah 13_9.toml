[[commentary]]
quote='''
Concerning that day, hear the prophets, saying, "The day of the Lord is incurable, full of anger and wrath." For there will be none to stand by, none to rescue, nowhere the face of Christ, so mild and calm. But as those who work in the mines are delivered over to certain cruel men, and see none of their friends, but those only that are set over them; so will it be then also: or rather not so, but even far more grievous. For here it is possible to go unto the king, and entreat, and free the condemned person: but there, no longer; for He permits it not, but they continue in the scorching torment, and in so great anguish, as it is not possible for words to tell.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252043.html'
source_title="Homily 43 on the Gospel of Matthew"
