[[commentary]]
quote='''
Wherefore we must cast out all wickedness from our souls, and never more contrive any deceit; for, saith one, "To the perverse God sendeth crooked paths"; and, "The holy spirit of discipline will flee deceit, and remove from thoughts that are without understanding." For nothing maketh men so foolish as wickedness; since when a man is treacherous, unfair, ungrateful, (these are different forms of wickedness,) when without having been wronged he grieves another, when he weaves deceits, how shall he not exhibit an example of excessive folly? Again, nothing maketh men so wise as virtue; it rendereth them thankful and fair-minded, merciful, mild, gentle, and candid; it is wont to be the mother of all other blessings. And what is more understanding than one so disposed? for virtue is the very spring and root of prudence, just as all wickedness hath its beginning in folly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252041.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 41"
