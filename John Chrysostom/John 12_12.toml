[[commentary]]
quote='''
(Hom. lxiv) The Law enjoined, that on the tenth day of the first month a lamb or a kid should be shut up in the house, and be kept to the fourteenth day of the same month, on the evening of which day it was sacrificed. In accordance with this law, the Elect Lamb, the Lamb without spot, when He went up to Jerusalem to be immolated for the sanctification of the people, went up five days before, i. e. on the tenth day.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
But how, after not walking openly in Jewry, and retiring into the wilderness, doth He again enter openly? Having quenched their anger by retiring, He cometh to them when they were stilled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252066.html'
source_title='Homily on the Gospel of John 66'
