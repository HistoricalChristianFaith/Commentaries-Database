[[commentary]]
quote='''
And if, "they could not," is put, instead of, "they would not," do not marvel, for He saith also in another place, "He that is able to receive it, let him receive it." So in many places He is wont to term choice, power... And what saith the Prophet? "If the Ethiopian shall change his skin, or the leopard his spots, this people also shall be able to do good, having learned evil." He saith not that the doing of virtue is impossible to them, but that because they will not, therefore they cannot.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252068.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 68"
