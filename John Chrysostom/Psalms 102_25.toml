[[commentary]]
quote='''
But if you think that the expression "by" is a mark of inferiority, (as making Christ an instrument,) hear him say, "Thou, Lord, in the beginning, hast laid the foundation of the earth, and the heavens are the work of Thy hands." He says of the Son what is said of the Father in His character of Creator; which he would not have said, unless he had deemed of Him as of a Creator, and yet not subservient to any. And if the expression "by Him" is here used, it is put for no other reason but to prevent any one from supposing the Son to be Unbegotten. For that in respect of the title of Creator He is nothing inferior to the Father; hear from Himself, where He saith, "As the Father raiseth up the dead and quickeneth them, even so the Son quickeneth whom He will." If now in the Old Testament it is said of the Son, "Thou, Lord, in the beginning hast laid the foundation of the earth," His title of Creator is plain. But if you say that the Prophet spoke this of the Father, and that Paul attributed to the Son what was said of the Father, even so the conclusion is the same.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%25205.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 5"
