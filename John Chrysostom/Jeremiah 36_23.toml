[[commentary]]
quote='''
And what manner of prophet said this? Be not curious, nor overbusy. For many of the prophetic writings have been lost; and this one may see from the history of the Chronicles. For being negligent, and continually falling into ungodliness, some they suffered to perish, others they themselves burnt up and cut to pieces. The latter fact Jeremiah relates; the former, he who composed the fourth book of Kings, saying, that after a long time the book of Deuteronomy was hardly found, buried somewhere and lost. But if, when there was no barbarian there, they so betrayed their books, much more when the barbarians had overrun them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25209.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 9:6"
