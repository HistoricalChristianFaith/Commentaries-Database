[[commentary]]
quote='''
It is probable that many Gentiles as well as Jews bad come up to the feast. So the title was written in three languages, that all might read it: And it was written in Hebrew, and Greek, and Latin.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
