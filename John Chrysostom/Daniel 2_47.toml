[[commentary]]
quote='''
But prophecy, on the contrary, is both free from reproach among the unbelievers, and hath very great credit and usefulness. For none will say in regard to prophesying, "they are mad;" nor will any one deride them that prophesy; but, on the contrary, will be astonished at and admire them.… Thus also Nebuchadnezzar worshipped God, saying, "Of a truth, your God, He is the God that revealeth secrets, seeing thou couldest reveal this secret." Seest thou the might of prophecy, how it changed that savage one and brought him under instruction and introduced him to faith?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252036.html'
source_title="HOMILIES ON 1 CORINTHIANS 36:3"


[[commentary]]
quote='''
The king here does not say, What must I do to be saved? but the teaching is plainer in his case than any language whatever; for he straightway becomes a preacher, he needs not to be instructed like the jailor. He proclaims God, and makes confession of His power. "Of a truth your God is the God of Gods and the Lord of Kings, because He hath sent His Angel, and hath delivered you." And what was the sequel? Not one single jailor, but numbers are instructed by the king's writings, by the sight of the facts. For that the king would not have told a falsehood is evident enough to every one, because he never would have chosen to bear such testimony to captives, nor to overthrow his own acts.… Perceive ye how great is the power of bonds? How great the force of those praises that are sung in tribulation?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25208.html'
source_title="HOMILIES ON EPHESIANS 8"
