[[commentary]]
quote='''
And with regard to the deluge again He did the self-same thing, by His acts excusing Himself to Noah. And also to Ezekiel in like manner, when He caused him dwelling in Babylon to see men's evil deeds in Jerusalem. And yet again to Jeremiah, when He said, "Pray not," excusing Himself He added, "Seest thou not what they do?" And everywhere He doeth the selfsame thing, as here also. For what saith He? "The men of Nineveh shall rise up, and shall condemn this generation, because they repented at the preaching of Jonas, and, behold, a greater than Jonas is here."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252043.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 43:3"
