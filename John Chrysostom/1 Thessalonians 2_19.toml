[[commentary]]
quote='''
He that will not seek his own profit in the advantage of his neighbor, will not attain unto the crowns due to this: God Himself having therefore so disposed of it, in order that we should be mutually bound together: and even as one awakening a slumbering child to follow his brother, when he is of himself unwilling, places in the brother's hand that which he desires and longs for, that through desire of obtaining it he may pursue after him that holds it, and accordingly so it takes place: thus also here, each man's own profit hath he given to his neighbor, that hence we may run after one another, and not be torn asunder. And if thou wilt, see this also in our case who address you. For my profit depends on thee, and thy advantage on me. Thus, on the one hand it profits thee to be taught the things that please God, but with this have I been entrusted, that thou mightest receive it from me, and therefore mightest be compelled to run unto me; and on the other hand it profits me that thou shouldest be made better: for the reward which I shall receive for this will be great; but this again lieth in thee; and therefore am I compelled to follow after thee that thou mayest be better, and that I may receive my profit from thee. Wherefore also Paul saith, "For what is my hope? are not even ye?" And again, "My hope, and my joy, and the crown of my rejoicing." So that the joy of Paul was the disciples, and his joy they had. Therefore he even wept when he saw them perishing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252033.html'
source_title="Homily on 1 Corinthians 33"
