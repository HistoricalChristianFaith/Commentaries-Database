[[commentary]]
quote='''
(Hom. lxv. 1) They sought before to kill Him; now their resolution was confirmed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
And, in truth, had sought to do so before; for the Evangelist saith, "Therefore the Jews sought to kill Him"; and, "Why seek ye to kill Me?" But then they only sought, now they ratified their determination, and treated the action as their business.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252065.html'
source_title='Homily on the Gospel of John 65'
