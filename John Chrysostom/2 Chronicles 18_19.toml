[[commentary]]
quote='''
For He also endured that many lowly things should be said concerning Him for the salvation of the hearers. ... In the case of Ahab it is said, "Who shall entice Ahab for Me?" And the continually preferring Himself to the gods of the heathen in the way of comparison, all these things are unworthy of God. Yet in another way they are made worthy of Him, for He is so kind, that for our salvation He careth not for expressions which become His dignity. Indeed, the becoming man is unworthy of Him, and the taking the form of a servant, and the speaking humble words, and the being clothed in humble garments, unworthy if one looks to His dignity, but worthy if one consider the unspeakable riches of His lovingkindness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252064.html'
source_title="Homily on John 64"
