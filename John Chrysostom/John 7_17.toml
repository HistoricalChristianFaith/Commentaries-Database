[[commentary]]
quote='''
"If any man will do His will, he shall know of the doctrine, whether it be of God, or whether I speak of Myself." What He saith is this, "Cast out from yourselves the malice and wrath and envy and hatred which has without cause been conceived against Me, then there is nothing to hinder you from knowing that My words are indeed the words of God. For at present these things cast a darkness over you, and destroy the light of right judgment, while if ye remove them this shall no longer be your case." Yet He spake not (plainly) thus, (for so He would have confounded them exceedingly,) but implied it all by saying, "He that doeth His will shall know of the doctrine, whether it is of God, or whether I speak of Myself"; that is, "whether I speak anything different and strange and contrary to God." For, "of Myself" is always put with this meaning, that "I say nothing except what seemeth good to Him, but all that the Father willeth, I will also."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title="Homily on the Gospel of John 49"

[[commentary]]
quote='''
"If any man do His will, he shall know of the doctrine." What meaneth, "If any man do His will?" "If any man be a lover of the life which is according to virtue, he shall know the power of the sayings." "If any man will give heed to the prophecies, to see whether I speak according to them or not."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title="Homily on the Gospel of John 49"
