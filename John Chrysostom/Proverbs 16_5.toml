[[commentary]]
quote='''
Because nothing so alienates men from the lovingkindness of God, and gives them over to the fire of the pit, as the tyranny of pride. For when this is present with us, our whole life becomes impure, even though we fulfill temperance, chastity, fasting, prayer, almsgiving, anything. For, "Every one," saith the wise man, "that is proud in heart is an abomination to the Lord." Let us then restrain this swelling of the soul, let us cut up by the roots this lump of pride, if at least we would wish to be clean, and to escape the punishment appointed for the devil. For that the proud must fall under the same punishment as that (wicked) one, hear Paul declare; "Not a novice, lest being lifted up with pride, he fall into the judgment, and the snare of the devil." What is "the judgment"? He means, into the same "condemnation," the same punishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%25209.html'
source_title="Homilies on the Gospel of John 9"
