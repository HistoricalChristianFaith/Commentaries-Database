[[commentary]]
quote='''
Wherefore then was he punished that was gathering the sticks? Because if the laws were to be despised even at the beginning, of course they would scarcely be observed afterwards.

For indeed the Sabbath did at the first confer many and great benefits; for instance, it made them gentle towards those of their household, and humane; it taught them God's providence and the creation, as Ezekiel saith; it trained them by degrees to abstain from wickedness, and disposed them to regard the things of the Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252039.html'
source_title="Homily on Matthew 39"


[[commentary]]
quote='''
The Law, if it lay hold on a murderer, putteth him to death; the Gospel, if it lay hold on a murderer, enlighteneth, and giveth him life. And why do I instance a murderer? The Law laid hold on one that gathered sticks on a sabbath day, and stoned him. This is the meaning of, "the letter killeth." The Gospel takes hold on thousands of homicides and robbers, and baptizing delivereth them from their former vices.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%25206.html'
source_title="Homily on 2 Corinthians 6"
