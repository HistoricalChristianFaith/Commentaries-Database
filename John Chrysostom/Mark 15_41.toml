[[commentary]]
quote='''
For what reason then was He maintained by women? For women, it is said, followed Him, and ministered unto Him. It was to teach us from the first that He is concerned for those who do good. Could not Paul, who supported others by his own hands, have maintained himself without assistance from others? But you see him receiving and requesting aid. And hear the reason for it. "Not because I desire a gift," he says, "but I desire fruit that may abound to your account." And at the beginning too, when men sold all their possessions and laid them at the Apostles' feet, the Apostles, seest thou, were more concerned for them than for those who received their alms. For if their concern had only been that the poor might by any means be relieved, they would not have judged so severely of the sin of Ananias and Sapphira, when they kept back their money.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Titus%2FHomily%25206.html'
source_title="HOMILIES ON TITUS 6"
