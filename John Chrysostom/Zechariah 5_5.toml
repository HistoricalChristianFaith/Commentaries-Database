[[commentary]]
quote='''
For "now," saith he, "the axe is laid unto the root of the trees." There is nothing more terrible than this turn of his discourse. For it is no longer "a flying sickle," nor "the taking down of a hedge," nor "the treading under foot of the vineyard;" but an axe exceeding sharp, and what is worse, it is even at the doors. For inasmuch as they continually disbelieved the prophets, and used to say, "Where is the day of the Lord?" and "let the counsel of the Holy One of Israel come, that we may know it," by reason that it was many years before what they said came to pass; to lead them off from this encouragement also, he sets the terrors close to them. And this he declared by saying "now," and by his putting it to "the root." "For the space between is nothing now," saith he, "but it is laid to the very root." And he said not, "to the branches," nor "to the fruits," but "to the root." Signifying, that if they were negligent, they would have incurable horrors to endure, and not have so much as a hope of remedy. It being no servant who is now come, as those before Him were, but the very Lord of all, bringing on them His fierce and most effectual vengeance. Yet, although he hath terrified them again, he suffers them not to fall into despair; but as before he said not "He hath raised up," but "He is able to raise up children to Abraham" (at once both alarming and comforting them); even so here also he did not say that "it hath touched the root," but "it is laid to the root, and is now hard by it, and shows signs of no delay." However, even though He hath brought it so near, He makes its cutting depend upon you. For if ye change and become better men, this axe will depart without doing anything; but if ye continue in the same ways, He will tear up the tree by the roots.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252011.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 3:7.4"
