[[commentary]]
quote='''
But how, after not walking openly in Jewry, and retiring into the wilderness, doth He again enter openly? Having quenched their anger by retiring, He cometh to them when they were stilled. Moreover, the multitude which went before and which followed after was sufficient to cast them into an agony; for no sign so much attracted the people as that of Lazarus. And another Evangelist saith, that they strewed their garments under His feet, and that "the whole city was moved"; with so great honor did He enter. And this He did, figuring one prophecy and fulfilling another; and the same act was the beginning of the one and the end of the other. For the, "Rejoice, for thy King cometh unto thee meek," belonged to Him as fulfilling a prophecy, but the sitting upon an ass was the act of one prefiguring a future event, that He was about to have the impure race of the Gentiles subject to Him. ... But what meaneth, "Rejoice greatly, daughter of Zion"? Because all their kings had for the most part been an unjust and covetous kind of men, and had given them over to their enemies, and had perverted the people, and made them subject to their foes; "Be of good courage," It saith, "this is not such an one, but meek and gentle"; as is shown by the ass, for He entered not with an army in His train, but having an ass alone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252066.html'
source_title="HOMILIES ON JOHN 66:1"
