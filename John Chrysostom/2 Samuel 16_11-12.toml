[[commentary]]
quote='''
For if we suffer evil at the hands of men, we cut off no small part of our debt by bearing what is done to us nobly. We receive therefore no injury; for God reckons the ill-treatment towards our debt, not according to the principle of justice but of His loving-kindness; and because He succored not him that suffered evil. "Whence doth this appear?" saith one. The Jews once suffered evil at the hand of the Babylonians; and God did not prevent it: but they were carried away, children and women; yet afterwards did this captivity become a consolation to them in respect of their sins. Therefore He saith to Isaiah, "Comfort ye, comfort ye My people, ye priests: speak unto the heart of Jerusalem, for she hath received of the Lord's hand double for sins." And again; "Grant us peace, for Thou hast repaid us every thing." And David saith; "Behold mine enemies, for they are multiplied; and forgive all my sins." And when he bore with Shimei cursing him, he said, "Let him alone, that the Lord may see my abasement, and requite me good for this day." For when He aideth us not when we suffer wrong, then most of all are we advantaged; for He sets it to the account of our sins, if we bear it thankfully.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%252023.html'
source_title="HOMILIES ON 2 CORINTHIANS 23.7"
