[[commentary]]
quote='''
Having then given to the question that answer which was furnished by facts, in order to give his discourse the advantage of other testimony in its favor, he introduces the prophets also making the same declarations aforetime. For Hosea, he says, of old put this in writing, as follows: "I will call them My people, which were not My people; and her beloved, which was not beloved." Here to prevent their saying, that you are deceiving us here with specious reasoning, he calls Hosea to witness, who crieth and saith, "I will call them My people, who were not My people." Who then are the not-people? Plainly, the Gentiles. And who the not-beloved? The same again. However, he says, that they shall become at once people, and beloved, and sons of God. "For even they shall be called," he says, "the children of the living God." But if they should assert that this was said of those of the Jews who believed, even then the argument stands. For if with those who after so many benefits were hard-hearted and estranged, and had lost their being as a people, so great a change was wrought, what is there to prevent even those who were not estranged after being taken to Him, but were originally aliens, from being called, and, provided they obey, from being counted worthy of the same blessings? Having then done with Hosea, he does not content himself with him only, but also brings Isaiah in after him, sounding in harmony with him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252016.html'
source_title="HOMILIES ON ROMANS 16"
