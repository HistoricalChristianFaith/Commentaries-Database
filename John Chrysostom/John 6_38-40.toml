[[commentary]]
quote='''
"I came down from heaven not to do Mine own will, but the will of Him that sent Me." What sayest Thou? Why, is Thy will one, and His another? That none may suspect this, He explaineth it by what follows, saying; "And this is the will of Him that sent Me, that every one which seeth the Son, and believeth on Him, may have everlasting life." Is not then this Thy will? And how sayest Thou, "I am come to send fire upon the earth, and what have I desired to see, if that be already kindled"? For if Thou also desirest this, it is very clear that Thy will and the Father's is one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252045.html'
source_title='Homily on the Gospel of John 45'

[[commentary]]
quote='''
In another place also He saith, "For as the Father raiseth up the dead and quickeneth them, even so the Son quickeneth whom He will." But what is the will of the Father? Is it not, that not so much as one of them should perish? This Thou willest also. So that the will of the One differeth not from the will of the Other. So in another place He is seen establishing yet more firmly His equality with the Father, saying, "I and My Father will come, and will make Our abode with him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252045.html'
source_title='Homily on the Gospel of John 45'

[[commentary]]
quote='''
(Hom. xliv. 2) Whoever then, our Lord says, cometh to Me, shall be saved, for to save such I took up flesh: For I came down from heaven not to do Mine own will, but the will of Him that sent Me. But what? Has thou one will, He another? No, certainly. Mark what He says afterwards; And this is the will of Him that sent Me, that every one which seeth the Son, and believeth on Him, should have everlasting life. And this is the Son's will too; For the Son quickeneth whom He will. (c. 5:21) He says then, I came to do nothing but what the Father wills, for I have no will distinct from My Father's: all things that the Father hath are Mine. But this not now: He reserves these higher truths for the end of His ministry.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
