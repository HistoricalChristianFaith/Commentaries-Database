[[commentary]]
quote='''
When I think of the past tempest, and of the present calm, I cease not saying, "Blessed be God, who maketh all things, and changeth them; who hath brought light out of darkness; who leadeth to the gates of hell, and bringeth back; who chastiseth, but killeth not." And this I desire you too to repeat constantly, and never to desist. For if He hath benefitted us by deeds, what pardon shall we deserve, if we do not requite Him even by words. Therefore, I exhort that we never cease to give Him thanks; since if we are grateful for the former benefits, it is plain that we shall enjoy others also, which are greater. Let us say, then, continually, Blessed be God, who hath permitted us to spread before you in security the accustomed table, whilst He hath also granted you to hear our word with assurance of safety! Blessed be God, that we no longer run hither flying from the danger without, but only from desire to hear; that we no longer meet one another with agony, trembling, and anxious thoughts; but with much confidence, having shaken off all our fear. Our condition, indeed, on former days was nothing better than that of those who are tossed up and down in the midst of the deep; and expecting shipwreck every hour. We were scared all day long by innumerable rumours, and disturbed and agitated on every side; and were every day busy and curious to know who had come from the court? what news he had brought? and whether what was reported was true or false? Our nights too we passed without sleep, and whilst we looked upon the city, we wept over it, as if it were on the eve of its destruction.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252011.html'
source_title="Concerning the Statues, Homily 11"


[[commentary]]
quote='''
See how highly God has honored us, in committing to us so excellent a frame. I made heaven and earth, He says, and to you I give the power of creation. Make your earth heaven. For it is in thy power. "I am He that maketh and transformeth all things" (Amos v. 8, Sept.), saith God of Himself. And He hath given to men a similar power; as a painter, being an affectionate father, teaches his own art to his son. I formed thy body beautiful, he says, but I give thee the power of forming something better. Make thy soul beautiful. I said, "Let the earth bring forth grass, and every fruitful tree." Do thou also say, Let this earth bring forth its proper fruit, and what thou willest to produce will be produced. "I make the summer and the cloud. I create the lightning and the wind." I formed the dragon, that is, the devil, to make sport with him. Nor have I grudged thee the like power. Thou, if thou wilt, canst sport with him, and bind him as thou wouldest a sparrow. I make the sun to rise upon the evil and the good: do thou imitate Me, by imparting of that is thine to the good and the evil. When mocked I bear with it, and do good to those who mock Me: do thou imitate Me, as thou canst. I do good, not to be requited; do thou imitate Me, and do good, not to be repaid.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%252015.html'
source_title="Homily 15 on 1 Timothy"
