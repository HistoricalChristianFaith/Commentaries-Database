[[commentary]]
quote='''
(Hom. xlix. 1) What His teaching is, the Evangelist does not say; but that it was very wonderful is shown by its effect even upon those who had accused Him of deceiving the people, who turned round and began to admire Him: And the Jews marvelled, saying, How knoweth this Man letters, having never learned? See how perverse they are even in their admiration. It is not His doctrine they admire, but another thing altogether.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"How knoweth this man letters, having never learned?" Observest thou how the Evangelist showeth here also their marveling to be full of wickedness? for he saith not, that they admired the teaching, or that they received the words, but simply that they "marveled." That is, were thrown into a state of astonishment, and doubted, saying, "Whence hath this man these things"? when they ought from this very difficulty to have known that there was nothing merely human in Him. But because they would not confess this, but stopped at wondering only, hear what He saith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title='Homily on the Gospel of John 49'
