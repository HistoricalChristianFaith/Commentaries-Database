[[commentary]]
quote='''
"Thou shalt not pity," It saith, "the poor in judgment." (Ex. xxiii. 3.) What is meant? "Be not broken down, nor bent," It saith, "if he that doth the wrong be a poor man." Now if you may not favor a poor man, much less a rich. And this I say not only to you who are judges, but to all men, that they nowhere pervert justice, but preserve it everywhere pure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 49"
