[[commentary]]
quote='''
And these also behold, that they may wonder the more. "And he shook off the beast into the fire, and felt no harm. Howbeit they looked when he should have swollen, or fallen down dead suddenly: but after they had looked a great while, and saw no harm come to him, they changed their minds, and said that he was a god." They expected him, it says, to fall down dead: and again, having seen that nothing of the kind happened to him, they said, He is a god. Again, another excess on the part of these men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252054.html'
source_title="Homily on Acts 54"

[[commentary]]
quote='''
But when he shook his hand, and flung off the beast, then they saw and were astonished. And the miracle did not take place suddenly, but the men went by the length of time, "after they had looked a great while," so plainly was there no deceit, no haste here.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252054.html'
source_title="Homily on Acts 54"
