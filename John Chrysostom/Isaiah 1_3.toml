[[commentary]]
quote='''
He calleth the action "glory," not only for Himself the Crucified, but also for the Father; since this was the case, for not the Son only, but the Father also was glorified. For before the Crucifixion, not even the Jews knew Him; "Israel," it saith, "hath not known Me" (Isa. i. 3); but after the Crucifixion, all the world ran to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252080.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 80"
