[[commentary]]
quote='''
For nothing, nothing is more powerful than a pious and sensible woman to bring a man into proper order, and to mould his soul as she will. For he will not endure friends, or teachers, or rulers, as he will his partner advising and counseling him, since the advice carries even some pleasure with it, because she who gives the counsel is greatly loved. I could tell of many hard and disobedient men who have been softened in this way. For she who shares his table, his bed, and his embraces, his words and secrets, his comings in and goings out, and many other things, who is entirely given up and joined to him, as it is likely that a body would be joined to a head, if she happen to be discreet and well attuned, will go beyond and excel all others in the management of her husband. Wherefore I exhort women to make this their employment, and to give fitting counsel. For as they have great power for good, so have they also for evil. A woman destroyed Absalom, a woman destroyed Amnon, a woman was like to have destroyed Job, a woman rescued Nabal from the slaughter. Women have preserved whole nations; for Deborah and Judith exhibited successes worthy of men; so also do ten thousand other women. Wherefore Paul saith, "For what knowest thou, O wife, whether thou shall save thy husband?" And in those times we see Persis and Mary and Priscilla taking part in the labors of the Apostles; whom we also needs must imitate, and not by words only, but also by actions, bring into order him that dwelleth with us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252061.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 61"
