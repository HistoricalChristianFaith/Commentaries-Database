[[commentary]]
quote='''
Then of virtue also He brings forward different forms. For being full of love to man, He marked out not one only way, nor did He say, "unless one bring forth an hundred, he is an outcast;" but he that brings forth sixty is saved also, and not he only, but also the producer of thirty. And this He said, making out salvation to be easy.

And thou then, art thou unable to practise virginity? Be chaste in marriage. Art thou unable to strip thyself of thy possessions? Give of thy substance. Canst thou not bear that burden? Share thy goods with Christ. Art thou unwilling to yield Him up all? Give Him but the half, but the third part. He is thy brother, and joint-heir, make Him joint-heir with thee here too. Whatsoever thou givest Him, thou wilt give to thyself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252045.html'
source_title='Homily on the Gospel of Matthew 45'
