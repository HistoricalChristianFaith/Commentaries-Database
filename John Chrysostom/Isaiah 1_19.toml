[[commentary]]
quote='''
"If ye be willing and obedient," He saith, "ye shall eat the good of the land." Seest thou that there needs the will only? will—not the common wishing of the multitude—but earnest will. For I know that all are wishing to fly up to heaven even now; but it is necessary to show forth the wish by works. The merchant too wishes to get rich; but he doth not allow his wish to stop with the thought of it; no, he fits out a ship, and gets together sailors, and engages a pilot, and furnishes the vessel with all other stores, and borrows money, and crosses the sea, and goes away into a strange land, and endures many dangers, and all the rest which they know who sail the sea. So too must we show our will; for we also sail a voyage, not from land to land, but from earth to heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%25201.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 1"


[[commentary]]
quote='''
"If ye be willing, and will hearken unto me, ye shall eat the good of the land; but if ye be not willing, the sword shall devour you." But perhaps one will say, "I am willing; (and no one is so void of understanding as not to be willing;) but to will is not sufficient for me." Nay, but it is sufficient, if thou be duly willing, and do the deeds of one that is willing. But as it is, thou art not greatly willing.… For he that wills a thing as he ought, puts also his hand unto the means which lead to the object of his desire. Thus, when hunger compels thee to take nourishment, thou waitest not for the viands to come unto thee of their own accord, but omittest nothing to gather victuals together. So in thirst, and cold and all other such things, thou art industrious and duly prepared to take care of the body. Now do this in respect of God's kingdom also, and surely thou shalt obtain it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252014.html'
source_title="HOMILIES ON 1 CORINTHIANS 14:5 (3)"
