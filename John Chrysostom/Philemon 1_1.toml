[[commentary]]
quote='''
"Paul, a prisoner of Jesus Christ," saith he, "and Timothy the brother." Great is the designation of Paul: no title of principality and power, but he speaks of bonds and chains! Truly great indeed! Although many other things made him illustrious; his being caught up into the third heaven, his being transported to Paradise, his hearing unutterable words; yet he sets down none of these, but mentions the chain instead of all, for this made him more conspicuous and illustrious than these. And why so? Because the one were the free gifts of the Lord's lovingkindness; and the other the marks of the constancy and patience of the servant. But it is customary with those who love, to glory more in the things which they suffer for those who are beloved, than in the benefits they receive from them. A king is not so proud of his diadem, as Paul gloried in his chains. And very justly. For a diadem affords but an ornament to the crowned head; but the chain is a much greater ornament as well as a security.… But he, instead of all such titles, says, "Paul the prisoner." And very rightly. For those magisterial offices are no complete evidences of virtue in respect to the soul; for they are to be purchased by money, and obtained by the solicitations of friends; but this distinction that is obtained by bonds is a proof of the soul's love of wisdom, and the strongest sign of a longing for Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252016.html'
source_title="Homily Concerning the Statues 16"

[[commentary]]
quote='''
These things are said to a master in behalf of a servant. Immediately at the outset, he has pulled down his spirit, and not suffered him to be ashamed, he has quenched his anger; calling himself a prisoner, he strikes him with compunction, and makes him collect himself, and makes it appear that present things are nothing. For if a chain for Christ's sake is not a shame but a boast, much more is slavery not to be considered a reproach. And this he says, not exalting himself, but for a good purpose doing this, showing thence that he was worthy of credit; and this he does not for his own sake, but that he may more readily obtain the favor. As if he had said, "It is on your account that I am invested with this chain." As he also has said elsewhere, there indeed showing his concern, but here his trustworthiness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Philemon%2FHomily%25201.html'
source_title="Homily on Philemon 1"

[[commentary]]
quote='''
Nothing is greater than this boast, to be called "the stigmatized of Christ." "For I bear in my body the marks of the Lord Jesus." (Gal. vi. 17.)

"The prisoner of the Lord." For he had been bound on His account. Who would not be struck with awe, who would not be humbled when he hears of the chains of Christ? Who would not be ready to give up even his own life, much less one domestic?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Philemon%2FHomily%25201.html'
source_title="Homily on Philemon 1"

[[commentary]]
quote='''
"And Timothy our brother."

He joins another also with himself, that he, being entreated by many, may the more readily yield and grant the favor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Philemon%2FHomily%25201.html'
source_title="Homily on Philemon 1"

[[commentary]]
quote='''
"Unto Philemon our dearly beloved, and fellow-laborer."

If "beloved," then his confidence is not boldness nor forwardness, but a proof of much affection. If a "fellow-laborer," then not only may he be instructed in such a matter, but he ought to acknowledge it as a favor. For he is gratifying himself, he is building up the same work. So that apart from any request, he says, thou hast another necessity for granting the favor. For if he is profitable to the Gospel, and thou art anxious to promote the Gospel, then oughtest thou not to be entreated, but to entreat.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Philemon%2FHomily%25201.html'
source_title="Homily on Philemon 1"
