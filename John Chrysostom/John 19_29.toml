[[commentary]]
quote='''
(Hom. lxxxv) They were not softened at all by what they saw, but were the more enraged, and gave Him the cup to drink, as they did to criminals, i. e. with a hyssop.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
