[[commentary]]
quote='''
In order that those (workmen) also might become more reasonable, he says: "Wherefore if Demetrius, and the craftsman which are with him, have a matter against any man, the law is open, and there are deputies: let them implead one another. But if ye enquire anything concerning other matters, it shall be determined in a lawful assembly. For we are in danger to be called in question for this day's uproar, there being no cause, for which (matter) we shall not be able to give an account for this concourse." "A lawful assembly," he says, for there were three assemblies according to law in each month; but this one was contrary to law. Then he terrified them also by saying, "We are in danger to be called to account" for sedition.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252042.html'
source_title="Homily on Acts 42"
