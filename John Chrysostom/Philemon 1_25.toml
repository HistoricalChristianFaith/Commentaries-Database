[[commentary]]
quote='''
"The grace of our Lord Jesus Christ be with your spirit. Amen."

He hath closed his Epistle with a prayer. And indeed prayer is a great good, salutary, and preservative of our souls. But it is great when we do things worthy of it, and do not render ourselves unworthy. And thou too, therefore, when thou goest to the priest, and he shall say to thee, "The Lord will have mercy on thee, my son," do not confide in the word only, but add also works. Do acts worthy of mercy, God will bless thee, my son, if indeed thou doest things worthy of blessing. He will bless thee, if thou showest mercy to thy neighbor. For the things which we wish to obtain from God, of those we ought first to impart to our neighbors. But if we deprive our neighbors of them, how can we wish to obtain them? "Blessed," He says, "are the merciful: for they shall obtain mercy." For if men show mercy to such, much more will God, but to the unmerciful by no means. "For he shall have judgment without mercy to him that hath showed no mercy."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Philemon%2FHomily%25203.html'
source_title="Homily on Philemon 3"
