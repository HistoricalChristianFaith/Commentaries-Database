[[commentary]]
quote='''
He showeth that they neither know the Law, nor do the Law; for if that Law commandeth to kill no man without first hearing him, and they before hearing were eager for this deed, they were transgressors of the Law. And because they said, "None of the rulers hath believed on him" (ver. 50), therefore the Evangelist informs us that Nicodemus was "one of them," to show that even rulers believed on Him; for although they showed not yet fitting boldness, still they were becoming attached to Christ. Observe how cautiously he rebukes them; he said not, "Ye desire to kill him, and condemn the man for a deceiver without proof"; but spake in a milder way, hindering their excessive violence, and their inconsiderate and murderous disposition. Wherefore he turns his discourse to the Law, saying, "Except it hear him carefully, and know what he doeth." So that not a bare "hearing," but "careful hearing" is required. For the meaning of, "know what he doeth," is, "what he intendeth," "on what account," "for what purpose," "whether for the subversion of the order of things and as an enemy."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252052.html'
source_title="Homily on the Gospel of John 52"
