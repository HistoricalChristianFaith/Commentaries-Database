[[commentary]]
quote='''
"For verily I say unto you, many prophets and righteous men have desired to see those things which ye see, and have not seen them, and to hear those things which ye hear, and have not heard them;" my coming, He means; my very miracles, my voice, my teaching. For here He prefers them not to these depraved only, but even to such as have done virtuously; yea, and He affirms them to be more blessed even than they. Why can this be? Because not only do these see what the Jews saw not, but even what those of old desired to see. For they indeed beheld by faith only: but these by sight too, and much more distinctly.

Seest thou how again He connects the old dispensation with the new, signifying that those of old not only knew the things to come but also greatly desired them? But had they pertained to some strange and opposing God, they would never have desired them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252045.html'
source_title='Homily on the Gospel of Matthew 45'
