[[commentary]]
quote='''
Or having sins unrepented they ask mercy, which thing it is impossible to receive, not only if themselves ask it, but although others having much confidence towards God entreat for them, like as even Jeremiah praying for the Jews did hear, "Pray not thou for this people, because I will not hear thee." But if all things are there, and thou ask things expedient, and contribute all thine own part, and exhibit an apostolical life, and have concord and love towards thy neighbor, thou wilt obtain on thy entreaty; for the Lord is loving towards man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252060.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 60:2"


[[commentary]]
quote='''
"How then do they not obtain all things?" Because many are causes of their failing. For either they often ask things inexpedient. And why marvellest thou, if this is the case with some others, whereas it was so even with Paul, when he heard, "My grace is sufficient for thee; for my strength is perfected in weakness." Or they are unworthy to be reckoned with them that heard these words, and contribute not their own part, but He seeks for such as are like them; therefore He saith "of you," of the virtuous, of them that show forth an angelic rule of life. Or they pray against them that have aggrieved them, seeking for redress and vengeance; and this kind of thing is forbidden, for, "Pray," saith He, "for your enemies." Or having sins unrepented they ask mercy, which thing it is impossible to receive, not only if themselves ask it, but although others having much confidence towards God entreat for them, like as even Jeremiah praying for the Jews did hear, "Pray not thou for this people, because I will not hear thee."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252060.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 60:2"
