[[commentary]]
quote='''
But what God really is, not only have not the prophets seen, but not even angels nor archangels. If you ask them, you shall not hear them answering anything concerning His Essence, but sending up, "Glory to God in the Highest, on earth peace, good will towards men." If you desire to learn something from Cherubim or Seraphim, you shall hear the mystic song of His Holiness, and that "heaven and earth are full of His glory." If you enquire of the higher powers, you shall but find that their one work is the praise of God. "Praise ye Him," saith David, "all His hosts."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252015.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 15"
