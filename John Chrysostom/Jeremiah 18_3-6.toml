[[commentary]]
quote='''
When, therefore, God speaks of an irremediable calamity, he does not say vessels of the potter, but an earthen vessel; when, for instance, he wished to teach the prophet and the Jews that he delivered up the city to an irremediable calamity, he bade him take an earthen wine-vessel, and crush it before all the people, and say, "Thus shall this city be destroyed, be broken in pieces." But when he wishes to hold out good hopes to them, he brings the prophet to a pottery, and does not show him an earthen vessel, but shows him a vessel of clay, which was in the hands of the potter, falling to the ground: and brings him to it saying, "If this potter has taken up and remodelled his vessel which has fallen, shall I not much rather be able to restore you when you have fallen?" It is possible therefore for God not only to restore those who are made of clay, through the laver of regeneration, but to bring back again to their original state, on their careful repentance, those who have received the power of the Spirit, and have lapsed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FInstructions%2520to%2520Catechumens%2FFirst%2520Instruction.html'
source_title="INSTRUCTIONS TO CATECHUMENS 1:4"
