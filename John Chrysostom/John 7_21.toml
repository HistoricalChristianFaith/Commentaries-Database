[[commentary]]
quote='''
The meaning of, "Ye marvel" (Matt. xii. 5) is, "Ye are confused," "are troubled." For if the Law was to be lasting, circumcision would not have been more authoritative than it. And He said not, "I have done a thing greater than circumcision," but abundantly refuteth them...
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title="Homily on the Gospel of John 49"
