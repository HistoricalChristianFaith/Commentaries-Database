[[commentary]]
quote='''
For the Athenians, although fond of hearing strange things, nevertheless did not attend (to him); for this was not their study, but only to be always having something to say; which was the cause that made them hold off from him. But if this was their custom, how is it that they accuse him, "he seemeth to be a setter forth of strange gods?" Yes, but these were matters they did not at all know what to make of. Howbeit, he did convert both Dionysius the Areopagite, and some others. For those who were careful of (right) living, quickly received the word; but the others not so.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252039.html'
source_title="Homily on Acts 39"

[[commentary]]
quote='''
"And when they heard," what great and lofty doctrines, they did not even attend, but jeered at the Resurrection! "For the natural man," it saith, "receiveth not the things of the Spirit."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252039.html'
source_title="Homily on Acts 39"
