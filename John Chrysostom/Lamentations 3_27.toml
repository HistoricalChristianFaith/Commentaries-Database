[[commentary]]
quote='''
For affliction is an unbroken bond, the increase of love, the occasion of compunction and piety. Hear the words of David, "It is good for me that I have been afflicted, that I might learn Thy statutes." And again another prophet, who saith, "It is good for a man that he bear the yoke in his youth." And again, "Blessed is the man whom Thou chastenest, O Lord." And another who saith, "Despise not the chastening of the Lord." And "if thou come near to serve the Lord, prepare thy soul for temptation." And Christ also said to His disciples, "In the world ye shall have tribulation, but be of good cheer." And again, "Ye shall weep and lament, but the world shall rejoice." And again, "Narrow and straitened is the way." Dost thou see how tribulation is everywhere lauded, everywhere assumed as needful for us? For if in the contests of the world, no one without this receiveth the crown, unless he fortify himself by toil, by abstinence from delicacies, by living according to rule, by watchings, and innumerable other things, much more so here. For whom wilt thou name as an instance? The king? Not even he liveth a life free from care, but one burdened with much tribulation and anxiety. For look not to his diadem, but to his sea of cares, by which the crown is produced for him. Nor look to his purple robe, but to his soul, which is darker than that purple. His crown doth not so closely bind his brow, as care doth his soul. Nor look to the multitude of his spearmen, but to the multitude of his disquietudes. For it is not possible to find a private house laden with so many cares as a king's palace. Violent deaths are each day expected, and a vision of blood is seen as they sit down to eat and drink. Nor can we say how oft he is disturbed in the night season, and leaps up, haunted with visions. And all this in peace; but if war should overtake him, what could be more piteous than such a life as this! What evils has he from those that are his own, I mean, those who are under his dominion. Nay, and of a truth the pavement of a king's house is always full of blood, the blood of his own relations.… But as I said, life cannot be without pain. For if in the affairs of this world even he who is accounted most happy, if the king is burdened with so many misfortunes, what thinkest thou must be true of private life?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Philippians%2FHomily%252015.html'
source_title="HOMILIES ON PHILIPPIANS 15"
