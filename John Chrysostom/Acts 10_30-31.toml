[[commentary]]
quote='''
What then does Cornelius? He does not say, Why, did not the soldiers tell thee? but observe again, how humbly he speaks. For he says, "From the fourth day I was fasting until this hour; and at the ninth hour I prayed in my house, and, behold, a man stood before me in bright clothing, and said, Cornelius, thy prayer is heard, and thine alms are come up for a memorial before God." "And at the ninth hour," he says, "I was praying." It seems to me, that this man had also fixed for himself set times of a life under stricter rule, and on certain days. For this is why he says, "From the fourth day." See how great a thing prayer is! When he advanced in piety, then the Angel appears to him. "From the fourth day:" i.e. of the week; not "four days ago." For, "on the morrow Peter went away with them, and on the morrow after they entered into Caesarea:" this is one day: and the day on which the persons sent came (to Joppa) one day: and on the third (the Angel) appeared: so that there are two days after that on which (Cornelius) had been praying. "And, behold, a man stood before me in bright clothing:" he does not say, an Angel, so unassuming is he: "and said, Cornelius, thy prayer is heard, and thine alms are had in remembrance in the sight of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252023.html'
source_title="Homily on Acts 23"
