[[commentary]]
quote='''
But in what place, pray, will it be? Somewhere as I think at least quite out of the pale of this world. For as the prisons and mines are at a great distance from royal residences, so will hell be somewhere out of this world. Seek we not then to know where it is, but how we may escape it. Neither yet because God doth not punish all here, therefore disbelieve things to come. For merciful and long-suffering He is: that is why he threatens, and does not cast us into it forthwith. For "I desire not," He says, "the death of a sinner." But if there is no death of a sinner, the words are but idle. And I know indeed that there is nothing less pleasant to you than these words. But to me nothing is pleasanter.… Let us then continually employ ourselves with talking about these things. For to remember hell prevents our falling into hell. Dost thou not hear St. Paul saying, "Who shall suffer everlasting punishment from the face of the Lord?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252031.html'
source_title="Homily on Romans 31"
