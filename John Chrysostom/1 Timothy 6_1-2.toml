[[commentary]]
quote='''
But if this be not the meaning, if he bade them forsake their masters and strive contentiously to become free, in what sense did he exhort them, saying, "Let each one remain in the calling in which he is called?" And in another place, "As many servants as are under the yoke, let them count their own masters worthy of all honor; and those that have believing masters, let them not despise them, because they are brethren who partake of the benefit." And writing to the Ephesians also and to the Colossians, he ordains and exacts the same rules. Whence it is plain that it is not this slavery which he annuls, but that which caused as it is by vice befalls free men also: and this is the worst kind of slavery, though he be a free man who is in bondage to it. For what profit had Joseph's brethren of their freedom? Were they not more servile than all slaves; both speaking lies to their father, and to the merchants using false pretences, as well as to their brother? But not such was the free man: rather every where and in all things he was true. And nothing had power to enslave him, neither chain nor bondage nor the love of his mistress nor his being in a strange land. But he abode free every where. For this is liberty in the truest sense when even in bondage it shines through.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252019.html'
source_title="HOMILIES ON FIRST CORINTHIANS 19.4"
