[[commentary]]
quote='''
And sayest thou, How is it possible for one that is man not to mourn?… Say not then, "He is perished and shall no more be;" for these be the words of unbelievers; but say, "He sleepeth and will rise again," "He is gone a journey and will return with the King." Who sayeth this? He that hath Christ speaking in him. "For," saith he, "if we believe that Jesus died and rose again" and revived, "even so them also which sleep in Jesus will God bring with Him." If then thou seek thy son, there seek him where the King is, where is the army of the Angels; not in the grave; not in the earth; lest whilst he is so highly exalted, thyself remain grovelling on the ground.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%25201.html'
source_title="Homily on 2 Corinthians 1"
