[[commentary]]
quote='''
How then, one may say, are James and the others called His brethren? In the same kind of way as Joseph himself was supposed to be husband of Mary. For many were the veils provided, that the birth, being such as it was, might be for a time screened. Wherefore even John so called them, saying, "For neither did His brethren believe in Him."
'''
source_url='https://www.newadvent.org/fathers/200105.htm'
source_title='Homily 5 on Matthew, Section 5'

[[commentary]]
quote='''
Therefore were they in all things insensate, seeing they lightly esteemed Him on account of him who was regarded as His father, notwithstanding the many instances in old times of sons illustrious sprung from ignoble fathers; as David was the son of a husbandman, Jesse; Amos the son of a shepherd, himself a shepherd. And they ought to have given Him more abundant honour, because, that coming of such parents, He spake after such manner; clearly showing that it came not of human industry, but of divine grace.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
