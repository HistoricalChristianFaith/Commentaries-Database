[[commentary]]
quote='''
Then sacred Scripture goes on from this point to tell of the children born to the sons in these words: “Now, Ham became the father of Cush”; and further, “Now, Cush became the father of Nebrod (Nimrod), who began to be a giant on earth. He was a giant hunter before the Lord.” While some people say the phrase “before the Lord” means being in opposition to God, I on the contrary do not think sacred Scripture is implying this. Rather, it implies that [Nimrod] was strong and brave. But the phrase “before the Lord” means created by him, receiving from him God’s blessing. Or it may mean that God was on the point of arousing our wonder through him by creating such a remarkable creature and displaying him before us on the earth.
'''
source_url=''
source_title="HOMILIES ON GENESIS 29.29"
