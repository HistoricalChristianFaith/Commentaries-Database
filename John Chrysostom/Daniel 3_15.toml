[[commentary]]
quote='''
But I say all this now, and select all the histories that contain trials and tribulations, and the wrath of kings, and their evil designs, in order that we may fear nothing, save only offending God. For then also was there a furnace burning; yet they derided it, but feared sin. For they knew that if they were consumed in the fire, they should suffer nothing that was to be dreaded; but that if they were guilty of impiety: they should undergo the extremes of misery. It is the greatest punishment to commit sin, though we may remain unpunished; as on the other hand, it is the greatest honour and repose to live virtuously, though we may be punished. For sins separate us from God; as He Himself speaks; "Have not your sins separated between you and Me?" But punishments lead us back to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25206.html'
source_title="HOMILIES CONCERNING THE STATUES 6:14"
