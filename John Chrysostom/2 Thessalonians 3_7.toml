[[commentary]]
quote='''
Great is the confidence of the Teacher, when from his own good actions he is entitled to reprove his disciples. Wherefore also Paul said, "For yourselves know how ye ought to imitate us." And he ought to be a Teacher more of life than of the word. And let no one think that this is said from a spirit of boasting. For it was as reduced to necessity that he spoke it, and with a view to general advantage. "For we behaved not ourselves," he says, "disorderly among you." From this do you not see his humility, in that he calls it "for nought," and "disorderly behavior"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Thessalonians%2FHomily%25205.html'
source_title="Homily on 2 Thessalonians 5"
