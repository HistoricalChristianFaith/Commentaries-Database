[[commentary]]
quote='''
Wherefore it were meet exceedingly to admire the consideration of our Lawgiver, in that, when He might bring forward His illustration from among men, and when He might have spoken of Moses and Elias and John, and others like them, who took no thought; that He might touch them more to the quick, He made mention of the irrational beings. For had He spoken of those righteous men, these would have been able to say, "We are not yet become like them." But now by passing them over in silence, and bringing forward the fowls of the air, He hath cut off from them every excuse, imitating in this place also the old law. Yea, for the old covenant likewise sends to the bee, and to the ant, and to the turtle, and to the swallow. And neither is this a small sign of honor, when the same sort of things, which those animals possess by nature, those we are able to accomplish by an act of our choice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252021.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 21:4"
