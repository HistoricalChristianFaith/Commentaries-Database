[[commentary]]
quote='''
(Hom. liii. 1) See here the madness of the Jews; asking after so long time, and after all His miracles and teaching, Who art Thou? What is Christ's answer? From the beginning I speak with you; as if to say, Ye do not deserve to hear any thing from Me, much less this thing, Who I am. For ye speak always, to tempt Me.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"Then said they unto Him, Who art thou?"

Oh folly! After so long a time, such signs and teaching, they ask, "Who art thou?" What then saith Christ?

"The same that I told you from the beginning."

What He saith, is of this kind; "Ye are not worthy to hear My words at all, much less to learn who I am, for ye say all that ye do, tempting Me, and giving heed to none of My sayings. And all this I could now prove against you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252053.html'
source_title='Homily on the Gospel of John 53'
