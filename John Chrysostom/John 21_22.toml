[[commentary]]
quote='''
Since he spake from strong affection, and wishing not to be torn away from him, Christ, to show that however much he might love, he could not go beyond His love, saith, "If I will that he tarry - what is that to thee?" By these words teaching us not to be impatient, nor curious beyond what seemeth good to Him. For because Peter was ever hot, and springing forward to enquiries such as this, to cut short his warmth, and to teach him not to enquire farther, He saith this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252088.html'
source_title='Homily on the Gospel of John 88'

[[commentary]]
quote='''
However, inasmuch as they were now going to have the care of the world committed to them, and could not remain together without injury to their charge, our Lord says, If I will that he tarry till I come, what is that to thee? as if to say, Attend to the work committed to thee, and do it: if I will that he abide here, what is that to thee?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
