[[commentary]]
quote='''
But if any endure not what I have said, but still cleave to the poverty of worldly things, snatching at the things which endure diminution: even in respect of those again, let him call to mind the food of manna and tremble at the example of that punishment. For what happened in that instance, this same result may one now also see in the case of covetous men. But what then happened? Worms were bred from their covetousness. This also now happens in their case. For the measure of the food is the same for all; we having but one stomach to fill; only thou who feedest luxuriously hast more to get rid of. And as in that case they who in their houses gathered more than the lawful quantity, gathered not manna, but more worms and rottenness; just so both in luxury and in covetousness, the gluttonous and drunken gather not more dainties but more corruption.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252040.html'
source_title="HOMILIES ON 1 CORINTHIANS 40.5"
