[[commentary]]
quote='''
The divine law indeed has excluded women from the ministry, but they endeavor to thrust themselves into it; and since they can effect nothing of themselves, they do all through the agency of others; and they have become invested with so much power that they can appoint or eject priests at their will: things in fact are turned upside down, and the proverbial saying may be seen realized—"The ruled lead the rulers:" and would that it were men who do this instead of women, who have not received a commission to teach. Why do I say teach? for the blessed Paul did not suffer them even to speak in the Church. But I have heard some one say that they have obtained such a large privilege of free speech, as even to rebuke the prelates of the Churches, and censure them more severely than masters do their own domestics.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FTREATISE%2520ON%2520THE%2520PRIESTHOOD%2FBook%25203.html'
source_title="Treatise on the Priesthood, Book 3"

[[commentary]]
quote='''
For with us indeed the woman is reasonably subjected to the man: since equality of honor causeth contention. And not for this cause only, but by reason also of the deceit which happened in the beginning. Wherefore you see, she was not subjected as soon as she was made; nor, when He brought her to the man, did either she hear any such thing from God, nor did the man say any such word to her: he said indeed that she was "bone of his bone, and flesh of his flesh:" but of rule or subjection he no where made mention unto her. But when she made an ill use of her privilege and she who had been made a helper was found to be an ensnarer and ruined all, then she is justly told for the future, "thy turning shall be to thy husband."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252026.html'
source_title="Homily on 1 Corinthians 26"

[[commentary]]
quote='''
"But I suffer not a woman to teach." "I do not suffer," he says. What place has this command here? The fittest. He was speaking of quietness, of propriety, of modesty, so having said that he wished them not to speak in the church, to cut off all occasion of conversation, he says, let them not teach, but occupy the station of learners. For thus they will show submission by their silence. For the sex is naturally somewhat talkative: and for this reason he restrains them on all sides. "For Adam," says he, "was first formed, then Eve. And Adam was not deceived, but the woman being deceived was in the transgression."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%25209.html'
source_title="Homily on 1 Timothy 9"
