[[commentary]]
quote='''
If He says, "Them that honor Me I will honor, and they that despise Me shall be lightly esteemed," let us reflect that there is that which He requires of us also. True, it is the praise of His glory to save those that are enemies, but those who, after being made friends, continue His friends. So that if they were to return back to their former state of enmity, all were vain and to no purpose. There is not another Baptism, nor is there a second reconciliation again, but "a certain fearful expectation of judgment which shall devour the adversaries." If we intend at the same time to be always at enmity with Him and yet to claim forgiveness at His hand, we shall never cease to be at enmity, and to be wanton, to grow in depravity, and to be blind to the Sun of Righteousness which has risen.… But when thou hast tasted the goodness and the honey, if thou again abandonest them, and turnest to thine own vomit, what else art thou doing but bringing forward evidence of excessive hatred and contempt?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25202.html'
source_title="HOMILIES ON EPHESIANS 2"


[[commentary]]
quote='''
Now honor and glory are not mere words; and since He has honored us not by words only, but by what He has done for us, so let us honor Him by works and deeds. Yet this honor touches us, while that reaches not Him, for He needs not the honor that comes from us, we do need that which is from Him. In honoring Him, therefore, we do honor to ourselves. He who opens his eyes to gaze on the light of the sun, receives delight himself, as he admires the beauty of the star, but does no favor to that luminary, nor increases its splendor, for it continues what it was; much more is this true with respect to God. He who admires and honors God does so to his own salvation, and highest benefit; and how? Because he follows after virtue, and is honored by Him. For "them that honor Me," He says, "I will honor."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%25204.html'
source_title="HOMILIES ON 1 TIMOTHY 4"
