[[commentary]]
quote='''
For not every sin brings the same penalty; but those which are easiest to be amended, bring upon us the greatest punishment: which indeed Solomon intimated, when he said, "It is not wonderful if any one be taken stealing; for he stealeth that he may satisfy his soul that is hungry; but the adulterer, by the lack of understanding, destroyeth his own soul." But what he means is to this effect. The thief is a grievous offender, but not so grievous a one as the adulterer: for the former, though it be a sorry reason for his conduct, yet at the same time has to plead the necessity arising from indigence; but the latter, when no necessity compels him, by his mere madness rushes into the gulph of iniquity. This also may be said with regard to those who swear. For they have not any pretext to allege, but merely their contempt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252010.html'
source_title="HOMILIES CONCERNING THE STATUES 10:11"
