[[commentary]]
quote='''
For nothing was ever more humble than he; who, being leader of so great a people, and having overwhelmed in the sea the king and the host of all the Egyptians, as if they had been flies; and having wrought so many wonders both in Egypt and by the Red Sea and in the wilderness, and received such high testimony, yet felt exactly as if he had been an ordinary person, and as a son-in-law was humbler than his father-in-law, and took advice from him, and was not indignant, nor did he say, "What is this? After such and so great achievements, art thou come to us with thy counsel?" This is what most people feel; though a man bring the best advice, despising it, because of the lowliness of the person. But not so did he: rather through lowliness of mind he wrought all things well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%25201.html'
source_title="HOMILIES ON 1 CORINTHIANS 1.4"
