[[commentary]]
quote='''
For Samuel also put together a high panegyric upon himself, when he anointed Saul, saying, "Whose ass have I taken, or calf, or shoes? or have I oppressed any of you?" And yet no one finds fault with him. And the reason is because he did not say it by way of setting off himself; but because he was going to appoint a king, he wishes under the form of a defence [of himself] to instruct him to be meek and gentle. And observe the wisdom of the prophet, or rather the loving kindness of God. For because he wished to turn them from [their design,] bringing together a number of grievous things he asserted them of their future king, as, for instance, that he would make their wives grind at the mill, the men shepherds and muleteers; for he went through all the service appertaining to the kingdom with minuteness. But when he saw that they would not be hindered by any of these things, but were incurably distempered; he thus both spareth them and composeth their king to gentleness. Therefore he also takes him to witness. For indeed no one was then bringing suit or charge against him that he needed to defend himself, but he said those things in order to make him better. And therefore also he added, to take down his pride, "If ye will hearken, ye and your king," such and such good things shall be yours; "but if ye will not hearken, then the reverse of all."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%252024.html'
source_title="HOMILIES ON 2 CORINTHIANS 24.3"
