[[commentary]]
quote='''
"Let people in distress have wine and those in pain strong drink," which shows that nothing can prove such a good remedy for depression as recourse to this, aside from the fact that in some cases intemperance undermines the benefit coming from it.
'''
source_url=''
source_title="HOMILIES ON GENESIS 29:6"


[[commentary]]
quote='''
Wine has been given us for cheerfulness, not for drunkenness. Whereas now it appears to be an unmanly and contemptible thing for a man not to get drunk. And what sort of hope then is there of salvation? … Wouldest thou know where wine is good? Hear what the Scripture saith, "Give strong drink unto him that is ready to perish, and wine unto the bitter in soul." And justly, because it can mitigate asperity and gloominess, and drive away clouds from the brow. "Wine maketh glad the heart of man," says the Psalmist. How then does wine produce drunkenness? For it cannot be that one and the same thing should work opposite effects. Drunkenness then surely does not arise from wine, but from intemperance. Wine is bestowed upon us for no other purpose than for bodily health; but this purpose also is thwarted by immoderate use. But hear moreover what our blessed Apostle writes and says to Timothy, "Use a little wine for thy stomach's sake, and thine often infirmities."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%252019.html'
source_title="HOMILIES ON EPHESIANS 19:5.17"
