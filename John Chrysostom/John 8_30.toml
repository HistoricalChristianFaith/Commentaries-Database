[[commentary]]
quote='''
(Hom. liii. 2) And as this was speaking more after a human fashion, the Evangelist adds, As He spake these words, many believed on Him; as if to say, Do not be disturbed at hearing so humble a speech from Christ; for those who had heard the greatest doctrines from Him, and were not persuaded, were persuaded by these words of humility. These then believed on Him, yet not as they ought; but only out of joy, and approbation of His humble way of speaking. And this the Evangelist shows in his subsequent narration, which relates their unjust proceedings towards Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"As He spake these words, many believed on Him."

When He brought down His speech to a lowly strain, many believed on Him. Dost thou still ask wherefore He speaketh humbly? Yet the Evangelist clearly alluded to this when he said, "As He spake these things, many believed on Him." By this all but proclaiming aloud to us, "Oh hearer, be not confounded if thou hear any lowly expression, for they who after such high teaching were not yet persuaded that He was of the Father, were with good reason made to hear humbler words, that they might believe." And this is an excuse for those things which shall be spoken in a humble way. They believed then, yet not as they ought, but carelessly and as it were by chance, being pleased and refreshed by the humility of the words. For that they had not perfect faith the Evangelist shows by their speeches after this, in which they insult Him again.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252053.html'
source_title='Homily on the Gospel of John 53'
