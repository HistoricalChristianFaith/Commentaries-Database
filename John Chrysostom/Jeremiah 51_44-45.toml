[[commentary]]
quote='''
Wherefore also Paul exhorted, saying, "And ye shall put away from among yourselves that wicked person"; and, "that he that hath done this deed may be put away from among you." A dreadful thing, dreadful indeed, is the society of wicked men; not so quickly doth the pestilence seize or the itch infect those that come in contact with such as are under the disease, as doth the wickedness of evil men. For "evil communications corrupt good manners." And again the Prophet saith, "Come out from among them, and be ye separate."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252057.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 57"
