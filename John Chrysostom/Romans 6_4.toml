[[commentary]]
quote='''
Here he hints, along with the duty of a careful walk, at the subject of the resurrection. In what way? Do you believe, he means, that Christ died, and that He was raised again? Believe then the same of thyself. For this is like to the other, since both Cross and Burial is thine. For if thou hast shared in Death and Burial, much more wilt thou in Resurrection and Life. For now the greater is done away with, the sin I mean, it is not right to doubt any longer about the lesser, the doing away of death.

But this he leaves for the present to the conscience of his hearers to reason out, but himself, after the resurrection to come had been set before us, demands of us another, even the new conversation, which is brought about in the present life by a change of habits. When then the fornicator becomes chaste, the covetous man merciful, the harsh subdued, even here a resurrection has taken place, the prelude to the other. And how is it a resurrection? Why, because sin is mortified, and righteousness hath risen again, and the old life hath been made to vanish, and this new and angelic one is being lived in. But when you hear of a new life, look for a great alteration, a wide change.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252010.html'
source_title="Homily on Romans 10"
