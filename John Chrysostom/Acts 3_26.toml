[[commentary]]
quote='''
"Unto you first," he continues, "God having raised up His Son sent Him." "To others indeed also, but to you first who crucified Him." "To bless you," he adds, "in turning away every one of you from his iniquities."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%25209.html'
source_title="Homily on Acts 9"

[[commentary]]
quote='''
"Unto you first," he continues, "God having raised up His Son Jesus, sent Him." He does not say simply, "Unto you He sent His Son," but also, after the resurrection, and when He had been crucified. For that they may not suppose that he himself granted them this favor, and not the Father, he says, "To bless you." For if He is your Brother, and blesses you, the affair is a promise. "Unto you first." That is, so far are you from having no share in these blessings, that He would have you become moreover promoters and authors of them to others. For you are not to feel like castaways.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%25209.html'
source_title="Homily on Acts 9"

[[commentary]]
quote='''
"Having raised up": again, the Resurrection. "In turning away," he says, "every one of you from his iniquities." In this way He blesses you: not in a general way. And what kind of blessing is this? A great one. For of course not the turning a man away from his iniquities is itself sufficient to remit them also. And if it is not sufficient to remit, how should it be to confer a blessing? For it is not to be supposed that the transgressor becomes forthwith also blessed; he is simply released from his sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%25209.html'
source_title="Homily on Acts 9"

[[commentary]]
quote='''
Having said this, with reason he is now able to say, "Unto you God sent his Son Jesus to bless you." He says not, To save you, but what is greater; that the crucified Jesus blessed His crucifiers. Let us then also imitate Him. Let us cast out that spirit of murder and enmity. It is not enough not to retaliate (for even in the Old Dispensation this was exemplified); but let us do all as we would for bosom-friends, as we would for ourselves so for those who have injured us. We are followers of Him, we are His disciples, who after being crucified, sets everything in action in behalf of his murderers, and sends out His Apostles to this end. And yet we have often suffered justly; but those acted not only unjustly, but impiously; for He was their Benefactor, He had done no evil, and they crucified Him. And for what reason? For the sake of their reputation. But He Himself made them objects of reverence. "The scribes and the pharisees sit in Moses' seat; all therefore whatsoever they bid you observe, that do ye, but after their works do ye not." And again in another place, "Go thy way, show thyself to the priest." Besides, when He might have destroyed them, He saves them. Let us then imitate Him, and let no one be an enemy, no one a foe, except to the devil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%25209.html'
source_title="Homily on Acts 9"
