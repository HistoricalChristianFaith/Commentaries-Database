[[commentary]]
quote='''
(Hom. lxvi. 1) They showed now at last that they thought Him greater than a prophet: And went forth to meet Him, and cried, Hosanna! Blessed is the King of Israel, that cometh in the name of the Lord.

(Hom. lxvi. 1) This is what more than any thing made men believe in Christ, viz. the assurance, that He was not opposed to God, that He came from the Father. The words show us the divinity of Christ. Hosanna is, Save us; and salvation in Scripture is attributed to God alone. And cometh, it is said, not is brought: the former befits a lord, the latter a servant. In the name of the Lord, goes to prove the same thing. He does not come in the name of a servant, but in the name of the Lord.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Seest thou that this most choked them, the persuasion which all men had that He was not an enemy of God? And this most divided the people, His saying that He came from the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252066.html'
source_title='Homily on the Gospel of John 66'

[[commentary]]
quote='''
Moreover, the multitude which went before and which followed after was sufficient to cast them into an agony; for no sign so much attracted the people as that of Lazarus. And another Evangelist saith, that they strewed their garments under His feet, and that "the whole city was moved"; with so great honor did He enter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252066.html'
source_title='Homily on the Gospel of John 66'

[[commentary]]
quote='''
And they took the small branches of palm trees and olives, and strewed their garments in the way, showing that they now had a higher opinion concerning Him than of a Prophet.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252066.html'
source_title='Homily on the Gospel of John 66'
