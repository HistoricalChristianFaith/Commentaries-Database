[[commentary]]
quote='''
Let us labor earnestly then to become clean; He has enjoined nothing burdensome. "Judge the fatherless, and do justice for the widow." Thou seest everywhere how great account God makes of mercy, and of standing forward in behalf of those that are wronged. These good deeds let us pursue after, and we shall be able also, by the grace of God, to attain to the blessings to come.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252012.html'
source_title="ON THE EPISTLE TO THE HEBREWS 12:4"

[[commentary]]
quote='''
If you must visit someone, prefer to pay honor to orphans, widows and those in want rather than those who enjoy reputation and fame.
'''
source_url=''
source_title="BAPTISMAL INSTRUCTIONS 6:12"


[[commentary]]
quote='''
And if thou hast pity on the widow, thy sins are washed away. For, "Judge," saith He, "the orphan, and plead for the widow, and come and let us reason together, saith the Lord. And if your sins be as scarlet, I will make them white as snow; and if they be as crimson, I will make them white as wool." For not even a single scar of the wounds doth He suffer to appear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252023.html'
source_title="HOMILIES ON 1 CORINTHIANS 23:6"
