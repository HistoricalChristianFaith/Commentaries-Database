[[commentary]]
quote='''
Let us mourn with Nahum, and say with him, "Woe to him that buildeth his house on high." Or rather let us mourn for them as Christ mourned for those of old. "Woe to you that are rich, for ye have received your consolation." Let us, I beseech you, not cease thus lamenting, and if it be not unseemly, let us even beat our breasts for the carelessness of our brethren. Let us not weep for him who is already dead, but let us weep for the rapacious man, the grasping, the covetous, the insatiable. Why should we mourn for the dead, in whose case it is impossible henceforth to effect anything? Let us mourn for these who are capable even of change.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252064.html'
source_title="HOMILIES ON JOHN 64"
