[[commentary]]
quote='''
Grief is often capable of refreshing distressed souls, and of rendering a burdened conscience light: consider how often women, when they have lost their most beloved children, break their hearts, and perish, if they are forbidden to mourn, and to shed tears. But if they do all which those who are sad, are wont to do, they are relieved, and receive consolation. And what wonder that this should be the case with women, when you may even see a prophet affected in a similar manner? Therefore he was continually saying, "Suffer me—I will weep bitterly—labour not to comfort me, because of the spoiling of the daughter of my people." So that, oftentimes, sadness is the bearer of consolation; and if it is so with regard to this world, much more with regard to spiritual things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252018.html'
source_title="HOMILIES CONCERNING THE STATUES 18:8"


[[commentary]]
quote='''
It is, after all, the practice of the prophets and the just to grieve not only for themselves but also for the rest of humankind.
'''
source_url=''
source_title="HOMILIES ON GENESIS 29:7"
