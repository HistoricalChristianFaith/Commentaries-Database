[[commentary]]
quote='''
This was the reason why He sent not Jeremiah only into Egypt, but also Ezekiel into Babylon, and they did not refuse to go. For when they found their Master love the people exceedingly, they continued themselves to do so likewise. Much as if a right-minded servant were to take compassion upon an intractable son when he saw his father grieving and lamenting about him. And what was there that they did not suffer for them? They were sawn asunder, they were driven out, they were reproached, they were stoned, they underwent numberless grievances. And after all this they would run back to them.… And for the people of the Jews, Jeremiah has composed Lamentations in writing. And when the general of the Persians had given him liberty to dwell securely, and with perfect freedom, wherever he pleased, he preferred above dwelling at home the affliction of the people, and their hard durance in a strange land.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252014.html'
source_title="HOMILIES ON ROMANS 14"
