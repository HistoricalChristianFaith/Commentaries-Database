[[commentary]]
quote='''
(Hom. lxxxiii) Or, He spoke in secret, but not, as these thought, from fear, or to excite sedition; but only when what He said was above the understanding of the many.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
What then saith Christ? To overthrow this, He saith, "I spake openly to the world, (not to the disciples privately,) I taught openly in the temple." "What then, said He nothing in secret?" He did, but not, as they thought, from fear, and to make conspiracies, but if at any time His sayings were too high for the hearing of the many.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title='Homily on the Gospel of John 83'
