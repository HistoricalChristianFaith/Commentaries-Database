[[commentary]]
quote='''
And what does Isaiah cry? "Though the number of the children of Israel be as the sand of the sea, a remnant shall be saved." Do you see that he too does not say that all are to be saved, but that those that are worthy shall? For I regard not the multitude, he means, nor does a race diffused so far distress me, but those only do I save that yield themselves worthy of it. And he does not mention the "sand of the sea" without a reason, but to remind them of the ancient promise whereof they had made themselves unworthy. Why then are you troubled, as though the promise had failed, when all the Prophets show that it is not all that are to be saved? Then he mentions the mode of the salvation also. Observe the accuracy of the Prophet, and the judgment of the Apostle, what a testimony he has cited, how exceedingly apposite! For it not only shows us that those to be saved are some and not all, but also adds the way they are to be saved. How then are they to be saved, and how will God count them worthy of the benefit? "He will finish the work, and cut it short in righteousness," he says, "because a short work will the Lord make upon the earth." What he means then is somewhat of this sort. There is no need of fetching a circuit, and of trouble, and the vexation of the works of the Law, for the salvation is by a very short way. For such is faith, it holds salvation in a few short words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252016.html'
source_title="HOMILIES ON ROMANS 16:9"
