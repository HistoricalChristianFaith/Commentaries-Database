[[commentary]]
quote='''
Consider how easy it is for people to obey. For Jeremiah said, "They shall no more teach every man his neighbor, and every man his brother, saying: 'Know the Lord.' For all men will know me from the least of them to the greatest." And Isaiah showed how indestructible the Church would be. "For in the last days the mountain of the Lord will be conspicuous, and the house of the Lord will be on top of the mountains and will be exalted above the hills. And to this mountaintop will come many peoples and many nations."
'''
source_url=''
source_title="DEMONSTRATION AGAINST THE PAGANS 6:5"

[[commentary]]
quote='''
Let me beg you to consider then this simple and single-hearted man, and take notice of him in the affairs of life, and you will see him a pattern of the utmost scrupulousness, such that if he would have shown it in spiritual matters he would not have been overlooked: for the facts of the truth are clearer than the sun. And wherever a man may go, he might easily lay hold of his own salvation, if he were minded, that is, to be heedful, and not to look on this as a by-work. For were the doings shut up into Palestine, or in a little corner of the world? Hast thou not heard the prophet say, "All shall know Me from the least even to the greatest?" Do not you see the things themselves uttering the truth? How then are these to be excused, seeing as they do the doctrine of the truth spread far and wide, and not troubling themselves?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252026.html'
source_title="HOMILIES ON ROMANS 26"


[[commentary]]
quote='''
To show the rapidity of the change and the facility with which they would embrace Christ's teaching, the prophet went on to say, "And they shall no more teach everyone his neighbor and everyone his brother, saying, 'Know the Lord,' for all will know me, from the least of them to the greatest of them." On his coming, Christ would also pardon the transgressions of all people and no more remember their sins. What could be clearer than this? By these predictions the prophet revealed the calling of the Gentiles, the superiority of the new law over the old law, the ease of access, the grace possessed by those who have believed and the gift given in baptism.
'''
source_url=''
source_title="DEMONSTRATION AGAINST THE PAGANS 10:9-10"
