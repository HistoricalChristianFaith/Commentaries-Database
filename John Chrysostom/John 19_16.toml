[[commentary]]
quote='''
"Successes" have terrible power to cast down or draw aside those who take not heed. Thus the Jews, who at first enjoyed the influence of God, sought the law of royalty from the Gentiles, and in the wilderness after the manna remembered the onions. In the same way here, refusing the Kingdom of Christ, they invited to themselves that of Caesar. Wherefore God set a king over them, according to their own decision. When then Pilate heard these things, he delivered Him to be crucified. Utterly without reason. For when he ought to have enquired whether Christ had aimed at sovereign power, he pronounced the sentence through fear alone. Yet that this might not befall him, Christ said beforehand, "My kingdom is not of this world"; but he having given himself wholly up to present things, would practice no great amount of wisdom. And yet his wife's dream should have been sufficient to terrify him; but by none of these things was he made better, nor did he look to heaven, but delivered Him up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252085.html'
source_title='Homily on the Gospel of John 85'
