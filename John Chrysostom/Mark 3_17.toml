[[commentary]]
quote='''
James and his brother He called "sons of thunder." Why then doth He this? To show that it was He who gave the old covenant, that it was He who altered names, who called Abram "Abraham," and Sarai "Sarah," and Jacob "Israel." To many he assigned names even from their birth, as to Isaac, and Samson, and to those in Isaiah and Hosea; but to others He gave them after they had been named by their parents, as to those we have mentioned, and to Joshua the son of Nun. It was also a custom of the Ancients to give names from things, which in fact Leah also has done; and this takes place not without cause, but in order that men may have the appellation to remind them of the goodness of God, that a perpetual memory of the prophecy conveyed by the names may sound in the ears of those who receive it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252019.html'
source_title="HOMILIES ON ST. JOHN, HOMILY 19"
