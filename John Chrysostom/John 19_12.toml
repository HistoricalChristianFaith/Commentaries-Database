[[commentary]]
quote='''
(Hom. lxxxiv. 2) But how can ye prove this? By His purple, His diadem, His chariot, His guards? Did He not walk about with His twelve disciples only, and every thing mean about Him, food, dress, and habitation?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
But they again cried out, saying, "If thou let this man go, thou art not Caesar's friend." For when they profited nothing by bringing charges drawn from their own law, they wickedly betook themselves to external laws, saying, "Every one that maketh himself a king speaketh against Caesar."

And where hath this Man appeared as a tyrant? Whence can ye prove it? By the purple robe? By the diadem? By the dress? By the soldiers? Did not He ever walk unattended, save by His twelve disciples, following in every point a humble mode of living, both as to food, and clothing, and habitation?
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252084.html'
source_title='Homily on the Gospel of John 84'
