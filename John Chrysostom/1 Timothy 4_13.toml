[[commentary]]
quote='''
In what else did this blessed saint excel the rest of the apostles? and how comes it that up and down the world he is so much on every one's tongue?… Is it not from the power of his epistles? whereby not only to the faithful of to-day, but from his time to this, yea and up to the end, even the appearing of Christ, he has been and will be profitable, and will continue to be so as long as the human race shall last. For as a wall built of adamant, so his writings fortify all the Churches of the known world, and he as a most noble champion stands in the midst, bringing into captivity every thought to the obedience of Christ.… For his writings are not only useful to us, for the overthrow of false doctrine and the confirmation of the true, but they help not a little towards living a good life.… From all this it is evident that St. Paul had given himself to the study of which we have been speaking with great diligence and zeal. Hear also what he says in his charge to his disciple: "Give heed to reading, to exhortation, to teaching," and he goes on to show the usefulness of this by adding, "For in doing this thou shalt save both thyself and them that hear thee."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FTREATISE%2520ON%2520THE%2520PRIESTHOOD%2FBook%25204.html'
source_title="Treatise on the Priesthood, Book 4"

[[commentary]]
quote='''
What equal to Timothy? tell me that: and yet to him says Paul, "Give attention to reading, to exhortation. (1 Tim. iv. 13.) For it is not possible, I say not possible, ever to exhaust the mind of the Scriptures. It is a well which has no bottom." For the more one dwells on them, the more insight does he get, the more does he behold the pure light.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252019.html'
source_title="Homily on the Acts of the Apostles 19"

[[commentary]]
quote='''
"Till I come give attendance to reading, to exhortation, to doctrine." Even Timothy is commanded to apply to reading. Let us then be instructed not to neglect the study of the sacred writings. Again, observe, he says, "Till I come." Mark how he consoles him, for being as it were an orphan, when separated from him, it was natural that he should require such comfort. "Till I come," he says, give attendance to reading the divine writings, to exhortation of one another, to teaching of all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%252013.html'
source_title="Homily on 1 Timothy 13"
