[[commentary]]
quote='''
"And it came to pass," it says, "as we went to prayer, a certain damsel possessed with a spirit of divination met us, which brought her masters much gain by soothsaying: the same followed Paul and us, and cried, saying, These men are the servants of the most high God, which show unto us the way of salvation." What may be the reason that both the demon spoke these words, and Paul forbade him? Both the one acted maliciously, and the other wisely: the demon wished in fact to make himself credible. For if Paul had admitted his testimony, he would have deceived many of the believers, as being received by him: therefore he endures to speak what made against himself, that he may establish what made for himself: and so the demon himself uses accommodation in order to destruction. At first then, Paul would not admit it, but scorned it, not wishing to cast himself all at once upon miracles; but when it continued to do this, and pointed to their work "who preach unto us the way of salvation," then he commanded it to come out.

"A certain damsel possessed with a spirit of Python." Say, what is this demon? The god, as they call him, Python: from the place he is so called. Do you mark that Apollo also is a demon? And the demon wished to bring them into temptation: therefore to provoke them, "the same followed Paul and us, and cried, saying, These men are the servants of the most high God, which show unto us the way of salvation." O thou accursed, thou execrable one! if then thou knowest that it is "His way of salvation" that "they show," why dost thou not come out freely? But just what Simon wished, when he said, "Give me, that on whomsoever I lay my hands, he may receive the Holy Ghost," the same did this demon: since he saw them becoming famous, here also he plays the hypocrite: by this means he thought to be allowed to remain in the body, if he should preach the same things. But if Christ "receive not testimony from man," meaning John, much less from a demon. "Praise is not comely in the mouth of a sinner," much less from a demon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252035.html'
source_title="Homily on Acts 35"
