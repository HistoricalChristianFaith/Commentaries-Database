[[commentary]]
quote='''
"But Peter said, Not so, Lord; for I have never eaten anything that is common or unclean." This was a thing altogether offensive to them: observe then what is providentially managed. He himself also says, "I have never eaten": not being himself afraid - far be the thought from us - but it is so contrived by the Spirit, in order that he may have it to say in answer to those accusing him, that he did object: for it was altogether necessary for them to observe the Law. He was in the act of being sent to the Gentiles: therefore that these also may not accuse him, see how many things are contrived by the Providence of God. For, that it may not seem to be a mere fancy, "this was done thrice. I said," saith he, "Not so, Lord, for I have never eaten aught common or unclean. And the voice came unto him, What God hath cleansed, that call not thou common." It seems indeed to be spoken to him, but the whole is meant for the Jews. For if the teacher is rebuked, much more these.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252022.html'
source_title="Homily on Acts 22"

[[commentary]]
quote='''
Wherefore did he object? That none may say that God was proving him, as in the case of Abraham, this is why he says, "Not so, Lord," etc. not gainsaying - just as to Philip also He said, "How many loaves have ye?" Not to learn, but tempting, or "proving him." And yet it was the same Lord that had discoursed above in the Law concerning things clean and unclean. But in that sheet were also "all the four-footed beasts of the earth," the clean with the unclean.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252022.html'
source_title="Homily on Acts 22"
