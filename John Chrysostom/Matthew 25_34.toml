[[commentary]]
quote='''
Observe that He says not 'Receive,' but possess, or inherit, as duo to you from of old.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Of what honor, of what blessedness are these words? And He said not, Take, but, "Inherit," as one's own, as your Father's, as yours, as due to you from the first. For, before you were, saith He, these things had been prepared, and made ready for you, forasmuch as I knew you would be such as you are.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252079.html'
source_title='Homily on the Gospel of Matthew 79'
