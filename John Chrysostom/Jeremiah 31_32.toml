[[commentary]]
quote='''
There was a law, and there is a law. ("For the law of the Spirit of life hath made me free.") There was a service, and there is a service. ("To whom pertaineth the service"; and again: "Serving God in the Spirit.") There was a covenant, and there is a covenant. ("I will make with you a new covenant, not according to the covenant which I made with your fathers.") There was a sanctification, and there is a sanctification: there was a baptism, and there is a Baptism: there was a sacrifice, and there is a Sacrifice: there was a temple, and there is a temple: there was a circumcision, and there is a circumcision; and so too there was a "grace," and there is a "grace." But the words in the first case are used as types, in the second as realities, preserving a sameness of sound, though not of sense. So in patterns and figures, the shape of a man scratched with white lines upon a black ground is called a man as well as that which has received the correct coloring; and in the case of statues, the figure whether formed of gold or of plaster, is alike called a statue, though in the one case as a model in the other as a reality.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252014.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 14"
