[[commentary]]
quote='''
What did she say? Instead of saying anything at first, she began with wailing and shed warm floods of tears. And just as, when rain storms fall, even the harder ground is moistened and softened and easily bestirs itself to produce crops, so too did this happen in the case of this woman: as though softened by the flood of tears and warmed with the pangs, the womb began to stir in that wonderful fertility.
'''
source_url=''
source_title="HOMILIES ON HANNAH 1"


[[commentary]]
quote='''
"And she stood," it says, "before the Lord"; and what are her words? "Adonai, Lord, Eloi Sabaoth!" and this is, being interpreted, "O Lord, the God of Hosts." Her tears went before her tongue; by these she hoped to prevail with God to bend to her request. Where tears are, there is always affliction also: where affliction is, there is great wisdom and heedfulness. "If thou wilt indeed," she continues, "look on the affliction of thine handmaid, and wilt give unto thine handmaid a man child, then will I give him unto the Lord all the days of his life." She said not, "for one year," or, "for two," as we do;—nor said she, "if thou wilt give me a child, I will give thee money"; but, "I give back to Thee the very gift itself entire, my first-born, the son of my prayer." Truly here was a daughter of Abraham. He gave when it was demanded of him. She offers even before it is demanded. But observe even after this her deep reverence. "Only her lips moved, but her voice," it saith, "was not heard." And thus does he who would gain his request draw nigh unto God; not consulting his ease, nor gaping, nor lounging, nor scratching his head, nor with utter listlessness. What, was not God able to grant, even without any prayer at all? What, did He not know the woman's desire even before she asked? And yet had He granted it before she asked, then the woman's earnestness would not have been shown, her virtue would not have been made manifest, she would not have gained so great a reward. So that the delay is not the result of envy or of witchcraft, but of providential kindness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%252024.html'
source_title="HOMILIES ON EPHESIANS 24"


[[commentary]]
quote='''
Take note of the woman's reverence: she did not say, "If you give me three, I shall give you two;" or "if two, I shall give you one." Instead, "If you give me one, I shall dedicate the offspring wholly to you." "He will not drink wine or strong drink." She had not yet received the child and was already forming a prophet, talking about his upbringing and making a deal with God. What wonderful confidence on a woman's part! Since she could not make a deposit on account of not having anything, she pays the price from what is coming to her. Just as many farmers who are living in extreme poverty but have no money to buy a calf or sheep, get them on credit from their masters by pledging to pay the price from the crops that are due, just so did she do, too—or rather much more: she did not take her son from God on credit but on condition of returning him wholly to him once again and reaping the fruit of his upbringing. She regarded it as sufficient reward, you see, to devote her labors to God's priest.
'''
source_url=''
source_title="HOMILIES ON HANNAH 1"
