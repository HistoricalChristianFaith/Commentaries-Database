[[commentary]]
quote='''
"Then called he them in," that they may suffer no harm, "and lodged them": thenceforth he without scruple takes his meals with them. "And on the morrow Peter went away with them, and certain brethren from Caesarea accompanied him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252022.html'
source_title="Homily on Acts 22"

[[commentary]]
quote='''
"He called them in, and lodged them." Good, that first he gives the men friendly treatment, after the fatigue of their journey, and makes them at home with him; "and on the morrow," sets out with them. And certain accompany him: this too as Providence ordered it, that they should be witnesses afterwards when Peter would need to justify himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252023.html'
source_title="Homily on Acts 23"
