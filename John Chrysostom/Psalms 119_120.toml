[[commentary]]
quote='''
Beloved, our condition needs much endurance; and endurance is produced when doctrines are deeply rooted. For as no wind is able by its assaults to tear up the oak, which sends down its root into the lower recesses of the earth, and is firmly clenched there; so too the soul which is nailed by the fear of God none will be able to overturn. Since to be nailed is more than to be rooted. Thus the Prophet prayeth, saying, "Nail my flesh by Thy fear"; "do Thou so fix and join me, as by a nail riveted into me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252054.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 54"
