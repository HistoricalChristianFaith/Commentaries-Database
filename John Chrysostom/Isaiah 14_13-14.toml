[[commentary]]
quote='''
There were some who dared in the opinion of the multitude to immortalize themselves; and notwithstanding that the very sense of sight bore witness to their mortality, were ambitious to be called gods, and were honoured as such; to what a length of impiety would not many men have proceeded, if death had not gone on teaching all men the mortality and corruptibility of our nature? Hear, for instance, what the prophet says of a barbarian king, when seized with this frenzy. "I will exalt," saith he, "my throne above the stars of heaven; and I will be like unto the Most High." Afterwards, deriding him, and speaking of his death, he says, "Corruption is under thee, and the worm is thy covering;" but his meaning is, "Dost thou dare, O man, whom such an end is awaiting, to entertain such imaginations?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252011.html'
source_title="Homily 11 Concerning the Statues"
