[[commentary]]
quote='''
"There are also many other things which Jesus did, the which, if they should be written every one, I suppose that even the world itself could not contain the books that should be written." "Whence it is clear that I could not have written to court favor; for I who, when the miracles were so many, have not even related so many as the others have, but omitting most of them, have brought forward the plots of the Jews, the stonings, the hatred, the insults, the revilings, and have shown how they called Him a demoniac and a deceiver, certainly could not have acted to gain favor. For it behooved one who courted favor to do the contrary, to reject the reproachful, to set forth the glorious." Since then he wrote what he did from full assurance, he does not decline to produce his own testimony, challenging men separately to enquire into and scrutinize the circumstances. For it is a custom with us, when we think that we are speaking exactly true, never to refuse our testimony; and if we do this, much more would he who wrote by the Spirit. What then the other Apostles when they preached declared, he also saith; "We are witnesses of the things spoken, and the Spirit which He hath given to them that obey Him." (Acts v. 32.)
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252088.html'
source_title="Homily on the Gospel of John 88"

[[commentary]]
quote='''
And besides, he was present at all, and did not desert Him even when being crucified, and had His mother entrusted to him; all which things are signs of his love for Him, and of his knowing all things exactly. And if he has said that so many miracles had taken place, marvel thou not, but, considering the ineffable power of the Doer, receive with faith what is spoken. For it was as easy for Him to do whatever He would, as it is for us to speak, or rather much easier; for it sufficed that He should will only, and all followed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252088.html'
source_title="Homily on the Gospel of John 88"
