[[commentary]]
quote='''
Never think, saith he, that because ye happen not to be circumcised, and are now in uncircumcision, that there is any difference in this. No, the real trouble was this, the being "without Christ," the being "aliens from the commonwealth of Israel." Whereas this circumcision is not "the commonwealth." Again, the being strangers from the covenants of promise, the having no hope to come, the being without God in this world, all these were parts of their condition. He was speaking of heavenly things; he speaks also of those which are upon earth; since the Jews had a great opinion of these. Thus also Christ in comforting His disciples, after saying, "Blessed are they that have been persecuted for righteousness' sake, for theirs is the kingdom of heaven," adds the lesser point of consolation, "for so," saith He, "persecuted they the prophets which were before you." For this, compared with the greatness of the other, is far less, yet in regard to the being nigh, and believing, it is great and sufficient, and has much force. This then was the sharing in the commonwealth. His word is not, "separated," but "alienated from the commonwealth." His word is not, "ye took no interest in," but, "ye had not so much as any part in, and were strangers." The expressions are most emphatic, and indicate the separation to be very wide. Because the Israelites themselves were without this commonwealth, not however as aliens, but as indifferent to it, and they fell from the covenants, not however as strangers, but as unworthy.

But what were "the covenants of the promise?" "To thee and to thy seed," saith He, "will I give this land," and whatever else He promised.

"Having no hope." he adds, "and without God." Though gods indeed they worshipped, but they were no gods: "for an idol is not any thing."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%25205.html'
source_title="Homily on Ephesians 5"
