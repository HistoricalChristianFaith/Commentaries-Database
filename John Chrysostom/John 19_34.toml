[[commentary]]
quote='''
(Hom. lxxxv) This being the source whence the holy mysteries are derived, when thou approachest the awful cup, approach it as if thou wert about to drink out of Christ's side.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
