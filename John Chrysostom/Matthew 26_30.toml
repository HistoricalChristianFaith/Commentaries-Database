[[commentary]]
quote='''
"And when they had sung an hymn, they went out unto the Mount of Olives." Let them hear this, as many as, like swine eating at random, rudely spurn the natural table, and rise up in drunkenness, whereas it were meet to give thanks, and end with an hymn.

Hear this, as many as wait not again for the last prayer of the mysteries, for this is a symbol of that. He gave thanks before He gave it to His disciples, that we also may give thanks. He gave thanks, and sang an hymn after the giving, that we also may do this selfsame thing.

But for what reason doth He go forth unto the mountain? Making Himself manifest, that He may be taken, in order not to seem to hide himself. For He hastened to go to the place which was also known to Judas.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252082.html'
source_title='Homily on the Gospel of Matthew 82'

[[commentary]]
quote='''
Let them hear this, who like swine with no thought but of eating rise from the table drunk, when they should have given thanks, and closed with a hymn. Let them hear who will not tarry for the final prayer in the sacred mysteries; for the last prayer of the mysteries represents that hymn. He gave thanks before He delivered the holy mysteries to the disciples, that we also might give thanks; He sung a hymn after He had delivered them, that we also should do the like.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"
