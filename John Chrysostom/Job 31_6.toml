[[commentary]]
quote='''
There is in my way of life, even in its details, as much exactness as in the arm [of a balance]. I have not overlooked the smallest detail. For this, I do not appeal to the testimony of a mortal, who may want to please and ignores many things, but to the testimony of God, who accurately knows all that is hidden and to whom nothing can escape.
'''
source_url=''
source_title="COMMENTARY ON JOB 31:6A-7"
