[[commentary]]
quote='''
The woman straightway believed, showing herself much wiser than Nicodemus, and not only wiser, but more manly. For he when he heard ten thousand such things neither invited any others to this hearing, nor himself spake forth openly; but she exhibited the actions of an Apostle, preaching the Gospel to all, and calling them to Jesus, and drawing a whole city forth to Him. Nicodemus when he had heard said, "How can these things be?" And when Christ set before him a clear illustration, that of "the wind," he did not even so receive the Word. But the woman not so; at first she doubted, but afterwards receiving the Word not by any regular demonstration, but in the form of an assertion, she straightway hastened to embrace it. For when Christ said, "It shall be in him a well of water springing up into everlasting Life," immediately the woman saith, "Give me this water, that I thirst not, neither come hither to draw."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252032.html'
source_title="Homily on the Gospel of John 32"

[[commentary]]
quote='''
Seest thou how little by little she is led up to the highest doctrines? First she thought Him some Jew who was transgressing the Law; then when He had repelled that accusation, (for it was necessary that the person who was to teach her such things should not be suspected,) having heard of "living water," she supposed that this was spoken of material water; afterwards, having learnt that the words were spiritual, she believed that the water could remove the necessity caused by thirst, but knew not yet what this could be; she still doubted, deeming it indeed to be above material things, but not being exactly informed. But here having gained a clearer insight, but not yet fully perceiving the whole, (for she saith, "Give me this water, that I thirst not, neither come hither to draw,") she for the time preferreth Him to Jacob. "For" (saith she) "I need not this well if I receive from thee that water." Seest thou how she setteth Him before the Patriarch? This is the act of a fairly-judging soul. She had shown how great an opinion she had of Jacob, she saw One better than he, and was not held back by her prepossession. Thus this woman was neither of an easy temper, (she did not carelessly receive what was said, how can she have done so when she enquired with so great exactness?) nor yet disobedient, nor disputatious, and this she showed by her petition. Yet to the Jews once He said, "Whosoever shall eat of My flesh shall never hunger, and he that believeth on Me shall never thirst" (c. vi. 35); but they not only did not believe, but were offended at Him. The woman had no such feeling, she remains and petitions. To the Jews He said, "He that believeth on Me shall never thirst"; not so to the woman, but more grossly, "He that drinketh of this Water shall never thirst." For the promise referred to spiritual and unseen things. Wherefore having raised her mind by His promises, He still lingers among expressions relating to sense, because she could not as yet comprehend the exact expression of spiritual things. Since had He said, "If thou believest in Me thou shalt not thirst," she would not have understood His saying, not knowing who it could be that spake to her, nor concerning what kind of thirst He spake.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252032.html'
source_title="Homily on the Gospel of John 32"
