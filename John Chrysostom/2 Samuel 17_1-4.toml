[[commentary]]
quote='''
There is nothing so foreign to a Christian soul as haughtiness. Haughtiness, I say, not boldness nor courage, for these are congenial. But these are one thing, and that another; so too humility is one thing, and meanness, flattery, and adulation another. I will now, if you wish, give you examples of all these qualities. For these things which are contraries, seem in some way to be placed near together, as the tares to the wheat, and the thorns to the rose. But while babes might easily be deceived, they who are men in truth, and are skilled in spiritual husbandry, know how to separate what is really good from the bad. Let me then lay before you examples of these qualities from the Scriptures. What is flattery, and meanness, and adulation? Ziba flattered David out of season, and falsely slandered his master. Much more did Ahitophel flatter Absalom. But David was not so, but he was humble. For the deceitful are flatterers, as when they say, "O king, live for ever." Again, what flatterers the magicians are.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Philippians%2FHomily%25205.html'
source_title="HOMILIES ON PHILIPPIANS 5"
