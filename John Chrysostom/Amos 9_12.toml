[[commentary]]
quote='''
"After this I will return, and rebuild the tabernacle of David which is fallen down." But if one would look into the matter closely, the kingdom of David does in fact now stand, his Offspring reigning everywhere. For what is the good of the buildings and the city, with none obeying there? And what is the harm arising from the destruction of the city, when all are willing to give their very souls? There is that come which is more illustrious than David: in all parts of the world is he now sung. This has come to pass: if so, then must this also come to pass, "And I will build again the ruins thereof, and I will set it up:" to what end? "that the residue of men may seek the Lord, and all the Gentiles, upon whom My Name is called." If then it was to this end that the city rose again (namely) because of Him (that was to come) of them, it shows that of the building of the city the cause is, the calling of the Gentiles. Who are "the residue?" those who are then left. "And all the Gentiles, upon whom My Name is called:" but observe, how he keeps the due order, and brings them in second. "Saith the Lord, which doeth these things." Not "saith" (only), but "doeth." Why then, it was God's work.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252033.html'
source_title="Homily on Acts 33"
