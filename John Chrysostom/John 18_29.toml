[[commentary]]
quote='''
(Hom. lxxxiii. 4) Pilate however seeing Him bound, and such numbers conducting Him, supposed that they had not unquestionable evidence against Him, so proceeds to ask the question: And said, What accusation bring ye against this Man? For it was absurd, he said, to take the trial out of his hands, and yet give him the punishment.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"And having gone out, he said, What accusation bring ye against this man?" Seest thou that he was free from fondness for rule and from malice? For seeing Jesus bound, and led by so many persons, he did not think that they had unquestionable proof of their accusation, but questions them, thinking it a strange thing that they should take for themselves the judgment, and then commit the punishment without any judgment to him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title='Homily on the Gospel of John 83'
