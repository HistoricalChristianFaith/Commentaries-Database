[[commentary]]
quote='''
These men then let us also imitate. Because now too there is set up a golden image, even the tyranny of Mammon. But let us not give heed to the timbrels, nor to the flutes, nor to the harps, nor to the rest of the pomp of riches; yea, though we must needs fall into a furnace of poverty, let us choose it, rather than worship that idol, and there will be "in the midst a moist whistling wind." Let us not then shudder at hearing of "a furnace of poverty." For so too at that time they that fell into the furnace were shewn the more glorious, but they that worshipped were destroyed. Only then all took place at once, but in this case some part will be accomplished here, some there, some both here and in the day that is to come. For they that have chosen poverty, in order that they might not worship mammon, will be more glorious both here and then, but they that have been rich unjustly here, shall then pay the utmost penalty. From this furnace Lazarus too went forth, not less glorious than those children; but the rich man who was in the place of them that worshipped the image, was condemned to hell. For indeed what we have now mentioned was a type of this. Wherefore as in this instance they who fell into the furnace suffered no hurt, but they who sat without were laid hold of with great fierceness, so likewise shall it be then. The saints walking through the river of fire shall suffer no pain, nay they will even appear joyous; but they that have worshipped the image, shall see the fire rest upon them fiercer than any wild beast, and draw them in.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25204.html'
source_title="Homilies on the Gospel of Matthew 4"
