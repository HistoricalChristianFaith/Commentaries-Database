[[commentary]]
quote='''
"And here men that die receive tithes: but there he of whom it is testified that he liveth." But lest we should say, Tell us, why goest thou so far back? He says, "And as I may so say" (and he did well in softening it) "Levi also who receiveth tithes payed tithes in Abraham." How? "For he was yet in his loins when Melchisedec met him," i.e. Levi was in him, although he was not yet born. And he said not the Levites but Levi.

Hast thou seen the superiority? Hast thou seen how great is the interval between Abraham and Melchisedec, who bears the type of our High Priest? And he shows that the superiority had been caused by authority, not necessity. For the one paid the tithe, which indicates the priest: the other gave the blessing, which indicates the superior. This superiority passes on also to the descendants.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252012.html'
source_title="Homily on Hebrews 12"
