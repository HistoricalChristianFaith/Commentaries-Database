[[commentary]]
quote='''
(Hom. lxii. 2) But He does not add here, I go that I may awake him. He did not wish to anticipate the miracle by talking of it; a hint to us to shun vain glory, and abstain from empty promises.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
When therefore their disposition was somewhat reluctant, He said, "He is dead."

The former word He spake, desiring to prove that He loved not boasting; but since they understood not, He added, "He is dead."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252062.html'
source_title='Homily on the Gospel of John 62'
