[[commentary]]
quote='''
Awful in truth are the Mysteries of the Church, awful in truth is the Altar. A fountain went up out of Paradise sending forth material rivers, from this table springeth up a fountain which sendeth forth rivers spiritual. By the side of this fountain are planted not fruitless willows, but trees reaching even to heaven, bearing fruit ever timely and undecaying. If any be scorched with heat, let him come to the side of this fountain and cool his burning. For it quencheth drought, and comforteth all things that are burnt up, not by the sun, but by the fiery darts. For it hath its beginning from above, and its source is there, whence also its water floweth. Many are the streams of that fountain which the Comforter sendeth forth, and the Son is the Mediator, not holding mattock to clear the way, but opening our minds. This fountain is a fountain of light, spouting forth rays of truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252046.html'
source_title="HOMILIES ON JOHN 46.4"
