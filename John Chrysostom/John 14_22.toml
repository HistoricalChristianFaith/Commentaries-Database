[[commentary]]
quote='''
(Hom. lxxv. 1, 2) Or thus: Judas thought that he should see Him, as we see the dead in sleep: How is it, that Thou wilt manifest Thyself unto us, and not unto the world? meaning, Alas, as Thou art to die, Thou wilt appear to us but as one dead.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
