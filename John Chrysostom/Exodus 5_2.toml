[[commentary]]
quote='''
Let us then become lowly, that we may be high. For most utterly doth arrogance abase. This abased Pharaoh. For, "I know not," he saith, "the Lord," and he became inferior to flies and frogs, and the locusts, and after that with his very arms and horses was he drowned in the sea. In direct opposition to him, Abraham saith, "I am dust and ashes," and prevailed over countless barbarians, and having fallen into the midst of Egyptians, returned, bearing a trophy more glorious than the former, and, cleaving to this virtue, grew ever more high. Therefore he is celebrated everywhere, therefore he is crowned and proclaimed; but Pharaoh is both earth and ashes. For nothing doth God so abhor as arrogance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252065.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 65"
