[[commentary]]
quote='''
Prayer is a mighty weapon if it be made with suitable mind. And that thou mayest learn its strength, continued entreaty has overcome shamelessness, and injustice, and savage cruelty, and overbearing rashness. For He says, "Hear what the unjust judge saith." Again it has overcome sloth also, and what friendship did not effect, this continued entreaty did: and "although he will not give him because he is his friend," yet "because of his importunity he will rise and give to him." And continued assiduity made her worthy who was unworthy. "It is not meet" (He says) "to take the children's bread and to cast it to the dogs. Yea! Lord!" she says, "for even the dogs eat [the crumbs] from their master's table." Let us apply ourselves to Prayer. It is a mighty weapon if it be offered with earnestness, if without vainglory, if with a sincere mind. It has turned back wars, it has benefited an entire nation though undeserving. "I have heard their groaning" (He says) "and am come down to deliver them." It is itself a saving medicine, and has power to prevent sins, and to heal misdeeds. In this the desolate widow was assiduous.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252027.html'
source_title="Homily 27 on Hebrews"

[[commentary]]
quote='''
"I have seen, I have seen the affliction of My people which is in Egypt, and I have heard their groaning, and am come down to deliver them. And now come, I will send thee into Egypt." See, how he shows, that both by kindnesses, and by chastisements, and by miracles, God was drawing them to Him: but they were still the same. That God is everywhere present, they learned.

Hearing these things, let us in our afflictions flee to Him. "And their groaning," saith He, "I have heard:" not simply, "because of their calamities." But if any should ask, Why then did He suffer them to be evil entreated there? Why, in the first place, to every just man his sufferings are the causes of his rewards. And in the next place, as to why He afflicted them: it was to show His power, that He can (do all), and not only so, but that He may also train them. Observe in fact; when they were in the desert, then they "waxed fat, they grew thick, they spread out in breadth, they kicked": and ever and always ease was an evil. Therefore also from the beginning He said to Adam: "In the sweat of thy face thou shall eat thy bread." Also (it was) in order that having come out of much suffering into rest, they might give thanks to God. For affliction is a great good. For hear the Prophet saying, "It is good for me, that Thou hast humbled me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252016.html'
source_title="Homily on Acts 16"
