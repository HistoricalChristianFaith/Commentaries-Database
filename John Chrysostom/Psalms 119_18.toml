[[commentary]]
quote='''
God will not have us listen to the words and sentences contained in the Scriptures carelessly, but with much attention. This is why the blessed David hath prefixed in many places to his Psalms the title "for understanding," and hath said, "Open Thou mine eyes, that I may behold wondrous things out of Thy Law." And after him his son again shows that we ought to "seek out wisdom as silver, and to make merchandise of her rather than of gold." And the Lord when He exhorts the Jews to "search the Scriptures," the more urges us to the enquiry, for He would not thus have spoken if it were possible to comprehend them immediately at the first reading. No one would ever search for what is obvious and at hand, but for that which is wrapt in shadow, and which must be found after much enquiry; and so to arouse us to the search He calls them "hidden treasure."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252015.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 15"
