[[commentary]]
quote='''
When therefore he was led to the dungeon, after having received a great number of stripes, he took prisoner the keeper of the prison. His feet were in the stocks, and his hands in the chain; and the prison shook at midnight while they were singing hymns. See you, how His power was perfected in weakness? If Paul had been at large, and had shaken that building, the thing would not have been so wonderful. "For this reason," He saith, "remain bound; and the walls shall be shaken on every side, and the prisoners shall be loosed; in order that My power may appear the greater, when through thee, confined and in fetters, all that are in bonds shall be loosed." This very circumstance then it was which at the time astounded the keeper of the prison, that being so forcibly confined, he, through prayer alone, prevailed to shake the foundations, and throw open the doors of the prison, and to unbind all the prisoners.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25201.html'
source_title="HOMILIES CONCERNING THE STATUES 1.16"

[[commentary]]
quote='''
"Who, having received such a charge, thrust them into the inner prison, and made their feet fast in the stocks." Observe, he also again thrust them into the "inner" prison: and this too was done providentially, because there was to be a great miracle.

And, it says, "he made them fast in the stocks," as we should say, the nervum.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252035.html'
source_title="Homily on Acts 35"
