[[commentary]]
quote='''
For such is the nature of that nation: when there needs concerting together for a good object, not even two concur with each other: but when it is for an evil object, the entire people does it. And they admit the rulers also as accomplices. "And they came to the chief priests and elders, and said, We have bound ourselves under a great curse that we will eat nothing until we have slain Paul. Now therefore ye with the council signify to the tribune that he bring him down unto you to-morrow, as though ye would enquire something more perfectly concerning him: and we, or ever he come near, are ready to kill him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252049.html'
source_title="Homily on Acts 49"

[[commentary]]
quote='''
"We have bound ourselves," they say, "under a curse, that we will not eat nor drink." What is all this zeal? "That he may bring him down," it says, "unto you, as though ye would enquire into his case more perfectly." Has he not twice made a speech unto you? has he not said that he is a Pharisee? What would ye have over and above this? So reckless were they and afraid of nothing, not tribunals, not laws: such their hardihood which shrunk from nothing. They both declare their purpose, and announce the way of carrying it into effect.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252049.html'
source_title="Homily on Acts 49"

[[commentary]]
quote='''
And yet they ought to have come to the tribune, ought to have laid a charge, and assembled a court of justice: for these are not the doings for priests, but for captains of banditti, these are not the doings for rulers, but for ruffians. They endeavor also to corrupt the ruler: but it was providentially ordered, to the intent that he also should learn of their plot. For not only by their having nothing to say, but also by their secret attempt, they convicted themselves that they were naught.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252049.html'
source_title="Homily on Acts 49"
