[[commentary]]
quote='''
This is no small subject of enquiry which we propose, but rather about things which are of the first necessity and which all men enquire about; namely, whether hell fire have any end. For that it hath no end Christ indeed declared when he said, "Their fire shall not be quenched, and their worm shall not die."

Well: I know that a chill comes over you on hearing these things; but what am I to do? For this is God's own command, continually to sound these things in your ears, where He says, "Charge this people;" and ordained as we have been unto the ministry of the word, we must give pain to our hearers, not willingly but on compulsion. Nay rather, if you will, we shall avoid giving you pain. For saith He, "if thou do that which is good, fear not:" so that it is possible for you to hear me not only without ill-will, but even with pleasure.

As I said then; that it hath no end, Christ has declared. Paul also saith, in pointing out the eternity of the punishment, that the sinners "shall pay the penalty of destruction, and that for ever." And again, "Be not deceived; neither fornicators, nor adulterers, nor effeminate, shall inherit the kingdom of God." And also unto the Hebrews he saith, "Follow peace with all men, and the sanctification without which no man shall see the Lord." And Christ also, to those who said, "In thy Name we have done many wonderful works," saith, "Depart from Me, I know you not, ye workers of iniquity." And the virgins too who were shut out, entered in no more. And also about those who gave Him no food, He saith, "They shall go away into everlasting punishment."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%25209.html'
source_title="Homily 9 on 1 Corinthians"


[[commentary]]
quote='''
I have killed and buried thy former transgressions, like worms—how is it that thou hast bred others?—for sins are worse than worms, since these do harm to the body, those to the soul; and those make the more offensive stench. Yet we perceive it not, and so we are at no pains to purge them out. Thus the drunkard knows not how disgustful the stale wine is, but he that is not drunken has a distinct perception of it. So with sins also, he that lives soberly knows thoroughly that other mire, and the stain. But he that gives himself up to wickedness, like a man made drowsy with drunkenness, does not even know the very fact that he is ill. And this is the most grievous part of vice, that it does not allow those who fall into it even to see the greatness of their own bane, but as they lie in the mire, they think they are enjoying perfumes. And so they have not even the power of getting free, but when full of worms, like men that pride themselves in precious stones, so do they exult in these. And for this reason they have not so much as the will to kill them, but they even nourish these up, and multiply them in themselves, until they send them on to the worms of the world to come. For these are providers for those, and are not only providers, but even the fathers of those that never die; as it says, "their worm shall not die." These kindle the hell which never extinguishes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252011.html'
source_title="Homily 11 on Romans"
