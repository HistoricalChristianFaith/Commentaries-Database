[[commentary]]
quote='''
For so Moses for the sake of those he ruled left so great riches and treasures untold, "choosing to suffer affliction with the people of God," and before his appointment was leader of the people by his actions. Wherefore also very foolishly did that Hebrew say to him, "Who made thee a ruler and a judge over us?" What sayest thou? Thou seest the actions and doubtest of the title? Just as if one seeing a physician using the knife excellently well, and succoring that limb in the body which was diseased, should say, `Who made thee a physician and ordered thee to use the knife?' `Art, my good Sir, and thine own ailment.' So too did his knowledge make him (i.e., Moses,) what he claimed to be. For ruling is an art, not merely a dignity, and an art above all arts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%252015.html'
source_title="HOMILIES ON 2 CORINTHIANS 15.4"


[[commentary]]
quote='''
"By faith he forsook Egypt not fearing the wrath of the king; for he endured as seeing Him who is Invisible." What dost thou say? That he did not fear? And yet the Scripture says, that when he heard, he "was afraid," and for this cause provided for safety by flight, and stole away, and secretly withdrew himself; and afterwards he was exceedingly afraid. Observe the expressions with care: he said, "not fearing the wrath of the king," with reference to his even presenting himself again. For it would have been [the part] of one who was afraid, not to undertake again his championship, nor to have any hand in the matter. That he did however again undertake it, was [the part] of one who committed all to God: for he did not say, `He is seeking me, and is busy [in the search], and I cannot bear again to engage in this matter.' So that even flight was [an act of] faith. Why then did he not remain (you say)? That he might not cast himself into a foreseen danger. For this finally would have been tempting [God]: to leap into the midst of dangers, and say, `Let us see whether God will save me.' And this the devil said to Christ, "Cast Thyself down." Seest thou that it is a diabolical thing, to throw ourselves into danger without cause and for no purpose, and to try whether God will save us? For he [Moses] could no longer be their champion when they who were receiving benefits were so ungrateful. It would therefore have been a foolish and senseless thing to remain there. But all these things were done, because, "he endured as seeing Him who is Invisible."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252026.html'
source_title="HOMILIES ON HEBREWS 26.5"
