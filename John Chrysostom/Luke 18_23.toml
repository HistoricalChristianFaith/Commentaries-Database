[[commentary]]
quote='''
(Hom. 63. in Matt.) Or else; I shall not hesitate to call this ruler covetous, for with this Christ reproaches him, but I say not that he was a tempter.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'
