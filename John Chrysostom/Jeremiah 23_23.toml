[[commentary]]
quote='''
From this time on, bid everything farewell for these five days and begin to observe the feast. Away with the business of the law courts! Away with the business of the city council! Away with daily affairs together with their contracts and business deals! I wish to save my soul. "What does it profit a person if he gains the whole world but suffers the loss of his soul?" The Magi went forth from Persia. You go forth from the affairs of daily life. Make your journey to Jesus. It is not far to travel if we are willing to make the trip. We need not cross the sea or climb the mountain crests. If you prove your piety and full compunction, you can see him without leaving home, you can tear down the whole wall, remove every obstacle and shorten the length of the journey. As the prophet said, "I am a God near at hand and not a God afar off," and, "The Lord is close to all who call on him in truth."
'''
source_url=''
source_title="AGAINST THE ANOMOEANS 6:34"


[[commentary]]
quote='''
For were He distant from us in place, thou mightest well doubt, but if He is present everywhere, to him that strives and is in earnest He is near. Wherefore also the prophet said, "I will fear no evil, for Thou art with me;" and God Himself again, "I am a God nigh at hand, and not a God afar off." Then as our sins separate us from Him, so do our righteousnesses draw us nigh unto Him. "For while thou art yet speaking," it is said, "I will say, Here I am." What father would ever be thus obedient to his offspring? What mother is there, so ready, and continually standing, if haply her children call her? There is not one, no father, no mother: but God stands continually waiting, if any of his servants should perchance call Him; and never, when we have called as we ought, hath He refused to hear. Therefore He saith, "While thou art yet speaking," I do not wait for thee to finish, and I straightway hearken.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252054.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 54:8"
