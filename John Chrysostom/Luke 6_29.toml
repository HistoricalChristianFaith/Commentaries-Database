[[commentary]]
quote='''
(ubi sup.) Now He said not, Bear humbly the rule of thy persecutor, but, Go on wisely, and prepare thyself to suffer what he desires thee to do; overcoming his insolence by thy great prudence, that he may depart with shame at thy excellent endurance.
But some one will say, How can this be? When thou hast seen God made man, and suffering so many things for thee, dost thou still ask and doubt how it is possible to pardon the iniquities of thy fellow servants? Who has suffered what thy God has, when He was bound, scourged, enduring to be spat upon, suffering death?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
