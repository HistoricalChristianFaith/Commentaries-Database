[[commentary]]
quote='''
Not only to-day, therefore, but every day let us go forth to him, plucking spiritual fruits from him. For it is, it is possible for him who comes hither with faith to gather the fruit of many good things. For not the bodies only, but the very sepulchres of the saints have been filled with spiritual grace. For if in the case of Elisha this happened, and a corpse when it touched the sepulchre, burst the bands of death and returned to life again, much rather now, when grace is more abundant, when the energy of the spirit is greater, is it possible that one touching a sepulchre, with faith, should win great power; thence on this account God allowed us the remains of the saints, wishing to lead by them us to the same emulation, and to afford us a kind of haven, and a secure consolation for the evils which are ever overtaking us. Wherefore I beseech you all, if any is in despondency, if in disease, if under insult, if in any other circumstance of this life, if in the depth of sins, let him come hither with faith, and he will lay aside all those things, and will return with much joy, having procured a lighter conscience from the sight alone. But more, it is not only necessary that those who are in affliction should come hither, but if any one be in cheerfulness, in glory, in power, in much assurance towards God, let not this man despise the benefit. For coming hither and beholding this saint, he will keep these noble possessions unmoved, persuading his own soul to be moderate by the recollection of this man's mighty deeds, and not suffering his conscience by the mighty deeds to be lifted up to any self conceit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FEulogy%2520Saint%2520Ignatius.html'
source_title="Eulogy on Saint Ignatius"
