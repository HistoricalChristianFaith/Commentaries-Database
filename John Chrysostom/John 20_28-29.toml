[[commentary]]
quote='''
Seest thou that his doubt proceeded from unbelief? But it was before he had received the Spirit; after that, it was no longer so, but, for the future, they were perfected. And not in this way only did Jesus rebuke him, but also by what follows; for when he, being fully satisfied, breathed again, and cried aloud, "My Lord, and my God," He saith, "Because thou hast seen Me, thou hast believed; blessed are they who have not seen, and yet have believed." For this is of faith, to receive things not seen; since, "Faith is the substance of things hoped for, the evidence of things not seen." And here He pronounceth blessed not the disciples only, but those also who after them should believe. "Yet," saith some one, "the disciples saw and believed." Yes, but they sought nothing of the kind, but from the proof of the napkins, they straightway received the word concerning the Resurrection, and before they saw the body, exhibited all faith. When therefore any one in the present day say, "I would that I had lived in those times, and had seen Christ working miracles," let them reflect, that, "Blessed are they who have not seen, and yet have believed." It is worth enquiring, how an incorruptible body showed the prints of the nails, and was tangible by a mortal hand. But be not thou disturbed; what took place was a matter of condescension. For that which was so subtle and light as to enter in when the doors were shut, was free from all density; but this marvel was shown, that the Resurrection might be believed, and that men might know that it was the Crucified One Himself, and that another rose not in His stead. On this account He arose bearing the signs of the Cross, and on this account He eateth. At least the Apostles everywhere made this a sign of the Resurrection, saying, "We, who did eat and drink with Him." As therefore when we see Him walking on the waves before the Crucifixion, we do not say, that that body is of a different nature, but of our own; so after the Resurrection, when we see Him with the prints of the nails, we will no more say, that he is therefore corruptible. For He exhibited these appearances on account of the disciple.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title="Homily on the Gospel of John 87"
