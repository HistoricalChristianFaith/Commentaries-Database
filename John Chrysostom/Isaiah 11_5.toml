[[commentary]]
quote='''
"Stand therefore," saith he, "having girded your loins with truth." He is not speaking of a literal, physical girdle, for all the language in this passage he employs in a spiritual sense. And observe how methodically he proceeds. First he girds up his soldier. What then is the meaning of this? The man that is loose in his life, and is dissolved in his lusts, and that has his thoughts trailing on the ground, him he braces up by means of this girdle, not suffering him to be impeded by the garments entangling his legs, but leaving him to run with his feet well at liberty. "Stand therefore, having girded your loins," saith he. By the "loins" here he means this; just what the keel is in ships, the same are the loins with us, the basis or groundwork of the whole body: for they are, as it were, a foundation, and upon them as the schools of the physicians tell you, the whole frame is built. So then in "girding up the loins" he compacts the foundation of our soul; for he is not of course speaking of these loins of our body, but is discoursing spiritually: and as the loins are the foundation alike of the parts both above and below, so is it also in the case of these spiritual loins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Ephesians%2FHomily%252023.html'
source_title="HOMILIES ON EPHESIANS 23"
