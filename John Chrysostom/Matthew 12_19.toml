[[commentary]]
quote='''
Then proclaiming His meekness, he saith, "He shall not strive nor cry." For His desire indeed was to heal in their presence; but since they thrust Him away, not even against this did He contend.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252040.html'
source_title='Homily on the Gospel of Matthew 40'
