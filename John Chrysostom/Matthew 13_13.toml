[[commentary]]
quote='''
But that what He had said might be made more manifest He adds, Therefore speak I unto them in parables, because seeing they see not, and hearing they hear not, neither do they understand. Had this been a natural blindness, He ought to have opened their eyes; but forasmuch as it is voluntary, therefore He said not simply, 'They see not,' but, Seeing they see not. For they had seen the dæmons going out, and they said, He casts out dæmons by Beelzebub; they heard that He drew all men to God, and they say, This man is not of God. (John 9:16) Therefore because they spake the very contrary to what they saw and heard, to see and to hear is taken from them; for they profit nothing, but rather fall under judgment. For this reason He spake to them at first not in parables, but with much clearness; but because they perverted all they saw and heard, He now speaks in parables.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"Therefore," saith He, "speak I to them in parables; because they seeing see not."

"It were meet then," one may say, "to have opened their eyes, if they see not." Nay, if the blindness were natural, it were meet to open them; but because it was a voluntary and self-chosen blindness, therefore He said not simply, "They see not," but, "seeing, they see not;" so that the blindness is of their own wickedness. For they saw even devils cast out, and said, "By Beelzebub, prince of the devils, He casteth out the devils." They heard Him guiding them unto God, and evincing His great unanimity with Him, and they say, "This man is not of God." Since then the judgment they pronounced was contrary both to their sight and hearing, therefore, saith He, the very hearing do I take away from them. For they derive thence no advantage, but rather greater condemnation. For they not only disbelieved, but found fault also, and accused, and laid snares. However, He saith not this, for it is not His will to give disgust in accusing them. Therefore neither at the beginning did He so discourse to them, but with much plainness; but because they perverted themselves, thenceforth He speaks in parables.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252045.html'
source_title='Homily on the Gospel of Matthew 45'
