[[commentary]]
quote='''
(Hom. lxxxiii) To establish the matter, however, upon superabundant evidence, He adds, Why askest thou Me? ask them which heard Me what I said unto them; behold, they know what I said unto them: as if He said, Thou askest Me of My disciples; ask My enemies, who lie in wait for Me. These are the words of one who was confident of the truth of what He said: for it is incontrovertible evidence, when enemies are called in as witnesses.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"Why askest thou Me? Ask them which heard Me." These are not the words of one speaking arrogantly, but of one confiding in the truth of what He had said. What therefore He said at the beginning, "If I bear witness of Myself, My witness is not true," this He now implieth, desiring to render His testimony abundantly credible. For when Annas mentioned the disciples, what saith He? "Dost thou ask Me concerning Mine? Ask Mine enemies, ask those who have plotted against Me, who have bound Me; let them speak." This is an unquestionable proof of truth, when one calls his enemies to be witnesses to what he saith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title='Homily on the Gospel of John 83'
