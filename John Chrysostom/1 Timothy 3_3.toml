[[commentary]]
quote='''
"Not given to wine": here he does not so much mean intemperate, as insolent and impudent. "No striker": this too does not mean a striker with the hands. What means then "no striker"? Because there are some who unseasonably smite the consciences of their brethren, it seems to be said with reference to them. "Not greedy of filthy lucre, but patient: not a brawler, not covetous;" ... But why does he say, speaking of a Bishop, that he should be "not given to wine, hospitable," when he should name greater things? Why said he not that he should be an Angel, not subject to human passions? Where are those great qualities of which Christ speaks, which even those under their rule ought to possess? To be crucified to the world, to be always ready to lay down their lives, as Christ said. "The good Shepherd giveth his life for the sheep" (John x. 11); and again, "He that taketh not his cross and followeth after me, is not worthy of me." (Matt. x. 38) But "not given to wine," he says; a good prospect indeed, if such are the things of which a Bishop is to be admonished! Why has he not said that he ought to be already raised above the world? But dost thou demand less of the Bishop, than even of those in the world? For to these he saith, "Mortify your members which are upon the earth" (Col. iii. 5), and "He that is dead, is freed from sin." (Rom. vi. 7) "They that are Christ's have crucified the flesh"; and Christ again says, "Whosoever forsaketh not all that he hath, he is not worthy of Me." (Luke xv. 33) Why are not these things required by Paul? Plainly because few could be found of such a character, and there was need of many Bishops, that one might preside in every city.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%252010.html'
source_title="Homily on 1 Timothy 10"
