[[commentary]]
quote='''
"For this is the will of Him that sent Me, that of all which He hath given Me I should lose nothing." Here He showeth that He needeth not their service, that He came not for His own advantage, but for their salvation; and not to get honor from them. Which indeed He declared in a former address, saying, "I receive not honor from men"; and again, "These things I say that ye may be saved." Since He everywhere laboreth to persuade them that He came for their salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252045.html'
source_title='Homily on the Gospel of John 45'

[[commentary]]
quote='''
But what is it that He saith, "All that the Father giveth Me shall come unto Me," and "I will raise it up in the last day"? Wherefore speaketh He of the common resurrection, in which even the ungodly have a part, as though it were the peculiar gift of those who believe on Him? Because He speaketh not simply of resurrection, but of a particular kind of resurrection. For having first said, "I will not cast him out, I shall lose nothing of it," He then speaketh of the resurrection. Since in the resurrection some are cast out, ("Take him, and cast him into outer darkness,") and some are destroyed. ("Rather fear Him who is able to destroy both soul and body in hell.") This then, the resurrection to good things, is that which He here designed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252045.html'
source_title='Homily on the Gospel of John 45'