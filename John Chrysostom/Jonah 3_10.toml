[[commentary]]
quote='''
For God even preferred that His own prediction should fall to the ground, so that the city should not fall. Or rather, the prophecy did not even so fall to the ground. For if indeed while the men continued in the same wickedness, the sentence had not taken effect, some one perhaps might have brought a charge against what was uttered. But if when they had changed, and desisted from their iniquity, God also desisted from His wrath, who shall be able any longer to find fault with the prophecy, or to convict the things spoken of falsehood. The same law indeed which God had laid down from the beginning, publishing it to all men by the prophet, was on that occasion strictly observed. What then is this law? "I shall speak a sentence," saith He, "concerning a nation or a kingdom, to pluck up, and to pull down, and to destroy it; and it shall be, that if they repent of their evil, I will also repent of the wrath which I said I would do unto them." Guarding then this law, he saved those who were converted and released from His wrath those who desisted from their wickedness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25205.html'
source_title="HOMILIES CONCERNING THE STATUES 5"

[[commentary]]
quote='''
Let us imitate the spiritual wisdom of the barbarians. They repented even on uncertain grounds! For the sentence had no such clause, "If ye turn and repent, I will set up the city;" but simply, "Yet three days, and Nineveh shall be overthrown." What then said they? "Who knoweth whether God will repent of the evil He said He would do unto us?" Who knoweth? They know not the end of the event, and yet they do not neglect repentance! They are unacquainted with God's method of shewing mercy, and yet they change upon the strength of uncertainties! For neither was it in their power to look at other Ninevites who had repented and been saved; nor had they read prophets; nor had they heard patriarchs; nor had they enjoyed counsel, or partaken of admonition; nor had they persuaded themselves that they should certainly propitiate God by repentance. For the threatening did not imply this: but they were doubtful, and hesitating concerning it; and yet they repented with all diligence. What reason then shall we have to urge, when those, who had no ground for confidence as to the issue, are seen to have exhibited so great a change; but thou who hast ground of confidence in the mercy of God, and who hast frequently received many pledges of His care, and hast heard prophets, and apostles, and hast been instructed by actual events; hast yet no emulation to reach the same measure of virtue as these did! Great assuredly was their virtue! but greater by far was the mercy of God!… For that fear was the cause of its safety. The threatening effected the deliverance from the peril. The sentence of overthrow put a stop to the overthrow. O strange and astonishing event! the sentence threatening death, brought forth life!… Was Nineveh overthrown? Was the city destroyed? Nay, quite the contrary; it both arose, and became still more distinguished; and long as is the time which has elapsed, it has not effaced its glory, but we all still celebrate and admire it even to this day. For from that time it hath been a sort of excellent haven for all who have sinned, not suffering them to sink into desperation, but calling all to repentance; and by what it did, and by what it obtained of God's favour, persuading men never to despair of their salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25205.html'
source_title="HOMILIES CONCERNING THE STATUES 5"

[[commentary]]
quote='''
And that these words are not a vain boast, shall be made manifest to you from things that have already happened. What could be more stupid than the Ninevites? What more devoid of understanding? Yet, nevertheless, these barbarian, foolish people, who had never yet heard any one teaching them wisdom, who had never received such precepts from others, when they heard the prophet saying, "Yet three days, and Nineveh shall be overthrown," laid aside, within three days, the whole of their evil customs. The fornicator became chaste; the bold man meek; the grasping and extortionate moderate and kind; the slothful industrious. They did not, indeed, reform one, or two, or three, or four vices by way of remedy, but the whole of their iniquity. But whence does this appear, says some one? From the words of the prophet; for the same who had been their accuser, and who had said, that "the cry of their wickedness hath ascended up even to heaven:" himself again bears testimony of an opposite kind, by saying, "God saw that every one departed from their own evil ways." He does not say, from fornication, or adultery, or theft, but from their "own evil ways." And how did they depart? As God knew, not as man judged of the matter. After this are we not ashamed, must we not blush, if it turns out that in three days only the barbarians laid aside all their wickedness, but that we, who have been urged and taught during so many days, have not got the better of one bad habit? These men had, moreover, gone to the extreme of wickedness before; for when you hear it said, "The cry of their wickedness is come up before me;" you can understand nothing else than the excess of their wickedness. Nevertheless, within three days they were capable of being transformed to a state of complete virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252020.html'
source_title="HOMILIES CONCERNING THE STATUES 20"


[[commentary]]
quote='''
In old time the Ninevites sinned, and they did the things which ye too now are doing. Let us see however what it was that availed them. For as in the case of the sick, physicians apply many remedies; howbeit the man of understanding regardeth not that the sick person has tried this and that, but what was of service to him; such must be also our inquiry here. What then was it that availed those barbarians? They applied fasting unto the wounds, yea applied extreme fasting, lying on the ground too, putting on of sackcloth, and ashes, and lamentations; they applied also a change of life. Let us then see which of these things made them whole. And whence, saith one, shall we know? If we come to the Physician, if we ask Him: for He will not hide it from us, but will even eagerly disclose it. Rather that none may be ignorant, nor need to ask, He hath even set down in writing the medicine that restored them. What then is this? "God," saith He, "saw that they turned every one from his evil way, and He repented of the evil that He had said He would do unto them." He said not, He saw [their] fasting and sackcloth and ashes. And I say not this to overturn fasting, (God forbid!) but to exhort you that with fasting ye do that which is better than fasting, the abstaining from all evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%25204.html'
source_title="HOMILIES ON 2 CORINTHIANS 4"
