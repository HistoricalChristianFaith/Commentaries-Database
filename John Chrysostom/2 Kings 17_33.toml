[[commentary]]
quote='''
How then did the Samaritans "know not" what they worshiped? Because they thought that God was local and partial; so at least they served Him, and so they sent to the Persians, and reported that "the God of this place is wroth with us," in this respect forming no higher opinion of Him than of their idols. Wherefore they continued to serve both Him and devils, joining things which ought not to be joined. The Jews, on the contrary, were free from this supposition, at least the greater part of them, and knew that He was God of the world. Therefore He saith, "Ye worship ye know not what; we know what we worship."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252033.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 33.1"
