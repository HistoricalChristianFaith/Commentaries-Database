[[commentary]]
quote='''
From the prophets I will prove that the Old and New Covenants have one Lawgiver. And so, what does Jeremiah say? "I will give you a new covenant." Do you see Jeremiah's prophetic reference to a new covenant that shines forth brilliantly for so many years before Christ's coming? "I will give you a new covenant." But how does it seem that he gave even the Old? When he said, "I will give you a new covenant," he added, "not like the covenant that I gave to your ancestors."
'''
source_url=''
source_title="HOMILIES ON REPENTANCE AND ALMSGIVING 6:4.15"


[[commentary]]
quote='''
See ye not how their reasoning comes round to the very contrary? how the God of the old covenant, whom they call cruel, will be found mild and meek: and He of the new, whom they acknowledged to be good, will be hard and grievous, according to their madness? Whereas we say, that there is but one and the same Legislator of either covenant, who dispensed all meetly, and adapted to the difference of the times the difference between the two systems of law. Therefore neither are the first commandments cruel, nor the second hard and grievous, but all of one and the same providential care. For that He Himself gave the old covenant also, hear the affirmation of the prophet, or rather (so we must speak), of Him who is both the one and the other: "I will make a covenant with you, not according to the covenant which I made with your fathers."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252016.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 16:8"
