[[commentary]]
quote='''
Do not then cast all [the burden] on your teachers; do not [cast] all upon them who have the rule over you: ye also (he means) are able to edify one another. Which also he said in writing to the Thessalonians, "Edify one another, even as also ye do." (1 Thess. v. 11.) And again, "Comfort one another with these words." (1 Thess. iv. 18.) This we also now exhort you.

If ye be willing, ye will have more success with each other than we can have. For ye both are with one another for a longer time, and ye know more than we of each other's affairs, and ye are not ignorant of each other's failings, and ye have more freedom of speech, and love, and intimacy; and these are no small [advantages] for teaching, but great and opportune introductions for it: ye will be more able than we both to reprove and to exhort. And not this only, but because I am but one, whereas ye are many; and ye will be able, however many, to be teachers. Wherefore I entreat you, do not "neglect this gift." Each one of you has a wife, has a friend, has a servant, has a neighbor; let him reprove him, let him exhort him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Hebrews%2FHomily%252030.html'
source_title="Homily on Hebrews 30"

[[commentary]]
quote='''
"Neglect not the gift that is in thee, which was given thee by prophecy." Here he calls teaching prophecy. "With the laying on of the hands of the presbytery." He speaks not here of Presbyters, but of Bishops. For Presbyters cannot be supposed to have ordained a Bishop.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Timothy%2FHomily%252013.html'
source_title="Homily on 1 Timothy 13"
