[[commentary]]
quote='''
(Hom. xliii. s. 1) He appeared to them in this way, to show His power; for He immediately calmed the tempest: Then they wished to receive Him into the ship; and immediately the ship was at the land, whither they went. So great was the calm, He did not even enter the ship, in order to work a greater miracle, and to show his Divinity more clearly.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
He went not up into the ship, that He might make the marvel greater.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252043.html'
source_title='Homily on the Gospel of John 43'
