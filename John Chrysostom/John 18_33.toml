[[commentary]]
quote='''
Pilate, wishing to be freed from trouble, doth not dismiss Him for a long trial, but, "Having entered in, he asked Jesus, and said, Art thou the King of the Jews?" ... Pilate had heard this saying from many, and, since the accusers had nothing to say, in order that the enquiry might not be a long one, he desires to bring forward that which was continually reported. But when he said to them, "Judge him according to your law," wishing to show that His offense was not a Jewish one, they replied, "It is not lawful for us." "He hath not sinned against our law, but the indictment is general." Pilate then, having perceived this, saith, as being (himself) likely to be endangered, "Art thou the King of the Jews?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title="Homily on the Gospel of John 83"

[[commentary]]
quote='''
But why was it that Pilate made the enquiry not in their presence, but apart, having gone into the judgment hall? He suspected something great respecting Him, and wished, without being troubled by the Jews, to learn all accurately.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252084.html'
source_title="Homily on the Gospel of John 84"
