[[commentary]]
quote='''
Shouldest thou then have gone all lengths in wickedness, yet say unto thyself, God is loving unto men and he desires our salvation: for "though your sins be as scarlet, I will whiten you as snow," saith He; and unto the contrary habit I will change you. Let us not therefore give up in despair; for to fall is not so grievous, as to lie where we have fallen; nor to be wounded so dreadful, as after wounds to refuse healing. "For who shall boast that he has his heart chaste? or who shall say confidently that he is pure from sin?" These things I say not to make you more negligent, but to prevent your despairing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%25208.html'
source_title="HOMILIES ON 1 CORINTHIANS 8:8 (4)"


[[commentary]]
quote='''
Why adornest thou thy body, while thy soul is neglected, possessed by uncleanness? Why bestowest thou not so much thought on thy soul, as thy body? Thou oughtest to bestow greater; but anyhow, beloved, we ought to bestow equal care upon it. For tell me, if any one asked thee which thou wouldest choose, that thy body should be fresh and of good habit and surpassing in beauty, and wear mean raiment, or having the body deformed and full of diseases, to wear gold and finery; wouldest thou not much prefer to have beauty depending on the nature of thy person, than on the raiment with which thou art clothed? And wilt thou choose this in the case of thy body, but the contrary in the case of thy soul; and, when thou hast that ugly and unsightly and black, dost thou think to gain anything from golden ornaments? What madness is this! Shift this adorning within, put these necklaces about thy soul. The things that are put about thy body help neither to its health nor to its beauty, for it will not make black white, nor what is ugly either beautiful or good looking. But if thou put them about thy soul, thou shalt soon make it white instead of black, instead of ugly and unsightly, thou shalt make it beautiful and well-favored. The words are not mine, but those of the Lord Himself, who saith, "Though thy sins be as scarlet, I will make them white as snow"; and, "Give alms—and all things shall be clean unto you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252069.html'
source_title="HOMILIES ON THE GOSPEL OF JOHN 69"
