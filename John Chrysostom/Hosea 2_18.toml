[[commentary]]
quote='''
For He hath come as a Physician, not as a Judge. Therefore in like manner as those of old took harlots for wives, even so God too espoused unto Himself the nature which had played the harlot: and this also prophets from the beginning declare to have taken place with respect to the Synagogue. But that spouse was ungrateful towards Him who had been an husband to her, whereas, the Church, when once delivered from the evils received from our fathers, continued to embrace the Bridegroom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25203.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 3:5"
