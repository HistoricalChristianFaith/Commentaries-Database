[[commentary]]
quote='''
"Jesus answered him, Sayest thou this thing of thyself, or did others tell it thee of Me?" Wherefore did Christ ask this? Because He desired to expose the evil intentions of the Jews. Pilate had heard this saying from many, and, since the accusers had nothing to say, in order that the enquiry might not be a long one, he desires to bring forward that which was continually reported. But when he said to them, "Judge him according to your law," wishing to show that His offense was not a Jewish one, they replied, "It is not lawful for us." "He hath not sinned against our law, but the indictment is general." Pilate then, having perceived this, saith, as being (himself) likely to be endangered, "Art thou the King of the Jews?" Then Jesus, not from ignorance, but from a desire that the Jews should be accused even by him, asked him, saying, "Did others tell it thee?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252083.html'
source_title='Homily on the Gospel of John 83'
