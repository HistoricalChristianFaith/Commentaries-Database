[[commentary]]
quote='''
He might also have mentioned another instance, that of the Egyptian, but what he has spoken is fully sufficient. And he closes his speech with an alarming topic: "Lest haply," etc. And he does not pronounce upon it, lest he should seem to be pleading their cause; but he reasons by way of syllogism from the issue of the matter. And he does not venture to pronounce that it is not of men, nor yet that it is of God; for had he said that it was of God, they would have gainsaid him: but had he said that it was of men, they would again have taken prompt measures. Therefore he bids them wait for the end, saying, "Refrain." But they once more threaten knowing indeed that they avail nothing, but doing after their manner. Such is the nature of wickedness: it attempts even impossibilities.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252014.html'
source_title="Homily on Acts 14"

[[commentary]]
quote='''
He would dissuade them both by the consideration that the thing is impossible, and because it is not for their good. And he does not say by whom these people were destroyed, but that there they "were scattered," and their confederacy fell away to nothing. For if, says he, it be of man, what needs any ado on your part? but if it be of God, for all your ado you will not be able to overcome it. The argument is unanswerable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252014.html'
source_title="Homily on Acts 14"
