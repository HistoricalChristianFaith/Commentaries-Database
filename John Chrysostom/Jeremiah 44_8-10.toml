[[commentary]]
quote='''
Then, since they kept on in a state of incurable madness, and were not to be sobered even by the rest being carried away, he first exhorts them to remain there. But when they kept not up to this, but deserted to Egypt, this indeed He allowed them, but requires of them not to desert to irreligion as well as to Egypt. But when they did not comply in this either, He sendeth the prophet along with them, so that they might not after all suffer total wreck. For since they did not follow Him when He called, He next followeth them to discipline them, and hinder their being hurried further into vice, and as a father full of affection does a child who takes all treatment in the same peevish way, conducting him about everywhere with himself, and following him about. This was the reason why He sent not Jeremiah only into Egypt, but also Ezekiel into Babylon, and they did not refuse to go. For when they found their Master love the people exceedingly, they continued themselves to do so likewise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252014.html'
source_title="HOMILIES ON ROMANS 14"
