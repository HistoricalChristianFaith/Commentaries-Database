[[commentary]]
quote='''
I will now cite you from the Scriptures a wonderful instance of friendship. Jonathan, the son of Saul, loved David, and his soul was so knit to him, that David in mourning over him says, "Thy love to me was wonderful, passing the love of women. Thou wast wounded unto death." What then? did he envy David? Not at all, though he had great reason. How? Because, by the events he perceived that the kingdom would pass from himself to him, yet he felt nothing of the kind. He did not say, "This is he that is depriving me of my paternal kingdom," but he favored his obtaining the sovereignty; and he spared not his father for the sake of his friend. Yet let not any one think him a parricide, for he did not injure his father, but restrained his unjust attempts. He rather spared than injured him. He did not permit him to proceed to an unjust murder. He was many times willing even to die for his friend, and far from accusing him, he restrained even his father's accusation. Instead of envying, he joined in obtaining the kingdom for him. Why do I speak of wealth? He even sacrificed his own life for him. For the sake of his friend, he did not even stand in awe of his father, since his father entertained unjust designs, but his conscience was free from all such. Thus justice was conjoined with friendship. Such then was Jonathan. Let us now consider David. He had no opportunity of returning the recompense, for his benefactor was taken away before the reign of David, and slain before he whom he had served came to his kingdom. What then? As far as it was allowed him and left in his power, let us see how that righteous man manifested his friendship. "Very pleasant," he says, "hast thou been to me, Jonathan; thou wast wounded unto death." Is this all? This indeed was no slight tribute, but he also frequently rescued from danger his son and his grandson, remembrance of the kindness of the father, and he continued to support and protect his children, as he would have done those of his own son. Such friendship I would wish all to entertain both towards the living and the dead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Timothy%2FHomily%25207.html'
source_title="HOMILIES ON 2 TIMOTHY 7"
