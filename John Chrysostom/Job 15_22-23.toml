[[commentary]]
quote='''
“He has been appointed to be food for vultures.” “He has already been given over to the power of the sword.” Notice this again. His death is pitiful. It is not conformed to the common law of nature but is the result of violence, war and battle. After his death, he will not have a burial or a funeral and will not only be deprived of a tomb but will also be “food for vultures.” “He knows within himself that he is doomed to be a carcass.” The foreboding of these events makes them even more painful for Job when they are predicted to him and announced beforehand.
'''
source_url=''
source_title="COMMENTARY ON JOB 15:17-23B"
