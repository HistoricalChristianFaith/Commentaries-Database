[[commentary]]
quote='''
This He said because they had taken away their own sight and hearing, shutting their eyes, and hardening their hearts. For not only did they not hear at all, but they heard obtusely, as it follows, The heart of this people is waxed gross, and they have heard hardly with their ears.

Herein He points out how extreme their wickedness, how determined their aversion. Again to draw them towards Him, He adds, And be converted, and I should heal them; which shows that if they would be converted, they should be healed. As if one should say, If he would ask me I would immediately forgive him, this would point out how he might be reconciled; so here when He says, Lest they should he converted and I should heal them, He, shows that it was possible they should be converted, and having done penitence should be saved.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
For they not only failed to hear, but also "heard heavily," and they did this, He saith,

"Lest at any time they should be converted, and I should heal them;" describing their aggravated wickedness, and their determined defection from Him. And this He saith to draw them unto Him, and to provoke them, and to signify that if they would convert He would heal them: much as if one should say, "He would not look at me, and I thank him; for if he had vouchsafed me this, I should straightway have given in:" and this he saith, to signify how he would have been reconciled. Even so then here too it is said, "Lest at any time they should convert, and I should heal them;" implying that both their conversion was possible, and that upon their repentance they might be saved, and that not for His own glory, but for their salvation, He was doing all things.

For if it had not been His will that they should hear and be saved, He ought to have been silent, not to have spoken in parables; but now by this very thing He stirs them up, even by speaking under a veil. "For God willeth not the death of the sinner, but that he should turn unto Him and live."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252045.html'
source_title='Homily on the Gospel of Matthew 45'
