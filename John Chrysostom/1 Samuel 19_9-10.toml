[[commentary]]
quote='''
As also, on the other hand, if we have no works, the Spirit flieth away. But if we be deserted by the Spirit, we shall also halt in our works. For when this hath gone, the unclean one cometh: this is plain from Saul. For what if he doth not choke us as he did him, still he strangles us in some other way by wicked works. We have need then of the harp of David, that we may charm our souls with the divine songs, both these, and those from good actions. Since if we do the one only, and while we listen to the charm, war with the charmer by our actions, as he did of old; the remedy will even turn to judgment to us, and the madness become the more furious. For before we heard, the wicked demon was afraid lest we should hear it and recover. But when after hearing it even, we continue the same as we were, this is the very thing to rid him of his fear. Let us sing then the Psalm of good deeds, that we may cast out the sin that is worse than the demon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Romans%2FHomily%252028.html'
source_title="HOMILIES ON ROMANS 28"
