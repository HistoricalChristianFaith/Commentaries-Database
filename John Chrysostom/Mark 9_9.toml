[[commentary]]
quote='''
So He bound them to silence. Furthermore he spoke of his passion as though it were the reason why he asked them to be silent. Note that he did not tell them that they must never tell this to anyone. Instead they should not tell it until he had risen from the dead. In this respect he was silent as to what was painful, and spoke only of what was joyful.
'''
source_url=''
source_title="GOSPEL OF ST MATTHEW, HOMILY 57"


[[commentary]]
quote='''
(Hom in Matt. 56) Where He not only orders them to be silent, but mentioning His Passion, He implies the cause why they were to be silent.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
