[[commentary]]
quote='''
What then doth he mean when he saith, "If any obeyeth not our word by this epistle, note that man, that ye have no company with him?" In the first place, he saith this of brethren, however not even so without limitation, but this too with gentleness. For do not thou cut off what follows, but subjoin also the next clause: how, having said, "keep no company," he added, "yet count him not as an enemy, but admonish him as a brother." Seest thou how he bade us hate the deed that is evil, and not the man? For indeed it is the work of the devil to tear us asunder from one another, and he hath ever used great diligence to take away love that he may cut off the way of correction, and may retain him in error and thee in enmity, and thus block up the way of his salvation. For when both the physician hates the sick man and flies from him, and the sick man turns away from the physician, when will the distempered person be restored, seeing that neither the one will call in the other's aid, nor will the other go to him?

But wherefore, tell me, dost thou at all turn away from him and avoid him? Because he is ungodly? Truly for this cause oughtest thou to welcome and attend him, that thou mayest raise him up in his sickness. But if he be incurably sick, still thou hast been bidden to do thy part. Since Judas also was incurably diseased, yet God left not off attending upon him. Wherefore, neither do thou grow weary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252033.html'
source_title="Homily on 1 Corinthians 33"

[[commentary]]
quote='''
"Yet count him not as an enemy, but admonish him as a brother."

By this he shows that he has assigned a heavy punishment against him, in depriving him of freedom of conversation.

For if to be a receiver even with many others is worthy of disgrace, when they even reprove whilst they offer it, and withdraw themselves, how great is the reproach, quite sufficient to sting the soul. For if only giving rather tardily, and with murmuring, they inflame the receivers-for tell me not of impudent beggars, but of the faithful-if they were to reprove whilst they give, what would they not do? to what punishment would it not be equal? We do not do so, but as if we had been greatly injured, we so insult and turn away from those who beg of us. Thou dost not give, but why dost thou also grieve him? "Admonish them," he says, "as brethren," do not insult them as enemies. He who admonishes his brother, does it not publicly. He does not make an open show of the insult, but he does it privately and with much address, and grieving, as hurt, and weeping and lamenting. Let us bestow therefore with the disposition of a brother, let us admonish with the good will of a brother, not as if we grieved at giving, but as if we grieved for his transgressing the commandment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Thessalonians%2FHomily%25205.html'
source_title="Homily on 2 Thessalonians 5"
