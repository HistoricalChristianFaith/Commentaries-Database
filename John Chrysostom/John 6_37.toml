[[commentary]]
quote='''
But what meaneth He by saying, "All that the Father giveth Me, shall come to Me"? He toucheth their unbelief, showing that whosoever believeth not on Him transgresseth the will of the Father. And thus He saith it not nakedly, but in a covert manner, and this He doth everywhere, wishing to show that unbelievers are at variance with the Father, not with Him alone. For if this is His will, and if for this He came, that He might save man, those who believe not transgress His will.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252045.html'
source_title="Homily on the Gospel of John 45"

[[commentary]]
quote='''
"When therefore," He saith, "the Father guideth any man, there is nothing that hindereth him from coming unto Me"; and in another place, "No man can come unto Me, except the Father draw him." And Paul saith, that He delivereth them up unto the Father; "When He shall have delivered up the kingdom to God, even the Father." Now as the Father when He giveth doth so without first depriving Himself, so the Son when He delivereth up doth so without excluding Himself. He is said to deliver us up, because through Him we have access (to the Father).
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252045.html'
source_title="Homily on the Gospel of John 45"

[[commentary]]
quote='''
But perhaps some one will say, "If all that the Father giveth, and whomsoever He shall draw, cometh unto Thee, if none can come unto Thee except it be given him from above, then those to whom the Father giveth not are free from any blame or charges." These are mere words and pretenses. For we require our own deliberate choice also, because whether we will be taught is a matter of choice, and also whether we will believe. And in this place, by the "which the Father giveth Me," He declareth nothing else than that "the believing on Me is no ordinary thing, nor one that cometh of human reasonings, but needeth a revelation from above, and a well-ordered soul to receive that revelation." And the, "He that cometh to Me shall be saved," meaneth that he shall be greatly cared for. "For on account of these," He saith, "I came, and took upon Me the flesh, and entered into the form of a servant..."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252045.html'
source_title="Homily on the Gospel of John 45"

[[commentary]]
quote='''
"All that the Father giveth Me shall come to Me, and him that cometh to Me I will in nowise cast out." Observe how He doeth all things for the sake of them that are saved; therefore He added this, that He might not seem to be trifling and speaking these things to no purpose. But what is it that He saith, "All that the Father giveth Me shall come unto Me," and "I will raise it up in the last day"? Wherefore speaketh He of the common resurrection, in which even the ungodly have a part, as though it were the peculiar gift of those who believe on Him? Because He speaketh not simply of resurrection, but of a particular kind of resurrection. For having first said, "I will not cast him out, I shall lose nothing of it," He then speaketh of the resurrection. Since in the resurrection some are cast out, ("Take him, and cast him into outer darkness,") and some are destroyed. ("Rather fear Him who is able to destroy both soul and body in hell.") And the expression, "I give eternal life," declareth this; for they "that have done evil shall go forth to the resurrection of damnation, and they that have done good to the resurrection of life." This then, the resurrection to good things, is that which He here designed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252045.html'
source_title="Homily on the Gospel of John 45"