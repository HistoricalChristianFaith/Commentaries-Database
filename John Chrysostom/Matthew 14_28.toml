[[commentary]]
quote='''
What then saith Peter, everywhere ardent, and ever starting forward before the rest?

"Lord, if it be Thou," saith he, "bid me come unto Thee on the water."

He said not, "Pray and entreat," but, "bid." Seest thou how great his ardor, how great his faith? Yet surely he is hereby often in danger, by seeking things beyond his measure. For so here too he required an exceedingly great thing, for love only, not for display. For neither did he say, "Bid me walk on the water," but what? "Bid me come unto Thee." For none so loved Jesus.

This he did also after the resurrection; he endured not to come with the others, but leapt forward. And not love only, but faith also doth he display. For he not only believed that He was able Himself to walk on the sea, but that He could lead upon it others also; and he longs to be quickly near Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252050.html'
source_title='Homily on the Gospel of Matthew 50'

[[commentary]]
quote='''
See how great his warmth, how great his faith. He said not, Pray and entreat for me; but Bid me; he believes not only that Christ can Himself walk on the sea, but that He can lead others also thereon; also he wishes to come to Him speedily, and this, so great a thing, he asks not from ostentation, but from love. For he said not, Bid me walk upon the waters, but, Bid me come unto thee. And it seems that having shown in the first miracle that He has power over the sea, He now leads them to a more powerful sign; He saith unto him, Come. And Peter, going forth of the boat, walked on the sea, that he might go to Jesus.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
