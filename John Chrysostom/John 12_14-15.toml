[[commentary]]
quote='''
(Hom. lxvi. 1) He did this prophetically, to figure the unclean Gentiles being brought into subjection to the Gospel; and also as a fulfilment of prophecy.

(Hom. lxvi. 1) Or thus: Whereas they had had wicked kings, who had subjected them to wars, He saith to them, Trust Me, I am not such as they, but gentle and mild: which He showed by the manner of His entrance. For He did not enter at the head of an army, but simply riding on an ass.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
"Rejoice greatly, daughter of Zion"? Because all their kings had for the most part been an unjust and covetous kind of men, and had given them over to their enemies, and had perverted the people, and made them subject to their foes; "Be of good courage," It saith, "this is not such an one, but meek and gentle"; as is shown by the ass, for He entered not with an army in His train, but having an ass alone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252066.html'
source_title='Homily on the Gospel of John 66'
