[[commentary]]
quote='''
(non occ.) But why must John thus go before Christ with a witness of deeds preaching Him? First; that we might hence learn Christ's dignity, that He also, as the Father has, has prophets, in the words of Zacharias, And thou, Child, shalt be called the Prophet of the Highest. (Luke 1:76.) Secondly; That the Jews might have no cause for offence; as He declared, John came neither eating nor drinking, and they say, He hath a devil. The Son of Man came eating and drinking, and they say, Behold a gluttonous man. (Luke 7:33.) It needeth moreover that the things concerning Christ should be told by some other first, and not by Himself; or what would the Jews have said, who after the witness of John made complaint, Thou bearest witness of thyself, thy witness is not true. (John 8:13.)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25203.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
How "in those days"? For not then, surely, when He was a child, and came to Nazareth, but thirty years after, John cometh; as Luke also testifies. How then is it said, "in those days"? The Scripture is always wont to use this manner of speech, not only when it is mentioning what occurs in the time immediately after, but also of things which are to come to pass many years later. Thus also, for example, when His disciples came unto Him as He sat on the Mount of Olives, and sought to learn about His coming, and the taking of Jerusalem: and yet ye know how great is the interval between those several periods. I mean, that having spoken of the subversion of the mother city, and completed His discourse on that subject, and being about to pass to that on the consummation, he inserted, "Then shall these things also come to pass;" not bringing together the times by the word then, but indicating that time only in which these things were to happen. And this sort of thing he doth now also, saying, "In those days." For this is not put to signify the days that come immediately after, but those in which these things were to take place, which he was preparing to relate.

"But why was it after thirty years," it may be said, "that Jesus came unto His baptism"? After this baptism He was thenceforth to do away with the law: wherefore even until this age, which admits of all sins, He continues fulfilling it all; that no one might say, that because He Himself could not fulfill it, He did it away. For neither do all passions assail us at all times; but while in the first age of life there is much thoughtlessness and timidity, in that which comes after it, pleasure is more vehement, and after this again the desire of wealth. For this cause he awaits the fullness of His adult age, and throughout it all fulfills the law, and so comes to His baptism, adding it as something which follows upon the complete keeping of all the other commandments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%252010.html'
source_title='Homily on the Gospel of Matthew 10'
