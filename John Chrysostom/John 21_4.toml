[[commentary]]
quote='''
As they then were laboring and wearied, Jesus presenteth Himself before them, and doth not at once reveal Himself, so that they enter into converse with Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252087.html'
source_title='Homily on the Gospel of John 87'

[[commentary]]
quote='''
(Hom. lxxxvii) In the midst of their labour and distress, Jesus presented Himself to them: But when the morning was now come, Jesus stood on the shore: but the disciples knew not that it was Jesus.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
