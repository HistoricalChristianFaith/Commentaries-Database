[[commentary]]
quote='''
(Hom. lxxiii. 2) If ye had known Me, He says, ye should have known My Father also; i. e. If ye had known My substance and dignity, ye would have known the Father's. They did know Him, but not as they ought to do. Nor was it till afterwards, when the Spirit came, that they were fully enlightened. On this account He adds, And from henceforth ye know Him, know Him, that is, spiritually. And have seen Him, i. e. by Me; meaning that he who had seen Him, had seen the Father. They saw Him, however, not in His pure substance, but clothed in flesh.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
