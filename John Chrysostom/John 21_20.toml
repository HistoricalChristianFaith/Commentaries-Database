[[commentary]]
quote='''
Wherefore hath he reminded us of that reclining? Not without cause or in a chance way, but to show us what boldness Peter had after the denial. For he who then did not dare to question Jesus, but committed the office to another, was even entrusted with the chief authority over the brethren, and not only doth not commit to another what relates to himself, but himself now puts a question to his Master concerning another. John is silent, but Peter speaks. He showeth also here the love which he bare towards him; for Peter greatly loved John, as is clear from what followed, and their close union is shown through the whole Gospel, and in the Acts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252088.html'
source_title='Homily on the Gospel of John 88'

[[commentary]]
quote='''
(Hom. lxxxviii. 2) But if it be asked, How then did James assume the see of Jerusalem? I answer, that our Lord enthroned Peter, not as Bishop of this see, but as Doctor of the whole world: Then Peter, turning about, seeth the disciple whom Jesus loved following, which also leaned on his breast at supper. It is not without meaning that that circumstance of leaning on His breast is mentioned, but to show what confidence Peter had after his denial. For he who at the supper dared not ask himself, but gave his question to John to put, has the superintendence over his brethren committed to him, and whereas before he gave a question which concerned himself to another to put, he now asks questions himself of his Master concerning others.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
