[[commentary]]
quote='''
And Moses broke their tablet, having written for them, as it were, certain words; just as a schoolmaster would do, who having taken up the writing tablet, and found it badly written, throws away the tablet itself, desiring to show great anger; and if he have broken it, the father is not angry. For he indeed was busy writing, but they not attending to him, but turning themselves other ways, were committing disorder. And as in school, they strike each other, so also, on that occasion, he bade them strike and slay each other.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Colossians%2FHomily%25204.html'
source_title="HOMILIES ON COLOSSIANS 4"
