[[commentary]]
quote='''
O how great the wisdom of the woman! how meekly doth she receive the reproof! "How should she not," saith some one? Tell me, why should she? Did He not often reprove the Jews also, and with greater reproofs than these? (for it is not the same to bring forward the hidden thoughts of the heart, as to make manifest a thing that was done in secret; the first are known to God alone, and none other knoweth them but he who hath them in his heart; the second, all who were sharers in it know;) but still when reproved did not bear it patiently. When He said, "Why seek ye to kill me?" (c. vii. 19), they not only did not admire as the woman did but even mocked at and insulted Him; yet they had a demonstration from other miracles, she had only heard this speech. Still they not only did not admire, but even insulted Him, saying, "Thou hast a demon, who seeketh to kill thee?" While she not only doth not insult but admires, and is astonished at Him, and supposes Him to be a Prophet. Yet truly this rebuke touched the woman more than the other touched them; for her fault was hers alone, theirs was a general one; and we are not so much stung by what is general as by what is particular. Besides they thought they should be gaining a great object if they could slay Christ, but that which the woman had done was allowed by all to be wicked; yet was she not indignant, but was astonished and wondered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252032.html'
source_title="Homily on the Gospel of John 32"

[[commentary]]
quote='''
Christ having heard this, now seasonably introduces His reproof, mentioning accurately both points; for He enumerated all her former husbands, and reproved her for him whom she now would hide. What then did the woman? she was not annoyed, nor did she leave Him and fly, nor deem the thing an insult, but rather admired Him, and persevered the more. "I perceive," saith she, "that Thou art a Prophet." Observe her prudence; she did not straightway run to Him, but still considers Him, and marvels at Him. For, "I perceive," means, "Thou appearest to me to be a Prophet."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252032.html'
source_title="Homily on the Gospel of John 32"
