[[commentary]]
quote='''
But from fear of the multitude, the Pharisees durst not openly expose their designs, but only meditated them in their hearts Hence it follows, And they began to reason, saying, Who is this which speaketh blasphemies?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
