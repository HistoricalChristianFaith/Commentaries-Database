[[commentary]]
quote='''
And yet God is gracious and merciful. He is called a God "of mercies and a God of comfort"; good as none else is good, and kind, and gentle, and full of pity, Who "willeth not the death of a sinner, but that he should be converted and live." Whence then, whence is that Day so full of agony and anguish? A stream of fire is rolling before His face. The books of our deeds are opened. The day itself is burning as an oven, the angels are flying around, and many furnaces are prepared. How then is He good and merciful, and full of lovingkindness to man? Even herein is He merciful, and He shows in these things the greatness of His lovingkindness. For He holds forth to us these terrors, that being constrained by them, we may be awakened to the desire of the kingdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Timothy%2FHomily%25203.html'
source_title="HOMILIES ON 2 TIMOTHY 3"
