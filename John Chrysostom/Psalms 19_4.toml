[[commentary]]
quote='''
The providence of God is clearer than the sun and its rays. On every occasion and in every place you will see clear and abundant evidence of this providence—in the desert, on cultivated and uncultivated land, on land and sea, wherever you go. This evidence is old and new. Voices are raised from every side that sound more clearly than the voices of our reason, and they tell of God's care to one who wishes to hear.… Our tongue is known only to those who share our language, not to those of other tongues; but the voice of creation is audible to all peoples who dwell in the inhabited world. Those of good judgment regard as sufficient God's proclamation, without the demonstration of deeds. It reveals not only his providence but also his abundant love for us; for he does not merely take thought for us but is also our lover, and he loves us boundlessly with an inconceivable love. It is a love that knows no emotion, but it is most warm and intense, noble, insoluble, unquenchable.
'''
source_url=''
source_title="ON PROVIDENCE 5:2"


[[commentary]]
quote='''
… the Scythian, and Barbarian, and Indian, and Egyptian, and every man that walks upon the earth, shall hear this voice; for not by means of the ears, but through the sight, it reaches our understanding. And of the things that are seen, there is one uniform perception; and there is no difference, as is the case with respect to languages. Upon this volume the unlearned, as well as the wise man, shall be alike able to look; the poor man as well as the rich man; and wherever any one may chance to come, there looking upwards towards the heavens, he will receive a sufficient lesson from the view of them: and the prophet himself intimated and indicated this fact, that the creation utters this voice so as to be intelligible to barbarians, and to Greeks, and to all mankind without exception, when he spoke on this wise; "There is no speech, nor language, where their voice is not heard." What he means is to this effect, that there is no nation or tongue which is unable to understand this language; but that such is their utterance, that it may be heard of all mankind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%25209.html'
source_title="HOMILIES CONCERNING THE STATUES 9:5"
