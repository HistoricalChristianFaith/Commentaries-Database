[[commentary]]
quote='''
For Paul acted thus, not from distress or fear, but from an abundance of wisdom and spiritual understanding. And how this was, I proceed to explain. He was addressing a Gentile, and an unbeliever, who knew nothing of our matters. Hence he was unwilling to introduce him by way of disagreeable things, but as he said, "I became to them that are without law, as without law;" so he acted in the present instance. His meaning is, "If the Gentile hear of bonds and tribulations, he will straightway be taking flight; since he knows not the power of bonds. First, let him become a believer; let him taste of the word preached, and then he will even of himself hasten towards these bonds." I have heard the Lord saying, "No man putteth a piece of new cloth into an old garment, for that which is put in to fill it up taketh from the garment, and the rent is made worse. Neither do men put new wine into old wine-skins; else the wine-skins burst." The soul of this man is an old garment: an old wine-skin. It is not renewed by the faith, nor renovated by the grace of the Spirit. It is yet weak and earthly. It affects the things of this life. It flutters eagerly after worldly show. It loves a glory that is present. Should he hear at once, even from the first, that if he becomes a Christian he will become immediately a prisoner, and will be encompassed with a chain; feeling ashamed and indignant, he will recoil from the word preached. Therefore, saith he, "Except these bonds." Not as deprecating the bonds themselves, God forbid! But condescending to the other's infirmity; for he himself loved and welcomed his bonds, even as a woman fond of ornament doth her jewels of gold.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252016.html'
source_title="Homily Concerning the Statues 16"

[[commentary]]
quote='''
And that thou mayest clearly know how great a thing this is, hear how even Paul, going before an unbelieving judge, made his defence. "I think myself happy," saith he, "That I am to make my defence before thee." And these things he said, not to flatter him, far from it; but wishing to gain him by his gentleness. And he did in part gain him, and he that was till then considered to be condemned took captive his judge, and the victory is confessed by the person himself who was made captive, with a loud voice in the presence of all, saying, "With but little persuasion thou wouldst fain make me a Christian." What then saith Paul? He spread his net the wider, and saith, "I would to God, that not only thou, but also all that hear me this day, might become such as I am, except these bonds." What sayest thou, O Paul? "except these bonds?" And what confidence remains for thee, if thou art ashamed of these things, and fliest from them, and this before so great a multitude? Dost thou not every where in thy Epistles boast of this matter, and call thyself a prisoner? Dost thou not every where carry about this chain in our sight as a diadem? What then hath happened now that thou deprecatest these bonds? "I myself deprecate them not," saith he, "nor am I ashamed of them, but I condescend to their weakness. For they are not yet able to receive my glorying; and I have learned from my Lord not to put 'a piece of undressed cloth upon an old garment:' therefore did I thus speak. For, in fact, unto this time they have heard ill reports of our doctrine, and abhor the cross. If therefore I should add also bonds, their hatred becometh greater; I removed these, therefore, that the other might be made acceptable. So it is, that to them it seems disgraceful to be bound, because they have not as yet tasted of the Glory which is with us. One must therefore condescend: and when they shall have learned of the true life, then will they know the beauty also of this iron, and the lustre which comes of these bonds." Furthermore, discoursing with others, he even calls the thing a free gift, saying, "It hath been granted in the behalf of Christ, not only to believe on Him, but also to suffer in His behalf." But for the time then present, it was a great thing for the hearers not to be ashamed of the cross: for which cause he goes on gradually. Thus, neither doth any one introducing a person to a palace, before that he beholds the vestibule, compel him, yet standing without, to survey what is within: since in that way it will not even seem admirable, unless one enter in and so acquaint one's self with all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25201%2520Corinthians%2FHomily%252033.html'
source_title="Homily on 1 Corinthians 33"

[[commentary]]
quote='''
And he said not, I do not wish that, but, "I pray that not only thou, but also all that hear." Mark how free from flattery his speech is.-"I pray that this day they may be all such as I am, except these bonds." He, the man that glories in his bonds, that puts them forth as a golden chain, deprecates them for these men: for they were as yet too weak in their minds, and it was rather in condescension that he so spake. For what could be better than those bonds which always in his Epistles he prefers to all things else, saying, "Paul, a prisoner of Jesus Christ:" and again, "On this account I am bound with this chain, but the word of God is not bound;" and, "Even unto bonds, as an evil-doer." The punishment was twofold. For if indeed he had been so bound, as with a view to his good, the thing would have carried with it some consolation: but now he is bound both "as an evil-doer," and as with a view to very ill consequences; yet for none of these things cared he.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252052.html'
source_title="Homily on Acts 52"
