[[commentary]]
quote='''
Most opportunely have we all this day sung together, "Blessed be the Lord God of Israel, who only doeth wondrous things." For marvellous, and beyond all expectation, are the things which have happened. A whole city, and so great a population, when just about to be overwhelmed—to sink under the waves, and to be utterly and instantly destroyed—He hath entirely rescued from shipwreck in a single moment of time! Let us give thanks then, not only that God hath calmed the tempest, but that He suffered it to take place; not only that He rescued us from shipwreck, but that He allowed us to fall into such distress; and such an extreme peril to hang over us. Thus also Paul bids us "in every thing give thanks." But when he says, "In every thing give thanks," he means not only in our deliverance from evils, but also at the time when we suffer those evils. "For all things work together for good to them that love God." Let us be thankful to Him for this deliverance from trials; and let us never forget them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252017.html'
source_title="HOMILIES ON THE STATUES 17.1"
