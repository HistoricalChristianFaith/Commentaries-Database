[[commentary]]
quote='''
But for all this, some are of so senseless a disposition, as even after these words to say, "Nay, far be it from me to weep at any time, but may God grant me to laugh and to play all my days." And what can be more childish than this mind? For it is not God that grants to play, but the devil. At least hear, what was the portion of them that played. "The people," it is said, "sat down to eat and drink, and rose up to play." Such were they at Sodom, such were they at the time of the deluge. For touching them of Sodom likewise it is said, that "in pride, and in plenty, and in fullness of bread, they waxed wanton." And they who were in Noah's time, seeing the ark a preparing for so many years, lived on in senseless mirth, foreseeing nought of what was coming. For this cause also the flood came and swept them all away, and wrought in that instant the common shipwreck of the world. Ask not then of God these things, which thou receivest of the devil. For it is God's part to give a contrite and humbled heart, sober, self-possessed, and awestruck, full of repentance and compunction. These are His gifts, forasmuch as it is also of these things that we are most in need.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520Matthew%2FHomily%25206.html'
source_title="HOMILIES ON THE GOSPEL OF MATTHEW 6:9"
