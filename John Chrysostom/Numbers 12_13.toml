[[commentary]]
quote='''
Miriam and her company spake evil of Moses, and he immediately begged them off from their punishment; nay, would not so much as let it be known that his cause was avenged. But not so we: on the contrary, this is what we most desire; to have all men know that they have not passed unpunished.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252014.html'
source_title="HOMILIES ON ACTS 14"
