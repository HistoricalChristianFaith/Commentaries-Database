[[commentary]]
quote='''
"Did not Moses give you the Law? and yet none of you keepeth the Law? Why go ye about to kill Me?" The Jews brought against Him two accusations; one, that He broke the Sabbath; the other, that He called God His Father, making Himself equal with God. And that this was no imagination of theirs, but His own declared judgment, and that He spake not as do the many, but in a special and peculiar sense, is clear from this circumstance. Many often called God their Father; as "Have we not all one Father, hath not one God created us?" (Mal. ii. 10), but not for that was the people equal to God, on which account the hearers were not offended. As then when the Jews said, "This man is not from God," He often healed them, and made defense for the violation of the Sabbath; so now had the sense they assigned to His words been according to their imagination, not according to His intention, He would have corrected them, and said, "Why suppose ye Me equal to God? I am not equal"; yet He said nothing of the kind, but, on the contrary, declared by what followed, that He is equal. For, "As the Father raiseth up the dead, and quickeneth them, so also the Son" (c. v. 21); and "That all may honor the Son as they honor the Father"; and "The works which He doeth, the same doeth the Son likewise;" all these go to establish His equality. Again, concerning the Law He saith, "Think not that I am come to destroy the Law or the Prophets." (Matt. v. 17.) Thus He knoweth how to remove evil suspicions which are in their minds; but in this place He not only doth not remove, but even confirmeth their suspicion of His equality. On which account also, when they said in another place, "Thou makest thyself God," He did not remove their suspicion, but even confirmed it, saying, "That ye may know that the Son of Man hath power on earth to forgive sins, He saith to the sick of the palsy, Take up thy bed, and walk." (Matt. ix. 6.) This then He first aimed at, to make Himself equal with God, showing that He was not God's adversary, but that He said the same and taught the same with Him...
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title="Homily on the Gospel of John 49"

[[commentary]]
quote='''
"The Law saith, Thou shalt not kill; but ye kill, and yet accuse Me as transgressing the Law." But wherefore saith He, "None of you"? Because they all sought to kill Him. "And if," He saith, "I even have broken the Law, it was in saving a man, but ye transgress it for evil. And if My action was even a transgression, yet it was in order to save, and I ought not to be judged by you who transgress in the greatest matters. For your conduct is a subverting of the whole Law." Then also He presseth it farther, although He had said many things to them before, but at that former time He spake after a loftier manner, and more suitably to His own dignity, while now He speaketh more humbly. Wherefore? Because He would not continually irritate them. At present their anger had become intense, and they went on to murder. And therefore He continueth to check them in these two ways, by reproving their evil daring, and saying, "Why go ye about to kill Me?" and by modestly calling Himself, "A Man that hath told you the truth" (c. viii. 40), and by showing that murderers in heart are not worthy to judge others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252049.html'
source_title="Homily on the Gospel of John 49"
