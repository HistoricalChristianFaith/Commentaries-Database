[[commentary]]
quote='''
Let us not then be procrastinating till to-morrow. For we "know not what the next day may bring forth;" nor let us say, "we shall conquer this habit by little and little;" since this little and little will never come to an end. Wherefore, dismissing that excuse, we should say, "If we do not reform the practice of swearing to-day, we will not leave off till we do, though ten thousand things were to press us; though it were necessary to die, or to be punished, or to lose all we have; we will not give the devil the advantage of slackness, nor the pretext of delay." Should God perceive thy soul inflamed, and thy diligence quickened, then He also Himself will lend His assistance to thy reformation!
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FConcerning%2520the%2520Statues%2FHomily%252020.html'
source_title="HOMILIES CONCERNING THE STATUES 20:22"
