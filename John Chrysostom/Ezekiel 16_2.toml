[[commentary]]
quote='''
And again, Ezekiel makes this an accusation against them, that they did not grieve for the afflicted. What sayest thou, O Prophet? God punisheth, and shall I grieve for those that He is punishing? Yea verily: for God Himself that punisheth wisheth this: since neither does He Himself wish to punish, nay, even Himself grieves when punishing. Then be not thou glad at it. You will say, "If they are justly punished, we ought not to grieve." Why, the thing we ought to grieve for is this—that they were found worthy of punishment. Say, when thou seest thy son undergoing cautery or the knife, dost thou not grieve? and sayest thou not to thyself, "What is this? It is for health this cutting, to quicken his recovery; it is for his deliverance, this burning?" but for all that, when thou hearest him crying out, and not able to [bear it], the hope of health being restored is not enough to carry off the shock to nature. So also in the case of these, though it be in order to their health that they are punished, nevertheless let us show a brotherly feeling, a fatherly disposition. They are cuttings and cauteries, the punishments sent by God: but it is for this we ought to weep, that they were sick, that they needed such a mode of cure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520the%2520Acts%2520of%2520the%2520Apostles%2FHomily%252043.html'
source_title="HOMILIES ON THE ACTS OF THE APOSTLES 43"
