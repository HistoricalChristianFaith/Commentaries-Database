[[commentary]]
quote='''
For not only did he bear those things nobly which happen to the body, the afflictions, and whatever he enumerated, but those also which touch the soul; for neither are these wont to disturb slightly. Jeremiah at least having borne many temptations, gave in upon these, and when he was reproached, said, "I will not prophesy, neither will I name the Name of the Lord." And David too many places complains of reproach. Isaiah also, after many things, exhorteth concerning this, saying, "Fear ye not the reproach of men, neither be ye overcome by their reviling." And again, Christ also to His disciples; "When they shall speak all manner of evil against you falsely, rejoice and be exceeding glad," He saith, "for great is your reward in heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%25202%2520Corinthians%2FHomily%252012.html'
source_title="HOMILIES ON 2 CORINTHIANS 12:3"
