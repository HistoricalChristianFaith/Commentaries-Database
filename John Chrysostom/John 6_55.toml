[[commentary]]
quote='''
"For My flesh is true meat, and My blood is true drink."

What is that He saith? He either desireth to declare that this is the true meat which saveth the soul, or to assure them concerning what had been said, that they might not suppose the words to be a mere enigma or parable, but might know that it is by all means needful to eat the Body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=John%2520Chrysostom%2FHomilies%2FOn%2520John%2FHomily%252047.html'
source_title='Homily on the Gospel of John 47'