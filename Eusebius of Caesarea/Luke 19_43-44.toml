[[commentary]]
quote='''
And therefore the siege which was shortly to come upon them He most expressly foretells, adding, For the days shall come upon thee, &c.

But how these things were fulfilled we may gather from what is delivered to us by Josephus, who though he was a Jew, related each event as it toot place, in exact accordance with Christ's prophecies.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'