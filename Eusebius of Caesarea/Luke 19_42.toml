[[commentary]]
quote='''
He here declares that His coming was to bring peace to the whole world. For unto this He came, that He should preach both to them that were near, and those that were afar off. But as they did not wish to receive the peace that was announced to them, it was hid from them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'