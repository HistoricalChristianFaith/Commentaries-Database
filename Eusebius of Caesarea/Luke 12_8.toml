[[commentary]]
quote='''
But what will be more glorious than to have the only-begotten Word of God Himself to bear witness in our behalf at the divine judgment, and by His own love to draw forth as a recompense for confession, a declaration upon that soul to whom He bears witness, For not as abiding without him to whom He bears witness, but as dwelling in him and filling him with light, He will give His testimony.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
