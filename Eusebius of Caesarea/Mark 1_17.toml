[[commentary]]
quote='''
But this was surely the manifestation of the divine will and of the divine power working in them. For when He called them, the first thing He said to them was: "Come, follow me, and I will make you fishers of men." And when He had thus acquired them as His followers, He breathed into them His divine power, He filled them with strength and bravery, and like a true Word of God and as God Himself, the doer of such great wonders, He made them hunters of rational and thinking souls, adding power to His words: "Come, follow me, and I will make you fishers of men," and sent them forth fitted already to be workers and teachers of holiness to all the nations, declaring them heralds of His own teaching. And who would not be amazed and naturally inclined to disbelieve a thing so extraordinary, for none of those who have ever won fame among men—no king, no legislator, no philosopher, no Greek, no barbarian—are recorded to have ever conceived such a design, or dreamed of anything at all resembling it? For each one of them has been satisfied, if he could establish his own system over his own land only, and if he were able to enforce desirable laws within the limits of his own race. Whereas He, who conceived nothing human or mortal, see how truly He speaks with the voice of God, saying in these very words to those disciples of His, the poorest of the poor: "Go forth, and make disciples of all the nations." "But how," the disciples might reasonably have answered the Master, "can we do it? How, pray, can we preach to Romans? How can we argue with Egyptians? We are men bred up to use the Syrian tongue only, what language shall we speak to Greeks? How shall we persuade Persians, Armenians, Chaldrearis, Scythians, Indians, and other barbarous nations to give up their ancestral gods, and worship the Creator of all? What sufficiency of speech have we to trust to in attempting such work as this? And what hope of success can we have if we dare to proclaim laws directly opposed to the laws about their own gods that have been established for ages among all nations? By what power shall we ever survive our daring attempt?"

But while the disciples of Jesus were most likely either saying thus, or thinking thus, the Master solved their difficulties, by the addition of one phrase, saying they should triumph "In MY NAME." For He did not bid them simply and indefinitely make disciples of all nations, but with the necessary addition of "In my Name." And the power of His Name being so great, that the apostle says: "God has given him a name which is above every name, that in the name of Jesus every knee should bow, of things in heaven, and things in earth, and things under the earth," He shewed the virtue of the power in His Name concealed from the crowd when He said to His disciples: "Go, and make disciples of all nations in my Name." He also most accurately forecasts the future when He says: "For this gospel must first be preached to all the world, for a witness to all nations."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Eusebius%2520of%2520Caesarea%2FThe%2520Proof%2520of%2520the%2520Gospel%2FBook%25203.html'
source_title="The Proof of the Gospel, Book 3"
