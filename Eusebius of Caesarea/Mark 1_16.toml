[[commentary]]
quote='''
And you yourself may realize the divine elements of this power, if you reflect on the nature and grandeur of a Being who could associate with Himself poor men of the lowly fisherman's class, and use them as agents in carrying through a work that transcends all reason. For having conceived the intention, which no one ever before had done, of spreading His own laws and a new teaching among all nations, and of revealing Himself as the teacher of the religion of One Almighty God to all the races of men, He thought good to use the most rustic and common men as ministers of His own design, because maybe He had in mind to do the most unlikely things. For how could men unable even to open their mouths be able to teach, even if they were appointed teachers to only one person, far less to a multitude of men? How should they instruct the people, who were themselves without any education?

But this was surely the manifestation of the divine will and of the divine power working in them. For when He called them, the first thing He said to them was: "Come, follow me, and I will make you fishers of men." And when He had thus acquired them as His followers, He breathed into them His divine power, He filled them with strength and bravery, and like a true Word of God and as God Himself, the doer of such great wonders, He made them hunters of rational and thinking souls, adding power to His words: "Come, follow me, and I will make you fishers of men," and sent them forth fitted already to be workers and teachers of holiness to all the nations, declaring them heralds of His own teaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Eusebius%2520of%2520Caesarea%2FThe%2520Proof%2520of%2520the%2520Gospel%2FBook%25203.html'
source_title="The Proof of the Gospel, Book 3"
