[[commentary]]
quote='''
What is it to apostatize, if not to depart from God? And indeed, because one is separated from God, one is joined to the Devil. But can anyone who is envious be without a demon, as Scripture says, "but by the envy of the Devil death entered into the world, and those who belong to his side put him to the test," Catholic Scripture likewise testifies. For if the prophet says, "You have been deceived by the spirit of fornication."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Quote found in Glossa Ordinaria, Venice edition"
