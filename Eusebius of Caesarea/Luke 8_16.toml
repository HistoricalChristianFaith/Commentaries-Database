[[commentary]]
quote='''
As if He said, As a lantern is lighted that it should give light, not that it should be covered under a bushel or a bed, so also the secrets of the kingdom of heaven when uttered in parables, although hid from those who are strangers to the faith, will not however to all men appear obscure.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
