[[commentary]]
quote='''
Wonder not if this was said of and fulfilled by the Passion of our Saviour, for even now He is a reproach among all men who have not yet received faith in Him! For what is more shameful or worse than any reproach than to be crucified? Yea, He is an outcast of the people of the Jews, for even to-day that whole race loves to mock Him, to set Him at naught, and to spit on Him: wherefore the apostle rightly says: "We preach Christ crucified, to the Jews a stumbling-block, and to the Gentiles foolishness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Eusebius%2520of%2520Caesarea%2FThe%2520Proof%2520of%2520the%2520Gospel%2FBook%252010.html'
source_title="The Proof of the Gospel, Book 10"
