[[commentary]]
quote='''
Although these places are hidden from men, they are still not hidden from God who exercises his power in both the mountains and the rivers, and so he says, "To the flinty rock," the mountains made of rock, "he extends his hand," his power. He demonstrates this in two effects. First, by the fact that the mountains are sometimes completely leveled to the ground, and he expresses this by saying, "he overturns the mountains from their foothills."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
