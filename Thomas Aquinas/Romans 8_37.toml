[[commentary]]
quote='''
Then he answers the question, at "but in all these things." First, he gives the answer, saying, "but in all these things," namely, the evils mentioned above, "we overcome," as long as we preserve our love unsullied: "in his arduous contest she gave him the victory" (Wis 10:12). But we do not succeed by our own strength but through Christ's help; hence he adds, "because of him who has loved us," i.e., on account of his help or on account of the affection we have for him; "not as though we first loved him, but because he first loved us" (1 John 4:19); "thanks be to God, who gives us the victory through our Lord Jesus Christ" (1 Cor 15:57).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
