[[commentary]]
quote='''
This is because of the works of mercy which I was doing. He shows this first regarding the poor, and so he says, "because I freed," from the hand of the oppressor, "the poor man who cried out," who loudly complained. Second, as to orphans, and so he says, "and the orphan who had none to help him," because he had lost his father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
