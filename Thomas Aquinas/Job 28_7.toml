[[commentary]]
quote='''
Because these places release a harmful air from the abundance of sulphur, not only men, but also brute animals avoid these places. First as to the birds concerning which there is less reflection he says, "Land," that kind of earth, "does not know the path of the bird," namely, it does not dare to fly over it, nor even to approach it, because of the harmful air. Thus he says, "nor has looked on," it, "the eye of the vulture," who can normally see things from far away. Or one can interpret the text in another way. This land "has not known the path of a bird." The bird has no experience of that land, because the bird does pass through it, "nor has he" anyone, "in that land," looked upon the "eye of the vulture."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
