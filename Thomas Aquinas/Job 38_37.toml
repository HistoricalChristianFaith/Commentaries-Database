[[commentary]]
quote='''
According to this, the cock seems to have a certain likeness to intelligence because he breaks forth in song at determined times as though he knew the proportions of the heavenly motions, and so he says, "Who told him", the cock, "the reasoned order of the heavens?" that is, the proportion of the heavenly motions so that he could discern from this the determined times for crowing. Watchmen usually declare the approach of the day or of other fixed hours of the night by singing or using some other instruments. But one cannot say that some sound is heard in heaven for determining the time and silence at other times so that the cock discerns from this when to crow, and expressing this he says, "and who will make the harmony of heaven sleep?" as if to say: The harmony of heaven is not silent like a sleeping watchman so that from hearing it or from its silence the cock can be instructed to crow. Consider here that the Pythagoreans thought that a harmony of sounds comes forth from the motion of the heavens because of a very fitting proportion of the heavenly motions, and since they posited that celestial bodies had souls, therefore, such a harmony of sounds can be called the harmony of heaven. But Aristotle proves in II De Caelo that no sound comes forth from the motion of the heavenly bodies, and so here we can take this harmony metaphorically as posited solely from the symmetry of the heavenly motions which never cease.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
