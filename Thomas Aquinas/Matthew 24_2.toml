[[commentary]]
quote='''
Then the Lord responds: do these things seem great to you? Isaiah 23:9: The Lord of hosts hath designed it, to pull down the pride of all glory, etc. Hence he adds, Amen I say to you, there shall not be left here a stone upon a stone. Is this true? In the time of Chrysostom it had not yet entirely come to pass, but it was expected that it would come. Or it can be said that he means only that it would be destroyed. Or it should be said that, just as by God's providence the temple was at one time restored, so by God's providence, when the confirmation of the new law began, the temple was destroyed, lest sacrifices be offered in the temple. Hence, if it had not been destroyed, many who had become Christians would perform the ceremonies and would return to the temple; hence it was done by divine dispensation that it was destroyed. And this is found in Luke 21:6, where it says of the temple: The days will come in which there shall not be left a stone upon a stone that shall not be thrown down. So it also happens that someone who is built up by good virtues, if he falls through some mortal sin and is negligent and not watchful, totally falls and is destroyed; Psalm 136:7: Rase it, rase it, even to the foundation thereof. Hence he means to say that not only the temple, but also the things pertaining to it, which were a shadow, as Hebrews 10:1 states: The law having a shadow of the good things to come.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
