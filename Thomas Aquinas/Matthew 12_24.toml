[[commentary]]
quote='''
But when the Pharisees heard it they said, "It is only by Beelzebub that this man casts out devils." Beelzebub is the god of Ehron, as it says in 2 Kings (1:16). He is called the lord of flies on account of the foul rite of the blood sacrificed, by reason of which many flies gathered. Therefore, they believed that this demon was the prince of demons and, consequently, that by his power demons could be cast out: "I will go to the great and will speak of them" (Jer 5:5) and a few words later "They all alike had broken the yoke, they had burst the bonds."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
