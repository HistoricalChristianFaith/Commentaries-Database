[[commentary]]
quote='''
Second, he sets out the promise: no vessel that is formed against you shall prosper, that is, he will scatter everything formed, as to those attacking with deeds, and every tongue, as to those attacking with words, above: they shall be as nothing (Isa 41:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
