[[commentary]]
quote='''
The attitude of Jesus to those who believed in him is shown when he says, But Jesus did not trust himself to them, i.e., those who had believed in him. What is this, men entrust themselves to God, and Jesus himself does not entrust himself to them? Could they kill him against his will? Some will say that he did not trust himself to them because he knew that their belief was not genuine. But if this were true, the Evangelist would surely not have said that many believed in his name, and yet he did not trust himself to them. According to Chrysostom, the reason is that they did believe in him, but imperfectly, because they were not yet able to attain to the profound mysteries of Christ, and so Jesus did not trust himself to them, i.e., he did not yet reveal his secret mysteries to them; for there were many things he would not reveal even to the apostles: "I still have many things to say to you, but you cannot bear them now" (below 16:12), and "I could not speak to you as spiritual persons, but as sensual" (1 Cor 3:1). And so it is significant that in order to show that they believed imperfectly, the Evangelist does not say that they believed "in him," because they did not yet believe in his divinity, but he says, in his name, i.e., they believed what was said about him, nominally, i.e., that he was just, or something of that sort.

Or, according to Augustine, these people represent the catechumens in the Church, who, although they believe in the name of Christ, Jesus does not trust himself to them, because the Church does not give them the body of Christ. For just as no priest except one ordained in the priesthood can consecrate that body, so no one but a baptized person may receive it.

The reason Jesus did not trust himself to them arises from his perfect knowledge; hence he says, for he knew all men. For although one must ordinarily presume good of everyone, yet after the truth about certain people is known, one should act according to their condition. Now because nothing in man was unknown to Christ and since he knew that they believed imperfectly, he did not trust himself to them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
