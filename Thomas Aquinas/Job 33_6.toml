[[commentary]]
quote='''
Lest Job scorn to dispute with him because of his own reputation for wisdom and his youth, he excludes this saying, "Behold, God made both you and me," so from the Creator's point of view both of us have the same hope of inquiring into truth. On the part of matter, the same impediment applies to each one, and so he says, "and I too was formed from the same clay," whose coarseness darkens the light of truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
