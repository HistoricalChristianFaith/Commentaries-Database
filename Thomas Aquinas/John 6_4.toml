[[commentary]]
quote='''
The time is mentioned when he says, Now the Passover was near. This time was also well suited for their refreshment, for "Passover" means "passage": "It is the Passover of the Lord, that is, his passage" (Ex 12:11). We understand from this that anyone who desires to be refreshed by the bread of the divine Word and by the body and blood of the Lord, must pass from vices to virtues: "Our Passover, Christ, has been sacrificed, and so let us feast with the unleavened bread of sincerity and truth" (1 Cor 5:7). And again, divine Wisdom says: "Pass over to me, all who desire me" (Sir 24:26).

This is the second Passover the Evangelist has mentioned. However, our Lord did not go to Jerusalem this time, as the law commanded. The reason for this being that Christ was both God and man: as man he was subject to the law, but as God he was above the law. So, he observed the law on certain occasions to show that he was a man, but he also disregarded the law at other times to show that he was God. Further, by not going he indicated that the ceremonies of the law would end gradually and in a short time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
