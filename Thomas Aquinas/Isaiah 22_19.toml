[[commentary]]
quote='''
Third, the punishment of deposition, and I will drive you out from your station: so Solomon cast out Abiathar from being the priest of the Lord (1 Kgs 2:27).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
