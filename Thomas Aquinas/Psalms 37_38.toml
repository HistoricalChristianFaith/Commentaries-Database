[[commentary]]
quote='''
Next he sets forth the condemnation of the wicked. The wicked have two things. First, they themselves perish; second, they leave nothing behind them. Therefore he says, "But the unjust will perish." Job 4: "Because no one understands, they will perish forever." "And together the remnants of the wicked will be destroyed." 1 Cor. 2: "Which will perish with them in Gehenna." Or "remnants," that is, all that they had -- namely, riches that perish, fame that rots, offspring that will perish. Job 22: "Has not their prosperity been cut off, and will not fire devour their remnants?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
