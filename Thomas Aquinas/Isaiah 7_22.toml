[[commentary]]
quote='''
Second, from the slightness of provisions: butter and honey, because of the lack of bread: they that were fed delicately have died in the streets (Lam 4:5).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
