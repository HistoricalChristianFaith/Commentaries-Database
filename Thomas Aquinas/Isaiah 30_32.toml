[[commentary]]
quote='''
And the duration of the punishment: and the passage of the rod shall be strongly grounded, that is, strengthened.

Third, the exultation of the saints: with harps, and in great battles, which are waged by divine power alone: the just shall rejoice when he shall see the revenge (Ps 57:11[58:10]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
