[[commentary]]
quote='''
"And when the time of the fruits drew near." Whoever makes anyone bear fruit, expects a benefit: and so the Lord expects that benefit be rendered to him for his glory. With respect to an individual, the fruit is not in childhood, but in full age; hence when one comes to adolescence, then he demands fruit: so when the people had been planted and the law given, he demanded fruit, and they did not acknowledge him. Jer 8:7: "The kite in the air hath known her time; but my people hath not known the judgment of the Lord." "He sent his servants," i.e., the prophets, "to the husbandmen," i.e., to the Jews, "to receive the fruits thereof," i.e., to induce men to act well. Below (28:34): "I send to you prophets, and wise men, and scribes: and some of them you will kill" etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
