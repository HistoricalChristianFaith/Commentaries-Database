[[commentary]]
quote='''
Consequently the repulsion of the wicked is presented: and three things are said. First, their negligence is expressed, because they come late; hence it is said and at last come the other virgins. Hence this signifies those who do late penance; Wisdom 5:3: saying within themselves, repenting, and groaning for anguish of spirit. Their desire is touched on when they say: Lord, Lord, open to us. Hence in this, that they call him Lord, they say something by which they ought to prevail. But by the fact that they double it, it is signified that they ask out of anguish; hence it is said above at 7:21: not everyone that says to me, Lord, Lord, shall enter into the kingdom of heaven. And their desire is touched on when it says open to us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
