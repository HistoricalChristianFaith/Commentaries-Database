[[commentary]]
quote='''
Then he proves that sin dwelling in man does the evil which man commits, when he says, for I know:
first, he presents the middle term proving the proposition;
second, he explains the middle term, at for to will.
First, therefore, he proves that sin dwelling in man does the evil which man commits. This proof is clear when the words are referred to a man in the state of grace, who has been freed from sin by the grace of Christ (Rom 6:22). Therefore, as to a person in whom Christ's grace does not dwell, he has not yet been freed from sin. But the grace of Christ does not dwell in the flesh, but in the mind; hence it is stated below that if Christ is in us, the body is indeed dead because of sin, but the spirit lives because of justice (Rom 8:10). Therefore, sin, which the desire of the flesh works, still rules in the flesh.
For he takes flesh here to include the sensitive powers. For the flesh is thus distinguished against the spirit and fights it, inasmuch as the sensitive appetite tends to the contrary of what reason seeks, as it says in Galatians: the desires of the flesh are against the spirit (Gal 5:17).
He says, therefore: we have said that in me, even though healed by grace, sin works; but this must be understood of me according to the flesh along with the sensitive appetite. For I know through reason and experience that the good, namely, of grace by which I have been reformed, does not dwell in me.
But lest this be understood to include reason according to the manner explained above, he adds: that is to say, in my flesh. For in me, i.e., in my heart, this good does dwell, for it says in Ephesians: that Christ may dwell in your hearts through faith (Eph 3:17).
This makes it clear that this passage does not favor the Manicheans who want the flesh not to be good according to its nature and, consequently, not a good creature of God, whereas it is written: everything created by God is good (1 Tim 4:4). For the Apostle is not discussing a good of nature but the good of grace, by which we are freed from sin.
If this passage referred to man existing under sin, it would be superfluous to add, that is to say, in my flesh, because in a sinner the good of grace does not dwell either in regard to the flesh or the mind. A forced interpretation would explain this passage by saying that sin, which is the privation of grace, is somehow derived from the flesh to the mind.
Then he clarifies what he had said, when he says for to will:
first, from man's capabilities;
second, from his action which proves his capability, at for the good which I will.
Man's capability is described first in regard to willing, which seems to be in man's power; hence he says, for to will is present with me, i.e., is close to me, as though existing beneath my power. For nothing is so much within man's power as his will, as Augustine says.
Second, he describes man's capability, or rather his difficulty in achieving an effect, when he says, but to accomplish good, I cannot find, i.e., I do not find it within my power, as it says in Proverbs: it is the part of man to prepare the soul (Prov 16:1); the heart of a man disposes his way, but the Lord directs his steps (Prov 1:9).
This passage of Paul seems to favor the Pelagians who said that the start of a good work is from us, inasmuch as we will the good. And this is what the Apostle seems to say: but to accomplish good, I cannot find.
However, he rejects this interpretation in Philippians: but God is at work in you both to will and to do (Phil 2:13).
Therefore, the fact that for to will is present with me, once I have been healed by grace, is due to the work of divine grace, through which I not only will the good but also do some good, because I resist concupiscence and, led by the spirit, act against it; but I do not find it within my power to accomplish that good so as to exclude concupiscence entirely. This indicates that the good of grace does not reside in the flesh, because if it did, then just as I have the faculty of willing the good because of grace dwelling in the mind, so I would have the faculty of accomplishing the good in virtue of grace residing in the flesh.
But if it be referred to man existing under sin, then it could be explained so that to will is taken for an incomplete act of willing, which from the impulse of nature is good in some who sin. But to will is present to man, i.e., it lies next to man, as though it is weak, unless grace bestows to the will the ability for perfection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
