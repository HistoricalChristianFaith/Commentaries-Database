[[commentary]]
quote='''
The second rule of human life is the exterior law transmitted by divine inspiration, against which a man sins in two ways: in one way by contempt, and against this he says, "I have not departed from the commandments of his lips." For some precepts had been divinely given to Noah and perhaps to some other holy men on whose lips God spoke. Second, someone sins against the law of God through ignorance or forgetfulness, and against this he says, "and in my bosom," in the hidden part of the heart, "I have hidden the words of his mouth," according to Psalm 118, "In my heart I hid your words to not sin against you." (v.11)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
