[[commentary]]
quote='''
Then he mentions the reverence. And note three things: first, John refuses the honor offered him; secondly, he confesses his lowliness, thirdly, his weakness. For he knew that he would baptize inwardly; therefore he says, "to be baptized," i.e., cleansed, from original sin. So says a Gloss.

But on the other hand, he had been sanctified in the womb. The answer is that before Christ's entrance into the world, some were in a way cleansed as to personal infection through circumcision and the like, but as to the guilt and infection of the entire nature no one was cleansed before the passion of Christ. "And do you come to me?" "Such knowledge is too wonderful for me; it is high, I cannot attain it" (Ps 139:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
