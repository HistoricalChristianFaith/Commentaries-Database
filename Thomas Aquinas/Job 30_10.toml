[[commentary]]
quote='''
Second, he shows how they held him in contempt in their heart when he then says, "They abhor me," as vile and unclean. Third, he shows how they held him in contempt in deed, first insofar as they bristled in his presence, and so he continues, "and they fled far from me." He says this in opposition to his previous statement, "They awaited me like the rain." (29:23) Second, they proposed injuries against him; "and they were not afraid to spit in my face," as a sign of insult and scorn.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
