[[commentary]]
quote='''
Then they that are in Judea, let them flee to the mountains. He sets forth a useful admonition. And first he presents it; secondly, he excludes impediments to flight. For some impediments are avoidable, and some unavoidable. He says, then they that are in Judea, let them flee to the mountains. Then, namely, in the time of Vespasian. At that time a certain man named Agrippa ruled in the mountains, and he obeyed the Romans and did not rebel against them; hence, while other peoples were at war, he and his people were at peace. Hence, by God's providence the faithful who were in Judea were admonished to withdraw and go to the kingdom of this Agrippa, and so they did; hence, then they that are in Judea, namely, the faithful, let them flee to the mountains; Zechariah 2:6: Flee from the land of the north, etc.

Hilary explains: and then they that are in Judea, let them flee to the mountains; because the Jews will fail, hence they will flee the land of the Jews and will be converted to the mountains of Christianity. Origen says: then let those who are in the city flee to the mountains, of perfect justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
