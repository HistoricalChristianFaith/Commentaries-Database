[[commentary]]
quote='''
And he sets out the help in coming, which they had from the gentiles: the islands, the various nations by the sea, and even far off, wait for me, as though subject to the choice of my will; the ships of the sea from the beginning of the place in which they were held captive, for perhaps some returned through the sea, or the Lord was able to lead them back thus. Or, mystically, the islands, the various nations; the ships, the churches; in the beginning, of faith, above: the islands shall wait for his law (Isa 42:4).

And he sets out the treasure of those who come, which they carried with themselves: their silver; to the name, that is, to the glory and service of the name: he brought them out with silver and gold (Ps 104[105]:37). Mystically, silver, the eloquence; gold, the wisdom of converts to the faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
