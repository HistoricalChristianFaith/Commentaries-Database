[[commentary]]
quote='''
There are also some places which are inaccessible, not because of their location, but because of something extraordinary happening, for example, because they are ruined by some physical change, like Sodom and Gomorrah, (Gen. 19:24) and so he says, "The earth from which bread arose in its place, (as proper and fitting) has been destroyed by fire," for the cause of its destruction proceeds from a very great heat. When there is a great abundance of heat, the resolutions both of the dry and wet attain a great degree of integration, which generates certain precious things like rocks or metals from them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
