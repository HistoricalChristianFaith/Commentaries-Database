[[commentary]]
quote='''
From the fig tree learn a parable. Here he teaches about the certainty of his coming. He had said great things, and to some incredible things; now he certifies them in three ways. First, by a similitude; secondly, by an assertion; thirdly, by a reason. He says therefore, from the fig tree learn a parable. Chrysostom says: when God wishes to show something, he always introduces a natural similitude. Trees in winter have life, yet secretly; hence they do not produce leaves or fruit; but at the beginning of spring they begin to bud, and then life appears. So also the saints now do not appear, as is found in Colossians 3:3: You are dead, and your life is hidden with Christ in God; but then the life of the saints will appear, namely, of those who will not be deceived in the time of the Antichrist. Then summer will come, i.e., the eternal reward; Psalm 125:6: Going they went and wept, casting their seeds; and there follows, but coming they shall come with joyfulness, carrying their sheaves. Hence he says, from the fig tree learn a parable. By the fig tree the synagogue is signified, of which it is found in Luke 13:6: A certain man had a fig tree planted in his vineyard. When the branch thereof is now tender, and the leaves come forth, you know that summer is nigh. And this can be expounded thus: the tender branch is the Antichrist, whose power will last but a short time, and as leaves cling closely to it, then his power will be made manifest. Or it can be expounded in a good sense. By the branch is meant the strength and fortitude of the saints. When the Church begins to come to its end, the power of Christ and the saints who will sustain it will appear; Song of Songs 2:13: The fig tree has put forth her green figs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
