[[commentary]]
quote='''
But lest this unleashing of speech again be interpreted as reason being overcome by sorrow, he adds, "I will say to God: Do not condemn me." For when reason is overcome by passion, man murmurs against God and at times goes so far as blasphemy. But when reason remains rightly ordered amid tribulations, one submits himself to God and expects the cure to come from him saying, "Do not condemn me." At the same time, he addresses the resolution of the question. Since the author had asked above (9:24) what was the cause of the punishment of the innocent in the world, he here at last confesses that God is the author of punishment when he begs that he not be condemned by him, as I Kings says, "The Lord brings death and gives life," (2:6) the text by the heresy of the Manichees is refuted.

With these premises and supposing that God is the author of punishment, he inquires about the cause of his own punishment saying to God, "Tell me why you judge me so," i.e., help me understand the reason why I am punished by you. For he knew that the investigation of reason cannot arrive at the goal of truth unless God divinely teaches it. Man must know the cause of his punishment, either to correct himself or to endure the trials with more patience. He proceeds to investigate the question with a kind of disjunction: It is necessary that one who suffers is either innocent or a sinner. He first proceeds supposing that he is innocent. Because we come to the knowledge of divine things through human ones, he proposes two ways the innocent are sometimes condemned by human judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
