[[commentary]]
quote='''
Then follows the execution: and the disciples did as Jesus appointed to them etc. Similarly we read in Exodus 24:3: all the words which the Lord hath spoken, we will do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
