[[commentary]]
quote='''
"And when he had come." Here they reprove him by questioning. And first, the questioning is presented; secondly, the confutation, at "Jesus answering said to them." Concerning the first, two things. And first, the questions are presented; secondly, Christ's responses. And first, the question of the Jews is presented; secondly, Christ's, at "but Jesus answering said to them: I will also ask you" etc. They say therefore, "by what authority dost thou these things?" He had cast out the buyers and sellers from the temple, and likewise had worked miracles: therefore they ask by what authority he does these things. Chrysostom says that in the world there was a twofold power, namely, royal and priestly: hence as to the first they ask: from where do you profess to have this power? Likewise, as to the second: "who gave thee this authority?" Do you have it from a priest or from God? For it was the case that sons succeeded their fathers in priestly authority. "Who gave it to you?" You do not have it from Caesar, not from a priest. Hence Chrysostom says: every man, whatever the opinion someone has about another, esteems him accordingly. Therefore, because they did not have a good opinion of Christ, etc. Or it can be referred to his working of miracles. There is the power of God and the power of the devil. Job 41:24: "There is no power upon earth that can be compared with him." Hence, "by what authority dost thou these things?" God's, or the devil's? But Origen objects that if he were acting by the power of the devil, he would not say so. Therefore he explains it differently, saying that the power of God is manifold: one in general, many in particular, as one for this purpose and another for that. Hence they ask "by what authority," i.e., in what degree of power, as about the prophets. For some had one power, others another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
