[[commentary]]
quote='''
565. Behold the Lord. In this part, he threatens the destruction of the entire earth, either that which was carried out in particular kingdoms and different regions, or that which is to come in the day of judgment, according to what is said above, this is the counsel, that I have purposed upon all the earth (Isa 14:26); however, some explain this as pertaining to the land of the Jews, or the land of Babylon, or the land of the Idumeans. And it is divided into two parts: in the first, he threatens against the inhabitants of the land; in the second, against the rulers of the peoples: and it shall come to pass, that in that day (Isa 24:21). Concerning the first, he sets out three things: first, the destruction of men; second, the removal of joys, where it says: the vintage has mourned (Isa 24:7); third, a multitude of dangers: the prevaricators (Isa 24:16).

566. Concerning the first, he does three things. First, he threatens destruction: the Lord shall strip it, purging it of inhabitants; lay waste, depriving it of those who cultivate it; afflict, with various punishments, the face, that is, inhabitants on its surface; scatter abroad, dividing them into various parts by captivity: I have stripped you bare (Joel 1:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
