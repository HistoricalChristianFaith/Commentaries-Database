[[commentary]]
quote='''
Since there are three goods of man: of soul, of body and exterior things, these goods are so ordered to each other that the body exists for the sake of the soul, but exterior things exist for the sake of both the body and the soul. Therefore, just as one has a perverse intention if he subordinate the goods of the soul to prosperity in exterior goods, so one also has a perverse intention if he should order the goods of the soul to the health of the body. Job truly abounded in the acts of the virtues which are the goods of the soul. This was clear sensibly to all and so the Lord said to Satan above "Have you considered my servant Job, etc." [1:8] But Satan was infering calumny as though Job intentionally performed acts of the virtues for temporal goods, just as evil men, also, whose prince is Satan, perniciously judge the intention of good men. But this calumny was rejected by the fact that after the loss of exterior goods, Job remained steadfast in virtue. This sufficiently proves that his intention had not been turned aside to exterior goods. There remained then to show for perfect demonstration of Job's virtue that his intention was not bent crooked for the health of his own body, and therefore divine judgment is invoked again to prove this. This is then what the text says, "Again on a certain day when the sons of God came to assist in the presence of the Lord, and Satan also came among them and assisted in his presence. The Lord said to Satan: Where do you come from?" Since these words have already been explained at length above, there is no need to delay over them here. Suffice it to note that because this passage recounts another action, another day is introduced here just at the beginning of Genesis different days are described according to the different kinds of things which were created.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
