[[commentary]]
quote='''
Therefore he adds: What man of you, if his son asks him for bread, will give him a stone? By bread is understood Christ: "I am the living bread which came down from heaven" (Jn 6:51). It is also sacred doctrine: "I will feed him with the bread of life and understanding" (Sir 15:3); and it is charity: "The produce of the ground will be rich and plenteous" (Is 30:23). On the other hand, the stone is the devil: "His heart will be hardened as a stone" (Jb 41:15). It is also obstinacy: "I will take from you the stony heart, and I will give you a heart of flesh" (Ez 36:26). It is also false doctrine: "Men put an end to darkness and search to the farthest bound" (Jb 28:3). Hence, if someone asks of God as a Father for bread, i.e., Christ, he will not be given the devil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
