[[commentary]]
quote='''
And what will come of it? He sets forth the judgment. First, he sets forth the judgment as unexpected; secondly, the punishment. He says, the lord of that servant shall come in a day that he hopes not; because a man sometimes believes himself secure of a long life, and yet he suddenly fails; 1 Thessalonians 5:2: The day of the Lord shall come as a thief; Isaiah 30:13: Suddenly, while it is not hoped for, destruction shall come.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
