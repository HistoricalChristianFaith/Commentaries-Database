[[commentary]]
quote='''
Since the clouds are driven by the winds, he consequently adds the effect produced by the wind saying, "Are not your garments hot when the South wind blows on the earth?" For the South wind makes the air warm because it comes from warm regions. From this heat, the garments of a man can make him hotter. Thus he clearly mentions the action of the South wind because when it comes from below the equator and gathers water vapors together it condenses them into clouds and moves them. But the North wind, which comes from above, more disperses the clouds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
