[[commentary]]
quote='''
Priests excel by the reverence in which they are held, concerning which he adds, "he makes the priests inglorious." The first men and counselors in a kingdom or a city seem to excel in the prudence of their advice, and he says regarding them, "and he dispossesses the nobles," that is, he deceives them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
