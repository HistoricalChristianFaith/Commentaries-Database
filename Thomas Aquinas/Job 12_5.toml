[[commentary]]
quote='''
Moreover, their simplicity is the cause of their mockery, but simplicity is not mocked as a clear evil but as a hidden good, and so here simplicity is called "a light" because of the clarity of justice. So simplicity is "condemned by the thoughts of the rich" by those who put their end in riches. Truly those who place their highest good in riches must think that goods are greater in proportion to their utility for acquiring riches. They must have contempt for the simplicity of the just since it is the opposition of the growth of wealth. But although the simplicity itself of the just is condemned in the thoughts of the wealthy, at the same time it is not frustrated from realizing its true end, and so he says, "prepared at the appointed time." However, he does not say this as though at some moment in this present life some earthly prosperity must be given to the just as a reward for his simplicity. Rather he leaves the appointed time undetermined and the end to which the simplicity of the just was prepared. For the argument has not yet arrived at this point, but it will be clarified in the following things. So then Job insinuates in a hidden way why he is derided by his friends whom he calls rich men, because they placed the prosperity of this world as the end of man as if it were the reward of the just man. He, however, does not seek this as a reward in his simplicity, but another at the appointed time. Thus he has faith that if he invoked the Lord he will be heard by him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
