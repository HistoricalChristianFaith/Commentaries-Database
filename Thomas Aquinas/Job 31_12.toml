[[commentary]]
quote='''
So the text continues, "it (adultery) is a fire, which devours even to consuming," because it cheats a man of his whole patrimony, as has been said, "and eradicates all seed," when it makes the succession of his sons uncertain, and so Sirach says, "Every woman leaving her husband will sin, and give him an heir by marrying another man." (23:32)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
