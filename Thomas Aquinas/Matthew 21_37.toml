[[commentary]]
quote='''
There follows thirdly: "and last of all he sent to them his son" etc., which was the height of consummate malice. And he does three things. First, the mercy of the Lord is presented; secondly, their malice; thirdly, the execution of the wicked plan. "And last of all he sent to them his son." Heb 1:1: "God, who, at sundry times and in divers manners, spoke in times past to the fathers by the prophets, last of all, in these days, hath spoken to us by his Son." "He sent to them his son, saying: they will reverence my son." But what is it that he says, "they will?" Did he not know? Jerome says that this doubtful way of speaking signifies the freedom of the will, to show what they were going to be; because he who does not honor the Son does not honor the Father. Or he speaks thus because some did reverence him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
