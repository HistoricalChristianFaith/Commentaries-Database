[[commentary]]
quote='''
680. And first, he promises fertility of the land, promising the cause: and rain shall be given: he will make the early and the latter rain to come down to you (Joel 2:23); and the effect, as to the food of men: and the bread of the corn of the land shall be most plentiful, and fat: Aser, his bread shall be fat (Gen 49:20); he fills you with the fat of corn (Ps 147:14); as to the pasture of herds: the lamb in that day shall feed, as to sheep.

683. Note on the words, and the bread of the corn (Isa 30:23), that the word of God is bread that is,

first, strait because of the difficulty of observing it: strait is the way that leads to life (Matt 7:14);

second, abundant, because of the usefulness of its fruit, below: as the rain and the snow come down from heaven, and return no more thither, but soak the earth, and make it to spring. So shall my word be, which shall go forth from my mouth (Isa 55:10–11);

third, fat, because of the sweetness of its delight: Aser, his bread shall be fat (Gen 49:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
