[[commentary]]
quote='''
Above, he taught Timothy how to form his people in the true faith; here he deals with matters pertaining to the faith's worship, namely, prayers and ceremonies:
first, he presents the general doctrine on prayer;
second, he applies it to the specific states of men, at I will, therefore.
First he distinguishes the various ways of praying;
second, he shows for whom he should pray, at for all men;
third, the reason, at for this is good.

He says, therefore: since it is a fact that Christ came to save sinners, I desire therefore, first of all, that supplications, prayers, intercessions and thanksgivings be made. By this he shows that among all the things necessary for a Christian life the most important is prayer, which is powerful against the dangers of temptation, and helpful toward making progress in good: the continual prayer of a just man avails much (Jas 5:16).

Therefore, he distinguishes prayer into four kinds, namely, supplications, prayers, intercessions, and thanksgivings. The first three pertain to obtaining benefits, and the last one to benefits already obtained.

In asking for benefits three things are required: first, that the one beseeching mention the cause why he should be heard; second, that the cause be reasonable; third, that he conclude by stating the request. In our prayers, therefore, we should do as rhetoricians do: for they first think of a cause why they should be heeded; in the case of prayer this is not our merits but God's mercy: it is not for our justifications that we present our prayers before your face, but for the multitude of your tender mercies (Dan 9:18). This is achieved by the prayer called supplication, which is a testifying through sacred things, as when we say: by your passion and cross, deliver us, O Lord.

After this cause has been excogitated, it is necessary that we reflect on the fact that this sacred thing is a cause of salvation. This is why prayer is required, which is the ascent of the mind to God: but as for me, my prayer is to you (Ps 68:14). It is called prayer, because it is, as it were, the voice's reason. For the persuasions of rhetoricians are called prayers, because they persuade; but it is done in one way in their case, and in another way in our prayers to God: for we do not intend to bend God's will, which is always prepared to do good; rather, it is in order that our heart be elevated to God in prayer.

Third, intercessions: let him ask in faith, nothing wavering (Jas 1:6).

Finally, for gifts received, thanksgivings: in all things give thanks (1 Thess 5:18); in everything, by prayer and supplication, with thanksgiving, let your petitions be made known to God (Phil 4:6).

Hence we find this prayer in the Church: almighty and eternal God, (this is the ascent of the mind, which is called prayer), who did grant such a favor to your Church (this is the thanksgiving), grant we beseech you (this is the supplication).

In the Mass also there is supplication up to the moment of consecrating the Body and Blood, because they bring to mind sacred things which give us the confidence to supplicate; in the mystery of consecration is prayer, because there is meditation on what Christ has done; from the consecration to the communion there are intercessions for the living, for the dead, and for oneself; and in the end there are thanksgivings.

Or these four refer to the four things we hope to obtain through prayer: then supplications refer to the things that are difficult to obtain, such as the conversion of sinners; prayers refer to the times we implore help for converts to make progress; intercessions ask that rewards be given according to one's merits; and for favors already received there are thanksgivings.

Then when he says, for all men, he shows for whom we should pray. In regard to this he does two things: first, he shows that we should pray for everyone; second, he mentions the fruit of prayer, at that we may lead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Timothy.html'
source_title='Commentary on 1 Timothy'
