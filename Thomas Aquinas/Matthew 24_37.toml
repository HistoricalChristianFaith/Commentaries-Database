[[commentary]]
quote='''
But as in the days of Noah, so shall also the coming of the Son of man be. Above the Lord set forth the uncertainty of the hour of his coming; now he adds a similitude. And first he sets it forth; secondly, he expounds it, at for as in the days before the flood etc. Moreover, he sets forth a fitting similitude, because while speaking of the end of the world, he rested on the end of the world. He therefore sets forth another similitude. For we read of a twofold destruction. One by water; 2 Peter 2:5: And spared not the original world, but preserved Noah, the eighth person, the preacher of justice, bringing in the flood upon the world of the ungodly. Hence it is said quite fittingly, because the first destruction was for cutting off carnal sins; hence it is said in Genesis 6:2: The sons of God seeing the daughters of men, that they were fair, took to themselves wives of all whom they chose. Therefore, against the ardor of this concupiscence the destruction had to be by water. But at the end of the world there will be sin, because charity will grow cold, as was said above; therefore fire will fittingly be the punishment. Hence he says, as in the time of Noah, namely, that the end was uncertain, as is found in Genesis 6:13: The end of all flesh is come before me. Hence just as those who clung to Noah were saved, so at the coming of the Son of man, those who will cling to Christ the Son will be saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
