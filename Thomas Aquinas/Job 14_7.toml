[[commentary]]
quote='''
After stating his opinion, Job here proceeds to make it clear. First, he shows that as things appear in this life man is in a worse condition than even those weak creatures which are renewed after their destruction. This fact is especially clear in trees. The life of the tree, like the life of a man, can fail in two ways, by violence or by nature. He speaks about the violent destruction of the tree, "If a tree is cut down, it has hope," the natural aptitude to renew its existence again because, "it grows green again," if it is replanted, "and its branches sprout." In this he demonstrates that it recovers the perfect life it formerly had.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
