[[commentary]]
quote='''
But if that evil servant shall say in his heart: my lord is long in coming. After he enticed them to be watchful through rewards, here he frightens them through punishments. And first he sets forth the fault; secondly, the punishment, at the lord shall come etc. In the fault there are two things, namely, the cause of the fault and the fault itself; and yet both are faults. The cause of the fault is despair about the coming: if he shall say: my lord is long in coming. Augustine says that someone might say this out of too great a desire, and this was what the one who said demonstrated: when shall I come and appear before the face of my God? Sometimes it is said out of despair about his coming soon; Ezekiel 12:22: Son of man, what is this proverb that you have in the land of Israel, saying: the days shall be prolonged, and every vision shall perish? For it shall no more be delayed. 2 Peter 3:9: The Lord does not delay his promise. Hence this is the root of all evils.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
