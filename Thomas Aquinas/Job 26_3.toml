[[commentary]]
quote='''
Then, as for the favor which is shown to someone because of the defect of wisdom, we should consider that this favor is twofold. On the one hand, in that one gives counsel to someone about things to be done, and he speaks to this theme saying, "To whom have you given counsel?" Someone seems to give counsel to another when he defends his cause without reason. God, who is perfect in wisdom, does not stand in need of counsel, and so he says, "Perhaps to someone who has not wisdom?" as if to say: Do you doubt that God has wisdom to speak so stupidly for him? One who gives counsel to a wise man seems to do this to show his own wisdom, and so he then says, "and have you shown your very great prudence?", saying in effect: Do you want to show by this the abundance of your prudence?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
