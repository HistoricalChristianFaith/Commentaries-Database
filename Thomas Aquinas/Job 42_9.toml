[[commentary]]
quote='''
After they had received the hope of pardon, they fulfilled what he had commanded them, and so the text goes on, "Eliphaz the Temanite, Baldath of Shuhite, and Sophar the Naamathite went and did as the Lord had told them." So they were made worthy through their obedience and humility and Job's prayer for them was heard. Therefore the text next says, "and the Lord supported the person of Job," in what he prayed for his friends.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
