[[commentary]]
quote='''
Now Christ's completion of the miracle is set forth. First, the vessels in which the miracle was performed are described. Secondly, the matter of the miracle is stated (v 7). Thirdly, we have how the miracle was made known and approved (v 8).

The miracle was performed in six vessels; Now there were six stone water jars near by. Here we should note, that as mentioned in Mark (7:2), the Jews observed many bodily washings and the cleansing of their cups and dishes. So, because they were in Palestine where there was a shortage of water, they had vessels in which they kept the purest water to be used for washing themselves and their utensils. Hence he says, there were six stone water jars near by, i.e., vessels for holding water, for purifications according to Jewish customs, i.e., to use for purification, each holding two or three metretes of liquid, that is, two or three measures; for the Greek "metrete" is the same as the Latin "mensura."

These jars were standing there, as Chrysostom says, in order to eliminate any suspicion about the miracle: both on account of their cleanliness, lest anyone suspect that the water had acquired the taste of wine from the dregs of wine previously stored in them, for these jars were standing there for purifications according to Jewish customs, and so had to be very pure; and also on account of the capacity of the jars, so that it would be abundantly clear that the water in such jars could be changed into wine only by divine power.

In the mystical sense, the six water jars signify the six eras of the Old Testament during which the hearts of men were prepared and made receptive of God's Scriptures, and put forward as an example for our lives.

The term metretes, according to Augustine, refers to the Trinity of persons. And they are described as two or three because at times in Scripture three persons in the Trinity are distinctly mentioned: "Baptizing them in the name of the Father, and of the Son, and of the Holy Spirit" (Mt 28:19), and at other times only two, the Father and the Son, in whom the Holy Spirit, who is the union of the two, is implied: "If anyone loves me, he will keep my word, and my Father will love him, and we will come to him" (below 14:23). Or they are described as two on account of the two states of mankind from which the Church arose, that is, Jews and Gentiles. Or three on account of the three sons of Noe, from whom the human race arose after the deluge.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
