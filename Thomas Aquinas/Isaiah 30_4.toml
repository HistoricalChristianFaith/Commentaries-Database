[[commentary]]
quote='''
Hence, as to the end of the way: for your princes went into Taphnis, which is only in the other part of Egypt, as if they feared to remain in the first borders: what have you to do in the way of Egypt, to drink the troubled water? (Jer 2:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
