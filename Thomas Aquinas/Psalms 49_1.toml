[[commentary]]
quote='''
Above, the Psalmist invited the nations to joy and thanksgiving for the benefits given to the people of God; here, however, he admonishes them to trust in God. And concerning this he does two things. First, he arouses attention. Second, he pursues his purpose. The title is not new. According to the title, however, a person is rendered attentive in two ways. In one way someone is said to be rendered attentive on the part of the hearers; in another way on the part of the things to be said, when he promises to say certain great things. Prov. 8: "Hear me, for I will speak of great things." And in this manner he speaks here. First, therefore, he renders them attentive on the part of those to whom he was speaking. Second, on the part of the things to be said, at "My mouth." He says, therefore, that the things he is about to say pertain to every rank of men and to all. And he touches on four differences among men. One from the diversity of peoples, because the people of the Jews was one, and that of the Gentiles another. Another on the part of places. Another on the part of origin. For some were noble and distinguished, others were not. Another on the part of fortune, because some were rich, others were not. He sets forth the first when he says, "Hear these things, all you nations," not only of the Jews, because these things pertain to all to hear; and this is necessary. Prov. 1: "The wise man hearing," etc. He sets forth the second when he says, "Give ear, all you inhabitants of the world," that is, from whatever part of the world. And he says "give ear," because one must both hear and perceive. Mt. 13: "He who has ears to hear, let him hear," that is, let him attend. Jerome has, "inhabitants of the west." As though it were a certain prophecy, because the faith of Christ flourishes especially among the people of the west, since in the north there are still many pagans, and in the east there are many schismatics and unbelievers. Or, "hear these things, all you nations" refers to the wicked; "you inhabitants of the world," to the good who have dominion over the earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
