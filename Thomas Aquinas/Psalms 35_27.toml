[[commentary]]
quote='''
"Let them exult." Here is the third fruit, which arises on the part of divine assistance; and this fruit is the joy of the saints. And first, he sets forth the fruit of exultation, saying, "let them exult and be glad." He sets forth as the fruit for the saints their delight, because joy signifies breadth of heart, hence it signifies interior gladness. Ps. 118: "You have enlarged my heart." And this joy is properly in the just. Ps. 96: "Light is risen for the just, and gladness for the upright of heart." Exultation signifies joy bursting forth exteriorly from within; and this exultation belongs to the just. Ps. 32: "Exult, you just, in the Lord." And this belongs to the upright; hence he says, "who will my justice," namely to imitate it. Or if this is said in the person of David, "they will my justice," that is, they rejoice in my goods; thus there is joy of heart, and from this follows exultation of mouth. Is. 51: "Joy and gladness shall be found in her, thanksgiving and the voice of praise." And therefore he adds, "Let them say always, the Lord be magnified," that is, let the saints magnify God -- not in truth making him great, but by announcing and preaching him as great. Ps. 33: "Magnify the Lord with me," etc. Sir. 43: "His magnificence is wonderful." Likewise: "Who shall magnify him as he is?" And who are those who do this? Certainly, "those who will the peace of his servant," namely of Christ according to his human nature; which peace Christ made and gives, because he himself is our peace, who has made both one, Eph. 2: "My peace I give to you, my peace I leave to you," Jn. 14: "And in me you have peace," Jn. 16. But if it is understood as said in the person of David, then the sense is: "Those who will the peace of his servant," that is, let those exult and be glad who desire that his servant, namely I, may have peace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
