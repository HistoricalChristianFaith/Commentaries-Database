[[commentary]]
quote='''
Second he speaks of those who oppress others. These are of two sorts. Some openly oppress others through force, and as to these he says, "He frustrates the designs of evildoers, so that their hands achieve no success," because they are impeded in accomplishing their works by God so that they cannot bring their evil intention into effect.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
