[[commentary]]
quote='''
For brass. Here he sets out the manner of restoration as to the restoration of riches: for much greater things will be offered to the temple by kings than what would be taken by Nabuchodonosor. Mystically: those who formerly were base are made precious in the Church, above: instead of the shrub, shall come up the fir tree, and instead of the nettle, shall come up the myrtle tree (Isa 55:13).

And I will make your visitation peace. Here he promises the observance of justice.

And first, among the superiors;

second, among the subjects: and the days of your mourning shall be ended (Isa 60:20).

Concerning the first, he does two things.

First, he comforts them by the uprightness of the superiors, touching on their justice: visitation, visitors and correctors. Mystically, this concerns Christ and the apostles: I will give you pastors according to my own heart (Jer 3:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
