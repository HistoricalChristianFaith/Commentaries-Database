[[commentary]]
quote='''
But I tell you: it shall be more tolerable on the day of judgment for Tyre and Sidon than for you. Here he compares guilt with guilt, because if they are found heavier in guilt, it will be worse for them; for they did not do what they heard. Therefore it is more serious, as John says (15:22): "If I had not come and spoken to them, they would not have sin." Note that those words exclude three errors.

For some said that all sins are equal, and likewise punishments. He excludes this when he says that it will be worse for them than for Tyre and Sidon.
Again, some said that only those foreknown will be saved, because, if he preached to them, they would be converted. He excludes this when he says that it will go ill with Tyre and Sidon, but worse for those others to whom the kingdom of heaven was announced. Hence Augustine says: "The Lord does not reward what they would have done, but what they have done."
Then he removes the third error, namely, that the Lord sent prophets and preachers to the Jews and not to the rest, because he knew that the others would not receive them. But he excludes this, because if they had been preached to, they would have done penance.

But the question remains: if the Jews did not believe, it seems that the Lord did not act properly by not sending to those who would have believed.

Gregory says that it is not for man to know God's secrets; yet, as it seems, he preached first to the Jews in fulfillment of the promises made to the patriarchs. Furthermore, in order that their condemnation would be proved more just, he preached to them and later sent disciples to the others.
Remy answers this way: although many from Tyre and Sidon would have believed, some among them were perverse and not yet prepared to believe. Therefore, he did not send to them first.
Augustine gives another explanation, namely, that the Lord foreknew that if they had believed, they would not have persevered at the time of the passion; therefore, he did not send to them.
Another explanation of Augustine's is that predestination is foreknowledge of God's favors. Hence whatever pertains to salvation is the effect of predestination in the predestined. Consequently, God distributes his gifts in various ways, because he gives to some a docile heart and an inclination to act well; but this is not enough, unless there is an instructor. Again, sometimes there is an instructor, but the heart is hard; and just as in the former the facility to believe is not enough, so in the latter the hard heart is harmful. Hence it is foolish to ask why he chose this one and not that one. Wherefore, Augustine says: "Why he draws one and not another, do not judge, if you do not wish to err." Hence it is better that the entire affair be turned back to God's ordination than to man's merits.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
