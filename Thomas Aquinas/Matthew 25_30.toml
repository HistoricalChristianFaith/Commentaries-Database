[[commentary]]
quote='''
Consequently he treats of the punishment of sense. Now there are two senses, namely, sight and touch. Therefore he presents first the punishment of sight; secondly, of touch, when he says and the unprofitable servant cast into the exterior darkness. And note that he is not punished for the evil he has done, but for the good he has omitted; hence above at 7:19: every tree that does not yield good fruit shall be cut down. And elsewhere, John 15:2: every branch in me that bears not fruit he will take away. And he is called an unprofitable servant because the good that he has, he does not spend for the benefit of others: as if he had understanding and did not spend it in good use by teaching others; if money, and did not exercise the work of mercy. Cast him into the exterior darkness. Origen says that certain ones before him said that the damned would be cast out from the whole world. Hence they say that Hell is outside the entire world. And they relied on what Job 18:18 says: God shall remove him out of the world. But he himself expounds it thus: into darkness, because they are ignorant; Psalm 81:5: they have not known nor understood; they walk on in darkness. And there follows the punishment of touch: there shall be weeping and gnashing of teeth. This was expounded above in chapter 24.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
