[[commentary]]
quote='''
And this gospel of the kingdom shall be preached in the whole world. Above, the Lord foretold the adverse things that would come in the Church; now he foretells the prosperous, because the apostles, who were born from the Jews, were zealous for their own flesh; Romans 9:2: I have great sadness and continual sorrow in my heart; therefore, for their consolation, because many more were to be called to the faith, he says: this gospel of the kingdom shall be preached in the whole world. For he himself, beginning his preaching, said: Do penance, for the kingdom of heaven is at hand. But this shall be preached in the whole world: for the new law is not determined to one people, as the old law was. Mark 16:15: Preach the gospel to every creature. And Chrysostom says that this was fulfilled before the destruction of the city of Jerusalem, and he proves this through the Apostle in Romans 10:18, where the Apostle says: Their sound hath gone forth into all the earth. Therefore the evangelical teaching seemed to have been spread throughout the whole world. Likewise through another authority found in Colossians 1:6: The preaching of the gospel bears fruit. And this is not surprising, because one apostle, namely Paul, expanded it so much that he reached Rome and Spain; hence what is found in Isaiah 57:9 was fulfilled: Thou hast sent thy messengers far off. And therefore Chrysostom says that in this the power of Christ is to be admired, that within the space of forty years his teaching grew so much that it filled the whole world; hence he rightly says, and this gospel of the kingdom shall be preached in the whole world. But will everyone believe? No; some will believe and some will not. And the fact that some will believe will be as a testimony against those who do not believe, as Jerome says. For a testimony to all nations; Romans 1:5: We have received grace and apostleship for obedience to the faith in all nations, so that they are without excuse. And then, namely, when all nations believe, the consummation shall come, i.e., the destruction of Jerusalem; and about this can be understood what is said in Ezekiel 7:3: The end is come upon thee, and I will send my fury upon thee. For he worked signs, he spread the gospel, and they did not wish to believe; therefore what is said in Malachi 1:10 happened to them: I will not receive a gift of your hand. Augustine holds that this should not be referred to the consummation of Jerusalem, but of the world; hence he says, it shall be preached, namely, before the end of the world, for a testimony to all nations, because not all will believe; and then the consummation shall come, i.e., the end of the world. And this is one sign: that as long as the preaching of the gospel has not been spread throughout the whole world, the end will not come. But it had not yet come, as Augustine says, to certain barbarians in Africa. And he responds to the text, Their sound hath gone forth into all the earth (Psalm 18:5), that it used the past tense for the future. And to what is written in Colossians 1:6, he says that it was not yet bearing fruit fully, but was already beginning to do so. And it can be distinguished thus: the diffusion of the gospel can be understood in two ways. Either as to fame only, and in this way it was completed before the destruction of the city; for although some had not received it, nevertheless there was no nation to which the fame had not reached. But if the diffusion is understood with its effect, then it is true what Augustine says, that it had not yet come to all nations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
