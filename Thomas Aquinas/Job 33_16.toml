[[commentary]]
quote='''
Third, he places the divine action in the one sleeping, which is characterized first by the fact that, when the exterior senses have been immobilized in deep sleep and a man is resting quietly in bed, a certain ability is divinely given to a man to perceive divine instruction because his spirit is not preoccupied with exterior things, and so he says, "then he opens the ears of men." By "ears" he fittingly enough expresses the ability to perceive divine instruction in dreams because he speaks about this kind of instruction like a kind of language because it does not result from the experience of things themselves, but in signs as is also true in language. Once the ability to hear him has been given, it is fitting that he can teach, and so he continues, "and he educates them and instructs them in discipline." Discipline is taken here for the instruction which tells a man what must be done and avoided, not for the knowledge of the speculative sciences, which are usually not revealed in a dream.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
