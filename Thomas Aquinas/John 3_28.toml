[[commentary]]
quote='''
Then follows the difference of their offices, when he says, You yourselves are witnesses. As if to say: From the testimony which I bore to him, you can know the office committed to me by Christ: for You yourselves are witnesses, i.e., you can testify, to the fact that I said: I am not the Christ—"He declared openly and did not deny" (above 1:20)—but the one sent before him, as a herald before a judge. And so from my own testimony you can know my office, which is to go before Christ and prepare the way for him: "There was a man sent by God, whose name was John" (above 1:6). But the office of Christ is to judge and to preside. If we look at this closely we can see that John, like a skilful disputant, answers them with their own arguments: "I judge you out of your own mouth," as said in Luke (19:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F3.htm'
source_title='Commentary on John'
