[[commentary]]
quote='''
Second, as to the liberation of captives, as to the preparation of the way: go through, you messengers of Cyrus and Darius; pick out the stones, impediments: take the stones out of the way (Jer 50:26); or you, watchmen of the walls: preachers. As to the granting of joy: lift up the sign, the decree of Cyrus that all the captives could return, or the sign, of the cross, above: he shall set up a sign unto the nations (Isa 11:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
