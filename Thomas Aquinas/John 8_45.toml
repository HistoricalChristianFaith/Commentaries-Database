[[commentary]]
quote='''
After mentioning some characteristics of the devil, he then shows that the Jews are imitating these. Our Lord ascribed two kinds of evil to the devil, murder and lying. He reproved them before for their imitation of one of these, namely, murder: "Now you seek to kill me, a man who has told you the truth" (8:40). Then passing from this, he reproves them for turning away from the truth: first, he shows that they are turned away from the truth; secondly, he rejects a certain reason they might give for this (v 46); thirdly, he concludes to the true reason for their being turned away from the truth (v 46b).

He says first: It was said that the devil is a liar and the father of lies, and you are imitating him because you do not wish to adhere to the truth. Thus he says, If I tell the truth to you you do not believe me; "If I tell you, you will not believe" (Lk 22:67); "If I have told you earthly things and you do not believe me, etc." (3:12). And Isaiah complains: "Who has believed what we have heard?" (Is 53:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
