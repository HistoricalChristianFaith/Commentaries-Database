[[commentary]]
quote='''
"Guard." Here he asks for help against enemies, because they are many and wicked; therefore he asks for a twofold help. First, that God guard him in persecutions lest they prevail temporally or spiritually, or that he guard him lest he fall into sin. Second, that he free him from evils; hence he says, "and rescue me," namely from evils entirely, so that he may enjoy abundance in the homeland. The first reason is presented when he says, "Let me not be put to shame"; because if you do not free and guard me, I shall come to confusion. And this ought not to be, because "I have hoped in you": Dan. 3: "There is no confusion for those who trust in you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
