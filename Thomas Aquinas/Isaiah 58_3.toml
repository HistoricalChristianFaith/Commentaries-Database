[[commentary]]
quote='''
Again, they trust in the observation of fasts: why have we fasted, and you have not regarded, as if you were grateful; have we humbled our souls, as to the circumstances of their fasts, in outward humiliation, and you have not taken notice, with the knowledge of approval: he labors in vain that serves God, and what profit is it that we have kept his ordinances? (Mal 3:14).

1025. Second, he shows rejection of these goods. And first, the cause of rejection, which is the fault of the will: behold in the day of your fast your own will is found, in things which please the flesh: go not after your lusts (Sir 18:30). Also, the fault of cruelty: and you exact of all your debtors, literally, so that they could persist for a long time in litigating, or to its consecutive.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
