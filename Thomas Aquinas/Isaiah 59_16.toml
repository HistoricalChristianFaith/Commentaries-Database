[[commentary]]
quote='''
And the Lord saw. Here he sets out the preparation of salvation on the part of the Savior. And first, he sets out the manner of preparation, speaking of God according to a human manner. He sets out his compassion: and the Lord saw, with the eye of mercy, there is no judgment, of anyone to save. And he saw that there is not a man, saving the Jews, and he stood astonished, saddened or distressed: and I sought among them for a man (Ezek 22:30). And he sets out the taking up of armor: and his own arm brought salvation to him, that is, his power, that he should suffer nothing contrary, or the people to the worship of him; his own justice supported him, that his vengeance be executed firmly; he put on justice as a breastplate: for as a soldier is strengthened by armor, so his work is strengthened by justice and his intention to save: his arm has wrought for him salvation (Ps 97[98]:1); he will put on justice as a breastplate (Wis 5:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
