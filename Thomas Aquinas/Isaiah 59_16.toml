[[commentary]]
quote='''
And he saw that there is not a man, saving the Jews, and he stood astonished, saddened or distressed: and I sought among them for a man (Ezek 22:30). And he sets out the taking up of armor: and his own arm brought salvation to him, that is, his power, that he should suffer nothing contrary, or the people to the worship of him; his own justice supported him, that his vengeance be executed firmly;
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
