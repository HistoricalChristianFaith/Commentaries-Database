[[commentary]]
quote='''
He proves that he did not say this in despair saying, "I know that you will hand me over to death," as if to say: I do not suffer these things as though they were not planned, for I know that I will go to a still further defect, death. He says that he knows this because of the condition of mortal life, "where the house of every living thing has been built," since all men tend to death as a man does to his house.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
