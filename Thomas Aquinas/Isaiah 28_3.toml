[[commentary]]
quote='''
Second, he sets out the inflicting of the punishment, namely, the casting down of pride: the crown of pride shall be trodden under feet: in your anger you will tread the earth under foot (Hab 3:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
