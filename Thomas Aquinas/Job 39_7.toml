[[commentary]]
quote='''
Although a dwelling of this sort seems more neglected and bleak because it is in a waste, still the wild ass prefers it as much as possible to any noble city, and so he says, "He scorns the multitude of the city," in comparison to the dwelling of the desert. He gives two reasons for this. The first of these is because laborious work is not required of him there, and so he says, "he hears not the shouts of the driver," i.e. his master demanding that he carry heavy loads or something of this sort.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
