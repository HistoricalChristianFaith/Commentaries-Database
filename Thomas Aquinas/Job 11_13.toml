[[commentary]]
quote='''
He seemed to say this as an insult to Blessed Job because he takes Job's words as an argument with God as with an equal when he said, "May he withdraw his rod from me, let terror of him not frighten me. I will speak and not be afraid of him." (9:34) So he continues, "But you have hardened your heart," so you defend your evil. Yet, "You have stretched out your hands to God," in this condition of hardness of heart in prayer when you said, "I will say to God: Do not condemn me." (9:34) So your prayer is useless.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
