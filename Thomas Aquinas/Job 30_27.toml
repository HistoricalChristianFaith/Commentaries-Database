[[commentary]]
quote='''
He explains then the evils overcoming him, and he begins with interior evils when he says, "My bones are inflamed without rest." This can refer to the weakness of the interior powers coming from too much heat, and also to the affliction of the heart proceeding from the intensity of the heat of pain. To show this kind of turmoil is too early, he says, "Days of affliction have anticipated me." For all men suffer in their old age from ill health, but he has been anticipated with afflictions in his youth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
