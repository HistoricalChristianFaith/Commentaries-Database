[[commentary]]
quote='''
Then the effect of the miracle, namely, the amazement of the crowd: and all the people were amazed. Also their confession; hence they said, i.e., confessed, Can this be the son of David? It had been promised in the prophets that Christ would be born of the seed of David: "I will raise up for David a righteous branch" (Jer 23:5). But what was said above (11:25) seems fulfilled: "You have hid these things from the wise and prudent and revealed them to little ones." Hence the people acknowledge him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
