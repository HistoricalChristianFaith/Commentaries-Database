[[commentary]]
quote='''
And he said to them. Note, this is the third point, namely, the tolerance of the wicked; concerning this, Ecclesiastes 8:11 says: for because sentence is not speedily pronounced against the evil, the children of men commit evils without any fear. And first he shows his purpose; secondly, he assigns the reason; thirdly, he sets down the limit of tolerance, because he will not always tolerate. He says therefore, no, i.e., I do not will that you gather them yet; 2 Peter 3:9: the Lord does not delay his promise, but deals patiently. Lest perhaps: here he sets down the reason. And at first glance you should note that good is great and victorious over evil, because good can exist without evil, but evil cannot exist without good; therefore the Lord tolerates many evils, so that they may come, or even so that many goods may not perish. Therefore he says, lest perhaps, gathering up the cockle, i.e., the wicked, or heretics etc., you root up the wheat also together with it. There are four reasons why the wicked should not be rooted up because of the good. One reason is that through the wicked, the good are exercised; 1 Corinthians 11:19: there must be heresies, that they who are approved may be made manifest among you; Proverbs 11:29: the fool shall serve the wise. If there had been no heretics, the knowledge of the saints, of Augustine and others, would not have shone forth. Hence he who would root out the wicked would root out many goods as well. Likewise, it happens that he who is now wicked later becomes good, like Paul. Hence if Paul had been killed, we would lack the teaching of so great a master, which God forbid. Therefore, if you wish to root out, you will root up the wheat as well, namely, him who will be wheat; Psalm 67:23: the Lord said: I will bring back from Basan, I will bring back into the depths of the sea. The third reason is that some seem wicked and are not; therefore if you wished to root out the wicked, you would immediately uproot many good persons. And this is apparent, because God did not wish them to be gathered until they reached perfect maturity; hence 1 Corinthians 4:5: judge not before the time. The fourth reason is that someone is sometimes of great power; therefore if he is excluded, he draws many with him, and so with that one wicked man, many perish. Therefore a congregation is not excommunicated, nor a prince of the people, lest with one many should fall. Concerning such a one is understood what is said in Apocalypse 12:4, that the dragon drew the third part of the stars with him, etc. And Genesis 18:25: far be it from you to do this thing and to slay the just with the wicked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
