[[commentary]]
quote='''
Lest one think that he came into scorn because of some fault he had committed, he shows the cause of this contempt from the part of God who struck him. He shows first that he is afflicted by God when he says, "He opened up his quiver and struck me down." Arrows are taken out of a quiver which some use to wound someone. Arrows here mean divine scourges from God because this is the way he uses them in Chapter Six, "The arrows of the Lord stick fast in me, and their displeasure drains my spirit." (6:4) So the quiver of the Lord is the divine disposition from which adversities come to men, which he tells us has been opened, because of the abundance of adversities by which he says he has been tried both exteriorly and interiorly. Second, he asserts that God has hindered him from being able to repel his injuries at least in word. So he then says, "and he placed a bridle in my mouth," because God's scourge took away his confidence in answering, when others took their arguments against him from those very scourges.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
