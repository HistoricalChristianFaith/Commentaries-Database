[[commentary]]
quote='''
Christ's concession follows: And he said to them, "Go." But the Lord seems to have heard the demons. It should be said that he did not hear, but in his wisdom he permitted what happened, to show the malice of the demons; because if the Lord had not restrained them, they would have rushed into men as they rushed into the swine. But when the Lord permitted some demons, he did not permit entirely; for he put a restriction on them as in Job (2:6). Hence to designate this he permitted them to enter the swine. Also, to show that they could do nothing without God's permission; again, so that man might recognize his own dignity, since he permitted so many swine to be killed for the welfare of one man.

The execution of the command follows: And the whole herd rushed down the steep bank into the sea. In this is signified that no one can be entirely destroyed by the devil, unless he presents himself as swine, i.e., entirely unclean. Hence Revelation (18:21): "So shall Babylon, the great city, be thrown down with violence"; "But these, like irrational animals, receiving the reward of their unrighteousness" (2 Pt 2:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
