[[commentary]]
quote='''
Then when he says, for we are buried together, he proves that we are all baptized in conformity with the death of Christ, saying, we are buried together with him by baptism into death. As if to say: burial is only for the dead. Let the dead bury their dead (Matt 18:22).
By baptism, however, men are buried with Christ, i.e., conformed to his burial. For just as a buried man is put under the earth, so one being baptized is submerged under water. Hence, there are three immersions in baptism not only to indicate belief in the Trinity but also to represent the three days of Christ's burial. And just as the three days of burial were one burial, so the triple immersion constitutes one baptism. That is also why solemn baptism is celebrated in the Church on Holy Saturday, when the burial of Christ is commemorated and on the vigil of Pentecost in honor of the Holy Spirit, from whom the water of baptism derives its power to cleanse: unless one is born of water and the Spirit he cannot enter the kingdom of heaven (John 3:5).

Yet it must be noted that in the body one dies before he is buried, but in the spiritual order the burial of baptism causes the death of sin, because the Sacraments of the new law bring about what they signify. Hence, since the burial which occurs through baptism is a sign of the death of sin, it produces such a death in the baptized. And this is what he says, namely, that we are buried . . . into death, so that in receiving in ourselves the sign of Christ's burial we might obtain death to sin.

Then when he says, that, as Christ, he infers the consequent, namely, that we should not live in sin. To this end he adduces a likeness to the resurrection of Christ, saying that, as Christ is risen from the dead by the glory of the Father, i.e., by the Father's power, whereby the Father himself is glorified: let your glory be over all the earth (Ps 57:5), so we also may walk in newness of life, i.e., advance in the spiritual life through good works.
For the life of sin carries with it the weakness of old age, because it leads to dissolution: what is becoming obsolete and growing old is ready to vanish away (Heb 8:13); hence it is said: why is it, O Israel, that you are in the land of your enemies (Bar 3:10); but whatever leads to restoration, i.e., to being without sin, is called newness of life: your youth is renewed like the eagle's (Ps 103:5); be renewed in the spirit of your minds (Eph 4:25).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
