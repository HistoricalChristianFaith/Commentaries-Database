[[commentary]]
quote='''
He said: bring them here to me. Here the manner of distribution is presented; and first, the presentation; second, the arranging of the crowds; third, the prayer; fourth, the distribution. Hence he says he said. He, who was omnipotent, could have created new loaves; but he willed to refresh them from loaves already made. But what is the reason? The literal reason according to Chrysostom is to refute the heresy of the Manicheans, who said these creatures were made by the Devil, against what is written in 1 Tim. 4:4: every creature of God is good. Hence if they were from the Devil, he would not have worked such great miracles in them. Likewise, to show that he is lord on land and on sea. He who in Gen. 1:11 said, let the earth bring forth the green herb, and who said: let the waters bring forth the creeping creature having life etc., that same one multiplied the loaves. Likewise, to indicate that he did not reject the old law, but converted it into the new; therefore he says bring them to me, because the things that are written in the old law should be referred to the new. Hence he himself said, John 5:46: if you believed Moses, you would perhaps believe me also.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
