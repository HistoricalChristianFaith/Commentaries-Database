[[commentary]]
quote='''
But because someone could say, Why do you say spare us? Are you our lord? He removes this, saying, not that we lord it over your faith; we work with you for your joy. As if to say: I do not say this as a lord, but as a helper: "Not as those domineering over those in your charge, but being examples to the flock" (1 Pet. 5:3). A helper, I say, for your joy, or for your improvement. Why he says, of your faith, he explains, saying, for you stand firm in your faith, i.e., you stand in that grace of Christ by faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
