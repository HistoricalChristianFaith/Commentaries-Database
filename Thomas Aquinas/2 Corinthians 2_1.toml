[[commentary]]
quote='''
After giving a general excuse for his delay in visiting the Corinthians, the Apostle now gives the cause of his delay and how he spared them. In regard to this he does two things: first, he mentions that one cause of his delay was that he might not pain them by coming; secondly, he shows that another cause was that the fruit he hoped for from others and which was beginning to ripen, might not be hindered (v. 12). In regard to the first he does two things: first, he shows that the cause of his delay in general was to avoid paining them; secondly, he speaks in particular about a certain person who had grieved him (v. 5). In regard to the first he does three things: first, he tells why he postponed his visit; secondly, he gives the reason for his statement (v. 2); thirdly, he explains what he said (v. 4).

He says, therefore: I have said that it was in order not to grieve you that I did not come to you. Therefore, I made up my mind, i.e., about what I mentioned when I sent the other letter: "Reason is the beginning of every work, and counsel precedes every undertaking" (Sir. 37:16); not to make you another painful visit, i.e., not to cause you pain. The reason he did not wish to grieve them is the same one whereby the Lord did not wish his disciples to fast, namely, in order that they be drawn to Christ and be joined to him not by fear but by love. For the Lord wished to strengthen and nourish them in the faith in all sweetness and heartfelt desire, so that, being thus established in love, they would not easily turn away from him because of tribulations, for "many waters cannot extinguish love" (Sg. 8:7). For the same reason the Apostle does not want to pain them on this account.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
