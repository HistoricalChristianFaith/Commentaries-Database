[[commentary]]
quote='''
Hence he adds: and you do not have his word abiding in your hearts, i.e., you do not have his word that is inwardly inspired. And the reason is, for you do not believe in him whom he, the Father, has sent. For the word of God leads to Christ, since Christ himself is the natural Word of God. But every word inspired by God is a certain participated likeness of that Word. Therefore, since every participated likeness leads to its original, it is clear that every word inspired by God leads to Christ. And so, because you are not led to me, you do not have his word, i.e., the inspired word of God, abiding in your hearts. "He who does not believe in the Son of God does not have life abiding in him," as it says below (sic). He says abiding, because although there is no one who does not have some truth from God, they alone have the truth and the word abiding in them whose knowledge has progressed to the point where they have reached a knowledge of the true and natural Word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
