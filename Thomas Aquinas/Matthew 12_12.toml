[[commentary]]
quote='''
Secondly, the comparison is made: Of how much more value is a man than a sheep! Incomparably, because all things are for man; for dominion over all things has been entrusted to man, as it says in Genesis (1:26): "Let us make man to our own image and likeness..., and let him have dominion over the fish of the sea, and the birds of the air, and the beasts of the earth." Consequently, what was made to the image of God is preferred to a sheep. From this he concludes: So it is lawful to cure on the Sabbath, i.e., to do good to men: "Cease to do evil, learn to do good" (Is 1:16), because it is written in Exodus (20:10): "You shall do not servile work on that day." Servile work is sinful; therefore, it is lawful to do good. But then there is a question: Is it lawful to do all good works on the Sabbath? For then it is lawful to plow. Therefore, it must be said that servile work can be understood literally, and mystically servile work is sin: "he that commits sin is the slave of sin" (Jn 8:34). Again, servile work is that in which the body is employed more than the mind. For the soul is supposed to rule the body. Therefore, to take counsel is not a servile work. Hence we can see which things are excused from the Sabbath. For the Lord excuses the disciples by reason of need; hence necessity excuses. Likewise, things which are immediately directed to the worship of God, as to swing a censer, etc. Also things pertaining to bodily health, as to concoct medicine, salve, etc. Hence they are rebuked, because they narrowed a precept of the Law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
