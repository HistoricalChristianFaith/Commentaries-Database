[[commentary]]
quote='''
But let such people, i.e., who say such things about me, understand this, i.e., know for certain, that what we say by letter when absent we do when present, i.e., we will be such when we come to you as we are by epistle when absent, if it is necessary. Now the reason the Apostle acted humbly toward them is given in 1 Cor. (2:3): "And I was with you in weakness and in much fear and trembling," which he did, because they were not firm in faith and he wanted to strengthen them by the gentleness of his manner. Furthermore, the reason he spoke plain words and did not preach subtle things to them is suggested in 1 Cor. (3:1): "But I, brethren, could not address you as spiritual men, but as men of the flesh, as babes in Christ." For they were not yet ready for a more profound doctrine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
