[[commentary]]
quote='''
After Blessed Job has shown the firm character of divine power, he here begins to show the depth of divine wisdom. However, he proceeds in an inverse order to the preceding one. Before he began by showing the divine power in human affairs and proceeded to the heavenly bodies, whereas here he begins with the heavenly bodies and proceeds to human affairs. He does this reasonably, for the wisdom of a maker is shown in the fact that he makes things which endure and so to show the wisdom of God, he begins from the creature which are more stable, namely those manifesting divine wisdom more clearly. The power of someone's strength is shown by the fact that he can change things from their condition and so men are usually tested in lifting and hurling stones, by the size of the men they can pin to the ground and things of this sort. On that account, since he was demonstrating the force of the power of God, he began from those things in which this change appears more clearly.

So, to show divine wisdom he begins with heavenly bodies, saying, "He alone takes the measure of the heavens." Note here that the wisdom of God seems especially praiseworthy in three things. First, of course, in the fact that he can measure something great with his understanding and wisdom. He takes up this theme saying, "He alone stretches out the heavens," for in the extension of the heaven is expressed their greatness of quantity. Thus God alone is said to have extended the heavens in as much as he alone could give the heavens such great quantity measured by his wisdom. Second, the wisdom of God appears praiseworthy in the fact that he reduces things which are variable and in uncertain flux to a certain order and makes them subject to his guidance. To show this point he says, "and treads upon the waves of the sea." For the waves of the sea seem to be the most disordered things in themselves, in as much as they are born about now here and now there by shifting winds, and yet God treads upon them inasmuch as he subjects them to his government. Third, the wisdom of God seems praiseworthy from the fact that God has established many things according to the reasonability of his wisdom, which appear marvelous to men whose nature they cannot investigate. These appear especially in the position and disposition of the stars, which nevertheless has been fixed wisely and reasonably by God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
