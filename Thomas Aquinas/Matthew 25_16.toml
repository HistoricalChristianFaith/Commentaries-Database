[[commentary]]
quote='''
And he that had received the five talents went, etc. Here the use of the gifts is presented, and this with regard to three servants. And first with regard to the first; secondly, with regard to the second; thirdly, with regard to the third. Hence he says and he that had received the five talents went. Here progress in virtue is indicated; Psalm 83:8: they shall go from virtue to virtue. And this is had in Genesis 26:13: he went on growing and increasing. For virtue progresses through the exercise of action; for unless it is exercised, it fails. And therefore he says he traded. Hence it is said in Proverbs 13:4: the soul of those that work shall be made fat. And he gained other five. And how? One progresses in two ways: in one way in himself, in another way in another. In himself, if he has understanding of the Scriptures, so as to advance; if charity, so as to benefit others. He has advanced in order to profit in another, so that what he has received he communicates; 1 Peter 4:10: as every man has received grace, ministering the same one to another. Hence if you communicate what you receive, you gain as many more. Hence he says that he gained other five; because it is scarcely possible that anyone confers on another what he himself does not have. 1 Corinthians 11:23: for I have received of the Lord that which also I delivered unto you. Moreover, in that which he has, in that he profits. The Apostle says: his grace in me has not been void. According to Hilary, that one gains five who profits in the five books of Moses, so as to gain Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
