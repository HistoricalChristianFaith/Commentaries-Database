[[commentary]]
quote='''
In this part he shows how Ezechias fought against the blasphemies of the Assyrians with humility and prayers, and concerning this he does three things. First, he recounts how he went to the place of prayer, assuming the dress of humility: and covered himself with sackcloth: the word came to the king: and he rose up out of his throne, and cast away his robe from him, and was clothed in sackcloth, and sat in ashes (Jonah 3:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
