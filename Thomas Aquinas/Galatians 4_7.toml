[[commentary]]
quote='''
Then when he says, "Therefore, now he is not a servant, but a son," he mentions the fruit of this gift. First, as to removing all evil, from which we are freed through adoption by the Holy Spirit. This is freedom from bondage. With respect to this he says: "Therefore," i.e., because the Spirit cries "Father" in us, "now," from the time of grace, "he," i.e., each one of us who believes in Christ, "is not a servant," i.e., serving in fear—"I will not now call you servants but friends" (Jn 15:15); "You have not received the spirit of bondage again in fear: but you have received the spirit of adoption of sons" (Rom 8:15)—"but a son": "For the Spirit himself giveth testimony to our spirit that we are the sons of God" (Rom 8:16). For although we be in the condition of servants (because it is said in Luke (17:10): "When you shall have done all these things that are commanded you, say: We are unprofitable servants"), we are not ill-disposed servants, i.e., serving in fear—for such a servant is deserving of torture and chains—but we are good and faithful servants, serving out of love. For that reason we obtain freedom through the Son: "If, therefore, the son shall make you free, you shall be free indeed" (Jn 8:36).

Secondly, he mentions the fruit as to its effect of attaining every good. With regard to this he says: "And, if a son, an heir also through God": "And if sons, heirs also: heirs indeed of God and joint heirs with Christ" (Rom 8:17). Now this inheritance is the fulness of all good, for it is nothing other than God Himself, according to Psalm (15:5): "The Lord is the portion of my inheritance." He said to Abraham: "I am thy reward exceeding great" (Gen 15:1). He says, "through God," because as the Jews obtained the inheritance through the promise and justice of God, so the Gentiles too received it through God, i.e., through the mercy of God: "But the Gentiles are to glorify God for his mercy" (Rom 15:9). Or, "through God," i.e., through the working of God: "Thou hast wrought all our works for us, O Lord" (Is 26:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Galatians.html'
source_title='Commentary on Galatians'
