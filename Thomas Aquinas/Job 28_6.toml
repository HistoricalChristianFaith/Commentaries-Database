[[commentary]]
quote='''
When there is a great abundance of heat, the resolutions both of the dry and wet attain a great degree of integration, which generates certain precious things like rocks or metals from them. So as to the precious stones which are formed from dry evaporation, he says, "Places whose stones are sapphires," in the land ruined by fire. As to precious metals which are generated from humid evaporation he says, "whose dust is gold."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
