[[commentary]]
quote='''
And there follows, and they did not understand until the flood came and took them all away, namely, those who did not cling to Noah, who was a figure of Christ. So shall also the coming of the Son of man be. But it is said in Luke 21:26: Men withering away for fear. And above in this same chapter it says that the sun shall be darkened. How then will men be secure enough to eat and indulge in luxury? There is a twofold answer. Jerome says that it is true that around the times of the Antichrist there will be many tribulations, and this for the testing of the elect; and afterward they will be restored to tranquility, and in that tranquility the wicked will devote themselves to pleasure. Hence Luke speaks according to the state of tribulation, but Matthew according to the time that will immediately precede the coming of God. Likewise in another way, because some are good, some wicked. And universally the Church will suffer tribulation, and the good will be punished by the wicked; hence it is said above at 10:22: You shall be hated by all men for my name's sake. Hence those who will suffer will be the good; but those who will carry out these tribulations will be the wicked. Therefore what is said here, eating and drinking etc., is understood regarding the wicked; but what is said in Luke, men withering away for fear, is understood regarding the good. Or thus: since it frequently happens that the good are corrected through tribulation but the wicked are not, therefore the wicked will wither away, but the good will not.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
