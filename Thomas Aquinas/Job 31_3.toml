[[commentary]]
quote='''
Second, the reason why he shunned the sin of lust is the damage which it brings upon men, which is twofold. One is corporeal, when a man because of the sin of lust incurs danger to his person and property, and so he says, "Is it not damnation for the wicked?" as if to say: The evil man who is involved in this sin rushes to damnation. Another damage is the impediment to doing good works, and so he says, "and aversion for those doing evil," for violent pleasure drags the soul more to itself. So men given to lust abandon good works, and even good talk.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
