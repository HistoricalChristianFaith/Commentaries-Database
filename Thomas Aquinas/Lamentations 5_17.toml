[[commentary]]
quote='''
Second, is the glory of the temple. Here sadness is placed upon it. That is, due to a multitude of tears. For, as the prophet Jeremiah 8:18 declares: "My grief is beyond healing, my heart is sick within me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
