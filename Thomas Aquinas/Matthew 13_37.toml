[[commentary]]
quote='''
He answered and said. Here is set forth the exposition of the parable of the weeds. And first as to the first sowing; secondly, as to the oversowing; thirdly, as to both. And first he explains what the sower is, what the field, what the seed. He that sows the good seed is the Son of man. He calls himself the Son of man, both on account of humility, and to refute future heretics: for some denied that he was God, and others that he was man. Hence he says he is the Son of man, which pertains to his humanity; and to sow spiritual things pertains to God. Ps 4:7: the light of your countenance, O Lord, is signed upon us, etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
