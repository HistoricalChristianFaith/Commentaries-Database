[[commentary]]
quote='''
Here he describes the condition of their punishment, and he sets out two conditions: first, equity on the part of the one who judges; second, deception on the part of the one who suffers the punishment: and it shall come to pass, when it is seen (Isa 16:12). Now equity of punishment is disposed from the preceding fault, and therefore it orders the fault. And he sets out a double fault: first, against the contempt of the benefit they were promised; second, against the contempt of wholesome counsel they were given: take counsel (Isa 16:3).

Concerning the first, he does two things. In the first, he promises the benefit of Christ to be born from their people, that they might receive some comfort. For Ruth the Moabitess married Booz, by whom she conceived Obed the father of Jesse, the father of David, from whom Christ was born, as it is said in Ruth 4:17. And therefore, he says: O Lord, the Father, the lamb, Christ (John 1:29); from the rock of the desert, from Ruth the gentile, whose people were of stone, worshipping gods of stone, and because of this, deserted by God; to the mount, Jerusalem, in which Christ was killed and rose again, or the Church; the ruler: to him that sits on the throne (Rev 4:9).

Others wish, though it is tortured, to explain this literally of the tribute of lambs, which the king of Moab took from the king of Israel, as it says in 2 Kings 3:4, which the prophet foretells will be restored to the king of Jerusalem: the ruler, as a sign of its lord; from Petra of the desert, the place in which sheep are raised.

Note that Christ is called a lamb first, because of the purity of his life: it shall be a lamb without blemish, a male, of one year (Exod 12:5); second, because of the meekness of his death, below: as a lamb before his shearer, and he shall not open his mouth (Isa 53:7); third, because of his expiation of sin: behold the Lamb of God. Behold him who takes away the sin of the world (John 1:29).

Note that the Blessed Virgin is called a rock first, because of the firmness of grace: as everlasting foundations upon a solid rock (Sir 26:24); second, because of the coolness of continence, below: as the shadow of a rock that stands out in a desert land (Isa 32:2); third, because of the fruit of her womb: the rock poured me out rivers of oil (Job 29:6). And note that this rock alone was of the desert, because she was before all others, as to the first: you are all fair, O my love (Song 4:7); second, because she was first, as to the second: we will run to the odor of your ointments (Song 1:3); she was a virgin, as to the third, above: behold a virgin shall conceive, and bear a son (Isa 7:14).

Note on the words, send forth, namely, you, Father, send the Son, first, as the sun sends a ray: the sun three times as much, burns the mountains (Sir 43:4); second, as a spring sends a stream: I, like a channel of a river (Sir 24:41); third, as a father sends a son: God so loved the world, as to give his only begotten Son (John 3:16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
