[[commentary]]
quote='''
Above, the Lord showed the sufficiency of the evangelical doctrine, because it neither needs legal observances, and likewise because it is necessary not only for one people; here he shows its purity and excellence. First, he shows that it must be kept pure from every tradition; second, that through the loftiness of faith it soars above all human opinions, at Jesus came into the parts of Caesarea Philippi. Concerning the first: first, the calumnious testing is described; second, he refutes it; third, he teaches what must be avoided. The second is at but he answering, said to them etc.; the third is at and when his disciples were come across the water etc. Concerning the first: first, he mentions the place; second, the testing question is set forth. It should be noted that just as above, when he had fed the crowds with five loaves, he dismissed them, so also here. In this, first an example is given to preachers, that they should not thrust themselves forward, but should return; Job 39:5, concerning the wild ass: who hath sent out the wild ass free, and who hath loosed his bonds? etc. He went up into a boat, lest the crowd should follow him. Hence the impediment is set forth as to why they could not follow him. Hence he went up into a boat, i.e., into a mind that is tossed by the waves of this world, Wis. 14:3: for thou hast made a way in the sea, and a path among the waves, showing that he ought to enter there, so that he might rest there. And he came into the borders of Magedan. Magedan is interpreted as 'fruits,' and by this place Sacred Scripture is signified, where fruits grow together with other produce; Cant. 6:10: I went down to see the fruits of the valley. There follows the testing question: and there came to him the Pharisees and Sadducees tempting, and they asked him. Ecclus. 19:23: there is one that submitteth himself wickedly, and his interior is full of deceit. That he would show them a sign from heaven. And they asked for a sign from heaven. It is found in John 6:49: our fathers did eat manna in the desert, hence he gave them bread from heaven. And 1 Cor. 1:22: the Jews require signs. And in Ps. 73:9: our signs we have not seen etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
