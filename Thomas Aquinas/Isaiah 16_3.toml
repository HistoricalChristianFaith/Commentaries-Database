[[commentary]]
quote='''
Here he ordains the punishment against their contempt of the counsel they were given. And this is divided into three: in the first, he sets out the counsel; in the second, their contempt of the counsel: we have heard of the pride of Moab (Isa 16:6); in the third, the punishment of those who hold it in contempt, where it says, therefore shall Moab howl (Isa 16:7).

Concerning the first, he sets out three things. First, he exhorts them to deliberation: take counsel, as if to say: deliberate over how you might be saved. The counsel is the question itself which is moved among those taking counsel; the council is the congregation of those taking counsel. Gather a council, as though having a strict counsel: there is safety where there is much counsel (Prov 11:14); do you everything with counsel, and you shall not repent when you have done (Sir 32:24).

Second, he sets out the contents of the counsel: make your shadow as the night, in which he exhorts them to two things. To receive the fleeing Jews, that they might prepare a hiding place: make your shadow as the night in the midday, that is, prepare yourself to hide them so that they will be hidden in the day as if in the night; or in the midday, in open persecution, that you might conceal them that flee; hide them, that hiding them, you might not reveal them that wander about.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
