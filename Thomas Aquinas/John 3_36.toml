[[commentary]]
quote='''
Then when he says, Whoever believes in the Son has eternal life, he shows the fruit of faith. First, he sets forth the reward for faith. Secondly, the penalty for unbelief (v 36b).

The reward for faith is beyond our comprehension, because it is eternal life. Hence he says, Whoever believes in the Son has eternal life. And this is shown from what has already been said. For if the Father has given everything he has to the Son, and the Father has eternal life, then he has given to the Son to be eternal life: "Just as the Father possesses life in himself, so he has given it to the Son to have life in himself" (below 5:26): and this belongs to Christ insofar as he is the true and natural Son of God. "That you may be in his true Son, Christ. This is the true God and eternal life" (1 Jn 5:20). Whoever believes in the Son has that toward which he tends, that is, the Son, in whom he believes. But the Son is eternal life; therefore, whoever believes in him has eternal life. As it says below (10:27): "My sheep hear my voice... and I give them eternal life."

The penalty for unbelief is unendurable, both as to the punishment of loss and as to the punishment of sense. As to the punishment of loss, because it deprives one of life; hence he says, whoever is unbelieving in the Son will not see life. He does not say, "will not have," but will not see, because eternal life consists in the vision of the true life: "This is eternal life: that they may know you, the only true God, and Jesus Christ, whom you have sent" (below 17:3): and unbelievers will not have this vision and this knowledge: "Let him not see the brooks of honey" (Jb 4:19), that is, the sweetness of eternal life. And he says, will not see, because to see life itself is the proper reward for faith united with love.

The punishment of sense is unendurable because one is severely punished; so he says: the anger of God rests on him. For in the Scriptures anger indicates the pain with which God punishes those who are evil. So when he says, the anger of God, the Father, rests on him, it is the same as saying: They will feel punishment from God the Father.

Although the Father "has given all judgment to the Son," as we read below (5:22), the Baptist refers this to the Father in order to lead the Jews to believe in the Son. It is written about this judgment: "It is a terrible thing to fall into the hands of the living God" (Heb 10:31). He says, rests on him, because this punishment will never be absent from the unbelieving, and because all who are born into this mortal life are the objects of God's anger, which was first felt by Adam: "We were by nature," that is, through birth, "children of anger" (Eph 2:3). And we are freed from this anger only by faith in Christ; and so the anger of God rests on those who do not believe in Christ, the Son of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F3.htm'
source_title='Commentary on John'
