[[commentary]]
quote='''
Not only do they despoil men in exterior things, but they also injure them in their persons, and so he says, "In the cities they made men groan," since when some men have been injured, many of the citizens are disturbed. The very ones who have been injured wail, and so he says, "and the souls of the wounded will cry out, and God," from whom nothing is hidden of what is done in time, "does not allow them to escape unpunished." This would not be the case if he did not have care over human affairs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
