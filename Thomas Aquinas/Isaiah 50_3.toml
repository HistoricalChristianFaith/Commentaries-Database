[[commentary]]
quote='''
Second, he shows signs of his power in the heavens: I will clothe the aerial heavens with darkness, as in Egypt (Exod 10:21); who covers the heaven with clouds (Ps 146[147]:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
