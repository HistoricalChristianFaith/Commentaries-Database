[[commentary]]
quote='''
He shows that they lack this sign when he says, Why do you not understand what I say? For as was stated above, to love Christ is the sign of being a child of God; but they did not love Christ; therefore it is obvious that they did not have this sign. That they do not love Christ is shown by the effect of love: for the effect of loving someone is that the lover joyfully hears the words of the beloved; thus we read: "Let me hear your voice, for your voice is sweet" (Song 2:14). And again, "My companions are listening for your voice; let me hear it" (Song 8:13). Therefore, because they did not love Christ, it seemed tedious to them even to hear his voice: "This is a hard saying, who can listen to it?" (6:60); "The very sight of him is a burden to us" (Wis 2:15).

It sometimes happens that a person is not glad to hear the words of another because he cannot weigh them and for that reason does not understand them, and so he contradicts them: "Answer, I beseech you, without contention—and you shall not find iniquity on my tongue" (Job 6:29). Therefore he says, Why do you not understand what I say? You question what I mean, as "Where I am going, you cannot come" (8:21). I say that you do not understand because you cannot bear to hear my word, i.e., your heart is so hardened against me that you do not even want to hear me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
