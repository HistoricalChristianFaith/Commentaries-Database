[[commentary]]
quote='''
646. – Then (v. 36) he mentions the evils inflicted on them in regard to derision by words, saying, others suffered mocking, as Samson in Judges (chap. 16), Tobias, Job and Isaiah: 'I have turned away my face from them that rebuked me and spit upon me' (Is. 50:6); and Jeremiah (20:8) says: 'The word of the Lord is made a reproach to me, and a derision all the day.' In regard to deeds he says, and scourging, as Micah, of whom it is written in 1 Kings (22:24) that Zedekiah struck him on the cheek. In all of this the sufferings of the New Testament are prefigured: 'We have been made a spectacle to the world, and to angels and to men' (1 Cor. 4:9).

647. – Then when he says, and even chains, he mentions the evils inflicted on the saints by imprisonment, as Jeremiah, of whom it is written in 20 (v. 2) that he was put in the stocks. But not only chains, but imprisonment, as Jeremiah (chaps. 37 & 38) and Micah (1 Kg 22:27).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
