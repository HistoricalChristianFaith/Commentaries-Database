[[commentary]]
quote='''
When Jesus heard him, he marveled... Here he touches on Christ's kindness. But how can he say, he marveled? For marveling finds no place in God, because it arises from ignorance of a cause, which cannot occur in God. But it is also due to apprehending the greatness of an effect and takes place through imagining and phantasizing some great effect. In this sense it can take place even in Christ; hence he marveled, i.e., regarded something as great, and expressed it to the crowd following. Then he commended him; hence he said to those following, I have not found such faith in Israel. But what is this? Was there not greater faith in Abraham, Isaac and Jacob? The answer is that there was; but Christ's statement is understood of his time. But then there is a question about the apostles, and Martha and Mary. I must say that his faith was greater, because he had seen nothing previously, as those who had seen miracles. Furthermore, Peter came at Andrew's invitation, and Andrew at John's. In Martha was a slight doubt, because she said: "Lord, if you had been here, my brother would not have died" (Jn 9:21), as though he could not have prevented it in his absence. But in the centurion's words there was no hint of doubt. Chrysostom explains it another way, namely, that great and small are not said in an absolute way, but relatively; as we say that many are in a house, but few in a stadium. Hence, I have not found such faith in Israel, namely, in relation to the gentiles: "The sojourner who dwells in your land shall mount above you higher and higher" (Dt 28:43).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
