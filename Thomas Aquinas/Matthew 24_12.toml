[[commentary]]
quote='''
Likewise, a third thing, because they will not only do this but will also corrupt, and so they will fail: because iniquity shall abound, the charity of many shall grow cold. Apocalypse 2:4: But I have somewhat against thee, because thou hast left thy first charity. It can be said to grow cold, because when they see others abandoning charity, they too grow cold, although it does not entirely perish; and in many, but not in all, because it was always fervent in the apostles; Romans 8:35: Who then shall separate us from the love of Christ? Shall tribulation, or distress, or famine, or nakedness, or danger, or persecution, or the sword? Hence it will be so in many, but not in all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
