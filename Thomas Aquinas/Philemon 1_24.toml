[[commentary]]
quote='''
But this can be doubted since he mentions Demas. How can this be, since he said in 2 Timothy 4:10, 'For Demas has deserted me, loving this world'? How, then, can he use his name?

It might be said that he returned to him, but this does not seem to be the case, because this letter was written after that to Timothy and here he says, I hope that through your prayers, and there he foretells his death, saying, 'The time of my deliverance is at hand.' Therefore it should be said that Paul was in Rome for nearly nine years, and this letter was written at the beginning, whereas the second letter to Timothy was written at the end of his life and then Demas weary of imprisonment deserted him. The letters of Paul are not arranged chronologically, because the letters to the Corinthians were written before the letter to the Romans, and this before the last letter to Timothy. That is placed first because of its matter, which is worthier.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Philemon.html'
source_title='Commentary on Philemon'
