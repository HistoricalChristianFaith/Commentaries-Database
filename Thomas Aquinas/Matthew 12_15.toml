[[commentary]]
quote='''
Jesus, aware of this, withdrew from there. Here he states how he escaped their snare: first, the departure is mentioned; secondly, the fruit. Why did he depart? Because it was not yet the time to suffer. He also departed in order to give his own the occasion for fleeing, as was stated above (c. 10). Likewise, to show that he was man; and in order not to incite them. For it is the sign of a good preacher that when he sees men moved and excited, he dismisses them, as it says in Sirach (8:13): "Do not kindle the coals of a sinner, lest you be burned in his flaming fire." And many followed him; hence he came to those who loved him and willingly listened to him: "My sheep hear my voice" (Jn 10:3). And he healed them: "For neither herb nor poultice cured them, but it was your word, O Lord, which heals all men" (Wis 16:12); "He sent forth his word and healed them" (Ps 107:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
