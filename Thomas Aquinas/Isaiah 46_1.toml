[[commentary]]
quote='''
Here he foretells the destruction of the enemies holding them captive, namely, the Babylonians, as to two things in which they gloried: first, as to the destruction of their idols; second, as to the ending of their kingdom, below: come down, sit in the dust (Isa 47:1). The first of these is divided into two. In the first, he foretells the destruction of the idols of Babylon as to the breaking of their statues: Bel is broken: I will throw down your altars (Ezek 6:4); and as to the carrying away of their metal, because the Persians carried off their gold and silver with them in vain, he sets out the disadvantage of weariness on the part of those who carried them off: upon beasts and cattle, namely, horses and camels, on which they carried off heavy metals: they must be carried to be removed (Jer 10:5); or their worshippers, who are beasts, adoring the images of beasts: there you shall serve strange gods (Jer 16:13).

Sin makes us weary, because of the anxiety in devising it: for they sleep not, except they have done evil (Prov 4:16); because of the labor in carrying it out: we wearied ourselves in the way of iniquity (Wis 5:7); because of the shame in reflecting on it: what fruit therefore had you then in those things of which you are now ashamed? (Rom 6:21); because of the frustration in expecting it: the expectation of the just is joy: but the hope of the wicked shall perish (Prov 10:28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
