[[commentary]]
quote='''
The glory of Libanus. Here he sets out the rebuilding of the structures of the temple: the glory of Libanus, which is the fir tree, and the box tree, and the pine tree; to beautify the place, namely, the temple, of my feet, in which adoration is given to me, as is given to kings at their feet: the place of my throne, and the place of the soles of my feet (Ezek 43:7). Mystically, by the place is signified the Church, by the various trees, the various faithful of those converted to the faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
