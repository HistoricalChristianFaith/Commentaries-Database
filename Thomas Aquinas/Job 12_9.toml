[[commentary]]
quote='''
He shows that all these things answer when asked, "Who does not know that the hand of the Lord made all these things?" So, then, all things confess that they have been made by God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
