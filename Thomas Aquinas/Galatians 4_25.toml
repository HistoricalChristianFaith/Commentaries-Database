[[commentary]]
quote='''
Then he gives the explanation of the mystery when he says: "Sinai is a mountain in Arabia, which hath affinity to that Jerusalem which now is, and is in bondage with her children." But here a difficulty arises: for since Sinai is almost twenty days journey from Jerusalem, it seems false that Sinai has affinity to [borders on] Jerusalem, as the Apostle says here. To this a Gloss responds in a mystical manner that Sinai is in Arabia, which stands for the abjection or affliction under which the Old Testament was given, because the men under it were oppressed by carnal observances after the manner of slaves and foreigners: "This is a yoke which neither we nor our fathers were able to bear" (Acts 15:10). This mountain neighbors on Jerusalem not by a spatial continuity but by a likeness "to that Jerusalem which now is," i.e., to the Jewish people, because just as they love earthly things and for the sake of temporal things are under the bondage of sin, so that mountain engendered unto bondage.

But this does not seem to be the Apostle's intention. For he wants to bring out that from the very place of bondage the Old Testament, which was given on Mount Sinai, engenders unto bondage, because it was given on Sinai not as a place where the children of Israel were to remain, but as a stage in their journey to the promised land. For Jerusalem, too, engenders sons unto bondage. Hence it is with respect to this that Mount Sinai is continuous with her. And this is what he says: which hath affinity to that (i.e., by being part of the continuous route followed by those going to Jerusalem) "Jerusalem which now is, and is in bondage with her children," i.e., the bondage of legal observances (from which Christ redeemed us) and of various sins—"He that commits sins is the servant of sin" (Jn 8:34)—and, literally, from bondage under the Romans who were their masters.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Galatians.html'
source_title='Commentary on Galatians'
