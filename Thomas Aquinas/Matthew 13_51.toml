[[commentary]]
quote='''
Have you understood all these things? They say to him: yes. After the Lord completed the parabolic teaching, both as to the crowds and as to the disciples, here he determines the effect; and first in the disciples; secondly, in the crowds, at and it came to pass, etc. The effect in the disciples was understanding: hence three things are set forth. First, the examination; secondly, the profession; thirdly, the designation of them for a future office. It should be noted that since he had spoken many things to the crowds and the disciples, because they were to be future masters, it was necessary that they understand. And note that they were examined on three things. First, on understanding: have you understood all these things? Likewise, on love: John 21:15: Simon, do you love me more than these? Likewise, on the capacity for suffering; below 20:22: can you drink the chalice that I shall drink? Ps 91:15: they shall be patient, that they may announce. Although it pertains to humility that a man not exalt himself, yet he is ungrateful if he does not acknowledge a benefit. Isa 63:7: I will remember the tender mercies of the Lord. Therefore they answer and say to him: yes. Here is set forth their profession attributing it to the discourse of Christ. Ps 118:130: the declaration of your words gives light and gives understanding to little ones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
