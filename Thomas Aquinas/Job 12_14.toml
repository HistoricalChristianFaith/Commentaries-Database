[[commentary]]
quote='''
For since experience proceeds from sensible things, which although prior as to our way of being, are yet simply and in their nature posterior, he therefore begins to show how men can know divine power by experience. He does this first in human affairs themselves. For we can see that some men are totally destroyed, either by death, as far as natural being, or by complete humiliation, as to life in civil society even though they still have many protectors. So when they cannot be helped by men to escape destruction, it is clear that this happens from some concealed cause both divine and excelling human power, since human power cannot resist him. This is what he says, "If he destroys, there is no one who rebuilds." In the same way we see that some are impeded in their projects, even if they are not completely destroyed, although they may have many counselors. Thus it is clear that this destruction also results from some more excellent power. So he then says, "if he closes a man in," by involving him in different kinds of difficulties, "there is no one to free him," i.e. who can set him free, for according to the Qoheleth, "No one can correct him whom God has despised." (7:14)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
