[[commentary]]
quote='''
Then he adds the prayer when he says, "Deliver." He prays first for himself. Second, against his enemies, at "Let them be put to shame." Concerning the first he does two things. First, he prays to be freed from evils. Second, to be advanced to good, at "Make your face to shine." In adversaries he considers two things. First, their affection; and this he touches when he says, "From the hand of my enemies," that is, those who hate me: Ps. 142: "Deliver me from my enemies," and so on. These are the devils: Mt. 13: "An enemy has done this," and so on. Likewise friends: Mt. 10: "A man's enemies are those of his own household." Second, their effect, because they persecute: Ps. 118: "Many are those who persecute me and afflict me," and so on. Second, he prays to be advanced to good when he says, "Make your face to shine." Concerning this he does two things. First, he asks to be advanced in good things. Second, that he may not fail in his petition, at "Let me not be confounded." The first he asks in two ways. First, according to progress in wisdom. Second, according to progress in justice, at "Save me." The light of reason is nothing other than a certain participation of the divine light: Ps. 4: "The light of your countenance, O Lord, is signed upon us," and so on. This light does not increase in us except from the same cause by which it was begun. Hence if we wish to advance in it, it must be through the illumination of the divine countenance: Ps. 42: "Send forth your light," and so on. According to progress in justice, by which one arrives at salvation, he asks when he says, "Save me," and this "because of your mercy," not because of my merits: Tit. 3: "Not by the works of justice which we have done," and so on. As to the second he says, "Let me not be confounded," that is, failing in your hope; or "let me not be confounded," that is, cheated of my hope. And this because "I have called upon you": Joel 2: "Everyone who shall call upon the name of the Lord shall be saved." "I have called upon you." The Gloss of Augustine says: you call upon God when you call God into yourself, when you invite him into the house of your heart, which must first be cleansed of all filth and deceit; otherwise you do not truly call upon him. For if you call upon God to give you profit, you are calling upon profit, not God. Therefore, O avaricious one, you call upon God freely, so that money, not God himself, may fill you. Do you not want him to come to you without gold and silver? What, then, of the things God does for you suffices, when God himself does not suffice?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
