[[commentary]]
quote='''
And because this was said parabolically, he therefore adds, he who has ears to hear, namely, of the heart within, let him hear through understanding.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
