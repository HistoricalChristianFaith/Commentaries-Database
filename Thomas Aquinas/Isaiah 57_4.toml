[[commentary]]
quote='''
First, he accuses them of blasphemy, setting out the custom of sin, inasmuch as they imitate their fathers in this: you sons of the sorceress, who tended to auguries against my commandment, the seed of the adulterer, inasmuch as they abandoned me and adhered to idols: judge your mother, judge her (Hos 2:2). He also sets out the species of sin: upon whom have you jested? As if to say: upon God, blaspheming him, above: whom have you reproached? (Isa 37:23).

Second, he accuses them of idolatry.

And first, he sets out the custom: are not you wicked children, above: woe to the sinful nation, a wicked people, ungracious children (Isa 1:4); second, he sets out the species of sin: who seek your comfort in idols.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
