[[commentary]]
quote='''
Nor has he sought the help of instruction from them. So this is the meaning of: Have I said to you: "Teach me?" in speculative matters, "and I will say no more, and if perhaps I have been ignorant: Instruct me?" in practical actions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
