[[commentary]]
quote='''
And what will happen? A threefold punishment follows. And shall separate him, not, as Jerome says, as if he would divide him with a sword, but from the company of the good; below 25:32: And he shall separate them one from another, as the shepherd separates the sheep from the goats. And this is the greatest punishment. Origen says thus: in man there are three things: soul, body, and spiritual gift. And these in good prelates will not be divided, but in bad prelates they will. The spiritual gift will be divided, because he will take away the spiritual gift that he had given them; but their body and soul will be sent into the fire. Likewise, another punishment is that he will be numbered among the wicked; hence he says, and shall appoint his portion with the hypocrites. Hypocrites are dissemblers who profess one thing and do another; hence he will appoint his portion with such as these. And so it is taken in Psalm 10:7: Brimstone and storms of winds shall be the portion of their cup. Likewise, even this is not enough, but there will be another punishment, because there shall be weeping and gnashing of teeth. Job 24:19: For they shall pass from the snow waters to excessive heat. Hence weeping is produced from smoke, and gnashing of teeth from cold. Origen says that from this we can consider that those speak badly who say that bad prelates are not prelates. Likewise, note a certain similitude that Augustine proposes. Let us remove from our eyes that servant of whom it is spoken, and let us suppose three servants who love the coming of their lord. Let one say: my lord will come soon, and therefore I will watch. Let another say: my lord will delay, but I want to watch. Let another say: I do not know when he will come, and therefore I want to watch. Which of these speaks best? Augustine answers that the first is badly deceived, because if he thinks his lord will come soon, and he afterward delays, he is in danger of falling asleep from weariness. The second can be deceived, but he is not in danger. But the third does well, who always waits in uncertainty; therefore it is wrong to determine any particular time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
