[[commentary]]
quote='''
So he says, "If you sin", against yourself or God, "what harm will you do him?" as if to say: He will suffer no detriment from this. As to the sins which are committed against one's neighbor, he then says, "and if your iniquities are multiplied", by which you unjustly wound your neighbors, "what will you do against him?" as if to say: In no way will he be injured by this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
