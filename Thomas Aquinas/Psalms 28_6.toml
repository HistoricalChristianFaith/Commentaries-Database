[[commentary]]
quote='''
"Blessed be the Lord." Here, as though heard, he gives thanks. And first for the benefits bestowed upon him; second he gives thanks for the benefits bestowed upon the whole people, at "The Lord is the strength." Concerning the first he does two things. First he gives thanks for being heard; second he shows in what he was heard, at "The Lord is my helper." He says therefore: I petitioned, and I was heard in my petition; hence, "Blessed be the Lord." For God to bless us is to cause goodness in us, because he spoke and they were made, Ps. 148. For us to bless God is to acknowledge his goodness by which he does good to us: and nothing accrues to him from this. Yet this must be done by us for all benefits. 2 Cor. 1: "Blessed be the God and Father of our Lord Jesus Christ, the Father of mercies," etc. Tob. 12: "Bless the God of heaven, because he has shown us his mercy." And therefore he says, "Because he has heard the voice of my supplication," that is, the devotion of my prayer. Jas. 5: "The prayer of the just man avails much," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
