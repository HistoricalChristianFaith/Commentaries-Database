[[commentary]]
quote='''
Since he willingly put himself in danger and does not stop advancing but always procedes further on, as a result he will sometimes feel himself impeded and so he then says, "The foot of that man will be bound in a snare," that is the forward motion of his will and his act will be blocked by some obstacle. These sorts of evil things arise from three causes for those progressing in sin. First on the part of the sinner himself in whom the desire for sins increase more the more he sins. Regarding this he continues, "and his thirst will burn against him," because sometimes the sinner considers something to be harmful to him from reason, but the burning desire for sin compels him to act against his thinking.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
