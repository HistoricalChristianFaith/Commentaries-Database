[[commentary]]
quote='''
If Satan casts out Satan, he is divided against himself. Casting out implies violent motion; therefore, it is necessary that where there is contradiction there is division: "There are always quarrels between the proud" (Pr 13:10). But someone could say that there was no casting out, because he went out voluntarily. But this has no force, because such a departure is not a casting out, but takes place by obeying someone commanding; hence this would be a voluntary departure. But that they depart involuntarily is apparent from what happened above, namely, they began to groan and shout [above 8:29]: "What have you to do with us, son of God? Have you come to torment us before the time?" Therefore, there is division.

How then will his kingdom stand? Jerome explains it thus: How will his kingdom stand? As if to say: The devil's kingdom stands in sinners until the day of judgment, because then all power will be removed. Hence if this were so, it would now be the end of the world. Rabanus, thus: How will his kingdom stand? Because if he is opposed, he is in danger; therefore, you should be wary of his kingdom. Hilary: How will it stand? As if to say: It is due to my power that I make it possible for one to expel another. Therefore, I destroy the devil's kingdom; and for this reason you should adhere to me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
