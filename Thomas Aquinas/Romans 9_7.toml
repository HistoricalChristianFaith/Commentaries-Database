[[commentary]]
quote='''
Then he clarifies his statement, at but in Isaac.
First, in regard to Abraham;
second, in regard to Jacob, at and not only she.
In regard to the first he does three things: first, he cites a text from Scripture, saying, but in Isaac will your seed be called. This the Lord said to Abraham, as it says in Genesis 21, when describing the expulsion of Ishmael.
As if to say: not all who were born from Abraham according to the flesh belong to that seed to whom the promises were made, as it says in Galatians: to Abraham were the promises made and to his seed (Gal 3:16), but those who are like Isaac.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
