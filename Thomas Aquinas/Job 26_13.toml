[[commentary]]
quote='''
Therefore, the spiritual gifts for the good angels were increased as he fell, and so he says, "his spirit has adorned the heavens," that is, he has adorned the heavenly spirits with the adornment of spiritual gifts. It was not fitting that he who had fallen by the privation of his glory should remain endowed with his gifts through the Holy Spirit, and so he says, "and by his hand he has played midwife and he drew out," from the society of the good angels, "the coiled serpent," the devil, who is compared to a serpent because of the poison of evil, and is said to be coiled because he is clever. He clearly says he has been drawn out by the hand of God assisting at the birth, as a midwife sometimes draws a child out who is dead so that the mother is not injured. So God has drawn the devil out of the midst of the angels so that the society of the good angels may not suffer detriment in anything.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
