[[commentary]]
quote='''
Ask and it will be given you. He has given his doctrine, which is complete and perfect; here he teaches how it can be fulfilled. This requires two things: prayer and close attention. First, he teaches us to ask; secondly, he gives confidence of obtaining (v. 9). He says, therefore, Ask. And in this, observe two false opinions being removed: the first is that of the proud, who think they can fulfill the precepts by their own powers. But he says that it is necessary to ask God: "For what have you that you have not received?" (1 Cor 4:7). Secondly, he removes the opinion of many who say that God has no interest in prayers and that they would not obtain, if they asked; therefore, he says, and you shall receive. He also adds, seek and you shall find. This is explained, first, so that nothing is added by these two, but only the method is expressed. For solicitous attention is required in asking; also fervent devotion. He suggests these two when he says, seek, i.e., pray. Or, seek, as those who seek something put their whole intention there. Hence to him pertains what the spouse says in Song of Songs (3:2): "I sought him whom my soul loves." And you shall find: "One thing I asked of the Lord, that will I seek after" (Ps 27:4). Also ask after the manner of one knocking, because one who knocks at a door knocks harder, if he is not heard: "Come, my beloved, let us go forth into the fields, and lodge in the villages" (S of S 7:11). Secondly, according to Augustine, it is explained by referring to things Christ says of himself (Jn 14:6): "I am the way, the truth and the life." If you wish to go by this way, seek of him to direct your ways and say with the Psalmist (25:4): "Make me to know your ways, O Lord; teach me your paths." If you wish to know the truth, seek, and you shall find. But it is not enough to know the way and to seek the truth, unless you arrive at life, i.e., to enter it, knock. Hence Exodus (15:17): "You will bring them in and plant them in the mountain of your inheritance." But, according to the same, all those things are far better referred to the most importunate petition. Likewise, it is explained another way as referring to diverse acts: ask, for praying; seek by study; knock by acting.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
