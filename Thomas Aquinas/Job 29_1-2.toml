[[commentary]]
quote='''
Since in what preceded Job had shown in the universal why it is evident that it is not against divine justice that the evil prosper and the good to whom greater spiritual things are given sometimes suffer want of temporal prosperity in this world, and he shows this now more clearly in his own case using himself as an example. He intends by this also to refute their opinion when they asserted that he was suffering adversities for sin. First he calls to mind his past prosperity which he used virtuously; then the greatness of the adversity into which he had fallen, and finally he demonstrates his innocence in many ways.

He seems to have satisfactorily answered the argument of Baldath; he proceeded to demonstrate his proposition. So after he had declared his intention since Sophar remained silent, he waited for one of the others to speak. Since everyone was silent, he resumed his speech again, and so the text says, "Job again took up his comparison," because he was about to speak using metaphor. "And said: Who grants me," a question which is posed to show a wish more than to formulate a petition, "that I might be as in the months of old," and live in prosperity as I did once? Since he did not attribute this prosperity to either fortune or his own strength, but to divine aid, he continues, "As in the days when the Lord watched over me," protecting me against adverse things and also directing me to good things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
