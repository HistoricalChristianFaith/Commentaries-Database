[[commentary]]
quote='''
Then when he says, hold the form, he exhorts him to follow his example. And there are two versions: one says, hold and the other, holding. If we accept holding, then first, he states why it is fitting for Timothy to imitate the Apostle's example; second, he urges him to imitate him, at keep the good thing committed to your trust.

But the Apostle was worthy to be imitated in regard to two things, namely, his erudition and knowledge; hence he says, of sound words: and his power; hence he says, in faith and in the love.

He says, therefore: you cannot excuse yourself, if you are not prepared to suffer even unto chains, even as I suffer; because you hold the form of sound words, namely, which do not contain the weakness of being false: speak you the things that become sound doctrine (Titus 2:1). And it is called sound doctrine and not weak, because it makes us sound. Then he adds, which you have heard of me. As if to say: you have not been deceived, because I delivered unto you what I heard from Christ: I have received of the Lord that which also I have delivered unto you (1 Cor 11:23); he that hears you, hears me (Luke 10:16). And this in faith and in love, because if a person knew all the sound words and refused to believe, he would not be strong in faith, nor would he love, because he would easily slip from true doctrine either because of adversity or prosperity: without faith it is impossible to please God (Heb 11:6); he that loves not, abides in death (1 John 3:14). And this in Christ Jesus, because the true faith is concerned with the things Christ taught, and true love is found in Christ, who gave the Holy Spirit through whom we love God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
