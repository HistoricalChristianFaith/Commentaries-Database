[[commentary]]
quote='''
Then having sent away the multitudes, he came into the house. Here one of the foregoing parables is expounded. And first the place is described; secondly, the question of the disciples; thirdly, the exposition. He says therefore then having sent away the multitudes, he came into the house. In this an example is given us, that if we wish to investigate secrets, we ought to enter into a secret place; Wis 8:16: when I go into my house, I shall find rest with her; Sir 32:15: run ahead to your house, and there withdraw, and there play, and pursue your thoughts, and not in sins and proud words, etc. And his disciples came to him saying: explain to us the parable of the weeds of the field, etc., because about this one they had greater doubt. Sometimes out of reverence they did not dare to approach, as is stated in John 4:27, that no one said to him, why are you speaking with that woman, etc. But here they took a special boldness, because they had heard to you it is given to know the mysteries of the kingdom of heaven. So if we wish to acquire anything mystical, we ought to approach him; Ps 33:6: come to him and be enlightened.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
