[[commentary]]
quote='''
Thus after he has shown the depth of the hope which he had in God, he rejects their false accusations which they sought to make against him as if he had rejected the hope and fear of God by not putting his hope in temporal things. So he then says, "Why, then, do you now say: Let us persecute him?" namely, as though I despair of God or do not fear God, "and let us find the root of the word against him," by condemning my speech as though I have denied the providence of God? I do not deny, but assert, this providence, saying that rewards and punishments are prepared by God for man also after this life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
