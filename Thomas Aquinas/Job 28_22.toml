[[commentary]]
quote='''
There are also some who seek the knowledge of the future from the dead, but not even this attains the origin of wisdom, and so he then says, "Ruin and death said: We have heard of her fame with our ears." He rightly attributes the fame of wisdom to death and ruin, because ruin and death imply the end and withdrawing from the goods which attain wisdom. Nevertheless, the three things already discussed can be metaphorically referred to the three kinds of rational creature. Thus when he says, "She is hidden from the eyes of all the living," he refers to men; when he adds, "she is concealed from the birds of heaven," he refers to the angels. When he further continues, "Ruin and death said: 'We have heard of his fame with our ears,'" he refers to the demons who are separated from God by damnation, in that they have knowledge of divine wisdom only by its reputation from afar.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
