[[commentary]]
quote='''
He proves by the righteousness of his life that he was not punished for previous sin. Here one should remark that each thing is shown right when it conforms to its own rule. There is a twofold rule of human life. The first is, of course, the natural law impressed in the minds of men by God, by which man naturally understands what is good from its likeness to divine goodness. In this we should first notice that man imitates the operation of the divine goodness according to his own ability in his affections and works as Matthew says, "Be perfect as your heavenly Father is perfect," (5:48) and Ephesians, "Be imitators of God as his dearest sons." (5:1) So he says, "My foot," the affection by which we proceed to act, "followed," by imitation, "his footprints," some similarity though small to the divine goodness in action. Second, one must take care to imitate God with his whole mind, and so he continues, "I have kept his way," because I was careful not to deviate from it. Third, man must persevere in this and remain fixed in it totally, not in part, and so he then says, "and I did not turn aside from it," i.e. I did not depart from it in any part of myself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
