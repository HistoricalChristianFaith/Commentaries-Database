[[commentary]]
quote='''
Then he mentions the amazement of the entire populace, and the whole city went out to meet Jesus; and when they saw him, they begged him to leave their neighborhood. But why? Because he had caused them a great loss. Therefore, they feared that if he stayed there longer, he would cause more. In the same way some fear to be with Christ on account of temporal loss, as Isaiah (30:11) says: "Leave the way, turn aside from the path, let us hear no more of the holy one of Israel." Or, another way: they acted not from malice but from devotion, because they regarded themselves unworthy. Peter says something similar: "Depart from me, because I am a sinful man" (Lk 5:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
