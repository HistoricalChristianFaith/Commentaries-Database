[[commentary]]
quote='''
Then when he says, for he that is dead, he clarifies what he had said:
first, in regard to the first effect;
second, in regard to the second, at now, if we be dead.

In regard to the first it should be noted that the assemblage of sins is destroyed when a man has his sins remitted. So he clarifies how the body of sin is destroyed when he says, he that is dead to sin through baptism, in which we die together with Christ, is justified from sin, i.e., transferred to the state of justice: and such were some of you. But you were washed, you were sanctified, you were justified (1 Cor 6:11).
Therefore, because man dies to sin through the cross of Christ, he is freed from sin in such a way that the body of sin is destroyed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
