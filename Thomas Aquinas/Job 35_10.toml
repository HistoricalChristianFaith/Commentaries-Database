[[commentary]]
quote='''
Then he turns himself to rejecting the other thing Job said, "what is right does not please you," which is repugnant to divine wisdom. Surely this wisdom first appears in the creation of things, and so he says, "And Job did not say," because he does not think that good things pleased God, "where is the God who made me?" For God made things only for the good, as we read in Genesis, "God saw that it was good, etc." Therefore, it is clear that good pleases God. Second, he brings in the benefit of human instruction by which some men are instructed for good by divine revelation, and so he says, "He who gave," by revelation, "his poems," the doctrines of human instruction, which were understood many times by the ancients as epics, "in the night," (literally, in the dreams of the night) or in the quiet of contemplation or obscurity of vision. He would not have instructed men familiarly for good unless good pleased him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
