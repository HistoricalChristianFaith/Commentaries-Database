[[commentary]]
quote='''
The affliction into which people fall is now evaluated. First, the people's captivity itself is reckoned: "I have been hunted like a bird." That is, as if by cunning enemies, operating with powers.

Then, enemies (the Chaldeans) are: "without cause." For, I (Jeremiah) could, in no manner, harm them, since they, in no way approach me. So, Isaiah 52:4 says: "and the Assyrian oppressed them for nothing." Elsewhere, Jeremiah declares: "and afterwards I will send for many hunters, and they shall hunt them from every mountain and every hill" (Jeremiah 16:16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
