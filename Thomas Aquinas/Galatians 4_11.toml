[[commentary]]
quote='''
By this practice they are put in grave danger. Hence he says: "I am afraid lest perhaps it was in vain," i.e., fruitlessly, "that I labored" among you. Therefore the faithful must avoid observing such things. Indeed, no suggestion of these things should be found among them, for whatever is done simply out of devotion to God can turn out prosperously.

From this arises a danger because faith in Christ profits nothing from it. Hence he says: "I am afraid of you, lest perhaps I have labored in vain among you"; and further on: "If you be circumcised, Christ shall profit you nothing" (5:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Galatians.html'
source_title='Commentary on Galatians'
