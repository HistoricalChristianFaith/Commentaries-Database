[[commentary]]
quote='''
And many false prophets shall rise and shall seduce many. Such are those who seduce many in the Church; 2 Peter 2:1: There were also false prophets among the people. Likewise, 1 John 2:18: Many antichrists have arisen. They went out from us, but they were not of us. Hence these evils will happen: brothers will corrupt, and they will seduce many.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
