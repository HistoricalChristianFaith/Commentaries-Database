[[commentary]]
quote='''
For he has said. Here he sets out the occasion of his glory from the great things which he had done, and first, as to the condition of the doer; second, as to the greatness of the deed: and I have removed; third, as to the ease of doing: and my hand has found (Isa 10:14). He shows the condition of the doer as to the power of wars: by the strength of my own hand, as to the wisdom of counselors, and by my own wisdom: but for the wrath of the enemies I have deferred it: lest perhaps their enemies might be proud, and should say: our mighty hand, and not the Lord, has done all these things (Deut 32:27).

The greatness of the deed is measured from three things: from the multitude of kingdoms; hence he says, and I have removed the bounds of the people: he speaks like someone who acquires many fields and removes the bounds by which the separate possessions were divided; as to the plundering of princes: and have taken the spoils of the princes; as to the subjugation of kings: and as a mighty man has pulled down them that sat on high, namely, on the seat of the king: whom he would, he set up: and whom he would, he brought down (Dan 5:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
