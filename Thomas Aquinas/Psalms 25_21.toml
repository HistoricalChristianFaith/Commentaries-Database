[[commentary]]
quote='''
Another reason is that your friends lean upon me. Sometimes God frees someone not because of his own merits, but lest friends of God perish together with him upon whom they lean. When he says, "The innocent and upright have clung to me," the innocent are those who turn away from evil, the upright are those who do good: Sir. 13: "Every living creature loves its like." And why? "Because I have waited for you," that is, because I have hoped in you: Ps. 26: "Let your heart take courage, and wait for the Lord." Jerome has, "simplicity and truth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
