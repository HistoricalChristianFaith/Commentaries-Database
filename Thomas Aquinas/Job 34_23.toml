[[commentary]]
quote='''
Since he had said that princes die suddenly and are dispossessed for their sins, (which seems to be an irremediable punishment), he then shows the reason for this from the fact that when God judges a man for his sins and finally condemns him, the ability is not given to a man that he can further contend the judgment with God. He expresses this saying, "No more," after God has judged and condemned him "there is the ability in man that he should come to God in judgment," as though God should retract his judgment on his account. He seems to say this especially against Job who, after he had been condemned to punishment, had said above, "I will come to his throne and I will place my case before him." (23:3)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
