[[commentary]]
quote='''
Then he continues with the effect both on the good and on the wicked. And if the house is worthy... We can say that such a house will obtain a blessing. Hence the apostles or bishops in first turning toward the people say, "Peace be to you." So it says in Numbers (6:27): "They shall invoke my name upon the people of Israel, and I shall bless them." But if it is not worthy, your peace will return to you. Why does he say this? Did he not say that they should first inquire? Therefore, he shows that in such inquiries men make mistakes: "Man looks on the outward appearance, but the Lord looks on the heart" (1 Sm 16:7). For they were not yet perfect enough to know who was worthy. Your peace will return to you. This shows that sometimes someone prays and labors for the salvation of another, and yet he does not obtain the effect. Nevertheless, he does not lose what he did, but it redounds to him. Hence it will return to you, i.e., the fruit will be referred to you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
