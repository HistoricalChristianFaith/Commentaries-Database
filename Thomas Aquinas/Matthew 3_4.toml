[[commentary]]
quote='''
Then he shows how John bore witness to Christ by his life: "Now John wore..." But who bore witness concerning John, who bore witness to Christ? The answer is that his own life did, because, as Chrysostom says, no one is a worthy witness of another, unless he is his own witness; and this by a good life: "A man's attire and open-mouthed laughter and a man's manner of walking show what he is" (Sir 19:30). Hence, his austere life is described here: he wore a garment of camel's hair. Though others wore wool, John wore camel's hair, for he considered a woolen garment softness, which does not suit a preacher. And a leather girdle. This is explained in two ways: Jerome says that in those days the Jews had a girdle of wool, but John regarding that as softness, chose camel's hair in imitation of Elijah (2 Kg 1:8). Rabanus explains it another way and says that John chose untreated skins rather than ones prepared, in order to bridle bad desires: and this is "and a leather girdle." But whichever way it is explained, in both ways an austere life is meant. His food was locusts and wild honey. This food was not prepared but was eaten as nature provided; and locusts are animals suitable for eating. And wild honey. This can be understood in two ways: for, properly speaking, wild honey is not something formed in a hive but in the forest in certain trees. Some say that it is a reed of honey, i.e., something very sweet found inside it; yet in all this nothing less is implied than that he was satisfied with simple things: "If we have food and clothing, with these we shall be content" (1 Tim 6:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
