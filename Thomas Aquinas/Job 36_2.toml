[[commentary]]
quote='''
First, he gets his attention saying, "Bear with me a little while," because he intends to dispute briefly against the two ideas in one answer, and so he says, "and I will show you," the truth of the thing about which we are treating. He does not want to seem redundant because he seems to have shown already what he wanted [cc. 34 and 35], so he then says, "for I have something to say on behalf of God," as if to say: I still have other arguments at hand with which I can defend the justice of divine judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
