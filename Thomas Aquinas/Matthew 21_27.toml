[[commentary]]
quote='''
"And answering they said: we know not." They lie. Ps 26:12: "Iniquity hath lied to itself." Then Christ's response is presented: "neither do I tell you." In this is contained an example, that from him who will not say what he knows, the Lord hides other things; hence Wis 7:13: "Without guile I learned, and without envy do I communicate."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
