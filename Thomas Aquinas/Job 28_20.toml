[[commentary]]
quote='''
Therefore, since he had said that wisdom is so incomparable and has a hidden origin, he inquires where the source of wisdom lies, saying, "Where, then, is the origin of wisdom?" where does it come from? "And where is the place of understanding," from what source do men participate in the light of understanding?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
