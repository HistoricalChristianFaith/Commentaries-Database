[[commentary]]
quote='''
And then shall many be scandalized. Here he sets forth the dangers from those within. For there is a threefold scandal that you will suffer: namely, that of the weak, mutual injury, and debility. Hence he says, then shall many be scandalized; because even the very perfect will be scandalized; hence above, 18:7: It must needs be that scandals come. Hence even the elect are troubled when they see scandals; hence Paul was saying, 2 Corinthians 11:29: Who is scandalized, and I am not on fire? And they shall betray one another. From this the tribulation is evident. Above, 10:21: And the brother shall deliver up the brother to death, etc. And not only bodily, but also spiritually, because some are the source of error; and from this it will follow that they shall hate one another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
