[[commentary]]
quote='''
Then when he says "for we have heard," he says why this precept is necessary, for the Apostle says this not so much on the basis of a duty to teach as because of the people's fault. And so first, he sets out the sin that makes the precept necessary; second, he applies a remedy, at "now we charge."

He says, therefore, "for we have heard," as though to say: the reason I do not hide this precept is that "we have heard there are some among you who walk disorderly, working not at all." For a man's soul must always be occupied with something, and so necessarily the idle suffer from an unrest regarding unlawful things. "Endeavor to be quiet" (1 Thess 4:11). And he adds "but curiously meddling," namely in the affairs of others. "Desires kill the lazy" (Prov 21:25).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
