[[commentary]]
quote='''
He shows why he does not believe he is heard when he says, "For in the storm, he will wear me away." As is his custom, he now explains what he has said metaphorically saying, "and even multiply wounds without cause." To wear away is to multiply wounds, i.e. trials. This wearing away is in "The storm," in terrifying darkness, which he has said is "without cause," namely, which is not clear and understood by the man who is afflicted. For if an afflicted man should understand the reason why God afflicts him and that the afflictions are useful to his salvation, clearly he would believe that his prayer had been heard. But because he does not understand this, he does not believe that his prayer has been heard.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
