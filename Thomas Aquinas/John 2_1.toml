[[commentary]]
quote='''
Above, the Evangelist showed the dignity of the incarnate Word and gave various evidence for it. Now he begins to relate the effects and actions by which the divinity of the incarnate Word was made known to the world. First, he tells the things Christ did, while living in the world, that show his divinity. Secondly, he tells how Christ showed his divinity while dying; and this from chapter twelve on.

As to the first he does two things. First, he shows the divinity of Christ in relation to the power he had over nature. Secondly, in relation to the effects of grace; and this from chapter three on. Christ's power over nature is pointed out to us by the fact that he changed a nature. And this change was accomplished by Christ as a sign: first, to his disciples, to strengthen them; secondly, to the people, to lead them to believe (2:12). This transformation of a nature, in order to strengthen the disciples, was accomplished at a marriage, when he turned water into wine. First, the marriage is described. Secondly, those present. Thirdly, the miracle performed by Christ.

In describing the marriage, the time is first mentioned. Hence he says, On the third day there was a wedding, i.e., after the calling of the disciples mentioned earlier. For, after being made known by the testimony of John, Christ also wanted to make himself known. Secondly, the place is mentioned; hence he says, at Cana in Galilee. Galilee is a province, and Cana a small village located in that province.

As far as the literal meaning is concerned, we should note that there are two opinions about the time of Christ's preaching. Some say that there were two and a half years from Christ's baptism until his death. According to them, the events at this wedding took place in the same year that Christ was baptized. However, both the teaching and practice of the Church are opposed to this. For three miracles are commemorated on the feast of the Epiphany: the adoration of the Magi, which took place in the first year of the Lord's birth; secondly, the baptism of Christ, which implies that he was baptized on the same day thirty years later; thirdly, this marriage, which took place on the same day one year later. It follows from this that at least one year elapsed between his baptism and this marriage. In that year the only things recorded to have been done by the Lord are found in the sixth chapter of Matthew: the fasting in the desert, and the temptation by the devil; and what John tells us in this Gospel of the testimony by the Baptist and the conversion of the disciples. After this wedding, Christ began to preach publicly and to perform miracles up to the time of his passion, so that he preached publicly for two and one half years.

In the mystical sense, marriage signifies the union of Christ with his Church, because as the Apostle says: "This is a great mystery: I am speaking of Christ and his Church" (Eph 5:32). And this marriage was begun in the womb of the Virgin, when God the Father united a human nature to his Son in a unity of person. So, the chamber of this union was the womb of the Virgin: "He established a chamber for the sun" (Ps 18:6). Of this marriage it is said: "The kingdom of heaven is like a king who married his son" (Mt 22:2), that is, when God the Father joined a human nature to his Word in the womb of the Virgin. It was made public when the Church was joined to him by faith: "I will bind you to myself in faith" (Hos 2:20). We read of this marriage: "Blessed are they who are called to the marriage supper of the Lamb" (Rv 19:9). It will be consummated when the bride, i.e., the Church, is led into the resting place of the groom, i.e., into the glory of heaven.

The fact that this marriage took place on the third day is not without its own mystery. For the first day is the time of the law of nature; the second day is the time of the written law, but the third day is the time of grace, when the incarnate Lord celebrated the marriage: "He will revive us after two days: on the third day he will raise us up" (Hos 6:3).

The place too is appropriate. For "Cana" means "zeal" and "Galilee" means "passage." So this marriage was celebrated in the zeal of a passage, to suggest that those persons are most worthy of union with Christ who, burning with the zeal of a conscientious devotion, pass over from the state of guilt to the grace of the Church. "Pass over to me, all who desire me" (Sir 24:26). And they pass from death to life, i.e., from the state of mortality and misery to the state of immortality and glory: "I make all things new" (Rv 21:5).

Then the persons invited are described. Mention is made of three: the mother of Jesus, Jesus himself, and the disciples.

The mother of Jesus is mentioned when he says, the mother of Jesus was there. She is mentioned first to indicate that Jesus was still unknown and not invited to the wedding as a famous person, but merely as one acquaintance among others; for as they invited the mother, so also her son. Or, perhaps his mother is invited first because they were uncertain whether Jesus would come to a wedding if invited, because of the unusual piety they noticed in him and because they had not seen him at other social gatherings. So I think that they first asked his mother whether Jesus should be invited. That is why the Evangelist expressly said first that his mother was at the wedding, and that later Jesus was invited.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
