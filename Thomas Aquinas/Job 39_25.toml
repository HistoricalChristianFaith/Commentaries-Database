[[commentary]]
quote='''
Rather, he is said to rejoice at the sound of the military trumpet, and so he says, "When he hears the trumpet, he exclaims: Hooray!" i.e., he shouts in exultation, for "Hooray" is an exclamation of exultation. Since all these things mentioned express the courage of the horse, he now adds something about his perspicacity saying, "He smells the battle from afar," that is, while the enemy is still far off he senses by smell that battle is imminent. He almost seems to sense the preparation of battle, when the generals stir up the troops with their exhortations, and as to this he says, "the exhortations of the leaders," he perceives, "and the shouting," the confused shouting and uproar, "of the army," preparing itself for battle.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
