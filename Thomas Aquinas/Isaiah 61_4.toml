[[commentary]]
quote='''
And the restoration of buildings, and they shall build, these same men, or the apostles, above: and the places that have been desolate for ages shall be built in you (Isa 58:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
