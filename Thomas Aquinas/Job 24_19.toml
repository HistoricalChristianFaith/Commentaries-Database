[[commentary]]
quote='''
And to express this he then says, "let him pass over to great heat from freezing waters," as though changing from one vice to a contrary vice because he does not remain in the mean of virtue. All wicked men suffer this punishment because, "the inordinate soul is a punishment unto itself," as Augustine says in the Confessions.

He places next the punishment which will come after death when he then says, "and his sin to hell," by which he means: His portion is not only cursed on earth when he uses the things of the world inordinately, but he will also suffer the punishments for this in hell. One can also refer these punishments to the text, "he passes to great heat from freezing waters," because in hell there is no moderate temperature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
