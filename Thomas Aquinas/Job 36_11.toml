[[commentary]]
quote='''
He shows the fruit of this penance when he says, "If they listen," taking it to heart, "and they observe it," completing it with works, they will be brought back to their former state and so "they will complete their days in the good," of virtue and earthly prosperity, "and their years in the glory" of the earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
