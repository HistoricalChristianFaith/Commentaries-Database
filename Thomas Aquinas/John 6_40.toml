[[commentary]]
quote='''
Now he gives the reason for the divine will (v 40). The reason why the Father wills that I lose nothing of all that he has given me is that the Father wills to bring men to life spiritually, because he is the fountain of life. And since the Father is eternal, he wills, absolutely speaking, that every one who comes to me should have eternal life. And this is what he says: For this is the will of my Father, who sent me, that every one who sees the Son and believes in him, should have eternal life. Note that he said above: "Whoever hears my voice and believes in him who sent me, possesses eternal life" (above 5:24), while here he says: every one who sees the Son and believes in him. We can understand from this that the Father and the Son have the same divine nature; and it is the vision of this, through its essence, that is our ultimate end and the object of our faith. When he says here, sees the Son, he is referring to the physical sight of Christ which leads to faith, and not to this vision through essence which faith precedes. Thus he expressly says, every one who sees the Son and believes in him: "Whoever believes in him... will not encounter judgment, but has passed from death to life" (above 5:24); "These things are written that you may believe that Jesus Christ is the Son of God, and that believing you may have life in his name" (below 20:31).

This will of the Father will also be accomplished. So he adds: And I will raise him up on the last day, for he wills that we have eternal life not just in our soul alone, but also in our body, as Christ did at his resurrection: "Many of those who sleep in the dust of the earth will awake: some to an everlasting life, and others to everlasting shame" (Dn 12:2); "Christ, having risen from the dead, will not die again" (Rom 6:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
