[[commentary]]
quote='''
Then when he says "but you, brethren," he applies two remedies on the side of the others who are not sinning. First, that they should not cease doing good; second, that they correct them, at "and if any man."

He says, therefore, "but you, brethren, do not be weary in doing good," as though to say: do not grow weary in doing good, even though the idle are abusing it. "Doing good, we do not grow weary" (Gal 6:9). And this is necessary even if they are already working with their hands and do not lack anything, because it is necessary to bring aid to others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
