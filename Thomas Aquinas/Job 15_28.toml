[[commentary]]
quote='''
After Eliphaz shows the anxieties of fear which the wicked man suffers even when he is in the state of prosperity, he now speaks about the bitter things by which he is consumed when he has been cast down in adversity to answer Job's statement, "Do you write bitter things against me and punish me for the sins of my youth?" (13:26) He places becoming a fugitive as the first of these bitter things. Fugitives normally seek out hidden and uninhabited places and so he says, "He will live in desolate cities and in deserted houses which have been turned into mounds of earth." These are the kind of places where fugitives usually take refuge.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
