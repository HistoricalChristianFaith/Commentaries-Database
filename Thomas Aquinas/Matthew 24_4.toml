[[commentary]]
quote='''
In regard to the first, two things. First, he foretells those things which are antecedent to the destruction; secondly, the destruction itself, at when therefore you shall see the abomination of desolation, etc. These preliminaries were both on the part of outsiders and of those who were contained within the Church. First, therefore, on the part of outsiders; secondly, on the part of those within the Church, at and many false prophets shall rise and shall seduce many. In regard to the first, two things. First, he presents spiritual dangers; secondly, bodily dangers, at for you shall hear of wars and rumors of wars. He says, therefore: so you ask about the consummation, yet first you should be concerned for yourselves, that you not be deceived; therefore he says, take heed that no man seduce you. Ephesians 5:15: See therefore, brethren, how you walk cautiously.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
