[[commentary]]
quote='''
Then when he says, for there shall arise false Christs and false prophets, he assigns the reason for the warning. And first he sets forth the reason from necessity; secondly, from the falsity of their teaching, at for as lightning comes out of the east etc. Regarding the first he does three things. First, he introduces the deceivers; secondly, the vehemence of the deception; thirdly, the warning. He says therefore: you say that some will claim to be Christ; but will there be others? Yes, for there shall arise false Christs, i.e., those who will say they are christs, and this happened before the destruction of Jerusalem; 1 John 2:18: But you have heard that Antichrist comes, and many antichrists have arisen. And false prophets. For just as Christ had true prophets, who foretold him, so the Antichrist will have false ones; and this is what is said in 1 John 4:1: Many false prophets have gone out into the world. But will they perform miracles and wonders? Hence, they shall show great signs and wonders; 2 Thessalonians 2:9: Whose coming is according to the working of Satan; Apocalypse 16:13: And I saw from the mouth of the dragon, and from the mouth of the beast, and from the mouth of the false prophet, three unclean spirits go forth like frogs. But here there is a question: can demons work miracles? It must be said that they cannot, if miracle is taken in the proper sense, because a miracle properly speaking is not something done outside the order of some particular cause, but something done outside the order of all creation, and this is done by the power of God alone. But it is indeed possible that a higher creature is not contained within the order of a lower creature; hence something is done by the power of higher beings that is not done by the power of the elements. So among men, someone produces by art something that seems marvelous to others. So it is with demons, because they are of a more subtle intelligence; therefore, just as certain artisans do things that seem marvelous to others, so also demons do certain things naturally that seem marvelous to us. But how will this happen? It was the opinion of Avicenna that corporeal nature obeys the mere will of an intelligence, so that a body is changed at the apprehension of an intelligence. But Augustine sets this aside, because corporeal nature does not obey the mere will of any creature, but of God alone. Therefore it must be said that in natural things there are powers determined to produce certain things, such as frogs and the like; demons know these powers better than anyone else. And Augustine proves this, because the fire that descended upon the sheep of Job was natural. For a demon can excite and gather bodies so as to produce such miracles. But those miracles that do not proceed from the power of any natural thing, these they cannot do, namely, to raise the dead. Hence they do not perform such things except in illusions, as Simon Magus made a head move. Hence those things that are not done by the power of nature, they cannot do; thus they shall show great signs, i.e., signs that men consider great. But what will be the effect? So as to deceive, if possible, even the elect. And Origen says that this statement is made by way of exaggeration, because any man in this life, considered in himself, can be deceived; yet, considered in relation to God's election, that the elect should be deceived is impossible. Therefore, speaking in an aggravated way, he says that so great will be the force that unless they were preserved by divine predestination, they would be deceived. Or it can be said that they are not truly elect, but elect according to appearance; 1 Timothy 1:19: Which some rejecting have made shipwreck concerning the faith; Isaiah 19:14: The Lord has mingled a spirit of giddiness in the midst thereof, and they have caused Egypt to err.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
