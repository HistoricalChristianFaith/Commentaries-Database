[[commentary]]
quote='''
He shows their great number saying, "My clothing is consumed by their great numbers," as if to say: The multitude of the worms is so great that they not only eat my flesh, but also gnaw his clothing. To show that they are diffused not just in one part of the body, but almost in his whole body, even to his head, he then says, "and they encircle me like a cowl on my tunic," as if to say: Because of their great number, they cannot be contained under the cover of the band and garment, but break out into the open and go around his neck.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
