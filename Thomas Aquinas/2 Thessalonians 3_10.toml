[[commentary]]
quote='''
Above, the Apostle shows what he taught them by his own example, namely that they should not be troublesome but should work. Here he shows how he handed this on to them by words and deeds when he was with them. Hence he says "when we were with you," as though to say: In order to give you a pattern to follow, we did what we taught, since "this we declared to you: that if any man will not work, neither let him eat." As the Gloss says, and as Augustine says in his book De Operibus Monachorum, some twisted these words to say that servants of God are not permitted to work with their hands, on account of what is said in Matthew: "be not anxious" (Matt 6:34). For they said that this work belongs to an anxious way of life. And because of this, they interpreted this passage as referring to spiritual works, as though to say: if anyone is not willing to perform meritorious and spiritual works, he is not worthy to eat.

But this is contrary to the Apostle's intention, who says "we declared" that we acted this way, namely with labor and weariness.

But what does he mean when he says "if any man will not work, neither let him eat"? Is this a counsel or a precept? And it seems to be a precept, because it says below, "and if any man does not obey our word by this epistle, note that man and do not keep company with him." Therefore all are bound to work with their hands. Therefore whoever does not work with his hands, but stands about idle, sins mortally.

I respond. One should say that it is a precept, but something can be laid down as a precept in two ways: either simply, or given a certain condition. Whatever is necessary for salvation is laid down as a precept simply; and these are works of the virtues. But something can be laid down as a precept under a certain condition when, for example, the situation is such that without manual labor a precept cannot be kept. Now it is a precept for man that he sustain his own body, for otherwise he commits homicide against himself. "Eat of every tree of paradise" (Gen 2:16). Therefore a man is bound by precept to nourish his body, and we are similarly bound to everything without which the body cannot live. So anyone who does not have some other means of lawfully sustaining his body, whether it be possessions, or a lawful business, is bound to work, lest he turn to thievery. "Whoever was a thief, let him steal no more, but rather labor by working with his own hands" (Eph 4:28). It is therefore a precept when a man cannot otherwise lawfully live. Hence he says "if any man will not work, neither let him eat." Therefore one of two things is necessary for a man to be able to eat, namely that he either have possessions or that he lawfully obtain them. "You shall eat the works of your hands" (Ps 127:2). "Work with your hands, as we commanded you" (1 Thess 4:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
