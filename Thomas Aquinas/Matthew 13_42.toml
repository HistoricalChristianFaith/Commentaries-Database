[[commentary]]
quote='''
and shall cast them into the furnace of fire. The punishment of loss is the deprivation of the divine vision. But the punishment of sense is touched upon when it says and shall cast them into the furnace of fire; Apoc 21:27: there shall not enter into it anything defiled. And he shall cast them, i.e., the Son of man by his judicial power, into the furnace of fire; hence it will be said: depart, you cursed, into everlasting fire. There shall be weeping and gnashing of teeth. This has been explained above; yet from this it can be gathered that the damned will be punished both in soul and in body; hence above 10:28: fear him who can destroy both soul and body in hell. For weeping pertains to the eyes, gnashing to the teeth; but eyes and teeth are bodily members, in which the truth of the resurrection is signified. Likewise by weeping, which is quickly caused by smoke, the punishment of fire is signified; by gnashing of teeth, cold. Job 24:19: let him pass from the snow waters to excessive heat. Or otherwise, weeping comes from sorrow, gnashing from anger, hence Acts 7:54 says that they gnashed their teeth at him. Isa 65:14: my servants shall rejoice for the joy of their heart, and you shall cry out for sorrow of heart, and shall howl for grief of spirit. Luke 6:25: woe to you who laugh, for you shall weep. Likewise in the gnashing is signified impatience and strife; Apoc 16:10: they gnawed their tongues for inability to endure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
