[[commentary]]
quote='''
The assault on this house follows: And the rain came. Rain is taken as doctrine, so that there is good rain and bad rain. Therefore, what collapses is bad doctrine: "The Lord rained sulphur and fire on Sodom" (Gen 19:24). Likewise, floods are good and not good: "The floods divided their land" (Is 18:2); and by this the wise, who regard themselves as wise, are signified. Those floods are produced by rains. By winds are signified the devils; hence in Jude (v. 12): "Waterless clouds, carried along by winds." They beat on that house, i.e., the Church, and it did not fall: "Its cords will never be broken" (Is 33:21). And why? Because it had been founded upon the rock, i.e., Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
