[[commentary]]
quote='''
And he that had received the five talents came and brought other five, etc. Here three servants are treated. And first the first; secondly, the second; thirdly, the third. Regarding the first he does two things. First, the account rendered is presented; secondly, the due reward, at his lord said to him, etc. On the part of this servant, first his confidence, faithfulness, humility, and diligence or solicitude are presented. His confidence is touched on, because he did not wait for the lord to summon him but presented himself; hence he says coming. Paul had this confidence through the blood of Christ; Hebrews 10:19: having confidence in the entering into the holies by the blood of Christ; 2 Corinthians 3:12: having such hope, we use much confidence. Likewise his faithfulness is noted, because he also brought other five. He would indeed be unfaithful who would attribute to himself something of his lord's goods: hence this one offered everything to the lord. If therefore you have done some good, if you have converted someone, and you attribute it to yourself and not to God, you are not faithful; 1 Chronicles 29:14: all things are yours, and the things that we have received of your hand, we have given to you. Likewise his humility in confessing the gift is noted, because he acknowledged that he had received it from him; 1 Corinthians 4:7: what have you that you have not received? Hence this one confesses the gift, saying: Lord, you delivered to me five talents, etc. Likewise his diligence or solicitude is touched on: behold I have gained other five over and above. Hence he rightly said with the Apostle: his grace in me has not been void.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
