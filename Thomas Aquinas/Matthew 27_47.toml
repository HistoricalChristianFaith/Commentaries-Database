[[commentary]]
quote='''
Then the effect follows: "and some that stood there etc." And first, the common effect in all is set forth; second, in one of them, at "and immediately one of them running etc." He says therefore "and some of them that stood there and heard, said: this man calleth Elias." Who were these? Jerome believes that they were soldiers who did not know the Hebrew tongue, and because of this they believed that he was calling Elias, because Elias was very famous, since he had been taken up into heaven, as is found in 4 Kings 2:11. Or it can be said that they were Jews, and by this they wished to show that Christ is a man and not God, who seeks the help of another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
