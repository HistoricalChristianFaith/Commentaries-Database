[[commentary]]
quote='''
And not only will that happen, but after their destruction the gentiles will hope in his name. Hence Genesis (49:10): "He will be the expected of the nations." Or another way: Thus he curbs his will, but when the enemy, death, is destroyed, all the gentiles will cling to him; and this will be on the day of judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
