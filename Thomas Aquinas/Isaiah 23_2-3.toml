[[commentary]]
quote='''
Second, he sets out their stupor: be silent, adding three things in which they gloried, namely, in the fortification of their position: you that dwell in the island; in the abundance of their merchandise: trade, that is, in which they trade; have filled you, with riches; in abundance of grain: the seed of the river Nile, that is, her harvest, and revenue, namely of Tyre, for much wheat came to them from Egypt, and therefore she is become the mart of the nations: say to Tyre that dwells at the entry of the sea, being the mart of the people for many islands (Ezek 27:3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
