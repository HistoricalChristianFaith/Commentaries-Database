[[commentary]]
quote='''
After the Lord answered the disciples' question about the destruction of the city, here he begins to answer those things that pertain to the second coming. Now this coming is the coming for judgment; therefore it is divided, because first he sets forth the signs and manner of his coming; secondly, he treats of the judgment, below at 25:1, the kingdom of heaven shall be like ten virgins. Regarding the first he does two things. First, he sets forth the signs preceding the coming of Christ; secondly, he treats of the coming itself, at and they shall see the Son of man etc. Regarding the first there are two parts, because two things will precede: first, on the part of men and the elect; secondly, on the part of the elements, at and immediately after the tribulation of those days the sun shall be darkened etc. Regarding the first he does two things. First, he sets forth a certain warning; secondly, the reason for this warning, at for there shall arise false Christs and false prophets. He says therefore, then if any man shall say to you: lo, here is Christ etc. It should be noted that the word then does not indicate a determinate time, but a vague time, because this did not happen immediately after the destruction of Jerusalem, but is expected to happen in the end. Something similar is found above in chapter 2, where it says that the Lord dwelt in Nazareth, whence he is called a Nazarene, and there follows: then came John the Baptist preaching in the desert of Judea; not that he came at that time, because there were perhaps twenty years between the two events; hence it is taken as a vague time. So also here. For it will happen that many deceivers will come, and will say that the Antichrist is God. Then if any man shall say to you: lo, here is Christ, or there, do not believe him. 2 Thessalonians 2:2: Be not terrified, neither by spirit, nor by word, nor by epistle, as sent from us, as if the day of the Lord were at hand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
