[[commentary]]
quote='''
And the disciples came etc. Above, the parable was set down; here its reason is assigned: and regarding this, two things are set down here. First, the question of the disciples is set down; secondly, the response, at who answering etc. He says therefore, the disciples came and said to him. A literal question arises: since he was in the boat, how then did they approach him? It should be known that they were in the boat with Christ; but they approached through the earnestness of their mind, or also bodily, because since they were only a short distance from him, they came nearer; or since they were outside, they came to him. So we, if we wish to approach him, will be enlightened; Psalm 33:6: come to him and be enlightened. And two things are noted. First, an example is given of not questioning importunately; hence while he was teaching the crowds, they did not question him; Ecclesiastes 3:7: a time to keep silence and a time to speak. Why do you speak to them in parables?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
