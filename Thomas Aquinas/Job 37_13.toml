[[commentary]]
quote='''
Since he had above said, "wherever the will of the governor leads them," (v.12) he explains this saying, "on one tribe," because clouds sometimes appear in one region and not in another, as Amos says, "I have rained on one city and do not on another." (4:7) This happens in two ways, because sometimes clouds appear in the same region where the vapors are generated. This happens when from the power of the wind the vapors are not moved to remote places. As to this he says, "or in their own land," i.e., the land of the clouds where they were formed. Sometimes they are moved to another region, and as to this he says, "or in whatever place of his mercy he orders them to be found." For God provides clouds and rain to a region at the right time, and especially to hot climes when rain is rare from his great mercy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
