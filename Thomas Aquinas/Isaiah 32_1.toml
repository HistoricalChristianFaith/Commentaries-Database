[[commentary]]
quote='''
This is the third part of the threatening, in which he describes their liberation from the enemies who were threatening them then. And first, he foretells the liberation in the manner of prophecy, second, he recounts it in the manner of history: and it came to pass (ch. 36). The first of these is divided into two parts: in the first, he foretells the prosperity of the Jews; in the second, the destruction of their enemies: woe to you that spoils (ch. 33).

Concerning the first, he does two things. First, he foretells the status of the liberated, as to the equity of the king: a king shall reign, namely, Ezechias: a king shall reign, and shall be wise (Jer 23:5); as to the prosperity of the people: and princes shall rule in judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
