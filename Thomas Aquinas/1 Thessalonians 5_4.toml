[[commentary]]
quote='''
Then Paul says, but you are not in darkness, brethren, and explains what he had mentioned in regard to the good people; and he does this by making two points: first, he excludes the good people from the company of the evil people and secondly, he provides a reason for this (5:5). And so he remarks, you are not in darkness, for you have been enlightened by Christ concerning that day; this is not an unexpected event for you. "He who follows me will not walk in darkness, but will have the light of life" (Jn. 8:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
