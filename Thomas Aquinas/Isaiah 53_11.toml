[[commentary]]
quote='''
And the reward for the labor of his teaching: because his soul has labored, in preaching and discoursing, he shall see, the gentiles converted to him, and be filled, as though having what he intended: I have meat to eat which you know not (John 4:32).

Second, he sets out his merit as to the exercise of preaching: by his knowledge, that is, his teaching: justified freely by faith (Rom 5:1); Lord, to whom shall we go? You have the words of eternal life (John 6:69); and as to the torment of death: he shall bear their iniquities, that is, the punishments for their iniquities, above: I have made you, and I will bear (Isa 46:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
