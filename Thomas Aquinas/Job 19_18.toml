[[commentary]]
quote='''
So, after he said he was despised by those inside and outside his household, he shows next that he has been despised both by the foolish and the wise. But foolish men characteristically despise those whom they see in misery, because they think only earthly goods should be honored, and so he says, "Even the foolish despised me," in their heart, when I was present, "and when I left them, they disparaged me," verbalizing things they were ashamed to say in my presence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
