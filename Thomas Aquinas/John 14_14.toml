[[commentary]]
quote='''
Then when he says, that the Father may be glorified in the Son, he gives the reason. Augustine punctuates this passage in the following way. "Whatever you ask the Father in my name, I will do it." Then a new sentence begins: "That the Father may be glorified in the Son, if you ask me anything in my name, I will do it." This is like saying: I will do what you ask in my name so that the Father may be glorified in the Son, and everything that the Son does is directed to the glory of the Father: "I do not seek my own glory" (8:50). We also should direct all our works to the glory of God: "Do all to the glory of God" (1 Cor 10:31).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F14.htm'
source_title='Commentary on John'
