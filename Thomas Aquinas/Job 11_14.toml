[[commentary]]
quote='''
For prayer is useful when man first puts evil aside and then asks God to stop punishing him. He speaks to this theme saying, "If you will take away the evil from yourself which is on your hands," namely, so that you desist from the evil work which you still have on your hands, "and if you will not remain in your tent," i.e. if you make restitution of what you have unjustly taken away and stored away. Or you correct the members of your household for whose delinquencies the masters are sometimes punished because of their negligence in correcting them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
