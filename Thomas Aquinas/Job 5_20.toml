[[commentary]]
quote='''
Since he had mentioned seven tribulations, he now enumerates them. Note that sometimes adversity is the result of a particular danger for an individual person, which is sometimes even against his corporeal life which is sometimes taken away by withdrawing the necessities of life. To describe this he says, "In famine, he will redeem you from death," as if to say: You will suffer famine in being reproved by God, but God will free you and you will not die from this. This is the first trial. Sometimes life is lost by the violence of someone actively inflicting harm. To describe this he says, "and in war from the stroke," i.e. the power, "of the sword," as it say: For war will come upon you but you will not be delivered into the power of the sword. This is the second trial.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
