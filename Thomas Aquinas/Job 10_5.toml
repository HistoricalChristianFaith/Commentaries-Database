[[commentary]]
quote='''
The third defect of human knowledge is the result of the nature of time, both because his knowledge increases from day to day and also because he forgets those things which he knows through a long period of time, so it is necessary for him to learn by repetition as it were. He then shows this is not the case with God saying, "Are your days like the days of a man?" in that your knowledge increases from day to day. "And are your years like man's time," in that some of your knowledge decreases in the course of time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
