[[commentary]]
quote='''
Then when he says For this reason, he makes his plea. And first he states the confidence with which he asks; second, the petition itself, I plead with you...; third, his reason, Perhaps, indeed... He says, For this reason, that is, because you so abound in charity, I have great trust in Christ Jesus, as if to say, not from me, but from the authority of Jesus Christ, in which faith I gave birth to you. Therefore, I could command you as a father both concerning your own and common matters. Otherwise a prelate would not have had the power to command what was for his usefulness, or the Church's, or of the good morals of the Christian religion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Philemon.html'
source_title='Commentary on Philemon'
