[[commentary]]
quote='''
"God." Here he shows how he has fitness for conquering from God, for God sometimes gives someone the power to act well; nor does it suffice unless God protects him outwardly. First, therefore, he shows how God gave power inwardly. Second, how he helps outwardly, at "you have given me the shield of salvation." Three things are necessary for someone to conquer: namely that he be strong: Prov. 31: "Strength and beauty are her clothing." Lk. 11: "When a strong man armed guards his court." That he be agile, and that he be trained in battle; and he says he has these three things. The second, at "who makes my feet perfect." The third, at "who teaches my hands." Regarding the first he does two things. First he confesses that strength was given him by God. Second, the proper use of strength. He says therefore, "God who has girded me with strength for battle," etc. The aforesaid soldiers are girded with arms and a sword so that they may be ready and prepared for combat: 1 Mac. 3: "Judas Maccabeus put on his breastplate like a giant and girded on his military weapons in battle." This is the strength, namely the power that was given me by God, not only in bodily wars but also in spiritual ones, which I would not win without God's power. And therefore he says, "he girded me with strength": Eph. 6: "Be strengthened in the Lord and in the might of his power." Is. 40: "He gives strength to the weary, and to those who are not, he multiplies fortitude and vigor." Or "he girded me" in the manner of a runner, lest he be impeded by the flowing of his garments. Thus the power of God holds back the affection lest it flow toward earthly things. And therefore there follows, "and he made my way spotless": 1 Sam. 25: "Blessed be God, who kept his servant from evil." Ps. 118: "Blessed are the undefiled in the way." Or this way is the way of charity, which does not deal perversely, as was said above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
