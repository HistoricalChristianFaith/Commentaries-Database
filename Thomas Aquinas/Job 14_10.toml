[[commentary]]
quote='''
This is not found to be the case in man with the passing of the present life and so he then says, "Where, I ask you, is man when he has died, been stripped and destroyed?" Job posits there are three things which man loses by degrees. First, the soul is separated from the body, and he expresses this saying, "when he has died." Second, he loses his covering and decorations of the body, which remain for some time to someone who has died. But afterwards he is stripped of even these and so he says, "been stripped." Finally, even the very structure of his body is dissolved and expresses this saying, "and destroyed." After these things have been completed, no sensible appearance of man remains and so to those who believe in only the sensible and corporeal appearances of man he seems entirely reduced to nothing. To express the doubt of these people, Job then says, "Where, I ask you, is man?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
