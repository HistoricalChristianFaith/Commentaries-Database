[[commentary]]
quote='''
After he rejects divine injustice, he shows the manner of divine justice saying, "For he will render the work of a man to him," because he bestows good and evil on him according to his deeds. Since some of those who do good things do them better than others, and some of those who do evil deeds sin more than others, he then says, "and he will render to each one according to his ways," to those who are better, better things; to those who are worse, worse things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
