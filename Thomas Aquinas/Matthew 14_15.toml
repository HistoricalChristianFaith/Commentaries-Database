[[commentary]]
quote='''
After excluding the opinion of Herod, here he touches on the power of Christ's teaching. For its power is threefold: it refreshes, it delivers, and it heals the sick. The first power is shown because he feeds the crowds; the second, because he delivers the disciples from the perils of the sea; the third, because he heals many. The second begins at and he immediately compelled the disciples to get into the boat; the third at and when they had crossed over etc. Regarding the first, there are three points: first, the will to refresh is presented; second, the distribution of food; third, the fullness of refreshment. The second begins at but Jesus said to them etc.; the third at and they all ate etc. He says therefore and when evening had come, namely at the setting of the sun, by which the death of Christ is signified, because then he handed over his body as food; hence 1 Cor. 11:24: do this in remembrance of me. And: you shall show the death of the Lord until he come. Then he introduces the necessity arising from the place: the place is desert. Here the same question seems to arise that is found in Ps. 77:19. For how could the Lord prepare a table in the desert? Likewise, if the place had been near a village, it could have been believed that he obtained food from there, but the place was deserted. Likewise the necessity arising from the hour is presented, because he says and the hour is already past, in which they could procure food for themselves. Dismiss the crowds. From this it seems that the disciples were so intent on the sweetness of Christ's discourse that they delighted more in hearing Christ than in procuring food for themselves; hence they cared little about bodily refreshment. For it is found in Luke 21:37: and in the daytime he was teaching in the temple, but at night he stayed on the mountain. Likewise, there was another occasion, because it was already evening. Concerning this hunger, Amos 8:11 says: I will send a famine into the land, not a famine of bread, nor a thirst, but of hearing the word of the Lord. And in this is signified the devotion of the crowds, likewise their love and reverence for Christ, because they did not depart from him, although it was evening. But here there is a literal question, because in John it is stated that Jesus questioned Philip; but here it is stated that the disciples questioned Christ. Augustine resolves this. It is not inconsistent that what one omitted, another relates. Hence first they spoke to Christ; second, Jesus, lifting up his eyes, questioned the disciples.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
