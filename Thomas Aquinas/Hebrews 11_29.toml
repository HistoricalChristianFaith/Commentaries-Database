[[commentary]]
quote='''
623. – Then (v. 29) he shows what he did in the very passing: first, he shows this; secondly, he shows that this pertained to faith (v. 30b). He says, therefore, by faith they passed through the Red Sea, as by dry land. Two things were done there by faith: one was what the men did, namely, they committed themselves to cross over; and this was done only by faith. The other was on God's part, namely, that the waters acted as a wall for them. But this was by faith, for the working of miracles is attributed to faith: 'If you have faith as a grain of mustard seed, you shall say to this mountain, Remove from hence, thither, and it shall remove' (Mt. 17:19). Then he shows that this pertains to faith, because the Egyptians attempting this, i.e., willing to try it, were swallowed up, because they did not have faith: 'You stretch forth your hand, and the earth swallowed them' (Ex. 15:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
