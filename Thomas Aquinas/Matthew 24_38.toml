[[commentary]]
quote='''
Secondly, he expounds this similitude regarding the uncertainty: for as in the days before the flood they were eating and drinking etc. In these words he seems to touch upon two things: namely, despair about the future coming, and its cause. Now the cause why a man does not hope for the future coming is that he is absorbed in the cares of the flesh, since he walks according to its concupiscences; James 5:5: You have feasted upon earth and in your luxuries you have nourished your hearts. Therefore they will devote themselves to debauchery, which has two parts, namely, in reveling and drunkenness, in debauchery and wantonness, Romans 13:13. Regarding the first he says, eating and drinking: not that eating and drinking is a sin, but to place one's end therein is a sin. Regarding the second he says, marrying and giving in marriage etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
