[[commentary]]
quote='''
Then, he writes of personal matters, at when I shall send to you: first, about taking care of certain matters affecting him; second, he closes with a greeting.

He says, therefore, when I shall send to you Artemas or Tychicus. These were two of the Apostle's disciples. He sent the others because he wanted Titus to come to him. Yet he did not specify the time, but only the place; for he needed him to help with the preaching. Nevertheless, he wanted Artemas to go ahead. First, he shows what is to be done with them; second, he answers an objection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
