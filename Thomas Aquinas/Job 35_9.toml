[[commentary]]
quote='''
Oppressed men cry to God against their oppressors from this fact. Some crush them deceitfully by calumny, and he speaks about these, "They will cry out because of the great number of their calumniators," those who have been crushed so will cry to God. Some crush others by violence, and he speaks about these saying, "and they will wail because of the strong arm of the tyrants," for they will weep to God because of the violent power of tyrants. From this we are given to understand that not only does God profit when someone sins, but that sin displeases him and he punishes it, otherwise the oppressed would cry out in vain.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
