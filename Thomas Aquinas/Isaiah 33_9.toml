[[commentary]]
quote='''
As to the destruction of regions: the land has mourned, and languished, and he names especially fertile regions; above (Isa 24:4, 7) has the same thing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
