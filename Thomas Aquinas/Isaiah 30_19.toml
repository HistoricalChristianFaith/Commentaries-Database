[[commentary]]
quote='''
678. For the people. Here he describes the benefit of mercy,

and first, in their exaltation,

second, in the oppression of their enemies: behold the name (Isa 30:27).

Concerning the first, he sets out two things.

First, the removal of evils against the captivity of exile: for the people of Zion shall dwell in Jerusalem, in the time of Zorobabel; or rather, all, mystically: he shall not be moved for ever that dwells in Jerusalem (Ps 124[125]:1–2); against the anxiety of sadness: weeping, before, you shall not weep, forever, but when you will be freed, above: the Lord God shall wipe away tears from every face (Isa 25:8); against the indignation of God: he will surely have pity: he shall call upon me, and I will hear him (Ps 90[91]:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
