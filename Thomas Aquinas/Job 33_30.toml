[[commentary]]
quote='''
He assigns the usefulness of this saying, "to call their souls back from corruption," which expresses freedom from evil, "and to enlighten them with the light of the living," which expresses the attainment of good things. Each of these can be applied to corporeal or spiritual goods. When he says here "three ways," this should refer to the two second modes of God speaking. For about the first he has said that, "he will not repeat it a second time." (v.14) He introduces this to show the reason why sinners are sometimes sustained in prosperity and are not immediately damned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
