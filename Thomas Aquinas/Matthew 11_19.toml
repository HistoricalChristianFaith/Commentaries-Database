[[commentary]]
quote='''
The Son of man came eating and drinking, i.e., using food differently; but to no avail, because they do not believe. They say, Behold a glutton and a drunkard, a friend of tax collectors, against what is said in Proverbs (23:20): "Be not among winebibbers, or among gluttonous eaters of meat." Here it should be noted that one who pays attention to what men say will never do any good: "He who observes the wind will not sow, and he who regards the clouds will not reap" (Ec 11:4). But here a question arises: Why did the Lord choose a more lenient life and through John demonstrate a harsher one? The reason is that the Lord supported his actions with miracles, which John did not perform; therefore if he possessed no excellence, his testimony would not have been accepted, as we observe in the saints that one excels in one thing and another in another: thus Augustine was excellent in doctrine but Martin in miracles. Another reason is that John was a man of purity and so abstained from carnal desires; but Christ was God, and if he had taught severity, he would not have been shown to be man. Therefore he assumed a life more human. The final reason was that John was the end of the Old Testament, wherein heavy burdens were imposed; but Christ was the beginning of the New Testament, which proceeds by way of meekness.

And wisdom is justified by her deeds. This can be taken in two ways: in one way by turning it back to whatever was said about John and Christ; and then the sense is that when a man does what he ought and the other is not reformed, then the former saves his own soul and is justified in his words. Wisdom is justified (this is the Son of God, or Christ), i.e., appeared just to its children, because it manifested what it should have to the just: abstinence by John, meekness by Christ. Or it can be explained another way: the children of the devil say that he is a glutton and a wine-bibber, but the children of wisdom understand that life does not consist in food and drink but in stability of mind, which uses food according to place and time and abstains when it is fitting, so that they do not exceed by using too much or fail by using too little. Accordingly, the Apostle says in Philippians (4:12): "In any and all circumstances I have learned the secret of facing plenty and hunger, abundance and want." Therefore he would not seem to manifest complete wisdom, if he abstained entirely, because it would suppose that all justice lies in abstinence; but it does not lie in this but in stability of mind.

And note that he says, wisdom, because to use food or to abstain in accord with the moderation of wisdom is to abstain when one ought and to partake when one ought.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
