[[commentary]]
quote='''
And others fell among thorns. Now thorns are anxieties, angers, quarrels, and things of this kind; Jeremiah 4:3: do not sow upon thorns; Proverbs 24:30: I passed by the field of the slothful man; and there follows: and thorns had covered its surface. And the thorns grew up and choked them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
