[[commentary]]
quote='''
Third, (their shame) is, insofar as to derision, and insult: "Behold their sitting and their rising; I am the burden of their songs." For, they sit in council, in order to destroy me by: "their rising." And: "I am the burden of their songs." Since, they compose derisive songs against me.

All the above notions can be understood in the person of the prophet, or the people themselves. For, Job 30:9 declares: "And now I have become their song, I am a byword to them." Also, Psalm 69:12: "and the drunkards make songs about me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
