[[commentary]]
quote='''
Here arguments are proposed from divine powers by which everything is governed and provided for. First, such is applied against those persons who derogate divine providence, faithless through blasphemy. "Who has commanded and it came to pass, unless the Lord has ordained it?"

Within this context, heresy is excluded from those who contend God's providence extends itself to universal ideas, and incorporeal things, as celestial bodies. And even up to human kind, due to a conformity of human nature to God, (the Creator).

As Rabbi Maimonides asserts: "here and now, each and all particulars the Lord God does not actually acknowledge."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
