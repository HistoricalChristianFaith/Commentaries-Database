[[commentary]]
quote='''
And when Jesus was in Bethany. Here is set forth the foretelling through the deed of the woman. And first the deed is set forth; second, the reproach; third, the excuse. The second at and the disciples seeing it, had indignation; the third at and Jesus knowing it. Concerning the first, he does four things. First, the place is described; second, the person; third, the means; fourth, the deed. First, a twofold place is set forth, namely, general and specific. The general, when he says when Jesus was in Bethany; the specific, when he says in the house of Simon the leper. Note that he was not then a leper, but had been cured by Christ, for if he were, Christ would not have stayed with him, since that was prohibited in the law: and yet both pertain to a mystery. Bethany is interpreted as the house of obedience: hence by this is signified his obedience; Philippians 2:8: he became obedient unto death. Therefore it is fitting that he should be in the house of a leper; Isaiah 53:4: and we esteemed him as a leper. And for this reason he came there especially. Another reason can be literal, namely, so that she might have confidence in coming to Christ, because this man was a relative of Mary, and he had been cured by him of bodily leprosy, and she came to be cured of spiritual leprosy. And it should be noted that no one else is said to have come to Christ for spiritual health except this woman; therefore she was worthy of praise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
