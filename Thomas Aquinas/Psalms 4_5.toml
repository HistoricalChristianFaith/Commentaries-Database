[[commentary]]
quote='''
Consequently, he exhorts them to do good. And first he directs them concerning the principle of good, because "offer the sacrifice of justice"; as if to say, namely be contrite. In Lev. 4, it is commanded that they offer a sacrifice for sins. But the Lord does not care much about such things. Ps. 39: "Sacrifice and oblation you did not desire, but you have perfected ears for me"; hence you also "offer the sacrifice of justice and hope in the Lord": "many say, who shows us," etc., that is, of satisfaction and penance. Rom. 12: "Present your bodies to God, a living sacrifice, holy, pleasing to God," etc. Second, he directs them concerning the end of the good, saying: "And hope in the Lord," etc.: as if to say, be hoping in the Lord who has given you the power to do these things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
