[[commentary]]
quote='''
Above, he urged Timothy to preach Christ earnestly; here he sets himself before him as an example: first, he gives the example; second, he urges him to follow it, at hold the form; third, he states why he must follow this example, at you know this.

In regard to the first he does three things: first, he mentions his office; second, he narrates what he has suffered in performing that office, at for which cause I also suffer these things; third, the certainty of his hope, at for I know.

First, therefore, he describes his office from three viewpoints: because he declares that he is appointed a preacher to raise the moral standard: preach the word (2 Tim 4:2); preach the Gospel to every creature (Mark 16:15); second, an apostle, to govern the Church, because the apostles were prelates of the Church: he who wrought in Peter to the apostleship of the circumcision, wrought also in me among the gentiles (Gal 2:8); third, and teacher of the gentiles to teach the holy faith and the knowledge of God: a doctor of the gentiles in faith and truth (1 Tim 2:7); O children of Zion, rejoice and be joyful in the Lord, your God, because he has given you a teacher of justice (Joel 2:23).

But he says, wherein I am appointed; and he lists three things: first, that he did not take it upon himself, but was appointed to it by another: no man takes the honor to himself, but he that is called, as Aaron was (Heb 5:4); second, in the appointment his duties are outlined; third, firmness, because he was appointed according to the order of reason, he has remained firm: I have appointed you that you should go and bear fruit, and that your fruit should remain (John 15:16); the stars remaining in their order and courses fought against Sisara (Judges 5:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
