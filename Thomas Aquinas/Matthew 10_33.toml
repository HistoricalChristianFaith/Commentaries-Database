[[commentary]]
quote='''
But whoever denies me before men in word, as Peter, or in action, as those of whom it says in Titus (1:16): "Some profess with their mouth that they know God, but in their deeds they deny him." I also will deny them, when he will say, as above (7:23): "I have never known you," i.e., I have never approved you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
