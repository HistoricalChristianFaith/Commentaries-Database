[[commentary]]
quote='''
Your companies, gathered from various nations: let them arise and help you, and protect you in your distress (Deut 32:38).

But he that puts his trust in me. Here he confirms the difference between the just and the unjust.

And first, as to the just;

second, as to the unjust, but the wicked are like the raging sea (Isa 57:20).

He confirms the deliverance of the good from dangers from three things.

First, from divine gentleness, promising deliverance as to the restoration of their homeland: the promised land: but the meek shall inherit the land (Ps 36[37]:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
