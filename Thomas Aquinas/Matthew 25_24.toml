[[commentary]]
quote='''
And he also that had received the one talent came and said. Here the judgment of the wicked servant is determined. And first the account is presented; secondly, the condemnation which he received, at and his lord answering said to him. He proposed a remarkable argument. For first he proposed a blasphemy; from this he assumed negligence; thirdly, he concluded innocence. And thus his syllogism could not hold. The blasphemy, when he says Lord, I know that you are a hard man. The negligence, when he says I went and hid your talent, etc. The innocence, when he says behold here you have what is yours. And let us consider that it says he came forward. It was said above concerning the one who had received five talents that he came forward, i.e., he had confidence; but this one came forward not with confidence, but under compulsion. Or otherwise, because some in those things which they do badly, it seems to them that they have done well. Proverbs 26:16: the sluggard is wiser in his own conceit than seven men that speak sentences. Hence it seemed to him that he had done well. According to Origen, the estimation about God appears to some as about a hard man, from whom one withdraws on account of hardness. Sirach 9:18: keep far from the man that has power to kill. And therefore just as he who knows a hard man does not wish to serve him, so some think about God that he is a hard man. And according to this, this servant had three evil opinions about God. First, that God was not merciful; secondly, that something accrued to him from our goods; thirdly, that not all things were from God; and all these opinions proceeded from one evil root, because he thought that God was like a mere man. And this is signified when he says: I know that you are a hard man, i.e., I consider you to be a man; which is not true, as is had in Numbers 23:19: God is not as a man; Isaiah 55:9: as the heavens are exalted above the earth, so are my ways exalted above your ways. And he says hard, because a hard man is not bent. And concerning such a one it is said in Job 41:15: his heart shall be as hard as the anvil of a smith. But not so is the Lord, because the Lord is a merciful God and gracious, Psalm 110:4. Hardness tends to arise from avarice; Proverbs 29:4: a just king sets up the land; a covetous man shall destroy it; therefore he considers him to be hard, and so avaricious; and therefore he attributes to him the qualities of the avaricious: you reap where you have not sown, and gather where you have not scattered, i.e., you are so hard that you do not cease to seize the goods of others; which nevertheless is false; Job 35:7: moreover if you do justly, what shall you give him, or what shall he receive of your hand? And in Psalm 15:2: you have no need of my goods. Hence in this he imputed to him that he needed our goods. The third was that there would be some good that was not from God; as there are some who do not say that what they have from patrimony or from study is from God: and this is what he says, where you have not sown; against that saying in James 1:17: every best gift and every perfect gift is from above, coming down from the Father of lights. Likewise, some considering him to be hard withdraw themselves from his service. Hence some who can greatly profit say: if I were to hear confessions and preach, perhaps things would go badly for me: such consider God hard. Likewise some say: if I were to enter religious life, perhaps I would sin and be worse off; these consider God hard, who believe that if they cling to God something will fail them. Such are like those who despair of God's mercy. This servant alleged these things. And yet these things are true and have support from authority. For he is hard with sinners and kind to those who return to him; Wisdom 11:11: for you did prove them as a father admonishing them, but these you did examine as a severe king condemning them; Lamentations 3:25: the Lord is good to the soul that seeks him; 2 Chronicles 30:18: the good Lord will show mercy to all them that seek the Lord God of their fathers with their whole heart. Therefore he is hard with sinners and merciful to the good. And there is no doubt that he must be feared lest he be despised; hence Hebrews 10:31: it is a fearful thing to fall into the hands of the living God. But insofar as he is merciful, we ought to hope that if one gives himself to his service, he will not fall; and if he should fall, he will rise again. Likewise, as to what he says, you reap where you have not sown, although it is false, yet in a certain sense it can be true; because he does not require for his own sake, but for our benefit; because he reaps his own glory which he did not sow. Likewise, you gather where you have not scattered. For he who reaps receives in abundance; but he who gathers receives from many; thus the Lord wills that his glory increase from diverse men. Hence the Apostle in 2 Corinthians 1:14: we are your glory, as you also are ours, in the day of our Lord Jesus Christ. Similarly, what he says, you reap where you have not sown, has truth in a certain respect, because man sows and God gathers; John 4:37: one is he that sows, and another is he that reaps. I have sent you to reap that in which you did not labor. For man sows his works, and God reaps unto his own glory; Galatians 6:8: what things a man shall sow, those also shall he reap. And the Lord says, John 14:3: I will come and will take you to myself. For if you give alms, you sow, and the Lord reaps, because he perhaps reckons it to himself. Hence he himself says, below in this chapter: as long as you did it to one of these my least brethren, you did it to me. Likewise, as was said above: the seed is the word of God; hence sometimes God gathers the fruits of good work where preaching has not been sown; Romans 2:14: men who have not the law are a law to themselves. In a third way, certain evils are done by man, such as evils of the flesh, from which evil ought to be reaped. Concerning which Galatians 6:8: he that sows in the flesh, of the flesh shall reap corruption. Yet God makes something good come of it, such as the good of justice, of humility, or the like.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
