[[commentary]]
quote='''
The second hope of the just is that when they lack temporal consolation in time of trial, they enjoy delight in God and are delighted in his praise, but he excludes this from the impious man saying, "Or will he be able to find joy in the Almighty," whom he did not love as his works prove, "and invoke God in every time?" For from great love of God some men always praise God in speech.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
