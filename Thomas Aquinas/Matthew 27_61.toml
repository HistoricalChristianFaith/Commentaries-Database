[[commentary]]
quote='''
Then the devotion of the women follows. Hence the women, who loved more ardently, followed him all the way to the tomb: hence it says "there was Mary Magdalene and the other Mary": and Mary the wife of Zebedee is not named, because she was not there, because she did not love as ardently.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
