[[commentary]]
quote='''
Since he has said many great things about himself, he invokes divine witness about these things, and so he then says, "Who would give me an advocate," who will appeal to God with me? He shows why he desires help saying, "that the Almighty might hear my desire?" He shows what his desire is then saying, "and write the book," either of accusation or recommendation of me in what I have said with "he who judges," all human acts, both interior and exterior.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
