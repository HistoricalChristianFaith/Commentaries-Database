[[commentary]]
quote='''
And the reason for this is given at the words: for you are all sons of light. He also makes the point that they are the sons of the light and of the day. According to the Scriptures, someone is said to be the son of something because he abounds in that thing. "My beloved had a vineyard on a very fertile hill" (Is. 5:1), that is, it was land which was very rich. Those who participate to a great extent in the day and in the light are called their sons. And this light is the faith of Christ. "I am the light of the world" (Jn. 8:12), and again: "Believe in the light, that you may become sons of light!" (Jn. 12:36).

In addition he says, of the day, for just as out of the early light comes the fullness of the day, so out of the faith of Christ comes the day which is the brilliance of good actions. "The night is far gone, the day is at hand" (Rom. 13:12). And because of this, you are not sons of the night, that is, involved in infidelity; or of darkness, that is, of sins. "Let us then cast off the works of darkness and put on the armor of light" (Rom. 13:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
