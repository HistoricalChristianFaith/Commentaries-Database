[[commentary]]
quote='''
Since he has said this in a general way, he now makes it clear by specific examples, showing how all things which seem excellent in human affairs are brought by the depth of divine counsel "to a foolish end" and "to dullness." In human affairs, kings excel with respect to power. As to them he says, "The belt," that is the swordbelt, "of kings he loosens," for their power is designated in their swordbelt, according to the Psalm 44, "Gird your sword upon your thigh, O mighty one" (v.4); "and he girds their loins with ropes," when they are led into captivity, in which he notes the complete failing of their power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
