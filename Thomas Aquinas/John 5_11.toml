[[commentary]]
quote='''
Then (v 11), we see the man who was healed defending himself. His defense is wisely taken: for a doctrine is never so well proved to be divinely inspired as by miracles which can be accomplished only by divine power: "Going out, they preached everywhere, and the Lord worked with them and confirmed the word by the signs that followed" (Mk 16:20). Thus he argued with those who were defaming the one who healed him, saying: He who cured me said to me. As if to say: You say that I am forbidden to carry a burden on the Sabbath, and this on divine authority; but I was commanded by the same authority to pick up my mat. For, he who cured me, and by restoring my health showed that he had divine power, said to me, Pick up your mat and walk. Therefore, I was duty bound to obey the commands of one who has such power and who had done me such a favor. "I will never forget your precepts because you have brought me to life by them" (Ps 118:93).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
