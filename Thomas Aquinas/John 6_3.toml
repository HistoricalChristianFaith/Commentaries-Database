[[commentary]]
quote='''
Then he gives the location of the miracle, on a mountain; hence he says: Jesus therefore went up a mountain, i.e., privately, and there sat down with his disciples. Now a mountain is a place well suited for refreshment, for according to the Psalm a mountain signifies the perfection of justice: "Your justice is like the mountains of God" (Ps 35:7). And so, because we cannot be satisfied by earthly things—indeed, "Whoever drinks this water will be thirsty again" (above 4:13)—but spiritual things will satisfy us, our Lord leads his disciples to a higher place to show that full satisfaction and the perfection of justice are found in spiritual realities. We read of this mountain: "The mountain of God is a rich mountain" (Ps 67:16). Thus he also exercised his office of teacher there, sitting with his disciples; for he is the one who teaches every man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
