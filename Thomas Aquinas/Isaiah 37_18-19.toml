[[commentary]]
quote='''
He proves with this the foolishness of his blasphemy: for of a truth, O Lord: the idols of the Gentiles are silver and gold, the works of the hands of men (Ps 113:12[115:4]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
