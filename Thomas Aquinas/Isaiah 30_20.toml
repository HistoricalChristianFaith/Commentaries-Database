[[commentary]]
quote='''
Against poverty: and the Lord will give you spare bread, and this is the sense: they will be content with little food: the chief thing for man's life is water and bread (Sir 29:28[21]); or because in the return from Babylon they suffered scarcity. This should be understood mystically, according to the Gloss.

679. Second, he sets out the gathering of goods; hence he says, and will not cause.

And first, of spiritual goods, as to chosen teaching, describing the teacher: to flee, that is, to withdraw; your teacher, Esdras, whose teaching they still use, or Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
