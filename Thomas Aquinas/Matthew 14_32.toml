[[commentary]]
quote='''
And when he had entered the boat, the wind ceased. Here the fourth help is presented, against the wind. Ps. 106:25: he said the word, and the storm stood still. Hence it is a sign that when Christ is with his own, they have nothing adverse; thus Apoc. 7:16: they shall not hunger nor thirst any more.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
