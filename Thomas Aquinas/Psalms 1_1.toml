[[commentary]]
quote='''
This Psalm is distinguished from the whole work, for it has no title but serves as a kind of title for the entire work. David composed the Psalms in the manner of one praying, who does not maintain a single mode but adapts himself according to the diverse affections and movements of the one praying. This first Psalm therefore expresses the sentiment of a man raising his eyes to the whole state of the world and considering how some advance and others fall away. Among the blessed, Christ was the first; among the wicked, Adam. But note that in one thing all agree, and in two things they differ. They agree in blessedness, which all seek; but they differ in the process toward blessedness and in its outcome, because some attain it and some do not. This Psalm is therefore divided into two parts. In the first, the process of all toward blessedness is described. In the second, the outcome, at "and he shall be like a tree that is planted near the running waters." Concerning the first, he does two things. First, the process of the wicked is touched upon; second, that of the good, at "but his will is in the law of the Lord," etc. In the process of the wicked, three things must be considered. First, deliberation about sin, and this in thought; second, consent and execution; third, inducing others to the same -- and this is the worst. And so first he sets forth the counsel of the wicked, at "blessed is the man," etc. He says "who has not walked," because as long as a man deliberates, he is in the process of going. Second, he sets forth consent and execution, saying: "and in the way of sinners," that is, in their manner of acting. Prov. 4: "The way of the wicked is dark; they do not know where they stumble." "He has not stood," namely by consenting and acting. He says "of the ungodly," because ungodliness is sin against God, and "of sinners" is against neighbor, "and in the seat" -- behold the third -- that is, inducing others to sin. In the seat, therefore, as a teacher, instructing others to sin; and so he says "of pestilence," because pestilence is a contagious disease. Prov. 29: "Pestilent men destroy a city." He therefore who walks in this way is not blessed, but rather he who goes the opposite way.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
