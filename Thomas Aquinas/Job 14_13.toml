[[commentary]]
quote='''
After Job has shown what one can conclude about the resurrection of man from things which are apparent to the senses, he posits here his own opinion about the resurrection. It would be a horrendous and unhappy thing if man should so depart after death that he would never be brought back to life. This is because everything naturally desires its own existence. So Job shows his desire for the future resurrection saying, "Who will grant," even after death, "that you will protect me in Sheol," i.e. you would preserve me with the special care with which you protect man, "until your anger passes," at the time of death. The death of man is caused by the removal of the divine action which conserves life, and so he said before, "Go away from him for a little." (v. 6) God seems angry with a man when he takes his gift of life away from him, especially for us who believe that death came from the sin of the first man. He explains how he wishes to be protected even in Sheol when he says, "and will you determine a time for me when you may remember me?" For God seems to have forgotten man when he takes the gift of life away from them. Then he remembers man when he leads him back to life. Therefore, to determine the time in which God remembers the dead man is nothing else than to determine the time of the resurrection. He very fittingly calls this "protection." (v.13) For when an artist, having dismantled his work, does not want to repair the building with the same material, like a house or something of the sort, he seems to have no care for the material of the house which is falling into ruin. But when he intends to repair the building from this material, he guards it diligently so that it does not perish. He calls this guardianship "protection."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
