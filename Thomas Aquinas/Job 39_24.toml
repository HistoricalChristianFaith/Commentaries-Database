[[commentary]]
quote='''
But the horse is still not struck with terror by this sound, and so he says, "raging," from interior courage, "and snorting," that is, neighing. He calls this a roar which is the sound characteristic of lions (Proverbs 19:12) because of the courage of the horse. He not only shows his interior passion of spirit with his voice, but also with an exterior act, and so he says, "he sucks in the earth," that is, he seems to suck it in by digging it with his hooves. Not only does the sound of the quiver, the pike and the shield not terrify him, but he is also not frightened by the sound of the trumpet, which is a martial instrument, and so he says, "nor does he regard the blast of the trumpet," so that he is terrified by it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
