[[commentary]]
quote='''
And he excludes disgrace, and in so doing again pronounces a new name, you shall no more be called Forsaken: because they say of you (Ezek 36:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
