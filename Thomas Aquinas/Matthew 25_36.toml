[[commentary]]
quote='''
As for the joined covering he says, naked, and you covered me; Job 31:19: if I despised him that was passing by, because he had no covering; and there follows, if his sides have not blessed me, and if he were not warmed with the fleece of my sheep; Isaiah 58:7: when thou shalt see one naked, cover him. Likewise, there are certain particular deficiencies; and of these some are natural and some from the exterior. A natural and intrinsic deficiency is illness; hence he says, sick, and you visited me. As for the exterior deficiency he says, I was in prison, and you came to me. And by prison can be understood any tribulation; Hebrews 10:34: for you both had compassion on them that were in bonds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
