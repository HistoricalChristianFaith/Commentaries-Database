[[commentary]]
quote='''
As to the third he says, "The Lord is a stronghold for those who fear him." And first he presents the strengthening of operative power. Second, he presents the end, and the covenant. He says therefore: other men are weakened on account of worldly fear, because they waver; but the fear of God makes them strong: because, as it is said in Sir. 34: "He who fears the Lord will tremble at nothing." And therefore it is added: his hope is a stronghold; and he is strengthened by this until God manifests to him his covenant, that is, his possession. This covenant, therefore, is either the promise he makes about the coming of Christ, which coming was manifested to the God-fearing Simeon; or the promise concerning eternal life: Jn. 14: "I will love him and will manifest myself to him." Jerome has it thus: "The secret of the Lord is for those who fear him; his covenant will be manifested to him." For the promise of eternal life is in secret, as it is said in Is. 64: "Eye has not seen, O God, apart from you, what you have prepared for those who love you." And this is given to those who fear him: Ps. 30: "How great is the multitude of your sweetness, O Lord, which you have hidden for those who fear you." And this secret is the covenant he promised to those who fear him: Mal. 4: "For you who fear my name, the sun of justice shall arise."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
