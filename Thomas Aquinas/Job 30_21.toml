[[commentary]]
quote='''
Thus if I were to consider only my temporal state, I would consider you a cruel and hard enemy, and so he then says, "You have changed into someone cruel in my opinion," according to the appearance of the exterior scourges when you do not spare me even when I entreat you. "And you persecute me with a heavy hand," for you afflict me gravely.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
