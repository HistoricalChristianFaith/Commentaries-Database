[[commentary]]
quote='''
Second, he describes the manner of liberation: for the fool. And first, he describes the affliction; second, the liberation: until the spirit be poured upon us (Isa 32:15). Concerning the first, he does two things: first, he describes the enemy who persecutes them; second, the persecution: rise up, you rich women (Isa 32:9). Concerning the first, he sets out three things. First, the wickedness of the king himself, as to the blasphemy of his mouth: the fool, namely, Sennacherib, will speak foolish things, blasphemous words, below (Isa 37:17). The mouth of fools bubbles out folly (Prov 15:2); as to the duplicity of his heart: his heart will work iniquity, promising good land to the people, to the Lord deceitfully, saying he has come by his command, below (Isa 36:10). The thoughts of the just are counsels (Prov 12:5); as to the cruelty of his work: to make empty the soul of the hungry, despoiling them of the things by which they ought to have been nourished, against what it says in Proverbs 25:21: if your enemy be hungry, give him to eat.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
