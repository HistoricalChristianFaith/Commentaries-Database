[[commentary]]
quote='''
Then he cites the authority of David, which has already been explained. But when he says, since, then, it remains for some to enter it, he argues from the premises. In regard to this he does two things: first he accepts the sense of the second authority; secondly, he argues from the first (v. 9). In regard to the first he does two things: first, he extracts two things from the second authority; secondly, he shows that those two things are understood in it (v. 8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
