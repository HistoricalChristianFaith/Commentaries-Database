[[commentary]]
quote='''
Now a herd of many swine was feeding at some distance from them. Here he touches on their malice, because they harm not only men but animals as well. Hence it is clear that this did not take place in Judea, because the Jews do not use swine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
