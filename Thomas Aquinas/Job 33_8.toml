[[commentary]]
quote='''
After he has said these things as an introduction, he strengthens the arguments which he intends to use against Job, and so he says, "Therefore you have spoken in my hearing," as if to say: You cannot excuse yourself by saying that you did not say this, "and I heard the sound of your words," for I listened attentively.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
