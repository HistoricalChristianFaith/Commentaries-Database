[[commentary]]
quote='''
"Neither did we eat any man's bread for nothing: but in labor and in toil we worked night and day, lest we should be chargeable to any of you," because he labored with the work of his hands. "You yourselves know that these hands ministered to my necessities, and to those who were with me" (Acts 20:34). "She has not eaten her bread idle" (Prov 31:27). "You know that I have never accepted so much as a donkey from them" (Num 16:15). "But in labor and toil," not just a little, but "night and day," i.e., continually, because sometimes he had to preach and teach and the rest of his time he devoted to work, "lest we should be chargeable to any of you." "What have you had less than the others, except that we did not burden you?" (2 Cor 12:13)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
