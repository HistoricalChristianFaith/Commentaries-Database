[[commentary]]
quote='''
Then when he says, the Lord gives mercy to the house of Onesiphorus, he shows the progress others are making, and especially a certain Onesiphorus, stressing in particular the good works he performed for the Apostle in Rome and then in Asia. In regard to the first he calls three things to mind: first, he wishes him God's mercy; second, he shows the merits of mercy; third, the time of mercy.

He wishes the first when he says, the Lord gives mercy, because the present life is one of misery: man born of woman and living for a short time, is filled with many miseries (Job 14:1). He says, to the house of Onesiphorus, i.e., not only to the person, but to the family, because the goodness of one draws down grace upon the whole family: if that house be worthy, your peace shall come upon it (Matt 10:13).

The merit of mercy is the mercy he showed the Apostle; hence he says, because he has often refreshed me, namely, by affording him rest: blessed are the merciful, for they shall obtain mercy (Matt 5:7); shall not the dew assuage the heat? (Sir 18:16); the bowels of the saints have been refreshed by you, brother (Phlm 1:7). And of my chains: I labor even unto bands as an evildoer (2 Tim 2:9). He has not been ashamed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
