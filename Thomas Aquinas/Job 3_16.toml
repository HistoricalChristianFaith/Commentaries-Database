[[commentary]]
quote='''
So after he shows that he should not have desired to have preserved his life after his birth, he demonstrates as a consequence that he should not have desired to preserve his life in leaving the womb and be born. In this he explains what he said above, "Why did I not die in the womb?" (v.11) Consider that some die in the womb before the infusion of the rational soul, which alone is immortal. He expresses this saying, "Or why was I not like a hidden aborted birth?" Aborted fetuses of this sort have nothing perpetual which remains of them. Some however die after the infusion of the rational soul. These truly subsist in the soul after death, but they do not see the light of this world. To express this Job says, "or like those conceived who never see the light," i.e. of this present life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
