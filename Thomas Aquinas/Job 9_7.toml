[[commentary]]
quote='''
Finally, he proceeds to the heavenly bodies, which also result from divine power. Consider that as the nature of the earth is to be unmoved and at rest, so the nature of the heavens is constant motion. Just as then the power of the earth can be overcome clearly by divine power through the motion which appears in it, so the power of a heavenly body is shown to be overcome clearly by divine power the fact that the motion is impeded of the rising and the setting of the sun and the other stars. So he continues, "He commands the sun and it does not rise." This certainly does not mean that the sun is in fact impeded from rising, since the motion of the sun is continuous. But the sun sometimes appears to human perception not to rise, for example, when the air is so cloudy that the rising sun does not appear to the inhabitants of the earth with its usual brightness. Since cloudiness of this kind happens by the action of nature, it is fittingly attributed to the divine command, which regulates the action of the whole of nature as has been said. It is clearly apparent that the statement that the sun does not rise should be understood to mean that the rising sun is hidden from the next verse, "and he conceals the stars as under a seal." For the stars almost seem to be concealed when the sky is so covered with clouds that the stars cannot be seen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
