[[commentary]]
quote='''
first, as to their divine inspiration: behold I will lift up my hand, as though beckoning, and will set up my sign to the people, above: he shall set up a sign unto the nations (Isa 11:12);

second, as to their honorable restoration: and they shall bring your sons in their arms, in which is signified the help which they had from the gentiles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
