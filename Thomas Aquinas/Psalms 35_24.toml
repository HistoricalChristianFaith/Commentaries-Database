[[commentary]]
quote='''
As to the third, he says, "Judge me." One text has, "according to your justice"; another text has, "Judge me according to my justice." The first amounts to the same thing, as if he were saying: judge me according to your law and justice; for the justice of God is to render to each according to his merits, and it cannot be deceived or deflected from the truth, Rom. 2: "The judgment of God is according to truth." "According to my justice," namely which I have followed. And it can be said that my justice and yours are the same; that is, of God who justifies, and of man as justified, because our justice is from God. Rom. 10: "Wishing to establish their own justice," etc. Consequently, he asks for the effect of judgment, "that they may not rejoice over me"; and regarding this he does two things. First, he asks for the repression of insult. Second, he asks for their confusion, at "let them blush." Exterior exultation arises from interior joy. First, therefore, he asks that their interior joy be repressed. Second, exterior insult. He says therefore, as to the first, "let them not rejoice over me"; as if to say: may your judgment so repress them that they may not rejoice over me. Lam. 1: "All my enemies heard of my evil and rejoiced."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
