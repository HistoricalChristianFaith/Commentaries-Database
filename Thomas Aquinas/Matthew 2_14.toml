[[commentary]]
quote='''
(14) And he rose. Here is mentioned the execution of the angel's command both as to the flight and the length of the stay. He rose and took the child and his mother. The time is mentioned, when he says at night, on account of the fear and distress: "My soul desired you at night," i.e., in distress (Is 26:9); for in times of distress one must have recourse to God: "In the morning, they will come to me in their trouble" (Hos 10:1). He rose. Then was fulfilled the word of Is (19:1): "Behold, the Lord is riding on a swift cloud and comes to Egypt," which was fulfilled to the letter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
