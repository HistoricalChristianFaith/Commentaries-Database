[[commentary]]
quote='''
Above, the manifold provocation of the Jews was presented; now the preparation through the instruction of Christ's disciples is given. They are instructed about dangers. And first the questioning of the disciples is presented; secondly, Christ's response, at and Jesus answering, said to them. In regard to the first, two things. First, the occasion for the questioning is presented; secondly, the questioning itself, at and when he was sitting on mount Olivet, etc. The occasion was twofold. The foretelling of the destruction of the temple, which foretelling he made both by deed and by word, because he went out of the temple. Above, in the preceding chapter: Behold, your house shall be left to you desolate; and this he showed, because he went out; hence, because he went out bodily, he showed that he was going out spiritually; John 8:59: But Jesus hid himself and went out of the temple. When a sinner does not wish to be corrected, the Lord goes out from him; Lamentations 1:6: All her beauty is departed from the daughter of Zion. Then the questioning is presented, at and the disciples came to him privately, saying; secondly, the response, at and he answering, etc. So he was going away. But then the disciples came to show him the buildings of the temple, so that he might see how beautiful the house was, how splendid; hence in another place, namely Mark 13:1, it says: See what manner of stones and what buildings. But Origen asks: had he not been there before, and did he not know well? He answers that they were not asking in order to instruct him, nor as though he did not know, but so that he might find a remedy for the destruction. In the same way a Christian is the temple of God, as is stated in Philippians 2; and the disciples are intercessors, lest this temple be destroyed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
