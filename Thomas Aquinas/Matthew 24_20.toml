[[commentary]]
quote='''
Likewise, there are other impediments where man cannot provide a remedy except through God. For some time is unsuitable either by nature or by law: by nature, as wintertime, because then a man is impeded from fleeing on account of the harshness of the weather. Likewise by law, as if it should happen on the sabbath, because God commanded that they should not go beyond one mile. And because this is not in our power but in God's, therefore, pray that your flight be not in the winter or on the sabbath, because in such matters one must have recourse to God alone. Hence Hosea 6:1: Come, and let us return to the Lord, for he hath taken us and he will heal us. Pray that it be not in winter, because it impedes flight naturally on account of the difficulty of the road; nor on the sabbath, because it impedes according to the law of God. Likewise note that he says on the sabbath, by which he signifies that on a feast day they were duly slain.

Hilary explains: and what does he say about winter and the sabbath? By winter is signified sadness, by the sabbath joy. Hence, let it not happen in winter through a sorrow that overwhelms, or on the sabbath through a joy that exalts the soul. Or by the sabbath, idleness from good works; by winter, the cooling of charity. Origen says: pray, therefore, that they be not impeded through slothfulness and torpor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
