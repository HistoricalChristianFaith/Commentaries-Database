[[commentary]]
quote='''
Nothing seems more beautiful among corporeal bodies than the rays of the sun. But this beauty does not attract Leviathan whether understood corporally or spiritually, and to show this he continues, "The rays of the sun will be under him," because he does not prize them as something great, and consequently we are given to understand that he prizes nothing else excellent among human things. Gold is reckoned especially precious among the things which man uses, and as to this, he says, "and he will throw gold aside as though it were mud," i.e., he will hold it in contempt as something vile. Therefore it is clear that he cannot be allured by man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
