[[commentary]]
quote='''
But they could say: How shall we confirm what we say? Certainly by miracles as he did. So he says, Heal the sick... But if someone asks why the Church does not work miracles now, the answer is given that miracles were performed to prove the faith, but now the faith has even been approved. Therefore, just as a person who formulated one demonstration to prove some conclusion would have no need for another one, so here. Hence the greatest miracle is the conversion of the whole world, so there is no need for other ones. But just as the other miracles were bodily, so every day spiritual miracles are performed, because the spiritually infirm are cured. For the infirm are those tossed about by sin and those prone to sin: "Welcome the man who is weak in faith" (Rom 14:1), and they are healed by the Lord. But those who consent are dead, because separated from God, as it says in Ephesians (5:14): "Awake, you sleeper, and arise from the dead." Likewise, lepers are cleansed; for lepers are those who infect others, because leprosy is a contagious disease, and sometimes they are cured. In 2 Kings (5:27) it is recorded that the leprosy of Naaman cleaved to Gehazi. Furthermore, devils are cast out; for devils are ones who have already committed sin: "They rejoice in doing evil and delight in the perverseness of evil" (Pr 2:14), and as is said of Judas (Jn 13:27): "Satan entered into him." And these are sometimes cured.

But because the apostles could say: "Now we shall be rich; if we perform miracles, we shall have much." This was the reason Simon Magus wanted to perform miracles. But the Lord excludes this, saying, You received without pay, give without pay. It is great to perform miracles, but it is greater to live virtuously. Hence he removes pride from them, because pride can happen in two ways: either from cupidity or from deserts. For the highest form of pride appears when a person ascribes to himself the good he has. Therefore he excludes this, because you have received: "What do you have that you have not received?" (1 Cor 4:7). Furthermore, you should be proud, because these things are not from your merits but are freely given. For one who obtains from merit does not receive as freely given. He also excludes cupidity: give without pay, i.e., not for something temporal. For the price of a thing is either more or equal. For that which you hand over for a price is not as fixed in your heart as the price you receive. But nothing is equal to God's gift, or greater: "Neither did I liken to her any precious gem, because all gold is but a little compared to her" (Wis 7:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
