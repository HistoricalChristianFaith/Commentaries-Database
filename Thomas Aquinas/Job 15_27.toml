[[commentary]]
quote='''
Pride usually arises from an abundance of temporal goods, and so the text continues, "he is furnished with a fat neck," by acting proud against God. For fat is caused by an abundance of humors and so is an image for an abundance of temporal goods. Just as humility is the first stage of wisdom, so pride is an obstacle to wisdom and so the text continues, "Thick darkness covered his face," because the covering of his face is an image for the impediment to knowledge. Not only does Job have the opulence which causes pride, but this extends even to his companions and so the text continues, "lard hangs from his sides." By all these expressions he intends to show that opulence made Job fall into the pride which makes him stand against God and act tyrannically against other men. Therefore he came to the suspicion that he suspects God as his adversary and a conspirator.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
