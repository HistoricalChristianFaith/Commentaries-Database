[[commentary]]
quote='''
639. Second, he threatens the punishment of blindness: whom shall he teach? Hence the question is first set out, whom shall he teach knowledge? As if to say: why have you spurned knowledge? The hearing, namely, what I heard from the Lord. Second, the answer is set out: them that are weaned from the milk, that is, the humble and simple little ones: you have hid these things from the wise and prudent, and have revealed them to little ones (Matt 11:25); or all of the good who are separated from the milk of concupiscence.

643. Note also on the words, them that are weaned from the milk (Isa 28:9), that there is a certain milk that ought to be abandoned, and this is manifold: first, the milk of carnal concupiscence, above: the weaned child shall thrust his hand into the den of the basilisk (Isa 11:8); second, of imperfect justice: the child grew, and was weaned (Gen 21:8); third, of rudimentary doctrine: as unto little ones in Christ, I gave you milk to drink (1 Cor 3:1–2). There is also a milk that ought to be embraced: first, of a pure conscience: whiter than snow, brighter than milk (Lam 4:7), because of its brightness; second, of sound doctrine, because of its sweetness: honey and milk are under her tongue (Song 4:11); third, of eternal glory, because it easy to swallow: possess their land flowing with milk and honey (Lev 20:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
