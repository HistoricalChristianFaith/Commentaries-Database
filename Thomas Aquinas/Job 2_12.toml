[[commentary]]
quote='''
What provoked these signs of compassion is now introduced. "When they saw him from afar, they did not recognize him," for his face was changed by sores, his clothing and his refinement gone because of the loss of his possessions. The term "from afar" should be understood to mean that measure by which a man can be recognized from a distance. This change in their friend stirred them to sadness and compassion which they showed by external signs, for there follows, "and raising their voices," out of the great depth of their sorrow, "they wept, and they rent their robes and sprinkled dust on their heads," as a sign of humility and dejection, as though they felt themselves to be cast down by the casting down of their friend. The text adds, "heavenward" as though they might provoke the mercy of heaven by this humiliation. Consider that the compassion of friends is a consolation, either because adversity like a burden is more lightly born when it is carried by many, or even more because all sorrow is alleviated when mixed with pleasure. To have the experience of someone's friendship is very pleasurable, which especially derives from their compassion in adversity and so offers consolation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
