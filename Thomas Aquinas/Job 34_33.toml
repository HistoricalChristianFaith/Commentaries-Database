[[commentary]]
quote='''
Since he thought that Job was gravely disturbed against him, he shows as a consequence that his disturbance is not justified, continuing, "Does God seek it from you?" as if to say: Even if I have spoken evil, you are not bound by God to answer for it, and so you should not be gravely disturbed by this. He says, "because you were unhappy?" through a disordered disturbance of soul. Second, he shows why he should not be gravely disturbed by it, since Job himself had begun his speech with, "Let the day perish and so on." (3:3) This was the beginning of the whole argument, and so he says, "for you began to speak and not I." Third, he shows that he should not be gravely disturbed because he also has ability to say what he likes, and so he says, "If you know something better" than what I have said, "speak," to show my error or evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
