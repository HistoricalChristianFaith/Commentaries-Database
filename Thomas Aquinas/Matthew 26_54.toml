[[commentary]]
quote='''
How then shall the Scriptures be fulfilled? Here the third reason is set forth, why he should not hinder: because the Scriptures have so declared; and therefore it must so be. And he does not say which Scriptures, because all the prophets said this either obscurely or manifestly. Hence Luke, last chapter, verse 26: ought not Christ to have suffered these things, and so to enter into his glory?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
