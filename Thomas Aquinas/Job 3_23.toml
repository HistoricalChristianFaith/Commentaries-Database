[[commentary]]
quote='''
Someone could object that although life is useless if given to miserable men, yet it is useful if given to those who enjoy prosperity. He removes this possibility saying, "Why are they (i.e. light and life) given to man whose way is hidden?" The way of a man is hidden because he does not know how the state of his present prosperity will end. As Proverbs says, "Laughter will be mixed with pain, and the end of joy is grief," (Prov. 14:13) and Jeremiah, "Man's road is not in his control." (10:23) and Qoheleth, "What necessity is there for man to seek greater things for himself, when he does not know how to use things profitable for himself in this life? Or who can indicate what will be after him under the sun?" (7:1) He explains how the way of man is hidden on the earth saying, "And God has hedged him in with darkness." This is evident in many ways. First, as to those things which happened in the past or will happen in the future, Qoheleth says, "Many are the afflictions of man because he is ignorant of the past and the future, or who can tell him how it will be?" (8:6) Second, as to what is near him, namely men. As 1 Corinthians says, "For who knows a man's thoughts but the spirit of the man which is in him." (2:11) As to those things above a man, the last chapter of 1 Timothy says, "He (God) lives in inaccessible light, whom no man sees or is able to see," (1 Tim. 6:16) and in the Psalms, "He makes the darkness his hiding place." (17:12) Finally as to those things which are below him, Qoheleth says, "All things are difficult, a man cannot explain them with speech." (1:8) God is said to have hedged a man in with darkness because God bestows the kind of intellect on him which is not able to understand these things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
