[[commentary]]
quote='''
Then, he describes their hearers, for they were Cretans, and to them he refers this work: first, he describes their condition; second, he prescribes a remedy, at wherefore, rebuke them.

In regard to the first he does two things: first, he describes their condition from witnesses; second, he confirms it.

He says, therefore: such are their teachers; but their hearers are just as easy to seduce according to the testimony of one of their poets, namely, Epimenis, whom Paul calls one of their prophets.

Here it should be noted that a prophet is one whose intellect is enlightened by God to know things that transcend common knowledge: if there is a prophet among you, I the Lord make myself known to him in a vision, I speak with him in a dream (Num 12:6); or one who explains prophecies in the same spirit and method as they were delivered; or one who utters prophetic words. Hence something prophetic might be uttered from an inner instinct without understanding it: Caiaphas being high priest that year prophesied (John 11:51). For he had no intention of prophesying when he said that it is expedient for him to die lest he seduce the people. Nevertheless, he was moved to say this by the Spirit. This manner of prophesying also belongs to those who accept someone's words as an omen that might actually be from demons.

And he says, a prophet of their own, because such a person is familiar with their condition.

Then when he says, Cretans, he gives the testimony. And he describes them with three marks: first, the corruption of reason, when he says, are always liars: you destroy those who speak lies (Ps 5:6).

Second, the corruption of their irascibility when he says, evil beasts, i.e., cruel. They are called beasts, as it were, laying waste, because they are cruel: like a roaring lion or a charging bear is a wicked ruler over a poor people (Prov 28:15). He says, evil, because according to the Philosopher in the Politics, when a man acts according to reason, he is the best of animals; but when he stoops to wickedness, he is the worst: for if he falls away because of cruelty, no beast is as cruel. Hence he says that an evil man is ten thousand times worse than an evil beast.

Third, from the corruption of their desire when he says, slothful bellies, having sloth present in their bellies; for they were gluttons and such men seek rest: soul, you have ample goods laid up for many years; take your ease, eat, drink, be merry (Luke 12:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
