[[commentary]]
quote='''
2282 Now we see the effect of his revealing himself: they drew back and fell to the ground. As Gregory says, sometimes we read that the saints fall to the ground: "The king Nebuchadnezzar fell upon his face and did homage to Daniel" (Dan 2:46); "When I saw it, I fell upon my face" (Ez 1:28). We also read that the evil fall: "Your men shall fall by the sword" (Is 3:25). Yet there is a difference. It is said that the evil fall backward: "Eli fell over backward from his seat" (1 Sam 4:18); while the saints fall on their face. The reason for this is given in Proverbs (4:18): "The path of the righteous is like the light of dawn.... The path of the wicked is like deep darkness; they do not know over what they stumble." Now those who fall backward do not see where they fall. And so those who are evil are said to fall backward because they fall over things that are invisible. Those who fall forward see where they are falling. Thus the saints, who willingly cast themselves down with respect to visible things, so they can be raised up to invisible things, are said to fall on their face because they humble themselves.

Mystically understood, we can say that by this falling backward we can understand that the Jewish people, who were a special people, because they did not listen to the voice of Christ in his preaching, fell backward, excluded from the kingdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F18.htm'
source_title='Commentary on John'
