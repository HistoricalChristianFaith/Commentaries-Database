[[commentary]]
quote='''
As I do not propose to change from innocence to harm, so I do not propose to desert the way of justice, and so he says, "My justification," which pertains to the execution of justice, "which I held in the beginning," by not approving a man for the prosperity which he has nor condemning him for the adversity which he suffers in this life, "I will not desert," in deviating to your opinion. Those who have sinned once are usually more prone to sin a second time, but those who do not know sin slip into sin with more difficulty, and so he then says, "for my heart has not accused me of anything my whole life long," as if to say: For that reason I am confident that I will not desert innocence nor justice because I have learned this from experience. For I do not have a remorseful conscience about any grave sin which I have done throughout my whole life. Or one can be connected in another way. Because he had said that he would not fall away from his innocence nor desert the justification which he had held in the beginning, someone could object that he had neither innocence nor justice before this. However, he disproves this when he says, "my heart has not accused me of anything and so on," for I would fall away from innocence and I would desert justice if I were to favor you who sustain injustice and impiety.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
