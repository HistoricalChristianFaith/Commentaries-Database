[[commentary]]
quote='''
He presents a twofold punishment: "and whosoever shall fall on this stone, shall be broken." This is explained according to Jerome thus: he falls upon the stone Christ who holds the faith concerning him, i.e., concerning Christ, but falls through the sin which he commits against him. Therefore sinners fall, because they do not have charity. "But on whomsoever it shall fall, it shall grind him to powder." Christ falls upon the unbelieving. This is the difference: because when a vessel falls upon a stone, the vessel is not broken on account of the stone, but on account of the manner of the fall, according to how far it falls from a height; but when a stone falls upon a vessel, it breaks it according to the size of the stone. So when a man falls upon the stone Christ, he is broken according to the magnitude of his sin; but when he becomes unfaithful, he is utterly crushed. Or someone falls upon the stone when he sins by his own will; but then, namely, the stone falls upon him when Christ punishes him, and then he is entirely ground to dust. Ps 17:43: "I shall beat them as small as the dust before the wind."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
