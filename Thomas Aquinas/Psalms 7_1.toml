[[commentary]]
quote='''
Above, Psalms were set forth for deliverance from enemies; here a Psalm is presented in which he seeks vengeance against them. And the following title is prefixed: "Unto the end, which he sang to the Lord for the words of Cushi, the son of the Benjaminite." The history is found in 2 Sam. 17: that David fled from the face of his son, and Ahithophel, the wisest, adhered to Absalom. But Hushai adhered to David, whom David sent back so that he might learn the counsels of Ahithophel and report them to him. When Ahithophel had given Absalom counsel very harmful to his father David -- namely, that he should immediately attack him before he could find refuge somewhere -- Hushai secretly informed David, so that he might flee from the open country where he was and cross the Jordan to the most fortified places. Having heard, therefore, this report of Hushai, David sang this canticle to the Lord; and therefore it says here, "which he sang to the Lord for the words of Cushi, the son of the Benjaminite." He is called "son of the Benjaminite" because perhaps he was from the tribe of Benjamin, or because he descended from someone who had this name. Jerome does not have "unto the end," nor "for victory," but "for ignorance" or "for the ignorant." And he says "concerning the words of the Ethiopian"; yet it is not known whether he was an Ethiopian. Mystically, moreover, this Psalm can belong to the Church and be directed against persecutors. And it is said "for the words of Cushi," which is interpreted as "silence," while "Benjaminite" means "son of the right hand"; as if to say: by the hidden judgment of divine providence it happened that Ahithophel, who is interpreted as "a brother's ruin" -- namely Judas Iscariot -- conspired by counsel and assistance for the ruin, that is, the death, of his brother, namely Christ, who "is not ashamed to call them brothers" (Heb. 2). But what Judas did for the destruction of one man, Christ turned to the salvation of all, as Augustine says in the Gloss. This Psalm has three parts. First, the prayer is set forth. Second, the hearing, at "The Lord judges." Third, the thanksgiving, "I will confess to the Lord." Concerning the first, he does two things. First, he prays to be delivered from enemies. Second, that the enemies be brought low: "Arise, O Lord, in your anger." Concerning the first, he does two things. First, he asks for mercy. Second, he alleges his innocence: "O Lord my God, if I have done this." Concerning the first, he does three things. First, he sets forth the disposition of the one praying. Second, he presents the petition: "Save me." Third, the reason for the petition: "Lest he seize." The disposition of prayer is that one should hope in the Lord: Sir. 2: "For no one has hoped in the Lord and been confounded." And therefore he says, "In you I have hoped." The petition is twofold: for he asks to be saved and to be delivered, according to Dionysius. To be delivered is to be removed from evil; to be saved is to be preserved in good things. Thus he asks to be saved from the corruption of enemies and to be delivered from them. And this can be understood of bodily enemies and of spiritual ones; as if to say: save me from enemies and from temptations. Ps. 21: "Save me from the lion's mouth." Likewise: "Deliver my soul from their malice."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
