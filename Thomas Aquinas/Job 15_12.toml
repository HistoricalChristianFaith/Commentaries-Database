[[commentary]]
quote='''
Second, he shows that the debate was vain and proud, expanding something he had said already, "Will the wise man answer as though he were speaking to the wind?" (v.2) So he then says, "Why does your heart lift you up," in pride to make you presume so much on your wisdom. He tries to demonstrate a sign of pride saying, "and as if you were thinking great things, why do you open your eyes wide in astonishment?" For when someone thinks about great, wonderful things, he is entranced and he opens his eyes wide in astonishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
