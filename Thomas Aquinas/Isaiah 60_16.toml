[[commentary]]
quote='''
Third, he sets out the utility of their subjection: and you shall suck, that is, the fat of the earth shall be brought to you in merchandise and offerings; and you shall be nursed with the breasts, the defense and aid, of kings, of Tyre (Dan 4). Mystically, by milk is signified teaching for the simple, by the kings, the apostles, above: and kings shall be your nursing fathers (Isa 49:23).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
