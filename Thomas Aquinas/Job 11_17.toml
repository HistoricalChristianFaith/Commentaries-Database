[[commentary]]
quote='''
But since Job had proposed above two arguments against the promise of prosperity in this life: the devastation of his own body when he said, "Decay clothes my flesh," (7:5) and the passing of the days of his life when he said, "My days have passed more quickly and so on." (7:6) So he answers both objections saying, "The radiance of noon will come to you in the evening," as if to say: Although it seems to you that your days have passed away and your life is over almost like the twilight, such great prosperity can still come to you that it will almost lead you back to the joy of your youth. For as old age is understood by twilight, so youth is understood by noon. Now he calls the clarity of earthly prosperity radiance. He then says, against what Job had said about the consumption of his own body, "although you thought that you have been used up," because of the weakness which you have suffered, "you will arise like the Lucifer," because your body will return to its youthful beauty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
