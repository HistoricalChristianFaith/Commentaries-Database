[[commentary]]
quote='''
But when he was come to Rome, he carefully sought me, as a friend does: if you would get a friend, try him before you take him (Sir 6:7); he that is a friend loves at all times (Prov 17:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
