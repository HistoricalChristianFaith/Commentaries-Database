[[commentary]]
quote='''
He places next the disobedience of the slaves, "I called my slave and he did not answer me." He adds proud contempt, "I begged him with my mouth," i.e., for I had to urge him not by command, but by entreaties because he despised me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
