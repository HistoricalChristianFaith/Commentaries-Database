[[commentary]]
quote='''
It seemed most certain to him and proved by experience that although the evil enjoy some prosperity, still it is brief and is also quickly destroyed in this life either by a premature death or by some subsequent adversity. He expresses this saying, "I know this," looking, "from the beginning when man was placed upon the earth," as though to say, from the beginning of the human race, "the praise of the wicked is shortlived." For they are sometimes praised for a little while because of some signs and beginnings of goodness which appear in them. But those are immediately darkened by the evil works which appear in them, and so the joy which they have from the favor which they take from pretense passes away in a short time. So he says, "and the joy of the hypocrites is like a speck," passing away in a moment, because afterwards they are known by their fruits, as Matthew 7:16 says.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
