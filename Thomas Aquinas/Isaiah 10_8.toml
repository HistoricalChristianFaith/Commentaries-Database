[[commentary]]
quote='''
For he shall say. Here his motive is set out; and first, he argues, second, he concludes: so shall I do to Jerusalem and her images (Isa 10:11). Concerning the first, he first argues the servitude of kings: are not my princes as so many kings? He shall triumph over kings, and princes shall be his laughingstock (Hab 1:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
