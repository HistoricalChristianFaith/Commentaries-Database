[[commentary]]
quote='''
To investigate the reason why the innocent are punished in this world, he first proposes the harm which he has experienced in the loss of his goods, and shows the fickleness of the present prosperity using a simile with those things which appear most fleeting in this world. Note first that different people have different relationships to the prosperity of this world. Some men have it as an end because they hope for nothing beyond this. This seems to be the opinion of those who declare that all rewards and punishments are in this life. Such men do not go beyond the prosperity of this world but the prosperity of this world escapes from them when they lose it. Some, however, among whom Job was included, do not place their end in the prosperity of this world, but aim at another end. They pass up the prosperity of this world more than they are passed up by it.

Three things are required for someone aiming at an end. The first is that they fix their heart in nothing else which might delay them from the end, but hasten to attain the end. So he gives as his first example a runner who aims at the end of his course so that he does not tarry along the way. So he says, "My days pass swifter than a runner." In this he shows both the frailty of the present fortune and his intention to pursue something else. "They have fled away," as if repose for the heart is not found in the things of this world. The text then continues, "they have not seen the good," namely, to which my intention was born which is the true good. Therefore, I do not count myself rewarded for justice, because if you (the friends) think the present prosperity is a reward, I have been punished, as an innocent man, because this has been taken away.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
