[[commentary]]
quote='''
Third, he sets out the response of the prophet: and Isaiah said to them; in which he excludes the king's fear: be not afraid: be not afraid at their presence (Jer 1:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
