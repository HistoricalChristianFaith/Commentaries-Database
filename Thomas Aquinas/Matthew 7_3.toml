[[commentary]]
quote='''
Why do you see the speck in your brother's eye and do not see the log in your own eye? Here he says that judgment should not be inordinate; for it is such, when it begins from someone, before the cause or its gravity have been fully investigated. For in judging, two things are necessary: knowledge of the cause, and judgment. Concerning the first, Job (29:16): "I searched out the cause which I did not know." Why do you see the speck, i.e., the slight sin, in the eye, i.e., in your brother's conscience, but do not notice the log, i.e., the grave sin, in your own eye? By log and speck he teaches us to consider the quantity of sins; for those who commit grave sins often reprehend those who commit slight ones, as happens in judging religious. When some who commit grave sins which they consider light, they consider them grave in religious; but they are absorbed as a drop of water in a cask of wine. Likewise, it happens that some sin slightly from weakness, and an evil, ill-affected judge, who would punish from hatred, considers the speck in their eye and not the log in his own.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
