[[commentary]]
quote='''
Then (v. 22) he adds a petition in which he excuses himself; then he concludes the epistle. In regard to the first he does three things: first, he gives his excuse; secondly, he recommends the messenger through whom he writes (v. 23); thirdly, he sends several greetings (v. 24).

He says, therefore, in regard to the first: I appeal to you, brethren, bear with my word of exhortation [consolation], i.e., patiently bear with the words of this epistle, in which, even though I have rebuked some of you, it is all for your consolation: 'What things soever are written, are written for our consolation' (Rom. 15:4). Then he shows why they should bear with it patiently, when he says, for I have written to you briefly. This is true in regard to the mysteries contained in it; for almost all the mysteries of the New Testament are contained in this epistle. But short talks are most welcome; because if they are good, they will be heard eagerly. If they are bad, they are a little boring: 'Let your words be few' (Ec 5:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
