[[commentary]]
quote='''
Here he shows the prophet's congratulation: upon waters, that is, upon the places that are fertile from the abundance of the waters; sending thither the foot of the ox and the ass, not at the same time, for this was prohibited: you shall not plough with an ox and an ass together (Deut 22:10); for you shall eat the labors of your hands: blessed are you, and it shall be well with you (Ps 127[128]:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'

[[commentary]]
quote='''
Note also on the words, blessed are you that sow upon waters, that the teaching of the Lord is water: first, because it abounds: I, wisdom, have poured out rivers (Sir 24:40); second, because it cools: as cold water to a thirsty soul (Prov 25:25); third, because it makes fruitful, below: as the rain comes down from heaven, and returns no more thither, but soaks the earth, and makes it to spring, so shall my word be, which shall go forth from my mouth (Isa 55:10–11); fourth, because it carries quickly: it shall become in him a fountain of water, springing up into life everlasting (John 4:14); fifth, because it conforms itself to each individually: in the streets divide your waters (Prov 5:16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
