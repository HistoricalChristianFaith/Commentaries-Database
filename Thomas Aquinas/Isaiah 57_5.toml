[[commentary]]
quote='''
second, he sets out the species of sin: who seek your comfort in idols.

And he adds to the weight of their sin of idolatry from three things:

first, from the variety of places;

second, from the violation of the divine covenant: you have discovered yourself near me (Isa 57:8);

third, from their eagerness for sinning: you have loved their bed (Isa 57:8).

Now the variety of places in which they sacrificed is shown in three ways:

first, as to pleasant places;

second, as to lofty places: upon a high and lofty mountain (Isa 57:7);

third, as to familiar places: and behind the door (Isa 57:8).

Concerning the first, he does four things.

First, he describes the pleasantness of the places, either from the shade of trees, who seek your comfort in idols under every green tree: for on every high hill, and under every green tree you didst prostitute yourself (Jer 2:20); or from the abundance of waters: sacrificing children in the torrents, that is, sacrificing your own children: you have taken your sons, and your daughters, whom you have borne to me: and have sacrificed the same to them to be devoured (Ezek 16:20); they shed innocent blood (Ps 105[106]:38).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
