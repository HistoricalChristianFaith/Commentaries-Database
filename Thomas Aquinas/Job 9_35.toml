[[commentary]]
quote='''
Therefore, I will be able to investigate and so he continues, "I will speak and not be afraid of him," i.e. not being frightened by him. "Nor can I answer when I am afraid of him," i.e. when I hold myself back from investigating something because of reverence for him. Note that the fear of God sometimes does not restrain those fearing God from investigating divine things. This is the case when one investigates divine matters from a desire to know the truth, not to comprehend the incomprehensible, but always with the rudder that one submits one's intelligence to the truth of divine things. However, they are restrained by the fear of God lest they seek to investigate divine things, willing to comprehend them and not regulating their intellect with divine truth. So, by these words, Job intends to show that with this rudder he is investigating things which pertain to divine providence so that he may subject his intellect to divine truth, and not oppose divine truth which would be against the reverence for the fear of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
