[[commentary]]
quote='''
But lest perhaps they should say to him: whence did you obtain the faculty to do this, since you are unskilled in our speech? He shows that the faculty is due to the vastness of his knowledge, saying, even if I am unskilled in speaking, I am not in knowledge: "So also our beloved brother Paul wrote to you according to the wisdom given him" (2 Pet. 3:15). But this should be noted, namely, that the false apostles, seeking their own glory and pursuing gain, tried to attract people by ornate and subtle and exquisite words, trying only to stroke their ears gently. But the Apostle, because he was not seeking his own advantage but only the spread and growth of the faith, proposed the word of faith in such a way that all could understand, adjusting himself to the condition and capacity of his hearers. Hence, because they were not capable of lofty doctrine in the beginning, he proposed the faith to them not in subtle terms but in a way they could understand, namely, plainly and clearly. That is why they said he was rude in speech: "Not with eloquent wisdom, lest the cross of Christ be emptied of its power" (1 Cor. 1:17). On this account the Apostle says: although I be rude in speech, as it seems to you, this was not due to a lack of knowledge but for your sake by way of dispensing it, because I "could not address you as spiritual men, but as men of the flesh, as babes in Christ" (1 Cor. 3:1). Or according to the letter, it must be said that the Apostle stuttered, and on this account the false apostles ridiculed him. Therefore he says: for even if I am unskilled in speaking, i.e., have a speech impediment, I am not in knowledge: "I am slow of speech and of tongue" (Ex. 4:10).

But the fact that I did no less than the great apostles is evident from the things I have done for you; hence, he says: in every way we have made this plain to you in all things, who have experienced what I have done: "You are the seal of my apostleship in the Lord" (1 Cor. 9:2); "The signs of a true apostle were performed among you in all patience, with signs and wonders and mighty works" (2 Cor. 12:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
