[[commentary]]
quote='''
For they, namely, the false apostles, say that his letters, namely, Paul's, are weighty, i.e., punishing harshly and severely, and strong, i.e., without fear, but his bodily presence is not such, for it is weak, i.e., feeble and humble, and his speech, namely, his preaching and conversation and exhortation, is of no account.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
