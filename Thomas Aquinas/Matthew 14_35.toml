[[commentary]]
quote='''
Then follows the devotion of the crowds: and when the men of that place had knowledge of him, they sent into all that country, and brought to him all who were sick etc., because they not only brought their own sick, but sent for those from other places. Hence when they had recognized him through fame and through his teaching, they sent for the sick and brought them to him; hence all believed in him, so great was the power of his word; and this is signified in Isa. 66:19: I will send of those who are saved, to the nations in the sea etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
