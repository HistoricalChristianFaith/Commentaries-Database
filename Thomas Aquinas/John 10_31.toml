[[commentary]]
quote='''
We have seen the teaching of Christ; and now we see the effect this teaching has on the Jews. First, Jesus reproves their fierceness; secondly, he defends himself against the charge of blasphemy; and thirdly, he escapes from their violence (v 39).

Concerning the first, two things are done. First, we see the violence of the Jews inciting them to stone Christ. The Evangelist says, The Jews took up stones again to stone him. They were hard of heart and unable to understand his profound message; and so, being like stones, they resort to stones: "When I spoke to them they fought against me without cause" (Ps 119:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
