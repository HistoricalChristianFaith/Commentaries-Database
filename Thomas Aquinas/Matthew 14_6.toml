[[commentary]]
quote='''
But on the birthday, etc. Here regarding the killing he does three things, because he could not on account of the fear of the people. First the antecedents are set forth; secondly, the killing; thirdly, the consequences. Regarding the first, three antecedents are set forth: the dancing; the promise; the request. He says therefore but on the birthday, etc. It was the custom among the ancients to celebrate their birthday, contrary to Eccl 7:2: better is the day of death than the day of birth. We do not read that any celebrated their birthday except this man and Pharaoh, king of Egypt. Hence on his birthday the daughter of Herodias, as she was called, danced in the midst, i.e., in the banquet hall, and in this he is made culpable, because in his revelry he forgot the royal court, in which such things should not have taken place, and it pleased Herod, contrary to Sir 9:4: do not be constant with a dancing girl.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
