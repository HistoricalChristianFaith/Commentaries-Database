[[commentary]]
quote='''
"Among whom was Mary Magdalen and Mary the mother of James and Joseph and the mother of the sons of Zebedee." From this statement Helvidius took occasion for his error, who said that Jesus was born from the seed of Joseph. To this Jerome says that there were two Jameses: the greater, who is called the brother of John, and the lesser, who was the son of Alphaeus, whose mother was also the mother of Joseph. Hence she who was the mother of James the greater was not the mother of James the lesser: because immediately it adds "and the mother of the sons of Zebedee." But what is it that is said: Mary of Cleophas, and Mary of Alphaeus? Jerome resolves this by saying that it is possible that this Mary had a husband who had two names; hence he was called both Cleophas and Alphaeus. Or it can be said that she first married Cleophas, and when he died she married Alphaeus. Or it can be said that Cleophas was the father, and the mother was called Salome, because Mark says "and Salome," for Salome is a woman's name.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
