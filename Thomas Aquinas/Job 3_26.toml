[[commentary]]
quote='''
A man often suffers unhappiness and bitterness through his own fault. But this is not the case here, for Job says, "Have I not dissembled?" Understand here that someone sins and so merits punishment from God in two ways. In one way when from injuries inflicted on him, he is provoked to revenge beyond what is his due, as Psalm 7 says, "If I repaid evil things to those requiting me, may I perish deservedly destitute at the hands of my enemies." (v. 5) He denies this possibility saying, "Have I not dissembled?" as to the injuries done to me. In another way when someone offends another first in words. He shows this is not the case here saying, "Have I not been silent?" as if to say: I have not spoken abusive or injurious words. Nor has he offended in deeds, and he removes this from himself saying, "Have I not been master of myself?" "For the impious are like the restless sea which cannot be quiet." (Is. 57:20) Although I am innocent, still "his wrath came upon me," i.e. the punishment given by God, for anger in God does not happen because God is disturbed in soul, but because he wants to punish someone. In this Job recognizes that the adversities of this world do not happen without divine command.

To summarize what Job said in his lamentation, note that three things are contained in it. First, he shows his own life is wearisome ("Cursed be the day of my birth") v. 3; second, the greatness of the unhappiness which he was suffering ("Before I eat, I sigh") v. 24; and third, he shows his innocence ("Have I not dissembled") v. 26.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
