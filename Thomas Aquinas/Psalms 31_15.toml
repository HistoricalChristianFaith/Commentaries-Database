[[commentary]]
quote='''
Then he adds the prayer when he says, "Deliver." He prays first for himself. Second, against his enemies, at "Let them be put to shame." Concerning the first he does two things. First, he prays to be freed from evils. Second, to be advanced to good, at "Make your face to shine." In adversaries he considers two things. First, their affection; and this he touches when he says, "From the hand of my enemies," that is, those who hate me: Ps. 142: "Deliver me from my enemies," and so on. These are the devils: Mt. 13: "An enemy has done this," and so on. Likewise friends: Mt. 10: "A man's enemies are those of his own household." Second, their effect, because they persecute: Ps. 118: "Many are those who persecute me and afflict me," and so on.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
