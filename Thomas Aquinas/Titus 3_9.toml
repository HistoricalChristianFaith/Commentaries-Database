[[commentary]]
quote='''
Above, the Apostle taught Titus what to propose when instructing his people. Now he shows what to avoid in his teaching: first, he shows this; second, he writes of familiar matters, at when I shall send.

In regard to the first he does two things: first, he shows how to avoid useless and aimless questions; second, how to avoid heretics, at a man that is a heretic.

In regard to the first he does two things: first, he shows what to avoid in his doctrine; second, he assigns the reason, at for they are unprofitable.

In regard to the first point it should be noted that the burden of satisfying those who raise questions of doctrine falls on the teacher, who should answer some of these questions himself. Furthermore, the teacher should argue with those who resist, and indicate the questions to be avoided.

In the other sciences no wise man is expected to answer every question, but only those which pertain to his science. Consequently, the teacher of truth ought not to answer every question. For foolishness is contrary to wisdom. But this doctrine is wisdom: "that will be your wisdom and your understanding in the sight of the peoples" (Deut 4:6). Hence he says, but avoid foolish questions. For questions contrary to the aims of that doctrine are foolish; and questions that are undisciplined are contrary to the aims of a doctrine. "But Job has spoken foolishly, and his words do not bespeak discipline" (Job 34:35). Likewise, it is foolish to propose as doubtful something that is evident, such as the proper principles of a doctrine.

For these are at the root of all instruction in the faith and training in morals. And there are some which ought to be avoided.

Whence he says, genealogies, because they are proposed in the Scriptures as mysteries or as containing some historical value.

In resisting gainsayers, he ought to avoid contentions and strivings. For when one debates to discover the truth, it is praiseworthy; but when there is contention over what is to be held and what avoided, it is blameworthy: "it is an honor for a man to keep aloof from strife" (Prov 20:3); "avoid disputing about words" (2 Tim 2:14). Strivings about the law, which arise from conflicting statements in Scripture.

Are such quarrels to be avoided at all costs? I answer that in Sacred Scripture no statements are really contrary; if they appear to be, it is because they are incorrectly understood or because a copyist has transcribed them incorrectly. And this is especially true in regard to numbers and genealogies. Consequently, since these matters cannot be settled, they should be avoided.

And this is because they are unprofitable. Whereas a teacher should aim at utility and truth: "my mouth will utter truth" (Prov 8:7); "I am the Lord, your God, teaching you profitable things" (Isa 48:17). Therefore, Titus should avoid getting involved in things that are per se useless and do not contribute to solid doctrine. For the knowledge of singulars, such as genealogies, does not improve the intellect or strengthen the morals or faith. And they are vain, because they have no solid truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
