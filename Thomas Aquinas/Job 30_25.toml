[[commentary]]
quote='''
After he premised his remarks with his past prosperity (c.29) and subsequent adversity, (vv.1-24) he collects them in a kind of summary saying, "I once wept," in the time of my prosperity, "over him who was afflicted," according to what Scripture says, "Weep with those who weep," (Rom. 12:15) and I also had compassion on those suffering a loss, which he shows when he then says, "and my soul had compassion on the poor," not only in affect, but also in effect, as he said already. (29:12)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
