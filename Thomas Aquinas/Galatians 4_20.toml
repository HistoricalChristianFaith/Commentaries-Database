[[commentary]]
quote='''
Here someone might say: "Away from us you say these things, but if you were with us, you would not say them," according to 2 Corinthians (10:10): "His bodily presence is weak and his speech contemptible." Therefore, he expresses a desire to manifest his grief more vividly, saying, "I would willingly be present with you now and change my voice." As if to say: I use gentle language now, calling you friends and sons, in my absence; but if I were present among you, I would correct you more sharply. For if I were present and speaking the things I am now writing in a letter, the correction would be more severe; because I would then be able to express the scolding tones of my rebuke and the cries of my anger and the pain in my heart, much better than I can convey them by letter. And a living voice would more effectively stir your hearts to shame for your error and my anxiety.

And the cause of this sorrow is that "I am ashamed for you," i.e., I blush for you in the presence of others; for as it is said in Sirach (22:3): "A son ill taught is the confusion of the father." For since a son is a thing of the father, and a disciple as such is a thing of his master, a master rejoices in the good he sees reflected in him and glories in it as though it were his own. Conversely, he is pained at evil and is ashamed. Hence because they had been turned from good to evil, for that reason the Apostle is ashamed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Galatians.html'
source_title='Commentary on Galatians'
