[[commentary]]
quote='''
"Hear, O daughter." Here the bride is commended in four ways: for her beauty; for the excellence of her glory, at "all her glory." For her company, at "they shall be brought." And for her offspring, at "instead of your fathers." Regarding the first, he does two things. First, he sets forth how she acquires beauty or graciousness. Second, he treats of the graciousness itself, at "and the king shall desire." First, therefore, she is made attentive to the admonition; hence he says, "Hear, O daughter." He calls the future Church "daughter" for a double reason. One is as David speaking in his own person, because just as insofar as we cling to Christ the son of Abraham, we are children of Abraham, so also children of David, whose son Christ is. Or he speaks in the person of the apostles, from whom we have been propagated in Christ Jesus through the Gospel. He says therefore, "Hear, O daughter." Jas. 1: "Let every person be swift to hear," namely the Gospel or the word of Christ. Lk. 11: "Blessed are those who hear the word of God." Or the Scripture of the prophets, that they may believe in Christ. Is. 53: "Who has believed our report?" "And see" -- through faith here, but in the future you will see through the direct vision. 1 Cor. 13: "We see now," etc. Or, see Christ born. Bar. 3: "After this he was seen on earth." Jn. 1: "We saw him full of grace and truth." "Incline your ear," namely through humility, so that you may obey. Sir. 6: "If you incline your ear, you shall receive instruction." "Forget your people." An imaginary admonition, that this queen came to David or Solomon from a foreign people. And therefore she is admonished to be mindful of her own. And this befits the Church, which was called to Christ from a foreign people, whether of the Jews or of the Gentiles; because, according to Augustine, no one can come to the new life of Christ unless he repents of his old life, namely of sin. And therefore he says, "Forget your people." 1 Chron. 16: "They passed from nation to nation, and from one kingdom to another people." "And the house of your father," namely the Devil. Jn. 8: "You are of your father the Devil." Ezek. 16: "Your father was an Amorite." Or of sin, or of carnal affection. Gen. 41: "God has made me forget all my labors and the house of my father." And this is signified in Deut. 21, concerning the girl from among the captives, who must be shaved and must weep for her father and mother as if dead. "And the king shall desire your beauty." Here he promises the bride the graciousness of the king. First, from the king, and this is love. Second, from the people, and this is honor, at "they shall entreat your countenance." He therefore promises the love of the king and shows the dignity of the king. He says therefore: if you forget your people and the house of your father, from this you will acquire spiritual beauty. Ps. 25: "Lord, I have loved the beauty of your house." And this beauty is desired by the spiritual bridegroom; therefore he says, "And the king shall desire your beauty." And this beauty is the beauty of justice. Jer. 31: "The Lord bless you, O beauty of justice." "He shall desire," that is, he shall delight in it. Is. 62: "Because the Lord has been pleased in you." And this is to be desired, because this king is great in power, in nature, and in honor. The first he has because he is king; therefore he is Lord. Ps. 99: "Know that he himself is the Lord." The second, because he himself is God. Ps. 94: "Because the Lord is a great God." The third, because "they shall adore him," namely those who are far off, and all peoples of the whole world. Ps. 85: "All the nations you have made shall come and adore before you, O Lord." Zeph. 2: "They shall adore him, each one from his own place, all the islands of the nations." Also, those who are near shall adore him, because "the daughters of Tyre with gifts," because Tyre is near the promised land. Hence, "daughters," that is, inhabitants of that land, "shall entreat your countenance," that is, they shall submit to you with gifts. For this was fulfilled when the Canaanite woman, coming from the borders of Tyre, came to Jesus, Mt. 15. Or, "all the rich of the people shall entreat your countenance," that is, men who are in Tyre. Tyre is interpreted as "anguish"; hence all who are in anguish shall beseech you. Literally, all came to Christ. Lk. 4: "When the sun had set, all who had sick people with various diseases," etc. Is. 26: "Lord, in distress they sought you; in the tribulation of murmuring, your teaching was for them." "And they shall offer gifts," that is, themselves. Or alms. Is. 19: "They shall make vows to the Lord and shall perform them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
