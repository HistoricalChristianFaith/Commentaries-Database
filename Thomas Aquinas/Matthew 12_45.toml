[[commentary]]
quote='''
Then he goes and brings with him seven other spirits more evil than himself. Here he deals with the second and more serious harassment. It is shown to be more serious, first, as to the number; secondly, as to duration; thirdly, as to effect. As to number, because he brings seven. According to Chrysostom the literal explanation is that when anyone falls and is not careful, something worse happens to him: "See, you are well! Sin no more, that nothing worse befall you" (Jn 5:14). According to Augustine he brings seven in two ways: for sometimes a penitent does penance, but then acts negligently; as a result he becomes more prone: "God gave them up to a base mind" (Rom 1:28). By the fact that he says seven the entire number of vices is signified. Augustine, however, explains it differently: some commit a certain sin, but in the state of repentance they add hypocrisy. And just as the gifts of the Holy Spirit are seven, so there are seven hypocrisies. Hence they were simple vices at first, then are added the hypocrisies, which are worse. And they are described as seven either on account of the totality of vices or on account of the Sabbath. Those who sin in this way will become fixed in evil; hence he says, they enter and dwell there, because they do not wish to leave: "Why then has this people turned away in perpetual backsliding? They hold fast to deceit, they refuse to return" (Jer 8:5). If it is applied to the Jews, it is clear that he dwells in them and does not wish to depart from them.

And the last state of that man becomes worse than the first. This refers to the effect of the harassment. Literally, one who is punished more is harassed more; hence 2 Peter (2:21): "It would have been better for them never to have known the way of righteousness than after knowing it to turn back from the holy commandment." Again, as to the Jews, who acted worse by blaspheming Christ than by worshipping idols. Therefore he concludes: So shall it be with this evil generation, because it will become worse for them than it was for those in Egypt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
