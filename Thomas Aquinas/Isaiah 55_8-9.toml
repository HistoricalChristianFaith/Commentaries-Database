[[commentary]]
quote='''
Fourth, he excludes the obstacle to mercy: for my thoughts are not your thoughts, as if to say: you are wicked, I am loving; you think of vengeance, I think of mercy: is it my ways that are not right, and are not rather your ways perverse? (Ezek 18:25).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
