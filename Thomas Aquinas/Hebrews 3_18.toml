[[commentary]]
quote='''
194. – And he says of that land, and to whom did he swear, i.e., firmly decree, that they should never enter into his rest, but to them that were incredulous.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
