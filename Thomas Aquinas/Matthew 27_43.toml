[[commentary]]
quote='''
Likewise, they reproach him for saying he was the Son of God: "he trusted in God, let him deliver him now, if he will have him." Psalm 21:9: "he hoped in the Lord, let him deliver him; let him save him, seeing he delighteth in him." He could have delivered him, if he had willed; but he did not will, because he wished to expose him for a time to death, so that he might procure salvation for us and glory for himself. Hence what is said in Jeremiah 15:10 was fulfilled: "all curse me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
