[[commentary]]
quote='''
He commends divine justice by first assuming that God does not respect the persons of the powerful, but he accuses them and punishes them for their sins. Among human powers, royal power is preeminent, and as to this he first says, "Who (God) says to the king: Apostate!" because he is not afraid to accuse a king of apostasy from his oath in which he promises he will preserve justice. In the second place he puts the generals of armies, about whom he says, "who calls army leaders wicked," as if to say: He is not afraid to accuse them of cruelty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
