[[commentary]]
quote='''
But why does he give thanks for hiding these things? I say that he did not do this as though rejoicing in their blindness but in the judgment of God, who arranged things so wisely. And why? Here the cause is not investigated, for in such matters God's will is taken as the cause. Yes, Father, for such was your gracious will. An artisan can easily assign the reason why he put certain stones in the foundation and others above it; but why he put this one here and another there, the only cause is his will. Similarly, that God saves certain ones is a tribute to his mercy; that he damns others is due to his justice. But why he dealt mercifully with one rather than another pertains solely to his will. Hence Romans (9:18): "So then he has mercy upon whomever he wills, and he hardens the heart of whomever he wills." Hence he acts by reason of his pleasure: "Make pleasing the homage of my lips" (Ps 119:108).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
