[[commentary]]
quote='''
First, then, he begins to answer the reproach that he was punished for his own malice. Now Job recognized that he had been punished by divine judgment and so he has already said, "God confines me with the wicked," (16:12) and therefore to search for the reason why he has been punished is to investigate the reason of divine judgment, which certainly no one can know but God alone. From this it is clear that Eliphaz had presumptuously asserted that Job had been punished because of malice. So he does not want to argue about this with Eliphaz, but turns the debate to God who alone knows the reason for his judgment. Now, Job could reckon that he was oppressed by divine judgment, if he had been punished for very great malice. Those who have been burdened by some judge usually approach the judge first. They cannot do this unless they find his bench and they cannot do this unless they know him beforehand. For no one can find something which he is seeking if he is altogether ignorant of it. Thus he says, "Who will grant me the ability to know him, find him, and approach his throne?" For he knew that God exceeded his knowledge, and so he could not find the road perfectly by himself to arrive at God's throne which is the full knowledge of his judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
