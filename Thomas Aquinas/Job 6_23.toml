[[commentary]]
quote='''
Nor has he sought aid from them in war against enemies, and so he adds, "Free me from the clutches of an enemy, or ransom me from hand of the mighty?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
