[[commentary]]
quote='''
Some however deceive others by cunning. As for these he says, "He surprises the wise in their own craftiness," because what the cunning plan go contrary to their design, "and dissipates the plan of evil men," when what they seemed to wisely plan cannot be effected because of impediments put in their way from on high.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
