[[commentary]]
quote='''
He does not desist because of power from the assistance of the just, and so he says, "He does not take away from the just," even the powerful man, "his eyes," the gaze of his goodness and mercy, according to Psalm 33, "The eyes of the Lord are on the just." (v. 16) Since he does not take his mercy away from the powerful if they are just, he shows the benefits which he confers on the powerful. First, he confirms their power, and so he says, "And he places kings on the throne for all time," if they have been just. Second, he shows it since he promotes them to greater dominion, and so he says, "and they," placed on the throne, "are raised up," for they are exalted to greater things when God increases their power and wealth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
