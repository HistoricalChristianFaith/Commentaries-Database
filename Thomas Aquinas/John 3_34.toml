[[commentary]]
quote='''
Then immediately he adds a commendation of divine truth, saying, For the One whom God sends speaks the words of God. As if to say: He has given this as a sign, namely, that Christ, whose testimony he accepts, the One whom God sends speaks the words of God. Consequently, one who believes Christ believes the Father: "I speak to the world what I have heard from the Father" (below 8:26). So he expressed verbally nothing but the Father and the words of the Father, because he has been sent by the Father, and because he is the Word of the Father. Hence, he says that he even bespeaks the Father.

Or, if the statement God is true refers to Christ, we understand the distinction of persons; for since the Father is true God, and Christ is true God, it follows that the true God sent the true God, who is distinct from him in person, but not in nature.

The ability to proclaim divine truth is present in Christ in the highest degree, because he does not receive the Spirit in a partial way; and so he says, for God does not bestow the Spirit in fractions.

You might say that although God sent Christ, yet not all that Christ says is from God, but only some of the things; for even the prophets spoke at times from their own spirit, and at other times from the Spirit of God. For example, we read that the prophet Nathan (2 Sm 7:3), speaking out of his own spirit, advised David to build a temple, but that later, under the influence of the Spirit of God, he retracted this. However, the Baptist shows that such is not the case with Christ. For the prophets receive the Spirit of God only fractionally, i.e., in reference to some things, but not as to all things. Consequently, not all they say are the words of God. But Christ, who received the Spirit fully and in regards to all things, speaks the words of God as to all things.

But how can the Holy Spirit be given in fractions, since he is immense or infinite, according to the Creed of Athanasius: "Immense is the Father, immense the Son, immense the Holy Spirit"? I answer that the Holy Spirit is given in fractions, not in respect to his essence or power, according to which he is infinite, but as to his gifts, which are given fractionally: "Grace has been given to each of us according to degree" (Eph 4:7).

We should note that we can understand in two ways what is said here, namely, that God the Father did not give the Spirit to Christ in a partial way. We can understand it as applying to Christ as God, and, in another way, as applying to Christ as man. Something is given to someone in order that he may have it: and it is appropriate to Christ to have the Spirit, both as God and as man. And so he has the Holy Spirit with respect to both. As man, Christ has the Holy Spirit as Sanctifier: "The Spirit of the Lord is upon me, because the Lord has anointed me" (Is 61:1), namely, as man. But as God, he has the Holy Spirit only as manifesting himself, inasmuch as the Spirit proceeds from him: "He will give glory to me," that is, make known, "because he will have received from me," as is said below (16:14).

Therefore, both as God and as man, Christ has the Holy Spirit beyond measure. For God the Father is said to give the Holy Spirit without measure to Christ as God, because he gives to Christ the power and might to bring forth (spirandi) the Holy Spirit, who, since he is infinite, was infinitely given to him by the Father: for the Father gives it just as he himself has it, so that the Holy Spirit proceeds from him as much as from the Son. And he gave him this by an everlasting generation. Similarly, Christ as man has the Holy Spirit without measure, for the Holy Spirit is given to different men in differing degrees, because grace is given to each "by measure." But Christ as man did not receive a certain amount of grace; and so he did not receive the Holy Spirit in any limited degree.

It should be noted, however, that there are three kinds of grace in Christ: the grace of the hypostatic union, the grace of a singular person, which is habitual, and the grace of headship, which animates all the members. And Christ received each of these graces without measure.

The grace of union, which is not habitual grace, but a certain gratuitous gift, is given to Christ in order that in his human nature he be the true Son of God, not by participation, but by nature, insofar as the human nature of Christ is united to the Son of God in person. This union is called a grace because he had it without any preceding merits. Now the divine nature is infinite; hence from that union he received an infinite gift. Thus it was not by degree or measure that he received the Holy Spirit, i.e., the gift and grace of union which, as gratuitous, is attributed to the Holy Spirit.

His grace is termed habitual insofar as the soul of Christ was full of grace and wisdom: "the Only Begotten of the Father, full of grace and truth" (above 1:14). We might wonder if Christ did receive this grace without measure. For since such grace is a created gift, we must admit that it has a finite essence. Therefore, as far as its essence is concerned, since it is something created, this habitual grace was finite. Yet Christ is not said to have received this in a limited degree for three reasons.

First, because of the one who is receiving the grace. For it is plain that each thing's nature has a finite capacity, because even though one might receive an infinite good by knowing, loving and enjoying it, nevertheless one receives it by enjoying it in a finite way. Further, each creature has, according to its species and nature, a finite amount of capacity. But this does not make it impossible for the divine power to make another creature possessing a greater capacity; but then such a creature would not be of a nature which is specifically the same, just as when one is added to three, there is another species of number. Therefore, when some nature is not given as much of the divine goodness as its natural capacity is able to contain, then it is seen to be given to it by measure; but when its total natural capacity is filled, it is not given to it by measure, because even though there is a measure on the part of the one receiving, there is none on the part of the one giving, who is prepared to give all. Thus, if someone takes a pail to a river, he sees water present without measure, although he takes the water by measure on account of the limited dimensions of the pail. Thus, the habitual grace of Christ is indeed finite according to its essence, but it is said to be given in an infinite way and not by measure or partially, because as much was given to him as created nature was able to hold.

Secondly, Christ did not receive habitual grace in a limited way by considering the gift which is received. For every form or act, considered in its very nature, is not finite in the way in which it is made finite by the subject in which it is received. Nevertheless, there is nothing to prevent it from being finite in its essence, insofar as its existence (esse) is received in some subject. For that is infinite according to its essence which has the entire fulness of being (essendi): and this is true of God alone, who is the supreme esse. But if we consider some "spiritual" form as not existing in a subject, for example, whiteness or color, it would not be infinite in essence, because its essence would be confined to some genus or species; nevertheless it would still possess the entire fulness of that species. Thus, considering the nature of the species, it would be without limit or measure, since it would have everything that can pertain to that species. But if whiteness or color should be received into some subject, it does not always have everything that pertains necessarily and always to the nature of this form, but only when the subject has it as perfectly as it is capable of being possessed, i.e., when the way the subject possesses it is equivalent to the power of the thing possessed. Thus, Christ's habitual grace was finite according to its essence; yet it is said to have been in him without a limit or measure because he received everything that could pertain to the nature of grace. Others, however, do not receive all this, but one receives in one way, and another in another way: "There are different graces."

The third reason for saying that the habitual grace of Christ was not received in a limited way is based on its cause. For an effect is in some way present in its cause. Therefore, if someone has an infinite power to produce something, he is said to have what can be produced without measure and, in a way, infinitely. For example, if someone has a fountain which could produce an infinite amount of water, he would be said to have water in an infinite way and without measure. Thus, the soul of Christ has infinite grace and grace without measure from the fact that he has united to himself the Word, which is the infinite and unfailing source of the entire emanation of all created things.

From what has been said, it is clear that the grace of Christ which is called capital grace, insofar as he is head of the Church, is infinite in its influence. For from the fact that he possessed that from which the gifts of the Spirit could flow out without measure, he received the power to pour them out without measure, so that the grace of Christ is sufficient not merely for the salvation of some men, but for all the people of the entire world: "He is the offering for our sins; and not for ours only, but also for those of the entire world" (1 Jn 2:2), and even for many worlds, if they existed.
'''
