[[commentary]]
quote='''
He shows next why no matter how pure he is he cannot defend himself for being convicted as impure by God because of two things in which God excels man. These are the purity of his justice and the authority of his majesty. As to the first, he says, "For he is not a man like myself that I should answer him," as if to say: If any man wants to convict me of impurity, I would be able to resist him, if he should charge me with things he thinks cannot be preserved in man concerning the perfect purity of justice. But I cannot respond in this way to God for there is no defect found in him. As to the second he says, "and he cannot gain a hearing with him as an equal."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
