[[commentary]]
quote='''
For I was hungry, and you gave me to eat etc. Above, the sentence concerning the reward was set forth; here is set forth the sentence concerning merit. From this we should consider that the cause of beatitude is twofold: one on the part of God, i.e., God's blessing; the other on our part, i.e., the merit that comes from free will: for men ought not to be idle, but to cooperate with the grace of God, as is said in 1 Corinthians 15:10: by the grace of God, I am what I am; and his grace in me hath not been void. But although there are many good merits, mention is made only of works of mercy. And from this some have taken occasion for error, saying that men are saved solely through works of mercy, or condemned for the omission of them; so that if someone has committed many sins but exercises himself in works of mercy, he will be saved, according to Daniel 4:24: redeem thou thy sins with alms, and thy iniquities with works of mercy to the poor; against what is found in Romans 1:32: they who do such things, namely sins, are worthy of death. And Galatians 5:21, after the enumeration of carnal sins, says: they who do such things shall not obtain the kingdom of God. Therefore this view is not to be held. But it could be that someone abstains and repents, and thus through almsgiving can be freed: for a man should begin almsgiving from himself; Sirach 30:24: have pity on thy own soul, pleasing God. And why is mention made of these works rather than of others? It should be said, according to Gregory, that he sets forth these as the lesser works: for if they do not do these things that nature dictates, much less will they do others. And this accords with the words of the Gospel, because they say, when did we see thee hungry and fed thee? etc., as if to say: this is a small thing. And since they consider it so little, the Lord exalts it the more, saying, as long as you did it to one of these my least brethren, you did it to me. Augustine says that all men sin in the world, yet not all are condemned; but those who do not repent and do not make satisfaction. But he who repents and promises satisfaction through works of mercy is saved. Origen says that under works of mercy all good deeds are mentioned, or else they are omitted on account of the omission of such works. And it is signified that almsgiving is done not only to one's neighbor, but also to oneself: for if a man feeds the hungry, much more ought he to feed himself when hungry, and so with the other works. Likewise, there are not only corporal alms, but also spiritual ones; therefore whatever a man does either for his own benefit or for his neighbor's, the whole is contained under the work of mercy. Hence all things are contained either under these or under their contraries. There are seven works of mercy, but only six are touched upon. These seven are contained in the verse: I visit, I give drink, I feed, I ransom, I clothe, I shelter, I bury. But burial is not touched upon here. Why not? To exclude the error of some who said that souls do not attain rest until the body is buried. But this is not true, because the soul receives nothing from the body when it is separated from it. He sets forth, then, six works that are performed against various deficiencies. And because there is a certain general deficiency and a certain special one, he treats first of the general, then of the special. And because some deficiencies are from the exterior and some from the interior, he first touches upon deficiencies on the part of the interior, then from the exterior. He says, then, I was hungry, and you gave me to eat. This is found in Isaiah 58:7: deal thy bread to the hungry. I was thirsty, and you gave me to drink, because for my sake you gave to your neighbor. Hence above, 10:42: whosoever shall give to drink to one of these little ones a cup of cold water, he shall not lose his reward; of these two, Proverbs 25:21: if thy enemy be hungry, give him to eat; if he thirst, give him water to drink. Likewise, there are deficiencies from the exterior, and these are twofold, namely, from a covering that is joined and from one that is separate. He says, then, I was a stranger, and you took me in. Hebrews 13:2: be not forgetful of hospitality; for by this some, being not aware of it, have entertained angels.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
