[[commentary]]
quote='''
The field is the world, which he himself created; hence above he said, in his field; John 1:11: he came unto his own, etc. Likewise ibid.: the world was made by him. And the good seed, these are the children of the kingdom, from whom others were propagated, who were good sons; and if sons, heirs also, Rom 8:17. Then he explains what pertains to the oversowing, and says what the seed is. And the weeds are the children of the wicked one; Isa 1:4: woe to the sinful nation, a seed of evildoers, wicked children.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
