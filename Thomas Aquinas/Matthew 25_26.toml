[[commentary]]
quote='''
And his lord answering said to him. Here the condemnation of the servant is presented. And just as in the case of the other servants he first commended them, then set forth the equity of the judgment, and afterwards the reward; so in this case, first he rebukes him; secondly, he sets forth the equity of the judgment; thirdly, the punishment. The second is at you knew that I reap where I sow not, etc.; the third is at take therefore the talent from him. He says therefore: wicked and slothful servant. He calls him a servant because he gave up out of fear, and it is characteristic of servants to fear servilely. And therefore Romans 8:15: you have not received the spirit of bondage again in fear. Likewise he calls him wicked because he spoke evil of his lord; above at 12:35: an evil man out of an evil treasure of his heart brings forth evil things. Likewise he calls him slothful because he refused to work; Proverbs 20:4: because of the cold the sluggard would not plow, because of the cold, namely, of fear. You knew that I reap where I sow not, etc. Now he argues against him from his fault. And first he sets forth what he knew; secondly, what he ought to have done; thirdly, what would have followed from it. He says therefore you knew that I reap where I sow not, and yet you did not work; whereas Luke 12:47 has: the servant knowing the will of his lord and not doing, shall be beaten with many stripes. Likewise he had said that he was hard and that he gathered where he did not sow. The Lord indeed acknowledges that he reaps where he does not sow; but he does not acknowledge that he is hard, because what he requires of man he does not do out of hardness, but out of mercy, so that his good may be multiplied.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
