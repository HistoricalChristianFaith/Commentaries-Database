[[commentary]]
quote='''
After showing that God's grace is given to men as a result of God's election through which men are called to grace, the Apostle shows that such election or calling applies not only to the Jews—as if they could boast on account of what is said in Deuteronomy: he loved your fathers (Deut 4:37)—but also to the gentiles.
First, he states the intended proposition;
second, he proves it, at as in Hosea he says;
third, he draws the conclusion, at what then shall we say?
First, therefore, he says: we have stated that God prepared the saints for glory, whom he also has called, namely, by his grace, not only of the Jews but also of the gentiles: is God the God of the Jews only? Is he not the God of gentiles also? (Rom 3:29); they shall adore him, every man from his own place, all the islands of the gentiles (Zeph 2:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
