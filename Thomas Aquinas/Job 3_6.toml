[[commentary]]
quote='''
After he curses the day of his birth, he next curses the night of his conception using a similar style. First, he attributes to it the reason why the night is rendered very horrible. Since night is frightful in itself because of darkness, the deeper the darkness of the night, the more frightful it is. This happens when a great storm arises during the night. So the text continues, "let a tempest envelop that night with a whirlwind," as if he were to say: It would have been fitting for that night to be seized by some dark whirlwind to correspond to my life which is enveloped by such a great whirlwind of misfortune.

Then he takes away from the night what seems to pertain to the good of the night, first as to the opinion of men. For since men divide up the times by what happens during those times, things which happen at night seem small and hardly worth remembering. So night is not accounted anything in itself in the memories of men, but in connection with the day. He removes this good from the night about which he is speaking saying, "Let it not be reckoned among the days of the year; let it not be numbered among the months." Here he says in effect: That night is not worth remembering since nothing important happened on it, but rather something which causes sorrow.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
