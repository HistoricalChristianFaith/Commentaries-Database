[[commentary]]
quote='''
Since it seemed to him that he had spoken effectively, he invites Job to listen quietly to the things which remain. He says, "Listen, Job," in your heart, "and hear me," with your ears, "be silent while I speak," and do not interrupt me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
