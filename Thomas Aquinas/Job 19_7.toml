[[commentary]]
quote='''
Cure can be found in adversities first through human aid in two ways. In one way in the deed itself, for example, when someone is violently oppressed by someone else and he receives aid from another. He rejects this saying, "Behold, I will cry aloud while I am suffering attack and no one will hear me," as if he should say: If I cry aloud against those who oppress me violently, no one would heed so that he comes to my aid. In another way after the deed, for example, when someone who has suffered injury complains to a judge who restores and vindicates him by his sentence. He rejects this saying, "I will cry out and there is no one to judge," that is, if I cried out in complaint, there would be no judge present who would free me by his judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
