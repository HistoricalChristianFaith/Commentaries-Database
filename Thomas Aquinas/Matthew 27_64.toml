[[commentary]]
quote='''
Likewise, the petition is set forth: "command therefore the sepulchre to be guarded." The very zeal of the Jews profits us for certainty; hence the more they intended to harm, the more they advanced the salvation of believers; Job 5:13: "he catcheth the wise in their craftiness," because what they intend, the Lord turns to another end. Then the intention of the petition is set forth: "lest perhaps his disciples come and steal him away, and say to the people: he is risen from the dead": and in this they prophesied; therefore they sinned all the more, because they saw wondrous things, and yet they did not believe he could rise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
