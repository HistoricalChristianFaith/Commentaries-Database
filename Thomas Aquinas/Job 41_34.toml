[[commentary]]
quote='''
Another is that Leviathan has the power to do great and powerful actions, and he explains this saying, "he sees everything which is sublime," that is, the intention of the devil is to attach himself to whatever is sublime. As these properties are characteristic of pride, he shows as a consequence that the devil is not only proud in himself, but he exceeds everyone in pride and is the source of pride in others. So he continues, "he is the king over the all the sons of pride," that is, over those who are slaves of pride, who all follow his leadership. Consider, then, that the Lord has begun to clearly show the action which he works in evil men with the proud, (40:6) and so he completes his narrative with the proud. This is to show above all that Job had to fear that the devil, who desired to tempt him, tried in a special way to tempt him to pride, and thus to transfer him to his kingdom. Therefore, he should beware of affection and words which have the flavor of pride.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
