[[commentary]]
quote='''
He shows that he should have chosen this for himself so as not to have been subject to the evils of this life. So he says, "There," in the state where those are who after they were conceived did not see the light of day, "the wicked cease from troubling," from the trouble they caused others in afflicting them, cleansed from the evil of fault. "And there," in the state of the dead, "the weary" warriors who are worn out from the struggle, "are at rest," i.e. they are free from labor like this, because as was explained, he speaks now only of the rest from the evils of this present life. This passage can also be understood of the fatigue one suffers in any kind of work where he uses his own strength.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
