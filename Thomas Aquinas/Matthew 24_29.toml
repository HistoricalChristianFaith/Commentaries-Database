[[commentary]]
quote='''
And because these things will not only be manifest through tribulations, therefore he says: and immediately after the tribulation of those days the sun shall be darkened etc. And here he treats of signs taken from other things that are above us. And first he sets forth the signs; secondly, the effects. In those things that are above us he shows a threefold order: the heavenly bodies, the angels, Christ. Ephesians 1:21: He set him above all power and principality etc. Therefore regarding the first he says, and immediately after the tribulation of those days, namely, when the Antichrist will come. Immediately, because not long after, since for many it would be a danger; and this is against those who set forth a fable about a thousand years. The sun shall be darkened, and the moon shall not give her light. And what is this? This statement has both a literal and a mystical sense. Insofar as it refers to the last coming, it has a literal sense; insofar as it refers to another coming, a mystical sense. But it seems to be objected that he says the sun shall be darkened, because it is said in Isaiah 30:26: And the light of the moon shall be as the light of the sun, and the light of the sun shall be sevenfold. Hence to see this clearly you must distinguish three times: the time before the coming, the time of the coming, and after the coming. Before the coming of Christ these disturbances will occur, of which it is said here, and Joel 2:31: The sun shall be turned into darkness, and the moon into blood, before the great and terrible day of the Lord comes. At the coming of Christ they will not be changed in substance, but by comparison, because so great will be the brightness of Christ and the saints that their brightness will not even appear; Isaiah 24:23: The moon shall blush and the sun shall be confounded. But after the day of judgment the brightness of the moon and stars will be increased. And then what is said in Isaiah 30:26 will be true, namely, that the light of the sun shall be sevenfold, as the light of seven days. But it seems false that the stars will fall from heaven, because one star is larger than the whole earth. Rabanus solves this by the text of Mark 13:25, that the stars shall be falling, i.e., diminished in light. But from what could this diminution arise? The light of any luminary is diminished from two causes: either in itself, or on account of something interposed, as when a cloud is interposed, or when the moon is eclipsed, its light is diminished. Hence Origen says this can be understood in two ways. First, that what will be interposed is the fire that will precede Christ and consume all things up to the middle of the air, namely, as high as the waters of the flood rose, and much smoke will follow this fire, so that the luminaries of heaven will be darkened. Or it can be said that some held these bodies to be corruptible; and just as the elementary bodies will be changed, so also these. Concerning these three things there is one text, Apocalypse 6:12: The sun became black as sackcloth of hair, and the whole moon became as blood, and the stars from heaven fell. The stars shall fall from heaven. Stars seem to fall from heaven when they are deprived of their light. So therefore there will be a change in the heavenly bodies. Likewise in the angels; hence he says, and the powers of heaven shall be moved, i.e., the powers that minister to God. And Augustine says that all bodies are administered by the spirit of life; hence they are said to be moved in their effect, because at the coming of the Lord the motion of heaven will cease. Hence those powers are said to be moved when those things that pertain to their office are changed into another state. Or the angels will be moved not by a movement of fear but of admiration, because they will admire the power of Christ. Or they will be moved with a movement of joy over the glorification of the saints. Of this can be taken what is said in Job 26:11, that the pillars of heaven tremble and are amazed at his movement.

Origen says: by the sun the devil is signified, by the moon the Antichrist. Of these it is said in Job 31:27: If I beheld the sun when it shone, and the moon advancing in brightness, and my heart rejoiced in secret. I beheld, i.e., I approved the sun, i.e., those things that seem to have brightness and holiness and power; then they will appear. 1 Corinthians 4:5: He will bring to light the things hidden in darkness and will make manifest the counsels of hearts. Hence all teaching, all brightness will then appear, because the image of Christ will appear in all. Or by the sun the Church is signified; hence the Church on account of tribulations will seem not to shine. And why does he say after the tribulation? Origen answers: both after and at the same time. Likewise, stars, i.e., those who afterward seemed to shine. The powers of heaven, i.e., the saints, will be moved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
