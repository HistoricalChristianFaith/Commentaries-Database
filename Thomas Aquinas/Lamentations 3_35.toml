[[commentary]]
quote='''
Second, perversity of a judge is excluded: "To turn aside the right of a man in the presence of the Most High." That is, from rectitude. Add to Verse 36: "the Lord does not approve." And, Job 34:12: "Of a truth, God will not do wickedly, and the Almighty will not pervert justice."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
