[[commentary]]
quote='''
Then when he says "and may the Lord," he prays for them, saying "may the Lord direct your hearts," namely that you may reach the goal. "It belongs to man to prepare his soul, but to direct the tongue belongs to the Lord" (Prov 16:1). And a little further down it says, "a man's heart arranges his way, but the Lord directs his steps" (Prov 16:9), namely, to his destined reward. And this is why he says, "may the Lord direct your hearts," not only our exterior works, and this "in the charity of God."

Now there are two things through which we advance on the way of salvation, namely the good things we do and the bad things we endure. But works are not good unless they are directed to the goal of love. "The goal of the precept is love" (1 Tim 1:5). Neither is patience good except through Christ. "In patience you will possess your souls" (Luke 21:19). "Blessed are you when men speak evil of you" (Matt 5:11). And this is why he says "and the patience of Christ," i.e., endurance of bad things for Christ's sake, or after his example. "Christ has suffered for you, leaving you an example" (1 Pet 2:21).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
