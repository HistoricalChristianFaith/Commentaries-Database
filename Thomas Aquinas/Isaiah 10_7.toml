[[commentary]]
quote='''
But he shall not take it so. Here the abuse of the power conceded to the Assyrian is set out, insofar as he exceeded the ends of the mandate; and first, his intention is set out; second, the motive of his intention is set out: for he shall say (Isa 10:8). Concerning the first, he does two things: first, he dismisses the fixed measure of the mandate, both as to the judgment of reason: but he shall not take it so, and as to the intention of the heart: his heart shall not think so, that is, he will assess the punishment; second, he increases the punishment both as to manner: to grind to pieces, that is, utterly destroy everything, and as to number: nations not a few, but rather many, not only those to whom he was sent: you have devised confusion to your house, you have cut off many people, and your soul has sinned (Hab 2:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
