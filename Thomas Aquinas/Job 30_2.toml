[[commentary]]
quote='''
Third, as to their meanness of power. So he says, "whose strength of hands," either the detractors or even their fathers, "held nothing," for I regarded all their power as worth nothing. This is contrary to what he said already, "generals governed their tongues." (29:10) Fourth, as to their lack of honor, and so he says, "and they were not accounted worthy of life itself," because of their numerous grave sins. This is the contrary to the parallel statement he made, "The ear which heard, blessed me." (29:11)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
