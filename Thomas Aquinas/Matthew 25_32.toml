[[commentary]]
quote='''
Next is set forth the gathering; second, the division. He says, then, and all nations shall be gathered together. By nations are signified not only the gentiles, but all men who have been born from Adam to the end of the world; 2 Corinthians 5:10: we must all be manifested before the judgment seat of Christ, that every one may receive the proper things of the body, according as he hath done, whether it be good or evil. Among these even infants who have been born are included, because even if they have nothing by their own merit, they nevertheless have something, namely, either guilt from the sin of the first man, or grace from the sacrament of Christ. Hence it should be noted that not all of these will be gathered to the same place; rather there will be a fourfold category of those who will appear at the judgment. For some will appear to be judged through a discussion of merits; but of these, some will be condemned, and some saved. Others, however, will receive their sentence without discussion. For to be judged is said in two ways: namely, either to receive a sentence, because all will either be rewarded or punished; or to be judged is said in the sense of rendering an account through a discussion of merits. And this discussion will not be necessary for all, because the sins and merits of those especially will be discussed who were united to Christ through faith: for those who are entirely estranged from Christ do not need discussion, according to what is said in John 3:18: he who does not believe is already judged. Gregory gives an example: one who captures his enemy in battle does not wait for a trial, but he is already judged, and so forth. Likewise, some have nothing in common with the world, because they left all things for the sake of Christ, and these will appear as judges; hence above, 19:28: you who have followed me shall sit upon twelve seats, judging the twelve tribes of Israel. Who then are those who will be judged? The faithful who are entangled in worldly affairs, of whom some use them well, as we read in 1 Timothy 6:18: charge the rich to do good, to be rich in good works, to give easily, to communicate etc. But those who are held fast and entangled by them will be condemned. But what is the necessity? Do not all receive at death what they have merited? For what purpose, then, will they be judged? It should be noted that the reward which is given to men by God's just judgment is twofold: the first is the stole of the soul, and the second is the stole of the body. As regards the stole of the soul, it is received at death, but then they will receive the glory of the body at the same time. Hence, as regards the soul, all receive their bodies at the same time, but as regards punishment, all will be condemned together; hence Isaiah 24:22: they shall be gathered together as in the gathering of one bundle, because they are one in sin. We can understand this gathering as a local gathering, because all will be gathered in one place; Joel 3:2: I will gather together all nations, and will bring them down into the valley of Josaphat; because those who are saved are saved through the passion of Christ, and those who are condemned are condemned through contempt of his passion; therefore where the passion of Christ took place, there will be the judgment. And it should be understood that the good will meet him in the air, but some will remain on the earth. According to Origen, this gathering will not be local, but they will be dispersed, and in their individual places they will be gathered; and this is what was said above, 24:27, that as lightning cometh out of the east and appeareth even into the west, so shall also the coming of the Son of man be, because wherever they are, he will be present there. Hence he holds that it will be a spiritual gathering, because now some are scattered from him and some hold fast to him; but then all will be gathered together; Isaiah 40:5: all flesh shall see the salvation of our God. Then he treats of the separation: and he shall separate them one from another, as the shepherd separateth the sheep from the goats. Note that as long as the world lasts, the wicked are mingled with the good. There is scarcely any society in which some are not wicked; Song of Songs 2:2: as the lily among the thorns, so is my love among the daughters. But in that judgment the wicked will be on one side and the good on the other; Sirach 35: he shall judge between sheep and goats. But why does he call the good sheep? This is for four reasons. For we find in sheep innocence, 2 Kings 24:17: these who are the sheep, what have they done? Likewise, patience; Isaiah 53:7: he shall be led as a sheep to the slaughter, and shall be dumb as a lamb before his shearer, and he shall not open his mouth. Likewise, Psalm 43:22: we are counted as sheep for the slaughter. Likewise, obedience, because they are gathered at the voice of the shepherd; John 10:27: my sheep hear my voice. Likewise, an abundance of fruits: just as from a sheep we receive many fruits, so many are the fruits of the good; Ezekiel 34:3: you ate the milk, and you clothed yourselves with the wool. Likewise, by goats he understands sinners, because the goat is an animal that goes along precipices, is also fervent for mating, and has contrary properties; also, it was offered for sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
