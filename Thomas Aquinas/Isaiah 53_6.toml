[[commentary]]
quote='''
Third, he shows the imminent necessity on our part, for all are sick, and thus all need a physician, and no one else can offer a sufficient remedy: for there is no distinction of Jew and Greek, for all have sinned and do need (Rom 3:22–23) penance; all we like sheep have gone astray: for you were as sheep without a shepherd (1 Pet 2:25).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
