[[commentary]]
quote='''
Just as the ostrich has some properties which differ from other animals and in which he is deficient from other animals, so also the horse has some noble properties by which he differs from other animals. First he notes the strength of the horse when he says, "Will you give the horse his might," not only strength of body to carry a heavy load, but also of soul to run to dangers bravely? He notes still another property of the horse, that is, he is provoked to libido by his exterior adornment. For it is said of horses that they are driven to intercourse by the adornment of manes, and "Cut the mane and their libido is extinguished." To show this he says, "Will you clothe his neck with neighing?" For horses usually neigh because of libido, as Jeremiah says, "They became horses loving women and were made messengers, each one neighed for his neighbor's wife." (5:8) Thus God surrounds the neck of the horse with neighing when God gives him manes, from which he is provoked to sexual desire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
