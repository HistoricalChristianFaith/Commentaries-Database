[[commentary]]
quote='''
Hence he adds: People usually serve the choice wines first, and when the guests have had their fill, then they bring out inferior wine.

Here we should consider, according to Chrysostom, that everything is most perfect in the miracles of Christ. Thus, he restored most complete health to Peter's mother-in-law, so that she arose at once and waited on them, as we read in Mark (1:30) and Matthew (7:14). Again, he restored the paralytic to health so perfectly that he also arose immediately, took up his mat, and went home, as we read below (5:9). And this is also evident in this miracle, because Christ did not make mediocre wine from the water, but the very best possible. And so the head waiter says, People usually serve the choice wines first, and when the guests have had their fill, then they bring out inferior wine, because they drink less, and because good wine consumed in quantity along with a quantity of food causes greater discomfort. It is as though he were saying: Where did this very good wine come from which, contrary to custom, you saved until now?

This is appropriate to a mystery. For in the mystical sense, he serves good wine first who, with an intent to deceive others, does not first mention the error he intends, but other things that entice his hearers, so that he can disclose his evil plans after they have been intoxicated and enticed to consent. We read of such wine: "It goes down pleasantly, but finally it will bite like a serpent" (Prv 23:31). Again, he serves good wine first who begins to live in a saintly and spiritual manner at the start of his conversion, but later sinks into a carnal life: "Are you so foolish as, having begun in the Spirit, to end in the flesh?" (Gal 3:3).

Christ, however, does not serve the good wine first, for at the outset he proposes things that are bitter and hard: "Narrow is the way that leads to life" (Mt 7:14). Yet the more progress a person makes in his faith and teaching, the more pleasant it becomes and he becomes aware of a greater sweetness: "I will lead you by the path of justice, and when you walk you will not be hindered" (Prv 4:11). Likewise, all those who desire to live conscientiously in Christ suffer bitterness and troubles in this world: "You will weep and mourn" (below 16:20). But later they will experience delights and joys. So he goes on: "but your sorrow will be turned into joy." "I consider that the sufferings of this present time are not worthy to be compared with the glory to come, which will be revealed in us," as is said in Romans (8:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
