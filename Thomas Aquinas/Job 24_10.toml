[[commentary]]
quote='''
This would be tolerable somehow if they wanted to take away things from people who at least had enough. Thus he continues increasing their evils saying, "From the naked," those not having any clothes, "from those going about without any clothes," who from extreme need must even go out in public naked without clothes which pertains to a great lack of clothing. To show that they suffered want in food also he says, "and from the hungry." They cannot take away anything of great value from these men, but they are not ashamed to steal what little they have, and so he then says, "they have stolen the ears of wheat," as if to say: They have not taken from them a harvest which they do not have but some small ears of grain which they had collected for themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
