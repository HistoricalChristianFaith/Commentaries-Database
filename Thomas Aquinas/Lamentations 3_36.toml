[[commentary]]
quote='''
Third, a perverse intention within divine justice is also excluded. Like to those judges, under a guise of justice, intend to oppress some persons. "To subvert a man in his cause, the Lord does not approve." That is, from judgment: "the Lord does not approve." As Proverbs 4:27 admonishes: "Do not swerve to the right or to the left; turn your foot away from evil."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
