[[commentary]]
quote='''
"And let them hope." Above, the Psalmist set forth the deed for which he gave thanks and the authority of the doer; here he sets forth the fruit of the deed. And first, as regards others; second, as regards himself, at "Have mercy on me, Lord, see," etc. First, he sets forth a threefold fruit in others. The first is knowledge, or confidence in the name of God. The second is spiritual, the joy of those who love him. The third is the proclamation of his name. The second, at "sing psalms." The third, at "announce." He introduces these fruits by way of exhortation; and regarding this he does three things. First, he urges them to hope. Second, he shows to whom it belongs to hope. And third, why. He says therefore, "and let them hope in you." Sir. 2: "You who fear the Lord, hope in him." But whence does this come? Because "they know your name." For hope arises from two things: that he is powerful -- and this is evident, because "Lord" is his name -- and that he is willing, because he is supremely good; hence Lk. 18: "No one is good except God alone." And especially this name Jesus: Mt. 1: "He shall save his people," etc. Phil. 2: "At the name of Jesus every knee shall bend." And why? "Because you do not forsake those who seek you." Wis. 1: "He is found by those who do not test him; and he appears to those who have faith in him," namely those who seek him with good intention; because the wicked do not find him. Jn. 7: "You shall seek me and shall not find me." Likewise, where he is, because he is not among kindred and acquaintances, Lk. 2; Job 28: "Nor is it found in the land of those who live pleasantly." Third, he leads to the second fruit, namely to joy. "Sing psalms to the Lord who dwells in Zion." The Lord is said to dwell in a place not corporally: 2 Sam. 6: David placed the ark in Zion; but according to truth he dwells in the Church. Zion is interpreted as "watchtower," and in the Church we contemplate eternal things. To this Lord, therefore, we ought to sing psalms, that is, to rejoice in heart and mouth and deeds, for benefits given. Third, he leads to the third fruit, "announce." 1 Pet. 4: "Each one, as he has received grace, administering it to one another." And therefore first he induces that they ought to announce. Gregory: "He gathers abundant fruits of his preaching who sends forth the seeds of good work beforehand." "Among the nations," that is, among those living in a pagan manner, that is, among sinners. Is. 21: "Coming to meet the thirsty, bring water." "His endeavors," that is, his care or solicitude for the salvation of the human race. Jer. 29: "I think thoughts of peace." Second, he explains these endeavors, at "because he who requires," etc. That which someone does with zeal and diligence, he does not forget to do. But God is zealous for the salvation of men, and therefore he does not forget. Two things cause forgetfulness: namely death. Ps. 30: "I am given to oblivion like one dead from the heart"; likewise poverty. Prov. 19: "The brothers of a poor man hate him." Rev. 6: "Why do you not avenge?" etc. But does God not forget the dead? "Because he who requires their blood," that is, of those who seek you, even if it happens that they are killed; and this by judging. Or, he will require the blood of the saints, in the resurrection, by restoring it. Wis. 5: "Behold how they are numbered," etc. He is said to "remember," not that he had forgotten, but because he seems to have forgotten on account of the delay. Also, he does not forget the poor and the little ones; hence, "he has not forgotten the cry of the poor." Ps. 33: "This poor man cried out," whether in dangers or in prayer. Jas. 5: "Their cry," etc. Ps. 21: "He has not despised nor rejected the prayer of the poor." Ex. 3: "I have surely seen the affliction of my people who are in Egypt, and I have come down to deliver them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
