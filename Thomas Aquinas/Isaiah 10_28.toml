[[commentary]]
quote='''
He shall come into Aiath. Here their escape is described in particular. And first, the oppression is set out, numbering the cities through which he passed coming from Egypt to Jerusalem: he shall come from Egypt, into Aiath, he shall pass, in haste, into Magron; at Machmas, a certain city, he shall lay up his carriages, he shall send away part of his goods so that he might come unencumbered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
