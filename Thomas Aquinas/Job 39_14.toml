[[commentary]]
quote='''
There is, however, another property of the ostrich which distinguishes it from other birds, i.e., that she does not hatch her own eggs, but digs in the sand, deposits them there and covers them with sand, and so he says, "she leaves her eggs in the earth." She has a natural instinct for recognizing hot weather, namely, when the constellation called Virgo begins to appear in the month of July. Then she lays the eggs, and so, thanks to the heat of the season and the place, (because she lives only in hot climates,) the eggs are hatched and the chicks come out of them. So he says, "Will you perhaps heat them in the dust?" He implies the answer, "No". This happens by divine providence which even incubates eggs in the sand unharmed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
