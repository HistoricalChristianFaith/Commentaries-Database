[[commentary]]
quote='''
To the objection that this proof which he introduced on the basis of the righteousness of his life is not fitting, he shows as a consequence that the most certain and demonstrative proof cannot be introduced about divine judgments because of the incomprehensibility of the divine will. So he then says, "Truly he is alone," as if to say: There is no other creature like or equal to him who can comprehend him, and consequently his will. So he then says, "and no one can perceive," know with certainty, "his thoughts," the dispositions of his judgments. As the order in his judgment cannot be fully understood, so neither can it be resisted by any creature, and the text continues, "whatever his soul (the will) willed, he did," for no one is able to resist.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
