[[commentary]]
quote='''
"Now all this was done" etc. Here the reason for the command is presented. Lest anyone believe that this was done without reason, he therefore shows the reason: "that it might be fulfilled which was spoken by the prophet" etc. This is said through Zechariah (9:9). But the word "that" is taken not causally, but consecutively. For he does not act because the prophet had spoken, but rather the reverse: for Christ is the end of prophecy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
