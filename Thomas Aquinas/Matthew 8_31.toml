[[commentary]]
quote='''
If you cast us out, send us out into the swine. But why did they not ask that he send them into men? Because they saw that he was solicitous about caring for men. But why into the herd of swine? Because they were close by. Also because it is a very unclean animal. So, to designate uncleanness, he permits them to enter the swine. And this seems to be signified in Job (41:3): "Will he multiply supplications to you? Will he speak soft words to you?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
