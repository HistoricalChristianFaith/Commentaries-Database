[[commentary]]
quote='''
934. Third, he shows the order of comfort: he shall quickly come, namely, Cyrus, that is going to open, the prison for the captives, and he shall not kill you, like the other kings of the Chaldeans, neither shall the bread of his sustenance fail you, above: bread is given him (Isa 33:16), above: and I have given you for a covenant of my people (Isa 42:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
