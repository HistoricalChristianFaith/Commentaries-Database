[[commentary]]
quote='''
He now proves what he had said above about the dignity of his sheep, namely, that no one can snatch them from his hand. His reason is this: No one can snatch what is in the hand of my Father; but the Father's hand and mine are the same; therefore, no one can snatch what is in my hand. Concerning this he does three things: first, he gives the minor premise by showing that the Father had communicated divinity to him, saying, what my Father has given to me, through an eternal generation, is greater than all. "For as the Father has life in himself, so he has granted the Son also to have life in himself" (5:26). It is greater than any power: "He has given him authority to execute judgment, because he is the Son of man" (5:27); it is greater than any reverence and honor: "God had bestowed on him the name which is above every name, that at the name of Jesus every knee should bow" (Phil 2:9). Therefore, what my Father has given to me, that is, that I am his Word, his only begotten, and the splendor of his light, is greater than all.

Secondly, he mentions the greatness of the Father's power, which concerns the major premise, when he says, and no one is able to snatch, take by violence or secretly pilfer, out of my Father's hand, from the power of my Father, or from me, who am the might of the Father - although as Augustine says, it is better to say "from the power of the Father" than "from me." Now no one is able to snatch out of my Father's hand, because he is the almighty One who is not subject to violence, and he is all-wise from whom nothing is hidden: "He is wise in heart, and mighty in strength" (Job 9:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
