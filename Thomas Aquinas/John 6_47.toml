[[commentary]]
quote='''
After our Lord quieted the grumbling of the Jews, he now clears up the doubt they had because of his saying, "I am the bread that has come down from heaven." He intends to show here that this is true. This is the way he reasons: The bread which gives life to the world descended from heaven; but I am the bread that gives life to the world: therefore, I am the bread which descended from heaven. He does three things concerning this. First, he presents the minor premise of his reasoning, that is, I am the bread of life. In the second place, he gives the major premise, that is, that the bread that descended from heaven ought to give life (v 49). Thirdly, we have the conclusion (v 51). As to the first he does two things. First, he states his point; secondly, he expresses it as practically proved (v 48).

His intention is to show that he is the bread of life. Bread is life-giving insofar as it is taken. Now one who believes in Christ takes him within himself, according to: "Christ dwells in our hearts through faith" (Eph 3:17). Therefore, if he who believes in Christ has life, it is clear that he is brought to life by eating this bread. Thus, this bread is the bread of life. And this is what he says: Amen, amen, I say to you: Whoever believes in me, with a faith made living by love, which not only perfects the intellect but the affections as well (for we do not tend to the things we believe in unless we love them), has eternal life.

Now Christ is within us in two ways: in our intellect through faith, so far as it is faith; and in our affections through love, which informs or gives life to our faith: "He who abides in love, abides in God, and God in him" (1 Jn 4:16). So he who believes in Christ so that he tends to him, possesses Christ in his affections and in his intellect. And if we add that Christ is eternal life, as stated in "that we may be in his true Son, Jesus Christ. This is the true God and eternal life" (1 Jn 5:20), and in "In him was life" (above 1:4), we can infer that whoever believes in Christ has eternal life. He has it, I say, in its cause and in hope, and he will have it at some time in reality.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
