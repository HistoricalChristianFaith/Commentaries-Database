[[commentary]]
quote='''
"The grace," i.e., God's gratuitous gift that renders us pleasing to God; "of our Lord Jesus Christ be with you all. Amen." "Grace and truth came through Jesus Christ" (John 1:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
