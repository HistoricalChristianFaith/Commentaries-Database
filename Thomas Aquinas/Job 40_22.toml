[[commentary]]
quote='''
Since this animal does not desire just any kind of shade but deep dark shade, he says, "The shadows protect his shadow," to say that the smaller shadow is protected by the larger shadow from the heat. He shows the cause of this shade saying, "the falling willows cover him," for willows make a thicker and cooler shade than reeds. According to the literal sense, this animal dwells in shadowy places because he is a melancholy animal with a dry complexion and he lives in hot climates. So he seeks the refreshment of dampness and shade against the warmth and dryness of the summer. By this he describes the fact that the sword of the devil has effect not only in the mountains, i.e. the proud who nourish him with grass and protect the beasts playing in the fields, but also in men who live in leisure, like in the shade. These men take care of this shade for themselves with great zeal so that the shadows thus protect their shadows, and nourish themselves on pleasure as in humid places.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
