[[commentary]]
quote='''
Then he shows the activity of divine providence even in human affairs. If human affairs were to run their course as their arrangement seems to demand, there would appear to be little or no trace of divine providence in them. But when human affairs run their course in another way, foolish men who do not consider higher causes, attribute this to chance or fortune. Solomon personifies them when he says in Qoheleth, "Again I saw that under the sun the race is not to the swift, nor the battle to the strong, nor bread to the wise, nor riches to the intelligent, nor favor to the men of skill; but time and chance happen to all." (9:11) Eliphaz however refers this to a higher cause, namely, to the providence of God. First, as to the oppressed who are raised up from the lowest station to a higher place, he says, "he sets those who are lowly," i.e. those cast down, "on high;" and the sorrowful are born to joy, and regarding this he says, "and he lifts up the mournful to safety with his favor."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
