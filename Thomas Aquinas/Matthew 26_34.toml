[[commentary]]
quote='''
Jesus said to him: amen I say to thee, that in this night before the cock crow, thou wilt deny me thrice. Because you might think that I speak by way of threat, therefore I say to you, amen, i.e., from the heart I say to you, that before the cock crow in this night, thou wilt deny me thrice. And his fault is aggravated by the nearness of time, because in this night. Likewise, by the number, because thrice: just as he had presumed three times, so he denied three times after his presumption; Job 31:27: if my heart hath been secretly rejoiced. But there is a question about this: before the cock crow, thou wilt deny me thrice; because in Mark 14:30 it says: before the cock crow twice. According to Augustine, this can be resolved by saying that what Mark says is historically true. And what Matthew says can be resolved thus: that a man is said to do something when he does it in intention, just as above at 5:28: whosoever shall look on a woman to lust after her, hath already committed adultery with her in his heart. So Peter in his intention denied three times, or even more; from the moment he conceived the fear, that was sufficient for denying three or more times; therefore he says that he denied three times because he had already conceived that he would deny three or more times. Hence Matthew spoke of what he intended interiorly; but Mark of what he did exteriorly. Or it can be said otherwise: that when I say, "I will do this within such a time," it is not necessary that it be completed within that time, but it suffices that it be begun. Hence what he said, that he would deny three times, it was not necessary that it be completed before the cock crowed, but only begun.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
