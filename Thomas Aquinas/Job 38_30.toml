[[commentary]]
quote='''
The other kind of ice is generated from the waters below where the cold is more intense, and so he says, "The waters harden like a stone," because the violent intensity of the cold hardens them to ice. This cold may be so great that in very cold climates even the seas freeze over, and expressing this he says, "and the surface of the deep is frozen," namely, the water which is on the surface is frozen by the cold. But cold air cannot penetrate to the depths of the sea.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
