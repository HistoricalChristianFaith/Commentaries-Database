[[commentary]]
quote='''
Second, the cause of the harm is sometimes from the things themselves in which he sins, as Scripture says, "Riches are amassed to the evil of the one possessing them." (Qoheleth 5:12) Harmful things of this sort come sometimes from things already obtained, and regarding this Baldath says, "A snare is hidden for him in the earth," because in fact some danger lies hidden in earthly things themselves by which the feet of the sinner are caught. But sometimes harmful things of this sort arise when a man is en route to acquiring things, and expressing this he says, "and a trap is set for him on the path," because before the sinner obtains what he seeks the dangers already lie in wait on the way itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
