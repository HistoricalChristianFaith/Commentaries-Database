[[commentary]]
quote='''
After I had given them my counsel, they were happy with it, and so he says, "They dared to add nothing to my words," because of the great wisdom which they valued. Not only did they firmly keep my counsel, but they were also consoled in it, perceiving it to be efficacious to attain their proposed end, and so he says, "and my eloquence fell on them drop by drop," i.e., it cooled them like drops of water.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
