[[commentary]]
quote='''
Then when he says, therefore, he who resists, he draws the conclusion. For if the power of rulers is from God and nothing is from God without order, it follows that the order whereby the lower are subjected to the higher powers is from God. Therefore, he who acts against the order and resists the power, resists the ordinance of God: they have not rejected you, but they have rejected me (1 Sam 8:7); he who rejects you rejects me (Luke 10:16).

But to resist the divine order is contrary to the good of virtue. Hence, whoever resists power in anything that pertains to the order of this power acts against virtue.

Then when he says, those who resist, he shows that this subjection is not only virtuous but necessary. First, he states his proposition; second, he proves it, at for rulers.

He says, therefore: it has been stated that he who resists the power resists the ordinance of God, and this should be avoided as contrary to virtue. Yet there are many who have no love for virtue and who do not detest things contrary to virtue. Such persons must be compelled to avoid evil by punishments. In regard to this he says: they who resist the divine ordinance incur to themselves damnation for acting against the order of authority.

This can be understood in one way as referring to eternal damnation, which is incurred by those who refuse to be subject to authority in matters in which they should be subject. As an example of this, Dathan and Abiron, who resisted Moses and Aaron, were swallowed up by the earth, as it says in Numbers (Num 16:20).

In another way it can be understood as referring to the punishments imposed by the authorities themselves: the dread wrath of a king is like the growling of a lion; he who provokes him to anger forfeits his life (Prov 20:2).

But against this is the fact that the apostles and martyrs seem to have resisted rulers and authorities and did not receive damnation from God as a result but rather a reward. The answer is that the Apostle is now speaking of one who resists a lower power as established by God. But the divine order requires that a lower power not be obeyed in opposition to a higher one, as even in human affairs a governor is not obeyed against an emperor, nor a bailiff against a king. And every human power is set under the divine power, so that no human power should be obeyed against God, as it says in Acts: we must obey God rather than men (Acts 5:29).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
