[[commentary]]
quote='''
Here he places the subtraction of things which make for defense. And first, as to things that pertain to preparing machines of war: either because of their height, and thus he says, "upon all the cedars"; or because of their strength, and thus he says, "upon all the oaks": "open your gates, O Libanus, and let fire devour your cedars" (Zech 11:1); and below this: "howl, you oaks of Basan, because the fenced forest is cut down" (Zech 11:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
