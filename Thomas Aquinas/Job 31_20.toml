[[commentary]]
quote='''
Not only did I not despise those who were poorly clothed, but I even provided them with some clothes, and so he then says, "If his loins have not blessed me," because I covered them when they were naked and this was the occasion when he blessed me. He shows the reason for this saying, "and if he was not warmed with the fleece of my sheep," by the clothing offered to him, let the same punishment happen to me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
