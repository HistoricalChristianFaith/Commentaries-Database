[[commentary]]
quote='''
Second, he threatens punishment: and Isaiah said; as to the loss of his goods: all that is in your house: thus says the Lord to you: I have given all these lands into the hand of Nabuchodonosor king of Babylon (Jer 27:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
