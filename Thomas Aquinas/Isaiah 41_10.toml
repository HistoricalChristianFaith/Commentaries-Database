[[commentary]]
quote='''
Second, the promise of future benefits is set out; and first, as to freedom from evils, he excludes fear, because of the presence of God: fear not, for I am with you: be not afraid at their presence: for I am with you (Jer 1:8); because of the justice of their fathers: I upheld you, as the promised seed, of my just one, Abraham; or: I upheld you, to defend you, my just one, Cyrus: in their hands they shall bear you up: lest you dash your foot against a stone (Ps 90[91]:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'

[[commentary]]
quote='''
815. Christ upheld us, as a conqueror upholds a captive to liberate him: to the prey, my son (Gen 49:9); bring my soul out of prison (Ps 141:8[142:7]); as a physician upholds a sick man to heal him: who forgives all your iniquities: who heals all your diseases (Ps 102[103]:3); as an advocate upholds a defendant to plead to excuse him: we have an advocate with the Father, Jesus Christ (1 John 2:1); as a strong man upholds a weak man to defend him, below: I, that speak justice, and am a defender to save (Isa 63:1); the Lord will fight for you (Exod 14:14); as a husband upholds his wife to rejoice with her: I will espouse you to me (Hos 2:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
