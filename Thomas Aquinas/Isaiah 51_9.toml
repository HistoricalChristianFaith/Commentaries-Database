[[commentary]]
quote='''
929. Arise. Here the discussion of the prophet with God is set out, as if to say: I have not contended that the enemies of the people are confounded or consumed otherwise than by divine strength.

Thus, first, the petition of the prophet is set out;

second, the response of the Lord: I myself (Isa 51:12).

930. Concerning the first, he does two things.

First, he sets out his petition, in which he calls upon the arm of divine power: O you arm of the Lord, that is, the power of God, arise, as if from sleep: arise, why sleep you, O Lord? (Ps 43[44]:23); put on strength, like soldiers put on arms of war, to fight our enemies: the Lord is clothed with strength, and has girded himself with power (Ps 92[93]:1); and have you an arm like God? (Job 40:4). He also alleges a sign of divine strength in the killing of Pharaoh: have not you struck the proud one, and wounded the dragon?, Pharaoh, about whom it says in Ezekiel 29:3: behold, I come against you, Pharaoh king of Egypt, you great dragon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
