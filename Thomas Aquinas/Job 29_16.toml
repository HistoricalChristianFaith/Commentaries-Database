[[commentary]]
quote='''
He also cared for those who were defenseless, and so he says, "I was a father to the poor," for I protected and supported them. Sometimes there are those who wound the poor, the powerless, and the simple calumniously by fraud. He shows a diligent interest against the calumnious process of evil men, and so he says, "And the case of which I was ignorant, I diligently investigated," so that there would lie no fraud hidden there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
