[[commentary]]
quote='''
The burden of Damascus. Here he begins to threaten against those who prepared an occasion of sin for the people of God when, through trust in their help, they cared not to trust in God. And this is divided into two parts: in the first, he threatens against the Syrians, who brought help to the people of the ten tribes; in the second, against the Egyptians, who did so to the two tribes: woe to the land (ch. 18). The first of these is divided into three: in the first, he threatens the destruction of the Syrians who promise help; in the second, the destruction of the ten tribes who trust in that promised help: and it shall come to pass in that day (Isa 17:4); in the third, the destruction of the Assyrians who destroy both of them: woe to the multitude (Isa 17:12).

Concerning the first, he does two things: in the first, he threatens destruction; in the second, he describes the effect of the destruction: and aid shall cease (Isa 17:3). He threatens destruction, first, as to the royal city: Damascus shall cease to be a city, from the pillaging of its people; and shall be as a ruinous heap of stones, from the destruction of its walls: Zion shall be as a field (Mic 3:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
