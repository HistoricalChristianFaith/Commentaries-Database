[[commentary]]
quote='''
In the third place he puts the rulers of cities when he says, "who does not discriminate in favor of the princes," so that he does not accuse and judge them for their sins. In the fourth place he speaks about tyrants who do not enjoy legitimate authority, but have usurped power, and as to them he says, "he did not know (approve) the tyrant (by deferring to him) when he (the tyrant) disputed against the poor man," as if to say: He does not favor the strong against the weak, which expresses his justice. He then says why he does not defer to them, "for they are all the work of his hands," both great and small, and therefore he does not despise the little people but loves them as his own works, nor does he fear the strong, since they are subject to his power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
