[[commentary]]
quote='''
After he begins with these things which concern the refutation of his friends, he goes on to pursue his chief proposition with the intention of showing what they were saying is false: that present adversities always arise because of past sins. Immediately at the beginning he draws an unfitting conclusion from this supposition saying, "At least now, understand that God has not have afflicted me with right judgment," as if to say: If adversities only arise because of sins, the judgment of God by which he afflicted me gravely when I did not sin gravely is not equitable. He says, "At least now," because up to this time, he had not yet enumerated his adversities as particularly as he does now. He says that he has not only been afflicted with adversities, but also hemmed in by them so that he cannot find a way to escape them, and so the text continues, "and he has girded me about with his scourges," because the scourges themselves have taken away the road to the cures, and he begins to pursue this second point first.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
