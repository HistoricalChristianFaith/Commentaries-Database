[[commentary]]
quote='''
Hence, the necessity for fleeing? From the magnitude of the tribulation. Hence, first he sets forth the tribulation and its magnitude; secondly, he sets forth the cause, at and unless those days had been shortened, etc. He says, therefore, for there shall be then great tribulation, such as hath not been from the beginning of the world. And this can be sufficiently perceived by one who reads the history of Josephus: that many died of hunger. Likewise, there were seditions in the city, so that they killed one another; hence, when Titus, who was most merciful, wished to spare them, they themselves refused. Likewise, there were brigands among them who killed many. And a certain woman ate her own son. Hence there was such tribulation as had never been seen. And Luke 21:23-24 says this: There shall be tribulation, and they shall fall by the edge of the sword. But will it be greater in the time of the Antichrist? Yes; but it will not be among the Jews. And Chrysostom asks on account of what sin this happened, because not even the punishment of the Sodomites was so great; hence there would not have been a greater punishment unless the sin was greater. And because they might say that these things happened to them on account of the sins of the Christians, he therefore says that this was not the case.

Origen explains: for there shall be then great tribulation, because there will be a perversion of Christian teaching through false doctrine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
