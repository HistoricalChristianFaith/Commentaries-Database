[[commentary]]
quote='''
Third, after the artisan has determined the size of the foundation and where it is to be located, he determines on what the foundation can be solidly laid. As to this he says, "On what were the bases," of the land, "sunk," because it was founded on the center of the world. Fourth, after thinking through these three things, the artisan now begins to lay the stones in the foundation. First, he lays the corner stone to which the different walls are aligned. As to this he says, "or who has laid," put down, "the cornerstone," on which the very center of the earth is clearly determined, according to which the different parts of the earth are aligned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
