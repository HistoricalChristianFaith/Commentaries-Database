[[commentary]]
quote='''
As someone is bruised from a great distance by stones shot from a sling, so also something is bruised at close quarters by a hammer, but the whale cannot be harmed even in this way by man, and so he says, "He will treat the hammer as stubble." This also can mean the same thing as the other image he has already used, except that the hammer deals a heavier blow than stones from a sling. So this can be understood to mean that however much the strength and effort of man is extended, it is held in contempt by the devil.

Men often overcome others not only by striking them but also by threatening to strike him. But neither the devil nor the whale is intimidated by any threat on the part of man, and so he continues, "and he will deride the vibrating pike." For the brandishing of the spear is like a threat strike. Just as one man sometimes overcomes another by intimidating him with threats, so he also wins him over by alluring him with promises, especially when one promises gifts which allure a man because they are beautiful or precious.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
