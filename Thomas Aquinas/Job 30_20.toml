[[commentary]]
quote='''
Those who are despised by men often find help from God, but he was deserted by God in temporal adversity, and so he says, "I will call to you," seeking continually to be freed from this adversity, "and you will not hear me," very quickly. "I stood," for I persevered in prayer, "and you do not notice me," by freeing me from adversity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
