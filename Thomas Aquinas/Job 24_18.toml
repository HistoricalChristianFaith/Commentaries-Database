[[commentary]]
quote='''
Second, they put great faith in a small and frail thing, and so he says, "he," the adulterer, "is light on the surface of the waters," as if to say: He moves so lightly that it seems to him that he can pursue his own will as though he were sailing on calm seas. Or one can also explain the literal sense, "they walk in darkness as in light," in that both the adulterer and the adulteress love to do their works in the dark. The phrase which he adds, "he is light on the surface of the water," refers especially to the adulterer who believes that because of the drive of concupiscence he pass lightly even on water, i.e. over any difficulty or adversity whatsoever, to arrive at the enjoyment of the thing sought.

After describing the different kinds of sin in detail, he speaks then about their punishment. First he speaks about the punishment in the present life when he says, "Cursed be his lot on the earth." Each one's lot seems to be to him what he desires as the highest good. The sinner sets up his ultimate end in earthly things as his lot, according to Wisdom, "This is our portion and this is our lot." (2:9) This lot has been cursed because the goods of this world which he uses badly turn to evil for him. He shows this clearly when he says, "nor let him walk on the road of the vineyards." Roads in vineyards are usually shady and consequently cool. Vines even require a moderately cool place, for they are destroyed by the ice in places which are too cold, and in places which are exceedingly hot they are scorched by the heat. The evil man does not walk on the road of the vineyards because he does not use the things of this world moderately, but sometimes he goes aside to one extreme, sometimes to another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
