[[commentary]]
quote='''
The fourth is when someone censures someone in that time and in a state when it can be pursued he will become better and not worse as a result. But if someone wants to censure another when he is perplexed in soul and is disposed to anger, he does not seem to want his amendment so much but his ruin. So he says, "You seize the orphan, and strive to ruin your friend." He refers to himself as an orphan because set down in his sadness he was destitute of help.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
