[[commentary]]
quote='''
To show they are blameworthy for this, he continues, "He takes away mercy from a neighbor," namely in the time of sorrow, "forsakes the fear of the Lord," that is, the reverence due to God, because of whom and in whom one loves his neighbor. As John says, "Whoever does not love his brother whom he does see, how can he love the God whom he cannot see?" (1 John 4:20)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
