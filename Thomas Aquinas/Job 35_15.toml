[[commentary]]
quote='''
And Eliud adds, "For now," in the present life, "he does not unleash his fury," the great extent of his punishment, "nor does he take great vengeance on a crime," i.e. he does not punish in the present according to which the gravity of fault demands. For the punishments of the present life are for correction and therefore he reserves for future damnation those whom he judges unworthy of correction. This is another reason why the wicked prosper in this world and he agrees with the opinion of Job about this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
