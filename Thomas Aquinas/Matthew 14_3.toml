[[commentary]]
quote='''
For Herod had apprehended John. These things happened before; hence he does not follow the order, but incidentally he determines the death of John. But the question is, why the Evangelists determine incidentally about John, and Chrysostom raises this question. He resolves it by saying that they principally intended the deeds of Christ, and other things only insofar as they were related to Christ. Therefore here he incidentally determines the death of John. And first he determines the imprisonment; secondly, the death, at but on the birthday, etc. Regarding the first he does three things. First he sets forth the imprisonment; secondly, the cause; thirdly, the beheading. For Herod had apprehended John, and bound him, and put him in prison. He touches on the order, because first he seized him, bound him, and imprisoned him; so also was it with Christ. He touches on the cause when he says on account of Herodias, the wife of his brother. Herod and Philip were brothers. Philip had married the daughter of Aretas, king of the Arabs. Herod had enmity with that king of the Arabs, and also with his brother Philip, so that the king of the Arabs, in hatred of Philip, took back his daughter and gave her to Herod. Concerning this John, you should understand that he was a man of great virtue; hence it is said of him: he shall come in the power of Elijah. Likewise you should note that he is also called a martyr, because he died on account of his reproving for the faith, because it was for truth; and Christ is the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
