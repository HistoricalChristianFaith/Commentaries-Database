[[commentary]]
quote='''
Then the effort of the Jews wishing to kill Christ is set forth: "but the chief priests and ancients persuaded the people that they should ask Barabbas." In both respects they show themselves abominable, because as chief priests they ought to have corrected others; Proverbs 17:15: "he that justifieth the wicked is abominable." Similarly, because they were ancients; Daniel 13:5: "iniquity came out from the ancients of the people."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
