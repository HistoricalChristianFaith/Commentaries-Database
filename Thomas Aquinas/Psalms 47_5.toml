[[commentary]]
quote='''
"God ascended with jubilation." Here he explains the cause and the order. He says that He is most high and a great king; and on account of this He is to be praised. But is He truly so high? Yes. And first he shows His excellence. Second, he shows the extent of His kingdom, at "sing praises." Concerning the first he does two things. First he sets forth His excellence. Second, he draws a conclusion of exhortation, at "sing praises." I say therefore that He is most high, because He has ascended. But if He is most high, how did He ascend? Because He descended. Eph. 4: "He who ascended is the same one who," etc. But how did He ascend? "With jubilation." Jubilation is immense joy, and this jubilation signifies imperfect knowledge. There were two kinds of singers at the ascension of Christ: namely, the apostles and the angels. The apostles had imperfect knowledge of divine things; and so to them pertains the jubilation of joy at the ascension of Christ in glory. The angels were also there and had clear knowledge; and to them pertains not jubilation but a manifest announcement. And so he says, "and the Lord with the voice of a multitude." Hence the angels say, Acts 1: "Men of Galilee, why do you stand," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
