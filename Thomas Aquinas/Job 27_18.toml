[[commentary]]
quote='''
Spacious houses are also signs of earthly prosperity, but he shows these to be perishable for two reasons. First, because sometimes he builds a house for himself by violence on another's land after he has driven out, and so he says, "he has built his house like a moth," which procures a place for himself by knawing another's clothing, by whom he is expelled when the clothing is shaken out. In another way he shows it because even if he builds a house on his own land, he still cannot care and possess that house for a long time, but for a short time, and so he says, "like a watchman," of a vineyard, "makes a shelter," which he demolishes when his time as watchman is finished.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
