[[commentary]]
quote='''
After a storm of snow and hail ends, a calm follows in which warm and clear air is prepared, and so he says, "By what path does light scatter?" which expresses the clear air, "and heat is divided upon the earth," which expresses warm weather. Here we should consider that before when he spoke about light and the luminaries themselves in which light dwells, he mentioned only their path because the light wends its way through the motion of the luminaries, whether in a storm or calm. But clarity and warmth from it only appear to us after the storm ceases. There is no sensible difference of the intensity of the clear air in various lands when the air has been calm, but there is a sensible difference in intensity of heat. Therefore he said that light is scattered as though diffused indifferently, but heat is divided as though distributed differently, befitting difference of place.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
