[[commentary]]
quote='''
He attributes this to divine wisdom saying "By the breath of God, ice increases," as if to say: When he causes the wind by blowing, the north wind, which causes the icy chill, arises. "And again," from the breath of God which causes the south wind "very broad," that is, very abundant, "waters flow." These are the rains which are caused by the south wind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
