[[commentary]]
quote='''
After he has enumerated his own adversities, he invites them to compassion, doubling his request for mercy because of the great number of his miseries saying, "Have pity on me, have pity on me, you, at least, who are my friends," because I have been abandoned by others. The cause of pity is his affliction which is all the more grave as it is incited by someone more powerful, and so he continues, "because the hand of the Lord has struck me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
