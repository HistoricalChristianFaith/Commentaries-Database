[[commentary]]
quote='''
He shows why he invites others to listen saying, "for the ear proves the argument," as if to say: I invite you to listen so that after you have heard my words you judge them. He introduces this as a comparison when he says, "and the palate judges the taste of food," as if to say: Just as taste judges food, so hearing judges words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
