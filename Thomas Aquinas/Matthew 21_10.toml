[[commentary]]
quote='''
"And when he had entered Jerusalem" etc. Here he treats of the glory exhibited to him in the city. And first, the wonder of the crowds is presented: "and the whole city was moved," i.e., was in wonder. Isa 60:5: "Then shalt thou see, and abound, and thy heart shall wonder, and be enlarged." Ps 59:4: "Thou hast moved the earth, and hast troubled it." "Saying: who is this?" And it is not surprising that they wonder, because even the angels wondered at his ascension, saying: "Who is this that cometh from Edom, with dyed garments from Bosra?" Isa 63:1.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
