[[commentary]]
quote='''
Then the refusal is presented. "But he answering said: I will not." This is nothing other than to despise the commands of God. Job 21:14: "The knowledge of thy ways we desire not." After this follows the fulfillment: "but afterwards, being moved with repentance, he went." Jer 31:19: "After thou didst convert me, I did penance."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
