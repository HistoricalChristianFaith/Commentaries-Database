[[commentary]]
quote='''
And he sets out the determination of their punishment: and I will feed your enemies with their own flesh, either because of dissension, as above: every one shall eat the flesh of his own arm (Isa 9:20), or because of the multitude of the dead, when the mouth of one fell upon the blood of another, as if he wished to drink it, or because of famine.

Third, he sets out the fruit of liberation: and all flesh shall know, above: all flesh shall see the salvation of our God (Isa 40:5).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
