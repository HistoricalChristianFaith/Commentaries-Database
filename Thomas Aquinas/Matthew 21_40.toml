[[commentary]]
quote='''
Then he demands their verdict: "when therefore the lord of the vineyard shall come, what will he do to those husbandmen?" So subtly does the Lord ask that they judge against themselves, as Nathan did with David when he sinned with Bathsheba.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
