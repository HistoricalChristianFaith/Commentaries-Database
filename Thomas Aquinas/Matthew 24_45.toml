[[commentary]]
quote='''
Who, do you think, is the faithful and wise servant whom his lord has set over his household? Here he specially admonishes prelates to watch. And first by enticing with rewards; secondly, by frightening with punishments. Regarding the first he does three things. First, he sets forth the suitability of a good prelate; secondly, his office; thirdly, his reward. The suitability is that he be faithful and wise. In every good work two things are necessary: that one's intention be directed to a due end, and that one take suitable means to that end; therefore in the office of prelacy these two things are necessary. First, that he fix his intention on a due end, which some fix on themselves, of whom it is said in Ezekiel 34:2: Woe to the shepherds who feed themselves; because those who fix their intention on the right end do not intend what is useful to themselves, but to the many, that they may be saved. And all this they rightly do for the glory of God. But he who seeks what is his own does not. Hence he must be faithful; 1 Corinthians 4:2: Now it is required among stewards that a man be found faithful. Likewise, he must be wise, because it is possible that someone seeks the glory of God but not according to knowledge. For it is the prelate's duty to correct vices. He could therefore rebuke in such a way as to lead others into sin. Therefore he must be wise. Above at 10:16: Be wise as serpents. And note that he calls him a servant, because there is a difference between a free man and a servant, since every action of a servant is referred to his lord, but not of a free man; so every action of a prelate ought to be referred to God. Thus Paul called himself a servant, when he said, 2 Corinthians 4:5: But ourselves your servants through Jesus. But why does he say, who, do you think, is the faithful and wise servant? Because the faithful are few; Philippians 2:21: For all seek the things that are their own, not the things of Jesus Christ; Proverbs 20:6: But who shall find a faithful man? And if the faithful are few, the wise are even fewer; therefore the Lord speaks thus, noting their fewness. Then he touches on their office, whom his lord has set over his household. And he does three things. First, he treats of his appointment over his office, when he says, whom his lord has set, not one who procured it for himself either by gifts or by entreaties; Hebrews 5:4: No man takes this honor to himself, but he who is called by God, as Aaron was. Then he touches on over what he is set, because over his household, namely, over his Church, not over temporal things, as the Apostle says, 2 Timothy 2:4: No man being a soldier to God entangles himself with secular business. Likewise, he must be wise enough to be vigilant about the Church, not about other things that are outside the Church; 1 Corinthians 5:12: For what have we to do with those who are outside? Likewise, he touches on the office of the prelate, that he may give them food in due season: food, namely, of teaching, of good example, and of temporal support. Therefore the Lord said to Peter three times: feed, feed, feed my sheep. Feed with the word, feed with example, feed with temporal support. This is mentioned last, but still in due season; Ecclesiastes 3:1: All things have their season. Likewise, John 16:12: I have yet many things to say to you, but you cannot bear them now. For if one wishes to speak words when it is not fitting, he wastes them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
