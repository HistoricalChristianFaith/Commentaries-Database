[[commentary]]
quote='''
Come to me, all you... Come to my blessings. First, the invitation; secondly, the need for the invitation; thirdly, its utility. He says, therefore: Come to me. This is also the word of Wisdom: "Come to me, you who desire me, and eat your fill of my produce" (Sir 24:19). Hence, draw near to me, you untaught, because I want to communicate myself. But what is the need? Because without me men labor too much: all you who labor. In a special way this can be applied to the Jews, because they labored under the yoke of the Law and commandments, as it says in Acts (15:10): "This is a burden which neither we nor our fathers have been able to bear." Likewise, in general, to all who labor on account of human frailty: "I am poor and acquainted with labors from my youth" (Ps 88:15). And are heavy laden, namely, with sins: "My iniquities weigh like a burden too heavy for me" (Ps 38:4).

And what shall we get, if we come to you? I will give you rest [refresh you]. "If anyone thirsts, let him come to me and drink" (Jn 7:37). Then he explains the invitation: first, he explains; secondly, he assigns the reason (v. 30). Having presented the invitation and its purpose, he now wants to explain what that invitation is, when he says, take my yoke upon you. But what is this? You say that you want to refresh us and lift our labor from us, and in the same breath you tell us to carry a yoke? We believed that it would not involve a yoke. Yes, without the yoke of sin: "For the yoke of his burden, and the staff for his shoulder, the rod of his oppressor, you have broken" (Is 9:4). Not that you are without God's law, but without the yoke of sin: "Let us cast off from us their yoke" (Ps 2:3); "Return, O Israel, to the Lord your God, for you have stumbled, because of your iniquity" (Hos 14:1); "Freed from sin, you have become slaves of righteousness" (Rom 6:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
