[[commentary]]
quote='''
Since Job could say to him that he should have been deferred to because of his dignity, he excludes this objection saying, "Will men keep silence for you alone, when you have derided the others? will no one answer you?" For he understood Job had mocked the others because he termed them witnesses for God (10:17) and when he had said above, "Why do you slander true ideas?" (6:25) So he says Job ought not to be surprised if the others also speak against him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
