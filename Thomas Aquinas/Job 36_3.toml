[[commentary]]
quote='''
Since he intends to introduce reasons a second time against both of these ideas, he says, "I will take up my argument from the beginning," for against everything which has been said from the beginning, I will again adduce arguments which support my opinion. He shows this is his duty saying, "and my Maker," God who made me, "I will prove just." I will show there is no evil in his judgment which you, Job want to charge him with so that you may assert that you are just.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
