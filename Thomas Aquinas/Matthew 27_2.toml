[[commentary]]
quote='''
But how? They brought him bound. It was the custom that such men were brought bound and marked as condemned to death. And it signified that just as he destroyed our death by his death, so he destroyed the bonds of our sins by his bonds. And they delivered him to Pontius Pilate. And why? There is a threefold reason. One, the literal, was that he was the vicar of the emperor, and the Jews did not have the power of capital punishment. On account of which they say in John 18:31: "it is not lawful for us to put any man to death." Likewise, from their intention: for they did not wish to kill him secretly, but publicly, so that the report would be spread abroad, according to what is found at Wisdom 2:20: "let us condemn him to a most shameful death." The third reason is that because he wished to die for all, he willed that all should be gathered together, both Jews and Gentiles, so that what is said at Psalm 2:2 was fulfilled: "the kings of the earth stood up, and the princes met together."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
