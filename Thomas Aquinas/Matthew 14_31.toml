[[commentary]]
quote='''
And immediately Jesus stretching forth his hand took hold of him. Christ does two things: he both gives help and rebukes his lack of faith. He gives help by extending his hand; Ps. 143:7: put forth your hand from on high, deliver me and rescue me from many waters. And Job 14:15: to the work of your hands you shall reach out your right hand. Then he rebukes him for his lack of faith, and says to him: O you of little faith, why did you doubt? In which it is signified that if he had had certain faith, he could not have been submerged; therefore we ought to be steadfast in faith. The same is found above, 8:26: why are you fearful, O you of little faith?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
