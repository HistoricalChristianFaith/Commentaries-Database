[[commentary]]
quote='''
Next, he mentions those whom the Colossians ought to greet: first, those from another church, and secondly, those in their own.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Colossians.html'
source_title='Commentary on Colossians'
