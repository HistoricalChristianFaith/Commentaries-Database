[[commentary]]
quote='''
Then follows the arousal; secondly, the effect; thirdly, the petition of the foolish virgins; fourthly, the response of the wise. He says therefore and at midnight there was a cry made: behold the bridegroom comes. Concerning this, Origen says something different from the others, and more according to the letter. All the others expound this arousal as referring to the final judgment; and according to this, this cry will be the trumpet, or the voice of Christ; 1 Thessalonians 4:15: for the Lord himself shall come down from heaven with commandment and with the voice of an Archangel and with the trumpet of God; 1 Corinthians 15:52: the trumpet shall sound (...) and the dead who are in Christ shall rise first. And why at midnight? Jerome says that the Hebrew tradition holds that just as the Angel descended at midnight to slay the firstborn of Egypt, so the Lord will come at midnight. Hence it used to be the custom among them that the people were not dismissed until midnight. Augustine says that it is not on account of the time but only on account of the hiddenness; 1 Thessalonians 5:2: the day of the Lord shall so come as a thief in the night. But what does it mean when he says behold the bridegroom comes, go forth to meet him? Because then all will rise to meet him; John 5:25: the hour comes in which all that are in the graves shall hear his voice; Amos 4:12: prepare to meet your God, O Israel. Origen refers this to the present life. And this is when a man is held by vainglory, and a cry is made through a preacher, or through an interior inspiration; then he returns to Christ; Isaiah 40:9: lift up your voice with strength, you that bring good tidings to Jerusalem.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
