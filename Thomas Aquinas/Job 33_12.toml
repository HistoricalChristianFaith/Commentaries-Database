[[commentary]]
quote='''
Because this second point excludes the first, he then says, "It is in this then in which you are not justified," as if to say: You cannot say you are just because the very fact that you impute injustice to God shows your injustice.

Eliud has already proposed those things which he intended to dispute with Job. Since Job, before he had spoken the words Eliud cited (vv.10,11) had said, "I desire to dispute with God," it seems unfitting to recall someone who desires eagerly to take up the dispute with someone higher to dispute with an inferior. Before Eliud begins to argue with Job about these things, he reproaches him with the very fact that he desired to argue with God. First, it is a mark of great presumption to challenge someone superior to debate. So he says, "I will answer you," your desire according to which you wish to dispute with God, "that God is greater than man," and so it is presumptuous for man to wish to debate with God. In this he would justly accuse Job if Job wanted to dispute with God to contradict him as if he were an equal. Job however wished to dispute with God to learn as a student does with a master. So he said in Chapter Twenty Three, "I will fill my mouth with rebukes to learn how he answers me." (v.4) Yet Eliud interpreted this as though Job spoke contentiously against God, complaining that he was not answering him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
