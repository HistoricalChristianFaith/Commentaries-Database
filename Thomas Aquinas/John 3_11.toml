[[commentary]]
quote='''
Secondly, he rebukes him for his slowness on account of the character of the person who is speaking. For it is tolerable if one does not acquiesce to the statements of an ignorant person; but it is reprehensible to reject the statements of a man who is wise and who possesses great authority. And so he says, Amen, amen I say to you, that we know of what we speak, and we bear witness of what we see. For a qualified witness must base his testimony on hearing or sight: "What we have seen and heard" (1 Jn 1:3). And so the Lord mentions both: we know of what we speak, and we bear witness of what we see. Indeed, the Lord as man knows all things: "Lord, you know all things" (below 21:17); "The Lord, whose knowledge is holy, knows clearly" (2 Mc 6:30). Further, he sees all things by his divine knowledge: "I speak of what I have seen with my Father," as we read below (8:38).

He speaks in the plural, we know, we see, in order to suggest the mystery of the Trinity: "The Father, who dwells in me, he does the works" (below 14:10). Or, we know, i.e., I, and others who have been made spiritual, because "No one knows the Father but the Son, and he to whom the Son wishes to reveal him" (Mt 11:27).

But you do not accept our testimony, so approved, so solid. "And his testimony no one accepts" (below 3:32).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F3.htm'
source_title='Commentary on John'
