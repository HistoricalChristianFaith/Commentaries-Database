[[commentary]]
quote='''
Then he presents the rebuke against the Pharisees. But when the Pharisees saw it, they said to him: "Look, your disciples are doing what is not lawful to do on the Sabbath." The disciples were doing two things: first, they plucked someone else's grain; secondly, they were violating the Sabbath. But the Pharisees did not complain about the first, because it was permitted by the Law (Dt c. 23); therefore, because it was permitted, they were not stopped; but because it was on the Sabbath, they were judged maliciously. And by this is destroyed the heresy of the Hebrews who taught that the legal observances must be kept intact along with the gospel. And because Paul is opposed to this teaching, they rebuked Paul. Against them Jerome argues that even the disciples did not observe them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
