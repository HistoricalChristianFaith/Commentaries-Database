[[commentary]]
quote='''
Then two shall be in the field: one shall be taken, and one shall be left. In this part he sets forth the outcome of this uncertainty. And what will it be? It will happen that men engaged in the same occupation, one will be taken and the other left. And this can be expounded, according to Chrysostom, as meaning nothing other than that in every condition of men and every occupation some will be reprobate and some elect: those who are good will be taken; those who are wicked will be left. How? As was said above at 13:41, because angels will come and take up the good, namely, to Christ. Likewise, some live in luxury, and some exercise certain occupations. Likewise, among laborers some occupations pertain to men, some to women; the labor of men is properly in the fields. Then two shall be in one field, literally, namely, laboring; one shall be taken, as one of the elect, and the other shall be left, as one of the reprobate.

This can also be expounded allegorically, and this is the exposition of Hilary. By the field the world is signified, as was said above. By the two men, the people of the faithful and the unfaithful. Of these, one shall be taken, namely, the people of the faithful; the other shall be left, namely, the unfaithful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
