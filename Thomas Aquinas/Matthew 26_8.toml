[[commentary]]
quote='''
Then follows the reproach of the woman: and the disciples seeing it, had indignation. But here there is an objection, because John 12 says that Judas alone said it, while this text says all of them. There is a twofold response according to Jerome: because what is said here, that the disciples said it, is said by synecdoche: the disciples, i.e., a disciple, and this manner of speaking is customary in Scripture; Hebrews 11:37: they were cut asunder, because one was cut asunder, namely, only Isaiah. Or it can be said that it was all of them, because, according to what Augustine says, Judas stirred up all of them. Likewise, the others were moved on account of the need of the poor, but he was moved by avarice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
