[[commentary]]
quote='''
Second, as to thoughts: their feet, that is, their affections, as to one part: their feet run to evil (Prov 1:16); their thoughts, as to the other: woe to you that devise that which is unprofitable (Mic 2:1).

1042. Wasting. Here he shows them their misery. And first, he sets out the magnitude of their misery: wasting, as to injury to things, and destruction, as to injury to persons, are in their ways, that is, wasting and destruction by their enemies threaten them because of their evil ways.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
