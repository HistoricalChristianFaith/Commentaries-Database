[[commentary]]
quote='''
Then when he says, the love of our neighbor works no evil, he clarifies his proposition with the following syllogism: One who loves his neighbor does no evil to him. But the aim of every precept of the law is abstention from evil. Therefore, one who loves his neighbor fulfills the law. That love of neighbor does no evil is gathered from 1 Corinthians: love does not work injury (1 Cor 13:4).

No matter how evil is taken here, whether for evil acts or omissions, it could refer not only to negative precepts but also to affirmative. But inasmuch as love of neighbor includes love of God, it is understood that love of neighbor excludes evil both against one's neighbor and against God. Thus, even the precepts of the first tablet are included.

Finally, he draws the conclusion mainly intended, saying: therefore, love is the fulfillment of the law, i.e., the law is fulfilled and made perfect by love. My abode is in the full assembly of the saints (Sir 14:16); above all these put on love, which binds everything together in perfect harmony (Col 3:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
