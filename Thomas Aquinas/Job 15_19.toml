[[commentary]]
quote='''
He then shows why they should not be hidden because of their dignity saying, "The earth has been given to men alone." This statement can be related indifferently and in the same sense either to the wise men or to their fathers, whom he also wishes to be understood as wise. The earth is said to have been given only to wise men because they are lords of earthly goods in that they use them only for their own good. However, foolish men use them to their own harm, as Wisdom says, "Creatures were made as a snare to the feet of the foolish." (14:11) To show the dignity of these men he says, "and the stranger will not tread their ground," because those who are strangers to wisdom cannot be numbered among the fellowship of the wise. Or because the wise are not supplied by strangers. For the stranger is said to tread on those who are conquered and are made subject to the power of a foreigner.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
