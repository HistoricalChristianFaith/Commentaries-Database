[[commentary]]
quote='''
You have been wearied in the multitude of your ways. Here he shows their obstinacy in sin.

First, because they were not recalled by the labor of sin: you have been wearied in the multitude of your ways, that is, in the manifold cult of idols: we wearied ourselves in the way of iniquity and destruction (Wis 5:7).

Second, because they were not recalled by temporal prosperity: you have found life of your hand, that is, you had at hand what you needed to be able to live, and therefore you have not asked me, but have been solicitous, for your riches, and afraid of your idols, having forgotten me: they spend their days in wealth, and in a moment they go down to hell (Job 21:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
