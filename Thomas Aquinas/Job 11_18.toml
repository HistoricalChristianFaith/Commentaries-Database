[[commentary]]
quote='''
As Job had said a second time above that his days had been used up, "without any hope," (7:6) Sophar then says, "You will have confidence when hope has been proposed to you." Because Job also had rejected above the opinion of those who said that man returns again after death, after the passage of many centuries, to this same kind of life (7:16 ff.), he does not say that this hope is proposed to him, but hope of the kind in which men live after death in the memories of men. This happens in two ways: In one way in the graves in which the bodies of the dead are placed, so that the memory of the dead is preserved. So they are even called monuments, and to show this he says, "When you have been buried, you will sleep safe in the grave," as if to say: No one will violate your tomb nor should you even be afraid that anyone may try.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
