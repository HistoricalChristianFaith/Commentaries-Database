[[commentary]]
quote='''
Third, as to the enjoyment of goods, you shall see good things given to you by God; bones, you who in adversity were like dry bones: you dry bones, hear the word of the Lord (Ezek 37:4). Or you shall see the divine essence: the light is sweet, and it is delightful for the eyes to see the sun (Eccl 11:7); and your bones shall flourish like an herb, in the resurrection.

And the hand of the Lord shall be known. Here he promises punishment to the wicked. And first, he threatens punishment, setting out the indignation of the judge: the hand, afflicting the impious, in his servants; or, the hand, of comfort, in his servants, by its effect, above: there is no indignation in me (Isa 27:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
