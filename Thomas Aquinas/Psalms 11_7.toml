[[commentary]]
quote='''
"Because the Lord is just and has loved justice," therefore nothing is to be expected from Him except justice. Jer. 9: "I am the Lord who exercises mercy, judgment, and justice on the earth." Ps. 144: "The Lord is just in all His ways." "Equity has His countenance beheld" -- or "His face" -- that is, equity has been seen by His knowledge; as if to say: to those to whom He makes Himself known and whom He loves, He shows equity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
