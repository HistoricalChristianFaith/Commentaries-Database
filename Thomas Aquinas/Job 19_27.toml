[[commentary]]
quote='''
Porphyry, not knowing this said, "The soul must flee the body to become happy," as though the soul and not man will see God. To exclude this Job places, "whom I myself will see," as though he should say: Not only will my soul see God but "I myself" who subsist from body and soul. To indicate that the body will be a participant in that vision in its proper own way he adds, "and my eyes will behold him," not because the eyes of the body would see the divine essence, but because the eyes of the body will see God made man. They will also see the glory of God shining in created things as Augustine says at the end of The City of God. That one believe that man must be restored the same in number and not only the same in species in order to be restored to see God he says, "and not another," in number. This is so that one might not believe that he expects to return to the kind of life which Aristotle describes in II De Generatione saying that each corruptible substance which has been moved will be restored in species, but not in the same number.

After these things as premises about the cause, the time, the manner of the resurrection, and the glory and identity of those who will rise, he then adds, "This my hope has been put in my heart," as if he should say: For my hope is not in earthly things which you promise vainly, but in the future glory of the resurrection. He says clearly, "has been put in my heart," to show that he held this hope concealed not only in words, but also in his heart; not doubtfully, but most firmly; not like something of little consequence, but as something most precious. For what is hidden in the heart is possessed in a secret way, is firmly held and is considered dear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
