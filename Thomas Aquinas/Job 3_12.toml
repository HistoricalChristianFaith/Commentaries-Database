[[commentary]]
quote='''
Sometimes however, the external life is taken away by the loss of some necessary assistance, which can be extrinsic like being carried, warmth and other aids of this kind. The verse, "Why did the knees receive me?" refers to this; or something intrinsic, like food, and so he says, "Or why was I suckled at the breast?" Indeed the life of a newborn baby needs these aids to life on the first day of its birth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
