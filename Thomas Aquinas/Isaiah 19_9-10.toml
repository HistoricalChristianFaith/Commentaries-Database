[[commentary]]
quote='''
Third, the ruin of various craftsmen, they shall be confounded that wrought in flax, which is raised in wet places. Flaccid, that is, parched, pools, fish ponds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
