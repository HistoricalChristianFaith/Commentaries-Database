[[commentary]]
quote='''
The effect that the thief has is that the sheep do not follow him for very long, but only for a time; so he says, a stranger they will not follow, i.e., they do not follow a false and heretical teacher: "The children who are strangers have lied to me" (Ps 17:46). Thus Paul did not follow false teachers for long. But they will flee from him, because "Bad company ruins good morals" (1 Cor 15:33). They flee for they do not know, that is, do not approve of, the voice of strangers, meaning their teaching, which spreads stealthily like a cancer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
