[[commentary]]
quote='''
Then the execution is presented: "and taking him, they cast him forth out of the vineyard, and killed him," because they crucified him outside the gate of the city, and so they killed him as though a stranger to the vineyard. Isa 53:7: "He was led as a sheep to the slaughter" etc. That they cast him out of the vineyard is found in John, that whoever confessed the name of Christ was cast out of the synagogue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
