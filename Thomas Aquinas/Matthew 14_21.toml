[[commentary]]
quote='''
Then the number of those who ate is presented: and the number of those who ate was five thousand men, so that one thousand ate from each loaf, according to Hilary. This also happened after the Ascension, when at the voice of the apostles five thousand were converted in one day. Besides women and children, who are unknowing, and are not worthy to be counted. A similar thing is found in the Book of Maccabees, that children and women are not counted for battle. Likewise note that this miracle was performed immediately after the killing of John, and it was near the Passover, and Christ had already been preaching for a year, and after the year had passed, Christ suffered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
