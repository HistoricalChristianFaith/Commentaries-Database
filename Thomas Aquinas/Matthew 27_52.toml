[[commentary]]
quote='''
"And the graves were opened: and many bodies of the saints that had slept arose." Graves are the prisons of the bodies of the dead. Hence it is signified that he breaks the bonds of death; Hosea 13:14: "I will be thy death, O death; I will be thy bite, O hell." Likewise, 1 Corinthians 15:54: "death is swallowed up in victory." Likewise, the fact that the graves were opened signifies that the dead in sins ought to rise; Ephesians 5:14: "rise, thou that sleepest, and arise from the dead." Likewise, the graves shall be opened, because the dead shall come to judgment; John 5:28: "the hour cometh, wherein all that are in the graves shall hear the voice of the Son of God." Then the miracle in men is touched upon. He says therefore "and many bodies of the saints that had slept arose." Concerning these there is usually a question, whether they rose to die again, or not to die again. It is certain that some rose so as afterward to die, as Lazarus. But concerning these it can be said that they rose not to die again, because they rose for the manifestation of the resurrection of Christ. For it is certain that Christ, rising from the dead, dieth now no more. Likewise, if they had risen only to die again, no benefit would have been shown them, but rather a detriment; therefore they rose as being about to enter heaven with Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
