[[commentary]]
quote='''
2522 Mary was quick to obey, as we see from Mary Magdalene went and said to the disciples etc. "For I received from the Lord what I also delivered to you" (1 Cor 11:23); "What I have heard from the Lord of hosts, the God is Israel, I announce to you" (Is 21:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F20.htm'
source_title='Commentary on John'
