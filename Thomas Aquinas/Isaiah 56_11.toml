[[commentary]]
quote='''
In plundering their goods: and most impudent dogs, plundering their subjects of their goods as if without any bridle of shame, and they are never satisfied: they shall suffer hunger like dogs (Ps 58:7[59:6]); and as to lack in perfection of knowledge: the shepherds themselves knew no understanding, of the law and the prophets: he that understands shall possess governments (Prov 1:5); they have not known nor understood: they walk on in darkness (Ps 81[82]:5).

Second, the fault of the subjects, or of all of them together.

And first, as to their own will, which pertains to pride: all have turned aside into their own way: every one of you walks after the perverseness of his evil heart (Jer 16:12);

second, as to their desire, which pertains to avarice: every one after his own gain: from the least of them even to the greatest, all are given to covetousness (Jer 6:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
