[[commentary]]
quote='''
First, he had noted in the words of Job that he had said that he was immune from sin (13:6 and 16:18) and so he says, "I am clean," from the impurity of the flesh, "and without fault," caused by the sin of omission; "without stain," from grave sins which are against God like idolatry and other sins of this sort; "and there is no evil in me," which would cause me to wound my neighbors unjustly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
