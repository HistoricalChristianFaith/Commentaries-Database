[[commentary]]
quote='''
Second, he shows by experience that there is no violence or evil in God. For so great is his power by which he conserves things in being, that if he should wish to use violence against his justice, he could immediately annihilate all men. So he says, "If he (God) should turn to him (to destroy man) his heart (his will) his spirit (his soul) and breath (the life of the body supported by the soul) he will draw to himself," separating it from the body by his power. This agrees with the last chapter of Qoheleth, "And the Spirit will return to God who gave it." (12:7)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
