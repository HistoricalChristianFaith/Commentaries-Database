[[commentary]]
quote='''
Thirdly, he reveals the faith in their hearts, saying, and many believed in him there. As Augustine remarks, they grasped Christ remaining, whom the Jews wanted to seize waning, because through the lamp they had come to the day. For John was that lamp and gave testimony to the day.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
