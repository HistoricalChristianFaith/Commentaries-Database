[[commentary]]
quote='''
Therefore, after he proves that Leviathan cannot be overcome by man, God shows next that he cannot be overcome by the sea or any fish in the sea, because of the strong action which he does in the sea. Pliny says that "some animals in the Eastern ocean are so big that they churn the seas from the bottom," and make storms in the sea. These animals certainly belong to the genus of whales. To indicate this he says, "He will make the depths of the sea boil like a pot," for just as boiling water rolls about in a pot, so the waves of the sea are stirred by the violent movements of this fish. This violent motion begins in the depths and arrives at the surface, and so he says, "and he will apply it like ointments," which make a greater foam and motion on the surface that mere water which does not contain so much air, "effervescent". By this he indicates the disturbance which the devil excites in this world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
