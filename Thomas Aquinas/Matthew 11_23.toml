[[commentary]]
quote='''
And you, Capernaum, will you be exalted to heaven? In this section he upbraids a more famous city: first, he rebukes pride, because the greater are more boastful; secondly, he upbraids their impenitence (v. 23b). In regard to the first: first, he rebukes their pride; secondly, he threatens a punishment. He says, therefore, And you, Capernaum... This sentence can be taken in two ways: one is interrogative, namely, will you be exalted to heaven? The other: You are the city which has been exalted to heaven, because it was exalted by the Lord, by the Lord's presence and by many miracles: "The things we have heard done in Capernaum, do also here in your city" (Lk 4:23). You have also been exalted by yourself; hence will you be exalted by pride or my teaching? But no matter how you have been exalted, you shall be brought down to Hades: "Dragged off in the day of God's wrath; this is the wicked man's portion from God" (Jb 20:28). Hence the proper punishment of the proud is to be hurled down. Isaiah (14:14) against one who said, "I will ascend above the heights of the clouds," answers "You will be brought down to hell." Then he rebukes their impenitence: first, he compares their guilt; secondly, their punishment. He says, therefore, For if in Sodom... Why does he say this? To denote freedom of judgment, because before a man is life and death. No one warned them; for although Lot was present among them, he worked no miracles. But the others saw the Lord teaching and working miracles. Therefore... Capernaum is interpreted as village most sweet, as is Jerusalem.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
