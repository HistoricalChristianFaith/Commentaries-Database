[[commentary]]
quote='''
Job shows why he is compared to the tree which is barren from two things. First because he has consumed his goods in useless things, and so he says, "For he feeds the barren woman who does not produce offspring and he has done no good to the widow." The one who consumes his goods in useless things is a metaphor for someone who uselessly supports a barren wife. Second, he is compared in this way because he does not aid those in need, which could have been fruitful for him, and so he says, "and he has done no good to the widow." By "the widow" he means all the needy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
