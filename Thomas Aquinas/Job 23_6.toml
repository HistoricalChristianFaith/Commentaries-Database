[[commentary]]
quote='''
In the previous chapter Job's friends had frequently referred to divine power and grace as if to sustain divine judgment. As Sophar said in Chapter Eleven, "He is higher than the heavens and what will you do?" (v.8) and the other things which follow there. So he excludes this objection when he says, "I do not want him to argue with me with his great strength, nor crush me with the greatness of his power," as if to say: Your answer in which the power and greatness of God are proposed against me alone does not satisfy me. Since just as he is most powerful and the greatest, so he is also the most just and loves equity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
