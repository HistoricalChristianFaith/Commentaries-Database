[[commentary]]
quote='''
Next he speaks about the very generation of the rains when he says, "when he made a law for the rains," to come down at certain times and in certain places. Third he speaks about their effect, especially in the sea which is disturbed by atmospheric changes, and so he continues, "and" he was setting, "the way for the storm," the waves, "which roar," from great agitation, because even storms of this kind arise at certain times and in a certain intensity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
