[[commentary]]
quote='''
Then he puts the accusation for this change, for which the Corinthians accused him, in the form of a question, saying, Was I vacillating when I wanted to do this? For on account of this they charged him with two things: light-mindedness, because he changed his mind: "The fool changes like the moon" (Sir. 27:11); and carnal love, because it seemed to them that he had done this from some carnal and human affection. Hence, he touches on two points: first, light-mindedness, and he says, Was I vacillating, if I failed to do what I once wanted to do? God forbid! "Neither must you think, if we command different things, that it comes from the levity of our mind" (Est. 16:9); "In the mighty throng I will praise you" (Ps. 35:18). Secondly he touches on carnal affection, when he says, Do I make my plans like a worldly man, i.e., according to carnal affection, ready to say Yes and No at once, i.e., to affirm and deny: "Some suspect us of acting in worldly fashion" (2 Cor. 10:2); "A double-minded man is unstable in all his ways" (Jas. 1:7-8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
