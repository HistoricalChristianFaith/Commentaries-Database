[[commentary]]
quote='''
And the servants of the master of the house came etc. Here the zeal of the good against the evil is set down. And first they inquire about the origin of the evil; secondly, they are moved by zeal for the extirpation of the evil, at and the servants said etc. He says, and they came etc. First, let us see who these servants are. Below he speaks of the reapers; but these are not servants, but angels. These are good men: and this is not unfitting, since the Lord is called both the door and the doorkeeper. And the servants came, by faith; Psalm 33:6: come to him and be enlightened. They said: Lord, did you not sow good seed in your field? Did not the apostles sow good doctrine? Indeed they did. God saw all the things that he had made, and they were very good, Genesis 1:31. From where then does it have cockle? A similar question is found in Jeremiah 2:21: I planted you a chosen vineyard; how then are you turned unto me into the depraved ways of a strange vineyard?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
