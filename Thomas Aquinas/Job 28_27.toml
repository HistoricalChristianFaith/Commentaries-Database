[[commentary]]
quote='''
Because God does not acquire wisdom from creatures themselves as we do, but rather he produces creatures according to his wisdom, he therefore continues, "Then," when he was making creatures, "he saw her," wisdom, in himself, insofar as he produces things in their being through the actual considerations of his wisdom. Wisdom was derived from him first to the angels who were made participants in the divine wisdom, and expressing this he says, "he made her known," manifesting his wisdom to them. Second, to the universe of creatures by governing it through his wisdom, and he expresses this theme saying, "and he prepared" the rotation of the land in his wisdom. Third, to men who do not perceive the wisdom of truth by simple apprehension, as the angels do to whom it is made known, but arrive at it by the investigation of reason, and so he says, "he inquired," i.e. he made men investigate her.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
