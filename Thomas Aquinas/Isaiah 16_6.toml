[[commentary]]
quote='''
Here he sets out contempt of counsel proceeding from their pride. Hence he describes their pride as to three things: first, as to its being made commonly known: we have heard, as if it were public; as to its quantity: he is exceeding proud; as to its exceeding their dignity: his pride, by which he extolls himself as to the gifts he possesses, and his arrogancy, by which he pretends to have gifts that he does not possess, and his indignation, by which he presumptuously proposes vengeance, is more than his strength.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
