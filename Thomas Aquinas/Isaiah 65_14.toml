[[commentary]]
quote='''
Second, in joy of heart: behold my servants shall rejoice, and you shall be confounded: repenting, and groaning for anguish of spirit (Wis 5:3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
