[[commentary]]
quote='''
Thus says the Lord. Here he sets out the sign of his love, that he destroyed for them the Babylonians, who gloried in their ships because of the multitude of their waters: I sent, namely, my wrath: the Lord has both purposed, and done all that he spoke against the inhabitants of Babylon (Jer 51:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
