[[commentary]]
quote='''
And the men marveled... Here is mentioned the effect, namely, the men's admiration. When he says, men, it does not mean the apostles, because they are never referred to in that manner, but it refers to the sailors. Or, according to Jerome, even if it refers to the apostles, it might be that they could doubt as the men did, saying, What sort of man is this? Chrysostom: "They say, man; for since they saw him sleeping, they called him a man, but because they saw a sign of his divinity, they were confused. Even winds and sea obey him, because every creature obeys its Creator: "Fire and hail, snow and frost, stormy wind fulfill his command" (Ps 148:8); not because they have a rational soul, but because they behave after the manner of one who is obedient, as the hands and bodily members obey the soul, for they are moved immediately at its pleasure, so all things obey God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
