[[commentary]]
quote='''
Many will come in my name, saying: I am Christ. Someone comes as sent by Christ; so the disciples came. But others are said to come in the name of Christ who say they are Christ, usurping for themselves a name that is not given to another; Philippians 2:9: He hath given him a name which is above all names. Hence many deceivers will come, who will come of themselves; but Christ did not come of himself, but from God; hence John 7:28: I am not come of myself. Although this is said specifically of the Antichrist, it can nevertheless be said of many others. Hence, because they did not adhere to the truth, they were given over to errors. And this happened in the case of Simon Magus, who wrote books and called himself the book of God, the great God, all things of God, and he seduced many. For it belongs to the foolish to be seduced, who are divided in errors, because the number of fools is infinite (Ecclesiastes 1:15). Hence truth gathers together, but error divides; and this is the danger. This can also be referred to the second coming, for these things will happen around the day of judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
