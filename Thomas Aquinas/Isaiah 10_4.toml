[[commentary]]
quote='''
Second, he expresses the manner of punishment, and first, the punishment of captivity: that you be not bowed down under, above: and the loftiness of men shall be bowed down, and the haughtiness of men shall be humbled (Isa 2:17); second, of killing: and fall with the slain: all of them slain, fallen by the sword (Ezek 32:24).

In all these things. Here the preparation of further punishment is set out: this is explained as above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
