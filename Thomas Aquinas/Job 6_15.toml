[[commentary]]
quote='''
Next he shows his family has abandoned him when he says, "My brothers," i.e. my relatives, "have passed me by." He uses the analogy of those who walk along together. If one falls in a ditch, the others pass by nevertheless abandoning him there. In a certain sense, they would be excused for this if they leave him once they have tried to help him because of weariness because they despair of helping him. But he shows that these men are without excuse, because they immediately and suddenly deserted him. He shows this when he says, "like a torrent, like a stream coursing through the valleys," which moves very quickly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
