[[commentary]]
quote='''
Then (v 15b), he shows that his testimony is true, and that it is false to say that he alone is bearing witness to himself. Because mention was now made about judging, he shows, first, that he is not alone in judging; and secondly, that he is not alone in bearing witness (v 17). He does three things about the first: first, he says that his judgment is deferred; secondly, that his judgment is true; and thirdly, he gives the reason why his judgment is true.

He mentions that his judgment is deferred when he says, I do not judge anyone. He is saying in effect: You judge wickedly, but I do not judge anyone: "God did not send his Son into the world to judge the world, but that the world might be saved through him" (3:17). Or, we could say, I do not judge anyone, according to the flesh, as you judge: "He will not judge by the sight of his eyes, or reprove by what his ears hear" (Is 11:3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
