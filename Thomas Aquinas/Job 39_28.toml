[[commentary]]
quote='''
So he says, "he dwells in the rocks," as though enjoying the purity of the air, because in rocky places there is not a lot of evaporation, "and he dwells in steep crags," those to which access is not open to predators, "and in cliffs which are inaccessible," to man, where his security is provided for.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
