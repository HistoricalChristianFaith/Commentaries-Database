[[commentary]]
quote='''
He proves this with an example: Every sound tree bears good fruit, but the bad tree bears evil fruit. From this the Manicheans assumed two natures, namely, good and evil. But this is not true, because we see good fruit formed from an evil creation, and vice versa. Hence from this you should understand that the tree is the principle of the fruit. But there are two principles: that of nature and that of conduct. The principle from nature is the soul, and whatever comes from it naturally is good. But the principle of conduct is the will. Therefore, if the will is good, the work is good, since it has a good will with a good intention; because if one wills to steal for almsgiving, even though the will is good, the intention is not right.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
