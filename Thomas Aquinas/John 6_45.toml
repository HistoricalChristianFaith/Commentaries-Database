[[commentary]]
quote='''
941 Then (v 45), he considers the way we are drawn. First, he states the way; secondly, its effectiveness (v 45b); and thirdly, he excludes a certain way of being drawn (v 46).

942 The manner in which we are drawn is appropriate, for God draws us by revealing and teaching; and this is what he says: It is written in the prophets: They shall all be taught by God. Bede says that this comes from Joel. But it does not seem to be there explicitly, although there is something like it in: "O children of Zion, rejoice and be joyful in the Lord your God, because he will give you a teacher of justice" (Jl 2:23). Again, according to Bede, he says, in the prophets, so that we might understand that the same meaning can be gathered from various statements of the prophets. But it is Isaiah who seems to state this more explicitly: "All your children will be taught by the Lord" (Is 54:13). We also read: "I will give you shepherds after my own heart, and they will feed you with knowledge and doctrine" (Jer 3:15).

943 They shall all be taught by God, can be understood in three ways. In one way, so that all stands for all the people in the world; in another way, so that it stands for all who are in the Church of Christ, and in a third way, so it means all who will be in the kingdom of heaven.

If we understand it in the first way, it does not seem to be true, for he immediately adds, Every one who has heard the Father and has learned, comes to me. Therefore, if every one in the world is taught [by God], then every one will come to Christ. But this is false, for not every one has faith. There are three answers to this. First, one could say, as Chrysostom does, that he is speaking of the majority: all, i.e., very many shall be taught, just as we find in Matthew: "Many will come from the East and the West" (Mt 8:11). Secondly, it could mean, all, so far as God is concerned, shall be taught, but if some are not taught, that is due to themselves. For the sun, on its part, shines on all, but some are unable to see it if they close their eyes, or are blind. From this point of view, the Apostle says: "He desires the salvation of all men, and that all come to the knowledge of the truth" (1 Tim 2:4). Thirdly, we could say, with Augustine, that we must make a restricted application, so that They shall all be taught by God, means that all who are taught, are taught by God. It is just as we might speak of a teacher of the liberal arts who is working in a city: he alone teaches all the boys of the city, because no one there is taught by anyone else. It is in this sense that it was said above: "He was the true light, which enlightens every man coming into this world" (1:9).

944 If we explain these words as referring to those who are gathered into the Church, it says: They shall all, all who are in the Church, be taught by God. For we read: "All your children will be taught by the Lord" (Is 54:13). This shows the sublimity of the Christian faith, which does not depend on human teachings, but on the teaching of God. For the teaching of the Old Testament was given through the prophets; but the teaching of the New Testament is given through the Son of God himself. "In many and various ways (i.e., in the Old Testament) God spoke to our fathers through the prophets; in these days he has spoken to us in his Son" (Heb 1:1); and again in (2:3): "It was first announced by the Lord, and was confirmed to us by those who heard him." Thus, all who are in the Church are taught, not by the apostles nor by the prophets, but by God himself. Further, according to Augustine, what we are taught by men is from God, who teaches from within: "You have one teacher, the Christ" (Mt 23:10). For understanding, which we especially need for such teaching, is from God.

945 If we explain these words as applying to those who are in the kingdom of heaven, then They shall all be taught by God, because they will see his essence without any intermediary: "We shall see him as he is" (1 Jn 3:2).

946 This drawing by the Father is most effective, because, Every one who has heard the Father and has learned, comes to me. Here he mentions two things: first, what relates to a gift of God, when he says, has heard, that is, through God, who reveals; the other relates to a free judgment, when he says, and has learned, that is, by an assent. These two are necessary for every teaching of faith. Every one who has heard the Father, teaching and making known, and has learned, by giving assent, comes to me.

He comes in three ways: through a knowledge of the truth; through the affection of love; and through imitative action. And in each way it is necessary that one hear and learn. The one who comes through a knowledge of the truth must hear, when God speaks within: "I will hear what the Lord God will speak within me" (Ps 84:9); and he must learn, through affection, as was said. The one who comes through love and desire—"If any one thirsts, let him come to me and drink" (below 7:37)—must hear the word of the Father and grasp it, in order to learn and be moved in his affections. For that person learns the word who grasps it according to the meaning of the speaker. But the Word of the Father breathes forth love. Therefore, the one who grasps it with eager love, learns. "Wisdom goes into holy souls, and makes them prophets and friends of God" (Wis 7:27). One comes to Christ through imitative action, according to: "Come to me, all you who labor and are burdened, and I will refresh you" (Mt 11:28). And whoever learns even in this way comes to Christ: for as the conclusion is to things knowable, so is action to things performable. Now whoever learns perfectly in the sciences arrives at the conclusion; therefore, as regards things that are performable, whoever learns the words perfectly arrives at the right action: "The Lord has opened my ear; and I do not resist" (Is 50:5).
'''
source_title="Commentary on John, Chapter 6, Lecture 5"
source_url="https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm"
