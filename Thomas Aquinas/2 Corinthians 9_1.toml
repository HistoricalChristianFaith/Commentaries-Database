[[commentary]]
quote='''
Having exhorted the Corinthians to give alms to the saints in Jerusalem, the Apostle now admonishes them how to give, namely, cheerfully and abundantly. Hence, in order that they might give properly, he has sent them important messengers. In regard to this he does two things. First, he excludes the supposed cause for sending the messengers; secondly, he gives the true one (v. 3). In regard to the first he does three things. First, he excludes a suspicion; secondly, he assigns the cause for this (v. 2); thirdly, he proves the cause (v. 2b).

As to the first, because someone could say to the Apostle: you urge us to receive your messengers cordially, but why do you not rather urge us to give alms properly. Therefore, rejecting this, he says: it is not necessary for me to urge this now, i.e., because, it is superfluous for me to write to you about the offering for the saints.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
