[[commentary]]
quote='''
And they say three things. First, they reproach the miracles he did; second, his royal dignity; third, that he made himself the Son of God. As to the first, they say: "he saved others, himself he cannot save." They meant to say: if he saved others, he will be able to save himself; but he cannot save himself: therefore he did not save others either. But we, on the contrary, ought to argue: he saved others, therefore he can save himself; and he was able to save himself by rising: therefore he will also be able to save us. Hebrews 5:9: "he became to all that obey him the cause of eternal salvation." Hence they intended nothing but temporal salvation; but Christ wished to show that eternal salvation is to be preferred; hence they say: "if he be the king of Israel, let him now come down from the cross." Here they reproach his royal dignity, and they make a false promise, and they draw a bad consequence, because if he is the king of Israel, he ought not to descend, because through the cross he ought to ascend; Psalm 95:10: "the Lord hath reigned from the wood," and in Isaiah 9:6: "the government, i.e., the cross, is upon his shoulder." Likewise, he did what is greater, because he rose from the tomb, and yet they did not believe, so they were liars; Jeremiah 23:16: "hearken not to the words of the prophets that prophesy to you, and deceive you": and it follows: "they speak a vision of their own heart to you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
