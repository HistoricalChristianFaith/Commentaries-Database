[[commentary]]
quote='''
After Sophar heard the opinion of Job about the hope of the future life, he seems to have acquiesced, and so after this second answer he contradicted nothing in the third one. But there was still something in his heart which did not permit him to give ground completely from his former opinion. For he thought that although retributions and punishments are made in the future life for merits, as he had learned from Job, nevertheless, it still seemed to him that the prosperity and adversity of this life were given to men by God as sanctions for virtues and sins. So as though convinced in part and yet holding his first opinion in part he says, "Therefore," namely, because of the words which you say about the future life, "my various thought succeed each other." He then says that these various thoughts should not be understood to belong to the same opinion, like when someone thinks out carefully various arguments for the same conclusion, "and my mind is disturbed about these various things," for I am led now to one opinion and now to the other by the force of the arguments which can be induced for both, as though the force of the arguments were incapable of resolving the contrary arguments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
