[[commentary]]
quote='''
Then he determines the type of plunder saying, "They reap a field which is not their own," for they reap the harvest of another by violence. "And they glean the vine of someone whom they overcame by force," since they oppress someone beforehand in order to steal his goods more freely.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
