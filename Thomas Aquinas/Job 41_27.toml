[[commentary]]
quote='''
He assigns the reason for this saying, "For he will treat iron like straw," for just as a man cannot be wounded by straws and easily breaks them, so Leviathan cannot be wounded by an iron sword or spear, but easily breaks things like that. Likewise, he will consider the "Bronze," of the breastplate, "like rotten wood," which cannot resist a blow. By this he indicates that no human power is capable of wounding the devil or resisting him, but every human power is reckoned by the devil as naught.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
