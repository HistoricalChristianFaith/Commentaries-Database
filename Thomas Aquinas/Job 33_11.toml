[[commentary]]
quote='''
Second, a judge is unfair if he takes away from someone the ability to mount a just defense. Expressing this he says, "he put my feet in the stocks," for he bound me as if to impede me from my works. Third, a judge is unfair when he gathers certain small faults together to condemn someone, and expressing this he says, "he watched all of my movements," as if spying on him in each and every work. Job did not say these things to show the unfairness of the divine judge, but he was speaking metaphorically as he explained, "Understand my riddles with your ears." (13:17)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
