[[commentary]]
quote='''
All these things have been brought to show the greatness of divine wisdom and power which produces such marvelous effects. We understand that after Job had heard so many wonderful things about the divine effects he was stunned and silent. But the Lord stirs him to consider that man is not fit to dispute with God, and so the text says, "The Lord fastened his eyes," adding more to these words, "and spoke to Job," who was silent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
