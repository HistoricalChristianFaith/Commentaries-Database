[[commentary]]
quote='''
He adds the reason when he says: For here we have no lasting city, but we seek one that is to come. For a man willingly remains in his own place. For our end is not in the things of the Law or in temporal things: 'Our end is Christ unto the salvation of all who believe' (Rom. 10:4). Therefore, we have not here a lasting city, but where Christ is. Therefore, let us go to Him: 'If you have risen with Christ, seek the things that are above, where Christ is sitting on the right hand of God' (Col. 3:1); 'Look upon Sion, the city of our solemnity' (Is. 33:20); 'He looked for a city that has foundations; whose builder and maker is God' (supra 11:10). They also seek a better city, i.e., the heavenly one. For we strive to be transferred to it as to our place and altar. Therefore, let us go to it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
