[[commentary]]
quote='''
After mentioning these two things leading to repentance, the evangelist concludes: "Bear fruit that befits repentance." Fruit comes after the flowers in a tree, and if the fruit does not follow the flowers, that tree is nothing. For the flower of repentance appears in contrition, but the fruit is in performance. And it should be noted that the fruit of righteousness is one thing and the fruit of repentance another, for more is required of the repentant than of one who does not sin. But the fruit of repentance is threefold: the first is that one punish in himself what he committed: "After you converted me, I did penance; and after I was instructed, I smote upon my thigh," i.e., afflicted my flesh (Jer 31:19). The second is that he flee sins and the occasions of sin; hence, it is said that to make satisfaction is to remove the causes of sin: "Have you sinned, my son? Do so no more, but pray about your former sins... Flee from sin as from a snake" (Sir 21:1-2). The third is that you be as eager to do good as you were to sin: "I am speaking in human terms because of your natural limitations. For just as you once yielded your members to impurity and to greater and greater iniquity, so now yield your members to righteousness and sanctification" (Rom 6:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
