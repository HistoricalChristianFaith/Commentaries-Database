[[commentary]]
quote='''
Then when he says for I long to see you, he mentions the causes of the desire, and there are two. First, the welfare of those he would visit; hence, I long to see you: I yearn for you all with the affection of Christ Jesus (Phil 1:8), not for a trifling reason as in worldly friendship, but that I may impart unto you some spiritual grace, not as its author but as its minister: one should regard us as stewards of the mysteries of God (1 Cor 4:1); and this to strengthen you in the faith you have received: when you have been converted, strengthen your brethren (Luke 22:32).

Now a minister imparts grace in a number of ways, one of which is by the administration of the sacraments of grace: as each has received a gift, administer it to one another as good dispensers of God's grace (1 Pet 4:10) and by exhorting in sermons: let no evil talk come out of your mouth, but only such as is good for edifying . . . that it may impart grace to those who hear (Eph 4:29).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
