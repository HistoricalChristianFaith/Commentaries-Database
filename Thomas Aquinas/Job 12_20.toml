[[commentary]]
quote='''
Philosophers excel in the consideration of the truth. He says regarding these, "He alters the truth from their lips," i.e. the lips of those who are eager to speak the truth. For God sometimes darkens the mind of those men by taking away his grace so that they cannot find the truth, and, consequently cannot speak it, as Romans says, "Saying that they were wise, they have become foolish." (1:22) Old men also excel in the direction of the young, and in their regard he continues, "he takes away instruction from the elders," either because old men are made fools of, or because they are completely taken out of society, as Isaiah says, "the Lord will take away from Jerusalem the judge and the prophet, the diviner and the elder." (Is. 3:1)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
