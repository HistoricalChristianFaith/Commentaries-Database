[[commentary]]
quote='''
Then he mentions the judiciary power: "His winnowing fork is in his hand." First, the judiciary power is mentioned; secondly, the effect of the judgment; thirdly, the manner of the judgment. He says, therefore, "His winnowing fork," and he employs a comparison. The Church is called the threshing floor; the wheat is the faithful, who will be gathered together by the angels: "Ask the lord of the harvest to send laborers into his harvest" (Lk 10:2); "He sent me to accomplish his will" (Jn 4:34). The winnowing fork is Christ's judiciary power, which will separate the wheat from the chaff: "The Father has given all judgment to the Son" (Jn 5:22); "He it is who has been appointed by God the judge of the living and the dead" (Acts 10:42). "He will clear," i.e., thoroughly cleanse: first, by tribulations which are as it were, certain winds, without which the chaff remains with the wheat: so, too, as long as they are in the Church, the good are not discerned from the wicked; and just as the smaller bits of chaff are expelled by a weak wind and the larger by a stronger, so in the Church, if tribulation increases, even those who seem strong fall: "They believe for a time, and in time of trial they fall away" (Lk 8:13). Secondly by the sentences of prelates, when they excommunicate: "Remove the evil person from among you" (1 Cor 5:13). Thirdly, on the day of judgment, when the good will be separated from the wicked (Mt 25:32). "He will gather the wheat into his granary" of paradise, i.e., the elect: "Save us, O Lord our God, and gather us from among the nations" (Ps 106:47). "But the chaff he will burn."

Note that there is this difference between chaff and cockle. For the seed of chaff and of cockle are different, because that of chaff is the same seed as that of wheat. Hence, by cockle we can understand schismatics, who do not communicate with us in the sacraments; by chaff, the faithful, although evil. But both will be burned by fire. "With unquenchable fire": "Their fire shall not be quenched" (Is 66:24). He says "unquenchable," to distinguish it from the fire of purgatory: "Depart, you accursed, into eternal fire..." (Mt 25:41).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
