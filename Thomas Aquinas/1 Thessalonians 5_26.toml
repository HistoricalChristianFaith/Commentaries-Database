[[commentary]]
quote='''
Greet all the brethren with a holy kiss, not a treacherous kiss as that of Judas (Matt. 26), nor a passionate kiss like that of the lustful woman in Proverbs (7:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
