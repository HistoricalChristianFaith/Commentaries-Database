[[commentary]]
quote='''
Enter by the narrow gate. Lest anyone conclude from the saying, ask and you shall receive, that man has everything from God without good works, he teaches that this, too, comes by good works. First, therefore, he presents the admonition; secondly the reason (v. 13b). He says, therefore, Enter, i.e., try to enter. Augustine explains this in two ways: Christ is the gate: "I am the door" (Jn 10:9). This gate is narrow through humility, because he humbled himself unto death. Hence (Is 10:2): "The Lord will make a brief word upon the earth." Therefore, Enter by the narrow gate, i.e., by the humility of Christ: "for it was fitting for Christ to die and so enter into his glory" (Lk 24:26). Hence through many tribulations one must enter the kingdom of God. Secondly, this gate is called charity: "This is the gate of the Lord; the righteous shall enter through it" (Ps 118:20). This is made narrow by the divine law, and we must enter through it by observing the law and the precepts.

Then he assigns the reason: for the gate is wide and the way is easy that leads to destruction. He describes two gates: one is wide, the other narrow. The wide is described, because the devil is wide and the presumption of pride is wide: "The gates of hell shall not prevail against it" (Mt 16:18). This gate is wide, because something wide receives all; for it is not such that it can be filled. This gate is also called sin or vice; and this is wide, because it can occur in many ways. For virtue exists in one way, but vice in many: "There is swearing, lying, killing, stealing, and committing adultery" (Hos 4:2). Again, it is a wide way, and this is the working of sin: "What do you gain by going to Egypt?" (Jer 2:18). Furthermore, this way is spacious, because in its beginning it seems wide; but later it is narrowed, for its terminus leads to perdition, because "the wages of sin is death" (Rom 6:23). And those who enter by it are many. Here he mentions the number, because literally "the number of fools is infinite" (Ec 1:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
