[[commentary]]
quote='''
And he sets out the effect of the light: and the Gentiles shall walk, to knowledge of and devotion to God, seeing the benefits given to you by God; in the brightness of your rising, like the sunrise, glowing like a star: when the holy city (2 Macc 3:1). Or in your light, in the faith of Christ: the nations shall walk in the light of it (Rev 21:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
