[[commentary]]
quote='''
Then he mentions the good they should have: first, that which pertains to right living; second, to true doctrine, at embracing that faithful word (Titus 1:9).

All of these are obvious and need no comment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
