[[commentary]]
quote='''
"And they will vanish from their place as though dried up." He uses the metaphor of snow, which he has already mentioned, for it does not immediately melt with the first heat when it is very hard and frozen, but when not yet frozen, it melts immediately when touched by the rays of the sun and becomes slush. He shows this saying, "and they will vanish from their place, as though they were dried up," i.e., immediately their whole prosperity will vanish at the first assault of adversity as the snow does at the first heat.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
