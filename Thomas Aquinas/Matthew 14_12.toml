[[commentary]]
quote='''
And his disciples came and took his body and buried it. Here the burial of John is treated, and it is counted among the works of mercy; and yet it seems that mercy does not pertain to the dead, because if it pertains to him, it seems that what the Lord says is not true: fear not those who kill the body. Why then is it counted among the works of mercy? It must be said that even if one does not serve the dead according to the effect which he now has, yet one serves him according to the affection which one now has toward the dead. Hence they took his body and buried it; it is said that near Sebaste, since it is nearby. Later, Julian the Apostate, seeing many coming to his relics, had him burned, except for the head. And coming, they told Jesus. Hence the disciples of John, who at first made accusations against Jesus, after John's death returned to Jesus and became familiar with him: so some in a time of tribulation are converted to Christ; Hosea 6:1: in their tribulation they will rise early to me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
