[[commentary]]
quote='''
Here he lists the evils voluntarily assumed, namely, those endured in homes, and he lists three evils opposed to the three goods which are necessary for domestic life. The first good is restful sleep; the second is sustenance from food; the third is the warmth of clothing. To restful sleep he opposes labor and watchings, in regard to which he says, in toil, i.e., manual labor: "You yourselves know that these hands ministered to my necessities, and to those who were with me" (Ac. 20:34), because he literally made his living with his own hands: "With toil and labor we worked night and day, that we might not burden any of you" (2 Th. 3:8). As to the weakness resulting from labor he says, and hardship, which is a weakness and tiredness that follows upon labor or from a natural sickness: "My strength was dried up as by the heat of summer" (Ps. 32:4). But in regard to watchings he says, through many a sleepless night, because he devoted himself either to preaching at night or to manual labor. In Ac. (20:7) it says that he prolonged his sermon until midnight.

To sustenance from food he opposes two forms of being denied food. One is due to necessity; hence he says, in hunger and thirst, namely, because he was unable frequently to obtain food and drink: "To the present hour we hunger and thirst" (1 Cor. 4:11); the other is voluntary; hence he says, often without food, i.e., voluntarily undertaken both for the good example and to tame the flesh: "I pommel my body and subdue it" (1 Cor. 9:27). But this seems to be out of harmony with Matt. (6:33): "But seek first his kingdom and his righteousness, and all these things shall be yours as well." Why then in hunger and thirst? I answer that when it is expedient and for our benefit, they are added, i.e., temporal things; but sometimes it is expedient to lack them.

To the warmth of clothing he opposes two things: one on the part of nature; hence he says, in cold; the other on the part of poverty, hence he says, and exposure. I am proved a minister of Christ: "We are ill-clad and buffeted and homeless" (1 Cor. 4:11); "In afflictions, hardships, calamities" (2 Cor. 6:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
