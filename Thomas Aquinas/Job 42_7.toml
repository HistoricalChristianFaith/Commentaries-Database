[[commentary]]
quote='''
Since God had reproved both Eliud and Job in his discourse, (38:2,3) now in the third place he reproves his friends and especially Eliphaz among them. It is clear that Eliphaz is the most important from the fact that he began to speak first. So the text says, "After the Lord had spoken these words to Job, he spoke to Eliphaz the Temanite: My fury is enkindled against you and your two friends," Baldath and Sophar. Consider here that Eliud had sinned from inexperience whereas Job from levity, so neither had sinned gravely. Therefore, the Lord is not said to be angry with them, but he is exceedingly angry with Job's three friends because they had sinned gravely in asserting perverse doctrines as we saw already. (13:4) So he says, "for you have not spoken correctly in my presence," that is, with truths of faith, "like my servant Job," who did not withdraw from the truth of faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
