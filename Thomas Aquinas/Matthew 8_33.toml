[[commentary]]
quote='''
He continues with the amazement of the swineherds: Hence the herdsmen fled and told everything. They told something sad and something joyful: sad about the swine, but joyful about the cured demoniac. By those herdsmen are signified the synagogue rulers, who for the sake of temporal things contradict Christ as much as they can.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
