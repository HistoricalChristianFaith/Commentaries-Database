[[commentary]]
quote='''
The wise answered, saying. Here the response of the wise is presented, and in this response two things are presented. First, a response of refusal is presented; likewise a certain counsel is presented, at go rather to them that sell. And what is the reason? Lest perhaps there be not enough for us and for you. Hence, because the oil of mercy, or interior joy, or exterior works do not suffice for us and for you, as it is said in 1 Peter 4:18: if the just man shall scarcely be saved, where shall the ungodly and the sinner appear? And the Apostle in Romans 8:18: the sufferings of this time are not worthy to be compared with the glory to come that shall be revealed in us. And Isaiah 64:6: all our justices are as the rag of a menstruous woman. Because therefore it does not suffice for us and for you, go rather to them that sell and buy for yourselves. But will there be time for them to seek oil? Therefore it must be understood that this is said more by way of reproach than by way of counsel; as if they were saying, you should have gone. According to Chrysostom, these sellers are the poor, because they purchase the kingdom; Luke 16:9: make unto you friends of the mammon of iniquity; hence they say go, i.e., you should have gone. According to Augustine it is said by way of reproach. The sellers of oil are flatterers; hence seeing that these seek assistance, they say: go rather to them that sell and buy for yourselves; as if they were saying: you never sought anything but oil, i.e., human praise; now go to the world and buy that testimony which you always sought. According to Origen the letter is plain, because he wills that all of this takes place in the present world. Sometimes it happens that a sinner sees a just man and asks what he ought to do. But some are so wise that their wisdom suffices for themselves, but does not suffice for themselves and others. Hence such men say to those who seek counsel from them: we do not have so much of spiritual doctrine that we can suffice for ourselves and for you; therefore go to the doctors of the Church, and to the wise men who will sell to you. Concerning this you have Isaiah 55:1: all you that thirst, come to the waters; and you that have no money, make haste, buy and eat. But how is it sold without money? I say that wisdom is sold without money. And what is its price? That a man willingly studies, this is the price of wisdom; Proverbs 2:4: if you shall seek her as money, and shall dig for her as for a treasure, then shall you understand the fear of the Lord, and shall find the knowledge of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
