[[commentary]]
quote='''
"The salutation of Paul, with my own hand." He says this because of unbelievers who were twisting his epistles. "See with what kind of letters I write to you with my own hand" (Gal 6:11). "Which is the sign in every epistle. So I write."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
