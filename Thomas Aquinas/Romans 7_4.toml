[[commentary]]
quote='''
Then when he says, therefore, my brethren, he concludes to his main proposition, saying, therefore, my brethren, you also have died to the law, by the body of Christ, i.e., in becoming members of the body of Christ, dying and being buried with him, as stated above; you have died to the law in the sense that the obligation of the law ceases in you, so that you may belong to another, namely, Christ, in whom, through rising with him, you have received a new life. Hence you are held obliged not by the law of the former life but by the law of the new life.
But this application seems awkward, because in the preceding example the man died and the woman remarried without obligation of the law. But here the one released from obligation is said to die.
However, if we consider it another way, there is a parallel, because since marriage is between two, it makes no difference which one dies. In either case the law of marriage is taken away by death. Hence the obligation of the old law ceases in virtue of the death by which we die with Christ.
Then he shows the utility of this liberation, when he says, that we may bear fruit.
In regard to this he does three things:
first, he mentions the utility, saying: that we may bear fruit to God. For if we have been made members of Christ and abide in Christ, we can bear fruit, i.e., good works, for the honor of God: as the branch cannot bear fruit by itself, unless it abides in the vine (John 15:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
