[[commentary]]
quote='''
This is like debaters usually make objections against the arguments of their opponents, to understand the truth more fully, and so he says, "to know how he answers me." This relates to knowing the truth of the answer. "To understand what he says to me," relates to understanding the sense of the words. For man cannot know whether something is true which is said to him unless he understands what is said to him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
