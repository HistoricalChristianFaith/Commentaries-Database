[[commentary]]
quote='''
After Eliphaz had censured Job for provoking God to argument and presuming his own justice, he now censures him about the words he used in the argument and especially for his statement, "Do you think of me as your enemy? Do you show your power against the leaf which is driven by the wind?" (13:24 and 25) and "You have placed my feet in fetters and so on." (13:27) First he gets his attention saying, "I will show you," what you were asking from God, "listen to me," carefully. He shows how he can show him saying next, "what I have seen," in the discovery of his own intellect, "I will tell you." Besides, I will not be embarrassed to tell you what I have heard from others, putting them forward as my authority, because "Wise men confess and do not hide their fathers," from whom they learned wisdom. It is truly the lot of the ignorant and the proud to attribute what they have learned from others to themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
