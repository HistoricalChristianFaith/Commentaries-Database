[[commentary]]
quote='''
He shows why he did not despise submitting to judgment with his servants saying, "When the Lord God rises up to judge me," that is, when he himself comes to judge, if I now despise his judgment, I would have no one in whose help or to whose counsel I could go for refuge. Nor would I even be able to rationally answer God in judgment, and so he says, "and when he questions," when he examines my deeds, "what will I answer him," what reason will I be able to give for not being willing to submit to judgment with my servants? He implies the answer "none."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
