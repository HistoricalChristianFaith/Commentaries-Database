[[commentary]]
quote='''
In Deuteronomy (c 18) we read that a prophet who speaks, as coming from the mouth of the Lord, things that the Lord did not say, should be killed. So, lest the Jews say that he should be killed for speaking from himself, and not from the mouth of the Lord, he adds, I speak of what I have seen with my Father. As if to say: I cannot be accused of speaking things that I have not heard, for I speak not only what I have heard, but what is more, I speak of what I have seen. Other prophets spoke the things they heard, whereas I speak the things I have seen: "No one has ever seen God; the only Son, who is in the bosom of the Father, he has made him known" (1:18); "That which we have seen and heard we proclaim also to you" (1 Jn 1:3). This must be understood of a vision which gives the most certain knowledge, because the Son knows the Father as he knows himself: "No one knows the Father except the Son" (Mt 11:27).

He then infers their spiritual origin when he says, and what you have seen with your father, that you do. As if to say: I speak things that are in accord with my origin; but you do the things that are done by your father, namely, the devil, whose children they were, according to Augustine, not insofar as they were men, but insofar as they were evil. You do those things, I say, which you see, at the devil's suggestion: "Through the devil's envy death entered the world" (Wis 2:24).

Chrysostom uses another text: What you see with your father, do it. As if to say: just as I reveal my Father in truth by my words, so you, reveal the father of your origin, namely, Abraham, by your deeds. Thus he says: Do what you see your father doing, you who are taught by the law and the prophets.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
