[[commentary]]
quote='''
In this part the outcome of blessedness is described: and first its diversity is set forth; second, the reason is assigned, at "because the Lord knows," etc. Concerning the first, he does two things. First he sets forth the outcome for the good; second, for the wicked, at "not so the ungodly," etc. Concerning the outcome of the good, he uses a similitude: and first he proposes it; second, he applies it, at "and all things whatsoever he shall do," etc. For the similitude is taken from a tree, in which three things are considered: namely, planting, bearing fruit, and preservation. For planting, earth moistened by waters is necessary, otherwise it would dry up; and so he says: "which is planted near the running waters," that is, near the streams of graces. Jn. 7: "He who believes in me, out of his belly shall flow rivers of living water." And whoever has roots near this water will bear fruit by doing good works; and this is what follows: "which shall yield its fruit." Gal. 5: "But the fruit of the Spirit is charity, joy, peace, patience, long-suffering, goodness, kindness," etc. "In its season," namely now, when it is the time for working. Gal. 6: "While we have time, let us do good to all." But it does not dry up; rather, it is preserved. Certain trees are preserved in substance but not in their leaves; some are preserved also in their leaves, and so it is with the just. Hence he says, "and its leaf shall not fall off," that is, not even in their least and outward works are they forsaken by God. Prov. 11: "The just shall spring up as a green leaf."

Then when he says, "and all things," he applies the similitude, because the blessed shall prosper in all things; and this when they obtain their intended end with regard to all that they desire, because the just attain blessedness. Ps. 117: "O Lord, save me; O Lord, grant prosperity," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
