[[commentary]]
quote='''
Since they could object, 'We are not the only ones who know, but even so, you still do not know,' he answers saying, "I too have a heart," to know these things, "as do you, and this heart is not less than yours," in this knowledge. Lest this be ascribed to arrogance, he continues, "For who is ignorant of these things which you know?" as if to say: It is no great thing if I say I know what you know, since it is no great claim to know them, since every man can know them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
