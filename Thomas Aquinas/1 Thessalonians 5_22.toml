[[commentary]]
quote='''
In regard to the third point, Paul says of evil: abstain from every form of evil. "He knows how to refuse the evil and choose the good" (Is. 7:15). And he says, every form because we are obliged to avoid even those actions which only have the appearance of evil, that is, which we cannot perform in the sight of men without causing scandal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
