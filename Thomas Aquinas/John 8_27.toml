[[commentary]]
quote='''
When he says, And they did not realize that he was calling God his Father, he reproves their slowness to understand: for they had not yet opened the eyes of their hearts by which they could understand the equality of the Father and the Son. The reason for this was because they were carnal: "The sensual man does not perceive those things that pertain to the Spirit of God" (1 Cor 2:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
