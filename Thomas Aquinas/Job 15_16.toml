[[commentary]]
quote='''
Third, he attacks the same statement from the personal condition of Job himself, as a conclusion to the major (premise above in v. 15) "How much more abominable," through sin, "and useless," by the failure of justice, "is the man who drinks evil like water," i.e. who commits evil as if it were nothing and without any consideration. For someone who drinks wine has to drink with careful attention so that he does not become drunk. This is not the case with someone who drinks water. In this he notes that Job would easily fall into evil like a man drinks water easily and readily.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
