[[commentary]]
quote='''
Since he has shown that "God does not cast out the powerful," (v. 5) but the wicked, whereas Job seemed to be cast out by God through many adversities, so he says, "Your cause has been judged as evil," as if to say: You were not punished because you were powerful but as a wicked man. Against this he promises him a reward if he will repent and so he says, "you will receive the cause and judgment," for the cause and judgment will be restored to you so that you can investigate the cases of others and judge on them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
