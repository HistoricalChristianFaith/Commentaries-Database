[[commentary]]
quote='''
The eagle is powerful in game like the lion among quadrupeds. To show this he says, "His young suck up blood," that is, of the living animals which the eagle carries back to the nest. The eagle eats not only live animals, like falcons and hawks, but also the carcasses of dead animals, and so he says, "and wherever there is a carcass he immediately goes there." In this text he also shows the swiftness of his flight.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
