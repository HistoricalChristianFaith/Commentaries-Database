[[commentary]]
quote='''
Therefore he says, At the same time make ready a lodging for me too. For it was his custom when he was in Colossae to stay in his home. Chrysostom asks what we are to make of this remark in which a poor man commands a rich man by letter from across the expanse of the earth to prepare a lodging for him. What would have to be prepared for one content with bread and cheap victuals? It should be said that it was not for the sake of the preparation of lodging that he says this, but to insinuate familiarity and love; in this way he will be prompt to obey. The Apostle therefore does not say this on account of external trappings but out of his devotion. For I hope that through your prayers I shall be restored to you.

Against this is the fact that he never returned to them but died in Rome, therefore his hope was dashed. I reply that the hope of the just is of two kinds, the chief of which is for his own good, and this is never dashed; another secondary hope is the proof of others, and this is sometimes dashed, because their merits are contrary, as the just man is sometimes not heeded by others. But was he deceived in his trust? It should be said that God alone knows the future; that is not for human knowledge, except the prophetic. And no prophet knows all the future events that concern himself. Only Christ did, because he did not have the Holy Spirit in a limited way. Thus Isaac the great prophet was deceived in Jacob. So it is not to be wondered at in an apostle if he does not know.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Philemon.html'
source_title='Commentary on Philemon'
