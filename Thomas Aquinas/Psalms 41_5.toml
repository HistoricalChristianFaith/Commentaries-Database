[[commentary]]
quote='''
"My enemies have spoken." Above, the Psalmist asked for healing mercy; here, however, he sets forth the necessity of such a petition, which is caused by enemies. And according to the mystical sense, because the literal is plain, in this passage these words are spoken in the person of Christ. Concerning which he does three things. First he sets forth the malice of the wicked desiring his harm. Second he sets forth their scheming to entrap him, at "And if he came in." Third he sets forth their deliberation, at "Against me, because the enemy." First he desires to harm. Second he lies in ambush. Third he considers how it may be accomplished. He says therefore, "My enemies have spoken," in their heart or with their mouth, "evil things to me." Mt. 12: "The evil man out of an evil treasure brings forth," etc. And these evil words express their desire for the death of Christ, or of the just man. Hence it is said, "When will he die?" This is the mode of expressing desire. Ps. 42: "When shall I come and appear?" etc. Wis. 2: "Let us condemn him to a most shameful death." And they wished the death of Christ so that his fame, which was then celebrated, might be extinguished. Jer. 11: "Let us destroy him from the land of the living, and let his name be remembered no more." Hence they say, "And his name shall perish." But the contrary happened, because through death he was more exalted, and more were converted after the death of Christ. Jn. 12: "Unless the grain of wheat falling into the ground dies, it brings forth much fruit." And although the wicked lie in ambush against the good to extinguish their name, yet, as is said in Prov. 10: "The memory of the just is with praises."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
