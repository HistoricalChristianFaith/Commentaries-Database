[[commentary]]
quote='''
He induces him to avoid harming himself or do something to help himself when he says, "Can one who does not love judgment be healed?" as if to say: You who need healing, because you are crushed by many illnesses, cannot be healed unless you love the divine judgment. He rejects Job's opinion which he thought was about the injustice of the divine judgment using many evident indications of divine justice, and so he says, "How can you condemn the one who is just," God, as this appears in many things, "to such a degree," that you say he is a subverter of justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
