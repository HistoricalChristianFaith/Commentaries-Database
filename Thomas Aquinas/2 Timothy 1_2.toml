[[commentary]]
quote='''
The person greeted is Timothy, his son, converted by him: my dearly beloved son, because he was of the same mind: for I have no man so of the same mind who with sincere affection is solicitous for you (Phil 2:20).

The goods he desires for him are three: namely, grace, through which sins are remitted; mercy, through which we obtain the final good; and peace; a Gloss says: that is, tranquility of mind, which befits a prelate, who is appointed to procure peace: the Lord said to them: peace be to you (John 20:19). And he commanded those entering a house to confer peace, as it is stated in Matthew (Matt 10:12). And this from God, the Father, who is the giver of every gift (Jas 1:17); and from Jesus Christ our Lord, who, as man, is mediator between God and man: by whom he has given us most great and precious promises (2 Pet 1:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
