[[commentary]]
quote='''
And you will be dragged before governors and kings, as to Herod and many others. But you should have great consolation, because for my sake, whom you love. Augustine: "Love does all things as though they were slight or nothing." Also, "blessed are those who suffer persecution for justice' sake..." (Mt 5:10). And what will follow from this? This will be a testimony before them, i.e., against them, i.e., against the Jews and gentiles. For since they will deliver you up to the council, that will be a testimony against them. Also, because it is before rulers and kings, this will be testimony against them. Hence below (22:34): "Behold, I sent you wise men and scribes; some of them you will kill and some you will flog in your synagogues..." Or in this way: as a testimony to them, namely to the Jews and gentiles, because I am sending you to them as witnesses of my faith; hence a martyr is the same as a witness, because by your sufferings you will be witnesses to my Passion: "You shall be my witnesses in Jerusalem and in all Judea and Samaria and to the end of the earth" (Acts 1:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
