[[commentary]]
quote='''
The first of these is to know the space of time in which the fetus is brought to term in the womb, and expressing this he says, "Have you numbered the months of their conception?", i.e., can you indicate to them when they must prepare themselves for giving birth? So he says, "and did you know the time of their giving birth," to tell them when they should give birth? In these things women in labor are usually instructed by others, but the animals, which are far from human society, know these things through natural aptitude implanted in them by God, and prepare themselves at a determined time to give birth in the way in which they can most easily bring forth young.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
