[[commentary]]
quote='''
But blessed are your eyes that see, and your ears that hear etc. Above, the Lord showed the misery of the Jews who seeing did not see; here he shows the blessedness of the apostles who saw and heard. And first he shows the blessedness; secondly, he shows the sign, at amen I say to you etc. He says, therefore, that seeing they do not see, but your eyes are blessed. But if this is referred to the exterior eyes and ears, the eyes of the Jews are blessed just as much as those of the apostles. Therefore Jerome says that it is necessary to understand a twofold set of eyes, namely, exterior ones, with which all commonly saw — and he is not speaking of these — or interior ones, with which the apostles alone saw. Ephesians 1:17: that he may give you the spirit of wisdom and of revelation, in the knowledge of him, the eyes of your heart being enlightened. Hence likewise there are certain exterior ears and certain interior ones, of which he says above: he who has ears to hear, let him hear. Isaiah 50:5: the Lord has opened my ear, and I do not resist; I have not gone back. He attributes blessedness to seeing, because this blessedness on the way consists only in a participation of eternal blessedness, which consists in vision: for in the vision of God is the glory of man; Jeremiah 9:23: let not the wise man glory in his wisdom; and there follows, but let him who glories glory in this, that he knows and understands me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
