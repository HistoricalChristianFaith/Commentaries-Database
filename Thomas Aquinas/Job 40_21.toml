[[commentary]]
quote='''
He next describes his habitat. Consider here that Aristotle says in The History of Animals V, "Elephants stay in the wilderness and especially on the banks of rivers;" and because there are usually reeds, willows, and shady places on the banks of rivers, he therefore shows the habitat of the elephant saying, "He sleeps in the shade in a thicket of reeds in wet places."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
