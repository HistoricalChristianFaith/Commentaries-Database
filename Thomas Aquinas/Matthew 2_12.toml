[[commentary]]
quote='''
(12) Then he mentions how they showed reverence in obeying. Hence being warned [answered] in a dream not to return to Herod, they departed to their own country by another way. But how could they have received an answer, if they put no question? The answer is that God sometimes answers a question still in the mind, and they inwardly asked what would be pleasing to God concerning their return: "Why do you cry to me?" (Ex 14:15). But do revelations come directly from God? Denis proves that he does not but uses angels. This is done to indicate the importance of the information: "It was ordained by angels through an intermediary" (Gal 3:19); "This is the Moses who said to the Israelites, 'God will raise up for you a prophet, from your brethren, as he raised me up'" (Acts 7:37).

They returned to their own country by another way. This shows that we return to our own country, paradise, from which we were expelled by sin, through obedience: "Do not swerve to the right or to the left; turn your foot away from evil" (Pr 4:27). Chrysostom says here that those who returned led holy lives and later became helpers of St. Thomas, the apostle; however, nothing is found in Scripture about them after their departure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
