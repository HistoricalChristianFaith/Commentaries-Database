[[commentary]]
quote='''
Then when he says, now may the God of hope, he adds a prayer, saying: it has been stated that the gentiles will hope in Christ, the God of hope, i.e., who pours this hope in us: my hope, O Lord (Ps 71:5). Or may the God of hope, i.e., the one to hope in, fill you with all joy, i.e., spiritual, which is concerned with God: the joy of the Lord is your strength (Neh 8:10), and peace, through which a man is at peace in himself and with God and his neighbor: great peace have they who love your law (Ps 119:165), in believing. As if to say: so that along with believing you may have peace and joy, which are effects of charity, as it says in Galatians: the fruit of the Spirit is love, joy, peace (Gal 5:22).

Hence it is clear that he wishes them to have from God, the giver of hope, not only faith but charity, through which faith works, as it says in Galatians (Gal 5:6), lest their faith be unformed and dead: faith without works is dead (Jas 2:26). So that by the fullness of these virtues you may abound, by progressing from good to better, not only in hope but also in the power of the Holy Spirit, i.e., in charity, which is poured forth in your hearts by the Holy Spirit, as was said above (Rom 5:5); God is able to provide you with every grace in abundance (2 Cor 7:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
