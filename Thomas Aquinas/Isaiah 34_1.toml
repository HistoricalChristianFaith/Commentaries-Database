[[commentary]]
quote='''
734. Come near, you Gentiles. In this part, he threatens those who were assistants to the Assyrians, and first, he threatens all of them together; second, he threatens the Idumeans in particular, where it says, behold it shall come down upon Idumea (Isa 34:5). Concerning the first, he does two things. First, he stirs up attention, setting out the order of attention, so that those approaching might come near, those nearby might hear, and those who hear might listen, below: give ear, you islands, and hearken, you people from afar (Isa 49:1). And he sets out the universality of those called together: let the earth hear; and the world, as to those of middle rank, using the container to signify what it contains; the fullness, as to the great; every thing that comes forth of it, as to the lowly: he shows that he is prepared to announce to all, not that all are able to hear: the earth is the Lord's and the fullness thereof (Ps 23[24]:1).

743. Man comes near to God (see Isa 34:1), through the reception of grace: we have access through him (Rom 5:2); through the contemplation of divine wisdom: come to God and be enlightened (Ps 33:6[35:5]); through the ministry of obedience: the sons of Sadoc, who among the sons of Levi, come near to the Lord, to minister to him (Ezek 40:6); through the expectation of firm confidence: come to her as one that ploughs, and sows (Sir 6:19); through the spirit of concord: you have access in one Spirit to the Father (Eph 2:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
