[[commentary]]
quote='''
And now thus says the Lord. Here he shows them divine love through the remedies which he granted them among their difficulties. And it is divided into three parts: in the first, he promises future remedies to show them his love; in the second, he recalls past benefits to confirm the promise: thus says the Lord, who made a way in the sea (Isa 43:16); in the third, he excludes their merits to take away their presumption: but you have not called upon me (Isa 43:22).

Concerning the first, he does three things: first, he shows the privilege of divine love toward them; second, he excludes the sharing of divine power from the promised remedies: all the nations are assembled together (Isa 43:9); in the third, he sets out the sign of his love: thus says the Lord your redeemer (Isa 43:14).

Concerning the first, he promises them three remedies. First, support in their punishments, excluding fear by the divine presence: that created you, as to the principle of their substance: is not he your father, that has possessed you, and made you, and created you? (Deut 32:6), and formed you, as to the form he gave them: and the Lord God formed man (Gen 2:7); I have redeemed you, from evils: I will deliver them out of the hand of death. I will redeem them from death (Hos 13:14), and called you, to grace: I will call that which was not my people, my people (Hos 1:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
