[[commentary]]
quote='''
Sometimes, however, he is not killed by interior weakness, but by an exterior persecutor, and so he says, "He" (God) "will send," some persecutor, "on him," who is more powerful than he, whom he cannot resist, "and he (the persecutor) will not spare him." "He" (the evil man) "will flee from his hand," from his power, "and escape," either by flight or by death because, "after he has died, he has nothing more to do." (Luke 12:4)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
