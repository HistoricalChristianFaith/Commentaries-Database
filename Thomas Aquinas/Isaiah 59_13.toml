[[commentary]]
quote='''
Second, the variety of their sins, against God: in sinning, in deed, and lying, in speech, we have turned away, in omission; and against their neighbor, in speech: but spoke calumny, against our neighbor; and against the law: and transgression: from the heart come forth evil thoughts (Matt 15:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
