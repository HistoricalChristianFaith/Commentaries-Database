[[commentary]]
quote='''
649. And now do not mock. Here he draws, as a conclusion, sound and wholesome counsel, and first, he prohibits mocking: do not mock; bonds, of captivity: he shall scorn the scorners (Prov 3:34); and he assigns the reason: for I have heard of the Lord the God of hosts a consumption and a cutting short upon all the earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
