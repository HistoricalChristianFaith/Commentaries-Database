[[commentary]]
quote='''
The Son of man shall send his angels (these words show him to be both man and God) and they shall gather out of his kingdom all scandals. He refers this to sins which are committed against one's neighbor. But what follows, and those who work iniquity, refers to other sins. And what is said, kingdom, is understood of the present Church, because in the triumphant Church there are no scandals, and man will know through the tribulation preceding the final judgment. Augustine says that we do not read that the wicked serve to reward the good, but the good are sometimes found to punish the wicked. What he says, then, all, is to be understood in the present Church, by sending tribulations, through which both the good and the wicked are punished. Chrysostom explains by kingdom the heavenly homeland. And what is said, all scandals, does not mean that they are there, but that they will not be there. Hence they shall gather and separate the wicked from the good, so that they may not be with them,
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
