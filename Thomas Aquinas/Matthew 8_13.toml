[[commentary]]
quote='''
God's kindness is shown, when he says, And Jesus said to the centurion, "Go; be it done for you as you have believed." But the effect follows: and the servant was healed, because his word was full of power (Ec 8:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
