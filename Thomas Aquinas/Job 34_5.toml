[[commentary]]
quote='''
Therefore, he proposes the argument of Job saying them, "since you have said, Job: I am a just man." He had said this already, "I will not desert my justification which I have begun to have." (27:6) Further he had shown his justice clearly in many things above in Chapter Thirty One. Eliud continues, "and God is overturning my cause." Eliud takes this to be the same as what Job had said in Chapter Twenty Seven, "Long live God who has rejected my cause," (v.2) and the same seems to pertain to what he had said in Chapter Nineteen, "God did not afflict me with right judgment." (v.6)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
