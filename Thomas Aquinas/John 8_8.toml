[[commentary]]
quote='''
Jesus continued to write, and again bending down, he wrote. He did this, first, to show the firmness of his sentence, "God is not like a man, who may lie, or like a son of man, so that he may change" (Num 23:19). Secondly, he did it to show that they were not worthy to look at him. Because he had disturbed them with his zeal for justice, he did not think it fit to look at them, but turned from their sight. Thirdly, he did this out of consideration for their embarrassment, to give them complete freedom to leave.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
