[[commentary]]
quote='''
But he then rebukes them for their change of heart; hence he says, "Where is then your blessedness?" As if to say: Did not men think you blessed for honoring me and accepting my preaching? "Where is thy fear, thy fortitude, thy patience and the perfection of thy ways?" (Job 4:6).

The third thing that strengthens love is doing good to one another. As to this he says: "For I bear you witness that, if it could be done," i.e., had been just to do so (for that can be done which it is just to do) or had been to the advantage of the Church, "you would have plucked out your own eyes and would have given them to me." As if to say: You loved me so much that you would have given me not only your external goods but your very eyes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Galatians.html'
source_title='Commentary on Galatians'
