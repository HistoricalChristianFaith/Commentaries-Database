[[commentary]]
quote='''
And why are they blessed? Amen I say to you, he shall set him over all his goods. This is expounded in three ways. In one way, to show in what all blessedness consists. For blessedness consists in some good; but all goods are God's. Is blessedness then in some one of these? Blessedness is in that good which is above all goods; for no one is blessed except in that good which God is. Hence he shall set him over all his goods, i.e., he will be made blessed in him, namely, in God, who is above all things. In a second way, it can be expounded as said to show the preeminence that good prelates will have. In Luke 12:37 it says that he will make them sit down; but here it says that he shall set him over all his goods; because among all rewards the greatest is the reward of the good prelate; above at 5:19: He who shall do and teach, he shall be called great. Daniel 12:3: They who are learned shall shine as the brightness of the firmament, and they who instruct many to justice, as stars for all eternity. And this is over all his goods, i.e., over all the rewards of the saints. In a third way, it can be expounded through union with Christ; because just as in this world no one will attain to the state of perfection unless he follows the footsteps of Christ, so neither then, unless one is united to Christ; and they will have dominion over all things, inasmuch as their will is made conformed to the divine will; Luke 22:29: And I dispose to you, as my Father has disposed to me, a kingdom. And Apocalypse 2:28: He who shall overcome, I will give him the morning star.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
