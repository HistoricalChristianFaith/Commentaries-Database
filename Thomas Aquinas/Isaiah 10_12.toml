[[commentary]]
quote='''
And it shall come to pass. Here he denounces his pride. And first, his proud boasting is set out, second, the occasion of his boasting: for he has said (Isa 10:13); third, the rebuke of the boaster: shall the axe boast? (Isa 10:15). Therefore he says: and it shall come to pass, that when the Lord shall have performed all his works in mount Zion, namely, the punishments by which he wishes to correct them, the proud heart, as to presumption of his doing, and the glory of the haughtiness of his eyes, as to his vainglory over his deeds, above: the lofty eyes of man are humbled (Isa 2:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
