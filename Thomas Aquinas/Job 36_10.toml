[[commentary]]
quote='''
Not only does he force them to recognize their past sins, but he also shows them that they are punished for these sins, and so he says, "He will also open their ears," that is, he will make them understand that God speaks to them in punishing them. Therefore they are punished because of their sins, and so he says, "to correct them," as if to say: He will make them recognize that God punished them to correct them. Further he will persuade them to do penance, and so he says "and he speaks," interiorly or by exterior admonition, "to turn them back from evil," by doing penance for their past sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
