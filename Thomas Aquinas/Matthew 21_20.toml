[[commentary]]
quote='''
"And the disciples seeing it wondered." Here first the wonder is presented; secondly, the satisfaction of the wonder. He says "and the disciples seeing it wondered." Just as men wonder when they see a spirit that seems good, and it quickly withers, so they wondered how it dried up so quickly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
