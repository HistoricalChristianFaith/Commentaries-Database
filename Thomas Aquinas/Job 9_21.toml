[[commentary]]
quote='''
The third degree is when someone, although he might be interiorly conscious of sin, still takes for granted either he had no evil intention or he did not do it from malice and deceit, but from ignorance and weakness. But this testimony also does not stand for man against God either. So he says, "If I am simple," without the deceit and duplicity of a depraved intention, "my soul will not know this." For man is unable to discern the fluid motion of his affection, both because of its variation and the mingling and impulse of many passions. Because of this, Jeremiah says, "The heart of man is wicked and inscrutable. Who will understand it?" (27:9) It is because of the ignorance of these sorts of things that man knows neither himself nor his state and life is rendered wearisome even to the just. So he says, "and I will be weary of life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
