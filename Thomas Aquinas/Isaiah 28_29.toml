[[commentary]]
quote='''
Third, he sets out the explanation: this also is come forth from the Lord God of hosts, to make his counsel wonderful: wonderful are your works (Ps 134[135]:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
