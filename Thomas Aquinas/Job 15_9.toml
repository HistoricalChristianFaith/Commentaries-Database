[[commentary]]
quote='''
Third, he shows it in comparison to other men. But Job does not in fact seem to be any wiser than others from confidence in the possession of a higher knowledge so that he can presume to dispute with God. So he then says, "What do you know," from faith or revelation, "that we do not know?" "What do you understand," by natural knowledge, "that we do not know?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
