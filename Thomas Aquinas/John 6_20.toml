[[commentary]]
quote='''
Secondly, we see Christ encouraging them against two dangers. First, they are encouraged against the danger to the faith in their intellect when he says, It is I, to eliminate their doubts: "Look at my hands and my feet! It is really me" (Lk 24:39). Secondly, Christ encourages them against the danger of fear in their emotions, saying, Do not be afraid: "Do not be afraid when they are present" (Jer 1:8); "The Lord is my light and my salvation, whom shall I fear" (Ps 26:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
