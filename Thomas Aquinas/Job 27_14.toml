[[commentary]]
quote='''
For he shows that this share or inheritance is perishable first as to what happens for the most part to the children of evil men, which are held in great esteem among temporal goods. The sons of evil men who have prospered in this world are sometimes killed, and so he says, "If his children are multiplied," which was held a sign of great prosperity, "the sword will wait to kill them," i.e. they will be killed. Although it rarely happens that the sons of a rich man fall into great poverty, yet this happens frequently to their grandsons and descendants, and so he then says, "and his grandchildren will hunger for bread," because of want.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
