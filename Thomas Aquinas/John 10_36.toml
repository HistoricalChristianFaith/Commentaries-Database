[[commentary]]
quote='''
Then when he says, do you say of him whom the Father sanctified and sent into the world, You are blaspheming, he draws his conclusion. If, with Hilary, we refer this to Christ insofar as he has a human nature, the meaning is this: Some people are called gods only because they participate in God's word. How then can you say, you are blaspheming, that is, how can you consider it blasphemy, if that man who is united in person to the Word of God is called God? This is why he says, whom the Father sanctified. For although God sanctifies all who are sanctified - "Sanctify them in truth" (17:17) - he sanctified Christ in a special way. He sanctifies others to be adopted children - "You have received the spirit of adoption" (Rom 8:15) - but he sanctified Christ to be the Son of God by nature, united in person to the Word of God. These words, whom the Father sanctified, show this in two ways. For if God sanctifies as Father, it is clear that he sanctifies Christ as his Son: "He was predestined to be the Son of God by the Spirit of sanctification" (Rom 1:4). We can also see this by his saying, and sent into the world. For it is not fitting for a thing to be sent some place unless it existed before it was sent there. Therefore, he whom the Father sent into the world in a visible way, is the Son of God, who existed before he was visible: for as we saw above, "He was in the world, and the world was made through him" (1:10); and "God sent the Son into the world" (3:17). Do you say of him whom the Father sent into the world, you are blaspheming, because I said, I am the Son of God? This was like saying: I, who am united in person to the Word, have much more reason to say this than those to whom the word of God came.

But how did the Jews realize that he was claiming to be the Son of God? Our Lord did not say this expressly. I answer that although our Lord did not say this expressly, yet from what he did say - I and the Father are one and what my Father has given to me is greater than all - they understood that he received his nature from the Father and was one in nature with him. But to receive the same nature from another, and to be it, is to be a son.

But if, with Augustine, we refer him whom the Father sanctified to Christ as God, then the meaning is this: him whom the Father sanctified is he whom he has begotten holy, or sanctified, from eternity. The other things which follow should be explained in the same way as Hilary does. Yet the better explanation is to refer everything to Christ as man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
