[[commentary]]
quote='''
Those who are subject to bishops owe them, first, the acknowledgement of blessings; secondly, charity; and thirdly, peace. Respect those who labor among you, that is, acknowledge their work: "Remember your leaders, those who spoke to you the word of God" (Heb. 13:7). And I say that you shall respect them first on their own behalf, because of the great labours they have borne for you. And so he makes mention of those who labour among you for your good. "Take your share of suffering as a good soldier of Christ Jesus" (2 Tim. 2:3). Secondly, you shall respect them on behalf of God, and because of this reverence is due to them as it is due to God. And so Paul remarks: and are over you in the Lord, that is, in the place of God. "If I have forgiven anything, it has been for your sake in the presence of Christ" (2 Cor. 2:10). Thirdly, you shall respect them on your own behalf, because they are useful to you; hence he says: and they admonish you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
