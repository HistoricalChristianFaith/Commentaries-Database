[[commentary]]
quote='''
Again, the kingdom of heaven is like a net cast into the sea, etc. Here another parable is set forth. Secondly, the exposition is given, not as to the whole, but as to a part, at so shall it be at the consummation of the world. And in this two things are done. First, the universality of this teaching is set forth; secondly, the distinction, at when it was filled, etc. He says therefore the kingdom of heaven is like a net. This net is a certain instrument which encompasses a great part of the sea; hence by it can be signified either the teaching or the Church: because the first teachers were fishermen; above 4:18: for they were fishermen. It is cast into the sea, i.e., into the world; Ps 103:25: this great sea, vast and wide, etc. And gathering together fish of every kind. Behold the universality. For the law was given only to one nation; Ps 147:20: he has not done in like manner to every nation, and his judgments he has not made manifest to them. The evangelical law gathers all; Rom 1:14: to the Greeks and to the barbarians, to the wise and to the unwise, I am a debtor. And Mark 16:15: go, preach the Gospel to every creature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
