[[commentary]]
quote='''
Next he applies the remedy, namely of divine help. Where first he proposes the remedy. Second he explains it. He says therefore, "Within myself." Another reading has, "From myself my soul was disturbed." The first is better; as if to say: what is the reason, I ask, why, O soul, you disturb me? And this disturbance comes because however I turn to myself, I find tribulation within me. Hos. 13: "Your destruction, O Israel, is from yourself; only from me is your help." And therefore Jerome has, "My God, within myself." According to that reading, the sense is: as if to say, the cause of the disturbance is from myself; because, if we refer this to the human race, the corruption of sensuality comes from reason, namely from the sense of the first parent. Likewise every man, by sinning, corrupts his own nature; and therefore after sin, sensuality resists reason all the more. And because there is nothing in me except the cause of disturbance, "therefore I will be mindful of you," that is, I will have recourse to you. Hos. 14: "His memorial is like the wine of Lebanon." And from where? "From the land of the Jordan and of the Hermonites." The Jordan is a river in the Promised Land. Hermon is a certain mountain near the Jordan. And according to the history of 2 Sam. 17, when Absalom went to Jerusalem and took counsel to pursue David, who was beyond the Jordan, then Hushai impeded this; and therefore he says: if I were in as great a tribulation as then, nevertheless "I will be mindful of you." Three things, however, are designated here that are in Baptism. By the Jordan is designated the descent of grace into Baptism. Jas. 1: "Every good gift and every perfect gift is from above." "And from the land," because through the influx of grace the earth of the heart is thereby made fruitful. Hermon is interpreted as "anathema," and designates the renunciation we make of the Devil and his pomps in Baptism, because then everyone anathematizes, that is, separates himself from the Devil. "From the little mountain," because this renunciation and grace comes from a humble heart, because God gives grace to the humble, Jas. 4. And the Devil is king over all the children of pride, Job 41.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
