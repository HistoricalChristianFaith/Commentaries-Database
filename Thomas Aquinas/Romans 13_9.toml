[[commentary]]
quote='''
Then when he says for you shall not commit adultery, he proves his proposition: first, by induction; second, by means of a syllogism, at the love of our neighbor.

In regard to the first he proceeds inductively by enumerating certain precepts which fulfill the love of neighbor. And because the three precepts of the first tablet are more directly ordained to the love of God, he does not mention them, although they, too, are fulfilled in the love of neighbor, insofar as the love of God is included in the love of neighbor. But he enumerates the commands of the second tablet, omitting only the affirmative precept about honor to parents. By this it is understood that we should pay to all whatever we owe.

He lists the negative precepts, which forbid a person to do evil to his neighbor. And this for two reasons. First, because the negative precepts are more universal both as to time and as to persons. As to time, because the negative precepts oblige always and at every moment. For there is no time when one may steal or commit adultery. Affirmative precepts, on the other hand, oblige always but not at every moment, but at certain times and places: for a man is not obliged to honor his parents every minute of the day, but at certain times and places. Negative precepts are also more universal as to persons, because no man may be harmed, whereas we are not capable of each serving every other man.

Second, because they are more obviously observed by love of neighbor than are the affirmative. For a person who loves another, rather refrains from harming him than gives him benefits, which he is sometimes unable to give.

But a person does injury to his neighbor in three ways: by action, by word, and by desire.

He does injury by action in three ways: first, against the neighbor's person, and this is forbidden when he says: you shall not kill. This also forbids any injury against the neighbor's person: no murderer has eternal life abiding in him (1 John 3:15).

Second, against a person's wife; and this is forbidden when he says: you shall not commit adultery. This also forbids fornication and any unlawful use of the genital organs: God will judge fornicators and adulterers (Heb 13:4).

Third, against one's external goods, and this is forbidden when he says: you shall not steal. This also forbids any unjust taking of what belongs to another, either by force or by deceit: everyone who steals will be judged (Zech 5:3).

Injury committed by word against one's neighbor is forbidden when he says: you shall not bear false witness. This is forbidden not only in court cases but also outside, whether in the form of detraction or of insults: the false witness will not go unpunished, and one who speaks lies will not escape (Prov 19:5).

Injury committed only by desire against one's neighbor is forbidden when he says: you shall not covet your neighbor's good; and this also forbids coveting another's wife: for I would not have known covetousness to be a sin, if the law had not said: you shall not covet (Rom 7:7).

These commandments are set forth in Exodus 20:17 et seq. Having listed a number of precepts, he combines all others in one general precept, saying: and if there be any other commandment, affirmative or negative, referring to God or to neighbor, it is comprised, i.e., fulfilled, in this word: you shall love your neighbor as yourself. This is said in Leviticus, where our text has: you shall love your friend as yourself (Lev 19:18).

When he says, your neighbor, the reference is to all men and also the good angels, as Augustine says. For a neighbor is anyone who shows mercy to another, as it says in Luke: which of these three, do you think, proved neighbor to the man who fell among robbers? He said: the one who showed mercy to him (Luke 10:36). And because a neighbor is neighbor to a neighbor, the consequence is that even a person shown mercy by another is said to be his neighbor. But the good angels show mercy to us; and we should show mercy to all men and receive it from them, when necessary. Hence it is clear that the good angels and all men are our neighbors, because the happiness toward which we are tending is already theirs, or they are tending toward it with us.

From this reason it is clear that devils are not our neighbors and that we are not commanded to love them, because they are entirely excluded from the love of God and are not included in the list of neighbors but of enemies.

The phrase, as yourself, does not refer to equality of love, as though a person were bound to love his neighbor as much as himself. For this would be against the ordering of charity, by which a person is obliged to take more care of his own salvation than that of others: he put love in order in me (Song 2:4). It refers, rather to a similarity of love, namely, that we should love our neighbor similarly as ourselves.

And this in three ways: first, as to the end of love, namely, that we love ourselves and our neighbor for the sake of God. Second, as to the form of love, namely, just as a person loves himself as willing good for himself, so he should love his neighbor by willing good things for him. But one who loves his neighbor in order to acquire some utility or love from him does not will good for his neighbor but wants to obtain a good for himself from his neighbor. This is the way a man is said to love irrational creatures, such as wine or a horse, namely, to use them. Third, as to the effect of love, namely, that he relieve the need of his neighbor, as he relieves his own; and that he do nothing unlawful out of love for his neighbor any more than he does out of love for himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
