[[commentary]]
quote='''
Third, he sets out the reprimand of his vainglory: then Isaiah the prophet came.

And first, he sets out the inquiry and the manifestation of his fault: there was not any thing which I have not shown them in my treasures: counsel in the heart of a man is like deep water (Prov 20:5).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
