[[commentary]]
quote='''
second, their complete subjection: he shall stretch forth his hands, as though prostrate and seeking mercy or help, below: they shall come (49).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
