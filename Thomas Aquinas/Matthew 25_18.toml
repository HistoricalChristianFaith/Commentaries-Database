[[commentary]]
quote='''
But he that had received the one, going, dug into the earth, etc. But what does it mean to dig into the earth? It is expounded in three ways according to Gregory. That one hides his treasure who hides the gift received in sins of the flesh, or in temporal things: hence he who can profit in temporal things and turns himself to earthly things hides the money of his lord in the earth. Concerning such it is said in Psalm 16:11: they have set their eyes bowing down to the earth. According to Origen, someone has the gift of understanding and yet wishes to live religiously and for himself alone, when he could profit many; this one hides it in the earth; Tobit 12:7: it is honorable to reveal and confess the works of God. For such money is meant to be multiplied, not hidden. Hilary says: who are those who receive one? The Jews, who receive the bare letter. These hide the money in the earth, i.e., in the flesh of Christ, who because of the flesh cannot believe him to be God. Hence the Apostle in 1 Corinthians 1:23: but we preach Christ Jesus, unto the Jews indeed a stumbling block, and unto the Gentiles foolishness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
