[[commentary]]
quote='''
563. – Then (v. 3) he clarifies his thesis in detail with examples of the ancients: first, as to what they believed and taught; secondly, as to what they did (v. 4); thirdly, as to what they suffered (v. 35b).

564. – Now the doctrine of the Old Testament was twofold: one was clearly given; the other was hidden behind the veil of figures and mysteries. The first concerned the unity of God and the creation of the world; the second the mystery of the incarnation and reparation. Hence, just as they observed the Sabbath in memory of the creation, so we observe Sunday in memory of the resurrection. In regard to the doctrine of the creation of the world he says, by faith we understand that the world was created by the word of God. This can be read in two ways: in one way so that by the word of God is in the ablative case. Then the sense is we, as the ancients, by faith, i.e., by the doctrine of faith, namely, of the Old Testament: 'God said: Let there be light; and the light was made' (Gen. 1:3); 'He spoke and they were made' (Ps. 32:9), understand that the world was created, i.e., arranged, by the word of God, i.e., by God's command. But it pertains to faith that we understand this, because, since faith is concerned with things unseen, even the world was made of invisible things, namely, of prime matter, which, when it is bare and devoid of all form, is invisible and lacks all form and disposition. Hence, he says, so that what is seen was made out of things which do not appear. In the second way, so that word is in the dative case. Then the sense is: We understand through faith, as before, that the world was framed, i.e., suited and corresponded to the word, that from invisible things visible things might be made. Here it should be noted that the word of God is God's very concept, by which He understands Himself and other things. But God is compared to the creature as artisan to artifact. But we notice that an artisan produces what he produces outside himself in a likeness of his concept; hence, he makes a house in matter in the likeness of the house formed in his mind. But if the external house conforms to the preconceived house, it is a work properly arranged; if not, not. But because all creatures are arranged in the best way, as produced by an artisan in Whom no error or defect can occur, they all conform in the fullest way to the divine concept according to their mode. Hence Boethius in the Consolations says: 'The most beautiful on bringing forth in His mind a beautiful world forms it in His likeness and image.' Therefore, he says, we understand by faith that the world, i.e., the entire universe of creatures, was framed, i.e., fittingly corresponded, to the word, i.e., to God's concept as artifacts correspond to their art: 'And he poured her out,' i.e., His wisdom, 'upon all his works' (Sir. 1:10).

565. – He continues, that from invisible things visible things might be made. But because the common notion among the ancients was that the soul was produced from nothing (2 Physics), when they saw a new work, they said that it was made from invisible things. Hence, they either supposed that everything was in everything else, as Empedocles and Anaxagoras, of whom we shall say nothing at present; or thought that forms were in hiding, as Anaxagoras. Still others supposed that they were formed from ideas, as Plato; and others from a mind, as Avicenna. Hence, according to all these philosophers, visible things were made from invisible ideal reasons. But we say, according to the aforesaid manner, that visible things were produced from invisible ideal reasons in the Word of God, by Whom all things were made. These reasons, even though they are the same reality, differ in aspect by diverse relations connoted in respect to the creature. Hence, man was created by one reason, and a horse by another reason, as Augustine says in the Book of 83 Questions. Thus, therefore, the world was framed by the word of God, that from invisible ideal reasons in the Word of God, visible things, i.e., every creature, might be made.

566. – But all those words are expressly against the Manicheans, who say that what a man believes is not important, but what he does. But the Apostle sets faith down as the principle of every work; hence he says that it is the substance, i.e., the foundation. Therefore, without faith, works are performed in vain. Furthermore, they say that one should believe only those things for which a reason is had. Against this he says, of things that appear not. Again, they condemn the Old Testament, saying that it was formed by an evil principle, namely, the devil. Against this he says that in this faith the ancients obtained a testimony.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
