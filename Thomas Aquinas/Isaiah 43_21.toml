[[commentary]]
quote='''
Third, he assigns the reason: this people have I formed for myself, namely, for my praise: the Lord has made all things for himself (Prov 16:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
