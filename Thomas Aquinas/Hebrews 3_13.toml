[[commentary]]
quote='''
187. – But if that evil should be found in anyone, should he despair? No; he should be admonished all the more. Therefore, he says, but exhort one another every day, i.e., continually, namely, by discussing your conscience and by exhorting to good, as long as it is called today, i.e., while the present time of grace lasts: 'I must work the works of him that sent me, whilst it is day' (Jn. 9:4). And this in order that none of you be hardened through the deceitfulness of sin. For, as has been stated above, the heart is hardened by persisting in evil. But a person clings to sin because he is deceived. Or, it is natural for the appetite to cling to the good; but it withdraws from good, because it is deceived: 'They err who work evil' (Pr. 14:22); 'I have strayed from the path of truth' (Wis. 5:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
