[[commentary]]
quote='''
He continues: Either make the tree good, and its fruit good; or make the tree bad, and its fruit bad. Above the Lord spoke against the manner of the Pharisees, in as much as they were speaking against his deeds by showing the gravity of sin; now against them he states that their doctrine is wrong. First, he presents an example; secondly, he adapts it (v. 34); thirdly, he assigns a reason (v. 34b). In regard to the first he does two things: first, he presents the example; secondly, the proof (v. 33b). He says, therefore: Either make the tree good, and its fruit good... This is explained in two ways. One explanation is according to Chrysostom and Jerome; the other according to Augustine. According to Chrysostom it is this: He wants to show that their vituperation is unreasonable; hence he compares actions to life, as fruit to a tree. If a person sees good fruit, he judges that the tree is good; but conversely, if it is evil. They saw Christ's actions, for example, the expulsion of demons, and this was good; therefore, what you say is quite unreasonable. And most suitably he goes from effect to cause, as the Apostle says in Romans (1:20): "The invisible things of God from the creation of the world are clearly seen from the things that were made..." Hence he wants to say either you, namely, the Pharisees, make, i.e., concede, that if the fruit is good, the tree is good; or make, i.e., say that the fruit is evil, and thus the tree is evil. And this you cannot say.

Augustine, however, refers to the intention. They said that he cast out devils by Beelzebub. Therefore, he wants to show from what root this accusation proceeded, because it was from the malice in their hearts. So he says, either make... Here two things are presented: one is meritorious and ought to be done, namely, make the tree good, i.e., do the work and apply the energy required for being a good tree, which a man cannot be without preparation. Hence, do what is required to be a good tree, and then the fruit will be good and your words good. But the statement which follows indicates something to avoid, namely, or make the tree evil and its fruit evil, i.e., or you will pursue malice, and so you will be an evil tree and your fruit evil: "I have planted you a choice vine, wholly of pure seed. How then have you turned degenerate and become a wild vine?" (Jer 2:21). According to both renditions the proof which follows is suitable: For the tree is known by its fruit, because by good fruit a good tree is known, and by evil fruit an evil one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
