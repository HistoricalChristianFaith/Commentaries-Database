[[commentary]]
quote='''
Then he lists the shameful acts: first, those which are according to nature, which he says, for fornicators: fornicators and adulterers God will judge (Heb 13:4); second, those against nature, when he says, for those who defile themselves with mankind: nor the effeminate shall possess the kingdom of God (1 Cor 6:10).

Then he mentions sins of the tongue, when he says, for liars: therefore, putting away lying, speak the truth, every man with his neighbor (Eph 4:25). Second, sins in relation to oaths, when he says, for perjured persons.

Then he gathers all these sins under one heading when he says, and whatever other thing is contrary to sound doctrine: and you shall not find iniquity in my tongue; neither shall folly be found in my mouth (Job 6:30); speak you the things that become sound doctrine (Titus 2:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Timothy.html'
source_title='Commentary on 1 Timothy'
