[[commentary]]
quote='''
Eliud presented two things in the words of Job again which he wanted to argue: first, the fact that he said he was just and the fact that he accused God of injustice in his judgment, according to the interpretation Eliud had given the words of Job. Eliud had disputed against these two ideas above. (cc. 34 and 35) Now for a second time he intended to argue against the same ideas using another argument and so the text says, "And Eliud continued," with arguments supporting the ones already used, "and said," what follows.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
