[[commentary]]
quote='''
Third, the destruction of idols: how my hand has found the kingdoms of the idol: wonderingly, as if to say: how was it that their gods did not resist me: who are they among all the gods of the nations that have delivered their country out of my hand, that God may deliver Jerusalem out of my hand? (2 Kgs 18:35).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
