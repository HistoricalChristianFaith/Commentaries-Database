[[commentary]]
quote='''
The verdict is given: "he will bring those evil men to an evil end," i.e., to destruction in the present and in the future. And they say "evil," i.e., bitterly. Above (7:2): "With what measure you mete, it shall be measured to you again." Wis 6:7: "The mighty shall be mightily tormented." "He will bring those evil men to an evil end, and will let out his vineyard," i.e., his people, "to other husbandmen," i.e., to the apostles, "that shall render him the fruit in their seasons." Ps 1:3: "And he shall be like a tree which is planted near the running waters, which shall bring forth its fruit in due season." Job 34:24: "He shall break in pieces many and innumerable, and shall make others to stand in their stead." And here there is a question, why in Mark the Lord answers, while here the Jews do. Solution. I say that first the Lord said it, and afterwards they said it. Likewise, in Luke it is found that when the Lord was saying this, they said, "God forbid." The true answer is that first they said it; afterwards, understanding that it was against them, they said "God forbid." Likewise, it is true that the rulers said it. And although they perceived that it was against them, they did not contradict; but the people said "God forbid."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
