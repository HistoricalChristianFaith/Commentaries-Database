[[commentary]]
quote='''
He gives the reason for this request when he says, they are not of the world. This seems to be a useless repetition since he had just said the same thing. But, indeed, it is not useless, because they are spoken in different contexts. They were spoken before to show why the disciples were hated by the world; here they are spoken to show why they should be protected by God.

We can see from this that the reason why the saints are hated by the world is the same as the reason why God loves them, that is, their disdain for the world: "Has not God chosen those who are poor in the world to be rich in faith and heirs of the kingdom which he has promised to those who love him?" (Jas 2:5). Therefore, whatever good a person does makes this person hateful to the world, but loved by God: "We sacrifice what the Egyptians worship" (Ex 8:27).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F17.htm'
source_title='Commentary on John'
