[[commentary]]
quote='''
Likewise, they inflicted various insults, because they spat in his face; Isaiah 50:6: "I have not turned away my face from them that rebuked me and spat upon me." Likewise, they struck his head, as though he were a fool. And who are those who strike the head of Christ? The head of Christ is God, as is found in 1 Corinthians 11:3. Therefore those strike the head of Christ who blaspheme the divinity of Christ. By the reed, sacred Scripture is signified. Such men confirm their error through sacred Scripture.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
