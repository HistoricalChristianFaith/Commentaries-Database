[[commentary]]
quote='''
Second, their contempt: but have said: no. Therefore shall you flee: these are the words of the Lord. One way may we go out (Deut 28:25); and we will mount upon swift ones: the voice of the rebellious people; therefore shall they be swifter: the voice of the Lord: our persecutors were swifter than the eagles of the air (Lam 4:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
