[[commentary]]
quote='''
Then he sets forth the opportunity from a certain robber who was called Barabbas, which is interpreted "son of the father," namely, of the devil; John 8:44: "you are of your father the devil."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
