[[commentary]]
quote='''
This was to fulfill what was spoken by the prophet Isaiah. Here he cites a text from Isaiah (42:1). And it should be noted that some apostles cite texts according to the Hebrew version, some according to the Septuagint, and some merely expressed the sense of the words. And he does three things. First he describes the human nature, when he says, Behold, my servant [boy], because he was a boy: "The boy Jesus stayed behind in the temple" (Lk 2:43). He is also called a boy from his purity, because "He did not sin, nor was there found deceit in his mouth" (1 Pt 2:22). Or in the sense that a servant is called a boy; hence, Behold the boy, a servant in a servant's form: "He emptied himself, taking the form of a servant" (Phil 2:7). The chosen one, whom I have chosen. Note that in every holy man are three things: divine election, love and the effect, which is grace. These are in man in one way, in God in another way. In man grace is first; then he loves, and after that he chooses. But in God is the converse, because man's will does not cause grace; its cause is God's love and will. Therefore, he first chooses whom he wills to be good; secondly, he loves; thirdly, he gives the grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
