[[commentary]]
quote='''
Second, he proves his proposition with an authority when he says: for the Scripture, namely Isaiah, says: whosoever believes in him with living faith shall not be confounded (Isa 28:16), i.e., as lacking salvation: you who fears the Lord, believe him, and your reward shall not be made void (Sir 2:8).

But our text has: he who believes will not be in haste, as was said above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
