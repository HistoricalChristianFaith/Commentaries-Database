[[commentary]]
quote='''
He continues, "That you should interrogate me about my evildoing and examine my sin," to investigate through tribulations if I have sinned in my work or am evil in my thought, like men investigate criminal guilt using torture.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
