[[commentary]]
quote='''
Since he has such fears of everyone, he does not rest but is always plotting something against those whom he fears. Therefore, the occasion of fear is ever multiplied for him, and so he says, "Tribulation will terrify him," threatening him by the actions of others, "and anguish wall him it," because he fears danger from every quarter. "Like a king who is prepared for battle," because a king who is prepared for battle is so in anguish from fear that he will lose, that he still tries to destroy his enemies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
