[[commentary]]
quote='''
608. – Then when he says, by faith Jacob dying blessed each of the sons, he continues with Jacob's faith and mentions what he did in blessing the two sons of Joseph, as is recorded in Genesis (48), where it is stated that when Joseph was informed of his father's illness, he called his two sons whom Jacob blessed, crossing his hands. With this gesture he chose Ephraim over Manasseh as to dignity, because the royal dignity came from Ephraim, namely, Jeroboam. But this blessing was by faith, because it was revealed to him that it would be thus in the future. This blessing referred to the people who came out of them and not to their persons. Likewise, by faith he adored the top of his rod. This is recorded in Genesis (49), where it is stated that he made Joseph swear that he would bury him in the tomb of his fathers; and after the oath, he adored the top of the coffin, as our version has, or at the top of his rod, as the Septuagint says, or at the top, as is had in the Greek. And all this can stand, because he was old and carried a rod; or he took Joseph's scepter until he vowed, and after returning it he adored not the rod nor Joseph, as some wickedly thought, but God Himself. This he did, leaning on the top of his rod. He did this, moved by the consideration of Christ's power, which Joseph's power prefigured. For being the prefect in Egypt, he carried a scepter as a sign of his power: 'You that rule them with a rod of iron' (Ps. 2:9). Or if he adored the top, the sense is the same, because he adored Christ signified by that rod, just as we adore the Crucified and the Cross by reason of Christ, Who suffered on it. Hence, properly speaking, we do not adore the Cross, but Christ crucified on it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
