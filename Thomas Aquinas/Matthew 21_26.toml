[[commentary]]
quote='''
Then the responses are treated. And first, the response of the Jews; secondly, of Christ. It is true that the lesser people believed, but the Pharisees were indignant; therefore, if they said it was from men, their confusion would follow. Likewise, all held John to be a prophet; above (11:7): "What went you out into the desert to see?" etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
