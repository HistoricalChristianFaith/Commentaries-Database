[[commentary]]
quote='''
"God." Here the subject matter of thanksgiving is set forth, both for the benefit of deliverance from evil and for the benefit of promotion to good; hence he says, "God," etc. And this can be said in the person of the Church, because those who persecute her will be subjected to her: Is. 60: "The sons of those who humiliated you shall come bowing to you, and they shall worship the traces of your feet." Just as Paul, who condemned Stephen, was struck down; hence it is a holy vengeance when a rebel is subdued and humbled. Therefore "you are my deliverer." Jn. 8: "If the Son shall make you free," etc. "From my enemies" -- not just any enemies, but "the wrathful": Prov. 27: "Anger has no mercy." Hence it is a greater glory to be delivered from fervent evils. "And from those who rise up against me": Ps. 26: "Unjust witnesses have risen up against me," etc. "You will exalt me." He says this to show God's providence, that is, in that by which they believe they are pressing him down, they are exalted: Phil. 2: "For which cause God also has exalted him." Gen. 7: "The waters were multiplied and lifted up the ark on high." "From the unjust man you will deliver me," that is, from the fraudulent: Ps. 139: "Deliver me, O Lord, from the evil man; rescue me from the unjust man." Next the thanksgiving is concluded on account of the aforesaid causes. "Therefore I will confess to you among the nations, O Lord," etc., that is, before all people I will praise you: Tob. 12: "Bless the God of heaven, and confess to him before all the living." "And I will sing a psalm to your name." In the psalm is understood good action, because whatever good we do, we ought to do for the glory of God's name. "Magnifying the salvation of his king." Jerome has: "thus to him who magnifies and acts," namely to him who magnifies and acts, according to our text, "God who gives vindication." And he is God inasmuch as he magnifies. And he sets forth two things: one pertaining to the state of the kingdom, another to the person, because both are magnified. Regarding the first he says, "magnifying the salvation of his king," because you have promoted me to the kingdom. Or "of his king," that is, of Christ, through whose name all are saved: Acts 4: "There is no other name given," etc. Regarding the person he says, "and showing mercy to his anointed, to David and to his seed forever," because he multiplied his seed as he had promised.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
