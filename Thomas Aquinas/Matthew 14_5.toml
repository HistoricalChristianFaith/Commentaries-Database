[[commentary]]
quote='''
And having a mind to put him to death, he feared the people. Sometimes it happens that when a man does not wish to avoid one sin, he falls into a greater. Hosea 4:2: murder, and theft, and adultery have overflowed, and blood has touched blood. Hence since he did not wish to avoid adultery, he incurred murder. And when he wished to, he feared the people. The commotion of the people is greatly to be feared; Sir 26:5: my heart feared three things: the slander of a city, and the gathering of a mob, and a false accusation. Likewise the fear of the Lord takes away an evil will; but the fear of man does not, although it causes delay. Therefore because he could not on account of the fear of the people, he delayed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
