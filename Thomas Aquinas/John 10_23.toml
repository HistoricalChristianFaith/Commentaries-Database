[[commentary]]
quote='''
Then he describes the place, and Jesus was walking in the temple, in the portico of Solomon. He describes it first in a general way, in the temple: "The Lord is in his holy temple" (Ps 11:4); secondly, in more detail, saying, in the portico of Solomon. We have to know that the temple included not just its main building, but the surrounding porticos as well; it was on these porticos that the people stood and prayed, for only the priests prayed in the temple. It was called the portico of Solomon because it was the place where Solomon stood and prayed when the temple was being dedicated: "Then Solomon stood before the altar of the Lord in the presence of all the assembly of Israel" (1 Kgs 8:22).

One might object that the temple which Solomon built was destroyed, and so was his portico. I answer that the temple was rebuilt according to the specifications of the previous one; and so just as that portico was called the portico of Solomon in the first instance, it was called the same later out of respect for him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
