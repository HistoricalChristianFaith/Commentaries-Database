[[commentary]]
quote='''
Then he presents the unavoidable impediments. And because there were some impediments that were unavoidable by human power and absolutely, and some that, although unavoidable by human power, were avoidable by the power of God, therefore first about the first; secondly about the second, at pray, etc. That which, when present, can in no way be avoided is the burden of children. For although one might be told: save your life, he could say: how can I leave my child? Therefore he explains this: woe to them that are with child and that give suck, because such women could not flee, for neither should they be told to procure an abortion, nor those nursing to kill their children; and so what is said in Luke 23:29 is fulfilled: Blessed are the breasts that have not given suck.

Hilary explains: and what is meant by those who are with child? Men burdened with sins. Those who are nursing are imperfect men. Hence he means to say: woe to men burdened with sins and not confirmed in virtue. According to Augustine, those with child are those who conceive to do evil; those nursing are those who already carry out the deed. Origen says: those with child are said to be those who are still pursuing the word of salvation; those nursing, those who have already accomplished something.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
