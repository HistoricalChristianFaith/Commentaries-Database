[[commentary]]
quote='''
Then the king shall say to those who shall be on his left. Here is set forth the condemnation of the wicked. And first the condemnation is set forth; second, their excuse; third, the refutation. And concerning the first, he first sets forth the sentence, then the punishment. He says, then: depart from me, you cursed. This sentence differs from the first, because in the first he said come, ye blessed of my Father etc.; but here he does not say: cursed of my Father, because our blessing is from God, but the curse is from ourselves. And Hebrews 5 and Deuteronomy 23:5, he turned the blessing into a curse. Likewise there is a difference, because above he said possess the kingdom prepared for you etc., but here he says go into everlasting fire, which was prepared for the devil and his angels. And what is the reason? Origen says that he did not make the punishments for men, but they acquire death for themselves by their own hands; Isaiah 31:7: in that day a man shall cast away his idols of gold and of silver, which your hands have made for you. But someone might say: did the Lord not also make the devil good? Note that the Lord speaks of the preparation as manifested from the beginning of the world. But the devil sinned from the beginning: hence for the angel, who as regards his nature was created good, he did not prepare it, but for sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
