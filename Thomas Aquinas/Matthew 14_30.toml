[[commentary]]
quote='''
But seeing the strong wind etc. Here the third help is presented, because he delivered Peter from sinking. And first the cause is presented; second, Peter's petition; third, Christ's help. But seeing the strong wind, he was afraid. At sea the wind does not have a continuous force, nor on land either; hence it was interrupted when Peter entered the sea; but when he was upon the sea, it blew strongly, and then he was afraid. From this it should be considered that he says that it was more dangerous upon the sea than in the boat; therefore the Lord sometimes permits the strong to sink in the peril of the sea. Hence the Apostle says, 1 Cor. 10:12: he that thinks himself to stand, let him take heed lest he fall. But why did he permit him to be in danger? First, he commanded him to go, that his power might be shown, because both were walking, and the disciples saw this. But that he permitted Peter to sink, he did this so that Peter might experience what he could do of himself. Hence that he went upon the sea was by Christ's power; but that he began to sink was from Peter's weakness, as Paul says, 2 Cor. 12:7: lest the greatness of the revelations should exalt me, there was given me a sting of my flesh, an angel of Satan, to buffet me. The Lord also permitted Peter to sink because he was to be the shepherd. He wished therefore both to show his power and his weakness. Likewise he did this to restrain the jealousy of the disciples; for because they saw his danger, their jealousy ceased. And when he began to sink, he cried out: Lord, save me. A similar thing is found in Ps. 68:2: save me, O Lord, for the waters have come in even unto my soul.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
