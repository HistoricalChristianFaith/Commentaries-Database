[[commentary]]
quote='''
Princes excel in the authority which they have for ruling others, and he says about these, "he pours contempt on princes," so that they are despised by those who should obey them. All these things seem to relate to what he had said, "He leads counselors to a foolish end." (v.17) But the fact that sometimes some are advanced from a lower state to the highest seems to relate to what he had said, "and judges to dullness." (v.17) As to this he then says, "and those who have been oppressed he relieves," which refers to the weak oppressed by the power of greater men, who are sometimes elevated to a state of power, after those oppressing them are cast aside.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
