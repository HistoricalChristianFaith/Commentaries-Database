[[commentary]]
quote='''
In support of this he quotes an authority, when he says, the name of God through you is blasphemed among the gentiles, i.e., because the gentiles, noting the evil practices of the Jews, laid it to evil training dictated by the law.

He says: as it is written, namely, in Isaiah: their rulers wail, and continually all the day my name is despised (Isa 52:5) and in Ezekiel: it is not for your sake, O house of Israel, but for the sake of my holy name which you have profaned among the nations (Ezek 36:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
