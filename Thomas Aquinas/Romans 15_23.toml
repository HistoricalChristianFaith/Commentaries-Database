[[commentary]]
quote='''
Then when he says, but now, he clarifies his intention to visit them: first, he promises to visit them; second, he tells why he must delay, at but now I shall go; third, he mentions the goal of his visit, when therefore I shall have accomplished this.

First, therefore, he says: until now I have been prevented, but now, having already traveled over all these places, having no more place, i.e., any need to remain in these countries, in which the faith was established by me, and having a great desire these many years past to come unto you, as he said above: I long to see you that I may impart unto you some spiritual grace (Rom 1:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
