[[commentary]]
quote='''
Here is indicated the glory of dignities. First, the glory of a king. As stated: "The crown has fallen from our head; woe to us, for we have sinned!" As Job 19:9 records: "He has stripped from me my glory, and taken the crown from my head."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
