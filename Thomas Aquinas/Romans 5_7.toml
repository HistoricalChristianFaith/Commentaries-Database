[[commentary]]
quote='''
Then when he says, for scarce, he shows a difficulty on the part of those for whom Christ died, i.e., the ungodly, saying, for scarce . . . will one, that is, anyone, die for the release of a just man; rather, the just man perishes and no one lays it to heart (Isa 57:1). That is why I say that scarce . . . will one die, yet perhaps for a good man some one would dare to die, on account of his zeal for virtue.
It is rare, because it is so great; for no man has greater love than this, that a man lay down his life for his friends (John 15:13). Yet what Christ did is never done, namely, to die for the ungodly and the unjust. That is why there is reason to wonder why Christ did this.
This passage can be interpreted in another way, so that a just man will be one trained in virtue, and a good man one who is innocent. And although according to this the just man would be more excellent than the good man, yet scarcely anyone dies for the just man. The reason is that an innocent person, who is understood as good, seems more worthy of pity on account of his lack of years or of some such thing. But the just person, because he is perfect, lacks any defect that would elicit pity. Therefore, should anyone die for an innocent person, it could be through pity; but to die for a just man requires zeal for virtue, which is found in fewer persons than the emotion of pity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
