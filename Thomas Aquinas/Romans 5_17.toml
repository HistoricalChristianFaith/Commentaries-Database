[[commentary]]
quote='''
Then when he says, for if by one man's offense, he proves what he has said, namely, that Christ's grace passes from many sins to justice.
First, he proves this from something later;
second, from something earlier, at for as by the disobedience.
In regard to the first it should be noted that in the foregoing comparison the Apostle does not posit things that correspond, i.e., things of the same class. For on the side of sin he posits condemnation, which pertains to punishment, while on the side of grace he posits justification, which does not pertain to reward but to the state of merit.
Consequently, in stating that sin brings condemnation the Apostle intends to show that grace brings justification. He uses this argument: As the condemnation of death proceeds from the first parent's sin, so the kingdom of life proceeds from Christ's grace.
For these two correspond uniformly, but no one can attain to the kingdom of life save by justice. Therefore, men are justified by Christ's grace.
First, he lays down the premises;
second, he draws the conclusion, at therefore, as by the offense.
He states the first premise when he says, for if by one man's offense death reigned through one, because it was stated above: as by one man sin entered into this world and by sin death (Rom 5:12), much more will men reign in life, namely, eternal life, through one, Jesus Christ, who says: I came that they may have life, and have it abundantly (John 10:10), by sharing in the eternity of life, the abundance being designated here by reigning. Hence, it is stated in Revelation that they will reign with Christ a thousand years, i.e., eternally (Rev 20:24).
The minor premise is presented in the words, they who receive abundance of grace and of the gift and of justice. As if to say: men cannot attain to the kingdom of life except by receiving this. Here Christ's grace is referred to the remission of sin, which no merits can anticipate and, therefore, is due entirely to grace: if it is from works, it is no longer by grace (Rom 11:6).
Gift refers to the gifts of grace by which men are advanced in blessings: he gave gifts with royal liberality (Esth 2:18).
Justice refers to upright actions: whom God made our justice (1 Cor 1:30).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
