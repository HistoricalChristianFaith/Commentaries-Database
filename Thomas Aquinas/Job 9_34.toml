[[commentary]]
quote='''
Since, as has been said, he intends to investigate why the innocent are punished in the world, he shows in conclusion what could impede him from this investigation and with what intention he wishes to make this investigation. He could be impeded from this investigation by two things. First, by the affliction from which he was suffering. For men whose minds are occupied with sorrow are not able to investigate accurately. He refers to this saying, "May he withdraw his rod from me." Second, from the reverence which he had for God. For men sometimes omit to investigate things which pertain to God from the reverence which they have for him. As to this he says, "Let terror of him not frighten me." He means: May he grant my spirit rest from the affliction which I suffer and not impute irreverence to me because I debate about divine things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
