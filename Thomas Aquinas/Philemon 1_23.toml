[[commentary]]
quote='''
Then he ends his letter with a greeting, and first on the part of others, second on his own. He says, they send you greetings, and we read of them at the end of Colossians.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Philemon.html'
source_title='Commentary on Philemon'
