[[commentary]]
quote='''
Then when he says, This beginning of signs Jesus worked in Cana of Galilee, he gives the disciples' acknowledgment of the miracle. We can see from this the falsity of the History of the Infancy of the Savior, which recounts many miracles worked by Christ as a boy. For if these accounts were true, the Evangelist would not have said, This beginning of signs Jesus worked. We have already given the reason why Christ worked no miracles during his childhood, that is, lest men regard them as illusions.

It was for the reason given above, then, that Jesus performed this miracle of turning water into wine at Cana of Galilee; and this was the first of the signs he did. And Jesus revealed his glory, i.e., the power by which he is glorious: "The Lord of hosts, he is the King of glory" (Ps 23:10).

And his disciples believed in him. But how did they believe? For they already were his disciples and had believed before this. I answer that sometimes a thing is described not according to what it is at the time, but according to what it will be. For example, we say that the apostle Paul was born at Tarsus, in Cilicia; not that an actual apostle was born there, but a future one was. Similarly, it says here that his disciples believed in him, i.e., those who would be his disciples. Or, one might answer that previously they had believed in him as a good man, preaching what was right and just; but now they believed in him as God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
