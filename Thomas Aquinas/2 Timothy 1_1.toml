[[commentary]]
quote='''
This epistle is divided into the greeting and the message, at I give thanks to God (2 Tim 1:3). In the greeting are mentioned first, the person who sends the greeting; second, the person greeted; third, the good he wills them.

The person sending the greeting is Paul, a name which suggests moderation, and suits him because of his humility of mind and the tribulations which make a man small in the sense that Christ is said to have been shrunk by his sufferings: but we see Jesus, who was made a little lower than the angels, for the suffering of his death, crowned with glory and honor (Heb 2:9).

The name also befits his dignity: first, he mentions his dignity; second, its source; third, its fruit. His dignity is great, because he is an apostle of Jesus Christ, i.e., sent by Christ: he chose twelve of them, whom he also named apostles (Luke 6:12). He earned this dignity because he labored harder than the others: he who wrought in Peter to the apostleship of the circumcision, wrought in me also among the gentiles (Gal 2:8).

The source of apostleship is in God's will; hence he says, by the will of God, which some men anticipate, because they force themselves on him: neither does any man take the honor to himself, but he that is called by God as Aaron was (Heb 5:4). Or some are permitted on account of the people's sin: who makes a man that is a hypocrite to reign for the sins of the people? (Job 34:30). But he by the will of God. He says this, because it is not by his own will.

But its fruit is not earthly, according to the promise of life itself in Christ Jesus, i.e, it attains to life everlasting promised by Christ. This should be the end of prelates: they indeed that they may receive a corruptible crown; but we an incorruptible (1 Cor 9:25); they that instruct many to justice shall shine as stars for all eternity (Dan 12:3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
