[[commentary]]
quote='''
God especially does not seem to see the causes of individuals because the wicked sometimes prosper, but to disprove this he says, "Even though you have said," i.e. when you reflected in your heart, "He does not consider," the deeds of men, "be judged in his presence," prepare yourself to submit to his judgment, "and await him," the future judgment, even if he does not punish you here. For he delays that he might punish more harshly later.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
