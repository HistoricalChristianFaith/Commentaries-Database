[[commentary]]
quote='''
The second effect is to carry it through to action; hence James 1:22: be doers of the word and not hearers only. Now this effect is impeded by prosperity and by adversity. Concerning him who is impeded by adversity, he says: and he who was sown upon rocky ground etc. First, therefore, he sets down the beginning of the good; secondly, the occasion of evil, at yet he has no root in himself; thirdly, the evil, at and when tribulation arises etc. Rock is a bad heart, into which the word cannot penetrate, just as in rocky soil, where there is little earth; so some do not lay open their heart to be penetrated. For the heart is then said to be penetrable when it prefers nothing to the word, so that the word may have it as its principal root. Hence Ezekiel 11:19: I will take away from you your heart of stone etc. This one hears the word and immediately receives it with joy; therefore he takes delight in justice and is inclined to the good. Galatians 3:5: he who gives you the Spirit and works miracles among you. And so he takes delight; but it cannot be fixed, because it has no root, because it is sown on stone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
