[[commentary]]
quote='''
Second, he shows that he was moderate in his conversation, and not dissipated by joy, and so he says, "If I ever laughed at them," showing some signs of joy, "they did not believe," that I have surrendered myself to laughter. Likewise, he was not depressed by sorrow, and so he says, "and the light of my countenance was not cast down to the ground." For men depressed by mourning usually cast their eyes down to the ground.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
