[[commentary]]
quote='''
So shall I do to Jerusalem and her images. Here he concludes first, from the nations to the entire people of Israel: so also their images of Jerusalem, and of Samaria; second, from the ten tribes to the two: shall I not, as I have done to Samaria and her idols, so do to Jerusalem and her images? He speaks the truth concerning Samaria, because they worshipped idols, but Ezechias had removed the idols from Jerusalem (2 Kgs 18:4); also perhaps some idols secretly remained, which he found in the part of the city that Sobna the scribe handed over to him; or he calls the ark and the other things that adorned the temple images: behold the house of Judah is like all other nations (Ezek 25:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
