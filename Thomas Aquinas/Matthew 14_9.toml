[[commentary]]
quote='''
And the king was struck sad on account of his oath. Here it is determined how he was killed. Chrysostom says: here an example is given that decency is honored even by the wicked, as is stated in Wis 5:1ff. Jerome says that now he was saddened, who before wished to kill him but feared the people. Why then does it say that he was saddened? He resolves it. It is the custom of men to recount what appears to men: just as they called Christ the son of Joseph, because they so supposed, as is stated in Luke 3. Hence he says struck sad, because so it appeared to men. There follows the execution. And first the command is set forth; secondly, the execution. On account of his oath, and on account of those who sat with him at table. In this he was foolish, because regarding a dishonorable matter, the oath is not to be feared, because in the very fact that I swear, I am perjured; Jer 4:2: you shall swear with judgment (namely, with discretion), in justice and in truth. Likewise, if he had sworn to do something in his own power, it should be understood as applying to honorable matters. Hence what he should not do to himself, neither should he command another; Zech 8:17: love not a lying oath. And on account of those who sat with him at table, so as to make them all participants in the murder, for they all pleaded for the girl. He commanded it to be given.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
