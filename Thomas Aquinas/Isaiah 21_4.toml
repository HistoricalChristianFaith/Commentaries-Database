[[commentary]]
quote='''
Second, as to the affections: my heart, that is, the affections, failed, in sadness: my bowels are in pain (Jer 4:19).

Third, as to astounded understanding: darkness, that is, the troubles I have foreseen, amazed me, as if I were in darkness: every one that shall pass by Babylon, shall be astonished, and shall hiss at all her plagues (Jer 50:13). Babylon my beloved, at that time, although afterwards, Babylon was an enemy, is set in a wonder, that is, in astonishment. And I wondered, when I had seen her, with great astonishment (Rev 17:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
