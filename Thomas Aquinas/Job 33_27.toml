[[commentary]]
quote='''
But this is not possible unless man humbly recognizes and confesses his sin, and so he says, "He will consider man," as if spontaneously offering himself for the confession of sin, and so he continues, "and he will say, 'I have sinned.'" So one does not think that he has said this from humility he adds, "and I have truly perverted what is right." He says this against Job because Job had said, "I have not sinned and my eye lingers on bitter things." (17:2) In his confession he will not lament about the gravity of the punishment, and so he says, "and I did not receive the punishment I merited," as if to say: I merited a graver punishment, and he says this against what Job had said, "If only my sins were weighed in which I merited anger and so on." (6:2)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
