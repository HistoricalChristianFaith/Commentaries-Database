[[commentary]]
quote='''
The third impediment exists when someone in a disputation does not aim at the truth but at victory or glory, as happens in law cases or sophistical debates. "In speaking, judge what is right," i.e. to concede what seems to be true to you, and deny those things which seem false. "And" if you do this, "You will find no evil on my tongue," i.e. anything contrary to the justice which is due to one's neighbor. "Nor stupidity in my mouth," i.e. anything against the wisdom by which one thinks correctly about God. For Job intended to defend and prove the truth about both divine and human matters.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
