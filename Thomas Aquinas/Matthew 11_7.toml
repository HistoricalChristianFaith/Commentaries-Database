[[commentary]]
quote='''
As they went away. Here he satisfies the crowd's doubts. Although the crowds had heard John's witness to Christ, they now seemed to hesitate. For they could have three things in their heart, because a person changes his mind for three reasons: either on account of fickleness of mind, or for the sake of some profit, or on account of the human spirit's passing from ignorance of the truth to knowing it: "For God knows that the thoughts of men are vain" (Ps 94:11). Therefore, he first excludes fickleness from them; secondly, the desire for profit (v. 8); thirdly, he shows that he has prophetic truth (v. 9).

He says, therefore, As they went away. The Lord teaches us with remarkable tact, as he never wished to praise John in the presence of his disciples or anyone in his own presence: "Let another praise you and not your own mouth; a stranger and not your own lips" (Pr 27:2). Because if the one praised is good, he is embarrassed; if he is evil, he is flattered. Jesus began to preach to the crowds: "What did you go out into the desert to see? Did you go to see a reed?" No, but you went out to see a resolute man. For a reed is easily moved; hence a mind that changes quickly is regarded as a wind: "So that we may no longer be children, tossed to and fro with every wind" (Eph 4:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
