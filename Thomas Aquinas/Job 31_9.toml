[[commentary]]
quote='''
In adultery, however, a man plots deceitfully against the wife of his neighbor, and this plot is preceded by a certain deception of heart, as long as reason is darkened by concupiscence, and so he says, "If my heart has been deceived by a woman," referring to the desire of the wife of another. From the fact that the heart is conquered by concupiscence for a woman, one tries to possess the woman desired by any deceitful means whatever, and so he says, "and if I have lain in wait at my neighbor's door," to take advantage of his wife.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
