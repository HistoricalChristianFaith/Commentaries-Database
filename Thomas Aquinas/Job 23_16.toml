[[commentary]]
quote='''
He expresses the cause of this anxious fear in the blow of God he has experienced against himself, and so he says, "God softened my heart," as though dissolving it in liquid, by taking away the strength of security. "And the Almighty threw me into confusion," for by his omnipotence he has brought in anguish of sadness about my present evils and fear of future ones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
