[[commentary]]
quote='''
When a man has died, frequently everything which was his goes to ruin. He shows this is a consequence beginning first with those things produced from the earth, some of which have been planted still remain as seedlings after he dies. Expressing this he says, "Behold! May his roots be dried up," so that if he had sowed or planted anything it may be destroyed and does not bear fruit. However as to those which have already produced fruit, he says, "and may his harvest above be ruined." One can refer this to any business he has just begun or that is already almost finished.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
