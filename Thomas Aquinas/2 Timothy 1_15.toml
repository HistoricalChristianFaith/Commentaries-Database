[[commentary]]
quote='''
Then when he says, you know this, he shows why it was necessary to give this admonition, both because some are slackening and some are progressing. For when a person sees some of his associates making progress and others slowing down, he strives to imitate the good ones: first, therefore, he reminds him that some are slowing up; second, that some are making progress, at the Lord gives mercy.

Therefore, he tells him what to avoid to keep out of danger: he that thinks himself to stand, let him take heed, lest he fall (1 Cor 10:12). Therefore, he says, all they who are in Asia are turned away from me; on which a Gloss says: they were full of deceit; for they pretended to sympathize with the Apostle, but only to obtain information with which to slander him. Therefore, they who are turned from me are now in Asia: among them were Phigellus and Hermogenes, who were converted by James.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
