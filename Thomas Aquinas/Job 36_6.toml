[[commentary]]
quote='''
So he says, "but he does not save the wicked," that is, he damns them. He shows the cause of this damnation saying, "and he grants right judgment to the poor," because he passes judgment on evil powerful men in favor of the poor who have been oppressed by them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
