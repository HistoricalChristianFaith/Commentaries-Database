[[commentary]]
quote='''
He shows why he avoided this saying, "this is the greatest evil." For if it is evil to offer what is due to one man to another, it seems the greatest evil that the cult due to God is offered to a creature. Since it is impossible for man to offer divine worship at the same time to God and a creature, he then says, "and the denial of God the Most High." Even though the name of God is attributed to some creatures by participation, the cult of latria is due only to the most high God, who is denied to be the most high if that cult is also offered to others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
