[[commentary]]
quote='''
289 (cont.). – Also in the present day they had instruction of His doctrine; hence, he says, and have tasted the goodness of the word of God. That word is called good, because it is the word of eternal life: 'Lord, to whom shall we go; you have the words of eternal life' (Jn. 6:69); 'How sweet are your words to my palate' (Ps. 119:103). But he says, tasted, because it not only enlightens the intellect, but also refreshes the affections, in which there is a certain savoring: 'Taste and see that the Lord is sweet' (Ps. 33:8).

290. – 'We are saved by hope' (Rom. 8:24). Therefore, he says, and the powers of the age to come. But some of these they have not only in hope, but in an inchoate way, and these are the endowments of the soul, namely, vision, possession, and fruition, and these are possessed inchoatively inasmuch as faith, hope and charity, which correspond to them, are possessed in the present. But the others are goods possessed only in hope, as the endowments of the body, namely, subtility, agility, impassability and clarity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
