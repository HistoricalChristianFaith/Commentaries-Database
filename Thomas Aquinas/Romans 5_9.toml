[[commentary]]
quote='''
Then when he says, much more, therefore, he concludes what he had intended from the foregoing, saying: if Christ died for us while we were still sinners, much more being now justified by his blood, as was said above, whom God has proposed to be a propitiation through faith (Rom 3:25), through his blood, shall we be saved from wrath, i.e., from the vengeance of eternal condemnation, which men incur by their sins: brood of vipers, who showed you to flee from the wrath to come? (Matt 3:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
