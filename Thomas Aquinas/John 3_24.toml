[[commentary]]
quote='''
The time is indicated when he says, John had not yet been thrown into prison. He says this so that we may know that he began his narrative of Christ's life before the other Evangelists. For the others began their account only from the time of John's imprisonment. So Matthew (4:12) says: "When Jesus heard that John had been arrested, he withdrew into Galilee." And so, because they had passed over the things that Christ did before John's imprisonment, John, who was the last to write a Gospel, supplied these omissions. He suggests this when he says: John had not yet been thrown into prison.

Note that by divine arrangement it came about that when Christ began to baptize, John did not continue his own baptizing and preaching for very long, in order not to create disunion among the people. But he was granted a little time so that it would not seem that he deserved to be repudiated, as was mentioned before. Again, by God's arrangement, it came about that after the faith had been preached and the faithful converted, the temple was utterly destroyed, in order that all the devotion and hope of the faithful could be directed to Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F3.htm'
source_title='Commentary on John'
