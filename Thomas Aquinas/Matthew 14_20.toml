[[commentary]]
quote='''
There follows the fullness of refreshment, and this with respect to two things: with respect to satiety, and with respect to what remained. Hence it is said they all ate and were filled, according to that of Ps. 21:27: the poor shall eat and shall be filled etc. And they took up the leavings, twelve baskets full of fragments. Here the fullness of refreshment is indicated by the abundance of the leavings. But why did the Lord wish the leavings to be gathered? The literal reason is that which Chrysostom gives. He wished first that the disciples should gather them, lest it should seem to be an apparition, likewise lest it should be given over to forgetfulness by them. And that they took up twelve baskets, this was according to the number of the twelve apostles, so that each one took his own, and thus it would be in the memory of all. Mystically, by the fragments is understood the spiritual sense, which is not grasped by the crowds, but in the baskets, i.e., in the wise; 1 Cor. 1:26: see your vocation, brethren, that not many are wise according to the flesh, not many mighty, not many noble; but the foolish things of the world has God chosen, that he may confound the wise etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
