[[commentary]]
quote='''
But the reason why it cannot be known what you are saying is that you will be speaking into the air, i.e., uselessly: "I do not box as one beating the air" (1 Cor 9:26).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Corinthians.html'
source_title='Commentary on 1 Corinthians'
