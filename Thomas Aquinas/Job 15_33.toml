[[commentary]]
quote='''
Then he gives an example. "His grapes will be blighted just like the vineyard in first flower." This blighting usually results from frost by which he means exterior persecution. "And as the olive lets its flowers fall," usually from some intrinsic cause which means here the meriting of adversity on the part of the one who suffers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
