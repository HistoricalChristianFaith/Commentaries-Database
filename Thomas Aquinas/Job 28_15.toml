[[commentary]]
quote='''
Next he explains what he had said about the fact that wisdom has no price, and he enumerates those things which are thought most valuable among men, saying, "The gold of Ophir," that is, the most pure gold, "will not be traded for it," because the price of wisdom cannot be valued in any amount of gold. After gold, silver is esteemed the most precious among other metals, and so he continues speaking about it, "nor can one give its weight in silver for exchange."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
