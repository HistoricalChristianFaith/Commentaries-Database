[[commentary]]
quote='''
To will means properly to act for an end, and so he shows the end of these works, "Through these he judges the peoples," because men are punished by them, "and he gives food to many mortal men," in the sense that the rains are useful to the fertility of the land which produces food for men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
