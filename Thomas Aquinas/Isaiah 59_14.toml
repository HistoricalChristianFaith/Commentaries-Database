[[commentary]]
quote='''
And as to action, and judgment is turned away backward, that is, the judgment of God for saving us; in the street, they carried out their injustices in public.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
