[[commentary]]
quote='''
Job asserted above (v.2) that what Sophar had said about the excellence of the greatness of God was evident to all men. Here he intends to show that men can come to an understanding of these things by the experience of divine power and wisdom in human affairs. First, then, he shows how men arrive at knowledge in things from experience, saying, "Does not the ear judge words" namely when it hears them, "and" does not "the palate of one eating," distinguish "flavor". Since experience is from sense, he fittingly shows the power of experience for the judgment of the senses especially in hearing and taste. For, since hearing is the most teachable of all the senses, hence it is most valuable in the contemplative sciences. Taste, however, is appreciative of food, which is necessary for the life of men; and hence through the judgment of taste he expresses the experience which one has about things in the active life. Because of this, from the judgment of the two senses, he shows the power of experience as much in speculative things as in practical things. When he then says, "There is wisdom in the ancients," this expresses the contemplative life because old men heard many things. "Prudence comes with advanced age." This expresses the active life because men taste many things in a long life, both helpful and harmful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
