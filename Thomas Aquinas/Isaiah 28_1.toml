[[commentary]]
quote='''
633. Woe to the crown. In this part, he threatens against those who disdain the predictions of the prophets, and first, against those who disdain in the present, second, against those to come in the time of Jeremiah, woe to you, apostate children (ch. 30). The first of these is divided into two parts. In the first, against those from the ten tribes; in the second, against those from the two tribes: but these also (Isa 28:7).

634. Concerning the first, he does three things. First, he denounces the sin of pride: woe to the crown, for they were proud of their multitude, which is the crown or glory of a king (Prov 14:28); second, the sin of gluttony: to the drunkards of Ephraim, Nahum: with glory you have made me drunk, to the fading flower the glory his joy, who were on the head of the fat valley, who, in the time of David and Solomon, coming from the heat, established tents of idolatry in the valley of Gethsemane; staggering with wine, namely, idolatry: the rod has blossomed, the almond tree has budded (Ezek 7:10).

641. Note also on the words, crown of pride (Isa 28:1), that both the wicked and the good are crowned. The wicked are crowned first with the crown of vain joy: let us crown ourselves with roses (Wis 2:8); second, the crown of the things of wealth, above: who has taken this counsel against Tyre, that was formerly crowned? (Isa 23:8); third, of worldly power: he has stripped me of my glory, and has taken the crown from my head (Job 19:9); fourth, of superstitious observances: when the feast of Bacchus was kept, they were compelled to go about crowned with ivy in honor of Bacchus (2 Macc 6:7).

642. The saints are also crowned: first, with a nuptial crown, below: as a bridegroom he has decked with a crown (Isa 61:10); second, a triumphal crown: he will not be crowned, except he strive lawfully (2 Tim 2:5); third, a royal crown, below: you shall be a crown of glory in the hand of the Lord (Isa 62:3); you, O Lord, have set on his head a crown of precious stones (Ps 20:4[21:3]); fourth, a priestly crown: and a crown of gold upon his head wherein was engraved holiness (Sir 45:14[12]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
