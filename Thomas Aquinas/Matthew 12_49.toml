[[commentary]]
quote='''
Then he commends the disciples: first, the immediate disciples; secondly, all believers. Therefore, the evangelist says, And stretching out his hand toward his disciples, he said: "Here are my mother and my brothers." As if to say: I love them more than the affections of my mother or brothers; for love of the Holy Spirit must rank first. And he extends his hand not only to those but to all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
