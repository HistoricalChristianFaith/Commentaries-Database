[[commentary]]
quote='''
After an enumeration of many penalties (in Chapter 2) the despair of the people is excluded. Such exclusion is divided twofold. First, despair is considered by appeals, second, is the argument for a fidelity that must be acceptable. Third, an assumed faithfulness turns the people to prayer for (divine) mercy.

On despair on appeals three ideas are conveyed. First is set forth affliction itself, second a reprobation is assumed. Third, despair is concluded.

To the first idea (affliction itself) two further notions are added. First, the affliction is considered which people sustained through pressure of their hands. And second, the manner of this very affliction is viewed. Third, a remedy for their escape is left out.

To the affliction sustained by the pressure of hands, three more ideas are advanced. First indignation is noticed of the person pressing hands. "I am the man who has seen affliction under the rod of his wrath." Jeremiah himself here is speaking in his own person, for he himself has been afflicted like other persons, concerning whom he repudiates their misery. For, Revelations 3:17 claims: "For you say, I am rich, I have prospered, and I need nothing; not knowing that you are wretched, piteable, poor, blind and naked." Thus allegorically such can be expressed about Christ and his Church. Morally, it can refer to human souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
