[[commentary]]
quote='''
Among those wonderful things he begins with the rains. Men perceive them sensibly, but science still cannot understand their first origin by which God brought them into being and so he says, "Do you know when God commanded the rains," which falls upon the earth by divine decree? After it has fallen, the air, which was first dark from the density of the clouds becomes bright by rarefaction. So he says, "and they," i.e. the falling rains, "show the light of his clouds?" which means the light of the sun shining through the clouds which vanish and which the dense clouds hide.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
