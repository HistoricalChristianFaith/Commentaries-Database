[[commentary]]
quote='''
John came neither eating nor drinking... Here he applies the comparison: first, he applies it; secondly, he assigns reasons (v. 19b). Men are drawn to a good life in two ways: some at the sight of holiness, others by the way of companionship. The Lord and John divided the two ways between themselves: John, or rather the Lord through John, shows the way of austerity; he himself shows a way less severe. Yet they were converted by neither. Hence he says, John came neither eating nor drinking. And this was literally true, because he was extremely abstemious; and they say, He has a demon. Like the hypocrites they turn good into evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
