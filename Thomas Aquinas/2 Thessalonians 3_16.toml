[[commentary]]
quote='''
Then when he says "now may the Lord," he concludes the epistle. And first, his conclusion is set out; second, a greeting, which is a kind of seal on the epistle, at "the salutation." And the first is in two parts, because first, he wishes God's gifts for them; second, he wishes God himself for them, there at "the Lord be."

As regards the first he says "now may the Lord of peace himself give you everlasting peace in every place." God is said to be the God "of peace" in relation to two things. For peace consists of two things, namely that a man be in harmony with himself and that he be in harmony with others. And both can only be had sufficiently in God. For apart from God a man does not have harmony with himself, much less with others, because a man's emotions are in harmony with themselves when what is sought to fulfill one desire suffices to fulfill all desires, and nothing but God can do this. "Who satisfies your desires with good things" (Ps 103:5). For anything else but God will not be enough for all desires, but God is enough. "In me you have peace" (John 16:33). Similarly, men are only united amongst themselves in that which is had in common among them, and this is most of all God.

And this is why he says "may the Lord of peace himself give," not temporal peace, but "everlasting peace," i.e., spiritual peace, which begins here and is completed there. "Who makes your ends peace" (Ps 147:14). And this "in every place," and among the faithful in all the world.

As regards the second, he says "the Lord be with you all," because a man has nothing else well unless he has God through faith and love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
