[[commentary]]
quote='''
"He sent." Above the Psalmist treated the power of the deliverer; here he pursues in order the benefit of deliverance. And regarding this he does two things. First he gives thanks for deliverance regarding past things. Second, regarding future things that he hopes for, at "and I shall be spotless with him." Regarding the first he sets forth three things. First he narrates from what he was delivered. Second, the deliverance itself, at "and he became." Third, the cause of deliverance, at "he saved me." Regarding the first he does two things. First he shows himself delivered from great tribulations. Second, he explains how the tribulations were great, at "he rescued me." The Gloss says according to the letter, "he sent from on high"; as if to say: God is powerful, because he does all the aforesaid things, namely moving, etc., thundering, etc., having supreme power. "And this from on high," namely by his power, "he took me," snatching me away, "and received me," that is, raised me up, protecting me "from many waters," that is, from many tribulations. Ps. 33: "Many are the tribulations of the just, and from all of them," etc. Sir. 51: "You delivered me from the gates of tribulations that surrounded me, and from the pressure of the flame that surrounded me." Mystically, God sent his own Son "from on high," that is, from heaven: Jn. 6: "I descended from heaven, not to do my own will," etc. This is what was asked: Ps. 143: "Send forth your hand from on high." "And he delivered me from many waters." Ps. 18: "From the highest heaven is his going forth," etc. Or the Holy Spirit: Lam. 1: "From on high he sent fire." "And he took me," the infirm, to heal me. "And he received me from many waters," namely of Baptism, or from the multitude of sins. Or "he sent from on high," that is, his grace to just men: Jas. 1: "Every good gift," etc. "And he took me" to repentance: Is. 40: "Like a shepherd he will feed his flock, with his arm he will gather the lambs," etc. Hos. 11: "I was like a nurse to Ephraim, I carried them in my arms." Or of the peoples, because the faithful were taken from the multitude of the nations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
