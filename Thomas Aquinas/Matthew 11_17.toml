[[commentary]]
quote='''
And calling to their playmates. The sense is this: suppose that some boys are in one place and others in another, so that some should sing and some dance; one group does one thing, the other is to react. If they sing and the others do not respond according to their role, the former are hurt and say: We sang to you and you did not dance. Against nothing so moves the spirit as song; hence Boethius in his Music tells of a person who was arguing with another in Pythagoras' presence, and the others conversed in song. Then Pythagoras ordered them to sing a different song, and the first man settled down. Therefore it should be noted that some songs are joyful, as it says in Sirach (40:20): "wine and music gladden the heart"; hence it says, we sang, i.e., a joyful song, and you did not dance. Likewise it happens that just as some are moved to joy, so others to tears; hence Jeremiah (9:17): "Send for the mourning women and let them raise a wailing over us." Therefore they say, we wailed, i.e., sang sad songs, and you did not mourn.

Mystically by the boys is signified the people of the Old Law, among whom some inspired spiritual joy, as David: "Rejoice, you just, in the Lord" (Ps 33:1); some grief, as Joel (2:13): "Turn to the Lord with your whole heart, with fasting, with tears and wailing." Hence they can say, we sang, i.e., incited to spiritual joy, and you have not acknowledged it; we wailed, i.e., invited you to repentance, and you have not accepted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
