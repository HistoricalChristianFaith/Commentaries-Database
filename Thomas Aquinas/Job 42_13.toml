[[commentary]]
quote='''
Now Job had lost not only his possessions, but also his children who are restored to him, but not double what he had before, for the text says, "He had seven sons and three daughters." There can be two reasons for this. One pertains to the future life, because the sons which he had were not completely lost to him but were saved in the future life to live with him. The other reason concerns the present life, for if the number of sons had been also doubled after the rest of the things were doubled, the fortune of his house would not seem to have increased, because each one of his children would have the same quantity of goods as before. Therefore, it was more just that his children should increase in value rather than number.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
