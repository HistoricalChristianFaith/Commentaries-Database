[[commentary]]
quote='''
Then when Paul says, but we were gentle [as children] among you, he makes two points: first, that he is not desirous of human glory; secondly, that he does not wish to appear avaricious (2:9). In handling the first point Paul does two things. First, he gives evidence of his humility; secondly, he shows his concern by a simile (2:7).

Paul makes the first point by saying that we were as children, that is, humble. "If they make you master of the feast, do not exalt yourself; be among them as one of them" (Sir. 32:1). Then he employs the simile saying, like a nurse taking care of her children, who bends down to an infant and speaks to the stammering child, so that the child may learn to speak; the nurse even makes use of gestures: "I have become all things to all men" (1 Cor. 9:22); "As babes in Christ, I fed you with milk, not solid food" (1 Cor. 3:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
