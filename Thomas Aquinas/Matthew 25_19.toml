[[commentary]]
quote='''
And after a long time the lord of those servants came. Here the judgment is treated. And first the reason for the coming of the judge is presented; secondly, the judgment, at and he reckoned with them. It should be noted that we must render an account to God of our works and gifts; above at 12:36: of every word that men shall speak, they must render an account. And above at 18:23: the kingdom of heaven is likened to a man who would take an account of his servants. And first it is presented in particular: and he reckoned with them, because everyone is bound to render an account, first at his death, secondly on the day of judgment, when we must all stand before the judgment seat of Christ. When therefore he says and after a long time the lord came, it can be referred to either. For if to the day of judgment, it is given to be understood that the interval between the coming of Christ and the day of judgment is long; against what some believed in the time of the Apostle; hence 2 Thessalonians 2:2: be not terrified as if the day of the Lord were at hand. But if to the day of death, Origen says: consider that scarcely anyone has been useful in the Church who lived only a short time. And he proves this from Peter, to whom the Lord said, John 21:18: when you are old, you shall stretch forth your hands, and another shall bind you. Likewise from Paul, who was young at his conversion and afterwards became old; hence in Philemon v. 9: as Paul an old man, etc. Hence when it says and after a long time, it is given to be understood that the Lord gives a long space for doing well: and from this is understood what is said in Proverbs 3:2: length of days and years of life and peace shall they add to you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
