[[commentary]]
quote='''
Likewise, here it should be considered that what pertains to the salvation of men should always be done. Hence the response follows: who answering said to them. And first the ordinance of God is set down; secondly, a certain reason is assigned. He says, therefore I say that I speak in parables, because to you it is given to know the mysteries of the kingdom of heaven, but to them it is not given: in which words three things are set down. First, that some are understanding and some are not. And this is not to be attributed to anyone, but to God who ordains; therefore it is given to you, but not to others. And therefore it is a divine ordinance. Likewise, it is of great usefulness, because it is a certain notification of beatitude; hence the usefulness is great, inasmuch as he gives you knowledge of divine mysteries; Jeremiah 9:12: who is the wise man that may understand this, and to whom the word of the mouth of the Lord may come, that he may declare it? Likewise, it is a sign of divine love; John 15:15: but I have called you friends, because all things whatsoever I have heard from my Father I have made known to you. Likewise, this comes from a gift, not from merit; Philippians 1:29: for unto you it is given for Christ, not only to believe in him, but also to suffer for him. And this is the mystery of the kingdom of heaven of God, and this is from God; 1 Corinthians 4:7: what have you that you have not received?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
