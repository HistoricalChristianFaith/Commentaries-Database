[[commentary]]
quote='''
Then he shows another way by which God speaks to man, which is the imaginary vision in the apparitions of dreams, and so he says, "in a dream, in the visions of the night." This can be referred to prophetic revelation, according to Numbers, "If anyone will be a prophet of the Lord among you, I will speak to him either in dream or in vision," (12:6) or this can be referred to ordinary dreams which Eliud believed come from God.

He explains then the manner and the order of the dreams. First, he touches on the natural cause when he says, "when sleep rushes on men," which happens when the external senses have been immobilized by vapors ascending to the source of sensing. Second, he places the disposition on the part of the human will when he continues, "and they sleep in bed," because men experience dreams which are especially ordered and filled with meaning when they sleep restfully. To the sick then dreams appear distorted because of lack of rest so Daniel says, "Your dream and the visions in your head, which you had on your bed mean this: You, O king, began to think on your bed and so on." (2:28)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
