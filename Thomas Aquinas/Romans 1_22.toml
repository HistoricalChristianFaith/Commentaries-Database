[[commentary]]
quote='''
Then when he says professing themselves he explains his statement. And first, how they became futile in their thinking, when he says professing themselves to be wise, they became fools. Professing themselves, i.e., ascribing wisdom to themselves as of themselves: woe to those who are wise in their own eyes (Isa 5:21); how can you say to Pharaoh: I am the son of the wise, a son of ancient kings? Where now are your wise men? (Isa 19:11).

Second, he explains his statement that their foolish heart was darkened when he says they became fools to the point of acting contrary to divine wisdom: every man is stupid and without knowledge of his own on which he presumed (Jer 10:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
