[[commentary]]
quote='''
"If we have forgotten." Here he proves what he said. And first he proposes the claims. Second he sets forth the divine judgment. Third he gives a clear sign. He says therefore: I said, we have not forgotten you, etc. And therefore he proposes: "If we have forgotten the name of our God"—"if," that is, we have not. Likewise, "If we have stretched out our hands to a strange god"—strange, namely, from the divine nature and from the rite of the Jews; as if to say: if we pray to them as gods, which is to act unjustly against the covenant of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
