[[commentary]]
quote='''
Men fortify themselves against God in two ways: some with astute plans, such as tyrants, who plot with their evil designs to destroy the things of God, that they may exercise their tyranny; as to this he says, we destroy arguments [counsels], namely, of tyrants: "He takes the wise in their own craftiness" (Job 5:13). But others through pride or profundity of their own talent; as to this he says, and every proud obstacle [height], namely, of their pride: "Do not be haughty" (Rom. 12:16), i.e., proud things, or by profundity of intellect, both of lawyers and philosophers: "Neither height nor depth" (Rom. 8:39); "Woe to those who are wise in their own eyes" (Is. 5:21). Every proud obstacle to the knowledge of God, i.e., the faith, which is knowledge of God, because they attack things said about God, namely, the virgin birth and other of God's marvels: "For the earth shall be full of the knowledge of the Lord" (Is. 11:9); "Who have not learned what some call the deep things of Satan" (Rev. 2:24); "So do not become proud, but stand in awe" (Rom. 11:20).

The second effect is the conversion of unbelievers to the faith; as to this he says, and take every thought captive to obey Christ. This happens when a man submits all he knows to the ministry of the Christ and of the faith: "To bind their kings with chains and their nobles with fetters of iron" (Ps. 149:8); "Put your feet into her fetters, and your neck into her chains" (Sir. 6:25), i.e., into the teaching of the faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
