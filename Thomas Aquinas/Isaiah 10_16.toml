[[commentary]]
quote='''
Therefore the sovereign Lord, the Lord of hosts, shall send leanness. Here he threatens punishment. And concerning this, he does three things: first, he threatens the judgment of punishment; second, he determines the manner of punishment: and under his glory; third, the effect of punishment: and he shall run away through fear (Isa 10:18). Among his fat ones, the powerful and the rich, below: and the Lord of hosts shall make unto all people in this mountain, a feast of fat things (Isa 25:6).

And under. Here the manner of punishment is determined, which was through burning; and three things are set out. First, the species of punishment: his glory, that is, the multitude of his host; under, that is, under his clothes, for bodies were cremated in intact clothing, above: and your strength shall be as the ashes of tow, and your work as a spark (Isa 1:31).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
