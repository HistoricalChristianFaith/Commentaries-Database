[[commentary]]
quote='''
Fourth comes the animation of the fetus, and this is especially true in the case of the rational soul, which is not infused until after organization of the matter. Certain seeds of virtue are divinely infused together with the rational soul into man, some common to all and others special to the individual. For this reason, some men are naturally disposed to one virtue; others to another. Job says further on, "Mercy grew in me from my infancy and came forth from the womb with me." (31:18) He therefore says here, "You gave me life and mercy." Last comes the conservation of life, as much in the womb of the mother as after leaving the womb. This conservation is partly due to natural principles and partly to gifts of God which are added over and above nature, whether they pertain to the soul, the body, or exterior goods. Expressing this theme he says, "and your visitation guarded my spirit." For according to the language of Scripture, as God is said to draw back from someone when he withdraws his gifts from him, so he is said to visit him when he bestows his gifts on him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
