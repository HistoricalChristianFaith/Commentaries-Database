[[commentary]]
quote='''
Third, the ease of punishing, my < . . . > (Judg 7:25); and over the sea, the Red Sea: and he shall lift it up (Exod 14:21–29), against you, first, in the way of Egypt, because you trusted in the Egyptians.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
