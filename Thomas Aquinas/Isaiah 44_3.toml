[[commentary]]
quote='''
Third, he sets out a promise, where it says, I will pour out. And first, he promises divine benefit as to temporal things: I will pour out waters, that is, consolations: I will pour upon you clean water (Ezek 36:25); as to spiritual things, I will pour out my spirit; and my blessing upon your stock, as to the multiplication of gifts: I will pour out my spirit upon all flesh (Joel 2:28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'

[[commentary]]
quote='''
The Spirit is given to beginners: for the principle of live-giving: the spirit came into them, and they lived (Ezek 37:10); for the laver of renovation: by the laver of regeneration and renovation of the Holy Spirit (Titus 3:5–6); for the privilege of adoption: you have received the spirit of adoption (Rom 8:15).

To those making progress: to instruct the intellect: but the Paraclete, the Holy Spirit, whom the Father will send in my name, he will teach you all things (John 14:26); to refresh the affections: my spirit is sweet above honey (Sir 24:27[20]); to assist action: the Spirit also helps our infirmity (Rom 8:26).

To the perfect: as the benefit of liberty: where the Spirit of the Lord is, there is liberty (2 Cor 3:17); as the bond of unity: careful to keep the unity of the Spirit in the bond of peace (Eph 4:3); as the pledge of their inheritance: you were signed with the holy Spirit of promise, who is the pledge of our inheritance (Eph 1:13–14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
