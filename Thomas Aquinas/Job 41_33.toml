[[commentary]]
quote='''
Just as Leviathan cannot be overcome either by man in the sea or by some creature in the sea, so he cannot be overcome by any land animal, and so he says, "There is no power on earth comparable to him." For there is no animal on earth as large as a whale in the sea, and so Pliny says that in the sea there are "greater animals than on land, and the evident cause is the profusion of moisture." By this he indicates that no material power can equal the power of a demon which is a power of spiritual nature.

Since he has said many things about the properties of Leviathan as an image of the devil, he consequently explains this metaphor. As I said already, all the properties treated seem to be reduced to two. One of these is that he cannot be harmed by another, and he explains this saying, "He has been made to fear no one," that is, the devil fears no man nor any other corporeal creature from the condition of the nature in which he was made by God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
