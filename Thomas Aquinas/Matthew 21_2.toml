[[commentary]]
quote='''
And he does three things. First, he commands them on a salutary mission; secondly, he gives a command about salvation; thirdly, about contradicting. He says therefore "go into the village that is over against you." Literally, there was a certain village which was opposite, to signify the world into which the Lord sent them. Mark 16:15: "Going into the whole world, preach the Gospel to every creature." And it will be against them. John 15:19: "I have chosen you out of the world, therefore the world hateth you." He says therefore "go into the village that is over against you." He commands something and foretells something. He commands, "go" etc.; he foretells, "and you shall find an ass tied, and a colt with her." Others make no mention of the ass. They found both. Morally, by the ass and the colt are signified men living like brutes, because in this respect they are like beasts; Ps 48:13: "Man when he was in honor did not understand: he is compared to senseless beasts, and is become like to them." By the ass is signified Judea, by the colt the Gentile people. And why is the Jewish people signified by the ass? Because the ass has three properties. First, because it is a stupid animal, hence it is called asinus, i.e., senseless. So the man who abandons the law of the Lord is senseless. Deut 32:6: "O foolish and senseless people." Likewise, it is appointed for burdens; so the Jewish people was burdened with the loads of the law, as Peter said (Acts 15:10): this is a burden which neither we, nor our fathers were able to bear. Likewise, the ass is an ignoble animal; so those are called ignoble who despise the commands of the Lord. But tied, namely, with the bonds of ignorance. Wis 17:17: "For they were all bound together with one chain of darkness." Likewise, they were bound with the bond of sin. Prov 5:22: "His own iniquities catch the wicked man." "Loose them, and bring them to me." Here he introduces the salvation of the people. Loose them from the bonds of ignorance through teaching. Ps 106:14: "He brought them out of darkness and the shadow of death." Likewise, loose them from the bonds of sins; hence he said to Peter above (16:19): "Whatsoever thou shalt loose upon earth, it shall be loosed also in heaven." And in Ps 31:1: "Blessed are they whose iniquities are forgiven, and whose sins are covered." Hence these, converting the people, brought them to Jesus. 1 Cor 1:13: "Was Paul then crucified for you?" Isa 66:19: "They shall declare my glory among the Gentiles."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
