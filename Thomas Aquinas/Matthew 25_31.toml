[[commentary]]
quote='''
Above, the Lord set forth various parables pertaining to the judgment; but here he treats openly of his own judgment, and he does three things. First, he treats of the coming of the judge; second, of the gathering of those to be judged; third, of the judgment itself. The second is at and all nations shall be gathered together before him; the third at and the king shall say etc. Concerning the first, four things are to be considered. First, the condition of the judge who is coming is touched upon; second, his dignity; third, his ministers; fourth, his judicial authority. In what is said, when the Son of man shall come, there is no doubt that he is the same as the Son of God. But why does he name the Son of man rather than the Son of God? One reason is that insofar as he is the Son of man, he will judge; John 5:27: he gave him power to do judgment, because he is the Son of man. And this is for three reasons. First, so that he might be seen by all: for in the form of his divinity he cannot be seen except by the good; hence, if he is to be seen by all, he must be seen in the form of man. Revelation 1:7: every eye shall see him. Likewise, on account of Christ's merit: for he merited this through his passion; Philippians 2:8: he humbled himself, becoming obedient unto death, even to the death of the cross; for which cause God also hath exalted him. Likewise, so that he might appear to judge in that form in which he was judged; Job 16:22: would that a man might so be judged with God, as the son of man is judged with his companion. Likewise, from the clemency of God, so that men might be judged by a man; Hebrews 4:15: we have not a high priest who cannot have compassion on our infirmities. This one, then, will be the Son of man. And what will his dignity be? He will come in his majesty; Luke 21:27: they shall see the Son of man coming in a cloud with great power and majesty. But what can be understood by majesty? It should be said that it means divinity, because although he will appear in the form of man, nevertheless he will appear with divinity. Hence the Apostle, 1 Thessalonians 4:15: the Lord with commandment and with the voice of an Archangel and with the trumpet of God shall come down from heaven. Or in majesty, i.e., in glory, because his body will be glorious; and he will come with a glorious company; hence above, 16:27: the Son of man shall come in glory. And therefore he adds, and all the angels with him. Here he treats of the ministers. And this can be understood of the heavenly spirits; Psalm 103:4: who maketh his angels spirits. And why will he come with them? Because they are the guardians of men; Psalm 90:11: God hath given his angels charge over thee. Therefore they will be present as witnesses, because the good received their guardianship, but the wicked did not, and instead repelled them; Isaiah 50:7: we have cured Babylon, and she is not healed. Or all the angels, i.e., preachers, or teachers of truth; Malachi 2:7: the lips of the priest shall keep knowledge, and they shall seek the law at his mouth. To these belongs judicial power, as Augustine says. Isaiah 3:14: the Lord will come to judgment, and all his saints with him; Proverbs 31:23: her husband is noble in the gates, when he sitteth among the senators of the land. Then follows the judicial power: then shall he sit upon the seat of his majesty. We should not understand this as a bodily seat; rather his seat is the holy men and angels. He will sit in them, because through them he will exercise judgment. Of men it is said above, 19:28, that they shall sit upon twelve seats etc. Of angels it is said, Colossians 1:16: whether thrones or dominations etc., and in Psalm 79:3: who sittest upon the Cherubim; and Psalm 9:5: thou hast sat on the throne, who judgest justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
