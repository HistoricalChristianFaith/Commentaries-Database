[[commentary]]
quote='''
The list of their names is presented. Why? So that if a false prophet arose and claimed to be an apostle, he would not be believed. For this reason the letter of the foundation, i.e., of Manicheus, was rejected. And it should be noted that he always lists them by two's, because it is the number for charity. Also, wherever he mentions any with the same name, he indicates something by which they are distinguished. It should also be noted that he does not follow the order of rank, although Peter is always mentioned first. He is also called Simon, i.e., obedient; hence it says in Proverbs (16:20): "The obedient man shall speak of victory." Peter is named rock on account of solidity; and Cephas, which is a Syrian, not Hebraic name. Andrew, virile; hence it says in Psalm 27 (v. 14): "Be strong and let your heart take courage."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
