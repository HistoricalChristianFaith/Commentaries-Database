[[commentary]]
quote='''
Hence this servant was first blasphemous. Then his negligence is touched on: being afraid, I went; Psalm 13:5: they trembled for fear, where there was no fear. It is true that God is to be feared so that sin may be avoided, according to what is had in Job 31:23: for I always feared God as waves swelling over me. Hence that man should not sin, he should do this from love, not from fear. Therefore there follows: I hid your talent in the earth, because out of fear, since servile fear causes many evils. Then he concludes: behold, here you have what is yours. Hence he preserved his knowledge but did not multiply it. And this does not suffice, because one must multiply; 1 Corinthians 9:16: if I do not preach the Gospel, there is no glory for me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
