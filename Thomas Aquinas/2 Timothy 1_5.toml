[[commentary]]
quote='''
Likewise being mindful of your faith in God: first, he recalls to mind his faith; second, he shows that it was derived from his parents and was not a novelty.

Hence he says, calling to mind that faith which is in you unfeigned. Faith is necessary to a prelate who is its guardian: without faith it is impossible to please God (Heb 11:6). And he says, unfeigned, for it is true through good works: show me your faith without works; and I will show you, by works, my faith (Jas 2:18); now the end of the commandments is charity from a pure heart and a good conscience and an unfeigned faith (1 Tim 1:5); the Holy Spirit will flee from the deceitful (Wis 1:5).

And this is not new, but it dwelt first in your grandmother, Lois, and in your mother, Eunice. In Acts it is stated that he is the son of a Jewish mother that believed (Acts 16:1). But I am certain either through revelation or through signs that it is in you also.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
