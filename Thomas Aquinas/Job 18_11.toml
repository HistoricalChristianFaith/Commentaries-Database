[[commentary]]
quote='''
Third, harmful things like this are caused on the part of some men whose plots and attacks are feared, and so he then says, "From all sides dread will terrify him," since, as Scripture says, "When the evil man is timid, he has been given for the condemnation of everyone." (Wisdom 17:10) When however man is wary against everyone, it is necessary that his acts should be impeded in many things, and so he then says, "and they will wrap around his feet," so he cannot go forward freely in any direction.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
