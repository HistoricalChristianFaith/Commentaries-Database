[[commentary]]
quote='''
He says with greater exaggeration, "Who in addition to all his sins," to the past sins for which he has been scourged, "adds blasphemy," in saying he is just, but God is unjust. For this he first desires punishment for him in the present, and so he says, "let him be bound among us meanwhile," with adversities. Second, he implies future punishments, and so he says, "and then," after he has already suffered temporally, "to judgment," of future revenge, "let him provoke God by his speeches," by which he blasphemes against him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
