[[commentary]]
quote='''
Behold I will stir up the Medes against them. Here he describes the ferocity of the enemy, which is not appeased by tribute: who shall not seek silver.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
