[[commentary]]
quote='''
All these things Jesus spoke in parables, etc. Having set forth the diverse parables to the crowds, here he confirms, or approves, by the authority of the prophet. And it is divided into three parts; because first the custom of Christ regarding parabolic teaching is set forth; secondly, the authority is adduced; thirdly, the exposition of the foregoing is given. The second is at that it might be fulfilled which was spoken by the prophet; the third at then having sent away the multitudes, he came into the house. He says therefore all these things Jesus spoke in parables to the multitudes. Why then did he speak to the crowds in parables? The reason is twofold: because in the crowd there were mingled some who were faithful and some who were unfaithful, likewise some who were well-disposed and some who were ill-disposed. On account of the ill-disposed and the unfaithful he spoke thus, so that they might not understand, as was said above, that seeing they may not see; on account of the faithful, so that they might better grasp and better retain. And this is stated in Mark 4:33f. Paul, 1 Cor 3:1: I could not speak to you as to spiritual men, but as to carnal. And without parables he did not speak to them. This seems to be false, because in the Sermon on the Mount, and in many other places, he did not speak in parables. Chrysostom solves this by saying that it is true of this entire discourse, because this entire address to the crowds he spoke parabolically. Augustine says that he never spoke to the crowds without parables, because there was no discourse that he delivered to the crowds without mixing in some parable. Hence in the Sermon on the Mount he mixed them in, where he said let not your left hand know what your right hand does. And he says that if somewhere he is found to be without a parable, it should be said that the Evangelists did not narrate in order: hence even if a parable is not written, one should be understood, because of the fact that it says here that without parables he did not speak to them, and that he always mixed in parables.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
