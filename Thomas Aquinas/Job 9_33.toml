[[commentary]]
quote='''
For when two men contend with each other, they can have a judge who examines both arguments. But there can be no arbiter between God and man for two reasons. One reason is because a judge must have a higher wisdom which is like the standard according to which the arguments of both parties are examined. It is clear, however, that divine wisdom is the first standard according to which the truth of all things is examined. Because of this he then says, "Nor is there anyone who can evaluate both our arguments." He means here: There is no one superior to God from whose greater wisdom divine wisdom can be corrected. Another reason is because there must be a greater power in the judge by which he can sanction both parties. Job excludes this quality saying: "Who could lay hands on both of us," i.e. coerce both for this is excluded by the immensity of divine power, which he has already demonstrated. (vv. 4-7)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
