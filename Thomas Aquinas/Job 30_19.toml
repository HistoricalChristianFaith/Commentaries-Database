[[commentary]]
quote='''
From the punishment of this kind he shows that he has become abominable to men, and so he says, "I have been made equal to filth," so that no one wants to approach me because of the great corruption and the number of the worms, as no one wishes to approach filth. "And I have become like dust and ashes," totally dejected and held in contempt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
