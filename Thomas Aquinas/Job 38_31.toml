[[commentary]]
quote='''
When he has explained these things about the variable changes of the air, he proceeds further to the immutable changeableness of the heavenly bodies. On this subject he first considers the immobility of figure in the fixed stars, because each of them maintains its place so that one does not approach the other too much or too little. This phenomenon especially appears in the stars closer to us which never come together, and so he says, "Will you be able to bind together the flickering stars of the Pleiades?" The stars of the Pleiades are the stars which shine in the head of Taurus, of which six appear very close, but the seventh is more dull. Second, he considers the uniformity of the first motion in the heavenly bodies, by which the whole heaven and all the stars in it revolve once in a night and a day over the poles of the world. This motion is more perceived by the senses in the stars near the North Pole, which are perpetually apparent to us because of the elevation of the pole over our horizon. Among these stars one especially notes the constellation of Arcturus, which is The Great Bear. The stars of this constellation clearly move uniformly in a circle around the pole of the world, and as to this he says, "or are you able to break up the circle of Arcturus," so that it does not encircle the pole?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
