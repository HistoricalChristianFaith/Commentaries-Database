[[commentary]]
quote='''
Second, he shows that what he is about to say is so clear that even they cannot be ignorant of it, and so he says, "Behold all of you know," what I am about to say is true, and so it is strange that you speak so irrationally against the plain truth. He expresses this theme saying, "and why do you speak foolishness without proof," that is, things with no reasonable support? For men are dull when they know the premises, but usually do not perceive the conclusion which follows from them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
