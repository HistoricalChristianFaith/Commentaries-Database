[[commentary]]
quote='''
Then when he says, The man went off and related to the Jews, we see Jesus identified. Some think, as Chrysostom reports, that this man identified Jesus out of malice. But this does not seem probable: that he would be so ungrateful after receiving such a favor. He related to the Jews that it was Jesus who had cured him, in order to make it clear that Christ had the power to heal: "Come... and I will tell you what great things the Lord has done for me," as we read in the Psalm (65:16). This is obvious, for they had asked him who commanded him to pick up his mat, but he told them that it was Jesus who had cured him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
