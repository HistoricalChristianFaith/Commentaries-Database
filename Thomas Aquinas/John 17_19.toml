[[commentary]]
quote='''
They need to be sanctified not only because of the task they have been given, but also because their sanctification has already been begun by me. Thus he says, and for their sake I sanctify myself. According to Augustine, we should note that there are two natures in Christ. Christ is holy by essence, considering his divine nature; while he is holy by grace, which is derived from the divine nature, considering his human nature. Referring to his divine nature he says, I sanctify myself, by taking on flesh for them. I do this in order that the sanctity or holiness of grace, which is found in my humanity, but is also from me as God, might flow from me to them, because "from his fullness we have all received" (1:16). "It is like the precious oil upon the head," and this head is Christ, who is God, "running down upon the beard, upon the beard of Aaron," that is, upon his human nature, and from here, "running down on the collar of his robes," that is, to us. (Ps 133:2).

Or, according to Chrysostom, he is asking they be sanctified by a spiritual sanctification. In the Old Testament there were sanctifications of the body: "Cleansing of the body imposed until the time comes to set things right" (Heb 9:10). These were figures of a spiritual sanctification, and these figures involved the offering of some sacrifice. And so it was appropriate that some sacrifice be offered for the sanctification of the disciples. This is what he is saying: I sanctify myself in order that they might be sanctified, that is, I am offering myself as a sacrifice: "who offered himself without blemish to God" (Heb 9:14); "So Jesus also suffered outside the gate in order to sanctify the people through his own blood" (Heb 13:12). He did this in truth, not in a figure, as was done in the Old Testament.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F17.htm'
source_title='Commentary on John'
