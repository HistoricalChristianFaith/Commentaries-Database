[[commentary]]
quote='''
And he foretells the death of king Sennacherib: behold, I will send a spirit upon him. He that shall kill by the sword must be killed by the sword (Rev 13:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
