[[commentary]]
quote='''
He then proceeds to examine other things which have a determined time and place from divine disposition and so are subject to divine knowledge. The greater part of these are hidden from men. The darkness of night hides the sun and many other things from us, but this happens by divine disposition, and so he says, "He placed a time for the darkness." Also, some things are hidden from us by their corruption when they are resolved into their principles, which are known to God but hidden from us, and so he says, "and he considers the end of the universe," the end of the resolution of things. Some are also found to be hidden from men because of the inaccessibility of place, for example, some mountains are sometimes inaccessible on which there are things which are removed from human sight, and expressing this he says, "and also the stone of the dark," which is the cliff of some high mountain always covered over by clouds like darkness, "and the shadow of death," some shadowy place in the canyons of the mountains which the life giving heat of the sun never touches.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
