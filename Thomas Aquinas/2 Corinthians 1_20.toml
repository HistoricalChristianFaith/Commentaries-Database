[[commentary]]
quote='''
But because there might be some doubt about his statement that there was no falsity in Christ, he at once proves this, saying, For all the promises of God find their Yes in him. He proves this in the following way: it is obvious that there can be no falsity in that which is the manifestation of the divine truth; but the Son of God came to manifest the divine truth in the promises made by God to be fulfilled through him. Therefore there is no falsity in him. And that is what he says: there is not in the Son of God Yes and No, because all the promises of God, namely made to men, find their Yes in him, i.e., in Christ, i.e., they are verified and fulfilled in Christ: "I tell you that Christ became a servant to the circumcised to show God's truthfulness, in order to confirm the promises given to the patriarchs" (Rom. 15:8).

From this, therefore, the Apostle concludes that his words are true, because he preaches the Son of God, in whom is the truth. That is why through him, namely, Christ, we utter the Amen, i.e., that which is true: "The words of the Amen, the faithful and true witness" (Rev. 3:14); "He who blesses himself in the land shall bless himself by the God of truth, amen" (Is. 65:16). This truth we say to God, i.e., to the honor of God, namely, manifesting his truth to the glory of God and our glory, because our glory is to show and preach the word of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
