[[commentary]]
quote='''
"This is their way." Here he shows what follows from this evil that they have incurred, namely that they have become bestial; for someone could say that no evil follows from it. But it is not so. Rather, something else follows. And first he shows what follows with respect to them. Second, with respect to others. With respect to them he says, "This way," namely of following passions, "is a scandal to them," because they are interiorly disturbed. Ps. 68: "Let their table before them become a stumbling block." Likewise, they are also exteriorly disturbed, because they are punished and defamed. The Philosopher says: "The wicked are filled with repentance." With respect to others it follows that "afterwards they shall please with their mouth." And this is explained in two ways. In one way thus: after they are interiorly scandalized and do evil, they wish that others would follow them. And therefore they strive to please others, so as to draw them to sin. Prov. 1: "If sinners entice you," etc. In another way, it reproves simulation: as if to say, after they are already thus disturbed and follow evil, "they shall please with their mouth," that is, they strive to speak holy and smooth words. Mt. 23: "Woe to you, Scribes and Pharisees, hypocrites, who are like whitewashed sepulchres," etc., up to "and iniquity." The Gloss: "Those who simulate are worse than the openly wicked." But is this true? It seems not. Is. 3: "They have proclaimed their sin like Sodom." Jerome's Gloss: "A second plank of salvation is to sin in secret." It must be said that it is one thing not to publicize a sin, and another thing to simulate innocence; for to publicize sin is evil because it scandalizes others; but to simulate innocence in order to draw others to sin is a greater evil. And it is of these that he speaks here. Another reading has, "And with their mouth they shall bless God." And it is explained thus: although they are interiorly beasts, yet with their lips they outwardly bless God. Is. 29: "This people honors me with their lips," etc. Or, differently: they shall bless God for the evil things they have done. Jerome has, "After them their justices shall run"; as if to say: he did not understand, and was made like beasts, and from this they are scandalized, and so it happens because they wished to be beasts. Therefore, "after them," that is, in the end, they shall be devoured by beasts, that is, by demons; as if to say: they shall run after the demons in Hell.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
