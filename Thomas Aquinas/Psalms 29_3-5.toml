[[commentary]]
quote='''
Mystically, "The voice of the Lord upon the waters." A twofold benefit is implied: namely, of conversion and of the gifts that are given to the converted. "The voice of the Lord in power." According to the mystery, this can be explained in two ways. In one way, so that it is referred to the preaching of Christ; and so it deals with the conversion of Jews and Gentiles. Of the Jews, when he says "upon the waters." Human beings are likened to waters, because just as waters, people flow and do not return, 2 Kgs. 14. Hence "upon the waters" is said "the voice," that is, the preaching of the Lord, that is, upon the Jewish people, because from the teaching of God -- not yet incarnate, but awaited -- the Jews were converted to God. Concerning the conversion of the Gentiles, it follows when he says, "The God of majesty thundered." Thunder is formed in a cloud, in which the incarnation itself is signified, which is like a cloud: Is. 19: "Behold, the Lord ascends upon a light cloud." The God of majesty, therefore, thundered, that is, the almighty thundered through preaching from the cloud of his flesh: Job 37: "He will thunder with his voice marvelously." And he says "upon many waters," because the voice of the incarnate Lord was not only upon the Jews but upon the Gentiles: Is. 49: "I have given you as a light to the nations," etc. Or "upon the waters" of Baptism; hence from the time that Christ was baptized, this Psalm is sung. "The voice of the Lord in power." Above, the Psalmist, according to the mystical understanding, touched upon the mystery of the conversion of the Jews and Gentiles; here, however, he sets forth the benefit of temporal gifts. And concerning this he does three things. First, he proposes the spiritual gifts. Second, he sets forth the uprooting of vices that follows from them, at "The voice of the Lord breaking." Third, the advancement or promotion to good things, at "The voice of the Lord preparing." In spiritual gifts there is this difference: because to some, spiritual gifts are given for those things that are commonly fitting and must be done and are necessary for salvation; to others, for certain arduous things, such as working miracles and the like. As to the first, he says, "The voice of the Lord in power," that is, by the Lord's command, power is given to fulfill the precepts. As to the second, he says, "The voice of the Lord in magnificence," that is, by the Lord's command, power is given to his saints to do great things: Ps. 67: "Over Israel is his magnificence." The Gloss adapts these to the gifts of the Holy Spirit. And the first, namely the conversion of the faithful, to the gift of fear, which is accomplished by divine power, to which it pertains to allow fears. Magnificence pertains to the gift of knowledge, because to knowledge it pertains to do great things: Sir. 25: "How great is the one who finds wisdom." "The voice of the Lord breaking." Here he treats the exclusion of vices, and he touches first on the vice of pride. Second, of concupiscence, at "The voice of the Lord dividing the flame of fire." Third, the vice of unbelief or contempt, at "The voice of the Lord shaking the desert." He shows, therefore, first the exclusion of pride. Hence it should be noted that just as fir trees are tall, so are cedars; and therefore through them pride is signified. He says therefore, "The voice of the Lord breaking the cedars," that is, the power of the divine command over all the proud: Is. 14: "Your pride has been dragged down to Hell." "And he will break the cedars of Lebanon," that is, the voice of the Lord over the arrogant and proud, reducing them by his power; because all kings were converted to Christ through this. And finally upon the cedars of Lebanon, because the greater ones among the Jews were converted, as about Nicodemus, Jn. 3.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
