[[commentary]]
quote='''
"Wait." The Psalmist has said much in the foregoing to commend the just and to bring down the wicked; and he has directed all of this to the end that we may follow justice and turn away from evil. Here, however, he introduces an exhortation to justice. Justice is observed in two areas: namely, in those things that concern God, and in those that concern one's neighbor. Regarding this he does three things. First, he proposes the exhortation; second, he shows the reward, at "And he will exalt you"; third, he proves something he proposed, at "I saw the wicked." He directs the exhortation toward God. First, through expectation; second, through obedience. He says therefore, "Wait for the Lord," where he says two things. First, that if you suffer some trouble, do not immediately despair or be disturbed against God, but wait until he comes to your aid. Ps. 39: "Waiting I waited for the Lord, and he attended to me." And thus he exhorts to patience. Second, he exhorts to long-suffering; as if to say, if you have not yet been rewarded for your good deeds, do not be broken, but wait for the reward. Hab. 2: "If it delays, wait for it," etc. Jas. 5: "The farmer waits for the precious fruit of the earth, bearing it patiently." "And keep his ways." Expectation is in the midst of evils; keeping is in the midst of goods. Therefore keep his ways, namely of charity and of the commandments, and guard them with diligence. Prov. 4: "With all watchfulness, guard," etc. Job 23: "My foot has followed in his steps; I have kept his way." Ps. 118: "I will search out your law," etc. "And he will exalt you." Here the reward or fruit is set forth. This is the fruit of the good, that they be exalted by him. Sir. 15: "He will exalt him among his neighbors." Wis. 19: "In all things you have honored your people." And for what purpose? "That you may inherit the land." It is remarkable what he says: since the earth is the lowest thing, how will he exalt, so that you may take it? And it must be said that the land of which he speaks is the land of the living; and this is on high, as it were the stability of eternal and spiritual goods. And one does not reach it as long as the mind lies in the depths; rather, one must be exalted. Is. 58: "I will raise you up above the heights of the earth." Or it can also be understood of this earth. Therefore those inherit the earth who have dominion over the earth; and such are those who have their heart raised above the earth, because they do not have their heart pressed down to the earth, as do the slaves of the earth and those possessed by the earth. And therefore, in order to inherit it, they must be exalted. Prov. 4: "You will be glorified by her when you embrace her," etc. "When sinners perish, you will see." They will rejoice over the destruction of the wicked. Ps. 17: "The just man will rejoice when he sees the vindication," etc. Job 22: "The just will see and rejoice." But not on account of the destruction of the wicked, because God does not rejoice in it. Wis. 1: "He does not rejoice in the destruction of men"; but over divine justice. Is. 66: "They shall go out and see the corpses of the men who transgressed against me." Likewise over the divine mercy shown to them, by which they were freed from evils, or from the punishments of the damned. And to see this, one must also be exalted, because if you are caught below, you will not see their destruction. Ps. 72: "This is a labor before me," namely the deeds of sinners, "until," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
