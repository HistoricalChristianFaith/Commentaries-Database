[[commentary]]
quote='''
"They cried out." Here he shows that they are completely desolate; hence he says, "they cried out, and there was none to save them," because they had neither the help of men nor of the gods whom they themselves called the creators of things. Jer. 2: "Where are your gods that you have made? Let them arise and deliver you in the time of your affliction." Hence there follows: "They cried out to the Lord, and he did not hear them." Is. 1: "When you multiply your prayers, I will not hear you." But against this: Is. 65: "Before they cry, I will hear." Ps. 90: "He shall cry to me, and I will hear him." And it should be said that when someone cries out with a right intention, whether praying or crying, then he is heard, and God approves and hears his prayer. Jn. 9: "If anyone is a worshipper of God," that is, with a right intention, "him he hears." But when someone cries out to God with a simulated and feigned prayer, he does not hear. Jas. 4: "You ask and do not receive, because you ask wrongly," that is, with a bad intention or an unjust request. Prov. 1: "Then they will call and I will not hear; they will rise at dawn and will not find me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
