[[commentary]]
quote='''
After showing that he has power to give life and showing his manner of doing so, our Lord here shows how this power to give life belongs to him. First, the Evangelist mentions the dispute which arose among the crowd on this point; secondly, he gives the discussion between the Jewish leaders and Christ (v 22). Concerning the first he does three things. First, he mentions the dispute within the crowd; secondly, he gives the opinion of one side; and then states the reasonable position of the other side.

The dispute arose within the crowd which was listening to Christ because of what he said. The Evangelist says, There was again a division among the Jews because of these words. Since some of them understood his words correctly, and others did not, they argued among themselves: "I have not come to bring peace, but a sword," that is, the sword of gospel teaching, which some believed and others deny (Matt 10:34). "He pours contempt upon princes" (Ps 107:40).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
