[[commentary]]
quote='''
Above, the Lord showed parabolically both the impediment and the progress of the evangelical teaching; now he shows its dignity through certain parables, which he explained to the disciples. Its dignity is shown with regard to three things: with regard to its abundance, with regard to its beauty, and with regard to its universality. The second is at again, the kingdom of heaven is like a merchant man, etc.; the third at again, the kingdom of heaven is like a net cast into the sea, etc. I say therefore that the abundance of the evangelical teaching is in the likeness of a treasure, because just as a treasure is an abundance of riches, so is the evangelical teaching; Isa 33:6: the riches of salvation are wisdom and knowledge; the fear of the Lord is his treasure. Regarding this he proceeds as follows. First, the hidden treasure is set forth; secondly, its discovery; thirdly, its acquisition, etc. The second is at which a man having found, etc.; the third at and for joy thereof goes, etc. This treasure can be explained in many ways. According to Chrysostom it is the evangelical teaching, of which 2 Cor 4:7 says: we have this treasure in earthen vessels, which is hidden in the field of this world, namely, from the eyes of the impure; above 11:25: you have hidden these things from the wise and the prudent. According to Gregory it is called heavenly desire; Isa 33:6: the fear of the Lord is his treasure. It is hidden in the field of spiritual discipline; because outwardly it appears contemptible, but inwardly it has sweetness; Prov 24:27: diligently till your field. According to Jerome it is the Word of God, of which Col 2:3 says: in whom are hidden all the treasures of wisdom and knowledge, which he hid in the field of his body, because he lay hidden in the flesh. Isa 2:7: and there is no end to his treasures. Therefore sacred doctrine is understood in another way, as hidden in the field of the Church; Wis 7:14: for it is an infinite treasure to men. Which a man having found hid. It is found by all through faith. For it cannot exist in any without faith; Wis 1:2: he is found by those who do not tempt him; and he shows himself to those who have faith in him. But it must be hidden, according to what is said in Ps 118:11: your words I have hidden in my heart. But when it is hidden, it should not be from envy, but from caution. Why it should be hidden, there are many reasons. One is that it bears more fruit and profits more, because it burns more ardently; for just as an enclosed fire heats more, so does the word when it is hidden; Jer 20:9: the word of the Lord became like a fire burning, and shut up in my bones, and I grew weary, unable to bear it. And in Ps 38:4: my heart grew hot within me, and in my meditation a fire shall burn. Likewise it is hidden on account of vainglory: for if it smokes outwardly, it is subject to danger. Therefore the Lord said above, 6:6: pray to your Father in secret. Likewise because it is more safely guarded thus; for when it is in public, it finds one who seizes it. Isa 39:4: he who showed his treasures to the messengers of the king of Babylon, and it is added: behold, the days shall come, and all that is in your house shall be taken away. But what about what was said above, 5:15: let your good works shine? It is resolved by distinguishing the times: because when it is first found, it is good that it be hidden; but when a man is confirmed, then it is good that it be manifested; Sir 41:17: a treasure unseen and wisdom hidden, what profit is in them both? Gregory says that it should be open in deed, hidden in the heart. Hence he speaks thus: let the work be in public, although the intention remains in secret. And for joy thereof goes and sells all that he has. This is the third point, about the acquisition, because he rejoices. Job 3:21: as those who dig for a treasure, and rejoice exceedingly when they have found a grave. When he has found through faith, for joy he goes, and begins to make progress, and sells all that he has, i.e., he despises all things in order to have spiritual things, and buys that field; this means either that he seeks out good company for himself, or he purchases leisure that he does not have, namely, spiritual peace. Phil 3:8: I count all things as dung, that I may gain Christ; Song 8:7: if a man should give all the substance of his house for love, he shall despise it as nothing, etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
