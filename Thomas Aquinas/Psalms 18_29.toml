[[commentary]]
quote='''
He sets forth his hope of being heard when he says, "for." Here he does two things. First he touches on deliverance from evil. Second, victory over evil. He says therefore: I pray because I hope "in you," that is, in your power, "I shall be delivered from temptation," that is, from whatever tribulation or attack: 1 Cor. 10: "God is faithful, who will not allow you to be tempted beyond what you are able." "And in my God I shall leap over the wall," that is, I shall have victory over sin by the power of God. For then the enemy has victory over a city when he leaps over the wall. This wall is whatever difficulty impedes us from doing good, or the sins that provoke us to doing evil. Jerome says, "I shall break down the wall," because we cannot be in the world without sin: 1 Jn. 1: "If we say that we have no sin," etc. But we leap over it, because we overcome it when we do not consent to its desires.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
