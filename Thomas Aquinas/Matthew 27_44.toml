[[commentary]]
quote='''
"The thieves also that were crucified with him reproached him." But what is it that here it says both reproached him, while in Luke 23:39 only one did? Augustine resolves this by saying that sometimes it is customary in Scripture for the plural to be put for the singular, as in Hebrews 11:33: "they stopped the mouths of lions," i.e., he stopped, namely Daniel. And it is a manner of speaking, just as one says: these peasants are hostile to me, even if only one is hostile to him. So Matthew speaks. Or otherwise, according to Jerome, at the beginning both reproached him; but one, seeing the miracles he was working, repented. And this, as Chrysostom says, happened by divine dispensation. Hence those are signified who after many crimes return to Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
