[[commentary]]
quote='''
Then when he says, it is a faithful saying, he corroborates what he said about our salvation and hope. As if to say: this saying is trustworthy: "these words are trustworthy and true" (Rev 22:6).

Then when he says, and these things I will, he commands that this be preached: first, he gives the command; second, he assigns the reason, at these things are good.

He says, therefore, and these things, namely, which pertain to God's blessings, to forgiveness of sins, and to matters of faith and morals, I will have you affirm constantly: "your words have upheld him who was stumbling" (Job 4:4); "and Judas and Silas, who were themselves prophets, exhorted the brethren with many words and strengthened them" (Acts 15:32).

And the reason for this is that they who believe in God may be careful to excel in good works. This can be understood to refer to prelates. As if to say: I desire that you strengthen the travelers, i.e., prelates, so that they will be careful to excel these, i.e., the faithful, in good works: "that they may see your good deeds and glorify God" (1 Pet 2:12); "let your light so shine before men, that they may see your good works and give glory to your Father who is in heaven" (Matt 5:16).

These words are good because they speak of God's goodness: "the good man out of his good treasure brings forth good" (Matt 12:35); and profitable unto men: "I am the Lord your God, who teaches you profitable things" (Isa 48:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
