[[commentary]]
quote='''
Consequently, the authority of the prophet Isaiah is introduced. And in them is fulfilled the prophecy of Isaiah, who says: by hearing you shall hear and shall not understand etc., which is written in Isaiah 6:9; but there it is stated imperatively, here predictively. There: hear, you who hear, and do not understand; and see the vision, and do not know it. And three things are touched on. First, the hardness of the Jews; secondly, the cause; thirdly, the effect of that cause. The second is at for the heart of this people is grown fat; the third at lest at any time they should see etc. And because he had spoken of two things, namely, of hearing and of sight, therefore he says two things: you shall hear with the exterior hearing; you shall hear the doctrine of Christ, and shall not understand the mysteries; Psalm 35:4: he would not understand, that he might do well; Hosea 4:6: because you have rejected knowledge, I will reject you, that you shall not do the office of priesthood to me. And seeing you shall see and shall not see. You shall see the flesh of Christ with exterior sight, and you shall not consider his power. We have groped for the wall like the blind, and we have groped as if we had no eyes, Isaiah 59:10.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
