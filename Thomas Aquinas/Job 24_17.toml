[[commentary]]
quote='''
"If suddenly," as though unprepared, because the time seems short to them when they are occupied in carnal pleasure, "the dawn should appear," which is the beginning of daylight, "they think of it as the shadow of death," that is, they think it is as hateful as the shadow of death when they see that they cannot continue their wanton activities anymore. For men are usually impeded in their acts in two ways. In one way when they do not foresee the outcome of a situation. In another way when they have a weak link in their resolve. But the adulterers, on the contrary, goaded by concupiscence, first throw themselves into dangers without consideration even though they do not know what will follow, and to make this clear he says, "And so in the darkness," in doubtful and dark circumstances, "as though in the light," in clear circumstances, "they walk," proceed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
