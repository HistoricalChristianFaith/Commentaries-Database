[[commentary]]
quote='''
And whilst they went to buy, the bridegroom came. Augustine says that some refer this to the state of the present life; but it cannot stand with what is said, and the door was shut. Therefore Origen also expounds this of the future coming. And he does three things. First, the coming of the judge is presented; secondly, the reception of the good; thirdly, the exclusion of the wicked. He says therefore whilst they went to buy, the bridegroom came; i.e., while they were anxious about how to excuse themselves at the judgment, the Lord came to judgment. But Origen says that some are those who will come for counsel, or to priests, and with deliberation to be converted, and then at his coming they die. Hence the bridegroom comes when a man dies. But what does it mean that here it says the bridegroom coming, when above it had said they went out to meet the bridegroom and the bride? The reason is that in the judgment the bride, i.e., the flesh of Christ, will have been assumed into glorification. Or if we refer it to the Church, then she will be perfectly united to the bridegroom himself through adherence. Hence the Apostle in 1 Corinthians 6:17: he who is joined to God is one spirit with him. And there follows and they that were ready went in with him to the marriage. These nuptials are the kingdom of heaven, concerning which Apocalypse 17:14 says: for he is Lord of lords and King of kings; and they that are with him are called, and elect, and faithful. And immediately the door was shut, because it will be opened to no one afterwards. But now it is opened; hence Psalm 23:7: lift up your gates, O you princes. And Apocalypse 4:1: after these things I looked, and behold a door opened in heaven. But then it will be shut.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
