[[commentary]]
quote='''
But though it is true the wise man suffers sadness, nevertheless his reason is not absorbed by this sadness. Job shows as a consequence that although he himself might suffer sadness, he still had the greatest concern and caution to protect himself against sadness, so as not to be led by sadness to do something evil. To avoid this, he preferred death. To give some expression to this he says, "What my soul did not touch before has now become food in my anguish," because what my soul formerly abhorred, it now desires as pleasant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
