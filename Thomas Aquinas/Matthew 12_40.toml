[[commentary]]
quote='''
For as Jonah was three days and three nights in the belly of the whale, i.e., actually, so will the Son of Man be in the heart of the earth. And in this the error of Manicheus is refuted which said that he did not truly die. And he says, in the heart of the earth, because as a man's heart is in the depths, so Christ was in the depth of the earth. Or, in the heart of the earth, i.e., in the heart of the worldly mind of the disciples who despaired of him, as it says in Luke (24:21): "We had hope that he was the one to redeem Israel." For three days and three nights. But a question arises here. For this passage seems to be false, because he died at 3 o'clock, was buried in the evening, but rose on the morning of the third day. Augustine says that some want to say that one must start from the hour when he was put on the cross. Hence they call the darkness which appeared the first day, the second day was the night of the evening star, the third was the day of Sabbath. But according to Augustine, this is invalid; although it would help, if he had been in the tomb for the entire Sunday. Therefore we must have recourse to another solution, namely, that a natural day composed of day and night is taken as an interval of twenty-four hours. But, as Augustine says, in Scripture a part is sometimes taken for the whole. Therefore we must say that it is by synecdoche that Christ is said to have been in the tomb for three days and three nights, because Friday is taken for the whole day and even the previous night; there is no doubt about the second day, but the third is taken for the night and the following day. Yet if we regard what actually happened, it was a case of two nights and one day, to denote that his single destroyed our double. Punishment and guilt were in us, but only punishment in him; therefore...

Another question arises. Had he not worked many miracles? Had he not raised Lazarus and a number of others? Why then does he say, no sign shall be given to it except the sign of Jonah the prophet? I answer that the kind of sign they demand will not be given; or no sign that will benefit them will be given, for he knew that they would not be converted, because they were hardened. But he performed many signs for the sake of the elect and believers, of whom there were many afterwards.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
