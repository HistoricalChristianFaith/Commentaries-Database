[[commentary]]
quote='''
He also sets out the eternity of its governor: your sun, which is God, shall go down no more: but you are always the selfsame, and your years shall not fail (Ps 101:28[102:27]).

And the days of your mourning shall be ended. This as to the state of their subjects.

And first, he sets out the ending of their sadness: and the days of your mourning, their captivity. Mystically, in future beatitude: God shall wipe away all tears from the eyes of the saints (Rev 21:4), above: the Lord God shall wipe away tears (Isa 25:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
