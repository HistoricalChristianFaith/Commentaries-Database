[[commentary]]
quote='''
Now our Lord explains the similitude. If the above similitude is examined correctly, it contains two principal clauses, followed by others. The first is: "He who does not enter the sheepfold by the door…is a thief and a robber." The second is: "He who enters by the door is the shepherd of the sheep." Accordingly, this section is divided into two parts. First, he explains the first clause; then the second clause (v 11). Concerning the first he does two things: first, he explains the first clause; secondly, he proves it (v 7). The first clause mentions a door, a thief and a robber; so first he explains the door, then the thief and then the robber (v 8).

Concerning the first he says, So Jesus again said to them, to gain their attention and have them understand the similitude: "The man of understanding may acquire skill to understand a proverb and a figure" (Prv 1:6). Jesus said, Truly, truly, I say to you, I am the door. Now the purpose of a door is to conduct one into the inner rooms of a house; and this is fitting to Christ, for one must enter into the secrets of God through him: "This is the gate of the Lord," that is, Christ, "the righteous shall enter through it" (Ps 118:20). He says, I am the door of the sheep, because through Christ not only the shepherds are brought into the present Church or enter into everlasting happiness, but the sheep also. Thus he says below: "My sheep hear my voice…and they follow me; and I give them eternal life" (10:27).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
