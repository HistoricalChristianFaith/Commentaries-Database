[[commentary]]
quote='''
Then when he says, for therefore also you pay tribute, he urges men to show the sign of their subjection to authority: first, he mentions the sign of subjection; second, he urges them to render the sign of subjection, at render therefore.

In regard to the first he does two things: first, he mentions the signs of subjection, saying: for therefore also you pay tribute, i.e., because you are subject, you should pay taxes as a sign of that subjection. Therefore, in a complaining way it says: the princess of the provinces was made tributary (Lam 1:1). They are in fact called contributions, for the very reason that the subjects contribute them to their lords.

Second, he assigns the reason, saying: for they are the ministers of God, serving, on behalf of God and the people, unto this purpose, i.e., to receiving tribute.

As if to say: everyone should make a living from his ministry, for it says in 1 Corinthians: who tends a flock without getting some of the milk? (1 Cor 4:7). And therefore, since our rulers minister to God in governing, they should receive taxes from the people as wages for their ministry and should not look upon it as a reward. For the special reward of a ruler is praise and honor, as the Philosopher says in book five of the Ethics. When this does not satisfy him, he becomes a tyrant. But this should not be understood as referring only to human praise or honor, because such a reward would be futile, but to divine praise and honor, which is bestowed on those who rule well: O monarchs over the people, honor wisdom, that you may reign forever (Wis 6:21).

Furthermore, they receive these taxes as sustenance, and rulers labor for the peace of all. Hence it is said: I urge that supplications be made for kings and all who are in high positions, that we may lead a quiet and peaceful life (1 Tim 2:1); pray for the life of Nebuchadnezzar, king of Babylon, that we may live under his shadow (Bar 1:11).

Clerics are free of this debt because of a privilege granted by rulers, which is in fact equitable by nature. Even among the gentiles those who were devoted to divine things were free from taxation. For we read in Genesis that Joseph subjected to Pharaoh the entire land of Egypt except the land of the priests, which had been given them by the king, and to whom also a certain allowance of food was given out of the public stores (Gen 47:20–22). And further down it says in the whole land of Egypt, the fifth part of the harvests was paid except for in the land of the priests, which was free from this condition.

But this is also equitable, because just as kings have care of the public good in temporal affairs, so God's ministers in spiritual matters. And so by ministering to God in spiritual matters, they are making a return to the king for his labor in procuring a peaceful life for them.

But it should be noted that although he says that taxes are owed to rulers as a wage for their labors, rulers can sin in two ways by accepting taxes. First, if they do not procure the people's welfare but are intent only on seizing their goods. Hence it says in Ezekiel: you eat the fat, you clothe yourselves with the wool, you slaughter the fatlings, but you do not feed the sheep (Ezek 34:3). Second, if they violently take more than the law permits and more than the people can bear. Hence it says in Micah: hear, you heads of Jacob and rulers of the house of Israel! Is it not you who tear the skin from my people, and their flesh from their bones? (Mic 3:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
