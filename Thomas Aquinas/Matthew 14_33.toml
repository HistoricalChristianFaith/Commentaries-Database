[[commentary]]
quote='''
There follows the effect of the deliverance: and they that were in the boat came and adored him, namely the disciples, or the sailors. Above, 8:27: what manner of man is this, for the winds and the sea obey him? Indeed you are the Son of God. By this it is signified that when the Lord is with the faithful, then they truly believe; 1 John 2:28: little children, abide in him, that when he shall appear, we may have confidence, and not be confounded by him at his coming.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
