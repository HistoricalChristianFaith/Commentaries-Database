[[commentary]]
quote='''
Then he says who the sower is, saying and the enemy who sowed them is the devil, who introduced sin; Wis 2:24: by the envy of the devil, death came into the world. Then the distinction is treated, and he does three things: first, the time is set forth; secondly, the ministers; thirdly, the distinction. He sets forth the time: and the harvest is the consummation of the world. As was said, the first gathering was made by the apostles, of which John 4:35 says: lift up your eyes, and see the countries, for they are white already to harvest. But the other, in which there will be the gathering of the fruit, of which Gal 6:8 says: what things a man shall sow, those also shall he reap. And the reapers are the angels. For just as in the present Church the good ministers are men, so then they will be angels.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
