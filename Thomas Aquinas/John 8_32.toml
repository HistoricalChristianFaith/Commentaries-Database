[[commentary]]
quote='''
But it is a greater thing to know the truth, since this is the end of a disciple. And our Lord also gives this to those who believe; thus he says, you will know the truth, the truth, that is of the doctrine that I am teaching: "I was born for this, and I came for this, to give testimony to the truth" (18:37); and they will know the truth of the grace that I produce: "Grace and truth came through Jesus Christ" (1:17) - in contrast to the figures of the Old Law - and they will know the truth of the eternity in which I remain: "O Lord, your word remains forever, your truth endures from generation to generation" (Ps 118:89).

Yet the greatest thing is the acquisition of freedom, which the knowledge of the truth produces in those who believe. Thus he says, and the truth will make you free. In this context, to free does not mean a release from some confinement, as the Latin language suggests, but rather a being made free; and this is from three things. The truth of this doctrine will free us from the error of falsity: "My mouth will speak the truth; my lips will hate wickedness" (Prv 8:7). The truth of grace will free us from the slavery to sin: "The law of the Spirit of life in Christ Jesus has freed me from the law of sin and of death" (Rom 8:2). And the truth of eternity, in Christ Jesus, will free us from corruption: "The creature will be freed from its slavery to corruption" (Rom 8:21).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
