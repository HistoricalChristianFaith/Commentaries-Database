[[commentary]]
quote='''
Second, as to the abatement of work: therefore shall all hands be faint: the king of Babylon has heard the report of them, and his hands are grown feeble (Jer 50:43).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
