[[commentary]]
quote='''
You will know them by their fruits, i.e., actions. But it seems to be the opposite, because they have sheep's clothing, and clothing is works. Therefore, they will be known from them. Chrysostom: "Fruit is the confession of faith." Hence, if they confess the faith, they are not heretics: "For the fruit of the light is in all goodness and justice and truth" (Eph 5:9). But if it is taken for pretenders, then it is explained so that by clothing is meant external works: "But the fruit of the spirit is charity, joy and peace" (Gal 5:22). But you will ask: How can they be recognized? The answer is that scarcely any hypocrite can be so clever, that no evil in word or act will appear: "As in water face answers face, so the hearts of men are reflected to the prudent" (Pr 27:19). Seneca: "No one can long bear a fake personality." Indeed, they are especially revealed in two ways: in things that suddenly occur to be done, because in matters done after deliberation one is cautious. Also in troubles: "There is a friend who is such at his own convenience, but will not stand by you on the day of trouble" (Sir 6:8). They are also revealed when they cannot do what they want or when they have already obtained it. Hence dominion shows the man.

Are grapes gathered from thorns? By grapes, from which wine is made, is understood spiritual joy, because "wine gladdens the heart of man" (Ps 104:15); by figs, the sweetness of ecclesial peace, which is charity. This cannot be produced from thistles, i.e., sinners, because "thorns and thistles it shall bring forth to you" (Gen 3:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
