[[commentary]]
quote='''
second, he sets out the manner of judgment: the nobles thereof, in whom they boasted: I will take away out of the midst of you your proud boasters (Zeph 3:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
