[[commentary]]
quote='''
Second, he sets out the fairness of the desolation, and first, the judgment of fairness: and a line shall be stretched upon it, the measure of the punishment against the measure of their fault, a plummet, the rule of the stone-cutter, above: in measure against measure (Isa 27:8); second, he sets out the manner of judgment: the nobles thereof, in whom they boasted: I will take away out of the midst of you your proud boasters (Zeph 3:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
