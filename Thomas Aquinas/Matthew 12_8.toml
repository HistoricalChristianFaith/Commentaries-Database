[[commentary]]
quote='''
There is another argument which makes them innocent, namely, obedience; hence they can do these things, because he ordered them, for the Son of man is Lord of the Sabbath, and the lawgiver is not subject to the law: "He is our lawgiver" (Is 33:22); therefore, he has the power, because he has the authority.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
