[[commentary]]
quote='''
And when he got into the boat... We have mentioned the Lord's command to pass over to the other side. Here the execution of the command is mentioned. For his miracles on land had been seen; now he wishes to manifest himself on water, in order to show that he is Lord of earth and sea. By this boat is understood the Church, or the Cross of Christ; hence Wisdom (14:5) can be applied to it: "Men trust their lives even to the smallest piece of wood." The Lord's disciples follow him in the Church by submitting to the commandments. They also follow him ascending the Cross: "Through him the world has been crucified to me, and I to the world" (Gal 6:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
