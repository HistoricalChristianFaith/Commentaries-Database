[[commentary]]
quote='''
Now he shows how the above-mentioned marks are related, for the third follows from the first two. Since the evil shepherd seeks his own advantage and has no love or solicitude for the flock, it follows that he is not willing to endure any inconvenience for them. Thus he says of the hireling, he flees, for this reason, because he is a hireling, that is, he seeks his own advantage, which is the first mark; and cares nothing for the sheep, i.e., he does not love them, and is not solicitous for them, which is the second mark. So we read in Job (39:16) about the evil shepherd: "She deals cruelly with her young, as if they were not hers." The opposite is true of the good shepherd, for he seeks the welfare of his flock, and not his own: "Not that I seek the gift; but I seek the fruit which increases to your credit" (Phil 4:17). Furthermore, he is concerned for his sheep, that is, he loves them and is solicitous for them: "I hold you in my heart" (Phil 1:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
