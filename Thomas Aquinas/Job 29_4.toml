[[commentary]]
quote='''
To answer the objection that this is due to him from the merit of past justice, he adds, "as I was in the days of my youth," when I as yet could not have merited such great prosperity.

Then he explains the goods of his past state one by one, and begins from the most excellent one, the divine intimacy which he knew in his prayer and contemplation. So he says, "When God lived in my tent in private," that is, I felt the presence of God as long as I was praying and meditating in private in my tent, which is characteristic of contemplation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
