[[commentary]]
quote='''
Thereupon what Satan answered under interrogation is shown when the text says, "From prowling and going about the earth." This has the same meaning as before. [1:7]
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
