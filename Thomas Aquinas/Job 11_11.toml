[[commentary]]
quote='''
After Sophar has shown that there is something hidden in divine wisdom which is incomprehensible to men, he proceeds to clarify something which he had only supposed before, namely that God exacts punishment for sin from man and he concludes as a certainty that God knows the deeds of man. So he says: I am right in saying that smaller penalties are being exacted from you by God than your evil merits, "For he knows the vanity of man," i.e. the vain deeds of men. Things are commonly called vain when they are unstable because they have not been fixed in due ends. The vanity of man then comes from the fact that his heart is not fixed in the truth by which alone it can be securely founded. From the fact that he withdraws from the truth he does evil when he desires what is the apparent good in place of what is good. So he then says, "When he (God) sees something wicked," produced by the vanity of men, "should he (God) not consider it," as worthy of punishment? For a judge who sees a sin seems to pass over it without considering it when he keeps it secret and chooses not to punish it. This shall not be said about God. When he sees the vanity of men, he exacts punishment for their evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
