[[commentary]]
quote='''
There follows the repulsion: but he answering said: amen I say to you, I know you not; i.e., I do not approve of you. For the Lord knows who are his, 2 Timothy 2:19, just as an artisan does not know a work that is discordant with his art.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
