[[commentary]]
quote='''
Above, in the preceding Psalm, he gave thanks for benefits bestowed upon the whole human race; but in this Psalm he specifically gives thanks for the benefit bestowed upon himself in the destruction of his enemies. And this is clear from the title according to Jerome, which is as follows: "To the victor, for the death of the son, a canticle of David," etc. And it touches upon the history of 2 Sam. 18 and 19, that when Absalom died, he recovered the kingdom; and for this benefit he composed this Psalm. But in our text the title is more obscure: "Unto the end, for the hidden things of the son, a Psalm of David." The hidden things of the son are the death of the son, namely because through death he is hidden from the eyes of all. According to the mystery, it refers to Christ, who is called the Son par excellence, who is the natural Son of God the Father. Jn. 8: "If the Son shall make you free, you shall be free indeed." Likewise, the Son of David principally promised. Lk. 18: "Have mercy on me, Son of David." "For the hidden things of the son," that is, of Christ, which are hidden. There is a twofold coming of the Son of God. The first was hidden, as regards his divinity and his glory, which lay concealed in the weakness of the flesh. Is. 45: "Truly you are a hidden God." The second will be manifest. Lk. 21: "They shall see the Son of Man coming in a cloud with great power and majesty." Likewise, there is a twofold judgment of Christ. One is hidden; and this is in the governance of the world, according to which he permits the good to suffer persecution from the wicked. Ps. 35: "Your judgments are a great deep." The other is manifest at the end. 1 Cor. 4: "Until the Lord comes, who will both bring to light the hidden things of darkness and will make manifest the counsels of hearts." For here it treats of the hidden judgment, according to which the good suffer affliction from the wicked. Job 30: "I expected good things, and behold evils came; I looked for light," etc. And it all comes to the same thing: because he gives thanks for deliverance from enemies. Now this Psalm is divided into two parts. First, he sets forth the thanksgiving; second, the matter of the thanksgiving, at "when they are turned back." He gives thanks in three ways: by heart, by mouth, and by deed. By mouth in two ways: by praising and by proclaiming. By praising, for he says, "I will confess." Now there is a threefold confession: namely, of faith: Rom. 10: "Confession is made unto salvation." Ps. 31: "I said, I will confess," etc. Of sins. Jas. 5: "Confess your sins to one another." Of praise (Tob. 12): "Before all the living, confess to him," etc. And it is about this confession that the text speaks here. "O Lord, I will confess to you," that is, I will give thanks, that is, I will praise you. Ps. 68: "I will praise the name of my God," etc. This is in the heart, because 1 Sam. 16: "Man sees those things which appear, but God looks upon the heart." Against which, Is. 29 and Mk. 7: "This people honors me with their lips, but their heart is far from me." But he says, "with my whole heart," because God is greater than our heart, 1 Jn. 3. And therefore, however much we praise him according to our ability, it is less than he deserves. Deut. 6: "You shall love the Lord your God with your whole heart." Therefore he who does not give his whole heart to God, but wishes to have something else along with him, loses him. Is. 28: "The bed is too narrow, so that one must fall out; and the covering too short, and cannot cover both." Therefore he praises him with his whole heart who accepts nothing against God, but refers everything to him, actually or habitually. Tob. 12: "To reveal and confess the works of God, that is, by announcing them, is honorable." "I will declare," by preaching and announcing to others, because God gives benefits to be shared with others; and this is rightly done by proclaiming them to others. Lk. 8: "Go and declare how great things God has done for you"; and therefore he says, "I will declare all your wonders." But there is a reason that he says "wonders," because the works of God are wonderful. Ps. 76: "You are the God who does wonders." But what does it mean that he says "all"? This seems impossible. Job 5: "Who does great and unsearchable wonders without number." How then does he say "all"? It must be said that "all" means according to kind, or that all the things he narrates are all wonderful; or "all" because the intention of the narrator should not stop at anything, but should proceed as far as it can. Hilary in his book On the Trinity says: "He who piously pursues the infinite, even though he will never arrive, will make progress by advancing." Sir. 43: "Glorifying God as much as you can, he will yet far exceed, and his magnificence is wonderful"; and 42: "Has not God made his saints declare all his wonders?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
