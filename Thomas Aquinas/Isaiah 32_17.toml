[[commentary]]
quote='''
And as to the tranquility of peace: and the work, that is, the effect, of justice shall be peace, and the service of justice quietness, for it will be without the tumult of contentions and wars, above: Lord, you will give us peace (Isa 26:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'

[[commentary]]
quote='''
Note on the words, the work of justice shall be peace, that the peace of the saints in heaven will be beautiful, first, because it will not be false (Wis 15); second, because it will not be interrupted, above: and there shall be no end of peace (Isa 9:7); third, because it will be full: he has placed peace in your borders (Ps 147:14).

Note also on the peace to come that three things make it desirable: first, the strength of divine power: they that trust in the Lord shall be as mount Zion: he shall not be moved for ever that dwells in Jerusalem (Ps 124[125]:1–2); second, the purity of one's own conscience: you shall walk confidently in your way, and your foot shall not stumble (Prov 3:23); third, the removal of hostile wickedness: have confidence. I have overcome the world (John 16:33).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
