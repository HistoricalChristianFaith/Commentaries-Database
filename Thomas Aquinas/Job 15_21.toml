[[commentary]]
quote='''
From this lack of certainty, suspicion and fear arise. He describes this suspicion and fear as a consequence saying, "The sound of terror is always in the ear of that man," since he is threatened by every rumor thinking some attack is being prepared against him. It is as though he confides in no one. To express this theme, he adds, "when there is peace, that man suspects plots," for although no one is plotting against him, he still is terrified of everyone because of his own evil will by which he will be prepared to harm anyone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
