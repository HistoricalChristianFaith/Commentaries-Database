[[commentary]]
quote='''
Domesticated asses also seem to perish if they remain without shelters built by men, but the wild asses have a shelter prepared for them by divine providence, and so he says, "I have given them in uninhabited places," to which man does not go, "a home," a cave or cavern, "and tents," for example, under grass and trees, "in the land of salt waste," in some land not inhabited because of dryness and the burning of the sun. Here the dampness is turned as it were into the taste of salt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
