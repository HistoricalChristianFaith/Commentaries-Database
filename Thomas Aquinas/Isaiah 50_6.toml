[[commentary]]
quote='''
He also sets out the constancy of his obedience, that he did not abandon his obedience for any danger: I have given my body, that is, I exposed myself that I should suffer such things; or perhaps he literally suffered these things, but in Christ this was completely fulfilled (Matthew 26 and 27): I have given my dear soul into the hand of enemies (Jer 12:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
