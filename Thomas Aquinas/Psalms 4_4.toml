[[commentary]]
quote='''
Then when he says, "Be angry," he exhorts them to the amendment of life: and concerning this he does three things. First he exhorts them to withdraw from evil; second, to tend toward the good, at "Offer the sacrifice"; third, he raises a question, at "Many say," etc. Concerning the first, it should be considered that sin in us most frequently arises from three sources: namely, from the corruption of the irascible, the rational, and the concupiscible powers. First, therefore, he prohibits the sin that arises from the first; hence he says, "Be angry," etc. This is understood in three ways. First, of disordered anger; as if to say: it is permitted that the movement of anger arises in us; nevertheless you should not lead your anger to the act of sin. Eph. 4: "Let not the sun go down upon your anger." Second, thus: "Be angry," that is, against your own sins. Is. 63: "My indignation itself helped me," etc. "And do not sin," namely again; as if to say: be angry against past sins so that you do not commit others. Third, of anger through zeal, it is expounded thus: be angry against the vices of others; and yet do not sin by correcting them in a disordered way, because anger should be directed by reason. Second, he prohibits the vice of the rational power, namely dissimulation, saying: "What you say in your hearts," supply, "let it be in you"; as if to say: do not be one thing in heart and pretend another outwardly. Third, he prohibits what arises from the concupiscible power. "Be compunctious," namely for the sins you have committed; "in your chambers." Rom. 13: "Not in chambers and impurities," etc. Or it should be said that he touches upon a twofold sin: namely of anger, as has been said, "be angry" concerning anger through zeal. Second, of concupiscence: "be compunctious for what you say in your hearts," that is, for your evil thoughts, "in your chambers," that is, concerning hidden things, or in secret. And this better fits the reading of Jerome, who says, "Speak and be silent," that is, do not publicize by carrying it out in a disordered way. Or concerning anger as a vice, which he forbids to proceed to action, which is worse. Or concerning anger against sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
