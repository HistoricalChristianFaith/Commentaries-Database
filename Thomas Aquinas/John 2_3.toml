[[commentary]]
quote='''
At this physical marriage some role in the miracle belongs to the mother of Christ, some to Christ, and some to the disciples. When he says, When the wine ran out, he indicates the part of each. The role of Christ's mother was to superintend the miracle; the role of Christ to perform it; and the disciples were to bear witness to it. As to the first, Christ's mother assumed the role of a mediatrix. Hence she does two things. First, she intercedes with her Son. In the second place, she instructs the servants. As to the first, two things are mentioned. First, his mother's intercession; secondly, the answer of her Son.

In Mary's intercession, note first her kindness and mercy. For it is a quality of mercy to regard another's distress as one's own, because to be merciful is to have a heart distressed at the distress of another: "Who is weak, and I am not weak?" (2 Cor 11:29). And so because the Blessed Virgin was full of mercy, she desired to relieve the distress of others. So he says, When the wine ran out, the mother of Jesus said to him.

Note, secondly, her reverence for Christ: for because of the reverence we have for God it is sufficient for us merely to express our needs: "Lord, all my desires are known by you" (Ps 37:10). But it is not our business to wonder about the way in which God will help us, for as it is said: "We do not know what we should pray for as we ought" (Rom 8:26). And so his mother merely told him of their need, saying, They have no more wine.

Thirdly, note the Virgin's concern and care. For she did not wait until they were in extreme need, but When the wine ran out, that is, immediately. This is similar to what is said of God: "A helper in times of trouble" (Ps 9:10).

Chrysostom asks: Why did Mary never encourage Christ to perform any miracles before this time? For she had been told of his power by the angel, whose work had been confirmed by the many things she had seen happening in his regard, all of which she remembered, thinking them over in her heart (Lk 2:51). The reason is that before this time he lived like any other person. So, because the time was not appropriate, she put off asking him. But now, after John's witness to him and after the conversion of his disciples, she trustingly prompted Christ to perform miracles. In this she was true to the symbol of the synagogue, which is the mother of Christ: for it was customary for the Jews to require miracles: "The Jews require signs" (1 Cor 1:22).

She says to him, They have no more wine. Here we should note that before the incarnation of Christ three wines were running out: the wine of justice, of wisdom, and of charity or grace. Wine stings, and in this respect it is a symbol of justice. The Samaritan poured wine and oil into the wounds of the injured man, that is, he mingled the severity of justice with the sweetness of mercy. "You have made us drink the wine of sorrow" (Ps 59:5). But wine also delights the heart, "Wine cheers the heart of man" (Ps 103:15). And in this respect wine is a symbol of wisdom, the meditation of which is enjoyable in the highest degree: "Her companionship has no bitterness" (Wis 8:16). Further, wine intoxicates: "Drink, friends, and be intoxicated, my dearly beloved" (Sg 5:1). And in this respect wine is a symbol of charity: "I have drunk my wine with my milk" (Sg 5:1). It is also a symbol of charity because of charity's fervor: "Wine makes the virgins flourish" (Zec 9:17).

The wine of justice was indeed running out in the old law, in which justice was imperfect. But Christ brought it to perfection: "Unless your justice is greater than that of the scribes and of the Pharisees, you will not enter into the kingdom of heaven" (Mt 5:20). The wine of wisdom was also running out, for it was hidden and symbolic, because as it says in 1 Corinthians (10:11): "All these things happened to them in symbol." But Christ plainly brought wisdom to light: "He was teaching them as one having authority" (Mt 7:29). The wine of charity was also running out, because they had received a spirit of serving only in fear. But Christ converted the water of fear into the wine of charity when he gave "the spirit of adoption as sons, by which we cry: 'Abba, Father'" (Rom 8:15), and when "the charity of God was poured out into our hearts," as Romans (5:5) says.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
