[[commentary]]
quote='''
Next he treats of men saying, "The sons of peddlers have not trodden it," (the merchants who are used to go to places that are hard to reach for profit). Then he treats of the four-footed animals saying, "nor will the lioness," who lives in wild places, "cross it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
