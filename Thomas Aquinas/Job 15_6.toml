[[commentary]]
quote='''
So Eliphaz wishes to condemn Job for arguing and he first says that Job had spoken such manifest evil that no other reproof is necessary. His very words themselves show his evil intent. He expresses this saying, "Your mouth will condemn you and not I, and your lips will answer for you," as if to say: Your words need no other answer but they destroy themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
