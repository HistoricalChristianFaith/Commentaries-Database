[[commentary]]
quote='''
Third, he promises them every kind of liberation from tribulation. First, he promises the benefit of liberation: fear not; from the east, for they had been dispersed in every direction, above: he shall assemble the fugitives of Israel (Isa 11:12); behold I will bring them from the north country (Jer 31:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
