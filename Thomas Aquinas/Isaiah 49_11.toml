[[commentary]]
quote='''
903. Third, he promises liberation itself, setting out the preparation of the ways: and I will make all my mountains a way, that is, princes will help you to return, above: every valley shall be exalted, and every mountain and hill shall be made low (Isa 40:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
