[[commentary]]
quote='''
Next he discusses the rains without the wind when he says, "Who is the father?" that is, the efficient cause "of the rain" not from necessity, but from the order of providence which befits a father. For God moves the sun and the other heavenly bodies which are the proximate efficient causes of the generation of the rains. The dew is generated from the same cause as the rain, and only differs from rain in the greatness and smallness of matter, and so he then says, "or who generated the drops of the dew?" He clearly calls them drops to show their small quantity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
