[[commentary]]
quote='''
674. Therefore thus says the Holy One of Israel. Here he threatens destruction to them, resuming the subject of their guilt that the punishment may appear more just: because you have rejected this word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
