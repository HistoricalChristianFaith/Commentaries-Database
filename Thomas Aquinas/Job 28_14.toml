[[commentary]]
quote='''
Such valuable kinds of corporeal things are partly found in some dark places, but this is not true with wisdom, and so he says, "The deep says: It is not in me," that is, what lies in the hidden places of the depths is especially hidden from human wisdom. They are partly found in the sea, both because they are generated there, like pearls in sea shells, or because they are lost there in sunken ships, but this is not true with wisdom. This is also so because valuable things are usually transported by sea from place to place, and so he says, "And the sea says, 'it is not with me.'" On the contrary, things in the sea are often completely hidden from human wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
