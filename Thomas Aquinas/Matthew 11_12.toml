[[commentary]]
quote='''
From the days of John the Baptist until now... Here he is commended on the basis of the distinction between the Old Testament and the New Testament, so that John's excellence is marked by the fact that he is the beginning of the New Testament and the end of the Old Testament. Thus he said: "He that is least in the kingdom of heaven is greater than he," which refers to the fact that he is the beginning of the New Testament; but from the days of John the Baptist, i.e., of his preaching, the kingdom of heaven suffers violence.

This is explained in three ways.

First, it is known that in cases of ravishment there is violence and a struggle. Hence it is required that a sinner, if he is able to reach the kingdom of heaven, must climb to spiritual things and struggle a great deal.
It is explained in another way. It is known that rapine, properly speaking, means that something is taken by force contrary to the will of the owner. The preaching of salvation was made to the Jews and then to everyone through Christ: "I have not been sent except to the lost sheep of the house of Israel" (Mt 15:24). And although he was sent to them, they did not receive him; yet those to whom he was not sent seized it. Hence he says above: "Many shall come from the east and from the west, and shall recline with Abraham, Isaac and Jacob in the kingdom of heaven; but the children of the kingdom will be cast into the outer darkness" (Mt 8:12). And below (21:43): "The kingdom of heaven will be taken from you and given to a people producing the fruits of it." Therefore, they have taken it by violence. And this is Hilary's explanation.
The third explanation is this: What is taken by violence is snatched quickly; hence Job: "As a torrent which rushes quickly into the valleys": and this is on account of the speed of its movement. And because preaching had so moved men's hearts, the motion seemed swift; therefore, he says, it suffers violence, because they tend toward the kingdom after the manner of someone in a hurry. Hence the Gospel began with him and he is its end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
