[[commentary]]
quote='''
Then when he says, "as it is written," he shows the importance of this question, inasmuch as he says that all these things lie at hand to be suffered by the saints for the love of Christ. And he quotes the words of the Psalmist as though spoken by the martyrs. These words mention, first of all, the cause of the suffering: for it is not the suffering but the cause that makes the martyr, as Augustine says. Hence he says, "for your sake": "he who loses his life for my sake shall find it" (Matt 10:39); "let none of you suffer as a murderer, or a thief; yet if one suffers as a Christian, let him not be ashamed" (1 Pet 4:15). One suffers for Christ by suffering not only for the faith of Christ but for any just deed done for the love of Christ: "blessed are those who are persecuted for justice's sake" (Matt 5:10).

Second, he mentions the severity of the suffering when he says: "we are put to death," i.e., handed over to death: "for we are sold, I and my people, to be destroyed" (Esth 7:4).

Third, the duration of the persecution when he says, "all the day long," i.e., during the whole period of life; "while we live we are always being given up to death for Jesus' sake" (2 Cor 4:11).

Fourth, the persecutor's readiness to kill, when he says, "we are regarded as sheep to be slaughtered," i.e., marked to be killed in the meat market. So, too, the saints are intentionally killed: "the hour is coming when whoever kills you will think he is offering service to God" (John 16:2); "feed the flock doomed to slaughter" (Zech 11:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
