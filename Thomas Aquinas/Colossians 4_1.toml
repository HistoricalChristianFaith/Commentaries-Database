[[commentary]]
quote='''
Next, Paul shows how masters should treat their slaves. He does two things: first, he gives his instructions, secondly, the reason for them. There are two ways a master can oppress his slaves. First, by acting unjustly against them by violating the laws, for according to the laws a master cannot be cruel to his slaves. And so Paul says that masters should treat their slaves justly. Secondly, by demanding that their slaves accomplish absolutely all their duties, which a Christian gentleness would soften; and so Paul says, fairly: "If I have rejected the cause of my manservant or my maidservant, when they brought a complaint against me; what then shall I do when God rises up?" as we read in Job (31:13). Then when he says, knowing that you also have a Master in heaven, Paul gives the reason why they should act this way, and it is this: just as you act towards your slaves, so the Lord will act towards you: "Knowing that he who is both their Master and yours is in heaven" (Eph 6:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Colossians.html'
source_title='Commentary on Colossians'
