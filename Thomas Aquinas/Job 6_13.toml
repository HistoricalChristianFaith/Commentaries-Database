[[commentary]]
quote='''
Job had shown in the preceding verses that he felt pain and spoke words from his pain in conformity with reason, but yet he was not carried away by his pain in the things which he suffered. But because man, although he suffers some adversities, sometimes guards himself by consolations and help in both himself and in others against these adversities so as to feel little or no pain, blessed Job wants to show that he is destitute of aids of this kind. He does this to put in more evident relief that he spoke rationally when he expressed his pain in speech. So he first shows that he was destitute of the aforementioned remedies from his own part when he says, "Behold, I cannot help myself." For even if he had lost some of his goods, he could have tolerated this without sadness if he could have helped himself to recover these lost goods and so revenge the injury inflicted. But he was not able to do this when he had lost all his riches, children and even the health of his own body. Further, many things we cannot do ourselves, we can do through friends. So Job shows in the second place that he was also bereft of the help of his friends when he says, "Those to whom I looked for help," i.e. family and servants, "deserted me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
