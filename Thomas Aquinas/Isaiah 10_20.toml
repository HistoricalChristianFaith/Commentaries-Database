[[commentary]]
quote='''
Second, the effect on the people: and it shall come to pass, as to three things in which they offended, namely, in their trust in the nations: upon him that strikes them, because even those from whom they sought help sometimes afflicted them, they that shall escape, either to Ezechias or to other nations: they leaned upon you (Ezek 29:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
