[[commentary]]
quote='''
But draw near hither. Here he takes away from the unjust hope of deliverance.

And first, he alleges their sin;

second, he takes away their confidence of deliverance: I will declare your justice (Isa 57:12).

Concerning the first, he does two things:

first, he alleges the perversity of their sin,

second, their obstinacy in sin: you have labored in the multitude of your ways (Isa 57:10).

Concerning the first, he does two things.

First, he accuses them of blasphemy, setting out the custom of sin, inasmuch as they imitate their fathers in this: you sons of the sorceress, who tended to auguries against my commandment, the seed of the adulterer, inasmuch as they abandoned me and adhered to idols: judge your mother, judge her (Hos 2:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
