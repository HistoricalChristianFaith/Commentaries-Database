[[commentary]]
quote='''
673. For it is a people. Here he sets out the contempt of the people,

and first, the contempt by which they despised God: that provokes to wrath, as to sin of transgression: do not you provoke me, as the house of Israel provokes me (Ezek 2:8); and lying children, as to sin of speech, for they promised obedience to Jeremiah, a promise which they would not keep, as it says in Jeremiah 42. The children that are strangers have lied to me (Ps 17:46[18:45]): that will not, as to sin of omission: he that stops his ears from hearing the law, his prayer shall be an abomination (Prov 28:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
