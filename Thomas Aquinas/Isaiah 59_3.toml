[[commentary]]
quote='''
Second, he describes their fault in particular: for your hands. And he touches in particular upon their sins against their neighbor: for he touched upon their sins against God above (Isa 57:3–11), and their sins against themselves, above (Isa 56:11–12).

1038. And he first touches upon the injustice by which they were oppressing others as to action: for your hands are defiled with blood, of the innocent, whom you have killed, and your fingers, as to lesser injustices, or as to the diligence of their action, above: for your hands are full of blood (Isa 1:15); as to speech: your lips have spoken lies, and your tongue utters iniquity, so that the ugliness of injustice is added to the ugliness of lying: and you shall not find iniquity in my tongue (Job 6:30).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
