[[commentary]]
quote='''
"In this I know." Here he sets forth his confidence of being heard. And first he sets forth that God willed him, that is, it was pleasing to the Father's will in him. Hence he says, "that you have willed me." Mt. 3: "This is my beloved Son, in whom I am well pleased." Is. 42: "My soul is pleased in him." Likewise he says, "My enemy shall not rejoice over me," that is, Judas; and even if he rejoiced at his death, he will not finally rejoice, because he will be saddened at the resurrection. Mic. 7: "Do not rejoice over me, O my enemy, because I have fallen; I shall rise again." And this text can be arranged in two ways. In one way, so that the first is the argument for the second, and the sense is: from this, that I consider that I am acceptable to you. In another way, so that the second is the cause of the first, and the sense is: because my enemy will not be able to rejoice over me, I have known that you have willed me. But because he needed some sign, he says, "I have known," that is, I have made known, or because others have known this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
