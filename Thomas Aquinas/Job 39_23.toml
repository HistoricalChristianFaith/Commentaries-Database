[[commentary]]
quote='''
Loud noise alone is usually enough to terrify most animals, but this does not apply to the horse, and so he says, "Above him the quiver will sound," that is, full of arrows when it is shaken at the motion of the soldier sitting on the horse. The pike and the shield likewise produce some sound of war, and so he says, "the pike will vibrate," for a pike makes a noise when it is brandished. A shield also makes a noise when it is moved and struck with arms and so he says, "and the shield," sounds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
