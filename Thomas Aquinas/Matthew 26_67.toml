[[commentary]]
quote='''
Then did they spit in his face etc. After the condemnation of Christ, the mockery is treated. And quite fittingly, because Christ bore our sins, as Isaiah 62. But man through sin was handed over to death, when it was said to him, Genesis 2:17: in what day soever you shall eat of it, you shall die the death. Likewise, he lost his proper honor, because man when he was in honor did not understand; he is compared to senseless beasts, Psalm 49:13. And therefore Christ the Redeemer endured death and reproaches, first by deed; secondly by word, at Prophesy unto us, O Christ. In the first he is spat upon and struck with fists; in the second he is struck in the face. As to the first it says: then did they spit in his face, and buffeted him; according to what is found from the words, this was done as a sign of contempt for God's command, for it is found at Deuteronomy 25:5 ff. that if anyone refused to take his brother's wife, they would spit in his face. Likewise, on account of contempt for a father's command: so with Miriam, the sister of Moses. Hence they spat in his face because they considered him a blasphemer; Isaiah 50:6: I have not turned away my face from them that rebuked me and spat upon me. Likewise, they buffeted him, after the manner of a drunkard or a fool; Isaiah 53:3: we saw him the last of men, i.e., he appeared so despised as if he were the last of all men. And others struck his face with the palms of their hands, in irreverence; Lamentations 3:30: he shall give his cheek to him that striketh him. Mystically, according to Augustine, some still do this: because to spit in the face is nothing other than to despise the presence of the grace of Christ; Hebrews 10:29: how much more, do you think, he deserveth worse punishments, who hath trodden under foot the Son of God, and hath esteemed the blood of the testament unclean, by which he was sanctified, and hath offered an affront to the Spirit of grace? But properly he buffets who places the head under the hand: and such are those who seek their own dignity rather than the honor of Christ. Of such it is said that men loved darkness rather than the light. But those who strike the face are those who in a certain way strive to demolish his presence, as do the Jews. Of these, Isaiah 30:11: let the Holy One of Israel cease from before us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
