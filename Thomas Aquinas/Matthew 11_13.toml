[[commentary]]
quote='''
Hence Christ says: For all the prophets and the Law prophesied until John, because all the prophets were for the sake of Christ and began to be fulfilled from the time of John's preaching. Hence Luke (24:44): "Everything written about me must be fulfilled." And this until John. Does this mean that there were no prophets after John? Do we not read below (23:34): "Behold, I sent you prophets, wise men and scribes"? The answer is that a prophet is sent for two purposes: to strengthen faith and to correct morals: "Where there is no prophecy the people cast off restraint" (Pr 29:18). To strengthen faith, as it says in 1 Peter (1:10): "The prophets who prophesied of the grace that was to be yours searched and inquired about this salvation; they inquired what person or time was indicated by the Spirit of Christ within them." Hence prophecy served those two things: faith has now been established, because Christ's promises have been accomplished. But for the correction of morals, prophecy has never ceased nor will ever cease. Therefore John is outstanding, because he is between the Old and the New Law; hence he was sent before his face, as though at the same time as Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
