[[commentary]]
quote='''
Third, he threatens destruction: and the word shall be to them, that is, they will suffer this punishment for their own words: by your words, I judge you, you wicked servant (Matt 12:37); that they may go, to destruction.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
