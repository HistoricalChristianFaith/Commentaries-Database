[[commentary]]
quote='''
939. Therefore. Here he promises liberation; and concerning this, he sets out two things:

first, their liberation: you that are drunk but not with wine, but with the bitterness of your punishments: he has filled me with bitterness, he has inebriated me with wormwood (Lam 3:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
