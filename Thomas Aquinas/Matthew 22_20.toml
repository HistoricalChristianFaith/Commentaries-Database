[[commentary]]
quote='''
Then he asks about the image: whose image and inscription is this? For in every public coin an inscription is placed on its form; so it was in this one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
