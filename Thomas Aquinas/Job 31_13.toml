[[commentary]]
quote='''
So after he has purged himself of injustice because he did not do injury to others, either in stealing things from them, or in abusing persons joined to them, he excuses himself, as a consequence, of the charge he has incurred injustice because of the defect of justice, and so he says, "If I despised subjecting myself to judgment with my servant and my handmaid when they wanted to settle some complaint against me," as if to say: If I despised rendering justice to those beneath me, let these and other grave consequences happen to me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
