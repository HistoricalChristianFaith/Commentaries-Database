[[commentary]]
quote='''
Here a person is inclined to beseech the Lord. First is acknowledged the eternity of the divine being, or substance. As said: "But thou, O Lord, dost reign forever." Then is expressed the duration of the divine royal glory: "thy throne endures to all generations." Thus, Psalm 102:12 states: "But thou, O Lord, art enthroned forever; thy name endures to all generations."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
