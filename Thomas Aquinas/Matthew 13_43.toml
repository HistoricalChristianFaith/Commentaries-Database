[[commentary]]
quote='''
Then shall the just shine as the sun in the kingdom of their Father. Here he explains as to the good; and in them there will be a twofold splendor, namely, in the soul, by which they will see God; Ps 35:10: in your light we shall see light, namely, uncreated light; Isa 58:11: and he shall fill your soul with brightness. And it will overflow into the body; Phil 3:21: he will reform the body of our lowliness, made like to the body of his glory. Wis 3:7: the just shall shine, and shall run to and fro like sparks among the reeds, etc. What he says, as the sun, is not to be understood absolutely by an equality in every respect: for they will have greater splendor; but because among sensible things, what shines most is the sun. Yet there is a likeness to the sun, because just as the sun does not change, so neither does the just man; Sir 27:12: a holy man continues in wisdom as the sun; but a fool is changed as the moon. Then he rouses them to a spiritual understanding: he that has ears to hear, namely, interior ears, let him hear, understanding; Isa 50:5: the Lord has opened my ear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
