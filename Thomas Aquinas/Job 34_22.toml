[[commentary]]
quote='''
Someone could believe that since God is light and the wicked are in darkness that they are hidden from God, but he excludes this saying, "There is no darkness," of ignorance, "nor shadow of death," which refers to the obscurity of fault leading to death, "where those who do evil can hide" as if to say: Just as they did not want to know God so God does not want to know them. Yet it is said as a reproof that they do not know.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
