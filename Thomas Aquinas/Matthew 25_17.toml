[[commentary]]
quote='''
In like manner he that had received the two, namely, he who profits in understanding and in action, gained other two, i.e., a reward for each. Or two, because he profits by preaching not only to men but also to women, according to Gregory. According to Origen, what he had received according to the measure of natural endowments he referred to the understanding.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
