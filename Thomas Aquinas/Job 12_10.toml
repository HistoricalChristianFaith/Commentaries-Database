[[commentary]]
quote='''
If, however, creatures of this sort were made by God, it is evident that they are in the power of God as artifacts in the power of the artisan, and so he adds, "In whose hand," in whose power "lies the soul of every living thing," not only of other animals, "and even the spirit of all human flesh." If, then, they are in his power, it is clear that no one can have them, except from him, as Daniel says, "The Most High rules in all the kingdoms of men, and he will give to each one what he will." (4:14) So it is evident that no man can possess the earth and the animals spoken of above which are the wealth of man unless God will give them into his hand. So if robbers prosper, God gave it into their hands. By this opinion he refutes those who asserted that wealth is given by God as a reward for justice, since wealth is even given to thieves by God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
