[[commentary]]
quote='''
When the spirit has been taken away which was divinely given to man, the consequence is that the corporeal life fails, and so he says, "All flesh will be destroyed together," for the species of flesh will cease, and will be resolved into its component parts. So he then says, "and man will return to ashes," as Psalm 103 says, "You take back their spirit and they will fail and will return to dust." (v. 29) He calls the dust into which flesh is dissolved ashes, either because among the ancients the bodies of the dead were dissolved to ashes by being burned with fire, or because those things into which the dead body is dissolved are a certain residue which springs from the natural heat in the human body. Since, then, it is so easy for God if he wills to reduce the whole of the human race into ashes, it appears from the conservation itself of man that he does not use unjust violence with them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
