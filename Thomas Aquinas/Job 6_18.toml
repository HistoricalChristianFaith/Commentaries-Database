[[commentary]]
quote='''
He shows the cause of this when he continues, "The paths they follow are tangled up." What is entangled goes back on itself with a kind of twist and turn, and so the footpaths of those men are entangled who seek nothing in their kinsmen and friends except their own advantage. Because of this they simulate friendship in time of prosperity but they pass by in time of adversity. Men who deceitfully seek their own advantage very often fall short in what they hope to gain and so he adds, "They will walk in emptiness." Men are said to walk in emptiness when they do not reach the goal of their walking. Not only will their hope be null, but the opposite will befall them, and so he adds, "and will perish," i.e. will be totally destroyed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
