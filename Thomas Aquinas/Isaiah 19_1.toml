[[commentary]]
quote='''
The burden of Egypt. In this part, he threatens the destruction of the Egyptians, describing the manner and the order. And this is divided into three parts: in the first, the preparation of the punishment is described; in the second, the destruction itself: and I will deliver Egypt (Isa 19:4); in the third, the attainment of advantage, where it says, in that day there shall be five cities (Isa 19:18).

The preparation of the punishment is described as to four things.

First, as to the disposition of the enemy: he will ascend, inspiring, upon a cloud, from which comes a storm, light, because of his agility and promptness: clouds and darkness are round about him (Ps 96[97]:2).

Second, as to the stupor of the gods that govern them: and the idols of Egypt shall be moved, because they were shattered by the Assyrians, or because they could not give an answer, or because they did not appear on that day: your idols shall be broken in pieces (Ezek 6:4); and of the men that govern them, the heart of Egypt, that is, the king and princes, from whom came all the vigor of Egypt, above: the whole head is sick, and the whole heart is sad (Isa 1:5).

Note on the words, the Lord will ascend upon a cloud (Isa 19:1), that the cloud is manifold. First, the cloud of the flesh he assumed: where were you when I made a cloud the garment thereof, and wrapped it in a mist as in swaddling bands? (Job 38:9); second, is the cloud of the virginal womb: behold a little cloud arose out of the sea (1 Kgs 18:44); third, is the cloud of the devout mind: his magnificence, and his power is in the clouds (Ps 67:35[68:34]); fourth, is the cloud of the judicial seat: clouds and darkness are round about him: justice and judgment are the establishment of his throne (Ps 96[97]:2).

Likewise, note that from the first cloud proceeds sacramental rain or the rain of sanctification: from the side of the Lord immediately there came out blood and water (John 19:34); from the second cloud proceeds the bread of consolation: a cloud overshadowed their camps and where water was before, dry land appeared (Wis 19:7); and below this: seeing your miracles and wonders: for they fed on their food like horses (Wis 19:8–9); from the third cloud proceeds the lightning of preaching: corn desires clouds, and the clouds spread their light (Job 37:11); from the fourth cloud proceeds the storm of damnation: behold he shall come up as a cloud (Num 5); his power is in the clouds (Ps 67:35[68:34]).

Likewise, note on the words, a light cloud (Isa 19:1), that the first cloud is called light because of eminence of dignity: lo, one like the Son of man came in the clouds of heaven (Dan 7:13); the second cloud is called light because of purity of virginity: behold a white cloud and upon the cloud one sitting like to the Son of man (Rev 14:14); the third cloud is called light because of swiftness of obedience, below: who are these, that fly as clouds? (Isa 60:8); the fourth cloud is called light because of ease of execution: by his greatness he has fixed the clouds, and the hailstones are broken (Sir 43:16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
