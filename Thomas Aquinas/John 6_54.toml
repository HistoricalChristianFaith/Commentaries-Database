[[commentary]]
quote='''
Next, the usefulness of this food is shown: first, for the spirit or soul; secondly, for the body, and I will raise him up on the last day.

There is great usefulness in eating this sacrament, for it gives eternal life; thus he says, Whoever eats my flesh and drinks my blood has eternal life. For this spiritual food is similar to material food in the fact that without it there can be no spiritual life, just as there cannot be bodily life without bodily food, as was said above. But this food has more than the other, because it produces in the one who receives it an unending life, which material food does not do: for not all who eat material food continue to live. For, as Augustine says, it can happen that many who do take it die because of old age or sickness, or some other reason. But one who takes this food and drink of the body and blood of our Lord has eternal life. For this reason it is compared to the tree of life: "She is the tree of life for those who take her" (Prv 3:18); and so it is called the bread of life: "He fed him with the bread of life and understanding" (Sir 15:3). Accordingly, he says, eternal life, because one who eats this bread has within himself Christ, who is "the true God and eternal life," as John says (1 Jn 5:20).

Now one has eternal life who eats and drinks, as it is said, not only in a sacramental way, but also in a spiritual way. One eats and drinks sacramentally or in a sacramental way, if he receives the sacrament; and one eats and drinks spiritually or in a spiritual way, if he attains to the reality of the sacrament. This reality of the sacrament is twofold: one is contained and signified, and this is the whole Christ, who is contained under the species of bread and wine. The other reality is signified but not contained, and this is the mystical body of Christ, which is in the predestined, the called, and the justified. Thus, in reference to Christ as contained and signified, one eats his flesh and drinks his blood in a spiritual way if he is united to him through faith and love, so that one is transformed into him and becomes his member: for this food is not changed into the one who eats it, but it turns the one who takes it into itself, as we see in Augustine, when he says: "I am the food of the robust. Grow and you will eat me. Yet you will not change me into yourself, but you will be transformed into me." And so this is a food capable of making man divine and inebriating him with divinity. The same is true in reference to the mystical body of Christ, which is only signified [and not contained], if one shares in the unity of the Church. Therefore, one who eats in these ways has eternal life. That this is true of the first way, in reference to Christ, is clear enough. In the same way, in reference to the mystical body of Christ, one will necessarily have eternal life if he perseveres: for the unity of the Church is brought about by the Holy Spirit: "One body, one Spirit... the pledge of our eternal inheritance" (Eph 4:4; 1:14). So this bread is very profitable, because it gives eternal life to the soul; but it is so also because it gives eternal life to the body.

And therefore he adds, and I will raise him up on the last day. For as was said, one who eats and drinks in a spiritual way shares in the Holy Spirit, through whom we are united to Christ by a union of faith and love, and through him we become members of the Church. But the Holy Spirit also merits the resurrection: "He who raised Jesus Christ our Lord from the dead, will raise our mortal bodies because of his Spirit, who dwells in us" (Rom 8:11). And so our Lord says that he will raise up to glory whoever eats and drinks; to glory, and not to condemnation, as this would not be for their benefit. Such an effect is fittingly attributed to this sacrament of the Eucharist because, as Augustine says and as was said above, it is the Word who raises up souls, and it is the Word made flesh who gives life to bodies. Now in this sacrament the Word is present not only in his divinity, but also in the reality of his flesh; and so he is the cause of the resurrection not just of souls, but of bodies as well: "For as death came through a man, so the resurrection of the dead has come through a man" (1 Cor 15:21). It is now clear how profitable it is to take this sacrament.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
