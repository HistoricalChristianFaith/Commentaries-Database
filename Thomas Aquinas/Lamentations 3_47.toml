[[commentary]]
quote='''
Second, there is a description of prophets whom they ought to be protected against their enemies. "Panic and pitfall have come upon us, devastation and destruction." That is, sheer panic, as cause of fear before captivity. And, "pitfall": within such captivity.

Then: "devastation": after the captivity and "destruction": from false prophets. For Isaiah 24:17 says: "Terror, and the pit, and the snare are upon you, O inhabitants of the earth!"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
