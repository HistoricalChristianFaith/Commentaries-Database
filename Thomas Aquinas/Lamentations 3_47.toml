[[commentary]]
quote='''
Benevolence on the enemy's part, excitement against indications of evil inflicted by the enemy, are here viewed. First is noticed the preparation for capturing, second, the captivity itself.

To the idea, preparation for capturing, three more references are made. First is the enemies' preparation: "All our enemies rail against us." That is, as if to devour us. So Psalm 22:13 says: "They open wide their mouths at me, like a ravening and roaring lion."

Second, there is a description of prophets whom they ought to be protected against their enemies: "Panic and pitfall have come upon us, devastation and destruction." That is, sheer panic, as cause of fear before captivity. And, "pitfall": within such captivity. Then: "devastation": after the captivity and "destruction": from false prophets. For Isaiah 24:17 says: "Terror, and the pit, and the snare are upon you, O inhabitants of the earth!"

Third, compassion is considered: "My eyes flow with rivers of tears because of the destruction of the daughter of my people." Namely, as one imploring, due to singular miseries. Thus Psalm 119:136 expresses: "My eyes shed streams of tears, because men do not keep thy law."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title="Commentary on Lamentations"
