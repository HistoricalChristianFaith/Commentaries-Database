[[commentary]]
quote='''
And he places the cause of mercy: for they are fled from before the swords, that they might be moved to mercy: at the voice of the horsemen, and the archers, all the city is fled away (Jer 4:29).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
