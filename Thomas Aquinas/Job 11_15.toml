[[commentary]]
quote='''
"Then you lift up your head," in prayer to God, "free from stain," of fault. In this your condemnation will end, first for the future, and so he says, "and you will be stable," so that you are not shaken by trials later. Also "you will not fear" future dangers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
