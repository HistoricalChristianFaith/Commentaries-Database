[[commentary]]
quote='''
He begins from what he had said last, showing that God cannot be helped or harmed by our good and evil works, and this is so because of his high character. So he says, "If you sin," against yourself or God, "what harm will you do him?" as if to say: He will suffer no detriment from this. As to the sins which are committed against one's neighbor, he then says, "and if your iniquities are multiplied," by which you unjustly wound your neighbors, "what will you do against him?" as if to say: In no way will he be injured by this. As to the goods which are done to one's neighbor, he then says, "Further, if you act justly", giving what is due to your neighbor, "what will you give to him?" as if to say: What will he gain from this. As to the works of divine worship, he says, "Or what will he receive from your hand", in sacrifices and oblations? He implies the answer is, "Nothing", as Psalm 49 says, "I will not accept calves from your house."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
