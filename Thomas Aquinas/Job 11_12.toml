[[commentary]]
quote='''
Just as man turns to evil from vanity, so man does not think he is subject to divine judgment from the same vanity. He therefore continues, "The vain man puffs himself up with pride," so that he does not believe he is subject to a superior. So he continues, "He thinks he is born as free as the foal of a wild ass." The foal of a wild ass is born free from the domestication of man. However, the foal of the asses which are born in human possession are born to serve the needs of man. Thus, men who do not think they are subject to divine judgment think they are like the foal of asses born wild, even though they see that other men are coerced by divine judgment who are in the same condition.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
