[[commentary]]
quote='''
1031. Second, as to the rebuilding of their homeland: and the places that have been desolate for ages, that is, namely, the cities of the desert in former times, shall be built, after their return from captivity; you shall raise up, rebuilding upon the old foundations, above: who say to Jerusalem: you shall be inhabited: and to the cities of Judah: you shall be built (Isa 44:26).

1032. Third, as to the restoration of their reputation: and you shall be called the repairer of the fences, that is, impediments to sin; iniquity or into rest, namely, turning the paths of sin into rest: I will hedge up your way with thorns (Hos 2:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
