[[commentary]]
quote='''
Therefore, out of love for humankind is said: "For he does not willingly afflict or grieve the sons of men." That is, he apportions from his divine love. Since Psalm 36:7 declares: "The children of men take refuge in the shadow of thy wings."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
