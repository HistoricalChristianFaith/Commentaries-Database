[[commentary]]
quote='''
In regard to the second he says, now the grace of our Lord has abounded exceedingly: and where sin abounded, grace did more abound (Rom 5:20); with faith and love. For he produced the effect of faith through the active love which is in Christ Jesus: through Christ Jesus that we may receive the promise of the Spirit by faith (Gal 3:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Timothy.html'
source_title='Commentary on 1 Timothy'
