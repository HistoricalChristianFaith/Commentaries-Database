[[commentary]]
quote='''
From this he only intends to show that his conception was not something great nor ordered to something good, but rather to the evil of adversity which he was feeling. So he says, "Let those curse it who curse the day, those who are capable of rousing up Leviathan." According to the literal sense, this can be understood in two ways. In one way, Leviathan means some great fish, which seems to conform to things said about him at the end of the book, "Can you draw out," he says, "Leviathan with a fishhook?" (40:20) This must mean that those who fish for a fish of this size, do it at night in the darkness. So when day begins to dawn, they curse the day because their work and intention are interrupted by its coming. There is a second interpretation. Leviathan means the ancient serpent who is the devil, in the sense of Isaiah, "On that day the Lord will punish Leviathan the twisting serpent with his hard, great and strong sword." (27:1) Those men then are prepared to haul out Leviathan who are eager to carry out the suggestions of the devil by devoting themselves to the works of iniquity. These curse the day because, as John says, "Everyone who does evil hates the light" (3:20) and Job says later "The eye of the adulterer sees darkness" (24:15) and "if immediately the dawn should appear, he will judge it the shadow of death." (24:17) In this way then, when he speaks as before, "Let it not be worthy of praise," he wants this night to be hateful to the good men. So according to what he adds, "Let those curse it, etc." he also wants it to be hateful to the wicked, for both the good and the wicked shrink from adversity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
