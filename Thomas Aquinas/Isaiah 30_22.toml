[[commentary]]
quote='''
And also as to due worship of God: and you shall defile the plates of your graven things of silver, reducing them to common use: he defiled the high places, and demolished them (2 Kgs 23:8); the garment, every adornment of an idol.

Second, as to temporal goods; hence he says, get you hence, namely, from spiritual goods to temporal goods.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
