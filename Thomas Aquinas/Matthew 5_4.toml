[[commentary]]
quote='''
Blessed are those who mourn. Two beatitudes, through which we are drawn from the evil of covetousness and cruelty, have been presented. Here is presented a third, by which we are drawn from the evil of harmful pleasure, and it is Blessed are those who mourn. In the Old Testament earthly things were promised and earthly happiness: "They shall be radiant over the goodness of the Lord, over the grain, the wine and the oil" (Jer 31:12). But contrariwise the Lord promises happiness in mourning. Yet it should be noted that not just any weeping is mourning, but that by which one weeps over a dead person beloved to him. For the Lord speaks here by hyperbole. As above he said, Blessed are the poor, so here he mentions the bitterest mourning; for as those who mourn the dead receive no consolation, so the Lord wishes our life to be a mourning: "Make mourning as for an only son" (Jer 6:26). This mourning can be expounded in three ways: first, for sins, not only one's own but those of others; because if we mourn the bodily dead, much more the spiritually: "How long will you grieve over Saul?" (1 Sam 16:1); "O that my head were waters, and my eyes a fountain of tears, that I might weep day and night for the slain of the daughter of my people" (Jer 9:1). This beatitude is fittingly placed after the preceding one, for someone could say that it is enough not to do evil. This is true in the beginning before sin; but after sin has been committed, it is not enough, unless he makes satisfaction. Secondly, it can be taken for the mourning about sojourning with present misery: "Woe is me, that my sojourning is prolonged" (Ps 120:5). This is watered above and below: "Caleb gave her the upper springs and the lower springs" (Jos 15:19). Thirdly, according to Augustine, for mourning which men have in regard to the joys of the world, which they abandon by coming to Christ; for some men die to the world and the world dies to them: "By which the world has been crucified to me and I to the world" (Gal 6:14). But as we mourn over the dead, so they mourn; because one cannot escape the fact that in abandoning they feel some pain.

Three consolations correspond to these three kinds of mourning: because for mourning over sins one is granted forgiveness, as David sought in Ps 51 (v. 12): "Restore to me the joy of my salvation." To the postponement of the heavenly fatherland and the continued dwelling with present misery corresponds the consolation of eternal life: "I will turn their mourning into joy, I will comfort them and give them gladness for sorrow" (Jer 31:13); "You shall be comforted in Jerusalem" (Is 66:13). Thirdly, to mourning corresponds the consolation of divine love; for when one weeps over the loss of a treasured object, he is consoled, if he acquires something more valuable.

Hence men are consoled, when in place of temporal they receive spiritual and eternal things, which is to receive the Holy Spirit; hence he is called Paraclete (Jn 15:26). For in virtue of the Holy Spirit, who is divine love, men rejoice: "Your sorrow will be turned into joy" (Jn 16:20).

It should be noted that this beatitude is associated with the gift of knowledge, because those mourn who know others' misery; hence Wisdom (14:22) says of some who do not have such knowledge: "They live in great strife due to ignorance, and they call such great evils peace"; and on the other hand: "He who increases knowledge increases sorrow" (Ec 1:18).

It should also be noted that those rewards are so arranged that the subsequent always adds to the preceding. For, first, he said, Blessed are the poor in spirit, for theirs is the kingdom of heaven; then, because they shall inherit the earth. For it is better to possess than merely to have. Then, after these, they shall be comforted; for it is more to be comforted than to possess, because some possess things but are not delighted with them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
