[[commentary]]
quote='''
After he has expressed his desire to rise again, he next asks if his desire could ever be realized at some future time for desires are sometimes for things which are also impossible. He then says, "Do you think a dead man can live again?" He shows what he himself thinks about this saying, "For all the days during which I have now struggled, I await the time when my transformation will come." We should note here that he had compared the life of man on earth to a soldier's (7:1) and to the days of a hired man in another place (7:6) because both soldiers and hired men await something after their present state. Therefore, just as he expressed that the state of the resurrection is like payday for the hired man, so he now shows the same concept using the metaphor of the soldier. Note that he does not await the desired end in any part of the present life, because he likens all the days of this life to the state of military life saying, "For all the days during which I have now struggled." One should also note that man does not await another life like this one, because then that one would be like a warfare also. But he awaits a life in which he would not struggle like a soldier, but will triumph and reign. So he says, "I await the time when my transformation will come." He means here: For my whole life I struggle like a soldier, changeable and subject to labors and anguish. But I wait to be transformed in the state of the other life which is without labors and anguish. The Apostle Paul expresses the same theme of transformation in 1 Corinthians when he says, "We shall all arise but we shall not all be changed." (15:51)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
