[[commentary]]
quote='''
Next the supper is treated: and when it was evening, he sat down with his twelve disciples. And it says evening, because, as is commanded in Exodus 12:18, the fourteenth day of the moon at evening you shall celebrate the Pasch. Or evening, because it tends toward sunset; Zechariah 14:7: and at the time of evening there shall be light. Or it signifies the true passing of Christ, namely the end: for at evening is the end of the day.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
