[[commentary]]
quote='''
Since God hates evil and good pleases him, he hears the oppressed when they cry out, and does not hear the oppressors. So he says, "They will cry out," i.e. calumniators and tyrants seeking the fulfillment of their desires from God, "and he will not hear." He does this, "because of the pride of wickedness," according to Psalm 101, "He regarded the prayer of humble men." So that one does not believe that God hears all people indiscriminately he says, "For not in vain," without reason, "will God hear," because he hears some and not others for a very just reason. He expresses this reason saying, "and the Almighty will regard the causes of each man" in that he hears the worthy but not the unworthy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
