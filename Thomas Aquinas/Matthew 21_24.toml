[[commentary]]
quote='''
According to Chrysostom, when someone asks in order to learn, then the truth should be answered to him; but when he asks in order to test, then he must be reproved and confuted. So the Lord, because he knew they were testing him, said: "I will also ask you one thing."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
