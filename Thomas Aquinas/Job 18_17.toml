[[commentary]]
quote='''
He then proceeds to the renown which remains about a man after his death, by which some men desire to live in the memories of men and to also have glory after death. Thus as to the removal of the sinner from the memories of men he then says, "Let the memory of that man perish from the earth." As for the end of his celebrated fame he then says, "may his name not be celebrated in the streets," which he says exactly to the point because one's name is only celebrated by a crowd which is usually found in the streets.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
