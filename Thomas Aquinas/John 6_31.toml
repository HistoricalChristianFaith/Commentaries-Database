[[commentary]]
quote='''
But it seems foolish to ask for a miracle for this reason, for Christ had just performed some in their presence which could lead them to believe, as multiplying the bread and walking on the water. What they were asking was that our Lord always provide them with food. This is clear because the only sign they mention is the one given by Moses to their ancestors for forty years, and they ask in this way that Christ always provide food for them. Thus they say: Our fathers ate manna in the desert. They did not say that God provided their ancestors with the manna, so that they would not seem to be making Christ equal to God. Again, they did not say that Moses fed their ancestors, so they would not seem to be preferring Moses to Christ, trying in this way to influence our Lord. We read of this food: "Man ate the bread of angels" (Ps 78:25).

905 According to Augustine, however, our Lord had said that he would give them food that would endure to eternal life. Thus, he seemed to put himself above Moses. The Jews, on the other hand, considered Moses greater than Christ; so they said: "We know that God spoke to Moses, but we do not know where this man is from" (below 9:29). Accordingly, they required Christ to accomplish greater things than Moses; and so they recall what Moses did, saying: Our Fathers ate manna in the desert. As if to say: What you say about yourself is greater than what Moses did, for you are promising a food that does not perish, while the manna that Moses gave became wormy if saved for the next day. Therefore, if we are to believe you, do something greater than Moses did. Although you have fed five thousand men once with five barley loaves, this is not greater than what Moses did, for he fed all the people with manna from heaven for forty years, and in the desert too: "He gave them the bread of heaven" (Ps 78:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
