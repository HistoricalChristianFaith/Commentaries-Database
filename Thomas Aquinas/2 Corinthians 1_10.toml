[[commentary]]
quote='''
But because the Lord does not abandon those who trust in him, the Apostle mentions the comfort he received from the Lord, saying, he delivered us from so deadly a peril. In regard to this he does three things: first, he describes his present comfort against past evils; secondly, the comfort to come; thirdly, the cause of love. He says, therefore: We have been comforted by God, who delivered us in the past from so deadly a peril, and is delivering us in the present, because he does not stop delivering: "When you pass through the waters I will be with you" (Is. 43:2); on him we have set our hope that he will deliver us again, adding in the future: "You who fear the Lord, hope for good things" (Sir. 2:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
