[[commentary]]
quote='''
"My soul is bereft of peace." Here is assumed a rejection: "My soul is bereft": of God's divine mercy. Like Psalm 89:39 declares: "Thou hast renounced the covenant with thy servant; thou hast defiled his crown in the dust."

"I have forgotten what happiness is." Namely, due to the experience of evils. For, Sirach 11:27 claims: "The misery of an hour makes one forget luxury."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
