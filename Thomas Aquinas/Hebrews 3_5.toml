[[commentary]]
quote='''
165. – Then (v. 5) he prefers Christ to Moses in regard to their state. In regard to this he does two things: first, he states his reason; secondly, he explains it (v. 6b).

166. – His reasoning is this: It is obvious that the master is of more value in his own house than a servant in the master's house. But Moses was faithful as a servant in the house of his master, but Christ as the master in His own house, therefore, etc. Here it should be noted how carefully the Apostle notes the words written of Moses, in which things are said of him: for he is called a servant and he is called faithful, not in his own house, but in the house of our Lord. And in regard to those two things he prefers Christ to Moses: first, he shows what is true of Moses; secondly, of Christ (v. 6).

167. – He says, therefore, that Moses was faithful as a servant, i.e., as a faithful dispenser: 'Well done, good and faithful servant: because you have been faithful over a few things, I will place you over many things' (Mt. 25:21). But Christ is a servant in a sense, namely, according to the flesh: 'Taking the form of a servant' (Phil. 2:7). But Moses was God's servant in proposing God's words to the children of Israel. From this it is clear that because he was a faithful servant, the things he said were ordained to another, namely, to Christ: to testify to the things which were to be spoken later: 'If you did believe Moses, you would perhaps believe me also; for he wrote of me' (Jn. 5:46). Therefore, because he was a servant, he was not in his own house but in another's house, and because of the things he said were a testimony of those things which were to be said of Christ, Moses was in respects lower than Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
