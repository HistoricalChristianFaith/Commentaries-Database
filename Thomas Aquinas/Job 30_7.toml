[[commentary]]
quote='''
It even seemed pleasant to them when they could find such places to live, and so he says, "they are happy in places like this," as though even they did not have an abundance of these sorts of places. If at times they happen to find more comfortable places, they reckoned this as voluptuous, and so he then says, "and to live under briars," in the shade of small trees, "they think voluptuous," because such a place was more comfortable to lie in than the one they had before. This seems to answer by opposition what he had said before, "I will die in my little nest." (29:18)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
