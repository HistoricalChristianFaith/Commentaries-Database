[[commentary]]
quote='''
"Because." Above, the Psalmist set forth the evils that the saints suffer, and their constancy; here, however, he gives the reason for what has been said. And this can be connected with the preceding in two ways, according to the two senses stated, at "You have turned aside our steps," that is, the ways by which we seek the things of the flesh. And according to this it is connected thus; as if to say: you have not permitted us to turn aside to the things of the flesh, "because you have humbled us in the place of affliction," that is, of the world. Eccl. 1: "I have seen all things that are done under the sun, and behold, all is vanity." And in this God humbles the saints in two ways: namely, by the humiliation of virtue. Ps. 35: "I humbled my soul in fasting." And by the humiliation of compulsion. Ps. 105: "They humbled them in fetters," etc. As to the second he says, "And the shadow of death has covered us," that is, the sign of approaching death; for the shadow precedes, and afterward we have the sentence of death. Or, "the shadow of death," that is, sinners who are in darkness have subjected us to themselves and to their servitude. Job 28: "The torrent separates from the wandering people the stone of darkness and the shadow of death."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
