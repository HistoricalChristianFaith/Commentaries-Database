[[commentary]]
quote='''
But the union which is according to glory we do not yet have in reality, but in sure hope, inasmuch as we have a firm hope of attaining to this union. And we have a twofold certainty of hope resulting from the hope of this union. One is by a sign, the other by a pledge. The first is by an evident sign, which is of faith. Hence he says, he has put his seal upon us with the sign of Christian faith: "Put a mark on their foreheads" (Ez. 9:4), i.e., the sign of the cross: "Till we have sealed the servants of our God upon their foreheads" (Rev. 7:3). And this is done through the Holy Spirit: "Anyone who does not have the Spirit of Christ does not belong to him" (Rom. 8:9). Therefore the special and certain sign of obtaining eternal life is configuration to Christ: "Set me as a seal upon your heart" (Sg. 8:6). Or he sealed us with the sign of life. The second is by the greatest pledge, i.e., of the Holy Spirit; and so he says and given us his Spirit in our hearts as a guarantee, and we are certain that no one can take him from us.

But note that there are two things to be considered in a pledge, namely, that it produces a hope of obtaining the reality, and that it is as valid as the reality or more so. And these two things are in the Holy Spirit, because if we consider the substance of the Holy Spirit, he is as valid as eternal life, which is God, because he is as valid as the three persons. But if we consider the manner in which he is possessed, then it produces the hope but not the possession of eternal life, because we do not yet have him perfectly in this life. Therefore we are not perfectly happy until we have him perfectly in heaven: "You were sealed with the promised Holy Spirit" (Eph. 1:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
