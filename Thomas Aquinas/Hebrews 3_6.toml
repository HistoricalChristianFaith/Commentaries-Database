[[commentary]]
quote='''
168. – Then (v. 6), But Christ was faithful over God's house as a son, he shows what belongs to Christ, namely, that Christ is not as a servant but as a Son in His Father's house and, consequently, in His own, because He is the natural heir: 'Whom he has appointed heir of all things, by Whom also he made the world' (Heb. 1:2). For the Church is Christ's house: 'A wise woman builds her house' (Pr. 14:1); 'The Lord has said to me: You are my son, this day have I begotten you' (Ps. 2:7); 'My beloved son in whom I am well pleased' (Mt. 3:17). Therefore, He is not a servant but a Son, and in His own house, whereas Moses is a servant in another's house: 'The son abides forever' (Jn. 8:55).

169. – Then when he says, We are his house, he shows what that house is; for that house is the faithful, who are the house of Christ, because they believe in Christ: 'In the house of God which is the Church' (1 Tim. 3:15) and also because Christ dwells in them: 'That Christ may dwell by faith in your hearts' (Eph. 3:17). Therefore, this house is we, the faithful. But in order that we be the house of God four things are required, which are necessary in a house and are not in a tent: first, that our hope and faith be firm and permanent; but a tent, even though it be firm, can be quickly moved and signifies those who believe for a while, but in time of temptation fall away. But they are the house who retain the word of God. Therefore, he says, if we hold fast our confidence. For it has been stated above that confidence is hope with firm expectation and without fear: 'And such confidence we have through Christ towards God' (2 Cor. 3:4). Secondly, that it be properly ordained; therefore, he says, and pride in our hope, i.e., ordained to the glory of God, so that scorning all else, we may take pride in the hope of glory: 'Let him who glories, glory in knowing and having known me' (Jer. 9:14). Thirdly, that it be preserving; hence, he says, unto the end: 'He that perseveres to the end, he shall be saved' (Mt. 10:22). Fourthly, that it be firm and not dislodged by any adversity; hence, he says, hold fast: 'Who have fled for refuge to hold fast the hope set before us, which we have as an anchor of the soul, sure and firm' (Heb. 6:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
