[[commentary]]
quote='''
Then he explains the grandeur of his past glory when he says, "When I went to the gate of the city." This tells us he had judicial authority, because among the ancients, judgments were rendered at the gates. To show that he was not one of the petty judges, he then says, "and in the street they placed a judgment seat for me." By this he is shown to have had a unique dignity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
