[[commentary]]
quote='''
He comes now to the message and, as has been said, he aims at defending the Church against heretics: first, he admonishes Titus to instruct others to resist heretics; second, he teaches how they are to be resisted, at but speak the things (Titus 2:1).

In regard to the first, he does two things: first, he advises Titus to ordain bishops to resist the heretics; second, why this is necessary, at for there are also many (Titus 1:10).

In regard to the first he does three things: first, he entrusts Titus with the task of appointing bishops; second, he describes the marks bishops ought to have, at if anyone is without crime; third, he applies what he said, at for a bishop must be.

Because the Apostle had been commissioned to the Church of the gentiles and was unable to do everything by himself, he says, for this cause I left you in Crete, i.e., the island of Crete, to take my place as bishop of the church in Crete: a brother helped is like a strong city (Prov 18:19).

But instead of saying, that you should set in order the things that are wanting, he should have said, you should supply it.

I answer that a Gloss amplifies this statement: that you should correct everything that is evil and supply whatever is lacking in good: that we may supply what is lacking in your faith (1 Thess 3:10). Or, one might answer that there are sins of omission and sins of transgression, and both need correction. But among the saints and the perfect, as Titus was, transgressions did not abound; hence he does not say, you should correct transgressions, but the things that are wanting, i.e., omissions.

And should ordain elders, i.e., bishops; hence further on he says, a bishop must be without crime. And he uses the names, 'elder' and 'bishop' indiscriminately. A certain heretic took advantage of this and campaigned for the bishopric; but when he failed, he separated from the Church and taught many false doctrines, among which was the teaching that there is no difference between bishops and priests. This is contrary to Dionysius. Therefore, the Apostle uses the same name in both cases to identify the two, although the name 'elder' suggests a senior. Also, because it is the duty of superiors to appoint bishops, even though the canons elect him.

And he says, ordain, not in the villages, but in every city; for just as in a republic kings live only in the cities, so in the spiritual kingdom bishops live in the cities: a royal priesthood (1 Pet 2:9). Furthermore, they should be elders: woe to you, O land, when your king is a child (Eccl 10:16). By elders we should understand those who are so not only in years, but also in morals: gather for me seventy men of the elders of Israel, whom you know to be the elders of the people and officers over them (Num 11:16). Second, they should be ordained according to the form of the Church; hence he says, as I also appointed you: my son, keep sound wisdom and discretion; let them not escape from your sight (Prov 3:21).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
