[[commentary]]
quote='''
After he showed that he was not lustful (v.1) or unjust (v.5), he shows next that he was not without pity. He first shows this from the fact that he did not take benefits away from the poor. For some men deny alms to the poor man seeking them from the beginning. He excluded this from himself saying, "If I denied the poor what they sought." Some do not refuse them but put off giving the gift. He excludes this from himself saying, "and if I made the eyes of the widow wait." Others do not refuse nor defer giving what is asked, but they give nothing from their own initiative. He excludes this from himself, showing that he did not wish to use his smallest possessions alone, but rather to share them with others, and so he continues, "if I ate my morsel alone and the orphan did not share it." Here he implies: Let these things and other grave consequences happen to me. Notice that he speaks here with great precision. For the poor do not usually just beg, but they entreat earnestly, and therefore one cannot take away from them the benefit of mercy without completely denying it in every way. Widows beg, but they are afraid to entreat earnestly, and so, unless one aids them quickly, they are deprived of the benefit of mercy. Orphans do not even dare to beg, and thus it is necessary that one bestow mercy on them even without begging.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
