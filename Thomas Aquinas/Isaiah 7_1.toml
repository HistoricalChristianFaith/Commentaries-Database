[[commentary]]
quote='''
And it came to pass in the days of Achaz the son of Joathan. Here the threat against the enemies of the two tribes is set out. And it is divided into two parts: in the first, the threat against the persecutors of the people is set out; in the second, the threat against those who are contemptuous of the prophecies of the prophets: woe to the crown of pride (ch. 28). The first of these is divided into two: in the first, the overthrow of each enemy in particular; in the second, of all of them in general: behold the Lord shall lay waste the earth (ch. 24). The first of these is divided into three: in the first, against enemies who persecute them bodily; in the second, against enemies who furnish power: the burden of Damascus (ch. 17); in the third, against enemies who oppress them in things: the burden of the desert of the sea (ch. 21). The first of these is divided into two: in the first, against persecutors of the same nation; in the second, against foreign persecutors: woe to them that make wicked laws (ch. 10). The first of these is divided into two: in the first, he threatens the frustration of the impious through the liberation of the two tribes; in the second, their destruction: and the Lord said to me (ch. 8). The first part, which is contained in this chapter, is divided into three: in the first, the imminent danger is described; in the second, the benefit of liberation is promised: and the Lord said to Isaiah (Isa 7:3); in the third, the sign of liberation is conferred, where it says, and the Lord spoke again to Achaz (Isa 7:10).

To understand the first part, it should be known that Achaz was impious and an idolater, as we read in 2 Kings 16:2–4 and 2 Chronicles 27; and therefore, the Lord gave him into the hand of the kings of Syria and Samaria, who first came against him and, besieging Jerusalem and finally conquering it, captured the greater part of his army and the chief of his army. Confident from that victory, they came again to deprive him of the kingdom entirely, and substitute another in his place. And in this second coming, Isaiah consoled him.

Three things, therefore, are set out in the first part. First, the gathering of the enemies is described; hence he says: and it came to pass in the days of Achaz. And he takes the genealogy back to Ozias, perhaps because it was when Ozias was struck with leprosy by the Lord (2 Chr 26:19–23), though he had once been just, that they received the daring to invade as though disdaining divine help. Came up, this is said because of the position of the land, for Judah is in the mountains; Phacee, who killed Phaceia king of Israel, whose chief of military he was, and reigned in his place; but they could not prevail over it, the first time, although they conquered the king in the battlefield. Or this is said by anticipation, as to the second time they came up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
