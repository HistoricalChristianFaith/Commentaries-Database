[[commentary]]
quote='''
Jesus said this in the synagogue, in which he was teaching at Capernaum. He used to teach in the temple and in the synagogues in order to attract many, so that at least some might benefit: "I have proclaimed your justice in the great assembly" (Ps 39:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
