[[commentary]]
quote='''
He who receives you, receives me. Here he offers a remedy. You say that we should do all this. How are we going to live? Favor us. As the Pope gives his representatives the power to grant favors, so the Lord gives a reward to those who receive them. And he mentions three. He says, therefore, he who receives you, receives me, because they will have God, because you are my members, because member of a member. But they could say: there is nothing great in receiving a poor man or you. But on the other hand, he that receives me, receives him that sent me, because, as it says in John (5:23): "He that honors my Father, honors me." It is no small thing to have God as a gift, as it was imputed to the praise of Abraham (Heb 13:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
