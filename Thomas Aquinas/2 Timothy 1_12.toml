[[commentary]]
quote='''
Then when he says, for which cause I also suffer these things, he shows what he is suffering as a result of being faithful to his office, saying, I suffer these adversities, namely, chains and ennui, and this for the faith of Christ: I labor even unto bands (2 Tim 2:9). And he says, for which cause, because suffering of itself is not praiseworthy, but only when it is for a just cause: blessed are they that suffer persecution for justice's sake: for theirs is the kingdom of heaven (Matt 5:10). That is why I am not ashamed, because it is no shame to suffer for justice's sake: let none of you suffer as a murderer or a thief . . . but if as a Christian, let him not be ashamed, but let him glorify God in that name (1 Pet 4:15); and they went from the presence of the counsel, rejoicing that they were accounted worthy to suffer reproach for the name of Jesus (Acts 5:41).

Then when he says, for I know whom I have believed, he affirms the certainty of his hope, which enables him not to be ashamed: and this is the fulfillment of God's promise; hence he says, whom I have believed.

And note that in one way to believe is an act of faith. His meaning, therefore, is this: I know that the one who promised is faithful and capable of bestowing eternal life, which he promised to every man that remains faithful.

But this seems to indicate that knowledge and faith are the same, and that the thing known and the thing believed are the same, whereas it is the nature of the known to be seen, and that of the believed to be unseen.

I answer that there are two things in faith, namely, that which is believed, and he who is believed. There cannot be knowledge of that which is believed, because that would destroy the nature of the thing believed; but there is knowledge of the one believed, because there is the clearest evidence that God is faithful. And so he says, I know whom I have believed: believe not every spirit, but try the spirits, if they be of God (1 John 4:1); the innocent believes every word (Prov 14:15).

In another way, believing refers to the faith placed in a person, to whom one entrusts something; and this is the truer meaning. As if to say: I have entrusted myself, my labors and sufferings to God; and I know that he is able to keep that which I have committed unto him, against that day.

Note that the thing which is committed, namely, the deposit, can be described in two ways: in one way, as referring to what I have deposited; this is the way a man deposits or commits his salvation to God, when he dedicates himself entirely to God: casting all your care upon him, for he hath care of you (1 Pet 5:7); cast your care upon the Lord, and he shall sustain you (Ps 54:23). In another way, he deposits his works when he receives his reward not immediately, but later; this is the way persons who act well commit the reward to God against that day, when he will judge the hidden things of men, to whom God will render the wages of their labors (Wis 10:17): say to the just man that it is well, for he shall eat the fruit of his doings (Isa 3:10).

Or, that which I have committed, i.e., the office entrusted to me, namely, to work for the Gospel: this man is to me a vessel of election, to carry my name before the gentiles, and kings, and the children of Israel (Acts 9:15). And God is able to keep his apostle until death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
