[[commentary]]
quote='''
Third, he shows that he was not immoderate in honors, because he did not even desire them, and so he says, "If I wished to go to them," which I did not do easily, "I used to sit in the first place," for I was honored among them. Nevertheless, he did not become arrogant in honors, and so he says, "and when I used to sit like a king surrounded by his army," with all admiring me from here and there, "I was still a consoler for those who mourned," and did not hold them in contempt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
