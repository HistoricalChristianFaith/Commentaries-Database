[[commentary]]
quote='''
In return for these works of mercy, "I expected good things," the prosperity of this world according to the opinion of his friends, "and evil things," adversities, "came to me" which clearly demonstrates that their opinion was false. "I waited for the light," the consolation or counsel by which I might escape from evil, "and the darkness" of bitterness and hesitation, "rushed in".
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
