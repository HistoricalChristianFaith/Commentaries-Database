[[commentary]]
quote='''
He shows why it is not advantageous to debate with God because this sort of dispute excludes two most necessary things. The first of these is the fear of God. For he who fears someone does not presume to discuss contentiously with him. Job had also expressed the same thing already saying, "And let your power not terrify me." (13:21) Therefore Eliphaz says here, "As much as you can, you have rejected fear," because you tried to exclude the fear of God from yourself. The second is prayer to God. For arguing with someone and entreating him are two different sorts of things. So he then says, "You have born away," taken away, "prayer from the presence of God." This goes against what Eliphaz had said, "This is why I entreat the Lord." (5:8)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
