[[commentary]]
quote='''
Third, the determination of penalty to their body is accounted for: "Thou wilt pursue them in anger and destroy them from under thy heavens, O Lord." That is, through different afflictions.

Finally, is considered up to the time you (O Lord) destroy them by death, and eternal damnation. That is "under thy heavens, O Lord." Namely, those persons who would desire to reside in these heavens. For, Jeremiah elsewhere declares: "Bring upon them the day of evil; destroy them with double destruction!" (Jeremiah 17:18). And Psalm 83:15: "So do thou pursue them with thy tempest and terrify them with thy hurricane."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
