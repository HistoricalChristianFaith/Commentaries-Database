[[commentary]]
quote='''
Second, as to the servitude of the peoples: then shall you see; when the multitude of the sea, namely, the traders of the sea, shall be converted to you, serving you in commerce; the strength, kings and princes, providing peace and tribute to you. Or, this refers to the conversion of the gentiles to the Church: then shall you abound in delights in the Almighty (Job 22:26).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
