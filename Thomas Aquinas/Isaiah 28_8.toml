[[commentary]]
quote='''
Third, he sets out the manner of their ignorance: for all the tables were full of vomit, for they gorged themselves in their temples until they vomited, as if they were devoted entirely to idols; and filth, namely, of all their shameful vices: as a dog that returns to his vomit (Prov 26:11), and the sow that was washed to her wallowing in the mire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
