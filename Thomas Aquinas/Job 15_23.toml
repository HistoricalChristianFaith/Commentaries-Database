[[commentary]]
quote='''
Now although a tyrant fears all strangers, he still can sometimes confide in the members of his family or his household with whom he lives securely. But when his evil is beyond all measure, he fears even the members of his own household with whom he lives and so the text continues, "When he goes to look for bread, he knows that the day of darkness is at hand," i.e. the day of death. This is as if to say: Not only is he suspicious of plots in his dealings with outsiders when he must associate with strangers, but he also is suspicious in his dealings with the members of his household in eating, drinking and the like. He believes that death is being prepared for him by the members of his own household.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
