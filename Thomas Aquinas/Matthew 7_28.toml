[[commentary]]
quote='''
And when Jesus finished these words, the crowds were astonished. There were three types of men who followed the Lord Jesus: some were astonished and scandalized, as the Pharisees, about whom below (c. 15). Some were astonished, but not scandalized, as the crowds. But some, as the perfect, were not astonished. But we must inquire about his saying, the crowds, because there were no crowds there. It can be said that the sermon was made to the crowds and to the disciples, but in the mountain below its summit was a plain. The disciples, therefore, were on the summit with Christ; but the crowds in the plain. Or, it can be said that it was given first to the apostles and then to the crowds. Or, crowds of disciples followed him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
