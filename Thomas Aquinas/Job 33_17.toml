[[commentary]]
quote='''
So he says, "to turn a man aside from what he has done." For man is frequently corrected in dreams for sins he has committed. Since the pride is the root of sin because by it one holds the commandments of God in contempt, he then says, "and to free him from pride."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
