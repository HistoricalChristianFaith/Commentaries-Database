[[commentary]]
quote='''
Then when he says, this precept, I commend to you, he instructs Timothy to keep certain things in mind: first, he reminds him of the task entrusted to him; second, he instructs him on its proper performance; third, he shows how to use it.

He says, therefore: this precept, namely, to guard the end of the law, i.e., always cling to charity and not to Jewish fables, I commend to you, as a faithful trust, because that is how it has been entrusted to you.

But how? According to the prophecies going before on you, i.e., because this Gospel is not out of harmony with the prophecies which you have already learned, because he was the son of a Jewish mother: and we have the more firm prophetical word: whereunto you do well to attend, as to a light that shines in a dark place, until the day dawn (2 Pet 1:19); do not despise prophecies (1 Thess 5:20); or according to the prophecies going before on you, i.e., according to what I and the other saints have known about you through the spirit of prophecy telling what should be delivered over to you; that you war in them, i.e., in the prophecies, a good warfare.

But there are two kinds of warfare: spiritual and carnal: for the weapons of our warfare are not carnal, but mighty to God unto the pulling down of fortifications (2 Cor 10:4). In good warfare two things are expected of the soldiers, namely, that they do nothing contrary to military discipline, and not become weak through ease: everyone who strives for mastery refrains himself from all things (1 Cor 9:25). Likewise, two things are required on the part of the warfare: namely, that he subdue those who are acting against the republic, and submit himself to those to whom he is subject. So is it also in spiritual warfare, because it is ordained to the destruction of all who exalt themselves and to the bringing into captivity every understanding unto the obedience of Christ, as it is stated in 2 Corinthians 10. And this is the true warfare of which he says, that you war in them a good warfare.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Timothy.html'
source_title='Commentary on 1 Timothy'
