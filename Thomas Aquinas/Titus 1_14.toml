[[commentary]]
quote='''
The road to this soundness is to avoid the errors of the Jews; hence he says, not giving heed to Jewish fables. For in the law there are two types of articles: those dealing with beliefs, and those dealing with precepts of religion, which were to be observed in divine worship. The first he calls fables, and the second commandments of men and not of God.

In this he seems to be condemning the old law as the Manicheans do. But the word fables could refer to their legends (matters above and beyond the doctrines of the law), which are myths, as in the Talmud: not to occupy themselves with fables and endless genealogies (1 Tim 1:4). Or, it might refer to the doctrine which formerly was true, but is now a fable as they understand it. Thus, behold, a virgin shall conceive and bear a son (Isa 7:14) was true, but now, because they say that it still remains to be fulfilled, it is a fable. Likewise, commandments of men can mean those not found in the law of Moses, but in the tradition of their fathers: for the sake of your tradition, you have made void the word of God (Matt 15:6).

But does that mean that commandments of men are to be ignored?

I answer that they are not, so long as they do not turn one from God's truth; that is why he continues, who turn themselves away from the truth: for the time is coming when people will not endure sound teaching but will turn away from listening to the truth and wander into myths (2 Tim 4:4); the same thing is found in Matthew: in vain do they worship me, teaching doctrines and precepts of men (Matt 15:9). Or, it might be said that the commandments in God's law have been changed into commands of men. For when they are interpreted as signs of truth to come, they are commandments of God, but when they wish us to observe them after our body is dead to the law, they are commands of men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
