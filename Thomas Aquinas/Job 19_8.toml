[[commentary]]
quote='''
Second, a cure is found in adversities by the man himself who escapes adversities in two ways. In the first way, by his power, and he excludes this saying, "He has obstructed my path and I cannot pass," as if he should say: He has placed so many impediments to my advance that I cannot remove them. In another way by prudence, and to exclude this he applies the text, "and he placed darkness on my footpath," so that I could not see how I must go forward.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
