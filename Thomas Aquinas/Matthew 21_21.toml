[[commentary]]
quote='''
"And Jesus answering" etc. Here he satisfies them. And first by showing the power of faith: hence he says "amen I say to you." Above he presented the same teaching, but here he explains it; hence he says "if you shall have faith, and stagger not;" because faith must be firm without hesitation; James 1:6: "But let him ask in faith, nothing wavering." "Not only shall you do what is done to the fig tree:" for he himself through faith dwells in man, and works in man; therefore, as he himself does, so also does he in whom he dwells. "If you shall say to this mountain, take up and cast thyself into the sea, it shall be done." Some say that this never happened. Jerome says that the apostles did many things that are not written. Likewise, if it is not read as done by them, it is read as done by other apostolic men, as Gregory narrates of a certain one, as was said above. Likewise, the Lord did not say that it would happen, but that it could, if need arose; but the need did not present itself. Spiritually, by the mountain we understand the devil. Hence if you shall say to the devil, cast thyself into the sea, i.e., into hell, it shall be so. Or into the sea, i.e., into evil men. Or by the sea, pride. Ps 89:2: "Before the mountains were made, or the earth and the world was formed; from eternity and to eternity thou art God." Hence if you shall say to the proud man, take up, from the just, and cast thyself into the sea, i.e., into evil men. Or by the mountain, Christ; hence if you shall say to this mountain, i.e., to Christ, take thyself up, namely, from the Jews, and cast thyself into the sea, i.e., into the Gentiles, who are a sea by reason of their turbulence. Acts 13:46: "Because you judge yourselves unworthy of eternal life, behold we turn to the Gentiles."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
