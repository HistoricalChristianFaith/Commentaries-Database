[[commentary]]
quote='''
Then he tells how he helped: Why are you afraid, O men of little faith? It seems that they were not men of little faith, because they said, Save us; but they really were of little faith, because they did not believe that he could save them even when sleeping. Or, of little faith, because if they had great faith, they could have commanded the sea. Then he rose and rebuked the winds; for a storm arises from winds as from an efficient cause, and from water as a material cause. And he commanded both: "He made the storm be still" (Ps 107:29). And that is what is stated here, and there was a great calm. But ordinarily, when there is a storm, the sea is not completely calm even after two days. Therefore, in order that the miracle appear perfect, the great calm occurred immediately, because "God's works are perfect" (Dt 32:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
