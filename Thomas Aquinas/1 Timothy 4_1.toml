[[commentary]]
quote='''
Above, he instructed Timothy on matters pertaining to the attitude of the Church in spiritual things; second, in regard to the teachings of faith, the worship of God and the qualities required of its ministers. Here he instructs him on the attitude of the Church in regard to external things:

first, in regard to food;

second, in regard to riches and the different states of men, at whoever are servants under the yoke.

In regard to food he does two things: first, in regard to the use of foods;

second, its distribution, in chapter five, at honor widows (1 Tim 5:1).

In regard to the first he does two things: first, he rejects superstitious abstinence;

second, he prefers godliness to lawful abstinence, at exercise yourself unto godliness.

In regard to the first he does two things: first, he states the false doctrine regarding unlawful abstinence;

second, he instructs him to propose these things to the brethren, at proposing these things.

In regard to the first he does two things: first, he exposes the error;

second, he excludes it, at which God has created.

In regard to the first he does two things: first, he foretells a future error on the part of the deceived;

second, on the part of the deceivers, at speaking lies in hypocrisy.

In regard to the first he does three things: first, he discloses the author of the announcement;

second, defection from the faith, at that in the last times;

third, the cause of the defection, at giving heed.

He says, therefore: great is the mystery of godliness, which was manifested in the flesh, was justified in the Spirit (1 Tim 3:16). But in regard to this mystery the Holy Spirit foretells something of the future, for it pertains to him to reveal mysteries: the things that are to come he shall show you (John 16:13). The Spirit, therefore, foretells the secrets that lie in the Father's heart. But formerly he spoke in figures: if there be among you a prophet of the Lord, I will appear to him in a vision or I will speak to him in a dream (Num 12:6); I have multiplied visions and I have used similitudes by the ministry of the prophets (Hos 12:10). But in the New Testament the Spirit manifestly says: he will show you plainly of the Father (John 16:25).

And he foretells a coming defection from the faith: hence he says, in the last times some shall depart from the faith. The last times refers to the final era, because we are the ones upon whom the final ages have descended. Yet in this world the later it is, the closer we are to the last day. And just as in the early Church, on account of its nearness to Christ and the recently instituted sacraments, faith was very fervent, so in the last days as compared to the days of the apostles, some shall depart from the faith, because they are carnal, and error will abound: gather yourselves together that I may tell you the things that shall befall you in the last days (Gen 49:1).

The causes of the defection is twofold: one on the part of the Devil, who seduces: but I fear lest as the serpent seduced Eve by his subtlety, so your minds should be corrupted (2 Cor 11:3). Therefore, he says, giving heed to spirits of error, namely, to demons whose work is to lead men into error: he is a liar and the father thereof (John 8:44); I will go forth and be a lying spirit in the mouth of all his prophets (3 Kgs 22:22). And he says, to spirits, because the head Devil has many underlings.

But how will they give heed? Will they see him? No, but they will speak in them. Therefore, he mentions the second cause, namely, false doctrines. According to a Gloss he calls false teachers devils; and deservedly. For just as good men are sometimes called angels, so evil men because of the degree of their wickedness are called demons: have not I chosen you twelve: and one of you is the Devil (John 6:71).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Timothy.html'
source_title='Commentary on 1 Timothy'
