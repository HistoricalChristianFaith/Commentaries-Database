[[commentary]]
quote='''
Then he confirms this testimony when he says, this testimony is true. A Gloss says: this gives us to understand that a teacher of Sacred Scripture takes the testimony of truth wherever he finds it. Hence the Apostle frequently cites the sayings of gentiles, as in 1 Corinthians: bad company ruins good morals (1 Cor 15:33); and in Acts: we are indeed his offspring (Acts 17:28). This does not mean that their entire doctrine has been approved, but only what is good is chosen, because all truth, no matter by whom it is spoken, comes from the Holy Spirit; and what is evil is rejected. Hence it is said: when you see among the captives a beautiful woman, and you have desire for her and would take her for yourself as wife, then you shall bring her home to your house, and she shall shave her head and pare her nails (Deut 21:11), i.e., remove all superfluities.

Having described the character of the Cretan people, he now prescribes the remedy: first, the remedy of rebuke; second, the reason for this, all things are clean to the clean.

In regard to the first he does three things: first, he advises Titus to rebuke them; second, he tells him the purpose of the rebuke, at that they may be sound; third, he shows the correct method for reaching the end, at not giving heed.

He says, therefore: the Cretans are evil beasts who should be whipped and flogged. And therefore, rebuke them sharply: the reproofs of discipline are the way of life (Prov 6:23); rebuke the beasts that dwell among the marshes (Ps 68:30).

But this seems contrary to the advice given in Timothy: rebuke, unfailing in patience (2 Tim 4:2).

I answer that there are two reasons for this advice: one on the part of those who are rebuked. For the Cretans are difficult and obstinate; consequently, they deserve to be rebuked sharply. Not so the Ephesians, whose archbishop was Timothy. The other is on the part of those who rebuke, because Titus was meek and mild; consequently, he is urged to act opposite to this. But Timothy was strict; therefore, he was urged to be patient.

Then when he says, that they may be sound in the faith, he touches on the purpose of the rebuke. For a man is sound when there is no decay in him: and he is sound in faith when no article of faith is incorrectly understood. But the Cretans' faith was vitiated by heresy: but I am afraid that as the serpent deceived Eve by his cunning, your thoughts will be led astray from a sincere and pure devotion to Christ (2 Cor 11:3); if any one teaches otherwise and does not agree with the sound words of our Lord Jesus Christ and the teaching which accords with godliness, he is puffed up with conceit (1 Tim 6:3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
