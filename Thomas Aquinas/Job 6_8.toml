[[commentary]]
quote='''
He shows this same thing when he says, "Who will grant that my prayer find fulfillment?" He shows that this prayer is made not only with the lips, but also from the bottom of his heart when he continues, "may God grant me my hope!" He expresses the content of the prayer saying, "May he who began this," i.e. to afflict me, "destroy me," in death. He continues, "May he free his hand and cut me down." The hand of God expresses the divine power by which God has afflicted him, and God binds his hand in a way from his mercy and by his will and when he does not afflict him. However, God frees his hand in a sense when the divine chastisement strikes him is directed to killing him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
