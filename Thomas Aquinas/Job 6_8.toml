[[commentary]]
quote='''
He shows this same thing when he says, "Who will grant that my prayer find fulfillment?" He shows that this prayer is made not only with the lips, but also from the bottom of his heart when he continues, "may God grant me my hope!"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
