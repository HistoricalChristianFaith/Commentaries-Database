[[commentary]]
quote='''
"And the disciples going, did as Jesus commanded them." After the command has been presented, here the execution of the command is presented. And first in general: "the disciples going." Behold, the command of obedience is given. Exod 29:35: "All the things the Lord hath commanded, we will do."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
