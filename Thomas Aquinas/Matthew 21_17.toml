[[commentary]]
quote='''
"And leaving them, he went out of the city into Bethania." Here he confutes in deed. And first, by a deed done regarding himself; secondly, by a deed done regarding the fig tree. He says therefore that "leaving them, he went out." And that leaving was a sign that they themselves would leave him. Jer 51:9: "We would have cured Babylon, but she is not healed." And he passes on to Bethany, to the house of obedience: for there Jesus dwells, as in Rom 6. "And he abode there," because he remains in those who obey him. Acts 5:29: "We ought to obey God rather than men." And not only in Bethany, but in anyone who is obedient. Hence John 14:15: "If any one love me, he will keep my word," and it follows, "and we will come to him and will make our abode with him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
