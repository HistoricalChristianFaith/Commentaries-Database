[[commentary]]
quote='''
Third, he shows the firmness of the divine word, indeed the people is grass: heaven and earth shall pass away: but my words shall not pass away (Luke 21:33).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
