[[commentary]]
quote='''
He questions Job about his effects which are accessible to the experience of the human senses. When a man is shown to be ignorant of these, he is much more convinced that he does not have knowledge of the higher realities. Among other sensible effects he begins to ask about the principle parts of the earth. Of these earth is more known to us because it is more immediate to our experience. He begins to ask him about this and says, "Where were you when I laid the foundations of the earth?" He rightly compares the earth to a foundation because as a foundation is the lowest part of a building, so also the earth is the lowest of bodies and it lies under everything. Since the earth is the principal matter of the human body, matter precedes in time that which is made from it, and even more the plan of the artisan who puts together the matter precedes it. So he clearly says, "Where were you when I laid the foundation of the earth," as if to say: You cannot know the plan of the foundation of the earth, because when the earth was laid on its foundation you did not yet exist in the nature of things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
