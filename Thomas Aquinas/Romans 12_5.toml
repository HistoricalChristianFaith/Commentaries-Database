[[commentary]]
quote='''
Then he likens these three aspects to the mystical body of Christ, which is the Church: he made him the head over all things for the Church, which is his body (Eph 1:22).

Concerning which he touches on three things. First, he touches on the number of members, i.e., of believers when he says: so we, being many: a man once gave a great banquet and invited many (Luke 14:16); many are the children of the desolate (Isa 54:1). For although they are few compared to the unfruitful multitude of the damned, according to Matthew, narrow is the way that leads to life, and few there are who find it (Matt 7:14), yet absolutely speaking, they are many: after this he looked, and behold, a great multitude which no man could number (Rev 7:9).

Second, he touches on the unity of the mystical body when he says we are one body: that he might reconcile us both to God in one body through the cross (Eph 2:16). This mystical body has a spiritual unity through which we are united to one another and to God by faith and love: there is one body and one spirit (Eph 4:4). And because the Spirit of unity flows into us from Christ—anyone who does not have the Spirit of Christ does not belong to him (Rom 8:9)—he adds in Christ, who unites us to one another and to God by his Spirit whom he gives us: that they may be one even as we are one (John 18:22).

Third, he touches on the variety of functions, which is rooted in the common utility, when he says: and every one members one of another. For any given member has its own function and power. Therefore, inasmuch as the function and power of one member aids another, it is said to be the other's member; thus, the foot is called the eye's member, inasmuch as it carries the eye, and the eye is called the foot's member, inasmuch as it directs the foot: the eye cannot say to the hand: I have no need of you (1 Cor 12:21).

So, too, in the mystical body one who has received the gift of prophecy needs the one who has received the gift of healing, and so on for all the others. Hence, as long as each believer uses the grace given him to help another, he becomes the other's member: bear one another's burdens (Gal 6:2); as each has received a gift, employ it for one another (1 Pet 4:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
