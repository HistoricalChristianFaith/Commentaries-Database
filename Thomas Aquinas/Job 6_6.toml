[[commentary]]
quote='''
On the other hand, someone might concede that it is natural to express pain vocally conceived, but as the Stoics thought, it does not pertain to the wise man to conceive sadness in his heart for any reason whatsoever. Job demonstrates this to be against sensitive nature. For sense cannot but be repulsed by the unsuitable and the harmful. So he says, "Can tasteless food be taken without salt?" implying the answer no, because such foods without flavor are not fit to delight the sense of taste. Similarly, the heart of man cannot freely tolerate things which are not pleasant, much less things which are bitter and harmful. So he continues, "Or can someone taste what once tasted brings death?," as if to say, 'No' here. Just as this is impossible for the exterior sense, so it is impossible that what is apprehended by the interior sense as harmful should be received without sadness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
