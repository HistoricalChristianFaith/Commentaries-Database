[[commentary]]
quote='''
This strength is manifested by two things: first, in its effect, because we are freed from evils; hence he says, who has delivered us: the hand of God delivered us from the hand of the enemies, and of such as lay in wait by the way (1 Ezra 8:31); if the Son shall make you free, you shall be free indeed (John 8:36). And in regard to this he calls us unto good; hence he says, and called us by his holy calling, because he called us to sanctify us: whom he predestined, them he also called (Rom 8:30); who has called you out of darkness into his marvelous light (1 Pet 2:9).

Then he clarifies some of his previous statements, saying, not according to our own works, where he shows that we have been freed and called by the power of God: first, he shows that the cause of our deliverance and vocation is God; second, the progress of that cause, at which was given us; third, he commends the cause, namely, the giver of grace and its preserver, at who has destroyed death.

He says, therefore: he called us not by our virtue, namely, not by our works, which are the effects of virtue: not by the works of justice which we have done, but according to his mercy he saved us (Titus 3:5).

Now there are two causes of human salvation, which is from God: one is eternal, namely, predestination; the other is temporal, namely, sanctifying grace.

In regard to the first he says, according to his own purpose, i.e., according to his predestination, which aims at mercy: he works all things according to the counsel of his will (Eph 1:11); to such as, according to his purpose, are called to be saints (Rom 8:28).

In regard to the second he says, and grace: being justified freely by his grace (Rom 3:24).

In regard to the progress of grace he shows first, how one is prepared for grace; second, how it is bestowed; third, by whom.

He described the first when he says, which was given us in Christ Jesus, i.e., it was foreseen that it would be given to us, before the times of the world. As the Philosopher says, a time is nothing but the measure of a certain thing's duration; hence the various times are the various ages of men; hence one age lasts a thousand years, because man is said to live as long as he survives in men's memory, which does not exceed a thousand years. The times of the world, therefore, are those which measure changeable things, and these begin with the world; but predestination began before the world: he chose us in him before the foundation of the world (Eph 1:4).

And he says, in Christ Jesus, because we were not chosen as though to be saved by our own merits, but through the grace of Christ: for just as he predestined our salvation, so also the manner of our salvation: grace and truth came by Jesus Christ (John 1:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
