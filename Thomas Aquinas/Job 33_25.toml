[[commentary]]
quote='''
Since Job had said, "My flesh is clothed with corruption," (7:5) as if he could not be restored, he excludes this saying, "His flesh has been consumed by punishments," as if to say: This is not injurious to my power, and so "let him return to the days of his youth," i.e. let him recover the strength like a young man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
