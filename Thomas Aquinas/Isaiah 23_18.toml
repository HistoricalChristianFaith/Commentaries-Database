[[commentary]]
quote='''
Third, he sets out the fruit of liberation: and her merchandise and her hire shall be, below: for brass I will bring gold, and for iron I will bring silver (Isa 60:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
