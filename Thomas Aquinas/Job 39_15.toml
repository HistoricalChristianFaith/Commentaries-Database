[[commentary]]
quote='''
The ostrich is naturally a forgetful animal and exhibits no care to preserve her eggs, and so he says, "she forgets that a foot," of a man passing that way, "may crush them," the eggs, "or a beast of the field trample them," either in a chance passing by or in the search of food.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
