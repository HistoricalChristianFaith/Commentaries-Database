[[commentary]]
quote='''
Then when he says, At Damascus, he shows the evils he avoided, and this in a certain particular danger. Here it should be noted that the Apostle first began to preach Christ in Damascus, where he was thrown to the ground and converted to the faith, as he was on his way to arrest Christians. Therefore, the Jews appealed to the governor of that city, who was representing Aretas the king, to arrest Paul and put him to death. So the governor ordered the city-gates to be watched day and night, as it says in Ac. (chap. 9). But the Christians who were there, desiring to save Paul, lowered him by the wall in a basket. This form of escape the Apostle touches on, when he says: truly I am not lying about what I am telling you now: for at Damascus, the governor under King Aretas, i.e., the governor who ruled at Damascus under king Aretas, was induced by the Jews to guard the city of the Damascenes to seize me, so that after I was apprehended, I would be delivered to the Jews and prevented from preaching. But I was let down in a basket through a window in the wall, and escaped his hands, namely, the governor's. This was done in keeping with the Lord's command: "When they persecute you in one town, flee to the next" (Matt. 10:23). In this way too did Michal let David down through a window to escape from Saul (1 Sam. 19:12), and Rahab let the spies down with a cord out of a window (Jos. 2:15).

But some object against the Apostle's conduct: first, because he seems to have lacked confidence in the Lord and fled. I answer that as long as human help is available, a man should not run for divine help, because this would be tempting God; but he should use human help as much as he can. But the Apostle was not yet lacking human help. The second objection is based on Jn. (10:12): "He who is a hireling and not a shepherd, whose own the sheep are not, sees the wolf coming and leaves the sheep and flees." Hence, it seems that Paul was not a good shepherd. I answer that sometimes the person of the prelate alone is sought, and sometimes the prelate along with all the people. When the prelate alone is sought, then he should entrust his duties to another and absent himself. This is what Paul did. Hence, a Gloss says that although he fled, he still took care of his people by commending them to the Good Shepherd seated in heaven and saving himself for their benefit by flight. But when the entire flock is sought, then he should prefer the benefit and safety of the flock to his own bodily safety. But note that there is a flight inspired by humility, when a person flees honors, as Christ fled when they sought to make him king (Jn. 6:15). In the same way Saul, when chosen, concealed himself at home (1 Sam. 10:22). Another is inspired by caution, namely, when a person flees dangers in order to be saved for greater ones. This is the way Elijah fled from Jezebel (1 Kg. 19:3), and the way the Apostle fled from the hands of the governor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
