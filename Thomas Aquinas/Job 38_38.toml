[[commentary]]
quote='''
This inspired wisdom or intelligence or even this harmony of heaven existed from the beginning of the foundation of the earth, and so he says, "When the dust was established on the earth," which refers to the position of the earth, placed on the lowest part as on a foundation, "and the clods of the earth held fast together," which refers to the humidity which holds the parts of the earth together, i.e., so that the land may not return to dust because of its dryness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
