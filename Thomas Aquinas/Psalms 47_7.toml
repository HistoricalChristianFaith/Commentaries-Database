[[commentary]]
quote='''
And he shows that praise is fitting, because He is "God, king of all the earth." And therefore you inhabitants of the earth should sing praises to Him. And he says "of all the earth" -- not of Judea only, or of Greece, but of the whole world. "But sing praises wisely," that is, with discernment. And sing praises not only with the mouth, but with a heart renewed interiorly; because "praise is not seemly in the mouth of a sinner," as is said in Sir. 15. Likewise, not with a troubled mind. Jas. 5: "Let him pray with an even mind." Likewise, continually. Is. 23: "Sing well, repeat the song frequently."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
