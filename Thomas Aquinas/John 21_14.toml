[[commentary]]
quote='''
The Evangelist summarizes the appearances by saying, This was now the third time that Jesus was revealed to the disciples. According to Augustine, if this third time refers to the number of times, it is not true. For as was said, on the first day Christ appeared five times, again on the eighth day when Thomas was present, again by the Sea as recorded here, again on the mountain in Galilee (Mt 28:16), again when they were at table (Mk 16:14), and again on the day of his ascension, when "as they were looking on, he was lifted up" (Acts 1:9). Further, he appeared to them many other times during the forty days, but these are not recorded (Acts 1:3).

Thus the third time must refer to the days on which Christ appeared. The first day he appeared was the day of the resurrection; the second day was eight days after the resurrection, eight days later (20:26); and the third day was the appearance by the lake mentioned here. Or, one could say, this statement can be true even if it is referred to the number of times: for the only times we read that he appeared to a number of the disciples gathered together was on the first day in the evening, when the doors were shut; secondly, eight days later, when the disciples were gathered together; and thirdly, here at the Sea. Thus, he explicitly says, this was now the third time that Jesus was revealed to the disciples.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F21.htm'
source_title='Commentary on John'
