[[commentary]]
quote='''
The root of hope is twofold: one is on the part of divine aid, the other on the part of human aid. The root of the hope which comes from divine aid seemed to have been torn up by the fact that God seemed gravely angry with him according to the opinion of those who put divine punishment only in the adversities of this life, and so he says, "His fury has been roused against me," which he says to show the vehemence of the anger. For fury is his anger enkindled. But the more violent fury is the more quickly it usually passes away, and so in this way hope can remain in the future for the one who is angry. But if anger passes into hatred, then no hope seems to remain any longer, and to show this he puts here, "and so he has considered me his enemy." For one does not hope for a cure from an enemy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
