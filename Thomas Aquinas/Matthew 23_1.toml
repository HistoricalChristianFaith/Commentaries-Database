[[commentary]]
quote='''
Above it was shown how the Pharisees and scribes were provoked by the glory of Christ, and also by his wisdom, by which he had confounded them; now he shows how they were provoked by the justice with which he rebuked them. And he does two things. First, he instructs certain ones; secondly, he reproves them, at but woe to you, scribes and Pharisees. Regarding the first, he does two things. First, he shows their dignity; secondly, he reveals their intention in the use of authority, at all their works they do to be seen by men. Regarding the first, he does three things. First, he commends their authority; secondly, he teaches the rendering of obedience with caution; thirdly, he assigns the reason. The second is at all things therefore whatsoever they shall say to you, observe and do, etc.; the third is at for they say, and do not. He says, then, then Jesus spoke to the multitudes, etc. The continuation is as follows. The Lord had so confounded them that they neither dared to question him nor knew how to answer. But, as Chrysostom says, a discourse that reproves and does not instruct is useless; therefore he turned to the multitudes and to his disciples, to instruct them. Now it should be known that some hear him as disciples, and some as multitudes: as disciples, those who perceive the truth with their minds; John 8:31: if you continue in my word, you shall be my disciples indeed. As multitudes, those who cannot grasp the truth with their minds. Therefore he sometimes addresses his words to the multitudes, sometimes to the disciples, and sometimes to both; and in different ways: for to the disciples he speaks lofty things, as it says in John 15:15: all things whatsoever I have heard from my Father I have made known to you. But sometimes he sets forth parables to the multitudes, as was said above. To both, however, he speaks of what is necessary for salvation, and such are these words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
