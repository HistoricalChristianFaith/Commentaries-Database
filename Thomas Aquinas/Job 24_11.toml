[[commentary]]
quote='''
If, perhaps, they seem to have a surplus in anything, they take that away not thinking what deep poverty they suffer in other things, and so he says, "Among these accumulations," of fruits, "they have taken a siesta," for they have rested at noon as though bloated on the goods of others, "and are thirsty even though they have tread the wine presses," who immediately after the gathering of the grapes have little wine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
