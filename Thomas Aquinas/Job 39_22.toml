[[commentary]]
quote='''
Nor is he cast down with fear in the thick of the battle itself, and so he says, "he scorns fear," and what is more, he is not even put off by the pain of wounds, and so he says, "he does not retreat from the sword."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
