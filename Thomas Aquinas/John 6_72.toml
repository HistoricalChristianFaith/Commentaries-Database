[[commentary]]
quote='''
Finally, what our Lord had just said privately is explained by the Evangelist when he says, he was talking about Judas, as events proved and which will be clear below (c 13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
