[[commentary]]
quote='''
And as to justice of works, and you shall be founded in justice, above: Zion shall be redeemed in judgment, and they shall bring her back in justice (Isa 1:27).

987. Second, as to freedom from evils, first, promising deliverance from dangers: depart, that is, you shall depart, for you shall not suffer calumny: he shall humble the calumniators (Ps 71[72]:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
