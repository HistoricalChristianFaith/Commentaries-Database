[[commentary]]
quote='''
"But what think you? A certain man had two sons" etc. Above the Lord suppressed their inquiry by his own question; here he refutes the inquirers. And first concerning disobedience; secondly, concerning malice, and this according to two parables, the second of which explains and clarifies the first. Concerning the first, two things. First, he presents the parable; secondly, the explanation, at "Jesus saith to them" etc. Concerning the first, three things. First, he commits the judgment to his hearers; secondly, he narrates the event; thirdly, he demands their verdict. He says "what think you?" It is a powerful testimony that he commits the judgment to his adversaries. Job 6:29: "Answer, I beseech you, without contention, and judge that which is just." Then he sets forth the event: "a certain man had two sons." This man is God; the two sons are two peoples. Sir 33:15: "Look upon all the works of the Most High: two and two, one against another." Or two kinds of men, the just and sinners. They are not called just in every sense, but those who profess themselves to be just; and sinners not in every sense, but those who do penance. Or these two sons are clerics and laity. It treats therefore of obedience. And first, the command is presented; secondly, the refusal; thirdly, the fulfillment. "And coming to the first." The first is the Gentile people, which began from Noah, just as the Jewish people began from Abraham. Likewise, the first is called the nation of the laity, because clerics exist for the sake of the laity, to instruct them. Hence he came to the first, i.e., to the Gentile people, through interior inspiration, or through the manifestation of angels. "He said: son, go work today in my vineyard." The vineyard of God is justice. Work therefore in the vineyard, i.e., do works of justice. And he says "today," as though for the whole time of your life. And when did he say this? When he inspired interiorly by giving the light of reason. Ps 4:6: "Many say: who showeth us good things? The light of thy countenance, O Lord, is signed upon us."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
