[[commentary]]
quote='''
"And Pilate seeing that he prevailed nothing." Here he intends his release through a deed; and first, the deed is set forth; secondly, the obligation of the people to punishment. He says: "and Pilate seeing that he prevailed nothing." By this he gives us to understand that he had said many other things, and that nothing availed. "Taking water, he washed his hands." It was the custom that when someone wished to show himself innocent, he washed his hands; and so this man did; hence he said: "I am innocent of the blood of this just man etc." According to this manner it is found in Psalm 26:6: "I will wash my hands among the innocent." And truly he would have been innocent if he had persisted in his resolve; hence he calls him just. "Look you to it," i.e., consider what ought to befall you. Hence John 18:31 says: "take him you, and judge him according to your law."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
