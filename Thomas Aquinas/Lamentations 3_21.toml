[[commentary]]
quote='''
Third, memory results regards faithfulness. "But this I call to mind, and therefore I have hope." Hence Sirach 51:8 says: "Then I remembered thy mercy, O Lord, and thy work from of old."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
