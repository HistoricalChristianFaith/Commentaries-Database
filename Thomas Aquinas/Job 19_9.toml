[[commentary]]
quote='''
Then, after he has excluded the cures, he adds the adversities, beginning with the exterior goods which he lost. He places first among these the loss of honor and glory when he says, "He stripped me of my glory," because although he had previously been held in honor and reverence, now even those younger in age derided him, as the text says further on in Chapter Thirty (v.1). He places second the loss of rank when he says, "and he took the crown from my head," because before he used to sit "like a king surrounded by his army," (29:25) as a text will say further on but now "he sat in a dung heap scraping the corrupted matter with a potsherd." (2:8)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
