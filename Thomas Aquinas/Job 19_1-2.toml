[[commentary]]
quote='''
In the previous discourse Baldath seems to have intended two things. First, he intended to refute Job for stupidity, pride and anger. (18:2) He intended to afflict him by this like his other friends had, and so Job says, "How long are you going to afflict my soul?" Second, Baldath intended to confirm his opinion that the adversities of the present life arise in return for sins which in fact he had explained at length by enumerating the different adversities without introducing other proof. (18:4) Regarding this Job says, "and injure me with your discussions," that is, fatigue me with words, but not convincing proofs?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
