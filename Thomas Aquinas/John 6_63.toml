[[commentary]]
quote='''
Then he settles the offense they took at what he said, concerning the person speaking. The occasion for their scandal was when they heard our Lord say divine things about himself. And so, because they believed that he was the son of Joseph, they were upset at what he said about himself. God takes away this reason by showing them his divinity more openly, and says: You are upset over the things I have said about myself; What if you should see the Son of Man ascending to where he was before? What would you say then? As if to say: You can never deny that I came down from heaven, or that I am the one who gives and teaches eternal life. He did the same thing before with Nathanael. When Nathanael said to him, "You are the King of Israel" our Lord, wanting to lead him to more perfect knowledge, answered him: "You will see greater things than this" (Jn 1:50). And here too, our Lord reveals to them something greater about himself which would happen in the future, saying, What if you should see the Son of Man ascending to where he was before? Indeed, he did ascend into heaven in the sight of his disciples (Acts 1:9). If, therefore, he does ascend to where he was before, then he was in heaven before: "No one has gone up to heaven except the one who came down from heaven" (Jn 3:13).

Let us note that Christ is one person: the person of the Son of God and the person of the Son of Man being the same person. Still, because of his different natures, something belongs to Christ by reason of his human nature, that is, to ascend, which does not belong to him by reason of his divine nature, according to which he does not ascend, since he is eternally at the highest summit of things, that is, in the Father. It is according to his human nature that it belongs to him to ascend to where he was before, that is, to heaven, where he had not been in his human nature. Thus, Christ ascended in the sight of his apostles to where he was before according to his divinity; and he ascended, by his own power, according to his humanity: "I came forth from the Father, and I have come into the world. Now I am leaving the world and am going to the Father" (Jn 16:28).

Augustine understands this passage differently. He said that the disciples were scandalized when our Lord said that he would give them his flesh to eat because they understood this in a material minded way, as if they were literally to eat this flesh, just like the flesh of an animal. Our Lord rejected this interpretation and said, What if you should see the Son of Man ascending, with his entire body, to where he was before? Would you say that I intended to give you my flesh to eat like you do the flesh of an animal?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
