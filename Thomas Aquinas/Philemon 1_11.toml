[[commentary]]
quote='''
Second, there is the change in status. For if he had persevered in sin, he would not be worthy of leniency. Note that Paul says little and means much. For as Cicero taught, one ought to make little of one's own deed as much as possible. Thus the Apostle speaks lightly of his offence, saying, He once was useless to you, that is, harmful in taking away your possession, but now, converted from evil to the state of virtue, he is useful for the service of God and man. 2 Timothy 2:21: 'If anyone, therefore, has cleansed himself from these, he will be a vessel for honourable use...' Proverbs 25:4: 'Take away the rust from silver, and there shall come forth a most pure vessel.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Philemon.html'
source_title='Commentary on Philemon'
