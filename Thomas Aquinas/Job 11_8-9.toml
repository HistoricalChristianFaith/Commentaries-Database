[[commentary]]
quote='''
One should also not be surprised if the Creator is not known if creatures are not perfectly understood, because even if creatures were perfectly known, the Creator would still not be. For a cause can only be perfectly known through its effects when the effects equal in power to the cause. This cannot be attributed to God. So he continues, "He is higher than the heaven and what will you do? He is deeper than hell and from what will you know him? He is longer than the earth in measure and wider than the sea." He says these things metaphorically. For he does not mean that God, who is incorporeal, is divided into corporeal dimensions, but he describes the greatness of his power using the metaphor of the great size of a body. This is because no matter how great the quantities of bodies seem to be in height, depth, length or breadth, they are still deficient if compared to the greatness of the power of God who can make greater things. So he plainly attributed "omnipotence" to God before (v.7). From this he shows that God cannot be discovered perfectly in his creatures, because even given the fact that all creatures were perfectly known, one cannot know the power equal to that of God adequately from them. Can one take a measure to know the power of God which exceeds every creature? He clarifies this difficulty when he says, "what will you do?" and "from what can you know him?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
