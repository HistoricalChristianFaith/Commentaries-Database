[[commentary]]
quote='''
He shows then why although he was in a higher place in society he did not raise his hand against orphans. Even though he did not deliver them because of men, yet he did deliver them because of God whose judgments he feared, and so he then says, "For I always feared God like the swelling of waves over me." He speaks using the comparison of those sailing on the sea, who, when the swelling waves rise over the height of the ship, fear that the ship will be submerged by them. In the same way he feared divine threats, like waves swelling up. Also he submitted to divine authority, which forbids the oppression of orphans, and so he says, "and his weight," the authority of God who protects the orphans, "I could not bear," without bending my will to him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
