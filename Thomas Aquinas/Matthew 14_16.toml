[[commentary]]
quote='''
But Jesus said to them. Here he presents the distribution of food, and concerning this he does three things. First, the command of Christ is presented; second, the quantity of food; third, the manner and order of distributing. The second begins at they answered him etc.; the third at bring them here to me etc. They had said two things: first, that he should dismiss the crowds; likewise, that they should seek food for themselves. And Christ responds to these two points. You say, dismiss the crowds; but they have no need to go, because here is he who gives food to all flesh, Ps. 135:25. Likewise, you say that they should seek food, but there is no need, because you can give heavenly food; hence he says give them to eat yourselves. Hence an example is given that spiritual food should be preferred to bodily food.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
