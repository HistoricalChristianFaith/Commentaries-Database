[[commentary]]
quote='''
The burden of Babylon. Here he threatens against the Babylonians, who had captured the two tribes. And this is divided into two parts: in the first, he threatens the destruction of the enemy, in the second, he promises, from this, the comfort of the Jews: her time is near at hand (ch. 14). The first of these is divided into two. First, the title of the threat is set out, and the rebuke: the burden, that is, oppressing misery: if this people, or the prophet, or the priest shall ask you, saying: what is the burden of the Lord? You shall say to them: you are the burden (Jer 23:33). Second, the threat itself is set out: upon the dark mountain (Isa 13:2). And this is divided into three parts: in the first, he sets out the calling together of a ravaging army, namely, the Medes and Persians under Cyrus and Darius, who captured Babylon, as it says in Daniel 5:30–31; in the second, he shows the affliction of the punishment: howl (Isa 13:6); in the third, the subsequent desolation of Babylon: and they shall be (Isa 13:14). Concerning the first, he sets out three things. First, he calls together the army; second, he describes the coming of those who are called, where it says, the noise of a multitude (Isa 13:4); third, the command to those who come is decreed: the Lord of hosts (Isa 13:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
