[[commentary]]
quote='''
"Extend your mercy." Here he turns to prayer, and asks for the mercy of God. And first he asks his petition regarding others. Second, regarding himself, at "Let not the foot of pride come to me." He asks two things, corresponding to two kinds of people who dwell in the house of the Lord: for some know God through faith; some who are also justified cling to him. Those who do not know God are not in his house; but those who have faith can be subject to sin, and therefore he asks mercy for them. Hence he says: O Lord, to those who know you, through faith, namely -- and he calls this knowledge "science" because of firm adherence -- to these "extend," that is, expand, extend to them your mercy by having mercy on their sins: Is. 27: "It is not a wise people": Jer. 9: "Let him who glories, glory in this, to know and understand me." But to those who are "upright of heart," that is, who have a right heart and are confirmed to you through charity, "extend to them," that is, expand, "your justice," that is, the crown which they have merited; because these already merit the crown: 2 Tim. 4: "For the rest, there is laid up for me a crown of justice," etc. And therefore he asks just things for them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
