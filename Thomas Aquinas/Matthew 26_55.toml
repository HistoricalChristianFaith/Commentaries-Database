[[commentary]]
quote='''
In that same hour Jesus said to the multitudes. In this part he rebukes the servants: and he does two things. First, he recalls the deed; secondly, the unreasonableness of the deed, when he says you are come out as it were to a robber with swords and clubs to apprehend me. Job 16:10: he has gnashed upon me with his teeth, because they came out as if he were a robber; but they themselves were coming rather as robbers. A robber hides so as not to be captured; but Christ offered himself openly. And robbers, if they wish to harm, do not harm in public; but Christ offered himself. Hence he says I sat daily with you teaching in the temple, and you laid not hands on me; therefore you have come as robbers. For in order to give them the opportunity, he went out of the city. I sat daily with you teaching in the temple. Something similar is found at John 18:20: in secret I have spoken nothing. And he says teaching in the temple. This was his custom, always to teach in the temple. And you laid not hands on me. Hence it is clear that you came as robbers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
