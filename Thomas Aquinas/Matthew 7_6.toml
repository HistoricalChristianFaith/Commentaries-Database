[[commentary]]
quote='''
He continues: Give not to dogs what is holy. In this statement he shows that judgment should be circumspect. Note, therefore, what is meant by "holy" and what by "pearls". Augustine: "Holy things are to be kept inviolate and immaculate; precious pearls should not be held in low esteem." By dogs who tear with their teeth are signified heretics; by swine who trample under foot, the unclean. Therefore, to give holy things to dogs is to minister holy things to heretics. Likewise, if something spiritual is said and is scorned, it is given to swine. Or by holy things are meant the sacraments of the Church; by pearls the mysteries of truth. A dog is an animal totally unclean; swine are partly unclean, partly not. By dogs, unbelievers; by swine, wicked believers. Do not give dogs what is holy, i.e., the sacraments to unbelievers. Pearls, i.e., spiritual senses, should not be given to swine: "The animal man does not perceive the things that are of God" (1 Cor 2:14), i.e., lest perchance they scorn them: "He who is sated loathes honey" (Pr 27:7). Hence, turning to sin, they attack you, because they despise or resort to calumny. But why? Did not Christ say many good things to unbelievers, and they tore his words to pieces? I say that he did this for the sake of good men, who were with the wicked and who profited therefrom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
