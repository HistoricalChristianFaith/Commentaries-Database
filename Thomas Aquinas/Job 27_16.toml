[[commentary]]
quote='''
As the happiness of his sons and friends is frail and perishable, the same is true of the manmade riches he possesses. Among these are certain artificial riches like money, which was devised as the measure of the exchange of things, as Aristotle says. As to this he says, "If he heaps up silver like dust," that is, if he should acquire as great a supply of money as is had on earth. The same is also true for his natural riches, which provide for the natural necessity of men, like bread and wine, clothing and other things like this. As to these he says, "and has procured his clothing like dust," so that he should have as great a supply of clothes as the dust.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
