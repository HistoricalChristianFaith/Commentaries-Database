[[commentary]]
quote='''
Consequently the general maxim is presented: for to everyone that has shall be given, and he shall abound. This can be expounded in four ways. First, thus, according to Gregory: from him who does not have, nothing could be taken away; but it happens that someone has gratuitous gifts and does not have charity; hence all things will be taken from him, because he does not have them for his own benefit; 1 Corinthians 13:1: if I speak with the tongues of men and of angels, and have not charity, I am become as sounding brass or a tinkling cymbal. Hence if a man has charity, many goods are given to him, because he will receive the good of another, since he will rejoice in the good of another as in his own. Chrysostom expounds it of doctrine: he who has the grace of teaching and does not exercise it loses it. Another, who does not have it and exercises himself, acquires it, so as to become a doctor. Jerome expounds it thus: someone has talent and gives himself to idleness, and becomes crude and dull; but someone does not have talent and exercises himself, and acquires talent. And so to him who has diligence, knowledge and talent are given; and from him who does not have, even that which he has, namely talent, will be taken from him. Likewise, according to Jerome, it is expounded of faith, because to him who has faith, grace will be given; Ephesians 2:8: by grace you are saved through faith. Hence he who would not have faith, even if he had other things, without faith they would avail nothing. Hilary, however, expounds it of the people of the Jews and the Gentiles, because the Jews seemed to have the law of God and refused to obey, hence they became alienated; but the people of the Gentiles received what they did not have and entered into the blessing of the olive.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
