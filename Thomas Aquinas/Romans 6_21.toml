[[commentary]]
quote='''
Then when he says, what fruit therefore, he shows the effect of sin.
One effect he excludes, namely, a fruitful return, when he says, what fruit therefore had you, namely, when you were committing those sins. For the works of sin are unfruitful, because they do not help man to obtain happiness: their works are unprofitable works (Isa 59:6); woe to you that devise that which is unprofitable and work evil in your beds (Mic 2:1).
The effect he mentions is confusion, saying, in those things, namely, the sins, of which you are now, in the state of repentance, ashamed because of their baseness. After you instructed me, I struck my thigh; I was confounded and ashamed (Jer 31:19). You shall be ashamed of the gardens (Isa 1:29), namely, of the pleasure you had chosen.

Then he mentions the end of sin, saying, for the end of them, namely of sins, is death.
This of course is not the objective in the mind of the sinner, because he does not intend to incur death by sin; nevertheless, it is the end of those sins, because of their very nature they bring temporal death. For when the soul separates God from itself, it deserves to have its body separated from it. Sins also bring eternal death, because when one wills to be separated from God for a time, he deserves to be separated from him forever; and this is eternal death: they who do such things are worthy of death (Rom 1:32).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
