[[commentary]]
quote='''
Since our belief in the Trinity is shown by the above two statements, our Lord concludes to this belief, saying, Do you not believe that I am in the Father and the Father in me? It was explained above how this is to be understood. In Greek, the text reads: Believe, that is, believe me, that I am in the Father and the Father in me. Or, it is surprising that you do not believe that I am in the Father and the Father in me. Note that before our Lord was speaking only to Philip (v 8-10a), but from the point where he says, the words that I say to you (v 10b), he is speaking to all the apostles together. But if what I say to you is not enough to show my consubstantiality, then at least believe me for the sake of the works themselves: "The works which the Father has granted me to accomplish, these very works which I am doing, bear me witness" (5:36); "Even though you do not believe me, believe the works" (10:38).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F14.htm'
source_title='Commentary on John'
