[[commentary]]
quote='''
After he has treated prosperity lost he then speaks about adversity, concerning which he first places the impediments to action and effort. Man struggles to attain the effect of his action in two ways: in one way by his own courage, and against this he says, "The steps of his power will be extinguished," because courageous assertion cannot advance further. In another way man tries to attain something by wisdom, and regarding this he says, "and his own counsels will cast him down," when what he thought was useful becomes harmful to him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
