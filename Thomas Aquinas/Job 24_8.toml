[[commentary]]
quote='''
Clothes are not only necessary to keep warm against the cold, but also as a protection against the rain. Thus those left naked by thieves must not only be afflicted by the cold, but also get soaked by the rain. He expresses this saying, "they are soaked by the rain of the mountains." Men often flee to mountainous places which are more fortified from the fear of other thieves or enemies. There the rains are more frequent and severe because of the cold character of the climate, and naked men especially suffer. Moreover, there is some protection for nakedness if the one who does not have the covering of clothes at least does not the cover of a house, but against this he says, "and without any cover," either of clothing or of a house, "they cling to the rocks," because they hide in caves of stone which one finds in mountainous regions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
