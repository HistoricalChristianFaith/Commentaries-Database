[[commentary]]
quote='''
As to things which pertain to abundance of provisions, and thus he says: "and upon all the ships," in which provisions are borne, "of Tharsis," that is, of the sea, below: "howl, you ships of the sea, for the house is destroyed, from whence they were wont to come" (Isa 23:1).

"And upon all that is fair to behold": this pertains to the placating of enemies, or the increase of fighters: "who can despise the people of the Hebrews, who have such beautiful women?" (Jdt 10:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
