[[commentary]]
quote='''
And it came to pass, when Jesus had finished these parables, etc. Here the effect in the crowds is set forth: a twofold effect, namely, of wonder and of scandal. And first the place is described; secondly, the wonder; thirdly, the disapproval. He says therefore: it came to pass, when Jesus had finished these parables, he departed from there. It should be noted that it does not seem that he departed immediately. Hence the order of the history is not preserved; but he departed because they were not fit to understand; therefore he betook himself to other things, according to Sir 32:6: where there is no hearing, pour not out words. And 22:9: he who tells a story to a fool speaks to one who sleeps.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
