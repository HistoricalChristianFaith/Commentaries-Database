[[commentary]]
quote='''
Then follows the examination through his own confession. And first, the questioning is set forth regarding the testimony; secondly, regarding the principal matter. The second is at and the high priest said to him etc. He says therefore: the high priest rising up said to him: Answerest thou nothing to the things which these witness against thee? That he rose was from impatience and fury, hearing that Christ was not being convicted: and when he says answerest thou nothing etc., he does not say this to excuse him, but to catch him in his words; Isaiah 32:6: the fool will speak foolish things, and his heart will work iniquity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
