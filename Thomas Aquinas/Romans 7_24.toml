[[commentary]]
quote='''
Then, when he says, unhappy man that I am, he deals with liberation from the law of sin and does three things:
first, he poses a question;
second, he answers, at the grace of God;
third, he draws a conclusion, at therefore, I myself.
In regard to the first he does two things.
First, he declares his misery when he says: unhappy man that I am. This wretchedness is the result of sin which dwells in man: either in the flesh only, as in the just man, or also in the mind, as in the sinner: sin makes nations miserable (Prov 14:34); I am become miserable, and am bowed down even to the end (Ps 37:7).
Second he asks: who will deliver me from this body of death? This question seems to express the desire voiced in the Psalm: bring my soul out of prison (Ps 142:7).
Yet it should be remembered that in man's body one can consider the very nature of the body which agrees with the soul. It is not from this that he desires to be separated: we do not wish to be unclothed, but to be clothed over (2 Cor 5:4). One can also consider the corruptible body which is a load upon the soul (Wis 9:15).
Hence it is significant that he says: from this body of death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
