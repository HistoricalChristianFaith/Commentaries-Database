[[commentary]]
quote='''
Second, he assigns the cause, saying, why is it that although they observed the law, they did not fulfill the law? Because they did not observe the law in the proper way.
And this is what he says: because they sought it not by faith, i.e., they sought to be made just not through faith in Christ but as it were of works. For they followed the figure and repudiated the truth: for by the works of the law no human being shall be justified before him (Rom 3:20).
Third, he explains the cause assigned: first, he presents the explanation, saying, they have stumbled at the stumbling-stone, i.e., Christ, who is likened to a stumbling-stone; for just as a stone against which a man stumbles is not guarded against because it is small, so the Jews, seeing Christ clothed with our weakness, did not guard against stumbling over him: his look was as it were hidden and despised. Whereupon we esteemed him not (Isa 53:3); before your feet stumble upon the dark mountains (Jer 13:16), i.e., upon Christ and his apostles who are called dark mountains, because their great dignity is hidden.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
