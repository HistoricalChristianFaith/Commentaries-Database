[[commentary]]
quote='''
He then shows why he should shun this saying, "For I did not give my tongue to sin, waiting and cursing his soul." Truly man naturally desires those things which he enjoys, and he expresses his interior desire in words. Therefore, it follows that if someone should rejoice in someone else's evil, that he would desire it, and consequently, in cursing him, he would invoke evil on him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
