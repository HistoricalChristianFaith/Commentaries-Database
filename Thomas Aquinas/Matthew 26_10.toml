[[commentary]]
quote='''
And Jesus knowing it, said to them. Here is set forth the excuse of the woman: and he does two things. First, he excuses and commends her; second, he touches upon her reward, amen I say to you etc. And first he excuses her; second, he responds to the disciples' objection; third, he explains what he had said. He says, then, why do you trouble this woman? The Lord is always the advocate of this woman, because in Luke 7:39 the Pharisee accused her of sin, saying: this man, if he were a prophet, would know surely who and what manner of woman this is that toucheth him etc., and the Lord excused her through her love. Likewise, in Luke 10:40, Martha also accused her of idleness, and the Lord excused her through contemplation. Here the disciples reproach her for the pouring out of ointment, and the Lord excuses her for her devotion, saying: why do you trouble this woman? Job 6:27: you rush in upon the fatherless, and you endeavor to overthrow your friend. She hath wrought a good work upon me; Proverbs 3:27: do not forbid him to do good who is able; if thou art able, do good thyself also. Chrysostom says: it sometimes happens that someone does a work good in its kind, and perhaps could have done better; hence one should act differently before the deed and after the deed. Hence after the deed, the person should be commended for the deed; but if he had come before the deed, he should have been counseled to do what is better. Hence it is to be believed that if she had sought counsel from the Lord beforehand, he would have told her to give to the poor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
