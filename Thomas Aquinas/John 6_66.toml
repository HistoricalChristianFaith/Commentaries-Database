[[commentary]]
quote='''
Our Lord next mentioned the cause of their unbelief, which was the withdrawal of attracting grace. Thus he said: This is why I said to you. As if to say: Thus it was necessary to tell you what I told you before: that no one can come to me, i.e., through faith, unless it be given him by my Father. It follows from this, according to Augustine, that the act of believing itself is given to us by God. Why it is not given to everyone we discussed above, where our Lord used almost the same words (6:44). They are repeated here for two reasons. First, to show that Christ received them in the faith more for their advantage and benefit than for his own: "It has been granted to you to believe in him" (Phil 1:29). As if to say: It is good for you to believe. Thus Augustine says: "It is a great thing to believe: rejoice, because you have believed." Secondly, to show that Christ was not the son of Joseph, as they thought, but of God, for it is God the Father who draws men to the Son, as is clear from what has been said.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
