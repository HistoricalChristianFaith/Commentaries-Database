[[commentary]]
quote='''
Then the confirmation of the deed is set forth. And first, from the name: "for this cause that field was called Haceldama, that is, the field of blood, even to this day"; namely, up to that time in which this Gospel was written.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
