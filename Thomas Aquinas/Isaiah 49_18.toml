[[commentary]]
quote='''
906. Second, as to the inhabitation of men, and concerning this, he does three things.

First, he sets out the uniting of the citizens: lift up your eyes round about, and see all these are gathered together: look about you, O Jerusalem (Bar 4:36).

Second, the reinhabitation of the city, showing that it will be inhabited: I live, he says in the manner of an oath, you shall be clothed with all these as with an ornament, as a bride with her garments, so shall the city be adorned by her citizens, below: he has clothed me with the garments of salvation (Isa 61:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
