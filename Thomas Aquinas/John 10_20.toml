[[commentary]]
quote='''
The opinion of one party to the argument was false. About this he says, Many of them said. He says, Many, because as we read in Ecclesiastes (1:15): "The number of fools is infinite." They said, He has a demon, and he is mad, for it is the habit of the foolish to always give an evil interpretation to matters about which they are in doubt; whereas the opposite should be done. Thus they revile whatever they do not know, as we read in the letter of Jude. And so because they were incapable of understanding our Lord's words - for "the light shines in the darkness, and the darkness did not comprehend it" (1:5) - they blasphemed, saying, he has a demon, and he is mad. And they try to turn others away from him, saying Why listen to him?

These blasphemers accuse Christ of two things. First, that he has a demon. As if to say: He is not speaking due to the Holy Spirit, but from a wicked spirit. Something similar is found in Acts about Paul: "He seems to be a preacher of foreign divinities" (17:18). Now the fact is that a person who has his own and familiar demon is always spiritually mad, but not always mad in a bodily way. But some can be possessed by a demon, and these are always mad even in a bodily way. Thus it was said of Christ "He has become mad" (Mk 3:21). Secondly, to show that Christ has a demon in this way, they say, and he is mad. "Your great learning is turning you mad" (Acts 26:24). Yet their blasphemy is not surprising, because they are sensual and, as we read in 1 Corinthians (2:14): "The sensual person does not perceive those things that pertain to the Spirit of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
