[[commentary]]
quote='''
He enlarges their fault from the condition of the persons on whom they inflict those injuries. People are usually compassionate to orphans because of their weakness of age and lack of parents. Against this he says, "They have stolen the ass of the orphans," because they make it wander off so that they might steal it with no compassion for the orphans. Similarly, people often have pity on widows because of the frailty of their sex and because they are deprived of the comfort of husbands, but against this he says, "and they take the widow's ox as a deposit," burdening her as though under some pretense of justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
