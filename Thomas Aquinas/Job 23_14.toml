[[commentary]]
quote='''
Moreover, sometimes especially in the case of a wise man it happens he has ruled his own will according to his own virtue but cannot do anything else. But he disproves this is true in God when he says, "When he has accomplished his will in me, and I am before him like many other similar things are before him," as if to say: The reason that he does not bring more adversity against me, is not because he cannot do more, but because he does not will to.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
