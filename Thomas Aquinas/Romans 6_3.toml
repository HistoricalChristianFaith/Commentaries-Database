[[commentary]]
quote='''
Then when he says, know you not, he proves the antecedent, namely, that the faithful are dead to sin:
first, he presents the fact he uses to prove his point;
second, he proves it, at for we are buried together.

First, therefore, he says: know you not, as if to say: what I am about to propose to you is so obvious that you cannot fail to see it—if anyone does not recognize this, he is not recognized (1 Cor 14:38)—namely, that all we who are baptized in Christ Jesus: which can be interpreted in three ways. First, as indicating that baptism was instituted by Jesus Christ: make disciples of all nations, baptizing them (Matt 28:19); second, as indicating that it is conferred in the name of Christ: in the name of Jesus Christ they were baptized (Acts 8:12); third, in Christ Jesus, i.e., as indicating baptism into some likeness of Christ Jesus: for as many of you as were baptized into Christ have put on Christ (Gal 3:27).
Are baptized in his death, i.e., into a likeness of his death as re-presenting in ourselves the very death of Christ: always carrying in the body the death of Jesus (2 Cor 4:10); I bear on my body the marks of Jesus (Gal 6:17). Or in his death, i.e., by virtue of his death: he freed us from our sins by his blood (Rev 1:5).
Hence, from the side of Christ hanging on the cross flowed blood and water after his death (John 19:34). Therefore, just as we are configured to his death, inasmuch as we have died to sin, so he has died to his mortal life, in which there was the likeness of sin, although no sin was there. Therefore, all we who are baptized are dead to sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
