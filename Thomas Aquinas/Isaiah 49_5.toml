[[commentary]]
quote='''
Concerning the first, he does two things. First is set out the claim of the prophet who puts forth his labor in preaching, even though, due to the fault of those who heard it, it bore no fruit, and he concludes: therefore my judgment, for myself, is with the Lord, before him, and my work with my God, as though pleasing to him: the founder has melted in vain (Jer 6:29).

Second, he sets out the response of God: and now says the Lord.

And first, the acceptance of the prophet's claim is signified: that formed me from the womb to be his servant, that I may bring back Jacob unto him, as if to say: who chose me from my mother's womb for this, that I may bring back his people to him; and, yet, Israel will not be wholly gathered together, to him through my preaching, and, yet, I am glorified: the Lord God is my strength (Hab 3:19);
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
