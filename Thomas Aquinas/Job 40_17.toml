[[commentary]]
quote='''
Animals who perform coitus of this kind press the tail between their legs when they perform the sexual act, and so he says, "He stiffens his tail like a cedar," which he says because of its great size. Third, he describes the organs serving coitus when he says, "the sinews of his testicles are joined together," that is, they twist, as the Philosopher says in The History of Animals III about the testicles of all animals who walk and generate other animals.

"He stiffens his tail like a cedar," because those he casts into this sin he finally holds bound together in the sweet pleasure of their desire; "the sinews of his testicles are joined together," because if anyone cast down in this vice desires to flee, he is ensnared a second time on various occasions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
