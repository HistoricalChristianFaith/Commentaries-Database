[[commentary]]
quote='''
He says, Lord, my servant is lying paralyzed at home. In this is shown the centurion's kindness, because he entreats in this way for a servant. Hence he does what is stated in Sirach (33:31): "If you have a faithful servant, let him be to you as your own soul." And that servant is said to be the lower part of the soul. He says, therefore, that he is lying down and in terrible distress. He speaks from affection, because when one loves someone, he regards a slight sickness as grave. The lower part of the soul, therefore, is lying down, when it cannot arise: "The flesh lusts against the spirit" (Gal 5:17) and is in terrible distress. Wanton men rejoice: "They rejoice in doing evil, and delight in the perverseness of evil" (Pr 2:14). But those in pain, since they sin from weakness, are sorrowful when they fall. And so they are terribly distressed in their sorrow.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
