[[commentary]]
quote='''
Hence, he adds, For whoever enters God's rest also ceases from his works: because just as God worked six days and rested on the seventh, so by the six days the present time is signified, because it is a perfect number. Therefore, one who works perfectly, rests from his works on the seventh day, as God did from His; but not from all works, because there are certain works, for example, to see, to love and to praise: 'And they rested not day and night saying, Holy, holy, holy, Lord God Almighty' (Rev. 4:8), but from laborious works: 'But they who hope in the Lord shall renew their strength; they shall take wings as eagles, they shall run and not be weary, they shall work and not faint' (Is. 40:31).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
