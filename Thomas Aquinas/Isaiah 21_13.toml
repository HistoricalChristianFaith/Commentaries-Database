[[commentary]]
quote='''
524. The burden in Arabia. Here he threatens against the Arabs.

And first, he indicates the cause of destruction: that when they offered bread to the fleeing sons of Israel, they took away their water. Hence he places the flight of the Jews: O you, Jews, in the forest, of Arabia, of Dodanim, the name of the place: they wandered in a wilderness, in a place without water: they found not the way of a city (Ps 106[107]:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
