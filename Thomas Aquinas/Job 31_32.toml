[[commentary]]
quote='''
As for foreigners, he then says, "The pilgrim did not remain outside," so that he was not received in my house; "my door was open to the traveler," so that entry was not difficult for him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
