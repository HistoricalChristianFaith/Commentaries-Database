[[commentary]]
quote='''
Then he applies a remedy, when he says "now we charge." And first, on the side of those who are sinning; second, on the side of the others, at "but you, brethren."

He says, therefore, "now we" severely "charge those who are such," speaking as a prelate, "and beseech them" lovingly, as their father, that "they would eat their own bread," not another's bread but what is due them, namely what has been lawfully acquired, "with silence," i.e., without being troublesome, without running about. "The service of justice is silence" (Isa 32:17). "Idleness teaches great wickedness" (Sir 33:29).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
