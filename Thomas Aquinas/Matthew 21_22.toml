[[commentary]]
quote='''
Likewise, he touches upon the power of faith with respect to prayer: "for all things whatsoever you shall ask in prayer believing, you shall receive;" above (2:7): "Ask, and you shall receive."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
