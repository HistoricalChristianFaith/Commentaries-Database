[[commentary]]
quote='''
This hope is confirmed by the manifestation of the promise; hence he says, but has in due times manifested his word. And he describes this manifestation in three ways.

First, from the time; hence he manifested when his Word became incarnate. Therefore, he says, in due times, i.e., when man became convinced of his pride, through which he sinned. Hence a physician, first of all, convinces his patient in order to heal him more easily. For man took pride in his knowledge; but he became convinced of his ignorance before the time of the law, when he fell into idolatry and vices against nature. He also took pride in his strength, but became convinced of his weakness during the time of the law: but when the time had fully come, God sent his Son, born of woman, born under the law, to redeem those who were under the law (Gal 4:4).

Second, this manifestation is described from its manner, because it occurred through public preaching: go into all the world and preach the Gospel to the whole creation (Mark 16:15). Hence he says, in preaching: a dispensation is committed to me (1 Cor 9:17).

Third, from its author; hence he says, according to the commandment of God our Savior: he will save his people from their sins (Matt 1:21); he is a chosen instrument of mine to carry my name before the gentiles and kings and the sons of Israel (Acts 9:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
