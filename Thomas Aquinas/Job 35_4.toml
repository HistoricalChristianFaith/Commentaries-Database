[[commentary]]
quote='''
He concludes from this that he is compelled to answer because of their absurdity, and so he says, "That is why I will answer your discourses and at the same time those of your friends," who could not convince you when you said such things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
