[[commentary]]
quote='''
The burden of Tyre. In this part he threatens against the Tyrians, who were joined to the people of God by association in trade. And this is divided into two parts: first, he threatens the destruction which was carried out by Nabuchodonosor; in the second part, he promises liberation: and it shall come to pass after seventy years (Isa 23:17). Concerning the first, he sets out three things: first, the sadness of the compassionate; second, the flight of the fearful: pass over the seas (Isa 23:6); third, the punishment of destruction: the Lord has given a charge (Isa 23:11).

Concerning the first, he sets out three things. First, the sorrow of the traders, setting out their mourning: howl, you ships, namely Carthaginian ships: the merchants of the earth have been made rich by the power of her delicacies (Rev 18:3); and the motive of their mourning: the house is destroyed, that is, Tyre, from whence was wont to come, trade; and also the manner in which they learned of it: from the land of Cethim, that is, Greece: Alexander . . . coming out of the land of Cethim, had overthrown Darius (1 Macc 1:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
