[[commentary]]
quote='''
He also says that it is universal; hence he says, "He shall judge the whole world," and not the Jews alone. Gen. 18: "Far be it from you, Lord, to destroy the just with the wicked." Also, that it is just; hence he says, "in equity, he shall judge the peoples in justice." He says two things: namely equity and justice, because justice involves the execution of things that are just in themselves, which are not just in every case; because rules and measures concern contingent matters, and they cannot be adapted to every particular case, but in some cases they are set aside, just as there are certain rules, measures, and conclusions that in a particular case are not observed on account of something. But the application of these universal principles to particular facts pertains to equity. Jerome says, "He shall judge the peoples in equity," because equity pertains to particular cases, and in a certain way restricts and regulates justice. And these things can be explained of Christ: "and he himself shall judge the world in equity." Is. 59: "He put on justice as a breastplate, and a helmet of salvation upon his head."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
