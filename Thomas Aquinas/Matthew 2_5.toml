[[commentary]]
quote='''
(5) They told him: "In Bethlehem of Judah." Here the truth is presented: first, the truth (v. 5); secondly, it is confirmed by a prophecy (v. 6). It should be noted that Christ willed to be born in Bethlehem for three reasons: first, to avoid glory. For this reason he chose two places: one in which he willed to be born, namely, Bethlehem; the other in which he suffered, namely, Jerusalem. This, of course, is against those who seek glory, who wish to be born in high places and refuse to suffer in a place of honor: "I do not seek my glory" (Jn 8:50). Secondly, to confirm his doctrine and show its truth. For if he had been born in some large city, the power of his doctrine could have been ascribed to human power: "You know the grace of our Lord Jesus Christ" (2 Cor 8:9). Thirdly, to show that he was of the house of David: "Joseph and Mary went to Bethlehem to be enrolled there, because they were of the house and family of David" (Lk 2:4). It also befits a mystery, because Bethlehem means house of bread; and Christ is that "living bread which came down from heaven" (Jn 6:51).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
