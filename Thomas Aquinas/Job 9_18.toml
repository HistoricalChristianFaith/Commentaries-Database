[[commentary]]
quote='''
So he not only suffers exteriorly but also interiorly, like an invalid, who does not know that he will achieve health from a bitter cure, would not only suffer from the bad taste of the medicine, but also in his spirit. He continues, "He will not permit my spirit to rest," for a spirit rests although the flesh is afflicted because of the hope of an end to the affliction, according to what the Lord teaches in Matthew, "Blessed are you when they utter evil against you," and later "Rejoice, for your reward is great in heaven." (5:11, 12) So when I am struck down exteriorly and I do not rest interiorly, "he fills me with bitterness," interiorly and exteriorly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
