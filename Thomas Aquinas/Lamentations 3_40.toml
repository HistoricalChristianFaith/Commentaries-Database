[[commentary]]
quote='''
Faith being restored, one now turns to divine mercy. First, a preparation for prayer is considered, second, the prayer itself.

On preparation for prayer, a place is afforded through change of life. "Let us test and examine our ways, and return to the Lord." That is, by searching out our past sins. Again: "Let us test and examine our ways." Namely, as to the Lord God, in a desire of our heart seeking divine aid. Then, accepting such one can return to the Lord God by doing good deeds. Since, Jeremiah claims: "know and see that it is evil and bitter for you to forsake the Lord your God" (Jeremiah 2:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
