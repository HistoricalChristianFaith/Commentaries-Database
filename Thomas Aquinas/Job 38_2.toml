[[commentary]]
quote='''
Once a dispute has been determined by the opinion of the judge, nothing else remains to be said unless the statement of the determination is rejected. So the Lord first rejects the determination of the question which Eliud had made. He rejects it because Eliud had enveloped the true opinions which he had proposed with many false and frivolous words, and so the text continues, "He said: Who is that man who envelops his opinions with inept arguments?" In his arguments Eliud had accused Job of saying he wanted to dispute with God and said that he was just so vigorously that he seemed to detract from the justice of the divine judgment. But Eliud enveloped these opinions with many presumptuous and even false statements, as should be clear already, which are called here inept arguments because every lack of order proceeds from a defect of reason.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
