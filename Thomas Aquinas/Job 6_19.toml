[[commentary]]
quote='''
Therefore, he did not have support in himself, in his servants or in his relatives. As a further consequence, he demonstrates that he did not have help from his other friends saying, "Look for the paths to Teman, the roads to Saba," lands where he seemed to have had his greatest friends, for even Eliphaz had come from Teman. "And wait for a short while," to see if any friends come by these roads to bring me help.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
