[[commentary]]
quote='''
I was hungry. Here nothing else need be said except that he speaks differently to the good and to the wicked: because above he stated each thing separately, here he joins many together; hence sick and in prison. And because he joins these two, it should be said that he proceeds in the manner of a good judge who condemns reluctantly and rewards generously: hence he expands the words of reward and abbreviates the words of condemnation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
