[[commentary]]
quote='''
"I will break them." Here he excludes their power of resisting; as if to say: they will not resist me, because "I will break them," that is, I will so diminish their forces that "they shall not be able to stand." Ps. 35: "All the workers of iniquity have fallen; they were cast out and could not stand." Job 38: "The exalted arm shall be broken," that is, they will not endure against me, or they will not be able to resist. Lev. 26: "You shall pursue your enemies, and they shall fall before you." And this is so because they will come into my power; and this is what he says, "They shall fall beneath my feet." We also ought to do this concerning evil movements and sins and demons. Mal. 4: "You shall trample the wicked when they shall be ashes under the soles of your feet." Lk. 10: "Behold, I have given you power to tread upon serpents and upon all the power of the enemy, and nothing shall hurt you." Gen. 4: "Its desire shall be under you, and you shall have dominion over it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
