[[commentary]]
quote='''
But he who was sown upon good ground etc. Having expounded the threefold disposition toward evil, he adds the disposition toward good, which he distinguishes by three effects, because first he hears, then further, and understands, and then he bears fruit and yields, some a hundredfold, some sixtyfold, and some thirtyfold. Let it be expounded as above. It should be known, however, that Augustine, in Book II, chapter 23 of the City of God, sets down the exposition of certain persons who wished to interpret it thus: that on the day when the Lord will come to judgment, many saints will pray for many; and according as they are better, more will be given to them. Hence to some thirty will be given, to some sixty, and to some a hundred. But this is against the faith, because mortal sins will not be forgiven, since they cannot be forgiven without charity; for mortal sins are contrary to charity, but venial sins are not; therefore, etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
