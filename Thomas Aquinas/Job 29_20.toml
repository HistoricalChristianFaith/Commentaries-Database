[[commentary]]
quote='''
Third, he describes the enduring character of his reputation saying, "my glory always will be renewed," by good works which he proposed to multiply. Fourth, he describes the endurance of his power saying, "and my bow will be restored in my hand." "Bow" here means power, for Eastern people use such weapons in wars.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
