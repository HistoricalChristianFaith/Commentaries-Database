[[commentary]]
quote='''
Lest Job perhaps should presumptuously say that he knew the works of God perfectly, he continues mockingly, "Show us what we should say to him," as if to say: If you are so wise that you know all the works of God and you can argue with him on this subject, teach us so that we can answer him. He shows they need this when he says, "We who to be sure are enveloped in darkness," as if to say: We need you very much to show us what you said before because we are completely ignorant of them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
