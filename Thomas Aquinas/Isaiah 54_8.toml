[[commentary]]
quote='''
And as to their duration, in a moment, as if to say: for a short time you have felt my wrath in respect to the time in which I will have mercy on you, above: hide yourself a little for a moment (Isa 26:20). All these things which have been said are mystically explained of the calling of the gentiles, for heathendom was at first barren, but afterwards gathered many children, according to the Gloss.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
