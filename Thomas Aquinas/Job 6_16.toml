[[commentary]]
quote='''
That they might not believe they did this with impunity, he adds, "Those who fear frost will be covered by snow," as if to say: He who fails in justice and mercy because of fear for a lesser danger, exposes himself to still greater dangers. So, Job's relatives, too, who passed him by unwilling to show any compassion for him, will themselves sustain suffering in their own losses. He continues showing their danger will be in the future and without remedy, "At the time when they will be broken up," i.e., when they will suffer dangers, "they will perish," totally.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
