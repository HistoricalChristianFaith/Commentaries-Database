[[commentary]]
quote='''
In some things he had led me to good effects even beyond my own intention, and to express this he says, "when his lamp," his providence, "shone over my head," for he directed my mind toward many good things which my mind did not attain. In certain respects, however, he was directed by God as though instructed by him about what he ought to do, so he then says, "in his light," by his instruction, "I was walking," I was proceeding, "in darkness," in doubts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
