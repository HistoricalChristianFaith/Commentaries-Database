[[commentary]]
quote='''
645. Second, as to disobedience, to whom he said. Hence he first sets out the precept, this is my rest, refresh the weary: because you did it to one of these my least brethren, you did it to me (Matt 25:40); second, their contempt, and they would not hear: but the house of Israel will not hearken to you: because they will not hearken to me (Ezek 3:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
