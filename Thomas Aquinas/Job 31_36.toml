[[commentary]]
quote='''
If in the testimony of this book, by the certain manifestation of the truth I am also shown to be guilty, I want to endure the punishment, and so he says, "Let me carry it on my shoulders." If, however, after the truth has been manifested I appear worthy of praise, then let me receive the crown of reward, and so he then says, "and let it encircle me like a crown." In this he shows his desire that one who was condemned unjustly by his friends, be saved by the just judgment of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
