[[commentary]]
quote='''
All you beasts of the field. Here he threatens lack of salvation to those who hold his counsel in contempt.

And first, he designates the punishment of killing: all you beasts of the field come to devour, their corpses: say to every fowl (Ezek 39:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
