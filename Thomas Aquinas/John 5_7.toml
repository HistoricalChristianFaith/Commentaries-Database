[[commentary]]
quote='''
Then (v 7), the answer of the sick man is given. Two reasons are given for the length of his illness: his poverty and his weakness. As he was poor, he could not afford a man to plunge him into the pool; so he says, Sir, I have no one to plunge me into the pool. Perhaps he thought, as Chrysostom says, that Christ might even help to put him into the water. Someone else always reached the pool before him because he was weak and not able to move fast; so he says, By the time I get there, someone else has gone in before me. He could say with Job: "I cannot help myself" (Jb 6:13). This signifies that no mere man could save the human race, for all had sinned and needed the grace of God. Mankind had to wait for the coming of Christ, God and man, by whom it would be healed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
