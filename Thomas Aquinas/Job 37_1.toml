[[commentary]]
quote='''
Now this is the most wonderful thing that earthly and corruptible man is advanced to the possession of spiritual and heavenly things, and so he says, "About this," that man can ascend to possess the light, "my heart trembled," from the fear of wonder and astonishment, "and leapt out of its place," so that it not only desires and eagerly strives after those things seem connatural to it according to the sensible life, but also is transported to spiritual and heavenly things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
