[[commentary]]
quote='''
Since, then, Eliud abused the words of Job and was eager to impose on him what he himself did not think or had not expressed in his words, it is clear that the whole subsequent discussion was not against Job. Yet since Eliud thought Job was of such great perversity that he reckoned the judgment of God to be unjust, he scorned him as unworthy to challenge him to a dispute on this subject, but calls on other wise men to decide the question, and so he says, "Therefore, prudent men," you who understand, "hear me." For as the heart is the principle of corporeal life, so the intellect is the principle of the whole intellectual life, and so he used the heart above for the intellect saying, "I have a heart just like yours." (12:3) In his argument Eliud first proposes what he intends to prove, namely, that there cannot be injustice in divine judgment. For God is himself the one to whom the worship of piety is due, and through his omnipotence he governs all things, establishing for men the laws of justice. Therefore it would be against his divinity if he were to favor impiety, and so he says, "Let impiety be far from God." It would also be against the rule of his omnipotence if he would stoop to injustice, and so he says, "and (let) evil (be far) from the Almighty." After he rejects divine injustice, he shows the manner of divine justice saying, "For he will render the work of a man to him," because he bestows good and evil on him according to his deeds. Since some of those who do good things do them better than others, and some of those who do evil deeds sin more than others, he then says, "and he will render to each one according to his ways," to those who are better, better things; to those who are worse, worse things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
