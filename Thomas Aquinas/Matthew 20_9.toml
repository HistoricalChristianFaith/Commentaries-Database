[[commentary]]
quote='''
Then follows the execution: when they came who had come about the eleventh hour, whether Christians, or men in decrepit age, they received each a denarius.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
