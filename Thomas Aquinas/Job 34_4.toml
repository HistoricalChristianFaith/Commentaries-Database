[[commentary]]
quote='''
He shows what these words pertain to when he says, "Let us choose what is right for us," as if to say: Let us judge from the common consensus what is more true, "and among ourselves let us determine what is better," what Job has said or what I am about to say against him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
