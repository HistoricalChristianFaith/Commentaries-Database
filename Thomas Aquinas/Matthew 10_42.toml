[[commentary]]
quote='''
Therefore, he adds, and whoever gives to one of these little ones, i.e., to believers, as it says below (25:40): "Amen I say to you, as long as you did it to one of these, my least brethren, you did it to me"; as if to say: I do not care whether they were great or small. Someone could say: I am poor; I have nothing to give. So he adds, a cup of water. He does not say, "hot water" on account of a lack of wood, so that he could not have an excuse. Hence he wants to say: the slightest thing you do will have its reward. And he confirms this, saying, Amen, I say to you, he shall not lose his reward; Isaiah (40:10): "Behold, the Lord comes..., and his reward is with him, and his recompense before him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
