[[commentary]]
quote='''
And he sets out the return of the captives: behold these shall come from afar, from the east, and from the sea, the west: I will bring them from the north (Jer 31:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
