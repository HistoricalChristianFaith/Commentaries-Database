[[commentary]]
quote='''
Then another example is given, namely, based on holiness, when he says, Have you not read in the Law how on the Sabbath the priests in the temple profane the Sabbath, and are guiltless? In Leviticus it was commanded that the offering customary on other days be doubled on the Sabbath; yet it was done in the temple and on the Sabbath, because it was done out of deference to the temple and to God; hence the priests were excused. The example is cited, because the apostles were dedicated to one greater than the temple, namely, to Christ. Hence he said: Have you not read in the Law how the priests profaned the Sabbath? unless it was for the sake of the temple.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
