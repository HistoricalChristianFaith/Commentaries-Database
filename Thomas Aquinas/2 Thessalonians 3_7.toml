[[commentary]]
quote='''
Then when he says "for you yourselves," he explains the last thing he said, namely "according to the tradition," showing what this tradition is and how they received it. Now the tradition is that they were not idle or curious. And first, he shows how they received it by example; second, how they received it by word. And first, he shows that he avoided troublesomeness; second, how he did so; third, he gives the reason.

He says, therefore, "you yourselves know" the tradition that you received, because prelates should not be imitated in every respect but in those things that are according to the rule of Christ. "Be imitators of me, even as I am of Christ" (1 Cor 4:16). And in what respect? "For we were not disorderly among you." For the Thessalonians were very generous. "Concerning the love of the brotherhood I have no need to write to you, for you yourselves have learned from God to love one another" (1 Thess 4:9). And for this reason poor people were living in leisure, and because of their leisure they devoted themselves to undue activities that did not pertain to them. And this was troublesomeness. And this is why he says "we were not disorderly." "And that you endeavor to be quiet" (1 Thess 4:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
