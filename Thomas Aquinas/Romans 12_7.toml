[[commentary]]
quote='''
In regard to administering the sacraments he adds: or ministry, in ministering, i.e., if one has received the grace or office of the ministry, such as the bishop or priest who are called God's ministers—you shall be called the priests of the Lord, the ministers of our God (Isa 56:6)—let him perform his office diligently in ministering: fulfill your ministry (2 Tim 4:5).

Second, he touches on matters pertinent to human affairs in which one person can help another: first, with respect to knowledge both speculative and practical. With respect to speculative knowledge he says: or he who teaches, i.e., who has the office or grace of teaching, let him use it in teaching, i.e., teach diligently and faithfully: behold, you have taught man (Job 4:3); go, therefore, and teach all nations (Matt 28:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
