[[commentary]]
quote='''
The second impediment is when he responds to what he has heard in a loud and abusive way. To exclude this he says, "Answer, please, without quarreling." To quarrel, according to St. Ambrose, is "the attack on truth accompanied by relying on shouting."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
