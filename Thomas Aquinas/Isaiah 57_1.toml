[[commentary]]
quote='''
The just perishes. Here he shows the difference between those who obey divine counsels and those who do not obey, as to deliverance from dangers.

And first, he assigns the difference,

second, he sets out the confirmation of each part: but he that puts his trust in me (Isa 57:13).

Concerning the first, he does two things:

first, he promises rest from dangers to the just;

second, he takes away from the impious hope of deliverance: but draw near hither (Isa 57:3).

Concerning the first, he does two things.

First, he sets out the tribulation of the just, because they are killed without any reckoning: men of mercy are taken away, from the present life and from their land they are taken captive as if they were not just, from before the face of evil, that is, from the presence of the wicked: why look you upon the scorners, and hold your peace when the wicked devours the man that is more just than himself? (Hab 1:13); or, from before the face of evil, that is, lest they be changed to evil: he was taken away, lest wickedness should alter his understanding (Wis 4:11).

Note on the words, the just perishes, and no man lays it to heart (Isa 57:1), that in the passion of Christ, man ought to lay to heart

first, love, so as to love him in return: put me as a seal upon your heart (Song 8:6);

second, bitterness, so as to sympathize with him: remember my poverty, and transgression, the wormwood and the gall (Lam 3:19);

third, fortitude, so as to suffer bravely: for think diligently upon him that endured for you such opposition from sinners against himself that you be not wearied, fainting in your minds (Heb 12:3);

fourth, its benefit, so as to give thanks: I will go up into the palm tree, and will take hold of the fruit thereof (Song 7:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
