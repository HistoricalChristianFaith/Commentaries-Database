[[commentary]]
quote='''
Then they also shall answer him. And note that just as the good abbreviate their good deeds, so the wicked abbreviate their faults; hence they say: Lord, when did we see thee hungry or thirsty? etc. They say everything together; in which it is given to understand that they are unwilling to examine their consciences, against Isaiah 46:8: return, you transgressors, to the heart. Hence, when they must return, they return to very little.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
