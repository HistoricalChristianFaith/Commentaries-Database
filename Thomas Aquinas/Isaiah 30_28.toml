[[commentary]]
quote='''
He also sets out wrath in his work: his breath, that is, his indignation, overflowing even to the midst of the neck, that is, it will lead to their extinction, above: there shall pass through Judah, overflowing wrath (Isa 8:8).

686. Third, he sets out the effect of his indignation on the wicked, the destruction of the nations: to destroy the nations: Lord, in your city you shall bring their image to nothing (Ps 72:20[73:21]); and the cessation of tyrants: and the bridle of error: he has put a bridle into my mouth (Job 30:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
