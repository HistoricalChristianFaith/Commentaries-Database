[[commentary]]
quote='''
And the king answering shall say to them. He satisfies this wonder, because when a man humbles himself and God exalts him, when a man considers himself worthless and God praises him; hence, as long as you did it to one of these my least brethren, you did it to me; above, 10:40: he that receiveth you, receiveth me, because the head and the members are one body. And he says brethren, because they are brothers who do the will of God; hence above, 12:48, it is said that stretching out his hand toward his disciples he said: these are my brethren. In this it is noted that one should give to the good; Sirach 12:4: give to the good, and receive not a sinner. And should one give to a sinner? One should give to him when he is in extreme necessity, but more and sooner to the just; therefore he says my brethren. For many come who are not brothers of God; hence 1 John 4:3: every spirit that dissolveth Jesus is not of God. Hence, other things being equal, we should do more for the good; yet in their need we must also give to the wicked in time of necessity, not to foster sin, but to sustain nature. Are all God's brothers? Yes; but some according to nature, some according to grace: according to nature, all, both good and wicked; 2 Corinthians 11:26: perils from false brethren; but according to grace, only the good; Romans 8:29: he is the firstborn amongst many brethren. And to these especially one should show mercy and give aid; hence the Apostle in Galatians 6:10 says: whilst we have time, let us work good to all men, but especially to those who are of the household of the faith. But why does he call them least? He says this according to the opinion of the common people. It is certain that men who are little for God's sake are considered least, James 3. Likewise, least on account of humility; above, 11:25: thou hast hid these things from the wise and prudent, and hast revealed them to little ones. And he speaks from the lesser case, because some could say: if I had done this for an equal, or for some of the great, I believe it would be rewarded. Therefore the Lord says, not only for the greater, but for the imperfect; therefore he says least.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
