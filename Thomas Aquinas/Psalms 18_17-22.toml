[[commentary]]
quote='''
"He rescued me." Here he proves how the tribulations are many. And first from the condition of the enemies. Second, from their persecution, at "because they were strengthened." The condition of the enemies is very harmful, because they are powerful and hating; hence, "he rescued me from my most powerful enemies and from those who hated me." The powerful ones mystically are carnal sins: Sir. 18: "If you give your soul its desires, it will make you a joy to your enemies." Is. 49: "Shall the prey be taken from the strong?" Those who hate are the demons. Ex. 1: "The Egyptians hated the children of Israel." Ps. 88: "I will strike his enemies before his face," etc. Next the persecution is set forth. A person can be freed from enemies in two ways: either by not allowing himself to be conquered, or by fleeing. But he excludes both from himself. First, because they were strong and strengthened, that is, multiplied, and overcame him, nor could he flee; and this is what he says, "they anticipated me," blocking the way to flee: Lam. 4: "Our persecutors were swifter than the eagles of heaven; they pursued us over the mountains." And this "in the day of affliction," because a person is weaker when he is afflicted: Lam. 1: "All her persecutors overtook her in the midst of her straits." He sets forth the double help of the deliverer. First against prevailing enemies; hence he says, "and the Lord became my protector," so that they may not harm me: Ps. 63: "You have protected me from the assembly of the malignant," etc. Second, against the cunning; hence there follows, "he brought me forth into a broad place," out of the narrow place in which I was, not knowing what to do, giving me ways to know what to do. Or into the breadth of charity: Ps. 118: "Your commandment is exceedingly broad." The cause of deliverance is twofold: namely divine grace and human merit. Hence he says, "he saved me because he willed me." This is the most powerful cause of deliverance, namely his will: Eph. 1: "Who works all things according to the counsel of his will." And yet subsequently some human merit cooperates there: 1 Cor. 15: "The grace of God in me was not in vain." And therefore he adds, "The Lord will reward me," etc. Where he does three things. First he proposes the merit. Second, in what it consists. Third, he sets forth the way of arriving at this merit. The second, at "because I kept," etc. The third, at "because all his judgments." Human merit consists in two things: namely in doing good and in avoiding evil: Ps. 33: "Turn away from evil and do good." And therefore regarding the first he says, "The Lord will reward me according to my justice," which he himself worked in me: Wis. 3: "The souls of the just are in the hand of God, and the torment of malice shall not touch them," etc. Prov. 11: "To him who sows justice, there is a faithful reward." Regarding the second he says, "according to the cleanness of my hands he will reward me," that is, innocence: Job 22: "The innocent shall be saved, and he shall be saved by the cleanness of his hands." "He shall not be deprived of good things," etc. Ps. 83. Now this justice consists in observing the ways of God: Ps. 118: "I have run the way of your commandments." And therefore he says, "because I kept the ways of the Lord": Job 23: "My foot has followed his steps; I have kept his way and have not turned aside from it." "And because I have not acted wickedly," departing from God, because through sin a person departs from God and is defiled: Ps. 43: "Our heart has not turned back." How did he arrive at this? Because "all his judgments are in my sight." It avails greatly for doing good and avoiding evil to think upon divine judgments: Job 19: "Flee from the face of the sword, because the sword is the avenger of iniquities." "And I kept this, because I did not push away his statutes from me," deliberately sinning: Job 21: "They said to God, 'Depart from us.'" And there follows: "a flood shall come upon them." He who sins from weakness or ignorance easily obtains pardon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
