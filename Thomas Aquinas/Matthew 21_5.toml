[[commentary]]
quote='''
"Tell the daughter of Sion" etc. Announce to the daughter of Sion: this refers to the people of Jerusalem who were subject to Mount Sion. Likewise, it signifies the whole Church, because Sion is interpreted as "watchtower." "Announce his doings among the Gentiles," Ps 9:12. The dignity is foretold: "behold your king." These Jews had long suffered tyrants; hence they expected a king, as was said (Jer 23:5): "A king shall reign, and shall be wise." And he presents four things which commend the dignity of a king; correspondingly, four things which are found in tyrants. First, kinship, because a man is more attached to those who are more closely related. Deut 17:15: "Thou mayest not make a man of another nation king, unless he be thy brother." Hence he says "behold your king." That is, of your own people. But sometimes kings degenerate into tyrants, because they seek their own advantage, which is contrary to the manner of a king; therefore it says "he cometh to thee," i.e., for your benefit. Hab 3:13: "Thou wentest forth for the salvation of thy people, with thy Christ." "Meek." Meekness befits a king, because to inflict punishment savagely is an act of ferocity. Prov 20:28: "Mercy and justice preserve the king." Therefore David was beloved by the people, because he was meek. Likewise, humility is required, because the Lord rejects the proud; therefore he says "sitting upon an ass." Above (11:29): "Learn of me, because I am meek and humble of heart."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
