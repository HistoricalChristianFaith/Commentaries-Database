[[commentary]]
quote='''
Then the judgment of the one examining the wine is given. First, he inquires into the truth of the fact; secondly, he gives his opinion.

He says, Now when the head waiter tasted the water made wine, and not knowing where it came from, because he did not know that the water had miraculously been made wine by Christ, although the servants knew, the reason being, since they had drawn the water, he called the groom over, in order to learn the truth and give his opinion of the wine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
