[[commentary]]
quote='''
Third, he manifests it because even if they are punished for their sins, he has mercy on them if they wish to do penance, and so he says, "and if the kings were in chains," placed in prison, "and were bound with the bonds of poverty," if they suffered poverty when they were tied up in prison. This is like a chain which binds men so that they cannot fulfill their work and they are more confined by many miseries besides.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
