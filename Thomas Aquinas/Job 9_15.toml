[[commentary]]
quote='''
Sometimes although one is not powerful or wise, he is still not afraid to argue with a judge because of the security of his conscience. But Job excludes this reason for disputing with God from his case when he says, "Even if I were somewhat just, I could not answer him at all," with God examining me in defense of my own justice, "but will rather ward off my judge by earnest prayer," not asking for justice, but for mercy. He says clearly, "Even if I were somewhat just," to show the uncertainty of human justice by using the words, "even if I were." As St. Paul says, "I have nothing on my conscience, but I am not justified in this," (1 Cor. 4:4) to show that the justice of man is insignificant and imperfect when related to the divine testing of it he says following Isaiah, "All our just deeds", in his sight, "are like polluted cloth." (64:6)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
