[[commentary]]
quote='''
So you also, when you shall see all these things, know ye that it is nigh, even at the doors. Just as something is said to be near when it is at the doors; James 5:4: Behold the hire of the laborers who have reaped your fields, which by fraud has been kept back by you, cries, and the cry of them has entered into the ears of the Lord of Sabaoth. Note that Augustine emphasizes the word all, when he says: when you shall see all these things etc. Above he had said that the Lord is near; but what does this mean? For the Lord is always near. Therefore he says: if we wish, let us say that none of this pertains to the end of the world, but to the coming of Christ through the Church; hence what was said, they shall see the Son of man coming in the clouds, i.e., in preachers, with great power, since the Lord gives the word to those who preach with great power; and then he will come with majesty, since they give him reverence. Yet according to the exposition of others, we can refer it to the end of the world, and say otherwise. According to Augustine's exposition, he gives us to understand something that is near, i.e., that there are certain signs that it is near; hence what was said, they shall see etc., is referred to all the things said above, namely, to the signs, lightning, and earthquakes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
