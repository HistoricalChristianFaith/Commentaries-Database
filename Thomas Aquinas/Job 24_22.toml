[[commentary]]
quote='''
Not only has he been unfruitful, but he has also been harmful like a tree bearing poisonous fruit, and so he says, "he has thrown down the powerful man in his strength," that is, he did not use his power to aid the oppressed, but more to oppress the powerful. The harm he has worked on others also returns to his own harm, because he cannot live in security since he fears being harmed by those he has harmed, and so he says, "and when he rises up," i.e. when he suffers no adversity, "he will not believe in his own life," for he will not be free from care about his own life according to what Eliphaz said above, "The sound of terror is always in his ears, and when he is at peace, he always expects treachery." (15:21)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
