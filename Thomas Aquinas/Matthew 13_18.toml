[[commentary]]
quote='''
Hear you therefore the parable of the sower etc. Here the exposition is set down. And first he concludes that they were worthy; secondly, he expounds. He says therefore, hear you therefore etc., because you are worthy to hear, and not only to hear, but to hear through me; Proverbs 1:5: the wise man hearing will be wiser.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
