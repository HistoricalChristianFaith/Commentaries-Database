[[commentary]]
quote='''
The effect of this turning away was that many were converted to the faith. Three points are made about this conversion. First, many imitated his works; so he says, and many came to him, namely, by imitating his works: "Come to me, all who labor and are heavy laden, and I will give you rest" (Matt 11:28). Secondly, many professed him in word, and they said, John did no sign. By this they profess Christ's superiority to John. The reason for this was that John was sent as a witness to Christ; thus he should show that he was worthy to be believed and his testimony would be shown to be true. Now this is fittingly done by holiness of life. On the other hand, Christ came as God; consequently, it was fitting that he show the signs of divine power. And so John stood out by the sanctity of his life; Christ, however, in addition to this, performed works which manifested his divine power. This was in accord with the practice of the rulers of antiquity that when in the presence of a higher power a lesser power did not display the insignia of its power. Thus, in the presence of the Dictator, the Consuls took down their insignia. So it was not fitting that John, who possessed less power, because he was a precursor and witness, should employ the insignia of divine power; only Christ should have done this. They profess the truth of John's witness to Christ, saying, but everything that John said about this man, Christ, was true. They were saying: Although John did no sign, he nevertheless said all things truthfully about Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
