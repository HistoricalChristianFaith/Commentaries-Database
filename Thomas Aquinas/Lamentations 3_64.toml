[[commentary]]
quote='''
Vindication from adversaries is here sought. This is due to a security from prayers heard, and vindication considered. Such is also from their foretelling, than their praying.

"Thou wilt requite them, O Lord, according to the work of their hands." Namely, as to their penalties. For, Psalm 28:4 states: "Requite them according to their work, and according to the evil of their deeds."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
