[[commentary]]
quote='''
Besides, I will not be embarrassed to tell you what I have heard from others, putting them forward as my authority, because "Wise men confess and do not hide their fathers," from whom they learned wisdom. It is truly the lot of the ignorant and the proud to attribute what they have learned from others to themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
