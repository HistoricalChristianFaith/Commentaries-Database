[[commentary]]
quote='''
Furthermore, you owe them charity; hence, esteem them very highly in love, that is, before others. Finally, because of their work, be at peace with them. Yet some act against this. "They hate him who reproves in the gate, and they abhor him who speaks the truth" (Am. 5:10). "One who rejoices in wickedness will be condemned" (Sir. 19:5). Nevertheless, you should be at peace with them because of their work of correction, for this work properly belongs to their office. "I am for peace; but when I speak, they are for war" (Ps. 120:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
