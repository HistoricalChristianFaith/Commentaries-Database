[[commentary]]
quote='''
This is he of whom it is written. Here he proves John's excellence: first, by a text; secondly, from his special privileges (v. 11). He says, therefore: I have said that he is more than a prophet, concerning whom Malachi (3:1) speaks: Behold, I sent my messenger [angel], who shall prepare your way before you... In this text John's outstanding qualities are mentioned: first, because he calls him an angel. For an angel is higher than a prophet, because as a priest is midway between a prophet and the people, so a prophet between angels and priests. But the angel is between God and prophets; hence Zechariah (1:9) says: "The angel who spoke in me." Angel is the name of an office, not of a nature; hence John is called an angel from his office. For there is a difference between an angel and a prophet, because the angels see openly; hence it says below (18:10): "I say to you, that their angels always behold the face of my Father in heaven." Angels always see God's face, but the prophets do not. Hence, as angels always see the face of the Father, so John saw Christ in a special way; and because it was a special way, he says my. He also says, before my face. When a king goes somewhere, many people precede him; but the more familiar ones go before his face. So John is considered more honorable, because he was sent before his face; for the nearer one is, the more honorable he is. Finally, he prepared the way, because he baptized; hence, he says, who shall prepare your way before you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
