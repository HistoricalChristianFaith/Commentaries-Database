[[commentary]]
quote='''
Yet to those who have been so constituted in unhappiness, God first confers this benefit of recognizing the past sins for which they have been punished, and so he says, "he will show them their works," for he will make them know what they have done which is unjust. So he continues, "and their crimes," because he will force them to recognize that the works which they did were criminal acts. He shows then what their sin was, saying, "because they were violent." For the special sin of the powerful is to inflict violence on their subjects, using their power like the law of justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
