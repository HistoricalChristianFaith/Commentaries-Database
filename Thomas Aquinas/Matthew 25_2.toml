[[commentary]]
quote='''
There are also presented two things in which they differ: in interior discretion and in exterior solicitude. As to the first he says and five of them were foolish and five wise; Proverbs 10:23: wisdom is prudence to a man. That man is prudent who does not wish to lose for nothing what he does. Therefore it was said above at 10:16: be wise as serpents. Or thus: the foolish are those who turn away from God, either through a bad and not upright intention, or through false doctrine; Proverbs 9:13: a foolish woman, and clamorous, and full of allurements, and knowing nothing at all, sits in the doors of her house. According to Origen, he who has one virtue has all: hence it cannot be that one sense is ordered without the others being ordered. Likewise, as it is also said in James 2:10, whosoever shall offend in one point is become guilty of all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
