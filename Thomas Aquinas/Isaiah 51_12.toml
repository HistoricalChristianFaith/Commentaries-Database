[[commentary]]
quote='''
932. I myself. Here is set out the response of the Lord speaking to the people.

And first, he promises comfort: I will comfort: blessed be the God and Father of our Lord, and below this, and the God of all comfort: who comforts us in all our tribulation (2 Cor 1:3–4).

933. Second, he excludes fear of their enemies, setting out their fragility: who are you, that you should be afraid of a mortal man, and of the son of man, who shall wither away like grass, above: all flesh is grass, and all the glory thereof as the flower of the field (Isa 40:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
