[[commentary]]
quote='''
He shows this source excels all human cognition, and so he then says, "She is hidden from the eyes of all the living," because, "the fount of wisdom is the word of God on high." (Qoheleth 1:5) There have been some augurs of omens who believed that certain birds of prophecy participated in a certain effect of wisdom over men, and in as much as they believed men could know the future of the future from them. But he shows that wisdom exceeds this soothsaying saying, "and she is concealed also from the birds of the air." Therefore the origin of wisdom exceeds the heavenly bodies which move these birds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
