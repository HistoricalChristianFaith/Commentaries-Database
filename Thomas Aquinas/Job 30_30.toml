[[commentary]]
quote='''
His adversity was also partly the result of weakness of the body, and so first as to exterior infirmity he says, "My skin turned black on me," from the interior corruption of the humors. Then, as to the interior infirmities he continues, "and my bones dried out from the heat," so great an amount of inordinate heat rested on me that it dried up the marrow of bones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
