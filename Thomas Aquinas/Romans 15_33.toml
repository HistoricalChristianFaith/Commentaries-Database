[[commentary]]
quote='''
Then when he says, now the God of peace, he shows that he is praying for them, saying: now the God, i.e., the giver of peace, be with you all, by the fact that you are at peace with one another: agree with one another and the God of peace will be with you (2 Cor 13:11). He adds, amen, i.e., let it be so: let the people say: amen (Ps 106:48).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
