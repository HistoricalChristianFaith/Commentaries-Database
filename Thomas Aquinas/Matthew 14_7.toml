[[commentary]]
quote='''
And there follows whereupon he promised with an oath, etc. Behold the rash promise and the reckless oath. Sir 23:9: let not your mouth be accustomed to swearing, for in it there are many falls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
