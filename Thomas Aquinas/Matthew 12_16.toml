[[commentary]]
quote='''
How? He ordered them not to make him known. Why? In order to give us an example to avoid human glory, as it says above (6:1), and to spare the Pharisees, who were slandering him for his actions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
