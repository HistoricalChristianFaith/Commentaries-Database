[[commentary]]
quote='''
Third, he proposes the incomprehensibility of his works when he says, "Who will be able to examine his ways," that is, sufficiently search the nature of his works? From this he concludes that he cannot be convicted of injustice, and so he says, "Or who dares to say to him: You have done evil?" To be able to condemn someone for evil, he must be subject to a higher power. He must both be bound by the laws of others and his deeds must be known. These have no place in God, as has already been established.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
