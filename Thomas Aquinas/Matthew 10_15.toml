[[commentary]]
quote='''
But what is this? Will they not fare worse? Truly, I say to you, it shall be more tolerable on the day of judgment for the land of Sodom and Gomorrah than for that city, because, as it says in John (15:22): "If I had not come and spoken to them, they would have no sin." For they sin more who hear and do not, than those who have never heard. Therefore, perhaps those people from Sodom had not heard, so it will be more tolerable for them. Again, although they were unclean, they offered hospitality. Hence for this reason it will be more tolerable for them. But the opposite is stated in Genesis (c. 19), namely, that the sin of Sodom is the gravest sin, as is clear from the punishment. I answer that it is the gravest in the class of carnal sins. But as in directly against God, such as idolatry, is graver. Or you might answer that he is not comparing sin with sin but with circumstances, because those to whom they preached sinned, which was not true of the others. Likewise it refutes certain heretics who said that all sins are equal, and all punishments, and all merits, and all rewards. Therefore, he excludes this, when he says, more tolerable..., because it will be worse for certain sinners.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
