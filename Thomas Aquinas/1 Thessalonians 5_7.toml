[[commentary]]
quote='''
And the reason for this is the suitability of a certain time; those who sleep or get drunk do so at night. But the night is not for us: so then, let us not sleep, as others do. And so Paul says: for those who sleep, sleep at night, that is, at night they get some rest and during the day they are active. "When the sun rises, they get them away and lie down in their dens" (Ps. 104:22). And again "Man goes forth to his work and to his labor until the evening" (Ps. 104:23).

There are also some who do not drink during the day because of the business which must be accomplished; but they are not so careful at night. "The eye of the adulterer also waits for the twilight" (Job 24:15). So sleep and drunkenness are suitable to nighttime, since drunkards are occupied with sin during the night of unbelief and the darkness of sin without having any regard for the future because of the love they have for present concerns. "They have become callous and have given themselves up to licentiousness, greedy to practice every kind of uncleanness" (Eph. 4:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
