[[commentary]]
quote='''
But perhaps Job could say that they have no reason to reproach him or his words. To reject this he continues, "For you have said: My speech is pure." He makes this interpretation according to what Job had said already, "You will find no evil on my tongue, nor will stupidity resound on my lips" (6:30); and "I am clean in your sight." Job had not expressly said this, but Sophar wanted to take this interpretation from his words to say that Job had argued that he was not punished for sin. (10:14) Also from his statement, "Know I have done nothing wicked," (10:17) or "Have I not dissembled? Was I not silent?" (3:26) he infers the same interpretation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
