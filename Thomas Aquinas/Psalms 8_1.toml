[[commentary]]
quote='''
Above he set forth a Psalm in which David prayed concerning his persecution; here he sets forth a Psalm of thanksgiving: and first a Psalm is presented for the benefits bestowed upon the whole human race. Second, another for the benefits bestowed upon him for the destruction of enemies, or for the goods granted. Third, for the evils removed, at "I will give thanks": for here he expresses the affection of a man considering the benefits of God bestowed upon the human race, and giving thanks. The title is "Unto the end, a Psalm of David, for the winepresses," and since the rest has been explained above, I shall explain here only the last part. Here it should be noted that in Dt. 16 it says: "Seven days you shall celebrate the feast of tabernacles, when you gather in your produce from the threshing floor and the winepress," etc. For it should be known that David had a special devotion in celebrating the feasts, and he did something special for the praise of God. Now the feast of tabernacles was the principal one. And this took place during the vintage in commemoration of the divine benefit, when he led the children of Israel out of Egypt in tents, and brought them into the promised land where there are fruits: and therefore it was necessary that they have the most beautiful fruits, at which time were the winepresses; and therefore it says "for the winepresses." This is the literal sense. But spiritually, the winepress is the Church: Is. 5: "He planted a choice vineyard, he built a winepress in it"; Mt. 21: "He planted a vineyard, and dug a winepress in it." He says therefore "for the winepresses," that is, for the Churches of the world: and the Church is called a winepress, because just as in a winepress the wine is separated from the grape skins, so in the Church the good are separated from the wicked by the work of ministers: even if not always in place, yet in disposition. For the same reason it is also called a threshing floor: because there the grain is separated from the chaff. Likewise, from the words literally set down, the spiritual sense is separated. Likewise the winepresses are the martyrdoms, in which the separation of souls from bodies takes place, while the bodies of those who are trampled by affliction and persecution for the name of Christ remain crushed on the earth, but their souls flow forth to rest in the heavens.

This Psalm is divided into two parts. First the Psalmist marvels at the divine excellence. Second, at his clemency, at "What is man." Concerning the first he does two things. First he shows that the majesty of God is admirable. Second, that it is manifest, at "Out of the mouths of infants." Concerning the first he does two things: first he sets him forth as wonderful. Second he makes clear the reason for what was said, at "For your magnificence is elevated," etc. He says therefore, "Lord" of all: Esth. 13: "You are Lord of all"; but especially "our Lord," we who worship you, who cling to you. Jerome has "our Ruler": Jgs. 8: "I will not rule over you, nor shall my son, but the Lord shall rule over you." "How admirable is your name," etc., namely of your divinity: Ps. 92: "Wonderful are the surges of the sea," etc. Gen. 32: "Why do you ask my name, which is wonderful?" Likewise, of the incarnate Christ: Is. 9: "His name shall be called Wonderful." But is it only in Judea, as the Jews say, or in Africa, as the Donatists claim? No; but "in all the earth": Mal.: "From the rising of the sun to its setting, great is my name among the nations." The reason for the wonder is added: "For your magnificence is elevated," because in the heavens your greatness appears. Wonder occurs when someone sees an effect and is ignorant of the cause. Therefore something is wonderful in two ways: either because the cause is totally unknown, or because it does not produce an effect that perfectly manifests the cause. The first is not the case with God: because he produces an effect: Rom. 1: "The invisible things of God are known through the things that have been made," etc. He produces, I say, an effect, yet not one that perfectly manifests the cause: and therefore he remains admirable: and this is what he says: "your magnificence," that is, your praise or your power, which can do great things, "is elevated above the heavens," surpassing the making of the heavens beyond all proportion. Hence he excludes the error of those who say that God is the form of the heaven: for according to this he would be proportionate to the heavens. Likewise of those who say that he acts by necessity of nature: because he would not extend himself above the heavens: yet he can make something infinitely greater. Or "above the heavens," that is, above the Scriptures, because he is more than is praised in the Scriptures: Sir. 43: "Glorifying God as much as you can, he will still surpass it, and admirable is his magnificence." Or "your magnificence," that is, your Son, God and man, "is elevated" in the ascension "above the heavens": Eph. 4: "He who descended is the same who ascended above all the heavens," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
