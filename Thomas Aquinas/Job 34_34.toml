[[commentary]]
quote='''
But lest Eliphaz seem to have said this because he doubted his own justice and the truth of his words, he consequently intends to assert that Job lacks both wisdom and understanding, and because of this he judges him unworthy to debate with him. The opponent in a disputation must have the sharpness of understanding required especially to find reasonable ways to prove his proposition. So he says, "Let intelligent men speak to me," and make objections against me. The other part of the debate belongs to the one answering who must especially have the wisdom required to judge well about the things which he heard and so he says, "and let a wise man hear me," for I am an opponent ready to discuss.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
