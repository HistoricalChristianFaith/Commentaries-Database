[[commentary]]
quote='''
905. And first, as to the rebuilding of its walls, he sets out the divine intention: behold, I have graven you in my hands, as if to say: I hold you so in memory as one writes or makes some sign in his hand so that he may remember something; your walls are always before my eyes, as if to say: already I see the rebuilding of your walls: in his hands he hides (Job 36:32); a thousand years before your eyes (Ps 89[90]:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
