[[commentary]]
quote='''
Then he sets forth the reason: "for he knew that for envy they had delivered him." From what did he know? For he had heard many good things about him, and he saw him constant; hence he knew that for envy they had delivered him. For just as the envy of the devil was hostile to the first man, so the envy of these men was bound to be hostile to Christ. So indeed Joseph was delivered up by his brothers out of envy, Genesis 37:28.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
