[[commentary]]
quote='''
Then follows the response: Jesus saith to him: Thou hast said it. Note that when something was against him, he was silent; but as soon as the power of the Father was adjured, he responds. Hence he always sought the glory of the Father; John 8:50: I seek not my own glory. And concerning this, first the response is set forth; secondly, the manifestation. He says therefore: Jesus saith to him: Thou hast said it, which can be explained as Christ not asserting but leaving it in doubt; above at 7:6: give not that which is holy to dogs. Or it can be read assertively: thou hast said it, i.e., it is true; and this is clear because it says in Mark 14:62: I am. Then he shows the evidence: nevertheless I say to you, hereafter you shall see the Son of man sitting on the right hand of the power of God. And he clearly wishes to show that he is the Son of God, according to two authorities. One is in Psalm 110:1: the Lord said to my Lord: Sit at my right hand. And through this he had shown above at 22:42-46 that Christ was the Son of God. The other is Daniel 7:7: I beheld in the vision of the night; and lo, one like the Son of man came with the clouds of heaven etc. So, I say, he says, namely, thou hast said it; but you do not know the truth. Attend, because the truth will be made manifest, because you shall see the Son of man sitting on the right hand of the power of God. Because he said sitting on the right hand, Chrysostom explains that sitting at the right hand signifies royal dignity; Isaiah 9:7: upon the throne of David, and upon his kingdom he shall sit. Or to sit at the right hand is to be in the full beatitude of power, or in the better goods: for the right is the nobler part; therefore it signifies greater dignity, not because he has greater power, but equal; below at the last chapter, verse 18: all power is given to me in heaven and in earth. Likewise, concerning his power he says: coming in the clouds of heaven. But what does it mean when he says hereafter you shall see? etc. It should be noted that what he says in the clouds can be referred to the last coming, or to the daily coming. The last coming will be in a cloud; Acts 1:11: as you have seen him going into heaven; and above at chapter 24 it is said that he will come in the clouds. In another way it can be explained of the daily coming, concerning which Job 9:11 says: if he come to me, I shall not see him. And this coming is in the clouds, i.e., in the apostles and sacred doctors. Of these it is said at Isaiah 60:8: who are these, that fly as clouds? These are called clouds because they ascend on high. Likewise, clouds are fruitful. The first pertains to the loftiness of life, the second to the fruitfulness of doctrine. And they are clouds of heaven, i.e., heavenly, because they bore the image of the heavenly. But what does hereafter you shall see mean? I.e., immediately after the passion he converted some to the faith, others by the evidence of his works. Hence some were converted on account of their faith, and some on account of good works. Likewise, if it is referred to the last coming, Origen says: all the time of the world compared to eternity is nothing, like one moment. Psalm 90:4: a thousand years in thy sight are as yesterday, which is past. Therefore he says hereafter, because the time until the judgment is nothing compared to eternity. Nevertheless, after you shall have departed from me, nothing remains except that you will know me openly, because I will come in the clouds of heaven. And then you will know me to be the Son of man. A similar manner of speaking is found above at chapter 23, verse 39: you shall not see me henceforth till you say: Blessed is he that cometh in the name of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
