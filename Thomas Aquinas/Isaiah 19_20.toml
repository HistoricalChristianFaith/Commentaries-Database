[[commentary]]
quote='''
The third sign is that they call on the help of God, they shall cry to the Lord; a Savior, Jesus: he shall cry to me, and I will hear him (Ps 90[91]:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
