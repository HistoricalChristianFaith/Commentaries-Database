[[commentary]]
quote='''
Then he narrates what was done with it. And first he states the deed; secondly, what came of it. He says: "and after they had consulted together etc." Why did they do this? It must be said that God so arranged it, that this deed should be kept in memory. Hence they bought with them the potter's field, to be a burying place for strangers, not for those who were of the country, but for foreigners. According to the mystery, this is fitting, because through the blood of Christ not only justification was hastened, but the repose of death; Apocalypse 14:13: "from henceforth now, saith the Spirit, that they may rest from their labors." Or it may be that the strangers are those who do not have their own dwelling there; Psalm 120:5: "woe is me, that my sojourning is prolonged." But these are buried together with Christ. The Apostle, Romans 6:4: "you are buried together with Christ." That field is the holy Church. Hence above at 13:44: "the kingdom of heaven is like unto a treasure hidden in a field." That potter is Christ. Hence it is said at Jeremiah 18:6: "as clay is in the hand of the potter, so are you in my hand, O house of Israel."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
