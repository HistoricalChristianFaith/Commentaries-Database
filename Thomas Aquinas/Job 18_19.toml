[[commentary]]
quote='''
But since parents also live in their children he rejects this saying, "His seed will not exist," because his sons will be dead, "nor offspring in his people," since neither grandsons nor great-grandsons will remain, nor even his relatives, and so he then says, "nor any remain in his territory," neither those related by blood nor members of his household by whom his memory may be kept.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
