[[commentary]]
quote='''
Then he sets forth the end of both, at even as the weeds therefore are gathered up, etc. And first as to the wicked; secondly, as to the good; thirdly, he rouses them to a spiritual understanding. He says therefore even as the weeds are gathered up and burnt with fire, so shall it be at the consummation of the world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
