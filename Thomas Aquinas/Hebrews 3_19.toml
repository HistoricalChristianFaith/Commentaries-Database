[[commentary]]
quote='''
Hence, it is clear that they could not enter into His rest because of their unbelief. Therefore, he says, we see, because we have experienced that they could not enter because of their unbelief. Or we see by their punishment that they could not enter because of unbelief.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
