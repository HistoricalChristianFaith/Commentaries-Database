[[commentary]]
quote='''
637. But these also. Here he threatens against those among the two tribes who disdain the predictions of the prophets; and first, against the princes, second, against the city or against the people, woe to Ariel (ch. 29). The first of these is divided into two parts. First, he sets out the threat; second, the consolation: give ear (Isa 28:23). Concerning the first, he does two things. First, he denounces the sin and threatens destruction at the same time; second, he excludes remedy: wherefore hear the word of the Lord (Isa 28:14). Concerning the first, he does two things. First, he denounces their lack of knowledge; second, their contempt of teaching: for command (Isa 28:10).

638. Concerning the first of these, he does two things. First, he denounces their fault, first setting out the error of them all together: but these also have been ignorant through wine: wine, and drunkenness (Hos 4:11), make one to fall away from God; second, the fault of their teachers: the priest and the prophet have been ignorant, as to ignorance of what is to be believed; they have gone astray, as to ignorance of what is to be done; him that sees, that is, God who sees all things. Hence the explanation of this can be found in: her priests have despised my law, and have defiled my sanctuaries (Ezek 22:26).

640. Note on the word, drunkenness (Isa 28:7), that the wicked are inebriated on the wine, first, of material liquor: be not drunk with wine, wherein is luxury (Eph 5:18); second, of carnal delight: come, let us be inebriated (Prov 7:18) with wine; third, of spiritual error, above: they have caused Egypt to err in all its works, as a drunken man staggers and vomits (Isa 19:14); fourth, of divine punishment: he has inebriated me with wormwood (Lam 3:15). The saints are also inebriated, first, with the tears of compunction, above: I will inebriate you with my tears (Isa 16:9); second, with the chalice of suffering: your chalice which inebriates me, how goodly is it (Ps 22[23]:5); third, with the incentive of love: eat, O friends, and drink, and be inebriated (Song 5:1); fourth, with a torrent of happy delight: they shall be inebriated with the plenty of your house (Ps 35:9[36:8]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
