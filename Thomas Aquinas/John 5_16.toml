[[commentary]]
quote='''
Next (v 16), we have the persecution of Christ, begun because he performed a work of mercy on the Sabbath. Thus the Evangelist says, For reasons like this the Jews began to persecute Jesus, because he performed such works on the Sabbath. "Princes have persecuted me without cause" (Ps 118:161).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
