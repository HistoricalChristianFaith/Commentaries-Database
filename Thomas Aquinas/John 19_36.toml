[[commentary]]
quote='''
2461 This truth is not just guaranteed by the testimony of the apostle; there is also a prophecy of scripture. Thus he says, these things took place that the scripture might be fulfilled. Here again, as before, the phrase that the scripture might be fulfilled, indicates the sequence of events. The Evangelist cites two authorities from the Old Testament. One refers to his statement that they did not break his legs and is found in Exodus (12:46), "You shall not break a bone of it," that is, the Passover lamb, which was a prefiguration of Christ, because as we read in 1 Corinthians (5:7), "Christ, our paschal lamb, has been sacrificed." It was commanded that the bones of the Passover lamb should not be broken in order to teach us that the courage of the true Lamb and unspotted Jesus Christ would in no way be crushed by his passion. The Jews were trying to use the passion to destroy the power of Christ's teaching, but his passion only made it stronger: "For the word of the cross is folly to those who are perishing, but to us who are being saved it is the power of God" (1 Cor 1:18). This is why Jesus said before: "When you have lifted up the Son of man, then you will know that I am he" (8:28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F19.htm'
source_title='Commentary on John'
