[[commentary]]
quote='''
That we are not carrying on a worldly war he proves when he says, for the weapons of our warfare are not worldly [carnal]; and first of all, from the weapons of warfare, as a fighter has weapons suitable to his warfare. Now it is plain that the weapons of those who fight according to the flesh, or wage war, are riches, pleasures, and worldly and temporal honors and power. But since our weapons are not of this sort, for the weapons of our warfare are not worldly, but have divine power [are mighty to God], i.e., according to God or to the honor of God, therefore, we do not war according to the flesh.

But secondly, when he says, but have divine power to destroy strongholds, he indicates the power of spiritual armor, which is evident from its threefold effect. The first effect is that rebellious persons are put to shame by those arms; in regard to this he says, to destroy strongholds. As if to say: the power of God is quite capable of destroying the rebellious: "That he may be able to give instruction in sound doctrine and also to confute those who contradict it" (Titus 1:9); "See, I have set you this day over nations and over kingdoms, to pluck up and to break down, to destroy and to overthrow, to build and to plant" (Jer. 1:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
