[[commentary]]
quote='''
Verse 4 views the effect of divine blows. It is like a livid spot on a person's body, the effect from a rod inflicting blows. So, about this are three more views.

Second is the siege of those people already weakening. Since Verse 5 reports: "He has besieged and enveloped me," Namely, the besieging army: "with bitterness and tribulation." That is, by an army that inflicts labor and bitterness on me. As Job 7:12 asks: "Am I the sea, or a sea monster, that thou settest a guard over me?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title="Commentary on Lamentations"
