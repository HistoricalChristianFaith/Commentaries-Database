[[commentary]]
quote='''
Second is the siege of those people already weakening. "He has besieged and enveloped me," Namely, the besieging army: "with bitterness and tribulation." That is, by an army that inflicts labor and bitterness on me. As Job 7:12 asks: "Am I the sea, or a sea monster, that thou settest a guard over me?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
