[[commentary]]
quote='''
As though this had already happened, he warns him now to bear himself in this situation. Judges sometimes deviate from justice because of anger, and as to this he says, "Do not let anger master you so that you oppress someone," unjustly, when then "you will receive the cause and judgment." Judges also sometimes deviate from justice because they are greedy for graft, and he expresses this saying, "nor let a great number of gifts make you waver," in that new situation of authority.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title="Commentary on Job"
