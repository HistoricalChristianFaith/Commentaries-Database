[[commentary]]
quote='''
He expresses the natural failure of the tree saying, "If its roots age in the earth," when it cannot take in food because of some defect in natural power, and consequently, "its trunk has rotted in the dirt," because it is reduced to dust in some place by rot, "it will be rejuvenated by the mere scent of water," when the rain comes because the rottenness of the wood possesses a seminal potency. "And it will put forth a shoot," in a growth of leaves, "as when it was first planted."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
