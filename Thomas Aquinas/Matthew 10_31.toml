[[commentary]]
quote='''
Here he assures them on the ground that they can do little, and what they can do, they cannot accomplish without God's providence. Fear not, therefore, you are of more value than many sparrows: "You have put all things under his feet, all sheep and oxen, and also the beasts of the field" (Ps 8:6); and Genesis (1:26): "Let us make man to our image and likeness; and let him have dominion over the fish of the sea and over the birds of the air, and over the cattle, and over the earth, and over every creeping thing that creeps upon the earth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
