[[commentary]]
quote='''
Above, he commended him on his gratuitously given qualities; here he urges him to put them to good use especially by preaching the Gospel: first, he advised him in a general way to use the gifts granted him; second, he specifies how grace should be used, at do not be therefore ashamed of the testimony of our Lord.

In regard to the first he does two things: first, he gives him an admonition; second, its reason, at for God has not given.

He says, therefore: in your mother and in your grandmother and in you is an unfeigned faith: for which cause I admonish you that you stir up the grace of God which is in you. For the grace of God is as a fire which, when it is covered over with ashes, gives no light; so is God's grace in a man covered over with sloth, or human fear. Hence the effect of pusillanimity in Timothy's case was that he ceased preaching. Therefore, the Apostle calls on him to stir up the grace now dormant in him: extinguish not the spirit (1 Thess 5:19). And he adds, which is in you by the imposition of my hands, by which he was ordained bishop; in which imposition of hands the grace of the Holy Spirit was given to him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
