[[commentary]]
quote='''
These were insufficient to restore him, but the Lord assisted him with his own hand that from these small things he might progress to greater ones, and so the text says, "But the Lord blessed the last days of Job," by lengthening them, "more than his first days," that is, more than his former prosperity. For he is "powerful to do more than we can ask or understand," (Eph. 3:20) as Ephesians says. Job had already desired to return to his condition "as in the months of old," (29:2) but the Lord restored him to greater things and even double what he had before, as has been said already, (v. 10) and so the text says, "He gave his fourteen thousand sheep," because before he was said, "to have seven thousand sheep;" (1:3) and six thousand camels, "since before he had "three thousand camels." (1:3) Since before he had also "five hundred yoke of oxen," here he receives double and has "one thousand yoke of oxen." Before he had "five hundred asses," (1:13) so here he receives double, "and one thousand asses."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
