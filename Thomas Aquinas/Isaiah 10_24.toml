[[commentary]]
quote='''
Therefore, thus says the Lord. Here the strengthening of the people is set out, and concerning this, he does two things. First, he sets out the strengthening: be not afraid, below: fear not, you worm of Jacob, you that are dead of Israel (Isa 41:14). Second, he explains their escape, and first, in general, second, in particular: he shall pass into Magron or he shall come into Aiath (Isa 10:28). Concerning the first, he does three things. First, the affliction is set out: with his rod, that is, with the affliction of siege and plunder, and his staff, breaking into pieces, in the way of Egypt, for, hearing that the king of Ethiopia had come out from his land (as it says in 2 Kings 19:9), the king of Assyria left the land, and on his return, destroyed the cities which he found coming by the way of Egypt: how is the strong staff broken, the beautiful rod? (Jer 48:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
