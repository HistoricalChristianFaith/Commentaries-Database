[[commentary]]
quote='''
Then he seeks the sentence: what think you? But they answering, said: He is guilty of death, according to the judgment of the law. And this would be true if he were a blasphemer; but he was not, and therefore they judge wrongly, because they condemn the author of life to death; 1 Corinthians 15:22: for as by Adam death came to all men, so also by Jesus life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
