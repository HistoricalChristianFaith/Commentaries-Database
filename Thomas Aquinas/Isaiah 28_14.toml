[[commentary]]
quote='''
646. Wherefore. Here he excludes remedy. And first, he sets out two remedies; second, he excludes both from them: and I will set (Isa 28:17). Concerning the first, he sets out two remedies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
