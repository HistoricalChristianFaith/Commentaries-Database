[[commentary]]
quote='''
476. – 477. – Then (v. 28) he shows how three things fit Christ. In regard to the first he says, and so Christ having been offered once, in which He agrees with the others. But He differed in two respects: first, since Christ had not descended from Adam by way of human seed, but merely as to bodily substance, He did not contract original sin; consequently, He was not obliged by that statute: 'For in what day soever you shall eat of it, you shall die the death' (Gen. 2:17), but He underwent death by His own will: 'No man takes it away from me: but I lay it down of myself' (Jn. 10:18). Therefore, he says, that he was offered: 'He was offered because it was His own will' (Is. 53:7); 'Christ has died once for our sins' (1 Pt 3:18). He differs, secondly, because our death is the effect of sin: 'The wages of sin is death' (Rom. 6:23). But Christ's death destroys sin; therefore, he says, to bear the sins of many, i.e., to remove them. He does not say 'of all,' because Christ's death, even though it was enough for all, has no efficacy except in regard to those who are to be saved: for not all are subject to Him by faith and good works.

478. – In regard to the second he says, he shall appear a second time not to deal with sin. He says two things about the second coming: first, how it differs from the first, because the second will be without sin. For even though He had no sin in the first coming, He came in the likeness of sinful flesh (Rom. 8:3). In the first coming He was also made a victim for sin: 'Him who knew no sin, he has made sin for us' (2 Cor. 5:21). But those things are not to be found in the second coming; hence, he says that he shall appear without sin. Secondly, he states what will be peculiar to the second coming, because He will appear not to be judged, but to judge and to reward according to merits; hence, he says that he will appear. And although He will appear to all in the flesh, even to those who wounded Him, He will appear according to His divinity to the elect that eagerly wait for him by faith to save them: 'Blessed are all they that wait for him' (Is. 30:18); 'We look for the Savior, Our Lord Jesus Christ, who will reform the body of our lowliness, made like to the body of his glory' (Phil 3:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
