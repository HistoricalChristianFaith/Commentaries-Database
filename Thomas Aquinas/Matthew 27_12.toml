[[commentary]]
quote='''
Next the accusation is treated. And first, the accusation is set forth; secondly, the inducement to respond, at "Pilate said to him." He says therefore: "and when he was accused by the chief priests, he answered nothing." On what charges he was accused, Matthew passes over in silence, but Luke says this at 23:1 ff. This is the custom of the evangelists, because what one omits, another narrates. Hence there it is said that he was seducing the crowds, etc., and that he forbade the giving of tribute to Caesar, and likewise that he called himself king. And this is false according to their intention, because they meant a temporal kingdom; but he says, John 18:36, "my kingdom is not of this world." But Christ answered nothing. Then was fulfilled what was said through Isaiah 53:7: "as a lamb before his shearer he shall be dumb, and shall not open his mouth." And at 42:2: "his voice shall not be heard abroad."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
