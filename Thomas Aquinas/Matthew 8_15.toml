[[commentary]]
quote='''
He touched her hand. Here he mentions the cure. Chrysostom asks why he cured the centurion's servant with a mere word, but her with a touch. And he answers on account of acquaintanceship; and in this he also shows his humility better. Therefore, he gave help by touch: "You have held my right hand" (Ps 73:23). And she rose. People with a fever are ordinarily weaker when they begin to improve than they were in the course of the sickness; but this was not the case here, because the Lord restored her to complete health: for "God's works are perfect" (Dt 3:4). Indeed, the Lord cures in one way and nature in another. Therefore, he says, she served him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
