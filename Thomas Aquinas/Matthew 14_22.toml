[[commentary]]
quote='''
And immediately Jesus compelled the disciples. Here the power of Christ's teaching is figured, because it is liberating from dangers, because he freed the disciples from dangers. Hence he does three things. First, the occasion for undergoing danger is presented; second, the danger; third, the deliverance. The second begins at and having dismissed the crowd, he went up into the mountain etc.; the third at and in the fourth watch of the night he came to them, walking upon the sea. The occasion of the danger was the command of Christ; for frequently those who wish to obey the will of God are exposed to dangers, as the Apostle says, 2 Cor. 11:26: in perils from rivers, in perils from robbers, in perils from my own nation, in perils from the Gentiles, in perils in the city, in perils in the wilderness, in perils in the sea, in perils from false brethren. Hence immediately he compelled them to enter the boat. Hence immediately after working the miracle he wished to separate himself from the crowds. And he did this for a threefold reason. First, to show the truth of the miracle, lest on account of his presence they should say it had happened; for he himself is the truth, as is found in John 14:6. Second, to teach us to avoid vainglory; therefore after working miracles he withdraws; John 8:50: I seek not my own glory etc. Likewise, to show the virtue of discretion; for it is an act of discretion to separate oneself and rest; Wis. 8:16: entering into my house, I shall find rest with her. But it should be noted that he uses compulsion, because it was hard for them to be separated from Christ, as Peter says, John 6:69: Lord, to whom shall we go? You have the words of eternal life. Likewise he shows the affection of the crowds, namely with what ardor they followed him; Song of Songs 1:2: your name is as oil poured out; therefore young maidens have loved you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
