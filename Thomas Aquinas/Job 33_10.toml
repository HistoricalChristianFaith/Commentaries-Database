[[commentary]]
quote='''
Second, he notes in his words that he accused God of unfair judgment. Unfair judgment usually proceeds from the hatred of the one judging, and as to this he recalls that Job had said, "Since he has found grievances in me, therefore he thought that I am his enemy." In Chapter Thirteen, Job asked in question form, "Why do you hide your face and think of me as your enemy?" (v.24) But he did not say, "He has found grievances in me," and so this is an addition of Eliud to give a bad interpretation to the words of Job. Indeed, the hatred of a judge seems to be just if, sure of the malice of another, he has hatred in punishing his fault. But if from light grievances, the judge is provoked to hatred at another, his hatred will be unjust. In just this way he interpreted Job to have said that God thought of him as an enemy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
