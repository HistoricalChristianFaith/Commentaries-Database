[[commentary]]
quote='''
Once he is dead, awe and mourning remain for his friends, and so he then says, "and a man will wring his hands over him," as though struck with awe, "and will sigh over him" from compassion for him, "considering his place," when they consider his former dignity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
