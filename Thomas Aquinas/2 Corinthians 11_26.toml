[[commentary]]
quote='''
Having listed the evils inflicted from without, he then lists those he voluntarily assumed, when he says, on frequent journeys: first, external evils; secondly, internal evils (v. 28). He describes the external evils: first as to the evils that occur on journeys; secondly, as to those in houses (v. 27).

In regard to the first he mentions his frequent journeys, saying on frequent journeys, namely, I am proved a minister of Christ by enduring many hard and difficult things patiently: "From Jerusalem and as far round as Illyricum I have fully preached the gospel of Christ" (Rom. 15:19). Along with these he traveled along many roads, going to Rome and into Spain: "For the sake of the words of your lips, I have kept hard ways" (Ps. 17:4, Vulgate). Secondly, he mentions the dangers from journeys: first, the lesser ones; secondly, the more serious danger from false brethren. Among the lesser dangers he mentions three things, in regard to which he suffered many dangers. First, in regard to their causes, and these either from natural causes; hence he says, dangers from rivers, for streams naturally rise in the winter and are swift and very dangerous; or from malicious violence; as to this he says, in danger from robbers, whom the devil roused against him to rob him of his clothing: "His troops come on together; they have cast up siegeworks against me, and encamp round about my tent" (Job 19:12). Secondly, he lists the dangers that inspire fear either from his own; hence he says, in danger from my own people, i.e., managed by the Jews: or from outsiders; hence he says, in danger from Gentiles, who wanted to capture him for preaching the one true God. Consequently, he had no rest from his own or from others: "My mother, you bore me, a man of strife and contention to the whole land!" (Jer. 15:10). Thirdly, he lists the dangers as to their places. First, as to cities he says, danger in the city, i.e., in cities stirred up against me, as at Ephesus and Corinth (Ac. 18 & 19); or as to a desert place; hence he says, danger in the wilderness, either from evil beasts, as when a viper bit his hand (Ac. 28:3) as he was collecting sticks; or from want of food. Secondly, as to danger at sea, such as perils from plunderers and pirates: "Let those who sail the sea tell of its dangers" (Sir. 43:26, Vulgate). But he mentions a more serious danger, saying, danger from false brethren, i.e., from false Christians and heretics and false apostles: "Let every man beware of his neighbor" (Jer. 9:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
