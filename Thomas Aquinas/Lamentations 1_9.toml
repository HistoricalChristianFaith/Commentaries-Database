[[commentary]]
quote='''
Here is viewed the process for sinning. So, first sin is viewed: "her uncleanness", namely, "was in her skirts", similar to one's affection, if progressing within sin.

Then: "she took no thought of her doom" as to her death, or the divine judgment. As the Book of Sirach 7:36 admonishes: "In all you do, remember the end of your life, and then you will never sin."

Secondly, is considered the penalty for sinning. As stated: "therefore her fall is terrible". That is, from a dignified status into an extreme misery. As Psalm 59:11 declares: "make them totter by thy power, and bring them down, O Lord, our shield!"

Thirdly, divine mercy is displayed. As Verse 9 finally says: "O Lord, behold my affliction for the enemy has triumphed!" And, as Psalm 119:153 declares: "Look on my affliction and deliver me, for I do not forget thy law".
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
