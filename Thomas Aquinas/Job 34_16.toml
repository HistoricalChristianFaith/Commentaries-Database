[[commentary]]
quote='''
Since Eliud thought these arguments were sufficient, he invites Job to their consideration when he then says, "If then you have an intellect," to understand the power of my arguments, "hear what is said," with the exterior ears, "and," with interior attention, "perceive the voice of my eloquence," to recognize the justice of divine judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
