[[commentary]]
quote='''
Then he manifests the same thing through the testimony of the Holy Spirit, to show that we are not deceived in our confession; hence he says: the reason I say that we cry, Abba, Father in the Holy Spirit is that the Spirit himself gives testimony to our spirit that we are the sons of God. He bears this testimony not with external words that reach men's ears, as the Father gave testimony to his own Son in Matthew (Matt 3:17), but through the effect of filial love he produces in us. Therefore, he says that he gives testimony not to our ears but to our spirit: "and we are witnesses of these things: and the Holy Spirit" (Acts 5:32).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
