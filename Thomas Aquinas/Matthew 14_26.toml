[[commentary]]
quote='''
And seeing him. Here the effect of Christ's presence is presented, namely the disturbance of the disciples; hence the disturbance is presented, the cause is presented, and the sign. And he says and seeing him, they were troubled etc. You should know that when divine help is most near, the Lord allows a greater affliction, so that then his help may be received with greater devotion and thanksgiving. Likewise, fear increased all the more, because frequently men are converted through fear. And why? Because they believed it to be a phantom; hence saying, it is a phantom, not believing it to be a true body from a virgin. Mystically it is signified that before Christ comes, many will say many fantastic things, as is found below, 24:23ff. And they cried out for fear; for crying out is a sign of fear, just as also in every tribulation we ought to cry out to the Lord; Ps. 119:1: in my trouble I cried to the Lord, and he heard me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
