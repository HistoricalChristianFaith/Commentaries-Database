[[commentary]]
quote='''
Thus says the Lord. Here he determines the manner of execution of the sentence. And first, in particular, as to the Jews; second, universally, as to all: but I know their works, and their thoughts (Isa 66:18). The first is divided into two parts: in the first, he excludes false confidence; second, he sets out and determines the sentence that has been given as to the manner of execution: hear the word of the Lord (Isa 66:5).

Concerning the first, he does two things. First, he excludes false trust in the sanctity of the temple, showing that the temple is not the location of God: both from the greatness of God, who fills all things, whose throne is said to be heaven, because it participates greatly in his goodness, as a seat holds the greater part of the one seated; the earth my footstool, because the earth participates least in his goodness, as the outer part of the seated person reaches to the footstool; or, by heaven, he indicates the saints, by earth, the earthly: if heaven, and the heavens of heavens, cannot contain you, how much less this house which I have built? (1 Kgs 8:27); do not I fill heaven and earth? (Jer 23:24); God dwells not in temples made with hands (Acts 17:24). And from his rest, for each thing rests in the place which is its own; however, God does not rest in anything, but all things rest in him, as they are made by him: and what is this place of my rest, above: lift up your eyes on high, and see who has created these things (Isa 40:26).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
