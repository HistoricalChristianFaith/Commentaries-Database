[[commentary]]
quote='''
Since Job did not recognize those defects in himself, Eliud turns his words to God, requesting that Job be tried to recognize his defects, and so he says, "My Father," O God whom I think of like a father because of the reverence which I have for you and defend your justice in all things, "Let Job be tried," let his defect be shown to him through scourges, "even to the end," until death. He shows the justice of this petition saying, "Do you desist from testing the man of iniquity," as if to say: His evil merits that the scourges never cease.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
