[[commentary]]
quote='''
When he says, For the true bread is that which descends from heaven, and gives life to the world, he proves that it is from heaven by its effect. For the true heaven is spiritual in nature, and has life by its own essence; therefore, of itself, it gives life: "It is the spirit that gives life" (below 6:64). Now God himself is the author of life. Therefore, we know that this spiritual bread is from heaven when it produces its proper effect, if it gives life. That bodily bread used by the Jews did not give life, since all who ate the manna died. But this [spiritual] bread does give life, so he says: the true bread, not that symbolic bread, is that which descends from heaven. This is clear, because it gives life to the world: for Christ, who is the true bread, gives life to whom he wills: "I came that they may have life" (below 10:10). He also descended from heaven: "No one has gone up to heaven except the One who came down from heaven" (above 3:13). Thus Christ, the true bread, gives life to the world by reason of his divinity; and he descends from heaven by reason of his human nature, for as we said on the prior text, he came down from heaven by assuming human nature: "He emptied himself, taking the form of a servant" (Phil 2:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
