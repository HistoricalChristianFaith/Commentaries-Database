[[commentary]]
quote='''
Secondly, he indicates the perils he endured from outsiders, namely, the Gentiles, saying: Three times I have been beaten with rods: "The magistrates tore the garments off them and gave orders to beat them with rods" (Ac. 16:22); "The tribune commanded him to be brought into the barracks, and ordered him to be examined by scourging" (Ac. 22:14).

Then he discloses the perils of death he faced; and first of all those inflicted by men, saying: Once I was stoned. This happened in the city of Lycaonia, where he was struck down with stones and almost killed: "They stoned Paul and dragged him out of the city, supposing that he was dead" (Ac. 14:18). Secondly, the perils endured from the works of nature, and particularly from the sea. He amplifies these, first from their number, because three times I have been shipwrecked; secondly, from their duration, because a night and a day I have been adrift at sea, which is more grievous; for the text says that although he suffered shipwreck a number of times, he remained in the water for a day and a half under the protection of God's power. Hence he could say with Jonah (2:4): "For you cast me into the deep, into the heart of the seas, and the flood was round about me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
