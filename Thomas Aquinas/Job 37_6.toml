[[commentary]]
quote='''
He begins to list them and says, "he who commands the snow," by the voice of his wisdom, "to fall on the earth," because the snows are formed by his command, as are the rains and showers, and so he says, "and to winter rains," which abound in winter, "and the showers of his strength," which are formed by some more violent cause and with the impulse of the wind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
