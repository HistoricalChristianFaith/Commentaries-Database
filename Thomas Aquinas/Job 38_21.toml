[[commentary]]
quote='''
The duration of the lower bodies and the times of generation and corruption are measured according to the motion of the heavenly bodies, as Dionysius says in Chapter IV of The Divine Names. Therefore, when one is ignorant of these causes, one consequently does not know the effects, and so he says, "Did you know when you were born then?" as if to say: Could you know the time of your birth in advance by considering the motion of the heavens? You could not know this because before you were born, you did not exist; but also no other man could know this in advance because of the weakness of human knowledge. For God speaks to Job as representing all men. Just as you could not know in advance the time of your birth, so also you cannot know the end of your life in advance, and so he says, "and do you know the number of your days?" as if to say: You cannot know this from the computation of the heavenly motions, whose certain measure you do not know.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
