[[commentary]]
quote='''
Because Eliphaz imputed the fact that he said he was innocent to pride, he then says, "Because of my pride, you will capture me like a lioness." For Eliphaz had already referred to Job saying, "The roaring of the lion and the voice of the lioness and the teeth of the lion's whelps have been broken." (4:10) Therefore he says, "Because of my pride, you will capture me like a lioness," as if he should say: You make me to be reckoned by those who hear my words like a lioness because of pride. The very fact that he was considered evil for that reason was for him a further punishment on top of the first one. So he continues, "and returning you torment me wondrously," for you first came afflicting me taking away things and wounding my body and now you have returned again and torment me through my friends. This is cause for wonder because I ought rather to receive consolation from my friends. Or he says this because a man is most tormented when he is derided by his friends.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
