[[commentary]]
quote='''
Both reasons account for his readiness of will, so that he says so (as much as is in me), i.e., as far as I am concerned, I am ready, unless prevented, to preach the Gospel to you also who are at Rome: then all the people departed from the presence of Moses. And they came everyone whose heart stirred him (Exod 35:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
