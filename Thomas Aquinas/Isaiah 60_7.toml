[[commentary]]
quote='''
Second, as to clean animals, inasmuch as they were granted to be used for food: all the flocks of Cedar, the son of Ismael, from whom a land, which abounds in sheep, has its name; the rams of Nabaioth, another son of Ismael; shall minister to you, be granted for your use, sold to the people who are in you; and inasmuch as they were granted for the use of sacrifices: they shall be offered upon my acceptable altar, that is, in which I am pleased. By the altar is signified faith; by the rams, the leaders of the flock, the apostles and the prelates of the Churches; by the flocks, the simple people: I will fill this house with glory (Hag 2:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
