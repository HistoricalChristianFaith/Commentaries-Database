[[commentary]]
quote='''
Here he shows the shortness of the time: in three years, which will be until their destruction and from the death of Achaz—in whose time was the vision of this second word—or in which your persecution or battle will last; the years of a hireling, for after these, the Lord will repay to you the wages for your sins; or those who seem great are hirelings and small to the Lord: the life of man upon earth is a warfare, and his days are like the days of a hireling (Job 7:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
