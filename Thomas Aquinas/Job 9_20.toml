[[commentary]]
quote='''
Sometimes, however, although a man has no other witnesses to speak in his behalf, he is still confident in his case because he trusts in the testimony of his own conscience. Yet even the witness of conscience cannot prevail for men against the contrary accusation of God. He shows this in several degrees. The testimony of conscience has three levels, the highest of which is when one's conscience wants to render testimony that he is just, as Romans says, "The spirit himself renders testimony to our spirit that we are sons of God." (8:16) But this witness cannot stand fast against divine censure. He therefore says, "If I should want to justify myself," i.e. if I want to say that I am just, when God instead is objecting that I am unjust, "my own mouth will condemn me," for it will render me worthy of condemnation for blasphemy. The second level is when someone, although he does not presume that he is just, still does not find fault with himself in his conscience for some sin, as 1 Cor. says, "My conscience convicts me of nothing." (4:4) But this witness cannot stand against God either, and so he says, "if I show myself innocent," i.e. if I want to show that I am without sin, "he will prove me wicked," in that he will show sins of which I am not conscious to myself and others. For Psalm 18 says, "Who understands his crimes?" (v.13)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
