[[commentary]]
quote='''
Then he sets forth the fruit which resulted from the signs, namely, the conversion of certain believers. Concerning this he does three things. First, he mentions those who believed on account of the miracles. Secondly, he shows the attitude of Christ to them (v 24). Thirdly, he gives the reason for this (v 25).

The fruit which developed from the signs of Jesus was abundant, because many believed and were converted to him; and this is what he says, While he was in Jerusalem during the Passover feast, many people, seeing the signs he was working, believed in his name, i.e., in him.

Note that they believed in two ways: some on account of the miracles they saw, and some on account of the revelation and prophecy of hidden things. Now those who believe on account of doctrine are more commendable, because they are more spiritual than those who believe on account of signs, which are grosser and on the level of sense. Those who were converted are shown to be more on the level of sense by the fact that they did not believe on account of the doctrine, as the disciples did, but seeing the signs he was working: "Prophecies are for those who believe" (1 Cor 14:22).

One might ask which signs worked by Jesus they saw, for we do not read of any sign worked by him in Jerusalem at that time. According to Origen, there are two answers to this. First, Jesus did work many miracles there at that time, which are not recorded here; for the Evangelist purposely omitted many of Christ's miracles, since he worked so many that they could not easily be recorded: "Jesus did many other signs, and if every one was written, the world itself, I think, would not be able to contain the books that would be written" (below 21:25). And the Evangelist expressly shows this when he says, seeing the signs he was working, without mentioning them, because it was not the intention of the Evangelist to record all the signs of Jesus, but as many as were needed to instruct the Church of the faithful. The second answer is that among the miracles the greatest could be the sign in which Jesus by himself drove from the temple a crowd of men with a whip of small cords.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
