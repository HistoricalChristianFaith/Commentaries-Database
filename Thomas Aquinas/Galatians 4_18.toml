[[commentary]]
quote='''
But he rejects this when he says, "But be zealous for that which is good in a good thing always." As if to say: You ought not to be zealous for them in their teaching; but be zealous for a good teacher, i.e., for me and those like me: "And who is he that can hurt you if you be zealous of the good?" (1 Pet. 3:13). But because there can be evil in a good teacher, he adds, "be zealous of the good" teacher, yet say "in a good thing," i.e., in that which is good: "Follow after charity and be zealous for spiritual goods" (1 Cor 14:1).

Now, although the Apostle speaks of himself, according to a Gloss, when he says, "be zealous of the good," yet he adds "in a good thing," because as he says: "I am not conscious of any thing, yet I am not hereby justified" (1 Cor 4:4). But because some are zealous for a good teacher in his presence alone, he adds: "always, and not only when I am present with you"; because zeal for the good, if it continues even when the teacher is absent, is an indication that it proceeds from love and fear of God Who sees all: "Servants, obey in all things your masters according to the flesh, not serving to the eye, as pleasing men, but in simplicity of heart, fearing God" (Col 3:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Galatians.html'
source_title='Commentary on Galatians'
