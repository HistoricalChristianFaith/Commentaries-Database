[[commentary]]
quote='''
Since he had said that God helped the powerful in tribulation, he does not want to seem to say that God is a respecter of persons and so he shows that he confers the same benefit also on the poor. He expresses this saying, "He will snatch the poor man from his anguish," by freeing him from adversity. He shows the order of liberation saying, "and he will open his ears in tribulation," for he will make him understand that he is punished for his sins and he leads him to do penance as he has already also said about the powerful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
