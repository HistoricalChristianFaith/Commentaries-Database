[[commentary]]
quote='''
"And the next day etc." Here the guarding of the tomb is treated: and he does three things. First, the petition is set forth; second, the granting; third, the execution. Concerning the first, the time is set forth; and the cause; and the petition; and the impending danger. The time: "and the next day, which is the day after the Parasceve." "Parasceve" means "preparation." Hence the Jews, because they did nothing on the Sabbath, prepared on the preceding day, and therefore it was called the Parasceve; hence although they had some solemnity, yet the Sabbath was of greater observance; hence they prepared nothing on the Sabbath, according to the precept, Exodus 16:22, where the Lord commanded that on Friday they should gather a double portion of manna for two days.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
