[[commentary]]
quote='''
Then when he says, therefore, one must be subject, he draws the main conclusion, saying: therefore, i.e., for the reasons given, one must be subject to rulers of necessity, namely, because this is necessary for salvation, or be subject voluntarily to the necessity whereby the ruler's power inclines you to do right of necessity; not only for wrath, i.e., to avoid vengeance, which pertains to the second reason, but also for the sake of preserving a good conscience, which pertains to the first reason, because he who resists authority resists what God has appointed: admonish them to be subject to princes and powers (Titus 3:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
