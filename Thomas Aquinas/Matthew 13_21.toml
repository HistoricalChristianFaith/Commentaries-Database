[[commentary]]
quote='''
But the root is charity. Ephesians 3:17: rooted and grounded in charity etc. But he is only for a time, and rejoices for a time; Sirach 6:10: there is a friend, a companion at the table, and he will not abide in the day of distress. This therefore is the occasion: that he has no root. And how is it? Because he is badly fixed. Hence he says, and when tribulation and persecution arise on account of the word etc., as when opponents arise against the faith, and tribulations through interior or exterior adversities on account of the doctrine of the word, or on account of the faith, he is immediately scandalized, because he falls back from the faith; Psalm 118:165: much peace have they who love your law, and to them there is no stumbling block. He who perseveres is a friend. And he says immediately: because even if they had charity, they could be scandalized by great tribulation. But when someone is immediately scandalized by a small tribulation, he is not rooted in charity; hence 1 Corinthians 10:13: God is faithful, who will not suffer you to be tempted above that which you are able, but will make also with temptation issue. And Hebrews 12:4: for you have not yet resisted unto blood. And according to Jerome, immediately, because there is a gap between this one and that one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
