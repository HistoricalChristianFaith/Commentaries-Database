[[commentary]]
quote='''
After enumerating their miseries one by one, as an epilogue he summarizes what he has said then saying, "The sons of fools," in mind, "and of disreputable men," in birth, "and not known on earth at all," conspicuous for no dignity or glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
