[[commentary]]
quote='''
There follows the disobedience of the second: and first the command is presented, secondly the transgression. He says "coming to the other," that is, the Jewish people, or the clergy, or those who call themselves just; "he said in like manner. And he answering said: I go, sir." He professes that he will keep justice; hence the Jewish people says: "all things whatsoever the Lord shall command, we will do." So also clerics and all religious say. Hence he promised to go. "And he went not." Mal 2:8: "But you have departed out of the way, and have caused many to stumble, and have made void the covenant, saith the Lord of hosts."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
