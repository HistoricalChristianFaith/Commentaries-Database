[[commentary]]
quote='''
He shows the effect of affected malice of this kind adding, "or cause the cry of the poor to come to him," as if to say: They show themselves to be so ignorant of the ways of God that they oppress the poor whom God hears. So just as they do not shudder in horror at the oppression of the poor, in the same way they do not fear the anger of God, and so he says, "and he hear the voice of the poor," as if to say: They trivialize the fact that God shows his will is to hear the poor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
