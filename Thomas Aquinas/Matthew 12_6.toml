[[commentary]]
quote='''
I tell you this, that something greater than the temple is here. That something greater than the temple is here is clear, because his body is a temple. Likewise it should be noted that in the first example he does not claim that it is without sin. In the second he states that if one breaks the Sabbath out of necessity, it is not on that account entirely free of sin; but it is, if it is done on account of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
