[[commentary]]
quote='''
And when Jesus had heard this, he retired from thence by boat into a desert place apart. Above, the opinion of Herod about Christ was set forth, and on its occasion the narrative about John was introduced; now it is shown that the opinion of Herod was false. He had said two things: that Christ was John whom he had killed, and that John, having risen, was working mighty deeds. He says therefore that when Jesus had heard, he retired from thence by boat, etc. Why did he retire? Jerome assigns four reasons. The first, to spare his enemies, lest from murder they rush into murder; Hosea 4:2: blood has touched blood. Likewise, to defer his passion; hence he himself says in John 7:6: my time has not yet come. Likewise, to give us an example not to thrust ourselves into sufferings: for it is not virtue to thrust oneself into sufferings, but presumption. Hence above 10:33: when they shall persecute you in one city, flee into another. Likewise, to show with what devotion the crowds heard the word of God, because even in danger they followed him; Deut 13:3: the Lord your God tries you, that it may appear whether you love him. Likewise it should be noted that he sets down four things which should draw the crowd back from following Christ. The first is that he retired by boat; likewise, that it was to a desert place; likewise, that there were no groves there, because it was a desert; likewise, not near a road, to which men willingly turn aside; but he retired apart. This he did so that the devotion of the crowd might be more commended. Likewise Chrysostom says that he retired to approve man; therefore he did not wish to retire until the death of John was reported. There follows and the multitudes having heard of it, followed him on foot out of the cities; where the devotion of the crowds and of the poor people is touched upon, who followed the Lord out of devotion. Hosea 6:1: in their tribulation they will rise early to me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
