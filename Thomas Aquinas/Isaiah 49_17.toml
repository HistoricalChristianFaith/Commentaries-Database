[[commentary]]
quote='''
And the manner of its fulfillment: your builders are come, that is, the rebuilders, namely, Zorobabel and Jesus and others already before my eyes; they that destroy you, the Chaldeans: the hands of Zorobabel have laid the foundations of this house (Zech 4:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
