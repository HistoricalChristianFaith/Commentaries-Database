[[commentary]]
quote='''
So the text continues and discusses their beauty, "There was no one found among women as beautiful as the daughters of Job in the whole land." By this we are also given to understand that his sons were preeminent in virtue, for the text continues, "and their father gave them inheritance among their brothers," to indicate the fittingness of the virtue of both.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
