[[commentary]]
quote='''
Then he removes the impediments to flight. And because some impediments are avoidable and some are not, therefore he first sets forth the avoidable dangers; secondly, the unavoidable, at and woe to them that are with child, etc. Those that are avoidable are the concerns of earthly affairs; and some of these occur in the city, and some outside; therefore he presents both. He says, therefore, and he that is on the housetop, let him not come down to take anything out of his house; i.e., whoever dwells in the city, even if he is in his house, let him not turn back to take anything, etc.

Hilary explains: and he that is on the housetop, let him not come down to take anything out of his house. He means to say that the perfect should not be moved from their perfection. Hence he touches on the contemplative life, which is signified by the housetop; hence such persons should not withdraw from their contemplation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
