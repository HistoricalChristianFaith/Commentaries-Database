[[commentary]]
quote='''
Then we see the stubbornness of the disciples: for although our Lord had rebuked them and had taken away the cause of their difficulty so far as it concerned himself, they still would not believe. Thus he says, From this time on, many of his disciples turned back. He did not say, "they left," but that they turned back, i.e., from the faith, which they had in a virtuous way; and cut off from the body of Christ, they lost life, because perhaps they were not in the body, as Augustine says. There are some who turn back in an absolute way, that is, those who follow the devil, to whom our Lord said, "Go back, Satan" (Mt 4:10). We also read of certain women that "Some turned back after Satan" (1 Tim 5:15). But Peter did not turn back in this way; he rather turned after Christ: "Follow after me, Satan" (Mt 16:23). But the others followed after Satan.

Then follows: they no longer walked with him, that is, even though we are required to walk with Jesus: "I will show you man what is good," and then it continues on, "to walk attentively with your God" (Mi 6:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
