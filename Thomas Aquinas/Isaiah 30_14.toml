[[commentary]]
quote='''
And he shows the strong punishment: and it shall be broken small, under the likeness of the breaking of a vessel, of which no fragment remains whole for any use, namely, for carrying fire and drawing water, above: with breaking shall the earth be broken (Isa 24:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
