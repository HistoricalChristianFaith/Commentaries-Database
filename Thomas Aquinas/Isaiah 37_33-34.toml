[[commentary]]
quote='''
Here he promises liberation: he shall not come into this city, as he intended, above: take counsel together, and it shall be defeated: speak a word, and it shall not be done (Isa 8:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
