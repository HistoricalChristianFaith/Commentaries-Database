[[commentary]]
quote='''
He shows as a consequence that they are deprived of hope in two ways. One of these is the hope the just have that God hears their prayer in time of need, but he excludes this by saying, "Will God hear his cry when anguish comes upon him?" He implies the answer "No." The reason for this is found in the book of Proverbs when the voice of Wisdom says, "I have called and you refused me," (1:24) and continues a little later, "Then," when anguish will come upon them, "they will invoke me and I will not hear." (1:28) Further on in the same book he says, "The prayer of the man who turns his ear away so that he does not hear the law will be accursed." (28:9)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
