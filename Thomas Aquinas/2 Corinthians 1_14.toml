[[commentary]]
quote='''
The reason for this is that when we see someone starting well, we should hope that he will always progress well. And why? Because "he who began a good work in you will bring it to completion at the day of Jesus Christ" (Phil. 1:6). And you will understand, that you can be proud of us, i.e., that through us you should obtain eternal glory, which a person reaches through the faith of Christ, which we preach to you: "The glory of sons is their fathers" (Prov. 17:6). I say that you can be proud of us as we can be of you, because we hope for the reward of eternal glory through you who have been instructed by us: "For what is our hope or joy or crown of boasting? Is it not you?" (1 Th. 2:19). And this boast will be ours from you on the day of the Lord Jesus, i.e., on the day of judgment, which is called Christ's day, because he will then accomplish his will with sinners by punishing those who in this world did their own will by sinning against the will of Christ the Lord: "At the set time which I appoint I will judge with equity" (Ps. 75:2); "And books were opened... and the dead were judged by what was written in the books, by what they had done" (Rev. 20:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
