[[commentary]]
quote='''
Next he proceeds to certain aspects of the winds in the air, by which the rainstorm is caused when rain is driven on. So he says, "Who gave the course of the very violent rainstorm?" For the violent course of the rainstorm is caused by the strong impulse of the winds which divine power produces. Likewise, when clouds are set in motion from the winds, this causes thunderclaps, and that is why such a sound is not heard in one place, like the sound of some passing body, and so he says, "and the way of sound to thunder?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
