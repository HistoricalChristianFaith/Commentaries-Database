[[commentary]]
quote='''
Above the evangelical doctrine was set forth, and its adversaries were refuted; here he shows the power of the evangelical doctrine: first, in words; secondly, in deeds, in chapter 14. And regarding the first, he first sets down the circumstances of the doctrine; secondly, Christ's doctrine; thirdly, its effect. The second is at behold, the sower went out to sow; the third at have you understood all these things? And first he sets down four circumstances, namely, place, time, the disposition of the hearers, and the disposition of the speaker. He touches on the time when he says on that day. From this it is given to understand that he indicates the order of the event. For otherwise it could not be understood, unless day is taken to mean time. Next the circumstance of place is touched on: he sat by the sea etc. And this can be expounded according to the literal and mystical exposition. Chrysostom touches on the literal. For since he had said above that while he was speaking to the crowds, someone said, behold your mother etc., Chrysostom had expounded there that they had felt something human; therefore the Lord wished to go out, so as to restrain the wickedness of those, namely, his brethren. And he also went out so as to show honor to his mother. Hence Exodus 20:12: honor your father and your mother. Mystically, by the house, Judea is understood, from which he went out because of unbelief and came to the sea, namely, to the Gentiles, who were troubled by unbelief; below at 23:38: behold, your house shall be left to you desolate; just as Jeremiah 12:7: I have forsaken my house, I have left my inheritance, I have given the dearly beloved of my soul into the hands of her enemies. The sea signifies the world; Psalm 103:25: this great sea which stretches wide its arms, there are creeping things without number etc. Or otherwise, by the house is understood the interior mind; Wisdom 8:16: entering into my house, I shall find rest with her. Hence sometimes he goes out from the secret of contemplation to public teaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
