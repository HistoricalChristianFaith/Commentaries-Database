[[commentary]]
quote='''
Take, therefore, my yoke, namely, the gospel lessons. And he says, yoke, because just as a yoke fastens and joins the necks of oxen, so the doctrine of the gospel fastens the people to its yoke. And what is that? Learn from me, for I am meek and humble of heart. The whole Law consists in two things: meekness and humility. By meekness a man is rightly ordered to his neighbor; hence Psalm 132 (v. 1): "Remember, O Lord, David and all his meekness." By humility he is rightly ordered to himself and to God: "Upon whom will my spirit rest except on the calm and meek" (Is 66:2)? Hence humility makes a man capable of God. He had also said, "and I will refresh you." What is this refreshment? You will find rest for your souls. For the body is not refreshed, as long as it is afflicted, and when it is not afflicted any more, it is said to be refreshed. And just as hunger is to the body, so desire is to the mind; hence the achievement of desires is refreshing: "Who satisfies your desire with good" (Ps 103:5). And this rest is a rest of the soul: "I have labored little and found for myself much rest" (Sir 51:27). The meek are not at rest this way in the world; hence they will find eternal rest, namely, the fulfillment of desires.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
