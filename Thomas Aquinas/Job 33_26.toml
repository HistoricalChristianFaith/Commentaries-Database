[[commentary]]
quote='''
Therefore, after he has suggested the words of God which free him, Eliud uses his own words to describe the manner of human liberation saying, "He will invoke God in prayer," for it is not enough for an angel to speak for him, but to be freed he must also pray for it himself. Or this argument can be connected in another way. For because he had shown above that man cannot lament that he cannot place his case in the presence of God, since an angel proposes it there for him efficaciously (v.23), now he shows that he too can place it there for himself in prayer. To show that this is as effective as the first way he says, "and he (God) will be pleased by him (man)," according to the words of the prophet Joel, "He is kind and merciful and placated about evil." (2:13) From this there follows in man a confidence in thinking about God with some spiritual joy, and so he says, "and he (man) will see his face," that is, he will consider his goodness, imperfectly in the present life and perfectly in the future life, "in a shout of joy," in joy which is in some way inexplicable. "And," so, "he (God) will render his justice to men," because he will reward him for his merits, after he has removed the impediment of sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
