[[commentary]]
quote='''
Likewise, that about which they took counsel is touched upon: that by subtilty they might apprehend Jesus. And it was foolish of them to think they could take by subtilty one who knew all things; Jeremiah 9:8: their tongue is a wounding arrow, it hath spoken deceit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
