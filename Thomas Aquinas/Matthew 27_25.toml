[[commentary]]
quote='''
Then follows the offering of themselves to punishment: "his blood be upon us and upon our children." And so it happened that the blood of Christ has been required of them to this day; and what was said at Genesis 4:10 well applies to them: "the blood of thy brother Abel crieth to me from the earth." But the blood of Christ is more efficacious than the blood of Abel. The Apostle, Hebrews 12:24: "we have the blood speaking better than that of Abel"; Jeremiah 26:15: "but know ye, and understand, that if you put me to death, you shall shed innocent blood against yourselves."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
