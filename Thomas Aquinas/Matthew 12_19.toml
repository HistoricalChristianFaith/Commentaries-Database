[[commentary]]
quote='''
Hence he says, he will not wrangle; "When he was reviled, he did not revile" (1 Pt 2:23). And what is said in Proverbs (20:3) well suits him: "It is an honor for a man to keep aloof from strife." Of course, some do not wrangle, but they murmur. But he will not do this, because he will not cry aloud. Hence Isaiah (53:7): "Like a lamb that is led to the slaughter, and like a sheep that before its shearers is dumb, he opened not his mouth." Crying aloud proceeds from emotion, and the Apostle commands the Ephesians (4:31): "Let all anger and clamor be put away from you." Some do not cry aloud, but they complain. This is taken away: nor will anyone hear his voice in the streets. Those who walk in the path of sinners make their voice heard in the streets: "The stones of the sanctuary lie scattered at the head of every street" (Lam 4:1); "Wisdom cries aloud in the street" (Pr 1:20). Yet he will not be heard among them. Or, in another way: by the streets is meant the gentiles, because they are outside the sanctuary. And although Christ willed to be preached to the gentiles, he himself did not preach to them in person. Hence he is not heard in the streets, i.e., among the gentiles. Thus, therefore, was he patient in word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
