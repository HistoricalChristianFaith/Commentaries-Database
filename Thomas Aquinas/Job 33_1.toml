[[commentary]]
quote='''
The text has said already that Eliud was angry against Job and his friends (32:2-3). After he has denounced the laziness of the friends of Job, now he begins to speak against Job himself, and therefore, he first gets his attention saying, "Hear, then, Job, my words," because I now intend to answer you. He shows that he will weigh each word very carefully saying, "and listen to my speeches," for he will not say anything in vain.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
