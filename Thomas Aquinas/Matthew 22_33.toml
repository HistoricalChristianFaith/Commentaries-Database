[[commentary]]
quote='''
There follows the effect, for they wondered: and the multitudes hearing it were in admiration at his doctrine. Psalm 118:129: thy testimonies are wonderful, O Lord, etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
