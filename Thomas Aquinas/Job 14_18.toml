[[commentary]]
quote='''
After Job has posited his idea about the future resurrection, he here strengthens it with probable arguments. The first argument is taken from a comparison of man to lower creatures which are totally consumed without hope of restoration. For all things which are generated are subject to corruption and so even the mountains are dissolved by certain causes after the passage of some periods of time, although they seem very solid. He speaks to this theme saying, "A falling mountain is leveled." Rocks also are still dashed to pieces either by violence or by some natural cause, even though they seem very strong. He next speaks to this, "and the rock is displaced."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
