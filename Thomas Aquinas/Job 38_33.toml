[[commentary]]
quote='''
Fourth, the order, placement, and movement in the heavenly bodies seems wonderful, and so he says, "Do you know the order of heaven?", which man cannot comprehend? Fifth, the disposition of the lower bodies in relation to the higher ones is wonderful, and expressing this he says, "and will you be able to establish their plan upon the earth" so that you know the proper effects of each one of the heavenly causes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
