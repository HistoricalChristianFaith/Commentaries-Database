[[commentary]]
quote='''
Hence it says, Whoever does the will of my Father in heaven is my brother, and sister, and mother. For he had a heavenly generation and a temporal one, and he places the heavenly ahead of the temporal. For those who do the will of his Father are related to him according to heavenly generation; hence John (8:39): "If you are the sons of Abraham, do the works of Abraham." For he came to do his will, as John says (4:34, 5:30, 6:38). He says, brother, to indicate the stronger ones and sisters the weaker. But why does he say is my mother? I answer that every believer who does the Father's will, i.e., who obeys simply, is a brother, because he is like him who fulfilled the Father's will. But one who not only does that but converts others begets Christ in others and so is a mother. On the other hand, one who incites others to evil kills Christ in others. The Apostle to the Galatians (4:19): "My little children, with whom I am again in travail, until Christ be formed in you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
