[[commentary]]
quote='''
In the year that. Here the time of destruction is set out, and it is divided into three parts. And first is set out something that signifies, namely a prophetic deed; second, the signification of the deed: and the Lord said (Isa 20:3); third, he shows the effect of the thing signified: and they shall be afraid, and confounded (Isa 20:5).

Concerning the first, he does three things. First, the time of the prophecy is set out: in the year that Tharthan entered into Azotus, a city of the Philistines, Amos 1:7–8: where also is Gaza, Geth, Accaron, Ascalon, Azotus. Sargon, who is Sennacherib, according to Jerome, for he had six names, which were Sargon, Senach, Phua, Salmanasar, Theglathphalasar and Asarad. By the hand, that is, in a work concordant with his words: I have used similitudes by the hands of the prophets (Hos 12:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
