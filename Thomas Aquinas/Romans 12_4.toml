[[commentary]]
quote='''
After this admonition the Apostle assigns a reason based on the mystical body's likeness to a natural body. First, he touches on three things in a natural body; first, its unity when he says: for as in one body; second, the multiplicity of members when he says: we have many members; for the human body is an organism consisting of various members; third, the variety of functions when he says: all the members do not have the same act. For the variety of members would serve no purpose unless they were ordered to different functions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
