[[commentary]]
quote='''
Then they ask their question, saying, Are you greater than our father Abraham, who died? They are asking, first of all, about a comparison between him and their fathers of old. But as Chrysostom says, in their carnal understanding they could have asked something higher, that is, "Are you greater than God?" For Abraham and the prophets kept God's commands, yet they died in the bodily sense. Therefore, if any one who keeps your word will never die, it seems that you are greater than God. Yet they were satisfied with their retort, because they considered him less than Abraham, in spite of the fact that we read: "There is none like thee among the gods, O Lord" (Ps 86:8); and "Who is like thee, O Lord, among the gods?" (Ex 15:11); as if to say: No one.

Secondly, they ask about his estimate of himself, i.e., who does he take himself to be? As if to say: If you are greater than them, namely, Abraham and the prophets, it seems to imply that you are of a higher nature, say an angel or God. But we do not think you are. So they do not ask, "Who are you?" but Who do you claim to be? For whatever you say in this matter, we who know will regard it as a fiction. They spoke in a similar fashion below (10:33): "We stone you for no good work but for blasphemy; because you being a man, make yourself God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
