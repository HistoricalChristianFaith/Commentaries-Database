[[commentary]]
quote='''
And the emptying of glory, and the flower shall be as a hasty fruit, that is, ripe or early fruit, above: for before the harvest it was all flourishing (Isa 18:5); all your strong holds shall be like fig trees with their green figs (Nah 3:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
