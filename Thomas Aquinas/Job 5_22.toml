[[commentary]]
quote='''
A common danger threatens property either by the barrenness of the earth in time of famine, or by some devastation of the crops by the enemy. As to these trials he says, "And you shall laugh at destruction and famine." This means: you will have an abundance which will be a subject of joy for you. In this, then, he treats the fifth and the sixth trial. Sometimes there is adversity from the attack of brute animals either individually or in groups. About this he says, "and you shall not fear the beasts of the earth." This seems to be the seventh trial in which evil will not touch him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
