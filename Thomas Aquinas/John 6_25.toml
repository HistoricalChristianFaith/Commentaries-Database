[[commentary]]
quote='''
890 Once they found him, they questioned him. When they, the people, found him, Christ, on the other side of the sea, they asked him: Rabbi, when did you come here? This can be understood in two ways. In the first way, they were asking about the time only. And then, Chrysostom says, they should be rebuked for their rudeness, because, after such a miracle, they did not ask how he crossed without a boat, but only when he did so. Or, it can be said that by asking when, they wanted to know not just the time, but the other circumstances connected with this miraculous crossing.

891 Note that now, after they have found Christ, they do not wish to make him their king, while before, after he had fed them, they did. They wanted to make him their king then because they were emotionally excited with the joy of their meal; but such emotions quickly pass. So it is that things that we plan according to our emotions do not last; but matters that we arrange by our reason last longer: "A wise man continues on in his wisdom like the sun; a fool changes like the moon" (Sir 27:12); "The work of the wicked will not last" (Prv 11:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
