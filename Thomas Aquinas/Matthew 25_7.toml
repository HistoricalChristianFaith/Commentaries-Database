[[commentary]]
quote='''
Then follows the effect: then all those virgins arose and trimmed their lamps. Taken literally, when the cry is made through the trumpet or through the voice of Christ, all will rise. Hence John 5:25: for all that are in the graves shall hear his voice. But what did they do? They trimmed their lamps. But what does this mean? Will there be time for this? It must be said that to trim their lamps is nothing other than to review the works they have done, so that they can render a fitting account. Hence they will have solicitude when they hear the voice of the Son of God, as below: when did we see you hungry and fed you; thirsty, and gave you drink? etc. According to Origen the letter is plainer. Because if it is referred to the present life, when a cry is made through a preacher or interior inspiration, then they rise from negligence, and then they begin to rise up to correct their deeds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
