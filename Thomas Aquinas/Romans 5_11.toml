[[commentary]]
quote='''
Then when he says, not only so, he shows what benefits we obtain even now through grace, saying, not only so, i.e., not only in the hope of the glory we expect in the future, but also we glory in God, i.e., in being even now united to God by faith and charity: let him who boasts, boast in the Lord (1 Cor 1:31 and 2 Cor 10:17). And this through our Lord Jesus Christ, by whom we have even now during this life received reconciliation, so that we have been changed from enemies to friends: through him he reconciled to himself all things (Col 1:20).
The verse, not only so, can be connected with the preceding one, so that the sense would be: we shall be saved by his life from sin and punishment; and not only shall we be saved from evils, but shall rejoice in God, i.e., in the fact that we shall be the same in the future with him: that they may be one in us, even as we are one (John 17:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
