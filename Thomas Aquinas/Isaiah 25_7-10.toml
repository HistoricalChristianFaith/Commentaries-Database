[[commentary]]
quote='''
590. Second, as to the removal of evils: and he shall destroy, as to the punishment of death, which he calls a bond, inasmuch as we are bound to it from sin, and a web inasmuch as it is a just sentence woven by God: death is swallowed up in victory (1 Cor 15:54); O death, I will be your death; O hell, I will be your bite (Hos 13:14). The sadness of sorrow: and the Lord God shall wipe away tears from every face: God shall wipe away all tears from the eyes of the saints (Rev 21:4); the ignominy of confusion, and the reproach, above: take away our reproach (Isa 4:1). Some refer this to the judgment carried out in the death of Holofernes, who came against all nations; and similarly concerning the feast. And he sets out the thanksgiving, and they shall say, we have endured for him, patiently waiting: you that fear the Lord, endure for his mercy (Sir 2:7). And he sets out the reason: for the hand of the Lord, with which nothing evil can exist: this is my rest for ever and ever (Ps 131[132]:14).

591. Third, as to the oppression of their enemies, namely, the Moabites, who were most hostile to them because of dreams.

And first, he sets out their affliction: threshed: they have threshed Galaad with iron wains (Amos 1:3);
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
