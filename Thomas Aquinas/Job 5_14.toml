[[commentary]]
quote='''
Sometimes not only are their cunning plans impeded in deed, but even their minds are clouded so that they do not discover better things in taking counsel. So he says, "They come upon darkness in the daytime," because in something which is clear, they are completely ignorant of what they are doing, "and grope at noonday like in the night," in things which are in no way doubtful, they hesitate as though they were obscure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
