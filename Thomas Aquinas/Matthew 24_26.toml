[[commentary]]
quote='''
Hence, if they shall say to you: behold, he is in the desert, go not out. Having set forth the necessity in general, he now sets it forth more specifically: if they shall say to you, behold, he is in the desert etc. It should be noted that true teaching is done in public; above 10:27: That which I tell you in the dark, speak in the light; but false teaching always seeks corners; Proverbs 1:20: Wisdom cries aloud in the streets. Hence truth is light, and seeks to be seen in the light; but if it is a perverse doctrine, it seeks hidden places. Proverbs 9:14: Wisdom sits in the doorways, and there follows, stolen waters are sweeter. Hence the desert is a hidden place, because it lacks people, or because it is enclosed; therefore, if they shall say to you, behold, he is in the desert, go not out. And what does he mean? These unfaithful men and heretics, while they are in the society or congregation of the faithful, cannot deceive; but they strive to have people separated from the society, and then they deceive. And this is what he means: if they shall say to you, behold, he is in the desert, go not out. Do not allow yourselves to be separated from good society and congregation. Likewise, if in the inner chambers, because they always seek a secret place, nor do they dare to speak their teaching in public; hence John 18:20: I have spoken openly to the world. Do not believe it, for he who is quick to believe is light of heart, Sirach 19:4. According to Jerome this can be referred to the time before the destruction; but it is better to refer it to the end. Likewise, it can be understood of deception practiced in the Church. False christs give a document of falsehood, and it is called one document, because all are united in one thing; and every falsehood has its own prophets. Hence they say: here is Christ, or there; Ezekiel 13:6: They persevered in confirming their word; and sometimes they try to confirm it by apocryphal scriptures, sometimes by hidden senses of Scripture. When by apocryphal writings, they say he is in the desert; when by hidden senses, they say he is in the inner chambers. Or according to Augustine, true teaching has two characteristics: it is the same in every place and is to be proclaimed publicly, and heresy falls short of both; hence one says here is Christ, i.e., in this land and not in another. Likewise, because their teaching is not public, they say he is in the inner chambers; hence, do not believe it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
