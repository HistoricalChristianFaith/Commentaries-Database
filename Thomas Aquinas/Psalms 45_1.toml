[[commentary]]
quote='''
Above, the Psalmist proposed a prayer for the adversity of the kingdom and the king; here he sets forth, as it were, the glory of the king and the kingdom from the divine benefit. And first, he sets forth the divine benefit. Second, he invites other nations from this example to serve God, at "all peoples." Regarding the first, he does two things. First, he sets forth the glory of the king and the magnificence of the kingdom. Second, he sets forth the peace of the kingdom, at Ps. 45: "God is our refuge." This Psalm is called an epithalamium. For it was the custom that at weddings certain canticles were sung in praise of the bridegroom and the bride, and these are called epithalamia. Therefore, the subject matter of this Psalm concerns the nuptials of Christ and the Church, which were first initiated when the Son of God united human nature to himself in the virginal womb. Ps. 18: "And he himself as a bridegroom coming forth from his bridal chamber." Hence the subject matter of this Psalm is the same as that of the book called the Song of Songs. The title is as follows: "Unto the end, for those who shall be changed, to the sons of Korah, for understanding, a canticle for the beloved." And it can be understood in two ways. In one way, so that "Psalm" is supplied, so that the sense is: This Psalm leads us to the end, Christ, "for those who shall be changed," namely from the state of unbelief to Christ; hence he says, "instead of your fathers," etc. And so this Psalm pertains to the Passion of Christ, that is, to those who believe in Christ who suffered. And this for understanding the mysteries of Christ and the Church. And not only a Psalm but also a canticle, "for the beloved," namely Christ. Mt. 3: "This is my beloved Son." Jerome has it thus: "A victory song for the lilies, of the sons of Korah, a canticle for the most beloved." And what he says "for the lilies" shows that this Psalm treats of the delights of the bridegroom and bride. And this is signified by flowers, roses, and lilies. Song 2: "Support me with flowers," etc. And it is fitting for virgins, who are like lilies. This Psalm is divided into three parts. First, the prologue of the canticle is set forth. Second, the commendation of the bridegroom is set forth, at "beautiful." Third, the commendation of the bride is set forth, at "hear, O daughter." Regarding the first, he does three things. First, he sets forth the composition of the Psalm. Second, its end, at "I speak." Third, he designates the author, at "my tongue." The composition is designated when it says, "My heart has uttered a good word." Uttering proceeds from excessive fullness or repletion, in which is signified that he speaks from an abundance of devotion and wisdom. Mt. 12: "Out of the abundance of the heart the mouth speaks." And it should be noted that the composition of this Psalm is attributed to the heart, from whose great devotion it was composed, because this is not one of those about which Is. 29 says: "This people honors me with their lips, but their heart is far from me"; rather, he pronounces the praises of Christ from the heart. 1 Cor. 14: "I will sing with the spirit, I will sing also with the mind." This heart "has uttered a word," namely of this Psalm, which is "good," because it is consoling, for it speaks of the mysteries of Christ and the Church. 1 Tim. 1: "This is a faithful saying," and no word is better than it. Zech. 1: "The Lord answered the Angel who spoke in me with good words, consoling words." "I speak," that is, I proclaim, "my works to the king," that is, to the honor of Christ the King. Is. 32: "Behold, the king shall reign in justice"; as if to say: I sing this Psalm to the honor of Christ, to whom we ought to dedicate all our works. Col. 3: "Whatever you do in word or in deed, do all in the name of Jesus Christ." "My tongue is the pen of a scribe." Here the author of the Psalm is set forth, who is the tongue; as if to say: let it not be understood that I composed this from my own resources, but with the help of the Holy Spirit, who uses my tongue as a writer uses a pen. And therefore the principal author of this Psalm is the Holy Spirit. 2 Sam. 23: "The Spirit of the Lord spoke through me," as through an instrument. 2 Pet. 1: "Wisdom was not brought by human will, but by the Holy Spirit," etc. And whose pen is it? "Of a scribe writing swiftly," of the Holy Spirit who writes swiftly in the hearts of men. For those who seek wisdom through study acquire it by parts and also over a long time; but those who have it from the Holy Spirit receive it swiftly. Acts 2: "Suddenly there came a sound from heaven," etc. Those who have knowledge through divine revelation are suddenly filled with wisdom, just as those men were suddenly filled with the Holy Spirit. Ps. 147: "His word runs swiftly." Sir. 11: "It is easy in the eyes of God to suddenly make a poor man honorable." Or, "of one working swiftly," because he spoke and they were made, Ps. 148. Now the word "tongue" can be referred to something else, because he not only wished to speak, but first thought in his heart, second spoke with his mouth, and third wrote it down; as if to say: it was not only useful to those present who heard, but also to those in the future. Is. 8: "Take a great book and write in it with the pen of a man." Hab. 2: "Write the vision and explain it." This interpretation, therefore, is the literal one. But some say that these words are set forth in commendation of Christ according to his divinity, as if they were the words of God the Father. But Augustine and Jerome do not approve this interpretation; nevertheless, Dionysius uses it in chapter 2 of On the Divine Names, where he introduces this word, "has uttered," etc. And according to this interpretation, he is commended by the Father in three ways. First, his emanation is described. Second, his power, at "I speak." Third, his operation, at "my tongue." Regarding his emanation from the Father, he sets forth four things. First, his natural procession, when he says "has uttered," which is a certain emanation from fullness; hence the procession of the Son from the Father is a divine uttering, because he proceeds from the fullness of the divine nature. Jn. 3: "The Father loves the Son," etc. Second, he sets forth the mode of emanation, because he did not emanate corporally, nor from some other nature, but in the manner of a spiritual thing. "My heart," as if not from nothing, nor from another essence, but from my heart. Ps. 109: "From the womb, before the daystar, I begot you." Third, the property of the one proceeding is set forth: because "a word." Jn. 1: "In the beginning was the Word." Also, the perfection of the one proceeding is set forth: because "good," as having the full goodness of the divinity. Lk. 18: "No one is good except," etc. His power is shown when he says, "I speak," that is, through the Word I make "all my works to the king," that is, to the honor of the king, namely the Son, who is one God with me. Jn. 1: "All things were made through him." His proper operation is designated when he says, "My tongue is the pen of a scribe"; as if to say, he who is my tongue is also the pen of a scribe. In Sacred Scripture, operations are metaphorically designated by the instruments or members that are the principles of operations; and so by tongue and pen is designated an operation of God befitting the tongue and pen. The operation of the tongue is that through it the wisdom of the heart is diffused to others; through the pen it is designated that the wisdom which is in the heart is transferred to sensible matter, namely parchment. But God both speaks and writes: he speaks when he transfuses his wisdom into rational minds. Ps. 84: "I will hear what the Lord God speaks within me." And this is called the Word, because through it comes all illumination. Jn. 1: "And the life was the light of men." He writes, because he imprints the judgments of his wisdom in rational creatures. Rom. 1: "The invisible things of God," etc. Sir. 1: "God poured it out upon all his works." For just as one looking at a book knows the wisdom of the writer, so when we see creatures, we know the wisdom of God. Therefore, the pen is the Word of God.
'''
