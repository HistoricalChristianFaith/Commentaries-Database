[[commentary]]
quote='''
By the right hand, prosperously; where is the spirit that divided the waters before them? Who divided the Red Sea into parts (Ps 135[136]:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
