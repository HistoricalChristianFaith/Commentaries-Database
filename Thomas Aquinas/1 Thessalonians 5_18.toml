[[commentary]]
quote='''
The third thing he mentions is to offer thanks for those blessings already received, hence Paul says: in all circumstances, that is, in good times and in bad times, give thanks. "We know that in everything God works for good with those who love him" (Rom. 8:28). "Abounding in thanksgiving" (Col. 2:7). "With thanksgiving" (Phil. 4:6). For this is the will of God in Christ Jesus for you. "Who desires all men to be saved and to come to the knowledge of the truth" (1 Tim. 2:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
