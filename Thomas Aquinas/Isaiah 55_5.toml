[[commentary]]
quote='''
And what may be done for them: behold you shall call nations, to fulfill your command, not by your own power, but because of the Lord, above: and they shall adore for the sake of the Lord your God, who has chosen you (Isa 49:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
