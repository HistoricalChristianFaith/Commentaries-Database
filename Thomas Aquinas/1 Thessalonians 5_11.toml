[[commentary]]
quote='''
Then when he says, therefore encourage one another, he teaches us how we should behave toward special classes of people. And in this regard he makes three points; first, he shows how they should behave towards their equals; secondly, how they should be subject to their bishop (5:12). And finally, he shows how the bishops should behave toward their flock (5:14).

To our equals we owe consolation in times of difficulty, and so he says, encourage one another. In addition, they should inspire them through example, and so he says, and build one another up. "Let us then pursue what makes for peace and for mutual upbuilding" (Rom. 14:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
