[[commentary]]
quote='''
Then when he says "not as if," he gives the reason he worked with his own hands. Here he first sets aside a false reason, and, second, he gives the true reason.

It would be a false explanation of his manual labor to say that he was not permitted to receive some payment from them. And so he says "not as if we did not have power," nay, rather, we did have power to live off of what was received from the faithful. "He who serves the altar partakes of the altar" (1 Cor 9:13). "The workman deserves his food" (Matt 10:10). "Thus the Lord also ordained those who announce the Gospel to live from the Gospel" (1 Cor 9:14). And so based on the Gospel there are two kinds of men who have power to live off of what they receive from others, namely those who serve at the altar and those who preach.

Then when he says "but that we," he sets out the real reason. For we find two reasons why the Apostle worked with his hands, one among the Corinthians and another here. For the Corinthians were greedy and would have born with him only reluctantly, as is said there. But the reason why he worked here was their laziness, and so he says "that we might give ourselves as a pattern," namely of working. "Be an example to the faithful in word, in way of life, in love, in faith, in chastity" (1 Tim 4:12). "Being made patterns for the flock" (1 Pet 5:3).

Another reason is given in the Gloss on 1 Corinthians 4, namely that when he did not find anyone who would give him anything, then he worked.

A fourth reason was so that, like the monks of Egypt, they might not be idle. "Idleness teaches great wickedness" (Sir 33:29). Hence those who are not engaged in some duty, either of studying or of reading, put themselves in danger when they live in idleness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
