[[commentary]]
quote='''
And he shows their lack of hope: they were all confounded: put not your trust in princes: in the children of men, in whom there is no salvation (Ps 145:2–3[146:3]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
