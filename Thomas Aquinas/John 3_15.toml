[[commentary]]
quote='''
Now the fruit of Christ's passion is eternal life; hence he says, so that everyone who believes in him, performing good works, may not be lost, but have eternal life. And this fruit corresponds to the fruit of the symbolic serpent. For whoever looked upon the serpent of bronze was freed from poison and his life was preserved. But he who looks upon the lifted up Son of Man, and believes in the crucified Christ, he is freed from poison and sin: "Whoever believes in me will never die" (below 11:26), and is preserved for eternal life. "These things are written that you may believe... and that believing you may have life in his name" (below 20:31).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F3.htm'
source_title='Commentary on John'
