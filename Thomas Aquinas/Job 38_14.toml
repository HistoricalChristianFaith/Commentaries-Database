[[commentary]]
quote='''
In an earthquake some things are usually uncovered, like walls and things of this kind, and he expresses this saying, "The seal will be opened like clay." For clay, when it is divided, easily returns to the same condition, and so also a seal, for example, on a wall or something of this sort, which has been changed by the opening of the wall, is sometimes restored to the same place by divine power. Sometimes towers, trees and other things of this kind are shaken by an earthquake and do not fall, and as to this he says, "and will stand like a garment," which does not lose its original shape after it is shaken out.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
