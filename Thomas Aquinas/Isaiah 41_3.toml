[[commentary]]
quote='''
As to ease of pursuing, he shall pass in peace, namely, without labor, no path shall appear in his feet, as one who walks lightly, so that he leaves no footprints behind; or because labor, the sign of the way, was not left behind in his feet, above: they shall run and not labor (Isa 40:31).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'

[[commentary]]
quote='''
813. Christ passed in the peace, of the flesh toward the spirit, which he had: you shall know that your tabernacle is in peace (Job 5:24); of man toward his neighbor, which he taught, below: how beautiful upon the mountains are the feet of him that brings good tidings, and that preaches peace (Isa 52:7); of the world toward the Lord, which he made: making peace, and reconciling both to God (Eph 2:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
