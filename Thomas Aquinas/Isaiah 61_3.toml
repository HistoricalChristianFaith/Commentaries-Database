[[commentary]]
quote='''
To appoint to the mourners of Zion, in particular: with a great spirit he saw the things that are to come to pass at last, and comforted the mourners in Zion (Sir 48:27); and the sign of joy, when the signs of sadness are turned to signs of gladness, and this is and to give them a crown for ashes, above: in that day the Lord shall be a crown of glory (Isa 28:5).

1077. And they shall be called. Here he foretells the matter of their joy. And first, as to the restoration of buildings, setting out the condition of the rebuilders: and they shall be called in it, namely, Jerusalem, by the command and permission of Cyrus, the mighty ones of justice, constant in doing justice, not shaken by the threats of their adversaries; or this can refer to the apostles: as the rose planted by the brooks of waters (Sir 39:17[13]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
