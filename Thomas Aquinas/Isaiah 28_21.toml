[[commentary]]
quote='''
Second, he sets out the coming of the liberator, as in the mountain of divisions. He refers to the history which is found in 2 Kings 5; as in the valley, Joshua 10. Third, he excludes the help of mercy: that he may do his work, that is, that he may have mercy on us, as he did then, spoken interrogatively; and he responds: strange work: his tender mercies are over all his works (Ps 144[145]:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
