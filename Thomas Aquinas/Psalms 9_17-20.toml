[[commentary]]
quote='''
"Let them be turned back." Above, the Psalmist treated the judgment of God with regard to his own adversaries; here he pursues it with regard to the whole human race, and with regard to the evils done everywhere by sinners; and regarding this he does two things. First, by way of prayer, he foretells the judgment of God against the wicked. Second, he sets forth the progress of the wicked, at "Why, O Lord?" etc. Regarding the first, he does two things. First, he foretells the punishment of sinners; second, he calls upon the divine judgment that punishes, at "Arise, O Lord." Regarding the first, he does three things. First, he foretells the punishment to be desired. Second, he sets forth the cause of the punishment on the part of sinners, at "all the nations." Third, on the part of the just, "because not unto the end." He says therefore, "Let the sinners be turned back." This petition can be understood in two ways. In one way, of the punishment of the wicked in the present through death. In another way, in the future through eternal punishment. And he says, "Let the sinners be turned back," that is, let them be punished. But should this be requested? It must be said that the prophet says this by way of foretelling and not of petition, or by conforming himself to the divine will: Ps. 62: "They shall go into the lower parts of the earth." Is. 14: "But you shall be brought down to hell," that is, the depth of the pit. Or by hell is understood the obstinacy of the mind in sin, etc. Even while living, a sinner is turned back into hell when he relies upon obstinacy: Rom. 1: "God gave them up to a reprobate mind"; as if to say: in this life let them be cast down. Therefore, the punishment is conversion into hell, as has been said. The cause of the punishment is forgetfulness of God: for he who departs from one end disposes himself to tend toward the other. The two ends of man are the enjoyment of God and Gehenna; and this is what he says, "Let them be turned back," etc., namely those sinners who forget the commandments and benefits of God. Ps. 77: "They forgot his benefits and his wonders which he showed them." Deut. 32: "You have forsaken the God who begot you, and forgotten the Lord your creator."

On the part of the just, there is another cause which demands vengeance upon sinners. Now among the just there are two things which demand vengeance: namely temporal abasement and spiritual virtue. As to the first, he says: "because the poor man shall not be forgotten unto the end." Cheap things are held in contempt, words are given to oblivion; but the just are not so given to oblivion before God. Jas. 2: "God has chosen the poor, rich in faith, heirs of the kingdom which God has promised to those who love him." Mt. 5: "Blessed are the poor in spirit, for theirs is the kingdom of heaven." Therefore, although here they seem to be given to oblivion, this is nevertheless not "unto the end," that is, not finally. Is. 54: "For a brief moment I forsook you, and with great mercies I will gather you." And there follows: "And with everlasting mercy I have had compassion on you." For when he remembers, then he will punish those who oppress. Ps. 76: "God will not forget to have mercy, nor will he shut up his mercies in his wrath." As to the second, "the patience of the poor," etc. Or "the expectation" according to Jerome. For since they endure oppression and poverty here patiently, through patience they merit vengeance; nor shall their expectation perish unto the end, because they shall obtain the good they await. Otherwise, "unto the end," which is eternal life. But is patience in the heavenly homeland? It must be said that it is not according to its essence, but according to its fruit; it is otherwise with charity and justice, which will exist also according to their essence. Consequently, when he says, "Arise," he foretells the divine judgment; and regarding this he does three things. First, he rouses the judge. Second, he implores judgment. Third, he shows the fruits of judgment. He says that he has not forgotten the poor unto the end; hence he, as one of the poor, says, "I ask that you not delay until the end to reward; but arise." And regarding this he does three things. First, he repudiates wicked or human judgment. For let not man, humanly and without reason oppressing, "be strengthened," that is, let him not be able to do what he wishes. Prov. 29: "When the wicked take power, the people groan." Second, he calls for the judgment of another: "Let the nations be judged," not according to human will, but "in your sight," that is, by your judgment, as if saying, I appeal to you. Acts 25: "I stand before the tribunal of Caesar; there I ought to be judged." Ps. 23: "Judge me, O Lord, because," etc. Third, he asks for a helper: "Appoint a lawgiver," namely your Son. Is. 33: "The Lord is our lawgiver." Or otherwise, "appoint a lawgiver," that is, a punisher according to your law; for punishment is inflicted according to the law. Jerome has: "Put fear upon them"; another translation: "Send them bitterness." The Gloss: "Let not man be strengthened," that is, the Antichrist; "let them be judged," that is, punished. The fruit of judgment is that they recognize themselves to be men: "Let the nations know that they are men," fragile, sinners, and mortal. Is. 28: "Vexation gives understanding." Thus Alexander, when he was struck, recognized that he was not the son of Jupiter but mortal, as he himself said to his soldiers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
