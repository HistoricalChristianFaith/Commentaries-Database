[[commentary]]
quote='''
But Eliud saw one could anger him and that it was because of a miracle that such great wisdom and eloquence was given to a young man and this is sufficient reason to dispute against a very wise old man. Therefore he sustains the fact implying this was given to him miraculously, saying, "Yet let my miracle not terrify you," so that you do not dare answer one who has obtained wisdom miraculously, "and let my eloquence not prove a burden for you," so that you are astonished because of it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
