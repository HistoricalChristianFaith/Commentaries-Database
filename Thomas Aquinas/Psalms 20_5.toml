[[commentary]]
quote='''
"We shall rejoice." Here the reason for being heard is set forth. God gladly gives good things to those who share them with others: 1 Pet. 4: "Administering it to one another." And therefore the reason for being heard is when the good that is sought ought to be shared with others. And this is done, first, as regards the joy of many; as if to say: we, being exalted, "shall rejoice in your salvation," not in ourselves. Gregory says: it is just that he should always find sorrow in himself, who, having abandoned God, was seeking joy in himself. "And we shall be magnified in the name of our God," by the invocation of him who exalted you: Wis. 19: "In all things you have magnified your people, and have honored them, and have not despised them, in every place and at every time assisting them." And therefore he says, "We shall be magnified," etc., that is, we shall be great.

"May he fulfill." Here he treats of outward petitions: and this when God hears what we ask, because Christ made many petitions for us (Jn. 16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
