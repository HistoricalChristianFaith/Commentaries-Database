[[commentary]]
quote='''
Among the nights which find a place in the memories of men, some are not only remembered, but are also celebrated and festive on which people gather together to make merry. He takes this good away from this night saying, "Let that night be lonely." When men come together for things like this on a given night, they do so in praise and celebration of that night because of some important deed which is remembered on that night, as is the case with the faithful when they celebrate the night of the Lord's Resurrection. So he adds, "let it not be worthy of praise." For certain nights are worthy of praise because of some great deed which happened on that night.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
