[[commentary]]
quote='''
Since the rich who deride the simplicity of the just do not stop at this but go as far as contempt of God, he adds, "the tents of the robbers abound." Because some place their end in riches, it follows they search carefully for all the ways to attain this last end either by fraud or by some other manner. So they become robbers who abound in the wealth when they rob. Contempt of God follows from this abundance, and so he adds, "and they audaciously provoke God." For someone acts audaciously when he believes what he is doing is good. For since the conscience is vexed about evil, man does not perpetrate evil without fear, as Wisdom says, "Since iniquity is fearful, it is condemned by all." (Wisdom, 17:10) Those who place their ultimate end in riches, think from this very fact that everything is good which is useful to attain this end. Now it is clear that when they acquire riches by robbery, they provoke God by acting against his justice, and so they consequently audaciously provoke God. Or, another interpretation is: from riches man becomes so swelled with pride he thinks he is sufficient unto himself through them and so he has audacious contempt for God, because he put his confidence in riches. As Deuteronomy says, "The beloved grew fat and disobedient." (Deut. 32:15)

He had said that the tents of robbers who provoke God abounded. So lest someone perhaps object that this kind of abundance is not from God, he says, "since he has given everything into their hands," into their power. For the power to harm someone comes only from God, but the will to do evil comes only from oneself. By the fact then that they rob they provoke God, but their resulting abundance comes to them from God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
