[[commentary]]
quote='''
He shows this is true by adding, "The small and the great are there," on an equal basis because smallness and greatness are reckoned in this life according to the inequality of earthly prosperity, when this is taken away they return to their natural equality. Therefore "the small and the great" should be interpreted to mean those who were different in this life because of the magnitude of earthly prosperity. Yet note that the difference between small and great in spiritual goods remains even there. But he does not speak about these goods now as has already been explained. There "the slave is free from his master," and so there will be no place there for tribute or anything of this sort.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
