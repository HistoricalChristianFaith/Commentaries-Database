[[commentary]]
quote='''
Since his feet (his faculties) have been ruined, the consequence is that his progress is also impeded, and so here the text continues, "They have demolished my routes," all the progress of my works. Further they also crushed me in person with deceit, which he intimates when he continues, "they have lain in ambushes for me," and with power, in what he adds, "and they prevailed," without any objection, because no one obstructed them in doing it. So he then says, "and there was no one who brought aid," to me when I was oppressed by them, nor even someone who obstructed them from approaching me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
