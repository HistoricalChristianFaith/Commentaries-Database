[[commentary]]
quote='''
Next he shows their total destruction; hence he says, "and I will grind them." When dust is thrown, no trace remains, because the wind scatters it; so when the wicked are destroyed, they remain in no way. Therefore he says, "and I will grind them like dust before the wind." Ps. 1: "The wicked are like dust which the wind casts from the face of the earth," that is, they are scattered. Ps. 9: "Their memory has perished," etc. But because some are destroyed sometimes with honor, he shows that the wicked or sinners are consumed vilely and dishonorably; hence he says, "like the mud of the streets I will destroy them." Job 20: "If his pride," namely the sinner's, "ascend even to heaven, and his head touch the clouds, he shall be destroyed in the end like a dunghill." Ps. 68: "Let them be blotted out of the book of the living." Is. 17: "He shall be carried away like the dust of the mountains before the wind" (namely the sinner) "and like a whirlwind before a tempest." Job 13: "Your necks shall be brought down to the mud."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
