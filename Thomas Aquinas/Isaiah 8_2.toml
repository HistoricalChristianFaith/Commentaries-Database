[[commentary]]
quote='''
266. And I took unto me. Here the sign is confirmed by testimony; faithful witnesses: in the mouth of two or three witnesses let every word stand (Deut 19:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
