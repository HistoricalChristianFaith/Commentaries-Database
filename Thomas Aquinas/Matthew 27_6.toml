[[commentary]]
quote='''
He shows what was done with the money of Judas. And first, it is said how it is excluded from the treasury; secondly, on what it was spent. He says therefore: "but the chief priests having taken the pieces of silver, said: It is not lawful to put them into the treasury etc." It should be noted that into the treasury was placed the offering of gratitude, or the gift of grace. Hence some offerings were voluntary, others from obligation: the voluntary ones were put into the treasury, the others elsewhere; Sirach 34:23: "the Most High approveth not the gifts of the wicked." "It is not lawful therefore to put them into the treasury, because it is the price of blood." And in this the word of the Lord is verified, above at 23:24: "straining out a gnat and swallowing a camel." They did not wish to put this money into the treasury, but they readily dealt with the death of the Son of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
