[[commentary]]
quote='''
Since Job in what has gone before has accused his friends of afflicting him and confounding him with words, (19:2) Eliud shows this is not true with him saying, "My words are in a simple heart," as if to say: I do not speak to falsely condemn or to ridicule, but to show the truth with a simple heart. Since Job had accused the other three men of being, "fabricators of a lie and worshippers of false dogmas," (13:4) he excludes this from himself saying, "and my lips will speak a pure opinion," without the mixture of any falsity or error.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
