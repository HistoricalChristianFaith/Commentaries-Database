[[commentary]]
quote='''
Likewise, he is not inconstant as seeking profit. Why then did you go out? For all riches pertain to some bodily use, such as food or clothing. And it is evident that neither of these had any influence. Therefore, there is no reason to believe that he says this for any advantage: Why then did you go out? To see a man clothed in soft raiment? But why does he make no mention of food? Because there was no question on that point. But he was clothed in camel's hair. Hence those who wear soft raiment are not in the desert but in kings' houses. Chrysostom explains it another way: Some are lightheaded by nature, others from pleasure, as Hosea (4:11) says: "Fornication and wine and intoxication take away understanding." He removes the first by what he said above; the second, when he says, wear soft garments; therefore, he is not inconstant from the pleasures of life.

But here a question can be raised about being clothed in pleasures: Is it a sin? If not, it should not have been charged against that rich man, who dressed in purple and fine linen every day (Lk 16:19). Augustine says that such things are not to be considered, but the intention of the user; for one should be dressed after the custom of those among whom he lives. Therefore, the custom needs further clarification. Hence some dress more sparingly, some more ornately; and both ways require a distinction. If more sparingly, then it is either for a good intention, and this is good, or is for vainglory, and this is evil. If more ornately, it is on account of pride, and this is evil; or for a symbol, as a bishop or priest, and this is good. Mystically, by men who wear soft garments are signified flatterers; for he is dressed in soft garments who is mollified by complimentary words, as proud men seek glory from words: "If a ruler listens to the words of a lie, all his officials will be wicked" (Pr 29:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
