[[commentary]]
quote='''
He continues: Hypocrite, first take the log out of your own eye. The Lord begins by arguing as below against the wicked servant. Augustine: "He shows that he intends to rebuke those who assume authority they do not have"; to the sinner God says: "Why do you recite my statutes or take my covenant on your lips? For you hate discipline" (Ps 50:16). First take out by fasting and prayer the log from your own eye, and then you will be able to see the speck in your brother's eye.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
