[[commentary]]
quote='''
Then he shows the effects of the different winds. On this subject one must consider that the South winds produce the rains and storms. North winds cause cold air. Southern winds come to us from the direction of the South Pole, which is unknown to us, because it is sunk down beneath our horizon by the same distance as the North Pole is elevated above our horizon, and so he says, "From the lower part, storms will arise," as if to say: A storm comes to us by a wind which proceeds from the part of heaven which is always extended down under our horizon, and this wind is called the South Wind. As to the North Wind he says, "and the cold wind comes from the Arctic." For "Arktos" in Greek means the Northern Hemisphere, from which the name "Arcturus" comes for the constellation of Ursus, which is always elevated above the horizon. The northern wind comes from this direction and causes cold because the sun is farther from that part of heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
