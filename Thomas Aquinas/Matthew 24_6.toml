[[commentary]]
quote='''
For you shall hear of wars, etc. Here, first, he sets forth the dangers; secondly, he gives comfort. He says, therefore: so it was said, take heed that no man seduce you, for you shall hear of wars, etc. And this happened immediately after the Passion. For immediately the most wicked tyrants were sent into Judea by the emperor, who burdened them marvelously, so that they could scarcely endure. Hence, you shall hear of wars and rumors of wars, because in wars rumors count for much; hence it often happens that a few defeat many; Jeremiah 8:16: The snorting of his horses was heard from Dan; all the land was moved at the sound of the neighing of his warriors. And see. Some might believe that the end of the world was coming immediately; hence it is said that the tribulation was so great that they believed the end of the world had come; therefore he says, see that you be not troubled. For these things must come to pass, but the end is not yet, as though the destruction of Jerusalem were meant, because its destruction did not come until fifty years after the Passion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
