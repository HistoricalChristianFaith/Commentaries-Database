[[commentary]]
quote='''
But because the Corinthians could say: it is not necessary for you to protect us, and your zeal is not reasonable, because we can take care of ourselves very well, he discloses the cause of his zeal saying, but I am afraid that as the serpent deceived Eve by his cunning, your thoughts will be led astray. Here it should be noted that in paradise Adam and Eve were married, but Eve was corrupted by the serpent, not with violence, but with craftiness, inasmuch as he promised something false and urged something wicked: false, when he said, "You will be as gods" (Gen. 3:5), and "No, you will not die" (Gen. 3:4), even though they did incur guilt as a result; wicked, when he persuaded her to transgress and ignore God's command. The Apostle, speaking according to this likeness, says that the Church is like Eve, whom the devil has sometimes persecuted openly by tyrants and potentates, and then "like a roaring lion, seeking someone to devour," as it says in 1 Pet. (5:8); and sometimes he molests the Church in secret by heretics who promise the truth and pretend to be good, and then as the serpent deceived Eve with his subtility by promising false things.

Therefore he says, I am afraid that as the serpent deceived Eve, casting her out of paradise, by his cunning with false promises: "Adam was not deceived, but the woman" (1 Tim. 2:14), so, i.e., by like deceptions of heretics, your thoughts will be led astray. He says, your senses, because just as in a natural marriage a spouse takes precautions against his bride's being corrupted carnally, so in this spiritual marriage the Apostle fears that the senses of the heart will be spiritually corrupted: "Bad company ruins good morals" (1 Cor. 15:33). Or the spiritual senses referred to in Wis. (1:1): "Think of the Lord with uprightness"; "Do not be children in your thinking" (1 Cor. 14:20). And from a sincere and pure devotion to Christ. That is simple which lacks composition. Therefore, the false apostles formed one sect with Judaism and the Gospel, commanding that the ceremonies of the Law be observed along with the Gospel. Therefore, they fall from the simplicity of Christ, who, being seduced by the false apostles, observe those ceremonies along with the Gospel; and this the Apostle feared about the Corinthians: "The integrity of the upright guides them" (Prov. 11:3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
