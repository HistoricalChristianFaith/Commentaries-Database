[[commentary]]
quote='''
Second, Ezechias asks for a sign: and Ezechias had said: what shall be the sign? The Jews require signs: and the Greeks seek after wisdom (1 Cor 1:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
