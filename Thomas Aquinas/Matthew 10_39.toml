[[commentary]]
quote='''
But they could say: What shall we get from all this? So he shows them the punishment for those who do not obey; hence he says, He who finds his life [soul] shall lose it. Soul is taken for life. When one is in danger of losing his money, he says: I have lost my money; and if he is freed from danger, he says that he has found his money. In like manner if one is in bodily danger and is freed by some chance, he says that he has found his life. Therefore, one who finds his life and was in danger on my account and denies me to find his life, is not worthy of me. And he who loses his soul, i.e., life, i.e., if he exposes himself to death for my sake, will find it: "He that finds me shall find life and will draw salvation from the Lord" (Pr 8:35).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
