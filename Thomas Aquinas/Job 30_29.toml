[[commentary]]
quote='''
These came partly from the lack of friends about whom he continues, "I was the brother of snakes," because those who should have loved me as a brother, bit me like snakes, "and the companion of ostriches," who usually forget even their own offspring. (39:15) So they were so forgetful of me that they did not help me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
