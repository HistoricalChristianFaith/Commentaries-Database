[[commentary]]
quote='''
624. – Then when he says, By faith the walls of Jericho fell down, by the going round them seven days, he describes what happened when they entered the promised land. This is mentioned in Joshua (6), where it is stated that at God's command the priests for seven days should go around the first city beyond the Jordan, namely, Jericho, with the ark of the covenant, and on the seventh day the walls fell down. Here was something on the part of men, namely, that at the Lord's command they went round, believing that God's command would be fulfilled, and something on God's part, namely, the walls fell down by their going round.

625. – Morally, Jericho is interpreted moon or defect, and signifies this world. Its walls are the obstacles by which some are held fast in the world. By the trumpets, which the Levites and priests sounded, the voice of preachers is signified. By the going round for seven days is designated the course of the present time, which is completed in seven days. By this we are given to understand that all the obstacles of the world fall at the continuous sound of preaching: 'The weapons of our warfare are not carnal, but mighty to God unto pulling down of fortifications, destroying counsels and every height that exalts itself against the knowledge of God' (2 Cor. 10:4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
