[[commentary]]
quote='''
He concludes: How can people like you believe, when you crave praise from each other, i.e., human praise, and yet not even ask for that one praise which is from God alone? which is true glory. The reason they could not believe in Christ was that, since their proud minds were craving their own glory and praise, they considered themselves superior to others in glory, and regarded it as a disgrace to believe in Christ, who seemed common and poor. And this was why they could not believe in him. The one who can believe in Christ is the person of humble heart, who seeks the glory of God alone, and who strives to please him. And so we read: "Many of the leaders believed in him; but they did not admit it because of the Pharisees, so that they would not be expelled from the synagogue" (below 12:42). We can see from this just how dangerous vainglory is. For this reason Cicero says: "Let a man beware of that glory that robs him of all freedom; that freedom for which a man of great spirit should risk everything." And the Gloss says: "It is a great vice to boast and to strive for human praise: to desire that others think you have what you really do not have."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
