[[commentary]]
quote='''
"And idols shall be utterly destroyed": "your idols shall be broken in pieces and shall be no more, and your temples shall be destroyed" (Ezek 6:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
