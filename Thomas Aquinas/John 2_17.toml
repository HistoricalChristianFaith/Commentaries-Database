[[commentary]]
quote='''
Then when he says, His disciples then remembered, he sets down a prophecy which was written in Psalm 69 (v 9): "Zeal for your house consumes me." Here we should remark that zeal, properly speaking, signifies an intensity of love, whereby the one who loves intensely does not tolerate anything which is repugnant to his love. So it is that men who love their wives intensely and cannot endure their being in the company of other men, as this conflicts with their own love, are called "zelotypes." Thus, properly speaking, one is said to have zeal for God who cannot patiently endure anything contrary to the honor of God, whom he loves above all else: "I have been very zealous for the Lord God of hosts" (1 Kgs 19:10). Now we should love the house of the Lord, according to the Psalm (25:8): "O Lord, I have loved the beauty of your house." Indeed, we should love it so much that our zeal consumes us, so that if we notice anything amiss being done, we should try to eliminate it, no matter how dear to us are those who are doing it; nor should we fear any evils that we might have to endure as a result. So the Gloss says: "Good zeal is a fervor of spirit, by which, scorning the fear of death, one is on fire for the defense of the truth. He is consumed by it who takes steps to correct any perversity he sees; and if he cannot, he tolerates it with sadness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
