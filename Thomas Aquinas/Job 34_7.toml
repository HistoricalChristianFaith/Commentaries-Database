[[commentary]]
quote='''
After Eliud had laid this perversity on Job himself, he begins to reprimand him about this saying, "What man is like Job?" as if to say: There is no one like him who seems to be as perverse as he is. For it seemed the greatest perversity when someone laughs at God by disparaging his judgments, and so he says, "who drinks derision," the derision and reproving of divine judgments, "like water." This is drunk easily and for refreshment, as if he imputes to him the crime that what bursts forth as an affront to God, was for him the cooling of his tribulation and he was doing this without the contradiction of his conscience reproving him for it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
