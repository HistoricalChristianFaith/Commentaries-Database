[[commentary]]
quote='''
Since he had spoken many times about the divine effects, lest this be imputed to him from presumption as though he thought that he knew perfectly these things, he disclaims this saying, "Who will tell him what I am saying?" as if he says: No one can sufficiently tell these things which I said to you about his effects. It befits him alone because of the excellence of his power. If anyone raises himself up to such presumption that he thinks he speaks about God sufficiently, danger would threaten him by that very fact, and so he says, "Even if a man speak," as though willing to understand the divine effects, "he will be devoured," as if swallowed up by the greatness of the matter about which he speaks, as Proverbs says, "He who investigates majesty will be crushed by glory." (Prov. 25:27) This can also be interpreted in another way. Not only is man not fittingly able to list the divine effects, but, "even if he (God himself) speaks," to them by revealing them to man, "man would be devoured," unable to understand such a great thing, and so we read in John, "I have many things to say to you which you are not able to bear now," (16:12) and in Deuteronomy, "What is flesh that it should hear the voice of the living God." (5:26)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
