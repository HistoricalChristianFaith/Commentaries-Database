[[commentary]]
quote='''
The fourth authority contains the reverence of the gentiles toward Christ. Hence he continues: and again Isaiah says: the root of Jesse shall come (Isa 11:10). Here he foretells the origin of Jesus, that he will be born of the seed of Jesse. For Jesse was David's father. Therefore he says: there shall be a root of Jesse, from whose seed Christ will be born: in that day the root of Jesse shall stand as an ensign to the people (Isa 11:10). Or Christ will be the root of Jesse, because although he came from Jesse according to bodily origin, yet it was his power that sustained him and gave him grace: you do not bear the root but the root bears you (Rom 11:18).

Then he touches on Christ's office, adding: he who shall rise up with such excellent grace that he is able to rule the gentiles by leading them to divine worship, which no one had been able to do previously: I will make the gentiles your heritage. You shall rule them with a rod of iron (Ps 2:8).

Finally, he mentions the devotion of the gentiles to Christ, saying: in him the gentiles shall hope, i.e., to obtain through him the inheritance of heavenly glory: we have been born anew to a living hope through the resurrection of Jesus Christ from the dead (1 Pet 1:3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
