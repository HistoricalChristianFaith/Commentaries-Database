[[commentary]]
quote='''
"A torrent divides them from people traveling." For torrents often flow down in the foothills of certain mountains which cannot be crossed so that on one bank of the river is the road for travelers to pass, and there is no access to the other bank. Sometimes it happens that there are some men who live here and there in such inaccessible places like these. Even the beggars who go everywhere do not presume to go to these places because of the difficulty of the approach, and so he says, "and," the torrent divides from the people traveling, "those," men, "whom" living in inaccessible places, "the step of the poor man has forgotten," so that they do not go there, "and those trackless," because there is no road open to them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
