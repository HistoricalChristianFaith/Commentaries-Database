[[commentary]]
quote='''
With whom you rejoice in this too; hence he says, likewise you also should be glad and rejoice with me: "Rejoice with those who rejoice" (Rom. 12:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Philippians.html'
source_title='Commentary on Philippians'
