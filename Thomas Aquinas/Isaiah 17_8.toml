[[commentary]]
quote='''
Temples (delubra), temples in which there were fonts, as though for washing, below: in that day a man shall cast away his idols of silver (Isa 31:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
