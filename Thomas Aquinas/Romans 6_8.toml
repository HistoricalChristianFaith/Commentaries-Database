[[commentary]]
quote='''
Then when he says, now, if we be dead, he clarifies the second effect by showing how it conforms one to the life of Christ. The reasoning is this: one who dies with the dying Christ also lives with the rising Christ.
But Christ rose from the dead, in such a way that he will never die again. Therefore, one who has died to sin lives with the risen Christ in such a way that he has the faculty of never returning to sin.

In regard to this he does three things:
first, he shows the believer's conformity to the risen Christ;
second, he gives a condition of this life, at knowing that Christ;
third, he draws the intended conclusion, at so do you also.

First, therefore, he says, now, if we be dead with Christ, i.e., if we are dead to sin by virtue of Christ's death, we believe that we shall live also together with Christ, i.e., in the likeness of his life. We shall live, I say, the life of grace here and the life of glory in the future: when we were dead through sin, he made us alive together with Christ (Eph 2:5).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
