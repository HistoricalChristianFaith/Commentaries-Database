[[commentary]]
quote='''
"Hear another parable." The Lord had asked about the baptism, and they refused to answer; but now he questions covertly, so that they may not perceive; therefore he sets forth a parable, and does two things. First, he presents the parable; secondly, he demands their verdict, at "when therefore the lord of the vineyard shall come, what will he do to those husbandmen?" Concerning the first, three things. First, the benefit conferred is presented; secondly, the demand for recompense, at "and when the time of the fruits drew near" etc.; thirdly, the ingratitude, at "and the husbandmen laying hands on his servants" etc. Concerning the first, three things. First, the planting of the vineyard is presented; secondly, its adornment; thirdly, its leasing. He says therefore "there was a man, a householder, who planted a vineyard" etc. A similar passage is found in Isa 5:1, where it says: "A vineyard was made for my beloved on a horn of an olive tree." But here he says that the householder plants a vineyard. Some say that there he inveighs against the vineyard; hence he says: "What more could I have done for my vineyard?" But here against the husbandmen. Therefore it is explained in two ways according to Jerome and Chrysostom. The vineyard is called the Jewish people; Isa 5:7: "The vineyard of the Lord of hosts is the house of Israel." It is against the husbandmen, because as regards the present, this malice did not proceed from the people, but from the rulers; John 7:48: "Hath any one of the rulers believed in him?" Therefore not against the vineyard. This vineyard is not the house of Israel, but the justice of God, which was secretly handed down in sacred Scripture; hence he says "there was a man, a householder, who planted a vineyard," i.e., the Jewish people; Ps 79:9: "Thou hast brought a vineyard out of Egypt." Or he placed justice in the teaching of the law. "And made a hedge round about it," for the protection of the vineyard; hence those things which are set for protection, whether they be the prayers of the saints, or the guardianship of angels, are called a hedge; hence Hosea 2:6: "I will hedge up thy way with thorns." But if the vineyard is called justice, by the hedge he means the hidden words of Scripture. For according to the mystical sense, the hidden things of Scripture are not to be disclosed to anyone, because "what is holy is not to be given to dogs," above (7:6). "And dug in it a winepress." A winepress is set up so that the wine of charity may be pressed out. If by the vineyard is understood the Jewish people, by the winepress is understood the altar of holocausts. Likewise, the martyrs are understood, who shed their blood for the faith; Isa 63:3: "I have trodden the winepress alone." Or it can also be understood as the order of prophets, in whom the wine of wisdom was pressed out. Or it can be called the depth of sacred Scripture. Likewise, all the fruit of the vineyard is gathered in the winepress: so whatever the soul can do, all should be gathered to the praise of God. "And built a tower." By the tower is understood the temple. Micah 4:8: "And thou, O cloudy tower of the flock, unto thee shall the first dominion come." Or the knowledge of God; Prov 18:10: "The name of the Lord is a strong tower." Then concerning the leasing: "and let it out to husbandmen," i.e., he established it on a fixed payment. The husbandmen are Moses and Aaron, who held the governance. Job 31:39: "If I have afflicted the soul of the tillers thereof." Gregory: those who are placed over the people. "He went abroad," the Lord, not by changing place, but by leaving man to his own free will. Sir 15:14: "God made man from the beginning, and left him in the hand of his own counsel," i.e., he dismissed him to his own free will. Hence he is said to go abroad, when he does not inflict punishment for every sin. Or he did not appear so manifestly as before, namely, as when he appeared in the bush (Exod 3:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
