[[commentary]]
quote='''
But this predestination was first hidden, but is now manifest. And how? As the thoughts of the heart are manifested through works, hence now in the doing of the work, a choice is manifested by the illumination. He is speaking precisely, because to manifest is to bring to light: the hidden things he has brought forth to light (Job 28:11). Thus, therefore, it is made manifest by the illumination of our Savior, Jesus Christ, by the sending of Christ to enlighten us: arise, be enlightened, O Jerusalem, for your light is come (Isa 60:1); to enlighten them that sit in darkness, and in the shadow of death (Luke 1:79).

Then when he says, who has destroyed death, he commends Christ the Enlightener: first, his power in regard to the evils he removed; second, as to the good things he bestowed.

He says, therefore, Christ, inasmuch as he suffered for us, has destroyed death, i.e., satisfied God for our sins: Christ dies once for our sins, the just for the unjust (1 Pet 3:18). And sin was the cause of our bodily death: the wages of sin is death (Rom 6:23); and so by destroying sin, he destroyed death: O death, I will be your death; O hell, I will be your bite (Hos 13:14).

He also conferred perfect goods: first, upon the soul in the present life by the grace of faith: my just man lives by faith (Hab 2:4); which is imperfect in this life, but will be perfected in glory: this is eternal life: that they may know you, the only true God, and Jesus Christ whom you have sent (John 17:3). Second, he conferred on the flesh immortality resulting from the soul's glory: for this corruptible must put on incorruption; and this mortal must put on immortality (1 Cor 15:53); I am come that they may have life now by grace, and have it more abundantly in the future by glory (John 10:10). Again: and everyone that lives and believes in me shall not die for ever (John 11:26).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
