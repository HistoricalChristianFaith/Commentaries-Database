[[commentary]]
quote='''
Then, the miracle is made known. For as soon as the jars were filled, the water was turned into wine. So the Lord reveals the miracle at once, saying: Now pour out a drink and take it to the head waiter. First, we have the command of Christ selecting who is to test the wine; secondly, the judgment of the head waiter who tasted it.

Then Jesus said to them, i.e., to the servants, Now pour out a drink, that is, of wine, from the jars, and take it to the head waiter (architriclinus). Here we should note that a triclinium is a place where there are three rows of tables, and it is called a triclinium from its three rows of dining couches: for cline in Greek means couch. For the ancients were accustomed to eat reclining on couches, as Maximus Valerius recounts. This is the reason why the Scriptures speak of lying next to and lying down. Thus the architriclinus was the first and chief among those dining. Or, according to Chrysostom, the architriclinus was the one in charge of the whole banquet. And because he had been busy and had not tasted anything, the Lord wanted him, and not the guests, to be the judge of what had been done, so some could not detract from the miracle by saying the guests were drunk and, their senses dulled, could not tell wine from water. For Augustine, the architriclinus was the chief guest, as was mentioned; and Christ wanted to have the opinion of this person in high position so it would be more acceptable.

In the mystical sense, those who pour out the water are preachers: "With joy you will draw water from the springs of the Savior" (Is 12:3). And the architriclinus is someone skilled in the law, as Nicodemus, Gamaliel or Paul. So, when the word of the Gospel, which was hidden under the letter of the law, is entrusted to such persons, it is as though wine made from water is poured out for the architriclinus, who, when he tastes it, gives his assent to the faith of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
