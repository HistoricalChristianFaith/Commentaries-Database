[[commentary]]
quote='''
After Blessed Job has shown that it is not his intention to argue with God, he proposes the principle issue in dispute between him and his adversaries. For Eliphaz had said that punishments from God are only sent for sins. Job had spoken against this in his first response. Since Baldath had tried to support the opinion of Eliphaz, Job repeats his opinion a second time saying, "I have said one thing: he destroys both the innocent and the wicked." By this he seems to mean: Death is inflicted by God not only on sinners, but also on the innocent, which is the greatest of the present punishments. So, what you say is not true, i.e. that man is only punished by God for his own sins. Deuteronomy teaches that death comes from God, "I give death and I will give life." (32:39) But although death is commonly inflicted by God on everyone, one thing which seems most severe is that the innocent experience many adversities in this life, besides the death which is common to all. He now intends to investigate the cause of this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
