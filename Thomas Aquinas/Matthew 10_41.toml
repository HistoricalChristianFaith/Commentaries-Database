[[commentary]]
quote='''
Furthermore, something else will follow, namely, the reward of a prophet. Hence he who receives a prophet in the name of a prophet, shall receive a prophet's reward. There are two outstanding qualities in a prophet, namely, prophecy: "I will pour out my spirit on all flesh; and your sons and your daughters shall prophesy" (Jl 3:28); and the gift of justice: "Whom God made our wisdom and justice" (1 Cor 1:30). He who receives a prophet in the name of a prophet can be taken to mean he who receives a prophet in as much as he is a prophet, will receive the reward of a prophet. Or in another way: You say that we should receive the apostles, but some pseudo-apostles or pseudo-prophets will come. Therefore, he says: I am emphasizing not their reality but their name, because one who receives him in the name of a prophet, will have a reward. And which reward? The same as you would have if you received a true prophet. Furthermore, he makes no distinction about who he is, whether the one or the other. For he who receives a prophet, receives the reward of a prophet, because a prophet is thereby more inclined to do his work; for not only those who do, receive a reward, "but even those who consent to those doing it," as it says in Romans (1:32). Hence if you work together with a good one, you will receive a reward from that good one; if you minister the necessities of life, you receive a reward, because otherwise he could not fulfill his office. What follows is the same: He who receives a righteous man in the name of a righteous man, or Elijah, I would be glad to receive him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
