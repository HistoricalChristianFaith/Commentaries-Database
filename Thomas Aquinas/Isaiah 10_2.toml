[[commentary]]
quote='''
Second, as to the intention of oppressing those who are powerless, either because of poverty: the poor, or because of low rank: humble: they crush as the dust (Amos 2:7); or because of weakness of sex: widows; or because of age: orphans. Above: they judge not for orphans (Isa 1:23).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
