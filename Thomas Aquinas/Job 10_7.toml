[[commentary]]
quote='''
So, after the investigation of this sort is completed and you find no sin in me, "Know that I have done nothing wicked," as though you could not know this otherwise than you do not search my sins using scourges. Do this freely and without contradiction, "since there is no one who can take me from your hand." For sometimes judges fail to discover the truth using torture while those who ought to be tortured are taken out of their hands.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
