[[commentary]]
quote='''
Usually when many must be punished the judges cannot examine the cases of each one with great care. Lest this be believed about God, he says, "for he knows their works," what each one deserves. Therefore, he gives to each one according to his works, and so he says, "for that reason he will bring about the night," that is, sudden and unexpected adversity, "and they will be destroyed," unexpectedly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
