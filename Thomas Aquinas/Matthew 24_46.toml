[[commentary]]
quote='''
There follows the reward; and first he says what it is; secondly, in what it consists. What is the reward? Blessedness; hence he says, blessed, whether at death or at the end of the world, is that servant whom, when his lord shall come, he shall find so doing, namely, administering, as has been said. Psalm 118:1: Blessed are the undefiled in the way, who walk in the law of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
