[[commentary]]
quote='''
However, man is not totally destroyed in death, because the immortal soul remains, and so he says, "Yet not for the destruction," of living men, "do you send forth your hand," to reduce them to nothing by your power. "And if they should be corrupted," by death, "he will save them," and by making their souls happy. I hope for this from your kindness, however hard and cruel you seem to me in these temporal adversities.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
