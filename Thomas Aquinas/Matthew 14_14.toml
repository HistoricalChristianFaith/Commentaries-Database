[[commentary]]
quote='''
And he coming forth saw a great multitude, etc. Here he touches on the marvelous deeds which the Lord worked going forth from the desert: and rightly, because while he was in heaven, the crowds did not seek him; John 16:28: I came forth from the Father and am come into the world. He saw the multitude. Hence he was stirred to compassion; hence it follows and he had compassion on them; hence he immediately showed them mercy: Ps 85:15: the Lord is compassionate and merciful, patient and plenteous in mercy, and true. There follows the effect of this compassion: and he healed their sick, namely, freely and without being asked. Ps 106:20: he sent his word and healed them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
