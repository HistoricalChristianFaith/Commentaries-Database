[[commentary]]
quote='''
It is characteristic of those who want to persevere in their sins to condemn divine judgments, and so he says, "who walks," that is, consents, "with those who do evil," who despise divine judgments. Moreover, men acting against the piety of divine religion not only despise divine judgments, but also deny them or assert that they are unjust. He believed that Job was one of them, and so he says, "and he walks with evil men," who cast aside the piety of divine religion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
