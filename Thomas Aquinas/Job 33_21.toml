[[commentary]]
quote='''
Fourth, he places leanness when he says, "His flesh will waste away," that is, will fail, "and," consequently, "the bones which were hidden," by flesh, "will be laid bare," because they will appear to be covered only by skin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
