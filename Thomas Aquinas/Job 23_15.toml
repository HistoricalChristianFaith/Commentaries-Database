[[commentary]]
quote='''
"On that account," because I consider that he can do more and I cannot tell whether he does will to do more, "I am disturbed," with the anguish of fear. So he then says, "when I consider him," his power, "I am more overcome with fear," that he is going to try me with still more grave adversity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
