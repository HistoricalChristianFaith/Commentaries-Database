[[commentary]]
quote='''
Then when he says, but now, he describes the state of justice:
first, he describes a condition of this state;
second, the effect, at you have your fruit;
third, the end, at and the end life.

In regard to the first it should be noted that just as when one is by sin inclined to evil, he is free from justice, so when one is by the habit of justice and grace inclined to good, he is free from sin, so that he is not overcome by it to the point of consenting to it. Hence he says: but now in the state of justice, being made free from sin: if the Son makes you free, you will be free indeed (John 8:36).
On the other hand, just as in the state of sin one is a slave of sin which he obeys, so in the state of justice one is a slave of God and obeys him willingly: serve the Lord with gladness (Ps 100:2). And this is what he adds: and become servants to God: O Lord, I am your servant (Ps 116).
But this is true freedom and the best form of slavery, because by justice man is inclined to what befits him and is turned from what befits concupiscence which is distinctively bestial.

Then when he says, you have your fruit, he mentions the effect of justice, saying, you have your fruit unto sanctification, i.e., the fruit of sanctity by good works is your return, inasmuch as these please you in a spiritual and holy way: my flowers are the fruit of honor and riches (Sir 24:23); but the fruit of the Spirit is joy, peace (Gal 5:22).

After that he mentions the end, saying, and you have the end, life everlasting, which is the goal of just men who do all their works for the sake of obtaining eternal life: seek first the kingdom of God and all these things will be added unto you (Matt 6:33). It is also the end of the works themselves which merit eternal life, since they are done out of obedience to God and in imitation of God: my sheep hear my voice, and they follow me; and I give them eternal life (John 10:27).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
