[[commentary]]
quote='''
Above the Lord's coming to judgment was treated; here the judgment itself is treated. Hence this chapter is divided into two parts. In the first part he speaks of the judgment through certain parables; in the second he manifestly and explicitly sets forth the form of the judgment, at when the Son of man shall come, etc. Regarding the first he does two things. First, a parable is presented in which certain ones are excluded from the kingdom on account of an interior deficiency; in the second, certain ones are excluded on account of negligence in exterior action, at for even as a man going into a far country, etc. The first is about virgins, which tends to exercise the minds of men; and in it three things are to be considered. First, the preparation of certain ones disposing themselves to reign with Christ is presented; secondly, the arousal unto judgment is presented; thirdly, the coming of the judgment. The second is at and at midnight, etc.; the third is at and whilst they went, etc. Regarding the first, he first touches on the zeal of those preparing; secondly, their sleep, at and the bridegroom tarrying, etc. Regarding the first he does two things. First, he presents what is common to all those preparing themselves; secondly, the distinction among those who prepare themselves, at and five of them, etc. Regarding the first, four things are considered common to all: the number, the state, the office, and the intended end. The number is touched on, that there were ten: the kingdom of heaven shall be like to ten virgins. But why ten? There is a threefold reason. One indeed is that ten is the number of universality: in counting we proceed up to ten, and afterwards begin again from one; hence by ten, by one, and by a hundred, universality is signified. Or, according to Hilary, all are bound by the observance of the ten precepts, or are obligated to them. Or ten on account of the five senses doubled. For they are doubled in one way, according to Gregory, because five are in men and five in women: and thus ten. According to Jerome, they are doubled insofar as they are referred to different senses: for there are certain exterior senses and certain interior ones. Concerning interior sight it is said in John 4:12: No man has seen God at any time. Concerning taste it is said in Psalm 33:9: O taste and see that the Lord is sweet. Concerning smell it is said in Song of Songs 1:3: we run after the odor of your ointments. And thus there are all ten who come to the judgment. The state is touched on when it says virgins. But why are they called virgins? There is a threefold reason. According to Chrysostom, it is understood of those who preserve the integrity of the flesh. But why does he make mention of virgins rather than others? He says that above at 19:12 he had spoken of virgins, where he says that there are eunuchs who have made themselves eunuchs for the kingdom of heaven. He that can take, let him take it. Therefore, since virginity is so great a good that it does not fall under a precept but under a counsel, according to what is had in 1 Corinthians 7:25: concerning virgins I have no commandment, but I give counsel, if these are condemned, much more so are others. Or they are called virgins who abstain from the allurements of the five senses. According to Jerome and Origen, they are called virgins as faithful ones who do not admit corruption, according to what the Apostle says in 2 Corinthians 11:2: I have espoused you to one husband, that I may present you as a chaste virgin to Christ. There follows the consideration of their zeal: who taking their lamps. Lamps are vessels of light. Hence according to Hilary we can understand souls illuminated by the light of faith, which they received in Baptism; Isaiah 58:8: then shall your light break forth as the morning. Or by lamps works are signified, according to Augustine: for your works ought to be a lamp; above at 5:16: so let your light shine before men, that they may see your good works and glorify your Father who is in heaven. Therefore, to take up lamps is to prepare the soul, or to dispose oneself for good works. The fourth thing presented is that they went out to meet the bridegroom and the bride. Who is the bridegroom, and who is the bride? This is expounded in two ways according to a twofold marriage. One is the marriage of the divinity to the flesh, which was celebrated in the womb of the Virgin; he, as a bridegroom, coming out of his bride-chamber, Psalm 18:6. The bridegroom is the Son himself, the bride is human nature; hence to go out to meet the bridegroom and the bride is nothing other than to serve Christ. Likewise there is the marriage of Christ and the Church; John 3:29: he that has the bride is the bridegroom. Therefore those preparing their lamps intend to please the bridegroom, i.e., Christ, and the bride, i.e., mother Church. And in these things they agree.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
