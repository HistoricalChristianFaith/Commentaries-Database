[[commentary]]
quote='''
There follows the reason: for the heart of this people is grown fat etc. For since he had made mention of hearing, and to understand properly belongs to the mind, therefore the heart of this people, i.e., their mind, is grown fat, i.e., blinded. Why? Because just as purity is required for bodily vision, so also for spiritual vision. Hence the intellect is called the higher power, since it is supremely spiritual. The intellect grows fat when it is applied to gross and earthly things; but when it is drawn away, it is made more subtle, as in the apostles; 2 Corinthians 4:18: while we look not at the things which are seen, but at the things which are not seen. Hence these men considered nothing but earthly things. The sensual man perceives not the things that are of the Spirit of God, the Apostle, 1 Corinthians 2:14; Deuteronomy 32:15: the beloved grew fat and kicked; he grew fat and thick and gross; he forsook the God who made him, and departed from God his Savior. Likewise, it should be known that when a man hears things that do not please him, he cannot easily understand; therefore these men understood poorly, because his words did not please them. Hence it is said: and with their ears they have been hard of hearing; John 6:61: this saying is hard, and who can hear it? And their eyes they have shut etc. It happens that someone has eyes and does not see, because he shuts his eyes; hence he himself makes an impediment for himself. But some things are so hidden that unless one fixes his gaze intently, he cannot see; but if the thing is in the open, like a wall, a man cannot not see unless he shuts his eyes. Therefore, if the Lord had not worked open miracles, it would not be surprising if they did not believe; but he worked most evident miracles, and therefore they would have recognized them, had they not shut their eyes; Daniel 13:9: they turned away their eyes, that they might not see heaven etc. Hence it should be noted that in this obduracy the cause per se is man; God does not harden except by not imparting grace. God therefore hardens because he does not give grace; but man, because he places an impediment before the light. Therefore it is imputed to these men that they shut their eyes. Lest at any time they should see with their eyes. Here the damage they suffer is set down. Hence it can be understood in two ways. So that lest at any time is referred to all that follows, so that the sense is: thus they shut their eyes lest at any time etc., and in this way it is understood that this is from their malice. For some sin from weakness, some from deliberate malice. Hence these men, considering this, shut their eyes lest they understand; hence their malice is hidden. Lest they be converted and I heal them, namely, if they be converted; Jeremiah 3:14: return, you rebellious children etc. And this is the exposition of Chrysostom. And three things are set down: lest they see, lest they hear, lest they understand with the heart, and these correspond to the three things mentioned above. Augustine expounds it differently, saying: lest at any time they should see — since now they do not see with their eyes — and hear with their ears, and understand with their heart, and be converted, and I should heal them. Hence Augustine says that these words could have a twofold sense, because sometimes lest at any time is put for "so that it might happen," as is found in 2 Timothy 2:25: lest at any time God should give them repentance to know the truth. But sometimes it is put for "so that it might not happen," i.e., this would happen unless we were to argue, etc. And what is it then that he says, it is grown fat? Augustine resolves this by saying that sometimes it happens that a man is proud, and it seems to him that he is very good; and the Lord permits him to fall into other sins so as to heal him of his pride. Such are the presumptuous, of whom Romans 10:3 says: not knowing the justice of God and seeking to establish their own, they have not submitted themselves to the justice of God. Because therefore these men were proud, I permitted them to be blinded, so that they might see and hear, and I might heal them. And this exposition is found in the text of Mark 4:12. But the text of John 12:40 contradicts this, because there he says, therefore they could not believe, because Isaiah said: he has blinded their eyes and hardened their heart, that they should not see with their eyes nor understand with their heart, and be converted, and I should heal them. They were not therefore blinded so that they might believe, but so that they might not believe. But, according to Augustine, this is a difficult question, because if they were blinded so that they might not believe, then it should not be imputed to them. Augustine resolves this: we can say that the fact that they were blinded, they merited from preceding sins. Romans 1:21: their foolish heart was darkened; for professing themselves to be wise, they became fools, and there follows after, wherefore God delivered them up etc. Therefore on account of their sins he hardened and made their ears heavy, not by hardening them, but by not imparting grace on account of their sins. And we can say otherwise, according to Augustine: the heart of this people has grown fat, so that they might not see, and be converted — namely, immediately — but that persisting they might crucify Christ, and afterwards, seeing the miracles, be converted. And Augustine says that this interpretation would seem forced if we did not see that it happened this way in fact. For some are not brought back to humility unless they fall into a grave sin; so the Lord did with these men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
