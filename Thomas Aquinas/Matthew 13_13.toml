[[commentary]]
quote='''
Therefore I speak to them in parables etc. Here he applies this to the matter at hand; and he does two things. First, he applies it with regard to the Jews; secondly, with regard to the apostles, at but blessed are your eyes etc. And first he does two things. First, he applies it lest he seem to speak from hatred; secondly, he introduces an authority, at and in them is fulfilled the prophecy of Isaiah. Note that one who urges to salvation manifests his doctrine by his actions. Hence Acts 1:1: Jesus began to do and to teach. And John 15:24: if I had not done among them the works that no other man has done, they would not have sin. Likewise: if I had not spoken to them, they would not have sin. Hence before, he spoke to them without parables; but now, after the working of miracles, I speak to them in parables, because seeing they do not see. They see the miracles, but do not see the effect. Or thus: seeing, namely, outwardly, they do not see inwardly. Isaiah 43:8: bring forth the people that are blind and have eyes, that are deaf and have ears etc. And hearing they do not hear, neither do they understand. They hear the words by which they ought to be stirred to good, yet they do not hear, i.e., it has no effect; Ezekiel 2:7: if perhaps they will hear and be quiet. And Ezekiel 33:31: they turn them into a song of their mouth. And what is it that they do not see? That they do not understand; Psalm 81:5: they have not known nor understood; they walk on in darkness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
