[[commentary]]
quote='''
Third, as to the duration of their glory: and there shall be month after month, as if to say, month will follow month and feast will follow feast in your prosperity, above: year is added to year: the solemnities are at an end (Isa 29:1). Mystically: the Church after the end, spiritual rest after carnal rest.

Second, as to the gentiles, and all flesh shall come, for from the various nations they came to Jerusalem to adore the Lord: all the nations shall come and adore before you, O Lord (Ps 85[86]:9); or in the day of judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
