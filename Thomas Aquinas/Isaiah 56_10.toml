[[commentary]]
quote='''
Second, he sets out the fault.

And first, that of the superiors as to their lack in governing and in foreseeing dangers: his watchmen, for superiors are set over the people to guard them against dangers like a watchman guards against enemies; they are ignorant, unable to foresee dangers: let them alone: they are blind, and leaders of the blind (Matt 15:14); in the correction of vices: all dumb dogs not able to bark, against vices: but I, as a deaf man, heard not: and as a dumb man not opening his mouth (Ps 37:14[38:13]); in admonishing them of what is to be done: seeing vain things, promising them prosperity when adversity nears, and thus encouraging them in their sins: her prophets have daubed them (Ezek 22:28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
