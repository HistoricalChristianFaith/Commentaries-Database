[[commentary]]
quote='''
Thus, it is clear that I am not inferior to them as to the glory, which is according to the flesh; nor even as to the glory which is according to Christ, because they are servants of Christ, i.e., they say so to deceive you; I am a better one: "This is how one should regard us, as servants of Christ" (1 Cor. 4:1); "Who has made us competent to be ministers of a new covenant" (2 Cor. 3:6).

Then when he says, I am talking like a madman, he prefers himself to all the apostles and to the false. First, in regard to evils endured; secondly, as to benefits received (chap. 12). In regard to the first he does two things. First, he prefers himself as to evils endured; secondly, as to the manner in which he avoided evils (v. 32). In regard to the first he does three things. First, he proposes that he should be preferred to the others; secondly, he shows in what he should be preferred (v. 23c); thirdly, he confirms some of the statements (v. 30).

He says therefore: I am talking like a madman; because I commend myself and make myself equal to the others, how less wise will I seem to you, if I prefer myself to them. Therefore he says: not only am I a minister of Christ, as the others, but as one less wise according to your opinion, I say that I am a better minister of Christ than they; and as to this he says that he should be preferred to them: "I magnify my ministry" (Rom. 11:13) by placing it ahead of the ministry of the others.

Then he indicates the matters in which he should be preferred, saying, with far greater labours. As if to say: in this I am more, because I am more obviously a minister of Christ. First, as to the evils inflicted; secondly, as to evils voluntarily assumed (v. 26). First, he mentions in general the evils inflicted, saying: I am more, namely, a proven minister; with far greater labours than they, even though they have undertaken some labours: "I worked harder than any of them" (1 Cor. 15:10). Secondly, he lists those evils in detail. First, as to the squalor of prison, because far more imprisonments, namely, than they: "And when they had inflicted many blows upon them"—namely, on Paul and his companions—"they threw them into prison" (Ac. 16:23). Secondly, as to the pains of floggings, because with countless beatings, i.e., above the measure of human virtue, or above the measure of human custom: "In beatings, imprisonments, tumults, labors, watching, hunger" (2 Cor. 6:5). But this seems to be contrary to what is stated in 1 Cor. (10:13): "God is faithful, and he will not let you be tempted beyond your strength." Therefore, not above the measure of human virtue. I answer that God does not permit us to be tried without the help of divine grace; that is why the Apostle said in 1 Cor. (15:10): "Not I, but the grace of God which is with me." Then as to the terror of death; hence he says, and often near death, i.e., in the dangers and terrors of death. Hence he said in Rom. (8:36): "For your sake we are being killed all the day long"; "I die daily for your glory" (1 Cor. 15:31, Vulgate).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
