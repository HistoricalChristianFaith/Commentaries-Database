[[commentary]]
quote='''
Just as he watches for darkness to begin his deed, so also he does the deed in darkness, and so he then says, "They steal through houses in the dark," removing any obstacles by any kind of fraud and violence, "as they have agreed the day before," the adulterer and the adulteress, "and they are ignorant of the light," because they abandon themselves to the complete execution of the evil deed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
