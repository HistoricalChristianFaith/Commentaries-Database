[[commentary]]
quote='''
Again, the kingdom of heaven is like a merchant man, etc. Here the beauty, or the preciousness, is shown. The kingdom is like. This parable is explained in many ways. Chrysostom and Jerome explain it of the evangelical teaching. There are many false teachings. These are not pearls. A man therefore who seeks diverse teachings finds one, namely, the evangelical teaching, which is one on account of its truth. For virtues are many, but truth is one. Hence Dionysius says that virtue divides, but truth gives unity. Hence to designate its truth he calls it one. Likewise it is called one on account of the diverse teaching of the prophets.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
