[[commentary]]
quote='''
Here is indicated the rigor in justice of the Lord God, insofar as a divine judge. Around this idea three further notions are proposed.

First is considered a diligent concern about sin. As said: "My transgressions were bound into a yoke." That is, as one diligently considers a yoke of affliction, that must be interpreted as from effects of many sins. For, the prophet Jeremiah declares: "And the word of the Lord came to me, saying, 'Jeremiah, what do you see?' and I said, 'I see a rod of almond'" (Jer 1:11).

Second is noticed the severe effect from the punishment. As expressed: "by his hand they were fastened together". Namely, such evils were like a chain, and unbreakable like a bond.

Then: "they were set upon my neck". That is, while one suffers punishments for sins. As Psalm 38:4 exclaims: "For my iniquities have gone over my head; they weigh like a burden too heavy for me."

Third, an evasion of time is excluded, due to a weakness. As: "he caused my strength to fail". And, at another time, it was due to the enemy's power. For, "the Lord gave me into the hands of those whom I cannot understand." Namely, the Chaldeans. Thus, Psalm 31:10 states: "My strength fails because of my misery, and my bones waste away."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
