[[commentary]]
quote='''
The lightening proceeds from the clouds because of the collision of the winds, and so he says, "and to make lightening with his light from above." Sometimes the clouds cover heaven as far as the horizon of some region and seem to enclose the farthest bounds of the sea beneath this, and so he says, "even the roots of the sea he will cover" with the tent of the clouds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
