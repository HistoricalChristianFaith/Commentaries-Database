[[commentary]]
quote='''
For he said to Herod: it is not lawful for you to have her. It should be known that Antipater, the father of Herod the king, was a foreigner, but he was a proselyte, hence his sons were Jews. But it was commanded in the law that while a brother was living, another should not have his brother's wife; therefore John, as a zealot for the law, said it is not lawful for you to have her.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
