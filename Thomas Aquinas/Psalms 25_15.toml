[[commentary]]
quote='''
"My eyes." Above, the Psalmist presented the confidence conceived from divine mercy, and to this he also invited others; here, however, from the conceived confidence he again continues his prayer. And concerning this he does two things. First, he premises the preparation for praying: Sir. 18: "Before prayer, prepare your soul." Second, he presents the prayer itself, at "Look upon me." Concerning this part he does two things. First, he presents a prayer in which he prays for himself. Second, on behalf of his enemies, at "Look upon my enemies." Concerning the first he does two things. First, he asks for mercy. Second, he assigns a reason for showing mercy, at "The tribulations." The preparation of prayer is the lifting up of the mind to God; hence "my eyes," namely of the heart: Eph. 1: "Having the eyes of our heart enlightened." These eyes, namely of intellect and faith, are said to be specially directed to the Lord: Ps. 122: "To you I have lifted up my eyes," etc. And this on account of the confidence conceived, "for he himself will pluck my feet from the snare": Eccl. 9: "Man does not know his own end; but as fish are caught with a hook and birds with a snare, so men are caught by the Devil in an evil time." These evils are occasions of sin. And when a person falls into sin, then the snare binds his affections, which is called the sin of man: this snare God alone looses: Ps. 123: "The snare has been broken and we have been freed." And how? "Our help is in the name of the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
