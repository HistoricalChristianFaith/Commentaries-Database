[[commentary]]
quote='''
Then when he says, Jesus said to her, the answer of Christ is given. This answer has been the occasion for three heresies.

The Manicheans claim that Christ had only an imaginary body, not a real one. Valentinus maintained that Christ assumed a celestial body and that, as far as his body was concerned, Christ was not related to the Virgin at all. The source of this error was that he understood, Woman, what does that have to do with me and you? as if it meant: "I have received nothing from you." But this is contrary to the authority of Sacred Scripture. For the Apostle says: "God sent his Son, made from a woman" (Gal 4:4). Now Christ could not be said to have been made from her, unless he had taken something from her. Further, Augustine argues against them: "How do you know that our Lord said, What does that have to do with me and you? You reply that it is because John says so. But he also says that the Virgin was the mother of Christ. So, if you believe the Evangelist when he states that Jesus said this to his mother, you should also believe him when he says, and the mother of Jesus was there."

Then there was Ebion who said that Christ was conceived from a man's seed, and Elvidius, who said that the Virgin did not remain a virgin after childbirth. They were deceived by the fact that he said, Woman, which seems to imply the loss of virginity. But this is false, for in Sacred Scripture the word "woman" sometimes refers merely to the female sex, as it does in "made from a woman" (Gal 4:4). This is obvious also by the fact that Adam, speaking to God about Eve, said: "The woman whom you gave me as a companion, gave me fruit from the tree, and I ate it" (Gn 3:12); for Eve was still a virgin in Paradise, where Adam had not known her. Hence the fact that the mother of Christ is here called "woman" in this Gospel does not imply a loss of virginity, but refers to her sex.

The Priscillianists, however, erred by misunderstanding the words of Christ, My time has not yet come. They claimed that all things happen by fate, and that the actions of men, including those of Christ, are subject to predetermined times. And that is why, according to them, Christ said, My time has not yet come.

But this is false for any man. For since man has free choice, and this is because he has reason and will, both of which are spiritual, then obviously, as far as choice is concerned, man, so far from being subject to bodies, is really their master. For spiritual things are superior to material things, so much so that the Philosopher says that the wise man is master of the stars. Further, their heresy is even less true of Christ, who is the Lord and Creator of the stars. Thus when he says, My time has not yet come, he is referring to the time of his passion, which was fixed for him, not by necessity, according to divine providence. What is said in Sirach (33:7) is also contrary to their opinion: "Why is one day better than another?" And the answer is: "They have been differentiated by the knowledge of the Lord," i.e., they were differentiated from one another not by chance, but by God's providence.

Since we have eliminated the above opinions, let us look for the reason why our Lord answered, Woman, what does that have to do with me and you? For Augustine, Christ has two natures, the divine and the human. And although the same Christ exists in each, nevertheless things appropriate to him according to his human nature are distinct from what is appropriate to him according to his divine nature. Now to perform miracles is appropriate to him according to his divine nature, which he received from the Father; while to suffer is according to his human nature, which he received from his mother. So when his mother requests this miracle, he answers, Woman, what does that have to do with me and you? as if saying: I did not receive from you that in me which enables me to perform miracles, but that which enables me to suffer, i.e., that which makes it appropriate for me to suffer, i.e., I have received a human nature from you. And so I will recognize you when this weakness hangs on the cross. And so he continues with, My time has not yet come. As if to say: I will recognize you as my mother when the time of my passion arrives. And so it was that on the cross he entrusted his mother to the disciple.

Chrysostom explains this differently. He says that the Blessed Virgin, burning with zeal for the honor of her Son, wanted Christ to perform miracles at once, before it was opportune; but that Christ, being much wiser than his mother, restrained her. For he was unwilling to perform the miracle before the need for it was known; otherwise, it would have been less appreciated and less credible. And so he says, Woman, what does that have to do with me and you? As if to say: Why bother me? My time has not yet come, i.e., I am not yet known to those present. Nor do they know that the wine ran out; and they must first know this, because when they know their need they will have a greater appreciation of the benefit they will receive.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
