[[commentary]]
quote='''
After showing with a reason based on God's grace that we should not continue in sin but should serve God, the Apostle shows the same thing with a reason based on a condition of the former life.
In regard to this he does three things:
first, he describes the terms in which he will present his teaching;
second, he presents the teaching, at for as you have yielded;
third, he gives the reason for the teaching, at for when you were the servants.

First, therefore, he says: I have advised that you yield yourselves to God. I speak to you a human thing, i.e., as suited to human feebleness. For man is sometimes so presented in Scripture as to signify a weakness of the human condition: I am a weak man, and of a short time, and falling short of the understanding of judgment and laws (Wis 9:5); since there are jealousy and strife among you, are you not carnal and walking as mere men? (1 Cor 3:3).
He assigns the cause, when he adds, because of the infirmity; for it is to the mature that the more perfect precepts are given: wisdom, however, we speak among those who are mature (1 Cor 2:6); solid food is for the mature (Heb 5:14). Lighter precepts are given to weaker men: as to little ones in Christ, I fed you with milk, not with solid food (1 Cor 3:1); you have become such as have need of milk and not of solid food (Heb 5:12).
But this weakness comes not from the spirit but from the flesh, because the corruptible body is a load on the soul (Wis 9:15); hence, he adds: of your flesh: the spirit is willing, but the flesh is weak (Matt 26:41).

Then when he says, for as you have yielded, he presents the teaching he called human, in which he teaches that the body must be yielded to the slavery of justice in the same measure as we yielded it to the slavery of sin. And this is what he says: for as you have yielded your members to serve, namely, by doing evil works, uncleanness and iniquity born in the heart. Here uncleanness refers to sins of the flesh: but immorality and every uncleanness, let it not even be named among you (Eph 5:3), and iniquity to spiritual sins, particularly those that harm one's neighbor: he plots iniquity while on his bed (Ps 36:4). Which sins having been born in the heart, the members serve unto iniquity, namely to the work of committing iniquity. And here the Psalmist uses iniquity to mean uncleanness and iniquity, for all sin is iniquity (1 John 3:4). And this in so far as it is discordant with the justice of the divine law.
So now, set free from sin, yield your members, namely, by performing good works, to serve justice proposed to us in the divine law: and this unto sanctification, i.e., for the performance and increase of holiness: let the holy still be holy (Rev 22:11).
He calls this human, because right reason demands that man serve justice more than he previously served sin: for as it was your mind to go astray from God; so when you return again, you shall seek him ten times as much (Bar 4:28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
