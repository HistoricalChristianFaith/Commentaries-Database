[[commentary]]
quote='''
"We have transgressed and rebelled, and thou hast not forgiven." Here prayer begins, first accenting benevolence, second, the fault.

Here is taken into account a benevolence of their own person and people, setting forth their harassments. First, afflictions of people are considered, second compassion.

Regarding afflictions of people are two further ideas. First, is conferred their fault, lest following punishment, a discretion of a judge is directed. "We have transgressed and rebelled, and thou hast not forgiven." Namely, by sinning against our neighbor. Also: "and rebelled": by sinning against God.

And then: "and thou hast not forgiven." Since, you, Lord God, are inflexible towards our prayers. Thus, Jeremiah says: "As for you, do not pray for this people, or lift up cry or prayer for them, and do not intercede with me, for I do not hear you" (Jeremiah 7:16). Also, the apostle John points out: "We know that God does not listen to sinners, but if anyone is a worshiper of God, and does his will, God will listen to him" (John 9:31).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
