[[commentary]]
quote='''
In this manner, because a voice of the people, fearing, the voice of the Lord, as to the tumult of their enemies: the voice of the day of the Lord is bitter (Zeph 1:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
