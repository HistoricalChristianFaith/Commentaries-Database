[[commentary]]
quote='''
But the boat in the midst of the sea was tossed with the waves. By the boat is signified the Church; by the sea, the world: Ps. 103:25: this great sea which stretches wide its arms. And this Church, with Christ ascending, remained in the sea, and in the dangers of the sea of the world. For when some great power attacks the Church, then it is tossed by the waves. Ps. 87:8: and all your waves you have brought in upon me. But because Christ prays, it cannot be submerged, although it may be tossed and lifted up. Gen. 7:17: and they lifted the ark on high above the earth. Likewise it is tossed by the wind; this wind is the force of diabolical incitement. Job 1:19: a great wind came from the direction of the desert and struck the four corners of the house; Isa. 25:4: the blast of the mighty is like a whirlwind beating against a wall.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
