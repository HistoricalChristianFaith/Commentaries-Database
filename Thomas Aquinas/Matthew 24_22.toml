[[commentary]]
quote='''
Hence, unless those days had been shortened, no flesh should be saved. Augustine says that some have explained this as meaning that the days were then made shorter, as in the time of Joshua a day was made longer. But against this Psalm 118:91 says: By thy ordinance the days continue; therefore it can be said in two ways. First, that the days of tribulation were shortened in number. Hence, if that time had lasted longer, all would have been killed, because none would have remained. And why? Because the Romans dominated throughout the whole world, and the Jews were already scattered throughout the whole world; therefore, if that time had lasted, they would have been killed everywhere. Or the days are said to be shortened when the evils are made brief. And why are they shortened? For the sake of the elect: not that the word of God had failed. For many of that people had been converted and were praying for the people that a remnant might be left; Isaiah 1:9: Unless the Lord had left us seed, we would have been as Sodom, etc. Then Chrysostom presents two considerations for why this is said: because there were some disciples there, and also John still lived beyond that time. Therefore he says that John did not mention this in his Gospel, because he wrote after it had taken place; hence he would have spoken of past events. But Matthew and Luke, who wrote before, mentioned it, because at that time it was still future. Therefore he says that it was a manifest miracle that, while the Romans were attacking the Jews and almost the whole Jewish nation was undergoing destruction, so few Jews could go throughout the whole world to convert almost the entire world; and this was the marvelous power of Christ.

Hilary explains: and unless those days had been shortened; because it will last only a short time, and if it were to last longer, no flesh should be saved, i.e., no one who is carnal. Origen explains: and unless those days had been shortened, namely, by the teaching of doctrine, through additions of true teaching, no flesh should be saved, i.e., all would be converted to false doctrine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
