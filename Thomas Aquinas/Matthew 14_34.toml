[[commentary]]
quote='''
And having crossed over, they came into the land of Genesareth. Here the power of Christ is presented. And first the place is described; then the devotion of the people; and then his operative power. He says therefore and having crossed over, they came into the land of Genesareth, which place is on the other side of the sea, and is interpreted as "garden"; hence after danger they came to refreshment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
