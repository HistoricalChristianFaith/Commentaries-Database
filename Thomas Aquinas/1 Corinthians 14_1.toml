[[commentary]]
quote='''
Having stated that charity excels the other gifts, the Apostle then compares the other gifts to each other, showing the excellence of prophecy over the gift of tongues. In regard to this he does two things: first, he shows that prophecy excels the gift of tongues; secondly, how the gifts of tongues and prophecy should be used (v. 26). In regard to the first he does two things: first, he shows that the gift of prophecy is more excellent than the gift of tongues with reasons taken on the part of unbelievers; secondly, on the part of believers (v. 20). The first part is divided into two: first, he shows that the gift of prophecy is more excellent than the gift of tongues as to their use in exhortations or sermons; secondly, as to the use of tongues in praying. For the use of the tongue is ordained to these two (v. 13).

In regard to the first he does two things: first, he mentions one thing by which he connects the preceding to the following; and this is what he says: It has been stated that charity excels all the gifts; if, therefore, that is so, make love your aim, for it is a sweet and healthful bond of minds: "Above all, hold unfailing your love for one another" (1 Pt 4:8); "Above all these things put on love which is the bond of perfection." (Col 3:4).

Secondly, he adds that through which he connects himself with what follows. And this is what he says: earnestly desire the spiritual gifts. As if to say: Although charity is greater than all gifts, nevertheless the others are not to be despised. But earnestly desire, i.e., fervently love the spiritual gifts of the Holy Spirit: "Now who is there to harm you, if you are zealous for what is right"? (1 Pt 3:13).

Although earnestly desire is sometimes taken for fervent love and sometimes for envy, it is not equivocation; indeed, one proceeds from the other. For to be zealous and to be earnestly desirous designate a fervent love for something. It happens, however, that the thing loved is loved so fervently by someone that he does not permit a sharer, but wants it alone and by himself. And this is zeal which, according to some, is intense love not allowing a participation in the one loved. Yet this occurs not in spiritual things, which can be shared most perfectly by others, but only in those which cannot be shared by many. Hence in charity there is not this sort of zeal which does not allow a participation in the one loved, but only in bodily things, in which it comes about that if anyone else has that for which I am zealous, I am sad; and from this arises earnest desire, which is envy. Just as if I love dignity or riches, I grieve if someone else has them; hence I envy him. And so it is clear that from zeal arises envy. Therefore, when it is said: earnestly desire the spiritual gifts, it is not understood of envy, because spiritual things can be possessed by many; but he says: desire to induce them to love God fervently.

And because among spiritual things there is a gradation, for prophecy exceeds the gift of tongues, he says: especially that you may prophecy. As if to say: Among spiritual gifts be more zealous for the gift of prophecy: "Do not quench the Spirit; do not despise prophesying" (1 Th 5:19).

To explain the entire chapter three things must be mentioned beforehand, namely, what is prophecy; in how many ways is prophecy mentioned in Scripture, and what it is to speak in tongues. In regard to the first it should be noted that prophecy is said to be "seeing from afar," and according to some it is named after speaking afar, but it is better to say that it is from pharos, which is to see. Hence in 1 Sam (9:9): "He who is now called a prophet was formerly called a seer." Hence the sight of things far off, whether they be future contingents or beyond human reason, is called prophecy. Prophecy, therefore, is the sight or manifestation of future contingents or of things transcending human understanding. For such a sight four things are required. For since our knowledge is through bodily things and phantasms received from sensible things, it is first required that in the imagination be formed the bodily likeness of things which are shown, as Denis says that it is impossible otherwise for the divine ray to shine in us, unless surrounded by the variety of sacred veils. The second thing required is an intellectual light enlightening the intellect for knowing things shown beyond our natural knowledge. For unless an intellectual light be present for understanding the sensible likenesses formed in the imagination, the one to whom these likenesses are shown in not called a prophet but a dreamer. Thus, Pharaoh, who, although he saw ears of corn and cattle, which indicated future events, did not understand what he saw, is not called a prophet, but rather Joseph, who interpreted it. The same is true of Nebuchadnezzar, who saw a statue but did not understand it; hence, neither is he a prophet, but Daniel. For this reason it says in Dan (10:1): "Understanding is needed in a vision." The third thing required is the courage to announce the things revealed. For God reveals in order that it be announced to others: "Behold, I have put my words in your mouth" (Jer 1:9). The fourth thing is the working of miracles, which lend certitude to the prophecy. For unless they did things which exceed the works of nature, they would not be believed in matters that transcend natural knowledge.

Therefore, according to these modes of prophecy some are called prophets in various ways. For sometimes one is called a prophet, because he possesses all four, namely, that he sees imaginary visions, and has an understanding of them and he boldly announces to others and he works miracles. Concerning such a one it says in Num. (12:6): "If there is a prophet among you, I, the Lord, will appear to him in a dream, or will speak to him by means of a dream." But sometimes one who has solely imaginary visions is called a prophet, but in an improper sense and very remotely so. Again, one is called a prophet, if he has the intellectual light to explain even imaginary visions made to himself or someone else, or for explaining the sayings of the prophets or the Scriptures of the apostles. In this way a prophet is anyone who discerns the writings of the Doctors, because they have been interpreted in the same spirit as they were edited; and so Solomon and David can be called prophets, inasmuch as they had the intellectual light to understand clearly and subtly. For the vision of David was intellectual only. Someone is even called a prophet merely because he announces the statements of prophets or explains them or sings in the church. This is the way Saul was counted among the prophets, i.e., among those singing the words of the prophets. (1 Sam 19:24). Someone is also called a prophet from working miracles, as it says in Sir (48:14) that "the dead body of Elijah prophesied, i.e., worked a miracle." Therefore, what the Apostle says through this chapter of the prophets must be understood in the second mode, namely, that one is said to prophesy who through a divine intellectual light explains visions made to him and others. According to this, what is said here about prophets will be plain.
'''
