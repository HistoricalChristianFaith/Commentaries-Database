[[commentary]]
quote='''
444. – Then when he says, how much more the blood of Christ... cleanses our conscience, he lays down the consequent. As if to say: If blood and ashes can do this, what could Christ's blood do? Certainly much more. Then the Apostle mentions three things, which show the efficacy of Christ's blood: first, he shows whose blood it is, namely, it is Christ's. From this it is evident that His blood cleanses: 'For he will save his people from their sins' (Mt. 1:21). Secondly, the reason why Christ shed His blood, because this was done by the Holy Spirit, through Whose movement and instinct, namely, by the love of God and neighbor He did this: 'When he shall come as a violent stream which the spirit of the Lord drives on' (Is. 59:19). But the Spirit cleanses: 'If the Lord shall wash away the filth of the daughters of Sion, and shall wash away the blood of Jerusalem out of the midst thereof, by the spirit of judgment and by the spirit of burning' (Is. 4:4). Therefore, he says, who by the Holy Spirit offered himself: 'Christ has loved us and has delivered himself for us, an oblation and a sacrifice to God for an odor of sweetness' (Eph. 5:2). Thirdly, he describes His condition, because He is without blemish: 'It shall be a lamb without blemish, a male, of one year' (Ex. 12:5); 'What can be made clean by the unclean?' (Sir. 34:4).

445. – But can an unclean priest cleanse? I answer: No, if he acted in his own power, but he acts by the power of Christ's blood, which is as a first cause. Therefore, He would not have acted, unless he were clean.

446. – Yet it should be noted that the blood of those animals merely cleansed from outward stain, namely, from contact with the dead; but the blood of Christ cleanses the conscience inwardly, which is accomplished by faith: 'Purifying their hearts by faith' (Ac. 15:9), inasmuch as it makes one believe that all who adhere to Christ are cleansed by His blood. Therefore, He cleanses the conscience. It also cleanses them from contact with a corpse; but He from dead works, namely, sins, which take God from the soul, whose life consists in union by charity. It also cleansed them in order that they might come to the figurative ministry; but the blood of Christ to the spiritual service of God: 'The man that walked in the perfect way, he served me' (Ps. 100:6). Therefore, he says, to serve the living God. Furthermore, God is life: 'I am the life' (Jn. 14:6); 'I live forever' (Dt. 32:40). Therefore, it is fitting that one who serves Him be alive: hence, he says, living God: 'For as the judge of the people is himself, so also are his ministers' (Sir. 10:2). Therefore, he that would serve God worthily, should be living, as He is.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
