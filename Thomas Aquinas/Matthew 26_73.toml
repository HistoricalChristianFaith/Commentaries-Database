[[commentary]]
quote='''
Then follows the third denial. And first, the time is described; secondly, what provoked it; thirdly, the denial. He says therefore: and after a little while they came that stood by. Luke says that after the space of about one hour. And the devil was arranging this, so that he would have no respite. Hence they say to him: surely thou also art one of them; and they prove this: for even thy speech doth discover thee. But it is certain that all were Jews; how then does he say: for even thy speech doth discover thee? Jerome explains that in the same language different speech patterns often occur, as is clear in France, and Picardy, and Burgundy, and yet it is one language. So the Galileans had some difference from the Jerusalemites. So also it can be said to anyone: for even thy speech doth discover thee; because, as it says at Luke 6:45, out of the abundance of the heart the mouth speaketh; because when a man is carnal, he quickly breaks forth in carnal words; when spiritual, in spiritual words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
