[[commentary]]
quote='''
"And behold the veil of the temple was rent in two from the top even to the bottom: and the earth quaked and the rocks were rent." In this part, the effect is treated. First, those things are treated which were done concerning the temple; second, those which occurred in the elements; third, those which occurred in men. And it should be noted that Matthew narrates in a different order than Luke. Augustine says that Matthew narrates the order of the history. And it should be noted that in the temple there was a twofold veil, as in the tabernacle, because there was a veil within the holy of holies, and there was another veil, which was not in the sanctuary. And these two signified a twofold veiling, because the inner veil signified the veiling of heavenly mysteries, which will be revealed to us: for then we shall be like him, when his glory shall appear. The other, which was on the outside, signified the veiling of mysteries which pertain to the Church. Hence this outer one was rent, but not the other, to signify that the mysteries pertaining to the Church were manifested through the death of Christ; but the other was not divided, because the secrets of heaven still remain veiled. Hence the Apostle says, 2 Corinthians 3:16: "but when Israel shall be converted to the Lord, the veil shall be taken away." Hence through the Passion, all the mysteries which are written in the law and the prophets were opened, as is found in Luke 24:27: "beginning at Moses and all the prophets, he expounded to them in all the Scriptures the things that were concerning him." Or it signified the dispersion of the Jewish people. And because their glory was in the veil, which was rent in the Passion of the Lord, it was signified that all their glory was being divided from them. "And the earth quaked, and the rocks were rent etc." Above, the miracle concerning the sacred things of the temple was set forth; here he sets forth the miracle concerning the elements. And these correspondences are found, first, as to the power of the Passion; second, as to the effect of salvation; third, as to the judicial power which Christ merited by suffering. It is fitting that the earth quaked etc., because it cannot sustain the presence of so great a majesty without trembling; hence in Psalm 103:32: "he looketh upon the earth, and maketh it tremble." And the rocks were rent, by which it was signified that no power can resist him; 3 Kings 19:11: "the Lord passeth, overthrowing the mountains and breaking the rocks." Likewise, it is fitting as to the effect. The earth is moved when whatever is earthly is cast aside. Psalm 59:4: "thou hast moved the earth, and hast troubled it; heal thou the breaches thereof, for it has been moved." Likewise, the rocks are rent when the hardness of hearts is moved to compassion; Jeremiah 23:29: "my words, namely of the Passion, are as a fire, and as a hammer that breaketh the rock in pieces." Likewise, it is fitting for the one coming to judgment, because at his coming, the earth shall be moved; Haggai 2:7: "yet one little while, and I will move the heaven and the earth." Likewise, the rocks shall be rent, because every height of men shall be brought low.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
