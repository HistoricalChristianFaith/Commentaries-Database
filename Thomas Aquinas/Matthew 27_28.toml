[[commentary]]
quote='''
"And stripping him, they put a scarlet cloak about him." Here the mockery is described. And first, as to the garment; second, as to the honor; third, as to the reproach. The second is at "and bowing the knee before him, they mocked him"; the third is at "and going out, they found a man of Cyrene, named Simon etc." It should be noted that although they had accused him of many things, yet he was not suffering for any other reason than because he called himself king, as is found in John 19:12: "if thou release this man, thou art not Caesar's friend." Hence from this cause Pilate feared more. Therefore, wishing to mock him, they impose upon him the insignia of a king. For it is the custom that kings are clothed in purple; and these, in place of this, clothed him in a scarlet garment. He says therefore "and they put a scarlet cloak about him," i.e., a red one. But what is it that Mark says (15:17), that they clothed him in purple? Augustine resolves this by saying that he said this because of the similarity of the color. Or it can be said that although it was scarlet, yet it had something of purple. By the fact that he is stripped of his own garments and clothed in another's, heretics are reproved who said that he was not a true man. This cloak can signify the flesh of Christ stained with his own blood: "he was wounded for our iniquities, he was bruised for our sins," Isaiah 53:5. Or it signifies the blood of the martyrs, who washed their robes in the blood of the Lamb. Or the sin of the Gentiles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
