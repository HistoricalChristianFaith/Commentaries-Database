[[commentary]]
quote='''
Now that he has posited his opinion about the resurrection of the dead, he returns to the subject of his wonder before at how much careful attention God gives to the works of man. He expressed this when he said, "You observed all my paths and considered the traces of my footsteps." (13:27) Here then he says, "You have numbered my steps," as if to say: Now it is no wonder if you so diligently examine the deeds of man since you reserve him for another life. Note however that divine providence considers human acts in two ways. First, in the fact that he examines and evaluates them. He clarifies this when he says, "you have numbered my steps." One numbers things which one cares about. Lest someone object that it is a mark for very great severity for God to examine the deeds of frail man with such great care, Job consequently emphasizes the tendency of God to pardon us when he says, "but spare my sins." He means: Although you number these things still I am filled with hope that you may spare me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
