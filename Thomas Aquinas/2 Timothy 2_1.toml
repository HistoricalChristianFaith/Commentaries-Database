[[commentary]]
quote='''
Martyrdom requires strength of soul against the dangers of death; hence he says, you, therefore, my son, whom I have begotten in the Gospel, be strong in the grace. Do manfully, and let your heart be strengthened (Ps 30:25); which is not in you, namely, whose strength is weak, but in Christ Jesus: be strengthened in the Lord and in the might of his power (Eph 6:10).

Or, in the grace which is in Christ Jesus, i.e., by God's gift freely given through Christ: grace and truth came by Jesus Christ (John 1:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
