[[commentary]]
quote='''
Then when he says, But if you do not believe in his written statements, how will you believe in my spoken words? he gives a sign of this opposition. He does this by comparing two things, and then denying of the lesser of them what is denied of the greater. First, there is a comparison between Moses and Christ: for although Christ, absolutely speaking, is greater than Moses, Moses was the greater in reputation among the Jews. Thus he says: If you do not believe Moses, you will not believe me either. Secondly, he compares the way in which they presented their teaching: Moses gave his precepts in a written form; and so they can be studied for a long time, and are not easily forgotten. Hence they impose a stronger obligation to believe. But Christ presented his teachings in spoken words. Thus he says, But if you do not believe in his written statements, which you have preserved in your books, how will you believe in my spoken words?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
