[[commentary]]
quote='''
As to the multiplied restoration of goods: instead of the shrub, shall come up the fir tree, that is, your former goods are few in comparison to what you will have: the glory of this last house shall be more than of the first (Hag 2:10[9]), above: I will plant in the wilderness the cedar (Isa 41:19). The shrub (saliuncula) from saliendo ("jumping"), which is called "hare thistle."

Third, he sets out the glory of God following from this: and the Lord shall be named, everywhere and forever glorious for your liberation, for an everlasting sign, to which they will flee as a sign of salvation, above: behold I will lift up my sign to the people (Isa 49:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
