[[commentary]]
quote='''
Third, at for this is the word of promise, he proves that his explanation is valid, when he says that the children of the promise are the ones signified by Isaac, namely, because Isaac was born as the result of a promise.
Hence he says: for this is the word of promise. Indeed, this is the statement the angel or the Lord through an angel made to Abraham: about this time will I come, by which the time of grace is signified: when the time had fully come, God sent forth his Son (Gal 4:4) and Sarah shall have a son on account of the promise. Hence, it is said: so that we might receive adoption of sons (Gal 4:5).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
