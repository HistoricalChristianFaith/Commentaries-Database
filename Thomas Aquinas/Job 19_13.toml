[[commentary]]
quote='''
Next he shows that the root of his hope which is from human aid has been torn out. He shows that he could not expect any aid from those from whom it seemed most likely to come. He enumerates first those who have been separated from the habitation of his house, beginning with his brothers saying, "He has put my brothers far from me," so that they do not want or are not able to bring me help. Then he places intimate friends next, "and my acquaintances turned from me like strangers," not bringing help to me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
