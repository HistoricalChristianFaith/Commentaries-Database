[[commentary]]
quote='''
Then the miracle is described: first, the impending danger; secondly, the disciples' pleading (v. 25); thirdly, the response. There arose a great storm on the sea. The saints say that the storm did not arise from the inclemency of the air, but by divine arrangement. And it happened for a number of reasons: first, in order that the disciples, who had been loved and selected in a special way, might experience something humiliating and not extol themselves. This signified the coming danger they would experience at the time of the Passion. After this, as Paul says in 2 Corinthians (1:8): "We were so utterly crushed, that we despaired of life itself." Secondly, in order that they might learn to live in danger and overcome: "In all these we overcome on account of him who loved us" (Rom 8:37). Thirdly, Chrysostom explains that they were destined to preach what they had witnessed about Christ; consequently, in order that they have more experience with miracles and be more certain, the Lord wished them to undergo this. Hence Psalm 66 (v. 5): "Come and see what God has done." For they could more easily recall things in which they were involved.

But he was asleep. This was in order to show that he was true man; in all cases where he wished to show that he was God, he also showed something of his humanity. He also slept, because "He was born in the likeness of man" (Phil 2:7). For he was not asleep in regard to his divinity: "He who keeps Israel will neither slumber nor sleep" (Ps 121:4). Also, he slept in order that they be placed between fear and hope. Another reason was that he might show his uniqueness, because he remained undisturbed in such a storm: "When he established the fountains of the deep, when he assigned to the sea its limit, so that the waters might not transgress his command" (Pr 8:29).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
