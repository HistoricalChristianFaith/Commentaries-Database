[[commentary]]
quote='''
And these shall go into everlasting punishment etc. After the sentence has been set forth, the effect is set forth. And these shall go into everlasting punishment. Above he had said into everlasting fire, because it could stand that the fire might be everlasting and yet not torment everlastingly; therefore he says into punishment. But the just, into life everlasting; John 17:3: this is eternal life: that they may know thee, the only true God, and Jesus Christ, whom thou hast sent. That there is everlasting punishment is found in Daniel 12:2: many of those that sleep in the dust of the earth shall awake: some unto life everlasting, and others unto reproach, to see it always; Revelation 20:15: he was cast into the pool of fire and brimstone, where both the beast and the false prophets shall be tormented day and night for ever and ever; Isaiah 66:24: their worm shall not die, and their fire shall not be quenched. What is the cause of this punishment? Some, like Origen, held that the punishment would not be everlasting. Hence they maintain that all punishment comes to an end. Hence he says that what is said here is said by way of exaggeration. But Augustine argues: if this is so, then what is said about the just going into life everlasting would likewise be said by way of exaggeration. But this is said in terms of duration, as even Origen concedes. And it is detestable that in the same Scripture there should be such diversity. But that this cannot be is clear thus: because justice demands that a punishment equal to the fault should correspond to it. For with what measure you shall mete, it shall be measured to you again, above, 7:1. But how after death will everlasting punishment have such an extension? Gregory responds, saying that God judges the will; hence one who did not restrain his will from sin until death sinned in his own eternity; therefore it is fitting that God punish in his own eternity. Augustine says thus: we see that punishment should be equal to the fault, and so it is even in human justice, that if someone sins against the society of the city, the judge does not intend death except to separate him from the society of the city permanently. But one who sins against God intends to exclude himself from the society of the heavenly court. According to Hilary, punishment is due to fault, but fault is not destroyed except through charity; therefore, as long as a man does not have charity, it is just that he should always be in punishment. Since, therefore, he did not have charity in this life, it is necessary that he should remain forever in punishment. Likewise it is objected that the saints will pray and they will be heard. Therefore, etc. Gregory says that while they are on the way, the saints are heard for them, but not afterward. Likewise it is objected: God does not delight in punishment; how then will he afflict without end? It should be said that although he does not delight in it, nevertheless he does this to preserve his justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
