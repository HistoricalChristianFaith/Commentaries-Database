[[commentary]]
quote='''
Then he explains; and he presents two conclusions. The first is drawn from what was said in the parable; the second is taken from what was said in the scriptural text. He says therefore "therefore I say to you, that the kingdom shall be taken from you," i.e., sacred Scripture, because you will lose the understanding of sacred Scripture. John 12:40: "He hath blinded their eyes, and hardened their heart, that they should not see with their eyes, nor understand with their heart, and be converted, and I should heal them." Or the prelacy over the Church of the faithful, because their glory has been transferred. "And shall be given to a nation yielding the fruits thereof." Isa 55:4: "Behold, I have given him for a witness to the people, a leader and a master to the Gentiles. Behold thou shalt call a nation which thou knewest not: and the nations that knew not thee shall run to thee." But how was it given to them? Above it was said that he leased it; but here that it is given. Because when it does not bear fruit, it is said to be hired or mercenary; but when it is given, then it bears fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
