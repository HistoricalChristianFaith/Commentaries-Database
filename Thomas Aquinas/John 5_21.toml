[[commentary]]
quote='''
761 Now he explains in more detail the life-giving power of the Son by indicating those greater works which the Father will show the Son (v 21). Here we should point out that in the Old Testament the divine power is particularly emphasized by the fact that God is the author of life: "The Lord kills, and brings to life" (1 Sm 2:6); "I will kill, and bring to life again" (Dt 32:39). Now just as the Father has this power, so also does the Son; hence he says, For just as the Father raises the dead and grants life, so the Son grants life to those to whom he wishes. As if to say: These are those greater works that the Father will show the Son, that is, he will give life to the dead. Such works are obviously greater, for it is greater to raise the dead than for a sick man to become well. Thus the Son grants life to those to whom he wishes, i.e., by giving initial life to the living, and by raising the dead.

We should not think that some are raised up by the Father and others by the Son. Rather, the same ones who are raised and vivified by the Father, are raised and vivified by the Son also: because just as the Father does all things through the Son, who is his power, so he also gives life to all through the Son, who is life, as he says below: "I am the way, and the truth, and the life" (14:6).

The Father does not raise up and give life through the Son as through an instrument, because then the Son would not have freedom of power. And so to exclude this he says, the Son grants life to those to whom he wishes, i.e., it lies in the freedom of his power to grant life to whom he wills. For the Son does not will anything different than the Father wills: for just as they are one substance, so they have one will; hence Matthew (20:15) says: "Is it not lawful for me to do as I will?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
