[[commentary]]
quote='''
Above, he described what a bishop should be in his conduct; here he shows how he should be equipped in doctrine: first, he shows that he should apply himself diligently to study; second, he describes what he should study; third, its profit.

In regard to the first he says, embracing that faithful word. For when one embraces something he holds it firmly, embraces, as it were, with love. So a bishop must hold knowledge in his embrace, clinging to it firmly with his mind and heart: she hastens to make herself known to those who desire her (Wis 6:13); prize her highly, and she will exalt you; she will honor you if you embrace her (Prov 4:8).

The matters he studies must not be fables, nor temporal subjects, but that faithful word, i.e., true: the Lord is faithful in all his words and gracious in all his deeds (Ps 145:13). Or, that faithful word, i.e., of the faith, in which a bishop should be well instructed.

For some study merely to learn things and adapt them to their own lives. But this is not enough for a bishop, for he must instruct others. And therefore he says, which is according to doctrine. Let no one despise your youth, but set the believers an example in speech and conduct (1 Tim 4:12).

Its usefulness lies in making his office easy to fulfill. But a bishop's duties are akin to those of a shepherd: feed my sheep (John 21:17). But a shepherd has two things to do, namely, feed the flock: feed the flock of God that is your charge (1 Pet 5:2), and hold off the wolf. So also a bishop: he should feed his flock with true doctrine: I will give you shepherds after my own heart, who will feed you with knowledge and understanding (Jer 3:15).

Hence he says, that he may be able to exhort in sound doctrine. He does not say, that he may exhort, but that he may be able to exhort, which means that he must have exhortations ready to hand, when it is necessary to give them. This is prefigured in Exodus by the handle on the ark, enabling it to be carried: mighty in deed and word (Luke 24:19). And he says, sound, i.e., without admixture of falsity: but speak the things that become sound doctrine (Titus 2:1); for our appeal does not spring from error or uncleanness, nor is it made with guile (1 Thess 2:3).

Second, he must guard the flock against heretics; hence he says, and to convince those who contradict it; and this is by the study of Sacred Scripture: all Scripture is inspired by God and profitable for teaching, for reproof, for correction (2 Tim 3:16); I have not denied the words of the Holy One (Job 6:10).

And these two things, according to the Philosopher, pertain to the work of a wise man, namely, not to lie about things he knows, as to the first, and to be able to unmask liars, as to the second.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
