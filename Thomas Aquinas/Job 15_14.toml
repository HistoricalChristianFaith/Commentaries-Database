[[commentary]]
quote='''
After Eliphaz had censured Job for his provoking God to argue which he thought pertained to presumption of wisdom, he now censures him for presumption of justice because he had said, "If I am judged, I know I would be found just." (13:18) Eliphaz attacks this statement first because of the frailty of the human condition in which man avoids sin with difficulty and so he says, "What is man that he should be without stain." Man even does good with difficulty and so he continues, "and be born just from his mother's womb?" For, as Proverbs says, "Justice in abundance is the greatest virtue." (15:5) This does not seem to suit one who has his origin from the basest thing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
