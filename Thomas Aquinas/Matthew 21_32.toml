[[commentary]]
quote='''
There follows the reason. And first he says that the Jews were disobedient; secondly, that the publicans obeyed; thirdly, that they did not follow him. He says "John came to you in the way of justice," because he led them into the way of justice. Or "in the way of justice," because he observed the way of justice, namely, the way of penance, "and you did not believe him." For they said to him: "art thou Elias?" And when he said no, they said: "why then dost thou baptize?" "But the publicans and the harlots believed him." And this is found above in chapter 3, that they came to John to be baptized. "But you, seeing it," namely, that others were converted and fulfilled what he had commanded, "did not even afterwards repent, that you might believe him." For that man is the worst who does not repent of what he has done. Jer 8:6: "There is none that doth penance for his sin, saying: what have I done?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
