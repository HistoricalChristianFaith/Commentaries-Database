[[commentary]]
quote='''
And he confirms the promise: for if your people, O Israel, shall be as the sand of the sea: I will multiply your seed as the stars of heaven, and as the sand that is by the sea shore (Gen 22:17).

Third, as to the justice of their works; and first, he sets out the promise: the end abridged, that is, the destruction made brief in the army of Sennacherib, shall overflow with justice, that is, he will make justice overflow in the people, below: let us have pity on the wicked, but he will not learn justice: in the land of the saints he has done wicked things (Isa 26:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
