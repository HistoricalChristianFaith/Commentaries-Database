[[commentary]]
quote='''
Another property of a horse is his powerful jump which is contrary to the behavior of many quadrupeds, and so he says, "Will you make him leap," raising him up high, "like the locusts," which move by jumping. Another property of the horse is his courage in battles, which he describes at greater length because it is noble and wondrous. He first demonstrates his courage when he already perceives the odor of war from afar, and the text continues, "The glory of his smell is terror," i.e., when the nostrils of the horse smell the battle, what is a terror for others is perceived by him as a glory to show his greatness of spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
