[[commentary]]
quote='''
And he also that had received the two talents came: above the judgment with regard to the first servant, who had received five talents, was treated; here the judgment with regard to the second servant, who had received two talents, is treated. As to the letter it differs in nothing from the first, nor is there anything to be said beyond what was said of the first; and therefore it is not necessary to repeat, because this one also received the same commendation and the same reward as the one who had received five talents.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
