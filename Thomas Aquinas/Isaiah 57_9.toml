[[commentary]]
quote='''
Second, as to eagerness to please, because they adorned themselves: and you have adorned yourself for the king with ointment, and have multiplied your perfumes, that is, using my incense for worshipping them: I have perfumed your bed with incense (Prov 7:17).

Third, as to eagerness to invite: you have sent your messengers far off, for they brought in various idols even from far off lands, and thus you were debased even to hell, that is, to the depths of sin: she doted upon them (Ezek 23:16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
