[[commentary]]
quote='''
And he sent and beheaded John. Here the execution is set forth. Here is fulfilled what he had said: he must increase, but I must decrease, because Christ was extended on the cross, while John was beheaded. Likewise, the beheading of John was a sign that by the authority of the law they were destined to lose both Christ and the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
