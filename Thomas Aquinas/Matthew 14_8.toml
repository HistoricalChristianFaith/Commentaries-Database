[[commentary]]
quote='''
And being instructed before by her mother, give me, she said, here in a dish the head of John the Baptist. Here the woman's request is set forth. Women are sometimes pious, and they have tender affections; hence when they are pious, they are exceedingly pious, but when they are cruel, they are exceedingly cruel; Sir 25:22: there is no head worse than the head of a serpent; and there is no anger above the anger of a woman. And ibid. it says: all malice is short compared to the malice of a woman. For a man would scarcely think what a wicked woman thinks. The mother therefore asked in order to satisfy her wrath. Likewise she feared lest Herod might sometime be converted by the words of John, and dismiss her.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
