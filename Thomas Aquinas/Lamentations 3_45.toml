[[commentary]]
quote='''
So: "Thou hast wrapped thyself with anger and pursued us." That is, first by diverse tribulations. And finally: "slaying without pity." For, Proverbs 6:34 claims: "For jealousy makes a man furious, and he will not spare when he takes revenge."

Second, is a refusal from prayer of a person sinning: "Thou hast wrapped thyself with a cloud." Namely, regarding such sins displaying faults against prayer. Thus, Isaiah 59:2 claims: "But your iniquities have made a separation between you and your God."

Third, the dispersion of persons is exposed: "Thou hast made us offscouring and refuse among the peoples." Namely, like eradicating persons from a firm protection. So, Wisdom 4:4 declares: "and by the violence of the winds they will be uprooted."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title="Commentary on Lamentations"
