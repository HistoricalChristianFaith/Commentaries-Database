[[commentary]]
quote='''
Two things follow from this. One is that men, who are powerless in their own right must confide in divine power because God has care over human affairs, and so he says, "he will be the hope of the poor." The other is that powerful and evil men hold themselves back lest they be totally ruined and so the text continues, "and injustice will shut her mouth," i.e. so that it does not completely waste itself in the harm of others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
