[[commentary]]
quote='''
Third, the multiplication of their descendants: the least shall become a thousand, that is, from one man, so many shall be born successively, just as one nation came from Abraham. Mystically, one person from the Church will be put in charge as superior over a nation, Psalm: the saints shall judge nations. In its time, that is, the time of Christ, or at the time foreordained; suddenly, as though all this that has been said shall happen was not foreseen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
