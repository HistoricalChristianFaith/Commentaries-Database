[[commentary]]
quote='''
So he says, "We cannot find him worthily," so as to come to know him as he is through our own investigation. This is because of his excellence, and so he says, "he is great in might," for his power infinitely exceeds all his effects, and so he cannot be fittingly found through them. He answers the objection that God uses only violence because of the greatness of his power in governing man saying "and with right judgment," for he is great, because, "His judgments are incomprehensible." (Rom. 11:33) Nor is this due to a lack of justice, but to the excellence of his justice, and so he says, he is great in "justice." Because of his greatness we can neither sufficiently conceive him with our mind nor sufficiently praise him with our mouth, and so he says, "and he cannot be explained," fittingly by man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
