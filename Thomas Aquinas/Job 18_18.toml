[[commentary]]
quote='''
Thus when his memory and the public renown of his name end, the brightness of his glory will be changed into the darkness of perpetual oblivion, and expressing this he says, "It will expel him from the light into darkness," that is from earthly glory to oblivion. When his fame ceases and his body been consumed by death, nothing of him will remain any longer in the world, because Baldath and his companions were of the opinion that the soul did not remain after death. "And it will transfer him from this world," so that nothing of him remains in the world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
