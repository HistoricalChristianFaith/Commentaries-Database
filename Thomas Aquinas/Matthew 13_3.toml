[[commentary]]
quote='''
There follows the manner of teaching: and he spoke to them many things in parables. The reason is twofold. One is that by such parables sacred things are hidden from unbelievers, lest they blaspheme: for above it was said, give not that which is holy to dogs; therefore, because many were blaspheming, he wished to speak in parables. Hence Luke 8:10: to you it is given to know the mystery of the kingdom of God, but to the rest in parables. The second reason is that by such parables unlearned men are better taught. Hence men, namely the unlearned, when divine things are explained under similitudes, grasp them better and retain them. Therefore the Lord wished to speak in parables, so that they might better commit them to memory. For since he knew that the worthy would receive his doctrine, he wished to hand it on in such a way that they might retain it more firmly in memory; Psalm 77:2: I will open my mouth in parables. And why did he propose many parables? One reason is that in a multitude of men different people are disposed in different ways; therefore he had to diversify, so as to suit diverse dispositions. Another reason is that spiritual things are always hidden; therefore they cannot be fully manifested through temporal things, and so they must be manifested through diverse things; Job 11:5: would that God would speak to you, and would open his lips to you, that he might show you the secrets of wisdom. The sower went out to sow etc. Here the parabolic doctrine is set down. And he intends three things. First, he sets down the impediment to the evangelical doctrine; secondly, its progress; thirdly, its dignity. The second is at the kingdom of heaven is like leaven etc.; the third at the kingdom of heaven is like a man seeking good pearls etc. Regarding the first, he first sets down the impediments from within; secondly, those from without, in the following parable. The first is divided into three: for first the parable is set down; secondly, its reason is assigned; thirdly, it is expounded. The second is at and the disciples came etc.; the third at hear you therefore the parable of the sower. In the first he does three things. First, the diligence of the sower is described; secondly, the impediment to the seed; thirdly, the fruit. The second is at and while he sows, some fell by the wayside etc.; the third at and others fell upon good ground etc. He says therefore, the sower went out to sow. He who goes out is Christ. For he goes out in three ways. From the hidden place of the Father, not changing place. Likewise, he went out from Judea to the Gentiles. Likewise, from the depth of wisdom to public teaching. He went out therefore, the sower, namely, of the seed of doctrine. Hence Christ sows just as he baptizes, as is found in John 4. For seed is the beginning of fruit. Hence every good work is from God; Philippians 1:6: he who has begun a good work in you will perfect it etc. And in this the error of those who say that the beginning of a good work is from us is removed; which is false. Hence Gregory says: in vain does the preacher labor, unless the grace of the Savior be within. Hence he says, the sower went out to sow etc. This seems to involve a repetition of words; but it does not, because a sower sometimes goes out to sow, and sometimes to reap; so Christ at the beginning goes out to sow; Proverbs 11:18: to him who sows justice, there is a faithful reward. He went out therefore, the sower, to sow. And what? His seed. For some go out to sow iniquity; Job 4:8: I have seen those who work iniquity and sow sorrows and reap them. But this one went out to sow his seed. This seed is the word of God, which proceeds essentially. Hence it is the word of the Father; Sirach 1:5: the source of wisdom is the word of God. But what does it do? It makes those similar to him from whom it proceeds, because it makes sons of God; Psalm 81:6: I have said: you are gods, and all of you sons of the Most High. John 10:35: he called them gods to whom the word of God was spoken. And John 1:12: he gave them power to become sons of God. He went out therefore, etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
