[[commentary]]
quote='''
Third, he places the loss of appetite when he says, "Bread," which is common food, "becomes abominable to him during his life," while he still lived, because of sickness, "and the food of his soul, which he desired before, becomes abominable," which refers to other foods which are desired in different ways by different people.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
