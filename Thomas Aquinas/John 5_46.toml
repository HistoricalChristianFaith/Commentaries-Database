[[commentary]]
quote='''
He presents the reason for this opposition when he says: If you believed Moses, you would perhaps believe me as well, as is clear from "The Lord your God will raise up a prophet for you, from your nation and your brothers; he will be like me: you will listen to him" (Dt 18:15), and from all the sacrifices, which were a symbol of Christ. He says, perhaps, to indicate that their will acts from a free judgment, and not to imply that there is any doubt on the part of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
