[[commentary]]
quote='''
Above the Lord presented a parable concerning the judgment, in which someone is condemned because he does not preserve the spiritual good received interiorly; here he presents a parable in which someone does not multiply the goods received. Hence it is divided. Because first he treats of the distribution of gifts; secondly, of their use; thirdly, of the judgment on those who use them. The second is at and he that had received the five talents went, etc.; the third is at and after a long time, etc. Regarding the first he does three things. First, he presents the necessity of distributing; secondly, the distribution; thirdly, the departure of the one distributing. He shows the necessity in that he says for even as a man going into a far country called his servants and delivered to them his goods. Here you should note that this man is Christ. And we can say that he was going into a far country in a threefold way: because he was going to a place which, although it is his own by his divinity, namely heaven, nevertheless he was a stranger there according to the flesh, because no flesh had ascended there. Hence John 3:13: no man has ascended into heaven, but he that descended from heaven, the Son of man who is in heaven. Likewise he was setting out for heaven, because while he was a stranger in the world, he was journeying to heaven; Jeremiah 14:8: why will you be as a stranger in the land, and as a wayfaring man turning in to lodge? Likewise it can be understood spiritually: for now he is away from us as a stranger, since we are strangers from him; 2 Corinthians 5:6: while we are in the body we are absent from the Lord. But when we shall see him, then we shall not be as strangers, but as citizens and members of God's household. And it should be noted that, as Origen says, where even as is used, something ought to be joined to it, unless it is placed in a similitude, as is had above at 24:27: for as lightning comes out of the east, so shall the coming of the Son of God be. But here it is not placed in a similitude, and nothing is added afterward; on this account it should be read thus: a certain man going into a far country as a man, because Christ is both God and man. Hence insofar as he is God, he does not go on a journey, because all things are naked and open to his eyes, Hebrews 4:13. But he goes into a far country as a man; John 1:14: we saw him as the only-begotten of the Father, i.e., as the only-begotten from the Father. And this was necessary since he was going on a journey, that he should commit the care of his own to others; and this he does when he says he called his servants and delivered to them his goods. And first the liberality of the giver is touched on; secondly, the diversity of gifts; likewise, the discretion in giving. The liberality of the giver is touched on in two respects: in that he anticipated those to whom he gave, and in that he gave abundantly. In that he anticipated them, because he who waits to give diminishes his liberality; but not so the Lord; Psalm 20:4: Lord, you have anticipated him with blessings of sweetness. Hence he called his servants, not they him; hence John 15:16: you have not chosen me, but I have chosen you; Romans 8:29: whom he foreknew, he also predestinated. Likewise his liberality is touched on because he gave from his own: he delivered his goods, not another's. Some indeed are liberal with another's goods, but not with their own; but this one gave from his own. Hence concerning him can be understood what is said in Psalm 67:19: you have ascended on high, you have led captivity captive; you have given gifts to men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
