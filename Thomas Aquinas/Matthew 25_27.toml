[[commentary]]
quote='''
You ought therefore to have committed my money to the bankers. And it follows: just as you say that I reap where I did not sow and gather where I did not scatter. But because I do these things, much more do I will that my money be multiplied. And he speaks according to the likeness of those who deliver money for increase. This money is the words of God: hence in Greek it has argireon: for by silver, which is sonorous, the word of God is signified; Psalm 11:7: the words of the Lord are pure words, as silver tried by the fire. Bankers can be understood in two ways, on account of a twofold office, because they have the office of testing whether money is good, and also of making a profit from the money deposited. According to the first, bankers are hearers who ought to test what they hear; Job 12:11: does not the ear discern words? Likewise those who multiply, as the apostles, who gave to others the gift of the Holy Spirit, by establishing bishops, etc. Titus 1:5: for this cause I left you in Crete, that you should ordain priests in every city, etc. And at my coming I should have received my own. Hence this good would have followed. And what is that good? It is threefold. When the Lord gives you understanding and you strive to act, you multiply; James 1:22: be doers of the word, and not hearers only. Likewise, when the Lord gives virtue, and you strive to use it well; 1 Peter 2:2: as newborn babes, desire the rational milk without guile, that thereby you may grow unto salvation. Likewise, that what you have in yourself you should strive to impart to others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
