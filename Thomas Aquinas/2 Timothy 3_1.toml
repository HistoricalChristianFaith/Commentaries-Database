[[commentary]]
quote='''
Above, he instructed him how to handle present tribulations and dangers; here he shows him how to stand against future ones: first, he predicts some dangers that are to come; second, he shows his fitness to resist them, at but you have fully known my doctrine (2 Tim 3:10); third, how to resist, at I charge you before God (2 Tim 4:1). In regard to the first he does two things: first, he foretells the dangers that will come in the last days; second, he shows that their vices are even now to be avoided, at now these avoid. In regard to the first he does two things: first, he states that there will be dangers in the last times; second, the cause of these dangers, at men shall be lovers of themselves.

He says, therefore: I have said, shun profane and vain babblings (2 Tim 2:16). Not only must you shun them now, but in the future there will be other dangers to avoid. The future is referred to as the last days, because they are closest to the last day: I will raise him up on the last day (John 6:55); gather yourselves together, that I am to tell you the things that shall befall you in the last days (Gen 49:1). And he adds, shall come dangerous times: you shall be hated by all nations for my name's sake (Matt 24:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
