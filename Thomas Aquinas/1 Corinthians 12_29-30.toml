[[commentary]]
quote='''
Then when he says, Are all apostles? he clarifies the distinction among these ministries, saying, Are all in the Church apostles? As if to say: No! Are all teachers? This shows the variety of these ministries: "In the fullness of his knowledge the Lord distinguished them" (Sir 33:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Corinthians.html'
source_title='Commentary on 1 Corinthians'
