[[commentary]]
quote='''
But what will happen to the bad tree? Every tree that does not bear good fruit is cut down, because if it does not bear or if it omits doing what it can, it will be cut down: "If anyone does not abide in me, he will be cast out, and they will gather him up and throw him into the fire, and he will burn" (Jn 15:6). Hence in Luke (8:7) it is said of the fig tree which the Lord commanded to be cut down and taken away: "Take away the wicked one, lest it see God's glory."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
