[[commentary]]
quote='''
But also with regard to your wife, deny yourself honorably; that each one of you know how to take his vessel, that is his wife, in holiness, denying yourself pleasure for a time, and in honor, not in the passion of lust, that is, do not let passion be the stimulus; like heathen, for it is characteristic of heathens to desire immediate pleasures instead of those of the future life. In holiness and honor, because this is the proper use of marriage, since it is for the good of the offspring or for fulfilling an obligation; and so marriage may be without sin. But sometimes a venial sin is involved, if concupiscence is not exercised beyond the limits of marriage, that is, when, although having concupiscence, a person does not indulge it except with his own wife. But when this takes place outside the bonds of marriage, the action becomes a mortal sin; and this happens when he would perform the action, even if she were not his wife, and more willingly with another woman. "Let marriage be held in honor among all, and let the marriage bed be undefiled; for God will judge the immoral and adulterous" (Heb. 13:4). "Likewise you husbands, live considerately with your wives, bestowing honor on the woman as the weaker sex, since you are joint heirs of the grace of life, in order that your prayers may not be hindered" (1 Pet. 3:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
