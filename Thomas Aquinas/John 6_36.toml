[[commentary]]
quote='''
Then (v 36), we see why Christ had to explain these things. For someone could say: We asked for bread; but you did not answer, "I will give it to you," or "I will not." Rather, you say, I am the bread of life; and so your answer does not seem to be appropriate. But our Lord shows that it is a good answer, saying, I have told you that you have both seen me and do not believe. This is the same as a person having bread right in front of him without his knowing it, and then being told: Look! The bread is right before you. And so Christ says: I have told you (I am the bread of life) that you have both seen me and do not believe, i.e., you want bread, and it is right before you; and yet you do not take it because you do not believe. In saying this he is censuring them for their unbelief: "They have seen and hated both me and my Father" (below 15:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
