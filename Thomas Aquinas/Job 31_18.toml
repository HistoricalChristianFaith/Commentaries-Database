[[commentary]]
quote='''
He shows why he was merciful in this way in two ways: first, from long-studied habit he began in childhood, and so he says, "Since mercy has increased in me from my infancy." As he grew in years, so he practiced the works of mercy more. Second, because he had a natural inclination to mercy, like other men commonly have certain inclinations to different virtues, and so he says, "it came forth with me from the womb of my mother," because from the first days of my birth I was disposed to give mercy promptly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
