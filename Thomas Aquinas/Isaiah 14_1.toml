[[commentary]]
quote='''
Her time is near at hand. In this part, he promises liberation to the Jews through the destruction of Babylon, which he threatened above. And this is divided into three parts: in the first, he promises liberation; in the second, he foretells the insults of the liberated against their oppressor: and it shall come to pass in that day (Isa 14:3); in the third, he sets out the confirmation of the insult: the seed of the wicked shall not be named (Isa 14:20).

Concerning the first, he sets out three things: the shortness of time: near at hand is the day of the Lord, to whom all things are present, or after our subjugation, her days, of subjugation: the day of destruction is at hand, and the time makes haste to come (Deut 32:35).

Second, he sets out the manner and order of liberation, and first, as to the relief of their misery: for the Lord will have mercy: he will turn again, and have mercy on us (Mic 7:19); as to the recovery of divine favor: and will yet choose, namely, some of them: the Lord your God has chosen you (Deut 7:6); as to the restoration of their homeland: and will make them rest: I will bring them to their own land: and I will feed them in the mountains of Israel (Ezek 34:13).

Third, he describes the dignity of the liberated, as to the adhering of strangers to them: the stranger shall be joined: draw nigh to God: and he will draw nigh to you (Jas 4:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
