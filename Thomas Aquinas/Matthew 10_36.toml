[[commentary]]
quote='''
Likewise he mentions those who pertain to the household, where he says, and a man's enemies will be those of his own household. And it says in Jeremiah (20:10): "For I hear many whisperings. Terror is on every side. 'Denounce him! Let us denounce him!' say all my familiar friends who were at peace with me." And notice that it is all in Micah (7:6): "The son treats the father with contempt, the daughter rises up against her mother, the daughter-in-law against her mother-in-law; a man's enemies are the men of his own house."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
