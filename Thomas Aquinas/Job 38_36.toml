[[commentary]]
quote='''
After the Lord has brought to mind the marvels of his effects concerning the principal parts of the earth, which are the earth, the sea, and heaven, and their ordering, he now goes on to tell the marvels of his works especially seen in the different properties of animals. Among these properties, knowledge is very remarkable, which is found more perfectly in man than in other animals, and so beginning with man he says, "Who put Wisdom in the bowels of man?" By the bowels of man is understood the inmost power of the soul itself, namely, intellect and reason, on which God has conferred wisdom in giving the light of reason to man. For God has infused the seeds of wisdom and science naturally from his reason in the knowledge of the first principles. In other animals, many indications appear of a kind of natural prudence. This is especially true in the cock, as a known and domestic animal, and so he says, "and who gave understanding to the cock?" Understanding is taken here for a kind of natural estimative power according to which he acts like an intelligent being.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
