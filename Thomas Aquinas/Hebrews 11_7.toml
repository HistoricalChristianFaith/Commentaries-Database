[[commentary]]
quote='''
578. – Then (v. 7) he shows what Noah did by faith and what he obtained as a result: and was instituted heir of the justice which is by faith. He mentions five things that he did: first, that he believed God's words about the judgment to come, but which was not yet seen. Hence, he says, By faith, Noah, being warned by God concerning events as yet unseen, believed. Secondly, he was moved to fear by faith, because faith is the beginning of fear: 'The fear of God is the beginning of his love; and the beginning of faith is to be fast joined unto it' (Sir. 25:16). Hence, he says, moved by fear, namely, of the promised deluge, which, nevertheless, was not seen. Therefore, faith is concerned with invisible things. Thirdly, he fulfilled God's command by building the ark; hence, he says, he constructed an ark, i.e., he did what was suitable according to God's arrangement. Fourthly, he hoped for salvation from God, hence he says, for the saving of his household, i.e., his family, because they alone were saved: 'herein a few, that is eight souls, were saved by water' (1 Pt 3:20). Fifthly, since he did all the foregoing because of faith, he condemned the world, i.e., showed that worldly people deserve condemnation. But the revelation he received about constructing the ark was an answer to his desire and of the righteousness which is by faith.

579. – Then when he says, and was instituted heir of the justice which is by faith, he shows what he obtained by faith. For just as after someone's death another person succeeds in his inheritance, so too, because justice had not entirely died in the world, because the world still continued, but in the deluge almost the entire world perished, therefore, Noah was made heir, as it were, because of his faith. Or of the righteousness which is obtained by faith. Or, just as his fathers were justified by faith, so he was made the heir of justice by faith, namely, an imitator of his fathers' justice by faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
