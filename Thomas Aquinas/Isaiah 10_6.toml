[[commentary]]
quote='''
I will send him to a deceitful nation. Here he describes the one who is deserving of scourges, both as to the fault: a deceitful nation, because it does not keep its promise: all that the Lord has spoken, we will do (Exod 19:8); and as to the sentence, the people of my wrath, that is, whom I have already judged fit to be punished, I will send, I will inspire you to be fit to be punished: the Lord said to me: go up to this land, and destroy it (2 Kgs 18:25); to, that is, against.

To take away. Here he sets out the mode of scourging as to the taking away of their things: take away spoils; as to detention, lay hold; as to the oppression of men: tread them down like the mire, for their baseness: I shall bring them to naught, like the mire in the streets (Ps 17:43).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
