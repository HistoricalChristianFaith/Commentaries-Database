[[commentary]]
quote='''
Second, he places, ironically, the counsel to escape, saying, "enter you"; as if to say, since he himself does not send you away, it remains that you should hide yourself from his face. "Enter you into the rock," literally, into the fissures of the rocks to remain there; "hide you in the pit," that is, in the caverns of the earth, "from the face of the fear of the Lord," that is, from the face of those through whom God proves that he is to be feared and glorified: "leave the cities" (Jer 48:28); but this does not avail them, hence in Psalm 139:7: "whither shall I go from your spirit? Or whither shall I flee from your face?"

Bernard explains this as referring to Christ. "And the rock was Christ" (1 Cor 10:4); one must enter him through the affection of devotion. Therefore, Bernard says: that which is lacking to me I usurp from the heart of Jesus Christ. For out of his heart mercies overflow, and there is no lack of fissures by which they flow out: for they dug holes in his hands, pierced his feet. "Arise, make haste, my love, and come in the clefts of the rock" (Song 2:13–14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
