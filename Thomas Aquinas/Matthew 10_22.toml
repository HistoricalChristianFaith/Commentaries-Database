[[commentary]]
quote='''
And this will not help, because you will be hated by all men. Hence John (16:10): "The hour is coming when anyone who kills you will think he is doing a service for God." But was this really true? Were there not many who received them? Therefore, he was speaking of men who lived on a human plane. But others, who were of God, received them. However, the cause of this is given: "If you were of the world, the world would love its own; but because you are not of the world, therefore the world hates you" (Jn 15:18). The Lord also promised consolation, because for my name's sake. For this should be sweet to you to suffer for my name, as it says in 1 Peter (4:14): "If you are reproached for the name of Christ, you are blessed." Again, he consoled them in another way, because they should arrive at their great success by way of tribulation. For since he foresaw that many would fall, he urges them to persevere; because he who perseveres to the end will be saved. Hence 2 Timothy (4:7): "I have fought the good fight, I have finished the race, I have kept the faith. As to the rest, there is laid up for me a crown of righteousness, which the Lord, the just judge, will award to me on that day." Hence in Leviticus (3:9) it is said that the fat tail, i.e., the end, was offered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
