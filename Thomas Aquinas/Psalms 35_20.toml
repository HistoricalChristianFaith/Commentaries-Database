[[commentary]]
quote='''
On the part of the mouth, in two ways. First, as to fraudulent words. Second, as to mocking words. As to the first, he says that in their mouth -- second, that in their heart -- in their mouth are words of peace; hence he says, "because they spoke to me peacefully." Mk. 12: "We know that you are truthful." Ps. 27: "They speak peace with their neighbor, but evil is in their hearts." In their heart they had deceits, that is, deceitful words. Jer. 9: "Their tongue is a wounding arrow; it has spoken deceit." And this "in the anger of the earth" -- they devised deceits, that is, having anger against me for earthly things. Jn. 11: "Lest perhaps the Romans come," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
