[[commentary]]
quote='''
Then when he says, If I am not doing the works of my Father, then do not believe me, he proves the truth of the foregoing. This is like saying: Although in your opinion I am only human, yet I am not blaspheming when I say that I am truly God, because I truly am. He does two things concerning this: first, he presents the argument of his works; secondly, he draws his conclusion (v 38b).

In the first place he says that in the absence of his works they would have an excuse. He says, If I am not doing the works of my Father, i.e., the same ones that he does, and with the same might and power, then do not believe me. "Whatever he does, that the Son does likewise" (5:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
