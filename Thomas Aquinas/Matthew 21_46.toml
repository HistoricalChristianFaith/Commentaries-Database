[[commentary]]
quote='''
And there follows the malice: "and seeking to lay hands on him, they feared the multitudes, because they held him as a prophet." And this is clear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
