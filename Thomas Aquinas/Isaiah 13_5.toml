[[commentary]]
quote='''
Second, divine help to fulfill the command: from the end of heaven, as though to help; and the instruments of his wrath, that is, all kinds of arms.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
