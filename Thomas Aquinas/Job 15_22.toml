[[commentary]]
quote='''
Now when one has fears about some of his enemies, he can hope to escape even if he is defeated for a while with the help of his friends. But one who confides in no one and fears everyone cannot hope for deliverance after he is oppressed, and so he next says, "He does not believe that he can return from darkness to light," from a state of adversity to a state of prosperity, "when he sees the sword everywhere around him," when he sees enemies threatening him on all sides. He says this especially to answer what Job had said already, "I, who am consumed by rot and like a garment eaten by a moth." (13:28) Eliphaz understood by this the Job was in despair of being delivered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
