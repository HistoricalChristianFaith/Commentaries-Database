[[commentary]]
quote='''
I adjure you by the Lord that this letter be read to all the brethren. Paul feared that those in charge of the assembly might suppress it because of some of the things contained in it. "The people curse him who holds back grain, but a blessing is on the head of him who sells it" (Prov. 11:26).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
