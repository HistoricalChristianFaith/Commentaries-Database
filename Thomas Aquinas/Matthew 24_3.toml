[[commentary]]
quote='''
Having presented the occasion, the questioning is given. And we should note that he went out and went to the Mount of Olives, which signifies the Church, in which fruitful olive trees are planted; Psalm 51:10: I am like a fruitful olive tree. And from there he instructs the disciples. He had said the temple was to be destroyed; therefore they ask three things. The first about the temple; the second about his coming; the third about the end of the world. Hence they say, Tell us, when shall these things be, namely, the completion of your threat; and about your coming: and what shall be the sign of your coming; likewise about the end of the world: and of the consummation of the world. In Luke, only one question is touched, namely, about the destruction of Jerusalem, because they did not believe it would be destroyed except after the second coming; hence they said, Acts 1:6: Wilt thou at this time restore again the kingdom to Israel? In Mark 13:3, it says that only Peter, John, James, and Andrew were sent; because these were called first and had more confidence in approaching him. In this we have an example that those who adhere to God longer in contemplation are more familiar with God; Deuteronomy 33:3: And they that approach to his feet shall receive of his doctrine. These disciples asked about his coming, and this is twofold. The last coming, which is for judgment; and this will be at the consummation of the world. About this you have Acts 1:11: As you have seen him going up to heaven, so he shall come. The other is a coming that strengthens the minds of men, to whom he comes spiritually. Below: they shall see the Son of man coming in the clouds, i.e., in preachers, because through preachers God comes into the minds of men. Hence it is doubtful to what this should be referred. Nevertheless, Augustine says that the whole should be referred to the spiritual coming. But some say it refers to the second coming. Others, however, explain it as referring to the destruction of Jerusalem and the last coming. First, therefore, he responds as to the destruction; secondly, as to the second coming, at for as lightning comes out of the east.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
