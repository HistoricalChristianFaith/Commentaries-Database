[[commentary]]
quote='''
Above the Lord showed the future glory in his transfiguration; here he treats of the advancement toward that glory. And it is divided into two parts, because first he teaches how one must arrive at it; secondly, certain persons are rebuked who inordinately seek preeminence in glory, which begins in chapter 20. Regarding the first, he first teaches how one must arrive at that glory by the common way; secondly, how by the way of perfection, which begins in chapter 19. First, because one arrives at glory through humility; therefore, first he shows the manner of humility; secondly, he forbids the causing of scandal, at but he who shall scandalize one of these little ones etc.; thirdly, he teaches that what has been inflicted must be forgiven, at and if your hand or your foot scandalize you, cut it off, and cast it from you. Regarding the first, the question of the disciples is set forth; secondly, the response of Christ. The occasion of the question is taken from what was said to Peter, that he should go to the sea, and pay the stater found in the fish for himself and for Peter; hence it seemed that he had preferred him to the others. And because they were still weak, they suffered a certain stirring of zeal and envy. But notice that when he led only three up to the mountain, they were not moved as they are here, when he prefers one alone. Hence they asked, who, do you think, is the greater in the kingdom of heaven? Since one does not arrive there through superiority, but through the spirit of humility; Phil 2:3: in humility, let each esteem others better than themselves, etc. In this request the following is to be imitated: that they were not desirous of earthly things, but of heavenly things; 2 Cor 4:18: while we look not at the things which are seen, but at the things which are not seen, etc. But what of this? Should not preeminence in the kingdom of heaven be sought? It must be said that having eminence in the kingdom of heaven is twofold. Either such that we consider ourselves worthy; and this is pride and against the Apostle, Phil 2:3: in humility, let each esteem others better than themselves, etc. But to desire greater grace, so that greater glory may be ours, is not evil, as in 1 Cor 12:31: be zealous for the better gifts. Likewise, the apostles knew that in glory there were various mansions, just as star differs from star in brightness; therefore they asked, because they believed one was greater than another: against certain heretics who held the contrary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
