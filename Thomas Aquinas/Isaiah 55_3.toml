[[commentary]]
quote='''
Second, he promises escape from death: incline your ear: my soul shall live (Ps 118[119]:175); and also: your justifications I will never forget: for by them you have given me life (Ps 118[119]:93).

Third, he promises power. And first, he sets out a similitude: and I will make an everlasting covenant, the faithful mercies of David, that is, as I made true promises to David that his seed would remain forever, so I will also do with you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
