[[commentary]]
quote='''
"And coming out of the tombs after his resurrection, came into the holy city and appeared to many." And it should be noted that although this is stated at the death of Christ, it is nevertheless to be understood as said by anticipation, because it was done after the resurrection; because Christ is the firstborn of the dead, Apocalypse 1:5. "And they came into the holy city," not because it was holy at that time, but because it had been so before; Isaiah 1:21: "how is the faithful city, full of judgment, become a harlot?" Or it is called holy because holy things were treated there. Or, according to Jerome, "into the holy city," namely the heavenly one, because with Christ they came into glory. "And they appeared to many." For just as Christ has the power of manifesting himself to whom he wills, so it is to be understood of glorified bodies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
