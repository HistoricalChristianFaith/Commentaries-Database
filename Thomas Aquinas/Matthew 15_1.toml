[[commentary]]
quote='''
Above, the Lord showed the power of his teaching under figures; now he shows its sufficiency. And this is shown in two ways. First, that it does not require the observances of the law; second, that it was given not only to the one nation of the Jews, but also to the Gentiles, at and Jesus went from there and retired into the district of Tyre and Sidon. Regarding the first, he does three things. First, the circumstances of the accusation are touched upon; second, the accusation; third, the explanation. The second begins at why do your disciples transgress the traditions of the ancients? The third at: for they do not wash their hands when they eat bread. Now their malice is aggravated by three things. First, from the time, because precisely when he was performing these signs and miracles, they were making signs of iniquity; hence they acted maliciously. Above, 11:25: you have hidden these things from the wise and prudent etc. Likewise, the aggravation comes from the place, because although the Jews were spread throughout Judea, those who were in Jerusalem were the learned ones, and yet they were the worst. Isa. 26:10: in the land of the saints he has done wicked things; he shall not see the glory of the Lord. Likewise, the aggravation comes from the condition of the persons, because great ones came, Scribes, who were more learned, and Pharisees, who were reputed to be more holy. Jer. 5:5: I will go to the great men, and I will speak to them; for they have known the way of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
