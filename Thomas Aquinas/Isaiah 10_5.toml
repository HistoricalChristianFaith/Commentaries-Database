[[commentary]]
quote='''
Woe to the Assyrian. In this part, he threatens against the Assyrians themselves, and this is divided into two parts: in the first part the threat against the enemies who oppress them is set out; in the second, the strengthening of the oppressed people: therefore, thus says the Lord (Isa 10:24). The first of these is divided into three: in the first, he denounces their fault; in the second, he threatens punishment: therefore the sovereign Lord, the Lord of hosts, shall send (Isa 10:16); in the third, he shows the effect of the punishment: and he shall run away (Isa 10:18). And their fault consists in transgression of precept or in abuse of authority; hence, the first part is divided into three: in the first, their commission of authority is set out; in the second, their abuse of authority: but he shall not take it so (Isa 10:7); in the third, the vainglory of the abuser: and it shall come to pass, that when the Lord shall have performed (Isa 10:12).

Concerning the first, he does three things: first, the office of scourging is committed to the Assyrians; second, he designates the one who is deserving of scourges: I will send him to a deceitful nation (Isa 10:6); third, he sets out the manner of scourging: to take away the spoils (Isa 10:6). Concerning the first, he designates three things: the one who scourges: woe, it nears you, the Assyrian, you who are the rod of my anger; the power of scourging: the staff, by which I myself scourge, is in their hands, that is, their power, that is, in execution; and the scourging: my indignation is fulfilled through them, below: the Lord has broken the staff of the wicked, the rod of the rulers, that struck the people in wrath with an incurable wound (Isa 14:5–6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
