[[commentary]]
quote='''
Then when he says, which is according to the Gospel, he shows that the Gospel spreads sound doctrine, which is described from three things: first, from the end when he says, of the glory, which it announces: declare his glory among the gentiles (Ps 95:3); second, from the author of glory, when he says, of the blessed God: which in his times he shall show who is the blessed and only mighty, the king of kings and the lord of lords (1 Tim 6:15). Third, from the minister, when he says, which has been committed to my trust: when they had seen that to me had been committed the gospel of the uncircumcision (Gal 2:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Timothy.html'
source_title='Commentary on 1 Timothy'
