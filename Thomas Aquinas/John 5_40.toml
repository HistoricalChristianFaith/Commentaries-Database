[[commentary]]
quote='''
The fruit which you think you have in the Scriptures, that is, eternal life, you will not be able to obtain, because in not believing the testimonies of the Scriptures about me, you are unwilling to come to me, i.e., you do not wish to believe in me, in whom the fruit of these Scriptures exists, in order to possess that life in me, the life which I give to those who believe in me: "I give them eternal life" (below 10:28); "Wisdom infuses life into her children" (Sir 4:12); "He who finds me will find life, and will have salvation from the Lord" (Prv 8:35).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F5.htm'
source_title='Commentary on John'
