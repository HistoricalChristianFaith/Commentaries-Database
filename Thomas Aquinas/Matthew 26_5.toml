[[commentary]]
quote='''
But they said: not on the festival day. Here is treated the delay: and the counsel and its reason are set forth. But they said: not on the festival day. Someone might say that they said this out of devotion; therefore he removes this by saying, lest perhaps there should be a tumult among the people; for they knew that many held him to be a prophet, and some even as Christ: therefore there was dissension among the people, as is found in John 7:30ff. and 9:8ff. Therefore they feared that the people would snatch him from their hands. This is what they were thinking, but Christ was thinking otherwise: hence those two things were in their minds, namely, that they wanted to kill him, and that he should not be crucified on the festival day, to signify that this immolation was succeeding the immolation of the paschal lamb.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
