[[commentary]]
quote='''
But, as the Apostle says (Titus 1:9), a bishop must have learning, that he may be able to exhort in sound doctrine: hence what he says, "loose them," pertains to doctrine; but what follows, "and if any man shall say anything to you" etc., pertains to authority. Hence "if any man shall say," contradicting, i.e., if anyone should wish to contradict, "say that the Lord hath need of them, and forthwith he will let them go." In this is shown the power of Christ, because they would not have released them on account of the apostles, unless this were done by the work of Christ invisibly changing their hearts. Hence he gave them to understand that he himself was God, because it belongs to God alone to change the heart; hence the heart of man is in his hand. Likewise, because he says "forthwith," he gives them to understand that just as those released them at once, they too should release at once. Or literally, because he will hold them a short time, and will release them at once, because he needs them only for the day. But there is a question according to the mystical exposition. Is it not said that he has no need of our goods? I say that he has no need except for our necessity and for his glory. Joel 2:32: "Whosoever shall call upon the name of the Lord, shall be saved." Everything that calls upon my name.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
