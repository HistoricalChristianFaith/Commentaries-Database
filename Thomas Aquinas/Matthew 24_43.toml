[[commentary]]
quote='''
But know this, that if the master of the house knew at what hour the thief would come, he would watch at that hour and would not suffer his house to be broken open. But because he does not know at what hour, he must watch all night. Who is this master of the house? The house is the soul. In it a man ought to rest; Wisdom 8:16: Entering into my house, i.e., into my conscience, I shall rest with her. The master of the house is the reason; Proverbs 20:8: The king who sits on the throne of judgment scatters all evil with his glance. Sometimes a thief breaks open his house. The thief is some persuasion of false doctrine, or some temptation. And he is called a thief, as is found in John 10:1: He who does not enter by the door into the sheepfold, he is a thief and a robber. The door properly speaking is natural knowledge, or the natural law. Therefore whoever enters through reason enters through the door; but whoever enters through the door of concupiscence, or anger, or the like, is a thief. Thieves are accustomed to come by night. In Obadiah 5: If thieves had come in to you, if robbers by night, how would you have held your peace? Hence if they come by day, they are not feared. So when a man is in the contemplation of divine things, then temptation does not come; but when he is relaxed, then it comes. Therefore the prophet says well, Psalm 70:9: When my strength shall fail, do not forsake me. Hence we must watch, because we do not know when the Lord will come, namely, for judgment. Or we can refer this to the day of death; 1 Thessalonians 5:3: For when they shall say, peace and security, then shall sudden destruction come upon them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
