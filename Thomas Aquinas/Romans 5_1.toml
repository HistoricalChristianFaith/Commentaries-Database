[[commentary]]
quote='''
After showing the need for Christ's grace, because without it neither the knowledge of the truth benefited the gentiles nor circumcision and the law benefited the Jews unto salvation, the Apostle now begins to extol the power of grace.
Concerning this, he does two things.
First, he shows what goods we obtain through grace;
second, from what evils we are freed by it, at wherefore as by one man (Rom 5:12).
In regard to the first he does two things.
First, he indicates the manner of reaching or the way by which we come to grace;
second, the good things we obtain through grace, at and glory in the hope of the glory.
In regard to the first he does two things.
First, he exhorts to the due use of grace;
second, he shows us the entrance to grace, at by whom also we have access.
First, therefore, he says: it has been stated that faith will be reputed as justice to all who believe in Christ's resurrection, which is the cause of our justification. Being justified therefore by faith, inasmuch as through faith in the resurrection we participate in its effect, let us have peace with God, namely, by submitting ourselves and obeying him: agree with God and be at peace (Job 22:21); who has hardened himself against him and been at peace? (Job 9:4).
And this through our Lord Jesus Christ, who has led us to that peace: he is our peace (Eph 2:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
