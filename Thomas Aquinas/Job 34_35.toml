[[commentary]]
quote='''
He had inferred a defect in these two things in the words Job himself spoke, and so he says, "Job has spoken stupidly," against wisdom, insofar as he reckoned Job had said something against the righteousness of divine judgment, "and his words do not show discipline," which is a characteristic of an ordered intelligence. He seems to relate this to the fact that Job asserted that he was just.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
