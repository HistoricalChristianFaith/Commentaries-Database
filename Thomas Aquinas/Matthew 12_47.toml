[[commentary]]
quote='''
Someone told him, "Your mother and brothers are standing outside, asking to speak to you." Why he said this and the need for it are explained in Luke (8:19), namely, there was such a crowd that they could not reach him. Mystically, the synagogue is signified by the mother; hence Song of Songs (3:11): "Go forth and behold king Solomon with the crown with which his mother crowned him." And brothers, i.e., the Jews, who stood outside and abandoned Christ: "My brothers have abandoned me" (Jb 6:15). They seek but do not find, as it says in Romans (9:31): "The Jews who pursued the righteousness not based on the Law did not succeed in fulfilling that Law."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
