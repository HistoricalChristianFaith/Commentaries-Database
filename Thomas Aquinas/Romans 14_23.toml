[[commentary]]
quote='''
Second, he shows what is evil in this matter, namely, that one acts against his conscience. Hence he says: but he who discerns, i.e., has the false opinion that he must discriminate among foods, if he eats, namely, food which he regards as unlawful, is condemned, because so far as in him lies, he has the will to do what is unlawful; and so, because he sinned, he is self-condemned (Titus 3:11).

Third, he assigns the cause of what he had said, saying: because he does not act from faith; therefore, he is condemned.

Here faith can be taken in two ways: in one way of faith as a virtue; in another way, so that conscience is called faith. These two meanings differ only as particular and universal. For what we hold by faith universally, for example, that the use of foods is lawful or unlawful, conscience applies to a deed performed or to be performed.

It is said, therefore, that he who eats and distinguishes is condemned, because this is not from faith but against faith, i.e., against a truth of faith and against the conscience of the eater: without faith it is impossible to please God (Heb 11:6). That this is a sufficient reason for condemnation is shown when he says: whatever does not proceed from faith is sin. From this it seems that, as a Gloss says, the entire life of unbelievers is sin, just as the entire life of believers is meritorious, inasmuch as it is directed to the glory of God, as it says in 1 Corinthians: whether you eat or drink, or whatever you do, do all to the glory of God (1 Cor 10:31).

But it should be noted that the believer's relation to good differs from the unbeliever's relation to evil. For there is nothing of condemnation in a person who has living faith, as was said above (Rom 8:1). But in the unbeliever along with his unbelief is the good of his nature. Therefore, when an unbeliever does something good from the dictate of reason and does not refer it to an evil end, he does not sin. However, his deed is not meritorious, because it was not enlivened by grace. This is what a Gloss says: nothing is good without the supreme good, i.e., no good is meritorious without God's grace, and where knowledge of eternal life and unchangeable truth is lacking, which knowledge comes by faith, virtue in the best behavior is false, inasmuch as it is not referred to the end of eternal happiness. But when an unbeliever does something from the fact that he is an unbeliever, it is clear that he sins. Hence when a Gloss says: every deed which is not from faith is a sin, it must be understood in the following way: Everything against faith or against conscience is a sin, and if it seems of its nature to be good, as when a pagan in honor of his gods preserves virginity or gives an alms, he sins by this very fact: to the corrupt and unbelieving nothing is pure; their very minds and consciences are corrupted (Titus 1:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
