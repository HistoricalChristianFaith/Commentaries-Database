[[commentary]]
quote='''
The other reason is because there he wanders more freely in search of pasture, and so he says, "He ranges the mountains for his pasture," since free access to different places to find his pasture lies open to him, and he receives the pastures themselves at his own pleasure, and so he says, "and he searches eagerly for green grass." Domestic asses are not given the best pasturage, but often the worst, because the better pastures are reserved for more noble animals.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
