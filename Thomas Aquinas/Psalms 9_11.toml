[[commentary]]
quote='''
Third, he leads to the second fruit, namely to joy. "Sing psalms to the Lord who dwells in Zion." The Lord is said to dwell in a place not corporally: 2 Sam. 6: David placed the ark in Zion; but according to truth he dwells in the Church. Zion is interpreted as "watchtower," and in the Church we contemplate eternal things. To this Lord, therefore, we ought to sing psalms, that is, to rejoice in heart and mouth and deeds, for benefits given.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
