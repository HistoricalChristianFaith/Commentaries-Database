[[commentary]]
quote='''
And he sets out the judgment of discretion under the metaphor of perceiving by the light: for behold darkness, of tribulation; the peoples, of Babylon and their other enemies; but the Lord shall arise upon you, like the sun illuminating you: but over them only was spread a heavy night, an image of the darkness (Wis 17:20). Or darkness, of unbelief and sins, the people, the unbelievers; the Lord shall arise, like the sun of justice, or literally; his glory, his miracles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
