[[commentary]]
quote='''
The reproof follows: Follow me, for one who wishes to follow Christ must not postpone it for some temporal matter; hence Ps 45 (v. 10): "Forget your people and your father's house." He commanded this, because there were others who could bury him. Consequently, he said, Leave the dead to bury their own dead. Furthermore, it often happens that one prevented by one matter soon runs into another, since one brings on another. Thus, if he had gone to bury his father, he might then have thoughts about the will; as a result he would possibly withdraw altogether: "Woe to you who draw iniquity with cords of falsehood" (Is 5:18). Hence there was no cruelty here. Thus, if we see someone over-affected by the death of his father, he is banned from the funeral on account of the danger suggested in Sirach (30:25): "Sorrow has killed many." But he says, dead, in the plural, because he was dead in two ways, namely, the death of unbelief and bodily death. Hence he was dead both in body and in soul.

Therefore, he gives four admonitions: first, that a person called to the state of perfection should not regard his father with excessive affection: "You have one Father, who is in heaven" (Mt 23:9). The second is that family affection be set aside: "If anyone comes to me and does not hate his father and mother and wife and children and brothers and sisters, yes, and even his own life, he cannot be my disciple" (Lk 14:26). This is true, when father and mother withdraw one from God. The third is that no commemoration of unbelievers be made by the saints. The fourth is that everyone living outside Christ is dead, according to Gregory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
