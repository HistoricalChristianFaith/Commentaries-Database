[[commentary]]
quote='''
And coming into his own country. His country is sometimes called Nazareth, where he was brought up, and there he worked few miracles; sometimes Bethlehem, where he was born; sometimes Capharnaum, because he worked miracles there. And he taught them in their synagogues, etc. There follows the wonder. And first the wonder is set forth; secondly, its effect is identified. He says: so that they wondered. It was not surprising if they wondered; Ps 118:129: your testimonies are wonderful. They wondered whence those powers came: for wonder is caused when the effect is seen but the cause is unknown. They saw the manifest effect, but did not know the cause; hence they said: whence has this man this wisdom and these mighty works? But this was a foolish wonder, because 1 Cor 1:24 states that he is the power and the wisdom of God. But they did not know this, and therefore they wondered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
