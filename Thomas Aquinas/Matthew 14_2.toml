[[commentary]]
quote='''
And he said to his servants: this is John the Baptist. Some have said that he held the doctrine of the transmigration of souls: for Plato and Pythagoras held that the soul departing from one body enters another body. Herod holding this opinion, as they say, believed that the soul of John had passed into the soul of Christ. But this cannot be, because he had killed him a short time before; but Jesus was thirty years old; hence he did not believe this. Likewise Jesus had already worked miracles before the beheading, and before the imprisonment, as is stated in John 3. Nevertheless Herod is to be praised, because he believed in the resurrection, of which Job 14:14 says: do you think a man who is dead shall live again? Likewise he had another good trait, that he believed that the resurrection takes place in a better state; therefore he believed that John then worked miracles which before the resurrection he had not worked; therefore he says and therefore mighty works are wrought in him, because he has arrived at a higher state; hence men will rise in a better state. Hence the Apostle, 1 Cor 15:43: it is sown in weakness, it shall rise in power. But there is a question here, because Luke says that he heard and doubted; hence he said, John I have beheaded; but here he says without doubt, when he says, this is John. Augustine resolves this by saying that he did not say this of himself, but heard it from others. Hence when he first heard, he doubted, but as the report grew he assented. Hence Luke recounted the first, but Matthew the second. Or otherwise it can be said that Matthew too touches on Herod's doubt, so that it is read interrogatively: this is John?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
