[[commentary]]
quote='''
Third, as to the arrival of the captives: rejoice, above: the land that was desolate shall be glad, and the wilderness shall rejoice (Isa 35:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
