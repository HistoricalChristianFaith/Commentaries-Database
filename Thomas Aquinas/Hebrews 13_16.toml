[[commentary]]
quote='''
He mentions another sacrifice, when he says, Do not neglect to do good and to share what you have. As if to say: You formerly performed works of mercy; but now at least with the heart, if you cannot in deed. Therefore, he says, Do not neglect to do good, be liberal, in regard to the things you give: 'In doing good, let us not fail' (Gal. 6:9); 'Do good to the humble, and give not to the ungodly' (Sir. 12:6). Do not forget to share what you have, i.e., the things you have saved: 'All they that believed were together, and had all things in common' (Ac. 2:44); 'Communicating to the necessities of the saints' (Rom. 12:13). Or share, namely, by charity, through which all things are common.

But why should we share? That double benefit is shown when he says: for such sacrifices are pleasing to God, i.e., we can merit God by such sacrifices: 'I am your protector and your reward exceeding great' (Gen. 15:1); 'Then you shall accept the sacrifice of justice, oblations and whole burnt offerings' (Ps. 50:21); 'They shall worship him with sacrifices and offerings; and they shall make vows to the Lord and perform them' (Is. 19:21).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
