[[commentary]]
quote='''
For it is not the man who commends himself that is accepted, i.e., approved by God or by men: "Let another praise you, and not your own mouth; a stranger, and not your own lips" (Prov. 27:2), but the man whom the Lord commends, i.e., makes commendable by good works and miracles. For God is the cause of the entire good done by me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
