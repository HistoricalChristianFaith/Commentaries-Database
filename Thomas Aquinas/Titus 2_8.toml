[[commentary]]
quote='''
Then he shows how he should act in doctrine and in word; and he says that he should have the sound word that cannot be blamed or corrupted by falsity: follow the pattern of the sound words which you have heard from me, in the faith and love which are in Christ Jesus (2 Tim 1:13); fine speech is not becoming to a fool; still less is false speech to a prince (Prov 17:7). Then in regard to the manner he says, that cannot be blamed, i.e., that it be spoken in due season with all propriety and in a way that will incline men to correct themselves: a proverb from a fool's lips will be rejected, for he does not tell it at its proper time (Sir 20:20).

The end of teaching is that he who is on the contrary part may be afraid, having no evil to say of us. As if to say: if everyone acts properly, namely, prelates and subjects, your adversaries cannot harm you: for it is God's will that by doing right you should put to silence the ignorance of foolish men (1 Pet 2:15); give the enemy no occasion to revile us (1 Tim 5:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Titus.html'
source_title='Commentary on Titus'
