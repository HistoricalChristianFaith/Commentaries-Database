[[commentary]]
quote='''
Second, ambushes, or plots of such enemies whom they would repel. "He led me off my way and tore me to pieces." As expressed in Chapter 1:13 "he has left me stunned, faint all the day long."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
