[[commentary]]
quote='''
The manner for afflicting is stated here. First the manner is insidious, second, it is open. Regarding the insidious manner for afflicting two more ideas are presented. First is the insidious action of enemies. "He is to me like a bear lying in wait, like a lion in hiding." Just like Nabuchodonosor fighting against me (Jeremiah), from ambush. "He is to me like a bear": cruel, and "like a lion": in which is designated the above ruler (Nabuchodonosor). As the prophet Hosea relates: "So I will be to them like a lion, like a leopard I will lurk beside the way" (Hos 13:7).

Second, ambushes, or plots of such enemies whom they would repel. "He led me off my way and tore me to pieces." As expressed in Chapter 1:13 "he has left me stunned, faint all the day long."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title="Commentary on Lamentations"
