[[commentary]]
quote='''
And the time of liberation: to proclaim the acceptable year of the Lord, as to the liberation of the Jews, and the day of vengeance, as to the Chaldeans; or the time of grace, in which he takes vengeance upon the devil, curbing his power: now is the judgment of the world: now shall the prince of this world be cast out (John 12:31); you shall bless the crown of the year of your goodness (Ps 64:12[65:11]); for the time is come (Ps 101:14[102:13]).

1076. And as to those who are consumed with sadness, to whom he announces joy: to comfort all that mourn, in general.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
