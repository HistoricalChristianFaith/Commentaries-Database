[[commentary]]
quote='''
For as lightning comes out of the east etc. Here he assigns another reason, because they speak falsely who say that Christ will come in secret; rather, he will come manifestly. And he gives two reasons. One from the manifestation of Christ, another from the gathering of the saints. He says, do not believe that he will not come manifestly: for as lightning comes out of the east, and appears even unto the west, so shall also the coming of the Son of man be; Psalm 49:3: God shall come manifestly. But will he come like lightning, which is seen here one moment and then toward the east the next? Therefore do not understand it as though he will be manifest only in one direction, but in all directions. If we wish to refer this to its mystical meaning, the lightning is the coming of truth. Do not therefore seek hidden teaching, because truth is manifested throughout the whole world. Or the east signifies the beginning, and the west the end. Hence the truth of teaching always has harmony from beginning to end; for true teaching accepts all of Scripture. Some do not accept the Old Testament, some do not accept the prophets, and thus they could not be confirmed by other Scriptures; but true teaching from the beginning of the Church's birth until the end will have confirmation; hence it is said below at the end (28:20): Behold, I am with you all days even to the consummation of the world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
