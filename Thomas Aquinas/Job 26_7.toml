[[commentary]]
quote='''
Then he lists the effects of divine providence in natural things, and he begins from the two extremes, from earth and heaven. In each of these something appears instituted from divine power which exceeds human strength. As far as what appears to the senses, heaven seems to be extended above the earth like a kind of tent; earth to be under heaven like the floor of the tent. Whoever sets up a tent puts something by which the tent can be supported. This does not seem to be the case with heaven. For there does not seem to be anything sustaining heaven but divine power, and so he says, "he stretches out the North Wind over the empty air." By "North Wind" he means the upper hemisphere from our point of view. For from our point of view the North Pole is raised above the horizon, but the South Pole is depressed below the horizon, and so he says that the North Wind is extended "over the empty air," because nothing of heaven appears to us under the upper hemisphere except space full of air, which unlettered men deem empty. He speaks according to the thinking of the common man as is the custom in Sacred Scripture. Likewise, one who lays a floor puts it on something which is firm. However, the earth, which is like the floor of heaven does not appear to have anything firm which can sustain it, but is only sustained by the power of God, and so he says, "and he hangs the earth upon nothing." These things do not mean that heaven is of great weight and needs to be held up so that it does not fall, or as if earth can fall down to its center, but he means that the natural powers themselves by which bodies are naturally contained in their places proceeded from divine power. For as violent motion is from human force, so natural inclination of things proceeds from divine power which is the principle of nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
