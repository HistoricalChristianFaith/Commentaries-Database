[[commentary]]
quote='''
Since he has excluded deceit from himself in general, he descends to certain special sins in which one deceitfully plots against the goods of another. This happens both in theft and in adultery. For in theft one plots by deceit against the possessions of his neighbor, and he excludes this from himself saying, "If my step has turned aside from the way," by disdaining justice, which has as its effect that man looks with a covetous eye at the goods of his neighbor to steal them. So he says, "if my eye (my desire) had followed my heart," as if to say: If my eye intends to have what my heart desired. Third, from contempt of justice and direct intention to acquire what his heart desires, a man may happen to use his hand to rob the goods of another, and so the text continues, "and if any spot cleaves to my hands," by taking the things of another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
