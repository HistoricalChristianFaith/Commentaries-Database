[[commentary]]
quote='''
"And said to him: hearest thou what these say?" As if to say, it is not just that a mere man should allow himself to be praised as God. Acts 12:22f.: because Herod allowed himself to be honored as God, therefore he was struck by an angel, and being eaten up by worms, he expired: in which an example is given to us, that if we are praised beyond our merit, we should not tolerate it. But he could not be praised beyond himself, because he was God. There follows the reproof. And first they are reproved in word; secondly, in deed. "Jesus said to them, yea." The Lord responds very wisely. They intended that if he should restrain the children, they would have their purpose; if not, they would have an accusation against him. But the Lord responds so wisely that he neither reproved the children, nor did they have grounds for calumny. Hence he said "yea," I hear, but they say nothing against me. But David says: "out of the mouth of infants and of sucklings thou hast perfected praise." He does not say "thou hast spoken" but "thou hast perfected," because the fact that such children praise God is from divine inspiration, for the works of God are perfect, Deut 32:4. Hence not from their own industry, but from the Holy Spirit. Wis 10:21: "Who maketh the tongues of infants eloquent." But how does he say "infants," since such ones cannot speak, and therefore neither praise? I say that they are not called infants on account of their age, but on account of their simplicity, because they are free from malice. The Apostle (1 Cor 14:20): "Do not become children in sense: but in malice be children." Likewise, they are called sucklings, because they were moved by miracles: to be moved by miracles is, as it were, like milk, because milk is drunk without difficulty; so these were brought to the faith with sweetness through miracles. Heb 5:12: "You are become such as have need of milk, and not of strong meat."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
