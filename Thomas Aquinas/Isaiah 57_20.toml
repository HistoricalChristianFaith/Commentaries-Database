[[commentary]]
quote='''
But the wicked are like the raging sea. Here he confirms what he had said about the wicked through a certain similitude.

And first, he sets out the similitude itself: raging, that is, always fluctuating; and the waves thereof cast up dirt and mire, to the shore, where they make mire and are trampled: he shall make the deep sea to boil like a pot (Job 41:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
