[[commentary]]
quote='''
There follows concerning the sudden sleep. The cause of sleep and the sleep itself are presented. The cause of sleep is delay. For when people are waiting for someone, and especially at night, they quickly fall asleep. Hence by this interval is signified the interval between Christ's coming in the flesh and his coming to judgment; hence he says and the bridegroom tarrying, they all slumbered and slept. According to all the expositors this is expounded of death. But why is death called sleep? This is on account of the hope of the resurrection. For just as he who sleeps intends to awaken, so he who sleeps in death intends to rise again; 1 Thessalonians 4:12: we will not have you ignorant concerning them that are asleep, that you be not sorrowful, even as others who have no hope. But what is slumbering, and what is sleeping? Gregory explains: slumbering is properly the way to sleep; hence by slumbering we can understand the longer life, and by sleep, death. According to Origen, it is understood of the sleep of sloth; Proverbs 6:9: how long will you sleep, O sluggard? When will you rise from your sleep? Hence the bridegroom tarrying, whether unto the judgment or unto death, they all slumbered and slept; for there are scarcely any who live a long time without growing sluggish. Or those who totally neglect are sleeping; while those who in some way to some degree desist from their first fervor are slumbering.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
