[[commentary]]
quote='''
In three things they deride him. First, in his words; second, concerning the works he did; third, concerning the dignity he claimed for himself. Concerning the first, he says "vah, thou that destroyest the temple of God etc." "Vah" is an interjection of derision. For it had already been spread abroad, and they did not wish to believe; hence of these Jeremiah 8:5 says: "they have laid hold on lying, and have refused to return." As if they would say: if you wish to rebuild the temple, rebuild yourself; but he could not rebuild unless it was first destroyed; therefore he first willed that it be destroyed, because he had said this of the temple of his body. Then, from his works: "save thyself"; as if they would say: you saved others, save yourself. But they did not truly save others, nor will you be able to save yourself. Likewise, from his dignity, because "if thou be the Son of God, come down from the cross." This conditional is not valid; rather, on the contrary, if he is the Son of God, he ought to be obedient to the Father. For he was made obedient unto death, Philippians 2:8. Likewise, they ought rather to say: if thou be the Son of God, ascend, and not descend; John 3:13: "no man hath ascended into heaven, but he that descended from heaven, the Son of man who is in heaven." They use the same word that the Devil used when tempting him above (4:6): "if thou be the Son of God, cast thyself down." For it is not for the Son of God to descend: hence they were speaking at the persuasion of the Devil, wishing to impede his Passion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
