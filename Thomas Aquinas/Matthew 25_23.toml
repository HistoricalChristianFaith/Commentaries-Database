[[commentary]]
quote='''
In this it is given to be understood, according to Origen, that he who receives a small gift from God and uses it well according to his ability receives and merits as much as he who receives a great one. For this alone the Lord requires of every man, that he serve him with his whole heart, as is had in Deuteronomy 6:5. But this can raise a difficulty. Suppose that someone has a great measure of goods, and another a small one; if this one works according to the little charity he has received, then he will merit as much as the one who received more: which seems impossible, because then he who has less charity would merit as much or more than he who has more. And therefore a distinction must be made, because there are certain goods that perfect and elicit the act of the will and incline it; and others that do not. The gift that inclines the will and elicits the act is charity. Therefore it cannot be that he who has more charity does not strive with greater effort and act better. But there are other gifts which one can use according to greater or lesser charity, as knowledge and the like: in such things, he who uses them with greater effort merits more as to the reward; hence it is said in Luke 21:3-4 that the poor widow put more into the treasury than those who put in more, because she used what she had according to her whole ability.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
