[[commentary]]
quote='''
If I cast out devils by Beelzebub. Here the second reason is given. If I cast out, I do this either by the devil's power or by the power of the Holy Spirit; whichever of these it is, you should not slander me. First, he continues the first reason; secondly, the second (v. 28). He says, therefore, If I cast out devils by Beelzebub, by whom do your sons cast them out? Jerome explains this in two ways: In one way of exorcists, concerning whom it says in Acts (19:13) that certain exorcists cast out demons in the name of Jesus Christ. Hence if I cast out devils by Beelzebub, by whom do your sons cast them out? As if to say that their sons cast them out. Therefore, if you do not slander them, you should not slander me. Hence you are accepting persons. Therefore they shall be your judges. Because I cast them out by the power of God, they shall judge, just as below he says of the queen of the south that she will judge. Or it can be explained of the apostles. Your sons, i.e., the apostles. He calls them their sons and not disciples, so that they would be more predisposed toward them. Likewise to show that in belittling them, they attack themselves; because if your sons cast them out, you would do in like manner, if you prepared yourselves. Therefore, because they are aware that I do this by a power given to me and not by Beelzebub, they will be your judges, as it says below (19:28): "You will sit on twelve thrones, judging the twelve tribes of Israel."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
