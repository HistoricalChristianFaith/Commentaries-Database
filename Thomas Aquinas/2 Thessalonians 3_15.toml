[[commentary]]
quote='''
Now the goal and intention should be his correction, which love intends, so he says "yet do not esteem him as an enemy," because his correction should not arise from hateful spite but from a loving eagerness. You should not avoid him out of the sort of hatred you would have for an enemy. "Love your enemies, and do good to those who hate you" (Matt 5:44). And this is why he says "but admonish him as a brother." This shows love. "Behold how good and pleasant it is for brothers to dwell together in unity" (Ps 133:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Thessalonians.html'
source_title='Commentary on 2 Thessalonians'
