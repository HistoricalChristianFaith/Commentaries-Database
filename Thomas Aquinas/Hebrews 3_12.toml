[[commentary]]
quote='''
185. – Above, the Apostle showed on the authority of the Psalmist that Christ must be obeyed strictly. In that authority he found three things, namely, the exhortation, the guilt, and the punishment. These he now explains in that order: first, the exhortation; secondly, the guilt (v. 16); thirdly, the punishment (v. 18). In regard to the first he does two things: first, he exhorts them to be carefully attentive; secondly, to mutual exhortation (v. 12).

186. – He says, therefore, take care. For every man should consider the state in which he is: 'Let everyone prove his own work' (Gal. 6:4); 'See your ways in the valley' (Jer. 2:23). Take care therefore, brethren, each one to himself, because each is part of the assembly, and 'to each one God gave commandment concerning his neighbor' (Sir. 19:12): take care, i.e., let one prove the other, lest there be in any of you an evil unbelieving heart leading you to fall away from the living God. As if to say: many of you are in a perfect state, yet because of weakness and free will, there could be evil in some of you: 'Behold, they that serve him are not steadfast; and in his angels he found wickedness. How much more shall they that dwell in houses of clay, who have an earthly foundation' (Jb. 4:18-19)? 'Have I not chosen you twelve and one of you is a devil' (Jn. 6:71). Therefore no one should be solicitous for himself only, but also for each member of his group. But why? Lest there be in any of you an evil unbelieving heart. This is the evil about which the Apostle speaks, namely, an unbelieving heart, i.e., not firm in faith. In this does wickedness consist, because just as the soul's good consists in clinging to God, 'It is good for me to adhere to my God' (Ps. 72:27), through faith, so man's evil consists in withdrawing from God: 'Know and see that it is an evil and a bitter thing for you to have left the Lord, your God' (Jer. 2:19). And again he says, of falling away, because one departs by unbelief, from the living God: 'They have forsaken me, the fountain of living water' (Jer. 2:15). But he says, from the living God, because He is life in Himself and is the life of the soul: 'In him was life' (Jn. 1:4). He says this to show that by withdrawing from God, man incurs spiritual death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
