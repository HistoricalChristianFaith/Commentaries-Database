[[commentary]]
quote='''
Above the capture of Christ was treated; now he treats of where he was led; and he describes the place and the company of those gathering at the place. He says therefore but they, namely, those who held him, led him to Caiphas. This Caiphas was the high priest of that year according to Jerome, according to what is found at John 11:49: being the high priest of that year. For the priesthood was no longer being administered according to the precept of the law. The Lord had commanded that Aaron and his sons should be priests by hereditary right, so that when one died the other would remain as priest. But afterwards, as ambition grew, they could not endure this, but when Judea was subject to the Romans, this Caiphas had bought the priesthood from the Jews, and had bought it from Pilate; therefore he was a wicked ruler. And it is no wonder if a wicked judge, or ruler, renders a wicked judgment. And this befits the mystery; because just as the passion of Christ was the offering of the true sacrifice, so also the place ought to correspond, so that Christ, who is a priest forever, should be offered in the house of the high priest. Caiphas is interpreted "investigator," and this can be referred to the malice by which he condemned Christ. But here there is a question, because John 18:13 says that he was first led to Annas. And this must be understood as true: for they had gathered at the house of Annas, and there they were assembled; and in this their malice appears, because when they should have been devoted to the solemnity, they were intent on wickedness, so that what is said at Isaiah 1:14 well suited them: my soul hates your solemnities. Hence what was said in Psalm 2:2 was fulfilled: they gathered together against God, and against his Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
