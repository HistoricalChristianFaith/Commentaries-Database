[[commentary]]
quote='''
Third, he promises the destruction of their enemies: behold, I.

And first, he shows the power of the one who promises, setting out a similitude: I have created the smith, the persecutor, who blows in the fire of tribulation, instruments, adversaries, according to his own will: his breath kindles coals (Job 41:12[21]); and he explains this: I have created the killer to destroy: the Lord kills and makes alive (1 Sam 2:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
