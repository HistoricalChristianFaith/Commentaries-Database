[[commentary]]
quote='''
1045. Second, they confess their fault. And first, the manifestation of their fault as to God: for our iniquities are multiplied before you, in your sight: all things are naked and open to his eyes (Heb 4:13); and as to the people themselves: and our sins have answered us, in punishments, for our wicked doings are with us, because we do not make satisfaction or correct our ways, above: the show of their countenance has answered them (Isa 3:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
