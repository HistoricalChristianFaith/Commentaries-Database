[[commentary]]
quote='''
It was said above that the persecutors of Christ were provoked to kill him for three reasons: because of his glory, because of his wisdom by which he confuted them, and because of his justice by which he rebuked them. How they were provoked by Christ's glory has been discussed; now we must discuss how they were provoked by his wisdom. And first, insofar as he shows their condemnation in advance; secondly, insofar as he confutes them by disputing, at then the Pharisees going, consulted among themselves how to ensnare him in his speech. In this parable, in which the reprobation of the Jews and the calling of the gentiles are treated, first the preparation of the wedding is presented; secondly, the calling of the Jews and their refusal; thirdly, the calling of the gentiles. The second is at and he sent his servants to call those that were invited; the third at then he said to his servants, etc. He says, therefore, and Jesus answering, spoke. To whom did he respond? It was not said that he was speaking to anyone. But they wanted to seize him, so he responded not to words, but to their malice; therefore he spoke to them in parables.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
