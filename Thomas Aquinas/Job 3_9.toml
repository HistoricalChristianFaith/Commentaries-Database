[[commentary]]
quote='''
Next he excludes those qualities which belong to the good of the night according to nature from this night. One of these is that the night is adorned by the view of the stars. He takes this away when he says, "Let the stars be blotted out in the darkness." Another quality is that it is bedecked with the hope of day, which he removes saying, "let it hope for light, but not see it," as if to say: Although it is natural to hope for the light of day during the night, yet this night should have a darkness so great that it never ends with the coming of the light of day. The darkness of night is completely broken in the full light of day, but it is diminished at the break of dawn. He calls down on this night not only that its darkness may not be ended by day, but also that it not be diminished by the dawn when he says, "nor see the rising dawn of the morning."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
