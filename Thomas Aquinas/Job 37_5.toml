[[commentary]]
quote='''
But the voice is not only ordered to the teaching of men who hear it, but also to the perfection of natural works which happen following the command of divine wisdom. Therefore, he repeats a second time, "God will thunder in his voice," in the command of his wisdom, "wonderfully," by producing wonderful effects, and to express this he then says, "and he does great," according to their nature, "and unsearchable things," by human reason.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
