[[commentary]]
quote='''
But since Job could boast of knowledge received from others, he then says, "Both old men," in dignity of knowledge and life, "and the elders," in time, "are much older among us than your fathers," than your teachers from whom you received knowledge, or according to the literal sense, your ancestors. He wants to convey a greater knowledge from a greater age, because a man is made wiser by long experience in years.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
