[[commentary]]
quote='''
He concludes: If you, then, who are evil, know how to give good gifts to your children, how much more will your Father, who is in heaven, give good things to those who ask him? But someone will say: He said this to the apostles, who were not evil. Chrysostom answers: "Because they were being compared to the divine goodness." "All our righteousness is as a filthy rag" (Is 64:6). Jerome says: "And if not all are actually evil, yet all are evil as to proneness to evil." Hence it says in Genesis (6:5): "All the thoughts of the human heart are intent upon evil at all times"; "For, behold, each one walks according to the depravity of his heart" (Jer 16:12). Augustine: "If you, then, who are evil. He does not say, 'you are evil,' but although you are evil, you give your children temporal goods, which you regard as good; much more then, your Father, who is supremely good." And this is what follows: How much more will your Father, who is in heaven, give good things to those who ask him, if you want to receive.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
