[[commentary]]
quote='''
But do not wonder if I invite you to a yoke, because my yoke is not a burden. Why? For my yoke is easy and delightful: "How sweet are your words to my taste!" (Ps 119:103). And my burden is light. And these can be referred to two things: by the yoke the oxen are held, but the burden is carried; hence the yoke is referred to the negative precepts, the burden to the affirmative.

But this seems to be false, because the burden of the New Law seems very heavy, as was said above (5:21): "You have heard that it was said of old: You shall not kill. But I say to you that everyone who is angry with his brother will be liable to the judgment." So it seems that it is a heavier burden: "Narrow is the way, which leads to life." Likewise the Apostle in 2 Corinthians (11:23): "In many labors." Hence the yoke seems most burdensome. Therefore, three things must be considered: the effect of the teaching, the act and the circumstances. And in all three it is light.

The doctrine of Christ is light in its effect, because it changes the heart, in as much as it makes us love not temporal but spiritual things. For the person who loves temporal things finds it more a burden to lose a little than a person who loves spiritual things to lose much. The Old Law did not forbid those temporal things; therefore it was painful to lose them. But now, even though it is burdensome in the beginning, after a while it is light: "I will lead you in the paths of uprightness. When you walk, your steps will not be hampered" (Pr 4:11).
Likewise, in regard to its act, the Law imposed a burden of external acts. But our law is solely in the will; hence Romans (14:17): "the kingdom of God is not food and drink." Again, the law of Christ brings joy; hence Romans (14:17): "Justice and peace and joy in the Holy Spirit."
Likewise, in regard to circumstances there are many adversities; hence "All who desire to lead a godly life in Christ Jesus will suffer persecution" (2 Tim 3:12). But they are not burdensome, because they are seasoned with the condiment of love; for when a person loves someone, it is not a burden to suffer anything for him. Hence love makes easy all difficult and impossible things. Therefore, if one loves Christ properly, nothing is difficult for him; consequently, the New Law does not impose a burden.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
