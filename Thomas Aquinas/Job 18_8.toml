[[commentary]]
quote='''
He says that the cause of these impediments comes from his sin, "For he put his feet in the snare." For just as one who willingly puts his foot in a snare wants to be captured, so one who willingly occupies himself with sin disposes himself to have his progress impeded as Scripture says, "His own iniquities have ensnared the evil man." (Prov. 5:22) As there are a variety of meshes in a net, so also in sin there are many different sins which entangle a man in various ways. So he then says, "and he walked forward into the mesh," when he goes from one kind of sin to another or from one mode of sinning to another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
