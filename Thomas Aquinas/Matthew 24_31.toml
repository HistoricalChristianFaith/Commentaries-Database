[[commentary]]
quote='''
Then he will come and he shall send his angels with a trumpet and a great voice. Here he treats of the gathering of the saints; and he sets forth three things. First, the ministers; secondly, those gathered; thirdly, from where they are gathered. The ministers are the angels, as is found in Psalm 102:21: His ministers who do his will. But he says, with a great voice and a trumpet. In the resurrection a threefold power will operate. First, the divine power; secondarily, the power of Christ's humanity, because his resurrection is the cause of our resurrection, as the Apostle says in 1 Corinthians 15:22: As in Adam all have died, so also in Christ all shall be made alive. Likewise, the angelic power will operate there for certain preparatory things, namely, for gathering the dust. And he touches on these three things. The angelic power, when he says, he shall send his angels; the power of God, when he says, with a trumpet; the power of his humanity in that he says, and with a great voice. Of this it is said in John 5:25: All who hear the voice of the Son of God shall live. And that voice must be great, because he shall give to his voice the voice of power, Psalm 67:34. By the trumpet the divinity is well signified, because the voice of a trumpet is greater than the human voice; Apocalypse 11:12: And they heard a great voice from heaven saying to them, come up hither. And shortly after: and the seventh angel sounded the trumpet, and there were great voices in heaven. And note that the trumpet is quite fitting, because in Numbers 10:2 the Lord commanded Moses to make two trumpets; and they sounded the trumpets for assembly, for feasts, for battle, and for the moving of the camp. And so it will be at the judgment; because there will be an assembly, i.e., a gathering of all the saints, because the wicked shall not rise in the judgment, nor sinners in the assembly of the just, Psalm 1:5. Likewise, there will then be an everlasting feast. Likewise, there will be battle against the wicked, as is found in Zechariah 14:14: But Judah also shall fight against Jerusalem. Likewise, there will be a moving of the camp, because the saints will be transferred to the life of the saints; Zechariah 2:11: And many nations shall be joined to the Lord in that day. Likewise, some are now gathered, but not all; but then all will be gathered; below 25:32: All nations shall be gathered before him. Here only the elect are gathered, because they alone are gathered to reign with him; Psalm 49:5: Gather together his saints to him. Hence he says, and they shall gather together his elect. But from where will they be gathered? From the four winds of heaven, from the heights of heaven to the ends thereof. The winds of heaven are distinguished by the four parts of the world. From the east comes the subsolanus; from the west the favonius; from the north the boreas; from the south the auster; and all other winds are contained under these. Hence from the four winds of heaven, i.e., from all parts of the world. There follows, from the heights of heaven to the ends thereof. This can be expounded in two ways. Origen says thus: they shall be gathered. Someone might say that this gathering is only of the living and not of the dead; which he removes by showing that the dead also will be gathered; therefore he says, from the heights of heaven etc. You know that the saints ascend into the heavens, and some are lower, some higher, because according to the measure of merits will be the measure of reward. Hence this is what Augustine says, that from the four winds refers to the bodies, and from the heights of heaven refers to the souls. Remigius says thus, and it is in the Gloss: I shall gather etc. Someone might believe that the gathering is only from the extremities of the earth; but what about the middle of the earth? Hence to the ends thereof. And he means that the gathering will be not only from the extremities of the earth, but from heaven, i.e., from the middle of the world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
