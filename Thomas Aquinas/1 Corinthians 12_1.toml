[[commentary]]
quote='''
After discussing the three sacraments of Baptism, Matrimony and the Eucharist, the Apostle begins to talk about things pertaining to the reality signified in the sacraments. But this is twofold: one is signified and contained, namely, grace, which is conferred at once by the sacrament; the other is signified but not contained, namely, the glory of the resurrection, which is expected at the end. First, therefore, he deals with the gifts of graces; secondly, with the glory of the resurrection (c. 15). In regard to the first he deals with the charismatic graces; secondly, he prefers to all of these charity, which pertains to sanctifying grace (c. 13); thirdly, he compares the charismatic graces to one another (c. 14).

In regard to the first he does two things: first, he principally explains his intention, saying: I have said that "about other things," which pertain to the use of the sacraments, "I will give directions when I come." And this is what he says: Now concerning spiritual gifts, i.e., the gifts of the graces which come from the Holy Spirit, I do not want you to be ignorant, brethren. "For it is the worst form of ingratitude to be ignorant of benefits received," as Seneca says in the book On Benefits. Therefore, in order that man not be ungrateful to God, he should not be ignorant of spiritual gifts: "We have received the Spirit which is from God, that we might understand the gifts bestowed on us by God" (1 Cor 2:12); "Therefore, my people go into exile for want of knowledge" (Is 5:13), i.e., of spiritual things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Corinthians.html'
source_title='Commentary on 1 Corinthians'
