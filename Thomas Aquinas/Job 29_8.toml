[[commentary]]
quote='''
He shows consequently the authority of his judgment, first by the attitude taken by the young men when he says, "the young men" who are often prone to sin, "saw me and hid themselves," as though they dreaded my judgment. Second as to the old he says, "The aged rose and stood," for they were subject to my judgment. He had authority to judge not only youths, but old men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
