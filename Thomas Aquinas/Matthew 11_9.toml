[[commentary]]
quote='''
But they might say: He is inconstant and speaks from a human spirit; therefore, he removes this: But what did you go out to see? A prophet? Hence he bears witness that he did not speak from a spirit that was human but prophetic. So he shows that he is a prophet and more than a prophet. For he was a prophet, as it says in Luke (1:76): "And you, child, shall be called a prophet of the Most High." Likewise, he raised him above the prophets, saying, I tell you, and more than a prophet. He said this for three reasons:

First, because the office of a prophet is to foretell the future; but he manifested not only the future but also things present, saying: "Behold the Lamb of God, behold him who takes away the sin of the world" (Jn 1:29).
Secondly, he is not only called a prophet but the Baptizer, as above (c. 3); and the precursor, as in Luke (1:76): "You will go before the face of the Lord to prepare his ways."
Thirdly, as to his manner: for he acted more miraculously than a prophet, because he prophesied from his mother's womb; the others did not, as it says in Luke (1:44): "For behold, when the voice of your greeting sounded on my ears, the infant in my womb leapt for joy."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
