[[commentary]]
quote='''
I will declare your justice, which you do, or which you ought to receive; your works, idols: the works of those who trust in idols shall not profit them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
