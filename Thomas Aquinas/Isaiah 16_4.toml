[[commentary]]
quote='''
He also exhorts them to amicably sustain those they have received: my fugitives shall dwell with you, below: and a man shall be as when one is hid from the wind (Isa 32:2).

Third, he assigns the reason: for the dust is at an end. And first, as to the destruction of the enemy, lest they dismiss the Jews in the fear of them: the dust is at an end, the multitude of the army of Sennacherib; consumed, that is, killed by his sons, is the wretch, Sennacherib, below: he has failed (Isa 37:38), as to power (Isa 14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
