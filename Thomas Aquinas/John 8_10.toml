[[commentary]]
quote='''
Then (v 10), he shows that Jesus did not abandon mercy, but gave a merciful sentence. First, Jesus questions the woman; then forgives her; and finally, cautions her.

Jesus questioned her about her accusers; thus he says that Jesus rising up, that is, turning from the ground on which he was writing and looking at the woman, asked her, Woman, where are those who accuse you? He asks about her condemnation saying, Has no one condemned you? And she answers, No one, Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
