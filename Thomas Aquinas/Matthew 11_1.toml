[[commentary]]
quote='''
After these words the Lord went on from there to teach and preach; and this for three reasons.

One reason was to show by example what he had taught: "Jesus began to do and to teach" (Acts 1:1).
Secondly, to show that even the wicked should be preached to: "I am a debtor to the wise and unwise" (Rom 1:14).
Thirdly, to give others the opportunity to preach: "If a revelation is made to another sitting by, let the first be silent" (1 Cor 14:30).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
