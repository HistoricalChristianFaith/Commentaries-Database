[[commentary]]
quote='''
Here our Lord promises gifts to his disciples. He had promised them both the Holy Spirit and himself; and so now he first mentions what they will receive when the Holy Spirit comes; and secondly, what they will receive from him, peace. From the coming of the Holy Spirit they will receive great things, namely an understanding of all the words of Christ. In regard to this he first mentions what he taught them, and secondly he promises they will understand them (v 26).

He says, in regard to the first, these things, what I have said, I have spoken to you, by the instrument of my human nature, while I am still with you, as bodily present. It is indeed a very great favor that the Son himself should speak to us and teach us: "In these last days he has spoken to us by a Son" (Heb 1:1); "What is all flesh that it should hear its Lord?" (Deut 5:26).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F14.htm'
source_title='Commentary on John'
