[[commentary]]
quote='''
And he who does not take his cross... It has been said that one who loves father..., but I say more: he that loves himself more than me is not worthy of me, because nothing can fill one's whole affection but God. Therefore, Deuteronomy (6:5): "You shall love the Lord your God with all your heart, and with all your soul, and with all your strength." Hence he says, he who does not take his cross and follow me is not worthy of me. This tells us that one who is not prepared to suffer even death for the truth, and that worst of deaths, namely, the death of the cross, is not worthy of me. Indeed, he should even glory in the cross, as Paul: "Far be it from me to glory except in the cross of our Lord Jesus Christ" (Gal 6:14). In these words Christ foretells his own death: "Christ suffered for us, leaving us an example to follow in his footsteps" (1 Pt 2:21). It is also explained another way, namely, that one who afflicts his flesh takes the cross, as is said in Galatians (5:24): "Those who belong to Christ crucify their flesh with its vices and desires." Again, the cross is carried in the heart, when one grieves over sin, as the Apostle said: "Who is scandalized, and I am not on fire?" Finally, all this is not enough, unless one follows the Lord. Hence, and follows me. If you fast, if you sympathize with your neighbor, but not for my sake, you are not worthy of me. For it is a great thing to follow the Lord, as it says in Sirach (33:8): "It is a great glory to follow the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
