[[commentary]]
quote='''
In regard to the cause, he excuses himself for two reasons, namely, from the motive and the efficient cause. His motive for not lying is that a person who assumes an office is naturally moved to what suits that office and not to what is contrary; but it is obvious that the Apostle's office is to preach the truth. Therefore, he is not moved to the contrary of the truth, which is to lie. In regard to this he does three things: first, he proves the truth of his word by the word of Christ; secondly, he proves the truth of Christ by the word of God; thirdly, he concludes to what he intended (v. 20b).

He says, therefore: I say that our words should be regarded as true, and true they are, because we have preached Christ, in whom there is no falsehood. And this is what he says, For the Son of God, Jesus Christ, whom we preached among you, Silvanus, by me, i.e., to say principally, and Silvanus, secondarily (he is the Silas of Ac. 18:5), and Timothy mentioned above. For those two were with the Apostle when he first converted them. He, namely, the Son of God, was not Yes and No, i.e., there was not falsity, for he did nothing unbecoming, but in him it is always Yes, i.e., the truth, for truth and being are convertible: "I am the way and the truth and the life" (Jn. 14:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
