[[commentary]]
quote='''
Peter answering, said: Lord, if it be you, bid me come to you upon the waters. Because he had given help by words, Peter seeks a sign by deeds. Now Peter confidently asked on behalf of all, and said if it be you, bid me come to you. Here is the great confidence of Peter. He did not say, pray for me, but he said bid me come to you, because he had confessed you are Christ, the Son of the living God. Hence from the faith which he had already conceived, he boldly trusted in his power. Esther 13:9: Lord, all things are in your power, and there is none that can resist your will. And he said this from desire alone, not to tempt, nor from infidelity. 1 Thess. 1:3: mindful of your faith, and labor, and work etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
