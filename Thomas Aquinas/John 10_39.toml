[[commentary]]
quote='''
Now our Lord turns away from the obstinacy of the Jews. First, the Evangelist shows they were obstinate; secondly, we see that Christ turns away from this; thirdly, we see what effect this had.

The Evangelist shows their inflexibility by the fact that after so many confirmations of the truth, after the evidence of so many miracles and wonders, they still persist in their evil. So again they tried to arrest him, to apprehend him, not in order to believe and understand, but in their rage to do him harm; they were even the more enraged because he had more clearly expressed his equality with the Father: "They hold fast to deceit, they refuse to return" (Jer 8:5).

But our Lord turns away from their rage, and so the Evangelist says, but he escaped from their hands. Here we see, first, that he left them by escaping from their hands. He did this for two reasons. To show that he could not be restrained unless he willed: "Passing through the midst of them he went away" (Lk 4:30); "No one takes it from me, but I lay it down of my own accord" (10:18). Secondly, to give us the example of turning away from persecution when this can be done without endangering the faith: "Do not make your stand against one who can injure you" (Sir 8:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F10.htm'
source_title='Commentary on John'
