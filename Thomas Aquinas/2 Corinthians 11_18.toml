[[commentary]]
quote='''
He indicates the reason why he commends himself and glories, when he says, since many boast of worldly things, I too will boast. Here it should be noted that the false apostles, because they were Jews, gloried according to the flesh, saying that they were sons of Abraham. They hoped thereby to be held in reverence and authority by the Corinthians. Therefore, the Apostle says: granted that it is foolish for me to glory according to the flesh, yet because many, namely the false apostles, glory according to the flesh, I too will even glory according to the flesh: "Answer a fool according to his folly, lest he be wise in his own eyes" (Prov. 26:5).

But on the other hand, Seneca says: "The greatest of evils is to live by the example of evil men"; "You shall not follow a multitude to do evil" (Ex. 23:2). Therefore, the Apostle should not glory according to the flesh on the ground that the false apostles glory. I answer that although both are glorying about the same thing, the intention and end are not the same, because the false apostles commended themselves for their own glory and to acquire authority and gain; but the Apostle glories in order that the word of God preached by him might have greater authority and weight and bear fruit for Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
