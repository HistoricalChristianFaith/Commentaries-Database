[[commentary]]
quote='''
There follows the excuse of Peter: Peter saith to him etc. Peter excuses himself: yea, though I should die with thee, I will not deny thee. And yet he was afraid, because at the voice of a maid he denied. Jerome says that he did not know what he was saying, because Christ alone was to die, so that he alone would be the redeemer; Isa. 63:3: I have trodden the winepress alone. Then the affirmation of the others is set forth, namely: in like manner also all the disciples said. Hence they spoke as Peter did; yet the others had a better reason for excusing themselves than Peter, because the others spoke without assertion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
