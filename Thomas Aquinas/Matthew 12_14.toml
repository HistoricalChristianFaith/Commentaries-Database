[[commentary]]
quote='''
But the Pharisees went away, namely, from the synagogue, in fulfillment of Psalm 54 (v. 3): "The synagogue of powerful men has risen against me." They went away, therefore, to do evil, as it says in Job (1:12): "So Satan went forth from the presence of the Lord." And took counsel, i.e., how they might destroy and kill him, because they were unable to overcome him by words: "Blessed is the man who has not gone aside in the counsel of the wicked" (Ps 1:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
