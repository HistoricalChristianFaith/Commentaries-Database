[[commentary]]
quote='''
He cannot hope for any sort of renewal, not even from God whom pride of words offends and so he says, "Let him not trust in vain, deceived that he is deemed by some price," for he must be freed by some help from tribulation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
