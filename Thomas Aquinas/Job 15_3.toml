[[commentary]]
quote='''
He next reproves him for saying, "I want to dispute with God," (13:3) and again, "Spare me in only two things and then I will not hide myself from your face and so on." (13:20) In this reproach he cites him for many things. First, for pride because he contends against someone who is greater than he is. He speaks to this theme saying, "You blame with words one who is not equal to you." Second, for foolishness because Eliphaz thought such a dispute was harmful, and so he says, "You say what is not profitable for you," by arguing with God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
