[[commentary]]
quote='''
The second authority contains the coalescence of gentiles and Jews. Hence, he says: and again he says: O gentiles, once alienated from the commonwealth of Israel (Eph 2:12); rejoice, you gentiles, with his people, i.e., adopt a common joy together with the Jews, who were once his people: they rejoice before you as with joy at the harvest (Isa 9:3); there shall be one flock and one shepherd (John 10:16). But our letter has: rejoice with Jerusalem, and be glad with her, all you that love her (Isa 66:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
