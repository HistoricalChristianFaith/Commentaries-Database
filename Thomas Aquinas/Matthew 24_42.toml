[[commentary]]
quote='''
After the Lord set forth the uncertainty of the hour, he urges vigilance. And first he urges all; secondly, prelates in particular, at who, do you think, is the faithful and wise servant? etc. Regarding the first he does three things. First, he sets forth the admonition; secondly, a similitude; thirdly, he draws the conclusion. He says therefore: I say that the day is uncertain, and no one can be confident of his state, because of anyone, one will be taken and another left; therefore you must be diligent and watchful. Watch therefore. And, as Jerome says, therefore the Lord wished to make the appointed time uncertain, so that man would always be waiting. For in three ways a man is at fault: because his senses are idle; likewise, because he is idle from movement; likewise, because he lies down. Therefore watch, that your senses may be raised up by contemplation; Song of Songs 5:2: I sleep, and my heart watches. Likewise, watch, lest you become sluggish in death; for he watches who exercises himself in good works; 1 Peter 5:8: Be sober, and watch, because your adversary the devil, as a roaring lion, goes about seeking whom he may devour. Likewise, watch, lest you lie down through negligence; Proverbs 6:9: How long will you sleep, O sluggard? But what does he say? Because you know not at what hour your Lord will come. He was saying this to the apostles, and it is not found elsewhere that he so expressly calls himself Lord as here, and in John 13:13: You call me Master and Lord, and you say well, for so I am. But someone might say that the Lord was speaking to the apostles; but the apostles were not going to live until the end of the world. How then does he say, watch, because you know not at what hour your Lord will come? Augustine says that this was necessary even for the apostles and for those who were before us and for us, because the Lord comes in two ways. At the end of the world he will come to all in general; likewise, he comes to each one at his own end, namely, at death; John 14:18: I will not leave you orphans, I will come to you. Therefore there is a twofold coming, at the end of the world and also at death; and he willed both to be uncertain. And these comings correspond to each other, because such as a person is found at the second, such he was at the first. Augustine says: the last day of the world finds that man unprepared whom his own last day finds unprepared. Likewise, it can be expounded of another coming, namely, the invisible one, when he comes into the mind; Job 9:11: If he comes to me, I shall not perceive him. Hence he comes to many, and they do not perceive it. Hence you must watch greatly, so that if he knocks, you may open to him; hence Apocalypse 3:20: I stand at the door and knock: if anyone shall open to me, I will come in to him, and will sup with him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
