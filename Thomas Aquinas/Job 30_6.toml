[[commentary]]
quote='''
Seventh, he shows the vile character of their dwellings, because they do not have houses to live in saying, "they live in desert stream beds," which are the dry stream beds caused by storms where they protected themselves from the heat, "and in the caverns of the earth," because of the shade, "or in gravel," because of the cool of the nearby water or because of the softness of the sand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
