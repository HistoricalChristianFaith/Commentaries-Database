[[commentary]]
quote='''
Just as she does not care to guard her eggs, so she does not care to nourish her young, and so he says, "She deals cruelly with her young as if they are not hers," because she takes no care for their nutrition, so, as far as she is concerned, she loses the fruit of generation, and so he says, "she labored in vain," by conceiving and bringing to birth, because she does not nourish her young. Sometimes other animals also desert their new born young from fear, but the ostrich does this, "without being compelled by fear."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
