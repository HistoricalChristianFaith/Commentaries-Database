[[commentary]]
quote='''
Therefore, having these things, keep the good thing committed to your trust, namely, which I have entrusted to you, namely, the office of preaching, and never depart from the truth or give up the office of preaching at any time because of fear: with all watchfulness keep your heart (Prov 4:23); O Timothy, keep that which is committed to your trust (1 Tim 6:20). And keep this with the help of the Holy Spirit who dwells in us: know you not that you are the temple of God, and the Spirit of God dwells in you? (1 Cor 3:16).

According to another version he urges him to maintain sound doctrine and to persevere in it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
