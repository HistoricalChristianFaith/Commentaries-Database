[[commentary]]
quote='''
Still he shows that the argument he used was unfitting in many ways. First, by comparison of Job to all creatures. For if any creature could argue with God, this would be really fitting only for the first and most excellent of creatures, a condition which does not befit God and so Eliphaz says, "Were you born the first man and formed before all the hills," so that for this reason you would have the competence to argue with God on behalf of the whole human race and every creature?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
