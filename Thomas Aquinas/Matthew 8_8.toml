[[commentary]]
quote='''
But the centurion answered him... Much has been made of the kindness and faith of the centurion; now the humility that accompanied his faith is shown. First, therefore, his humility and faith are presented; secondly, the kindness of Christ (v. 10). In regard to the first he does three things: first, he protests his unworthiness; secondly, Christ's power; thirdly, he suggests a comparison. The Lord presented himself as kind; but because he was a gentile, he considered himself unworthy, saying, Lord I am not worthy... In the same way Peter said: "Depart from me, O Lord, for I am a sinful man" (Lk 5:8). Augustine says that by professing himself unworthy, he made himself worthy. And as he said, so we, too, should say: "I am not worthy that you should enter my body." Then the faith of the centurion confessing Christ's power is mentioned: Only say the word and my servant will be healed, because, as it says in Wisdom (16:12), "For neither herb nor poultice cured them, but it was your word, O Lord"; and in Psalm 107 (v. 20): "He sent forth his word and healed them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
