[[commentary]]
quote='''
Because desire, when it is fulfilled causes joy, he adds, "and are glad powerfully when they find the grave," i.e. when they see they have arrived at death which procures a grave for them. Some think this passage refers to the fact that those who dig for treasure rejoice in finding a grave because they often found treasures in ancient tombs. But the first explanation is better.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
