[[commentary]]
quote='''
Second is that he is despoiled of his riches and so he says, "He will not become wealthy," by acquiring new riches, "nor will he preserve his substance," to retain the riches he has already acquired. The third bitter thing is the impossibility of recovering his wealth. So he says, "nor will he put forth his roots in the earth." If a tree is uprooted and replanted, it recovers its strength if it can put forth its root in the earth. But if it cannot put forth its root in the earth, it cannot grow strong again.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
