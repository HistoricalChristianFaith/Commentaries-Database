[[commentary]]
quote='''
And behind the door. Here he designates familiar places, for they would place idols next to the entrance of their houses, so that they might better hold them in memory: he brought me in the vision of God into Jerusalem, near the inner gate, that looked toward the north, where was set the idol of jealousy to provoke to jealousy (Ezek 8:3).

For you have discovered yourself near me. Here he adds to the weight of their sin from their violation of the divine covenant, by which they were joined to God like a bride. And he says this under the likeness of an adulteress, who enlarges her bed to receive an adulterer along with her husband, and makes an agreement to marry him when her husband has been sent away; in this is signified that they worshipped idols in the temple: you were as an adulteress, that brings in strangers over her husband (Ezek 16:32).

You have loved their bed. Here he adds to the weight of their sin from their eagerness to sin.

And first, as to their propensity to sin: with open hand, that is, without any hindrance: you had a harlot's forehead, you wouldst not blush (Jer 3:3); you were not yet satisfied (Ezek 16:28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
