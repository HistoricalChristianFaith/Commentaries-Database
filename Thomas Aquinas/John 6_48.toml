[[commentary]]
quote='''
Having stated his position, he expresses it as, I am the bread of life, which gives life, as clearly follows from the above. We read of this bread: "The bread of Asher will be rich, he will furnish choice morsels," of eternal life, "to kings" (Gn 49:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
