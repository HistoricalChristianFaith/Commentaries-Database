[[commentary]]
quote='''
Second, he shows the dignity of wisdom, because the price of wisdom cannot be reckoned, and so he says, "No man knows its price," for there is no thing known to man which is a sufficient price for wisdom. He clearly shows the consequence of both these premises. First, he had said that wisdom was not found in a determined place. Those things which are esteemed as valuable among men are partly found among refined men, who strive to collect precious stones and metals, and so he says, "Nor is it found among soft-living men," that is, refined men, because they are especially impeded from the perception of wisdom since their hearts are preoccupied with pleasures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
