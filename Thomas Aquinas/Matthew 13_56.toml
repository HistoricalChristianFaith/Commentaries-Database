[[commentary]]
quote='''
And in the same way is to be understood what follows: and his sisters, are they not all with us? Therefore from those things which pertained to the flesh, they went forth into wonder, saying: whence then has this man all these things?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
