[[commentary]]
quote='''
Then, when he says, but I see, he presents the other conclusion, which corresponds to his previous statement that I am carnal (Rom 7:14).
The conclusion is this: but I see another law in my members, which is the inclination to sin and can be called a law for two reasons: first, by reason of the effect. For just as the law induces to do good, so the inclination induces to sin. Second, by reason of their cause.
But since the inclination to sin is a punishment for sin, it has a twofold cause: one cause is sin, which has taken mastery over the sinner and imposed its law on him, i.e., the inclination to sin, just as a master imposes his law on a vanquished slave. The other cause of the inclination is God, who imposed this punishment on sinful man, i.e., that his lower powers do not obey reason. And in this sense the very disobedience of the lower powers constitutes the inclination to sin and is called a law, inasmuch it was introduced by the law of divine justice, just as the sentence of a just judge has the force of law: and this has been done from that day forward, and was since made a statute, and an ordinance, and as a law in Israel (1 Sam 30:25).
This law is found in the sensitive appetite as in its source, but it is found spread over all the members which play a role for concupiscent desire in sinning: just as you once yielded your members to serve impurity and every iniquity (Rom 6:19). Hence he says in my members.
Now this law has two effects in man: first, it resists reason; hence he says, fighting against the law of my mind, i.e., with the law of Moses, which is called the law of the mind, inasmuch as it agrees with the mind or with the natural law, which is called the law of the mind, because it is present by nature in the mind: they show that what the law requires is written in their hearts (Rom 2:15). Concerning this resistance it is said: the desires of the flesh are against the spirit (Gal 5:17).
The second effect is that it makes man a slave; hence he says, and captivating me, or leading me captive, according to another text, in the law of sin that is in my members, i.e., in myself, following the Hebrew custom of speech whereby a noun is used in place of a pronoun.
But the law of sin makes man captive in two ways: the sinner it makes captive through consent and action; the man in grace through the movement of concupiscent desire. It is said of this captivity: when the Lord led back the captives of Zion (Ps 126:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
