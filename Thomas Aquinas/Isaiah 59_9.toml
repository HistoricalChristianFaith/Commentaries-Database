[[commentary]]
quote='''
1043. Therefore is judgment far from us. Here the people confess. And first, they confess their misery as to the injustice of the enemies oppressing them: judgment is far from us, because God does not judge us from our adversaries: the contrary is found above: I have brought my justice near (Isa 46:13[12]); as to the distress of their tribulations, setting out the obscurity of tribulation under the metaphor of darkness: we looked for light, divine consolation, and behold darkness, of tribulation, above: we shall look towards the land, and behold darkness of tribulation (Isa 5:30).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
