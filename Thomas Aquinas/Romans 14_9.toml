[[commentary]]
quote='''
Second, he assigns the cause of this condition, saying: for to this end Christ died and rose again, i.e., by his death and resurrection he obtained the right to be Lord of the living, because he rose to begin a new and perpetual life, and of the dead, because by dying he destroyed our death: he died for all that those who live might live no longer for themselves, but for him who for their sake died and arose (2 Cor 5:15).

Thus, therefore, by all the foregoing the Apostle has proved that each one stands or falls before his master, namely, by the fact that believers give thanks to God and that they live and die to the Lord and that in life and in death we are the Lord's.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
