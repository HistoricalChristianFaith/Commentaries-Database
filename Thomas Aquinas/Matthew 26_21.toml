[[commentary]]
quote='''
And whilst they were eating, he said etc. Here is set forth the foretelling of the betrayer. And first he designates the betrayer from among his company; second, from authority; third, from his own voice. The second at but he answering said etc.; the third at thou hast said it. And concerning the first, first the foretelling is set forth; second, its effect, and they being very much troubled. Hence he says, and whilst they were eating, he said: amen I say to you that one of you is about to betray me. Amen I say: he affirms, because he was saying something great, that one of you, whom I chose to be pillars of the Church; Sirach 6:10: there is a friend, a companion at the table, and he will not abide in the day of distress. And in Jeremiah 9:4: let no man trust in his brother.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
