[[commentary]]
quote='''
Divine mercy is here designated as to expectation of future events. First, the expectation itself, second, to the condition of such expectation.

Regarding this expectation of future events three ideas are proposed. First is the result of such an expectation: "The Lord is good to those who wait for him, to the soul that seeks him." That is, as if spreading proper possessions. Since, Psalm 73:1 claims: "Truly God is good to the upright, to those who are pure in heart."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
