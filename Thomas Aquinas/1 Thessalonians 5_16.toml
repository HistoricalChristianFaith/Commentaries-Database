[[commentary]]
quote='''
Then when Paul says: rejoice always, he shows how they ought to behave towards God; and he mentions three things. First, to rejoice in Him; and so Paul says, rejoice always, that is, in God; for whatever evil might occur, it is incomparable to the goodness which is God. Hence, no evil ought to interrupt it, and so Paul insists: rejoice always.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
