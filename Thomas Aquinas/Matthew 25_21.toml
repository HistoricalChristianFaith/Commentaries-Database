[[commentary]]
quote='''
There follows the due reward: and in it he does four things. Because first a congratulation is presented; secondly, a commendation of merits; thirdly, the equality of judgment; fourthly, the greatness of the reward. The congratulation is touched on when he says his lord said to him: well done, good and faithful servant, etc. Hence it is said in Isaiah 62:5: behold the bridegroom shall rejoice over the bride, and your Lord shall rejoice over you. Hence with an exulting spirit he receives him, when he says well done. Well done is an expression of exultation. There follows the commendation. And first he commends him for humility, when he says servant, because he recognized himself to be his servant; Luke 17:10: when you have done all things well, say: we are unprofitable servants. Likewise he commends him for goodness by the fact that he says good; because properly the good is diffusive of itself; hence the good one multiplied goodness. Likewise for faithfulness, because he did not retain for himself but offered to his lord; hence it is said and faithful; 1 Corinthians 4:2: here now it is required among the dispensers that a man be found faithful. And above at 24:45: who, think you, is a faithful and wise servant? Hence he approves him, saying faithful. For not he that commends himself is approved, but he whom God commends, 2 Corinthians 10:18. Then he presents the equality, to show the equity of the judgment, saying: because you have been faithful over a few things, I will place you over many things. These few things are all the things that are in this life, because they are as nothing in comparison to heavenly things. Hence he means to say: because you have been faithful in regard to goods which belong to the present life, I will place you over many things, i.e., I will give you spiritual things which are above all these goods; Luke 16:10: he that is faithful in that which is least is faithful also in that which is greater. There follows the greatness of the reward: enter into the joy of your lord. For joy is the reward; John 16:22: I will see you, and your heart shall rejoice. And someone might say: is not the vision the reward, or some other good? I say that if some other thing is called the reward, nevertheless joy is the final reward. Just as I could say that the end of heavy things is the lower place; likewise to rest in that place, and that is more principal. Thus joy is nothing other than the repose of the soul in the good attained; hence by reason of its finality, joy is called the reward. And why does he say enter into joy, not "receive"? It must be said that there is a twofold joy: of exterior goods and of interior goods. He who rejoices in exterior goods does not enter into joy, but joy enters into him; but he who rejoices in spiritual goods enters into joy. Song of Songs 1:5: the king brought me into his storerooms. Or otherwise: that which is in something is contained by it, and the container is greater. When therefore joy is about something which is less than your heart, then joy enters into your heart. But God is greater than the heart; therefore he who rejoices in God enters into joy. Likewise he enters into the joy of the lord, i.e., concerning the lord, because the lord is truth. Hence beatitude is nothing other than joy in the truth. Or thus: enter into the joy of your lord, i.e., rejoice in that in which he rejoices, and concerning which your lord rejoices, namely, in the enjoyment of himself. Then therefore a man rejoices as lord when he enjoys as lord; hence the Lord says to the apostles: I have appointed you that you may eat and drink at my table in my kingdom, i.e., that you may be blessed in that in which I am blessed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
