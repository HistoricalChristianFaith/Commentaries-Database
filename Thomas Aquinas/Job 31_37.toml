[[commentary]]
quote='''
He promises that he will not contradict this book containing the divine witness. "For every one of my steps," with the progress of my works, "I will announce it," that is, I will acknowledge the truth of God's testimony and I will not refuse to submit the sentence according to divine witness. So he says, "and as to a prince I will offer it," joyfully accepting the fact that he was dealt with on the basis of God's testimony.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
