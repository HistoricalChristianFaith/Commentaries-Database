[[commentary]]
quote='''
He explains, consequently, what they gnaw when he continues, "and they ate grass," wild and raw, "and the bark of trees and the root of the junipers was their food." Here he shows how crude and cheap their food was.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
