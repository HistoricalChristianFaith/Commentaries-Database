[[commentary]]
quote='''
And all this is because "you have girded me." Here he treats of their total abandonment, and he commemorates two things. First, the divine benefit; second, their final destruction, at "and I will grind them," etc. And because the things he has said seem to pertain to his own glory, he therefore attributes them to God. And first he excludes his own power; second, he shows the dejection of the enemies, "you have overthrown"; third, their being deprived of help, at "they cried out." He says therefore: O Lord, you did this for me, "and you have girded me with strength for battle," that is, all the strength I have for fighting is from you, not from me. Is. 40: "He gives power to the faint, and to those who have no might he increases strength and vigor." "And you have overthrown those who rose up against me beneath me." He sets forth the dejection of the enemies, concerning which he said three things: namely flight, "you gave me their back"; diminishment, "I will break them"; and their fall, because "they shall fall"; and he attributes this to God, not in the same order. First he sets forth the fall of his enemies; as if to say: my enemies shall fall beneath me. Is. 40: "Youths shall faint and labor, and young men shall fall in their infirmity." But you did this: "and you have overthrown those who rose up against me beneath me," that is, you took away their power so that they could not resist me. Lev. 26: "Five of you shall pursue a hundred strangers." Second he sets forth the flight of the enemies: "and you have given me the backs of my enemies." Is. 45: "I will turn the backs of kings." Third he treats of the breaking: "and those who hated me you have destroyed," among the nations they did not know. "They cried out." Here he shows that they are completely desolate; hence he says, "they cried out, and there was none to save them," because they had neither the help of men nor of the gods whom they themselves called the creators of things. Jer. 2: "Where are your gods that you have made? Let them arise and deliver you in the time of your affliction." Hence there follows: "They cried out to the Lord, and he did not hear them." Is. 1: "When you multiply your prayers, I will not hear you." But against this: Is. 65: "Before they cry, I will hear." Ps. 90: "He shall cry to me, and I will hear him." And it should be said that when someone cries out with a right intention, whether praying or crying, then he is heard, and God approves and hears his prayer. Jn. 9: "If anyone is a worshipper of God," that is, with a right intention, "him he hears." But when someone cries out to God with a simulated and feigned prayer, he does not hear. Jas. 4: "You ask and do not receive, because you ask wrongly," that is, with a bad intention or an unjust request. Prov. 1: "Then they will call and I will not hear; they will rise at dawn and will not find me." Next he shows their total destruction; hence he says, "and I will grind them." When dust is thrown, no trace remains, because the wind scatters it; so when the wicked are destroyed, they remain in no way. Therefore he says, "and I will grind them like dust before the wind." Ps. 1: "The wicked are like dust which the wind casts from the face of the earth," that is, they are scattered. Ps. 9: "Their memory has perished," etc. But because some are destroyed sometimes with honor, he shows that the wicked or sinners are consumed vilely and dishonorably; hence he says, "like the mud of the streets I will destroy them." Job 20: "If his pride," namely the sinner's, "ascend even to heaven, and his head touch the clouds, he shall be destroyed in the end like a dunghill." Ps. 68: "Let them be blotted out of the book of the living." Is. 17: "He shall be carried away like the dust of the mountains before the wind" (namely the sinner) "and like a whirlwind before a tempest." Job 13: "Your necks shall be brought down to the mud."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
