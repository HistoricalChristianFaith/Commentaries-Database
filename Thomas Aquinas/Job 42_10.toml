[[commentary]]
quote='''
Not only the humility of the friends but also his own humility lent efficacy to his prayer, and so the text continues, "The Lord also was turned," from fury to clemency, "by the penance of Job, when he prayed for his friends." For it was fitting that one who had humbly done penance for such a light sin, should also obtain pardon for others who sinned gravely. A person's penance is more useful for himself than for others. Therefore, if the prayer and penance of Job merited the removal of divine indignation from the friends, it was even more fitting that he should be freed from adversity. Although Job did not put his hope in recovering earthly prosperity but in attaining future happiness, the Lord still also restored him abundantly to temporal prosperity, as Matthew says, "Seek first the kingdom of God and his justice, and all else will be given to you." (6:33) This was fitting in time according to the state of the Old Testament in which temporal goods were promised, so that in this way by the prosperity which he recovered, he would give an example to others that they might convert to God. It was also fitting to the person of Job himself, whose reputation had been sullied among other people because of the many adversities which had come upon him. Therefore, to restore his good reputation, God led him back to a state of even greater prosperity. So the text continues, "And the Lord gave Job twice as much as he had before."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
