[[commentary]]
quote='''
Third, the compassion of the prophet is set out. And first, his compassion is set out: over this, namely the misfortune of Moab, I will lament with the weeping of Jazer, that is, weeping over that city of Moab, and similarly also the vineyard of Sabama, and Eleale.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
