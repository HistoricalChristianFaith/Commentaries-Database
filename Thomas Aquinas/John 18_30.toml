[[commentary]]
quote='''
2336 Concerning the first, we have the examination by Pilate, and then the malicious reply of the Jews. When Pilate saw Jesus bound and brought by so many seeking his condemnation, he said, What accusation do you bring against this man? Their reply was, If this man were not an evildoer, we would not have handed him over. They are saying here: We have already examined and condemned him, and are now handing him over to you to be punished. They were regarding their own judgment as sufficient for Pilate. Yet they were not speaking truly when they said he was an evildoer, for "He went about doing good and healing all that were oppressed by the devil" (Acts 10:38). They were acting like the Psalm says, "They requite me evil for good" (Ps 35:12).

2337 Luke is different, for he says that the Jews accused Christ of many crimes: "He stirs up the people, teaching throughout all Judea, from Galilee even to this place" (Lk 23:5). I reply that, as Augustine says, the Jews said many things to Pilate at that time, and it could be that they first said what John reports, and then said what Luke tells us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F18.htm'
source_title='Commentary on John'
