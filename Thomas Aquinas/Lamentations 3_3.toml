[[commentary]]
quote='''
Third is the condition for the blows: "Surely against me he turns his hand again and again the whole day long." Namely, there follows a sequence of affliction that considers such blows alone.

"Surely against me he turns his hand again and again the whole day long." That is, striking blows again and again. Hence, Isaiah 9:12: "For all this, his anger is not turned away and his hand is stretched out still."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
