[[commentary]]
quote='''
After the foundation of the earth, he continues then speaking about the waters which are immediately placed over the land. The natural order of the elements requires that water surrounds the earth at every point like air surrounds earth and water at every point. But by divine disposition, it has been effected for the generation of men, animals, and plants, some part of the land remains uncovered by the waters, as God holds back the waters of the sea within their certain limits by his power, and so he says, "Who shut up the sea with doors," with determined limits. There were some who thought the action of the sun dried up some part of the earth, but the Lord shows that it has been disposed from the beginning that the sea does not cover the land everywhere. He describes the production of the sea using the comparison of the birth of a living thing, a child, because water is especially apt to be changed into living things. This is why the seed of all things is moist. The child first comes forth from the womb of its mother, and he means this when he says, "when it burst forth as though proceeding from the womb." He uses the word "to break forth" because it is a property of water to move almost continually. He says the sea proceeds, "from the womb," not because it has had its origin from other corporeal matter, but because it proceeded from the hidden origin of divine providence as from the womb.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
