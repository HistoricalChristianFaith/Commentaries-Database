[[commentary]]
quote='''
Benevolence on the enemy's part, excitement against indications of evil inflicted by the enemy, are here viewed. First is noticed the preparation for capturing, second, the captivity itself.

To the idea, preparation for capturing, three more references are made. First is the enemies' preparation: "All our enemies rail against us." That is, as if to devour us. So Psalm 22:13 says: "They open wide their mouths at me, like a ravening and roaring lion."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Lamentations.html'
source_title='Commentary on Lamentations'
