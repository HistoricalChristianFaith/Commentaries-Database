[[commentary]]
quote='''
Jesus forgives her; and so it says, Then Jesus said: Nor will I condemn you, I who perhaps you feared would condemn you, because you saw that I was without sin. This should not surprise us for "God did not send his Son into the world to judge the world, but that the world might be saved through him" (3:17); "I do not desire the death of the sinner" (Ez 18:23). And he forgave her sin without imposing any penance on her because since he made her inwardly just by outwardly forgiving her, he was well able to change her so much within by sufficient sorrow for her sins that she would be made free from any penance. This should not be taken as a precedent for anyone to forgive another without confession and the assigning of a penance on the ground of Christ's example, for Christ has power over the sacraments, and could confer the effect without the sacrament. No mere man can do this.

Finally, Jesus cautions her when he says, Go, and do not sin again. There were two things in that woman: her nature and her sin. Our Lord could have condemned both. For example, he could have condemned her nature if he had ordered them to stone her, and he could have condemned her sin if he had not forgiven her. He was also able to absolve each. For example, if he had given her license to sin, saying: "Go, live as you wish, and put your hope in my freeing you. No matter how much you sin, I will free you even from Gehenna and from the tortures of hell." But our Lord does not love sin, and does not favor wrongdoing, and so he condemned her sin but not her nature, saying, Go, and do not sin again. We see here how kind our Lord is because of his gentleness, and how just he is because of his truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
