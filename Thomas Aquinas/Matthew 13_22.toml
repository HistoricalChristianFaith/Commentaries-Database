[[commentary]]
quote='''
And he who was sown among thorns etc. Here the impediment to bearing fruit well is set down, which sometimes comes from prosperity and sometimes from adversity; hence he says, and he who was sown among thorns, this is he who hears the word of God. These thorns are the cares of this world; for just as thorns prick and do not allow a man to rest, so neither do these cares. Therefore do not sow upon thorns. The care of this world and the deceitfulness of riches choke the word. Care regarding the future; the deceitfulness of riches regarding the present; hence when riches abound, they are deceitful; 1 Timothy 6:17: charge the rich of this world not to be high-minded, nor to trust in the uncertainty of riches. Likewise, when they are desired, they deceive with regard to satisfaction, because they do not satisfy. Likewise, they cause anxiety; therefore the Lord forbade his apostles, be not solicitous what you shall eat or what you shall drink, above at 6:31. It chokes the word. Above he said it withered; here, it chokes. For you know that a candle can be extinguished either from a lack of moisture, and then it dries up, or from an excess, and then it is choked; so also natural life, which is founded on the warm and the moist, can fail from an abundance of moisture or from a deficiency. Similarly, tribulations sometimes withdraw the moisture of present consolation, and then one is rendered unstable and withers; sometimes they increase, and then it is choked; therefore the seed is without fruit; hence he says, and it becomes unfruitful. Romans 6:21: what fruit therefore had you then in those things of which you are now ashamed? And there follows, but now being made servants of God, you have your fruit unto sanctification; Ephesians 5:9: for the fruit of the light is in all goodness and justice and truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
