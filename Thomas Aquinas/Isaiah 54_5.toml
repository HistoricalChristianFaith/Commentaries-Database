[[commentary]]
quote='''
981. Second, he promises the restoration of their former honor.

And first, he sets out restoration as to dominion: for he that made you shall rule over you, above: O Lord, other lords besides you have had dominion over us (Isa 26:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
