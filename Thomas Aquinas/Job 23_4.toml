[[commentary]]
quote='''
He who has been burdened by a judge generally demonstrates the justice of his cause to him when he comes into his presence. So he says, "I will put judgment before him," as if to say: I will propose what ought to be the just judgment of my cause. "I will fill my mouth with rebukes," with loud complaints, but not because I believe that divine judgment is unjust, but only as someone making an inquiry.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
