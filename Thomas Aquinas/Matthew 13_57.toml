[[commentary]]
quote='''
But it should be noted that wonder sometimes has its proper effect, namely, the glorification of God, as above at 3:5, but sometimes it has the effect of scandal: hence he says, and they were scandalized in him. But what is the reason that wonder sometimes brings forth glory, sometimes scandal? The reason is that some interpret what they hear in a worse sense, and therefore such persons are necessarily scandalized. In the Epistle of Jude, 10: whatever things they do not know, they blaspheme. But some who are well disposed always interpret in a better sense. Of the first kind were these; therefore he rebukes them; and first by word; secondly, by deed, when he says: but Jesus said to them: a prophet is not without honor except in his own country. The Lord calls himself a prophet: and no wonder, because Moses also called him a prophet, Deut 18:15: the Lord your God will raise up for you a prophet of your nation and of your brethren, etc. And it can be said that a prophet is one who says something that is above human understanding through revelation; and thus Jesus is called a prophet, because his mind was illuminated by the angels and by God. Or one can be called a prophet from the word meaning "from afar," and phanos, which means illumination: and thus Jesus cannot be called a prophet: if there be among you a prophet of the Lord, I will appear to him in a vision, etc. So the text has it. But if there be a prophet, let him speak in riddles: thus Christ was not a prophet, because he said what he truly knew; Sir 34:9: he who has learned many things will declare understanding. Among the prophets of the Old Testament we do not find any who was honored by his own people, but rather by strangers, as we read of Jeremiah, who was captured by his own, but when the city was taken, was freed by strangers: so also was it with Christ, who was honored by strangers and despised by his own. And what is the reason why no one is honored in his own country? One reason is that when he is in his own country, many who know his weaknesses always bring his weaknesses to mind: for this comes from the malice of men, that they think more of weaknesses than of perfections. Another can be assigned, because the Philosopher says that the populace is often led astray in reasoning, because they believe that those who are equal in some respect are equal in all respects. Hence when someone is in his own country, since they see him equal to themselves in some respect, whether in family or in other things, they believe that he cannot be greater; therefore he rightly says a prophet is not without honor except in his own country and in his own house.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
