[[commentary]]
quote='''
"Pilate therefore saith to them: What shall I do then with Jesus who is called Christ?" Here he appeals to his dignity: "what shall I do with Jesus?", as if to say: it will be injurious to you if you kill him who is called Christ. But they could not be deterred: rather, they all say "let him be crucified": for this was the most shameful death. Therefore what is said at Wisdom 2:20 is fulfilled: "let us condemn him to a most shameful death"; Isaiah 3:8: "their tongue and their devices are against the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
