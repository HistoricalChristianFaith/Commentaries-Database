[[commentary]]
quote='''
Then shall the just answer, saying. Here is set forth a mental response. It belongs to good minds to consider what they do for God's sake as small; Luke 17:10: when you shall have done all these things that are commanded you, say: we are unprofitable servants. And Romans 8:18: I reckon that the sufferings of this time are not worthy to be compared with the glory to come that shall be revealed in us. Hence they will say that they did it unknowingly, and they will say this considering it a small thing; hence, when did we see thee hungry and fed thee? etc. Hence they will say this in wonder.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
