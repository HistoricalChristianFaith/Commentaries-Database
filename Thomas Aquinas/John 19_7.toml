[[commentary]]
quote='''
2386 But the Jews repeat Christ's offense: We have a law.... They seemed to understand from Pilate's response that he would not go against Christ because of a charge of claiming a kingdom, although they had thought he would be especially inclined by this to kill him. And since this crime was not enough to put Christ to death, the Jews thought that when Pilate said, Take him yourselves and crucify him, he was asking if they had another crime, a violation of the law, for which he could be condemned and for which they were condemning him. Thus they say, by that law he ought to die. First, they charge Christ with a crime against the law of the Jews; secondly, against the law of the Romans (v 12). In regard to the first, we see the accusation of the Jews against Christ; secondly, the effect of this on Pilate, he was the more afraid.

2387 The crime against the Jewish law that they charged Christ with was that he has made himself the Son of God, and for this he deserved death: "This was why the Jews sought all the more to kill him, because he not only broke the sabbath, but also called God his Father, making himself equal with God" (5:18); and again, "We stone you for no good work but for blasphemy; because you, being a man, make yourself God" (10:33). They always said that "he made himself the Son of God," assuming he was not. But this was not against the law, as Christ proved to them before (10:34), by citing the Psalm (82:6): "I say, You are gods." For if other people, who are adopted children, can call themselves children of God without blasphemy, how much more can Christ do this, who is the Son of God by nature. But they regarded him as a liar and blasphemer, each of which deserved death, because they did not understand his eternal generation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F19.htm'
source_title='Commentary on John'
