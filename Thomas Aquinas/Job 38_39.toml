[[commentary]]
quote='''
Then he goes on to another property of the animals which is directed to the acquisition of food. There is something wonderful about this subject in the lioness. For when the lion needs a lot of food, it seems marvelous how she can capture in one region so much from the prey of animals what is sufficient for herself and her cubs, and so he says, "will you take the prey of the lioness for her cubs," i.e. will you prepare such a great abundance of prey for her that she will have enough for herself and her cubs, and so he says, "and will you fill the soul of her cubs?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
