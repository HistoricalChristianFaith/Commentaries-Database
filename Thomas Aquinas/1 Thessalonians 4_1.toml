[[commentary]]
quote='''
Earlier, the Apostle Paul commended the faithful for their loyalty in the face of trials and for other good practices; here Paul cautions them to act well in the future. First, Paul presents a general warning; secondly, Paul makes it more specific (4:3). In regard to the first point, Paul does two things. First he presents what he is intent upon; secondly, he indicates a reason for the warning (4:1b). So Paul says: I heard about your good practices of the past, but in the future we will continue to exhort you. So Paul prevails upon them, first, on his own behalf when he remarks, we beseech you, "Pray for the peace of Jerusalem" (Ps. 122:6). In addition, Paul prevails upon them on behalf of Christ, and so he says, and we exhort you in the Lord Jesus. And he exhorts them, because they are holy: "Do not rebuke an older man but exhort him as you would a father" (1 Tim. 5:1).

But what does Paul ask? That as you learned from us how you ought to live and to please God, just as you are doing, you do so more and more. The Apostle had taught them how they should conduct themselves in the practice of common justice, which is by keeping the precepts; that is why he says: you learned from us how you ought to live. "I will run in the way of thy commandments" (Ps. 119:32). Paul had also taught them how they might be pleasing to God in the practice of the counsels: "There was one who pleased God and was loved by him" (Wis. 4:10); or how you ought to live, that is, by virtuous actions. "Walk while you have the light" (Jn. 12:35); and to please God through the forming of good intentions. Just as you are doing, that is, that they might remain steadfast in the original teaching, without falling away from it: "But even if we, or an angel from heaven, should preach to you a gospel contrary to that which we preached to you, let him be accursed" (Gal. 1:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
