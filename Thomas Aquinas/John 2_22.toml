[[commentary]]
quote='''
The time when the apostles acquired this true understanding is then shown by the Evangelist when he says, When, therefore, he had risen from the dead, his disciples recalled that he had said this. Prior to the resurrection it was difficult to understand this. First, because this statement asserted that the true divinity was in the body of Christ; otherwise it could not be called a temple. And to understand this at that time was above human ability. Secondly, because in this statement mention is made of the passion and resurrection, when he says, I will raise it up again; and this is something none of the disciples had heard mentioned before. Consequently, when Christ spoke of his resurrection and passion to the apostles, Peter was scandalized when he heard it, saying, "God forbid, Lord" (Mt 16:22). But after the resurrection, when they now clearly understood that Christ was God, through what he had shown in regard to his passion and resurrection, and when they had learned of the mystery of his resurrection, his disciples recalled that he had said this of his body, and they then believed the Scriptures, i.e., the prophets: "He will revive us after two days; on the third day he will raise us up" (Hos 6:3), and "Jonah was in the belly of the fish three days and three nights" (Jon 2:1). So it is that on the very day of the resurrection he opened their understanding so that they might understand the Scriptures and the statement Jesus had made, namely, Destroy this temple, and in three days I will raise it up again.

In the anagogical sense, according to Origen, we understand by this that in the final resurrection of nature we will be disciples of Christ, when in the great resurrection the entire body of Jesus, that is, his Church, will be made certain of the things we now hold through faith in a dark manner. Then we shall receive the fulfillment of faith, seeing in actual fact what we now observe through a mirror.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
