[[commentary]]
quote='''
After he has shown the small value of the temporal goods which the evil possess without the hope of the just which the saints have, he shows as a consequence that the temporal goods which the impious sometimes possess are fragile. Before asserting what he is about to say, he begins with two things. First, what he will say accords with divine wisdom, and so he says, "I will teach you by the hand of God," by his strength, "what the Almighty has," fixed in his wisdom, "and I will not conceal it," what I learned when God instructed me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
