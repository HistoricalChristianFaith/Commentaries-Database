[[commentary]]
quote='''
He shows the consequence of his prayer for pardon when he says, "If I appeal to him and he hears my call, I do believe that he would hear my words." For God sometimes does not hear someone's prayer according to what he wishes, but according to what actually succeeds. Just like a doctor does not heal the plea of the sick man who asks him to take the bitter medicine away, (if the doctor does not remove the remedy he knows to be health inducing, he nevertheless hears the actual advantage of the plea of the patient because he induces the health, which the sick person greatly desires), God does not take away trials from a man set down in the midst of trial, although he prays for mercy, because he knows that trials are useful to final salvation. Thus, although God truly heeds him, nevertheless the man who set down in the midst of miseries does not believe that he is heard.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
