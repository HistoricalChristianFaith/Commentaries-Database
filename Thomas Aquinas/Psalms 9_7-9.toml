[[commentary]]
quote='''
"And the Lord endures forever." Here he sets forth the authority of the doer; and he touches upon six conditions regarding the judgment of God. First, that it is not momentary but eternal. The rule of others is brief in life; therefore the Psalmist says, "The Lord endures forever." Jerome: "The Lord sits as if for judgment." He also says that it is always ready; the judgment of others is not so; hence he says, "He has prepared his throne in judgment," that is, he has it ready. Is. 3: "The Lord stands to judge, he stands to judge the peoples." He also says that it is universal; hence he says, "He shall judge the whole world," and not the Jews alone. Gen. 18: "Far be it from you, Lord, to destroy the just with the wicked." Also, that it is just; hence he says, "in equity, he shall judge the peoples in justice." He says two things: namely equity and justice, because justice involves the execution of things that are just in themselves, which are not just in every case; because rules and measures concern contingent matters, and they cannot be adapted to every particular case, but in some cases they are set aside, just as there are certain rules, measures, and conclusions that in a particular case are not observed on account of something. But the application of these universal principles to particular facts pertains to equity. Jerome says, "He shall judge the peoples in equity," because equity pertains to particular cases, and in a certain way restricts and regulates justice. He also says that it is full of mercy. This is commended from the person to whom mercy is shown, for example, if you do it for the needy: Lk. 14: "When you make a dinner or a supper, do not call your friends, or your kinsmen, or your rich neighbors," etc. Job 30: "I wept for him who was afflicted, and my soul had compassion on the poor." And therefore he says, "The Lord has become a refuge for the poor," namely the oppressed. Is. 1: "Help the oppressed, judge for the orphan, defend the widow." Ps. 81: "Judge for the needy and the orphan, and do justice to the humble and the poor"; and this is true where they have justice. Lev. 19: "You shall not judge unjustly; do not consider the person of the poor, nor honor the countenance of the mighty." Also from the time, because it is at the time when they need it that his mercy is received: Sir. 35: "The mercy of God is beautiful in the time of tribulation, like rain clouds in a time of drought." And therefore he says, "a helper in tribulation"; and he adds "in due times," because in the time of tribulation people turn to God, and then it is time to preach to them. And these things can be explained of Christ. "The Lord endures forever," because "Jesus Christ yesterday and today," Heb. 13. "He has prepared judgment," because he sits on his throne judging, "and he himself shall judge the world in equity." Is. 59: "He put on justice as a breastplate, and a helmet of salvation upon his head."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
