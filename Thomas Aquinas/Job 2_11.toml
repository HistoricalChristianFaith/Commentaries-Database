[[commentary]]
quote='''
The devil not only strove to exasperate the mind of blessed Job through his wife, but also through his friends, who although they came to console him, yet went so far as words of rebuke. About this, the text says, "Now when Job's three friends heard of all the evil which had come upon him, they came, each from his own place: Eliphaz the Temanite, Bildad the Shuite, and Sophar the Naamathite." Because nearly the whole debate of this book occurs between these men, we must consider that these three were of the same opinion as Job in some respect and so they were called friends. In another respect they differed from him and were in agreement among themselves, and so they are numbered together with each other and are distinguished from Job. For indeed they agreed with Job that not only natural things but also human affairs were subject to divine providence, but they differed from him because they thought that man is rewarded for the good which he did with temporal prosperity by God and is punished for the evil which he does with temporal adversity by God, as though temporal goods are the rewards for virtues and temporal evils are the proper punishments of sins. Each one of these men strives to defend this opinion in his own way, as his own character suggested to him, because of this they are said to have come each from his own place. Now Job was not of this opinion, but he believed that the good works of men are ordered to a future spiritual reward after this life, and likewise sins should be punished with future punishments.

The next verse expresses the fact that these friends just mentioned came to console Job saying, "They agreed to come to visit him together and console him." In this they showed themselves to be true friends in not deserting him in a time of tribulation, for Sirach says, "A man's friend is recognized in sorrow and evil." (12:9) At first the visit itself was certainly consoling, for to see a friend and to associate with him is most delightful. They also console him by their actions, showing him signs of their compassion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
