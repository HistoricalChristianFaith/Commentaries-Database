[[commentary]]
quote='''
To refute the preceding words of Job which Eliud interpreted as having been spoken contentiously, Eliud shows that God does not necessarily have to answer every single word posed to him by man, but he speaks sufficiently to each one for his instruction, and so he then says, "God speaks once," sufficiently for the instruction of man. So then he does not have to answer each of the man's questions in turn, and therefore he says, "and he does not repeat the same thing a second time," since to repeat what he did sufficiently would be superfluous. He shows how God speaks to man then saying, "in a dream, in a vision of the night." There can also be another meaning, so that when he says, "God speaks only once," to man, it refers to the instruction of the mind which is by the light of natural reason, as Psalm Four, "Many say: 'Who shows good things to us?'" and as if to respond: "The light of your face shines upon us, O Lord." (vv. 6 and 7), in this light one discerns good from evil. Since natural reason remains unchangeable in men, and as a result it is not necessary to renew it, he therefore says, "and he does not repeat the same thing a second time."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
