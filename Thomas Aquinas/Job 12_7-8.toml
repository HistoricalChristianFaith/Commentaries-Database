[[commentary]]
quote='''
He proves this as a consequence when he continues, "Ask the beasts and they will teach you, the birds of the air will be your counselors; Speak to the earth and it will answer you, the fish of the sea will make it known to you." Man asks creatures when he diligently considers them. But they respond to the questioner when in considering them, he perceives that there is such a great order found in their disposition of parts and in the order of their actions that they could exist only governed by the disposition of some superior wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
