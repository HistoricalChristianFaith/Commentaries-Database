[[commentary]]
quote='''
Among other reproaches Baldath seems to have blamed him for ignorance, when he had said, "Understand first and then we will speak." (18:2) The friends certainly should have tolerated this ignorance. He should been excused because of it, but he should not have been reproached with it especially in a time of adversity, and so he then says, "If without doubt I have erred, my ignorance will be with me," as if he should say: Nothing burdens you, but only me, and so it does not befit you to reproach me for ignorance in the midst of adversity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
