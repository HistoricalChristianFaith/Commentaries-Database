[[commentary]]
quote='''
In the foregoing Baldath had premised the punishments of sinners found in exterior adversities, but here he begins to pursue the punishments pertaining to the persons. One must note that sins themselves implicate the sinner in exterior adversities, and so he pursued exterior adversities as though predicting them with some certitude. But corporeal punishments do not seem to be directly caused by the sins themselves except perhaps some especially gluttony and lust in which someone sins in his own body, therefore he does not pursue corporeal punishments by denouncing him but more in threatening him. He begins with the corporal punishments which precede death, and because nourishment preserves the life of the body, he first invokes the removal of nourishment from him, by which man first begins to be weakened. Regarding this he says, "His strength will be robbed by hunger." Then when he lacks nourishment, his life is also taken away, and regarding this he says, "and let fasting invade his ribs," by which he means the weakening of the vital operations, the principle one of which is the heart which is contained under the ribs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
