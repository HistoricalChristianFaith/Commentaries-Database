[[commentary]]
quote='''
Philip, the mouth of the lamp; such a one should be a preacher: "Your word is well tried with fire" (Ps 119:140). Bartholomew, the son of him who curbs the waters. This is what Christ is called: "He binds up the waters in thick clouds" (Jb 26:8). Then James, the son of Zebedee, who was killed by Herod, who is called the supplanter. And John, who is called grace: "By the grace of God I am what I am" (1 Cor 15:10). He does not follow the order of rank as Mark does. Then Thomas and Matthew. The others do not say, "tax collector," but he mentions it out of humility. Again, the others place Matthew before Thomas; but he does the opposite. Thomas means abyss, on account of the depth of faith. Matthew means forgiving, as in Ephesians (4:32): "Forgiving one another, as Christ forgave you." James the son of Alpheus, to distinguish him from the other. He is called a brother of the Lord, because he was a cousin. Thaddeus, the brother of James. He is called Jude, who wrote an epistle, and means heart: "Keep your heart with all vigilance" (Pr 4:23).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
