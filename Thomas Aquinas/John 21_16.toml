[[commentary]]
quote='''
Now we have the second examination. In order to avoid a lot of repetition, note that Christ says three times, Feed my lambs, because Peter ought to feed them three ways. First, they are to be fed by being taught: "And I will give you shepherds after my own heart, who will feed you with knowledge and understanding" (Jer 3:15). Secondly, they are to be fed by example: "Set the believers an example in speech and conduct, in love, in faith, in purity" (1 Tim 4:12); "Upon the mountain heights of Israel," that is, in the excellence of great men, "shall be their pasture" (Ez 34:14). Thirdly, they are to be fed by being offered temporal help: "Woe, shepherds of Israel who have been feeding yourselves! Should not shepherds feed the sheep?" (Ez 34:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F21.htm'
source_title='Commentary on John'
