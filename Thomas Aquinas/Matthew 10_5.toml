[[commentary]]
quote='''
These twelve Jesus chose and appointed propagators of Sacred Scripture, charging them... Here he mentions their instruction: first, he instructs them by word; secondly, by deed (c. 11). By word on three matters: first, on their office; secondly, on money for expenses (v. 9); thirdly, on the dangers (v. 16). In regard to their office he commands four things: first, where to go; secondly, what to say (v. 7); thirdly, what to do (v. 8); fourthly, for what purpose (v. 8b). First, he tells where they should not go, secondly, where they should go (v. 6). In regard to the first he says two things: first, Go nowhere among the gentiles, and enter no town of the Samaritans. The latter were midway between the gentiles and the Jews and were mentioned in 2 Kings (24 ff). They followed the Jewish rite in part and in part the rite of the gentiles. They were quite contrary to the Jews; hence he forbade them to go to those strictly gentile and those partly gentile. But this seems opposed to what he said below (28:19): "Go, teach all nations," and to Isaiah (40:5): "And all flesh shall see together that the mouth of the Lord has spoken." The answer is that they were sent to both; but due order had to be observed, because first to the Jews. And one reason is that the first thing to be done is what justice demands rather than what arises from mercy; but justice required that they preach first to the Jews, because they had the promises: "I tell you that Christ became a servant to the circumcised to confirm the promises given to the patriarchs" (Rom 15:8). But they were bound to the gentiles out of mercy, for it says in Romans (11:17) that the gentiles were wild shoots received into the olive tree, namely, by the faith of the patriarchs: "You, a wild olive shoot, were grafted in their place to share the root and richness of the olive tree." Furthermore, in his desire to introduce believers to the faith of the fathers, he commanded that the faith be preached first to the Jews.

The second reason is that the Lord infused into everyone whatever they were disposed for; but many of the Jews were already disposed by faith. And just as fire first kindles things near it, so the Lord out of charity desired the welfare of those who were near. Hence it says in Isaiah (57:19): "Peace to the far and peace to the near, says the Lord." Furthermore, if he had gone first to the gentiles, the Jews, who very much hated the gentiles, would have rejected him out of indignation; therefore, in Acts (13:46): "It was necessary for the kingdom of God to be preached to you first." Hence he says, Go nowhere among the gentiles, i.e., do not go near the roads that lead to the gentiles, lest they talk about you. But he does not say, "the roads of the Samaritans." Mystically: God's disciples should not go anywhere among the gentiles or the heretics; hence Jeremiah (2:18): "What do you gain by going to Egypt to drink muddy waters?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
