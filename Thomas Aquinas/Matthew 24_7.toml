[[commentary]]
quote='''
But someone might say: you say that we will hear of wars, but there have always been wars. He responds: you have never seen such things. For nation shall rise against nation, namely, the Roman nation against the Jewish nation, and kingdom, namely, the Roman kingdom against the Jewish kingdom. And there shall be pestilences, etc. Someone might say: these wars happen by chance and not from God's vengeance. But that they come from God's vengeance is evident, because not only will these evils be inflicted by men, but by God, because there shall be pestilences, which come from the corruption of the air, and famines, and earthquakes in places. And all these things happened before the destruction of Jerusalem.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
