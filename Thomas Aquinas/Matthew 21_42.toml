[[commentary]]
quote='''
"Jesus saith to them." Here the confirmation is presented. And first the authority; secondly, the exposition. He says "have you never read in the Scriptures" (this is read in Ps 117:22): "the stone which the builders rejected, the same is become the head of the corner?" And he presents four things. First, the rejection; secondly, the dignity; thirdly, the cause; fourthly, the wonder. He says "the stone" etc. The stone is Christ, who is called a stone from many likenesses. Isa 28:16: "Behold I will lay in the foundations of Sion a cornerstone" etc. The builders are the apostles. "Let each one see how he builds." Hence that stone which they rejected, i.e., cast out, "the same is become," i.e., was established, "the head of the corner," i.e., the head of Jews and Gentiles. Hence he was made the head of the Church. But they could say: he made himself the head; therefore he says "by the Lord this has been done." Ps 117:16: "The right hand of the Lord hath wrought strength" etc. And what is this exaltation like? "And it is wonderful in our eyes;" Hab 1:5: "Behold among the nations, and see: wonder, and be astonished: for a work is done in your days, which no man will believe, when it shall be told." For so great was the dignity, that it would not have been done, had not the grace of God accomplished it. Eph 2:8: "For by grace you are saved through Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
