[[commentary]]
quote='''
The second affliction he suffered concerned the failings of his subjects, and this he does in two ways, namely for spiritual failings; hence he says, Who is weak, namely, in faith and in goodness, and I am not weak? In heart, grieving over them as though over myself? "To the weak I became weak, that I might win the weak" (1 Cor. 9:22); "O that my head were waters, and my eyes a fountain of tears, that I might weep day and night for the slain of the daughter of my people!" (Jer. 9:1). And for bodily failings; hence he says, Who is made to fall with the evil of punishment, i.e., who suffers afflictions, and I am not indignant with the fire of compassion? This is the fire which the Lord came to cast upon the earth (Lk. 12:49).

And notice that he fittingly uses the word, "on fire", because compassion proceeds from the love of God and neighbor, which is a consuming fire, because it moves one to alleviate the misfortunes of one's neighbor, and it cleanses the soul with the compassion it engenders. Furthermore, our sins are loosed, while the charity of that compassion covers a multitude of sins. For a person sometimes falls into sin of himself, and then he is weakened; sometimes by the example of others, and then he is scandalized: "Woe to the man by whom the temptation comes!" (Matt. 18:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
