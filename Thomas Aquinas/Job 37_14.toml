[[commentary]]
quote='''
After Eliud told the many marvels of divine works he now attacks Job who seemed to accuse God of injustice when he could not yet understand his works, and so he says, "For listen, Job," to what I am saying about the grandeur of divine works. "Stand" in rectitude of mind, "and consider," by your own self, "the wonderful things of God," which are shown in his works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
