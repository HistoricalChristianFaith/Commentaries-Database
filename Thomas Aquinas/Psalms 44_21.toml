[[commentary]]
quote='''
And if we have done these things, the judgment of God will seek it out. And the judgment of God is sufficient for seeking this out; hence he says, "Shall not God search out these things?" As if to say: indeed he will, because he knows all things. Hence it follows, "For he knows the hidden things of the heart." Jer. 17: "The heart of man is perverse and unsearchable, and who shall know it?" As if to say: God alone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
