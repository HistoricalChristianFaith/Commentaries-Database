[[commentary]]
quote='''
In the preceding Psalm the prophet exhorted others to give thanks; here he himself gives thanks. The title is "A Psalm of a canticle, at the dedication of the house of David." As was said above, Psalms of canticles are so called because first a canticle was sung, and afterward followed the Psalm: as it were, a Psalm following a canticle. But we read that David did not dedicate a house to God, because he was forbidden by Nathan from the Lord, 2 Kgs. 7. But here it does not say "the house of the Lord," but "of David." We read in 2 Kgs. 5 that after the death of Saul he took Jerusalem, and there built his house. And it is customary that when someone enters a house, he holds a celebration. And it could be said that this Psalm was then sung by David himself, when he first entered that new house to dwell there. Yet it is better understood as referring to the mystery of the house of David, that is, of Christ, who is the head and the body of the Church. And this same house is called a tabernacle. Above it said "for the completion of the tabernacle"; here, however, "at the dedication of the house." A tabernacle belongs to those who are on campaign: and so the present Church is called a tabernacle. Rev. 21: "Behold the tabernacle of God with men," etc. A house belongs to those who are at rest: so the Church awaits the rest of the fatherland: Ps. 121: "We shall go into the house of the Lord." Both of these have a construction, which was in the ordaining of his incarnation: and a dedication, which was in the resurrection, when the body of Christ was clothed with the glory of immortality. Upon the body of Christ the building continues; and through the conversion of the faithful it will be dedicated when it shall be in glory. This Psalm is divided into two parts. In the first he commemorates in general the benefits for which he gives thanks. In the second, in particular, at "But I said." Concerning the first he does two things. First he gives thanks for his own benefits. Second he invites others to give thanks for the common benefits, at "Sing to the Lord, you his saints." Concerning the first he does three things. First he sets forth his thanksgiving. Second he commemorates the benefits, at "Because you have taken me up." Third he explains, at "O Lord my God." He says therefore: "O Lord, I will exalt you," not by making you higher, but by confessing and praising your height: Sir. 43: "Blessing the Lord, exalt him as much as you can." And he assigns two benefits as reasons why he exalts: one on the part of God, and another on the part of the enemies: and the second is the effect of the first. On the part of God: "Because you have taken me up" into your protection, when he chose him and protected him, as is found in 1 Kgs. 16, to the end. Or God takes up the just when he unites them to himself, who through the union of charity cling to him. But he united Christ the man to himself by taking him up into a perfect unity: Ps. 3: "But you, O Lord, are my protector," etc. On the part of the enemies: "Because you have not let them rejoice." For it is not very hateful that enemies should rejoice over someone; because they do not rejoice except over his misfortune, and no one wishes evil except upon one whom he detests: Sir. 18: "If you yield to your soul its desires, it will make you a joy to your enemies." But it is certain that David did not become a joy to his enemies, because Saul did not achieve his purpose against him. But concerning Christ this does not seem to hold: Mt. 27: for they mocked him already crucified: "Ha! You who would destroy the temple of God," etc. Likewise, the wicked also mock just men and rejoice over them: Job 30: "Those younger than I deride me; now I am turned into their song and have become a proverb to them." But it must be said that if for an hour the Jews rejoiced over Christ, they did not do so finally: because when Christ rose, his name prevailed all the more: Mic. 7: "Do not rejoice over me, O my enemy, because I have fallen; I shall rise again."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
