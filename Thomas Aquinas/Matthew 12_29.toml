[[commentary]]
quote='''
Or how can one enter a strong man's house? Here is presented the third reason through which the Lord intends to refute the contentions of the Pharisees, and it is an argument taken from things that occur among men. For when someone is well defended in his own home, he cannot be ejected from it or his vessels plundered, unless a stronger man overcomes him. But Christ plunders the devil's vessels by casting him out from men in whom he exists as in his own property. Therefore Christ is stronger than he. And this reason he presents in those words. Strong man. This is the devil, who is called strong on account of his power: "No power can be compared to his" (Jb 41:24). And he is made stronger through consent, because one who consents gives him power over himself: "Every man will fight against his brother, city against city, and I will give over the Egyptians into the hand of cruel masters" (Is 41:24). The house is the world or the assemblage of sinners, not because he created the world, but because it obeys him by consenting; hence in John (12:31) he is called "the prince of this world." His vessels are men. Vessel is taken in two senses. A vessel of something is that which is filled with it, as a vessel of oil, because it is full of oil, or a vessel of water, because it is full of water; in this way some are vessels of the devil, because they are filled with the devil, either in regard to the body, as those obsessed by the devil; but in regard to the soul those whose hearts are in full accord with the devil's will, as is said of Judas. Sometimes vessels are any instruments destined for any purpose whatever; hence whoever affords the occasion of sin to others is called the devil's vessel. But no matter the sense in which it is taken, Christ destroyed the devil's vessels: "I disarmed the principalities and powers, and made a public example of them, triumphing over them in him" (Col 2:15). But this is not enough, unless he first binds the strong man. What is this binding? It occurs when the power to injure, which he has of himself, is restricted by God. Hence by the power of his own nature he can do many things, but by the power of God it is restricted, as a bound person is prevented from doing what he wants. Hence Psalm 149 (v. 8): "To bind their kings with fetters." Then indeed he may plunder his house, because when the devil is bound, the men he bound will be freed. "Even the captives of the mighty shall be taken, and the prey of the tyrant be rescued" (Is 49:25).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
