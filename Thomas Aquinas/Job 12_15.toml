[[commentary]]
quote='''
Then he shows how men can experience divine power in natural things, especially in rains and droughts. So he says, "If he will withhold the rain," so that it does not fall, "everything will dry up," which grows on the earth. "If he will send the rain," in great abundance, "it will cover the earth," as in floods. Although from some natural causes the rains sometimes cease to the point of a complete drought and sometimes are so heavy they flood the earth, this still does not detract from divine power which has ordered even natural causes themselves to their proper effects.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
