[[commentary]]
quote='''
First he shows this as to the most elevated creatures under which all things are contained, and so he then says, "He sees the ends of the earth," which are the most excellent creatures in which the order of creatures terminates in ascending from lower creatures, and these are heavenly bodies and the heavenly spirits. Then he shows this as to the other creatures contained under them, like the elements, and so he then says, "and he sees everything which is under the heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
