[[commentary]]
quote='''
817. Behold my servant. Here he shows divine love from the Son, whom he promised: God so loved the world, as to give his only begotten Son (John 3:16).

And first, from such a benefit, he shows the love of God;

second, the perversity of the Jews: these things have I done to them (Isa 42:16).

Concerning the first, he does three things;

first, he foretells the coming of the Son of God;

second, the fall of the wicked: the Lord shall go forth as a mighty man (Isa 42:13);

third, the resurrection of the good: and I will lead the blind (Isa 42:16): behold this child is set for the fall and for the resurrection of many in Israel (Luke 2:34).

Concerning the first, he does three things:

first, he describes the condition of the one who is to be sent;

second, he foretells the sending: thus says the Lord God (Isa 42:5);

third, he invites to thanksgiving: sing to the Lord (Isa 42:10).

818. Concerning the first, he does three things.

First, he shows his fullness of grace as to the grace of union: I will uphold him; my servant, according to his human nature: he has upheld Israel his servant (Luke 1:54); as to the grace of the head: my elect, that he may be the head of the Church, chosen out of thousands (Song 5:10); blessed is he whom you have chosen and taken to you (Ps 64:5[65:4]); my soul delights in him: this is my beloved Son, in whom I am well pleased (Matt 17:5); as to the habitual grace, which was in him alone: I have given my spirit, above: the spirit of the Lord shall rest upon him (Isa 11:2).

819. Second, he shows the equity of his judgment as to three things: namely, the authority to judge, he shall bring forth judgment to the Gentiles: give to the king your judgment, O God (Ps 71:2[72:1]); the Father has given all judgment to the Son (John 5:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
