[[commentary]]
quote='''
Consequently, the progress of good and evil is treated. And when the blade was sprung up. And that you may understand, three things are considered. First, the manifestation of the good from the evil is set down; secondly, the zeal of the good against the evil; thirdly, tolerance. He says therefore, when the blade had sprung up and had brought forth fruit, then appeared the cockle also etc. For at the beginning, when it is sown, it does not appear, but when the blade grows. And this can be referred to both, both to the wheat and to the cockle. Augustine expounds it of the wheat, because when a man is small, he cannot discern; but when he grows and bears fruit and becomes spiritual, then he knows; 1 Corinthians 2:15: the spiritual man judges all things. Chrysostom expounds it of the cockle, because at first it does not appear, because heretics at first hide their teaching, because first they say and preach certain good things to the laity, and afterwards introduce certain evil things about the clergy, which are willingly heard; and so they turn the people away from love of the clergy, and so consequently from the Church. But afterwards, when they gain acceptance for their doctrine, they manifest their malice. For at first they say nothing but mild things, but afterwards they manifest themselves and their doctrine, which is understood by the wine; concerning which wine Proverbs 23:31 says: it goes in pleasantly, but in the end it will bite like a serpent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
