[[commentary]]
quote='''
He proves as a consequence that all men naturally share the same condition, and so he says, "Did he not make me in the womb who also made him?" He means: I have the same soul created by God as my servants. My body has been formed also by the same divine power, and so he continues, "and did not one God" namely, the God who formed him, "form me in the womb?" So it is clear that it matters to God how I treat the other.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
