[[commentary]]
quote='''
Then he discusses the fact that God can also speak and correct man through the sickness of the body. He first notes sensible pain here, and so he says, "He also chides," a man for past sins, "by pain," which is the corporeal pain which comes from sickness. So he says, "on his bed," according to the Psalm, "Upon his bed of pain." (Ps. 11:4) Second, he notes the weakness of the sick when he says, "and he makes all of his bones grow feeble," when he destroys the strength which consists in his bones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
