[[commentary]]
quote='''
And behold there was a man with a withered hand. This was the occasion for the questioning, for they asked him. It is said that he was a mason and had a withered hand. By him is signified the human race, whose hand was withered by original sin; or every sinner, whose hand and functioning powers have withered; and sometimes the right hand, because they are not capable of doing good, although they are strong in evil. He says, therefore, They asked him, "Is it lawful to heal on the Sabbath?" They saw a man with power; therefore they asked if it is lawful to cure on the Sabbath. And they asked this to test him: "He will test you through much talk" (Sir 13:9). They asked not with a desire to learn but to accuse: "They speak peace with their neighbors, while mischief is in their hearts" (Ps 28:3). But there is a question, because Mark (3:4) says that the Lord asked, but here that they asked. Augustine answers that both asked, because when he stood in the midst and asked to be healed, they asked; but when the Lord made him rise, he asked. Or another way: they were watching him and were preparing themselves to ask; then he asked, because he knew that they asked in order to accuse him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
