[[commentary]]
quote='''
There follows the punishment of sense: and shall cast them into the furnace of fire. This is explained as above. But there is a question why the Lord repeated this, because it seems to be the same as the parable of the weeds. It must be said that it is the same in a certain respect, because here by the net are understood both the good and the bad; hence it signifies those who have not been cut off from the Church. But by the weeds are signified those who have been cut off by a diversity of teachings, and these are not of the Church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
