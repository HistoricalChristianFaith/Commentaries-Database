[[commentary]]
quote='''
For now we live, if you stand fast in the Lord, as if saying: I value your condition so highly that I think it sustains me: "It is enough; Joseph my son is still alive" (Gen. 45:28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Thessalonians.html'
source_title='Commentary on 1 Thessalonians'
