[[commentary]]
quote='''
Likewise, he that is in the field, let him not go back, to his house, to take his coat, namely, whatever things are necessary, because all that a man has he will give for his life. And why does he say this? Because when the feast of Passover was approaching, many gathered in Jerusalem; knowing this, Titus besieged the city while they were thus assembled. Hence he means to say: this evil will come so quickly that no one will be able to protect himself.

Hilary explains: likewise, he that is in the field touches on the active life. Such persons should not return to their former way of life, but should remain in their purpose.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
