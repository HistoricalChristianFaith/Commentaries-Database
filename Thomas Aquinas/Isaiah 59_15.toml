[[commentary]]
quote='''
He that departed from evil, lay open to be a prey, for not only did they do wicked deeds, but they plundered those who would not: there is no mercy (Hos 4:1); let us lie in wait for the just, because he is contrary to our doings (Wis 2:12).

1046. And the Lord saw. Here he sets out the preparation of salvation on the part of the Savior. And first, he sets out the manner of preparation, speaking of God according to a human manner. He sets out his compassion: and the Lord saw, with the eye of mercy, there is no judgment, of anyone to save.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
