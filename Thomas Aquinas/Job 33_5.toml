[[commentary]]
quote='''
Lest he seem to have said this as a prejudice to discourage Job from answering one speaking from divine inspiration he says, "If you can, answer me," what I will say against you, "and hold your ground before my face," so that you also can raise objection against me if I say anything which displeases you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
