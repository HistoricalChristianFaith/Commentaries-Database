[[commentary]]
quote='''
Fourth, the glory of divine service: and he said to me: in you will I glory, through the wonders shown in you, I will appear glorious, above: every one that calls upon my name, I have created him for my glory (Isa 43:7).

897. According to others, of Cyrus, to whom it was declared that the people of Israel was the servant of God. Or of Christ, who is called "Israel," because he was born from the people of Israel according to the flesh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
