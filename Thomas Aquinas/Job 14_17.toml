[[commentary]]
quote='''
Second, divine providence is attentive to human acts in that he preserves the good and wicked deeds of men in his memory to repay them with good or evil, and so he continues, "You have sealed my faults in a sack." For what one seals in a sack is carefully kept. Lest anyone say this sealing excludes divine mercy he then says, "But you cured my iniquity," as if to say: You lay up punishments for sins in such a way that you nevertheless cure my faults by penance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
