[[commentary]]
quote='''
I have heard your prayer, above: at the voice of your cry (Isa 30:19).

Second, he sets out the promise: behold I will add: you will add days to the days of the king (Ps 61:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
