[[commentary]]
quote='''
But how they ought to act towards equals he shows when he says, "Bear ye one another's burdens". Here he admonishes them to support one another, saying, "Bear ye one another's burdens." And this is to be done in three ways. In one way by patiently enduring the bodily or spiritual defects of another: "We that are stronger ought to bear the infirmities of the weak" (Rom 15:1). In a second way by coming to one another's aid in their needs: "Communicating to the necessities of the saints" (Rom 12:13). In a third way by making satisfaction through prayers and works for the punishment one has incurred: "A brother that is helped by his brother is like a strong city" (Prov 18:19). Now the reason for this admonition is the fulfillment of the law of Christ. But this is charity: "The fulfillment of the law is love" (Rom 13:10). Hence he says: "and you shall fulfil the law of Christ", i.e., charity.

There are three reasons why charity is specifically linked with the law of Christ. First, because by it the New Law is distinguished from the Old; for the former is a law of fear, but the latter of love. Hence Augustine says: "Fear and love is the slight difference between the Old Law and the New." Secondly, because Christ expressly promulgated His law in terms of charity: "By this shall all men know that you are my disciples, if you have love one for another" (Jn 13:35); again: "A new commandment I give unto you: that you love one another, as I have loved you" (v. 34). Thirdly, because Christ fulfilled it and left us an example how to fulfill it; for he bore our sins out of charity: "Surely he hath borne our infirmities" (Is 53:4); "Who his own self bore our sins in his body upon the tree, that we, being dead to sins, should live to justice" (1 Pet 2:24); "He himself shall carry them that are with young" (Is 40:11). Thus, then, ought we to carry one another's burdens out of charity, that so we may fulfill the law of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Galatians.html'
source_title='Commentary on Galatians'
