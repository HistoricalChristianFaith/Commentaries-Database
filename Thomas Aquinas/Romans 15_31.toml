[[commentary]]
quote='''
Third, he mentions things he wishes to be obtained by him, the first of which pertains to the enemies he had in Judea; hence he says: that I may be delivered from the unbelievers that are in Judea, who particularly attacked and hated Paul, because he confidently preached the end of the legal observances: they have been told about you that you teach that Moses should be forsaken (Acts 21:21). The second pertains to those into whose ministry he went. And this is what he adds: and that my service, i.e., the alms I minister to them, may be acceptable to the saints who are in Jerusalem, i.e., that from this they may be induced to give thanks to God and to pray for the gentiles from whom they receive.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
