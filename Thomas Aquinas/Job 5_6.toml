[[commentary]]
quote='''
After he answers these objections, he finally adduces an argument to prove his principal proposition, namely that adversities in this world do not happen to someone except as a punishment for sin. His argument is this. Whatever happens on earth, happens from proper and determined causes. If therefore adversities happen to someone in this world, this must have a determined cause, which can only be sin. So he says, "Nothing on earth happens without cause," for we observe that all effects happen from a determined cause. From this fact, he concludes, "For affliction does not arise from the dust." This is a metaphor. For some plants are produced without seed. These are said to be produced by spontaneous generation from the soil itself. Anything which does not appear to have a proper cause, like a plant reproducing without seed is by a kind of likeness metaphorically said to arise from the soil. Affliction, i.e. adversity, does not arise from the soil, i.e. without cause.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
