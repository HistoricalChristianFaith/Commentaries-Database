[[commentary]]
quote='''
Since he had said that, "He eats grass like an ox," (v.10) he shows where he gets his grass to eat, and so he says, "The mountains yield grass for him." By this one understands that the proud and lofty men in this world offer the devil the material of his delight or eating. He shows how this is done saying, "All the beasts of the fields will play there." For just as the wild animals gather in the mountains for security and leisure, according to the literal sense, so under the protection of men in high places, men who rage like beasts rest secure. This is clearly shown in Daniel, "beneath the tree," which means the kingly dignity, "animals and beasts live." (4:9)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
