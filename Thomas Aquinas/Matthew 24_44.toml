[[commentary]]
quote='''
And you also be ready, because at the hour that you think not, the Son of man shall come. Chrysostom says that men who are anxious about temporal things watch at night. And if they watch for temporal things, how much more must one watch for spiritual things; Apocalypse 3:3: If you shall not watch, I will come to you as a thief.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
