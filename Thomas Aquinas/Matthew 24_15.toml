[[commentary]]
quote='''
Having already presented the destruction, in this part he sets forth the coming of the consummation; and he presents certain preliminaries. And first he sets forth the prophecy; secondly, the admonition, at then they that are in Judea, let them flee to the mountains; thirdly, the reason for the admonition, at for there shall be then great tribulation. So he said, the consummation shall come, when therefore you shall see the abomination of desolation, etc. What is it that he calls the abomination? It can be said that the abomination refers to the Roman army, and they are called abominations of desolation because they were desolators of the land. Or by abominations, idols: and this can be said of a twofold idol. It is recorded that Pilate introduced the eagle into the temple, which was the standard of the Romans, which the Jews called an abomination. Hence, when you shall see the idol placed in the holy place, then you can recognize the fulfillment of the prophecy of Daniel about the destruction of Jerusalem. Or it can be said that Jerusalem was destroyed twice. First by Titus and Vespasian, and then the temple was burned, and then some were still permitted to remain. Afterward some rebelled again, and then Hadrian, who succeeded Trajan, destroyed it utterly and gave a law that no Jew should henceforth dwell there, and he called the city by his own name; likewise he placed an idol in the sacred place. Hence, that idol which Hadrian placed can be called the abomination; hence, when you shall see this, etc. About this destruction, much is found in Lamentations 2. He that readeth, let him understand. And why does he say this? Because in that prophecy of Daniel many things are said about the Passion of Christ. For these are words to be carefully observed; hence it says there: Christ shall be slain, and there shall be in the temple the abomination of desolation, and unto the consummation and to the end the desolation shall continue. Hence he who sees, let him understand that such things have come to pass.

Hilary explains that these words are referred to the end of the world. When you shall see this abomination, he names the Antichrist. 2 Thessalonians 2:2: Be not terrified, neither by spirit nor by word, as if the day of the Lord were at hand; let no man deceive you by any means. Likewise, Origen says that just as the word of the gospel was spread abroad when Christ himself came, so false teaching will be spread abroad when the Antichrist comes; and just as Christ had his prophets, so also will the Antichrist.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
