[[commentary]]
quote='''
Above, our Lord checked the grumbling of the Jews over the origin of this spiritual food; here, he stops their dispute over the eating of this same food. First, we see their dispute; secondly, our Lord stops it (v 54); thirdly, the Evangelist mentions the place where all this happened (v 60).

As to the first, note that the Evangelist brings in the dispute among the Jews in the form of a conclusion, saying, The Jews therefore disputed among themselves. And this is fitting: for according to Augustine, our Lord had just spoken to them about the food of unity, which makes into one those who are nourished on it, according to, "Let those who are just feast and rejoice before God," and then it continues, according to one reading, "God makes those who agree to live in one house" (Ps 67:4). And so, because the Jews had not eaten the food of harmony, they argued with each other: "When you fast, you argue and fight" (Is 58:4). Further, their quarreling with others shows that they were carnal: "For while you are envious and quarreling, are you not carnal?" (1 Cor 3:3). Therefore, they understood these words of our Lord in a carnal way, i.e., as meaning that our Lord's flesh would be eaten as material food. Thus they say, How can this man give us his flesh to eat? As if to say: This is impossible. Here they were speaking against God just as their fathers did: "We are sick of this useless food" (Nm 21:5).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
