[[commentary]]
quote='''
For if he can lay the mountains low, if he can cut through rocks and exercise the same power over all the earth, he consequently can see the precious things which are hidden there although the eye of man cannot see them. His eye not only sees those things which lie hidden in the earth, but "he also searches fully the depths of rivers," i.e., he knows what lies hidden in the depths of rivers so perfectly he seems to carefully inspect them, and the sign of this is that, "he has brought hidden things to light," to reveal them to men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
