[[commentary]]
quote='''
Then shall they deliver you up to be afflicted. Then he sets forth certain things that were to come in the Church. In the Church there were to be both prosperous things and adverse. And first he sets forth the adverse; secondly, the prosperous, at and this gospel of the kingdom shall be preached in the whole world. He announces the adverse in two ways: from those outside and from those inside. Deuteronomy 32:25: Without, the sword shall lay them waste, and within, terror. And he touches on three dangers: tribulation, killing, and hatred. They might say: it is true that the world will suffer these things, but what does that have to do with us? On the contrary, he says. And therefore he says, you; as if to say, you will not be immune, but you will be afflicted, literally; 2 Corinthians 6:4: In tribulations, in necessities, etc. Likewise, they shall put you to death, as was evident when they killed Stephen and James; hence Psalm 43:22 says: We are counted as sheep for the slaughter. Likewise, you shall be hated by all nations, i.e., by the Jews. Or by all, who were spread throughout the whole world; above, 5:10: Blessed are they that suffer persecution for justice' sake. And he gives a consolation, because though all suffer, you will suffer these things for my name's sake. Jeremiah 45:4: Behold, those whom I have built, I destroy, and after: and do you seek great things for yourself? Origen says that this should be referred to the second coming, because there will be such a universal persecution that all the wicked will persecute the good; and on account of this he says then. For it was customary that when evils occurred, they would say it was on account of the sin of the Christians. Hence they rose up against them; hence, then shall they deliver you up to be afflicted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
