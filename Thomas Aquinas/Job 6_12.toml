[[commentary]]
quote='''
To explain this he says, "My strength is not the strength of a stone." For a stone experiences strength without experiencing feeling, but a man experiences strength along with the emotional experience of harmful things. So he continues, "nor is my flesh bronze", i.e. without feeling because however strong the reason of a mortal man may be, he still must experience the feeling of pain on the part of the flesh. By this he refutes the attempted rebuke of Eliphaz who censured the very existence of sadness in Blessed Job. For although Blessed Job had strength of mind, still he would have had the sensation of pain on the part of the flesh, which causes sadness. At the same time he refutes the opinion of the Stoics in this who said that the wise man is not sad. Eliphaz seems to have shared their opinion. Blessed Job intends to defend the fact that the wise man is truly sad but is zealous through reason not to be led to do anything unfitting. This is what the Peripatetics taught.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
