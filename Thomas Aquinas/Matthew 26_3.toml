[[commentary]]
quote='''
Then were gathered together the chief priests etc. In this part is set forth the perverse counsel of the Pharisees. And first is set forth the counsel concerning Christ's passion; second, concerning the delay, at but they said: not on the festival day. Concerning the first, we can note that the sin of the Jews is aggravated by the time, because it was then, with the paschal feast approaching; Isaiah 58:13: if thou turn away thy foot from the sabbath, from doing thy own will in my holy day. But, as I believe, it does not refer to the immediately following day, but to around that time, because in John 11:13 we read that they gathered a council and from that day they thought to put him to death. And then it is said that Jesus withdrew into a region near the desert. Hence this was not done immediately. Or it can be said that it was done twice. Likewise, the sin is aggravated by the multitude; hence it is said: the chief priests and the ancients of the people were gathered together; Isaiah 1:14: my soul hateth your solemnities: for your hands are full of blood. Likewise, by the condition of the sinners, because they were among the leaders; hence it is said, the chief priests; Jeremiah 5:5: I will go to the great men and will speak to them; and after: and behold, these have together broken the yoke more, and burst the bonds. And Psalm 2:2: the kings of the earth stood up, and the princes met together, against the Lord and against his Christ. Likewise, by the place, because it was in the court of the high priest. Hence those who ought to have restrained others from wickedness were themselves doing it; Daniel 13:5: iniquity came out from the elders. But were there many chief priests? For the Lord had commanded that there should be only one high priest, but this was not sufficient for them. Hence out of greed they had divided the priesthood. Likewise, they had already lost it, and were buying the priesthood from the Romans. Or he calls chief priests those who had been chief priests before him, and the one who was the chief priest of that year.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
