[[commentary]]
quote='''
Then follows its greatness. And first its greatness is set forth; secondly it is confirmed, at but when it is grown, i.e., when it has sprouted, it is greater than all herbs, because the evangelical teaching bore more fruit than the teaching of the law, since the teaching of the law bore fruit only among the Jews; hence it was said in Ps 147:20: he has not done in like manner to every nation, and his judgments he has not made manifest to them. For there was no philosopher who could convert an entire country to his teaching: for if some philosopher, such as Plato, had said that such and such a one would come, he would not have been believed. Ps 118:85: the wicked have told me fables, but not as your law. It is greater, therefore, in solidity, in universality, and in usefulness. In solidity, and it becomes a tree, because other teachings are soft herbs, having nothing firm, because they are subject to human reason: Wis 9:14: for the thoughts of mortal men are fearful, and our counsels uncertain; but this is a firm tree; Ps 118:89: forever, O Lord, your word stands firm; Luke 21:33: heaven and earth shall pass away, but my words shall not pass away. Therefore as this tree is related to other trees, so this teaching is related to others. So that the birds of the air come and dwell in its branches. Likewise it excels in the universality of its teaching: because this science has many branches, and furnishes a man with what is necessary for life. Hence if there are married persons, they have through it how they ought to govern themselves; if clerics, how they should live, and so on for others: therefore the diverse teachings are diverse branches. Likewise it excels in usefulness, because the birds dwell in its branches, i.e., all who have their mind in heaven; Phil 3:20: our conversation is in heaven. They come and meditate and rest: for those who dwell on the earth are not birds; 2 Cor 4:18: while we look not at the things which are seen, but at the things which are not seen: for the things which are seen are temporal; but the things which are not seen are eternal. Chrysostom explains it of the apostles, whom he compared to the grain of mustard seed because they were fervent in spirit; and this a man sowed, i.e., Christ, in a field, i.e., in the Church, from which all the fruitfulness of the Church came about: and they were few and lowly; for no science was spread abroad by such lowly men; hence the Apostle, 1 Cor 1:27: not many wise, or mighty, not many noble; but the foolish things of the world God has chosen to confound the wise, etc. But when it is grown, it is greater, in effect, than all, because the apostles produced greater fruit. Alexander converted one part of the world to himself, Rome likewise, but never as much as these, who accomplished so much. So that the birds of the air, i.e., the good, rest in its branches, i.e., in their teachings; Zech 8:23: they shall take hold of the skirt of a man that is a Jew, saying: we will go with you; for we have heard that God is with you. Hilary explains it of Christ, who was the grain of mustard seed on account of his fervor, because he was full of the Holy Spirit, which he sowed, afterwards in his death, in a field, i.e., among the people, which was very small on account of the contempt of unbelievers; Isa 53:2: we have seen him, and there was no beauty in him, and we desired him, despised and the most abject of men, a man of sorrows and acquainted with infirmity. And it is greater than all herbs, i.e., than all the perfect. Gold shall not be compared to it. And the perfect are compared to herbs, because herbs are given to the sick: let him that is weak eat herbs. But the teaching of Christ is given to the perfect, and so it becomes a tree. And this is signified by the tree of which we read in Dan 4:7ff.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
