[[commentary]]
quote='''
Someone might say: all these things happened by chance and were not indicative of sorrow. On the contrary. Hence he says, now all these are the beginnings of sorrows. Isaiah 13:8: They shall be in pain as women that are in labor. So Chrysostom explains it. But insofar as it is referred to the consummation of the world, Origen explains it thus. We should consider the world as one man, because when it tends toward death, the vital powers begin to weaken. So in showing the universal change, the Lord will send some particular change, so that they will not have any strength, and then there will be pestilences, because the air that serves us in two ways will be corrupted. Likewise the earth, which serves us for food because it produces herbs and grain from which food comes, will be weakened, so that there will be famine in the land. Likewise the earth supports us, and against this the earth will be disturbed; hence there will be earthquakes. The first two are universal, but the last will be particular, because it will be in places. And why will it not happen universally throughout the whole world? So that men, seeing it, may return to their hearts and be converted. Likewise it happens that famine arises from a scarcity of things, and then on account of the famine nation rises against nation; and this could happen near the end of the world. It can also be, however, that sometimes nation rises against nation not on account of scarcity, but on account of vainglory. Sometimes it happens on account of the injustices of men. Sometimes God has mercy and restrains the evil angels through the good angels, as Ezekiel 13:5: You have not gone up to face the enemy, nor have you set up a wall for the house of Israel, to stand in battle in the day of the Lord. Hence the world stands through the prayer of the good. And then, namely at the end of the world, the charity of many shall grow cold, and then there will be many evils, because then the good angels will release the demons, who have power to harm the land and the sea; therefore, because they have power over the land and the sea, they will disturb the whole earth. And that they can do this is found in Job 1:7ff. Jerome says that this can be said of the coming of the Lord by which he comes daily in the Church. For insofar as heretics impede the goods of the Church, then spiritual pestilences occur, and famine, namely, a want of good teaching, Amos 5, and earthquakes, i.e., men who are solid will be shaken.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
