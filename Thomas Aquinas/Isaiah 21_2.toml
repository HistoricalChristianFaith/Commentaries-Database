[[commentary]]
quote='''
510. Second, he designates the devastator.

And first, as to the condition of their leader: in infidelity. Cyrus, he that is unfaithful, that is, unfaithful to his lord Baltasar, rebelling, and besieging Babylon, trusting in his effeminacy, deals unfaithfully, that is, he will deal unfaithfully, seeing that the city cannot be taken by force, fraudulently making peace and commanding homage to the king of Babylon. When the king of Babylon invited him to a banquet (concerning which, see Daniel 5), he killed him and took the city, bringing his soldiers in through a hole in the city wall, through which a stream flowed, after they had divided its water into many parts. In cruelty: he that is a spoiler; hence in punishment for his cruelty he was suffocated in blood, and it was said to him: you thirsted for blood, so drink blood; behold, he that is unbelieving, his soul shall not be right in himself (Hab 2:4).

Second, as to his departure from the region: go up, O Elam, a Persian city and province; Medaba, a city in Media, besiege Babylon: speaking in the voice of the Lord: go up against her, all nations (Jer 51:28).

Third, the power of the enemy: I have made all the mourning thereof, that is, of Babylon, to cease, so that they do not even dare to mourn, above: there was none that moved the wing, or opened the mouth, or made the least noise (Isa 10:14); or because he makes his own to mourn.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
