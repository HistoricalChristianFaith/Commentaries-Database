[[commentary]]
quote='''
Woe to the land, the winged cymbal. Here he threatens against the Egyptians. And first, he threatens their punishment through comparison to what merits the punishment; in the second part, he describes the manner of the punishment: the burden of Egypt (ch. 19); in the third part, he designates the time of the punishment: in the year (ch. 20). Concerning the first, he sets out three things: first, he designates the fault, which merits the punishment; second, he threatens the punishment: all you inhabitants (Isa 18:3); third, he shows the fruit of the punishment: at that time (Isa 18:7).

Concerning the first, he does two things. First, he describes the location of the land which they trusted in proudly, saying, woe, namely, it is near at hand, to the land, Egypt, the winged cymbal, so-called because of the sound of the Nile, whose swiftness is compared to the movement of wings because of their swiftness, or because of the multitude of the peoples, or because of the help of protection, which they resounded to the people of the two tribes; which is beyond the rivers of Ethiopia, that is, beyond the Nile, which comes from Ethiopia: behold, I come against you, Pharaoh king of Egypt, you great dragon that lies in the midst of your rivers (Ezek 29:3). Nevertheless, the Jews explain this as referring to Gog, who lives beyond Ethiopia, against whom the prophet Ezekiel testifies (Ezek 38).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
