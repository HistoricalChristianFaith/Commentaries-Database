[[commentary]]
quote='''
Now the blessedness of man is in God. Ps. 143: "Blessed is the people whose God is the Lord," etc. The right process toward blessedness is therefore, first, that we submit ourselves to God, and this in two ways. First through the will, by obeying His commandments; and so he says: "but in the law of the Lord"; and this pertains especially to Christ. Jn. 6: "I came down from heaven not to do my own will, but the will of Him who sent me." It applies similarly to every just person. And he says "in the law" through love, not "under the law" through fear. 1 Tim. 1: "The law is not made for the just man." Second, through the intellect, by meditating continually; and so he says, "on his law he shall meditate day and night," that is, continuously, or at certain hours of day and night, or in prosperity and adversity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520the%2520Psalms.html'
source_title='Exposition on the Psalms of David'
