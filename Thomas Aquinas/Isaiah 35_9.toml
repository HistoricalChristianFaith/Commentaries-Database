[[commentary]]
quote='''
He also sets out the security of the way: no lion shall be there, above: they shall not hurt, nor shall they kill in all my holy mountain (Isa 11:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
