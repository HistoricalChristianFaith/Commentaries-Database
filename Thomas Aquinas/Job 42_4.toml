[[commentary]]
quote='''
Because, "I have spoken foolishly" in what remains I will speak wisely, and so he says, "Listen and I will speak," and confess my fault. Because "I have spoken about things which exceed my knowledge," from now on I do not dare to speak about those things, but only to ask you about them and so he says, "I will ask you," by asking, seeking and knocking, (Matt. 7:7) "and answer me," by instructing me interiorly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
