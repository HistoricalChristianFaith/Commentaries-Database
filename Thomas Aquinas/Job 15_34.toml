[[commentary]]
quote='''
Respecting this merit he says, "what the hypocrite collects is sterile," because what is gathered by the hypocrite bears no fruit, "and fire will devour the tents of those who freely accepts gifts." For things acquired wickedly are sometimes easily destroyed according to divine judgment. He says this throwing the theft and hypocrisy of Job in relief as though adversity had befallen him because of his sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
