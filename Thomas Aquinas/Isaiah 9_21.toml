[[commentary]]
quote='''
Second, he explains this metaphor as to kinsmen: Manasses Ephraim, and Ephraim Manasses, who were both sons of Joseph.

Third, as to enemies: they together shall be against Judah: every brother will utterly supplant, and every friend will walk deceitfully (Jer 9:4). Above: and the people shall rush one upon another, and every man against his neighbor (Isa 3:5).

321. After all these things his indignation is not turned away, but his hand. Explain all this as above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
