[[commentary]]
quote='''
Above, the Lord showed the power of the evangelical teaching under certain parables; here he shows it by deeds; and he does three things. First, he shows to what effects it extends by a likeness of deeds; secondly, he shows the sufficiency of the evangelical teaching; thirdly, how it should be preserved in purity. The second is in chapter 15, the third in chapter 16. Regarding the first, first a false opinion is set forth; secondly, its occasion; thirdly, the opinion is disproved. The second is at for Herod had apprehended John, etc.; the third at which when Jesus had heard, he retired from thence. He says therefore at that time Herod the tetrarch heard the fame of Jesus. And this is not to be referred to that day, but to the time in general; because Mark 6:1 and Luke 4:16 do not narrate in the same order, since they narrate this after the sending of the disciples, as is stated in Mark 6. Hence it is uncertain who preserves the order of history. Nevertheless, what is said, at that time, is said to denote the negligence of Herod, because after the miracles he then for the first time heard the fame of Jesus: for this negligence is customary among the rich, that they do not care about small things. 1 Tim 6:17: charge the rich of this world not to be high-minded, nor to trust in the uncertainty of riches, etc. Herod the tetrarch heard, to distinguish him from Herod the king, under whom Christ was born, as is stated above in chapter 2. Hence, when the latter died, Christ returned from Egypt. This Herod was his son, and he was a tetrarch. His father had been made king by the Romans, and he had six sons, two of whom he killed during his lifetime; another, the firstborn, he killed at his death, when that son had already begun to have himself proclaimed king while his father was still living. When the father died, Archelaus took the kingdom for himself, and following his father's wickedness, he could not be tolerated by the Jews. Then they appealed to the Romans, and the kingdom was divided into four parts: two parts were given to Archelaus, another to Herod, and another part to Philip. Hence this one was a tetrarch and prince over the fourth part of the kingdom. He heard the fame of Jesus. From this he was blameworthy, because for so long a time Jesus had already lived and worked miracles, and yet he then heard for the first time; hence is fulfilled Job 28:22: destruction and death have said: with our ears we have heard the fame thereof.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
