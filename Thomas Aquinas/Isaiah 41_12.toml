[[commentary]]
quote='''
And the impossibility of restoration: you shall seek them: I have seen the wicked highly exalted. And I passed by, and lo, he was not (Ps 36[37]:35–36).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
