[[commentary]]
quote='''
Lest he seem to inhibit his ability to answer he says, "If however you have something to say, answer me," and as though he desires his answer he adds, "speak." Then, he shows the cause of his desire saying, "I want you to be known as just." He says this to show that he does not intend to humiliate him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
