[[commentary]]
quote='''
He professed his faith when he said, We have come to believe and to know that you are the Christ, the Son of God. For in our faith there are two things above all that must be believed: the mystery of the Trinity, and the Incarnation. And these two Peter professed here. He professed the mystery of the Trinity when he said, you are the Son of God: for in calling Christ the Son of God he mentioned the person of the Father and that of the Son, along with the person of the Holy Spirit, who is the love of the Father and of the Son, and the bond or nexus of both. He professed the mystery of the Incarnation when he said, you are the Christ: for in Greek, the word "Christ" means "anointed"; anointed, that is, with the invisible oil of the Holy Spirit. He was not anointed according to his divine nature, because one who is anointed by the Holy Spirit is made better by that anointing. But Christ, so far as he is God, is not made better. Thus, Christ was anointed as man.

He said, We have come to believe and to know, because believing comes before knowing. And therefore, if we wanted to know before believing, we would neither know nor be able to believe, as Augustine says, and as in that other version of Isaiah: "If you do not believe, you will not understand" (Is 7:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
