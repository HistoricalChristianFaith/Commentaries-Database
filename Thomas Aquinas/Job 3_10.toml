[[commentary]]
quote='''
But since what he had said seemed impossible, namely, for day and dawn not to succeed night, he shows how his words should be interpreted saying, "because it did not shut the doors of my mother's womb." For the life of man is a hidden life in the womb of his mother, and so is compared to the darkness of night. However, when one appears in the open in birth, then it is like bright day. For this reason he said that night should not be followed by either dawn or by day to show that he wanted his conception to come never to birth or to childhood, which is understood by dawn, or youth which is designated the full light of day. He says, "Because it did not shut the doors of my mother's womb," not because this night should close the womb, that is, prevent his birth, but because this is done at night. For from conception itself, an impediment can stand out which does not allow conception to issue into birth. But since it also seems irrational for someone to detest life, when being and living are desirable for all, he shows the reason why he has said this. "Nor hide trouble from my eyes," as if to say: I do not detest living because of life itself, but from the evil which I suffer. For although life itself is desirable, yet a life subject to misery is not. Here note that everything which he has said in metaphor above, he clarifies plainly in the final clause, a principle which will be observed in his other discourses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
