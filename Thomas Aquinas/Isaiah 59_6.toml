[[commentary]]
quote='''
And as to the second: their webs shall not be for clothing; that is, as spider webs do not avail for clothing, so their counsels avail nothing for them, if they gain no advantage, above: they shall be confounded that wrought in flax, combing and weaving fine linen (Isa 19:9).

1041. Second, he explains the metaphor. And first, as to action: their works are unprofitable, as to one part, the work of iniquity, as to the other, above: their works shall not profit them (Isa 57:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
