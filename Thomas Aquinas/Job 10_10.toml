[[commentary]]
quote='''
Next he treats the making of man with reference to the work of propagation by which man is generated from man. Note here that he attributes every work of nature to God, not so as to exclude the operation of nature, but in the way things done through secondary causes are attributed to the principle agent. Similarly the operation of the saw is attributed to the carpenter. The fact that nature operates comes from God, who instituted it for that purpose. In the generation of man, first comes the release of the seed and to express this he says, "Did you not pour me out like milk?" For just as semen is the product of nourishment, so too is milk. Second, the physical mass is joined together in the womb of the woman and he expresses this saying, "and curdle me like cheese?" For the seed of the male is related to the matter which the female furnishes in the generation of man and other animals like the coagulant is related to the generation of cheese.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
