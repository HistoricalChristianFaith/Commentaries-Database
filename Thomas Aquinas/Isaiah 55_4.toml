[[commentary]]
quote='''
Second, he explains this similitude, showing what he did for David: behold I have given him for a witness to the people: a people which I knew not, has served me: at the hearing of the ear they have obeyed me (Ps 17:45[18:44]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
