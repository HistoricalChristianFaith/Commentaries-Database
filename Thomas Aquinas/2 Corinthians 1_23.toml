[[commentary]]
quote='''
Then he says, but I call God to witness, he gives his excuse for not coming; and this is by oath which is greater. In regard to this he does three things: first, he states the excuse; secondly, he answers a tacit question (v. 24a); thirdly, he explains what he says (v. 24b). He excuses himself with a double oath: one of attestation, when he says, I call God to witness; the other of execration, when he says, against me, i.e., against my soul: "For God is my witness" (Rom. 1:9). As witness, I say, I call upon God, because I refrained from coming, i.e., after the first time or after I departed from you; and this I did to spare you, namely, because he knew that they were incorrigible. Hence, if he had gone then, he would either have punished them, and they perhaps would have left the faith altogether, or he would not have punished them, and then he would have been giving them occasion to sin more.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
