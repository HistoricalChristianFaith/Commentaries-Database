[[commentary]]
quote='''
Then when he says: to rejoice with those who rejoice, he teaches about concord: first, he sets out nature of concord; second, the obstacles to it, at not minding high things.

Concord can be considered in two ways. In one way, as regards the effect it produces in reacting to good and evil. In regard to good it makes one rejoice in the good of others; hence he says: rejoice with those who rejoice: I am glad and rejoice with you all (Phil 2:17). But this refers to rejoicing with one who rejoices in the good. For there are some who take joy in evil: some are glad when they have done evil, and rejoice in things most wicked (Prov 2:17). In such cases one must not rejoice with others, for in 1 Corinthians it is said of charity that it does not rejoice over wickedness but rejoices in the truth (1 Cor 13:6).

In regard to evil the effect of concord is that it makes one grieve over another's evil. Hence, he says: weep with those who weep: I wept for him who was afflicted (Job 30:25); comfort them that weep, and walk with them that mourn (Sir 7:38).

For the compassion of a commiserating friend itself brings consolation in two ways: first, because it is convincing proof of friendship: in a man's adversity his friend is known (Sir 12:9), and that itself is a joy, namely, to know that one has a true friend. Second, because the condolence of a friend implies that he is offering to carry the burden which causes the sorrow, and it is easier when a burden is carried by two than by one person alone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
