[[commentary]]
quote='''
So he continues, "they rushed in upon me like a breached wall or an open gate," as though there had not been an obstacle, either from the substance itself, of difficulty which is meant by the breached wall, or from human concern, which is meant by the door. Moreover, those who rushed on me so freely showed no mercy, and so he says, "and they rushed in on my mishaps," for they totally intended to make me unhappy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
