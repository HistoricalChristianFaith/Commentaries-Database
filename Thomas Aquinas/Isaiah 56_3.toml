[[commentary]]
quote='''
Second, he sets out the universality of this utility: and let not the son of the stranger.

And first, he excludes the desperation of some who seemed unworthy, either because of defect of race, because they were not of the race of Israel: that adheres to the Lord, keeping his precepts; saying: the Lord will divide and separate me from his people, not making me a sharer in the salvation promised to them: for there is no distinction of the Jew and the Greek: for the same is Lord over all (Rom 10:12). Or because of lack of generative power: and let not the eunuch say: behold I am a dry tree, unable to beget, like a dry tree is unable to sprout: the just shall spring up as a green leaf (Prov 11:28).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
