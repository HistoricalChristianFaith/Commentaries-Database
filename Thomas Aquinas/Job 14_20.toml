[[commentary]]
quote='''
He then deduces the same things using reasons drawn from the properties of man. Man excels all lower creatures in two ways. One of these is operative power. For he truly is the lord of his own act by free will, which is proper to no other corporeal creature. Because of this, man is more powerful that every other corporeal creature. Therefore, he uses the others for his own sake. He also excels them in intellectual knowledge. Since he has a mind, yet this is somewhat indicated in his body especially in the face which man has and is very different from the other animals. As a result of these two properties, it is apparent that man is not corrupted like other things so that they do not exist perpetually. He expresses the first of these properties saying, "Have you strengthened him a little to allow him to disappear forever?" He means: It is not fitting for you to strengthen man so much for a short time and in such a way that he would not exist perpetually afterwards. For it seems foolish for someone to make a very strong tool to use it for only a short time and then throw it away for good. The power of every corporeal creature is determined by finite effects while power of the free will is directed toward infinite actions. This in itself bears witness to the power of the soul to make it endure infinitely. As to the second property he says, "will you change his face and let him go to waste?" He means here: It is not fitting that you should make his face so different from the other animals and yet still dismiss him from this state of life forever never to return to life like the other animals. Intellectual knowledge is commonly perceived by the "face" because it is proper to the rational creature. Intellectual knowledge can only fittingly belong to an incorruptible substance, as the philosophers prove.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
