[[commentary]]
quote='''
Therefore, "they have been raised up a little," to some earthly and perishable height, which God gives to them as an occasion of repentance. "And they will not stand firm," to the very end, because they abuse the mercy of God to the point of pride. He uses an analogy for this. Everything which is generated in time grows up in a determined time and afterwards begins to decay until it is totally destroyed. So it happens with the wicked, and so he says, "They will be humbled like everything else," which increases in time, "and will be borne away," completely, when they have reached their peak. He establishes the analogy saying, "and like the tops of the ears of wheat they will be ground down." For fruits of the earth are not ground down while they are in stalk and grow, but when they finally arrive at full maturity. In the same way the wicked are not punished by God immediately, but when they reach at their full stature, according to the measure foreseen by God. Job introduced this to show that if evil men are not punished in time, but lead a prosperous life, this does not happen from a defect of divine providence, but from the fact that God defers punishment until the right time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
