[[commentary]]
quote='''
Then when he says, Because he spoke in this way, many came to believe in him, he shows the effect of his teaching, which is the conversion of many of them to the faith because they had heard Christ's teaching: "Faith comes by hearing, and what is heard by the word of Christ" (Rom 10:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
