[[commentary]]
quote='''
And your oxen, as to cattle; and in both, he notes their fecundity, setting out their young, and the ass colts; and as to provisions for beasts of burden: mingled provender, pure barley with husks, which they ate mingled before.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
