[[commentary]]
quote='''
"There, those" who were "once chained, will be at ease together," without their former pain together with those who held them bound. There too men weighed down with anguish and with slavery, "hear not the voice of the taskmaster." This accords with Isaiah, "How the oppressor has ceased; there is no more tribute." (14:4)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
