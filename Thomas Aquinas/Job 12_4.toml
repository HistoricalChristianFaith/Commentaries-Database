[[commentary]]
quote='''
But by the fact that you say that I am ignorant of these things, you seem to hold me in contempt as though I am ignorant of things which everyone knows. Thus he says, "Someone who is derided by his friends like I am," as you do when you think me foolish, "will call upon God and he will hear him," because God especially helps those bereft of human aid. As Psalm 26 says, "Though my mother and father abandoned me, yet the Lord raised me." (v.10) In this he attempts to answer Sophar's argument above, "Then you will be able to lift up your head," (11:15) as if to say: I should not wait any longer to pray faithfully because by the very fact that I am derided by my friends, hope is given to me of having recourse to God.

He shows why the one derided by a friend is heard by God saying, "For the simplicity of the just man is derided," when he shows who these just men are, who are derided and why, and also by whom when he continues, "his light is condemned by the thoughts of riches." To be derided is the lot of someone deficient in resources, but to deride is the lot of someone who has a superabundance of possessions. But those who super-abound in virtue do not laugh at those who are deficient in virtues. Rather they have compassion on them and help them if they can. But those who abound in temporal goods often especially deride those who lack temporal goods and especially when they do not show enthusiasm for acquiring temporal goods. But the enthusiasm of just men is not to acquire temporal goods, but to pursue righteousness eagerly, and so they abstain from fraud and the evil intent by which more riches are generally acquired. They are accounted naive because of this. So most people laugh at the just.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
