[[commentary]]
quote='''
He seems justly punished who soils the wife of another by adultery, in that his wife also is soiled by others, and so he says, "let my wife be the prostitute of another," let her offer herself for sale to others. From this it follows that others abuse her, and so he then says, "and others bend down over her," to commit adultery.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
