[[commentary]]
quote='''
But what are the things that follow from it? One of cruelty, another of pleasure. Regarding the first he says, and shall begin to strike his fellow servants, because he considers those subject to him as slaves, against that in 1 Peter 5:3: But willingly, neither as lording it over the clergy. And it is not enough for him; he even strikes and afflicts them; Micah 3:10: You who build up Zion with blood. Or they strike their brothers, whom they consider servants, by bad example. Likewise, this is not enough for them, but they turn to pleasures. And shall eat and drink with drunkards, i.e., he will have the company of the pleasure-seeking, if he himself is pleasure-seeking.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
