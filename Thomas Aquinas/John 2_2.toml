[[commentary]]
quote='''
And this is what comes next: Jesus was invited. Christ decided to attend this wedding, first of all, to give us an example of humility. For he did not look to his own dignity, but "just as he condescended to accept the form of a servant, so he did not hesitate to come to the marriage of servants," as Chrysostom says. And as Augustine says: "Let man blush to be proud, for God became humble." For among his other acts of humility, the Son of the Virgin came to a marriage, which he had already instituted in paradise when he was with his Father. Of this example it is said: "Learn from me, for I am gentle and humble of heart" (Mt 11:29).

He came, secondly, to reject the error of those who condemn marriage, for as Bede says: "If there were sin in a holy marriage bed and in a marriage carried out with due purity, the Lord would not have come to the marriage." But because he did come, he implies that the baseness of those who denounce marriage deserves to be condemned. "If she marries, it is not a sin" (1 Cor 7:36).

The disciples are mentioned when he says, and his disciples.

In its mystical meaning, the mother of Jesus, the Blessed Virgin, is present in spiritual marriages as the one who arranges the marriage, because it is through her intercession that one is joined to Christ through grace: "In me is every hope of life and of strength" (Sir 24:25). Christ is present as the true groom of the soul, as is said below (3:29): "It is the groom who has the bride." The disciples are the groomsmen uniting the Church to Christ, the one of whom it is said: "I betrothed you to one husband, to present you as a chaste virgin to Christ" (2 Cor 11:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F2.htm'
source_title='Commentary on John'
