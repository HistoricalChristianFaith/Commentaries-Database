[[commentary]]
quote='''
So after Eliphaz has explained his revelation, since Job could not have believed this revelation, he adds, "Call now; is there anyone who will answer you?" as if to say: If you do not believe that this was revealed to me, you yourself can invoke God, if perhaps he himself will answer this doubt for you. If through your own merits you do not think you can obtain this from God, "Turn to one of the holy men," so that by his mediation you will be able to know the truth from God about this matter. Note that he says, "to one of the holy men," because one should not diligently investigate hidden things through unclean spirits in just any way or using any technique. One may only do this through God or the holy ones of God according to Isaiah, "And when they say to you, 'Consult the mediums and the wizards who hiss in their incantations,' should not a people ask for insight from their God for the living or the dead." (8:19)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
