[[commentary]]
quote='''
And he said to them. Here is set forth the negotiation of the betrayal. And first the negotiation is set forth; second, the consummation. And first his cupidity should be considered; second, his presumption. His cupidity, when he says, what will you give me, and I will deliver him unto you? For the sake of money he despised all friendship; Sirach 10:10: there is not a more wicked thing than to love money; for such a one setteth even his own soul to sale. For because he did not restrain his cupidity, he fell into betrayal. Because he saw that he had been deprived of the price of the ointment, he wanted to recover it by betraying Christ. Likewise, his presumption is touched upon when he says, and I will deliver him unto you. It was great presumption to deliver up one who knew all things. Likewise, he speaks as one who has a very low opinion of God, because when someone wants to sell something he loves, he sets a price on it; but when he has something he wants to be rid of, he says: give me what you please. So this one says: what will you give me? That is, give what you will. They set at nought the desirable land, Psalm 105:24. And they appointed him thirty pieces of silver. Origen says that in a similar way those act who abandon God for temporal advantage. For he dwells in us through faith; but we abandon him when we cling too much to temporal things; hence he said: and they appointed him thirty pieces of silver. But why did he state the amount so precisely? Because it was so signified through Zechariah 11:12: and they weighed for my wages thirty pieces of silver. And it should not be said that Joseph was sold for thirty coins, for Scripture indicates that it was only twenty pieces of silver, i.e., coins. But what does the number thirty mean? It should be understood that this number is composed of five and six, since five times six is thirty. By five are signified the five books of Moses, or temporal things that are subject to the five senses; hence it is signified that after the law of Moses, salvation would come about in the sixth age.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
