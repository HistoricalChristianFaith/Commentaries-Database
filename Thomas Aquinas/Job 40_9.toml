[[commentary]]
quote='''
Therefore, the Lord, in accusing Job, proposes the excellence of God over men, and this excellence is indeed manifested in his effects. But since now it is a question of the comparison of justice which properly is not perceived in irrational things, to show divine excellence he considers the effects which God works in rational creatures. These effects can be considered in two ways. In one way according to the operation of his power, and as to this he says, "If you have an arm like God," for "the arm" expresses the divine power. He uses this arm, of course, to sustain the good, as Isaiah says, "In his arm he will gather the lambs," (Is.40:11) and to punish evildoers, as Luke says, "He has shown power in his arm, he has scattered the proud in the conceit of their heart." (Luke 1:51) In another way God works in rational creatures by the instruction of his wisdom which because of its excellence he calls thunder, and as to this he says, "and if you thunder with a voice like his?" God uses this thunder to instruct the good, as chapter 26 says, "When we have scarcely heard a small whisper of his words, who can understand the greatness of his thunder," (26:14) and for the terrible rebuke of the wicked, as Psalm 76 says, "The voice of your thunder rolled round," and the text says after this, "the earth trembled and was shaken." (v.19)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
