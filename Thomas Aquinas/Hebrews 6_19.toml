[[commentary]]
quote='''
325. – Then when he says, we have this as a sure and steadfast anchor of the soul, he shows that faith will obtain that promise; and he makes use of a simile. For he compares hope to an anchor, which just as it secures a ship in the sea, so hope secures the soul in God in this world, which is, as it were, a kind of sea: 'So is this great sea, which stretches wide its arms' (Ps. 103:25); hence, it is made of iron: 'I know whom I have believed and I am certain' (2 Tim. 1:12). Also it should be firm, so that it is not easily removed from the ship; thus a man should be held fast to that hope as an anchor. And hope is that the anchor is fixed to a low place, but hope is fixed in the highest, namely, to God. For nothing in the present life is so firm that the soul could be secure and at rest; hence, it says in Gen. (8:8) that the dove found no place where her foot might rest. And, therefore, he says that this hope should enter into the inner shrine behind the veil. For the Apostle understands the present condition of the Church by the holy things that were in the tabernacle; but by the holy of holies, which was separated from the saints by a veil, he understands the state of future glory. Therefore, he wills that the anchor of our hope be fixed in that which is now veiled from our eyes: 'The eye has not seen, O God, besides thee, what things you have prepared for them that wait for you' (Is. 64:4); 'How great is the multitude of your sweetness, O Lord, which you have hidden for them that fear you!' (Ps. 30:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
