[[commentary]]
quote='''
386. Against the second evil, he confesses confidence in God: behold, God is my savior, freeing the people from the slavery of Babylon, or more truly, who will save his people: for he shall save his people from their sins (Matt 1:21); fear you not, my servant Jacob, says the Lord, neither be dismayed, O Israel: for behold, I will save you from a country afar off (Jer 30:10).

Against the third evil, the power of divine strength: my strength, by which I subsist, and my praise, which I praise, having abandoned idols: I will love you, O Lord, my strength (Ps 17:2[18:1]).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
