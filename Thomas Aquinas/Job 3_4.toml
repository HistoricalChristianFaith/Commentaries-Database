[[commentary]]
quote='''
After cursing the day of his birth and the night of his conception, one by one the curse for each of these periods of time. First with the curse of the day of his birth, "Let that day be darkness!" Consider that, as Jerome says in his Prologue, "from the words in which Job says, 'Let the day perish on which I was born,' to the place where it is written near the end of the book, 'For that reason, I repent,' (42:6), the verses are hexameters in dactyl and spondee." Therefore it is clear after this that this book was written in poetic style. So he uses the figures and images which poets customarily use through this whole book. Since poets want to touch others deeply, they customarily use several different images to express the same idea. So here too Job uses things which often make a day hateful, to curse his own day in the manner of which we are speaking.

The dignity of a day is its brightness, for it is by this that it is distinguished from night. He excludes this dignity saying, "Let that day be darkness," an idea which seems frivolous and vain according to a superficial reading of the text. For the day of his birth had passed and was not now present. What has passed cannot be changed. How then could a day which has passed be changed into night? One should know that some judgments one makes about things are expressed as desires. So now the text says, "Let that day be darkness," as if it were to be said: The day of my birth ought to be in darkness because it befits the darkness and misery which I am suffering. For the sight of the light is delightful, as Qoheleth says, "Light is pleasing and it is delightful for the eyes to see the sun." (11:7) It is customary in Holy Scripture to represent sorrow by darkness, as one sees in Qoheleth, "He spent all his days in darkness and grief, in much vexation and sickness and resentment." (5:16)

A day is bright in many ways. First, of course, from the sanctification of God who instituted it to be celebrated, as Exodus teaches, "Remember, keep holy the Sabbath day." (20:8) Therefore, Job removes this sort of brightness from the day mentioned previously when he says, "May God not seek it," as if to say: May God not require men to celebrate it. In fact, God requires some days be celebrated because of some extraordinary favor conferred on that day on men. For example, the Sabbath in the Old Law was celebrated because of the gift of Creation and the Passover was celebrated because of the gift of liberation from Egypt. This is also true of the feast days which are celebrated in the New Testament. Thus Job wishes to show by this that his birth should not be reckoned among the extraordinary favors of God, since he seems to have been born more for sorrow than for joy. Second, a day is bright from the recollection of men. For men customarily celebrate certain days on which something great or joyous happened to them, like Herod and Pharaoh celebrated their birthdays. He excludes such brightness from this aforementioned day saying, "May it not be remembered," namely, by men because in truth nothing joyous happened on that day, but rather something sad happened on that day as is plain from the result. Third, a day is bright from physical light, which can be taken away in many ways. First, from the loss of the rays of the sun which illumine the earth, as appears in an eclipse of the sun. The text speaks about this saying, "nor let light shine on it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
