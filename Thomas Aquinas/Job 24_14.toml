[[commentary]]
quote='''
As a sign that they resist the spiritual light of wisdom he says that loving darkness they even hate exterior light, according to John, "Everyone who does evil hates the light." (3:20) So he continues here, "At the first light of morning, the murderer rises and kills the poor and needy," since at that hour there is usually no one about on the street, but some poor men, driven by necessity, anticipate the time for work, and thieves lie in ambush for them along the way. To show that to burglarize houses they need more darkness for this, he says, "and in the night he will be like a thief," robbing houses, for it would not be safe for him to do this in the early hours of the morning, because then men begin to wake up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
