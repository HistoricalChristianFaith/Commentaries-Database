[[commentary]]
quote='''
As to things which pertain to the fortification of places from art: "and upon every high tower": "a day of the trumpet and alarm against the fenced cities, and against the high bulwarks. And I will distress men" (Zeph 1:16–17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
