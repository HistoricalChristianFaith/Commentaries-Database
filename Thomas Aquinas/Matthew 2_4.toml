[[commentary]]
quote='''
(4) And assembling... Here the inquiry is mentioned. And, as has been said, Herod was led to inquire both for the sake of his kingdom and for fear of the Romans. Hence, he was looking for the truth. But in order to have certainty about something, three things are required of the investigators, for credence is given to the multitude, to authorities and to the learned. Hence, he assembled many having authority and recognized as wise. And this is what he says: assembled all, as to the first; "A multitude of wise men is the salvation of the world" (Wis 6:24); the chief priests, as to the second: "The lips of a priest should guard knowledge, and men should seek instruction from his mouth" (Mal 2:7); and scribes, as to the third. They are called scribes, not only because they wrote, but because they interpreted the writings of the Law. It was through them that he wished to investigate the truth: "Do not presume to speak much among the great, and do not say much in the presence of the old" (Sir 32:13).

He inquired of them where the Christ was to be born. The Magi called him king, but the others were looking for the Christ; for they knew from talking with the Jews that the lawful king of the Jews is anointed. But he either believed the prophecy or he did not. If he believed, he knew that he could not be prevented from reigning. Then why did he kill the children? If he did not believe, why did he search for him. The answer is that he did not believe completely, because he was ambitious; and ambition makes a man blind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
