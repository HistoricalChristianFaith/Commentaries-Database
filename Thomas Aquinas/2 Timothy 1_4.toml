[[commentary]]
quote='''
Again from desire; thus he says, desiring to see you for our mutual consolation: for I long to see you (Rom 1:11).

Then when he says, being mindful of your tears, he shows the good that was in Timothy: first, he recalls his love for him; second, his faith in God, at calling to mind the faith.

He says, therefore, being mindful of your tears, which Timothy shed, when he left Ephesus prepared for martyrdom. Or, of the tears which he shed during prayer. And this that I may be filled with joy, i.e., this memory fills me with joy: fulfill ye my joy (Phil 2:2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
