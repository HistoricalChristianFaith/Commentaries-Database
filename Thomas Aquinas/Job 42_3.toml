[[commentary]]
quote='''
Therefore, in consequence, he assails those who deny divine providence saying, "Who is the man who foolishly hides his plan without your knowledge?" who is so presumptuous and stupid to say that a human counsel can be hidden from God without God knowing it? From the consideration of the divine excellence he proceeds to consider his own fault when he says, "So I have spoken foolishly," in not showing due reverence for divine excellence in my words, "about things which far exceed my knowledge," in discussing divine judgments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
