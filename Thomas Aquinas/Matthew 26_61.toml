[[commentary]]
quote='''
Then follows the false testimony: and last of all there came two false witnesses, and they said. But here there is a question: why they are called false witnesses, because it is evident that Christ said this, John 2:19. According to Jerome, not only is he called false who says what he does not know, but he who refers what was said to a false meaning. This man said: I am able to destroy the temple of God, and after three days to rebuild it. But he did not mean the material temple, but the temple of his body. Likewise, the testimony is false not only as to its meaning, but as to its words, because he had said: destroy this temple; and he did not say: I am able to destroy the temple of God; as if to say: you Jews, destroy the temple, i.e., Christ, and after three days I will raise it up. He did not say: and after three days I will rebuild; because to rebuild pertains more to a material temple, but to raise up pertains more to a body. Hence they were false witnesses both by reason of the words and by reason of the meaning. Likewise there is a question. Why do they not accuse him of violating the Sabbath? Chrysostom answers that because they had often accused him of this, and he had always excused himself and had confirmed his excuse with miracles; therefore they thought it would be of no avail to them. Likewise, the judge was not a Jew, and so they knew he would not accept this accusation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
