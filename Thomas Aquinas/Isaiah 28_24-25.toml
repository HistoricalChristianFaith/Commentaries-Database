[[commentary]]
quote='''
Second, he sets out the consolation under the likeness of a farmer: shall the ploughman plough all the day, through which he shows three things, namely, the intention of God to punish like the ploughman, that they might bear fruit, to sow. Gith, a kind of legume similar to cumin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
