[[commentary]]
quote='''
In his discourse Eliphaz proposed two changes against Job. First, that he had been punished because of his very great evil. Second, that he had doubted or even denied divine providence. Now men are often saddened when any charges are falsely made against them, and so since Job did not see these things in himself he says, "Now also my speech is bitter," as if to say: As you saddened me above with your reproaches, so you do even now so I am compelled to speak with bitterness. When one affliction is added anew to someone already afflicted, the first afflictions come back to mind and aggravate the present lament, so he continues, "the hand," the power, "of my wound," of the adversity which I once suffered, "now has made my lament greater," because it makes the present pain more grave.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
