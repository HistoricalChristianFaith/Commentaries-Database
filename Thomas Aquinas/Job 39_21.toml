[[commentary]]
quote='''
The sign of this appears immediately in him, which the text describes next, "he paws the ground with his hoof," to prepare himself to fight. He rejoices interiorly to perceive the coming battle, and so he says, "he exults," because he senses the opportunity to fight, and he shows this exultation by effect when he says, "he proceeds audaciously to the clash of arms."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
