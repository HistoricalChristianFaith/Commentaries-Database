[[commentary]]
quote='''
He shows why he has so changed saying, "My ear heard you," once when I was speaking foolishly; "now, however, my eye sees you," that is, I know you more fully than before, just as things which are seen with the eyes are more certain than what is heard with the ear. He truly has grown both from his suffering and from divine revelation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
