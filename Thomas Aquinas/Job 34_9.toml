[[commentary]]
quote='''
He show why he asserts that he consents with them saying, "For he said: A man will not please God even if he has run with him," even if he had follows him in the way of justice. Job did not say this, but Eliud takes his words in a sense they were never intended to impute this charge to him. For Job had said, "My feet followed his steps," (23:11) and later, "You have changed into someone cruel in my opinion and you persecute me with a heavy hand." (30:21) From these words he concluded that Job thought that he was displeasing to God, even though he had followed him, but Job referred these words to exterior persecution, not to interior reprobation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
