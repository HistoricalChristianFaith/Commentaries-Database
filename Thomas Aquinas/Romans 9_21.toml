[[commentary]]
quote='''
Then the Apostle explains the words of the prophet, when he says or has not the potter power.
As if to say what is molded, i.e., the vessel, should not say to the potter: why have you made me thus? because the potter is free to make anything he wishes out of the clay. Hence he says: or has not the potter power over the clay, to make without any injury to it, of the same lump of base matter one vessel unto honor, i.e., for honorable use and another unto dishonor, i.e., for meaner uses: in a great house there are not only vessels of gold and silver but also of wood and earthenware, and some for noble use, some for ignoble. (2 Tim 2:20).
In the same way God has free power to make from the same spoiled matter of the human race, as from clay, and without any injustice some men prepared for glory and some abandoned in wretchedness: behold, like the clay in the potter's hand, so are you in my hand, O house of Israel (Jer 18:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
