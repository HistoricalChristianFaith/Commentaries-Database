[[commentary]]
quote='''
Having assigned the differences among charismatic graces and the ministries in which the members of the Church are distinguished, the Apostle now deals with charity, which is inseparably connected with sanctifying grace. And because he had promised to show them a more excellent way, he shows how charity outranks the others, i.e., the charismatic graces. First, in regard to its necessity, namely, because without charity the other gifts are not enough; secondly, as to their utility, namely, because through charity all evils are avoided and good is performed (v. 4); thirdly, as to its permanence (v. 8). But all the charismatic gifts seem to be reduced to three by the Apostle: for, first, he shows that the gift of tongues, which pertains to speech, is of no value without charity; secondly, that those which pertain to knowledge are of no value without charity (v. 2); thirdly, he shows the same for the gifts which pertain to works (v. 3).

The Corinthians had a great desire for the gift of tongues, as will be shown in chap. 14; therefore, beginning with that he says: I have promised to show you a more excellent way; and this is, first of all, clear in the gift of tongues, because, if I speak in the tongues of men, namely, of all, i.e., if I should have the gift through which I could speak in the languages of all men; and for greater abundance he adds: and of angels, but have not charity, I am a noisy gong or a clanging cymbal. He uses the right comparison. For the soul lives through charity, which lives through God, Who is the life of the soul, as it says in Dt (30:20): "He is your life." Hence, too, it says in 1 John (3:14): "We know that we have passed out of death into life, because we love the brethren. He who does not love remains in death."

Correctly, therefore, does he compare speech without charity to the sound of a dead thing, namely, a brass gong and a cymbal, which, although they produce a clear sound, are not living but dead. So, too, the speech of a man without charity, no matter how erudite, is considered dead, because it does not yield merit for eternal life. There is a difference between a sounding brass gong and a tinkling cymbal, because brass, since it is flat, gives forth a simple sound, when it is struck; but a cymbal, since it is concave, when it is struck once, multiplies the sound, which pertains to clanging. To brass, therefore, are compared those who pronounce the truth simply, but to the cymbal those who multiply the truth and present it by adding many reasons and similitudes and by drawing very many connections: all of which, without charity, are regarded as dead.

But it should be noted what is meant by the tongues of angels. For since the tongue is a bodily member and to its use pertains the gift of tongues, which is sometimes called a tongue, as will be clear (c. 16), neither seems to belong to angels, who do not have members. Therefore, it can be said that by angels are understood men with the office of angels, namely, who announce divine things to other men according to Mal (2:7): "The lips of the priest should guard knowledge, and men should seek instruction from his mouth, for he is the angel of the Lord of hosts." Therefore, under this sense, If I speak with the tongues of men and of angels, i.e., not only of the lesser but even of the greater who teach others. It can also be understood of the incorporeal angel, as it says in Ps 104 (v. 4): "Who makes your angels spirits." And although they do not have a bodily tongue, by a likeness the power by which they manifest their thoughts to others can be called a tongue.

But it should be known that in the knowledge of the angelic mind is something about which the higher angels do not speak to the lower, or vice versa, namely, the divine essence, which they all see immediately, God showing Himself to all, as it says in Jer (31:34): "And no longer shall each man teach his neighbor and each his brother, saying, 'Know the Lord.' For all shall know immediately, from the least to the greatest." But in the angelic mind is something about which the higher angels speak to the lower, but not vice versa. Such are the mysteries of divine providence. The higher angels know more of these mysteries, because they see Him more clearly than the lower. Hence, the higher angels instruct and enlighten the lower angels about these things – and this can be called speech. But something is in the angelic knowledge about which the higher speak to the lower, and vice versa. These are the secrets of the heart which depend on free will and are known to God alone and to those with the secret, as it says above (2:11): "For what person knows a man's thoughts except the spirit of the man which is in him"? These reach another's knowledge when the one whose they are reveals them, whether it be a lower or a higher. A manifestation of this kind happens when a lower angel speaks to a higher, not by enlightening but by some form of signification. For in each angel is something which is naturally known by another angel. Therefore, when that which is naturally known is proposed as a sign of that which is unknown, the occult is manifested. And such a manifestation is called speech after the likeness of men who manifest the secrets of their hearts to others by means of sensible words or through other bodily things outwardly apparent. Hence, even things naturally known in angels, inasmuch as they are employed to manifest secrets, are called signs or nods. But the power of manifesting his own concept in this way is called a tongue metaphorically.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25201%2520Corinthians.html'
source_title='Commentary on 1 Corinthians'
