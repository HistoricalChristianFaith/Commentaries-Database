[[commentary]]
quote='''
Second, as to everyone generally: every one that keeps the sabbath from profaning it. And concerning this, he does two things.

First, he sets out the promise, in which he promises restoration of the holy place: I will bring them into my holy mount, namely, as above: come and let us go up to the mountain of the Lord (Isa 2:3); and as to the acceptance of sacrifices: their holocausts, and their victims shall please me: the sacrifice of Judah and of Jerusalem shall please the Lord (Mal 3:4).

Second, he sets out the order of fulfillment, and first, as to the worship of the temple: for my house: the temple which is honored throughout the whole world (2 Macc 3:12); my house shall be called the house of prayer (Matt 21:13; cf. John 2:16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
