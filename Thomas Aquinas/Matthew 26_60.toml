[[commentary]]
quote='''
And they found none, whereas many false witnesses had come in. Behold the failure, in which the innocence of Christ is designated, so that he could say: I have walked in my innocence. For they had always laid snares for Christ, but they found nothing evil. Hence he fulfilled what is found at 1 Peter 2:15: by doing well you may put to silence the ignorance of foolish men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
