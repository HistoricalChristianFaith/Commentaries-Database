[[commentary]]
quote='''
He wishes him mercy in the age to come, when he says, in that day in which the Lord will judge us all, when mercy will be needed, not only in Rome, but at Ephesus. For this he is deserving of God's mercy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
