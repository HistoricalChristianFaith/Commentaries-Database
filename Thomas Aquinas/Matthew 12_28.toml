[[commentary]]
quote='''
But if it is by the Spirit of God that I cast out demons, then the kingdom of God has come upon you. As if to say: He is a fool who rejects what would turn out for his good; but this, namely, to cast out devils, redounds to your good. From this, therefore, you can gather that it is by the Holy Spirit, because the finger of God is the Holy Spirit, as the Son is the hand. Nor is there any invoking, but it is done solely from authority. Hence if it is by the Spirit of God that I cast out devils... But why is the expulsion of devils attributed to the Holy Spirit? Because love and goodness are appropriated to him; therefore, to expel the devil befits no one so well as the person of the Holy Spirit. The kingdom of God has come upon you: (Lk 17:21): "The kingdom of God is within you." And you can know that it is done by Christ and this is to your benefit; therefore he says, upon you. Or another way: The kingdom of God, i.e., God's dominion over men: "For he must first reign until he has put all things under his feet" (1 Cor 15:25). Therefore if the demons are already beginning to be trod under foot, the kingdom and dominion of God has already arrived among you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
