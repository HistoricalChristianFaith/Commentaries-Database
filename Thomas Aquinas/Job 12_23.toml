[[commentary]]
quote='''
As he had said that such alternation of sublimity and dejection happens among particular persons from God, he shows this same thing among all men saying of them, "who brings growth to the races," so that they increase in the great number of men, "and ruin to them," when he destroys them either by wars or pestilence. "And when they have been overturned," either by these things or from the oppression of one or of many who preside unfairly, "he restores them to integrity," for he returns it to a good condition.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
