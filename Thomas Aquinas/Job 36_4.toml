[[commentary]]
quote='''
He precludes someone saying that what he was about to say did not proceed from true science, but false opinion saying, "For truly my discourses are without deceit," for I will not say anything but what is true and accords with true knowledge. So he says, "and I will show you perfect science," the following proofs will convince you because they seem to come from perfect science.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
