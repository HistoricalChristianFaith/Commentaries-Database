[[commentary]]
quote='''
We are to understand that this prosperity lasted until his death, and so the text says, "and he died an old man," which expresses his duration of life, "and full of days," which expresses the prosperity of his life. He indicated his adversity already when he said, "Therefore, I had empty months." (7:3) So his long life indicates his abundance both of the goods of fortune and the goods of grace, which led him to the future glory which endures for ever and ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
