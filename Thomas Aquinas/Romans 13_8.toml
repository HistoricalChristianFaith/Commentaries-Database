[[commentary]]
quote='''
Having shown how believers should observe justice toward superiors, the Apostle now shows how they should behave toward everyone generally. In regard to this he does two things: first, he states his intention; second, he gives a reason, at for he that loves.

First, therefore, he says: it has been stated that you must pay your debts to all, not in part but entirely. And that is what he says: owe no one anything. As if to say: you should pay all you owe to everyone so completely that nothing still owing remains.

And this for two reasons: first, because sin is committed in delaying to pay, as long as a person unjustly holds back what belongs to another. Hence it says in Leviticus: the wages of a hired servant shall not remain with you all night until the morning (Lev 19:13). And the same is true of other debts.

Second, because as long as a person owes, he is in a certain sense a slave and is obligated to the one to whom he owes: the borrower is the slave of the lender (Prov 22:7).

But there are some debts from which a man can never absolve himself. This happens in two ways: in one way on account of the excellence of the benefit for which equal payment cannot be made, as the Philosopher says of honor owed to God or parents, as it says in a psalm: what shall I render to the Lord for all his bounty to me? (Ps 116:12). In another way on account of the debt's cause, which always remains; or even because what is paid is never terminated but always increases as one pays.

For these reasons the debt of fraternal love is paid in such a way that it is always owing. First, because we owe love to our neighbor on account of God, whom we can never recompense sufficiently. For it is said: this commandment we have from him, that he who loves God should love his brother also (1 John 4:2). Second, because the cause of love always remains, namely, being alike in nature and in grace: every animal loves its like, and every person his neighbor (Sir 13:15). Third, because love does not diminish but grows by loving: it is my prayer that your love may abound more and more (Phil 1:9).

Therefore, he says: except to love one another, because the debt of love is paid once in such a way that it always remains under the debt of a precept: this is my commandment, that you love one another (John 15:12).

Then when he says, he who loves his neighbor, he assigns the reason for the statement that we are never released from the debt of love, namely, because the whole fulfillment of the law consists in love. Hence he does three things in regard to this: first, he states his proposition; second, he clarifies it, at for you shall not commit adultery; third, he draws the conclusion intended, at love therefore is the fulfillment of the law.

First, therefore, he says: the reason why we cannot expect to free ourselves from the debt of love, as we do from other debts, is that for he who loves his neighbor has fulfilled the law, i.e., the whole fulfillment of the law depends on love of neighbor.

But this does not seem to be true. For it says in 1 Timothy: the end of the precept is love (1 Tim 1:5). For a thing is made perfect when it attains its end; therefore, the whole perfection of the law consists in love. But love has two acts, namely, the love of God and the love of neighbor; hence the Lord says in Matthew that the whole law and the prophets depend on the two precepts of love: one of which is concerned with the love of God and the other with the love of neighbor (Matt 22:40). Therefore, it does not seem that one who loves his neighbor fulfills the whole law.

The answer is that love of neighbor pertains to love and fulfills the law, when it is a love by which the neighbor is loved for God. So the love of God is included in the love of neighbor, just as the cause is included in its effect. For it says in 1 John: this commandment we have from him, that he who loves God should love his brother also (1 John 4:21). Conversely, love of neighbor is included in love of God, as the effect in its cause; hence it says in the same place: if anyone says, 'I love God,' and hates his brother, he is a liar.

That is why in Sacred Scripture sometimes mention is made only of the love of God, as though it is enough for salvation, as in Deuteronomy: and now, Israel, what does the Lord your God require of you, but to fear the Lord your God, to walk in all his ways, and to love him (Deut 10:12); and sometimes mention is made of love of neighbor: this is my commandment, that you love one another as I have loved you (John 15:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
