[[commentary]]
quote='''
931 He says those who complained said: Is he not the son of Joseph? For since they were earthly minded, they only considered Christ's physical generation, which hindered them from recognizing his spiritual and eternal generation. And so we see them speaking only of earthly things, "He who is of earth is earthly and speaks of earthly things" (above 3:31), and not understanding what is spiritual. Thus they said: How then can he say that he has come down from heaven? They called him the son of Joseph as this was the general opinion, for Joseph was his foster father: "the son of Joseph (as was supposed)" (Lk 3:23).
'''
source_title="Commentary on John, Chapter 6, Lecture 5"
source_url="https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm"
