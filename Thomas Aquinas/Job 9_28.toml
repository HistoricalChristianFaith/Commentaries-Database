[[commentary]]
quote='''
He then expresses the cause of his pain saying, "I was anxious about everything I did." For the cause of pain is great for someone when he has great anxiety about some one thing and yet he falls in the very thing he tries to avoid. However, he experiences great anxiety about everything he does fearing lest he will fall away from justice in some way. This is what he means when he says, "anxious about everything I did." The reason why he was so anxious about everything he did was fear of the severity of the divine judgment. So he says next, "knowing that you do not spare anyone who is delinquent," unless he be converted because as Psalm 7 says, "Unless you will be converted, he will brandish his sword." (v.13)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
