[[commentary]]
quote='''
After these he goes on to enumerate the household servants when he says, "The tenants of my house," who used to serve me, "and maids considered me as a stranger," not caring about my afflictions; "and I have been like a foreigner in their eyes," for they obviously despise me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
