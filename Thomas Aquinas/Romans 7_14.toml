[[commentary]]
quote='''
After showing that the law is neither evil nor productive of an evil effect, the Apostle now proves that the law is good.
In regard to this he does two things:
first, he proves its goodness from the very repugnance to good found in man, a repugnance the law cannot take away;
second, he shows what can take away this repugnance, at unhappy (Rom 7:24).
In regard to the first he does three things:
first, he states his proposition;
second, he proves it, at for that which I work;
third, he draws the conclusion, at I find then a law (Rom 7:21).
In regard to the first he does two things:
first, he asserts the goodness of the law;
second, man's condition, at but I am carnal.
First, therefore he says: we have stated that the law is holy. We said this because we, who are wise in divine matters, know that the law, i.e., the old, is spiritual, i.e., in harmony with man's spirit: the law of the Lord is stainless (Ps 19:7). Or it is spiritual, i.e., given by the Holy Spirit who is called the finger of God in the Scriptures: if by the finger of God I cast out demons (Luke 11:20). Hence it is said: he gave Moses two tablets of stone, written with the finger of God (Exod 31:18).
Yet the new law is not only called spiritual but the law of the Spirit (Rom 8:2), because it is not only given by the Holy Spirit but the Holy Spirit imprints it on the heart in which he dwells.
Then he indicates man's condition, when he says, but I am carnal.
This passage can be interpreted in two ways: in one way so that the Apostle is speaking in the person of a man existing in sin. This is the way Augustine explained it in the book of 83 Questions. But later in a book against Julian he explained it as though the Apostle is speaking in his own person, i.e., of a man in the state of grace.
Let us continue, therefore, by showing how these words and those that follow can be explained under both interpretations, although the second explanation is better.
The first statement, therefore, but I am carnal, is so interpreted that the word I stands for man's reason, which is the chief thing in man; hence each man seems to be his own reason or intellect, as a city seems to be the ruler of the city, so that whatever he does the city seems to do.
But man is called carnal, because his reason is carnal. It is called carnal in two ways: in one way from the fact that it is submissive to the flesh and consents to things to which the flesh urges it: for while there is jealousy and strife among you, are you not of the flesh? (1 Cor 3:3). In this way it is understood of man not yet healed by grace. In another way reason is said to be carnal, because it is under attack from the flesh: the desires of the flesh are against the Spirit (Gal 5:17). In this way, even the reason of a man in the state of grace is said to be carnal. In both cases it is carnal on account of sin; hence he adds, sold under sin.
But it should be noted that the carnality, which implies rebellion of the flesh against the spirit, arises from the sin of the first parent, because this pertains to the inclination to sin derived from that sin. But the carnality which implies submission of reason to the flesh arises not only from original sin but also from actual, through which a man by obeying the desires of the flesh makes himself a slave of the flesh; hence he adds: sold under sin, namely, of the first parent or of the self.
He says, sold, because the sinner sells himself into the slavery of sin as payment for fulfilling his own will: for your iniquities you were sold (Isa 50:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
