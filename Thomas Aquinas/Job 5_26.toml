[[commentary]]
quote='''
Sixth, as to the peace and quiet of death he says, "You shall come to your grave in a ripe old age," in prosperity, not despoiled of your property, "like the stock of grain is reaped in due season," as though not anticipated by a sudden and untimely death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
