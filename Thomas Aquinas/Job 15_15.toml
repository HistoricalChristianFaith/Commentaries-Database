[[commentary]]
quote='''
Second, he attacks the same statement by comparing him to more noble creatures, and so he then says, "Look! Among his holy ones," the angels, "not one is unchangeable," from his own nature, but they can only be turned away from sin because of the gift of divine grace. "And the heavens," which hold the supreme place of purity among bodies, "are not pure in his presence," in comparison to him since they are material, corporeal and changeable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
