[[commentary]]
quote='''
He continues, and a scribe came up. And it seems he came very devoutly; so why does he turn him away? Jerome: "Because he did not have good faith." And this is clear, because he merely called him master; but true disciples called him Lord. Hence John (13:13): "You call me Master and Lord." Again, he wanted to follow him from an evil intent, because he heard that a sign had been performed; so he wished to follow, in order that he, too, might perform signs, as is said of Simon Magus. Chrysostom says that he sinned in another way, namely, by pride, because he drew apart from the others. Hence he regarded himself worthier than the rest. Hilary interprets his words as a question: "Master, shall I follow you?" His fault was that he asked something about which he was certain, and put in doubt something he was supposed to do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
