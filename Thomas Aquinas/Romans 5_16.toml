[[commentary]]
quote='''
Then when he says, and not as it was, he compares Christ's grace to Adam's sin as regards the effect, because not only does each affect many, but Christ's grace had a greater effect than Adam's sin.
And concerning this he does three things.
First, he states his proposition;
second, he clarifies it, at for judgment indeed;
third, he proves it, at for if by one man's offense.
First, therefore, he says: not only does Christ's grace more abound for many than Adam's sin, but it produces a greater effect in them. And this is what he says: and not as it was by one sin, so also is the gift. As if to say: not as great an effect comes to many through the one sin of Adam as comes to many through the gift of Christ's grace. For the effect of a stronger cause is stronger. Hence, since it has been established that grace is stronger than Adam's sin, it follows that it produces a greater effect.
Then when he says, for judgment, he clarifies what he has said: for judgment, i.e., God's punishment, indeed was by one, i.e., by the sin of the first parent, unto condemnation on all men, because they sinned in his sin, as stated above: death passed upon all men, in whom all have sinned (Rom 5:12). But the grace of God, which is given through Christ, is of many offences, i.e., following not only that one original sin but also many actual sins, unto justification, i.e., complete cleansing: and such were some of you. But you were washed, you were sanctified, you were justified (1 Cor 6:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Romans.html'
source_title='Commentary on Romans'
