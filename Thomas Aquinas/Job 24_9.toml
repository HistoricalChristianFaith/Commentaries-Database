[[commentary]]
quote='''
He further increases their fault from the condition of miserable people whom they burden, and so he adds, "They show their power in robbing orphans," whom one should rather have supported, "and despoiled the poor crowd," whom they should rather have assisted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
