[[commentary]]
quote='''
Everyone who hears the word of the kingdom etc. Here he expounds; and because he had made mention of two kinds of earth, he therefore first expounds what he had said about the bad earth, and secondly about the good earth, at but he who was sown upon good ground etc. Likewise, in the bad earth he had set down three differences: some by the wayside, some on rocky ground, some among thorns. And he expounds this. And for an understanding of this you should know that hearing the word of God ought to have one effect, namely, that it be fixed in the heart; hence: blessed is he who meditates on the law of the Lord day and night, Psalm 1:2. Elsewhere: in my heart I have hidden your words, that I may not sin against you. Likewise, another effect is that it be carried through to action. Hence James 1:22: be doers of the word and not hearers only. Now this effect is impeded in some by the first impediment and in some by the second. Regarding the first, it is set down. And it should be known that the text has an interposition, and should be understood thus: everyone who hears the word of the kingdom and does not understand it, the wicked one comes and snatches away what was sown in his heart. And this is he who was sown by the wayside. And why does he not understand? Because the wicked one comes etc. Hence, everyone who hears the word of the kingdom, i.e., of Christ preaching the kingdom of heaven, because Christ preached only the kingdom of God; for Moses preached an earthly kingdom. Hence Peter, in John 6:69: Lord, to whom shall we go? You have the words of eternal life. Some, like unbelievers, do not hear; Isaiah 65:12: I spoke, and you did not hear etc. Some there are who hear; blessed are they who hear the word of God, Luke 11:28. But he does not understand it. The Gloss says: because he hears without affection, and so he does not store it in his heart. Psalm 35:4: he would not understand, that he might do well. And what will become of this one? He is seized by thieves, because his mind is held captive by thoughts, and so it is snatched away; and this is what he says: the wicked one comes, namely, the devil, because wicked not by nature, but by perversity; and snatches away, namely, secretly, by seducing and inducing vain thought, what was sown in his heart, namely, the seed. This is he who was sown by the wayside. "Sown" sometimes designates what is sown, and sometimes the field that is sown; hence when he says what was sown, the seed is understood; but when he says he who was sown, the field is understood. For man is called a field, concerning which field Proverbs 24:27 says: work your field diligently etc. And how is he by the wayside? Because it is not guarded, against Proverbs 4:23: with all watchfulness keep your heart, because life proceeds from it. So a man is said to be sown by the wayside who receives the word but does not guard it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
