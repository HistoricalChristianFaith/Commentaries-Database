[[commentary]]
quote='''
The queen of the South will arise at the judgment with this generation and condemn it because of wisdom, which they refused to receive. It is recorded of her in 1 Kings (10:24) that she came to hear the wisdom of Solomon. She signifies the Church of believers: "At your right hand stands the queen in gold of Ophir." The Church is called queen, because it ought to rule: "A king who sits on the throne of judgment winnows all evil with his eyes" (Pr 20:8). Of the south by reason of the Holy Spirit: "Awake, O north wind, and come, O south wind. Blow upon my garden..." (S of S 4:16). That queen will arise in the judgment with that generation. Note that it does not say she did not sin, but that she was not rebellious. Why? Because she came from the ends of the earth to hear the wisdom of Solomon, as it says in 1 Kings (10:24); and there was no need for you to come from the ends of the earth, because he is here. Hence: behold a greater than Solomon here, because he was a temporal king and a sinner, but here is one innocent and eternal: "His power is an everlasting power which shall not pass away, and his kingdom one that shall not be destroyed" (Dan 7:14).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
