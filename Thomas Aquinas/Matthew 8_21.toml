[[commentary]]
quote='''
He continues, Another of the disciples said to him. The first intruded himself, but this one excuses himself. The reproval of this one is indicated, when he says, Jesus said to him, "Follow me..." Lord, let me first go and bury my father. There is a great difference between this one and the other. He calls him Lord, the other called him Master. The first revealed deceit, the other piety because of the commandment to honor one's father; hence he begged for a delay. Something similar is found in 1 Kings (19:20) concerning Elijah.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
