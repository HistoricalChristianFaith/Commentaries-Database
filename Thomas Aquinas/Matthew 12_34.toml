[[commentary]]
quote='''
You brood of vipers... This is subsumed under the foregoing in various ways depending on the varying explanations. According to Augustine it is an application to the foregoing thus: It has been said, either make the tree good... But you do evil. You are an evil tree and, as such, you do evil, because you cannot say good things. According to others' explanation, he is showing the source from which this malice comes and calls the Pharisees a brood of vipers, because those who are malicious from their youth retain it more firmly; therefore, their malice is called the malice of a viper: "A young man according to his way, when he is old, he will not depart from it" (Pr 22:6). Consequently, it often happens that those with evil parents are readier for evil: "We have known the iniquities of our fathers" (Jer 12:20). Hence it is good for a man to be trained in the good. Also it is the nature of serpents to eject poison with their tongues, and evil men do likewise: "The tongue of a viper will kill him" (Jb 20:16); "They make their tongue sharp as a serpent's" (Ps 140:3). And so he says, How can you speak good? He does not say "do good," but speak, because you are the offspring of a viper, which inflicts injury with the tongue; therefore, since you are imitators of the crime of your fathers, how can you speak good? As if to say: You cannot.

He assigns the reason: first, in general; secondly, in particular (v. 35). He says, therefore: So you are unable to speak good. Why? Because you are evil. Why? Because from the abundance of the heart the mouth speaks, for the word is the messenger of the mind. He says, from the abundance of the heart, because, according to Chrysostom, when a person speaks from malice, it is a sign that greater malice is in the heart, for no one fears what he keeps within. Therefore, when he utters something out of malice, it is a sign that more is within, although he dares not say it. Hence he says, from the abundance of the heart the mouth speaks. And from the abundance of malice within the mouth speaks, and this is true of good and of evil. Hence Jeremiah (20:9): "The Lord's word is in me as a burning fire." In regard to evil it is similar, because from malice some conceive something they cannot keep within: "The spirit within me impels me" (Jb 32:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
