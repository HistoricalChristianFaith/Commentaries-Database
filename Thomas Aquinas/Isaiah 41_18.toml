[[commentary]]
quote='''
808. Third, he sets out the benefit as to abundance of waters in mountainous places: I will open rivers in the high hills, above: there shall be upon every high mountain rivers of running waters (Isa 30:25); and in desert places: I will turn the desert, that is, your land formerly desert: he has turned a wilderness into pools of waters (Ps 106[107]:35).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'

[[commentary]]
quote='''
816. There is the water, of tears poured out: who will give water to my head, and a fountain of tears to my eyes? (Jer 9:1); of baptismal purity: unless a man be born again of water and the Holy Spirit, he cannot enter into the kingdom of God (John 3:5); of spiritual grace: he that believes in me: out of his belly shall flow rivers of living water (John 7:38); of divine wisdom: I, wisdom, have poured out rivers (Sir 24:40); of internal joy: drink water out of your own cistern (Prov 5:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
