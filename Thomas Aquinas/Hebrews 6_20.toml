[[commentary]]
quote='''
325 (cont.). – This, our forerunner, who has entered there, has fixed there; hence, it says in Jn (14:2): 'I go to prepare a place for you.' 'He shall go up that shall open the way before them' (Mic. 2:13). Therefore, he says that Jesus has gone as a forerunner on our behalf within the veil and has fixed our hope there, as it says in the collect of vigil and of Ascension day. Yet because the high priest alone was permitted to enter within the veil (Lev 16), he says that Jesus has entered on our behalf, having become a high priest for ever after the order of Melchizedek. Notice how elegantly the Apostle returns to his main theme. For he had begun to speak of the priesthood and then digressed; but now he returns to it, as is obvious.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Hebrews.html'
source_title='Commentary on Hebrews'
