[[commentary]]
quote='''
"And the governor answering said to them." Here he sets forth the effort by which Pilate strove to release him. And first, he shows by what words he acted for his release; secondly, by what deeds, at "and Pilate seeing that he prevailed nothing." In three ways he strove to free him. First, by comparison; secondly, by his dignity; thirdly, by his innocence. By comparison, because he compared him with a criminal, answering, namely, the petition of the people or of those chief priests who were instigating him: "whether will you of the two to be released unto you? But they said: Barabbas." Which Peter also reproaches the people with, Acts 3:13, saying of Christ: "whom you indeed delivered up and denied before the face of Pilate, when he judged he should be released. But you denied the Holy One and the Just, and desired a murderer to be granted unto you etc."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
