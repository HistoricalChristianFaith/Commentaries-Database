[[commentary]]
quote='''
He places third the loss of exterior things when he says, "He destroyed me on all sides," namely, when all my exterior goods are laid waste, "and I perish," while the adversity lasts, because there is no hope of recovery. So he then places, "and he has taken away my hope like an uprooted tree" for a tree has hope if its branches are cut off that it may grow again as long as its roots stay in the earth. But if its roots are torn out of the earth it must dry out and perish. The same is the true of him, as though his roots had been torn out, he had no hope of recovering temporal prosperity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
