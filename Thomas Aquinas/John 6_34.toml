[[commentary]]
quote='''
Now he considers the acquisition of this spiritual food. First, we see the Jews asking for it; secondly, he shows the way it is acquired (v 35).

We should note with respect to the first, that the Jews understood what Christ said in a material way; and so, because they desired material things, they were looking for material bread from Christ. Hence they said to him, Lord, give us this bread always, which physically nourishes us. The Samaritan woman also understood what our Lord said about spiritual water in a material way, and wishing to slake her thirst, said, "Give me this water" (above 4:15). And although these people understood what our Lord said about food in a material way, and asked for it this way, we are expected to ask for it as understood in a spiritual way: "Give us this day our daily bread" (Mt 6:11), because we cannot live without this bread.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F6.htm'
source_title='Commentary on John'
