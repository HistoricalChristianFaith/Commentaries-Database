[[commentary]]
quote='''
Third, the distinction of the organs takes place. Their strength and consistency comes from the nerves and bones and they are encased externally by skin and flesh. So he says, "With skin and flesh you clothed me, with bones and sinews knit me together."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
