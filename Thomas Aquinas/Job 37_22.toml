[[commentary]]
quote='''
Sometimes shiny objects are discovered in dark places. The Northern region is called dark because of its distance from the sun, and yet much gold is discovered in Northern regions which is one of the most glittering metals. This is caused by heat withdrawing deep into the inner bowels of the earth, because of the chill of the all-encompassing air, it works more efficaciously there to produce gold, and so he says, "Gold will be produced by the wind," as if to say: Gold is more plentiful in the part of the earth blown by the North wind. Just as in the darkness of the Northern region one finds the brilliance of gold, so also in the darkness of the ignorance of this life one finds some of the brightness of divine knowledge, though darkly, and so he says, "and fearful praise from God." For if nothing of divine clarity shone in us, we could in no way praise him. Even more, if the divine truth shone clearly to us as the noon day sun, we would praise him carelessly. But since something of the divine light shines in our knowledge with some darkness, we praise him with dread, as a man does something with dread which he knows he cannot do perfectly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
