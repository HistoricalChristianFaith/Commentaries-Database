[[commentary]]
quote='''
Hence it follows: and he did not work many miracles there; not because he could not, since he was omnipotent, but he did not, because the purpose for which he worked miracles was that they might believe in him. But they held him in contempt, because they interpreted things in a bad sense, and therefore they were not disposed to faith: yet he worked some, so that they might be rendered inexcusable; and therefore he says not many, because he worked some. And this was on account of their unbelief.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
