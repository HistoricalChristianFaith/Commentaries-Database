[[commentary]]
quote='''
715. Woe to you that spoils. In this part, he begins to foretell the destruction of their enemies;

and first, the destruction;

second, the effect of the destruction: the land that was desolate and impassable shall be glad (ch. 35).

The first of these is divided into two parts:

in the first, he foretells the destruction of their principle enemy, namely, the Assyrians;

in the second, that of the other enemies who were helping them: come near (ch. 34).

Concerning the first, he does two things:

first, he foretells the destruction of the Assyrians;

in the second part, that of the ungrateful Jews: your tacklings are loosed (Isa 33:23).

Concerning the first, he does two things:

first, he foretells the destruction of the Assyrians;

second, he invites all to the consideration of such a fact: hear (Isa 33:13).

Concerning the first, he does two things:

first, he foretells the punishment which Assyria received from God;

second, that which they themselves inflicted: behold they that see (Isa 33:7).

716. Concerning the first, he does three things.

First, he threatens the destruction of the Assyrians, setting out a question: shall not you yourself also be spoiled, and the answer: when you shall have made an end, you shall be spoiled: being wearied; as if to say: affected by tedium from so many victories: with what measure you mete, it shall be measured to you again (Matt 7:2); he that shall kill by the sword (Rev 13:10), shall be killed by the sword.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
