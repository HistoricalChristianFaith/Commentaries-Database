[[commentary]]
quote='''
You obtain fruit from this patience because from it our hope for you is unshaken by the fact that you are made heirs of eternal life: "Suffering produces endurance, and endurance true hope" (Rom. 5:3-4): "Hope in God becomes firmer to the extent that one suffers more difficult things for his name. For as a result of the sufferings the saints endure for Christ, the hope of eternal life rises in them" (Gregory). And the cause of this hope is knowing that as you share in our sufferings, you will also share in our comfort, i.e., in eternal life: "The saying is sure: If we have died with him, we shall also live with him; if we endure, we shall also reign with him" (2 Tim. 2:11-12); "But rejoice in so far as you share Christ's sufferings, that you may also rejoice and be glad when his glory is revealed" (1 Pet. 4:13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
