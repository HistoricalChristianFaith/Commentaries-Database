[[commentary]]
quote='''
Since Job seemed to lament not only that God had not spoken to him, but also that he could not approach to have a discussion with God and to plead his case before him, (cf. 23:3) Eliud therefore wants to make a satisfactory answer to this question. Although the approach to God does not clearly lie open to a man, the angels still are the mediators between God and men, who propose the justice of man to God not to teach him, but to help men in their desires. So there is no lack in man if he is unable to approach the divine throne through his own powers without aid to propose the justice of his cause to him. To prove this he says, "If there should be for him," for the afflicted man, "an angel who speaks," intercedes, and lest it be feared that one angel would not suffice to intercede for all, he then says, "one of the thousands [according to what the text already said, 'can one number his hosts?' (25:3)] to announce the justice of the man," to propose in the presence of God whatever is just on the part of a man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
