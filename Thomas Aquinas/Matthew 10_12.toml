[[commentary]]
quote='''
As you enter the house, salute it. Here he speaks of saluting the host: first, he mentions the salutation; secondly, the effect (v. 13). For it was fitting that they minister spiritual things to those who ministered temporal things, and not only spiritual things but things necessary for salvation by saying, Peace be to this house. And this was a suitable greeting, because the world was in conflict; but in Christ the world was reconciled. For they were the Lord's legates, and to what end? Certainly for peace; therefore, this greeting was suitable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
