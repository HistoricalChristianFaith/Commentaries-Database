[[commentary]]
quote='''
Here begins the epistolary message, in which first, he warns him against present persecutions; second, against coming dangers of the Church, at know also this (2 Tim 3:1). In regard to the first he does two things: first, he exhorts him to keep busy with preaching, which was then the cause and occasion of persecution; second, he urges him to endure tribulations for Christ, at you, therefore, my son (2 Tim 2:1). In regard to the first he does three things: first, he reminds Timothy of his gifts; second, he urges him to make good use of these gifts by being instant in preaching, at for which cause I admonish you (2 Tim 1:6); third, he cites himself as an example: wherein I am appointed a preacher and an apostle and teacher (2 Tim 1:11). In regard to the first he does two things: first, he mentions the love he had for Timothy; second, he mentions the good points which called forth this affection, at being mindful of your tears.

His affection was shown in two things: prayer and desire; hence he thanks God for the love he bears toward Timothy, because it is the love of charity, which is a special gift. As if to say: I consider myself the recipient of a grace to have such a sincere love for you. And he says, to my God whom I serve from my forefathers, not from carnal parents, because Christ came to save sinners, of which I am the chief (1 Tim 1:15), with a service derived from my forefathers, namely, the patriarchs and prophets, who served God sincerely. And he says, from my forefathers, because sons more readily imitate the greatness of their father, both because they are instructed by them, as Tobias was, and because they more readily imitate friends. And how have I served him? With a pure conscience, because, as it is said: your eyes are too pure to behold evil, and you canst not look on iniquity (Hab 1:13); for our glory is this, the testimony of our conscience (2 Cor 1:12). For this he gives thanks that without ceasing in the day of prosperity or the night of adversity I have a remembrance of you in my prayers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Timothy.html'
source_title='Commentary on 2 Timothy'
