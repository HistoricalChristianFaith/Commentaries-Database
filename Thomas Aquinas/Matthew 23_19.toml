[[commentary]]
quote='''
Then he sets forth the refutation: ye blind, which is greater, the gift or the altar that sanctifies the gift? For the gift is not sanctified except by the altar.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
