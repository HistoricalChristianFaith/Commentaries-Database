[[commentary]]
quote='''
That providence extends even to brute animals, who do different things according to different times by natural instinct, and so he says, "The beast will enter its lair," in rainy weather, "and will remain in its cave," for a fitting time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
