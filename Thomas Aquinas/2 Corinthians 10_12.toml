[[commentary]]
quote='''
Then when he says, Not that we venture, he indicates the reason behind what he says, saying: I say that we are not like the false apostles, nor is the charge they lay against us true, because I do not say any more than I have to say. Hence, he says: Not that we venture, i.e., say that we are one of them, to class or compare ourselves with, i.e., make ourselves like some, that is, the false apostles who commend themselves to you only. And yet they are not commended by others and by their deeds contrary to what is stated in Prov. (27:2): "Let another praise you, and not your own mouth; a stranger, and not your own lips." But when they measure themselves by one another, and compare themselves with one another, they are without understanding. But we measure ourselves against ourselves, i.e., according to what is in us we measure our deeds and our statements. As if to say: we say things about ourselves that are proportionate to ourselves, i.e., in keeping with our deeds: "But let each one test his own work, and then his reason to boast will be in himself alone and not in his neighbor" (Gal. 6:4).

But on the other hand, he said above (4:2): "We would commend ourselves to every man's conscience in the sight of God." Therefore, it was not proper for him to say what he did. I answer that it is one thing to commend himself to their conscience and another to their ears. For we commend ourselves to their ears by words alone; and this is evil. The Apostle and just men commend themselves in the first way; but in the second way the false apostles and hypocrites.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%25202%2520Corinthians.html'
source_title='Commentary on 2 Corinthians'
