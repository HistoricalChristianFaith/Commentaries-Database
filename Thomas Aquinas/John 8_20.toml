[[commentary]]
quote='''
The Evangelist shows the security with which Christ answered when he says, Jesus spoke these words in the treasury. We see the first from the place where he taught, that is, in the treasury (gazophylacium) and in the temple. For gaza is the Persian word for "riches," and philaxe for "keep." Thus gazophylacium is the word used in Sacred Scripture for the chest in which riches are kept. It is used in this sense in 2 Kings (12:9): "And Jehoiada the priest took a chest (gazophylacium) and bored a hole in its top, and put it by the altar, to the right of those coming into the house of the Lord. And the priests who kept the doors put into it all the money that was brought to the temple of the Lord." Sometimes, however, it was used to indicate the building where riches were kept; and this is the way it was used here.

We can also see Christ's security from the fact that those who had been sent to arrest him could not do so, because he was not willing. Thus the Evangelist says, and no one arrested him because his hour had not yet come, that is, the time for him to suffer, an hour not fixed by fate, but predetermined from all eternity by his own will. Thus Augustine says: "His hour had not yet come, not in which he would be forced to die, but in which he would not refuse being killed."

We may note, according to Origen, that whenever the place where our Lord did something is mentioned, this is done because of some mystery. Thus Christ taught in the treasury, the place where riches were kept, to signify that the coins, that is, the words of his teaching, are impressed with the image of the great King.

Note also that when Christ was teaching, no one arrested him, because his words were stronger than those who wanted to seize him; but when he willed to be crucified, then he became silent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520John%2F8.htm'
source_title='Commentary on John'
