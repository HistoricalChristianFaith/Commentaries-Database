[[commentary]]
quote='''
He posits as a fourth bitter thing the shortness of his life. So he then says, "He will perish before his days are complete," since he will die before his time may be completed, "and his hands will dry up," for his sons and his relations will fail.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Job.html'
source_title='Commentary on Job'
