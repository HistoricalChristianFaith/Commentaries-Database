[[commentary]]
quote='''
And he said to him: "All these I will give you..." In those words he does two things: he promises one thing and seeks to obtain another. In the promise is a lie, and in the seeking is pride. In the first two temptations the devil was exploring whether he was the Son of God; now, believing that he had discovered he was not, he says All these I will give you... where the lie is that these were not in his power: "By me princes rule and nobles govern the earth" (Pr 8:16); "That the living may know that the Most High rules the kingdom of men and gives it to whom he will" (Dan 4:17); otherwise, he would not have said all these I will give you; for no evil person rules without God's permission: "He makes a godless man to reign on account of the sins of the people" (Jb 34:30).

Note three things:

First, that the devil always pursues his original objective: "I will ascend into heaven above the stars of God; I will set my throne on high: I will sit on the mount of assembly in the far north; I will ascend above the heights of the clouds; I will make myself like the Most High" (Is 14:14). And for that reason he induces men to idolatry, desiring to usurp what belongs to God.
Likewise, note that no one adores the devil, unless he falls as he fell: "They fell down and worshipped the golden image" (Dan 3:7). And therefore, he says if you will fall down and worship me.
Thirdly, note greed here. Hence, he promises a kingdom, by which is understood abundance of riches and excellence of honors. And he asks that he fall down, because the ambitious always humble themselves more than they ought. Hence Ambrose: "Ambition has its own danger: it bends down in deference in order to be paid honor; and while it wishes to be exalted, it is hurled down."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCommentary%2520on%2520Matthew.htm'
source_title='Commentary on Matthew'
