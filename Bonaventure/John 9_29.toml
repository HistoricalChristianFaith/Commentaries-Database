[[commentary]]
quote='''
We know that God spoke to Moses, as is said in Exodus and Leviticus almost throughout: Exodus thirty-three: "The Lord spoke to Moses face to face." But as for this man, we know not whence he is: therefore we are disciples of the one whom the Lord approves. But nevertheless they spoke falsely, because, as is said above in chapter five, "if you believed Moses, you would perhaps believe me also." And in this cursing they do not prevail against the blind man; rather he refutes the reasoning of their curse in this, that they said they did not know Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
