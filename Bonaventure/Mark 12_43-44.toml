[[commentary]]
quote='''
Again, in Mark 12 the Lord says of the widow: Amen I say to you, that this poor widow has put in more than all. For all cast in of their abundance; but she of her want cast in all that she had, her whole living: but in this the poor widow is praised: therefore those who do this, the more perfectly they act, the more praiseworthy they are: therefore etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
