[[commentary]]
quote='''
And when she had said these things. Having set forth the faithful confession of Martha, there is set forth here the faithful confession of Mary. First is set forth the haste of Mary when called, in which is signified repose and devotion in Mary: repose, because she did not come unless called by Martha; for this reason he says: And when she had said these things, she went and called her sister Mary in silence. Lamentations 3: "It is good to wait in silence for the salvation of God." She called her, I say, by the command of the Lord: Revelation, last chapter: "And let him who hears say: Come." And this is indicated because she called, saying: The Master is here and calls you. Although this was not previously stated for the sake of brevity, nevertheless it must be understood to have been so. Job 14: "You will call me, and I will answer you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
