[[commentary]]
quote='''
Now the authority of Truth subjoined the confutation of the accusers, and he notes this when he adds: And Jesus answering them, said. Now Truth confounds the Pharisees and defends the disciples by the authority of Scripture and also by his own. By the authority of Scripture he shows that the commandment concerning the Sabbath did not bind in a case of necessity: and this he shows by the example of David, which he intimates when he says: Have you not read this? and if you have read it, you have not understood: Job 4: "Because no one understands, they perish forever"; or if you have read it, you have not remembered, according to that of Ezekiel 7: "The Law shall perish from the priest, and counsel from his elders," as if to say: you, who are zealots of the Law, ought to have read, not to be ignorant, lest that of John 3 could be said to you: "You are a teacher in Israel, and you do not know these things"? And truly they ought to have read it, because the deed was very notable, namely what David did, when he himself was hungry and those who were with him.

But the contrary of this saying seems to appear in 1 Kings 21: "Why have you come alone, and no one is with you"? But it says that because he did not have a noble company, since he was "the king's son-in-law" and a great prince. Whence it is added in the same place that "the vessels of the young men were holy." Therefore he had company, although not so great or notable: and those were his companions in the deed, so that they cannot say that it was done on account of a special privilege.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
