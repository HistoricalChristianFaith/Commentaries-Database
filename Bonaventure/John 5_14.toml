[[commentary]]
quote='''
"Afterward Jesus found him in the temple," namely when he had withdrawn from the crowd. Augustine: "Placed in the crowd he did not recognize Jesus, but afterward in the temple": in which we are taught that whoever wishes to attain the vision of God should flee the crowd of his own affections and the wickedness of men and approach the temple of interior prayer. Hence at the raising of the girl he commanded the tumultuous crowd to be cast out, Matthew 9. And because the Lord's mercy anticipates us, he does not say that he himself found Jesus, but that Jesus found him: whence he did not even recognize him except through the instruction which he gave. Therefore he adds: "Jesus says to him," instructing as a good physician: "Behold, you have been made well," he recalls the benefit: now "sin no more," he dissuades from sin: "lest something worse befall you," he threatens with danger: Luke 11: "The last state of that man became worse than the first."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
