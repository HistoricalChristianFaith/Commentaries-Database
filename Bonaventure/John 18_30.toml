[[commentary]]
quote='''
"They answered and said to him: If this man were not an evildoer, we would not have delivered him to you," wishing to observe that law: "The innocent and the just you shall not put to death," Exodus 23, as if they were saying: he is an evildoer. They do not prove it, but falsely charge him. Augustine: "Let those freed from unclean spirits answer, let the sick who were healed answer, whether Jesus is an evildoer. But these things were said by those of whom he had foretold through the Prophet: They repaid me evil for good." Job 36: "Your cause has been judged as that of the wicked."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
