[[commentary]]
quote='''
Seventh, as to commending the discernment of providence, it is added: And the master commended the steward of iniquity, because he had acted prudently: The Gloss: "He praises him not for fraud, but for prudence, although he was sinning." Whence, although the steward has some blameworthy qualities in himself, nevertheless his manner of providing can be drawn as an example for the good. For just as the serpent is detestable in spreading venom, but in the prudence of guarding its head is worthy of imitation by perfect men — on account of which it is said in Matthew 10: "Be prudent as serpents and simple as doves" — so this steward is to be detested because he committed fraud, by reason of which he is called the steward of iniquity, and is to be praised because he prudently devised a remedy for himself against danger.

And because someone might wonder why the Lord drew such a steward as an example of prudence, the Evangelist, responding to this, adds: Because the children of this world are more prudent than the children of light in their generation. He does not say that they are more prudent simply speaking, but more prudent in those things that pertain to carnal generation, just as the owl and the cat see more clearly at night than a man—not for reading letters, but for catching mice.

There is, however, a prudence of the spirit, which is in the children of light, more excellent than the prudence of the flesh, which is in carnal men, according to that passage in Romans 8: "The prudence of the flesh is death, but the prudence of the spirit is life and peace." Yet this worldly prudence has something that arouses and instructs toward divine prudence, just as the diligence of a man seeking money is proposed as an example to a man seeking wisdom; Proverbs 2: "If you call upon wisdom and incline your heart to prudence, if you seek her as money and dig for her as for treasures, then you will understand the fear of the Lord and will find the knowledge of God." Whence, because no vice destroys the last vestiges of nature, every vicious person has something that can arouse the just to good, just as from the consideration of a lascivious man one can arouse oneself to love, from the consideration of a miser to diligence, from the consideration of a proud man to magnanimity. — Whence from this parable and example we are instructed not only particularly but also universally, so that from all things we may know how to draw out a lesson that arouses and forms us toward the good. For just as the Saints, by their excellent goodness, ought to have and do have testimony from those who are outside, so all base things bear some image of virtue and piety. Virtue is approved by all with a certain universal voice, but the impious man is condemned by all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke, Chapter 16'

[[commentary]]
quote='''
The children of the world are sometimes distinguished from the children of light, as in Luke 16: The children of this world are more prudent than the children of light, etc.; sometimes they are distinguished from the children of the other world or of the resurrection, as in Luke 20. In the first way, the children of this world are called those who conform themselves to this world and love it above all: and thus it has the sense of vice. In the second way, the children of this world are called those who live in this world, or pass away with the world; and thus it has the sense of infirmity. Whence from this it is not established that marriage is blameworthy, but that it has an infirmity attached to it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25203.html'
source_title='Disputed Questions on Evangelical Perfection, Question 3'
