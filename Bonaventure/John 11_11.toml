[[commentary]]
quote='''
These things he said, and after this he said to them. Here the second point is touched upon, namely the necessity of coming on account of Lazarus, who, being dead, could not be raised except by him. Therefore he says: Lazarus our friend sleeps: but I go, that I may awaken him from sleep: he speaks most properly, because for God to die is to sleep; whence Augustine says: "To men he was dead, who could not raise him: but to the Lord he was sleeping, who awakened him from the tomb with such ease as you do not use to awaken one sleeping from a bed"; therefore the Lord said in Matthew 9: "The girl is not dead, but sleeps." But the disciples did not understand this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
