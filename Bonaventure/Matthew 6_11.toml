[[commentary]]
quote='''
Those things which pertain to the passage of the journey regard either the bestowal of a benefiting good or the removal of a harming evil. The bestowal of a benefiting good is asked for in the daily or supersubstantial bread, in which is asked whatever is necessary for the preservation of present life, whether according to spirit or according to body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
In the fourth part, the refreshment of eternal strength is sought, and this through the gift of strength or fortitude, when he says: "Give us this day our daily bread." "Bread strengthens the heart of man."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"

[[commentary]]
quote='''
Likewise, no one ought to entirely reject that which he daily asks of God; but every day we ask in the Lord's Prayer for our daily bread: therefore he acts wrongly who abandons everything.

To that which is lastly objected, that we ask for our daily bread in the Lord's Prayer, it must be said that this rather makes for the opposite than for the proposition. For from the fact that we daily ask for our daily bread, and do not ask for what we already have, it is manifest that it belongs to evangelical perfection to be content with daily sustenance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
