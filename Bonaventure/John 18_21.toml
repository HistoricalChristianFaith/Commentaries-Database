[[commentary]]
quote='''
"Why do you ask me," since you do not believe me and can learn from others? "Ask those who heard what I spoke to them," so that you may believe them: for "behold, these know what I have said." Chrysostom: "These are not the words of one being bold, but of one confident in the truth of what had been said"; Proverbs eight: "All my words are righteous: there is nothing crooked or perverse in them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
