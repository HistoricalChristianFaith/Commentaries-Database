[[commentary]]
quote='''
Third, as regards showing kindness, he adds: And into whatever house you enter, first say: Peace to this house: so that it may appear that you are men who love and announce peace, according to that passage of Isaiah 52: "How beautiful upon the mountains are the feet of him who announces and preaches peace"! This peace the Lord made, according to that passage of Colossians 1: "Making peace through the blood of his cross," etc.: the Lord also left it: John 14: "Peace I leave to you, my peace I give to you"; the Lord announced it; John 20: "Jesus stood in the midst and said to them: Peace to you"; the Lord commanded and proclaimed peace, as is said in Ephesians 2: "Coming, he proclaimed peace to you who were far off, and peace to those who were near."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
