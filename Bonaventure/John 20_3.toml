[[commentary]]
quote='''
Simon Peter therefore went out. Here is noted the solicitude of the disciples, both in the swiftness of running and in the carefulness of examining. They were therefore solicitous, because, having heard that he had been taken away, they came quickly; whence he says: Simon Peter therefore went out, and that other disciple, and they came to the tomb; this is said by anticipation, that is, they set out on the journey to come to the tomb.

Question. Why is it that these alone ran, and not the others? It must be said that either because it was reported to these alone; or, as Gregory says, "those ran before the rest who loved before the rest."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
