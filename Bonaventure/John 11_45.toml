[[commentary]]
quote='''
Many therefore of the Jews. Here the fourth point is touched upon, namely the edification of some and the destruction of others. On account of those who were edified unto faith, he says: Many therefore of the Jews, who had come to Mary and Martha and had seen what he did, believed in him. Who had come: Proverbs 13: "He who walks with the wise shall be wise"; above in chapter 4: "Many believed in him," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
