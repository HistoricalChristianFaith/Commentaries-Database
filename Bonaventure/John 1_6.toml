[[commentary]]
quote='''
"There was a man sent from God, whose name was John." He treated above of the Word according to the excellence of the Divinity; in this part he treats according to the assumption of humanity. And because this assumption was made for our salvation, which was accomplished through the passion and consummated through the resurrection, therefore this part has three parts. In the first he treats of the incarnation; in the second of the passion; in the third of the resurrection.

The arriving forerunner is therefore described by four conditions, namely by nature, by authority, by name, by office. By nature, when it says: "There was a man": the Gloss: "A man, not an Angel, as the heretics would have it." The heretics said this on account of that passage in Malachi 3: "Behold, I send my Angel before your face, who will prepare the way before you." But "Angel is there a name of office, not of nature." By authority he is described, when it adds: "Sent from God," not from man, not from himself: Romans 10: "How shall they preach unless they are sent?" Against which it is said of the false prophets in Jeremiah 23: "They were running, and I did not send them." By name he is described, when it says: "Whose name was John." This name was authoritative, because it was not imposed by man but by God; in Luke 1 it was said to Zechariah: "Elizabeth, your wife, will bear you a son, and you shall call his name John."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
