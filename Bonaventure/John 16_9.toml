[[commentary]]
quote='''
Of sin indeed, because they did not believe in me: and this is the sin of unbelief, concerning which above in chapter 8: "You shall die in your sin; for if you do not believe that I am, you shall die in your sin."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
