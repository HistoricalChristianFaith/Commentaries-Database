[[commentary]]
quote='''
Therefore the doubt arising from hearing incited them to seek certainty through sight; on account of which he adds: But Peter rising up ran to the tomb, and stooping down he saw the linen cloths laid by themselves, and he went away, wondering within himself at what had happened. Now Luke narrates these things specifically about Peter, to show that he had not abandoned his fervor. But John narrates this more expressly in chapter twenty, that not Peter alone went, but also John; and that "they ran together," and that "John ran ahead more quickly than Peter, but did not enter the tomb first." Luke therefore narrates that Peter, stooping down, saw the linen cloths laid; but John pursues more expressly that he not only saw these things, but also "entered the tomb," and yet, as is said here, he went away wondering within himself, not yet believing, because it is said in John chapter twenty: "For as yet they did not know the Scripture, that he must rise from the dead."

And it should be noted that by the linen cloths laid are understood the mysteries of the humanity, which have been set forth for us to believe and understand through the mystery of the resurrection; hence Revelation chapter five: "Behold, the lion of the tribe of Judah has conquered, to open the book and to loose its seven seals." But because not all things can be comprehended by reason of the united Divinity, therefore it is said that he went away wondering. For it is said in the Psalm: "Your knowledge is become wonderful beyond me." And therefore, in designation of this, it is said in John chapter twenty that "the cloth which had been upon the head of Jesus, he saw not laid with the linen cloths, but separately rolled up in one place." There the Gloss: "The incomprehensible mysteries of the Divinity are removed from the knowledge of our infirmity; for in what is rolled up neither beginning nor end is seen, so the loftiness of the Divinity neither began to be nor ceased to be." And therefore Peter went away wondering; the Psalm: "Wonderful are your works, and my soul knows it exceedingly."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
