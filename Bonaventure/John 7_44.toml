[[commentary]]
quote='''
"But certain ones from among them," namely the officers, "wished to apprehend him," according, that is, to the command given to them; above in the same chapter: "The Pharisees and the chief priests sent officers to apprehend Jesus." "But no one laid hands on him," because God sent his hand; the Psalm: "Send forth your hand from on high"; and thus they were frustrated in their intention. And the reason for this is that "the thoughts of men are vain," but "the counsel of the Lord stands forever," which had not yet decreed that Jesus Christ should be apprehended; the Psalm: "The Lord scatters the counsels of the nations, and reproves the thoughts of the peoples and reproves the counsels of the princes."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
