[[commentary]]
quote='''
And because the word was hidden, it is added: And they did not understand: First Corinthians 2: "We speak wisdom hidden in mystery"; and Tobit 12: "It is good to hide the secret of a king." In this, however, that Christ, when he was corrected, humbly excused himself, and when he was invited by his Mother to perform a miracle, responded harshly, he gave us an example and pattern of humility, so that we should prefer to be corrected rather than praised: Ecclesiastes 7: "It is better to be corrected by a wise man than to be deceived by the flattery of fools." At the same time he also intimated by this that piety toward God is to be preferred to piety with respect to parents.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
