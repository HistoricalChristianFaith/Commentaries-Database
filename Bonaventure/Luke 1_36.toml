[[commentary]]
quote='''
He adds the proof or confirmation when he says: Behold, Elizabeth, your kinswoman, she also has conceived a son in her old age. If therefore God gave conception to an aged woman, he can also give it to a young woman, although the latter is new while the former had already occurred: Genesis 21: "Sarah conceived and bore a son in her old age." — So that the Virgin may be more firmly assured, it is added: And this is the sixth month for her who is called barren. And thus, since her barrenness was manifest, her fruitfulness is now manifest. Now therefore signs and wonders begin to be wrought on earth, according to Sirach 36: "Renew signs and work new wonders." And therefore it is firm and certain that you also, O Virgin, shall now conceive above nature; and this is what Bede says in the Gloss: "Lest the Virgin despair of giving birth, she receives the example of a barren and aged woman about to bear, so that she may learn that all things are possible to God which seem contrary to the order of nature." And therefore the Lord sent beforehand so many conceptions of barren women, so that they might prefigure this conception, and by prefiguring, foretell it, and by foretelling, give testimony to it and make it credible.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
