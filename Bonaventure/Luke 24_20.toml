[[commentary]]
quote='''
Because therefore Christ Jesus had been perfect in every way, there was therefore great matter for grief concerning his condemnation by the rulers of the Jews; and therefore he adds: And how our chief priests and rulers handed him over to the sentence of death and crucified him. For this was true, although the deed outwardly appeared to have been done by the hand of Pilate; hence John 18: "Your nation and your chief priests have handed you over to me"; and thus there was cause to grieve over so great a sacrilege and so great a crime of the rulers; there was also cause to grieve over the common loss.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
