[[commentary]]
quote='''
They therefore took away the stone, in which act a manifestation was already made that the Lord wished to raise him: therefore then they believed and merited to obtain: whence it is said to Mary in Luke 1: "Blessed are you who believed, because the things that were spoken to you by the Lord shall be fulfilled in you." But Jesus, lifting up his eyes, etc. Here the third point is touched upon, namely the power of being heard in Christ, which is intimated from his words, in which he shows that he was heard and is always heard and does not ask the Father out of powerlessness: on account of which he says: But Jesus, lifting up his eyes to heaven, said: Father, I give you thanks, because you have heard me: he gives thanks for the hearing, not because the Father heard him then and not at other times.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
