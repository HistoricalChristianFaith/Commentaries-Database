[[commentary]]
quote='''
A vessel therefore was set there. Here is set forth the consummation itself, by which they gave him vinegar to drink, which indeed they had at hand; whence he says: A vessel therefore was set there full of vinegar; and they, placing a sponge full of vinegar around hyssop, that is, placing the sponge bound around hyssop, offered it to his mouth, by means of a reed, as is said in Matthew twenty-seven: "One of them running and taking a sponge filled it with vinegar and put it on a reed and gave him to drink."

It is asked about this, that they immediately had vinegar prepared in this way; how this came about. Did they know that he would ask for drink? To this some say that they had brought wine to drink, which on account of the heat had turned into vinegar. Others say that they had deliberately brought vinegar, so that by drinking it he would die more quickly. Others say that it was myrrhed wine, which was most bitter and sharp like vinegar, to torment him further who was already crucified. Whence they say that then also Scripture was fulfilled: They gave gall for my food, and in my thirst they gave me vinegar to drink.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
