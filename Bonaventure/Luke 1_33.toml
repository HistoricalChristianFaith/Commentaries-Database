[[commentary]]
quote='''
Eternal power he notes, when he says: And he shall reign in the house of Jacob forever, according to what was promised to David, according to that passage of 2 Kings 7: "I will raise up your seed, which shall come forth from your womb, and I will establish his kingdom: and I will make firm the throne of his kingdom forever." Daniel 7 says this same thing: "His power is an everlasting power, which shall not be taken away, and his kingdom, which shall not be destroyed."

But to show that this eternity is properly spoken of through the absence of an end, he adds: And of his kingdom there shall be no end: so that that passage of Isaiah 9 might be fulfilled: "He shall sit upon the throne of David and upon his kingdom, to confirm it and strengthen it in judgment and justice, from henceforth and forever." And therefore the Psalmist rightly says: "Your kingdom is a kingdom of all ages, and your dominion endures throughout every generation."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
