[[commentary]]
quote='''
Now Jesus loved Martha and her sister Mary and Lazarus. He loved them because they loved him, according to that text of Proverbs 8: "I love those who love me"; nor is it a wonder, because, Wisdom 11, "you love all things that are, O Lord, and you hate nothing of what you have made."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
