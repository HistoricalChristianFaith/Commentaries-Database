[[commentary]]
quote='''
These things were done, that the Scripture might be fulfilled: You shall not break a bone of him, Exodus 12: and therefore they did not break his legs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
