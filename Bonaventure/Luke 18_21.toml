[[commentary]]
quote='''
And since these commandments do not justify through simple knowledge, but through experiential observance, therefore the Lord was not asking about simple knowledge when He said: You know the commandments, but about experiential knowledge, because, as is said in Romans 2, "not the hearers of the law, but the doers of the law are just before God." Therefore this lawyer responds as one who understands, when it follows: Who said: All these things I have kept from my youth: and this indeed according to the counsel of the Wise Man in Proverbs 3: "My son, do not forget my law, and let your heart keep my precepts; for they shall add to you length of days and years of life and peace"; because it is said in Ecclesiastes 8: "He who keeps the commandment shall experience no evil."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
