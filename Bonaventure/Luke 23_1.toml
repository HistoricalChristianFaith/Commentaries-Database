[[commentary]]
quote='''
First, therefore, as regards the wicked accusation, he says: And the whole multitude of them arose and led him to Pilate. The multitude came so that him whom they could not overcome by reason, they might at least conquer by numbers: Wisdom 4: "The manifold multitude of the ungodly shall not be profitable." And therefore it is dangerous to mingle with such a multitude; on account of which, Ecclesiasticus 7: "Do not sin in the multitude of the city, nor cast yourself into the people," because, Ecclesiasticus 21, "the congregation of sinners is like tow gathered together, and their end is a flame of fire."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
