[[commentary]]
quote='''
And Peter said to him. After he had invited all to vigilance in general, here he invites prelates in particular. This indeed he does in this order. For first he commends the vigilance of prelates: second, he reproves insolence, there: But if that servant shall say etc.; third, he aggravates negligence, there: But that servant who knew.

Commending then the vigilance of prelates, first he commends it with respect to the prerogative of merit; second, with respect to the excellence of the reward; there: Blessed is that servant.

He shows the first in responding to the question of Peter, when he says: And Peter said to him: Lord, do you speak this parable to us, or to all? He asks well and usefully, that he might know to what he ought to be obligated: hence Sirach three: "The things that God has commanded you, think upon those always"; and especially those things are to be learned which are spoken in parables: Proverbs one: "The wise man hearing will be wiser. He will discern parables and their interpretation, the words of the wise and their riddles."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
