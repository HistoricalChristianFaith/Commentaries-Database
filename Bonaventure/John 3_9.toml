[[commentary]]
quote='''
Here the third point is touched upon, namely the manner of understanding this spiritual regeneration, which because Nicodemus did not possess, he therefore doubts and inquires; whence he says: Nicodemus answered and said to Him: "How can these things be?" And in this the diligence of Nicodemus is noted, who did not cease from inquiring until he understood. Chrysostom: "If the Jews had heard, they would immediately have departed in derision"; and therefore he who was moved through the captivation of the intellect and through faith deserves to be more fully instructed by the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
