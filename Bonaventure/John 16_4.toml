[[commentary]]
quote='''
But these things I have spoken to you, that when the hour of them shall come, in which they will persecute you, you may remember that I told you. Remembrance and memory of the words of God avails greatly for enduring all evils; conversely, forgetfulness is harmful: therefore Deuteronomy 8: "Beware lest you forget the Lord your God and neglect his commandments." The recollection of God's words raises up and directs a person; whence it is said in Matthew 26: "Peter remembered the word of Jesus, and going out, wept bitterly"; the Psalm: "All the ends of the earth shall remember and shall be converted to the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
