[[commentary]]
quote='''
And the wine failing. Here is touched upon the second point, namely the obtaining of the miracle, which was done by the Mother having compassion on the bridegroom's want. Therefore he says: And the wine failing, the Mother of Jesus says to him: They have no wine; as if to say: From your abundance supply their want; for she knew that he was "rich in mercy" and power, although he appeared poor: 2 Corinthians 8: "Though he was rich in all things, he became poor for our sake."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
