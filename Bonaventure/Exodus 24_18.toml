[[commentary]]
quote='''
Christ was such a Center in His ascension. It is written in Exodus: "Moses passed into the midst of the cloud, and there he stayed for forty days and forty nights." And this is what Christ was in His ascension.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'
