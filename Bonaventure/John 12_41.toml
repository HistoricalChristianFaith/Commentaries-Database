[[commentary]]
quote='''
Isaiah says, in chapter six, in a vision which was the root of all his other visions: "I saw the Lord seated on a high and lofty throne." And immediately there follows upon this the blinding of the Jews and the enlightenment of the Gentiles. Hence, John says: When he saw the Lord, Isaiah said again: "He has blinded their eyes, and hardened their hearts." Hence the enlightenment of the Gentiles became the blinding of the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25208.html'
source_title='Collations on the Hexaemeron, Collation 8'

[[commentary]]
quote='''
These things Isaiah said, when he saw his glory and spoke of him; Isaiah 6, where it is said that "he saw the Lord sitting upon a throne, high and lifted up, and the whole earth was full of his majesty."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
