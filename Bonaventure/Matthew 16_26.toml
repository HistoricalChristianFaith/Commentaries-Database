[[commentary]]
quote='''
A man cannot know what is useful and what is harmful except by addition beyond philosophical knowledge. It is said in the Gospel: "What does it profit a man, if he gain the whole world, yet suffer the loss of his own soul?" What does it avail that a man know many things, if the true honesty of the soul be abandoned?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25204.html'
source_title="Collationes de Septem Donis, Collation 4"

[[commentary]]
quote='''
"What does it profit a man, if he gain the whole world, yet suffer the loss of his own soul? Or what exchange shall a man give for his soul?" For all that God has created, I would not give my soul. Christ gave His blood to redeem your soul, and for sin you sell yourself and your soul!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'
