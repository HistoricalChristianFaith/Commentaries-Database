[[commentary]]
quote='''
Second, as regards the obedience of the disciples carrying out the command, it is added: And as they were loosing the colt, the owners thereof said to them: Why do you loose the colt? by the handling of another's property; and they are called several owners because according to the historical truth, both the she-ass and the colt are said to have belonged to that entire village, and were used by the poor for carrying water.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
