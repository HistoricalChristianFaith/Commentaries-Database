[[commentary]]
quote='''
Then he apprehended him, etc. Here Pilate intends to free him by a judgment of severity, scourging an innocent man, so that he might mitigate the zeal of the Jews: and there are here three parts. In the first is described the ignominious scourging of Christ: second, the showing of the scourged one, there: Pilate went out again: third, the hardening of the Jews, there: When therefore the chief priests had seen him.

The ignominious scourging of Christ is indicated first in the affliction, then in the derision.

He touches upon the affliction when he says: Then Pilate took Jesus and scourged him. Chrysostom: "Pilate scourged him, perhaps wishing to release him and to mitigate the Jewish zeal"; whence in Luke twenty-three Pilate said: "I will release him after chastising him," that is, afflicted with scourges, to further mitigate the zeal of the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
