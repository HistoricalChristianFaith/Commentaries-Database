[[commentary]]
quote='''
Likewise, on that passage of Matthew 17: Go to the sea; the Gloss says: "The Lord was of such great poverty that He did not have the means to pay the tribute: Judas indeed had the common funds in the purse, but He deemed it wrong to use the goods of the poor for His own purposes, giving us this very example." If therefore Christ was of such great poverty that He could not pay a single coin, it is manifest that He was in the highest poverty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
