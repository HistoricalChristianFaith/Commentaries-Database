[[commentary]]
quote='''
For there is no good tree, etc. After he has drawn back from the rashness of judging, here he instructs in the prudence of discerning, which indeed he does in this order. First he proposes a metaphorical similitude; second he draws out an explicit instruction; third from this he reproves a deceptive simulation. Therefore a metaphorical similitude is proposed, when it is said: For there is not a good tree that brings forth bad fruit. For here is not causal but continuative; by tree he means not the will insofar as it is from God—for thus it is good, because it is from God—but the will, which is not good when it does evil; nor indeed is it evil when it does good; with respect to what he adds: Neither does a bad tree bring forth good fruit. For the will is conformed to the work, as the tree to its fruit: Proverbs 12: "From the fruit of his mouth each one shall be filled with good things, and according to the works of his hands it shall be repaid to him"; because, as is said above in chapter three, "every tree that does not bring forth good fruit shall be cut down and cast into the fire." Whence spiritually trees are deprived of fruit through the frost of iniquity, according to that passage of Jude in his Canonical Epistle concerning the wicked: "They are autumn trees, unfruitful, twice dead." But then they are filled with fruit when they draw near to the warmth of charity, according to that passage below in chapter twenty-one: "Behold the fig tree and all the trees: when they bring forth fruit of themselves, you know that summer is near." Whence the prudent observer discerns trees by their fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
