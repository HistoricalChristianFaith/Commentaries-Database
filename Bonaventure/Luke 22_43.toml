[[commentary]]
quote='''
Fifth, as to the vigor of prayer, he adds: And there appeared to him an Angel from heaven, strengthening him. The Angel appeared for strengthening, not on account of his own need, but for our strengthening. Hence the Gloss: "If he is sorrowful for us, that is, he is sorrowful on our account, it is necessary that he also be strengthened on our account and for us," so that from this it may appear that Angels strengthen those who pray, as it is said in Daniel 10: "One like the appearance of a man touched me and strengthened me and said: Do not fear, man of desires; be strengthened and be firm. And when he spoke with me, I recovered my strength and said: Speak, my Lord, for you have strengthened me." This strengthening of the Angels therefore obtains vigor for us.

On account of which, to signify this, he adds: And being in an agony, he prayed more earnestly. Gregory: "He was in an agony, signifying that the soul is rightly terrified when it finds close at hand that which it cannot change for eternity." For in this there is a wondrous struggle between nature and grace, between reason and sensuality; which agony indeed the holy Martyrs had, and just men have, according to that passage in 1 Corinthians 9: "Everyone who contends in the contest abstains from all things." "I therefore so run, not as uncertainly; so I fight, not as one beating the air." Moreover, the stronger this agony is, the more strongly one must persist in prayer. Hence above in chapter 18: "He spoke to them, that they ought always to pray and not to lose heart"; and above in chapter 6 it is said that "he was spending the night in the prayer of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
