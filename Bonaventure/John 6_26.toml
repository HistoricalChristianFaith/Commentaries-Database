[[commentary]]
quote='''
"Jesus answered and said: Amen, amen I say to you: You seek me, not because you saw the signs," which I performed, so that through the signs you might come to faith, and thus you seek nothing spiritual, but carnal: "but because of my loaves," that is, multiplied by me, "you ate and were filled." And this is what the carnal Jews were seeking, namely the satiation of the body, just as their fathers also: Exodus 16: "Would that we had died by the hand of the Lord in the land of Egypt, when we sat over the pots of flesh and ate bread to satiety." And because they were seeking in a disordered manner, therefore the Lord directs and orders them.

There is a question about what he says: "You seek me, not because you saw signs." To the contrary: above in the same chapter: "A great multitude followed him, because they saw signs." It must be said that this contradiction is resolved in two ways: in one way by reference to different times: because those same ones who first followed on account of signs, afterwards, having been fed, followed on account of food. In another way it is resolved by reference to different persons: because both are true: for some followed on account of signs, some on account of food.

Hence it should be noted that there were five reasons why some followed the Lord: sickness, signs, food, blasphemy, and doctrine were the reasons why the crowd followed the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
