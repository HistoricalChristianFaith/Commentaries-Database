[[commentary]]
quote='''
Pilate answered. Here is set forth the affirmation or approval of the title against the malice of the Jews: whence Pilate does not erase it but approves it: What I have written, I have written. What I have written, truthfully, I have written, indelibly, as an irrevocable truth. Augustine: "If what Pilate wrote cannot be corrupted, can what Truth has said be corrupted?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
