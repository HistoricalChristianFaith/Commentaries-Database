[[commentary]]
quote='''
And that they can do nothing without him, he shows through a similitude: If anyone does not abide in me, he shall be cast forth as a branch, namely separated from the vine. He is cast outside the vineyard through separation from the unity of the Church; Apocalypse, last chapter: "Outside are dogs and sorcerers and the unchaste" etc. And he will not bear fruit, whence he will wither, through the loss of the moisture of grace; and they will gather him and cast him into the fire, and he burns, because he will burn through the infliction of punishment.

Whence four evils follow: first, that he is cast out; Matthew 15: "Every plant which my heavenly Father has not planted shall be uprooted."

Second, he will wither: Matthew 21, the Lord said to the fig tree, in which he found nothing but leaves: "Let no fruit ever be born from you forever. And immediately it withered"; Psalm: "My strength has dried up like a potsherd."

Third, he is gathered by the angelic ministry: whence Matthew 13: "They shall gather out of his kingdom all scandals."

Fourth, he is burned with fire: Ezekiel 15: "Son of man, what shall become of the wood of the vine?" And it follows: "Behold, it is given to the fire for fuel."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
