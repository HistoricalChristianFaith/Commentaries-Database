[[commentary]]
quote='''
Here the third point is touched upon, namely the necessity of the sick man, because he had long been sick and destitute of all help. He had long been sick, whence he says: "Now there was a certain man there: a certain one," singular in his misery, "having thirty-eight years in his infirmity." Behold, the length of infirmity, by which the Lord was moved to have mercy and to seek out and address him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
