[[commentary]]
quote='''
Christ instituted orders by first giving the power of binding and loosing the sins of the human race and the power of confecting the Sacrament of the altar.

To all those established in the sacerdotal order, and to them alone, is given the power of the twofold key, namely the key of knowledge for discerning, and the key which is the power of binding and loosing, for judging and bestowing the benefit of absolution.

Because indeed, in order to avoid confusion, not just anyone is set over anyone else in the Church Militant, since the ecclesiastical hierarchy itself ought to be ordered according to judicial power: therefore this power of binding and loosing was granted first to one first and supreme priest, upon whom universal power was conferred as upon the supreme head; and then according to particular Churches it is divided into parts, such that it descends first to bishops and then to priests from one head. Therefore, although every priest has the order and the key, nevertheless the use of the key extends only to those who are ordinarily subject to him, unless it is committed to him by one who has ordinary jurisdiction. Since indeed that jurisdiction resides principally in the supreme head, and then in the bishop, and lastly in the parish priest, it can indeed be committed to another by any of these—sufficiently indeed by the lowest, more fully by the middle, and most of all by the supreme.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"

[[commentary]]
quote='''
As the Assyrians devastated the Jews, so did the Saracens occupy the Churches of Antioch, Jerusalem, Alexandria, Constantinople, and all the way to Sicily. As the Ten Tribes fell and broke away from the house of David, so did these Churches fall and break away from Peter to whom it had been said: "I will give thee the keys of the kingdom," and they succumbed to the wolves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252016.html'
source_title='Collations on the Hexaemeron, Collation 16'

[[commentary]]
quote='''
To that which is objected, that the same word was said to the Apostles which had previously been said to Peter — for in Matthew 16 it is said to Peter, I will give to you the keys, and whatsoever you shall bind upon earth, etc. — it must be said that it was said far differently to them and to Peter. For to Peter it was said separately and singularly, because in him the fullness of power was to be placed principally and singularly: but to the others it was said collectively; Whatsoever you shall bind, etc., because they were called "into a share of the solicitude." Whence although they had a similar power, they did not however have an equal one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'
