[[commentary]]
quote='''
Above was set forth the confirmation of the instruction on account of the Jews' disputing; here is set forth the explanation on account of the disciples' scandal; and it proceeds in this order. First, the murmuring of the disciples is indicated; second, on account of the murmuring, the explanation of the doctrine; third, the reason for murmuring is given; fourth, the falling away of the unbelieving; fifth, the confirmation of the believing; sixth, the discernment among the confirmed.

The murmuring of the disciples arose from this: that he had said his flesh was given to be eaten, and that without this there was no salvation. On account of which he says: "He said these things teaching in the Synagogue, in Capernaum," that is, publicly, and therefore many were enraged; below, chapter 18: "I have always taught in the Synagogue."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
