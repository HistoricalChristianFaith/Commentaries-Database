[[commentary]]
quote='''
"The servant who knew the will of his Lord and did not prepare and did not act according to his will, shall be beaten with many stripes." If a man does not prohibit evil by example or by counsel, woe to him! You make yourself a teacher of sacred Scripture, but you persuade the contrary of good and truth. If one who ought to proceed by the right way, and another were to tell him that he should proceed by a crooked way: his sin would be inexpiable. By impeding the salvation of another by example, by counsel, or by persuasion, you must give your soul for the soul of that one. Is it not the case that if I can draw another to what is better, and I draw him to what is worse, I do not sin gravely? If I impede the good of another, I do worse than the devil: because the devil acts as an enemy.

This knowledge, if the fulfillment of works is not present, is not useful but harmful. The first brightness can be obscured, but this one can be condemned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25204.html'
source_title="Collationes de Septem Donis, Collation 4"

[[commentary]]
quote='''
But that servant etc. After he invited to vigilance and censured insolence, here thirdly he aggravates negligence; which he does in two ways, namely by reason of the greatness of knowledge and by reason of the authority entrusted.

First, therefore, with regard to the aggravation of negligence by reason of the greatness of knowledge, he says: But that servant who knew the will of his lord, through the gift of knowledge: First Corinthians eight: "Knowledge puffs up, but charity edifies. If anyone thinks he knows something, he does not yet know as he ought to know." And did not prepare himself, to receive the gift of grace: Proverbs sixteen: "It is for man to prepare his soul" etc.; whence First Kings seven: "Prepare your hearts for the Lord."

And did not act according to his will, supply: through the vice of his own negligence; James four: "To him who knows the good and does not do it, it is sin."

He shall be beaten with many stripes, namely through the severity of the divine sentence: whence Second Peter 2: "It were better for them not to have known the way of truth," etc.; and Romans 1: "Who, when they had known God, glorified Him not as God," etc. "Wherefore God gave them up to the desires of their heart, unto uncleanness, to dishonor their own bodies among themselves." And the reason for this is that, as Gregory says, "where the gift of knowledge is greater, there the transgressor is subject to greater fault"; whence also ignorance excuses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
