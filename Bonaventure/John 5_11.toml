[[commentary]]
quote='''
"He answered them." Here the second point is touched upon, namely the devolution of the calumny upon the healer, because that healed sick man excuses himself by the command of the healer. Therefore he says: "He who made me well," by his power, "he said to me: Take up your mat and walk," commanding by his own authority. And certainly, he who had so great a power well had the authority for so great a command; whence he said in Matthew nine: "But that you may know that the Son of man has power on earth to forgive sins, he said to the paralytic: Arise, take up your bed and go into your house." If he could forgive sins, then he could dispense from the precept concerning the Sabbath. But the Jews, not heeding this, inquire about him so that they might calumniate him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
