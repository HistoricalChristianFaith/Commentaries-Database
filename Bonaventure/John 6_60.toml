[[commentary]]
quote='''
"Many therefore of his disciples, hearing," namely what had just been said about the eating of flesh, "said: This is a hard saying," that is, cruel and inhuman, to eat human flesh: "who can hear it?" They do not say "believe," but "hear," on account of the horror: therefore they could not hear, because their ears were heavy, according to that passage in Isaiah chapter six: "Make the heart of this people blind and make heavy their ears."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
