[[commentary]]
quote='''
And because it is not for just anyone to thrust himself into secret conversations, according to that instruction: "Do not approach a council before you are called"; it is shown from the response that this kind of discourse is public and common. And therefore he adds: And one of them, whose name was Cleophas, answering, said to him: Are you alone a stranger in Jerusalem, and have you not known the things that have been done there in these days? It should be noted, however, that although there were two, Luke introduces only one as speaking, as the more eminent: for the younger ought to yield to the elder, according to that passage of Ecclesiasticus thirty-two: "Speak, elder: for it befits you to speak the first word with careful knowledge." Although there were also two, he names only one, because, as some commentators say, Luke was the other of these disciples, and it is the custom of the writer of Sacred Scripture not to make much mention of his own name: just as John too does not name himself but says: "The disciple whom Jesus loved." Ambrose, however, says that it was not Luke. Here therefore Cleophas shows that the matter of his speech was known to all, not only to citizens but also to strangers: and therefore he marvels that he, as a stranger, should be ignorant of it. Therefore he calls him a stranger, either because he appeared in a foreign guise, or because like a stranger he was ignorant of what was most well known.

But rightly he appeared to them as a stranger, because he was a stranger in the world: John 1: "He was in the world, and the world knew him not"; and therefore Jeremiah 14: "Why will you be as a sojourner in the land and as a wayfarer turning aside to lodge?" He was a stranger in the eyes of the disciples who did not believe; Job 19: "I was as a stranger in their eyes"; and therefore the Psalm: "I am become a stranger to my brethren and a pilgrim to the sons of my mother." A stranger also in his members: Hebrews 11: "Confessing that they are strangers and pilgrims upon the earth"; and Second Corinthians 5: "While we are in this body, we are pilgrims away from the Lord." And therefore First Peter 2: "I beseech you as strangers and pilgrims." And for this reason he does not deny himself to be a stranger, but shows it and even inquires of them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
