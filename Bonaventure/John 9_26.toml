[[commentary]]
quote='''
They therefore said to him: What did he do to you? How did he open your eyes? They attempt to draw him back by cunning; therefore they maliciously inquire, so that they might raise some objection against the miracle. Chrysostom: "They scrutinize the manner of the cure, like dogs investigating on every side." But in this cunning they are rebuked by the blind man; therefore he refuses to respond, but reproves them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
