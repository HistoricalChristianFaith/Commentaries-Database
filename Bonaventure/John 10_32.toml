[[commentary]]
quote='''
"Jesus answered them." Here the reason for the persecution is noted. And first the Lord shows that they are moved irrationally; therefore He says: "Many good works I have shown you from My Father; for which of those works do you stone Me?" That is, for which work of those, that is, from among them; it is a partitive construction: the Psalm: "They repaid Me evil for good"; Proverbs 17: "He who returns evil for good, evil shall not depart from his house." But malice, which lurks under a sheep's skin, assigns a reason; whence:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
