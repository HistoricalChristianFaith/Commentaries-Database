[[commentary]]
quote='''
And therefore he adds: But we were hoping that he would redeem Israel; as if to say that through this the expectation of redemption has now been emptied. This is the word of men falling from their hope and cast down into the greatest sadness; and this is an evil sadness, because, as is said in 2 Corinthians 7, "the sorrow of the world works death." Into this they had fallen by losing confidence; therefore against this, 1 Thessalonians 4: "Do not grieve as the rest who have no hope"; and Ecclesiasticus 14: "Blessed is he who is not stung by the sorrow of sin," "and has not fallen from his hope."

Third, as to the explanation of the cause on account of which there was hesitation of mind, he adds: And now besides all this, today is the third day since these things were done; in which grief and affliction were not taken away, but terror and doubt were added.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
