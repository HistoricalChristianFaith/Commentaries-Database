[[commentary]]
quote='''
First therefore, as regards the inscription of the judge, he says: And there was also an inscription written over him in Greek and Latin and Hebrew letters: This is the King of the Jews. Pilate placed this inscription by way of a title, in which he intended to inscribe the cause of his passion; whence Mark chapter fifteen: "And the title of his charge was inscribed: King of the Jews"; in which is shown the cause why he was crucified according to truth, but the Jews did not accept it; whence John chapter nineteen: "Many of the Jews read this title, and the chief priests of the Jews said to Pilate: Do not write: King of the Jews, but: That he said: I am King of the Jews. Pilate answered: What I have written, I have written." From which it appears that the title was written by divine direction; whence Bede says: "Therefore the title was placed over the one sacrificed, so that it might be clear to all who wish to read and believe that through the cross he did not lose but strengthened his dominion," according to that passage of Isaiah chapter nine: "The government was placed upon his shoulder"; and in the Psalm: "The Lord reigned" from the wood.

Now the title is threefold, namely a certain one is memorial, which is written on the tombs of the dead; proclamatory, which is on the gates of cities; and triumphal, which contains the cause and order of the triumph and was customarily written on arches, and such was this title, concerning which Isaiah chapter nineteen says: "There shall be an altar of the Lord in the midst of Egypt, and a pillar of the Lord near its border." This was written in three languages because, although there were seventy-two, three nevertheless were preeminent; whence the Gloss says: "These three languages were preeminent above the others: Hebrew on account of the Jews glorying in the Law, Greek on account of the wise Greeks, Latin on account of the ruling Romans. Therefore, whether the Jews wish it or not, every kingdom of the world, all worldly wisdom, all the mysteries of the divine law testify that Jesus is the emperor of those who believe and confess." Or it was in three because these three languages intimate the mystery of the Trinity. It also seems to be a firm testimony of truth; whence Augustine says: "The title was approved in three languages as if by three witnesses, because in the mouth of two or three every word stands firm."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
