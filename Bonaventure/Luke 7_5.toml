[[commentary]]
quote='''
And to confirm this worthiness they add: For he loves our nation, although he is a foreigner; and therefore you, who are of our nation, ought to love him, according to what you say of yourself in Proverbs 8: "I love those who love me." — Nor does he merely "love in word or tongue, but in deed and truth"; whence they also add: And he himself built us a synagogue, which indeed was a great benefaction and a sign of great love. Whence Gregory says of charity that "love works great things, if it exists; but if it refuses to work, it is not love." And since he gives great alms, he is worthy that you grant him a great favor, so that he may know that what is said in Sirach 12 is true: "Do good to the just, and you will find great recompense — and if not from him, certainly from the Lord"; as if they were saying: show yourself to be the Lord of our people, so that you may do for him as you did for the midwives in Exodus 1, who showed mercy to the Hebrews, of whom it is said: "Because the midwives feared God, he built them houses."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
