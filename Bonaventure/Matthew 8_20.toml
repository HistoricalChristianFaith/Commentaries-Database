[[commentary]]
quote='''
Augustine says that 'Christ became poor to such an extent that he does not have what the foxes have, because foxes have holes, but the Son of Man has nowhere to lay his head; understand: Christ became poor so that we might imitate his poverty.' The Master says that we should imitate him in giving alms, in humility, in poverty, and in obedience.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25207.html'
source_title="Collationes de Septem Donis, Collation 7"

[[commentary]]
quote='''
Concerning whom, Matthew 8: The foxes have holes and the birds of the air have nests, on which Chrysostom says: "Why do you expect to gather riches following me? Do you not see that I do not have so much as a lodging, as much as the birds have?" Therefore Christ had absolutely nothing: therefore etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
