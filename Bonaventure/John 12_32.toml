[[commentary]]
quote='''
When the devil saw Christ suffering, he believed His argument had little weight. But Christ ridiculed him. Christ considered the argument most powerful: "And I, if I be lifted up from the earth, will draw all things to Myself."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
And I, if I be lifted up from the earth, through the passion of the cross, I will draw all things to myself, through faith and love. Song of Songs one: "Draw me after you"; below in chapter twenty-one: "Simon Peter drew the net to land, full of great fishes," etc.; above in chapter three: "As Moses lifted up the serpent in the desert, so must the Son of man be lifted up."

Question IV. Likewise, inquiry is made concerning what he says, that he will draw all things to himself; because not all, nor the greater part, have been converted to the faith; indeed, there are more wicked than good.

I respond: It must be said that, as Augustine says, those who tend toward non-being ought not to be counted; and such are the wicked. Hence by the word all things no distribution is made except for the elect, who were sons of God by election; and these he drew to himself and gathered into one.

Or: I will draw all things, that is, from every people and kingdom, not only Jews but also Gentiles, without distinction of nations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
