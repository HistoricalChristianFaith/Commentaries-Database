[[commentary]]
quote='''
And that Luke the Evangelist prefixes a prologue to his Gospel, which none of the other Evangelists did, this was on account of the special person to whom he writes, since all the others write generally without regard to a special cause; and there are three causes for this, the first of which is that his book could seem superfluous, since two Evangelists had already written, and "in the mouth of two witnesses every word shall stand." Hence, to remove this objection, he first assigns the first cause: that it is not superfluous, since it serves to cut away the vain, false, and superfluous things that had been written by pseudo-evangelists. — The second is that his book could seem less authoritative, as being the work of one who was not an Apostle: and therefore he shows that he wrote according to the instruction and testimony of the Apostles and of others who saw. — The third cause is that his book, since it is historical and narrative of various parables, could seem disordered and as though written haphazardly: and therefore, to remove this objection, he shows in the prologue that its procedure is sufficient, diligent, and ordered. — And thus it is clear that it is not idle curiosity to inquire into and examine the order, distinction, and sufficiency in the treatment of those things which are written in this Gospel; and by equal reasoning, neither in the others. If order attests to wisdom and goodness, it ought most of all to belong to that Scripture which proceeds from the font of wisdom and leads to the end of complete goodness. And this is the evangelical Scripture: and therefore it is not curiosity but utility if in what follows the division, order, and sufficiency are described, because this is intended by the Evangelist.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
