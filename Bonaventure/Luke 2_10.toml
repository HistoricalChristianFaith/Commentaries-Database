[[commentary]]
quote='''
There is an order of levels intended for enlightenment. Enlightenment through writings of primary importance pertains to the deacons. Wherefore they were also in the habit of preaching, as did Stephen, Lawrence, Vincent. Hence, in Luke the angel says to the shepherds: "I bring you good news of great joy." The deacon is such an angel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252022.html'
source_title='Collations on the Hexaemeron, Collation 22'

[[commentary]]
quote='''
And the Angel said to them etc. Here secondly is described the announcement inviting to exultation: in which is prefaced an exhortation to confidence and to joy, and there follows the announcement, expressing the cause of joy. Therefore the Angel, exhorting to confidence, said to them: Do not be afraid. For the Angel had not come to announce a terrible thing, but rather a desirable one, just as he who announced the resurrection to the women: Mark, last chapter: "Do not be afraid"; in which he grants the confidence of hoping. In this is recognized the difference between the Angel of light and of darkness, because the good Angel reassures, but the evil one ultimately terrifies. And what is more, he invites to joy: on account of which he adds: For behold, I bring you tidings of great joy. This Raphael wished for Tobias, in chapter five, when he said: "May joy always be with you." With this the Magi rejoiced; Matthew 2: "And seeing the star, they rejoiced with exceedingly great joy." And it is called great to distinguish it from the joy of hypocrites: Job 20: "The joy of the hypocrite is but for a moment," and chapter 21: "They rejoice at the sound of the organ, they spend their days in prosperity, and in a moment they go down to hell." Great also, because abundant, which he notes when he adds: Which shall be to all the people, and this to distinguish it from the joy of the worldly: John 16: "The world shall rejoice, but you shall be sorrowful." On the contrary, below in chapter 13: "And all the people rejoiced at all the glorious things that were done by him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
