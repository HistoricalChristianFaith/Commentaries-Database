[[commentary]]
quote='''
Peter, turning around, saw that disciple etc. Here secondly, Peter, knowing his own death, inquires about the death of John: for he desired that he to whom he had been joined in life through great love might be joined to him in a likeness of death. And because Peter knew that the Lord loved John, he wanted to know by what death he wished him to die: therefore he says: Peter, turning around, saw that disciple whom Jesus loved, following, namely John. And a sign of special love is shown when it is added: who also reclined at the Supper upon his breast, above in chapter thirteen, and said: Lord, who is it that will betray you? He asked him what was secret: and this was a sign of love, because it was revealed to him, as is said above in chapter thirteen: and this is a sign of friendship, as is said above in chapter fifteen: "I have called you friends, because whatever I have heard from my Father, I have made known to you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked about what he says: That disciple whom Jesus loved. How did he dare to say this, when it is said in Ecclesiastes nine: No one knows whether he is worthy of love or of hatred? Likewise, since Christ loved all, why did John attribute this to himself, namely that he was loved more? This seems false: because Peter loved more; therefore he was better; but God loves the better more; therefore he loved Peter more than John. To this it can be answered that John knew by revelation or by certain signs that he was loved. To the second, Augustine seems to say that John was loved more, but Peter loved more; and therefore he asks who was better; and he says that Peter was better, but John was happier; and he turns these words to allegory, saying that through John the contemplative life is signified, and through Peter the active life. But this increases the question further; whence Augustine himself says that justice is hidden here, and mercy is manifest. Therefore it must be said that to love more is understood in two ways: either with respect to a greater reward, and thus Jesus loved Peter more, this being understood in the sense that Peter always loved the Lord more. In another way, to love more refers to a greater outward demonstration, because he showed more signs of love: and thus he loved John more.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: why did he show himself more to John, since he loved Peter more than John? — It seems that there would be pretense in the Lord. To this it can be responded that although Peter merited a greater reward, nevertheless it was fitting for Christ to show greater familiarity to John, because John was young and was a virgin and innocent: and these are things which in a wondrous way, both in the sight of God and of men, make a person lovable and more pleasing. Whence Bede says: "This is John, who by the privilege of surpassing love merited to be honored by the Lord more highly than the rest; and the special prerogative of chastity had made him worthy of a more abundant love." And the Gloss says that "John was more intimate, because he was more tender."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
