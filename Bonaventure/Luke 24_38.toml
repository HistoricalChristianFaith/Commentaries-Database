[[commentary]]
quote='''
And he said to them: Why are you troubled, etc. After having described the plurality of the appearances, he here describes the probability of the appearance and its probable certitude. Now body and spirit can be proved and discerned with certain discernment in two ways, namely through the use of touch and taste, and according to this Christ proves in two ways that he has a true body according to this twofold sense.

First, as regards the testimony of touch, he says: And he said to them: Why are you troubled, and why do thoughts arise in your hearts? He says arise pointedly, because good thoughts descend from above; James 1: "Every best gift is from above, coming down," etc.; but evil thoughts arise from below: Apocalypse 9: "The smoke of the pit arose, and the sun and the air were darkened by the smoke of the pit."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
