[[commentary]]
quote='''
First, therefore, the encounter of the Virgin greeting is introduced as eager and familiar. — On account of the haste, he says: And Mary arising in those days, went into the hill country with haste, into a city of Judah: as if to say: she did not delay, but arose at dawn, according to that passage in Song of Songs 2: "Arise, make haste, my love, my dove, my beautiful one, and come." Whence that passage in Proverbs 31, which is said of the valiant woman, who "rose up while it was still night and gave prey to her household and food to her handmaids," is fitting for her; for she arose to minister to Elisabeth, who was aged and weak. Whence "neither did the roughness of the journey delay her," according to what is said in the Gloss, and the text indicates, because she went into the hill country, namely with haste, to ascertain the truth, like those spies, Joshua 2: "Go up into the hill country"; or even with the Bridegroom himself, Song of Songs 2: "Behold, he comes leaping upon the mountains and bounding over the hills." Nor did the length of the way delay her, which is noted there: Into a city of Judah, that is, Jerusalem, so that she might now cry out with Isaiah 2: "Come, let us go up to the mountain of the Lord and to the house of the God of Jacob." Nor did she delay on the journey, because with haste, like Rachel, Genesis 29, who, when she saw Jacob, "hastened to tell her father."

Spiritually, moreover, we are given to understand from this that haste is necessary for one who wishes to attain perfection; Hebrews 4: "Let us hasten to enter into that rest"; therefore 1 Corinthians 9: "So run, that you may obtain." Against which it is said of the foolish virgins, Matthew 25, that "they came last"; and Sirach 5: "Do not delay to turn to the Lord, and do not defer from day to day."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
