[[commentary]]
quote='''
And because freedom of choice in the vain and sinful frequently presumes upon its own powers and usurps for itself what belongs to God, therefore he adds: And the younger of them said to the father: Father, give me the portion of the substance that falls to me. This younger one is said to be the one who is more vain and more intent upon sensible goods, according to that saying of Ecclesiastes 11: "For youth and pleasure are vanity"; and Ecclesiastes, in the same chapter above: "Rejoice, O young man, in your youth"; "and know that for all these things God will bring you into judgment." This youth seeks his portion when he wishes to be left to his own freedom, so that he might walk no longer according to the command of grace, but according to the inclination of his own will. Whence Bede: "Substance is everything that we do, that we live, understand, think, and speak. Therefore the younger asks that a portion of this substance be given to him, when man, delighting in his own rational sense, sought to govern himself through free choice and to depart from the dominion of the Creator." This petition was not for himself, but rather against himself, because he asked to be exposed to himself and to be abandoned to his own judgment; just as also the petition of the children of Israel by which they had asked for a king; 1 Kings 8: "The children of Israel said to Samuel: Appoint for us a king, that he may judge us." "And the Lord said to Samuel: They have not rejected you, but me, lest I reign over them."

And because the Lord, by just judgment, leaves to himself the one who presumes of himself, therefore he adds: And he divided unto them his substance. For so it was fitting, according to that passage of Ecclesiasticus fifteen: "God from the beginning made man and left him in the hand of his own counsel." For thus the Lord acts by just judgment, according to that passage of Matthew twenty-five: "To one he gave five talents, to another two, and to another one, to each according to his own ability," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
