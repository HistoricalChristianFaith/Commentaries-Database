[[commentary]]
quote='''
The Father witnessed for the Son by voice, and the Holy Spirit came down in the form of a dove, in order that the witnessing be most solid. For Jesus said: "What My Father has given Me is greater than all."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
Here is noted the third point, namely the approval of that sign, for which a twofold reason is assigned. The first is as follows: what the Father has given Me is greater than all things; but what is greater than all things does not suffer violence; therefore it is impossible that anyone should snatch from My hand. He sets forth the middle term of this argument when He says: "My Father, what He has given Me," that is, that which My Father has given Me, "is greater than all things," because He gave everything that He could: below in chapter sixteen: "All things that the Father has are Mine." The other reason: no one can snatch from the hand of the Father; but My hand and the Father's are one; therefore no one can snatch from My hand. For this reason He says: "No one can snatch from the hand of My Father," because He is omnipotent: the Psalm: "You are terrible, and who shall resist You?" Ecclesiastes 8: "His word is full of power."

It is asked concerning what he says: "No one is able to snatch them from the hand of my Father."

Therefore those who are in the hand of God, as the predestined, cannot be damned: therefore they do not have the freedom of sinning finally.

To this Augustine seems to say simply that they cannot perish, in the book On the Good of Perseverance; nor however does free will perish, just as it also does not perish in those who are confirmed. It must be said, however, that no one can snatch them, because the Father does not permit violence to be done to his elect; whence: "God is faithful, who will not permit you to be tempted beyond what you are able": and the devil cannot do violence to God, so as to tempt his servants beyond what he himself permits. Therefore the freedom of free will to sin remains in them, but the power to do violence and to snatch by force does not remain in the devil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
