[[commentary]]
quote='''
Second, as regards caution against a harmful thing, he adds: Salt is good, but if the salt loses its savor. By salt is understood every perfect disciple, who ought to season the hearts of others by example and word; whence Matthew 5: "You are the salt of the earth"; which is said because he ought to have the highest discretion in conduct, according to that passage of Colossians 4: "Let your speech always be seasoned with salt in grace"; because, just as food cannot be eaten unless it is seasoned with salt, so neither does the stomach of the heart receive an indiscreet word: Job 6: "Can that which is unsavory be eaten, which is not seasoned with salt?" He ought also to have wisdom in contemplation: whence in Leviticus 2 it is commanded that salt be offered in every sacrifice. And such a one, who is prudent and wise, is rightly the seasoning of the Church by word and example: whence the Gloss: "Salt seasons food, kills worms, dries flesh; so preaching preserves human nature unharmed from the worms of vices and corruption for its Creator."

But then the salt loses its savor when a disciple of Christ becomes undevout in contemplation and indiscreet in action and in preaching, as is said of such ones in Romans 1: "They became vain in their thoughts, and their foolish heart was darkened," etc.; and this is the greatest danger.

Therefore he adds: With what shall it be seasoned? As if to say: with nothing; whence Sirach 12: "Who will have pity on a charmer struck by a serpent?" As if to say that such a one is utterly contemptible and useless, both before God and before men, both in spiritual acts and in temporal ones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
