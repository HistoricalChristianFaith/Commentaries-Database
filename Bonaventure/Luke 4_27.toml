[[commentary]]
quote='''
Another example for the confirmation of the aforesaid concerning Elisha is introduced, when he says: And many lepers were in Israel under Elisha the prophet: whence in 4 Kings 7 it is said that in the time of Elisha "four leprous men were near the gate of Samaria," and many others in similar necessity. And none of them was cleansed except Naaman the Syrian, in 4 Kings 5, where it is said that Naaman at the word of Elisha washed himself seven times in the Jordan and was restored to full health — and this, by the just judgment of God, because they were not worthy. And by a similar argument and according to the imitation of their predecessors, he was showing that they were unworthy of the reception of miracles. Whence a similar passage in Matthew 23: "You are witnesses against yourselves that you are the sons of those who killed the Prophets: and you, fill up the measure of your fathers"; and Acts 7: "Stiff-necked and uncircumcised in hearts and ears, you always resist the Holy Spirit, just as your fathers did, so do you. For which of the Prophets did your fathers not persecute?" etc. And thus they are manifestly convicted, because the lack of miracles was not to be imputed to the powerlessness or negligence of Christ, but rather to their own envy and unbelief: whence they were worthy of being deprived of miracles, just as their fathers also had been deprived.

But the infection of leprosy designates the corruption of malice, which was in all before the coming of Christ, according to that passage of the Psalm: "They are corrupt and have become abominable" etc. From this Judea was not cured: Ezekiel twenty-four: "I wished to cleanse you, and you were not cleansed from your filth; nor will you be cleansed until I cause my indignation to rest upon you." But Naaman is cleansed, who is interpreted as comeliness, and designates the people of the gentiles made comely by the Sacrament of baptism and purged of all foulness of mind and body. And Hosea eight: "How long will she not be able to be cleansed?" according to that passage of Ezekiel thirty-six: "I will pour clean water upon you, and you shall be cleansed from all your defilements." And so according to both interpretations, this was a confutation of the unbelieving Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
