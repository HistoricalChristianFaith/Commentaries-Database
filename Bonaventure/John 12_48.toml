[[commentary]]
quote='''
He who rejects me and does not receive my words has one who judges him. And who that one is who judges, he shows: The word that I have spoken, that will judge him on the last day; Matthew twenty-four: "Heaven and earth will pass away, but my words will not pass away"; indeed "They will stand, as Chrysostom says, in the order of accusation, reproving them and cutting off every excuse"; Matthew five: "Be agreed with your adversary quickly, while you are with him on the way," etc., is understood of the word of Christ. And that his word has the power of judging them, he makes manifest: because it is not a human word, but divine and true.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
