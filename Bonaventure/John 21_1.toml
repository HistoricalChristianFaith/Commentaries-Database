[[commentary]]
quote='''
First therefore the place is described, in which this manifestation was made, when it is said: Afterwards Jesus manifested himself again at the Sea of Tiberias: behold, the place. "The Sea of Tiberias is the same as the Lake of Gennesaret and as the Sea of Galilee"; and it is called Tiberias from the city of Tiberias, which is situated near that lake: and it is called the Sea of Galilee from the region in which it is: it is called the Lake of Gennesaret from the proper nature of the lake itself, so that Gennesaret is said as if generating breezes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: since the lake of Gennesaret is fresh water and small even in comparison to the sea, why does the Evangelist call it a sea? It must be said that he does this according to the custom of the Jews, who call a great gathering of waters a sea, according to that passage in Genesis 1: "And the gatherings of the waters he called seas."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
