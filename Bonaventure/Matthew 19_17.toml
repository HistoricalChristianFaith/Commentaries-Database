[[commentary]]
quote='''
"If you wish to enter into life, keep the commandments." These words are the words of our Savior, in which the sum of our whole salvation is set forth for us with respect to two things: first, with respect to the reward of eternal retribution; there: "If you wish to enter into life": second, with respect to the merit of human action, there: "keep the commandments." And this is the right order, because the end moves the agent to apply himself toward the due end.

Let us therefore follow the form of this great Master; and before we say anything about these precepts, let us first speak about the observance of the precepts.

The Lord sets forth first the motive, then adds the act by which we can arrive at the due end. And it should be noted that there are four things which move us to observe the commandments of God. The first is the authority or dignity of the one commanding: the second is the utility of observance: the third is the peril of transgression: the fourth is the irreproachability of the commandments. Since therefore He who commands the precepts to be observed is of great authority, and the observance of the commandments is of great utility, and in transgression great peril consists, and the commandment is irreproachable: therefore there is no one who can have an excuse regarding the observance of the commandments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25201.html'
source_title="Collationes de Decem Praeceptis, Collation 1"

[[commentary]]
quote='''
From the first consideration comes forth the first act, that is, doing good, under the guidance of the commandments. "If thou wilt enter into life, keep the commandments." Indeed this consideration of God's commandments leads to good deeds. The command of the Lord is right in itself, for righteousness is nothing else than rectitude. Within the law, rectitude exists through itself; in the one observing the law, rectitude exists through participation. It is fitting, therefore, to consider, accept, and love God's commandments. If Adam and Eve had done it, they would not have fallen. In this way you will be transformed through love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252018.html'
source_title='Collations on the Hexaemeron, Collation 18'

[[commentary]]
quote='''
Scripture enlightens a priori by means of directive precepts. It is fitting to have light before oneself. For the bidding is a lamp, and the teaching a light; and this leads to heaven. Hence, "If thou wilt enter into life, keep the commandments." And to the commandments are added the counsels. And this is what Scripture teaches us everywhere.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252017.html'
source_title='Collations on the Hexaemeron, Collation 17'

[[commentary]]
quote='''
The first mode first and principally fixes its gaze upon being itself, saying that He Who Is is the primary name of God. The second mode fixes its gaze upon the good itself, saying that this is the primary name of God. The first pertains especially to the Old Testament, which above all proclaims the unity of the divine essence; whence it was said to Moses: I am who I am; the second pertains to the New, which determines the plurality of persons, baptizing in the name of the Father and of the Son and of the Holy Spirit. Therefore our master Christ, wishing to raise the young man who had kept the Law to evangelical perfection, principally and precisely attributed the name of goodness to God. No one, he said, is good but God alone. Damascene therefore, following Moses, says that He Who Is is the primary name of God; Dionysius, following Christ, says that the good is the primary name of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25205.html'
source_title='Itinerarium Mentis in Deum, Chapter 5'
