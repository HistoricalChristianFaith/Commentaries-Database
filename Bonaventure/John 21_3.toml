[[commentary]]
quote='''
Simon Peter says to them. Here is touched upon the act or occupation, on the occasion of which he manifests himself; and this indeed was the act of fishing, in which all had come together. But Peter was the principal one, because on account of him especially this manifestation was made; whence he says: Simon Peter says to them: I am going fishing, as the principal one, because he had been a fisherman: Matthew 4: "Jesus, walking by the Sea of Galilee, saw two brothers, Simon, who is called Peter, and Andrew, his brother, casting a net into the sea; for they were fishermen." And the others accompany him; whence he says: They say to him: We also come with you. And therefore, united in one accord, they went out and boarded the boat, to fish, and on that night they caught nothing, and so they labored in vain: Luke 5: "Master, laboring through the whole night, we have caught nothing"; Gregory: "A great difficulty of fishing befell the disciples, so that, when the Master came, there might arise a great height of admiration."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: since it is written in Luke 9: "No one putting his hand to the plow and looking back is fit for the kingdom of God," what is it that Peter, who had left his nets, returns again to fishing? Gregory responds that "an occupation which existed before conversion without sin, to resume this after conversion was not a fault." Hence Augustine: "It must be understood that the disciples were not prohibited from seeking necessary sustenance by their lawful and permitted trade, if they had nothing else from which to live."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
