[[commentary]]
quote='''
Whence he adds: And one of them struck the servant of the high priest and cut off his right ear. This, however, was Peter. Hence three Evangelists do not name him out of reverence, but John names him to intimate his fervent zeal; whence John 18: "Simon Peter, having a sword, drew it and struck the servant of the high priest." In this deed, Peter's zeal is praised; whence the Gloss: "Peter was zealous with the same ardor of mind as Phinehas," of whom it is said in Numbers 25 that on account of the zeal with which he pierced through the fornicators, he obtained an everlasting priesthood. Here, however, the zeal is praised, not the deed; whence Matthew 26: "Put your sword back into its sheath: for all who take the sword shall perish by the sword."

Nevertheless, although the deed is not praised, the mystery is commended. For in this it is signified that the power of Peter's priesthood took away the observance of the rite of the legal priesthood, which was a servitude. — Or certainly by the cutting off of this ear it is understood that that people, who in name is called king, but in truth is a servant, lost spiritual understanding; whence the Gloss on John 18: "The servant of the high priest, who is called Malchus, that is, king, is the Jewish people, who through unbelief was made a servant of impiety, who lost the right ear, so that he might hear only the usefulness of the letter." Hence Peter did not take away this ear, but showed it to have been taken away; whence the Gloss: "The ear was taken away, not by Peter removing it, but by divine judgment revealing it to have been taken away."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
