[[commentary]]
quote='''
"For Jesus himself bore witness," that is, he asserted as true, "that a prophet has no honor in his own country:" Luke 4: "No prophet is accepted in his own country." The Gloss says that because on his first coming into Galilee he had not received honor, therefore he returns yet a second time, so that at least in this way they might believe in him through signs. For they had already been in some way disposed through the signs which they had seen in Jerusalem.

It is asked about what he says, that "a prophet has no honor in his own country." Against this: Because a man is not honored except where he is known: therefore if he is known among his countrymen, not among foreigners, it seems that he would be honored more in his own country than in a foreign one. Likewise we see that the prophet David had the honor of kingship in his own country. Likewise it seems that Christ did have honor. For it is said in the text that "the Galileans received him:" therefore they honored him.

It must be said that a prophet is not honored in his own country for a twofold reason: both by reason of carnal generation, and by reason of familiar association. By reason of generation: for when he has a father and mother who are ignoble, lowly, and poor, as Christ was believed to have, he is despised on account of them. By reason of familiar association, because familiarity breeds contempt: therefore, since they knew Christ's parents to be poor and knew his upbringing, they believed there was nothing divine in him.

As to the objection that acquaintance causes a man to be honored: it must be said that acquaintance with virtue assists, but acquaintance with origin and weakness hinders. As to the objection about David and other prophets, it must be answered that "a rule should not be pronounced from rarely occurring cases." And because this rarely occurs, therefore etc. As to the objection that they received him: Augustine responds that they received him outwardly in a bodily manner, but not inwardly through faith: and this is not the honor the Lord requires. For the Lord does not place importance on a festival of the arm, but on a faithful mind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
