[[commentary]]
quote='''
I believe, Lord; and by the service of devotion: And falling down he adored Him, as God, who alone is to be adored with latria: whence the Lord answered the devil in Matthew 4: "You shall adore the Lord your God and Him alone shall you serve"; Deuteronomy 6: "You shall fear the Lord your God and Him alone shall you serve."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
