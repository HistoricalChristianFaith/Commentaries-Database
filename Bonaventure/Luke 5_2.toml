[[commentary]]
quote='''
Second, there is added the opportunity of a boat lifting him up upon the water, when it is added: And he saw two boats, opportune, namely, for carrying, both because they were near: on account of which he says: Standing by the lake; and also because they were idle or empty; whence he also adds: But the fishermen had gone out and were washing their nets: and thus they were opportune for service. He saw these boats of poor fishermen near to himself, because, as is said in the Psalm, "The Lord is exalted, and he regards the lowly, and the lofty he knows from afar." And he saw these as opportune for himself for service, according to that passage of Ecclesiasticus 3: "Great is the power of God alone, and he is honored by the humble alone." Whence he also humbles himself, so that he who carries all things might be carried by a boat: Wisdom 14: "But you, Father, in your providence govern all things, because you have given a way in the sea and among the waves a most firm path, showing that you are able to come to the aid of all, even if someone should approach the sea without a vessel."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
