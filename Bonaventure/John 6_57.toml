[[commentary]]
quote='''
"As the living Father sent me": "living," by essence; "and I live because of the Father," namely because I have life from him; above in the fifth chapter: "As the Father has life in himself, so he has given to the Son also to have life in himself," and this from the Father remaining in him: below in the fourteenth chapter: "I am in the Father, and the Father is in me"; and from this the major premise is obtained: He who remains in me, etc. And from this the conclusion is drawn: "And he who eats me, he also shall live because of me": because, namely, he who remains in life by eating truly lives because of me, since, as is said below in the eleventh chapter, "I am the resurrection and the life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
