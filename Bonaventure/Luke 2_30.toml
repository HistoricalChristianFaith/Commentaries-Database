[[commentary]]
quote='''
Because my eyes have seen etc. Here secondly is added the magnification of Christ according to the threefold excellence of piety, wisdom, and majesty. From piety and clemency comes salvation; from wisdom shines light; from majesty, glory and praise: salvation, namely, for all peoples; light for the nations; and glory for the Israelites.

As for the salvation of clemency, it is said: Because my eyes have seen your salvation; whence that word of Job 33 could be said to Simeon: "You shall see his face with joy"; Baruch 3: "After these things he was seen upon earth and conversed with men."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
