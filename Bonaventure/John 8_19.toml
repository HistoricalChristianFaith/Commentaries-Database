[[commentary]]
quote='''
"They said therefore to him." Here is touched upon the manifestation of Jewish ignorance: first in their interrogation. For since they did not understand what he was saying, namely that the Father bore witness concerning Christ himself, therefore they ask: "Where is your Father?" They do not ask who he is, but where he is; and they inquire unfittingly, because he is everywhere: Jeremiah twenty-three: "I fill heaven and earth"; therefore they deserve reproof rather than a satisfactory answer. Their ignorance is made manifest in Christ's response, by which he reproves them and shows that they foolishly inquire about the Father, because, being ignorant of the Son himself, they cannot know the Father. Therefore he says: "You know neither me nor my Father." And the reason for this is that I am the way of knowing the Father; whence he says: "If you knew me, perhaps you would know my Father also": for in Matthew eleven: "No one knows the Son except the Father, nor does anyone know the Father except the Son, and him to whom the Son wills to reveal him"; whence First John two: "Everyone who denies the Son does not have the Father; but he who confesses the Son has the Father also."

There is a question about what he says: "Neither do you know me" etc.: because above in the seventh chapter: "You both know me, and you know whence I am."

And the response is that the former was said according to his humanity: but this was said according to his Divinity: because he who sees the Son sees the Father also.

But concerning this there is a question: "If you knew me, you would perhaps know my Father also"; because if in God no opinion has place, then neither does doubt; what then is the meaning of his saying "perhaps"?

I respond: It must be said that by this adverb "perhaps" unbelief is here reproved, not that the Divinity holds an opinion; there is also intimated to us the freedom of human choice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
