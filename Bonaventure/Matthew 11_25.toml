[[commentary]]
quote='''
"You have hidden these things from the wise and the prudent, and have revealed them to the little ones," that is, to the humble. For nothing so darkens the understanding in those things which are of God as presumption. We all praise humility and censure presumption; yet few are free from presumption. Richard of Saint Victor says that "in disputing against pride a man frequently becomes proud." Behold that the strong deceiver deceives many. No one can illuminate the hearts of men except he who knows the consciences of men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25208.html'
source_title="Collationes de Septem Donis, Collation 8"

[[commentary]]
quote='''
This wisdom is called manifold because there are many ways of expressing it. Hence it was necessary that wisdom be shown under many figures, many sacraments, many signs, in order also that it be hidden to the proud and revealed to the humble. These veils cover Christ, hiding wisdom from the wise and impure. Hence in Matthew: "I praise Thee, Father, Lord of heaven and earth, that Thou didst hide these things from the wise and prudent, and didst reveal them to little ones." Well did the Apostle write: "To me, the very least of all saints," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25202.html'
source_title='Collations on the Hexaemeron, Collation 2'

[[commentary]]
quote='''
This is what Wisdom Himself says in Matthew eleven: You have revealed these things to little ones, etc.: on which Bernard, in On the Steps of Humility: "It appears that the truth which is hidden from the proud is revealed to the humble. Humility, moreover, is the virtue by which a man, through true knowledge of himself, becomes worthless in his own eyes: and this befits those who, having disposed ascents in their heart, advance from step to step until they reach the summit of humility, in which, as if placed in Sion, they behold the truth." And a little later: "He who commanded humility leads to truth"; whence also the ladder of Jacob, "what else does it suggest to us, except that in the summit of humility consists the knowledge of truth?" And a little later: "Good is the way of humility, by which truth is found, charity is acquired, the fruits of wisdom are partaken of."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25201.html'
source_title='Disputed Questions on Evangelical Perfection, Question 1'
