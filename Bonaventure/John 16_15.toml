[[commentary]]
quote='''
Thoughts about God must be the highest in the order of goodness, because He is the Best, and out of this Goodness He supremely pours Himself and loves. Wherefore He has not spared even His own Son, and by giving Him to us, He gave us all that He knew, all that He could give. The Son said: All things that the Father has are mine. The Father gave us a Son born of us, He gave us One who suffered for us and rose again for our sake.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
The third relationship to the mirror consists in the fact that in God there is a proper relationship to productive diffusion. God's being is supreme good, wherefore it supremely diffuses itself in a threefold outpouring: utterly actual, complete, and directed toward an end, that is, most final. Because it is utterly actual, it always is, always was, and always shall be; it always begets, always has begotten, and always shall beget. Now no creature can have so great a power that it always is, always was, and always shall be; wherefore by necessity it must emanate as an eternal being. Again, such diffusion is not utterly complete in any creature, for God does not grant to the creature the full splendor of exemplarity: He confines his grant to begetting the Son who is entitled to say: "All things that the Father has are mine." No creature can say such a thing. Likewise, this production is utterly final, in that the producing being grants all that He can. But the creature is unable to receive all that God can grant. And so, as the point adds nothing to the line—nor do a million points—the goodness of a creature adds nothing to that of the Creator, because the finite adds nothing to the infinite. Wherefore, by necessity, such diffusion in the fullness of its possibilities can exist only in something greater than which nothing can be conceived. But it is possible to think of something greater than any creature, and to conceive an increase in the creature itself. But in the Son, there is production, as in the Father. If, then, nothing can be conceived that is greater than the Father, the same may be said of the Son. If the Father also did not diffuse Himself in the most final way, He would not be perfect.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252011.html'
source_title='Collations on the Hexaemeron, Collation 11'

[[commentary]]
quote='''
All things that the Father has are mine: below in chapter seventeen: "All mine are yours, and yours are mine." Therefore I said: Because He will receive of mine and will announce it to you: of mine, which nevertheless I received from the Father. Thus the Holy Spirit declares the Son, from whom He proceeds, just as the Son also declares the Father; above in chapter one: "The Only-begotten Son, who is in the bosom of the Father, He has declared Him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
