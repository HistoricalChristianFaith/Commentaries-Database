[[commentary]]
quote='''
"Do not judge according to appearance," accepting the human face. Concerning the good judge, Isaiah eleven: "He shall not judge according to the sight of the eyes, nor reprove according to the hearing of the ears." "But judge a just judgment," according to merits, not according to the appearance of persons. Augustine: "He does not judge with partiality who loves equally." And because they loved unequally, because they cared more about external things, therefore they judged unjustly; whence it is said in Matthew twenty-three: You Pharisees "cleanse what is on the outside"; and they justified themselves before men: Luke sixteen: "You are they who justify yourselves before men, but God knows your hearts."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
