[[commentary]]
quote='''
The Lord manifested himself above to the disciples, the Jews, and the Samaritans; here begins the fourth part of this section, in which he manifests himself to the Galileans, his own countrymen, as being harder to believe. And this manifestation, which was made through a miracle, proceeds in this order. First, there is indicated in the Galileans a defect of reverence for honoring: second, a defect of faith for believing: third, the obtaining of the miracle: fourth, from this the building up of faith.

First, therefore, there is indicated a defect of reverence for honoring Christ. For because they were countrymen of Christ, therefore to remove their irreverence Christ came to them, so that he might show himself to them in miracles. "But after two days," during which, namely, he was in Samaria, "he departed from there and went into Galilee," namely his own country, in order to convert those who were harder.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
