[[commentary]]
quote='''
Here the third point is touched upon, namely the motivating reason for saving in this way; and this was the immensity of divine love toward lost mankind. On account of which He says: "For God so loved the world," that is, worldly and sinful man: that "He gave His Only-begotten Son": Ephesians 2: "God, who is rich in mercy, on account of His exceeding charity with which He loved us, when we were dead in sins, made us alive together with Christ." Therefore exceeding, because He gave more than was necessary: Romans 8: "He who did not spare even His own Son, but delivered Him up for us all." He gave Him, I say, for all as regards sufficiency, but as regards efficacy, for the elect and for believers. Therefore He adds: "That everyone who believes in Him" may not "perish, but may have eternal life." The passion avails none but believers, because, as it is said in Hebrews 11, "without faith it is impossible to please God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
