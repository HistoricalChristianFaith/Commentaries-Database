[[commentary]]
quote='''
Secondly, as regards mercy relieving destitution, he adds: And the next day he brought out two denarii and gave them to the innkeeper. He brought out a small sum of money, because perhaps he had but little, according to that passage of Tobit four: "As you are able, be merciful. If you have much, give abundantly; but if you have little, strive to share even that little willingly."

And because, although the money was small, the will to help was great, therefore he adds: And he said: Take care of him, and whatever you spend over and above, I, when I return, will repay you. From which it appears that his mercy was complete, not like that of those of whom it is said in Hosea six: "Your mercy is like a morning cloud and like the dew that passes away early." But of this man could truly be said that word of the Psalm: "All day long he shows mercy and lends, and his seed shall be in blessing," and truly, because, according to what is said in Proverbs nineteen, "he who has mercy on the poor lends to the Lord, and He will repay him his recompense."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'

[[commentary]]
quote='''
Christ applied nourishment, which is done through the teaching of the two testaments, which is understood in the offering of the two denarii that he gave to the innkeeper, that is, to the prelate, whose task it is to minister the teaching of Christ and by expounding to spend beyond what is owed. Whence Sirach 45: "The Lord gave Moses a heart for precepts and the law of life and discipline, to teach Jacob his covenant and his judgments to Israel." To these the Lord will repay, when he returns on the day of judgment, all that was spent beyond what was owed; for, as is said in Daniel 12, "those who instruct many unto justice shall shine as stars for perpetual eternities"; Matthew 25: "Well done, good and faithful servant, because you have been faithful over a few things, I will set you over many things," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
