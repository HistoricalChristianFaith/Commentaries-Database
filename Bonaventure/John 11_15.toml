[[commentary]]
quote='''
But I am glad for your sakes, that is, for your benefit, that you may believe, because I was not there; this does not refer to faith, but to the joy, I am glad, namely, because I was not there, so that afterwards from our coming your faith may be strengthened. Therefore he says: But let us go to him, on account of safety and the need of Lazarus and your benefit. The reason why he was coming was because he was a friend: below in chapter 14: "If anyone loves me, he will keep my word, and my Father will love him, and we will come to him and will make our abode with him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
