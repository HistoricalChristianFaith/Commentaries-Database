[[commentary]]
quote='''
When a worthy admission has come about together with a holy perception, then the soul is rapt in God, that is, in the beloved. Hence, in the Canticle: "His left hand is under my head and His right arm embraces me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252022.html'
source_title='Collations on the Hexaemeron, Collation 22'
