[[commentary]]
quote='''
Likewise, Mark 11: Having looked around at all things, He went out to Bethany: Gloss: "to see if anyone would receive Him as a guest; for He was of such great poverty and flattered no one, so that in so great a city He could find no lodging"; but it is certain that if He had wished to hire lodging, He would have found a place to hire: therefore He was looking around as a poor man and beggar.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
