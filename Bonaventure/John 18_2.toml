[[commentary]]
quote='''
"And Judas also, who betrayed him, knew the place." And the reason is added: "Because Jesus often resorted thither with his disciples." Victor: "Judas had noted this place, because the Lord had been accustomed to come to it often." This place was at the foot of the Mount of Olives; Jesus went there frequently; Luke 21: "During the days he was teaching in the temple, but at night going out, he abode on the Mount of Olives."

Question III. Likewise it is asked: why did the Lord go out of the city at night? It seems that he wished to hide. Chrysostom responds that he did this not only then, but was also accustomed to do so often, so that he might withdraw from the tumult of men and speak about necessary things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
