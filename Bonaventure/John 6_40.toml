[[commentary]]
quote='''
"But this is the will of my Father who sent me, that everyone who sees the Son," according to his humanity, "and believes in him," through the freedom of his own will, because, as Augustine says, "a man cannot believe unless willing": "should have eternal life," as a reward: "and I will raise him up on the last day," and thus he will attain this life through the Son: Ephesians 2: "When we were dead in sins, he made us alive together with Christ and raised us up together and made us sit together in the heavenly places in Christ Jesus"; and this "on the last day," because, as is said in First Corinthians 15, "the last of all enemies to be destroyed will be death."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
