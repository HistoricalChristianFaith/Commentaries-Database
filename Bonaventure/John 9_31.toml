[[commentary]]
quote='''
We know that God does not hear sinners: whence Isaiah one, the Lord to sinners: "When you multiply prayer, I will not hear"; Job eight: "God will not cast away the simple, nor extend his hand to the wicked." But if anyone is a worshiper of God and does his will, him he hears: below in chapter fifteen: "If you abide in me, and my words abide in you, you shall ask whatever you will, and it shall be done for you"; First John three: "We have confidence toward God, that whatever we ask, we receive, because we keep his commandments and do those things that are pleasing before him." But this one he especially hears; and he proves this.

It is asked: Did God not hear the publican? The response is twofold, from the Gloss: in the first way, so that emphasis falls on what he says: he does not hear sinners, because he does not hear those persisting in sin — unto salvation, that is. The Gloss responds in another way, that the blind man had not yet been anointed nor inwardly illuminated, and therefore he spoke falsely, although he believed he was speaking the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
