[[commentary]]
quote='''
But one of them, etc. Here the second point is touched upon, namely the determination of the counsel, which was made by human authority, by divine dispensation, and by common agreement. By human authority: on account of which he says: One of them, named Caiaphas, since he was the high priest of that year, and thus had authority, and through this gave an authoritative counsel, said: You know nothing at all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
