[[commentary]]
quote='''
Jesus said to them: If you were blind, you would not have sin; because then the Lord would illuminate you: whence 1 Corinthians 3: "If anyone among you seems to be wise in this world, let him become a fool, that he may be wise." But now you say: We see, and you consider yourselves wise: your sin remains, namely of unbelief, according to that passage in Romans 1: "Professing themselves to be wise, they became fools." Whence the Lord addresses them in Jeremiah 5: "Hear, O foolish people, without understanding, who have eyes and do not see, and ears, and do not hear." And because they, though seeing, were unwilling to believe, therefore they have been blinded; the Psalm: "Let their eyes be darkened, that they may not see."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
