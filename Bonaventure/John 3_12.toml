[[commentary]]
quote='''
Jesus said to Nicodemus: "If I have spoken of earthly things to you, and you do not believe, how will you believe if I speak to you of heavenly things?" That is why the Father witnessed for the Son by voice, and the Holy Spirit came down in the form of a dove, in order that the witnessing be most solid.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
"If I have spoken earthly things to you and you do not believe, how, if I tell you heavenly things, will you believe?" As if to say: you will not; and therefore the manner of understanding is to believe lesser things through faith before one arrives at sublime things. 1 Corinthians 3: "As little ones in Christ, I gave you milk to drink, not solid food." But if they would not receive milk, how could they receive solid food? From the foregoing, therefore, it is clear that regeneration is necessary, is spiritual and hidden, and that no one can understand it unless he believes.

An inquiry is made concerning what he says: If "I have told you earthly things" etc.: what are these earthly things? For everything he spoke is spiritual, nothing earthly.

To this Chrysostom responds that the earthly things which he spoke of are those things he said concerning the spirit, that is, concerning the wind: but Augustine expounds it concerning the raising of the temple, which he had foretold in the preceding chapter, namely insofar as it was of the earth, whether it be understood of the material temple or of the body of Christ, because it was taken from our earth. It can be answered otherwise, that he calls earthly those things which have been said above, not absolutely, but because they are small in comparison to the things yet to be said.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
