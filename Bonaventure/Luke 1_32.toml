[[commentary]]
quote='''
Lastly, expressing the eminence of the offspring to be born, he shows him to be great, when he says: He shall be great. He shows, moreover, that his greatness is most excellent on account of singular grace, on account of royal excellence, on account of eternal power. — He touches upon singular grace when he says: And he shall be called the Son of the Most High, namely through the grace of union: the Son, I say, the Only-begotten, according to that word of John 1: "We saw his glory, the glory as of the Only-begotten of the Father." And thus he shall be equal to the Most High, according to that word of the Psalm: "You, Lord, are most high over all the earth." Who is this but Christ the Lord? of whom it is said in Philippians 2: "He gave him a name which is above every name, that in the name of Jesus every knee should bow," etc. This, however, he gave to no other, because in the Son of the Virgin alone is the grace of union.

He intimates royal excellence when he says: And the Lord God shall give him the throne of David, his father, that is, the royal seat, according to what was promised to David: "Of the fruit of your body I will set upon your throne"; and according to what was promised through Jeremiah the Prophet, Jeremiah 23: "Behold, the days come, says the Lord. And I will raise up to David a righteous branch, and a king shall reign and shall be wise." This also was first shown in Daniel 7, concerning the Son of man, of whom he says that "the Ancient of Days gave him power and honor and a kingdom, and all peoples and tribes and tongues shall serve him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
