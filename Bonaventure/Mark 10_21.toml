[[commentary]]
quote='''
Again, Mark 10: Go, sell whatever you have and give to the poor: The Gloss: "Not a part, as Ananias did"; but he who gives everything, reserving nothing for himself, most fully does what the Lord counsels, reserving nothing for himself, neither in common nor in particular; and he who does this acts most perfectly: therefore etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
