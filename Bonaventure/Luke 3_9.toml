[[commentary]]
quote='''
For now the axe is laid to the root of the tree. Here thirdly is added a threat, which is twofold, namely concerning the present and concerning the future. — As to the threat concerning the present it is said: For now the axe is laid to the root of the tree. Whence the Gloss: "The axe is the judicial severity for utterly uprooting fruitless trees, insofar as they are fruitless"; of which it is said in the Epistle of Jude: "Autumn trees, fruitless, twice dead." And such were signified by that fig tree which the Lord withered, Matthew twenty-one, where he says that "he cursed the fig tree, and immediately it withered"; and the reason for this was that he did not find fruit in it. And yet another Evangelist, namely Mark eleven, says that "it was not the time of figs"; in which he intimates that at all times God requires fruit from us: Galatians last chapter: "And let us not grow weary in well doing: for in due season" etc.

But as to the threat concerning the future it is added: Every tree not bearing good fruit, that is, every unprofitable man without respect of persons: Proverbs six: "The jealousy and fury of a man will not spare in the day of vengeance, nor will he relent" etc. Shall be cut down, through death: below in chapter thirteen: "Cut it down; why does it even occupy the ground?" And Daniel four: "Cut down the tree and lop off its branches, shake off its leaves and scatter its fruits." The tree therefore is cut down not only for lack of fruit, but also of good fruit. — And shall be cast into the fire, namely through eternal damnation: John fifteen it is said of the fruitless branch: "They shall gather it and cast it into the fire" etc.: Matthew twenty-five: "Depart from me, you cursed, into eternal fire"; and Isaiah last chapter: "Their worm shall not die, and their fire shall not be quenched."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Commentary on Luke, Chapter 3'
