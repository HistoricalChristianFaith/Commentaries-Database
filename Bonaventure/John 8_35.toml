[[commentary]]
quote='''
"The slave does not remain in the house forever; the Son remains forever." Augustine explains: He who is a slave of sin does not remain in the house forever, that is, finally, although he may belong to the present Church as regards number. Such slaves, even if they are in the house with the good, nevertheless do not have the wedding garment: therefore they are cast out, according to that passage in Matthew twenty-two: "Friend, how did you come in here, not having a wedding garment?" And afterward it is added: "Cast him into the outer darkness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
