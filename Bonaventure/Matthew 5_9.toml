[[commentary]]
quote='''
Since standing in the best is either through limpid cognition or through tranquil affection, hence it is that there are two final beatitudes, namely purity of heart for seeing God and peace of mind for perfectly enjoying him.

For the perfection of interior sanctity, there is necessarily required purity of conscience and tranquility of the whole soul through the peace of God surpassing all human understanding.

Wisdom disposes to peace: for wisdom joins us to the highest truth and good, in which is the end and tranquility of our whole rational appetite.

When this peace has been attained, there necessarily follows a superabundant spiritual delight, which is contained in the twelvefold number of the fruits to intimate the superabundance of delights. For twelve is an abundant number, in which is intimated the exuberance of spiritual charisms, in which the holy soul takes delight and rejoices; and then the person is fit for contemplation and for the gazes and embraces of the Bridegroom and the Bride.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
The seventh virtue is peace, concerning which it says in the Gospel: "Blessed are the peacemakers." The gift of wisdom destroys lust and introduces peace. It is impossible for the soul to tame its flesh unless it is filled with the gift of wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"
