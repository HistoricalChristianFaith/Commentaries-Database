[[commentary]]
quote='''
Simon Peter therefore beckoned to him and said to him: Who is it of whom he speaks? As if to say: ask him. Peter was always eager to inquire, both by himself and through others. At Peter's request, that disciple inquires.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
