[[commentary]]
quote='''
Third, as regards the dissimulation that conceals, he adds: But they were silent. They were silent because, seeing themselves caught and exposed, they feared being confounded by their own response; whence the Gloss of Bede: "Rightly are they silent who see that whatever they might say would be said against themselves. For if it is lawful, why do they watch? If it is not lawful, why do they tend their cattle?" Whence by their silence they feigned ignorance, so as to cover over their malice. A similar instance is found in Matthew twenty-one, where, when the Lord had asked concerning the baptism of John, whence it was, they refused to answer, lest they be convicted of unbelief. Whence that passage of Sirach thirty-seven could be said of them: "O most wicked presumption! whence were you created to cover over barren malice?" But when the leaves of words failed them, they had recourse to the darkness of ignorance and the failure of words; whence they were silent not from prudence, but from ignorance, which has malice joined to it; whence Sirach twenty: "There is one who is silent, not having the sense of speech; and there is one who is silent, knowing the fitting time."

But he, taking hold of him, etc. After the exposure of the observers, there is added here the confutation of those exposed, which the Evangelist describes in three ways, namely as regards the magnificence of the deed, the efficacy of the word, and the evidence of the sign.

First, therefore, as regards the magnificence of the deed, he says: But He, having taken hold of him, healed him and sent him away. In this, that He took hold of him, His humility is apparent, because He does not disdain to touch infirmities in order to teach humility; on account of which the Apostle says in Hebrews 2: "Nowhere does He take hold of angels, but of the seed of Abraham." In this, that He healed, His power is apparent; whence above in chapter six: "Power went out from Him and healed all." In this, that He sent him away, His generosity is apparent, namely to depart as a free man. For He did not reduce him to servitude on account of the benefit conferred, but sent him away to depart as a free man; the Gloss says: "He sent him away bodily healed, so that he might turn himself to the salvation of souls." Whence above in chapter eight, to that demoniac whom He had healed, He said: "Go to your house and tell how great things God has done for you." And through this, Christ in the manner of performing that miracle, by humility confounds the pride of the Jews; by power, their sloth; by generosity and kindness, their faithlessness, since they themselves would neither deign to touch, nor were able to cure, nor were willing to set free.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'

[[commentary]]
quote='''
The second thing, however, that we ought to consider is the work of virtue, in which is understood the healing of spiritual illness. Concerning this, three things are said, namely that he took hold of him, that he healed him, and that he sent him away. He took hold of him, namely through the infusion of grace: Isaiah forty-two: "I the Lord have called you in righteousness, I have taken hold of your hand and kept you"; Psalm: "Send forth your hand from on high, rescue me and deliver me from many waters," etc. He healed him, however, through the expiation of guilt: Psalm: "Who forgives all your iniquities, who heals all your infirmities"; and Matthew one: "He himself shall save his people from their sins." He sent him away, indeed, through the relaxation of punishment; Matthew eighteen: "The lord, having compassion on that servant, released him and forgave him the debt." And this we ask in the Lord's prayer: "Forgive us our debts," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
