[[commentary]]
quote='''
And his parents went etc. Here is described the reverence of the divine majesty, which consists in the worship of religion, and is shown in Christ according to the guidance of the parents and according to his own instinct. As for the guidance of the parents it is said: And his parents went every year to Jerusalem. For so it was commanded in the Law: Exodus twenty-three: "Three times in the year you shall celebrate feasts to me". And it is to be believed that they also brought Jesus, because it is added there: "Three times in the year every male of yours shall appear before the Lord your God"; and this in Jerusalem, according to the precept of Deuteronomy, the twelfth chapter: "You shall come to the place which the Lord your God shall choose out of all your tribes". And this place was Jerusalem, according to what is said in Second Chronicles, the seventh chapter: "I have chosen and sanctified this place, that my name may be there forever". And they performed this worship especially at the Passover, and therefore it is added: On the solemn day of the Passover: Exodus twelve: "You shall have this day as a memorial, and you shall celebrate it as a solemnity to the Lord throughout your generations with everlasting worship".
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
