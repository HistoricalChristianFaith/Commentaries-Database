[[commentary]]
quote='''
"They sought therefore to apprehend him." Here the avoidance of the persecutors is noted, because the time for suffering had not yet arrived: therefore he says: "They sought therefore to apprehend him," but they could not: whence he says: "And he went forth out of their hands." A similar thing is said in Luke chapter four: "But he, passing through the midst of them, went his way," when they wished to cast him down headlong.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
