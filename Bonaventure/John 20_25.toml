[[commentary]]
quote='''
The other disciples therefore said to him. Here is touched upon the report of the disciples. For they report what they had seen: We have seen the Lord. They reported this so that, hearing the testimony of those who had seen, he might believe the resurrection: but what is written above in chapter 3 was verified: "What we have seen we testify, and you do not accept our testimony." Whence follows the third, namely Thomas's hardening. But he said to them: Unless I shall see in his hands, etc. His hardness is shown in this, that he does not believe through hearing, unless he himself should see, in his hands namely, the mark of the nails. His hardness is also shown in this, that he not only refused to believe through hearing, but not even through sight, unless touch were present: therefore he says: And I shall put my finger into the place of the nails and I shall put my hand into his side, which namely was pierced by a lance; I will not believe. In this he was hard: whence Chrysostom says: "Just as to believe simply, and as it happens, is a mark of easiness, so to scrutinize all around and to investigate much is a mark of a most dull mind." But this hardness was permitted by divine dispensation in the Apostle in order to remove ours; whence Gregory says: "Mary Magdalene, who believed more quickly, benefited me less than Thomas, who doubted for a long time. For he, while he touched the wounds of the flesh in the Master, healed in us the wounds of unbelief."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
