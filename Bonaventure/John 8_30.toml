[[commentary]]
quote='''
"As he was speaking these things." Here is touched upon the multiplication of believers in Christ, which came about through this instruction; therefore he says: "As he was speaking these things," namely the things said above, "many believed in him"; because his word had efficacy; above in the fourth chapter: "Many more believed because of his word."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
