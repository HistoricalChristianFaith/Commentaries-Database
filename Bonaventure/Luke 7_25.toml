[[commentary]]
quote='''
Secondly, there is added the commendation of John's abstinence with respect to pleasurable things; on account of which he says: But what did you go out to see? that is, to consider: A man clothed in soft garments? as if to say: no. For John, most holy, was a stranger to all softness of carnality, as is said in Matthew 3: "Now John had a garment of camel's hair, and his food was locusts." He was truly of the number of evangelical men, in whose person it is said in 1 Timothy 6: "Having food and wherewith to be covered, let us be content with these"; wherewith to be covered he says, not: wherewith to be adorned. Bernard to Eugenius: "The Apostles were mighty in battle, not soft in silk; and if you are a son of the Apostles and Prophets, do you likewise." But whoever wishes to do this must forsake the world and go out into the desert with John. — On account of which he adds: Behold, those who are in costly apparel and in delicacies are in the houses of kings: as if to say: costly apparel and a luxurious life belong to worldly men, not to spiritual men and Christians. Whence in 1 Peter 3 it is said of women: "Whose adorning let it not be the outward plaiting of the hair, or the wearing of gold and silver, or the putting on of apparel." On which Gregory says: "Let no one think that there is no sin in the wearing of costly garments. Consider what fault it is that even men should desire that from which the pastor of the Church took care to prohibit even women." For costly garments of this kind are carnal and luxurious, but in delicacies the spiritual life is imperiled; whence 1 Timothy 5: "The widow who lives in delicacies is dead while living"; Jeremiah 31: "How long will you be dissolved in delicacies, O wandering daughter"? Moreover, costly and luxurious garments of this kind are customarily an occasion of vainglory; and therefore he adds: They are in the houses of kings: concerning which Sirach 11: "Never glory in clothing, nor exalt yourself in the day of your honor."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
