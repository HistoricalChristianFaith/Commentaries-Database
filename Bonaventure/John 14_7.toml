[[commentary]]
quote='''
If you had known me, you would certainly have known my Father also; because, as is said above in the tenth chapter, "I and the Father are one"; Matthew 11: "No one knows the Son except the Father, nor does anyone know the Father except the Son, and he to whom the Son wills to reveal him." And from henceforth you shall know him, and you have seen him: you shall know him, namely in the coming of the Holy Spirit: below in the sixteenth chapter: "When that Spirit of truth shall come, he will teach you all truth." That word of Jeremiah 31 shall be verified in you: "I will give my law in their inward parts, and in their hearts I will write it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
