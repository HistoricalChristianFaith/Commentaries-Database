[[commentary]]
quote='''
Here is placed the confirmation of the preceding instruction: whence he repeats what he had said and doubles the adverb of affirmation: on account of which he says: "Amen, amen I say to you," that is, truly, truly I say: "He who believes in me has eternal life": and he proves this, because he himself is the bread that gives life to believers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
