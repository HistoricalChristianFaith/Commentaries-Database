[[commentary]]
quote='''
Having set forth the refutation of those rising up through power, here is set forth the refutation of those plotting through malice. Because they could not kill him, they sought to find an occasion to catch him in his speech. And therefore they proposed a question to catch the Lord: but they themselves were on the contrary caught and confounded. And their refutation is described in this order. For first is set forth Christ's instruction; second, the malicious question of the Pharisees; third, Christ's prudent response; fourth, the confusion of the Pharisees; fifth, the liberation of the woman.

Therefore first is introduced Christ's instruction, which was diligent, public, and authoritative. Diligent, whence he says: "But Jesus went to the Mount of Olives": because he was lodging in Bethany in the house of Mary and Martha; Luke twenty-one: "During the days he was teaching in the temple, but going out at night he stayed on the mount called Olivet."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
