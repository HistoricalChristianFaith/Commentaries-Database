[[commentary]]
quote='''
There shines forth a threefold signification in Scriptures, teaching what to believe, what to expect, and what to do. What to believe, in terms of faith; what to expect, in terms of hope; what to do, in terms of charity, which consists in action, and not only in affective dispositions. "If anyone love Me, he will keep My word."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25202.html'
source_title='Collations on the Hexaemeron, Collation 2'

[[commentary]]
quote='''
Jesus answered and said to him: If anyone loves me, he will keep my word; Luke 6: "Why do you call me Lord, Lord, and do not do the things which I command you?" "The love of God is not idle: for it works great things, if it is; but if it refuses to work, it is not love." And from this observance one merits the Lord's manifestation; hence and my Father will love him: and from this love follows manifestation: therefore he says: And we will come to him. And if the Lord comes, no good is lacking: Wisdom 7: "All good things came to me together with her." And we will make our abode with him, and this by merit of the observance of the commandments: hence Gregory: "He who truly loves God and perfectly keeps his commandments, in him the Lord makes his abode: because the love of the Divinity so penetrates him that he does not withdraw from this love in the time of temptation." And therefore, supply, he is manifested to you who keep my commandments, because you love me, and therefore you merit it.

It is asked concerning what is said of the Father, that the Father will come: whence: We will come to him. Why does He say this rather of Himself and the Father than of the Holy Spirit? And it seems that this ought not to be said of the Father, because the Father sends the Son. But if the Father were to come at the same time as the Son, by the same reason by which He would send the Son, by the same reason He would also send Himself. Likewise, how does He come who is everywhere and does not assume a creature? I respond: It must be said that the coming of God to us, as Augustine says, is understood according to effect, not through essence; whence Augustine: "They come to us while we come to them: they come by helping, we come by obeying; they come by illuminating, we come by beholding; they come by filling, we come by receiving." Since therefore the works of the Trinity are undivided, when the Holy Spirit comes, according to truth the Father and the Son come; yet according to appropriation it is attributed to the Father, who is another of the persons. To send, however, besides the fact that it denotes an effect, implies a personal distinction through authority and sub-authority: and therefore, even though the Father comes with the Son, He does not however send Himself with the Son. He does not make mention of the Holy Spirit, because He had spoken of this above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
