[[commentary]]
quote='''
When she had said these things. Here, to her who is unwilling to be consoled, the manifestation of Christ occurs: and first he manifests himself to the senses of the flesh, then of the mind: to the senses of the body, namely to sight through appearance and to hearing through conversation. She first beholds Jesus, whence he says: When she had said these things, by which she was showing that she did not wish to be consoled; she turned around and saw Jesus standing. She turned because love did not allow her to stand still, but rather she looked now here, now there. Or, as Chrysostom says, "Christ, appearing silently behind her, struck the Angels with awe, and they by their movement and gesture showed that they had seen something great: and this turned the woman around." And she saw Jesus, with the eyes of the body, not of the heart: whence: And she did not know that it was Jesus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
