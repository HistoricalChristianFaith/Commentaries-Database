[[commentary]]
quote='''
For which reason he adds: And Jesus said: Someone has touched me, that is, some person, namely by a spiritual touch; and he proves this: For I know that virtue has gone out from me. He says this with regard to the effect of the healing; and thus is verified that passage from Wisdom 12: "But you show your power, you who are not believed to be consummate in power." Moreover, he shows the effect going out from him, according to what is said above in the sixth chapter, that "virtue went out from him and healed all." Nor is this surprising, because, in First Corinthians 1, "we preach Christ the power of God and the wisdom of God"; Hebrews 1: "Upholding all things by the word of his power."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
