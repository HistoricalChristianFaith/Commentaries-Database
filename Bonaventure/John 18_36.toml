[[commentary]]
quote='''
"Jesus answered." Here the third point is set forth, namely the Lord's response, in which the Lord himself refutes the wicked intention of the Jews. For the Jews intended through this to provoke Pilate and Caesar against him, as though he were unwilling to have a colleague in his kingdom; therefore the Lord excludes this by saying: "My kingdom is not of this world." Augustine: "Hear, O Jews and Gentiles: My kingdom is not of this world; I do not impede your dominion in this world. What more do you want?" And he gives the reason that his kingdom is not of this world, and his reasoning is as follows: for an earthly king, ministers fight so that he is not handed over to death; but for me, my ministers do not fight; therefore I am not an earthly king. And he sets forth the major premise of this reasoning: "If my kingdom were of this world, my ministers would certainly fight, so that I would not be handed over to the Jews; but now:" it is apparent, supply the verb; this is the conclusion: that "my kingdom is not from here," because no one defends me. And therefore his kingdom is not of this world, because, as is said in the last chapter of First John, "the whole world is set in wickedness"; therefore we pray: "Thy kingdom come"; but it is in the heavens: whence Matthew 5: "Whoever shall do and teach, he shall be called great in the kingdom of heaven," etc.

Question I. But here the first question concerns what he says: "My kingdom is not of this world." From this the heretics argue that this world does not belong to the God of light, but to the God of darkness. Against this: Above in chapter 1: "He came unto his own." If you say that "world" does not refer to nature, but to people living in a worldly manner; against this: in Matthew 13 it is said that the angels will gather out of his kingdom all scandals: but it is certain that scandals exist only in this world. I respond: Chrysostom says briefly that it is the same as if he said that his kingdom is not worldly and corporeal. It can be said otherwise that those are called the kingdom of Christ in whom he himself reigns and who obey him, not through power, but through obedience. But such are only the Saints, and these are not of the world: above in the seventeenth chapter: "They are not of the world, just as I also am not of the world." Yet they are in the world: whence in the same place: "I do not ask that you take them from the world, but that you keep them from evil."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
