[[commentary]]
quote='''
Secondly, as to the admonition of the interior judgment, it is added: Why do you not even of yourselves judge what is just? As if to say: even if you neglect the exterior admonition, do not neglect the interior one. Whence Ecclesiasticus 31: "Know the things of your neighbor from yourself," that is, from your natural judgment. For there is implanted in man a natural judgment, by which he is directed to see and to choose; Psalm: "The light of Your countenance, O Lord, is signed upon us"; and Isaiah 46: "Return, transgressors, to the heart"; for there it is dictated what is just. And among all things that are just, natural reason dictates this, which even Antiochus said, 2 Maccabees 9: "It is just to be subject to God, and that a mortal man should not think himself equal to God." This therefore is most especially what is just, which everyone ought to judge, namely, that God is to be worshipped and Christ honored and the gift of the Holy Spirit received with reverence; because, John 5, "he who does not honor the Son does not honor the Father," etc. It is also just to judge that "God will judge the world in equity," and to forestall that judgment by judging oneself, because, 1 Corinthians 11, "if we judged ourselves, we would certainly not be judged," etc. Whence conscience naturally protests, and it also testifies that our evils will not remain without consequence. And therefore from it we ought to be stirred to meriting divine grace; Romans 2: "When the Gentiles, who do not have the Law, do by nature the things that are of the Law, such as these, not having the Law, are a law unto themselves, because they show the work of the Law written in their hearts, their conscience bearing witness to them," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
