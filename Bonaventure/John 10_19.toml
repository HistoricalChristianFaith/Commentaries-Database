[[commentary]]
quote='''
"There was a division again." Here the discord of the Jews arising from the Lord's instruction is noted, because some, not understanding, thought that he was mad; others, however, that he was speaking sublime things. Therefore he says: "There was again a division among the Jews, because above there was a division on account of the miracle," above in chapter nine, "on account of these words," because they did not understand; on account of which:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
