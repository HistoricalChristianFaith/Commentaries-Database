[[commentary]]
quote='''
Once more, times are compared five by five: the times of the establishment of natures, the inspiration of patriarchs, the institution of laws, the revelation of prophets, and the restoration of ruins; and, in the New Testament, the times of the diffusion of charismatic gifts, the calling of the Gentiles, the institution of Churches, the multiplication of religious orders, and the restoration of ruins, of which it is said that Elias, when he comes, shall "restore all things."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252016.html'
source_title='Collations on the Hexaemeron, Collation 16'

[[commentary]]
quote='''
The fifth time, at the end, is that of the restoration of ruins, for "Elias indeed is to come and to restore all things," and with him Henoch will come too. For "the beast will conquer them." And so, it is necessary that they fail, so that there be first a ruin and then a restoration; and there will be so great a "tribulation as to lead astray, if possible, even the elect."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252015.html'
source_title='Collations on the Hexaemeron, Collation 15'
