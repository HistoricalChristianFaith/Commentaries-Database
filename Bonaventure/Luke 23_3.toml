[[commentary]]
quote='''
Second, with respect to the right inquiry, is added: Pilate then questioned him, saying: Are you the king of the Jews? It should be noted that although Christ was accused of three things, Pilate inquired only about one, because he knew that the others were false. For since the holiness and goodness of Christ was apparent through his miracles and his reputation, and since through his own words it was evident that he did not forbid tribute to be rendered to Caesar, he doubted only about the third and inquired about it. Whence the Gloss: "Pilate could have heard what he had said concerning tributes: Render the things that are Caesar's to Caesar: and therefore, disregarding this as an obvious falsehood, he inquired only about what he did not know." And in this he acted rightly, according to that passage of Job 29: "The case that I did not know, I investigated diligently."

But because he himself was not worthy to hear the truth, being incredulous, therefore he adds: But he answering said: You say it. Whence John 18: "Pilate said: Are you then a king? Jesus answered: You say it, because I am a king." But he did not affirm this because Pilate was not fit to receive this truth. On account of which, John 18: "For this I was born, that I might bear witness to the truth; everyone who is of the truth hears my voice. Pilate said to him: What is truth? And when he had said this, he went out again to the Jews." From which it appears that he did not truly seek the truth, because, when he had asked, he did not wait for the answer. And therefore he merited to hear neither what truth was nor the truth itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
