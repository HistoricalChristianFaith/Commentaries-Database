[[commentary]]
quote='''
And the people were, etc. Here is touched upon fourthly the evidence of the sign on account of the presence of the multitude and the absence of speech. He touches upon the presence of the multitude waiting and wondering, saying: And the people were waiting for Zechariah, and they wondered that he tarried in the temple. For it pertains to the people to wait: whence Moses, when he ascended the mountain, said to the elders, Exodus 24: "Wait here until we return to you," because, according to what is said in Lamentations 3, "it is good to wait in silence for the salvation of God." It also belongs to the people to wonder at divine secrets, not to scrutinize them: in Sirach 11 it is said of the just man, and it can be expounded concerning Zechariah: "The eye of God looked upon him for good and raised him up from his lowliness, and exalted his head, and many wondered at him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
