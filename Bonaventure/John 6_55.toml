[[commentary]]
quote='''
Here the truth of the refreshment is touched upon. For the flesh of Christ truly refreshes, because it is true food, and therefore gives life. For this reason he says: "For my flesh is truly food": so truly have I said that he who eats has life; "for my flesh is truly food," not in a phantasmic way, like bodily foods, which refresh for a moment and then fail. "And my blood is truly drink," because it takes away thirst entirely; above in the same chapter: "He who comes to me shall not hunger, and he who believes in me shall never thirst." And that his flesh is true food that refreshes and vivifies, he shows by this reasoning: he who abides in me lives because of me; but he who eats my flesh abides in me; therefore he who eats my flesh lives because of me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
