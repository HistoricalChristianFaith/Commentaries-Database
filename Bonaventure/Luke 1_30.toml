[[commentary]]
quote='''
Therefore the Angel, expressing the good pleasure of divine acceptance, strengthens and addresses the Virgin by name: Fear not, Mary. Fear not, I say, but rejoice, because your name is written in heaven, according to what is said below to the Apostles, in chapter ten: "Rejoice that your names are written in the heavens." And he gives the reason: For you have found grace with God, the grace, namely, of election, as Moses: Exodus 33: "You have found grace before me, and I have known you by name"; so it is said to the Virgin Mary. Also the grace of perfection, as Noah: Genesis 6: "Noah found grace before God"; and shortly after: "Noah was a just and perfect man, and he walked with God." The grace of espousal, that she might become the spouse of God and the mother of the Son of God; Esther 2: "Esther found grace and mercy before Ahasuerus above all women, and he set the royal crown upon her head." Moreover, she found grace on account of her exceeding humility and meekness: James 4: "God resists the proud, but gives grace to the humble"; and Sirach 3: "The greater you are, humble yourself in all things, and you shall find grace before God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
