[[commentary]]
quote='''
He describes him from his constancy, when he adds: This man went to Pilate and asked for the body of Jesus: and this indeed he did with great constancy, fearing neither the ferocity of the Gentiles nor the malice of the chief priests, since, in Mark 15, "he went in boldly to Pilate and asked for the body of Jesus." Whence Joseph, who had previously hidden himself, as is said in John 19, that "he was a disciple of Jesus, but secretly for fear of the Jews," here now revealed himself. In this it is given to understand that disciples of the truth ought to manifest themselves in the moment of necessity: for it is said above in chapter nine: "Whoever is ashamed of me and of my words, of him shall the Son of Man be ashamed, when he comes in his majesty and the Father's," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
