[[commentary]]
quote='''
This same thing was fitting on account of the weakness of the flesh, on account of which he says: And no one puts new wine into old wineskins, because from this a twofold unfittingness follows, namely the spilling of the wine, on account of which he says: Otherwise the new wine will burst the wineskins, and it will be spilled out; and the other, the destruction of the wineskin, whence he also adds: And the wineskins will perish. And therefore for new wine a new vessel also must be provided, on account of which he says: But new wine must be put into new wineskins, and both are preserved. — Thus spiritual observances are to be imposed on spiritual persons, not on carnal ones, who are designated by the old wineskins, according to that verse of the Psalm: "I have become like a wineskin in the frost"; whence they are designated by the wineskins of the Gibeonites, torn and loosened: Joshua nine: "We filled new wineskins with wine, which now are torn and loosened," and thus unfit for holding wine. And therefore First Corinthians, chapter three: "And I, brethren, could not speak to you as to spiritual persons, but as to carnal ones, as to little ones in Christ. I gave you milk to drink, not solid food." Therefore before spiritual things are enjoined upon them, it is necessary that their hearts be renewed, according to that verse of Ezekiel thirty-six: "Behold, I will give you a new heart and I will place a new spirit in the midst of you"; because the Apostle says to the Galatians, chapter six: "In Christ Jesus neither circumcision avails anything nor uncircumcision, but a new creature." And therefore in the Psalm it is sought: "Create in me a clean heart, O God, and renew a right spirit within my inmost parts"; which is accomplished in spiritual men: Second Corinthians, chapter four: "Although our outward man is corrupted, yet the inward man is renewed from day to day."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
