[[commentary]]
quote='''
Likewise, Augustine, treating that passage of Matthew six: Behold the birds of the air: "The saints are rightly compared to birds, because they seek heaven, and because they are already so removed from the world that they no longer do anything on earth, no longer labor, but already dwell in heaven through contemplation alone." If therefore this life is the highest, then to have spurned all things and to place the whole hope of one's life in God belongs to perfect virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'

[[commentary]]
quote='''
Augustine says in his Treatise on Almsgiving: "Elijah in the wilderness is fed by the ministry of ravens, and to Daniel, shut up in the den at the king's command as prey for the lions, a meal is divinely brought; and do you fear that sustenance will be lacking to one who labors and merits favor with the Lord? When He Himself in the Gospel, for the reproach of those whose mind is doubtful and faith small, solemnly declares and says: Behold the birds of the heavens, for they neither sow nor reap nor gather into barns, and your heavenly Father feeds them. Are you not of more value than they? God feeds the birds, and daily sustenance is provided to the birds, and to those which have no sense of any divine thing, neither food nor drink is lacking; and do you think that something will be wanting to a Christian, to a servant of God, to one devoted to good works, to one dear to his Lord? Or do you think that he who feeds Christ will not himself be fed by Christ? Or will earthly things be lacking to those to whom heavenly and divine things are granted? Whence comes this unbelieving thought? Whence this impious and sacrilegious reflection? What does a faithless heart do in the house of God? Why is one who does not believe in Christ at all called and named a Christian? The name of Pharisee better suits you. For when He was discoursing in the Gospel about almsgiving, and was faithfully and salutarily admonishing us that by provident action we should make for ourselves friends from earthly gains, who would afterward receive us into eternal tabernacles, the Scripture adds after this, saying: The Pharisees, who were covetous, heard all these things, and they derided Him. Such as we now see certain men in the Church to be, whose closed ears and blinded hearts admit no light from spiritual and salutary admonitions. Concerning whom we ought not marvel that they despise the servants in such matters, when we see that the Lord Himself was despised by such men."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
