[[commentary]]
quote='''
After Peter's confirmation in love was made, here follows his invitation to the consummation of love. Now the consummation of love is that a man lay down his life for Christ: therefore here follows an invitation to imitate the passion.

Peter is therefore certified by the Lord concerning the manner of his death, namely through passion and the cross: and to make it certain, he says: Amen, amen I say to you: and this is the passion, that in his old age he would be crucified for Christ: whence he says: When you were younger, you girded yourself and walked where you wished, that is, you followed your own will: Sirach 18: "Son, do not go after your concupiscences, and turn away from your own will." But when you have grown old, you will stretch out your hands, namely on the cross; and another will gird you, "namely with bonds," as Nero, and will lead you where you do not wish, "that is, to death"; because, as is said in Second Corinthians 5, "we do not wish to be unclothed, but to be further clothed." And the reason for this is given in Ephesians 5: "Because no one ever hated his own flesh." Peter was bound with chains: Acts 12: "Peter was sleeping between two soldiers, bound with two chains."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked about what he says: Another will gird you and lead you where you do not wish. It seems from this that the passion of Peter was involuntary: therefore it was not meritorious. I respond: The will is twofold: of reason and of nature. He suffered willingly by the will of reason, but unwillingly by the will of nature or of sensuality. Nor is this surprising, because it was so in the Head; whence Matthew twenty-six: Father, if it be possible, let this cup pass from me; nevertheless, not as I will, but as you will. Whence Augustine: "Peter came unwilling to death, willing he conquered death, and he left behind this disposition of weakness, by which no one wishes to die, so deeply natural that not even old age could take it away from blessed Peter."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
