[[commentary]]
quote='''
And therefore this presumption had to be checked, and for this reason it is added: And he said: I tell you, Peter, the cock will not crow today until you deny three times that you know me. Chrysostom: "He permits him to fall, teaching that in all things Christ is to be believed more than one's own conscience." And afterwards: "From this it is apparent that the desire of man does not suffice unless it is sustained by the will of the One above." Whence Augustine in On the Words of the Lord says that the Lord spoke to Peter as a physician to a sick man who believes himself to be well. For he says thus: "The physician, feeling the pulse of Peter's heart, was saying that he would deny him three times"; which indeed he was saying not to incite him to denial, but to check his presumption. Whence Glossa: "He who knows what is in man, lest anyone rashly trust in his own standing, or too rashly despair on account of a fall, as God predicts the manner, time, and number of the denial, and as one who is merciful promises the aid of his defense." Therefore the Lord himself, "who knows our frame," who knows that the thoughts of men are vain, predicts the fall, in order to show that what is said in Proverbs twenty-eight is true: "He who trusts in his own heart is a fool; but he who walks wisely shall be praised." — But if anyone should ask whether Peter believed that the Lord had spoken truly or falsely, I say that he believed it to be true, but under a condition, namely, unless he carefully guarded himself. For he knew that the prediction of Christ in no way prejudged the matter, but rather foretold the freedom of the will.

But what is said here about the denial of Peter seems to be contrary to what is said in Mark fourteen: "Before the cock crows twice, you will deny me three times." But to this it is answered that in truth before the first crowing Peter denied once, and before the second twice, and so Peter completed the threefold denial before the cock completed its crowing. The sense therefore is that the cock will not crow, that is, will not complete its crowing; or before the cock crows, you will deny three times, that is, you will have begun the threefold denial; or you will deny, that is, you will complete the threefold denial in resolve.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
