[[commentary]]
quote='''
"John bears witness concerning him." There was in the Apostles and believers a threefold reason for knowing: the first, through testimony; the second, through a singular effect; the third, through a singular teaching.

The first reason for knowing, therefore, was through authoritative testimony, namely of an authoritative person, that is, of John, who was holy from his mother's womb. Therefore he says: "John bears witness concerning him"; Proverbs chapter fourteen: "A faithful witness does not lie." "And he cries out," John openly and boldly, according to that passage of Isaiah chapter fifty-eight: "Cry out, do not cease, lift up your voice like a trumpet"; saying: "He who comes after me was made before me"; therefore made more worthy than I according to his human nature; Ephesians chapter one: "He subjected all things under his feet and gave him as head over the whole Church." And the reason for this is: "because he was before me," namely according to his Divinity; below in chapter eight: "Amen, amen, I say to you, before Abraham was made, I am"; and thus before John.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
