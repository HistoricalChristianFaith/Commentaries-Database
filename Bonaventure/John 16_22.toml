[[commentary]]
quote='''
And you therefore. Here is the adaptation of the example, that they would similarly be saddened at Christ's passion, but would rejoice at his glorification or resurrection: on account of which he says: And you therefore now indeed have sorrow, and this on account of the departure of the bridegroom; Matthew 9: "The days will come when the bridegroom shall be taken from them: and then they shall mourn." But that sorrow will last but a little while: therefore he says: I will see you again, and your heart shall rejoice: below, chapter 20: "The disciples rejoiced, having seen the Lord." And this not for a time, but for eternity; therefore he says: And your joy no one shall take from you: because Christ, who was their joy, "rising from the dead, dies no more"; Revelation 7: "God shall wipe away every tear from the eyes of the Saints," etc. And then your questions will be ended, nor will they trouble you, as they do now: therefore he says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
