[[commentary]]
quote='''
Secondly, as to the aggravation of wars, he adds: But when you shall hear of wars and seditions, be not terrified. For just as the deceitfulness of those who err is not to be followed, so the wickedness of those who wage war is not to be feared, especially by just men: whence Matthew 10: "Do not fear those who kill the body, but cannot kill the soul"; since a just man does not lose what he loves through wars, and therefore does not dread wars of this kind: Proverbs 28: "The wicked man flees, when no one pursues; but the just man, confident as a lion, shall be without terror." Whence Chrysostom: "Holy men remain undisturbed at the hearing of either bodily or spiritual wars, because the things that are in the world cannot harm those who are outside the world; just as one who is in a tent indeed hears the sound of the tempest, but does not feel the blast." Therefore Proverbs 12: "Whatever befalls the just man shall not sadden him." These things are therefore not to be feared, because they are not harmful. — Nor are they to be feared, because they are opportune: therefore he adds: These things must first come to pass, but the end is not yet at once. Chrysostom: "That which has always been in use cannot be a sign. For these bodily wars have always been and will be." For as long as concupiscence reigns, there must be strife and wars: James 4: "Whence are wars and contentions among you? Are they not from your concupiscences, which war in your members?" But the Lord permits these things to happen for the overthrow of the wicked and the exercise of the good, so that thus may appear that saying of Job 7: "The life of man upon earth is a warfare." And therefore that good soldier said in Second Corinthians 7: "When we had come into Macedonia, our flesh had no rest, but we suffered all tribulation: combats without, fears within." For John 16: "In the world you shall have distress; but have confidence, I have overcome the world."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
