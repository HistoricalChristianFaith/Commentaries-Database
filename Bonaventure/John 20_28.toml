[[commentary]]
quote='''
Consider the progression. First He entered as God while the doors were closed: this is the major proposition. Then He proposed the minor by showing them His hands and His side. Finally, He wrested out the conclusion so that Thomas confessed: "My Lord and my God!"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
Thomas answered. Here is noted the building up of faith proceeding from the Lord's manifestation. Now our faith is established in a threefold manner from the divine manifestation: either through presence, that is, through sight; or through absence, that is, through hearing; or through the testimony of Scripture. In the first manner, therefore, faith was built up in Thomas, who believed; in the second manner, in the others, who had believed those who reported; in the third manner, in those who were going to believe through the Scriptures.

The faith of Thomas is therefore touched upon, which is indicated in his right confession: whence he says: Thomas responded and said, after so great a showing: My Lord, as to his humanity, and my God, as to his Divinity: for he is God because he created; he is Lord because he purchased us as servants; First Peter 1: "You were redeemed not with corruptible gold or silver, but with the precious blood, as of an immaculate and undefiled lamb, Christ Jesus."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
