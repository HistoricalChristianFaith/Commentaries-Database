[[commentary]]
quote='''
Secondly, with regard to the public rejoicing, he adds: And coming home, he calls together his friends and neighbors. This house is the heavenly Jerusalem, of which Isaiah 60: "I will glorify the house of my majesty"; and John 14: "In my Father's house there are many mansions." Into this house Christ came at the ascension, concerning which coming Isaiah 63: "Who is this who comes from Edom, with dyed garments from Bozrah?" Into this he carries the sheep, because, as is said in Ephesians 4, "ascending on high, he led captivity captive." And there he calls together the Angels, who are called friends on account of their familiarity in knowing secrets; for this is a sign of friendship; John 15: "But I have called you friends," etc.; and neighbors, on account of their nearness in sharing consolations: whence Matthew 18: "Their angels in heaven always behold the face of the Father who is in heaven." The Lord calls these together to rejoice in harmony over the salvation of men: whence he also adds: Saying to them: Rejoice with me, because I have found my sheep, which was lost. He says this as though giving them matter for rejoicing over the attainment of so great a benefit and of the charitable love which God showed to man; whence the Eternal Wisdom says in Proverbs 8: "My delights were to be with the sons of men." Whence Bede: "He does not say: Rejoice with the sheep that was found, but with me, because his joy is our life." Whence also in the expression of this most magnificent joy, the joyful recovery of the human race is called a nuptial joy, over which the heavenly citizens exult: Apocalypse 19: "I heard a voice as the voice of many Angels saying: Alleluia." "Let us rejoice and exult and give glory to God, because the marriage of the Lamb has come, and the wife of the Lamb has prepared herself." For the Lamb espouses to himself the holy Church gathered from sinners, and the Lamb has the little sheep recovered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
