[[commentary]]
quote='''
Third, regarding the purity of the Apostles of Christ, he adds: And they began to inquire among themselves which of them it was who would do this. Bede: "The eleven knew that they had thought nothing of the sort, but they trusted the Master more than themselves"; whence in Matthew twenty-six it is said: "Being greatly saddened, each one began to say: Is it I, Lord?" Whence the Apostles were innocent, because they were neither complicit in the wickedness nor even aware of it. Yet each one was troubled in himself and about himself, lest he be believed by others to be such a person, and also on account of uncertainty about the others: whence in John thirteen: "The disciples looked at one another, uncertain of whom he spoke." Among all of them, however, Simon Peter, because he was more fervent, inquired more diligently: whence in John thirteen: "Simon Peter nodded to that disciple whom Jesus loved and said to him: Who is it of whom he speaks?" The Lord preferred that all be troubled rather than that he be exposed to all, so as to give the pattern that a hidden vice is not to be easily made public: on account of which, Ecclesiasticus nineteen: "Have you heard a word against your neighbor? Let it die within you, trusting that it will not burst you." Yet he indicated it to Simon Peter through John, as is said in John thirteen: "It is he to whom I shall offer the dipped bread"; because it is not considered public what is disclosed out of charity for the sake of caution to a prelate in order to avoid danger.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
