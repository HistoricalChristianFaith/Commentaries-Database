[[commentary]]
quote='''
And since he who is a partaker in tribulation ought to be a partaker in honor, therefore he adds: And I dispose to you, as my Father has disposed to me, a kingdom, that you may eat and drink at my table in my kingdom, through the abundance of satisfaction, according to that passage in 2 Timothy 2: "Faithful is the saying. For if we have died together, we shall also live together; if we endure, we shall also reign together"; and therefore Revelation 1: "A partaker in tribulation and in the kingdom." The Father disposed to the Son that he would come to exaltation through humiliation: for below in chapter 24: "Was it not necessary for Christ to suffer and so enter into his glory?" and Philippians 2: "He humbled himself"; and afterward: "Therefore God also has exalted him and given him the name," etc. So also the Son disposes to us under the same terms, both as to the way and as to the homeland; whence John 12: "If anyone serves me, let him follow me; and where I am, there also my servant shall be."

That he says this not only regarding the banquet of refreshment, but also the throne of honor, and therefore he adds: And you shall sit upon thrones, judging the twelve tribes of Israel, through the excellence of dignity. And this is said to the perfect, who will judge and will not be judged: of whom Matthew 19: "You who have left all things and followed me," etc. And in the person of such it is said in 1 Corinthians 6: "Do you not know that the saints will judge this world?" "Do you not know that we shall judge angels, how much more secular matters?" This, moreover, is owed to perfect humility, according to that passage in Job 36: "Your cause has been judged as that of the wicked"; and again in chapter 36: "He does not save the wicked, and he grants judgment to the poor," namely to those who overcome the haughtiness of pride. Therefore Revelation 3: "He who overcomes, I will grant him to sit with me on my throne, just as I also have overcome and have sat with my Father on his throne." And this is the reward of the humble: John 12: "If anyone serves me, my Father who is in heaven will honor him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
