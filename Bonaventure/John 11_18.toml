[[commentary]]
quote='''
Now Bethany was. Here the last point is touched upon, namely the convenience of the place. For because it was near Jerusalem, many Jews had come who would be witnesses of the miracle. The reason, moreover, why they had come was the convenience or proximity of the place. On account of the convenience he says: Now Bethany was near Jerusalem, about fifteen stadia away. A stadium is the eighth part of a mile, and thus the place was nearby.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
