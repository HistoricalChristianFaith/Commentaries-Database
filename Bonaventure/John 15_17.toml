[[commentary]]
quote='''
And in view of this recompense they ought to keep the commandment of Christ; therefore he repeats it: These things I command you, that you love one another. The commandment of love is called as it were given by hand, because he gave it by his own example: therefore above in chapter 13: "A new commandment I give unto you, that you love one another"; and 1 Thessalonians 4: "Concerning brotherly charity, we have no need to write to you: for you yourselves have learned of God to love one another."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
