[[commentary]]
quote='''
And because "a word is better than a gift," and speech declares the disposition, he adds: Bless those who curse you, in public speech; and pray for those who calumniate you, in private speech. Bless, in open speech. To this the Apostle in Romans 12: "Bless those who curse you, bless and do not curse"; and 1 Peter 3: "Rendering to no one evil for evil, nor curse for curse, but on the contrary, blessing." Pray, also in secret speech. By the example of him of whom Isaiah 53 says: "He prayed for transgressors"; and by the example of that protomartyr, Acts 7: "And kneeling down, he cried out with a loud voice: Lord, do not hold this sin against them." But this seems to be contradicted by the fact that Elisha, in 4 Kings 2, was angered at the mocking boys, and Elijah at the captain of fifty, in 4 Kings 1, and Paul at the high priest, in Acts 23. To this Bede responds that these "are not the wishes of those desiring, but predictions of future events"; or they were not angered against nature, but against vice. For as Augustine says: "Men are to be loved in such a way that nevertheless their errors are not loved." Thus he gives the commandment of perfect benevolence, which consists not only in the heart, but also in deed and speech. Whence Gregory: "Concerning the love of the Creator, let tongue, mind, and hand be required."

Concerning this commandment of benevolence, it should be noted in summary that as regards affection it binds all universally; as regards the sign it binds the perfect; as regards the effect, in the moment of necessity it binds all, but short of necessity it does not bind the imperfect, except insofar as the obligation of some precept requires. The perfect however by the state of prelacy it binds insofar as the obligation of the office assumed requires; the perfect by the state of perfection, insofar as the obligation of good example requires; the perfect however by the perfection of virtue, insofar as the intensity of charity requires.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
