[[commentary]]
quote='''
And this malignity of the Jews is expressed in Scripture: therefore he says: But that the word may be fulfilled which is written in their Law — Law is taken broadly, insofar as it comprehends the Psalms — because they hated me without cause: it is written in the Psalm: "Those who oppose me unjustly, who hate me without cause and wink with their eyes"; and in another Psalm: "While I spoke to them, they attacked me without cause." That hatred was prefigured in Genesis thirty-seven, where it is said that "the brothers of Joseph hated him and could not speak peaceably to him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
