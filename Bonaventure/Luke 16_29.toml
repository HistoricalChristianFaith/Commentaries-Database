[[commentary]]
quote='''
Second, as regards the denial of the requested mercy, he adds: And Abraham said to him: They have Moses and the Prophets; let them hear them. Moses, that is, the doctrine of the Law, which must be heard on account of the greatness of its authority. For, Proverbs twenty-eight, "he who turns away his ear from hearing the Law, his prayer shall become abominable." And therefore the lawgiver said in Deuteronomy thirty-two: "Hear, O heavens, what I speak; let the earth hear the words of my mouth." "Give magnificence to our God: the works of God are perfect." And they also have the Prophets, that is, the doctrine of the Prophets, which must be heard on account of the certainty of its truth, according to that passage in Second Peter one: "We have a more firm prophetic word, to which you do well to attend, as to a lamp shining in a dark place, until the day dawns and the morning star rises in your hearts." He who refuses to hear the words of this twofold doctrine, so authoritative and so certain, has absolutely no excuse. On account of which the Lord says through Jeremiah the prophet in Jeremiah twenty-six: "If you will not hear me, so as to walk in my Law which I gave you, to hear the words of my servants the Prophets, whom I sent to you, rising early, and you did not hear — I will make this house like Shiloh, and I will make this city a curse." If therefore those who do not hear the Law and the Prophets are without excuse, utterly without excuse are those who do not hear the Apostles and the Evangelists, indeed not even incarnate Wisdom itself. Whence she herself complains in Proverbs one: "Because I called, and you refused; I stretched out my hand, and there was no one who regarded it"; "I also will laugh at your destruction and will mock, when that which you feared has come upon you." He who does not wish to hear this Wisdom, which "preaches abroad in the streets," is utterly without excuse, because the Law and the Prophets bear witness to her. Whence in Matthew seventeen: "There appeared to them Moses and Elijah, speaking with him"; "and a voice came from the cloud: This is my beloved Son; hear him." And therefore it is said in Hebrews two: "We ought to observe what we have heard, lest perhaps we drift away. For if the word spoken through Angels was made firm: how shall we escape, if we have neglected so great a salvation?" And in Hebrews twelve: "You have come to Jesus, the mediator of the new testament, and to the sprinkling of blood speaking much better than Abel. See that you do not refuse him who speaks."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke, Chapter 16'
