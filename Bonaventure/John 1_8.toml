[[commentary]]
quote='''
"He was not that light," in which one must believe; "but that he might bear testimony concerning the light": which indeed he did; below in chapter 5: "You sent to John, and he bore testimony to the truth."

It is asked concerning what he says: "He was not the light." On the contrary: Ephesians 5: "You were once darkness, but now you are light in the Lord": therefore all the good are light. The Gloss responds that there is a light that illuminates and a light that is illuminated. John and the other Saints are not the illuminating light, but light illuminated by the first light.

But against this is Matthew 5: "So let your light shine before men"; and Philippians 2: "Among whom you shine as luminaries in the world."

There is a light that illuminates effectively and dispositively. The light that illuminates effectively is light by essence, and thus God alone is the illuminating light; dispositively, it is light by participation, and thus are the Saints, who illuminate by word and example.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
