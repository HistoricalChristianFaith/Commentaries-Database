[[commentary]]
quote='''
The objection of those who ought to have known better is set forth; and these were those who dwelt in the royal city; on account of which he says: "Some therefore of Jerusalem said," who were aware of the plotting of the Pharisees: "Is not this the one whom the Jews were seeking to kill?" as an evildoer; for they were of those of whom it is said in Proverbs 1: "Their feet run to evil, and they make haste to shed blood."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
