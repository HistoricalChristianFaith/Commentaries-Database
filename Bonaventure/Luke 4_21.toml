[[commentary]]
quote='''
To intimate the truth or firmness of the doctrine, there is added: And he began to say to them: Today this Scripture is fulfilled in your hearing. Therefore that Scripture is said to have been fulfilled then, because, since those words pertained to Christ, no one in his own person could truly speak the aforesaid word except Christ, who read it in their hearing: below in the last chapter: "These are the words which I spoke to you while I was still with you, that all things must be fulfilled which are written in the Law and the Prophets and the Psalms concerning me." Whence Christ fulfilled all justice with regard to moral uprightness, according to that passage in Matthew three: "Thus it behooves us to fulfill all justice." He also fulfilled all Scripture by pouring forth God's truth, as in Matthew five: "Do you think that I came to destroy the Law or the Prophets? I came not to destroy, but to fulfill." And therefore it is said in Ephesians one: "Because he fulfilled all things in all." Whence the words and signs of the old law, being empty, he filled with truth and grace. As a sign of this, in John two, in the first sign, it is said: "Fill the water jars with water. And they filled them up to the brim."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
