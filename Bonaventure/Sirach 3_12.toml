[[commentary]]
quote='''
The honor of beneficence is owed to the father, because he holds the character of benefactor: whence in Ecclesiasticus: Son, support your father in his old age, and do not grieve him in his life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25205.html'
source_title="Collationes de Decem Praeceptis, Collation 5"
