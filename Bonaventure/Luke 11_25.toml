[[commentary]]
quote='''
To this house, however, the simulation of goodness and justice leads back the expelled devil; and therefore he adds: And when he comes, he finds it swept clean and adorned, not within, as the Prophet says in the Psalm: "I was exercised and I swept my spirit"; and again: "All the glory of the king's daughter is from within"; he does not find it swept and adorned in this way, but outwardly, as below in the same Gospel: "Now you Pharisees clean the outside of the cup and the dish; but what is within is full of plunder and wickedness"; and Matthew twenty-three: "Woe to you! who are like whitewashed sepulchres," etc. Such cleanliness does not suffice for the Holy Spirit, who seeks to dwell not only in a clean body but in a holy soul; whence Wisdom chapter one: "Into a malevolent soul wisdom will not enter, nor will it dwell in a body subject to sins." And therefore we are invited to both; Isaiah chapter one: "Wash yourselves, be clean," etc. But that cleanliness which is only outward leaves the house empty of the grace of the Holy Spirit, and thereby liable to be occupied by the presence of the devil. Whence, noting this, Matthew chapter twelve says: "He finds it empty, swept clean and adorned," empty, namely, of grace and virtue. Whence Chrysostom: "Those desolate of virtue will easily be liable to occupation by the actions of demons"; and therefore Jerome: "Always do something good, so that the devil may find you occupied."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
