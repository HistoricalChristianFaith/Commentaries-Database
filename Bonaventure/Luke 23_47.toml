[[commentary]]
quote='''
Third, as to the faithful confession of the centurion, he adds: Now the centurion, seeing what had been done, glorified God, saying: Indeed this man was just. This faithful confession had its origin from the sight of the wonders that occurred in the commotion of the world and especially in the manner of dying; whence Matthew twenty-seven: "Now the centurion, and they that were with him, having seen the earthquake and the things that were done, were greatly afraid, saying: Indeed this was the Son of God." But in Mark fifteen it is said that "the centurion, seeing that crying out so he had expired, said: Indeed this man was the Son of God." Luke, however, comprehends both when he says: The centurion seeing what had been done. Whence in this centurion there appeared a readiness among the Gentiles for faith, and conversely among the Jews an obstinacy toward unbelief. On account of which Bede also says: "Seeing that he had the power of releasing his spirit, which none can have except the Creator of souls, the very one who had crucified him confesses him to be the Son of God in the very scandal of the Passion—him whom the Jews after his miracles refused to believe." But because the chief priests, though they had seen these things, did not glorify God, they were therefore blinded, according to that passage in Romans one: "Because when they had known God, they did not glorify him as God or give thanks, but became vain in their thoughts, and their foolish heart was darkened."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
