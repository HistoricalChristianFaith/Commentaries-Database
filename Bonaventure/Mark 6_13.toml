[[commentary]]
quote='''
Before the sending of the Holy Spirit, there was neither the full gift of the Holy Spirit for confirmation and public confession of the name of Christ, nor the plenary anointing of the mind for departure; therefore Christ only initiated and intimated these two Sacraments, namely confirmation and extreme unction. Extreme unction he initiated by sending the disciples to heal, who anointed the sick with oil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"
