[[commentary]]
quote='''
For no one among kings had a different beginning of birth, because in natural things there is no difference between kings and subjects, but only in the goods of fortune.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Wisdom%2FChapter%25207.html'
source_title="Commentary on Wisdom, Chapter 7"
