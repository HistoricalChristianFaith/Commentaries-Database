[[commentary]]
quote='''
Secondly she adds an approbative indication, when she says: For behold, as soon as the voice of your greeting sounded in my ears, the infant in my womb leapt for joy: and this is a sign that "grace is poured forth upon your lips"; and therefore it is certain that "God has blessed you forever," in the Psalm. And since the infant leapt beyond nature, it is certain that the Lord of nature came to meet him. And since the little infant responds from the womb, it is certain that you have conceived him who calls from the womb, according to that passage of Isaiah forty-nine: "The Lord has called me from the womb, from the bowels of my mother he has remembered my name," etc. And again, since the child leapt for joy, it is certain that what is said in Isaiah has now been truly fulfilled: "Exult and give praise, O habitation of Zion, for great in your midst is the Holy One of Israel"; and that passage of Zechariah nine: "Exult greatly, O daughter of Zion, shout for joy, O daughter of Jerusalem; behold, your king comes to you, just and a savior."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
