[[commentary]]
quote='''
Therefore he adds: And when he learned that he was under Herod's jurisdiction, he sent him to Herod, who himself was also in Jerusalem in those days. Bede: "Lest he be compelled to pass sentence against an innocent man, whom he knew had been handed over through envy, he sends him to Herod to be heard, so that he might either be absolved or condemned by his own tetrarch." Whence it appears that Pilate acted cautiously; he also acted justly, because he did not wish to usurp for himself what belonged to another's jurisdiction, because, according to Romans thirteen, "every power is ordained." He also acted piously, because he believed that Herod ought to free his own subject from unjust accusers, according to that text of Sirach eighteen: "The compassion of a man is toward his neighbor." He also acted shrewdly, because he wished to devolve the dangerous judgment upon his adversary; he also wished to avoid his false accusation; he also wished to please him regarding a matter about which he himself had no certainty. From which that saying stated above in chapter sixteen is evident: "The children of this world are more prudent than the children of light in their generation."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
