[[commentary]]
quote='''
He who has the commandments. Here the third point is touched upon, namely that to those who observe the commandments a reward is promised. And the reason for this is that such a one who keeps the commandments is loved by the Lord, and therefore is beatified and glorified: on account of which he says: He who has my commandments and keeps them, he it is who loves me: because, as Gregory says, "the proof of love is the display of works"; whence in the Psalm: "His justice unto the children of children, to those who keep his covenant and are mindful of his commandments to do them." He who keeps them thus truly loves indeed, not in word only, as those of whom it is said in First John, chapter three: "Let us not love in word nor in tongue, but in deed and in truth." But he who loves me will be loved by my Father, and also by me, and I will love him: Proverbs, chapter eight: "I love those who love me"; and I will show my love in the reward: whence: And I will manifest myself to him, and this is the reward; whence in the Psalm: "I will show him my salvation"; the Gloss: "The vision is the whole reward"; below in the seventeenth chapter: "This is eternal life, that they may know you, the only true God, and Jesus Christ whom you have sent."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
