[[commentary]]
quote='''
"All that the Father gives me," through eternal election and temporal calling; "shall come to me," through faith and love. Concerning this giving, in the Psalm: "Ask of me, and I will give you the nations as your inheritance." The Lord requested these below in the seventeenth chapter: "Father, those whom you have given me, keep them in your name." Concerning this coming to Christ, it is said in Isaiah 2: "Come, let us go up to the mountain of the Lord and to the house of the God of Jacob, and he will teach us his ways." To this coming Isaiah exhorts in chapter 55: "All you who thirst, come to the waters." Those who come thus he refreshes: whence he also adds: "And him who comes to me I will not cast out: I will not cast out," but I will refresh: "I will not cast out," but "I will bring in," according to that passage in Song of Songs 2: "He brought me into the wine cellar."

Or: "I will not cast" him "out," but "I will enter in" to him: Revelation 3: "Behold, I stand at the door and knock: if anyone hears my voice and opens the door to me, I will enter in to him and dine with him." And in this is shown the justice of God, because he refreshes only those who come, and his kindness, because he receives all and rejects none.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
