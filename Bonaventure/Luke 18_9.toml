[[commentary]]
quote='''
But he spoke to certain ones who trusted in themselves etc. After he has urged the persistence of prayer, in this part he intends to urge reverence in prayer. But since reverence cannot be had in prayer unless humility is also had in one's manner of life, therefore in this part he first introduces a parabolic example to commend humility in prayer; and second, an explicit example to commend humility in one's manner of life, at the passage: And they were bringing infants to him.

In unfolding the parable, he proceeds in this manner. For first he touches upon the conditions of the persons; second, the conditions of the prayers, at the passage: But the Pharisee, standing, prayed within himself; third, the conditions of the hearings, at the passage: Amen I say to you, this man went down etc. Concerning the conditions of the persons, he proceeds in this order. For he touches upon the conditions of the persons to whom he speaks and about whom he speaks.

First, therefore, as regards the conditions of the persons to whom he speaks, he says: He spoke also to certain ones who trusted in themselves as just, through the magnification of their own virtue: and this is to be proud against God, according to that passage in Romans 10: "Being ignorant of the justice of God and seeking to establish their own, they have not submitted to the justice of God." Now someone trusts in himself as just when he considers himself just from his own works, as the Jews did; Romans 2: "You approve the more profitable things, being instructed by the Law: you are confident that you yourself are a guide of the blind, a light of those who are in darkness, an instructor of the foolish, a teacher of infants, having the form of knowledge and of truth in the Law." But this confidence is rather the enemy of true justice: Proverbs 11: "He who trusts in his riches shall fall"; on account of which, Jeremiah 48: "Because you had confidence in your fortifications and in your treasures, you also shall be taken." And all this is on account of the defect of humility, which is the foundation of all justice. Whence Gregory: "Indeed, truth flees the mind which it does not find humble"; and again the same: "He who gathers virtues without humility carries, as it were, dust into the wind."

And because presumption of oneself leads to contempt of one's neighbor, therefore he adds: And they despised the rest, that is, as regards contempt of another's merit, like those of whom Isaiah 65 says: "Who say: Depart from me, do not come near me. These shall be smoke in my fury, a fire burning all day long." And therefore Romans 14: "Let not him who eats despise him who does not eat, and let him who does not eat not judge him who eats"; and Sirach 11: "Do not despise a man in his appearance. The bee is small among flying things, and her fruit has the beginning of sweetness."

To these therefore he spoke this parable in detestation of pride and in praise of humility: whence the Gloss: "In this parable he shows that not the words of faith alone, but works are to be examined: among which humility especially reigns, which because the proud, presuming upon their own justice and despising the weak, do not have, as if devoid of faith, when they pray, they are despised."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
