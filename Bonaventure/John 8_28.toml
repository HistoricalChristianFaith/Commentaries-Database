[[commentary]]
quote='''
"Jesus therefore said to them: When you shall have lifted up the Son of man," namely on the cross: below in the twelfth chapter: "And I, if I be lifted up from the earth, will draw all things to myself"; "then you will know that I am," namely a distinct person in the Trinity; behold, the personal distinction; Exodus 3: "I am who am." "And I do nothing of myself," namely this you will know; "but as the Father has taught me, these things I speak," that is, as I have received from the Father, because the Father gives all things to the Son. And in this is shown the emanation of generation from the Father; above in the fifth chapter: "The Son cannot do anything of himself, except what he has seen the Father doing." Not only will you know the personal distinction, but also the indivision of essence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
