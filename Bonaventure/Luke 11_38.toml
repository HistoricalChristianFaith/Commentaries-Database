[[commentary]]
quote='''
On account of which it is added: But the Pharisee began, pondering within himself, to say, that is, to seek the reason and cause, namely, why he had not been baptized, that is, washed according to the custom of the Jews, before the meal, and thereby to judge him as unclean and a despiser of the traditions of the fathers. Whence similarly the Pharisees are read to have objected to the Lord and his disciples in Matthew chapter fifteen: "Why do your disciples transgress the tradition of the elders? For they do not wash their hands when they eat." Now this was of chief importance among the Jews; whence it is said in Mark chapter seven: "For the Pharisees and all the Jews wash their hands frequently when they eat, holding the tradition of the elders, and coming from the marketplace, they do not eat unless they wash." And the reason for this was that they placed the greatest emphasis on preserving bodily cleanliness. Whence a twofold simulation is shown from this in the Pharisee: first, because the one whom he outwardly refreshed with piety, he inwardly judged with impiety; second, because he was zealous for bodily cleanliness but paid no attention to spiritual cleanliness. And therefore he was a hypocrite both in the sight of men and of God, against that passage of Sirach chapter one: "Do not approach her with a double heart, and do not be a hypocrite in the sight of men."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
