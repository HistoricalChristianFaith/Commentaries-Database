[[commentary]]
quote='''
"And they did not know that he called God his Father": and because they were unable to understand the loftiness of the generation, he directs them to the weakness of the passion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
