[[commentary]]
quote='''
Because Herod did not find Christ worthy of death, therefore he himself also refused judgment; and so it is added: And he sent him back to Pilate, as to a friend. On account of which he adds: And Herod and Pilate became friends from that day; for before they had been enemies to one another. From which it appears that enmity with respect to the good begets friendship among the evil; therefore the evil are designated by the foxes of Samson, which have their tails tied together, because all "come together as one against the Lord and against his Christ." And therefore these two designate the persecution of the two peoples against Christ; whence the Gloss: "Just as Herod and Pilate, so Jews and Gentiles, disagreeing in race and religion, and likewise also in mind, nevertheless agree in persecuting Christians and in destroying the faith of Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
