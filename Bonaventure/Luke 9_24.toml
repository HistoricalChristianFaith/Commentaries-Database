[[commentary]]
quote='''
Secondly, he invites by consideration of one's own peril, when he says: For whoever wishes to save his soul shall lose it, that is, whoever wishes to save his life in the present shall lose his life in the future, namely for a momentary life he shall lose the eternal one: whence John 12: "He who loves his soul shall lose it"; because he who loves too much loves iniquitously, and "he who loves iniquity hates his own soul," as is said in the Psalm. For he who loves his soul above God loses God, and by losing God he consequently loses himself. And therefore Paul said in Acts 20: "I do not count my life more precious than myself."

And because this seems to be a hard saying, therefore he proves it from the contrary sense: For whoever loses his soul for my sake, in this life, namely, shall save it, namely in the future life, according to that passage of 2 Maccabees 7: "You indeed destroy us in the present life, but the King of the world will raise us up, who have died for his laws, in the resurrection of eternal life." And therefore Paul said in Acts 21: "I am prepared not only to be bound, but also to die in Jerusalem for the name of the Lord Jesus." Thus therefore to lose one's soul for Christ is to save it; to wish to save one's soul is to expose it to perdition, according to that passage of Romans 8: "If you live according to the flesh, you shall die"; and this is the greatest peril.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
