[[commentary]]
quote='''
Fourth, with respect to the commendation of the confirmation, he adds: And certain of the scribes answering said to him: Master, thou hast spoken well. The scribes commended this because they were of the sect of the Pharisees, who say that there is a resurrection. Whence in Matthew twenty-two it is said that "the Pharisees, seeing that he had silenced the Sadducees, came together in one," because on this account they applauded him. For concerning this there was contention between the Sadducees and the Pharisees: whence in Acts twenty-three, "Paul, knowing that one part were Sadducees and the other Pharisees, cried out in the council: Men and brethren, I am a Pharisee; concerning the hope and resurrection of the dead I am judged. And when he had said this, there arose a dissension between the Pharisees and the Sadducees, and the multitude was divided. For the Sadducees say that there is no resurrection of the dead, nor angel, nor spirit, but the Pharisees confess both."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
