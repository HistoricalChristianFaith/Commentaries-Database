[[commentary]]
quote='''
"This is the bread descending from heaven," through the incarnation, "so that, if anyone shall eat of it," through faith and love: "he may not die," through transgression: because, as is said in Habakkuk two, "the just man lives by his faith." Just as faith liberates from death, so also does love: First John three: "We know that we have passed from death to life, because we love the brethren; he who does not love remains in death." Nor does he give only the life of grace, but indeed also the life of glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
