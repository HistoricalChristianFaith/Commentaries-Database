[[commentary]]
quote='''
Thirdly, with regard to humility in lodging, he adds: And into whatever house you enter, remain there, being content, that is, with that lodging: and do not depart from there, in search of something better, because, as it is said in Sirach 29, "a wretched life it is to lodge from house to house." For the changing of lodging attests to impatience, which is moved by a slight cause and cannot rest, according to that saying of Jeremiah 14: "This people has loved to move their feet and has not rested, and it did not please the Lord."

And this is especially to be avoided by the preacher, because, according to that saying of Proverbs 19, "the doctrine of a man is known through patience." And therefore Ambrose says: "It is unfitting for a preacher to run about through houses and to change the established rights of a settled lodging." But the mother of this inconstancy and impatience is pride, which can dwell in peace with no one, according to that saying of Proverbs 13: "Among the proud there are always quarrels."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
