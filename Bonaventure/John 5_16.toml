[[commentary]]
quote='''
"For this reason the Jews persecuted Jesus, because he did these things on the Sabbath." For he seemed to wish to destroy their Law and to oppose the Lord, who had given the commandment concerning the keeping of the Sabbath: below in the ninth chapter: "This man is not from God, who does not keep the Sabbath": Luke 6: "The scribes and Pharisees were watching Jesus, whether he would heal on the Sabbath."

Likewise it is asked whether the Lord dissolved the commandment concerning the Sabbath with respect to ceremonial observance. That he did not, it seems: because nothing is prohibited there except servile work, and the Lord did no servile work on it; whence in Luke fourteen the Lord shows that he did not dissolve it. But that he did dissolve it, it seems: because the Jews persecuted him on account of this. I respond: It must be said that the observance of what was ceremonial in the Sabbath was threefold, namely spiritual, literal, and customary. The spiritual he did not dissolve nor could he dissolve, but he fulfilled it; the literal he could have dissolved, yet he did not dissolve it, because he did no servile work; the customary he dissolved and commanded to be dissolved: he dissolved it when he made clay from spittle; he commanded it to be dissolved when he commanded the mat to be taken up. For this was not against the literal observance, but against the customary and superimposed one.

Likewise an objection is raised concerning what the Evangelist says, that the Jews persecuted Jesus because he did these things on the Sabbath: if the Lord could equally well do this on other days as on the Sabbath, it seems that the Lord himself stirred up the persecution of the Jews against himself for no fitting reason. I respond: It must be said that the reason for this was the truth of doctrine. For because ceremonial observances were due to cease at Christ's coming, he who was the master of truth was obliged to teach this and show it through his life, so that the truth of the Gospel might remain with us. The second reason was the severity of divine judgment: because, as is said below in chapter nine, "for judgment I came into this world." Because therefore from this the wicked were blinded unto procuring Christ's death, which was our salvation, while the good were enlightened to believe that he was the one who had given the Law and could dissolve it. The third reason was common necessity, because then the poor and simple gathered at the synagogues, whom the Lord was obliged to attract through miracles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
