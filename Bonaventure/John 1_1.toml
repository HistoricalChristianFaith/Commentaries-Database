[[commentary]]
quote='''
It is manifest that a beginning should be made from the One from whom the two greatest Wise Men began: Moses, the originator of wisdom, and John, its consummator. The former said: "In the beginning God created the heavens and the earth," and, in Augustine's opinion, this means the Son. And John said: "In the beginning was the Word, and the Word was with God; and the Word was God. He was in the beginning with God. All things were made through Him." If, therefore, it is impossible to understand a creature except through that by which it was made, it is necessary that the true Word go before thee.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
In the mystery of the redemption of man, Christ is pointed to as a meek man in Matthew; as a triumphant lion in Mark; as a sacrificed calf in Luke; as a flying eagle indicating His divinity, in John: "In the beginning was the Word," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'

[[commentary]]
quote='''
This book, which concerns the incarnate Word, in whom a twofold nature is considered, namely divine and human, is first divided into two parts. In the first he treats of the Word in himself; in the second, insofar as he is united to flesh, and that part begins there: "There was a man sent from God." And because "word" denotes operative power, as Augustine says, and has relation both to the one speaking and to that which is said through the word: therefore the first part has two sections. In the first, the Word is treated in comparison to the one speaking; in the second, in comparison to those things which are spoken through the Word: "All things were made through him."

In the first part four clauses are set forth, in which the incarnate Word is described with respect to four conditions, which are: unity in essence, otherness in person, equality in majesty, coeternity in duration. And through these conditions four errors are refuted.

The first condition, therefore, is unity in essence, and it is noted in the first clause, when it is said: "In the beginning was the Word": as Augustine says: "There is a principle not from a principle, and this is the Father; and there is a principle from a principle, and this is the Son." Here "principle" is taken by antonomasia for the Father: whence the sense is: "In the beginning," that is, in the Father, is the Son, not separated from the Father in essence, below in the fourteenth chapter: "I am in the Father, and the Father is in me," as undivided: because as is said below in the tenth chapter: "I and the Father are one." And in this the unbelief of the pagans is refuted, who are indignant with us because we say three persons and not three gods: as Augustine says in On the Christian Combat; and this, because they do not understand how the Word was in the beginning.

The second condition is otherness in person, and this is touched upon in the second clause, when it is said: "The Word was with God": because, as the Grammarian says, and also Victor, prepositions are transitive; therefore this preposition "with" implies distinction insofar as it is a preposition, but by reason of its special signification it denotes authority in the Father and subauthority in the Son, because the lesser is said to be with the greater and not conversely, according to the common manner of speaking. But there, although there is no lesser and greater, nevertheless there is authority in the Father and subauthority in the Son. By the name "word," however, is understood the emanation of generation. And these three are touched upon in Ecclesiasticus twenty-four: "I came forth from the mouth of the Most High, the firstborn before every creature": "of the Most High," behold authority; from "the mouth," behold generation; "I came forth," behold distinction. And in this the heresy of the Sabellians is refuted, who hold that the Father and the Son are one and the same: because they did not understand how the Word was with God.

The third condition is equality in majesty, and this is touched upon in the third clause, where it says: "And the Word was God." For if, as Anselm says, "God is that than which nothing greater can be thought"; if the Word was God, then he was that than which nothing greater could be thought, and thus he was equal to the Father in majesty; below in the fourteenth chapter he said to the disciples: "You believe in God, believe also in me." If one must believe in God alone as in the highest truth, and one must believe in the Word, it follows that the Word was God. And in this the heresy of the Arians is refuted, who held the Son to be a creature and lesser than the Father, as Augustine says. For they did not understand how the Word was God.

Since "Son" conveys the most distinctive property, why does he describe the Son of God under the name "Word" rather than under the name "Son"? For it seems that he ought to have done the contrary. It must be said that "son" expresses a relation only to the father, but "word" expresses a relation to the one speaking, expresses a relation to that which is said through the word, expresses a relation to the voice which it assumes, and also expresses a relation to the teaching which is effected in another through the word. And since the Son of God ought to be described here not only in relation to the Father, from whom he proceeds, but also in relation to the creatures which he made, and to the flesh which he assumed, and to the teachings which he provided, he ought most nobly and most fittingly to be described under the name Word, because that name regards all these things, nor could a more fitting name be found in the world.

Likewise it is asked about the fact that he is described by the verb "was." For if "was" is of the imperfect past tense, it is entirely repugnant to eternity, because there is no passing away there. If you say, as Augustine says in the Gloss, that the verb "is" sometimes implies time according to the analogy of other verbs, but here it does not denote time, but designates essence without any temporal motion: this does not solve the difficulty, because when it is said: "the Son is begotten" or "has been begotten," time is not implied there; yet it is better said "always begotten" than "always being begotten." Likewise the Lord says thus: "Before Abraham was made, I am," below in the eighth chapter; He does not say "I was" or "I used to be": therefore even now He ought to speak through the present tense.

It must be said that because the being of the Word is described here as permanent, it is described as immutable, as preceding all other things, because this word "was," according as such, imports these three things: therefore he most elegantly said "was." For since it is a mean between the present and the past, and "a mean partakes of the nature of the extremes," from the present it has permanence, from the past immutability, from itself precedence and order, namely of eternity in relation to time. Therefore "was" is rightly said.

But the heretic objects: if the Word proceeds from the speaker as a son from a father, and the son is posterior to the father, therefore the Word was not in the beginning with God. If it is compared as splendor to light, another heretic objects: if light is much more luminous and nobler than the splendor which proceeds from it, therefore also the Father is greater than the Word. It must be said that the taking of a likeness, namely in creatures, is nowhere fully found with respect to God, because every creature is more dissimilar than similar; and therefore the heretics erred who wished to assimilate entirely, but the likeness must be taken from many sources. For the Word is compared to the speaker as a son to a father on account of likeness in nature and equal perfection; it is compared as splendor to light on account of coeternity. And therefore in all such arguments there is a fallacy of the consequent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'

[[commentary]]
quote='''
The place of writing he says was in Asia; the time indeed was, because it was last, after the Apocalypse: and thus the Gospel of John was the last written among the books of Sacred Scripture. And it was fitting that, just as in the first book written, which is the beginning of the canon, an incorruptible beginning is prefixed, so also in the last book written: "In the beginning was the Word," just as there: "In the beginning He created," and this, with the Lord saying in the Apocalypse: "I am the Alpha and the Omega."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FProoemium.html'
source_title='Commentary on John, Prooemium'

[[commentary]]
quote='''
Now the intellect is said to truly comprehend the meaning of propositions when it knows with certitude that they are true; and this knowing is knowing that it cannot be deceived in that comprehension. For it knows that that truth cannot be otherwise; it knows therefore that that truth is unchangeable. But since our mind itself is changeable, it cannot see that truth shining so unchangeably except through some light radiating altogether unchangeably, which it is impossible to be a changeable creature. It knows therefore in that light which illumines every man coming into this world, which is the true light and the Word in the beginning with God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25203.html'
source_title='Itinerarium Mentis in Deum, Chapter 3'
