[[commentary]]
quote='''
It is said in Mark: "Of itself the earth bears the crop, first the blade, then the ear, then the full grain in the ear." This is the time before the Law, the time under the Law, and the time after the Law. Scripture follows this same order.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'
