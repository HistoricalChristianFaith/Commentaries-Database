[[commentary]]
quote='''
As to the swiftness of the desired healing, there is added: And those who had been sent returned, as if with hope of salvation obtained through the word of Christ, which he spoke, which Matthew expresses, although Luke is silent: "As you have believed, let it be done for you. And the boy was healed"; which Luke passes over in silence, because it can sufficiently be gathered from what was said before, because, as Bede says, "it is the custom of blessed Luke to abbreviate what has been fully set forth by others, or even deliberately to pass over it; but what has been said more briefly by others or omitted, he more carefully elucidates." And therefore he passes over in silence the word of the Lord, which the others relate, and tells of the return of the messengers, in order to express the swiftness of the miracle, which he intimates when he adds: They found the servant who had been sick, in good health. Therefore the operation of power arrived before the return of the messengers, so that what is said in the Psalm might be proven true: "His word runs swiftly." Nor is this surprising, because for him there is no difference between saying and doing, as the centurion faithfully believed and confessed with his mouth: because "with the heart one believes unto justice, and with the mouth confession is made unto salvation." And therefore, by believing and confessing that he could do it suddenly by his word alone, he obtained this by the merit of faith, so that the Lord's promise might be shown to be fulfilled, according to that passage in Matthew twenty-one: "Whatever you ask in prayer, believe that you will receive it, and it will be done for you." And thus the Evangelist sufficiently expressed the wondrous healing of the servant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
