[[commentary]]
quote='''
"But he who had been made well did not know who it was:" therefore they necessarily failed in their inquiry: the Psalm: "They failed who searched with scrutiny." Therefore it was said to the Jews below in the seventh chapter: "You will seek me, and you will not find me"; because they were not seeking in order to possess, but in order to persecute.

Here the third point is touched upon, namely the manifestation of Christ sought and not found, which was made not in the crowd, but in the Church. "But Jesus withdrew from the crowd gathered in the place," namely from the multitude that was in the place of healing: therefore that man did not know him, because he had remained in the crowd.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
