[[commentary]]
quote='''
Second, an explicit instruction is drawn out when it is added: The good man out of the good treasure of his heart brings forth good things, namely after the likeness of a good tree. He calls the good treasure the habit of interior perfection, whether in the affection, with respect to which is said Proverbs 21: "A desirable treasure and oil are in the dwelling of the just"; or in the intellect, with respect to which Matthew 13: "Every scribe instructed in the kingdom of heaven is like a man who is a householder, who brings forth out of his treasure new things and old." From both good treasures are brought forth both works and also words; whence James 3: "Who is wise and learned among you? Let him show from good conduct his work in the meekness of wisdom." And just as the good man is compared to a good tree, so also the evil man to an evil one; whence he also adds: And the evil man out of the evil treasure brings forth evil things. He calls the evil treasure the evil will and the evil conscience; Micah 6: "There is still fire in the house of the ungodly and treasures of iniquity." And certainly from an evil heart proceed evil works and unclean words; whence Mark 7: "From the heart of men proceed adulteries, fornications, murders, thefts, covetousness, wickedness, deceit, lasciviousness: all these evil things proceed from within and defile." Likewise also evil words, according to that passage of Proverbs 14: "A faithful witness will not lie, but a deceitful witness utters falsehood." And he himself gives the reason for the one, when he adds: For out of the abundance of the heart the mouth speaks, good namely a word, or evil. Concerning the good, Sirach 6: "A gracious tongue in a good man shall abound"; and concerning the evil, Proverbs 15: "The mind of the just shall meditate on wisdom, the mouth of the wicked overflows with evils"; and in the same: "The mouth of fools bubbles forth foolishness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
