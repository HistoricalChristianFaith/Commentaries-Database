[[commentary]]
quote='''
This virtue gives nobility to the soul. But because at times a man may be indignant at another, there is need for gentleness, which is the remedy against irascibility and anger—not that man should never be angry at all, but that he should be so only in the right circumstances of place and time. Hence, he must have both the face of a man and the face of a lion. At times, however, you believe a man to be kind when he remains silent while knowing of another's sin. Such is not kindness. Listen, therefore: it is said of Jesus that He was troubled, and that He made a kind of whip. Hence, in the First Book of the Machabees, it is written: Woe is me! Wherefore was I born to see the ruin of my people and the ruin of the holy city? Jesus is the Lamb and the Lion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25205.html'
source_title='Collations on the Hexaemeron, Collation 5'

[[commentary]]
quote='''
When Jesus therefore saw her weeping. Above, three preliminaries to the wondrous raising were set forth; here the fourth is presented, which is the compassion of hearing: for the Lord was moved by compassion to hear and to raise Lazarus. The compassion of the one who hears is noted in this, that Christ wept and grieved at the weeping of Mary and the Jews: therefore he says: When Jesus therefore saw her weeping, namely Mary, and the Jews who had come with her, weeping. He saw, namely with the eye of compassion: 4 Kings 20: "I have heard your prayer and seen your tears." He groaned in spirit and troubled himself, having compassion on them: and from this compassion he draws near.

Question. But here it is first asked concerning what he says, that Jesus troubled himself. The contrary seems to be the case: From what is said in Isaiah 42: "He shall not be sad nor turbulent." If you say that he troubled himself voluntarily, not involuntarily, as we do, then it is objected: Because perturbation darkens the eye of the mind: therefore if in Christ the eye of the mind could not be darkened, then he could not be perturbed. Likewise, when perturbation is voluntary, then it belongs not only to sensuality but also to reason, and the perturbation is complete: therefore if Christ was voluntarily perturbed, it is evident from this that he was fully perturbed. I respond: It must be said that disturbance is in one way a passion, as Jerome says, and in another way a propassion: a passion, insofar as it ascends into reason; a propassion, insofar as it remains in sensuality: and this can be in two ways: because it is either in the one sensing by necessity, who cannot do otherwise; or by will. Thus therefore perturbation is threefold, namely of reason, and this is evil and in the wicked; of sensuality, and this by necessity in the good, and by will in Christ. What is therefore said: He shall not be sad nor turbulent, is to be understood of that which belongs to reason, or of involuntary sensuality. As to the objection that that which belongs to sensuality darkens the mind, at least for a time: it must be said that this is true where there is necessity: but in Christ it arose only insofar as he willed according to the dictate of reason. As to the objection that voluntary perturbation is complete: this is understood of when reason disturbs itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
