[[commentary]]
quote='''
Here the reason for the murmuring is touched upon, that is, why the disciples were murmuring: because they did not have faith; but not all of them, only some, who were not chosen by God. Therefore he says: "But there are some of you": thus the words are to be understood spiritually, but some of you do not understand; whence "some do not believe." And he says this not from conjecture but from certain knowledge. Therefore the Evangelist says: "For Jesus knew from the beginning who were the believers"; above in chapter two: "For he himself knew what was in man"; Sirach chapter twenty-three: "The eyes of the Lord are far brighter than the sun, surveying all the ways of men and the depth of the abyss, and beholding the hearts of men in their hidden places." "And who would betray him": whence he was not betrayed as one ignorant, as other men are. Therefore the Evangelist says this, lest Christ appear to have been deceived in admitting unstable disciples and treacherous disciples, such as the traitor. The reason, moreover, why they did not believe was that, although they had been called outwardly and according to present justice, they had not been called according to eternal election; and this he said above and repeats.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
