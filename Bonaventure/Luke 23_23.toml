[[commentary]]
quote='''
And because a perverse heart is neither led by reason nor moved by pity, therefore it is added: But they were insistent with loud voices, demanding that he be crucified, and their voices prevailed. From which it is apparent that, overcome by the force of right reason, they turn to entreaties: whence the Gloss: "They turn to entreaties, so that what they had been unable to accomplish by accusing or even by reasoning, they might now accomplish by demanding and shouting." Whence also John 19: "Pilate therefore went out again and said: Behold, I bring him out to you, that you may know that I find no cause in him: and he said to them: Behold the man. When therefore the chief priests and the officers saw him, they cried out saying: Crucify, crucify him."

From the foregoing, therefore, it is gathered that the death of Christ is more principally imputed to the Jews than to Pilate; whence in John 19 the Lord says: "He who handed me over to you has the greater sin." For the Jews always pressed for his death, but Pilate was seen to evade in seven ways, namely: by change of jurisdiction, by allegation of innocence, by offer of mercy, by showing his own will, by declaration that this was against reason, by infliction of punishment, and finally by pouring the guilt back upon the Jewish people; whence in Matthew 27: "Pilate, having taken water, washed his hands before the people, saying: I am innocent of the blood of this just man; see to it yourselves. And the whole people answering said: His blood be upon us and upon our children."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
