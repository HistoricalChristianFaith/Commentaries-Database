[[commentary]]
quote='''
Nor is it surprising, because even all his acquaintances regarded him as a stranger, although they had not entirely lost their affection: therefore he adds: But all his acquaintances stood at a distance, and the women who had followed him from Galilee, seeing these things. And thus was fulfilled that word of the Psalm: "You have put far from me friend and neighbor, and my acquaintances from misery"; Job nineteenth: "He has put my brothers far from me, and my acquaintances have withdrawn from me as strangers." And the reason for this was that he was now most poor and despised and put to death; Proverbs nineteenth: "The brothers of a poor man hate him; moreover, his friends have withdrawn far from him." Nevertheless, the glorious Virgin and our Lady, holy Mary, was not put far away, neither in affection nor in position. For it is said in John nineteenth: "But there stood by the cross of Jesus his Mother and his Mother's sister"; and she was most close in affection: whence above in the second chapter: "A sword shall pierce your own soul." Whence him whom she bore with joy in his nativity, in his passion she brought forth with sorrows.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
