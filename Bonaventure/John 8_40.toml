[[commentary]]
quote='''
"But now you seek to kill me, a man who has spoken the truth to you, which I heard from God," and thus a just and innocent man; "this" however "Abraham did not do," because it is unjust and is prohibited by the Law; Exodus twenty-three: "The innocent and the just you shall not put to death." Therefore the father whom you imitate is another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
