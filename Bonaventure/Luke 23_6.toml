[[commentary]]
quote='''
But Pilate, hearing, etc. After the accusation before the governor has been described, here he describes the order of the accusation before Herod; for whose orderly description four things are introduced, namely the caution of Pilate evading, the curiosity of Herod questioning, the wickedness of the people accusing, and the stupidity of the ruler despising.

First therefore, as regards the caution of Pilate evading, he says: But Pilate, hearing "Galilee," asked whether the man was a Galilean. He asks this in order to evade judging him, if judgment over him pertains to another. And the reason for this is given in Matthew twenty-seven: "For Pilate knew that they had handed him over out of envy." And therefore he was evading, because either he would have to provoke that nation against himself, or act against justice: whence he wished to place the judgment upon another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
