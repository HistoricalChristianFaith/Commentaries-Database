[[commentary]]
quote='''
These things I have spoken to you etc. Here, fifth, he arms his disciples for patience, so that they may not fail on account of tribulations, but endure them; therefore he says: These things I have spoken to you, that you may not be scandalized: because, as Gregory says, "arrows that are foreseen strike less forcefully, and we endure the evils of the world more tolerably if we are fortified against them by the shield of foresight." Therefore he forearms them concerning future tribulation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
