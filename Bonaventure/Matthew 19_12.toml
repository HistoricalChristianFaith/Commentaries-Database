[[commentary]]
quote='''
That widowed continence according to the evangelical law ought to be vowed is shown by authority, as follows. Matthew 19: There are eunuchs who have made themselves eunuchs for the sake of the kingdom of heaven; he who can receive it, let him receive it: but to make oneself a eunuch for the sake of the kingdom of heaven is done most especially through a vow of continence, and this is proposed to all who wish to undertake it: therefore anyone who wills can vow continence according to the evangelical law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25203.html'
source_title='Disputed Questions on Evangelical Perfection, Question 3'
