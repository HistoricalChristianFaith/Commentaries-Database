[[commentary]]
quote='''
Here the third temptation is described, concerning which two things are to be attended to as before. The first is the suggestion of the devil; the second is the response of Christ. Concerning the persuasion of the devil, attend to three things. For first, he chooses a fitting place for persuasion; second, he expresses the persuasion to cast himself down; third, through the authority of the Psalm he dispels the fear of harm. Therefore, as regards the choice of a fitting place, it is said: He led him into Jerusalem, as to a famous and public place. He was led, however, by permission, not from weakness; whence Chrysostom says that "in Christ there was not weakness, but patience; in the devil, however, not power, but pride." And the Gloss on Matthew 4 says that "this vision was accomplished through the bodily senses"; Chrysostom, however, says that "the devil so took him up that he might be seen by all; but Christ, without the devil's knowledge, so acted invisibly that he was seen by no one." Whence, so that he might be better seen, it is added: And he set him upon the pinnacle of the temple. That was a high and prominent place, where doctors and priests were accustomed to speak to the people. And according to some expositors, it was the summit of the roof of the temple, which is called the upper floor, in 3 Kings 6. Or according to others, it was a certain gallery above the gate of the temple, where one ascended by steps. According to others, however, it is said that there was a roof there with a certain parapet of the wall, because in Palestine the houses have flat roofs, and the temple had a flat roof, like the tabernacle, and on such roofs doctors and preachers were accustomed to stand, according to that passage in Matthew 10: "What you hear in the ear, preach upon the housetops."

As regards the urging of the casting down, it is added: And he said to him: If you are the Son of God, cast yourself down. Because the devil had fallen downward, he would gladly drag all downward; below in chapter 10: "I saw Satan falling like lightning from heaven." But Christ could say to the devil and his angels what he said to the Jews in John 8: "You are from below, but I am from above"; whence it was not his part to descend, but to ascend. But the devil was suggesting this so that, by descending bodily, he might make him become proud spiritually, so that there would be at once a vain ascent and a true descent. In this we are taught that humiliation and exaltation are always joined together, according to that passage below in chapter 18: "Everyone who exalts himself shall be humbled, and he who humbles himself shall be exalted"; and Proverbs 18: "Before destruction the heart of man is exalted, and before he is glorified, he is humbled." And note the manner of suggesting, when he says: Cast yourself down. Chrysostom: "He did not push, he did not touch, he did not approach, but only said: Cast yourself down, so that we may know that everyone who obeys the devil casts himself down." And Jerome: "He is sufficiently weak, because he can harm no one unless that person has cast himself down." And therefore the counsel is sound, in Ecclesiastes 10: "If the spirit of him who has power rises up against you, do not leave your place," neither by presumption nor by despair.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
