[[commentary]]
quote='''
But thirdly, as regards the scantiness of food, it is added: But he said to them: You give them to eat: you, as their prelates, according to that word of First Peter five: "Elders, feed the flock that is among you." But he says this so that from their response the scantiness of food might be known. — On account of which it is added: But they said: We have no more than five loaves and two fish. From which the poverty of the Apostles is apparent, not only for feeding the crowd, but even for satisfying their own hunger; and so that the great poverty might be shown, John specifies the kind of loaves. For it is said in John six: "There is a boy here who has five barley loaves and two fish; but what are these among so many?" They were similar in this to that widow whose flour Elijah multiplied: Third Kings seventeen: "As the Lord God lives, I have no bread except as much flour as a handful can hold"; and in Fourth Kings four, the servant said to Elisha: "What is this, that I should set it before a hundred men?" Similarly the Apostles answered here, or Andrew in the person of all, as is said in John six; or he first and afterward the others; hence there is no contradiction. However these words were spoken, they show the inability of the disciples to feed the crowd.

Lest, however, they be thought to say this not on account of inability but on account of laziness, therefore they offer their service for the purchase of food, when they add: Unless perhaps we go and buy food for all this crowd. And this indeed can be the word of those offering service, according to that passage in Mark chapter six: "Shall we go and buy two hundred denarii worth of bread and give it to them to eat?" Or it can be the word of those showing inability to provide refreshment, not only with respect to the loaves they had, but also with respect to the price. Whence it is said in John chapter six: "Two hundred denarii worth of bread is not sufficient for them, that each one might receive even a little." And certain of the disciples spoke in one manner, others in another; and John expresses one, Mark another, but Luke in the aforesaid discourse includes both; which is evident from the varied expression of the discourse itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
