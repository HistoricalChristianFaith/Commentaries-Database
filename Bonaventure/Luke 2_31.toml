[[commentary]]
quote='''
But this salvation was not particular, but universal; and therefore he adds: Which you have prepared before the face of all peoples, according to that word of Isaiah 52: "All the ends of the earth shall see the salvation of our God." He already saw verified that word of the Psalm: "The Lord has made known his salvation; in the sight of the nations"; there follows: "All the ends of the earth have seen the salvation of our God"; Isaiah 49: "It is a small thing that you should be my servant for converting the remnants of Israel. I have given you as a light to the nations, that you may be my salvation even to the ends of the earth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
