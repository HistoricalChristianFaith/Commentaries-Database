[[commentary]]
quote='''
Secondly, to the publicans seeking instruction, he gives a lesson about keeping the laws, when it is added: And the publicans also came to him, to be baptized. "Publicans were those who collected public taxes, or who were contractors of the revenues of the treasury, or of public affairs," or who received the royal taxes in a lump sum. And these were already coming to John, as desiring salvation more than the scribes: Matthew twenty-one: "The publicans and harlots shall go before you into the kingdom of heaven." And their diligence is expressed when the question is added: And they said to him: Master, what shall we do? They did well indeed in this, according to the counsel of Isaiah one: "Cease to do perversely, learn to do well"; and according to that of Jeremiah six: "Stand upon the ways and ask about the ancient paths, which is the good way, and walk in it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Commentary on Luke, Chapter 3'
