[[commentary]]
quote='''
"But he who enters through the door is the shepherd of the sheep:" he enters through the door who enters through truth. Concerning this entrance, First Thessalonians two: "You yourselves know, brethren, our entrance to you"; and it is added there: "For neither at any time were we found using words of flattery, as you know, nor seeking an occasion of avarice, nor seeking glory from men."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
