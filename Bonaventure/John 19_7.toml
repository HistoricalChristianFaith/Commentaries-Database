[[commentary]]
quote='''
The Jews answered him. Here is set forth the accusation of the Jews: whence they said: We have a Law, which namely we observe by the will of the Roman rulers. They allege the Law in their favor, when it is against them: above in chapter 7: "Did not Moses give you the Law, and none of you keeps the Law"? And according to the Law he ought to die, because he made himself the Son of God, and thus blasphemed: Leviticus 24: "He who blasphemes shall die the death"; whence above in chapter 10: "We do not stone you for a good work, but for blasphemy, and because you, being a man, make yourself God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
