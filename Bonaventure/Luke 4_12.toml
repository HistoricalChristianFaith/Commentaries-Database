[[commentary]]
quote='''
Here after the pestilential persuasion, he adds the Lord's response, brief and efficacious, when he says: Jesus answering said to him: It is said, namely in Deuteronomy six: You shall not tempt the Lord your God: and Sirach eighteen: "Do not be as a man who tempts God." Whence the children of Israel are rebuked, in Numbers fourteen, to whom the Lord says: "They have tempted Me now ten times." Moreover, to tempt God, as Bede says, is, when a man has what he might do, to seek a test of divine power. And because Christ did not need this test of power, He was unwilling to tempt God or to consent to the devil, and through an authority He answered the opposing authority, so that a nail might be driven back by the force of a nail.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
