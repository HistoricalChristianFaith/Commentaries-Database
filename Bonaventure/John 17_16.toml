[[commentary]]
quote='''
They are not of the world, just as I am not of the world, namely in conduct; therefore he was asking that they be saved and preserved, lest they be turned back to the world through love; concerning which preservation, Apocalypse 3: "Because you have kept the word of my patience, I also will keep you from the hour of temptation, which shall come upon the whole world, to try those who dwell upon the earth." Thus he asks that they be preserved from the evil of transgression; he also asks that they be preserved from the evil of error.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
