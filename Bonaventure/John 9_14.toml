[[commentary]]
quote='''
Now it was the Sabbath. Here is touched upon the occasion for censuring, which was from the feast day and the manner of healing. By reason of the day he says: Now it was the Sabbath when Jesus made the clay and opened his eyes: above in chapter 5: "For this reason the Jews persecuted Jesus, because he did this" — namely, the work of healing — "on the Sabbath," as if despising the Law. The other occasion was from the manner of healing, which they therefore inquire about, because they cannot know it except through the confession of the blind man. They inquire about the manner so that, because they are unable to censure the deed, they might calumniate the manner.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
