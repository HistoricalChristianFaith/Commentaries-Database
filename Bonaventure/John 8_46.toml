[[commentary]]
quote='''
"Which of you convicts me of sin?" As if to say: no one can. On this account it is said in reproof in Job fifteen: "You reprove with words him who is not equal to you." Why then do you not believe me? "If I speak the truth, why do you not believe me?" This is certainly not on account of my fault, but your malice; and this he proves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
