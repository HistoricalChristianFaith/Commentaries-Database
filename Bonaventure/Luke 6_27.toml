[[commentary]]
quote='''
Concerning the promulgation of the instructions, it should be noted that for a man to be perfect, it is necessary that he be perfectly benevolent, perfectly peaceable, and perfectly beneficent. The first regards affection, the second passion, and the third operation. He gives therefore first the commandment of perfect benevolence, when he says: But I say to you who hear: Love your enemies. For this commandment is to be set before the hearers, that is, the believing and the obedient, in whom God dwells, because it is said in 1 John 4: "He who abides in charity abides in God, and God in him." And such a one hears the commandment of charity, not only with the ear of the body, but of the heart, according to that word in John 8: "He who is of God hears the words of God." This hearing was stirred up in Isaiah 55: "Hear, you who hear me, and eat what is good, and your soul shall delight in fatness. Incline your ear and come to me; hear, and your soul shall live." It shall live indeed through the commandment of love, because, as is said in 1 John 3, "he who does not love abides in death"; and before that: "We know that we have passed from death to life, because we love the brethren." To this the Apostle says in Ephesians 5: "Walk in love, as Christ also loved us and delivered himself for us"; "because, when we were enemies, we were reconciled to God through the death of his Son," Romans 5. And so we ought to love our enemies. And since it does not suffice "to love in word or tongue alone, but in deed and in truth"—therefore he adds: Do good to those who hate you, so that there may be "love without dissimulation"; Proverbs 25: "If your enemy hungers, feed him; if he thirsts, give him drink"; the same is said in Romans 12.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
