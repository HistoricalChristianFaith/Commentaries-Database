[[commentary]]
quote='''
"Jesus said to them: If God were your father, you would surely love me," as your brother, because the spirit of adoption is the spirit of love; Romans eight: "You have received the spirit of adoption of sons, in which we cry: Abba, Father." "For I proceeded from God," namely as Son by generation; "and I came," into the world through the incarnation, and just as I was begotten by him, so also I was sent; whence: "neither did I come of myself, but he sent me." I did not come by my own authority; Hebrews five: "Christ did not glorify himself to be made high priest"; on the contrary, Jeremiah twenty-three: "They ran, and I was not sending them"; likewise Exodus four: "I beseech you, Lord, send whom you are about to send." And yet you do not love me; and this he proves by asking them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
