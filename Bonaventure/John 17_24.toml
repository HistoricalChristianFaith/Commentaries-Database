[[commentary]]
quote='''
Father, those whom you have given me. The fourth part of the chapter is that in which, for those for whom he petitioned conformity of grace, he petitions the perpetuity of glory, in the following order. First is set forth the petition; second, the reason why the petition should be heard. The petition concerns glory; and because glory is through the vision of the Divinity, which we shall see in the fatherland, he therefore says: Father, those whom you have given me, namely through predestination, I will that where I am, they also may be, through glorious cohabitation: above, chapter 12: "If anyone serves me, let him follow me; and where I am, there also shall my servant be." Where I am, that is, where I am about to be immediately according to my humanity. Or where I am according to Divinity, that is, let them be with me, who am everywhere. Augustine: "To be with him is a great good: for the wretched can be where he is who is everywhere. But the blessed are with him, because they always cling to him by enjoying him." And that it must be understood thus is clear from what follows: That they may see my glory, which you have given me. This is the excellence of the Divinity; therefore he says: Because you loved me before the foundation of the world: above in the fifth chapter: "The Father loves the Son and shows him all things." This glory only the good will see; Isaiah twenty-six: "Let the impious be taken away, lest he see the glory of God." To this glory we are now conformed through grace; Second Corinthians three: "We, beholding the glory of God with unveiled face, are transformed into the same image from glory to glory, as by the Spirit of the Lord."

But there is a question about what he says: that where I am, they also may be with me. To the contrary: Above in the fourteenth chapter: In my Father's house there are many mansions. I respond: "In unequal glory, equal joy"; by reason of unequal glory there is multiplicity: by reason of common joy, where head and members are.

Likewise, he dwells in inaccessible light, First Timothy last chapter. I respond that inaccessible means either because in no way, or because with difficulty, or because not by human power, or because it is approached only through divine glory.

Furthermore, excellences destroy; but the brightness of God is most excellent. I respond: This is to be understood as follows: where the one apprehending is corporeal, the thing apprehended can cause harm.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
