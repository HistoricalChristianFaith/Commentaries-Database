[[commentary]]
quote='''
"If therefore the Son shall make you free, you shall be free indeed," that Son, I say, alone is free, because he alone is without sin: whence in the Psalm: "I have become as a man without help, free among the dead." And the reason is given below in the fourteenth chapter: "The prince of this world comes and has nothing in me." This free Son, in order to free us, was made as it were a slave for us: Philippians two: "He humbled himself, taking the form of a slave," etc. He therefore freed us by redeeming us; Isaiah fifty-two: "You were sold for nothing, and you shall be redeemed without money"; because, as is said in First Peter one, "you were redeemed not with corruptible gold or silver, but with the precious blood of Christ Jesus, as of a lamb unspotted and undefiled." Not, I say, that we should again be slaves, but free; whence Galatians five: "You, brethren, have been called to liberty; only do not make liberty an occasion for the flesh, but by the charity of the spirit serve one another."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
