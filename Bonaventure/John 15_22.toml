[[commentary]]
quote='''
If I had not come. Here now in the third place the malice of those who hate and persecute is shown. He shows therefore their malice to be inexcusable both through what they heard and through what they saw: through what they heard: whence he says: If I had not come and had not spoken to them, namely the words of faith and instruction, they would not have sin, supply: so grave and inexcusable, because, Luke twelfth chapter, "the servant who knew the will of his lord and did not do it shall be beaten with many stripes; but he who did not know shall be beaten with few"; and therefore, if they had not heard, they would be excusable in some way through ignorance. But now they have no excuse for their sin; because they do not believe not from ignorance but from hatred, which hatred redounds upon the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'

[[commentary]]
quote='''
There is a question about what he says: If I had not come and had not spoken to them, they would not have sin.

1. Therefore, according to this reasoning, those who do not hear and do not believe are not condemned for unbelief; which is manifestly false, because no one is saved without faith.

2. Likewise, according to this, the Tyrians and Sidonians, who did not believe, will not be condemned: which is manifestly false by the testimony of the Gospel.

I respond: It must be said that by way of eminence, different kinds of sins are given to be understood under the general name of sin, but chiefly among others the sin against the Holy Spirit, which is purely sin, admitting no excuse. By the name of sin, therefore, is understood here the sin against the Holy Spirit, which was added to the sin of unbelief: and this the Jews would not have had, but would only have remained in unbelief, if the Lord had not manifested himself to them through open signs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
