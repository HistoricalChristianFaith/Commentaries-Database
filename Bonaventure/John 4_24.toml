[[commentary]]
quote='''
"God is Spirit," not a body, as you believe: Isaiah 40: "To whom have you likened God? Or what image will you set up for him?" "And those who worship him must worship in spirit and truth:" so that they may be conformed to him, that they may be in spirit, not in the flesh: Romans 8: "Those who are in the flesh cannot please God": that they may be in truth, not in pretense: Wisdom 1: "The Holy Spirit of discipline will flee from the deceitful."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
