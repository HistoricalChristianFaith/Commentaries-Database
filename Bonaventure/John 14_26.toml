[[commentary]]
quote='''
But the Paraclete, the Spirit, whom the Father will send in my name, that is, in faith in my name, because He was given only to those believing in Christ; above in chapter seven: "He who believes in me, as the Scripture says, rivers of living water shall flow from his belly"; Acts four: "For there is no other name under heaven given to men, in which we must be saved." That Spirit, I say, will teach you all things and bring to your remembrance all things whatsoever I shall have said to you; Wisdom seven: "Wisdom, the maker of all things, taught me: for in her there is a spirit of understanding, holy."

It can be asked concerning what he says, that the Holy Spirit will suggest all things that the Son had said; for to suggest is characteristic of an inferior. To this Gregory responds: "That the Holy Spirit is said to suggest, not because he brings knowledge from below, but because from what is hidden."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'

[[commentary]]
quote='''
Gregory, on that passage of John fourteen, *He will teach you all things,* says: "Unless the same Spirit is present to the heart of the hearer, the speech of the teacher is idle: let no one therefore attribute to the man who teaches what he understands from the mouth of the teacher, because unless there is one who teaches within, the tongue of the teacher labors outwardly in vain."

Likewise, the same author in the same place: "Behold, you all equally hear the one voice of the speaker, and yet you do not all equally perceive the meaning of the voice heard. Since therefore the voice is not different, why is the understanding of the voice different in your hearts, unless it is because, through the fact that the voice of the speaker commonly admonishes, there is an interior teacher who specially teaches certain ones concerning the understanding of the voice?"

But if our intellect were sufficient of itself for understanding through the light of created truth, it would not need a heavenly teacher: since therefore it does need one, the conclusion is clear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Scientia%2520Christi%2FQuestion%25204.html'
source_title='Disputed Questions on the Knowledge of Christ, Question 4'
