[[commentary]]
quote='''
Third, he invites to the bearing of the cross by consideration of the future judgment, when he says: For whoever shall be ashamed of me, namely to imitate me, and of my words, namely to confess them, scorning the cross of Christ as ignominious, and also his doctrine out of evil shame, concerning which it is said in Sirach 4: "Do not be confounded to say the truth for the sake of your soul; for there is a confusion that brings sin, and there is a confusion that brings grace and glory." In this he gives us to understand that we ought not to be ashamed of the truth of Christ, by the example of the Apostle, who said in Romans 1: "I am not ashamed of the Gospel; for it is the power of God," etc. But we ought to be ashamed of the vileness of sin, according to that in Romans 6: "What fruit had you then in those things of which you are now ashamed?" But many are not ashamed of the deformity of sin, of whom Jeremiah 8 says: "They were confounded because they committed abomination; nay rather, they were not confounded with confusion and they knew not how to blush"; and again: "The forehead of a harlot woman is become yours," etc. Such a one is ashamed of the humility of Christ. — And concerning this he adds: The Son of man shall be ashamed of him, that is, shall make him ashamed, or shall cast him off as one to be ashamed of by his just judgment, according to which it is said in 1 Kings 2: "Those who honor me I will honor; but those who despise me shall be inglorious," and this on the day of judgment. — And therefore he subjoins: When he shall come in his majesty and that of the Father and of the holy Angels: in which he touches upon the judicial power with respect to the principle of causality in the Father, with respect to the privilege of excellence in himself, and with respect to the ministry of obedience in the multitude of Angels. Hence Matthew 24: "Then shall appear the sign of the Son of man in heaven, and then shall all the tribes of the earth mourn, and they shall see the Son of man," etc.; and Isaiah 3: "The Lord will come to judgment with the elders of his people." In this judgment the proud shall be confounded and the humble shall be exalted, according to that of the Psalm: "All the horns of sinners I will break, and the horns of the just shall be exalted."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
