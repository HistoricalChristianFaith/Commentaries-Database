[[commentary]]
quote='''
Since indeed a perfect advance in good is considered according to divine imitation, and all the ways of the Lord are mercy and truth: hence it is that there is a twofold beatitude according to these two ways, namely hunger or zeal for justice, and the affection of mercy.

For the perfection of prelacy, two things are necessarily required, namely zeal for justice and the affection of mercy: for mercy and truth preserve the king. According to these two, the governance of prelacy in the Church militant ought to be ordered.

Fortitude disposes to hunger for justice; for he who is strong holds so eagerly to justice that he would rather be separated from bodily life than from justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
The fourth virtue is hunger for justice, concerning which it says in the Gospel: "Blessed are those who hunger and thirst for justice." The gift of fortitude destroys sloth and introduces hunger for justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"
