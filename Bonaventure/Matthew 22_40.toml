[[commentary]]
quote='''
And because all precepts are referred either to God or to neighbor, as to the end and to that which is ordered to the end; hence it is that in these two commandments is enclosed the collection of the commandments and the comprehension of all the Scriptures. And charity itself is the root, form, and end of the virtues, joining all things with the ultimate end and binding all things to one another simultaneously and in order; therefore it is the weight of ordered inclination and the bond of perfect binding.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
"Which is the first and great commandment in the Law?" The Lord responds: "You shall love the Lord your God with your whole heart and with your whole soul and with your whole mind. This is the greatest and first commandment. And the second is like it: you shall love your neighbor as yourself. On these two the whole Law and the Prophets depend." Augustine shows that in this word: "But it is good for me to adhere to God," the whole of what is said is contained: "You shall love the Lord your God," etc. For we ought to love God, because this is just, holy, easy, and sweet. Whence Augustine: "Lord, who are you to me? And who am I to you, that you command me to love you, and if I do not love you, you threaten me with immense miseries?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25201.html'
source_title="Collationes de Decem Praeceptis, Collation 1"

[[commentary]]
quote='''
The Church is a union of rational men united in harmonious and uniform adherence to divine peace. And love is born of obedience to the Law. And the Law itself commands love. And this can be proved in the Saviour's own words: "On these two commandments depend the whole Law and the Prophets." And so it is fitting that those who obey the Law be loving also. "By this will all men know that you are My disciples, if you have love for one another." And the Apostle writes: "For God is a God of peace, not of disorder."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
For sacred Scripture is principally concerned with the works of reparation. Whence it treats chiefly of faith, hope, and charity, through which virtues the soul must be reformed, and most especially of charity. Of which the Apostle says that it is the end of the commandment, insofar as it proceeds from a pure heart and a good conscience and faith unfeigned. It is the fullness of the Law, as the same Apostle says. And our Savior asserts that the whole Law and the Prophets depend on the two precepts of the same, namely the love of God and of neighbor; which two are intimated in the one Spouse of the Church, Jesus Christ, who is at once neighbor and God, at once brother and lord, at once also king and friend, at once the uncreated and incarnate Word, our maker and remaker, as the Alpha and the Omega; who is also the supreme hierarch, purging and illuminating and perfecting the spouse, namely the whole Church and every holy soul.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25204.html'
source_title='Itinerarium Mentis in Deum, Chapter 4'
