[[commentary]]
quote='''
Therefore he adds: I say to you, you shall not go out from there until you have paid the last mite, that is, never, because you will never pay it back. Bede: "He always pays penalties by suffering for sins, but never by obtaining pardon." Hence until does not set a limit here, just as neither does it there: "The Lord said to my Lord, etc., until I place," etc. Augustine: "Until does not signify a limit of punishment, but you will always be paying and never finish paying." And it says to pay the last mite, because the reprobate are punished not only for great sins, but also for lesser ones. Hence Chrysostom: "If once condemned you are cast into prison, punishments will be exacted from you not only for grave sins, but even for every idle word that you have spoken." Into these punishments are cast those who do not keep the divine words, which direct man to divine grace and to Christ: hence John 5: "Search the Scriptures. They are the ones that bear witness concerning me."

From these things, therefore, it is apparent that man's negligence in knowing and receiving God's grace is inexcusable, because he is roused to it by a threefold admonition, namely through the book of creation, conscience, and Scripture, as if through three witnesses, of which one is exterior, another interior, and the third as it were superior. Wherefore, as it is said in Hebrews 2, "we ought more abundantly to heed the things that we have heard, lest perhaps we drift away. For if the word spoken through Angels was made firm, and every transgression and disobedience received a just recompense of reward, how shall we escape, if we neglect so great a salvation?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
