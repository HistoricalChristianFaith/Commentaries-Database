[[commentary]]
quote='''
But Jesus knew. Here the third point is touched upon, namely the removal of doubt, which was done by the Master before the inquiry of the disciples; on account of which he says: Jesus knew that they wished to ask him, etc.; Sirach twenty-three: "The eyes of the Lord are far brighter than the sun, looking round about all the ways of men and the depth of the abyss, and beholding the hearts of men into hidden parts"; and Sirach sixteen: "Every heart is understood by him; and who understands his ways?" And he anticipated their doubt or inquiry, and said to them: Concerning this you inquire among yourselves, because I said to you: A little while, and you shall not see me; and again a little while, and you shall see me. He resolves this doubt by showing the twofold time, namely of tribulation and of consolation, and that on account of the one it was said: You shall not see, and on account of the other: You shall see. And on account of this there was no contradiction, because it does not refer to the same time, but on account of the different times a little while was said twice. For this reason he says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
