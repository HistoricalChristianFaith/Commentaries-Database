[[commentary]]
quote='''
His disciples say to him. After Christ's promise has been set forth, there is set forth the consolation of the disciples, which is described in this order. First, the consolation is noted; then, because they were deceived, the instruction is set forth; third, because they were wavering, the confirmation is set forth.

First, therefore, the consolation of the disciples is indicated, which they had from the words of the Lord, which they had now understood, and they believed that the promised time of consolation was now at hand. On account of this his disciples say to him: Behold, now you speak plainly and speak no proverb; and so the time has come, of which you say: "The hour comes when I shall no longer speak to you in proverbs, but shall announce plainly."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
