[[commentary]]
quote='''
Second, regarding the remedy of flight, he adds: Then let those who are in Judea flee to the mountains, lest they be found; and let those who are in the midst of it depart, lest they be enclosed; and let those who are in the countryside not enter into it, lest they be captured there. For the army of the Romans first overthrew many cities throughout Judea before it came to Jerusalem. And nearly all the Jews had entered there, as Josephus says, on account of the feast and on account of security; therefore they were all seized by the just judgment of God, according to that passage in Jeremiah 12: "Gather them together like a flock for the slaughter and sanctify them for the day of killing." But the Christians were delivered through flight; hence the Gloss of Bede: "Ecclesiastical history relates that the Christians who were in Judea, when the destruction was imminent, were warned by an Angel and dwelt beyond the Jordan in the city of Pella until the desolation of Judea was fulfilled."

Spiritually, however, the remedy is here intimated which will be available to the weak in that violent persecution of the Antichrist, namely that of flight and concealment. For it is permitted for the imperfect to flee in order to avoid dangers; hence Zechariah 2: "O, O, O! Flee from the land of the north, says the Lord." Condescending to these, Christ hid himself from the Jews, according to that passage in John 7: "After these things Jesus walked in Galilee. For he did not wish to walk in Judea, because the Jews sought to kill him." It is also permitted for perfect men, when they see that it is more expedient for the salvation of the people that they flee; hence the Lord said to the disciples in Matthew 10: "But when they persecute you in one city, flee to another"; and concerning Paul it is said in Acts 9 that when "the Jews were guarding the gates of Damascus day and night in order to kill Paul, the disciples took him and let him down through the wall by night, lowering him in a basket." A figure of this preceded in David; 1 Kings 19: "But he went away and fled and was saved"; for he was let down by Michal through the window.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
