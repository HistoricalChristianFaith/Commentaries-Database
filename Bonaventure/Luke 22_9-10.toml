[[commentary]]
quote='''
Third, regarding the suitability of the place to be found, he adds: But they said: Where do you wish us to prepare? as if in a suitable place, because it is said in Deuteronomy 16: "You shall immolate the Passover in the place which the Lord your God shall choose." And he said to them: Behold, when you enter the city, there shall meet you a certain man carrying a pitcher of water, as a directive sign. Mark, however, says in chapter 14: "There shall meet you a man carrying a jug of water." Augustine also in On the Harmony of the Evangelists says that "Mark says jug, Luke says pitcher; one signified the kind of vessel, the other its size."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
