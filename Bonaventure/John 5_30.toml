[[commentary]]
quote='''
"I cannot of myself do anything." Here the third point is touched upon, namely how he judges: because justly, not according to his own will by declining from the will of God, as men do who pervert judgment. Therefore he says: "I cannot of myself do anything," and thus neither judge; but "as I hear, I judge," that is, as I receive from the Father, and from this it follows that he judges justly. Therefore he says: "And my judgment is just," because it does not decline from the rule of justice through discord of will; and this is: "Because I do not seek my own will," in judging, namely, "but the will of him who sent me," that is, of God the Father, who is just; whence below in chapter 8: "He who sent me is truthful"; and afterward: "I always do the things that are pleasing to him"; and therefore justly, because, Deuteronomy 32: "God is faithful and without any iniquity, just and right"; in the Psalm: "The Lord is just in all his ways," etc.

Likewise, concerning the manner of judging: that he judges as he hears. Against: Isaiah 11: "He shall not judge according to the hearing of the ears." Likewise he says that not according to his own will, but God's: therefore his will is discordant from the will of God. I respond to the first: He does not judge according to exterior hearing and report, but according to interior hearing and paternal illumination. To the second it must be said that this has two grounds of truth: "I do not seek my own" singular will, either because he has it but does not seek it, or because he does not have it nor does he seek it: and he speaks in this latter sense, while the objector objects in the first sense.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
