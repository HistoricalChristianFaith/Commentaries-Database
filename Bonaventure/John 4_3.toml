[[commentary]]
quote='''
"He left Judea and went again into Galilee:" because he had gone once before, above in the first chapter. Chrysostom: "The Lord withdrew not for the sake of fear, but concealing their malice and envy": whence below in the seventh chapter: "Jesus walked in Galilee: for he did not wish to go into Judea, because the Jews sought to kill him." Thus, with preaching having been done to the Jews, the opportunity of preaching to the Samaritans presented itself.

It is asked concerning what it says: the Lord left Judea on account of the Pharisees who now knew. It seems that he feared and that he fled. To this Chrysostom responds that it was not out of fear, but for the sake of avoiding their scandal and the zeal of envy. But then it is objected: Because "the truth of doctrine is not to be abandoned on account of scandal"; whence he did not cease to speak the truth to them on account of scandal in many places, as in Matthew 15; why then does he now desist on account of scandal? Likewise, if on account of envy: why did they envy Christ more than John, since John likewise baptized?

It must be said that He left Judea for a threefold reason, namely to avoid scandal, to increase fruit, and to give an example. On account of scandal, lest the Jews be made worse through the kindling of zeal: but this was not the whole cause, indeed also on account of fruit, because there He would have accomplished little, and elsewhere He accomplished much: and preaching must be abandoned on account of scandal when greater fruit can be borne elsewhere. On account of example He also departed, as Augustine says, to show us that it is lawful to avoid the fury of persecutors.

As to what is asked: why did they persecute Christ more than John? The response is that John did not baptize in his own name, but in the name of the coming Christ, whereas Christ baptized in His own name: whence He taught and baptized as one having authority. Since therefore the envious Pharisees wished to have no superior, they envied Him all the more.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
