[[commentary]]
quote='''
"He who speaks of himself seeks his own glory;" but he who seeks his own glory is a liar, because he usurps what belongs to another: Isaiah 48: "I will not give my glory to another"; but I in teaching do not seek my own glory, but I seek the glory of him who sent me; therefore my doctrine is true. For this reason he says: "But he who seeks the glory of him who sent him, he is true, and there is no injustice in him." Christ sought the glory of his Divinity, not of his humanity, because to him all glory is due: 1 Timothy 1: "To the King of ages, immortal, invisible, the only God, be honor and glory," etc. "He is just and true," because conversely, to usurp another's honor for oneself is falsehood and injustice. So the Antichrist will usurp, of whom it is said in 2 Thessalonians 2: "He will be exalted and lifted up above all that is called God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
