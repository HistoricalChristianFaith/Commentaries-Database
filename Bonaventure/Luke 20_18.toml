[[commentary]]
quote='''
And therefore he adds: Everyone who falls upon that stone shall be broken, through the corruption of sin; but upon whomever it shall fall, it will grind him to powder, through the vengeance of the future judgment. For fault renders nature weak, but eternal punishment utterly crushes and reduces to dust. Whence the Gloss: "He who now despises and inflicts injuries does not yet entirely perish, but is shaken, so that he does not walk upright; but the stone shall fall upon him, which coming in judgment will crush him." Against this stone, therefore, they stumble who do not believe in him or do not imitate him: First Peter 2, "To you is the honor who believe, but to those who do not believe, the stone which the builders rejected, this has become the head of the corner, and a stone of stumbling and a rock of scandal to those who stumble at the word and do not believe, unto which also they are appointed." And so it happened to the Jews, according to that passage of Isaiah 8: "The Lord shall be to you for a sanctification, but for a stone of stumbling and a rock of scandal to the two houses of Israel, for a snare and a ruin to the inhabitants of Jerusalem. And very many of them shall stumble and fall and be broken and be ensnared and be taken. I will wait for the Lord, who has hidden his face from the house of Jacob." Those therefore who are scandalized by this stone fall, but those who are condemned by this stone are crushed, according to that passage of Isaiah 30, "Suddenly, when it is not expected, its destruction shall come, and it shall be broken as the bottle of a potter is broken with an exceedingly mighty breaking, and there shall not be found among its fragments a shard in which a little fire may be carried from the hearth, or a little water drawn from the cistern." On account of which, "not so the wicked, not so, but as the dust which the wind casts from the face of the earth."

In this authority, therefore, the Lord confirms the intention of the parable, namely that he himself is to be rejected by the Jews, that he will choose the Gentiles, that he will cast out the Jews on account of their perfidy, and that he will finally condemn them by definitive sentence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
