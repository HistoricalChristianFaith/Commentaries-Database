[[commentary]]
quote='''
Third, she praises the Lord in the aforesaid work, insofar as it is a manifestation of generosity, when she says: He has filled the hungry with good things, and the rich He has sent away empty; because true generosity is to give to the poor, not to the rich. Proverbs 13: "The just man eats and fills his soul, but the belly of the wicked is insatiable"; and again in the Psalm: "The rich have wanted and have been hungry, but those who seek the Lord shall not be deprived of any good"; and Isaiah 65: "Behold, my servants shall eat, and you shall be hungry; behold, my servants shall drink, and you shall be thirsty; behold, my servants shall rejoice, and you shall be confounded"; because, as it is said in 1 Corinthians 1, "not many wise according to the flesh, not many mighty, not many noble; but the foolish things of the world God has chosen, that He may confound the wise; and the weak things of the world God has chosen, that He may confound the strong; and the ignoble things of the world and the contemptible God has chosen, and the things that are not, that He might destroy the things that are, so that no flesh should glory in His sight"; and the Psalm: "The king is not saved by great power, and the giant shall not be saved by the abundance of his strength."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
