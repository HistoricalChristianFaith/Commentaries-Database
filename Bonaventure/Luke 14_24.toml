[[commentary]]
quote='''
Third, with regard to the rejection of the contemptuous, he adds: But I say to you, that none of those men who were invited and excused themselves shall taste my supper; because no one attains to that supper except the humble: Matthew chapter eighteen: "Unless you be converted and become as little children, you shall not enter into the kingdom of heaven"; hence also it is said in the Psalm: "How great is the multitude of your sweetness, O Lord, which you have hidden for those who fear you"! For the Lord reserves it for those who fear him, but repels the proud. "For if God spared not the angels that sinned, but with the chains of hell," etc., as is said in Second Peter chapter two; and afterward: "The Lord knows how to deliver the godly from temptation, but reserves the wicked to be tormented"; and on account of this, Romans chapter eleven: "Be not high-minded, but fear. For if God spared not the natural branches, lest perhaps he spare not you either." And therefore he says in Hebrews chapter two: "Therefore we ought more diligently to observe, lest perhaps we drift away. For if the word spoken through Angels was made firm, how shall we escape, if we have neglected so great a salvation"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
