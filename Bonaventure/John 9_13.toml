[[commentary]]
quote='''
They brought him to the Pharisees, who had been blind, because they were anxious to censure; Luke 6: "The scribes and Pharisees watched whether he would heal on the Sabbath, that they might find an accusation against him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
