[[commentary]]
quote='''
As for the excellence of justice in its pursuit, it is added: And all went to be enrolled, each to his own city. They were therefore carrying out the king's command, and no one was seizing what belonged to another; and thus they had subjection to the king in their enrollment, and peace with one another in quiet and just cohabitation, according to that passage in Romans thirteen: "Render to all what is owed: to whom tribute, tribute; to whom honor, honor; owe no one anything, except to love one another." To be enrolled indeed, acknowledging themselves subject to the Roman empire, and this by rendering the census tax. And this was just, according to that passage in Matthew twenty-two: "Render unto Caesar the things that are Caesar's, and unto God the things that are God's." And because Judea had already been made tributary, it is signified that the time of Christ's nativity had arrived, according to that passage in the penultimate chapter of Genesis: "The scepter shall not be taken away from Judah, nor a ruler from his thigh, until he comes who is to be sent, and he shall be the expectation of the nations." They went, moreover with no one offering hindrance, by which it is shown that this empire was most peaceful; and therefore it was the time for Christ, the announcer of peace, to come, of whom it is said in Ephesians two: "He himself is our peace, who has made both one." And thus that passage in Micah four was already fulfilled: "Nation shall not take up sword against nation, nor shall they learn war anymore; and all peoples shall walk, each one in the name of his God." And this is what Bede says in the Gloss: "Christ willed to be born in a most peaceful time, because he greatly sought and loved peace and always visited the lovers of peace."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
