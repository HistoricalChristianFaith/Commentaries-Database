[[commentary]]
quote='''
I do not speak of all of you, namely that you will be blessed, but of the elect: hence he says: I know whom I have chosen; Matthew 20: "Many are called, but few are chosen"; 2 Timothy 2: "The Lord knows who are his"; hence what I said: "You will be blessed" is to be understood of some of you, and indeed of the majority. But that the Scripture may be fulfilled: He who eats bread with me, that is, a companion at table, will lift up his heel against me in the Psalm: according to another translation: "The man of my peace, in whom I hoped, who ate my bread, has magnified supplanting against me." To lift up the heel, as Chrysostom says, is to lift up kicking, deceit and fraud and the concealment of treachery. And he speaks by way of similitude: just as a man, when he wishes to trample upon a thing, lifts his heel over it, so Judas trampled upon Christ. And he said this about Judas, not accusing him, but instructing the disciples, lest they believe he was betrayed as a mere man.

Question. It is asked concerning what he says: I do not speak of all: I know whom I have chosen. Contrary: Above in the sixth chapter it is said: Did I not choose twelve of you? If he chose twelve, Judas was chosen, the contrary of which he now says. I respond: It must be said that there is being chosen for present dignity: and in this way Judas was chosen, just as wicked bishops and prelates are chosen, not by error, but by a wondrous dispensation. There is election to eternal solemnity: and in this way Judas was not chosen, because this pertains to those who are finally good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
