[[commentary]]
quote='''
The preparation of the ambush is set forth, which was made by the Pharisees and priests on account of envy, because the crowd seemed to want to believe in him. Therefore he says: "The Pharisees heard the crowd murmuring these things about him," because they did not dare to speak openly. "And the chief priests and the Pharisees sent officers to apprehend Jesus." The Pharisees heard, because they were the observers; but they and the chief priests sent, because they were more powerful. A similar thing is said in Matthew chapter twenty-two: "The Pharisees went and took counsel how to ensnare Jesus in his speech; and they send their disciples to him with the Herodians"; Luke chapter eleven: "The Pharisees began to press him vehemently and to provoke him to speak about many things, lying in wait for him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
