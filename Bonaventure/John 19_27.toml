[[commentary]]
quote='''
When Christ suffered on the cross, the blessed Virgin was present, accepting and consenting to the divine will. And it pleased her that the price of her womb should be offered on the cross for us. He said to his mother: "Woman, behold your son," as if he were saying: it is necessary for you to be without me, and for me to be without you; and you yourself, as a holy woman, conceived him, and as a devout woman, you offer him; may it please you, O Virgin, that I redeem the human race and appease God. And lest she be left desolate, he said to the disciple: "Behold, your mother"; he gave a virgin man to the Virgin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'

[[commentary]]
quote='''
Then he says to the disciple: Behold, your mother: as if to say: guard her as a mother. And from that hour the disciple took her into his own. Here is noted the acceptance of the commendation; into his own, that is, as his mother, he received her, so that he might honor, guard, and keep her, as a son does a mother. But Augustine reads that text as: into his own things, so that it is an accusative plural: and he asks: How into his own things, when he had no possessions of his own? And he answers: into his own, namely duties, services, and acts of kindness, not into possessions, which he did not have.

It is asked why the Lord thus commended his Mother, when above in chapter two he had responded so harshly: What is it to me and to you, woman? Augustine responds, and it is found in the Gloss: "Because then, about to perform divine works, he repelled his Mother as though unknown; now he showed that the hour had come which he then foretold, in which, about to die, he acknowledges her from whom he had been born as a mortal, and suffering human things, with human affection he commends her to a human, and by his example teaches that care should be rendered to parents by devoted children." The reason, moreover, why he commends her to John, on the part of the Lord is touched upon in the text, because he especially loved him; but on his own part it is passed over in silence; and the Saints say that it was "so that a virgin might guard the Virgin."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
