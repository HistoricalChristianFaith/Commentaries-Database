[[commentary]]
quote='''
The Lord rebukes them for the hidden malice of their heart, because they wished to kill him — against the commandment of the Law; for this reason he says: "Did not Moses give you the Law?" which you are bound to observe by your own promise, according to that passage in Exodus 24: "All things that the Lord has commanded us, we will do." "And none of you keeps the Law?" The Psalm says: "They have all turned aside, they have together become unprofitable: there is none who does good, no, not even one"; because already in your heart you have transgressed it; which he shows by revealing the malice of the heart.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
