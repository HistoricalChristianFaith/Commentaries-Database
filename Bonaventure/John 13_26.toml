[[commentary]]
quote='''
Jesus answered him. Here the third point is touched upon, namely the Lord's secret response, by which he satisfies the intimate disciple; on account of which he did not speak in words, but manifested it by the sign itself; therefore he says: It is he to whom I shall extend the dipped bread: the dipping of the bread signifies the dissimulation of Judas. And when he had dipped the bread, he gave it to Judas, son of Simon Iscariot, and by this John knew who it was that would betray him. Augustine: "The bread handed to the betrayer is a demonstration of the grace toward which the betrayer was ungrateful." Whence in the Psalm he laments concerning the ingratitude of Judas: "If my enemy had cursed me, I would surely have endured it; but you, a man of one mind with me, my guide and my familiar, who together with me partook of sweet foods," etc.

Question. There is a question about the Lord's response, because He says: He to whom I shall give the dipped bread. It seems that the Lord exposed Judas. To this Chrysostom says that He gave dipped bread to all. But then it is asked what sign it would have been for John that he was the one to whom I shall give the dipped bread. Likewise, it is said in Matthew twenty-six that they began each to say: Is it I, Lord? and afterward concerning Judas: Is it I, Rabbi? And it is said there that the Lord answered: You have said it. Therefore it seems that the Lord revealed him openly, and not only by a sign, but by word. I respond: It must be said that the Lord revealed the traitor, but not to all; rather to some, but secretly. He revealed it to John for a twofold reason: both because He had compassion on his distress, and also so that he himself might be a witness that Christ had foreknown with certainty, not by conjectures, that this disciple was the traitor. But as to what is said, that a sinner should not be exposed: this is to be understood as meaning that he should not be made public, but nevertheless it can be told to those who are able to help and do not wish to harm. But as to what is said concerning Matthew, it must be said that that word of the Lord, as Augustine says in On the Harmony of the Evangelists, determined nothing certain: You have said it, as if to say: not I, but you. Or it can be that the Lord said it to him in such a way that no one else understood. And indeed, what Matthew narrates was said earlier: and because Peter and John had not been made certain, John still asked secretly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
