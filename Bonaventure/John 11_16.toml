[[commentary]]
quote='''
Therefore Thomas said. Here the fourth point is touched upon, namely the courage of Thomas, even unto dying together; therefore he says: Therefore Thomas, who is called Didymus, as one long doubting, said: Let us also go, that we may die with him. Chrysostom asks: How did Thomas say this? And he says that he said it out of fear; but it is better to say that he said it out of courage, that is, emboldened by the Lord's exhortation, and he spoke both wisely and bravely; whence Second Timothy chapter two: "If we have died with him, we shall also live with him; if we endure, we shall also reign with him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
