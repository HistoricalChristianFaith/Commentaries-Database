[[commentary]]
quote='''
Second, as regards the repugnance between the condemnation and pious custom he adds: Now he was obliged to release to them on the feast day one. This obligation, however, did not flow from imperial law but from custom; whence Rabanus: "Not by the sanction of imperial law, but conquered by the annual custom of the nation, whom he rejoiced to please through such things." This custom, moreover, was on the feast day of Passover in memory of the liberation of the people from Egyptian servitude; whence in John eighteen it is said that "Pilate said: But you have a custom that I should release one to you at Passover: do you wish, therefore, that I release to you the King of the Jews?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
