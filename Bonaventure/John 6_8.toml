[[commentary]]
quote='''
Here is noted the fourth occasion, namely the insufficiency of food for the feeding of so great a multitude. For since there were five thousand, they had only five loaves; and this is noted in Andrew's response. Therefore he says: "One of his disciples, Andrew, the brother of Simon Peter, says to him," namely to the Lord, who was asking Philip about the feeding of the crowds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
