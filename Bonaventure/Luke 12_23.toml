[[commentary]]
quote='''
Then he adds the proof, when he says: The life is more than food, and the body more than clothing: from which it follows: he who gave what is greater will also supply what is less. Ambrose: "It is absurd that we should think an abundance of sustenance will be lacking to us, who obtain from God the enduring substance of living." For the soul and the body are the constitutive parts of man, on whose account the other creatures were made, according to that passage in Genesis 1: "Let us make man in our image and likeness, and let him have dominion over the birds of the air," etc. Hence Chrysostom: "God made all things for man, but man for himself; God made all things in wisdom, but man not only in wisdom, but also according to his wisdom." Hence Wisdom 6: "He himself made the small and the great, and he has equal care for all." And Augustine in On the Christian Combat: "God cares for rational souls and Angels through himself, but governs all other things through them."

And note that he rightly compares the soul and sets it above food, and the body above clothing, because the soul gives vigor to the body by animating it, and the body is as it were the garment of the soul, which appears outwardly. If therefore God provides the bodily vigor of the animating soul, much more so the sufficiency of sustaining nourishment. Again, if he provides the soul with the garment of the body, much more so the covering of exterior clothing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
