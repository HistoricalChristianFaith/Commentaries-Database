[[commentary]]
quote='''
Here now for the third time, after she has manifested her doubt, he opens the sacrament of faith. For the woman, instructed by the Lord, raises the eye of consideration to Christ and the time of grace; on account of which he says: "The woman says to him: I know that the Messiah is coming, who is called Christ; when therefore he comes, he will announce all things to us." The woman knew this because the Samaritans accepted the Law and believed, especially because Christ was promised in the Law not only to the Jews but also to the Gentiles: Genesis 49: "The scepter shall not be taken away from Judah, nor a ruler from his thigh, until he comes who is to be sent, and he shall be the expectation of the nations." Since therefore the woman has been led all the way to Christ and is now prepared to believe in him, what remains except that the Lord reveal himself to her?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
