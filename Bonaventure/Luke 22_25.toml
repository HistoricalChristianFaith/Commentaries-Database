[[commentary]]
quote='''
Secondly, as regards the teaching, repressing arrogance, he adds: He said moreover to them: The kings of the Gentiles lord it over them, through the summit of excellence, according to that word of Judith 1: "Arphaxad, king of the Medes, had subjugated many nations to his empire." "And he gloried as one mighty in the power of his army and in the glory of his chariots."

And they that have power over them are called benefactors, by an honorable name. Such are those of whom it is said in the Psalm: "They called their names upon their lands"; and immediately it is added: "Man, when he was in honor, did not understand," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
