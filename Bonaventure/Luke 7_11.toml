[[commentary]]
quote='''
And it came to pass, afterwards etc. After the miracle of the healing of one about to die, there is here subjoined the miracle of the raising of one dead: in which the demonstration of the excellence of the Savior is made more expressly. For the full description of this miracle, three things are introduced by the Evangelist. The first is the moving reason with respect to the miracle to be performed: the second is the efficient cause with respect to the miracle in its being performed; the third is the subsequent efficacy with respect to the miracle already accomplished. Now the reason moving the Lord to miraculously raise the dead man is shown in the text to be twofold, namely the instruction of the ignorant in the intellect and the consolation of those who mourn in the affections. And according to these, two groups are introduced in the first part, namely those accompanying him on the way, that they might be directed by his teaching, and those meeting him at the gate, that they might be consoled by his grace.

First, therefore, as regards the company of the multitude to be instructed, it is said: And it came to pass afterwards, Jesus went into a city called Nain: he went, namely to teach, according to that passage in Matthew 4: "Jesus went about all Galilee, teaching in their synagogues." And because those wishing to learn accompany the teacher, therefore he adds: And his disciples and a great multitude went with him. For they knew that to be true which is written in Deuteronomy 33: "They who draw near to his feet shall receive of his teaching"; and that passage of Proverbs 13: "He who walks with the wise shall become wiser." And therefore it is said in Ecclesiasticus 8: "Do not despise the discourse of wise elders, and be conversant with their proverbs: for from them you shall learn wisdom and doctrine." And therefore the crowds accompany the Lord and his disciples, according to that passage of the Psalm: "Draw near to him, and be enlightened."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
