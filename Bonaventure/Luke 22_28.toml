[[commentary]]
quote='''
Fourth, regarding the reward enticing to humility, he adds: You indeed are those who have remained with me in my trials, through the endurance of tribulation. Such are those of whom it is said in Revelation 7: "These are they who have come out of the great tribulation and have washed their robes and made them white in the blood of the Lamb." And such as these are true friends, because, Proverbs 17, "he who is a friend loves at all times, and a brother is proven in distress"; and therefore Ecclesiasticus 6: "If you possess a friend, possess him in trial."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
