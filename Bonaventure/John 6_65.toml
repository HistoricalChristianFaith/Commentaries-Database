[[commentary]]
quote='''
"And he said: Therefore I said to you: No one can come to me unless it has been given to him by my Father": above in the same chapter: "No one comes to me unless the Father draws him." For to "come" to the Son "is the best gift and the perfect gift," therefore "from above," James chapter one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
