[[commentary]]
quote='''
Second, as to the eternal generation foretold by the Prophet, he adds: And David himself says in the book of Psalms: The Lord said to my Lord: Sit at my right hand. Without doubt David says this word for word in the Psalm, which treats most excellently and most profoundly of the two natures of Christ. For it is established that this is understood of Christ. For God gave to no one the supreme kingdom, the eternal priesthood, and the judgment of all things except to Christ; and all this is described in that Psalm. It is necessary, therefore, that this verse be understood of Christ, in which David himself, inspired by the Holy Spirit, expresses the eternal generation of the Son in this, that he says: "The Lord said to my Lord"; for to say is nothing other than to conceive a word in the mind, which saying indeed could not exist in God except from eternity, because, as is said in Job 33, "God speaks once and does not repeat the same thing a second time." And therefore in John 1: "In the beginning was the Word, and the Word was with God, and the Word was God." He spoke, therefore, eternally when he begot the Son; the Psalm: "The Lord said to me: You are my Son, today I have begotten you."

He also expresses the equality of the Son with the Father, when he says: "Sit at my right hand," that is, equal to me: Hebrews 1: "Who, being the brightness of glory and the figure of his substance, and upholding all things by the word of his power, making purgation of sins, sits at the right hand of the Majesty on high," etc., up to: "This day have I begotten thee." Therefore Philippians 2: "Who, being in the form of God, thought it not robbery to be equal with God." That sitting therefore does not signify a local position, but rather supreme rest, dignity, and authority, and through this also equality, which belongs to the Son alone. Therefore Lucifer fell, who desired it: Isaiah 14: "How art thou fallen, O Lucifer, who didst rise in the morning, who didst say in thy heart: I will exalt my throne above the stars of God, and I will sit upon the mountain of the testament, and I will be like the Most High."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
