[[commentary]]
quote='''
There is added thirdly the refutation of errors of those thinking wrongly, in what follows: Which is easier to say etc. For he constructs an argument in which he shows that he is true God and can forgive sins, and consequently that they err. And the argument is as follows: everyone who can free a paralytic by a word alone can by a word alone forgive sins. Of this reasoning, however, he first sets forth the proof of the major proposition, subjoins the assumption and interposes the conclusion. Of the major proposition he first sets forth the proof in what he says: Which is easier to say: Your sins are forgiven you, or to say: Rise and walk? As if to say: They are of equal ease; therefore he who can do the one can also do the other; and this was the major proposition. Whence the Gloss on that passage of Matthew 9: "Through the remission of punishment, understand the remission of guilt." Now this is understood through that as through something similar and better known. And this is what is said in Jeremiah 32: "No word shall be difficult for you, who show mercy to thousands"; whence Wisdom 11: "But you spare all, O Lord, because you can do all things."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
