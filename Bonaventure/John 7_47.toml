[[commentary]]
quote='''
"The Pharisees therefore answered them." Having heard the response of the officers, the Pharisees rebuke them for having given credence to his teaching; whence they say: "Have you also been led astray?" And they endeavor to show that they had been led astray by the example of the wicked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
