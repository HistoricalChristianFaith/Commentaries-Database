[[commentary]]
quote='''
The Church is a union of rational men united in harmonious and uniform adherence to divine peace. For the Church in return loves itself. And love is born of obedience to the Law. And the Law itself commands love. And so it is fitting that those who obey the Law be loving also. "By this will all men know that you are My disciples, if you have love for one another." And the Apostle writes: "For God is a God of peace, not of disorder."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
By this shall all men know that ye are my disciples, if ye have love one to another: because, as Augustine says, "love is the proper and special virtue of the devout and the holy. This is what distinguishes the children of the kingdom from the children of perdition"; Ephesians four: "And grieve not the holy Spirit of God, whereby ye are sealed unto the day of redemption." Now this seal of the Spirit is love: Romans five: "The love of God is shed abroad in our hearts by the Holy Ghost which is given unto us."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
