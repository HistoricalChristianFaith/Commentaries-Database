[[commentary]]
quote='''
For some thought, because Judas had the money bag, as steward, that Jesus had said to him: Buy those things which are needed for the feast day, or that he should give something to the poor, because he had the money bag especially on their account: in which it is signified that from the purses of the Church it is lawful for prelates to buy what is needed, that is, what is necessary, and to give the remainder to the poor; and to them especially the commandment was given concerning the feeding of the poor; whence Sirach twenty-nine: "For the commandment's sake receive the poor, and on account of his need do not send him away empty."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
