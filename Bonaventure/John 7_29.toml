[[commentary]]
quote='''
"But I know him, and if I should say that I do not know him, I would be like you, a liar;" you who lie saying that you are ignorant of his temporal birth; but I do not lie so as to say that I do not know his eternal generation. "For I know him, because I am from him, and he sent me;" as the Son knows the Father; Matthew 11: "No one knows the Father except the Son, and he to whom the Son wills to reveal him." "I know him," through manifest knowledge; above in chapter 1: "No one has seen God" etc. "I am from him," through generation; below in chapter 16: "I came forth from the Father and have come into the world." "And he sent me," through the incarnation; Isaiah 61: "The Spirit of the Lord is upon me" etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
