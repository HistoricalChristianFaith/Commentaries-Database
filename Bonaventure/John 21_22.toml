[[commentary]]
quote='''
Jesus says to him. Here thirdly Peter is assured that John would not suffer, through the Lord's response, in which he reveals the truth, to satisfy the question, and rebukes curiosity, to correct the one asking. He reveals the truth when he says: Jesus says to him: Thus I wish him to remain until I come: Bede: "Thus, that is, to await the last day without the violence of persecution": he responds to the one asking. When he says: What is it to you? Follow me, he rebukes him for the curiosity of the question: whence Chrysostom: "What is it to you, if I wish him to remain thus? Attend to the things that are your own, and be solicitous about these": Sirach 3: "Do not be curious about his many works, but think always on those things which he has commanded you"; and therefore he repeats: Follow me, as if to say: think about this and be solicitous about this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked about what he says: Thus I will him to remain until I come. Therefore it seems that at least until the Lord's coming his soul has not been separated from his body: for after that, nothing is established from the text: therefore it seems that John has not yet died: and as evidence for this is the fact that his body is not found. I respond: It must be said that besides the first interpretation of the disciples, which they made, which the Evangelist himself refutes — namely that he would not die — there are three other interpretations. One is that he has not died, but will die at the coming of the Lord: but for now he is in slumber beneath the earth, and therefore his body is not to be found. — But this position is improbable: because it is not to be believed that the Lord would defer for so long showing his glory to the disciple whom he loved, which glory the Apostle desired, in Philippians 1: I desire to be dissolved and to be with Christ. Another opinion is that the Lord assumed him in body and soul, and in that assumption he died and rose again. — Even if this opinion cannot be so easily disproved, nevertheless, because it lacks authority, it is dismissed with the same ease with which it is proved. The third opinion says that John died, and asserts nothing about his body, because nothing certain is found. But what was said: Thus I will him to remain until I come, that is, "to await the last day not of the age, but of his own death, when I myself coming shall receive him into the dwelling of eternal blessedness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
