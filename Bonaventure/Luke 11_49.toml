[[commentary]]
quote='''
And because the malice which they bore in their heart was, by God's permission, to be made manifest in deed, therefore he adds: Therefore also the wisdom of God said, "that is, disposed from eternity," or Christ himself disposed or foresaw, who is "the power of God and the wisdom of God." Or said, that is, foretold by prophetic voice. I will send to them Prophets and Apostles, and of them they will kill and persecute, according to that passage of Jeremiah seven: "I sent to you all my servants the Prophets daily, rising early and sending them: they did not hear me, nor did they incline their ear, and they hardened their neck and wrought worse than their fathers." This was verified in these men, who not only killed the Prophets, but also slew their own Lord. Whence in Acts three Peter says to them: "But you denied the Just and Holy One and asked that a murderer be granted to you: but the Author of life you killed." They also killed and persecuted all his witnesses. For James was killed, and Peter was seized, Acts twelve. They also persecuted Paul and Barnabas, so that they crossed over to the Gentiles, Acts thirteen and fourteen: and all the disciples were also scourged, Acts five.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
