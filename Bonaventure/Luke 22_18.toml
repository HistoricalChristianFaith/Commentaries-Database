[[commentary]]
quote='''
And therefore it is added: For I say to you, that I will not drink of the fruit of the vine, until the kingdom of God comes: which is indeed true, whether the kingdom of God is understood to be justice, according to Romans 14: "The kingdom of God is not food and drink, but justice and peace and joy in the Holy Spirit"; or spiritual understanding, according to Matthew 13: "Every scribe instructed in the kingdom of heaven"; or even eternal life, according to what follows below in chapter 23: "Remember me, Lord, when you come into your kingdom"; or even grace, according to what precedes above in chapter 17: "The kingdom of God is within you." For immediately in the Passion of Christ justice was fulfilled and iniquity was destroyed, according to Daniel 9: "That transgression may be consummated, and sin may find an end, and iniquity may be blotted out, and everlasting justice may be brought in." In the Passion understanding was opened: below in chapter 24: "He opened their minds to understand the Scriptures"; and this is signified by the very rending of the veil, which to this day lies over the minds of those who do not believe. In the Passion grace was given, according to John 1: "Grace and truth came through Jesus Christ." Likewise, through the Passion the gate was opened and glory was acquired; and therefore below in chapter 23: "Today you shall be with me in paradise." Since therefore the kingdom of God according to this fourfold mode immediately succeeded such food and drink, he rightly says that "he would not drink until the kingdom of God should come"; which he says, as the Gloss states, "so that by the change of these sacraments he might teach that the remaining sacraments or precepts of the Law are to be transferred to spiritual observance."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
