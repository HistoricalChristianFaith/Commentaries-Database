[[commentary]]
quote='''
The reason for this he adds when he says: For no word shall be impossible with God. Ecclesiastes 8: "Whatever he has willed, he shall do, and his word is full of power"; Matthew 19: "With God all things are possible," as was said to Sarah, Genesis 18: "Is anything difficult for God?" Bernard: "With the Lord, to do is the same as to speak, and to speak is the same as to will. Rightly therefore you should know that no word is impossible"; and therefore, when God promises something, it must be believed without doubt, because, since he can do all things and cannot lie, it is necessary that it come to pass just as he promises. Numbers 23: "God is not as a man, that he should lie, nor as the son of man, that he should change. Has he said then, and will he not do it? Has he spoken, and will he not fulfill it?" — And thus the Angel shows his conclusion to be necessary, so that the Virgin can now neither doubt nor be able to dissent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
