[[commentary]]
quote='''
In many other ways also a man becomes a partaker of the sin of another; and on account of this the Psalm says: From my hidden sins cleanse me, O Lord, and from the sins of others spare your servant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25204.html'
source_title="Collationes de Decem Praeceptis, Collation 4"
