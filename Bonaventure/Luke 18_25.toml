[[commentary]]
quote='''
Third, as to the obstacle of tenacity itself, he adds: For it is easier for a camel to pass through the eye of a needle, although this is against nature, than for a rich man to enter the kingdom of God, because this is against divine justice. For it is less impossible that a great thing should pass through a small needle than that a covetous and avaricious soul should enter into heaven, where there is a sufficiency of goods; because, as Ecclesiastes 5 says, "the covetous man shall not be satisfied with money, and he who loves riches shall not reap fruit from them," but rather indeed eternal destruction, because the weight of riches drags one downward: Ecclesiastes 5: "Riches kept to the harm of their owner. They perish in the worst affliction." Whence, as far as heaven is distant from earth, so far is the heart of the avaricious man, which is turned toward earthly things, distant from the kingdom of God, which is in heaven. On account of which, Isaiah 55: "As the heavens are exalted above the earth, so are my ways exalted above your ways, and my thoughts above your thoughts." And it should be noted that the comparison of the avaricious man to a camel is apt, because the camel with its huge limbs is an enormous, monstrous, and hump-backed animal: so the avaricious man, joined by love to his possessions, is like a monstrous animal. Moreover, the entrance to the heavenly kingdom is compared to the eye of a needle on account of its narrowness and spirituality: whence Matthew 7: "Narrow is the gate and strait is the way that leads to life, and few enter through it." Whence the impossibility of the avaricious man entering the kingdom of heaven is greater than that of a camel passing through the eye of a needle. On account of which Bernard says: "It is necessary that we strive to enter through the narrow gate. Why, O camel, do you bear the hump? Why, O man of wealth, do you carry the purses of Judas the traitor? Not so, O impious one, not so shall you enter: the eye of a needle does not admit such burdens. But some excuse themselves saying: Are not Abraham, Isaac, and Jacob and the other Saints read to have possessed earthly riches? That suffices for us: for we are not better than the fathers."

"What shall we respond to the new imitators of the ancient Saints? Let them place calves upon the altar of the Lord, let them slaughter rams, let them sacrifice goats, because Abraham also did this. But just as the divine dispensation accommodated itself to those sacrifices for the peoples of that time, so also to carnal riches; where indeed the heavenly promise has sounded, it is necessary that spiritual things be compared with spiritual things, and that the sacrifice be changed, since the hope has been changed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
