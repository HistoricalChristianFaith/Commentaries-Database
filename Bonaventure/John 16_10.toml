[[commentary]]
quote='''
Of justice indeed, because I go to the Father, and you shall see me no longer: The Gloss: "Not of justice which they have done, but which they refuse to imitate." And this is the justice of faith, which believes what it does not see; therefore he says: Because I go to the Father etc.; and then you believe, because "faith is the substance of things hoped for" etc., Hebrews 11. And this is justice, namely of faith, through which the just man is saved: Romans 3: "We reckon that a man is justified by faith without the works of the Law."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
