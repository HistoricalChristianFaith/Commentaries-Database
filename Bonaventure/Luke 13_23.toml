[[commentary]]
quote='''
Second, as regards the instruction in word, by which he responds to the question about the fewness of those who are saved, he adds: And a certain one said to him: Lord, are those who are saved few? This man asks this because he had not heard the divine saying, by which it is said in Matthew 20: "Many are called, but few are chosen"; as a figure of which it is said in Micah 7: "Woe is me! For I have become like one who gathers the clusters of the vintage in autumn."

Or he was posing this question in order to give an occasion for teaching by word what he was showing by example.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke, Chapter 13'
