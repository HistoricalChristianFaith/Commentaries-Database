[[commentary]]
quote='''
"And the two disciples heard him speaking," that is, testifying, "and they followed Jesus," making use of the sound counsel of their master. They followed the light, because they had good works: whence below in chapter 3: "He who does the truth comes to the light, that his works may be made manifest."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
