[[commentary]]
quote='''
When the soldiers therefore had crucified him. Here is noted the third principal point, namely the cruelty or cupidity of those who crucified him, in this, that they stripped Christ and thus divided his garments. And three things are noted here, namely the division of the garments by parts: second, by lot: third, the confirmation of both by authority, lest anything in the death of Christ should seem to happen by chance.

They divide therefore by parts: whence he says: They took his garments and made four parts, a part for each soldier. In this it appears, as Augustine says, that there were four soldiers who crucified the Lord. And the tunic, supply: they took.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
