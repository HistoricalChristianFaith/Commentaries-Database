[[commentary]]
quote='''
In the mystery of the redemption of man, Christ is pointed to as a sacrificed calf in Luke, wherefore: "In the days of Herod,... there was a certain priest," and he is looking to the passion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'

[[commentary]]
quote='''
First, therefore, he shows the office of dignity, when he says: There was in the days of Herod, king of Judea, a certain priest named Zechariah. He sets forth the priestly office, adding royal dominion, to intimate that John was to foreannounce Christ, who was a priest according to the order of Melchizedek, that is, simultaneously king and priest: Hebrews 7: "Melchizedek, king of Salem, priest of the Most High God," etc. — Or he sets forth the kingdom to show that in the time of the Law, royal power preceded the priesthood, but now it is the reverse. Whence 1 Peter 2: "But you are a chosen generation, a royal priesthood," etc.; but in Exodus 19 it is said: "You shall be to me a priestly kingdom and a holy nation." — Or he sets forth the kingdom of Herod the foreigner, who was the first among foreigners to rule over the Jews, to show that the time of Christ's coming had arrived, and that the prophecy of the penultimate chapter of Genesis had been fulfilled: "The scepter shall not be taken away from Judah, nor a ruler," etc. — Or he names Herod to show that he was notorious in wickedness. For there was a threefold Herod, namely father, son, and grandson: the first was the Ascalonite, who slew the children, Matthew 2; the second was Antipas, who beheaded John, Matthew 14; the third was Agrippa, who killed James, enclosing Peter in prison, Acts 12; but the first was the most infamous and the cruelest of all. Therefore, because "against evil, good," conversely there is named the priest Zechariah, to show that he was renowned in goodness and a friend of God, according to that passage of Exodus 33: "You have found grace before me, and I have known you by name"; nor does he show him to be a priest only by name, but also by lineage; whence he says: Of the course of Abijah, that is, of the lineage, according to the exposition of Bede in the Gloss, saying: "When David enlarged the worship of God, as is said in 1 Chronicles 24, he divided the ministries of the priests into twenty-four lots; among which the eighth lot fell to the family of Abijah, from which Zechariah descended, so that the herald of the New Testament might be born in the course of the eighth lot, because by the number eight the New Testament is understood, just as the Old is understood by the number seven."

Second, he sets forth the honorable marriage in that he says: And his wife was of the daughters of Aaron; and thus both were of the priestly lineage, and by this were suited for marriage according to the commandment of the Lord; Numbers 36: "Let all men take wives from the same tribe and kindred, and likewise let all women take husbands." He sets forth her name, because he was thus going to speak of her frequently: And her name was Elizabeth, both in the conception and the salutation and the birth; whence: "the time of Elizabeth was fulfilled," etc. Moreover, he sets forth the honorable marriage alongside the office of dignity, so that from both the conception might be rendered more commendable; Wisdom 4: "O how beautiful is the chaste generation with glory," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
