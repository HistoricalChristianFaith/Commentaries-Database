[[commentary]]
quote='''
Third, with regard to the avoidance of impending reproach, he adds: Lest, after he has laid the foundation, namely by undertaking a higher state in imitating Christ — and this is to lay the foundation: First Corinthians 3: "For no one can lay another foundation besides that which has been laid, which is Christ Jesus." One begins to lay this foundation through faith and good works, according to Matthew 7: "Everyone who hears these words of mine and does them is like a man who built his house upon the rock." Upon this rock he places the foundation of his dwelling who wishes to imitate Christ perfectly, according to Jeremiah 48: "Leave the cities and dwell in the rock, O inhabitants of Moab," etc. And is not able to finish it, namely through perseverance, as are those of whom it is said above in chapter eight: "They believe for a time and in the time of temptation they fall away." Such are those who destroy by relapsing whatever they had built up by beginning well; Ecclesiasticus 34: "One building and another destroying, what profit have they but labor?" Such are the lax and remiss: Proverbs 18: "He who is soft and lax in his work is the brother of him who squanders his own works."

All who see it, by observing the perfection that was begun; First Corinthians 4: "We have been made a spectacle to the world, and to angels and to men." For what is placed on high is shown to all: Matthew 5: "A city set on a hill cannot be hidden, nor do they light a lamp and put it under a bushel, but upon a lampstand, that it may give light to all who are in the house."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
