[[commentary]]
quote='''
Second, with respect to the promotive, which indeed was the testimony of the Apostles: and he indicates this when he says: Even as they delivered them to us who from the beginning were themselves eyewitnesses, namely the Apostles: whence First John one: "That which we have heard, which we have seen with our eyes, which we have looked upon, and our hands have handled," etc.; and John nineteen: "He who saw it has borne witness, and his testimony is true. And he knows that he speaks the truth, so that you also may believe." And because they had seen, therefore they bore witness; whence he adds: And were ministers of the word: Acts one: "Therefore it is necessary that of these men who have been with us during all the time in which the Lord Jesus went in and out among us, beginning from the baptism of John until the day on which he was taken up from us, one of these should be made a witness with us of his resurrection." And such were the Apostles: whence First Corinthians four: "Let a man so regard us as ministers of Christ and stewards of the mysteries of God; here now it is required," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
