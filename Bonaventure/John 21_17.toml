[[commentary]]
quote='''
He says to him a third time. Here is set forth the third inquiry in the same order as before, namely question, response, exhortation. The Lord therefore asks about the same thing: Simon, son of John, do you love me? From this text it is clear that to love is taken in a good sense, as to love. — And Peter was saddened. Here is noted Peter's response: but nevertheless he responded with sadness, because, as Chrysostom says, he feared lest it should happen to him as it happened when he said: "I will lay down my life for you"; and therefore he was saddened, because he said to him a third time: Do you love me? But nevertheless he did not despair; rather, he responded confidently and said to him: whence he adds to his response: Lord, you know all things, as God; you know that I love you, you know even better than I. For he knew that he was the one who said in Jeremiah 17: "I am the Lord who searches hearts and reins," that is, thoughts and affections. He says to him: Feed my sheep. Here is noted the exhortation: and by sheep are understood the more perfect subjects. It should be noted that the Lord commands to feed the sheep, not to shear them, not to devour them, because the pastor is not commanded by the love of Christ to feed himself, but the sheep; Ezekiel 34: "Woe to the shepherds of Israel who fed themselves! Are not the sheep fed by the shepherds? You ate the milk and covered yourselves with the wool."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: why does the Lord ask so many times: Peter, do you love me? Augustine responds: "He asks three times for this reason, so that a threefold confession might be rendered for the threefold denial, lest the tongue serve love less than it served fear." Another reason is given: because he was asking for the purpose of commending his flock; and because he wished to commend the flock three times, therefore he asks three times about love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: why does he say to him three times: Feed? And it is answered that the sheep of Christ ought to be fed in three ways, namely by word, by example, and by temporal support; hence Bede: "The solicitude of the pastoral office requires that the ruler of the Church diligently provide lest temporal supports be lacking to the people, and show them examples of virtue, and zealously bestow upon them the word of preaching."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: why does he say twice that lambs are to be fed and once sheep? I respond that by lambs are understood those who are imperfect and tender in faith, and these need more ample pasture, that is, more solicitous care; but by sheep, the more mature, who are able to govern themselves, and these do not need such great care.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
In the last chapter of John: Feed my sheep, was said to Peter: but the sheep of Christ are all who walk by the way of salvation: therefore Peter was set as prelate over all such: therefore one was the shepherd of all the sheep of Christ according to the foundation of the Church: therefore also according to its progress and consummation, one must be obeyed by all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'

[[commentary]]
quote='''
Bernard, treating the aforementioned words, in the second book to Eugene says thus: "You are the one to whom the keys have been handed over, to whom the sheep have been entrusted. There are indeed other doorkeepers of heaven and shepherds of flocks: but you so much more gloriously, inasmuch as you have more distinctly than the rest inherited both names. They have flocks assigned to them, each one his own; to you alone all have been entrusted, one flock to one shepherd. Not only of sheep, but also of shepherds, you alone are the pastor of all. How shall I prove this, you ask? From the word of the Lord: If you love me, Peter, feed my sheep. Which sheep? The peoples of this or that city, or region, or kingdom? My sheep, he says. To whom is it not plain that he did not designate some, but assigned all? Nothing is excepted where nothing is distinguished." And afterwards: "Your privilege stands unshaken, both in the keys and in the sheep entrusted to you, namely the sign of the singular pontificate of Peter, through which he undertook to govern not one ship, as each of the others his own, but the world itself."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'
