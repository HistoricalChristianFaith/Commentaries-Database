[[commentary]]
quote='''
The proud demons He cast down definitively, but not so with men; whence Lamentations 3: "For He did not humble from His heart nor cast away the sons of men." Therefore His power is praised in the casting down of proud demons and also of powerful tyrants, when she continues: He has put down the mighty from their seat and exalted the humble. In Daniel 5 it is said of Nebuchadnezzar: "Whom he wished he slew, and whom he wished he struck down, and whom he wished he exalted, and whom he wished he humbled. But when his heart was lifted up and his spirit was hardened unto pride, he was deposed from the throne of his kingdom, and his glory was taken away"; and Sirach 10: "God has made the roots of proud nations to wither and planted the humble from among those nations." And the reason for this is given below in chapter 18: "Because everyone who exalts himself shall be humbled, and he who humbles himself shall be exalted." And in this is the praise of divine power; 1 Kings 2: "The Lord makes poor and enriches, He humbles and He lifts up. He raises the needy from the dust and lifts the poor from the dunghill, that he may sit with princes and hold the throne of glory." An example is found in Saul and David, Vashti and Esther.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
