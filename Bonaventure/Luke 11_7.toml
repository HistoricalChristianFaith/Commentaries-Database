[[commentary]]
quote='''
Second, regarding the refusing difficulty, he adds: And he answering from within should say: Do not trouble me, namely by disturbing one who is at rest and rousing him from sleep, as Abner said to David in 1 Kings 26: "Who are you who cry out and disturb the king"? — And that the trouble is great is shown from the adjoined difficulty: The door is now shut, and my children are with me in bed, that is, sons, who ought to be loved with tender affection; whence Isaiah 8: "Behold, I and my children, whom the Lord has given me", that is, sons, whose love cannot be neglected, according to that passage in Isaiah 49: "Can a woman forget her infant, so as not to have pity on the son of her womb"? — Therefore he adds: I cannot rise and give to you. And this does not entirely remove the power, but posits a difficulty, as if saying what Elijah said to Elisha in 4 Kings 2: "You have asked a difficult thing". And therefore he says: I cannot, that is, I cannot conveniently or easily, as the king of Israel answered the king of Syria in 3 Kings 20: "All the things for which you sent to your servant in the beginning, I will do; but this thing I cannot do".
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
