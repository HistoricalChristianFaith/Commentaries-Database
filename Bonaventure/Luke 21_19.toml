[[commentary]]
quote='''
In the second place, I cleave to myself in God. But I cleave to my soul when I possess it: for if a thing passes to the possession of another, I do not have its fruit. Now, I possess my soul when I can face adversity with patience. "By your patience you will win your souls." But the patient toleration of adversity must not be casual, nor result from mere chance: it must come from an inner vision of mercy. And that consists in looking forward to mercy. Thirdly, it consists in forgiving the trespasser for his offense. And these three result from patience, longanimity and goodness. Patience consists in tolerating adversity; longanimity, in expecting the reward that will come from all tribulations; and goodness, in forgiving generously.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252018.html'
source_title='Collations on the Hexaemeron, Collation 18'

[[commentary]]
quote='''
Third, as to the internal armor, he adds: In your patience you shall possess your souls, that is, you shall defend them as by a perfect armor; Proverbs 15: "He who acquiesces to reproofs is possessor of the heart"; and this through patience. For a person is called the possessor of that thing over which he has full dominion; and patience makes one master of oneself, according to that saying in Proverbs 16: "The patient man is better than the strong man, and he who rules his spirit than the conqueror of cities." And therefore Gregory says: "Patience is the root and guardian of the virtues, and by it we possess the souls which possess the body."

And this is manifestly apparent if one considers what patience is. For patience rectifies the rational power, tempers the irascible, moderates the concupiscible, and perfects outward action. The rational power, I say, it illuminates and rectifies; whence Proverbs 14: "He who is patient is governed by much wisdom"; and Proverbs 19: "The learning of a man is known by his patience." It tempers the irascible and the concupiscible; on account of which Gregory says: "True patience exists when one loves the person one bears with. For to tolerate and to hate is not virtue but a veil for fury." It also perfects outward action, according to that saying in James 1: "Patience has a perfect work, that you may be perfect and entire," etc.; and Hebrews 10: "Patience is necessary for you, so that, doing the will of God, you may receive the promise." Moreover, this patience causes the reward to be obtained, while it preserves and multiplies the merits of sufferings. Whence Jerome says: "Patience is exercised when from our neighbor we endure persecutions, losses, and insults; from the adversary, temptations; from the Lord, scourges. Without the sword we can be martyrs, if we preserve patience in our soul."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
