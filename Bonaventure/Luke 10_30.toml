[[commentary]]
quote='''
But Jesus, looking up, said. After the precept directing toward living, there follows a teaching that arouses understanding, and this through a parabolic saying; and this is indicated when it says: But Jesus, looking up: in which he shows that whoever wishes to understand the truth must look upward, whence the true light shines forth: Isaiah 60: "Arise, be enlightened, O Jerusalem," etc.; because, Ecclesiasticus 1, "the fountain of wisdom is the word of God on high." In this parabolic saying, four things are introduced. The first is a person in need because of misery; the second is a person who despises because of hardness, at the passage: It happened that a priest, etc.; the third is a person who helps because of mercy, at the passage: But a Samaritan, etc.; the fourth is a teaching that follows from the parable, at the passage: Which of these three seems etc. Concerning the person in need because of misery, two things are introduced by the Evangelist: the first is the removal of good, the second is the infliction of evil.

First, therefore, as regards the removal of good, he says: A certain man was going down from Jerusalem to Jericho and fell among robbers, who also stripped him. Perhaps they did this because he was alone, which is indicated in the fact that it says: A certain man, so that that saying of Ecclesiastes 4 may appear true: "Woe to him who is alone! For when he falls, he has no one to lift him up," but rather such a one has those who plunder him. Whence this man could say that word of Job 19: "He has stripped me of my glory and taken the crown from my head." "His troops came together and made their way against me." He fell among these robbers perhaps because of the desolation of the road, where robbers are accustomed to lurk, according to that saying of Jeremiah 3: "You sat in the ways, waiting for them like a robber in the wilderness."

Second, as regards the infliction of evil, he adds: And having inflicted wounds, they departed, leaving him half dead: as if to say that they wounded him even unto death, according to what is said of robbers in Proverbs 1: "Their feet run to evil and hasten to shed blood"; and in the Psalm: "Whose mouth is full of cursing and bitterness; their feet are swift to shed blood." They did not merely beat him but also left him half dead, lest he betray them, as is said of Ishmael in Jeremiah 41, that "Ishmael, son of Nethaniah, he and the men who were with him, killed the men coming to Gedaliah near the middle of the cistern"; and this, lest they betray him, just as also here.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'

[[commentary]]
quote='''
Another interpretation can also be drawn according to the spiritual sense, so that the person in need is understood on account of misery as the human race, which in Adam's sinning descended from Jerusalem to Jericho, that is, from paradise into the world, and fell among thieves, that is, into the power of demons, who stripped him of gratuitous gifts and wounded him in his natural endowments. And they left him half-dead, because, with the likeness withdrawn, only the image remained: so that truly that word of the Psalm may be said: "Man, when he was in honor, did not understand: he was compared to senseless beasts," etc.; and again: "Surely man passes as an image." Yet that image is stripped on account of the turning away and wounded on account of the turning toward, according to that word of Jeremiah 2: "My people have done two evils: they have forsaken me, the fountain of living water, and have dug for themselves broken cisterns." Therefore he is stripped and wounded, according to that word of Lamentations, last chapter: "The crown of our head has fallen: woe to us, because we have sinned! Therefore our heart has become sorrowful, therefore our eyes have been darkened."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
