[[commentary]]
quote='''
As he spoke by the mouth of his holy ones. Here he offers praises and thanks for our restoration, inasmuch as it was promised through the Prophets by the prophecy of the Holy Spirit. And first he sets forth the prophetic oracle; second, he subjoins the prophesied benefit; and third, the fulfillment of the benefit. For these three things stir one to bless God.

First, therefore, he sets forth the oracle in that he says: As he spoke by the mouth of his holy Prophets who have been from of old. And it should be repeated: "Blessed be the Lord God, because he raised up," etc. As he spoke: 1 Chronicles 17: "Now, Lord, let the word which you have spoken be confirmed forever, and do as you have spoken." This the Saints preceding Christ's advent desired: Ecclesiasticus 36: "Raise up the prayers which your former Prophets spoke in your name, and give reward to those who wait for you, that your Prophets may be found faithful." Which also came to pass: below, chapter 18: "Behold, we go up to Jerusalem, and all things that were spoken by the Prophets concerning the Son of man shall be accomplished"; Amos 3: "For the Lord will not do a thing unless he has revealed his secret to his servants the Prophets."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
