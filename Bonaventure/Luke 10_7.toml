[[commentary]]
quote='''
Fourth, indeed, as regards showing maturity, he adds: But remain in the same house, as mature men, lest perhaps you be noted for instability; whence Ecclesiasticus twenty-one: "The foot of a fool is quick into his neighbor's house." Therefore Bede says: "It is foreign to a preacher to run about through houses and to change his lodging." And because they might believe that lodging should be changed on account of food, therefore he adds: Eating and drinking such things as are with them, without discrimination of foods, as First Corinthians ten: "Whatever is set before you, eat, asking no question for conscience's sake"; also without rejection of foods, according to that passage of First Timothy four: "Every creature of God is good, and nothing is to be rejected which is received with thanksgiving; for it is sanctified by the word of God and prayer"; also without demanding of foods, according to that passage of Ecclesiasticus thirty-one: "You have sat down among many; do not stretch out your hand before them, nor be the first to ask for drink."

And because they might believe that it was not permitted to be fed from another's substance, therefore he adds: For the laborer is worthy of his hire, not only in the homeland for remuneration, but also on the way for sustenance. Whence First Corinthians nine: "The Lord ordained that those who preach the Gospel should live of the Gospel"; and Galatians six: "Let him who is instructed in the word communicate to him who instructs him in all good things"; whence First Corinthians nine says: "If we have sown unto you spiritual things, is it a great matter if we reap your carnal things?" And the Apostle proves there that such a laborer is worthy, both by authorities and by many reasons, as is evident there. Since therefore he is worthy of refreshment, on account of that it is not necessary to change one's lodging.

Therefore at the end he adds: Do not pass from house to house; lest you appear wandering, lest you be like that wandering woman of whom it is said in Proverbs seven, that "she is loud, wandering, impatient of quiet, not able to stand still in her house with her feet." Such are heretics; whence Second Timothy three: "Of these are they who creep into houses and lead captive silly women laden with sins." Preachers of truth ought not be such; whence Ambrose: "One must not move from house to house with wandering fickleness, so that constancy may be preserved in hospitable love, lest the close bond of friendship that has grown together be easily dissolved."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'

[[commentary]]
quote='''
On that passage in Luke 10: The laborer is worthy of his hire: the Gloss says: "Two rewards are owed to the preacher: one on the way, which sustains him in labor; the other in the homeland, which recompenses him in the resurrection"; but what is owed to someone, he is not bound to acquire by bodily labor: therefore a poor preacher is not bound to work manually for the sustenance of the body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
