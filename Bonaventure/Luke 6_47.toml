[[commentary]]
quote='''
Everyone who comes to me, etc. After he instructed in the prudence of discerning, here he invites to diligence in acting, and this under a twofold metaphor, in the first of which he commends the obedient: and in the second he reproaches the negligent. Concerning the commendation of the obedient person, he first sets forth the act of the obedient person: second, the manner: third, the fruit. As to the act, therefore, of the truly obedient person, he says: Everyone who comes to me, namely by believing faithfully, and hears my words, by understanding devoutly, and does them, namely by fulfilling them in deed; I will show you whom he is like. From this it is gathered that it belongs to the truly obedient person first to come through faith, by believing faithfully: concerning which coming, John six: "No one comes to me unless the Father who sent me draws him." Thus the little ones come, according to that passage in Matthew nineteen: "Let the little children come to me." Then to hear, by understanding keenly: Ecclesiasticus three: "A good ear will hear wisdom with all desire"; James one: "Let every man be swift to hear," etc. Third, it belongs to the truly obedient person to fulfill effectively; whence Deuteronomy thirty: "The word is very near to you, in your mouth and in your heart, that you may do it." Otherwise you will not be justified before the Lord, because, as is said in Romans two, "the doers of the law shall be justified."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
