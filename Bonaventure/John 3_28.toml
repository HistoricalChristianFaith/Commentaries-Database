[[commentary]]
quote='''
"You yourselves bear me witness that I said: I am not the Christ": in chapter 1: "And he confessed, that I am not the Christ." "But that I am sent before him," as a voice before the Word; in chapter 1: "I am the voice of one crying in the wilderness: Make straight" etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
