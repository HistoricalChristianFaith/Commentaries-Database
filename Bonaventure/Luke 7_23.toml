[[commentary]]
quote='''
Finally, however, he responds to every one who contradicts, suppressing rash judgments, which cast men headlong into various scandals. On account of which he adds: And blessed is he who shall not be scandalized in me, that is, who shall not have judged me to be a mere man and not God, in consideration of the weakness assumed: which indeed was very difficult, nay impossible, for one who did not believe: whence First Corinthians 1: "We preach Christ crucified, to the Jews indeed a scandal, but to the Gentiles foolishness." But some were scandalized on account of weakness, as were the disciples: Matthew 26: "You will all suffer scandal in me this night"; but some from malice, as the scribes and Pharisees, according to that of Matthew 15: "Do you know that the Pharisees, when they heard this word, were scandalized?" Whence this is a general instruction for all who wish to know Christ, that on account of the infirmities which he suffered, they should not fall into scandal, according to that of Isaiah 8: "Sanctify the Lord of hosts himself, and he shall be to you for sanctification; but for a stone of stumbling and for a rock of scandal to the two houses of Israel, and for a ruin to the inhabitants of Jerusalem." And therefore he rightly calls such a one blessed, because he avoids the danger of error and arrives at the light of truth, as Peter, to whom it is said in Matthew 16: "Blessed are you, Simon Bar-Jona, for flesh and blood has not revealed it to you," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
