[[commentary]]
quote='''
"But I said to you: That you have both seen me and do not believe." Here the second point is noted, who namely are refreshed by this bread: because not the unbelieving, but the faithful elected and called by God. Therefore he says: Thus I said that "he who comes to me shall not hunger": but you, because you do not believe, cannot be refreshed. Above in the third chapter he said: "We speak what we know, and we testify to what we have seen, and you do not accept our testimony"; likewise above in the fifth chapter: "How can you believe, who receive glory from one another, and do not seek the glory that is from God alone?" Likewise above in the same chapter: "You seek me, not because you saw signs, but because you ate of my loaves." And because you do not believe, you cannot be refreshed. Whence Bede says: "Do you desire bread from heaven? You have it before you and do not eat," because you do not believe: but those eat who have been elected by God and, being called, believe.

There is a question about what he says: "You have seen me and you do not believe." It seems that he says nothing meaningful, because faith is the substance of things that are not seen; therefore he cannot reproach them for not believing, since they see. It must be said that he understands this of a vision not of pure or weak humanity, but of a vision of power and might in their effect. And since they saw divine power in its effect, therefore they ought to have believed. As to the objection that vision is incompatible with faith: it must be said that this is true of the vision of the essence, but it is not true of a vision that is in an effect as in a mirror, because it belongs to faith to see through a mirror and in an enigma.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
