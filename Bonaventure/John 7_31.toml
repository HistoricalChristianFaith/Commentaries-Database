[[commentary]]
quote='''
"But many of the crowd believed in him." Here the building up of faith in the little ones is noted, whence he says: "But many of the crowd believed in him," not from the leaders and the greater ones; Matthew 11: "You have hidden these things from the wise and prudent and revealed them to little ones"; First Corinthians 1: "See your calling, brethren, that not many wise," etc. And a true confession is added: "And they said: When the Christ comes, will he do more signs than those which this man does?" Whence, because the signs appeared to them very great and many, they believed and confessed that no other was to be expected: below in chapter fifteen: "If I had not done among them the works which no one else did, they would not have sin."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
