[[commentary]]
quote='''
First, therefore, as to the dignity of the one burying, he says: And behold, a man. He points him out as worthy and suitable for burying Christ; on account of which he describes him by name, when he says: Named Joseph; so that, just as Joseph had nourished Christ, as is said in Matthew first: "Joseph, son of David, do not be afraid to take Mary, your wife," etc.; and again in the second chapter: "Take the child and his Mother"; so another Joseph would bury him and place him like a grain of wheat in his granary, just as that Joseph who stored up grain for the peoples in Egypt, Genesis forty-first.

He also describes him by dignity, saying: Who was a decurion: the Gloss: "A decurion is one who is of the order of the curia and administers the office of the curia." Or a decurion is so called because he presided over ten, just as a centurion was over a hundred, according to that passage in Exodus eighteenth: "Jethro said to Moses: Choose for yourself men in whom there is truth and who hate avarice, and appoint from them tribunes and centurions and commanders of fifty and commanders of ten, who shall judge the people." — And he is also described by his life, when he adds: A good and just man: good interiorly, and just exteriorly, according to that passage in Matthew twelfth: "A good man brings forth good things from the good treasure of his heart."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'

[[commentary]]
quote='''
In the moral sense, however, by this Joseph is understood the prelate, who snatches Christ from the hand of Pilate, that is, from the hand of tyrants; who ought to be a man not only in sex, but in maturity and manliness, because in Ecclesiasticus seven it is said: "Do not seek to be made a judge, unless you have the strength to break through iniquities." He ought to be a Joseph, namely one seeking his own and others' advancement, according to that passage of Genesis forty-nine: "Joseph is a fruitful son, a fruitful son." He ought to be a noble councillor, that is, one nobly handling the affairs of Christ's court, according to that passage of First Corinthians four: "Let a man so account of us as ministers of Christ and stewards of the mysteries of God"; whence in Second Timothy two the Apostle said to the prelate: "Labor as a good soldier of Christ." And such a one is noble, according to that passage of Proverbs, the last chapter: "Her husband is noble in the gates, when he sits among the senators of the land." He ought to be a good and just man, like Job; Job one: "That man was simple and upright," etc. He ought to be one dissenting from evil counsel, according to that passage of Ecclesiasticus thirty-seven: "Guard your soul from an evil counselor"; because, in Romans one, "not only those who do such things are worthy of death, but also those who consent to those who do them." He ought to be from Arimathea, which is interpreted as "watchfulness of giving," so that he may watch over the flock entrusted to him; Proverbs twenty-seven: "Diligently know the face of your flock," etc.; and therefore above in chapter two it is said that "the shepherds were keeping watch and guarding the watches of the night," etc. He ought to be one awaiting the kingdom of God, according to that passage of James five: "Behold, the farmer awaits the precious fruit of the earth, bearing patiently, until he receives the early and the late rain." — Such a prelate, therefore, in whom there is manliness, diligence, nobility of character, justice, innocence, watchfulness, and confidence, is fit to receive Christ crucified in his members and to place him in a place of rest and ecclesiastical unity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
