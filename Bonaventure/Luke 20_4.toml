[[commentary]]
quote='''
Therefore he carefully inquires and asks, so that whatever they answer, they may be refuted, when he adds: Answer me: The baptism of John, whence was it? From heaven, or from men? To this they could not respond except in three ways: either simply by being silent, and thus they would be confounded; or by saying that it was from men, and thus they would be stoned by the people; or by saying that it was from God, and thus Christ would have his point established, because John bore witness concerning Christ at his baptism, according to that passage in John 5: "You sent to John, and he bore witness to the truth." For it is said in John 1: "John bore witness, saying: Because I saw the Holy Spirit descending from heaven like a dove and remaining upon him"; "and I saw and bore witness that this is the Son of God." Whence the Gloss: "He whom you confess to have had prophecy from heaven bore witness to me, and from him you heard by what power I do these things." Since therefore, as is said in John 1, "he was not the light, but was to bear witness concerning the light," those who doubt the light are referred to the consideration of the lamp: for, as is said in John 5, "he was a burning and shining lamp"; and those who doubt the Word are referred to the voice; John 1: "I am the voice of one crying in the wilderness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
