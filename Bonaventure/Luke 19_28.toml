[[commentary]]
quote='''
And having said these things, he went ahead ascending to Jerusalem. Second, as regards intimating the person of the rebels, he adds: And having said these things, he went ahead ascending to Jerusalem, as if by this very deed he shows that he spoke the foregoing things on account of the Jerusalemites, who were going to deny that he was their king. For which reason also there immediately follows an account of how he came as king into Jerusalem, sitting upon a donkey. But after that great glory he had to endure insult. And because he went to it not under compulsion but willingly, therefore it is pointedly said that he went ahead, so as to encourage the others to the endurance of sufferings, according to that passage of 1 Peter 2: "Christ suffered for us, leaving you an example, that you might follow his footsteps"; and Hebrews 12: "Let us run to the contest set before us, looking to the author and perfecter of faith, Jesus," etc. He also went ahead for this reason, to give prelates the model of going before the sheep against the ferocity of wolves; John 10: "The good shepherd, when he has sent forth his own sheep, goes before them, and the sheep follow him, because they know his voice." As a figure of this, it is said of Judas in 1 Maccabees 5 that "when he saw the people trembling to cross the torrent, he crossed first." A noble imitator of this was Paul, who, although he knew that he would have to suffer many things from the Jews in Jerusalem, securely ascended for the salvation of his subjects; Acts 20: "The Holy Spirit through every city testifies to me that chains and tribulations await me in Jerusalem. But I do not count my life more precious than myself, provided I may finish my course and the ministry of the word which I have received." So also Christ was doing: whence, although for a time he had avoided Judea because his hour had not yet come, now he went to deliver his soul for us into the hands of enemies, according to that passage of Jeremiah 12: "I have given the beloved of my soul into the hands of her enemies." Therefore he was ascending to Jerusalem, "because," as was said above in chapter 13, "it does not befit a prophet to perish outside Jerusalem."

But why this? The reason was given above, because the excellence of pontifical, magisterial, and royal dignity demands this. Whence the Gloss: "Having finished the parable, he goes to Jerusalem, to show that the parable had been set forth especially concerning the fate of that same city."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
