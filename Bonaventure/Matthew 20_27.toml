[[commentary]]
quote='''
Whoever would be first among you shall be your servant: but to make oneself a servant of others is to abase oneself with the greatest abasement: therefore self-emptying and self-abasement belong to evangelical perfection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25201.html'
source_title='Disputed Questions on Evangelical Perfection, Question 1'
