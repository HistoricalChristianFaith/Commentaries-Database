[[commentary]]
quote='''
"And at dawn he came again to the temple." Diligence is noted in this, that he came at dawn; Wisdom six: "She anticipates those who desire her, so that she may show herself to them first," and Proverbs eight: "Those who watch for me in the morning shall find me." It was also public: whence he says: "And all the people came to him": Luke twenty-one: "All the people came early in the morning," that is, went in the morning, "to him in the temple to hear him." It was also authoritative: therefore he says: "And sitting down he taught them": sitting, because it belongs to the master to sit: Matthew twenty-three: "Upon the chair of Moses the scribes and Pharisees have sat"; they sat, namely to teach, and so also did he.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
