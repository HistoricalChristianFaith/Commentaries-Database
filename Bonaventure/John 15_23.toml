[[commentary]]
quote='''
Whoever hates me hates my Father also; raised up by their own pride, according to that of the Psalm: "The pride of those who hate you ascends continually." Because therefore they refused to hear out of malice, they were inexcusable; Matthew twelve: "The Queen of the South will rise up in judgment with this generation and will condemn it, because she came from the ends of the earth to hear the wisdom of Solomon"; Romans two: "You are inexcusable, O every man who judges: for in that you judge another, you condemn yourself."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
