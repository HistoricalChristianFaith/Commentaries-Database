[[commentary]]
quote='''
Second, with respect to the demonstration of defense, he adds: I have prayed for you, that your faith may not fail. Here the Lord prayed, not that Peter would not fall, but that he would not fail, because, although he fell, he rose again, according to that passage below in the same chapter: "The Lord turned and looked at Peter," etc. Or this can be referred to the Church of Peter, for whose faith the Lord prayed, according to that passage in John seventeen: "I do not pray for them only, but also for those who will believe in me through their word." And this Church, which is signified by Peter's little boat, although it is shaken, nevertheless is not shipwrecked. For God established this in that Church for the confirmation of the others.

Therefore he adds: And you, once converted, confirm your brothers: because, as it is said in Romans fifteen, "we who are stronger ought to bear the weaknesses of the weak," etc.; and this is ordained, according to that passage in Proverbs eighteen: "A brother who is helped by a brother is like a fortified city." From this it is clear that Christ himself, by praying and interceding, confirms the principal members of the Church. On account of which, First Corinthians fifteen: "But thanks be to God, who has given us the victory through Jesus Christ our Lord"; and First Peter, last chapter: "But the God of all grace, who has called us to his eternal glory in Christ Jesus, after you have suffered a little while, will himself perfect, confirm, and establish you." But through the principal members he confirms the weak, according to that passage in Romans one: "I long to see you, that I may impart to you some spiritual grace to strengthen you, that is, to be mutually consoled among you," etc. Hence it is also said to holy Job: "Your words have strengthened those who were faltering," Job four.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'

[[commentary]]
quote='''
The entire firmness of the Church itself principally flows from the solidity of the one Rock and of the one Peter, who is the Vicar of the Rock; as a sign of which thing it was said to Peter: And upon this rock I will build my Church; it was also said to him: I have prayed for thee, Peter, that thy faith fail not: nor was this prayer in vain. Whence Jerome, and it is found in Causa twenty-four, question one: "The Holy Roman Church, which has always remained immaculate, by the Lord's providence and by the blessed Apostle Peter bearing aid, shall in the future remain without any assault of heretics, and shall persist firm and immovable for all time." Therefore this unity of the Supreme Pontiff contributes to the solidity of the Church itself as to permanence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'
