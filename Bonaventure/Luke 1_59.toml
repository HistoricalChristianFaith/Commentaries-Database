[[commentary]]
quote='''
And it came to pass on the eighth day. After the birth from the aged one follows the circumcision of the infant, in which according to custom was made the imposition of the name, first according to the human designation from blood-relationship; second, according to the prophetic revelation from the mother; third, according to the authoritative affirmation from the father himself. — The circumcision is therefore introduced with the human designation, when it is said: On the eighth day they came to circumcise the child, namely so that they might fulfill the precept of the Law; Genesis 17: "An infant of eight days shall be circumcised among you," because "the male whose flesh of the foreskin shall not have been circumcised shall perish from his people." — And they called him by the name of his father, Zechariah, according to the customary manner, because sons were accustomed to be called by the name of their fathers; Tobit 1: "Tobias begot a son, bestowing his own name upon him," so that by this he might signify that the father lives on in so noble a son, according to that passage of Sirach 30: "His father died and it is as though he did not die, for he left behind one like himself. In his life he saw and rejoiced in him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
