[[commentary]]
quote='''
This saying therefore went out among the brethren. Here fourthly the understanding of the believers is corrected, that John would simply not die: whence he says: That that disciple does not die, against that verse of the Psalm: "Who is the man that shall live and not see death." And Jesus did not say. Here the correction of that saying is set forth, because Jesus did not say this, namely that he does not die; he did not say: He does not die, because, as is said in Ecclesiastes 9, "there is no one who lives forever": but: Thus I wish him to remain until I come: what is it to you? This is to be read and expounded in a qualified sense, as above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
