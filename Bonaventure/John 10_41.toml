[[commentary]]
quote='''
"And many came to him." Here the multiplication of the faithful resulting from his withdrawal is noted: on account of which he says: "And many came to him," namely through faith; Isaiah chapter sixty: "Your sons shall come from afar"; "and they said: John indeed performed no sign": by which he might show himself to be the Christ; but he only bore witness concerning Christ.

It is asked about what they say: "John indeed performed no sign":

Because it is said in Luke one: "He shall go before him in the spirit and power of Elijah": therefore if the power of Elijah was in working miracles, it seems that the Lord ought to have given him the power of miracles.

Likewise, if there was none greater than John, and the Lord gave the power of miracles to the disciples who bore witness concerning him; why not similarly also to John?

It must be said that John was considered by many to be the Christ, as is clear from the first chapter; therefore, for men who judge by the senses, there had to be a sensible difference between John and Christ so that they could discern between them; but it ought not to have been in holiness of life, because it is necessary that a faithful witness be regarded as holy: therefore it was necessary that it be in the power of miracles.

To the objection concerning "spirit and power," it must be said that the word of Elijah was fiery; so too was the word of John, as the Lord Himself said above in the fifth chapter: "He was a burning and shining lamp."

To the objection concerning the disciples, it must be said that concerning none of the disciples was there any suspicion that he was the Christ; and because it was evident to all that they had followed Christ, everything that was in them — of holiness, of power, and of knowledge — they attributed to the Master. But John had not followed the Lord nor been His disciple.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
