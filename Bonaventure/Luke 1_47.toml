[[commentary]]
quote='''
There is also intimated the affection of the one praising not only as grateful, but as joyful, by exulting in the divine salvation, when it is added: And my spirit has exulted in God my savior, that is, in God the savior, so that she could say that word of the Psalm: "My soul shall exult in the Lord and shall delight in his salvation"; and again: "My heart and my flesh have exulted in the living God." Truly she could now say that word of Song of Songs 1: "The king has brought me into his storerooms: we shall exult and rejoice in you," etc. Now there was verified in Mary what the Psalmist desired: "Let all who seek you exult and rejoice in you, and let those who love your salvation always say: Let the Lord be magnified." Since therefore the Virgin Mary sought the Lord and loved his salvation, therefore her soul magnified the Lord, and her spirit exulted in the salvation of God. Therefore that word of Anna is fitting for her, 1 Kings 2: "My heart has exulted in the Lord, and my horn is exalted in my God, because I have rejoiced in your salvation."

And note that spirit is taken for the substance of the soul: Ecclesiastes 3: "Who knows if the spirit," etc.; for the higher part: Malachi 2: "Guard your spirit"; and Romans 8: "The Spirit intercedes for us with unutterable groanings"; for the imagination: First Corinthians 14: "For if I pray in a tongue, my spirit prays," etc. Here, however, it is taken for the soul according to its highest part, and soul is taken in relation to the body, as in First Thessalonians 5: "That your spirit and soul and body may be preserved whole and without complaint at the coming of our Lord Jesus Christ." For because the spirit had inwardly exulted, therefore the soul magnified with her voice — and therefore she places the exultation in the past tense and the magnification in the present tense, because exultation is prior by nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
