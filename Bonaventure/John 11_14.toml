[[commentary]]
quote='''
Then Jesus said to them. Here the third point is touched upon, namely the benefit to the disciples: therefore he repeats the death of Lazarus openly, because they did not grasp it when spoken obscurely. Therefore then Jesus said to them plainly: Lazarus is dead: therefore plainly, because, as is said in Matthew 13, "to you it is given to know the mysteries of the kingdom of heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
