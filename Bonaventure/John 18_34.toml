[[commentary]]
quote='''
"Jesus answered," etc. The second point is touched upon, namely the origin of the inquiry; and so that the origin might be known, the Lord asks Pilate: "Do you say this of yourself, or have others told you about me?" He does not ask because he is in doubt, but so that through his response he might expose the malice of the Jews; and this indeed happens in Pilate's response.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
