[[commentary]]
quote='''
"And he who reaps receives a reward," not temporal, but eternal. Whence he says: "And gathers fruit unto eternal life," "where neither rust nor moth destroys, nor do thieves dig through nor steal," Matthew 6. Of this reward it is said in Luke 6: "Rejoice and exult, for behold, your reward is great in heaven." And this reward is common both to reapers and to sowers. Therefore he says: "That both he who sows," etc. I say rightly that he who reaps gathers fruit not for the sower only, but also for himself; "that both he who sows may rejoice together, and he who reaps;" the Psalm: "Going, they went and wept, casting their seeds; but coming, they shall come with exultation." And he gives the reason why both reapers and sowers ought to rejoice: because according to the proverb, the ones and the others are different.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
