[[commentary]]
quote='''
If we let him go on like this, all will believe in him, and from this follows an absurdity, and the Romans will come and take away our place and nation. They said this because the Romans then ruled over them, and if they found for themselves a new emperor or king, they feared incurring their indignation; therefore they preferred to act against God rather than against man. Wherefore Proverbs twenty-nine: "He who fears man will quickly fall." The reason for this was that they loved temporal things more than eternal; whence Augustine says: "They were unwilling to lose temporal things and did not think of eternal life, and so they lost both." And what they feared befell them; whence Chrysostom says that in them was fulfilled that word of the Psalm: "The nations have sunk in the destruction which they made"; Proverbs ten: "What the wicked fears will come upon him; the desire of the just shall be granted."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
