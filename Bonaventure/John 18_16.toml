[[commentary]]
quote='''
"But Peter stood at the door outside," either because he did not dare to enter, or because he was not permitted. Therefore that was true which was said to him above in the thirteenth chapter: "Where I go, you cannot follow me now." "Therefore that other disciple went out, who was known to the high priest," and by reason of his familiarity "spoke to the doorkeeper and brought Peter in." And thus it is manifest that he who entered through another loved but feebly; in which it is signified that disciples ought to help one another; therefore Galatians, last chapter: "Bear one another's burdens, and so you shall fulfill the law of Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
