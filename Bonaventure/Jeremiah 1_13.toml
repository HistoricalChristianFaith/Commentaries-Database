[[commentary]]
quote='''
In the mystery of prophetical revelation, Christ is symbolized especially by means of sight: the prophet saw "a boiling cauldron" and other things also.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'
