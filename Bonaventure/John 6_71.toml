[[commentary]]
quote='''
"Now he was speaking of Judas, son of Simon Iscariot; for he was about to betray him, though he was one of the twelve." This was said so that they might fear and so that they might not be surprised at the others who had departed, because they had not been so specially chosen. Concerning this election of the twelve, it is said in Matthew 10: "And having called the twelve together, he gave them power"; Luke 6: "He chose twelve from among them." This election was prefigured in Joshua 4: "Choose for yourself twelve men, one from each."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
