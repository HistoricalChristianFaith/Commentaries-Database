[[commentary]]
quote='''
The man answered and said to them: In this indeed is a marvelous thing, that you know not whence he is, and he opened my eyes. He did not say impious, lest he provoke them, but marvelous, because he himself marveled at their hardness; and he gives the reason, because they see a most evident sign and do not believe. Therefore that saying of Isaiah six is verified: "That seeing they may not see, and hearing they may not understand."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
