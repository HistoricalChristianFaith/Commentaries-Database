[[commentary]]
quote='''
When the master of the feast tasted the water made wine, that is, wine made from water, and did not know where it was from, but the servants knew, who had drawn the water, the master of the feast calls the bridegroom, namely so that he might rebuke him and commend and extol the wine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
