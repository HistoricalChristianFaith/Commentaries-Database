[[commentary]]
quote='''
Third, as regards the generosity of the adjudged paternal benefit, he adds: And he called one of the servants and asked what these things were. This one servant called is the order of preachers and teachers, concerning which servant, above in chapter fourteen: "He sent his servant at the hour of supper to tell those who were invited"; where the Gloss says: "The servant is the order of preachers"; from this servant are to be sought the ecclesiastical Sacraments and the mysteries of the Scriptures, because, Malachi two, "the lips of the priest keep knowledge, and they seek the law from his mouth, because he is the angel of the Lord of hosts."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
