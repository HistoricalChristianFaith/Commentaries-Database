[[commentary]]
quote='''
Pilate went out again. Here is set forth the showing of Christ scourged and mocked, so that they might be moved to pity. And first indeed his innocence is reiterated: whence: He says: Behold, I bring him out to you. He adds the reason: That you may know that I find no cause in him, namely "of death" or of punishment: and yet I have punished him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
