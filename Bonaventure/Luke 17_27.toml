[[commentary]]
quote='''
Second, as to the cause of the flood, he adds: They were eating and drinking, marrying wives and being given in marriage, until the day when Noah entered the ark, that is, they were entirely devoted to the works of the flesh, and therefore were worthy to be corrupted and destroyed in their corruptible flesh. Hence the Gloss of Ambrose: "Neither marriages nor food are condemned, since in the former the supports of succession, and in the latter those of nature, are established; but the immoderate use of lawful things is reproved. For because by giving themselves entirely to these things they despised the judgments of God, they perished by fire or water." Hence in these acts their carnality is intimated, on account of which they were worthy of divine wrath; Genesis 6: "And when God saw that the earth was corrupt—for all flesh had corrupted its way upon the earth—he said to Noah: The end of all flesh has come before me; the earth is filled with iniquity, and I will destroy them with the earth." But their principal fault came from carnality, and he intimates this in the four acts which he touches upon: they were eating, that is, they were given over to feasting as gluttons, and therefore worthy of wrath; the Psalm: "While their food was yet in their mouths, the wrath of God ascended upon them." They were drinking, as drunkards, and therefore worthy of wrath, according to that passage of Proverbs 23: "Who has woe? Whose father has woe?" "Is it not those who linger over wine?" etc. Isaiah 5: "Woe to you who are mighty at drinking wine and valiant men at mixing drunkenness"; and Isaiah 22: "Behold, joy and gladness, eating flesh and drinking wine"; "and this voice was revealed in my ears: Surely this iniquity shall not be forgiven you until you die, says the Lord of hosts." They were marrying wives, as the lustful; Genesis 6: "And when men began to multiply upon the earth and had begotten children, the sons of God, seeing that the daughters of men were beautiful, took for themselves wives from all whom they had chosen." And there follows: "The Lord said: My spirit shall not remain in man, because he is flesh." And they were given in marriage, as the heedless, and therefore disposed to destruction, according to that passage of 1 Thessalonians 5: "When they shall say: Peace and security, then sudden destruction shall come upon them." Hence whoever is absorbed in these vices, it is necessary that he be engulfed by the flood; on account of which, 1 Thessalonians 5: "You, brothers, are not in darkness, that that day should overtake you as a thief." "Therefore let us not sleep as the rest do, but let us watch and be sober." But the manner is described in Romans 13: "The night has passed, and the day has drawn near. Let us therefore cast off" etc.; and after: "Not in reveling and drunkenness, not in debauchery and wantonness." "But put on the Lord Jesus Christ."

Third, as regards the punishment of the flood, he adds: And the flood came and destroyed them all, namely those who were outside the ark, immediately after the entry of Noah, according to that passage in Genesis 7: "On that very day Noah entered the ark." "And the flood continued for forty days and forty nights," "and all flesh that moved upon the earth was consumed." Whence also in 2 Peter 2: "He did not spare the original world, but preserved Noah, the eighth person, a herald of justice, bringing the flood upon the world of the ungodly." From this it is understood that the punishment of the future judgment will come upon those who are outside the Church of Christ, while nevertheless the few just are saved; for the Gloss says: "Noah builds the ark when the Lord gathers the faithful in the Church; which, once completed, he enters when he illuminates it by his presence on the day of judgment; but while the ark is being built, the wicked live in luxury, and when it is entered, they are punished with eternal damnation." Moreover, this is said to happen at the turning point of the day, because at the beginning of the eighth resurrection; whence the Psalm: "In the morning I shall stand before you and shall see, for you are not a God who wills iniquity; nor shall the malicious dwell near you, nor shall the unjust endure before your eyes"; and in 2 Peter 2: "The Lord knows how to deliver the godly from trial, but to reserve the wicked for the day of judgment to be tormented."

From this figurative example it appears, both from the allegorical signification and from the expressed similitude, that the day of judgment will come upon carnal and sensual men suddenly and for the universal destruction of those who are outside the unity of the Church; but to those who are in the ark, although it will come suddenly, it does no harm, because it finds them prepared. Whence below in chapter twenty-one: "Take heed to yourselves, lest perhaps your hearts be weighed down with carousing and drunkenness and the cares of this life, and that day come upon you suddenly. For as a snare it shall come upon all who sit upon the face of the whole earth," etc.
'''
