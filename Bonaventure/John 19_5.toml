[[commentary]]
quote='''
Jesus therefore went out. Augustine: "Not illustrious in command, but full of reproach"; whence there follows: Bearing the crown of thorns and the purple garment, in which they had mocked him, according to that passage of Matthew 20: "They shall deliver him to the Gentiles to be mocked and scourged." And he says to them: Behold, the man: behold, the showing forth of one scourged and reviled in this, that he had made himself king. Augustine: "He was crowned with thorns, clothed in a garment of mockery, mocked with bitter reproaches, struck with blows: indignity burns hot, let envy grow cold."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
