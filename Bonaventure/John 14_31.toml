[[commentary]]
quote='''
But that the world may know that I love the Father, therefore I die at his command; hence: As the Father has given me commandment, so I do. Concerning this commandment, above, chapter ten: "This commandment I have received from my Father." God the Father gave him this commandment, not because he himself had merited it, but for our salvation; hence Second Corinthians five: "Him who knew no sin," God the Father "made sin for us, that we might be made the justice of God in him." Moreover, he did this out of love for us: above, chapter three: "God so loved the world that he gave his only-begotten Son." Arise, let us go. Here the third point is touched upon, namely the sign of the hastening of departure, which consists in this, that he urges his disciples to depart from there; on account of which he says: Arise, let us go hence, in which he shows that he suffers voluntarily. A similar thing is said in Matthew twenty-six: "Arise, let us go: behold, he who will betray me draws near."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
