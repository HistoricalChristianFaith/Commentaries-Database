[[commentary]]
quote='''
"You will seek me and will not find me;" you will seek my aid in the devastation wrought by the Romans under Titus and Vespasian.

Or: "You will seek me;" through compunction and sorrow, "and you will not find me," because many fell into despair; yet some who were penitent sought and did not find him bodily, but spiritually: Acts 2: "Having heard these things, they were pricked in their heart."

Or: "You will seek me and will not find me," in judgment: Proverbs 1: "They will rise early and will not find me, because they had held wisdom in hatred."

Or otherwise: "You will seek me," with the will to harm: "and you will not find me," with the power to offend; because it will be said to him after the resurrection: "Sit at my right hand, until I make your enemies the footstool of your feet." And therefore he adds that they will not be able to harm him. "And where I am, you cannot come:" therefore you will not be able to find me, because he was to be in heaven: below in chapter fourteen: "I go to prepare a place for you, and I will come again and take you to myself, that where I am, you also may be."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
