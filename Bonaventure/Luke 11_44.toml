[[commentary]]
quote='''
Thirdly, He repeats this denunciation on account of fraudulence, when He adds: Woe to you!, who are as monuments that do not appear, namely as to what they are within, because they are fetid and unclean within, but outwardly they are beautiful: whence He adds: And men walking over them know it not. Such are hypocrites, who though they are evil within, outwardly appear perfect: whence they are rightly called sepulchres, according to that passage of the Psalm: "Their throat is an open sepulchre, with their tongues" etc. And therefore they are not children of the Bridegroom, nay rather entirely the opposite. For in Song of Songs one: "I am black, but beautiful"; these, however, are white, yet fetid: therefore they are rightly called monuments: whence Matthew twenty-three: "Woe to you, scribes and Pharisees, hypocrites! because you are like whitewashed sepulchres, which outwardly appear beautiful to men, but within are full of the bones of the dead and all uncleanness." Whence Chrysostom: "The bodies of the just are called temples, but the bodies of sinners are called sepulchres, because within is a dead soul: for that soul is not to be considered alive which has done nothing living, that is, nothing spiritual, in the body." And afterwards: "Tell me, hypocrite, if it is good to be good, why do you not wish to be what you wish to appear? Moreover, what is shameful to appear is more shameful to be. Therefore either be what you appear, or appear as what you are."

From these words of the Lord it can be gathered who those are who ought to be judged hypocrites, namely those in whom negligence, arrogance, and fraudulence reign. These moreover are those who prefer the least things to the greatest, the transitory to the eternal, appearances to realities. But to judge concerning these things belongs not to any man whatsoever, but to Christ, who looks upon the heart, according to that passage in First Corinthians four: "Judge not before the time, until the Lord comes, who will illuminate the hidden things of darkness" etc. For the Lord does not reprove goodness that is apparent and evident, but goodness that is sophistical and non-existent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
