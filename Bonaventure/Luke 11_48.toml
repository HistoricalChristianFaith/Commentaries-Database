[[commentary]]
quote='''
On account of which he says: But indeed you testify that you consent to the works of your fathers, that is, you consent that these were the works of your fathers: whence Matthew twenty-three: "You are witnesses against yourselves that you are the sons of those who killed the Prophets." Therefore he adds: For they indeed killed them, but you build their tombs: and thus by sign and word they are witnesses that their fathers killed them. And indeed they pretended to condemn this by word and sign: whence Matthew twenty-three: "You adorn the monuments of the just and say: If we had been in the days of our fathers, we would not have been their partners"; but they approved by similar deed and desire, because they themselves, like their fathers, were persecutors of the good: and from this they were witnesses that they consented to the works of their fathers. Whence Jerome: "You are witnesses against yourselves: for by deed you testify that you are imitators of your fathers, whose crimes you detest by word." Whence Acts seven: "You stiff-necked and uncircumcised in heart and ears, you always resist the Holy Spirit; as your fathers did, so do you also".
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
