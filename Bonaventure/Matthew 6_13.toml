[[commentary]]
quote='''
The removal of a harming evil is asked in the three last petitions: because every evil either has the character of the past, or the future, or the present; or otherwise, it has the character of the evil of fault, or of struggle, or of punishment. The first is asked to be removed in the forgiveness of debts; the second in the victory over temptations; the third and last, in deliverance from the oppression of evils.

And thus there are seven petitions in all, in which is universally asked whatever ought to be asked; and this indeed quite fittingly, so that the sevenfold number of petitions corresponds to the sevenfold number of divine gifts and of the gifts of sevenfold grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
In the sixth petition, the repulsion of hostile fraud is sought through the gift of understanding, when he says: "And lead us not into temptation." In the seventh petition, the subjugation of carnal concupiscence is sought through the gift of wisdom, when he says: "But deliver us from evil. Amen." It is impossible for the soul to tame its flesh unless it is filled with the gift of wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"
