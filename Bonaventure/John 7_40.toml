[[commentary]]
quote='''
Here the dissension of the multitude on account of the teaching of Christ is intimated: wherefore he says: "From that crowd, when they had heard these words of his," some, enlightened on account of hearing the teaching of Christ, "were saying: This is truly the Prophet," because he spoke so wisely.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
