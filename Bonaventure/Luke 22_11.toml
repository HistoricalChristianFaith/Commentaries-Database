[[commentary]]
quote='''
And because this sign was directive, he therefore adds: Follow him into the house into which he enters, and you shall say to the master of the house: The Master says to you: Where is the guest room, where I may eat the Passover with my disciples? as if in a secret and quiet place. He seeks a house from another, which he himself did not have, as is said in Matthew 8: "Foxes have dens and the birds of the sky have nests; but the Son of Man has nowhere to lay his head." He seeks seclusion, however, because "in peace is his place made."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
