[[commentary]]
quote='''
The removal of a harming evil is asked in the three last petitions: because every evil either has the character of the past, or the future, or the present; or otherwise, it has the character of the evil of fault, or of struggle, or of punishment. The first is asked to be removed in the forgiveness of debts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
In the fifth, the remission of sin is sought through the gift of counsel, when he says: "And forgive us our debts, as we also forgive our debtors."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"
