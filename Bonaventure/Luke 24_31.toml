[[commentary]]
quote='''
And therefore he adds: And their eyes were opened, and they recognized him. Now the Lord opened their eyes rather in the breaking of bread than in the exposition of the Scriptures, to show that not "hearers of the law, but doers are just before God," according to that passage in Romans 2: "Not hearers of the law, but doers shall be justified"; whence Gregory says: "Truth is better understood by doing than by hearing." Whence the Psalm says: "From your commandments I have understood," and again the Psalm says: "I have understood above all who teach me, because I have sought your commandments." Or he did this on account of the mystery. Whence Bede says: "He did this so that all might understand that they do not know Christ unless they become partakers of his body, that is, of the Church, whose unity the Apostle commends in the Sacrament of bread, saying: We being many are one bread, one body," 1 Corinthians 10. And as a figure of this, it is said in 1 Kings 14 that Jonathan ate, "and his eyes were enlightened"; because no one arrives at the true contemplation and beholding of Christ unless he sits at his table, according to that passage in Revelation 2: "To him who conquers I will give the hidden manna, and I will give him a white stone, and on the stone a name written, which no one knows except he who receives it." And for this reason it is said of wisdom in Proverbs 9 that "she set forth her table, mixed wine, and sent her servants to call to the citadel and to the walls of the city."

Third, as regards the dispensative concealment, there is added: And he vanished from their eyes. Bede says: "The appearance of weakness is withdrawn from carnal eyes, so that the glory of the resurrection might begin to appear to their minds." For in the withdrawal of his bodily presence he stirs up a desire for spiritual presence, which arises from the enkindling of desire through the remembrance of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
