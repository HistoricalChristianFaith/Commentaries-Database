[[commentary]]
quote='''
"Jesus answered and said to them: I did one work, and you all marvel." This work was the healing of the paralytic; they marveled at what he had done and were indignant that it was on the Sabbath; above in chapter 5: "The Jews persecuted Jesus, because he did this on the Sabbath," as though he were breaking the Law. Therefore the Lord shows that he did not break the Law, through an argument from the greater, and he makes such an argument: if circumcision, which is not from the Law but from the Fathers, does not break the Sabbath, because it is a noble work, therefore, since the healing of the whole man is a nobler work, much less will it break it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
