[[commentary]]
quote='''
Therefore they sought Jesus, namely to destroy him: Psalm: "Let them be confounded and put to shame who seek my soul, to take it away." And they spoke among themselves, standing in the temple. And the manner of seeking is added: What do you think, that he has not come to the feast day? This question was raised in the temple. Whence was fulfilled that word of Jeremiah 7: "This house, in which my name has been invoked, has been made a den of thieves"; whence Matthew 21: "You have made it a den of thieves." But why they sought him thus, the Evangelist indicates: Now the chief priests and Pharisees had given a command that, if anyone should know where he was, he should report it, so that they might seize him. Saul gave a similar perverse command concerning David in 1 Kings 23: "Consider and see all his hiding places, in which he conceals himself. And if he has hidden himself in the earth, I will search him out through all the thousands of Judah."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
