[[commentary]]
quote='''
And therefore Luke adds: But as they were afraid and bowed down their faces to the earth, namely out of fear and reverence, as Daniel, Daniel 10: "When he spoke to me, I cast down my face to the earth and was silent"; and such persons are fit to hear the truth. — Whence he adds: They said to them: Why do you seek the living among the dead? He is not here, but is risen; in which they at once reprove unbelief and affirm the truth. This word was of the highest joy; and thus it was fitting that, just as the Angel had announced with joy the nativity of Christ, above in chapter two: "I announce to you a great joy," so also the Angels should now announce with joy the resurrection. And that word of the Psalm was fulfilled: "I have slept and taken my rest, and I have risen, and I am still with you"; and again: "For you will not abandon my soul in hell." Therefore Acts 2: "This Jesus God raised up, having loosed the sorrows of hell, inasmuch as it was impossible that he should be held by it. For David says concerning him: I foresaw the Lord, etc., down to: You will not give your Holy One to see corruption. You have made known to me the ways of life," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
