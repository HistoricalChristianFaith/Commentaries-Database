[[commentary]]
quote='''
When the devil saw Christ suffering, he believed His argument had little weight. But Christ ridiculed him: "Can you play with him as with a bird? Can you put him in leash for your maidens?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'
