[[commentary]]
quote='''
"And immediately his disciples came and marveled that he was speaking with a woman." They admired his clemency and condescension. Augustine: "They admired the good; they did not suspect evil." And this admiration did not lead to questioning but to reverence and fear. Therefore he says: "Yet no one said to him: What do you seek, or why do you speak with her? What do you seek?" as if to say, what is the necessity of this conversation? "Why do you speak?" that is, what is the usefulness of this conversation? "For a word that lacks the reason of just necessity or pious usefulness, as Gregory says, is idle."

It is asked: since the disciples were wondering, and Peter was accustomed to ask the Lord boldly, why did they not ask the Lord what He was speaking about? If they had asked, they would have seemed already to hold Him suspect; therefore they feared being rebuked for a foolish question and for lack of discipline; and therefore they did not dare to ask.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
