[[commentary]]
quote='''
The instruction has been set forth; here secondly, on account of the disputing of the Jews, a confirmation is set forth. And first the disputation of the Jews is set forth; second, the confirmation of the doctrine, at the passage: "Jesus therefore said to them."

The disputation therefore was about this, that he had called his flesh bread, which they understood carnally. For this reason he says: "The Jews therefore were disputing." First they murmured, but now they dispute, when they contradict with loud and open speech. The Jews were contentious, which the servants of God ought not to be; whence Second Timothy 2: "The servant of God must not dispute, but be gentle toward all." "Saying to one another: How can this man give us his flesh to eat?" As if they were saying: this is impossible, unless he kills himself. Similarly Nicodemus asked above: "How can a man be born when he is old? Can he enter a second time into his mother's womb and be born again?" Hence they asked this foolishly; Chrysostom: "You ask how he can give his flesh? Why did you not say concerning the loaves: how did you extend five loaves to so many?"

An inquiry is made concerning the quarreling of the Jews; about which Chrysostom asks: whence is it that above they were murmuring in secret, but now they quarrel openly? It arises from a twofold cause: both because evil men and seducers and the unruly grow worse the more the truth is explained to them; and also because what had been said above concerning the Divinity, although it seemed false, was nevertheless not inhuman: but what he had now said about eating his flesh seemed not only false but inhuman and unclean, which the Jews abhor: therefore they quarreled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
