[[commentary]]
quote='''
Second, as to the lamentation of the women accompanying him, it is added: There followed him a great multitude of the people and of women, who bewailed and lamented him. The multitude indeed followed out of wonder, but the women out of compassion; whence the Gloss says: "The wicked follow, so that they might joyfully watch him die; the women, so that they might weep for him whom they desired to live—about to die, dying, and dead." Whence also after death it is said of Magdalene in John 20: "Mary stood at the tomb outside, weeping." Now this lamentation was made over Christ by women, not by men, not because women were more fervent or more steadfast in their love of Christ, but because they are by nature more prone to tears and of a more compassionate nature, as is said of Anna in Tobit 10: "Her mother therefore wept with irremediable tears"; and of Hannah, the mother of Samuel, in 1 Kings 1: "Since she was bitter in soul, she prayed to the Lord, weeping abundantly, etc."; and because they could do this more safely. Whence the Gloss says: "The weeping of women alone is not introduced as if men did not also grieve, but because the female sex, being regarded as more contemptible, could more freely display, in the presence of the chief priests, what they felt against them." Whence can be said that of Isaiah 32: "Gird your loins; beat upon your breasts; lament over the desirable land": truly desirable was he above all the kings of the whole earth. And therefore this mourning and this lamentation could be signified by the lamentation made over Josiah, according to that of 2 Chronicles 35: "All Judah and Jerusalem mourned for Josiah. And Jeremiah especially, whose singers, both men and women, repeat lamentations over Josiah." Now lamentations of this kind were both made and foretold for the Savior, and therefore they are read during his passion. At the same time the death of Christ and the ruin of Jerusalem are depicted: whence in the prayer of Jeremiah: "The joy of our heart has ceased; our dancing has been turned into mourning. The crown has fallen from our head: woe to us, for we have sinned! Therefore our heart has become sorrowful; therefore our eyes have been darkened."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
