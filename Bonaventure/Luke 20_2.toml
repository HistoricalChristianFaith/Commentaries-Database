[[commentary]]
quote='''
For which reason it is added: And they say, speaking to him: Tell us: By what authority do you do these things? Or who is it that gave you this authority? They ask this as though it were doubtful, when nevertheless it had been made manifest through the most evident miracles, according to that passage in John 5: "The works which I do bear witness concerning me"; but they wished by their questioning to lead all the people into doubt, as though those miracles were not from God, but rather from the devil. Hence the Gloss: "They doubt whether it is God's power and wish it to be understood that what he does is from the devil." This doubt came to them from the corruption of their own conscience; hence Chrysostom: "Every man judges another according to himself, and the fornicator thinks no one is chaste, the chaste man does not easily suspect a fornicator, the proud man thinks no one is humble: so the priest who is not from God thinks no one's priesthood is from God." Hence also the blind man who was given sight reproved the blindness of the Pharisees, who said that they did not know where Christ was from, according to that passage in John 9: "In this is the marvel, that you do not know where he is from." "But we know that God does not hear sinners, but if anyone does God's will," etc. Therefore it is said in Sirach 10: "The power of man is in the hand of God"; and in Romans 13: "There is no power except from God," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
