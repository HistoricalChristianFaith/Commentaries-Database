[[commentary]]
quote='''
"He is the true light, which illumines every man coming into this world." No one is illumined with certitude except through him. And Augustine in the fourteenth book of On the Trinity asks whence it comes that the impious sometimes judges well; whence he asks: "Where are those laws of justice written, according to which the impious judges well?" And he responds that "they are written in the book of eternal light, and they descend into the soul not by migrating but by impressing themselves, just as the image of a ring, which is impressed upon wax, does not leave the ring." The Gloss says that the intellect by nature has the power of understanding, according to which man is distinguished from beasts; but God alone illumines perfectly. "For he alone holds the chair in heaven who teaches man on earth." He alone holds the power to illumine every man: for he illumines every man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25208.html'
source_title="Collationes de Septem Donis, Collation 8"

[[commentary]]
quote='''
Having determined the coming of the precursor, the coming of the King is determined, and it is determined with its properties and circumstances. He therefore describes this coming of Christ in the following order. First is noted the reason for coming; second, the rejection of the one coming; third, the usefulness or fruit of the coming itself; fourth, the manner of coming.

The reason therefore for coming in the flesh is first touched upon, which was this: because God himself before the Incarnation, although he was the highest light present to all, was not known by the world; therefore he was made visible, so that he might be known. For this reason he says: "There was the true light," namely by essence; "which enlightens every man coming into this world"; below in chapter eight: "I am the light of the world; he who follows me does not walk in darkness." This light was present to the world: whence he was in the world by presence; Wisdom 7: "It reaches everywhere because of its purity."

But it is asked concerning what he says: "He was the true light, which enlightens every man coming into this world"; because it was said above that some men are darkness: therefore he does not enlighten all. If you say: as far as it is in itself: then if no one can resist his will, it is necessary that all be enlightened. To this Augustine responds thus: "He enlightens every one, namely every one who is enlightened, because no one is enlightened except through him." The example of a teacher teaching boys. Bede responds that this is understood of the light of nature, not of grace; and everyone has the light of God's countenance sealed upon him. Chrysostom however explains it thus: because he is prepared to enlighten; but not all are enlightened, because they close the way of light to themselves. The example of a blind man standing in the sun. As to the objection that if he wills, he does it: it must be said that absolutely he does not will to enlighten except those who are willing; but by a conditional will he wills all to be enlightened, just as he wills all men to be saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'

[[commentary]]
quote='''
Now the intellect is said to truly comprehend the meaning of propositions when it knows with certitude that they are true; and this knowing is knowing that it cannot be deceived in that comprehension. For it knows that that truth cannot be otherwise; it knows therefore that that truth is unchangeable. But since our mind itself is changeable, it cannot see that truth shining so unchangeably except through some light radiating altogether unchangeably, which it is impossible to be a changeable creature. It knows therefore in that light which illumines every man coming into this world, which is the true light and the Word in the beginning with God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25203.html'
source_title='Itinerarium Mentis in Deum, Chapter 3'

[[commentary]]
quote='''
Because not all obey the Gospel, and that truth is above reason; therefore divine wisdom has provided an eternal testimony, which indeed is the book of life. Now this book of life, of itself and in itself, explicitly and expressly gives irrefragable testimony to the eternal Trinity to those who with unveiled face see God in the homeland, but on the way it gives testimony according to the influence of light, of which the soul is capable in the state of the way — for as it is said in John 1: The life was the light of men, because this book of life is the true light, which enlightens every man coming into this world. Now it illuminates in a twofold manner, namely through the implanted light and through the infused light, from the concurrence of which lights the habit of faith is elicited as an argument for believing that God is triune, and consequently every truth that pertains to the worship of the Christian religion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Mysterio%2520Trinitatis%2FQuestion%25201.html'
source_title='Disputed Questions on the Mystery of the Trinity, Question 1'

[[commentary]]
quote='''
To that which is objected from Gregory and Dionysius, it must be said that neither denies that that true light, which *enlightens every man coming into this world,* is attained by our minds, but that in this life it is not yet fully seen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Scientia%2520Christi%2FQuestion%25204.html'
source_title='Disputed Questions on the Knowledge of Christ, Question 4'
