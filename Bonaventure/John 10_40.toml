[[commentary]]
quote='''
"And he went away again beyond the Jordan, to the place where John was baptizing at first," concerning which place it is said above in chapter three: "John was baptizing in Aenon." "And he remained there," namely in quiet; Chrysostom: "He teaches us to flee tumults and to pray in quiet"; "he remained," hidden from the Jews, according to that passage in Deuteronomy chapter thirty-two: "I will hide my face from them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
