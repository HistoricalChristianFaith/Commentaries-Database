[[commentary]]
quote='''
The first mode of mendicancy is from the necessity of nature; and this mode is when someone begs not only because he is poor, but also because he has infirmity, or weakness, or both. This mode, however, is pitiable and tolerable, but through good patience it becomes meritorious and praiseworthy: as is read in Luke chapter sixteen concerning Lazarus, that there was a certain beggar named Lazarus, who lay at the gate of the rich man, full of sores: and afterward it is added that the beggar died and was carried by the Angels into the bosom of Abraham. But of the rich man it is said that he was buried in hell. From which it is gathered that mendicancy, even when arising from necessity, is an occasion leading into the way of eternal salvation: according to what Gregory says, that the evils which press upon us here compel us to go to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
