[[commentary]]
quote='''
On account of which he adds: For which reason neither did I consider myself worthy to come to You. This judgment is one of humility, according to that word of Philippians 2: "In humility esteeming one another as superior to themselves." This judgment was in the Apostle through true humility, who said in 1 Corinthians 15: "I am the least of the Apostles, who am not worthy to be called an Apostle." Ambrose: "Having laid aside military honor, he takes up reverence, ready for faith, prompt for giving honor." And indeed true humility does this, because, according to that word of Ecclesiasticus 3, "great is the power of God alone, and He is honored by the humble alone."

Whence this man not only honored the Lord by confessing his own unworthiness, but also by professing the sublimity of divine power, when he adds: But say the word, and my servant shall be healed, as if to say: "no word is impossible with You," for You are that Word through whom "all things were made," John 1. You are that "word that heals all things," Wisdom 16; who "are full of power," Ecclesiastes 8; who are "living and efficacious," etc., Hebrews 4. Say therefore the word, and my servant shall be healed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
