[[commentary]]
quote='''
Likewise, Jerome, on that passage of Matthew six: Is not the soul more than food? "Let no one doubt the promises of the Truth; let man be what he ought to be, and soon all things shall be added to him, for whose sake all things were made." Therefore he who relinquishes all things for the sake of Christ, trusting in the promise of Christ, acts according to perfect faith in Him; but he does this most perfectly who reserves absolutely nothing for himself, neither in common nor in particular: therefore etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
