[[commentary]]
quote='''
Likewise, knowledge is repelled when a man possesses knowledge and does not wish to live according to that knowledge nor to fulfill it. Whence the Lord says: "Woe to you, Scribes and Lawyers, because you have taken away the key of knowledge: you yourselves have not entered, and those who were entering, you have hindered." If a physician eats the food which he forbids to the sick person, the sick person is scandalized and wishes to eat that food.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25204.html'
source_title="Collationes de Septem Donis, Collation 4"

[[commentary]]
quote='''
Woe to you lawyers, etc. Here he repeats woe a third time on account of fraudulence against the truth of doctrine. And because the wicked and deceivers advance to worse things, therefore first there is set forth the threat of Gehenna; and second there is added the obstinacy of wickedness. First, therefore, as regards the threat of punishment on account of the deficiency of true doctrine, he says: Woe to you lawyers, who have taken away the key of knowledge, namely as regards the office of dispensing doctrine. Now this key belongs principally to Christ as the supreme teacher: "For one is your master, Christ," according to what is said in Matthew twenty-three. And concerning this, Isaiah twenty-two says: "I will place the key of the house of David upon his shoulder, and he shall open," etc. The scribes had taken this key away, pretending that they taught rightly; but nevertheless they did not teach rightly, because they neglected themselves and hindered others.

On account of which he adds: You yourselves did not enter, and those who were entering, you hindered. For they themselves did not enter, because, although they had words, they did not have deeds; whence that passage from Romans 2 could be said to them: "You who teach others do not teach yourself; you who preach that one should not steal, steal." And because they had words alone, they could not enter: Matthew 7: "Not everyone who says to me: Lord, Lord, shall enter the kingdom of heaven," etc.; therefore they did not enter by words alone; and they also hindered others by evil examples; whence that passage from Jeremiah 50 was fulfilled: "My people have become a lost flock; their shepherds led them astray," namely from the right way, either by evil examples or by false doctrines, according to that passage from Lamentations 2: "Your prophets saw false and foolish things for you, nor did they lay open your iniquity to anyone, so as to provoke you to repentance; but they saw for you false assumptions and banishments"; because from false assumptions nearly all distorted consciences are formed, through which men are cast out from the kingdom of God and are prohibited from entering into it. Whence Chrysostom: "The Law and the Prophets openly proclaimed the coming of Christ, but they closed this door of understanding by perverse interpretations"; and therefore they prohibited entering, calling back from the way of truth by example and by word. Against which, Proverbs 3: "Do not prohibit him who can from doing good"; if you can, do good yourself also.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
