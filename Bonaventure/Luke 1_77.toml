[[commentary]]
quote='''
He commends it also secondly from the utility of the doctrine, when he says: To give knowledge of salvation to his people: to give, namely freely: Matthew 10: "Freely you have received, freely give"; and Proverbs 2: "The Lord gives wisdom, and from his mouth come prudence and knowledge." To give, I say, knowledge, not just any, but of salvation: because without knowledge there is no salvation; Isaiah 5: "Therefore my people has been led captive, because it did not have knowledge." This every ruler of the people ought to have; Hosea 4: "Because you have rejected knowledge, I will reject you, so that you shall not serve me as priest"; Isaiah 33: "The riches of salvation, wisdom and knowledge," of salvation, I say, not of just any kind, but spiritual: on account of which he adds: In the remission of their sins. Bede: "Lest you think that temporal salvation was being promised, he adds 'in the remission of their sins.'" For of the Savior it is said in Matthew 1: "He shall save his people from their sins"; and Mark 1: "John was preaching a baptism of repentance for the remission of sins."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
