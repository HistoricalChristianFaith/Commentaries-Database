[[commentary]]
quote='''
Second, with respect to the guiding parable, there is added: And he spoke to them a parable: Behold the fig tree and all the trees: when they now shoot forth fruit from themselves, you know that summer is near. He compares trees to the human race, and especially the fig tree. For man is likened to trees of this kind both with respect to origin and with respect to decline and with respect to fruit. With respect to origin, on account of which it is said in the Psalm: "He shall be like a tree that is planted by the streams of waters," etc. With respect to decline, on account of which Job chapter fourteen says: "A tree has hope: if it be cut down, it grows green again, and its branches sprout forth"; so also man, when he dies, has hope of rising again. With respect to fruit, because just as an unfruitful tree is cut down, so also is man; whence Matthew chapter three: "Every tree that does not bear good fruit shall be cut down," etc.; whence above in chapter thirteen it is said of the unfruitful fig tree: "Cut it down," etc. For just as a tree by the wayside does not bear fruit, so also a man occupied with many things; Matthew chapter twenty-one: "Seeing a fig tree by the wayside, he came to it and found nothing on it but leaves only. And he said to it: Let no fruit ever be born from you." Whence Chrysostom: "Just as it is impossible for a tree by the wayside to preserve its fruits to maturity, so it is difficult for a man living according to the world to maintain unstained youth all the way to the end." Just as trees also bear fruit when winter departs, so man has fruit after tribulation; Song of Songs chapter two: "Now the winter is past, the rain is gone and departed"; "the fig tree has put forth its green figs, the flowering vines have given their fragrance." This fruit comes through the endurance of tribulation, according to that passage in Hebrews chapter twelve: "All discipline in the present is not of joy but of sorrow, yet afterward it yields the most peaceful fruit to those who have been trained by it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
