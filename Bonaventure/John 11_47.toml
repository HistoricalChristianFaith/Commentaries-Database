[[commentary]]
quote='''
The chief priests therefore and the Pharisees gathered a council against Jesus. There is set forth first the conspiracy of the Jews, which arose on the occasion of the manifestation of Christ. The ambition of the rulers was united together with the malice of the Pharisees, so that by force they might form an iniquitous counsel: Sirach twenty-one: "The congregation of sinners is like gathered tow." And they said: What do we do, because this man performs many signs? Chrysostom: "They still call Him a man, who had given so great a demonstration of His Divinity."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
