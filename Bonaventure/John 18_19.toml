[[commentary]]
quote='''
"Now the high priest," etc. Having set forth the denial of Peter, here is subjoined the examination of Christ: in whose examination four things are noted, namely the interrogation by the high priest, the response of Christ, the infliction of injury, and the endurance of patience. The interrogation of the high priest therefore is touched upon when it says: "Now the high priest," namely Annas, "was questioning Jesus about his disciples and his teaching," so that, because he could not bring a charge against him, he might at least catch him in his words: not to learn, but to catch him, Matthew twenty-two.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
