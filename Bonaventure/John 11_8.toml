[[commentary]]
quote='''
The disciples say to him: Rabbi, just now the Jews were seeking to stone you, that is, it is still recent: above in chapter 10: "The Jews took up stones to stone him." And you go there again? As if to say: we should not go. Peter said something similar to the Lord in Matthew 16: "Far be it from you, Lord; this shall not happen to you." He was dissuading Jesus from death and was rebuked, because the Lord had foretold that he would die, and yet he was dissuading him and wanted to draw him back from his purpose. But these disciples did not know at that time that he willed to die; and therefore they are instructed and strengthened, so that they might not fear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
