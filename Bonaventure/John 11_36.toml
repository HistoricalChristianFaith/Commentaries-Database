[[commentary]]
quote='''
The Jews therefore said: Behold, how he loved him, because he wept over his death: and they spoke truly, according to what is said in Wisdom 11: "Lord, you love all things that are, and you hate nothing of what you have made," and afterward: "They are yours, O Lord, who love souls." But from this they fell into doubt: for since one who loves another does not wish him to die, it seemed to them that he had died against his will, and they marveled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
