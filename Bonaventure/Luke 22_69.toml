[[commentary]]
quote='''
Lest, however, he should seem to seek evasion, he answers with the truth, when he adds: But from henceforth the Son of man shall be sitting at the right hand of the power of God: from henceforth, that is, after this passion, according to that passage in Philippians 2: "He humbled himself: wherefore God also exalted him," etc. At the right hand, that is, as equal; Psalm: "The Lord said to my Lord: Sit at my right hand"; and Hebrews 1: "Who, being the brightness of glory and the figure of his substance, and upholding all things by the word of his power, sits at the right hand of the Majesty on high."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
