[[commentary]]
quote='''
Then after the similitude he adds the adaptation and draws the conclusion: But if the grass, which is today in the field and tomorrow is cast into the oven, that is, quickly withers: Psalm: "Let them be as the grass of the housetops, which, before it is plucked up, has withered"; and James 1: "The sun rose with its burning heat and dried up the grass, and its flower fell, and the beauty of its countenance perished"; God so clothes, namely with beautiful ornament and comeliness: "Color itself is called the garment of the flower." How much more you, O you of little faith: that is, how much more will he clothe you, even if you have but little faith, because you surpass them both by reason of nature and by reason of faith. Whence to Peter, doubting concerning omnipotence in the storm, it is said in Matthew 14: "O you of little faith, why did you doubt?" He has little faith concerning the governance of paternal providence who fears dying of hunger daily: Psalm: "They did not believe in God, nor did they hope in his salvation"; and it follows: "And he commanded the clouds from above and opened the doors of heaven and rained down manna upon them to eat," etc. If anyone therefore is of true faith, believing that all things are governed by divine providence; since the providence of God bears and ought to bear greater care for things more precious, more worthy, and more enduring, for rational creatures rather than for irrational or vegetative ones: and for these it exercises such providence that nothing is lacking to them: much less therefore should one doubt concerning those things which pertain to the governance of man, as being more precious, better, and more worthy among the other creatures, because he is rational and made in the image of God. This reasoning is therefore irrefragable, because if anyone should say the contrary of this, he destroys the governance of divine providence and the order of the universe. And therefore such a one is not only of little faith, but also of perverse judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
