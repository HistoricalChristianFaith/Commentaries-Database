[[commentary]]
quote='''
Note that when Christ performed the miracle of changing water into wine, he did not say from the very first: "Let there be wine." Nor did He produce it out of nothing: as Gregory comments, He asked the servants to fill the water jars. It is impossible to explain what He did in a literal sense, but a reason may be given in terms of spiritual understanding: The Holy Spirit does not give spiritual understanding unless man provide the jar, that is, his capacity, and the water, that is, the understanding of the literal sense. Then does God change the water of the literal understanding into the wine of the spiritual. Paul was great because of the fact that he was teaching the Law at the feet of Gamaliel. He, then, who possesses Scripture is powerful in his speech and also in a becoming sermon. Blessed Bernard, for instance, knew little. Yet, because he had studied Scripture intensely, he was able to speak with elegance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252019.html'
source_title='Collations on the Hexaemeron, Collation 19'

[[commentary]]
quote='''
Jesus says to them: Fill the water jars with water. And they filled them up to the brim. And it should be understood that when they were filled, by the Lord's power the water was converted into wine; therefore he commanded them to be filled, so that he might perform a complete work, according to what is said in the creation of things, Genesis 1, "God saw all that he had made, and they were very good"; and Deuteronomy 32: "The works of God are perfect."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
