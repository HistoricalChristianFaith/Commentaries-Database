[[commentary]]
quote='''
She paid this price as a woman strong and devout, namely when Christ suffered on the cross to pay this price, so that he might purify, wash, and redeem us; then the blessed Virgin was present, accepting and consenting to the divine will. And it pleased her that the price of her womb should be offered on the cross for us. Whence in John: "There stood by the cross of Jesus his mother, and his mother's sister, Mary of Cleophas, and Mary Magdalene. When Jesus therefore saw his mother and the disciple standing, whom he loved, he said to his mother: Woman, behold your son," namely, who will be handed over as the price of redemption of the human race: as if he were saying: it is necessary for you to be without me, and for me to be without you; and you yourself, as a holy woman, conceived him, and as a devout woman, you offer him; may it please you, O Virgin, that I redeem the human race and appease God. And lest she be left desolate, he said to the disciple: "Behold, your mother"; he gave a virgin man to the Virgin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'

[[commentary]]
quote='''
Now there stood by the cross etc. Here is noted the paucity of those who shared in his suffering: because out of all his dear ones, three women were present, among whom was also the Mother of the Lord, for whom the Lord also felt compassion. And four things are noted here: the compassion of the women toward the Lord, the Lord's solicitude toward his Mother, and from that solicitude, his commendation, and lastly, the acceptance of the commendation.

Therefore the compassion of the women is noted in this that he says: They stood near the cross of Jesus: they drew near in body because the feeling of compassion drew them. Others indeed had withdrawn far away through lack of compassion; whence it is said in the Psalm: "Those who were near me stood afar off." But these women stood near, who loved more, namely his Mother, who suffered with him above all others: whence Luke chapter two: "A sword shall pierce through your own soul"; and the sister of his Mother, Mary of Cleophas: she was the mother of James. It should be noted that Anne is said to have had three husbands: Joachim, Cleophas, and Salome, and from these three husbands she had three Marys, namely the Mother of the Lord, who was the daughter of Joachim; the mother of James, who was the daughter of Cleophas; the mother of Simon and Jude, who was the daughter of Salome. And Mary Magdalene, who was so called from the town of Magdala. These three women, as being more compassionate, stood near the cross of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
