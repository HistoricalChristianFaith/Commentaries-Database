[[commentary]]
quote='''
Third, he shows that one must rejoice in incomprehensible power, when he says: All things have been delivered to me by my Father. For in that he says: All things, without limit, delivered, he shows that his power is universal, according to that passage in John one: "All things were made through him," that is, through the Word; and again in chapter seventeen: "All things that are mine are yours, and yours are mine." In that he adds: By my Father, he indicates that this power is natural, according to that passage in John five: "Whatever the Father does, all these things the Son likewise does." In both together he shows equality and immensity: hence the Gloss: "When you hear all things, you recognize the Omnipotent; when you hear delivered, you confess the Son, to whom all things are properly his own by right through the nature of one substance, not conferred as a gift through grace." And from this it is apparent that the power of the Son is immense and incomprehensible. And then he adds: And no one knows who the Son is except the Father, that is, no intellect perfectly comprehends this except the paternal intellect; and therefore the Holy Spirit is not excluded by this, but only created intellect, which cannot comprehend him, since he is immense. Hence Job eleven: "Can you perhaps comprehend the traces of God and discover the Almighty unto perfection? He is higher than heaven, and what will you do?" etc.

And because the Son is incomprehensible, therefore He can comprehend the Father. On account of which He adds: And who the Father is, except the Son: supply: no one knows: because, John 1, "No one has ever seen God except the Only-begotten, who is in the bosom of the Father, He has declared Him." Since He alone comprehends, therefore He alone can reveal; and therefore He adds: And to whomever the Son wills to reveal. For the Son is the Wisdom and Word of the Father, and the Speaker manifests Himself through His Word; whence Wisdom 9: "Who will know Your mind, unless You give wisdom from on high?" Whence Chrysostom: "The philosophers, striving to inquire about God, confessed that they had found nothing else except that God is unknowable, just as one who undertakes to navigate an unnavigable ocean, when he cannot cross over, must necessarily return by the same way: so they began from ignorance and ended in ignorance. And the reason for this is that they were not disciples of Jesus Christ, who is the truth, nor did they have the Spirit, of whom John 16 says: 'When that Spirit of truth comes, He will teach you all truth.'"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
