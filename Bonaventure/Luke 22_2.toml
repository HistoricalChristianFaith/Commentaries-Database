[[commentary]]
quote='''
Secondly, as to the fraud of the Jewish plotting, he adds: And the chief priests and the scribes were seeking how they might kill Jesus. The chief priests were seeking—they in whom there ought to have been the prerogative of holiness; whence Exodus 28: "You shall consecrate the hands of the sons of Aaron and sanctify them, that they may minister to me in the priesthood." But that passage from Isaiah 1 could be said to them: "When you multiply prayer, I will not hear." Whence these men also, with the help of the scribes, were seeking to kill the truthful teacher, according to that passage in John 7: "Why do you seek to kill me, a man who has spoken the truth to you?"

These men, however, were seeking fraudulently; therefore he adds: But they feared the people; whence Jerome: "Not fearing sedition, but lest by the aid of the people he should be taken from their hands." And therefore it is said in Mark fourteen: "But they said: Not on the feast day, lest perhaps there be a tumult among the people"; and therefore they wished to do this as if in secret. For this is the custom of the perverse, according to that saying of Proverbs one: "Their feet run to evil and hasten to shed blood"; and afterwards: "They lie in wait against their own blood and plot deceits against their own souls"; because, while they seek to kill the fountain of life, they find death, according to that saying of Proverbs eleven: "He who seeks good things rises well at dawn; but he who is a searcher of evils shall be oppressed by them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
