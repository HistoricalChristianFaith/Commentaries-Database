[[commentary]]
quote='''
It is described lastly as consoling in the words: And you shall have joy and exultation: Proverbs 23: "The father of the just exults with joy," that is, Zacharias, the father of John; and "he who has begotten a wise son shall rejoice in him," because Proverbs 10: "A wise son makes the father glad." — Nor shall that joy be singular, but common. And therefore he says: Many shall rejoice at his birth: Proverbs 29: "In the multitude of the just the people shall rejoice"; Jeremiah 33: "It shall be to me a name and a joy and a praise and an exultation to all the nations of the earth." Ambrose: "The birth of the saints brings joy to many, because it is a common good. For justice is a common virtue." "Rejoice therefore, you just, in the Lord; praise befits the upright."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
