[[commentary]]
quote='''
Therefore the crowd bore witness, etc. Here the third point is touched upon, namely the reason for the honor shown: and this was the very wondrous raising of Lazarus, which was well known to the crowds: on account of which he says: Therefore the crowd that was with him bore witness to him, when he called Lazarus from the tomb and raised him from the dead, saying: "Lazarus, come forth." This crowd bore witness to his omnipotence, namely the crowd of the simple and also the crowd of the wise: of the wise, Acts 10: "To him all the Prophets bear witness"; of the simple, the Psalm: "Out of the mouth of infants and sucklings you have perfected praise."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
