[[commentary]]
quote='''
"Amen, amen I say to you." Here the second point is touched upon, namely how he vivifies, namely through internal inspiration, which whoever hears is vivified; therefore he says: "The hour comes and now is," namely, of grace, which now is: concerning which, Romans 13: "It is the hour for us now to rise from sleep" — from the sleep, namely, of sin and death: "when the dead," through fault, "shall hear the voice of the Son of God," through internal inspiration: Ephesians 5: "Rise, you who sleep, and arise from the dead, and Christ shall enlighten you." "And those who hear shall live," through grace, because his word vivifies those who hear: below, chapter 10: "My sheep hear my voice, and I give them eternal life"; and this I give and preserve by the word: Deuteronomy 8: "Man does not live by bread alone, but by every word that proceeds from the mouth of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
