[[commentary]]
quote='''
Second, as regards the curiosity of Herod in his questioning, he adds: But Herod, seeing Jesus, was exceedingly glad, not on account of the sight of faith, as Abraham, of whom it is said in John eight: "Abraham rejoiced to see my day: he saw it and was glad." — For he had been desirous for a long time to see him, not through the affection of charity, as Job twenty-three: "Who will grant me that I may find him and come even to his throne?" For to such persons it is said above in chapter ten: "Blessed are the eyes that see what you see. Amen I say to you, that many kings," etc. Not so Herod, but out of curiosity.

Whence he adds: Because he had heard many things about him, and he hoped to see some sign performed by him, through the appetite of curiosity; above in chapter nine: "Herod the tetrarch heard of all the things that were done by him," "and he said: Who is this, about whom I hear such things? And he sought to see him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
