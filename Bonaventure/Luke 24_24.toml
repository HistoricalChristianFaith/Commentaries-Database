[[commentary]]
quote='''
Whence he adds: And certain of our company went to the tomb and found it just as the women had said: but him they did not find. These were Peter and John, as is said in John 20. Luke therefore, who previously expressed this singularly about Peter, now expresses it about the two, so that their testimony for believing that the body had been taken away might be firm. And therefore from this they marveled and were terrified, but were not gladdened, because they did not believe the resurrection, but hesitated about it, and hesitating they conferred together, because they did not yet savor heavenly things, but earthly ones, according to that passage of Isaiah 29: "Your voice shall be as that of a python from the earth, and your speech shall whisper from the ground." Against which, Colossians 3: "If you have risen with Christ, seek the things that are above, where Christ is sitting at the right hand of God: savor the things that are above, not the things that are upon the earth." But the brutish man, who does not rise through the spirit, neither believes nor grasps these things; and therefore above in the same chapter it is said that "those words seemed to them as ravings," because, 1 Corinthians 2, "the sensual man does not perceive the things that are of the Spirit of God: for it is foolishness to him, and he cannot understand, because it is spiritually examined."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
