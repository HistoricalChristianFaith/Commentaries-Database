[[commentary]]
quote='''
I have come as a light into the world, that everyone who believes in me may not remain in darkness, but may see and himself also become light; Ephesians 5: "You were once darkness, but now you are light in the Lord"; and this by believing in him, of whom it is said in Hebrews 1: "Since he is the splendor of glory and the figure of his substance," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
