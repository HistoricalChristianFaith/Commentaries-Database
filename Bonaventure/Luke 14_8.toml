[[commentary]]
quote='''
Second, with regard to the persuasion dissuading from pride, he adds: Saying to them: When you are invited to a wedding, do not recline in the first place. Although this could be understood of carnal weddings, nevertheless the following text itself and the expositors wish it to be understood of spiritual weddings: whence the Gloss: "When through the grace of faith, called by a preacher, you have joined yourself to the members of the Church: do not exalt yourself, boasting of your merits, as though you were higher than the rest." These nuptials, however, are not just any nuptials, but the nuptials of the Lamb, of which Apocalypse nineteen says: "The nuptials of the Lamb have come, and his wife has prepared herself." God the Father made these nuptials, according to what is said in Matthew twenty-two: "The kingdom of heaven is like a king who made a wedding for his son." These nuptials were celebrated in the bridal chamber of the virginal womb: the Psalm: "He set his tabernacle in the sun, and he himself as a bridegroom coming forth from his bridal chamber." There the marriage between the divine and human nature was consummated, and consequently between Christ and the Church, according to that passage in Ephesians five; the Apostle, speaking of marriage, says: "This sacrament is a great one, but I speak in Christ and in the Church." The banquet at these nuptials consists in the reception of the Sacraments of the Church and the teachings of Sacred Scripture: Proverbs nine: "Wisdom has built herself a house, she has hewn out seven pillars. She has slain her victims, mixed her wine, and set forth her table. And she has sent her handmaids to call to the citadel," etc. To this banquet are called all who are called to the faith through the preaching of truth; Matthew twenty-two: "He sent his servants to call those invited to the wedding."

Those thus invited recline and eat through the searching out and rumination of divine and mystical words. As a sign of this, that heavenly food was called manna in Exodus sixteen, which is interpreted: "What is this?" because it is necessary to understand what they receive. Whence also in Leviticus eleven it is said that the animal which "does not chew the cud is unclean."

In the first place reclines he who is preferred above others, whether in the office of dignity, or in the privileges of holiness, or in the magisterium of truth. And to this no one ought to ascend of himself, because it is said in Hebrews five: "Neither does anyone take the honor to himself, but he who is called by God, as Aaron was." And therefore Ecclesiasticus six: "Do not exalt yourself in the thought of your soul like a bull, lest perhaps your strength be dashed to pieces"; nor even before others: whence Ecclesiasticus eleven: "Never glory in your clothing, and in the day of your honor do not exalt yourself."

Third, however, as regards the reason explaining the shame he adds: Lest perhaps one more honored than you has been invited by him, worthy of greater honor on account of interior grace; the Gloss: "More pleasing to the one who invited, even if he is hidden from others"; whence 1 Kings 16: "Do not regard his countenance nor the height of his stature, for I have rejected him; nor do I judge according to the sight of man. For man sees those things which are apparent, but the Lord beholds the heart".
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
