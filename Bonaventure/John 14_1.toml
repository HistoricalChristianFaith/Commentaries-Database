[[commentary]]
quote='''
He therefore first exhorts them that, considering the manner of departing, they should not be troubled by his departure nor fail in faith, but rather believe. Therefore he says: Let not your heart be troubled, but let it believe: whence: You believe in God, believe also in me. Let it not be troubled by absence, but believe in the absent one: just as you believe in God, whom you do not see. And the reason why they ought not to be troubled but to believe is this: namely, that the Lord does not depart from them entirely, but goes before them, so that he may again take them up to glory, in which there are many mansions already prepared according to eternal election, but still to be prepared according to merits: whence this word to prepare, according to Augustine's exposition, is taken in the text according to these two significations.

The whole can nevertheless be expounded in one signification of this word to prepare, so that the sense is: Let not your heart be troubled, but believe in me; because in my Father's house there are many mansions, in which you will rest together with me, to which I prepare the way; therefore you ought not to grieve. But then you would have cause to grieve, if it were not so, I would have told you, that is, if I had not said: Because I go to prepare a place for you, I will take you up again, etc. But I have said this and I say it; whence: And if I go and prepare a place for you, I come again and will take you to myself, etc. However it may be read, an exhortation to faith is made.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
