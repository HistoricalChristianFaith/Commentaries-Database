[[commentary]]
quote='''
And I know that his commandment is eternal life; whence Matthew nineteen: "If you wish to enter into life, keep the commandments"; Deuteronomy thirty: "Choose therefore life, that both you and your seed may live, and that you may love the Lord your God and obey his voice"; and therefore I do not turn aside from his commandment. On account of which he says: Therefore the things that I speak, as the Father has told me, so I speak: because he himself, speaking as man, conformed himself in all things to the divine commandment and will; above in chapter eight: "The things that I have heard from the Father, I speak in the world." And therefore from this he wishes to establish that his word is not to be rejected but to be received as a divine word: as is said of the good in First Thessalonians two: "When you had received the word of the hearing of God, you received it not as the word of men, but, as it truly is, the word of God, who works in you who have believed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
