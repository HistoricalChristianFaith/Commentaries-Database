[[commentary]]
quote='''
Third, with respect to the written commandment, it is added: As it is written in the law of the Lord, that every male opening the womb shall be called holy to the Lord: Exodus 13: "Sanctify to me every firstborn that opens the womb among the children of Israel, as well of men as of beasts." But this does not seem to apply to the Virgin Mary, who is the closed gate before birth and after birth and in birth. And therefore it can be said, as was said above concerning the law of purification. Or indeed, the opening of the womb is understood with respect to fecundation, not with respect to the opening of the enclosure; Genesis 29: "The Lord opened the womb of Leah, her sister remaining barren"; and First Kings 1: "Her rival reproached Anna, because the Lord had closed her womb, for she was barren."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
