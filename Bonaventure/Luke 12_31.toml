[[commentary]]
quote='''
On account of which he adds: But seek first the kingdom of God, as the principal object of intention; and all these things shall be added unto you, as provisions for the journey, because he who is prepared to give the kingdom will without doubt not deny food; he who is prepared to give eternal things will not deny temporal things. Whence Augustine: "The Lord shows that temporal things are not to be sought as our goods, even if they are necessary. But the kingdom of God is to be sought, and in it our end is to be placed, for the sake of which we do all things." Therefore our solicitude ought not to be for acquiring food, but for acquiring the eternal kingdom; Romans 14: "The kingdom of God is not food and drink, but justice and peace and joy in the Holy Spirit." Chrysostom: "The kingdom of God is the retribution: justice is the way by which we come to the kingdom." Therefore Matthew 6: "Seek first the kingdom of God and his justice" etc.

And note that this promise is quite fitting, because he who seeks the kingdom and his justice is a servant of God, a friend of God, and a son of God; Romans 8: "Those who are led by the Spirit of God, these are the sons of God"; but that God should fail his servant, his friend, and his son, so as not to provide for him what is necessary: this is a most perverse thing to think. For such a one possesses God, such a one is possessed by God, and therefore possesses consequently what God possesses: whence the Apostle, First Corinthians 3: "All things are yours, and you are Christ's, and Christ is God's."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
