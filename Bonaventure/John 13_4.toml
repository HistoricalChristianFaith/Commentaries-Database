[[commentary]]
quote='''
He rises from supper, to set an example; because the opportune time was already at hand, as it was said to the minister of the Church in Acts twelve: "Rise quickly." And he lays aside his garments. Here the second point is touched upon, namely the humility of Christ, because he lays aside his garments, so as to be unencumbered like a servant; therefore he says: He lays aside his garments; and also to be prepared like a servant; on this account he says: And having taken a towel, he girded himself; Luke twelve: "Amen I say to you, that he will gird himself," etc. He carries out the office of a servant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
