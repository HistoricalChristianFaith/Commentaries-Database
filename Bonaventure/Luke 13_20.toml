[[commentary]]
quote='''
And again he said: To what is it like, etc. After he set forth an example inciting to continuous progress in the knowledge of truth, here he adds an example inciting to progress in the fervor of charity, and this under the metaphor of leaven, from whose likeness he incites to continuous progress in charity with respect to its threefold analogous property, namely that which leaven has on the part of its own nature, on the part of another's industry, and on the part of both.

First, therefore, with respect to the property which it has on the part of its own nature, through which he intends to arouse us to progress in charity, he says: And again he said: To what shall I liken the kingdom of God? And here by the kingdom of God is rightly understood the love of God, because God reigns only in those who love him: Colossians 1: "He rescued us from the power of darkness and transferred us into the kingdom of the Son of his love"; because, as is said in Romans 14, "the kingdom of God is not food and drink, but justice and peace and joy in the Holy Spirit."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke, Chapter 13'
