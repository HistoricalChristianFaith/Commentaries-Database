[[commentary]]
quote='''
After he described the occasion of the temptation, here he describes the manner of tempting, and this according to a threefold motive. Now the motive to sin is a changeable good, which exists in a threefold difference: either it is inferior, and this belongs to the flesh; or exterior, and this belongs to the world; or interior, and this is the excellence of the mind. From the first, a person is made voluptuous; from the second, curious; from the third, presumptuous. In the first way, the tempter brings a suggestion through the inferior good, which belongs to the flesh, to entice to gluttony; in the second, through the exterior good, which belongs to the world, to entice to avarice; in the third, through the interior good, which is the excellence of the mind, to entice to pomp or pride. And these three correspond to the three things in which he tempted and conquered the first man, and these temptations follow an ordered progression from lower to higher: because by the first, one is assailed with respect to the act of the vegetative power; by the second, with respect to the act of the sensitive power; by the third, with respect to the act of the rational power.

He introduces the devil tempting, when he says: And the devil said to him: If you are the Son of God, command that these stones become bread, which he says so that he himself might gain proof concerning him and so that he might incite him to gluttony. For since you are a hungry man, command that you may be refreshed: not because the refreshment of Christ pertained to him in any way: Proverbs twenty-three: "Eat and drink, he will say to you, and his heart is not with you"; but if you are the Son of God, say this very thing, so that, if it comes to pass, you may be recognized as omnipotent: Ecclesiastes eight: "His word is full of power, and whatever he wills, he will do." Hence note the cunning of the devil in tempting, because, when he saw Christ's weakness and doubted his Divinity, he wished to guard against the Divinity by discovering it and to cast down his humanity by seducing it. In which there was at once deceit and pride, according to that passage of Job forty-one: "He beholds every high thing, and he himself is king over all the children of pride."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
