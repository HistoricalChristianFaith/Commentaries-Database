[[commentary]]
quote='''
Whence he adds: And will he not say: Make ready what I may sup on, and gird yourself, and serve me until I eat and drink, namely through the groaning of interior compunction, in which each one prepares the banquet: Sirach 18: "Before prayer prepare your soul, and be not as a man who tempts God." He girds himself, by restraining the wanderings of the mind: 1 Peter 1: "Having the loins of your mind girt up" etc. In this also he serves, by casting himself down, and feeds and gives drink to God, while he does what is most acceptable: Revelation 3: "If anyone shall have opened the door to me, I will enter to him and will dine with him." Whence the Gloss: "He ministers to the Creator who, considering His mercy and fearing His judgments, humbles himself regarding his own virtues." And because after this compunction there follows devotion, therefore he adds: And after these things you shall eat and drink, through the taste of eternal sweetness. Gloss: "After I shall have been refreshed by your preaching and compunction, then at last you will be refreshed by the eternal feasts of my wisdom"; Psalm: "My soul refused to be comforted; I remembered God and was delighted," etc.; and again: "My tears were my bread day and night"; and after: "In the voice of exultation and confession, the sound of one feasting"; and again: "You have turned my mourning into joy for me," etc. But the Lord does all this for the preservation of humility, which is the root, preservation, and safeguard of the other virtues. Therefore even Paul, already perfect, said in Second Corinthians 12: "Lest the greatness of the revelations exalt me, there was given to me a thorn of my flesh, an angel of Satan"; and Sirach 3: "The greater you are, humble yourself in all things, and you will find grace before God"; for Sirach 18: "When a man has finished, then he shall begin."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke, Chapter 17'
