[[commentary]]
quote='''
But as to the indication of his own virtue, there is added: And Jesus advanced in age, namely on the part of the body, as Samuel: 1 Kings 2: "The boy Samuel advanced and grew, and was pleasing both to God and to men." And this advancement was according to essence, but the interior advancement was according to evidence, of which it is said: And in wisdom, namely in the intellect, and in grace, in the affections, before God, namely to be honored, and men, to be edified. Nor is this contrary to what is said just above, that "he was full of wisdom"; whence Gregory: "He advanced in wisdom, not by receiving through the passage of time what he did not have, but by revealing to others the gifts of grace and wisdom which he had"; and this for the edification of others: 2 Corinthians 8: "We provide good things, not only before God, but also before men." Whence for our edification he hid his wisdom for a time, to show that we ought to be silent until the proper time, according to that passage of Ecclesiasticus 20: "There is one who is silent, not having the sense of speech, and there is one who is silent, knowing the fitting time. A wise man will be silent until the proper time." At the proper time also he showed it for our salvation, according to that passage of Ecclesiasticus 4: "Do not withhold the word in the time of salvation." Whence, because he did not seek his own glory but God's, not his own advantage but our salvation, therefore he found grace before God and men. The first pertained to justice, the second to mercy: on account of which, Proverbs 3: "Let not mercy and truth forsake you, and you shall find grace and good discipline before God and men."

From the foregoing, therefore, we can gather how we ought to attend to the worship of the divine Majesty, the study of truth, and the service of piety. For the worship of the divine Majesty ought to be undertaken from infancy and ought to be preferred to all else out of divine reverence. The study of truth ought to be with due companionship, namely of those who are skilled, and in due order, so that one be a disciple before being a master. The service of piety is observed in this, that we submit ourselves to a spiritual father, whether correcting or commanding. And if we keep these things, then there follows what is set down last, that we advance before God and men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'

[[commentary]]
quote='''
That besides uncreated wisdom Christ had also created wisdom is argued thus: Jesus advanced in wisdom and age and grace before God and men; but this could not be through uncreated wisdom. Therefore, besides that wisdom he had created wisdom.

The soul of Christ, since it is a creature, was wise with both wisdoms, namely created and uncreated: uncreated as principally moving and regulating and quieting; created however as informing, disposing, and elevating, so that it might fully attain to that uncreated wisdom. For created intelligence does not attain to that fontal wisdom unless it has been made deiform, and through this elevated and disposed: elevated above itself, and disposed in itself. Therefore it is necessary that something be given to it coming from above, which is nevertheless proportionate to it and inhering in it; and this we call the influence of the eternal light: and because it disposes the soul for wisdom, it is called created wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Scientia%2520Christi%2FQuestion%25205.html'
source_title='Quaestiones Disputatae, De Scientia Christi, Question 5'
