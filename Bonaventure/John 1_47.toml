[[commentary]]
quote='''
"Jesus saw Nathanael coming to him." Here the attraction of the one called is touched upon. He attracts through commendation and through revelation of secrets. Through commendation: whence he says: "Jesus saw Nathanael coming to him," namely through the admonition of the simple Philip: "and he says of him: Behold, truly an Israelite, in whom there is no guile." Therefore there is no guile, because, although he is wise, he was not ashamed to follow a simple man; because what he believed in his heart, this he brought forth with his mouth; because he came not with the will of testing, but with the zeal of making progress; against which Proverbs 12: "Guile is in the heart of those who devise evil." But Nathanael does not believe his commendation unless he hears certainty about this, because a man ought not be inclined to believe good things about himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
