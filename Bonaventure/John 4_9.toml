[[commentary]]
quote='''
"The woman therefore says to Him." Here secondly He arouses her by promising or offering a benefit: because the woman, considering Him to be a Jew, did not wish to render service, but rather raises a question. Therefore he says: "That Samaritan woman therefore says to Him," from whom namely He had asked a drink: "How do You, being a Jew, ask a drink of me, who am a Samaritan woman?" "She recognized Him to be a Jew from His garb," as the Gloss says. And the Evangelist subjoins the reason for this question: "For the Jews do not associate with the Samaritans," regarding them as unclean, because they were gentiles: whence Genesis 43: "It is unlawful for the Egyptians to eat with the Hebrews, and they consider such a banquet profane." Because therefore the woman had not been moved to render service, the Lord entices her by promising a benefit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
