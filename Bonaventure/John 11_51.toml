[[commentary]]
quote='''
But he did not say this of himself, that is, by his own invention, but by divine inspiration; wherefore he says: But since he was the high priest of that year, he prophesied. He attributes the prophetic Spirit to the sacerdotal honor. In this it is evident that the Holy Spirit works many noble works even through wicked priests; whence they are to be held in reverence. Wherefore, when Paul cursed the high priest, having learned that he was the high priest, he said: "I did not know that he was the high priest," Acts twenty-three; and Saul, when he was anointed, prophesied, 1 Kings ten. And he explains his prophecy by adding: He prophesied that Jesus was to die for the nation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
