[[commentary]]
quote='''
And this fruit is gathered in the summer of eternal clarity; on account of which he adds: So you also, when you see these things coming to pass, know that the kingdom of God is near. Gloss: "He compares the Kingdom of God to summer, because then the clouds of our sorrow will pass away, and the days of eternal life will shine forth under the brightness of the sun." In this Summer the rain of tears will cease: Isaiah twenty-five: "The Lord God will wipe away every tear from every face"; Psalm: "Going forth they went and wept," etc. The cloud of tribulations will cease: Tobit three: "After the storm you make calm, and after weeping and tears you pour in exultation," etc. The cold of desires will also cease: whence Bernard: "O true noonday, fullness of fervor and light, station of the sun, banishment of shadows, drying up of marshes, driving away of stenches! O perennial solstice, when the day will no longer decline! O noonday light, O springtime mildness, O summer beauty, O autumnal abundance! And lest I seem to have passed over anything: O winter rest and repose! Or rather, if you prefer this more, then alone has winter departed and gone away"!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
