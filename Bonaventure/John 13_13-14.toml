[[commentary]]
quote='''
John 13: You call me master and lord, etc., up to: to wash the feet; from this authority it is gathered by reasoning that the disciple of Christ, on account of his master, ought to bow himself down even to the most extreme form of humiliation and abasement.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25201.html'
source_title='Disputed Questions on Evangelical Perfection, Question 1'
