[[commentary]]
quote='''
Jesus answered and said to him: "You are a teacher in Israel, and you do not know these things?" As if to say: you consider yourself a great teacher, and yet you are ignorant of the beginnings of faith. Hebrews 5: "When you ought to be teachers by reason of the time, you need again to be taught what are the elements of the beginning of the words of God." As if to say: if you wish to understand, you must humble yourself and believe, because if you do not believe this, neither will you be able to understand greater things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
