[[commentary]]
quote='''
Secondly, with regard to the threatening of the severity of judgment, he adds: The lord of that servant will come on a day when he does not expect, and at an hour when he does not know: Deuteronomy thirty-two: "The day of destruction is near, and the times hasten to arrive"; and Zephaniah one: "The great day of the Lord is near, near and exceedingly swift." And although it is near, nevertheless it comes upon the worldly unexpectedly; whence Ecclesiastes nine: "Man does not know his own end, but as fish are caught with a hook, and as birds are seized in a snare, so are men caught in an evil time, when it suddenly comes upon them." And because a grave judgment threatens those who despise the judge, therefore he adds: And he will divide him, namely from the company of the good, according to that passage in Matthew twenty-five: "He will set the lambs on his right hand, but the goats on his left." And will place his portion with the unbelievers, who namely have already been judged: John three: "He who does not believe has already been judged"; and this rightly, because in First Timothy five it is said: "If anyone does not have care for his own and especially for those of his household, he has denied the faith and is worse than an unbeliever." This portion is very evil, according to that passage of the Psalm: "Fire, brimstone, and the blast of tempests, the portion of their cup"; and Revelation twenty-one: "For the timid and unbelieving and abominable and murderers and fornicators and sorcerers and idolaters and all liars, their portion will be in the lake burning with fire and brimstone." From which it appears that just as the reward of good prelates is great, so also the punishment of the reprobate will be the greatest: Wisdom six: "The most severe judgment will be made upon those who govern. For to the lowly, mercy is granted, but the powerful will suffer torments powerfully."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
