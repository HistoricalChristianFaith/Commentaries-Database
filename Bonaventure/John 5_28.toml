[[commentary]]
quote='''
"Do not marvel at this." The second point is touched upon here, namely whom he judges: because, although he must raise all, he will nevertheless not judge all, but the wicked; whence he says: "Do not marvel at this," namely at what has been said, that he gave him power to execute judgment, because he is the Son of man; "because the hour comes," namely the end of the age: Job 14: "Man, when he has fallen asleep, shall not rise again until the heavens are worn away"; "in which all who are in the tombs shall hear the voice of the Son of God." If the dead shall hear, it is established that they shall rise at his voice; 1 Thessalonians 4: "The Lord himself shall descend from heaven with a command and with the voice of the Archangel and with the trumpet of God, and the dead who are in Christ shall rise first." And although all shall rise, nevertheless not all shall be judged.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
