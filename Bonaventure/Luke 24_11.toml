[[commentary]]
quote='''
Secondly, as regards the sight of the disciples, it is added: And these words seemed before them as idle talk, and they did not believe them. Hence they did not believe what they heard, both because what was being said was wondrous, and because this was being brought about by divine dispensation, so that a greater and more certain assertion of the truth might be obtained. Hence Gregory: "That the disciples were slow to believe was not so much their incredulity as our future firmness, so to speak. For while they doubted, the resurrection was demonstrated by many proofs, which, when we recognize them as we read, what else happens but that we are strengthened by their doubt?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
