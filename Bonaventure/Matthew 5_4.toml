[[commentary]]
quote='''
Since evil proceeds either from the swelling of pride, or from the rancor of malice, or from the languor of concupiscence, therefore for perfectly distancing oneself from this threefold kind of evil, three beatitudes are necessary, namely poverty of spirit, distancing from the evil of swelling; meekness, distancing from the evil of rancor; and mourning, distancing from the evil of lust and concupiscential languor.

For the perfection of religious life, there is necessarily required the renunciation of private good, the acceptance of fraternal good, and the desire for eternal good; the third is accomplished through the bitterness of mourning.

Knowledge disposes to mourning, since through knowledge we recognize that we have been banished from the state of blessedness into this valley of misery and tears.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
The third virtue is mourning, concerning which it says in the Gospel: "Blessed are those who mourn." The gift of knowledge destroys wrath and introduces the gift of mourning — nothing is so contrary to wrath as serenity of mind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"
