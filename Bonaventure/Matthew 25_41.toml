[[commentary]]
quote='''
Transgressors of the commandments merit eternal punishments. "Cursed are they who decline from Thy commandments": cursed, because it shall be said to them: "Depart, ye cursed, into everlasting fire."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25201.html'
source_title="Collationes de Decem Praeceptis, Collation 1"

[[commentary]]
quote='''
The third origin of the fear of the Lord is from the consideration of the severity of divine vengeance. Whence in Habakkuk: "Lord, I have heard your report and was afraid." He says: "I have heard your report and was afraid," namely, that report when it shall be said: "Depart, you cursed, into eternal fire."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"
