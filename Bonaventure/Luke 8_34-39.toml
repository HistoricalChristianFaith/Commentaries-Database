[[commentary]]
quote='''
Note here that according to the letter, four notable points can be drawn from what has been said. The first is that the Lord willed to be made known to others through lowly and humble persons, such as through swineherds and herdsmen.

Second, that not all are to be admitted to the state of perfection, but only those who are suitable.

Third, that those whom Christ cures from the vexation of the devil are not to be barred from preaching the name of Christ. — Fourth, that we ought to be most ready for the giving of thanks for benefits received, after the example of this demoniac, who announced the benefit of God to all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
