[[commentary]]
quote='''
Second, he sets her above him with regard to the kiss, which was a sign of love, when it is added: You gave me no kiss, as a sign of love, according to the Apostle in the last chapter of Romans: "Greet one another with a holy kiss"; and the disciples kissed Paul, Acts 20. But on the contrary concerning this woman: whence is added: But she, from the time she entered, has not ceased to kiss my feet: in which is signified fervent love and persevering love. Therefore she did not cease from kissing, because she did not cease from interior desire. For concerning her Gregory says that "kindled by the fire of his love, that is, of Christ, she burned with desire." For as is said in the last chapter of the Song of Songs: "Love is strong as death"; and afterwards: "Its lamps are lamps of fire and flames." Whence just as fire always burns, so charity unceasingly inflames: for as Gregory says: "The love of God is never idle."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
