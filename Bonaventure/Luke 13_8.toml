[[commentary]]
quote='''
Third, as regards the necessity of penance in remedying, he adds: But he answering said to him: Lord, let it alone this year also, that is, in the time of old age, until I dig around it and put dung, that is, until I bring back to its memory its own frailty and its iniquity. For he digs who humbles himself: Isaiah 2: "Enter into the rock, hide in the pit dug in the ground from the face of the fear of the Lord and from the glory of his majesty"; and 4 Kings 3: "Make the bed of this torrent ditches and ditches." Whence the Gloss: "For a pit is in the lowest place, and rebuke, while it shows the mind to itself, humbles it." He puts dung who brings sin back to memory; whence the Gloss of Bede: "I will put dung, that is, I will bring back to the mind the abomination of the evils it has done, and I will stir up the grace of compunction with the fruits of good work as if from the richness of dung." For sins are called dung; whence Joel 1: The beasts have rotted in their dung; and Lamentations 4: "Those who were nourished in saffron have embraced dung." The recollection of these things makes the soul fruitful: whence Isaiah 38: "I will recount to you all my years in the bitterness of my soul"; and Jeremiah 31: "Set up for yourself a watchtower, place for yourself bitternesses." But just as a tree bears fruit when dung is put around it, so also the soul, when it remembers its sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke, Chapter 13'
