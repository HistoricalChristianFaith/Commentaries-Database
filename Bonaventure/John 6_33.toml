[[commentary]]
quote='''
"For the true bread is that which descends from heaven and gives life to the world": and this bread was not the manna, but Christ: below in chapter 10: "I came that they may have life and have it more abundantly." "To descend from heaven," this is to come into flesh; whence Augustine says: "The Word, which was the bread of Angels, when it descended into flesh, was turned into milk for little ones."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
