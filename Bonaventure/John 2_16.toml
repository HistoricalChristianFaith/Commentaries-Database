[[commentary]]
quote='''
If however circumvention occurs with a profane agreement, it is called simony, in which he who buys acquires nothing, nor does he who sells possess anything, but they only handle another's property: and this happens when a spiritual thing is sold as though it were a cheap thing. Against whom the Lord says: "Do not make my Father's house a house of trade." But some make it a den of thieves; whence: "Her princes judged for bribes, and her priests taught for hire, and her prophets divined for money."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25206.html'
source_title="Collationes de Decem Praeceptis, Collation 6"

[[commentary]]
quote='''
And to those who were selling doves, he said: Take these things away from here, and do not make the house of my Father a house of trade. Concerning this house it is said in the Psalm: "Holiness befits your house, O Lord," not trade. Augustine: "If he forbids such things in the place of prayer, how much more drinking bouts and drunkenness and other similar things?" Therefore he commands in his Rule that "in the oratory nothing should be done except that for which it was established."

It is asked: why did He correct those who were selling doves by word alone, but the others also by deed? And it seems that He should have done more, because by those sellers simoniacs are signified, who are to be corrected more severely.

I respond: To this there is a literal reason, because doves defiled the temple less; but the mystical reason is that by those sellers simoniacs are understood, who are not to be corrected with a small punishment, but are to be cast out of the Church by sentence; or because by the dove is understood the gift of the Holy Spirit, which is not to be driven out.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'

[[commentary]]
quote='''
He commanded the doves to be taken away: Jerome on Matthew: "He overturned their seats, because he destroys the priesthood of such traffickers." Hence it is that the sacred Canons condemn the heresy of simony, and command that those who seek a price for the priesthood be deprived of the priesthood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
