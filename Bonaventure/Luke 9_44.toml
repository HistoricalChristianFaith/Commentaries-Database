[[commentary]]
quote='''
Second, with regard to the exhortation of the disciples to the understanding of truth, there is added: While all were marveling at all the things that he was doing and also saying and speaking; he said to his disciples: Place these words in your hearts; as if he were saying to them: while others recognize and admire the greatness of the miracles, you consider the humility of the future reproaches and "store away in your mind the outcome of the precious blood by which the world is to be redeemed, while the rest marvel only at the deeds of divine majesty." Whence place, that is, hold in memory, according to that passage of Song of Songs, the last chapter: "Set me as a seal upon your heart." Moreover, after the display of the miracle he joins the prediction of future suffering, lest the passion, coming suddenly, should utterly shake the disciples: whence Ecclesiasticus 11: "In the day of good things, be not unmindful of evil things"; and lest anyone be exalted in a time of prosperity, according to that passage of Proverbs 27: "Do not boast about tomorrow, not knowing what the coming day may bring forth"; and therefore Ecclesiasticus 11: "In the day of your honor, do not exalt yourself."

These words, which he wishes to be recalled to memory, are about the passion: whence he adds: The Son of Man is to be delivered into the hands of men. Delivered, I say, out of clemency by God the Father: Romans 8: "Who did not spare his own Son, but delivered him up for us all," etc. He will be delivered out of obedience by himself; Isaiah 53: "Because he delivered his soul unto death." He will be delivered out of malice by Judas the traitor: Matthew 26: "He who dips his hand with me in the dish, he will betray me." And in this he encompasses the whole passion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
