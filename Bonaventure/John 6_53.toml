[[commentary]]
quote='''
The disputation of the Jews has been set forth; here the confirmation of the doctrine is set forth. He therefore confirms what he had said, that his flesh is bread, in this order: first the necessity of eating the flesh of Christ is set forth; second, the utility of eating; third, the truth of the refreshment; fourth, the dignity.

First therefore the necessity of eating is shown, because without it there is no salvation; on account of which he says: "Amen, amen I say to you," that is, in truth: "Unless you eat the flesh of the Son of man," as true bread, "and drink his blood," as true drink: "you shall not have life in you," namely the life of grace, of which it is said in the Psalm: "Quicken me according to your word."

Augustine: "Nothing lives by the Spirit of Christ except the body of Christ. If therefore you wish to live by the Spirit of Christ, be in the body of Christ." But he who eats the body of Christ is in the body of Christ; therefore he who does not eat does not live, because it is said below in the same chapter: "He who eats my flesh abides in me."

An inquiry is made here concerning the eating of the body of Christ and his flesh. And that it is not eaten seems to be the case: because what is eaten is ground down and chewed, but the impassible flesh of Christ cannot be ground down by the teeth; therefore neither can it be eaten. Likewise, what is eaten is converted into the one eating: but the body of Christ is not converted into us, but we into him: therefore we do not eat him, but he eats us.

In eating we find three things, namely mastication, incorporation, and conservation. Mastication is twofold according to the twofold eating: for there is sacramental eating, and in this there is sacramental mastication, because the species is chewed: there is also spiritual eating, and in this there is spiritual mastication, which is a spiritual discernment through faith. There is furthermore incorporation, by which we are incorporated into the body of Christ: there is also conservation, by which we are conserved through the Spirit of Christ, as the members of the body are conserved through the soul. Concerning these three things Augustine says: "O sacrament of piety! O sign of unity! O bond of charity! Whoever wishes to live, let him draw near, let him believe, let him be incorporated, let him be vivified."

Through this the first objection is clear: because there is mastication there, not carnal but spiritual or sacramental. To the objection that he is not incorporated into us, it must be said that the ultimate effect of food is to conserve; and because, although we are incorporated into Christ by eating, nevertheless because by eating we are conserved through him, he is rightly called our food.

From this it seems that the Sacrament of the Eucharist is of necessity, and that no one can be saved without it. Against this: Either he means the life of grace or the life of glory: not of grace, because whoever wishes to approach worthily must first have the life of grace; nor the life of glory, because if one can have the life of grace without eating, one can also have glory.

To this the response is given according to Augustine, that to believe is to eat: whence: "Why do you prepare your tooth and stomach? Only believe, and you have eaten." According to this, therefore, it must be noted that there is spiritual eating and there is sacramental eating: spiritual eating is through faith and charity, sacramental eating is under the Sacrament. Without sacramental eating there can be salvation, nor is it of necessity, as far as the institution of the Sacrament is concerned: spiritual eating is of necessity.

But objections are raised concerning baptized infants, who are saved yet have never eaten either sacramentally or spiritually. Likewise, he adds to the eating of the flesh the drinking of the blood, therefore without the drinking of the blood no one is saved: but only priests receive the blood: therefore they alone are saved.

It must be said that the effect of eating is twofold, namely incorporation and conservation. No one is saved unless he is a member of Christ, and unless he is preserved by Christ: hence no one is saved without the effect of eating: therefore eating is said to be necessary. But because in little ones, by divine generosity, there can be the effect of eating without eating: therefore they are saved even without any eating whatsoever. In adults, however, there cannot be incorporation or conservation without spiritual eating, which is through faith and charity, but there can be without sacramental eating. Therefore the former is necessary for adults, but sacramental eating, although it is not of necessity, nevertheless confers great benefit, because by the power of the Sacrament every good is increased in us. As for the objection raised concerning flesh and blood, Augustine explains it of spiritual food and drink: hence "he wishes food and drink to be understood as the fellowship of the body and members, which is the holy Church in his predestined and called saints and faithful," outside of which no one is saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
