[[commentary]]
quote='''
But how he now sees, we do not know; or who opened his eyes, we do not know: because, namely, we were not present, nor do we know more than you, nor is it necessary to ask us, but rather him: whence they say: Ask him, because he can answer; he is of age, let him speak for himself. The Evangelist assigns the reason for this response. The reason for that response was fear of the Jewish conspiracy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
