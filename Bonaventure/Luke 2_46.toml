[[commentary]]
quote='''
He shows that the Savior assumed the form of a disciple, when it is said: And it came to pass, after three days they found him in the temple sitting. Sitting designates rest and humility: for he knew that "it is better to sit in a corner of the housetop than with a quarrelsome woman and in a common house," Proverbs twenty-one. Sitting, I say, in the midst of the doctors: Ecclesiasticus fifteen: "In the midst of the church he opened his mouth, and filled him with the spirit of wisdom and understanding." For he knew it was written: "He who walks with the wise shall be wiser; the friend of fools shall become like them," Proverbs thirteen. And in this he teaches that the fellowship of students is to be cherished, not for disputing, but for conferring: on account of which it is added: Listening to them and asking them questions. For this is the exercise of the learner, that he should listen and ask about doubtful matters: Ecclesiasticus thirty-two: "Listen in silence, and for your reverence good grace shall come to you," because "a good ear will hear wisdom with all desire," Ecclesiasticus three: and therefore it is said in John eight: "He who is of God hears the words of God." Because it is not sufficient to hear, therefore it is added: And asking them questions: Job eight: "Ask the former generation, and diligently search the memory of the fathers"; and Deuteronomy thirty-two: "Ask your father, and he will declare to you," etc. He was asking, however, not that he might be taught, but rather that he might teach. Jerome: "The Savior had completed twelve years, and questioning the priests in the temple, he teaches more while he prudently questions."

In this, however, it is to be noted spiritually that Christ teaches us that we ought to learn before we teach, according to that saying of Ecclesiasticus eighteen: "Before you speak, learn." And therefore he willed to be found in the midst of the doctors and in the temple, because in the reading of the Scriptures and in prayer truth is found.

Whence note that Christ was found in a manger: above in the same chapter: "This shall be a sign unto you"; that is, in the study of sacred Scripture, because, according to what is said in Proverbs fourteen, "where there are no oxen, the manger is empty." The oxen are preachers: First Corinthians nine: "You shall not muzzle the ox that treads out the grain," etc. He was found in a house: Matthew two: "Entering the house"; that is, in the examination of a quiet conscience: Wisdom eight: "Entering my house, I shall find rest with her." He was also found in the temple, as here, that is, in the fellowship of the holy Church, because "the Lord is in his holy temple," as is said in the Psalm. But he is not found in the tomb of erroneous doctrine: Luke last chapter: The women "came to the tomb and did not find the body of Jesus"; nor indeed in the bed of a restless conscience: Song of Songs three: "In my bed I sought him whom my soul loves; I sought him and did not find him"; nor is he found in the fellowship of a worldly life: Job twenty-eight: "But wisdom, where is it found?" and afterwards: "It is not found in the land of those who live pleasantly."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
