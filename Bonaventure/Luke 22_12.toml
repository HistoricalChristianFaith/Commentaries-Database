[[commentary]]
quote='''
And because he knew his disposition, he therefore adds: And he will show you a large upper room, furnished, and there prepare, as if in an honorable place. These things are plain according to the literal sense.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
