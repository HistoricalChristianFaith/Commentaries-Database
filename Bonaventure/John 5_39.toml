[[commentary]]
quote='''
Vegetation on earth is alive, that is, having strength: wherefore it produces the green herb. And by this it is shown that the sacraments of Scripture, which externally seem arid, are yet alive within. And this is what the Saviour says to the Jews in John: "You search the Scriptures, because in them you think that you have life everlasting." No other Scripture besides this one is able to give life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'

[[commentary]]
quote='''
"Search the Scriptures." Here the fourth testimony is touched upon, namely that of the Scriptures, to which the Lord exhorts and arouses to diligence and spiritual understanding; on account of which he says: "Search the Scriptures," that is, discern the interior meaning, because, as the Apostle says in 2 Corinthians 3, "the letter kills, but the spirit gives life." And he adds the reason why they ought to search: "In which you think you have eternal life," that is, through which you think to know, and through this to have eternal life, because through them you think to know God, who is eternal life: Wisdom 15: "To know you is consummate justice, and to know your justice and your power is the root of immortality." Christ says that these Scriptures testify of him: whence he also adds: "They are the ones that bear testimony concerning me," namely all the Scriptures of the Old Testament: Luke, the last chapter: "It is necessary that all things be fulfilled which are written in the Law of Moses and the Prophets and the Psalms concerning me," said the Lord Jesus: Acts 18 says of Apollos that "he vigorously refuted the Jews publicly, showing through the Scriptures that Jesus is the Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
