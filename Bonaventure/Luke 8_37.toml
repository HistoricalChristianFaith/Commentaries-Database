[[commentary]]
quote='''
Fourth, indeed, as regards the veneration of the truth discovered, it is added: All the multitude of the region of the Gerasenes asked him. After they recognized the fearsome dominion of Majesty, they asked him to depart from them. Which indeed they did not say from the contempt of pride, as those of whom Job 21 says: "Who say to God: 'Depart from us; we do not desire the knowledge of your ways'"; but from reverential fear. Whence it is also added: Because they were held by great fear, as Peter, above in chapter 5: "Depart from me, Lord, for I am a sinful man"; and as the centurion, above in chapter 7: "Lord, I am not worthy that you should enter under my roof"; because, according to that passage of Sirach 13, "he who associates with one more honorable than himself takes a burden upon himself." Whence Ambrose says: "A weak mind does not grasp the word of God, nor can it sustain the weight of wisdom." And since they were less fit for divine cohabitation, therefore they were heard.

On account of which it is added: But he, boarding the boat, returned. The Lord did not wish to be burdensome to anyone; whence Matthew 10: "And whoever shall not receive you, going out, shake the dust from your feet"; and Matthew 7: "Do not give what is holy to dogs, nor cast your pearls before swine." But the Samaritans had acted more prudently than these, of whom John 4 says: "When the Samaritans had come to him, they asked him to remain there. And he stayed with them two days." But astonishment had surrounded these people, just as it had Peter, above in chapter 5. Therefore they could say that passage of Job 31: "I always feared God as waves swelling over me, and I was unable to bear his weight."

In this also it is given to understand spiritually that the Lord, when rejected, departs; 1 Chronicles 28: "If you seek him, you shall find him; but if you forsake him, he will cast you off forever." It is also intimated that the Lord does not abandon us unless we first repel him, but rather presses himself upon us; whence Revelation 3: "I stand at the door and knock," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
