[[commentary]]
quote='''
And behold, you shall be silent, etc. Here is touched upon the sign of authority, and he gives a sign of penalty on account of the vice of unbelief. He therefore sets forth the sign of silence up to the appointed time, until the day when these things shall come to pass: so that thus he might say that word of the Psalm: "But I, as a deaf man, heard not; and as a mute man not opening," etc. Nor is it a wonder if he was made mute on account of his own unbelief, since the unbelief of others made Ezekiel mute: Ezekiel 3: "You shall be mute and not as a man who rebukes, because they are a provoking house." — And therefore he adds the reason for the silence, namely the vice of unbelief: Because you did not believe my words, which shall be fulfilled in their time. Conversely, it is said below in the same chapter concerning Mary: "Blessed are you who believed, because those things shall be accomplished that were spoken to you by the Lord." Before the punishment he did not believe, but afterward, because, as is said in Isaiah 28, "affliction alone shall give understanding to the hearing." Therefore the words of God's messengers are not to be despised, because God punishes the unbelieving: Exodus 23: "Behold, I send my Angel"; and it follows: "Observe him and hear his voice, and do not think him one to be despised, for he will not forgive when you have sinned"; Hebrews 2: "For if the word spoken through Angels was made steadfast, and every transgression and disobedience received a just recompense of reward, how shall we escape if we have neglected so great a salvation? Which, having at first begun to be declared by the Lord, was confirmed unto us by those who heard him, God also bearing witness by signs and wonders and various miracles and distributions of the Holy Spirit according to his will." And therefore there is no place for unbelief.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
