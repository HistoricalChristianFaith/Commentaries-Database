[[commentary]]
quote='''
"Now the servants stood." Here is described the third, namely from the denial the cooling of affection: which is intimated in this, that Peter, now forgetful of the Lord, stood at the charcoal fire with the servants, and again, his interior warmth having grown lukewarm, he sought solace in the exterior; therefore he says: "Now the servants and officers stood at a charcoal fire," who namely had seized the Lord: "because it was cold, and they were warming themselves." Augustine: "It was not winter, and yet it was cold, which is wont to happen sometimes even at the vernal equinox." "Now Peter also was standing and warming himself": for he had lost that fire, of which Luke twelve says: "I came to cast fire upon the earth," because he had grown lukewarm. Bede: "So greatly did the prince of the Apostles grow lukewarm with the cold of unfaithfulness, that at the voice of one maidservant he was afraid to confess Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
