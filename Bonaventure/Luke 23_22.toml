[[commentary]]
quote='''
Fourth, as regards the repugnance between the condemnation and right reason, there is subjoined: But he said to them a third time: What evil has this man done? I find no cause of death in him. For since there was no cause of death in him, to kill him was against the dictate of right reason. — And because for the envious mind reason does not suffice without punishment, he therefore adds: I will therefore chastise him and release him. Nor did he only say this in word, but he also did it in deed, according to John 19: "Then Pilate took Jesus and scourged him." Whence the Gloss: "He offered this chastisement by mocking and scourging to the desires of the wicked, lest they rage even to the point of crucifying him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
