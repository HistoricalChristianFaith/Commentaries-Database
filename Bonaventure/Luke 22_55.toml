[[commentary]]
quote='''
And therefore he adds: Now when a fire had been kindled in the middle of the courtyard and they were sitting around it, Peter was in their midst: in which is shown the tepidity of love and of the interior fire. Whence the Gloss: "What the malignant assembly was carrying on inside the house of the high priest, the fire kindled outside amid the cold of the night was figuratively demonstrating. Growing numb from this cold for a time, Peter began to warm himself at the coals of the servants, as it were, because he was seeking the consolation of temporal comfort in the company of the faithless"; and concerning this fire, Micah 6: "Still there is fire in the house of the wicked and treasures of iniquity." And here it is intimated that when the fire of iniquity and cupidity abounds—concerning which Job 15: "Fire shall devour the tents of those who gladly accept bribes"—the fire of charity shall grow cold, concerning which above in chapter 12: "I have come to cast fire upon the earth" etc. Whence also Matthew 24: "Because iniquity shall abound, the charity of many shall grow cold." And made lukewarm by this fire, a man becomes prone to denying Christ and indeed to every evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
