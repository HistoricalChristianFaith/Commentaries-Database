[[commentary]]
quote='''
When he had said these things, etc. The preambles to the wondrous raising of Lazarus have been set forth; here are set forth the concomitants and consequences. First is set forth the powerful calling of Lazarus himself. The authoritative calling of Lazarus is indicated in this, that he cried out with a loud voice: Lazarus, come forth: he speaks imperiously: Come, and cries out with a loud voice, because at his voice the general resurrection will take place, according to what was foretold above in the fifth chapter: "The hour comes, in which all who are in the tombs shall hear the voice of the Son of God, and those who have done good shall come forth to the resurrection of life, but those who have done evil to the resurrection of judgment."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
