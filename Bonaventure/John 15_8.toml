[[commentary]]
quote='''
In this is my Father glorified, that you bear very much fruit: namely, that people be converted by your word and example; Matthew 5: "So let your light shine before men, that they may see your good works and glorify your Father, who is in heaven"; and from this you become my disciples, that is, imitators of me, who bore very much fruit through my death, as above in chapter twelve: "If a grain of wheat dies, it bears much fruit." So also the Apostles: whence the Church sings of them that "they planted the Church with their blood"; Colossians 1: "I fill up what is lacking of the sufferings of Christ".
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
