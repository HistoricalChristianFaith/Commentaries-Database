[[commentary]]
quote='''
"My sheep hear my voice." Here the presentation of a certain sign is noted, which indeed consists in this: that he is heard by the sheep, and the sheep follow him, and he himself preserves them; this is certainly the mark of a shepherd. Therefore he says: "My sheep hear my voice," namely by believing, because "faith comes from hearing," Romans chapter ten. "And I know them," by discerning them from the wicked, not by face, but by heart: Hebrews chapter four: "He is the discerner of the thoughts and intentions of the heart, and no creature is invisible in his sight; but all things are naked and open to his eyes"; Matthew chapter twenty-five: "I know you not," is said of the wicked; on the contrary, of the good, Second Timothy chapter two: "The Lord knows those who are his." "And they follow me," through imitation: Matthew chapter sixteen: "Whoever wishes to come after me, let him deny himself and take up his cross and follow me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
