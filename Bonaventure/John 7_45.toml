[[commentary]]
quote='''
Here the rebuke of the returning officers is noted, because they had done nothing of what they had been sent to do; therefore the Pharisees demand the reason from them, so as to reproach them. Therefore he says: "The officers therefore came to the chief priests and Pharisees," yet they did not bring him along: "and they said to them: Why have you not brought him?" For you were sent for this purpose: thus you have failed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
