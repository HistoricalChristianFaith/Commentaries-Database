[[commentary]]
quote='''
On account of the excellence of authority, he adds: And he shall go before him in the spirit and power of Elijah. The spirit and power of Elijah is described in Sirach forty-eight: "Elijah arose like fire, and his word burned like a torch"; and of John it is said in John five: "He was a burning and shining lamp"; and therefore, on account of the great conformity, he is called Elijah: Matthew eleven: "And if you are willing to receive it, he is Elijah"; and also seventeen: "Elijah has already come," etc. And the execution of authority is added in what is said: To turn the hearts of the fathers to the children, that is, the understanding of the Patriarchs to their imitators. Bede: "He turns the hearts of the fathers to the children when he pours into the people by preaching the spiritual understanding of the Saints." This had been foretold concerning Elijah in the last chapter of Malachi: "Behold, I will send you Elijah the prophet, before the great and terrible day of the Lord comes. And he shall turn the heart of the fathers to the children, and the heart of the children to their fathers, lest perhaps I come and strike the earth with anathema." And so that he may be shown in all things conformed to Elijah, he adds: And the unbelieving to the prudence of the just, that is, to faith, which is their prudence, through which they believe themselves to be justified; Romans three: "We reckon that a man is justified by faith without the works of the Law"; whence Habakkuk two: "He who is unbelieving, his soul shall not be right in himself, but the just shall live by his faith." — And because this conversion was preparing for the reception of Christ's coming, therefore he adds: To prepare for the Lord a perfect people. For thus it had been foretold concerning him in Isaiah forty: "The voice of one crying in the desert: Prepare the way of the Lord, make straight in the wilderness the paths of our God." When the path is straight, then it makes one perfect: Proverbs four: "But the path of the just, like a shining light, proceeds and increases even to the perfect day"; John, however, was shining like a lamp and was leading the people by the hand to see the true and perfect light. The authority, therefore, and office of John was to run before and to foretell Christ: whence concerning him is understood that passage in Malachi three: "Behold, I send my Angel, and he shall prepare the way before my face." Whence his preaching was prefigured in the preaching of Moses in Exodus nineteen: "Be prepared for the third day," so that we take day for year, because in the third year after the preaching of John, Christ preached openly. Thus Samuel began in 1 Kings seven: "Prepare your hearts for the Lord," etc.; thus also every preacher: whence Bede: "He who preaches faith and works, what else does he do but prepare the way for the coming Lord to the hearts of his hearers?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
