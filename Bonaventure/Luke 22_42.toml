[[commentary]]
quote='''
Christ, praying according to reason, expressed the will of the flesh, by which He shrank from the passion, when He said: "Let this cup pass from me"; yet He conformed the will of reason to the will of the Father and set it before the appetite of the flesh, when He said: "Not my will, but yours be done." And thus one will was not contrary to the other: for "according to the divine will He willed what was just, according to the will of reason He consented to justice, but according to the will of the flesh He refused the suffering, yet did not accuse justice. And thus each will operated what was its own and followed what pertained to it: the divine will, justice; the rational will, obedience; the will of the flesh, nature"; and through this there was in Christ no struggle and conflict, but a peaceful ordering and an ordered tranquility.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25204.html'
source_title="Breviloquium"

[[commentary]]
quote='''
Fourth, as regards the discretion of prayer, he adds: Saying: Father, if you will, remove this cup from me. By this cup is understood the passion, because in a cup drink is drunk in measure, according to that passage of the Psalm: "You shall feed us with the bread of tears and give us drink in tears in measure." This cup Christ drank when he voluntarily tasted the passion; the Psalm: "He shall drink from the torrent along the way," etc.; and Matthew twenty: "Can you drink the cup that I am about to drink?" This cup Christ willed to drink by the will of reason, but shrank from by the will of sensuality. — Whence because reason ruled over sensuality, he therefore adds: Nevertheless, not my will, but yours be done: in which it is apparent that he was petitioning with discretion, because he was subjecting the will of the flesh to the will of reason and to the will of the Divinity, according to that passage in John six: "I came not to do my own will, but the will of him who sent me." It appears therefore that reason, as a discreet and skilled advocate, put forward the prayer on behalf of sensuality, while nevertheless preserving the form of divine law. Now the Lord prayed this in order to show in himself the truth of his humanity, to condescend and give a pattern to his weak members. Hence Bernard: "I recognize the voice of the sick in the physician, I consider the charity, I am amazed at the compassion, I tremble at the condescension." For this is wonderful, how he deigned thus to take upon himself our infirmities.

It can also be explained that Christ prayed on behalf of his members, that he asks that the cup be taken away, that is, the scandal of the passion, or the fear of death.

In another way, as Bede explains, for the Jews: either that this death not be inflicted upon Christ through the Jews, lest they be so blinded, or that those who have been blinded might be called back; and this is for the cup to be taken away from them. Then the sense is: from me, that is, from those who are mine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
