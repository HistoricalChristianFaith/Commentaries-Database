[[commentary]]
quote='''
Having determined the opportunity for preaching, here is determined the manifestation made through preaching. And because this manifestation was first made particularly, and secondly commonly: therefore first it treats of the preaching made to the woman; secondly, of the preaching made to the Samaritans, at the passage: "The woman therefore left her water jar." And because the preaching of faith is not efficacious except with the consent of free will, and free will does not consent unless it is aroused by God: therefore the Lord first arouses the woman; secondly, to her once aroused and consenting, He announces the truth of faith. The Lord therefore arouses the woman in this order, namely first by requesting a service; secondly, by promising or offering a benefit; thirdly, by explaining the benefit offered.

First He arouses her by requesting the service of a drink, which the woman was able to provide, because she had come to draw water. For this reason it says: "A woman of Samaria came to draw water:" and so she was able to give a drink, and Christ was in need and therefore asked. Therefore it follows: "Jesus says to her: Give me to drink." He was indeed in need of drink, because there was no one to serve Him.

It is asked: since the Jews regarded the Samaritans as unclean, and the Lord kept the Law: whence is it that he asked to drink from a Samaritan woman? Furthermore, he knew her response before he asked, and he knew that she would not give the drink: therefore he was asking in vain and foolishly. Chrysostom responds that the Lord regarded the keeping of such observances as indifferent, as is said in Matthew 15, that nothing external defiles a man: and therefore he did not refrain from asking from her, although she was a Samaritan. To the objection that he knew she would not give: it must be said that he knew she would respond to him prudently, and so that from her response he might have an occasion for teaching, therefore he asked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'

[[commentary]]
quote='''
Likewise, John 4: Give me to drink: Augustine in the original, Homily 15 on John: "In everything that Christ did as man, He was providing an example for those who would believe in Him"; and afterwards: "He asks to drink and promises to give drink, He is in need as one about to receive and promises as one about to satisfy." But it is certain that He was not in need of spiritual drink, because He was promising that: therefore He was in need of bodily drink and was requesting it. But you may object with the Gloss as though it were contrary, which says: "Although Jesus could thirst after His weariness, nevertheless He does not demand this drink"; but this is understood to mean that He was not principally seeking this drink, lest the Gloss contradict the deed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'

[[commentary]]
quote='''
Likewise, Jerome to Rusticus: "What is lowlier than the Samaritan woman? Yet she not only believes in the Messiah, whom she recognizes at the well, but also, while the Apostles were buying food, she refreshes the hungry one and sustains the weary one": therefore it appears that Christ was bodily sustained by her.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
