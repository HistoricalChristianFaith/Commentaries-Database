[[commentary]]
quote='''
O what a loving mother we have! Let us conform ourselves to our mother and follow her loving-kindness. So greatly did she have compassion for souls that she counted temporal loss and bodily suffering as nothing. So for the salvation of our soul, let it please us to crucify our body. It is said in Matthew: "When Jesus was in the house of Simon the leper, a woman came having an alabaster jar of ointment, and she broke the alabaster jar and poured the ointment over the head of Jesus. And the house was filled with the fragrance of the ointment. Seeing this, the disciples murmured, certain of them saying: Why this waste? For it could have been sold for much and given to the poor. And Jesus said: Why do you trouble this woman? She has wrought a good work upon me: for the poor you have always with you, but me you do not always have." Magdalene bears the type of penitents; she broke the alabaster jar of ointment out of the loving-kindness which she had toward Christ. And we ought to have loving-kindness toward the universal Church and toward the penitent soul. And just as Magdalene by sinning lost God, so when she anointed the feet and head of Christ, she found Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'
