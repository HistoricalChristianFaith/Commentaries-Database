[[commentary]]
quote='''
Third, regarding the honor of his retinue, he adds: And behold, two men were speaking with him. For it was not fitting that the Lord of glory should be seen alone, but that he should have an honorable retinue; therefore regarding this he adds: And they were Moses and Elijah, seen in majesty. These two were persons to be honored: Moses, I say, on account of his lawgiving, according to Numbers 12: "Not so my servant Moses, who is most faithful in all my house: for I speak to him mouth to mouth, and openly and not through riddles and figures does he see the Lord"; Elijah, however, on account of his excellence of prophecy together with his working of miracles. Whence Sirach 48, speaking to Elijah: "Who can glory like you? You who raised the dead from the netherworld, from the lot of death, by the word of the Lord God." Whence also, in order to show this excellence, the Lord appeared in a special manner to both of them in a figure on Mount Horeb: to Moses first, as is said in Exodus 3, and to Elijah afterward, as is said in 3 Kings 19, on the same Mount Horeb. Therefore, on account of their worthiness and preeminent dignity, he appeared in their company; or rather, because one of them was dead and the other living, one from heaven and the other from the netherworld, so that he might have testimony from every kind, and it might be shown that he is the one who will make both the living and the dead glorious. Whence in the Gloss it is said: "Therefore one living and one dead appear, to signify that Christ would die and live again, and that we might be alive to God and dead to the world." Or these two appear in order to show that the Law and the Prophets were in accord with the Lord Jesus Christ; whence in the Gloss of Bede: "Moses the lawgiver and Elijah, the foremost of the Prophets, appear with the Word, to show that he is the one who spoke in the Law and the Prophets, and whom the Law and the Prophets promised," so that thus that word of Matthew 21 might be verified: "Those who went before and those who followed cried out: Hosanna to the Son of David."

And since the Law and the Prophets attest not only to the glory of Christ, but also to his passion, which is the way into glory, therefore it is added: And they spoke of his departure, which he was about to accomplish in Jerusalem. Departure rightly names the passion, because in it there was an excess of humility, according to Philippians 2: "He emptied himself, taking the form of a servant"; and afterward: "He humbled himself," etc. There was also an excess of poverty, according to Lamentations 3: "Remember my poverty and my transgression, the wormwood and the gall." There was an excess of suffering, according to Lamentations 1: "O all you who pass by the way," etc. There was also an excess of love, according to Ephesians 2: "God, who is rich in mercy, on account of his exceedingly great love, when we were dead in sins," etc.; and Romans 8: "He who did not spare his own Son, but delivered him up for us all, how has he not also given us all things together with him?"

That departure he accomplished in Jerusalem, where he was crucified, in which was the consummation of our redemption, according to Hebrews 2: "It was fitting for him, for whom are all things and through whom are all things, who had brought many sons into glory, to perfect the author of their salvation through suffering." Hence he himself also foretold to his disciples in Luke 18: "Behold, we go up to Jerusalem, and all things shall be consummated," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
