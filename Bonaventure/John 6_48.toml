[[commentary]]
quote='''
"I am the bread of life"; and this for believers, because, as is said in Proverbs three, "she is a tree of life to those who lay hold of her," namely through faith: "and he who holds her fast is blessed," who holds fast through comprehension. And that he is the bread of life, he shows through the effect, because namely he gives the life of grace and the life of glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
