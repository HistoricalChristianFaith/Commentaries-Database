[[commentary]]
quote='''
For he knew who it was that would betray him: therefore he said: You are not all clean. Therefore the Evangelist, where he speaks of the betrayer, shows that the Lord knew, lest anyone believe that Christ as a man could be deceived: above in chapter 6: "Jesus knew from the beginning who they were that did not believe, and who it was that would betray him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
