[[commentary]]
quote='''
Second, as regards the hardening of wickedness, it is added: But when he said these things to them, the Pharisees and the lawyers began to press him vehemently: in which they show that their heart was hardened and weighed down upon hearing the divine word, so that it might be shown that in them was fulfilled that passage from Isaiah 6: "Blind the heart of this people and close its eyes and weigh down its ears"; and Matthew 13: "The heart of this people has grown fat, and with their ears they have heard with difficulty." Nor was there in them only hardening, but also an assault upon the truth: whence he adds: And to assail his mouth concerning many things, as if that most pure mouth had spoken evil or falsehood. Whence that passage from Amos 5 was fulfilled: "They hated the one who reproves in the gate, and they abominated the one who speaks perfectly"; and therefore Proverbs 9: "He who instructs a scoffer brings injury upon himself"; because the scoffer turns to abuse on account of the truth heard.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
