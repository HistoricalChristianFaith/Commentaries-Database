[[commentary]]
quote='''
Third, as regards the certifying assertion, he adds: Amen I say to you, this generation shall not pass away until all things are fulfilled. Gloss: "What I say to you, await with certainty." This generation, however, he calls the mortal generation, according to that passage of Ecclesiastes one: "A generation passes away, and a generation comes." This passes away when it passes over to immortality through the resurrection. Gloss: "From mortality to immortality." And this resurrection will not occur before the consummation of the things foretold, because, Job fourteen, "man, when he has fallen asleep, will not rise again until the heavens are worn away."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
