[[commentary]]
quote='''
Second, he presents a question to the Pharisee, so that he may be directed to the truth, when it is added: Two debtors owed a certain creditor, etc. He proposes the case in general terms, understanding by these debtors, and giving to be understood thereby, sinners, who are bound by great debts, according to that passage in Matthew chapter six: "Forgive us our debts," that is, our sins, "as we also forgive our debtors," etc. By the creditor we understand Christ, according to that passage in Matthew chapter twenty-five: "You wicked and slothful servant, ought you not to have put my money to the bankers, and at my coming I would have exacted what is mine with interest?" And because not all sin equally nor are equally obligated, therefore it is added: One owed five hundred denarii: in which is shown the full obligation on account of the fivefold transgression of evangelical perfection, for completeness is understood by the hundred. And the other fifty: this is said with regard to the half-full obligation, which consists in the fivefold transgression of the Decalogue itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
