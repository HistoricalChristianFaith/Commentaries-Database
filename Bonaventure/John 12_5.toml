[[commentary]]
quote='''
Why was this ointment not sold for three hundred denarii and given to the poor? Matthew twenty-six: "To what purpose is this waste? For it could have been sold for much and given to the poor." And because he seemed to have said this out of piety, the Evangelist shows that he said this out of cupidity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
