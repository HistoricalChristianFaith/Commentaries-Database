[[commentary]]
quote='''
"If I do not do the works of my Father," namely works of omnipotence; "do not believe me," that is, when I say that I am equal to the Father; Exodus four, Moses said: "They will not believe me and will not hear my voice, but will say," etc.; and therefore the Lord gave him signs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
