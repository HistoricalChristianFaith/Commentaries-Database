[[commentary]]
quote='''
He who does not love me does not keep my words: and therefore such a one does not merit to see me. Such is the world and the worldly: below in chapter 15: "If the world hates you, know that it hated me before you"; and therefore it does not keep his commandments: and therefore he does not manifest himself to the world. And lest you think that he spoke his own words and not the Father's, he adds: And the word which you have heard is not mine, that is, the word: it is an antiptosis, in which one case is put for another: but of the Father who sent me: above in chapter 12: "I have not spoken of myself: but the Father who sent me, he gave me a commandment, what I should say and what I should speak."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
