[[commentary]]
quote='''
Third, as regards the lovingkindness toward restored humanity, he adds: And when she has found it, she calls together her friends and neighbors. By the friends and neighbors of divine wisdom are understood the good Angels and holy souls. Whence the Gloss: "The friends and neighbors are the heavenly powers, who are as close to God as they more nearly contemplate him." They are therefore called friends of wisdom because they love her and are loved by her, according to that passage of Wisdom 7: "Through the nations she passes into holy souls and makes them friends of God and prophets. For God loves none but the one who dwells with wisdom." To call together, moreover, is nothing other than to unite in the oneness and conformity of love: Job 25: "Power and terror are with him, who makes concord in his high places"; and through this concord of mutual love he bestows a common matter of joy. — And therefore he adds: Saying: Rejoice with me, for I have found the coin which I had lost. For Wisdom invites to shared rejoicing, because this is the law of charity: First Corinthians 13: "Charity does not rejoice over iniquity, but rejoices together with the truth"; and the Wise Man says in Wisdom 8: "Thinking on these things, that immortality is in the contemplation of wisdom, and in her friendship good delight," because she wills the joys of all to be shared, not private, as especially in that heavenly Jerusalem above. Whence Tobit 13: "Give thanks to the Lord in your good things and bless the God of the ages, that he may call back to you all your captives, and you may rejoice for ever and ever." For in this rediscovery of the coin, the restoration of the number of the elect in that Jerusalem takes place; and this is a great matter of gladness: Isaiah 65: "Behold, I create Jerusalem a rejoicing and her people a joy," because they rejoice together with divine wisdom and with our salvation, according to that passage of the last chapter of Isaiah: "Rejoice with Jerusalem and exult in her, all you who love her; be glad with her in joy, all you who mourned over her, that you may suck and be filled from the breasts of her consolation; that you may drink deeply and abound in delights from her all-encompassing glory."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
