[[commentary]]
quote='''
Thirdly, with regard to the approbation of the truth discovered, it is added: And he said to him: You have answered rightly: because you brought forth a word of rectitude, which pertains to love, according to that of Song of Songs 1: "The righteous love you"; or you spoke according to the rule of wisdom, according to that of Proverbs 8: "All my words are just, there is nothing crooked or perverse in them; they are right to those who understand and equitable to those who find knowledge."

And because one must live according to the rule of rectitude, therefore he adds: Do this, and you shall live, because, according to that of James 1, "if anyone is a hearer of the word and not a doer" etc.; and Romans 2: "For not the hearers of the law are just before God, but the doers of the law shall be justified." And truly you shall live, because you will attain eternal life: for Matthew 19: "If you wish to enter into life, keep the commandments"; whence John 13: "If you know these things, blessed shall you be, if you do them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
