[[commentary]]
quote='''
That price is most precious. On account of this Isaiah says: "A man shall be more precious than gold, and a human being than pure gold of Ophir." This he says of Christ, who made us precious.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'
