[[commentary]]
quote='''
Second, regarding the perversity with respect to King David, the chief worshiper of God, he adds: And he proceeded to send another servant; The Gloss says: "The other servant is David the prophet, who after Moses invited the tenants of the vineyard to the exercise of good works by the melody of psalmody and the sweetness of the harp." The Lord sent him when he chose him from the pastures to rule and feed his people, according to what the prophet David himself says in the Psalm: "He chose David his servant and took him from the sheepfolds. From following the ewes with young he took him, to shepherd Jacob his servant and Israel his inheritance." Whence 2 Kings 7: "Thus shall you say to my servant David: I took you from the pastures, following the flocks, that you should be the leader over my people Israel; and I was with you in all things, wherever you went, and I made you a great name, like the name of the great ones who are on the earth." Whence also to him, namely David, he gave a royal throne forever; to the same he gave the spirit of prophecy; to the same he gave the song of psalmody, so that he might thus incline that stubborn people.

And yet he could not soften the hardness of the Jews, on account of which he adds: But they, beating this one also and treating him with contempt, sent him away empty, because they despised his governance and leadership. Whence the Gloss: "They send him away empty, treated with contempt, saying: What portion have we in David, or what inheritance in the son of Jesse?" Second Kings twenty. Where it is also set forth beforehand how they pursued David with Absalom: Second Kings fifteen; "A messenger came to David saying: With all their heart all Israel follows Absalom. And David said to his servants: Arise, let us flee; there will be no escape for us from the face of Absalom." And afterward in the sixteenth chapter it is said concerning the insults inflicted upon him: "Thus Shimei spoke, when he cursed the king: Go out, go out, man of blood and man of Belial! The Lord has repaid upon you all the blood of the house of Saul: and behold, evils press upon you, because you are a man of blood."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
