[[commentary]]
quote='''
"That man went away." Here the fourth point is touched upon, namely the persecution of the manifested Christ. For the Jews learned, through that man's report, that Christ had made him well. Hence he says: "That man went away and" announced to the "Jews," who had namely inquired of him, "that it was Jesus who had made him well." He did not say this by way of detraction or accusation, but by announcing the name of Christ: hence the Gloss: "He announces salvation to the Jews, that they might follow: but they on the contrary persecute."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
