[[commentary]]
quote='''
And this is evident from their crafty interrogation, when it is added: Is it lawful for us to give tribute to Caesar, or not? according to the decree of divine law; in this they propose a deceitful question because, whichever answer is given, they intend to lead him into an absurdity. For either he would say yes, and thus he would seem to speak against the Law and against the Jewish people and common opinion; or he would say no, and then they would hand him over to the authority, as a rebel against Caesar and an enemy of the whole empire. Whence the Gloss: "The Pharisees, who applauded themselves for their righteousness, who gave tithes and first-fruits to God, denied that tributes should be paid to a man." And hence it is that they flattered Christ, so that they might extract from the mouth of Christ such a pronouncement, so that afterward they might say that word from John 19: "If you release this man, you are not a friend of Caesar; for everyone who makes himself king opposes Caesar."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
