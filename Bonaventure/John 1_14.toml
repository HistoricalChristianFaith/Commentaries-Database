[[commentary]]
quote='''
Since the effective principle of things could not have been, nor was it fitting to be, anything other than God; and since it is no less a thing to restore created things than to bring them into being, just as well-being is no less than simple being: it was most fitting that the restorative principle of things be the most high God, so that, just as God had created all things through the uncreated Word, so He might heal all things through the incarnate Word. Since, therefore, God made all things powerfully, wisely, and most excellently or benevolently, it was fitting that He should restore them in such a way as to display His power, wisdom, and benevolence. For what is more powerful than to unite extremes supremely distant into one person? What is more wise and more fitting than that, for the perfection of the whole universe, there should be a union of the first and the last—namely, of the Word of God, which is the principle of all things, and of human nature, which was the last of all creatures? What is more benevolent than that the Lord should take on the form of a servant for the salvation of the servant?

And because carnal, animal, and sensual man did not know, nor love, nor follow anything except what was proportionate and similar to himself, therefore, in order to rescue man from this state, the Word was made flesh, so that by man, who was flesh, it could both be known and loved and imitated, and through this, man, knowing and loving and imitating God, might be healed from the disease of sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25204.html'
source_title="Breviloquium"

[[commentary]]
quote='''
Since the restorative principle restores through grace, and every thing is more fully and more perfectly in its font and origin than elsewhere, it is necessary that in our restorative principle, namely Christ the Lord, there was the fullness of all grace. And since the restorative principle in restoring holds the character not only of a principle, but also of a mean and of an extreme—of an extreme indeed in making satisfaction, of a mean in reconciling, and of a principle in pouring forth from above—therefore it is necessary that in Christ there was the fullness of grace by reason of the extreme that makes satisfaction, of the mean that reconciles, and of the principle that pours forth from above.

It is necessary to posit in Christ a grace above every grace, to be venerated with every manner of reverence, which we call the grace of union, by reason of which Christ as man is God blessed above all things, and therefore to be venerated with the worship of latria.

It is necessary that the incarnate Word be full of grace and truth, so that from his fullness all the just may receive, just as all the members receive from the head the influx of motion and sense.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25204.html'
source_title="Breviloquium"

[[commentary]]
quote='''
Since the restorative principle is not only the Word insofar as it is the Word, but also insofar as it is incarnate, which, by the very fact that it is incarnate, offers itself to all for the knowledge of truth and presents itself to all who worthily approach for the grace of healing: hence it is that, as one full of grace and truth, for the greater evidence of signifying and efficacy of sanctifying, he instituted the Sacraments in elements together with words, so that, while the elements presented themselves to the eyes and the words to the ears, which are the two senses most conducive to knowledge, they would give evidence of the signification expressed; and then also the words would sanctify the elements, so that the efficacy of human healing would become more complete.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"

[[commentary]]
quote='''
The second key is the understanding of the Incarnate Word, through whom all things are restored. Who is speaking? The Word of God, of whom John writes in his first chapter: "The Word was made flesh, and dwelt among us," where He displayed two natures within a single Person. The book of Scriptures is understood precisely through that key, the Incarnate Word, the one eminently concerned with the works of restoration. For unless you understand the order and origin of restoration, you cannot understand Scriptures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25203.html'
source_title='Collations on the Hexaemeron, Collation 3'

[[commentary]]
quote='''
This Hierarch is acceptable to God, for we need a most sacred Reconciler. And so John writes: "We saw His glory—glory as of the only-begotten of the Father—full of grace and of truth," because of the great number of graces. He enjoyed, indeed, the grace of an individual Person, the grace of the Head by which He influenced the members, and the grace of union which is infinite and flowing from a single source. For this reason He was acceptable to God, not only because in the form of God, but as God. Because He is God, He cannot be unacceptable. Hence He is called God, and the holiest examples come from Him. Hence, wherever in the Scriptures there is a reference to emanations, to the rivers of paradise, to gushing fountains, they apply to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25203.html'
source_title='Collations on the Hexaemeron, Collation 3'

[[commentary]]
quote='''
"And the Word was made flesh." Here the fourth point is touched upon, namely the mode of coming, which was through the assumption of flesh, in which there was the highest union: therefore he says: "The Word was made flesh": that is, united to flesh; Philippians 2: "He humbled himself, taking the form of a servant." And because this union was unconfused, it was also undivided: therefore he says: "And dwelt among us," that is, in our nature: "he dwelt," therefore he was not changed: "he dwelt," therefore he was not separated. Concerning this dwelling, Leviticus 26: "I will set my tabernacle in the midst of you, and my soul shall not cast you off"; and in the Psalm: "In peace is his place made, and his dwelling in Sion."

"And we saw his glory." We knew; "glory," namely with respect to the Divinity. Therefore he says: "Glory as of the Only-begotten from the Father"; concerning which glory, Second Peter chapter one: "He received from God the Father honor and glory, when a voice came down to him from the magnificent glory: This is my beloved Son." With respect to the humanity, however, he is said to be "full of grace and truth," that is, we saw him, full of grace and truth, truly full, because in him, as is said in Colossians chapter two, "all the fullness of the Divinity dwells bodily"; full of grace, for draining away sins; full of truth, for fulfilling promises; Sirach chapter twenty-four: "In me is all grace of life and truth." And it should be noted that what he says, "as of the Only-begotten," is not a mark of comparison or similitude, but of expression.

It is asked: "The Word was made flesh." Here three words are spoken, and the question is: why did he say "Word" rather than "Light," since the Word has been described both under the notion of word and under the notion of light? If you say that "Light" is common to the three persons, while "Word" belongs to the Son alone, who alone became incarnate, then the question arises: why did he not say "Son"? And why was the Son alone incarnate, since the divine goodness is supremely communicative in each of the hypostases?

The reason why the Son alone became incarnate is taken from the standpoint of nativity, of work, and of effect. By reason of nativity: because he is the son of the Virgin, and "son" ought not to be attributed to another person. By reason of work: because it is re-creation, and re-creation is through him through whom creation came. From the standpoint of effect: because he made us sons and co-heirs, through the natural Son we ought to be brought into the inheritance and into sonship. Moreover, he said "Word" rather than "Son" in order to exclude a carnal understanding and to manifest a spiritual one. For "Son" is generated carnally among creatures, but "Word" has a spiritual generation. He manifests the spiritual sense, because, as Augustine says, a word clothes itself in sound and does not pass into sound; so the eternal Word clothed himself in flesh.

It is asked: "Was made flesh"; for either the meaning is: was made flesh, that is, changed into flesh; or made flesh, that is, made so as to be flesh. Neither understanding is sound. If you say that the construction is synecdochic, and "flesh" there has the same force as "man"; whence "made flesh," that is, man; then the question arises: why did he prefer humanity to be understood through "flesh" rather than through "soul," since the soul is the nobler part? And why did he use this figurative expression, when he could have used the proper one? It must be said that that union was for our instruction and our salvation: and it was instruction, because visible; and liberation, because passible; and "flesh" denotes the visible and most passible part; therefore, etc.

It is asked: "Full of grace and truth": according to which nature is this said? Not according to the divine, because grace is not in him in that way, but whatever he has is by nature. Nor does it seem to be according to his humanity, because he adds: "Of his fullness we have received grace for grace": but grace is given by God alone, not by a man.

It must be said that in Christ there was a most great singular grace, the greatest that could exist in a man; just as also the grace of union, than which no greater can be conceived. By reason of both he is said to have been full of grace, and by reason of this twofold grace he was the head of the Church. And because the head overflows into all the members, therefore "of his fullness we have all received." Christ is called head according to the human nature united to the divine. Thus the fullness of overflowing is to be understood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'

[[commentary]]
quote='''
In this manner it is possible to find in the illumination of mechanical art, whose entire intention is directed toward the production of artifacts. In which we can perceive these three things, namely the generation and incarnation of the Word, the order of living, and the covenant of God and the soul. And this, if we consider the origin, the effect, and the fruit; or thus: the art of working, the quality of the artifact produced, and the usefulness of the fruit derived.

If we consider the origin, we shall see that the artificial product proceeds from the artisan by means of a likeness existing in his mind, through which the artisan conceives before he produces, and then produces as he has planned. Moreover, the artisan produces an exterior work conformed to the interior exemplar as closely as he can; and if he could produce such a product that would love and know him, he would certainly do so; and if that product were to know its maker, this would be by means of the likeness according to which it proceeded from the artisan; and if it had darkened eyes of knowledge, so that it could not raise itself above itself, it would be necessary, in order that it might be led to knowledge of its maker, that the likeness through which the product had been produced should condescend to that nature which could be grasped and known by it.

By this manner understand that from the supreme Artisan no creature proceeded except through the eternal Word, "in whom He disposed all things," and through whom He produced not only creatures having the nature of a vestige, but also of an image, so that they might be assimilated to Him through knowledge and love. And since through sin the rational creature had the eye of contemplation clouded over, it was most fitting that the eternal and invisible should become visible and assume flesh, in order to lead us back to the Father. And this is what is said in John fourteen: No one comes to the Father except through me; and Matthew eleven: No one knows the Father except the Son, and anyone to whom the Son wills to reveal Him. And therefore it is said the Word was made flesh. Considering therefore the illumination of mechanical art with respect to the production of the work, we shall behold therein the Word begotten and incarnate, that is, the Divinity and the humanity and the integrity of the whole faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FDe%2520Reductione%2520Artium%2520ad%2520Theologiam%2FOpusculum%2520de%2520reductione%2520artium%2520ad%2520theologiam.html'
source_title='On the Reduction of the Arts to Theology'

[[commentary]]
quote='''
According to this same manner one may also find in the illumination of rational philosophy, whose principal concern turns upon discourse. In which there are three things to consider according to the threefold consideration of discourse itself, namely with respect to the speaker, by reason of the utterance, and with respect to the hearer or by reason of the end.

If we consider speech in relation to the speaker, we see that every speech signifies a concept of the mind, and that interior concept is the word of the mind and its offspring, which is known even to the one conceiving it. But in order that it may become known to the hearer, it puts on the form of voice, and the intelligible word by means of that garment becomes sensible and is heard outwardly and is received in the ear of the hearer's heart, and yet does not depart from the mind of the one uttering it.

According to this mode we see in the eternal Word that the Father eternally conceived it by generating, according to that passage of Proverbs eight: The depths did not yet exist, and I was already conceived. But in order that it might become knowable to sense-bound man, it put on the form of flesh, and the Word was made flesh and dwelt among us, and yet remained in the bosom of the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FDe%2520Reductione%2520Artium%2520ad%2520Theologiam%2FOpusculum%2520de%2520reductione%2520artium%2520ad%2520theologiam.html'
source_title='On the Reduction of the Arts to Theology'
