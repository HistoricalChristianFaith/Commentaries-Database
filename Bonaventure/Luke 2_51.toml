[[commentary]]
quote='''
The Lord also submitted to the one commanding; on account of which it is added: And he went down with them and came to Nazareth. Now that passage from Baruch 3 was fulfilled: "After these things he was seen on earth and conversed with men." He went down, I say, which is a sign of humiliation: Song of Songs 6: "I went down into my garden to see the fruits of the valleys," that is, the humble. "For the Lord is high and regards the lowly," namely from near at hand, "and knows the lofty from afar." On account of which it is also added: And he was subject to them. Bernard: "Who? To whom? God to men. God, I say, subjects himself to men: and you, eager to dominate, set yourself before your Creator? For as often as I desire to be set over men, so often do I strive to go before my God, so that the Lord might respond something like this to me: Get behind me, Satan, for you do not savor the things that are of God." Whence he could truly say that passage from 1 Corinthians 9: "Though I was free from all, I made myself the servant of all." And we ought to be subject to all out of love for him: 1 Peter 2: "Be subject to every human creature for the sake of God."

And his Mother etc. Here is described his clarification, and this through two things, namely through the testimony of the Mother and through the indication of his own virtue. As for the testimony of the Mother, it is said: And his Mother kept all these words, so that she might bear witness at the proper place and time, as Bede says in the Gloss. So it is said in Daniel 12: "But you, Daniel, close the book and seal the words until the appointed time." And because she understood these things, therefore it is said: Pondering in her heart, according to that passage from Ecclesiastes 8: "The heart of the wise understands the time and the answer"; and in Mark 9 it is said concerning the transfiguration of the Lord that "the disciples kept the word among themselves." For the Apostles had not yet come, to whom "it was given to know the mystery of the kingdom of God," as is said in Matthew 13, who also might confer with one another, according to that passage from Galatians 2: "I conferred with them the Gospel which I preach among the Gentiles."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'

[[commentary]]
quote='''
Conformity to Christ is consonant with evangelical perfection: but Christ by sheer liberality subjected himself to a human being, Luke 2: And he was subject to them: therefore to subject oneself to another makes one conformed to Christ. But this is done most of all through the vow of obedience. For since Christ the Lord not only gave us to ourselves, but also gave himself to us; and for our sake not only made himself man, but also subjected himself to men: hence it is fitting that we subject not only what we have and our members, but also what we are, that is, our will.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'
