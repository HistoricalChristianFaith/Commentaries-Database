[[commentary]]
quote='''
Fourth, as regards the reverence of the women in following after, he adds: And the women who had come with him from Galilee followed after and saw the tomb. They did this from an affection of piety; whence the Gloss: "When the other acquaintances of Jesus departed after the body was laid down, only the women, who loved more ardently, attended to the office of burial"; and they did this so that they might mourn the dead one whom they had previously loved when he was about to die. And this is a matter of piety and devotion, according to that passage in Sirach 38: "My son, shed tears over the dead, and as one suffering grievously begin to weep, and according to judgment cover his body, and do not despise his burial." "And mourn according to his merit."

Therefore these pious women not only looked upon the burial place, but also upon the buried body: and therefore he adds: And how his body was laid, namely, they saw, and this in order to bestow the service of kindness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
