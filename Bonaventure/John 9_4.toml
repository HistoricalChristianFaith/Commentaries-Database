[[commentary]]
quote='''
I must work the works of him who sent me. These are the miraculous works, which he attributes to the Father, because power is appropriated to him: below in the fourteenth chapter: "The Father abiding in me, he himself does the works"; above in the fifth chapter: "The works which the Father gave me to accomplish, the very works which I do, bear witness concerning me that the Father sent me." The opportunity for doing these works lasts while it is day; the night will come, when no one can work: for then the opportunity ceases: Revelation fourteen: "Henceforth now, says the Spirit, let them rest from their labors, for their works follow them"; and Ecclesiastes nine: "Whatever your hand is able to do, work earnestly, because neither work nor reason nor wisdom nor knowledge will be in the netherworld, to which you hasten." But what this day is, he explains here.

It is asked concerning what he says, that it is necessary for him to work while it is day. But for God it is always day: therefore he never ceases to work. It must be said that he speaks here of the works which he works for us and in us, according to that passage of Isaiah 26: "All our works you have worked in us, O Lord." And with regard to these works night comes, when the last day is closed to us, after which neither will we be able to work, nor God in us nor for us amid evils: whence Matthew 22: "Bind his hands and feet and cast him into the outer darkness."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
