[[commentary]]
quote='''
God, who is just and merciful, ought not to hear us except in those things which pertain to his honor and to our salvation—and such things are those which pertain to the reward of the homeland and to the provision for the journey, the first being three and the following four—hence it is that the petitions of the Lord's Prayer, which teach us what we ought profitably to ask, are seven.

For those things which pertain to divine honor and the reward of the homeland are three, namely the understanding of truth, the reverence of majesty, and the concord of will; or in other words, it is either the vision of the highest truth, which is not seen except by the pure and holy, and this is asked when it is said: Hallowed be thy name, that is, may the knowledge of thy name be given to the perfect, holy, and pure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
These seven gifts of the Holy Spirit are touched upon in the Lord's Prayer. In the first part the gift of fear is sought, when he says: "Our Father, who art in heaven; hallowed be thy name." In the first, our sanctification is sought, and this through the gift of fear. Isaiah: "Sanctify the Lord of hosts, and let him be your dread and your fear."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"
