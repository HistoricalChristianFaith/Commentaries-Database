[[commentary]]
quote='''
"And you have not known him": for they were among those of whom it is said in Titus 1: "They profess to know God, but by their deeds they deny him." "But I know him," and this indeed not out of boasting, but for the sake of speaking the truth. Whence: "And if I say that I do not know him, I will be like you, a liar": and therefore it is necessary to say that I know him. Augustine: "Let arrogance be avoided in such a way that truth is not abandoned." And therefore he asserts this again: I do not say that I do not know him, "but I know him and I keep his word": and this is truly to know God, because it is said in First John 2: "He who says that he knows God and does not keep his commandments is a liar." Thus therefore, having avoided arrogance, the Lord manifests his excellence: because they did not believe that he was greater than Abraham: therefore he shows that he is greater.

Likewise, there is a question about what he says, that they did not know the Father, since it is said in the Law: "Your God is one God": and this they believed.

I respond: It must be said that "Father" is said in two ways: in one way essentially, and thus the Jews knew God the Father, because in this way it belongs to the whole Trinity in relation to creation. In another way it is said personally in relation to the Son, and thus they did not know him, as Augustine says, just as they did not know the Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
