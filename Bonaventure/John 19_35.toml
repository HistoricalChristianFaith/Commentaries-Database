[[commentary]]
quote='''
The third certainty derives from an intellectual vision combined with bodily vision. This occurred in the minds of the apostles. What was from the beginning, what we have heard, what we have seen with our eyes, what we have looked upon and our hands have handled, the Word of Life. And we announce to you nothing else than what we have seen. And elsewhere it is written: He who saw it has borne witness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
And he who saw etc. Here is indicated the fourth point, namely the confirmation of testimony. And he confirms this by his own testimony and by the testimony of Scripture: by his own, because he himself saw and was present: whence he says: And he who saw bore witness. And he approves the testimony, because it is true, whence: and his testimony is true: and because it is certain, whence: and he knows that he speaks the truth. And therefore he says: That you also may believe: because faith is more readily given to one who saw than to one who learned by report: Proverbs 12: "He who speaks what he knows is a judge of justice; but he who lies is a fraudulent witness"; and 1 John 1: "That which was from the beginning, which we have heard, which we have seen with our eyes, which we have looked upon and our hands have handled, of the Word of life" etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
