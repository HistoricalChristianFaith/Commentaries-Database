[[commentary]]
quote='''
In designation of which he adds: But they said: Lord, behold, here are two swords. And he said to them: It is enough. From which it appears that the word of Christ refers more to the spiritual sense than to the carnal. For two swords would never be sufficient for defense against that innumerable multitude who came with swords and clubs. What he therefore says: It is enough, is understood of the thing signified. For by these two swords are understood the two testaments, in which sufficient doctrine is contained for defending the universal Church, according to that passage of Song of Songs chapter four: "Like the tower of David" — yet it is designated through the twofold sword. And in designation of this, the Seraph took with tongs a coal from the altar, which in its two arms has a double blade, Isaiah chapter six. In designation of this also, in Apocalypse chapter nineteen it is said that "from his mouth went forth a sword sharp on both sides"; and concerning these, Isaiah chapter two: "They shall beat their swords into plowshares," because the words of the Old Testament are useful for preaching. — By the two swords is understood a twofold armament, namely spiritual and material. Whence Bernard to Eugenius: "If the material sword in no way pertained to you, when the Apostles said: Behold, here are two swords, the Lord would not have responded: It is enough, but: It is too much. Both therefore belong to the Church, both the spiritual namely and the material: but the latter indeed is to be drawn for the Church, while the former truly by the Church is to be unsheathed: the former by the hand of the priest, the latter by the hand of the soldier, but indeed at the bidding of the priest and the command of the emperor."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
