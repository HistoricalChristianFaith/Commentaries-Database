[[commentary]]
quote='''
And they made him a supper there: because Revelation 3, "If anyone shall open the door to me, I will enter in to him and will sup with him, and he with me." And although it took place in the presence of Lazarus, Lazarus did not minister but ate, so that the truth of the resurrection might be proven: Mark 5, concerning the girl who was raised, "he commanded that something be given her to eat," etc. On account of which he says: And Martha ministered, but Lazarus was one of those reclining at table with him. Martha always ministers and is solicitous as a prudent woman; whence Luke 10: "Lord, do you not care that my sister has left me alone to minister?" Therefore through her we rightly understand the active life, which is anxious with cares.

Spiritually, two things are to be noted here, namely what that banquet was, and what the ointment was.

And it should be noted that we read of a threefold banquet made for the Lord: the first, by Matthew, the converted publican; Matthew nine: As he sat at table in the house, behold, many publicans and sinners sat at table with him; this is the banquet of the penitent:

The second, by Simon the Pharisee; Luke seven: A certain Pharisee asked Jesus to eat with him: this is the banquet of the proficient, because the Pharisees kept the Law.

The third, by Mary, Martha, and Lazarus in Bethany, as here. Bethany is the house of obedience, and this is the religious life, in which people are in the state of perfection, according to that passage in Matthew 19: If you wish to be perfect, go and sell all that you have, and give to the poor: and this is the banquet of the perfect.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
