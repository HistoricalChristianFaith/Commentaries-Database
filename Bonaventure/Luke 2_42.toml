[[commentary]]
quote='''
But as regards his own impulse, the boy Jesus also devoted himself to divine worship: concerning which it is added: And when he was twelve years old; in which it is shown that the boy Jesus devoted himself to divine worship without his parents' company, without their counsel, without their approval. Without their company indeed: for although he went up with the company of his parents, nevertheless he remained without them: on account of which it is said: As they went up to Jerusalem according to the custom of the feast day, namely to pray, as below in the eighteenth chapter, "Two men went up to the temple to pray"; and Acts chapter three: "Peter and John went up to the temple," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
