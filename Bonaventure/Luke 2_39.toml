[[commentary]]
quote='''
And when they had performed etc. After Christ's humiliation according to the precept of the Law and his glorification through the testimony of truth have been described, there is here subjoined the last section of this part, in which is described the consummation of the aforesaid things, and this is stated first with respect to the legal precept, then with respect to the prophetic oracle. As to the consummation of the legal precept, it says: And when they had performed all things according to the Law of the Lord: because, according to what is said in Matthew 5, "I came not to destroy the Law, but to fulfill it"; and again: "One jot, or one tittle shall not pass from the Law, till all be fulfilled." But as to the completion of the prophetic oracle, it adds: They returned into Galilee, to their own city Nazareth: Matthew 2: "Being warned in a dream, he withdrew into the parts of Galilee. And he came and dwelt in a city called Nazareth, that it might be fulfilled which was spoken by the Prophets: He shall be called a Nazarene"; Isaiah 9: "The way of the sea beyond the Jordan, Galilee of the Gentiles, was made heavy." But the scribes did not know this, who said, in John 7: "Search the Scriptures, and see that no Prophet arises from Galilee." And note that according to Augustine in the second book of On the Harmony of the Evangelists, the child Jesus was first carried from Judea into Egypt before he went down into Galilee, because on account of the persecution of Herod he went down into Egypt, and on account of fear of Archelaus he withdrew into the parts of Galilee, returning from Egypt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
