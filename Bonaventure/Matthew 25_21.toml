[[commentary]]
quote='''
If honor and riches: God shall set His good and faithful servants over many things, indeed sons of God and gods they shall be called and shall be, and where His Son shall be, there shall they be also, heirs indeed of God, and co-heirs with Christ. If true security: surely they shall be as certain that these things, or rather this good, shall never and in no way be lacking to them, as they shall be certain that they shall not lose it of their own accord, nor that God who loves them shall take it from His lovers against their will, nor that anything more powerful than God shall separate God and them against their will.

I pray, O God, that I may know you, love you, that I may rejoice in you: and if I cannot do so fully in this life, may I at least advance from day to day, until that fullness shall come. Meanwhile let my mind meditate upon this, let my tongue speak of it, let my heart love it, let my mouth discourse upon it, let my soul hunger for it, let my flesh thirst for it, let my whole substance desire it, until I enter into the joy of my Lord, who is the triune and one God blessed for ever and ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25207.html'
source_title="Breviloquium, Part 7"
