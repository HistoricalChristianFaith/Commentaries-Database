[[commentary]]
quote='''
"As the Father knows me, and I know the Father," so, supply, I know my own, and my own know me. Chrysostom: "'As' is a mark of similitude, not of equality," just as below in chapter 17 the Son, praying to the Father for his disciples, says, "that they may be one, as we also are." This diligence he also makes manifest through its effect: whence he says: "And I lay down my life for my sheep." So the Apostle, 1 Corinthians 15: "I die daily for your glory, brethren"; and the Lord himself, Jeremiah 12: "I have given my beloved soul into the hands of the wicked."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
