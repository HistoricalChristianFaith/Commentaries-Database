[[commentary]]
quote='''
Now the part is concluded in which the Lord preached and showed Himself to the Samaritan woman individually and privately; here begins the second part, in which the Lord preaches to the Samaritans in common and manifests Himself to them. And because this manifestation was made partly through the proclamation of the woman, partly through the discourse of Christ, and this while the disciples were listening, who ought to have been attentive to this same thing, therefore this manifestation proceeds according to this order. For first is noted the diligence of the woman in announcing the name of Christ; second, the eagerness of Christ to receive them; third, the encouragement of the disciples to preach; fourth, the devotion of the Samaritans to believe, to which all things that are determined here are ordered.

First, therefore, is described the vigor of the woman's diligence, which she had for the manifestation of the name of Christ and the conversion of her people, because she immediately went to announce the truth which she had received; on account of which he says: "The woman therefore left her water jar." Having heard the word of faith, she left the water jar so that she might run more quickly and announce, lest perhaps the Lord should depart; or because in her fervor, forgetting that for which she had come, she wished to proclaim Christ. Whence Chrysostom: "This woman teaches us to despise all temporal things when hearing spiritual things." "And she went away into the city," namely to spread abroad the name of Christ. Whence there also follows: "And she says to those men:"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
