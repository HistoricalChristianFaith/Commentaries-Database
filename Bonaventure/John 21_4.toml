[[commentary]]
quote='''
The appearance of the Lord, therefore, is touched upon when it says: Now when morning had come, Jesus stood on the shore. In the literal sense, he stood in the morning, because at night they could not see him; according to the spiritual sense, because morning signifies the time of grace, in which Christ appeared: Romans 13: "The night has passed, and the day has drawn near. Let us therefore cast off the works of darkness and put on the armor of light." And although he appeared, nevertheless the disciples did not recognize him; therefore he says: Yet the disciples did not know that it was Jesus. Chrysostom: "He did not immediately show himself, so that through the miracle which he was about to perform, they might recognize him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked concerning what it says: Jesus stood on the shore: Gregory asks, since the Lord "before his passion walked upon the waves of the sea in the sight of his disciples, above in chapter 6: what is it that after his resurrection he stood on the shore while his disciples labored on the sea"? Gregory responds: "By the sea the present age is signified, by the solidity of the shore the perpetuity of eternal rest. Because therefore our Redeemer had already passed beyond the corruption of the flesh, after his resurrection he stood on the shore."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
