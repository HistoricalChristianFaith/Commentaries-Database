[[commentary]]
quote='''
Was not the Church formed from the side of Christ, when Christ fell asleep on the cross? And from His side flowed forth blood and water, that is, the Sacraments, through which the Church is reborn. From the rib of Adam, Eve was formed, who was joined to him in marriage. Just as man was formed from virgin earth, so Christ from the glorious Virgin. And just as from the side of the sleeping Adam woman was formed, so the Church from Christ hanging on the cross. And just as from Adam and Eve, Abel and his successors were formed, so from Christ and the Church the whole Christian people. And just as Eve is the mother of Abel and of all of us, so the Christian people has the Virgin as mother.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'

[[commentary]]
quote='''
But one of the soldiers opened his side with a lance. Augustine: "Concerning this he does not say wounded, but opened, so that there a door might in a certain way be thrown open, whence the Sacraments of the Church flowed forth." And therefore it is added: And immediately there came out blood and water. Augustine: "This blood was poured out for the remission of sins; this water tempers the saving cup; it provides both a washing and a drink"; Apocalypse 1: "He washed us from our sins in his blood"; and Ephesians 5: "Christ loved the Church, cleansing her by the washing" etc.

It is asked: why was his side opened or wounded after death and not before? And it must be understood that nothing was done to him except what God permitted for a fitting reason. The reason for this is given both allegorically and literally: allegorically, because just as Eve was formed from the side of the sleeping Adam, so the Church was formed from the side of Christ sleeping on the cross. Whence Augustine says: "For this reason the second Adam slept on the cross, so that from there his bride might be formed, from what flowed out of his side." The literal reason is that the Lord Christ, although He showed His humanity, nevertheless wished at the same time to show the truth of His Divinity. Hence He showed this before the Passion in His arrest, this in the Passion in the darkness, and this after death He showed in the flowing forth of water and blood. Hence Ambrose says: "Although the nature of Christ's body was mortal, yet its grace was unlike ours. For after death the blood in our bodies congeals, but from that incorrupt body the life of all flowed forth; water and blood came forth: the former to wash clean, the latter to redeem. We drink our ransom, so that by drinking we may be redeemed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
