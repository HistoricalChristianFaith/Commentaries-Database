[[commentary]]
quote='''
"But Jesus said to them: I am the bread of life," that is, the bread giving life; because he himself is Wisdom, of which Sirach four says: "Wisdom breathes life into her children"; nor is he only life-giving, but indeed also satisfying both the affection and the intellect; whence he says: "He who comes to me," namely through charity, "shall not hunger"; Matthew eleven: "Come to me, all you who labor and are burdened, and I will refresh you." "And he who believes in me shall never thirst," because, as is said above in chapter four, "whoever drinks of the water that I shall give him shall not thirst forever; but the water that I shall give shall become in him a fountain of water springing up into eternal life."

And it should be noted that charity feeds, because it resides in the affection, which is more closely united; faith gives drink, because it regards the act of the intellect, which is less closely united. And therefore, just as drink carries food through the members, so faith and the operation of the intellect directs the way for the virtues residing in the affection, in which the feeding takes place.

There is a question about what he says: "He who comes to me shall not hunger." To the contrary: It is found below in the same chapter that many of his disciples went back; and it is established that they had previously come to him; therefore he speaks falsely. It is to be understood of those who came with a perfect heart, not a feigned one; and these are they who come with persevering charity; otherwise they are regarded as if they had not come, because all their righteous deeds are given over to oblivion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
