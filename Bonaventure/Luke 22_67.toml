[[commentary]]
quote='''
Second, as to the malice in questioning, it is added: Saying: If you are the Christ, tell us. They do not ask this in order to be instructed, but in order to lay snares; whence the Gloss: "They do not desire the truth, but prepare a false accusation, so that, if he were to say: I am the Christ, they might accuse him of arrogating royal power to himself." They were seeking this in John 10: "The Jews surrounded him and said to him: If you are the Christ, tell us plainly."

But this malice did not escape Christ, and therefore it is added: And he said to them: If I tell you, you will not believe me: from which it is apparent that you ask as unbelievers. Whence John 10: "I speak to you, and you do not believe: the works that I do, these bear witness concerning me. But you do not believe, because you are not of my sheep."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
