[[commentary]]
quote='''
"The world cannot hate you," by reviling, because you love it and its glory; "but it hates me," by dishonoring; Galatians, last chapter: "The world is crucified to me, and I to the world." "Because I bear witness concerning it, that its works are evil," by proclaiming the truth; Wisdom 2: "Let us therefore beset the just man, because he is useless to us and contrary to our works and reproaches us with sins against the Law and defames against us the sins of our training"; Amos 5: "They hated him who corrects at the gate." Therefore a certain one said: "Truth begets hatred."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
