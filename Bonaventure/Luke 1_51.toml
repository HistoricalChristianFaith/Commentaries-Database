[[commentary]]
quote='''
Second, she praises him in this work, insofar as it is manifestative of power in the casting down of proud demons and wicked rich. On account of the first she says: He has shown might in his arm, he has scattered the proud in the conceit of their heart. In this is the special praise of God: Job 40: "Scatter the proud in your fury, and looking upon every arrogant one, bring him low." And thus was fulfilled that saying of Sirach 10: "God has destroyed the thrones of proud rulers and has made the meek to sit in their place." And he is said to have done this in his arm, that is, in the Son; Isaiah 40: "Behold, the Lord God shall come with strength, and his arm shall rule." The proud however in the conceit of their heart he calls those who are proud in intellect through presumption and in affection through ambition, as Lucifer and his followers: Job 41: "He beholds every high thing, and he is king over all the children of pride." And thus the sense is: he has scattered those who are proud in the conceit of their heart. — Or otherwise: He has scattered the proud in the conceit of his heart, according to what is said, that the proud by the just judgment of God have a scattered heart: Wisdom 17: "While they thought to lie hidden in their obscure sins, they were scattered under a dark veil of oblivion." — Or: He has scattered the proud in the conceit of his heart, that is, by the determination of his counsel: Job 40: "If you have an arm like God, and if you thunder with a similar voice? Scatter the proud in your fury, and looking upon every arrogant one, bring him low."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
