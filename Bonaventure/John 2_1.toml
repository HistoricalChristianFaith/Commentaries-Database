[[commentary]]
quote='''
And on the third day a marriage etc. After the calling of the disciples has been described, there is here described the manifestation made through the Word and concerning the incarnate Word: whence the Gloss says that after the showings made through John, the Lord himself showed himself by a miracle. The Evangelist therefore describes this manifestation in this order. First is indicated the occasion for performing the miracle: second, the obtaining of the miracle: third, the wondrous conversion of water into wine: fourth, the approval of the miracle: fifth, the manifestation of Christ and the edification of the disciples, to whom the Lord deigned to manifest himself through this miracle.

First, therefore, is indicated the occasion for performing the miracle, which was that the Lord was present at the wedding with his disciples. On account of which he says: And on the third day, namely after the calling of the disciples, a marriage took place in Cana of Galilee; the place is touched upon. And the Mother of Jesus was there: it is not said that she was invited, because by reason of kinship she went as one performing a duty, just as she also went into the hill country to Elizabeth to serve her, as is said in Luke 1. By reason of this the Lord also was invited.

Here a question arises among the expositors concerning the time of the wedding: for it is said by some that it took place on the same day on which the Lord was baptized. But how can this stand, since it is said that it took place on the third day, after the Lord came from Judea?

They respond that it was on the same day, but a year later.

But then the following text contradicts this: for it is said below in the same chapter that he went down to Capernaum, and that he did not remain there long, because the Passover was near: therefore these nuptials took place near the Passover, and therefore not at Epiphany.

But if this is conceded, the custom of the Church is to the contrary, because the Church celebrates three feasts on the same day.

I respond: It must be said that, as has been stated, there are diverse opinions here, and each is probable and can be sustained. For if we wish to maintain that this miracle took place after the baptism of the Lord and his return from the desert and his coming into Galilee, we shall say that it was near the Passover. Nor does the custom of the Church stand in the way, because the Church celebrates these three together — concerning the star and the dove and the changing of the wine — because the Lord first became known through these three; or because the changing of the water signifies the regenerative power conferred upon the waters when the Lord was baptized. But if we wish to maintain the other opinion, we shall respond that when it is said that after this he went down to Capernaum, it should be understood that it was not immediately after this, but with some time intervening, such that the Passover was approaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'

[[commentary]]
quote='''
Allegorically: There is a threefold day according to a threefold time, namely of nature, of the Law, and of grace. In this third, the wedding was celebrated between Christ and the Church in the assumption of flesh, concerning which Matthew 22: The kingdom of heaven is like a king who made a wedding feast for his son. In this wedding the six water jars of tasteless water and without nourishment were changed into flavorful and delightful wine, because the shadow of the Law was changed into truth; Hebrews 10: The Law having a shadow of good things to come etc.

The variety of sacrifices into unity; Hebrews 10: Every priest indeed stands daily ministering and often offering the same sacrifices, which can never take away sins; but this one, offering one sacrifice for sins, etc.

The harshness of punishments into lightness; Acts 15: Why do you tempt God, to impose a yoke upon the necks of the disciples, etc.? Enigmas into light; 2 Corinthians 3: Until this present day a veil is placed over their heart; but we, beholding the glory of the Lord with unveiled face, etc. Terrors into love; Romans 8: You have not received the spirit of bondage again in fear, but you have received the spirit of adoption of sons, etc.

The promises into attainment: Luke 1, in the canticle of Zechariah: Blessed be the Lord God of Israel, for he hath visited and wrought redemption for his people. And these things were accomplished at the prayers of the Virgin, through her intercession; Luke 1: Fear not, Mary, for thou hast found grace with God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
