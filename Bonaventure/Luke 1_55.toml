[[commentary]]
quote='''
Then is added the true promise, when it is said: As he spoke to our Fathers, to Abraham and to his seed forever. And this text should be construed thus: As he spoke to the Fathers, and as he spoke to Abraham in particular, and to his seed, where it touches upon the state of nature and of the written law. — Or otherwise, so that it is construed with the preceding: He has received Israel, being mindful of his mercy, and this, I say, to Abraham and to his seed, as he spoke to the Fathers. A similar passage is found in the Psalm: "He has remembered his mercy and his truth toward the house of Israel." Among the Fathers she specially names Abraham, because to him the promise was first made; Genesis 12 and 22: "I will bless those who bless you and curse those who curse you, and in you shall all the kindreds of the earth be blessed"; "I will bless you and multiply your seed as the stars of heaven and as the sand that is on the seashore: your seed shall possess the gates of their enemies, and in your seed shall all the nations of the earth be blessed, because you have obeyed my voice"; and Galatians 3: "To Abraham were the promises spoken and to his seed." But the seed of Abraham are believers: Romans 9: "Not those who are children of the flesh are children of God, but those who are children of the promise are reckoned as seed"; whence below, chapter 3: "God is able from these stones to raise up children to Abraham." Forever, that is, for eternity: the Psalm: "From age to age you are God." — Whence the Blessed Virgin begins the canticle from the greatness of the supreme principle and ends the canticle in the eternity of the end; for she praises him who "is the alpha and the omega, the beginning and the end," Apocalypse 1: and indeed rightly so, because in this canticle she shows that the consummation of all the promised benefits has been accomplished, and therefore it is the consummation of all praises and canticles and even of the Scriptures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
