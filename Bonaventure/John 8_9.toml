[[commentary]]
quote='''
Here the fourth point is noted, namely the confusion of the Pharisees, which was made manifest in their dispersal; therefore he says: "Now when they heard this," namely, so prudent and just a response, "they went out one by one, beginning from the elders." Those who had come gathered together departed scattered, and the elders went out first, because they themselves had been first in guilt, and therefore also first in flight: Daniel 13, "Iniquity went forth from the elder judges, who seemed to govern the people"; and all departed, because all were confounded. Whence he says: "And Jesus remained alone, and the woman standing in the midst. He remained alone," who seeks a place of solitude: Hosea 2: "I will lead her into the wilderness and there I will speak to her heart"; or because he alone was the one offended; the Psalm: "Against you alone have I sinned and done evil before you." Augustine: "Two remained: misery and mercy"; and because mercy looks upon misery.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
