[[commentary]]
quote='''
The full accord of the witnesses is found in the words of Scriptures. Isaiah says: The virgin shall be with child; and Luke: Thou shalt conceive. One says: Christ shall be slain; and the Evangelist: Put Him to death. Whatever, then, had been foretold by the prophets was fulfilled through Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
Expressing also the benefit of the salvific conception or fecundation, he shows that it is at hand, when he says: Behold, you shall conceive in your womb and shall bear a son; so that thus may be fulfilled in you that word of Isaiah 7: "Behold, a virgin shall conceive and shall bear a son." And he says pointedly: Behold, you shall conceive in your womb, to show that this very thing is great and wondrous and new, that she should conceive within, receiving nothing from without: Jeremiah 31: "The Lord has created a new thing upon the earth: a woman shall encompass a man." And because conception without lust is followed by birth without travail and pain, therefore he adds: And you shall bear a son, according to that word of the last chapter of Isaiah: "Before she travailed, she brought forth. Who has ever heard such a thing, or who has seen the like?" And because birth without pain is followed by the fruit of the womb with salvation, therefore he adds: You shall call his name Jesus: because, as is said in Acts 4, "neither is there any other name under heaven given to men, by which we must be saved." The prefiguration of this name preceded in Jesus, son of Nave: Ecclesiasticus 46: "Mighty in war was Jesus of Nave, who was great according to his name, very great for the salvation of God's elect." The prefiguration of this also preceded in Joseph, of whom it is said in Genesis 41 that "Pharaoh changed his name and called him in the Egyptian tongue Savior of the world."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
