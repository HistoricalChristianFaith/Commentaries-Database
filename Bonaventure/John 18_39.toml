[[commentary]]
quote='''
And because it was not sufficient to allege innocence, therefore secondly clemency is recalled: "But you have a custom that I should release one to you at the Passover." Victor: "Because at the Passover they were freed from servitude, at the Passover this custom of releasing was theirs." "Do you wish that I release to you the King of the Jews?" Augustine: "It could not be torn from his heart that Christ was the King of the Jews, as though truth itself had fixed this there, as on the title, concerning which he had asked what it was."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
