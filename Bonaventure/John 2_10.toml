[[commentary]]
quote='''
And he says to him: Every man first sets out the good wine: first, that is, in the beginning, and when they have become intoxicated, then that which is worse, because then they are unable to judge, but call all wine good. But you have kept the good wine until now, that is, until the end, and thus you have acted irregularly and contrary to custom. This was a bad custom, because it was against truth and against sobriety; whence Ephesians 5: "Do not be drunk with wine, in which is debauchery, but be filled with the Holy Spirit, speaking" etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
