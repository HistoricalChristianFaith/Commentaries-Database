[[commentary]]
quote='''
"Does our Law judge a man unless it has first heard from him and known what he does?" As if to say: no. Deuteronomy 17: "When upon hearing you shall have inquired diligently," etc. Job observed this law, chapter 29: "The cause which I did not know, I diligently investigated." The Romans observed this law; Acts 25: "It is not the custom of the Romans to condemn any man before the one who is accused has his accusers present and receives opportunity to defend himself in order to clear the charges."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
