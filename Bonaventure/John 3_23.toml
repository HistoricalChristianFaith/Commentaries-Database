[[commentary]]
quote='''
"And John was also baptizing in Aennon near Salim," that is, Salem, which was the city of Melchisedech, Hebrews 7. And the reason is added: "Because there were many waters there." A good reason, because John baptized only in water; Mark 1: "I have baptized you with water," John said. "And they came" to him "and were baptized," even while Christ was baptizing; Matthew 3: "Jerusalem went out to him, and all Judea, and all the region around the Jordan, and they were baptized by him."

It is asked: since the baptism of John was preparatory to the baptism of Christ, and when truth arrives, the shadow ceases: it seems that he ought to have ceased baptizing from the moment Christ began.

Response: It must be said that he did cease, but not immediately. And the reason was fourfold: lest he seem contrary to him; lest he seem inconstant; lest he seem to have borne it indignantly; lest he cast his disciples into envy and jealousy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
