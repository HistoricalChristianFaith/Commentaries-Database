[[commentary]]
quote='''
The impious are those who do not acknowledge divine piety. "But the impious man, when he has come into the depth of sins, shows contempt." The impious man is he who defends his own impiety, namely sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25203.html'
source_title="Collationes de Septem Donis, Collation 3"
