[[commentary]]
quote='''
"All, as many as came, are thieves and robbers," because, namely, they had not entered through me; and the sign of this he adds: "But the sheep did not hear them." This door was closed for a long time, but in the Passion it was opened, so that "the fullness of the Gentiles might enter." Concerning this door, Revelation 4: "After this I looked; and behold, a door opened in heaven"; truly opened, because, as is said above in chapter 6, "him that cometh to me I will in no wise cast out."

It is asked concerning what he says: "All who came are thieves."

Against this: The Prophets and Patriarchs and John the Baptist came; therefore according to this all were evil, as the heretics say.

It is answered to this that the emphasis should be placed on what is said, "came," namely by their own authority, not by divine authority, as the false prophets, of whom Jeremiah twenty-three says: "I did not send them, and they ran"; but the good ones did not come, but were sent. Whence Augustine says: "They did not come apart from him, but they came with him." For he himself is the truth; and therefore all who preached the truth came with him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
