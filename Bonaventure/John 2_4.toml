[[commentary]]
quote='''
But the Lord, indicating to his Mother that she could not command this insofar as she was his mother, nor could he do it insofar as he was her son, nor ought he to do it unless the proper time was at hand: hence there follows:

And Jesus says to her: What is it to me and to you, woman? The Gloss: "That is, what nature is common to me and to you, according to which I should do this?" He calls her woman, not from frailty, but from nature and sex. For this is that woman of whom the last chapter of Proverbs says: "Who shall find a valiant woman?" As if to say: You are able to ask this as a holy woman, not to command it as a mother, nor is it yet fitting to do it. My hour has not yet come, that is, of my glorification and passion, concerning which below in chapter 17: "Father, the hour has come, glorify your Son." But the Mother, knowing that this response was not from indignation but from humility and instruction, confidently commands.

It is asked concerning the Lord's response to His Mother: What is it to Me and to you, woman? My hour has not yet come.

For either the divine Virgin was asking what ought to be asked, or what ought not to be asked. If she was asking what ought to be asked, then He ought not to have responded to her so sharply. If she was asking what ought not to be asked, then He ought not to have heard her request.

Likewise, what does it mean that He says: My hour has not yet come? For either it had come, and thus He speaks falsely; or it had not come, and thus He acts wrongly, because He acts before the hour.

Likewise, from this the heretics argue that the Lord was subject to fate and the stars.

I respond: It must be said that the Lord's response was not insulting, but instructive. For he shows by what reason he satisfies his Mother who petitions. Whence three things are considered in the petition: the one petitioning, and this is the Mother of the Lord; for whom she petitions, namely for poor relatives; what she petitions, namely a miracle. The Lord shows in his response that she ought not to petition this as mother: because he could not do this from the nature drawn from her, therefore he says to her woman, he does not say mother. She ought not to petition for relatives, as though having care for carnal kinsmen: therefore he says: What is it to me and to you? He shows that a miracle is not to be performed on account of need, but for manifesting his glory, for the manifesting of which there was not yet necessity: therefore he says: My hour has not yet come. Yet because the woman petitioning was holy: because those for whom she was petitioning were poor: because his glory was to be manifested to the disciples: therefore he hears her.

As to what is objected concerning the hour, it must be understood that the hour of perfect manifestation had not yet come, such as occurred around his death: concerning the hour, Augustine says, not the hour in which he would be compelled to die, but in which he would deign to be slain: whence below in the tenth chapter: I have the power to lay down my life, and no one takes it from me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
