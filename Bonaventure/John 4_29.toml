[[commentary]]
quote='''
"Come and see the man who told me all things that I have done." She was drawing them by this, that he had revealed her secrets: she did not say: Come and see a prophet: but she divulges her own life, so that she might uproot and draw all. "Is not this the Christ?" She did not assert it, lest she seem deceived: she did not assert, but proposed it by doubting, so that they themselves might likewise doubt, and through this come to be made certain. Chrysostom: "She did not wish to lead them by her own persuasion, but by hearing him"; on account of which, being stirred up, they come.

It is asked about the testimony of the woman, who said: "Come and see the man who told me all things whatsoever I have done." He told her only about the husbands she had had. Therefore either the woman had done nothing more, which is false; or she was lying and speaking falsely. It must be said that when the woman said this, she was not looking only to the words of the one speaking, but to the wisdom by which He was speaking. And just as He had told her one secret, by the same power He could tell all things whatsoever she had done. Therefore the woman, wishing to express the power of Christ, spoke in a universal manner.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
