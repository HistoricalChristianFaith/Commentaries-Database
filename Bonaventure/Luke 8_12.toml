[[commentary]]
quote='''
First, therefore, as regards the explanation of the trampled seed, which is the word of the Lord in the forgetful heart, he says: Those along the path are those who hear: which does not refer to the seed received, but to the persons receiving the seed, who themselves are also called seed, according to that passage of Jeremiah thirty-one: "I will sow the house of Israel and the house of Judah with the seed of men and the seed of beasts," that is, of the perfect and the imperfect. Those, therefore, who hear are seed, but they are unfruitful for this reason: because they do not retain it. — On account of which he adds: Then the devil comes, namely through suggestion, and takes away the word from their heart, that is, from their memory. And this was signified in Judges six, where it is said: "When Israel had sown, Midian and Amalek would come up and lay waste to everything, while it was still in its green growth." Whence he gladly destroys the beginnings of goodness, because he lies in ambush against our salvation. — On account of which he adds: Lest believing they be saved. For as it is written in the last chapter of Mark, "he who believes and is baptized will be saved, but he who does not believe will be condemned." He, however, seeks nothing except our damnation, as one already damned himself; Apocalypse twelve: "The accuser of the brethren has been cast down, who accused them before the sight of our God day and night."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
