[[commentary]]
quote='''
Here the confutation of the persecuting officers is set forth, who had come with armed force to seize him; and he confutes them, showing their powerlessness in two ways: first, because they could not seize him now; second, because after a short time they would not be able to find him. On this account he says: "Jesus therefore said to them: Yet a little while I am with you," that is, living in mortal life; or: "I am with you" through the manner of mortal life; Luke, the last chapter: "These are the words which I spoke to you while I was still with you." "And I go to the Father who sent me," that is, "I go" through the Passion, below in chapter sixteen; therefore you cannot seize me now, because the time has not yet come; below in chapter ten: "I lay down my life that I may take it up again; and no one takes it from me"; and thus you cannot now apprehend me nor afterwards find me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
