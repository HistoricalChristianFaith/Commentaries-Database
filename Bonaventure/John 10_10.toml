[[commentary]]
quote='''
"The thief cometh not, but for to steal." Here it is noted that Christ himself enters as the true shepherd, not as a thief; on account of which he says: "The thief cometh not, but for to steal," by extorting temporal goods; "and to kill," by temporally afflicting his subjects; "and to destroy," by casting them down to hell through evil example. "I am come that they might have life, and that they might have it more abundantly," that is, to preserve life as a shepherd; that "they might have life," namely, the life of grace, concerning which life, above in chapter 6: "This is the bread descending from heaven, which giveth life unto the world"; "and that they might have it more abundantly," namely, the life of glory, concerning which, below in chapter 17: "This is life eternal, that they might know thee the only true God, and Jesus Christ, whom thou hast sent." This is called abundant, because it is said in Luke 6: "Good measure, pressed down, and shaken together, and running over, shall men give into your bosom."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
