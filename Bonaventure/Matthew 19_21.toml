[[commentary]]
quote='''
Fear causes one to withdraw from evil and from the occasion of evil; and because the root of all evils is cupidity, therefore fear disposes to poverty of spirit, in which humility is joined together with poverty, so that the perfect man may thus be distanced from the fount of all fault, namely from pride and cupidity. And hence it is that poverty of spirit is the foundation of all evangelical perfection. Whence he who wishes to come to the summit of perfection must first lay this foundation, according to that passage in Matthew nineteen: If you wish to be perfect, go and sell all that you have: behold, perfect poverty, which retains absolutely nothing for itself: and follow me: behold, humility, which causes a man, by denying himself, to take up his cross and follow Christ, who is the most principal foundation of all perfection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
Matthew 19, where it is said: If you wish to be perfect, go and sell all that you have, and give to the poor, and come follow me; The Gloss: "Behold, the contemplative life, which pertains to the Gospel." It is certain that the Lord was not calling him to riches, and yet was counseling him to renounce all things: nor to manual labor, but rather to the contemplative life, as the Gloss says: therefore etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'

[[commentary]]
quote='''
Ambrose, in the book On Duties, near the beginning, where he says thus: "Every duty is either ordinary or perfect; which we can prove by the authority of the Scriptures. For we have in the Gospel: If you wish to enter into life, keep the commandments. You shall not kill, etc. These are ordinary duties, in which something is lacking. If you wish to be perfect, go and sell all that you have, and give to the poor, and where he says that enemies are to be loved and prayer is to be made for those who slander and persecute us, if we wish to be perfect. This is the perfect duty, which the Greeks called catorthoma, by which all things that could have had any failings are corrected." Generosity, therefore, which is considered according to the middle duty, preserves moderation in giving. Poverty of spirit, however, which is considered according to the perfect duty, bestows all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'

[[commentary]]
quote='''
To the objection that to beg is indifferent: it must be said that to beg, in itself, is not a matter of perfection unless a universal renunciation of all things is presupposed; which indeed is according to divine counsel, in which the Lord expressed to the young man that if he fulfilled that counsel, by that very fact he would arrive at the summit of perfection. For He said: If you wish to be perfect, go and sell all things: nor did He add: hand them over to me, that I may put them in my purse, and let all things be held in common; but rather: give to the poor; nor did He subjoin: go to earn your sustenance by the labor of your hands; but rather: come, follow me. In which, according to what the Gloss expounds, is understood a calling to contemplation, or to imitating Christ and preaching the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
