[[commentary]]
quote='''
And that this suffices, he shows from the lesser, when he adds: For I also am a man set under authority, and thus I acknowledge myself subject to others, according to that passage in Romans thirteen: "Let every soul be subject to the higher powers"; yet so subject, that I am also set over others. Therefore he says: Having soldiers under me, who indeed obey my word; whence he adds: And I say to this one: Go, and he goes; and to another: Come, and he comes without contradiction, according to that passage in Hebrews, the last chapter: "Obey your leaders and submit to them." And this he says with respect to the greater services; and with respect to the lesser he adds: And to my servant, namely I say: Do this, and he does it: below in chapter twelve: "Blessed is that servant whom his lord, when he comes, shall find so doing," namely, as he commanded. From which he argues that, since He Himself is under no authority and has innumerable subjects, He can heal by a word alone; in which he confesses Jesus as Lord, concerning whom Ecclesiasticus forty-two says: "All things in every necessity obey Him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
