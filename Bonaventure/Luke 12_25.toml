[[commentary]]
quote='''
For which reason he adds: And which of you by thinking can add to his stature one cubit? As if to say: no one, because this is not the work of man thinking but the work of God producing; whence in Second Maccabees seven it is said: "I know not how you appeared in my womb; nor did I give you life, nor did I myself fashion the members of each of you"; and First Corinthians fifteen: "God gives it a body as he wills, and to each of the seeds its own body." Whence also the Philosopher says that "of all things existing by nature there is a limit and proportion of magnitude and growth." If therefore these least things are established not in human but in divine providence, much less are the others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
