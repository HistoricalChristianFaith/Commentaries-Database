[[commentary]]
quote='''
Second, as regards the passing of the typical lamb, he adds: For I say to you, that from this time I will not eat of it, until it be fulfilled in the kingdom of God, namely this figurative passover. The Gloss: "I will no longer celebrate the Mosaic passover, until it be fulfilled as spiritually understood in the Church, which is the kingdom of God." What therefore is said in Exodus twelve: "You shall celebrate this day throughout your generations with an everlasting observance" is referred rather to the thing signified than to the sign. For the figure is fulfilled when that which it prefigured comes, and then, when the truth arrives, it ceases, just as a shadow ceases through light; on account of which it is said in First Corinthians thirteen: "When that which is perfect has come, that which is in part shall be done away"; and therefore in Hebrews ten: "The Law, having a shadow of the good things to come, not the very image of the things, can never make perfect those who draw near"; and afterward: "And indeed every priest stands daily ministering and often offering the same sacrifices, which can never take away sins. But this one, offering one sacrifice for sins, sits forever at the right hand of God. For by one offering he has perfected forever those who are sanctified." And he has already fulfilled by one passion the prefiguration of that offered lamb, because, as it is said in Matthew three, "so it becomes us to fulfill all justice"; for, in Matthew five, "I have not come to destroy the Law, but to fulfill it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
