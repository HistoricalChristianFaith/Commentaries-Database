[[commentary]]
quote='''
Second, with regard to the conferral of grace in the sending of the Holy Spirit, he adds: And having called his ten servants, he gave them ten minas. By the calling of the servants we understand the calling of preachers and prelates, who ought to be called, because Hebrews 5: "Neither does anyone take the honor to himself, but he who is called by God, as Aaron was." These are called servants both from serving and from preserving: from serving, through the reverence of humility, according to that saying of Matthew 20: "Whoever wishes to be first among you shall be your servant." They are also called servants from preserving, through the guardianship of the flocks, because they ought to preserve and guard the Lord's flock: 3 Kings 20: "Guard this man; if he escapes, your life shall be for his life." And concerning these, 1 Peter 5: "Elders, feed the flock that is among you, not as lording it over the clergy, but being made a pattern of the flock from the heart." These are said to be ten either on account of the sufficiency of the number, or because all service of Christ is reduced to the perfect observance of the ten commandments; of which the Apostles had literal knowledge from the law of the Decalogue; but they did not have spiritual understanding and perfect observance except through the grace given to them. Therefore he is said to have given ten minas, that is, grace sufficient for understanding, fulfilling, and preaching those precepts. Whence Bede: "He calls ten servants when he chooses disciples imbued with the letter of the Decalogue; he gives ten minas when after the resurrection he opens their understanding, so that they may spiritually understand the sayings of the Law." And this was fully accomplished when they were taught the truth through the Holy Spirit; whence John 16: "When that Spirit of truth shall come, he will teach you," etc. Moreover, he gave ten minas to intimate the perfect understanding of the Scriptures; whence the Gloss: "A mina weighs ten drachmas; and every word of Scripture, because it suggests the perfection of heavenly life, shines as it were with the weight of the hundredfold number." In designation of which, that Spirit came ten days after the Ascension and descended upon twelve times ten, that is, "one hundred and twenty," for the perfection of the ministry and the mystical body, according to Ephesians 4: "He who descended is the same who also ascended, that he might fill all things. And he himself gave some indeed to be Apostles, and some Prophets, and others Evangelists, and others pastors and teachers, for the perfecting of the saints, for the work of the ministry."

Now he gave them wisdom for the purpose of instructing the universal Church; and therefore he adds: And he said to them: Trade, until I come: trade, namely by preaching and bearing fruit: 1 Corinthians 12: "To each one is given the manifestation of the Spirit for profit." Now there is a threefold trade: indifferent, worst, and best: indifferent, by which temporal things are exchanged for temporal things: Baruch 3: "The children of Hagar, who sought out" etc. Another indeed is evil, by which spiritual things are exchanged for temporal things through simony: and this is displeasing to God, concerning which John 2: "He says to those selling doves: Take these things away from here, and do not make my Father's house a house of trade." Another trade is the best, by which one gives spiritual things in order to gather spiritual things: and this is good and pleasing to God, according to that passage of Isaiah 23: "Her trades and her wages shall be sanctified to the Lord." And concerning this, the last chapter of Proverbs: "She tasted and saw that her trade is good"; because "the kingdom of heaven is like a merchant" etc. Whence the Gloss: "Offer to the peoples the words of the Law examined by mystical interpretation, and receive from them the confession of faith and uprightness of morals."

He therefore who preaches for temporal gain is an evil trader; but he who does so for the gain of souls is a spiritual trader, such as Paul was, who said in 2 Corinthians 12: "I do not seek your things, but you." If however he also reaps carnal things here, provided he does not place his end there, but rather the contrary, he does not depart from spiritual trade nor make the Gospel a thing for sale. For this is permitted to be done not as the principal intention, but as ordered to something else, because, as is said in 1 Corinthians 9, "if we have sown spiritual things for you, it is no great thing if we reap your carnal things."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
