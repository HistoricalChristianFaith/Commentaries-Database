[[commentary]]
quote='''
"That all may honor the Son, just as they honor the Father." On this, Proverbs seven: "My son, honor the Lord, and you shall prevail; fear no stranger besides Him." The Son of God is to be honored and feared by reason of His judicial power, because "He can destroy both soul and body in Gehenna," Matthew ten. And the reason why the Father wills the Son to be honored: because the honor of the Son is the Father's; therefore He says: "He who does not honor the Son does not honor the Father, who sent Him": below in chapter eight: "I honor My Father, and you have dishonored Me." Augustine: "If the Son were believed to be less than the Father, the Father would be dishonored, because either as envious He would not have willed to beget an equal, or as weak He could not have done so."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'

[[commentary]]
quote='''
It is impossible for anyone to be saved who does not love and honor him who is to be supremely loved and honored: but the Son and the Holy Spirit are to be supremely loved and honored, just as the Father, according to that which is said in John five: He who does not honor the Son does not honor the Father, who sent him: therefore no one can be saved who does not love and honor the Son and the Holy Spirit, just as the Father. But no one loves and honors unless he in some way knows and believes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Mysterio%2520Trinitatis%2FQuestion%25201.html'
source_title='Disputed Questions on the Mystery of the Trinity, Question 1'
