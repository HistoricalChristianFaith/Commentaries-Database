[[commentary]]
quote='''
Martha therefore, when she heard. Above, two antecedents to the miracle were determined, namely the announcement of the illness and the coming of the Physician: here the third is touched upon, namely the intercession of faith, which indeed merited the raising of Lazarus. This moreover was the faith and devotion of the two sisters, namely Martha and Mary. Martha's solicitude is indicated in this, that she herself went to meet the Lord: she did not wait for him to come all the way to the house; therefore it says: Martha therefore, when she heard that Jesus was coming, went to meet him. In this it is clear that Martha was very solicitous, but on the contrary Mary was quiet; whence it says: But Mary sat at home, quiet, namely. For this reason it is said in Luke 10: "Martha, Martha, you are anxious and troubled about many things: Mary has chosen the best part." Most fittingly, by Martha going out to meet him is signified the active life: Isaiah 21: "Go to meet the fugitive with bread"; by Mary sitting at home, the contemplative life: whence Lamentations 3 concerning the contemplative man: "He shall sit solitary and hold his peace, because he has lifted himself above himself."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
