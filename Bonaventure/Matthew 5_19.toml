[[commentary]]
quote='''
Nothing in Sacred Scripture is to be despised as useless, nothing rejected as false, nothing repudiated as wicked, because the Holy Spirit, its most perfect author, could say nothing false, nothing superfluous, nothing deficient. And therefore heaven and earth shall pass away, but the words of sacred Scripture shall not pass away, without being fulfilled. Until indeed heaven and earth pass away, not one iota or one tittle shall pass from the Law, until all things be accomplished, as the Savior attests. Whoever therefore shall break those things which Scripture teaches, and shall teach men so, shall be called least in the kingdom of heaven: but whoever shall do and teach them, shall be called great in the kingdom of heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FProoemium.html'
source_title='Breviloquium, Prologue'
