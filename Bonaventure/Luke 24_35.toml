[[commentary]]
quote='''
And because the joys of the just ought to be shared in common, he therefore adds: And they narrated the things that had been done on the way, and how they recognized him in the breaking of bread. From this therefore it appears that Christ appeared several times on the same day, namely five times: because first to Mary Magdalene, John 20; second to the women, the last chapter of Matthew; third to Peter, as it says here; fourth to the disciples going to Emmaus, above in the same chapter; fifth to the disciples gathered without Thomas, John 20 and here. And therefore in commemoration of this the priest turns five times to the people in the Mass; but the third turning is in silence, which signifies the appearance made to Peter, which is not narrated as to when and how it occurred.

He also appeared before the ascension five other times: first, namely after eight days, with Thomas present, John 20; seventh he appeared at the Sea of Tiberias, the last chapter of John; he appeared eighth on the mountain of Galilee, the last chapter of Matthew: "The eleven disciples went into Galilee"; he appeared ninth in the upper room in Jerusalem, the last chapter of Mark; he appeared tenth on the Mount of Olivet, when he ascended, Acts 1: "And eating together with them, he commanded them not to depart from Jerusalem." And thus at intervals he appeared ten times in forty days, after which, ten days having passed, he sent the Holy Spirit.

Of these ten appearances, John records four, Luke three, Matthew two, and Mark one, so that from his manner of narrating the mystery and sufficiency of the appearances might be apparent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
