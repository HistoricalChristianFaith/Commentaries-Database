[[commentary]]
quote='''
"I am he who bears witness of myself, and he who sent me, the Father, bears witness of me," therefore my testimony is not to be rejected; First John five: "There are three who give testimony in heaven: the Father, the Word, and the Holy Spirit."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
