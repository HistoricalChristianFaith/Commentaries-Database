[[commentary]]
quote='''
Third, as to the vainglorious commendation of himself, he adds: I fast twice on the Sabbath, I give tithes of all that I possess, as if to say: I keep perfect justice, both toward myself and toward God, because I mortify the flesh by fasting twice on the Sabbath, that is, in the week; and I keep piety toward God by rendering tithes and alms. And these two are what most please God: whence the Angel also said in Tobit 12: "Prayer with fasting and almsgiving is better than storing up treasures of gold." Whence here also he greatly commends himself, but in this he defiles his justice through vainglory: Proverbs 27: "Let another praise you, and not your own mouth; a stranger, and not your own lips"; because, as it is said in Second Corinthians 10, "not he who commends himself is approved," but is rather certainly reprobated. Whence Sirach 7: "Do not justify yourself before God, for He Himself is the knower of hearts"; and Jeremiah 2: "Behold, I will contend with you in judgment, because you have said: I have not sinned"; and Job 9: "If I wish to justify myself, my own mouth will condemn me; if I show myself innocent, it will prove me perverse." And all this on account of the vice of pride, which most displeases God; Ephesians 2: "By grace you have been saved through faith. For it is the gift of God, not from works, lest anyone should boast."

But since this Pharisee acknowledges that the good things he has are from the Lord, he does not seem to glory vainly; because he glories vainly who "glories as though he had not received"; but this man gives thanks to God. — To which Bernard responds that he did not rightly acknowledge the good things he received: for he speaks thus: "He gives thanks not because he is good, but because he is alone; not so much for the good things he has, as for the evil things he sees in others." Such indeed is the manner of pride: whence Gregory says: "There are four kinds by which every swelling of the arrogant is shown: when someone thinks that the good he has, he has from himself; or, if he believes it was given by God, thinks it was given for his merits; or when he boasts of having what he does not have; or when, despising others, he desires to appear uniquely to have what he has." The Pharisee suffered from this plague, who by extolling his own merits preferred himself to all others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
