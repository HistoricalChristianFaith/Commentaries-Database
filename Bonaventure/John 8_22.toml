[[commentary]]
quote='''
"The Jews therefore said." Here the second point is touched upon, namely, on account of the Jews' doubt, the exposition of the threat. For they doubted concerning what He had said: "Where I go, you cannot come": therefore they say: "Will He kill Himself, because He says: Where I go, you cannot come?" Augustine: "Foolish words, altogether full of senselessness. For if He were to kill Himself, could they not do likewise? If He spoke of death, were not all of them going to die?" On account of this doubt, the Lord sets forth the explanation of His threat; and He had said two things, therefore He explains two things: first, that which He had said: "Where I go, you cannot come." For because He had said this concerning going to the Father through glory, to which sinners could not ascend.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
