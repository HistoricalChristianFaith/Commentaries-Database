[[commentary]]
quote='''
And his mercy, etc. After the affection of the one praising and the reason for praising have been described, here is added thirdly the amplification of divine praise. And this consists in the commendation of divine mercy with respect to the work of human redemption, already begun in the conception of the Virgin. Now the work of our redemption is declarative of mercy and power, and is manifestative of generosity and truth: mercy in the raising up of fallen man; power, in the overthrow of the devil; generosity, in the outpouring of the Holy Spirit; and truth, in the fulfillment of the promise.

First, therefore, she praises her Lord in the work of redemption, insofar as it is manifestative of mercy, where she says: And his mercy is from generation to generation upon those who fear him: Ephesians 2: "God, who is rich in mercy, on account of his exceeding great love with which he loved us, even when we were dead in sins, quickened us together with Christ"; and in the Psalm: "But the mercy of the Lord is from eternity and unto eternity upon those who fear him." For this extends to all with respect to the benefit of conservation, according to that saying of Sirach 18: "The compassion of man is toward his neighbor, but the mercy of God is upon all flesh." Yet mercy that liberates and saves extends only to those who fear him, as it is written in the Psalm: "How great is the multitude of your sweetness, O Lord, which you have hidden for those who fear you!" Therefore Sirach 2: "You who fear the Lord, hope in him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
