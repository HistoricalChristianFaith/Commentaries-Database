[[commentary]]
quote='''
Third, he dissuades the anxiety of avarice by promising a superabundance of treasure in exchange for the renunciation of the world, when he says: Sell what you possess and give alms, that is, distribute your goods to the poor, according to that passage in Matthew 19: "Go and sell all that you have, and give to the poor."

And because it is hard to sell and give without recompense, he therefore adds: Make for yourselves purses that do not grow old: Sirach 17: "The alms of a man is like a purse with him, and it will preserve the grace of a man as the apple of his eye; and afterward he will rise up and render them their recompense, to each one upon their head."

And because this recompense, which is in these purses, is most abundant, he therefore adds: A treasure unfailing in heaven: the word make is understood, and this is accomplished through almsgiving. Whence Tobit 12: "Prayer with fasting and almsgiving is good, more than to store up treasures of gold; for almsgiving delivers from death and causes one to find eternal life." And he shows that this heavenly treasure is unfailing: because it cannot be lost through thieves, nor can it be corrupted in itself; therefore he adds: Where no thief draws near, nor does moth corrupt. Chrysostom: "A threefold destruction takes away all the goods of the world: for either they grow old of themselves, or they are consumed by the extravagance of their owners, or they are seized by outsiders through deceit, force, or false accusation." And therefore an unfailing treasure cannot be possessed on earth. He who wishes therefore to have an unfailing one, let him scatter on earth, so that he may abound in heaven; the Psalm: "He has distributed, he has given to the poor; his justice endures forever and ever." Whence Augustine: "The Lord did not command that we should lose our treasure, but he showed us the place where we should store it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'

[[commentary]]
quote='''
To the objection from the Gloss on Luke 12, that those who have despised all things for God ought to work with the labor of their hands: it must be said that this is a counsel with respect to the first part, which says: Sell what you possess; but with respect to the second part, it pertains only to the well-being of the counsel, which does not bind even perfect men, especially those who can be occupied with greater goods. And that this is true appears from the same Gloss, when it adds: "Whence you may live, or give alms." For it is certain that those who have given all things at once for God are in no way bound to give further alms; and therefore that Gloss does not express what pertains to the essence and substance of the counsel, but rather according to the well-being, according to the state and condition of certain persons who are more suited to working manually than to doing something more arduous. For if it were said otherwise, that this pertained to the essence of the perfection of the counsel, then none would have fulfilled that counsel except those who worked manually; and consequently we would not judge the other Apostles besides Paul and Barnabas, and very many other most perfect Saints whom we do not read to have worked manually, to have been perfect. It is indeed true that manual labor accords with evangelical perfection, provided however that it does not impede greater goods.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'

[[commentary]]
quote='''
To that which is objected from the Gloss on Luke twelve, Sell what you possess and give alms, it must be said that the whole of that is a counsel, just as that text upon which the Gloss is founded. Nor does anyone bind himself to the whole of it nor to a part, except insofar as he promises from his profession. Hence just as to give alms is not a precept for him who has given all things, nor is it simply commanded that all things be given; so neither does that intermediate thing, namely to work, hold there the character of a necessary obligation, but only of monitory persuasion, or even of counsel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
