[[commentary]]
quote='''
And they said to him: Where is he? — namely, the healer. He said: I do not know. The anxiety of those censuring is noted in this, that they seek the healer, and not finding him, they do not release the one healed. And because they cannot find the healer, they bring the one healed to the Pharisees.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
