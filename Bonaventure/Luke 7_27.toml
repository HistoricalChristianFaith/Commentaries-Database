[[commentary]]
quote='''
Second, as regards authority in teaching through divine mandate, it is said: This is he of whom it is written, namely in Malachi 3, where the Father speaks to the Son: "Behold, I send my angel," that is, my authoritative messenger, John, who is called an angel not by simplicity of nature but by the authority of his teaching, according to that passage in Malachi 2: "The lips of the priest shall guard knowledge, and they shall seek the law from his mouth, because he is the angel of the Lord of hosts." John is therefore called a messenger in the manner of an Angel because, just as the Angels "see the face of the Father" in the Godhead, so he himself saw the face of Christ and pointed Him out in the flesh. — On account of which He adds: Before your face, that is, your appearance in the flesh, concerning which it is said in the Psalm: "Show us your face, and we shall be saved." This face Isaiah desired in the person of the Fathers, in chapter 64: "Would that you would rend the heavens and come down; the mountains would melt before your face." — And because they were not prepared to receive that face unless they were forewarned, therefore it is said: Who has prepared your way before you, namely by being born, by living among men, by baptizing, by preaching. For in all these ways he was joined to Christ, as a voice to a word. Therefore it was rightly said of him in Isaiah 40, and taken up above in chapter 3 and in John 1: "I am the voice of one crying in the wilderness: Prepare the way of the Lord"; so that that passage in Isaiah 35 may be fulfilled: "There shall be for you a straight way, so that fools may not err along it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
