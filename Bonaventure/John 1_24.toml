[[commentary]]
quote='''
"And those who had been sent were from the Pharisees." John has already spoken the truth about himself: but here he gives testimony concerning Christ. First is set forth the wickedness of the questioners: second, the truth of the testimony: third, the renown of the testimony.

First, then, is touched upon the wickedness of the questioners: because, when they had heard the truth, they seek to calumniate the teacher of truth. And the reason for this was that they were malicious: therefore he says: "Those who had been sent were from the Pharisees," therefore malicious and scrutinizers: Chrysostom: "Those were sent who knew not how to seek the truth, but to envy it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
