[[commentary]]
quote='''
And the Angel answering, etc. Here is noted the authority of the messenger with respect to the contemplative power and with respect to the administrative. With respect to the contemplative he says: I am Gabriel, who stand before God: Daniel 7: "Ten thousand times a hundred thousand stood before him"; and among these was Gabriel. And therefore in 3 Kings 10 the queen of Sheba said in a figure to Solomon: "Blessed are your men, and blessed are these your servants, who stand before you and hear your wisdom." This Micaiah saw, in the last chapter of 3 Kings: "I saw," he said, "the Lord sitting upon his throne, and all the host of heaven standing by him on the right hand and on the left." Therefore dignity is noted in standing before God, and authority in announcing is also noted in this. — With respect to the ministry of mission he says: And I was sent to speak to you and to announce these good tidings to you. Hence he was of the number of those about whom it is said in Hebrews 1: "Are they not all ministering spirits sent forth for ministry," etc.; sent, I say, both to speak and to evangelize. For in speaking the expression of truth is to be understood: Daniel 9: "Behold, the man Gabriel, whom I had seen in the vision at the beginning, flying swiftly, touched me at the time of the evening sacrifice and instructed me and spoke to me." But in evangelization the announcement of goodness is to be understood. For the Gospel is a good announcement: Zechariah 1: "And the Lord answered the Angel who spoke in me good words, consoling words." Hence one ought to say to him that word from 3 Kings 1: "Come in, for you are a mighty man and bring good tidings." For Gabriel is interpreted as the strength of God, and therefore he was sent to strengthen the fearful priest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
