[[commentary]]
quote='''
"Nathanael said to him: Whence do you know me?" Why do you commend me thus? And the Lord attracts through revelation of secrets: therefore there follows: "Jesus answered and said to him: Before Philip called you, when you were under the fig tree, I saw you." Literally: he was in a secret place, as in a garden, whence Philip called him. Or: the fig tree is said to be the habit of sinning, as the first parents covered themselves under fig leaves, Genesis 3; where he was first seen by the Lord and sought before he himself would seek the Lord. By this revelation Nathanael was attracted: whence there follows his faithful confession.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
