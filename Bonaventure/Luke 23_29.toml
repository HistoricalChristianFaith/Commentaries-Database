[[commentary]]
quote='''
Fourth, as regards the prediction of imminent calamities, he adds: For behold, the days shall come in which they shall say: Blessed are the barren, and the wombs that have not borne, and the breasts that have not nursed. And this can be referred to the destruction of Jerusalem, on account of which it is stated above in chapter 21: "Woe to those who are with child and to those who nurse in those days!" And again in the same chapter below: "There shall be great distress and wrath upon this people, and they shall fall by the edge of the sword, and shall be led captive into all nations."

Or better, it is referred to the final judgment, from the consideration of which man ought to weep over himself and over other sinners, lest it be necessary to lament at his coming, according to that passage in Matthew 24: "The sign of the Son of Man shall appear in heaven, and then all the tribes of the earth shall mourn, and they shall see the Son of Man sitting," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
