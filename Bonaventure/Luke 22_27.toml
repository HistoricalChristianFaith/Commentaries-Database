[[commentary]]
quote='''
Such a Center has a saving power: and anyone who draws away from it is condemned, as drawing away from the means of humility. And the Saviour proves it: "I am in your midst as He who serves."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
Third, as regards the example urging humility, he adds: For which is greater, he who reclines at table, or he who serves? He asks this as something self-evident, and therefore responds: Is it not he who reclines at table? This is indeed true according to the order that is observed according to worldly custom and usage; whence above in the seventeenth chapter: "But which of you, having a servant, who when he returns from the field would say to him: Come over and recline at table; and not rather: Come and serve me?"

But it is otherwise according to the divine order; whence he adds: But I am in your midst as one who serves, to give an example of humility: which he did most especially at that Last Supper, in which he washed the feet of the disciples, as is said in John thirteen, where it is added: "You call me Master and Lord, and you say well. For so I am. If therefore I have washed your feet" etc. And he himself gives the reason accordingly: "The servant is not greater than his lord, nor is the apostle greater than he who sent him." If therefore Christ, though he was superior, served most humbly, how much more so should all the disciples of Christ. Chrysostom: "He is not a true disciple who does not imitate his master, nor a true image that is not like its author." Whence although it has always been dangerous to be lifted up in pride, now it is most dangerous after so great a humility has been shown; and therefore Philippians two: "Have this mind in you which was also in Christ Jesus, who, though he was in the form of God, did not count it robbery to be equal to God" etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
