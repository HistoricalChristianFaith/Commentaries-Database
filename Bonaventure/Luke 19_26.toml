[[commentary]]
quote='''
Therefore he pronounces judgment generally for all, adding: But I say to you, that to everyone who has, it shall be given, and he shall abound: The Gloss: "To one who uses what he has." But from him who does not have, namely right use, even what he has, namely the divine gift, shall be taken away from him, by divine judgment. Which is stated more expressly in Matthew 25: "What he seems to have shall be taken away from him." Whence then that saying of Proverbs 11 shall be verified: "Some distribute their own goods and become richer; others seize what belongs to others and are always in want." And therefore generally to everyone who has, that is, having the desire of hearing, shall be given the sense of understanding: Sirach 6: "If you love to hear, you shall be wise." To him who has the will of working, shall be given the faculty of accomplishing: Philippians 2: "God is the one who works in you both to will and to accomplish." To him who has works, shall be given understanding: the Psalm: "From your commandments I have understood." "I have understood above the elders," etc. To him who has justice, shall be given wisdom: Sirach 1: "Son, desiring wisdom, preserve justice." To him who has grace, shall be given glory: the Psalm: "The Lord will give grace and glory." To him who has the pledge, shall be given the eternal inheritance: Ephesians 1: "In whom also believing you were sealed with the Holy Spirit of promise, who is the pledge of our inheritance," etc. To him who has an abundance of merits, shall be given an abundance of rewards, because, Second Corinthians 9, "he who sows sparingly shall also reap sparingly, and he who sows in blessings shall also reap of blessings"; above in chapter six: "Give, and it shall be given to you. A good measure," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
