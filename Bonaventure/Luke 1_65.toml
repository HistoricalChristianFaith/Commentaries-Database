[[commentary]]
quote='''
Second, he adds the reverence of the miracle, when he says: And fear came upon all their neighbors, and throughout all the hill country of Judea all these words were spread abroad: the Psalm: "All who dwell at the borders shall fear at your signs"; whence they could sing that of Exodus 15: "Who is like you among the mighty, O Lord? Who is like you, magnificent in holiness?" And because the magnificence of proclamation follows upon the reverence of the miracle, therefore he says: Throughout all the hill country of Judea they were spread abroad, etc. And rightly so, because, Tobit 12, "it is good to hide the secret of a king, but to reveal and confess the works of God is honorable"; and therefore the Psalm: "Give thanks to the Lord and call upon his name"; and afterwards: "Declare all his wondrous works."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
