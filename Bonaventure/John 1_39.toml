[[commentary]]
quote='''
"He says to them: Come and see. They came and saw where he was staying." Conversely, the one who sought with an improper intention was rebuffed: in Matthew chapter eight, a scribe said to him: "Master, I will follow you wherever you go. Jesus said to him: Foxes have dens, and the birds of the sky have nests, but the Son of Man has nowhere to lay his head." And because one who does not persevere converts in vain, therefore he says: And "they stayed there that day." And the reason is given: "It was about the tenth hour." In this is signified the day of grace, which is the last, in which one must persevere: 1 John chapter two: "Now we know, beloved, that it is the last hour." In this last hour one must remain with the Lord Jesus; Luke chapter twenty-two: "You are those who have persevered with me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
