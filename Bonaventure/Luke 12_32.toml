[[commentary]]
quote='''
Second, he dissuades the solicitude of avarice by promising the superexcellence of the reward, when he adds: Fear not, little flock: little flock is said in respect to the multitude of the reprobate: Matthew 20: "Many are called, but few are chosen." Or little by reason of its own smallness: First Corinthians 1: "See your vocation, brethren, that not many are wise according to the flesh, not many are powerful," etc. Or little by reason of voluntary humility: Ezekiel 34: "But you are my flocks, you are men, and I am your God." For God is the God of the humble; Sirach 3: "The power of God alone is great, and he is honored by the humble." And to such God promises the kingdom, Matthew 19: "Let the little ones come to me, for of such is the kingdom of heaven." Therefore he adds: Because it has pleased your Father to give you a kingdom: Proverbs 29: "The humble in spirit shall be upheld by glory"; and Job 22: "He who has been humbled shall be in glory." Now this superexcellence of the promised kingdom induces hope, and by inducing hope it induces security, and through this it removes the faintheartedness of fear and the ardor of cupidity: Second Corinthians 6: "As needy, yet enriching many; as having nothing, yet possessing all things." For that kingdom alone is the true possession of the heart, which fills the heart and cannot be taken away, because it is within: below, chapter 17: "Behold, the kingdom of God is within you."

And note that it pleased the Father to give to the little ones, that is, to the poor in spirit, the kingdom of glory: whence Matthew 5: "Blessed are the poor in spirit, for theirs is the kingdom of heaven"; because such desire eternal things: Proverbs 10: "The desire of the just shall be granted to them"; and the Psalm: "The Lord has heard the desire of the poor"; because they despise temporal things; Matthew 19: "He who has left father or mother shall receive a hundredfold," etc.; and they embrace spiritual things: Galatians 5: "If we live by the Spirit, let us also walk by the Spirit; let us not be made desirous of vainglory." Likewise it pleased him to give them pardon; Judith 9: "The prayer of the humble and the meek has always pleased you," namely, unto the giving of pardon: Exodus 33: "I will have mercy on whom I will have mercy." It pleased him to give grace: Isaiah 42: "Behold my servant, I will uphold him, my chosen one," etc. It pleased him to give wisdom: Matthew 11: "You have hidden these things from the wise and the prudent and have revealed them to little ones." It pleased him to give eternal glory, as here: Fear not, little flock, etc. The Psalm: "The Lord is well pleased with those who fear him, and with those who hope in his mercy."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
