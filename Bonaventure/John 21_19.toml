[[commentary]]
quote='''
Now this, namely that you will stretch out your hands, he said, signifying by what death he would glorify God: because by the death of the cross, which, although before Christ it was to be held in contempt, afterwards became glorious: and by this Peter was made glorious. Whence Augustine says: "That denier, both lifted up by presumption, cast down by denying, afterwards purged by weeping, proved by confessing, was crowned by suffering." By this Peter glorified the Lord, just as Paul said in Philippians 1: "Christ will be magnified in my body, whether by life or by death." And because the passion is not good unless it is voluntary: therefore he exhorts Peter to suffer voluntarily: and for this reason he says: And when he had said this, he says to him, that is, to Peter: Follow me, come voluntarily to the passion of the cross, according to what Peter himself says in First Peter 2: "Christ suffered for us, leaving you an example, that you might follow his steps." Concerning this following or imitation, the Lord said to Peter above in chapter thirteen: "Where I go, you cannot come now; but you shall follow afterwards."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked about what he says: Signifying by what death he would glorify God, because above in chapter five: I do not receive glory from men; therefore, since Peter was a man, he did not glorify God. I respond: It must be said that although God is not glorified in himself, he is nevertheless glorified to us in his Saints who suffer for his glory, because through this it becomes known to us how much must be suffered for the love of God by the example of the Saints.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked about the fact that the Lord specially says to Peter: You, follow me; because if it is understood by way of perfection, many others followed; if by way of passion, likewise; if by the kind of death, Andrew also followed. And it is answered here according to some that you does not indicate distinction absolutely there, but only in respect to John, about whom the discourse was. Or it must be said that you indicates there more significance than distinction: for since Peter was the head of the Church and the chief prelate, just as he excelled in prelacy, so also he ought to excel in imitation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
