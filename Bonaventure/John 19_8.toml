[[commentary]]
quote='''
When therefore he had heard. Here is placed thirdly the inquiry. He inquires, therefore, moved by the accusation of the Jews: whence he says: Pilate, when he had heard this saying, was the more afraid, lest, if he released him, he would act against the Law; and if he did not release him, he would crucify the Son of God. A good judge ought not to fear: whence Ecclesiasticus 7: "Do not seek to be made a judge, unless you have strength to break through iniquities."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
