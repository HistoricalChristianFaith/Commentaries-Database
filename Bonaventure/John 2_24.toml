[[commentary]]
quote='''
But Jesus himself did not entrust himself to them: not because he feared, but because he recognized their weakness. And he shows how he knew this: because not as a man by report, but as God by internal vision: because he himself knew all men: 1 Kings 16: "Men see those things that appear, but God beholds the heart."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
