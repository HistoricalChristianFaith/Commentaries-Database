[[commentary]]
quote='''
When therefore he had gone out. After the perversity of Judas in going astray has been shown, the weakness of the disciples in following the Lord is shown. And this is the fourth part of the chapter, and he does this in this order. For first, the future passion of Christ is foretold; second, the imperfection of the disciples; third, the instruction of the imperfect; fourth, the presumption of Peter is checked. Therefore there is first predicted Christ's future passion and through the passion his glorification, which was hastening, as the betrayer hastened. On account of which he says: When therefore he had gone out, namely Judas, to accomplish what he had conceived: Jesus said: Now is the Son of man glorified. Now he says on account of the impending passion, by whose merit he was to be exalted; Philippians 2: "He humbled himself, wherefore God also exalted him." And God is glorified in him, because through Christ he became known to all; below in chapter 17: "Father, I have manifested your name to the men whom you gave me out of the world."

Question. It is asked concerning what he says first: Now the Son of man is glorified: because in the passion and betrayal of Judas he is rather said to be diminished than glorified. Augustine responds that this is said in sign, because at the departure of Judas only the good remained: and then the future glory was signified, in which God will be only with the good. Otherwise it can be said that he says this according to merit: because in the passion he merited to be glorified, and insofar as was in him he glorified the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
