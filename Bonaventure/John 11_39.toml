[[commentary]]
quote='''
Jesus said: Take away the stone. And because Martha was concerned about the Lord with respect to sensible and corporeal things: therefore: Martha, the sister of him who had died, said to him: Lord, he already stinks: therefore it should not be opened: for he has been dead four days. And because Martha believed that the Lord wished to see him out of compassion, not to raise him by his power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
