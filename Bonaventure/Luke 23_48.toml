[[commentary]]
quote='''
Fourth, as to the trembling compunction of the people, he adds: And all the multitude of those who had come together to that spectacle and saw the things that were done, striking their breasts, returned. The striking of the breast is a sign of penitence and compunction, as above in the eighteenth chapter concerning the publican, who "struck his breast, saying: God, be merciful to me a sinner." By this multitude is understood the Jewish people, who, although they saw the truth, as the centurion did, only struck their breasts but did not break forth into the voice of confession. Whence the Gloss says: "Let us see the difference between nation and nation: the Gentiles, as Christ died, glorify God with the voice of open confession; the Jews, only striking their breasts, return home in silence." Whence they returned home, because, although it seemed to them that what had been done against Christ was unjust, nevertheless they had little or no affection toward him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
