[[commentary]]
quote='''
For this reason there is subjoined a threefold opinion taken from a threefold excellence. As to the first he says: But they answered and said: John the Baptist: and this, because they saw in him the spirit of sanctification, which was in John, according to that passage above in the first chapter: "He shall be great before the Lord and shall be filled with the Holy Spirit," etc. — But not all agreed on this, therefore he adds: But others: Elijah, namely on account of his zeal of emulation, according to that passage in Ecclesiasticus forty-eight: "Elijah the prophet arose like fire, and his word burned like a torch." And this seemed probable, because Elijah was an excellent prophet not only in life but also in power, and because his coming had also been promised, according to that passage in the last chapter of Malachi: "Behold, I will send you Elijah the prophet, before the great and terrible day of the Lord comes." — Yet not all agreed on this either, and therefore he adds: Others, that one of the former Prophets has arisen: and this on account of the sense of discernment, which they perceived in him; above in the seventh chapter: "A great Prophet has arisen among us"; and John six: "This is truly the Prophet who is to come." But because they believed him to be a mere man, therefore one of the former prophets: on account of which they erred, because he was not one among the former prophets, but the one on account of whom all the former prophets had come before; concerning whom Deuteronomy eighteen says: "The Lord will raise up a Prophet from your nation; you shall hear him as you hear me."

From such great variety, therefore, it is apparent that the crowds were estranged from the truth and from uniformity of faith; on account of which it is said in Ephesians four: "Let us not be as little children, tossed about, and carried about by every wind of doctrine, unto the circumvention of error."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
