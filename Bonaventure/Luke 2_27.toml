[[commentary]]
quote='''
Secondly he is also commended by the Spirit of truth as leading him to meet in the temple; with respect to which it is said: And he came in the Spirit into the temple; he came indeed as one led by the Holy Spirit: Romans 8: "Whosoever are led by the Spirit of God, they are the sons of God." He came indeed to serve and venerate the Lord, so that he could say that word of the Psalm: "I will go into your house; I will worship toward your holy temple in your fear"; and again: "We shall go into his tabernacle; we shall worship in the place where his feet have stood."

Lastly he is commended by the Spirit of truth as leading him to embrace with joy; and this, when it is said: And when his parents brought in the child Jesus, namely into the temple, according to Malachi 3: "Presently the Lord whom you seek shall come to his holy temple," etc. They brought him in, I say, to do for him according to the custom of the Law, because, as is said in Philippians 2, he was "made in the likeness of men, and in habit found as a man."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
