[[commentary]]
quote='''
"And we have believed and have come to know that you are the Christ, the Son of God." He made a similar confession in Matthew 16: "You are the Christ, the Son of the living God," "who have come into this world." He says "we believe," and then "we have come to know," because faith is the way into knowledge. "For unless you shall have believed, you shall not understand," Isaiah 7.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
