[[commentary]]
quote='''
If you abide in me. Above he showed that he is the origin of fruit through the opposite of abiding; but here he shows through abiding itself, which gives fruit both with respect to yourself and with respect to your neighbor. With respect to yourself: If you abide in me, and my words abide in you: not like those of whom Luke 8 says: "They believe for a time, and in the time of temptation they fall away"; but like those of whom the Psalm says: "Who keep his covenant and are mindful of his commandments, to do them"; whatever you will, you shall ask, and it shall be done for you; above in chapter nine: "If anyone does the will of God, he hears him." Not only is there fruit with respect to oneself, but also with respect to one's neighbor, to be converted to the glory of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
