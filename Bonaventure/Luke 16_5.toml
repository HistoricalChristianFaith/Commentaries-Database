[[commentary]]
quote='''
Sixth, with regard to the display of generous mercy to be imitated, it is added: Having therefore called together each of his lord's debtors, where literally the generosity of munificence and mercy in the steward is shown, both because he gives to many, and because he gives much, and because he gives moderately: to many, because to each of his lord's debtors, according to that which the Lord counsels above in chapter six: "Give to everyone who asks of you"; and Isaiah 32: "Blessed are you who sow beside all waters, sending forth the foot of the ox and the donkey." And because mercy ought to be expended on those in need, therefore he does not give to just anyone, but to debtors; according to that passage in Isaiah 58: "Set free those who are broken, and break asunder every burden. Break your bread for the hungry and bring the needy and wandering into your house. When you see one naked, cover him, and do not despise your own flesh."

Much, because he remits a great sum of the price; on account of which he adds: He said to the first: How much do you owe my lord? He said, I say, through familiar address; Sirach 4: "Make yourself affable to the congregation of the poor. Incline your ear to the poor without sadness, and repay your debt, and answer him peacefully," etc.; and Sirach 18: "Does not the dew cool the heat? So also a word is better than a gift."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke, Chapter 16'
