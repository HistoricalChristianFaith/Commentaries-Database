[[commentary]]
quote='''
For Jesus had not yet come into the town, but was still in that place where Martha had met him. In this is signified that a man called by the Lord ought to hasten, as the good disciples did, of whom it is said in Matthew 4: "Immediately, leaving their nets, they followed him." Whence also that man is reproved in Luke 9, who said: "Let me first go and bury my father." Ecclesiasticus 31: "In all your works be swift." And Proverbs 18: "He who is soft and slack in his work is the brother of him who wastes his own works."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
