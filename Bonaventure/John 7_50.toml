[[commentary]]
quote='''
"Nicodemus said," namely that disciple who came to Jesus by night, "who was one of them," namely of the Pharisees; above in chapter 3: "There was a man of the Pharisees named Nicodemus," etc. Here the refutation of the Pharisees is made by the authority of the Law, through which it is shown that they ought not to have seized him, because he had not yet been condemned to death by the Law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
