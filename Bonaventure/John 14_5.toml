[[commentary]]
quote='''
Thomas says to him: Lord, we do not know where you are going, and how can we know the way? Thomas the doubter was slow to understand, and this for our benefit: because, just as the denial of Peter was profitable for removing presumption, so the ignorance of Thomas was profitable for the strengthening and clarification of faith. Therefore the Lord assures him concerning the way and the destination.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
