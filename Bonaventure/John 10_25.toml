[[commentary]]
quote='''
"Jesus answered them." After the inquiry has been set forth, here is set forth the presentation of a certain sign, and this indeed in the following manner. First, therefore, in the Lord's response is set forth the reproof of the Jews; second, the expression of a certain sign; third, the reason for that sign.

The reproof of the unbelief of the Jews is set forth, on account of which he says: "I speak to you, and you do not believe," and therefore you seek foolishly and maliciously; and I speak openly, because not only by word, but by deed: "The works that I do in the name of my Father, they bear witness of me"; above in chapter seven: "When Christ comes, will he do more signs," which you ought to believe?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
