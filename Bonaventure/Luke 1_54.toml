[[commentary]]
quote='''
Fourth, she praises God in the aforesaid work, insofar as it is manifestative of the truth of the promise, when she says: He has received Israel his servant, being mindful of his mercy: where first is set forth the fulfillment of the promise, which promise divine benignity made and divine truth fulfilled: whence the Psalm: "Mercy and truth have met each other, justice and peace have kissed." And this was done when he assumed our flesh: Hebrews 2: "For nowhere does he take hold of angels, but of the seed of Abraham"; Isaiah 42: "Behold my servant, I will uphold him: my elect, my soul is well pleased in him"; and Hosea 11: "Israel was a child, and I loved him, and out of Egypt I called my son." — And this: Being mindful of his mercy, which he cannot forget: the Psalm: "Or will God forget to show mercy? Or will he in his anger shut up his mercies?"; and Isaiah 49: "Can a woman forget her infant, so as not to have pity on the son of her womb? And if she should forget, yet I will not forget you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
