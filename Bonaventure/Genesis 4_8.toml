[[commentary]]
quote='''
Christ is symbolized most of all by the murder of Abel; for Christ was killed by His brothers; and an inscription was placed among the Jews, that they be not killed, but become errant and fugitive on the earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'
