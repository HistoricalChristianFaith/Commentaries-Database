[[commentary]]
quote='''
That the word of Isaiah the Prophet might be fulfilled, which he spoke: Lord, who has believed: as if to say: few, or none: our report? That is, that which we have heard from the Lord: or that which one hears from us prophesying, because "faith comes from hearing," Romans 10. And the arm of the Lord, to whom has it been revealed? The arm of the Lord, as Augustine says, is the Son of the Father. "For just as your arm is that by which you work, so the arm of God is called the Word, by which he made the world. This arm is neither stretched out when extended nor drawn in when gathered." Nor was it only foreseen, but it also came about by the just judgment of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
