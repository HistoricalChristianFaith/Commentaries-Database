[[commentary]]
quote='''
"He who believes in the Son has eternal life," in merit, namely: "but he who is unbelieving toward the Son shall not see life," he shall not have glory, but punishment. Whence he says: "But the wrath of God remains upon him": in chapter 12: "He who despises me and does not receive my words has one who judges him"; wrath, namely of vengeance, concerning which Proverbs 6: "The jealousy and fury of a man will not spare in the day of vengeance," etc.; or wrath, that is, original guilt, through which one is a child of wrath; Ephesians 2: "We were by nature children of wrath."

It is asked concerning what he says: "He who believes has eternal life": because, if he has it, he does not believe.

I respond: To have spiritual things is through love; and then they are perfectly had when they are perfectly loved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
