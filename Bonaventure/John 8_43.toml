[[commentary]]
quote='''
"Why," he says, "do you not recognize my speech?" namely by believing in me. The reason for this was hatred, "because you cannot hear my word," on account of hatred and envy; Wisdom two: "He is grievous to us to behold."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
