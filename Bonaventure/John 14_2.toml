[[commentary]]
quote='''
Scripture enlightens from above by means of divine promises, for its teaching is concerned with things above. Hence the Apostle writes: For we know that if the earthly house in which we dwell be destroyed, we have a building from God, a house not made by human hands, eternal in the heavens. And: "In My Father's house there are many mansions," says the Lord. In the Psalms, it is said: The children of men take refuge in the shadow of Your wings. They have their fill of the prime gifts of Your house; from Your delightful stream You give them to drink. For with You is the fountain of life, and in Your light we see light. And in the Apocalypse: For the Lamb who is in the midst of the throne will shepherd them, and will guide them to the fountains of the waters of life. And in a Psalm: The delights at Your right hand forever. And so Scripture offers us the divine promises.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252017.html'
source_title='Collations on the Hexaemeron, Collation 17'

[[commentary]]
quote='''
In my Father's house there are many mansions, already prepared, that is, according to eternal election: for in Ephesians 1: "He chose us before the foundation of the world"; Jerome says: "In heaven diverse mansions are prepared for diverse virtues, which not persons receive, but works." Thus they are prepared. If not so, that is, if it were not so: whence another reading of Chrysostom, where it says: If not so, reads: "If indeed not," that is, if they were not prepared through predestination: I would have told you: For I go to prepare a place for you. But it is impossible that I should now prepare: because it is impossible that I should predestine anyone anew, as Augustine says. Therefore I said that "mansions are in the Father's house," already prepared through predestination, but still to be prepared through the merit of faith, which has its greatest merit in absence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
