[[commentary]]
quote='''
Woe to you who build etc. After he has threatened them with woe for the fault of sloth arising from a defect of truth of life, here secondly he repeats the same for the fault of perfidy against the truth of justice, which indeed consisted in the impious persecution of the just. Concerning which, first the fault itself is aggravated, then the punishment is intensified. First therefore, as to the aggravation of the fault, he says: Woe to you who build the monuments of the Prophets, displaying piety in deed, but bearing impiety in mind, just as their fathers also did. — On account of which he adds: But your fathers killed them, namely as impious men killed the just. Whence in Acts seven blessed Stephen said: "Which of the Prophets did your fathers not persecute? And they killed those who foretold the coming of the Just One." But these men also, although they pretended otherwise, were nevertheless imitators of them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
