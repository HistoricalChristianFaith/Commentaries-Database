[[commentary]]
quote='''
Jesus answered him: Wilt thou lay down thy life for me? Augustine: "Can you go before, you who cannot follow? What do you believe yourself to be? Hear what you are." Verily, verily, I say unto thee, the cock shall not crow till thou hast denied me thrice. Augustine: "You who promise me your death will deny your life three times. For as great a life as it is to confess Christ, so great a death is it to deny Christ. By fearing the death of your flesh, you will deal death to your soul."

Question. It is asked concerning what the Lord said to Peter: You will deny me three times. From this it seems that he revealed to Peter his fall, and that he compelled Peter to despair. I respond: It must be said that to foretell and to reveal are different. God reveals to no one, but nevertheless He does foretell: because what is revealed is known with certitude, but what is foretold is not: because sometimes it is believed to be said as a threat, and sometimes under a condition. Whence Peter also understood it under a condition: if you do not guard yourself; and therefore he did not despair.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
