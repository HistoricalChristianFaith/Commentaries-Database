[[commentary]]
quote='''
Third, as regards the devotion of prayer on the part of the manner of praying, he adds: And he was withdrawn from them about a stone's throw, and kneeling down he prayed: in which he shows the devotion and humility and reverence of the heart. Whence Bede: "He prayed on bended knees, so that he might show the humility of mind through the posture of the body." And this indeed was fitting: for such prayer is most pleasing, according to that passage in Ecclesiasticus thirty-five: "The prayer of him who humbles himself shall pierce the clouds, and until it draws near, he shall not be consoled"; whence also in the Psalm: "He has regarded the prayer of the humble and has not despised their petition"; and therefore Judith nine: "The prayer of the humble and the meek has always been pleasing to you." In this manner Paul prayed, Ephesians three: "I ask that you do not lose heart in my tribulations for you. For this reason I bend my knees before the Father of our Lord Jesus Christ, from whom all fatherhood in heaven and on earth is named."

And note that he says that he was withdrawn from the disciples about a stone's throw, not only for the sake of privacy, but also for the sake of the mystery: because by this it was signified that that cornerstone was to be separated from the disciples for a little while and would soon return, which the hiding of the paten in the Mass signifies. — Or it certainly signifies that in order for one to pray devoutly, it is necessary that one be torn away from carnal affections; whence Isaiah twenty-eight: "Whom shall he teach knowledge? And whom shall he make to understand the message? Those weaned from milk, those torn from the breasts." And this tearing away cannot happen except through a certain force and violent motion; and on account of this force of the spirit interceding, it is said in Romans eight: "It is the Spirit who intercedes for us with unutterable groanings."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
