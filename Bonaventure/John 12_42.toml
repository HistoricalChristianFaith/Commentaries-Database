[[commentary]]
quote='''
Nevertheless, from among the rulers. Here the second point is touched upon, namely the election of certain ones: therefore he speaks adversatively: although it was said that they did not believe, nevertheless many of the rulers believed in him: Romans 11: "At this time a remnant according to the election of grace has been saved." But yet they were not perfect in faith; on account of which he adds: But on account of the Pharisees they did not confess, lest they be cast out of the synagogue: above, chapter 9: "For the Jews had already conspired that if anyone should confess him to be the Christ, he should be put out of the synagogue." And this indeed they feared as being imperfect.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
