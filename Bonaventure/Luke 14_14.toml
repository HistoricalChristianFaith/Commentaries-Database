[[commentary]]
quote='''
Second, as to the assignment of the persuasive reason, he adds: And you shall be blessed, because they have nothing to repay you: therefore it is necessary that another repay on their behalf: Proverbs 19: "He who has mercy on the poor lends to the Lord"; which is said on account of the immensity of the reward, concerning which he adds: For it shall be repaid to you in the resurrection of the just, that is, in eternal glory; concerning which resurrection, Apocalypse 20: "Blessed and holy is he who has part in the first resurrection"; and below in chapter 20: "Those who shall be accounted worthy of that age and of the resurrection shall be equal to the Angels and are sons of God, since they are sons of the resurrection." In this resurrection the wicked shall rise to death, but the just to life: John 5: "Those who have done good shall come forth to the resurrection of life, but those who have done evil to the resurrection of judgment." In this, recompense shall be made to the merciful: whence Ecclesiasticus 12: "Do good to the just, and you shall find great recompense, and if not from him, certainly from God"; and especially regarding almsgiving: whence Matthew 25: "Come, blessed of my Father, receive the kingdom" etc.; and afterward: "I was hungry, and you gave me to eat" etc. And therefore Matthew 5: "Blessed are the merciful, for they shall obtain mercy." Whence to works of piety especially is the recompense of blessedness rendered: on account of which, Ecclesiasticus 17: "The alms of a man is as a purse with him, and shall preserve the grace of a man as the apple of his eye; and afterward he shall rise up and shall render them their reward, to each one upon his own head."

Now the reason for this is that no one is worthy of mercy unless he shows mercy: because, James 2, "judgment without mercy to him who does not show mercy." And no one comes to eternal blessedness except through mercy: Psalm: "Men and beasts you shall save, O Lord: how you have multiplied your mercy, O God"; and again, Titus: "Not by works of justice which we have done, but according to his mercy he saved us."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
