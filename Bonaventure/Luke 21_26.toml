[[commentary]]
quote='''
Third, with respect to rational nature, he adds: Men withering away from fear and expectation of the things that shall come upon the whole world. For then shall be fulfilled that word of Matthew twenty-five: "At midnight a cry was made: Behold the bridegroom comes," etc. Whence the Gloss: "This is understood of the advent itself, when all the virgins, wise and foolish, roused by the unusual cry, trim their lamps, that is, reckon their works with themselves, on account of which they await with the greatest fear the now imminent coming of the Eternal judgment." Moreover, those men are said to wither who have lived according to the flesh; for Isaiah forty: "All flesh is grass." "The grass is dried up," etc. Whence also James one: "The sun rose with its burning heat and dried up the grass"—the sun of justice coming to judgment. Whence Bede: "In the expectation of the strict examination, those who flourished in this world shall wither away," according to that word of Exodus fifteen: "Let fear and dread fall upon them by the greatness of your arm." Then in those in whom there was security and joy, there shall be nothing but fear and mourning, because, First Thessalonians five, "when they shall say: Peace and security, then sudden destruction shall come upon them." Whence Chrysostom: "There shall be neither strength to resist, nor place for repentance, nor opportunity for satisfaction; from the anguish of all things nothing shall remain but mourning." Whence Matthew twenty-four: "The sign of the Son of Man shall appear in heaven, and then all the tribes of the earth shall mourn."

Fourth, with respect to intellectual nature, he adds: For the powers of the heavens shall be moved. Now the powers of the heavens are the blessed Angels, who are said to be shaken by the disturbance of all things, according to that word of Job twenty-six: "The pillars of heaven tremble and are terrified at his command." They are said to tremble and quake, however, not from fear of punishment, but from reverential fear and horror at the divine vengeance, according to that word of Job forty-one: "When he shall raise himself up, the Angels shall fear, and being terrified they shall be purified." Whence, just as someone standing upon a mountain ridge is in a certain way terrified by the burning of some village or a chasm in the earth, so in a certain way those heavenly powers shall tremble at that terrible retribution. Whence Jerome: "What shall the twig of the desert do, when the cedar of the Lebanon of paradise is shaken with fear?" Whence Isaiah six: "The lintels of the doorposts were moved at the voice of the one crying out, and the house was filled with smoke." Whence Chrysostom: "If a king, about to go forth to war against someone, orders a campaign among the people, all the dignitaries are stirred, the army is mustered, the whole city is in ferment—how much more, when the heavenly King arises to judge the living and the dead, are the angelic powers moved: terrible ministers preceding the terrible Lord; before him, in place of candelabra, living lightnings shall go forth; in place of trumpets, dreadful thunders! Truly a great voice, which all the elements obey, which splits rocks, opens the netherworld, and breaks the bonds of death."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
