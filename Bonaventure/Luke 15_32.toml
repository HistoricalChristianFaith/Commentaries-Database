[[commentary]]
quote='''
He also placates by approving the mercy bestowed, when he adds: But it was fitting to feast and rejoice, namely because charity urges it, for it is charity that compels one to rejoice over what is good. Whence the Apostle, Second Corinthians five: "Whether we be beside ourselves, it is to God; or whether we be sober, it is for you. For the charity of Christ urges us." And just as it belongs to charity to burn over the scandal of another, according to that passage of Second Corinthians eleven: "Who is scandalized, and I am not on fire?" so also to rejoice and be refreshed by the remedy of another. Therefore he says: Because this your brother was dead and has come back to life, was lost and has been found: he was dead, by forsaking Christ, who says of himself, John fourteen: "I am the way, the truth, and the life"; and chapter one: "The life was the light of men." He was lost, by loving sin, because, Ecclesiasticus three, "he who loves danger shall perish in it." He came back to life, however, by returning to the grace of Christ: John eleven: "I am the resurrection and the life," etc. And he has been found, by returning to repentance, just as above in the same chapter the little sheep was found, and the lost drachma was also found. And therefore it was fitting to feast and rejoice, because, as was said above in the same chapter, "there is joy among the Angels of God over one sinner doing penance," joy also for the shepherd over the sheep, joy likewise for the woman over the drachma: therefore much more should there be joy for a brother over his brother and for a father over his son who has been found again.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
