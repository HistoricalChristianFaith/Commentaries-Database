[[commentary]]
quote='''
And this was the way leading to faith, and therefore he adds: And they remembered his words; whence John 2: "What sign do you show us, since you do these things? Jesus answered and said to them: Destroy this temple, and in three days I will raise it up." "But he was speaking of the temple of his body. When therefore he had risen from the dead, they remembered that he said this" concerning the temple of his body. Similarly also Matthew 12: "An evil and adulterous generation seeks a sign, and no sign shall be given to it except the sign of Jonah the prophet. For as Jonah was three days and three nights in the belly of the whale, so shall the Son of man be in the heart of the earth."

Whence the Lord foretold his passion and resurrection, that he might at once move them to sorrow and draw them to love; on account of which Ecclesiasticus 11: "In the day of good things, be not unmindful of evil things, and in the day of evil things, be not unmindful of good things."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
