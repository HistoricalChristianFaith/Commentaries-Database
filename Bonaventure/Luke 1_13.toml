[[commentary]]
quote='''
And the Angel said to him. Here is touched upon thirdly the announcement of the future conception, as strengthening the irascible power, as instructive of the rational power, and as consoling the concupiscible power. — It is shown to be strengthening in that he says: Fear not, Zacharias, for your prayer has been heard. If God hears men, then one must hope in him, and therefore give thanks, not be afraid; Genesis 15: "Fear not, Abram: I am your protector." And that it has been fully heard, the sign is the sending of a messenger: Tobit 3: "At that time the prayers of both were heard. And the Angel Raphael was sent," etc. Similarly the Angel said in Daniel 10: "Do not fear, Daniel, for from the first day that you set your heart to understand, that you might afflict yourself in the sight of your God, your words have been heard."

The announcement is described as instructive, whereby he foretells the offspring and predicts the name. And your wife Elizabeth shall bear you a son, and you shall call his name John: she shall bear, I say, to you, because from you and for your consolation, according to what was promised to Abraham in Genesis 15: "He who shall come forth from your body, him you shall have as heir." And he adds the name of the same, according to that passage in Isaiah 49, which is spoken in the person of John himself: "The Lord called me from the womb, from the bowels of my mother he was mindful of my name."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'

[[commentary]]
quote='''
Conjugal chastity accords with the law of grace by reason of the angelic announcement, according to that passage of Luke 1: Fear not, Zechariah, for your prayer has been heard, and Elizabeth your wife shall bear you a son: now Zechariah had merited this through devout prayer and through a holy life chastely maintained in the law of marriage; whence it is said in Luke 1 that both were just before the Lord, walking in all the commandments and justifications of the Lord, without blame.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25203.html'
source_title='Disputed Questions on Evangelical Perfection, Question 3'
