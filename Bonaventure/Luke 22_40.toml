[[commentary]]
quote='''
Second, as regards the solicitude of prayer on the part of the soul, he adds: And when he had come to the place, he said to them: Pray, lest you enter into temptation. From which it is apparent that the Lord prayed with solicitude and urged the disciples to prayer, in order to teach that one must pray with solicitude on account of imminent dangers. For then especially must one persist in prayer, according to that word of the Psalm: "In the day of my tribulation I sought God with my hands," etc. For when temptation is imminent, it is then necessary to implore help from on high, according to that word of 2 Chronicles 20: "When we do not know what we ought to do, this alone remains to us, that we direct our eyes to you." But when a man is tempted, it is necessary for him to seek help, lest he be overcome; and this is sought in the Lord's Prayer, Matthew 6: "And lead us not into temptation." Whence he who in temptation does not watch and pray is the companion of a thief, because, when he perceives the enemies, he does not cry out to the Lord of the fortress and his soldiers, that they might come to his aid. Whence above, in chapter twenty-one: "Watch at all times, praying, that you may be accounted worthy to escape all these things that are to come."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
