[[commentary]]
quote='''
Second, as regards the rigor of the sentence in threatening, he adds: And he said to the keeper of the vineyard: Behold, these three years I come seeking fruit on this fig tree and find none. By the three years are understood childhood, adolescence, and youth, in which one neglects to do penance, according to that passage in Job twenty-four: "God gave him a place of repentance, and he abuses it unto pride." The keeper of this vineyard is the preacher and especially the prelate, of whom it is said in First Corinthians three: "I planted, Apollo watered." Whence Augustine, Against Five Heresies: "Where are you, O good farmers, what are you doing, why are you idle? See how full the earth is of evils: here thorns, here thistles, here grass springs up. Burn the thorns, uproot the thistles, cut the grass, and scatter good seed. Let not winter frighten you: even if iniquity abounds, yet let your charity be fervent. Sow in winter what you may reap in summer," etc. — To such a negligent farmer it is fitting to threaten the severity of the divine judgment; on account of which he adds: Cut it down therefore; why does it even occupy the ground? That is, proclaim that it is to be cut down, according to what John the Baptist said in Matthew three: "Bring forth fruit worthy of repentance." "For now the axe is laid to the root. Every tree that does not bring forth good fruit shall be cut down and cast into the fire"; and Paul in Romans two: "Do you not know that the goodness of God leads you to repentance? But according to your hardness and impenitent heart, you treasure up for yourself wrath in the day of wrath and of the revelation of the just judgment of God"; and David in the Psalm: "Therefore God shall destroy you forever, and he shall pluck you out and remove you from your dwelling, and your root from the land of the living."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke, Chapter 13'
