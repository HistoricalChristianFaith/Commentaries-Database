[[commentary]]
quote='''
I do not ask that you take them away. Here the second point is touched upon, namely the form of the petition, in which he asks that they be removed from a twofold evil, namely of perverse affection and of error. He asks, therefore, that they be preserved from perverse affection, to which the world draws them, in which they had to dwell; therefore he says: I do not ask that you take them out of the world, that is, through the death of the flesh, as is said of Enoch in Genesis 5: "Enoch walked with God and appeared no more, because God took him." He took him for this purpose, to preserve him from evil; Wisdom 4: "He was snatched away, lest wickedness alter his understanding." He was not asking that they be preserved in this way, but in the world: therefore he adds: But that you keep them from evil.

An inquiry is made concerning this, that he asks for his disciples to be preserved from evil. It seems that he asks in a disordered manner: Because they were in charity; but from however small a grace or charity one can resist however great a temptation; therefore, etc. Likewise, from that grace one cannot fall except through mortal sin; one cannot sin except willingly; therefore that each one be preserved lies within the freedom of our will; therefore he asks superfluously. It is answered to this that, as Augustine says, to persevere in the good received is of divine gift and of our solicitude; for grace is preserved in us through continual inflowing, and therefore it is asked of the Lord that he continually assist. Hence, even if we can fail by will alone, unless divine aid intervenes, we cannot persevere.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
