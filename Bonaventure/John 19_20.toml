[[commentary]]
quote='''
This title therefore. Here is set forth the publication of the title: whence he says: Many of the Jews read it, because the place where Jesus was crucified was near the city: therefore many were reading, because many were gathering together, and not only Jews but also others: Isaiah thirty-four: "Search diligently in the book of the words of the Lord and read: not one of them was lacking." And it was written in Hebrew, Greek, and Latin, so that all might be able to read the title, because he was to be king of all, as it is said in Revelation nineteen, that he "is King of kings and Lord of lords"; therefore in three languages, because Deuteronomy nineteen: "In the mouth of two or three witnesses every word stands."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
