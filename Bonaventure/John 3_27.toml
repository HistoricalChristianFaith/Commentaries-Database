[[commentary]]
quote='''
John humbles himself and places himself after Christ through consideration of human frailty against his disciples who wished him to magnify himself and his own baptism. On account of which he says: "A man cannot receive anything unless it has been given him from heaven"; James 1: "Every best gift and every perfect gift is from above, descending from the Father of lights." And so, since I am a mere man, I cannot attribute to myself anything except what has been given to me; and therefore I do not attribute to myself the office of Christ, but that of a herald; 1 Corinthians 4: "What do you have that you have not received?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
