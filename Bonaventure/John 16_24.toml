[[commentary]]
quote='''
Not yet therefore, Lord, have I said or conceived how greatly those Blessed ones of yours shall rejoice. Surely they shall rejoice as much as they shall love; they shall love as much as they shall know. How much shall they know you and how much shall they love you? Certainly neither eye has seen, nor ear heard, nor has it ascended into the heart of man in this life, how much they shall know and love you in that life.

I pray, O God, that I may know you, love you, that I may rejoice in you: and if I cannot do so fully in this life, may I at least advance from day to day, until that fullness shall come: may the knowledge of you advance here in me and there be made full, may your love grow here and there be full: so that here my joy may be great in hope and there be full in reality. Lord, through your Son you command, nay rather you counsel us to ask, and you promise that we shall receive, that our joy may be full. O truthful God, I ask that I may receive, that my joy may be full. I ask, Lord, what you counsel through our admirable Counselor: may I receive what you promise through your Truth, that my joy may be full.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25207.html'
source_title="Breviloquium, Part 7"

[[commentary]]
quote='''
Until now you have not asked. Here the second point is touched upon, namely the fitness of time for asking, which hitherto had not been, but henceforth was to be: therefore he says: Until now you have not asked anything in my name, because it was not the opportune time: because the Lord himself was with them, who gave all things: whence below in chapter seventeen: "When I was with them, I kept them in your name." But from now the time has come: therefore he says: Ask, and you shall receive, that your joy may be full, because all your petition ought to be referred to that joy. This full joy consists in the endowments of soul and body: concerning which Isaiah last chapter: "You shall see, and your heart shall rejoice, and your bones shall sprout like grass." And that the apt time for asking has arrived is clear, because until now they neither knew nor recognized from whom they ought to ask: but from now on they shall know: therefore he says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
