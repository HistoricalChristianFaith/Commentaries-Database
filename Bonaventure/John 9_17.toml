[[commentary]]
quote='''
Therefore they say again to the blind man, namely the Pharisees: What do you say of him who opened your eyes? namely whether he is good or evil: and they inquire maliciously, but the blind man answered simply. But he said: He is a Prophet: the Gloss: "He firmly expresses what he feels," as the crowds, Luke 7: "A great Prophet has risen among us."

The cunning of the Pharisees in testing is noted: for they test the blind man as to what he thinks of Christ, so that, if ill, they might make him deny the miracle of Christ; if well, they might not believe his words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
