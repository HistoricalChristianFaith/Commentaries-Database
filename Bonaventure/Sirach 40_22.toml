[[commentary]]
quote='''
The figures of Scripture are not arid, since they produce lively growths in us. And in Ecclesiasticus: "Charm and beauty delight the eye, but better than either, the flowers of the field."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'
