[[commentary]]
quote='''
In order for someone to be baptized truly and fully, there is required the expression of the vocal form instituted by the Lord, which is this: I baptize you in the name of the Father and of the Son and of the Holy Spirit, Amen: without omission of any word and without insertion of any word, without transposition of the aforesaid order and without alteration of the prescribed name.

Since the power that restores us is the power of the whole Trinity, which holy mother Church believes in the mind, confesses in word, and professes in sign, under the distinction and property, order and natural origin of the three persons: hence it is that for the expression of these things in the Sacrament which is the first of all Sacraments, and in which this power operates firstly and principally, there ought to be an expression of the Trinity in a distinct, proper, and ordered naming, as regards the common form, although in the time of the primitive Church it could be done in the name of Christ, in which the understanding of the Trinity is enclosed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"

[[commentary]]
quote='''
There is generation as of a son by his father, and here are present all the aforesaid conditions except one, that of light, which is coeternal duration, and which is to be supposed in the generation of the Son of God. And the name eternal generation is applied to this final instance, the generation of the Son by the Father. And Christ confirmed this very point when He said: "Go, therefore, and make disciples of all nations, baptizing them in the name of the Father, and of the Son, and of the Holy Spirit." He did not say, "In the name of light and brightness." These, then, are the eleven stars worshiping Joseph, the most comely son, that is, the eleven noble conditions mentioned above; but the twelfth, eternal coexistence, is found in the Son of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252011.html'
source_title='Collations on the Hexaemeron, Collation 11'

[[commentary]]
quote='''
The first mode first and principally fixes its gaze upon being itself, saying that He Who Is is the primary name of God. The second mode fixes its gaze upon the good itself, saying that this is the primary name of God. The first pertains especially to the Old Testament, which above all proclaims the unity of the divine essence; whence it was said to Moses: I am who I am; the second pertains to the New, which determines the plurality of persons, baptizing in the name of the Father and of the Son and of the Holy Spirit. Therefore our master Christ, wishing to raise the young man who had kept the Law to evangelical perfection, principally and precisely attributed the name of goodness to God. No one, he said, is good but God alone. Damascene therefore, following Moses, says that He Who Is is the primary name of God; Dionysius, following Christ, says that the good is the primary name of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25205.html'
source_title='Itinerarium Mentis in Deum, Chapter 5'

[[commentary]]
quote='''
In the New Testament testimony is given, but explicitly, both in Sacraments and in express teachings. For the first of the Sacraments, which is baptism, according to what is written in the last chapter of Matthew, must be performed in the express invocation of the divine Trinity. For there it is said: Teach all nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit: on account of which in that foundational Sacrament the character of the Trinity is imprinted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Mysterio%2520Trinitatis%2FQuestion%25201.html'
source_title='Disputed Questions on the Mystery of the Trinity, Question 1'
