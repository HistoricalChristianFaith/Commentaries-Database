[[commentary]]
quote='''
Not only do I make the dead rise, but I also make the living live: whence: And everyone who lives and believes in me shall not die forever; above in the sixth chapter: "Everyone who sees the Son and believes in him has eternal life." And because "with the heart one believes unto justice, but with the mouth confession is made unto salvation," therefore he says: Do you believe this?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
