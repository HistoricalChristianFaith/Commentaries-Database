[[commentary]]
quote='''
I have yet many things to say to you, but you cannot bear them now: and the reason for this was that they were still carnal: whence 1 Corinthians 3: "I could not speak to you as to spiritual, but as to carnal. For you were not yet able, nor indeed are you yet able." But this carnality was to be removed through the coming of the Holy Spirit; therefore He adds:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
