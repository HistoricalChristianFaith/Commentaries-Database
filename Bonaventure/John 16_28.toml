[[commentary]]
quote='''
Through the first Truth, all come back, as the Son expresses it: "I came forth from the Father and have come into the world. Again I leave the world and go to the Father." Likewise let anyone say: "Lord, I came out of You, the Supreme Being: I will return to You and through You, the Supreme Being." Such is the metaphysical Center that leads us back, and this is the sum total of our metaphysics: concerned with emanation, exemplarity, and consummation, that is, illumination through spiritual radiations and return to the Supreme Being. And in this you will be a true metaphysician.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
I came forth from the Father and came into the world: I came forth through eternal generation; I came, through the incarnation — and this you believed; whence above in the eleventh chapter: "You are the Christ, the Son of the living God, who came into this world." Again I leave the world, through the passion, and I go to the Father, through the glorious resurrection. Whence when he rose again, he sent word to his disciples through Mary, below in the twentieth chapter: "Tell my brothers: I ascend to my Father and your Father, my God and your God." Concerning these two things it is said in the Psalm: "His going forth is from the highest heaven, and his circuit unto the highest thereof."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
