[[commentary]]
quote='''
Secondly, as to the offering of the poor widow, he adds: And he saw also a certain poor widow casting in two small coins. He saw, I say, with the eye of kindness, with which he looks upon the poor, according to that passage of Isaiah 66: "To whom shall I look but to the poor and contrite in spirit and who trembles at my words?" The Lord hears the prayers of such ones; the Psalm: "He has looked upon the prayer of the humble and has not despised their prayers"; and Ecclesiasticus 35: "Do not the tears of the widow run down upon the cheek and ascend from the cheek up to heaven?" He accepts the offerings of such ones, however small they may be, because, as the Gloss says, "God does not consider how much is offered in sacrifice, but from how much it is given." Whence also Matthew 10: "Whoever gives to one of these least ones a cup of cold water shall not lose his reward." Therefore Gregory says: "Our outward goods, however small, suffice for God; for he weighs the heart and not the substance"; and further: "The kingdom of heaven is worth as much as you have. For it was worth to Zacchaeus half his goods; it was worth to Andrew and Peter the leaving of their nets and boat; it was worth to the widow two small coins; and it was worth to another a cup of cold water. The kingdom of heaven, therefore, is worth as much as you have."

And note that in saying she cast in two small coins, he simultaneously indicates her poverty and her liberality: poverty, because she had only two obols; liberality, because, when she could have offered one, she offered both, so as to fulfill that passage of Tobit 4: "If you have little, strive to share even that little willingly."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
