[[commentary]]
quote='''
Third, he describes the privilege of holiness in that he says: And they were both just before God, that is, inwardly, in the eyes of God: Wisdom 5: "The just shall live forever"; and it follows: "Their thought is with the Most High." They were not of the kind of those about whom it is said below in chapter 16: "You are they who justify yourselves," etc.; but like Noah, of whom Genesis 6 says: "Noah was a just and perfect man in his generations; he walked with God," and Hezekiah, of whom 4 Kings 20 says: "Remember, O Lord, how I have walked before you in truth and with a perfect heart." For as it is said in 1 Kings 16: "God looks upon the heart." — They were also just outwardly, in the sight of men; and therefore he says: Walking in all the commandments and justifications of the Lord without blame: Philippians 2: "Do all things without murmurings and hesitations, that you may be without blame and simple children of God, without reproach in the midst of a crooked and perverse nation." And rightly he says in all, because, as it is said in James 2, "whoever shall keep the whole Law yet offend in one point is become guilty of all." And therefore the Prophet said: "I was directed toward all your commandments"; and in the same place: "May my ways be directed to keep your justifications."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'

[[commentary]]
quote='''
Conjugal chastity accords with the law of grace by reason of the angelic announcement, according to that passage of Luke 1: Fear not, Zechariah, for your prayer has been heard, and Elizabeth your wife shall bear you a son: now Zechariah had merited this through devout prayer and through a holy life chastely maintained in the law of marriage; whence it is said in Luke 1 that both were just before the Lord, walking in all the commandments and justifications of the Lord, without blame.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25203.html'
source_title='Disputed Questions on Evangelical Perfection, Question 3'
