[[commentary]]
quote='''
"And Annas sent Him," etc. Here is treated the examination conducted under Caiaphas; and this part is divided into two, because first is set forth the leading of Christ to the judge; second, His denial by the disciple, at the words: "And Simon Peter was standing." As to the first point, the Evangelist disposes of it briefly and says that Christ was sent to Caiaphas, treating nothing of the examination conducted by him, because the other Evangelists had said enough. Therefore he says: "Annas sent Him bound to Caiaphas the high priest," by whom He was dishonored and condemned in many ways; as it is said in Matthew twenty-six, that "they spat in His face and struck Him with their fists, and others slapped Him in the face," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
