[[commentary]]
quote='''
These things I have spoken to you. Here the third point is touched upon, namely the confirmation of the disciples. Because he had foretold the coming dispersion, he adds consolation, since he had not said this so that they would despair, but so that through confidence they would have peace. Therefore he says: These things I have spoken to you, that in me you may have peace: concerning which, the last chapter of Isaiah: "I will extend over her peace like a river." One does not arrive at this peace except through afflictions: therefore he says: In the world you will have tribulation: Acts fourteen: "Through many tribulations we must enter the kingdom of God." In these afflictions one must not despair, therefore he adds: But take courage, I have overcome the world; 1 Corinthians fifteen: "Thanks be to God, who has given us the victory through Jesus Christ our Lord." This victory is obtained by those who believe in Christ; 1 John five: "This is the victory that overcomes the world, our faith."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
