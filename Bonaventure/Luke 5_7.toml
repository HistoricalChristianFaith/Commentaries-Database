[[commentary]]
quote='''
In the partnership, moreover, is suggested the readiness of assistance for manifesting the miracle, when it is added: And they beckoned to their partners who were in the other boat, that is, they showed or signaled by a nod, because, in Tobit 12, "it is honorable to reveal and confess the works of God." Whence a certain author says: "The possession of no good thing is pleasant without a companion," according to that passage of Ecclesiastes 4: "It is better for two to be together than one, for they have the advantage of their companionship." — As a sign of which it is added: That they should come and help them, because, according to that passage of Proverbs 18, "a brother who is helped by a brother is like a strong city." And certainly, as it is said in the same place, "a man friendly to companionship will be more a friend than a brother." — And this is manifestly proven by their readiness in helping; and therefore it is added: And they came and filled both boats. And thus that passage of Proverbs 10 was verified: "The blessing of the Lord makes rich"; whence they could say that passage of Tobit 12: "We have been filled with all good things through him." This filling, moreover, as was touched upon, signifies the filling of the Church: Matthew 13: "The kingdom of heaven is like a net cast into the sea and gathering from every kind of fish," etc. — And therefore it is added: So that they were nearly sinking, because the wicked are so multiplied that we are nearly all submerged, according to that passage of Matthew 24: "Because iniquity has abounded, the charity of many will grow cold," etc. But nevertheless the ship of Peter is not submerged; Paul, however, says in 2 Corinthians 11: "Three times I suffered shipwreck."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
