[[commentary]]
quote='''
And he said to them etc. After the described association of Christ with the disciples on the journey, here he describes the association in conversation, concerning the description of which four things are introduced, namely the inquiry into the matter about which the discourse; the narration of the matter about which the sorrow; the explanation of the matter about which the hesitation of mind; the declaration of Scripture through which the certitude of faith.

First, therefore, as regards the inquiry into the matter about which the discourse, he says: And he said to them: What are these words that you exchange with one another as you walk, and you are sad? For this is the ordered manner of entering into conversation, that one should listen and inquire, according to that passage of Ecclesiasticus thirty-two: "Listen in silence and at the same time inquiring."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
