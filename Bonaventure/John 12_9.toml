[[commentary]]
quote='''
A great multitude therefore knew. The conspiracy and the strengthening of the conspiracy have been predetermined; here in the third place the amplification of the conspiracy is touched upon. For previously they had planned to kill Jesus; here not only Jesus, but also the resurrected Lazarus. And the reason was: because many on account of him believed in Jesus. Two things therefore are noted here, namely the multitude of believers and the amplification of the perversity of the Jews.

The multitude of believers came about on the occasion of the raising of Lazarus; on account of which he says: A great multitude therefore of the Jews knew that he was there, namely in Bethany: and they came, not for Jesus only, but that they might see Lazarus, whom he raised from the dead. They were still weak, because their eyes were not delighted solely by the sight of the Author, but also by his works: whence they were among those of whom it is said above in chapter two, "Many believed in him, seeing the signs which he did"; whence they wished to see miracles, above in chapter six: "A great multitude followed Jesus, because they saw the signs."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
