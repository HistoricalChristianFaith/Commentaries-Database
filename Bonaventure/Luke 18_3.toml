[[commentary]]
quote='''
Second, as to the persistence of the poor woman, he adds: But there was a certain widow in that city; a widow, namely, deprived of the comfort of a husband; and such are especially to be assisted, according to that passage of Isaiah 1: "Seek judgment, relieve the oppressed, judge for the orphan, and defend the widow." To such, justice ought to be rendered more readily, because they are less able to defend themselves and are more frequently oppressed; and therefore Ecclesiasticus 4: "Deliver him who suffers injury from the hand of the proud." "In judging, be merciful to orphans as a father, and as a husband to their mother; and you shall be as an obedient son of the Most High, and he will have mercy on you more than a mother."

Concerning this widow, then, who needed the judge's protection on account of the oppression of the wicked, he adds: And she kept coming to him, saying: Vindicate me against my adversary, through the rigor of just judgment; and this indeed was just for such a person: Ecclesiasticus twenty-one: "The prayer of the poor shall reach from his mouth to the ears, and judgment shall come to him speedily," namely from God; and thirty-five: "He will hear the prayer of the one who is wronged; nor will he despise the prayers of the orphan, nor the widow, if she pours forth words of groaning. Do not the tears of the widow run down her cheek, and is not her cry against him who causes them to fall? For from the cheek they ascend even to heaven." And yet they do not reach the hardened heart of man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
