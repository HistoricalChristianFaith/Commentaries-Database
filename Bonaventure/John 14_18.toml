[[commentary]]
quote='''
I will not leave you orphans. Here secondly, to the disciples who keep the commandments, he promises consolation concerning his visitation; on account of which he says: I will not leave you orphans, that is, desolate: I will come to you, namely by visiting: in the last chapter of Mark the Angel said: "He will go before you into Galilee; there you shall see him, as he told you." And just as the Holy Spirit is not sent except to the good, so also the visitation of Christ is only to the good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
