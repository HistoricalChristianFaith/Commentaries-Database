[[commentary]]
quote='''
"Judge not, that you be not judged." A man ought not to exceed his authority nor rashly judge without rectitude of zeal and clarity of knowledge. It is better, if one must judge concerning another, that one think well rather than ill. A man ought to be more inclined to mercifully excusing than to judging ill. That men judge the hidden faults of others and neglect themselves is the height of foolishness. Gregory says: "The mind, the more curious it is to investigate the affairs of others, the more foolish it is in knowing its own."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25209.html'
source_title='Collationes de Septem Donis, Collation 9'
