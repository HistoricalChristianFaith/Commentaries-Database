[[commentary]]
quote='''
Likewise, for greater certainty he not only presented a palpable body, but also showed the scars of his body; whence he adds: And when he had said this, he showed them his hands and feet, namely with the scars. Now the Lord preserved these, as Bede says, for four reasons: "First, to establish faith in the resurrection. Second, so that when supplicating the Father on our behalf, he may always show what kind of death he endured. Third, so that to those redeemed by his death, he may intimate how mercifully they were aided, by setting forth the signs of that same death. Finally, so that at the judgment he may declare how justly the impious are condemned"; Revelation 1: "Every eye shall see him, and they also who pierced him." — A further reason could also be assigned, namely, to inflame our cold affection, as Ambrose says. And sixth, as a sign of victory: whence Bede: "He preserved the scars not out of inability, but so that he might bear about the triumph of his perpetual victory." Seventh, as a preeminent sign of love: whence Isaiah 49: "In my hands I have inscribed you"; and Song of Songs 8: "Set me as a seal upon your heart."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
