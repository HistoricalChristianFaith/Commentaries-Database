[[commentary]]
quote='''
Second, he calls back from the fear of men, because they can do nothing against the general protection of God: with regard to which he says: Are not five sparrows sold for two farthings? Dipondius here is the name of a coin having two obols or asses. Whence Bede: "A dipondius is a weight composed of two asses. Now what in numbers is one, in weights is an as; what is two, that is a dipondius." With this agrees, nor does it disagree, what is said in Matthew 10: "Are not two sparrows sold for a farthing?" Because, as we see, when five eggs are sold for one denarius, two are given for an obol. A sparrow is therefore of small price, since so many are found for one denarius: yet not even it is excluded from divine protection. On account of which he adds: And not one of them is in forgetfulness before God, but rather is governed by divine providence, according to that passage of Wisdom 11: "You love all things that are, and hate nothing of those things which you have made: for you did not appoint anything out of hatred." From which it is apparent that divine providence extends itself even to the least things: nor does that passage of 1 Corinthians 9 contradict this: "Does God have care for oxen?" For that is understood of the care of special providence, by which he leads by the hand along the way of eternal salvation: but this is understood of the providence of general administration and conservation, of which it is said in the Psalm: "Who gives to beasts their food, and to the young ravens that call upon him."

And note that he says: Is not in forgetfulness before God: saying less and signifying more, because nothing happens to them except according to divine providence ordaining it; whence Matthew 10: "Not one of them shall fall upon the ground without your Father." And yet sparrows fall most easily: whence they are said to have the falling sickness: and for this reason he most aptly sets forth the example of them as of a manifest thing. From which it is gathered as from the lesser, that divine providence is most especially attentive to the governance of man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
