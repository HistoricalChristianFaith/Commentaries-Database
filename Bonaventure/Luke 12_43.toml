[[commentary]]
quote='''
Second, with regard to the excellence of the reward, he adds: Blessed is that servant whom, when his lord comes, he shall find so doing: Matthew chapter twenty-five: "Well done, good and faithful servant," etc. So doing, that is, faithfully, prudently, and watchfully, according to that passage in First Peter chapter four: "As every one has received grace, ministering the same one to another, as good stewards of the manifold grace of God." And Chrysostom says: "These things are said concerning speech and virtue, concerning riches and every stewardship which has been entrusted to each one. For each one ought to use for the common benefit what he has, whether wisdom, or authority, or riches, not to the harm of his fellow servants."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
