[[commentary]]
quote='''
Therefore Jesus came. Here the fifth point is touched upon, namely the delay of time; for this was done by divine dispensation: whence he found him not only dead, but decaying, so that the miracle might be more certain, more wondrous, and more glorious; and therefore he adds: And he found him already having four days in the tomb, and thus already decaying: below in the same chapter: "Lord, he already stinks, for he has been dead four days."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
