[[commentary]]
quote='''
Fear not, daughter of Sion, that is, the Church: he says less and means more, that is, rejoice: in the ninth chapter of Zechariah: "Rejoice greatly, daughter of Sion; shout for joy, daughter of Jerusalem." And the reason for rejoicing is given: Behold, your king comes to you; behold, royal dignity: sitting upon the foal of an ass; behold, meekness and humility. And at the coming of such a one there is cause for gladness, because it is said in the sixteenth chapter of Proverbs: "In the cheerfulness of the king's countenance is life, and his clemency is like the latter rain."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
