[[commentary]]
quote='''
In the middle of time there was both regeneration and the ordering of the Church and spiritual nourishment: therefore Christ instituted these three Sacraments, namely of baptism, the eucharist, and orders, both completely and clearly: first by receiving baptism, then by giving the form and making it known to the rest; orders, indeed, by first giving the power of binding and loosing the sins of the human race and the power of confecting the Sacrament of the altar; the eucharist, indeed, by comparing himself to a grain of wheat and by confecting and giving to the disciples, with the passion imminent, the Sacrament of his body and blood. And therefore these three Sacraments ought to have been instituted by Christ distinctly and integrally and to have been prefigured in manifold ways in the old law, as the substantial Sacraments of the new testament and proper to the lawgiver, namely the incarnate Word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"

[[commentary]]
quote='''
Amen, amen, I say to you. After the prefiguration of the calling of the Gentiles has been described, here is set forth the prediction of the fruit of the Passion, and this indeed in the following manner. First, the fruitfulness of the Passion is foretold. Second, because the Passion has no effect except in the imitators of Christ, there is set forth an exhortation to imitation, at the words: He that loveth his life, etc. Third, because none imitate unless they are called by the Lord, the prayer made on their behalf is noted, at the words: Now is my soul troubled. Fourth, because He obtains all that He asks, the hearing of the prayer is noted, at the words: There came therefore a voice, etc.

First, therefore, the fruitfulness of the Passion is touched upon by the example of the grain; on account of which He says: Amen, amen, I say to you; speaking assertively to the Gentiles who had sought Him, in order to confirm them in faith: unless the grain of wheat falling into the ground die: It itself remaineth alone. According to the letter, it is not multiplied unless it dies; First Corinthians 15: "Thou fool, that which thou sowest is not quickened except it die first." But if it die, it bringeth forth much fruit: because then it produces a harvest.

So it is to be understood of Christ, who is a grain of wheat on account of its purity and abundance of richness, on account of which the best bread is made from it: so also the flesh of Christ, who is "the living bread that came down from heaven," above in the sixth chapter. Of this it is said in the Psalm: "He satisfies you with the fat of wheat." This grain, falling into the earth, through lowliness, died through the bitterness of the Passion; therefore it is said in the Psalm: "You have brought all your waves upon me. You have put my acquaintances far from me; they have made me an abomination to themselves." This grain brought forth much fruit, because it brought many sons into glory: Hebrews 2: "It was fitting for him who brought many sons into glory to perfect the author of their salvation through suffering"; Isaiah 60: "When the multitude of the sea shall be converted to you, the strength of the nations shall come to you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
