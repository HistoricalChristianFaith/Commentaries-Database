[[commentary]]
quote='''
After the communication of Christ's teaching, there follows here its authentication through the power of a miracle. This admirable power is shown in Christ teaching in a threefold manner: first, with respect to the male sex; second, with respect to the female sex; third, with respect to every sex and age. Again, there is another difference on the part of nature, because the first consists in the liberation of a man from a demon; the second, in the liberation of a woman from a fever; the third, in the liberation from both indifferently. Again, the first is in a place of instruction, namely in the synagogue; the second, in a place of refreshment, namely in the house of Simon; the third, in a place of rest, namely after the setting of the sun. Finally, the first of these is shown to have been done around morning; the second, around midday; the third, at the end of the day. And through this, from all these things it follows that Christ has power over every person and over every nature and in every place and in every time; and through this, the authentication of his teaching through the power of manifold miracles is sufficiently shown. Concerning the cure, therefore, of a man from a demon, four concurrent things are to be noted which serve to manifest the power of Christ: on the part of the demoniac, a condition of manifest misery; on the part of the demon, a perception of the divine presence; on the part of Christ, an operation of immense power; on the part of the people, an exhibition of due reverence — all of which are most fittingly described by the Evangelist for the magnificence of the present miracle.

On the part therefore of the demoniac there is shown the state of manifest misery, when it is said: And in the synagogue there was a man having an unclean demon, because it appeared to all in common that he was possessed by a demon: whence he was in a common place, because in the synagogue, where many gathered together, according to that passage in John 18: "I have always taught in synagogues and in the temple, where all the Jews come together." In this place there was a man having an unclean spirit, so called from its effect, because it makes one unclean: Zechariah 13: "I will remove the unclean spirit from the land." This spirit is called Unclean because it always suggests uncleanness: whence in Revelation 16: "And I saw coming out of the mouth of the dragon, and out of the mouth of the beast, and out of the mouth of the false prophet, three unclean spirits in the form of frogs."

On the part of the demon there is shown the sense of the divine presence, when it is said: And he cried out with a loud voice, so that by the force of the cry there might be shown in the demon the passion of pain: Isaiah 65: "Behold, my servants shall praise from exultation of heart, and you shall cry out from pain of heart, and from crushing of spirit you shall howl"; whence it is gathered from the cry that in the demon there was pain and trembling from the sense of Christ's presence. Whence Augustine says: "Would that as the demons recognized God as judge, so men would recognize the Savior! The demons saw and trembled; men, however, saw and killed. O how great a misfortune, that men are found worse than demons!"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
