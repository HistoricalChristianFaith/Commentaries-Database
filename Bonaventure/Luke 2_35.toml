[[commentary]]
quote='''
The blessed Virgin did not have pain preceding the delivery, because she did not conceive from sin, as did Eve, to whom the curse was given; rather, she had pain after the delivery. Whence she gave birth before she was in labor. On the cross she labored; whence in Luke: "And a sword shall pierce your own soul." In other women there is pain of the body, in her there is pain of the heart; in others there is pain of corruption, in her there is pain of compassion and charity. Whence she invites us to consider her sorrow, in Jeremiah: "All you," she says, "who pass by the way, attend and see if there is any sorrow like my sorrow."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'

[[commentary]]
quote='''
As to the martyrdom of maternal compassion, it is said: And your own soul a sword shall pierce, that is, your very own, the sword of compassion; whence that verse of the Psalm applies to her: "The iron pierced through his soul." Damascene: "The pains which she escaped in giving birth, she endured at the time of the Passion." And Bernard: "While your Jesus is pierced by the lance — everyone's indeed, but especially yours: the sword did not pierce through his soul, because he had already expired, but yours; whence we proclaim you more than a Martyr." And Jerome: "Because she suffered in her mind, she was more than a Martyr." Whence, because she truly loved, she suffered with him most vehemently from her inmost affection. But others, who did not direct their hearts aright, exulted; therefore there is added: That the thoughts from many hearts may be revealed. Thus it followed here, because this followed upon the Passion of Christ, because namely the iniquity of heart of the carnal Jews and hypocrites was revealed: Hosea seven: "When I would have healed Israel, the iniquity of Ephraim was revealed, and of Samaria, before me"; because, as is said in Matthew ten, "nothing is covered that shall not be revealed, and hidden that shall not be known." But this shall be especially so in the judgment: First Corinthians four: "Judge not before the time, until the Lord comes, who will illuminate the hidden things of darkness and will make manifest the counsels of hearts," etc.

Note spiritually, that from the consideration of the passion of Christ a threefold spiritual sword ought to pierce through the soul. The first is the sword of the discernment of right faith: Ephesians 6: "And the sword of the Spirit, which is the word of God." The second is the sword of the rigor of severe judgment: Apocalypse 1: "From his mouth there went forth a sword sharp on both sides." The third is the sword of the division of human desire: Matthew 10: "I have not come to bring peace, but a sword." Now the first sword pierces through souls by true faith: Hebrews 4: "The word of God is living and more penetrating than every sword." The second, by the rigor of penance: Psalm: "Two-edged swords in their hands." The third, by the ardor of benevolence: Song of Songs 3: "Behold the bed of Solomon," and afterward: "All holding swords."

Against this threefold sword there is another threefold sword: namely the sword of rancor: 1 Kings 31: "Saul seized his sword and fell upon it." The sword of detraction: Psalm: "The sons of men, their teeth are arms and arrows, and their tongue a sharp sword." The sword of heresy, which is division from the unity of faith: Proverbs 5, under the metaphor of the harlot: "Her end is bitter as wormwood, and her tongue is sharp as a two-edged sword"; and Psalm: "They have unsheathed the sword," there follows: "to slaughter the upright of heart." The first spiritual sword is to be purchased: Luke 22: "He who does not have one, let him sell his tunic and buy a sword." But the other is to be put back into its sheath: John 18: "Put your sword into its sheath." And the reason for this is that the first kills the carnal life, but the second kills the spiritual life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'

[[commentary]]
quote='''
How then does Judith signify the glorious Virgin? Consider the New Testament and the Old. Holy Simeon said: "A sword shall pierce your own soul," that is, a living sorrow. Whence? Surely from the passion of Christ. Who inflicted the passion upon Christ? The Jew, the pagan, Pilate. These were the instruments, but who was moving them to this? Surely the devil was forging the sword by which the soul of the Virgin was pierced, and she herself was healed, and the devil was vanquished. The devil wished to have the bait of Christ's flesh; but the Divinity clung to his throat like a hook.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'
