[[commentary]]
quote='''
Sixth, as regards the cruelty of those mocking the Crucified, he adds: But the soldiers also mocked him. The soldiers indeed mocked him before the crucifixion, according to what is said in John nineteen: "The soldiers, plaiting a crown of thorns, placed it upon his head and clothed him in a purple garment. And they came to him and gave him blows." From which it appears that according to Luke, Christ was mocked three times, namely in the house of the high priest, above in the twenty-second chapter, and in the presence of Herod, above in the same chapter, and now. In which it is given to understand that those three kinds of men whom Christ especially honored on earth dishonor Christ, namely the priests, the rulers, and the soldiers, so that the word of Isaiah one applies to them: "I have nourished and raised up children, but they have despised me." Whence that word of Isaiah fifty-seven applies to them: "Against whom have you made sport, and against whom have you opened wide your mouth and put out your tongue? Are you not wicked children?" The soldiers therefore despised Christ, and by despising him added affliction to the afflicted.

And therefore he adds: Coming near and offering him vinegar. Now it is said in Matthew twenty-seven that "they gave him wine mixed with gall" to drink, Mark fifteen. And, as Augustine says, it is credible that the Jews cast gall and myrrh, which are most bitter, into the sour wine. And in this is fulfilled the prophecy of the prophet David: "They gave," he says, "gall for my food, and in my thirst they gave me vinegar to drink." And Deuteronomy thirty-two, concerning the vine turned to bitterness: "Their grape is a grape of gall, and a most bitter cluster. The gall of dragons is their wine, and the incurable venom of asps." And concerning this it is said in John nineteen: "When Jesus had received the vinegar, he said: It is finished," and because, since he had suffered in hearing through insults, in sight through tears, in touch through blows, nothing remained except that he should suffer in taste and tongue, against that pleasure which Adam and Eve had in eating the fruit. And because temptation of this kind entered through hearing, therefore the insults against Christ are repeated so many times.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
