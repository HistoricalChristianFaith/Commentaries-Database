[[commentary]]
quote='''
A new commandment I give unto you. Here the third point is touched upon, namely the instruction of the imperfect disciples. And because they were imperfect, the Lord gives them the remedy of love, that they might love and sustain one another mutually: on account of which he says: A new commandment I give unto you, that ye love one another: therefore new, because it ought always to be fresh in the heart, because love is always owed and never grows old. Whence Romans thirteen: "Owe no man any thing, but to love one another." And the manner of loving is expressed: As I have loved you, that ye also love one another. Now he himself so loved that he loved our salvation more than his own life: so each person should love the soul of his neighbor more than his own body; First John three: "Hereby perceive we the love of God, because he laid down his life for us: and we ought to lay down our lives for the brethren."

Question. It is asked concerning what he says: A new commandment I give you, etc. Why did he not command them concerning the love of God, which is the first and greatest commandment? Likewise, how does he say new, since it was given from the beginning? Whence in the second chapter of First John, speaking of this commandment, he says: I do not write a new commandment to you, but an old commandment. I respond: To the first it must be said that in the love of neighbor the love of God is understood. To the second it must be said that even though this commandment was given in the Old Testament, nevertheless in the New it is renewed with respect to its mode: because there to love friends, here enemies; there to do good to friends, here to enemies is commanded; this is what he implies when he adds: As I have loved you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
