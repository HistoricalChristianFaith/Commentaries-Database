[[commentary]]
quote='''
Nevertheless, Jewish perfidy was to be confuted on account of the observance of malice, by reason of which he says: But the scribes and Pharisees were watching whether he would heal on the Sabbath. Whence was fulfilled in them that word of the Psalm: "All their thoughts are unto evil; they shall dwell and hide themselves: they themselves shall watch my heel." This observation was insidious, which pertains to a malicious mind, according to that word of Jeremiah 9: "In his mouth he speaks peace with his friend, and secretly he lays snares for him." And therefore it is added: That they might find something of which to accuse him. Whence these men were saying that word of the Babylonians, Daniel 6: "We shall not find any occasion against this man unless perhaps in the law of his God." On this day therefore they were especially watching, as Bede says, "so that, if he did not heal, they might charge him with cruelty or weakness; but if he did heal, with transgression." But certainly they find neither, because when he heals, he shows himself merciful; and when he does not heal, just; whence John 9: "Unless this man were from God, he could do nothing." And therefore Jeremiah 2: "What iniquity have your fathers found in me, that they have gone far from me?" as if to say: nothing, because he is the one of whom Isaiah 53 says: "He committed no sin, nor was deceit found in his mouth." Therefore he himself said, John 8: "Which of you shall convict me of sin? If I speak the truth to you, why do you not believe me?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
