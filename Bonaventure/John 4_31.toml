[[commentary]]
quote='''
Here is touched upon Christ's desire for receiving those who are called: because he desires their salvation as food, indeed more than bodily food in a time of need, when he was hungry. Therefore he says: "In the meanwhile," that is, while the woman went and the Samaritans were coming: "his disciples were asking him," as if anxious about the Master, "saying: Rabbi, eat:" because they had brought food, and the hour of eating had already passed. Chrysostom: "Seeing him wearied from the journey and the heat and fasting, they were asking him to eat": but the Lord, desiring spiritual food more than bodily, refuses to eat.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
