[[commentary]]
quote='''
"And I give them eternal life," as a good shepherd, by rewarding; above in chapter six: "That everyone who sees the Son and believes in him may have eternal life"; Ecclesiasticus chapter four: "Wisdom breathed life into her children." "And they shall never perish, neither shall anyone snatch them from my hand," on account of my power. This shepherd was rightly signified by David, who is interpreted as "strong of hand," who snatched the prey from the mouth of the lion and the bear, as is said in First Kings chapter seventeen.

It is asked here concerning what he says: "No one shall snatch them from my hand."

Are not those who have present justice in the hand of the Son? Yet they are scattered, according to what was said above: "The wolf comes and scatters the sheep."

The response to this is that they are snatched away not from the weakness of the guardian, but from the infirmity of the one guarded.

Or according to Augustine, "sheep" are here understood according to eternal election, who cannot be snatched away finally. Whence Augustine: "Neither does the wolf snatch, nor does the thief steal, nor does the robber kill: he who has numbered them is secure concerning their number."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
