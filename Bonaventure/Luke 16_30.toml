[[commentary]]
quote='''
Thirdly, as to the reason for the petition proposed, he adds: But he said: No, father Abraham, but if someone from the dead goes to them, they will repent. In this he was showing the carnality of his brothers, inasmuch as they would be moved more by a bodily resurrection than by a spiritual revelation. Hence these were of the number of those about whom Wisdom 2 says: "The impious said among themselves, thinking not rightly"; "There is no relief at the end of man, and there is no one known to have returned from the netherworld." In this he also showed the perversity of his brothers, that they would prefer the testimony of a dead man to the witnesses of the living God, against that saying in Isaiah 8: "Shall not the people seek a vision from their God, for the living from the dead? To the law rather, and to the testimony. And if they shall not speak according to this word, there shall be no morning light for them." In this he also showed the unbelief of his brothers, that they would not believe unless they saw signs and wonders, like that royal official in John 4: "Unless you see signs and wonders, you do not believe." In this he likewise showed the foolishness of his brothers, because they ought to be provoked to repentance more by the fact that they see men die than if they were to see them raised from the dead; Sirach 38: "Remember my judgment, for yours shall be likewise: yesterday for me, and today for you"; and Sirach 17: "Before death, make confession: from a dead man, confession perishes as if it were nothing"; Psalm: "The dead shall not praise you, O Lord, nor all those who descend into hell."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke, Chapter 16'
