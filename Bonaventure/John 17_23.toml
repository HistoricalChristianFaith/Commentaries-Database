[[commentary]]
quote='''
Through the bond of love all things are meant to be bound together in one Christ as regards head and body, which contains in itself the universality of those to be saved. This unity is now begun on the way, but is consummated in eternal glory, according to what the Lord prays, that they may be one, as we also are one: and I in them, and thou in me, that they may be made perfect in one: when this unity is consummated through the bond of charity, God will be all in all in certain eternity and perfect peace, and all things will be common through love, ordered in communion and connected in ordering and indissolubly bound in connection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
I in them, and you in me, that they may be made perfect in one, that is, perfected in the unity of charity, and through this they may be made glorious. Whence Chrysostom: "This is the great glory, that they may be one, and this glory is greater than signs. For just as we admire God, because there is no contention or discord in that nature, and this is the greatest glory: so also these are made glorious from this". Whence above in chapter thirteen: "By this all shall know that you are my disciples, if you have love for one another". And this glory he gave to the Apostles. And let the world know that you sent me, on account of the glory, namely, which I gave them in my name: and you have loved them, as you have also loved me: and let it know this through the unity and concord which it will see in them. Chrysostom: "Showing that by this sign peace can attract men more. For just as contention is divisive, so also harmony is unitive"; Acts chapter two: "They were persevering in the teaching of the Apostles and in the communion of the breaking of bread and in prayers: and fear came upon every soul".
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
