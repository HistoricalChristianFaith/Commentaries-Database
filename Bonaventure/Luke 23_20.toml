[[commentary]]
quote='''
Thirdly, as to the conflict between the condemnation and the will of the judge, he adds: And Pilate again spoke to them, wishing to release Jesus: since neither mercy availed nor equity availed, at last authority and will came forward. Now Pilate wished this, both because it was hard for him to hand over so great a man to death without cause, and also because his wife dissuaded him; whence Matthew 27: "While Pilate was sitting on the judgment seat, his wife sent to him, saying: Have nothing to do with that just man." But this will of Pilate was not full but sluggish, according to that saying in Proverbs 13: "The sluggard wills and wills not"; because he was unwilling to act against the crowd, whose will was contrary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
