[[commentary]]
quote='''
They therefore called again the man who had been blind and said to him: Give glory to God, namely, by confessing the truth. For to give glory to God is to confess the truth about something, as if in God's presence; Joshua 7: "My son, confess and give glory to God." And that truth was that he should not attribute this miracle to Christ; on account of which they say: We know that this man is a sinner; confess therefore that you were not healed by this man, but by God. Chrysostom: "They were attempting to do this under the appearance of religion"; and yet they were leading him to evil. Whence Augustine: "To deny what you have received is not to give glory to God, but rather to blaspheme God." And although they flatter, they do not prevail, because the blind man spurns their admonition and speaks the truth.

Now that the attempt of the Pharisees to censure and deny has been frustrated, here they endeavor to overshadow the miracle, so that it may not be attributed to Christ the Lord, but that his name may be silenced. Therefore they endeavor here to draw the blind man back from confessing the name of Christ in this order: first, namely, by flatteries; second, by cunning; third, by reproaches; fourth, by injuries.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
