[[commentary]]
quote='''
Second, with respect to the distance from the place of the just, he adds: And lifting up his eyes, when he was in torments, namely in the place of continual affliction; Apocalypse fourteen: "The smoke of their torments ascends forever and ever"; Isaiah thirty: "Topheth has been prepared from of old." "Its nourishment is fire and much wood: the breath of the Lord like a torrent of brimstone kindling it." — He saw Abraham afar off and Lazarus in his bosom. Truly afar off both with respect to position and with respect to state, because the rich man was in the lowest place, but he in the highest; Proverbs twenty-nine: "Humility follows the proud, and glory shall uphold the humble in spirit"; and Proverbs fourteen: "The wicked shall lie before the good, and the ungodly before the gates of the just." Likewise, the rich man was in affliction, the poor man in rest: Isaiah sixty-five: "My servants shall eat, and you shall hunger." Likewise, because the rich man was in want, and the poor man in abundance; above in chapter one: "He has filled the hungry with good things and the rich he has sent away empty"; the Psalm: "The poor shall eat and be satisfied"; and elsewhere: "The rich have been in want and have hungered, but those who seek the Lord," etc. Moreover, it is said that he saw Abraham, and not for consolation, but rather for an increase of torments. Whence Gregory: "It must be believed that before the retribution of the last judgment the unjust behold certain ones in rest, so that, seeing them in joy, they may be tormented not only by their own punishment, but also by the good of those others"; the Psalm: "The sinner shall see and be angry, he shall gnash his teeth and waste away: the desire of sinners shall perish"; and Wisdom five: "Seeing, they shall be troubled with horrible fear," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke, Chapter 16'
