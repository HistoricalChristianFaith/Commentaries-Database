[[commentary]]
quote='''
She ran therefore and came to Simon Peter, who above all others loved Christ, and to the other disciple, whom Jesus loved, that is, to John, who does not name himself out of humility; and she says to them: They have taken the Lord from the tomb: in the Greek "my" is added to express her affection. They have taken, namely indefinitely, either the Jews or the guards, and I do not know where they have placed him, which was for her a cause of greater sorrow. For since she still knew and loved him carnally, therefore, with his flesh taken away, no consolation remained.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
