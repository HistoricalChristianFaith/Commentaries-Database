[[commentary]]
quote='''
Second, as regards the second excuse, which comes from the solicitude of avarice, he adds: And another said: I have bought five yoke of oxen. For the solicitude of avarice causes one to seek nothing but to deal with earthly things; therefore it is compared to the labor of oxen, whose task is to furrow and work the earth. And they are called five yoke of oxen on account of the five senses turned toward these earthly things. Hence the Gloss: "These are called yoke of oxen, because through them earthly things are managed; for oxen turn the earth." They can also be called yokes, because they bind the neck and tame the nape and press the whole person down to the earth and sell the soul for earth; Sirach 10: "Nothing is more wicked than to love money; for such a one has his soul for sale, because in his life he has cast away his inmost parts." For since, as is said in Matthew 6, "where your treasure is, there is your heart also"; and the treasure of the avaricious person is outside himself, namely in the earth: therefore the inmost parts of the avaricious person are cast forth into the earth. Hence it is necessary that he be oppressed by the yoke of servitude, because he has sold himself; hence Sirach 27: "In the midst of buying and selling he shall be afflicted with sins."

For avarice renders one anxious and inquisitive, therefore he adds: And I go to prove them, because he has continual care for superfluous things. Hence the Gloss: "Rightly is curiosity signified by the five senses, which, while it outwardly investigates the life of one's neighbor, does not know its own inmost parts; and the mind of the curious person, the more skilled it becomes in what belongs to another, the more ignorant it becomes of itself."

And note that charity has but one yoke, because it reduces every concern to one thing, according to that passage above in the tenth chapter: "One thing is necessary"; and Micah 6: "To walk solicitously with your God," etc.; and Matthew 11: "My yoke is sweet," etc.; and Lamentations 3: "It is a gift for a man when he has borne the yoke of the Lord from his youth." But curiosity has five, with respect to the universality of sensible things, around which it revolves; whence Ecclesiastes 7: "God made man upright, and he has entangled himself in infinite questions." And since the vice of covetousness and avarice cloaks itself under the appearance of providence, therefore he adds: I ask you, hold me excused. But to such people can be said that passage from Jeremiah 2: "Why do you strive to show your ways as good for seeking love, you who moreover have taught your wickednesses to be your most manifold ways, and in your wings was found the blood of the souls of the poor and the innocent"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
