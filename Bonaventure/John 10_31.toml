[[commentary]]
quote='''
"They took up stones." After the declaration of the true shepherd has been made through a sure sign, the persecution by the evil sheep, or rather by the wolves, is touched upon, because, just as sheep follow the shepherd, so wolves persecute him. And the persecution is set out in this order: first, the persecution itself; second, the reason for persecuting; third, the prudent defense of Christ; fourth, the avoidance of the fury of the persecutors; fifth, the multiplication of believers.

First, the persecution itself is touched upon in this, that they wished to stone Christ; on account of which he says: "The Jews took up stones to stone Him"; but they did not achieve their effect; Augustine: "Because the time of the Passion had not yet come, they did not achieve the effect of the stoning." At once they wished to kill, just as those of whom Proverbs 1 says: "Their feet run to evil, and they hasten to shed blood."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
