[[commentary]]
quote='''
These things I have spoken to you, etc. This is the third part of the chapter, in which, the exhortation now having been made, He foretells the hastening of His departure, so that when it has come to pass, they may believe. And lest they be grieved about this, it is not proposed immediately, but consolation is placed first and the hastening is joined after. And He offers them consolation in multiple ways: first, from the expectation of the Holy Spirit; second, from the gift of peace; third, from the promise of visitation; fourth, from the rejoicing in His exaltation. First, therefore, He sets forth the consolation from the expectation of the Holy Spirit; on account of which He says: These things I have spoken to you, abiding with you; Luke, last chapter: "These are the words which I spoke to you, while I was yet with you"; nor ought you to be troubled if you do not understand, because you will understand at the coming of the Holy Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
