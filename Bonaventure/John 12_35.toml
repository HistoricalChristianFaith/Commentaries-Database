[[commentary]]
quote='''
Jesus therefore said to them. Here the fourth point is touched upon, namely the removal of that doubt: and the Lord shows that that doubt did not arise from a bad understanding, but from a deficiency of understanding, because Scripture says both things about Christ, both that he is eternal and that he is mortal. Therefore he says: Yet a little while the light is in you. It is light, because you believe Christ to be eternal; but little, because you do not believe him to be about to die. Therefore he exhorts them to advance in faith while they have time; on account of which he says: Walk while you have the light. That walking is to approach Christ through faith: Psalm: "Come to him, and be enlightened." And the reason is added: That the darkness may not overtake you, that is, the blindness of unbelief, concerning which above in chapter three: "The light came into the world, and men loved darkness rather than the light." And it is dangerous to be overtaken by them, because he who walks in darkness does not know where he goes: Proverbs 4: "The way of the wicked is dark: they know not where they fall." And he explains what he had said by walk, which is believe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
