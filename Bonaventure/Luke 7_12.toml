[[commentary]]
quote='''
As regards the encounter with the multitude to be consoled, it is added: When he drew near to the gate of the city, behold, a dead man was being carried out, the only son of his mother; concerning whom there was grief and mourning, because he was dead, according to that passage of Sirach twenty-two: "Weep over the dead: for his light has failed." The mourning was even greater, because he was an only-begotten son, over whom the lamentation becomes all the more bitter as he was all the more dear; Jeremiah six: "Make for yourself the mourning of an only-begotten, a bitter lamentation"; and 2 Kings one, David mourning the dead Jonathan: "As a mother loves her only son, so I loved you." But the mourning was greatest, because the mother was utterly desolate; on account of which it says: And she was a widow, and thus already utterly desolate, lacking the consolation both of a son and of a husband. This the woman of Tekoa alleges to obtain mercy, 2 Kings fourteen: "Alas! I am a widow woman." And therefore Jeremiah lamented the widowhood of Jerusalem, Lamentations one: "How does the city sit solitary that was full of people" etc. And for this reason many had compassion on her; whence it adds: And a large crowd of the city was with her, namely to grieve together and to console, because this was the custom of the Jews, according to that passage of John eleven: "Many of the Jews had come to Mary and Martha, to console them concerning their brother." To all of whom this widow could say: "O all you who pass by the way, attend and see if there is any sorrow like my sorrow"! shortly after: "He has made me desolate, consumed with grief all the day." And therefore she was in need of consolation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
