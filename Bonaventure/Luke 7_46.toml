[[commentary]]
quote='''
Third, he sets her above him with respect to the anointing of the feet, which was a sign of devotion, when he adds: You did not anoint my head with oil: which was the custom at that time as a sign of gladness and exultation, according to that passage in Matthew chapter six: "But you, when you fast, anoint your head and wash your face." But she has anointed my feet with ointment, which is more precious than oil. Whence this woman offered more precious things to Christ, according to that passage in John chapter twelve: "Mary therefore took a pound of ointment of pure nard, very precious, and anointed the feet of Jesus." In these three evidences of love, therefore, the Lord proves that the sinful woman loved more truly and more fervently.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
