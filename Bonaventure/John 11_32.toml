[[commentary]]
quote='''
Mary therefore, when she had come. Here the third point is touched upon, namely Mary's faithful and devout confession: on account of which he says: Mary therefore, when she had come where Jesus was, seeing him, fell at his feet: behold, devotion, always at the feet of the Lord; whence Luke 7: "Mary standing behind near the feet of the Lord"; and the tenth: "Sitting near the feet of the Lord, she heard his word." It is not read of Martha that she fell at his feet, because she was not so devout nor so fervent as Mary; Deuteronomy thirty-three: "Those who draw near to his feet shall receive of his teaching." And there is added the faithful confession: And she said to him: Lord, if you had been here, my brother would not have died; in which she intimates the power of the Lord, as her sister had done before; but the former said more, namely that he would still raise him, if he willed; and the latter out of reverence was silent and out of devotion wept and moved the Lord more greatly, as will be evident below. In which it is intimated that the Lord hears the groaning of the heart more than the sound of the mouth; Gregory: "To pray truly is to utter bitter groanings in compunction and not polished words"; whence in First Kings one it is said that Hannah wept abundantly and prayed silently.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
