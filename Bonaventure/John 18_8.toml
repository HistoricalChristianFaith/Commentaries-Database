[[commentary]]
quote='''
"Jesus answered them: I told you that I am he." And because you did not recognize me then, I say it again, so that you may recognize me. They were blinded, lest they recognize him, as in the last chapter of Luke: "Their eyes were held, lest they recognize him." After he offered himself, he freed the disciples by his command alone: whence he adds: "If you seek me, let these go." Augustine: "He commands the enemies, and they do what he commands: they let those go whom he does not will to perish."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
