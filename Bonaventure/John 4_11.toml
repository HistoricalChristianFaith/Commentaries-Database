[[commentary]]
quote='''
Here the third point is touched upon, namely the explanation of the gift or benefit offered. For the woman understood carnally concerning a temporal gift: and therefore she doubted and sought an explanation. On this account he says: "The woman says to Him: Lord, You have nothing to draw with, and the well is deep:" and therefore You cannot give of the water of this well; but even from elsewhere, how can You have it? Whence there follows: "Where then do You have living water?" namely, this nobler water.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
