[[commentary]]
quote='''
Now he said this, not because he cared for the poor, because he did not care about the poor; against which Ecclesiasticus four: "My son, do not defraud the poor of alms, and do not turn your eyes away from the poor," etc.; but because he was a thief and having the money bag, as steward, he carried what was put in, that is, he carried it away and stole it, and therefore he rejoiced when more was given; whence on account of his avarice he sold the Lord; whence it is said in Matthew twenty-six, that "he went to the chief priests and said: What will you give me, and I will deliver him to you?" Whence Chrysostom: "Avarice reduces the heart to servitude; this made Judas a traitor and Gehazi a leper and delivered Ananias to death."

Question II. Likewise it is asked concerning what the Evangelist says, that Judas said this, not because the care of the poor pertained to him.

But to the contrary: He was the steward: therefore it did pertain to him.

Likewise he says that he was a thief and had the money box: whence is it that the Lord wished to entrust the money box to a thief? It seems that he gave him an occasion of sinning.

Likewise, why did the Lord not correct him, since he knew that he was in sin?

Likewise, since the Lord was in extreme poverty and had commanded the disciples not to receive money, how is it that he had money bags?

I say to the first that "to pertain" can be taken in two ways: either with respect to affection, or with respect to office; in the first way it did not pertain to him, in the second way it did.

To the second I say that there was a twofold reason, namely the dispensation of divine judgment and our instruction: the dispensation of divine judgment in this, that the Lord was satisfying his evil desire, just as he enriches the avaricious in the present life: so that Judas also would not have the excuse that he betrayed the Lord on account of want. Our instruction, because the Lord showed that he places little weight on the riches of the Churches, but great weight on the treasure of souls.

To the other it must be said that he did not correct him, because he knew that he would not be made better, but would become worse; nor did he take away his office, lest he reveal the crime and incite him to a greater crime.

To the other it must be said that, as Jerome says, the Lord had money bags not for his own use, but rather for the use of the poor. Hence when he paid the didrachma, he sent Peter to the sea, Matthew 17, where he found the coin in the mouth of the fish; because he did not wish to convert to his own use those things which had been given to the poor.

Another reason was so that it might be made known against heretics that it was lawful for his Church to possess riches.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'

[[commentary]]
quote='''
To that which is objected, that Christ had a money-bag: it must be said that Christ had a money-bag for three reasons. For He had a money-bag for other poor persons, according to what Jerome says: "Christ was of such great poverty" etc.: and this does not take away supreme poverty. He also had a money-bag in condescension to the weak, as is said in the Gloss on that verse of the Psalm: Producing hay for beasts of burden: "The Lord had a money-bag for the use of those who were with Him, His own and the devout women in His company, who ministered to Him from their substance, in these things taking on rather the person of the weak. For He foresaw that many weak persons would come and would seek these things, just as He also took on the person of the same where He said: My soul is sorrowful even unto death." And concerning these two, on that passage of John twelve: The things that were contributed etc.; the Gloss says: "He whom Angels serve has a money-bag for the expenses of the poor, condescending to the weak." He also had a money-bag in a time of necessity, as for instance when He was passing through the Samaritans. In which time of necessity He also permitted the disciples to have money-bags, according to that passage of Luke twenty-two: When I sent you without purse and scrip etc.; the Gloss says: "He does not instruct the disciples with the same rule of living in a time of persecution as in a time of peace. When He sent the disciples to preach, He gave the ordered precept that they should take nothing for the journey, namely, that he who proclaims the Gospel should live by the Gospel. But when the moment of death was at hand, and that entire nation was persecuting both shepherd and flock together, He decreed a rule fitting for that time, permitting them to take the necessities of sustenance, until, the madness of the persecutors being calmed, the time for evangelizing should return." From these Glosses it manifestly appears that the manner of having money bags in the Lord in no way diminished poverty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
