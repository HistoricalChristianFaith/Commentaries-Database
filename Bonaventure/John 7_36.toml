[[commentary]]
quote='''
"What is this saying that he said: You will seek me and will not find me; and where I am, you cannot come?" Therefore they do not deserve to understand, because they were unwilling to humble themselves to believe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
