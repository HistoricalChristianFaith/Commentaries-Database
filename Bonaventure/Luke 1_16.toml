[[commentary]]
quote='''
Thirdly, he commends him in doctrine with respect to the efficacy of usefulness and with respect to the eminence of authority. On account of the efficacy of usefulness he says: And he shall convert many of the children of Israel to the Lord their God. And this is the greatest usefulness: James, last chapter: "He who causes a sinner to be converted from the error of his way shall save his soul from death and shall cover a multitude of sins." This is what the Lord especially seeks, that they be converted to him; Zechariah 1: "Be converted to me, says the Lord of hosts, and I will be converted to you, says the Lord of hosts." Be converted to me, namely through penance, and I will be converted to you, through pardon: Jeremiah 3: "Be converted, O returning children, and I will heal your backslidings."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
