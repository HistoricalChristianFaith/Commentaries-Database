[[commentary]]
quote='''
"For as the Father has life in himself." The third point is touched upon here, namely by what power he gives life, since by his own power according to the Divinity given to him by the Father through generation: whence he says: I have rightly said that the Son gives life: "for as the Father has life in himself," that is, by essence: "so he has given to the Son also to have life in himself," that is, by essence, not by participation. And because that which is life by essence pours life into all things, as Dionysius says; therefore the Son is able of himself to give life. Whence below in the eleventh chapter: "I am the resurrection and the life: he who believes in me, even if he shall have died, shall live": similarly below in the fourteenth chapter: "I am the way, the truth, and the life"; I am not living by another's life, but I am life, giving others to live.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'

[[commentary]]
quote='''
This fountainhead, however, is in a certain way the origin of another totality. For since the Father produces the Son, and through the Son and with the Son produces the Holy Spirit, therefore God the Father, through the Son with the Holy Spirit, is the principle of all created things: for unless He produced them from eternity, He could not produce through them in time: and therefore by reason of that production in the Trinity He is rightly said to be the fountain of life. For just as He has life in Himself, so He gives the Son to have life in Himself, etc. Hence it is that eternal life is this alone, that the rational spirit, which flows from the most blessed Trinity and is the image of the Trinity, returns by way of a certain intelligible circle through memory, understanding, and will, through the deiformity of glory into the most blessed Trinity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Mysterio%2520Trinitatis%2FQuestion%25208.html'
source_title='Quaestiones Disputatae, De Mysterio Trinitatis, Question 8'
