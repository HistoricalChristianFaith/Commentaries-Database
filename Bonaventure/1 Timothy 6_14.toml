[[commentary]]
quote='''
The commandments of God are irreproachable, because they contain nothing unjust. "I command you before God, who gives life to all things, that you keep the commandment without stain, irreproachable."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25201.html'
source_title="Collationes de Decem Praeceptis, Collation 1"
