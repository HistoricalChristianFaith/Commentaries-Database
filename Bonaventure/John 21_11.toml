[[commentary]]
quote='''
Then Simon Peter went up, as the more zealous among the others, and drew the net to land, full of great fish, one hundred and fifty-three: in which the greatness of the miracle is shown both in number and in size. By great fish we understand the Blessed, who are great in charity: Matthew eleven: "He who is lesser in the kingdom of heaven is greater than he." And for greater expression of the miracle he adds what happened concerning the net: whence he says: And although there were so many, the net was not torn: against which it is said in Luke five: "They had caught a great multitude of fish, and their net was breaking." And so, although there were so many, namely in number and in size, they were in such a number on account of its significance: either because that number signifies perfection, when the numerical proportion is considered, or because it signifies universality, because, as Jerome says, "so many kinds of fish in the sea are read to have been described by the philosophers."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked concerning what he says: Although there were so many, the net was not torn. — Since in the first fishing, Luke five, it is said that the net was breaking on account of the abundant multitude of fish, what is it that now it remains intact? Gregory responds: "In the other fishing the net is torn on account of the multitude of fish, because now the reprobate enter into the confession of the faith together with the elect, who rend the Church itself with heresies. But in this fishing the net is not torn, because the holy Church of the elect, resting in continual peace, is torn by no dissensions."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
