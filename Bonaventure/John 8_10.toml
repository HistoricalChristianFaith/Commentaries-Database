[[commentary]]
quote='''
"But Jesus, raising himself up," in which the fifth point is noted, namely the merciful liberation of the accused woman. And because mercy runs together with justice and is not against justice, the Lord asks her about condemnation and accusation. Therefore he says: "Woman, where are those who accused you? Has no one condemned you?" He asks two things, and because the one is evident from the departure of the accusers, the woman answers the question about condemnation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
