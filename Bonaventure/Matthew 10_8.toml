[[commentary]]
quote='''
The use of grace ought to be generous toward one's neighbor. Whence in Matthew: "Freely you have received, freely give." O sun, why do you not sell your light? And you, O Seine, why do you not sell your drops of water? Surely, because it has received freely, therefore it shares freely. Only a wretched man sells the grace bestowed upon him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25201.html'
source_title='Collationes de Septem Donis, Collation 1'

[[commentary]]
quote='''
There is a hierarchizing of the soul in the order of descent. Now, these things come about according to the powers of the soul, and Dionysius says they are three: the powers of receiving, preserving, and distributing, so that a soul may receive abundantly, preserve attentively, and pour out again generously. Hence, "freely you have received, freely give."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252022.html'
source_title='Collations on the Hexaemeron, Collation 22'
