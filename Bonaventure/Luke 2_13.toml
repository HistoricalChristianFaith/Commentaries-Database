[[commentary]]
quote='''
As for the persuasion of credible testimony, it is added: And suddenly there was with the Angel a multitude; that is, there was with him to confirm equally the angelic word and to venerate the little one born, according to that passage in Hebrews 1: "When he brings the firstborn into the world, he says: And let all his Angels adore him." And it is pointedly said multitude, according to that passage in Hebrews 12: "You have come to Mount Sion and to the city of the living God, the heavenly Jerusalem, and to the company of many thousands of Angels." And a multitude of the heavenly host: according to that passage in Job 25: "Is there any number of his soldiers?" And therefore 4 Kings 6: "Do not fear, said Elisha: for there are more with us than with them." And this appears at his birth, according to that passage in Revelation 19: "Behold, a white horse, and he who sat upon it, faithful and true"; "And the armies that are in heaven followed him." And this whole multitude, for the confirmation of the angelic word, bursts forth into the singing of a canticle; on account of which it is said: Praising God and saying: Glory to God in the highest, and on earth peace to men of good will: Job 38: "Where were you, when the morning stars praised me together, and all the sons of God shouted for joy?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
