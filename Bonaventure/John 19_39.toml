[[commentary]]
quote='''
Now Nicodemus also came. Here the treatment concerns the embalming from spices made by Nicodemus, and the devotion of Nicodemus is touched upon in the bringing of many spices and in the embalming of the body. Now Nicodemus also came, who namely had come to Jesus by night at first, above in chapter three. This coming is treated, in which the reason for coming is indicated, because he too was a disciple, although a secret one: bearing a mixture of myrrh and aloes, that is, an ointment prepared from these, which preserved the body from putrefaction. For he did not yet believe in the resurrection, just as neither did the disciples; yet he loved greatly, whence it says: About a hundred pounds: for he did not yet understand what is said in the Psalm: "You will not allow Your Holy One to see corruption."

It is asked concerning the devotion of Nicodemus. For it seems that he sinned: because, just as there is sin in stinginess, so there is sin in superfluous expenditure: but the pouring out of ointment was superfluous, because it was of no necessity or utility: and moreover so great an amount was not needed. I respond that the devotion of Nicodemus is praised: nor was there waste, but devotion, as is said above in chapter 12: and just as a man cannot serve the Divinity too much, so no one can bestow excessive honor upon the body of Christ crucified for us. Therefore, even if it would have been excess regarding another, it was nevertheless not so regarding that most holy body. As to the objection that he did not need it: it must be said that he believed he did need it, and this indeed was not a matter of praise, but of ignorance. But in this, that he believed him worthy of great honor and bestowed it upon him, his devotion is commended.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
