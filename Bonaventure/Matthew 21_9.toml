[[commentary]]
quote='''
In Christ from His conception there was the fullness of all grace with respect to the grace of a singular person and with respect to the grace of the Head and with respect to the grace of union. Through the grace of the Head, He pours forth motion and sense into all who approach Him either through right faith or through the Sacraments of faith, whether they preceded His coming or followed after it. For both those who went before and those who followed cried out: Hosanna to the Son of David.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25204.html'
source_title="Breviloquium"

[[commentary]]
quote='''
This is the greatest miracle, that God be man, that the first be the last; wherefore all miracles are related to this one; and all cry out: "Hosanna to the Son of David!" In this miracle, faith receives its strength.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25203.html'
source_title='Collations on the Hexaemeron, Collation 3'
