[[commentary]]
quote='''
They reviled him therefore and said: Be you his disciple, that is, by cursing and reviling they said to him that he was Christ's disciple. Augustine: "Let this curse be upon me: let such a curse be upon us and upon our children." They despised the discipleship of Christ and preferred to it the discipleship of Moses; hence they say: We are Moses' disciples, not of this man; and they add the reason.

They attempt to draw him back by reproaches: Hence they proceed gradually.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
