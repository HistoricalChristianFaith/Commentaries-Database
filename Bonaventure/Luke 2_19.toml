[[commentary]]
quote='''
It was also, thirdly, preserved in memory: whence it is added: But Mary kept all these words, pondering them in her heart: as one prudent and discerning, according to Proverbs 3: "Let not mercy and truth forsake you. Bind them about your neck, and inscribe them on the tablets of your heart"; and Ecclesiasticus 50: "He who lays these things in his heart shall always be wise." Contrariwise it is said of the fool in Ecclesiasticus 21: "The heart of a fool is like a broken vessel, and it will hold no wisdom." Whence the Virgin was an ark containing the secrets of the divine utterances: and therefore she is designated by the ark of Moses, of which it is said in Hebrews 9 that it contained the tablets of the divine law. And because she not only preserved but also understood: therefore it is added: Pondering them in her heart, so that she could say that word of the Psalm: "In my heart I have hidden your words."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
