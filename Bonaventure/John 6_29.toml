[[commentary]]
quote='''
"Jesus answered and said to them," namely to those asking and doubting: "This is the work of God, that you believe in him whom he sent. This is the work" that is good, the principle of all good works, since it is said in Hebrews 11: "Without faith it is impossible to please God." He who wishes to work well ought to begin from faith: Genesis 15: "Abraham believed God, and it was reckoned to him as righteousness."

There is a question about what he says: "The work of God is that you believe in him whom he sent." On the contrary: The Apostle says in Romans 3: "We reckon that a man is justified by faith without the works of the Law": therefore to believe is not a work.

It must be said that "work" is taken broadly to include the work of working and the work wrought, spiritual and corporal, interior and exterior: in another way, properly, according to one of these distinctions. In the first way, to believe is a work; in the second way, not at all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
