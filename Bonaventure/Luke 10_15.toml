[[commentary]]
quote='''
But secondly, rebuking with regard to the loftiness of mind, he adds: And you, Capernaum, exalted even unto heaven, namely through arrogance, you shall be thrust down even unto hell, by divine sentence. Whence Obadiah 1: "If you shall be exalted as the eagle and shall set your nest among the stars, thence will I drag you down"; and Job 20: "If his pride shall ascend even to heaven and his head shall touch the clouds, he shall be destroyed at the end like a dunghill." Now Capernaum is said to have been exalted on account of the very many miracles that were done in it, on account of which it grew more proud than it profited; whence above in chapter 4 it is said: "How great things we have heard done by you in Capernaum," etc. First, therefore, it was exalted on account of the gifts of divine grace, but afterwards it was plunged down by the desert of its pride. And this had been foretold in Isaiah 9: "At the first time the land of Zebulun and the land of Naphtali were lightened," namely by the preceding miracles, "and at the last the way of the sea was heavily burdened," that is, cast down in judgment on account of its sins, as the Gloss there explains. And therefore divine gifts are to be received with fear and great reverence, as Gregory says that "when gifts are increased, the accounts for those gifts also grow."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
