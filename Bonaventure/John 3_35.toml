[[commentary]]
quote='''
"For the Father loves the Son and has given all things into his hand": Matthew 11: "All things have been delivered to me by my Father." And therefore no one is saved except through the Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
