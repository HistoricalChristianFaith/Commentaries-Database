[[commentary]]
quote='''
The order of regulars corresponds to the Angels, whose function is humility, for the members of regular orders must be more subject to their superior than a pupil to his master or a subject to his prelate, "for so it becomes us to fulfill all justice."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252022.html'
source_title='Collations on the Hexaemeron, Collation 22'

[[commentary]]
quote='''
Whence on that passage in Matthew three: Thus it becomes us to fulfill; the Gloss: "that is, all humility, which is all justice." And Gregory in a Homily: "In the other things which you do, hold humility as the root of good work. For even if any works be present, they are nevertheless nothing unless they are seasoned with humility: for a wondrous action accompanied by pride does not elevate but weighs down. For he who gathers virtues without humility carries dust into the wind: and whence he is perceived to see, thence he is the more grievously blinded." The same: "Whatever you build grows entirely toward ruin, if before the mass of the structure you do not lay the foundations of humility."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25201.html'
source_title='Disputed Questions on Evangelical Perfection, Question 1'

[[commentary]]
quote='''
The perfect ordering according to the rule of abundant justice is that not only should the inferior subject himself to the superior, and the equal to the equal, but also that the superior should voluntarily subject himself to the inferior, according to what is said in Matthew 3: Thus it becometh us to fulfill all justice: where the Gloss says: "Thus, by subjecting himself to a servant and an inferior, it becometh him to fulfill all justice, that is, humility, which is all justice. And this humility has three degrees: the first is to subject oneself to a greater, and this is called sufficient; the second is to subject oneself to an equal, and this is called abundant; the third is to be subject to a lesser, in which consists all justice. This Christ fulfilled." Since therefore a man is then perfectly subjected to another man when he voluntarily binds himself to obey the commands of another in those things that are according to God, especially of one who was not greater than he, but either equal, or sometimes even lesser — for every man surpasses another in some respect, at least according to the soul — hence it is that toward the perfection of the justice that orders according to the way of the dignative order, which runs according to the law of grace, whereby the greater regards himself as the lesser, obedience which is rendered by one man to another both concurs and contributes most greatly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'
