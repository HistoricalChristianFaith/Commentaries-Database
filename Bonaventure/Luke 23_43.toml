[[commentary]]
quote='''
The seventh day coincides with separation from the body. "This day thou shalt be with Me in paradise." And this day has no evening. Then follows the eighth day, which does not differ from the one before but is a repetition of the first, when the soul rejoins its body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25203.html'
source_title='Collations on the Hexaemeron, Collation 3'

[[commentary]]
quote='''
Fourth, as regards the mercy of the Savior, he subjoins: And Jesus said to him: Amen I say to you: Today you shall be with me in paradise: in which Christ showed wondrous mercy as a most loving high priest, because he did not refuse the repentance of the thief, however late it was, and he granted more than the thief was asking. Whence Ambrose: "A most beautiful example of conversion to be desired, that pardon is so quickly granted to the thief, and the grace is more abundant than the petition. For the Lord God always bestows more than is asked"; for when he sought pardon, he obtained paradise. And note that he says: You shall be in paradise, not, I say, in the celestial paradise, into which no one ascended before Christ, but in the blessed vision of God. Whence Ambrose: "Life is to be with Christ, because where Christ is, there is the kingdom."

And note here that paradise in Scripture is called first the garden of delight: Genesis 2: "And the Lord God had planted a paradise of delight from the beginning"; and the heavenly homeland: Apocalypse 2: "To the one who conquers I will give to eat of the tree of life, which is in the paradise of my God"; and the vision of the divine form: 2 Corinthians 12: "He was caught up into paradise and heard there secret words," etc.

Allegorically, it is called the Church: Genesis 2: "A river went out from the place of delight to water paradise." It is called the Blessed Virgin: Song of Songs 4: "An enclosed garden, a sealed fountain, your shoots are a paradise"; Sacred Scripture: Ecclesiasticus 24: "I came forth like an aqueduct from the paradise of God."

Tropologically, it is called grace: Ecclesiasticus 40: "Grace, like a paradise in blessings." It is called the God-fearing soul: Ecclesiasticus 40: "The fear of the Lord is like a paradise of blessing." It is also called the religious life: Genesis 13: "The whole region of the Jordan was watered like the paradise of the Lord."

It is said here, therefore, for the blessed vision of Christ, because, as is said in John 17, "This is eternal life, that they may know you, the only true God, and Jesus Christ whom you have sent."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'

[[commentary]]
quote='''
Whoever looks upon this mercy seat with full turning of the countenance, gazing upon him who hangs upon the cross through faith, hope, and charity, devotion, admiration, exultation, appreciation, praise, and jubilation, makes the Passover, that is, the passing over, with him, so as to pass through the Red Sea by the rod of the cross, entering the desert from Egypt, where he may taste the hidden manna, and may rest with Christ in the tomb as though outwardly dead, yet sensing, insofar as is possible according to the state of wayfaring, what was said on the cross to the thief clinging to Christ: Today you shall be with me in paradise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25207.html'
source_title='Itinerarium Mentis in Deum, Chapter 7'
