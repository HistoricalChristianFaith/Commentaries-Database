[[commentary]]
quote='''
And because this sign was given by the Angel, therefore it is added: But seeing, they recognized concerning the word that had been spoken to them about this child, namely, that it was true. Whence they could now say that word of the Samaritans to the Angel himself: "We no longer believe because of your speech, for we ourselves have heard and we know that this is truly the Savior of the world." Truly they recognized, because they were of the sheep of that Shepherd, who says in John chapter ten: "I know Mine, and Mine know Me." This Job desired in chapter twenty-three: "Who will grant me that I may know and find Him and come even to His throne?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
