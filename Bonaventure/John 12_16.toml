[[commentary]]
quote='''
And although this honor had been foretold, nevertheless it was not foreknown by the disciples of Christ, so that you may know that this was not done by human invention, but by divine dispensation. Therefore he adds: These things his disciples did not understand at first, namely when they conferred this honor; but when Jesus was glorified, after the resurrection and ascension, then they remembered, that is, they perceived, that these things were written of him: and these things they had done to him. After his glorification they understood, not before: because then for the first time, as is said in the last chapter of Luke, "he opened their understanding, that they might understand the Scriptures."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
