[[commentary]]
quote='''
Third, regarding the malicious interrogation, he adds: And they asked him, saying: Master, we know that you speak and teach rightly. Regarding the word, they speak truly indeed, because John 17: "Your word is truth." They themselves were saying this by way of flattery, so that they might extract the secret of his heart from him. Whence Chrysostom: "This is the first prudence of hypocrites: feigned praise, just as one who cannot subdue a bull by strength rubs its neck with gentle hands, so as to seize it through blandishments." And concerning such persons, Proverbs 16: "An evil man entices his friend and leads him along a way that is not good"; and Proverbs 27: "He who blesses his neighbor with a loud voice, rising in the night, shall be likened to one who curses."

And you do not regard the person of men, regarding disposition: and this is true, according to that passage in Acts 10: "In truth I have found that God is no respecter of persons"; and Deuteronomy 10: "God great and mighty and terrible, who does not regard persons nor accept bribes."

But you teach the way of God in truth, regarding example, on account of which he himself said in John 14: "I am the way, the truth, and the life."

Or: you speak rightly, regarding the truth of life; you do not regard persons, with respect to the truth of justice; but you teach the way of God in truth, with respect to the truth of doctrine. In this they praise Christ with true praise, but with a deceitful heart.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
