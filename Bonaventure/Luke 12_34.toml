[[commentary]]
quote='''
Now great effort must be made regarding where the treasure is placed, because the mind is also placed in the same place; therefore he adds: For where your treasure is, there will your heart be also. Treasure is that which the mind principally loves, according to that passage in Matthew 13: "The kingdom of heaven is like a treasure hidden" etc. But where the principal object of love is, there the mind will dwell; whence Bernard says: "The soul is more truly where it loves than where it gives life." And therefore where your treasure is, there also is your heart. Bede says: "If it is on earth, the heart is below; if in heavenly things, it is fixed in Christ; for it is necessary that where the treasure of love has preceded, there the affection of thought follows." And because the wise man has his treasure in heaven, and the fool on earth, therefore Ecclesiastes 10: "The heart of the wise man is at his right hand, and the heart of the fool at his left" etc.; Second Corinthians 4: "While we look not at the things which are seen, but at the things which are not seen. For the things which are seen are temporal, but the things which are not seen are eternal." For this visible and earthly treasure consists in money; but the invisible treasure consists in wisdom; Wisdom 7: "All good things came to me together with her"; and afterward: "For she is an infinite treasure to men, which they that use are made partakers of the friendship of God."

And note that this treasure, which consists in wisdom, begins from the fear of reverence: Isaiah 33: "The riches of salvation, wisdom and knowledge; the fear of the Lord is his treasure." It advances, moreover, in the pursuit of learning: Matthew 13: "Every scribe instructed in the kingdom of heaven" etc. It is preserved in holiness of conscience: Luke 6: "A good man out of the good treasure of his heart" etc. It is consummated, moreover, in the sublimity of glory: Matthew 19: "If you wish to be perfect, go and sell all that you have, and you shall have treasure in heaven."

And he speaks here of such things; whence he promises to the poor the provision of refreshment, the kingdom of excellence, and the treasure of abundance, because the poor are accustomed to being afflicted and despised and needy for the name of our Lord Jesus Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
