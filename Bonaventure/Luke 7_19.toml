[[commentary]]
quote='''
There follows therefore secondly the putting forth of the question from John's office, when it is said: And John called two of his disciples and sent them to Jesus. For this pertains to his office, the sending of disciples to Christ. For it is the office of the Precursor to send to Christ equally by word and by office, that is, both by preaching and by baptizing, according to what is said in Acts nineteen: "John baptized with the baptism of penance, saying that they should believe in him who was to come." Whence the Gloss: "He sent them to Jesus, so that by this occasion they might see the signs, and being corrected might believe in him." And Ambrose: "He sent his disciples to Christ, so that they might attain the supplement of knowledge, because Christ is the fullness of the Law, and because words without deeds usually waver, so that a fuller faith might be displayed through the testimonies of deeds than through the pledges of words." Whence he was sending them to the Truth, so that they themselves might be made certain through the truth, and having been made certain might render testimony to the truth; and therefore he sent two, because, according to that passage in John eight, you say that "the testimony of two men is true." — Because, however, they still doubted, therefore he gives them the form of inquiry, when it is added: Saying: Are you he who is to come, that is, whom I foretold was to come: John one; "After me comes he who was made before me," and in the other Evangelists. Or do we look for another? As if to say: if you are he, then another is not to be expected, lest perchance, if we look for another, we receive not Christ but antichrist, concerning whom the Lord says to the unbelieving Jews in John five: "I came in the name of my Father, and you did not receive me; if another shall come in his own name, him you will receive."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
