[[commentary]]
quote='''
As to the place: "And Jesus walked in the portico of Solomon," that is, in the place where Solomon had previously built a portico for prayer, which nevertheless had been destroyed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
