[[commentary]]
quote='''
Through the bond of love all things are meant to be bound together in one Christ as regards head and body, which contains in itself the universality of those to be saved. This unity is now begun on the way, but is consummated in eternal glory, according to what the Lord prays, that they may be one, as we also are one: and I in them, and thou in me, that they may be made perfect in one: when this unity is consummated through the bond of charity, God will be all in all in certain eternity and perfect peace, and all things will be common through love, ordered in communion and connected in ordering and indissolubly bound in connection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
And I the glory. Here the second point is touched upon, namely the reason for being heard, because he had communicated his glory to the Apostles so that the world might be converted to the faith. Now he had communicated a threefold glory to them, namely of power, wisdom, and goodness: of power in working miracles, on account of which the Jews were converted to the faith, who "seek signs"; of wisdom in proclaiming teachings, on account of which the Greeks might be converted, who "seek wisdom". On account of this twofold glory he says: And I the glory which you have given me, I have given to them: Chrysostom: "That which is through signs, that which is through doctrines". Concerning the giving of the glory of signs, Luke chapter nine: "Having called together the twelve, he gave them power and authority over all demons, and to cure diseases". Concerning the giving of the glory of teachings, Luke chapter twenty-one: "I will give you a mouth and wisdom, which all your adversaries shall not be able to resist and contradict". He also gave the glory of goodness; on account of which he adds: That they may be one, as we also are one, by proportion.

Likewise, there is a question concerning what he says: Let them be one, just as we also are. What does he mean by this, since they are one in essence, but human beings cannot be one in essence? Likewise, as you are in me, and I in them; there seems to be no likeness whatsoever. Arius said that there was a likeness, and that just as, when it is said that we are one, it does not follow from this that we are one in essence, so neither when the Son says: I and the Father are one. And he speaks wrongly, because when it is said that certain persons are one, as Augustine says, it is necessary either that a qualification be added, or it necessarily expresses conformity in nature, not only in will; hence of two human beings or more, when they love one another, they are one is rightly said, but of a human being and God, by no means. Hence it is necessary, if the Son truly says to the Father: I and you are one, that they have the same nature; but if the divine nature is not divisible, then they are simply one. To the question, therefore, it must be said that the likeness is very remote, as in: Be merciful, just as your Father also is merciful. Just as divine mercy exceeds my mercy infinitely, so does that unity exceed this unity. But why does the church of the wicked not form one, as the Church of Christ does? The response is: because, even if the wicked agree in some wickedness outwardly, they nevertheless differ in will inwardly; they differ in their end, because each one seeks his own advantage; but the good agree in both.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
