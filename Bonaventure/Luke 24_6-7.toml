[[commentary]]
quote='''
Second, as to the proof of certain testimonies, he adds: Remember how he spoke to you, when he was still in Galilee, saying: That the Son of man must be delivered into the hands of sinful men and be crucified and on the third day rise again. For Matthew 20: "Behold, we go up to Jerusalem, and the Son of man shall be delivered to the chief priests and scribes, and they shall condemn him to death and shall deliver him to the Gentiles to be mocked and scourged and crucified, and the third day he shall rise again." Similarly Mark 8: "The Son of man must suffer many things and be rejected by the chief priests and be killed, and after three days rise again." Similarly above, chapter 18: "All things shall be accomplished which were written by the Prophets concerning the Son of man. For he shall be delivered to the Gentiles," etc., and afterward he adds: "And the third day he shall rise again." Now he had foretold these things to them in order to establish faith; whence John 14: "And now I have told you before it comes to pass, that when it shall come to pass, you may believe."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
