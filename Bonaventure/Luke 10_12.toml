[[commentary]]
quote='''
Secondly, with regard to the threatening of the severity of judgment, he adds: I say to you, that for Sodom in that day it shall be more tolerable than for that city: from which the magnitude of the punishment is apparent. For it is said in the Epistle of Jude that "Sodom and Gomorrah and the neighboring cities were made an example, suffering the punishment of eternal fire." Whence the Lord was also most strongly indignant against them, according to what is said in Genesis nineteen, that "the Lord rained upon Sodom and Gomorrah sulfur and fire and overthrew these cities and the entire surrounding region." The magnitude of the guilt is also apparent from this, because contempt of truth is a greater fault than the lust of carnality. Now the reason for this is that so great a grace was not offered to them; and according to what is said below in chapter twelve, "to whom much has been given, much will be required of him." Whence Hebrews two: "For if the word spoken through Angels was made firm, how shall we escape if we neglect so great a salvation, which, having first begun to be declared by the Lord, was confirmed unto us by those who heard?" — Another reason is on account of greater knowledge of the truth; whence Gregory: "Where the gift of knowledge is greater, there the transgressor is subject to greater guilt"; because it is said in James four: "To him who knows to do good and does not do it, it is sin." — And that the greatest punishment is owed to contemners of truth is clear from what is said in Romans one concerning certain ones who, "although they knew God, did not glorify Him as God," that "God delivered them over to a reprobate mind." And the reason for this is given, because "they did not see fit to have God in their knowledge."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
