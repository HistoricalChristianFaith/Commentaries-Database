[[commentary]]
quote='''
Third, with regard to the reproof of the lamenting women, he adds: But Jesus, turning to them, said: Daughters of Jerusalem, do not weep over me. Now he forbids such women from weeping, not because they would do wrong in compassionating Christ, since the pious and holy man Job says in chapter thirty: "I wept once over him who was afflicted, and my soul had compassion on the poor"; whence also holy David said in figure in 2 Kings 1: "I grieve for you, my brother Jonathan, exceedingly comely and lovable beyond the love of women." Whence also Christ, who is poor, afflicted, lovable, and most beautiful, is to be compassionated with the most pious affection, according to that passage in Zechariah 12: "They shall look upon me whom they have pierced, and they shall mourn for him with mourning as for an only-begotten son, and they shall grieve over him as one is accustomed to grieve at the death of a firstborn." Therefore this is not what is reproved by Christ, but rather because they were sorrowing from dejection of mind: against which 1 Thessalonians 4 says: "Do not be sorrowful as others who have no hope; for if we believe" etc. Whence the Gloss: "Do not lament me who am about to die, whose swift resurrection can dissolve death, whose death will destroy both death and the very author of death"; also because they were sorrowing with a certain carnal affection, namely over the withdrawal of the desired countenance, as he said to the disciples in John 16: "You shall weep and lament" etc.; also because they were thus weeping over Christ as though he were dying for himself, not for human transgression. Whence the Gloss: "They were saddened about mortal life, which was to be ended by death, not about the blind who were killing their physician."

But whenever we recall the passion of Christ, we ought to weep not for him, who is already glorified, but with regard to our own sin; therefore he adds: But weep for yourselves and for your children. He does not deny, therefore, that one ought to weep, but that the consideration of the one weeping ought to return upon the crime of the human race, for whose transgression Christ died. Since therefore Christ died for our sins, the day of his passion ought to be celebrated with many tears; whence it is said in Lamentations 1: "For this reason I am weeping, and my eye runs down with water, because the comforter who restores my soul is far from me; my children are desolate, because the enemy has prevailed." But it is otherwise with the other Saints, such as Peter and Paul, who died for the advancement of virtue and for attaining the palm of martyrdom. Every Christian, therefore, ought to weep over himself and over the human race, because it was the cause of the slaying of its Lord. Therefore Jeremiah 9: "Who will give water to my head and a fountain of tears to my eyes? And I will weep for the slain of the daughter of my people." From the remembrance of this spiritual death one must weep, as long as we are in Babylon as in a valley of tears and weeping; whence the Psalm: "By the rivers of Babylon, there we sat and wept, when we remembered you, O Zion." Everyone ought also to weep, because the multitude of men does not recognize so great and so noble a devotion: Lamentations 2: "Pour out tears like a torrent day and night; give yourself no rest." One ought also to weep, because from this one is prepared for eternal calamity; on account of which Jesus wept over them; above in chapter 19: "Seeing the city, he wept over it, saying: If you also had known"; and Lamentations 2: "My eyes have failed with tears, my bowels are troubled; my liver is poured out upon the earth for the destruction of the daughter of my people."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
