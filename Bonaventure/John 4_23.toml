[[commentary]]
quote='''
"But the hour is coming." I said that you do not worship perfectly, because you believe God to be local: nor do the Jews perfectly, because under figures. "But the hour is coming," namely of grace, "and now is," because Christ had already come: "when the true worshipers will worship the Father in spirit and truth: in spirit," against locality and corporeality: "in truth," the shadow having been cast aside: according to what the Apostle said in 2 Corinthians 3: "We, beholding the glory of the Lord with unveiled face, are transformed into the same image from glory," etc. That these are the true worshipers, he shows by saying: "For the Father also seeks such to worship him:" supply: as was said, in spirit and truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
