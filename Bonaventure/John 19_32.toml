[[commentary]]
quote='''
The soldiers therefore came. Here is noted the breaking of the legs of the thieves. The soldiers therefore came, at the petition of the Jews, and of the first indeed, namely the one to whom they first came, they broke the legs, because he was still alive; and of the other, who was crucified with him, supply: they broke the legs, and so they expired: so that they might thus be distinguished from the Lamb, whose bones were to be preserved whole, because he alone was whole from sin. They could say that word of Psalm 6: "Heal me, O Lord, for my bones are troubled."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
