[[commentary]]
quote='''
He confutes these objectors concerning Christ's generation, showing his twofold generation: temporal, which they knew, and eternal, which he himself knew. On account of the temporal he says: "Jesus therefore cried out, teaching in the temple," so as to astonish those who were murmuring; whence Proverbs 1: "Wisdom cries aloud outside, she utters her voice in the streets"; because he teaches openly and freely; Isaiah 58: "Cry aloud, do not cease, lift up your voice like a trumpet." "And saying: You both know me and know whence I am," according to his temporal generation; whence Matthew 13: "His mother is called Mary"; and they knew this, that he was a man and that he was born of Mary; this was said according to his temporal generation. But as regards his eternal generation, he says that he is from another, whom they do not know; on account of which he says: "And I have not come of myself," in which is noted the procession from the Father; "but he is true who sent me," because he is God; for God is truthful, but every man is a liar, according to that saying of the Psalm, "Every man is a liar"; Numbers 23: "God is not as a man, that he should lie." "Whom you do not know;" above in chapter 5: "The Father who sent me has borne witness concerning me; you have neither heard his voice nor seen his form."

It is asked concerning what he says: "Jesus cried out," etc.; because it is said in Isaiah 42: "He will not cry out, and his voice will not be heard outside."

I respond: There is the cry of impatience and contention, and of this Isaiah understands; and there is the cry of affectionate preaching, and so it is taken here.

It is also asked concerning what he says: "You know me." To the contrary: Below in chapter eight: "If you knew me, you would know my Father also;" therefore they did not know him.

I respond: There was a twofold knowledge of Christ: one through exterior sense, such as that he was a man and born in such a town and from such a parent — this they knew; the other through interior revelation, which concerned the invisible Divinity; and by this indeed they did not know him; and concerning this it is said in John chapter eight.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
