[[commentary]]
quote='''
"He first found his brother Simon": because he sought him diligently, to lead him to the discovered treasure. Therefore he says: "And he said to him: We have found the Messiah, which is interpreted Christ." We have found, like good merchants, the pearl, like good cultivators, the hidden treasure; Matthew chapter thirteen: "The kingdom of heaven is like a treasure hidden in a field," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
