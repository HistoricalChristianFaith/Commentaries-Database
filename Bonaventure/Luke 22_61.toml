[[commentary]]
quote='''
Thirdly, as to the compassion of the Lord in coming to his aid, it is added: And immediately, while he was still speaking, the cock crowed. And the Lord, turning, looked upon Peter. He sent beforehand the crowing of the cock by which Peter might be moved outwardly, and by the gaze of the Lord he might be moved inwardly, because in this twofold manner the compassion of Christ raises up sinners: outwardly, by moving them through the crowing of the cock, that is, through the admonition of preachers; Job thirty-eight: "Who has given the cock understanding?" Whence the Church also sings: The cock reproves those lying down and rebukes the drowsy, because it is said to the preacher in Second Timothy chapter four: "Reprove, entreat, rebuke," etc. And at its crowing there comes the gaze of divine mercy, concerning which in the Psalm: "For he has looked forth from his holy height: the Lord has gazed from heaven upon the earth." Augustine in On the Harmony of the Evangelists: "The Lord looked upon Peter not with human eyes, but with divine ones"; Wisdom chapter four: "The regard of God is upon his elect"; and the Psalm: "He looks upon the earth," etc.

Fourth, as regards the faithfulness of Peter in returning, it is added: And Peter remembered the word of the Lord, as he had said: Before the cock crows, you will deny me three times; and in this he acknowledged his fault, upon the acknowledgment of which penance follows.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
