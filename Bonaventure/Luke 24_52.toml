[[commentary]]
quote='''
Fourth, as regards the devotion of the disciples, he adds: And they, worshipping him, returned to Jerusalem with great joy. With joy they return on account of the victory of the Lord, whom they saw had penetrated the heights of the heavens; whence the Gloss: "Because they see that their Lord, after the triumph of the resurrection, has penetrated the heavens, they rejoice." For Christ triumphed fully, according to that word in Colossians two: "Despoiling principalities and powers, he led them forth confidently, openly triumphing over them in himself." And about this they rejoiced, according to that word in Isaiah nine: "They shall rejoice before you, as those who rejoice at the harvest, as victors exult when the spoil is captured, when they divide the plunder."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
