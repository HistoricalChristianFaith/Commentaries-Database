[[commentary]]
quote='''
Thirdly, he indicates it was done in the due manner on account of the attendance of the multitude, when he says: And the whole multitude of the people was outside, praying at the hour of incense. All were obliged to attend and pray together, according to what is said in Acts one: "All were persevering unanimously in prayer." And they stood outside out of reverence, as that publican in Luke eighteen: "The publican, standing afar off, did not dare," etc. And this at the hour of incense, because that was the fitting hour; Second Maccabees one: "All the priests were making prayer while the sacrifice was being consumed"; in which is signified that all our prayer ought to be offered through Christ, who "is heard in all things for his reverence," Hebrews five.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
