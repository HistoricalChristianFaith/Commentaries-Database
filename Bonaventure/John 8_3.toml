[[commentary]]
quote='''
Here is touched upon the second point, namely the malicious question. The question was about a woman caught in adultery, whether she was to be stoned according to the command of the Law: on account of which he says: "The scribes and Pharisees bring to him a woman caught in adultery": therefore the scribes and Pharisees, because they were more cunning and more envious: the scribes envied his wisdom, but the Pharisees his goodness; Luke eleven: "The Pharisees and lawyers began to press him vehemently," etc. "And they set her in the midst," because they wished to inquire about her.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
