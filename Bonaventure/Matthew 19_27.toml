[[commentary]]
quote='''
Gregory says that 'so many things have been given up by those who follow, that they could be coveted by those who do not follow.' Therefore blessed Peter says: 'Behold, we have left all things.' It is the greatest thing that a man should reduce his body to perpetual servitude. A holocaust of marrow is to place one's own will in the power of another. When I do that for the sake of God, it is worth more than the whole world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25207.html'
source_title="Collationes de Septem Donis, Collation 7"

[[commentary]]
quote='''
Again, Matthew 19: Behold, we have left all things etc.; Gregory, treating that word, says: "As much was left behind by those who followed as could have been desired by those who did not follow": therefore perfect imitation totally extinguishes the appetite for riches; but this extinction is most fully realized in one who renounces all things: therefore etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
