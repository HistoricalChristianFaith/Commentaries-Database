[[commentary]]
quote='''
"Jesus says to him: Go, your son lives," that is, he has been made well. He says "lives" because he had recovered from a mortal illness. And indeed the man merited this, because, although he did not yet believe in Christ, he nevertheless believed the word of Christ. Therefore it says: "The man believed the word that Jesus spoke to him, and went his way." The Gloss: "Thus he merited health for his son." Whence the Lord said to the man asking for the health of his son in Mark 9: "If you can believe, all things are possible to him who believes"; that is, they can be obtained from him.

Gregory asks: whence is it that the Lord offered to go to the servant of the centurion, but when asked, refused to go to the son of the royal official? It must be said that this was for the edification of faith and morals: of faith, because, while He offered Himself to the centurion, He manifested to us the devotion of his faith; while He withdrew Himself from the son of the royal official, by healing him in absence, He invited him to faith in His Divinity. But for the edification of morals, so that He might restrain our pride, who venerate the great and despise the lowly, the Lord offered to go to the servant of the centurion, and refused to go to the son of the royal official.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
