[[commentary]]
quote='''
"The woman answered and said: I have no husband." From this truthful response, the Lord, having taken the occasion, adds the revelation of the secret. Whence there also follows: "Jesus says to her: You have spoken well: I have no husband," because she confessed the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
