[[commentary]]
quote='''
But against this malicious and proud temptation stands the response of God, humble and discreet, because it conceals his Divinity and avoids carnality; whence it is added: And Jesus answered him: It is written, that man does not live by bread alone: Wisdom sixteen: "It is not the fruits of the earth that nourish men, but your word preserves those who believe in you." But by every word that proceeds from the mouth of God. This is written in Deuteronomy eight: "He afflicted you with want and gave you manna for food, which you did not know, to show you that man does not live by bread alone, but by every word that proceeds from the mouth of God"; whence John six: "The words that I speak to you are spirit and life."

And note that Christ defends himself through Scripture, in which he reveals his wisdom and conceals his power and preserves justice; and thus the devil's suggestion was entirely nullified, because he neither gained proof concerning God nor dragged man into gluttony. Whence that passage of Job twenty-six was verified: "His wisdom struck the proud one," namely the devil. And from this the nobility of Scripture is apparent, by which Christ in temptation defended himself as with a shield, according to that passage of Proverbs thirty: "Every word of the Lord is a fiery shield to all who hope in him"; whence also Ephesians six: "In all things taking up the shield of faith, by which you may extinguish all the fiery darts of the most wicked one, and take the helmet of salvation and the sword of the spirit, which is the word of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
