[[commentary]]
quote='''
"And you shall know the truth, and the truth shall make you free." He states three things that make a person upright. The first is rectitude of affection, and this is indicated in the discipleship of Christ: the second, rectitude of intellect, and this in the knowledge of truth: the third, rectitude of effect, through liberation from guilt, and this is indicated in the liberation by truth. Or: "you will be disciples" on the way through imitation: "you will know the truth" in the beatification of the soul: and "by the truth you will be freed from all corruption" in the happy union of soul and body: Romans chapter eight: "Creation itself will be freed from the servitude of corruption into the freedom of the glory of the children of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
