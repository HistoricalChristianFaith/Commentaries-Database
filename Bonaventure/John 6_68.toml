[[commentary]]
quote='''
The sacraments of Scripture, which externally seem arid, are yet alive within. No other Scripture besides this one is able to give life. And in Peter: "Lord, to whom shall we go? Thou hast words of everlasting life." Therefore the figures are not arid, since they produce lively growths in us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'

[[commentary]]
quote='''
"Simon Peter answered him: Lord, to whom shall we go?" As if to say: we do not wish to depart, because we cannot find anyone like you: Psalm: "There is none like you among the gods, O Lord." Nor should we depart on account of these words; hence he says: "You have the words of eternal life," which to others who did not believe were harsh and death-dealing, but to Peter and the other believers were life.

It is asked: why did Peter alone respond and more so than the others? Likewise, why was his confession not praised, as in Matthew sixteen? Likewise it seems that he lied, at least on behalf of Judas, because he was speaking for all.

It must be said that Peter was more fervent than all, as is evident from his words, and he spoke boldly to the Lord; the others did not dare to do so; and therefore he was the mouth of the Apostles both in asking and in answering, and therefore he responded for all. To the other point, Chrysostom says that he responded here for all; and because the faith of Judas was not praiseworthy, therefore he was not praised. Nor however did he lie, although he said what was false, because he was deceived by a pious error, judging well of his fellow apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
