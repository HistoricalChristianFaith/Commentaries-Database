[[commentary]]
quote='''
"He went therefore to the mountain." Here is noted the second occasion, namely the suitability of place and time. The place was suitable for performing a miracle, because it was deserted, in which there was a lack of refreshment: therefore He says: "Jesus therefore went to the mountain, and there He sat with His disciples." The place which John calls a mountain on account of its height, Matthew calls a desert on account of its solitude; Matthew 14: "Jesus withdrew by boat to a deserted place apart." And this place was suitable for performing miracles, because there was no food there: whence it is said in Matthew 14 that the disciples said to the Lord: "The place is deserted: dismiss the crowds, so that going into the villages they may buy themselves food."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
