[[commentary]]
quote='''
Nor was the efficacy only upon the soul, but also upon the body through the very body of Christ: which is noted when he adds: And the whole crowd sought to touch him, namely out of faith and devotion, like that woman of whom it is said in Matthew 9: "If I touch the hem of his garment, I shall be saved." And rightly were they devout: whence it is added: Because power from him went forth and healed all, that is, the operation of power: below in chapter 8: "I knew that power went forth from me." Then power goes forth when, hidden in itself, it is manifested in its work, according to that passage in Wisdom 12: "You show your power, you who are not believed to be consummate in power." Then also it goes forth when it communicates itself to others, according to that passage in Isaiah 40: "He gives power to the weary and multiplies strength and vigor for those who have none." And great was this power, which had power over all, according to that passage in Wisdom 14: "You have power to heal from all things"; and chapter 16: "He who turned was healed not by what he saw, but by you, the Savior of all." And this especially drew all to Christ: whence it is said in John 6: "A great multitude followed him, because they saw the signs that he performed upon those who were infirm."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
