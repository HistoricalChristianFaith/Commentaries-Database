[[commentary]]
quote='''
Having thus manifested the majesty of the Divinity through the wondrous catching of fish, he here manifests the truth of humanity through eating. His providence, therefore, in preparing food is indicated in the preparation of the foods, which was done by miracle; whence he says: When therefore they came down to the land, they saw a coal fire laid and fish placed upon it and bread, and so the meal to which he was inviting them was prepared: Matthew chapter twenty-two: "Behold, I have prepared my dinner, and all things are ready." And these things indeed were done by miracle; whence Chrysostom says: "He no longer works from pre-existing matter, as before the cross, but performs signs more wondrously, showing that what he then did from pre-existing matter, he did according to a certain dispensation." He means to say that that fish was made from nothing. Nor did he only prepare it by miracle, but the preparation was also done through Peter's ministry at the divine command.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
