[[commentary]]
quote='''
The Lord manifested himself above to the disciples and to the Jews: in this part he manifests himself to the Samaritans, and this by preaching and announcing to them the word of salvation. And this part has two parts. In the first is noted the opportunity for preaching: in the second, the form of preaching, at: "A woman of Samaria came," where the Lord begins to preach to the Samaritan woman. Now the opportunity was on the part of the place, and this indeed was twofold, namely for passing through and for resting.

Therefore first the opportunity of the place for passing through is touched upon. For when he wished to go from Judea into Galilee, he needed to pass through Samaria. Therefore he says: "When therefore Jesus knew that the Pharisees had heard." They had heard, I say, from the disciples of John, who reported as envious persons and detractors: above in the third chapter: "They said: All are going to him": they had heard, I say, "that Jesus makes more disciples and baptizes than John." And from this it was manifest to them that he was greater and more renowned than John, and already manifested to them. This they heard, because it had been so reported.

It is asked concerning what it says: "When Jesus knew." Either this is said according to his divinity, or according to his humanity: in whichever way this is said, it seems false, because Christ knew all things from his nativity; therefore he did not begin to know anything afterwards. The response to this is that just as Christ is said to be ignorant because he does not make us know, as concerning the day of judgment, so he is said to know something for the first time because he first shows himself to know it. Whence he knew this beforehand, but nevertheless then first showed it. Or it should be answered that Christ previously knew by foreknowledge, but afterwards knew by report: and this was not unfitting according to his human nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
