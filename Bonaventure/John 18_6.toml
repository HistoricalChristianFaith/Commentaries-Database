[[commentary]]
quote='''
"When therefore he said to them: I am he, they went backward," turning their face away from him, according to that word of the Psalm: "Let them be turned backward and put to confusion who devise evil against me." "And they fell to the ground." Augustine: "One voice struck, repelled, and prostrated so great a crowd, fierce with hatred, terrible with arms, without any weapon, by the power of the hidden Divinity. What will he do when he comes to judge, who did this when he was about to be judged? What will he be able to do when he comes to reign, who was able to do this when he was about to die?" Job twenty-six: "And since we have scarcely heard a small drop of his discourse, who shall be able to behold the thunder of his greatness?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
