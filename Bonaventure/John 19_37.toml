[[commentary]]
quote='''
And again another Scripture says: They shall look on him whom they pierced: Zechariah 12: "They shall look upon me, whom they have pierced"; and therefore it is true that the soldier opened his side. This Scripture has not yet been fully fulfilled, but will be on the day of judgment: Apocalypse 1: "Every eye shall see him, and those who pierced him." Chrysostom: "Let no one disbelieve nor look upon these things with shame: for those things which seem most reproachful are the foundations of our goods."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
