[[commentary]]
quote='''
Secondly, as regards the humility of confession, he adds: I will arise and go to my father and say to him: Father, I have sinned against heaven, in which he confesses that he has sinned against ecclesiastical unity, which is understood by the name of heaven. For in this God dwells; the last chapter of Isaiah: "Heaven is my throne"; and in the Psalm: "The Lord is in his holy temple, the Lord's throne is in heaven." — He also confesses that he has sinned against the divine majesty; whence he adds: And before you, because all things are open to him: Hebrews four: "All things are naked and open to the eyes of him with whom we have to do." On account of which it is said in Proverbs sixteen: "All the ways of men are open to his eyes, and the Lord is the weigher of spirits."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
