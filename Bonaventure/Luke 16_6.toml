[[commentary]]
quote='''
And he said to him: A hundred measures of oil, through faithful acknowledgment of the debt. For each person ought faithfully to acknowledge his own debt, lest perchance that word of Revelation three be said to him: "You say: I am rich and made wealthy and have need of nothing; and you know not that you are wretched and miserable and poor and blind and naked." Now the cadus is a measure containing three urns; whence the Gloss: "Cadus in Greek, amphora in Latin, containing three urns." In this, moreover, is intimated the magnitude of the debt oppressing the debtor, because, Proverbs twenty-two, "he who borrows is servant to the lender." — And he said to him: Take your bond and sit down quickly and write fifty, through liberal remission. For he greatly relieves who bears half the burden to be removed; and in this the law of charity is fulfilled, according to that word of Galatians, last chapter: "Bear one another's burdens, and so you shall fulfill the law of Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke, Chapter 16'
