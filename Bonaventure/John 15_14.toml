[[commentary]]
quote='''
You are my friends. Here secondly he exhorts to mutual love from the perspective of divine friendship; whence he offers his friendship to those who keep his commandments, so that according to the Lord's precept they may love one another: on account of which he says: You are my friends, if you do what I command you. He promises something great when he promises friendship. Augustine says: "Great is the condescension of the Lord, when he deigned to call us friends," since friend is a name of equality; "for friendship is an agreement with equal goodwill concerning divine and human things." For if wisdom establishes friends of God — Wisdom 7: "She passes into holy souls and establishes friends of God" — how much more does love? This love is proven in works: therefore he says: You are friends, if you do what I command, out of love as friends, not out of fear as servants, because you have not been called into servitude.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
