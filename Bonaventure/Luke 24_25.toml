[[commentary]]
quote='''
Fourth, as regards the declaration of Scripture, through which there is certitude of faith, he subjoins: And he said to them: O foolish and slow of heart to believe in all the things that the Prophets have spoken! He calls them foolish who despair on account of the Passion; whence they had descended from spirit to flesh, and this is a great foolishness, according to that passage of Galatians 3: "Have you become so foolish that, having begun with the spirit, you would now be completed by the flesh?" And he calls them slow of heart, because they did not wish to believe in Christ's glory and resurrection; whence Mark 16: "He upbraided their unbelief and hardness of heart, because they did not believe those who had seen that he had risen from the dead."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
