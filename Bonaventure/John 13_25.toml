[[commentary]]
quote='''
And so when he had leaned back upon the breast of Jesus, as one beloved and intimate and close, which is a sign of love: Song of Songs, last chapter: "Who is this who comes up from the desert, abounding in delights, leaning upon her beloved?" He said to him: Lord, who is it? Supply: namely, who will betray you. He leaned back upon the breast of Jesus so that he might hear the secret, because in him were all the "treasures of wisdom and knowledge hidden." Whence Augustine says of John that "he drank the streams of the Gospel from the very fountain of the Lord's breast."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
