[[commentary]]
quote='''
On that day you will know that I am in my Father: in which is noted the distinction of persons and the unity of essence; which pertains to the faith of the Trinity; and you in me, and I in you, through grace, and this pertains to the faith of redemption. You in me, as branches in the vine: below in the fifteenth chapter: "I am the vine, you are the branches: abide in me." And I in you, as an indweller in a dwelling: "The temple of God is holy, which you are," First Corinthians, chapter three.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
