[[commentary]]
quote='''
Although he had done so many signs before them, they did not believe in him: such as the sign of the raising of Lazarus: yet they did not believe, because their malice did not permit it: Wisdom 2: "Their malice blinded them." Nor did this happen by chance, but it was foreseen by the Lord and foretold through the Prophet Isaiah.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
