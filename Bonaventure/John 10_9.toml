[[commentary]]
quote='''
"I am the door." Here it is noted that whoever enters through him enters unto salvation. Therefore he says: "I am the door," through which, namely, one enters unto salvation; and the reason is added: "If any man enter in by me, he shall be saved"; concerning which entrance, Matthew 7: "Enter ye in at the strait gate. How strait is the gate, and narrow is the way, which leadeth unto life!" because Christ was poor and lowly. Through this small door the rich, full of riches, do not enter; on account of which it is said in Matthew 19: "It is easier for a camel to go through the eye of a needle than for a rich man to enter into the kingdom of heaven." This entrance is through faith and the Sacrament of Baptism; since the former is the gate of the virtues, and the latter of the Sacraments. He who enters in this way shall be saved; Mark, last chapter: "He that believeth and is baptized shall be saved." "And he shall go in and go out and find pasture; he shall go in" through contemplation, which calls back to interior things; "and he shall go out" through action; Numbers 27: "Let the Lord, the God of the spirits of all flesh, provide a man who may go in and go out before them." Or, as Augustine explains, "he shall go in" to the contemplation of the Divinity, "he shall go out" to the sight of the humanity, "and shall find pasture," because he is nourished in all things: the intellect in the contemplation of the Divinity, and the senses in the contemplation of the humanity; concerning which pastures, Ezekiel 34: "I will feed them upon the mountains of Israel; in the most fertile pastures I will feed them."

It is asked concerning what he says, that "he will go out and will find pasture."

Against this: "No one putting his hand to the plow should look back"; therefore no one who enters will go out.

It must be said that there is a twofold going out: one contrary to entering, and this is a going out from the Church through unbelief; and concerning this the objection is raised, and concerning this Augustine says: "To enter the Church is good, but to go out is the worst"; and concerning this, First John two says: "They went out from us, but they were not of us." The other is from contemplation to action; and this is not of regression, but of exercise. Concerning this the Psalm says: "Man goes forth to his work and to his labor until the evening."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'

[[commentary]]
quote='''
Therefore, however much one may be illuminated by the light of nature and acquired knowledge, one cannot enter into oneself so as within oneself to delight in the Lord, except through the mediation of Christ, who says: I am the door. If anyone enters through me, he shall be saved, and shall go in and go out, and shall find pastures. But to this door we do not draw near unless we believe in him, hope in him, and love him. It is necessary, therefore, if we wish to re-enter into the enjoyment of Truth as into paradise, that we enter through faith, hope, and charity in the mediator of God and men, Jesus Christ, who is as the tree of life in the midst of paradise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25204.html'
source_title='Itinerarium Mentis in Deum, Chapter 4'

[[commentary]]
quote='''
The figure of the six seraphic wings intimates six stairlike illuminations, which begin from creatures and lead all the way to God, to whom no one rightly enters except through the Crucified. For he who does not enter through the door but climbs up another way, that one is a thief and a robber. If anyone indeed through this door enters, he shall go in and go out and shall find pasture.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FProoemium.html'
source_title='Itinerarium Mentis in Deum, Prologue'

[[commentary]]
quote='''
These six considerations having therefore been traversed, as if they were the six steps of the throne of the true Solomon, by which one arrives at peace, where the true peaceful one rests in a peaceful mind as in an interior Jerusalem; and as if also the six wings of the Cherub, by which the mind of the true contemplative, filled with the illumination of supernal wisdom, may be borne upward; and as if also the first six days, in which the mind must be exercised, so that it may at last arrive at the sabbath of rest; after our mind has contemplated God outside itself through vestiges and in the vestiges, within itself through the image and in the image, above itself through the similitude of the divine light shining upon us and in that light itself, insofar as is possible according to the state of wayfaring and the exercise of our mind; when at last in the sixth step it has arrived at this point, that it contemplates in the first and highest principle and the mediator of God and men, Jesus Christ, those things whose likenesses can in no way be found in creatures, and which exceed all keenness of the human intellect: it remains that, in contemplating these things, it should transcend and pass beyond not only this sensible world, but also itself; in which passing over, Christ is the way and the door, Christ is the ladder and the vehicle, as it were the mercy seat placed upon the ark of God and the mystery hidden from the ages.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25207.html'
source_title='Itinerarium Mentis in Deum, Chapter 7'
