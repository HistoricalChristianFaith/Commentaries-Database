[[commentary]]
quote='''
This beginning of signs. Here the fifth point is touched upon, namely the manifestation of divine glory and the edification of the disciples' faith. By reason of his manifestation he says: This beginning of signs Jesus performed in Cana of Galilee and manifested his glory. The Gloss: "That is, his hidden Divinity"; below at chapter fourteen: "I will love him and will manifest myself to him."

By reason of the edification of the disciples he says: And his disciples believed in him, that is, they believed more firmly. Bede: "When the Lord reclined at the wedding, the wine failed, so that, when better wine was made by him in a wondrous manner, the glory of the hidden God might be manifested in him, and the faith of those believing in him, having been increased, might advance."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
