[[commentary]]
quote='''
"The Jews therefore said." Here secondly, as the Jews attack, he shows his excellence, which they assail as he teaches: whence they say: "Now we know that you have a demon": they could not recognize the good, but were ready for evil: Jeremiah 4: "They are wise to do evil, but to do good they have no knowledge." And indeed they wish to show this by disproving the Lord's saying, both because it is false and because it is proud. That it is false, they show by this reasoning: "Abraham is dead and the Prophets"; and these kept the word of God: therefore what you say is false: "If anyone keeps my word," etc. And that argument is from the greater: for if those who kept the word of God are dead, and those of whom it would seem more likely did not have immortality, therefore etc. For this reason they say: "Abraham is dead," who namely kept the word of the Lord: whence in Genesis 22 it was said to Abraham: "In your seed shall all the nations of the earth be blessed, because you have obeyed my voice." "And the Prophets are dead," to whom the Lord spoke: Ecclesiasticus 46: "The bones of the Prophets sprout from their place." "And you say: If anyone keeps my word, he shall never taste death"; as if they were saying: you openly speak what is false: nor do you speak only what is false, but proudly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
