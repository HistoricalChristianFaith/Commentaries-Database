[[commentary]]
quote='''
"But all things whatsoever John said of this man were true. And," thus led by this twofold testimony, "many believed in him," according to what the Lord himself had said above in the same chapter: "And if you do not believe me, at least believe the works"; "many," according to that passage of the Psalm: "I shall number them, and they shall be multiplied above the sand"; and Genesis chapter seventeen: "You shall be the father of many nations."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
