[[commentary]]
quote='''
And for them I sanctify myself: Chrysostom: "That is, I offer a holy sacrifice. All sacrificial victims were called holy"; Romans 12: "Present your bodies as a living sacrifice, holy, pleasing to God"; and as Chrysostom says, "because in ancient times the sanctification was in a sheep as a type, but now it is not in a type, but in the truth itself: therefore he says: That they may be sanctified in truth"; Hebrews 9: "If the ashes of a heifer sprinkled and the blood of goats sanctifies the defiled unto the cleansing of the flesh: how much more shall the blood of Christ cleanse our conscience from dead works to serve the living God"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
