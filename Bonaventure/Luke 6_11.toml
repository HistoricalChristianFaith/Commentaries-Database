[[commentary]]
quote='''
But they were filled with madness. Here, third, the pitiable perversity of the people is touched upon, who were thereby obstinate in evil whence they ought to have been raised to good. This perversity, moreover, is shown in three things, namely in the blindness of the heart, the conspiracy of the mouth, and the persecution of deed. As for the blinding of the heart, it is said: But they were filled with foolishness, that is, with the blindness of malice: Wisdom 2: "They thought these things and erred, for their malice blinded them." For with this they were indeed filled and were made foolish by the just judgment of God, according to that passage in Romans 1: "God delivered them over to a reprobate sense"; "filled with all iniquity, malice, avarice, wickedness: full of envy, murder, deceit, malignity." For with this envy they were blinded, because "wise is he to whom things are savored as they are"; but the envious person is tormented by another's happiness. Such were these men; whence that passage from Baruch 3 was fitting for them: "Because they did not have wisdom, they perished on account of their foolishness." But this fullness of foolishness is true emptiness, because "the riches of salvation are wisdom and knowledge"; therefore, by contraries, foolishness is poverty: therefore it is said in Proverbs 19: "Better is the poor man walking in his simplicity than the rich man who twists his lips and is foolish."

As for the conspiracy of the mouth, it is added: And they spoke with one another, provoking one another to evil by mutual speech. Thus they did in John 11: "The chief priests and Pharisees gathered a council and said: What do we do?" etc. This counsel was figurally preceded in the brothers of Joseph: Genesis 37: "They spoke to one another, saying: Behold, the dreamer comes; come, let us kill him." This counsel was impious; therefore Genesis 49: "Let not my soul come into their counsel"; Jeremiah 18: "You know all their counsel against me unto death; do not be propitious to their iniquities."

As for the persecution of deed, it is added: What they might do to Jesus, that is, how they might hand him over to death—which they also did, although not immediately, according to that passage in John 7: "No one laid hands on him, because his hour had not yet come." But nevertheless they did so afterward, as is said in Acts 3: "You killed the Author of life and asked that a murderer be granted to you." Whence the Savior himself could say that passage from Jeremiah 11: "But you, O Lord, have shown me, and I knew their counsels. And I was like a meek lamb that is carried to the slaughter, and I did not know that they devised counsels, saying: Let us cast wood into his bread," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
