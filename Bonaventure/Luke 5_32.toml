[[commentary]]
quote='''
It is rejected thirdly from the rectitude of supernal equity, by which He condescends more to the humble sinner than to the proud just person: and therefore He adds: I came not to call the just, but sinners to penance: the just, that is, those who consider themselves so: the Gloss says, "Those who trust in their own justice." Whence Bede: "Just He calls those who, being ignorant of the justice of God and seeking to establish their own, have not submitted themselves to the justice of God, Romans ten, who, presuming upon the Law, do not seek the grace of the Gospel." For the Lord did not come to call such, but rather to blind them by just judgment: whence in John nine: "For judgment I am come into this world, that they who see not may see, and they who see may become blind." But the Lord came to call all to penance, because, as it is said in Romans three and is taken from the Psalm, "there is none just, all have turned aside, they are become unprofitable together"; whence also in the same place: "All have sinned and need the glory of God." And therefore He began to preach from penance, as it is said in Matthew four. Concerning this calling it is said in Isaiah twenty-two: "The Lord God of hosts shall call in that day to weeping and to mourning, to baldness and to the girding with sackcloth." But those who consider themselves just do not hear this voice: against whom in Job nine: "If I would justify myself, my own mouth shall condemn me: if I would show myself innocent, He shall prove me wicked." But humble sinners hear it: below in the seventh chapter: "And all the people hearing, and the publicans, justified God, being baptized with the baptism of John. But the Pharisees and the lawyers despised the counsel of God against themselves, not being baptized by him."

And thus it is clear how in this the confutation of the proud has been accomplished: whence by divine judgment they are considered worse than those whom they despise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
