[[commentary]]
quote='''
But with such ones Christ ascended, and therefore he adds: And it came to pass, while he blessed them, he departed from them and was carried up into heaven. Then was fulfilled that word of the Psalm: "God is ascended with jubilation, and the Lord with the sound of the trumpet"; and again: "Ascending on high, he led captivity captive, he gave gifts to men." — His ascension was prefigured in the ascent of the little cloud, of which Third Kings eighteen: "Behold, a little cloud like a man's footprint was ascending," etc.; in the ascension of Elijah: Fourth Kings two: "Elijah ascended by a whirlwind into heaven"; and by the rising of the sun; whence Habakkuk three, according to another translation: "The sun was lifted up, and the moon stood still in its order."

And through this, that Christ ascended to the heavenly places, the Church of Christ was ordered in its degrees; whence Ephesians four: "He who descended is the same who also ascended, that he might fill all things." But Christ was carried up in one way, Elijah in another. For Elijah was carried by the power of Angels and of a fiery chariot, but Christ by his own power, with both spiritual and corporeal creation serving him. And therefore in the Psalm: "He who ascends above the setting of the sun, the Lord is his name"; and Isaiah sixty-three: "Who is this who comes from Edom, with dyed garments from Bozrah, this one beautiful in his robe, striding in the greatness of his strength?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
