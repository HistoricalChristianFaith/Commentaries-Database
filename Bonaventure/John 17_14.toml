[[commentary]]
quote='''
I have given them your word: above in the fourteenth chapter: "The word which you have heard is not mine, but the Father's who sent me." And from this they have incurred the hatred of the world; therefore he says: And the world has hated them. And the reason is that they themselves have left the world; therefore he says: Because they are not of the world, just as I am not of the world, that is, separated from worldly conduct, just as I am; above in the fifteenth chapter: "If you were of the world, the world would love what was its own; but because I have chosen you out of the world, therefore the world hates you." The Apostles were separated from the world; whence in Romans 1 he said, "Paul, Apostle of Jesus Christ, set apart," truly set apart, because in the last chapter of Galatians he said: "The world is crucified to me, and I to the world."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
