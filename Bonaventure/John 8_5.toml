[[commentary]]
quote='''
"But in the Law Moses commanded us to stone such women": Deuteronomy twenty-two: "If a man has lain with his neighbor's wife, both shall die," that is, the adulterer and the adulteress. "What therefore do you say?" They asked this not from zeal for inquiry, but from guile to deceive: and this the Evangelist expresses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
