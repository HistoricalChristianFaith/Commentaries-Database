[[commentary]]
quote='''
On the seventh day God rested, not from labor nor from work, since He works even until now, but from the establishment of new species: because He had made all things either in likeness, as those things which are propagated, or in seminal reason, as those things which are brought into being by other modes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25202.html'
source_title='Breviloquium, Part 2, Chapter 2'

[[commentary]]
quote='''
On the left there are three wings inasmuch as there is diffusion into the creature out of a single essence, power and operation. And in this regard, there is a threefold operation, in so far as the one God is the Creator, the Sanctifier and the Retributor: for everything that flows out of Him is in the order of essence or of grace or of glory. The first is before time, the second in time, and the third after all time. There is, however, a creation of souls in the course of time, for "My Father works even until now, and I work."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25208.html'
source_title='Collations on the Hexaemeron, Collation 8'

[[commentary]]
quote='''
Here the fifth point is touched upon, namely obstinacy in persecution, which followed upon the Lord's response showing that he was not breaking the Sabbath. On account of which he says: "But Jesus answered them," namely the Jews who were persecuting him: "My Father works even until now," even on the Sabbath, and yet does not break the Sabbath: "and I work," namely by cooperating with the Father even on the Sabbath. If therefore God does not break the Sabbath, neither do I break it: Matthew 12: "The Son of man is Lord even of the Sabbath"; and because he is Lord, he can work on it without any reproach. From this response the Jews were hardened in malice, by which they ought to have been pacified.

Likewise it is asked concerning what the Lord answered: "My Father works until now, and I work." Against: Genesis 2: "God rested from all the work that He had done": therefore it seems that there is a contradiction. I respond: It must be said that there is the work of the first establishment, and this consists in the creation of those things which pertain to the completion of the universe, and it includes in itself creation, distinction, and adornment: and this was completed in six days. From this work God rested. Another is the work of conservation, and because things cannot be preserved in themselves, since they are by nature apt to be corrupted, this work consists in transmutation and propagation and the creation of souls: and by this work God works and cooperates with cooperating nature. And He speaks here of this work, from which He does not cease on the Sabbath.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
