[[commentary]]
quote='''
"But as many as received him." Here is touched upon the fruit of his coming, or its benefit, which is the attainment of divine filiation. Because this benefit does not extend except to those who received him and believed in him, therefore he says: "But as many as received him." Thus "his own" did not receive him, but "as many as received him, he gave them power to become sons of God." And this is a great benefit; 1 John 3: "Behold what manner of charity the Father has given us, that we should be called and should be sons of God"; and in this is great benefit: whence Romans 8: "If sons, also heirs, heirs indeed of God, and co-heirs with Christ." Thus therefore he gave this power of divine filiation to those who received him. But because this reception is through faith, therefore he explains: "To those who believe in his name": thus he gave to those who received him, to those who believe in his name, that is, in the reality of his name. His name is Emmanuel, that is, God with us. He therefore believes in the name who believes him to be God and man; and this one is a son of God; 1 John 5: "Everyone who believes that Jesus is the Son of God is born of God."

It is asked concerning what he says: "He gave them power to become sons of God, to those who believe." Against this: Augustine, On the Predestination of the Saints: "The ability to believe belongs to nature": therefore they have this power from nature, not therefore given by Christ. Likewise, why does he speak of those who believe rather than of those who love, or of others?

It must be said that there is a perfect and active power, and this is called the power of authority; and there is an imperfect and passive power, and this is called possibility. The first power exists only through grace, and he speaks of that one here; therefore he says: "He gave them power." Augustine speaks of the other. As to what he asks: why especially to faith? The response is: because faith is the first of the virtues and their foundation, therefore he attributes it to faith as to a door.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
