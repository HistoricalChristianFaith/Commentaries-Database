[[commentary]]
quote='''
But Mary said to the Angel. The Evangelist first introduced the Angel narrating; here he adds the most prudent Virgin inquiring: in which inquiry three things are explained to us, namely, a fitting doubt, a moving reason, and a satisfying solution. — A fitting doubt is noted, when it is said: How shall this be done? For since there is a threefold mode of conceiving — one carnal, another spiritual, and a third wondrous and singular — I ask, by which of these modes shall it come about? Nicodemus asked the Lord in this way, when he heard that he must be born again, in John 3: "How, he said, can these things come to pass?" And note that she does not ask for the mode of knowing or a sign to produce faith, as Zacharias did, who was punished, above in the same chapter: "How shall I know this? For I am an old man, and my wife is advanced in her days"; but she asks for the mode of its coming to be, so that she might consent, according to that passage of Proverbs 4: "Let your eyelids go before your steps."

He touches upon the moving reason when he says: Because I know not a man, that is, I propose not to know one, and thus I am a virgin in mind and flesh and purpose, so that that passage concerning Rebecca, Genesis 24, rightly applies to her, that she was "a maiden exceedingly fair and a most beautiful virgin and unknown to man." And according to the Apostle, 1 Corinthians 7, she was no longer thinking of the things of the flesh, but "of the things of the Lord, how she might be holy both in body and in spirit"; and therefore she not unreasonably asked how she ought to conceive offspring, she who did not propose to know a man, so that, if it could be that she might have both virginity and fruitfulness at once, then she would give her consent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
