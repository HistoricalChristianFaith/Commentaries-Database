[[commentary]]
quote='''
Third, as to the question that arose from the prediction heard, he adds: And they asked him, saying: Master, when will these things be, and what will be the sign when they begin to come to pass? Now they asked, not all of them, but the four principal ones, namely Peter, James, John, and Andrew, because they were familiar with him. Whence the Gloss: "Because to those praising the buildings of the temple he had predicted that all would be destroyed, the disciples, as Mark says, namely Peter, James, John, and Andrew, ask privately about the time and signs of the predicted destruction." And it should be noted that one can inquire about future times in two ways: in one way, by inquiring about the determined hour of the final day, and this is a curious question, because, as is said in Matthew twenty-four, "of that day and hour no one knows, neither the Angels of heaven, but the Father alone." And therefore to the disciples asking, in Acts one: "Lord, will you at this time restore the kingdom of Israel?" the answer was: "It is not for you to know the times or moments which the Father has placed in his own power." And therefore in First Thessalonians five: "Of the times and moments, brothers, you have no need that we write to you. For you yourselves know diligently that the day of the Lord will come as a thief in the night." In another way, one can inquire in a certain generality and without designation of a certain time, and this question is studious. For ignorance of this is dangerous, on account of which, concerning the Jews, in Jeremiah eight: "The turtledove and the swallow and the stork have known the time of their coming, but my people," etc. And above, in the twelfth chapter: "Hypocrites, you know how to test the face of heaven and earth, but how do you not test this time?" And therefore the Lord does not rebuke those asking but satisfies them. Whence Gregory: "The Lord and our Redeemer announces the preceding evils of a world about to perish, so that the things coming may disturb less insofar as they have been foreknown. For arrows strike less when they are foreseen, and we endure the evils of the world more tolerably if we are fortified against them by the shield of foreknowledge."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
