[[commentary]]
quote='''
"Jesus says to her: I am he, who speaks with you." Similarly the Lord responded to the blind man below in chapter 9, when the blind man asked who the Son of God was in whom he ought to believe; the Lord responded: "You have seen him, and it is he who speaks with you." Now that faith has been declared, the preaching and conversation are concluded, because the disciples return.

It is asked: since "the Lord made a shortened word upon the earth," whence is it that He drew out the Samaritan woman through so many words? Chrysostom responds that if He had immediately said to the woman, "I am the Christ," He would have seemed to be raving; and therefore He advanced gradually as a good teacher and gave us an example, that we should not disdain to preach to few hearers, since He Himself made so long a discourse to one old woman.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
