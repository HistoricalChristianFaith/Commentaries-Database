[[commentary]]
quote='''
But even now I know, that is, I hold with firm faith, that whatever you shall ask of God, God will give you. Augustine: "I know that you can; if you will, you do it; but whether you do it is a matter of your judgment, not of my presumption." She did not dare to ask so great a thing, lest she suffer a refusal; but by expressing her faith she intimated her desire. Not only does God give what Christ asks, but also what is asked in his name; below in chapter 16: "If you shall ask the Father anything in my name, he will give it to you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
