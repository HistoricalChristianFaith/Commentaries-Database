[[commentary]]
quote='''
"Philip answered him: Two hundred denarii worth of bread is not sufficient for them, that each one might receive a little something": and thus a great sum was necessary, and they themselves were poor and did not have even a small amount; for they had left all things, according to what Peter said in Matthew nineteen: "Behold, we have left all things and followed you," etc.; and Acts three: "Silver and gold I have not."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
