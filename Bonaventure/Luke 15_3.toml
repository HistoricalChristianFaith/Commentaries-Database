[[commentary]]
quote='''
And he spoke a parable to them. After he manifested the Jewish impiety, so secondly he makes known the divine mercy for confuting the Jewish impiety. And since the mercy of God is especially toward man in the restoration of the human race, in which man needs a reconciling sacrifice, a redeeming price, and an adopting spirit: therefore in this part he introduces a threefold parable; of which the first is about the sheep, which is sacrificed; the second, about the drachma, which is a royal coin; the third is about the father and son, who is mercifully received. Furthermore, since the mercy of God is especially toward man by reason of three things which God placed in man, namely by reason of implanted gentleness, by reason of the impressed image, and by reason of the conferred likeness: and through the first, man is likened to a sheep, through the second to an imperial coin, through the third to the Son of the Eternal Father: therefore in this part the Evangelist, illumined by the Spirit, sets forth a threefold parable, uttered through the mouth of the flesh of God, to denote the mercy of God toward human nature, of which the first is about the shepherd and his sheep; the second is about the woman and the drachmas, at the passage: Or what woman having ten drachmas; the third about the father and sons, at the passage: And he said: A certain man had two sons; in which he manifestly shows that every creature in a certain way prefigures the mercy which God has with respect to man: the brute creature, as the sheep, and the merely corporeal, as the drachma, and the rational, as man.

First, therefore, as regards the possession of the whole multitude, which he wishes to be understood not literally, but parabolically, he says: And he spoke to them this parable. He therefore speaks parabolically, because it befits his wisdom; Psalm: "I will open my mouth in parables" etc.; and because the faithlessness of the Jews required this, from whom the mysteries had to be veiled, according to that passage of Matthew thirteen: "Therefore I speak to them in parables, because seeing they do not see, and hearing they do not hear"; or because it befitted Sacred Scripture, in which not only words but also things are signs for leading by the hand the understanding of little ones and the simple to conceive within themselves the manifold character of divine meanings, according to that passage of Proverbs one: "The Parables of Solomon, to know wisdom and discipline, to understand words of prudence and to receive the instruction of doctrine, that astuteness may be given to little ones, and to the youth knowledge and understanding".
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
