[[commentary]]
quote='''
Third, flattery is excluded in that which is added: And he said to them: To other cities also I must preach the kingdom of God. He does not flatter them, but shows that he cares equally for all; whence he could say that word of 1 Thessalonians 2: "Neither were we found in words of flattery, nor seeking glory from men, neither from you nor from others." For he did not seek to please men, but God; and therefore he says: I must preach the gospel, because this is the will of the Father; whence he adds: For therefore I am sent; Isaiah 61: "He has sent me to preach the gospel to the poor." And therefore it was necessary, because in John 14 it is said: "As the Father has given me commandment, so I do." Moreover he had been sent to preach the gospel to the poor, according to what is said in the authority cited above in Isaiah. He was also sent to preach the gospel of the kingdom of God, as is said here. And therefore it is gathered that he had been sent to preach the kingdom of God to the poor. Whence Matthew 5: "Blessed are the poor in spirit, for theirs is the kingdom of heaven"; and truly theirs, because, in chapter 19, "it is hard for those who have riches to enter the kingdom of heaven." Because no one can possess that kingdom unless he despises the earthly one, and riches are with difficulty despised by those who possess them, therefore they acquire with difficulty what has been promised to the poor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
