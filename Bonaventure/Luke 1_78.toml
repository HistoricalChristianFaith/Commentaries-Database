[[commentary]]
quote='''
Because of the loving-kindness of our God. God's inner goodness is the very reason why He loved to the highest possible degree and was filled with the deepest possible mercy. All this was seen in the resurrection, for by means of that same supreme kindness by which He had created all things, He now restored all things; by His supreme truth, He judged all things; by His supreme goodness, He glorified all things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
He commends also John's proclamation from the proximity of the divine presence, when he says: Through the bowels of mercy of our God. And he describes this in three ways: first, as visiting to console the affection; second, as illuminating to teach the intellect, at: To illuminate those, etc.; third, as directing to rectify the action, at: To direct the feet, etc.

He therefore first describes the divine presence joined to the prophecy of the precursor, when he says: Through the tender mercy of our God, whereby the Dayspring from on high has visited us: and it should be continued from the preceding thus: You shall go before to give knowledge of salvation to his people unto the remission of sins, which indeed was through the tender mercy of God, which hastens the divine presence in the flesh, in which he visited us. The tender mercy is exceeding love and exceeding compassion: Ephesians 2: "But God, who is rich in mercy, on account of his exceeding charity with which he loved us, even when we were dead in sins, made us alive together in Christ, by whose grace you are saved"; and Isaiah 63: "Where is the multitude of your tender mercies and your compassions? They have restrained themselves over me." But after the Son of God was incarnate, that word of Genesis 43 concerning Joseph was verified: "His bowels were moved for his brother." Following this example, Colossians 3: "Put on, as the elect of God, tender mercy, kindness, humility, modesty, patience." Through this tender mercy the Dayspring from on high has visited us: Malachi 4: "For you who fear my name, the sun of justice shall arise, and healing in his wings"; and Zechariah 6: "Behold a man, the Dayspring is his name." From on high, according to that word of John 3: "He who comes from above is above all." In this there was a wondrous condescension: the Psalm: "What is man, that you are mindful of him, or the son of man, that you visit him?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
