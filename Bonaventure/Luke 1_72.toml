[[commentary]]
quote='''
To perform mercy, etc. This is the third principal part of the canticle, in which he gives thanks for our restoration, inasmuch as it was promised to the Fathers under oath. And in this part he first sets forth the principle moving to the promise; second, the oath establishing it; and third, the remedy following upon it.

The principle now moving to the promise was the divine mercy, from which promise arose the testimony of the Fathers: and he touches on this when he says: To perform mercy with our Fathers. And the word previously stated must be repeated, namely that of blessing and raising up: blessed, that is, be God, who raised up a horn, so that he might perform mercy: Exodus twenty: "He performs mercy unto thousands for those who love him"; and Tobit three: "Blessed are you, Lord God of our fathers, who, when you have been angry, show mercy"; the Psalm: "Magnifying the salvations of his king and showing mercy to his anointed, to David and to his seed forever." And because by promising mercy he as it were made it a debt through a covenant, he therefore adds: And to remember his holy testament: the Psalm: "He has been mindful forever of his testament, of the word which he commanded for a thousand generations."

And note that the old testament was holy through prefiguration, but the new through containment and fulfillment: whence he calls the new testament a holy testament, which he sanctified with his blood: Zechariah nine: "You also, in the blood of your testament, have sent forth your prisoners from the pit"; and Hebrews nine: "If the blood of goats and the ashes of a heifer sprinkled upon the defiled sanctifies unto the cleansing of the flesh, how much more shall the blood of Christ, who through the Holy Spirit offered himself without blemish to God, cleanse our conscience from dead works to serve the living God? And therefore he is the mediator of the new testament, so that, with death intervening, for the redemption of those transgressions which were under the former testament, those who are called may receive the promise of the eternal inheritance." And this is what he had promised beforehand, as is said in Hebrews eight: "I will consummate upon the house of Israel and the house of Judah a new testament."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
