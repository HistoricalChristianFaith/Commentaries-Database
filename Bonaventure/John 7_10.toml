[[commentary]]
quote='''
"But when his brethren had gone up, then he also went up to the feast day, not openly, but as it were in secret;" therefore in secret, so that he might show human weakness, and thus invite to faith. Or: in secret, so that he might teach to avoid vain praise: Matthew 6: "Your Father, who sees in secret, will reward you"; Gregory: "Let the work be in the open, so that the intention may remain in secret."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
