[[commentary]]
quote='''
"Not that anyone has seen the Father," namely anyone mortal and subject to suffering, because in Exodus 33 it is said: "Man shall not see me and live"; "except He who is from God, He sees the Father." This is the only-begotten Son, concerning whom it is said above in chapter 1: "No one has ever seen God, but the only-begotten Son, who is in the bosom of the Father."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
