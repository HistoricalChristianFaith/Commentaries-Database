[[commentary]]
quote='''
Third, as regards the humility of spiritual servitude, which he concludes, he adds: So you also, when you have done all the things that are commanded you, through the completion of obedience: for this is true obedience, in which all commandments are fulfilled. For James 2: "Whoever keeps the whole law but offends in one point has become guilty of all"; and Deuteronomy 27: "Cursed is he who does not abide in the words of this Law and fulfill them in deed." And therefore the Lord says to Jeremiah the prophet, Jeremiah 1: "To all things to which I shall send you, you shall go, and all things whatsoever I shall command you, you shall speak to them"; and the Prophet in the Psalm: "Therefore I was directed toward all your commandments," etc. — He who is thus obedient in deed ought to be humble in self-regard, and therefore he adds: Say: We are unprofitable servants; what we ought to have done, we have done, through the recognition of one's own weakness: servants, I say, because bought, beyond what you are worth: 1 Corinthians 6: "You have been bought at a great price: glorify and bear," etc.; and 1 Peter 1: "You were not redeemed with corruptible gold or silver from your vain manner of life, but with the precious blood as of an immaculate Lamb," etc. Unprofitable, not because our good works have no reward or fruit, because they are useful to us, but because we confer nothing thereby upon the divine goodness; Psalm: "I said to the Lord: You are my God, for you have no need of my goods." — What we do is nothing in comparison with what we have received and owe to God; whence the Gloss: "He who came to minister and not to be ministered unto made us debtors to himself, so that, not trusting in our own works but dreading his examination, even when all things that are commanded have been fulfilled, we may recognize that we are imperfect." Therefore the Prophet said: "What shall I render to the Lord for all the things he has rendered to me?"

Likewise, what we endure is nothing in comparison to what we await: Romans 8: "The sufferings of this present time are not worthy to be compared with the glory to come, which shall be revealed in us." Whence the Gloss on this passage: We are unprofitable servants, "because God has no need of our good works: or because the sufferings of this present time are not worthy to be compared with the glory to come, which shall be revealed in us." He therefore who humbles himself in this way is the one who disposes himself for perfect and eternal glory. Whence this humility, which attributes all to God and nothing to itself, will exist perfectly in the fatherland, according to Apocalypse 4: "The twenty-four elders fell down before him who sat on the throne and adored him who lives forever and ever and cast their crowns before the throne, saying: You are worthy, O Lord our God, to receive glory and honor and power," etc. And in the state of the way, this is found in perfect men, according to Daniel 9: "To us belongs confusion of face, to our kings and our princes and our fathers, who have sinned: but to you, the Lord our God, mercy and forgiveness," etc. Therefore we ought to say each day that word of 1 Timothy 1: "Now to the King of ages, immortal, invisible, the only God, be honor and glory forever and ever. Amen."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke, Chapter 17'

[[commentary]]
quote='''
Luke 17: When you shall have done all the things that are commanded you, say: We are unprofitable servants: but whoever rightly says something wishes to be believed, and believes what he says to be true: therefore, for someone to be a perfect disciple of Christ, it is necessary that he regard himself as vile and that he wish to be so regarded by others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25201.html'
source_title='Disputed Questions on Evangelical Perfection, Question 1'
