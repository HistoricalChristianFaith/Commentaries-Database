[[commentary]]
quote='''
For this same reason he shows the hatred of the members: whence he gives the reason for this hatred: because they were at variance with the world; on account of which he says: If you had been of the world, that is, if you had remained in the world through depraved custom: the world would love what was its own: whence above in chapter seven it is said to the worldly: "But your time is always ready. The world cannot hate you." But because you are not of the world, that is, of worldly conduct: but I have chosen you out of the world, therefore the world hates you. That hatred was signified in Genesis twenty-seven in the hatred of Esau, where it is said: "Esau hated Jacob on account of the blessing with which his father had blessed him." Esau signifies the worldly and the reprobate, but Jacob the elect.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
