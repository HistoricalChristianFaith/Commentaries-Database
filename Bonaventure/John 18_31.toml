[[commentary]]
quote='''
"Pilate therefore said to them." Here the third point is noted, namely the deceitfulness of the Jews, because they wanted to pour the blame onto another; but Pilate refuses to judge him, not seeing that they had a proper case; whence: "Pilate therefore said to them: Take him yourselves and judge him according to your Law," which says in Exodus twenty-two: "You shall not suffer sorcerers to live." But the Jews on the contrary show that he himself must judge, because the case is one of death, and it was not lawful for them to put anyone to death; on this account it says: "The Jews therefore said to him: It is not lawful for us to put anyone to death"; but it pertains to you, and this man "is guilty of death"; therefore you must take cognizance of this case. They deceitfully wish to kill through another, but they are not excused; whence it is said to them in Acts seven: "Of whom you were the betrayers and murderers."

Question IV. Likewise, the question is raised concerning what he says: "It is not lawful for us to put anyone to death." For it is said in Exodus twenty-two: "You shall not suffer sorcerers to live," and the Law grants this many times. Augustine responds: "It should be understood that they said this on account of the sanctity of the feast day, which they had already begun to celebrate. — Or it should be said that they say this on account of the rule of the Romans, who had taken from them the power of putting to death, from whom they also purchased the priesthood."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
