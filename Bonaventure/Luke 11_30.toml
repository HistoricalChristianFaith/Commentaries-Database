[[commentary]]
quote='''
On account of which he adds: For as Jonah was a sign to the Ninevites, so shall the Son of Man be to this generation. For Jonah was a sign to the Ninevites not only by word, but also by the deed of a miracle, because, cast into the sea and swallowed by a fish, on the third day he returned to the heights above: by which he prefigured Christ suffering, dying, and rising again. Whence in Matthew 12 such a sign is applied: "For as Jonah was in the belly of the whale three days and three nights, so shall the Son of Man be in the heart of the earth." Whoever therefore does not believe this sign is harder than the Ninevites, nor do any other signs of the Lord profit him in anything.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
