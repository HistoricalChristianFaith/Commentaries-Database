[[commentary]]
quote='''
Third, as to the victory of those who are afflicted, he adds: Settle it therefore in your hearts not to premeditate how you shall respond, by your own inquiry, because, 2 Corinthians 3, "not that we are sufficient to think anything of ourselves as from ourselves, but our sufficiency is from God"; the Psalm: "The Lord knows the thoughts of men, that they are vain."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Commentary on Luke, Chapter 21'
