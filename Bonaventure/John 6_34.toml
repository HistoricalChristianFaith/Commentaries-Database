[[commentary]]
quote='''
The Lord aroused the Jews to seek spiritual refreshment; here, to those now aroused and asking, he grants instruction. And since Christ is the bread that refreshes according to the divine nature and according to the human, therefore this part has two sections. In the first is treated the refreshment of this heavenly bread according to the divine nature; in the second, with respect to the human, there: "And the bread which I shall give is my flesh."

The first part has two parts. In the first is set forth instruction in response to the Jews' petition; in the second, the confirmation of the instruction on account of the Jews' murmuring, there: "The Jews therefore murmured," etc.

He instructs therefore the Jews concerning the refreshment of this heavenly bread in this order: first he shows who this refreshing bread is; second, who are refreshed by this bread; third, why it refreshes those and not others.

First therefore, in response to the Jews' petition, he teaches who this refreshing bread is; on account of which he introduces the Jews asking: "They said therefore to him," namely the Jews: "Lord, give us this bread always"; because he had promised them living bread, therefore they ask so that they might not hunger, just as the woman asked for water; above in chapter four: "Lord, give me this water, that I may not thirst nor come here to draw." Thus therefore to those asking, the Lord shows the spiritual bread.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
