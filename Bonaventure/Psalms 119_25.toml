[[commentary]]
quote='''
The sacraments of Scripture, which externally seem arid, are yet alive within. No other Scripture besides this one is able to give life. Hence, in the Psalm: "For the sake of Your promise, give me life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'
