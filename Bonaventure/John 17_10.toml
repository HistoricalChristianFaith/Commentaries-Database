[[commentary]]
quote='''
And all my things are yours, and yours are mine: above in the sixteenth chapter: "All things that the Father has are mine," and conversely. Therefore he said above in the seventh chapter: "My doctrine is not mine"; therefore my servants and my elect are your elect. And this is the second reason for being heard on behalf of the Apostles, namely their election: therefore above in the fifteenth chapter: "You have not chosen me, but I have chosen you and appointed you, that you should go and bear fruit, and your fruit should remain: that whatever you ask the Father in my name, he may give you."

And I am glorified. Here is touched upon the third reason, namely the desolation of the disciples at the departure of Christ, which was approaching: on account of which approaching he says he has been glorified and has departed, because it was about to happen imminently: therefore he says: And I am glorified in them: because they had known him and were soon to know him more fully.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
