[[commentary]]
quote='''
The evil counselor is he who converts great things into nothing, as those who say that the counsels of God are evil and worthless. Such counselors were the Pharisees and Lawyers, of whom it is said: 'The Pharisees and the Lawyers rejected the counsel of God.' Would that there were none such now!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25207.html'
source_title="Collationes de Septem Donis, Collation 7"

[[commentary]]
quote='''
Second, he adds the contempt of John by the proud Pharisees, when he says: But the Pharisees, in whom was the pride of sanctity, and the experts of the law, in whom was the arrogance of knowledge of the truth, despised the counsel of God against themselves, not having been baptized by him, because, according to that passage below in chapter ten, "he who despises you despises me." Whence those who despised John, who was God's messenger, despised the divine counsel. Such were the Pharisees, so that the Wisdom of God could reproach them: "You have despised all our counsel"; and that passage of Isaiah chapter one was verified in them: "I have nourished and brought up children, but they have despised me." And therefore the Apostle counseled in First Thessalonians, last chapter: "Do not quench the Spirit, do not despise prophecies." — But in this they despised the divine counsel, because they refused baptism, through which divine wisdom counseled for human salvation. A figure of this preceded in the ark of Noah constructed during the flood, Genesis chapter six. On account of which it is said in First Peter chapter three: "Which also now saves you in a similar form, namely baptism."

And note that the Pharisees despised the counsel of God against themselves for six reasons. First, because they preferred human statutes to divine ones: Matthew chapter fifteen: "Why do you transgress the Law of God for the sake of your tradition?" — Second, because they preferred the justice of the Law to the justice of faith: Romans chapter ten: "Being ignorant of God's justice and seeking to establish their own," etc. Third, because they preferred appearance to truth: Matthew chapter twenty-three: "Woe to you! who cleanse what is on the outside." — Fourth, because they preferred affluence to poverty: below in chapter sixteen: "The Pharisees, who were avaricious, heard all these things and derided him," etc. — Fifth, because they preferred vain glory to humility: John chapter twelve: "They loved the glory of men more than the glory of God." Sixth, because they preferred advantage to uprightness: Matthew chapter twenty-three: "Woe to you! who say: Whoever swears by the temple, it is nothing; but whoever swears by the gold of the temple, he is obligated. Fools and blind," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
