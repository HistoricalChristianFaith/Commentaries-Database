[[commentary]]
quote='''
But because I have spoken these things to you, sorrow has filled your heart: in which is signified the abundance of sorrow, because they were considering only the absence and not the fruit of the absence. Against this is said in 1 Thessalonians 4: "Do not be sorrowful as others who have no hope." Such are filled with sorrow; 2 Corinthians 2: "Console him, lest perhaps such a one be swallowed up by more abundant sorrow"; Lamentations 3: "He has filled me with bitterness, he has made me drunk with wormwood."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
