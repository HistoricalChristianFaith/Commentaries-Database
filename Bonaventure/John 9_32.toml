[[commentary]]
quote='''
From the beginning of the world it has not been heard that anyone opened the eyes of one born blind; but this man opened them: therefore he is from God, because from the destruction of the consequent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
