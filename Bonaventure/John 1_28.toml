[[commentary]]
quote='''
"These things were done in Bethany." Here the renown of the testimony is touched upon, which is noted in this, that he gave this testimony in a public place, where many were gathering. Therefore he says: "These things were done in Bethany beyond the Jordan, where John was baptizing"; and thus a great crowd was gathering; below in chapter three: "And John was also baptizing in Aennon near Salim, because there was much water there."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
