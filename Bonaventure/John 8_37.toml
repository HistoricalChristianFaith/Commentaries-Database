[[commentary]]
quote='''
"I know that you are children of Abraham." After the liberation through the teaching of Christ has been shown, the boasting of the Jews is here emptied, because they boasted that they were free by nature: and indeed the Lord does this in this order. First he indicates a twofold kind of sonship: according to nature and imitation; second he shows that by imitation they are not children of Abraham; third, that they are not children of God; fourth, that they are children of the devil.

First therefore a twofold kind of sonship is indicated: by nature and by imitation: by natural generation, when he says: "I know that you are children of Abraham," namely begotten according to the flesh: Isaiah 51: "Look to Abraham your father, and to Sarah who bore you"; and this father you have by generation, but another you have by imitation: whence he says: "But you seek to kill me, because my word does not take hold in you": Ecclesiasticus 21: "The heart of a fool is like a broken vessel, it will hold no wisdom"; Proverbs 9. And this indeed is a work of iniquity, and according to this you have another father, whom you imitate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
