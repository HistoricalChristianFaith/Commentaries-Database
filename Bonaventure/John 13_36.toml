[[commentary]]
quote='''
Simon Peter saith unto him. Here the fourth point is touched upon, namely the repression of Peter's presumption, by which he was offering himself to imitate the Lord. Therefore Peter asks him, so as to offer himself: Lord, whither goest thou? And because he wished to offer himself, the Lord shows him his own incapacity, lest he burst forth in words: Jesus saith unto him: Whither I go, thou canst not follow me now, on account of weakness: but thou shalt follow me afterwards, when strengthened by virtue. But Peter is not swayed by the admonition.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
