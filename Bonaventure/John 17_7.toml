[[commentary]]
quote='''
And now they have known that all things which you have given me are from you, and therefore they have known you by knowing me: whence above in the fifth chapter: "The Son cannot do anything of himself"; above in the fourteenth chapter: "The Father abiding in me, he does the works," and therefore "he who sees me sees also my Father." And they had also heard the word of the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
