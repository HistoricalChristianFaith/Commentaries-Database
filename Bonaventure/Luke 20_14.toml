[[commentary]]
quote='''
Second, with respect to the perverse design, it is added: When the tenants saw him, they deliberated among themselves, saying: This is the heir, by a conjecture of the truth: for they did not know with certain knowledge, as is said in 1 Corinthians 2: "Which none of the princes of this world knew. For if they had known, they would never have crucified the Lord of glory." Yet they knew, even if not through faith, through certain signs leading to the belief that he was the Messiah promised in the Law. Therefore they conspired against Christ not from ignorance but from deliberate malice. Whence the Gloss says: "He openly proves that the Jews crucified the Son of God not through ignorance but through envy. For they understood that he was the one to whom it was said: Ask of me, and I will give you the nations for your inheritance." What is therefore said in Acts 3: "Now I know, brethren, that you acted through ignorance, as did also your rulers," does not exclude from the Jews all knowledge, but certain knowledge: or it is said with respect to the lesser ones, who sinned from ignorance. For the greater ones did this from deliberate malice, because they feared losing their temporal glory. Therefore he adds: Let us kill him, that the inheritance may be ours, through a machination of perversity: which they said not to acquire a new inheritance, since Christ was utterly poor, but to preserve what they already had. Whence John 11: "The chief priests and Pharisees gathered a council, saying: Because this man works many signs. If we let him go on like this, all will believe in him, and the Romans will come and take away our place and our nation." Whence that wicked design drew its origin from avarice, and it also drew its rise from envy: whence Wisdom 2: "Let us lie in wait for the just man, because he is contrary to our works and reproaches us with sins against the law and defames us with sins against our training"; and below: "Let us condemn him to a most shameful death. These things they thought and were mistaken, for their own malice blinded them"; since "by the envy of the devil, death entered into the world." A figure of this preceded in Joseph; Genesis 37: "His brothers devised to kill him and spoke to one another, saying: Behold, the dreamer comes; come, let us kill him and cast him into an old pit, and we shall say: A most wicked beast devoured him," etc. Therefore this Gospel is read together with the history of Joseph as the Passion approaches.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
