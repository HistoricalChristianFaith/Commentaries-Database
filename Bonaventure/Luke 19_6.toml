[[commentary]]
quote='''
Second, with regard to the devotion of Zacchaeus, he adds: And he made haste and came down and received him with joy: in which his devotion is shown, because he not only offered hospitality hastily, but also joyfully. For such a disposition is most necessary: First Peter four: "Above all things have mutual charity among yourselves continual"; and afterward: "Being hospitable to one another without murmuring." For there ought not to be sadness, but gladness; Second Corinthians nine: "God loves a cheerful giver"; and Hebrews last chapter: "Let brotherly charity remain in you, and do not forget hospitality. For by this some have pleased God, having received Angels as guests." On account of which also holy Job said, chapter thirty-one: "The stranger did not remain outside; my door was open to the traveler." And this ought to be done, because whoever receives the members of Christ receives Christ himself; Matthew twenty-five: "I was a stranger, and you took me in"; and afterward, to those asking how they did these things, he responds: "What you did to one of the least of mine, you did to me." Whence also Zacchaeus was saved through this hospitality; similarly also Lot was freed from Sodom through the Angels received as guests, Genesis nineteen. And similarly the Shunammite woman, through Elisha, whom she received as a guest, both had offspring, though she was barren, and afterward her son was raised from death, Fourth Kings four. And the woman of Zarephath, by receiving Elijah, escaped the danger of famine, Third Kings seventeen. And universally those who were hospitable obtained divine grace, because, as is said in Deuteronomy ten, "The Lord loves the stranger and gives him food and clothing"; whence Proverbs nineteen: "He who has mercy on the poor lends to the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
