[[commentary]]
quote='''
He will illuminate all who approach: on account of which he adds: And all flesh shall see the salvation of God, that is, from every kind of flesh, as the distribution gives for the classes of individuals, according to that of the Psalm: "All the ends of the earth have seen the salvation of our God." In Isaiah forty, after the aforementioned words, it is added: "And all flesh together shall see that the mouth of the Lord has spoken." But in the fifty-second chapter it is said: "All the ends of the earth shall see the salvation of our God." And note that the very same one who is the mouth or Word of the Father according to his Divinity, is the salvation according to his humanity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Commentary on Luke, Chapter 3'
