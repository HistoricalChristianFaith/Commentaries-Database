[[commentary]]
quote='''
Jesus answered and said. The second point is touched upon here, namely the explanation of that voice, because they themselves did not know either why it had been made or what it signified; therefore he says why it was made: This voice came not for my sake, but for yours, because not for my instruction, but for yours; therefore he gives the understanding of the voice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
