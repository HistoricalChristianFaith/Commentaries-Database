[[commentary]]
quote='''
He also asks devoutly, and therefore it follows: And he cried out, saying: Jesus, Son of David, have mercy on me. In this, that he cries out, he shows that he has an exceeding of desire; on account of which it is said, Romans 8: "It is the Spirit who asks on our behalf with unspeakable groanings." In this, that he says Jesus, he shows that he has confidence of hope: the Psalm: "He hoped in the Lord; He will deliver him; He will save him." For in hope he calls upon Jesus, that is, the Savior, because, Romans 8, "we have been saved by hope." In this, that he says Son of David, he shows that he has understanding of faith, by which we believe that Christ was born from the seed of David, according to that passage, Romans 1: "Who was made for him from the seed of David according to the flesh, who was predestined the Son of God in power." Whence also in Matthew 21 it is said that "they cried out: Hosanna to the Son of David; blessed is he who comes in the name of the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
