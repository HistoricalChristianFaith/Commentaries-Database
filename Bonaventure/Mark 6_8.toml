[[commentary]]
quote='''
Likewise, Mark 6: He commanded them to take nothing for the journey, neither bread nor money in their belt; therefore either He commanded this to them as prelates, or as perfect ones. If as prelates: then prelates would still be bound to this: which is manifestly false. Therefore He commanded this to them as perfect men: but perfection is proposed commonly to all for imitation, because it is said: Let him who can grasp it, grasp it: therefore to live in this way pertains to evangelical perfection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
