[[commentary]]
quote='''
"Your fathers ate manna in the desert," for forty years, namely, as is said in Deuteronomy eight: "He gave you manna for food, which you did not know": "and they died," by the death, namely, of fault and infidelity: Hebrews four: "The word heard did not profit them, not being mixed with faith."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
