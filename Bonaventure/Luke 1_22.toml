[[commentary]]
quote='''
As for the absence of speech, he adds: And coming out, he could not speak to them. For this is wont to happen to those who are elevated to the summit of contemplation; Exodus 4: "Since you have spoken to your servant, I am of more impeded and slower tongue"; and Daniel 10: "My Lord, in your vision my joints were dissolved, and nothing of strength remained in me: and how shall the servant of my Lord speak with my Lord? For nothing of strength remained in me, and even my breath is cut off." And therefore from this, as from a sign, they came to knowledge of the truth. — On account of which there follows: And they recognized that he had seen a vision in the temple, and thus, that he was a true Prophet, like Samuel, of whom 1 Kings 3: "All Israel from Dan to Beersheba knew that Samuel was a faithful Prophet of the Lord." — But for the perfect evidence of the sign, the impossibility and duration of speaking are noted, in that he adds: And he was making signs to them and remained mute. Ambrose: "Attempting bodily actions without voice and not expressing his will," he remained mute, as a sign that at the coming of Christ silence was to be imposed on the legal priesthood: Matthew 11: "The Law and the Prophets prophesied until John." Therefore Chrysostom says of John that he is "the voice of the Apostles, the silence of the Prophets."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
