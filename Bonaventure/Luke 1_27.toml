[[commentary]]
quote='''
He indicates the fittingness of the person in what he says: To a virgin espoused: whose fittingness is shown as chaste, when he says: A virgin: First Corinthians seven: "The unmarried woman and the virgin thinks about the things of God, how she may be holy in body and spirit." Bernard: "He was sent to a Virgin, a virgin in flesh, a virgin in mind, a virgin by profession, a virgin such as the Apostle describes, holy in mind and body." — She is also shown to be approved, when he says: Espoused to a man whose name was Joseph, etc., so that "Joseph, a just man," according to what is said in Matthew one, might be a witness of her chastity, according to that saying of Proverbs last: "And her husband shall praise her." Bernard: "He names a man, not because he was a husband, but because he was a man of virtue and was just"; and therefore he was a legitimate witness. Bernard: "By this one plan, a witness is admitted to the heavenly secrets, and the enemy is excluded, and the reputation of the Virgin Mother is preserved intact: otherwise, how would the just man have spared an adulteress?" "Because jealousy and the fury of a man will not spare," Proverbs six. — She is also shown to be promised in what he says: Of the house of David: which refers to the Virgin and to Joseph, because both were of the seed of David, to whom the promise had been made in the Psalm: "The Lord swore truth to David and will not frustrate it: of the fruit of your womb," etc. Bernard: "Both were of the house and family of David; but in the one the truth was fulfilled which the Lord swore to David, with the other serving only as witness and confidant," namely Joseph himself. — She is also shown to be forenamed in what he says: And the name of the Virgin was Mary. Mary is interpreted as star of the sea, and thus is shown to be fulfilled that prophecy of Balaam, Numbers twenty-four: "A star shall rise out of Jacob, and a rod shall rise out of Israel"; Ecclesiasticus fifty: "As the morning star in the midst of a cloud"; Revelation last: "I am the root and offspring of David, the bright and morning star."

Therefore he names the Virgin, to show that she was prepared, not found by chance. Bernard: "She was not newly or accidentally found, but chosen from eternity, foreknown by the Most High, prepared for Himself, preserved for Himself, prefigured by the Patriarchs, promised by the Prophets." For what was shown to Moses in the bush and fire, to Aaron in the rod and flower, to Gideon in the fleece and dew—this Solomon foresaw in the valiant woman and her worth, Jeremiah foretold concerning the woman and the man, Isaiah most clearly declares concerning the virgin and the house, and Gabriel at last presented the Virgin herself by greeting her. — Or he names the Virgin to teach us to invoke her name in our necessities; whence Bernard in a Homily: "O whoever you are who understands yourself in the flood of this world to be tossed about among storms and tempests rather than walking upon solid ground: look to the star, call upon Mary! If you are cast about by the waves of pride, of ambition, of detraction, of rivalry: look to the star, call upon Mary. If anger, or avarice, or the allurement of the flesh has shaken the little ship of your mind: look to the star, call upon Mary. If troubled by the enormity of your crimes, if confused by the foulness of your conscience, you begin to be swallowed up by the abyss of desperation: look to Mary." Whence he also says: "With her holding you, you do not fall; with her protecting you, you do not fear; with her leading, you do not grow weary; with her favorable, you arrive." — Or he names her to intimate that her name is full of mystery according to a threefold interpretation, through which we understand the threefold state of those to be saved: the active through "bitter sea," the contemplative through "star," prelates through "dominion."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
