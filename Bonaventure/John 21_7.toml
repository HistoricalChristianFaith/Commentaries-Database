[[commentary]]
quote='''
That disciple therefore says etc. Here the fourth point is noted, namely the recognition of the Lord by John: whence: That disciple therefore whom Jesus loved, that is John, says to Peter: It is the Lord. He therefore calls him Lord, because he showed himself powerful, and one whom all things obey, even the fish: and therefore to be feared, according to that passage in Malachi 1: "If I am the Lord, where is my fear?" For the disciples called him Lord: above in chapter 13: "You call me Master and Lord."

Simon Peter therefore. Here the fifth point is noted, namely Peter's fervent love, in this, that he could not restrain himself from immediately running to him: therefore it says: But Simon Peter, when he heard that it was the Lord, girded his tunic about him, lest he appear naked before the Lord: for he was naked: and cast himself into the sea, namely, to swim. He did something similar in Matthew 14: "Lord, if it is you, bid me come to you upon the waters."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: what is it that John here instructs Peter, when he says to Peter: It is the Lord? Did not Peter know the Lord as well as John? Chrysostom responds that "Peter was more fervent, but John was more excellent and more keen of mind: therefore he recognized him more quickly, but did not run more quickly." — Or the reason could have been that Peter was more occupied in fishing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
