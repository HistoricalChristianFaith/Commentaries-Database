[[commentary]]
quote='''
And the reason for this is that he is compelled to deliberate, and therefore he adds: And he said: This I will do: I will pull down my barns and build greater ones, and there I will gather all my crops and my goods. The Gloss: "Behold, great anxiety from avarice," because there is anxiety about destroying what has been made and building anew. For although the barns were full, cupidity, still empty, sought new receptacles: Ecclesiastes five: "The miser will not be filled with money" etc.; and Sirach fourteen: "The eye of the covetous is insatiable; in the portion of iniquity he will not be satisfied." The barn was filled, but the heart was empty: both because God alone can fill the soul, which is capable of the Trinity; and because temporal things do not enter the heart except according to a phantasmic likeness; and because they increase concupiscence; and because they do not make the soul better; and also because they are of an altogether different nature—just as an Angel and a corporeal place, so the soul and corporeal treasure; and also because the soul, since it has quantity not in mass but in power, is not filled by material quantity but by virtual quantity, such as the grace of the Holy Spirit, Wisdom one and Acts two.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
