[[commentary]]
quote='''
Whence he adds: And not having found his body, they came saying that they had also seen a vision of Angels, who say that he is alive. Therefore they were terrified, because it was horrible to them to have lost the body of the Lord, and incredible that he had risen: whence Bede says: "Rightly are they said to have terrified them, to whom they added more sorrow about the body not being found than they brought joy about the announced resurrection, by which we might be restored." And because someone could say that the words of the women ought not to have moved them, therefore he shows that they were not frivolous through the testimony and inspection of the men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
