[[commentary]]
quote='''
And because not every manner of serving is acceptable to God, therefore he adds the manner, namely holily with respect to oneself, justly with respect to one's neighbor, simply with respect to God, perseveringly with respect to all the aforesaid. — On account of holiness he says: In holiness indeed let us serve him, because, as it is said in the Psalm, "he who walks in the immaculate way, he ministered to me"; therefore Exodus twenty-eight: "You shall sanctify Aaron and his sons, that they may exercise the priesthood to me," and "let them minister in the sanctuary, lest they die guilty of iniquity"; 1 Peter one: "According to him who called you, the Holy One, that you also may be holy in all your conduct, because it is written: You shall be holy, because I am holy."

On account of justice with regard to one's neighbor, he says: And justice: Romans 6: "As you have yielded your members to serve iniquity unto iniquity, so now yield your members to serve justice unto sanctification"; so that you may be able to say that word of the Psalm: "But I in justice shall appear before your sight."

On account of simplicity he says: Before him, namely God: which is done through simple intention, as Hezekiah, 4 Kings 20: "I beseech you, Lord, remember how I have walked before you in truth and with a perfect heart, and have done what is pleasing before you." Thus "the boy Samuel ministered in the sight of the Lord before the face of Eli," 1 Kings 3; and 1 Chronicles, last chapter: "I know, Lord, that you test hearts and love simplicity."

On account of perseverance he adds: All our days, as the Apostle, Acts 20: "You know how through all the time I was with you, serving the Lord with all humility and tears and trials"; and Joshua 22: "Cleave to God and serve him with all your heart and with all your soul."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
