[[commentary]]
quote='''
He expresses nonetheless the universal dominion of the Son of God himself, when he adds: Until I make thine enemies the footstool of thy feet: The Psalm: "Thou hast subjected all things under his feet," etc., because by his almighty power he both governs the good and tramples the wicked. Whence 1 Corinthians 15: "He must reign, until he hath put his enemies under his feet"; "for he hath subjected all things under his feet"; Isaiah 45: "Thus saith the Lord to my anointed Cyrus, whose right hand I have taken hold of, that I may subdue all nations and turn the backs of kings," etc. For of Christ it is said in Apocalypse 19: "He had on his garment and on his thigh written: King of kings," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
