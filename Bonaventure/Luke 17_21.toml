[[commentary]]
quote='''
And therefore he adds: Answering them, he said: The kingdom of God does not come with observation: nor will they say: Behold here, or behold there, through human comprehension. For human comprehension does not extend itself to knowing the time of judgment: whence he says: It does not come with observation: the Gloss: "Of time"; Matthew twenty-four: "But of that day and hour no one knows, neither the Angels of heaven, but the Father alone"; and First Thessalonians five: "The day of the Lord shall come as a thief in the night." Nor does it extend itself even to knowing the place: on account of which he says: Nor will they say: Behold, here, etc.; the Gloss: "Nor will a determinate place be known." — But the contrary seems to be said in Joel three: "I will gather all nations and will contend with them in the valley of Jehoshaphat." But that is to be understood in the sense that Jehoshaphat is taken according to its interpretation: for it is interpreted as the valley of judgment. For the judgment will not take place with the Lord being on earth, but rather in the air, as Jerome says on this passage. — And since idle inquiry is not excluded except by diligent inquiry, therefore he adds: For behold, the kingdom of God is within you, through the offering of divine grace, which indeed was made at the coming of Christ: concerning which John one says: "There has stood in your midst one whom you do not know." Whence Bede: "He calls the kingdom of God himself placed within them, that is, reigning in the hearts of those who have believed." On account of which it is said above in chapter eleven: "If I cast out demons by the finger of God, then the kingdom of God has come upon you," that is to say, that of which it is said in Romans fourteen: "The kingdom of God is not food and drink," etc. He wishes therefore to say that they ought to consider the first coming and cease to investigate the time of the second coming; whence Bede: "When it shall come can be observed neither by men nor by Angels, just as the time of the Lord's incarnation was foretold by the most certain prophecies of the Prophets and made manifest by the proclamations of the Angels."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke, Chapter 17'
