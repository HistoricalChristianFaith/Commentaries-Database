[[commentary]]
quote='''
Third, through efficacy in deed he overthrew their presumptions; on account of which it is added: And looking around at all of them, as though already confounded, so that he could now say that word of Job 17: "Therefore turn and come, and I shall not find among you any wise man." And because no one could contradict, for the confirmation of the truth it is added: He said to the man: Stretch out your hand. And since "his word is full of power," as is said in Ecclesiastes 8, therefore it is added: And he stretched it out, and his hand was restored to health: in which the Lord showed that he is Lord of the Law and of the Sabbath. For he it was who healed the hand of Moses, in Exodus 4, by his command alone; he it was also who withered and again healed the hand of Jeroboam, the idolatrous king of Israel, as is told in 3 Kings 13; he, I say, is the one of whom it is said that "he wounds and he heals, he strikes, and his hands shall heal"; of whom it is said in the Psalm: "Who forgives all your iniquities, who heals all your infirmities"; and this by his word alone, so that it may be made manifest that he is the one of whom Wisdom 16 says: "Your word, O Lord, healed them, who heals all things." For just as the Father made all things through the uncreated Word, so through the incarnate Word, as Augustine says, he remade all things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'

[[commentary]]
quote='''
Spiritually it is to be understood that dryness in the soul is a defect of vigor on account of the absence of grace, according to that passage in John 15: "If anyone does not abide in me, he shall be cast out like the branch and shall wither." But this dryness is introduced from seven causes according to the seven capital sins. Whence note that there is a dryness of pride, or arising from pride: Ecclesiasticus 10: "The Lord dried up the roots of proud nations." And of envy: James 1: "The sun rose with its burning heat and dried up the grass"; and in the Psalm: "Let them become like the grass of the housetops." And of wrath, concerning which Mark chapter nine says of the demoniac who "foams and gnashes his teeth and withers away." And of sloth: Proverbs chapter seventeen: "A sorrowful spirit dries up the bones"; Numbers chapter eleven: "Our soul is dried up," "it is nauseated by this most light food." And of avarice: Sirach chapter fourteen: "The eye of the covetous man is insatiable in the portion of iniquity; he shall not be satisfied until he consumes, withering his own soul." And of gluttony: Nahum chapter one: "The banquet of those drinking together shall be consumed like stubble full of dryness." And of lust: The Psalm: "My bones are burned as a hearth; I am struck like grass, and my heart has withered," etc.; "All flesh is grass," Isaiah chapter forty; and Job chapter thirty: "My skin is blackened upon me, and my bones are dried up."

Thus therefore from seven causes spiritual dryness is understood, which is also sevenfold: namely, dryness of the heart for thinking well: Isaiah chapter twenty-one: "My heart has withered; darkness has stupefied me." And dryness of the mouth for desiring: Judith chapter seven: "Our end will be brief by the mouth of the sword, which becomes longer in the dryness of thirst." And of the word for teaching: Hosea chapter nine: "Give them, O Lord, a womb without children and dry breasts." And dryness of the arm for working: Zechariah chapter eleven: "His arm shall be dried up with dryness." And dryness of the hand for giving generously: Job chapter fifteen: "Before his days are fulfilled, he shall perish, and his hand shall wither." And of the skin for conducting oneself: Job chapter seven: "My skin is dried up and shrunken." There is lastly dryness of strength for enduring; the Psalm: "My strength is dried up like a potsherd, and my tongue has cleaved to my jaws."

Now this sick man having a withered hand signifies the dryness of avarice, which is healed when by divine command the hand is extended to give alms generously, according to that passage in the last chapter of Proverbs: "She opened her hand to the needy and extended her palms to the poor." And that extension obtains the vigor of grace, according to that passage in Sirach chapter seventeen: "The alms of a man is as a purse with him, and it shall preserve the grace of a man as the apple of the eye." An example and proof of this appears manifestly in a certain king of England, who gave generous alms, whose hand and arm remains whole and incorrupt, since a certain bishop said to him one day, when he had extended his hand to give a poor person a silver dish that he had before him, that his hand would never wither — which word is said to have been fulfilled up to the present day.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
