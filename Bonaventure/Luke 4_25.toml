[[commentary]]
quote='''
He adds a special example in Elijah, the most distinguished of the Prophets, when he says: In truth I say to you: John 17: "Your word is truth." He spoke in truth, whom they ought to have believed, and yet they did not believe; whence that passage in John 8: "If I speak the truth, why do you not believe me?" and that passage in Job 6: "Why have you detracted from the words of truth?" And this is a certain truth, because it is taken from Scripture. Whence it is added: Many widows were in Israel in the days of Elijah, who were placed in necessity on account of the lack of matrimonial companionship: Jeremiah 15: "Her widows are multiplied above the sand of the sea." They were placed in necessity on account of the lack of heavenly rain: whence he adds: When the heaven was shut up and it did not rain for three years and six months: as the Lord had threatened in Leviticus 26: "But if you will not even so obey me, I will make the heaven above you like iron"; and Deuteronomy 28: "Let the heaven that is above you be bronze." And so it came to pass because of their sins: whence Jeremiah 3: "You have polluted the land with your fornications. Therefore the drops of rain have been withheld, and the latter rain has not come." They were placed in necessity on account of the lack of earthly sustenance: and therefore it is added: When there was a great famine throughout all the land: as it is said in 3 Kings 18: "There was a severe famine," etc.; whence that word of the Psalm was verified concerning the children of Israel: "They shall suffer hunger like dogs and shall go about the city," because the king and the steward of his house went about to find pastures, 3 Kings 18.

And note here spiritually that in these two examples he shows the unworthiness of the Jews in comparison with the Gentiles with regard to the universal lack of repentance and the universal contagion of malice, which remained uncured in the Jews but was remedied in the Gentiles through Christ. For the closing of heaven designates the lack of grace and doctrine: Deuteronomy 11: "Take heed lest you depart from the Lord"; and thereafter: "And the Lord being angry shut up heaven, and the rain come not down, and the earth yield not her fruit." Concerning which rain in the Psalm: "God shall set apart a voluntary rain"; and from this comes famine and want of every good: Job 18: "Let his strength be wasted with hunger, and let famine invade his ribs." And note that the rain is said to have been withheld for three years and six months, because during the three and a half years in which the Lord preached, they did not receive the rain of grace, their sins requiring it. For although the rain came upon them, Judea nevertheless did not receive it so as to bear fruit: Hebrews 6: "The earth that drinks in the rain that comes often upon it and brings forth herbs meet for those by whom it is tilled, receives blessing from God: but that which brings forth thorns and briers is rejected and near unto a curse." In this time, however, the true preacher Elijah is sent to the widow in Zarephath of Sidon, who rightly designates the Gentile world, as Bede shows in the Great Gloss, and she was saved while the people of the Jews were abandoned, according to that passage in Acts 13: "Since you reject the word of God and judge yourselves unworthy of eternal life: behold, we turn to the Gentiles."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
