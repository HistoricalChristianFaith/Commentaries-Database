[[commentary]]
quote='''
And therefore, to show that He said this by way of reproving, He adds: There was none found who returned to give glory to God, except this stranger. In this the ingratitude of the Jews is manifestly shown, because, though they were nine, none of them returned, but only this Samaritan, who was the only one and alone. In this is understood the election of the Gentiles and the reprobation of the Jews, according to that passage of Ephesians 2: "You who were at one time Gentiles in the flesh, who were at that time without Christ, alienated from the commonwealth of Israel and strangers to the covenants, having no hope of the promise and without God in this world. But now in Christ Jesus you who were at one time far off have been made near," etc. A stranger is one who dwells in one place and was born in another: so it is with all who, born according to the flesh, pass over to the spirit, according to that passage of Romans 9: "Not the children of the flesh are children of God, but the children of the promise are counted as offspring"; because, as is said in John 3, "that which is born of the flesh is flesh," etc. And therefore in the Psalm it is said to the Church: "Forget your people and the house of your father," etc.; and in a figure it is said to Abraham in Genesis 12: "Go out from your land and from your kindred and from the house of your father and come into the land," etc. And therefore in First Peter 2: "I beseech you as strangers and pilgrims, to abstain from carnal desires," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke, Chapter 17'
