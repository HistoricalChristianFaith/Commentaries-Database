[[commentary]]
quote='''
Here the benefit of eating is touched upon: because he who eats the flesh is vivified in soul and body. In soul: whence he says: "He who eats my flesh and drinks my blood has eternal life: has," I say, in merit; or "has," because he has already in a certain way begun to possess it; Isaiah fifty-five: "Hear, you who hear me, and eat what is good, and your soul shall delight in richness: incline your ear and come to me, and your soul shall live, and I will make with you an everlasting covenant, the faithful mercies of David."

He also gives bodily life: whence he adds: "And I will raise him up on the last day," in that hour, of which above in chapter five: "The hour comes, in which all who are in the tombs shall hear the voice of the Son of God: and those who have done good shall come forth to the resurrection of life, but those who have done evil to the resurrection of judgment."

An inquiry is made concerning the benefit: "He who eats my flesh," etc. For many eat who nevertheless die and are damned, as Judas. Likewise, just as the Son lives on account of the living Father, so it is said in the text that we live on account of the Son: but the Son does not live by eating: therefore by equal reasoning neither do we: or if we eat the Son, why does he himself not eat the Father?

It must be said that a twofold heresy arose from this word: one which said that from the moment anyone eats the body of Christ, he cannot be damned, provided he ate as a believer. But this is manifestly irrational on account of Judas. Others said that whoever once ate worthily would never afterward be damned: and this is manifestly false, because, as can be proved through Scripture, many were good in the Church who were afterward damned. Therefore it must be understood in the catholic sense: "he who eats," namely worthily, and does not depart from that worthiness, will live forever.

To the other objection it must be said that the comparison is not entirely similar, although it is adduced as a likeness. For the Son is said to live on account of the Father, because he has life from the Father and because he remains in the Father, but not because he is made better by participation in the Father: but we live through the Son, because from him we have life, and by the Son remaining in us and by participation in him we are made better. Therefore, because he does not remain in us except through eating, we eat so that we may live and be made better.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
