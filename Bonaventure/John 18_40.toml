[[commentary]]
quote='''
Then the hardening of malice in the Jews is added, who were not moved by Christ's innocence nor by the judge's clemency, but rather persisted in their accusation: whence he says: "They cried out again and said: Not this man, but Barabbas," namely not this innocent man, but one whom we know to be guilty: whence the Evangelist adds: "Now Barabbas was a robber," by which the astonishing malice of the Jews is expressed, that they preferred a robber and his welfare to Christ the Lord. Whence Chrysostom: "O polluted mind! They ask that the guilty one be released, but command the innocent one to be crucified": Acts 3: "You denied the Just and Holy One, and asked that a murderer be granted to you; but the Author of life you killed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
