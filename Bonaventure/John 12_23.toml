[[commentary]]
quote='''
But Jesus answered them. Here is touched upon the third point, namely the condescension of the Lord, by which he satisfies the desire of the Gentiles, saying that the time has now come for manifesting himself to the nations. On account of which he says: The hour has come that the Son of Man should be glorified, that is, that he might be manifested to the nations, and through this his brightness and glory might be known. This is the hour of the passion and of our redemption, which was long awaited and desired. In this hour the Gentiles are called: on account of which the Apostle says in Romans 13: "It is the hour for us now to rise from sleep." This is the hour of which it was said above in chapter seven: "No one seized him, because his hour had not yet come."

Question III. Likewise it is asked: why does He now more than before manifest Himself to the Gentiles?

And it must be said that it was on account of the nearness of the Passion, in which was the salvation of the Gentiles. Another reason: because the Jews had already, through the conspiracy of Christ's death, rejected the grace of God; and therefore after their conspiracy the Lord turns to the Gentiles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
