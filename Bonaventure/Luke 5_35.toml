[[commentary]]
quote='''
And therefore the consolation of the disciples is befitting the presence of the bridegroom Christ, just as also desolation is befitting his absence. On account of which he adds: But the days will come when he will be taken away from them, namely through death and passion: Hosea 5: "They will go to seek the Lord and will not find him: for he has been taken away from them," and then they will fast in those days, namely at that time: because John 16: "You will weep and lament, but the world will rejoice; you indeed will be sorrowful, but your sorrow will be turned into joy"; and then will be the time of sorrow and fasting, whence Tobit 2: "She ate her bread in grief and trembling, recalling that prophetic word: Your feast days will be turned into mourning"; Lamentations 1: "Therefore I am weeping, and my eye flows with tears, because the comforter who would restore my soul has become far from me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
