[[commentary]]
quote='''
Fourth, as regards the company of multitude in the demon responding to the Lord's interrogation, it is added: And Jesus asked him, saying: What is your name? For it belongs to him to interrogate, to whom it also belongs to judge: Wisdom 6: "The Most High will examine your works and will search out your thoughts"; and in chapter 11: "These, questioning them as a stern king, you condemned"; because, according to that of Wisdom 1, "there will be an interrogation into the thoughts of the ungodly." He was asking about the name, not because he was ignorant, according to what the disciples say to him in John 16: "Now we know that you know all things, and you do not need anyone to question you," and much less that you should question others.

But he was asking so that from the demon's response the confutation of the multitude would become apparent; whence it is also added: And he said: Legion. "A legion contains six thousand six hundred and sixty-six"; and therefore he does not respond with the name of a single person, but of a multitude: which the Evangelist explains, adding: Because many demons had entered into him, so that he could say to the Lord: "Lord, how they are multiplied who trouble me"? And again: "They are multiplied beyond the hairs of my head who hate me without cause." Already what is said of Antiochus in 1 Maccabees 1 had been verified in this man: "Antiochus went up to Jerusalem with a great multitude. And he entered into the sanctuary with pride."

And thus from the four premises stated above, the violence of the besieging devil is made apparent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
