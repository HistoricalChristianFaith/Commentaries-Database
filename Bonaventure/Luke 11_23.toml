[[commentary]]
quote='''
Thirdly, joining the adjoined truth, he adds: He who is not with me is against me: and through this, the men whom the devil possesses resist Christ, and according to that passage of 2 Corinthians 6: "What accord has Christ with Belial?" And because no one can resist his strength, therefore he adds: He who does not gather with me scatters: because, as it is said in Job 9, "who has resisted him and had peace?" For the office of Christ is to gather, according to that passage of John 11: "He was about to die, that he might gather into one the children of God who were scattered"; and Isaiah 11: "He will gather the fugitives of Israel and will collect the dispersed of Judah from the four corners of the earth"; Psalm: "He will gather the dispersed of Israel." But the office of the devil is to scatter, according to that passage of John 10: "The wolf snatches and scatters the sheep." Therefore it is best to enter the sheepfold of the Lord, who cannot be overcome by one stronger, as it is said in John 10: "The Father, what he has given me, is greater than all things," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
