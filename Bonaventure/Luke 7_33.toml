[[commentary]]
quote='''
Third, as to the mark of detraction in speech, by which they turn good into evil, it is said: John the Baptist came neither eating bread nor drinking wine, and thus in the way of severity and justice, as is said in Matthew 21: "John came to you in the way of justice." Whence, because he came with the austerity of penance, he came as one lamenting and groaning for the salvation of the people, according to that passage of Daniel 10: "I Daniel mourned for three weeks of days; I did not eat desirable bread, and flesh and wine did not enter my mouth." But nevertheless through him their hardness was not softened to weeping, but their malice was increased to detraction.

Whence it is added: And you say: He has a demon, because he is unlike the life of others. So they said to the Savior in John 10: "He has a demon: why do you listen to him?" Whence the works of power, which are from the Holy Spirit, they out of the wickedness of their heart attributed to a demon, as they said in Matthew 9: "By the prince of demons he casts out demons." And thus was verified in them that passage of Sirach 11: "He who turns good into evil lies in wait, and upon the elect he will place a stain." And therefore woe to them, according to that passage of Isaiah 5: "Woe to you who call good evil and evil good!"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
