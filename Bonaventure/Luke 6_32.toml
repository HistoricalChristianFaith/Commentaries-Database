[[commentary]]
quote='''
It is difficult for anyone to love his enemy except through grace. A stone cannot give heat of itself: but if it is placed next to a burning furnace, it can afterward give heat. "If you love those who love you," what grace is that? To love only a friend is not the virtue of grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25201.html'
source_title='Collationes de Septem Donis, Collation 1'

[[commentary]]
quote='''
After he promulgated the evangelical laws under fitting perfection, here secondly he proves from a deficient condition, where he shows that he had to command according to the aforementioned manner: otherwise there is no merit before God. Whence he shows here three things, namely that it does not suffice for merit to be benevolent toward those who love us, nor beneficent only toward those who repay, nor generous toward those who recompense. And in this he shows that perfect benevolence and beneficence ought to extend not only to friends, but also to adversaries according to the form promulgated above. He shows therefore first that it does not suffice to be benevolent only toward those who love us, because this is characteristic of sinners: on account of which he says: And if you love those who love you, that is, because they love you, what credit is there for you? that is, what merit worthy of recompense? As if to say: none. And he gives the reason: For sinners also love those who love them, who have no merit before God; for this is natural, according to that passage in Ecclesiasticus thirteen: "Every animal loves its like, so also every man his neighbor" etc.; or even carnal, as in Ecclesiasticus thirty-seven: "A companion sympathizes with a friend for the sake of his belly, and against the enemy he will take up the shield." Such love has no merit before God, because it is not bestowed on account of God. For if it were bestowed on account of God, a person would certainly love those who love him, according to that passage in Proverbs eight: "I love those who love me"; even to those less loving him he would repay with greater love, according to that passage in Second Corinthians twelve: "But I will most gladly spend and be spent for your souls, even though, loving you more, I am loved less"; likewise, those in no way even loving him he would also love, according to that passage in First John four: "In this the charity of God appeared, not that we loved God, but that he first loved us"; and Romans five: "But God commends his charity toward us, because while we were still sinners, Christ died for the ungodly." Whence when it extends only to those who love us, it is not divine nor gratuitous love, but mercenary and human, and therefore not worthy of recompense.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
