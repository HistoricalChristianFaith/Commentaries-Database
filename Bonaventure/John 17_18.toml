[[commentary]]
quote='''
As you sent me. Here the third point is touched upon, namely the reason for being heard, which is twofold, namely the office committed to them and the sacrifice offered for them. By reason of the office committed to them, they ought to be preserved and sanctified, because they were sent among the wicked: therefore he says: As you sent me into the world, to suffering; so also I have sent them into the world, namely to suffer: whence Matthew 10: "Behold, I send you as sheep in the midst of wolves." Therefore by reason of the office it was fitting that they should be preserved: and also by reason of the sacrifice offered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
