[[commentary]]
quote='''
And since, as Bede says in the Gloss, "Christ is not the God of dissension, but of peace and unity," therefore he refutes the aforesaid petition, when he adds: But he said to him, namely Jesus: Man, who appointed me a judge or a divider over you? A judge, that is, of disputes, and a divider of possessions; the Gloss: "He disdains to be a judge of disputes or an arbiter of possessions, he who holds the judgment of the living and the dead and the arbitration of merits." It is indeed true, as it is said in the Psalm, that "he was appointed king by him over Sion, his holy mountain," and that "all things are placed under his dominion"; but because God had sent him to communicate spiritual things, therefore he refused to descend to dividing temporal things, intimating in this that passage of Second Timothy two: "No one serving as a soldier of God entangles himself in worldly affairs."

And note that Christ calls him an animal and brutish man, on account of his love for earthly things and his dispute over division. Whence First Corinthians three: "Since there is among you jealousy and contention," etc.; and the Psalm: "Sons of men, how long will you be heavy of heart?" Whence in this is intimated the refutation of the avaricious petition.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
