[[commentary]]
quote='''
Second, as regards the open recognition of Christ, he adds: And it came to pass, while he sat at table with them, he took bread and blessed and broke it and gave it to them. For this was the custom of Christ, that he always offered a blessing before eating. For, in First Timothy 4: "God created foods to be received with thanksgiving by the faithful"; and afterward: "Nothing is to be rejected which is received with thanksgiving, for it is sanctified through the word of God and prayer." And therefore it is customary, especially for clerics and religious, to offer a blessing before food. And hence it is that Gregory narrates in the Dialogues about a woman who ate lettuce with greediness, that the devil possessed her. Because, therefore, this stranger conformed himself to Christ in the blessing and also in the manner of breaking bread, they were led by the hand to the recognition of him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
