[[commentary]]
quote='''
"This again is the second sign that Jesus performed: the second," namely with respect to the one that took place at the wedding: "when he had come from Judea into Galilee," so that, because they had not believed through the first, they might believe through the second: Exodus 4, the Lord said to Moses: "If they will not believe nor hearken to the voice of the first sign, they will believe the voice of the latter sign."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
