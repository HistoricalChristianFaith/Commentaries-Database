[[commentary]]
quote='''
Because I have not spoken of myself, as one vainly glorious, of whom above: "He who speaks of himself seeks his own glory"; but the Father who sent me, he gave me a commandment, what I should say and what I should speak. And therefore I speak according to his commandment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
