[[commentary]]
quote='''
And because no one rejoices perfectly except from a cause and reason, therefore there follows an announcement expressing the cause of joy, when it is said: For today is born to you a Savior: to you, namely for your benefit, namely of men: Isaiah 9: "A little child is born to us, and a son is given to us." And truly for benefit, because a Savior: Isaiah 45: "Truly you are a hidden God, the God of Israel, the Savior"; and Isaiah 19: "He will send them a Savior and a defender, who will deliver them." And truly a Savior, because, according to that passage of Acts 4, "There is no other name under heaven given to men, by which we must be saved." In this, moreover, is intimated the cause of rejoicing for the nativity: Malachi 4: "The sun of justice shall rise upon you who fear my name." Nor is one to rejoice only by reason of benefit, but also of dignity, and therefore it is added: Who is Christ the Lord, in the city of David, and thus he will restore the kingdom of Israel, according to that passage of Isaiah 9: "He shall sit upon the throne of David and upon his kingdom, to establish it and strengthen it in judgment and justice, from henceforth and forever." And therefore Lord is rightly added, because, 1 Timothy 6, "He is the King of kings and Lord of lords"; and Revelation 19: "He had on his garment and on his thigh written: King of kings and Lord of lords." And therefore: in the city of David, that is, in Bethlehem, where he was born.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
