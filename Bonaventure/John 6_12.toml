[[commentary]]
quote='''
"When they were filled," that is, satisfied, "he said to his disciples: Gather up the fragments that remain, lest they perish." For since bread was made for the use of men, fragments perish when they are not taken up for the use of men; Psalm: "That bread may strengthen the heart of man." And the disciples of the Lord carry out the command.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
