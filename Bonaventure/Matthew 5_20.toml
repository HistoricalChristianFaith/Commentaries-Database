[[commentary]]
quote='''
To bind oneself by vow to obey another is the ultimate completion of perfection, because in it is most fully realized abounding justice, which is evangelical justice, according to that passage in Matthew 5: Unless your justice shall abound more than that of the Scribes and Pharisees, you shall not enter into the kingdom of heaven. For there is a threefold act of justice, namely to rectify, to coordinate, and to compensate. For justice is nothing other than a right will, ordered and recompensative, because through it "there is rendered to each one what is his own," according to what befits the rectitude of right and the dignity of order. The perfect rectification of abounding justice is measured according to the conformity of the will to truth; but truth humbles each person, so that one thinks less of oneself than of another. Therefore that person is perfectly and abundantly rectified who, according to what truth dictates, not unwillingly but voluntarily humbles his will beneath another and in a certain manner reduces and captivates it into a kind of servitude; which indeed is accomplished through obedience rendered to another person, which is most opposed to arrogance and ambition.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'
