[[commentary]]
quote='''
And as they were sailing, etc. Here secondly is described the onset of the storm with the importunity of danger and with the opportunity of refuge. — First, regarding the importunity of the emerging danger, while Christ was sleeping, it is said: And as they were sailing, he fell asleep. And while he was sleeping, they encountered danger in sailing, according to that passage of Ecclesiasticus 43: "They who sail the sea tell of its dangers." — Therefore the danger is added: And there came down a storm of wind upon the lake, and they were being filled and were in danger, that is, the storm of wind agitated the lake and filled the boat with water, according to that passage of Mark 4: "And there arose a great storm of wind, and the waves beat into the ship, so that the ship was filled." And this happened by divine dispensation, just as it is said of Jonah in Jonah 1: "A great tempest arose in the sea, and the ship was in danger of being broken." Whence, just as that ship was in danger on account of Jonah fleeing from the face of the Lord, so also this one on account of the presence of the traitor, according to what the Gloss says: "Rightly is the ship troubled in which the traitor is together with the good, and those who had been steadfast by their own merits are troubled by the merits of others."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
