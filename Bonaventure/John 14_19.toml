[[commentary]]
quote='''
Yet a little while, and the world sees me no more, because after the Passion he did not appear to the worldly, but to the Apostles; Acts 10: "He gave him to be made manifest not to all the people, but to witnesses preordained by God." But you shall see me: because I live, through the life of glory, and you shall live, through the life of grace, which begins in faith: concerning which, Habakkuk 2: "But my just one shall live by faith."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
