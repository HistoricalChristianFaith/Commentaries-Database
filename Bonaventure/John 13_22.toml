[[commentary]]
quote='''
The disciples therefore looked at one another. Here the second point is touched upon, namely the inquiry of the disciples: and first they began to doubt; on account of which he says: The disciples therefore looked at one another, uncertain of whom he spoke: therefore they looked at one another, because each doubted about the other. Augustine: "So great was their pious love toward their Master, that nevertheless human weakness goaded them to suspect one another." And because doubt leads to inquiry, and inquiry requires intimacy, therefore the intimacy of John is shown, so that through him the inquiry might be made.

Question. There is a question about the inquiry of the disciples: Whence is it that the disciples dared to inquire about a hidden crime? It seems to have been curiosity. And it is also asked: since Peter was the boldest among all, why did he not inquire by himself, but "through an intermediary person," namely John? For Peter almost always answered on behalf of all the disciples. To this it must be said that they were not asking out of curiosity to know the fault of their neighbor, but because each one, as Chrysostom says, feared for himself, and they were tormented by that fear: they wanted to be assured. And because they knew that the Lord would not say it openly, nor did they wish to put him to shame so openly, they asked secretly, and they were answered secretly. And therefore Peter did not speak, but nodded to the one who was near and could ask secretly; for he was reclining upon the breast of Jesus privately and was able to ask, which Peter could not do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
