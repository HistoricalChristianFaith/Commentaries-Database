[[commentary]]
quote='''
In reference to the first stage, the Father says to Incarnate Wisdom in Ecclesiasticus: "Take root in My elect. — And I took root in an honorable people." This is the production of a tree that is good for food.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252014.html'
source_title='Collations on the Hexaemeron, Collation 14'
