[[commentary]]
quote='''
And that this suffering was of great duration is apparent from the difficulty of the cure; whence he adds: And I asked your disciples to cast him out, and they could not. The reason for this, however, was that they could not do so by earthly power, according to that passage in Job 41: "There is no power upon the earth," etc.; and at that time the power of divine efficacy was absent on account of human unbelief. Whence Matthew 17: "The disciples said to the Lord: Why could we not cast him out? But he answering said: Because of your unbelief." But on the contrary, Mark 9: "If you can believe, all things are possible to him who believes."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
