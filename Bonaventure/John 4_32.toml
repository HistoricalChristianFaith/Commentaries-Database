[[commentary]]
quote='''
"But he said to them: I have food to eat which you do not know:" that food I prefer to this. The disciples did not know that food, because it was spiritual, since they themselves were carnal: 1 Corinthians 2: "The natural man does not perceive the things that are of the Spirit of God." Therefore it is clear that they did not know, because they understood carnally.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
