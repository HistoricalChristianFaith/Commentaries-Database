[[commentary]]
quote='''
I have glorified you. Here is noted the third point, namely the reason for being heard; and this was the merit of Christ, by which he merited to be glorified or made manifest; therefore he says: I have glorified you upon the earth, on account of this I merit to be glorified by you: I have finished the work which you gave me to do; therefore he finished it, because he was obedient even unto death; Luke 12: "I have a baptism to be baptized with; and how am I constrained until it be accomplished"? Concerning this consummation, Hebrews 2: "It was fitting for him, for whom are all things and through whom are all things, who had brought many sons into glory, to make perfect the author of their salvation through suffering." And because he had done everything, therefore he ought to be heard.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
