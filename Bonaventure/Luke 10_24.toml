[[commentary]]
quote='''
The third firmness of faith is that which proceeds from the witness of truth as expressed through the inspired word: and this occurred with all the prophets. And we have heard this Word, for it is the Spirit that bears witness that Christ is the truth. Some have actually seen Him in the flesh. Hence in Luke: "Blessed are the eyes that see what you see! For I say to you, many prophets and kings have desired to see what you see, and they have not seen it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
And on this account He adds: But I say to you, that many prophets and kings wished to see what you see, and did not see it. Those sublime in knowledge and power desired the presence of Christ, according to that passage of Haggai 2: "The desired of all nations will come." Whence on account of their vehement desire it is said in Isaiah 64: "O that You would rend the heavens and come down!" and Numbers 24: "A star shall rise out of Jacob, and a scepter shall spring up from Israel"; and after: "Alas! who shall live when the Lord does these things?" Nor is it a wonder, because in the penultimate chapter of Esther it is said to Ahasuerus in the person of Christ: "You are exceedingly wondrous, lord, and your face is full of graces." And therefore they desired to see the presence of Christ.

They also desired to hear the teaching, and therefore he adds: And to hear what you hear, and they did not hear, that is, my words: because, as it is said in Hosea 10, "it is time to seek the Lord, when he shall come who will teach you justice." For this was the very greatest benefit, to hear God speaking, not through a subject creature, but in his own person and in a united creature. Commemorating which benefit, the Apostle says in Hebrews 1: "In many ways and by many modes God, speaking of old to the Fathers through the Prophets, in these last days" etc. Blessed is he who hears this speech humbly and obediently, according to that passage below in chapter eleven: "Blessed are those who hear the word of God and keep it." Hence blessed are those who through faith saw and heard Christ on the way, according to that passage in Proverbs 8: "Blessed is the man who hears me and who watches at my gates daily and waits at the posts of my door." But most blessed are those who will see in the homeland, according to that passage in Revelation 19: "Blessed are those who are called to the marriage supper of the Lamb."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
