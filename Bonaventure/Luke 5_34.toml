[[commentary]]
quote='''
Second, it is introduced as befitting the kindness of the divine presence in the dissolution of the objections, when it is said: To whom he himself said: Can the children of the bridegroom fast, etc. According to Bede, however, this is the reading: Can you make the children of the bridegroom fast? This bridegroom is Christ, of whom John 3 says: "He who has the bride is the bridegroom"; and in the Psalm: "And he as a bridegroom coming forth from his chamber." The children of the bridegroom are the Apostles: whence Isaiah 8: "Behold, I and my children, whom the Lord has given me"; and in the Psalm: "Instead of your fathers, sons have been born to you; you shall make them princes," etc. These cannot nor ought to fast with the fast of sorrow and affliction, so long as the bridegroom is with them, because then is the time of joy; on account of which Song of Songs 3 says: "Daughters of Jerusalem, go forth and see King Solomon in his diadem"; and Isaiah 61: "Rejoicing I will rejoice in the Lord, and my soul will exult in my God, because the Lord has clothed me with the garment of salvation and surrounded me with the vestment of justice, as a bridegroom adorned with a crown and as a bride adorned with her jewels." Whence then was the time of joy, not of sorrow, because, as is said in John 3, "the friend of the bridegroom stands and rejoices with joy on account of the voice of the bridegroom."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
