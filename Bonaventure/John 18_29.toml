[[commentary]]
quote='''
"Pilate therefore went out to them and said." Here the falsity of the Jews is touched upon, because they impose a false charge upon Christ at the inquiry of Pilate: whence he says: "What accusation do you bring against this man?" As if he were saying: I do not wish to receive him without cause: Acts 25: "It is not the custom of the Romans to condemn any man before the one who is accused has his accusers present and receives opportunity to defend himself to clear away the charges."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
