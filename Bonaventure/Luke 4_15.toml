[[commentary]]
quote='''
As to the certainty of doctrine, it is added: And he taught in their synagogues, not in secret, as do men who have suspect doctrine; John chapter eighteen: "I have spoken openly to the world; I always taught in the synagogue and in the temple, where all the Jews come together, and in secret I have said nothing." On the contrary, the wisdom of heretics is called "earthly, sensual, devilish," which is designated by the evil woman: Proverbs chapter nine: "Stolen waters are sweeter, and hidden bread is more pleasant." Whence Christ fulfilled that passage of Proverbs chapter five: "Let your fountains be dispersed abroad, and divide your waters in the streets." And therefore it is said in Proverbs chapter one: "Wisdom cries aloud outside; in the streets she utters her voice," etc.

As for the greatness of efficacy, it is added: And he was magnified by all, because all perceived the greatness of his efficacy to such a degree that they could say that word of the Psalm: "Your mercy is magnified even unto the heavens, and your truth unto the clouds," namely in preaching. Nor is this surprising, because he himself was the one designated by that Solomon, of whom it is said in 3 Kings 10: "King Solomon was magnified above all the kings of the whole earth in riches and wisdom," etc. Below in chapter seven: "A great prophet has risen among us."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
