[[commentary]]
quote='''
And since it belongs to true humility to refuse the company of no one, nor even to be burdensome to another, therefore for the perfection of humility it is added: And whoever do not receive you, that is, despising your doctrine, like those who also did not receive the Lord: John 1: "He came unto his own, and his own received him not." - And because this is a great offense, which is not to be shared in, therefore he adds: Going out from that city, that is, turning away from their wickedness, according to that saying of Numbers 16: "Depart from the tents of wicked men and do not touch what is theirs, lest you be involved with them"; Isaiah 52: "Depart from their midst, do not touch what is unclean"; and Jeremiah 48: "Leave the cities and dwell in the rock."

And this, lest they be defiled by the filth of others; on account of which he adds: And shake off the dust from your feet as a testimony against them, that is, to show your innocence. This Barnabas and Paul did, of whom it is said in Acts 13 that "having shaken the dust from their feet, they came to Iconium." But to shake the dust from one's feet is to permit nothing of the vain glory of men to cling to one's affections. For vain glory is rightly designated by dust, which is lifted up by the wind, according to that saying of the Psalm: "He shall be like the dust which the wind casts from the face of the earth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
