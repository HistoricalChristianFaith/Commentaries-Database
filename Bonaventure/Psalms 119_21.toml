[[commentary]]
quote='''
Transgressors of the commandments merit eternal punishments. The Psalm: "Cursed are they who decline from Thy commandments": cursed, because it shall be said to them: "Depart, ye cursed, into everlasting fire."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25201.html'
source_title="Collationes de Decem Praeceptis, Collation 1"
