[[commentary]]
quote='''
Now his parents said these things because they feared the Jews; Isaiah fifty-one: "Who are you, that you should fear a mortal man and the son of man, who will wither like grass?" And First Maccabees two: "Do not fear the words of a sinful man, because his glory is dung and worms." And the reason for their fear is given: For the Jews had already conspired that if anyone confessed him to be the Christ, he would be put out of the synagogue. A conspiracy is a binding together for evil, just as in Jeremiah eleven, "a conspiracy was found among the men of Judah and among the inhabitants of Jerusalem." They returned to the iniquities of their fathers and conspired to destroy the name of Christ; Jeremiah eleven: "Let us destroy him from the land of the living, and let his name be remembered no more."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
