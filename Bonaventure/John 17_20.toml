[[commentary]]
quote='''
I do not ask for them only. This is the third part of the chapter, in which the Lord asks for those who will believe through the Apostles conformity of grace; and he proceeds in this order. First he sets forth the petition; second, the reason for being heard, at: And the glory which you have given. In the petition, therefore, he asks for those who will believe a twofold unity, namely of love and of faith. On account of the unity of love, which he asks for those who will believe through the Apostles, he says: I do not ask for them, namely for the Apostles, only, but also for those who will believe in me through their word.

Here it is asked: because if none are saved through Christ except those for whom he prayed, and he only prayed for the Apostles and for those who would believe through them, then those who believed through Christ, such as Nicodemus, lacked the benefit of prayer, and thus of salvation. I respond: It must be said that those who would believe through the Apostles are not only said to be those who were converted solely by their preaching, but also those who followed in their footsteps. Or it can be said that the Lord was praying for those who had already believed in general, not only for the Apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
