[[commentary]]
quote='''
When he had said these things, he was troubled. After the example has been set forth, and the disciples have been led to imitate; here begins the third part of the chapter, in which the Lord reveals the perversity of Judas so as to deter from going astray; and he does this in this order. First there is a general intimation of the betrayer: second, the hesitant inquiry of the disciples: third, the Lord's secret response: fourth, the hastening of the betrayer. First, therefore, there is a general intimation of the betrayer, and although general, not however in doubt, but in certainty. And Christ's being troubled makes this manifest; on account of which he says: When Jesus had said these things, which pertained to the instruction of the disciples; he was troubled in spirit, that is, in will; and he bore witness and said, because he asserted most certainly: Amen, amen, I say to you, that one of you will betray me: that one, namely, was going to betray him, of whom above in the sixth chapter: "One of you is a devil."

Question. It is asked concerning the Lord's perturbation, because he says: He was troubled in spirit. If in Christ all things were at peace, because he is signified by the ark of Noah, in which all things were at peace, how was he troubled in spirit? And it must be said that that perturbation caused no disorder in Christ, since sensuality was subject to his will and was voluntarily troubled; in testimony of which he says: He was troubled in spirit.

Question. But then it is asked: about what is sensuality troubled? If about future death, then this amounts to nothing, because that had not fallen under sense, since it was future; therefore neither did it fall under sensuality; therefore sensuality did not grieve about this. It must be said that the imagination of death was in the interior sensible power, not proceeding from sense, but descending from the cognition of reason. For when we foreknow certain things, we can imagine them, and through what we hold as certain, be troubled. And if you object that this is a reversed order, some say that nothing hindered this in Christ, in whom the lower powers were subject to the higher. But nevertheless it is not necessary to say this, because then there would be a reversed order if the intelligible species were to descend into the sense and become sensible. But when the species are in the imagination, and reason thinks something and causes the sensitive power to imagine and be terrified by that same thing, there is no reversal of order.

Question. But then it is asked: since Christ knew of His death from the beginning, just as He did then, why was He not always troubled, as He was then? To this it must be said that the knowledge of death was not the whole cause, but the knowledge of imminent death: whence nature shrinks more from an imminent danger than from a distant one. Nor yet was that the whole cause, but the knowledge of imminent death together with the will to trouble Himself: and this He willed at that time, in order to show that He was a true man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
