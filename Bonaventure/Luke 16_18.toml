[[commentary]]
quote='''
Third, regarding the duration of the Law according to the law of nature and the conjugal bond, he adds: Everyone who dismisses his wife and marries another commits adultery: first, because he cannot dismiss the first except for the sole cause of fornication, according to Matthew nineteen: "Whoever dismisses his wife except for fornication and marries another commits adultery." Second, because for whatever cause he dismisses her, it is not lawful for him, while she lives, to marry another, and this according to the law of nature divinely instituted in the formation of man; Genesis two: "A man shall leave his father and mother," etc. And this is what dictates that "matrimony is the union of a man and a woman, retaining an indivisible manner of life"; which also dictates that it is an indissoluble bond. - And therefore he adds: And he who marries a woman dismissed by her husband commits adultery. And the reason for this is that the wife belongs to him whose she first was, however much she may seem to be separated; whence the Apostle, Romans seven: "The woman who is under a husband, while the husband lives, is bound to the law. Therefore, while the husband lives, she shall be called an adulteress if she has been with another man." And therefore Jeremiah three: "If a man dismisses his wife, and she, departing from him, marries another man, shall he return to her again? Shall not that woman be polluted and contaminated?" - It should be noted, however, that although no mention had been made of wives, the Lord nevertheless, wishing to show the permanence of the Law with regard to morals and its passing with regard to ceremonials and judicials, gives the example of matrimony, because in it the bill of divorce was given. And the law of matrimony is confirmed in the Gospel as moral law, and the bill of divorce is rejected; whence Matthew nineteen: "Moses commanded to give a bill of divorce and to dismiss. He said to them: Because Moses, on account of the hardness of your hearts, permitted you to dismiss your wives."

From these things, therefore, it is gathered how the Law remains, how it is abolished, how it is fulfilled, and nevertheless the arrogance of the Pharisees glorying in the letter of the Law is refuted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke, Chapter 16'
