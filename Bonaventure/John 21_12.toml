[[commentary]]
quote='''
Jesus says to them: Come, dine: he invites to dinner, but in the future resurrection he will invite to the supper, according to that passage in Revelation nineteen: "Blessed are they who are called to the marriage supper of the Lamb." He now invites to bodily food, to intimate that he invites to spiritual food; Song of Songs five: "Eat, O friends, and drink; and be inebriated, dearly beloved": and Isaiah fifty-five: "All you who thirst, come to the waters, and you who have no money, make haste, buy and eat; come, buy without money and without any exchange, wine and milk."

And none of those reclining at table. Here the third point is noted, namely the illumination of the disciples in knowing the Lord; whence he says: And none of those reclining at table, that is, of those sitting down to eat, dared to ask him: Who are you? Whence Chrysostom: "They sat with silence and great reverence, gazing upon him." Knowing that it is the Lord, that is, for this reason they did not ask him: Who are you? Hebrews, the penultimate chapter: "Let us serve, pleasing God with fear and reverence"; Philippians two: "Work out your salvation with fear and trembling."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
