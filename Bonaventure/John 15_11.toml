[[commentary]]
quote='''
These things I have spoken to you. Here the fourth is touched upon, namely the effect of abiding: and the effect is joy in the present and joy in the future. On account of joy in the present he says: That my joy may be in you, that is, pure joy, by which a person rejoices in the Lord, not in the world; concerning which Philippians, the last chapter, says: "Rejoice in the Lord always; again I say: rejoice."

On account of joy in the future, he says: And that your joy may be fulfilled, concerning which below in chapter sixteen: "Ask, and you shall receive, that your joy may be full." Our joy is fulfilled by the joy of the Lord, concerning which in Matthew twenty-five: "Enter into the joy of your Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
