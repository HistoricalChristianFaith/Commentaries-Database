[[commentary]]
quote='''
And after the morsel. Here the fourth point is touched upon, namely the hastening of the betrayer, which came about through the vehement assault of the devil, which he had upon Judas after his correction. On account of which he says: And after the morsel Satan entered into him, so that he might possess him more effectively and bring the conceived wickedness to completion more quickly; whence in the Psalm: "Set a sinner over him, and let the devil stand at his right hand." And, because this did not escape the Lord's notice, Jesus said to him: What you do, do quickly, he says this predictively, not imperatively. Lest however he should seem to have exposed his wickedness, the Evangelist shows that this word escaped everyone's notice.

Question. Inquiry is made concerning what he says, that after the morsel Satan entered into him. It seems that the Lord did not act well in giving the morsel to Judas, through which he was made worse. Likewise, for what reason after the morsel? And it seems to say something false, because, as Augustine says, God alone enters the soul, therefore not Satan. Likewise, he had said earlier that the devil put it into the heart of Judas; how then after the morsel? I respond: On these matters there are diverse opinions. Some wished to say that the dipped bread was the body of Christ: and the Master in the Histories says this, and therefore dipped bread is not given to us communicants. And Augustine seems to say this in the original: "Why do you marvel," he says, "if the bread of Christ was given to Judas, through which he was handed over to the devil, when you see that an angel of the devil was given to the Apostle, through which he might advance in Christ?" And therefore they say that Satan entered then, because receiving the body of Christ unworthily, he ate and drank judgment upon himself. Others say differently, and I believe more rightly, and the Gloss says this, that the dipped bread was not the body of Christ: rather, as Augustine says in On the Harmony of the Evangelists, the body of Christ had already been distributed to the disciples, and Judas had received it with the others: but it was another bread, and after that one Satan entered; because he was prompted to repent in so many ways and did not repent, therefore the devil possessed him more fully. To the objection that God alone enters the soul: this is true by indwelling, but the devil enters by suggestion. To the objection that he had suggested earlier: it must be said that this is true, but from that point he pressed upon him more greatly and drove him more fiercely to the completion of his wickedness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
