[[commentary]]
quote='''
And because it is unjust for such a one to be condemned, therefore he adds: I will therefore chastise him and release him, pronouncing an equitable sentence; for this sentence was to be delivered according to justice, since an innocent man was being accused. But Pilate did not dare to do this, but sought the assent of the adverse party, showing that he could not justly be condemned. Yet lest they could complain about the judge's release, he offers punishment of the accused in that he says he wishes to release him chastised, that is, scourged. Whence the Gloss: "I will afflict him with scourges and mockeries, as much as you command, provided you do not thirst for innocent blood"; from which the repugnance between the condemnation and the justice of the law is apparent.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
