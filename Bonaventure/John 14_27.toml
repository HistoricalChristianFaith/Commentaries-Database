[[commentary]]
quote='''
Peace I leave to you. Second, he consoles through the giving or donation of peace, in which there is great consolation: on account of which he says: Peace I leave to you, my peace I give to you: he repeats peace, to indicate the peace of grace and the peace of glory; whence Augustine: "He leaves us his peace, in which remaining we conquer enemies: he gives us his peace, when we shall reign without an enemy"; Isaiah twenty-seven: "The Lord will make peace for me, he will make peace for me." This he gives to those who observe the commandments; Isaiah forty-eight: "Would that you had heeded my commandments: your peace would have been like a river." He explains what he says my; because my was said distinctively, namely not of the world; and therefore he adds: Not as the world gives, do I give to you: Because the world gives carnally, I give spiritually; the world gives temporally, but I eternally; the world outwardly, but I inwardly. Therefore it is written at Philippians last chapter: "The peace of God, which surpasses all understanding, guard your hearts and your minds in Christ Jesus." The peace of the world guards bodies and possessions; of which Matthew ten: "I did not come to send peace, but the sword."

Let not your heart be troubled. Here now third he consoles through the promise of visitation, which he had also promised above: on account of which he says: Let not your heart be troubled nor let it fear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
