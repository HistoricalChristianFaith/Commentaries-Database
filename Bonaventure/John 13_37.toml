[[commentary]]
quote='''
Peter answered him: Why cannot I follow? I will lay down my life for thee: and this is to follow perfectly: below, in the fifteenth chapter: "Greater love hath no man than this, that a man lay down his life for his friends." If therefore I can do this, well can I follow. And because Peter does not desist from presumption through the admonition of his own frailty, he is now repressed through the prediction of his future transgression.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
