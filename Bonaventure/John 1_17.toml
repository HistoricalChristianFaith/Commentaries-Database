[[commentary]]
quote='''
It is true what is written in John: "The Law was given through Moses, but grace and truth came through Christ." For salvation two things are necessary, namely the knowledge of truth and the exercise of virtue. The knowledge of truth is had through the Law, but the exercise of virtue is had through grace. The Law relates to grace as the apprehensive power relates to the motive power, and as an instrument relates to operative power. Suppose that a bird had sight for seeing heaven but did not have power in its wings; it could not fly nor reach there. So, however much the Jew glories in the Law, since he is without grace, it is nothing. A craftsman, when he has an instrument by which he works, unless he has operative power in his hands, can do nothing good. O faithless Jew, you have the Law in hand, but unless you have operative power, you think in vain that you possess the Law. Therefore through the Law no one is saved unless grace is present. And thus it is clear that the grace of God is far more excellent than the Law itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25201.html'
source_title='Collationes de Septem Donis, Collation 1'

[[commentary]]
quote='''
"Because the Law was given through Moses," which only promised grace and truth and did not give them: because, Hebrews 7, "The Law brought no one to perfection." But what the Law promised, Christ furnished: therefore he says: "Grace and truth came through Jesus Christ," that is, were bestowed. Therefore the Apostle cries out at Romans 7: "Unhappy man that I am! Who shall deliver me from the body of this death? The grace of God through Jesus Christ," not the Mosaic law. And that this effect is singularly Christ's, he shows, because the Law only promised but Christ furnished.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
