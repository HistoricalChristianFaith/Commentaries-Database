[[commentary]]
quote='''
For which reason he adds: But troubled and frightened, they supposed that they were seeing a spirit. They were frightened because they had seen him dead on the cross, and because they feared lest "Satan should transform himself into an angel of light," and because he had come with the doors shut: whence John 20: "When therefore it was late on that day, the first of the week, and the doors were shut, Jesus came and stood in the midst and said to them: Peace be to you."

But in this there seems to be a contradiction between Luke and John, because in John 20 it is said: "The disciples were glad, having seen the Lord." But there is no contradiction, because first they were frightened, but afterward, when his hands and side had been shown, they were glad. — There also seems to be a contradiction because John says that "Thomas was not with them when Jesus came"; but Luke says that "they found the eleven gathered together." — But to this Augustine responds that Thomas was with the disciples when those two returned, but afterward went out before the Lord appeared while they were speaking.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
