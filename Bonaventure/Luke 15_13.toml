[[commentary]]
quote='''
Second, as regards the perpetration of voluntary fault, he adds: And not many days after, having gathered all together, through the dominion of free will, which has authority over all the natural powers: the younger son went abroad into a far country, and this by perpetrating sin. For a region is called far from God, not as regards local position, since God is everywhere, but through dissimilarity of will. Whence the Gloss: "He went into a far country, not by changing place, but disposition. For the more one transgresses in wicked work, the further one recedes from the grace of God"; whence Proverbs fifteen: "The Lord is far from the wicked, and he will hear the prayers of the just." Now sin is a far country from God because, since it is iniquity, it distances from the highest goodness, according to that passage of Isaiah fifty-nine: "Your iniquities have divided between you and your God, and your sins have hidden his face from you." Since it is darkness, it distances from the highest light and truth: First John one: "God is light, and in him there is no darkness at all. If we say that we have fellowship with him and walk in darkness, we lie and do not practice the truth"; and a little after he adds, concerning which darkness he means: "He who hates his brother is in darkness," etc. Since also sin is nothing, it distances from the highest being: on account of which Jeremiah two: "What iniquity have your fathers found in me, that they went far from me and walked after vanity?" Concerning these three together, Second Corinthians six: "What participation has justice with iniquity? Or what fellowship has light with darkness? And what concord has Christ with Belial?" "And what agreement has the temple of God with idols?" And therefore the sinner deservedly, who distances himself from God through sin and goes into a far country far from the heavenly region, is cast into hell, which is the region of death and darkness, according to that passage of Job ten: "Before I go to the dark land covered with the mist of death, the land of misery and darkness, where the shadow of death and no order," etc.

Third, as regards the dissipation of the good of grace and nature, he adds: He wasted his substance. He wasted it, I say, through spiritual sins, which especially waste the soul, and this indeed through pride: Nahum two: "As the Lord has restored the pride of Jacob, so the pride of Israel, for the despoilers have despoiled them and have corrupted their branches."

Likewise, through vainglory: Isaiah three: "O my people, those who call you blessed, they themselves deceive you and scatter the way of your steps." Likewise, through envy, according to that word of the Psalm: "Our bones are scattered beside hell," supply: through envy, of which it is said in Proverbs fourteen: "Envy is the rottenness of the bones."

Likewise, through wrath: the Psalm: "They were scattered and felt no remorse; they gnashed upon me with their teeth." Whence the wrathful person is like one possessed by a demon, of whom above in chapter nine: "He suddenly cries out and dashes him down and scatters him with foaming."

Likewise, he squandered through sloth, according to that word of Proverbs eighteen: "He who is soft and lax in his work is the brother of him who squanders his own works." — And because spiritual sins frequently plunge one into carnal sins, therefore he adds: Living dissolutely, with respect to gluttony and lust, according to that word of Proverbs twenty: "Wine is a luxurious thing, and drunkenness is riotous: whoever delights in these will not be wise." Whence in these is the consummation of squandering, according to that word of Job thirty-one: "It is a fire devouring unto destruction and uprooting all increase." Whence by these sins not only are the powers of the soul squandered, but also the members of the body and temporal riches, and through this the whole substance of a person is squandered, namely of possessions, members, and morals. On account of which, Proverbs twenty-nine: "A man who loves wisdom gladdens his father; but he who nourishes harlots will lose his substance," because in such things is fulfilled that word of the Psalm: "Man, when he was in honor, did not understand," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
