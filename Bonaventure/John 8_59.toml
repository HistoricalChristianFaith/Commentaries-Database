[[commentary]]
quote='''
"They therefore took up stones to cast at him." Here, fourthly, as the Jews persecuted him, the Lord showed his humility: for they wished to stone him; therefore he says: "The Jews therefore took up stones to cast at him." Gregory: "Unable to bear these words of eternity, the minds of the unbelieving ran to stones; and him whom they could not understand, they sought to crush." Therefore they wished to kill him, because he seemed to have blasphemed; whence Leviticus twenty-four: "He who blasphemes the name of the Lord shall surely die; the whole multitude shall stone him with stones." The Lord therefore humbly fled this unjust persecution, though he could have overcome it by power; whence he says: "But Jesus hid himself and went out of the temple," according to that of Romans twelve: "Not defending yourselves, but give place to wrath"; and First Peter two: "When he was reviled, he did not revile in return."

Likewise, there is a question about the fact that the Lord hid himself. It seems that he feared and was imperfect, because it belongs to the imperfect to fear and to flee.

I respond: He hid himself as a sign that "truth, when it does not find a humble mind, flees," as Gregory says. As an example, "so that, even when we can resist, we may avoid the wrath of the proud," as Gregory also says. To preserve the opportune time, he hid himself who later offered himself to persecutions, in order to show that he was a true man: whence Augustine says: "As a man he fled from stones, but woe to those from whose stony hearts God flees."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
