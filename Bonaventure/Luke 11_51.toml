[[commentary]]
quote='''
And for this reason he exemplifies according to written testimonies, when he adds: From the blood of Abel to the blood of Zechariah. Abel was indeed the first just man killed by his brother, as is said in Genesis four. Zechariah however was the son of Jehoiada, who was killed by King Joash, who had received many good things from his father, as the history narrates in Second Chronicles twenty-four. Nevertheless, he was not the last to be killed, but rather he is joined with the first because "Abel was a shepherd of sheep and was slain in the field, while Zechariah was a priest and was slain in the court of the temple; and they designate two orders of Martyrs, namely the laity, and those who are devoted to the ministry of the altar." Therefore he designates the entire place of his death, when he adds: Who perished between the altar and the temple, that is, he was slain between the temple and the altar of holocaust. "For there were two altars in the temple: one interior, namely the altar of incense, and another exterior, namely the altar of holocaust"; according to what is read in Exodus thirty-five. And between this altar and the temple, Zechariah was slain by the Jews, according to what is written in Second Chronicles twenty-four: "They gathered together against him and cast stones at him by the king's command in the court of the house of God." "Who, as he was dying, said: May the Lord see and require it." He said this, attending to the equity of divine justice, which leaves nothing unavenged.

To mark its infallibility, he repeats the future vengeance, when he adds: Yes, I say to you, it shall be required of this generation; so that by the pronoun a demonstration is made of the wicked generation. For the Gloss of Bede says: "All the wicked are one generation, one city, one body of the devil, just as all the good are one body, one generation of God." Whence concerning this wicked generation, that passage of Proverbs thirty can be understood: "A generation that has swords for teeth and devours with its molars, to destroy the needy from the earth and the poor from among men." This is the generation from which vengeance shall be required; but within this, especially from the Jewish people, because perfidy was consummated in them. Whence Chrysostom says: "Just as God promised to the good through many generations that Christ would come, but bestowed him upon the last Saints, so through each generation he threatened the wicked, but he will repay the last generation. For never was such grace given to men as in Christ, nor did such destruction come upon the impious as upon the Jews." Whence they can most fittingly say that passage of Genesis forty-two: "We rightly suffer these things, because we sinned against our brother. Behold, his blood is required."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
