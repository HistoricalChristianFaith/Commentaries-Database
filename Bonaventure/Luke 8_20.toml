[[commentary]]
quote='''
On account of which it is added: And it was told him: Your mother and your brothers, to whom you owe much affection by reason of kinship, stand outside, wishing to see you, through the affection of charity. And thus he is effectively sought, that he might pass over or go out to his relatives, both on account of nature to be acknowledged and on account of charity to be repaid. Whence on this the Gloss says, on Matthew twelve, that "this was reported to Christ evasively, so that it might be known whether he would abandon his teaching." For they knew that what is said in Ephesians five is true: "No one ever hated his own flesh"; and thus they wished to test what he would more accept, whether the affection of parents or the instruction of disciples.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
