[[commentary]]
quote='''
With this price, then, Judas sold Christ, and therefore it adds: And he promised. And he sought opportunity to betray him without crowds. These men shunned the crowd because they regarded him as a true Prophet: whence John seven: "Has any of the rulers believed in him? But this crowd, which does not know the Law, they are accursed." Judas fled what was public and sought what was secret, because, John three, "he who does evil hates the light." — And it should be noted that Christ was delivered by the Father through most abundant piety: Romans eight: "He who did not spare his own Son, but delivered him up for us all," etc.; by himself, through most ardent charity: Ephesians five: "He loved us and delivered himself up for us"; by the traitor, through most wicked greed, below in the same chapter: "Behold, the hand of him who betrays me," etc.; and Matthew twenty-six: "What will you give me," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
