[[commentary]]
quote='''
Jesus said to her: Did I not say to you that if you believe, you shall see the glory of God? that is, the greatness of the divine power: Acts 7: "When Stephen, being full of the Holy Spirit, gazing into heaven, saw the glory of God." And in this they knew that he had not caused it to be opened in order to see the dead man, but in order to raise him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
