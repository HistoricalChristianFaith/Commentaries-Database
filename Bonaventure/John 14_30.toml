[[commentary]]
quote='''
The second hierarchizing of the mind is related to the interior powers: and this is more difficult than the first. First it consists in chastizing the roots of the passions, so that the opposing powers are cut off and neutralized. "The prince of the world is coming, and in Me he has nothing." For as long as those passions dominate a man, the devil has something of his own in this man. But for this to be achieved, there is need to uproot the threefold concupiscence: of originating, of enjoying, and of possessing, for this threefold concupiscence introduces the devil into the soul.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252022.html'
source_title='Collations on the Hexaemeron, Collation 22'

[[commentary]]
quote='''
I will not now speak many things. Here the second point is touched upon, namely the reason for hastening, and this is the assault of the devil and the divine will: on account of the assault of the devil, who was arming his minions to seize Christ, therefore he says: I will not now speak many things with you; for the prince of this world comes, that is, the devil hastens. The devil was coming in his minions, but nevertheless this does not constrain, because in me he has nothing: he had nothing that he might exact nor that he might find fault with, because he had no sin, and he holds dominion over sinners; hence Job forty-one: "He is king over all the children of pride." Hence he is the prince of darkness; Ephesians six: "Against the rulers of the world of this darkness"; and in Christ there was no darkness, because he "was the true light, which enlightens every man coming into this world."

It is asked concerning what he says, that the devil had no jurisdiction whatsoever over Christ. Therefore it seems that the Lord acted unjustly in that he permitted him to be oppressed by the devil. Likewise he says that he does this on account of the commandment of the Father: therefore if he was bound to obey, then he died from obligation, not from pure liberality. I respond: It must be said that to punish someone unwilling for his own fault, this is a matter of wrath and severity; to punish someone willing for his own fault, this is a matter of justice and truth: to punish someone willing for another's fault, this is a matter of wondrous dispensation and condescension. Because therefore Christ was punished and willingly punished for our salvation: it pleased God to lay upon him the iniquities of us all, and for our transgressions he himself was punished. He was offered, because he himself willed it; and therefore no injustice was done on God's part, but on the part of the devil. And therefore, because he unjustly usurped dominion over Christ, by this very fact he justly lost the dominion that he had over the members of Christ. To the objection that he was bound to die: it must be said that there is a debt of merit and a debt of precept. The sinner is bound to die because he merited it; but Christ, because the Father commanded him. But this debt is not repugnant to liberality when it is done out of love; and so Christ acted, and therefore he says: That the world may know that I love the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'

[[commentary]]
quote='''
Likewise, John 14: The prince of this world comes, and in me he has nothing; the Gloss says: "The Lord did not wish to have anything He might lose; He came poor, lest the devil have anything to take away"; therefore if all temporal things can be lost, He had nothing temporal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
