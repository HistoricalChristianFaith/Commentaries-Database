[[commentary]]
quote='''
Through these three, God the Trinity is pious, true, and holy, offering a pious law of nature, a true law of Scripture, and a holy law of grace. And through these three, He governs the world, and according to these three, He imprints laws in the rational mind. For all moral law is dependent upon these three. But in the law of nature, they are less distinct and explicit, in the law of Scripture, they are more explicit but less perfect, while in the law of grace they are more explicit and perfect. Hence, the Lord says: I have not come to destroy but to fulfill the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252021.html'
source_title='Collations on the Hexaemeron, Collation 21'
