[[commentary]]
quote='''
Not only he, but you also, confirmed by him: whence: And you shall bear witness, because you are with me from the beginning: Acts 1: "Therefore, of these men who have been gathered together with us from the time when the Lord Jesus went in and out among us, one of them must be made a witness of his resurrection with us." The Apostles did not give this testimony before the coming of the Holy Spirit, but after. Whence Peter, who denied Christ at the voice of a maidservant, after the sending of the Holy Spirit responded with great authority to the chief priest, Acts 5: "We ought to obey God rather than men."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
