[[commentary]]
quote='''
And if God is glorified in him, in the passion through the great manifestation of power — because his death and passion were greatly to the glory of God, as is said of Peter below in the last chapter: "Signifying by what death he would glorify God." And God will glorify him in himself, through the glory of the resurrection; and immediately he will glorify him, because his resurrection could not be delayed; whence in the Psalm: "You will not give your Holy One to see corruption." And he means to say that Christ was soon to be glorified by the Father through the resurrection, because to manifest the Father's glory he himself had to endure the passion. Whence the weakness of Christ as man glorified God; and therefore the power of God raised Christ from the dead and glorified him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
