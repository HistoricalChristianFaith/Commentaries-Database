[[commentary]]
quote='''
One of his disciples therefore said, Judas. The third point is touched upon here, namely the indignation of Judas against the woman, because she had poured out the ointment; on account of which he says: One of his disciples therefore said, Judas Iscariot, who was about to betray him, namely on account of avarice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
