[[commentary]]
quote='''
Third, as regards the foresight of future events, He adds: For I say to you that this which is written must yet be fulfilled in Me: And He was reckoned among the wicked: Isaiah fifty-three: "He delivered His soul unto death, and was reckoned among the wicked." Fittingly the Lord foretells this to them, so that from the contemplation of His Passion they might be armed and encouraged, according to 1 Peter four: "Since Christ has suffered in the flesh, arm yourselves also with the same thought." This is the armor to be taken up, according to Ephesians six: "Take up the armor of God, that you may be able to resist in the evil day."

And since nothing encourages a man more in tribulation than the consideration of the end, He therefore adds: For indeed the things that are written about Me have their end, namely through the impending Passion. For above, in the eighteenth chapter: "All things that are written about Me, the Son of Man, shall be accomplished." In this final tribulation indeed there ought to be no lack of spiritual armor, which shall never be wanting to the Church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
