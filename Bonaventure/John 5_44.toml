[[commentary]]
quote='''
Here thirdly he reproves them for their appetite for vain honor, by reason of which they were unfit to believe in the truth, because they were seeking vanity. "How can you believe," namely in the truth, "you who receive glory from one another," clinging to vanity? For human glory is vanity; Isaiah chapter forty: "All flesh is grass, and all its glory is as the flower of grass": and from the appetite for vanity a man is rendered unfit for faith in the truth: whence in the Psalm: "O sons of men, how long will you be heavy of heart? Why do you love vanity and seek after falsehood?" Thus you seek false glory, "and the glory which is from God alone, you do not seek," that is, true glory. This is from God alone: the Psalm: "The Lord will give grace and glory." Therefore it is said in Second Corinthians chapter ten: "Let him who glories, glory in the Lord: for not he who commends himself is approved, but he whom God commends."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
