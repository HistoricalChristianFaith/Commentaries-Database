[[commentary]]
quote='''
If you know these things, etc. Here secondly he exhorts to imitation by consideration of the greatness of the reward: because whoever does this shall be blessed. On account of which he says: If you know these things, you shall be blessed if you do them, not if you merely know them, but indeed also if you do them: James one: "He who is a doer of the work, this one shall be blessed in his deed"; Matthew five: "Whoever shall break one of these least commandments and shall teach men so, shall be called the least in the kingdom of heaven." And after: "But whoever shall do and teach, this one shall be called great in the kingdom of heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
