[[commentary]]
quote='''
Matthew 10: Do not possess gold, nor silver, nor money in your belts, nor a wallet for the journey, nor two tunics, nor sandals: Gloss: "Let them carry with them neither necessities themselves nor a storehouse: nothing beyond the clothing with which one can be content." But in this the form of perfection is handed down to the Apostles themselves, and what belongs to perfection is perfect to imitate: therefore to go through the world in such a manner pertains to evangelical perfection. But this is to beg and to live on alms: therefore this pertains to evangelical perfection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
