[[commentary]]
quote='''
Lastly it is shown to be virtuous, when it is added: But he himself withdrew into the desert and prayed: because he was not seeking human glory and fame, but was fleeing it, according to that passage in Matthew fourteen: "And having dismissed the crowd, he went up onto the mountain alone to pray." In this he was giving us a model of withdrawing from the world and drawing near to God: on account of which the Apostle said in Galatians one: "If I were still pleasing men, I would not be a servant of Christ." And therefore, for prayer to be pleasing to God, it ought not to be public in the marketplace, but hidden in the desert; whence Matthew six: "But you, when you pray, enter your chamber." And this is what Bernard says in the Canticles: "O holy soul, be alone, so that you may keep yourself for him alone out of all, whom you have chosen for yourself out of all. Flee the public, flee even your own household, withdraw from friends and intimates and from him who ministers to you. Do you not know that you have a modest bridegroom, one who will by no means grant you his presence while others are present? Withdraw therefore, but in mind, not in body: but in intention, but in devotion, but in spirit: although also in body you do not unprofitably separate yourself at times, especially in the time of prayer."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
