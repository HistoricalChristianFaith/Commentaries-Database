[[commentary]]
quote='''
"Are you greater than our father Jacob?" Similar below in the eighth chapter: "Are you greater than our father Abraham?" "Who gave us the well:" therefore he gave it, because he found it. Concerning this well, Genesis 29: "Jacob set out and came to the eastern land and saw there a well, whose mouth was closed with a great stone." Nor did he only give to others, but he also had it for his own use, as though not having anything better. Therefore it says: "And he himself drank from it, and his sons, and his cattle." It is found in Genesis 29 that Jacob there watered the cattle. The woman, therefore, understanding carnally and not knowing the Lord's power, was not attracted. Therefore Christ explains the gift.

It is asked about what the woman says: "Are you greater than our father Jacob?" From this it seems to imply that Jacob was the father of the Samaritans: and this is false, because they had been sent by the king of the Assyrians. It must be said that "father" is sometimes said on account of antiquity of time, just as we call old men fathers: sometimes on account of authority, thus we call prelates and authoritative men fathers; sometimes on account of benefaction or upbringing, thus we call those fathers from whom we receive benefits: sometimes on account of generation, thus those who begot. The woman calls Jacob father for the three reasons mentioned above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
