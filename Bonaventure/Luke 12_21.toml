[[commentary]]
quote='''
And because this sentiment is common to all the avaricious, he therefore adds: So is everyone, who stores up treasure for himself and is not rich toward God. He stores up treasure for himself who multiplies treasures for himself on earth; Psalm: "He stores up treasure and knows not for whom he shall gather it"; but is rich toward God who abounds in merits and works of piety: First Corinthians 1: "In all things you have been made rich in him, so that you lack nothing in any grace." Therefore it is said in Matthew 6: "Do not store up for yourselves treasures on earth, where rust and moth destroy." "But store up for yourselves treasures in heaven, where neither rust nor moth destroys, and where thieves do not dig through nor steal."

Moreover, hope, which we have in him, makes us rich toward God, according to that passage in First Peter 1: "He has regenerated us unto a living hope, unto an incorruptible inheritance, preserved in heaven." But this hope is rooted in poverty: hence Second Corinthians 6: "As needy, yet enriching many; as having nothing, yet possessing all things." Such was Paul: hence Philippians last chapter: "I have all things and abound." Christ made us such: hence Second Corinthians 8: "He became poor for your sake, so that by his poverty you might be rich." Therefore to such he says: "Blessed are the poor in spirit, for theirs is the kingdom of heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
