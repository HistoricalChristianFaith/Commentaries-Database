[[commentary]]
quote='''
For this reason there follows: And they made signs to his father, what he would have him called: they made signs, I say, to one deaf and mute, because, as Ambrose says, "incredulity had stolen from him both speech and hearing"; and yet they sought from him, because the authority of naming resided with him, both because he was the father, and because he was a priest, and because he had foreknown the birth of his son by divine revelation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
