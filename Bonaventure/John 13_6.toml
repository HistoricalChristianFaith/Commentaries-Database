[[commentary]]
quote='''
He came therefore to Simon Peter, etc. Here the third point is touched upon, namely the reverence of Peter, by which he refused the Lord's service; on account of which he says: He came to Simon Peter, namely to wash his feet. And Peter says to him: Lord, do you wash my feet? As if trembling with awe, Peter says: You, for me? You the Lord, for me a servant? You the Master, for me a disciple? You the Almighty, for me a wretch? Chrysostom: "With the hands with which you opened eyes, cleansed lepers, raised the dead, you wash my feet?" As if to say: I dare not allow it; and because he was going too far in his reverence, the Lord admonishes him to desist on account of the mystery.

Question. Likewise the inquiry concerns this, that Peter alone resisted the Lord when he willed to wash their feet: how is it that all said nothing? And if all were silent, how was he willing to be singular? If you say that the Lord came to him first, and he resisted first, and afterward the others were corrected: the text is contrary to this, because it says: He began to wash and to wipe: and afterward: He came therefore to Simon Peter. Chrysostom responds that he believes that he first washed the feet of Judas, because Judas, as one who would presume the first place, had taken the foremost position, and afterward he came to Peter, and Peter resisted. But it is better to say, according to the Gloss, that he came first to Peter, and that statement was made by way of anticipation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
