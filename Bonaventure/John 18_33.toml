[[commentary]]
quote='''
"Then Pilate entered again," etc. Having set forth the handing over of Christ, by which the Jews delivered him to Pilate, there is set forth here his examination conducted by Pilate, in which four things are indicated: first, the inquiry; then, the origin of the inquiry; third, the response to the inquiry; fourth, the discussion of the response. First, therefore, the inquiry itself is noted; on account of which he says: "Then Pilate entered again into the praetorium," because he had gone out to seek the charge from the Jews and had not found it, he returned to inquire of it from the accused: "and he called Jesus and said to him: Are you the King of the Jews?" Truly he is king, because he is the one of whom Jeremiah twenty-three says: "I will raise up for David a righteous branch, and a king shall reign." Therefore he inquires especially about this, because by saying this he seemed to contradict Caesar, who then held dominion over the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
