[[commentary]]
quote='''
You have not chosen me. Here he thirdly exhorts to love in view of eternal recompense, to which they had been called through eternal predestination, not having come of themselves. Therefore he says: You have not chosen me, but I have chosen you: Ephesians 1: "He chose us before the foundation of the world, that we should be holy and immaculate in his sight in charity: who predestined us unto the adoption of sons through Jesus Christ unto himself, according to the purpose of his will." To what end he chose them, he adds: And I have appointed you, that you should go and bring forth fruit, in the conversion of others: which is accomplished through the preaching of the word of God, which is like a seed that brings forth fruit when it is received into good ground; whence Luke 8: "But that on the good ground, these are they who in a good and perfect heart hear the word and bring forth fruit in patience"; 1 Peter 1: "Being born again not of corruptible seed, but of incorruptible, through the word of the living God and remaining forever." And your fruit should remain, for your salvation and consolation through divine recompense: and the recompense is subjoined: That whatsoever you shall ask the Father in my name, that is, what pertains to your salvation, he may give it you. Now that which is to be sought is our salvation: whence Matthew 6: "Seek first the kingdom of God and his justice, and all these things shall be added unto you." So that holy soul was asking in the Psalm: "One thing I have asked of the Lord, this will I seek after, that I may dwell in the house of the Lord all the days of my life."

Question VI. Likewise, an inquiry is made concerning what he says: You have not chosen me.

On the contrary: 1. Deuteronomy twenty-six: You have chosen the Lord, that he might be your God.

2. Likewise, if the merit of free will consists in choice, how did they merit, if they had not chosen him?

I respond: This is to be understood as follows: first, because we do not first choose the Lord, but secondly: because he first chose by predestining and afterwards chose from among others by calling, but we afterwards choose by consenting to the calling.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
