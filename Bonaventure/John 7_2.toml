[[commentary]]
quote='''
Here the vanity of his kinsmen in persuading him toward earthly and vain honor is noted; and they take their reason for persuading from the opportunity of the time, the edification of the neighbor, and the exaltation of his name. The opportune time was at hand; whence he says: "Now the feast day of the Jews, the Feast of Tabernacles, was near." This was the feast of tabernacles, which was to be celebrated in September, according to that passage in Leviticus twenty-three: "In the seventh month you shall celebrate feasts and dwell in tabernacles," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
