[[commentary]]
quote='''
"And in your Law it is written that the testimony of two men is true," that is, acceptable; Deuteronomy nineteen: "In the mouth of two or three witnesses every word shall stand."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
