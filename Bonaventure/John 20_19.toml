[[commentary]]
quote='''
Concerning this central position, John writes: "When it was late, Jesus came and stood in their midst and said to them, 'Peace be to you!'" He is showing two things here, the loftiness of the state of glory, in that, being impassible and immortal, He entered as God while the doors were closed; later, He showed them His hands and side and forced Thomas to confess: "My Lord and my God!" Consider the progression. First He entered as God while the doors were closed: this is the major proposition. Then He proposed the minor by showing them His hands and His side. Finally, He wrested out the conclusion so that Thomas confessed: "My Lord and my God!"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
When therefore it was late that day. Above he treated the manifestation of the Lord made to the women; here he treats the manifestation made to the disciples. And there are in this part three sections according to three manifestations, which are distinguished with respect to the mode of manifesting and with respect to the reason: with respect to mode, for the first is through sight, the second through touch, the third through taste; for first he showed himself, second, he offered himself to be touched, third, he ate. With respect to the reason also for manifesting: for the first was to remove the unbelief of all the disciples; the second, to remove the unbelief of Thomas; the third, however, for the confirmation of love in Peter.

First, therefore, is touched upon the gathering of the disciples, which was both on account of the time, because it was late, and on account of the Jews, who were persecuting them: therefore he says: When therefore it was late that day, namely the Lord's day, on which he appeared to Magdalene, the first of the Sabbaths, because in those days the Jews were keeping the sabbath, eating unleavened bread; and the doors were shut, for their protection, whence: where the disciples were gathered together for fear of the Jews: therefore they had come together in one place with the doors shut, and through this they were worthy for the Lord to appear to them, according to that saying in Matthew 18: "Where two or three are gathered in my name, there am I in the midst of them."

When they were thus, Jesus came and stood in the midst. Here is noted the appearance of the Lord: therefore he stood in the midst, so that he might be seen by all: therefore he stood in the midst, to show that he is the Mediator and Reconciler: above in chapter 1: "But there has stood in the midst of you one whom you do not know," was said to the Jews. For he himself, as is said in Ephesians 2, "is our peace, who has made both one."

And he said to them: Peace be to you. Here is noted the gracious address, in which address he strengthened them; whence in the last chapter of Luke: "He said to them: Peace be to you; it is I, do not be afraid." Whence Chrysostom: "By his voice he steadied their wavering mind, saying: Peace be to you: that is, do not be troubled"; in the last chapter of Philippians: "The peace of God, which surpasses all understanding, guard your hearts."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
