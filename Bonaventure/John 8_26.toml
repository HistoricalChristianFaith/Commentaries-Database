[[commentary]]
quote='''
He is also judge, although now he does not speak words of condemnation, but of instruction and calling. For this reason he says: "I have many things to speak about you" — "about," that is, against you — "and to judge," which will not remain unexamined, not out of malice, but out of justice. "But he who sent me is truthful, and the things I have heard from him, these I speak in the world": and therefore I judge truthfully; above in the fifth chapter: "As I hear, I judge, and my judgment is just; because I do not seek my own will, but the will of him who sent me." And because he manifested himself in comparison to the creature, he manifests himself in comparison to the person of the Father, which the Jews could not understand.

Furthermore it is asked: since truth is appropriated to the Son, whence is it that the Son, speaking of the Father, attributes it to Him?

It must be said that He is called truthful because He speaks true words. Because therefore the Father speaks the Son, who is the true Word, to whom truth is appropriated, "truthful" by reason of the connoted origin can rightly be appropriated to the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
