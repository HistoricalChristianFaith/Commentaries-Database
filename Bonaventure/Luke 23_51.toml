[[commentary]]
quote='''
He describes him from his will, when he adds: This man had not consented to their counsel and deeds: whence that verse of the Psalm fittingly applies to him: "Blessed is the man who has not walked in the counsel of the ungodly," etc.; and Jerome says that some have said that that Psalm should be understood, by a certain appropriation, as referring to this Joseph.

He describes him from his homeland, when he says: From Arimathaea, a city of Judea: this is the same as Ramatha, which was the city of Samuel, according to what is said in 1 Kings 1: "There was a certain man from Ramathaim Sophim"; whence the Gloss: "This is Ramatha, the city of Elkanah and Samuel." - He describes him from the devotion of faith, when he adds: Who himself also was waiting for the kingdom of God, as is said of Simeon above in chapter two, that "he was waiting for the consolation of Israel, and the Holy Spirit was upon him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
