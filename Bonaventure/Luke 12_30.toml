[[commentary]]
quote='''
Therefore he adds: For all these things the nations of the world seek, because they have worldly wisdom: Baruch 3: "The sons of Agar, who sought out the prudence that is of the earth, the merchants of Merrha and Theman." But heavenly men ought not to be intent upon these things, because they are of the household of the supreme Father.

Whence he adds: But your Father knows that you need these things; and there is no doubt that he can provide; Romans 10: "The same Lord of all, rich unto all who call upon him." Nor is there any doubt that he wills to: Isaiah 49: "Can a woman forget her infant, so as not to have pity on the son of her womb?" etc. And therefore those who wish to journey toward the homeland will not be abandoned on the way for want of food.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
