[[commentary]]
quote='''
"And when he has sent forth his own sheep, he goes before them," he leads the way by showing good example, as Christ; Micah two: "He ascends, opening the way before them." Whence he said below in the thirteenth chapter: "I have given you an example, that just as I have done to you, so you also should do." So also the imitator of Christ: whence First Corinthians eleven: "Be imitators of me, just as I also am of Christ." But few are such: whence Isaiah twenty-four: "As the people, so shall be the priest." This threefold office of the good pastor has a great effect upon the sheep, which is the direction of the sheep through imitation: on account of which he says: "The sheep follow him," namely the true pastor. The sheep are simple and humble, of whom Hugh says: "The humility of a sheep is that you do not desire to be in charge and that you love to be subject. Many, fleeing labor, wish to be in charge and disdain to be subject: these are not sheep, because they do not follow." Therefore the sheep follow, because "they know his voice," namely that it is a voice of consolation, according to that passage of Matthew eleven: "Come to me, all you who labor and are burdened, and I will refresh you." The good pastor calls to refreshment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
