[[commentary]]
quote='''
Here the opportunity of the place for resting is touched upon, because he was weary, and a pleasant place presented itself; whence he describes the place by the city, when he says: "He came therefore to a city of Samaria, which is called Sichar:" Sichar in the Chaldaic language, Shechem in Hebrew. This is the city where Simeon and Levi slew the men in vengeance for the violation of their sister, Genesis 34. And this city was near the estate which Jacob gave to Joseph, his son: Genesis 48: "I give you one portion above your brothers, which I took from the hand of the Amorite with my sword and my bow." And this place was suitable for resting, because it was pleasant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
