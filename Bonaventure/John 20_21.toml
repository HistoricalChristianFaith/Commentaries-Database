[[commentary]]
quote='''
He said therefore to them again. Here, consequent upon the manifestation, the mission of the disciples is touched upon, in which the Evangelist indicates three things that the Lord conferred upon the disciples being sent, namely fitness, authority and power: fitness, when he granted peace: whence he says: He said therefore to them again: Peace be to you, that is, tranquility, without which no one is fit to be sent to persecutions. Whence Chrysostom: "Because they had an unconquerable battle against the Jews, therefore he says again: Peace be to you, giving consolation equal to the battle." He also conferred authority, when he sends them: whence he says: As the Father sent me, I also send you, that is, just as I did not come of myself, but was sent, and therefore came with authority: so I send you, giving you authority: whence Romans 10: "How shall they preach unless they are sent?" Whence also Isaiah, chapter 6, sought this authority when he said: "Here am I, Lord; send me"; on the contrary, concerning the false prophets, Jeremiah 23: "They ran, and I did not send them; I did not speak to them," etc. He also conferred power, when he bestowed the Holy Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
