[[commentary]]
quote='''
And lest Peter could excuse himself on account of being taken by surprise, the inquiry is therefore repeated, when it adds: And after a little while, another seeing him said: You also are one of them. But Peter said: O man!, I am not. Peter repeats the denial because he did not abandon the company of the wicked. Whence Augustine says: "How harmful are the words of the wicked, which compel Peter to deny the Lord or to deny knowing as a man him whom among his fellow disciples he had confessed to be the Son of God." Whence that saying of First Corinthians fifteen is verified: "Evil communications corrupt good manners."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
