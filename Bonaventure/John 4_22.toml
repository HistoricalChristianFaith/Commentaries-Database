[[commentary]]
quote='''
"You worship what you do not know:" because you do not have the Law; likewise, you worship God and idols together and believe God to be local: in 4 Kings 17 it is said of the Samaritans that they served the God of the land and their own idols. "We worship what we know: we," namely the Jews: "because salvation is from the Jews," that is, Christ the Savior: Galatians 3: "To Abraham were the promises made, and to his seed." Because therefore worship is not offered perfectly even in Jerusalem, he teaches the woman when and how worship is offered perfectly, lest he leave her in suspense.

It is asked concerning what the Lord says of Himself and of the Jews: "We adore what we know." To the contrary: Below in chapter 8: "You know neither me nor my Father," the Lord Jesus says to the Jews. It must be said that below He speaks of the unfaithful, who were Jews in name only; but here He speaks of true Jews, who are called Jews in reality and by merit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
