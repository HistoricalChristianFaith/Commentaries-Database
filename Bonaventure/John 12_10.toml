[[commentary]]
quote='''
But the chief priests thought. Here the second point is touched upon, namely the amplification of the conspiracy and perversity against the Author, because they raged not only against the Lord, but against others on account of him; whence he says: But the chief priests thought to kill Lazarus also, not only Jesus; Isaiah chapter one: "Your hands are full of blood."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
