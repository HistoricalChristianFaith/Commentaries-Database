[[commentary]]
quote='''
"The officers answered: Never did a man speak thus, as this man speaks;" as if they were saying: this is the reason why we did not bring him, because we were struck with awe by the greatness of his teaching, since "never did a man speak thus." Never so sweetly: whence the woman hearing him said: "Blessed is the womb that bore you, and the breasts that nursed you," Luke 11; and Song of Songs 4: "Honey and milk are under his tongue." Never so learnedly and wisely: whence Luke 2: "All were astonished at his understanding and his answers"; and Mark 1: "They were astonished at his teaching." Never so powerfully; Matthew 7: "He was teaching as one having authority"; and therefore they marveled at his teaching. Never so profitably: above in chapter 6: "The words that I have spoken to you are spirit and life"; and in the same chapter: "Lord, you have the words of eternal life."

But it is asked here: if the officers believed, why did they not follow Christ? And it must be said according to Chrysostom that they believed and were his heralds; yet they did not follow him, because they did not ascend to the state of perfection.

But it is asked here: what great and sublime things had the Lord spoken, on account of which they said: "Never has a man spoken thus?" Chrysostom responds: "When the mind," he says, "is uncorrupted, there is no need for long discourses; for such is the nature of truth that when it finds a soul well disposed, it wonderfully captivates and attracts it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
