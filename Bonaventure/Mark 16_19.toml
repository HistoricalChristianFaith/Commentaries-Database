[[commentary]]
quote='''
After forty days He ascended into the heavens, where, exalted above every creature, He sits at the right hand of the Father. This expression is understood not with respect to position, which does not pertain to God the Father, but with respect to the excellence of goods, because He resides in the more excellent goods of the Father.

In order to raise us to hope, he ascended to the heavenly glory which we hope for. But because hope does not arise except from faith in future immortality, therefore he did not ascend immediately, but with an interval of forty days interposed, in which through many signs and proofs he established the true resurrection, by which the mind might be strengthened in faith and lifted up to hope for heavenly glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25204.html'
source_title="Breviloquium"
