[[commentary]]
quote='''
Secondly, as to the consideration of the glorification of others, he adds: And they shall come from the east and the west, from the north and the south, that is, from the universality of the nations gathered from every part of the world. For when the Jews were rejected on account of their carnality, the Lord called the nations as spiritual children; whence it is said in John 10: "Other sheep I have, which are not of this fold, and those I must bring." These were gathered from every part of the world through the ministry of the Apostles, according to that of the Psalm: "All nations, whatsoever thou hast made, shall come and shall adore before thee, O Lord, and shall glorify thy name"; and Isaiah 43: "From the east I will bring thy seed, and from the west I will gather thee: I will say to the north: give up; and to the south: do not withhold." Therefore they are said to be called from such distant parts on account of the diversity of customs, from which they are called to the unity of charity and felicity.

On account of which he adds: And they shall recline in the kingdom of God: Isaiah 25: "The Lord shall make for all peoples in this mountain a feast of fat things, a feast of vintage, of fat things full of marrow, of vintage refined."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke, Chapter 13'
