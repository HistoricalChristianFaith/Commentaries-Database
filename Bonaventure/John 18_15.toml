[[commentary]]
quote='''
"Now Simon Peter followed Jesus." Here he treats of Peter's denial, which he describes in this order. First is noted the occasion of the denial; second, the denial itself; third, from the denial, the cooling of love. The occasion of the denial was in this, that although he was weak, he wished to follow the Lord. Therefore he says: "Now Simon Peter followed Jesus," not perfectly; whence Matthew twenty-six: "But Peter followed from afar," and with another leading; whence he was not alone, but rather "another disciple also," and this one was the guide; whence: "Now that disciple was known to the high priest," and therefore he went with confidence, whence he adds: "And he entered with Jesus into the court of the high priest." Who this was, the Gloss did not determine. It seems nevertheless to have been John, as Victor says, who spoke of himself as of another, as though not fearing.

Question II. Likewise Chrysostom asks: who was that other disciple of whom he says that he was following Jesus? And he responds that it was John, who conceals his own name by reason of humility.

Question III. And then the question is: why does he not remain entirely silent about himself? The response is that he introduces himself in order to strengthen our faith; he conceals his name in order to show that he avoids boasting.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
