[[commentary]]
quote='''
"Now Philip was from Bethsaida, the city of Andrew and Peter." And therefore it should be understood that he was moved to follow because he saw those ones following. For one curtain draws another curtain, according to what is signified in Exodus 26 in the construction of the tabernacle. Morally, indeed, "Philip" is interpreted as "mouth of the lamp," "Bethsaida" as "house of hunters." By "mouth" is denoted the wisdom of eloquence, concerning which Luke 21: "I will give you a mouth and wisdom, which all your adversaries shall not be able to resist and contradict." By "lamp," the uprightness of conduct, Matthew 5: "Let your light shine before men, that they may see" etc. By "hunters," preachers; Jeremiah 16: "I will send them many hunters, and they shall hunt them." In the calling therefore of Philip from Bethsaida it is signified that he who assumes the office of preaching must have wisdom of eloquence and uprightness of life, "because when one's life is despised, it follows that his preaching is held in contempt."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
