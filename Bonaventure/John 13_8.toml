[[commentary]]
quote='''
Peter says to him: You shall never wash my feet. And because he had resolved to persist in his position, he is deterred by a threat; therefore: Jesus answered him: If I do not wash you, you shall have no part with me; part he calls the eternal fellowship with God, concerning which in the Psalm: "The Lord is the portion of my inheritance and of my cup"; and again: "My portion is in the land of the living."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
