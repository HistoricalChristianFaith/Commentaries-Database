[[commentary]]
quote='''
Lastly, on the part of the people, there is shown the display of due reverence, when there is added: And there came fear upon all. This is said with regard to reverence according to the act of the heart. Nor is it a wonder, because, Job 26, "the pillars of heaven tremble and are afraid at his nod"; whence Job 4: "Fear seized me and trembling, and all my bones were terrified." And this at the sight of so great a miracle: Psalm: "I will praise you, for you are fearfully magnified; wonderful are your works"; and Jeremiah 10: "Who shall not fear you, O King of the nations?" But with regard to the act of the mouth, there is added: And they spoke among themselves, namely, one conferring with another: What is this word? that is, a thing worthy of speech, as is understood in 4 Kings 20: "There was no word in my house that I did not show them." For with authority and power he commands the unclean spirits: with authority commanding, and with power effecting. Nor is it a wonder, because, Job 25, "power and terror are with him who makes peace in his high places." But this command is not human nor even angelic; whence in the Epistle of Jude it is said that "Michael the Archangel, when he disputed with the devil about the body of Moses, said only this: The Lord rebuke you, Satan."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
