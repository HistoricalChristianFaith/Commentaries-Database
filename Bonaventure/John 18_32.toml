[[commentary]]
quote='''
"That the word of Jesus might be fulfilled." Here the fourth point is noted, namely that the will of Christ is fulfilled. For he willed to die the death of the cross, by which the Gentiles put to death; therefore it says: "That it might be fulfilled," that is, it so happened that the word might be fulfilled "which he spoke," above in the third chapter: "As Moses lifted up the serpent in the desert, so must the Son of Man be lifted up," and above in the twelfth chapter: "signifying by what death he was to die," namely of the cross; Matthew twenty: "He shall be delivered to the Gentiles to be mocked and scourged and crucified." And the Lord chose this as the most vile death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
