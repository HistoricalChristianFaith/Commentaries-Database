[[commentary]]
quote='''
Third, with regard to the murmuring of the perverse people, he adds: And when all saw, namely with the eye of perverse judgment, concerning which Sirach 11: "Like a spy watching for the fall of his neighbor: for the plotter, turning good things into evil, places a stain even upon the elect." And because murmuring follows upon evil judgment, he therefore adds: They murmured, saying that he had turned aside to a sinful man, namely by the whispering of a deceitful word, which is greatly to be avoided: therefore it is said in Wisdom 1: "Guard yourselves from murmuring, which profits nothing, and spare your tongue from detraction." But this murmur displeases God greatly in every way; therefore Lamentations 3: "Why does a living man murmur, a man for his sins?" But this people always willingly murmured: Exodus 16: "The whole congregation of the children of Israel murmured against Moses and against Aaron"; and Numbers 11: "A murmuring of the people arose against the Lord." And therefore 1 Corinthians 10: "Neither murmur, as some of them murmured and perished by the destroyer." And now they murmured against the Lord, and in this they bore the figure of that nation murmuring against the Lord because he received the gentiles. Whence the Gloss says: "It is manifest that the Jews always hated the people of the gentiles, or did not understand their salvation: whence also against Peter it is said: Why did you go in to men having the foreskin?" Acts 11. On account of which it should be understood that, as was touched upon above, by the entry of Christ into the house of Zacchaeus, the chief of the tax collectors, is understood his entry into the Church of the gentiles, by which he was gladly received. Therefore Christ told Zacchaeus to descend to humility, because it was fitting that he should remain in his house, with the synagogue deserting the faith; Acts 13: "It was necessary that the word of God should be spoken to you first: but since you reject it and judge yourselves unworthy of eternal life, behold, we turn to the gentiles."

And note that the house in which Christ remains is sevenfold: the first, namely, is the house of material habitation, in which he remains in the person of the poor: Isaiah 58: "Break your bread for the hungry and bring the needy and the wandering into your house," etc.

The second is the house of the constructed basilica, in which he remains in the Sacrament of the altar: Matthew 21: "My house shall be called a house of prayer"; and the Psalm: "I will enter into your house," etc.

The third is the house of the Church militant, in which he remains in his members: 1 Timothy 3: "I write these things to you, son, so that you may know how you ought to conduct yourself in the house, which is the Church of the living God, the pillar," etc.

The fourth is the house of the virginal womb, in which he remains through the presence of the flesh: the Psalm: "Holiness befits your house for length of days."

The fifth is the house of a clean conscience, in which he remains by the spirit of holiness: Wisdom 8: "Entering into my house, I shall find rest with her, for she has no bitterness," etc.; and again Sirach 32: "Run ahead first to your house, and there play and pursue your designs."

The sixth house is that of Sacred Scripture, in which he remains in the light of truth: the Psalm: "God shall be known in her houses, when he shall protect her"; and Proverbs 9: "Wisdom has built herself a house, she has hewn out seven pillars," etc.

The seventh house is that of the heavenly Jerusalem, in which he remains in the joy of blessedness: John 14: "In my Father's house there are many mansions"; and again the Psalm: "I was glad at the things that were said to me: We shall go into the house of the Lord."

Since therefore he is received in these seven ways in the Church of the Gentiles, which is signified by Zacchaeus, for this reason this Gospel is read at the Dedications of churches, which signify spiritual houses, concerning which 1 Peter 2 says: "Coming to him, a living stone," "you also as living stones are built up into spiritual houses, a holy priesthood, offering spiritual sacrifices, acceptable," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
