[[commentary]]
quote='''
If swiftness, or strength, or freedom of body, which nothing can resist: they shall be like the Angels of God, because it is sown a natural body, and shall rise a spiritual body, by power, assuredly, not by nature.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25207.html'
source_title="Breviloquium, Part 7"
