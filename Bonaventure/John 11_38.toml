[[commentary]]
quote='''
Jesus therefore again groaning. Here the second point is touched upon, namely the sign of being heard, which is manifested in this, that he came to the tomb and caused the stone to be removed: and compassion moved him to do these things. Therefore he says: Jesus therefore again groaning in himself, through compassion, came to the tomb. And because he had come to raise him, therefore he commanded the tomb to be opened, because it was closed: therefore he says: Now it was a cave, and a stone was laid upon it, namely to keep away the stench.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
