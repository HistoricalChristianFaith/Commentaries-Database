[[commentary]]
quote='''
Then he poured water into a basin and began to wash the feet of the disciples and to wipe them with the towel with which he was girded. This is the office of a servant: such an office the Lord of majesty assumed; Luke twenty-two: "But I am in your midst as one who serves." "For the Son of man came not to be served, but to serve and to give his life as a redemption for many." And this is the most humble service, the washing of feet.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
