[[commentary]]
quote='''
Amen, amen I say to you, as something true and certain: The servant is not greater than his lord, neither is the apostle greater than he who sent him; Matthew ten: "The disciple is not above the master," and below in the fifteenth chapter: "Nor is the servant greater than his lord." And therefore all servants of Christ ought to serve their fellow servants; therefore it is the custom of the Pope to write himself servant of the servants of God. Whence Chrysostom: "Where are those who despise their fellow servants? Where are those who seek honors? The Lord washed the feet of the traitor and of the sacrilegious one and of the thief at the time of the betrayal: and you think great things of yourself and exalt yourself on high?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
