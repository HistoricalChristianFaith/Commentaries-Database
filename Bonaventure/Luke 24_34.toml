[[commentary]]
quote='''
And therefore he adds: And they found the eleven gathered together and those who were with them, saying: The Lord has truly risen and has appeared to Simon; and through this they found them rejoicing, so that it can truly be said: "Behold, how good and how pleasant it is for brethren to dwell together in unity!" For all were partakers of the joy from the apparition which was made to Peter. Now the Lord appeared to Peter before the others; whence the Gloss: "He appeared first of all men to Peter; which, even though the Evangelist does not say when or where it happened, nevertheless, because it happened, he does not pass over in silence."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
