[[commentary]]
quote='''
Second, as to the sagacity of Christ in resisting, it is added: But Jesus answering said to them: I also will ask you one word. When he should have responded, he asked a question—not because he did not know, but because they are better bound by a question posed than by a direct answer. Hence Bede: "He could have refuted the calumny of his tempters with an open answer, but he prudently asks a question, so that they might be condemned either by their own silence or by their own judgment," as above in the nineteenth chapter: "Out of your own mouth I judge you, wicked servant." For it is a precaution that "one who wholly opposes must be wholly opposed," and against those who equivocate one must proceed from what has been granted, so that they may be overcome.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
