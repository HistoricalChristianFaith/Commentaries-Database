[[commentary]]
quote='''
"And there was much murmuring among the crowd concerning him," and it arose from controversy; whence he adds: "For some said: He is good," namely the simple folk; "but others said: No, but he deceives the crowds," and these were the chief Pharisees, who called him a deceiver: Matthew chapter twenty-seven: "We remember that that deceiver said," etc.; below in the same chapter: "Have you also been deceived?" And although there was controversy, it was in murmuring, not open.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
