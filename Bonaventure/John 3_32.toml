[[commentary]]
quote='''
"And what he has seen and heard, this he testifies," as one who is certain. "He saw," as the Wisdom of God, because he saw by himself: "he heard," as the Son receiving from the Father; in chapter 15: "All things whatsoever I have heard from my Father, I have made known to you." And although his doctrine is most excellent, nevertheless it is despised by the carnal. Therefore he adds: "And no one receives his testimony," that is, no worldly man: in chapter 15: "And they have both seen and hated both me and my Father": but the spiritual, who do receive it, become certain of his doctrine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
