[[commentary]]
quote='''
"You judge according to the flesh"; First Corinthians three: "Since there is among you jealousy and contention, are you not carnal and walking according to man?" — that is, you judge, because they believed him to be a mere man and to seek his glory as a man; and therefore they challenged his testimony. "But I judge no one," in the present, that is: above, chapter three: "God did not send his Son into the world to judge the world." "I do not judge," by condemning, as you now condemn me: and this not because I cannot or do not know how — indeed I know and I can.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
