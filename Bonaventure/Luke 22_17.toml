[[commentary]]
quote='''
Third, as regards the termination of the figurative drink, it is added: And having taken the cup, he gave thanks and said: Take and divide it among you. Now this is said of the drink pertaining to the old passover; whence the Gloss: "This cup pertains to the old passover, to which he was putting an end." Having received which, he gives thanks, namely because the old things were about to pass away, and all new things were about to come, according to that passage in Leviticus twenty-six: "When the new things come upon you, you shall cast aside the old."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
