[[commentary]]
quote='''
Because the words which you gave me, I have given to them: above in the fifteenth chapter: "All things that I have heard from my Father, I have made known to you." And they kept my words, which I gave to them, and therefore your word: on this account he says: And they have received them, by subjecting their understanding, and have known truly that I came forth from you, according to the divine nature; and they have believed that you sent me, namely, into the flesh. And thus they believed and knew the Divinity in Christ and the humanity. And it should be noted that he says: And they believed that you sent me: and afterward: And they knew that I came forth from you. They themselves said above in the sixteenth chapter: "In this we have known that you came forth from God"; because through faith in the assumed humanity one arrives at the understanding of the eternal generation. Whence Augustine says that those who despised the humble Christ did not merit to know the exalted Christ. This therefore is the first reason for hearing their petition, namely, the preservation of Christ's words: whence above in the fifteenth chapter: "If you abide in me, and my words abide in you, whatever you will, you shall ask, and it shall be done for you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
