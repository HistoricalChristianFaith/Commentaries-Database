[[commentary]]
quote='''
Here the instruction of those who doubt is touched upon: for not understanding Christ's correction, they begin to doubt and to inquire. On account of this he says: "They said therefore to him," namely the Jews: "What shall we do, that we may work the works of God?" Therefore they were asking about the work, because through it they wished to come to refreshment. For this is the order: Second Thessalonians, the last chapter: "He who does not labor, let him not eat"; Proverbs 12: "He who works his land will be filled with bread." And the Lord instructs those who are seeking.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
