[[commentary]]
quote='''
The gift of grace flowing liberally and abundantly ought to ramify even unto the habits of perfections, which, since they approximate the end, are rightly called by the name of beatitudes.

For the integrity of perfection there is necessarily required a perfect withdrawal from evil, a perfect advance in good, and a perfect standing in the best. Since evil proceeds either from the swelling of pride, or from the rancor of malice, or from the languor of concupiscence, therefore for perfectly distancing oneself from this threefold kind of evil, three beatitudes are necessary, namely poverty of spirit, distancing from the evil of swelling; meekness, distancing from the evil of rancor; and mourning, distancing from the evil of lust and concupiscential languor.

For the perfection of religious life, there is necessarily required the renunciation of private good, the acceptance of fraternal good, and the desire for eternal good; the first is accomplished through poverty of spirit.

Fear causes one to withdraw from evil and from the occasion of evil; and because the root of all evils is cupidity, therefore fear disposes to poverty of spirit, in which humility is joined together with poverty, so that the perfect man may thus be distanced from the fount of all fault, namely from pride and cupidity. And hence it is that poverty of spirit is the foundation of all evangelical perfection. Whence he who wishes to come to the summit of perfection must first lay this foundation, according to that passage in Matthew nineteen: If you wish to be perfect, go and sell all that you have: behold, perfect poverty, which retains absolutely nothing for itself: and follow me: behold, humility, which causes a man, by denying himself, to take up his cross and follow Christ, who is the most principal foundation of all perfection. Fear therefore disposes to poverty of spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
These vices are expelled by the seven gifts of the Holy Spirit, and seven virtues are introduced, which Christ taught when he set forth the foundations of salvation on the mountain. The first virtue is voluntary poverty, concerning which it says in the Gospel: "Blessed are the poor in spirit." The gift of fear destroys pride and brings about the good of poverty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"

[[commentary]]
quote='''
Ambrose, in the book On Duties: "Riches furnish no assistance toward the blessed life; which the Lord clearly demonstrated in the Gospel, saying: Blessed are the poor in spirit, etc. And so it has been most clearly proven that poverty, hunger, and pain, which are thought to be evils, are not only no hindrance to the blessed life, but are even an assistance to it. Thus, therefore, the external goods of the body are not only no assistance to the blessed life, but are even a detriment." But it is perfect to relinquish those things which are no assistance but a detriment: therefore, etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
