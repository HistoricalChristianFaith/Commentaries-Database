[[commentary]]
quote='''
First, therefore, as regards intimating the repugnance between the condemnation of Christ and the justice of the law he says: Pilate, having called together the chief priests and the magistrates of the people by prefacing with a citation: for the accusers must be cited to hear the sentence by which the accused ought to be absolved or condemned, because, as is said in Acts twenty-five, "it is not the custom of the Romans to condemn any man before the one who is accused has his accusers present and receives opportunity to defend himself to wash away the charges." Therefore, according to the order of law, before the delivery of the sentence, a convocation of the parties must precede, and once they are convoked, one must proceed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
