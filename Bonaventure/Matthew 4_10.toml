[[commentary]]
quote='''
Note that latria is worship owed to God alone and is rendered in such a way that it is owed to no other. God prohibits the worship of others in the negative, and by this he implied the worship of God in the affirmative, which is made explicit in the New Testament, when the Lord says: Thou shalt adore the Lord thy God, and him only shalt thou serve.

It is asked: why did the Lord prohibit the worship of others in the negative and not make explicit the worship of God in the affirmative? Certainly, because he wished to give us the commandments in the easiest manner he could; and therefore in the negative he called us back from the worship of others, so as to imply his own worship in the affirmative.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25202.html'
source_title="Collationes de Decem Praeceptis, Collation 2"
