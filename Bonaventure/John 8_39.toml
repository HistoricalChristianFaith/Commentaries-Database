[[commentary]]
quote='''
"They answered and said to him." Here it is shown that they are not children of Abraham by imitation, as they themselves boasted; on account of which they said to him: "Abraham is our father." They repeat this because he had said that they were doing the works of their father: and the Lord shows that he did not mean that father: therefore Jesus says to them: "If you are children of Abraham, do the works of Abraham," that is, if you wish to be children by imitation, as you are according to the flesh: do the works of Abraham, otherwise you will boast in vain; Matthew 3: "And do not presume to say: We have Abraham for our father; for I say to you, that God is able from these stones to raise up children to Abraham." And because you do not do the works of Abraham, by destruction of the consequent, neither are you to be called his children.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
