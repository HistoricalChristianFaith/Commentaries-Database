[[commentary]]
quote='''
Of judgment indeed, because the prince of this world has already been judged; above in chapter 12: "Now is the judgment of the world; now shall the prince of this world be cast out."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
