[[commentary]]
quote='''
I know that he shall rise again in the resurrection at the last day. She knew this from the Law: Daniel 12: "Many of those who sleep in the dust of the earth shall awake"; she knew it through the teaching of Christ: above in chapter 6: "I will raise him up at the last day." But because she had not yet confessed that he would rise by the power of Christ, therefore she is instructed concerning this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
