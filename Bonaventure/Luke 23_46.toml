[[commentary]]
quote='''
Second, as to the tearful expiration of Christ, he adds: And crying out with a loud voice, Jesus said: Father, into your hands I commend my spirit. - But there seems to be a contradiction among the Evangelists. For in Matthew twenty-seven and Mark fifteen it is said that he cried out: "Eli, Eli"; and in John nineteen it is said that he cried out: "It is finished." But all of this is true, because he cried out three times. And first he said what Matthew says, then second, what John says, and third, what Luke says. - And the Evangelist Luke himself indicates this in what he adds: And saying these things, he expired. From which it is apparent that he expired while simultaneously crying out and praying, in order to show that he himself is our true high priest; on account of which, Hebrews five: "Who in the days of his flesh, offering prayers and supplications to him who was able to save him from death, with a strong cry and tears, was heard for his reverence." "And being consummated, he became to all who obey him the cause of eternal salvation, called by God a high priest according to the order of Melchisedech." Therefore he expired while simultaneously crying out and weeping, so that in the tears the true passion and humanity of Christ might be understood, and in the cry, his Divinity; because, since no one can cry out by nature unless he has sufficient blood in the heart and breath for respiration, it is impossible that anyone should by nature expire and cry out at the same time. And therefore he showed in the cry of death that he is omnipotent, and he demonstrated to be true what he said in John ten: "I have the power to lay down my life, and I have the power to take it up again." "No one takes it from me, but I lay it down of myself"; and therefore Isaiah fifty-three: "If he shall lay down his life for sin, he shall see a long-lived seed, and the will of the Lord shall be directed in his hand."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
