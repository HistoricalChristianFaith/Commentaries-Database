[[commentary]]
quote='''
"Jesus answered and said to him: Because I said to you: I saw you under the fig tree, you believe": and thus for a small thing you have been drawn to faith. "You will see greater things than these": below in chapter five: "He will show him greater works, that you may marvel." And he specifies that greater thing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
