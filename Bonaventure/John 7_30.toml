[[commentary]]
quote='''
"They sought therefore to seize him." Here is noted the obstinacy of those who were confuted. For because he had shown them to be liars and ignorant, therefore, confirmed in evil and unable to resist his word, "they sought therefore to seize him," namely certain leaders, as Chrysostom says. But nevertheless their malice did not achieve its effect, by divine power preventing it. For they did not apprehend Christ, the Truth, but falsehood; Jeremiah 8: "They have laid hold of falsehood and refused to return"; whence he says: "But no one laid hands on him," that is, to seize him, "because his hour had not yet come," in which he would deign to suffer. Whence Augustine says: "He did not say the hour in which he would be compelled to die, but in which he would deign to be slain"; concerning which it is said below in chapter 17: "Father, the hour has come; glorify your Son."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
