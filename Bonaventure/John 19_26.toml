[[commentary]]
quote='''
When Christ suffered on the cross, then the blessed Virgin was present, accepting and consenting to the divine will. And it pleased her that the price of her womb should be offered on the cross for us. "When Jesus therefore saw his mother and the disciple standing, whom he loved, he said to his mother: Woman, behold your son," namely, who will be handed over as the price of redemption of the human race: as if he were saying: it is necessary for you to be without me, and for me to be without you; and you yourself, as a holy woman, conceived him, and as a devout woman, you offer him; may it please you, O Virgin, that I redeem the human race and appease God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'

[[commentary]]
quote='''
When Jesus therefore had seen. Here the second point is noted, namely the Lord's solicitude toward his Mother, in this, that he looked upon her and considered to whom he might commend her: whence he says: When Jesus therefore had seen his Mother: when he had seen, as one who was solicitous: First Timothy chapter five: "If anyone does not have care of his own and especially of those of his household," etc. And Chrysostom says: "Here the Lord shows great love toward his Mother and commends her to the disciple, teaching us to exercise all diligence toward those who begot us, even unto our last breath." Exodus chapter twenty: "Honor your father and your mother," etc. What he commanded, he fulfilled. And the disciple standing there, whom he loved: and therefore he was able to commend her to him intimately. John was standing there, he had not withdrawn: whence he was one of those to whom it is said in Luke chapter twenty-two: "You are they who have continued with me in my trials."

He says to his Mother. Here the third point is noted, namely the loving commendation; whence he says: Woman, behold, your son: as if to say: trust in him as in a son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
