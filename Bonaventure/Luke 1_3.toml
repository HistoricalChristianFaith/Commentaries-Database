[[commentary]]
quote='''
Third, as to the directive element, which was an ordered, sufficient and diligent process: and this he indicates when he adds: It seemed good to me also, namely, the Holy Spirit instigating; as Jerome says, "instigated by the Holy Spirit, he wrote this Gospel." Having followed closely, that is, having followed perfectly, because from the beginning to the end: whence he also adds: To write to you all things diligently in order, most excellent Theophilus: where simultaneously sufficiency, order and diligence are indicated: and these indeed befit a historical narrator. Whence 2 Maccabees 2: "To collect the understanding and to arrange the discourse and to inquire more carefully into each and every individual part belongs to the author of a history."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
