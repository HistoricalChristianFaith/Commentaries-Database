[[commentary]]
quote='''
"Judas therefore, having received the cohort." Here is noted the arrival of the betrayer with such persons as could seize and hold and lead him away. Therefore, "having received the cohort," namely from the Gentiles, "and from the chief priests and Pharisees, servants," because he was betraying him to them; in Matthew twenty-six it is said that "he went to the chief priests and said to them: What will you give me, and I will deliver him to you?" "He came there," as the leader of the others, "with lanterns and torches and weapons," lest he could hide in the night: for since they were walking in darkness, they begged light from torches: Job twenty-four: "If the dawn suddenly appears, they regard it as the shadow of death: and thus they walk in darkness as in light"; or defend himself: and they did this because they believed nothing divine was in him, but only human power.

Question IV. Likewise, since Judas had left him at home, why did he not lead the cohort there, but to the garden? Chrysostom responds that he would more gladly have sought him at home, so as to find him sleeping: but he knew that he had the custom of frequently spending the night outside.

Question V. Likewise it is asked: since that cohort was of Gentile soldiers, how did they follow Judas? I respond: They were corrupted by money given or promised. Whence Chrysostom: "They were true soldiers, devising to do all things for the sake of money."

Question VI. Likewise the question is: why did they not come to apprehend him by day, since they had so great a cohort? And Chrysostom responds that they feared the crowds which followed him by day.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
