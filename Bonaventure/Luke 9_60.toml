[[commentary]]
quote='''
If parents should wish, say, or command something that is against the advancement of our salvation, piety is not to be shown to them in such matters. The Lord wills that on account of paternal affection a man should not cease to do what pertains to his salvation. And this is what the Lord says: Let the dead bury their dead; but you go and proclaim the kingdom of God. And Jerome says: 'If your father should lie across the threshold, if your mother should bare the breasts with which she nursed you, trample over your father, trample over your mother, and fly to the standard of the cross. For the only kind of piety in this matter is to be cruel.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25205.html'
source_title="Collationes de Decem Praeceptis, Collation 5"

[[commentary]]
quote='''
Secondly, with respect to the instruction of the ignorant, there follows: And Jesus said to him: Let the dead bury their dead. In this he first instructs him to avoid the company of sinners: for the dead here are called sinners and unbelievers — whence Ephesians 2: "You, when you were dead in your offenses and sins, in which you once walked." The company of such persons must be abandoned by a holy man, according to Ecclesiasticus 13: "What fellowship has a holy man with a dog?" — that is, with a sinner and unbeliever. Whence however closely he may be joined to them, they must nevertheless be abandoned, especially when they impede the good. Whence Deuteronomy 33: "He who said to his father and his mother: I do not know you; and to his brothers: I know them not — these are they who kept your judgments, O Jacob, and your law, O Israel."

He also instructs him that lesser goods must be set aside for greater ones: whence Ambrose teaches that "lesser goods must be passed over for the benefit of greater ones. For it is greater to raise the souls of the dead by preaching than to hide the body of a dead man in the earth."

And therefore he adds: But you, go and proclaim the kingdom of God: as if to say: set aside a lesser good for a greater one, according to what is said in First Timothy four: "Exercise yourself unto godliness. For bodily exercise is profitable for a little" etc. From this it is clear that works of spiritual piety, according to the judgment of both the Apostle and the Lord, are altogether to be preferred to corporal works. For although it is a great work of piety to bury the dead, and especially one's own father, nevertheless Christ wills that it be set aside for the office of preaching. On account of which the Apostles said in Acts six: "It is not fitting that we should leave the word of God and serve tables." For as much as the soul is better than the body, so much better is it to feed the soul by preaching than to minister food to the body; especially because there are more persons suited to providing burial than to giving doctrine. Whence the Apostles said in Acts six: "Look for men of good repute, whom we may appoint over this work. But we will be devoted to prayer and to the ministry of the word"; because it is said below in chapter ten: "Mary has chosen the best part"; and therefore in Daniel twelve: "Those who instruct many unto justice shall be as stars" etc. - And note that he says: Proclaim the kingdom of God, namely to those willing to repent: according to what Christ said in Matthew four: "Do penance: for the kingdom of heaven is at hand." Therefore, just as it is a great sin when a rich man does not give alms to one in need, so it is a greater sin when one who has knowledge does not share doctrine: whence Proverbs eleven: "He who hides grain shall be cursed among the peoples." Therefore he says: Proclaim, do not hide.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'

[[commentary]]
quote='''
On that passage in Luke 9: Let the dead bury their dead; the Gloss says: "The Lord teaches that lesser goods are to be passed over for the advantage of greater ones; for it is greater to raise the souls of the dead by preaching than to lay a dead body in the earth." If therefore to bury the dead, and especially one's father, is a work of the greatest natural and corporeal piety, and the Lord teaches that this is to be set aside, and those devoted to preaching are not bound to this: therefore such persons are not bound to manual works, however needy they may be.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'
