[[commentary]]
quote='''
"I do not seek my own glory." Here the third point is touched upon, namely the reason for the patient response. For he was not responding in order to glorify himself; but he endured their insult, not because it was true, but because he did not care about glory; on account of which he says: "I do not seek my own glory," and therefore I do not respond to your insult; Jerome: "He who does not seek glory does not feel insult." Therefore I do not care about the insult inflicted, but nevertheless do not think yourselves free from fault and from fitting retribution; whence he says: "There is one who seeks and judges," namely the Father, who seeks the glory of the Son; below in chapter 12: "And I have glorified and will glorify again"; "and judges": as if to say: I reserve it to his judgment. Gregory: "The Son reserves the insults inflicted upon him to the judgment of the Father, so that he may surely teach us how patient we ought to be, since he who judges does not yet wish to avenge himself."

Likewise it is asked about what he says: "There is one who seeks and judges."

On the contrary: Above in chapter five: "The Father judges no one, but has given all judgment to the Son."

I respond: There is a judgment of condemnation and of discernment: the first is treated above, the second is found here.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
