[[commentary]]
quote='''
Here the falling back of the unbelievers is touched upon: whence he says: "After this," that is, following this, or "from this," that is, on the occasion of this rebuke and instruction, "many of his disciples went back," not through imitation, as was said to Peter in Matthew chapter sixteen: "Get behind me, Satan," but through indignation. Whence they withdrew not only in heart but also in body; whence "they no longer walked with him." Therefore many withdrew and few remained, because, according to that saying in Matthew chapter twenty, "many are called, but few are chosen"; and because few are chosen for the kingdom of God, therefore few there are who do not turn back, according to that saying in Luke chapter nine: "No one putting his hand to the plough and looking back is fit for the kingdom of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
