[[commentary]]
quote='''
Second, with respect to the dissuasion from avarice, he adds: And he said to them: Take heed and beware of all avarice. Take heed, namely, so as to be provident, and beware, so as to be cautious: Ephesians 5: "See, brethren, how you walk cautiously, not as unwise, but as wise," etc. Providence indeed causes one to beware of the dangers into which one falls through avarice; 1 Timothy, last chapter: "They who wish to become rich fall into temptation and into the snare of the devil and many useless and harmful desires, which plunge men into ruin and perdition. For the root of evils is covetousness," etc. Hence avarice itself blinds a man, which was signified in the blinding of Tobit by the dung of swallows, Tobit 2. And therefore he says: Take heed, namely of eternal things, and beware of avarice, which seeks temporal things: 2 Corinthians 4: "While we look not at the things which are seen, but at the things which are not seen. For the things which are seen are temporal, but the things which are not seen are eternal." And since the desire for any transitory good, namely money, power, and honor, can be called avarice, therefore he says: Beware of all avarice: Isaiah 33: "Who shall be able to dwell with everlasting burnings?" and there follows: "He who casts away avarice gained by oppression and shakes his hands free from every bribe."

Third, with respect to the assignment of the reason and cause, he adds: For not in the abundance of anyone is his life from the things which he possesses: that is, the life of anyone is not in abundance: abundance, I say, from the things which he possesses, that is, no one on account of the abundance of riches can live longer: Psalm: "They shall leave their riches to strangers, and their sepulchres shall be their houses forever"; and Job 27: "When the rich man shall sleep, he shall take nothing with him," etc.; and Psalm: "They have slept their sleep, and all the men of riches have found nothing in their hands." Hence abundance does not prolong life, but frequently shortens it: Sirach 8: "Gold and silver have destroyed many"; and Acts 8: "Let your money be with you unto destruction." And for this reason, money itself must be lost, lest it destroy its possessor: Sirach 29: "Lose your money for the sake of a brother and friend, and do not hide it under a stone unto destruction."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
