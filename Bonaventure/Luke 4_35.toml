[[commentary]]
quote='''
But on the part of Christ, the operation of immense power is shown, when it is added: And Jesus rebuked him, saying: Be silent. For as the Omnipotent One, he imposes silence on the demon by rebuke alone; Zechariah 3: "The Lord showed me Jesus the high priest"; and it follows: "The Lord rebuke you, Satan, and the Lord rebuke you." Although he was speaking the truth, nevertheless he imposed silence, because, as it is said in Sirach 15, "praise is not seemly in the mouth of a sinner"; whence also in the Psalm: "God said to the sinner: Why do you declare my justices?" Or he forbade it because the demon speaks deceitfully and frequently mixes falsehoods with truths: whence also in Mark 1: "He did not permit the demons to speak," the Gloss says, "lest, while they saw him speaking the truth, they would follow him when he led astray." And therefore in the Psalm: "Let deceitful lips be made mute, which speak iniquity against the just one." Moreover, he shows here that vainglory is to be avoided, so that we should not seek to be praised by the vain and the false. The example of Paul, Acts 16.

Not only, however, does he impose silence by rebuking, but he also expels by commanding, when he adds: Come out of him. Now is fulfilled that word of Habakkuk 3: "The devil shall go forth before his feet." And therefore there follows: And when the demon had thrown him into the midst, he went out of him: in which is shown the wrath of the devil, because he went out unwillingly and with protest; whence also in Mark 1: "And tearing him, he went out of him." The devil does this when he sees that he is losing what he wrongfully possesses: Revelation 12: "The devil has come down to you, having great wrath," etc. But his wrath did no harm, the Lord preventing it; whence is added: And he harmed him not at all; Isaiah 11: "They shall not hurt nor kill in all my holy mountain." From this, moreover, it is gathered that the devil always has the will to harm, because this he has from himself; but he does not always have the power to harm, except insofar as and when he is permitted by God in a just manner; whence Romans 13: "There is no power except from God." And therefore 1 Peter 3: "Who is he that shall harm you, if you be zealous followers of that which is good?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
