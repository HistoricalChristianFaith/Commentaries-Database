[[commentary]]
quote='''
Whence he adds: And he said to them: With desire I have desired to eat this passover with you, before I suffer. This eating designates the incorporation and unity of the members into the unity of the body, which comes about through the enkindling of love, and this Christ especially desires, according to that passage above in the twelfth chapter: "I have come to cast fire upon the earth, and what do I desire, except that it be kindled? But I have a baptism to be baptized with, and how I am constrained until it is accomplished!" Now Christ desired to eat this on account of the exclusion of the figure and the introduction of the truth. Whence Chrysostom: "I have desired to hand over to you new things and to give a second passover." In this he intimates that one must approach the paschal food with the greatest desire; on account of which, Ecclesiasticus twenty-four: "Come over to me, all you who desire me," etc.; and the Psalm: "He gives food to the hungry"; again: "Open wide your mouth, and I will fill it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
