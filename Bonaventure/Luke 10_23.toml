[[commentary]]
quote='''
The third firmness of faith is that which proceeds from the witness of truth as expressed through the inspired word: and this occurred with all the prophets. And we have heard this Word, for it is the Spirit that bears witness that Christ is the truth. Some have actually seen Him in the flesh. Hence in Luke: "Blessed are the eyes that see what you see! For I say to you, many prophets and kings have desired to see what you see, and they have not seen it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
Fourth, He shows that one should rejoice over the desirable presence, with regard to which He adds: And turning to His disciples, He said: Blessed are the eyes that see what you see: therefore you can rightly rejoice, because you see Me both in mind and in body, since Abraham rejoiced, who saw only by faith, according to that passage of John 8: "Abraham, your father, rejoiced to see My day: and he saw it and was glad." And therefore as a figure of this it is said in 3 Kings 10 to Solomon: "Blessed are your men and blessed are your servants, those who stand before you always and hear your wisdom." This is said of Solomon as a figure of Christ, because, as He says of Himself in Matthew 12, "behold, something greater than Solomon is here." Whence this was a special gift.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
