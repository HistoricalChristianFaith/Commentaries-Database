[[commentary]]
quote='''
It is reproved secondly from the light of evident truth, when it is added: Jesus answering said to them: They that are whole need not a physician, but they that are sick. This is self-evident, because, as it is said in Ecclesiasticus thirty-eight, "Honor the physician for the need you have of him: for the Most High has created him." If medicine exists on account of illness, then neither should the sick person be reproached for fleeing to the physician, nor the physician for approaching the sick person: but rather those should be reproached who reproach these things. Now Christ calls sinners infirm, because sin makes one infirm, according to that verse of the Psalm: "For my loins are filled with illusions, and there is no soundness in my flesh." Concerning such an infirm person it is said in Romans fourteen: "Now him that is weak in the faith, receive" etc.; and in the fifteenth chapter: "We that are stronger ought to bear the infirmities of the weak." But He calls Himself physician, because in Isaiah fifty-three, "by His bruises we are healed"; and in the sixty-first chapter: "The Spirit of the Lord is upon me, because He has anointed me, to heal the contrite of heart"; and in Acts ten: "He went about doing good and healing all that were oppressed by the devil."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
