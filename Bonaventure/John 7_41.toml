[[commentary]]
quote='''
"But others were saying: This is the Christ;" and these were more enlightened, whence they were divinely inspired: Matthew 16: "Whom do men say that the Son of man is? And they said: Some John the Baptist, and others Elijah, and others Jeremiah, or one of the Prophets. Jesus says to them: But whom do you say that I am? Simon Peter answering said: You are the Christ, the Son of the living God." But some were saying to the contrary, namely those blinded by the light of Scripture: "Does the Christ come from Galilee?" As if to say: no; whence also Nathanael said above in chapter one: "Can anything good come from Nazareth?" And they were moved by Scripture.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
