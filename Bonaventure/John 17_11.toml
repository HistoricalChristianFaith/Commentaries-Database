[[commentary]]
quote='''
And I am no longer in the world: because, above in the fourteenth chapter, "I will no longer speak much with you"; and these are in the world, and I come to you, and therefore I leave them desolate: above in the sixteenth chapter: "I go to him who sent me: but because I have spoken these things to you, sorrow has filled your heart." And this was the third reason for being heard; whence above in the fourteenth chapter: "I go to the Father: and whatever you ask the Father in my name, this I will do."

Holy Father. After the manifold reason for asking has been set forth, here in the fourth place is added the petition itself, by which he asks for their preservation in good: on account of which he says: Holy Father, keep them in your name, whom you have given me, that is, in the power of your name: above in the tenth chapter: "No one can snatch them from my Father's hand." Keep them, I say, in good: whence he says: That they may be one, even as we are, namely in the unity of concord and peace, which unity God preserves in the elect, but nevertheless with their own solicitude: therefore Ephesians four: "Being solicitous to preserve the unity of the Spirit in the bond of peace."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
