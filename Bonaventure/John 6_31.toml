[[commentary]]
quote='''
"Our fathers ate manna in the desert," not barley bread, but heavenly bread; whence they also add: "As it is written: He gave them bread from heaven to eat." It is written in the Psalm: "Man ate the bread of Angels; he sent them provisions in abundance." Thus they were puffed up about the miracle shown to their fathers, despising the miracle of Christ; and the Lord humbles them by showing that that Scripture was not fulfilled through Moses, but is fulfilled through himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
