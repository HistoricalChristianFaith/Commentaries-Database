[[commentary]]
quote='''
That same thing which is said to Peter in Matthew 16, I will give to you the keys, and whatsoever you shall bind upon earth, etc., is also said to the other Apostles in Matthew 18: Amen I say to you, whatsoever you shall bind upon earth shall be bound also in heaven, and whatsoever you shall loose upon earth, etc. Yet it was said far differently to them and to Peter. For to Peter it was said separately and singularly, because in him the fullness of power was to be placed principally and singularly: but to the others it was said collectively; Whatsoever you shall bind, etc., because they were called "into a share of the solicitude." Whence although they had a similar power, they did not however have an equal one: and therefore that word had to be said to the Apostles and to Peter; not however at the same time nor under the same context, but in one way and another.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'
