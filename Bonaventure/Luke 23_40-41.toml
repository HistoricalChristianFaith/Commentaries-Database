[[commentary]]
quote='''
Third, as to the confession of the penitent, he adds: But the other answering, rebuked him, saying: Do you not even fear God, seeing that you are under the same condemnation! Which he says by detesting another's fault, which is the work of one truly penitent, according to that word in Ephesians 5: "Do not participate in the unfruitful works of darkness, but rather reprove them." — And not only another's, but indeed also his own; whence he adds: And we indeed justly, for we are receiving what is worthy of our deeds. And this is truly of the penitent, according to that word in Daniel 3: "You are just, O Lord, in all that you have done to us, and all your works are true"; "for we have sinned and acted wickedly, departing from you." — For he not only acknowledges his own fault, but also proclaims the innocence of Christ; whence he adds: But this man has done nothing evil, according to that word in 1 Peter 2: "Who committed no sin, nor was deceit found in his mouth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
