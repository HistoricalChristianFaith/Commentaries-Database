[[commentary]]
quote='''
Thirdly, as to the third excuse, which comes from the desire of wantonness, he adds: And another said: I have married a wife, and therefore I cannot come. This wife is the concupiscence of the flesh, of which Ecclesiastes 7: "I have found a woman more bitter than death, who is the snare of hunters, and her heart is a net." She is called a wife on account of the vehement clinging of desire; 1 Corinthians 6: "Do you not know that he who cleaves to a harlot is made one body? For they shall be, he says, two in one flesh." — And therefore he adds: And therefore I cannot come. Nor does he add: Have me excused, because the sin of the flesh alone is that which least cloaks itself under the appearance of virtue and is least excused; and yet according to truth it is more excusable on account of the greater proneness of concupiscence, according to that passage in Romans 7: "I find another law in my members, warring against the law of my mind and bringing me into captivity to the servitude of sin." And for this reason he says: I cannot come, because, as Bernard says, "just as fire and water cannot exist together, so spiritual delights and carnal delights are not compatible in the same person." Yet this man lies, because such a one, even if he is a slave of concupiscence, can do that by the doing of which he may have grace, through which he may have the power of subduing concupiscence. Whence Romans 7: "Unhappy man that I am! Who shall deliver me from the body of this death?" And he answers immediately: "The grace of God through Jesus Christ our Lord," because, Philippians 2, "It is God who works in you both to will and to accomplish according to his good will." — And note here that although a wife is lawfully had, yet on account of abuse and on account of the vice joined to it, through a good thing an evil is understood. On account of which the Apostle also says in 1 Corinthians 7: "It remains that those who have wives be as though not having them"; as also the Gloss says, that "many marry wives not for the sake of fecundity, but for the desires of the flesh. Therefore by this thing carnal pleasure is designated"; whence it is not unfitting that a wife by reason of the sacramental bond designates the Church, the spouse of Christ, and by reason of desire can designate the concupiscence of carnal pleasure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
