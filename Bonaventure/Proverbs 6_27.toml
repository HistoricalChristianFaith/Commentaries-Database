[[commentary]]
quote='''
She is a net to those who lust and consent. Whence in Ecclesiasticus: "On account of the beauty of a woman many have perished." It is difficult "to carry fire in one's bosom without one's garments being burned."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'
