[[commentary]]
quote='''
They took therefore. The devotion of Nicodemus is touched upon in the embalming of the body. They took therefore, namely he and Joseph, the body of Jesus and bound it in linen cloths with the spices, they anointed it, supply: as is the custom of the Jews to bury, namely honorably; Genesis, last chapter: "Joseph commanded his servants the physicians to embalm his father with spices." Chrysostom: "They bury him not as one condemned, but, as is the custom among the Jews, very honorably indeed, as someone great and wonderful."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
