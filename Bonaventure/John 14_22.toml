[[commentary]]
quote='''
Judas said to him, etc. Here in the fourth place it is expressed that merit lies in the observance of the commandments. For because he had said that he was to manifest himself to the Apostles and not to the world, the disciple began to wonder why he said this. On account of which there follows: Judas, not the Iscariot, said to him: Lord, what has happened, that is, what is the cause of this, that you are about to manifest yourself to us and not to the world? And the Lord answers him that merit is the cause, because they do not observe the commandments, in which lies the merit of seeing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
