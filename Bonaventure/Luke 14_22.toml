[[commentary]]
quote='''
Secondly, regarding the compulsion of the negligent, which follows the calling of the humble, he adds: And the servant said: Lord, it has been done as you commanded, and there is still room: because there are not as many humble as there are predestined to life, nor are there as many willing for eternal life as there are predestined by God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
