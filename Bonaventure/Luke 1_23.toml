[[commentary]]
quote='''
Therefore first mutual cohabitation is indicated, when he says: And it came to pass, when the days of his office were fulfilled, he went to his house, namely to cohabit and to render the debt to his wife; whence Chrysostom says that on the same night he begot a son. But he did this by the law of marriage: 1 Corinthians 7: "Do not defraud one another except by consent for a time, that you may be free for prayer; and return again to the same." And therefore, as long as Zechariah was fulfilling the days of his office, he did not approach his wife: Exodus 19: "Let the priests who approach me be sanctified, lest I strike them"; and for this reason the Hebrews say that Uzzah was struck, 2 Kings 6, because he had known his wife by night when he touched the ark. For it was not permitted to pass immediately from the embrace of Leah to Rachel, as in Genesis 29 it is said to Jacob: "Complete the week of days of this union."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
