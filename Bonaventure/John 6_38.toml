[[commentary]]
quote='''
Here the third point is touched upon, why namely he refreshes only the predestined and those called by God. The reason is the conformity of his will to the divine will: therefore he says: "Because I came down from heaven," by assuming flesh, "not to do my own will," disagreeing with the Father, "but the will of him who sent me," obeying him in all things: whence Philippians 2: "He was made obedient" to the Father "unto death, even the death of the cross"; above in the fifth chapter: "I do not seek my own will, but the will of him who sent me." But the will of the Father is that the elect and called be refreshed by this bread.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
