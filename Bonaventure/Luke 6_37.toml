[[commentary]]
quote='''
The first is noted when he adds: Do not judge, and you shall not be judged: in Matthew 7 it is said: "With what judgment you judge, you shall be judged." And because he does not mean any judgment whatsoever, but that which deviates from piety into cruelty, therefore he adds: Do not condemn, and you shall not be condemned: Romans 2: "In that you judge another, you condemn yourself," because, as is said in Proverbs 17, "both he who justifies the wicked and he who condemns the just are abominable before God." Whence he recalls from the judgment of iniquity and exhorts to the benefit of piety, which consists in forgiving and giving: in forgiving injury and in giving indulgences, or in forgiving evils committed and in giving goods granted. As to the forgiveness of evils, he adds: Forgive, and you shall be forgiven. Otherwise you do not pray profitably, Matthew 6: "Forgive us our debts," etc.; and afterward: "If you do not forgive men, neither will your Father forgive you your sins." Whence Sirach 28: "Forgive your neighbor who hurts you, and then when you pray, your sins shall be loosed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
