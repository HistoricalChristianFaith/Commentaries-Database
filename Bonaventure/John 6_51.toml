[[commentary]]
quote='''
In the second place, it is lifted up to the vision of the city coming down from heaven, that is, of the assumed humanity. Indeed, the Son of God descended to our humanity, and this, for Jerusalem, is to come down. But the souls do not come down. He said: "I am the bread that has come down from heaven," and with Him [came down] all the charismatic graces. Wisdom says: "All good things together came to me in her company." And so, when the soul is lifted up by an influx into it of divine strength, light, and warmth, it worships piously, sees clearly, and enjoys holily, and through this it comprehends the marvelous origin, the marvelous fall, the marvelous ascent or ascending, the marvelous return. Then it has the four sides of the city coming down from heaven. I mean there is a marvelous origin in the nativity, a marvelous fall in the crucifixion, a marvelous ascent in the resurrection and ascension, and [there will be] a marvelous return at the time of the judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252023.html'
source_title='Collations on the Hexaemeron, Collation 23'

[[commentary]]
quote='''
"I am the living bread," through essence, because having life in himself: above in chapter five: "Just as the Father has life in himself, so he has given to the Son also to have life in himself." "Who descended from heaven," through the abundance of mercy: Exodus three: "I have seen the affliction of my people in Egypt and their sorrow, and I descended to deliver them."

"If anyone shall eat of this bread, he shall live forever," through glory. Concerning this eating, Song of Songs five: "Eat, friends, and drink, and be inebriated, dearest ones"; this will be in glory. From this kind of eating the sinner was prohibited in the figure of Adam: Genesis three: "Now therefore, lest perhaps he take from the tree of life and eat and live forever."

Above the Lord showed that he is the bread that refreshes according to his divine nature; here he shows according to his human nature. And since this seemed false and harsh or hard, therefore this part has three parts: first is set forth the instruction of the faithful; second, its confirmation on account of the disputation of the Jews; third, its explanation on account of the scandal of the disciples.

A brief instruction is set forth, in which he says that his flesh is bread; on account of which he says: "And the bread which I shall give," namely for refreshment, according to what we ask in the Lord's Prayer: "Give us this day our supersubstantial bread," Matthew 6: "is my flesh," which namely refreshes: First Corinthians 10: "The bread which we break, is it not the body of the Lord?" "For the life of the world," namely the flesh of Christ was given, when it was exposed to suffering, according to that passage in Lamentations 3: "He will give his cheek to the one who strikes him," indeed his whole body; whence Isaiah 50: "I gave my body to those who struck me and my cheeks to those who plucked them"; and not only for striking, but indeed also for immolation; whence Ephesians 5: "He delivered himself for us as an offering and sacrifice to God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
