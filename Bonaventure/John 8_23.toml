[[commentary]]
quote='''
"And he said to them: You are from below": above in chapter three: "He who is of the earth speaks of the earth"; "but I am from above," and therefore I go upward: and for this reason "where I go, you cannot come": because, as is said above in chapter three, "no one ascends into heaven except he who descended from heaven"; therefore you descend, but I ascend. Again: "You are of this world," because you cling to this world through love: "but I am not of this world," therefore I leave you in the world, and "where I go, you cannot come"; below in chapter sixteen: "I came forth from the Father and came into the world; again I leave the world and go to the Father." Thus he explains what he had said: "Where I go": this is to be understood through power, not through weakness. He also expounds what he said: "You will die in your sin."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
