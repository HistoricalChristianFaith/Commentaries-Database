[[commentary]]
quote='''
"I am the good shepherd." Here Christ's diligence toward the sheep is noted, which consists in the discernment and knowledge of the sheep, on account of which he calls himself the good shepherd: wherefore he says: "I am the good shepherd, and I know my sheep, and my sheep know me"; and in this is noted his diligence, according to that word of Proverbs 27: "Be diligent to know the countenance of your cattle, and consider your flocks"; 2 Timothy 2: "The Lord knows who are his." This diligence he makes manifest through a comparison; whence he adds:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
