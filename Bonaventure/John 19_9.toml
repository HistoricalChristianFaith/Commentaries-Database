[[commentary]]
quote='''
He entered again into the praetorium and said to Jesus: Whence art thou? He asks about his origin, because they accused him of this: he asks a great question beyond his powers: whence Isaiah 53: "His generation, who shall declare it?" And therefore he does not hear a response: Ecclesiasticus 3: "Seek not the things that are too high for thee, and search not into things above thy strength." Whence he says: But Jesus gave him no answer, so that the word of Isaiah 53 might be fulfilled: "As a lamb before his shearer shall be dumb, and shall not open his mouth." Augustine: "For this reason the similitude of the lamb was given, so that in his silence he might be held not as guilty, but as innocent"; Lamentations 3: "Out of the mouth of the Most High shall proceed neither good nor evil."

It is asked: why did the Lord not respond to Pilate asking: Where are you from? This seems to have been from arrogance. I respond that he did not answer that question because he could not grasp it: hence the Lord said to his disciples above in the sixteenth chapter: I have many things to say to you, but you cannot bear them now. So also here.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
