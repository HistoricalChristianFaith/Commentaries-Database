[[commentary]]
quote='''
Third, as regards the perfect merit of devout faith, there is added: But he said to the woman: Your faith has saved you, namely from sins: faith, I say, in Christ, of which Matthew one says: "He shall save his people from their sins"; and this through faith: Romans three: "God justifies the one who has faith in Jesus Christ." And because justice makes peace with God and with conscience, therefore he adds: Go in peace: Romans five: "Being justified therefore by faith, let us have peace with God"; and Isaiah fifty-seven: "Let peace come, and let him rest in his bed"; so that concerning her it may be said, that word of Malachi two: "In peace and in equity he walked with me and turned many away from iniquity."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
