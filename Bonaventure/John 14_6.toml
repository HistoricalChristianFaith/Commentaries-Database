[[commentary]]
quote='''
Christ instituted the seven Sacraments of the law of grace as the mediator of the new testament and the chief lawgiver, in which law he called to the promises eternal, gave directing precepts, and instituted sanctifying Sacraments. By reason of supreme goodness, he set forth beatifying promises; by reason of supreme truth, he gave directing precepts; but by reason of supreme power, he established assisting Sacraments: so that through the Sacraments power might be restored for fulfilling the directing precepts, and through the directive precepts one might arrive at the eternal promises, with the eternal Word, namely Christ the Lord, bringing this about in the evangelical law, insofar as he is the way, the truth, and the life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"

[[commentary]]
quote='''
No one is wise unless he is taught by God, for "No one comes to the Father but through Me," says the Saviour. No one is taught in matters of faith except through God; and because it comes about through God's voice, it is said: "God called the firmament heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25208.html'
source_title='Collations on the Hexaemeron, Collation 8'

[[commentary]]
quote='''
Jesus says to him: I am the way, the truth, and the life. The truth and the life with respect to the destination, because the truth regards the intellect, the life regards the affection. I am the way for those seeking, the truth for those finding, the life for those remaining without death.

I am the way that does not err: Psalm: "They wandered in a pathless waste and not in the way." I am the truth that does not deceive: Psalm: "The Lord is faithful in all his words." The life that does not fail: Luke ten: "Mary has chosen the best part, which shall not be taken from her."

I am the way teaching: Proverbs 4: "I will lead you through the paths of equity, which when you have entered, your steps shall not be straitened, and running you shall have no stumbling block." I am the truth shining; Malachi, the last chapter: "The sun of justice shall arise for you who fear God." The life nourishing: above in the tenth chapter: "If anyone enters through me, he shall be saved: and he shall go in and go out and shall find pastures."

I am the way by example: above in the thirteenth chapter: "I have given you an example, that as I have done to you, so you also should do." I am the truth in promise: the Psalm: "What proceeds from my lips I shall not make void." I am the life in reward: Romans 6: "The wages of sin is death: but the grace of God is life eternal." And that he is the way, he shows: No one comes to the Father except through me, and through me one assuredly comes.

There is a question about the Lord's response to Thomas: I am the way, the truth, and the life. How is the same one, who goes, the way? How also is he himself the life and the terminus? This seems very unfitting. It must be said that he himself is the one who goes, and through whom one travels, and to whom one arrives: and thus he is the truth, which goes; the way, through which one travels; the life, to which one arrives. And this is on account of the plurality of natures: because as man, he goes; because as God, he is the terminus; because as mediator of God and men, he makes the way.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'

[[commentary]]
quote='''
In this manner it is possible to find in the illumination of mechanical art, whose entire intention is directed toward the production of artifacts. In which we can perceive these three things, namely the generation and incarnation of the Word, the order of living, and the covenant of God and the soul. And this, if we consider the origin, the effect, and the fruit; or thus: the art of working, the quality of the artifact produced, and the usefulness of the fruit derived.

If we consider the origin, we shall see that the artificial product proceeds from the artisan by means of a likeness existing in his mind, through which the artisan conceives before he produces, and then produces as he has planned. Moreover, the artisan produces an exterior work conformed to the interior exemplar as closely as he can; and if he could produce such a product that would love and know him, he would certainly do so; and if that product were to know its maker, this would be by means of the likeness according to which it proceeded from the artisan; and if it had darkened eyes of knowledge, so that it could not raise itself above itself, it would be necessary, in order that it might be led to knowledge of its maker, that the likeness through which the product had been produced should condescend to that nature which could be grasped and known by it.

By this manner understand that from the supreme Artisan no creature proceeded except through the eternal Word, "in whom He disposed all things," and through whom He produced not only creatures having the nature of a vestige, but also of an image, so that they might be assimilated to Him through knowledge and love. And since through sin the rational creature had the eye of contemplation clouded over, it was most fitting that the eternal and invisible should become visible and assume flesh, in order to lead us back to the Father. And this is what is said in John fourteen: No one comes to the Father except through me; and Matthew eleven: No one knows the Father except the Son, and anyone to whom the Son wills to reveal Him. And therefore it is said the Word was made flesh. Considering therefore the illumination of mechanical art with respect to the production of the work, we shall behold therein the Word begotten and incarnate, that is, the Divinity and the humanity and the integrity of the whole faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FDe%2520Reductione%2520Artium%2520ad%2520Theologiam%2FOpusculum%2520de%2520reductione%2520artium%2520ad%2520theologiam.html'
source_title='On the Reduction of the Arts to Theology'

[[commentary]]
quote='''
The soul, therefore, believing, hoping in, and loving Jesus Christ, who is the Word incarnate, uncreated, and inspired, that is, the way, the truth, and the life: when through faith it believes in Christ as the Word uncreated, which is the Word and splendor of the Father, it recovers spiritual hearing and sight, hearing to receive the words of Christ, sight to consider the splendors of that light. When, however, through hope it sighs to receive the Word inspired, through desire and affection it recovers spiritual smell. When through charity it embraces the Word incarnate, receiving from it delight and passing over into it through ecstatic love, it recovers taste and touch.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25204.html'
source_title='Itinerarium Mentis in Deum, Chapter 4'

[[commentary]]
quote='''
These six considerations having therefore been traversed, as if they were the six steps of the throne of the true Solomon, by which one arrives at peace, where the true peaceful one rests in a peaceful mind as in an interior Jerusalem; and as if also the six wings of the Cherub, by which the mind of the true contemplative, filled with the illumination of supernal wisdom, may be borne upward; and as if also the first six days, in which the mind must be exercised, so that it may at last arrive at the sabbath of rest; after our mind has contemplated God outside itself through vestiges and in the vestiges, within itself through the image and in the image, above itself through the similitude of the divine light shining upon us and in that light itself, insofar as is possible according to the state of wayfaring and the exercise of our mind; when at last in the sixth step it has arrived at this point, that it contemplates in the first and highest principle and the mediator of God and men, Jesus Christ, those things whose likenesses can in no way be found in creatures, and which exceed all keenness of the human intellect: it remains that, in contemplating these things, it should transcend and pass beyond not only this sensible world, but also itself; in which passing over, Christ is the way and the door, Christ is the ladder and the vehicle, as it were the mercy seat placed upon the ark of God and the mystery hidden from the ages.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25207.html'
source_title='Itinerarium Mentis in Deum, Chapter 7'

[[commentary]]
quote='''
The summit of all Christian perfection revolves around three things, namely around grace, justice, and wisdom, according to which three things Christ is said to be the way, the truth, and the life. For the gift of grace provides the way to the truth of justice, in which consists the exercise of action; the truth of justice leads to the taste of wisdom, in which consists the consolation of contemplation; when these have been perfectly attained, one ascends to the summit of evangelical perfection, which Christ Jesus taught by word and example, who specially professed himself the master of humility, in Matthew 11: Learn from me, etc. For humility is the gateway of wisdom, the foundation of justice, and the dwelling place of grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25201.html'
source_title='Disputed Questions on Evangelical Perfection, Question 1'
