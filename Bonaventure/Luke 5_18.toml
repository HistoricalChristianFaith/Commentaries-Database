[[commentary]]
quote='''
Third, to show the gravity of the oppressing illness, he adds: And behold, men carrying on a bed a man who was paralyzed, and thus entirely powerless, because paralysis entirely dissolves the strength of the limbs, as is read concerning Alcimus in 1 Maccabees 9: "His mouth was shut, and he was dissolved with paralysis, nor could he speak a word any longer." Truly a great and pitiable infirmity, which takes away both movement and speech. And he was carried on a bed — not, I say, on a bed of rest, but rather of labor and pain; whence one could pray concerning him: "The Lord help him upon the bed of his pain," etc. Therefore the men who carried him acted mercifully, according to the instruction of the Apostle, Galatians 6: "Bear one another's burdens"; whence that passage from Ecclesiasticus 44 could fittingly apply to them: "These are men of mercy, whose acts of piety have not failed"; and already that passage from Isaiah 49 is verified in this deed: "They shall bring your sons in their arms, and your daughters they shall carry upon their shoulders."

Fourth, to intimate the solicitude of the presenting faith, he adds: And they sought to bring him in and place him before him, so that, namely, he might be healed by his presence. Whence they wished to fulfill the exhortation of the Psalm: "Seek the Lord and be strengthened; seek his face always." Nor undeservedly, because Job 17: "Deliver me, O Lord, and set me beside you, and let the hand of whomever fight against me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Commentary on Luke, Chapter 5'
