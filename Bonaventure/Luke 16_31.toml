[[commentary]]
quote='''
Fourth, with regard to the approval of the response already given, he adds: But he said to him: If they do not hear Moses and the Prophets, namely by obeying them: for thus they are to be heard, according to that passage in Revelation 1: "Blessed is he who reads and hears the words of this prophecy and keeps them," etc. He who does not hear such great witnesses despises the truth of God, according to that passage in Ezekiel 3: "The house of Israel will not hear you, because they will not hear me. For the whole house of Israel is of a hardened brow and an untamable heart." Whence, because they resist so great a truth, hardened and incapable of believing, he therefore adds: Neither will they believe, even if someone should rise from the dead. And the reason for this consequence is that he who does not believe the more credible testimony will not believe the less credible either. We have an example of this in Lazarus, another who was raised, whom the unbelieving Jews not only did not believe, but rather, as is said in John 12, "the Jews planned to kill Lazarus, because many on account of him were going away and believing from among the Jews." But the obstinate Pharisees not only did not believe, but even wished to extinguish the faith of those who believed. We also have an example of this in Christ, in whom, even when raised, the Jews refused to believe. Whence Chrysostom says: "Christ rose from the dead and announced what evils were in hell; he descended also from heaven and preached what good things were there; yet he was not believed." And this is because such men rejected the testimony of the Law and the Prophets; John 5: "If you believed Moses, you would perhaps believe me also; for he wrote of me. But if you do not believe his writings, how will you believe my words?"

From the foregoing, therefore, it is apparent that mercy was in every way denied to the unmerciful rich man by Abraham, the most loving father, so that that passage in Isaiah 63 might be fulfilled: "You, O Lord, are our father, and Abraham did not know us." And thus that passage in James 2 is verified: "Judgment without mercy shall be done to him who does not show mercy"; and Wisdom 19: "Upon the impious, wrath came without mercy even to the last." For to such as these is said at the judgment that passage in Matthew 25: "Depart from me, you cursed, into everlasting fire, which was prepared for the devil and his angels."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke, Chapter 16'
