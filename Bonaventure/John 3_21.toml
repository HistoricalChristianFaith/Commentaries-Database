[[commentary]]
quote='''
"But he who does the truth comes to the light": Matthew 5: "No one hides a lamp under a bushel, but upon a lampstand"; because good works are light. Whence he also adds: "That his works may be made manifest, because they have been done in God." Those things are done in God which are done in charity: 1 John 4: "He who abides in charity abides in God, and God in him," who is the highest light, and therefore they are to be revealed to his honor: Matthew 5: "So let your light shine before men, that they may see your good works and glorify your Father, who is in heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
