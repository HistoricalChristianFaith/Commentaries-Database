[[commentary]]
quote='''
For which reason he adds: And they constrained him, saying: Stay with us, because it is toward evening, and the day is now far spent. And he went in with them. Gregory says: "From this example it is gathered that strangers are not only to be invited to hospitality, but even to be drawn in"; and therefore in Hebrews, the last chapter: "Do not forget hospitality. For by this some have pleased God, having received Angels as guests." Upon which Chrysostom says: "Therefore great is the reward of Abraham, because not knowing them to be Angels, he received them in hospitality; for if he had known, it would have been nothing remarkable." So also the reward was great for these men, because if they had recognized Christ and received him in hospitality, it would not have been great; but they drew him to themselves so forcefully as a stranger and, as it were, a sojourner: Job 31: "The stranger did not remain outside"; and Isaiah 58: "Break your bread for the hungry."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
