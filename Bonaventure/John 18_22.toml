[[commentary]]
quote='''
"When he had said these things." Here the third point is set forth, namely the infliction of injury on account of the response, by deed and by word. By deed: "One of the officers standing by struck Jesus with his palm:" Lamentations three: "He shall give his cheek to the one who strikes him"; and Micah five: "They shall strike the cheek of the judge of Israel." He was injured by word, saying: "Do you answer the high priest thus?" As if to say: you answer foolishly, because one must answer the high priest humbly: whence they said to Paul, Acts twenty-three: "Do you revile the high priest of God?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
