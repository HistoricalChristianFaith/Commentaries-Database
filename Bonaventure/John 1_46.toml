[[commentary]]
quote='''
"And Nathanael said to him: From Nazareth can anything good be. Philip said to him: Come and see." This text is read affirmatively, so that the sense is that something good can be from Nazareth, on account of what is written in Matthew 2: "What was written through the Prophet, that he shall be called a Nazarene," and this is taken from Isaiah 11, according to the Hebrew truth; where we have: "A flower shall ascend from his root," they have: "Nazarene." Therefore Nathanael, understanding this as one skilled in Scripture, affirmed it. Otherwise it is read interrogatively, as though doubting he asks: "From Nazareth can anything good be?" namely so great a good, because as is written in Micah 5: "And you, Bethlehem Ephrata, little one" etc., Christ was to be born from Bethlehem. Therefore the Jews said below in chapter 7: "Does Christ come from Galilee?" Whether it is read affirmatively or interrogatively, Philip here asserts and exhorts that he should come. On account of which there follows: "Philip said to him: Come and see": Chrysostom: "Philip, unable to demonstrate through words the riches which he found, leads his brother to the discovered treasure." And it should be understood that he followed Philip.

Likewise, it is asked about the obedience of the Apostles, because they followed immediately, having seen no signs. It seems that they were foolishly moved. It can be answered that they were illuminated interiorly; or also it must be said that they were led exteriorly, some by testimony, as Andrew and his companion; some by miracle, as is said of Peter in Luke 5; some by example, and thus Philip, because he saw Peter and Andrew, his fellow countrymen, following, whom he knew to be good men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
