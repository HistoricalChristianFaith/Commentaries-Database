[[commentary]]
quote='''
In Christ is the consummation of every good. "And this is eternal life, that they may know You, the only true God, and Jesus Christ whom You have sent." Those things which are above, we ought to desire, to see, and to do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25209.html'
source_title='Collationes de Septem Donis, Collation 9'

[[commentary]]
quote='''
Hence this fruit comes from Christ in a threefold manner, because Jesus Christ is the Son of God. Because He is Jesus, from Him comes the fruit of grace; because He is Christ, from Him comes the fruit of righteousness; because He is the Son of God, from Him comes the fruit of wisdom. For all these considerations both proceed from Christ and lead back to Him. If you come to the eternal rewards, these we shall not have except through Christ. John writes: "Now this is everlasting life, that they may know Thee, the only true God, and Him whom Thou hast sent, Jesus Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252018.html'
source_title='Collations on the Hexaemeron, Collation 18'

[[commentary]]
quote='''
This is, he says, eternal life, that they may know you, the only true God, and Jesus Christ whom you have sent; 3 Kings 10: "Blessed are your men, and blessed are your servants, who stand before you always and hear your wisdom." "To know you is perfect justice," Wisdom 15; and glory is nothing other than perfect justice, because "to know your justice and your power is the root of immortality," and therefore of eternal life.

Likewise, there is a question about what he says: This is eternal life, that they may know you, the only true God. It is not only knowledge, but also love: or if you say that love is included in knowledge, why did he not place love there? Likewise, God is taken either essentially or personally. If personally, then the Holy Spirit is excluded. If essentially, then he added in vain: Whom you have sent, Jesus Christ, because knowledge of Christ-as-man does not pertain to the substantial reward, but knowledge of Christ-as-God does. To the first, it must be said that in knowledge which is face to face, love is necessarily understood; hence when it is said that "vision is the whole reward," love is not excluded. But it is spoken of more in terms of vision than love, because vision distinguishes what belongs to the homeland from what belongs to the way; but love does not. For now we do not see, yet nevertheless we love. As to the question of how God is taken: it must be said that if it stands there essentially, then what is added, and whom you have sent, is understood according to the human nature, according to which, even if the essence of the reward is not considered, nevertheless there will be a most intense delight in Christ-as-man, and so it is added: and whom you have sent, Jesus Christ. Or if it is taken personally, then Jesus Christ stands for the Son according to the divine nature, and the Holy Spirit is not excluded, because he is the union of the Father and the Son. Hence the word only is not added for the exclusion of the persons, because he who sees one person sees the other, but for the exclusion of false gods.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'

[[commentary]]
quote='''
For the Cherubim also designate this, who looked upon one another. Nor is it without mystery that they looked upon one another with their faces turned toward the mercy seat, so that what the Lord says in John may be verified: "This is eternal life, that they may know thee, the only true God, and Jesus Christ whom thou hast sent." For we ought to admire not only the essential and personal conditions of God in themselves, but also by comparison to the superadmirable union of God and man in the unity of the person of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25206.html'
source_title='Itinerarium Mentis in Deum, Chapter 6'

[[commentary]]
quote='''
That eternal generation is always most actual and most complete: although the actuality of any act is better expressed through the present tense, the completion and perfection of an act is most fully expressed through the past tense. Hence that eternal generation cannot be sufficiently expressed through any single tense; rather, it is necessary to employ diverse tenses for its expression, because it is above all time and has in itself whatever completeness can be signified through any tense. But by that reason by which all these are one in it, it is sufficiently expressed through no word whatsoever: for it is no wonder if the clamor of temporal words does not suffice to express that most quiet silence of eternity and of eternal generation, which is better understood than spoken: better believed in the present than understood: and will be better seen in the future than it is now believed: for, as the Savior says, this is eternal life, that they may know Thee, the only true God, and Jesus Christ whom Thou hast sent: to which we can in no way attain unless our intellect is more fully elevated above the variations of time and above the cloudiness of phantasms into the freedom of supercelestial rest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Mysterio%2520Trinitatis%2FQuestion%25205.html'
source_title='Quaestiones Disputatae, De Mysterio Trinitatis, Question 5'

[[commentary]]
quote='''
This fountainhead, however, is in a certain way the origin of another totality. For since the Father produces the Son, and through the Son and with the Son produces the Holy Spirit, therefore God the Father, through the Son with the Holy Spirit, is the principle of all created things: for unless He produced them from eternity, He could not produce through them in time: and therefore by reason of that production in the Trinity He is rightly said to be the fountain of life. For just as He has life in Himself, so He gives the Son to have life in Himself, etc. Hence it is that eternal life is this alone, that the rational spirit, which flows from the most blessed Trinity and is the image of the Trinity, returns by way of a certain intelligible circle through memory, understanding, and will, through the deiformity of glory into the most blessed Trinity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Mysterio%2520Trinitatis%2FQuestion%25208.html'
source_title='Quaestiones Disputatae, De Mysterio Trinitatis, Question 8'
