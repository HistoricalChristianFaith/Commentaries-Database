[[commentary]]
quote='''
"For John had not yet been cast into prison," because then his baptism ceased, the master being absent, for it was temporal. Concerning the imprisonment of John, Matthew 14: "Herod seized John and bound him and cast him into prison."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
