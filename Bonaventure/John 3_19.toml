[[commentary]]
quote='''
Here the third point is touched upon, namely that the impediment to salvation and the reason for damnation and judgment is on the part of a defect of good works, by reason of which man flees from salvation. For this reason he says: "And this is the judgment": The Gloss: "That is, the cause of damnation": "because the light came into the world," that is, the incarnate Word: in chapter 12: "I have come as a light into the world, that whoever believes in Me may not remain in darkness." "And men loved darkness more," namely of error, "than light," of truth: Job 24: "They were rebels against the light." And the reason for this blindness is a defect of good works; on account of which he says: "For their works were evil." And he shows that an evil work is the reason for fleeing the light.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
