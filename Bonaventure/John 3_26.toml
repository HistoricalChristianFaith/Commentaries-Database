[[commentary]]
quote='''
"And they came to John and said to him: Rabbi! He who was beyond the Jordan with you," he was with you as a lesser, because you baptized him, whom you also exalted: whence they add: "To whom you bore witness": in the first chapter: "John bears witness concerning him" etc.: "behold, this one baptizes," as if to say, he usurps your office. And to provoke him to jealousy, they add: "And all come to him," as if no longer caring about you. They were moved by jealousy. Joshua did something similar: in Numbers 11, concerning the men who were prophesying, he said to Moses: "My lord, forbid them. And Moses answered: Why are you jealous for my sake? Would that all the people might prophesy, and that the Lord would give them his spirit"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
