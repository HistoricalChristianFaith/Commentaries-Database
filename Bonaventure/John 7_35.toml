[[commentary]]
quote='''
Here the consequent doubt of the Jews is noted, arising from the fact that they did not understand him; whence they say: "The Jews therefore said: Where is this man about to go, that we will not find him?" And conversing among themselves, they ask about the place: "Is he perhaps about to go to the dispersion of the Gentiles and teach the Gentiles?" "Here by doubting, as Augustine says, they prophesied. For he was about to go to the Gentiles, not through the presence of his body, but through the Apostles: Psalm: 'The people whom I had not known served me; at the hearing of the ear they obeyed me.'" And because they doubted greatly, therefore they repeat the doubt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
