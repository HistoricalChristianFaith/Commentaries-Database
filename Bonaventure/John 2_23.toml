[[commentary]]
quote='''
When he was in Jerusalem. Here is touched upon the building up of the faith of the Jews at the sight of signs of power. For it must be understood that he did many things, although the Evangelist did not describe them, as Chrysostom says. Therefore he says: When he was in Jerusalem at the Passover, on the feast day, to which, namely, he had gone up: many believed in his name, seeing the signs that he did. Their faith rested upon signs: below, chapter seven: "But many of the crowd believed in him, seeing the signs that he did"; and because they rested upon signs, therefore they were weak in faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
