[[commentary]]
quote='''
When therefore they had seen him. Here upon the showing of Christ there follows thirdly the hardening of the obstinacy of the Jews, especially of the chief priests: whence he says: When therefore the chief priests and ministers had seen him, they cried out saying: Crucify, crucify him. Isaiah 5: "I expected that he would do judgment: and behold, a cry." They say crucify twice to show the obstinacy of their mind: Jeremiah 12: "My inheritance has become to me as a lion in the forest: it has uttered its voice against me"; and the Psalm: "They opened their mouth against me like a lion seizing and roaring," on account of the cry.

Pilate says to them. Above, Pilate strove to free Christ by a judgment of kindness and of severity: here he strives by a judgment of equity, recurring to innocence, that it is just to release an innocent man and never to kill without cause. And the Jews resist this in two ways: first by accusing and then by threatening.

First therefore is set forth the justification of Christ, on account of which Pilate does not wish to condemn him, but offers him to the Jews: whence he says: Pilate says to them, who were seeking that Christ be crucified: Take him yourselves and crucify him: for I find no cause in him: and therefore I am unwilling to crucify without cause. Truly he did not find cause, because, 1 Peter 2, "he committed no sin, nor was deceit found in his mouth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
