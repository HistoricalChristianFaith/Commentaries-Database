[[commentary]]
quote='''
Here in the fourth place, after the congruity in the testimony has been described, the belief among the people is noted. To express this, there is indicated maturity in the teacher, eagerness to hear in the people standing by, truth in the instruction, and belief in those instructed. To express, therefore, the maturity in the teacher, it says: And when he had closed the book, he returned it to the minister and sat down. Previously he had read standing, receiving the book with humility; now he returns it and sits down with authority, for to sit is the mark of doctors and kings; whence Matthew 23: "The scribes and Pharisees have sat upon the chair of Moses"; and Job 29: "If at any time I wished to go to them, I sat first; and when I sat as a king, with the army standing round about, I was nevertheless the consoler of those who mourned." And note: here by the closing of the book we ought to understand the concealment of divine mysteries, because not all things are to be revealed to all, according to what Bede says: "He returns the closed book to the minister, because not all things are to be communicated to all, but according to the capacity of the hearers he entrusts the word to the doctor to be dispensed"; Daniel 12: "Go, Daniel, for the words are closed and sealed until the appointed time." Or he returned the closed book to the minister because, according to that passage of Second Corinthians 3, "even to this day, when Moses is read, a veil is placed over their heart."

To express the eagerness in the people, there is added: And the eyes of all in the synagogue were fixed on him, as though desiring to hear him as a wise man: in Wisdom eight the wise man says: "In the sight of princes I shall be admirable: when I am silent they will wait for me, and when I speak they will look upon me"; and Job twenty-nine: "Those who heard me waited for my judgment and, attentive, were silent at my counsel"; because, as is said in Sirach three, "a good ear will hear wisdom with all desire."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
