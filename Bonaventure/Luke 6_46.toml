[[commentary]]
quote='''
Third, deceitful pretense is rebuked, when he adds: Why do you call me: Lord? namely by confession of the mouth, and do not do what I say, by omission of good works. For the display of reverence on the lips is false unless there is equally present the exhibition of obedience in deed: whence concerning such persons, Isaiah twenty-nine: "This people draws near with their mouth and glorifies me with their lips, but their heart is far from me"; and Matthew fifteen: "This people honors me with their lips, but their heart is far from me"; and Titus one: "They profess to know God, but by their deeds they deny him." And so there is a contradiction in them, because the word indicates goodness in the heart, and the deed shows malice in action. Such persons do not deceive the Lord, but they deceive themselves, according to that passage in James one: "Be doers of the word and not hearers only, deceiving yourselves"; whence Matthew seven: "Not everyone who says to me: Lord, Lord, shall enter into the kingdom of heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
