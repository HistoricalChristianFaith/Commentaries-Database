[[commentary]]
quote='''
Jesus answered. Here the second point is touched upon, namely the instruction of the disciples. For because, strengthened by the Lord's discourse, they believed themselves consoled and perfected in faith, the Lord teaches them to think humbly, as he did above to Peter; therefore he takes up their words again, in order to correct them. For this reason he says: Jesus answered them: Do you now believe, that is, you boast of this, that you believe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
