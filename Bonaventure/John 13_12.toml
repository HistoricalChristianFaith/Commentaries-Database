[[commentary]]
quote='''
After therefore he had washed the feet, etc. After he set forth the example, he exhorts to imitate him, and this indeed he does in this manner: first from the consideration of the dignity of the Master; second, the greatness of the reward; third, the excellence of the merit. He exhorts therefore from the consideration of the dignity of the Master: because the Master and Lord himself did this, therefore they too ought to do it: and therefore, when he had risen as a servant, he now begins to teach as a master. Therefore he also takes up his garments again and asks for their attention: on account of which he says: After therefore he had washed their feet, he took his garments, which, namely, he had laid aside in order to serve: and when he had reclined again, he says to them again: Do you know what I have done to you? He makes them attentive to attend, because he must teach as Master: and his teaching is that they should imitate him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
