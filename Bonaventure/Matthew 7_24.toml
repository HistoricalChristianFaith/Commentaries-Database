[[commentary]]
quote='''
The commandments of God were in the heart of the glorious Virgin. She was not idle, she was not one who knew and did not act, but she was obedient. Therefore in her heart these commandments of God were founded. It is said in the Gospel: "Everyone who hears the word of God and does it is like one who builds his house upon a firm rock; but he who hears and does not do it is like one who builds upon sand."

First it was necessary to find a person in whom the commandments of God might be placed, namely a strong woman. This was the glorious Virgin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'

[[commentary]]
quote='''
"Everyone who hears these my words and does them shall be likened to a wise man who built his house upon firm rock." This house is principally built by wisdom: whence in Proverbs: "Wisdom has built herself a house, she has hewn out seven pillars." And thus this wisdom builds the Church and the soul, so that it may be a dwelling place of God and a house of God: a house pleasant, a house beautiful, and a house strong.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25209.html'
source_title='Collationes de Septem Donis, Collation 9'

[[commentary]]
quote='''
Wisdom was a light "coming down from the Father of Lights" within the soul, and that by radiating through it, made it in the form of God, and the house of God. This descending light makes the intellective power beautiful, the affective power delightful, and the operative power strong. This dwelling is built with seven columns which blessed James clearly touched upon: "But the wisdom that is from above is first of all chaste, then peaceable, moderate, docile, in harmony with good things, full of mercy and good fruits, without dissimulation." It is of this house that Matthew writes: "Everyone therefore who hears these My words and acts upon them, shall be likened to a wise man who built his house on rock."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25202.html'
source_title='Collations on the Hexaemeron, Collation 2'
