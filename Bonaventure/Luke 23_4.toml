[[commentary]]
quote='''
Third, as to the just excuse, he adds: But Pilate said to the chief priests and the crowds: I find no cause in this man. For concerning the first two charges he found no cause, because he was not seeking one nor had he judged it worth seeking; but concerning the last he found what Christ had said to him, as is stated in John 18: "My kingdom is not of this world"; and therefore Pilate found no fault in him worthy of death. Nor is this surprising, because he says of himself in John 14: "The prince of this world comes, and in me he has nothing." Whence he could say that word of Job 13: "I know that if I am judged, I shall be found just." From which it appears that just as it belongs to a good judge to condemn sinners, so it belongs to him to excuse and defend the innocent, according to that of Exodus 23: "The innocent and the just you shall not kill, for I am opposed to the wicked."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
