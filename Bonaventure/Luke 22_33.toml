[[commentary]]
quote='''
Third, with respect to the repression of presumption, he adds: Who said to him: Lord, I am prepared to go with you both to prison and to death. This word was of love and fervor, but nevertheless it was of a certain presumption, because he promises that for which he does not suffice, namely that he is prepared to die for Christ and with Christ, since this is the work of the most perfect charity. Hence Jerome: "A bird without feathers strives to fly." Hence Peter here presumed in two ways: both because he judged of his own powers beyond his strength; hence John thirteen: "He said to Peter: Where I am going, you cannot follow me now. Simon Peter said to him: Why can I not follow you now? I will lay down my life for you"; and again, because he set himself above the others; hence Mark fourteen: "And even if all shall be scandalized in you, yet not I." Hence Chrysostom: "There were two accusations: both that he contradicted Christ and that he set himself above the others."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
