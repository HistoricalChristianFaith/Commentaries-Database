[[commentary]]
quote='''
And they were astonished, etc. Here after the humiliation he adds the clarification: when it is said: And all who heard him were astonished at his understanding and his answers: because he answered most wisely, beyond estimation. For astonishment arises from an unusual and great impression: below in chapter five: "Astonishment seized them all"; Job twelve: "He leads counselors to a foolish end and judges to astonishment." And thus was fulfilled that saying of Wisdom eight: "On account of her I shall have glory among the multitudes and honor among the elders, though young; I shall be found keen in judgment, and in the sight of the powerful I shall be admirable; the faces of princes shall wonder at me." This was fulfilled in Christ at this time. A figure of this preceded in Third Kings ten, where it is said that "the queen of Sheba, seeing the wisdom of Solomon, had no more spirit in her," on account of exceeding wonder.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
