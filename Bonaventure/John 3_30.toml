[[commentary]]
quote='''
"He must increase, but I must decrease." This is the best sign, when someone rejoices at another's exaltation together with his own diminishment. "He must increase," in death, because he was exalted on the cross; "but I must decrease," in having my head cut off. Or: "he must increase," in fame, so that he may be believed to be Christ; "but I must decrease," so that I who am believed to be Christ may be believed to be his forerunner. Or: "he must increase," in baptizing and in the number of disciples; "I must decrease," because his baptism and his discipleship were about to cease shortly, but Christ's on the contrary to be enlarged. The Apostle rejoiced at this enlargement, Philippians 1: "Whether by occasion or by truth Christ is proclaimed, in this I rejoice, and indeed I shall rejoice."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
