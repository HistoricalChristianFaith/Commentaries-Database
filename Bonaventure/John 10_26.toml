[[commentary]]
quote='''
"But you do not believe, because you are not of my sheep"; whence if they were sheep, they would have the sign of their shepherd in word and in deed. Augustine: "He says they are not of his sheep, because he saw them ordained to everlasting destruction, not to be purchased for eternal life by the price of his blood."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
