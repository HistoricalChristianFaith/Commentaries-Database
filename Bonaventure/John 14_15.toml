[[commentary]]
quote='''
The usefulness of observance ought to move us to observe the commandments of God. For in keeping the commandments of God there is manifold usefulness, which is reduced to three benefits. The first benefit is the obtaining of divine gifts; the second is the revelation of the Sacred Scriptures; the third is the attainment of heavenly rewards. The first benefit in keeping the commandments of God is the obtaining of divine gifts: whence in John: "If you love me, keep my commandments, and I will ask my Father, and He will give you another Paraclete."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25201.html'
source_title="Collationes de Decem Praeceptis, Collation 1"

[[commentary]]
quote='''
If you love me, etc. Above the Lord exhorted to faith; in this second part, because "faith without works is dead," He exhorts to the observance of the commandments; and He does this indeed in this order. First He exhorts by promising aid; second, by promising consolation; third, reward; fourth, He expresses what the merit of these things is. First, therefore, He exhorts to the observance of the commandments: and because it happens that the commandments are kept out of fear, as in the Law, and this He does not seek; it also happens that they are kept out of love, and this He seeks: therefore He says: If you love me, keep my commandments, namely out of love for me; 2 John: "This is charity, that we walk according to His commandments." To such He promises aid.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
