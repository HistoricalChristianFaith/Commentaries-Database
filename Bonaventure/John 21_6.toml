[[commentary]]
quote='''
He said to them: Cast the net on the right side of the boat, and you will find. Here the third point is noted, namely the wondrous catching of fish. And it was wondrous: because, when they could catch nothing, by obeying the divine command they caught so many: whence: They therefore cast the net, according to the Lord's command, and now they were unable to draw it in because of the multitude of fish. Something similar occurred in Luke 5: "When they had done this, they caught a great multitude of fish"; therefore in great abundance, so that the divine generosity might be shown, which, according to that passage in James 1, "gives to all abundantly and does not reproach."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: since the Lord before the passion commanded the net to be cast into the sea, in Luke chapter five, not specifying a side: what is it that after the resurrection he commands it to be cast on the right side of the boat? Gregory responds: "That fishing, in which it is not specifically commanded on which side the net should be cast, designated the present Church, which gathers the good together with the wicked. But this fishing was cast on the right side alone, because only the Church of the elect attains to seeing the glory of his brightness, which will have nothing of sinister work."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
