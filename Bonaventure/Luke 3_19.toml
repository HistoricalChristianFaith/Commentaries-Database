[[commentary]]
quote='''
As regards the rebuke of the transgressing ruler, it is added: But Herod the tetrarch, about whom it was treated above in the same chapter, when he was rebuked by him concerning Herodias, the wife of his brother: Matthew fourteen: "John said to Herod: It is not lawful for you to have her." And concerning all the evils which Herod had done. And so he did not spare him; Sirach ten: "The glory of the rich, of the honored, and of the poor is the fear of God; not to despise the just poor man, and not to magnify the rich sinner." Whence that which is said of Elisha in Sirach forty-eight applies to him: "In his days he did not fear the ruler, and in power no one overcame him, nor did any word surpass him." And because he sinned publicly, he rebuked publicly, according to that of First Timothy five: "Rebuke the one sinning before all, that the rest may have fear"; and this indeed boldly: Titus two: "These things speak and exhort and rebuke with all authority."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Commentary on Luke, Chapter 3'
