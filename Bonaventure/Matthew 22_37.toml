[[commentary]]
quote='''
Because love is the weight of the mind and the origin of every mental affection, which easily turns back upon itself but with difficulty tends toward one's neighbor and with still greater difficulty is raised up to God, it follows that although four things are to be loved from charity, nevertheless a twofold commandment is given: one which directs us toward God, and another which directs us toward our neighbor.

And because all precepts are referred either to God or to neighbor, as to the end and to that which is ordered to the end; hence it is that in these two commandments is enclosed the collection of the commandments and the comprehension of all the Scriptures. And charity itself is the root, form, and end of the virtues, joining all things with the ultimate end and binding all things to one another simultaneously and in order; therefore it is the weight of ordered inclination and the bond of perfect binding, order indeed preserving with respect to the diverse objects of love as regards both affection and effect, unity however having in habit as regards one end and one principal beloved, which is the reason for loving with respect to all other things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
The incarnate Word restores no one unless he both conceives it by believing in his heart and brings forth outwardly what is believed by confessing with due confession; of this kind is truthful confession full of truth, which is not only speculative truth but also practical. This moreover is that in which the whole person is conformed to truth according to the understanding of reason, according to the delight of the will, and according to the adherence of virtue, so that it may be with the whole heart, the whole soul, and the whole mind, and may be from a pure heart, a good conscience, and an unfeigned faith: and such is a confession that is whole, pleasing, and intrepid: so that it may be whole by reason of Him of whom it is; pleasing by reason of Him before whom it is made; intrepid by reason of him by whom that confession must be made. Since therefore the fainthearted person is not fit for this unless he is confirmed by the hand of grace from above, therefore for this purpose the Sacrament of confirmation was divinely instituted as immediately following baptism.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"

[[commentary]]
quote='''
But if they shall so love God with the whole heart, the whole mind, the whole soul, that yet the whole heart, the whole mind, the whole soul shall not suffice for the worthiness of that love: assuredly they shall so rejoice with the whole heart, the whole mind, the whole soul, that the whole heart, the whole mind, the whole soul shall not suffice for the fullness of that joy.

Not yet therefore, Lord, have I said or conceived how greatly those Blessed ones of yours shall rejoice. Surely they shall rejoice as much as they shall love; they shall love as much as they shall know. How much shall they know you and how much shall they love you? Certainly neither eye has seen, nor ear heard, nor has it ascended into the heart of man in this life, how much they shall know and love you in that life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25207.html'
source_title="Breviloquium, Part 7"

[[commentary]]
quote='''
"Which is the first and great commandment in the Law?" The Lord responds: "You shall love the Lord your God with your whole heart and with your whole soul and with your whole mind. This is the greatest and first commandment. And the second is like it: you shall love your neighbor as yourself. On these two the whole Law and the Prophets depend." Augustine shows that in this word: "But it is good for me to adhere to God," the whole of what is said is contained: "You shall love the Lord your God," etc. For we ought to love God, because this is just, holy, easy, and sweet. Whence Augustine: "Lord, who are you to me? And who am I to you, that you command me to love you, and if I do not love you, you threaten me with immense miseries?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25201.html'
source_title="Collationes de Decem Praeceptis, Collation 1"

[[commentary]]
quote='''
According to this threefold progress, our mind has three principal aspects. One is toward exterior corporeal things, according to which it is called animality or sensuality; another within itself and in itself, according to which it is called spirit; the third above itself, according to which it is called mind. From all of which it ought to dispose itself for ascending into God, so that it may love Him with all its mind, with all its heart, and with all its soul, in which consists the perfect observance of the Law and, together with this, Christian wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FChapter%25201.html'
source_title='Itinerarium Mentis in Deum, Chapter 1'
