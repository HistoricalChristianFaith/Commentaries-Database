[[commentary]]
quote='''
As for the excellence of wisdom in discerning he adds: This first enrollment was made by the governor of Syria, Cyrinus: because this was, as Ambrose says, the first general enrollment, which was begun by Cyrinus; or: first made, that is, first begun, according to Bede, by him who governed in Syria, which is the navel of the habitable world; and thus the said enrollment was carried out distinctly and in good order, and these are two marks of wisdom in a ruler, according to what is said of Solomon in 3 Kings 10: "When the queen of Sheba saw all the wisdom of Solomon and the dwellings of his servants and the orders of his ministers, she had no more spirit in her." Now this enrollment was made not out of vanity, as was that of David in 2 Kings, last chapter, on account of which the people were struck, but for the utility of the empire, that the amount of tribute might be known, and this pertains to discretion, not to pride: Ecclesiasticus 42: "Where there are many hands, lock up; and whatever you hand over, count and weigh; and record everything given and received." But it does not belong to just any individual king to enroll tributes, but to the newborn Christ; whence the Psalm: "And in your book all shall be written; days shall be formed, and no one in them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
