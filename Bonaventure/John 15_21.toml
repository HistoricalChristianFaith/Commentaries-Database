[[commentary]]
quote='''
And worldly men also persecute the head and the members; they do not persecute the head on account of the members, but conversely; whence he says: But all these things they will do to you for my name's sake, namely to destroy it, for which you are blessed: whence Matthew fifth chapter: "Blessed are you when men shall persecute you and shall say all manner of evil against you, lying, for my sake." The reason for this is the blindness of unbelief; whence: because they know not him who sent me: above in the eighth chapter: "You know neither me nor my Father"; and below in the seventeenth chapter: "Just Father, the world has not known you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
