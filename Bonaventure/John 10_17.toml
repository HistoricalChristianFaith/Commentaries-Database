[[commentary]]
quote='''
"Therefore the Father loves me." Here Christ's munificence toward the sheep is noted, in this, that he himself, since he was not a debtor to death, not compelled by necessity, but by sheer liberality laid down his life for the sheep; and this at the Father's command, by reason of which he merited the Father's love. Therefore he says: "Therefore the Father loves me, because I lay down my life," namely in death and passion: "that I may take it again," that is, in the resurrection, and thus from power, because it is mine to lay down and mine to take up again.

It is asked about what he says: "Therefore the Father loves me, because I lay down my life."

Therefore it seems that Christ merited the divine love through his passion.

Against this: From the instant of his conception he was worthy to be loved above all.

It must be said that he speaks according to the human nature, and "therefore" he states there the meritorious cause, just as in that text: "For which cause God also exalted him." And merit is understood not as making what is unowed into something owed, nor as making what is owed into something more owed; but because what is owed in one way and by one mode, namely by the best interior will, becomes owed in another way, namely by exterior work.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
