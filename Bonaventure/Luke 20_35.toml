[[commentary]]
quote='''
Therefore he adds: But they who shall be accounted worthy of that age and of the resurrection from the dead shall neither marry nor take wives: neither shall they marry, as regards women, nor take wives, as regards men. He calls the just worthy of the resurrection. For he speaks here specifically about the resurrection of the just, who will not only rise again but will also be changed, according to that passage of First Corinthians fifteen: "We shall all indeed rise again, but we shall not all be changed." "For the trumpet shall sound, and the dead shall rise incorruptible." Therefore, although the wicked shall rise with the good, as is said in John five: "The hour comes, in which all who are in the tombs shall hear the voice of the Son of God"; nevertheless he speaks specifically of the good, who will be elevated above time and temporal movements, and thereby above marriage and every carnal act.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
