[[commentary]]
quote='''
When therefore he had received the morsel, he went out immediately, so that he might swiftly fulfill it. And the time was fitting for the deed; and it was night; Job twenty-four: "The eye of the adulterer watches for darkness"; and above, chapter three: "He who does evil hates the light."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
