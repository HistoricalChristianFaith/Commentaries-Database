[[commentary]]
quote='''
From now on I tell you, before it happens, so that, when it has happened, you may believe that I am, namely God, who knows all things before they happen: Sirach 23: "To the Lord God, before they were created, all things are known," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
