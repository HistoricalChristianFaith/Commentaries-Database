[[commentary]]
quote='''
After the confutation of the detractors has been described, there is here subjoined the evasion of the persecutors. This part has two sections. In the first is described the persecution of the malicious; in the second, the evasion of the persecutors. For the description of the persecution of the malicious, three things are introduced, namely anger of mind, violence of action, and perfidy on the part of the intended end. He therefore intimates anger of mind in what he says: And all in the synagogue were filled with anger, hearing these things. Whence that passage of Amos five is verified: "They hated him who reproves in the gate" etc.; on account of which it is said in Proverbs nine: "Do not rebuke a scoffer, lest he hate you; rebuke a wise man, and he will love you." Whence from the hearing of the truth they were not instructed, but rather blinded and angered; against which it is said in Ecclesiastes seven: "Do not be quick to anger, for anger rests in the bosom of a fool"; and Job five: "Truly anger kills the foolish man," because, as it is said in Proverbs twenty-seven, "anger has no mercy, nor fury breaking forth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
