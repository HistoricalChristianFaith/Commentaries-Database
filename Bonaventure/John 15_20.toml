[[commentary]]
quote='''
Remember the word. Here the second point is touched upon, namely injury, in the same manner as enmity, namely of the head first and of the members on account of the head and after the example of the head. On account of which he says: Remember the word that I said to you: The servant is not greater than his lord; above in the thirteenth chapter: "Amen, amen I say to you: The disciple is not above the master, nor is the apostle greater than his lord." And therefore he argues: If they have persecuted me, they will also persecute you. And it follows that if they hate and persecute the head, they also hate and persecute the members. Whence Augustine: "He refuses to be in the body who does not wish to endure the hatred of the world with the head." Concerning the persecution of the head, it is found in the Psalm: "They persecuted the man who was poor and a beggar and stricken in heart." Not only will they persecute in deed, but they will despise in heart: If they have kept my word, they will keep yours also, that is, just as they despised my word, so also yours; Luke tenth chapter: "He who hears you hears me, and he who despises you despises me."

Or they have kept, that is, they watched in order to find fault: Matthew twenty-second chapter: "The Pharisees went away and took counsel to trap Jesus in his speech"; and in the Psalm: "The sinner will watch the just man."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
