[[commentary]]
quote='''
This fortitude is from God redeeming. "When a strong man armed guards his court, those things which he possesses are in peace; but if a stronger one than he comes upon him and overcomes him, he will take away all his armor in which he trusted, and will distribute his spoils." This stronger one is God, because "the weakness of God is stronger than men." The Son of God was made weak for our sake.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25205.html'
source_title="Collationes de Septem Donis, Collation 5"

[[commentary]]
quote='''
Second, adding the intended truth and now the persuasive argument, he says: But if a stronger one coming upon him shall overcome him. Stronger than the devil is the divine strength, namely our Christ: First Corinthians 1: "We preach Christ the power of God and the wisdom of God"; and again: "The weakness of God is stronger than men"; and therefore Job 9: "If strength is sought, he is most mighty". And for this reason it is said in Isaiah 9: "He shall be called Wonderful, Counselor, God, Mighty". He came upon, that is, he came from above, according to that saying in John 3: "He who comes from heaven is above all". He however overcame the devil as one less strong, according to what is said in John 16: "Take courage, I have overcome the world"; whence although he seemed to be conquered, yet he conquered, because by dying he rose again. And this is signified in Jeremiah 46: "The strong one stumbled against the strong one, and both fell together"; because Christ fell corporally, temporally, and visibly, but the devil eternally, totally, and irrecoverably. Whence it is said in Revelation 5: "Behold, the lion of the tribe of Judah, the root of David, has conquered to open the book". "And I saw in the midst of the throne and of the four living creatures a Lamb standing as though slain"; who therefore conquered because he was slain. Therefore that saying from First Corinthians 15 can be said to the devil: "O death, where is your victory? Thanks be to God, who has given us the victory through Jesus our Lord".

And because he conquered him in the passion, therefore he despoiled him in the resurrection; hence he adds: He will take away all his armor in which he trusted. And this he did when he broke down the gates of hell, according to that saying of the Psalm: "For he shattered the gates of bronze and broke the bars of iron"; and again in the Psalm: "He will shatter the bow and break the weapons and burn the shields with fire". The devil makes these weapons for himself from men through their consent, according to that saying in Romans 6: "Do not present your members as weapons of iniquity to sin". Or the diabolical weapons are the various stratagems of tempters, by which they prevailed over men. And of these he was deprived through Christ's victory in the resurrection, and despoiled in the ascension. Hence he adds: And he will distribute his spoils. And this indeed he did when from vessels of dishonor he made vessels of mercy; and this was done in the ascension, according to that saying in Ephesians 4: "Ascending on high, he led captivity captive, he gave gifts to men". Moreover, our Emmanuel did this: Isaiah 8: "Call his name: Make haste, strip the spoils, hasten to plunder". He plundered the devil mightily, according to that saying in Isaiah 49: "Shall the prey be taken from the strong one? Or can that which was captured by the mighty be saved? For thus says the Lord: Indeed, even the captivity shall be taken from the strong one"; and Hosea 13: "The Lord will plunder the treasure of every desirable vessel".

A figure of this preceded in 1 Kings 30, in David, of whom it is said that, having returned from the slaughter of Amalek, after despoiling the Amalekites, he distributed the spoils and "sent gifts to the elders of Judah and to his neighbors." And note that Christ is said to distribute the spoils of the devil, because, although he himself freed all, nevertheless he also entrusts a part of this glory to various preachers, who are themselves despoilers of Egypt, Exodus 12. From this, therefore, it is apparent that the expulsion of demons was accomplished by Christ not by diabolical or human power, but through the Holy Spirit. And this is the intended truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
