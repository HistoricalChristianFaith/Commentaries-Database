[[commentary]]
quote='''
Hence he adds: But certain women also from among us terrified us, who were at the tomb before dawn; because, as Jerome says, "at the report heard about him they were terrified rather than gladdened." The reason for this terror was the recollection of a wondrous thing and one also incredible to them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
