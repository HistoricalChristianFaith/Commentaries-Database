[[commentary]]
quote='''
Second, as to the common appearance, he adds: But while they were speaking these things, Jesus stood in their midst and said to them: Peace be to you. He stood in their midst, because he himself is the mediator: 1 Timothy 2: "The mediator of God and men, the man Christ Jesus"; and therefore John 1: "But there stood one in your midst, whom you do not know." And therefore as a figure of this, Apocalypse 1: "I saw in the midst of seven golden candlesticks one like the Son of Man," etc. But he said: Peace be to you, because he himself is the maker of peace: Ephesians 2: "He himself is our peace, who made both one"; and Colossians 1: "Making peace through his blood, whether the things on earth or the things in heaven." He is also the giver of peace: John 14: "Peace I leave to you, my peace I give to you." He is also the announcer of peace: Ephesians 2: "Coming, he announced peace to those who were near and to you who were far off." And therefore the Gospel of Christ is the Gospel of peace: Isaiah 52: "How beautiful upon the mountains are the feet of him who announces and preaches peace," etc.

And because men are accustomed to be astonished by an unusual appearance, therefore he adds: I am he, do not be afraid. Truly he says: I am he, because it belongs to him to say: "I am who I am," as is said in Exodus 3. It belongs to him to drive away fear, and therefore he says: Do not be afraid. He was strengthening them because he appeared among them in an unusual manner, and such a mode of appearing frightens and disturbs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
