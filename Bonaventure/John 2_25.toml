[[commentary]]
quote='''
And because there was no need that anyone should bear witness to him concerning man: for he himself knew what was in man: Jeremiah 17: "I the Lord, searching hearts and reins"; Hebrews 4: "The word of God is living and effective and more piercing than any two-edged sword, reaching unto the division of soul and spirit, of joints also and marrow, and a discerner of the thoughts and intentions of the heart."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
