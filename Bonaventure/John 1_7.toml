[[commentary]]
quote='''
"He came for a testimony." For his office was to testify concerning the light, not on account of a deficiency of the light, but of the believers; therefore it says: "He came for a testimony, to bear testimony concerning the light, that all might believe through him"; Acts 19: "John baptized with the baptism of penance the people, saying, in him who was to come after him, that they might believe"; "might believe," I say, "through him," not "in him."

But here a question is raised: Below in chapter 5: "I do not receive testimony from man"; therefore neither ought he to have been sent by God for this purpose. Likewise, light does not need illumination: therefore neither does the highest truth need attestation: therefore he came in vain.

It must be said that testimony is borne to someone and on account of someone. Sometimes, therefore, there is occasion for testimony by reason of the one to whom it is borne, because the truth is weak, and thus a man needs the testimony of another; sometimes by reason of the one on account of whom it is borne, because he is doubtful or weak in faith. John, however, did not come in testimony on account of a deficiency of light in Christ, but by reason of the unfitness in our eye.

Likewise it is asked: "That all might believe through him": because, since not all believed, if God sent him for this purpose, then both are frustrated of their due end. It must be said that there is a twofold end: in itself and in another. I say therefore that to be frustrated in the end in another, so long as the end in itself is possessed, introduces no imperfection, as is clear in the case of the rhetorician who persuades well, the Angel who guards, Christ who redeems, and John who testifies, because he bore sufficient testimony, even though not all believed him; yet of the things contingent upon him, he omitted nothing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
