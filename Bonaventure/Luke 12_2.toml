[[commentary]]
quote='''
Second, with regard to the certitude of the cause rendering credible information, he adds: Nothing however is covered that shall not be revealed, nor hidden that shall not be known: so that by covered is understood knowledge lying hidden in the intellect, and by hidden, delight lurking in the affections: both of which are manifest to God, according to that passage of Jeremiah 17: "I the Lord, searching hearts and reins, who give to each one" etc.; in the Psalm: "God, who searches hearts and reins." And therefore, because it will be his to make manifest and reveal all hidden things in the judgment, according to that passage of Wisdom 6: "Power has been given to you by the Lord, and strength from the Most High, who will examine your works and search out your thoughts"; and First Corinthians 4: "The Lord will come, who will illuminate the hidden things of darkness and will make manifest the counsels of hearts" etc.: and thus all evils are to be avoided, however hidden they may be, because all things will be made manifest in the judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
