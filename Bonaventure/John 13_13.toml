[[commentary]]
quote='''
You call me Master and Lord, and you say well: for so I am. For he is Master; Matthew twenty-three: "One is your Master, Christ." He is also Lord, whence David called him his Lord in the Psalm: "The Lord said to my Lord: Sit at my right hand."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
