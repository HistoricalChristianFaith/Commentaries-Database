[[commentary]]
quote='''
"Then Peter denied again." Here the denial of Peter is completed, because it was threefold: and as a sign of its completion it is added: "And immediately the cock crowed." Augustine: "Behold, the Physician's prediction is fulfilled, the sick man's presumption is convicted. For what he had said did not come to pass: I will lay down my life for you; but what He had foretold: You will deny me three times."

Question IV. Likewise, a question is raised about the time of the denial. For here John says that after the third denial the cock crowed; but in Mark fourteen it is said that it crowed after the first denial. I respond: According to the letter, it was as Mark says, that the cock crowed before the threefold denial and immediately after the threefold denial; but Peter did not notice the first crowing of the cock; the second he noticed and returned to his heart, and therefore the others pass over the first crowing in silence, but all mention the last.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
