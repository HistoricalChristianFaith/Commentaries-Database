[[commentary]]
quote='''
Let us not give our body to sin. "We have been bought at a great price. Do not become servants of men" nor of demons nor of sins. If I had redeemed some servant, I would not give him away for nothing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'
