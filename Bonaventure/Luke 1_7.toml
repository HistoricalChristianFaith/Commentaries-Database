[[commentary]]
quote='''
Fourth, he adds the reproach of barrenness in that he says: And they had no son; and in this there was a great deficiency; whence in Genesis 15 Abraham said: "Lord God, what will you give me? Behold, I go without children." And the reason for this deficiency is given in the mother, when it is said: Because Elizabeth was barren, which was a reproach in Israel; whence she could say that word of Isaiah 49: "I am barren and have not borne." And so that a greater miracle might be shown, a deficiency in both parents is added: And they were both advanced in their days, just as Abraham and Sarah: Genesis 18: "After I have grown old, and my lord is an old man, shall I give myself to pleasure?" — as if to say: this is not natural but miraculous. Whence Genesis 21: "Who would believe that Abraham should hear that Sarah would nurse a son, whom she bore to him now in his old age?" Now this reproach of barrenness was not as a punishment for sin, but for the manifestation of God's glory, as is said in John 9 concerning the man born blind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
