[[commentary]]
quote='''
Third, as regards the approbation of gratitude, he adds: And he said to him: Rise, go, for your faith has made you whole. Rise, through penitence: Ephesians 5: "Rise, you who sleep, and arise from the dead"; and Acts 12: "He roused him, saying: Rise quickly." Go, through justice: Matthew 8: "I say to this one: Go, and he goes," namely through obedience, which is the noblest part of justice, which was preeminently in Christ, according to that of Matthew 26: "The Son of man indeed goes, as it is written of him," that is, to go from God to God and according to God and on account of God; John 13: "Knowing that he came forth from God and goes to God"; and John 16: "I go to him who sent me," etc. Your faith has made you whole, through confidence; Bede: "Which inclined him to give thanks"; for faith is the beginning of our salvation, which causes the name of the Lord Jesus Christ to be known, of whom Acts 4: "There is no other name under heaven given to men, by which we must be saved." But hope is the increase of this salvation, according to that of Romans 8: "By hope we have been saved"; but charity is its completion, according to that of the Psalm: "I am yours, save me, for I have sought out your justifications," etc.

And note that Christ attributes salvation to faith, which he himself had virtuously accomplished, so that from this miracle there might be a confirmation of the preceding things as regards the piety of soul in Christ showing mercy, the humility of homage in the one freed falling prostrate, and the firmness of faith in the leper meriting a cure: so that from the aforesaid miracle all the aforesaid things might be firmly confirmed. Whence the Gloss: "In the preceding parable it is determined that faith ought to be increased through humility; in this one it is manifestly shown by the things themselves that it is not merely the acknowledged principle of faith, but the exercised operation of faith, that makes the believer whole."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke, Chapter 17'
