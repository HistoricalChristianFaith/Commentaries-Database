[[commentary]]
quote='''
I am the vine, and you are the branches: and therefore he who abides in me, he bears much fruit. And therefore abide in me as in the origin of fruit: because without me you can do nothing; Isaiah 26: "All our works you have wrought in us, O Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
