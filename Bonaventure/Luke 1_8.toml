[[commentary]]
quote='''
Therefore, indicating the due execution according to the congruence of order, he says: It came to pass, while he executed the priesthood, etc.; whence that which is said of Aaron in Ecclesiasticus forty-five applies to him: "The Lord gave him to exercise the priesthood and to have praise, and to glorify the people in his name," etc. And he says: In order, because that ought especially to be done in an orderly manner; First Corinthians fourteen: "Let all things be done honestly and according to order among you." Now order is rightly preserved when the mind of the priest worthily attends the divine presence; and therefore he says: In order, according to what is said of Christ in Hebrews nine, that "he entered into heaven, that he might now appear before the face of God for us."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
