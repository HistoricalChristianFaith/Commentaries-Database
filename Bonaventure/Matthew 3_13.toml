[[commentary]]
quote='''
In the middle of time there was both regeneration and the ordering of the Church and spiritual nourishment: therefore Christ instituted these three Sacraments, namely of baptism, the eucharist, and orders, both completely and clearly: first by receiving baptism, then by giving the form and making it known to the rest. And therefore these three Sacraments ought to have been instituted by Christ distinctly and integrally and to have been prefigured in manifold ways in the old law, as the substantial Sacraments of the new testament and proper to the lawgiver, namely the incarnate Word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"
