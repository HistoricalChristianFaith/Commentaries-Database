[[commentary]]
quote='''
And because true mercy appears in deed, therefore he adds: And drawing near, by effect, to whom he was already close by affection, calling back to unity, he bound up his wounds, pouring in oil and wine, so that the oil might soothe the pain, and the wine might cleanse, and the binding might preserve. And this was the work of a good physician, according to that passage of Ecclesiasticus thirty-eight: "In these things the healer shall mitigate pain, and the perfumer shall make sweet ointments and shall prepare salves of health"; Proverbs twenty-one: "A desirable treasure and oil are in the dwelling of the just."

And because he needed not only medicine, but also transport and lodging and food, therefore he adds: And setting him upon his own beast, as regards transport, he brought him to an inn, as regards lodging, and took care of him, as regards food. And thus he fulfilled that passage of Isaiah fifty-eight: "Break your bread for the hungry and bring the needy and the wandering into your house," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'

[[commentary]]
quote='''
And coming, Christ does three things for the wounded man: he applied a remedy, and this through the grace of the Sacraments, in which anointings and unctions are performed that heal the wounds of sins, which was not done before the coming of the Savior, according to that passage of Isaiah 1: "Wound and bruise and swelling sore are not bound up, nor treated with medicine, nor soothed with oil." But this was done after the coming of Christ: whence 1 Peter 2: "Who himself bore our sins in his body upon the tree; by his bruise we have been healed."

He also provided a conveyance, and this through the grace of virtues and gifts, by which we are carried to the inn of the Church, according to that passage of the Psalm: "Blessed is the man whose help is from you; he has disposed ascents in his heart, in the valley of tears"; and afterwards: "For the lawgiver shall give a blessing; they shall go from virtue to virtue." And this indeed takes place in the inn of the Church: whence it is added: "I have chosen to be abject in the house of God," etc.; and afterwards: "Because God loves mercy and truth, the Lord will give grace and glory."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
