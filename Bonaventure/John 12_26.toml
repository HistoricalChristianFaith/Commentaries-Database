[[commentary]]
quote='''
If anyone serves me, let him follow me, as a servant follows his Lord, otherwise he is not a true servant: let him follow, namely through the footsteps of the Passion; 1 Peter 2: "Christ suffered for us, leaving you an example, that you should follow his footsteps"; so that, just as one imitates in suffering, so also in glory. On account of which he adds: That where I am, there also my servant may be; 2 Timothy 2: "It is a faithful saying: If we have died with him, we shall also live with him; if we suffer with him, we shall also reign with him"; therefore faithful, because promised by the Lord: Revelation 3: "He who overcomes, I will give him to sit with me on my throne." Lest anyone disdain to serve him, he adds the summit of honor: If anyone serves me, my Father will honor him: because he himself honored me: 1 Kings 2: "He who honors me, I will honor; but those who despise me shall be ignoble." He will honor, I say, because he will make a son out of a servant: Romans 8: "The Spirit himself gives testimony to our spirit that we are sons of God; and if sons, also heirs: heirs indeed of God, and co-heirs with Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
