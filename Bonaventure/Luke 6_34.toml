[[commentary]]
quote='''
Nor is it sufficient to be generous toward those who repay, because this is the way of usurers themselves; whence he also adds: And if you lend to those from whom you hope to receive, namely repayment: what thanks is it to you? As if to say: none. And he shows this: For sinners also lend to sinners, that is, they lend at interest; whence he adds: That they may receive the equivalent, namely for the service, not only for the debt. And because they receive their reward, they have no merit before God: whence in the Psalm: "Who shall ascend into the mountain of the Lord?" and it is added: "He who has not given his money at usury nor accepted bribes against the innocent." Otherwise he does not ascend the mountain of the Lord: whence in Ezekiel eighteen, he is justified of whom it is said: "He who has not lent at usury nor taken increase"; and conversely, he who takes increase is condemned in the same place. Whence to such people can be said that word of Haggai one: "You looked for more, and behold, it became less," because in the Psalm it is said: "The men of riches found nothing in their hands." Such usurers are counted among sinners, because they are oppressors of others; whence Proverbs twenty-two: "He who borrows is the servant of the lender." And therefore it is forbidden in Exodus twenty-two: "If you lend money to a poor man, you shall not press him as an exactor nor oppress him with usury."

But the contrary of this seems to be said in Deuteronomy twenty-three: "You shall not lend at interest to your brother, but to a stranger." But it should be understood that this is evil in itself: but the Law permitted this to them, just as the bill of divorce, for the avoidance of a greater evil. Moreover, the reason for this prohibition is manifold: both because money is not diminished by being lent; and because it does not of itself bear fruit, but the entire basis of profit is on the part of the user; and because it continually consumes and devastates, and thus the advantage of the loan is converted into the disadvantage of loss; and because in a loan of money, ownership of the thing lent passes over, since one is not bound to return the same coins in number; and because all risk is transferred to him who had borrowed; and also because in such a manner of lending, money is loved more than one's neighbor, since one lends money to one's neighbor not out of love for the neighbor but out of love for the money.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
