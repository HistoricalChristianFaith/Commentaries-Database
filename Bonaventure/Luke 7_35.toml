[[commentary]]
quote='''
And because the blasphemy of the Jews is aggravated by the true preaching of the Apostles, therefore it is added: And Wisdom is justified by all her children. For the Evangelist calls Christ Wisdom, according to that passage of First Corinthians 1: "Who was made unto us by God wisdom and righteousness." The children of this Wisdom are the Apostles, begotten through the word of this Wisdom and vivified through the Holy Spirit, according to that passage of Ecclesiasticus 4: "Wisdom breathes life into her children," that is, Christ into the Apostles. Whence also Peter said in John 6: "Lord, to whom shall we go? You have the words of eternal life." These justified, that is, they esteemed Christ as righteous, inasmuch as they fulfilled his words through righteousness and obedience, according to that passage of Ecclesiasticus 3: "The children of wisdom are the assembly of the righteous, and their nation is obedience and love." By the example of these the Pharisees ought to have been moved, but on account of their obstinacy they remained in their dregs. Whence he said to them in Matthew 12: "If I cast out demons by Beelzebub, by whom do your sons cast them out? Therefore they shall be your judges," because they are esteemed righteous by the Wisdom whom they justify, and the Pharisees are esteemed unjust and reprobate by the same Wisdom, whom they condemn on account of their obstinacy and blasphemy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
