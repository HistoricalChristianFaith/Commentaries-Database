[[commentary]]
quote='''
Second, as regards the disciplinary question that directs, it is added: And his disciples asked him, namely, so that they might be directed by him, according to that word of Sirach thirty-three: "He who makes known the question will prepare the word, and so having prayed he will be heard; and he who keeps discipline will then respond." But this is said not because they asked immediately, but because at the word of Christ they conceived the will to ask; whence in Mark four it is said: "When he was alone, they asked him."

And because the question is about hidden and mystical things, therefore it is added: What this parable might be, that is, what it might signify, so that through its interpretation they might be able to grasp the understanding, according to that word of Proverbs one: "The wise man hearing will be wiser, and the man of understanding will possess counsels; he will discern the parable and its interpretation"; and Sirach thirty-nine: "Therefore the wise man will seek out the hidden things of proverbs and will dwell in the secrets of parables."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
