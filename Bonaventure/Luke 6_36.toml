[[commentary]]
quote='''
He commands imitation of himself: Be merciful, even as your Father is merciful. Now there are six works of mercy, namely: feeding the hungry, giving drink to the thirsty, clothing the naked, gathering in strangers, visiting the sick, and ransoming captives. Moreover, the work of perfect virtue cannot exist unless the creature is conformed to Christ in these things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25204.html'
source_title="Collationes de Decem Praeceptis, Collation 4"

[[commentary]]
quote='''
After he has promulgated and proved the evangelical laws and also resumed them with a motivating reason, here at last he concludes with the consequent retribution, which he shows follows our works in the judicial sentence, in heavenly glory, and in infernal punishment: in judgment indeed with respect to all, in reward with respect to the good, and in punishment with respect to sinners. He concludes therefore first that we ought to fulfill the aforementioned commandments according to the prescribed form, by proclaiming the judicial sentence, when he says: Be therefore merciful, namely in showing yourselves benevolent, peaceable, and beneficent toward your neighbors; in which he touches upon the substance of the aforementioned commandments. As your Father also is merciful, in which he touches upon the form or circumstance, because He condescends not only to friends, but to adversaries. This indeed is necessary, according to that passage of Matthew 18: "You should have had mercy on your fellow servant, just as I also had mercy on you." Whence He requires that mercy which He bestows; and according to that which we bestow, He repays in judgment, according to that passage of Sirach 4: "In judging, be merciful to orphans as a father, and as a husband to their mother; and you shall be as a son of the Most High, and He shall have mercy on you more than a mother"; James 2: "Judgment without mercy to him who has not shown mercy." And therefore he adds the retribution of judgment corresponding to works of merit according to a fourfold difference of act, namely judging, condemning, forgiving, and giving: of which the first pertains to equity, the second to severity, the third to piety, and the fourth to liberality.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
