[[commentary]]
quote='''
Many other signs indeed. Here the faith of those believing through Scripture of such manifestations is touched upon: therefore he says that manifestations of this kind were written down to establish the faith of those who could not see them. And therefore not all things were written, but those which suffice for our faith: and so he says: Many other signs indeed Jesus did in the sight of his disciples, which are not written in this book: because it is not ours to narrate all things, but to build up faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
