[[commentary]]
quote='''
And his father and mother were etc. Here thirdly is added the wonder of the parents arising from this, when it is added: And his father and mother were marveling at those things which were spoken concerning him, namely at the four things aforementioned. For Christ is admirable insofar as he is a mediator in the concord of peace: Esther 15: "You are very admirable, Lord, and your face is full of graces." Admirable also insofar as he is a savior in clemency: on account of which it is said thus in the Psalm: "God is wonderful in his saints," because "grace and mercy are upon his saints, and he has regard for his elect," Wisdom 4. Admirable insofar as he is a teacher in wisdom: Psalm: "Your knowledge has become wonderful beyond me." Admirable insofar as he is a triumphator in power, according to that of the Psalm: "The Lord is wonderful on high"; and Exodus 15: "Who is like you among the mighty, O Lord? Who is like you, magnificent in holiness, terrible and praiseworthy, working wonders?" And therefore it is not surprising if the putative father and the true mother were marveling at those things which were spoken.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
