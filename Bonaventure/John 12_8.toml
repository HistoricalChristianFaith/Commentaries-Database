[[commentary]]
quote='''
For the poor you will always have with you; Deuteronomy fifteen: "The poor shall not be wanting in the land of your habitation." But me you will not always have, according to bodily presence; below in chapter sixteen: "I go to the Father, and you shall see me no longer"; and therefore it is more expedient that a benefit of kindness be shown to me: therefore you should not be troublesome: Matthew twenty-six: "Why do you trouble this woman? For she has wrought a good work upon me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
