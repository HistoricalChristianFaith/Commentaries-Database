[[commentary]]
quote='''
Since a principle for influencing is not efficacious unless it has in itself a fontal and original fullness, which is not only a fullness of sufficiency but also of superabundance; therefore it is necessary that the incarnate Word be full of grace and truth, so that from his fullness all the just may receive, just as all the members receive from the head the influx of motion and sense. And on this account this grace is called the grace of the Head, because, just as the head has in itself the fullness of the senses and is conformed to the other members and presides over the others and bestows upon the others the benefit of its influx, which are connected to the head itself: so Christ, having in himself a superabundance of grace and being like us in nature, holy and just above all others, bestows upon the others who approach him the benefit of grace and spirit, through which sense and motion in spiritual things come about.

And since to approach him is through faith, or through the Sacrament of faith; and the faith of Christ is the same in past, present, and future: therefore the ground of influencing is posited in Christ with respect to all, past as well as present as well as future, who believe in Christ and are reborn in Christ, who through faith are joined to Christ and through inflowing grace become members of Christ and temples of the Holy Spirit, and thereby children of God the Father, connected to one another through the indivisible bond of charity. Which just as it is not divided by distance of places, so neither is it separated by length of times; and thereby all the just, wherever they may be and whenever they may have been, constitute one mystical body of Christ, receiving sense and motion from the one influencing head, according to the fontal, radical, and original fullness of all grace dwelling in Christ as in a fountain.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25204.html'
source_title="Breviloquium"

[[commentary]]
quote='''
Through the Word incarnate there descends to us an abundance of graces: whence in John: "Of his fullness we have all received, and grace for grace." It is certain that the original principle, which is God, when he created man in his image and likeness in the state of innocence, created him so near to himself that through the Word uncreated man was formable unto grace. But after man fell through sin, divine wisdom provided a mode of condescension through the Word incarnate, through which man might be adapted unto grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25201.html'
source_title='Collationes de Septem Donis, Collation 1'

[[commentary]]
quote='''
"And of his fullness we have all received grace for grace." Here the second reason for knowing that Christ was the Son of God is touched upon, namely on account of a singular effect, and this was the bestowal of grace. Therefore he says: "And of his fullness," as if to say: truly we knew him to be full; because "of his fullness we have all received grace for grace," namely the grace of recompense for the grace of justification, or conversely we have received the grace of justification for the sake of obtaining the grace of recompense, which is rightly called grace, because, as Augustine says, "God crowns nothing in us except his own gifts"; Romans 6: "The wages of sin is death: but the grace of God is life everlasting"; and Zechariah 4: "He shall bring forth the grace of grace."

It is asked: "Of his fullness we have all received." Against this is the fact that many preceded Christ: therefore many existed before the fullness of Christ: therefore not all received. It must be said that all received, because Christ was the head of all the just from Abel to the last just person. To this head the members are united by the bond of faith and love. Because therefore no one was saved without faith in Christ, as blessed Augustine says, no one was saved who did not receive from the fullness of Christ. As to the objection that he came after: it must be said that by faith he was always present to all, although bodily he came after.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
