[[commentary]]
quote='''
"They therefore asked him: Who is that man," a weak man, not God almighty, "who said to you: Take up your bed and walk?" who commanded against the Law, not who healed by power. They seek evil things, they are silent about good things: Proverbs 11: "He who seeks good things rises well at dawn: the searcher of evils shall be oppressed by them." And because they seek with evil intent, therefore they fail in their inquiry.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
