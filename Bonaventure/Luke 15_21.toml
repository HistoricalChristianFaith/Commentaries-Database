[[commentary]]
quote='''
Second, with respect to the reverence of the son accusing himself he adds: And the son said to him: Father, I have sinned against heaven, namely through contempt of the Majesty presiding over all things: Job 11: "It is higher than heaven, and what will you do? It is deeper than hell, and how will you know?"; and 22: "Do you not know that God is higher than heaven?" etc. Against heaven therefore he sins who despises the God of heaven: whence it is said in 1 Ezra 9: "My iniquities are multiplied above my head, and our offenses have grown up even to heaven," etc. And before you, through contempt of the Truth beholding all things: Ecclesiasticus 23: "The eyes of the Lord are far more bright than the sun, looking about all the ways of men and the depth of the abyss, and beholding all hearts into hidden parts. For to the Lord our God, before they were created, all things are known; so also after their completion he beholds all things"; the Psalm: "Against you alone have I sinned, and done evil before you." - Now I am no longer worthy to be called your son, on account of contempt of the Goodness providing for all things: Wisdom 12: "But you, Lord of power, judge with tranquility and with great reverence dispose of us. For it is at your disposal, whenever you will, to act. But you have taught your people that one must be just and humane, and you have made your children of good hope, because in judging you grant a place for repentance from sins." Because therefore I have despised this supreme goodness, whose office it is to give "the spirit of adoption of sons," according to that passage in Romans 8: "You have not received the spirit of servitude again in fear, but the spirit of adoption of sons"; whose office it also is to regenerate through water and the Holy Spirit into the kingdom of the sons of God, according to that passage in Colossians 1: "He has delivered us from the power of darkness and transferred us into the kingdom of the Son of his love": now I am no longer worthy to be called your son.

And note that although the father runs to meet him, clasps his neck in an embrace, although he receives him with a kiss, nevertheless the true penitent never forgets his sin, according to that verse of the Psalm: "For I am ready for scourges, and my sorrow is continually before me. For I will declare my iniquity and will think upon my sin." Although he acknowledges this, he nonetheless yearns for perfect charity. And therefore he does not here seek mercenary love, as he did above, when he did not yet have infused grace. But now, fully turned back to the father, as one truly penitent he commends and entreats divine grace: and this is what the Gloss says: "He wills," it says, "to become through grace what he confesses himself unworthy of by merit," as that penitent asked in the last chapter of 2 Chronicles: "Now I bend my knees before you, imploring your goodness. I have sinned, Lord, and I acknowledge my iniquity: I ask and beseech you: Lord, forgive me, and do not destroy me together with my iniquities, nor reserve evils for me forever, for you will save me, unworthy as I am, according to your great mercy, and I will praise you always, all the days of my life; for the host of heaven praises you, and yours is the glory forever and ever."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
