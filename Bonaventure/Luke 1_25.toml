[[commentary]]
quote='''
Fourthly, a joyful exultation is touched upon in recognition of the benefit, at: Saying, Because the Lord has done thus for me. Similarly Genesis 21: "The Lord has made laughter for me: whoever hears of it will laugh with me." — In the days in which he looked upon me to take away my reproach among men, the reproach, namely, of barrenness: Genesis 30: "Rachel conceived and bore a son, saying: God has taken away my reproach." This was a reproach among men, on account of that passage in Deuteronomy 7: "There shall not be one barren among you of either sex." Whence it is said in 1 Kings 1 that "her rival afflicted Anna so greatly as to reproach her that the Lord had closed her womb." And on account of this she rejoiced, according to that passage of the Psalm: "Who makes the barren woman to dwell in a house, a joyful mother of children."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
