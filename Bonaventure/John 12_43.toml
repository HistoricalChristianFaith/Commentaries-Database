[[commentary]]
quote='''
For they loved the glory of men more than the glory of God: and they acted foolishly, according to what is said in 1 Maccabees 2: "Do not fear the words of a sinful man, for his glory is dung and worms; today he is exalted, and tomorrow he shall not be found"; the Psalm: "He has scattered the bones of those who please men," etc.; Galatians 1: "Do I seek to please men? If I still pleased men, I would not be a servant of Christ."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
