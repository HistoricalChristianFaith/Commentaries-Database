[[commentary]]
quote='''
And the Passover of the Jews was near, and Jesus went up to Jerusalem. And for this reason he went down to prepare himself. Chrysostom: "He went down for this reason, being about to go up to Jerusalem shortly after, so that he would not drag his brothers and Mother everywhere." He went up, moreover, according to the custom of the Jews and the commandment of the Law: Deuteronomy 16: "Three times in a year shall all your males appear before the Lord." And although the Lord was not subject to the Law, he nevertheless observed it, lest he appear contrary to it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
