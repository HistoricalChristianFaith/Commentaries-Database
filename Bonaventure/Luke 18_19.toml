[[commentary]]
quote='''
Secondly, as to the response, by which is shown where one must tend, it is added: But Jesus said: Why do you call me good? He says this not rebuking him as a liar, but because, calling him good, he was fixing his intention on the humanity. Whence Augustine, On the Trinity: "You call me, according to what you see, good master; the vision of this form will not be for the good of those who act wickedly"; as if to say: the goodness toward which you ought to tend is not in me insofar as I am man, but insofar as I am God. — And therefore he adds: No one is good except God alone: which he does not understand of goodness by participation, which is communicated to all by God, according to that passage in Genesis 1: "God saw all things that he had made, and they were very good"; but of goodness by essence, which makes the blessed and good, according to that passage in Exodus 33: "I will show you all good"; and this alone is to be desired, according to that passage in Proverbs 11: "The desire of the just is all good." This good is to be sought as the end of every good: whence Matthew 19: "Why do you ask me about the good? No one is good" etc., that is, the final good is in God alone, who is the end of all things, because "the good and the end are the same." And he himself says in Apocalypse 1: "I am the alpha and the omega, the beginning and the end"; and therefore Nahum 1: "The Lord is good and strengthening in the day of tribulation and knowing those who hope in him." From this good, goodness flows into us through the Holy Spirit; Wisdom 12: "O how good and sweet is your Spirit in us, O Lord"; and the Psalm: "How good is the God of Israel to those who are upright of heart." But this goodness of ours, compared to the divine goodness, is not goodness: whence Job 4: "Shall a man be justified in comparison with God, or shall he be purer than his Maker?" There the Gloss says: "Human justice, compared to the divine, is injustice." And therefore Job 25: "Can a man be justified when compared with God?" as if to say: no. Sirach 18: "God alone shall be justified and remains an unconquered king forever." Christ therefore, about to respond to a question useful for the salvation of the whole world, as the master of morals and of all moral philosophy, began from the highest good by essence, from which and according to which and toward which every good must be ordered; otherwise it ceases to be good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
