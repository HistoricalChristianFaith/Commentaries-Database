[[commentary]]
quote='''
But we should be afraid of what the Lord says in the Gospel: "The queen of the South will rise up in the judgment with this generation and will condemn it; for she came from the ends of the earth to hear the wisdom of Solomon, and behold, a greater than Solomon is here." The Jews refused to listen to wisdom from the mouth of Wisdom; and we who possess Christ within ourselves refuse to listen to His wisdom. This is the supreme abomination: that the most beautiful daughter of the king is offered to us as a bride, and we choose to be coupled with the filthiest servant and to deal with harlots; and we want to go back to Egypt, to the lowliest food, since we reject the food from heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25202.html'
source_title='Collations on the Hexaemeron, Collation 2'
