[[commentary]]
quote='''
Third, with respect to the kindness of the Crucified One, he adds: But Jesus was saying: Father, forgive them, for they know not what they do: in which is fulfilled that word of Isaiah fifty-three: "He bore the sins of many and interceded for the transgressors." Now this prayer was for a remedy, because even to his crucifiers his passion was profitable through his prayer. Hence in Acts two it is read that three thousand were converted in one day, and on another five thousand, Acts four, because, as it is said in Hebrews five, "he was heard in all things for his reverence." Hence also in this it appeared that he was a pious and merciful high priest, offering himself and interceding for the salvation of the people. And for this reason Luke alone, who treats especially of Christ's priesthood, describes and narrates this prayer; hence Bede: "Because Luke resolved to describe the priesthood of Christ, rightly does the Lord in his account intercede for his persecutors by the right of a priest." And this was prefigured in Numbers sixteen in Aaron, praying for the people rising up against him; of whom it is said in the same place that "Aaron, standing between the dead and the living, prayed for the people, and the plague ceased." Hence also Wisdom eighteen: "A blameless man hastened to pray for the people, bringing forth prayer as the shield of his ministry, and pleading entreaty through incense, he withstood the wrath." And for this reason Christ gave an example to all high priests and also to all Christians, who are "a royal priesthood," and especially to the perfect, to pray for their persecutors, according to that word of Matthew five: "Pray for those who persecute and calumniate you," as Christ did and the protomartyr Stephen; Acts seven: "Do not hold this sin against them. And when he had said this, he fell asleep."

Fourth, with respect to the rapacity of the soldiers crucifying him, it is added: Dividing his garments, they cast lots; which is stated more expressly in John nineteen: "The soldiers, when they had crucified him, took his garments and made four parts, to each soldier a part, and the tunic"; and afterwards it is added concerning the seamless tunic, that they cast lots whose it should be. Now this was done, as John says, for the fulfillment of prophecy; for the Prophet David says in the Psalm: "They divided my garments among themselves, and upon my vesture they cast lots." And in this appeared the rapacity of the soldiers, who stripped Christ on account of their rapacity. And therefore the passion of Christ is signally signified by Noah, of whom it is said in Genesis nine that "drinking wine, he was made drunk and was naked in his tent." Now by this division of the garments into four parts is understood the spread of the Church into the four parts of the world; whence Bede: "The fourfold garment signifies the Church spread throughout the whole world, which consists of four parts. The tunic allotted by lot signifies the unity of all parts, which is held together by the bond of charity." By the casting of the lot is understood the conferral of grace, which is given not according to human distribution but rather according to divine disposition, because, Proverbs sixteen, "lots are cast into the lap, but they are governed by the Lord"; and Acts one: "You, Lord, who know the hearts of all, show whom you have chosen." "And they gave lots to them, and the lot fell upon Matthias."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
