[[commentary]]
quote='''
Fourth, as to the consummative element, which was the understanding of truth, he adds: That you may know the truth of those words in which you have been instructed, know, namely, more fully. And this was that in which the intention of the Evangelist in writing came to rest: whence 2 Timothy 3: "All Scripture divinely inspired is useful for teaching, for arguing, for correcting, for instructing in justice, that the man of God may be perfect, equipped for every good work"; and this end Luke sets forth with respect to all whom he understands in the person of Theophilus, to whom he writes. "Theophilus is interpreted as 'one who loves God' or 'one loved by God,'" and to such the truth is manifested: whence John 14: "He who loves me will be loved by my Father: and I will love him and will manifest myself to him"; and [John] 15: "But I have called you friends, because all things whatsoever I have heard from my Father I have made known to you." — And thus it is clear how fully and plainly the Evangelist discloses his intention.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
