[[commentary]]
quote='''
And there appeared to him an Angel, etc. Here is touched upon secondly the apparition of the heavenly messenger, and this as venerable, as admirable, and as terrible. — Now it is shown to be venerable in its setting: on account of which he says: And there appeared to him an Angel of the Lord, standing at the right side of the altar of incense, which was indeed a place of great reverence: whence, in Leviticus 10, Nadab and Abihu were slain on account of irreverence toward the place; and immediately it is added: "I will be sanctified in those who draw near to me." And he was standing at the right, to signify that he was of the heavenly citizens: Proverbs 3: "Length of days is in her right hand"; and in the Psalm: "The Lord said to my Lord: Sit at my right hand." And therefore he was standing, not sitting, to show that he was a messenger: whence below he says: "I am Gabriel, who stand before God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
