[[commentary]]
quote='''
Second, as to the rebuke of ingratitude, he adds: But Jesus answering said: Were not ten made clean, and where are the nine? He does not ask about the nine as though ignorant of the person of any one of them, but reproving the irreverence of ingratitude, just as the Lord asked in Genesis 3: "Adam, where are you?" Hence the Gloss: "He inquires where the ungrateful are, as though they were unknown"; so that in them is verified that saying of First Corinthians 14: "He who is ignorant shall be ignored."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke, Chapter 17'
