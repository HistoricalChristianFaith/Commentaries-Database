[[commentary]]
quote='''
Then, as regards beatitude without exception, he adds: And if he comes in the second watch, and if he comes in the third watch, and finds them so, blessed are those servants. And note here that by the three watches are understood three states of the present life, namely of childhood, youth, and old age. Whence the Gloss of Bede: "He calls them watches after the likeness of those keeping guard in the night. The first watch is the guardianship of childhood, the second is of youth, and the third of old age. If anyone has neglected to keep watch in childhood, let him not despair; if he has neglected in youth, let him at least come to his senses at last in old age, because the merciful Lord patiently awaits our repentance"; Isaiah thirty: "Therefore the Lord waits, that he may have mercy on you; and therefore he shall be exalted, sparing you, because the Lord is a God of judgment: blessed are all who wait for him."

And note that in Mark 13 four watches are indicated according to the manner of distinguishing hours among those keeping watch: "Watch," he says, "for you know not when the Lord will come: at evening, or at midnight, or at cockcrow, or in the morning." And by these watches are understood four states in which man exercises freedom of choice: the first and the last, and two intermediate ones; one is in advancement, and the other in decline. In this it is indicated that the Lord accepts our watchfulness at every hour without exception, but especially that which begins from childhood: Lamentations 3: "It is good for a man when he has borne the yoke from his youth"; and yet he does not refuse even the last stage of old age: whence it is said in Matthew 14 that "in the fourth watch of the night he came to the disciples walking upon the sea." At any hour, therefore, it is not useless but most useful to watch; below in chapter 21: "Watch, praying at all times, that you may be accounted worthy to escape all these things that are to come, and to stand before the Son of Man," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
