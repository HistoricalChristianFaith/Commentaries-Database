[[commentary]]
quote='''
Therefore some of the Pharisees said, foolish zealots of the Law: Romans 10: "They have indeed a zeal for God, but not according to knowledge." They said: This man is not from God, by conformity and accordance: who does not keep the Sabbath, which God commanded to be kept, Exodus 20 and in many other places. But others said: How can a sinful man do such signs? And these were more enlightened: whence these had some light, but the others were darkened; therefore it follows that there was a schism among them, that is, a division, by the just judgment of God dividing light from darkness and the good from the wicked: on account of which he said, Matthew 10: "I came not to send peace, but a sword."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
