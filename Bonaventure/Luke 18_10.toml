[[commentary]]
quote='''
Second, as to the conditions of the persons about whom he speaks, he adds: Two men went up to the temple to pray, with a conformable and indeed laudable intention. For we ought to ascend to the temple for this purpose, that we may pray, according to that passage in Matthew twenty-one: "My house shall be called the house of prayer." Whence Augustine says: "Let no one do anything in a place of prayer except that for which it was made, from which it also received its name." Whence also the Lord cast out those who were not praying in the temple but trading, not without harshness of words: John two: "Jesus found in the temple those selling sheep and oxen and doves, and the money-changers sitting. And when he had made a whip of cords, he cast them all out of the temple. And he said to them: Take these things away from here, and do not make my Father's house a house of commerce"; and this, because that house was a house of prayer. And for this reason, so that it might befit the purpose for which it existed, it was therefore built on high, and it was necessary to ascend by steps, to intimate that whoever wishes to pray must raise himself upward. Whence also in the Preface it is said: "Lift up your hearts"; and Bernard says that "although God is everywhere, nevertheless in prayer he must be thought of as above, so that our heart may be lifted upward." As a figure of this, in Exodus twenty-four, "the Lord said to Moses: Come up to me on the mountain." Although, however, they were tending toward one and the same place, they nevertheless had a great difference of conduct; and therefore he adds: One a Pharisee, and the other a publican, by their dissimilar manner of life. Whence the Pharisee was apparently just, because the Pharisees were so called as being distinguished from others by habit, gesture, and observances, as if they were the chief observers of the Law itself, according to that passage in Acts twenty-six: "My manner of life from my youth all the Jews know, knowing me from the beginning, if they are willing to bear witness, that according to the strictest sect of our religion I lived a Pharisee." On the contrary, the publican was openly evil, because publicans were called the collectors of public taxes, as has often been explained, whence above in chapter fifteen: "The publicans and sinners were drawing near to Jesus to hear him. And the scribes and Pharisees were murmuring," etc. Therefore there is a great difference between the Pharisee and the publican as to appearance, and great also as to reality, because the Pharisee was undermining his own justice through arrogance, and the publican was purging his injustice through repentance. Therefore in Matthew twenty-one it is said to the Pharisees: "The publicans and harlots shall go before you into the kingdom of God." This, however, is said to the Pharisees not because they appeared good, but because they were proud in mind; on account of which it is said above in chapter sixteen: "You are they who justify yourselves before men, but God knows your hearts, because what is exalted among men is an abomination before God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
