[[commentary]]
quote='''
Not only was it approved with certitude, but also swiftly made known: wherefore it is added: And all who heard marveled, namely at the little child born, and at the things that were told them by the shepherds, which they had heard from the Angel. Whence it is said of the just man in Ecclesiasticus 11: "Many marveled at him and glorified God." For they saw that the words of the shepherds were not to be despised but to be wondered at: Ambrose: "Do not think the words of the prophets contemptible as though lowly; from the shepherds even Mary gathers faith, from the shepherds the people is assembled to reverence God: for the Lord sought out a simple folk, who knew not how to embellish or paint over what they had heard." They marveled also because the little child did not appear to them contemptible but wonderful. Whence Isaiah 9: "A little child is born to us, and a son is given to us, and his name shall be called Wonderful." For everywhere Christ appears wondrous, not only in being born, as here, but also in advancing; below in the same chapter: "And they were astonished at his wisdom and his answers." Wonderful also in teaching — below in chapter 4: "They marveled at the words of grace that proceeded from his mouth." Wonderful in keeping silence; Mark 15: "But Jesus still answered nothing, so that Pilate marveled." Wonderful in action; below in chapter 8: "Who, do you think, is this, that he commands both the winds and the sea, and they obey him?" Wonderful in his passion: Mark 15: "But Pilate marveled that he had already died," etc. Wonderful in his resurrection: Luke, last chapter: "Peter, seeing the linen cloths laid by themselves, went away, wondering within himself at what had happened." Wonderful in his ascension: Psalm: "O Lord our Lord, how wonderful is your name in all the earth! For your magnificence is exalted above the heavens." Wonderful in the final judgment: Wisdom 8: "I shall be found keen in judgment, and in the sight of the wise I shall be wonderful."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
