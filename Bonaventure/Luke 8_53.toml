[[commentary]]
quote='''
But because "the natural man does not perceive the things that are of God," First Corinthians two: therefore it is added: And they derided him, knowing that she was dead. For he who is certain about something not only does not believe, but even derides the one persuading the contrary. And since divine wisdom frequently persuades the contrary of human knowledge, hence it is that man through human knowledge mocks God, and thus is made foolish: Jeremiah ten: "Every man is made foolish by his own knowledge." For that knowledge is foolish which derides wisdom: First Corinthians one: "God has made foolish the wisdom of this world." And because, as it is said in Proverbs eighteen, "the fool does not receive words of prudence, unless you say those things which revolve in his heart"; therefore these people did not receive but derided: Proverbs fifteen: "The fool mocks the discipline of his father"; and therefore they were not suitable witnesses for the restoration of life, but only for the loss of life. Therefore they were cast out, according to what is said in Matthew nine: "When the crowd had been cast out, he entered and took the girl by the hand," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
