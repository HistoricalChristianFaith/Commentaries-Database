[[commentary]]
quote='''
Whatever you shall ask the Father in my name, this I will do. Therefore he says that we ought to ask the Father in the name of the Son, so that namely the Father may be glorified in the Son, because the Son does not seek his own glory, but the Father's: therefore it was said above in the seventh chapter: "He who seeks the glory of him who sent him, he is truthful." And for greater certainty, because a promise is made firmer by a double affirmation, therefore he adds:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
