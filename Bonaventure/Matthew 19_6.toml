[[commentary]]
quote='''
Of the Sacrament of matrimony there are three goods, namely fidelity, offspring, and the Sacrament. And there are twelve impediments, which impede marriage from being contracted and dissolve one already contracted.

The Church neither ought nor is able to annul a marriage that has been legitimately contracted, because those whom God has joined together no man, however great his power, can separate, since all remain to be judged by the judgment of God himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"

[[commentary]]
quote='''
That conjugal chastity is to be approved according to the evangelical law is shown by authority, as follows. Matthew 19, the Lord responding to the question put to him concerning marriage: Have you not read, that he who made men from the beginning made them male and female: and afterward: What God has joined together, let not man separate? The joining therefore of male and female according to the undivided companionship of life is from the institution of God and approved in the law of the Gospel by the judgment of Christ: and according to this the act of conjugal chastity is understood: therefore this virtue and its act is consonant with divine law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25203.html'
source_title='Disputed Questions on Evangelical Perfection, Question 3'

[[commentary]]
quote='''
Conjugal chastity accords with the law of grace by reason of the Lord's definition, not only through the deed by which He was present at the wedding, but also through the word by which He authoritatively defined it, Matthew 19: What God has joined together, let not man separate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25203.html'
source_title='Disputed Questions on Evangelical Perfection, Question 3'
