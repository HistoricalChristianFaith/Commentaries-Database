[[commentary]]
quote='''
And he himself received him into his arms. Behold, the devotion of the old man in embracing the little child, by which he offered his whole self to Christ, so that he could say that word of the bride in Song of Songs 1: "My beloved is a bundle of myrrh to me; he shall abide between my breasts." For he wished to fulfill that word of the last chapter of Song of Songs: "Set me as a seal upon your heart, as a seal upon your arm"; nay, upon both arms: both, to show that he must be firmly embraced: Song of Songs 3: "I found him whom my soul loves; I held him and will not let him go," etc. He also shows that with both hands and all our strength we ought to serve the Lord, like those who fought with one hand and did the work with the other, Nehemiah 4: not like those "who impose heavy and unbearable burdens, yet are unwilling to move them with their own finger," Matthew 23.

And he blessed God and said. After the merit of holiness, there is here subjoined the proclamation of truth raising up to wonder; whence it concludes in wonder, when it is said: And they were marveling, on account of the greatness of the proclamation. The excellence of this proclamation is gathered from three things, namely, from the preliminary blessing: from the devout praise and magnification of Christ, there: Now you dismiss, in the canticle of Simeon; and from the wonder of the parents, there: And his father and mother were marveling.

Therefore there is set forth first the blessing of God, when it is said: And he blessed God, that is, by blessing he gave thanks, so that he would say: "Bless the Lord, O my soul, and all that is within me, bless his holy name"; 2 Maccabees 10: "In hymns and thanksgivings they blessed God, who had done great things in Israel"; and Sirach 32: "Bless God, who created you, who inebriates you with all his good things."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
