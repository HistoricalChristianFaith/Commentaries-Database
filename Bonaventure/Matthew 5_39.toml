[[commentary]]
quote='''
What the Lord says: "But I say to you, not to resist evil," is true, from the desire for vengeance: but from the love of justice it is well lawful to resist evil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25206.html'
source_title="Collationes de Decem Praeceptis, Collation 6"
