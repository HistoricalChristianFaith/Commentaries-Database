[[commentary]]
quote='''
Here the discernment of those who remained is noted. The Lord shows that even though none of the twelve departed, nevertheless not all remained faithful: on account of which he says: "Jesus answered," the confession of Peter, which he had spoken on behalf of all: "Have I not chosen you twelve, and one of you is a devil?" Judas is called a "devil," because he consented to his suggestions: Psalm concerning Judas: "Set a sinner over him, and let the devil stand at his right hand." He singles out one for malice, so that the rest may fear.

Chrysostom asks: why were they not saddened, as below in chapter thirteen, when he said: "One of you will betray me"? It must be said that below they were saddened not so much for the fault as for the injury to the Lord, which was to be inflicted upon him by his own disciple; but here he only expressed the malice.

Likewise, why did he not cast him out, since he was a devil, and he knew that he would always be evil? Augustine responds that "God makes good use of evil works, just as man makes evil use of good things." Therefore He chose Judas, a reprobate man, so that through him the dispensation of divine mercy for the salvation of the world might be fulfilled, and so that the wondrous patience of God might be shown, in that He endured so wicked a man in so great an office, and so that no one might glory in his present calling.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
