[[commentary]]
quote='''
Fourth, regarding the satiety of those eating, it is added: And they all ate and were satisfied, so that the word of the Psalm might be verified: "The poor shall eat and shall be satisfied, and they shall praise the Lord who seek him"; and that passage: "They ate and were exceedingly satisfied"; satisfied, I say, with the satiety of justice, concerning which Proverbs thirteen says: "The just man eats and fills his soul"; "for blessed are those who hunger and thirst for justice, for they shall be satisfied," Matthew five — not with the satiety of avarice, concerning which Ecclesiastes five says: "The satiety of the rich does not permit him to sleep," because he is so sated that he always hungers. — And since divine abundance exceeds our need, therefore it is added: And what was left over was taken up, twelve baskets of fragments: in which the magnitude of superabundance is shown from the capacity of the vessels and their number, because twelve is the first abundant number, according to what arithmetic teaches. And so was fulfilled that whose figure preceded in 4 Kings four. Elisha said concerning a few loaves: "Thus says the Lord: They shall eat, and there shall be left over. And he set it before them, and they ate, and there was left over according to the word of the Lord." But there the measure of such great abundance is not determined, as it is here: and this on account of the greater perfection in the Gospel and its greater abundance, according to that passage in Matthew five: "Unless your justice abounds more than that of the scribes and Pharisees, you shall not enter the kingdom of heaven." Or on account of the mystery. For these twelve baskets signify the twelve Apostles. Baskets are humble vessels, and these were filled with fragments of five barley loaves, that is, the teaching of the five books of Moses, concerning which 1 Corinthians fourteen says: "I would rather speak five words in the Church with my understanding," etc.

From this a pattern is given to preachers, that they should not invent new things from their own hearts, because the Lord did not create new loaves to feed the crowd — but just as the Lord multiplied the five barley loaves by divine blessing, so all abundance of true teaching must be drawn from the foundation of sacred Scripture, to be multiplied through prayer, by which one looks up to heaven, and devotion, by which one blesses, meditation, by which it is broken, and preaching, by which it is distributed and unfolded. — For catholic teaching must first be drawn from sacred Scripture through reading, whose words are loaves; Matthew four: "It is written: Man does not live by bread alone, but by every word that proceeds from the mouth of God."

But to reading must be joined prayer: Matthew seven: "Seek, and you shall find; ask, and you shall receive; knock, and it shall be opened to you"; we seek by reading, we ask by praying, we knock by working with our hands.

To prayer must be joined devotion and thanksgiving: whence Colossians 4: "Be instant in prayer, watching in it with thanksgiving." Whence Matthew 26: "Lifting up his eyes to heaven, giving thanks, he blessed." - To devotion must be joined meditation and the unfolding of truth, which is nothing other than the breaking of bread: Isaiah 58: "Break your bread for the hungry, and bring the needy and the wandering into your house." - And then it is distributed, when it is ministered according to the capacity of the hearers: Psalm: "Distribute her houses, that you may recount them." And from this the hearers are satisfied: Sirach 15: "She shall feed him with the bread of life and understanding, and give him the water of saving wisdom to drink."

And thus it is clear that the Lord instructed preachers not only by his own familiar example, but also by mystical and figurative example. For the Lord performed this miracle more for the instruction of minds than for the refreshment of bodies, since, as is said in Wisdom 11, he is the supreme lover of souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
