[[commentary]]
quote='''
Second, regarding the manner of endangerment which must be avoided, he adds: Remember the wife of Lot, about whom it is said in Genesis 19: "The wife of Lot, looking back behind her, was turned into a pillar of salt." And the reason for this is that she acted against the command of the Lord, which is stated in Genesis 19: "Do not look back behind you, nor stand still in all the surrounding region, but save yourself on the mountain, lest you also perish together." In this it is understood that the entire danger to salvation in those converted to Christ consists in turning back; whence 2 Peter 2: "It is better not to know the way of truth than, after knowing it, to turn back." And he gives the reason for this when he states beforehand: "For if, having fled the defilements of the world through the knowledge of our Lord and Savior Jesus Christ, they are again entangled in them and overcome, the latter things have become worse for them than the former." And therefore, for the detestation of apostasy and relapse and regression, the Lord placed that memorial about the wife of Lot; about whom Wisdom 10: "A standing pillar of salt, the memorial of an unbelieving soul." Therefore he says pointedly: Remember the wife of Lot. For she was turned into a pillar of salt so that by thus displaying her foolishness she might give others the seasoning of wisdom, so that no one would look back, according to what is said above in chapter 14: "Salt is good; but if the salt has lost its savor, with what shall it be seasoned? It is good for nothing further," etc. Whence the Gloss: "The wife of Lot signifies those who in tribulation look back and turn themselves away from the hope of the divine promise; and therefore she was made a pillar of salt, because by admonishing people not to do similar things, she seasons their hearts, lest they be foolish." This, however, is not only an example but also a figure and a foreshadowing. For just as that conflagration signifies the final judgment that is imminent, so the wife of Lot looking back signifies effeminate and carnal souls who will turn back and apostatize in that tribulation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252017.html'
source_title='Commentary on Luke, Chapter 17'
