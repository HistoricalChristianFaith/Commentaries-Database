[[commentary]]
quote='''
Here the explanation of the doctrine on account of the murmuring is touched upon: and although the murmuring was in secret, yet it did not escape the Lord: whence he says: "But Jesus knowing in himself that his disciples murmured about this": he knew this not by report, but "in himself": below in chapter sixteen: "The disciples said: Now we know that you know all things, and it is not necessary for anyone to question you." Knowing therefore the murmuring and wishing to cut it off, he explains that what he had said is not to be understood carnally, but spiritually. He shows therefore that it is not to be understood carnally, both because it would be false, and because it would be useless. Therefore "he said to them: Does this scandalize you," namely what I said about the eating of my flesh, because you believe carnally that it is to be divided into pieces: just as the Pharisees, in Matthew chapter fifteen: "Do you know that the Pharisees, having heard this word, were scandalized?" And this is false.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
