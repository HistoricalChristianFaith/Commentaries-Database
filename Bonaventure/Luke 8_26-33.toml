[[commentary]]
quote='''
It is shown, therefore, that from the aforesaid, according to the literal sense, seven notable points can be gathered: first, that the power of Christ's word alone exceeds the strength of infinite thousands of demons; second, that the fury of demons with respect to the human race is very great; third, that their fear with respect to the man Christ is very great; fourth, that demons are incorporeal, since so many were in one man; fifth, that they can do nothing even over brute animals unless permitted; sixth, that men in possessing these temporal things are nothing but stewards of Christ; seventh, that God showed that the salvation of one man is to be preferred to infinite brute animals.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
