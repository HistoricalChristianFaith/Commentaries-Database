[[commentary]]
quote='''
The encounter of the Virgin was eager, and it was also familiar; on account of which he says: And she entered the house of Zechariah and greeted Elisabeth. She entered, I say, so that she might dwell together familiarly; Wisdom 8: "Entering into my house, I shall find rest with her." She entered, she did not stand outside, like that "wandering woman, impatient of rest and unable to stay in her house with her feet," Proverbs 7. She also entered, not to quarrel, but to greet, according to what is customary among the Saints: Romans 16: "Greet one another with a holy kiss." She greeted, I say, not only by wishing well, but also by bringing salvation to Jerusalem, so that that word of Isaiah 62 might be fulfilled: "For the sake of Zion I will not be silent, and for the sake of Jerusalem I will not rest, until her just one goes forth as brightness, and her Savior is kindled as a lamp"; and afterward: "Say to the daughter of Zion: Behold, your Savior comes; behold, his reward is with him, and his work before him." — And note that the Virgin first entered the house and afterward greeted, because the Virgin was already beginning to comply with the evangelical precepts: for below in the tenth chapter it is said: "Greet no one along the way"; and afterward it is added: "Into whatever house you enter, first say: Peace to this house." Which the blessed Virgin also did.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
