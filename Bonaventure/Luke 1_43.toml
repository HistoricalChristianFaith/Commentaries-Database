[[commentary]]
quote='''
He therefore introduces an admirative proclamation when Elizabeth says: And whence is this to me, that the Mother of my Lord should come to me? For this is greatly praiseworthy and also wonderful, that a woman should be the Mother of God, and that the Mother of God should visit the handmaid of God. Whence she could say, as Araunah said to King David in the last chapter of 2 Kings: "What is the reason that my lord the king comes to his servant?" For it is a greater thing to be the Mother of God; whence it was a condescension of the Mother of the Lord of all to visit on her own feet another's dwelling. Whence the Virgin glories in Ecclesiasticus twenty-four: "I am the mother of fair love and of fear and of holy hope"; because on account of her maternal dignity the Virgin Mary is to be loved, to be venerated and to be approached with all confidence as the mother of supreme mercy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
