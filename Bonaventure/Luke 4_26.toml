[[commentary]]
quote='''
And although they were in such great necessity, it is added: And to none of them was Elijah sent, to relieve them by a miracle from the want of famine, so that the word of the Psalm might be verified in them: "Hungering and thirsting, their soul fainted within them." But he relieved a foreign woman, whence he adds: Except to Sarepta of Sidon, to a widow woman, according to what is written in 3 Kings 17: It was said to Elijah: "Arise and go to Sarepta of the Sidonians and remain there: for I have commanded a widow woman there to feed you"—nay rather, she herself through you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
