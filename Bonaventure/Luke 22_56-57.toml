[[commentary]]
quote='''
Second, as regards the fragility of Peter in denying, he adds: When a certain maidservant had seen him sitting by the light and had gazed upon him, she said: This man also was with him. But he denied him, saying: Woman, I do not know him: in which Peter's fragility appears, because, as Gregory says, "struck by the voice of a single woman, while he feared to die, he denied the Life." But the devil first assails Peter through a woman in remembrance of the prior deed, according to that passage of Ecclesiasticus 25: "From a woman was the beginning of all sin"; and again in chapter 42: "Does not the moth come forth from garments? So from a woman comes the iniquity of man."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
