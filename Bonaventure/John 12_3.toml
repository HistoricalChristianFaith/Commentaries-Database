[[commentary]]
quote='''
Mary therefore took a pound. Here the second point is touched upon, namely the pouring out of the ointment, which was done by Mary, who neither reclined at table nor ministered, but herself fed the Lord with a special refreshment; whence she burned with vehement devotion toward him, whose devotion is expressed in the ointment poured out. On account of which he says: Mary therefore took a pound of ointment: the quantity of ointment was great, because her devotion was great; not of just any kind, but of spikenard, that is, from nard. Nard is an aromatic herb, as Isidore says, which is of vehement fragrance; on account of which it is said in Song of Songs 1: "While the king was on his couch, my nard gave forth its fragrance." From the spikes of nard a precious ointment is made; whence it is said Mark 14: "Of spikenard." Pistici: the Gloss says: "that is, genuine," as distinct from adulterated; precious, because it was of great price and value. And she anointed the feet of Jesus; and the house was filled with the fragrance of the ointment. According to the literal sense, the Jews were accustomed to nourish themselves with highly fragrant ointments; therefore the Lord commanded the most precious ointment to be offered to himself, Exodus 30, and prohibited it to others; whence he called it holy of holies, which would be "for a most sweet fragrance to the Lord."

Note likewise concerning the ointment according to the spiritual understanding, that it is threefold, whence Mary is also read to have anointed the Lord three times. For there is the ointment of contrition, which was signified in that passage, Luke 7: She began to wash his feet with tears and anointed them with ointment. Of devotion, and this was signified here and in Matthew 26: When Jesus was in the house of Simon the leper, a woman came to him having an alabaster jar of precious ointment and poured it over the head of him as he reclined at table. Of compassion, and this in the last chapter of Mark: Mary Magdalene and Mary the mother of James and Salome bought spices, so that coming they might anoint Jesus. With the first ointment the feet are anointed: with the second, the head: but with the third, the whole body of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
