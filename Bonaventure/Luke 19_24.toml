[[commentary]]
quote='''
Fourth, as regards the just condemnation of the servant himself, there is added: And he said to those standing by: Take the mina from him and give it to him who has ten minas. Those standing by he calls those who assist him in judgment, whether Angels or other Saints, by whose judgment and approbation the reward corresponding to the gift uselessly held will be taken away, and glory and joy will be given to the faithful steward, according to that passage in Apocalypse 3: "Hold fast what you have, lest another receive your crown." This judgment the Lord also exercises in the present, taking away even gifts that have been granted on account of the sloth and misuse of the negligent. Whence the Gloss: "He who neglects to preach grace that has been bestowed by communicating it to others loses it; but it is increased for him who has labored in it, just as the royal chrism, which Saul lost through pride, David merited through obedience. For the Spirit of the Lord, which departed from Saul, was directed from that day forward upon David," 1 Kings 16. Whence also it is said in Matthew 21: "The kingdom of God shall be taken from you and given to a nation bringing forth the fruits thereof."

But more is given to him who has ten minas, on account of the mystery, because he designates the order of those who preached to the Jewish people, who also are finally to be converted to Christ. Whence the Gloss: "When all Israel shall be saved, then the whole fullness of spiritual grace, which we now exercise sluggishly, will be abundantly conferred upon the doctors of that time." Whence Romans 9: "Isaiah cries out for Israel: If the number of the children of Israel be as the sand of the sea, a remnant shall be saved."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
