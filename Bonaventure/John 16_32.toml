[[commentary]]
quote='''
Behold, the hour is coming and has already come, that is, it draws near: that you will be scattered, each one to his own, that is, that you will be scattered, such that each one to his own, because not one remained with another, neither in faith nor in body; Zechariah thirteen: "Strike the shepherd, and the sheep of the flock will be scattered." And you will leave me alone; Isaiah sixty-three: "I have trodden the winepress alone, and of the nations there is no man with me." But this solitude was not through a lack of divine aid, but of human aid: therefore he says: But I am not alone, because the Father is with me: above in chapter eight: "He who sent me is with me and has not left me alone." Nor is it contrary to what is said in the Psalm: "Why have you forsaken me?" because that is understood of the exposure to punishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
