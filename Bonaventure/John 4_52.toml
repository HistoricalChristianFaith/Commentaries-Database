[[commentary]]
quote='''
"He therefore inquired the hour in which he had gotten better," so that through the hour he might recognize in his son the power of Christ. "And they said to him: Yesterday at the seventh hour the fever left him:" and from this he recognized the power of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
