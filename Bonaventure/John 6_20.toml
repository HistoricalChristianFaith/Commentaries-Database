[[commentary]]
quote='''
"But he said to them: It is I," namely, who protect you: "do not be afraid." When the Lord is present, there is nothing to fear, according to that verse of the Psalm: "The Lord is my protector: of whom shall I be afraid?" And from this they took confidence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
