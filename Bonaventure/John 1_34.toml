[[commentary]]
quote='''
"And I saw" and bore witness that this is the Son of God. Here the certain testimony is touched upon. For the testimony is certain when a man testifies concerning what he has seen. Therefore he says: "And I saw and bore witness that this is the Son of God": below, chapter 19: "And he who saw bore witness, and his testimony is true."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
