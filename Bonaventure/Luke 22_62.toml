[[commentary]]
quote='''
And therefore he adds: And going out, Peter wept bitterly, that is, he shed tears from the great bitterness of compunction; whence Ambrose says: "He wept most bitterly, so that tears might wash away the offense; and you likewise wash away your fault with tears." This bitterness, moreover, is the greatest part of penance; whence Ambrose says: "I read of tears; I do not read of satisfaction." Tears of this kind, when they proceed from bitterness, incline the Lord to forgiveness. As a figure of which it is said in Fourth Kings chapter twenty: "Hezekiah wept with a great weeping"; and it is added there that the Lord delivered him from the danger of death. And therefore the holy prophet David, in the person of the penitent man, says in the Psalm: "I will wash my bed every night; I will water my couch with my tears." From which it is apparent what the fruit of the permitted denial was, namely, an example of penance and compunction; on account of which the Lord also drew the princes of the Apostles, Peter and Paul, out of the filth of vices. On account of which, First Timothy chapter one: "I was a blasphemer and a persecutor and insolent, but therefore I obtained mercy," "so that in me first Christ Jesus might show all patience, for the instruction of those who would believe in him unto eternal life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
