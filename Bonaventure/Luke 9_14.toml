[[commentary]]
quote='''
Fourth, with respect to the numerousness of the people, it is added: Now there were about five thousand men, and accordingly so great a multitude that for each loaf there were a thousand men. Whence he names and numbers men: from which it appears how great was the crowd of the rest, not numbered on account of their multitude; whence in Matthew chapter fourteen it is said that there were "five thousand, besides children and women." He expresses the number, moreover, because on account of the five it was fitting for the Law, which instructed carnal and sense-bound men; on account of the perfection of the thousandfold it was fitting for the reception of the doctrine of evangelical perfection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
