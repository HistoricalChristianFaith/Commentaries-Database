[[commentary]]
quote='''
Second, with regard to the leisure of the contemplative life, he adds: And she had a sister, named Mary, who was perfect in the leisure of contemplation; whence it is added: Who also, sitting at the feet of the Lord, heard his word. This indeed was the leisure of this woman: to attend to the Lord, to be at rest, to sit, and to be silent. Whence it is said in John eleven that "Mary sat at home," and this at his feet: because, in Deuteronomy thirty-three, "those who approach his feet shall receive of his teaching." By sitting at his feet is understood humility, which ought to be in contemplative persons so that they may abound in the fruits of devotion, according to that verse of the Psalm: "Who sends forth springs in the valleys," etc. But he who so sits as a humble person is watered by the tears of compunction, according to that passage of Jeremiah fifteen: "I sat alone, because you have filled me with bitterness"; and that is the office of the contemplative soul, namely to devote oneself to the tears of compunction and devotion. Whence this Mary, the exemplar of contemplation, is always described as it were weeping: above, namely in chapter seven, where it is said that "standing behind at the feet of the Lord, she began to wash his feet with tears," etc.; and in John eleven, where it is said that "Mary, when she had come where Jesus was, seeing him, fell at his feet. Jesus therefore, when he had seen her weeping, groaned in spirit"; and in John twenty: "Mary stood at the tomb outside, weeping." And the first are tears of compunction; the second, of compulsion; the third, of devotion, which contemplatives ought to have, sitting at the feet of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
