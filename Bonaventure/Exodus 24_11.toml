[[commentary]]
quote='''
In contemplation, there is admiration, expansion, a transference and restoration of one's self. Hence, "after gazing on God, they could still eat and drink."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25203.html'
source_title='Collations on the Hexaemeron, Collation 3'
