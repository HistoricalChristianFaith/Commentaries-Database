[[commentary]]
quote='''
It is also shown thirdly to have the office of consoling through promise, when it is added: Every valley etc.; in which he foretells the effect of Christ's coming with respect to the humble just, with respect to sinners, and with respect to all. — Because he will exalt the humble; on account of which it is said: Every valley shall be filled, that is, the humble one: Psalm: "The valleys shall abound with grain"; above in the first chapter: "He has exalted the humble"; below in the eighteenth chapter: "Everyone who humbles himself shall be exalted." The figure of this is in Fourth Kings, chapter four, where Elisha filled the empty vessels. — He will humble the proud; on account of which is added: And every mountain and hill shall be brought low: Isaiah forty-five: "I will go before you and will humble the glorious ones of the earth"; Job forty: "Look upon every arrogant one and humble him." — He will set straight those who go astray: on account of which he adds: And the crooked shall be made straight: Bede: That is, the hearts of the wicked, twisted through injustice, shall be made straight, that is, they shall be directed to the rule of justice: Proverbs sixteen: "Reveal your works to the Lord, and your thoughts shall be directed." This moreover is against hypocrites, who hide their counsels from the Lord: Second Thessalonians three: "But may the Lord direct your hearts" etc. — He will calm the turbulent: on account of which he says: And the rough ways into smooth paths, that is, wrathful minds shall be converted to meekness; Isaiah eleven: "The wolf shall dwell with the lamb, and the leopard shall lie down with the kid: the calf and the lion and the sheep shall abide together."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Commentary on Luke, Chapter 3'
