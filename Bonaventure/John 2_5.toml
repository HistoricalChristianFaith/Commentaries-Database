[[commentary]]
quote='''
His Mother says to the servants: Whatever he shall say to you, do it. For she knew that he was able; she knew also that he knew; she knew that he would be willing, because he always obeyed her: whence Luke 2: "He went down with them and came to Nazareth and was subject to them," Jesus, namely, to his parents; and from this she was certain that he would do it. Therefore she says: Whatever he shall say to you, do it, as good servants, so that you may obtain the miracle, just as also Naaman, 4 Kings 5: "Father, even if the Prophet had told you a great thing, you ought to have done it." Do whatever he shall say to you: do not doubt; below, chapter eleven: "If you believe, you shall see the glory of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
