[[commentary]]
quote='''
Thirdly, regarding Christ's gracious companionship, he adds: And it came to pass, while they talked and questioned among themselves, that Jesus himself, drawing near, went with them. They are said to talk in their speaking, because they were speaking words that did not have certainty, so that they could truly say that word of Sirach 43: "We shall say much, and yet shall want words; but the consummation of our words is he himself." And because they were in harmony in their going and were speaking about the good, therefore they were made worthy of the companionship of Christ. For Matthew 18: "Where two or three are gathered in my name, there am I in the midst of them"; and this was because they loved Christ. For John 14: "If anyone loves me, he will keep my word, and my Father will love him, and we will come to him," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
