[[commentary]]
quote='''
And he had received an answer. Here secondly he is commended by the Spirit of truth as leading him to wait upon a divine response; with respect to which it says: And he had received an answer from the Holy Spirit, namely through revelation: Isaiah 30: "At the voice of your cry, as soon as he shall hear, he will answer you." He had received a consolatory answer, according to Zechariah 1: "The Lord answered the Angel who spoke in me good words, words of consolation." And therefore it is added: That he should not see death before he had seen the Christ of the Lord. Whence he could say with Job 19: "In my flesh I shall see God my Savior," so that the qualification in the flesh refers to both the one seeing and the one seen. And he could also sing with the Prophet: "I shall not die, but I shall live," etc. He could also say with the Apostle, 1 Corinthians 2: "We have not received the spirit of this world, but the Spirit that is of God, that we might know the things that are given us from God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
