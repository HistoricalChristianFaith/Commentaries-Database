[[commentary]]
quote='''
There are also many other things which Jesus did. He shows that he did not write all things fully: in which he humbles our understanding, lest we believe ourselves capable of knowing all things. For this reason he says that he did not write them. Therefore he says: Which if they were written out one by one, I do not think the world itself could contain the books that would have to be written — the text should be construed thus: contain those books which would have to be written — because our capacity is small: whence above in chapter sixteen: "I have many things to say to you, but you cannot bear them now."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: what does he mean when he says that the signs of Christ could not be contained in the whole world, since the world would contain the books not only if His deeds, but even all things that have been done from the beginning of the age, were written down? And it must be said that capacity is twofold: bodily and spiritual, which is through the intellect. If it is said of bodily capacity, it is spoken by way of hyperbole, as in other places of Scripture, as in the Psalm: They set their mouth against heaven: and concerning Solomon, that he made so great an abundance of silver as there are stones in Jerusalem, 3 Kings chapter ten. But if it is said or taken of the capacity of understanding, it is true according to the letter: whence Augustine: "We, knowing that our understanding could not contain the things that could be written concerning Christ: let us take care, by understanding with right faith what he wrote, and by practicing with right action what he taught, to arrive at the everlasting gifts which the Lord Himself promised," with the help of Him who lives and reigns forever and ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
