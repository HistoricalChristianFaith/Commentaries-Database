[[commentary]]
quote='''
Here, after the reproaches of the detractors, prophetic examples are added, confuting the detractors. For their full confutation, a general proverb is first set forth; second, a special example in Elijah, the most eminent of the Prophets; third, in Elisha, his disciple. The first is for admonishing, the second for confuting, the third for confirming. Therefore he sets forth the general proverb concerning every Prophet and people, when he says: And he said, namely Christ: Amen I say to you, that is, with certainty, because amen is a sign of affirmation. And truly so, because, as he himself says in Matthew twenty-four, "heaven and earth shall pass away, but my words shall not pass away." That no prophet is accepted in his own country, namely neither as regards doctrine nor as regards life, in which Prophets were accustomed to have excellence. And therefore it is not surprising if he does not work miracles in his own country, which are not to be done for the ungrateful and unworthy. This denunciation of the Savior is attested by the fact that Joseph is sold by his brothers, Genesis thirty-seven, and honored by the Egyptians, Genesis forty-one. So Moses suffers insult from Aaron and Miriam, Numbers twelve, and is reproached by his fellow tribesmen, Numbers sixteen. So Abraham suffers from his countrymen; whence it is said to him: "Go forth from your land and from your kindred," Genesis twelve.

Bede in the Gloss assigns the reason for this: "The other Prophets were less honored in their homeland than in other cities, because it is almost natural for citizens to envy their fellow citizens. For they do not consider the present works of the man, nor his virtue, but they recall his frail infancy, as though they themselves had not also passed through the same stages of age to maturity."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
