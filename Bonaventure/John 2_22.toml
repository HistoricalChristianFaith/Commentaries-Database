[[commentary]]
quote='''
When therefore he had risen from the dead, his disciples remembered that he said this, about his own body. For then he opened their understanding to comprehend: Luke, last chapter: "He opened their understanding, that they might understand the Scriptures." And from then on they believed the Scripture, in which, namely, the resurrection of Christ was prefigured, as in Jonah; and they believed also the word that Jesus had said, because for this reason he had foretold it: below, chapter fourteen: "Now I have told you before it comes to pass, that, when it shall come to pass, you may believe."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
