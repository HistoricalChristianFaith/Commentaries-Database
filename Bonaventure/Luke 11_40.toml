[[commentary]]
quote='''
Whence it is added: Fools, did not He who made that which is without, namely the body, also make that which is within? namely the spirit. In which is simultaneously condemned the heresy of the Manicheans, who attribute the spirit to God as author and the body to the devil; although it is said in Genesis 2 that "the Lord God formed man from the slime of the earth and breathed into his face the breath of life." There is also refuted the hypocrisy of the Pharisees, who strove to please God by the purification of the body alone, although the Lord made both and is especially the creator of the soul, according to that word of Ecclesiastes last chapter: "The spirit shall return to God, who gave it"; and the Lord especially calls Himself the God of souls: Ezekiel 18: "All souls are mine, says the Lord; as the soul of the father, so also the soul of the son." And on this account He especially wills the cleanness of souls; and to such a one He promises His presence, according to that word of Matthew 5: "Blessed are the clean of heart, for they shall see God"; and therefore the Pharisees, who did not care for this, were as fools. Whence Chrysostom: "God neither praises the cleanness of bodies nor condemns their filth. Suppose, however, that He hates the filth of vessels — how much more does He hate the filth of conscience?" Whence this must be especially attended to, because without cleanness of conscience nothing is clean; Titus 1: "All things are clean to the clean, but to the defiled and unbelieving nothing is clean, but their mind and conscience are defiled."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
