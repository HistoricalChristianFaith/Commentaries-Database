[[commentary]]
quote='''
Second, as regards the question that uncovers, he adds: And Jesus answering said to the lawyers and Pharisees. He pointedly says answering, although no one had previously asked anything, because he was responding to their thoughts, which he saw and heard, according to that passage in Matthew nine: "When Jesus had seen their thoughts, he said: Why do you think evil in your hearts?" Whence the Gloss: "Jesus answering, the treacherous observers," because it is said in Wisdom one: "The ear of jealousy hears all things, and the tumult of murmurings shall not be hidden." And therefore he responds to their thoughts by posing to them the question which they themselves were also pondering, when he adds: Saying: Is it lawful to heal on the Sabbath?

The Pharisees are read to have posed this question to the Lord, as is read in Matthew twelve: "They asked whether it is lawful to heal on the Sabbath, that they might accuse him." But Luke expresses their thoughts, while Matthew expresses the spoken word. The Lord was asking this of them because they professed themselves to be lawyers; whence the Gloss: "From the lawyers he seeks the judgment of the Law." On account of which, Malachi two: "The lips of the priest shall keep knowledge, and they shall seek the law from his mouth"; and the Gloss on the same passage: "If the priest is questioned about the law, let him teach; otherwise he vainly boasts of a dignity whose function he does not exercise."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Commentary on Luke, Chapter 14'
