[[commentary]]
quote='''
Nevertheless, because what is one's own is lost on account of what is another's, he therefore adds: And if you have not been faithful in what belongs to another, through the due dispensation of earthly goods; whence the Gloss: "Whatever belongs to the world is alien to us, because it is beyond our nature." These are indeed called another's goods, because we can neither bring them with us nor take them away: First Timothy, last chapter: "We brought nothing into this world, and without doubt we can take nothing out of it"; and Job 1: "Naked I came forth from my mother's womb, and naked shall I return there." - What is yours, who will give it to you? Through the attainment of the heavenly reward. For that is ours for which we were created and preordained, and which, once possessed, cannot be lost: whence Matthew 25: "Come, blessed of my Father, possess the kingdom prepared for you," etc.; and above, chapter 6: "Blessed are the poor, for yours is the kingdom of God." But this kingdom is nothing other than God and the Lord Jesus Christ: whence the Gloss: "What is yours, that is, what is properly appointed for man — Christ is ours, because Christ is our life"; Colossians 3: "When Christ, your life, shall appear, then you also shall appear," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Commentary on Luke, Chapter 16'
