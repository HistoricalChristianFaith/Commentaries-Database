[[commentary]]
quote='''
They answered and said to him: You were wholly born in sins, and do you teach us? — us, who are reputed to be righteous. Truly these were Pharisees similar to the one who praised himself in prayer, Luke eighteen. And they cast him out, for the truth they inflicted injury upon him. Chrysostom: "You see how much the herald of truth suffered. These things were written so that we too might imitate him in like manner." Similarly concerning Stephen, Acts seven: "And casting him out of the city, they stoned him."

Unable to draw him back by flatteries, nor by cunning, nor by reproaches, they resort to injuries: whence, moved by indignation, they answered and said to him: You were wholly born in sins, and do you teach us?

It is asked why the Pharisees say to him: You were wholly born in sins. The response can be that they speak not from reason but from indignation. Or because he had not withdrawn from the sins in which he had been born through religious observance, as the Pharisees had; or on account of his blindness, which was a punishment for sin, they called him born in sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
