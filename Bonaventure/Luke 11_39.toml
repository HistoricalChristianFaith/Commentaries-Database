[[commentary]]
quote='''
Second, as regards the severity of the rebuke on the part of the Master, he adds: And the Lord said to him: Now you Pharisees make clean the outside of the cup and of the dish. The cup is a vessel for drinking, the dish for eating; and these vessels the Pharisees and Jews especially cleansed, because they thought themselves defiled by the uncleanness of vessels. Whence in Mark 7 it is said that "many things have been handed down to them to observe: the washings of cups and pitchers and bronze vessels." For indeed, as Ambrose says, "the cup is a glass vessel, and the dish an earthen vessel"; and because both are fragile, it rightly designates the fragility of the human body, about which the Pharisees were chiefly concerned, having neglected the cleanness of conscience; and this was reprehensible. For it is said in Isaiah 1: "Wash yourselves, be clean, take away the evil of your thoughts from before my eyes"; and in Jeremiah 4: "Wash your heart from wickedness, O Jerusalem, that you may be saved"; which the Pharisees did not observe.

On account of which he adds: But that which is within you is full of rapine and iniquity, and thereby unclean and abominable. Whence concerning them could be said that word of Micah 6: "Her rich men are full of iniquity, and her inhabitants spoke falsehood"; Ecclesiasticus 1: "You have come deceitfully to the Lord, and your heart is full of guile and deceit"; because he does not have within what he feigns without. And this was not only malice, but also foolishness, because, having neglected the better, they cared only for the worse.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
