[[commentary]]
quote='''
"When this man had heard that Jesus came from Judea into Galilee," because the fame of his coming had spread abroad: Mark 1: "His fame went forth immediately into all the region of Galilee"; "he went to him," out of devotion: Matthew 8: "A centurion came to him, beseeching him." "And he besought him to come down," through bodily presence: above, chapter 2: "He went down to Capharnaum, he and his Mother," etc. "And heal his son," through wondrous power: Luke 6: "Power went forth from him and healed all." "For he was beginning to die," through natural powerlessness: 4 Kings 20, it was said to Hezekiah: "You shall die and not live," according, namely, to lower causes. And because this royal official, although he was asking, did not yet firmly believe, therefore the Lord rebuked him for unbelief.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
