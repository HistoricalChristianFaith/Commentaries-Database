[[commentary]]
quote='''
And because they ask with discernment, therefore they are fruitfully instructed, when it is added: And he said to them: Do nothing more than what has been appointed for you — appointed, I say, according to divine law: Deuteronomy four: "You shall not add to the word that I speak to you, neither shall you diminish from it: keep the commandments of your God." Thus the Lord answered the rich young man: Matthew nineteen: "If you wish to enter into life, keep the commandments," because, according to that of the Psalm, "in keeping them there is great reward": Ecclesiastes eight: "He who keeps the commandment shall experience no evil." — And note his prudence, by which he commands each one according to his ability. For seeing them to be weak, he does not impose heavy burdens, but mitigates the load as much as he can, according to that of Romans fourteen: "Him that is weak in the faith, receive." Whence John, who was most rigorous with himself, became kind to the weak publicans, so that he could say that word of the Apostle, First Corinthians nine: "I became weak to the weak, that I might gain the weak. I became all things to all men," etc.

And note that here John seemed to uphold the office of the publicans, although below in chapter five concerning Matthew the publican that office is suggested to be disreputable. — And therefore it must be understood that for taxes to be duly collected, there is required due authority, due cause, and due measure: and this he indicates when he says: Nothing more — behold, measure; than what has been appointed — behold, authority; for you, that is, for the benefit of the community — behold, cause. And because these conditions are rarely observed, therefore such men were accustomed to be sinners and disreputable, not because that office could in no way be rightly performed, but because it is difficult and rare that they do not exceed what has been appointed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Commentary on Luke, Chapter 3'
