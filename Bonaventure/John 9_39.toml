[[commentary]]
quote='''
And Jesus said to him: For judgment I have come into this world, that those who do not see may see, and those who see may become blind. For judgment, namely of discernment, that those who see, that is, who consider themselves to see, as the Jews did, may become blind. Concerning this judgment it is said in Romans 11: "I do not want you to be ignorant, brethren, lest you be wise in your own conceits, that blindness in part has happened in Israel, until the fullness of the Gentiles should enter in"; and again in Romans 9: "The Gentiles, who did not pursue justice, have attained justice; but Israel, pursuing the law of justice, has not arrived at the law of justice." And that this judgment is just is evident from the inquiry of the Pharisees and the response of the Lord, in which the malice and obstinacy of the Jews is intimated; because, although they saw, they were unwilling to believe and understand: and therefore by the judgment of God and by their own sin they have been blinded.

It is asked: above in the third chapter it is said: "God did not send his Son to judge the world." The response is that he came for a judgment of discernment, but not of condemnation. However, it can be said otherwise that there is a difference between saying "I came into judgment" and "for judgment": to come for judgment indicates the final intention of judging — thus he did not come in the first advent. But to come into judgment means that from his coming some judgment is made upon the proud, because they are blinded by his coming, even though he does not come for this purpose.

It is asked further: It seems that blinding is from the Lord Jesus Christ. And indeed this seems to be what must be said by reason: because if blinding is a punishment, and every punishment is just, and what is just is good, and what is good is from God, then blinding is from God. But against this: God is light, just as he is also heat: therefore if it does not belong to heat to make cold, nor does it belong to light to darken, then neither does it belong to God to blind. Likewise, God always desires that his image be conformed to himself: therefore if blinding deforms, it does not belong to God to blind.

The response is that blinding can be considered either according to what it is: and thus it is a privation and does not have an efficient cause, but a deficient one. But God is the deficient cause of nothing: and thus its cause is our malice, whence Wisdom 2: "Their own malice blinded them." However, because blinding and hardening are punishments, they posit being according to what they are: and punishment according to what it is, is just, and thus, according to what it is, it can be from God. Further, it seems that one should say that in two ways some punishment is from God: in one way, as from the one who orders; and thus sin, which is the punishment of sin, insofar as it is punishment, is from God, and thus it is not from God according to what it is, but insofar as it is punishment. In another way, some punishment is said to be from God according to what it is, and this either from God inflicting it: and in this way death and other punishments, through which it is possible to merit. In another way, from God withdrawing something by our merit: and thus the tinder of sin is from God. For God ceased to give the soul grace, by which it might govern the flesh, and this by our merit: and when this grace was withdrawn, the flesh declined toward lower things. In a third way, as from one who does not bestow according to our merits: and thus blinding and hardening. For someone is hardened in evil because he is not visited by the Lord, by just judgment; someone is blinded because he is not illuminated interiorly: so Augustine says.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
