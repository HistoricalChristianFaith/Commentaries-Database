[[commentary]]
quote='''
Second, as to the manner of finding the tomb, he adds: And they found the stone rolled away from the monument. Concerning the rolling away of this stone they were anxious, as is said in Mark 16: "And they said among themselves: Who shall roll away the stone for us from the door of the monument? And looking up, they saw the stone rolled away. For it was very great." Now this stone was not rolled away at the resurrection, but after it; whence Bede says: "He who came forth from the closed womb of the Virgin was able to come forth from the closed tomb." But the Angel of the Lord did this for the sake of manifestation; whence Matthew 28: "The Angel of the Lord descended from heaven, and coming, rolled away the stone and sat upon it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
