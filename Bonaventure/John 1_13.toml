[[commentary]]
quote='''
"Who not of bloods," that is, of the commingling of seeds; "nor of the will of the flesh," that is, of a woman; "nor of the will of man," that is, of pleasure and desire; "but are born of God"; because below in chapter 3: "That which is born of the flesh is flesh, and that which is born of the spirit is spirit"; and 1 Peter 1: "Being born again, not of corruptible seed, but of incorruptible, through the word of the living God, abiding forever," that is, always.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
