[[commentary]]
quote='''
Second, as to the rejection of the allegation of reasons, he adds: Then you will begin to say: We ate before you and drank: behold, the allegation of familiarity in life; and in our streets you taught, as to familiarity in doctrine. Or the first can be referred to the miracles which Christ performed among the Jews, when he multiplied the loaves, John 6, and changed water into wine, John 2: the second to teachings. For these had seen miracles and heard teachings: whence Matthew 11: "Woe to you, Chorazin! Woe to you, Bethsaida! For if in Tyre and Sidon had been done the mighty works that have been done in you, they would long ago have done penance in sackcloth and ashes." Thus they allege knowledge of Christ, because they knew his works and miracles, and they also knew his words and teachings. Such will be the wicked Christians at the judgment, of whom it is said in Titus 1: "They profess to know God, but by their deeds they deny him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Commentary on Luke, Chapter 13'
