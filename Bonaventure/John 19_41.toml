[[commentary]]
quote='''
Now there was in the place. Here the third point is set forth, namely the placement in the tomb. And the reason why he was placed in that location is indicated as twofold, namely the suitability of the place and the shortness of time: the suitability of the place, because it was nearby and new: whence he says: Now in the place where he was crucified there was a garden, and in the garden a new tomb: and therefore new, in which namely no one had yet been placed. And such a tomb was fitting for the Lord, so that the resurrection would not be thought to be that of another who might lie with the Lord. Augustine says that "just as in the womb of the Virgin Mary no one before him, no one after him was conceived: so in this tomb no one before him, no one after him was buried."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
