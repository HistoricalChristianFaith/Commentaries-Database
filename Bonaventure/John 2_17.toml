[[commentary]]
quote='''
The disciples remembered. Here is noted the approval of the correction made through Scripture. Therefore he says: His disciples indeed remembered, not then, but after the resurrection, when they understood the Scripture; then, I say, they remembered that it is written: The zeal of your house has consumed me, in that Psalm 68: "Save me, O God." Concerning this consuming of zeal, Augustine says: "He is consumed by zeal for the house of God who desires to correct all things that he sees there to be perverse, who does not rest from amending them; if he cannot amend them, he endures and groans."

It is also asked concerning the statement that zeal was in Christ. For if zeal implies anger, and anger implies disturbance, and in Christ there could not be disturbance, therefore neither could there be zeal.

To this, Victor responds that zeal is spoken of in two ways: in one way it implies a disturbance of the soul, just as anger does, and thus it was not in Christ: Isaiah 42: He shall not be sad nor turbulent. In another way, zeal is the same as fervent love, and thus it was in Christ; whence the Gloss of Augustine says: "Good zeal is a fervor of the soul, by which the mind, having cast aside human fear, is kindled for the defense of truth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
