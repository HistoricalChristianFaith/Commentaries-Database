[[commentary]]
quote='''
Amen, amen, I say to you. Here, thirdly, he exhorts them to imitate him in honoring his servants by consideration of the greatness of merit. For great merit belongs to the one who honors the Lord, and the Lord himself reckons honor done to a servant as his own: and thus great merit belongs to the one who honors Christ's servant. Therefore he says: He who receives whomever I send, receives me, that is, he who honors the one sent honors me the sender; Matthew 25: "As long as you did it for one of the least of mine, you did it for me." And he who receives me receives him who sent me, that is, he who honors the Son honors the Father, who sent him; a similar saying is found in Matthew 10: "He who receives you receives me, and he who receives me receives him who sent me." And from this it is argued that just as it is a great transgression to despise God, and a great merit to honor him, so also with regard to the servants of God.

Question. It is asked concerning what is said: He who receives anyone whom I shall send receives me. According to this, he who honors the messenger honors the sender: therefore just as "the honor of the image is referred to the prototype," so the honor of the messenger to the Lord: therefore if we ought to adore the image of Christ with latria, so also the messengers of Christ. This same thing seems to follow from the text, because he adds as a parallel that he who honors him honors the Father, who sent him: but each is to be honored with the same honor. I respond: It must be said that honor being referred to someone is twofold: either as to the object, or as to the end. I say therefore that the honor of the image is referred to the prototype as to the object, because it is not the stone that is honored, but God. But the honor of the one sent is referred to the sender as to the motive and end: and because a person does not honor the one sent except on account of the sender and consequently, not primarily as the object; because from this God considers himself honored or dishonored: therefore the image is to be adored with latria, but the messenger with dulia. As to what is objected from the parallel, it must be said that it is not entirely similar; because there it is a conformity of nature, but here of grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
