[[commentary]]
quote='''
Sanctify them in truth. Holy, that is, without earth; to sanctify, that is, to cleanse and purify; but this truth is in the word of God. Therefore he says: Your word is truth: and by this word of God the disciples are sanctified, that is, purged from error. Chrysostom: "Sanctify them in truth, that is, instruct them, teach them truth; for right doctrines sanctify the soul." For the word of God knows how to purge; therefore it was said above in the fifteenth chapter: "You are clean because of the word which I have spoken to you"; and in Ephesians 5: "Christ sanctified the Church, cleansing her by the washing of water in the word of life." Concerning such sanctification, 2 Timothy 2: "If anyone shall have cleansed himself from these things, he shall be a sanctified vessel, useful to the Lord, prepared for every good work."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
