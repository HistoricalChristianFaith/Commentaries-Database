[[commentary]]
quote='''
And Jesus said to them. Here the fourth point is touched upon, namely the approval of the miracle, in the approval of the wine made by the testimony of the chief steward, whose duty it was to judge the wine. On account of which he says: And Jesus said to them, namely, to the servants: Draw out now and carry it to the chief steward. And they carried it, according to his command; namely, therefore he commanded it to be brought to him, because the chief steward presided over the wedding and judged such matters. "A triclinium, that is, three rows of those reclining at table, separated by height"; hence chief steward, because he presided over the banquet of the arrangement of three tables; or chief steward, the head of three chambers; or generally, one who presides over the servants, as Chrysostom says. To this man he commanded it to be brought, so that he might judge the wine.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
