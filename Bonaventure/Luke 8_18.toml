[[commentary]]
quote='''
Take heed therefore how you hear, etc. Here, third, the Apostles are invited to the same by the advantage of their own merit, and this because its possession makes one rich, while its privation indeed renders one poor. — The divine doctrine must therefore be preached, first, because the possession of teaching leads to abundance: on account of which he says: Take heed therefore how you hear: Bede: "That you may receive it in your heart and continually ruminate upon it and be able to pour it forth for the hearing of others"; as if to say: do not hear the words of divine instruction negligently, so as not to care, but diligently, so that you may abound and bestow upon others. Whence he also adds: For whoever has, it shall be given to him: for whoever has the desire and the will to advance, God will give him understanding and the ability to teach. Whence Wisdom seven: "I wished, and understanding was given to me; and I called upon God, and the spirit of wisdom came upon me"; and afterward: "All good things came to me together with her." Whence if anyone wishes that it be given to him abundantly, he ought himself also to give freely from what he has: above, chapter six: "Give, and it shall be given to you," namely the gift of wisdom, according to that passage in James one: "If any of you lacks wisdom, let him ask of God, who gives to all abundantly," etc. Whence the gift of wisdom is given to no one unless he has the desire: Isaiah fifty-five: "All you who thirst, come to the waters, and you who have no money, make haste," etc.

Second, by the contrary, because its privation leads to want, he adds: And whoever does not have, namely the affection for divine teaching in the heart, even what he thinks he has, through the swelling of pride, will be taken from him, namely through the rigor of the divine sentence: below in the nineteenth chapter: "Take the mina from him and give it to the one who has ten minas"; and Matthew twenty-one: "The kingdom shall be taken from you," namely of Sacred Scripture, "and given to a nation producing its fruits." From this it is gathered that no one can attain the fullness of divine wisdom unless he has the readiness to communicate doctrine: whence Wisdom six: "What wisdom is and how she came to be, I will relate, and I will not hide from you the mysteries of God." "Nor will I travel with consuming envy: for such a man will not be a partaker of the wisdom" of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
