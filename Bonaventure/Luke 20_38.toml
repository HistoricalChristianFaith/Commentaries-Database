[[commentary]]
quote='''
From this, however, the Lord wishes to infer the future resurrection, when he adds: But God is not of the dead, but of the living. For all live to him. From which it follows that they live to him either in act or in potency; but all these were actually dead; therefore they were living to God as to power and disposition. It is therefore necessary to posit a future resurrection. There are, moreover, many testimonies in the Old Testament by which the resurrection of the dead can be proved: Isaiah 26: "Your dead shall live, my slain shall rise again"; and Ezekiel 37: "Dry bones, hear the word of the Lord: Behold," etc.; likewise, Daniel 12: "Many of those who sleep in the dust of the earth shall awake"; likewise, Job 19: "I know that my Redeemer lives, and on the last day I shall rise from the earth"; likewise, Hosea 6: "After two days he will revive us, on the third day he will raise us up"; likewise, Joel 3: "Let them rise up and let the nations ascend into the valley of Jehoshaphat," etc.; likewise, 2 Maccabees 7: "He himself will give you spirit and life with mercy." But the Lord introduced none of these seven witnesses, because the Sadducees, to whom he was responding, accepted only the Pentateuch; whence the Gloss: "He could have given clearer testimonies of the resurrection from the Prophets, but the Sadducees do not accept the Prophets." Or because through this he proves the life of souls after death, which the Sadducees denied, and this was the root of their error. Or because in the citation of this word there is simultaneously enclosed the mystery of the Trinity in the threefold repetition of God, the mystery of the threefold virtue, namely of faith, hope, and charity, in the three aforementioned Patriarchs, the mystery of the Incarnation in the burning bush and also the mystery of the Passion, and in the entire authority the mystery of the Resurrection, and thus, as it were, the whole mystery of the Christian faith; because every figure of mysteries and variety of words has been consummated in the incarnate Word, according to that passage in Isaiah 28: "I have heard of consummation and abbreviation," etc.; and Hebrews 1: "In many ways," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
