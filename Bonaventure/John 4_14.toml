[[commentary]]
quote='''
Unless man is trained in the gift of understanding, he cannot proceed to the drink of wisdom, which makes a river flow in the soul, a river which the soul itself drinks, that "shall become in him a fountain of water, springing up unto life everlasting."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25203.html'
source_title='Collations on the Hexaemeron, Collation 3'

[[commentary]]
quote='''
Scripture enlightens from nearby by means of the gifts of graces which supplement what is lacking in human activity. For many scientists came as guests: they came to our house and to our activity. But in these matters, activity must reach a limit. Wherefore Scripture enlightens such matters from nearby. Hence it is not good to go far out for something that is close at hand. Indeed, Scripture describes the gifts of the Holy Spirit throughout. In John: Jesus therefore, wearied as He was from the journey, was sitting at the well. And there follows: "Everyone who drinks of this water will thirst again. He, however, who drinks of the water that I will give him shall never thirst." And so, two kinds of water are distinguished. For one knowledge is described as being external, and the more one drinks of it, the more he thirsts; the other, as being internal, of which it is said: "He who believes in Me, as the Scripture says, 'From within Him there shall flow rivers of living water.'" He said this, however, of the Spirit whom they who believed in Him were to receive. And these are the waters from the fountain of salvation, that is, awareness of those graces that sustain souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252017.html'
source_title='Collations on the Hexaemeron, Collation 17'

[[commentary]]
quote='''
"But the water that I shall give him shall become in him a fountain of water springing up into eternal life: springing up," because it causes one to spring up to where the fountain is unfailing: Psalm: "With you is the fountain of life"; a fountain also perfectly refreshing: whence in the Psalm: "They shall be inebriated with the plenty of your house, and you shall give them to drink of the torrent of your pleasure." To this water the Lord invites in Isaiah 55: "All you who thirst, come to the waters; and you who have no money," etc. Thus therefore he aroused the woman by asking a service, by offering a benefit, by explaining the gift offered.

It is asked about what he says: "Whoever drinks of the water that I shall give him shall never thirst." Either he means bodily thirst or spiritual thirst: if bodily, it is false, because those who have grace still thirst: if spiritual, it still seems false: Ecclesiasticus 24: "Those who drink will thirst still more."

It must be said that he speaks of spiritual thirst. For there is a certain thirst for what is not had, so that it may be had: a certain thirst for what is had, so that it may be had more fully: and a certain thirst for what is perfectly had, so that it may be continued. The first is in concupiscence: the second, in grace: the third, in glory. Here he speaks of the first thirst. For the thirst of grace is not for a thing not had: because, as Augustine says, whoever has the eternal gift, has it by loving, although not perfectly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
