[[commentary]]
quote='''
The soul is disposed to the gift of fortitude through the unconquerable shield of faith. Hence the Apostle to the Hebrews: "Who through faith conquered kingdoms; they were made strong in battle."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25205.html'
source_title="Collationes de Septem Donis, Collation 5"
