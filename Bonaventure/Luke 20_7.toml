[[commentary]]
quote='''
And because hatred of the truth pressed from one side and fear of stoning from the other, therefore they feign ignorance of the answer, when it is added: And they answered that they did not know whence it was. The Gloss: "Fearing stoning, but fearing the confession of truth more." But this confession of ignorance was proud and deceitful, because they spoke falsely and against their conscience, in order to avoid open refutation. Whence Chrysostom: "Lies, even if they have no one to deceive, nevertheless lie to themselves"; the Psalm: "Iniquity has lied to itself"; and again: "Strange children have lied to me"; and therefore John 8: "If I shall say that I do not know him, I shall be like you, a liar."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
