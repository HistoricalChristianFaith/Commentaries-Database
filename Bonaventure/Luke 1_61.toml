[[commentary]]
quote='''
And because the relatives were thinking carnally, they did not accept the name of grace: therefore it is added: And they said to her: There is none among your kindred who is called by this name. But their objection was of no account, because, as Ambrose says, "this name is not of family but of a prophet. For the merits of the Saints have this, that they receive their name from God, just as Jacob was called Israel, Genesis thirty-two, because he saw God"; so also of Solomon, 2 Kings twelve: "He called his name beloved of the Lord." And since there was here a contention between grace and nature, between human designation and prophetic revelation, therefore they sought the paternal opinion, so that he himself might pronounce the authoritative declaration.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
