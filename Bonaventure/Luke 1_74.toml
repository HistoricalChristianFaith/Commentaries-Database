[[commentary]]
quote='''
Then he adds the benefit or subsequent remedy, when he says: That without fear, delivered from the hand of our enemies, we may serve him. For this is the remedy which we have obtained through Christ given to us: Romans six: "But now being freed from sin and made servants of God, you have your fruit unto sanctification, and the end, life everlasting"; Wisdom sixteen: "You showed our enemies that it is you who deliver from all evil," namely those who hear you by believing and obeying: Proverbs one: "But he who hears me shall be without terror and shall enjoy abundance, the fear of evils being removed." And these are those who serve the Lord: 1 Kings seven: "Prepare your hearts unto the Lord and serve him alone"; and he will deliver us from the hands of our enemies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
