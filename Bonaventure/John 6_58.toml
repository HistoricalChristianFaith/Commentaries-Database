[[commentary]]
quote='''
Here the dignity of the refreshment is touched upon, which surpasses that refreshment of the fathers which the Jews were praising above, both because it is nobler and because it is more lasting: nobler, because this bread is from heaven: whence he says: "This is the bread that descended from heaven": above in the same chapter: "Moses did not give you bread from heaven, but my Father gives you bread from heaven," and thus it is nobler. It is also more lasting, because that bread preserved temporally, but this one eternally; whence he says: "Not as your fathers ate manna and died," and thus were preserved only temporally, because within forty years they died in the desert, according to that verse of the Psalm: "For forty years I was offended with that generation"; Numbers chapter fourteen: "Your children shall wander in the desert for forty years and shall bear your fornication, until the corpses of the fathers are consumed in the desert." But this bread preserves eternally: whence he says: "He who eats this bread shall live forever": that is, he who eats worthily "shall live forever," because, as is said in First Corinthians chapter eleven, "he who eats and drinks unworthily eats and drinks judgment upon himself": he who eats worthily shall live forever. He frequently promises eternal life, both so that they may desire that food and so that he may draw them away from love of earthly life to eternal life. For as is said in Matthew chapter ten: "He who loves his soul more than me is not worthy of me"; Deuteronomy chapter thirty: "Choose life for yourself."

An inquiry is made concerning the dignity of this eating. For he says that those eating this bread will not die, as those eating manna. He either understands this of spiritual life or of bodily life. If of spiritual life, he says nothing, because the holy fathers who ate manna did not die spiritually. If of bodily life, likewise: because he who eats this bread does not live bodily, but dies.

It must be said that this food is set above that food by reason of giving life in two ways: first, because that food could not give life except through this one which it signified; therefore it is said of the just that "they all ate the same spiritual food," 1 Corinthians 10; but those who had their eye only on that food died spiritually, because they tasted it only in a carnal manner. So Augustine responds. In another way it can be said that manna was ordained for the preservation of bodily life, but this bread for the preservation of spiritual life. And the Lord means to say that that bread only sustained bodily life for a time, but this bread sustains spiritual life forever in those who receive it worthily; and therefore it is more worthy than that one.

But those who receive unworthily sin, and the bread is turned into poison for them, and these are those who bear the sting of mortal sin. The reason why they sin is contempt, because they bring so great a guest into so vile a lodging. But how it is received worthily, Augustine teaches: "Bring innocence," he says, "to the altar; if there be daily sins, at least let them not be deadly. Before you approach the altar, let it be said: Forgive us our debts, etc. Then approach with confidence: it is bread, not poison."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
