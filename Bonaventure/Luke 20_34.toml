[[commentary]]
quote='''
And Jesus said to them, etc. After the erroneous inquiry, he here subjoins the truthful response. Concerning which four things are introduced, namely the assertion of truth, the reason for the assertion, the confirmation of the reason, and the commendation of the confirmation.

First, as regards the assertion of truth, he says: And Jesus said to them: The children of this world marry and are given in marriage, for the sake of having succession, as in Tobit 8: "You, Lord, know that not for the sake of lust do I take my sister as wife, but solely out of love of posterity, in which your name may be blessed forever and ever." And this marriage, although it could belong to spiritual men, is nevertheless only among those living in the flesh; whence children of this world does not connote vice. But others marry for the sole fulfillment of pleasure, concerning whom Genesis 6: "The sons of God, seeing the daughters of men that they were fair, took to themselves wives of all whom they chose"; and above in chapter 14: "I have married a wife, and therefore I cannot come." And then children of this world connotes vice, as also above in chapter 16: "The children of this world are more prudent than the children of light," etc. And these are the children of the bondwoman, concerning whom Galatians 4: "The son of the bondwoman shall not be heir with the son of the free woman." But neither of these will exist in the resurrection, neither succession nor carnal pleasure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'

[[commentary]]
quote='''
Against conjugal chastity it is objected: Luke 20: The children of this age marry and are given in marriage, etc.: but the children of this age are not children of God: therefore through the conjugal act which they exercise, they are not children of God: therefore conjugal continence is repugnant to the law of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25203.html'
source_title='Disputed Questions on Evangelical Perfection, Question 3'

[[commentary]]
quote='''
To that which is objected concerning the children of this world, it must be said that the children of the world are sometimes distinguished from the children of light, as in Luke 16: The children of this world are more prudent than the children of light, etc.; sometimes they are distinguished from the children of the other world or of the resurrection, as here. In the first way, the children of this world are called those who conform themselves to this world and love it above all: and thus it has the sense of vice. In the second way, the children of this world are called those who live in this world, or pass away with the world; and thus it has the sense of infirmity. Whence from this it is not established that marriage is blameworthy, but that it has an infirmity attached to it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25203.html'
source_title='Disputed Questions on Evangelical Perfection, Question 3'
