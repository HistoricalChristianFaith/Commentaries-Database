[[commentary]]
quote='''
And because the cunning of temptation is refuted through the manifestation of truth, therefore it is added: Show me a denarius. Whose image and inscription does it bear? They answered and said to him: Caesar's, namely in the outward sign. The Lord does not ask this because he doubts, but so that from their response he might confute them. Or he asks about the image and inscription of the denarius so that from the very form and figure and quality of the thing he might show that a judgment of equity ought to flow forth. Or he requires this in order to show that each one is to be judged according to the inscription which he has inscribed upon the image of his mind. For by the denarius is understood man, because the denarius is of earthly matter, namely of metal, and man is of clay: Genesis 2: "God formed man from the clay of the earth"; and he himself is the tenth after the nine orders of Angels, and he is designated by the one drachma above in chapter fifteen: "Or what woman," etc.

By the image of the denarius is understood the Trinity of Persons, concerning which Sirach 17: "God created man from the earth and made him according to his own image"; and Genesis 1: "Let us make man in our image," etc. By the inscription is understood the quality of morals, and this is twofold: one divine, the other worldly. The divine is through the light of grace and justice: Psalm: "The light of your countenance is signed upon us, O Lord"; but the worldly, which is Caesar's, is through the appetite of cupidity and avarice. On this Ambrose says: "The image of Caesar is not found except in the sea, where the dragons are"; in which he touches upon that which is read in Matthew 17, where Christ sent Peter to the sea, and he found a fish and in the fish a stater, which he paid to Caesar; in which it is understood that the inscription of earthliness is found only in worldly minds, in which, on account of various desires, there is a storm and the violence of a tempest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
