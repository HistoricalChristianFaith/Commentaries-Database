[[commentary]]
quote='''
But although he wished to free him in so many ways, nevertheless out of fear he failed in the end and turned aside against the dictate of justice, mercy, his own will, and right reason toward the perverse will of the people; therefore he adds: And Pilate adjudged that their petition should be granted; and this against that passage in Exodus 23: "You shall not follow the crowd to do evil, nor in judgment shall you yield to the opinion of the many, so as to deviate from the truth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
