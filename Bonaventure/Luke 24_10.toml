[[commentary]]
quote='''
And therefore especially among the others that sinful woman is named, when he adds: Now it was Mary Magdalene and Joanna and Mary of James and the others who were with them, who were telling these things to the Apostles. Now Mary Magdalene is notably placed before the others, because she loved more fervently than the others and, as is handed down, came first to the tomb and persevered longer than the rest. And therefore John, the most loving of the Lord, notably names that lover of the Lord; John 20: "Mary stood at the tomb outside, weeping"; and it follows there that she saw the Angels and that at last she saw the Lord. John therefore speaks only of Mary Magdalene. Matthew speaks of two Marys: in the last chapter of Matthew: "Mary Magdalene and the other Mary came to see the sepulchre." But Mark speaks of three Marys: in the last chapter of Mark: "Mary Magdalene and Mary of James and Salome bought spices." But Luke, the best narrator, speaks of these and of others. And thus it appears that among the Evangelists there is absolutely no controversy, but each is principally directed to his own intention.

All the Evangelists, however, mention the Magdalene, and especially the friend of God, John, because he appeared to her first, as is said in Mark 16: "Jesus rising early on the first day of the week appeared first to Mary Magdalene." And this for a fourfold reason: first, because she loved more ardently: above in chapter seven: "Her many sins are forgiven her, because she loved much." Second, to show that he had come for sinners: Matthew 9: "For I came not to call the just, but sinners," to repentance. Third, to crush human pride: on account of which, Matthew 21: "Publicans and harlots shall go before you into the kingdom of God." Fourth, to give confidence; on account of which, Romans 5: "Where sin abounded, grace did more abound," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
