[[commentary]]
quote='''
Blessed Peter says: 'It is better not to know the way of justice than, after knowing it, to turn back.' You will say: 'Many fall.' You ought not to fall with those who fall, but to stand with those who stand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25207.html'
source_title="Collationes de Septem Donis, Collation 7"
