[[commentary]]
quote='''
Second, he subjoins the benefit which the Prophets promised, when he says: Salvation from our enemies: and the word he wrought or he raised up should be repeated. For the Prophets spoke of this: 1 Peter 1: "Concerning which salvation the Prophets inquired and searched diligently, who prophesied of the grace to come in you." This salvation, moreover, consists in liberation from enemies, that is, from demons: Psalm: "Deliver me from my enemies"; Colossians 1: "He has rescued us from the power of darkness."

And he adds thirdly the completion of the benefit, when he says: And from the hand of all who hated us, that is, from the hand or power of all persecutors, whether demons or men: Isaiah nineteen: "They shall cry out to the Lord because of the oppressor, and he shall send them a savior and a champion, who shall deliver them"; Job five: "He dissipates the plans of the malicious, so that their hands cannot accomplish what they had begun." And for so great a benefit God is to be praised: Second Maccabees one: "Having been delivered from great dangers by God, we give him magnificent thanks"; and in the Psalm: "He delivered me from my most powerful enemies, and from those who hated me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
