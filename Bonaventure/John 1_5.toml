[[commentary]]
quote='''
"And the light shines in the darkness," when he makes sinners know true things: "and the darkness did not comprehend it": because those blinded by the darkness of unbelief do not know it: Genesis chapter one: "Darkness was upon the face of the abyss," that is, unbelief upon the face of the human heart. Whence Ephesians chapter five: "You were once darkness, but now light in the Lord"; First John chapter one: "God is light, and in him there is no darkness at all. If we say that we have fellowship with him and walk in darkness, we lie and do not practice the truth." And by this is refuted that error which held that all things come from fortune, and that there is no providence, nor does God know our deeds.

It is asked: "The darkness did not comprehend it." Against this: Corporeal light, while it shines and is present, cannot not be seen; therefore by equal reasoning the same appears to hold of spiritual light and of the intellect. Likewise, why does he speak of darkness? For no one, not even a good person, comprehends it, since it is incomprehensible.

It must be said that the case is not the same for corporeal and spiritual light, for a threefold reason: first, on the part of the motive, because corporeal light manifests itself naturally, but spiritual light voluntarily; second, on the part of the eye, because the eye of the intellect is blind with respect to one thing, and yet sees with respect to another, just as we observe that one has ignorance of one thing and knowledge of another; so the eye of the unbeliever is blind with respect to God. The third reason is on the part of the comparison, because there is some proportion between our eye and corporeal light, but spiritual light exceeds it beyond all proportion, and therefore "dwells in unapproachable light."

As to what is asked concerning comprehension, it must be said that there is comprehension by inclusion, by open vision, and by the adherence of faith and charity. In the first way it is comprehended by no one, in the second way by the Blessed, in the third way by the Saints, and in none of the said ways by the wicked: therefore he says: "And the darkness did not comprehend it," that is, they adhered neither by faith nor by love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
