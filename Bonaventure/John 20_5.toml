[[commentary]]
quote='''
And when he had stooped down, he saw the linen cloths lying there, yet he did not go in: and so in seeking he was swift, but in examination remiss, while Peter on the contrary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
