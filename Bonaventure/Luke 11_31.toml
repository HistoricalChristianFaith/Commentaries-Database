[[commentary]]
quote='''
Second, the generation of the Jews is reproved because it was lukewarm in learning, when it is added: The queen of the south shall rise in the judgment with the men of this generation. From which it appears that the resurrection will be universal, not only of the good, but also of the wicked. But the resurrection will be unto judgment, according to that passage in John 5: "All who are in the tombs shall hear the voice of the Son of God, and shall come forth," etc. But because the wicked will be condemned by comparison with the better, therefore he adds: And she shall condemn them: Bede: "Not by the power of judgment, but by the comparison of a better deed." — Which deed he shows in what he says: Because she came from the ends of the earth to hear the wisdom of Solomon, according to what is said in 2 Chronicles 9: "The Queen of Sheba, when she had heard the fame of Solomon, came to test him in Jerusalem"; something similar is said in 3 Kings 10. Whence in three respects she was praiseworthy: and first, because she was moved by the fame of Solomon; second, because she came from remote parts; third, because she came to a man of equal condition. — And on the contrary, this people was triply blameworthy: which he notes when he adds: And behold, something greater than Solomon is here. For in this, that he says behold, he indicates that he is known not only by hearing but also by sight, according to that passage of Baruch 3: "after this he was seen upon the earth" etc. In this, that he adds 'here,' he shows that he was not absent but present, so that there could rightly be said to them that passage of Deuteronomy 30: "The commandment which I command you today is not situated far off" etc. But in this, that he says more than Solomon, he shows that one must believe in him not merely as in a wise man, but as in the principle and font of all wisdom, according to that passage of John 8: "I am the beginning, who also speak to you".

For Christ was greater than Solomon by reason of power, by reason of knowledge, and by reason of justice. Whence that Psalm especially pertains to him: "O God, give your judgment to the king," which is believed by the Jews to have been composed in praise of Solomon, when it says there: "He shall rule from sea to sea"; and again: "Before the sun his name endures"; and again: "And in him all the tribes of the earth shall be blessed" etc. That Solomon was a peacemaker for a time, but this one eternally; Isaiah 9: "His empire shall be multiplied." That one was wise, but this one is wisdom itself: 1 Corinthians 1: "Christ the power of God and the wisdom of God"; and Colossians 2: "In whom are hidden all the treasures of wisdom and knowledge." That one was a doer of justice, but this one is justice itself: 1 Corinthians 1: "Who was made for us justice from God" etc. Therefore, according to seven preeminences, that queen by comparison with us shall judge the unbelieving Jews: a queen of fragile sex, from remote lands, with difficulty, having left her kingdom, with gifts, to a mere man, known by fame alone, she came, as is expressly gathered from 3 Kings 10. But the Jews: men, Christ present, freely offered, of their own race, beneficent, God and man, proven by miracles, they scorn and despise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
