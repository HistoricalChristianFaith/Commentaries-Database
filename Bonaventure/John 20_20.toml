[[commentary]]
quote='''
He is showing two things here, the loftiness of the state of glory, in that, being impassible and immortal, He entered as God while the doors were closed; later, He showed them His hands and side. Consider the progression. First He entered as God while the doors were closed: this is the major proposition. Then He proposed the minor by showing them His hands and His side. Finally, He wrested out the conclusion so that Thomas confessed: "My Lord and my God!"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
And when he had said this, he showed them his hands and his side. Here is noted Christ's showing of himself, in which he showed that he was the same one who had suffered, not only in spirit but also in body: and therefore he showed his hands and his side, in which there had been wounds, and scars remained: whence in the last chapter of Luke: "See my hands and my feet, that it is I myself." The disciples therefore rejoiced, having seen the Lord. Here is touched upon the rejoicing of the disciples at the sight of the Lord; which joy the Lord had promised them above in chapter 16: "I will see you again, and your heart shall rejoice."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
