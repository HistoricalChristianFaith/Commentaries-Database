[[commentary]]
quote='''
The Apostle Paul urges those wishing to obtain grace to approach the throne of grace, that is, the glorious Virgin. "Let us approach," he says, "with confidence to the throne of his grace."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25201.html'
source_title='Collationes de Septem Donis, Collation 1'
