[[commentary]]
quote='''
"For he whom God has sent speaks the words of God": and thus he is truthful, just as God; in chapter 7: "If anyone wills to do the will of God, he will know concerning the doctrine, whether it is from God, or whether I speak of myself."

"For not by measure does God give the Spirit." Here he places Christ above himself in excellence of grace, because he excels all in grace, and this excellence is the reason for the foregoing. Therefore he says: "For not by measure." Truly I have said that he himself is the bridegroom, he himself speaks heavenly things, and he is above all: "For God does not give the Spirit by measure," namely to Christ: not according to a fixed measure, as to others.

It is asked concerning what he says: "God does not give the Spirit by measure." Either he understands this of Christ according to the divine nature, or according to the human: according to the divine nature it cannot be, because he himself does not receive the Spirit, but rather the Spirit proceeds from him. If according to the human: to the contrary: The grace of Christ as man is created; but God creates all things in a certain weight, number, and measure, whence nothing created is infinite: therefore by measure.

I respond: It must be said that there is a measure of limitation, and there is a measure of division. I call a measure of limitation that by which each created thing is finite in its substance and power and limited. I call a measure of division the determination of someone to some act, according to that text of 1 Corinthians 12: "There are divisions of graces, but the same Spirit," namely when grace is given to someone for some determinate effect, as the Apostle says. Christ had grace according to measure in the first way, because his grace was not infinite; in the second way he had it not according to measure, because it was not in him narrowed to some particular operation, but to every operation, just as the head has all the senses. Hence Chrysostom: "Spirit here he means the action of the Spirit; for it is this which is divided." Hence it is clear that he speaks of measure through the division of graces.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'

[[commentary]]
quote='''
It is asked whether the soul of Christ comprehends uncreated wisdom itself. And that it does is argued thus: John 3: God does not give the Spirit by measure; the Gloss: "To men by measure, but to the Son not by measure; but just as he begot the whole from his whole self, so to the incarnate Son he gave his whole Spirit, not partially and by subdivisions, but generally and universally"; but according to the measure of the spirit given is the measure in the knowledge of truth: therefore if the soul of Christ received the Holy Spirit in an immeasurable way, it knows God in an immeasurable way; and this is nothing other than to comprehend divine wisdom itself: therefore etc.

To that which is objected from the Gloss, that grace was given to Christ not by measure; and from the authority of Augustine, that that grace is ineffable; and from the authority of Hugh and from that argument which he adduces, that that grace brings it about that man is God; to all these it must be answered that all these things are true and are to be understood according to the concurrence of two natures in one person: from which it follows that on account of the immensity of that person and of that union, the grace is called immense and ineffable, and on account of the unity of the person, God and those things which are of God can be predicated of the man: nevertheless it does not follow from this that the soul itself, or its power and habit, or its act, loses its created being, and consequently its finite and limited character. And therefore it does not follow that a comprehensive act of the eternal wisdom belongs to it, since that act is infinite and proceeds from infinite power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Scientia%2520Christi%2FQuestion%25206.html'
source_title='Quaestiones Disputatae, De Scientia Christi, Question 6'
