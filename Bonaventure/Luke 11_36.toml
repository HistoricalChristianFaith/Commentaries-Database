[[commentary]]
quote='''
But again, because intention cannot be lucid unless good operation is present, therefore he adds: If therefore your whole body be lightsome, having no part of darkness, so that namely there be no depravity in intention nor in thought nor in affection nor in speech nor in action, which are the parts of our totality and of meritorious or demeritorious operation. If therefore in these there be no impurity from any part, then that which follows will be true: The whole shall be lightsome, and as a bright lamp shall enlighten you, that is, your conscience, according to the prophetic petition: "For you light my lamp, O Lord: my God, enlighten my darkness," as is found in the Psalm. It will also enlighten you for building up the Church of Christ, according to that command of the Lord in Matthew 5: "So let your light shine before men, that they may see your good works and glorify your Father who is in heaven." It will also enlighten you for confuting the wickedness of others, according to that in Philippians 2: "That you may be sincere in the midst of a crooked and perverse nation, among whom you shine as lights in the world, holding forth the word of life." It will also enlighten you for having divine knowledge, according to that in Ecclesiasticus 2: "You who fear the Lord, love him, and your hearts shall be enlightened." It will also enlighten you for beholding the divine glory: Tobit 13: "You shall shine with a splendid light" etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
