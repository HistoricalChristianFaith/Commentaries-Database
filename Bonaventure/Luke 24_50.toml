[[commentary]]
quote='''
Thirdly, as to the ascension of Christ, he adds: And he led them out to Bethany. This was not then, but on the fortieth day. This Bethany, moreover, is on the Mount of Olivet: whence above in chapter 19: "When he had drawn near to Bethphage and Bethany, at the Mount of Olivet." Now Bethany is interpreted as house of obedience, because through obedience one is placed on the mount that is Christ and is blessed by Christ and ascends into heaven.

And therefore he adds: And lifting up his hands, he blessed them; in which it is intimated that he is to be blessed by Christ who obeys him and does the works that he does for the sake of God. For, Hebrews six, "the earth, which drinks in the rain that often comes upon it and brings forth suitable vegetation, receives blessing from the Lord."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
