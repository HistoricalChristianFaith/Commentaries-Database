[[commentary]]
quote='''
Knowing that the Father had given all things into his hands, according to that passage in the last chapter of Matthew: "All power is given to me in heaven and on earth"; and knowing that he came forth from God and goes to God, according to that passage below in the sixteenth chapter: "I came forth from the Father and have come into the world; again I leave the world and go to the Father." This knowing, that is, foreknowing that his death was at hand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
