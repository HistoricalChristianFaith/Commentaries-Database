[[commentary]]
quote='''
Fourth, regarding the interpretation of the seed multiplied in the fruitful heart, he subjoins: But that which fell on good ground, namely fell: Numbers fourteen: "The land which we surveyed is very good"; these are they who in a good heart, with respect to the cognitive power: Ecclesiasticus thirty-seven: "Establish within yourself a heart of good counsel"; and Ecclesiasticus three: "A wise and understanding heart abstains from sin"; and very good, with respect to the affective power: Hebrews last chapter: "It is best that the heart be established by grace." Hearing the word, retain it, with respect to the memorative power: Proverbs three: "My son, do not forget my law, and let your heart keep my precepts." And bring forth fruit, with respect to the operative power: Isaiah thirty: "Rain shall be given to your seed, wherever you sow in the land, and the bread of the fruits of your land shall be most abundant." In patience, with respect to the passive and supportive power, in which is the consummation of good merit: James one: "Patience has a perfect work, that you may be perfect and entire." Hence it is patience that leads to fruit: James five: "Behold, the farmer waits for the precious fruit of the earth, patiently bearing, until he receives the early and the late rain"; and Hebrews ten: "Patience is necessary for you, that doing the will of God, you may receive the promise"; and twelve: "All discipline in the present indeed is not of joy but of sorrow, but afterward it will render to those exercised by it the most peaceful fruit of justice."

For the more evident manifestation of this explanation, however, it should be noted that the seed is the Word of God, first, because it holds the nature of an active principle: John eight: "I am the beginning, who also speak to you"; Matthew thirteen: "He who sows the good seed is the Son of Man," who namely is the principle of every good. — Second, because it holds the nature of a propagative principle: John five: "My Father works until now, and I work." Therefore Mark four: "So is the kingdom of God, as if a man should cast seed into the ground and sleep," etc.; and Genesis one: "Let the earth bring forth green herb and yielding seed and fruit tree, whose seed," etc.

Third, because it holds the nature of a multiplicative principle: John twelve: "Unless a grain of wheat falling into the ground dies, it remains alone; but if it dies, it brings forth much fruit"; and concerning this, First Corinthians fifteen: "Foolish one, what you sow is not brought to life unless it first dies." Moreover, a seed of this kind is the uncreated Word of God, as inspired, as incarnate, as preached, as exemplified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
