[[commentary]]
quote='''
The second point is touched upon here: for after he revealed the secret, he makes clear the doubt. For the woman, seeing that the Lord was a knower of secrets, puts forward her own uncertainty to be resolved; on account of which she says: "The woman says to him: Lord, I see that you are a prophet," because, namely, you know secrets, and thus you can answer my doubt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
