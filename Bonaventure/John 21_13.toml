[[commentary]]
quote='''
And Jesus came. Here the fourth point is noted, namely the Lord's munificence in distributing food: whence he says: And he took bread and gave it to them, and fish likewise, he gave to them to eat. And similarly it is to be understood that he himself ate with them; whence Chrysostom: "Here indeed he does not say that he ate with them; Luke elsewhere says, Luke, the last chapter: When he had eaten before them, taking the remains, he gave to them"; whence Gregory says: "The Lord ate roasted fish and bread." Christ gave, in which he signified himself as the most generous distributor of all graces: Matthew twenty-five: "To each one he gave according to his own ability."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked concerning this, that the Lord ate fish and bread, as is said in the last chapter of Luke: since this belongs only to an animal body, therefore either Christ had an animal body, or he ate phantastically. I respond: It must be said that there is eating from necessity, and this belongs only to the animal body; and there is eating from power, and this belongs not only to the animal body but also to the glorified and spiritual body, which eats purely from power. For from glorified bodies the power is not taken away, but the necessity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: what happened to that food? For since a glorified body would not be nourished, it seems that it would have the customary egress of nature. I respond: It must be said that just as water cast into fire is immediately absorbed by the fire, so food received by a glorified body is immediately consumed by a certain spiritual power. Whence Augustine in the book On the Resolution of Six Questions: "In one way the thirsting earth absorbs water, in another way the burning ray of the sun: the former by indigence, the latter by power. Therefore the body of the future resurrection would be of imperfect happiness if it should need foods; it will be of imperfect happiness if it cannot take foods." And the reason for this is that in the first case it would be needy, in the second case powerless.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
