[[commentary]]
quote='''
Fourth, as to the integrity of health, he adds: And Jesus said to him: Receive your sight: your faith has made you whole, through the infusion of divine grace. For by the regard of faith our heart is raised up to justice; Romans 5: "Being justified by faith, let us have peace with God." And this is the first virtue, concerning which Hebrews 11: "He who draws near must believe," for "it is the substance of things hoped for," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
