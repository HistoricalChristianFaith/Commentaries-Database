[[commentary]]
quote='''
Third, with respect to the appetite for riches, he adds: Who devour the houses of widows, and this through cupidity, whose voracity is never satisfied, and especially when carnality is joined to it. Therefore he says: Who devour the houses of widows, simultaneously implying the voracity of cupidity toward the house and of carnality toward the sex; and concerning these two, Proverbs thirty: "The horseleech has two daughters, crying: Give, give"; and immediately he adds: "Three things are insatiable, and a fourth that never says: Enough. Hell, the mouth of the womb, and the earth, which is never satisfied with water; fire never says: Enough"; because, as is said in Ecclesiastes five, "the covetous man shall not be satisfied with money, and he who loves riches shall reap no fruit from them." The devouring, therefore, is reprehensible on account of avarice, but association with widows is reprehensible on account of evil suspicion. Whence Chrysostom: "While he confounds the Jewish priests, he admonishes Christians not to remain with widows more than with others, because, even if the will is not evil, the suspicion nevertheless is evil." And Jerome to Nepotian: "Let the feet of women rarely or never wear out your threshold. All the maidens and virgins of Christ either equally ignore or equally love. See that you do not remain under the same roof, nor trust in past chastity. You cannot be more holy than David, nor stronger than Samson, nor wiser than Solomon. Remember always that woman cast the settler of paradise out of his possession." The scribes, therefore, are not to be imitated, neither with respect to carnality nor with respect to cupidity, because concerning the imitators of these, Second Peter two: "These are like irrational beasts," "enticing unstable souls, having a heart exercised in avarice, children of malediction, forsaking the right way they have gone astray, following the way of Balaam of Bosor, who loved the wages of iniquity." Against such the Lord is indignant, according to that passage in Isaiah three: "You have devoured the vineyard, and the spoil of the poor is in your house."

Fourth, with respect to the simulation of virtues, he adds: Feigning long prayer; the Gloss: "So that they may appear more religious, they pray at greater length, in order that from any who are weak and troubled by the consciousness of their sins, they may receive praises and money as though they were patrons."

But is prolonged prayer evil? Certainly not, since it is said above in the eighteenth chapter: "One ought to pray always"; and First Thessalonians 5: "Pray without ceasing." But this is said on account of simulation, because, since simulation and fraud are reprehensible in all things, they are most especially reprehended in those acts which ought above all to be done in truth: and such is the act of prayer: John 4, "Those who adore him must adore in spirit and truth." Concerning him, therefore, who prays fraudulently and with simulation, it is said in the Psalm: "Let his prayer be turned into sin," because, Jeremiah 48: "Cursed is he who does the work of God negligently." And therefore he adds: These shall receive greater damnation, because, as is said in Job 36, "dissemblers and the crafty provoke the wrath of God." Therefore Ecclesiasticus 1: "Be not a hypocrite in the sight of men," "lest God reveal your hidden things and cast you down in the midst of the synagogue." And therefore upon the scribes as hypocrites he pronounces woe seven times, Matthew 23: "Woe to you, scribes and Pharisees, hypocrites!" on account of their sevenfold simulation, on account of which they were worthy, together with their followers, to be cast down into eternal damnation, according to that passage of Apocalypse 19: "And the beast was apprehended, and with him the false prophet, who wrought signs before him, by which he seduced those who received the mark of the beast: and these two were cast alive into the pool of fire burning with sulphur. And all the birds were filled with their flesh."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
