[[commentary]]
quote='''
"He was a burning lamp," through grace, "and shining," through doctrine: or: "burning," through interior charity, "shining," through exterior uprightness of life. Bernard: "To burn only is too little; to shine only is vain; but to shine and to burn is perfect." Therefore John was most fittingly signified by Elijah: Ecclesiasticus 48: "Elijah arose like fire, and his word burned like a torch." To such a one, therefore, shining so perfectly, faith ought to have been given, which the Jews did not do: whence He says: "But you were willing to rejoice for a time in his light," that is, that you might believe his teaching and testimony and imitate his life, which you observed for a short while: Matthew 11: "John came neither eating nor drinking, and they say: He has a demon"; Matthew 21: "John came to you in the way of justice, and you did not believe him. But the publicans and harlots believed him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
