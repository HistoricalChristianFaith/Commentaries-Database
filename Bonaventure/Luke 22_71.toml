[[commentary]]
quote='''
Fourth, as to their malice in passing judgment, he subjoins: But they said: What further testimony do we desire? For we ourselves have heard it from his mouth. From which their perversity is apparent, because they were seeking with evil intent, namely "That they might catch him in his speech." It also appears that the perversity of their will perverted their judgment, because what Christ had said tentatively they accused him of having asserted. And thus is verified that saying of Ecclesiasticus 11: "Many are the snares of the deceitful one. Converting good things into evil, he lies in wait, and upon the elect he will place a stain." But this which he had intimated, namely that he was the Son of God, they regarded as blasphemy, and therefore as a blasphemer they judged him worthy even of death; whence Mark 14: "But the high priest, rending his garments, said: What need we any further witnesses? You have heard the blasphemy; what think you?" And then it is added there that "some began to spit upon him and to cover his face and to strike him with blows." — From which it can be gathered that this mockery was inflicted upon him twice, namely both by night and by day. Whence in John 18 it is said that a servant gave him a blow in the house of Annas; and the other Evangelists say that he was mocked in the house of Caiaphas, so that that saying of Jeremiah 20 is verified: "I am made a derision all the day long; all mock me; because I have long since spoken, crying out iniquity, and I proclaim devastation." And therefore now is fulfilled that which he foretold above in chapter 9: "The Son of man must suffer many things and be rejected by the elders and chief priests and scribes." Whence also in their person is said that word of Isaiah 53: "We desired him despised and the lowest of men, a man of sorrows and knowing infirmity; and his face was as it were hidden and despised, whence we esteemed him not. And we thought him as it were a leper and struck by God and humiliated." In figure of which it is said in 2 Kings 6 that "Michal, the daughter of Saul, despised David as he leapt"; so also the synagogue despised Christ suffering, and therefore she lost her offspring and her inheritance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
