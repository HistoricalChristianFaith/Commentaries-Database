[[commentary]]
quote='''
He also indicates it as due according to the requirement of custom, when he says: According to the custom of the priesthood, his lot was to offer incense. For this custom, that the priest should enter not by usurpation but by lot or election, is right; because it is said in Hebrews five: "Neither does anyone take the honor to himself," etc. Against which it is said of Uzziah in Second Chronicles twenty-six, that wishing to offer incense, he was struck with leprosy; and the sons of Korah were consumed by fire, Numbers sixteen. But this one went forth by lot; whence that of Wisdom three: "For there shall be given to him a chosen gift of faith and a most acceptable lot in the temple of God." He went forth, I say, to offer incense, having entered into the temple of the Lord; Leviticus sixteen: "Taking the censer, drawing incense with his hand, he shall enter beyond the veil into the holy place, so that, the aromatics being placed upon the fire, the vapor may cover the oracle which is over the testimony, and he shall not die."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
