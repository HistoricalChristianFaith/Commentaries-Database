[[commentary]]
quote='''
However, in the sense of "but." For the stronger, in evil, a stronger torment awaits, in punishment, as is evident in Lucifer and the other demons.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Wisdom%2FChapter%25206.html'
source_title="Commentary on Wisdom, Chapter 6"
