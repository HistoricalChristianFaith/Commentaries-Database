[[commentary]]
quote='''
"Abraham, your father, rejoiced to see my day: he saw it and was glad," as at one greater than himself. Gregory says that he then rejoiced when he saw three men and worshipped one, Genesis 18: whence Luke 10: "Blessed are the eyes that see what you see," etc.

Or it can be said otherwise, that Abraham rejoiced to see at the Lord's calling, Genesis 12.

But he saw and was glad in the Lord's firm promise, Genesis 15, where the Lord promised, and "Abraham believed, and it was reckoned to him as righteousness"; and again in the confirmation of the covenant, in the giving of circumcision it is said that Abraham laughed, whence also he was glad, Genesis 17.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
