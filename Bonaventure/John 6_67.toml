[[commentary]]
quote='''
Here the confirmation of the believers and the elect is touched upon: and this indeed was accomplished in the faithful confession of Peter; therefore the inquiry of the Lord and the response of Peter are set forth. The Lord inquires of the twelve, whom he had specially chosen: "Do you also wish to go away?" — abandoning me, just as the preceding ones do: Jeremiah chapter two: "They have forsaken me, the fountain of living water." But he asks, not because he is in doubt, but so that he might bring forth the faith of Peter as an example of firmness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
