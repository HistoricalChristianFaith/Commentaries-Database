[[commentary]]
quote='''
But these things are written, that you may believe: Romans 15: "Whatever things were written, were written for our instruction." That you may believe, I say, that Jesus is the Son of God, that is, humanity and Divinity in Christ; Luke 1: "You shall call his name Jesus. He shall be great and shall be called the Son of the Most High"; First John 5: "Who is it that overcomes the world, if not he who believes that Jesus is the Son of God?" And because there is no standing still in faith, therefore he orders this end to the ultimate end: And that believing you may have life, because, as is said in Hebrews 11, "without faith it is impossible to please God," but those who believe possess life; First Peter 1: "Believing, you shall rejoice with joy unspeakable and glorified, obtaining the end of your faith, the salvation of your souls." In his name, that is, in the faith of his name; Acts 4: "There is no other name under heaven given to men, by which we must be saved"; First John last: "These things I write to you, that you may know that you have eternal life, you who believe in the name of the Son of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'

[[commentary]]
quote='''
Not only does it proceed sublimely, but it also leads to sublime things. Sublime things are eternal goods; for temporal goods are the lowest and momentary; whence Second Corinthians four: "That which is at present momentary and light of our tribulation works in us above measure an eternal weight of glory in sublimity." To this sublime weight of glory the doctrine of the Gospel according to John leads. Whence John twenty: "These things are written, that you may believe that Jesus is the Son of God, and that believing you may have life in his name:" that is, that eternal and sublime life, which eye has not seen, nor ear heard, nor has it ascended into the heart of man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FProoemium.html'
source_title='Commentary on John, Prooemium'

[[commentary]]
quote='''
That it ought to proceed with certitude seems evident: because "nothing is more certain to a man than his own faith": therefore no knowledge or doctrine ought to be handed down more certainly than that which generates faith. But John's doctrine is for generating faith, as is said in John twenty: therefore it ought to be most certain and to proceed with certitude.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FProoemium.html'
source_title='Commentary on John, Prooemium'
