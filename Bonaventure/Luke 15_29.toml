[[commentary]]
quote='''
Second, as to the insolent response of the son, he adds: But he answering said to his father: Behold, so many years I serve you: where he responds insolently, both because he boasts of his own justice, saying that he served his father for a long time, although the Father himself has no need of our service, according to that passage of the Psalm: "I said to the Lord: You are my God, for you have no need of my goods"; and Job 35: "Moreover, if you act justly, what will you give him, or what will he receive from your hand?" He makes a display of himself, therefore, in this, that he boasts of having done great things for his father. He also makes a display of himself in this, that he says he did nothing against him, when he adds: And I never transgressed your commandment. And in this he justifies himself, although the Apostle says in 1 Corinthians 4: "I am conscious of nothing against myself, yet I am not justified in this." Against that arrogance it is said in 3 Kings 8: "There is no man who does not sin"; and 1 John 1: "If we say that we have no sin, we are liars"; because it is said in Romans 3: "All have sinned and are in need of the glory of God."

He therefore displays his own righteousness, and accuses the father of harshness as well, when he adds: And you never gave me a kid, that I might feast with my friends: as if to say: you have always been harsh to me and never gave me any interior consolation that would be indicative of your love. And yet God does this by a just and hidden judgment, according to that passage of Ecclesiastes nine: "There are just men and wise men, and their works are in the hand of God: and yet man knows not whether he is worthy of love or of hatred, but all things are kept uncertain for the future." But this man, not heeding the hidden judgments of God, accuses the father of harshness, as if he were saying that passage of Job thirty: "You are changed to me into a cruel one, and in the hardness of your hand you oppose me." In this, therefore, he accuses the father of harshness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
