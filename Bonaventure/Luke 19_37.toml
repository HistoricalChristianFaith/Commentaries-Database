[[commentary]]
quote='''
Second, as regards the expression of devotion in speech, there is added: And when he was now approaching the descent of the Mount of Olives, on account of the fittingness of the place, because it was near Jerusalem. Whence also he ascended from that place: Acts 1: "They returned to Jerusalem from the Mount of Olives, which is near Jerusalem, a Sabbath day's journey." By that descent, however, is understood the descent of the condescension of God's mercy, on account of which he ought rightly to be praised by us, according to that verse of the Psalm: "Praise the Lord, all nations; praise him, all peoples: for his mercy is confirmed upon us," etc. And therefore he adds: The whole multitude of those descending began rejoicing to praise God with a loud voice, on account of the fittingness of the manner: Sirach 39: "Give magnificence to his name, and praise him with the voice of your lips"; and the Psalm: "Sing well to him with jubilation."

The reason, however, for this magnificent praise was the consideration of Christ's wonders; and therefore he adds: For all the mighty works which they had seen, on account of the fittingness on the part of the motive. For the vision of wondrous things leads and moves one to praise: the Psalm: "Sing to the Lord a new song, for he has done wonderful things." Among all the wonders, however, which he performed, the greatest was the raising of the man dead four days, by reason of which the crowd especially came to meet Christ: John 12: "The crowd that was with him bore witness, when he called Lazarus from the tomb and raised him from the dead. For this reason also the crowd came to meet him, because they had heard that he had performed this sign." The crowds, however, were moved by the signs to believe that he was Christ the King promised in the Law. Whence John 6: "Those men, when they had seen the sign that Jesus had performed, said: This is truly the Prophet who is to come into the world."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
