[[commentary]]
quote='''
Third, however, as regards the extreme kind of beggary, he adds: And he desired to fill his belly with the husks that the swine were eating. "The husk, as the Gloss says, is a kind of legume with noisy and empty pods, which burdens the belly more than it refreshes it." And therefore it designates the pleasures of vices, which sometimes seem to the sinner to sound like something outwardly, but inwardly are nothing; whence pleasures of this kind are compared to dreams: Isaiah twenty-nine, "As when a hungry man dreams and eats, but when he has awakened, his soul is empty; and as when a thirsty man dreams and drinks, and after he has awakened, he is still weary and thirsts, and his soul is empty: so shall be the multitude of all the nations that have fought against Mount Zion." The swine eat these husks, because, Proverbs two, "they rejoice when they have done evil and exult in the worst things." And with these pleasures, as though they were his delights, the sinner seeks and desires to be satisfied; whence concerning such persons, Job thirty: "Who gnawed in the wilderness, squalid with calamity and misery. And they chewed herbs and the bark of trees, and the root of junipers was their food." "Who rejoiced among such things and counted it a delight to be under thorns." — And because man cannot be satisfied with such things, therefore he adds: And no one gave to him; because frequently, when a sinner seeks pleasures of this kind, by the just judgment of God he loses them. Whence Hosea two, the sinful soul says: "I will go after my lovers, who give me my bread and my waters and my wool and my linen and my oil and my drink. Therefore behold, I will hedge up your way with thorns and wall it up with a barrier, and she shall not find her paths"; and after: "I will cause all her joy to cease, and her new moons, and her Sabbaths, and all her feasts." And God does this so that sinners turned away from Him through pleasures He may call back to Himself through afflictions. Whence Augustine in the book of the Confessions: "All my pleasures," he says, "You sprinkled with bitternesses, O Lord God, so that I might seek to rejoice without offense and might not find it except in You." No one therefore gives of these husks when carnal consolation is withdrawn from the sinner, so that thus at least he may return to the knowledge of God and of himself; and just as he was intoxicated through pleasure, so he may awaken through tribulation, according to that saying of Isaiah twenty-eight: "Only vexation shall give understanding to the hearing"; whence also Leviticus twenty-six: "I will send pestilence in the midst of you, and you shall be delivered into the hands of enemies." "And you shall eat and not be satisfied."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
