[[commentary]]
quote='''
And not for the nation only, namely of the Jews, but that he might gather together into one the children of God, who were scattered abroad, that is, that he might collect the predestined into the unity of the Church. This gathering was foretold in Isaiah 11: "He shall gather together the fugitives of Israel and shall collect the dispersed of Judah from the four quarters of the earth"; and in Isaiah 60: "Your sons shall come from afar"; above in chapter 10: "Other sheep I have that are not of this fold, and them also I must bring, and they shall hear my voice, and there shall be one fold and one shepherd."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
