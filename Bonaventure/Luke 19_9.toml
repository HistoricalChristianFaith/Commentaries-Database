[[commentary]]
quote='''
Secondly, with regard to the accepting reception of Christ, he adds: But Jesus said to him: Because today salvation has been made for this house, through the bestowal of divine grace, which was given at Christ's presence, through which the Church is dedicated and sanctified: the Gloss: "Salvation, which once filled the house of the Jews, today has shone forth upon the people of the Gentiles," according to that passage of Isaiah forty-nine: "It is a small thing that you should be my servant to restore the remnants of Israel. I have given you as a light to the nations, that you may be my salvation even to the ends of the earth." And this salvation is owed to the predestined.

Therefore he adds: Because he also is a son of Abraham: the Gloss: "A son, not by flesh, but by faith"; Romans nine: "Neither are all who are the seed of Abraham children, but in Isaac shall your seed be called." For "not those who are children of the flesh are children, but those who are children of the promise are reckoned as seed." And concerning these children, above in chapter three: "God is able from these stones to raise up children to Abraham"; and John eleven: "Jesus suffered, that He might gather into one the children of God who had been scattered."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
