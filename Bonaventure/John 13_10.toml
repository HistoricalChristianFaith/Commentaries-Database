[[commentary]]
quote='''
Jesus says to him: He who has been washed, namely with that washing of which it is said in Isaiah 1: "Wash yourselves, be clean"; and Zechariah 13: "There shall be a fountain open to the house of David and to the inhabitants of Jerusalem for the washing of the sinner"; Jeremiah 4: "Wash your heart from wickedness, O Jerusalem, that you may be saved"; he, I say, does not need except to wash his feet, that is, his affections: concerning which Song of Songs 5: "I have washed my feet: how shall I defile them?" These feet need to be washed more than other members, because they are more joined to filth; Lamentations 1: "Her filthiness is in her feet, and she has not remembered her end." But, when these feet are washed, then he is wholly clean: Ezekiel 36: "I will pour upon you clean water, and you shall be cleansed from all your defilements." And you are clean: therefore you need nothing except the washing of feet; below in chapter 15: "You are clean because of the word which I have spoken to you." But lest he seem to be ignorant of a disciple's crime, he adds: But not all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
