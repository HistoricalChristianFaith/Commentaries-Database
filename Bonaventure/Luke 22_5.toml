[[commentary]]
quote='''
On account of which he adds: And they were glad and covenanted to give him money. They were glad over malice, according to that passage in Proverbs two: "They rejoice when they have done evil," etc. They covenanted, as if they made a pact, and the sum was thirty pieces of silver: Matthew twenty-six: "And they appointed to him thirty pieces of silver." Now thirty pieces of silver are worth three hundred common denarii. And this was the price of the ointment which Magdalene poured upon the head of Christ, according to that passage in John twelve: "Why was this ointment not sold for three hundred denarii and given to the poor? But he said this, not because he cared for the poor, but because he was a thief, and having the money bag, he carried what was put into it." And therefore this price was compensated by the selling of the Lord. The figure of this preceded in the selling of Joseph, Genesis thirty-seven, where it is said according to the customary reading that he was sold for thirty denarii: and concerning this, Zechariah eleven: "They weighed out my wages, thirty pieces of silver. And the Lord said to me: Cast it to the statuary, the handsome price at which I was valued by them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
