[[commentary]]
quote='''
"He came unto his own." Here is touched upon the contempt for the one coming, and this especially from those who ought to have honored him, and from whose race he assumed flesh. On account of which he says: "He came unto his own," that is, from the race of the Jews, whom he had chosen before all others, he assumed flesh. "And his own" —that is, the Jews— "did not receive him," not because none did, but because few did; Isaiah 1: "I have nourished and brought up children, and they have despised me." The Jews are called "his own" because according to the flesh he was of their race, because he was of the seed of David, who was king in Israel forever. Or: "his own" by special election, according to that passage of Deuteronomy 26: "The Lord has chosen you to be a peculiar people."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
