[[commentary]]
quote='''
Finally, the rewarder is indicated through the judgment of retribution, in which there is made a universal conferral of good upon the good. On account of which he says: To preach the acceptable year of the Lord, namely to the good, concerning which in the Psalm: "You shall bless the crown of the year of your goodness," etc. This is the year signified in the jubilee; Leviticus 25: "In the year of jubilee all shall return to their possessions"; or also in the seventh year; Deuteronomy 15: "In the seventh year you shall make a remission." This year surpasses the year of merit, because the good shall be rewarded beyond what is condign; Sirach 33: "Why does one year surpass another, one day another day, one light another light from the sun?"

In this judgment also there is made an everlasting damnation upon the wicked; therefore it is added: And the day of retribution, in which he will repay each one according to his works; Isaiah 63: "The day of vengeance is in my heart, the year of my recompense has come." Concerning this day it is said in First Thessalonians 5: "The day of the Lord shall come as a thief in the night; for when they shall say: Peace and security," etc. This day, as Gregory says, we ought to fear with all the more solicitude, inasmuch as we cannot foresee it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
