[[commentary]]
quote='''
After man fell through sin, divine wisdom provided a mode of condescension through the Word incarnate, through which man might be adapted unto grace. And because this was accomplished in the womb of the glorious Virgin, therefore it was said to her: "Hail, full of grace, the Lord is with thee." Thus therefore at first sight there meets us the Father of mercies and the mother of mercies and the Son, who is the light of mercies. Thus is manifest the first origination of grace in us, which comes about through the Word incarnate. O most unhappy ones! Those who are ignorant of this beginning cannot have grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25201.html'
source_title='Collationes de Septem Donis, Collation 1'

[[commentary]]
quote='''
The Angel said: "Hail, full of grace," because she was holy and modest: holy in flesh and modest in mind. On that text, "The Angel Gabriel was sent," Bernard says: "Gabriel was sent to the Virgin, such as the Apostle describes, holy in mind and body, not newly nor by chance discovered, but chosen from eternity, foreknown by the Most High and prepared for himself, guarded by Angels, prefigured by the Patriarchs, promised by the Prophets." To this Virgin Gabriel had to be sent as a bridesman. She alone pleased the Most High. Likewise Bernard: "The royal Virgin, resplendent with the twofold beauty of her mind, drew upon herself the gaze of the citizens of heaven, so that she both inclined the heart of the King to desire of her and drew the heavenly messenger down to herself from on high."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'

[[commentary]]
quote='''
And the Angel entering, etc. After the sending of the messenger has been described, here the execution of the ministry is described, which indeed consisted in the announcement of the future conception, in which the Angel proceeds, like a good rhetorician, in very orderly fashion, and the Evangelist explains perfectly. The Evangelist introduces the Angel as having taken his beginning from a salutation upon his entrance: in which salutation he captures her goodwill, raises her confidence, and shows her reverence. For he shows her to be commendable by the fullness of goodness, and therefore lovable; by the loftiness of dignity, and therefore venerable; by the breadth of praise, and therefore worthy of proclamation. And on account of these three things she was prefigured by the Ark of the Covenant, of which it is said in Hebrews nine that it contained three things, namely "the rod of Aaron, the tablets of the Law, and manna"; so that it might thus be shown that she was sweet and lovable through the manna, venerable through the rod, and worthy of proclamation and commendation through the divine law. And accordingly there was in her a threefold excellence, namely of dignity, of virtue, and of charity: Sirach twenty-four: "I am the mother of fair love and of fear and of knowledge and of holy hope."

Therefore, to show her lovable in graciousness, he says: The Angel, having entered to her, said: Hail, full of grace. And therefore she was fittingly prefigured by Esther, of whom it is said in Esther two that she was exceedingly beautiful and of incredible loveliness, and appeared gracious and lovable in the eyes of all. Whence of her can be said that word from Sirach twenty-four: "In me is all grace of life and of truth, in me is all hope of life and of virtue." Nor is this a wonder, because she was to conceive him of whom it is said in John one: "We have seen his glory, the glory as of the Only-begotten of the Father, full of grace and truth"; and therefore afterwards it is added: "Of his fullness we have all received."

But to show her venerable by reason of dignity, he adds: The Lord is with you: this is said in a distinctive sense, because in an excellent and singular manner, as in his own tabernacle: Sirach twenty-four: "He who created me rested in my tabernacle"; the Psalm: "The Lord is in his holy temple," that is, in the womb of the Virgin; and again: "The Most High has sanctified his tabernacle; God is in the midst of it, it shall not be moved." Bernard: "The Lord is with you: you will be the mother of him whose Father is God: the Son of the Father's love will be the crown of your chastity"; from which you obtain an inestimable dignity above all, and for this reason she is called queen in the Psalm: "The queen stood at your right hand."

That he might also show her praiseworthy by reason of blessing, he adds: Blessed art thou among women, on account of the universal remedy: 1 Kings 25: "David said to Abigail: Blessed art thou, who hast kept me from avenging myself with my own hand." Blessed, I say, among women, that is, among women; Judges 5: "Blessed among women is Jael, blessed shall she be in her tent." Or: blessed among women, that is, above all women: Judith 13: "Blessed art thou, daughter, by the Lord the most high God, above all women upon the earth"; and again in chapter 15: "They all blessed her with one voice, saying: Thou art the glory of Jerusalem, thou the joy of Israel, thou the honor of our people, because thou hast acted manfully, and thy heart has been strengthened, because thou hast loved chastity, and after thy husband hast not known another; therefore also the hand of the Lord has strengthened thee, and therefore thou shalt be blessed." Or: blessed by women: Song of Songs 6: "The daughters of Sion saw her and declared her most blessed, and the queens and concubines praised her."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
