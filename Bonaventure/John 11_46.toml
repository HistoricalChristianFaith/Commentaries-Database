[[commentary]]
quote='''
But certain of them went to the Pharisees and told them what Jesus had done: whence by one and the same event, some advanced and others fell away: 2 Corinthians 2: "To some we are the odor of death unto death, to others the odor of life unto life"; therefore Luke 2: "Behold, this one is set for the ruin and the resurrection of many in Israel."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
