[[commentary]]
quote='''
Third, He is shown to be powerful in saving the infirm in that which is added: The demons therefore went out from the man and entered into the swine: by which departure the man was freed. They went out by the command of divine power, according to that passage of Zechariah 13: "I will cast the unclean spirit out of the land." This was said by Him who says of Himself below in chapter 13: "Behold, I cast out demons and perform cures today and tomorrow, and on the third day I am consummated." For they went out by the power of Christ, in whose name they were cast out by His disciples, according to what is said in Acts 16, that "Paul said to the pythonic spirit: I command you in the name of Jesus Christ to go out from her; and it went out the same hour." But departing from the man, they enter into the swine, because the unclean spirit seeks unclean dwelling places: Job 37: "The beast shall enter its lair and shall dwell in its cave"; and of Behemoth it is said in Job 40: "He sleeps under the shadow, in the covert of the reed, in moist places." He says this with regard to carnal men, who seek nothing else but shadow and wantonness, like swine.

Fourth, He is shown to be powerful in casting down the proud in that which follows: And the herd rushed headlong over the precipice into the lake and was drowned; in which the Lord's extraordinary power is shown, which did not permit them to enter the swine for rest, but for drowning, so that thus might be fulfilled in them that passage of Exodus 15: "Your spirit blew, and the sea covered them; they sank like lead in the mighty waters"; in which the submersion of sins is spiritually designated, according to that prophetic passage of Micah, the last chapter: "He will put down all our iniquities and will cast all our sins into the depths of the sea."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
