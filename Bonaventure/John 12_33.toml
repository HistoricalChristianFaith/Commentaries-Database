[[commentary]]
quote='''
But this he said, signifying by what death he was to die: namely by the death of the cross, which was the most vile. Wisdom two: "Let us condemn him to a most shameful death."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
