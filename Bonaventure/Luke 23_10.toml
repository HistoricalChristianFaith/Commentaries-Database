[[commentary]]
quote='''
Third, as regards the wickedness of the people accusing, there is added: But the chief priests and the scribes stood, vehemently accusing him. But this constancy was not virtue, but obstinacy, because it came not from love of justice, but from the malice of envy. For this is what arms the heart to assail one's neighbor: whence Augustine says: "Although through every vice the poison of the ancient enemy is poured into the human heart, in the zeal of envy it creeps through all the inmost parts. This is that by which Cain is armed against his brother Abel, and the sons of Jacob against Joseph, the Babylonians against Daniel, the Jews against Christ." But in the Jews there was envy with obstinacy, and therefore they accused him vehemently. For perseverance in evil is not true constancy, but hardness and obstinacy, as the magicians of Pharaoh against Moses: whence Second Timothy three: "But as Jannes and Mambres resisted Moses, so also do these resist the truth, men corrupted in mind, reprobate concerning the faith." Whence they were imitators of that dragon, of whom Revelation twelve says: "Cast out was the accuser of the brethren, who accused them day and night"; and this from envy. For, Wisdom two, "by the envy of the devil death entered the world, and they imitate him who are of his part."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
