[[commentary]]
quote='''
Second, as to the testimony of taste, he adds: But while they yet did not believe and wondered for joy, he said: Have you here anything to eat? — so that if sight does not move them, hearing does not move them, touch does not move them, at least taste might move them. And this is an express sign of resurrection. Hence the Lord, after he raised the girl, "commanded that something be given her to eat," above, chapter eight. And John, chapter twelve, says of Lazarus that "he was one of those reclining at table." And thus Christ proved by the use of the senses that he had truly risen, so that the disciples might be made certain, and we through them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
