[[commentary]]
quote='''
When therefore they had dined. It should be noted that during the meal he did not ask about love, because, as is said in Sirach chapter six, "there is a friend who is a companion at table, and he will not remain in the day of necessity." But afterward he asks: Jesus says to Simon Peter: Simon, son of John, do you love me more than these? Therefore he asks about love, because he does not wish to entrust his flock except to one who loves; therefore about greater love, because he wishes to entrust it to one who loves more. Hence Gregory: "He who does not have charity ought by no means to undertake the office of preaching"; certainly much less the office of prelacy, because, as is said in John chapter ten, "the good shepherd lays down his life for his sheep."

He says to him: Yes, Lord. Here is set forth Peter's response, in which he responds that he loves, but not that he loves more, because he did not know the love of the others. Hence Augustine: "That Peter responds, I love you, and did not add more than these: he responded what he knew about himself; for he could not know how much he was loved by another, because he could not see the heart of another." You know that I love you: in this response Peter shows that he does not respond in flattery, but truly. Hence Chrysostom: "He calls as witness him who knows hidden things." So Jeremiah invoked him, in the seventeenth chapter: "I have not desired the day of man, you know."

He says to him. Here is noted after the response the exhortation to action: because "the proof of love is the display of works"; therefore he says: Feed my lambs: in which the wondrous love of Christ for his sheep is expressed, because he showed this above all other things as a sign of his love: and this indeed Peter fulfilled and urged to be fulfilled, 1 Peter 5: "Elders, feed the flock of God which is among you," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: since the other Apostles stood around, who loved the Lord, why was only Peter questioned about love? There is one response: because the care of the flock was to be specially entrusted to him among the others, therefore he is specially asked about his love. Hence Chrysostom: "Peter was the foremost of the Apostles and the mouth of the disciples and the head of the college"; therefore, passing over and bypassing the others, he speaks to him about such things. — Another reason can also be assigned: because Peter had notably denied him, and therefore seemed not to be worthy to be placed before the other Apostles; therefore the Lord asks, so that he might show his charity excelling above the rest, and might confirm the pastoral office which he had given.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: since Peter could not answer this question: Do you love me more than these? because he did not know about the others, why does the Lord ask? I respond: It must be said that the Lord asks this in order to show his excellence in the asking and his correction in the answering; hence Augustine: "That Peter loved the Lord more than the others is evidently apparent where, questioning him, he says: Do you love me more than these? Which indeed he knew, and yet he was asking, so that we too might know his love toward the Lord." And Peter's correction is shown in this, that he does not dare to place himself before the others, as above before the passion, when he said: "Even if all shall be scandalized in you, yet not I."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
