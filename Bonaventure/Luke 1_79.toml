[[commentary]]
quote='''
For readiness in action and contemplation there must be seven gifts of the Holy Spirit. For the contemplative life, on account of its turning toward the Trinity, must have three expediting gifts: with respect to reverence for majesty, fear; with respect to the understanding of truth, understanding; with respect to the savor or taste of goodness, wisdom. The active life, however, which is engaged in doing and enduring, must have four, namely piety for doing and fortitude for enduring; and the directive gifts of these two, namely knowledge and counsel. Whence, because direction is necessary for readiness, there arises a combination of gifts; and more gifts pertain to the intellect, because the light of knowledge greatly avails to direct one's feet into the right path.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
Now this visitation of the heavenly sun was not only a cause of consolation, but also of illumination: and therefore he adds: To illuminate those who sit in darkness and in the shadow of death: and it should be construed: he visited to illuminate, that is, for the purpose of illuminating, those who sit in darkness, that is, the erring nations: Isaiah 9: "The people who walked in darkness have seen a great light; for those dwelling in the region of the shadow of death, a light has risen for them"; and again, Isaiah 42: "I have given you as a light to the nations, that you might open the eyes of the blind and lead forth the bound from confinement, those sitting in darkness from the prison house." And therefore John 9: "For judgment I have come into this world, that those who do not see may see, and those who see may become blind."

And because through illumination we are led to direction, therefore there follows: To direct our feet into the way of peace: Proverbs 16: "The heart of man disposeth his way, but it is the Lord's to direct his steps." And therefore Proverbs 3: "In all thy ways think upon him, and he shall direct thy steps"; and the Psalm: "Thy good Spirit shall lead me into the right land," where there is the kingdom of peace without toil; Wisdom 10: "The Lord conducted the just one through right ways and showed him the kingdom of God"; of which kingdom it is said in the Psalm: "Praise the Lord, O Jerusalem, who hath placed peace in thy borders." For Jerusalem is interpreted as "vision of peace," to which we are led through the guidance of Christ and through the way of the commandments, which leads to peace: the Psalm: "Much peace have they that love thy law"; and Isaiah 48: "Would that thou hadst attended to my commandments: thy peace would have been as a river."

Note that the Lord visits to correct offenders, as a legate a province; Obadiah 1: "He hath sent a legate to the nations. Arise, and let us rise up against him in battle"; the Psalm: "I will visit their iniquities with a rod." — To justify the penitent, as a physician the sick: Mark 2: "They that are well have no need of the physician, but they that are ill." — To teach the ignorant, as a master a disciple, as here: He hath visited us, to enlighten, etc.; the Psalm: "Thou hast visited the earth and plentifully watered it"; there follows: "The river of God is filled with waters." — To rouse the negligent, as a prince his people; 1 Kings 17: "Visit thy brethren, whether they fare well, and learn with whom they have been stationed"; Acts 15: "Let us return and visit the brethren throughout all the cities." — To advance those who labor, as a vinedresser his vineyard; the Psalm: "Look down from heaven and see, and visit this vineyard"; Isaiah 5: "For the vineyard of the Lord of hosts is the house of Israel." — To preserve the obedient, as a shepherd his flock; Ezekiel 34: "I will visit my sheep, as a shepherd visits his flock." — To make fruitful those who contemplate, as a bridegroom his bride; Genesis twenty-one: "The Lord visited Sarah, and she conceived"; Judith fifteen: "Joachim, the high priest, came from Jerusalem to Bethulia with all his priests, to see Judith." — To aid those who fight, as a king his army; Genesis, the last chapter: "After my death God will visit you"; and Luke, the last chapter: "Stay in the city until you are clothed with power from on high." — To console those who suffer, as a healthy person the sick; Job ten: "Your visitation has preserved my spirit"; and Job two and James one: "Pure and undefiled religion before God and the Father is this: to visit orphans and widows in their tribulations"; Ecclesiasticus seven: "Let it not weary you to visit the sick." — To reward those who persevere, as a householder; Matthew twenty: "Call the workers and pay them their wages"; and Isaiah sixty: "I will make your visitation peace and your overseers justice."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'

[[commentary]]
quote='''
In the beginning I call upon the first principle, from whom all illuminations descend as from the Father of lights, from whom is every good gift and every perfect gift, namely the eternal Father, through his Son, our Lord Jesus Christ, that by the intercession of the most holy Virgin Mary, mother of the same God and our Lord Jesus Christ, and of blessed Francis, our leader and father, he may give the enlightened eyes of our mind to direct our feet in the way of that peace which surpasses all understanding; which peace our Lord Jesus Christ proclaimed and gave.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FProoemium.html'
source_title='Itinerarium Mentis in Deum, Prologue'
