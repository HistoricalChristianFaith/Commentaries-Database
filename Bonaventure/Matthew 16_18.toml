[[commentary]]
quote='''
Because outside the unity of faith and charity, which makes us children and members of the Church, no one can be saved: therefore, if the Sacraments are received outside her, they are not received unto salvation, although they are true Sacraments; but they can become useful if one returns to holy mother Church, the sole bride of Christ, whose children alone Christ the bridegroom considers worthy of eternal inheritance.

Whence Augustine against the Donatists writes: "The baptism of the Church can exist outside the Church, but the gift of the blessed life is found only within the Church, which was also founded upon the rock, which received the keys of binding and loosing. This is the one Church which holds and possesses all the power of her bridegroom and Lord, through which conjugal power she can even bear children from handmaids, who, if they are not proud, will be called to the lot of inheritance; but if they are proud, they will remain outside."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"

[[commentary]]
quote='''
Matthew sixteen: You are Peter, and upon this rock I will build my Church, etc., up to that point: it shall be loosed in heaven also; but it is established that he who can loose and bind all must be obeyed by all: therefore God so instituted the Church that one would be obeyed by all. But the Church is to be ruled and governed as it was instituted by the Lord: therefore, according to divine institution, all must obey one, namely the Supreme Pontiff.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'

[[commentary]]
quote='''
And this is what Cyprian says: "The Lord speaks to Peter: I say to you, that you are Peter, and upon this rock, etc. Upon one He builds the Church, and the beginning proceeds from unity, so that the Church of Christ may be shown to be one: the episcopate is one, of which a part is held by each one in its entirety: and the Church is one, which extends more broadly in multitude the increase of its fruitfulness. As there are many rays, but one light, and the branches of a tree are many, but the strength is one, founded on a tenacious root: and as from one fountain many streams flow, and although the multiplicity may seem diffused by the bounty of overflowing abundance, yet unity is preserved whole in the origin: so also the Church of God, suffused with light, extends its rays through the whole world: yet it is one that is diffused everywhere, nor is the unity of the body separated." Cyprian therefore intends that because the Church is one dove, one episcopate, one body, it ought to have been founded upon one preeminent pastor, namely Peter, as upon one bishop and head and bridegroom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'
