[[commentary]]
quote='''
He answered them: I have already told you, and you heard; why do you wish to hear it again? As if to say: if you inquire maliciously, I will not respond; but if earnestly, I will respond; whence he says: Do you also wish to become his disciples? As if to say: I believe that you do not wish it; but if you did wish it, I would tell you again; heeding that saying of Proverbs 9: "He who instructs a mocker brings injury upon himself."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
