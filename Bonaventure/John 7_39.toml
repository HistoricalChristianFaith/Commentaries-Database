[[commentary]]
quote='''
Scripture enlightens from nearby by means of the gifts of graces which supplement what is lacking in human activity. For many scientists came as guests: they came to our house and to our activity. But in these matters, activity must reach a limit. Wherefore Scripture enlightens such matters from nearby. Hence it is not good to go far out for something that is close at hand. Indeed, Scripture describes the gifts of the Holy Spirit throughout. In John: Jesus therefore, wearied as He was from the journey, was sitting at the well. And there follows: "Everyone who drinks of this water will thirst again. He, however, who drinks of the water that I will give him shall never thirst." And so, two kinds of water are distinguished. For one knowledge is described as being external, and the more one drinks of it, the more he thirsts; the other, as being internal, of which it is said: "He who believes in Me, as the Scripture says, 'From within Him there shall flow rivers of living water.'" He said this, however, of the Spirit whom they who believed in Him were to receive. And these are the waters from the fountain of salvation, that is, awareness of those graces that sustain souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252017.html'
source_title='Collations on the Hexaemeron, Collation 17'

[[commentary]]
quote='''
"But this he said of the Spirit, whom those believing in him were to receive:" concerning which, Acts two: "There came suddenly from heaven a sound as of a mighty rushing spirit." They were to receive him, but had not yet received him. Therefore he says: "For the Spirit was not yet given, because Jesus was not yet glorified:" below, in the sixteenth chapter: "If I go away, I will send him to you."

But it is asked concerning what he says, that "the Holy Spirit was not yet given." To the contrary: The prophets prophesied true things, but only through the Holy Spirit: therefore they had the Holy Spirit; whence David says: "Take not your Holy Spirit from me." Likewise, the Apostles performed miracles: but Jerome says that "they could not perform miracles without the grace of the Holy Spirit."

I respond: It must be said that the giving of the Holy Spirit is threefold: manifest, more manifest, most manifest. Manifest it was in those prophesying and performing miracles before the Passion: more manifest it was in the breathing after the Resurrection, because he was given in a visible sign, namely a breath: but most manifest after the Ascension, because in a sign both visible and audible; and insofar as he was given more manifestly, so also more abundantly.

Therefore, what is said, that "he was not yet given," is to be understood: in evidence and abundance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
