[[commentary]]
quote='''
Issachar is understood to mean "sturdy ass," and actually an ass bears a cross on its shoulders. It must always be ready to bear this cross. But the [true] interpretation is not "sturdy ass," but "reward," and it represents a man armed with love of the reward. Hence, in Matthew: "Blessed are you when men reproach you, and persecute you, and, speaking falsely, say all manner of evil against you, for My sake. Rejoice and exult, because your reward is great in heaven." And he said that once he was speaking with Brother Aegidius, who told him that we are not wise compared to Francis, the wise merchant: but we waste our substance, for we should pay a denarius to a man for him to strike us. And we do not even have the wisdom of the ass that bears its burden, and the more blows and insults it receives, the better it carries its load. And so, the obedient man should not let go any [potential] good. On the contrary, he should do better on account of any kind of tribulation, otherwise he is not a contemplative.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252023.html'
source_title='Collations on the Hexaemeron, Collation 23'
