[[commentary]]
quote='''
"Now it was Caiaphas who had given counsel to the Jews"; above in chapter 11: It is expedient that one man die for the people. Chrysostom: "Therefore he recalls that prophecy, because the salvation of the world was his death, and therefore the hearer, hearing of the bonds of Christ, ought not to be troubled."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
