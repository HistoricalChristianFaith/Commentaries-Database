[[commentary]]
quote='''
For the Father himself loves you, and therefore gladly hears you; and the reason for this is: Because you have loved me: above in the fourteenth chapter: "He who loves me will be loved by my Father"; not only was love the cause, but also faith: and you believed that I came forth from God. And by the merit of faith they deserve to be heard, because it is said in Matthew twenty-one: "All things, whatever you ask in prayer believing, you shall receive." Because therefore you have believed, you deserve to be heard. But until then it had sufficed to believe that he had come forth from God; henceforth it was necessary to believe that he would return to God. Whence, to perfect their faith, he adds:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
