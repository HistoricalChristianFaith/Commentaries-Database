[[commentary]]
quote='''
"Amen, amen, I say to you, that we speak what we know": "we, that is, I and my Apostles," as the Gloss says; or "we" in the plural intimates the mystery of the Trinity. "And what we have seen we testify": in chapter 8: "What I have seen with my Father, this I speak"; and thus I ought to be believed; but nevertheless you do not believe. Therefore He adds: "And you do not receive our testimony": in chapter 5: "I have come in the name of my Father, and you do not receive me." And if you do not receive the small things I have said nor believe them, much less will you in great things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
