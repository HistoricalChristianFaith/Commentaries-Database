[[commentary]]
quote='''
"The cohort therefore and the tribune," etc. Here it is shown thirdly that the arrest of Christ was ignominious on the part of the cohort, because they seized and bound him as a robber. Therefore he says: "The cohort therefore," that is, a multitude of soldiers established in one company, "and the tribune," who presided over them, "and the officers of the Jews seized Jesus and bound him." Victor says that "it was the custom of the Jews that whomever they judged worthy of death, they would hand over bound to the governor," and thus as a criminal: therefore in Matthew twenty-six the Lord says to them: "You have come out as against a robber with swords and clubs to seize me." And they bound him, lest he flee, because Judas had said in Mark fourteen: "Whomever I shall kiss, he is the one: seize him and lead him away carefully."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
