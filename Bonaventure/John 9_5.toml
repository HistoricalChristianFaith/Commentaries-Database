[[commentary]]
quote='''
As long as I am in the world, I am the light of the world. Just as therefore the day is nothing other than the presence of light on the earth, so this day is nothing other than the presence of Christ in the world: Malachi, the last chapter: "The sun of justice shall rise for you who fear God." Therefore the Lord says below in the twelfth chapter: "Walk while you have the light, lest the darkness overtake you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
