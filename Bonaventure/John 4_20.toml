[[commentary]]
quote='''
"Our fathers worshipped on this mountain," namely Abraham and Jacob — "and you say that Jerusalem is the place where one ought to worship." If, therefore, the fathers are to be imitated, how then do you say this, as though despising the custom of the fathers? The Jews said this on account of that passage in Deuteronomy 12: "Take heed that you do not offer to the Lord in every place, but in the place which the Lord shall choose." The Lord resolves the doubt of this question, showing that neither there nor in Judea did they worship perfectly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
