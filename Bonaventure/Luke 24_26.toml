[[commentary]]
quote='''
And this is the reasoning Christ used, during forty days appearing to them. "Did not the Christ have to suffer these things before entering into His glory?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
And therefore, to establish faith in the passion and resurrection, he adds: Was it not necessary for Christ to suffer these things and to rise again, and so to enter into his glory? It was necessary, I say, that is, it was fitting and most appropriate, first on account of the remedy for sins: Romans 5: "For if, when we were enemies, we were reconciled to God through the death of his Son, much more, being reconciled, we shall be saved by his life"; therefore Romans 4: "He died for our offenses and rose again for our justification." — Second, on account of the example of virtues: whence 1 Peter 2: "Christ suffered for us, leaving you an example, that you should follow his steps"; and therefore Philippians 2: "Let this mind be in you, which was also in Christ Jesus"; and afterwards: "He humbled himself, becoming obedient unto death"; and therefore Acts 14: "Through many tribulations we must enter into the kingdom of God." For if it was necessary for Christ to suffer in order to enter into his own glory, how much more is it necessary for us also to suffer, that we may enter into a glory not our own? And therefore, when his cousins asked to sit at his right hand, he answered, Matthew 20: "Can you drink the cup that I am about to drink?" There Jerome says: "He knew who could imitate his passion; but he said this so that, with him asking and them answering, we might all hear that no one can reign with the Lord unless he has imitated his passion."

It was also fitting on account of the fulfillment of all the Scriptures: whence above, chapter 18: "All things that are written concerning the Son of Man through the Prophets shall be accomplished." For just as the ark was completed in a cubit, so all the words of Scripture are summed up in this Word, namely, born, having suffered, buried, and raised: on account of which, Isaiah 10: "The Lord of hosts shall bring about a consummation and an abbreviation in the midst of all the earth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
