[[commentary]]
quote='''
The doubt of the neighbors is introduced, who out of wonder at the change in his sight are uncertain whether they recognize the illuminated man; therefore he says: Therefore the neighbors, and those who had seen him before, because he was a beggar, as the blind are accustomed to beg — such wretched and contemptible and poor persons the kind and humble Lord especially used to heal; whence, similarly, Luke 18: "A certain blind man sat by the wayside begging"; "standing still, Jesus" — it is said there that He illuminated him. Those, therefore, who were accustomed to seeing him said: Is not this he who sat and begged? They said this in doubt, and in this doubt they disagreed; whence he says: Some said: This is he, considering the figure of his body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
