[[commentary]]
quote='''
Second, as regards the perverse judgment of human impiety, there is added: And those who were reclining at table together began to say within themselves, namely by judging wrongly and despising him: Who is this, who even forgives sins? As if they were saying: since he is lowly and a nobody, how does he attribute to himself what God alone can do? According to that passage of Isaiah forty-three: "I am, I am he who blots out your iniquities for my own sake." And thus was verified that saying of Sirach thirteen: "The poor man spoke, and they say: Who is this?" So also in their hearts those who were eating together were devising deceit, so that that word of the Psalm might be fulfilled: "If he who hated me had spoken great things against me, I would perhaps have hidden myself from him. But you, a man of one mind with me," etc. Whence these men, by judging wrongly about her healing, were themselves becoming sick, as Bede says: "The sick woman having been healed, others grow sick over her salvation." And thus was verified that saying of Hosea seven: "When I would have healed Israel, the iniquity of Ephraim was revealed and the wickedness of Samaria, because they have wrought falsehood."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
