[[commentary]]
quote='''
The Spirit of truth, who proceeds from the Father, he will give, namely another Paraclete, the Spirit of truth, etc. He describes this Spirit with respect to his effect, whence he calls him the Spirit of truth, because he teaches true things, just as the spirit of error teaches false things: below in the sixteenth chapter: "When he comes, he will teach you all truth." He also describes him with respect to his dwelling, because not in unbelievers but in believers, not in carnal men but in spiritual ones; on account of which he adds: Whom the world cannot receive. And the reason is that it is blind through unbelief; because it does not see him, by open knowledge, nor does it know him, by any understanding whatsoever; Wisdom 1: "The Holy Spirit of discipline will flee from the deceitful and will withdraw himself from thoughts that are without understanding"; and 1 Corinthians 2: "The natural man does not perceive the things that are of God." But you shall know him, because he shall abide with you and shall be in you: Revelation 2: "To him who overcomes I will give the hidden manna, and I will give him a white stone, and on the stone a name written, which no one knows except he who receives it." Concerning this knowledge, Wisdom 15: "To know you is perfect justice, and to know your justice and your power is the root of immortality." And it should be noted that he says: He shall abide with you and shall be in you, signifying the twofold grace of the Holy Spirit: prevenient and subsequent; the Psalm: "His mercy shall go before me"; and in another Psalm: "And your mercy shall follow me all the days of my life."

It is asked concerning what He says, that the world does not know the Holy Spirit, but you shall know Him, because He shall be in you. But it is objected: because the Holy Spirit is in all things, in the good as well as in the evil, since He is God: therefore all know Him. If you say that He does not speak of being present by presence, but by grace; this is false, because no one knows whether he is worthy of love or of hatred: therefore no one knows whether he has the Holy Spirit with respect to the effect of grace. I respond: It must be said that here He speaks of knowledge of the Holy Spirit in His manifest effect; whence He speaks of His being in us, not by essence, but by effect, and therefore the response to the first objection is clear. But it should be noted that the effect of the Holy Spirit is twofold: one kind, which is in us and regards us, such as to love, to believe, and to fear, and we are certain that we have these when we have them; another kind, which regards something above us, namely to make pleasing, which is to make acceptable to God, and with respect to this effect it is not known to us except through special revelation; it can nevertheless be known probably, though not with certainty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'

[[commentary]]
quote='''
No one can be saved in whom the Trinity does not dwell: for the entire Trinity dwells simultaneously in a person through grace: but the Trinity does not dwell except in one who believes: therefore no one can be saved unless he believes the most blessed Trinity. The minor is proved through that which is said in John fourteen, that the Spirit of truth the world cannot receive, because it does not see him nor know him: but you shall know him, because he shall abide with you and shall be in you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Mysterio%2520Trinitatis%2FQuestion%25201.html'
source_title='Disputed Questions on the Mystery of the Trinity, Question 1'
