[[commentary]]
quote='''
"For if you believed Moses, you would perhaps believe me also: perhaps" is a mark of freedom: and truly me: "for he wrote of me": Deuteronomy eighteen: "The Lord will raise up a prophet for you from your nation: you shall hear him, just as you hear me." And he will accuse you, because you do not believe in him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
