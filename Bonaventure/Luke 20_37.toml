[[commentary]]
quote='''
Third, as to the confirmation of reason, he adds: That the dead truly rise, even Moses showed at the bush, that is, the word of the Lord which he spoke to Moses in the vision of that burning and unconsumed bush, according to what is said in Exodus 3: "The Lord appeared to him in a flame of fire from the midst of the bush, and he saw that the bush burned and was not consumed"; and it follows that the Lord spoke the words which follow here: As he calls the Lord the God of Abraham and the God of Isaac and the God of Jacob: Exodus 3: "The Lord called Moses from the midst of the bush" "and said: I am the God of Abraham and the God of Isaac and the God of Jacob."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
