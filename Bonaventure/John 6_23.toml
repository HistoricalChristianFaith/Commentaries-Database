[[commentary]]
quote='''
"But other boats came from Tiberias," from the city after which that lake was named; "near the place where they had eaten the bread, giving thanks to God," because thus one ought to eat.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
