[[commentary]]
quote='''
Jesus says to her. Here the third point is touched upon, namely the amplification of the faithful confession. For Martha had confessed that the Lord could obtain her brother's resurrection; but the Lord wishes to lead her to this, that she confess that Christ can raise the dead; on account of which he says with authority: Your brother shall rise again.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
