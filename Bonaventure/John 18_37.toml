[[commentary]]
quote='''
"Pilate therefore said to him." Here the fourth point is set forth, namely the examination of the response. And because the Lord had said that he had a kingdom, Pilate argues from the Lord's response, as if marveling: "So," he says, "you are a king?" As if to say: since you confess yourself to be a king, it seems from your words that you wish to reign. And the Lord indeed responds, conceding Pilate's conclusion and satisfying his intention. He concedes Pilate's conclusion when he says: "You say it, because I am a king:" as if to say: I do not deny what you say; but nevertheless I did not come to reign temporally, as you believe: whence he adds: "For this I was born and for this I came into the world, that I might bear witness to the truth. Born," namely by temporal birth, not to rule, but to teach the truth: Isaiah 55: "Behold, I have given him as a witness to the peoples, a leader and a teacher to the nations." And he adds the sign of this: "Everyone who is of the truth hears my voice:" above in chapter 8: "He who is of God hears the words of God." And because Pilate did not yet fully understand, he therefore still inquires.

Question II. Likewise, inquiry is made about what he says: "Everyone who is of the truth hears my voice." Either "of" denotes material cause, and then no one is of the truth; or efficient cause, and then all: but yet not all hear. Augustine responds that in this word "he commended the grace by which, according to his purpose, they are predestined and called Saints. For if we consider the nature in which we were created, since the Truth has created all, who is not of the truth? But it is not granted to all from the truth that they hear the truth; but those to whom it has been given, they hear," above in the sixth chapter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
