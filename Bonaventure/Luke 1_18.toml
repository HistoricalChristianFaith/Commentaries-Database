[[commentary]]
quote='''
He therefore introduces the doubt of the priest, when he says: And Zacharias said to the Angel: How shall I know this? that is, by what sign shall I be made certain? First Corinthians chapter one: "The Jews require signs." — Indeed note that some seek signs for the sake of the publication of the divine promise, as Abraham: Genesis chapter fifteen: "Lord God, how can I know that I shall possess the land?" — Some refuse on account of the obstinacy of their own sin, as Ahaz: Isaiah chapter seven: "Ask for yourself a sign from the Lord your God." — But some seek on account of hesitation of mind, as Zacharias; whence he adds the reason for doubting: For I am an old man, and my wife is advanced in her days; and so there is incapacity on the part of both parents, and so it is no longer the time for begetting, but rather, according to that passage of Ecclesiastes chapter three, "it is a time to be far from embraces"; and therefore he doubted and hesitated. But not so Abraham, of whom it is said in Romans chapter four: "He was not weakened in faith, nor did he consider his own body as dead, when he was nearly a hundred years old, and the dead womb of Sarah. In the promise also of God he did not hesitate through distrust, but was strengthened in faith, giving glory to God, knowing most fully that whatever He promised, God is able also to do." Whence Abraham believed, because he considered the divine power; but Zacharias hesitated, because he considered human incapacity. In this we are instructed that in miracles one must look to the higher causes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
