[[commentary]]
quote='''
This now the third time. After the manifestation has been set forth, there is set forth the comparison of this manifestation with the preceding ones; and it is counted as the third along with the preceding ones, not because there were not more, but because it suffices to write these three for the sake of believing, according to that passage in Deuteronomy nineteen: "In the mouth of two or three witnesses shall every word stand." Therefore he says: This is now the third time that Jesus manifested himself to his disciples, after he had risen from the dead, as though it were sufficient to have recounted a threefold manifestation: Acts ten: "He gave him to be made manifest, not to all the people, but to witnesses foreordained by God, to us, who ate and drank with him after he rose from the dead."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'

[[commentary]]
quote='''
It is asked: Why did the Lord manifest himself to the disciples at intervals and was not with them continuously until the ascension? And Chrysostom responds that "he withdrew himself from their sight at times, so that he might be sought more eagerly, and being sought might be loved, and being loved might be venerated more remarkably and more devoutly." Another reason: because the disciples, as long as the Lord was with them, loved him carnally; in order to dispose them to spiritual love and through this to the reception of the Holy Spirit, he therefore withdrew his bodily presence from their eyes little by little, until he fully withdrew it in the ascension, and then their love would become entirely spiritual. For this reason it is written above in the sixteenth chapter: "Unless I go away, the Paraclete will not come to you," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
