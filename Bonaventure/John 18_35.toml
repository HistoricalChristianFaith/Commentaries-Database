[[commentary]]
quote='''
"Pilate answered: Am I a Jew?" As if to say: I do not lay this charge upon you; "your nation and your chief priests have delivered you to me"; as if to say: I received this from them. "What then have you done," that they accuse you so?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
