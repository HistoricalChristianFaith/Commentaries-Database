[[commentary]]
quote='''
Because it accords with the time of grace that the Sacrament of communion and love should not merely signify communion and love, but also inflame unto the same; and because that which most inflames us to mutual love and most unites the members is the unity of the Head, from whom through the diffusive, unitive, and transformative power of love mutual love flows into us: hence it is that in this Sacrament of the Eucharist is contained the true body of Christ and immaculate flesh, as diffusing itself to us and uniting us to one another and transforming us into itself through the most ardent charity, by which he gave himself to us and offered himself for us and restored himself to us and remains with us even unto the end of the world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"
