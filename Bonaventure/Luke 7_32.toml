[[commentary]]
quote='''
Second, as regards the mark of hardness in affection, he adds: They are like children, where he adjoins a similitude through which their hardness is shown, because they were moved neither by the song of promises nor by the lamentation of threats, just as foolish children in the marketplace do not respond to others, neither to those singing nor to those lamenting — whom he introduces by way of similitude. For which reason he says: They are like children sitting in the marketplace. Likewise it befits them to be told and reproached with what children sitting in the marketplace reproach their companions with. For which reason he adds: Speaking to one another and saying: We piped to you, and you did not dance: because thus preachers can say to them: We piped to you, namely by sounding forth the promises of God; and you did not dance, by making progress. And the comparison is fitting, because the preacher is compared to a piper, according to that passage of Isaiah fifty-eight: "Cry out, do not cease; lift up your voice like a trumpet"; and Jeremiah four: "Sound the trumpet in Zion." Nor undeservedly, because, Ecclesiasticus forty, "the pipe and the psaltery make a sweet melody, and above both a pleasant tongue." At these things the hard of heart are not moved, nor do they dance through progress in good works; concerning which leaping, Malachi four: "You shall go forth and leap like a calf from the herd, and you shall tread down the wicked." And concerning this, Ambrose says: "It is an honorable dance, because the soul elevated by good works leaps for joy"; whence those who were not moved by the song of promises are hard of heart, but harder still in deed, because they were not moved even by the threats of punishments.

For which reason he adds: We have lamented to you, namely through the threat of punishment: Ezekiel 2: "There were written in the book lamentations and song and woe"; and Jeremiah 9: "Consider and call the mourning women, and let them take up a lamentation over us"; Joel 2: "Turn to me in fasting and weeping and mourning, and rend your hearts and not your garments." And yet they were not moved by this: whence he adds: And you did not weep, through the compunction of penance: Isaiah 22: "The Lord will call to weeping and mourning"; and afterward: "And behold, joy and gladness, slaughtering rams," etc.: although the Apostle says in Romans 12: "Rejoice with those who rejoice, and weep with those who weep."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
