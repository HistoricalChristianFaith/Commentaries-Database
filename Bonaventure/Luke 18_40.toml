[[commentary]]
quote='''
Third, as regards the generosity of the healer, it is added: But Jesus, standing still, commanded him to be brought to himself. Now Jesus is said to stand, because he is in himself immutable: Psalm: "But you are the selfsame, and your years shall not fail"; whence the Gloss: "Jesus passing by hears the blind man, standing still he illuminates him, because through his humanity he has compassion on the cries of our blindness, but by the power of his Divinity he pours into us the light of his grace." And although through prayer we may seem to draw him to us, he rather draws us to himself, just as a ship is drawn to the rock, as Dionysius says. Therefore the bride in Song of Songs 1 says: "Draw me after you." Whence we are drawn to him when we are aroused in mind toward him and transcend beyond ourselves. As a figure of which, in Mark 10 it is said of this blind man: "Casting aside his garment, he leaped up and came to him." And then we also hear secret words, according to that saying of the Prophet in the Psalm: "I will hear what the Lord God speaks within me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
