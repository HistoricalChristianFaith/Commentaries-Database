[[commentary]]
quote='''
Because He has regarded the lowliness, etc. After the affection or devotion of the one praising has been described, there is here added the reason for praising, which is drawn from a twofold cause. The first is the benefit of grace, which made her lovable to God and praiseworthy to men. Because lovable to God, she says: Because He has regarded the lowliness of His handmaid. In Genesis 29, a figure of this preceded in Leah, who, having conceived offspring, said: "The Lord has seen my lowliness; now my husband will love me." And humility was the disposition for the regard of grace: Isaiah, last chapter: "To whom shall I look except to the poor and contrite in spirit and the one who trembles at my words?" Because, as it is said in the Psalm, "the Lord is exalted and regards the lowly, and knows the lofty from afar." Hence concerning the just man, Sirach 11: "The eye of God regarded him for good and raised him from his lowliness"; and therefore the Prophet prayed in the Psalm: "Look upon me and have mercy on me, for I am alone and poor."

That benefit of grace also made her praiseworthy to men, and therefore she adds: For behold, from henceforth all generations shall call me blessed, both men and women: Proverbs, last chapter: "Her children rose up and proclaimed her most blessed; her husband also praised her." Now the Virgin Mary was blessed on account of the merit of chastity: Psalm: "Blessed are the undefiled in the way"; and Apocalypse 16: "Blessed is he who keeps his garments, lest he walk naked and they see his shame"; and Wisdom 3: "Happy is the barren and undefiled woman, who has not known the bed in transgression." — She was also more blessed on account of the counsel of virginity: First Corinthians 7: "But she will be more blessed if she so remains, according to my counsel." — She was also most blessed on account of the privilege of fruitfulness, on account of which the other women proclaim her most blessed, Song of Songs 6: "The daughters of Sion saw her and proclaimed her most blessed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
