[[commentary]]
quote='''
Here he shows that Christ is set before him in the power of baptizing. For it belongs to him to baptize whose it is to regenerate; and it belongs to him to regenerate who has the bride, from whom he may beget. Therefore he says: "He who has the bride is the bridegroom," and from her he can beget and baptize: Ephesians 5: "Husbands, love your wives, as Christ also loved the Church and gave himself up for her, that he might sanctify her, cleansing her by the washing of water in the word of life." Bede: "Christ is the bridegroom, the bride is the Church gathered from the nations: 2 Corinthians 11: I betrothed you to one husband, to present you as a chaste virgin to Christ. His therefore it is to regenerate; but mine it is not to regenerate nor to envy, but rather to rejoice as a friend." Therefore he adds: "But the friend of the bridegroom, who stands," by grace, "and hears him," by internal inspiration, "rejoices with joy because of the voice of the bridegroom. Rejoices with joy," that is, rejoices fully, because he wishes to rejoice with him. "Friend": in chapter 15: "You are my friends" etc. "Stands": Romans 14: "To his own Lord he stands or falls." "Hears": Psalm: "I will hear what the Lord God speaks in me" etc. "Rejoices with joy": Philippians, the last chapter: "Rejoice in the Lord always" etc. And in this way John rejoiced as a friend, not grieving as one envious. Therefore he says: "In this therefore my joy is fulfilled," that is, perfected, namely joy is then fulfilled when it has what it desires: in chapter 16: "Ask, and you shall receive, that your joy may be full."

Chrysostom inquires about this, that John calls himself the friend of the bridegroom, when above he had not dared to call himself a worthy servant: in chapter 1: "Whose latchet I am not worthy" etc.

Chrysostom responds that answers are fitted to questions: and above John was being incited to ambition; and therefore he humbled himself and called himself an unworthy servant. Here he is being incited to jealousy: and therefore he calls himself a friend and says that he rejoices at his good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
