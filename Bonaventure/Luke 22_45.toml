[[commentary]]
quote='''
Seventh, as to the circumspection of prayer, he adds: And when he had risen from prayer and had come to his disciples, he found them sleeping for sorrow. For he so prayed to God that he nevertheless did not forget his sheep; indeed, he interrupted his prayer three times in order to return to rouse his disciples: whence it is said in Mark 14 that "he came the third time and found them sleeping." In this the wondrous solicitude of Christ for his disciples is apparent, as a hen is solicitous for her chicks: Deuteronomy 32: "As an eagle provoking her young to fly and hovering over them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
