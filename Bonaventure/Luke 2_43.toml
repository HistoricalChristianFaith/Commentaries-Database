[[commentary]]
quote='''
And when the days were completed, as they returned, namely to their own homes, according to that passage in Judith chapter sixteen: "When the feast was celebrated, each one returned to his own home." And while all returned, Jesus nevertheless did not: whence it is added: The boy Jesus remained in Jerusalem, and thus alone, without the company of his parents. A figure of this preceded in the boy Samuel, of whom it is said in First Kings chapter two, that "Elkanah departed," his father, and his mother departed "to her own home: but the boy ministered before the Lord." Whence he had remained alone, so that he might better devote himself to prayer: Lamentations chapter three: "He shall sit solitary and be silent." And thus he remained by his own impulse without the company of his parents.

He also remained without counsel: whence it is added: And his parents did not know. A figure of this preceded in Samson, "who did not wish to tell his father and mother that he had taken honey from the mouth of the lion," Judges chapter fourteen. In this he also gave an example that in carrying out divine service, counsel is not to be sought from carnal parents: Deuteronomy chapter thirty-three: "He who said to his father and mother: I do not know you: and to his brothers: I know you not: these have kept your word and preserved your covenant."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
