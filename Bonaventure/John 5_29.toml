[[commentary]]
quote='''
"And they who have done good shall come forth unto the resurrection of life": because they shall be raised for this purpose, that they may live; "but those who have done evil, unto the resurrection of judgment," that is, of damnation; these, namely, the Lord shall judge; 2 Maccabees 7: "It is better, being put to death by men, to await hope from God, to be raised again by him; but for you there shall be no resurrection unto life"; this is said to Antiochus; not unto life, but unto judgment; 1 Corinthians 5: "Those who are outside, God shall judge," who are outside through an evil life; Daniel 12: "Many of those who sleep in the dust of the earth shall awake, some unto eternal life, and others unto reproach."

It is further asked concerning those to be judged, namely who will be judged. That only the wicked, seems clear from the text: "He does not come into judgment, but passes over"; and above in chapter three: "He who believes in him is not judged." To the contrary: 2 Corinthians 5: "We shall all stand before the tribunal of Christ." I respond: It must be said that the judgment of determination is taken commonly, and thus it comprehends the sentence of salvation and of punishment, and thus all will be judged: it is taken properly for damnation, and thus it is taken here: "Those who have done evil shall come forth to the resurrection of judgment," that is, of damnation: similarly above in chapter three.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
