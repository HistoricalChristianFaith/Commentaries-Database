[[commentary]]
quote='''
We cannot have the grace of God except through the fear of God. No one receives the grace of God unless he fears God. He who does not have grace ought to fear greatly for himself; likewise, if the Lord restores to a man the grace he had lost, he ought to fear greatly for himself, lest he lose it and become ungrateful, "and the last state of that man becomes worse than the first."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"
