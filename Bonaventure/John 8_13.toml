[[commentary]]
quote='''
"The Pharisees therefore said to him." Here is touched upon the second point, namely the approbation of the commendation on account of the Jews' reproach. For they reproached him because he commended himself. Therefore they say: "You bear witness concerning yourself; your testimony is not true," that is, it is not to be accepted as true, because it is said in Proverbs twenty-seven: "Let another praise you, and not your own mouth; a stranger, and not your own lips." To this reproach the Lord adds his response.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
