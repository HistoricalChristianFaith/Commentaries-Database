[[commentary]]
quote='''
And if I go and prepare a place for you, through your faith, namely, in my absence: whence Augustine says: "Let the Lord Jesus go and prepare a place; let him go, so that he may not be seen; let him be hidden, so that he may be believed. For then is a place prepared, if one lives by faith. Let him who is believed be desired, so that he who is desired may be possessed: the desire of love is the preparation of the dwelling." When I shall have thus prepared in my absence, I come again and will take you to myself, through glory, namely, that where I am, you also may be: above in the twelfth chapter: "If anyone serves me, let him follow me, and where I am, there let my servant also be." He therefore exhorts them to faith in his absence, because he absents himself for this reason, that faith may have merit. So Augustine and the Gloss read it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
