[[commentary]]
quote='''
Second, as regards the supplication of confidence made by the prince, it is added: And behold, there came a man whose name was Jairus, whose name is expressed because the person was notable by reason of his office of governance, according to what is said in Second Kings seven: "I have made you a great name, like the name of the great ones who are on the earth"; or also because the name corresponded to his office and dignity. For Jairus is interpreted as illuminated; such a one ought to hold governance among the people. — Whence it is added: And he was a ruler of the synagogue; Sirach forty-five: "He established for him a covenant of peace and made him prince of the holy ones and of his people." Now this prince, although he was exalted in glory, so that there could apply to him that word of First Kings two: "That he might sit with princes and hold a throne of glory"; was not thereby puffed up through pride, but humbled through reverence, heeding that word of Sirach thirty-two: "Have they made you ruler? Be not lifted up." — Therefore it is added: And he fell at the feet of Jesus, knowing it is written, Isaiah forty-five: "Every knee shall bow to me, and every tongue shall swear"; and in the Psalm: "Come, let us adore and fall prostrate before the Lord." He fell prostrate, therefore, that he might honor the majesty of Christ by his reverence; Sirach three: "How great is the power of God alone, and he is honored by the humble"; and also that he might implore his mercy with confidence.

Whence he also adds: Asking him to enter into his house. This he did with insistence, so that he could say that word of Song of Songs 3: "I held him and would not let him go, until I brought him into the house of my mother."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Commentary on Luke, Chapter 8'
