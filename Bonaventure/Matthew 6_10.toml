[[commentary]]
quote='''
For those things which pertain to divine honor and the reward of the homeland are three, namely the understanding of truth, the reverence of majesty, and the concord of will. It is either the attainment of the supremely exalted, which makes kings and through which the kingdom is possessed, and this is asked when it is said: Thy kingdom come; or it is the enjoyment of the highest good, which is not given except to those who have their wills conformed to the divine will, and this is asked when it is said: Thy will be done, on earth as it is in heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25205.html'
source_title="Breviloquium, Part 5"

[[commentary]]
quote='''
In the second petition, piety is sought, when he says: "Thy kingdom come." In the second, the consummation of human salvation is sought, which is not obtained except through the gift of piety: "judgment without mercy shall be done to him who has not shown mercy." In the third part, the fulfillment of the divine law is sought through the gift of knowledge, which teaches to do good and to avoid evil. This gift is touched upon when he says: "Thy will be done on earth as it is in heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"
