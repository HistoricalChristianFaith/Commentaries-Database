[[commentary]]
quote='''
As for the familiarity of service, to which she was admitted, it is added: And behold, a woman who was in the city, a sinner, whose infamy was known to the whole city, such that what is said in Jeremiah 3 could be said to her: "You have had the forehead of a harlot, you refused to blush." This is that woman of whom it is said in Ecclesiastes 7: "I have found more bitter than death the woman who is a snare of hunters, and whose heart is a net"; and this, because she was a manifest fornicatress, as the Ravennan says that "her infamy had injured the whole city," such that what the Lord threatens through Amos to Amaziah the priest was fulfilled in her, Amos 7: "Your wife shall play the harlot in the city." And therefore she is rightly called a sinner both by reason of infamy and by reason of frequency, according to that saying in Sirach 3: "A wicked heart shall be laden with sorrows, and the sinner shall add sin to sin"; and Revelation, last chapter: "He who is filthy, let him be filthy still." Not only had she repeated her fault, but she had also sinned in diverse ways: whence upon that which is said in Mark, last chapter, that "Christ had cast seven demons out of Mary," Gregory says: "By the number seven, universality is rightly designated. Mary therefore had seven demons, because she was full of all vices."

Since therefore she was thus a sinner and unclean, she rightly ought to have been repelled, especially from the place of the banquet: and yet on account of the piety of the Lord, which she recognized, she was drawn: whence it is added: When she learned that Jesus had reclined at table in the house of the Pharisee, she brought an alabaster jar of ointment, that is, a box or vessel of alabaster, which "is of a certain kind of marble in which ointments are preserved uncorrupted." This the sinful woman brought to the house of the Pharisee, in which she knew Christ to be and by whom she was received, according to that saying of the Psalm: "God shall be known in her houses, when he shall receive her." She brought, I say, the ointment of humility, where Christ reclined, so that what is said in Song of Songs 1 might be fulfilled: "While the king was at his repose, my spikenard gave forth its fragrance." Moreover, these spices or ointments which Magdalene brought to Christ were prefigured in 2 Chronicles 9: "There were no spices such as these which the queen of Sheba gave to Solomon." Or Magdalene brought ointments to the Savior in order to render familiar service, to which she was admitted, namely to render to Christ out of devotion what she had rendered to herself out of lust, that is, to wash, to wipe, to kiss, and to anoint the most sacred and most pure flesh of Christ, to which she was admitted on account of the affection of penitence and benevolence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
