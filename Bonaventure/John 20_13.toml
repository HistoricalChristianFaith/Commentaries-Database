[[commentary]]
quote='''
They say to her: Woman, why do you weep? Not only does the Lord console her by sight, but also by the speech of the Angels: whence he says: They say to her: Woman, why do you weep? as if to say: do not weep. For it was no longer a time for weeping, but for joy, since the Lord was rising. But she refused to be consoled, recalling the cause of her grief: Because they have taken away my Lord, that is, his body, is said by synecdoche: and I do not know where they have laid him. Augustine: "This was the greater cause of grief, because she did not know where to go to console her grief." Whence she could say that verse of the Psalm: "My soul refused to be consoled" etc.; Lamentations 1: "Therefore my eye weeps and sheds tears, because my consoler has departed from me, he who converts my soul."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
