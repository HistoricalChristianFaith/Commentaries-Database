[[commentary]]
quote='''
Thirdly, as to the just reproof of the servant, it is added: He says to him: Out of your own mouth I judge you, wicked servant. Wicked servant he calls him, because he was slothful in neglecting, because he was proud in justifying himself, and wicked in accusing the lord. The Gloss: "Wicked, because slothful in carrying out his duty, proud in accusing the divine judgment." And therefore out of his own mouth, while he believes himself to be justifying himself, he rather accuses himself, according to that passage in Job nine: "If I would justify myself, my own mouth will condemn me; if I would show myself innocent, it will prove me wicked"; because, as Augustine says, "to speak well and to live wickedly is nothing other than to condemn oneself by one's own tongue."

This negligent servant, therefore, while he shows that he knows the judgment and severity of God, speaks against himself; whence he also adds: You knew that I am an austere man, taking up what I did not lay down, and reaping what I did not sow, through the severity of vengeance, according to that passage of the Psalm: "When I shall receive the appointed time, I will judge justly."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Commentary on Luke, Chapter 19'
