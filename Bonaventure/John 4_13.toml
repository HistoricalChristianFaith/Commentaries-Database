[[commentary]]
quote='''
Scripture enlightens from nearby by means of the gifts of graces which supplement what is lacking in human activity. For many scientists came as guests: they came to our house and to our activity. But in these matters, activity must reach a limit. Wherefore Scripture enlightens such matters from nearby. Hence it is not good to go far out for something that is close at hand. Indeed, Scripture describes the gifts of the Holy Spirit throughout. In John: Jesus therefore, wearied as He was from the journey, was sitting at the well. And there follows: "Everyone who drinks of this water will thirst again. He, however, who drinks of the water that I will give him shall never thirst." And so, two kinds of water are distinguished. For one knowledge is described as being external, and the more one drinks of it, the more he thirsts; the other, as being internal, of which it is said: "He who believes in Me, as the Scripture says, 'From within Him there shall flow rivers of living water.'" He said this, however, of the Spirit whom they who believed in Him were to receive. And these are the waters from the fountain of salvation, that is, awareness of those graces that sustain souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252017.html'
source_title='Collations on the Hexaemeron, Collation 17'

[[commentary]]
quote='''
"Jesus answered and said to her: Everyone who drinks of this water," namely visible and material, "shall thirst again:" and therefore it is no great thing to give this, nor do I promise this. "But whoever drinks of the water that I shall give him shall never thirst:" below in the sixth chapter: "He who believes in me shall never thirst." And the reason is added why he shall not thirst.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
