[[commentary]]
quote='''
Second, with regard to the aggravation of vengeance, he says: That the blood of all the Prophets may be required. It is required indeed through vengeance; whence in the Psalm: "For requiring their blood, he remembered," etc.; and Genesis nine: "From the hand of man and of his brother I will require the life of man. Whoever shall have shed human blood, his blood shall be shed." — Therefore it shall be required, the blood, that is, the vengeance for the shedding of blood; on account of which he adds: Which was shed from the foundation of the world, that is, from the beginning until the end. It shall be required, I say, of this generation, as if to say that the vengeance for all the blood of a holy man that was shed shall be upon the generation of the Jews, because they shed the blood of him who was the "Holy of Holies," namely Christ; Daniel nine and following: "Christ shall be killed, and the people who shall deny him shall not be his." Whence they themselves said, John nineteen: "We have no king but Caesar"; and Matthew twenty-seven: "His blood be upon us and upon our children."

Or this is said so that they themselves may be punished as an example for others, because, when they saw evil punished in others, they did not correct themselves. Whence Chrysostom: "Why does God avenge the sins of others upon these, if they alone suffered such things, when they had not sinned alone? Just as, when many servants sin, one is chastised for his own sin, and yet he alone, having been flogged for all, endured what was promised to all." The reason, moreover, why the punishment fell more upon these is given by the same John Chrysostom: "Because," he says, "you heard of the vengeance taken upon Cain and upon the other wicked, and if you were not corrected by their examples, you are held to a graver punishment, and the examples of those who came before shall come upon you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
