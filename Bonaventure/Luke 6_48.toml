[[commentary]]
quote='''
As to the manner of truly obeying, he adds a teaching by similitude concerning one who builds a house, when he subjoins: He is like a man building a house, through the progress of virtue: Proverbs 24: "Diligently cultivate your field, so that afterward you may build your house." This house indeed is a good conscience: Wisdom 8: "Entering into my house, I shall find rest with her"; Proverbs 14: "A wise woman builds her house, but a foolish one destroys even what has been built with her own hands." Who dug deep, through the descent of humility, according to the precept of Elisha in 4 Kings 3: "Make in the bed of this torrent ditches and ditches," namely through humility in intellect and affection alike. But to this the proud man responds with that saying of the wicked steward, below in chapter 16: "I am unable to dig, I am ashamed to beg." Against which, Isaiah 2: "Enter into the rock, and hide in the pit of the earth from the face of the fear of the Lord," etc. But he digs deeper who descends further through humility, and his building rises higher, because "he who humbles himself shall be exalted," below in chapter 18. And he laid the foundation upon the rock, through the stability of charity, according to that passage in Ephesians 3: "Rooted and grounded in charity." This charity founds upon Christ, who is the solid rock, according to that passage in Isaiah 28: "Behold, I will lay in the foundations of Sion a stone, a tested stone, a cornerstone, precious, founded in the foundation." Upon this rock charity founds, since it causes one to fulfill his commandments, according to that passage in John 14: "He who has my commandments and keeps them, he it is who loves me." And such a one is founded in Christ: Ecclesiasticus 26: "Everlasting foundations upon solid rock, and the commandments of God in the heart of a holy woman." Ambrose: "The foundation of all virtues is obedience to the heavenly commandments." This therefore is the manner of truly obeying the divine precepts: that there be diligence in the progress of virtue, that there be depth in the descent of humility, that there be firmness in the affection of charity.

As to the fruit of true obedience, he adds: And when a flood came, etc. For the observance of the divine commandments strengthens against the assault of temptations, which he designates by the flood—as to exterior temptation from demons, according to that passage in Isaiah 8: "The Lord will bring the waters of the river, strong and many, the king of the Assyrians"; and below: "And it shall pass through Judah, overflowing and reaching even to the neck"; here he openly designates the devil; and Job 21: "How often shall the lamp of the wicked be extinguished, and a flood come upon them." He also designates temptation through the striking of the flood, when he adds: The flood struck against that house, namely as regards interior temptation, namely of fear, or sorrow, or joy, or love; Nahum 2: "The gates of the rivers are opened"; which indeed happens when temptations enter within, so that one may cry out that word of the Psalm: "Save me, O God, for the waters have come in even unto my soul." But these temptations do not prevail against the observers of the divine commandments; on account of which it is added: And it could not move it: Proverbs 10: "As a passing tempest, so the wicked shall be no more, but the just is as an everlasting foundation"; in the Psalm: "Perfect my steps in your paths, that my footsteps be not moved." But the reason for this stability is given when it is added: For it was founded upon firm rock. Hence it is said of the just man in Isaiah 22: "I will fasten him as a peg in a sure place." This fastening indeed is through charity: Romans 8: "Who shall separate us from the charity of Christ? Tribulation? or distress? or famine? or nakedness? or danger? or persecution? or the sword?" The fruit of true obedience, therefore, is victory over exterior and interior temptation through the power of a stable foundation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
