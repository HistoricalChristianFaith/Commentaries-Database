[[commentary]]
quote='''
As for the dispelling of fear, he adds: For it is written, that He has given His angels charge over you: this is written in the Psalm. He therefore cites Scripture because he saw that Christ always defended Himself through Scripture. Whence Pope Leo says: "He finds occasions for tempting where he has seen men more intensely engaged." Whence he asserts it is written, so as to induce credulity, and also adduces a Scripture that would exclude faintheartedness on account of the promise of angelic aid, both in prosperity and in adversity. On account of aid in prosperity he says: That they may guard you in all your ways, that is, in your works: Exodus twenty-three: "Behold, I send My Angel, who shall go before you and guard you on the way." Thus the Angel guarded Tobias, as is said in Tobit twelve: thus also Judith, as is said in the thirteenth chapter: thus also they guard all just men, according to that passage in Hebrews one: "All are ministering spirits, sent forth to minister," etc.: and the whole Church, according to that passage in Isaiah sixty-two: "Upon your walls, O Jerusalem, I have appointed watchmen." But Christ did not need guarding: and therefore the devil was perverting that authority and adducing it in a sinister manner.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
