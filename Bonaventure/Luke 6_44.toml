[[commentary]]
quote='''
And therefore he adds: For every tree is known by its own fruit. And this is what is said in Matthew 7: "By their fruits you shall know them," because, as is said in Galatians 5, "the works of the flesh are manifest, which are fornication, uncleanness, immodesty, luxury, the service of idols, etc. But the fruit of the spirit is charity, joy, peace," etc.: whence of the just man it is said in the Psalm: "He shall be as a tree which is planted near the running waters, which shall yield its fruit." Nor is this surprising, because, in Wisdom 3, "the fruit of good labors is glorious," but of evil labors, none; Romans 6: "What fruit had you then in those things of which you are now ashamed?" And therefore it is said of the miser in Ecclesiastes 5: "He who loves riches shall reap no fruit from them." And that a tree is discerned by its fruit is proven through sensible experience, when it is added: For neither from thorns do they gather figs, nor from a bramble do they harvest grapes. He sets forth two especially praiseworthy fruits, namely figs and grapes: whence in Judges 9 the fig tree and the vine are introduced speaking through prosopopoeia: the fig tree thus: "Can I forsake my sweetness and my most delightful fruits?" And the vine thus: "Can I forsake my wine, which cheers God and men?" He also sets forth two most base shrubs, namely the bramble and the thorn, which the earth brings forth on account of human sins, according to that passage in Genesis 3: "Cursed is the earth in your work: thorns and thistles shall it bring forth to you."

But spiritually, by the sweet fig tree is understood the sweetness of piety, by thorns, wrathful and schismatic men, who cannot have compassion on others; 2 Kings 23: "The transgressors shall all be pulled away like thorns; and if anyone wishes to touch them, he shall be armed with iron and the shaft of a spear." By the grape is understood the clear knowledge of truth, and by brambles, heretical men, by whom the proud are held fast, according to that passage of Genesis 22: "Abraham lifted up his eyes and saw among the briars a ram caught by its horns." These two kinds of men lay waste the vineyard of the Lord of hosts, namely schismatics and heretics: Isaiah 32: "Upon the ground of my people shall come up thorns and briars"; Isaiah 5: "I expected that it should bring forth grapes, but it brought forth wild grapes"; and further: "Briars and thorns shall come up over it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
