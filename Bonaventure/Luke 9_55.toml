[[commentary]]
quote='''
Secondly, as regards the reasonable reprehension in the word of the Lord, it is added: And turning, he rebuked them, saying: You do not know of what spirit you are. He says this because they believed themselves to be moved by a spirit of righteousness, yet they were moved by a zeal of bitterness, which they ought not to have been, as James 3 says: "But if you have bitter zeal, and there are contentions in your hearts, do not glory and be liars against the truth." And therefore it is said in 1 John 4: "Do not believe every spirit, but test the spirits, whether they are from God." For the spirit of Christ is a spirit of meekness, according to that word of Isaiah 61: "The Spirit of the Lord is upon me, because he has anointed me; he has sent me to proclaim to the meek"; and Isaiah 42: "Behold my servant, I will uphold him. I have placed my spirit upon him. A bruised reed he shall not break, and smoking flax he shall not extinguish." And these disciples ought to have had this spirit as good disciples and imitators of the Master.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
