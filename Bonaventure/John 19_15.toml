[[commentary]]
quote='''
But they cried out: Away, away, crucify him. The doubling signifies the intensity of desire for Christ's death: Jeremiah twenty-six, "The priests and prophets spoke to the princes and to all the people, saying: The judgment of death is upon this man." And because the hardness of perversity would not suffice unless the denial of truth were added, therefore there follows Pilate's inquiry: Shall I crucify your king? as if by this word noting to them their perverse will in this, that they were seeking their own disgrace. But the reproach of a king redounds upon the people, and therefore, so that they might seem to flee reproach, they deny the truth: whence: The chief priests answered, saying: We have no king but Caesar; and thus this man is not our king, nor is his disgrace ours.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
