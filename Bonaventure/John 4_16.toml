[[commentary]]
quote='''
"Jesus says to her: Go, call your husband," not through marriage, but through misuse, "and come here." He was not saying this because he believed she had a husband, but so that he might reveal the secret about her husband to her as she responded.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
