[[commentary]]
quote='''
"If he called them gods, to whom the word of God was made," such as the Prophets and other Saints: Ezekiel one: "And the word of the Lord came to Ezekiel the priest," etc.; "and Scripture cannot be broken," that is, it cannot be charged with falsehood or reproved of blasphemy: Matthew five: "One iota or one tittle shall not pass from the Law, until all things be fulfilled."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
