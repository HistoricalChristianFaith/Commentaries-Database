[[commentary]]
quote='''
Nicodemus says to him. Here the second point is touched upon, namely the mode of regeneration, which is spiritual. But Nicodemus, supposing it to be carnal, doubts and asks: "How can a man be born when he is old?" As if to say: it is impossible for an old man to become young: Job 7: "My days have passed more swiftly than the web is cut by the weaver: and they are consumed without any hope." The impossibility is also on the part of the one generating: whence he says: "Can he enter a second time into his mother's womb and be born again?" He was still carnal, and therefore understood carnally: 1 Corinthians 2: "The natural man does not perceive the things that are of the Spirit of God." But the Lord draws him back from carnal understanding to spiritual.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
