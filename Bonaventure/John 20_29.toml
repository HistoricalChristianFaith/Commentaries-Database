[[commentary]]
quote='''
The third certainty derives from an intellectual vision combined with bodily vision. This occurred in the minds of the apostles. What was from the beginning, what we have heard, what we have seen with our eyes, what we have looked upon and our hands have handled, the Word of Life. And we announce to you nothing else than what we have seen. Wherefore Thomas wanted to touch, and was told: "Because thou hast seen Me, thou hast believed."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
Jesus says to him. Here the faith of those who were built up through hearing is commended, and is preferred to the faith of Thomas, which came through presence and sight: and therefore he says: Because you have seen me, Thomas, you have believed: blessed are those who have not seen and have believed: because such faith was of greater freedom and had more of its own. Chrysostom: "When someone says: now I would wish to be in those times and to see Christ working wonders: let him consider that blessed are those who have not seen and have believed"; First Peter 1: "Whom though you have not seen, you love: in whom also now, not seeing, you believe."

Question. Concerning what he says: Because you have seen me, Thomas, you have believed. It seems that he ought to have said: because you have touched me, since it had not sufficed him that he should see. To this Augustine responds in two ways: either because sight is truly understood as touch, since sight is commonly called sense; or because Thomas did not dare to touch. Whence he says: "He did not say you have touched, but you have seen, since sight is in a certain way a general sense; although it could be said that the disciple did not dare to touch."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252020.html'
source_title='Commentary on John, Chapter 20'
