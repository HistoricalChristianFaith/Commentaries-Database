[[commentary]]
quote='''
Fourth, regarding the remedy for this very tenacity through divine help, he adds: And those who heard said: And who can be saved? They say this seeking a remedy and dreading the danger. For since very few perfectly despise riches, it seems from this that almost no one can attain perpetual salvation. Hence Augustine: "Since the poor are more numerous than the rich, the Apostles would not have said this unless they understood in the number of the rich all those who desire to obtain riches"; but few are those who are not such, because, as is said in Philippians 2, "all seek the things that are their own, not the things that are of Jesus Christ." All, therefore, seem to be in danger of damnation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
