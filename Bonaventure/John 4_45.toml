[[commentary]]
quote='''
"When therefore he came into Galilee, the Galileans received him," as if they began to honor him for a little while: Philippians 2: "Receive Epaphroditus with all joy in the Lord, and hold such men in honor." And the reason is added: "Having seen all things that he had done in Jerusalem on the feast day: having seen," I say: "for they also had gone up to the feast day." For all these things which they saw were signs and miracles: above, chapter 2: "When he was in Jerusalem on the feast day, many believed in him, seeing the signs which he was doing."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
