[[commentary]]
quote='''
But when he comes. Here fourthly he intimates his innocence, to be expressed by the testimony of the Holy Spirit and of the Apostles: on account of which he says: But when he comes: they persecuted me as though I were a wicked man and worthy of death; but when the Paraclete comes, whom I will send to you from the Father, the Spirit of truth, who proceeds from the Father, he will bear witness concerning me: Acts five: "The Spirit is a witness, whom God has given to all who obey him"; and by bearing witness to my innocence, he will convict the world of malice: below in chapter sixteen: "When he comes, he will convict the world of sin, because it does not believe."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
