[[commentary]]
quote='''
The glorious Virgin, strong and devout, paid that price with the piety of compassion toward Christ. It is said in John: "A woman, when she gives birth, has sorrow, because her hour has come." On account of giving birth, a woman has pain, namely preceding the delivery. But the blessed Virgin did not have pain preceding the delivery, because she did not conceive from sin, as did Eve, to whom the curse was given; rather, she had pain after the delivery. Whence she gave birth before she was in labor. On the cross she labored; whence in Luke: "And a sword shall pierce your own soul." In other women there is pain of the body, in her there is pain of the heart; in others there is pain of corruption, in her there is pain of compassion and charity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25206.html'
source_title='Collationes de Septem Donis, Collation 6'

[[commentary]]
quote='''
A woman, when she gives birth. Here the fourth point is touched upon, namely exemplification. And the exemplification concerns how quickly and in a short time sorrow will be turned into joy: and the example is of a woman in labor, who, when she gives birth, is sorrowful, although she does something good; but when she has given birth, she immediately rejoices. Therefore he says: A woman, when she gives birth, has sorrow, because her hour has come, namely of giving birth, which she would still wish to be delayed on account of the pain; for the pain in childbirth is intense; Isaiah 13: "They shall be in pain as a woman in labor"; and 1 Thessalonians 5: "And as labor pains upon a woman with child, and they shall not escape." But when she has brought forth the child, she no longer remembers the anguish, for joy that a man is born into the world; on account of the joy that she has from her offspring: Genesis 21: "The Lord has made laughter for me: whoever hears of it will laugh with me," said Sarah.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252016.html'
source_title='Commentary on John, Chapter 16'
