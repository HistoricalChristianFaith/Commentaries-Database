[[commentary]]
quote='''
It happened that a priest, etc. After the person in need because of a twofold misery, there follows here the person who despises because of hardness. Here a twofold person is introduced, namely a superior and an inferior in ecclesiastical dignity.

First, therefore, as regards the superior person, he says: It happened that a certain priest went down the same way, whose duty it was to teach and fulfill the law of God, according to that passage of Malachi 2: "The lips of the priest shall keep knowledge, and they shall seek the law from his mouth." They, moreover, were bound to be holy, according to that passage of Leviticus 10: "I will be sanctified in those who draw near to me, and in the sight of all the people I will be glorified." Hence it was especially the duty of priests to keep the law of God and above all with regard to mercy; but this one did not keep it, on account of hardness of heart.

Hence he adds: And seeing him, he passed by, not heeding that passage of Deuteronomy 22: "If you see your brother's donkey or ox fallen on the road, do not despise it, but you shall lift it up with him." This one despised this brother on account of avarice. Already that passage of Jeremiah 6 was verified: "From the least even to the greatest, all are given to avarice, and from the prophet even to the priest, all practice deceit"; and likewise that passage of Isaiah 1: "Your princes are faithless, companions of thieves," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'

[[commentary]]
quote='''
The person moreover passing by with hardness was legal justice, which bestowed neither mercy nor medicine. This was well signified in Exodus 17, where it is said that "the hands of Moses were heavy"; whence in the Gloss of Bede: "The priest announces the law of God: indeed the Law descended into the world through Moses and conferred no healing upon man. The Levite descended, who showed the type of the Prophets, but he too heals no one, because the Law reproves sins but passes by, because it does not bestow pardon." And that was well designated in 4 Kings 4 by the staff of Elisha, which he sent to raise the boy, "and yet there was neither voice nor sense"; whence it was rather a staff for chastising than for healing. Whence it is said in Hebrews 10: "Anyone who violates the law of Moses dies without any mercy on the testimony of two or three witnesses."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
