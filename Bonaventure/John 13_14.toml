[[commentary]]
quote='''
If therefore I have washed your feet, being Lord and Master: you also ought to wash one another's feet: Philippians two: "In humility, let each esteem others better than themselves"; and after: "Let this mind be in you, which was also in Christ Jesus," etc. And the reason for this is added: because he did this to be imitated. For he worked miracles, which we cannot imitate, because he did not perform them as an example, but as a sign of his power; he performed humble works to be imitated, as here.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'

[[commentary]]
quote='''
On that passage in John thirteen: And you ought to wash one another's feet — the Gloss says: "He who bows down at the feet, in his heart humility is stirred up; or if it already exists in the heart, the disposition of humility is confirmed." For exterior humiliation avails for acquiring humility, for exercising it, and for perfecting it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25201.html'
source_title='Disputed Questions on Evangelical Perfection, Question 1'
