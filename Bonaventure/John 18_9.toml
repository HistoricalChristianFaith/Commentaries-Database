[[commentary]]
quote='''
"That the word might be fulfilled which he said," above in the seventeenth chapter: "Because those whom you gave me, O Father, I have not lost any of them": because he willed to suffer alone; Isaiah sixty-three: "I have trodden the winepress alone, and of the nations there is no man with me."

But what does it mean that he says: "I have not lost any of them?" Is it not said in Matthew sixteen: "He who loses his life for my sake shall find it?" Therefore Augustine explains this of eternal perdition, "because they did not yet believe in him as all those who do not perish believe." But that was said to those who believe perfectly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
