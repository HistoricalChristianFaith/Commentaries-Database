[[commentary]]
quote='''
And because this was great and unusual, it was not to be kept silent but was to be spread abroad with reverence: therefore there follows: And the fame of him spread into every place of the region. So of Solomon it is said in Ecclesiasticus forty-seven: "Your name was spread abroad to far-off islands"; this was by reason of wisdom. This was prefigured in David, First Chronicles fourteen: "The name of David was spread abroad in all regions, and the Lord gave dread of him upon all his enemies"; similarly Second Chronicles twenty-six: "His name was spread abroad even to the entrance of Egypt on account of his frequent victories."

Note that the name of David was spread abroad by reason of justice: the name of Solomon, by reason of wisdom; the name of the Romans, by reason of power: the name of Christ, by reason of all excellence and dignity or supereminence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
