[[commentary]]
quote='''
That man says: Whether he is a sinner, I do not know; one thing I know, that whereas I was blind, now I see. As if to say: I do not judge the author, but I acknowledge the benefit. Augustine: "He neither favors calumny nor conceals the truth." The blind man responded wisely, according to that saying of Ecclesiasticus 5: "If you have understanding, answer your neighbor; but if not, let your hand be upon your mouth, lest you be caught in an undisciplined word and be confounded."

But it seems that the blind man lied, because below he shows that he was not a sinner. The response is twofold: first, from Chrysostom, that "I do not know" means: I do not pronounce on this now; or "I do not know," because I am ignorant of his life — inasmuch as I was a blind man who had never seen him nor followed him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
