[[commentary]]
quote='''
But none of those reclining at table knew what he had said to him, not even John himself, who already knew his wickedness. Whence Chrysostom: "It was not of a kind and gentle mind to suspect evil of another," indeed on the contrary they interpreted it for the good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
