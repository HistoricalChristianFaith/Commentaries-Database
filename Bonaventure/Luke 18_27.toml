[[commentary]]
quote='''
Therefore the Lord shows the remedy through the gift of his grace, when he adds: He said to them: The things that are impossible with men, through the power of their own strength, are possible with God, that is, are made possible through his help; which he says because, although it is difficult to despise these temporal things through the force of nature, it is nevertheless made easy through the gift of grace, according to that passage in Song of Songs, last chapter: "If a man should give all the substance of his house for love, he would despise it as nothing." Hence it is not to be understood that the Lord introduces a covetous man, remaining covetous, into heaven by his power, but that through the gift of grace he converts him from vice to virtue. Hence the Gloss: "God converts from the love of earthly things to the charity of eternal things, not that the proud and covetous enter." And this is of great power, that so great a change is made, that from the covetous one a charitable one is made, from the earthly one a heavenly one, from the rich a poor man, from the proud a humble one, from a son of perdition a son of the king, so that the words of the Psalm may be said: "This is the change of the right hand of the Most High"; because he it is who can give sufficiency of heart through grace, which cannot be given through money or any creature, according to that passage in 2 Corinthians 9: "God is able to make all grace abound in you, so that in all things always having all sufficiency," etc., because, as is said above in chapter one, "no word shall be impossible with God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252018.html'
source_title='Commentary on Luke, Chapter 18'
