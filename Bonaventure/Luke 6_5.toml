[[commentary]]
quote='''
And lest anything be lacking to the authority of Scripture, he subjoins his own authority, by which he both willed and was able to grant them a dispensation. Which he indicates when he adds: And he said to them, that the Son of man is Lord also of the Sabbath. Now he calls himself the Son of man with respect to the humility of the humanity assumed, and he declares himself Lord of the Sabbath and of the Law with respect to the sublimity of the hidden Divinity: whence in Apocalypse 19 it is said that "he had on his garment and on his thigh written: King of kings and Lord of lords." And therefore it is said in the Psalm: "You have subjected all things under his feet"; this is said of the Son of man "made a little lower than the Angels" on account of the ignominy of the passion. And therefore as Lord he granted them a dispensation for a time, he who was afterwards to take away the observance of it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
