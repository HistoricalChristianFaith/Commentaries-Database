[[commentary]]
quote='''
Third, as regards the flagitious deed, it is added: And having cast him out of the vineyard, they killed him, that is, outside Jerusalem, because it is said in the last chapter of Hebrews: "Christ suffered outside the gate. Let us therefore go forth to him outside the camp, bearing his reproach." They killed him, moreover, when they handed him over to Pilate to be killed and demanded that he be crucified; whence Acts 3: "You handed over and denied Jesus, the Son of God, before the face of Pilate, when he judged that he should be released. But you asked that a murderer be granted to you, while the Author of life you killed." And thus was fulfilled that passage of Isaiah 5 concerning the planted vineyard: "I waited for it to produce judgment, and behold, iniquity; and justice, and behold, a cry"; a cry, namely, for the killing of Christ, concerning which Mark 15: "They cried out: Crucify him! But Pilate said to them: What evil then has he done? But they cried out all the more: Crucify him!" Whence from this vineyard there came forth not wine but gall, according to that passage of Deuteronomy 32: "Their vine is of the vine of Sodom and of the suburbs of Gomorrah; their grape is a grape of gall, and their clusters most bitter. Their wine is the poison of dragons and the incurable venom of asps."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Commentary on Luke, Chapter 20'
