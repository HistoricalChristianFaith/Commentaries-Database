[[commentary]]
quote='''
"He who eats my flesh," by spiritual eating, "and drinks my blood abides in me," through love: First John four: "He who abides in love abides in God, and God in him"; "and I in him," through indwelling: below in chapter fourteen: "If anyone loves me, he will keep my word: and my Father will love him, and we will come to him and make our abode with him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
