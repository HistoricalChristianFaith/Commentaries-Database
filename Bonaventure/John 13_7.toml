[[commentary]]
quote='''
Jesus said to him: What I do you do not know now, but you shall know hereafter; therefore it is fitting that you endure until later. But Peter is not swayed by the admonition.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
