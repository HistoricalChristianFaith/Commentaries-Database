[[commentary]]
quote='''
The vice of pride must also be detested, which clings to the one who wishes to rule; on account of which he adds: The disciple is not above the master, namely according to right order. He, therefore, who desires to rule while his Master remains subject, strives to surpass his Master. Whence Bernard: "As often as I desire to rule over men, so often do I strive to go before my God, and then I do not savor the things that are of God." And this is what the Lord says to the disciples in John 13: "Amen I say to you, the servant is not greater than his lord, nor is the apostle greater than he who sent him." He, therefore, who wishes to be exalted above others is ignorant of the teaching of Christ; Matthew 11: "Learn from me, for I am meek and humble of heart"; or if he once knew it, he falls into apostasy, according to what Gregory says: "As often as the shepherd delights in ruling over others, so often does he slip into the crime of apostasy." Moreover, he ceases to be a disciple when he wishes to lord it over others and to be called the master of others, against that passage in Matthew 23: "Neither be called masters, for your master is one, Christ."

The example of the perfect life is to be imitated, which consists in willing to be subject; on account of which he says: But everyone will be perfect, if he be as his master, namely Christ, who "came not to be ministered unto but to minister and to give his life a redemption for many," Matthew twenty. And therefore it is said below in chapter twenty-two: "He that is the greater among you, let him become as the lesser, and he that is the leader, as he that serves." And the reason is given: "But I am in the midst of you, as he that serves." And he himself showed them this by example, in John thirteen: "After he washed their feet," it is added: "Do you know what I have done to you? You call me master and lord: and you say well, for so I am. If then I have washed your feet" etc. And afterwards it is added: "For I have given you an example, that as I have done to you, so you also should do." And to this perfect example the Apostle invites in Philippians two: "Let nothing," he says, "be done through contention nor through vainglory, but in humility let each esteem others as superior to themselves." "For let this mind be in you, which was also in Christ Jesus," of whom he adds that "he humbled himself" etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'

[[commentary]]
quote='''
Furthermore, Luke six: Everyone will be perfect if he is as his master; but Christ had a purse, as is evident from John twelve, where it is said that Judas carried the money bags: therefore, to be unwilling to have property in common does not seem to be perfection, but rather superstition, in which the disciple seems to wish to set himself above the master. If you say that he had the money bags for others; to the contrary: Augustine says, and it is found in Causa twelve, question one: "The Lord had money bags, preserving the offerings of the faithful, and he distributed to the needs of his own and to other indigent persons."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25202.html'
source_title='Disputed Questions on Evangelical Perfection, Question 2'

[[commentary]]
quote='''
Luke 6: Everyone will be perfect if he is like his master. But it is not read of Christ that he was under another by vow; therefore to subject oneself to another by vow is not perfect, but, as it seems, rather superstitious. To this it must be said that Christ, insofar as was fitting for the redemption of the human race, subjected himself to men, and this with an excellent and perfect will; and because his will was confirmed in the good and was not changeable as ours is, therefore there was no need for it to be bound by a vow. But we approach that confirmed will through the strengthening of purpose and the emission of a vow; hence the vow, by binding us and in a certain way strengthening us, renders us conformed to Christ by its inviolability.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25204.html'
source_title='Disputed Questions on Evangelical Perfection, Question 4'
