[[commentary]]
quote='''
It is necessary that we fear God. Whence in the Gospel: "Do not fear those who kill the body and after this have nothing more that they can do; but I will show you whom you should fear: fear him who, after he has killed, has power to cast into gehenna." I would prefer to be in the greatest punishment of this world for seven thousand years than to endure the least eternal punishment. The Apostle: "It is a fearful thing to fall into the hands of the living God," because God afflicts for eternity. Consider the sublimity of divine power, the perspicacity of divine wisdom, and the severity of divine vengeance, that you may fear God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Septem%2520Donis%2FCollation%25202.html'
source_title="Collationes de Septem Donis, Collation 2"

[[commentary]]
quote='''
On account of which he adds: But I will show you whom you should fear, so that by fear of him you may turn away from evil, according to that passage of Jeremiah 10: "Do not fear those things which can do neither evil nor good"; and afterward: "Who shall not fear you, O King of the nations," etc.

Therefore, that we may not fear worldly power, we must fear the divine; on account of which he says: Fear him who, after he has killed, has power to cast into gehenna: whence in the Psalm: "Let all the earth fear the Lord, and let all the inhabitants of the world be moved by him." And because this kind of fear is most useful and necessary, he therefore repeats: So I say to you, fear him. Whence Isaiah 8: "Sanctify the Lord of hosts himself, and let him be your dread, and let him be your terror"; and Jeremiah 5: "Will you not then fear me? and before my face," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
