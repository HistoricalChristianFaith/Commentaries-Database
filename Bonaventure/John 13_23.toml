[[commentary]]
quote='''
There was therefore one of his disciples reclining in the bosom of Jesus, as the most intimate among the others, and this indeed on account of the prerogative of love; whom Jesus loved. This disciple was John; whence Chrysostom: "Behold John's self-effacement; for he does not say his own name, but whom Jesus loved, just as the Apostle in Second Corinthians twelve: I know a man," he did not say: I know Paul. This disciple, being so intimate, was a suitable inquirer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
