[[commentary]]
quote='''
Joyful also was it in the neighborhood by reason of the celebrated and common report; on account of which it says: And her neighbors and kinsfolk heard that the Lord had magnified his mercy with her, and they congratulated her. And thus was fulfilled what the Angel had foretold: "And many shall rejoice at his birth," namely the neighbors and kinsfolk, because it belongs especially to such people to rejoice together; below in the fifteenth chapter: "The woman who found the lost drachma calls together her friends and neighbors, saying: Rejoice with me, for I have found the drachma which I had lost." And they congratulated her: for she herself likewise rejoiced, according to that passage of John 16: "But when a woman has brought forth a child, she no longer remembers the anguish, on account of the joy that a man has been born into the world"; and therefore they congratulated her. — Because the Lord magnified his mercy with her, that is, he wrought a great mercy; whence she could say that word of the Psalm: "I will praise you, O Lord my God, with my whole heart, and I will glorify your name forever, for your mercy is great upon me." For the Lord magnifies those whom he loves; Wisdom, last chapter: "In all things you magnified your people, O Lord, and did not despise them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
