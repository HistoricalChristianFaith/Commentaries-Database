[[commentary]]
quote='''
There was also a suitability of time, because it was the Passover: whence He says: "Now the Passover, the feast day of the Jews, was near": on this feast the Lord had performed miracles, and he now had to renew them, because he had to make a new Passover. It should be noted, as Chrysostom says, that "from the Passover of John's imprisonment until this one, one year had passed, although the Evangelist narrates little about this," because others had narrated it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
