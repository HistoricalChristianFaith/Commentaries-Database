[[commentary]]
quote='''
"For this is the will of my Father who sent me, that of all that he has given me," through election; Romans 8: "Those whom he foreknew he also predestined to be conformed to the image of his Son"; "I should lose nothing of it," through reprobation, according to that passage of First Corinthians 1: "I will destroy the wisdom of the wise, and the prudence of the prudent I will reject." "But should raise it up on the last day," unto participation in eternal beatitude: Romans 8: "If the Spirit of him who raised Jesus from the dead dwells in you, he who raised Jesus Christ from the dead will also give life to your mortal bodies." He fulfilled this will in part: below in chapter eighteen: "Father, of those whom you gave me, I have lost none of them." And because God so chose us that we might attain beatitude through the merits of faith, in order to show the cooperation of our free will, he repeats again.

There is a question about what he says: "Everything that the Father has given me, I shall not lose any of it." Against this: below in the seventeenth chapter: "None of those whom you gave me has perished except the son of perdition": therefore someone did perish from among those given to him.

It must be said that the force of the argument can bear upon what he says "gave," because "to give" is twofold: either according to present justice, and in this way Judas was given, and in this way he perished; or "to give" is according to eternal election, and in this way the predestined were given, of whom none perishes.

It is answered in another way, that the force may bear upon what he says "I shall lose," because Christ himself guards most diligently; hence no one perishes on account of a failing of the shepherd; but because he saves no one against his will, some perish on account of their own malice. Hence Christ does not lose them, but they lose themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
