[[commentary]]
quote='''
"I and the Father are one: one," namely in the unity of essence; "are," in the plurality of persons; therefore My hand and the Father's are one. Chrysostom: "When you hear 'hand,' do not think of anything sensible, but understand only virtue and power."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
