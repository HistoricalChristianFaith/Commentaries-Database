[[commentary]]
quote='''
"And a great multitude followed Him": and the reason for this is added: "Because they saw the signs which He did upon those who were infirm." On account of these signs to be seen they followed Christ, because, as is said in First Corinthians 1, "The Jews seek signs"; and when they see signs, they magnify God: Luke 5: "They were filled with fear and ecstasy, saying: We have seen wondrous things today." On account of these signs the Jews are attracted and also confirmed; Exodus 14: "Stand and see the great works of the Lord, which He is about to do."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
