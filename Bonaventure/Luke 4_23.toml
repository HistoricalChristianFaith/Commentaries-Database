[[commentary]]
quote='''
By way of hidden irony he expresses their reproaches, when he adds: And he said to them: Doubtless you will say to me this similitude: for he saw them thinking this secretly. He said therefore: this you propose ironically against me, which you have secretly conceived in your hearts, because, according to what is said in Matthew twelve, "out of the abundance of the heart the mouth speaks"; you propose this similitude, namely by irony: Physician, heal yourself: which is customarily said to physicians who are ailing, when they cannot help themselves, or do not know how, or are negligent: which is a mocking word directed at them. So also you, heal yourself, that is, the infirm one. Which they said rather out of unbelief and derision than out of humility and devotion, as is said in Matthew thirteen, that "he did not do many mighty works there, because of their unbelief." Whence Bede says in the Gloss: "In vain do you await the help of heavenly mercy, if you envy the virtues bestowed on others. For the Lord is a despiser of the envious, and from those who persecute the divine benefits given to others, he turns away the miracles of his power." And note that they ironically call him physician, whom they ought truthfully to confess as physician, according to that passage in Job five: "He himself wounds and heals." They despise him whom they ought to revere and honor, according to that passage in Sirach thirty-eight: "Honor the physician on account of necessity"; and afterward: "The Most High created medicine from the earth, and a prudent man will not abhor it."

But by way of explicit invective he expresses it, when he adds: How great things we have heard done in Capernaum, namely miraculous works: whence Matthew eleven: "Woe to you, Capernaum! For if in Tyre and Sidon the mighty works had been done," etc. But how did they hear these things, since the Evangelist had not yet related that he had performed any miracles? On account of which it must be noted that the Evangelist does not follow the order of events as they happened, but the order of his own intention, and this indeed he does frequently; and therefore, when one Evangelist narrates afterward what another narrates before, there is no contradiction, because they do not intend to say that events occurred in the order in which they were written, as Augustine says in On the Harmony of the Evangelists. Moreover, Luke, together with the other two, Matthew and Mark, narrates nothing about the first coming of Christ into Galilee, but about the second; about the first, however, John alone treats. From the fame, therefore, of miracles performed in a foreign land, they reproached him because he did not perform them in his own land. Whence is added: Do so also here in your own country; and this is to say: heal yourself, that is, heal those of your own country through miracles, as you have healed others, according to that passage in Sirach fourteen: "He who is evil to himself, to whom will he be good?" and First Timothy five: "If anyone does not have care for his own, and especially for those of his household, he has denied the faith"; it is said in Sirach seventeen: "He gave commandment to each one concerning his neighbor."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Commentary on Luke, Chapter 4'
