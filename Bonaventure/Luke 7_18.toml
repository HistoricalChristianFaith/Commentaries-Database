[[commentary]]
quote='''
Now this proclamation of fame, although it was for many a cause of believing, was nevertheless for some an occasion of derision, as for the disciples of John, with respect to whom it is added: And his disciples reported to John concerning all these things. Bede: "Not with a simple heart, but spurred by envy, as elsewhere, namely in John three, they complain saying: Rabbi, he who was with you beyond the Jordan, to whom you bore witness—behold, he baptizes, and all come to him." Concerning such persons, in Philippians one: "Some preach Christ out of contention, not sincerely." From this therefore was taken the occasion of inquiring whether he himself was the one whom John had foretold, both for the sake of uprooting the envy of the disciples, and for the sake of putting the contention to rest, and for the sake of removing their doubt, and also for the sake of now more clearly spreading abroad the truth itself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
