[[commentary]]
quote='''
And now glorify me, you, Father. Here is touched upon the fourth point, namely the petition itself, by which he seeks the manifestation of his glory; on account of which he says: And now glorify me, you, Father, with yourself, with the glory which I had before the world was made, with you; that is, manifest that glory, so that, just as from eternity I was equal to you before the world was made, so also may it be manifest to others. On account of which it is said below in the same chapter: "I am glorified in them," that is, in the Apostles, because they believed him to be equal to the Father; above in the sixteenth chapter: "Now we believe that you came forth from God"; above in the first chapter: "The Word was with God," namely equal to God, "and the Word was God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
