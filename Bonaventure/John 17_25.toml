[[commentary]]
quote='''
Righteous Father, the world etc. Here the second point is touched upon, namely the reason for being heard, that is, why these ought to see through glory, because they now know through grace: but the wicked neither know now nor will they know then: therefore he says: Righteous Father, because "you will render to each one according to his works." The world has not known you: above in the first chapter: "There was the true light, which illuminates" etc.; therefore I do not pray for the world. But I have known you, and these have known that you sent me, and this by my revealing.

It is asked concerning what he says, that the world, that is, the worldly, did not know him. On the contrary: Romans 1: Who, although they had known God, did not glorify him as God, etc. I respond: There is simple knowledge and knowledge of approbation; by simple knowledge they knew him, but not by knowledge of approbation; and therefore by knowing they merited nothing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
