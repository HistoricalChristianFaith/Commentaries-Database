[[commentary]]
quote='''
Scripture speaks of Him who is the Exemplar, by whom every creature lives in the eternal forms, "What was made in Him was life." For it lives through knowing and loving; and anyone who denies this denies eternal predestination. For God knew the creature from all eternity and loves it, since He made it for glory and grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252012.html'
source_title='Collations on the Hexaemeron, Collation 12'

[[commentary]]
quote='''
"What was made, in him was life." Here the third condition is noted, namely that he is a foreknowing principle, because all things are in him before they are made, and in him they live, just as a chest in the mind of the craftsman. Whence Augustine says that the Son is "the art full of all living reasons"; Ecclesiasticus chapter twenty-three: "To the Lord God, before they were created, all things are known: so also after their completion he beholds all things." Therefore the reasons flourish in him, because they are not changed: James chapter one: "With him there is no change nor shadow of alteration"; and every change is a kind of death.

"And the life was the light of men." Here the fourth condition is touched upon, which is that he provides knowledge to others; therefore he is called the light of men, because he illuminates men and makes them see: whence in the Psalm: "The light of your countenance is signed upon us, O Lord." Without which light there is no seeing, as Augustine says, because just as the eye does not see unless it is illuminated by corporeal light, so the intellect does not see unless it is illuminated by the most spiritual light. And although he provides knowledge to all, he does not however provide knowledge of himself to all, because sinners know through him and yet do not comprehend him.

It is asked: "What was made, in him was life." Against this: All things were made in him; therefore all things are life; in the Psalm: "You have made all things in wisdom"; therefore a stone lives. It must be said that Chrysostom explains that passage thus: "What was made," connecting it to the prior clause, so that the period falls thus: "without him was made nothing that was made," and the word "that" is taken implicatively. And then follows: "In him was life"; and the objection ceases. Hilary however reads it thus: "What was made in him" — here is the period — namely with respect to his humanity, such as the incarnation, passion, and resurrection, "was life," speaking causally, that is, the cause of our life and salvation. Ambrose reads it thus: "What was made in him who is life," that is, in him who is life — the construction is appositive — "was," namely in God's foreknowledge, before it came to be; and it is a similar manner of speaking to: "You have made all things in wisdom." Augustine explains it more elegantly than all of them: "What was made, in him was life"; because it had in him an exemplar and a living reason; which reason is called living because it is spiritual, not material; because it is unchangeable, not variable; because it is eternal, not corruptible. And this is the meaning of life; for life is a spiritual and continuous act, flowing from a being that is at rest and everlasting.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'

[[commentary]]
quote='''
Because not all obey the Gospel, and that truth is above reason; therefore divine wisdom has provided an eternal testimony, which indeed is the book of life. Now this book of life, of itself and in itself, explicitly and expressly gives irrefragable testimony to the eternal Trinity to those who with unveiled face see God in the homeland, but on the way it gives testimony according to the influence of light, of which the soul is capable in the state of the way — for as it is said in John 1: The life was the light of men, because this book of life is the true light, which enlightens every man coming into this world. Now it illuminates in a twofold manner, namely through the implanted light and through the infused light, from the concurrence of which lights the habit of faith is elicited as an argument for believing that God is triune, and consequently every truth that pertains to the worship of the Christian religion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Mysterio%2520Trinitatis%2FQuestion%25201.html'
source_title='Disputed Questions on the Mystery of the Trinity, Question 1'

[[commentary]]
quote='''
By the authority of Scripture, John 1: "What was made, in Him was life": therefore all things that were made previously existed in God who knows them; therefore either through likeness or through truth; but not through truth, since nothing yet existed; therefore through likeness. For God knows things through the eternal reasons, which are the exemplary likenesses of things, most perfectly representative and expressive, and essentially identical with God himself. Now these eternal reasons are not the true essences and quiddities of things, since they are not other than the Creator; but creature and Creator necessarily have different essences: and therefore it is necessary that they be exemplar forms, and thereby representative likenesses of the things themselves; and therefore they are reasons of knowing, because knowledge, by the very fact that it is knowledge, implies an assimilation and expression between the knower and the knowable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Scientia%2520Christi%2FQuestion%25202.html'
source_title='Disputed Questions on the Knowledge of Christ, Question 2'
