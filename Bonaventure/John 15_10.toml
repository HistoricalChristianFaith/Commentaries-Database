[[commentary]]
quote='''
And because true love is manifested through works, he adds: If you keep my commandments, you will abide in my love; just as I have kept the commandments of my Father and abide in his love: above in chapter fourteen: "That the world may know that I love the Father, and as the Father has given me commandment, so I do." So also we ought to do; 1 John 2: "He who says that he abides in him ought, even as he walked, himself also to walk"; Deuteronomy 10: "And now, Israel, what does the Lord your God ask of you, except that you fear the Lord your God and walk in his ways and love him and serve the Lord your God with your whole heart and with your whole soul and keep the commandments of the Lord and his ceremonies, which I command you this day, that it may be well with you"?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252015.html'
source_title='Commentary on John, Chapter 15'
