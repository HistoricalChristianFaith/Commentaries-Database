[[commentary]]
quote='''
Here the second point is touched upon, namely the blindness of false love: because they did not receive the humble one, but will receive the proud one. "I came in the name of my Father," that is, seeking his glory, not my own: below in chapter eight: "I do not seek my own glory." "And you did not receive me": me, that is, the humble one: above in chapter one: "He came unto his own, and his own received him not." "If another shall come in his own name," such as the antichrist, who will seek his own glory, because it is said in Second Thessalonians chapter two: "He is exalted above all that is called God, or that is worshipped, so that he sits in the temple of God." "Him you will receive," blinded, that is, by the just judgment of God; Second Thessalonians chapter two: "God shall send them the operation of error, that they may believe a lie." And the reason for this is that they were unwilling to believe the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
