[[commentary]]
quote='''
Some of the Pharisees who were with Him heard this, that is, they were present; and they said: Are we also blind? They were indignant at the word of the Lord, because they believed it had been said on their account, since they considered themselves wise: and from this very fact the Lord shows the divine judgment, that they have been justly blinded.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25209.html'
source_title='Commentary on John, Chapter 9'
