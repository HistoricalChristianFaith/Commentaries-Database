[[commentary]]
quote='''
"And if I judge, my judgment is true," not carnal, not uncertain, nor according to appearance; Isaiah eleven: "He shall not judge according to the sight of the eyes, nor reprove according to the hearing of the ears"; and therefore I cannot err in judgment: "Because I am not alone, but I and the Father who sent me." Whence, because in judging I do not depart from him, therefore I do not err: above, chapter five: "I can do nothing of myself, but as I hear, I judge, and my judgment is just."

Not only is my testimony certain, but also legitimate, because according to the Law it was sufficient.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
