[[commentary]]
quote='''
"Therefore the Jews sought all the more to kill him": because they could not contradict his response, they sought to kill him: below in chapter seven: "Why do you seek to kill me, a man who has spoken the truth to you?" "Because he not only broke the Sabbath," according to their judgment, "but also called God his Father: his," in the singular: "making himself equal to God," which they considered blasphemy: below in chapter ten: "We do not stone you for a good work, but for blasphemy, and because you, being a man, make yourself God"; "making," as though he were not God, but was making himself God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
