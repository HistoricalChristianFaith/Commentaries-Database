[[commentary]]
quote='''
The subject of Scripture with respect to substance is God; with respect to power, Christ; with respect to operation, the work of restoration. Now God is triune and one: one in essence and triune in persons. Therefore Scripture, which is about Him, has in the unity of the letter a triformity of understanding. Christ also, since He is one Word, all things are said to have been made through Him and shine forth in Him, so that His wisdom is manifold and one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FProoemium.html'
source_title='Breviloquium, Prologue'

[[commentary]]
quote='''
It is manifest that a beginning should be made from the One from whom the two greatest Wise Men began: Moses, the originator of wisdom, and John, its consummator. And John said: "In the beginning was the Word, and the Word was with God; and the Word was God. He was in the beginning with God. All things were made through Him." If, therefore, it is impossible to understand a creature except through that by which it was made, it is necessary that the true Word go before thee.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
Who hath measured the waters in the hollow of his hand and weighed the heavens with his palm? Who hath poised with three fingers the bulk of the earth? This the Word did, through whom all things were made. His hand, by which all things are created, that is, formed or made distinct and adorned, with three fingers lifts and suspends the earth, that is, the ecclesiastic hierarchy which He creates, distinguishes and adorns. This hand measures the waters, this hand holds all things as an object is held in the fist. This is the hand of the eternal Word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25209.html'
source_title='Collations on the Hexaemeron, Collation 9'

[[commentary]]
quote='''
"All things were made through Him." Here the Word is described by comparison to that which is spoken through the Word, and this with respect to four conditions: for it describes Him as a sufficient principle of creation, as unfailing, as foreknowing, as providing knowledge to others. And through these four conditions many heresies are refuted.

First, therefore, He is called a sufficient principle, because He suffices for producing all things. Therefore he says: "All things were made through Him," namely by God the Father through the Word, because Sirach 18: "He who lives forever created all things together"; and this through the Word, whence in the Psalm: "He spoke, and they were made." Augustine in the book of the Confessions: "By the Word coeternal with You, You speak whatever You speak, and whatever You say is made, nor do You make otherwise than by speaking."

"And without him was made nothing." Here the second condition is noted, namely that he is an unfailing principle, because he is absent from no operation. For the Father does nothing without the Word: below in chapter five: "All things that the Father does, these the Son likewise does." Similarly, a creature does nothing without the cooperating Word: below in chapter fifteen: "Without me you can do nothing." And by this the heresy of the Manichaeans is perfectly refuted, who posited two principles, and that some things were produced by the God of light, and some by the God of darkness. For they did not understand how all things were made through the Word.

It is asked concerning what he says: "Without him was made nothing." Against this it is objected that he who steals has done something; therefore theft is something; therefore it is from God; therefore sins and evils are from God and are not made without God. If you say that sin is nothing, whence the sense is: "Without him was made nothing," that is, sin, so that the matter rests there; against this it is further objected: because sin corrupts, and what corrupts acts, and what acts is a being, and what is a being is something; therefore etc.

It must be said that sin sometimes names an action deprived of some due circumstance; sometimes it names a debt with the privation of the good to which it is ordered; sometimes it names the privation of good itself. In the first way it is something; in the second way it is something in a qualified sense; in the third way it is altogether nothing. Therefore insofar as it involves a good substrate, by reason of that it is from God, but by reason of its deformity, it is not. As to the objection that sin acts: this is through the nature of the underlying good, as Dionysius says.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
