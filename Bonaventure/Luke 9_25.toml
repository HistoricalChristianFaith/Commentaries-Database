[[commentary]]
quote='''
And therefore in its amplification he adds: For what does it profit a man if he gain the whole world, and this temporally, but lose himself and suffer the loss of himself? and this eternally: as if to say: nothing, because he who loses himself loses all things, and therefore it does not profit but harms. Hence James 5: "Come now, you rich, weep and howl in your miseries which shall come upon you." And the reason for this is that, as Augustine says in his sermon on the Innocents, "no one has unjust gain without just loss; gain in the chest, loss in conscience; he took a garment and lost faith; he acquires money and loses justice," and thus consequently his own soul. Hence Isidore: "If you had the wisdom of Solomon, the beauty of Absalom, the strength of Samson, the longevity of Enoch, the riches and power of Octavian — what does it profit you, if at last the flesh is given to worms, and the soul to demons, to be tormented without end with the rich man?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Commentary on Luke, Chapter 9'
