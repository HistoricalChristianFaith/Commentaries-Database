[[commentary]]
quote='''
"This is he of whom I said" to you. Here the comparison to the preceding testimony is touched upon. Whence he repeats the testimony which he had given in his absence; therefore he says: "This is he of whom I said," namely in the preceding testimony: "after me comes a man," namely by temporal birth, because he was born six months after him. Concerning this man, Jeremiah thirty-one: "The Lord will create a new thing upon the earth: a woman shall encompass a man." "Who was made before me," namely in dignity, "because he was before me," in Divinity: above in the same: "In the beginning was the Word."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
