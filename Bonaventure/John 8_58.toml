[[commentary]]
quote='''
"Jesus therefore said to them: Amen, amen, I say to you," that is, I assert in truth: "before Abraham was made," as a creature is brought into being, "I am." He does not say: "I was made," because his being did not begin; he does not say: "I was," because his being does not pass into the past. Therefore it is said in Exodus three: "I am who I am," because his being is uncreated and intransible; whence Gregory: "The Divinity has no past tense, but always has being; therefore he rightly says: I am, not I was"; Ecclesiasticus twenty-four: "I came forth from the mouth of the Most High, the firstborn before every creature."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
