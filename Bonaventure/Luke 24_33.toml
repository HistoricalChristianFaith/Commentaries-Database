[[commentary]]
quote='''
And rising up the same hour, etc. After the described revelation of the resurrection and the apparition of the one rising, in this part he describes the certainty of the apparition. Now this part is divided into three. In the first of which is set forth the plurality of apparitions as testimony; in the second, the probability of the apparition as argument, at the place: Why are you troubled? in the third, the infallibility of the apparition as a foundation of faith, at the place: And he said to them: These are the words. Concerning the indication of the plurality of apparitions, two things are introduced, namely the narration of the special apparition of Christ and the common one, in which he appeared to all the disciples.

First therefore, as regards the special apparition, he says: And rising up the same hour, they returned to Jerusalem, to announce what they had seen, according to that passage of 4 Kings 7: "This is a day of good tidings; if we remain silent and do not wish to announce it until morning, we shall be charged with wickedness." From which the fervor of the disciples is apparent, because, since it was already night, as was evident from the preceding, neither the length of the journey nor the darkness of the night held them back; for so great was their love for the apostolic college which was in Jerusalem.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
