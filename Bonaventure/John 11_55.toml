[[commentary]]
quote='''
Now the Passover was near. Here the fourth point is touched upon, namely the seeking of the hidden Christ, which was done by those who had gone up for the feast day, because Christ was accustomed to go up on feast days. Therefore he says: Now the Passover was near, the feast day of the Jews. By antonomasia, the Passover is called the feast day, which was celebrated in the first month, namely April; Exodus 12: "This month shall be to you the beginning of months; it shall be the first in the months of the year. On the tenth day of this month let every man take a lamb according to their families and houses," etc. And many went up to Jerusalem from the country before the Passover, that is, before the feast day. And the reason is added: that they might sanctify themselves, because no one who was unclean dared to eat the Passover; Numbers 9: "A man who is unclean by reason of a dead person, or on a journey, let him keep the Passover in the second month"; below in chapter 18: "That they might not be defiled, but might eat the Passover." These came to cleanse themselves outwardly, but to defile themselves inwardly through willful murder.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
