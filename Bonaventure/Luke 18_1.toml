[[commentary]]
quote='''
On the persuasion to devotion, two things are presented.

And he spoke also a parable to them etc. After the refutation of Jewish curiosity in scrutinizing future things, there follows here the persuasion to devotion in requesting divine assistance. And since devoted prayer is prayer pleasing to God, in which there is at once fervor of affection and humility of self-assessment, therefore this part has two sections: in the first of which, by a parabolic example, he leads to persistence in prayer; in the second, however, to reverence in prayer, at the passage: And he said to certain ones etc.

To the persistence of prayer, therefore, He moves them by introducing the parable of the judge and the widow: concerning the description of which, first is introduced the reason for introducing the parable; second is added the introduction of the parable itself, at the words: There was a certain judge; third, He subjoins the application of the parable introduced, at the words: And the Lord said.

First, therefore, as to the reason for introducing the parable, He says: And He spoke also a parable to them. Now it should be noted that this parable is not to be understood through a metaphor of likeness, because the judge of the city was in no way likened to God, who is to be entreated; but rather it is to be understood through unlikeness and by way of contrast, so that the Lord, as it were, from the lesser leads by the hand to recognizing the efficacy of prayer; hence here person is not compared to person, but case to case. And this is what Bede says in the Gloss: "Note that the Lord sets forth parables either according to likeness, as about the man who had two sons, who bears the person of God; or according to unlikeness, as about the unjust judge, who in no way bears the person of God." — He therefore introduces this parable to persuade them of the persistence of prayer; for which reason He adds: That they ought always to pray and not to lose heart; which ought to be understood so that always does not distribute for every part of time, but for the appointed hours, according to what is said in the Psalm following the prophetic institution: "Seven times a day I have given praise to You." And the Church observes this manner; hence the Gloss: "Always, at the canonical hours daily according to the custom of the Church." — Or always to pray is here understood such that prayer is always either in the mouth through petition, or in the heart through desire, or in works through preparation. For he who does good things disposes himself to this end, that his prayer ought to be heard; and according to this it is said in First Thessalonians 5: "Pray without ceasing"; there the Gloss says: "He always prays who always does good; for the good desire itself is prayer; and if the desire is continuous, the prayer is continuous." And this is what Bede says here in the Gloss: "He always prays who always does good, nor does he cease to pray unless he ceases to be just"; therefore Sirach 18: "Be not hindered from praying always, and be not afraid to be justified even unto death"; and 29: "Shut up alms in the bosom of the poor, and it shall pray for you," etc. This, however, is understood concerning the opportunity of necessity. But if it is understood concerning the opportunity of fittingness, then one ought always to pray, that is, to have recourse to prayer most frequently and most urgently. Hence Jerome: "Frequent prayer extinguishes the assault of vices"; while urgent prayer obtains pardon for sins, according to that saying in Sirach 3: "He who loves God shall entreat for his sins, and in the prayer of days he shall be heard," etc.

And therefore it is useful to pray always for ten reasons, namely because it obtains the relaxation of the divine sentence, as is apparent in the case of Hezekiah, Isaiah thirty-eight: "Hezekiah prayed to the Lord and said: I beseech you, Lord, remember, I ask, how I have walked before you"; and afterward it is added that the Lord revoked the sentence of death; and Wisdom eighteen: "A blameless man hastened to pray for the peoples, bringing forth the shield of his ministry, prayer, and alleging supplication through incense, he withstood the wrath."

The remission of guilt committed: Matthew seventeen: "This kind of demon is not cast out except by prayer and fasting"; upon which passage Jerome says: "By fasting the plagues of the body are healed, by prayer the plagues of the mind"; the Psalm: "I said: I will confess against myself my injustice to the Lord, and you forgave the impiety of my sin"; and afterward: "For this shall every holy one pray to you," etc.

The repulsion of spiritual combat: Matthew twenty-six: "Watch and pray, that you enter not into temptation"; and 1 Maccabees four: "Those who were with Judas sounded the trumpet, and the nations were crushed and fled," etc. — The restoration of the power of nature: James five: "The prayer of faith shall save the sick and shall raise him up," etc.; and Sirach thirty-eight: "My son, in your sickness do not despise yourself, but pray to the Lord, and he himself will heal you."

The preservation of peace in time; 1 Timothy two: "I beseech that first of all supplications, prayers, petitions, and thanksgivings be made, that we may lead a quiet and tranquil life in all piety and chastity," etc.

The guarding of tranquility of conscience; Philippians four: "Be anxious for nothing, but in every prayer and supplication let your petitions be made known before God. And the peace of God, which surpasses all understanding, shall guard," etc. — The enkindling of divine grace: as a figure of which it is said of Elijah in 3 Kings eighteen: "I will invoke the name of my Lord, and the God who shall answer by fire, let him be God." Whence in Acts one it is said that "they were persevering unanimously in prayer"; and afterward: "When the days of Pentecost were completed, there appeared to them parted tongues," etc. — The illumination of heavenly wisdom: an example of which is found in Solomon in 3 Kings three, where it is said that he prayed and sought wisdom, which he also obtained; and James one: "If any of you lacks wisdom, let him ask of God, who gives to all abundantly."

The opening of the heavenly gate, which by the power of prayer is closed to the wicked and opened to the good: James five: "Elijah was a man like us, subject to suffering, and he prayed in prayer that it would not rain upon the earth, and it did not rain for three years and six months. And again he prayed, and the heavens gave rain."

The acquisition of eternal reward: Matthew 6: "But you, when you pray, enter into your chamber, and having shut the door, pray to your Father in secret, and your Father, who sees in secret, will reward you"; Psalm: "For you, my God, have heard my prayer; you have given an inheritance to those who fear your name"; and Ecclesiasticus, last chapter: "I will praise the name of the Lord continually and will praise it in confession, and my prayer was heard."

Now in figure of these ten efficacies, the sun is read to have gone back ten degrees at the prayer of Hezekiah, in Fourth Kings 20. From which it is gathered that prayer prevails over lower nature, prevails over the power of heaven, commands spiritual nature, draws the Holy Spirit, inclines the Son of God, and appeases the eternal Father, and through this in a certain way has dominion with respect to all things.
'''
