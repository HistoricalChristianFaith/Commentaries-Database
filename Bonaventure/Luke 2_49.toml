[[commentary]]
quote='''
And note that he responds to the question humbly and wisely: whence it is added: And he said to them: Why is it that you sought me? As if I were absent, when I was present to you: Jeremiah 23: "I fill heaven and earth"; and this showed that he was the Son of the eternal Father. Whence he adds: Did you not know that I must be about the things that are my Father's? John 6: "I came down from heaven, not to do my own will, but the will of him who sent me." Whence you ought not to wonder if I left you on account of the eternal Father, because thus it is said in Acts 5: "It is necessary to obey God rather than men."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
