[[commentary]]
quote='''
Here the humiliation of those who despise and are proud is touched upon: for they did not wish to believe in Christ through the signs which they had seen, as if their fathers had seen greater signs. Therefore they say: "What sign therefore do you perform, that we may see and believe you?" For the Hebrews do not believe unless they see signs: 1 Corinthians 1: "Jews seek signs." "What do you work?" As if they were saying: what great thing have you done? What you have done is little in comparison to what was done in the desert.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
