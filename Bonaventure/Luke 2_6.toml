[[commentary]]
quote='''
Now it came to pass, when they were there etc. He has described above the nativity of Christ as to the fitting time and suitable place; here thirdly he describes it as to the birth, which he describes as to three things, namely as to the opportune time for giving birth, the novelty of the birth and the poverty of the one giving birth: from which the origin of Christ is shown to be admirable, inimitable, and commendable.

First, therefore, he intimates the opportune time for giving birth, when he says: It came to pass, when they were there, the days were accomplished of Mary, that she should give birth, in accordance with what was said above of her kinswoman, in the preceding chapter: "For Elizabeth the time of giving birth was fulfilled." Truly fulfilled, because in the fullness of time Christ was conceived and born: Galatians 4: "But when the fullness of time had come, God sent his Son, made of a woman"; Psalm: "Full days shall be found in them."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Commentary on Luke, Chapter 2'
