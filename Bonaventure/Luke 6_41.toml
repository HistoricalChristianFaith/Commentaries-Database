[[commentary]]
quote='''
But why do you see the mote, etc. Here he calls back from the rashness of judging, which indeed he does by showing that he who judges rashly is unjust in thought, indiscreet in speech, disordered in action. He shows therefore first that the one who judges rashly is unjust in thought, because he does not judge equitably: on account of which he says: Why do you see the speck in your brother's eye? you, namely, who judge. He calls the speck a light sin, which one reproves in another while neglecting a great one in himself: with respect to which he adds: But the beam that is in your own eye, you do not consider? The beam, that is, a great sin: from which it is gathered that the judgment of one who judges thus is unjust, because, as it is said in Proverbs twenty, "diverse weights are an abomination before God." He does not have equal weight who weighs fault more heavily in another than in himself: and such a one is called abominable, because he sins doubly: both by justifying himself, who is proud and impious, and by condemning his neighbor: whence Proverbs seventeen: "Both he who justifies the wicked and he who condemns the just are abominable before God." And it is sound counsel to be lenient with others and to consider and judge oneself, according to that passage in Galatians six: "If a man be overtaken in any fault, you who are spiritual, instruct such a one in the spirit of meekness, considering yourself, lest you also be tempted," etc. "For he who thinks himself to be something, when he is nothing, deceives himself." And therefore such a one has a beam in his eye, that is, blinding pride, as Balaam, Numbers twenty-four: "The man said, whose eye is closed"; whose obstruction is very grave in judging unjustly: Ecclesiasticus thirty-one: "What created thing is more wicked than the eye?" And rightly so, because, as it is said below in chapter eleven, "if your eye be evil, your whole body will be dark."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
