[[commentary]]
quote='''
Secondly, as regards the consideration of the man who is saved, he adds: Because this my son was dead, through sin, which makes men dead: Psalm: "The dead shall not praise you, O Lord"; and again John 8: "You shall die in your sin." And has come back to life, through repentance: Ephesians 5: "Rise, you who sleep, and arise from the dead, and Christ shall enlighten you"; and Psalm: "You shall take away their spirit, and they shall fail." "Send forth your spirit," etc. Was lost, through the loss of justice: Romans 2: "Those who have sinned without the Law shall perish without the Law"; and Second Peter 2: "They shall perish in their corruption, receiving the wages of their injustice." And is found, through the recovery of grace, according to that saying in Job 33: "I have found that whereby I may be merciful to him." And the Lord does this when he pours his grace into the soul: Psalm: "I have found David my servant; with my holy oil I have anointed him."

And because all ought to rejoice at this, therefore he adds: And they all began to eat and feast. Bede: "Not only is the son refreshed, for whom the calf was killed, but also the father and his servants, because the refreshment of God and the Saints is the salvation of sinners." As a figure of this it is said in Deuteronomy 16: "You shall feast at your festival, you and your son and your daughter and your servant and your handmaid, and also the Levite, the stranger and the orphan and the widow who are within your gates," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Commentary on Luke, Chapter 15'
