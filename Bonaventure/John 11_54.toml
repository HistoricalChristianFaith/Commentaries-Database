[[commentary]]
quote='''
Jesus therefore no longer walked openly. Here the third point is touched upon, namely the concealment of Christ. He conceals himself, that is, he withdraws, not from fear, but for our instruction: not to flee death, but that the fitting time might come; whence he says: Jesus therefore no longer walked openly among the Jews, but went into a region near the desert, seeking more secluded places according to a human manner, into a city called Ephrem, and there he stayed with his disciples. On this, Augustine says: "It is apparent that it is not a sin if the faithful, who are members of Christ, withdraw themselves from the eyes of their persecutors and avoid the fury of the wicked by hiding rather than inflame them further by presenting themselves." He fled the Jews and remained with his disciples; above in chapter 10: "The sheep follow him and hear his voice."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
