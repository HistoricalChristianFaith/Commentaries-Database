[[commentary]]
quote='''
Before the incarnation, both penitential compunction and matrimonial generation were necessary: therefore Christ did not institute these two Sacraments anew, but brought to completion and confirmed in the evangelical law what had already been instituted by him and in a certain way impressed upon the dictate of nature, when he preached penance and attended the wedding and approved the law of marriage, as is gathered from various passages of the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FBreviloquium%2FPart%25206.html'
source_title="Breviloquium, Part 6"

[[commentary]]
quote='''
And Jesus also was invited, and his disciples, to the marriage. Chrysostom: "He was invited to the marriage, not as someone great, but as a kinsman, and he, being humble, did not refuse the invitation, but went," according to what he teaches in Luke 14: "When you are invited to a wedding, go, recline in the last place."

It is asked whose wedding it was. And that it was John's is said in the Prologue above, and Augustine likewise said in the Gloss on the beginning. But against this, Victor objects: "Since virginity is the meditation upon perpetual incorruption, it is not to be believed that John, to whom testimony of virginity is given, ever consented to an act of the flesh."

To this it must be responded that because greater authority concurs on this point, it should be held that it was John's wedding. And a sign of this can be gathered from the text: because John was a kinsman of the Lord, and for this reason he and his Mother were invited to the wedding.

Therefore what Victor objects is resolved in two ways: in one way, that he did not consent to an act of the flesh or to carnal union absolutely, but, like the Virgin Mary, he committed himself to the disposition of the Holy Spirit, so that thus the virgin, who was to be the guardian of the Virgin, might agree with the Virgin in the manner of virginity.

Alternatively it is answered that, granted that he consented absolutely, his virtue was not diminished, because he consented licitly; similarly the dignity of virginity was not diminished, because, since virginity denotes the incorruption of mind and flesh, it can be lost in three ways: either the incorruption of both is lost, and then it is lost eternally and temporally; or the incorruption of the mind alone is lost, and then it is lost recoverably; or the incorruption of the body alone, and then it is lost temporally but not eternally, because such a one will have the glory of virginity; but nevertheless, as Pope Leo says, such persons ought not to count themselves among the sacred virgins. Since therefore John remained incorrupt in the flesh, even if his mind consented, he afterward returned to the same state.

It is also asked why the Lord willed to go to the wedding. And it seems that He ought not to have done so. For if the place of a wedding is a place of feasting, and the Lord Himself ought to have fled all feasting, then He ought not to have gone there.

I respond: It must be said that He went in order to establish faith and to uproot heresy. He confirmed the faith of the disciples who had been called through the miracle, and He also gained the faith of the bridegroom. He uprooted heresy, namely that of Julian, who condemns marriage. Against which the Lord willed to be present and to confirm and approve marriage by a miracle. But if the Lord, having been invited, had refused to go, then He would have seemed to have favored that heresy and to have condemned marriage.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'

[[commentary]]
quote='''
That conjugal chastity is to be approved according to the evangelical law is shown by authority, as follows. John 2: Jesus and his disciples were called to the wedding: and consequently he shows that he performed his first miracle there; but if the nuptial act were not consonant with the law of God, Christ would not have approved it by his own presence: therefore conjugal chastity accords with divine law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25203.html'
source_title='Disputed Questions on Evangelical Perfection, Question 3'
