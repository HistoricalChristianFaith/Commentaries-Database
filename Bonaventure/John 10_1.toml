[[commentary]]
quote='''
The Son of God shows himself as light and guide by the example of a good life. The Lord manifested above that he is a guide by the word of wisdom and by the miracle of power; here he manifests it by the example of a good life. For by the first two modes he directed as a teacher, but here in the third he directs as a pastor. In this chapter, therefore, the Lord intends to show himself as the true and good shepherd: and it is divided into two parts: because first the Lord demonstrates the good shepherd in a proverb and parable; second, he expounds the proverb and applies it to himself, so that through this he may show himself the true shepherd, at the passage: "Jesus therefore said to them again."

The first part demonstrates the good shepherd in a parable. He therefore describes the good shepherd in the proverb in this order: for first he determines the entrance of the good and true shepherd; second, the sign; third, the office of the good shepherd; fourth, he says that this proverb was hidden from the Jews.

He determines the entrance of the good and true shepherd by comparison with its opposite, because "opposites placed next to each other shine forth more clearly"; and the entrance of the shepherd is through the door, but that of the thief through another place. Therefore he says: "Amen, amen, I say to you" — the Lord continues his discourse, speaking to the Pharisees — "He who does not enter through the door into the sheepfold," that is, into the Church of God, in which the Lord's flock is contained, "but climbs up from elsewhere," as one proud and ambitious; "he is a thief and a robber: a thief," because he claims what belongs to another as his own; "a robber," because he destroys and kills the goods of another. Concerning this ascent of the bad shepherd, Jerome says: "We rejoice at the ascent; let us fear the descent: the joy of having held the heights is not so great as the sorrow of having fallen from the heights." Thus ascended that prince of robbers and the ambitious, of whom it is said in Isaiah fourteen: "I will ascend into heaven; I will exalt my throne above the stars of heaven." He who thus enters in a disordered manner is a thief and not a shepherd.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'

[[commentary]]
quote='''
The figure of the six seraphic wings intimates six stairlike illuminations, which begin from creatures and lead all the way to God, to whom no one rightly enters except through the Crucified. For he who does not enter through the door but climbs up another way, that one is a thief and a robber. If anyone indeed through this door enters, he shall go in and go out and shall find pasture.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FItinerarium%2520Mentis%2520in%2520Deum%2FProoemium.html'
source_title='Itinerarium Mentis in Deum, Prologue'
