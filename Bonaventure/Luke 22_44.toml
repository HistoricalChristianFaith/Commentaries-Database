[[commentary]]
quote='''
Sixth, as to the anxiety of prayer, it is added: And his sweat became like drops of blood falling down upon the ground. From which it is apparent that with wondrous sighs and cries of the heart and anxious desires he was crying out to God, according to that verse of the Psalm: "O Lord, God of my salvation, I have cried day and night before you." Moreover, the blood was flowing down upon the ground to show that he was praying for the Church and desired to pour out his blood for her; Job 16: "O earth, do not cover my blood, nor let my cry find in you a place to hide."

Now it should be noted that the Lord poured out his blood for us in circumcision, prayer, flagellation, coronation, crucifixion of hands and feet, and the opening of his side, so that that verse of the Psalm might appear true: "With the Lord there is mercy, and with him plentiful redemption." Whence that verse of Isaiah 63 was verified: "Why then is your garment red, and your vestments like those of them that tread in the winepress?" Truly red was that most sacred body, which was so many times reddened for us with sacred blood. This blood intercedes for us, according to that verse of Hebrews 12: "You have come to Jesus, the mediator of the new covenant, and to the sprinkling of blood that speaks better than Abel"; because the blood of Abel cried out for vengeance, according to that verse of Genesis 4: "The voice of the blood of your brother Abel cries to me from the ground"; but this blood cried out for remission; Matthew 26: "This is my blood, which shall be shed for many unto the remission of sins."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
