[[commentary]]
quote='''
Here is introduced the question proceeding from the twofold purification, which had its origin from the disciples of John accusing the Jews that, having abandoned John's baptism, they were going to Christ. On account of which he says: "Therefore a question arose from the disciples of John," as drawing its origin from them, "with the Jews" who were contradicting, namely "concerning purification," namely, where the greater purification was, whether in the baptism of John or of Christ. And the disciples of John were saying that the baptism of John was greater, the Jews to the contrary. On account of this, seeing that they could not prevail, they accuse Christ himself through envy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
