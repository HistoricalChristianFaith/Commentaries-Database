[[commentary]]
quote='''
Third, there is added a commendable instruction, when he says: See therefore that the light which is in you be not darkness, that is, lest the intention by which you ought to be light be obscured by the darkness of vices. He speaks, moreover, to those converted to himself, of whom the Apostle says in Ephesians 5: "You were once darkness, but now light in the Lord: walk as children of light," that you may be children of that light "which enlightens every man coming into this world," John 1: not children of man, of whom John 3 says: "The light came into the world, and men loved darkness rather than light, for their works were evil." Since, therefore, a depraved intention corrupts the whole work, he teaches that it must above all be guarded against, when he says: See etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Commentary on Luke, Chapter 11'
