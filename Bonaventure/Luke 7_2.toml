[[commentary]]
quote='''
As to the urgency of the illness, it is added: A certain centurion's servant, being gravely ill, was about to die: and thus he had a grave illness, according to that passage in Matthew eight: "My servant lies at home paralyzed and is grievously tormented." Now he calls him a centurion who was in charge of a hundred soldiers, which they did deliberately in battles so that they might easily know the number of warriors; whence there were tribunes, centurions, commanders of fifty, and commanders of ten, who are named from the number of those over whom they preside; a tribune, however, is said to be one who presides over a thousand. And Moses was counseled to appoint these for the governance of the people; Exodus eighteen: "Appoint from among them tribunes, centurions, commanders of fifty, and commanders of ten, who shall judge the people."

This centurion, although he had many servants, held this one dear among the others, and therefore it adds: Who was precious to him, that is, affectionately beloved, according to that passage in Sirach thirty-three: "If you have a faithful servant, let him be to you as your own soul"; because, according to that passage in Proverbs seventeen, "a wise servant shall rule over foolish sons." Whence this servant, although he was sick, was nevertheless not burdensome to his master, but dear on account of his master's piety; Proverbs twelve: "The just man knows the souls of his beasts," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25207.html'
source_title='Commentary on Luke, Chapter 7'
