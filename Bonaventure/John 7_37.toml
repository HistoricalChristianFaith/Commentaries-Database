[[commentary]]
quote='''
Here the invitation to faith is set forth, by whose merit wisdom and understanding are given. Therefore he says: "On the last day of the great feast" — this was the eighth and final day, which was solemn — "Jesus stood and cried out." "He stood," through immutability: Malachi 3: "I am the Lord and I do not change"; "he cried out," through charity: Psalm: "I have labored crying out," in order to rouse them to come: "Let him come and drink," according to my bounty. "If anyone thirsts, let him come and drink:" Isaiah 55: "All you who thirst, come to the waters; come, buy without money and without any exchange, wine and milk." And the manner of coming is described, because it is through faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
