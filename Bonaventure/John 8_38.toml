[[commentary]]
quote='''
"I speak what I have seen with my Father," imitating him: Ephesians 5: "Be imitators of God as most beloved children." "And you do what you have seen with your father"; whence you have a father by imitation. Just as these had a twofold father: according to the flesh and imitation: so Abraham had two kinds of children; Romans 9: "Not all who are the seed of Abraham are children, but those who are the children of the promise."

But here a question is raised about what is said in the text: "You do what you have seen with your father." For they had never seen the devil. And moreover, could they not also sin by themselves?

Response: It must be said that although man can have knowledge of sin by himself, there are nevertheless few or no sins in which the devil does not interpose his part by suggesting. And they are said to see the works of their father the devil when they see his suggestions in their heart and fulfill them in deed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25208.html'
source_title='Commentary on John, Chapter 8'
