[[commentary]]
quote='''
And this offering was according to the custom of clemency, but the perversity of the Jews refuses this in regard to Christ; and therefore he adds: But the whole crowd cried out together, saying: Away with this man, and release to us Barabbas. Now the crowd sought this at the suggestion of the chief priests and scribes; whence Mark 15: "But the chief priests stirred up the crowd, that he should rather release Barabbas to them." And in this their cruelty is apparent, because they preferred a most impious murderer to the most merciful Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
