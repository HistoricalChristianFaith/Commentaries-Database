[[commentary]]
quote='''
"For as the Father raises the dead and gives life," through omnipotent power: so "the Son also gives life to whom He wills," through power equal to Him: below in chapter 11 is found the raising of Lazarus in body, and concerning the raising in soul it is said: "I am the resurrection and the life: he who believes in Me, even if he has died, shall live." An example of bodily raising is found likewise in Luke 7.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
