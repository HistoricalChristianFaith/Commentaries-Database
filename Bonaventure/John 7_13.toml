[[commentary]]
quote='''
"Yet no one spoke openly about him for fear of the Jews." For as is said below in chapter nine: "The Jews had conspired that if anyone confessed him to be the Christ, he would be put out of the Synagogue." Therefore they feared; against which Matthew chapter ten: "Do not fear those who kill the body but cannot kill the soul; but rather fear him who can destroy both soul and body in hell."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
