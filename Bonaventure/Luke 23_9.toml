[[commentary]]
quote='''
And because curiosity is most vigorous concerning sight and hearing, according to that text of Ecclesiastes one: "The eye is not satisfied with seeing, nor is the ear filled with hearing"; therefore he adds: And he questioned him with many words: he questioned, I say, not as one studious, but as one curious; not as a lover, but as a tempter, according to that text of Sirach thirteen: "By much talk he will tempt you, and smiling he will question you about your secrets." — And because such a person does not deserve to hear the truth, therefore it is added: But he answered him nothing. Now Christ was silent as an example of prudence; Proverbs twenty-six: "Answer not a fool according to his folly." Moreover it is just that divine things be hidden from the unworthy; whence the Gloss: "He was silent, because Herod's unbelief did not deserve to hear divine things, and the Lord was avoiding vainglory"; Matthew seven: "Do not give what is holy to dogs, nor cast your pearls before swine."

Likewise, as an example of patience: Job thirty-one: "If I trembled before a great multitude, and the contempt of kinsmen terrified me, and I did not rather keep silent"; upon which Gregory says: "The good do not reveal their own things even when despised, when it does not benefit others; for that would be to display oneself, not to be of use, just as Jesus was silent before Herod who was not seeking improvement, and thereby suffered himself to be mocked."

Likewise, of innocence: whence the Gloss says: "Better is the cause which is not defended and yet is proved. Susannah was silent and prevailed," as is said in Daniel thirteen.

Likewise, as an example of confidence: Exodus fourteen: "You shall be silent, and the Lord will fight for you."

As an example of obedience: Isaiah fifty-three: "As a lamb before its shearer he shall be silent."

As an example of perseverance: whence the Gloss says: "Those who fear being conquered seek to be defended; nor does he confirm the accuser by being silent, but despises him by not refuting him"; whence Lamentations three: "From the mouth of the Most High shall proceed neither evil nor good."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Commentary on Luke, Chapter 23'
