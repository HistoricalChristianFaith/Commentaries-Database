[[commentary]]
quote='''
The third motive is the trophy of the resurrection, which he touches upon when he says: And he raised up a horn of salvation for us in the house of David, his servant: in which is understood the power of Christ rising: 1 Kings 2: "The Lord will give dominion to his king and will exalt the horn of his Christ." And this was in the resurrection: Matthew, last chapter: "All power has been given to me in heaven and on earth." And because that power was enduring, therefore it is signified by a horn; as a figure of this, the vessel with which Solomon was anointed was a horn, 3 Kings 1; the vessel with which Saul was anointed was a flask, that is, a fragile vessel, 1 Kings 10. And it is said: Horn of salvation, because through it "Israel was saved with an eternal salvation," Isaiah 45. — And he adds: In the house of David, his servant: according to that of the Psalm: "There I will make a horn spring forth for David; I have prepared a lamp for my Christ"; and 2 Kings 22: "My shield and the horn of my salvation, my lifter and my protector; from my iniquity you will free me." This, however, is said on account of the incarnation; below in chapter 2 it is said that Joseph and Mary were "of the family of David."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
