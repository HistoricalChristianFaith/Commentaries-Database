[[commentary]]
quote='''
Simon Peter says to him. Here the fourth point is touched upon, namely Peter's obedience, after the threat was made to him. Hence above he was called Peter: "Peter says to him"; but in this response it says: "Simon Peter says to him," that is, obedient, fervent, because he offers more than the Lord commands: hence he says: Lord, not only my feet, as you command, wash, but also my hands and my head. Hence Simon Peter, truly obedient, could say that word of the Psalm: "My heart is ready, O God, my heart is ready." But because above he erred in reverence, and now indeed he exceeded in obedience: therefore Peter above was terrified, but now Simon is instructed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252013.html'
source_title='Commentary on John, Chapter 13'
