[[commentary]]
quote='''
When grace, justice, and wisdom have been perfectly attained, one ascends to the summit of evangelical perfection, which Christ Jesus taught by word and example, who specially professed himself the master of humility, in Matthew 11: Learn from me, etc. For humility is the gateway of wisdom, the foundation of justice, and the dwelling place of grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25201.html'
source_title='Disputed Questions on Evangelical Perfection, Question 1'
