[[commentary]]
quote='''
Such a Center has a saving power: and anyone who draws away from it is condemned, as drawing away from the means of humility. And in Matthew: "Unless you turn and become like little children, you will not enter into the kingdom of heaven." In this center "He has wrought salvation," that is, in the humility of the cross.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
First, by the authority of Christ himself, who says in Matthew 18: Unless you be converted and become as little children, you shall not enter the kingdom of heaven; but to make oneself little is nothing other than to become vile in one's own eyes and to wish to be regarded as vile by others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FQuaestiones%2520Disputatae%2FDe%2520Perfectione%2520Evangelica%2FQuestion%25201.html'
source_title='Disputed Questions on Evangelical Perfection, Question 1'
