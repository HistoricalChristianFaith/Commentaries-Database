[[commentary]]
quote='''
"He was in the world," by effect: whence "the world was made through him," through whom he could be known; Wisdom 13: "From the greatness of the beauty and of the creature, the Creator of these could be knowably seen." And yet "the world knew him not": "the world," that is, worldly people — this is a metonymy: below in chapter seventeen: "Just Father, the world has not known you." This is the reason why he came: whence Chrysostom says: "Because being in the world, he was not thought to be present, since he was not yet known: he deigned to put on flesh."

It is asked concerning what he says: "He came unto his own." For if coming belongs to him to whom being absent belongs: and God is nowhere absent: therefore he did not come. Likewise, if God can do all things everywhere, then he does not need to come for any reason: therefore if he had not come, he could have done the same. To this Bede responds: "He was in the world through his Divinity, he came into the world through the incarnation. To come or to go away indeed belongs to humanity: but to remain belongs to Divinity"; whence the meaning is: "He came," that is, he appeared visibly. As to what you ask: what was the necessity of coming? Not for his own sake, but for ours; and this the Evangelist well suggests: because the world did not know his sublimity, he appeared in humility and humanity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
