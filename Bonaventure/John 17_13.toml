[[commentary]]
quote='''
But now I come to you, and I leave them, and therefore I pray, that they themselves may conceive confidence from my prayer; therefore he says: These things I speak in the world, that is, I make this prayer while they themselves are listening, that they may have my joy fulfilled in themselves, so that they may not be troubled by distrust, but may rejoice in themselves through the hope of being heard, according to that passage above in the sixteenth chapter: "Ask, and you shall receive, that your joy may be full." Therefore he himself was asking, so that they might conceive full joy. This therefore is the first necessity, namely the absence of the preserver; but the other is the immersion in tribulation, which on this account was about to rush upon them because of their observance of the divine word, on account of which the world held them in hatred.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
