[[commentary]]
quote='''
The chief priests of the Jews therefore said to Pilate. Here is noted the contradiction of the Jews, by which they wanted to erase the title, since it was to their disgrace; whence they say: Do not write: King of the Jews, but that he said: I am King of the Jews, so that, namely, there would be shown not dignity but presumption, by which he would claim to be king: against which it is said in Hebrews five: "Christ did not glorify himself to be made a high priest," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title='Commentary on John, Chapter 19'
