[[commentary]]
quote='''
"Now he had to pass through the midst of Samaria." And thus the opportunity of the place for passing through was at hand: Luke 17: "As Jesus was going to Jerusalem, he passed through the midst of Samaria." As he passed through, so he had to return.

It is asked: since the Lord commands his disciples not to enter the cities of the Samaritans nor to go into the way of the Gentiles, Matthew 10, and also says in Matthew 15: "I was not sent except to the lost sheep of the house of Israel:" whence is it that the Lord now preaches to the Samaritans? For he seems to contradict his own precept, and thereby to give a bad example. It must be said that the Lord prohibited this to his disciples not because it was evil, but lest he scandalize the Jews, to whom he had first come. Therefore he commanded that they should not go to them by principal intention, whence neither did the Lord thrust himself upon them. But because he wills all men to be saved, and the opportunity presented itself, and the woman came to him: therefore he opened the word of preaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25204.html'
source_title='Commentary on John, Chapter 4'
