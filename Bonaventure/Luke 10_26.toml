[[commentary]]
quote='''
Second, regarding the discovery of the truth sought, he adds: But he said to him: What is written in the Law? How do you read? From this it is apparent that the Master of truth was a friend of the Law, according to Matthew five: "Do you think that I have come to abolish the Law or the Prophets? I have not come to abolish, but to fulfill." In this word, the Savior wins the good will of the lawyer in this, that he shows himself to be in agreement with him in love of the Law; he also arouses attention, since he directs him to the Law as to an authoritative scripture; he also prepares docility, since he grants the way to finding the truth, and this indeed is done by reading the divine law. Hence in John five he said to the lawyers: "Search the Scriptures, in which you think you have eternal life." For this is the way of coming to truth and through truth to life. Hence Baruch four: "This is the book of the commandments of God and the law that is forever: all who hold fast to it will attain to life; but those who have abandoned it, to death. Turn back, O Jacob, and lay hold of it," etc.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Commentary on Luke, Chapter 10'
