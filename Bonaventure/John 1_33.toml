[[commentary]]
quote='''
Christ was such a Center in His incarnation. Hence, it is written in John: "In the midst of you there has stood One whom you do not know." And later: "He who sent me to baptize with water said to me, 'He upon whom thou wilt see the Spirit descending, and abiding upon Him, He it is who baptizes with the Holy Spirit.'"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25201.html'
source_title='Collations on the Hexaemeron, Collation 1'

[[commentary]]
quote='''
"And I knew him not" before, but by this sign I knew him, because it was given to me by God; therefore he adds: "But he who sent me to baptize in water," namely God; above, in the same chapter: "There was a man sent from God." "He," I say, "said to me: Upon whom you shall see the Spirit descending and remaining upon him, he it is who baptizes in the Holy Spirit," because baptism is given in his name alone and by his power: Acts 2: "Let each one of you be baptized in the name of Christ." The sign of this was the descent and abiding of the Holy Spirit; whence Bede: "In the Mediator alone the Spirit remained perpetually; because from that time when he began to become man, he was conceived by his ministry and operation." Therefore by this sign he was certified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25201.html'
source_title='Commentary on John, Chapter 1'
