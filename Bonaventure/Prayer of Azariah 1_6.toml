[[commentary]]
quote='''
Transgressors of the commandments plunge into abominable crimes. This was well signified in the third chapter of Daniel, where it is said that the three youths standing in the furnace of fire said: "We have sinned and acted wickedly and transgressed; and we have been delivered into the hands of our enemies, wicked and most vile transgressors, and to a king unjust and most wicked beyond all the earth." For the Lord delivers such transgressors into the hands of demons.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollationes%2520de%2520Decem%2520Praeceptis%2FCollation%25201.html'
source_title="Collationes de Decem Praeceptis, Collation 1"
