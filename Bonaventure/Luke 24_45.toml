[[commentary]]
quote='''
The second key is the understanding of the Incarnate Word, through whom all things are restored. "These are the words which I spoke to you while I was yet with you, that all things must be fulfilled that are written in the Law of Moses and the Prophets and the Psalms concerning Me. Then He opened their minds, that they might understand the Scriptures." Who is speaking? The Word of God, of whom John writes: "The Word was made flesh, and dwelt among us," where He displayed two natures within a single Person. Hence: "Christ is the consummation of the Law unto justice for everyone who believes." The two Cherubim are the two Testaments whose gaze is directed upon Christ. He opened their minds when they understood the Scriptures, meaning that the book of Scriptures is understood precisely through that key, the Incarnate Word, the one eminently concerned with the works of restoration. For unless you understand the order and origin of restoration, you cannot understand Scriptures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25203.html'
source_title='Collations on the Hexaemeron, Collation 3'

[[commentary]]
quote='''
This is what incarnate Wisdom says: "I dwelt in the highest heavens," in the creation; "My throne is in a pillar of cloud," in the incarnation; "I have walked in the waves of the sea," in the passion; "I have penetrated into the bottom of the deep," in the penetration of Scriptures, for after He arose, "He opened their minds, that they might understand the Scriptures." By faith in the cross, Peter walked on the sea.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%252013.html'
source_title='Collations on the Hexaemeron, Collation 13'

[[commentary]]
quote='''
Second, with regard to the infused light of understanding, he adds: Then he opened their understanding, that they might understand the Scriptures: he, I say, opened, because he alone holds the key, according to that passage in Isaiah twenty-two: "I will give him the key of David, and he shall open, and none shall shut; and he shall shut, and none shall open." And therefore the Prophet asks in the Psalm: "Open my eyes, and I will consider the wondrous things of your law"; because, in Daniel two, "he reveals deep things and knows what is established in darkness, and the light is with him."

Now these deep mysteries in Scripture no one understands except through Christ crucified and raised up and proclaimed to the nations through the Holy Spirit, because the Scriptures are about him and for his sake, and therefore they are explained by him. Whence in the Apocalypse it is said that the Lion raised up and the Lamb slain opened the book: Apocalypse five: "The Lion of the tribe of Judah has conquered, who is worthy to open the book and to loose its seven seals. And I saw in the midst of the four living creatures and in the midst of the elders a Lamb standing as though slain." "And when he had opened the book, the four living creatures and the twenty-four elders fell down before the Lamb, and they sang a new song, saying: You are worthy, O Lord, to open the book and to loose its seals." And thus it is clear that he himself expounds the doctrine of the books of the Old and New Testament, that is, of the elders and the living creatures brought together.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
