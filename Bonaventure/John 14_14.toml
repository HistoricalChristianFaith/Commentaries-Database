[[commentary]]
quote='''
If you ask anything in my name, this I will do: and he does not repeat the name of the Father, to show that even if they ask from him himself, they obtain it, since he is equal to the Father; 1 John 3: "If our heart does not condemn us, we have confidence before God; and whatever we ask, we shall receive from him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252014.html'
source_title='Commentary on John, Chapter 14'
