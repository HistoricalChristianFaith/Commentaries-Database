[[commentary]]
quote='''
"The doorkeeper said to Peter." Here is described the second, namely the denial proceeding from weakness; and this is evident in this, that Peter denied the Lord at the voice of a maidservant. Therefore the inquiry of the maidservant is introduced: "Are you not also one of the disciples of this man?" She does not say "of the deceiver," but "of the man," as though speaking with compassion; but Peter, overcome by faintheartedness, denied; whence follows: "He said: I am not." Chrysostom: "What is this, Peter? Did you not say: I will lay down my life for you? above in the thirteenth chapter. What then has happened, that you cannot bear even the questioning of a doorkeeper?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252018.html'
source_title='Commentary on John, Chapter 18'
