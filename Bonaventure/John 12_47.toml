[[commentary]]
quote='''
And if anyone hears my words. Here the fourth point is touched upon, namely the threat made against non-believers: and at the same time in the threat he shows his benignity and the severity of judgment. Therefore he says: If anyone hears my words and does not keep them, I do not judge him, that is, I do not condemn him, and this on account of my benignity: For I did not come into the world to judge the world, but to save the world: above in chapter three: "God did not send his Son into the world to judge the world, but that the world might be saved through him"; Luke 9: "The Son of man did not come to destroy souls, but to save them." Nor however shall they escape the severity of judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title='Commentary on John, Chapter 12'
