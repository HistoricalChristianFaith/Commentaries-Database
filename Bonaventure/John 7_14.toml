[[commentary]]
quote='''
After the concealment has been treated, the discussion turns to the manifestation of our Teacher. "Now about the midst of the feast," and this was "the fourth day of the feast," as the Gloss says, which is the middle of the seven days: "Jesus went up into the temple and was teaching," in a public place, not a hidden one, lest his doctrine be suspect; below in the eighteenth chapter: "I always taught in the synagogue and in the temple, where all the Jews come together, and in secret I have said nothing."

But it is asked here: since the Lord went up to Jerusalem secretly in order to avoid the fury of the Jews, why is it that he teaches openly in the temple?

Augustine responds that "his hiding was a matter of example; that he speaks openly and is not seized is an indication of his power."

Alternatively, it can be said that his very teaching deflected the fury of the Jews, while it raised them up into admiration.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25207.html'
source_title='Commentary on John, Chapter 7'
