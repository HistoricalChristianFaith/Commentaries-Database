[[commentary]]
quote='''
He says to him again. Here is set forth the second inquiry, in which the procedure is similar, as before. The Lord therefore inquires, as before, about love: Simon, son of John, do you love me? Simon, son of John he is called, because he was the son of John. — And Peter responds: He said to him: Yes, Lord, you know that I love you. Bede: "O how faithful and pure a soul! which does not fear to say to its Creator, before whose eyes all things are naked and open: Lord, you know that I love you." He says to him. Here is set forth the exhortation, as before: Feed my lambs. He repeats the aforesaid exhortation: whence Bede: "This is the sole and true proof of complete love toward God: if you have striven to exercise the care of solicitous labor toward your brothers." Feed, namely by example, as he of whom it is said in the Psalm: "He fed them in the innocence of his heart."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252021.html'
source_title='Commentary on John, Chapter 21'
