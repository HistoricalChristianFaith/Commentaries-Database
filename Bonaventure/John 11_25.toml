[[commentary]]
quote='''
Jesus says to her: I am the resurrection and the life: the predication is causal, that is, I cause to rise again and to live; 1 Corinthians 15: "Christ is risen from the dead, the firstfruits of those who sleep, for since by a man came death, by a man also comes the resurrection of the dead." And he makes this manifest: He who believes in me, even if he be dead, shall live: and thus I cause to rise again; above in chapter 5: "The hour comes and now is, when the dead shall hear the voice of the Son of God, and those who hear shall live."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
