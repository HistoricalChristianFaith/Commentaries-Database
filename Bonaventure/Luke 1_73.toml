[[commentary]]
quote='''
Secondly, he adds the establishing oath, when he says: The oath which he swore to Abraham our father: and the preceding word must always be repeated, namely performed: Genesis twenty-two: "By myself I have sworn, says the Lord, because you have done this thing and have not spared your only-begotten son for my sake, blessing I will bless you." Introducing this, the Apostle in Hebrews six says: "For God, promising to Abraham, since he had no one greater by whom he might swear, swore by himself"; and thus, so that "he might show more abundantly to the heirs of the promise the immutability of his counsel, he interposed an oath, so that through two immutable things, in which it is impossible for God to lie, we might have the strongest consolation." To Abraham, he promised, namely that he would give to us, his children, that is through the promise, his Only-begotten; John three: "God so loved the world that he gave his only-begotten Son"; and: "He who did not spare his own Son, but delivered him up for us all, how has he not also given us all things with him?" Romans eight. Moreover, the figure of this is in Genesis fifteen: "To your seed I will give this land from the river of Egypt to the great river Euphrates."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25201.html'
source_title='Commentary on Luke, Chapter 1'
