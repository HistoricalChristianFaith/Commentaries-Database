[[commentary]]
quote='''
No one is wise unless he is taught by God, for "No one comes to the Father but through Me," says the Saviour. And in John: "They all shall be taught of God." No one is taught in matters of faith except through God; and because it comes about through God's voice, it is said: "God called the firmament heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCollations%2520on%2520the%2520Hexaemeron%2FCollation%25208.html'
source_title='Collations on the Hexaemeron, Collation 8'

[[commentary]]
quote='''
"It is written in the Prophets: They shall all be teachable by God," that is, all shall be taught by God; "in the Prophets" is said, because it is found in several places; Jeremiah 31: "I will place my law in their inward parts and I will write it upon their hearts, and I will be their God, and they shall be my people: and no longer shall a man teach his neighbor, nor a man his brother, saying: Know the Lord; for all shall know me, from the least even to the greatest"; likewise, Isaiah 54: "I will make all your children taught by the Lord"; and Joel 2: "I will pour out of my spirit upon all flesh, and your sons and your daughters shall prophesy, your old men shall dream dreams."

"Everyone who has heard from the Father" — here the removal of error is touched upon. For since He had said that all are taught by God: lest anyone should believe that they see God, by whom they are taught, He says that they do not see, but hear. Whence He says: "Everyone who has heard from my Father and has learned," through inspiration, according to that verse of the Psalm: "I will hear what the Lord God speaks within me": he, I say, "comes to me," through faith and love, according to that verse of Revelation, last chapter: "And let him who hears say: Come."

An inquiry is made about what He says: "Everyone who has heard from the Father: not that anyone has seen the Father." On the contrary: It is established that He speaks here of the seeing and hearing of the intellect itself; but in the intellect sight and hearing do not differ, and he who hears intelligibly sees intelligibly: therefore if the Father is heard interiorly, He is also seen. Furthermore, it is certain that to understand is to see; therefore he who hears either understands or does not: if he understands, he sees; if he hears and does not understand, and comes to hearing, then he comes not understanding, like a brute animal.

It must be said that vision regards the speaker, but hearing regards the speech. Properly, the speech of God is the inspiration of God, according to how it is understood here. This inspiration is an effect of God in the soul; the soul can know this effect in itself, although it does not fully know from whom it comes. Hence it must be said that it both sees and hears that inspiration, but nevertheless from this it does not follow that it sees God. Hence He most aptly says: "Everyone who has heard from the Father," that is, the inspiration proceeding from the Father, and that inspiration, I say, he sees, just as he also hears. But from this it does not follow that he sees the one who inspires, because hearing does not regard Him, but the effect, just as sight does also.

It is asked concerning what he says: "They shall all be teachable by God": because this is most certainly false in every state. Likewise, how is that true which is said in Joel 2: "I will pour out of my spirit upon all flesh": and similarly that of Isaiah: "I will make all your children taught by the Lord"? According to Augustine, "all" is distributed for the kinds of individuals. But then the authority would avail little for the purpose at hand. For this reason it is explained otherwise, that those who will be taught will be taught by God, and no one except through him; therefore "all teachable." And thus the authority avails for the purpose at hand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
