[[commentary]]
quote='''
The certainty of the testimonies having been set forth, here is set forth the rebuke of the unbelieving Jews. Now the Lord rebukes the Jews on four counts: first, namely for the lack of divine love; second, for the blindness of false love; third, for the appetite for vain honor; fourth, for the lack of faith.

First, therefore, he rebukes them for the lack of divine love, the sign of which is that they do not come to him whom God sent; whence he says: "And you are not willing to come to me, that you may have life." Thus I have sufficient testimonies, yet you are not willing to come to me; rather, hating me, you flee: below in chapter eight: "Why do you not understand my speech? Because you cannot hear my word." Nor does he accuse them of not coming on account of his own glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
