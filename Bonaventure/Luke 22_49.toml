[[commentary]]
quote='''
Second, as to the zeal of the disciples he adds: But those who were around him, seeing what was about to happen, said to him: Lord, shall we strike with the sword? For the disciples, kindled with zeal of love for Christ, were inflamed for his defense, but they hesitated on account of what they had been taught by him — to show all patience, according to that of Matthew 5: "Whoever strikes you on one cheek, offer him the other also"; but Peter was so fervent that he neither asked nor waited for a response.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Commentary on Luke, Chapter 22'
