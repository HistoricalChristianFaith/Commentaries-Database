[[commentary]]
quote='''
Matthew, whose name is interpreted as gift, by whom it is suggested that doctrine ought to be edifying unto action. For after devotion has been attained, it is necessary that one fulfill the saving word heard through good works: this is especially from him from whom comes "every best gift and every perfect gift," James 1. He himself confers upon the word of the preacher the power or grace of preaching and edification: whence Isaiah 41: "The first shall say to Zion: Behold, I am here, and to Jerusalem I will give an evangelist." And Thomas, whose name is interpreted as abyss, by which is understood the depth of learning in matters of faith, so that "his counsel may be in the great abyss," as is said in Ecclesiasticus 24. Whence it is asked in Job 38: "Have you walked in the uttermost depths of the abyss?" "O the depth of the riches of the wisdom and knowledge of God, how incomprehensible are his judgments!" For "his judgments are a great abyss," Romans 11 and the Psalm. And these four pertain to doctrine, so that thus the four wheels "may go toward the four directions and not turn back as they move," Ezekiel 10.

There follows concerning those names which pertain to example: James, whose name is interpreted as wrestler, of Alphaeus, whose name is interpreted as fugitive, in whom is expressed the example of perfect poverty. Whence Gregory: "Let him who hastens to the contest with the devil cast off his garments, lest he be overcome. But what are all earthly things if not certain garments of the body?" Whence it is necessary for one wishing to wrestle in poverty to flee temporal things, according to what the Psalm says: "Behold, I went far off fleeing and remained in solitude." So Elijah in a figure of this fled from the face of Jezebel, whose name is interpreted as flow of the dung-heap: by which is designated the transience of temporal things. And Simon, whose name is interpreted as obedient, who is called the Zealot, that is, the emulator; in whom is expressed the example of perfect humility with the emulation of ordered charity: whence 1 Peter 1: "Purifying your souls in the obedience of charity, in the love of fraternity, love one another more earnestly from a sincere heart"; Ecclesiasticus 3: "The sons of wisdom are the assembly of the just, and their nation is obedience and love."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%25206.html'
source_title='Commentary on Luke, Chapter 6'
