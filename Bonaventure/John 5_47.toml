[[commentary]]
quote='''
"But if you do not believe his writings, how will you believe my words?" As if to say: you will not. Luke sixteen: "If they do not hear Moses and the Prophets, neither will they believe even if someone should rise from the dead."

Likewise there is a question about the Lord's argument: "If you do not believe the writings of Moses, how will you believe my words?" It appears to be an argument from the lesser by negation. I respond: Although it is lesser absolutely, nevertheless for the Jews it is not lesser, but greater.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
