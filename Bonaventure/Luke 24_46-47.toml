[[commentary]]
quote='''
Now these mysteries of the Scriptures are principally referred to Christ with regard to the head and with regard to the body. With regard to the head, he adds: And he said to them: Thus it is written, and thus it was necessary for Christ to suffer and to rise from the dead on the third day: this is most frequently stated in the Scriptures, and especially in the Law through figures, in the Prophets through words, and in the Psalms most abundantly, because they treat of the resurrection and the passion. — With regard to the body, however, he adds: And that repentance and remission of sins should be preached in his name to all nations, beginning from Jerusalem. This, I say, is written in the Law and in the promise to Abraham: Genesis twenty-two: "In your seed shall all the nations of the earth be blessed"; and Genesis forty-nine: "He shall be the expectation of the nations." This is written in the Psalm: "Ask of me, and I will give you the nations for your inheritance"; and again: "Praise the Lord, all you nations." This in the Prophets: whence Isaiah forty-nine: "It is too small a thing that you should be my servant to restore the remnants of Israel; I have given you as a light to the nations, that you may be my salvation," etc. And this preaching was foretold to begin from Jerusalem: Isaiah two: "Out of Zion shall go forth the law, and the word of the Lord from Jerusalem"; and Isaiah sixty-two: "For Zion's sake I will not be silent, and for Jerusalem's sake I will not rest, until her righteous one goes forth as brightness"; and the Psalm: "The Lord shall send forth the rod of your power out of Zion."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Commentary on Luke, Chapter 24'
