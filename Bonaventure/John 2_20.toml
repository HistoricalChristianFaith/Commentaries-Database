[[commentary]]
quote='''
The Jews therefore said to him. Here is touched upon the exposition of the sign offered, because he was not saying this about the material temple, but about the temple of his body; and the Jews understood it of the material temple. On account of which he says: The Jews therefore said: Forty-six years was this temple in building, and will you raise it up in three days? As if they were saying: this is entirely incredible and impossible for you. It should be understood that the temple in its first building was completed in seven years, but in the second, on account of wars and impediments under Zerubbabel, over forty-six years. The Lord was not speaking of this.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25202.html'
source_title='Commentary on John, Chapter 2'
