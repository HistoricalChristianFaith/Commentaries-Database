[[commentary]]
quote='''
And I have made known to them your name: Psalm: "I will declare your name to my brethren"; Matthew eleven: "No one knows the Son except the Father, nor does anyone know the Father except the Son, and he to whom the Son wills to reveal him." Nor has he only made it known through himself, but he will further make it known through the Holy Spirit: therefore he says: And I will make it known, and this through the Holy Spirit, who is the love of the Father and the Son: therefore he says: That the love with which you loved me may be in them, through the gift of the Holy Spirit: Romans five: "The love of God has been poured forth in our hearts through the Holy Spirit, who has been given to us." And I in them, because, First John four, "he who abides in love abides in God, and God in him"; and therefore it is said in the same place: "In this we have known that we abide in him and he in us, because he has given us of his Spirit." And he who has this Spirit and the Son is assured that he has the Father. Whence Augustine says that "the Father gave his Son as the price of redemption, the Holy Spirit as the pledge of adoption, and himself as the inheritance to the adopted."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252017.html'
source_title='Commentary on John, Chapter 17'
