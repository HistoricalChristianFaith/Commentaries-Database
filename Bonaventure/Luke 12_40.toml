[[commentary]]
quote='''
Then he concludes the principal intention. And you also be ready, for at an hour you do not expect, the Son of man will come. The Gloss: "The Lord always wished the last hour to be unknown, so that it might always be suspected, and we might always prepare ourselves for it." Hence Matthew twenty-four: "Of that day and hour no one knows" etc.; and First Thessalonians five: "The day of the Lord will come as a thief in the night"; and after: "But you, brethren, are not in darkness, that that day should overtake you as a thief"; and Ecclesiastes nine: "Man does not know his end, but as fish are caught with a hook, so are men seized in an evil time." So also those who do not prepare themselves: therefore it is said in Sirach five: "Do not delay to turn to the Lord, and do not defer from day to day: for his wrath will come suddenly, and in the time of vengeance he will destroy you." Hence Alcuin: "It is a dissolute thought to think of tomorrow's conversion and to neglect today's." And Seneca: "Every day of our life ought to be ordered as the last." On this account, therefore, so that we might always be ready, the Lord willed that we be ignorant of the hour of death and the day of judgment. "For nothing is more certain than death, and nothing is more uncertain than the hour of death"; therefore Sirach thirty-eight: "Remember my judgment; for so also shall yours be: yesterday for me, and today for you"; and concerning the hour of judgment it is said in Matthew twenty-five: "At midnight a cry was made: Behold, the bridegroom comes"; and after: "Those who were ready entered with him to the wedding, and the door was shut." Gregory: "O if one could taste with the palate of the heart, what wonder the bridegroom comes! holds, what sweetness they entered with him to the wedding! what bitterness, the door was shut!"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Commentary on Luke, Chapter 12'
