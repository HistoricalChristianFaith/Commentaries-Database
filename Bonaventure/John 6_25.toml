[[commentary]]
quote='''
Here is touched upon the correction of those seeking inordinately. For the Jews seek Jesus, and having found him, put a question to him; therefore he says: "And when they had found him across the sea," they who had not seen him cross over: "they said to him: Rabbi, when did you come here?" They ask out of wonder, not knowing how he had come; and they inquire curiously about the time, just as the disciples, Matthew twenty-four: "Tell us, when shall these things be?" And the Lord does not respond to the inquiry, but to the intention of those seeking inordinately.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25206.html'
source_title='Commentary on John, Chapter 6'
