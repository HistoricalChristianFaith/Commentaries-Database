[[commentary]]
quote='''
"And you do not have his word abiding in you," namely through faith: whence the reason is also added: "Because the one whom he sent, you do not believe in him." And the one whom he sent is the Word and abides in hearts through faith: Ephesians 3: "That Christ may dwell through faith in your hearts"; Isaiah 9: "The Lord sent a word into Jacob, and it fell upon Israel"; it did not abide in Jacob, because his own did not receive him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
