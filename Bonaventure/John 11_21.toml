[[commentary]]
quote='''
Martha therefore said. Here the second point is touched upon, namely Martha's faithful confession, in which she confesses the Lord to be powerful and benign, so that he both could and would deliver and now raise him; therefore she says: Lord, if you had been here, my brother would not have died: because you would have willed and been able to deliver him; but even now you can raise him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252011.html'
source_title='Commentary on John, Chapter 11'
