[[commentary]]
quote='''
Here the fourth point is touched upon, namely the power of the healer, because he heals by command alone. Therefore he says: "Rise, take up your bed and walk: rise," through restored health: "take up your bed," through strength: "and walk," through the certainty of health. And this was done.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25205.html'
source_title='Commentary on John, Chapter 5'
