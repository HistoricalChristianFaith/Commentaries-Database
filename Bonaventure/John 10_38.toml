[[commentary]]
quote='''
"But if I do, and if you will not believe me," that is, my word: "believe the works," that is, through the works believe in me, "that you may believe and know that the Father is in me, and I in the Father": and thus that what I said above is true: "I and the Father are one." "That you may believe," that is, by believing "may know," because, according to what Isaiah says in chapter seven, according to another reading, "unless you believe, you will not understand"; below in chapter fourteen he says to Philip: "Do you not believe that I am in the Father, and the Father in me? Otherwise, believe because of the works themselves."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%252010.html'
source_title='Commentary on John, Chapter 10'
