[[commentary]]
quote='''
He shows that our damnation is not on the part of God, when he says: and it should be continued thus from the preceding: I have truly said that God gave His Son, "that everyone who believes in Him may have eternal life," not, I say, that he be condemned. "For God did not send His Son into the world to judge the world," namely by condemning it, "but that the world might be saved through Him": 1 John 3: "In this we have known the love of God, that He first loved us and sent His Son as a propitiation for our sins," therefore for the purpose of propitiation, not for condemnation.

But a question arises concerning what he says, that "he did not send his Son into the world to judge." Against this: It is stated in chapter 5: "The Father has given all judgment to the Son."

I respond: There is a twofold coming: the first and the second, the first of mercy, the second of justice. In the first he came to propitiate, not to judge, but in the second he will come to judge.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bonaventure%2FCommentary%2520on%2520John%2FChapter%25203.html'
source_title='Commentary on John, Chapter 3'
