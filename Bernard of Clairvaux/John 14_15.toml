[[commentary]]
quote='''
But that this rather pertains to actual charity seems to appear most especially from this: that when the Lord had said, "Love your enemies," he at once adds concerning works: "Do good to those who hate you" (Lk 6:27). Likewise Scripture: "If your enemy is hungry, feed him; if he thirsts, give him drink" (Rom 12:20). And here you have what concerns act, not affection. But hear likewise the Lord commanding also concerning love of himself: "If you love me," he says, "keep my words" (Jn 14:15). And here too we are sent to works by the enjoined observance of commandments. But he would have warned about works superfluously, if love had already been in the affection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252050.html'
source_title="Sermons on the Song of Songs, Sermon 50"
