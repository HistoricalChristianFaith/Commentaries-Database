[[commentary]]
quote='''
So if we consider how great the fragrance with which the Church is perfumed in the conversion of one sinner, what a sweet smell of life leading to life each penitent can become! Provided that his repentance is wholehearted and visible to all, may we not with equal assurance say of him: "The house was full of the scent of the ointment." We can even say that this perfume of repentance reaches to the very abodes of the blessed in heaven because we have the witness of Truth itself that there is rejoicing among the angels of God over one repentant sinner. Rejoice then, you penitents; do not be afraid, you fainthearted ones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252010.html'
source_title="Sermons on the Song of Songs, Sermon 10"
