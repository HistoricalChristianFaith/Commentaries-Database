[[commentary]]
quote='''
But hear her preparer himself, as it were pointing her out with his finger to the watchmen, but under another figure. "Lift up your eyes," he says, "and see the fields, that they are white already," that is, prepared, "for harvest" (Jn 4:35). From this the householder invites laborers to the work, when he has now perceived that all things are so prepared that without much labor of their own they can glory and say, "we are God's co-workers" (1 Cor 3:9). For what are they going to do? Namely, seek the bride, and announce to her whom they have found concerning the beloved. For they will not seek their own glory, but the glory of the bridegroom, since they are friends of the bridegroom. And for this they will not labor much with her: she is at hand, and already with all devotion she seeks him; so greatly has her will been prepared by the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252078.html'
source_title="Sermons on the Song of Songs, Sermon 78"
