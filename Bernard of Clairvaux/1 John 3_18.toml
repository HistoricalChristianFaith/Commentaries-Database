[[commentary]]
quote='''
Therefore through the second, works are done, and in it charity resides -- not that affectual charity, which, seasoned with the salt of wisdom, growing rich, brings to the mind a great multitude of the sweetness of the Lord; but rather a certain actual charity, which even if it does not yet sweetly refresh with that sweet love, nevertheless vehemently inflames with a love of that very love. "Let us not love," he says, "in word, nor in tongue, but in deed and in truth" (1 Jn 3:18).

Do you see how he carefully proceeds in the middle between vicious and affectionate love, distinguishing from each equally this actual and salutary charity? He receives in this love neither the pretense of a lying tongue, nor in turn does he demand the taste of affecting wisdom. "Let us love," he says, "in deed and in truth": namely that we be moved to good works more by a certain impulse of living truth than by the affection of that savory charity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252050.html'
source_title="Sermons on the Song of Songs, Sermon 50"
