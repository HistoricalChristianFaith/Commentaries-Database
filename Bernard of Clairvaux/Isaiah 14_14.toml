[[commentary]]
quote='''
Both meditated iniquity, affecting height: the one, of power; the other, of knowledge. For the foolish woman believed him who promised, but who was deceiving: "You shall be as gods, knowing good and evil." Had he not already first deceived himself, he who had persuaded himself that he would be like the Most High? For he who thinks himself to be something, when he is nothing, deceives himself.

Therefore the devil was judged in fury, because his iniquity was found to be unto hatred; but man's unto wrath, and therefore he is chastised in wrath. Thus every height has been crushed, both that which puffs up and that which casts down, the Father indeed being zealous for the Son. For in both cases there is an injury to the Son: both from the usurped power against the power of God, which he himself is; and from the knowledge presumed from elsewhere than from the wisdom of God, which he no less is.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252069.html'
source_title="Sermons on the Song of Songs, Sermon 69"
