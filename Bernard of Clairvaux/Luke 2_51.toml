[[commentary]]
quote='''
Have you not read in the Gospel what pattern of obedience the boy Jesus handed on to holy children? For when he had remained in Jerusalem and had said that he must be about the things that are his Father's, yet when his parents did not agree, he did not disdain to follow them to Nazareth—the Master following disciples, God following human beings, the Word and Wisdom following a carpenter and a woman. What? The sacred history even adds: "And he was," it says, "subject to them." How long will you be wise in your own eyes? God entrusts and subjects himself to mortals; and you still walk in your own ways?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252019.html'
source_title="Sermons on the Song of Songs, Sermon 19"
