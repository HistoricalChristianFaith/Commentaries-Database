[[commentary]]
quote='''
And hence the bride, although otherwise so audacious, does not dare to say: "Let him kiss me with his mouth," for she knows that this is the prerogative of the Father alone. What she does ask for is something less: "Let him kiss me with the kiss of his mouth." Do you wish to see the newly-chosen bride receiving this unprecedented kiss, given not by the mouth but by the kiss of the mouth? Then look at Jesus in the presence of his Apostles: "He breathed on them," according to St John, "and he said: 'Receive the Holy Spirit.'" That favor, given to the newly-chosen Church, was indeed a kiss. That? you say. That corporeal breathing? O no, but rather the invisible Spirit, who is so bestowed in that breath of the Lord that he is understood to proceed from him equally as from the Father, truly the kiss that is common both to him who kisses and to him who is kissed. Hence the bride is satisfied to receive the kiss of the Bridegroom, though she be not kissed with his mouth. For her it is no mean or contemptible thing to be kissed by the kiss, because it is nothing less than the gift of the Holy Spirit. If, as is properly understood, the Father is he who kisses, the Son he who is kissed, then it cannot be wrong to see in the kiss the Holy Spirit, for he is the imperturbable peace of the Father and the Son, their unshakable bond, their undivided love, their indivisible unity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%25208.html'
source_title="Sermons on the Song of Songs, Sermon 8"
