[[commentary]]
quote='''
It is not, I think, that such a soul should any longer be afraid to say: "My beloved to me"; for from the fact that it feels itself loving, and loving vehemently, it does not doubt that it is loved no less vehemently in return; and from its own singular intention, solicitude, care, effort, diligence, and zeal, with which it incessantly and ardently watches over how to please God, it recognizes without doubt all these same things equally in him, remembering his promise: "In what measure you shall have measured, it shall be measured to you again"; except that the prudent Bride is more cautious in drawing the requital of grace to her own side, knowing that she was rather preceded by the beloved. Hence it is that she puts forward his work first: "My beloved," she says, "to me, and I to him." Therefore from her own dispositions she recognizes what is in God; nor does she doubt that she is loved, she who loves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252069.html'
source_title="Sermons on the Song of Songs, Sermon 69"
