[[commentary]]
quote='''
And hear from the Gospel, that the Holy Spirit has a voice. "The Spirit," he says, "breathes where he wills, and you hear his voice; and you do not know whence he comes or where he goes" (Jn 3:8). Even if that one did not know, who, a dead teacher, was teaching the dead the letter that kills; let us know, who, having been translated from death to life through the life-giving Spirit, prove by certain and daily experience, with him illuminating us, that our prayers and groanings come from him, and go to him, and there find mercy in the eyes of God. For when would God make void the voice of his own Spirit? But he himself knows what the Spirit desires, because he intercedes according to God for the saints.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252059.html'
source_title="Sermons on the Song of Songs, Sermon 59"
