[[commentary]]
quote='''
Now let us see what is spiritually to be understood by us from this quasi-historical figure. That the vineyards are souls or Churches, and at the same time what the reason for this is, I have already told you, and you have heard, nor do you need to hear it again. To revisiting these, then, to correcting, instructing, and saving them, the more perfect soul is invited, one who has received that ministry not by her own ambition but called by God, as was Aaron. Furthermore, what is this invitation itself, if not a certain inward stirring of charity piously urging us to be zealous for the salvation of our brothers, zealous for the beauty of the house of the Lord, for the increase of his gains, the increase of the fruits of his righteousness, the praise and glory of his name? Whenever, therefore, he who has the charge of governing souls, or who by office must devote himself to the study of preaching, perceives his inner man to be moved by such devout affections toward God, let him understand for certain that the Bridegroom is present, that he is being invited by him to the vineyards. For what purpose, unless to uproot and to destroy, and to build and to plant?

But since for this work, as also for every thing under heaven, not every time is available and fit, he who invites adds that the time of pruning has arrived. He who said this knew it was at hand: "Behold, now is the acceptable time, behold, now is the day of salvation; giving no offense to anyone, that our ministry may not be blamed" (2 Cor 6:2-3). Without doubt he was admonishing them to prune and cut away the vicious and superfluous, and indeed everything that could give offense and impede the fruit of salvation, knowing that the time of pruning had arrived. Therefore he also said to a certain faithful cultivator of vineyards: "Rebuke, reprove, exhort" (2 Tim 4:2); enjoining in the first and second of these pruning or uprooting, and in the last, planting. And these things the Bridegroom spoke through the mouth of Paul concerning the time for working. But hear what he spoke through his own mouth concerning the consideration of times, under indeed a different figure and name of things, when the bride was new. "Do you not say," he says, "that there are yet four months and the harvest comes? Behold, I say to you: Lift up your eyes and see the regions, for they are already white for the harvest" (Jn 4:35); likewise: "The harvest indeed is great, but the laborers are few: pray the Lord of the harvest to send laborers into his harvest" (Mt 9:37-38). Just as there, therefore, he was showing that the time for reaping the harvests of souls was at hand, so also here he announces that the time for pruning the equally intelligible vineyards, that is, souls or Churches, has arrived; wishing perhaps that this distinction be made between the two things by the diversity of terms, that by harvests we understand the peoples, and by vineyards the congregations of saints dwelling together.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252058.html'
source_title="Sermons on the Song of Songs, Sermon 58"

[[commentary]]
quote='''
As long, therefore, as pestilent waters of this kind had occupied the earth and prevailed upon it, the vineyards did not have their time, nor was there cause for the bride to be invited to prune the vineyards. But when those had run off, the dry land appeared, and flowers appeared in it, signifying that the time of pruning was at hand. You ask when this was? When do you think, if not when the flesh of Christ reflowered in the resurrection? And this is the first and greatest flower that appeared in our land. For "the firstfruits of those who have fallen asleep is Christ" (1 Cor 15:20). He himself, I say, "the flower of the field and the lily of the valleys," Jesus (Song 2:1), as he was supposed the son of Joseph, from Nazareth (Lk 3:23), which is interpreted "flower." This flower therefore appeared first, not alone. For "many bodies of the saints who had fallen asleep also arose together," who, like certain most brilliant flowers, appeared at the same time in our land. Finally, "they came into the holy city, and appeared to many" (Mt 27:52-53). Flowers also were those who first believed from among the people, the firstfruits of the saints. Their miracles were flowers, producing fruit of faith after the manner of flowers. For after that rain of unbelief had somewhat, or in part, departed and receded, there followed immediately a willing rain, which God set apart for his inheritance, and flowers began to appear. "The Lord gave his bounty, and our land gave its flowers," so that in one day three thousand, and in another five thousand from the people believed (Acts 2:41; 4:4): to such a degree in a short time the number of flowers, that is, the multitude of believers, increased. And the frost of malice could not prevail against the flowers that were appearing, nor snatch away, as it is wont to do, the fruit of life which they promised.

For when all who had believed were clothed with power from on high, there arose from among them men who despised the threats of men, strong in faith. They suffered indeed very many contradictors; but they did not yield, nor did they shrink from both doing and proclaiming the works of God. For according to that in the psalm, spiritually indeed: "And they sowed fields, and planted vineyards, and made the fruit of their produce" (Ps 106:37). In the course of time the storm was calmed, and with peace restored to the lands, the vineyards grew, and were propagated, and extended, and multiplied beyond number. And then at last the bride is invited to the vineyards, not indeed to plant, but to prune what had already been planted. Opportunely indeed: for that work required a time of peace. For when in a time of persecution would this be permitted? Otherwise, to take in hand two-edged swords, to execute vengeance upon the nations, rebukes upon the peoples; to bind their kings in fetters, and their nobles in chains of iron; and to execute upon them the judgment that was written (Ps 149:6-9) -- for this is to prune the vineyards -- these things, I say, are scarcely carried out even in a time of peace peaceably. And enough of these things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252058.html'
source_title="Sermons on the Song of Songs, Sermon 58"

[[commentary]]
quote='''
The sermon could also have been ended, if first I had admonished each one of you, according to my custom, about his own vineyard. For who has so precisely cut away from himself all superfluous things that he thinks he has nothing worthy of pruning? Believe me, even what has been pruned sprouts again, and what has been driven off returns, and what has been extinguished is rekindled, and what has been lulled to sleep is once more stirred up. It is therefore too little to have pruned once; one must prune often -- indeed, if it could be, always -- because always, if you do not dissemble, you find what ought to be pruned. However far you may have advanced while remaining in this body, you err if you think your vices are dead and not rather suppressed. Whether you will or not, the Jebusite dwells within your borders (Judg 1:21); he can be subjugated, but not exterminated. "I know," he says, "that good does not dwell in me." It is not enough unless he also confesses that evil is present in him. For he says: "Not what I will, this I do; but what I hate, that I do. But if what I hate, that I do, it is no longer I who work it, but sin which dwells in me" (Rom 7:18-20). Either therefore, if you dare, prefer yourself to the Apostle -- for this is his own voice -- or confess with him that you too are not free from vices. Virtue indeed holds the middle ground among vices; and therefore you need not only diligent pruning, but also circumcision. Otherwise it is to be feared that, while the vices lick at it all around, or rather gnaw at it, virtue, while you are unaware, may little by little grow feeble; or, if they have grown over it, may be suffocated. In so great a peril, the one counsel is to observe diligently, and as soon as the heads of the regrowing ones appear, to cut them down with ready severity. Virtue cannot grow equally alongside vices. Therefore, that it may flourish, let these not be allowed to increase. Take away the superfluous, and wholesome things arise. Whatever you subtract from cupidity accrues to usefulness. Let us devote ourselves to pruning. Let cupidity be pruned, that virtue may be strengthened.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252058.html'
source_title="Sermons on the Song of Songs, Sermon 58"

[[commentary]]
quote='''
For us, brothers, it is always the time of pruning, just as it is always the work to be done. For I trust that for us the winter has now passed. You know what winter I mean? That fear which is not in charity, which although it initiates all to wisdom, perfects no one; because charity coming upon it drives it out, as summer does winter. For charity is summer: and if it has now come -- indeed, because it has come, as it is right for me to think of you -- it has necessarily dried up every wintry rain, every tear of anxiety, namely, which the bitter recollection of sin and the fear of judgment formerly wrung from us. And so -- which I say without doubt, even if not of all of you, certainly of very many -- this rain has now departed and receded: for flowers too appear, tokens of a sweeter rain. Summer has its own rains too, sweet and plentiful. What is sweeter than the tears of charity? For charity weeps, but from love, not from sorrow; it weeps from desire, it weeps with those who weep. With such rain I do not doubt that the acts of your obedience are more abundantly watered, which I look upon with gladness -- not gloomy with murmuring, not dimmed with sadness, but pleasant and blooming with a certain spiritual joy. They are as if you always bore flowers in your hands.

If therefore the winter has passed, the rain has departed and receded; if indeed flowers have appeared in our land, and thereupon a certain springtime mildness of spiritual grace announces the time of pruning: what remains except that henceforth we devote ourselves entirely to this work so holy, so necessary? Let us search, according to the prophet, our ways (Lam 3:40) and our pursuits, and in this let each one judge himself to have profited, not when he finds nothing to reprove, but when he reproves what he has found. Then you have not searched yourself in vain, if you have noticed that there is again need for searching: and so many times your inquiry has not deceived you, as many times as you have thought it must be repeated. But if you always do this when there is need, you always do it. Let it always be remembered therefore that you are in need of heavenly aid, and of the mercy of the Bridegroom of the Church, Jesus Christ our Lord, who is over all things God blessed forever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252058.html'
source_title="Sermons on the Song of Songs, Sermon 58"

[[commentary]]
quote='''
1. "The voice of the turtledove has been heard in our land" (Song 2:12). I can by no means any longer conceal the fact that behold, for a second time, he who is from heaven speaks of the earth: assuredly so condescendingly, so companionably, as if he were one from the earth. This is the Bridegroom: who, when he had said beforehand that flowers had appeared in the earth, added "our"; and now no less: "The voice," he says, "of the turtledove has been heard in our land." Shall then a manner of speaking so unusual for God, not to say unworthy, be without reason? Nowhere, as I think, will you find him having spoken thus of heaven, nowhere elsewhere of earth. Attend therefore, how great a sweetness it is for the God of heaven to say, "in our land." You also, O earth-born and sons of men, hear; "the Lord has done great things for us" (Ps 125:3). Much has he to do with the earth, much with the bride, whom he was pleased to take to himself from the lands. "In our land," he says. This word plainly does not sound of sovereignty, but of partnership, of familiarity. As a Bridegroom he says this, not as a Lord. What? He is the Creator, and he reckons himself a partner! Love is speaking, which knows no lord. This is indeed a song of love, and it was fitting that it be supported by none other than amatory expressions. God also loves, nor does he have this from elsewhere, but he himself is the source whence he loves. And therefore he loves more vehemently, because he does not so much have love, as he himself is this very thing. But those whom he loves, he has as friends, not as servants. Finally, from a master he becomes a friend: for he would not have called his disciples friends, if they were not such.

2. You see that even majesty yields to love? So it is, brothers; love looks up to no one, but neither does it look down on anyone. It regards all equally, who love one another perfectly, and in itself it tempers together the lofty and the lowly; not only making them equals, but one. Perhaps you still think that God is excepted from this rule of love; but "he who clings to God is one spirit" (1 Cor 6:17). Why do you marvel at this? He himself was made as one of us. I have said too little: not as one, but one. It is a small thing to be equal to men: he is man. Thence he claims our land for himself, but as a homeland, not as a possession. Why should he not claim it? Thence comes his bride, thence the substance of his body; thence the Bridegroom himself; thence "two in one flesh." If one flesh, why not also one homeland? "The heaven of heaven is the Lord's," it says, "but the earth he has given to the sons of men" (Ps 113:16). Therefore as Son of Man he inherits the earth, as Lord he subjects it, as Creator he administers it, as Bridegroom he shares it. For by saying "in our land," he plainly renounced exclusive ownership, but did not refuse partnership. And let this suffice concerning the fact that the Bridegroom used so kindly a word, that he deigned to say, "in our land." Now let us consider the rest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252059.html'
source_title="Sermons on the Song of Songs, Sermon 59"

[[commentary]]
quote='''
3. "The voice of the turtledove has been heard in our land." This too is a sign that winter has passed, announcing no less that the time of pruning is at hand. This according to the letter. Otherwise, the voice of the turtledove does not sound very sweet, but it signifies sweet things. The little bird itself, if you buy it, is not of great cost; if you examine it, it is not of small worth. And its voice indeed, more like a moaning than a singing, reminds us of our pilgrimage. Gladly do I hear the voice of that teacher: who moves not applause for himself, but lamentation in me. Truly you display the turtledove, if you teach how to groan: and if you wish to persuade, you will need to strive for it by groaning rather than by declaiming. Example indeed, both in many other things and especially in this matter, is more effective than the word. You will give to your voice the voice of power, if what you urge you are recognized to have first persuaded yourself of. The voice of deed is stronger than the voice of mouth. Do as you speak, and not only will you correct me more easily, but you will also free yourself from no slight reproach. It will no longer pertain to you, if someone says: "They bind heavy and unbearable burdens, and lay them on the shoulders of men, but with their own finger they are unwilling to move them" (Mt 23:4). But neither need you fear that saying: "You who teach others, do you not teach yourself?" (Rom 2:21).

4. "The voice of the turtledove has been heard in our land." As long as men received for the worship of God a reward only on earth, and only earth, namely that land flowing with milk and honey, they by no means recognized themselves as pilgrims upon earth, nor did they groan after the manner of the turtledove as if remembering their homeland; but rather, using their exile as a homeland, they gave themselves to eating rich foods and drinking sweet wine. Thus for so long the voice of the turtledove was not heard in our land. But when the promise of the kingdom of heaven was made, then men understood that they did not have here an abiding city, but began to seek the future one with all eagerness; and then for the first time the voice of the turtledove sounded clearly in the land. For while each holy soul was sighing for the presence of Christ, bearing with difficulty the delay of the kingdom, greeting from afar the desired homeland with groans and sighs: does it not seem to you that any soul that had so acted on earth was fulfilling the role of the groaning and most chaste turtledove? From that time therefore and henceforth the voice of the turtledove has been heard in our land. Why should not the absence of Christ move me to frequent tears and daily groaning! "Lord, before you is all my desire, and my groaning is not hidden from you" (Ps 37:10). "I have labored in my groaning," you know; but blessed is he who was able to say: "I will wash my bed every night, with my tears I will drench my couch" (Ps 6:7). And not only for me, but also for all who love his coming, these groanings have been experienced. For this is what he himself was saying. "Can the sons of the bridegroom mourn," he says, "as long as the bridegroom is with them? But the days will come, when the bridegroom shall be taken from them, and then they will mourn" (Mt 9:15); as if he were saying: And then the voice of the turtledove will be heard.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252059.html'
source_title="Sermons on the Song of Songs, Sermon 59"

[[commentary]]
quote='''
5. So it is, good Jesus, those days have come. For "creation itself groans and travails until now, awaiting the revelation of the sons of God. And not only it, but we ourselves also groan within ourselves, awaiting the adoption of the sons of God, the redemption of our body" (Rom 8:22-23): knowing this, that "as long as we are in this body, we are pilgrims from the Lord" (2 Cor 5:1-6). Nor are the groanings vain, to which such a merciful answer is given from heaven: "Because of the misery of the helpless and the groaning of the poor, now I will arise, says the Lord" (Ps 11:6). There was also in the time of the Fathers this voice of those groaning; but it was rare, and each one's groaning was kept to himself. Whence also someone would say: "My secret is mine, my secret is mine" (Is 24:16). But also he who said: "My groaning is not hidden from you," surely showed that it was hidden from all, since it was not hidden from God alone. And therefore it could not then be said: "The voice of the turtledove has been heard in our land"; because the secret, still belonging to a few, had not yet gone out to the multitude. But when it was openly proclaimed: "Seek the things that are above, where Christ is seated at the right hand of God" (Col 3:1), this turtle-like groaning began to pertain to all, and there was one reason for groaning for all, because all knew the Lord, according to what is read in Jeremiah: "And they shall all know me, from the least to the greatest, says the Lord" (Jer 31:34).

6. But if many are groaning, what does the mention of one signify? "The voice of the turtledove," it says. Why not "of turtledoves"? Perhaps the Apostle resolves this, where he says that "the Spirit himself intercedes for the saints with unutterable groanings" (Rom 8:26). So it is. He himself is introduced as groaning, who makes others groan. And however many they be whom you hear groaning thus, the voice of one sounds through the lips of all. Why not his, who forms that very voice in the mouth of each according to the needs of each? Finally, "to each one is given the manifestation of the Spirit for profit" (1 Cor 12:7). His own voice makes each one manifest and indicates his presence. And hear from the Gospel, that the Holy Spirit has a voice. "The Spirit," he says, "breathes where he wills, and you hear his voice; and you do not know whence he comes or where he goes" (Jn 3:8). Even if that one did not know, who, a dead teacher, was teaching the dead the letter that kills; let us know, who, having been translated from death to life through the life-giving Spirit, prove by certain and daily experience, with him illuminating us, that our prayers and groanings come from him, and go to him, and there find mercy in the eyes of God. For when would God make void the voice of his own Spirit? But he himself knows what the Spirit desires, because he intercedes according to God for the saints.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252059.html'
source_title="Sermons on the Song of Songs, Sermon 59"

[[commentary]]
quote='''
7. Nor do groanings alone commend the turtledove; chastity also commends it. By the merit of this chastity indeed it was worthy to be given as an offering for the virginal birth. For so you have it: "A pair of turtledoves, or two young pigeons" (Lk 2:24). And although elsewhere indeed the Holy Spirit is usually designated by a dove; yet because it is a lustful bird, it was not fitting that it be offered in sacrifice to the Lord, except at that age when it would not know lust. But no age is specified for the turtledove, because its chastity is recognized at every age. For it is content with a single mate; and when that one is lost, it no longer admits another, reproving the multiplicity of marriages among humans. For even if perhaps the fault is venial on account of incontinence, yet such great incontinence itself is shameful. It is a cause for shame that reason in a human being cannot accomplish for the matter of honor what nature can accomplish in a bird. For one may observe the turtledove in the time of its widowhood, strenuously and tirelessly carrying out the work of holy widowhood. You will see it everywhere solitary, everywhere you will hear it groaning; nor will you ever observe it perching on a green branch, so that you may learn from it to avoid the poisonous greenery of pleasures. Add that on the ridges of mountains and on the tops of trees its dwelling is more frequent: so that, what especially befits the commitment of chastity, it may teach us to despise earthly things and to love heavenly things.

8. From these things it is gathered that the voice of the turtledove is also the preaching of chastity. For in the beginning this voice was not heard on earth, but rather that one: "Increase and multiply and fill the earth" (Gen 1:28). In vain indeed would the voice of chastity have sounded, when the homeland of those rising again had not yet been revealed: in which far more happily "men will neither marry nor be given in marriage, but are as the angels of God in heaven" (Lk 20:35-36). You would say that there was a time for that voice, when every barren woman in Israel was subject to a curse, when the Patriarchs themselves had several wives at the same time, when a brother was compelled by the law to raise up offspring for a brother who had died without children. But when the commendation of those eunuchs "who have made themselves eunuchs for the sake of the kingdom of God" (Mt 19:12) sounded from the mouth of the heavenly turtledove; and likewise the counsel of another, that same most chaste turtledove, concerning virgins everywhere prevailed (1 Cor 7:25), then for the first time it could be truly said, that "the voice of the turtledove has been heard in our land."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252059.html'
source_title="Sermons on the Song of Songs, Sermon 59"

[[commentary]]
quote='''
9. Therefore, if in our land both flowers have appeared and the voice of the turtledove has been heard, then assuredly the truth has been ascertained both by sight and by hearing. For a voice is heard, a flower is seen. A flower is a miracle, as our earlier interpretation has it, which, coming to the voice, brings forth the fruit of faith. Even if faith comes from hearing, yet from sight comes confirmation. A voice sounded, a flower shone forth, and "truth has sprung from the earth" (Ps 84:12) through the confession of the faithful, with word and sign alike concurring in testimony of faith. These testimonies have been made exceedingly credible, since the flower testifies to the voice, the eye to the ear. Things heard are confirmed by things seen, so that the testimony of the two (I speak of the ear and the eye) may be established. For this reason the Lord was saying: "Go, report to John" (for he was speaking to his disciples) "what you have heard and seen" (Lk 7:22). Nor could the certainty of faith have been conveyed to them more briefly or more clearly. The same persuasion was indeed made in a short time to the whole earth as well, and by the same shortcut of argument. "What you have heard," he says, "and seen." O abbreviated word, yet living and effective! Without doubt I surely assert what I have perceived with my ears and eyes. The trumpet of salvation sounds, miracles flash forth, and the world believes. What is said is quickly believed, when what causes astonishment is shown. But you have it that the apostles "went forth and preached everywhere, the Lord working with them, and confirming the word with signs that followed" (Mk 16:20). You have him on the mountain transfigured with stupendous brightness, and no less attested by a voice from above (Mt 17:2-5). You have at the Jordan likewise both a dove designating, and a voice testifying (Mt 3:16-17). Thus these two things everywhere equally, voice and sign, concur from divine bounty for the introduction of faith: so that a wide entrance to the soul through both windows may lie open for the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252059.html'
source_title="Sermons on the Song of Songs, Sermon 59"
