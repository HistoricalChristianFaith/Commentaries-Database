[[commentary]]
quote='''
The Bridegroom, then, is a lily, but not a lily among thorns, since he has no thorns who committed no sin. Indeed he declared the bride to be a lily among thorns; since even she, if she should say that she has no thorns, deceives herself, and the truth is not in her. But he professed himself indeed a flower and a lily, yet not among thorns. Rather he says: "I am the flower of the field and the lily of the valleys" (Song 2:1-2). And there is no mention of thorns, because he alone among men has no need to say: "I was turned in my affliction, while the thorn was fastened in me" (Ps 31:4). Therefore he is never without lilies, who is always without vices; because he is wholly and always radiant, beautiful in form beyond the sons of men (Ps 44:3). You therefore who hear or read these things, take care to have lilies in your possession, if you wish to have this dweller among lilies dwelling in you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252071.html'
source_title="Sermons on the Song of Songs, Sermon 71"

[[commentary]]
quote='''
"As the lily among thorns, so is my beloved among the daughters" (Song 2:2). Not good daughters who prick. Observe the most wretched offspring of that land of ours which was cursed. "When," he says, "you shall have cultivated it, it will bring forth thorns and thistles for you" (Gen 3:18). Therefore, as long as the soul is in the flesh, it dwells indeed among thorns; and it is necessary that it suffer the restlessness of temptations and the stings of tribulations. But if it is itself a lily according to the word of the Bridegroom, let it see how watchful and solicitous it ought to be over the guarding of itself, surrounded on all sides by thorns, extending their stings from every direction. For the tenderness of the flower in no way endures even the slightest prick of a thorn, but as soon as it is pressed even slightly, it is pierced. You perceive how rightly and necessarily the prophet exhorts us to serve the Lord in fear (Ps 2:11); and likewise the Apostle, to work out our own salvation with fear and no less trembling (Phil 2:12). They held assuredly by their own experience the truth of this judgment, inasmuch as they were friends of the Bridegroom, who in no way at all doubted that the words pertained to their own souls: "As the lily among thorns, so is my beloved among the daughters." Finally one of them says: "I was turned in my affliction, while the thorn was fastened in me" (Ps 31:4). Well fastened, he who was thereby turned. Well are you pricked, if you are pricked with compunction. Many, when they feel the punishment, correct the fault; and such a one can say: "I was turned in my affliction, while the thorn was fastened in me." A thorn is fault, a thorn is punishment, a thorn is a false brother, a thorn is an evil neighbor.

"As the lily among thorns, so is my beloved among the daughters." O gleaming lily! O tender and delicate flower! Unbelievers and subverters are with you: see how cautiously you walk among thorns. The world is full of thorns: they are in the earth, they are in the air, they are in your flesh. To dwell among these and not be harmed in the least belongs to divine power, not to your own virtue. "But be confident," he says, "because I have overcome the world" (Jn 16:33). Even if, therefore, you perceive the stings of tribulations, as of thistles, directed at you from every side, let not your heart be troubled nor let it fear, knowing that tribulation works patience, patience works proving, proving works hope, and hope does not confound (Rom 5:3-5). Consider the lilies of the field, how they flourish and shine among thorns. If God so guards the grass which today is and tomorrow is cast into the oven (Mt 6:28-30), how much more his beloved and most dear bride? Finally, "the Lord guards all who love him" (Ps 144:20). "As the lily among thorns, so is my beloved among the daughters." It is no small title of virtue indeed, to live as a good person among the depraved, and to retain the brightness of innocence and the gentleness of conduct among the malicious: and all the more if you show yourself peaceful to those who hate peace, and a friend to enemies themselves. This indeed will rightly claim for you the likeness given of the lily, by a certain right of special property, because it does not cease to illuminate and adorn with its own brightness the very thorns that prick it. Does not the lily seem to you thereby to fulfill in a certain way the perfection of the Gospel, by which we are commanded to pray for those who calumniate and persecute us, and to do good to those who hate us? (Lk 6:27-28.) Therefore do you likewise, and your soul will be a beloved of the Lord, and he will praise you concerning yourself, saying that "as the lily among thorns, so is my beloved among the daughters."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252048.html'
source_title="Sermons on the Song of Songs, Sermon 48"
