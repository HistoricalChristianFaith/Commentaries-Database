[[commentary]]
quote='''
Listen if you will know what the kiss of the mouth is: "The Father and I are one;" and again: "I am in the Father and the Father is in me." This is a kiss from mouth to mouth, beyond the claim of any creature. It is a kiss of love and of peace, but of the love which is beyond all knowledge and that peace which is so much greater than we can understand. The truth is that the things that no eye has seen, and no ear has heard, things beyond the mind of man, were revealed to Paul by God through his Spirit, that is, through him who is the kiss of his mouth. That the Son is in the Father and the Father in the Son signifies the kiss of the mouth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%25208.html'
source_title="Sermons on the Song of Songs, Sermon 8"
