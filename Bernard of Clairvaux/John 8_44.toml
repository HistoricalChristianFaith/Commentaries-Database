[[commentary]]
quote='''
But ignorance of yourself begets pride in you in this way: when your deceived and deceiving thought falsely tells you that you are better than you are. This indeed is pride, this is the beginning of all sin, when you are greater in your own eyes than before God, than in truth. And therefore he who first sinned this great sin (I speak of the devil), of him it was said that he stood not in the truth, but is a liar from the beginning; because what he was in his own thought, he was not in truth. What if he had disagreed with truth in this, that he thought himself lesser and lower than the truth held him to be? His ignorance would without doubt excuse him, and he would not at all be reckoned proud, nor would his iniquity be found so much to be for hatred, as his humility perhaps for grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252037.html'
source_title="Sermons on the Song of Songs, Sermon 37"
