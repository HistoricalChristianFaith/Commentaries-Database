[[commentary]]
quote='''
But those spiritual feet of God, which the penitent must first kiss spiritually, I ought not to pass over. I know your curiosity, which allows nothing to pass by altogether uninvestigated of its own accord. Nor indeed should it be held in contempt to know with what feet Scripture so frequently commemorates that God now stands, as there: We will worship in the place where his feet have stood (Ps 131:7); now walks, as there: And I will dwell in them, and I will walk among them (Lev 26:12; 2 Cor 6:16); now even runs, according to that: He exulted as a giant to run his course (Ps 18:6). If the Apostle rightly judged it fitting to refer the head of Christ to the Divinity (1 Cor 11:3), I think it may also not unfittingly seem to us that the feet pertain to the humanity; of which let us name the one mercy, and the other judgment. These two words are known to you; and from many places of Scripture both together, if you reflect, come to mind. That God indeed took up the foot of mercy in the flesh to which he united himself, the Epistle to the Hebrews teaches, declaring that Christ was tempted in all things according to our likeness without sin, that he might become merciful (Heb 4:15). What of that other one, which has been called judgment? Does not God the man himself openly signify that it too pertains equally to the humanity he assumed, where he declares that power to execute judgment has been given to him by the Father, because he is the Son of Man? (Jn 5:27)

With these two feet, then, fittingly coming together under the one head of the divinity, born of a woman, made under the law, the invisible Emmanuel was seen on earth and conversed with men (Bar 3:38). With these certainly he passes through even now, doing good and healing all who are oppressed by the devil, but spiritually, but invisibly. With these feet, I say, he walks through devout minds, unceasingly examining and searching the hearts and inward parts of the faithful. But see whether perhaps these are those legs of the Bridegroom which the Bride so magnificently commends in what follows, comparing them, if I am not mistaken, to marble columns set upon bases of gold (Song 5:15). Most beautifully indeed; since in the incarnate Wisdom of God, which is designated by gold, mercy and truth have met together (Ps 84:11); for all the ways of the Lord are mercy and truth (Ps 24:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%25206.html'
source_title="Sermons on the Song of Songs, Sermon 6"
