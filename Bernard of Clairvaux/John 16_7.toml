[[commentary]]
quote='''
When the disciples were sad at the departure of their Master just before his ascension, after they had heard him talk about this subject, they heard him say: "If you loved me you would rejoice because I am going to the Father." How can he say this? Didn't they love him when his departure made them so sad? In a way they loved him, and in another way they did not. Their love was more tender than prudent, it was sensual but not reasonable; they loved with the whole heart but not with the whole soul. What they loved was not for their own welfare, and so he said to them: "It is good for you that I am going," correcting not their feelings but their foresight.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252020.html'
source_title="Sermons on the Song of Songs, Sermon 20"
