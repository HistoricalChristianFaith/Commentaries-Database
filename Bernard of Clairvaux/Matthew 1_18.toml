[[commentary]]
quote='''
We read of Mary that "she was found to be with child of the Holy Spirit" (Mt 1:18). But I think the bride of the Lord has something similar in this respect to his mother. For unless she also had been found as having from the Holy Spirit, she would by no means have so familiarly inquired from those who found her concerning him whose Spirit that is. She did not wait for them to declare for what purpose they had come; she herself spoke, and indeed from the abundance of the heart: "Have you seen him whom my soul loves?" She knew that blessed were the eyes that had seen, and marveling at those who had seen, she was saying: Are you those to whom it was given to see him whom so many kings and prophets wished to see and did not see? Are you those who merited to behold Wisdom in the flesh, Truth in a body, God in a man?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252078.html'
source_title="Sermons on the Song of Songs, Sermon 78"
