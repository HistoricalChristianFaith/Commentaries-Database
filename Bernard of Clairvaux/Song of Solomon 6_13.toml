[[commentary]]
quote='''
When therefore the soul perceives in itself so great a distance of things, how should it not cry out, placed as it is between hope and despair: "Lord, who is like you?" It is drawn toward despair on account of so great an evil; but it is called back to hope by so great a good. Hence it is that the more it displeases itself in the evil which it sees in itself, the more ardently it draws itself toward the good which it equally perceives in itself, and desires to become what it was made to be: simple and upright, and fearing God, and departing from evil. Why should it not be able to recede from that to which it was able to approach? Why should it not be able to approach that from which it was able to recede? Which two things, however, I would say must be presumed from grace, not from nature, nor indeed even from industry. For "wisdom overcomes malice" (Wis 7:30), not industry or nature. Nor is the occasion for presuming lacking: its conversion is toward the Word. The noble kinship of the soul with the Word is not idle, about which we have been treating now for three days, and the persevering likeness is the witness of that kinship. The Word graciously admits into the fellowship of the Spirit one who is like in nature. And certainly by the reason of nature, like seeks like. The voice of the one seeking: "Return, O Shulamite; return, that we may behold you" (Song 6:12). He will behold the like one, he who was not beholding the unlike one; but he will also present himself to be beheld. "We know that, when he shall appear, we shall be like him, for we shall see him as he is" (1 Jn 3:2). Think therefore that that question, "Lord, who is like you?", comes more from the difficulty than from the impossibility.

Or, if you prefer this more, it is the voice of one marveling. Truly to be marveled at and wondered at is that likeness which accompanies the vision of God, or rather which is the vision of God; but I say it consists in charity. That charity is the vision, that is the likeness. Who would not be astonished at the charity of God who was spurned and yet calls back? Rightly is that wicked one reproved, who was introduced above, usurping for himself the likeness of God, when, by loving iniquity, he can neither love himself nor God: for thus you have it: "He who loves iniquity hates his own soul" (Ps 10:6). When therefore iniquity is removed from the midst, which causes the unlikeness that is partial, there will be a union of spirit, there will be a mutual vision and a mutual love. Indeed, when that which is perfect comes, that which is partial will be done away with; and there will be between them a chaste and consummated love, a full recognition, a manifest vision, a firm conjunction, an undivided fellowship, a perfect likeness. Then the soul will know, even as it is known (1 Cor 13:10, 12); then it will love, even as it is loved; and the Bridegroom will rejoice over the bride, knowing and known, loving and loved, Jesus Christ our Lord, who is God blessed above all things forever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252082.html'
source_title="Sermons on the Song of Songs, Sermon 82"
