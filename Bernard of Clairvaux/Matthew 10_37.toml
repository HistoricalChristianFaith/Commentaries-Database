[[commentary]]
quote='''
The measure of such love is this: its sweetness seizes the whole heart, and draws it completely from the love of all flesh and every sensual pleasure. Really this is what it means to love with the whole heart. If I prefer to the humanity of my Lord someone joined to me by ties of blood, or some sensual pleasure, this would obviously prove that I do not love with my whole heart since it is divided between its own interests and the love of the one who taught me as a man, both by his words and examples. Would I not seem to give my love partly to him and partly to my own? As he once said: "Whoever loves father or mother more than me is not worthy of me, and whoever loves son or daughter more than me is not worthy of me." To put it briefly, to love with the whole heart means to put the love of his sacred humanity before everything that tempts us, from within or without. Among these temptations we must also count the glory of the world, because its glory is that of the flesh, and those who delight in it without a doubt are men of the flesh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252020.html'
source_title="Sermons on the Song of Songs, Sermon 20"
