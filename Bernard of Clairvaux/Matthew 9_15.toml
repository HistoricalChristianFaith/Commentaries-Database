[[commentary]]
quote='''
For while each holy soul was sighing for the presence of Christ, bearing with difficulty the delay of the kingdom, greeting from afar the desired homeland with groans and sighs: does it not seem to you that any soul that had so acted on earth was fulfilling the role of the groaning and most chaste turtledove? From that time therefore and henceforth the voice of the turtledove has been heard in our land. Why should not the absence of Christ move me to frequent tears and daily groaning! "Lord, before you is all my desire, and my groaning is not hidden from you" (Ps 37:10). "I have labored in my groaning," you know; but blessed is he who was able to say: "I will wash my bed every night, with my tears I will drench my couch" (Ps 6:7). And not only for me, but also for all who love his coming, these groanings have been experienced. For this is what he himself was saying. "Can the sons of the bridegroom mourn," he says, "as long as the bridegroom is with them? But the days will come, when the bridegroom shall be taken from them, and then they will mourn" (Mt 9:15); as if he were saying: And then the voice of the turtledove will be heard.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252059.html'
source_title="Sermons on the Song of Songs, Sermon 59"
