[[commentary]]
quote='''
For what else sounded to you from the lecture hall of Christ, when just a little while ago it was proclaimed: "He who loves his soul shall lose it"? (Jn 12:25.) "He shall lose it," he said, whether by laying it down as a martyr, or by afflicting it as a penitent. Although it is a kind of martyrdom to mortify the deeds of the flesh by the spirit; milder indeed in horror than that in which the limbs are cut by the sword, but more troublesome by reason of its duration. Do you see that by this judgment of my Master the wisdom of the flesh is condemned, through which either one flows away into the excess of pleasure, or even a good state of bodily health is desired beyond what is fitting? Indeed, that true wisdom does not flow out into pleasures, you have heard from the Wise Man, that it is "not even to be found in the land of those who live pleasantly" (Job 28:13). But he who found it says: "Beyond health and all beauty I loved wisdom" (Wis 7:10). If beyond health and beauty, how much more beyond pleasure and baseness?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252030.html'
source_title="Sermons on the Song of Songs, Sermon 30"
