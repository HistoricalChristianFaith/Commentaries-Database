[[commentary]]
quote='''
The soul is great in that it is capable of eternal things, and upright in that it desires heavenly things: the soul which does not seek or savor the things that are above, but the things that are upon the earth, is plainly not upright, but crooked, even though on account of this it does not cease to be great, remaining as it does even so capable of eternity. For it will never at any time not be capable of eternity, even if it never shall have been actually possessing it, so that it may be as it is written: "Surely man passes through as an image"; yet only in part, so that the eminence of the Word may be apparent from its very wholeness. For in what respect could the Word fall from being great or upright, since it so possesses these things that it is what it has? Or it is in part for this reason: lest, if the soul were deprived of the whole, no hope of salvation would remain. For if it should cease to be great, it would also cease to be capable. For the greatness of the soul, as I said, is estimated from its capacity. But what could it hope for, of which it were not capable?

And so through the greatness which it retains even when uprightness is lost, man passes through as an image, limping as it were on one foot, and become an alien son. For of such I believe it was said: "The alien sons have lied to me, the alien sons have grown old, and they have limped from their paths." Fittingly they are called alien sons: for sons, on account of the greatness they have retained; aliens, on account of the uprightness they have lost. Nor would he have said "they limped," but rather "they fell," or something similar, if men had entirely put off the image. But as things stand, according to greatness indeed man passes through as an image; but as far as uprightness is concerned, as one limping, he is troubled and cast down from the image, Scripture speaking thus: "Surely man passes through as an image; but indeed he is troubled in vain." In vain altogether: for it follows: "He heaps up treasure, and knows not for whom he gathers it." Why does he not know, unless because, bending himself down to these lowest and earthly things, he heaps up earth for himself? Assuredly he does not know, concerning those things which he commits to the earth, for whom he gathers them: whether for the moth that destroys, or for the thief that digs through; for the enemy that plunders, or for the fire that devours.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252080.html'
source_title="Sermons on the Song of Songs, Sermon 80"
