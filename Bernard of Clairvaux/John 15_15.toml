[[commentary]]
quote='''
Nor is John the only one, it is true also of all to whom the Angel of the Great Counsel said: "I call you friends, because I have made known to you everything I have learnt from my Father." Paul drank of it, because the Good News he preached is not a human message nor did he receive it through men, it is something he learned only through a revelation of Jesus Christ.

All of these indeed could say with felicity and truth: "It is the only Son who is in the Father's bosom who has made it known to us." And this revelation -- what can you call it but a kiss? But it was the kiss of the kiss, not of the mouth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%25208.html'
source_title="Sermons on the Song of Songs, Sermon 8"
