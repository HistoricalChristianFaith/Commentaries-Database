[[commentary]]
quote='''
"Who shall ascend the mountain of the Lord?" To the summit of this mountain, that is, to the perfection of virtue, whoever undertakes to strive, will know indeed how arduous the ascent is, and how vain the effort without the help of the Word. Happy the soul which, with the angels beholding, furnished both joy and wonder at itself, so that it might hear them speaking of it: "Who is this who ascends from the desert, abounding in delights, leaning upon her beloved?" (Song 8:5). Otherwise one strives in vain, if one does not lean upon him. Indeed even leaning against herself she will grow strong, and made stronger than herself she will compel all things for the sake of reason: anger, fear, desire, and joy, as if a certain chariot of the soul, the good charioteer will govern; and will bring into captivity every carnal affection and carnal sense, at the nod of reason, into the obedience of virtue. Why should not all things be possible for one who leans upon him who can do all things? How confident is the voice: "I can do all things in him who strengthens me!" (Phil 4:13). Nothing makes the omnipotence of the Word more clear than this, that it makes all who hope in it omnipotent. Indeed "all things are possible for the one who believes" (Mk 9:22). Is not the one to whom all things are possible omnipotent? So the soul, if it does not presume of itself, but is strengthened by the Word, will be able indeed to have dominion over itself, so that no injustice may have dominion over it. So, I say, leaning upon the Word, and clothed with virtue from on high, no force, no fraud, no allurement will any longer be able either to cast down the one who stands or to subjugate the one who rules.

Do you wish not to fear the pusher? "Let not the foot of pride come upon you, and the hand of the one who pushes will not move you. There they fell, those who work iniquity" (Ps 35:13). There the devil and his angels fell, who, although not pushed from without, were nevertheless expelled and could not stand. Indeed "he did not stand in the truth" who did not lean upon the Word, who trusted in his own virtue. And therefore perhaps he wished to sit, because he was not able to stand. For he was saying: "I will sit upon the mountain of the covenant" (Isa 14:13). But, with God judging otherwise, he neither stood nor sat, but fell, the Lord saying: "I saw Satan falling from heaven like lightning" (Lk 10:18). Therefore let him who stands, if he does not wish to fall, not trust in himself, but lean upon the Word. The Word speaks: "Without me you can do nothing" (Jn 15:5). So it is: neither to rise to the good nor to stand in the good can we do without the Word. You therefore who stand, give glory to the Word, and say: "He set my feet upon a rock, and directed my steps" (Ps 39:3). By whose hand you are raised up, by his virtue you must needs be held. This I say in support of what I said, that we have need of the Word, upon whom we may lean for virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252085.html'
source_title="Sermons on the Song of Songs, Sermon 85"
