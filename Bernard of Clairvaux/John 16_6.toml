[[commentary]]
quote='''
They could not even bear to hear a word of his approaching passion and death, although this was to be their salvation. Even after it had all happened they could not gaze upon the glory of his ascension without deep sorrow. This is why Christ said to them: "Because I have said this to you sadness has filled your hearts." So it was only by his physical presence that their hearts were detached from carnal loves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252020.html'
source_title="Sermons on the Song of Songs, Sermon 20"
