[[commentary]]
quote='''
Moreover, the Bride has spoken more rightly, and not putting forward merit but setting forth the benefit first, and confessing that she has been preceded by the grace of the beloved. Rightly indeed. For "who has first given to him, and it shall be recompensed to him?" (Rom 11:35.) Finally, hear John, what he perceived in his Epistle on this matter. "In this is love," he says, "not as though we have loved God, but that he first loved us" (1 Jn 4:10). The Prophet, however, even if he was silent about the anticipation of grace, did not deny the following thereof: plainly he was not silent. But receive in another place his more certain confession concerning this matter. "And your mercy," he says (he was speaking to the Lord), "will follow me all the days of my life" (Ps 22:6). Hear also concerning the anticipation, his no less certain and manifest knowledge. "My God," he says, "his mercy will anticipate me" (Ps 58:11); likewise to the Lord: "Quickly," he says, "let your mercies anticipate us, for we have become exceedingly poor" (Ps 78:8). Beautifully the Bride later, if I am not mistaken, places these same words not in the same order, but she too follows the order of the Prophet, speaking in this manner: "I to my beloved, and my beloved to me." Why so? Surely so that she may then prove herself the more full of grace, when she shall have given all to grace, and ascribed to it, of course, both the first and the last parts. Otherwise, how full of grace, if she has anything that is not from grace? There is no place for grace to enter where merit has already occupied. Therefore the full confession of grace marks the fullness of grace itself in the soul of the one confessing. For if anything of one's own is present, to that extent grace must yield to it. Whatever you assign to merits is lacking to grace. I do not want the merit that excludes grace. I shudder at whatever is of my own, insofar as it makes me my own, except that perhaps that is more mine which makes me mine. Grace returns me to myself, justified freely, and so freed from the servitude of sin. For where the Spirit is, there is liberty.

She who is truly the Bride recognizes these things and confesses both graces: first indeed, that which is first, by which she was also anticipated; and afterward, the subsequent one as well. And so she says now: "My beloved to me, and I to him"; assigning the beginning to the beloved. In what follows: "I," she says, "to my beloved, and my beloved to me"; granting the consummation to him equally.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252067.html'
source_title="Sermons on the Song of Songs, Sermon 67"
