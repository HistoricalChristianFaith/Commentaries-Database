[[commentary]]
quote='''
For the favor of the kiss bears with it a twofold gift, the light of knowledge and the fervor of devotion. He is in truth the Spirit of wisdom and insight, who, like the bee carrying its burden of wax and honey, is fully equipped with the power both of kindling the light of knowledge and infusing the delicious nurture of grace. Two kinds of people therefore may not consider themselves to have been gifted with the kiss, those who know the truth without loving it, and those who love it without understanding it; from which we conclude that this kiss leaves room neither for ignorance nor for lukewarmness.

So therefore, let the bride about to receive the twofold grace of this most holy kiss set her two lips in readiness, her reason for the gift of insight, her will for that of wisdom, so that overflowing with joy in the fullness of this kiss, she may be privileged to hear the words: "Your lips are moist with grace, for God has blessed you forever."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%25208.html'
source_title="Sermons on the Song of Songs, Sermon 8"
