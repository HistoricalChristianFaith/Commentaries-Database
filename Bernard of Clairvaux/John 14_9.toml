[[commentary]]
quote='''
The bride has no doubt that if he will reveal himself to anybody, it will be to her. Therefore, she dares to ask for this kiss, actually for that Spirit in whom both the Father and the Son will reveal themselves to her. For it is not possible that one of these could be known without the other. That is why Christ said: "To have seen me is to have seen the Father;" and John in his turn: "No one who has the Father can deny the Son, and to acknowledge the Son is to have the Father as well." From these declarations it is clearly evident that the Father cannot be known apart from the Son, nor the Son apart from the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%25208.html'
source_title="Sermons on the Song of Songs, Sermon 8"
