[[commentary]]
quote='''
Afterwards he showed them a higher degree of love when he said, "It is the Spirit who gives life, the flesh profits nothing." Perhaps this was also true of the Prophet who said: "A Spirit before our face is Christ the Lord." When he adds: "Under his shadow we will live among the heathens," he seems to me to speak on behalf of the beginners, in order that they may at least rest in the shade since they know they are not strong enough to bear the heat of the sun. They may be nourished by the sweetness of his humanity since they are not yet able to perceive the things which are of the Spirit of God. The shade of Christ, I suggest, is his flesh which overshadowed Mary and tempered for her the bright splendor of the Spirit. Therefore in this human devotion there is in the meantime consolation for whomever does not as yet have the Spirit which gives life. For there is no love of Christ at all without the Holy Spirit, even if this love is in the flesh, and without its fullness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252020.html'
source_title="Sermons on the Song of Songs, Sermon 20"


[[commentary]]
quote='''
I do not mean that he who is God is not also man, for the one Christ is both God and man; I mean that all things which are good, even those of which man is the agent, really come from God rather than man. "It is the spirit," we are told, "that gives life, the flesh has nothing to offer." Hence there is a curse on the man who puts his trust in man, for although our whole hope rightly depends on God made man, it is not because he is man but because he is God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252010.html'
source_title="Sermons on the Song of Songs, Sermon 10"
