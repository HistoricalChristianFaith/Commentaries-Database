[[commentary]]
quote='''
Unhesitatingly I answer: "It is the only Son, who is in the Father's bosom who has made it known." But he has made it known, I will say, not to the sorry and unworthy creature that I am, but to John, the Bridegroom's friend, whose words these are; and not only to him but to John the Evangelist also, the disciple Jesus loved. For his soul was pleasing to the Lord, entirely worthy both of the name and the dowry of a bride, worthy of the Bridegroom's embraces, worthy that is, of leaning back on Jesus' breast. John imbibed from the heart of the only-begotten Son what he in turn had imbibed from the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%25208.html'
source_title="Sermons on the Song of Songs, Sermon 8"
