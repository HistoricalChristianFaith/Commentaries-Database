[[commentary]]
quote='''
Later, robed with strength from on high according to the promise of Jesus Christ, Peter began to love with such strength that when forbidden by the Council to proclaim the holy Name, he boldly answered those who gave the order: "We must obey God rather than men." Then finally he attained the fullness of love, when for love's sake he would not spare even his own life. Truly "greater love than this no man has, than that he lay down his life for his friends." Even if Peter did not actually surrender his life then, he did offer it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bernard%2520of%2520Clairvaux%2FSermons%2520on%2520the%2520Song%2520of%2520Songs%2FSermon%252020.html'
source_title="Sermons on the Song of Songs, Sermon 20"
