[[commentary]]
quote='''
We have grown to associate morality in a book with a kind of optimism and prettiness; according to us, a moral book is a book about moral people. But the old idea was almost exactly the opposite; a moral book was a book about immoral people. ... Telling the truth about the terrible struggle of the human soul is surely a very elementary part of the ethics of honesty. If the characters are not wicked, the book is.
'''
source_url=''
source_title='All Things Considered, Tom Jones and Morality (1908)'
