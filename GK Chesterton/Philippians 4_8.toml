[[commentary]]
quote='''
One of the wise and awful truths which this brown-paper art reveals, is this, that white is a colour. It is not a mere absence of colour; it is a shining and affirmative thing, as fierce as red, as definite as black. When, so to speak, your pencil grows red-hot, it draws roses; when it grows white-hot, it draws stars. And one of the two or three defiant verities of the best religious morality, of real Christianity, for example, is exactly this same thing; the chief assertion of religious morality is that white is a colour. Virtue is not the absence of vices or the avoidance of moral dangers; virtue is a vivid and separate thing, like pain or a particular smell. Mercy does not mean not being cruel or sparing people revenge or punishment; it means a plain and positive thing like the sun, which one has either seen or not seen. Chastity does not mean abstention from sexual wrong; it means something flaming, like Joan of Arc.
'''
source_url=''
source_title='Tremendous Trifles, A Piece of Chalk (1909)'

[[commentary]]
quote='''
But this advantage the mystic morality must always have—it is always jollier. A young man may keep himself from vice by continually thinking of disease. He may keep himself from it also by continually thinking of the Virgin Mary. There may be question about which method is the more reasonable, or even about which is the more efficient. But surely there can be no question about which is the more wholesome.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 2: On the Negative Spirit (1905)'

[[commentary]]
quote='''
One of the thousand objections to the sin of pride lies precisely in this, that self-consciousness of necessity destroys self-revelation. A man who thinks a great deal about himself will try to be many-sided, attempt a theatrical excellence at all points, will try to be an encyclopaedia of culture, and his own real personality will be lost in that false universalism. Thinking about himself will lead to trying to be the universe; trying to be the universe will lead to ceasing to be anything. If, on the other hand, a man is sensible enough to think only about the universe; he will think about it in his own individual way. He will keep virgin the secret of God; he will see the grass as no other man can see it, and look at a sun that no man has ever known.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 9: The Moods of Mr. George Moore (1905)'
