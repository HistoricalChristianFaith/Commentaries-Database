[[commentary]]
quote='''
I stared stupidly round, racking my brain for expedients. Then I suddenly stood up and roared with laughter, again and again, so that the cows stared at me and called a committee. Imagine a man in the Sahara regretting that he had no sand for his hour-glass. Imagine a gentleman in mid-ocean wishing that he had brought some salt water with him for his chemical experiments. I was sitting on an immense warehouse of white chalk. The landscape was made entirely out of white chalk. White chalk was piled more miles until it met the sky. I stooped and broke a piece off the rock I sat on; it did not mark so well as the shop chalks do; but it gave the effect.
'''
source_url=''
source_title='Tremendous Trifles, A Piece of Chalk (1909)'

[[commentary]]
quote='''
Can you not see that fairy tales in their essence are quite solid and straightforward; but that this everlasting fiction about modern life is in its nature essentially incredible? Folk-lore means that the soul is sane, but that the universe is wild and full of marvels. Realism means that the world is dull and full of routine, but that the soul is sick and screaming. The problem of the fairy tale is--what will a healthy man do with a fantastic world? The problem of the modern novel is--what will a madman do with a dull world? In the fairy tales the cosmos goes mad; but the hero does not go mad. In the modern novels the hero is mad before the book begins, and suffers from the harsh steadiness and cruel sanity of the cosmos.
'''
source_url=''
source_title="Tremendous Trifles, The Dragon's Grandmother (1909)"

[[commentary]]
quote='''
You cannot see a wind; you can only see that there is a wind. So, also, you cannot see a revolution; you can only see that there is a revolution. And there never has been in the history of the world a real revolution, brutally active and decisive, which was not preceded by unrest and new dogma in the reign of invisible things. All revolutions began by being abstract. Most revolutions began by being quite pedantically abstract.
'''
source_url=''
source_title='Tremendous Trifles, The Wind and the Trees (1909)'

[[commentary]]
quote='''
The Fabian argument of the expert, that the man who is trained should be the man who is trusted would be absolutely unanswerable if it were really true that a man who studied a thing and practiced it every day went on seeing more and more of its significance. But he does not. He goes on seeing less and less of its significance. In the same way, alas! we all go on every day, unless we are continually goading ourselves into gratitude and humility, seeing less and less of the significance of the sky or the stones.
'''
source_url=''
source_title='Tremendous Trifles, The Twelve Men (1909)'

[[commentary]]
quote='''
The sun by this time was a blazing fact; and I saw that all Nature is chivalrous and militant. We do wrong to seek peace in Nature; we should rather seek the nobler sort of war; and see all the trees as green banners... "Whom can I pay for my own superb experience? What is the usual charge for seeing the clouds shattered by the sun? What is the market price of a tree blue on the sky-line and then blinding white in the sun? Mention your price for that windmill that stood behind the hollyhocks in the garden. Let me pay you for..."
'''
time=1909
source_url=''
source_title='Tremendous Trifles, A Cab Ride Across Country (1909)'

[[commentary]]
quote='''
He who holds the Christian and Catholic view of human nature will feel certain that it is a universal and therefore a sane view, and will be satisfied. But if he has lost the sane vision, he can only get it back by something very like a mad vision; that is, by seeing man as a strange animal and realising how strange an animal he is. But just as seeing the horse as a prehistoric prodigy ultimately led back to, and not away from, an admiration for the mastery of man, so the really detached consideration of the curious career of man will lead back to, and not away from, the ancient faith in the dark designs of God. In other words, it is exactly when we do see how queer the quadruped is that we praise the man who mounts him; and exactly when we do see how queer the biped is that we praise the Providence that made him.
'''
source_url=''
source_title='The Everlasting Man, Introduction: The Plan of This Book (1925)'

[[commentary]]
quote='''
Nor could any one imagine any connection between corn and dreams and an old chief with a spear, unless there was already a common feeling to include them all. But if there was such a common feeling it could only be the religious feeling; and these things could not be the beginnings of a religious feeling that existed already. I think anybody’s common sense will tell him that it is far more likely that this sort of mystical sentiment did exist already; and that in the light of it dreams and kings and cornfields could appear mystical then, as they can appear mystical now.
'''
source_url=''
source_title='The Everlasting Man, Part 1 Ch. 2: Professors and Prehistoric Men'

[[commentary]]
quote='''
Possibly the most pathetic of all the delusions of the modern students of primitive belief is the notion they have about the thing they call anthropomorphism. They believe that primitive men attributed phenomena to a god in human form in order to explain them, because his mind in its sullen limitation could not reach any further than his own clownish existence. The thunder was called the voice of a man, the lightning the eyes of a man, because by this explanation they were made more reasonable and comfortable. The final cure for all this kind of philosophy is to walk down a lane at night. Any one who does so will discover very quickly that men pictured something semi-human at the back of all things, not because such a thought was natural, but because it was supernatural; not because it made things more comprehensible, but because it made them a hundred times more incomprehensible and mysterious. For a man walking down a lane at night can see the conspicuous fact that as long as nature keeps to her own course, she has no power with us at all. As long as a tree is a tree, it is a top-heavy monster with a hundred arms, a thousand tongues, and only one leg. But so long as a tree is a tree, it does not frighten us at all. It begins to be something alien, to be something strange, only when it looks like ourselves. When a tree really looks like a man our knees knock under us. And when the whole universe looks like a man we fall on our faces.
'''
time=1905
source_url=''
source_title='Heretics, Chapter XI: Science and the Savages (1905)'

[[commentary]]
quote='''
I had always vaguely felt facts to be miracles in the sense that they are wonderful: now I began to think them miracles in the stricter sense that they were wilful. I mean that they were, or might be, repeated exercises of some will. In short, I had always believed that the world involved magic: now I thought that perhaps it involved a magician. And this pointed a profound emotion always present and sub-conscious; that this world of ours has some purpose; and if there is a purpose, there is a person. I had always felt life first as a story: and if there is a story there is a story-teller.
'''
source_url=''
source_title='Orthodoxy, Ch. 4: The Ethics of Elfland (1908)'
