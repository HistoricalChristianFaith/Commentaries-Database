[[commentary]]
quote='''
International peace means a peace between nations, not a peace after the destruction of nations, like the Buddhist peace after the destruction of personality. The golden age of the good European is like the heaven of the Christian: it is a place where people will love each other; not like the heaven of the Hindu, a place where they will be each other.
'''
source_url=''
source_title="All Things Considered, French and English (1908)"

[[commentary]]
quote='''
Happy is he and more than wise
Who sees with wondering eyes and clean
The world through all the grey disguise
Of sleep and custom in between.
Yes; we may pass the heavenly screen,
But shall we know when we are there?
Who know not what these dead stones mean,
The lovely city of Lierre.
'''
source_url=''
source_title='Tremendous Trifles, The Ballade of a Strange Town (1909)'
