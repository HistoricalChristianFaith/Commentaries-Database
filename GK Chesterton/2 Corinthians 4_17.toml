[[commentary]]
quote='''
The truth is that the special impressiveness which does come from being persecuted only happens in the case of extreme persecution. For the fact that the modern enthusiast will undergo some inconvenience for the creed he holds only proves that he does hold it, which no one ever doubted. ... Pagans were not impressed by the torture of Christians merely because it showed that they honestly held their opinion; they knew that millions of people honestly held all sorts of opinions. The point of such extreme martyrdom is much more subtle. It is that it gives an appearance of a man having something quite specially strong to back him up, of his drawing upon some power. And this can only be proved when all his physical contentment is destroyed; when all the current of his bodily being is reversed and turned to pain.
'''
source_url=''
source_title="All Things Considered, The Modern Martyr (1908)"
