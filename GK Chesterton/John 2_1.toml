[[commentary]]
quote='''
The primary laws of man are to be found in the permanent life of man; in those things that have been common to it in every time and land, though in the highest civilisation they have reached an enrichment like that of the divine romance of Cana in Galilee. We know that many critics of such a story say that its elements are not permanent; but indeed it is the critics who are not permanent. A hundred mad dogs of heresy have worried man from the beginning; but it was always the dog that died. We know there is a school of prigs who disapprove of the wine; and there may now be a school of prigs who disapprove of the wedding. For in such a case as the story of Cana, it may be remarked that the pedants are prejudiced against the earthly elements as much as, or more than, the heavenly elements. It is not the supernatural that disgusts them, so much as the natural. And those of us who have seen all the normal rules and relations of humanity uprooted by random speculators, as if they were abnormal abuses and almost accidents, will understand why men have sought for something divine if they wished to preserve anything human. They will know why common sense, cast out from some academy of fads and fashions conducted on the lines of a luxurious madhouse, has age after age sought refuge in the high sanity of a sacrament.
'''
source_url=''
source_title='The Superstition of Divorce, Ch. 8: The Vista of Divorce (1920)'
