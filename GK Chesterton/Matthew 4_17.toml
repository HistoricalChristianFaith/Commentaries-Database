[[commentary]]
quote = "I think that we must always conceive of that which is the goal of all our endeavours as something which is in some strange way near. Science boasts of the distance of its stars; of the terrific remoteness of the things of which it has to speak. But poetry and religion always insist upon the proximity, the almost menacing closeness of the things with which they are concerned. Always the Kingdom of Heaven is 'At Hand'; and Looking-glass Land is only through the looking-glass. So I for one should never be astonished if the next twist of a street led me to the heart of that maze in which all the mystics are lost."
source_title = "Tremendous Trifles, XXXV: A Glimpse of My Country"
source_url = ""
