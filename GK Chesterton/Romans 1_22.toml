[[commentary]]
quote='''
Henceforward, when the modern philosophers come to me with their new religions (and there is always a kind of queue of them waiting all the way down the street) I shall anticipate their circumlocutions and be able to cut them short with a single inspired word. One of them will begin, "The New Religion, which is based upon that Primordial Energy in Nature...." "Methuselahite," I shall say sharply; "good morning." "Human Life," another will say, "Human Life, the only ultimate sanctity, freed from creed and dogma...." "Methuselahite!" I shall yell. "Out you go!" "My religion is the Religion of Joy," a third will explain (a bald old man with a cough and tinted glasses), "the Religion of Physical Pride and Rapture, and my...." "Methuselahite!" I shall cry again, and I shall slap him boisterously on the back, and he will fall down.
'''
source_url=''
source_title="All Things Considered, The Methuselahite (1908)"

[[commentary]]
quote='''
I remember once arguing with an honest young atheist, who was very much shocked at my disputing some of the assumptions which were absolute sanctities to him (such as the quite unproved proposition of the independence of matter and the quite improbable proposition of its power to originate mind), and he at length fell back upon this question, which he delivered with an honourable heat of defiance and indignation: "Well, can you tell me any man of intellect, great in science or philosophy, who accepted the miraculous?" I said, "With pleasure. Descartes, Dr. Johnson, Newton, Faraday, Newman, Gladstone, Pasteur, Browning, Brunetiere—as many more as you please." To which that quite admirable and idealistic young man made this astonishing reply—"Oh, but of course they had to say that; they were Christians." First he challenged me to find a black swan, and then he ruled out all my swans because they were black. The argument thus stood in a charmingly convenient form: "All men that count have come to my conclusion; for if they come to your conclusion they do not count."
'''
source_url=''
source_title="All Things Considered, The Error of Impartiality (1908)"

[[commentary]]
quote='''
The Renan-France method is simply this: you explain supernatural stories that have some foundation simply by inventing natural stories that have no foundation. ... It is no exaggeration to say that this is the manner of M. Anatole France in dealing with Joan of Arc. Because her miracle is incredible to his somewhat old-fashioned materialism, he does not therefore dismiss it and her to fairyland with Jack and the Beanstalk. He tries to invent a real story, for which he can find no real evidence. He produces a scientific explanation which is quite destitute of any scientific proof.
'''
source_url=''
source_title='All Things Considered, The Maid of Orleans (1908)'

[[commentary]]
quote='''
Heavens! to think of the dull rut of the sceptics who go on asking whether we possess a future life. The exciting question for real scepticism is whether we possess a past life. What is a minute ago, rationalistically considered, except a tradition and a picture? In that moment the universe and the stars swung just a hair's breadth from their balance, and the foundations of the earth were moved. But for the same reason that I believe in Democracy, for the same reason that I believe in free will, for the same reason that I believe in fixed character of virtue, the reason that could only be expressed by saying that I do not choose to be a lunatic, I continued to believe that this honest cabman was wrong.
'''
time=1909
source_url=''
source_title='Tremendous Trifles, The Extraordinary Cabman (1909)'

[[commentary]]
quote='''
Now, one of these four or five paradoxes which should be taught to every infant prattling at his mother’s knee is the following: That the more a man looks at a thing, the less he can see it, and the more a man learns a thing the less he knows it. The Fabian argument of the expert, that the man who is trained should be the man who is trusted would be absolutely unanswerable if it were really true that a man who studied a thing and practiced it every day went on seeing more and more of its significance. But he does not. He goes on seeing less and less of its significance. In the same way, alas! we all go on every day, unless we are continually goading ourselves into gratitude and humility, seeing less and less of the significance of the sky or the stones.
'''
source_url=''
source_title='Tremendous Trifles, The Twelve Men (1909)'

[[commentary]]
quote='''
Evolution really is mistaken for explanation. It has the fatal quality of leaving on many minds the impression that they do understand it and everything else; just as many of them live under a sort of illusion that they have read the Origin of Species.
'''
time=1925
source_url=''
source_title='The Everlasting Man, Chapter I: The Man in the Cave (1925)'
