[[commentary]]
quote='''
If you really read the fairy-tales, you will observe that one idea runs from one end of them to the other—the idea that peace and happiness can only exist on some condition. This idea, which is the core of ethics, is the core of the nursery-tales. The whole happiness of fairyland hangs upon a thread, upon one thread. Cinderella may have a dress woven on supernatural looms and blazing with unearthly brilliance; but she must be back when the clock strikes twelve. The king may invite fairies to the christening, but he must invite all the fairies or frightful results will follow. Bluebeard's wife may open all doors but one. A promise is broken to a cat, and the whole world goes wrong. A promise is broken to a yellow dwarf, and the whole world goes wrong. A girl may be the bride of the God of Love himself if she never tries to see him; she sees him, and he vanishes away. A girl is given a box on condition she does not open it; she opens it, and all the evils of this world rush out at her. A man and woman are put in a garden on condition that they do not eat one fruit: they eat it, and lose their joy in all the fruits of the earth.

This great idea, then, is the backbone of all folk-lore—the idea that all happiness hangs on one thin veto; all positive joy depends on one negative. ... It is surely obvious that all ethics ought to be taught to this fairy-tale tune; that, if one does the thing forbidden, one imperils all the things provided. ... Instead of finding (like common books of ethics) a rationalistic basis for each Commandment, they find the great mystical basis for all Commandments. We are in this fairyland on sufferance; it is not for us to quarrel with the conditions under which we enjoy this wild vision of the world. The vetoes are indeed extraordinary, but then so are the concessions. The idea of property, the idea of some one else's apples, is a rum idea; but then the idea of there being any apples is a rum idea. It is strange and weird that I cannot with safety drink ten bottles of champagne; but then the champagne itself is strange and weird, if you come to that. If I have drunk of the fairies' drink it is but just I should drink by the fairies' rules.
'''
source_url=''
source_title='All Things Considered, Fairy Tales (1908)'

[[commentary]]
quote='''
It is logically possible, to play croquet too well to enjoy it at all. If you could put this blue ball through that distant hoop as easily as you could pick it up with your hand, then you would not put it through that hoop any more than you pick it up with your hand; it would not be worth doing. If you could play unerringly you would not play at all. The moment the game is perfect the game disappears.
'''
source_url=''
source_title='Tremendous Trifles, The Perfect Game (1909)'

[[commentary]]
quote='''
Any one can see it who will simply read "Grimm's Fairy Tales" or the fine collections of Mr. Andrew Lang. For the pleasure of pedantry I will call it the Doctrine of Conditional Joy. Touchstone talked of much virtue in an "if"; according to elfin ethics all virtue is in an "if." The note of the fairy utterance always is, "You may live in a palace of gold and sapphire, if you do not say the word 'cow'"; or "You may live happily with the King's daughter, if you do not show her an onion." The vision always hangs upon a veto. All the dizzy and colossal things conceded depend upon one small thing withheld. All the wild and whirling things that are let loose depend upon one thing that is forbidden. Mr. W.B. Yeats, in his exquisite and piercing elfin poetry, describes the elves as lawless; they plunge in innocent anarchy on the unbridled horses of the air--

"Ride on the crest of the dishevelled tide, And dance upon the mountains like a flame."

It is a dreadful thing to say that Mr. W.B. Yeats does not understand fairyland. But I do say it. He is an ironical Irishman, full of intellectual reactions. He is not stupid enough to understand fairyland. Fairies prefer people of the yokel type like myself; people who gape and grin and do as they are told. Mr. Yeats reads into elfland all the righteous insurrection of his own race. But the lawlessness of Ireland is a Christian lawlessness, founded on reason and justice. The Fenian is rebelling against something he understands only too well; but the true citizen of fairyland is obeying something that he does not understand at all. In the fairy tale an incomprehensible happiness rests upon an incomprehensible condition. A box is opened, and all evils fly out. A word is forgotten, and cities perish. A lamp is lit, and love flies away. A flower is plucked, and human lives are forfeited. An apple is eaten, and the hope of God is gone.

This is the tone of fairy tales, and it is certainly not lawlessness or even liberty, though men under a mean modern tyranny may think it liberty by comparison. People out of Portland Gaol might think Fleet Street free; but closer study will prove that both fairies and journalists are the slaves of duty. Fairy godmothers seem at least as strict as other godmothers. Cinderella received a coach out of Wonderland and a coachman out of nowhere, but she received a command--which might have come out of Brixton--that she should be back by twelve. Also, she had a glass slipper; and it cannot be a coincidence that glass is so common a substance in folk-lore. This princess lives in a glass castle, that princess on a glass hill; this one sees all things in a mirror; they may all live in glass houses if they will not throw stones. For this thin glitter of glass everywhere is the expression of the fact that the happiness is bright but brittle, like the substance most easily smashed by a housemaid or a cat. And this fairy-tale sentiment also sank into me and became my sentiment towards the whole world. I felt and feel that life itself is as bright as the diamond, but as brittle as the window-pane; and when the heavens were compared to the terrible crystal I can remember a shudder. I was afraid that God would drop the cosmos with a crash.
'''
source_url=''
source_title='Orthodoxy, Ch. 4: The Ethics of Elfland (1908)'

[[commentary]]
quote='''
Strangely enough, in a sense, the forbidden fruit is often more fruitful than the free. It is more fruitful in the sense of a fascinating botanical study of why it is really poisonous. Thus, for the sake of an example, all healthy people have an instinct against usury; and the Church has only confirmed that instinct. But to learn how to define usury, to study what it is and to argue why it is wrong, is to have a liberal education, not only in political economy, but in the philosophy of Aristotle and the history of the Councils of Lateran. There almost always is a human reason for all the merely human advice given by the Church to humanity; and to find out the principle of the thing is, among other things, one of the keenest of intellectual pleasures. But in any case the fact remains that the Church is right in the main in being tolerant in the main; but that where she is intolerant she is most right and even most reasonable. Adam lived in a garden where a thousand mercies were granted to him; but the one inhibition was the greatest mercy of all.
'''
source_url=''
source_title='The Catholic Church and Conversion, Ch. 5: The Exception Proves the Rule (1926)'

[[commentary]]
quote='''
A charter is the expression of an idea still true and then almost universal: that authority is necessary for nothing so much as for the granting of liberties. Like everything mediæval, it ramified back to a root in religion; and was a sort of small copy of the Christian idea of man's creation. Man was free, not because there was no God, but because it needed a God to set him free. By authority he was free. By authority the craftsmen of the guilds were free. Many other great philosophers took and take the other view: the Lucretian pagans, the Moslem fatalists, the modern monists and determinists, all roughly confine themselves to saying that God gave man a law. The mediæval Christian insisted that God gave man a charter. Modern feeling may not sympathise with its list of liberties, which included the liberty to be damned; but that has nothing to do with the fact that it was a gift of liberties and not of laws. This was mirrored, however dimly, in the whole system. There was a great deal of gross inequality; and in other aspects absolute equality was taken for granted. But the point is that equality and inequality were ranks--or rights. There were not only things one was forbidden to do; but things one was forbidden to forbid. A man was not only definitely responsible, but definitely irresponsible. The holidays of his soul were immovable feasts. All a charter really meant lingers alive in that poetic phrase that calls the wind a “chartered” libertine.

Lie awake at night and hear the wind blowing; hear it knock at every man's door and shout down every man's chimney. Feel how it takes liberties with everything, having taken primary liberty for itself; feel that the wind is always a vagabond and sometimes almost a housebreaker. But remember that in the days when free men had charters, they held that the wind itself was wild by authority; and was only free because it had a father.
'''
source_url=''
source_title='A Miscellany of Men, The Chartered Libertine (1912)'
