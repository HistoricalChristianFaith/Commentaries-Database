[[commentary]]
quote='''
St. Peter was crucified upside down as a huge inhuman joke; but his human seriousness survived the inhuman joke, because, in whatever posture, he had died for his faith. The modern martyr of the Pankhurst type courts the absurdity without making the suffering strong enough to eclipse the absurdity. She is like a St. Peter who should deliberately stand on his head for ten seconds and then expect to be canonised for it.
'''
source_url=''
source_title="All Things Considered, The Modern Martyr (1908)"
