[[commentary]]
quote='''
But this being first understood, it will be well to discuss in a little more detail what are described as the tragedies of marriage. And the first thing to note about the most tragic of them is that they are not tragedies of marriage at all. They are tragedies of sex; and might easily occur in a highly modern romance in which marriage was not mentioned at all. It is generally summarised by saying that the tragic element is the absence of love. But it is often forgotten that another tragic element is often the presence of love. The doctors of divorce, with an air of the frank and friendly realism of men of the world, are always recommending and rejoicing in a sensible separation by mutual consent. But if we are really to dismiss our dreams of dignity and honour, if we are really to fall back on the frank realism of our experience as men of the world, then the very first thing that our experience will tell us is that it very seldom is a separation by mutual consent; that is, that the consent very seldom is sincerely and spontaneously mutual. By far the commonest problem in such cases is that in which one party wishes to end the partnership and the other does not. And of that emotional situation you can make nothing but a tragedy, whichever way you turn it. With or without marriage, with or without divorce, with or without any arrangements that anybody can suggest or imagine, it remains a tragedy. The only difference is that by the doctrine of marriage it remains both a noble and a fruitful tragedy; like that of a man who falls fighting for his country, or dies testifying to the truth. But the truth is that the innovators have as much sham optimism about divorce as any romanticist can have had about marriage. They regard their story, when it ends in the divorce court, through as rosy a mist of sentimentalism as anybody ever regarded a story ending with wedding bells. Such a reformer is quite sure that when once the prince and princess are divorced by the fairy godmother, they will live happily ever after. I enjoy romance, but I like it to be rooted in reality; and any one with a touch of reality knows that nine couples out of ten, when they are divorced, are left in an exceedingly different state. It will be safe to say in most cases that one partner will fail to find happiness in an infatuation, and the other will from the first accept a tragedy. In the realm of reality and not of romance, it is commonly a case of breaking hearts as well as breaking promises; and even dishonour is not always a remedy for remorse.
'''
source_url=''
source_title='The Superstition of Divorce, Ch. VII: The Tragedies of Marriage (1920)'

[[commentary]]
quote='''
And with that we can only return to the point of honour which I have compared here to a point of patriotism; since it is both the smallest and the greatest kind of patriotism. Men have died in torments during the last five years for points of patriotism far more dubious and fugitive. Men like the Poles or the Serbians, through long periods of their history, may be said rather to have lived in torments. I will never admit that the vital need of the freedom of the family, as I have tried to sketch it here, is not a cause as valuable as the freedom of any frontier. But I do willingly admit that the cause would be a dark and terrible one, if it really asked these men to suffer torments. As I have stated it, on its most extreme terms, it only asks them to suffer abnegations. And those negative sufferings I do think they may honourably be called upon to bear, for the glory of their own oath and the great things by which the nations live. In relation to their own nation most normal men will feel that this distinction between release and “re-lease” is neither fanciful nor harsh, but very rational and human. A patriot may be an exile in another country; but he will not be a patriot of another country. He will be as cheerful as he can in an abnormal position; he may or may not sing his country’s songs in a strange land; but he will not sing the strange songs as his own. And such may fairly be also the attitude of the citizen who has gone into exile from the oldest of earthly cities.
'''
source_url=''
source_title='The Superstition of Divorce, Ch. VII: The Tragedies of Marriage (1920)'
