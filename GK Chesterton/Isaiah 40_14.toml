[[commentary]]
quote='''
The central idea of the great part of the Old Testament may be called the idea of the loneliness of God. God is not the only chief character of the Old Testament; God is properly the only character in the Old Testament. Compared with His clearness of purpose, all the other wills are heavy and automatic, like those of animals; compared with His actuality, all the sons of flesh are shadows. Again and again the note is struck, "With whom hath He taken counsel?" All the patriarchs and prophets are merely His tools or weapons; for the Lord is a man of war. He uses Joshua like an axe or Moses like a measuring rod. For Him, Samson, is only a sword and Isaiah a trumpet. The saints of Christianity are supposed to be like God, to be, as it were, little statuettes of Him. The Old Testament hero is no more supposed to be of the same nature as God than a saw or a hammer is supposed to be of the same shape as the carpenter. This is the main key and characteristic of Hebrew scriptures as a whole.
'''
source_url=''
source_title='Introduction to the Book of Job (1907)'
