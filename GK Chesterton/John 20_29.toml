[[commentary]]
quote='''
If nobody has any right to judge of Spiritualism except a man who has been to a séance, the results, logically speaking, are rather serious: it would almost seem as if nobody had any right to judge of Christianity who had not been to the first meeting at Pentecost. Which would be dreadful. I conceive myself capable of forming my opinion of Spiritualism without seeing spirits, just as I form my opinion of the Japanese War without seeing the Japanese, or my opinion of American millionaires without (thank God) seeing an American millionaire. Blessed are they who have not seen and yet have believed: a passage which some have considered as a prophecy of modern journalism.
'''
time=1908
source_url=''
source_title='Spiritualism (All Things Considered)'

[[commentary]]
quote='''
"Man," I said, "who are you that you should not believe in fairy tales? It is much easier to believe in Blue Beard than to believe in you. A blue beard is a misfortune; but there are green ties which are sins. It is far easier to believe in a million fairy tales than to believe in one man who does not like fairy tales. I would rather kiss Grimm instead of a Bible and swear to all his stories as if they were thirty-nine articles than say seriously and out of my heart that there can be such a man as you; that you are not some temptation of the devil or some delusion from the void. Look at these plain, homely, practical words. 'The Dragon's Grandmother,' that is all right; that is rational almost to the verge of rationalism. If there was a dragon, he had a grandmother. But you--you had no grandmother! If you had known one, she would have taught you to love fairy tales. You had no father, you had no mother; no natural causes can explain you. You cannot be. I believe many things which I have not seen; but of such things as you it may be said, 'Blessed is he that has seen and yet has disbelieved.'"
'''
source_url=''
source_title="Tremendous Trifles, The Dragon's Grandmother (1909)"

[[commentary]]
quote='''
Truths turn into dogmas the instant that they are disputed. Thus every man who utters a doubt defines a religion. And the scepticism of our time does not really destroy the beliefs, rather it creates them; gives them their limits and their plain and defiant shape. We who are Liberals once held Liberalism lightly as a truism. Now it has been disputed, and we hold it fiercely as a faith. We who believe in patriotism once thought patriotism to be reasonable, and thought little more about it. Now we know it to be unreasonable, and know it to be right. We who are Christians never knew the great philosophic common sense which inheres in that mystery until the anti-Christian writers pointed it out to us. The great march of mental destruction will go on. Everything will be denied. Everything will become a creed. It is a reasonable position to deny the stones in the street; it will be a religious dogma to assert them. It is a rational thesis that we are all in a dream; it will be a mystical sanity to say that we are all awake. Fires will be kindled to testify that two and two make four. Swords will be drawn to prove that leaves are green in summer. We shall be left defending, not only the incredible virtues and sanities of human life, but something more incredible still, this huge impossible universe which stares us in the face. We shall fight for visible prodigies as if they were invisible. We shall look on the impossible grass and the skies with a strange courage. We shall be of those who have seen and yet have believed.
'''
source_url=''
source_title='Heretics, Ch. 20: Concluding Remarks on the Importance of Orthodoxy (1905)'
