[[commentary]]
quote='''
Of course, all this secrecy about Christmas is merely sentimental and ceremonial; if you do not like what is sentimental and ceremonial, do not celebrate Christmas at all. You will not be punished if you don't; also, since we are no longer ruled by those sturdy Puritans who won for us civil and religious liberty, you will not even be punished if you do. But I cannot understand why any one should bother about a ceremonial except ceremonially. If a thing only exists in order to be graceful, do it gracefully or do not do it. If a thing only exists as something professing to be solemn, do it solemnly or do not do it.
'''
time=1908
source_url=''
source_title='Christmas (All Things Considered)'

[[commentary]]
quote='''
It is not Puritanism; it is simply anarchy. I should have some sympathy with the Jewish Sabbath, if it were a Jewish Sabbath, and that for three reasons; first, that religion is an intrinsically sympathetic thing; second, that I cannot conceive any religion worth calling a religion without a fixed and material observance; and third, that the particular observance of sitting still and doing no work is one that suits my temperament down to the ground. But the absurdity of the modern English convention is that it does not let a man sit still; it only perpetually trips him up when it has forced him to walk about... I can understand that a deity might be worshipped with joys, with flowers, and fireworks in the old European style. I can understand that a deity might be worshipped with sorrows. But I cannot imagine any deity being worshipped with inconveniences.
'''
time=1909
source_url=''
source_title='Tremendous Trifles, A Cab Ride Across Country (1909)'
