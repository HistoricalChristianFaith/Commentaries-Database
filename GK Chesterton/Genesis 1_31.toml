[[commentary]]
quote='''
Superficially, one would imagine that the railer would be the reformer; that the man who thought that everything was wrong would be the man to put everything right. In historical practice the thing is quite the other way; curiously enough, it is the man who likes things as they are who really makes them better. The optimist Dickens has achieved more reforms than the pessimist Gissing. A man like Rousseau has far too rosy a theory of human nature; but he produces a revolution. A man like David Hume thinks that almost all things are depressing; but he is a Conservative, and wishes to keep them as they are. A man like Godwin believes existence to be kindly; but he is a rebel. A man like Carlyle believes existence to be cruel; but he is a Tory. Everywhere the man who alters things begins by liking things. And the real explanation of this success of the optimistic reformer, of this failure of the pessimistic reformer, is, after all, an explanation of sufficient simplicity. It is because the optimist can look at wrong not only with indignation, but with a startled indignation. When the pessimist looks at any infamy, it is to him, after all, only a repetition of the infamy of existence. The Court of Chancery is indefensible—like mankind. The Inquisition is abominable—like the universe. But the optimist sees injustice as something discordant and unexpected, and it stings him into action. The pessimist can be enraged at wrong; but only the optimist can be surprised at it.
'''
source_url=''
source_title="All Things Considered, The Vote and the House (1908)"

[[commentary]]
quote='''
The creed declared that man was sinful, but it did not declare that life was evil, and it proved it by damning those who did. The condemnation of the early heretics is itself condemned as something crabbed and narrow; but it was in truth the very proof that the Church meant to be brotherly and broad. It proved that the primitive Catholics were specially eager to explain that they did not think man utterly vile; that they did not think life incurably miserable; that they did not think marriage a sin or procreation a tragedy. They were ascetic because asceticism was the only possible purge of the sins of the world; but in the very thunder of their anathemas they affirmed for ever that their asceticism was not to be anti-human or anti-natural; that they did wish to purge the world and not destroy it.
'''
source_url=''
source_title='The Everlasting Man, Part II, Chapter IV: The Witness of the Heretics (1925)'

[[commentary]]
quote='''
Something tells him that the ultimate idea of a world is not bad or even neutral; staring at the sky or the grass or the truths of mathematics or even a new-laid egg, he has a vague feeling like the shadow of that saying of the great Christian philosopher, St. Thomas Aquinas, ‘Every existence, as such, is good.’ On the other hand, something else tells him that it is unmanly and debased and even diseased to minimise evil to a dot or even a blot. He realises that optimism is morbid. It is if possible even more morbid than pessimism. These vague but healthy feelings, if he followed them out, would result in the idea that evil is in some way an exception but an enormous exception; and ultimately that evil is an invasion or yet more truly a rebellion.
'''
source_url=''
source_title='The Everlasting Man, The Escape from Paganism (1925)'
