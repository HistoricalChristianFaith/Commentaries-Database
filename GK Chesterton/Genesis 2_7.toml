[[commentary]]
quote='''
Even the most extreme evolutionists do not attempt to deduce any evolutionary views about the origin of religion from him. Even in trying to prove that religion grew slowly from rude or irrational sources, they begin their proof with the first men who were men. But their own proof only proves that the men who were already men were already mystics. They used the rude and irrational elements as only men and mystics can use them. We come back once more to the simple truth; that at some time too early for these critics to trace, a transition had occurred to which bones and stones cannot in their nature bear witness; and man became a living soul.
'''
source_url=''
source_title='The Everlasting Man, Part 1 Ch. 2: Professors and Prehistoric Men'

[[commentary]]
quote='''
It is little use to compare the head of the man with the head of the monkey, if it certainly has never come into the head of the monkey to bury another monkey with nuts in his grave to help him towards a heavenly monkey-house.
'''
source_url=''
source_title='The Everlasting Man, Appendix I: On Prehistoric Man'
