[[commentary]]
quote='''
Those who called her a witch hot from hell were much more sensible than those who depict her as a silly sentimental maiden prompted by her parish priest. If I have to choose between the two schools of her scattered enemies, I could take my place with those subtle clerks who thought her divine mission devilish, rather than with those rustic aunts and uncles who thought it impossible.
'''
source_url=''
source_title='All Things Considered, The Maid of Orleans (1908)'

[[commentary]]
quote='''
The hopeful element in the universe has in modern times continually been denied and reasserted; but the hopeless element has never for a moment been denied. As I told "H. N. B." (whom I pause to wish a Happy Christmas in its most superstitious sense), the one thing modern people really do believe in is damnation. The greatest of purely modern poets summed up the really modern attitude in that fine Agnostic line--"There may be Heaven; there must be Hell."
'''
source_url=''
source_title='Tremendous Trifles, XVII. The Red Angel (1909)'
