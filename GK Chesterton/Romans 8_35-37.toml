[[commentary]]
quote='''
The paradox was pictorially expressed in Christian art, in which saints were shown brandishing as weapons the very tools that had slain them. And because his martyrdom is thus a power to the martyr, modern people think that any one who makes himself slightly uncomfortable in public will immediately be uproariously popular. ... The point of such extreme martyrdom is much more subtle. It is that it gives an appearance of a man having something quite specially strong to back him up, of his drawing upon some power. And this can only be proved when all his physical contentment is destroyed; when all the current of his bodily being is reversed and turned to pain.
'''
source_url=''
source_title="All Things Considered, The Modern Martyr (1908)"

[[commentary]]
quote='''
The soldier is always, by the nature of things, loyal to something. And as long as one is loyal to something one can never be a worshipper of mere force. For mere force, violence in the abstract, is the enemy of anything we love. To love anything is to see it at once under lowering skies of danger. Loyalty implies loyalty in misfortune; and when a soldier has accepted any nation's uniform he has already accepted its defeat.
'''
source_url=''
source_title="All Things Considered, Thoughts Around Koepenick (1908)"
