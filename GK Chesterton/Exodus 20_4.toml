[[commentary]]
quote='''
We may say that one most essential feature was that it was featureless. Much as we may prefer that creative liberty which the Christian culture has declared and by which it has eclipsed even the arts of antiquity, we must not underrate the determining importance at the time of the Hebrew inhibition of images. It is a typical example of one of those limitations that did in fact preserve and perpetuate enlargement, like a wall built round a wide open space. The God who could not have a statue remained a spirit. Nor would his statue in any case have had the disarming dignity and grace of the Greek statues then or the Christian statues afterwards. He was living in a land of monsters. We shall have occasion to consider more fully what those monsters were, Moloch and Dagon and Tanit the terrible goddess. If the deity of Israel had ever had an image, he would have had a phallic image. By merely giving him a body they would have brought in all the worst elements of mythology; all the polygamy of polytheism; the vision of the harem in heaven.
'''
source_url=''
source_title='The Everlasting Man, Ch. 4 (1925)'
