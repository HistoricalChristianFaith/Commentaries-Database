[[commentary]]
quote='''
It does really mean that a section of the human race is asking whether the primary relations of the two human sexes are particularly good for modern shops. The human race is asking whether Adam and Eve are entirely suitable for Marshall and Snelgrove. If this is not topsy-turvy I cannot imagine what would be. We ask whether the universal institution will improve our (please God) temporary institution. ... They do not ask if the means is suited to the end; they all ask (with profound and penetrating scepticism) if the end is suited to the means. They do not ask whether the tail suits the dog. They all ask whether a dog is (by the highest artistic canons) the most ornamental appendage that can be put at the end of a tail.
'''
time=1909
source_url=''
source_title='In Topsy-Turvy Land (Tremendous Trifles)'

[[commentary]]
quote='''
But Christ in his view of marriage does not in the least suggest the conditions of Palestine in the first century. He does not suggest anything at all, except the sacramental view of marriage as developed long afterwards by the Catholic Church. It was quite as difficult for people then as for people now. It was much more puzzling to people then than to people now. Jews and Romans and Greeks did not believe, and did not even understand enough to disbelieve, the mystical idea that the man and the woman had become one sacramental substance. We may think it an incredible or impossible ideal; but we cannot think it any more incredible or impossible than they would have thought it. In other words, whatever else is true, it is not true that the controversy has been altered by time. Whatever else is true, it is emphatically not true that the ideas of Jesus of Nazareth were suitable to his time, but are no longer suitable to our time. Exactly how suitable they were to his time is perhaps suggested in the end of his story.
'''
source_url=''
source_title='The Everlasting Man, Part 2 Ch. 2: The Riddles of the Gospel (1925)'

[[commentary]]
quote='''
So it is in this case of the sacrament of marriage. We may not believe in sacraments, as we may not believe in spirits, but it is quite clear that Christ believed in this sacrament in his own way and not in any current or contemporary way. He certainly did not get his argument against divorce from the Mosaic law or the Roman law or the habits of the Palestinian people. It would appear to his critics then exactly what it appears to his critics now; an arbitrary and transcendental dogma coming from nowhere save in the sense that it came from him. I am not at all concerned here to defend that dogma; the point here is that it is just as easy to defend it now as it was to defend it then. It is an ideal altogether outside time; difficult at any period; impossible at no period. In other words, if any one says it is what might be expected of a man walking about in that place at that period, we can quite fairly answer that it is much more like what might be the mysterious utterance of a being beyond man, if he walked alive among men.
'''
source_url=''
source_title='The Everlasting Man, Part 2 Ch. 2: The Riddles of the Gospel (1925)'

[[commentary]]
quote='''
Thus, Sir Arthur Conan Doyle, an intelligent man in other matters, says that there is only a “theological” opposition to divorce, and that it is entirely founded on “certain texts” in the Bible about marriages. This is exactly as if he said that a belief in the brotherhood of men was only founded on certain texts in the Bible, about all men being the children of Adam and Eve. Millions of peasants and plain people all over the world assume marriage to be static, without having ever clapped eyes on any text. Numbers of more modern people, especially after the recent experiments in America, think divorce is a social disease, without having ever bothered about any text. It may be maintained that even in these, or in any one, the idea of marriage is ultimately mystical; and the same may be maintained about the idea of brotherhood. It is obvious that a husband and wife are not visibly one flesh, in the sense of being one quadruped. It is equally obvious that Paderewski and Jack Johnson are not twins, and probably have not played together at their mother’s knee. There is indeed a very important admission, or addition, to be realised here. What is true is this: that if the nonsense of Nietzsche or some such sophist submerged current culture, so that it was the fashion to deny the duties of fraternity; then indeed it might be found that the group which still affirmed fraternity was the original group in whose sacred books was the text about Adam and Eve. Suppose some Prussian professor has opportunely discovered that Germans and lesser men are respectively descended from two such very different monkeys that they are in no sense brothers, but barely cousins (German) any number of times removed. And suppose he proceeds to remove them even further with a hatchet; suppose he bases on this a repetition of the conduct of Cain, saying not so much “Am I my brother’s keeper?” as “Is he really my brother?” And suppose this higher philosophy of the hatchet becomes prevalent in colleges and cultivated circles, as even more foolish philosophies have done. Then I agree it probably will be the Christian, the man who preserves the text about Cain, who will continue to assert that he is still the professor’s brother; that he is still the professor’s keeper. He may possibly add that, in his opinion, the professor seems to require a keeper.

And that is doubtless the situation in the controversies about divorce and marriage to-day. It is the Christian church which continues to hold strongly, when the world for some reason has weakened on it, what many others hold at other times. But even then it is barely picking up the shreds and scraps of the subject to talk about a reliance on texts. The vital point in the comparison is this: that human brotherhood means a whole view of life, held in the light of life, and defended, rightly or wrongly, by constant appeals to every aspect of life. The religion that holds it most strongly will hold it when nobody else holds it; that is quite true, and that some of us may be so perverse as to think a point in favour of the religion. But anybody who holds it at all will hold it as a philosophy, not hung on one text but on a hundred truths. Fraternity may be a sentimental metaphor; I may be suffering a delusion when I hail a Montenegrin peasant as my long lost brother. As a fact, I have my own suspicions about which of us it is that has got lost. But my delusion is not a deduction from one text, or from twenty; it is the expression of a relation that to me at least seems a reality. And what I should say about the idea of a brother, I should say about the idea of a wife.
'''
source_url=''
source_title='The Superstition of Divorce, Ch. 1'

[[commentary]]
quote='''
But before they make this attempt, it would be well to ask why such a dignity ever appeared or in what it consisted. And I fancy we shall find ourselves confronted with the very simple truth, that the dignity arose wholly and entirely out of the fidelity; and that the glamour merely came from the vow. People were regarded as having a certain dignity because they were dedicated in a certain way; as bound to certain duties and, if it be preferred, to certain discomforts. It may be irrational to endure these discomforts; it may even be irrational to respect them. But it is certainly much more irrational to respect them, and then artificially transfer the same respect to the absence of them. It is as if we were to expect uniforms to be saluted when armies were disbanded; and ask people to cheer a soldier’s coat when it did not contain a soldier. If you think you can abolish war, abolish it; but do not suppose that when there are no wars to be waged, there will still be warriors to be worshipped. If it was a good thing that the monasteries were dissolved, let us say so and dismiss them. But the nobles who dissolved the monasteries did not shave their heads, and ask to be regarded as saints solely on account of that ceremony. The nobles did not dress up as abbots and ask to be credited with a potential talent for working miracles, because of the austerity of their vows of poverty and chastity. They got inside the houses, but not the hoods, and still less the haloes. They at least knew that it is not the habit that makes the monk. They were not so superstitious as those moderns, who think it is the veil that makes the bride.
'''
source_url=''
source_title='The Superstition of Divorce, Ch. VII: The Tragedies of Marriage (1920)'
