[[commentary]]
quote='''
But above all, it is true of the most tremendous issue; of that tragedy which has created the divine comedy of our creed. Nothing short of the extreme and strong and startling doctrine of the divinity of Christ will give that particular effect that can truly stir the popular sense like a trumpet; the idea of the king himself serving in the ranks like a common soldier. By making that figure merely human we make that story much less human. We take away the point of the story which actually pierces humanity; the point of the story which was quite literally the point of a spear.
'''
source_url=''
source_title='The Everlasting Man, The Escape from Paganism (1925)'
