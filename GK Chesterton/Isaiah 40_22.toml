[[commentary]]
quote='''
Nevertheless the main characteristic remains: the sense not merely that God is stronger than man, not merely that God is more secret than man, but that He means more, that He knows better what He is doing, that compared with Him we have something of the vagueness, the unreason, and the vagrancy of the beasts that perish. "It is He that sitteth above the earth, and the inhabitants thereof are as grasshoppers." We might almost put it thus. The book is so intent upon asserting the personality of God that it almost asserts the impersonality of man. Unless this gigantic cosmic brain has conceived a thing, that thing is insecure and void; man has not enough tenacity to ensure its continuance.
'''
source_url=''
source_title='Introduction to the Book of Job (1907)'
