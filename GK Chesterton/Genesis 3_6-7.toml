[[commentary]]
quote='''
Did he expect to find a fossil Eve with a fossil apple inside her? Did he suppose that the ages would have spared for him a complete skeleton of Adam attached to a slightly faded fig-leaf? ... Science never said that there could have been no Fall. There might have been ten Falls, one on top of the other, and the thing would have been quite consistent with everything that we know from physical science. Humanity might have grown morally worse for millions of centuries, and the thing would in no way have contradicted the principle of Evolution.
'''
time=1908
source_url=''
source_title='All Things Considered, Science and Religion (1908)'

[[commentary]]
quote='''
If it is not true that a divine being fell, then we can only say that one of the animals went entirely off its head. In neither case can we really argue very much from the body of man simply considered as the body of an innocent and healthy animal. His body has got too much mixed up with his soul.
'''
time=1908
source_url=''
source_title='Wine When It Is Red (All Things Considered)'

[[commentary]]
quote='''
A man and woman are put in a garden on condition that they do not eat one fruit: they eat it, and lose their joy in all the fruits of the earth.

This great idea, then, is the backbone of all folk-lore—the idea that all happiness hangs on one thin veto; all positive joy depends on one negative. ... It is surely obvious that all ethics ought to be taught to this fairy-tale tune; that, if one does the thing forbidden, one imperils all the things provided.
'''
source_url=''
source_title='All Things Considered, Fairy Tales (1908)'

[[commentary]]
quote='''
For clothes are very literally vestments, and man wears them because he is a priest. It is true that even as an animal he is here different from the animals. Nakedness is not nature to him; it is not his life but rather his death; even in the vulgar sense of his death of cold. But clothes are worn for dignity or decency or decoration where they are not in any way wanted for warmth. It would sometimes appear that they are valued for ornament before they are valued for use. It would almost always appear that they are felt to have some connection with decorum. Conventions of this sort vary a great deal with various times and places; and there are some who cannot get over this reflection, and for whom it seems a sufficient argument for letting all conventions slide. They never tire of repeating, with simple wonder, that dress is different in the Cannibal Islands and in Camden Town; they cannot get any further and throw up the whole idea of decency in despair. They might as well say that because there have been hats of a good many different shapes, and some rather eccentric shapes, therefore hats do not matter or do not exist. They would probably add that there is no such thing as sunstroke or going bald. Men have felt everywhere that certain forms were necessary to fence off and protect certain private things from contempt or coarse misunderstanding; and the keeping of those forms, whatever they were, made for dignity and mutual respect. The fact that they mostly refer, more or less remotely, to the relations of the sexes illustrates the two facts that must be put at the very beginning of the record of the race. The first is the fact that original sin is really original. Not merely in theology but in history it is a thing rooted in the origins. Whatever else men have believed, they have all believed that there is something the matter with mankind. This sense of sin has made it impossible to be natural and have no clothes, just as it has made it impossible to be natural and have no laws.
'''
source_url=''
source_title='The Everlasting Man, Part 1 Ch. 2: Professors and Prehistoric Men'

[[commentary]]
quote='''
The mediæval mind turned centrally upon the pivot of Free Will. In their social system the mediævals were too much PARTI-PER-PALE, as their heralds would say, too rigidly cut up by fences and quarterings of guild or degree. But in their moral philosophy they always thought of man as standing free and doubtful at the cross-roads in a forest. While they clad and bound the body and (to some extent) the mind too stiffly and quaintly for our taste, they had a much stronger sense than we have of the freedom of the soul. For them the soul always hung poised like an eagle in the heavens of liberty. Many of the things that strike a modern as most fantastic came from their keen sense of the power of choice.

For instance, the greatest of the Schoolmen devotes folios to the minute description of what the world would have been like if Adam had refused the apple; what kings, laws, babies, animals, planets would have been in an unfallen world. So intensely does he feel that Adam might have decided the other way that he sees a complete and complex vision of another world, a world that now can never be.
'''
source_url=''
source_title='A Miscellany of Men, The Mediæval Villain (1912)'
