[[commentary]]
quote = '''
Christianity is savage, in the sense that it is primeval; there is in it a touch of the nigger hymn. I remember a debate in which I had praised militant music in ritual, and some one asked me if I could imagine Christ walking down the street before a brass band. I said I could imagine it with the greatest ease; for Christ definitely approved a natural noisiness at a great moment. When the street children shouted too loud, certain priggish disciples did begin to rebuke them in the name of good taste. He said: "If these were silent the very stones would cry out." With these words He called up all the wealth of artistic creation that has been founded on this creed. With those words He founded Gothic architecture. For in a town like this, which seems to have grown Gothic as a wood grows leaves, anywhere and anyhow, any odd brick or moulding may be carved off into a shouting face. The front of vast buildings is thronged with open mouths, angels praising God, or devils defying Him. Rock itself is racked and twisted, until it seems to scream. The miracle is accomplished; the very stones cry out.
'''
source_title = "Tremendous Trifles, XVIII. The Tower"
source_url = ""

[[commentary]]
quote='''
Christ prophesied the whole of Gothic architecture in that hour when nervous and respectable people (such people as now object to barrel organs) objected to the shouting of the gutter-snipes of Jerusalem. He said, "If these were silent, the very stones would cry out." Under the impulse of His spirit arose like a clamorous chorus the facades of the mediæval cathedrals, thronged with shouting faces and open mouths. The prophecy has fulfilled itself: the very stones cry out.
'''
source_url=''
source_title='Orthodoxy, Ch. VII: The Eternal Revolution'
