[[commentary]]
quote='''
Meanwhile, it remains true that I shall eat a great deal of turkey this Christmas; and it is not in the least true (as the vegetarians say) that I shall do it because I do not realise what I am doing, or because I do what I know is wrong, or that I do it with shame or doubt or a fundamental unrest of conscience. In one sense I know quite well what I am doing; in another sense I know quite well that I know not what I do.
'''
time=1908
source_url=''
source_title='Christmas (All Things Considered)'

[[commentary]]
quote='''
He wore a high shiny hat and a long frock coat, but he wore them as such solemn things were meant to be worn; he wore the silk hat as if it were a mitre, and the frock coat as if it were the ephod of a high priest. He not only hung his hat up on the peg, but he seemed (such was his stateliness) almost to ask permission of the hat for doing so, and to apologise to the peg for making use of it. When he had sat down on a wooden chair with the air of one considering its feelings and given a sort of slight stoop or bow to the wooden table itself, as if it were an altar, I could not help some comment springing to my lips.
'''
source_url=''
source_title='Tremendous Trifles, A Somewhat Improbable Story (1909)'

[[commentary]]
quote='''
That the early Church was itself full of an ecstatic enthusiasm for renunciation and virginity makes this distinction much more striking and not less so. It makes all the more important the place where the dogma drew the line. A man might crawl about on all fours like a beast because he was an ascetic. He might stand night and day on the top of a pillar and be adored for being an ascetic. But he could not say that the world was a mistake or the marriage state a sin without being a heretic. What was it that thus deliberately disengaged itself from eastern asceticism by sharp definition and fierce refusal, if it was not something with an individuality of its own; and one that was quite different? If the Catholics are to be confused with the Gnostics, we can only say it was not their fault if they are. And it is rather hard that the Catholics should be blamed by the same critics for persecuting the heretics and also for sympathising with the heresy.
'''
source_url=''
source_title='The Everlasting Man, Part II, Chapter IV: The Witness of the Heretics (1925)'
