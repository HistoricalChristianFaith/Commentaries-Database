[[commentary]]
quote='''
But if we are describing, for the moment, the atmosphere of what is generous and popular and even picturesque, any knowledge of human nature will tell us that no sufferings of the sons of men, or even of the servants of God, strike the same note as the notion of the master suffering instead of his servants. And this is given by the theological and emphatically not by the scientific deity. No mysterious monarch, hidden in his starry pavilion at the base of the cosmic campaign, is in the least like that celestial chivalry of the Captain who carries his five wounds in the front of battle.
'''
source_url=''
source_title='The Everlasting Man, The Escape from Paganism (1925)'
