[[commentary]]
quote='''
A man writing an article on military strategy is simply a man writing an article; a horrid sight. But a boy making a campaign with tin soldiers is like a General making a campaign with live soldiers. He must to the limit of his juvenile powers think about the thing; whereas the war correspondent need not think at all. I remember a war correspondent who remarked after the capture of Methuen: "This renewed activity on the part of Delarey is probably due to his being short of stores." The same military critic had mentioned a few paragraphs before that Delarey was being hard pressed by a column which was pursuing him under the command of Methuen. Methuen chased Delarey; and Delarey's activity was due to his being short of stores. Otherwise he would have stood quite still while he was chased. I run after Jones with a hatchet, and if he turns round and tries to get rid of me the only possible explanation is that he has a very small balance at his bankers. I cannot believe that any boy playing at soldiers would be as idiotic as this. But then any one playing at anything has to be serious. Whereas, as I have only too good reason to know, if you are writing an article you can say anything that comes into your head.
'''
source_url=''
source_title='Tremendous Trifles, The Toy Theatre (1909)'

[[commentary]]
quote='''
(6) Don't say that the idea of human equality is absurd, because some men are tall and some short, some clever and some stupid. At the height of the French Revolution it was noticed that Danton was tall and Murat short. In the wildest popular excitement of America it is known that Rockefeller is stupid and that Bryan is clever. The doctrine of human equality reposes upon this: That there is no man really clever who has not found that he is stupid. That there is no big man who has not felt small. Some men never feel small; but these are the few men who are.
'''
source_url=''
source_title='A Miscellany of Men: The Angry Author: His Farewell'
