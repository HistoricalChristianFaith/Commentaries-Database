[[commentary]]
quote = '''
It was mostly the fruit of our first and most natural sin — the habit of \
regarding ourselves as conjurers rather than priests, for the definition is \
that a conjurer is apart from his audience, while a priest is a part of his. \
The conjurer despises his congregation; if the priest despises any one, it \
must be himself. The curse of all journalism, but especially of that yellow \
journalism which is the shame of our profession, is that we think ourselves \
cleverer than the people for whom we write, whereas, in fact, we are generally \
even stupider.
'''
source_title = "All Things Considered, On the Cryptic and the Elliptic (1908)"
source_url = ""
