[[commentary]]
quote='''
We do not laugh at the mere fact of something falling down; there is nothing humorous about leaves falling or the sun going down. When our house falls down we do not laugh. All the birds of the air might drop around us in a perpetual shower like a hailstorm without arousing a smile. If you really ask yourself why we laugh at a man sitting down suddenly in the street you will discover that the reason is not only recondite, but ultimately religious. All the jokes about men sitting down on their hats are really theological jokes; they are concerned with the Dual Nature of Man. They refer to the primary paradox that man is superior to all the things around him and yet is at their mercy.
'''
time=1908
source_url=''
source_title='Cockneys and Their Jokes (All Things Considered)'

[[commentary]]
quote='''
Civilisation in the best sense merely means the full authority of the human spirit over all externals. Barbarism means the worship of those externals in their crude and unconquered state. Barbarism means the worship of Nature; and in recent poetry, science, and philosophy there has been too much of the worship of Nature. Wherever men begin to talk much and with great solemnity about the forces outside man, the note of it is barbaric. When men talk much about heredity and environment they are almost barbarians.
'''
source_url=''
source_title='All Things Considered, Humanitarianism and Strength (1908)'

[[commentary]]
quote='''
Man is an exception, whatever else he is. If he is not the image of God, then he is a disease of the dust. If it is not true that a divine being fell, then we can only say that one of the animals went entirely off its head. In neither case can we really argue very much from the body of man simply considered as the body of an innocent and healthy animal. His body has got too much mixed up with his soul, as we see in the supreme instance of sex.
'''
time=1908
source_url=''
source_title='Wine When It Is Red (All Things Considered)'

[[commentary]]
quote='''
But when the background of man's life is a grey background, then, in the name of man's sacred supremacy, I desire to paint on it in fire and gore. When the heavens fail man refuses to fail; when the sky seems to have written on it, in letters of lead and pale silver, the decree that nothing shall happen, then the immortal soul, the prince of the creatures, rises up and decrees that something shall happen, if it be only the slaughter of a policeman.
'''
time=1909
source_url=''
source_title='The Secret of a Train (Tremendous Trifles)'

[[commentary]]
quote='''
A really human human being would always put the spiritual things first. A walking and speaking statue of God finds himself at one particular moment employed as a shop assistant. He has in himself a power of terrible love, a promise of paternity, a thirst for some loyalty that shall unify life, and in the ordinary course of things he asks himself, "How far do the existing conditions of those assisting in shops fit in with my evident and epic destiny in the matter of love and marriage?"
'''
time=1909
source_url=''
source_title='In Topsy-Turvy Land (Tremendous Trifles)'

[[commentary]]
quote='''
Generally, the moral substance of liberty is this: that man is not meant merely to receive good laws, good food or good conditions, like a tree in a garden, but is meant to take a certain princely pleasure in selecting and shaping like the gardener. Perhaps that is the meaning of the trade of Adam. And the best popular words for rendering the real idea of liberty are those which speak of man as a creator. We use the word “make” about most of the things in which freedom is essential, as a country walk or a friendship or a love affair. When a man “makes his way” through a wood he has really created, he has built a road, like the Romans. When a man “makes a friend,” he makes a man. And in the third case we talk of a man “making love,” as if he were (as, indeed, he is) creating new masses and colours of that flaming material an awful form of manufacture. In its primary spiritual sense, liberty is the god in man, or, if you like the word, the artist.
'''
source_url=''
source_title='The Free Man (A Miscellany of Men)'

[[commentary]]
quote='''
For wheels are the mark of a man quite as much as wings are the mark of an angel. Wheels are the things that are as old as mankind and yet are strictly peculiar to man, that are prehistoric but not pre-human.

A distinguished psychologist, who is well acquainted with physiology, has told me that parts of himself are certainly levers, while other parts are probably pulleys, but that after feeling himself carefully all over, he cannot find a wheel anywhere. The wheel, as a mode of movement, is a purely human thing. On the ancient escutcheon of Adam (which, like much of the rest of his costume, has not yet been discovered) the heraldic emblem was a wheel--passant. As a mode of progress, I say, it is unique. Many modern philosophers, like my friend before mentioned, are ready to find links between man and beast, and to show that man has been in all things the blind slave of his mother earth. Some, of a very different kind, are even eager to show it; especially if it can be twisted to the discredit of religion. But even the most eager scientists have often admitted in my hearing that they would be surprised if some kind of cow approached them moving solemnly on four wheels. Wings, fins, flappers, claws, hoofs, webs, trotters, with all these the fantastic families of the earth come against us and close around us, fluttering and flapping and rustling and galloping and lumbering and thundering; but there is no sound of wheels.

I remember dimly, if, indeed, I remember aright, that in some of those dark prophetic pages of Scripture, that seem of cloudy purple and dusky gold, there is a passage in which the seer beholds a violent dream of wheels. Perhaps this was indeed the symbolic declaration of the spiritual supremacy of man. Whatever the birds may do above or the fishes beneath his ship, man is the only thing to steer; the only thing to be conceived as steering. He may make the birds his friends, if he can. He may make the fishes his gods, if he chooses. But most certainly he will not believe a bird at the masthead; and it is hardly likely that he will even permit a fish at the helm. He is, as Swinburne says, helmsman and chief: he is literally the Man at the Wheel.
'''
source_url=''
source_title='Alarms and Discursions, The Wheel (1910)'
