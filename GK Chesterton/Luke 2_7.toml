[[commentary]]
quote='''
I thought of a low and lonely house in the flats, behind a veil or film of slight trees, a man breaking the ground as men have broken from the first morning, and a huge grey horse champing his food within a foot of a child's head, as in the stable where Christ was born.
'''
source_url=''
source_title='Tremendous Trifles, Humanity: an Interlude (1909)'
