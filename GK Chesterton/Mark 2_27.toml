[[commentary]]
quote='''
I should have some sympathy with the Jewish Sabbath, if it were a Jewish Sabbath, and that for three reasons; first, that religion is an intrinsically sympathetic thing; second, that I cannot conceive any religion worth calling a religion without a fixed and material observance; and third, that the particular observance of sitting still and doing no work is one that suits my temperament down to the ground. But the absurdity of the modern English convention is that it does not let a man sit still; it only perpetually trips him up when it has forced him to walk about. Our Sabbatarianism does not forbid us to ask a man in Battersea to come and talk in Hertfordshire; it only prevents his getting there. I can understand that a deity might be worshipped with joys, with flowers, and fireworks in the old European style. I can understand that a deity might be worshipped with sorrows. But I cannot imagine any deity being worshipped with inconveniences.
'''
time=1909
source_url=''
source_title='Tremendous Trifles, A Cab Ride Across Country (1909)'

[[commentary]]
quote='''
Morality did not begin by one man saying to another, "I will not hit you if you do not hit me"; there is no trace of such a transaction. There is a trace of both men having said, "We must not hit each other in the holy place." They gained their morality by guarding their religion. They did not cultivate courage. They fought for the shrine, and found they had become courageous. They did not cultivate cleanliness. They purified themselves for the altar, and found that they were clean. The history of the Jews is the only early document known to most Englishmen, and the facts can be judged sufficiently from that. The Ten Commandments which have been found substantially common to mankind were merely military commands; a code of regimental orders, issued to protect a certain ark across a certain desert. Anarchy was evil because it endangered the sanctity. And only when they made a holy day for God did they find they had made a holiday for men.
'''
source_url=''
source_title='Orthodoxy, Ch. 5: The Flag of the World (1908)'
