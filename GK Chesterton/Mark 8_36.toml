[[commentary]]
quote='''
Unfortunately, however, Midas could fail; he did. His path did not lead unerringly upward. He starved because whenever he touched a biscuit or a ham sandwich it turned to gold. That was the whole point of the story, though the writer has to suppress it delicately, writing so near to a portrait of Lord Rothschild. The old fables of mankind are, indeed, unfathomably wise; but we must not have them expurgated in the interests of Mr. Vanderbilt. We must not have King Midas represented as an example of success; he was a failure of an unusually painful kind.
'''
source_url=''
source_title="All Things Considered, The Fallacy of Success (1908)"

[[commentary]]
quote='''
On the outside of a book I saw written in large letters, "Get On or Get Out." The title of the book recalled to me with a sudden revolt and reaction all that does seem unquestionably new and nasty; it reminded me that there was in the world of to-day that utterly idiotic thing, a worship of success; a thing that only means surpassing anybody in anything; a thing that may mean being the most successful person in running away from a battle; a thing that may mean being the most successfully sleepy of the whole row of sleeping men.
'''
time=1909
source_url=''
source_title='Tremendous Trifles, XXXIII. The Prehistoric Railway Station (1909)'
