[[commentary]]
quote='''
Something of the same thing may be said about the incident of Martha and Mary; which has been interpreted in retrospect and from the inside by the mystics of the Christian contemplative life. But it was not at all an obvious view of it; and most moralists, ancient and modern, could be trusted to make a rush for the obvious. What torrents of effortless eloquence would have flowed from them to swell any slight superiority on the part of Martha; what splendid sermons about the Joy of Service and the Gospel of Work and the World Left Better Than We Found It, and generally all the ten thousand platitudes that can be uttered in favour of taking trouble--by people who need take no trouble to utter them. If in Mary the mystic and child of love Christ was guarding the seed of something more subtle, who was likely to understand it at the time? Nobody else could have seen Clare and Catherine and Teresa shining above the little roof at Bethany.
'''
source_url=''
source_title='The Everlasting Man, Part 2 Ch. 2: The Riddles of the Gospel (1925)'
