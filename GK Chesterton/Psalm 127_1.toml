[[commentary]]
quote='''
We might almost put it thus. The book is so intent upon asserting the personality of God that it almost asserts the impersonality of man. Unless this gigantic cosmic brain has conceived a thing, that thing is insecure and void; man has not enough tenacity to ensure its continuance. "Except the Lord build the house, they labor in vain that build it. Except the Lord keep the city, the watchman waketh but in vain."
'''
source_url=''
source_title='Introduction to the Book of Job (1907)'
