[[commentary]]
quote='''
In so far as I am Man I am the chief of creatures. In so far as I am a man I am the chief of sinners. All humility that had meant pessimism, that had meant man taking a vague or mean view of his whole destiny--all that was to go. We were to hear no more the wail of Ecclesiastes that humanity had no pre-eminence over the brute, or the awful cry of Homer that man was only the saddest of all the beasts of the field. Man was a statue of God walking about the garden. Man had pre-eminence over all the brutes; man was only sad because he was not a beast, but a broken god. The Greek had spoken of men creeping on the earth, as if clinging to it. Now Man was to tread on the earth as if to subdue it. Christianity thus held a thought of the dignity of man that could only be expressed in crowns rayed like the sun and fans of peacock plumage. Yet at the same time it could hold a thought about the abject smallness of man that could only be expressed in fasting and fantastic submission, in the grey ashes of St. Dominic and the white snows of St. Bernard.
'''
source_url=''
source_title='Orthodoxy, Ch. 6: The Paradoxes of Christianity (1908)'

[[commentary]]
quote='''
It is not only nonsense, but blasphemy, to say that man has spoilt the country. Man has created the country; it was his business, as the image of God. No hill, covered with common scrub or patches of purple heath, could have been so sublimely hilly as that ridge up to which the ranked furrows rose like aspiring angels. No valley, confused with needless cottages and towns, can have been so utterly valleyish as that abyss into which the down-rushing furrows raged like demons into the swirling pit.
'''
source_url=''
source_title='Alarms and Discursions, The Furrows (1910)'

[[commentary]]
quote='''
A really human human being would always put the spiritual things first. A walking and speaking statue of God finds himself at one particular moment employed as a shop assistant. He has in himself a power of terrible love, a promise of paternity, a thirst for some loyalty that shall unify life, and in the ordinary course of things he asks himself, "How far do the existing conditions of those assisting in shops fit in with my evident and epic destiny in the matter of love and marriage?"
'''
time=1909
source_url=''
source_title='In Topsy-Turvy Land (Tremendous Trifles)'
