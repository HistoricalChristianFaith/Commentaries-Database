[[commentary]]
quote='''
Nothing shall induce me to darken human homes, to destroy human festivities, to insult human gifts and human benefactions for the sake of some hypothetical knowledge which Nature curtained from our eyes. We men and women are all in the same boat, upon a stormy sea. We owe to each other a terrible and tragic loyalty.
'''
time=1908
source_url=''
source_title='Christmas (All Things Considered)'
