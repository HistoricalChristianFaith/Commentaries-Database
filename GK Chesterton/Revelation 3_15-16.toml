[[commentary]]
quote='''
A man will plume himself because he is not bad in some particular way, when the truth is that he is not good enough to be bad in that particular way. Some priggish little clerk will say, "I have reason to congratulate myself that I am a civilised person, and not so bloodthirsty as the Mad Mullah." Somebody ought to say to him, "A really good man would be less bloodthirsty than the Mullah. But you are less bloodthirsty, not because you are more of a good man, but because you are a great deal less of a man. You are not bloodthirsty, not because you would spare your enemy, but because you would run away from him." Or again, some Puritan with a sullen type of piety would say, "I have reason to congratulate myself that I do not worship graven images like the old heathen Greeks." And again somebody ought to say to him, "The best religion may not worship graven images, because it may see beyond them. But if you do not worship graven images, it is only because you are mentally and morally quite incapable of graving them. True religion, perhaps, is above idolatry. But you are below idolatry. You are not holy enough yet to worship a lump of stone."
'''
source_url=''
source_title="All Things Considered, Conceit and Caricature (1908)"

[[commentary]]
quote='''
Are we without the fault because we have the opposite virtue? Or are we without the fault because we have the opposite fault? It is a good thing assuredly, to be innocent of any excess; but let us be sure that we are not innocent of excess merely by being guilty of defect. ... I, for one, believe that if our caricaturists do not hate their enemies, it is not because they are too big to hate them, but because their enemies are not big enough to hate. I do not think we have passed the bludgeon stage. I believe we have not come to the bludgeon stage. We must be better, braver, and purer men than we are before we come to the bludgeon stage.
'''
source_url=''
source_title="All Things Considered, Conceit and Caricature (1908)"

[[commentary]]
quote='''
What people call impartiality may simply mean indifference, and what people call partiality may simply mean mental activity. ... The pure and starry perfection of impartiality would be reached by people who not only had no opinion before they had heard the case, but who also had no opinion after they had heard it. In the same way, there is in modern discussions of religion and philosophy an absurd assumption that a man is in some way just and well-poised because he has come to no conclusion; and that a man is in some way knocked off the list of fair judges because he has come to a conclusion. It is assumed that the sceptic has no bias; whereas he has a very obvious bias in favour of scepticism.
'''
source_url=''
source_title="All Things Considered, The Error of Impartiality (1908)"

[[commentary]]
quote='''
In most of the matters of modern England, the real difficulty is that there is a negative revolution without a positive revolution. Positive aristocracy is breaking up without any particular appearance of positive democracy taking its place. The polished class is becoming less polished without becoming less of a class; the nobleman who becomes a guinea-pig keeps all his privileges but loses some of his tradition; he becomes less of a gentleman without becoming less of a nobleman. In the same way (until some recent and happy revivals) it seemed highly probable that the Church of England would cease to be a religion long before it had ceased to be a Church.
'''
source_url=''
source_title='All Things Considered, The Boy (1908)'

[[commentary]]
quote='''
When a man of Voltaire's school has to explode a saint or a great religious hero, he says that such a person is a common human fool, or a common human fraud. But when a man like Anatole France has to explode a saint, he explains a saint as somebody belonging to his particular fussy little literary set. ... If I disbelieved in Christianity, I should be the loudest blasphemer in Hyde Park. Nothing ought to be too big for a brave man to attack; but there are some things too big for a man to patronise.
'''
source_url=''
source_title='All Things Considered, The Maid of Orleans (1908)'

[[commentary]]
quote='''
It is not for us to explain this flaming figure in terms of our tired and querulous culture. Rather we must try to explain ourselves by the blaze of such fixed stars. Those who called her a witch hot from hell were much more sensible than those who depict her as a silly sentimental maiden prompted by her parish priest. If I have to choose between the two schools of her scattered enemies, I could take my place with those subtle clerks who thought her divine mission devilish, rather than with those rustic aunts and uncles who thought it impossible.
'''
source_url=''
source_title='All Things Considered, The Maid of Orleans (1908)'

[[commentary]]
quote='''
I can understand the man who takes off his hat to a lady because it is the customary symbol. I can understand him, I say; in fact, I know him quite intimately. I can also understand the man who refuses to take off his hat to a lady, like the old Quakers, because he thinks that a symbol is superstition. But what point would there be in so performing an arbitrary form of respect that it was not a form of respect? We respect the gentleman who takes off his hat to the lady; we respect the fanatic who will not take off his hat to the lady. But what should we think of the man who kept his hands in his pockets and asked the lady to take his hat off for him because he felt tired?
'''
time=1908
source_url=''
source_title='Christmas (All Things Considered)'

[[commentary]]
quote='''
One of the wise and awful truths which this brown-paper art reveals, is this, that white is a colour. It is not a mere absence of colour; it is a shining and affirmative thing, as fierce as red, as definite as black. When, so to speak, your pencil grows red-hot, it draws roses; when it grows white-hot, it draws stars. And one of the two or three defiant verities of the best religious morality, of real Christianity, for example, is exactly this same thing; the chief assertion of religious morality is that white is a colour. Virtue is not the absence of vices or the avoidance of moral dangers; virtue is a vivid and separate thing, like pain or a particular smell. Mercy does not mean not being cruel or sparing people revenge or punishment; it means a plain and positive thing like the sun, which one has either seen or not seen. Chastity does not mean abstention from sexual wrong; it means something flaming, like Joan of Arc.
'''
source_url=''
source_title='Tremendous Trifles, A Piece of Chalk (1909)'
