[[commentary]]
quote='''
The soldier is always, by the nature of things, loyal to something. And as long as one is loyal to something one can never be a worshipper of mere force. For mere force, violence in the abstract, is the enemy of anything we love. To love anything is to see it at once under lowering skies of danger. Loyalty implies loyalty in misfortune; and when a soldier has accepted any nation's uniform he has already accepted its defeat.
'''
source_url=''
source_title="All Things Considered, Thoughts Around Koepenick (1908)"
