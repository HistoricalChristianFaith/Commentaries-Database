[[commentary]]
quote='''
That red fire is only the flower on a stalk of living habits, which you cannot see. Only because your mother made you say 'Thank you' for a bun are you now able to thank Nature or chaos for those red stars of an instant or for the white stars of all time. Only because you were humble before fireworks on the fifth of November do you now enjoy any fireworks that you chance to see. You only like them being red because you were told about the blood of the martyrs; you only like them being bright because brightness is a glory. That flame flowered out of virtues, and it will fade with virtues. Seduce a woman, and that spark will be less bright. Shed blood, and that spark will be less red. Be really bad, and they will be to you like the spots on a wall-paper.
'''
source_url=''
source_title='Tremendous Trifles, The Diabolist (1909)'
