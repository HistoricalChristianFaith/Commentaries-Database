[[commentary]]
quote='''
Civilisation in the best sense merely means the full authority of the human spirit over all externals. Barbarism means the worship of those externals in their crude and unconquered state. Barbarism means the worship of Nature; and in recent poetry, science, and philosophy there has been too much of the worship of Nature. Wherever men begin to talk much and with great solemnity about the forces outside man, the note of it is barbaric. When men talk much about heredity and environment they are almost barbarians. ... The true savage is a slave, and is always talking about what he must do; the true civilised man is a free man and is always talking about what he may do. Hence all the Zola heredity and Ibsen heredity that has been written in our time affects me as not merely evil, but as essentially ignorant and retrogressive. This sort of science is almost the only thing that can with strict propriety be called reactionary. Scientific determinism is simply the primal twilight of all mankind; and some men seem to be returning to it.
'''
source_url=''
source_title='All Things Considered, Humanitarianism and Strength (1908)'
