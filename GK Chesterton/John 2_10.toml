[[commentary]]
quote='''
Again and again, before our time, men have grown content with a diluted doctrine. And again and again there has followed on that dilution, coming as out of the darkness in a crimson cataract, the strength of the red original wine. And we only say once more to-day as has been said many times by our fathers: ‘Long years and centuries ago our fathers or the founders of our people drank, as they dreamed, of the blood of God. Long years and centuries have passed since the strength of that giant vintage has been anything but a legend of the age of giants. Centuries ago already is the dark time of the second fermentation, when the wine of Catholicism turned into the vinegar of Calvinism. Long since that bitter drink has been itself diluted; rinsed out and washed away by the waters of oblivion and the wave of the world. Never did we think to taste again even that bitter tang of sincerity and the spirit, still less the richer and the sweeter strength of the purple vineyards in our dreams of the age of gold. Day by day and year by year we have lowered our hopes and lessened our convictions; we have grown more and more used to seeing those vats and vineyards overwhelmed in the water-floods and the last savour and suggestion of that special element fading like a stain of purple upon a sea of grey. We have grown used to dilution, to dissolution, to a watering down that went on for ever. But Thou hast kept the good wine until now.’
'''
source_url=''
source_title='The Everlasting Man, The Five Deaths of the Faith (1925)'

[[commentary]]
quote='''
Dionysus and his church was grounded on a serious joie-de-vivre like that of Walt Whitman. Dionysus made wine, not a medicine, but a sacrament. Jesus Christ also made wine, not a medicine, but a sacrament. But Omar makes it, not a sacrament, but a medicine. He feasts because life is not joyful; he revels because he is not glad.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 7: Omar and the Sacred Vine (1905)'
