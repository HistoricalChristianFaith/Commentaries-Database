[[commentary]]
quote='''
The advanced person writes that because geologists know nothing about the Fall, therefore any doctrine of depravity is untrue. Because science has not found something which obviously it could not find, therefore something entirely different—the psychological sense of evil—is untrue. You might sum up this writer's argument abruptly, but accurately, in some way like this—"We have not dug up the bones of the Archangel Gabriel, who presumably had none, therefore little boys, left to themselves, will not be selfish."
'''
time=1908
source_url=''
source_title='All Things Considered, Science and Religion (1908)'

[[commentary]]
quote='''
Barbarism means the worship of Nature; and in recent poetry, science, and philosophy there has been too much of the worship of Nature. Wherever men begin to talk much and with great solemnity about the forces outside man, the note of it is barbaric. When men talk much about heredity and environment they are almost barbarians. The modern men of science are many of them almost barbarians. ... For barbarians (especially the truly squalid and unhappy barbarians) are always talking about these scientific subjects from morning till night. That is why they remain squalid and unhappy; that is why they remain barbarians. Hottentots are always talking about heredity... Savages—those that are truly stunted or depraved—dedicate nearly all their tales and sayings to the subject of physical kinship, of a curse on this or that tribe, of a taint in this or that family, of the invincible law of blood, of the unavoidable evil of places. ... Scientific determinism is simply the primal twilight of all mankind; and some men seem to be returning to it.
'''
source_url=''
source_title='All Things Considered, Humanitarianism and Strength (1908)'

[[commentary]]
quote='''
This is the most enormous and at the same time the most secret of the modern tyrannies of materialism. ... But here, as I have said, comes in the quiet and crushing power of modern materialism. It prevents him rising in rebellion, as he would otherwise do. By perpetually talking about environment and visible things, by perpetually talking about economics and physical necessity, painting and keeping repainted a perpetual picture of iron machinery and merciless engines, of rails of steel, and of towers of stone, modern materialism at last produces this tremendous impression in which the truth is stated upside down.
'''
time=1909
source_url=''
source_title='In Topsy-Turvy Land (Tremendous Trifles)'
