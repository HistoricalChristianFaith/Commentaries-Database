[[commentary]]
quote='''
Job does not in any sense look at life in a gloomy way. If wishing to be happy and being quite ready to be happy constitutes an optimist, Job is an optimist. He is a perplexed optimist; he is an exasperated optimist; he is an outraged and insulted optimist. He wishes the universe to justify itself, not because he wishes it be caught out, but because he really wishes it be justified. He demands an explanation from God, but he does not do it at all in the spirit in which [John] Hampden might demand an explanation from Charles I. He does it in the spirit in which a wife might demand an explanation from her husband whom she really respected. He remonstrates with his Maker because he is proud of his Maker. He even speaks of the Almighty as his enemy, but he never doubts, at the back of his mind, that his enemy has some kind of a case which he does not understand. In a fine and famous blasphemy he says, "Oh, that mine adversary had written a book!" It never really occurs to him that it could possibly be a bad book. He is anxious to be convinced, that is, he thinks that God could convince him. In short, we may say again that if the word optimist means anything (which I doubt), Job is an optimist. He shakes the pillars of the world and strikes insanely at the heavens; he lashes the stars, but it is not to silence them; it is to make them speak.
'''
source_url=''
source_title='Introduction to the Book of Job (1907)'
