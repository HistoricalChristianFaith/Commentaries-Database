[[commentary]]
quote='''
There are certain writers to whom humanity owes much, whose talent is yet of so shy or delicate or retrospective a type that we do well to link it with certain quaint places or certain perishing associations. It would not be unnatural to look for the spirit of Horace Walpole at Strawberry Hill, or even for the shade of Thackeray in Old Kensington. But let us have no antiquarianism about Dickens, for Dickens is not an antiquity. Dickens looks not backward, but forward; he might look at our modern mobs with satire, or with fury, but he would love to look at them. He might lash our democracy, but it would be because, like a democrat, he asked much from it. We will not have all his books bound up under the title of 'The Old Curiosity Shop.' Rather we will have them all bound up under the title of 'Great Expectations.' Wherever humanity is he would have us face it and make something of it, swallow it with a holy cannibalism, and assimilate it with the digestion of a giant. We must take these trippers as he would have taken them, and tear out of them their tragedy and their farce. Do you remember now what the angel said at the sepulchre? 'Why seek ye the living among the dead? He is not here; he is risen.'
'''
source_url=''
source_title="Tremendous Trifles, XIII. The Dickensian (1909)"

[[commentary]]
quote='''
There are people who say they wish Christianity to remain as a spirit. They mean, very literally, that they wish it to remain as a ghost. But it is not going to remain as a ghost. What follows this process of apparent death is not the lingering of the shade; it is the resurrection of the body. These people are quite prepared to shed pious and reverential tears over the Sepulchre of the Son of Man; what they are not prepared for is the Son of God walking once more upon the hills of morning. These people, and indeed most people, were indeed by this time quite accustomed to the idea that the old Christian candle-light would fade into the light of common day. To many of them it did quite honestly appear like that pale yellow flame of a candle when it is left burning in daylight. It was all the more unexpected, and therefore all the more unmistakable, that the seven-branched candle-stick suddenly towered to heaven like a miraculous tree and flamed until the sun turned pale.
'''
source_url=''
source_title='The Everlasting Man, The Five Deaths of the Faith (1925)'
