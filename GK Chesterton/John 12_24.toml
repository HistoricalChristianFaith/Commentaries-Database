[[commentary]]
quote='''
It pretends to find something incomprehensible in the feelings that we all comprehend. Who does not find dreams mysterious, and feel that they lie on the dark borderland of being? Who does not feel the death and resurrection of the growing things of the earth as something near to the secret of the universe? Who does not understand that there must always be the savour of something sacred about authority and the solidarity that is the soul of the tribe? If there be any anthropologist who really finds these things remote and impossible to realise, we can say nothing of that scientific gentleman except that he has not got so large and enlightened a mind as a primitive man. To me it seems obvious that nothing but a spiritual sentiment already active could have clothed these separate and diverse things with sanctity.
'''
source_url=''
source_title='The Everlasting Man, Part 1 Ch. 2: Professors and Prehistoric Men'
