[[commentary]]
quote='''
As it was, while the whole world melted into this mass of confused mythology, this Deity who is called tribal and narrow, precisely because he was what is called tribal and narrow, preserved the primary religion of all mankind. He was tribal enough to be universal. He was as narrow as the universe.

In a word, there was a popular pagan god called Jupiter-Ammon. There was never a god called Jehovah-Ammon. There was never a god called Jehovah-Jupiter. If there had been, there would certainly have been another called Jehovah-Moloch.
'''
source_url=''
source_title='The Everlasting Man, Ch. 4 (1925)'
