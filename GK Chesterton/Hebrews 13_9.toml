[[commentary]]
quote='''
It is the great peril of our society that all its mechanisms may grow more fixed while its spirit grows more fickle. A man's minor actions and arrangements ought to be free, flexible, creative; the things that should be unchangeable are his principles, his ideals. But with us the reverse is true; our views change constantly; but our lunch does not change. Now, I should like men to have strong and rooted conceptions, but as for their lunch, let them have it sometimes in the garden, sometimes in bed, sometimes on the roof, sometimes in the top of a tree. Let them argue from the same first principles, but let them do it in a bed, or a boat, or a balloon.
'''
source_url=''
source_title='Tremendous Trifles, On Lying in Bed (1909)'
