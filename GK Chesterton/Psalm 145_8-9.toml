[[commentary]]
quote='''
I crawled across those colossal contours that express the best quality of England, because they are at the same time soft and strong. The smoothness of them has the same meaning as the smoothness of great cart-horses, or the smoothness of the beech-tree; it declares in the teeth of our timid and cruel theories that the mighty are merciful. As my eye swept the landscape, the landscape was as kindly as any of its cottages, but for power it was like an earthquake. The villages in the immense valley were safe, one could see, for centuries; yet the lifting of the whole land was like the lifting of one enormous wave to wash them all away.
'''
source_url=''
source_title='Tremendous Trifles, A Piece of Chalk (1909)'
