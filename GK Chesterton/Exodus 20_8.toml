[[commentary]]
quote='''
The strange truth about the matter is told in the very word “holiday.” A bank holiday means presumably a day which bankers regard as holy. A half-holiday means, I suppose, a day on which a schoolboy is only partially holy. It is hard to see at first sight why so human a thing as leisure and larkiness should always have a religious origin. Rationally there appears no reason why we should not sing and give each other presents in honour of anything—the birth of Michael Angelo or the opening of Euston Station. But it does not work. As a fact, men only become greedily and gloriously material about something spiritualistic. Take away the Nicene Creed and similar things, and you do some strange wrong to the sellers of sausages. Take away the strange beauty of the saints, and what has remained to us is the far stranger ugliness of Wandsworth. Take away the supernatural, and what remains is the unnatural.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 6: Christmas and the Aesthetes (1905)'

[[commentary]]
quote='''
Morality did not begin by one man saying to another, "I will not hit you if you do not hit me"; there is no trace of such a transaction. There is a trace of both men having said, "We must not hit each other in the holy place." They gained their morality by guarding their religion. They did not cultivate courage. They fought for the shrine, and found they had become courageous. They did not cultivate cleanliness. They purified themselves for the altar, and found that they were clean. The history of the Jews is the only early document known to most Englishmen, and the facts can be judged sufficiently from that. The Ten Commandments which have been found substantially common to mankind were merely military commands; a code of regimental orders, issued to protect a certain ark across a certain desert. Anarchy was evil because it endangered the sanctity. And only when they made a holy day for God did they find they had made a holiday for men.
'''
source_url=''
source_title='Orthodoxy, Ch. 5: The Flag of the World (1908)'
