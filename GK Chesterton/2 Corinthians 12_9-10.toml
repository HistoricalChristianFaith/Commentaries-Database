[[commentary]]
quote='''
Energetic people use energy as a means, but only very tired people ever use energy as a reason. Athletes go in for games, because athletes desire glory. Invalids go in for calisthenics; for invalids (alone of all human beings) desire strength. So long as the German Army points to its heraldic eagle and says, "I come in the name of this fierce but fabulous animal," the German Army will be all right. If ever it says, "I come in the name of bayonets," the bayonets will break like glass, for only the weak exhibit strength without an aim.
'''
source_url=''
source_title="All Things Considered, Thoughts Around Koepenick (1908)"

[[commentary]]
quote='''
It is a good sign in a nation when such things are done badly. It shows that all the people are doing them. And it is a bad sign in a nation when such things are done very well, for it shows that only a few experts and eccentrics are doing them, and that the nation is merely looking on. Suppose that whenever we heard of walking in England it always meant walking forty-five miles a day without fatigue. We should be perfectly certain that only a few men were walking at all, and that all the other British subjects were being wheeled about in Bath-chairs. But if when we hear of walking it means slow walking, painful walking, and frequent fatigue, then we know that the mass of the nation still is walking. We know that England is still literally on its feet.
'''
source_url=''
source_title="All Things Considered, Patriotism and Sport (1908)"

[[commentary]]
quote='''
It is only we who play badly who love the Game itself. You love glory; you love applause; you love the earthquake voice of victory; you do not love croquet. You do not love croquet until you love being beaten at croquet. It is we the bunglers who adore the occupation in the abstract. It is we to whom it is art for art's sake. ... Our play is called amateurish; and we wear proudly the name of amateur, for amateurs is but the French for Lovers. We accept all adventures from our Lady, the most disastrous or the most dreary. ... The good painter has skill. It is the bad painter who loves his art. The good musician loves being a musician, the bad musician loves music.
'''
source_url=''
source_title='Tremendous Trifles, The Perfect Game (1909)'

[[commentary]]
quote='''
All pessimism has a secret optimism for its object. All surrender of life, all denial of pleasure, all darkness, all austerity, all desolation has for its real aim this separation of something so that it may be poignantly and perfectly enjoyed. I feel grateful for the slight sprain which has introduced this mysterious and fascinating division between one of my feet and the other. The way to love anything is to realise that it might be lost. In one of my feet I can feel how strong and splendid a foot is; in the other I can realise how very much otherwise it might have been. The moral of the thing is wholly exhilarating. This world and all our powers in it are far more awful and beautiful than even we know until some accident reminds us. If you wish to perceive that limitless felicity, limit yourself if only for a moment.
'''
source_url=''
source_title="Tremendous Trifles, The Advantages of Having One Leg (1909)"

[[commentary]]
quote='''
And this is really all that we can do when we fight something really stronger than ourselves; we can deal it its death-wound one moment; it deals us death in the end. It is something if we can shock and jar the unthinking impetus and enormous innocence of evil; just as a pebble on a railway can stagger the Scotch express.
'''
source_url=''
source_title='Tremendous Trifles, XX. The Giant (1909)'

[[commentary]]
quote='''
The modern world, when it praises its little Caesars, talks of being strong and brave: but it does not seem to see the eternal paradox involved in the conjunction of these ideas. The strong cannot be brave. Only the weak can be brave; and yet again, in practice, only those who can be brave can be trusted, in time of doubt, to be strong. The only way in which a giant could really keep himself in training against the inevitable Jack would be by continually fighting other giants ten times as big as himself. That is by ceasing to be a giant and becoming a Jack. Thus that sympathy with the small or the defeated as such, with which we Liberals and Nationalists have been often reproached, is not a useless sentimentalism at all, as Mr. Wells and his friends fancy. It is the first law of practical courage. To be in the weakest camp is to be in the strongest school.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 5: Mr. H. G. Wells and the Giants (1905)'

[[commentary]]
quote='''
The truth is that the tradition of Christianity (which is still the only coherent ethic of Europe) rests on two or three paradoxes or mysteries which can easily be impugned in argument and as easily justified in life. One of them, for instance, is the paradox of hope or faith—that the more hopeless is the situation the more hopeful must be the man. Stevenson understood this, and consequently Mr. Moore cannot understand Stevenson. Another is the paradox of charity or chivalry that the weaker a thing is the more it should be respected, that the more indefensible a thing is the more it should appeal to us for a certain kind of defence. Thackeray understood this, and therefore Mr. Moore does not understand Thackeray.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 9: The Moods of Mr. George Moore (1905)'
