[[commentary]]
quote='''
This new frivolity is inadequate because there is in it no strong sense of an unuttered joy.  The men and women who exchange the repartees may not only be hating each other, but hating even themselves. Any one of them might be bankrupt that day, or sentenced to be shot the next.  They are joking, not because they are merry, but because they are not; out of the emptiness of the heart the mouth speaketh. Even when they talk pure nonsense it is a careful nonsense—a nonsense of which they are economical, or, to use the perfect expression of Mr. W. S. Gilbert in “Patience,” it is such “precious nonsense.” Even when they become light-headed they do not become light-hearted. All those who have read anything of the rationalism of the moderns know that their Reason is a sad thing.  But even their unreason is sad.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 15: On Smart Novelists and the Smart Set (1905)'
