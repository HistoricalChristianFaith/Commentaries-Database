[[commentary]]
quote='''
And then the higher culture. I know that culture. I would not set any man free for it if I could help it. The effect of it on the rich men who are free for it is so horrible that it is worse than any of the other amusements of the millionaire—worse than gambling, worse even than philanthropy. It means thinking the smallest poet in Belgium greater than the greatest poet of England. It means losing every democratic sympathy. It means being unable to talk to a navvy about sport, or about beer, or about the Bible, or about the Derby, or about patriotism, or about anything whatever that he, the navvy, wants to talk about. It means taking literature seriously, a very amateurish thing to do. It means pardoning indecency only when it is gloomy indecency. Its disciples will call a spade a spade; but only when it is a grave-digger's spade. The higher culture is sad, cheap, impudent, unkind, without honesty and without ease. In short, it is "high." That abominable word (also applied to game) admirably describes it.
'''
time=1910
source_url=''
source_title="What's Wrong with the World, Woman (1910)"

[[commentary]]
quote='''
But the real historic strength of England, physical and moral, has never had anything to do with this athletic specialism; it has been rather hindered by it. Somebody said that the Battle of Waterloo was won on Eton playing-fields. It was a particularly unfortunate remark, for the English contribution to the victory of Waterloo depended very much more than is common in victories upon the steadiness of the rank and file in an almost desperate situation. The Battle of Waterloo was won by the stubbornness of the common soldier—that is to say, it was won by the man who had never been to Eton. It was absurd to say that Waterloo was won on Eton cricket-fields. But it might have been fairly said that Waterloo was won on the village green, where clumsy boys played a very clumsy cricket. In a word, it was the average of the nation that was strong, and athletic glories do not indicate much about the average of a nation. Waterloo was not won by good cricket-players. But Waterloo was won by bad cricket-players, by a mass of men who had some minimum of athletic instincts and habits.
'''
source_url=''
source_title="All Things Considered, Patriotism and Sport (1908)"

[[commentary]]
quote='''
If there is one class of men whom history has proved especially and supremely capable of going quite wrong in all directions, it is the class of highly intellectual men. I would always prefer to go by the bulk of humanity; that is why I am a democrat.
'''
source_url=''
source_title="All Things Considered, The Error of Impartiality (1908)"

[[commentary]]
quote='''
All Joan's wisdom and energy, it seems, came from a certain priest, of whom there is not the tiniest trace in all the multitudinous records of her life. The only foundation I can find for this fancy is the highly undemocratic idea that a peasant girl could not possibly have any ideas of her own. It is very hard for a freethinker to remain democratic. The writer seems altogether to forget what is meant by the moral atmosphere of a community. To say that Joan must have learnt her vision of a virgin overthrowing evil from _a_ priest, is like saying that some modern girl in London, pitying the poor, must have learnt it from _a_ Labour Member. She would learn it where the Labour Member learnt it—in the whole state of our society.
'''
source_url=''
source_title='All Things Considered, The Maid of Orleans (1908)'

[[commentary]]
quote='''
It is only we who play badly who love the Game itself. You love glory; you love applause; you love the earthquake voice of victory; you do not love croquet. ... It is we the bunglers who adore the occupation in the abstract. ... Our play is called amateurish; and we wear proudly the name of amateur, for amateurs is but the French for Lovers. ... The good painter has skill. It is the bad painter who loves his art. The good musician loves being a musician, the bad musician loves music. With such a pure and hopeless passion do I worship croquet.
'''
source_url=''
source_title='Tremendous Trifles, The Perfect Game (1909)'

[[commentary]]
quote='''
Our civilisation has decided, and very justly decided, that determining the guilt or innocence of men is a thing too important to be trusted to trained men. It wishes for light upon that awful matter, it asks men who know no more law than I know, but who can feel the things that I felt in the jury box. When it wants a library catalogued, or the solar system discovered, or any trifle of that kind, it uses up specialists. But when it wishes anything done which is really serious, it collects twelve of the ordinary men standing round. The same thing was done, if I remember right, by the Founder of Christianity.
'''
source_url=''
source_title='Tremendous Trifles, The Twelve Men (1909)'

[[commentary]]
quote='''
This especially is true of the toy theatre; that, by reducing the scale of events it can introduce much larger events. Because it is small it could easily represent the earthquake in Jamaica. Because it is small it could easily represent the Day of Judgment. Exactly in so far as it is limited, so far it could play easily with falling cities or with falling stars. Meanwhile the big theatres are obliged to be economical because they are big. When we have understood this fact we shall have understood something of the reason why the world has always been first inspired by small nationalities. The vast Greek philosophy could fit easier into the small city of Athens than into the immense Empire of Persia. In the narrow streets of Florence Dante felt that there was room for Purgatory and Heaven and Hell. He would have been stifled by the British Empire. Great empires are necessarily prosaic; for it is beyond human power to act a great poem upon so great a scale. You can only represent very big ideas in very small spaces.
'''
source_url=''
source_title='Tremendous Trifles, The Toy Theatre (1909)'

[[commentary]]
quote='''
It is remarkable that in so many great wars it has been the defeated who have won. The people who were left worst at the end of the war were generally the people who were left best at the end of the whole business. For instance, the Crusades ended in the defeat of the Christians. But they did not end in the decline of the Christians; they ended in the decline of the Saracens. That huge prophetic wave of Moslem power which had hung in the very heavens above the towns of Christendom, that wave was broken, and never came on again. The Crusaders had saved Paris in the act of losing Jerusalem. The same applies to that epic of Republican war in the eighteenth century to which we Liberals owe our political creed. The French Revolution ended in defeat: the kings came back across a carpet of dead at Waterloo. The Revolution had lost its last battle; but it had gained its first object. It had cut a chasm. The world has never been the same since. No one after that has ever been able to treat the poor merely as a pavement.
'''
source_url=''
source_title='Tremendous Trifles, XX. The Giant (1909)'

[[commentary]]
quote='''
Democracy means getting those people to vote who would never have the cheek to govern: and (according to Christian ethics) the precise people who ought to govern are the people who have not the cheek to do it.
'''
source_url=''
source_title='Tremendous Trifles, The Travellers in State (1909)'

[[commentary]]
quote='''
If you wish to find the past preserved, follow the million feet of the crowd. At the worst the uneducated only wear down old things by sheer walking. But the educated kick them down out of sheer culture.
'''
time=1909
source_url=''
source_title='Tremendous Trifles, XXXIII. The Prehistoric Railway Station (1909)'

[[commentary]]
quote='''
The modern world, when it praises its little Caesars, talks of being strong and brave: but it does not seem to see the eternal paradox involved in the conjunction of these ideas. The strong cannot be brave. Only the weak can be brave; and yet again, in practice, only those who can be brave can be trusted, in time of doubt, to be strong. The only way in which a giant could really keep himself in training against the inevitable Jack would be by continually fighting other giants ten times as big as himself. That is by ceasing to be a giant and becoming a Jack. Thus that sympathy with the small or the defeated as such, with which we Liberals and Nationalists have been often reproached, is not a useless sentimentalism at all, as Mr. Wells and his friends fancy. It is the first law of practical courage. To be in the weakest camp is to be in the strongest school.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 5: Mr. H. G. Wells and the Giants (1905)'

[[commentary]]
quote='''
The truth is that the tradition of Christianity (which is still the only coherent ethic of Europe) rests on two or three paradoxes or mysteries which can easily be impugned in argument and as easily justified in life. One of them, for instance, is the paradox of hope or faith—that the more hopeless is the situation the more hopeful must be the man. Stevenson understood this, and consequently Mr. Moore cannot understand Stevenson. Another is the paradox of charity or chivalry that the weaker a thing is the more it should be respected, that the more indefensible a thing is the more it should appeal to us for a certain kind of defence. Thackeray understood this, and therefore Mr. Moore does not understand Thackeray.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 9: The Moods of Mr. George Moore (1905)'

[[commentary]]
quote='''
We are always ready to make a saint or prophet of the educated man who goes into cottages to give a little kindly advice to the uneducated. But the medieval idea of a saint or prophet was something quite different. The mediaeval saint or prophet was an uneducated man who walked into grand houses to give a little kindly advice to the educated. The old tyrants had enough insolence to despoil the poor, but they had not enough insolence to preach to them. It was the gentleman who oppressed the slums; but it was the slums that admonished the gentleman.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 19: Slum Novelists and the Slums (1905)'
