[[commentary]]
quote='''
Now there is very good ground for guessing that religion did not originally come from some detail that was forgotten because it was too small to be traced. Much more probably it was an idea that was abandoned because it was too large to be managed. There is very good reason to suppose that many people did begin with the simple but overwhelming idea of one God who governs all; and afterwards fell away into such things as demon-worship almost as a sort of secret dissipation. Even the test of savage beliefs, of which the folk-lore students are so fond, is admittedly often found to support such a view. Some of the very rudest savages, primitive in every sense in which anthropologists use the word, the Australian aborigines for instance, are found to have a pure monotheism with a high moral tone. A missionary was preaching to a very wild tribe of polytheists, who had told him all their polytheistic tales, and telling them in return of the existence of the one good God who is a spirit and judges men by spiritual standards. And there was a sudden buzz of excitement among these stolid barbarians, as at somebody who was letting out a secret, and they cried to each other, ‘Atahocan! He is speaking of Atahocan!’
'''
source_url=''
source_title='The Everlasting Man, Ch. 4 (1925)'
