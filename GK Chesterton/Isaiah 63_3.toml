[[commentary]]
quote='''
The central idea of the great part of the Old Testament may be called the idea of the loneliness of God. God is not the only chief character of the Old Testament; God is properly the only character in the Old Testament. Compared with His clearness of purpose, all the other wills are heavy and automatic, like those of animals; compared with His actuality, all the sons of flesh are shadows. "I have trodden the winepress alone, and of the peoples there was no man with me." All the patriarchs and prophets are merely His tools or weapons; for the Lord is a man of war. He uses Joshua like an axe or Moses like a measuring rod. For Him, Samson, is only a sword and Isaiah a trumpet.

Everywhere else, then, the Old Testament positively rejoices in the obliteration of man in comparison with the divine purpose. The book of Job stands definitely alone because the book of Job definitely asks, "But what is the purpose of God? Is it worth the sacrifice even of our miserable humanity? Of course, it is easy enough to wipe out our own paltry wills for the sake of a will that is grander and kinder. But is it grander and kinder? Let God use His tools; let God break His tools. But what is He doing, and what are they being broken for?"
'''
source_url=''
source_title='Introduction to the Book of Job (1907)'
