[[commentary]]
quote='''
There are three broad classes of the special things in which human wisdom does permit privacy. The first is the case I have mentioned—that of hide-and-seek, or the police novel, in which it permits privacy only in order to explode and smash privacy. The author makes first a fastidious secret of how the Bishop was murdered, only in order that he may at last declare, as from a high tower, to the whole democracy the great glad news that he was murdered by the governess. In that case, ignorance is only valued because being ignorant is the best and purest preparation for receiving the horrible revelations of high life. Somewhat in the same way being an agnostic is the best and purest preparation for receiving the happy revelations of St. John.

This first sort of secrecy we may dismiss, for its whole ultimate object is not to keep the secret, but to tell it.
'''
time=1908
source_url=''
source_title='On Political Secrecy (All Things Considered)'

[[commentary]]
quote='''
I should like it to be a fixed thing that the name of the proprietor as well as the editor should be printed upon every paper. If the paper is owned by shareholders, let there be a list of shareholders. If (as is far more common in this singularly undemocratic age) it is owned by one man, let that one man's name be printed on the paper, if possible in large red letters. Then, if there are any obvious interests being served, we shall know that they are being served.
'''
source_url=''
source_title='Anonymity and Further Counsels (All Things Considered)'
