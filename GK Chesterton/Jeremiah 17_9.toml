[[commentary]]
quote='''
Torture is not a relic of barbarism at all. In actuality it is simply a relic of sin; but in comparative history it may well be called a relic of civilisation. It has always been most artistic and elaborate when everything else was most artistic and elaborate. Thus it was detailed exquisite in the late Roman Empire, in the complex and gorgeous sixteenth century, in the centralised French monarchy a hundred years before the Revolution, and in the great Chinese civilisation to this day. This is, first and last, the frightful thing we must remember. In so far as we grow instructed and refined we are not (in any sense whatever) naturally moving away from torture. We may be moving towards torture. We must know what we are doing, if we are to avoid the enormous secret cruelty which has crowned every historic civilisation.
'''
source_url=''
source_title='Tremendous Trifles, The Travellers in State (1909)'

[[commentary]]
quote='''
In his new Utopia he says, for instance, that a chief point of the Utopia will be a disbelief in original sin. If he had begun with the human soul—that is, if he had begun on himself—he would have found original sin almost the first thing to be believed in. He would have found, to put the matter shortly, that a permanent possibility of selfishness arises from the mere fact of having a self, and not from any accidents of education or ill-treatment. And the weakness of all Utopias is this, that they take the greatest difficulty of man and assume it to be overcome, and then give an elaborate account of the overcoming of the smaller ones.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 5: Mr. H. G. Wells and the Giants (1905)'
