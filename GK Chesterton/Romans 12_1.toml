[[commentary]]
quote='''
I threw away my cigar. Something that is as old as man and has to do with all mourning and ceremonial told me to do it. There was something unnecessarily horrible, it seemed to me, in the idea of there being only two men in that train, and one of them dead and the other smoking a cigar. And as the red and gold of the butt end of it faded like a funeral torch trampled out at some symbolic moment of a procession, I realised how immortal ritual is. I realised (what is the origin and essence of all ritual) that in the presence of those sacred riddles about which we can say nothing it is more decent merely to do something. And I realised that ritual will always mean throwing away something; DESTROYING our corn or wine upon the altar of our gods.
'''
time=1909
source_url=''
source_title='The Secret of a Train (Tremendous Trifles)'
