[[commentary]]
quote='''
And thus no animal ever invented anything so bad as drunkenness—or so good as drink.
'''
time=1908
source_url=''
source_title='Wine When It Is Red (All Things Considered)'

[[commentary]]
quote='''
He and those he has influenced do not see that if we are to be truly gay, we must believe that there is some eternal gaiety in the nature of things. We cannot enjoy thoroughly even a pas-de-quatre at a subscription dance unless we believe that the stars are dancing to the same tune. No one can be really hilarious but the serious man. “Wine,” says the Scripture, “maketh glad the heart of man,” but only of the man who has a heart. The thing called high spirits is possible only to the spiritual. Ultimately a man cannot rejoice in anything except the nature of things. Ultimately a man can enjoy nothing except religion. Once in the world’s history men did believe that the stars were dancing to the tune of their temples, and they danced as men have never danced since.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 7: Omar and the Sacred Vine (1905)'
