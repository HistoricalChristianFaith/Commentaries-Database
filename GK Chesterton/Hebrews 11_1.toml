[[commentary]]
quote='''
A man who has lived and loved falls down dead and the worms eat him. That is Materialism if you like. That is Atheism if you like. If mankind has believed in spite of that, it can believe in spite of anything. But why our human lot is made any more hopeless because we know the names of all the worms who eat him, or the names of all the parts of him that they eat, is to a thoughtful mind somewhat difficult to discover.
'''
time=1908
source_url=''
source_title='All Things Considered, Science and Religion (1908)'

[[commentary]]
quote='''
Joan of Arc is a wild and wonderful thing enough, but she is much saner than most of her critics and biographers. We shall not recover the common sense of Joan until we have recovered her mysticism. Our wars fail, because they begin with something sensible and obvious—such as getting to Pretoria by Christmas. But her war succeeded—because it began with something wild and perfect—the saints delivering France. She put her idealism in the right place, and her realism also in the right place: we moderns get both displaced. She put her dreams and her sentiment into her aims, where they ought to be; she put her practicality into her practice. In modern Imperial wars, the case is reversed. Our dreams, our aims are always, we insist, quite practical. It is our practice that is dreamy.
'''
source_url=''
source_title='All Things Considered, The Maid of Orleans (1908)'

[[commentary]]
quote='''
It is the mark of religious forms that they declare something unknown. But it is the mark of worldly forms that they declare something which is known, and which is known to be untrue. When the Pope in an Encyclical calls himself your father, it is a matter of faith or of doubt. But when the Duke of Devonshire in a letter calls himself yours obediently, you know that he means the opposite of what he says. Religious forms are, at the worst, fables; they might be true. Secular forms are falsehoods; they are not true.
'''
time=1908
source_url=''
source_title='All Things Considered, A Dead Poet (1908)'

[[commentary]]
quote='''
I believe in the supernatural as a matter of intellect and reason, not as a matter of personal experience. I do not see ghosts; I only see their inherent probability.
'''
source_url=''
source_title='Tremendous Trifles, The Perfect Game (1909)'

[[commentary]]
quote='''
The question is whether a man can be certain of anything at all. I think he can be certain, for if (as I said to my friend, furiously brandishing an empty bottle) it is impossible intellectually to entertain certainty, what is this certainty which it is impossible to entertain? If I have never experienced such a thing as certainty I cannot even say that a thing is not certain. Similarly, if I have never experienced such a thing as green I cannot even say that my nose is not green. It may be as green as possible for all I know, if I have really no experience of greenness.
'''
time=1909
source_url=''
source_title='Tremendous Trifles, The Extraordinary Cabman (1909)'

[[commentary]]
quote='''
As long as matters are really hopeful, hope is a mere flattery or platitude; it is only when everything is hopeless that hope begins to be a strength at all. Like all the Christian virtues, it is as unreasonable as it is indispensable.
'''
source_url=''
source_title='Heretics, The Mildness of the Yellow Press (1905)'

[[commentary]]
quote='''
The truth is that the tradition of Christianity (which is still the only coherent ethic of Europe) rests on two or three paradoxes or mysteries which can easily be impugned in argument and as easily justified in life. One of them, for instance, is the paradox of hope or faith—that the more hopeless is the situation the more hopeful must be the man. Stevenson understood this, and consequently Mr. Moore cannot understand Stevenson. Another is the paradox of charity or chivalry that the weaker a thing is the more it should be respected, that the more indefensible a thing is the more it should appeal to us for a certain kind of defence. Thackeray understood this, and therefore Mr. Moore does not understand Thackeray.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 9: The Moods of Mr. George Moore (1905)'

[[commentary]]
quote='''
As the word “unreasonable” is open to misunderstanding, the matter may be more accurately put by saying that each one of these Christian or mystical virtues involves a paradox in its own nature, and that this is not true of any of the typically pagan or rationalist virtues. Justice consists in finding out a certain thing due to a certain man and giving it to him. Temperance consists in finding out the proper limit of a particular indulgence and adhering to that. But charity means pardoning what is unpardonable, or it is no virtue at all. Hope means hoping when things are hopeless, or it is no virtue at all. And faith means believing the incredible, or it is no virtue at all.
'''
source_url=''
source_title='Heretics, Ch. 12: Paganism and Mr. Lowes Dickinson (1905)'

[[commentary]]
quote='''
Whatever may be the meaning of faith, it must always mean a certainty about something we cannot prove. Thus, for instance, we believe by faith in the existence of other people.
'''
source_url=''
source_title='Heretics, Ch. 12: Paganism and Mr. Lowes Dickinson (1905)'

[[commentary]]
quote='''
He could see the tiny figures of the boys in the valley below, and he knew by their attitudes that they were eagerly telling him to jump. Then for the first time he knew the nature of faith, as he had just known the fierce nature of charity. Or rather for the second time, for he remembered one moment when he had known faith before. It was when his father had taught him to swim, and he had believed he could float on water not only against reason, but (what is so much harder) against instinct. Then he had trusted water; now he must trust air.

He jumped. He went through air and then through snow with the same blinding swiftness. But as he buried himself in solid snow like a bullet he seemed to learn a million things and to learn them all too fast. He knew that the whole world is a snowball, and that all the stars are snowballs. He knew that no man will be fit for heaven till he loves solid whiteness as a little boy loves a ball of snow.
'''
source_url=''
source_title='Alarms and Discursions, The Modern Scrooge (1910)'
