[[commentary]]
quote='''
But it is a better exercise still to remember how all things have had this hair-breadth escape: everything has been saved from a wreck. Every man has had one horrible adventure: as a hidden untimely birth he had not been, as infants that never see the light. Men spoke much in my boyhood of restricted or ruined men of genius: and it was common to say that many a man was a Great Might-Have-Been. To me it is a more solid and startling fact that any man in the street is a Great Might-Not-Have-Been.
'''
source_url=''
source_title='Orthodoxy, Ch. 4: The Ethics of Elfland (1908)'
