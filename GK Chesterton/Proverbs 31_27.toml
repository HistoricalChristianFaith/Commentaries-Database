[[commentary]]
quote='''
Of the two sexes the woman is in the more powerful position. For the average woman is at the head of something with which she can do as she likes; the average man has to obey orders and do nothing else. He has to put one dull brick on another dull brick, and do nothing else; he has to add one dull figure to another dull figure, and do nothing else. The woman's world is a small one, perhaps, but she can alter it. The woman can tell the tradesman with whom she deals some realistic things about himself. The clerk who does this to the manager generally gets the sack, or shall we say (to avoid the vulgarism), finds himself free for higher culture. Above all, as I said in my previous article, the woman does work which is in some small degree creative and individual. She can put the flowers or the furniture in fancy arrangements of her own. I fear the bricklayer cannot put the bricks in fancy arrangements of his own, without disaster to himself and others. If the woman is only putting a patch into a carpet, she can choose the thing with regard to colour. I fear it would not do for the office boy dispatching a parcel to choose his stamps with a view to colour; to prefer the tender mauve of the sixpenny to the crude scarlet of the penny stamp. A woman cooking may not always cook artistically; still she can cook artistically. She can introduce a personal and imperceptible alteration into the composition of a soup. The clerk is not encouraged to introduce a personal and imperceptible alteration into the figures in a ledger.
'''
time=1910
source_url=''
source_title="What's Wrong with the World, Woman (1910)"
