[[commentary]]
quote='''
The statement that the meek shall inherit the earth is very far from being a meek statement. I mean it is not meek in the ordinary sense of mild and moderate and inoffensive. To justify it, it would be necessary to go very deep into history and anticipate things undreamed of then and by many unrealised even now; such as the way in which the mystical monks reclaimed the lands which the practical kings had lost. If it was a truth at all, it was because it was a prophecy. But certainly it was not a truth in the sense of a truism. The blessing upon the meek would seem to be a very violent statement; in the sense of doing violence to reason and probability. And with this we come to another important stage in the speculation. As a prophecy it really was fulfilled; but it was only fulfilled long afterwards. The monasteries were the most practical and prosperous estates and experiments in reconstruction after the barbaric deluge; the meek did really inherit the earth. But nobody could have known anything of the sort at the time--unless indeed there was one who knew.
'''
source_url=''
source_title='The Everlasting Man, Part 2 Ch. 2: The Riddles of the Gospel (1925)'

[[commentary]]
quote='''
The truth is, that all genuine appreciation rests on a certain mystery of humility and almost of darkness. The man who said, “Blessed is he that expecteth nothing, for he shall not be disappointed,” put the eulogy quite inadequately and even falsely. The truth “Blessed is he that expecteth nothing, for he shall be gloriously surprised.” The man who expects nothing sees redder roses than common men can see, and greener grass, and a more startling sun. Blessed is he that expecteth nothing, for he shall possess the cities and the mountains; blessed is the meek, for he shall inherit the earth. Until we realize that things might not be we cannot realize that things are. Until we see the background of darkness we cannot admire the light as a single and created thing. As soon as we have seen that darkness, all light is lightening, sudden, blinding, and divine. Until we picture nonentity we underrate the victory of God, and can realize none of the trophies of His ancient war. It is one of the million wild jests of truth that we know nothing until we know nothing.
'''
source_url=''
source_title='Heretics, Ch. 4: Mr. Bernard Shaw (1905)'
