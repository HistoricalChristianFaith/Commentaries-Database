[[commentary]]
quote='''
He would not find the ordinary platitudes in favour of peace. He would find several paradoxes in favour of peace. He would find several ideals of non-resistance, which taken as they stand would be rather too pacific for any pacifist. He would be told in one passage to treat a robber not with passive resistance, but rather with positive and enthusiastic encouragement, if the terms be taken literally; heaping up gifts upon the man who had stolen goods. But he would not find a word of all that obvious rhetoric against war which has filled countless books and odes and orations; not a word about the wickedness of war, the wastefulness of war, the appalling scale of the slaughter in war and all the rest of the familiar frenzy; indeed not a word about war at all.
'''
source_url=''
source_title='The Everlasting Man, Part 2 Ch. 2: The Riddles of the Gospel (1925)'
