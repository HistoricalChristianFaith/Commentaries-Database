[[commentary]]
quote='''
But in one sense there is a significance in the old slavery. It stands for one fundamental fact about all antiquity before Christ; something to be assumed from first to last. It is the insignificance of the individual before the State. It was as true of the most democratic City State in Hellas as of any despotism in Babylon. It is one of the signs of this spirit that a whole class of individuals could be insignificant or even invisible. It must be normal because it was needed for what would now be called 'social service.' Somebody said, 'The Man is nothing and the Work is all,' meaning it for a breezy Carlylean commonplace. It was the sinister motto of the heathen Servile State. In that sense there is truth in the traditional vision of vast pillars and pyramids going up under those everlasting skies for ever, by the labour of numberless and nameless men, toiling like ants and dying like flies, wiped out by the work of their own hands.
'''
source_url=''
source_title='The Everlasting Man, Chapter III: The Antiquity of Civilisation (1925)'
