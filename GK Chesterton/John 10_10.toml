[[commentary]]
quote='''
My first religion was pure Paganism, which among sincere men is more shortly described as extreme fear. Then there succeeded a state of mind which is quite real, but for which no proper name has ever been found. The ancients called it Stoicism, and I think it must be what some German lunatics mean (if they mean anything) when they talk about Pessimism. It was an empty and open acceptance of the thing that happens--as if one had got beyond the value of it. And then, curiously enough, came a very strong contrary feeling--that things mattered very much indeed, and yet that they were something more than tragic. It was a feeling, not that life was unimportant, but that life was much too important ever to be anything but life. I hope that this was Christianity.
'''
source_url=''
source_title='Tremendous Trifles, An Accident (1909)'

[[commentary]]
quote='''
In considering the war of the Albigensians, we come to the breach in the heart of Europe and the landslide of a new philosophy that nearly ended Christendom for ever. In that case the new philosophy was also a very new philosophy; it was pessimism. It was none the less like modern ideas because it was as old as Asia; most modern ideas are. It was the Gnostics returning; but why did the Gnostics return? Because it was the end of an epoch, like the end of the Empire; and should have been the end of the Church. It was Schopenhauer hovering over the future; but it was also Manichaeus rising from the dead; that men might have death and that they might have it more abundantly.
'''
source_url=''
source_title='The Everlasting Man, The Five Deaths of the Faith (1925)'
