[[commentary]]
quote='''
Just as the ragged outline of a tree grows suddenly more ragged and rises into fantastic crests or tattered tails, so the human city rises under the wind of the spirit into toppling temples or sudden spires. No man has ever seen a revolution. Mobs pouring through the palaces, blood pouring down the gutters, the guillotine lifted higher than the throne, a prison in ruins, a people in arms--these things are not revolution, but the results of revolution. ... The wind is up above the world before a twig on the tree has moved. So there must always be a battle in the sky before there is a battle on the earth.
'''
source_url=''
source_title='Tremendous Trifles, The Wind and the Trees (1909)'
