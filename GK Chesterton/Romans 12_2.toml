[[commentary]]
quote='''
My correspondent also says that the habit of dining out in restaurants, etc., is growing. So, I believe, is the habit of committing suicide. I do not desire to connect the two facts together. It seems fairly clear that a man could not dine at a restaurant because he had just committed suicide; and it would be extreme, perhaps, to suggest that he commits suicide because he has just dined at a restaurant. But the two cases, when put side by side, are enough to indicate the falsity and poltroonery of this eternal modern argument from what is in fashion. The question for brave men is not whether a certain thing is increasing; the question is whether we are increasing it.
'''
time=1910
source_url=''
source_title="What's Wrong with the World, Woman (1910)"
