[[commentary]]
quote='''
Perhaps the only point in which we could possibly say that the Church fitted into the pagan world is the fact that they were both not only highly civilised but rather complicated. They were both emphatically many-sided; but antiquity was then a many-sided hole, like a hexagonal hole waiting for an equally hexagonal stopper. In that sense only the Church was many-sided enough to fit the world. The six sides of the Mediterranean world faced each other across the sea and waited for something that should look all ways at once. The Church had to be both Roman and Greek and Jewish and African and Asiatic. In the very words of the Apostle of the Gentiles, it was indeed all things to all men.
'''
source_url=''
source_title='The Everlasting Man, Part II, Chapter IV: The Witness of the Heretics (1925)'
