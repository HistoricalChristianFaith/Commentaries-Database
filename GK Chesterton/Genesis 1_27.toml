[[commentary]]
quote='''
Quite equally subtle and spiritual is the idea at the back of laughing at foreigners. It concerns the almost torturing truth of a thing being like oneself and yet not like oneself. Nobody laughs at what is entirely foreign; nobody laughs at a palm tree. But it is funny to see the familiar image of God disguised behind the black beard of a Frenchman or the black face of a Negro. There is nothing funny in the sounds that are wholly inhuman, the howling of wild beasts or of the wind. But if a man begins to talk like oneself, but all the syllables come out different, then if one is a man one feels inclined to laugh, though if one is a gentleman one resists the inclination.
'''
time=1908
source_url=''
source_title='Cockneys and Their Jokes (All Things Considered)'

[[commentary]]
quote='''
Why is it funny that a man should sit down suddenly in the street? There is only one possible or intelligent reason: that man is the image of God. It is not funny that anything else should fall down; only that a man should fall down. No one sees anything funny in a tree falling down. No one sees a delicate absurdity in a stone falling down. No man stops in the road and roars with laughter at the sight of the snow coming down. The fall of thunderbolts is treated with some gravity. The fall of roofs and high buildings is taken seriously. It is only when a man tumbles down that we laugh. Why do we laugh? Because it is a grave religious matter: it is the Fall of Man. Only man can be absurd: for only man can be dignified.
'''
time=1908
source_url=''
source_title='Spiritualism (All Things Considered)'

[[commentary]]
quote='''
This world and all our powers in it are far more awful and beautiful than even we know until some accident reminds us. If you wish to perceive that limitless felicity, limit yourself if only for a moment. If you wish to realise how fearfully and wonderfully God's image is made, stand on one leg.
'''
source_url=''
source_title="Tremendous Trifles, The Advantages of Having One Leg (1909)"

[[commentary]]
quote='''
I wanted men--any men; and I felt our awful alliance over all the globe. And at last, when I had walked for what seemed a long time, I saw a light too near the earth to mean anything except the image of God.
'''
source_url=''
source_title='Tremendous Trifles, Humanity: an Interlude (1909)'

[[commentary]]
quote='''
In short, it is the purpose of this introduction to maintain this thesis: that it is exactly when we do regard man as an animal that we know he is not an animal. It is precisely when we do try to picture him as a sort of horse on its hind legs that we suddenly realise that he must be something as miraculous as the winged horse that towered up into the clouds of heaven. All roads lead to Rome, all ways lead round again to the central and civilised philosophy, including this road through elfland and topsyturvydom. But it may be that it is better never to have left the land of a reasonable tradition, where men ride lightly upon horses and are mighty hunters before the Lord.
'''
source_url=''
source_title='The Everlasting Man, Introduction: The Plan of This Book (1925)'

[[commentary]]
quote='''
This creature was truly different from all other creatures; because he was a creator as well as a creature. Nothing in that sense could be made in any other image but the image of man. But the truth is so true that, even in the absence of any religious belief, it must be assumed in the form of some moral or metaphysical principle.
'''
time=1925
source_url=''
source_title='The Everlasting Man, Chapter I: The Man in the Cave (1925)'

[[commentary]]
quote='''
Somehow or other a new thing had appeared in the cavernous night of nature; a mind that is like a mirror. It is like a mirror because it is truly a thing of reflection. It is like a mirror because in it alone all the other shapes can be seen like shining shadows in a vision. Above all, it is like a mirror because it is the only thing of its kind. Other things may resemble it or resemble each other in various ways; other things may excel it or excel each other in various ways; just as in the furniture of a room a table may be round like a mirror or a cupboard may be larger than a mirror. But the mirror is the only thing that can contain them all. Man is the microcosm; man is the measure of all things; man is the image of God.
'''
time=1925
source_url=''
source_title='The Everlasting Man, Chapter I: The Man in the Cave (1925)'

[[commentary]]
quote='''
And there remains with them, as already suggested, the testimony to something that is absolute and unique; that belongs to man and to nothing else except man; that is a difference of kind and not a difference of degree. A monkey does not draw clumsily and a man cleverly; a monkey does not begin the art of representation and a man carry it to perfection. A monkey does not do it at all; he does not begin to do it at all; he does not begin to begin to do it at all. A line of some kind is crossed before the first faint line can begin.
'''
source_url=''
source_title='The Everlasting Man, Part 1 Ch. 2: Professors and Prehistoric Men'

[[commentary]]
quote='''
No human being was ever really so unnatural as to worship Nature. No man, however indulgent (as I am) to corpulency, ever worshipped a man as round as the sun or a woman as round as the moon. No man, however attracted to an artistic attenuation, ever really believed that the Dryad was as lean and stiff as the tree. We human beings have never worshipped Nature; and indeed, the reason is very simple. It is that all human beings are superhuman beings. We have printed our own image upon Nature, as God has printed His image upon us. We have told the enormous sun to stand still; we have fixed him on our shields, caring no more for a star than for a starfish. And when there were powers of Nature we could not for the time control, we have conceived great beings in human shape controlling them. Jupiter does not mean thunder. Thunder means the march and victory of Jupiter. Neptune does not mean the sea; the sea is his, and he made it. In other words, what the savage really said about the sea was, “Only my fetish Mumbo could raise such mountains out of mere water.” What the savage really said about the sun was, “Only my great great-grandfather Jumbo could deserve such a blazing crown.”
'''
source_url=''
source_title='A Miscellany of Men, The Priest of Spring (1912)'

[[commentary]]
quote='''
For the first injustice, of which we have spoken, still recurs; and if we grant that the East has a right to its difference, it is not realised in what we differ. That nursery tale from nowhere about St. George and the Dragon really expresses best the relation between the West and the East. There were many other differences, calculated to arrest even the superficial eye, between a saint and a dragon. But the essential difference was simply this: that the Dragon did want to eat St. George; whereas St. George would have felt a strong distaste for eating the Dragon. In most of the stories he killed the Dragon. In many of the stories he not only spared, but baptised it. But in neither case did the Christian have any appetite for cold dragon. The Dragon, however, really has an appetite for cold Christian--and especially for cold Christianity. This blind intention to absorb, to change the shape of everything and digest it in the darkness of a dragon's stomach; this is what is really meant by the Pantheism and Cosmic Unity of the East. The Cosmos as such is cannibal; as old Time ate his children. The Eastern saints were saints because they wanted to be swallowed up. The Western saint, like St. George, was sainted by the Western Church precisely because he refused to be swallowed. The same process of thought that has prevented nationalities disappearing in Christendom has prevented the complete appearance of Pantheism. All Christian men instinctively resist the idea of being absorbed into an Empire; an Austrian, a Spanish, a British, or a Turkish Empire. But there is one empire, much larger and much more tyrannical, which free men will resist with even stronger passion. The free man violently resists being absorbed into the empire which is called the Universe. He demands Home Rule for his nationality, but still more Home Rule for his home. Most of all he demands Home Rule for himself. He claims the right to be saved, in spite of Moslem fatalism. He claims the right to be damned in spite of theosophical optimism. He refuses to be the Cosmos; because he refuses to forget it.
'''
source_url=''
source_title='A Miscellany of Men, The Separatist and Sacred Things (1912)'

[[commentary]]
quote='''
It is not only nonsense, but blasphemy, to say that man has spoilt the country. Man has created the country; it was his business, as the image of God. No hill, covered with common scrub or patches of purple heath, could have been so sublimely hilly as that ridge up to which the ranked furrows rose like aspiring angels. No valley, confused with needless cottages and towns, can have been so utterly valleyish as that abyss into which the down-rushing furrows raged like demons into the swirling pit.
'''
source_url=''
source_title='Alarms and Discursions, The Furrows (1910)'

[[commentary]]
quote='''
Readers of Mr. Bernard Shaw and other modern writers may be interested to know that the Superman has been found. I found him; he lives in South Croydon. My success will be a great blow to Mr. Shaw, who has been following quite a false scent, and is now looking for the creature in Blackpool; and as for Mr. Wells's notion of generating him out of gases in a private laboratory, I always thought it doomed to failure. I assure Mr. Wells that the Superman at Croydon was born in the ordinary way, though he himself, of course, is anything but ordinary.

Nor are his parents unworthy of the wonderful being whom they have given to the world. The name of Lady Hypatia Smythe-Browne (now Lady Hypatia Hagg) will never be forgotten in the East End, where she did such splendid social work. Her constant cry of “Save the children!” referred to the cruel neglect of children's eyesight involved in allowing them to play with crudely painted toys. She quoted unanswerable statistics to prove that children allowed to look at violet and vermilion often suffered from failing eyesight in their extreme old age; and it was owing to her ceaseless crusade that the pestilence of the Monkey-on-the-Stick was almost swept from Hoxton. The devoted worker would tramp the streets untiringly, taking away the toys from all the poor children, who were often moved to tears by her kindness. Her good work was interrupted, partly by a new interest in the creed of Zoroaster, and partly by a savage blow from an umbrella. It was inflicted by a dissolute Irish apple-woman, who, on returning from some orgy to her ill-kept apartment, found Lady Hypatia in the bedroom taking down an oleograph, which, to say the least of it, could not really elevate the mind. At this the ignorant and partly intoxicated Celt dealt the social reformer a severe blow, adding to it an absurd accusation of theft. The lady's exquisitely balanced mind received a shock, and it was during a short mental illness that she married Dr. Hagg.

Of Dr. Hagg himself I hope there is no need to speak. Any one even slightly acquainted with those daring experiments in Neo-Individualist Eugenics, which are now the one absorbing interest of the English democracy, must know his name and often commend it to the personal protection of an impersonal power. Early in life he brought to bear that ruthless insight into the history of religions which he had gained in boyhood as an electrical engineer. Later he became one of our greatest geologists; and achieved that bold and bright outlook upon the future of Socialism which only geology can give. At first there seemed something like a rift, a faint, but perceptible, fissure, between his views and those of his aristocratic wife. For she was in favour (to use her own powerful epigram) of protecting the poor against themselves; while he declared pitilessly, in a new and striking metaphor, that the weakest must go to the wall. Eventually, however, the married pair perceived an essential union in the unmistakably modern character of both their views, and in this enlightening and intelligible formula their souls found peace. The result is that this union of the two highest types of our civilization, the fashionable lady and the all but vulgar medical man, has been blessed by the birth of the Superman, that being whom all the labourers in Battersea are so eagerly expecting night and day.

I found the house of Dr. and Lady Hypatia Hagg without much difficulty; it is situated in one of the last straggling streets of Croydon, and overlooked by a line of poplars. I reached the door towards the twilight, and it was natural that I should fancifully see something dark and monstrous in the dim bulk of that house which contained the creature who was more marvellous than the children of men. When I entered the house I was received with exquisite courtesy by Lady Hypatia and her husband; but I found much greater difficulty in actually seeing the Superman, who is now about fifteen years old, and is kept by himself in a quiet room. Even my conversation with the father and mother did not quite clear up the character of this mysterious being. Lady Hypatia, who has a pale and poignant face, and is clad in those impalpable and pathetic greys and greens with which she has brightened so many homes in Hoxton, did not appear to talk of her offspring with any of the vulgar vanity of an ordinary human mother. I took a bold step and asked if the Superman was nice looking.

“He creates his own standard, you see,” she replied, with a slight sigh. “Upon that plane he is more than Apollo. Seen from our lower plane, of course--” And she sighed again.

I had a horrible impulse, and said suddenly, “Has he got any hair?”

There was a long and painful silence, and then Dr. Hagg said smoothly: “Everything upon that plane is different; what he has got is not... well, not, of course, what we call hair... but--”

“Don't you think,” said his wife, very softly, “don't you think that really, for the sake of argument, when talking to the mere public, one might call it hair?”

“Perhaps you are right,” said the doctor after a few moments' reflection. “In connexion with hair like that one must speak in parables.”

“Well, what on earth is it,” I asked in some irritation, “if it isn't hair? Is it feathers?”

“Not feathers, as we understand feathers,” answered Hagg in an awful voice.

I got up in some irritation. “Can I see him, at any rate?” I asked. “I am a journalist, and have no earthly motives except curiosity and personal vanity. I should like to say that I had shaken hands with the Superman.”

The husband and wife had both got heavily to their feet, and stood, embarrassed. “Well, of course, you know,” said Lady Hypatia, with the really charming smile of the aristocratic hostess. “You know he can't exactly shake hands... not hands, you know.... The structure, of course--”

I broke out of all social bounds, and rushed at the door of the room which I thought to contain the incredible creature. I burst it open; the room was pitch dark. But from in front of me came a small sad yelp, and from behind me a double shriek.

“You have done it, now!” cried Dr. Hagg, burying his bald brow in his hands. “You have let in a draught on him; and he is dead.”

As I walked away from Croydon that night I saw men in black carrying out a coffin that was not of any human shape. The wind wailed above me, whirling the poplars, so that they drooped and nodded like the plumes of some cosmic funeral. “It is, indeed,” said Dr. Hagg, “the whole universe weeping over the frustration of its most magnificent birth.” But I thought that there was a hoot of laughter in the high wail of the wind.
'''
source_url=''
source_title='Alarms and Discursions, How I Found the Superman (1910)'
