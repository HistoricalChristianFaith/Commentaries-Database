[[commentary]]
quote='''
Nothing can be, in the strictest sense of the word, more comic than to set so shadowy a thing as the conjectures made by the vaguer anthropologists about primitive man against so solid a thing as the human sense of sin. By its nature the evidence of Eden is something that one cannot find. By its nature the evidence of sin is something that one cannot help finding.
'''
time=1908
source_url=''
source_title='All Things Considered, Science and Religion (1908)'
