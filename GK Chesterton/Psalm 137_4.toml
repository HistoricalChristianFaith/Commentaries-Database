[[commentary]]
quote='''
And the more I thought about the matter the more painfully certain it seemed that the most important and typical modern things could not be done with a chorus. One could not, for instance, be a great financier and sing; because the essence of being a great financier is that you keep quiet. You could not even in many modern circles be a public man and sing; because in those circles the essence of being a public man is that you do nearly everything in private.
'''
source_url=''
source_title="Tremendous Trifles, XXX. The Little Birds Who Won't Sing (1909)"
