[[commentary]]
quote='''
This people has a natural faculty for feeling itself on the eve of something--of the Bartholomew or the Revolution or the Commune or the Day of Judgment. It is this sense of crisis that makes France eternally young. It is perpetually pulling down and building up, as it pulled down the prison and put up the column in the Place de La Bastille.
'''
source_url=''
source_title="Tremendous Trifles, IX. In the Place de La Bastille (1909)"
