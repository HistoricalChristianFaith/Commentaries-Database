[[commentary]]
quote='''
That a different principle attaches to investigation in this spiritual field from investigation in any other. If a man baits a line for fish, the fish will come, even if he declares there are no such things as fishes. If a man limes a twig for birds, the birds will be caught, even if he thinks it superstitious to believe in birds at all. But a man cannot bait a line for souls. A man cannot lime a twig to catch gods. All wise schools have agreed that this latter capture depends to some extent on the faith of the capturer. So it comes to this: If you have no faith in the spirits your appeal is in vain; and if you have—is it needed? If you do not believe, you cannot. If you do—you will not.
'''
time=1908
source_url=''
source_title='Spiritualism (All Things Considered)'
