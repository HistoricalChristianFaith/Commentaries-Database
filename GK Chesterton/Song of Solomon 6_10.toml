[[commentary]]
quote='''
Christianity came into the world firstly in order to assert with violence that a man had not only to look inwards, but to look outwards, to behold with astonishment and enthusiasm a divine company and a divine captain. The only fun of being a Christian was that a man was not left alone with the Inner Light, but definitely recognised an outer light, fair as the sun, clear as the moon, terrible as an army with banners.
'''
source_url=''
source_title='Orthodoxy, Ch. 5: The Flag of the World (1908)'
