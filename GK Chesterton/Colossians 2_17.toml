[[commentary]]
quote='''
We may truly call these foreshadowings; so long as we remember that foreshadowings are shadows. And the metaphor of a shadow happens to hit very exactly the truth that is very vital here. For a shadow is a shape; a thing which reproduces shape but not texture. These things were something like the real thing; and to say that they were like is to say that they were different. Saying something is like a dog is another way of saying it is not a dog; and it is in this sense of identity that a myth is not a man.
'''
source_url=''
source_title='The Everlasting Man, Chapter V: Man and Mythologies (1925)'
