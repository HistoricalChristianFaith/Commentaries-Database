[[commentary]]
quote='''
I return to Fleet Street... I am strangely haunted by this accidental comparison... But this black-and-white contrast between the visible and invisible, this deep sense that the one essential belief is belief in the invisible as against the visible, is suddenly and sensationally brought back to my mind. ... For I realise that I have really come into a topsy-turvy country; I have come into the country where men do definitely believe that the waving of the trees makes the wind. That is to say, they believe that the material circumstances, however black and twisted, are more important than the spiritual realities, however powerful and pure.
'''
time=1909
source_url=''
source_title='In Topsy-Turvy Land (Tremendous Trifles)'

[[commentary]]
quote='''
The great human dogma, then, is that the wind moves the trees. The great human heresy is that the trees move the wind. When people begin to say that the material circumstances have alone created the moral circumstances, then they have prevented all possibility of serious change. For if my circumstances have made me wholly stupid, how can I be certain even that I am right in altering those circumstances?

The man who represents all thought as an accident of environment is simply smashing and discrediting all his own thoughts--including that one. To treat the human mind as having an ultimate authority is necessary to any kind of thinking, even free thinking. And nothing will ever be reformed in this age or country unless we realise that the moral fact comes first.
'''
source_url=''
source_title='Tremendous Trifles, The Wind and the Trees (1909)'
