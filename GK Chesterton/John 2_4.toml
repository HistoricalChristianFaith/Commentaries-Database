[[commentary]]
quote='''
But there is another quality running through all his teachings which seems to me neglected in most modern talk about them as teachings; and that is the persistent suggestion that he has not really come to teach. If there is one incident in the record which affects me personally as grandly and gloriously human, it is the incident of giving wine for the wedding-feast. That is really human in the sense in which a whole crowd of prigs, having the appearance of human beings, can hardly be described as human. It rises superior to all superior persons. It is as human as Herrick and as democratic as Dickens. But even in that story there is something else that has that note of things not fully explained; and in a way here very relevant. I mean the first hesitation, not on any ground touching the nature of the miracle, but on that of the propriety of working any miracles at all, at least at that stage; ‘My time is not yet come.’ What did that mean? At least it certainly meant a general plan or purpose in the mind, with which certain things did or did not fit in. And if we leave out that solitary strategic plan, we not only leave out the point of the story, but the story.
'''
source_url=''
source_title='The Everlasting Man, Part 2 Ch. 3: The Strangest Story in the World (1925)'
