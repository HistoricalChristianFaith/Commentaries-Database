[[commentary]]
quote='''
Rowlandson and Gilray did not fight merely because they were naturally pothouse pugilists; they fought because they had something to fight about. It is easy enough to be refined about things that do not matter; but men kicked and plunged a little in that portentous wrestle in which swung to and fro, alike dizzy with danger, the independence of England, the independence of Ireland, the independence of France. ... Perhaps some great virtues have to be generated, as in men like Nelson or Emmet, before we can have these vices at all, even as temptations.
'''
source_url=''
source_title="All Things Considered, Conceit and Caricature (1908)"

[[commentary]]
quote='''
The curse of the Nonconformists is their universal refinement. They dimly connect being good with being delicate, and even dapper; with not being grotesque or loud or violent; with not sitting down on one's hat. Now it is always a pleasure to be loud and violent, and sometimes it is a duty. Certainly it has nothing to do with sin; a man can be loudly and violently virtuous—nay, he can be loudly and violently saintly, though that is not the type of saintliness that we recognise in Dr. Horton.
'''
source_url=''
source_title='All Things Considered, Limericks and Counsels of Perfection (1908)'
