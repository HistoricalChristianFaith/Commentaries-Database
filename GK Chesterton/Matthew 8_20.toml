[[commentary]]
quote='''
We often hear of Jesus of Nazareth as a wandering teacher; and there is a vital truth in that view in so far as it emphasises an attitude towards luxury and convention which most respectable people would still regard as that of a vagabond. It is expressed in his own great saying about the holes of the foxes and the nests of the birds, and, like many of his great sayings, it is felt as less powerful than it is, through lack of appreciation of that great paradox by which he spoke of his own humanity as in some way collectively and representatively human; calling himself simply the Son of Man; that is, in effect, calling himself simply Man. It is fitting that the New Man or the Second Adam should repeat in so ringing a voice and with so arresting a gesture the great fact which came first in the original story: that man differs from the brutes by everything, even by deficiency; that he is in a sense less normal and even less native; a stranger upon the earth.
'''
source_url=''
source_title='The Everlasting Man, Part 2 Ch. 3: The Strangest Story in the World (1925)'
