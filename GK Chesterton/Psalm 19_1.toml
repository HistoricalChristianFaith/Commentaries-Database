[[commentary]]
quote='''
The whole landscape seemed charging at me--and just missing me. The tall, shining grass went by like showers of arrows; the very trees seemed like lances hurled at my heart, and shaving it by a hair's breadth. Across some vast, smooth valley I saw a beech-tree by the white road stand up little and defiant. It grew bigger and bigger with blinding rapidity. It charged me like a tilting knight, seemed to hack at my head, and pass by. Sometimes when we went round a curve of road, the effect was yet more awful. It seemed as if some tree or windmill swung round to smite like a boomerang. The sun by this time was a blazing fact; and I saw that all Nature is chivalrous and militant. We do wrong to seek peace in Nature; we should rather seek the nobler sort of war; and see all the trees as green banners... "Whom can I pay for my own superb experience? What is the usual charge for seeing the clouds shattered by the sun? What is the market price of a tree blue on the sky-line and then blinding white in the sun? Mention your price for that windmill that stood behind the hollyhocks in the garden. Let me pay you for..."
'''
time=1909
source_url=''
source_title='Tremendous Trifles, A Cab Ride Across Country (1909)'

[[commentary]]
quote='''
The modern world as I found it was solid for modern Calvinism, for the necessity of things being as they are. But when I came to ask them I found they had really no proof of this unavoidable repetition in things except the fact that the things were repeated. Now, the mere repetition made the things to me rather more weird than more rational. It was as if, having seen a curiously shaped nose in the street and dismissed it as an accident, I had then seen six other noses of the same astonishing shape. I should have fancied for a moment that it must be some local secret society. So one elephant having a trunk was odd; but all elephants having trunks looked like a plot. I speak here only of an emotion, and of an emotion at once stubborn and subtle. But the repetition in Nature seemed sometimes to be an excited repetition, like that of an angry schoolmaster saying the same thing over and over again. The grass seemed signalling to me with all its fingers at once; the crowded stars seemed bent upon being understood. The sun would make me see him if he rose a thousand times. The recurrences of the universe rose to the maddening rhythm of an incantation, and I began to see an idea.
'''
source_url=''
source_title='Orthodoxy, Ch. 4: The Ethics of Elfland (1908)'
