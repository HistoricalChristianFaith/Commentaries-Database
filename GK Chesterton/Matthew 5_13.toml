[[commentary]]
quote='''
Is it not only too probable that the mildness of our political satire, when compared with the political satire of our fathers, arises simply from the profound unreality of our current politics? ... If our social relations are more peaceful than those of France or America or the England of a hundred years ago, it is simply because our politics are more peaceful; not improbably because our politics are more fictitious.
'''
source_url=''
source_title="All Things Considered, Conceit and Caricature (1908)"

[[commentary]]
quote='''
And yet, without white, my absurd little pictures would be as pointless as the world would be if there were no good people in it.
'''
source_url=''
source_title='Tremendous Trifles, A Piece of Chalk (1909)'
