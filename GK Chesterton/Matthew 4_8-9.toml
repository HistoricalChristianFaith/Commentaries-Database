[[commentary]]
quote='''
Satan was the most celebrated of Alpine guides, when he took Jesus to the top of an exceeding high mountain and showed him all the kingdoms of the earth. But the joy of Satan in standing on a peak is not a joy in largeness, but a joy in beholding smallness, in the fact that all men look like insects at his feet. It is from the valley that things look large; it is from the level that things look high.
'''
source_url=''
source_title='Tremendous Trifles, I. Tremendous Trifles (1909)'
