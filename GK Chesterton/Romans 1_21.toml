[[commentary]]
quote='''
"You have worked this street to death, and yet you have never remembered its existence. If you had a healthy democracy, even of pagans, they would have hung this street with garlands and given it the name of a god. Then it would have gone quietly. But at last the street has grown tired of your tireless insolence; and it is bucking and rearing its head to heaven. Have you never sat on a bucking horse?"
'''
source_url=''
source_title='Tremendous Trifles, A Somewhat Improbable Story (1909)'

[[commentary]]
quote='''
The substance of all such paganism may be summarised thus. It is an attempt to reach the divine reality through the imagination alone; in its own field reason does not restrain it at all. It is vital to the view of all history that reason is something separate from religion even in the most rational of these civilisations. ... The rivers of mythology and philosophy run parallel and do not mingle till they meet in the sea of Christendom. Simple secularists still talk as if the Church had introduced a sort of schism between reason and religion. The truth is that the Church was actually the first thing that ever tried to combine reason and religion. There had never before been any such union of the priests and the philosophers.
'''
source_url=''
source_title='The Everlasting Man, Chapter V: Man and Mythologies (1925)'

[[commentary]]
quote='''
Once I thought like you, that one's pleasure in a flying spark was a thing that could come and go with that spark. Once I thought that the delight was as free as the fire. Once I thought that red star we see was alone in space. But now I know that the red star is only on the apex of an invisible pyramid of virtues. That red fire is only the flower on a stalk of living habits, which you cannot see. Only because your mother made you say 'Thank you' for a bun are you now able to thank Nature or chaos for those red stars of an instant or for the white stars of all time. Only because you were humble before fireworks on the fifth of November do you now enjoy any fireworks that you chance to see. You only like them being red because you were told about the blood of the martyrs; you only like them being bright because brightness is a glory. That flame flowered out of virtues, and it will fade with virtues.
'''
source_url=''
source_title='Tremendous Trifles, The Diabolist (1909)'

[[commentary]]
quote='''
The whole pagan world set itself to build a Pantheon. They admitted more and more gods, gods not only of the Greeks but of the barbarians; gods not only of Europe but of Asia and Africa. The more the merrier, though some of the Asian and African ones were not very merry. They admitted them to equal thrones with their own; sometimes they identified them with their own. They may have regarded it as an enrichment of their religious life; but it meant the final loss of all that we now call religion. It meant that ancient light of simplicity, that had a single source like the sun, finally fades away in a dazzle of conflicting lights and colours. God is really sacrificed to the gods; in a very literal sense of the flippant phrase, they have been too many for him.
'''
source_url=''
source_title='The Everlasting Man, Ch. 4 (1925)'
