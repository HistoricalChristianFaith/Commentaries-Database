[[commentary]]
quote='''
That is what makes life at once so splendid and so strange. We are in the wrong world. When I thought that was the right town, it bored me; when I knew it was wrong, I was happy. So the false optimism, the modern happiness, tires us because it tells us we fit into this world. The true happiness is that we don't fit. We come from somewhere else. We have lost our way.
'''
source_url=''
source_title='Tremendous Trifles, The Ballade of a Strange Town (1909)'

[[commentary]]
quote='''
The simplest truth about man is that he is a very strange being; almost in the sense of being a stranger on the earth. In all sobriety, he has much more of the external appearance of one bringing alien habits from another land than of a mere growth of this one. He has an unfair advantage and an unfair disadvantage. He cannot sleep in his own skin; he cannot trust his own instincts. He is at once a creator moving miraculous hands and fingers and a kind of cripple. He is wrapped in artificial bandages called clothes; he is propped on artificial crutches called furniture. His mind has the same doubtful liberties and the same wild limitations.
'''
time=1925
source_url=''
source_title='The Everlasting Man, Chapter I: The Man in the Cave (1925)'
