[[commentary]]
quote='''
For, in order that men should resist injustice, something more is necessary than that they should think injustice unpleasant. They must think injustice absurd; above all, they must think it startling. They must retain the violence of a virgin astonishment. ... But the optimist sees injustice as something discordant and unexpected, and it stings him into action. The pessimist can be enraged at wrong; but only the optimist can be surprised at it.
'''
source_url=''
source_title="All Things Considered, The Vote and the House (1908)"

[[commentary]]
quote='''
Let us then, by all means, be proud of the virtues that we have not got; but let us not be too arrogant about the virtues that we cannot help having. It may be that a man living on a desert island has a right to congratulate himself upon the fact that he can meditate at his ease. But he must not congratulate himself on the fact that he is on a desert island, and at the same time congratulate himself on the self-restraint he shows in not going to a ball every night.
'''
source_url=''
source_title="All Things Considered, Conceit and Caricature (1908)"

[[commentary]]
quote='''
One of the wise and awful truths which this brown-paper art reveals, is this, that white is a colour. It is not a mere absence of colour; it is a shining and affirmative thing, as fierce as red, as definite as black. When, so to speak, your pencil grows red-hot, it draws roses; when it grows white-hot, it draws stars. And one of the two or three defiant verities of the best religious morality, of real Christianity, for example, is exactly this same thing; the chief assertion of religious morality is that white is a colour. Virtue is not the absence of vices or the avoidance of moral dangers; virtue is a vivid and separate thing, like pain or a particular smell. Mercy does not mean not being cruel or sparing people revenge or punishment; it means a plain and positive thing like the sun, which one has either seen or not seen. Chastity does not mean abstention from sexual wrong; it means something flaming, like Joan of Arc.
'''
source_url=''
source_title='Tremendous Trifles, A Piece of Chalk (1909)'
