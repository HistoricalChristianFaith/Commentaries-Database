[[commentary]]
quote='''
How could physical science prove that man is not depraved? You do not cut a man open to find his sins. You do not boil him until he gives forth the unmistakable green fumes of depravity. How could physical science find any traces of a moral fall?
'''
time=1908
source_url=''
source_title='All Things Considered, Science and Religion (1908)'

[[commentary]]
quote='''
If it is not true that a divine being fell, then we can only say that one of the animals went entirely off its head. In neither case can we really argue very much from the body of man simply considered as the body of an innocent and healthy animal. His body has got too much mixed up with his soul.
'''
time=1908
source_url=''
source_title='Wine When It Is Red (All Things Considered)'

[[commentary]]
quote='''
In his new Utopia he says, for instance, that a chief point of the Utopia will be a disbelief in original sin. If he had begun with the human soul—that is, if he had begun on himself—he would have found original sin almost the first thing to be believed in. He would have found, to put the matter shortly, that a permanent possibility of selfishness arises from the mere fact of having a self, and not from any accidents of education or ill-treatment. And the weakness of all Utopias is this, that they take the greatest difficulty of man and assume it to be overcome, and then give an elaborate account of the overcoming of the smaller ones.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 5: Mr. H. G. Wells and the Giants (1905)'

[[commentary]]
quote='''
Carlyle said that men were mostly fools. Christianity, with a surer and more reverent realism, says that they are all fools. This doctrine is sometimes called the doctrine of original sin. It may also be described as the doctrine of the equality of men. But the essential point of it is merely this, that whatever primary and far-reaching moral dangers affect any man, affect all men. All men can be criminals, if tempted; all men can be heroes, if inspired.
'''
source_url=''
source_title='Heretics, Ch. 12: Paganism and Mr. Lowes Dickinson (1905)'
