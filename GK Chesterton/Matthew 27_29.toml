[[commentary]]
quote='''
But it is essential to feel that he may have gone to Glastonbury: all songs, arts, and dedications branching and blossoming like the thorn, are rooted in some such sacred doubt. Taken thus, not heavily like a problem but lightly like an old tale, the thing does lead one along the road of very strange realities, and the thorn is found growing in the heart of a very secret maze of the soul. Something is really present in the place; some closer contact with the thing which covers Europe but is still a secret. Somehow the grey town and the green bush touch across the world the strange small country of the garden and the grave; there is verily some communion between the thorn tree and the crown of thorns.
'''
source_url=''
source_title='Alarms and Discursions, The Gold of Glastonbury (1910)'
