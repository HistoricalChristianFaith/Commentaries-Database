[[commentary]]
quote='''
Therefore, of course, this law itself was as much demonstrated in the breach as in the observance. If Tom Jones violated morality, so much the worse for Tom Jones. Fielding did not feel, as a melancholy modern would have done, that every sin of Tom Jones was in some way breaking the spell, or we may even say destroying the fiction of morality. Men spoke of the sinner breaking the law; but it was rather the law that broke him.
'''
source_url=''
source_title='All Things Considered, Tom Jones and Morality (1908)'
