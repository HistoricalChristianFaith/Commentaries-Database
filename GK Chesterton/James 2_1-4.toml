[[commentary]]
quote='''
The moderns have invented a much subtler and more poisonous kind of eulogy. The modern method is to take the prince or rich man, to give a credible picture of his type of personality, as that he is business-like, or a sportsman, or fond of art, or convivial, or reserved; and then enormously exaggerate the value and importance of these natural qualities. Those who praise Mr. Carnegie do not say that he is as wise as Solomon and as brave as Mars; I wish they did. It would be the next most honest thing to giving their real reason for praising him, which is simply that he has money.
'''
source_url=''
source_title='All Things Considered, The Worship of the Wealthy (1908)'

[[commentary]]
quote='''
The truth of the matter is really quite simple. An aristocracy is a secret society; and this is especially so when, as in the modern world, it is practically a plutocracy. The one idea of a secret society is to change the password. Lady Grove falls naturally into a pure perversity because she feels subconsciously that the people of England can be more effectively kept at a distance by a perpetual torrent of new tests than by the persistence of a few old ones. She knows that in the educated "middle class" there is an idea that it is vulgar to say port wine; therefore she reverses the idea—she says that the man who would say "port" is a man who would say, "How is your wife?" She says it because she knows both these remarks to be quite obvious and reasonable.
'''
source_url=''
source_title='All Things Considered, Demagogues and Mystagogues (1908)'

[[commentary]]
quote='''
Now this is exactly what is present in cases of police investigation such as the one narrated above. There enters into such things a great national sin, a far greater sin than drink--the habit of respecting a gentleman. Snobbishness has, like drink, a kind of grand poetry. And snobbishness has this peculiar and devilish quality of evil, that it is rampant among very kindly people, with open hearts and houses. But it is our great English vice; to be watched more fiercely than small-pox. If a man wished to hear the worst and wickedest thing in England summed up in casual English words, he would not find it in any foul oaths or ribald quarrelling. He would find it in the fact that the best kind of working man, when he wishes to praise any one, calls him "a gentleman." It never occurs to him that he might as well call him "a marquis," or "a privy councillor"--that he is simply naming a rank or class, not a phrase for a good man. And this perennial temptation to a shameful admiration, must, and, I think, does, constantly come in and distort and poison our police methods.

In this case we must be logical and exact; for we have to keep watch upon ourselves. The power of wealth, and that power at its vilest, is increasing in the modern world. A very good and just people, without this temptation, might not need, perhaps, to make clear rules and systems to guard themselves against the power of our great financiers. But that is because a very just people would have shot them long ago, from mere native good feeling.
'''
source_url=''
source_title='Tremendous Trifles, Some Policemen and a Moral (1909)'
