[[commentary]]
quote='''
The priest made a short speech; he did not utter any priestly dogmas (whatever they are), he uttered platitudes. In such circumstances platitudes are the only possible things to say; because they are true. He began by saying that he supposed a large number of them would be uncommonly glad not to go. They seemed to assent to this particular priestly dogma with even more than their alleged superstitious credulity. He said that war was hateful, and that we all hated it; but that “in all things reasonable” the law of one's own commonwealth was the voice of God. He spoke about Joan of Arc; and how she had managed to be a bold and successful soldier while still preserving her virtue and practising her religion; then he gave them each a little paper book. To which they replied (after a brief interval for reflection):

Pongprongperesklang pour la patrie, Tambraugtararronc pour la patrie.

which I feel sure was the best and most pointed reply.
'''
source_url=''
source_title='A Miscellany of Men, The Conscript and the Crisis (1912)'
