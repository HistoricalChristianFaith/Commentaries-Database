[[commentary]]
quote='''
I cannot see any Battersea here; I cannot see any London or any England. I cannot see that door. I cannot see that chair: because a cloud of sleep and custom has come across my eyes. The only way to get back to them is to go somewhere else; and that is the real object of travel and the real pleasure of holidays. Do you suppose that I go to France in order to see France? Do you suppose that I go to Germany in order to see Germany? I shall enjoy them both; but it is not them that I am seeking. I am seeking Battersea. The whole object of travel is not to set foot on foreign land; it is at last to set foot on one's own country as a foreign land. Now I warn you that this Gladstone bag is compact and heavy, and that if you utter that word 'paradox' I shall hurl it at your head. I did not make the world, and I did not make it paradoxical. It is not my fault, it is the truth, that the only way to go to England is to go away from it.
'''
time=1909
source_url=''
source_title='Tremendous Trifles, XXXI. The Riddle of the Ivy (1909)'
