[[commentary]]
quote='''
The weakness of this worship of mere natural life (which is a common enough creed to-day) is that it ignores the paradox of courage and fails in its own aim. As a matter of fact, no men would be killed quicker than the Methuselahites. The paradox of courage is that a man must be a little careless of his life even in order to keep it. And in the very case I have quoted we may see an example of how little the theory of Methuselahism really inspires our best life. For there is one riddle in that case which cannot easily be cleared up. If it was the man's religion to live as long as he could, why on earth was he enlisting as a soldier?
'''
source_url=''
source_title="All Things Considered, The Methuselahite (1908)"

[[commentary]]
quote='''
All pessimism has a secret optimism for its object. All surrender of life, all denial of pleasure, all darkness, all austerity, all desolation has for its real aim this separation of something so that it may be poignantly and perfectly enjoyed. I feel grateful for the slight sprain which has introduced this mysterious and fascinating division between one of my feet and the other. The way to love anything is to realise that it might be lost.
'''
source_url=''
source_title="Tremendous Trifles, The Advantages of Having One Leg (1909)"

[[commentary]]
quote='''
One of the thousand objections to the sin of pride lies precisely in this, that self-consciousness of necessity destroys self-revelation. A man who thinks a great deal about himself will try to be many-sided, attempt a theatrical excellence at all points, will try to be an encyclopaedia of culture, and his own real personality will be lost in that false universalism. Thinking about himself will lead to trying to be the universe; trying to be the universe will lead to ceasing to be anything. If, on the other hand, a man is sensible enough to think only about the universe; he will think about it in his own individual way. He will keep virgin the secret of God; he will see the grass as no other man can see it, and look at a sun that no man has ever known.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 9: The Moods of Mr. George Moore (1905)'

[[commentary]]
quote='''
Let us follow for a moment the clue of the martyr and the suicide; and take the case of courage. No quality has ever so much addled the brains and tangled the definitions of merely rational sages. Courage is almost a contradiction in terms. It means a strong desire to live taking the form of a readiness to die. "He that will lose his life, the same shall save it," is not a piece of mysticism for saints and heroes. It is a piece of everyday advice for sailors or mountaineers. It might be printed in an Alpine guide or a drill book. This paradox is the whole principle of courage; even of quite earthly or quite brutal courage. A man cut off by the sea may save his life if he will risk it on the precipice. He can only get away from death by continually stepping within an inch of it. A soldier surrounded by enemies, if he is to cut his way out, needs to combine a strong desire for living with a strange carelessness about dying. He must not merely cling to life, for then he will be a coward, and will not escape. He must not merely wait for death, for then he will be a suicide, and will not escape. He must seek his life in a spirit of furious indifference to it; he must desire life like water and yet drink death like wine. No philosopher, I fancy, has ever expressed this romantic riddle with adequate lucidity, and I certainly have not done so. But Christianity has done more: it has marked the limits of it in the awful graves of the suicide and the hero, showing the distance between him who dies for the sake of living and him who dies for the sake of dying. And it has held up ever since above the European lances the banner of the mystery of chivalry: the Christian courage, which is a disdain of death; not the Chinese courage, which is a disdain of life.
'''
source_url=''
source_title='Orthodoxy, Ch. 6: The Paradoxes of Christianity (1908)'
