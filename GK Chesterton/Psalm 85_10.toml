[[commentary]]
quote='''
And here again my contemplation was cloven by the ancient voice which said, "I could have told you all this a long time ago. If there is any certain progress it can only be my kind of progress, the progress towards a complete city of virtues and dominations where righteousness and peace contrive to kiss each other. An impersonal force might be leading you to a wilderness of perfect flatness or a peak of perfect height. But only a personal God can possibly be leading you (if, indeed, you are being led) to a city with just streets and architectural proportions, a city in which each of you can contribute exactly the right amount of your own colour to the many-coloured coat of Joseph."
'''
source_url=''
source_title='Orthodoxy, Ch. VII: The Eternal Revolution'
