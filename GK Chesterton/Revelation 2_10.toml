[[commentary]]
quote='''
What they did prove, or, rather, strongly suggest, was that something had entered human psychology which was stronger than strong pain. If a young girl, scourged and bleeding to death, saw nothing but a crown descending on her from God, the first mental step was not that her philosophy was correct, but that she was certainly feeding on something.
'''
source_url=''
source_title="All Things Considered, The Modern Martyr (1908)"

[[commentary]]
quote='''
It is enough for the great martyrs and criminals of the French revolution, that they have surprised for all time the secret weakness of the strong. They have awakened and set leaping and quivering in his crypt for ever the coward in the hearts of kings.
'''
source_url=''
source_title='Tremendous Trifles, XX. The Giant (1909)'
