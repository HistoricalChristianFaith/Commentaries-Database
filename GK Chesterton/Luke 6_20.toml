[[commentary]]
quote='''
There remains always this great boast, perhaps the greatest boast that is possible to human nature. I mean the great boast that the most unhappy part of our population is also the most hilarious part. The poor can forget that social problem which we (the moderately rich) ought never to forget. Blessed are the poor; for they alone have not the poor always with them. The honest poor can sometimes forget poverty. The honest rich can never forget it.
'''
time=1908
source_url=''
source_title='Cockneys and Their Jokes (All Things Considered)'

[[commentary]]
quote='''
The poor have many other vices, but, at least, they are never realistic. The poor are melodramatic and romantic in grain; the poor all believe in high moral platitudes and copy-book maxims; probably this is the ultimate meaning of the great saying, “Blessed are the poor.” Blessed are the poor, for they are always making life, or trying to make life like an Adelphi play.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 19: Slum Novelists and the Slums (1905)'
