[[commentary]]
quote='''
Soldiers have many faults, but they have one redeeming merit; they are never worshippers of force. Soldiers more than any other men are taught severely and systematically that might is not right. The fact is obvious. The might is in the hundred men who obey. The right (or what is held to be right) is in the one man who commands them. They learn to obey symbols, arbitrary things, stripes on an arm, buttons on a coat, a title, a flag. These may be artificial things; they may be unreasonable things; they may, if you will, be wicked things; but they are weak things. They are not Force, and they do not look like Force. They are parts of an idea: of the idea of discipline; if you will, of the idea of tyranny; but still an idea. No soldier could possibly say that his own bayonets were his authority. No soldier could possibly say that he came in the name of his own bayonets.
'''
source_url=''
source_title="All Things Considered, Thoughts Around Koepenick (1908)"
