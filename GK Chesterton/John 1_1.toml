[[commentary]]
quote='''
The same fallacy is employed with the same partisan motive in the case of the Gospel of St. John; which critics say could not have been written by one of the first few Christians because of its Greek transcendentalism and its Platonic tone. I am no judge of the philology, but every human being is a divinely appointed judge of the philosophy: and the Platonic tone seems to me to prove nothing at all. Palestine was not a secluded valley of barbarians; it was an open province of a polyglot empire, overrun with all sorts of people of all kinds of education. To take a rough parallel: suppose some great prophet arose among the Boers in South Africa. The prophet himself might be a simple or unlettered man. But no one who knows the modern world would be surprised if one of his closest followers were a Professor from Heidelberg or an M.A. from Oxford.
'''
source_url=''
source_title='Alarms and Discursions, The Gold of Glastonbury (1910)'
