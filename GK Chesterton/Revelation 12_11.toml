[[commentary]]
quote='''
It does not really go down at all; the punishment is too small, and the efforts are too obvious. It has not any of the effectiveness of the old savage martyrdom, because it does not leave the victim absolutely alone with his cause, so that his cause alone can support him. At the same time it has about it that element of the pantomimic and the absurd, which was the cruellest part of the slaying and the mocking of the real prophets. St. Peter was crucified upside down as a huge inhuman joke; but his human seriousness survived the inhuman joke, because, in whatever posture, he had died for his faith.
'''
source_url=''
source_title="All Things Considered, The Modern Martyr (1908)"
