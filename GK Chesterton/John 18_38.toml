[[commentary]]
quote='''
But in the lightning flash of this incident, we see great Rome, the imperial republic, going downward under her Lucretian doom. Scepticism has eaten away even the confident sanity of the conquerors of the world. He who is enthroned to say what is justice can only ask, ‘What is truth?’ So in that drama which decided the whole fate of antiquity, one of the central figures is fixed in what seems the reverse of his true rôle. Rome was almost another name for responsibility. Yet he stands for ever as a sort of rocking statue of the irresponsible. Man could do no more. Even the practical had become the impracticable. Standing between the pillars of his own judgment-seat, a Roman had washed his hands of the world.
'''
source_url=''
source_title='The Everlasting Man, Part 2 Ch. 3: The Strangest Story in the World (1925)'
