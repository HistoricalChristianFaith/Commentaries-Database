[[commentary]]
quote='''
He saw the falsehood of that almost universal notion of to-day, the notion that rites and forms are something artificial, additional, and corrupt. Ritual is really much older than thought; it is much simpler and much wilder than thought. A feeling touching the nature of things does not only make men feel that there are certain proper things to say; it makes them feel that there are certain proper things to do. The more agreeable of these consist of dancing, building temples, and shouting very loud; the less agreeable, of wearing green carnations and burning other philosophers alive. But everywhere the religious dance came before the religious hymn, and man was a ritualist before he could speak.
'''
time=1905
source_url=''
source_title='Heretics, Ch. 6: Christmas and the Aesthetes (1905)'
