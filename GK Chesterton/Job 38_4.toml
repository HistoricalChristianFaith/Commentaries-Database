[[commentary]]
quote='''
But those secondary loyalties are secondary in time and logic to the law of universal morality which justifies them. And if the patriot is such a fool as to force the issue against that universal tradition from which his own patriotism descends, if he presses his claim to priority over the primitive law of the whole earth—then he will have brought it on himself if he is answered with the pulverising plainness of the Book of Job. As God said to the man, “Where were you when the foundations of the world were laid?” We might well say to the nation, “Where were you when the foundations of the Church were laid?” And the nation will not know in the least what to answer—if it should wish to answer—but will be forced to put its hand upon its mouth, if only like one who yawns and falls asleep.
'''
source_url=''
source_title='The Catholic Church and Conversion, Ch. 2: The Obvious Blunders (1926)'
