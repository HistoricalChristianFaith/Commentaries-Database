[[commentary]]
quote='''
That the Son is omnipotent is therefore taught. In Solomon it is written: Your omnipotent word, Lord, leaped from your royal throne into the midst of the doomed land (Wis. 18:15). Therefore, he is also king who holds royal thrones. Likewise in the Apocalypse: Therefore says the Son of God, who is and who was the omnipotent God. (Rev. 1:8) In the Gospel: Whatever things the Father does, these the Son does likewise (Jn. 5:19). Likewise in the Gospel: As the Father raises the dead and gives life, so also the Son gives life to whom he will. In Ezekiel the Son says: Behold, I will stretch out my hand over you and those who plundered you shall be plundered, and you shall know that I am the Lord Almighty, and that the Lord Almighty is he who sent me. (Ezek. 25:7)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Against Maximinus the Arian, PL 58 5.0760A-0760B"
