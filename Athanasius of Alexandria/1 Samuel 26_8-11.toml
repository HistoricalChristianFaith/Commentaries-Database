[[commentary]]
quote='''
But our Saviour is so gentle that He teaches thus, "If any man wills to come after Me," and, "Whoever wills to be My disciple;" and coming to each He does not force them, but knocks at the door and says, "Open unto Me, My sister, My spouse;" and if they open to Him, He enters in, but if they delay and will not, He departs from them. For the truth is not preached with swords or with darts, nor by means of soldiers; but by persuasion and counsel. But what persuasion is there where fear of the Emperor prevails? or what counsel is there, when he who withstands them receives at last banishment and death? Even David, although he was a king, and had his enemy in his power, prevented not the soldiers by an exercise of authority when they wished to kill his enemy, but, as the Scripture says, David persuaded his men by arguments, and suffered them not to rise up and put Saul to death. But he, being without arguments of reason, forces all men by his power, that it may be shewn to all, that their wisdom is not according to God, but merely human, and that they who favour the Arian doctrines have indeed no king but Caesar; for by his means it is that these enemies of Christ accomplish whatsoever they wish to do.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FHistory%2520of%2520the%2520Arians%2FPart%25204.html'
source_title="HISTORY OF THE ARIANS 4.33"
