[[commentary]]
quote='''
Yet, though a man use terms not in Scripture, it makes no difference so that his meaning be religious. But the heretic, though he use scriptural terms, yet, as being equally dangerous and depraved, shall be asked in the words of the Spirit, "Why dost thou preach My laws, and takest My covenant in thy mouth?" Thus whereas the devil, though speaking from the Scriptures, is silenced by the Saviour, the blessed Paul, though he speaks from profane writers, "The Cretans are always liars," and, "For we are His offspring," and, "Evil communications corrupt good manners," yet has a religious meaning, as being holy,—is "doctor of the nations, in faith and verity," as having "the mind of Christ," and what he speaks, he utters religiously.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FCouncils%2520of%2520Ariminum%2520and%2520Seleucia.html'
source_title="COUNCILS OF ARIMINUM AND SELEUCIA 3.39"
