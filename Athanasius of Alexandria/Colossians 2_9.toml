[[commentary]]
quote='''
Of old time He was wont to come to the Saints individually, and to hallow those who rightly received Him; but neither, when they were begotten was it said that He had become man, nor, when they suffered, was it said that He Himself suffered. But when He came among us from Mary once at the end of the ages for the abolition of sin (for so it was pleasing to the Father, to send His own Son `made of a woman, made under the Law'), then it is said, that He took flesh and became man, and in that flesh He suffered for us (as Peter says, `Christ therefore having suffered for us in the flesh'), that it might be shewn, and that all might believe, that whereas He was ever God, and hallowed those to whom He came, and ordered all things according to the Father's will, afterwards for our sakes He became man, and `bodily,' as the Apostle says, the Godhead dwelt in the flesh; as much as to say, `Being God, He had His own body, and using this as an instrument, He became man for our sakes.' And on account of this, the properties of the flesh are said to be His, since He was in it, such as to hunger, to thirst, to suffer, to weary, and the like, of which the flesh is capable; while on the other hand the works proper to the Word Himself, such as to raise the dead, to restore sight to the blind, and to cure the woman with an issue of blood, He did through His own body. And the Word bore the infirmities of the flesh, as His own, for His was the flesh; and the flesh ministered to the works of the Godhead, because the Godhead was in it, for the body was God's.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FFour%2520Discourses%2520Against%2520the%2520Arians%2FDiscourse%25203.html'
source_title="Discourses Against the Arians 3.31"
