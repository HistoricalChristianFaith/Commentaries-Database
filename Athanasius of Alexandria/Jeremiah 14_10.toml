[[commentary]]
quote='''
Hence it is that they are always writing, and always altering their own previous statements, and thus they shew an uncertain faith, or rather a manifest unbelief and perverseness. And this, it appears to me, must needs be the case with them; for since, having fallen away from the truth, and desiring to overthrow that sound confession of faith which was drawn up at Nicaea, they have, in the language of Scripture, `loved to wander, and have not refrained their feet;' therefore, like Jerusalem of old, they labour and toil in their changes, sometimes writing one thing, and sometimes another, but only for the sake of gaining time, and that they may continue enemies of Christ, and deceivers of mankind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FTo%2520the%2520Bishops%2520of%2520Egypt.html'
source_title="LETTER TO THE BISHOPS OF EGYPT 1:6"
