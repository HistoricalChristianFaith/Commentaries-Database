[[commentary]]
quote='''
Christ is the true Son, and so when we receive the Spirit, we are made sons. For it says; 'you did not receive the spirit of slavery leading you back into fear, but you have received the Spirit of adopted sonship' [Romans 8:15]. But when we are made sons in the Spirit, it is clear that we are called children of God in Christ... And when the Spirit is given to us-the Saviour said: 'Receive the Holy Spirit' (John 20:22)- God [The Father] is in us... But when God is in us, the Son is also in us. For the Lord Himself said: 'I and the Father will come and make our home with him' [John 14:23]. Next, the Son is life-for He said: 'I am the life' [John 14:6]- and so we are said to be given life in the Spirit... But when we are given life in the Spirit, Christ Himself is said to live in us. For it says: 'I am crucified with Christ. It is no longer I who live, but Christ who lives in me.' [Galatians 2:19-20]. - "Letters to Separion On the Spirit, Letter 1, Chapter 19"
'''


[[commentary]]
quote='''
What is there to wonder at, what to disbelieve, if the Lord who gives the Spirit, is here said Himself to be anointed with the Spirit, at a time when, necessity requiring it, He did not refuse in respect of His manhood to call Himself inferior to the Spirit? For the Jews saying that He cast out devils in Beelzebub, He answered and said to them, for the exposure of their blasphemy, 'But if I through the Spirit of God cast out demons.' Behold, the Giver of the Spirit here says that He cast out demons in the Spirit; but this is not said, except because of His flesh. For since man's nature is not equal of itself to casting out demons, but only in power of the Spirit, therefore as man He said, 'But if I through the Spirit of God cast out demons.' Of course too He signified that the blasphemy offered to the Holy Ghost is greater than that against His humanity, when He said, 'Whosoever shall speak a word against the Son of man, it shall be forgiven him;' such as were those who said, 'Is not this the carpenter's son?' but they who blaspheme against the Holy Ghost, and ascribe the deeds of the Word to the devil, shall have inevitable punishment. This is what the Lord spoke to the Jews, as man; but to the disciples shewing His Godhead and His majesty, and intimating that He was not inferior but equal to the Spirit, He gave the Spirit and said, 'Receive ye the Holy Ghost,' and 'I send Him,' and 'He shall glorify Me,' and 'Whatsoever He heareth, that He shall speak.' As then in this place the Lord Himself, the Giver of the Spirit, does not refuse to say that through the Spirit He casts out demons, as man; in like manner He the same, the Giver of the Spirit, refused not to say, 'The Spirit of the Lord is upon Me, because He hath anointed Me,' in respect of His having become flesh, as John hath said; that it might be shewn in both these particulars, that we are they who need the Spirit's grace in our sanctification, and again who are unable to cast out demons without the Spirit's power. Through whom then and from whom behoved it that the Spirit should be given but through the Son, whose also the Spirit is? and when were we enabled to receive It, except when the Word became man?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FFour%2520Discourses%2520Against%2520the%2520Arians%2FDiscourse%25201.html'
source_title="Four Discourses Against the Arians, Discourse 1, Section 50"
