[[commentary]]
quote='''
But the saints, and they who truly practise virtue, "mortify their members which are upon the earth, fornication, uncleanness, passions, evil concupiscence;" and, as the result of this, are pure and without spot, confiding in the promise of our Saviour, who said, "Blessed are the pure in heart, for they shall see God." These, having become dead to the world, and renounced the merchandise of the world, gain an honourable death; for, "precious in the sight of the Lord is the death of His saints." They are also able, preserving the Apostolic likeness, to say, "I am crucified with Christ, nevertheless I live; yet not I, but Christ liveth in me." For that is the true life, which a man lives in Christ; for although they are dead to the world, yet they dwell as it were in heaven, minding those things which are above, as he who was a lover of such a habitation said, "While we walk on earth, our dwelling is in heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FLetters%2520of%2520Athanasius%2FLetter%25207%2520For%2520335.html'
source_title="Letter 7 (For 335)"
