[[commentary]]
quote='''
Who that witnessed these things, or that has merely heard of them, will not be greatly amazed, and cry aloud unto the Lord, saying, 'Wilt Thou make a full end of Israel?' Who that is acquainted with these proceedings, will not with good reason cry out and say, 'A wonderful and horrible thing is done in the land;' and, 'The heavens are astonished at this, and the earth is even more horribly afraid.' The fathers of the people and the teachers of the faith are taken away, and the impious are brought into the Churches? Who that saw when Liberius, Bishop of Rome, was banished, and when the great Hosius, the father of the Bishops, suffered these things, or who that saw so many Bishops banished out of Spain and the other parts, could fail to perceive, however little sense he might possess, that the charges against Athanasius also and the rest were false, and altogether mere calumny? For this reason those others also endured all suffering, because they saw plainly that the conspiracies laid against these were founded in falsehood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FHistory%2520of%2520the%2520Arians%2FPart%25206.html'
source_title="HISTORY OF THE ARIANS 6:46"
