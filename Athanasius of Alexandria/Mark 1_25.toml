[[commentary]]
quote='''
And again, when He put a curb in the mouths of the demons that cried after Him from the tombs. For although what they said was true, and they lied not then, saying, 'Thou art the Son of God,' and 'the Holy One of Gods;' yet He would not that the truth should proceed from an unclean mouth, and especially from such as them, lest under pretence thereof they should mingle with it their own malicious devices, and sow these also while men slept. Therefore He suffered them not to speak such words, neither would He have us to suffer such, but hath charged us by His own mouth, saying, 'Beware of false prophets, which come to you in sheeps' clothing, but inwardly they are ravening wolves;' and by the mouth of His Holy Apostles, 'Believe not every spirit.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FTo%2520the%2520Bishops%2520of%2520Egypt.html'
source_title="TO THE BISHOPS OF EGYPT 1.3"
