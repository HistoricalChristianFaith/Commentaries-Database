[[commentary]]
quote='''
And herein one may especially admire the novelty as well as wickedness of their device, and how they go beyond all other heresies. For these support their madness by persuasive arguments calculated to deceive the simple; the Greeks, as the Apostle has said, make their attack with excellency and persuasiveness of speech, and with plausible fallacies; the Jews, leaving the divine Scriptures, now, as the Apostle again has said, contend about "fables and endless genealogies;" and the Manichees and Valentinians with them, and others, corrupting the divine Scriptures, put forth fables in terms of their own inventions. But the Arians are bolder than them all, and have shewn that the other heresies are but their younger sisters, whom, as I have said, they surpass in impiety, emulating them all, and especially the Jews in their iniquity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FHistory%2520of%2520the%2520Arians%2FPart%25208.html'
source_title="HISTORY OF THE ARIANS 8.66"
