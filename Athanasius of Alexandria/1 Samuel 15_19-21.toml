[[commentary]]
quote='''
And when Saul was charged with negligence and a breach of the law, he did not benefit his cause by alleging his conduct on other matters. For a defence on one count will not operate to obtain an acquittal on another count; but if all things should be done according to law and justice, a man must defend himself in those particulars wherein he is accused, and must either disprove the past, or else confess it with the promise that he will desist, and do so no more. But if he is guilty of the crime, and will not confess, but in order to conceal the truth speaks on other points instead of the one in question, he shews plainly that he has acted amiss, nay, and is conscious of his delinquency.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FTo%2520the%2520Bishops%2520of%2520Egypt.html'
source_title="LETTER TO THE BISHOPS OF EGYPT 1.11"
