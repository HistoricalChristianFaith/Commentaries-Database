[[commentary]]
quote='''
And what they now write proceeds not from any regard for the truth, as I said before, but rather they do it as in mockery and by an artifice, for the purpose of deceiving men; that by sending about their letters they may engage the ears of the people to listen to these notions, and so put off the time when they will be brought to trial; and that by concealing their impiety from observation, they may have room to extend their heresy, which, `like a gangrene,' eats its way everywhere.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FTo%2520the%2520Bishops%2520of%2520Egypt.html'
source_title="TO THE BISHOPS OF EGYPT 1.5"
