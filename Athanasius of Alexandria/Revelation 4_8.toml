[[commentary]]
quote='''
For what is nearer [God] than the Cherubim or the Seraphim? And yet they, not even seeing Him, nor standing on their feet, nor even with bare, but as it were with veiled faces, offer their praises, with untiring lips doing nought else but glorify the divine and ineffable nature with the Trisagion. And nowhere has any one of the divinely speaking prophets, men specially selected for such vision, reported to us that in the first utterance of the word Holy the voice is raised aloud, while in the second it is lower, but in the third, quite low,—and that consequently the first utterance denotes lordship, the second subordination, and the third marks a yet lower degree. But away with the folly of these haters of God and senseless men. For the Triad, praised, reverenced, and adored, is one and indivisible and without degrees. It is united without confusion, just as the Monad also is distinguished without separation. For the fact of those venerable living creatures offering their praises three times, saying "Holy, Holy, Holy," proves that the Three Subsistences are perfect, just as in saying "Lord," they declare the One Essence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FOn%2520Luke%252010%252022%2520(Matt%252011%252027).html'
source_title="ON LUKE 10:22"
