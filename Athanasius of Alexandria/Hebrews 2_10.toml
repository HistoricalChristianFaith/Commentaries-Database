[[commentary]]
quote='''
If all things that were made by the will of God were made by Him, how can He be Himself one of the things that were made? And when the Apostle says, `For whom are all things, and by whom are all things,' how can these men say, that we were not made for Him, but He for us? If it be so, He ought to have said, `For whom the Word was made;' but He saith not so, but, `For whom are all things, and by whom are all things,' thus proving these men to be heretical and false.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FTo%2520the%2520Bishops%2520of%2520Egypt.html'
source_title="LETTER TO THE BISHOPS OF EGYPT 2.15"
