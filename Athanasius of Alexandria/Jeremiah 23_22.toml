[[commentary]]
quote='''
This enables us to see, brethren, that they of Nicaea breathe the spirit of Scripture, in that God says in Exodus, `I am that I am,' and through Jeremiah, `Who is in His substance and hath seen His word;' and just below, `if they had stood in My subsistence and heard My words:' now subsistence is essence, and means nothing else but very being, which Jeremiah calls existence, in the words, `and they heard not the voice of existence.' For subsistence, and essence, is existence: for it is, or in other words exists.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FTo%2520the%2520Bishops%2520of%2520Africa.html'
source_title="LETTER TO THE BISHOPS OF AFRICA 4"
