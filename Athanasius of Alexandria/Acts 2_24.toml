[[commentary]]
quote='''
Accordingly what is here said, `Wherefore God also hath highly exalted Him,' answers to Peter's words in the Acts, `Whom God raised up, having loosed the bonds of death, because it was not possible that He should be holden of it.' For as Paul has written, `Since being in form of God He became man, and humbled Himself unto death, therefore God also hath highly exalted Him,' so also Peter says, `Since, being God, He became man, and signs and wonders proved Him to beholders to be God, therefore it was not possible that He should be holden of death.' To man it was not possible to succeed in this; for death belongs to man; wherefore, the Word, being God, became flesh, that, being put to death in the flesh, He might quicken all men by His own power.
'''
source_title="Discourses Against the Arians 1.44"
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FFour%2520Discourses%2520Against%2520the%2520Arians%2FDiscourse%25201.html'
