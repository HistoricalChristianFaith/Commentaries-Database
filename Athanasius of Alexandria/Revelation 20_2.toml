[[commentary]]
quote='''
When the prince of the demons appears in this wise, the crafty one, as I said before, strikes terror by speaking great things... But not even then ought we, the faithful, to fear his appearance or give heed to his words. For he is a liar and speaketh of truth never a word. And though speaking words so many and so great in his boldness, without doubt, like a dragon he was drawn with a hook by the Saviour, and as a beast of burden he received the halter round his nostrils, and as a runaway his nostrils were bound with a ring, and his lips bored with an armlet. And he was bound by the Lord as a sparrow, that we should mock him. And with him are placed the demons his fellows, like serpents and scorpions to be trodden underfoot by us Christians. And the proof of this is that we now live opposed to him. For he who threatened to dry the sea and seize upon the world, behold now cannot stay our discipline, nor even me speaking against him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FLife%2520of%2520Antony.html'
source_title="Life of Antony, Section 24"

