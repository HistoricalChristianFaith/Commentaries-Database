[[commentary]]
quote='''
For after making mention of the creation, he naturally speaks of the Framer's Power as seen in it, which Power, I say, is the Word of God, by whom all things have been made. If indeed the creation is sufficient of itself alone, without the Son, to make God known, see that you fall not, from thinking that without the Son it has come to be. But if through the Son it has come to be, and `in Him all things consist,' it must follow that he who contemplates the creation rightly, is contemplating also the Word who framed it, and through Him begins to apprehend the Father. And if, as the Saviour also says, `No one knoweth the Father, save the Son, and he to whom the Son shall reveal Him,' and if on Philip's asking, `Shew us the Father,' He said not, `Behold the creation,' but, `He that hath seen Me, hath seen the Father,' reasonably doth Paul,—while accusing the Greeks of contemplating the harmony and order of the creation without reflecting on the Framing Word within it (for the creatures witness to their own Framer) so as through the creation to apprehend the true God, and abandon their worship of it,—reasonably hath he said, `His Eternal Power and Godhead,' thereby signifying the Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FFour%2520Discourses%2520Against%2520the%2520Arians%2FDiscourse%25201.html'
source_title="Discourses Against the Arians 1.12"
