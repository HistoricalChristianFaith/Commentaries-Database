[[commentary]]
quote='''
Wherefore it becomes us to watch, lest some deception be conveyed under the clothing of their phrases, and they lead away certain from the true faith. And if they venture to advance the opinions of Arius, when they see themselves proceeding in a prosperous course, nothing remains for us but to use great boldness of speech, remembering the predictions of the Apostle, which he wrote to forewarn us of such like heresies, and which it becomes us to repeat. For we know that, as it is written, "in the latter times some shall depart from the sound faith, giving heed to seducing spirits, and doctrines of devils, that turn from the truth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FTo%2520the%2520Bishops%2520of%2520Egypt.html'
source_title="TO THE BISHOPS OF EGYPT 2.20"
