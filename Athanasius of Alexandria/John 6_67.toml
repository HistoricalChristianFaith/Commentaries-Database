[[commentary]]
quote='''
But this modern and accursed heresy, when it is overthrown by argument, when it is cast down and covered with shame by the very Truth, forthwith endeavours to coerce by violence and stripes and imprisonment those whom it has been unable to persuade by argument, thereby acknowledging itself to be anything rather than godly. For it is the part of true godliness not to compel, but to persuade, as I said before. Thus our Lord Himself, not as employing force, but as offering to their free choice, has said to all, 'If any man will follow after Me;' and to His disciples, 'Will ye also go away?'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FHistory%2520of%2520the%2520Arians%2FPart%25208.html'
source_title="HISTORY OF THE ARIANS 8.67"
