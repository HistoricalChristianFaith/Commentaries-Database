[[commentary]]
quote='''
But in the Body which was circumcised, and carried, and ate and drank, and was weary, and was nailed on the tree and suffered, there was the impassible and incorporeal Word of God. This Body it was that was laid in a grave, when the Word had left it, yet was not parted from it, to preach, as Peter says, also to the spirits in prison.

And this above all shews the foolishness of those who say that the Word was changed into bones and flesh. For if this had been so, there were no need of a tomb. For the Body would have gone by itself to preach to the spirits in Hades. But as it was, He Himself went to preach, while the Body Joseph wrapped in a linen cloth, and laid it away at Golgotha. And so it is shewn to all that the Body was not the Word, but Body of the Word.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FLetters%2520of%2520Athanasius%2FLetter%252059%2520To%2520Epictetus.html'
source_title="Letter 59 To Epictetus, Sections 5-6"


[[commentary]]
quote='''
We know that He, the Only-begotten Son of God, at the Father's bidding came from the heavens for the abolishment of sin, and was born of the Virgin Mary, and conversed with the disciples, and fulfilled the Economy according to the Father's will, and was crucified, and died and descended into the parts beneath the earth, and regulated the things there, Whom the gate-keepers of hell saw (Job xxxviii. 17, LXX.) and shuddered; and He rose from the dead the third day, and conversed with the disciples, and fulfilled all the Economy, and when the forty days were full, ascended into the heavens, and sitteth on the right hand of the Father, and is coming in the last day of the resurrection in the glory of the Father, to render to every one according to his works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FCouncils%2520of%2520Ariminum%2520and%2520Seleucia.html'
source_title="Councils of Ariminum and Seleucia, Section 8"
