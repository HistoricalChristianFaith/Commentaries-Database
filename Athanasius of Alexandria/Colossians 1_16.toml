[[commentary]]
quote='''
But the sentiment of Truth in this matter must not be hidden, but must have high utterance. For the Word of God was not made for us, but rather we for Him, and `in Him all things were created.' Nor for that we were weak, was He strong and made by the Father alone, that He might frame us by means of Him as an instrument; perish the thought! it is not so. For though it had seemed good to God not to make things originate, still had the Word been no less with God, and the Father in Him. At the same time, things originate could not without the Word be brought to be; hence they were made through Him,—and reasonably. For since the Word is the Son of God by nature proper to His essence, and is from Him, and in Him, as He said Himself, the creatures could not have come to be, except through Him. For as the light enlightens all things by its radiance, and without its radiance nothing would be illuminated, so also the Father, as by a hand, in the Word wrought all things, and without Him makes nothing. For instance, God said, as Moses relates, `Let there be light,' and `Let the waters be gathered together,' and `let the dry land appear,' and `Let Us make man;' as also Holy David in the Psalm, `He spake and they were made; He commanded and they were created.' And He spoke, not that, as in the case of men, some under-worker might hear, and learning the will of Him who spoke might go away and do it; for this is what is proper to creatures, but it is unseemly so to think or speak of the Word. For the Word of God is Framer and Maker, and He is the Father's Will. Hence it is that divine Scripture says not that one heard and answered, as to the manner or nature of the things which He wished made; but God only said, `Let it become,' and he adds, `And it became;' for what He thought good and counselled, that forthwith the Word began to do and to finish.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FFour%2520Discourses%2520Against%2520the%2520Arians%2FDiscourse%25202.html'
source_title="Discourses Against the Arians 2.31"
