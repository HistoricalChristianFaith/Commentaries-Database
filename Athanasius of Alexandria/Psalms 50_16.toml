[[commentary]]
quote='''
And although, again, he conceal his natural falsehood, and pretend to speak truth with his lips; yet are we 'not ignorant of his devices,' but are able to answer him in the words spoken by the Spirit against him; 'But unto the ungodly, said God, why dost thou preach My laws?' and, 'Praise is not seemly in the mouth of a sinner.' For even though he speak the truth, the deceiver is not worthy of credit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Athanasius%2520of%2520Alexandria%2FTo%2520the%2520Bishops%2520of%2520Egypt.html'
source_title="LETTER TO THE BISHOPS OF EGYPT 3"
