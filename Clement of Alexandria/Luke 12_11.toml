[[commentary]]
quote='''
On martyrdom the Lord hath spoken explicitly, and what is written in different places we bring together. "But I say unto you, Whosoever shall confess in Me before men, the Son of man also shall confess before the angels of God; but whosoever shall deny Me before men, him will I deny before the angels." "Whosoever shall be ashamed of Me or of My words in this adulterous and sinful generation, of him shall the Son of man also be ashamed when He cometh in the glory of His Father with His angels. Whosoever therefore shall confess in Me before men, him will I also confess before my Father in heaven." "And when they bring you before synagogues, and rulers, and powers, think not: beforehand how ye shall make your defence, or what ye shall say. For the Holy Spirit shall teach you in the same hour what ye must say." ...But if the Spirit of the Father testifies in us, how can we be any more hypocrites, who are said to bear testimony with the voice alone? But it will be given to some, if expedient, to make a defence, that by their witness and confession all may be benefited-those in the Church being confirmed, and those of the heathen who have devoted themselves to the search after salvation wondering and being led to the faith; and the rest seized with amazement. So that confession is by all means necessary. For it is in our power. But to make a defence for our faith is not universally necessary. For that does not depend on us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"
