[[commentary]]
quote='''
Such, then, being the case, the Greeks ought by the Law and the Prophets to learn to worship one God only, the only Sovereign; then to be taught by the apostle, "but to us an idol is no, thing in the world," since nothing among created things can be a likeness of God; and further, to be taught that none of those images which they worship can be similitudes: for the race of souls is not in form such as the Greeks fashion their idols. For souls are invisible; not only those that are rational, but those also of the other animals. And their bodies never become parts of the souls themselves, but organs-partly as seats, partly as vehicles-and in other cases possessions in various ways. But it is not possible to copy accurately even the likenesses of the organs; since, were it so, one might model the sun, as it is seen, and take the likeness of the rainbow in colours.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25206.html"
source_title="The Stromata Book 6"
