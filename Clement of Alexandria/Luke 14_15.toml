[[commentary]]
quote='''
But love (agape) is in truth celestial food, the banquet of reason. "It beareth all things, endureth all things, hopeth all things. Love never faileth." "Blessed is he who shall eat bread in the kingdom of God." But the hardest of all cases is for charity, which faileth not, to be cast from heaven above to the ground into the midst of sauces. And do you imagine that I am thinking of a supper that is to be done away with? "For if," it is said, "I bestow all my goods, and have not love, I am nothing."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"


[[commentary]]
quote='''
But love (agape) is in truth celestial food, the banquet of reason. "It beareth all things, endureth all things, hopeth all things. Love never faileth." "Blessed is he who shall eat bread in the kingdom of God." But the hardest of all cases is for charity, which faileth not, to be cast from heaven above to the ground into the midst of sauces. And do you imagine that I am thinking of a supper that is to be done away with? "For if," it is said, "I bestow all my goods, and have not love, I am nothing." On this love alone depend the law and the Word; and if "thou shalt love the Lord thy God and thy neighbour," this is the celestial festival in the heavens. But the earthly is called a supper, as has been shown from Scripture. For the supper is made for love, but the supper is not love (agape); only a proof of mutual and reciprocal kindly feeling.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"
