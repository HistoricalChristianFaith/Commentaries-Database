[[commentary]]
quote='''
"Woe to that man," the Lord says, "it were well for him if he had never been born, than that he should cause one of my little ones to stumble. It were better for him that a millstone were hung about him and he cast into the sea than that he should pervert one of my elect." "For the name of God is blasphemed because of them." Therefore the apostle nobly says, "I wrote to you in my letter to have no company with fornicators," as far as the words "but the body is not for fornication but for the Lord, and the Lord for the body."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25203.html"
source_title="The Stromata Book 3"
