[[commentary]]
quote='''
"Lay not up for yourselves, therefore, treasures on the earth, where moth and rust destroy, and thieves break through and steal," says the Lord, in reproach perchance of the covetous, and perchance also of those who are simply anxious and full of cares, and those too who indulge their bodies. For amours, and diseases, and evil thoughts "break through" the mind and the whole man. But our true "treasure" is where what is allied to our mind is, since it bestows the communicative power of righteousness, showing that we must assign to the habit of our old conversation what we have acquired by it, and have recourse to God, beseeching mercy. He is, in truth, "the bag that waxeth not old," the provisions of eternal life, "the treasure that faileth not in heaven."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"
