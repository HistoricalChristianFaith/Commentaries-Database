[[commentary]]
quote='''
Head-dresses and varieties of head-dresses, and elaborate braidings, and infinite modes of dressing the hair, and costly specimens of mirrors, in which they arrange their costume,-hunting after those that, like silly children, are crazy about their figures,-are characteristic of women who have lost all sense of shame. If any one were to call these courtesans, he would make no mistake, for they turn their faces into masks. But us the Word enjoins "to look not on the things that are seen, but the things that are not seen; for the things that are seen are temporal, but the things that are not seen are eternal."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25203.html"
source_title="The Instructor Book 3"

[[commentary]]
quote='''
More grievous and painful is this persecution, which arises from within, which is ever with a man, and which the persecuted cannot escape; for he carries the enemy about everywhere in himself. Thus also burning which attacks from without works trial, but that from within produces death. War also made on one is easily put an end to, but that which is in the soul continues till death.

With such persecution, if you have worldly wealth, if you have brothers allied by blood and other pledges, abandon the whole wealth of these which leads to evil; procure peace for yourself, free yourself from protracted persecutions; turn from them to the Gospel; choose before all the Saviour and Advocate and Paraclete of your soul, the Prince of life. "For the things which are seen are temporary; but the things which are not seen are eternal." And in the present time are things evanescent and insecure, but in that to come is eternal life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FFragments%2FWho%2520is%2520the%2520Rich%2520Man%2520that%2520Shall%2520Be%2520Saved%253F.html"
source_title="Who is the Rich Man that Shall Be Saved?"
