[[commentary]]
quote='''
Now the apostle, in contradistinction to gnostic perfection, calls the common faith the foundation, and sometimes milk, writing on this wise: "Brethren, I could not speak to you as to spiritual, but as to carnal, to babes in Christ. I have fed you with milk, not with meat: for ye were not able. Neither yet are ye now able. For ye are yet carnal: for whereas there is among you envy and strife, are ye not carnal, and walk as men?" Which things are the choice of those men who are sinners. But those who abstain from these things give their thoughts to divine things, and partake of gnostic food. "According to the grace," it is said, "given to me as a wise master builder, I have laid the foundation. And another buildeth on it gold and silver, precious stones." Such is the gnostic superstructure on the foundation of faith in Christ Jesus. But "the stubble, and the wood, and the hay," are the additions of heresies. "But the fire shall try every man's work, of what sort it is." In allusion to the gnostic edifice also in the Epistle to the Romans, he says, "For I desire to see you, that I may impart unto you a spiritual gift, that ye may be established." It was impossible that gifts of this sort could be written without disguise.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25205.html"
source_title="The Stromata Book 5"
