[[commentary]]
quote='''
And our Lord was born in the twenty-eighth year, when first the census was ordered to be taken in the reign of Augustus. And to prove that this is true, it is written in the Gospel by Luke as follows: "And in the fifteenth year, in the reign of Tiberius Caesar, the word of the Lord came to John, the son of Zacharias." And again in the same book: "And Jesus was coming to His baptism, being about thirty years old," and so on. And that it was necessary for Him to preach only a year, this also is written: "He hath sent Me to proclaim the acceptable year of the Lord." This both the prophet spake, and the Gospel. Accordingly, in fifteen years of Tiberius and fifteen years of Augustus; so were completed the thirty years till the time He suffered.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25201.html"
source_title="The Stromata Book 1"
