[[commentary]]
quote='''
For so He says, "Fool, this night shall thy soul be required of thee; and whose shall those things be which thou hast prepared?" And the commandment is expressed in these very words, "Take heed, therefore, of covetousness. For a man's life does not consist in the abundance of those things which he possesses. For what shall it profit a man, if he shall gain the whole world, and lose his own soul? or what shall a man give in exchange for his soul?" "Wherefore I say, Take no thought for your life, what ye shall eat; neither for your body, what ye shall put on. For your life is more than meat, and your body than raiment." And again, "For your Father knoweth that ye have need of all these things." "But seek first the kingdom of heaven, and its righteousness," for these are the great things, and the things which are small and appertain to this life "shall be added to you." Does He not plainly then exhort us to follow the gnostic life, and enjoin us to seek the truth in word and deed? Therefore Christ, who trains the soul, reckons one rich, not by his gifts, but by his choice.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"

[[commentary]]
quote='''
Those who neglect good works may fail to grasp just how much the good work of God has benefited them. Hence they are less capable of praying fittingly so as to receive good things from God. And even if they receive them, they will likely be unaware of what has been given them. And even if they enjoy them, they will not enjoy worthily what they have not understood. For from their lack of knowledge they will not grasp how to use the good things given them. And from their impulsiveness they will remain ignorant of how to avail themselves of the divine gifts offered.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25206.html"
source_title="The Stromata Book 6"
