[[commentary]]
quote='''
For, in fine, the agreement and harmony of the faith of both contribute to one end-salvation. We have in the apostle an unerring witness: "For I desire to see you, that I may impart unto you some spiritual gift, in order that ye may be strengthened; that is, that I may be comforted in you, by the mutual faith of you and me." And further on again he adds, "The righteousness of God is revealed from faith to faith." The apostle, then, manifestly announces a twofold faith, or rather one which admits of growth and perfection; for the common faith lies beneath as a foundation.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25205.html"
source_title="The Stromata Book 5"


[[commentary]]
quote='''
"According to the grace," it is said, "given to me as a wise master builder, I have laid the foundation. And another buildeth on it gold and silver, precious stones." Such is the gnostic superstructure on the foundation of faith in Christ Jesus. But "the stubble, and the wood, and the hay," are the additions of heresies. "But the fire shall try every man's work, of what sort it is." In allusion to the gnostic edifice also in the Epistle to the Romans, he says, "For I desire to see you, that I may impart unto you a spiritual gift, that ye may be established." It was impossible that gifts of this sort could be written without disguise.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25205.html"
source_title="The Stromata Book 5"
