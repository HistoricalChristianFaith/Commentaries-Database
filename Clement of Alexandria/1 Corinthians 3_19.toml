[[commentary]]
quote='''
This, I think, is signified by the utterance of the Saviour, "The foxes have holes, but the Son of man hath not where to lay His head." For on the believer alone, who is separated entirely from the rest, who by the Scripture are called wild beasts, rests the head of the universe, the kind and gentle Word, "who taketh the wise in their own craftiness. For the Lord knoweth the thoughts of the wise, that they are vain;" the Scripture calling those the wise who are skilled in words and arts, sophists.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25201.html"
source_title="The Stromata Book 1"

[[commentary]]
quote='''
This, then, "the wisdom of the world is foolishness with God," and of those who are "the wise the Lord knoweth their thoughts that they are vain." Let no man therefore glory on account of pre-eminence in human thought. For it is written well in Jeremiah, "Let not the wise man glory in his wisdom, and let not the mighty man glory in his might, and let not the rich man glory in his riches: but let him that glorieth glory in this, that he understandeth and knoweth that I am the Lord, that executeth mercy and judgment and righteousness upon the earth: for in these things is my delight, saith the Lord."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25201.html"
source_title="The Stromata Book 1"
