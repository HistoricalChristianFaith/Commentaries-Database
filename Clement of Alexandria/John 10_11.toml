[[commentary]]
quote='''
He is called Jesus: Sometimes He calls Himself a shepherd, and says, "I am the good Shepherd." According to a metaphor drawn from shepherds, who lead the sheep, is hereby understood the Instructor, who leads the children-the Shepherd who tends the babes. For the babes are simple, being figuratively described as sheep. "And they shall all," it is said, "be one flock, and one shepherd." The Word, then, who leads the children to salvation, is appropriately called the Instructor (Paedagogue).
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"


[[commentary]]
quote='''
The divine Instructor is trustworthy, adorned as He is with three of the fairest ornaments-knowledge, benevolence, and authority of utterance;-with knowledge, for He is the paternal wisdom: "All Wisdom is from the Lord, and with Him for evermore;"-with authority of utterance, for He is God and Creator: "For all things were made by Him, and without Him was not anything made;"-and with benevolence, for He alone gave Himself a sacrifice for us: "For the good Shepherd giveth His life for the sheep;" and He has so given it. Now, benevolence is nothing but wishing to do good to one's neighbour for his sake.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"


[[commentary]]
quote='''
As then we say that it belongs to the shepherd's art to care for the sheep; for so "the good shepherd giveth his life for the sheep;" so also we shall say that legislation, in as much as it presides over and cares for the flock of men, establishes the virtue of men, by fanning into flame, as far as it can, what good there is in humanity.

And if the flock figuratively spoken of as belonging to the Lord is nothing but a flock of men, then He Himself is the good Shepherd and Lawgiver of the one flock, "of the sheep who hear Him," the one who cares for them, "seeking," and finding by the law and the word, "that which was lost;" since, in truth, the law is spiritual and leads to felicity.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25201.html"
source_title="The Stromata Book 1"


[[commentary]]
quote='''
Feed us, the children, as sheep. Yea, Master, fill us with righteousness, Thine own pasture; yea, O Instructor, feed us on Thy holy mountain the Church, which towers aloft, which is above the clouds, which touches heaven. "And I will be," He says, "their Shepherd," and will be near them, as the garment to their skin. He wishes to save my flesh by enveloping it in the robe of immortality, and He hath anointed my body. "They shall call Me," He says, "and I will say, Here am I." Thou didst hear sooner than I expected, Master. "And if they pass over, they shall not slip," saith the Lord. For we who are passing over to immortality shall not fall into corruption, for He shall sustain us. For so He has said, and so He has willed. Such is our Instructor, righteously good. "I came not," He says, "to be ministered unto, but to minister." Wherefore He is introduced in the Gospel "wearied," because toiling for us, and promising "to give His life a ransom for many." For him alone who does so He owns to be the good shepherd. Generous, therefore, is He who gives for us the greatest of all gifts, His own life; and beneficent exceedingly, and loving to men, in that, when He might have been Lord, He wished to be a brother man; and so good was He that He died for us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
