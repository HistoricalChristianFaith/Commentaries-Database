[[commentary]]
quote='''
Then he subjoined the utterance, clear of all partiality: "For ye are all the children of God through faith in Christ Jesus. For as many as were baptized into Christ have put on Christ. There is neither Jew nor Greek, there is neither bond nor free, there is neither male nor female: for ye are all one in Christ Jesus." There are not, then, in the same Word some "illuminated (gnostics); and some animal (or natural) men; "but all who have abandoned the desires of the flesh are equal and spiritual before the Lord.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
