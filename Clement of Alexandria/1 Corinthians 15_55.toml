[[commentary]]
quote='''
It is a symbol, too, of the Lord's successful work, He having borne on His head, the princely part of His body, all our iniquities by which we were pierced. For He by His own passion rescued us from offences, and sins, and such like thorns; and having destroyed the devil, deservedly said in triumph, "O Death, where is thy sting?" And we eat grapes from thorns, and figs from thistles; while those to whom He stretched forth His hands—the disobedient and unfruitful people—He lacerates into wounds.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"
