[[commentary]]
quote='''
Plato himself says that happiness is to possess rightly the daemon, and that the ruling faculty of the soul is called the daemon; and he terms happiness the most perfect and complete good. Sometimes he calls it a consistent and harmonious life, sometimes the highest perfection in accordance with virtue; and this he places in the knowledge of the Good, and in likeness to God, demonstrating likeness to be justice and holiness with wisdom. For is it not thus that some of our writers have understood that man straightway on his creation received what is "according to the image," but that what is according "to the likeness" he will receive afterwards on his perfection? Now Plato, teaching that the virtuous man shall have this likeness accompanied with humility, explains the following: "He that humbleth himself shall be exalted." He says, accordingly, in The Laws: "God indeed, as the ancient saying has it, occupying the beginning, the middle, and the end of all things, goes straight through while He goes round the circumference. And He is always attended by Justice, the avenger of those who revolt from the divine law." You see how he connects fear with the divine law. He adds, therefore: "To which he, who would be happy, cleaving, will follow lowly and beautified." Then, connecting what follows these words, and admonishing by fear, he adds: "What conduct, then, is dear and conformable to God? That which is characterized by one word of old date: Like will be dear to like, as to what is in proportion; but things out of proportion are neither dear to one another, nor to those which are in proportion. And that therefore he that would be dear to God, must, to the best of his power, become such as He is. And in virtue of the same reason, our self-controlling man is dear to God. But he that has no self-control is unlike and diverse." In saying that it was an ancient dogma, he indicates the teaching which had come to him from the law.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25202.html"
source_title="The Stromata Book 2"
