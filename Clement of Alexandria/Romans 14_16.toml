[[commentary]]
quote='''
For the supper is made for love, but the supper is not love; only a proof of mutual and reciprocal kindly feeling. "Let not, then, your good be evil spoken of; for the kingdom of God is not meat and drink," says the apostle, in order that the meal spoken of may not be conceived as ephemeral, "but righteousness, and peace, and joy in the Holy Ghost." He who eats of this meal, the best of all, shall possess the kingdom of God, fixing his regards here on the holy assembly of love, the heavenly Church.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"
