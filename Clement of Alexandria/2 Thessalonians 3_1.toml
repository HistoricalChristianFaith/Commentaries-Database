[[commentary]]
quote='''
"Many rod-bearers there are, but few Bacchi," according to Plato. "For many are called, but few chosen." "Knowledge is not in all," says the apostle. "And pray that we may be delivered from unreasonable and wicked men: for all men have not faith." ...For the many demand demonstration as a pledge of truth, not satisfied with the bare salvation by faith.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25205.html"
source_title="The Stromata Book 5"
