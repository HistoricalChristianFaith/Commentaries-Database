[[commentary]]
quote='''
The twelve, having called together the multitude of the disciples, said, "It is not meet for us to leave the word of God and serve tables." If they avoided this, much more did they shun gluttony. And the apostles themselves, writing to the brethren at Antioch, and in Syria and Cilicia, said: "It seemed good to the Holy Ghost, and to us, to lay upon you no other burden than these necessary things, to abstain from things offered to idols, and from blood, and from things strangled, and from fornication, from which, if you keep yourselves, ye shall do well." But we must guard against drunkenness as against hemlock; for both drag down to death.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"
