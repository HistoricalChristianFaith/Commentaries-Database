[[commentary]]
quote='''
The Saviour by no means has excluded the rich on account of wealth itself, and the possession of property, nor fenced off salvation against them; if they are able and willing to submit their life to God's commandments, and prefer them to transitory objects, and if they would look to the Lord with steady eye, as those who look for the nod of a good helmsman, what he wishes, what he orders, what he indicates, what signal he gives his mariners, where and whence he directs the ship's course. For what harm does one do, who, previous to faith, by applying his mind and by saving has collected a competency? Or what is much less reprehensible than this, if at once by God, who gave him his life, he has had his home given him in the house of such men, among wealthy people, powerful in substance, and pre-eminent in opulence? For if, in consequence of his involuntary birth in wealth, a man is banished from life, rather is he wronged by God, who created him, in having vouchsafed to him temporary enjoyment, and in being deprived of eternal life. And why should wealth have ever sprung from the earth at all, if it is the author and patron of death?

But if one is able in the midst of wealth to turn from its power, and to entertain moderate sentiments, and to exercise self-command, and to seek God alone, and to breathe God and walk with God, such a poor man submits to the commandments, being free, unsubdued, free of disease, unwounded by wealth. But if not, "sooner shall a camel enter through a needle's eye, than such a rich man reach the kingdom of God."

Let then the camel, going through a narrow and strait way before the rich man, signify something loftier; which mystery of the Saviour is to be learned in the "Exposition of first Principles and of Theology."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FFragments%2FWho%2520is%2520the%2520Rich%2520Man%2520that%2520Shall%2520Be%2520Saved%253F.html"
source_title="Who is the Rich Man that Shall Be Saved?"
