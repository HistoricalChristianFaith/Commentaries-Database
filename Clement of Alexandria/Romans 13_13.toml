[[commentary]]
quote='''
We shall, however, treat of prayer in due course by and by. But we ought to have works that cry aloud, as becoming "those who walk in the day." "Let thy works shine," and behold a man and his works before his face. "For behold God and His works." For the gnostic must, as far as is possible, imitate God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"
