[[commentary]]
quote='''
"For if we live in the Spirit, let us also walk in the Spirit." "He that soweth to his flesh, shall of the flesh reap corruption; but he that soweth to the Spirit, shall of the Spirit reap life everlasting." But to those miserable men, witness to the Lord by blood seems a most violent death, not knowing that such a gate of death is the beginning of the true life; and they will understand neither the honours after death, which belong to those who have lived holily, nor the punishments of those who have lived unrighteously and impurely. ... And the Saviour has said to us, "The spirit is willing, but the flesh is weak." "Because the carnal mind is enmity against God," explains the apostle: "for it is not subject to the law of God, neither indeed, can be. And they that are in the flesh cannot please God." And in further explanation continues, that no one may, like Marcion regard the creature as evil. "But if Christ be in you, the body is dead because of sin; but the Spirit is life because of righteousness." And again: "For if ye live after the flesh, ye shall die. For I reckon that the sufferings of this present time are not worthy to be compared to the glory which shall be revealed in us. If we suffer with Him, that we also may be glorified together as joint-heirs of Christ. And we know that all things work together for good to them that love God, to them that are called according to the purpose. For whom He did foreknow, He also did predestinate to be conformed to the image of His Son, that He might be the first-born among many brethren. And whom He did predestinate, them He also called; and whom He called, them He also justified; and whom He justified, them He also glorified."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"
