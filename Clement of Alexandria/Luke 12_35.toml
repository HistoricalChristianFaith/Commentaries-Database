[[commentary]]
quote='''
We must therefore sleep so as to be easily awaked. For it is said, "Let your loins be girt about, and your lamps burning; and ye yourselves like to men that watch for their lord, that when he returns from the marriage, and comes and knocks, they may straightway open to him. Blessed are those servants whom the Lord, when He cometh, shall find watching." For there is no use of a sleeping man, as there is not of a dead man. Wherefore we ought often to rise by night and bless God. For blessed are they who watch for Him, and so make themselves like the angels, whom we call "watchers." But a man asleep is worth nothing, any more than if he were not alive.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"
