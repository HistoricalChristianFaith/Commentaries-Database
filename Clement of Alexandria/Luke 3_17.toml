[[commentary]]
quote='''
Sick, we truly stand in need of the Saviour; having wandered, of one to guide us; blind, of one to lead us to the light; thirsty, "of the fountain of life, of which whosoever partakes, shall no longer thirst;" dead, we need life; sheep, we need a shepherd; we who are children need a tutor, while universal humanity stands in need of Jesus; so that we may not continue intractable and sinners to the end, and thus fall into condemnation, but may be separated from the chaff, and stored up in the paternal garner. "For the fan is in the Lord's hand, by which the chaff due to the fire is separated from the wheat." You may learn, if you will, the crowning wisdom of the all-holy Shepherd and Instructor, of the omnipotent and paternal Word, when He figuratively represents Himself as the Shepherd of the sheep. And He is the Tutor of the children.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
