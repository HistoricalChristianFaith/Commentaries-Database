[[commentary]]
quote='''
And if we would persuade any of our fellow-guests to virtue, we are all the more on this account to abstain from those dainty dishes; and so exhibit ourselves as a bright pattern of virtue, such as we ourselves have in Christ. "For if any of such meats make a brother to stumble, I shall not eat it as long as the world lasts," says he, "that I may not make my brother stumble." I gain the man by a little self-restraint.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"
