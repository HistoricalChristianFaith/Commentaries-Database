[[commentary]]
quote='''
And we have still to explain what is said by the apostle: "I have fed you with milk (as children in Christ), not with meat; for ye were not able, neither yet are ye now able." For it does not appear to me that the expression is to be taken in a Jewish sense; for I shall oppose to it also that Scripture, "I will bring you into that good land which flows with milk and honey." ... So that the whole matter may be conceived thus: As nurses nourish new-born children on milk, so do I also by the Word, the milk of Christ, instilling into you spiritual nutriment.
...
And since the Word is the gushing fountain of life, and has been called a river of olive oil, Paul, using appropriate figurative language, and calling Him milk, adds: "I have given you to drink;" for we drink in the word, the nutriment of the truth.
...
Wherefore the Holy Spirit in the apostle, using the voice of the Lord, says mystically, "I have given you milk to drink." For if we have been regenerated unto Christ, He who has regenerated us nourishes us with His own milk, the Word; for it is proper that what has procreated should forthwith supply nourishment to that which has been procreated. And as the regeneration was conformably spiritual, so also was the nutriment of man spiritual.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
