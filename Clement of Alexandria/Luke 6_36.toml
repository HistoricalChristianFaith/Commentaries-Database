[[commentary]]
quote='''
Now Plato the philosopher, defining the end of happiness, says that it is likeness to God as far as possible; whether concurring with the precept of the law (for great natures that are free of passions somehow hit the mark respecting the truth, as the Pythagorean Philo says in relating the history of Moses), or whether instructed by certain oracles of the time, thirsting as he always was for instruction. For the law says, "Walk after the Lord your God, and keep my commandments." For the law calls assimilation following; and such a following to the utmost of its power assimilates. "Be," says the Lord, "merciful and pitiful, as your heavenly Father is pitiful." Thence also the Stoics have laid down the doctrine, that living agreeably to nature is the end, fitly altering the name of God into nature; since also nature extends to plants, to seeds, to trees, and to stones. It is therefore plainly said, "Bad men do not understand the law; but they who love the law fortify themselves with a wall." "For the wisdom of the clever knows its ways; but the folly of the foolish is in error." "For on whom will I look, but on him who is mild and gentle, and trembleth at my words?" says the prophecy.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25202.html"
source_title="The Stromata Book 2"
