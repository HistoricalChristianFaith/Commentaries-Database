[[commentary]]
quote='''
"For now we see as through a glass," the same apostle says, "but then face to face." Wherefore also he has added, "neither yet are ye now able, for ye are still carnal," minding the things of the flesh,-desiring, loving, feeling jealousy, wrath, envy. "For we are no more in the flesh," as some suppose. For with it [they say], having the face which is like an angel's, we shall see the promise face to face.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"

[[commentary]]
quote='''
"I said, Ye are Gods; and all sons of the Highest." To whom speaks the Lord? To those who reject as far as possible all that is of man. And the apostle says, "For ye are not any longer in the flesh, but in the Spirit." And again he says, "Though in the flesh, we do not war after the flesh." "For flesh and blood cannot inherit the kingdom of God, neither doth corruption inherit incorruption." "Lo, ye shall die like men," the Spirit has said, confuting us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25202.html"
source_title="The Stromata Book 2"
