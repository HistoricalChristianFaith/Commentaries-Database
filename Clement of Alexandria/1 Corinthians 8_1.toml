[[commentary]]
quote='''
"If any man thinketh that he knoweth anything, he knoweth nothing yet as he ought to know." For truth is never mere opinion. But the "supposition of knowledge inflates," and fills with pride; "but charity edifieth," which deals not in supposition, but in truth. Whence it is said, "If any man loves, he is known."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25201.html"
source_title="The Stromata Book 1"


[[commentary]]
quote='''
But the knowledge of those who think themselves wise, whether the barbarian sects or the philosophers among the Greeks, according to the apostle, "puffeth up." But that knowledge, which is the scientific demonstration of what is delivered according to the true philosophy, is rounded on faith.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25202.html"
source_title="The Stromata Book 2"


[[commentary]]
quote='''
"We know that we all have knowledge"-common knowledge in common things, and the knowledge that there is one God. For he was writing to believers; whence he adds, "But knowledge (gnosis) is not in all," being communicated to few. And there are those who say that the knowledge about things sacrificed to idols is not promulgated among all, "lest our liberty prove a stumbling-block to the weak. For by thy knowledge he that is weak is destroyed."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"
