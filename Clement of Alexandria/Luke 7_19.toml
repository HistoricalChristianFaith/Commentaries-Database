[[commentary]]
quote='''
And there are three departments of counsel: That which takes examples from past times; as what the Hebrews suffered when they worshipped the golden calf, and what they suffered when they committed fornication, and the like. The second, whose meaning is understood from the present times, as being apprehended by perception; as it was said to those who asked the Lord, "If He was the Christ, or shall we wait for another? Go and tell John, the blind receive their sight, the deaf hear, the lepers are cleansed, the dead are raised up; and blessed is he who shall not be offended in Me." Such was that which David said when he prophesied, "As we have heard, so have we seen." And the third department of counsel consists of what is future, by which we are bidden guard against what is to happen; as also that was said, "They that fall into sins shall be cast into outer darkness, where there shall be wailing and gnashing of teeth," and the like. So that from these things it is clear that the Lord, going the round of all the methods of curative treatment, calls humanity to salvation.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
