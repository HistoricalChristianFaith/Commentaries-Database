[[commentary]]
quote='''
The natural use of food is then indifferent. "For neither if we eat are we the better," it is said, "nor if we eat not are we the worse." But it is inconsistent with reason, for those that have been made worthy to share divine and spiritual food, to partake of the tables of demons. "Have we not power to eat and to drink," says the apostle, "and to lead about wives"? But by keeping pleasures under command we prevent lusts. See, then, that this power of yours never "become a stumbling-block to the weak."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"

[[commentary]]
quote='''
But he who obeys the mere call, as he is called, neither for fear, nor for enjoyments, is on his way to knowledge. For he does not consider whether any extrinsic lucrative gain or enjoyment follows to him; but drawn by the love of Him who is the true object of love, and led to what is requisite, practises piety. So that not even were we to suppose him to receive from God leave to do things forbidden with impunity; not even if he were to get the promise that he would receive as a reward the good things of the blessed; but besides, not even if he could persuade himself that God would be hoodwinked with reference to what he does (which is impossible), would he ever wish to do aught contrary to right reason, having once made choice of what is truly good and worthy of choice on its own account, and therefore to be loved. For it is not in the food of the belly, that we have heard good to be situated. But he has heard that "meat will not commend us," nor marriage, nor abstinence from marriage in ignorance; but virtuous gnostic conduct.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"
