[[commentary]]
quote='''
The man of understanding and perspicacity is, then, a Gnostic. And his business is not abstinence from what is evil (for this is a step to the highest perfection), or the doing of good out of fear. For it is written, "Whither shall I flee, and where shall I hide myself from Thy presence? If I ascend into heaven, Thou art there; if I go away to the uttermost parts of the sea, there is Thy right hand; if I go down into the depths, there is Thy Spirit." Nor any more is he to do so from hope of promised recompense. For it is said, "Behold the Lord, and His reward is before His face, to give to every one according to his works; what eye hath not seen, and ear hath not heard, and hath not entered into the heart of man what God hath prepared for them that love Him." But only the doing of good out of love, and for the sake of its own excellence, is to be the Gnostic's choice.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"

