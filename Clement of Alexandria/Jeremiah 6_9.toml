[[commentary]]
quote='''
God invites us to knowledge also, when he says by Jeremiah, “If you had walked in the way of God, you would have dwelled forever in peace.” … God grants pardon to those who have erred. He says, “Turn, turn, as a grape gatherer returns to his basket.” Do you see the goodness of justice in that it advises us to repent?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
