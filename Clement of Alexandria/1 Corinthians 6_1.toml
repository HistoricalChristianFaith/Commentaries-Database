[[commentary]]
quote='''
One passage, accordingly, I shall in the briefest terms advert to, so as not to leave the topic unexplained. For in the first Epistle to the Corinthians the divine apostle says: "Dare any of you, having a matter against the other, go to law before the unrighteous, and not before the saints? Know ye not that the saints shall judge the world?" and so on. The section being very long, we shall exhibit the meaning of the apostle's utterance by employing such of the apostolic expressions as are most pertinent, and in the briefest language, and in a sort of cursory way, interpreting the discourse in which he describes the perfection of the Gnostic. For he does not merely instance the Gnostic as characterized by suffering wrong rather than do wrong; but he teaches that he is not mindful of injuries, and does not allow him even to pray against the man who has done him wrong. For he knows that the Lord expressly enjoined "to pray for enemies." To say, then, that the man who has been injured goes to law before the unrighteous, is nothing else than to say that he shows a wish to retaliate, and a desire to injure the second in return, which is also to do wrong likewise himself. And his saying, that he wishes "some to go to law before the saints," points out those who ask by prayer that those who have done wrong should suffer retaliation for their injustice, and intimates that the second are better than the former; but they are not yet obedient, if they do not, having become entirely free of resentment, pray even for their enemies.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25207.html"
source_title="The Stromata Book 7"
