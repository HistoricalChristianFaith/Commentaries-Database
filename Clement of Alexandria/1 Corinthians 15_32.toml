[[commentary]]
quote='''
You see how even to the prophets of the Greeks he attributes something of the truth, and is not ashamed, when discoursing for the edification of some and the shaming of others, to make use of Greek poems. Accordingly to the Corinthians (for this is not the only instance), while discoursing on the resurrection of the dead, he makes use of a tragic Iambic line, when he said, "What advantageth it me if the dead are not raised? Let us eat and drink, for to-morrow we die. Be not deceived; evil communications corrupt good manners."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25201.html"
source_title="The Stromata Book 1"


[[commentary]]
quote='''
They who sing thus, and sing in response, are those who before hymned immortality,—found at last wicked and wickedly singing this most pernicious palinode, "Let us eat and drink, for to-morrow we die." But not to-morrow in truth, but already, are these dead to God; burying their dead, that is, sinking themselves down to death. The apostle very firmly assails them. "Be not deceived; neither adulterers, nor effeminate, nor abusers of themselves with mankind, nor thieves, nor covetous, nor drunkards, nor railers," and whatever else he adds to these, "shall inherit the kingdom of God."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25203.html"
source_title="The Instructor Book 3"
