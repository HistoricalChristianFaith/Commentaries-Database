[[commentary]]
quote='''
Gatherings for the sake of mirth, and such entertainments as are called by ourselves, we name rightly suppers, dinners, and banquets, after the example of the Lord. But such entertainments the Lord has not called agapae. He says accordingly somewhere, "When thou art called to a wedding, recline not on the highest couch; but when thou art called, fall into the lowest place;" and elsewhere, "When thou makest a dinner or a supper;" and again, "But when thou makest an entertainment, call the poor," for whose sake chiefly a supper ought to be made. And further, "A certain man made a great supper, and called many."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"
