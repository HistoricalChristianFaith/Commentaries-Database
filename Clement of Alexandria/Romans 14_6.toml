[[commentary]]
quote='''
"Let him who eateth, not despise him who eateth not; and let him who eateth not, not judge him who eateth." And a little way on he explains the reason of the command, when he says, "He that eateth, eateth to the Lord, and giveth God thanks; and he that eateth not, to the Lord he eateth not, and giveth God thanks." So that the right food is thanksgiving. And he who gives thanks does not occupy his time in pleasures.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"
