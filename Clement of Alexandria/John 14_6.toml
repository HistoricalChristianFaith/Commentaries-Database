[[commentary]]
quote='''
We merely therefore assert here, that philosophy is characterized by investigation into truth and the nature of things (this is the truth of which the Lord Himself said, "I am the truth"); and that, again, the preparatory training for rest in Christ exercises the mind, rouses the intelligence, and begets an inquiring shrewdness, by means of the true philosophy, which the initiated possess, having found it, or rather received it, from the truth itself.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25201.html"
source_title="The Stromata Book 1"


[[commentary]]
quote='''
For he who hopes, as he who believes, sees intellectual objects and future things with the mind. If, then, we affirm that aught is just, and affirm it to be good, and we also say that truth is something, yet we have never seen any of such objects with our eyes, but with our mind alone. Now the Word of God says, "I am the truth." The Word is then to be contemplated by the mind.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25205.html"
source_title="The Stromata Book 5"
