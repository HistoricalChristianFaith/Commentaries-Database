[[commentary]]
quote='''
Such He names children, and sons, and little children, and friends, and little ones here, in reference to their future greatness above. "Despise not," He says, "one of these little ones; for their angels always behold the face of My Father in heaven." And in another place, "Fear not, little flock, for it is your Father's good pleasure to give you the kingdom of heaven." Similarly also He says that "the least in the kingdom of heaven" that is His own disciple "is greater than John, the greatest among those born of women." And again, "He that receiveth a righteous man or a prophet in the name of a righteous man or a prophet, shall receive their reward; and he that giveth to a disciple in the name of a disciple a cup of cold water to drink, shall not lose his reward." Wherefore this is the only reward that is not lost.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FFragments%2FWho%2520is%2520the%2520Rich%2520Man%2520that%2520Shall%2520Be%2520Saved%253F.html"
source_title="Who is the Rich Man that Shall Be Saved?"
