[[commentary]]
quote='''
For since all forms of speech flow from mind and manners, ludicrous expressions could not be uttered, did they not proceed from ludicrous practices. For the saying, "It is not a good tree which produces corrupt fruit, nor a corrupt tree which produces good fruit," is to be applied in this case. For speech is the fruit of the mind. If, then, wags are to be ejected from our society, we ourselves must by no manner of means be allowed to stir up laughter. For it were absurd to be found imitators of things of which we are prohibited to be listeners; and still more absurd for a man to set about making himself a laughing-stock, that is, the but of insult and derision.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25202.html"
source_title="The Instructor Book 2"
