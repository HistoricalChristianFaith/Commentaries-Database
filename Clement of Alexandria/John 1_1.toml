[[commentary]]
quote='''
Nothing, then, is hated by God, nor yet by the Word. For both are one-that is, God. For He has said, "In the beginning the Word was in God, and the Word was God." If then He hates none of the things which He has made, it follows that He loves them. Much more than the rest, and with reason, will He love man, the noblest of all objects created by Him, and a God-loving being. Therefore God is loving; consequently the Word is loving.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
