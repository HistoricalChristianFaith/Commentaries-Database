[[commentary]]
quote='''
“Little children” means those whose sins have been forgiven.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FFragments%2F1.-From%2520the%2520Latin%2520Translation%2520of%2520Cassiodorus.html"
source_title="From the Latin Translation of Cassiodorus"

[[commentary]]
quote='''
He then indicates the stages of advancement and progress of souls that are still located in the flesh; and calls those whose sins have been forgiven, for the Lord's name's sake, "little children," for many believe on account of the name only.
'''
append_to_author_name=' (as quoted by Cassiodorus)'
source_url='https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FFragments%2F1.-From%2520the%2520Latin%2520Translation%2520of%2520Cassiodorus.html'
source_title='From the Latin Translation of Cassiodorus'
