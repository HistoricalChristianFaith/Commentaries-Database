[[commentary]]
quote='''
And the saying, "Know thyself," has been taken rather more mystically from this, "Thou hast seen thy brother, thou hast seen thy God." Thus also, "Thou shalt love the Load thy God with all thy heart, and thy neighbour as thyself; " for it is said, "On these commandments the law and the prophets hang and are suspended." With these also agree the following: "These things have I spoken to you, that My joy might be fulfilled: and this is My commandment, That ye love one another, as I have loved you."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25202.html"
source_title="The Stromata Book 2"

[[commentary]]
quote='''
But the cavillers did not know even this, as the apostle says, "that he who loveth his brother worketh not evil; " for this, "Thou shalt not kill, thou shalt not commit adultery, thou shalt not steal; and if there be any other commandment, it is comprehended in the word, Thou shall love thy neighbour as thyself." So also is it said, "Thou shall love the Lord thy God with all thy heart, and thou shalt love thy neighbour as thyself." And "if he that loveth his neighbour worketh no evil," and if "every commandment is comprehended in this, the loving our neighbour," the commandments, by menacing with fear, work love, not hatred.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"
