[[commentary]]
quote='''
They say that the Saviour himself said "I came to destroy the works of the female," meaning by "female" desire, and by "works" birth and corruption. What then would they say? Has this destruction in fact been accomplished? They could not say so, for the world continues exactly as before. Yet the Lord did not lie. For in truth he did destroy the works of desire, love of money, contentiousness, vanity, mad lust for women, paederasty, gluttony, licentiousness, and similar vices. Their birth is the soul's corruption, since then we are "dead in sins." And this is the incontinence referred to as "female." Birth and the corruption chiefly involved in the creation must necessarily continue until the achievement of complete separation and the restoration of the elect, on whose account even the beings mingled with this world are restored to their proper condition.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25203.html"
source_title="The Stromata Book 3"
