[[commentary]]
quote='''
I hear also those words of his, "And these things I say, lest any man should beguile you with enticing words, or one should enter in to spoil you." And again, "Beware lest any man spoil you through philosophy and vain deceit, after the tradition of men, after the rudiments of the world, and not after Christ;" branding not all philosophy, but the Epicurean, which Paul mentions in the Acts of the Apostles, which abolishes providence and deifies pleasure, and whatever other philosophy honours the elements, but places not over them the efficient cause, nor apprehends the Creator.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25201.html"
source_title="The Stromata Book 1"

[[commentary]]
quote='''
For Paul too, in the Epistles, plainly does not disparage philosophy; but deems it unworthy of the man who has attained to the elevation of the Gnostic, any more to go back to the Hellenic "philosophy," figuratively calling it the rudiments of this world, as being most rudimentary, and a preparatory training for the truth. Wherefore also, writing to the Hebrews, who were declining again from faith to the law, he says, "Have ye not need again of one to teach you which are the first principles of the oracles of God, and are become such as have need of milk, and not of strong meat?" So also to the Colossians, who were Greek converts, "Beware lest any man spoil you by philosophy and vain deceit, after the tradition of men, after the rudiments of this world, and not after Christ," -enticing them again to return to philosophy, the elementary doctrine.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25206.html"
source_title="The Stromata Book 6"

[[commentary]]
quote='''
It is the prerogative of the Gnostic, then, to know how to make use of speech, and when, and how, and to whom. And already the apostle, by saying, "After the rudiments of the world, and not after Christ," makes the asseveration that the Hellenic teaching is elementary, and that of Christ perfect, as we have already intimated before.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25206.html"
source_title="The Stromata Book 6"
