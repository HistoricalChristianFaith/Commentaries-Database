[[commentary]]
quote='''
For the new minds, which have newly become wise, which have sprung into being according to the new covenant, are infantile in the old folly. Of late, then, God was known by the coming of Christ: "For no man knoweth God but the Son, and he to whom the Son shall reveal Him."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"

[[commentary]]
quote='''
But "no one is good," except His Father. It is this same Father of His, then who being one is manifested by many powers And this was the import of the utterance, "No man knew the Father," who was Himself everything before the coming of the Son. So that it is veritably clear that the God of all is only one good, just Creator, and the Son in the Father, to whom be glory for ever and ever, Amen.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"

[[commentary]]
quote='''
So God is good on His own account, and just also on ours, and He is just because He is good. And His justice is shown to us by His own Word from there from above, whence the Father was. For before He became Creator He was God; He was good. And therefore He wished to be Creator and Father. And the nature of all that love was the source of righteousness-the cause, too, of His lighting up His sun, and sending down His own Son. And He first announced the good righteousness that is from heaven, when He said, "No man knoweth the Son, but the Father; nor the Father, but the Son." This mutual and reciprocal knowledge is the symbol of primeval justice.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"

[[commentary]]
quote='''
Yet let him know that it was God Himself that promulgated the Scriptures by His Son. And he, who announces what is his own, is to be believed. "No one," says the Lord, "hath known the Father but the Son, and he to whom the Son shall reveal Him." This, then, is to be believed, according to Plato, though it is announced and spoken "without probable and necessary proofs," but in the Old and New Testament.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25205.html"
source_title="The Stromata Book 5"

[[commentary]]
quote='''
Now those that ruminate, but do not part the hoof, indicate the majority of the Jews, who have indeed the oracles of God, but have not faith, and the step which, resting on the truth, conveys to the Father by the Son. Whence also this kind of cattle are apt to slip, not having a division in the foot, and not resting on the twofold support of faith. For "no man," it is said, "knoweth the Father, but he to whom the Son shall reveal Him."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25207.html"
source_title="The Stromata Book 7"
