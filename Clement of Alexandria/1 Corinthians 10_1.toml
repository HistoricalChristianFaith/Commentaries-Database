[[commentary]]
quote='''
Our Gnostic then alone, having grown old in the Scriptures, and maintaining apostolic and ecclesiastic orthodoxy in doctrines, lives most correctly in accordance with the Gospel, and discovers the proofs, for which he may have made search (sent forth as he is by the Lord), from the law and the prophets. For the life of the Gnostic, in my view, is nothing but deeds and words corresponding to the tradition of the Lord. But "all have not knowledge. For I would not have you to be ignorant, brethren," says the apostle, "that all were under the cloud, and partook of spiritual meat and drink;" clearly affirming that all who heard the word did not take in the magnitude of knowledge in deed and word. Wherefore also he added: "But with all of them He was not well pleased." Who is this? He who said, "Why do you call Me Lord, and do not the will of My Father?" That is the Saviour's teaching, which to us is spiritual food, and drink that knows no thirst, the water of gnostic life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25207.html"
source_title="The Stromata Book 7"
