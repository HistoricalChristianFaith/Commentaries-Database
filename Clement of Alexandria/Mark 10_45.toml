[[commentary]]
quote='''
Such is our Instructor, righteously good. "I came not," He says, "to be ministered unto, but to minister." Wherefore He is introduced in the Gospel "wearied," because toiling for us, and promising "to give His life a ransom for many." For him alone who does so He owns to be the good shepherd. Generous, therefore, is He who gives for us the greatest of all gifts, His own life; and beneficent exceedingly, and loving to men, in that, when He might have been Lord, He wished to be a brother man; and so good was He that He died for us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
