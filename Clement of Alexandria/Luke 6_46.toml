[[commentary]]
quote='''
Our Gnostic then alone, having grown old in the Scriptures, and maintaining apostolic and ecclesiastic orthodoxy in doctrines, lives most correctly in accordance with the Gospel, and discovers the proofs, for which he may have made search (sent forth as he is by the Lord), from the law and the prophets. For the life of the Gnostic, in my view, is nothing but deeds and words corresponding to the tradition of the Lord. But "all have not knowledge. For I would not have you to be ignorant, brethren," says the apostle, "that all were under the cloud, and partook of spiritual meat and drink;" clearly affirming that all who heard the word did not take in the magnitude of knowledge in deed and word. Wherefore also he added: "But with all of them He was not well pleased." Who is this? He who said, "Why do you call Me Lord, and do not the will of My Father?" That is the Saviour's teaching, which to us is spiritual food, and drink that knows no thirst, the water of gnostic life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25207.html"
source_title="The Stromata Book 7"

[[commentary]]
quote='''
And again, those also are likewise unclean that part the hoof, but do not ruminate. For these point out the heretics, who indeed go upon the name of the Father and the Son, but are incapable of triturating and grinding down the clear declaration of the oracles, and who, besides, perform the works of righteousness coarsely and not with precision, if they perform them at all. To such the Lord says, "Why will ye call me Lord, Lord, and do not the things which I say?"
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25207.html"
source_title="The Stromata Book 7"

[[commentary]]
quote='''
"Why call ye me Lord, Lord," He says, "and do not the things which I say?" For "the people that loveth with their lips, but have their heart far away from the Lord," is another people, and trust in another, and have willingly sold themselves to another; but those who perform the commandments of the Lord, in every action "testify," by doing what He wishes, and consistently naming the Lord's name; and "testifying" by deed to Him in whom they trust, that they are those "who have crucified the flesh, with the affections and lusts." "If we live in the Spirit, let us also walk in the Spirit." "He that soweth to his flesh, shall of the flesh reap corruption; but he that soweth to the Spirit, shall of the Spirit reap life everlasting."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"
