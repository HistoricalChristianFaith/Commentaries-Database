[[commentary]]
quote='''
For what is the use of wisdom, if it makes not him who can hear it wise? For still the Saviour saves, "and always works, as He sees the Father." For by teaching, one learns more; and in speaking, one is often a hearer along with his audience. For the teacher of him who speaks and of him who hears is one-who waters both the mind and the word. Thus the Lord did not hinder from doing good while keeping the Sabbath; but allowed us to communicate of those divine mysteries, and of that holy light, to those who are able to receive them.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25201.html"
source_title="The Stromata Book 1"
