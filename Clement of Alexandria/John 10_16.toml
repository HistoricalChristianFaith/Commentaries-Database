[[commentary]]
quote='''
He is called Jesus: Sometimes He calls Himself a shepherd, and says, "I am the good Shepherd." According to a metaphor drawn from shepherds, who lead the sheep, is hereby understood the Instructor, who leads the children-the Shepherd who tends the babes. For the babes are simple, being figuratively described as sheep. "And they shall all," it is said, "be one flock, and one shepherd." The Word, then, who leads the children to salvation, is appropriately called the Instructor (Paedagogue).
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"


[[commentary]]
quote='''
"And other sheep there are also," saith the Lord, "which are not of this fold"-deemed worthy of another fold and mansion, in proportion to their faith. "But My sheep hear My voice," understanding gnostically the commandments. And this is to be taken in a magnanimous and worthy acceptation, along with also the recompense and accompaniment of works. So that when we hear, "Thy faith hath saved thee," we do not understand Him to say absolutely that those who have believed in any way whatever shall be saved, unless also works follow. But it was to the Jews alone that He spoke this utterance, who kept the law and lived blamelessly, who wanted only faith in the Lord. No one, then, can be a believer and at the same time be licentious; but though he quit the flesh, he must put off the passions, so as to be capable of reaching his own mansion.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25206.html"
source_title="The Stromata Book 6"
