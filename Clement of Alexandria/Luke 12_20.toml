[[commentary]]
quote='''
It is not of anything else that the assertion is made, but of profligacy, and love of women, and love of glory, and ambition, and similar passions. For so He says, "Fool, this night shall thy soul be required of thee; and whose shall those things be which thou hast prepared?" And the commandment is expressed in these very words, "Take heed, therefore, of covetousness. For a man's life does not consist in the abundance of those things which he possesses. For what shall it profit a man, if he shall gain the whole world, and lose his own soul? or what shall a man give in exchange for his soul?"
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25204.html"
source_title="The Stromata Book 4"
