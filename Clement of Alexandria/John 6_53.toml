[[commentary]]
quote='''
O amazing birth! O holy swaddling bands! The Word is all to the child, both father and mother and tutor and nurse. "Eat ye my flesh," He says, "and drink my blood." Such is the suitable food which the Lord ministers, and He offers His flesh and pours forth His blood, and nothing is wanting for the children's growth. O amazing mystery! We are enjoined to cast off the old and carnal corruption, as also the old nutriment, receiving in exchange another new regimen, that of Christ, receiving Him if we can, to hide Him within; and that, enshrining the Saviour in our souls, we may correct the affections of our flesh.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
