[[commentary]]
quote='''
Further, let those who say that philosophy took its rise from the devil know this, that the Scripture says that "the devil is transformed into an angel of light." When about to do what? Plainly, when about to prophesy. But if he prophesies as an angel of light, he will speak what is true. And if he prophesies what is angelical, and of the light, then he prophesies what is beneficial when he is transformed according to the likeness of the operation, though he be different with respect to the matter of apostasy. For how could he deceive any one, without drawing the lover of knowledge into fellowship, and so drawing him afterwards into falsehood? Especially he will be found to know the truth, if not so as to comprehend it, yet so as not to be unacquainted with it.

Philosophy is not then false, though the thief and the liar speak truth, through a transformation of operation. Nor is sentence of condemnation to be pronounced ignorantly against what is said, on account of him who says it (which also is to be kept in view, in the case of those who are now alleged to prophesy); but what is said must be looked at, to see if it keep by the truth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25206.html"
source_title="The Stromata Book 6"
