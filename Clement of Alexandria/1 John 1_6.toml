[[commentary]]
quote='''
And how can they say that they alone know God when they do the same things as those who are loathed by the heathen because they do not do what the laws direct, that is, as the wicked and incontinent and covetous and adulterous? They ought to live good lives even while they are dwelling in an alien country, to manifest their truly kingly nature. But because they have chosen to disobey the laws, they make themselves objects of hatred both to human lawgivers and to the law of God. At any rate in Numbers the man who thrust his spear into the fornicator is evidently blessed by God. And John says in his epistle: "If we say that we have fellowship with him and walk in darkness, we lie and do not the truth; but if we walk in the light as he is in the light, we have fellowship with him, and the blood of Jesus his Son cleanses us from sin." How then are they who do these things superior to worldly men when they behave like the very worst men of this world? Those whose actions are alike are in my opinion of like nature.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Stromata%2520Book%25203.html"
source_title="The Stromata Book 3"
