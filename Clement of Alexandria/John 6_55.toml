[[commentary]]
quote='''
"Wherefore also I have given you milk to drink," he says; meaning, I have instilled into you the knowledge which, from instruction, nourishes up to life eternal. But the expression, "I have given you to drink," is the symbol of perfect appropriation. For those who are full-grown are said to drink, babes to suck. "For my blood," says the Lord, "is true drink." In saying, therefore, "I have given you milk to drink," has he not indicated the knowledge of the truth, the perfect gladness in the Word, who is the milk?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Clement%2520of%2520Alexandria%2FThe%2520Instructor%2520Book%25201.html"
source_title="The Instructor Book 1"
