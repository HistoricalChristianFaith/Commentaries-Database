[[commentary]]
quote='''
The flowers are said to have appeared on the earth, because when holy souls depart from their bodies, they are received in heaven. And because in this life, although it was winter, they did not grow sluggish from good work, as soon as they departed, they gloriously flourished in the land of the living. Rightly therefore follows what he says: The time of pruning has arrived, because the more the number of the elect is gathered in heaven, the more quickly the reprobate are cut off from the Church like useless branches, so that the world may end more swiftly.

What is designated by the turtledove, if not the Church; what by the land of the bridegroom, if not that blessed life? But the voice of the turtledove is said to have been heard in the land of the bridegroom, because while the holy Church prays for what it desires, it is most mercifully heard by Christ in heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
