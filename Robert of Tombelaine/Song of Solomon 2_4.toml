[[commentary]]
quote='''
For what do we more fittingly understand by the wine cellar than the hidden contemplation of eternity itself? In this eternity the holy angels are inebriated with the wine of wisdom, while seeing God himself face to face, they are satisfied with every spiritual delight. The holy mind, if it is led in by the bridegroom (all temporal things having been set aside), enters this cellar, in which it tastes of those angelic delights as much as is granted to it. And because it is still held in a corruptible body, it does not perfectly satisfy itself; yet from that small amount which it takes in passing, it considers how much it ought to love what it loves. The wine cellar can also, however, be understood as a figure of divine Scripture. For through it, charity is ordered in the bride, because in its teaching it is clearly learned how God and neighbor are to be loved in proper order.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
