[[commentary]]
quote='''
By the holes of the rock, moreover, I would gladly understand the wounds of the hands and feet of Christ hanging on the cross. And the cavity of the wall I would interpret in the same sense as the wound in his side made by the lance. And rightly is the dove said to be in the holes of the rock and in the cavity of the wall, because while it imitates the patience of Christ in the remembrance of the cross, while it recalls those very wounds to memory for the sake of example, just as a dove in the holes of a rock, so the simple soul finds in the wounds the nourishment by which it grows strong. Nevertheless, by the holes of the rock can be signified the mysteries of Christ's incarnation, and by the cavity of the wall can be figured the very protection of angelic guardianship.

For what do we understand by the face, except the faith by which we are known by God? And what do we understand by the voice, except preaching? But the bridegroom commands the bride to show him her face, because whoever says he has faith must necessarily exercise himself in good works, so that through outward works the interior faith may become known. But it is also necessary that the voice of preaching follow the works, because whoever expands himself in holy works, it follows that he should exhort all his neighbors to do the same. Therefore it follows: 'For your voice is sweet, and your face is beautiful.' For the voice pleases and the face is made beautiful when preaching accompanies works, and in turn good works accompany preaching.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
