[[commentary]]
quote='''
She leads the one she has seized into the house of her mother, because the Synagogue at the end of the world will preach Christ, in whom she believes; and when he has been received through the preaching of the Church, there he will teach the Church: because she will rejoice to be taught, when she sees the Synagogue, now made the same body, being instructed together with her. The Church will give a cup seasoned with wine, because she will preach to the Synagogue itself the New Testament together with the Old; and she will season the cup, as it were, with wine, because she will surround the sweetness of the Gospel with the testimonies of the Law, which is harsh, so that it may be held more firmly. She will offer the juice of her pomegranates, because she will set forth the examples of brave men who maintained the unity of the Church even in martyrdom, so that the Synagogue may be set ablaze in their likeness, and, strengthened by the examples of preceding martyrs, may not succumb to the persecutions of the Antichrist. For when she has heard the victories of brave fighters, she will not hesitate to enter the fight in imitation of them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
