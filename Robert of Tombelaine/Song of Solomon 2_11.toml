[[commentary]]
quote='''
What is to be understood by winter, if not the austerity of the law? Which, while it held the ancient people in carnal sacrifices, did not help its observers to seek spiritual and heavenly things. We can also understand by winter the present life, which, while it assails us with constant temptations, compels us to grow sluggish in following Christ, as if by relentless rains. But let the bride now arise, because the winter has passed, since the more the last day presses near, the more the present life recedes, and the more time is drawn toward its end, the more quickly one must run, lest the chosen soul be deprived of the eternal gifts offered to it. For it is said to have "passed" because it is not doubted that it is about to pass away shortly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
