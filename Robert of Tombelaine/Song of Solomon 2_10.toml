[[commentary]]
quote='''
On account of faith, Christ calls his bride his friend; a dove on account of simplicity; beautiful on account of her works. For since without faith we cannot please God, rightly through faith we are called friends, because while by faith we seek heavenly things, having cast aside earthly things, we cling to God. The soul is rightly called a dove on account of simplicity, because while it searches for the simple God with simplicity of heart, it by no means pursues in dissoluteness the foolish joy of the world, but always hastening toward eternal things, it lovingly imitates the groaning of the dove. The soul is rightly called beautiful on account of her works, because while she redeems the sins of her past life through good works, she hides, as it were, her former ugliness by assuming a better form before the eyes of the Bridegroom. Therefore the Bridegroom exhorts her to arise and come, because it is fitting that whoever hastens to the love of Christ should cast off the sluggishness of the flesh as much as he can, and gird himself quickly to attain eternal things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
