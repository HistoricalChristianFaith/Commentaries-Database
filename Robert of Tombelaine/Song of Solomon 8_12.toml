[[commentary]]
quote='''
His vineyard stands before him, because, the wicked farmers having been destroyed, he instructs the holy Church through good teachers with a benign regard.

Who are these peaceful ones who are said to be a thousand and two hundred, unless those aforementioned silver coins, which when we perfectly let go of them, we acquire peace for ourselves with the saints through their distribution? Hence also in the Gospel the Lord says: "Make friends for yourselves from the mammon of iniquity, so that when you fail, they may receive you into eternal tabernacles" (Luke 16:9). But what do we understand by two hundred, unless the double recompense which we acquire when we perfectly despise them in this world for Christ's sake? Therefore a thousand and two hundred silver coins belong to the Church, because when all the faithful completely relinquish everything they possess, they both make peace for themselves with the saints and receive the reward of the present life together with the heavenly one. And this is what the Lord says in the Gospel: "Amen, amen, I say to you, there is no one who has left house, or brothers, or sisters, or father, or mother, or children, or fields, for my sake and for the sake of the Gospel, who will not receive a hundredfold now in this time — houses, and brothers, and sisters, and mothers, and children, and fields, with persecutions — and in the age to come, eternal life" (Mark 10:29-30). But for whom is this reward so doubled, unless for those who guard its fruits? And who are those who guard the fruits of the vineyard, unless those who persevere in the holy work they have begun? For a work that is begun with holy desire, if it is not held by steadfastness of mind all the way to the end, is rendered without fruit, because it is prematurely emptied of that from which it had proceeded. And therefore the Lord says in the Gospel: "He who perseveres to the end, he will be saved" (Matthew 10:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
