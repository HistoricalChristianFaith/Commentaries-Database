[[commentary]]
quote='''
What is understood by the mandrake, namely a medicinal and fragrant herb, if not the virtue of the perfect? By this virtue, whenever the perfect heal the infirmities of the imperfect, they are proven to be true physicians in the faith which they preach, that is, at the gates of the Church. When they bestow examples of good works all around through holy fame, they sprinkle, as it were, a fragrance by which the sick may be healed.

Here by "fruits," the meanings of the Holy Scriptures are understood; which, as they come down to us from the holy Fathers and are believed, rise up like fruits from trees, by which souls are delighted. Therefore the Bride keeps all fruits, new and old, for her Beloved; because the catholic Church so receives the New Testament that she does not reject the Old: she so venerates the Old that she always understands the New spiritually within those carnal sacrifices themselves; rejoicing, that is, that Christ has come in the New, while in the Old always expecting him who was to come.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
