[[commentary]]
quote='''
Deer and goats are said to be clean animals in the law. What then do we understand by deer and goats, if not faith, hope, and charity? While we keep these clean within ourselves, through them we ascend the high mountains of contemplation. But the holy soul, the bride of Christ, desires to rest from all the disturbances of the world; she longs to sleep in holy leisure in the bosom of the bridegroom, with earthly desires lulled to rest, so that she sometimes even disdains necessary conversations, and rejoices in the conversation of the bridegroom alone all the more serenely the more quietly it takes place. But the carnal ones who are in the Church sometimes rudely awaken her as she sleeps; they desire to entangle her in the affairs of the world, because they consider her life useless when they see her abstaining from their cares. Such people are quite fittingly called not sons but daughters, because while they nurture effeminate habits, having lost manly dignity, what they are inwardly is outwardly designated by a feminine name. These are forbidden under the weight of an oath to awaken the beloved, lest they disturb the mind that girds itself to be free for God and longs to cling to spiritual pursuits alone with importunate anxieties, and cloud the eye of her heart with the darkness of earthly cares. And yet not all care for her neighbor is forbidden to her, but when she ought to be awakened is left to her own will, because indeed every perfect soul must discern both when to devote herself to heavenly contemplation and when to serve the needs of her neighbors.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
