[[commentary]]
quote='''
Since it is written: "No one lives without sin, not even an infant whose life is of one day upon the earth" (Job 24:4, according to the Septuagint), what does it mean that the bride is said to be entirely beautiful, in whom no blemish is found? For elsewhere it is written: "The stars are not pure in his sight" (Job 25:5). And elsewhere: "In many things we all offend" (James 3:2). And the apostle John says: "If we say that we have no sin, the truth is not in us" (1 John 1:8). And likewise: "If we say that we do not sin, we lie, and do not practice the truth" (ibid. 6). But when the holy soul cleanses itself from daily sins through repentance, when it daily washes away minor sins with tears and guards itself from greater ones, although it sins frequently, nevertheless through constant repentance it continually preserves its purity. For this reason it is commanded elsewhere: "Let your garments always be white" (Ecclesiastes 9:8). And that saying: "The just man lives by faith" (Romans 1:17). For although as soon as he sins he strays from justice, yet since he always believes in him who justifies the ungodly, and continually bewails his sins under that faith, through constant washings he retains his righteousness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
