[[commentary]]
quote='''
By the tender and budding flowers, the beginning faithful are designated, but by the apples, the perfect faithful. For the Bride, because she languishes with love, desires to be supported with flowers and surrounded with apples, because while she afflicts herself with longing for eternity, while she seeks with total anxiety how she might arrive there, but does not at all find the arrival while she lives in the flesh, she rests, wearied in her desire, and rejoices in this alone: if she sees around her those by whom she herself, or in whose perfection, she might perceive consolation for her languishing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
