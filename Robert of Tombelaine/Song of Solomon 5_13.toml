[[commentary]]
quote='''
If preachers are designated by the eyes, fittingly by the cheeks are figured those in the Church who are reported to have ended their lives by martyrdom in the Church. For while they do not hesitate to pour out their blood for the faith of Christ, they redden like cheeks on the face of the Bridegroom. Through them indeed the beauty of the Christian faith is made public: because they show toward how great a reward of faith they press forward, when they die for it. These are rightly said to be like beds of aromatic spices: because while the elect are tested by martyrdom in the steadfastness of faith, they are spread abroad through the cultivation of virtues and the fame of holy reputation, as if by the fragrance of spices. But the beds of spices are planted by perfumers; because the holy martyrs are both strengthened in their confession by the preachers who preceded them, and are brought forward by those who follow as an example of imitation to the peoples. By those who went before, the perfumes of virtues are cultivated; by those who follow, the perfumes of examples are taken up.

For what do we understand by the lips of the Bridegroom, if not those very ones whom we call the preachers of Christ? Who, while they preach the deaths of the martyrs to the peoples, distill as it were myrrh as a seasoning for the mortification of the flesh. This myrrh is rightly said to be the first, because no one is so mortified as he who is ended by martyrdom for Christ. For he said "first" not with respect to time, but with respect to dignity. What does it mean that the lips of the Bridegroom are said to be lilies, except that those through whom Christ speaks must necessarily be pure, and through them a good fragrance is spread? Among whom was the apostle Paul, who said: "We are a good fragrance to God in every place, both among those who perish and among those who are being saved" (II Cor. 2:15). But it should be noted that whatever of justice and fortitude is found in the Church is drawn from Christ himself through the examples of his works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
