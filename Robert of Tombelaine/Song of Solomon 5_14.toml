[[commentary]]
quote='''
For what is designated by the hands of Christ, if not the holy works which He performed in the world, and which are set before us for imitation? For He Himself says: "He who loves me, let him follow me" (John 12:26). And the Apostle: "He who says he abides in Christ ought to walk just as He walked" (1 John 2:6). His hands are said to be turned on a lathe, because His holy works, without the imposition of any iniquity, proceeded on every side in justice. For what is turned on a lathe revolves in its roundness without obstruction. So the works of Christ revolved in the roundness of rectitude, because no fault clung to Him that might prevent His justice from being carried through in its fullness. His hands are also said to be golden, because whatever He outwardly performed among men was inwardly ordered in the beauty of His divinity. The hands of the Bridegroom are also said to be full of hyacinths, because whoever imitates His works with a devout heart is enriched in recompense with the gifts of eternal happiness. Whence the same Redeemer says: "He who serves me, let him follow me; and where I am, there also shall my servant be" (John 12:26).

What is signified by the belly, if not mortality? And what by ivory, if not incorruption? For ivory is regarded as a very durable bone, and is taken up for the adornments of kings. Therefore the belly of Christ is rightly said to be ivory, because the mortality of Christ is brought through to immortality, since through the resurrection he is established in eternal life unto the glory of his Father, namely the eternal King. Of whom it is said: "Christ, rising from the dead, now dies no more; death shall no longer have dominion over him" (Rom. 6:9). He is truly taken up as an adornment of kings, because whoever is proven to be king and lord of his own flesh is adorned by the very mortality and resurrection of Christ, by love of knowledge and hope of immortality. Whence it is said elsewhere: "Let him who boasts, boast in the Lord" (1 Cor. 1:31). But the belly is said to be set apart with sapphires, because in our corruption which he bore, he wove heavenly works into our sufferings through the miracles he performed. For the sapphire, which bears an airy color, fittingly signifies the heavenly deeds that were displayed in his miracles. And the belly of Christ is distinguished with sapphires, because while he worked divine miracles amid the sufferings of the flesh, corruption was, as it were, varied by incorruption. By this dispensation the apostles were instructed in the faith and stood firm and strong for enduring sufferings.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
