[[commentary]]
quote='''
What does holy Church send forth, if not holy words together with holy works, by which she begets and nourishes her children? When she leads some all the way to martyrdom and instructs others in holy conduct — sending the former, red with the blood of martyrdom, to the eternal homeland, while presenting the latter, living in holy works, to their neighbors as an example of holiness — what else does she send forth but pomegranates and the fruits of fruit trees? For pomegranates contain a multitude of seeds beneath a red rind, while the fruits of fruit trees hold within themselves the sweetness of refreshment. Just so, when martyrs labor under the fire of tribulation, when they do not hesitate to pour out their blood outwardly for Christ, they gather inwardly within their minds a multitude of virtues. Likewise, all the saints who live in the peace of the Church bear the fruits of fruit trees, because when they do holy works, they provide examples to their neighbors, by the display of which those who wish may refresh themselves. For however many saints there are in the Church, whether they burn with the fire of suffering or grow up quietly in the peace of the Church, they do not cease, while they live, to build up within themselves the fragrance of holy virtues like a paradise of sweetness and delights. Scripture reveals the abundance of this paradise when, under the voice of the bridegroom, it designates various virtues by the names of trees.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
