[[commentary]]
quote='''
The head of Christ is God. This head is rightly called gold, because in comparison with the Creator every creature is reckoned a most worthless thing (1 Cor. 11). His locks are like clusters of palm branches, black as a raven. What do we understand by the locks of Christ, if not all the faithful? For while they guard the faith of the Trinity in their mind, and cleaving to God, do what they believe, they confer honor upon the one who bears them, as though hanging from his head. Moreover, the palm tree greatly thrives by ascending on high, and by its symbolism it signifies victory. Therefore his locks are like clusters of palm branches, because all the elect, while they always raise themselves to the heights of virtues, through the grace of God at length bring themselves to victory. Yet they are black as a raven, because however much they raise themselves by virtues, they always nevertheless recognize themselves to be sinners.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
