[[commentary]]
quote='''
Because we have explained these things above (Chapter 2, n. 35), as best we could, we now avoid repeating the same things for the sake of preserving brevity. But because there is added 'Apart from what lies hidden within', we must briefly consider how it is connected with what precedes. The bride is therefore beautiful, and her eyes are those of doves, apart from what lies hidden within, because whatever she does in outward things is very honorable: that she lives simply among people, that she disdains to desire the things she sees in this temporal world, and if anything in this world nevertheless pleases her, she abhors going after her desires. But it is far more beautiful and honorable that she strives to keep the desire of her heart unstained, that she holds in her mind the brightness of eternal blessedness and gazes upon it with uplifted contemplation, that in those things which she sees within she sweetly rests and is purified.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'

[[commentary]]
quote='''
If by the eyes the preachers of the Church are designated, because they show the way to the rest, then by the hair the peoples are fittingly signified, because they bestow adornment upon the same Church. The hair of the bride is therefore said to be like a flock of goats, because the peoples of the Church, while ruminating on the precepts of the law and contemplating heavenly things by faith, are clean animals and graze on the heights. Now Gilead is interpreted as "heap of testimony." And what do we understand by a heap of testimony, if not the multitude of martyrs? For while they held the faith of Christ unconquerably, we know that they bore testimony to the truth even through their own death. And so that flock of goats ascends from Mount Gilead, because the people of the Church raise themselves by faith toward eternal things all the more, the more firmly they have known that the holy martyrs bore testimony to that same faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
