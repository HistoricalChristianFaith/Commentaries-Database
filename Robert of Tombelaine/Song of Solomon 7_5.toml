[[commentary]]
quote='''
The head of the Church is Christ, who is fittingly called Carmel, because through the passion He endured, He was exalted to the glory of the Father. Of Him it is written: "And in the last days the mountain of the house of the Lord shall be prepared on the top of the mountains" (Isa. 2:2). On Carmel, Elijah praying obtained rain (1 Kings 18), and we praying on Carmel obtain rain, when believing in Christ we desire Christ and receive from the Father the watering of grace for which we ask. In the moral sense, however, the head of the bride is called the mind, because just as the members are governed by the head, so all our thoughts are directed by the mind. Now Carmel is interpreted as "knowledge of circumcision." Therefore the head of the bride is said to be like Carmel, because every holy mind knows how to be worthily circumcised: it knows that whatever is done in the body is nothing if the mind has been unclean; and if it is made into a temple of Christ, it is inhabited by Him. Because the Pharisees did not do this, blessed Stephen said to those who were killing him: "You stiff-necked and uncircumcised in heart and ears, you always resist the Holy Spirit" (Acts 7:51). Now the hair of his head is said to be like the purple of a king bound to channels. For purple is tied by bundles in channels, over which when water is poured, it runs through the channels to the garment placed beneath, so that the garment may be dyed; and from this it receives its name, so that what is dyed with purple color is called purple. All of these things correspond to the holy mind, if they are understood. For the hairs of the head are the thoughts of the mind, which are bound in channels, because they are restrained in the divine Scriptures lest they flow uselessly. Water is poured over them, which dyes the royal garment, because in the thoughts of the holy mind, heavenly grace is received and composes the whole soul into a heavenly ornament, so that the whole soul may burn with desire for eternal life and long to go to the eternal Bridegroom even through the blood of martyrdom. For Paul says of the whole Church: "Who presented to Himself the Church, a garment without spot or wrinkle" (Eph. 5:27). And of each of the Church's faithful it is said: "You shall clothe yourself with all these as with an ornament" (Isa. 49:18). Thus rejoicing over the bride made dyed, thus beautiful, thus made purple, the Bridegroom speaks.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
