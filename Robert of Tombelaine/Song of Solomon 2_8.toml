[[commentary]]
quote='''
As if she were saying: I recognize this to be the voice of my beloved spouse; I desire always to hear this from his mouth, because in this I see how much he loves me, since he forbids anything to hinder me from his desirable embraces. How she arrived at these embraces she suddenly narrates, saying: Behold, he comes leaping upon the mountains, bounding over the hills. Christ, arranging to come to the embraces of his bride, graciously assumed our humanity. To accomplish this mystery, he came as if leaping upon the mountains, because he displayed certain works among men which the human race, perceiving them to be exceedingly sublime and beyond human capacity, could admire but could not attain. For he was born of a virgin; an angel urged the shepherds to go and adore the crying infant; a star led the magi; hanging on the cross, he gave up his spirit at the hour he willed; dead, he raised himself on the third day; entering heaven, he bestowed the Holy Spirit on those whom he pleased; through fishermen and unlettered men he subjected the world to his faith — doing these things, he walked as it were upon the mountains, where no creature was able to follow him. In these works, indeed, he bounded over the hills, because he transcended all the saints, however much they may have grown, by the power of his working.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
