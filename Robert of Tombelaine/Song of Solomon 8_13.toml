[[commentary]]
quote='''
The bride dwells in the gardens, because the holy Church, or any holy soul, turns its mind to the fruitfulness of virtues. The bridegroom desires to hear her voice, because it pleases Christ above all that every perfect man should admonish the weak with the word of holy preaching. For the friends listen, because the faithful in the Church await with pious desire that the friend of the bridegroom may speak. And it should be noted that it is a friend who listens; because he who loves God with an undivided mind gladly hears one preaching what he loves. Whence it is said in the Gospel: "He who is of God hears the words of God" (John 8:47). But because while the Church preaches the truth, many do not understand, and many who do perceive it distort it with a perverse understanding; therefore the bride, in response to the one urging her to preach, answers and says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
