[[commentary]]
quote='''
The Synagogue, therefore, having been brought to the faith, beholds the mind of the Church through the works she sees, and greatly admiring her sublimity, says: "Who is this that cometh out of the wilderness like pillars of smoke, perfumed with myrrh and frankincense, with all powders of the merchant?" Therefore in the desert, that is, in this world, the Church, or every holy soul, lives while, exiled from the kingdom, it dwells among beasts, namely demons. For here, although she is not entirely abandoned by the bridegroom, nevertheless while she is in the flesh, she is not yet admitted to the certain vision of him; while she wanders from him through exiles and temptations, because while she does not yet reign with him, she seems to herself to be abandoned by him. On this account she always labors to ascend, so that she may sense him whom she greatly loves more and more, so that since she does not perfectly possess him in the desert, she may at least refresh herself in the very desire for him, so that thus strengthened on the way, she may at some time arrive at that which she has long desired. For there are some who, while they disdain all visible things, raise their minds to heavenly things, and because they see nothing among lowly things that might be sweet to them, turn their whole heart to things above. These strip themselves of all evil habits, despise the wealth of the world along with its desires, reach out in hope toward invisible things, and the greater the desire with which they cling to those things, the more and more painfully they bear the corruption they possess. These indeed ascend through the desert, because while they live in this world among temptations, the more they fear being abandoned while they remain here, the more strongly indeed they abandon these things, and the more fervently they advance toward those things in which, once they have arrived, they will no longer fear anything that might remove them. But fittingly they are said to ascend like a column of smoke, because they are said to possess both the fragrance of good reputation and subtlety of mind. This smoke, however, is not said to be of just any substances, but is declared to come from the spices of myrrh and frankincense and every powder of the perfumer. For with myrrh the bodies of the dead are embalmed lest they decay, while frankincense is burned so that it may give off fragrance. By myrrh, therefore, the mortification of the flesh is signified; by frankincense, the purity of prayers is understood. The holy soul, therefore, while it mortifies its flesh from the decay of vices, while it renounces all the pleasures of the world through continence, as it were applies myrrh to the body that will die, so that after the judgment it may remain whole from eternal corruption. But when it kindles itself toward heavenly things with greater desire, and fervently casts out from the chamber of the heart all superfluous thoughts, it makes its heart, as it were, a censer before God. In this, while it gathers virtues through love, it arranges, as it were, coals in the censer, in which the mind may set itself aflame in the sight of God with the fire of charity. And while it sends forth fervent and pure prayers to God, it draws out, as it were, the smoke of spices from the censer, so that it may smell sweetly before the beloved, and may not cease to stir up all its neighbors to love of him through good examples. But it should be noted that it does not say "of every perfume," but "of every powder of the perfumer." For we make perfumes when we gather virtues in the heart. But when we more carefully examine our very virtues through each and every work, lest anything in our works remain unrefined, lest a vice lie hidden among the virtues, then without doubt we grind the ointments of virtues, as it were, into powder, so that our works may be the purer, the more carefully we do not cease to distinguish them from every encroachment of vices. Minds of this kind make themselves delightful to their beloved through his grace, and while they separate themselves from all worldly noise, they prepare within themselves a place in which the bridegroom may rest. Concerning this rest, it is added:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
