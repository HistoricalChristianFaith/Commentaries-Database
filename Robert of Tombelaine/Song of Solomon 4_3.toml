[[commentary]]
quote='''
These same preachers are called the lips of the Church, because through them she speaks the precepts of life to the peoples. They are fittingly compared to a ribbon, because while they restrain loose thoughts in the hearts of men by their preaching, they hold back, as it were, scattered hairs lest they spread out excessively. But what does it mean that they are compared not merely to a ribbon, but to a scarlet one, unless that by scarlet is understood the flame of charity, with which they burn, and through them others are kindled? Through them the speech of holy Church is sweetened, because while they practice what they preach, they set before men their preaching as if it were savory food.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'

[[commentary]]
quote='''
What do we understand by the cheeks of the Church, if not those same preachers who, while they stand out among the peoples so as to benefit them, appear as if visible upon the face of the Church? By the pomegranate, moreover, the Church itself is signified, because while it nourishes many peoples in the unity of faith, it binds together, as it were, many seeds under one rind. The holy preachers are therefore a piece of pomegranate, because while they afflict themselves as seeds more vigorously than others in divine service, while they despise all worldly things, while they deny their own pleasures and utterly mortify their vices, and elevate others, and while they nourish others through their examples, they offer themselves as food, as if broken open and laid bare. But although the things that appear outwardly are great, they nevertheless retain greater things in secret, which the divine eyes alone see. Therefore it is added: Apart from what lies hidden within.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
