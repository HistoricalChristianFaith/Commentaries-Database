[[commentary]]
quote='''
What do we understand by the mountain of myrrh, if not the strong height of mortification in work, and what by the hill of frankincense, if not the lofty humility in prayer? The bridegroom therefore goes to the mountain of myrrh and to the hill of frankincense, because he intimately visits those whom he perceives to be advancing to great heights through the mortification of vices and to be giving off a sweet fragrance through pure and humble prayers. For by these virtues the holy Church, or each individual soul, is made clean, because while she struggles against vices through the mortification of pleasures, and is frequently washed with tears through holy prayers, she cleanses away her stains so that she may please the bridegroom, before whom she strives to appear beautiful. The bridegroom through his grace brings her striving to its fulfillment, and kindly praises his own work in the bride.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
