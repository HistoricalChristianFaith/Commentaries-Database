[[commentary]]
quote='''
For Lebanon is interpreted as "whitening." What then is understood by Lebanon if not baptism, in which holy Church is washed with water and is whitened from the blackness of sins through the Holy Spirit whom she receives and through faith in Christ? Whence it is written: "You will sprinkle me, Lord, with hyssop, and I shall be cleansed" (Psalm 50:9). From Lebanon, therefore, holy Church comes to the crown, because in Christ's baptism she receives faith, under which by Christ's grace she merits to be able to receive the reward. But what does it mean that "Come" is said three times, unless that whatever she works subsists in faith and in hope and in charity, so that fortified by these three virtues she may have the strength by which she does not grow weary on the way? For concerning faith it is said: "Cleansing their hearts by faith" (Acts 15:9). And again: "Without faith it is impossible to please God" (Hebrews 11:6). Concerning hope it is said: "None who hope in you, Lord, shall be confounded. For who has hoped in you and been forsaken?" (Sirach 2:11–12). Concerning charity it is said: "Charity covers a multitude of sins" (1 Peter 4:8). And again: "If I distribute all my goods to feed the poor, and if I hand over my body so that I burn, but have not charity, I am nothing" (1 Corinthians 13:3). And the apostle John: "God is charity" (1 John 4:16). However, it can also be understood in another way that "Come" is said three times. For the holy bride comes to Christ while living in this world she works whatever good she can. She comes when at the hour of death the soul, that is the bride herself, is stripped from the flesh. She comes a third time when on the day of the last judgment she takes up the flesh again and enters the heavenly bridal chamber with Christ. There indeed she obtains the rewards of all her labors; there, with her enemies now utterly cast down and shut out, she is gloriously crowned. And therefore here it is said to her by way of promise: "You shall be crowned from the top of Amana, from the summit of Senir and Hermon, from the dens of lions, from the mountains of leopards."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'

[[commentary]]
quote='''
What is understood by Amana, Sanir, and Hermon, namely the names of mountains, if not the powerful of this age? The wealthier they are, the more exalted and stronger they appear to be among the weak. But from these mountains holy Church is crowned, because while she preaches the eternal kingdom, while by her own example she demonstrates that all things of the world are worthless, she bends even the powerful themselves to repentance, and prepares for herself a crown in the heavens for seeking them out. Thus indeed it happens that the humble cast down the proud, and the weak bring low the exalted. Therefore it is written: "Every valley shall be filled, and every mountain and hill shall be brought low" (Isa. 40:4). But what does it mean that she is said to be crowned not only from the mountains but also from the peaks of the mountains, except what we see fulfilled — that already the most exalted persons themselves believe in Christ and obey His precepts through the preaching of the Church? For kings and emperors serve Christ, lay down their crowns, and through repentance seek pardon in the Church. If therefore by the peaks of the mountains we understand the highest persons, rightly by the dens of lions and the mountains of leopards are designated the various princes and ministers who serve cruelty and deceive by their cunning those whom they cannot harm by force. Leopards indeed always carry spots on their skin — by whom are signified any other than hypocrites or the quarrelsome? For in those who pursue credulity, demons recline as lions. In those, however, they build mountains as leopards, whom, while they permit them to mix certain virtues with their vices, they compel to seek the glory of praise for all their good deeds. These therefore truly imitate the variety of leopards, because while they pursue vices along with virtues, they are divided as if by dissimilarity of color on a mottled hide. But from the dens of lions and from the mountains of leopards the Church is crowned, because while through her preaching both the cruel are converted to piety and hypocrites to the unity of a humble life, for all these she will receive the reward she deserves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
