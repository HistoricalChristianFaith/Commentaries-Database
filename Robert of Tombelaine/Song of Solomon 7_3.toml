[[commentary]]
quote='''
The two breasts are two peoples: because while they always live in fraternal love, they nourish one another with the milk of piety in charity. They are fittingly called two fawns, twins of a gazelle: because while begotten in faith through the preaching of the Synagogue, they are nourished in its Scriptures, directing themselves toward the hope of eternity, they feed in harmony as if upon the mountains.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
