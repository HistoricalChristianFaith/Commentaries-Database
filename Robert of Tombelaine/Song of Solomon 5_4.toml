[[commentary]]
quote='''
The beloved sends his hand to the bride through the opening so that she may arise, when through subtle understanding he makes manifest to her by inspiring how great is the power of divine operation: namely, that he is able to save even amid dangers; that even in peace no one is saved except through him; that he does not abandon those hoping in him in the tumult of battle. At his touch the belly of the bride trembles: because the more the holy soul feels the divine power presently through interior visitation, the more strictly she judges whatever carnal thing she discovers in herself. For the greater the charity with which she burns for him whom she desires in her mind, the more timidly she submits herself to him, and the more she fears lest the bridegroom find something in her on account of which he would wish to dismiss her from himself. Therefore, obedient to the bridegroom, she prepares herself for labor; so that just as she appears familiar to the bridegroom in rest, so also she may appear devoutly serving in labor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
