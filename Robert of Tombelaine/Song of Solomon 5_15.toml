[[commentary]]
quote='''
For by the legs we understand the apostles, through whom he went around the entire world, and as they preached the faith, he scattered it among the peoples who heard. To whom he himself says in the Gospel: "Go into all the world, and preach the Gospel to every creature" (Mark 16:15). But the legs are said to be marble columns, because they support the Church unbendingly, while she is strengthened against all adversaries by their preaching and examples. Moreover, the columns are founded upon golden bases; because from the sayings of the prophets, so that they might stand strong, they received the faith whole and entire. Whence the first of the apostles himself says: "We have the more sure prophetic word, to which you do well to attend as to a lamp burning in a dark place" (2 Peter 1:19). For they are called golden because they are known to shine with the light of wisdom.

Lebanon indeed is a mountain on which very tall and fragrant trees grow. Moreover, Lebanon is interpreted as "whitening" or "making bright." And concerning Christ the apostle Paul says: "He himself was made for us by God wisdom and sanctification and righteousness" (1 Cor. 1:30). Rightly therefore his appearance is like that of Lebanon, because through him we who believe are made white; if we cling to him by our roots, we are made lofty. From his grace we also receive whatever fragrance of good reputation we may have. He is also said to be chosen like the cedars, because the Father speaks of him: "Behold my servant whom I have chosen, my beloved, in whom my soul is well pleased" (Isa. 42:1). Now the cedar is a very tall tree, fragrant and incorruptible. But Christ is loftier than the cedars, because although he is man, he does not cease to be God. Of whom it is said through Isaiah: "And he shall be very exalted" (Isa. 52:14). Christ is also more fragrant than all others, because he himself says of himself: "I am the flower of the field and the lily of the valleys" (Song 2:1). And through the bride it is said to him: "We will run after the fragrance of your ointments" (Song 1:3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
