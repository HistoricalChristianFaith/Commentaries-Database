[[commentary]]
quote='''
By the foxes, heretics are designated; by the vineyards, individual Churches. But the foxes destroy the vineyards, because through heretics the Churches are dried up from the greenness of right faith. They are rightly called "little," because although they are inwardly puffed up against the truth, outwardly they pursue humility in their words through pretense. They are then caught by holy preachers when, in the course of disputation, they are refuted by the judgments of truth. Indeed, holy preachers are sometimes called dogs by way of comparison, because through their constant preaching, as if by relentless barking, they strive to drive all adversaries away from the flock of sheep. These dogs catch the foxes for Christ, because while they faithfully love their leader, laboring for love of him, they lead the evasive heretics out from the entanglements of their questions, as if from dark dens into the light of truth. The reason the destruction wrought by the foxes is to be feared is made clear when it says: 'For our vineyard has flourished.' The vineyard has indeed flourished, because the holy Church through baptism has brought her children to a new manner of life in the faith. For these there is reason to fear lest they be corrupted by heretics, because when any believers are regenerated into the newness of Christ, the more tender each one is, the more quickly he is seduced into error. There is every reason to fear for the blossoms, lest they perish, because while anyone has not yet grown strong toward perfection through long practice, if he is bitten by a venomous tooth, he easily fades from what he had attained. For every perfected soul does not easily lose what it has long exercised itself in, because the more frequently it has tasted with its innermost palate how sweet the Lord is, the more steadfastly it holds to the righteousness of the bridegroom and spurns what is crooked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
