[[commentary]]
quote='''
But because the holy Church in her children is so joined to Christ by faith, sustained by hope, and bound together by charity, that she loves nothing apart from Christ, and holds him inseparably close to herself through faith and love, she therefore adds: "I am my Beloved's, and my Beloved is mine, who feeds among the lilies."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 6'
