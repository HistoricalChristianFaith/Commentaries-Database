[[commentary]]
quote='''
Christ calls the Church His sister, because He said of the apostles themselves: "Go, tell My brothers" (Matt. 28:10). But the little sister did not have breasts when the Church existed only in the apostles, in whom she could not nourish herself or others with the milk of preaching (Matt. 26). For what would Peter preach to others, when he denied being a disciple of Christ with cursing and swearing at the voice of a single servant girl (John 20)? The Church, therefore, being small, did not have breasts, because after the resurrection, shut up in one house (Acts 1), she feared not only to preach among her persecutors, but even to be seen. Consequently, therefore, it is said: "What shall we do for our sister in the day when she is to be spoken to?" Christ spoke to His sister when He sent the Holy Spirit upon the apostles (Acts 2), and speaking to them inwardly, He taught them all the languages of the world through a manifold distribution. But from whom should He be understood to ask this—He who knows all things—if not from the holy fathers, whom He stirred up to inquire by the Holy Spirit? To them, by the same Spirit by which He led them into the question, He immediately responds fittingly and says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
