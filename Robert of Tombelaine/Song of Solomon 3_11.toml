[[commentary]]
quote='''
The blessed Mary, Mother of Christ, is believed to be she who crowned him with a diadem, because he himself assumed our humanity from her, as is recounted in the Gospel (Matt. 1). And this is said to have taken place on the day of his betrothal and on the day of the gladness of his heart, because when the only-begotten Son of God wished to unite his divinity to our humanity, when by his good will he was pleased to take his Church to himself at the appointed time, then with the exultation of love he willed to take on our flesh from the Virgin Mother. Living in her with sufferings for a time, he rejoiced exceedingly over our redemption. But since a diadem is assumed for glory, while in the taking on of humanity not glory but humility of the Word of God is recognized, how is he said to have been crowned with our humanity as with a diadem? Yet since his very incarnation was truly our glory—because we are his members through the communion of the body—Scripture rightly foretold the diadem of the members upon the head. Here, therefore, because he is praised by the bride, he in turn deigns to praise the bride, saying:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
