[[commentary]]
quote='''
For the holy martyrs burned vigorously with charity, because they blazed wondrously in the love of God and neighbor. Many waters could not extinguish this charity, because however great the tribulations that befell them, they were unable to change them to hatred. This indeed would be to extinguish charity: if through the tribulations they inflicted, they could have brought them low into hatred of God or neighbor. But since waters have been mentioned, what again is understood by rivers, if not the increase and vigor of the waters themselves? For we know that rivers are usually called living waters. Therefore we take rivers as the greatest tribulations, which, while they boiled over upon the martyrs throughout the whole world, rushed together with great force to extinguish the fire of charity. But because charity lives so powerfully amid the rivers that it would rather consume the rivers than allow itself to be extinguished by them, therefore many even of the persecutors converted themselves to that same charity, so that they gave up whatever they possessed in the world and gave themselves over to the death which they had previously cruelly inflicted upon those who suffered.

God is not loved when there is desire for earthly substance, because earthly love soils the eye of the heart, so that the divine brightness cannot be seen. Against this it is said in the Gospel: Blessed are the pure in heart, for they shall see God (Matt. 5:8). And the apostle John says: If anyone loves the world, the love of the Father is not in him (1 John 2:15). Nor is it surprising, for how can one love him whom one does not know? Or how can one know him, when one closes the eye of the heart to knowing him? But a man gives all the substance of his house for love when he distributes whatever he possesses in the world for Christ's sake; so that, casting aside what hinders, he may love God, and with the dust of anxieties wiped away, may open his eyes to see. And when he has given all his substance, he regards it as though it were nothing, because after he has wiped clean the eye and beheld God, in the vision of him he counts whatever he had possessed as nothing. The apostles did this, who abandoned not only what they possessed but even what they desired, in order to follow Christ. To them Christ himself, for whom they had left all things, said: When you have done all the things that are commanded you, say: We are unprofitable servants; we have done what we were obliged to do (Luke 17:10). But since, once earthly substance has been cast aside, one does not immediately ascend to perfection—because after possessions have been renounced, there still remains the labor of denying one's very self—so that one may advance by degrees and at some point, made perfect, draw not only oneself but also others along to life, therefore concerning the new and still tender Church, or each individual soul, it is said next:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
