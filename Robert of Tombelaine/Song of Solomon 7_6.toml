[[commentary]]
quote='''
It should be noted that she is called "most dear" in delights, because no one arrives at the love and intimacy of Christ who does not strive to abound in the delights of Holy Scripture. For thus it is said: 'For whosoever hath, to him shall be given, and he shall have more abundance: but whosoever hath not, from him shall be taken away even that he hath' (Matt. 13:12). For whoever abounds in these delights is refreshed; and being refreshed by them, is continually prepared to receive greater things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
