[[commentary]]
quote='''
The holy soul makes a bed for itself through the nights, when, fleeing all the disturbances of the world, it prepares a secret place in which it rests. In this bed it seeks the one it loves, because while it is free from all the anxieties of the world, it does not rest in its search for how it might reach him. It should be noted, moreover, that the one who now lives in this world seeks through the nights, and perfectly shakes off from itself the darkness of temporality. The more heavily it suffers these darknesses, the more fervently it seeks him, upon finding whom it will no longer suffer darkness. But because it never perfectly finds the one it seeks in this world, it therefore adds: "I sought him and did not find him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
