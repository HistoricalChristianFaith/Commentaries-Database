[[commentary]]
quote='''
We direct our eyes toward the Bridegroom when we open the gaze of the mind even a little to see the blessedness of Christ. But we are commanded to turn our eyes away, lest we suppose that, however much we see, we behold it as it truly is. For the very eyes have made him fly away; because the more he is seen, the more he is recognized to be invisible. And he flies away from us; because however slightly grasped by a flash of the mind, he reveals himself to be incomprehensibly exalted above every effort of ours. Indeed, the eyes of the mind bring it about, as it were, that he flies away; because through that small measure that is seen, he appears very far off and flying away from us, as has been said.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 6'
