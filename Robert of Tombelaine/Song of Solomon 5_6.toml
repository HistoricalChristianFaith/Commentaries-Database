[[commentary]]
quote='''
We make a bolt for the door when, through the pleasures of the flesh, we bar the entrance of the heart against the Bridegroom. But we open the bolt when, having removed fleeting pleasures, we soften our heart—which had previously been hard—into the love of Christ, and make a free entrance for the Bridegroom knocking at the door. Since this cannot happen suddenly while we live in this flesh, it remains for us to do so more and more each day. For no one, as it is written, suddenly becomes perfect. For sometimes, while we seek our Lord, placed as we are in this corruption, He seems to withdraw further from us rather than to draw near. And therefore it follows: "But He had turned aside and passed by." Now the Bridegroom touches His beloved, now He turns away: because when He sees us sluggish, He stirs us to love; but when it seems to us as we labor that He can be grasped, then lest He be grasped, He passes on and turns away. This is done by His greatest grace in us, so that namely neither do we, lying in our sluggishness, lose Him entirely, nor grow proud from what seems to us a full apprehension of Him. Yet as soon as He has withdrawn, He returns; and lest the holy soul be estranged from her Beloved for too long, He pours Himself into the longing soul by the word of His inspiration, and melts her. Whence the bride exults, saying: "My soul melted when my Beloved spoke."

She says that she melted at the word of the Bridegroom, because when Christ pours himself through his spirit into the desiring soul, he soon dissolves all hardness of heart: and sometimes he melts the mind into such great tears that it can scarcely contain that which it rejoices to contain within itself, and inwardly marvels at what it had been and what it suddenly sees itself made into. While it feels this melting, it desires to apprehend it more perfectly; and sometimes while it thinks upon this very thing, what it was just feeling it no longer feels. Whence it is stirred to seek, that it might find the same thing again; but sometimes even when it has long wearied itself, it does not find what it just now held so present.

The bride seeks the beloved, but does not find him; because the mind inspired by God continually desires to enjoy that intimate sweetness, but the corruption which it bears in this life prevents it. She calls, therefore, and no answer is given to her: because through her prayers and works she longs to be satisfied with the sweetness of his presence, but what she calls upon does not come according to her desire. It remains, therefore, that returning to herself she may know herself, and through the Holy Scriptures, aided all the more by that taste, seek her beloved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
