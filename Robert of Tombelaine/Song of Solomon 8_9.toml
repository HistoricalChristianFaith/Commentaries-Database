[[commentary]]
quote='''
When the Holy Spirit is given, the holy Church becomes a wall, because she who was previously timid, being instructed by the same almighty Spirit, is impenetrably strengthened to resist adversaries. This is shown by the same Peter, timid before a servant girl, soon firm against the rulers, to whom he said: "We ought to obey God rather than men" (Acts 5:29). And again: "Whether it is right to listen to you rather than to God, judge for yourselves; for we cannot but speak of what we have seen and heard" (Acts 4:19). And concerning the other disciples it is written: "The disciples went away rejoicing from the presence of the council, because they were counted worthy to suffer dishonor for the name of Jesus" (Acts 5:41). Behold what kind of wall the Church has become, which just now was most tender and could not bear the step of anyone walking upon it without injury to itself, but now, having received the Holy Spirit as a wonderful craftsman, despises unharmed the insults of an entire assaulting army. Upon which battlements are built, because so that she might not only defend herself but also overthrow her attackers by resisting them, she is granted the power to perform miracles, which when the enemies see them, they are terrified, fearing the weapons of her assault. These battlements are rightly said to be of silver, because the miracles themselves are given together with the preaching of the word. And because silver is a very resonant metal, the battlements are of silver, because through miracles it came about that their words grew strong throughout the whole world and spread the preaching of the faith inflexibly in every direction: which the Psalmist shows, saying: "Their sound has gone out into all the earth, and their words to the ends of the world" (Psalm 18:5).

We also say that the Church is rightly the door, which we know received from Christ himself the power of opening and closing. The door undoubtedly exists in its preachers, because through them the entrance to life opens itself to us. Whence it is also said to the first pastor of the Church: Whatever you shall bind upon earth shall be bound also in heaven; and whatever you shall loose upon earth shall be loosed also in heaven (Matt. 16:19). Or the door exists in its own head, because he himself says truthfully of himself: I am the door (John 10:7). Now the door is fastened together with cedar boards, because the holy Church, preaching the faith, is adorned with multitudes of peoples; and when peoples are sprinkled with various virtues — so that, namely, one person gives necessities to the needy from the things he possesses; another, renouncing all things, abstains even from lawful marriage; yet another advances so far that he becomes a preacher to others as well — just as a painting is beautified by many colors, so the Church is honored by many forms of devotion, and growing strong in the Holy Spirit, she joyfully responds, saying:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
