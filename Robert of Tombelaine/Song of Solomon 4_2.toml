[[commentary]]
quote='''
Just as by the eyes preachers are understood, because through them the Church is illuminated, so likewise they can be called her teeth, because through them unbelievers are consumed and little ones are nourished. Indeed, holy preachers are rightly called teeth, because when they elucidate Holy Scripture by expounding it to the lesser brethren, they chew bread, as it were, for the little ones, like mothers for their children, so that the weak may grow strong for harder fare. These are rightly said to be like a flock of shorn ewes that have come up from the washing, because when they remember that they were washed from all sins in baptism, they willingly lay down the burdens of the world, so that they may advance toward attaining and preaching heavenly things all the more freely and easily. Of these it is added: All bearing twins, and there is no barren one among them. All holy preachers bear twin offspring, because while they surpass other people in the two precepts of charity, they preach the twofold love, and in it they do not cease to beget two peoples, Jewish and Gentile. Among them none is barren, because indeed one who disdains to beget spiritual children is not to be called a preacher.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
