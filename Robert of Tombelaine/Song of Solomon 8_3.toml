[[commentary]]
quote='''
The left hand of Christ is held to be the present life, while the right hand is the blessed life. Moreover, our head is spiritually understood to be the mind. Therefore the Synagogue, now converted by the preaching of the Church, strengthened by examples, and uplifted by imitation, says: 'His left hand is under my head, and his right hand shall embrace me.' As if she were saying: since now at last I hold the faith of Christ, I experience his ineffable and desirable grace, and I feel a sweetness I did not know how to desire; now I set aside all earthly things, I even despise the very life of the flesh for love of him, and I long with all my desires to see his blessedness. For indeed, when something embraces a thing, it is understood to hold the thing it embraces entirely within itself. Therefore the left hand is under the head and the right hand embraces, when the holy soul places beneath the mind those things it sees, and with every effort and all its thoughts seeks after those things it does not see. For there are indeed now some who pursue heavenly things with such desire that they count all visible things as nothing; they occupy their mind with heavenly pursuits without ceasing, so that they desire to do nothing else; the soul disdains whatever lies outside spiritual activity, loves this alone, despises the rest, unless perhaps it recognizes those things to be necessary. These truly have the left hand under the head, because with their mind raised up to the blessedness of Christ, they see the present life beneath them. And the right hand of Christ embraces them, because heavenly love, holding them within itself on every side, protects them. Such men indeed delight in holy leisure, in which they enjoyably partake of the love of the blessed life through contemplation. In this contemplation they cleanse the eye of the heart, so that, even while still placed in this flesh, they may see God insofar as it is granted to human weakness — by whose vision they illuminate themselves and refresh themselves with his sweetness. These already experience to some degree that blessedness about which it is said by the voice of Truth in the Gospel: 'Blessed are the pure in heart, for they shall see God' (Matt. 5:8). For what is future already begins to be fulfilled in them, because even though they still live in the flesh in this world, yet through that which is greater in them, they are already beyond the flesh. By these is fulfilled what is commanded by the divine voice through the Psalmist: 'Be still and see that I am God' (Ps. 46:11). For inasmuch as they live without the tumult of the world, they fix their mind on the vision of God through desire and contemplation. And since many such people from the Synagogue will come through conversion at the end of the world, as we believe, it is rightly understood as spoken of such people: 'His left hand is under my head, and his right hand shall embrace me.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
