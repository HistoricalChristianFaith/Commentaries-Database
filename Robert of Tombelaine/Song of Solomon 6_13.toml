[[commentary]]
quote='''
For "Sunamite" is interpreted as "captive." The Sunamite, therefore, is called to return; because the faith of the Synagogue will be offered by the Church at the end of the world, so that she who is held captive by demons under the yoke of unbelief may recover her former dignity. And rightly she is urged to return four times; because the Jews are now dispersed into the four parts of the world, and wherever they may be, as has been said, they will be converted at the end of the world, as was foretold through the prophet: "If the number of the children of Israel be as the sand of the sea, a remnant shall be saved" (Isaiah 10:22). Let the Sunamite return, therefore, so that we may gaze upon her, that is, let the Synagogue be converted to the faith, and in her repentance let her show to all how great an evil she was committing when she was nailing her God to the cross. But immediately, when the Church desires to gaze upon the faith of the Synagogue, the Bridegroom responds as if asking in congratulation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 6'

[[commentary]]
quote='''
For camps indeed belong to those who wage war. Camps, therefore, will be seen in the Shunammite, because for the faith which she now attacks, she will then fight valiantly against the faithless. But because it will come about through the holy Church that the Synagogue is converted, because she will be converted to the faith by the words and examples of preachers, therefore the Bridegroom rightly turns to the praise of the bride.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
