[[commentary]]
quote='''
He himself is said to be our Peaceful One, because through him all the human race is reconciled to God. This Peaceful One had a vineyard, because in the labor of carnal precepts he planted the Synagogue, of which it is said: "The vineyard of the Lord of hosts is the house of Israel" (Isaiah 5:7). This vineyard existed in that which has peoples, because it was established in the Law, which gathered many peoples under itself. Of which peoples it is said: "The peoples have meditated on vain things" (Psalm 2:1). He handed this vineyard over to keepers, because he entrusted the Synagogue to Moses and the other fathers to be guarded. Of which it is well added: "A man brings for its fruit a thousand silver pieces." This vineyard brought forth fruit, because from the Synagogue that great cluster of grapes which was brought from the land of promise—namely Christ Jesus—came forth through his humanity. Of which fruit the Father said to David: "Of the fruit of your body I will set upon your throne" (Psalm 132:11). Whence the Apostle also writes: "Whose are the fathers, and from whom is Christ" (Romans 9:5). By "silver pieces" in this place we understand all earthly substance, of which Peter said to the lame man asking for alms: "Silver and gold I do not have" (Acts 3:6). Therefore a man brings a thousand silver pieces for the fruit of the vineyard, because whoever conducts himself manfully in the faith which he has received willingly and perfectly relinquishes all earthly things, so that he may truly possess Christ. For a thousand is a perfect number, and therefore through it the perfection of any thing is demonstrated. These silver pieces, then, were offered by those in the early Church, of whom it is written in the Acts of the Apostles: "As many as were possessors of fields or houses sold them, and bringing the proceeds laid them at the feet of the apostles" (Acts 4:34). These, gathered together, built from themselves another vineyard, namely the holy Church, and as good farmers propagated it with their blood and extended it by their preaching to the ends of the earth, so that it now fills nearly the whole world and, entrusted to farmers, returns pleasing fruit in its proper seasons. Whence it is said in the Gospel: "He will miserably destroy those wicked men, and will let out his vineyard to other farmers, who will render him the fruit in their seasons" (Matthew 21:41). Of which vineyard, now entrusted to good men, the Peaceful One himself says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
