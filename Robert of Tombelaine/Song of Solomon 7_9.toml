[[commentary]]
quote='''
For the voice is in the throat. Through the throat, therefore, preaching itself is again signified, which is said to be like the finest wine, because it intoxicates the minds of men so that they forget the things behind, as has been said, and running forward to what lies ahead, they do not grow weary. Of this wine the bride, receiving the word from the mouth of the Bridegroom, adds: 'Worthy for my beloved to drink, and for his lips and teeth to chew upon.' Such is the bride's wine that it is worthy for the beloved to drink, because when holy Church preaches the true faith, when she stirs her hearers to holy works, when she demonstrates by words and deeds that to love Christ alone, to imitate Him, to embrace Him, is good — what else does she do but make her wine worthy to be savored in the mouth of the Bridegroom? And rightly is Christ said to drink it, because it is lovingly drunk by His body, that is, by the faithful peoples. Concerning this it should be noted that all drink, but the lips alone and the teeth alone chew, because when the Church preaches through her saints, all indeed hear, but not all discern how great is the power of the sayings that are spoken. But the lips and teeth chew, because when the more perfect recall the words to memory after hearing them, when they ponder whatever they have heard through constant practice — as if bringing back to the mouth what they have taken in — they perceive how great is the power of the food they eat. For this reason it is written in the Law that an animal which does not chew the cud is held to be unclean (Lev. 11), because whoever does not meditate again on the good things he hears or reads, being empty of holy thoughts, necessarily thinks impure ones.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
