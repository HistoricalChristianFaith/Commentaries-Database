[[commentary]]
quote='''
As if she were saying: Seeing so many miracles taking place in the holy Church, why did I not perceive them in so great a time? Why did I remain unbelieving? Why did I persist so long through my unbelief in the darkness of ignorance? But she is disturbed on account of the chariots of Aminadab, because at a certain point she is stirred up through the preaching of Christ to receive the faith. For Aminadab is interpreted as "the willing one of my people." And rightly, without doubt, Christ Jesus is called by the Father "the willing one of my people," because He truly descended with willing love to save the people, and in order to raise us from death, He accepted death on the cross with pious will and gracious kindness. Whence He Himself also says to the Father: "I will sacrifice to You willingly" (Psalm 53:8). And one of the redeemed, speaking to Christ, said: "Hear me, O Lord, for Your mercy is kind" (Psalm 68:17). Therefore the Synagogue is disturbed on account of the chariots of Aminadab, because when at last she contemplates the four Gospels of Christ running through the world, burning in the hearts of men through faith, she is soon confounded by the darkness of her own unbelief, and when a salutary confusion arises, she is moved to repentance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 6'
