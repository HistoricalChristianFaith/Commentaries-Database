[[commentary]]
quote='''
Indeed, the hearts of the elect of this kind can rightly be called the heart of the bridegroom, for the more they flee the outward things that are in the world, the more secretly they come to know the inward things of the bridegroom. Of these the same bridegroom doubtless speaks elsewhere: "He who loves me will be loved by my Father, and I will love him, and I will manifest myself to him" (John 14:21). The bridegroom therefore sleeps, and his heart keeps watch: because while Christ, now glorified, rests in blessedness, whoever loves him perfectly labors to reach him. Of this watchfulness the bride spoke above: "While the king was on his couch, my nard gave forth its fragrance" (Song of Songs 1:11). For that his resting is called sleeping is made clear by what is read elsewhere: "In peace, in the selfsame, I will sleep and rest" (Psalm 4:9). Yet the bride herself can also say this of herself. Let her therefore say: "I sleep, and my heart keeps watch." As if a holy mind were speaking openly, saying: While I sleep outwardly from worldly tumults, I weigh in wakeful interior thought what heavenly things there are. For when holy men despise all earthly things, when they flee entirely the tumults of the world, when they take up leisure in the way of God, they by no means abandon those things in order to give themselves over to torpor; but laboring inwardly, they strive to behold in their heart what those things are for which they were made. For they do not sleep in order to grow sluggish, but they rest from transitory things in order to contemplate eternal things more freely. Yet sometimes the bridegroom rouses them for the benefit of their neighbors, and calls them back from the leisure they love so that they may profit those among whom they live. Hearing his voice, the bride says, even while she sleeps: "The voice of my beloved, knocking." What he says while knocking, she adds: "Open to me, my sister, my friend, my dove, my spotless one." She also joins the reason for his cry, saying: "For my head is full of dew, and my locks with the drops of the night."

While the bride sleeps, the beloved knocks that she may open to him; because while the holy mind attends to itself through rest, Christ endures many sinful works in this world; which unless spiritual men gird themselves for teaching, carnal people never recognize on their own, nor care to correct. The bridegroom therefore wills that leisure be sometimes set aside, and that all spiritual persons be stirred to the edification of their neighbors; because while perfect men attend only to themselves through interior quiet, the bridegroom grieves that worldly people fall more and more toward worse things, since they know him less and less on account of the silence of spiritual persons; which he himself makes manifest when he says: "Because my head is full of dew, and my locks with the drops of the nights." What is meant by the head of the bridegroom, if not God, and what by the dew in this place, where it is spoken in lamentation, if not the coldness of minds? For it is written: "The head of Christ is God" (1 Cor. 11:3). And concerning the coldness of any carnal mind it is again written: "As a cistern makes its water cold, so has she made her malice cold" (Jer. 6:7). The head of Christ, therefore, is full of dew, because many who are placed in the Church both believe him to be God and yet, persisting in coldness, are not kindled to the ardor of charity. By his locks, moreover, we understand the peoples whom we know to hang from and weigh upon the faith of his divinity, as if from the head of Christ. But the locks are said to be full of the drops of the nights; because while they hang suspended in the time of this dark temporality, they flow more and more with the drippings of iniquities. The bride is roused to kindle these, when any spiritual person is called from rest to the prelacy of the Church for the edification of many. But since she fears that if she comes to the prelacy, it will be necessary to be occupied with the cares of the world; and thus, while through the occasion of edifying many she inclines herself to temporal things, she may lose her quiet and even be stained with the filth of sins — therefore she responds to the crying bridegroom, saying: "I have put off my tunic; how shall I put it on again? I have washed my feet; how shall I defile them again?"
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
