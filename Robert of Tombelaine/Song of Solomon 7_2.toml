[[commentary]]
quote='''
The navel is also the order of holy preachers, which is fittingly called a goblet, because while the people are instructed through them, they are intoxicated with spiritual wine by their ministry. It is fittingly called "turned on a lathe," because it is necessary that the tongue of the preacher be turned according to the customs of all people. It "lacks not cups," because what he serves to others, he must drink more abundantly than the rest, and more fully contain what he gives.

By the belly, the breadth of the people is designated: which is fittingly surrounded by lilies like a heap of wheat; because while intent upon holy works, being prepared for the heavenly granary, it is fortified on every side by the examples of the saints, that it may persevere.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
