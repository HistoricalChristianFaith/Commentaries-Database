[[commentary]]
quote='''
He rises early to the vineyards, because after His resurrection, sitting in the glory of the Father, He also defends the churches He has built. He looks to see whether the vineyard has blossomed, because He weighs every advance of the Church with strict examination. He sees whether the blossoms are bringing forth fruit, because He discerns to what degree of progress the tender and imperfect ones are growing. He also sees whether the pomegranates have bloomed, because He regards each of the perfect and recognizes what usefulness they have among their neighbors, as if perceiving fruit in blossoms — about which there rightly follows: 'There I will give you my breasts.' In the pomegranates the bride gives her breasts to the Bridegroom, because in the perfect there lives a twofold love, by which, while they nourish the weak members in the Church, they nurse Christ, as it were, whom they recognize to be present in the least of His own.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
