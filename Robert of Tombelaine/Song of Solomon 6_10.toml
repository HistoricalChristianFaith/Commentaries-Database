[[commentary]]
quote='''
The holy Church advances like the rising dawn in the last judgment, because, having left behind the darkness of corruption, she is renewed by the brightness of incorruption. She is rightly called chosen as the sun, because she is brought to the same glory to which her head, Christ, who is declared to be the sun of justice, has attained. Whence it is that the same sun says: "I will, Father, that where I am, there also my servant may be" (John 19:26; 17:24). Yet this can also be understood of the members of the same Church still living in this flesh. For there are some who with great attention consider what the torments of the reprobate are, and who strive to examine their own deeds without self-flattery. And when they recognize that they have sinned, and through this fear going to the torments of the reprobate, they suddenly abandon the darkness of iniquity and desire to be kindled by the light of justice. Soon they rise to holy work, and through the good works they do, they begin to shine before their neighbors. These without doubt advance like the rising dawn, because, suddenly dispelling the night of sin, they are expanded more and more toward the light. Thus the soul that was previously in darkness now appears shining, and the soul that was even darkened within itself now shines for others with the light of holy work. Of which it is rightly added: "Beautiful as the moon, chosen as the sun." For the moon, while it illuminates the night, shows to dim eyes the path by which a person may walk. So indeed every soul that leaves behind darkness and stretches itself toward holy work, while it gives its neighbors an example of working well, as it were scatters light upon darkening eyes. For when sinners behold a good work and turn themselves to doing the same, they return to the path like those wandering in the night who return by the light of the moon. This holy soul therefore, while it offers examples to sinners, shines like the moon in the night. But when it grows more and more, and from day to day through the habit of work receives the light of justice so perfectly that it even provides examples of imitation to the good—it which previously appeared worthy of imitation only to sinners—then indeed the moon becomes the sun, because she who was shining for those wandering in the night now manifests the light of truth to those walking in the day. Hence what follows: "Chosen as the sun." Of which it is rightly added: "Terrible as an army set in array." Because this has already been said, it is not necessary to explain it again, lest it seem to produce tedium. The Bridegroom therefore follows, and states the reason whence such great virtue can grow in the Church. For she is renewed by his visitation, and what is dark in her is illuminated by his gaze.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 6'
