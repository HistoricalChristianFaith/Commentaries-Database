[[commentary]]
quote='''
Rightly in the sendings forth, she is described as a fountain of gardens and a well of living waters. For what is designated by the fountain and the well, if not Holy Scripture? Which so generates the water of wisdom that it both always refreshes those who drink and yet does not cease to flow. It is fittingly said to belong to gardens, because Holy Scripture belongs especially to those in whose minds the seeds of virtues spring up. But we must ask why Scripture is called both a fountain and a well at the same time, since a fountain appears on the surface, while a well, lying hidden in the depths, exercises all who seek it with greater labor. But it should be known that divine Scripture, being clear in certain passages and presenting itself as obscure in others, is sometimes drunk easily as it is found, like a fountain, and sometimes requires great searching in order to be grasped once found. That the understanding of Holy Scripture is designated by water is shown elsewhere when it is said by the divine voice concerning the reprobate: I will send upon them a thirst for water and a hunger for bread (Amos 8:11). And through Isaiah it is said: The Lord will take away from Jerusalem and Judah every support of bread and every support of water (Isaiah 3:1). Here it should be noted that the support of bread is taken away first, and afterward the support of water. For when the weighty sayings of Scripture are not sought out so as to be obeyed, the mind gradually falls away from knowledge, so that at some point even easy things are not grasped by the understanding. But these waters are fittingly said to flow from Lebanon with force, for Lebanon, as has been said, is interpreted as "whitening." In baptism indeed we are whitened, when, the blackness of sins having been removed, we are reformed to the purity of new life. From Lebanon, therefore, the waters of the well flow with force, because in baptism all the elect receive the gift of the Holy Spirit, by which, being illuminated, they understand the meaning of Sacred Scripture. This knowledge of Holy Scripture flows with such force that when it touches the elect, it removes them from love of this life and carries all who cling to it across to eternal joys by the power of its rushing. For this is why it is written in the Psalm: The rushing of the river makes glad the city of God (Psalm 45:5). For the rushing of the river makes glad the city of God, when through the gift of the Holy Spirit the wisdom of Scripture, flooding in powerfully, gladdens the holy Church, or the mind of anyone who receives it, by its infusion. At the coming of this Spirit, the malignant spirit is rebuked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
