[[commentary]]
quote='''
For when we disclose our thoughts to holy men, when we spread out our desire to them—whether they are still living among us or have already entered eternal life—and pray through God that by praying for us they may offer to the Lord Christ the desire with which we are moved, what else do we do than adjure the daughters of Jerusalem to announce to the beloved, to whom they are nearer than we are, that we are sick with love?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
