[[commentary]]
quote='''
Christ is declared to be white and ruddy; because, committing no sin whatsoever, He held the beauty of justice in its entirety, and yet, as though He were a sinner, He approached the passion of death. To whom it is said through the prophet: "Why then is your garment red?" (Isaiah 63:2.) He is truly chosen out of thousands, because from the whole mass of the human race, no one is found without sin: but He not only was without sin, but also redeemed sinners by His justice and blood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
