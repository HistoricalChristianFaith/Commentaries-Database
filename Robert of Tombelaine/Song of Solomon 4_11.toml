[[commentary]]
quote='''
The preachers of the Church are rightly said to be the lips of the bride, because through them she speaks to the peoples, and through them the little ones are instructed in the faith, since through them the hidden things of divine Scripture, as if secrets of the heart, are made manifest. Now in a honeycomb, the honey lies hidden and the wax is seen. Rightly, therefore, the lips of the bride are called a honeycomb, because when great wisdom is held in the frailty of the flesh, honey is, as it were, hidden in wax. But when any one of the elect preaches, when he reveals heavenly joys to those who do not know them, then the honeycomb drips, because he makes manifest to his hearers through the frailty of the mouth how great a sweetness of wisdom lies hidden in the heart. Whence it is written: "We have this treasure in earthen vessels" (1 Cor. 4:7). Therefore it is added: "Honey and milk are under your tongue." To be sure, false preachers carry honey on their tongue which they do not have under their tongue, because they sometimes preach heavenly joys as though they were genuine, while they themselves desire earthly goods with all their longings. But the holy mind displays honey on its tongue, because it shows the sweetness of wisdom by speaking, and by preaching truthfully, it refreshes its hearers as if with the sweetness of honey. It bears milk, because with teaching suited to them it nourishes all the little ones in the Church. But all these things it reserves for itself under its tongue, because it carries its inner sweetness constantly within. For while it casts aside earthly things, while it rejects the bitterness of vices, it feeds itself in its interior senses on the sweetness of wisdom, from which it gathers strength, so that as it advances toward eternal things, it cannot grow weary in the labor of the journey.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'

[[commentary]]
quote='''
To whom it is well said: "And the fragrance of your garments is like the fragrance of frankincense." What is designated by these garments, if not holy works, by which the shame of preceding evils is covered, lest it be seen? For hence it is written: "Blessed is he who watches and keeps his garments, lest he walk naked and they see his shame" (Rev. 16:15). Frankincense, moreover, is placed by signification for prayer, as it is written: "Let my prayer ascend like incense in your sight" (Ps. 141:2). The holy soul therefore, in this world, performs as many good works as it can, and while working well, stretches itself toward eternal things with holy desire and intention; nor does it do any good except with that intention, that it might at some time be able to arrive at the heavenly things which it loves. Rightly therefore the fragrance of its garments is said to be like that of frankincense, because in all its works it prays, while with the intention of arriving there, it performs whatever good works it can.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
