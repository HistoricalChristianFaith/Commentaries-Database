[[commentary]]
quote='''
These hold swords and stand forth most learned in warfare, because while they fulfill the word of God in deed, what they know in their heart, ever more and more learned, they conquer their enemy — namely, the devil — by wisdom and strength. For by the sword, the word of God is signified, and by the hands with which they hold the swords, their very deeds are represented. Of these it is well added: "Every man's sword upon his thigh, because of fears in the night." What do we understand by the sword, if not the rigor of their way of life; and what by the thigh, if not the appetite of the flesh? Therefore all the elect who have already advanced to the perfection of life always carry a sword upon their thigh, because by the rigor of their way of life they continually break the appetite of the flesh, lest the enemy whom they fear in the night of this world, coming suddenly, should find a soft entrance, and through the softness of pleasure should lead them to graver sins all the more easily the more pleasure-seeking he finds them. Concerning the praise of Solomon, it is further added:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
