[[commentary]]
quote='''
For the palm, as it grows, is narrow at the bottom and spreads wide at the top. So the holy soul begins from the lowest and smallest things, and gradually growing to greater things, arrives at the breadth of perfect charity. For no one, as it is written, suddenly reaches the highest. In the Psalm it is said of the just man: "The just shall flourish like the palm tree" (Psalm 91:13). The breasts of the bride are the two precepts of charity, which possess the soul, inebriate it with heavenly wine, and nourish it. Yet the palm can also be understood as the cross of Christ. For the palm, growing to a very great height, produces the sweetest fruits; and the cross of Christ has prepared heavenly food for us. The bride's stature is compared to it, because whoever, greatly loving Christ, worthily imitates Him does not hesitate to die for Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
