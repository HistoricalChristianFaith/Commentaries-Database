[[commentary]]
quote='''
Well does Christ call himself a flower, who, while he destroys the thorns of sins, adorns the mind of the bride with the beauty of his righteousness, and while he applies heavenly desire to the nostrils of the heart, refreshes the interior of the soul as if with fragrance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
