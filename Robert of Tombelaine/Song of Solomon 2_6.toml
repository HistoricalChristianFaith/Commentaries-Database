[[commentary]]
quote='''
By the left hand of the bridegroom the present life is signified, and by the right hand the eternal life. By the head of the bride, moreover, the mind that rules over the soul is understood. But the left hand of the bridegroom is said to be under the head of the bride, and his right hand embraces her, because she always places the temporal life beneath her mind, but desires to embrace the eternal life in every way. For those things which she sees, she tramples with greatness of soul and a lofty mind, and occupies herself with heavenly duties. She endures the former out of necessity, but for the latter she sighs with utmost desire, as if bound by the right arm of the bridegroom. When she enters into these things even a little, she rests delightfully, and out of love for that rest she utterly despises worldly tumults. The bridegroom surely loves her all the more as she rests thus, and drives away all the wicked from disturbing her.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
