[[commentary]]
quote='''
He made its columns of silver, because He gave preachers to that same Church, whom He strengthened with the great uprightness of justice so that they might sustain it by their examples, and adorned with the brilliance of eloquence, as with the splendor of silver, so that they might instruct through their preaching. He made a golden reclining seat, because when He shone forth in the hearts of the perfect, He showed them the power of His divinity through contemplation. In which contemplation, when He displayed to them the beauty of heavenly joys, He composed, as it were, a reclining seat of gold, because He provided a place in which they might rest and be refreshed. This reclining seat is rightly said to be golden, because wisdom is better than all riches, and all things that are desired cannot be compared to it (Prov. 8:11). This reclining seat is reached through many labors, ascended through many tribulations, so that, if necessary, even the shedding of blood is permitted. Therefore the ascent is rightly said to be purple. For when the holy martyrs handed over their bodies to torments for the sake of eternal life, when they patiently endured scourges, the rack, fires, swords, and other innumerable tortures, did they not ascend to that reclining seat, that is, to the blessed life, by a purple ascent? But what are we wretches doing, who are not silver columns in this litter, because we neither sustain the holy Church by our examples nor teach by our preaching? We do not have a golden reclining seat in it, because, entangled in earthly thoughts, we do not rise up through contemplation to the splendor of wisdom. We do not even know the purple ascent, because, devoted to pleasures, we refuse to bear labors and persecutions for eternal blessedness. We are somewhat consoled by what follows concerning this litter: He paved the middle with love, for the daughters of Jerusalem. For what do we understand by the daughters of Jerusalem, since he said not sons but daughters, except us weak ones, who in the Church are not men but women, because we do not struggle bravely against vices, do not resist manfully, but submit in womanly fashion? For Jerusalem is interpreted as "vision of peace," by which the Church, which is our mother, is designated, because she continually contemplates perpetual peace. If, therefore, we are not silver columns in the King's litter, if we do not have a golden reclining seat, if we cannot ascend by the purple ascent, let us at least hold fast to love, which is common to all the elect and placed, as it were, in the middle. Through this, indeed, King Solomon recognizes us as being in his litter, because in it, along with the silver columns, along with the golden reclining seat, along with the purple ascent, he also paved the middle with love for the daughters of Jerusalem, because we arrive at the same blessedness of the Bridegroom together with the members of the Church, if we maintain unwearied love. There follows:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
