[[commentary]]
quote='''
The beloved flees, because he hides himself from reprobate hearts so that he may not be understood by them. For when reprobate minds approach the hearing or reading of God's words with perverse intention, by a just judgment they do not find the truth which they do not seek with a worthy desire. Hence the very Wisdom of God says: "The wicked shall seek me and shall not find me" (John 7:34). But the beloved, fleeing the reprobate, goes to the mountains of spices; because, leaving the perverse behind, he does not cease to visit holy souls, who are made lofty through contemplation and bear fragrant ointments through the compounding of virtues. Upon these mountains the beloved is likened to a roe and to a young hart of the deer; because in the hearts of holy men it is made manifest that he assumed humanity for us out of loving charity. When he was born from the ancient fathers, he came as a fawn from the deer, as was said above. Though he was rich, he made himself poor so that we might be enriched; and though he was exalted above all things, he took up our lowliness with ineffable condescension. Let us render him immense thanks as long as we live; to him who was handed over to death for us and who rose again into immortality, we owe ourselves—both spirit and body (2 Cor. 8). He who lives and reigns with God the Father in the unity of the Holy Spirit, God, through infinite ages of ages. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
