[[commentary]]
quote='''
As if she were saying: I hold firmly to the friendship of my beloved, because I feel his constant goodwill toward me. For while I have his kind intimacy, whatever I hear from barking enemies against him is grievous to me. And while in his constant presence I see what he is like, if adversaries bring forth any error, I do not depart from the truth that I have come to know in the sight of him. About which there well follows: 'Who feeds among the lilies, until the day breathes and the shadows decline.' What is signified by lilies, if not souls? Which, while they retain the brightness of chastity, smell sweetly to all their neighbors through the reputation of good fame. The bridegroom therefore feeds among the lilies, because without doubt he is delighted by the chastity of souls, which both preserve purity of the flesh in themselves, and please him through pure thoughts in his presence, and give examples to their neighbors like the sweetness of fragrance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
