[[commentary]]
quote='''
The eyes of the bridegroom are like doves, because the preachers of Christ who show us the way live in simplicity. Moreover, they are said to be beside streams of water, because they always dwell in the refreshment of the divine Scriptures. Indeed, they are washed with milk, because by the grace of creative wisdom, as by a mother's milk, they have been cleansed from sins through baptism. What do we understand by the fullest streams, beside which they sit, if not the profound and hidden sayings of sacred Scripture, which we examine, by which we refresh ourselves, while we drink them in by reading or hearing? For this reason also doves are accustomed to sit beside streams, so that they may see the shadow of flying birds in the water, and casting themselves over it, they thus escape the talons of predators. So holy men perceive the deceits of demons in sacred Scripture, and from the description which they see, as from a shadow, they recognize the enemy. And while they devote themselves entirely to the counsels of Scripture, so that they do nothing except what they hear from the response of the Scriptures, as if casting themselves into the water, they elude the enemy. These streams are called most full, because concerning whatever difficulties counsel is sought in the Scriptures, it is found fully regarding all things without diminishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
