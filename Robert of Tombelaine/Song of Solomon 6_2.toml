[[commentary]]
quote='''
The Beloved descends into his garden to the bed of spices, because in visiting the Church, he comes with greater grace to those whom he knows to send forth from themselves to their neighbors the fragrance of good reputation through holy works and examples of virtues. He feeds in the gardens when he delights in the virtues of many souls. He gathers lilies when he cuts down each of the perfect from this life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 6'
