[[commentary]]
quote='''
Because indeed it burns with the greatest desire, and whatever it holds does not suffice, until it finds the beloved, it therefore adds the constancy of its searching. What do we understand by the city in this place, if not the Church; what by the streets of the city, if not all those who are spiritual? While they walk toward the Church with their whole heart, they hold to the narrow way by which they are led to life. By the broad ways, however, the worldly are designated, who, while they follow their many pleasures, walk along wide roads. The bride therefore rises and goes about the city, because the perfect soul that despises visible things contemplates in her mind all the saints who are or have been in the Church, to see whether perhaps she may find something in their deeds that, by imitating, she might at some point arrive at the finding of the bridegroom. She searches through the streets and through the broad ways, because while she strives to reach the intimate embraces of the beloved through the imitation of the good, she sometimes finds not only in spiritual persons but even in carnal ones something that she can worthily imitate. But after she has indicated her twofold labor, she again adds the difficulty of finding, saying: "I sought him, and I did not find him." But while she seeks and does not find, she herself is also sought and found.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
