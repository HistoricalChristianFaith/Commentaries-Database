[[commentary]]
quote='''
For through the throat voices are conveyed, and flavors are drawn into the stomach. What then is understood by the throat of the Bridegroom, if not the Testament of Christ, through which Christ speaks to us, and in which how sweet the Lord is, is tasted by the faithful? He is therefore said to be wholly desirable; because through the fact that the holy soul hears all good things about him, she desires more and more always to see him. After so many of his good qualities have been recounted, she consequently concludes and says: Such is my beloved, and he is my friend, O daughters of Jerusalem.

But with so many praises enumerated and so many gifts displayed, who upon hearing does not desire, who upon attending does not burn with longing? For every faithful soul, the sweeter and more abundant the things it hears about its Redeemer, the more ardently it yearns and desires to know yet more manifest things about Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
