[[commentary]]
quote='''
She had her breasts like a tower, from the time she found peace before the Bridegroom; because after she received the spirit of peace under him, she nourished preachers lofty in contemplation and unbending in strength. But what does it mean that he does not say peace, but as it were finding peace; unless it is because while we are in this world, we do not entirely cease from sin, and as long as we live with sin, we do not have perfect peace with him who lived in the flesh without sin? But since the little peace that we have, we hold through the Mediator himself of God and men, therefore it is added:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
