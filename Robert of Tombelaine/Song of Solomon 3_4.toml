[[commentary]]
quote='''
She passes the watchmen a little way and finds her beloved, because while she considers them to be mere men, she raises her mind to the divinity, and there recognizes her bridegroom as equal to the Father, above men. She says she then found him when, aided by holy labors, she fixes the eye of faith somewhat upon the brightness of his divinity, as if contemplating through a mirror. How eagerly of mind she receives that small portion, she shows by saying: "I held him and will not let him go, until I bring him into the house of my mother, and into the chamber of her who bore me." The Mother of the Church was the Synagogue, because from her she received the holy preachers, from whom she accepted the word of truth, through which she was reborn in faith. The Church therefore holds fast to the Bridegroom until she brings him into the house of her mother, because until the end of the world she does not withdraw from faith in him and love of him, until she leads the Jews to faith. Not that she withdraws afterward; for him whom she loves in exile, she will love even more when she sees him in the homeland. But this had to be said concerning that time about which some could have doubted on account of opposing temptations. She will therefore bring the Beloved into the house of her mother when at the end of the world the Church, through preaching, introduces the Christian sacraments into the Jewish people. She will bring him into the bedchamber, as into the more secret part of the house, because from that same people she will convert so many that they will cast off all the burdens of the world and desire in their innermost thoughts to please God alone. Such people will make a bedchamber for the Bridegroom, because when they cast away from themselves all the filth of cupidity, they will prepare, as it were, a secret place in the mind in which he may take delight.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
