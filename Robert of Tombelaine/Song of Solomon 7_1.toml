[[commentary]]
quote='''
The daughter of the prince is called the holy Church, because she is regenerated into new life by the preaching of Christ, who through the power of his divinity rules over every creature that he made. What are the shoes of the Church, if not the examples of the preceding fathers, by which she is fortified on the road of this world, so that through all the tribulations that arise, she may walk confidently shod? Hence elsewhere Paul says to the preachers: "Your feet shod in preparation for the Gospel of peace" (Eph. 6:15). For shoes are made from dead animals. And we spiritually shoe our feet when we take examples from the holy fathers who are dead in the flesh, so that after their likeness we may overcome the temptations of this world. It can nevertheless be understood that the Church is shod when in her preaching she is fortified by the death of Christ to endure the evils that arise against her. Beautiful therefore are the steps of the shod bride, who is the daughter of the prince; because before the divine eyes the service of any elect person preaching according to the examples of the fathers is pleasing.

By the two thighs of the bride, the two peoples of the Church are signified: by the joining of the thighs, the concord of the preachers is designated, by whom the peoples are united, while circumcision and uncircumcision are instructed by them in the Catholic Faith. These are like necklaces; because while in the wisdom by which they shine they do holy works, they bear, as it were, gems set in gold. Of whom it follows: "Which were fashioned by the hand of a craftsman." Necklaces are fashioned by the hand of a craftsman, because by the work of Christ the preachers are made beautiful and useful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
