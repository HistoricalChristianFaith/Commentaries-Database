[[commentary]]
quote='''
Solomon is interpreted as "the peaceful one." What then is understood by Solomon, if not Christ, of whom it is written: "He himself is our peace, who made both one" (Ephesians 2:14)? We therefore make a bed for Solomon when we cease entirely from the anxieties of the world, when we willingly rest in the desire of Christ alone, and cleanse our heart from every earthly desire so that he may rest with us. Now if the number ten is multiplied by six, sixty is of course completed. By ten, therefore, we understand the Decalogue of the law; by six, however, we understand this entire time which we see revolving in six working days. By the sixty mighty ones, therefore, we understand all the perfect who were before us in the Church; who, since they fulfilled the ten precepts of the law in the six days all the more strongly as they did so more spiritually, completed, as it were, the number sixty. These surround the bed of Solomon, because they fortify the holy mind in which Christ rests with their words and examples, by which they repel enemies coming to the entrance of the mind, while they sustain that mind by their examples and instruct it by their writings.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
