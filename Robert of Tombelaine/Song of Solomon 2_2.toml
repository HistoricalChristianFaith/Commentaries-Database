[[commentary]]
quote='''
Well, just as the lily among thorns, so the bride is said to be among the daughters; because while there are many in the Church who confess Christ with words alone, yet in their works pursue nothing but human concerns, that soul alone is counted worthy of the lily's dignity which rises from the root of mortality to heavenly beauty, and guards for itself the brightness of purity in heart and body, and refreshes all its neighbors with the fragrance of a good reputation. But because the Bridegroom held his bride worthy of such great praise, she now in turn rightly praises him by whom she perceives herself to be praised.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
