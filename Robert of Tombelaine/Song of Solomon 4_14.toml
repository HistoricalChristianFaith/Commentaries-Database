[[commentary]]
quote='''
For what is designated by these diverse species of spices, if not the fragrance and progress of holy virtues, which is found in the saints? From these species, indeed, royal ointments are prepared; from these, healings of bodies are obtained. Rightly, therefore, they designate the virtues of souls, which, when gathered and compounded, both the good fragrance of reputation goes forth, and fitting health is restored to sick souls. But still the praise of the Church is repeated by the Bridegroom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
