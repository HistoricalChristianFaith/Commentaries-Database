[[commentary]]
quote='''
While the bride is troubled in her search for the beloved, she encounters the watchmen of the city: that is, while the holy mind afflicts itself with desire for her Bridegroom Christ, she receives the words of the preachers in the divine Scriptures, and through them, as long as she is exiled from Christ, she devotes herself to the love of the very one whom she was seeking. What exercise she finds in them, she adds: "They struck me and wounded me; the watchmen of the walls took away my cloak." The watchmen strike the bride and wound her, because the holy preachers, when they speak of heavenly things, move the loving soul and pierce it with a greater love. They take away the cloak, because if anything of worldly pomp remained in the heart, they remove it from the soul by their exhortations. They take away the cloak, because sometimes before the words of the preachers we did not know ourselves, and they, while speaking, uncover everything that lay hidden within. While this happens, they are to be loved all the more, and they are to be implored more devoutly to speak to the beloved on our behalf.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
