[[commentary]]
quote='''
Having been touched, she rises to open: because when she receives the spirit of love more abundantly than usual, she immediately thinks about the edification of her neighbor; and by preaching she acts so that, with hearts opened, the Bridegroom, coming to dwell in her neighbors, may find an entrance for entering. She also demonstrates examples of works to her hearers along with her preaching, saying: My hands dripped with myrrh, and my fingers were full of the choicest myrrh.

What is understood by hands, if not works; what by myrrh, if not the mortification of the flesh? The hands of the bride who preaches therefore drip with myrrh; because whoever preaches to others, if they wish to benefit many, must strive to mortify the carnal life in all their work. But that this may be done with great discernment, he makes clear when he adds, saying: "My fingers are full of the choicest myrrh." For just as many fingers are divided from one hand, so in one holy manner of life diverse virtues are found through discernment. For the virtue of generosity is one thing, the virtue of frugality another. The work of humility is one thing, that of frank rebuke another. We do one thing when we keep ourselves in silence for our own edification; another when we speak to our neighbors for their benefit. But the fingers are said to be full of the choicest myrrh; because in everything that is done, it is always necessary that the mortification of carnality be maintained. This is rightly called the choicest when, in every temptation that is brought by the enemy, carnal pleasure is unceasingly guarded against lest it be admitted. When this happens, all hardness of mind is dissolved, and a way is prepared for the Bridegroom to enter the heart.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
