[[commentary]]
quote='''
What is more fittingly understood by the breasts in this place than the very love of God and neighbor, about which we spoke above? Through these the holy mind nourishes all its senses in love, while it is bound to its God by the tenacity of charity, and freely bestows upon its neighbors whatever benefit it has, whenever it is permitted. How much the bridegroom loves these breasts of the bride, he openly shows in the repetition of praise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'

[[commentary]]
quote='''
What we said above concerning the breasts of the bridegroom, we consider can also be understood here when he speaks of the bride. 'And the fragrance of your ointments is above all spices.' By ointments, indeed, are understood those very virtues which arise from charity. For even the reprobate sometimes possess spices with which they give off fragrance, because they possess certain virtues and perform good works; but because they live without charity, nothing they do is pleasing in the sight of God. Hence at the judgment, when they shall say: 'Lord, did we not prophesy in your name, and do many mighty works in your name?' (Matt. 7:22), it shall be answered to them: 'I never knew you; depart from me, all you workers of iniquity.' Rightly, therefore, the ointments of the Church are said to give off fragrance above all spices, because even though the works of the reprobate sometimes please men, those which holy Church prepares from charity give off fragrance in the divine nostrils without ceasing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
