[[commentary]]
quote='''
By the eyes of the bride, the preachers of the holy Church are designated, as has been said; by the hair, the multitude of the people is figured; by the neck, moreover, the joining of the holy head and body is shown, which is understood as the faith of the Church. For through this faith the head and body are joined, since each person clings to Christ all the more tenaciously, the more faithful he is held to be in good conduct. Therefore the bridegroom is wounded by one of the eyes and by one hair of the bride's neck, because indeed he is afflicted even to the death of the cross, so that the unity of preachers and people in the Church might be confirmed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
