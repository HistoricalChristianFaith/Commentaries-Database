[[commentary]]
quote='''
Holy Church, or any holy soul, ascends from the desert, because being placed in the exile of this pilgrimage, she reaches toward heavenly joys with her mind and thoughts. Whence Paul also said: Our conversation is in heaven (Phil. 3:20). She abounds in delights, because devoting herself to the meditations of Holy Scripture, she continually feeds her mind on heavenly nourishment. She leans upon her beloved, because trusting in the help of Christ alone, and by his generosity, she is transferred from exile to her homeland. For the Truth himself says to all the faithful: Without me you can do nothing (John 15:5). But whence she received the ability to ascend from the lowest things to the highest, from the desert to the kingdom, the beloved reveals when he adds:

What is designated by the evil tree, if not the holy cross? Which bore that apple, of which the same Bride says in the preceding passages: 'As the apple tree among the trees of the woods, so is my beloved among the sons' (Song 2:3). But Christ roused his bride under the apple tree, because when placed on the cross, he called the Church, subject to him, to life; so that she might rise from the sleep of death, and crucifying herself with him, hasten toward the new resurrection. Whence the Apostle also says to any soul that is dead: 'Arise, you who sleep, and rise from the dead, and Christ shall give you light' (Eph. 5:14). And to certain ones who had already risen, he says elsewhere: 'If you have risen with Christ, seek the things that are above' (Col. 3:1). But because the unbelief of the Synagogue crucified Christ, there follows: 'There your mother was corrupted.' The mother of the Church is said to have been corrupted under the apple tree, because when she fixed her Savior to the wood, she corrupted herself by an abominable crime. He drives home the magnitude of this crime when he repeats the same thing, saying: 'There your mother was violated.' But since blindness has come upon Israel in part, so that the fullness of the Gentiles might enter in (Rom. 11), therefore it is said to the entering Church:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
