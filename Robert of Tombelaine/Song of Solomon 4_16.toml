[[commentary]]
quote='''
For what is designated by the North wind, which constricts with cold and makes things numb, if not the unclean spirit, who, while he possesses all the reprobate, makes them numb to good work? By the South wind, truly, that is, the warm wind, the Holy Spirit is figured: who, when He touches the minds of the elect, releases them from all numbness and makes them fervent, so that they eagerly perform all good things. For hence it is said: "Turn again, O Lord, our captivity, as a torrent in the South" (Psalm 125:4). Let the North wind arise, then, and let the South wind come and blow through the garden of the Bridegroom, and let its spices flow; that is, let the evil spirit depart from the Church or from each soul, and let the Holy Spirit come. Who, coming, may pour the fire of charity into their thoughts, and, having poured Himself in, may release them from the numbness of negligence. When He does this, the spices flow; because when, with the Holy Spirit arriving, the heart that had previously been numb rouses itself to works, soon the fragrance of holy activity spreads sweetly through all the neighbors, so that all who hear may kindle themselves to the same things, and, with the South wind blowing, that is, with the Holy Spirit pouring Himself in, they may send forth the odors of virtues, so that everywhere the holy garden may bloom, and after the flower may produce fragrant and refreshing fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
