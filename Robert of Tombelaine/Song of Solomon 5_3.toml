[[commentary]]
quote='''
His bride stripped herself of her tunic, because she cast off all the outward things by which she was burdened. Concerning this tunic it is said: "Now let him who has a tunic sell it and buy a sword" (Luke 22:36). For he buys a sword by selling his tunic, who renounces temporal things for the sake of eternal ones, and living in holy conduct, acquires the word of preaching. Of which it is said: "And the sword of the Spirit, which is the word of God" (Ephesians 6:17). Moreover, the bride washed her feet, because while the holy soul lives in holy leisure, she diligently calls her works back to memory, and whatever she finds sordid in them upon examination, she bewails with daily tears and groans. She washed her feet, therefore, because she lamented the past works by which she had walked dissolutely through this world. She washed her feet, because, washing away her sins with tears, she longed to appear clean in the sight of her beloved. She fears to soil these feet again, because she is greatly anxious lest, if she is placed in a position of authority, walking through earthly things, she should again take up what she had put aside. For this reason she withdraws from her leisure unwillingly, because while she is far from the waves of the sea, she lives more securely, as if placed upon the shore. But her beloved does not lightly endure the death of his neighbors. And therefore, drawing nearer, he does not hesitate to rouse her by his own hand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
