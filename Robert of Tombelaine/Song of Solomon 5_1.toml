[[commentary]]
quote='''
The beloved comes into the garden and eats the fruit, when Christ visits souls and satisfies himself with the delight of good works. Whence he also adds, saying: I have come into my garden, my sister, my bride; I have gathered my myrrh with my spices; I have eaten my honeycomb with my honey; I have drunk my wine with my milk.

The beloved reaps myrrh with spices when Christ, having brought the mortification of life to perfection, cuts off His chosen one from this life and brings him into the heavenly storehouse with a holy reputation. He eats the honeycomb with the honey when He fulfills the holy desire lying hidden in holy works, and brings the holy soul to the banquet of the saints to be fattened with His delight. He drinks His wine with milk when He refreshes Himself both with the perfection of some and, lovingly cherishing the innocence of others with piety, brings both to the eternal banquet. He invites all those remaining to follow their example, when He adds: Eat, my friends, drink and be inebriated, dearest ones.

It must be noted first of all that those who eat are called friends, while those who drink and become inebriated are declared to be the dearest beloved. By these words it is given to be understood that in this passage, to eat is good, but to drink and become inebriated is a greater good. For there are indeed certain persons in the holy Church who hear the divine precepts in such a way that they learn to love heavenly things more than earthly ones, give much to the poor out of desire for those things, guard themselves from wicked works, seize nothing from anyone by violence, willingly hear the preaching of the Church, instruct themselves in the faith, and exercise that faith through holy works — and yet they have wives, raise children, and care for their possessions, although they set Christ above all these things. These persons truly eat and are friends, because in hearing holy Scripture they take such refreshment for themselves that, even though they do not yet rise to the summit of perfection, nevertheless, perfect according to their own measure, they live without fault in the divine precepts. And while the parents of blessed John — namely Zechariah and Elizabeth (Luke 1) — strove to observe this, through angelic revelation they merited in their old age to receive a son, than whom no greater has arisen among those born of women, and who himself merited to point out with his finger and to baptize the very Savior of the world (Matthew 11). Of his parents it is said: "They were both righteous before God, walking in all the commandments and ordinances of the Lord without blame" (Luke 1:6). But there are others who hear or read divine Scripture with such eagerness that, having at once renounced all earthly occupations, they seek only heavenly things; they abandon parents, wives, homes, children, and all transitory things, desiring only to follow and embrace Christ. Out of longing for Him they afflict themselves with fasts, pour forth tears, devote themselves to divine meditations, think only on what is eternal, give themselves to contemplation, laboring to this end: that forgetting the things which are behind, they may stretch themselves forward more and more to the things that lie ahead (Philippians 3). What indeed are these persons doing, what else, but drinking until they are inebriated — so that while they forget all earthly things through desire, they rightly deserve to be called by the heavenly Bridegroom not merely friends, but dearest beloved?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
