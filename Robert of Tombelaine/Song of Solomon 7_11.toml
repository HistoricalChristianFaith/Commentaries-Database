[[commentary]]
quote='''
While the bride, having experienced the sweetness of the Bridegroom, refreshes herself, she also thinks of her neighbor, whom she loves as herself by the Bridegroom's own command; and because she understands the Bridegroom's precepts, she desires that others may understand them as well. For the field, as Truth itself attests, is this world (Matt. 13). The Bridegroom goes forth into the field with the bride when the Word of God, having taken on flesh, is shown to the world in the bridal chamber of the Virgin. He dwells in the villages when He visits the nations through faith, which He generously bestows upon those who receive it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
