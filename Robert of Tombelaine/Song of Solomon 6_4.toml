[[commentary]]
quote='''
It should be noted, indeed, that the Synagogue will one day be converted to the faith through the preaching of the Church, so that, denying itself, it will follow Christ alone, and will love Christ with the same desire with which the Church loves him, whom she loves alone above all others.

Beautiful and beloved, sweet and comely like Jerusalem, is said to be the Synagogue; because, once converted, she will follow the four holy Gospels just as the Church does. Jerusalem indeed is interpreted as "vision of peace." By which the holy Church is well figured; because while she always suffers tribulation in the world, scorning the way, she contemplates by running what the peace of the heavenly homeland may be, trusting in him who said to his disciples: "In the world you will have tribulation; but be confident, I have overcome the world" (John 16:33). Worthily then the converted Synagogue is called beautiful and beloved and sweet and comely like Jerusalem; because while she imitates the holy Church, she practices the precepts of the four Gospels, from which she receives beauty of character so as to please, gathers the exercise of holy work so as to cling to friendship, learns the sweetness of meekness so as to endure, and displays the appearance of comely conduct, so as to draw others by example. Concerning which it is consequently said: "Terrible as an army set in array." It is known to those with experience that when soldiers go forth in battle array against enemies, if they advance in close and united formation, they are feared by the enemies coming against them; because while they see no entrance through a gap in them, they do not find, hesitating, how to penetrate them. And this becomes an impenetrable defense for them, that being arranged in harmony they protect themselves by means of themselves. For while they make a rampart for themselves from themselves, they leave no entrance for enemies to get through to them, and when attacked to be killed, they themselves more easily kill. So it happens among the multitude of the faithful, which while it does not cease to fight against malignant spirits, must be bound together by the peace of charity in order to be safe. For if it holds peace, it appears terrible to enemies. If it is divided through discord, it is easily penetrated on all sides by enemies. Therefore let it fortify itself with peace, bind itself with unity, unite itself with charity; so that while it suffers no damage within itself through division, it may always follow its leader rejoicing without confusion. In peace indeed the eye of the mind is cleansed, so that it may be directed toward the very vision of blessedness. Which no one beholds as it is in this life; because it is impossible to possess the homeland while each one of us groans in exile.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 6'
