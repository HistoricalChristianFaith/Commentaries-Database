[[commentary]]
quote='''
As if she were saying: since by faith and love I cling to Christ alone, follow Him alone, desire to see Him alone as one God with the Father and the Holy Spirit, I joyfully experience the sweetness of His regard, the kindness of His visitation, the delight of His turning toward me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
