[[commentary]]
quote='''
In the heart are thoughts, and in the arm are works. Upon the heart therefore and upon the arm of the Bride, the beloved is placed as a seal; because in the holy soul how much he is loved by her is shown both in will and in action. For the holy mind bears Christ as a sign both inwardly and outwardly; because while she labors constantly in meditations upon him, she does not cease to imitate him in outward action, so that there should be no doubt that she is his beloved. Concerning this sign the Bridegroom himself said to his disciples: "By this all will know that you are truly my disciples, if you have love for one another" (John 13:35).

Rightly, without doubt, love is declared to be strong as death; because when we are put to death to vices through love, what death accomplishes in the senses of the body, love accomplishes in the desires of the mind. For there are some who so love God that they disregard all visible things, and while they reach toward eternal things with their mind, they become nearly insensible to all temporal things. In these persons, surely, love stands forth as strong as death, because just as death slays the outer senses of the body from every proper and natural appetite, so love in such men compels the mind, otherwise occupied, to despise all earthly desires. To those dead and yet living of this kind, the Apostle was speaking: "For you have died, and your life is hidden with Christ in God" (Col. 3:3). These without doubt hide their life with Christ, because while they set aside all things that we see, they truly and secretly live in those things that we do not see—namely, in the blessedness of Christ. For because they despise the false life that visibly appears, they hide themselves in the true life, which presents itself as manifest only to invisible eyes. It can also be understood, however, that Christ says this of Himself, declaring: "Set me as a seal upon your heart, as a seal upon your arm; for love is strong as death." As if He were saying: It is fitting that you bear me with you as a sign of my love in your mind and in your action, because in the strength of my love for you I underwent death, so that you, who were dead in unbelief, rising with me, might live spiritually in the newness of faith.

But because he would never have been hung on the cross unless the heart of the Synagogue had burned with great envy, therefore it is added: "Jealousy is cruel as hell." For jealousy is taken both in a good and in a bad sense. It is taken in a good sense, as is said through the Apostle: "Be zealous for the better gifts" (1 Cor. 13:11). But it is taken in a bad sense where it is said to Saul through Samuel: "The kingdom shall be taken from you and given to your rival" (1 Kings 17). For David is called his rival, whom Saul is known to have envied. Jealousy is therefore cruel as hell; because while the Synagogue thought it could send Christ down to the underworld, it envied him even unto death with a merciless heart. Jealousy stood forth as cruel as hell; because just as hell tortures without mercy those whom it holds, so the Jewish people, seizing Christ, dragged him to death without any regard for piety. Of which it is well added: "Its lamps are lamps of fire and flames." For just as fire consumes what it ignites, so envy destroyed the Jews from all the virtue of faith; of whom it is well said elsewhere: "And now fire consumes the adversaries." As if it were said: Before they come to the eternal fire, they are consumed in the present, because they carry within themselves the fire of envy, which is not carried without the burning of the one who carries it. This fire of envy brought forth flames when, through the examples by which it was kindled, it grew even among the Gentiles throughout the whole world, even to the point of martyrdoms of Christians.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
