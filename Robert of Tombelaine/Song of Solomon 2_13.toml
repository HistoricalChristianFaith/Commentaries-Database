[[commentary]]
quote='''
For the fig tree put forth its green figs, because the holy Church sent its martyrs ahead to the eternal homeland. After whom the flowering vines gave their fragrance, because throughout the whole world examples of good works increased. The vines indeed produce flowers when the individual churches lead souls previously unbelieving to the newness of faith through baptism. But the flowers themselves bring forth fragrance when believing souls spread good examples to one another and to others through a sweet reputation. But because Christ draws us by both modes of exhortation — namely, that he both admonishes us by precepts and raises us up by the examples of the saints — therefore he first commanded his bride by admonishing her to arise, and then brought the examples of the saints to her knowledge, and after the presentation of examples he again turned to the admonition of precept.

The soul rises when it lifts itself from the commission of sin; it comes when through good works it advances with the holy steps of holy desire toward heavenly things. For when a holy mind beholds the shameful deeds of its past life, when it counts up the sins it has committed, it soon blushes with shame within its own conscience, and turning to hatred everything it had loved in the world, it punishes itself with tears, and made stronger by that very repentance, it leaps free from every defilement and shakes itself loose from all the sluggishness of negligence, so that it no longer lies prostrate in base thoughts but stretches itself out through holy desires toward the longing for invisible things. This mind, therefore, rises and comes, because it both lifts itself from the weakness of torpor through compunction and, exercising itself in holy pursuits, runs toward eternal things on the feet of love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 2'
