[[commentary]]
quote='''
For we stretch out the neck when we wish to see farther ahead. Therefore the holy preachers are fittingly called eyes for one reason, teeth for another, cheeks for yet another, and the neck for still another. Rightly, then, the neck of holy Church is said to be like the tower of David, because the holy preachers watch from afar the enemies approaching holy Church, and they resist mightily if any try to harm the Church, and, freely despising earthly things, they contemplate heavenly things. They are called the neck, therefore, on account of watching for enemies, and a tower on account of their strength and on account of the lofty contemplation of heavenly joys. This tower is rightly said to be David's, because David is interpreted as "strong of hand," by which Christ is signified, whose is whatever works with strength and loftiness. Of this it is added: 'Which is built with battlements; a thousand shields hang from it, all the armor of the mighty.' The tower of David is said to be built with battlements because the holy preachers are armed with miracles against hostile men, if need be. Against vices, however, they fortify themselves with shields, because lest they succumb to spiritual enemies, they defend themselves with virtues. On them hangs all the armor of the mighty, because whoever wishes to resist strongly the battalions of enemies sees in them examples by which he is able to vigorously overcome armed foes. A thousand here stands for perfection, because in the number one thousand all perfect numbers are completed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
