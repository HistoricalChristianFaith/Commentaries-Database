[[commentary]]
quote='''
But the Saints themselves, if they are still with us, both pray for those who ask them to pray and, when asked to carry the message, out of humility inquire as though they did not know, saying: What is your beloved more than another beloved, O most beautiful among women? But because the more ardently they love, the more sweetly they repeat words about him, they say the same thing again: What is your beloved more than another beloved, since you have so adjured us? The Bridegroom is called the beloved from the beloved: so that, clearly, through the repetition of love, the greatest love of the speaker may be shown. Or Christ is rightly called the beloved from the beloved, because if we love the Son, we consequently love also the Father from whom he is.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 5'
