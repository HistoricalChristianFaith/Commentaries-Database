[[commentary]]
quote='''
By the two breasts, two orders of preachers are designated: one in circumcision, the other in uncircumcision. They are fittingly called like two fawns of a doe, because they are children of the Synagogue and feed on the mountains of contemplation. They are called twins because they preach in harmony and think in harmony. They feed among the lilies until the day breathes and the shadows decline, because they pursue purity tirelessly until on the day of judgment they receive the rewards which they continually contemplate during the labors of the night.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 4'
