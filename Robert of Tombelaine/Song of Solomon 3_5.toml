[[commentary]]
quote='''
Resting delightfully among them, free from their disturbance, the Bridegroom forbids the wicked, saying: "I adjure you, O daughters of Jerusalem, by the gazelles and the deer of the fields, do not stir up nor awaken the beloved until she herself wills it." In this, certainly, he shows that after her conversion he will find some from the Synagogue of the same perfection as very many from the Church, since he takes equal delight in their rest and forbids any disturber from them, just as he forbade it from the Church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
