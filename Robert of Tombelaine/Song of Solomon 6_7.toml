[[commentary]]
quote='''
All these things said above about the Church, we have explained as best we could; therefore we now avoid repeating the same things about the Synagogue. There is one thing, however, that is not repeated in the same way: because there it says "like the pieces of a pomegranate," but here it says "like the rind of a pomegranate." I think nothing else is signified by this except the blood of the martyrs who will die under the Antichrist, and the unity of the faith under which many of the Jews will be bound together. While they endure the shedding of blood in their steadfastness, they will be adorned by the tribulation of faith as if by the redness of the rind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 6'
