[[commentary]]
quote='''
The neck of the bride is said to be like a tower of ivory; because the preachers of the Church are considered both lofty through contemplation, and strong through the exercise of holy works, and precious through divine wisdom.

Heshbon is interpreted as the girdle of sorrow. The eyes of the bride are therefore said to be like the pools in Heshbon, because while they are saddened by their pilgrimage, and strengthened by sorrow, they gird themselves against spiritual enemies; they wash themselves with tears, so that through them the peoples may be fittingly cleansed before God. Moreover, they are at the gate of the daughter of the multitude, because they stand in faith, through which they lead the multitude of the Church to heavenly things.

In the nose the discernment of smell is found. By the nose, therefore, the order of preachers is designated: because through them the fragrances of virtues and the stenches of vices are made known to us. But the nose stands like a tower of Lebanon: because once preachers are washed in the water of Baptism, and are made white by daily tears from the sins they committed against God, they become worthy to be raised higher and higher through fortitude. But the tower looks toward Damascus: because any holy preacher always opposes sinners. Damascus indeed is interpreted as "bloody," and it is said to the sinful nation: Your hands are full of blood (Isaiah 1:16). But because he spoke of the members, it is fitting that he speak of the head.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
