[[commentary]]
quote='''
Placed under the old Law, she awaited Christ, and ardently desired him who remained in the secret of the Father to come forth through the flesh to human eyes. Whence David too, in his longing, said: 'Arise, and do not reject us forever' (Ps. 43:23). And elsewhere: 'Bow your heavens and descend' (Ps. 144:5). And Isaiah, greatly desiring to see him, said: 'O that you would rend the heavens and come down' (Isa. 64:1). The Bride therefore wishes to find the Bridegroom outside and to kiss him, because, placed under the Law, she longs for him to appear in the flesh—so that she might serve him through love, whom previously, not having received grace, she served more through fear than through love. After his kiss she is now despised by no one, because after Christ came and poured the spirit of liberty into his faithful ones, the Church is honored even by the angels themselves. Hence it is that Joshua worshipped the angel (Josh. 5); but to John, who wished to worship him, he said: 'See that you do not do it, for I am your fellow servant and of your brothers who have the testimony of Jesus' (Rev. 22:9). But because the Church received him when he came, while the Synagogue rejected him—she who will receive and love him again at the end of the world—therefore the Church follows after and says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 8'
