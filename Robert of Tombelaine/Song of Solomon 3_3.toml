[[commentary]]
quote='''
What is designated by the watchmen, if not the teachers of the Church? For while they keep watch through writings and words for the sake of winning souls, whenever they perceive even a little desire, they never cease to increase it toward something better. These find the bride seeking, because they receive the devout soul striving to find Christ, and so that she may find him more quickly, they instruct her with precepts and kindle her with examples. Questioning them, she says: "Have you seen him whom my soul loves?" The bride is rightly said to question them, because while she searches through their writings or words with a watchful mind, speaking as if to those present even though absent through the attention of her soul, she inquires what they have understood concerning Christ. But because while she fixes her attention on them, she never finds the bridegroom, she consequently adds:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 3'
