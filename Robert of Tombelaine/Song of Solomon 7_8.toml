[[commentary]]
quote='''
He spoke truly, and ascended: because just as before the ages he determined to die for our death, so at the end of the world, merciful and faithful, he fulfilled it. Therefore he ascended the palm tree and took hold of its fruits: because, suspended on the cross, he found fruit, took hold of it, and bestowed it upon us. Whence what follows was fulfilled: 'And your breasts shall be like clusters of the vine.' Truly through the cross the breasts of the bride become like clusters of the vine; because in the death of Christ the senses of the soul received the two precepts of charity, by which the soul, being fed, may become intoxicated, and being intoxicated, may forget the things behind and stretch forward to the things ahead. With these breasts she also nourishes all her neighbors, and leads those who have been strengthened along with her to those things which she desires. Whence it is written: 'Let him who hears say: Come.' There follows: 'And the fragrance of your mouth is like apples' (Apoc. XXVIII, 17). Pomegranates, about which so much has been said above, are recalled here, to whose fragrance the fragrance of the bride's mouth is quite fittingly compared. We said above (Chapter 4) that by pomegranates the martyrs are signified. But by the mouth of the bride here we think her preaching should be understood. For while she preaches the virtues of the martyrs, while she stirs the hearts of her hearers to their likeness, while in the preaching of the one faith she reveals that there are many virtues, what else does she carry in her mouth but the fragrance of pomegranates? Because what she preaches both displays the redness of the rind in martyrdom, and demonstrates in the virtues a multitude of seeds under the same faith as if under the same rind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Robert%2520of%2520Tombelaine%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html'
source_title='Commentary on the Song of Songs, Chapter 7'
