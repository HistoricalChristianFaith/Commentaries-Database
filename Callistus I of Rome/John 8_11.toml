[[commentary]]
quote='''
Man, therefore, is cleansed of his sin, and rises again by the grace of God though he has fallen, and abides in his first position, according to the above-cited authorities. Let him see to it that he sin no more, that the sentence of the Gospel may abide in him: "Go, and sin no more."
'''
source_url=''
source_title="EPISTLE 2:6"
