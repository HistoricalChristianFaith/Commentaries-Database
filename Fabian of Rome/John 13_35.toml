[[commentary]]
quote='''
To the utmost of your power, dearly beloved brethren, do ye prohibit such accusations, and all unrighteous and injurious emulations, because contention is to be avoided by all means... Dearly beloved, beware of these things. Ponder these things, and minister comfort to the brethren in all things; for, as the Truth says in His own person, "By this shall all men know that ye are my disciples, if ye have love one to another."
'''
source_url='https://ccel.org/ccel/schaff/anf08.viii.viii.ii.iii.html'
source_title="Decretals, Epistles of Pope Fabian, To All the Bishops of the East, Of the right of bishops not to be accused or hurt by detraction"
