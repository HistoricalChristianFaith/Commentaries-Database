[[commentary]]
quote='''
And herein is the meaning of that word which the apostle speaks: "Now therefore there is utterly a fault among you, because ye go to law one with another. Why do ye not rather take wrong? why do ye not rather suffer yourselves to be defrauded?" To this, too, our Lord's word may refer: "And if any man will take away thy coat, and sue thee at the law, let him have thy cloak also." And in another place: "Of him that taketh away thy goods, ask them not again."
'''
source_url='https://ccel.org/ccel/schaff/anf08.viii.viii.ii.iii.html'
source_title="Decretals, Epistles of Pope Fabian, To All the Bishops of the East, Of the right of bishops not to be accused or hurt by detraction"
