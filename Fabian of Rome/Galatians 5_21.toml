[[commentary]]
quote='''
Those, furthermore, who commit those sins whereof the apostle says, "They who do such things shall not inherit the kingdom of God," are by all means to be guarded against, and are to be compelled to seek amendment if they do not choose it voluntarily, because they are marked with the stains of infamy, and go down into the pit, unless assistance is brought them by sacerdotal authority.
'''
source_url='https://ccel.org/ccel/schaff/anf08.viii.viii.ii.iii.html'
source_title="Decretals, Epistles of Pope Fabian, To All the Bishops of the East, Of the right of bishops not to be accused or hurt by detraction"
