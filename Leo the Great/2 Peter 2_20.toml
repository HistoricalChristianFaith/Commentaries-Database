[[commentary]]
quote='''
But in this mercifulness of God, dearly beloved, the greatness of which towards us we cannot explain, Christians must be extremely careful lest they be caught again in the devil's wiles and once more entangled in the errors which they have renounced. For the old enemy does not cease to "transform himself into an angel of light," and spread everywhere the snares of his deceptions, and make every effort to corrupt the faith of believers. He knows whom to ply with the zest of greed, whom to assail with the allurements of the belly, before whom to set the attractions of self-indulgence, in whom to instil the poison of jealousy: he knows whom to overwhelm with grief, whom to cheat with joy, whom to surprise with fear, whom to bewilder with wonderment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252027%2520On%2520the%2520Feast%2520of%2520the%2520Nativity%252C%25207.html'
source_title="SERMONS 27.3"
