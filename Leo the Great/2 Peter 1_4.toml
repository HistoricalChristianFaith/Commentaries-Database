[[commentary]]
quote='''
Christian, acknowledge thy dignity, and becoming a partner in the Divine nature, refuse to return to the old baseness by degenerate conduct. Remember the Head and the Body of which thou art a member. Recollect that thou wert rescued from the power of darkness and brought out into God's light and kingdom. By the mystery of Baptism thou wast made the temple of the Holy Ghost: do not put such a denizen to flight from thee by base acts, and subject thyself once more to the devil's thraldom: because thy purchase money is the blood of Christ, because He shall judge thee in truth Who ransomed thee in mercy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252021%2520On%2520the%2520Feast%2520of%2520the%2520Nativity%252C%25201.html'
source_title="SERMONS 21.3"
