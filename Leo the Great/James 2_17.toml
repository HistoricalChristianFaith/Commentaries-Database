[[commentary]]
quote='''
This virtue makes all virtues profitable; for by its presence it gives life to that very faith, by which "the just lives," and which is said to be "dead without works:" because as the reason for works consists in faith, so the strength of faith consists in works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252010%2520On%2520the%2520Collections%252C%25205.html'
source_title="Sermon 10 On the Collections, 5"
