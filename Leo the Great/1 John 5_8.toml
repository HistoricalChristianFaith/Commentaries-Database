[[commentary]]
quote='''
"This is He that came by water and blood, Jesus Christ: not by water only, but by water and blood. And it is the Spirit that testifieth, because the Spirit is the truth, because there are three that bear witness, the Spirit, the water and the blood, and the three are one." The Spirit, that is, of sanctification, and the blood of redemption, and the water of baptism: because the three are one, and remain undivided, and none of them is separated from this connection; because the catholic Church lives and progresses by this faith, so that in Christ Jesus neither the manhood without the true Godhead nor the Godhead without the true manhood is believed in.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FLetters%2FLetter%252028%2520To%2520Flavian%2520Commonly%2520Called%2520%2522The%2520Tome%2522.html'
source_title="LETTERS 28"
