[[commentary]]
quote='''
For the peace and order of the Lord's whole household will be shaken, if what is required in the body be not found in the head. Where is that precept of the blessed Apostle Paul uttered through the Spirit of God, whereby in the person of Timothy the whole number of Christ's priests are instructed, and to each one of us is said: "Lay hands hastily on no one, and do not share in other men's sins?" What is to lay on hands hastily but to confer the priestly dignity on unproved men before the proper age, before there has been time to test them, before they have deserved it by their obedience, before they have been tried by discipline? And what is to share in other men's sins but for the ordainer to become such as is he who ought not to have been ordained by him?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FLetters%2FLetter%252012.html'
source_title="LETTERS 12.2"
