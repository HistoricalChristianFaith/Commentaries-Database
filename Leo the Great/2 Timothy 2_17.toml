[[commentary]]
quote='''
And as for the deception of primitive man he used the services of a serpent, so to mislead the minds of the upright he has armed these men's tongues with the poison of his falsehoods. But these treacherous designs, dearly beloved, with a shepherd's care, and so far as the Lord vouchsafes His aid, we will defeat. And taking heed lest any of the holy flock should perish, we admonish you with fatherly warnings to keep aloof from the "lying lips" and the "deceitful tongue" from which the prophet asks that his soul should be delivered; because "their words," as says the blessed Apostle, "do creep as doth a gangrene." They creep in humbly, they arrest softly, they bind gently, they slay secretly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252016%2520On%2520the%2520Fast%2520of%2520the%2520Tenth%2520Month.html'
source_title="SERMONS 16.3"
