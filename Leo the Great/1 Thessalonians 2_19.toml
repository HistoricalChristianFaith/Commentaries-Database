[[commentary]]
quote='''
I entreat you, therefore, by the mercies of the Lord, aid with your prayers him whom you have sought out by your solicitations, that both the Spirit of grace may abide in me and that your judgment may not change. May He who inspired you with such unanimity of purpose, vouchsafe to us all in common the blessing of peace: so that all the days of my life being ready for the service of Almighty God, and for my duties towards you, I may with confidence entreat the Lord: "Holy Father, keep in Thy name those whom Thou hast given me:" and while you ever go on unto salvation, may "my soul magnify the Lord," and in the retribution of the judgment to come may the account of my priesthood so be rendered to the just Judge, that through your good deeds you may be my joy and my crown, who by your good will have given an earnest testimony to me in this present life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%25201%2520Preached%2520on%2520His%2520Birthday%252C%2520or%2520Day%2520of%2520Ordination.html'
source_title="SERMON 1.2"
