[[commentary]]
quote='''
Our state of peace, therefore, dearly-beloved, has its dangers, and it is vain for those who do not withstand vicious desires to feel secure of the liberty which is the privilege of their Faith. Men's hearts are shown by the character of their works, and the fashion of their minds is betrayed by the nature of their actions. For there are some, as the Apostle says, "who profess that they know God, but deny Him by their deeds." For the charge of denial is truly incurred when the good which is heard in the sound of the voice is not present in the conscience. Indeed, the frailty of man's nature easily glides into faults.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252036%2520On%2520the%2520Feast%2520of%2520the%2520Epiphany%252C%25206.html'
source_title="Sermon 36 On the Feast of the Epiphany, 6"
