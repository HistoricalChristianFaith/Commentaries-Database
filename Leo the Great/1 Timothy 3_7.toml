[[commentary]]
quote='''
At least the wishes of the citizens should have been waited for, and the testimony of the people: the opinion of those held in honour should have been asked, and the choice of the clergy—things which those who know the rules of the fathers are wont to observe in the ordination of priests: that the rule of the Apostle's authority might in all things be kept, which enjoins that one who is to be the priest of a church should be fortified, not only by the attestation of the faithful but also by the testimony of "those who are without," and that no occasion for offence be left, when, in peace and in God-pleasing harmony with the full approval of all, one who will be a teacher of peace is ordained.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FLetters%2FLetter%252010%2520To%2520the%2520Bishops%2520of%2520the%2520Province%2520of%2520Vienne%2520In%2520the%2520Matter%2520of%2520Hilary%252C%2520Bishop%2520of%2520Arles.html'
source_title="LETTERS 10.4"
