[[commentary]]
quote='''
That which was fore-known in respect of the Jews' malice is far different, indeed quite contrary to what was ordained in respect of Christ's Passion. Their desire to slay Him did not proceed from the same source as His to die: nor were their atrocious crime and the Redeemer's endurance the offspring of One Spirit. The Lord did not incite but permit those madmen's naughty hands: nor in His foreknowledge of what must be accomplished did He compel its accomplishment, even though it was in order to its accomplishment that He had taken flesh. In fact, the case of the Crucified is so different from that of His crucifiers that what Christ undertook could not be reversed, while what they did could be wiped out. For He Who came to save sinners did not refuse mercy even to His murderers, but changed the evil of the wicked into the goodness of the believing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252067%2520%2528on%2520the%2520Passion%252C%252016%253A%2520Delivered%2520on%2520the%2520Sunday%2529.html'
source_title="SERMON 67.2-3"
