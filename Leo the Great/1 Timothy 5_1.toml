[[commentary]]
quote='''
Because, although as a rule there exist among careless or slothful brethren things which demand a strong hand in rectifying them; yet the correction ought to be so applied as ever to keep love inviolate. Wherefore also it is that the blessed Apostle Paul, in instructing Timothy upon the ruling of the Church, says: "An elder rebuke not, but intreat him as a father: the young men as brethren: old women as mothers: young women as sisters in all purity." And if this moderation is due by the Apostle's precept to all and any of the lower members, how much more is it to be paid without offence to our brethren and fellow-bishops? in order that although things sometimes happen which have to be reprimanded in the persons of priests, yet kindness may have more effect on those who are to be corrected than severity: exhortation than perturbation: love than power.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FLetters%2FLetter%252014%2520To%2520Anastasius%252C%2520Bishop%2520of%2520Thessalonica.html'
source_title="LETTERS 14.1"
