[[commentary]]
quote='''
Wherefore since the loving-kindness is manifest, dearly beloved, wherewith all the riches of Divine goodness are showered on us, whose call to eternal life has been assisted not only by the profitable examples of those who went before, but also by the visible and bodily appearing of the Truth Itself, we are bound to keep the day of the Lord's Nativity with no slothful nor carnal joy. And we shall each keep it worthily and thoroughly, if we remember of what Body we are members, and to what a Head we are joined, lest any one as an ill-fitting joint cohere not with the rest of the sacred building.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252023%2520On%2520the%2520Feast%2520of%2520the%2520Nativity%252C%25203.html'
source_title="SERMONS 23.5"
