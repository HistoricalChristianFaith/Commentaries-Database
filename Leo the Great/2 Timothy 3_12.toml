[[commentary]]
quote='''
But I am surprised, beloved, that you are so disturbed by opposition in consequence of offences, from whatever cause arising, as to say you would rather be relieved of the labours of your bishopric, and live in quietness and ease than continue in the office committed to you. But since the Lord says, "blessed is he who shall persevere unto the end," whence shall come this blessed perseverance, except from the strength of patience? For as the Apostle proclaims, "All who would live godly in Christ shall suffer persecution." And it is not only to be reckoned persecution, when sword or fire or other active means are used against the Christian religion; for the direst persecution is often inflicted by nonconformity of practice and persistent disobedience and the barbs of ill-natured tongues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FLetters%2FLetter%2520167%2520To%2520Rusticus%252C%2520Bishop%2520of%2520Gallia%2520Narbonensis%252C%2520with%2520the%2520Replies%2520to%2520His%2520Questions%2520on%2520Various%2520Points.html'
source_title="Letter 167 To Rusticus, Bishop of Gallia Narbonensis, with the Replies to His Questions on Various Points"
