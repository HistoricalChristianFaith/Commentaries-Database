[[commentary]]
quote='''
Let those who wish Christ to spare them, have mercy on the poor; let them give freely to feed the wretched, who desire to attain to the society of the blessed. Let no man consider his fellow vile, nor despise in any one that nature which the Creator of the world made His own. For who that labours can deny that Christ claims that labour as done unto Himself? Your fellow-slave is helped thereby, but it is the Lord who will repay. The feeding of the needy is the purchase money of the heavenly kingdom and the free dispenser of things temporal is made the heir of things eternal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%25209%2520Upon%2520the%2520Collections%252C%25204.html'
source_title="SERMONS 9.2"
