[[commentary]]
quote='''
Against his plots every believer must keep careful watch that he may crush his foe on the side whence the attack is made. And there is no more powerful weapon, dearly-beloved, against the devil's wiles than kindly mercy and bounteous charity, by which every sin is either escaped or vanquished. But this lofty power is not attained until that which is opposed to it be overthrown. And what so hostile to mercy and works of charity as avarice, from the root of which spring all evils? ... Let us then, dearly-beloved, resist this pestilential evil and "follow after charity," without which no virtue can flourish, that by this path of love whereby Christ came down to us, we too may mount up to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252074%2520%2528on%2520the%2520Lord%2527s%2520Ascension%252C%25202%2529.html'
source_title="SERMON 74.5"
