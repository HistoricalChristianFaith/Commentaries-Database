[[commentary]]
quote='''
For he who is to be enrolled on the divine service ought to be exempt from others, that he be not drawn away from the Lord's camp in which his name is entered, by any other bonds of duty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FLetters%2FLetter%25204%2520To%2520the%2520Bishops%2520Appointed%2520in%2520Campania%252C%2520Picenum%252C%2520Etruria%252C%2520and%2520All%2520the%2520Provinces.html'
source_title="Letter 4 To the Bishops Appointed in Campania, Picenum, Etruria, and All the Provinces"
