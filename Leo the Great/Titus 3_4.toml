[[commentary]]
quote='''
Accordingly let those men cease their complaints who with disloyal murmurs speak against the dispensations of God, and babble about the lateness of the Lord's Nativity as if that, which was fulfilled in the last age of the world, had no bearing upon the times that are past. For the Incarnation of the Word did but contribute to the doing of that which was done: and the mystery of man's salvation was never in the remotest age at a standstill. What the apostles foretold, that the prophets announced: nor was that fulfilled too late which has always been believed. But the Wisdom and Goodness of God made us more receptive of His call by thus delaying the work which brought salvation: so that what through so many ages had been foretold by many signs, many utterances, and many mysteries, might not be doubtful in these days of the Gospel: and that the Saviour's nativity, which was to exceed all wonders and all the measure of human knowledge, might engender in us a Faith so much the firmer, as the foretelling of it had been ancient and oft-repeated.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252023%2520On%2520the%2520Feast%2520of%2520the%2520Nativity%252C%25203.html'
source_title="SERMONS 23.4"
