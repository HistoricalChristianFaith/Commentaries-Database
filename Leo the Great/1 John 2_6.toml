[[commentary]]
quote='''
In Him therefore we find our Model of patience, in Whom we have our Hope of life eternal; for "if we suffer with Him, we shall also reign with Him," since, as the Apostle says, "he that saith he abideth in Christ ought himself also to walk as He walked." Otherwise we make a vain presence and show, if we follow not His steps, Whose name we glory in, and assuredly they would not be irksome to us, but would free us from all dangers, if we loved nothing but what He commanded us to love.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Leo%2520the%2520Great%2FSermons%2FSermon%252090%2520%2528on%2520the%2520Fast%2520of%2520Seventh%2520Month%252C%25205%2529.html'
source_title="SERMONS 90.2"
