[[commentary]]
quote='''
But whoever believes him, prepares persecution for himself; for this same most wicked enemy, by evil persuasion, performs lying signs and wonders, so that men may believe him to be God and offer him divine worship. Therefore, those who believe him, he spiritually kills in their soul; but those who resist, he afflicts with bodily torment. Therefore it happens, which must be read with great sorrow of mind, that he might destroy a great number of the people of Israel, when he converts many from the Christian faith into apostasy: he takes the spoils of the city, when he removes the ornaments of the church; he sets it on fire, when he devastates it with persecution; he destroys its houses and walls all around, when he scatters the people of believers and kills their defenders, that is, the teachers, and leads captive the women, and the children, and the livestock, because those who are soft in spirit and are children in understanding and serve carnal desires, living after the manner of brute animals, are especially open to the captivity and snare of the ancient enemy, with the churches of Christ devastated and his ministers scattered because of persecution, the evil enemy strives to establish the art of wickedness in their place and to substitute blasphemous worshipers, so that, if possible, through wicked men, the Christian name, which alone has prevailed in the world, may be utterly destroyed, and the will of the Devil may be fulfilled in the pollution of idols and the multiplication of sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
