[[commentary]]
quote='''
Lightning emissions are the thunder of proclamations, or the flashes of miracles, which will go directly: because, according to the privilege of their author, they occur for the benefit of the elect or for the damnation of the reprobate. They will be discharged like from a well-bent bow of clouds, when, by the authority of the divine Scriptures, through the virtuous intention of the holy doctors, they are brought forth to terrify adversaries; and they will leap to a certain place, because they proceed in a straight path against those whom it is necessary, nor can it be confused, what divine wisdom is known to be ordered. And hailstones are sent from the stony wrath: because, according to the equality of merits, harsh rebukes are issued.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
