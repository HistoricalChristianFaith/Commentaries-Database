[[commentary]]
quote='''
Likewise, the soldiers of Christ should by no means be quickly confident of victory when war is imminent, but ought to fight as long as necessary, until they are certain of the destruction of their spiritual enemies. For when, by pursuing sinners or unbelievers, they have converted them to repentance for their sins and to faith in Christ, which works through love to produce good deeds, then they must gather their spoils, that is, make use of their knowledge and share in the industry of their virtuous labor. For in gold we may understand knowledge, in silver eloquence, in hyacinth heavenly conduct, in purple the shedding of blood through martyrdom. Then indeed we gather these riches fruitfully, we find them acceptable in true faith, if, however, we transfer this victory to spiritual enemies. Then we ought to be secure, when after the end of this present life there is no longer any need to fear the snares of enemies. For then we gather the spoils profitably, when we receive from Christ the rewards worthy of our labor. Therefore it is rightly said that Judas exhorted his companions not to crave the spoils while the fierce wars of the enemies were still threatening; but when the enemies were utterly defeated, then he returned with his men to gather the spoils of the camps, because it is necessary for every preacher to warn his listeners to beware of the darts of enemies as long as it is a time of war. But when the time of peace comes, namely, that peace which the Savior promised to his disciples, saying: My peace I give to you (Jn. 14:27), then both superiors and subjects together will have eternal joy from the reward received, because they will no longer fear the pain of further labors and tears; then, because it is the time to sing praises to God their helper.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
