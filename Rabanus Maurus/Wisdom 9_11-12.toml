[[commentary]]
quote='''
For all things are naked and open before the eyes of the wisdom of God, nor does any thought escape it; therefore, the one whom it governs, it leads soberly along the path of virtues, and truly protects from the injuries of adversaries, and by making his works acceptable, will render him worthy of the reward of the saints in the heavenly kingdom. But because it belongs to God alone to know what He Himself wills, and He acts in all things by His own command, therefore this praiser of the works of God, suddenly struck with awe, marvels at His greatness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
