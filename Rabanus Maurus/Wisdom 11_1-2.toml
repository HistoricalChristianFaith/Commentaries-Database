[[commentary]]
quote='''
The former people, departing from Egypt under the leadership of Moses, journeyed through the deserts and pitched their tents in uninhabitable places, as the history of the Pentateuch recounts. In the same way, the people who follow now, that is, the Christians, journey through the desert of this world under the guidance of prophecy, so that, with Christ reigning, they may reach the homeland of the heavenly kingdom. This is also clearly stated by the Apostle Peter, who says: We have the more sure prophetic word, to which you do well to pay attention, as to a lamp shining in a dark place, until the day dawns and the morning star rises in your hearts (2 Peter 1:19).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
