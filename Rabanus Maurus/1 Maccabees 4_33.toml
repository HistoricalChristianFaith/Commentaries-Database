[[commentary]]
quote='''
There are five books of the law of God, and, as we have previously said, there are five senses in the body. For whoever, according to the teaching of the law, restrains the lust of the flesh, turning away his eyes so that they do not look upon vanity, stopping his ears so that they do not hear a slanderous tongue (Ps. 119:37), and obscene songs against worldly things, by which, when frequently heard, the inner man is defiled; whoever restrains his sense of smell and taste so that he does not use them for the lure of pleasures; whoever keeps his tongue from evil, and his lips from speaking deceit, turns away from evil and does good, seeks peace and pursues it (Ps. 34:13-14), this person, overcoming his enemies, will gain the most beneficial victory and will rejoice in the greatest triumph. But spiritual Lysias, although once, twice, or even three times crushed and put to flight, nevertheless does not cease from the wickedness he has undertaken, but revived, he again renews the battles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
