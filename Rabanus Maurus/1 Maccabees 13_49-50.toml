[[commentary]]
quote='''
Those who were in the citadel of Jerusalem and were attacking the Jews themselves signify the heretics and schismatics who, establishing themselves in the fortress of their own pride, stir up disputes and wars against Catholics. Simon forbids them to go out and enter the region and to buy and sell, because the holy teachers, together with the Catholics, order that no communion of fellowship at all be maintained with such people. For this reason many of them perished by famine, because many of them, once they were cut off outside the communion of the Church with anathema, perish through hunger for the word of God and lack of spiritual knowledge. But because, driven by extreme necessity, people of this sort asked that right hands of fellowship be given them by the Church, this agreement is imposed on them by the Church itself: that they abandon their errors, anathematize the wicked sects to which they had previously observed, and cleanse their conscience from all the wickedness of heretics, and therefore they are restored to the communion of the Church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
