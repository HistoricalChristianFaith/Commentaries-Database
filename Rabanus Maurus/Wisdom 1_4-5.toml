[[commentary]]
quote='''
For wisdom will not enter into a malicious soul, nor dwell in a body subject to sins. In agreement with this testimony, the apostle James wrote similarly in his Epistle, saying: Can a fig tree, my brethren, bear olives, or a vine figs? So neither can salt water make sweet. Who is wise and learned among you? Let him show by good conduct his works in the meekness of wisdom. But if you have bitter jealousy and strife in your hearts, do not glory and be liars against the truth. For this wisdom does not descend from above, from the Father of lights; but is earthly, sensual, devilish. For where there is jealousy and dispute, there is instability and every evil work. But the wisdom that is from above is first indeed pure, then peaceable, gentle, compliant, full of mercy and good fruits, judging without hypocrisy. And the fruit of righteousness is sown in peace by those who make peace (James 3:12-18). For true wisdom does not enter into a hateful mind, nor can it dwell in a wicked man; therefore, in vain do the philosophers of the Gentiles flatter themselves, and all heretics, as well as false Christians, who think that with a base mind and wicked conduct they can receive the wisdom of God, which only those with a pure heart are worthy to receive as a gift of the Holy Spirit. Because wisdom will not enter a deceitful soul. Therefore, it is most certain that Mani, Arius, and Eunomius, and the other heretics, composed their doctrines, most full of errors, without the grace of the Holy Spirit, because the good Spirit of the Lord always leads into the right way; but the evil spirit deceives, and drags his followers with him into the snare of eternal perdition, concerning whom it is also added: and will be put to the test when unrighteousness comes in. For when the time of retribution comes, all the wicked and sinners will receive perpetual punishment for their iniquities.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
