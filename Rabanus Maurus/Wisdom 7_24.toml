[[commentary]]
quote='''
What can be more mobile and subtle than wisdom, which created all things, governs all things, arranges all things, directs all things? For in it we live, move, and have our being. Moreover, it reaches everywhere because of its purity, for it is light, and there is no darkness at all in it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
