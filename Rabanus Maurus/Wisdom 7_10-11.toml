[[commentary]]
quote='''
The salvation of the soul, which is in the possession of divine wisdom, together with works of justice, must absolutely be preferred to all bodily health and to every kind of corporeal things, because, as will be shown later, this wisdom is more beautiful than the sun and surpasses every arrangement of the stars; compared to light, it is found to be purer, since night and darkness follow them, but its light is inextinguishable. Moreover, that all good things came to him together with it was experienced by Solomon himself, who, asking God for wisdom alone, also obtained with it the greatness of the kingdom, riches, and glory. Mystically, however, whoever has truly received the knowledge of Christ rejoices that he possesses the grace of all virtues together, and in the future will possess eternal life with Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
