[[commentary]]
quote='''
The book of Exodus narrates how the Lord, through Moses and Aaron, struck the Egyptians, namely, the enemies of God’s people with ten plagues, and at times allowed them to breathe amidst these plagues, so that, having been chastised, they might be corrected. But because they persisted in wickedness, they were destroyed by divine vengeance. On the other hand, the people of God, to whom the promise was made and to their fathers, were scarcely chastised and partly comforted, as long as they endured to be educated by discipline. However, after they spurned the Gospel of Christ and crucified the Son of God, they were, in a wondrous manner, turned from friends into enemies, and therefore expelled from their own land, dispersed throughout the whole world, and finally felt harshly chastised, which previously they refused to understand when corrected by paternal kindness. We can similarly interpret this sentiment regarding the martyrs of Christ and their persecutors, because when those persecutors tortured the confessors of Christ with torments, they could, if they wished, be instructed by their patience to abandon the worship of idols and submit themselves to the Christian religion. But just as the martyrs attained eternal glory through temporal sufferings, so too did the persecutors, after the brief joys of this life, sink into eternal punishments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
