[[commentary]]
quote='''
Wisdom, therefore, wherever it dwells, always governs the mind well. For the powers of the body, being mostly foolish, often cast themselves into the abyss of sins: therefore the wise is preferred to the strong, because wisdom directs the steps of man; but bodily strength, although sometimes, when it has overcome someone through power, may imitate strength, yet without the guidance of carefulness it will appear weak, when it is exhausted by foolish labor. Therefore it is written in the psalm: He will not take pleasure in the strength of the horse; nor is there delight in the legs of a man. The Lord's delight is in those who fear Him, and in those who hope in His mercy (Ps. 147:10–11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
