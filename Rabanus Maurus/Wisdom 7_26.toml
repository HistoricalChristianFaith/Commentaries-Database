[[commentary]]
quote='''
The Apostle says of the same Son: Who, being the brightness of glory, and the express image of his substance, and upholding all things by the word of his power (Heb. 1:3). For the Father calls him Wisdom itself so that he is his Word, not as a word is uttered from the mouth with sound, or thought before it is spoken; for this is accomplished within the spans of time, but that is eternal, and by enlightening he tells us both about himself and about the Father, what must be said to men, and therefore he says: No one knows the Son except the Father, and no one knows the Father except the Son, and anyone to whom the Son chooses to reveal him (Matt. 11:27). Because the Father reveals through the Son, that is, through his Word. For if this word which we utter is temporal and transitory, and shows itself and that about which we speak; how much more does the Word of God, through whom all things were made, show the Father as he is, because it too is as he is, and this is what the Father is, according to wisdom and essence. For according to the Word, he is not what the Father is, because the Word is not the Father; and the Word is spoken of relatively, as the Son, who certainly is not the Father; and therefore Christ is the power and wisdom of God, because from the Father as power and wisdom, he too is power and wisdom, as the light of God and from the Father as light, and the fountain of life with God the Father, who is surely the fountain of life: For with you, he says, is the fountain of life. In your light we shall see light (Ps. 36:9); because as the Father has life in himself, so he has granted the Son to have life in himself (Jn. 5:26). And he was the true light which enlightens every man coming into this world; and this light was the Word with God, but the Word was also God. Now God is light, and in him there is no darkness at all. But the light is not bodily but spiritual; nor is it so spiritual that it is made by illumination, as was said to the apostles: You are the light of the world; but the light which enlightens every man, that very highest wisdom is God, of whom we are now speaking. Therefore the Son is Wisdom, from the Father who is Wisdom: as light from light, and God from God, so that both the Father is light, and the Son is light, and the Father is God, and the Son is God. Therefore both the Father is wisdom, and the Son is wisdom, and therefore both together are one light, and one God, therefore both one wisdom, but the Son was made wisdom for us from God, and righteousness and sanctification, because we turn to him temporally, and that from a certain time, so that we may remain with him forever, and he too from a certain time the Word was made flesh, and dwelt among us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
