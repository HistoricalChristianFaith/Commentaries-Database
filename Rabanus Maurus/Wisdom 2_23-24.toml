[[commentary]]
quote='''
By this statement, the error of the Manichaeans is refuted, who introduced two natures and substances, that is, good and evil: because our Creator is not the author of our downfall, and as far as the truth of nature is concerned, we were created immortal by Him. However, by assenting to the serpent's suggestion, we were subjected to the sentence of death; yet the first robe of immortality, which the human race, created in the image of God from the beginning but lost in Adam through the Devil's envy and seduction, was received again through the death of Christ: for our death was destroyed in His death, and our life was restored in His resurrection, although those who choose to be imitators of the Devil's envy rather than of Christ's humility and gentleness do not belong to that destiny.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
