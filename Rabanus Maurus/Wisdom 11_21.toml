[[commentary]]
quote='''
Nothing is impossible for the Almighty, therefore no one can resist Him; for all things are placed in the will of the Lord, and there is no one who can resist His will. Whatever God willed, He did in heaven and on earth, in the sea and in the depths. Therefore, the arm of the Lord is none other than the only-begotten Son of God, to whom it is said through Isaiah: Arise, arise, put on strength, O arm of the Lord. Arise as in the ancient days, in generations of old. Was it not you who struck the proud one, who wounded the dragon? etc. (Isa. 51:9). The prophet speaks on behalf of the people to the arm of the Lord, and requests His coming, so that He who for many ages delivered His saints from dangers, now coming in person may defend His chosen ones from their enemies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
