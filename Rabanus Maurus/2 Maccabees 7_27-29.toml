[[commentary]]
quote='''
Arming him therefore and strengthening him, and in that moment bringing forth her son by a happier birth, she said: "My son, have pity on me, who carried you in my womb for nine months, and gave you milk for three years, and nourished you, and brought you to this age. I beg you, my son, look upon heaven and earth; and seeing all that is in them, understand that God made them out of nothing, as well as the race of men. Therefore, my son, do not fear this executioner, but, proving yourself worthy of your brothers, accept death, so that in that mercy I may receive you together with your brothers." Great is the praise of the mother in her call to courage, but greater still in the fear of God and in the truth of faith, in that she promised nothing for herself or for her son from the honor of the six martyrs, nor did she believe that the plea of the brothers would be of any avail for the salvation of one who denied; instead she persuaded him rather to become a sharer in their passion, so that on the day of judgment he might be found together with his brothers. After these things the mother also dies with her children; for nothing else was now fitting, since she who had borne and made martyrs should be joined with them in the fellowship of glory, and that she herself should follow those whom she had sent on before to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
