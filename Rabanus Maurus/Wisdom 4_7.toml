[[commentary]]
quote='''
Having previously spoken about the destruction of the wicked, he now afterward explains the rest of the good, because after the end of the present life, which is common to both good and bad, the just will then begin to live better, when they seem to be utterly destroyed by the wicked, since eternal rest will then be given to them, when perpetual punishment follows for these.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
