[[commentary]]
quote='''
Because He is found by those who do not test Him, but He appears to those who have faith in Him. For it is dangerous to tempt God by human assumption, since it is written: You shall not tempt the Lord your God. (Deut. 6:16) But it is beneficial to honor Him with true faith, because the righteous shall live by faith. For true wisdom by no means enters a wicked mind, nor can it dwell in a wicked man; therefore the philosophers of the Gentiles flatter themselves in vain, and all heretics, as well as false Christians, who think that with a defiled mind and criminal conduct they can receive the wisdom of God, which only those of a pure heart deserve to receive by the gift of the Holy Spirit. For perverse thoughts separate from God; but proven virtue corrects the foolish. It is clear that every wicked thought and depraved will can in no way be joined to the Lord, nor be in harmony with the highest good; for there is no fellowship between light and darkness, nor agreement between Christ and Belial. But where the intention and pursuit of sacred virtues are present in a devout heart, they always reject the vices of the foolish and refute their errors; therefore, those who truly love wisdom must cleanse their hearts and direct the whole intention of their mind to the love of their Creator.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
