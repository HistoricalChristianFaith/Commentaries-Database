[[commentary]]
quote='''
That which, the multitude leave is taken up by the disciples, because the more secret mysteries which cannot be comprehended by the uninstructed, are not to be treated with neglect, but are to be diligently sought out by the twelve Apostles (who are represented by the twelve baskets) and their successors. For by baskets servile offices are performed, and God has chosen the weak things of the world to confound the strong.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
