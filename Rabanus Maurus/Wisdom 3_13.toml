[[commentary]]
quote='''
The cursed creature of those, that is, their creation. For divine wisdom does not impose the mark of a curse on the creatures of God, whom their Creator blessed at the beginning when He created them, but shows that the work of the depraved is worthy of eternal curse. for the barren woman is happy; and the undefiled one, who has not known the bed in sin, will have fruit in the consideration of holy souls. He praises the barren, that is, the chaste and disciplined soul, which is not defiled by the filth of heretics, nor contaminated by the impurities of idolatry; for this soul will have fruit in the regard of holy souls, indeed on the day of judgment, when the saints will be taken up to contemplate the glory of God, then she too will receive the reward of her labor in heavenly blessedness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
