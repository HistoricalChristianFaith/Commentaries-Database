[[commentary]]
quote='''
Now he shows what this is, which he previously said had departed from the Lord, that is, to cast away wisdom and discipline, of which hope is empty, and labors are without fruit, because they vainly hope that they can use temporal things perpetually, or that by committing sins they can escape unpunished. The labors of these people are without the fruit of future reward, and their works are rundown: for the workers themselves cannot make anyone a participant in the heavenly dwelling. Against this, when the Psalmist foretold the crimes of the chief of all the wicked by reproaching him, he said: Therefore God will destroy you forever, He will pluck you out and remove you from your tent, and uproot your root from the land of the living (Ps. 52:5). Heretics also cannot inappropriately be understood in this statement, who, rejecting divine wisdom and the rule of right faith, spend the labors of their doctrine and the sects of their errors in vain and without the fruit of eternal life, whose intention is foolish and whose works are most wicked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
