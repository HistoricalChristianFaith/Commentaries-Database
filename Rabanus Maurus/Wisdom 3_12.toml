[[commentary]]
quote='''
He calls women either carnal desires or interpretations of wicked sense: from which the most wicked children, that is, nefarious acts or perverse doctrines, proceed, who are liable not to the reward of the heavenly kingdom, but to the torment of Hades.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
