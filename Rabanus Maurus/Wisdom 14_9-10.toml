[[commentary]]
quote='''
Therefore, it is also said through Jeremiah: Every man has become foolish by his own knowledge, every maker of idols is confounded by his carved image, because his molten image is false, and there is no spirit in them; for their works are vain and worthy of ridicule; in the time of their visitation, they shall perish (Jer. 10:14-15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
