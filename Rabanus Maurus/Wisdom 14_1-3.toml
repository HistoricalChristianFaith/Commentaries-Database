[[commentary]]
quote='''
He likewise presents these things, just as the previous ones, as a reproach against idolaters, because it is the greatest folly that a man, created in the image of God, possessing a rational soul from Him, by which he was able to devise the art of how to have a way to travel on the waves, building a ship according to his skill in the craft, does not give honor to Him who gave him this knowledge, but rather invokes an idol which he himself has fashioned with similar skill but even greater vanity. For since he is greater and better by reason of nature than the insensible thing which he himself has shaped into some image, he ought not to have erred so that the greater worships the lesser, because the lesser ought to seek help from the greater, not the greater from the lesser. Moreover, by divine gift, just as the preparation of the ship, so also the course of sailing must be sought, because the Almighty Creator destroys whomever He abandons; but whoever is guided by Him exults in complete prosperity. But all heretics who, in their doctrines, establish various images of errors, are therefore engulfed in the waves of this world, because they have abandoned the ship of the Church and did not wish to have God as their guide.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
