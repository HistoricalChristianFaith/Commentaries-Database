[[commentary]]
quote='''
This is what is written in the psalm: Many are the scourges of the sinner, but mercy will surround those who hope in the Lord (Ps. 32:10). For there is a great difference between the judgment of the elect and that of the depraved, because the Lord corrects the former to cleanse them from sins and restrain them from vices, but the latter so that they may pay the penalties for their pride and treachery, and recognize that they cannot resist the ruler of all. Indeed, happy is he who always keeps before his eyes the compassion and goodness of his judge when judging, and just as he wishes the Lord to have mercy on him, so he should not refuse to have mercy on others, because judgment will be without mercy for him who does not show mercy. For blessed are the merciful, for they shall obtain mercy (Matt. 5:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
