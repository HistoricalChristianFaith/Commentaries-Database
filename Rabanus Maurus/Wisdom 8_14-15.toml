[[commentary]]
quote='''
Holy teachers arrange the peoples and the nations subject to them to live with discipline, when they open up and explain to them the testimonies of the Law and the Prophets, and make them obey the sacred words of the Gospel. They no longer allow them to wander, wavering through various sects, but compel them to preserve the truth of faith and the purity of doctrine in all things. Even the most savage persecutors and dreadful kings are forced to yield to their patience, because they are in no way able to resist the power of Christ, who works wonders in them. He said to his disciples in the Gospel: "In the world you will have tribulation, but take courage, for I have overcome the world" (Jn. 16:33). And again: "He who is in you is greater than he who is in the world." (1 Jn. 4:4) Therefore, among the multitude of the faithful, they appear sincere and kind, but in battle against their adversaries, they are loyal and most courageous. But while these things are done outwardly, let us hear what wisdom grants them inwardly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
