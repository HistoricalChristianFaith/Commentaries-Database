[[commentary]]
quote='''
He calls a just people and a seed without complaint the people of Israel, who, descending from the seed of the patriarchs, became worshippers of the one God, but were oppressed by the Egyptians and other nations. Through the leadership of Moses and Aaron, they were delivered from there and exalted by the wonders of God, that is, by the crossing of the Red Sea, by the protection of the cloud by day, the brilliance of fire by night, and by the other miracles that were abundantly performed among them in the desert. Mystically, however, the Lord delivers his chosen ones from the hands of their persecutors, and through the flashing of miracles terrifies their adversaries, and gives his servants wisdom which none of their adversaries will be able to resist or contradict. Therefore, even before kings and powers of this world, they stand unafraid, confidently speaking the word of God, and through the suffering of the martyrs, they attain the rewards of the heavenly kingdom, where perpetually and without end they sing worthy praises to their King and Deliverer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
