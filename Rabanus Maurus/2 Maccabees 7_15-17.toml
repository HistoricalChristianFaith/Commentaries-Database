[[commentary]]
quote='''
The fifth, besides the fact that by the strength of his faith he trampled underfoot the king's butchery and cruel and manifold torments, was also, inspired by the spirit of divinity to foreknowledge and understanding of things to come, a prophet to the king of the indignation of God and of the vengeance that would swiftly follow: "Having power among men," he says, "though you are mortal, you do what you will. But do not suppose that our race has been forsaken by God. Only wait, and you will see His great power, how He will torture you and your seed." What a relief that was to the martyr, how great, how immense a consolation in his torments, not to think of his own sufferings, but to proclaim the punishments of his torturer!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
