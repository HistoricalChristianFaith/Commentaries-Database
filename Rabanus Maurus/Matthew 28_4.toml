[[commentary]]
quote='''
These who had not the faith of love were shaken with a panic fear; and they who would not believe the truth of the resurrection become themselves as dead men.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252028.html'
source_title='Catena Aurea by Aquinas'
