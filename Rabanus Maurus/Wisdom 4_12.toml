[[commentary]]
quote='''
By this statement, although generally the immorality of the wicked is denoted, more clearly, however, the cunning of heretics is reproved in it, which, by depraved doctrines and harmful desire, turns the mind of man away from the path of truth; for it fascinates, that is, it burdens, whoever hinders by flattering or deceives by praising. We read in the Apostle: You were running well; who has fascinated you? (Gal. 3:1). And in Proverbs: The gift of the envious torments the eyes. (Sir. 18:18) He who is envious among us is more significantly called a fascinator among the Greeks. In these examples, we are taught that either the envious person is tormented by another's happiness, or he in whom there are some good things is harmed by another who fascinates or envies. For the envy of heretics, which is accustomed to offer mere plays, not the foundation of truth, often obscures the good things of mortality in the simple, as in that saying: Evil communications corrupt good manners (1 Cor. 15:33). Therefore Wisdom forbids having fellowship with such people, saying in Proverbs: Do not eat with an envious man, nor desire his foods, for he estimates what he does not know as the likeness of a diviner and a soothsayer. Eat and drink, he will say to you, but his heart is not with you. The foods which you have eaten you will vomit up, and you will lose your beautiful words (Prov. 23:6-8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
