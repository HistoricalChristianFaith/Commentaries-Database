[[commentary]]
quote='''
This wisdom was brought forth to insult idols and idolaters, so that such makers and worshippers might understand how wicked and how close to eternal death it is to abandon the one omnipotent God and Creator of all things, and to worship various creations as divinity in contempt of God. Therefore, through the prophet, the Lord spoke long ago to His people about His own veneration and the falsity of idols: I am the first and I am the last, and besides me there is no other God. Who is like me? Let him call and declare, and set in order for me since I established the ancient people, and let him announce to them the things to come. Do not fear, nor be troubled; from then on I have made you hear, and I have announced the future: you are my witnesses. Is there any God besides me, or a maker whom I do not know? All makers of idols are nothing, and their most beloved things will not profit them: they themselves are their witnesses, because they do not see nor understand, so that they may be confused. Who has formed a god, or cast a graven image that is of no use? Behold, all his associates shall be confused; for they are craftsmen, and they gather from all, all shall stand and tremble and be confounded together. The ironworker works with a file in the coals, and with hammers he shapes it, and works with the strength of his arm; he will hunger and grow weak, he will not drink water and will faint. The woodworker stretches a line and shapes it with a plane; he makes it with a square, and turns it with a compass: and he makes the image of a man, as a beautiful person dwelling in a house. He cuts down cedars, takes holm oak and oak which stood among the trees of the forest; he plants a pine which the rain nourished, and it becomes fuel for men; he takes some of it and is warmed, and kindles it and bakes bread; but from the rest he makes a god, and worships it; he makes a graven image, and bows down before it. He burns half of it in the fire, and with the half he eats meat; he cooks stew and is satisfied, and is warmed, and says: Aha, I am warmed, I have seen the fire. But the rest of it he makes into a god, and a graven image for himself; he bows down before it, and worships it, and prays saying: Deliver me, for you are my god. They did not know nor understand; for their eyes are blinded so that they may not see, nor understand with their heart. Nor do they consider in their mind, nor know, nor feel, so as to say: I burned half of it in the fire, and baked bread on its coals, cooked meat and ate, and from the rest shall I make an idol? Shall I bow down before a block of wood? Part of it is ashes: a foolish heart has worshipped it, and has not delivered his soul, nor said: Perhaps there is a lie in my right hand (Isa. 44:6-20)? The sense of this prophecy's narrative is as follows: For when it says: I am the first and the last, it is the same as what is elsewhere read as spoken from divine majesty: I am Alpha and Omega, the beginning and the end (Rev. 21:6). For He does not say He is alone, but that besides His power and wisdom there is no external God, condemning the opinion of many gods and their images: Who, He says, is like me? Let him call things that are not as if they are, and explain the order of my creation by which I have freed all things with reason, since I made man upon the earth, and not only do I will, but I also seek knowledge of the future. Therefore you, Israel, whose king and redeemer I am, do not fear images, which you learned to be nothing on Mount Sinai. Is perhaps another creator whom I do not know, or besides this is there another world which shows the power of an unknown God? Nor are only the things made, but also those who make them considered as nothing: and when the time of vengeance comes, the works of their hands will by no means be able to deliver them, which blind and insensible things confound their makers. For who can believe that a god is formed by a file, drill, and hammer, or that images are cast in coals, or that by a line, plane, and compass they suddenly arise as gods, especially when the poverty of the craftsman's art is shown by hunger and thirst: for a wooden statue is made expressing the human form, and the more beautiful it is, the more it is thought to be an imposing god, and it is placed in a temple and enclosed in an eternal prison, which grew for a long time in the forests, and according to the variety of trees was a cedar, holm oak, oak tree, or pine, and in a wondrous manner its segments and shavings are thrown into the fire to warm the maker of the god and cook various stews; but the other part is shaped into a god so that, when the work is completed, its maker worships it and implores help from his own work, nor does he understand or consider, indeed neither flesh nor mind sees with eyes, that it cannot be a god whose part has been consumed by fire, nor can divine majesty be made by the hand of man, and the prophetic word is more fully woven about the mockery of idols, which are easy to understand and do not desire a patchwork or even extra exposition. On which Flaccus also writes in satire, mocking the images of the pagans. "Once I was a fig tree trunk, a useless piece of wood, When a carpenter, unsure whether to make a bench or a Priapus, Preferred to make a god. Therefore I am a god, the greatest fear of thieves and birds." But whatever has been said about idols can also be applied to the leaders of heresies, who construct and venerate images of their doctrines with cunning hearts, knowing that what they have made is a simulation; nor is their own error sufficient for them unless they have deceived the simple from prayer, and those who think that godliness is a means of gain, and who devour widows' houses, abusing the ignorance of the common people. In this way, with dialectical skill, as with a well-turned axe, file, and plane, they shape their god, and hammer him out, and make golden him with the charm of rhetorical speech, whose god is their belly, and whose glory is in their shame.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
