[[commentary]]
quote='''
The names of the places up to which Judas pursued his enemies demonstrate the effectiveness of his virtue; for Gezeron is interpreted as "near my light"; Idumaea, "red" or "earthly"; Azotus, "paternal fire"; Jamnia, "sea" or "his right hand." And what is signified by Gezeron except the light of faith, and by Idumaea except the gentile nations? But what is signified by paternal fire except the ardor of love; and by Jamnia, except the depth of knowledge and the effect of good works? Therefore, the company of holy teachers pursues the gentile people so long, until it leads them from the error of paganism to the light of faith, kindles in them the fire of love, and urges them to the meditation on the divine law and the pursuit of good works. For this persecution is salutary, and the destruction is beneficial.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"

[[commentary]]
quote='''
For just as there were three thousand of the companions of Judah who were being pursued, so also three thousand fell from the side of the enemies; they fell not so that they might be utterly destroyed, but so that, having been raised up after their fall, they might stand better: because, filled with faith in the Holy Trinity, they strove to attain the fellowship of those whom they recognized they had persecuted with a virtuous spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
