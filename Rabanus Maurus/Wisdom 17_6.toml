[[commentary]]
quote='''
For from that fire, which was punishing the wicked, they were terrified with fear, dreading punishments on all sides, because the more severe the pains of punishment one feels, the greater the horrors he fears may come upon him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
