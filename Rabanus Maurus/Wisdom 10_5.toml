[[commentary]]
quote='''
After the Devil, through pride, deceived the human race in the building of the tower, so that by this transgression the unity of the common language was lost, again the wisdom of God united the offspring of Abraham in the truth of his faith, giving him a law and worship in which they might prove themselves to be true worshipers of the one God. From his seed also, producing the redemption of the human race, He blessed in him all the nations of the earth, and therefore what the pride of the Devil had confounded, the humility of Christ, through His grace, reunited in the knowledge and speech of all languages.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
