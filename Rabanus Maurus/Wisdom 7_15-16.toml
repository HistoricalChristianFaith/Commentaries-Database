[[commentary]]
quote='''
God is the guide of wisdom, for the almighty Father is the author of the incarnation of His only-begotten Son, whom He sent into the world so that the human race might receive the illumination of truth. To Him He gave all power in heaven and on earth, for from Him, and through Him, and in Him are all things, and He made us, and not we ourselves. We are His people, and the sheep of His pasture (Ps. 100:3). Whatever we rightly think, whatever we rightly speak, and whatever we accomplish in good deeds is His gift.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
