[[commentary]]
quote='''
But in a higher sense, wisdom, governing the righteous through a humble piece of wood, restored the human race, when through the passion of Christ's cross it erased the sin of the whole world and led the chosen to the entrance of the heavenly kingdom. But again, after the cleansing of the flood, it then adds what wisdom accomplished as a wondrous work:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
