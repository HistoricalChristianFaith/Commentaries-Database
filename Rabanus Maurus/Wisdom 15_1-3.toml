[[commentary]]
quote='''
Our God is gentle, for His love is indescribable. He is true, because He deceives no one and is deceived by no one. Patient and in mercy arranging all things; for because of His goodness He patiently endures us, waiting for us to turn for the better. Not wishing anyone to perish, but that all may be saved and come to the knowledge of the truth. (1 Tim. 2:4) As He says through the prophet: I do not desire the death of the sinner, but that he should turn and live (Ezek. 33:11). If we have sinned, we cannot escape His hand, because we are His creation. But if we cease to sin and persist in good works, we will receive a sure reward from Him, with whom the full number of all good deeds is kept. For He knows all, and no secret is hidden from Him. What His knowledge brings us is made clear by the following statement. For to know you is perfect justice, and to know your justice and virtue is the root of immortality. Whoever truly desires to know God strives to abstain from all sin, as the apostle John confirms, saying: Everyone who has this hope in him purifies himself, just as he is pure (1 Jn. 3:3). And again: Everyone who abides in him does not sin; everyone who sins has not seen him nor known him (1 Jn. 3:6). But to know God is perfect justice, that is, the highest perfection of blessedness; and to know his justice and virtue is the root of immortality. But what is the justice and virtue of God except him of whom the Apostle says: I mean Christ, the power of God and the wisdom of God, who has become for us from God wisdom and justice, sanctification and redemption. For to know God and his justice and virtue is the root of immortality (1 Cor. 1:30), that is, the perception of incorruption and the contemplation of truth in eternal life, as Truth itself says to the Father in the Gospel: This is eternal life, that they may know you, the only true God, and Jesus Christ whom you have sent; whom now we know in part by faith, but then we shall know in truth, just as we are known, for we shall see him as he is; for now we see through a mirror and in a riddle, but then face to face (Jn. 17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
