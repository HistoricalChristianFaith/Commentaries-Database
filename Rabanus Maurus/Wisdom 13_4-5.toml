[[commentary]]
quote='''
It would have been fitting that the most beautiful and splendid Creator be recognized through beautiful creatures, but they became vain in their thoughts and chose to serve the creature rather than the Creator, who is blessed forever. Therefore, they are refuted not only by the truth but also by their own words; for just as a house, made for the purpose of dwelling, feels nothing of itself and is subject to the master who made or inhabits it, so the world, feeling nothing of itself, is subject to God the Maker, who made it for His own use. Therefore, the sinner is at fault before the foolish for two reasons: first, because they prefer the elements, that is, the works of God, to God Himself; then, because they worship images of the elements themselves, fashioned in human form, for they make images of the sun and moon in the manner of humans, likewise of fire and earth and sea, which they call Vulcan, Vesta, and Neptune. Such is the desire of men for images that they are even more attracted to those which are rare; they delight, of course, in gold and gems and ivory, the beauty and brilliance of these dazzle their eyes, nor do they consider any place sacred unless these things have shone there. Therefore, under the hoax of gods, greed and desire are worshipped; for they believe that the gods love whatever they themselves desire, whatever it is for which thefts, murders, and robberies are daily committed, and for which wars overturn peoples and cities throughout the world. Therefore, they consecrate to the gods their spoils and plunder, whom, indeed, they must admit to be weak and devoid of the highest virtue, if they are subject to desires: for why should we think them heavenly, if they desire something from the earth? Or blessed, if they need anything? Or incorruptible, if they take pleasure in those things in the desire for which human greed is rightly condemned?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
