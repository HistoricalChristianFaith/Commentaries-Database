[[commentary]]
quote='''
Therefore, the wicked will come into judgment, timid because of the conscience of their sins, for their thoughts accuse them for the evil deeds they have previously committed, nor is any place given for defense, where there is no fruit of good works in the conscience.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
