[[commentary]]
quote='''
Heretics have no excuse, for they sin knowingly, when they refuse to follow the holy and catholic teachers in right faith and sound doctrine, but according to their own perverse inventions, they choose rather an earthly and fragile understanding than to strive for a spiritual and heavenly one in their dogmas. For all fools are excessively proud in their souls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
