[[commentary]]
quote='''
After the preaching of the divine word, after the labors of good works by which holy men outwardly offer comfort to their listeners, returning to the homes of their hearts, they devote themselves in meditation to the contemplation of divine wisdom, and therefore, from the troublesome annoyances of secular affairs, they inwardly attain the peace of heavenly sweetness. For, as it is said, "her company has no bitterness, nor does her companionship bring weariness," because bodily pleasures, when taken greedily, burden the body; but spiritual delights, the more they are received, the more they uplift the mind. For this is the usual difference between the delights of the heart and those of the body: bodily pleasures, when not possessed, kindle a grievous desire; but when greedily consumed, they immediately turn the eater to disgust through filling. On the other hand, spiritual delights, when not possessed, are a source of weariness; but when possessed, they are desired; and the more they are consumed by the one who hungers, the more they are hungered for by the one who consumes. In the former, desire pleases, experience displeases; in the latter, desire is of little value, experience pleases more; in the former, desire produces filling, filling produces disgust; but in the latter, desire produces filling, filling produces desire. For spiritual delights increase their own desire in the mind as they satisfy it, because the more their flavor is perceived, the more it is understood that they are to be loved more eagerly, and therefore, when not possessed, they cannot be loved, because their flavor is unknown.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
