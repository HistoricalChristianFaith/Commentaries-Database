[[commentary]]
quote='''
For these, indeed, recognize with sorrow the various scandals that are continually inflicted by the wicked in the Church of God; they long to avenge them with a spiritual sword, do not fear to offer themselves as a sacrifice and to deliver themselves to death for the salvation of their own.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 2"
