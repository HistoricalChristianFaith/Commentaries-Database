[[commentary]]
quote='''
Here is recalled the story, which is narrated in the Book of Numbers, of how after the killing of Korah, Dathan, and Abiram, the sons of Israel murmured against Moses and Aaron, saying: You have killed the people of God. And when the sedition arose and the chaos increased, Moses and Aaron fled into the tabernacle of the covenant. And the Lord spoke to Moses and Aaron, saying: Depart from the midst of this congregation, and I will destroy them at once. And they fell on their faces. And while they lay on the ground, Moses said to Aaron: Take the censer, and having taken fire from the altar, put incense upon it, and go quickly to the people to pray for them, for already wrath has gone out from the Lord, and the plague is raging. When Aaron had done this, and had run into the midst of the crowd, which the fire was devastating, he offered incense, and standing between the dead and the living, he prayed for the people, and the plague ceased. The number of those who were struck was fourteen thousand seven hundred, apart from those who perished in the sedition of Korah (Num. 16). From this, it must be considered how in Sodom, when at least ten were required, by whom perhaps those who dwelled in the Pentapolis of Sodom might possibly be saved, now even if only two such as Moses and Aaron are found, they can serve for the salvation of the whole nation of Israel. What then shall we say is greater in these two, what power, what merit, by which six hundred thousand and more are freed from the destruction of the destroyer? I believe that in Moses the law is signified, which teaches men the knowledge and love of God. In Aaron consists the form of appealing God and begging Him. Therefore, if it ever happens that God is angry with us or with the whole people, and the sentence of vengeance proceeds from God, but the law of God returns to our hearts, reminding us and teaching us to turn to repentance, to make satisfaction for our sins, to plead for our faults, then anger will immediately cease, anger will be calmed, the Lord will be appeased, as if Moses and Aaron were interceding for us and the whole people were petitioning. But if ever the anger of God arises and severe correction comes for sins, and our hearts are not hardened so that we do not turn to God, nor humble ourselves in His sight, so that in the confession of prayers we may lessen His wrath and anger, but on the contrary we say: God does not care about the life of mortals, nor do these things pertain to God; He has long since abandoned us, nor do these things come to His knowledge. If we think such things in our hearts, and these proceed from our mouths, it is certain that Moses and Aaron are not in us, namely the knowledge of the law and the fruits of repentance, by which we can escape the destruction of imminent ruin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
