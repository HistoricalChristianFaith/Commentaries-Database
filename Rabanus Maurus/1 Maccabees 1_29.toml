[[commentary]]
quote='''
We have said above that Antiochus was a type of Antichrist; likewise, in this place, the son of perdition can similarly be understood as the chief collector of tribute, whom the prince of this world and the ruler of these present darknesses, the Devil, incites to demand that in the cities of Judah, that is, in the Churches of Christ, the tribute of sins be paid to him; however, he does not always demand this everywhere by force of persecutions, but sometimes by torments, sometimes by flattery, sometimes by threats and open cruelty, sometimes by deceit and trickery.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
