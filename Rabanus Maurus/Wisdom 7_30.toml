[[commentary]]
quote='''
Since none of the elect in this life is immune from sin; therefore, no wickedness approaches Christ. Of whom it is written: Blessed is the just man in the Lord who has been found without stain (Sir. 31). And again: Who did no sin, neither was guile found in his mouth (Isa. 53:9). To whom the prince of this world comes and finds nothing in him. Nevertheless, he himself bore our weaknesses and carried our diseases, because he himself bore our sins in his body on the tree, so that, having died to sins, we might live to righteousness; by whose wounds we have been healed (1 Peter 2:24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
