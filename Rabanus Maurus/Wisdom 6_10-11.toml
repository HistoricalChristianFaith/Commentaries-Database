[[commentary]]
quote='''
They admonish ecclesiastical rulers, indeed all generally to whom governance of their souls is entrusted, to learn divine wisdom, so that they may not transgress the commandments of God. For those who keep what is just will be justly justified, that is, those who pursue justice will receive from the just Judge the reward of their justice; and those who have learned what is just, surely by believing rightly and acting well, to them it will be given what to answer when the examination of each one takes place, because the good merit of the present life seeks the blessed reward of eternal glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
