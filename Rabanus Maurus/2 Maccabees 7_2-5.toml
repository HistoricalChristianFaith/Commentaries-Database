[[commentary]]
quote='''
How illustrious, moreover, how great were the proclamations of confession which they uttered, what great evidences of faith they provided! King Antiochus, hostile, indeed, in Antiochus the Antichrist was foreshadowed, sought to stain the glorious mouths of the martyrs, joined and invincible in the spirit of confession, with the defilement of swine's flesh; and when he had severely beaten them with scourges and had been able to achieve nothing, he ordered pans to be heated. When these were red-hot and blazing, he commanded that the one who had spoken first, and who by the loyalty of his courage and faith had the more provoked the king's wrath, be brought to them and fried, after first stretching out and cutting off the tongue which had confessed God. This happened to the martyr in a more glorious way; for the tongue that had confessed the name of God ought itself to go first to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
