[[commentary]]
quote='''
However, Firmianus Lactantius, in the first book he wrote on the false religion of the gods, presents similar things regarding this passage, saying: It is not obscure by what reasoning men began to be called gods, for it was because of the depravity of men who lived a rural life without any ruler. There is no doubt that in those times they began to praise a man who was king, and his whole people, with the highest praises, so that they even called them gods, whether they truly believed this because of the miracle of virtue, being still rude and simple, or, as often happens, out of flattery for present power, or because of the benefits by which they were brought to civilization. Then, when these kings were dear to them, they also arranged their lives accordingly, and after their death left behind a great longing for themselves. Therefore, men fashioned images of them, so that they might have some consolation from the contemplation of their likenesses, and, going further out of love, they began to honor the memory of the deceased, so that they might seem both to repay gratitude to those who had deserved well, and to attract their successors to the desire of ruling well. Cicero teaches this about the nature of the gods, saying: But the common custom of men has taken up the practice that those who excel in benefits, men, are raised to heaven by fame and will. Therefore Hercules, later Castor, therefore Pollux, later Aesculapius, therefore Liber. And in another place: And in most cities it can be understood that, for the sake of sharpening virtue, or because they would more willingly face danger for the sake of the republic, the memory of the best and bravest men was consecrated in honor of the immortal gods. By this reasoning, of course, the Romans consecrated their Caesars, and the Moors their kings; therefore, little by little, religions began to exist, while those first who knew them in that rite filled their children and grandchildren, and then all their descendants; and yet these greatest kings, because of the fame of their name, were worshipped in all provinces. But privately, each people venerated with the highest reverence the founders of their race or city, or men notable for their bravery, or women remarkable for their chastity, as the Egyptians did Isis, the Carthaginians Urania, the Romans Quirinus, Samos Juno, Naxos Liber, the Moors Juba, the Latins Faunus; likewise, Paphos Venus, Delos Apollo, the Macedonians Scabrius, the Athenians Minerva, Lemnos Vulcan; therefore, throughout peoples and regions, various sacred rites were undertaken, while men desired to show gratitude to their rulers. And why they should bestow other honors on those who lack life, I cannot find: therefore, the devotion of those who succeeded contributed greatly to the error, who, so that they might seem born of divine stock, bestowed divine honors on their parents, and ordered them to be bestowed. Therefore, he says, the incommunicable name was placed upon stones and wood: because the incomprehensible name of the living and omnipotent God, who alone is, they wickedly ascribed to images treacherously composed of insensible and fragile matter, and, together with false religion, shamelessly destroyed themselves with all vices.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
