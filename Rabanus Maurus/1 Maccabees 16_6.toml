[[commentary]]
quote='''
When the commander, on seeing the people anxious about crossing the flood, crossed first, he showed that those who fulfill in the Church the place of the sick and the office of teacher ought, by the example of their faith and commitment, to strengthen the fearfulness of their subjects, and with sacred trumpets, that is, with divine doctrines, to rouse them to battle against the enemies. And therefore, the spiritual Cendebaeus and his camp are put to flight, and many from them fall wounded, because, shaken with fear, they finally feel the power of the divine majesty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 16"
