[[commentary]]
quote='''
This is also read in the book of Job: Is not wisdom found among the aged, and does not understanding come with long life? With Him are wisdom and strength; He has counsel and understanding. If He tears down, none can rebuild; if He shuts a man in, none can open (Job 12:12-14). It is clearly evident that human weakness, unless it is sustained by divine help, will fail in countless ways and be reduced to nothing. For by the grace of God we are saved, and every perfect gift comes from above. Aware of this, Paul says of himself: Wretched man that I am, who will deliver me from this body of death? The grace of God through Jesus Christ our Lord (Rom. 7:24). And again he says: By the grace of God I am what I am, and His grace toward me was not in vain; but I labored more abundantly than all of them, yet not I, but the grace of God which was with me (1 Cor. 15:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
