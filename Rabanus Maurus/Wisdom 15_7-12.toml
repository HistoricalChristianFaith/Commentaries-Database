[[commentary]]
quote='''
Previously, he had spoken about those who had made idols from wood or stones or certain metals; now he also speaks about those who, following the same vanity in the craft of the potter, are shown to be equally guilty through a similar error. For the pagans themselves have fallen into such foolishness that not only did they make idols from gold or silver, or even from precious stones, but they also fashioned images in the same way from cheap clay, calling a god that which was formed from the clay of the earth by the work of a potter. Therefore, it was justly repaid to them that, since they were made from the earth and did not wish to follow the better part of themselves, that is, the rational soul which is created in the image of God, to worship the living God, by imitating the baser part of themselves, that is, the earthly body, they worshipped a clay god. Therefore, afterwards, without the fruit of good works, they themselves, senseless and useless, were rendered to the insensible earth from which they were taken. Mystically, all heretics and schismatics who hold the truth of God in unrighteousness and worship a lie instead of the truth in the images of their doctrines, even if they sometimes possess attractive speech or seem to have reasonable virtues, will nevertheless be proven to be altogether fragile, as if made of clay, because they invent useless things. Therefore, their heart is ashes, that is, their thought is foul, and their life is more sleazy than any mud, because they are ignorant of Him who formed them and gave them an intelligent mind. Instead, they vanish in their own thoughts, despising the understanding of the holy Fathers, which those Fathers had in the divine Scriptures through the gift of the Holy Spirit. They shamelessly establish new errors, as if vain amusements, for human favor and earthly gain, wandering themselves and leading into error whomever they can, so that they may be inexcusable on the day of judgment, when the Judge of all shall come to judge the secrets of hearts and render to each according to his works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
