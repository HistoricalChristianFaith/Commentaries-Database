[[commentary]]
quote='''
And when I became better, I came to the defiled body. For the Wisdom of God, which is the unchangeable good, came to the holy and incorrupt virgin, taking from there the defiled body, from which all generations call her blessed. The lover of Wisdom asks God to grant him wisdom, so that he may know what is beneficial before him at all times. And when I became better, I came to a defiled body. For it is written above that the keeping of God's laws is the completion of incorruption, and incorruption makes one to be near to God. But no one can attain to such perfection unless divine grace exalts him. From which, also, the gift of knowledge and the bestowal of virtues are to be sought and hoped for, because, according to the statement of James: Every good gift and every perfect gift is from above, coming down from the Father of lights (James 1:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
