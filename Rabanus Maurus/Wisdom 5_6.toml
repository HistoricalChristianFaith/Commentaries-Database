[[commentary]]
quote='''
The way of truth is the Gospel of Christ, and the divine law, from which the sinful have strayed, because they were unwilling to believe and obey. For them, the light of righteousness did not shine, and the sun of understanding did not rise, because for them Christ is not the true light, which enlightens every man coming into this world (Jn. 1:9), and the sun of righteousness who rises for those who fear Him. (Mal. 4:2) In whose punishments, too, there is true healing, since in His protection the abundance of eternal life is assured. He did not shine for the faithless philosophers of the Gentiles, nor for the heretics, because, by despising the path of truth, they preferred to follow vain traditions and wicked sects.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
