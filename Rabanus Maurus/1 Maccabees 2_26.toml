[[commentary]]
quote='''
That he was zealous for the law, as Phinehas did to Zimri the son of Salu, shows that the mighty deeds of the holy fathers prefigured the most noble act of our Redeemer in the last times.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 2"
