[[commentary]]
quote='''
No persecution nor any tribulation could ever tear the saints of God, who are predestined and called according to the foreknowledge of God the Father, from the faith of Christ: but persevering in truth, they neither ate food sacrificed to idols, nor consented to be defiled by the uncleanness of sins, nor did they allow the holy law of God to be broken and corrupted by heretical corruption, but rather chose to die for the name of Christ than to consent to wickedness. Therefore one of them, relying on this confidence, writing to the disciples, therefore testified, saying: For I am sure that neither death, nor life, nor angel, nor principality, nor things present, nor things to come, nor power, nor height, nor depth, nor any other creature will be able to separate us from the love of God, which is in Christ Jesus our Lord (Rom. 8:38-39).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
