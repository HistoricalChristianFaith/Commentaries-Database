[[commentary]]
quote='''
It is clear that whoever perfectly trusts in the Lord in this present life, according to the distribution of the Holy Spirit, perceives here an understanding of the truth in a manner appropriate to himself; because now we see through a glass, darkly, but then face to face; now we know in part, but then we shall know even as we are known. But now remain faith, hope, love, these three; but the greatest of these is love. (1 Cor. 13:12-13) Because when the others pass away, that alone remains, therefore it is said: The faithful shall abide with him in love, for the elect of God, after the end of the world, delighting in the good which they formerly sought with faith and hope, will in no way be able to be separated from His company, since, rewarded with the gift of eternal satisfaction, they will enjoy perpetual peace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
