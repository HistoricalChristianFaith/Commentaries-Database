[[commentary]]
quote='''
Next, against the second he created more cruel punishments; and before he tortured the other members, he flayed off the skin of his head with the hair, in deliberate hatred. For since the head of the man is Christ, and the head of Christ is God, he who was crushing the head in the martyr was persecuting God and Christ in the head. But he, trusting in his martyrdom and promising himself the reward of the resurrection from the recompense of God, cried out and said: "You indeed, powerless one, destroy us from this present life; but the King of the world will raise us who die for His laws to the eternal resurrection of life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
