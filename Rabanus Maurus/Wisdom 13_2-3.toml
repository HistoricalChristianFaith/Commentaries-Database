[[commentary]]
quote='''
For some worshipped fire as a divine power, which they called Vulcan; others worshipped the ether or air, which they named Jupiter or Juno; others worshipped excessive water, which they called Neptune; others the circle of stars, who distributed the positions and courses of the stars according to the various shapes of animals; others venerated the sun as God, which they called Phoebus or Apollo; others the moon, which they used to call Diana. For, deceived by such error, they attributed the power of the almighty God to their false inventions, as a certain pagan poet concluded in three verses, saying: "So many and such images did God place in the heavens, and through the dark shadows scattered, He commanded the bright lights to give clarity to the devastating night." But if it is not possible for the stars to be gods, then neither can the sun nor the moon be gods, since they differ from the lights of the stars not in kind, but in size. But if these are not gods, then neither is the sky, in which all these are contained. In the same way, if the earth which we tread, which we cultivate and till for sustenance, is not a god, then neither will the fields nor the mountains be gods; if these are not gods, then the whole earth cannot be considered a god. Likewise, if the water which serves living beings for drinking or washing is not a god, then neither are the springs from which water flows. If the springs are not gods, then neither are the rivers which are gathered from the springs. If the rivers also are not gods, then the sea, which is made up of rivers, cannot be considered a god. But if neither the sky, nor the earth, nor the sea, which are parts of the world, can be gods, then neither is the whole world a god, which the same Stoics claim to be both living and wise, and therefore God, in which they have been so inconsistent that nothing has been said by them which has not also been overturned by themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
