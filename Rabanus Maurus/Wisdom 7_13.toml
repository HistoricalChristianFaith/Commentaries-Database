[[commentary]]
quote='''
Earlier it was said that the Holy Spirit, the giver of divine wisdom, would flee from a artificial discipline, and that wisdom would not enter into a wicked soul. But now the true possessor of wisdom says that he has learned it without deceit, and therefore he could truly attain its knowledge and share it without envy, and did not hide its honesty, because envy can in no way coexist with true wisdom, which is known to be the lover of generosity and mercy. For what fellowship has light with darkness? Or what communion has Christ with Belial? (2 Cor. 6:14) Therefore the apostle James says: Who is wise and disciplined among you? Let him show by good conduct his works in the meekness of wisdom. But if you have bitter zeal and contentions in your hearts, do not glory, and do not be false against the truth: for this wisdom does not descend from above, but is earthly, unspiritual, demonic. For where there is zeal and contention, there will be instability and every evil work. But the wisdom that is from above is first indeed pure, then peaceable, gentle, open to persuasion, consenting to good, full of mercy and good fruits, judging without hypocrisy (James 3:13–17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
