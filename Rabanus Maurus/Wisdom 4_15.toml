[[commentary]]
quote='''
Therefore, the persecutors of the martyrs could by no means recognize the future glory that followed them, but thought that they would perish together with the torments of their bodies, and that they could not receive the blessedness of eternal life after death; but everything happens differently for each side, because just as life and victory will follow the good after death, so also death and perpetual damnation will follow the wicked after temporal life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
