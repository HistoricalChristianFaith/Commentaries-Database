[[commentary]]
quote='''
There is no greater madness than to abandon the living God and serve dead idols, and therefore the cause and beginning of all evil is the worship of idols, because after the human mind turns away from its creator, it becomes entangled in the errors of all crimes. For the beginning of all sin is pride (Eccles. 10:13). Likewise, the end, that is, the completion or fullness of all evil, is the same idolatry; for nothing is lacking in any wickedness to him who worships the Devil as divine power; therefore, everything is reckoned to him as evil and sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
