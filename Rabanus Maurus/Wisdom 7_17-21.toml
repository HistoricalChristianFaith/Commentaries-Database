[[commentary]]
quote='''
However, how Solomon excelled in wisdom by divine gift, Scripture shows by saying: God also gave Solomon wisdom and very great prudence, and breadth of heart, like the sand that is on the seashore, and Solomon's wisdom surpassed the wisdom of all the Orientals and of the Egyptians, and he was wiser than all men: wiser than Ethan the Ezrahite, and Heman, and Chalcol, and Darda, the sons of Mahol; and he was renowned among all the nations round about. Solomon also spoke three thousand proverbs, and he discussed about trees, from the cedar that is in Lebanon to the hyssop that grows out of the wall; and he discoursed about beasts and birds, and reptiles and fishes; and people came from all nations to hear the wisdom of Solomon, and from all the kings of the earth, who had heard of his wisdom (1 Kings 4:29-34). But our Peaceful One, who is the power of God and the wisdom of God, before whose eyes all things are naked and open, not only knows all things that are, and that have been, and that will be, but also gives to his own disciples, that is, to his own members, understanding of his mysteries, so that they may have knowledge not only of visible things but even of invisible things, and may perfectly understand what history teaches, or what allegory shows, what moral teaching recommends, and what anagogy associates about heavenly things. Therefore it is well read in the Gospel: He is the light of the world, who enlightens every man coming into this world (Jn. 1:9), whom whoever follows does not walk in darkness, but will have the light of life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
