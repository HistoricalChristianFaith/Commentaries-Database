[[commentary]]
quote='''
Therefore, the people of God in the desert were comforted by various support and cherished by divine mercy. Manna rained down for them from heaven, most abundant water was given to them from the rock, they were fed with the flesh of birds, their garments were not worn out, nor were their shoes consumed; during the day the sun did not burn them, because He led them in a cloud by day, and all night in the illumination of fire, so that they might become more devoted to their Creator, who helped them freely by providing for every necessity. For this reason He cared for them temporarily, so that they might love and understand Him perpetually, according to the mention of this place, since it is not the fruits of birth that feed men, but the word of God preserves those who believe in Him. Moses also proves this in Deuteronomy, saying: He afflicted you with want, and gave you the food of manna, which you and your fathers did not know, to show you that man does not live by bread alone, but by every word that proceeds from the mouth of God. Your garment with which you were clothed did not fail through age, and your foot was not worn out. Behold, it is the fortieth year, so that you may reflect in your heart, because just as a man instructs his son, so the Lord your God has instructed you, that you may keep the commandments of your God, and walk in His ways, and fear Him; for the Lord your God will bring you into a good land (Deut. 8:3–7). But because they were always ungrateful and clung to figures, they did not wish to receive the truth itself coming to them; therefore, all things were transferred to the fruits of the Holy Church; for all things happened to them in figure. Moreover, they were written for our correction, as Paul also clearly proved, writing to the Corinthians, saying: For I do not want you to be ignorant, brothers, that all our fathers were under the cloud, and all passed through the sea, and all were baptized into Moses in the cloud and in the sea, and all ate the same spiritual food, and all drank the same spiritual drink. For they drank from the spiritual rock that followed them; and the rock was Christ (1 Cor. 10:1-4). For Christ is the foundation of the whole law and the truth of the figures; whoever believes in Him has fulfilled the whole law; but whoever does not believe, as a transgressor of the law, will perish eternally.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
