[[commentary]]
quote='''
The writings and spiritual letters of Antiochus, the philosopher, are from the pagan heretics and schismatics among the Christians, who desire to subvert the truth of Christ's law and the decrees of the Catholic faith, and who are pained by divine worship and the Christian religion. Yet the more they strive through error to unite people to themselves, the more they cause them to disagree with one another, because they themselves are not in harmony with each other, but, rebel through various sects, they differ and therefore are less able to serve and unite in unity. For among the proud, as Scripture testifies, there are always quarrels, and according to the judgment of Truth, Every kingdom divided against itself will be laid waste, and house will fall upon house. (Luke 11:18) The books and letters of Antiochus command in Jerusalem and in the cities of Judea that they follow the laws of the nations, and therefore define holocausts, and sacrifices, and offerings to be made in the temple of God. For the greatest care and zeal of heretics and pagans is that in the church of Christ they either confuse or utterly extinguish divine worship, lest the sincerity of true faith, which works through love, offer a pleasing holocaust to God on the altar of the believer's heart, nor the mystical sacrifices of the body and blood of the Lord, together with the sacred prayers of the faithful and the offering of good deeds, be worthily presented in the true temple of God to the creator of all and giver of all good things. They forbid the celebration of the Sabbath, because they deny that in the heavenly kingdom there will be the rest of holy souls. They order the building of altars, temples, and idols, because they desire to make the minds of the faithful vessels for evil spirits; to sacrifice swine's flesh and common animals, that is, to lead an unclean life and, like brute animals, to live in lust and the desires of the flesh; to leave their sons uncircumcised, that is, with no guard, no self-control, and no discernment to temper thoughts, words, and deeds, so that they forget the divine law and change God's justifications into the commission of various crimes. And all these things they compel to be done not only by persuasion of words, but also by the torment of various punishments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
