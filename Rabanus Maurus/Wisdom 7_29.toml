[[commentary]]
quote='''
According to history, wisdom is said to be more splendid than the sun and the brightness of all the stars: for bodily light, which, being changed by the alternation of day and night, sometimes appears and sometimes is hidden, when compared to the spiritual and perpetual light of wisdom, seems to have scarcely the small brilliance of a certain spark. For every temporary thing, when compared to what is everlasting, seems as if it no longer exists, since it is consumed by eternity. Therefore, in a mystical sense, the brightness of the wisdom of God, which is Christ, when compared to the splendor of any of the saints, whom He here calls by the name of the sun and stars, far surpasses them, because they are changeable, but He always remains the same. The Psalmist, contemplating this, says to the Lord Himself: In the beginning, Lord, you founded the earth, and the heavens are the work of your hands. They will perish, but you remain; all of them will grow old like a garment, and like clothing you will change them, and they will be changed; but you are the same, and your years will have no end (Ps. 102:25-27).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
