[[commentary]]
quote='''
Whose excellence Paul, amazed, says: O the depth of the riches of wisdom and knowledge, how incomprehensible are His judgments, and unsearchable His ways! For who has known the mind of the Lord, or who has been His counselor? Or who has first given to Him, and it shall be repaid to him? For from Him, and through Him, and in Him are all things; to Him be honor and glory forever and ever (Rom. 11:33-36).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
