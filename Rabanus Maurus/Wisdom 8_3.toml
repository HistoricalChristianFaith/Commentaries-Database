[[commentary]]
quote='''
Generosity is glorified by having fellowship with God. Therefore, generosity and nobility belong to the only-begotten Son, to have an eternal and omnipotent Father, with whom he himself remains coequal and coeternal from the beginning: because in the beginning was the Word, and the Word was with God, and the Word was God. And the Word was made flesh, and dwelt among us, and we saw his glory, the glory as of the only-begotten from the Father, full of grace and truth (Jn. 1:1-2). The Lord of all sits and loved her. Because the Father loves the Son, and has given all things into his hand: For she is the teacher of God's discipline, and the chooser of his works. John clearly proves this in the Gospel, saying: He who is to come after me has been made before me, because he was before me, and from his fullness we have all received, and grace for grace: because the law was given through Moses, grace and truth came through Jesus Christ. No one has seen God at any time. The only begotten Son, who is in the bosom of the Father, he has declared him (Jn. 1:15-18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
