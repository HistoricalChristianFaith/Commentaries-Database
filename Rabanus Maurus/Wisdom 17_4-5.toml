[[commentary]]
quote='''
Horror always accompanies darkness, and the less one can see or discern the things around oneself, the greater fear one has, suspecting adversity on all sides and dreading harm. Therefore, it also happened to the Egyptians, when they endured the greatest darkness for three days, which neither the sun, nor the moon, nor even the stars could illuminate: wherever they hid, they trembled with excessive terror. But when it is said that sad figures appeared to them, causing fear, it could have happened that, by the scheming of evil spirits, certain phantasms appeared to them, which struck them with excessive horror to increase their punishments. Similarly, even now, the persecutors of the Christian faith and the enemies of truth are surrounded everywhere by the darkness of their sins, because they are ignorant of the sun of righteousness, nor do holy teachers illuminate them in any way with the brightness of their doctrines. These also are disturbed by a descending sound, that is, the heavenly preaching foretelling the punishments to come for them, and sad figures, that is, demons who are to torture them, terrify them beforehand; yet this does not generate fruitful repentance in them, but rather, having become worse, they are prepared without ceasing for eternal destruction: for since they despair of themselves, nor do they wish to correct themselves so as to abandon their error and do works of righteousness, they are storing up wrath for themselves on the day of wrath and the revelation of the righteous judgment of God, who will render to each according to his works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
