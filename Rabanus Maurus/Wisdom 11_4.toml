[[commentary]]
quote='''
What that rock from which the Israelites drank was to signify is attested to by Paul with these words, "They drank from a spiritual rock that accompanied them, and that rock was the Christ." This rock, struck by the wood of the cross and announced by the spirits (that is, by the writings) of the prophets, poured forth the living water that fills all of the elect, restoring and satisfying them for all eternity. For this reason the Truth says, "Whoever thirsts, let him come to me and drink, and rivers of living water will flow from his heart." And elsewhere, "Whoever drinks of the water that I will give him, the water that I will give him will become in him a spring of water, welling up for eternal life." This rock is also called most high, because in it is contained the immense grace of the Spirit. And also hard rock, since it is firm and stable, and whoever is wise builds his house on it in such a way that no storm can shake it.
'''
source_url=''
source_title="ON ECCLESIASTICUS 2:8"

[[commentary]]
quote='''
But what that rock signified, from which the Israelites drank, Paul testifies, saying: "They drank from the spiritual rock that followed them, and the rock was Christ" (1 Cor. 10:4). This rock, struck by the rod of the cross, which was foretold in the hands, that is, in the writings of the prophets, poured forth living water which fills all the elect and satisfies them with eternal fulfillment. Therefore, Truth itself says: "If anyone thirsts, let him come to me and drink, and out of his belly shall flow rivers of living water" (Jn. 7:37-38). And elsewhere: "Whoever drinks the water that I will give him, it will become in him a spring of water welling up to eternal life" (Jn. 4:14). Therefore, this rock is called the highest because in it is contained the most abundant grace of the Holy Spirit; it is called a hard stone because it is firm and stable, upon which every wise man builds his house so that it is not moved by any storm. Concerning this, Moses also says in the song of Deuteronomy: "They sucked honey from the rock, and oil from the hard stone" (Deut. 32:13). Nowhere is such a thing read in the history; if the whole sequence of the Old Testament is reviewed, nowhere did the people suck honey from the rock, nowhere did they suck oil. But because, according to Paul's word, the rock was Christ, they sucked honey from the rock who saw the deeds and miracles of our Redeemer. But they sucked oil from the hard stone who, after his resurrection, deserved to be anointed by the outpouring of the Holy Spirit; as if, therefore, the hard stone gave honey when the Lord, still mortal, showed the sweetness of his miracles to the disciples. But the hard stone poured out oil because, after his resurrection, now made obstructed, he poured forth the gift of holy anointing through the breathing of the Spirit. Of this oil it is said through the prophet: "The yoke will rot because of the oil" (Isa. 10:27). Indeed, we were held under the yoke of demonic domination, but we have been anointed with the oil of the Holy Spirit, and because the grace of liberty has anointed us, the yoke of demonic domination has rotted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
