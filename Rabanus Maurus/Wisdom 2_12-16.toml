[[commentary]]
quote='''
The dishonest Jews were then planning to bypass righteousness, when, confronted by the words of the Gospel, they were admonished through Christ to abandon their former filth of vices and to follow the truth of God's commandments. But where they ought to have hoped for the cause of salvation, taking grave offense, they considered killing him as if he were a blasphemer. As it is written in the Gospel: The Jews took up stones to stone him. Jesus answered them: I have shown you many good works from my Father; for which of these do you stone me? The Jews answered him: We do not stone you for a good work, but for blasphemy, and because you, being a man, make yourself God, etc. (Jn. 10:31-33). For, instigated by envy, they did not consider what he was doing, but what they themselves were unwilling to do; in the rays of light they became darkened. Therefore such words suited them, so that they said: He is even a burden to us to look upon, because his life is different from others, and he keeps himself away from our ways as from filth. And because they did not think about the future life, they therefore grieved that the hope of future life was preferred to their own pleasure; and therefore, by wicked counsels, they aimed at his death, as the following words demonstrate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
