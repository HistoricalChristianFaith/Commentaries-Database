[[commentary]]
quote='''
It is clear indeed that the martyrs of Christ will be judges of their persecutors after death, just as in the Apocalypse, in the condemnation of Babylon, the divine voice shows, saying: Come out of her, my people, so that you do not partake in her sins, and so that you do not receive of her plagues, for her sins have reached up to heaven, and the Lord has remembered her iniquities. Render to her as she herself rendered, and double the double according to her works. In the cup which she mixed, mix for her double; as much as she glorified herself and lived in luxury, give her that much torment and grief, because in her heart she says: I sit as a queen, and am no widow, and will never see mourning. Therefore in one day her plagues will come, death and mourning and famine, and she will be burned with fire (Rev. 18:4-8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
