[[commentary]]
quote='''
And the water of the sea will burn upon them, and the rivers will rush together violently. He calls the disturbances of the sea the troubles of the world, the rivers the agitations of persecutions; because often the hearts of the wicked, which the teachings of preaching do not soften, are broken by the scourges of various corrections through fear. The spirit of virtue is the vengeance of the final judgment, which will separate the wicked and ultimately bring all the land to the end of their iniquity, when it will imitate earthly substance and carnal works; by its sentence, the just judge will assign punishment in Gehenna and eternal desolation. For wickedness will overthrow the seats of the mighty, because the evil of the reprobate is the cause of their damnation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
