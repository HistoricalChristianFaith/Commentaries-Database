[[commentary]]
quote='''
This opinion was in a certain way explained by the blessed Peter in his Epistle concerning the justice of God, writing thus: "He condemned the cities of Sodom and Gomorrah to destruction by reducing them to ashes, making them an example of what is going to happen to the ungodly; and he rescued righteous Lot, oppressed by the evil conduct of the lawless. For that righteous man, living among them day after day, was tormented in his righteous soul by the lawless deeds he saw and heard. The Lord knows how to rescue the godly from trials and to keep the unrighteous under punishment until the day of judgment," etc. (2 Peter 2:6-9) The story is well known, how God sent fire upon Pentapolis and justly condemned the sinful cities, turning the most fertile land into a wilderness, so that it no longer yields any fruit, showing that the souls damned in hell will burn forever without the fruit of repentance. For when Lot fled from there and headed for the mountains, his wife, because she looked back and did not persevere in her begun journey, is said to have been turned into a pillar of salt. This mystically warns us that those who have been regenerated by the grace of God and called to eternal life should not look back to the old way of life, nor remain foolishly midway. The fact that Lot's wife looked back and remained, and was turned into salt, serves as an example for the seasoning of the faithful, by which others may be salted; for Christ did not keep this silent, saying, "Remember Lot's wife," (Luke 17:32) namely, that he might season us as with salt, so that we might not neglect as fools, but be wise and beware. This, too, she admonished when she was turned into a pillar of salt. But the wisdom of God frees those who observe Him from all sorrows and preserves them perpetually in the peace of eternal rest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
