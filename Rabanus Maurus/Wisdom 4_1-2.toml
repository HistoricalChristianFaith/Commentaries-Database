[[commentary]]
quote='''
Just as he previously criticized the lead heretics and their schismatic followers, so now he praises the Catholics and their disciples, whose faith is pure, and whose doctrine is simple and eternal; therefore, they are worthy of remembrance, because their generation is approved by the Lord and honorably accepted among men. In this present life, this produces fruit through sacred examples of good works, and when transferred to the heavenly kingdom, it leaves a worthy remembrance of itself to generations to come, nor will there be any sorrow for the completed struggle, when the greatness of persecutions is surpassed by the reward.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
