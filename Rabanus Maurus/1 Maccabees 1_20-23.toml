[[commentary]]
quote='''
Therefore, it is consequently narrated about the same king in the aforementioned histories that after he was driven out by the Egyptians, he came into Judea, that is, against the holy covenant, and plundered the temple and took away a great amount of gold, and after placing a military base of Macedonians in the citadel, he returned to his own land and, after two years, again gathered an army against Ptolemy to the south. And when the two brothers of Ptolemy, sons of Cleopatra, whose uncle was Antiochus, were besieged in Alexandria, Roman envoys came, one of whom was Marcus Publius Letias. When he found him standing on the shore and delivered a decree by which he was ordered by the friends of the Roman people to withdraw and be content with his own dominion, and when he had brought the answer to the council of friends, Marcus is said to have drawn a circle in the sand with the staff he held in his hand, and to have limited the king and said: The Senate and the Roman people command that you answer in this place what you intend to do. At these words, he, terrified, said: If this pleases the Senate and the Roman people, I must withdraw from here; and so he immediately moved his army. Josephus wrote things consistent with these, that the king Antiochus, having returned from Egypt because of fear of the Romans, led his army to Jerusalem; and arriving there in the one hundred and forty-third year after the reign of the first Seleucus, in the one hundred and fifty-third Olympiad, on the twenty-fourth day of the month Casleu, which the Macedonians call Apelleon, he took it without any resistance, as those who agreed with his will opened the gates for him, and entering the city of Jerusalem, he killed many who thought contrary to him, as well as those who, by opening the gate, betrayed the city of God, because of the wealth of the temple, and having taken away much money from it, he returned to Antioch. But after he plundered the temple, so that he carried away the vessels of God and the golden lamps, and the golden altar, and the table, and the sanctuary, nor did he refrain from the veils, which were of fine linen and scarlet, and draining the gold and treasures, leaving absolutely nothing, he brought the Jews to the greatest mourning because of these things. For he also forbade the daily sacrifices which they offered to God according to the law; and after destroying the whole city, he killed some, led others away captive with their sons and wives, so that the number of the multitude of captives seemed to be up to ten thousand.

But mystically, this Antiochus, who entered the Holy Land with arrogance, devastated the temple, and defiled the holy place with pagan superstition, holds the type of the Antichrist, who wages a cruel war against the Church of Christ, and strives to defile the souls of believers, which are truly the temple of God, with his error. Concerning him, it is written in the prophecy of Daniel, under the figure of this Antiochus: "His heart shall be set against the holy covenant, and he shall act, and return to his own land. At the appointed time he shall return and come toward the south, and he shall be enraged against the holy covenant, and he shall act, and return, and shall devise against those who forsake the holy covenant. And arms from him shall stand, and they shall defile the sanctuary of strength, and shall take away the continual sacrifice, and they shall set up the abomination of desolation. And the wicked shall pretend deceitfully in the covenant, but the people who know their God shall stand firm and act," etc. (Dan. 11:28-32) There is no doubt that these things, which happened under Antiochus Epiphanes as a prefigurement, that is, that the most wicked king persecuted the people of God, foreshadow the cruelty of the Antichrist, who will persecute the Christian people, who will be outraged against the covenant of God, and will plot against those whom he wishes to abandon the law of God, and will defile the sanctuary of God, namely, by corrupting men, created in the image of God, with various vices. He will take away the continual sacrifice when he prohibits the offering of the sacrifice of praise to Christ, the Son of God, in the Church; he will set up the abomination of desolation in the holy place when he forces Christians to render divine worship to himself, so that, sitting in the temple of God, he shows himself as if he were God. Therefore, many of our people think, because of the magnitude of his cruelty and baseness, that Domitian or Nero will be the Antichrist; but although they were themselves Antichrists, as far as his body is concerned, and are his members, yet he himself is the head of all, who is to come at the end of the world, when, according to the word of Truth, there will be tribulation such as has not been from the beginning of the world until now, nor ever shall be (Matt. 24:22). Yet, according to John's words, there are already many Antichrists (1 Jn. 2:18), through whose members the same evil enemy already works the mystery of iniquity, namely through heretics, schismatics, and pagans, and seduces many; then also, if it were possible, he will scandalize even the elect, because Satan will be released from his prison, and will pour out all his fury, as much as is permitted, upon the followers of Christ. Therefore, Antiochus takes away the golden altar from Jerusalem when, by the persuasion of the evil one, he removes from the Church those who seemed to be more perfect and to pray to the Lord for the state of the people not without great zeal. He also takes away the lampstand of light and all its vessels when he casts down from their order, either through fear or earthly desire, those who were fulfilling the office of preaching and ought to shine among the people of God as lights through various forms of doctrine. He therefore takes away the table of the showbread and its vessels when he strives, through heretics, to confuse the Holy Scriptures with wicked interpretation, and seeks to corrupt with the cunning of his wickedness and lead into error those who seemed to remain in the meditation of the law of God, as vessels of the table of God and loaves of proposition.

The same ancient enemy also takes away the veil and the crowns, and the golden ornament which was on the face of the temple, and destroys everything, when he twists the letter of God's law, in which divine wisdom and heavenly mysteries are hidden, and where the crown of perpetual reward is promised to those who labor well and keep God's commandments, to be received in the heavenly kingdom and everlasting glory, by distorting the meanings and corrupting the sense into a foreign understanding, therefore deceiving souls who obey him. For I understand the gold, silver, and hidden treasures as nothing other than the beauty of eloquence and the purity of thoughts, together with the treasure of virtues which are placed in the hidden hearts of the faithful; the Devil tries to take all these things away from the kingdom of Christ, as he attempts to drag their possessors, stripped of these goods, with him into the abyss of his own destruction. Therefore, every day, weeping and groaning arise in the Church, as the assembly of the faithful is not a little saddened by compassion for the fall of their neighbors.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
