[[commentary]]
quote='''
The fear of Judah and his brothers fell upon all the nations, when the power of Christ shone forth in his members through virtues and miracles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
