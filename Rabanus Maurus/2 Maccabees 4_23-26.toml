[[commentary]]
quote='''
Jason, indeed, who had imprisoned his own brother, that is, Onias the elder, son of Simon, was accused before the king by Menelaus, that is, the younger Onias, who had a double name, and, having been deceived, was driven as a fugitive into the region of the Ammonites. Menelaus indeed obtained the leadership, but did nothing about the money promised to the king for the high priesthood, for which reason he likewise was removed from the priesthood, Lysimachus succeeding him. While Lysimachus held the priesthood, Menelaus, during Antiochus's absence, thinking he had found a suitable time because of the second campaign against the people of Tarsus and Mallus, stole certain golden vessels from the temple and gave them to Andronicus, the commander whom the king had left to protect the region. Then Onias the elder, the brother whom Jason had imprisoned, angered by this, accused Menelaus of the wickedness he had committed, while keeping himself in a safe place at Antioch, near Daphne. From there Menelaus, going to Andronicus, asked him to kill Onias. When he came to Onias, and after giving him his right hand with an oath, although Onias suspected him, and persuading him to come out of the sanctuary, he immediately killed him, having no fear of justice, for a deed which not only the Jews but also other nations resented and bore with great displeasure, because of the murder of so great and righteous a man. Therefore the Jews together with the Greeks went to the king when he returned from the regions of Cilicia, and reported what had been done. At this Antiochus was moved even to the shedding of tears; recalling the temperance and modesty of the deceased, and inflamed in spirit, he ordered Andronicus to be stripped of the purple, led around the whole city, and in the same place where he had committed wickedness against Onias, the sacrilegious man was deprived of life, the Lord rendering to him a punishment worthy of him. For with many acts of sacrilege in the temple committed by Lysimachus on Menelaus's advice, and when the report spread, a crowd gathered against Lysimachus: some seized stones, others strong clubs, and some threw ashes at Lysimachus; and many were indeed wounded, some even knocked down, but all were put to flight, and they killed him, the sacrilegious man, near the treasury. Therefore, proceedings began to be conducted against Menelaus; and when the king came to Tyre, three men, sent by the elders, brought the matter before him. When Menelaus was being overcome, he promised Ptolemy large sums of money to persuade the king. So Ptolemy, when the king was in a certain walkway, as if for the sake of refreshment, approached him and turned him from his decision, and Menelaus he acquitted of all the charges brought against him. But the wretched Jews, who, although they had pleaded their cause before the governors and had been judged innocent, he condemned to death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
