[[commentary]]
quote='''
They, falling from the most wicked state of pride into repentance for their sins, by rising again through right faith are found worthy to be raised up into the state of good works. Their spoils Simon receives, when the Catholic teacher strives to convert entirely to the service of God whatever they have worked out by the knowledge of letters or the investigation of truth; where very many of those who had been trained in the liberal arts while living among the pagans… But those who were in Galilee, with their wives and children and all that they had with them, he brought into Judaea with great joy, when, by the teaching of the Gospel, rescuing any Catholics who were entangled in the affairs of the world, he teaches them with all concern and all effort to desire the things that are of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
