[[commentary]]
quote='''
Having conquered nations everywhere, Alexander took away their treasures and wealth from all sides, so that after his death, his attendants and soldiers, because of the massiveness of the riches he had accumulated and because of the power of the kingdom, disagreed among themselves, as Pompeius Trogus and his abbreviator Justin show in their books of Histories, writing that, after Alexander's death, fifty thousand talents of gold were found in his treasury, and thirty thousand in annual tribute. Finally, Alexander, preserved by God's will amid the dangers of battles, was at last, while staying in the city of Babylon, killed by the betrayal of the Medes, and especially by the faction of his commander Antipater, who, through his son Cassander, destroyed him with poison, as the aforementioned Pompeius Trogus narrates, saying that when Alexander, returning to Babylon, had given many days to leisure, he diligently resumed the banquet which had previously been interrupted, and, pouring himself entirely into joy, had joined night to day in wakefulness; as he was already leaving the banquet, the physician Thessalus, with the feast renewed, invited him and his companions, where, having taken a cup, he suddenly groaned as if pierced by a weapon in the middle of drinking, and was carried away from the banquet half-alive, so tortured that he called for iron as a remedy, and the touch of men caused pain as if it were wounds. But in truth, there was a plot: for the aforementioned Antipater, seeing his dearest friends killed by Alexander, and realizing that, despite his great achievements in Greece, he was not so much esteemed by the king as envied, and being harassed by various accusations from his mother Olympias, arranged for his son Cassander to poison the king, giving him the poison, since Cassander, along with his brothers Philip and Iollas, was accustomed to serve the king. The poison was so potent that it could not be contained in bronze, iron, or clay, and could only be carried in a horse's hoof, with the son warned not to trust anyone except Thessalus and his brothers. Therefore, a banquet was prepared and repeated at Thessalus's house; Philip and Iollas, who were accustomed to taste and mix the king's drink, had the poison in cold water, and after tasting it, they poured it into the king's drink. On the fourth day, Alexander, feeling certain death approaching, declared that he recognized the fate of his ancestral house: for most of the Aeacidae had died before their thirtieth year. Then, as the soldiers were in turmoil and suspected the king was dying from a plot, he himself calmed them, and when he was brought out to the highest place in the city, he admitted them all to his presence, and extended his right hand for them to kiss as they wept. And while all were crying, he himself was not only tearful, but showed no sign of a troubled mind, so much so that he comforted some who grieved more impatiently, giving them messages for their parents, so that just as he was unconquered against enemies, so too in death his spirit remained undefeated. When his friends saw that he was failing, they asked whom he would make heir to the empire; he replied, "The most worthy." So great was his nobility of spirit that, although he left behind his son Hercules, his brother Arrhidaeus, and his pregnant wife Roxana, he forgot family ties and named the most worthy as heir: as if it were a crime for a brave man to be succeeded by anyone other than a brave man, or for the wealth of such a great kingdom to be left to any but the worthy. With this voice, as if he had sounded the war trumpet among friends, or had sent the apple of discord, so all rose up in rivalry and sought the ambition of the common people with silent conversation and the favor of the soldiers. On the sixth day, with his voice failing, he handed over Perdiccas' ring, which he had removed from his finger, and this act calmed the growing disagreement among his friends. For although he was not named heir by voice, he seemed to have been chosen by judgment. Alexander died within a month, at the age of thirty-three. However, because mention of the kingdom of Alexander is made in the history of the Maccabees, I have inserted this from the books of the Gentiles, so that the reader may recognize that the virtue of Alexander is not recounted in vain, but that he himself is the principal by greatness of spirit and action. But as for what is said, that Alexander divided his kingdom while he was still alive among his sons, who had been raised with him in youth, it was not so much that he himself divided it, as that he left it to be divided by them. Therefore, Alexander oppressed the trembling world under himself for twelve years. His leaders, in fact, ruled for fourteen years, and like greedy cubs tore apart the rich prey struck down by the great lion; and, incited against each other by rivalry for the prey, they destroyed themselves in quarrels. Therefore, Egypt first, and part of Africa and Arabia, fell to Ptolemy by lot. The neighboring province, Syria, went to Laomedon of Mytilene, Cilicia to Philotas with his son, and Illyria to Philo. Greater Media was assigned to Acropatus, and Lesser Media to Alcetas, the brother of Perdiccas. The Susian people went to Sinos, Greater Phrygia to Antigonus, son of Philip; Lycia and Pamphylia to Nearchus, Caria to Cassander, Lydia to Menander. Leonnatus received Lesser Phrygia. Thrace and the regions of the Pontic Sea were given to Lysimachus, Cappadocia with Paphlagonia to Eumenes; the chief command of the camp fell to Seleucus, son of Antiochus; the king's bodyguards and attendants were commanded by Cassander, son of Antipater. In Bactria beyond and the regions of India, the previous governors who had begun under Alexander remained. Taxiles held the Seres, situated between the two rivers Hydaspes and Indus. Phyton, son of Agenor, was sent to the colonies founded in India. The borders of Parapamisus at Mount Caucasus were given to Apiarches. The Aracussi and Gedrosii were assigned to Fibnuti. Drancae and Rani to Statanus, Bactrians to Amyntas, Sechodae, etc. Nicanor received the Parthians, Philip the Hyrcanians, Fratafernes the Armenians, Neoptolemus the Persians, Pencestes the Babylonians, Arthous the Pelasgians, Archesilaus obtained Mesopotamia. Yet among all these kingdoms, only four were truly prominent: that of Egypt, held by Ptolemy, son of Lagus; that of the Macedonians, possessed by Philip, also called Arrhidaeus, brother of Alexander; that of Syria and Babylon, claimed by Seleucus Nicanor; and that of Asia, held by Antigonus, as was foreshown in the vision of Daniel, where, after the breaking of one great horn on the head of that notable goat, four smaller horns arose in its place.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
