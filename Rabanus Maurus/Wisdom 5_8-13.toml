[[commentary]]
quote='''
Through the five types of likenesses, which, by presenting, he laments that the fruitless repentance of the wicked causes their efforts to flow away, the fleeting nature of life and the deficiency of earthly things are shown to us. For just as a shadow has no firmness in its state, nor does a messenger running about endure delay, and just as a bird in the sky, or a ship in the sea, or an arrow in the air, proceed on an uncertain path, so too is the course of brief life always unstable and uncertain, nor does anything from it remain fixed, except what is expended with virtuous effort for the attainment of eternal life. According to the allegory, however, the shadow can be understood as forgetfulness of the mind or death of the flesh, to which human life is subject. In the messenger running, we can see the passions of the soul or illnesses of the body, which indicate and proclaim the end of corruptible life. By the bird, however, is signified the arrogance of worldly boasting, or heresy. But by the ship is signified the lightness of the human mind, which is tossed by the bitter waves of this age and the blasts of unclean spirits. By the arrow are signified the deceits and snares of the wicked. For all these things are involved in the tribulations of the present life, but after the end is accomplished, they leave fruitless repentance to their possessors in the underworld, for whom they will always groan and will be uplifted by no consolation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
