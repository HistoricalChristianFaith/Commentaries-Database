[[commentary]]
quote='''
He speaks from the perspective of the faithful, who, fortified by the grace of God, in no way wish to involve themselves in the wickedness of the pagans, nor do they deem it worthy to imitate the errors they have in idolatry and various crimes, because such labor is without the fruit of righteousness; indeed, it deserves eternal death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
