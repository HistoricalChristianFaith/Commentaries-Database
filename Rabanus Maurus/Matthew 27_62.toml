[[commentary]]
quote='''
By the Parasceve is meant 'preparation;' and they gave this name to the sixth day of the week, on which they made ready the things needed for the Sabbath, as was commanded respecting the manna, On the sixth day they gathered twice as much. (Exod. 16:22.) Because on the sixth day man was made, and on the seventh God rested; therefore on the sixth day Jesus died for man, and rested the Sabbath day in the tomb.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252027.html'
source_title='Catena Aurea by Aquinas'
