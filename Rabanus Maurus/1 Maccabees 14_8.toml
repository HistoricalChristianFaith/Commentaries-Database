[[commentary]]
quote='''
namely, his own body by practicing virtues, or the land of the Church by good works. Each of the saints, according to his strength, cultivates.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 14"

[[commentary]]
quote='''
That is, our flesh likewise brings forth the fruit of good works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 14"

[[commentary]]
quote='''
And the trees of the fields. That is, people, always blooming with the greenness of faith, bring forth the shoots of virtues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 14"
