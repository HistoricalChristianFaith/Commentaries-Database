[[commentary]]
quote='''
For he alternates, speaking of Catholics and heretics, so that he may show the praiseworthy wisdom of the former and demonstrate the blameworthy cunning of the latter. Indeed, the diverse and various doctrine of the heretics will not be useful, but harmful; nor do their redundant arguments, which indicate spurious offspring, have the root of truth, therefore they do not have the foundation of strength, but when touched by the wind of persecutions or the test of strict judgment, they quickly fall from their firmness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
