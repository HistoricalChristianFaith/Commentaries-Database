[[commentary]]
quote='''
The thought of pure mind is the desire for divine contemplation; how then will he not be fulfilled in feeling, who is always intent on the love of the highest good, and blessed will he be, who with ever-watchful intention seeks the highest Wisdom, whose true adoption is the perception of true sincerity? But no one becomes exalted suddenly; rather, ascent to the highest must be through progress in virtues. Therefore, in the present life, effort must be devoted to learning wisdom, and in conduct, one must live according to the rule of its discipline. But when it has saturated him and perfectly possessed him, it will make him a participant in eternal happiness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
