[[commentary]]
quote='''
The philosophers were left on the path of evil and destruction, because by reasoning they wished to elevate the machinery of the world to divine honor, and chose rather to serve the creature than the Creator: in their very inquiry they failed, and found not salvation but destruction. Similarly, the heretics, by walking difficult paths in pride, composed wicked sects, nor did they recognize the way of the Lord, which is truth and life; therefore, they delivered themselves to perpetual destruction, nor did their pursuit of the present life bring them any benefit, for after death not reward but punishment awaited them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
