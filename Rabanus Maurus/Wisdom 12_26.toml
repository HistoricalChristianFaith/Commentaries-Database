[[commentary]]
quote='''
Indeed, those who, having been chastised by the scourges of God, were not corrected, have experienced the fitting punishment of damnation; for God chastises for this purpose, that He may amend, not wishing anyone to perish, because He wills all men to be saved and to come to the knowledge of the truth. But he who is ungrateful for God's visitation, and through impatience falls into murmuring, is led from temporal chastisement to perpetual torments.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
