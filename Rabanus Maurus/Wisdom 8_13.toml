[[commentary]]
quote='''
The saints possess immortality, because, instructed by the truth of faith and rooted and grounded in divine love, they are already partakers of the hope of future immortality, and by the teachings of sound doctrine, as well as by the examples of good works with the fruits of virtues, they will leave a blessed memory to the generations that come after them, and deservedly so, because they will have a great multitude of faithful disciples from all nations as preservers of their discipline.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
