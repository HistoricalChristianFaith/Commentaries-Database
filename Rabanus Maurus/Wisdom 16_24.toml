[[commentary]]
quote='''
By this sentence all the wicked and sinners are confused, because while the rest of creation serves its Creator, they alone are found to resist His will and commands. But since no one can resist His will, they are deservedly scourged and corrected by the harmony of all creatures, and if they do not repent nor improve themselves, they will be handed over to be tormented with perpetual punishments. But for the good alone true goods are prepared, while for the wicked unending torments are appointed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
