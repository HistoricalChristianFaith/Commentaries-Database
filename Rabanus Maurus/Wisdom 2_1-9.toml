[[commentary]]
quote='''
This is the voice of the lost, who, like brute animals, look only at the present and do not think about the future, nor do they have any hope of eternal rest after the end of this life, about whom it is said by the psalmist: Man, when he was in honor, did not understand; he was compared to the senseless beasts, and became like them (Ps. 49:20). The prophet Isaiah rebukes their voice, saying: For you have said: We have made a covenant with death, and with hell we will make an agreement. When the overwhelming scourge passes through, it will not come upon us, for we have made lies our hope, and we are protected by falsehood (Isa. 28:15). Therefore says the Lord: I will set judgment as a measuring line, and righteousness as a plumb line; hail will sweep away the hope of falsehood, and waters will overflow the shelter, and your covenant with death will be annulled, and your agreement with Hades will not stand. When the overwhelming scourge passes through, you will be trampled by it; whenever it passes through, it will take you away (Isa. 28:17-18). To which the prophet Amos added similar words, saying: Woe to you who are wealthy, and separated for the day of evil, and who draw near to the throne of iniquity; who sleep on beds of ivory, and indulge on your couches; who eat lambs from the flock, and calves from the midst of the herd; who sing to the sound of the harp, and, like David, think themselves to have instruments of song. Who drink wine in bowls, and are anointed with the best ointment, and do not grieve over the ruin of Joseph. Therefore now you will go into exile at the head of the exiles, and the revelry of those who indulge will be taken away (Amos 6:4-7). And again: Because you plundered the poor, and took the best spoil from him, you build houses of hewn stone, but you shall not live in them; you plant pleasant vineyards, but you shall not drink their wine: for I know your many crimes, and your mighty sins. (Amos 5:11-12)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
