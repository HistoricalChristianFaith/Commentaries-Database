[[commentary]]
quote='''
Not only those who fabricate idols are criminals and traitors, but also those who love and worship them, putting their hope in them, since not only those who do evil deserve death but also those who agree with them. The psalmist shows the condition of those who put their hope in idols, "The idols of the nations are of silver and gold, the work of human hands. They have mouths and do not speak, eyes and do not see, ears and do not hear, noses and do not smell. They have hands and do not feel, feet and do not walk. No sounds issue from their throats. Those who make them and trust in them will be like them." Indeed, with wicked hands a mortal shapes something dead, and a fool worships what is beyond foolish. Speaking allegorically, this treats first of heretics, who devise and give shape to perverse opinions, while those who love and worship them are their followers and disciples. And all of them are condemned and destined to be lost. In fact, "they will all be amazed and confused together." "The Lord will disperse the one who has acted thusly, the master and his disciple." "Woe to the godless! He will be repaid according to the misdeeds of his hands."
'''
source_url=''
source_title="ON ECCLESIASTICUS 3:5"

[[commentary]]
quote='''
Not only therefore are those who make idols guilty, but also those who love and worship them, placing their hope in them, are guilty and transgressors, because not only those who do evil, but also those who consent to those who do evil are worthy of death. The kind of people who place their hope in their idols is shown by the Psalmist, saying: The idols of the nations are silver and gold, the work of human hands. They have mouths but do not speak, they have eyes but do not see. They have ears but do not hear, they have noses but do not smell. They have hands but do not feel, they have feet but do not walk, they do not make a sound in their throats; for there is no breath in their mouths. May those who make them become like them, and all who trust in them (Ps. 115:4-8). For a mortal fashions a dead thing with wicked hands and the fool worships the most foolish thing. In an allegorical sense, the inventors and builders of perverse doctrines are heresiarchs; their lovers and worshipers are their followers and disciples, all of whom are guilty and liable to destruction: For all will tremble and stand, and together be confounded (Isa. 44:11). For the Lord will destroy the man who has done this, both the master and his disciple (Mal. 2:12). Woe to their souls, for evil has been repaid to them (Isa. 3:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
