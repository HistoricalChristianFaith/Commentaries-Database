[[commentary]]
quote='''
This Jew who sacrificed to idols before the eyes of all signifies bad Catholics, who by their wicked deeds and the mark of sins scandalize their neighbors. For in this they are proved to sacrifice to idols, in that they are shown to be captivated by the principal vices.

Where Paul the Apostle calls greed the service of idols (Gal. 5:20). But the sword of Mattathias slays these over the altar, because the vengeance of the most just judge exercises rightful punishment upon such people. And also he killed the man whom Antiochus had sent, who was convincing them to sacrifice, at that very moment: because on the last day of judgment, not only sinful men, but also the instigators of sinners, namely evil spirits, will receive the deserved punishment of eternal damnation; and at the same time the altar of wickedness will be destroyed, because after the judgment has been completed, no further opportunity to sin will be granted to the wicked.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 2"
