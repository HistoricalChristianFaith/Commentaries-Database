[[commentary]]
quote='''
It is read in the aforementioned book of Numbers that the murmuring children of Israel, in the thirty-fifth encampment, because of the weariness of the journey and labor, and the lack of food, aroused the anger of the Lord against themselves. Therefore, the Lord sent fiery serpents among the people, and after many had been wounded and killed by them, they came to Moses and said: We have sinned, for we have spoken against the Lord and against you; pray that He may take the serpents away from us. Moses prayed for the people, and the Lord spoke to him: Make a bronze serpent and set it up as a sign; whoever is bitten and looks at it shall live. So Moses made a bronze serpent and set it up as a sign, and when those who had been bitten looked at it, they were healed (Num. 21:6-9). But it must be carefully considered what is said: For he who was healed was not healed by what he saw, but by You, the Savior of all. For it was not the bronze serpent, which was set up as a sign in a figurative way, that saved them, but the ritual of the mystery, that is, the death of Christ, who was prefigured in that serpent; He Himself saved the human race: for all these things happened to them as a figure. Moreover, they were written for our correction, upon whom the ends of the ages have come. But what does it mean that wounds in men caused by the bite of wild serpents were healed by the raising up and looking at the bronze serpent, unless it is that now, in the type of the Savior, who on the wood of the cross triumphed over the wild and ancient serpent, the venom of the Devil is overcome? So that whoever truly and clearly beholds the image of the Son of God and His passion is preserved. For this is also signified by the words of the Lord Himself, saying: As Moses lifted up the serpent in the wilderness, so must the Son of Man be lifted up, that everyone who believes in Him may not perish, but may have eternal life (Jn. 3:14-15). Therefore, rightly was it a bronze serpent that was suspended on the wood; for bronze is usually more durable than other metals, and openly the bronze serpent was suspended on the wood, so that the Lord might be signified both as dead in the serpent and as eternal in the bronze; namely, that He might be shown as dead through His humanity, and yet, as it were, bronze, because of His divinity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
