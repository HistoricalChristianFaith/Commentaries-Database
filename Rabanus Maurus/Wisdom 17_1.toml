[[commentary]]
quote='''
Great are the judgments of the almighty God, and inexpressible are the words by which, with wondrous command, He governs all creation. For this reason, the senseless souls of unbelievers have gone astray, because they were unwilling to believe and understand their Creator, who made all things by His word, nor did they render to Him the due honor in the worship of devotion. Nor is it contrary to this statement, that the words of God are indescribable, what the Psalmist says: I have declared with my lips all the judgments of your mouth (Ps. 119:13), because those things which He wished to be declared by the mouth, that is, to be made revealed, human frailty can understand and recount; but those things which He Himself has decreed to remain hidden, no one at all has been able to investigate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
