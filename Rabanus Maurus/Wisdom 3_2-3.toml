[[commentary]]
quote='''
They were truly foolish when they considered the suffering and extermination of the martyrs to be a defeat, since these were for them the cause of victory and perpetual peace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
