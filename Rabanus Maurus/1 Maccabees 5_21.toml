[[commentary]]
quote='''
Simon engages in many battles with the nations when holy preachers throughout the whole world strive to overthrow idolatry and the confused errors of the nations; and the nations are crushed before their face when they lay aside their stubbornness in resisting the Gospel of God. He pursued them as far as the gate of Ptolemais, when, in their own devices by which, through vain studies, they were plotting to oppose the word of God, they are overcome by truth itself, taken captive, and brought into subjection by the confession of the right faith.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
