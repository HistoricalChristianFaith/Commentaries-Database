[[commentary]]
quote='''
And herein they are not without fault, that the same men should be concerned in the litigations of the forum, who in the synagogue in Moses' seat, seek to be called Rabbi by men.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252023.html'
source_title='Catena Aurea by Aquinas'
