[[commentary]]
quote='''
The fruit of good labors is indeed glorious; for eternal joy and certain rest follow them, nor do those seeds of doctrines or actions which have proceeded from the root of true wisdom ever fail, but they will bring forth the fruit of everlasting salvation. But on the contrary, the dogmas of heretics and the disciples and followers of their wickedness will be exterminated; nor will they have hope of salvation, but condemned to a bitter death, they will be given to perpetual oblivion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
