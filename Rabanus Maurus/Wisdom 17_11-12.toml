[[commentary]]
quote='''
For the conscience is always troubled, and if it does not have the serenity of tranquility within itself, it arrogantly elevates itself, but this presumption is restrained by fear itself. Therefore it is said that his fear is a help, that is, a remedy. It also reveals the weakness of the proud mind, which, by imagining vain hopes of help, was driving itself mad, when it hoped it could achieve what it could in no way accomplish; and therefore, as its inner health was less than the things it suffered outwardly, it thought its power was greater. This often happens also among the persecutors of the faithful; for, because of the blindness of their hearts, they consider themselves powerful when they torture the bodies of the saints with various torments, but when, overcome by their patience, they see that they cannot achieve what they wanted, they are crushed by the anguish of their own mind, and at last they recognize that they are not what they previously thought themselves to be, and they realize that he is stronger who granted his soldiers patience, the endurance to suffer punishments, and the strength to overcome their enemies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
