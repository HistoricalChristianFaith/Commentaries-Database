[[commentary]]
quote='''
For the saints of God there was the greatest light, when they were illuminated both outwardly by bodily light and inwardly by spiritual radiance; for the faith of God and the purity of conscience enlightened them within, whose voices the enemies heard, but whose appearance they did not see, because darkness blinded their eyes, and because, by the temptation of the plagues which came upon the Egyptians, these were not struck, but were led by heavenly guidance through the pillar of fire at night and the pillar of cloud by day, and gave worthy thanks to their Creator. Therefore, since those holy fathers who lived under the Old Testament bore the type of the saints who serve Christ under the New Testament; those in historical Egypt labored afflicted under Pharaoh, while the persecution of the Devil in the world burdens these with tribulations; for the greatest light shines for those who diligently carry the true light, which enlightens every man coming into this world, in the dwelling of their heart. Indeed, the enemies hear the voice of their preaching, but do not recognize the form of the truth that is in them, and therefore do not believe them. Both the pillar of fire at night and the pillar of cloud by day lead them, because the incarnation of Christ always protects them with the shield of His protection in adversity and prosperity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
