[[commentary]]
quote='''
Therefore, the devastator who was sent feared the spiritual, not the figurative, appearance, because he recognized the greatness of the true Pontiff. Now ascend to the higher traces of this word, and from there see how the true Pontiff, Jesus Christ, having assumed the staff of human flesh and placed upon it the fire of the altar, with the soul undoubtedly that magnificent one with which he was born in the flesh, and also adding incense, which is the immaculate spirit standing between the living and the dead, stood, and did not allow death to spread further, but as the Apostle says: He destroyed him who had the power of death, that is, the Devil, so that whoever believes in him may no longer die, but live forever (Heb. 2:14-15). This, therefore, was the mystery that the one who was devastating the people already feared would happen later; for he recognized the figure of the staff and the fire and the incense and what kind of offering should be made to God by him who stood between the dead and the living, he foresaw. And indeed, at that time the prefigured image saved them; but for us, the truth of salvation itself has arrived, nor would that devastator angel have been ashamed of the pontiff's garments woven of purple, wool, and linen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
