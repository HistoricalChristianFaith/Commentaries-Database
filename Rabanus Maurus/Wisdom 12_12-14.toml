[[commentary]]
quote='''
He clearly shows by reason that in no way should it be attributed to the Creator that He disposes of His creature according to His own will. For all things are placed in His will, and there is none who can resist His will (Esther 13). Therefore, it is said by Paul: O man, who are you to answer back to God? Does the thing formed say to him who formed it: Why did you make me? Or does the potter not have power over the clay, from the same lump to make one vessel for honor and another for dishonor? (Rom. 9:20-21) For from Him and through Him and in Him are all things: but the Lord is just in all His ways, and holy in all His works. (Ps. 145:17)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
