[[commentary]]
quote='''
Therefore, they were not able to grasp the mystery of God's counsel, envious and deceitful, "for wisdom will not enter a deceitful soul" (Wis. 1:4); nor could they understand that the death of Christ is the honor and salvation of holy souls, because through it they hope for the reward of justice, and receive entrance into the heavenly kingdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
