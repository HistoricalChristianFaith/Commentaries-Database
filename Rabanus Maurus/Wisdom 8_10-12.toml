[[commentary]]
quote='''
For the birth from the Virgin has been a wonder for all ages, who came, according to the word of blessed Simeon, for the fall and resurrection of many, and as a sign which would be contradicted. Of whom it is also said through Isaiah: The root of Jesse, who stands as a sign for the peoples, before whom kings will shut their mouths, him the nations will seek, and his tomb shall be glorious (Isa. 11:10). Otherwise, the assembly of holy teachers, filled with the doctrine of the Savior and illuminated by the grace of the Holy Spirit, has brightness before the crowds, when by preaching the Gospel and by recommending the word of God through miracles, it calls together a multitude of the elect from all nations to the faith of God. It has honor among the elders when it subjects the principalities and powers of this world to the Christian religion; or even, according to the mystical sense, it has honor among the elders when it is joined with the patriarchs and prophets in the heavenly kingdom. It is found young and sharp in judgment, when it discerns and judges all things according to the law of God. And it is admirable in the sight of the mighty, when the kings of the earth and princes are amazed at the preaching of the Gospel, and, marveling, revere it, and look upon the speaker, and are unable to resist his argument, as has happened very often, as the book of Acts of the Apostles and the passions of the holy martyrs under the New Testament testify. Therefore, it is read in the aforementioned book that, when Peter was preaching, fear came upon every soul. Many wonders and signs were also done by the apostles in Jerusalem, and great fear was upon all (Acts 1). Similarly, in the same book it is narrated that those who disputed with Stephen could not resist the wisdom and the Spirit by which he spoke (Acts 6). Likewise, Saul, after he received the faith of God and was baptized in Damascus through the preaching of Ananias, grew stronger and confounded the Jews who lived in Damascus, affirming that this is the Christ, acting confidently in the name of God (Acts 9). The same apostle, when he was preaching the word of God on the island of Cyprus, and there found a false prophet of the Jews named Bar-Jesus, who was with the proconsul Sergius Paulus, a wise man, when he found that this man was resisting him, he rebuked him and struck him with blindness; immediately the proconsul, when he saw what had happened, believed, being astonished at the doctrine of the Lord (Acts 13).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
