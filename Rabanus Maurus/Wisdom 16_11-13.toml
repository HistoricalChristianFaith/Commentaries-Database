[[commentary]]
quote='''
Note that he says those harmed by serpents were not healed by bandages and the work of doctors, but by the Word of the Lord, that is, the Son through whom all things were made, and without whom nothing was made: whose power rules everywhere, and does whatever he wills in heaven and on earth, in the sea and in all the depths; he himself heals bodies, he himself saves both bodies and souls from spiritual beasts, that is, evil spirits, nor is there anyone who can resist his will (Esther 13:11).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
