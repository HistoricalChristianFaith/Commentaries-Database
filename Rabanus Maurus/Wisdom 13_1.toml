[[commentary]]
quote='''
For all men by nature were vain, in whom there was ignorance of God. And if every living man is altogether vain, how much more vain are those who do not acknowledge their Creator. But all men are vain in whom there is no knowledge of God, that is, the fear and reverence of God. Therefore it is said through Job: Behold, the fear of the Lord, that is wisdom, and to depart from evil is understanding (Job 28:28). For he departs from evil who withdraws from the worship of idols; he fears God who keeps His commandments. For the beginning of wisdom is the fear of the Lord; a good understanding have all they that do His commandments (Ps. 111:10). and who were unable from the visible good things to know him who is. For from good works they could have known the good craftsman, who truly is, because He is always unchallengeable, who alone has immortality, and dwells in inaccessible light; who is always the same, and whose years never fail: who is eternal and omnipotent, without beginning and without end, always remaining in Himself, according to His will governs and directs all things; therefore, the vanity of men is most vain, who worship creatures instead of the Creator.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
