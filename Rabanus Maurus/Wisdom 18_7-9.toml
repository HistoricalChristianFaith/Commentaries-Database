[[commentary]]
quote='''
At the time when the people of God were to be led out of Egypt by Moses and Aaron, the people themselves, still situated in Egypt, were sacrificing the Passover victim at the Lord's command; and therefore it is said that they sacrificed secretly, because, terrified by fear of their enemies, they did this in hiding, just as they learned from Moses' teaching how the law of the Passover was to be observed thereafter, having suffered the temptation of the wicked for a time, but soon to be freed from the hands of their enemies by divine help. In a similar way, even now in the times of grace, the servants of God to whom the divine law has been given for the harmony of the two Testaments, although they may be hindered for a time by their persecutors from openly celebrating the worship of the Christian religion, nevertheless cannot in any way be prevented from offering sacrifices worthy of the divine presence in the hidden places of their hearts, because it is written: The sacrifice to God is a repentant spirit; a repentant and humbled heart God does not despise (Ps. 51:17). And the same Prophet also says: In me are your vows, O God, which I will repay with praises to you (Ps. 56:12). The vows of the righteous are pleasing to the Lord, and the sacrifices of the wicked are abominable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
