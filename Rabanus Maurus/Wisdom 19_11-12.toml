[[commentary]]
quote='''
Note, wise reader, that for the adversaries of God the earth produced flies, and the river brought forth frogs; but for the worshippers of God the earth gave fruit and the sea provided meat as food, because it is fitting that through His works divine providence should acquire nourishment for His faithful. For His enemies, however, it is fitting that through the creatures subject to Him, the justice of the Almighty should prepare appropriate torment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
