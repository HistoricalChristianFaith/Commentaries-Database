[[commentary]]
quote='''
For the persecutors of the Church of Christ, as we have said, believed that the end of the martyrs was destruction, and therefore they despised the steadfastness of their faith. But the Lord will mock them, when He shows them that what they hoped would benefit them has completely harmed them; for when they wished to defend the false deities of their gods against the followers of Christ, they delivered themselves into perpetual damnation. [Verse 19] For the Lord will overthrow them, swollen with pride, without a word of excuse, so that they will then be in all things inexcusable, because although they knew God, they did not glorify Him as God or give thanks; but they became fruitless in their thoughts, and their foolish heart was darkened. Claiming to be wise, they became fools; and they exchanged the glory of the incorruptible God for the likeness of an image of corruptible man, and of birds and serpents and four-footed animals. Therefore God gave them up to shameful passions, and to a debased mind, to do things that are not fitting, filled with all unrighteousness, wickedness, fornication, greed, malice, full of envy, murder, strife, deceit, malevolence, whisperers, slanderers, hateful to God, rude, proud, arrogant, inventors of evil, disobedient to parents, senseless, untrustworthy, without affection, without covenant, without mercy; who, although they knew the justice of God, did not understand that those who do such things are worthy of death (Rom. 1:22-32); and He will shake them from their foundations, because He will utterly overthrow the state of their life, and they will be desolate even to the utmost; for never after this will they be relieved by any comfort, but they will be groaning in torments, and their memory will perish forever.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
