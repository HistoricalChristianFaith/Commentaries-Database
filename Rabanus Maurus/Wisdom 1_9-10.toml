[[commentary]]
quote='''
The outcry of Sodom and Gomorrah has multiplied and come to the Lord, and He descended to see whether they had completed by deed the outcry that had come to Him. Therefore, the Lord rained upon the sinners sulfur and fire from the Lord, and overthrew these cities and the entire surrounding region. Therefore, also the murmuring of the children of Israel went up to the Lord, and behold, the wrath of the Lord was stirred up against the people, and He struck them with a very great plague. For the Lord God is a consuming fire, a jealous God, and He will render to each according to his works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
