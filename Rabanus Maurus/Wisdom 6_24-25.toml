[[commentary]]
quote='''
But the multitude of the wise is the assembly of holy preachers, whose teaching is the health of the world, because through it an innumerable crowd of various nations has been converted to the faith of Christ. Of this crowd, indeed, the wise king is, or rather, the very wisdom and power of God, Jesus Christ, our God and Lord, who becomes the strength of his elect, since, as the Psalmist attests, the Lord is the strength of his people, and the protector of the salvation of his Christ (Ps. 28:8); of whom the same Prophet says: The Lord is my rock and my strength, and my savior, my strong God, I will hope in him (2 Sam. 22:2-3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
