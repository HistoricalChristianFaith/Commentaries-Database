[[commentary]]
quote='''
For the Spirit of God is gentle, for He Himself is the love of God, and the giver of all good; He Himself reproves men, because He causes those whom He fills to reprove sinners, just as Truth itself says to the disciples in the Gospel: I tell you the truth, it is to your advantage that I go away. For if I do not go away, the Paraclete will not come to you; but if I go, I will send Him to you. And when He comes, He will convict the world concerning sin, and righteousness, and judgment. Concerning sin, because they do not believe in Me; concerning righteousness, because I go to the Father and you will see Me no longer; concerning judgment, because the prince of this world is judged (Jn. 16:7-11). Blessed is the man who hears the voice of this Teacher and obeys His commands, for he will be the possessor of the heavenly kingdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
