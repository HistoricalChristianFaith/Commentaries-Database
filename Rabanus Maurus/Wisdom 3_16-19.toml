[[commentary]]
quote='''
Indeed, heretics are adulterers, who, adulterating the word of God, attempt to transfer it into another meaning. Their children, that is, their disciples, will be at the end, because they tend toward eternal perdition. These, having been brought up from a wicked bed, nourished by the poisonous nourishment of a polluted conscience, even if they are long-lived upon the earth, yet this will profit them nothing, when they are to be destined for the burning of eternal fire. and their old age shall be dishonorable, because their memory will forever lack blessing, nor on the day of recognition, namely at the hour of the universal judgment, when the elect, recognized by their judge, will be invited to the possession of the heavenly kingdom, will they be consoled by any hope of their restoration, but will be expelled to be tormented forever from the presence of the human king.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
