[[commentary]]
quote='''
The wondrous Creator gave knowledge to His creature, so that in the present age he might be able to attend to his own necessity, and serve the will of his Lord. Therefore also from the beginning, when the human race began to serve idolatry, and all evils were fashioned upon the earth by proud giants, the almighty Judge commanded His faithful servant Noah to build an ark, through which he and his offspring might be saved, and the species of all living creatures might be preserved for the future restoration of the world. The mystery of this, indeed, the Apostle Peter shows in his Epistle, saying: Christ once died for our sins, the just for the unjust, that He might offer us to God; put to death in the flesh, but made alive in the spirit. In which also He went and preached to the spirits in prison, who had once been disobedient, when the patience of God waited in the days of Noah, while the ark was being built, in which a few, that is, eight souls, were saved through water; which now saves you also, baptism of a like figure (1 Peter 3:18-21). They say that the form of baptism is likened to the ark and the waters of the flood, and rightly so, because the very construction of the ark from smoothed wood signifies the building of the Church, which is made from the gathering of the souls of the faithful by the architects of the Word. And that, when the whole world perished, only a few, that is, eight souls, were saved through water, signifies that, in comparison to the perishing Gentiles, Jews, heretics, and false believers, the number of the elect is much smaller. Therefore, concerning the narrow gate and the strait way which leads to life, it is said: And few there are who find it (Matt. 7:13-14). And again: Fear not, little flock, for it has pleased your Father to give you the kingdom (Luke 12:32). Therefore, that the water of the flood did not save those outside the ark, but destroyed them, undoubtedly prefigured that every heretic, although having the sacrament of baptism, is not raised by the waters but is drowned by them into hell, while the ark is lifted up to heaven. Also, the very number eight of the souls who were saved through water signifies that the holy Church receives the washing of baptism as a sacrament of the Lord's resurrection, so that just as He rose from the dead by the glory of the Father, so we, cleansed from sins by the water of regeneration, may walk in newness of life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
