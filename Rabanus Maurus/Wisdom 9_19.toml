[[commentary]]
quote='''
But who has known your mind, unless you have given him wisdom, and sent your Holy Spirit from on high? For it is clear that we can only perceive knowledge of divine things through the grace of the Holy Spirit, because no one knows what is in a man except the spirit of the man which is in him. So also, no one knows the things of God except the Spirit of God. For the Spirit searches all things, even the depths of God; he himself enlightens the hearts of the saints, and instructs them about invisible and heavenly things, so that they may perceive the understanding of the divine majesty according to their capacity, and are always compelled to love his goodness. For by wisdom all those who pleased you, Lord, from the beginning have been healed. Now he begins to explain that through the wisdom of God, that is, Christ, all who pleased God have been healed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
