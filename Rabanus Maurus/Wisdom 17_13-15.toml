[[commentary]]
quote='''
He says this when, in Egypt, the enemies of the people of God were surrounded by the horror of darkness, so that neither those awake nor those asleep had any rest. For either those sleeping were disturbed by terrifying visions, or those awake were tormented by excessive fear; nor was there any opportunity given to them to withdraw freely anywhere, but without a shackle or iron chain, they were confined in the prison of darkness. Therefore it is written: For three days, no one saw his brother, nor did anyone move from the place where he was (Ex. 10:23).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
