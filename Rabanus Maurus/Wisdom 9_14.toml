[[commentary]]
quote='''
Therefore the thoughts of mortals are timid, because they are fragile, and therefore the foresight of man is uncertain, because his soul is changeable, and his flesh is corruptible, as the following sentence shows.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
