[[commentary]]
quote='''
According to history, therefore, the Creator of all, whose weapons are truth, justice, and judgment, through the creature subject to Him, rebukes and strikes those who do wrong. According to the allegory, however, the same Lord arms the creature for the vengeance of His enemies, when through the preachers of the Gospel He reproves the treachery of the Jews, the foolishness of the Gentiles, and the deceit of heretics, concerning sin and righteousness, and judgment, and pierces their hearts with the darts of words, so that, terrified by wholesome fear, they may yield to the hand of Almighty God and learn to be subject to Him, whose admonition they ought by no means to resist, since they are in no way able to withstand His power. But when he says that the whole world fights with Him against the senseless, he shows that the entire Church of Christ, together with its King, that is, the members with the head, fights against the errors and wickedness of the unjust, through the weapons of truth and justice. And which, founded by the authority of the Lord upon the most solid rock, in no way fears ruin: Because the gates of hell shall not prevail against it (Matt. 16:18); but fixed and unshaken, it remains through all ages.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
