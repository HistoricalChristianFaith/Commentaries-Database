[[commentary]]
quote='''
And if anyone loves justice, the labors of it possess great virtues. No one can attain the prize of righteousness unless he follows the rule of wisdom, because it preserves the standard of equity and leads by the way of truth to eternal life. For indeed, the labors of it possess great virtues, because there is nothing idle, nothing combative in its works, but whatever things are true, whatever are pure, whatever are righteous, whatever are holy, whatever are lovable, whatever are of good reputation, these it performs; and it entrusts these things to its lovers to be done, so that by the practice of this good they may obtain eternal life; for the fruit of light is in all goodness, and righteousness, and truth. for she teaches soberness and caution, righteousness and courage, than which nothing is more useful in life for human beings. Not only do philosophers believe that there are four principal virtues, but our own authorities also agree, which here are called restraint, wisdom, righteousness, and virtue. Elsewhere, however, these same virtues are called by different names: wisdom, righteousness, courage, and restraint. But what these four are, or what the works of each are, we ought briefly to demonstrate with the Lord enlightening us. Hardly anyone is ignorant that the number four is sacred to perfection, since the whole world is found to be bounded by four parts or corners: east, west, north, and south; and Adam himself, the father of the human race, or the general name which is called "man," is spelled with four letters. The body also, constructed from four elements, contains within itself the mystery of the number four. Even the soul itself is said to have four affections, by which we are led either to good or to evil; and the ancients discovered this subtly, and their discoveries have been approved and received by their successors. Moreover, the four rivers which flow from the source of paradise, or the four Gospels as the divine course of the wheel, and the four living creatures, their four wings and faces, all abundantly commend the dignity of this number. Therefore, we must carefully consider how much perfection these virtues, which are so numerous, contain in their number, how much sanctity they grant upon the Christian soul, and how there is nothing perfect anywhere which is not found in these virtues. For if restraint makes one moderate, wisdom wise, righteousness righteous, and courage brave, I do not know what could be more perfect than one who acts with restraint, righteously, wisely, and bravely. Therefore, it is indeed difficult for us to show the names of the individual virtues from which perhaps other virtues arise, which originate from those four we have called principal; but when their properties and actions begin to be revealed, it may appear from the effects what virtues arise from each. Nevertheless, above all, we must know and hold that these four virtues, or all those which arise from them, are gifts of God, and that no one has, had, or will have them except to whom God, who is the source and origin of all virtues, has granted them. For whoever at any time, in any nation, believed in God and lived by faith, could certainly become moderate, wise, righteous, or brave by His gift. But those who, not knowing God or even blaspheming, lived without faith, are to be believed to have been unable to receive or possess any of those virtues from God. For all have turned aside, together they have become worthless; there is none who does good, not even one (Ps. 14:3). And although they seemed to have a certain appearance of holiness, they were entirely ignorant of its power, because they were unwilling to submit to their Creator. Therefore, searching various things and striving by different inquiries and debates, they did not know the way of wisdom, nor did they find the way of discipline, and therefore they perished. And because they did not have the wisdom of God, they perished by their own wisdom. For God, our God, who is the source of life and the true light, the Word and power and wisdom of God, to whom no other can be compared nor is any like found, He discovered every way of discipline, and gave it to Jacob His servant, and to Israel His beloved. After these things, He appeared on earth and lived among men (Baruch 3:36–38). Therefore, all usefulness of discipline and understanding, of wisdom and prudence, must be referred to Him, because every good gift and every perfect gift is from above, coming down from the Father of lights (James 1:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
