[[commentary]]
quote='''
Pastophoria in Greek are called chambers, or rooms, in which the Levites kept watch in the courts of the house of the Lord, whose mention is made in the last vision of the prophet Ezekiel. Therefore, pastophoria are destroyed when the secrets of the mind are torn apart by illicit desires; but above all, it is necessary that all these things be most urgently purified through repentance for sins, amendment of conduct, and devout prayers to the Lord. Therefore, it is rightly written about the army of Judah that when they saw the sanctification deserted, they tore their garments and mourned with great weeping (4:39).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
