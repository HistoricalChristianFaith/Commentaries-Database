[[commentary]]
quote='''
In the previous chapter, the opinion of the wicked was expressed, which they put forth against our head with perverse understanding and nefarious words. Now, however, their error is condemned, which they believed occurred in the destruction of his members, when they slaughtered them with various punishments for the confession of his name. But the souls of the righteous are in the hand of God, that is, under his protection, and the torment of eternal death cannot harm them in any way.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
