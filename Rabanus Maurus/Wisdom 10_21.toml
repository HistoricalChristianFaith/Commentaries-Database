[[commentary]]
quote='''
It is clear that without the wisdom of God, the human mind can neither conceive anything worthy nor utter anything fitting; therefore, sober understanding and the ability of sound speech must be sought from Him alone, since all things are from Him, through Him, and in Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
