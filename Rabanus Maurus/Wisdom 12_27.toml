[[commentary]]
quote='''
Wretched breeding, which for so long served idols, was also deceived by error and believed those to be gods by whose persuasions they were led astray, and because of this they were subjected to various punishments. Therefore, many from among them later recognized the true God, whom previously they refused to believe in through His benefits, as almighty in just judgment. For He could not remain hidden, since He is acknowledged to be the ruler of all, because either He grants mercy here to those who are converted through repentance, or He assigns everlasting punishment in the future to those who rebel through pride.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
