[[commentary]]
quote='''
How the magi in Egypt resisted Moses by performing false wonders through magical incantations to deceive the people, the book of Exodus recalls; but at last, when they saw themselves overcome by the power of the signs which were divinely performed through Moses and Aaron, they were compelled to confess that it was the finger of God who accomplished these great deeds (Ex. 4:30). And those who just before boasted themselves to be healers of all diseases, at the coming of the serpents and other animals which afflicted them, were struck with fear and suffered in the same way as the others; and so also now, in the times of grace, all who mock the Christian religion, who boast in their own arts, that is, the diviners and soothsayers of the pagans, as well as those who have departed from the unity of the Church through apostasy, such as heretics and schismatics, although they pretend to be victorious, are nevertheless truly overcome by the power of Christ, and in the end will suffer the most cruel enemy, the ancient serpent, with his followers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
