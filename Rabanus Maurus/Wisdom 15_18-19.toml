[[commentary]]
quote='''
Miserable paganism not only worshipped the human form shaped in insensible things as a deity, but also perversely adored the forms of other animals, nor did it have a just discernment in any matter. For according to the consideration of truth, living things are set before the dead, and sensible things before insensible, and rational animals before other animals; but it was fitting that those who ignored their Creator also did not know how to make proper distinctions among His creatures; for whoever neglects to have the praise and blessing of God within himself will prove himself to err in the observation and discernment of animals.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
