[[commentary]]
quote='''
The good worker loves, preserves, and governs good work, and therefore, if ever human weakness strays from the way of truth by sinning, he endures with much patience, waiting for them to be converted for the better through repentance. Therefore, he makes his sun rise on the good and the evil, and sends rain on the just and the unjust (Matt. 5:45). But those who abuse the patience of God and do not turn to repentance are condemned by his just judgment, because the Lord is just and loves justice; his face has seen equity (Ps. 11:7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
