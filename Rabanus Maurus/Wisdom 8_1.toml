[[commentary]]
quote='''
Therefore, the only-begotten Son of God is co-eternal and co-equal in all things to the Father and to the Holy Spirit. From end to end, that is, from eternity to eternity, he reaches mightily, because he is the power of God; and he arranges all things sweetly, because he himself is wisdom, who in the Revelation of John therefore says: I am the Alpha and the Omega, the beginning and the end, says the Lord God (Rev. 22:13). The beginning, whom no one precedes. The end, to whom no one succeeds in the kingdom, who is, who was, and who is to come, the Almighty. Who elsewhere through the Prophet says: Before me no god was formed, and after me there will not be (Isa. 43:10). Otherwise, wisdom reaches from end to end mightily when, from the beginning of the creation of the world to the coming of the Lord, it mightily asserts the wondrous works of God and the pure testimonies of the divine law through the Old Testament, and from the incarnation of the Word to the end of the world, it sweetly explains the sweetness of the divine commandments through the Gospel. Therefore, the one and the same creator is of both Testaments, namely the mediator of God and men, who in the law commended the fear of himself to his elect, and in the Gospel the love of himself. Therefore, elegantly, wisdom is said to reach from end to end mightily: because everywhere it is proclaimed to be of flawless and perfect virtue; for we often find in the Scriptures that the end is put for perfection, as is that saying of the Apostle: The end of the commandment is charity, from a pure heart and a good conscience, and faith sincere (1 Tim. 1:5). And again: The end of the law is Christ for righteousness to everyone who believes (Rom. 10:4). Therefore also in the Gospel, Truth itself wished to show that the two precepts of love are the fulfillment of the Law and the Prophets, and answered the lawyer, saying: On these two commandments hang all the Law and the Prophets (Matt. 22:40), that is, all the doctrine of the Law and the Prophets is fulfilled in these, and in these is completed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
