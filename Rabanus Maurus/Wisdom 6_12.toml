[[commentary]]
quote='''
It is true that whoever loves wisdom and is hard-working in its meditation preserves discipline in morals, nor can a lover of wisdom be proven otherwise unless he is a preserver of discipline. Therefore, Truth itself says: If you love me, keep my commandments (Jn. 14:15). And again: If anyone loves me, he will keep my word (Jn. 14:23). Therefore James also says: Be doers of the word and not hearers only, deceiving yourselves, because not the hearers of the law will be justified before the Lord, but the doers of the law (James 1:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
