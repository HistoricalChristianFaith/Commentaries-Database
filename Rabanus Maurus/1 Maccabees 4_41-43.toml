[[commentary]]
quote='''
It is rightly said that Judas appointed men to fight against those who were in the citadel until the holy things were cleansed, because this is what our Redeemer ordains through his preachers: that his soldiers should fight diligently against those who dwell in the citadel of pride, that is, men puffed up with the spirit of arrogance, or swelling with pride like evil spirits, until they purge the hearts of the elect from every stain of iniquity. And they chose priests without blemish, having the will to follow the law of God, and they cleansed the holy things, because, after removing from ecclesiastical office those who bore the leprosy of error or the stain of crimes, they chose as ministers of the word those who were willing and morally upright in faith, so that the assemblies of the holy Church might be made free from every infection of error. Indeed, it is further stated that they took the stones of contamination to a clean place, because heretics who did not wish to become precious stones through a life of right faith and sound doctrine, having been struck with anathema and cast out, were shown to all to be reprobate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
