[[commentary]]
quote='''
They are clearly described in the Gospel, where the chief priests and Pharisees took counsel on how they might deliver Jesus to death, and when he was placed on the cross, the chief priests with the scribes and elders, mocking, said: He saved others; himself he cannot save. If he is the King of Israel, let him come down from the cross, and we will believe him. He trusts in the Lord; let him deliver him now if he will have him; for he said, I am the Son of God (Matt. 27:42-43). He calls the most shameful death the cross, because until the passion of Christ it was the punishment of criminals, which now is the trophy of victory and the glory of believers. For when he says, "for there will be an examination of him according to his words," this refers to his resurrection; for the unbelieving Jews wanted to test whether he could raise his flesh after death, because they remembered that he had said: Destroy this temple, and in three days I will raise it up (Jn. 2:19). And elsewhere: Behold, he said, we go up to Jerusalem, and all things that are written by the prophets concerning the Son of Man shall be accomplished. For he shall be delivered to the Gentiles, and shall be mocked, and spitefully entreated, and spitted on; and after they have scourged him, they will kill him, and the third day he shall rise again (Luke 18:31-34). Wherefore, even during His Passion, they said to Pilate: Lord, we remember that this deceiver said while still alive: After three days I will rise again. Therefore, command that the tomb be guarded until the third day, lest perhaps His disciples come and steal Him away, and say to the people: He has risen from the dead; and the last error will be worse than the first (Matthew 27:64).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
