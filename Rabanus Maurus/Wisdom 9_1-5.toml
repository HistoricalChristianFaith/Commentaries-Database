[[commentary]]
quote='''
In the Gospel, after presenting the example of the one who persistently asked his friend, who was in a room, for three loaves of bread, the Lord immediately turned his speech to the disciples, saying: Ask, and it will be given to you. Seek, and you will find. Knock, and it will be opened to you. For everyone who asks receives, and the one who seeks finds, and to the one who knocks it will be opened (Matt. 7:7-8). Similarly, the apostle James admonishes his hearers to implore wisdom from God, saying: But if any of you lacks wisdom, let him ask of God, who gives to all abundantly and does not reproach, and it will be given to him (James 1:5). From this it is clear that whoever asks rightly, and for those things which are according to God's will, will not be frustrated in the effect of his petition. Therefore, this wise petitioner begs God the Father to give him wisdom, the assistant at his throne, namely that wisdom which always remains with him, and reigns, and can never be separated from him, which is also his Word, through whom all things were made, and man himself, rational, was created in the image of God, so that he might surpass all earthly creatures, and, subject to God, might rule the world placed under him. However, in a higher sense, this can be referred to our Redeemer himself, who, sent by the Father into the world, consented to be born as a man through the Virgin, and who rules and governs the world of the Church by his own will. His judgment never fails, because, as the Prophet testifies: Righteousness shall be the belt of his loins, and faithfulness the belt of his waist (Isa. 11:5). He will judge the world in equity, and the peoples in his truth (Ps. 96:13), who was not rejected but rather chosen by God, of whom it is said through Isaiah: Behold my servant, I will uphold him, my chosen one, my soul delights in him (Isa. 42:1). He also agreed to be called by the name of servant, therefore the divine voice said to him through the aforementioned prophet: It is too small a thing that you should be my servant to raise up the tribes of Jacob and to restore the preserved of Israel; I will make you a light for the nations, that my salvation may reach to the end of the earth (Isa. 49:6). His mother also did not refuse to profess herself the handmaid of God, who, when the angel announced to her the divine birth in the Gospel, replied: Behold the handmaid of the Lord; let it be to me according to your word (Luke 1:38). Therefore, the saints are his members, who, reborn by water and the word through the mother Church, and cleansed from the stain of sins by the grace of the Holy Spirit, humbly submit themselves to his service. Therefore, the Son prays to the Father, the head interceding for the body, that it may be enlightened by his grace and led in the way of righteousness; for he knows that whatever good he has in speech, will, and deed is his gift.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
