[[commentary]]
quote='''
Blessed is the man who is always fearful (Prov. 28:14), and does not presume to think, speak, or act at any time. On the contrary, the foolish people of heretics are confident and ensnared, caught by their own words; therefore Scripture says: But he who is stubborn of mind will fall into evil (Ibid.). For it is fitting for the servant of God to deal soberly with earthly things and cautiously with heavenly things, and let him remember what is written: Do not seek things that are too high for you; God made all good things in their own time, and handed over the world to their conflict, so that man may not find the work which God has done from the beginning to the end (Eccles. 3:11). And elsewhere: I applied, he says, my heart to know wisdom, and to understand the dispensation that is at work on earth; and I understood that of all the works of God, no man can find the reason for those things which are done under the sun: and the more he labored to seek, the less he would find. Even if the wise man says he knows, he will not be able to find it (Eccles. 8:16–17). Therefore it is rightly said here: What is in view we find with labor, but what is in the heavens, who has investigated? But lest he should cause us to despair of inquiring into divine things, he brings us consolation by adding the grace of the Holy Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
