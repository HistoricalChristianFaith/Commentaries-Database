[[commentary]]
quote='''
Whence Matthew, who wrote his Gospel to the Jews, is the only one who mentions that the ass was brought to the Lord, to show that this same Hebrew nation, if it repent, need not despair of salvation,
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
