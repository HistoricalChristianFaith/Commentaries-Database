[[commentary]]
quote='''
And Lysias selected sixty thousand men and five thousand horsemen to wage war against Israel, with all the power of this world, which is divided into six ages; through the five bodily senses, the prince of this age, with the rulers of these present darknesses inciting, strives to overcome the soldiers of Christ by loosening them through various vices, and through evil men he plots the destruction of the good. But Judas confronted them with ten thousand men, because the army of our King is stronger than the others in this: that it strives in all things to obey the divine commandments, and by sending constant prayers to the Lord, it is strengthened by His hand, in whose power it especially trusts; and it persists in battle until its enemies and the opposing spiritual weapons are utterly slain by the sword.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
