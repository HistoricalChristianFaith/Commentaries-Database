[[commentary]]
quote='''
It is clear that to the eternal power and wisdom of God, namely our Lord Jesus Christ, all things are open, and everything is possible for Him; there is nothing hidden from Him, nor can anything resist His will. But whatever He wishes, He does in heaven and on earth, in the sea and in all the depths; He Himself knows the past and judges the future, as He says through the prophet: "Before Me no god was formed, and after Me there will be none" (Isa. 43:10). And in Proverbs: "The Lord," he says, "possessed me at the beginning of His ways, before He made anything from the beginning; I was ordained from eternity, and from ancient times, before He made the earth" (Prov. 8:22-23). And again: "When He prepared the heavens, I was there; when He set a law and circle around the depths, when He established the sky above, and balanced the fountains of waters, when He surrounded the sea with its limit, and set a law for the waters so that they would not pass their boundaries, when He hung the foundations of the earth, I was with Him arranging all things, and I delighted every day, playing before Him" (Prov. 8:27-30). He Himself knows the subtleties of words and the endings of arguments, who in the Gospel said to His disciples: "I will give you a mouth and wisdom, which all your adversaries will not be able to resist or contradict" (Luke 21:15). He Himself knows signs and wonders before they happen, and the outcomes of times and ages, who, instructing His chosen ones about the future, foretold to them the signs and wonders which will come before the day of judgment and His coming at the end, therefore saying: "There will be signs in the sun and moon and stars, and on earth distress of nations in perplexity because of the roaring of the sea and the waves, men fainting with fear and expectation of what is coming upon the whole world. For the powers of the heavens will be shaken. And then they will see the Son of Man coming in the clouds of heaven with great power and majesty," and the rest (Luke 21:25-27).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
