[[commentary]]
quote='''
It commemorates the fact that in Egypt the enemies of the people of God suffered in the darkness of gloom, which Scripture reports as so dense that it could be felt; in which, having suffered excessive horror, they were justly punished for their sins and for the dark oblivion. Mystically, all persecutors of the Church of Christ, namely Jews, pagans, heretics, and also false Christians, suffer the enormous darkness of their crimes and errors, nor can they be safe and secure anywhere, for the rulers of these darknesses lead them according to their own will, and finally plunge them into the outer darkness, where there will be weeping and gnashing of teeth, to be punished perpetually with them. That all those who act wickedly are in darkness is shown by Truth itself in the Gospel, saying: “Everyone who does evil hates the light, and does not come to the light lest his works be reproved; but whoever does the truth comes to the light, so that his works may be manifest, because they are done in God” (Jn. 3:20-21). And again: “He who follows me,” he says, “will not walk in darkness, but will have the light of life” (Jn. 8:12). Therefore John also says: “He who hates his brother is still in darkness, and walks in darkness, and does not know where he goes, because darkness has blinded his eyes” (1 Jn. 2:11). Of which Peter also says to believers: “But you are a chosen race, a royal priesthood, a holy nation, a people for his own possession, that you may proclaim the virtues of him who called you out of darkness into his marvelous light, who once were not a people, but now are the people of God; and who had not obtained mercy, but now have obtained mercy” (1 Peter 2:9-10). Therefore Paul also says to them: “For you were once darkness, but now you are light in the Lord; walk as children of light” (Eph. 5:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
