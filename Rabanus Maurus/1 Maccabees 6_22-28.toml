[[commentary]]
quote='''
The typical Antiochus gathers an army not only from his own people, but also from foreigners, because the savagery of persecutors, not content with internal revolt, also rouses enormous wars from outside against the servants of Christ. They form infantry, arrange cavalry, prepare elephants, so that nothing may be lacking to their cruelty; but whatever wickedness can conceive, all massacre prepares. But figuratively, just as foot soldiers and horsemen can represent officers and executioners, so also elephants, because of the enormity of their bodies and the cruelty of their spirits, can represent the arrogance of princes; and it is fitting that they showed the blood of the grape and of the mulberry to the beasts to inflame their anger, because in the shedding of the blood of the martyrs the savagery of the persecutors was stirred up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
