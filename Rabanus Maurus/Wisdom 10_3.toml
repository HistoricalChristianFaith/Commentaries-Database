[[commentary]]
quote='''
He denotes the first offspring of Adam, that is, Cain, who through the wickedness of envy departed from God and unjustly killed his brother Abel, bringing about his own destruction. When the punishment for this crime was exacted in the flood and the generation of Cain was destroyed, divine wisdom again, through the construction of the ark, preserved Noah, descending from the line of Seth, together with his sons, for the restoration of the world, as the following statement demonstrates:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
