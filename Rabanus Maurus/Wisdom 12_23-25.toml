[[commentary]]
quote='''
The punishment for those who lived unjustly and senselessly in their lives was that, through the things they worshipped, they endured torment; and by divine judgment, since they were unwilling to know their Creator and to honor Him as was fitting, they were handed over to a depraved mind, to do those things which are not fitting, dishonoring their bodies among themselves, so that in this they would have shame now, and in the future, eternal torment. The apostle Paul explains the truth of this matter in his Epistle to the Romans, saying: For the wrath of God is revealed from heaven against all ungodliness and unrighteousness of men, who hold the truth in unrighteousness, because what is known of God is evident in them. For God has shown it to them. For the invisible things of Him from the creation of the world are clearly seen, being understood by the things that are made: even His eternal power and Godhead, so that they are without excuse; because, when they knew God, they did not glorify Him as God, nor were thankful, but became vain in their imaginations, and their foolish heart was darkened. Professing themselves to be wise, they became fools, and changed the glory of the incorruptible God into an image made like corruptible man, and birds, and four-footed beasts, and creeping things. Therefore God gave them up to the lusts of their own hearts, to uncleanness, to dishonor their own bodies among themselves, who changed the truth of God into a lie, and worshipped and served the creature more than the Creator, who is blessed forever. Amen (Rom. 1:18-25). Therefore their heart was blinded, so that the majesty of the invisible God, whom they had recognized from these works, they changed, not to men, but, what is worse, into an inexcusable crime, into the likeness of men, so that God is called by them in the form of corruptible man, that is, the image of a man; so that those whom they do not dare to call by the name of God while alive, they receive the images of the dead into the glory of God. How great is the sickness, how great the foolishness, to call these wise to their own damnation, among whom the dead have more power than the living, and the dead are preferred to the living; for, departing from the living God, they favor the dead, of whom it is written, “A mortal man makes a dead thing with wicked hands” (Wis. 15:17); for therefore they diminished the majesty and glory of God, that to these things which are least and smallest, they gave the honor due to God’s likeness. For the Babylonians were the first to call a thing god, the image of Bel, once a dead man, who is said to have ruled over them. They also worshipped the serpent, the dragon, which Daniel, the man of God, killed, whose likeness they have. The Egyptians, however, worshipped a four-footed animal, which they called Apis, in the likeness of a cow. Jeroboam imitated this evil, making calves in Samaria for the Jews to sacrifice to, and birds, because the pagans have sacred rites for ravens. Yet the Egyptians worshipped the images of all these things I have mentioned, and others which it is not necessary to mention now. These things were done by those who considered themselves wise in the world; for, because they did not honor the invisible God by doing these things, neither could they rightly understand the things that are visible.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
