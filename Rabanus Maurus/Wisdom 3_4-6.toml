[[commentary]]
quote='''
Temporal death and the affliction of this present life have brought perpetual prosperity as a reward to the saints of God, because their hope was unfailing and their solid faith endured to the end. For God chastised them with various temptations, and through the endurance of patience proved them worthy of the eternal crown. The two examples he set forth, that is, gold tested in the furnace and holocausts burned in fire, show their most thorough examination and perfect purity, because just as gold is not burned by fire but tested, so the holy substance of the martyrs is not brought to destruction, but prepared for immortality and future glory; and just as the holocaust, which is wholly offered to God through fire, is a most acceptable sacrifice, so also the passion of the martyrs, offered to the Lord in the fragrance of sweetness through the heat of faith and the fervor of love, stands as a most pleasing gift and a most precious offering to Him. Therefore it is said by the Psalmist: Precious in the sight of the Lord is the death of His saints. (Ps. 116:15) And what is added: as gold in the furnace he proved them, signifies that the death of the saints is not perpetual according to the estimation of the reprobate; but rather, on the day of judgment, when Christ judges, their reward will be most abundant.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
