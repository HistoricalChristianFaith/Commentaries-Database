[[commentary]]
quote='''
Therefore, according to the history, the power of the Lord was demonstrated when He made the people of Israel cross the Red Sea on dry foot; likewise, when they left the desert, He led them through the bed of the Jordan, with the waters divided on either side, so as to instill terror in the nations of the Canaanites to be exterminated. But according to the allegory, the Lord Himself prepares for His faithful a path of faith and constancy amid the waves of the world and the torments of persecutors, through which they can pass unharmed from every scandal, nor will they need human comfort there, where the power of the Most High shows the marvelous effects of His virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
