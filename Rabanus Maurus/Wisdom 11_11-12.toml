[[commentary]]
quote='''
What is said, that both the absent and the present were similarly tormented, either signifies according to history that not only those Egyptians who were present with Pharaoh before Moses and Aaron were struck by the ten plagues, but also all the others who dwelled throughout the land of Egypt were similarly punished; or it refers to the time when not only those whom the Israelites destroyed in each city by recent calamity suffered penalties, but also all the nations of the land of the Canaanites, hearing indeed the victory of the people of God and the power of the signs which were performed at their departure by the will of the Lord, were greatly terrified by them. This is also shown by the words spoken by Rahab the prostitute to the spies of Joshua: "I know," she said, "that the Lord has given you the land; indeed, your terror has fallen upon us, and all the inhabitants of the land have suffered. We have heard how the Lord dried up the waters of the Red Sea at your entrance, when you came out of Egypt, and what you did to the two kings of the Amorites who were beyond the Jordan, Sihon and Og, whom you destroyed. And hearing these things, we feared, and our hearts suffered, nor did any spirit remain in us at your entrance. For the Lord your God, He is God in heaven above and on earth beneath" (Josh. 2:9-11). But although these things were done among the former people in the times of the law, nevertheless, conversely, the Jews who despised the incarnation of the Son of God and refused to accept His preaching, not only within their homeland but also wandering and exiled throughout the whole world, are tormented by various calamities; and the nations who received the faith of God and were converted from their idols to the true worship of the one God, when they sin, accepting paternal correction, are never cast away from the mercy of God. This is the change of the right hand of the Most High, so that those who were once the head now become the tail, and those who were once the tail now become the head. Lebanon has been turned into Carmel, and Carmel has been reckoned as a forest. The Lord is just in all His ways, and holy in all His works (Isa. 29); for therefore the first shall be last, and the last shall be first (Matt. 20:16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
