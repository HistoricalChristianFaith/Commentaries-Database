[[commentary]]
quote='''
He calls the sons of the wicked either disciples or works, because just as the followers of heretics are, on the day of judgment, an increase of sorrow for those who have been led astray by false doctrines, so evil works, at the time of the final examination, are proof of their wickedness, for which reason they are deservedly condemned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
