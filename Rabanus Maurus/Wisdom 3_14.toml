[[commentary]]
quote='''
According to the rule of the figurative interpretation, in the name of this blessed barren one, or eunuch, virgins can be understood, about whom it is written accordingly in Isaiah: Let not the eunuch say, "Behold, I am a dry tree," for thus says the Lord to the eunuchs: "Who have kept my sabbaths, and have chosen what I desired, and have held fast my covenant, I will give them in my house and within my walls a place and a name better than sons and daughters; I will give them an everlasting name that shall not perish" (Isa. 56:3-5). This barren one is fruitful in virginity. This eunuch forces his way into the kingdom of heaven and aggressively seizes it. He is the keeper of the sabbaths, and will never perform the works of marriage. He has chosen what the Lord wished, so as to offer more than is commanded, so that he considers not the apostle's indulgence but the Lord's will. He holds fast the Lord's eternal covenant, so that he does not devote himself to prayer only for a time and then return again to it, but knows that he will receive in the house of the Lord, which is His Church, the best place: for there are many dwelling places with the Father. (Jn. 14:2) And whoever is a eunuch and does all that is written, will have the best place within its walls, so that he may indeed become a tower of the Lord, and stand in the priestly rank, so that for sons of the flesh he may have many spiritual sons. Such a eunuch, whom Jesus loved most dearly, was the evangelist John, as ecclesiastical histories relate; he who reclined on the breast of Jesus (Jn. 13:23); who, while Peter walked more slowly, ran to the Lord, lifted on the wings of virginity. Therefore, let all the mockery of the Jews be put away, and let them cease to make themselves a laughingstock by claiming that the kingdoms of heaven are closed to eunuchs, since it is by chastity, not by bodily weakness, but by the will of the spirit; nor will sloth have the merit of a good reward, but virtuous striving.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
