[[commentary]]
quote='''
Likewise the fourth, despising the tortures with equal courage and answering the king with a heavenly voice to confound him, cried out and said: "It is better, being given over to death by men, to look for the hope from God, to be raised again by Him to eternal life; for you shall have no resurrection to life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
