[[commentary]]
quote='''
This passage, although it may seem to pertain specifically to the patriarch Jacob according to the historical account, who, fleeing his brother Esau, went to his uncle Laban in Mesopotamia, where on the journey he saw in a dream a ladder set up, and the angels of God descending and ascending on it, and the Lord leaning on the ladder, saying to him: I am the Lord, the God of Abraham your father, and the God of Isaac; the land on which you sleep I will give to you and to your descendants (Gen. 28:13), and upon arriving in Mesopotamia, he took Leah and Rachel, the daughters of his uncle, as wives, for whom he also tended his sheep for a very long time. But although that man tried to deprive him of his wages through deceit, he was kept unharmed by the wisdom of God, and returned to his homeland enriched with great wealth. More generally, however, according to the allegorical interpretation, it pertains to the holy martyrs, whom the divine wisdom, namely Christ our Lord, by His mercy delivered from all persecutions of their enemies, and protected them unblemished from their snares, strengthening them by the grace of the Holy Spirit and the hope of future reward, and finally, with all their enemies defeated, led them as most blessed victors to the eternal kingdom, so that there they might forever sing praises to Him, by whose help they knew themselves to have been preserved and saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
