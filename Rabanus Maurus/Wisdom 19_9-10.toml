[[commentary]]
quote='''
Therefore, we also ought at all times to give thanks to our Creator for our deliverance, exulting and saying with the Prophet: Bless the Lord, O my soul, and all that is within me, bless his holy name. Bless the Lord, O my soul, and do not forget all his benefits (Ps. 103:2). The Apostle also seems to teach us this, saying: Pray without ceasing, give thanks in all things, for this is the will of God in Christ Jesus for all of you (1 Thess. 5:16-18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
