[[commentary]]
quote='''
For men and beasts crossed the depths of the Red Sea on dry ground, and frogs coming out of the rivers filled the houses of the Egyptians. Fire mixed with hail rained down from heaven, and neither did fire shun water, nor water shun fire, but falling together, they struck the land of the Egyptians. But where the children of Israel were, they harmed no one, so as to show that all the elements of the world not only strive for their own nature, but are subject and serve the will of their Creator.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
