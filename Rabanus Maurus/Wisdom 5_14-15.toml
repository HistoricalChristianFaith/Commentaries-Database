[[commentary]]
quote='''
He has further introduced four other examples to demonstrate the weakness of the hope of the wicked, by which they either believed that present things were stable and would endure, or thought that they could live in sin and escape with impunity. For the fuzz that arises from the withering flower of herbs expresses the frailty of the flesh, which is taken away by the wind of sickness or bodily distress, nor is it permitted to remain long, because all flesh is grass, and all its glory like the flower of grass. The grass has withered, and its flower has fallen; but the word of the Lord endures forever (Isa. 40:8). But the foam which is produced from the waters and floats on the waters can be understood as the desire for human favor and common boasting: which is scattered by the storm of temptations or the scrutiny of future judgment, because their vanity is proven by such contact. Likewise, smoke demonstrates the vanity of a fleeting life; for just as smoke is dispersed by the wind, so human life is dissolved by the change of times. Therefore, by analogy, it is compared to a passing guest; for we are all guests and strangers here, of which Ecclesiastes says: One generation passes away, and another generation comes, but the earth stands forever; therefore, all is vanity (Eccles. 1:4). For what is more vain than this vanity, that the earth remains, which was made for the sake of men, and man himself, the master of the earth, is suddenly dissolved into dust? Therefore it follows: The sun rises and sets, and returns to its place (Eccles. 1:5). For the sun itself, which is given to mortals for light, daily indicates the destruction of the world by its rising and setting; and all this is to teach that by the changes of times and the rising and setting of the stars, human life slips away and perishes while it is unaware. Therefore, it is just that the wicked, placed in Hades, grieve that they put their hope in that which has no stability, and turned their minds away from Him who, before all things and after all things, remains the same now and forever.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
