[[commentary]]
quote='''
For in this, he says that those wicked men denied seeing the air, whose presence no living and breathing animal can ever avoid; he expresses the excess of fear, which, because of the oppression of impending punishments, they suffer as their own evil rebukes their conscience. Moreover, since wickedness is always fearful, its own terror gives rise to punishments when it is condemned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
