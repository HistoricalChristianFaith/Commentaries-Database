[[commentary]]
quote='''
What can it mean that on the third day Esther dressed in royal garments, if not that in the third age of the world—i.e. after the incarnation, passion and resurrection of Christ—the Church of the nations dressed herself in faith, hope and charity, and in the beauty of all the virtues, to receive the sacraments of baptism through the confession of the holy Trinity so that she would then be worthy of the king's company, since she was burning incessantly with a special love for him? She stands in the courtyard of the king's house which was inside, opposite the king's basilica, i.e. in the righteous works of this life which looks toward future compensation in Heaven, where the king himself sits on his celestial throne and assents to the prayers of those who piously cry out to him.
'''
source_url='https://sites.google.com/site/aquinasstudybible/home/esther/rabanus-maurus-commentary-on-esther'
source_title='Commentary on Esther'

[[commentary]]
quote='''
The fact that Esther put on all her royal robes on the third day undoubtedly signifies that the church of the nations, in the third time of the world, that is, after the incarnation, passion and resurrection of Christ, clothed herself through the sacrament of baptism and the confession of the Holy Trinity with faith, hope and charity, and the ornament of every virtue so that she might become worthy of the royal marriage while the love of (the Lord) remained constantly fervent. She stood in the inner court of the royal palace, that is, in the pious actions of this life which look at the future reward in heaven where the king himself sits on the supreme throne and fulfills the prayers of those who implore him piously.
'''
source_url=''
source_title="EXPLANATION ON THE BOOK OF ESTHER 8"
