[[commentary]]
quote='''
The wise man, recounting many things about the virtues of wisdom, finally added that he desires to be joined to its company, from which he would have comfort and relief from his weariness; so also the people of the Church, who can truly be said to be king and genuinely wise, because they are members of the heavenly King and Lord, as the apostle Peter says: But you are a chosen race, a royal priesthood, a holy nation, a people for his own possession (1 Peter 2:9), rejoice in having the communication of divine wisdom, namely of the Lord Jesus Christ, and delight in remaining continually in his embrace and spiritual banquet, whom they know to be most merciful and kind, and the most generous dispenser of heavenly gifts. Therefore, the same speaks in the Apocalypse of Saint John, saying: Behold, I stand at the door and knock; if anyone hears my voice and opens the door, I will come in to him and dine with him, and he with me. To the one who conquers, I will grant to sit with me on my throne, as I also conquered and sat with my Father on his throne (Rev. 3:20-21). This passage can also be referred to the Virgin Mother of God, who, having the purpose of most chaste virginity within herself, deserved to be made fruitful by the divine word of power, and by giving birth to the Son of God for the salvation of the human race, is to be venerated by all with the proclamation of most celebrated praise. Therefore, she herself says in the song of the Gospel: Because he has regarded the humility of his handmaid, for behold, from now on all generations will call me blessed (Luke 1:48). To which voice also agree those things which are added in this place.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
