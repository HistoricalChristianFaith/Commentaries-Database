[[commentary]]
quote='''
By the sons of Jambri, those who are devoted to the pleasures of this world are represented, who are said to go out from Madaba, that is, from the birth of the Lord, when they strive, without any change, to indulge the carnal desire which they have contracted originally on the side of the flesh. These therefore seize John and everything he had and went away possessing them, when they draw someone from the sons of the Church, washed in the water of baptism and reborn by the grace of God, over to themselves through unlawful desires, and by corrupting the good pursuits with which he served God, they pervert them to the allurements of pleasures. But Jonathan and Simon, desiring to avenge these things, overthrew and killed the bridegroom who had taken as wife the daughter of one of the great princes of Canaan in great ambition, together with all his display and his friends: when holy teachers rescue from their evil intention some of those whom they see with all their effort to be eagerly clinging to the pleasures of the world and inclined to luxury (for whom the prince of this age, to deceive them, also sets before them those who burn with carnal desire, drawing them into his fellowship), and in them they slay, with the sword of the divine word, that which was harmful and opposed to the divine commandments. For such a victory well suits those who have learned from the heavenly Master to love their enemies and to do good to those who hate them; to pray for those who persecute and slander them, to bless those who curse and not to curse in return. They receive their spoils when they convert all their efforts and activities to ecclesiastical use. Therefore it is rightly added:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
