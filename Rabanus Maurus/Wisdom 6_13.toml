[[commentary]]
quote='''
The glory of wisdom is unfading, and it is open only to those who truly love it and diligently seek it. But those who seek it falsely will in no way attain it, because, as was said above, the Holy Spirit of discipline will flee from deceit, and wisdom will not enter into a wicked soul. Therefore, in Proverbs, wisdom says: I love those who love me, and those who rise early to seek me will find me (Prov. 8:17). And again: Blessed is the man who listens to me, who watches daily at my gates, and waits at the posts of my doors. Whoever finds me finds life, and will draw salvation from the Lord. But whoever sins against me injures his own soul. All who hate me love death (Prov. 8:34-36)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
