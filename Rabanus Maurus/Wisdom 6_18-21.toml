[[commentary]]
quote='''
The Apostle Peter shows the steps of this benefit and progress in his Epistle, saying: But you, brothers, making every effort, supply in your faith virtue, and in virtue knowledge, and in knowledge self-control, and in self-control patience, and in patience godliness, and in godliness brotherly love, and in brotherly love charity. For if these things are present and abound in you, they will make you neither idle nor unfruitful in the knowledge of our Lord Jesus Christ (2 Peter 1:5-8). For he who, for the love of wisdom, lives with discipline in this world, keeping the commandments of God, through the progress of sacred virtues, will attain to the incorruption of immortality and eternal life, which is surely in the knowledge of the divinity of our Lord Jesus Christ. Therefore he himself says in the Gospel to the Father: And this is eternal life, that they may know you, the only true God, and Jesus Christ whom you have sent (Jn. 17:3). But when he has truly known God, then in the contemplation of Him, he will enjoy everlasting blessedness, and reigning together with his King, he will remain in perpetual light. If then you delight in thrones and scepters, O tyrants of peoples. It is necessary to remind the kings of the earth to love wisdom, because without wisdom it is impossible for anyone to rule rightly. Therefore this saying of Plato: The state is well governed when philosophers rule, and rulers philosophize. For to wish to hold the kingdom without wisdom is more an act of tyrannical cruelty than of royal moderation. Therefore, rulers should consider how fitting it is that they themselves be constant in meditation on the divine law. For whoever follows the standard of the sacred Scriptures in learning, teaching, and acting will without doubt receive the joy of the heavenly kingdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
