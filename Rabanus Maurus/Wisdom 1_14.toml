[[commentary]]
quote='''
From this statement, as in the previous one, it is evident that the Lord is the author of good works, not of evil ones; therefore, He is a just judge, who punishes wicked deeds and sins. Nor do we sin out of necessity when we transgress, but by a stubborn will, which proceeds from the quality of free will. We therefore acknowledge God as just and good, the creator of human substance and of both inner and outer senses, so that absolutely everything pertaining to nature is from Him, and absolutely nothing that is against nature is from Him. But sin is against nature, from which death and all things that arise from death originate. Man then clothed himself with these evils when, deprived of faith and obedience, the Devil led him away from the law of God into trust in his own promises, and bound all the offspring of his successors to himself by the condition of the appointed lineage.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
