[[commentary]]
quote='''
What is it that condemns him who ought not to be punished, since the condemnation itself is certainly punishment; but here he uses “punish” for “correct,” as if he were saying: He who does not accept correction will receive correction, he justly condemns to eternal fire him who is outside the power of God, that is, unworthy of divine mercy. For the power of God is the beginning of justice; because the judgment of God, whether in the correction of the elect or in the condemnation of the reprobate, is the highest perfection of equity, and therefore, through His goodness, He delays judgment for a long time so that He may have more to whom He can render benefit. For when the creature, in its pride, raises itself against its Creator, it does not wish to be subject to His dominion; indeed, just punishment avenges, lest the creation seem to prevail against its Maker. This passage can also be aptly transferred to the passion of our Redeemer, whom the Father delivered up to death for us. But it must be considered how He is just and arranges all things justly, if He condemns him who ought not to be punished. Our Mediator ought not to be punished for Himself, because He committed no contagion of guilt, but if He had not taken upon Himself an undeserved death, He would never have freed us from deserved death. Therefore, since the Father is just, punishing the Just One, He arranges all things justly, because by this He justifies all things, in that He condemns Him who is without sin for sinners, so that all the elect might rise to the summit of justice by Him who, above all, endured the condemnation of our injustice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
