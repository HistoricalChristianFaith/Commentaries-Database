[[commentary]]
quote='''
Paul the Apostle, writing to the Romans in his Epistle, as we have already shown above, expressed the likeness of this place, saying: For the wrath of God is revealed from heaven against all ungodliness and unrighteousness of men, who hold the truth of God in unrighteousness, because that which is known of God is revealed in them, for God has revealed it to them. For the invisible things of him, from the creation of the world, are clearly seen, being understood by the things that are made, even his eternal power and divinity, so that they are without excuse (Rom. 1:18-20). The knowledge of God is revealed from the structure of the world. For God, who is by nature invisible, can also be known as visible, for a work was made by him which, by its visibility, reveals the maker, so that through the certain, the uncertain can be known; so that by what is impossible for others, he who made this work might be believed to be the God of all; so that they are without excuse: because they could not be ignorant of his existence and his working for their benefit, for it is clear to all that he has ordained those things which are produced for human use in the course of the year; but when they had known him, they did not glorify him as God or give thanks, but became vain in their imaginations, claiming to be wise, they became fools (Rom. 1:21-22). For they consider themselves wise because they think they are investigating physical principles, examining the course of the stars and the qualities of the elements, but despising the Lord of these things, they are therefore fools. Since these things are praiseworthy, how much more so is their creator? Yet, having suffered the shame of neglecting God, they often use a miserable excuse, saying that through these things one can go to God, just as one reaches the king through companions. Come now, is anyone so senseless or so forgetful of his own salvation as to give the honor of the king to a companion, when, if anyone is found even to discuss such a thing, he is rightly condemned for treason? And these people do not consider themselves guilty who prefer the honor of God's name to the creature, and, leaving the Lord, worship fellow servants, as if there were something more that could be preserved for God! For indeed, it is through the king that one goes to tribunes or companions, because the king is, after all, a man, and does not know to whom he should entrust the state; but to God, whom nothing escapes, for he knows the merits of all, there is no need for an intercessor to obtain favor, but only a devoted mind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
