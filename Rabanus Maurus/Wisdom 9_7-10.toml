[[commentary]]
quote='''
The history of the kings narrates that King David, wishing to build a temple, was forbidden by the Lord through the prophet, because his son, who would succeed him in the kingdom, would be the one to build a temple for the Lord; and so it happened that Solomon, who is considered the author of this book, built a wondrous temple for the Lord in Jerusalem. Therefore, now the same king, recalling the benefits of God, asks that His wisdom, through which He made the world, remain with him, and that his actions and heart be directed according to His will. But because the temple itself prefigured the Church of Christ, which the true peacemaker and our King, the Lord Jesus, builds daily through His workers, that is, the holy preachers, for the praise, glory, and honor of His name, we cannot inappropriately transfer these prayers which Solomon offered for himself to the person of the teachers of the holy Church, who know that all things pertaining to the governance of the people of God are not of their own power but of divine gift. Therefore, they also daily ask that He who is the author of every good work may Himself be the giver of supreme perfection. For whatever is written in the divine Scriptures about the wisdom of God, we ought to refer to none other than the mediator between God and men; for He is our peace, who made both one, who is called by the Apostle the power and wisdom of God: the image of the invisible God, the firstborn of all creation, because in Him all things were created in heaven and on earth, visible and invisible, whether thrones or dominions or principalities or powers; all things were created through Him and in Him, and He is before all things, and in Him all things hold together, and He is the head of the body, the Church; He is the beginning, the firstborn from the dead, so that He might have preeminence in all things: because it pleased the Father that in Him all fullness should dwell, and through Him to reconcile all things to Himself, making peace through the blood of His cross, whether things on earth or things in heaven (Col. 1:15-20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
