[[commentary]]
quote='''
It commemorates what the Book of Exodus recounts about the killing of the firstborn, when the Lord struck in the middle of the night every firstborn in the land of Egypt, from the firstborn of Pharaoh who sat on his throne to the firstborn of the captive woman who was in the prison, and every firstborn of the animals (Ex. 11). There, unlike before when they pretended not to agree to the departure of the Israelites, they openly urged the people of God to leave the land of Egypt quickly, saying: We shall all die.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
