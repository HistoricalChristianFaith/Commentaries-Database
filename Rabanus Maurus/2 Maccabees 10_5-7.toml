[[commentary]]
quote='''
On the day when the temple had been polluted by foreigners, etc.

This feast, which is read as being celebrated on the twenty-fifth day of the month Casleu, which among the Latins is called December, is likewise mentioned in a similar way in the previous book; moreover, when it relates that they had previously kept the Feast of Tabernacles in the mountains and in caves, and for that reason carried before him who granted that his place be cleansed the thyrsi, and green branches, and palms, it shows that in the present life, where there is a place of tribulation and sorrow, we ought to recognize ourselves as pilgrims; and that there we should strive to offer to God the flowers of virtues and the ever-green branches of good works for the attainment of eternal life and as the reward of payment to the heavenly King. For the thyrsus in general is the middle stalk of all herbs or vegetables, so called because it rises up from the earth; so also from our earthly matter a useful shoot ought to ascend, so that to the cultivator of our heart, who through the gift of His Spirit cultivates us, we may always render acceptable fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
