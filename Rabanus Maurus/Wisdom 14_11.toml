[[commentary]]
quote='''
For the idols of the nations are not gods, and their inhabitants are, evidently, evil spirits, deserving of pardon, since men who were created in the image and honor of God were being led away from their Creator, and by casting them into the snare of their own error, were being overthrown. Likewise, if heretics persist in their wickedness, by which they lead men from truth into falsehood, and do not correct themselves and do penance, they will not escape the judgment of eternal fire.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
