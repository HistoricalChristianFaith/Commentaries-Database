[[commentary]]
quote='''
They admonish the rulers of the Church to keep the justice of God's commandments, and to hurry to learn and understand the truth of the divine testimonies: for just as they themselves, having been appointed by the Lord with given authority, are made teachers and judges of their brethren so that they may judge them according to the principle of impartiality, and teach them to keep the rule of faith with good works, so they themselves also await divine judgment, which neither deceives nor can be deceived, who judges not only their deeds but also their thoughts and wills, and will judge with strict examination those who did not live according to the will of God and the law of the commandments, nor even taught or judged others.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
