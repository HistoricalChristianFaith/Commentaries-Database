[[commentary]]
quote='''
We must not object that the bodies of the holy martyrs are given over to the hands of their persecutors, since this is not allowed for their condemnation but to try them. As gold does not burn in the furnace but is tested, so the souls of the elect, tried by the fire of tribulation, are made purer before their Creator, since it is written, "The furnace tries the objects of the potter, the temptation of tribulation tests the righteous." "Many are the misfortunes of the righteous, but the Lord delivers him from them all. He preserves all his bones; not one of them will be broken. He rescues the lives of his servants. The one who trusts in him will not be condemned."
'''
source_url=''
source_title="ON ECCLESIASTICUS 3:18"

[[commentary]]
quote='''
This closing passage of the book makes mention not only of the faithful of former Fathers, but also of those present and future at the same time, because our virtuous and merciful Creator, almighty God, never abandons nor will abandon those who hope in Him; rather, He cherishes, protects, and governs them with caring help. Nor should anyone object to us that the bodies of the holy martyrs are handed over into the hands of their persecutors, because this is permitted not for their condemnation, but for their testing, so that just as gold in the furnace of fire is not destroyed but tested, so too the souls of the elect, examined by the fire of tribulation, may be rendered more precious in the sight of their Creator. For it is written: The furnace tests the potter's vessels, and the trial of tribulation tests just men (Sirach 27:5). For many are the tribulations of the righteous, and from all these the Lord will deliver them. The Lord guards all their bones; not one of them shall be broken. He will redeem the souls of His servants, and none of those who hope in Him will be forsaken (Ps. 34:22).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
