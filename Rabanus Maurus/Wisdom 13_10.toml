[[commentary]]
quote='''
They therefore come to the gods, not so much for the sake of religion, which can have no place in things ill-prepared and perishable, as to feast their eyes on gold, to gaze at the polish of refined marble or ivory, to handle with greedy contemplation the garments distinguished by little stones and colors, or cups adorned with shining gems; and the more decorative and beautiful the temples and statues are, the more majesty they are believed to possess. Therefore, their religion is nothing other than what their desire admires. We have often said that silver and gold can be understood as speech and thought, which, since they are given by God to humans so that they may either speak or think of God and praise their Creator, they misuse this gift in the imitation of idols, according to what is written: I gave them silver and gold, but they made Baal from my silver and gold (Hosea 2:8). Therefore, when someone, terrified by the fear of the Lord, first hides idols in the cave of his heart and, not daring to bring forth what he has wrongly fashioned, conceals them in the depths of the earth, the next step is to cast away what was previously engraved and not allow it to remain in himself, according to that saying of Isaiah: On that day, a man will cast away his idols of silver and his idols of gold, which they made for themselves to worship, to the moles and to the bats. And they will enter into the clefts of the rocks and into the caves of the stones from the face of the terror of the Lord and from the glory of his majesty, when he arises to shake the earth (Isa. 2:20-21).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
