[[commentary]]
quote='''
But not long after, the king sent a certain old man from Antioch, who was to compel the Jews to depart from their ancestral ways and the laws of God, etc.

These same events are reported in the preceding book, namely that Antiochus, through his messengers, defiled the temple by setting up in it the idol of desolation upon the altar of God; and we have given the allegorical interpretation of that passage there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
