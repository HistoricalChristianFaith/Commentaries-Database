[[commentary]]
quote='''
By presenting another example, he demonstrates that at the final judgment there will be a sudden reward for the saints, and a swift punishment for the depraved. For when the elect are changed from corruption to incorruption, from mortality to immortality, from disgrace to glory, then they will rise to judge their adversaries, and just as a spark of fire suddenly kindles a flame in a field of reeds, so the sentence of the just Judge of the saints brings strong and swift vengeance of punishments upon the reprobate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
