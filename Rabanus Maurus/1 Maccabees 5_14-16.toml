[[commentary]]
quote='''
Those who gathered from various foreign places to destroy the people of God clearly signify the nations of the Gentiles, who, still in unbelief, stir up wars and persecutions against Christians. But when the words that the different groups had brought to Judas and his companions were heard, a great church assembly met to consider what they should do about their brothers who were in tribulation and were being attacked by enemies; for the concern and highest care of the whole holy Church is how it may defend its children against various enemies, that is, Jews, pagans, heretics, and schismatics. In this matter also, with prudent counsel and every effort, it takes action together with those who seem to be more learned and stronger in faith and in the practice of virtues, as to how it may resist the enemies and suitably defend its own.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
