[[commentary]]
quote='''
For man is better than idols according to the reason of his creation, because he himself lives and understands, but they never do. Yet, because he has followed the vanity of error more than the knowledge of truth, it is fulfilled in him what is said by the Psalmist: Man, being in honor, did not understand; he was compared to the senseless beasts, and became like them (Psalm 49:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
