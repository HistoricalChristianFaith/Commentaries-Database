[[commentary]]
quote='''
Concerning this Demetrius, Pompeius Trogus recounts in his History as follows, saying: When Antiochus withdrew, having left a very young son, to whom guardians had been appointed by the people, his uncle Demetrius, who was a hostage at Rome, having learned of the death of his brother Antiochus, went to the Senate, saying that he had come as a hostage while his brother was alive, and now that he was dead, he did not know whose hostage he was; therefore it was just that he be released to pursue the kingdom, because by the law of nations it had passed to his elder brother, and should now, for the same reason, belong to him, who was older in years than the region. When he perceived that he was not being released by the Senate, which, by a silent judgment, considered the kingdom safer with the region than with him, he left the City under the ploy of going hunting, and at Ostia quietly boarded a ship with his companions in flight. Carried to Syria with favorable winds, he is welcomed with universal approval, and the kingdom is handed over to him by the guardians, after the ward has been killed. (Justin, The Epitome, 34.3)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
