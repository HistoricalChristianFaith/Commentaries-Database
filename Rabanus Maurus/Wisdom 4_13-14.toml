[[commentary]]
quote='''
Just as in the previous verse he exposed the deceit of the heretics, so now in the following he expresses the glory of the martyrs, who, although they spent their admirable lives in a short time through the tortures of their persecutors, nevertheless that very death is reckoned to them as a long life, because it brought them eternal life. Indeed, their Creator, loving them, separated them from the company of the wicked, and led them out from the oppression of this present life, so that in the heavenly kingdom he might hide them in the secret of his face, from the disturbance of men, and protect them in his tabernacle from the contradiction of tongues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
