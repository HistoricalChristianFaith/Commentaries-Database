[[commentary]]
quote='''
It is clear that the plague of envy is not a companion of wisdom, because through the envy of the Devil, death entered into the whole world, and through the wisdom of God the human race was rescued from the snare of death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
