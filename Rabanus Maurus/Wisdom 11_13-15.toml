[[commentary]]
quote='''
The misery of the wicked is twofold, when the memory of past evils is not diminished, and the storm of present tribulations increases. Therefore, they have no hope of remedy in the future, because although they may fake repentance for their sins, they have no real intention of improving their ways. Therefore, it is written of the Jews in Psalm 79: When He slew them, then they sought Him, and they returned and sought God early; and they remembered that God was their helper, and the Most High God was their redeemer. And they loved Him with their mouth, and with their tongue they lied to Him, but their heart was not right with Him, nor were they steadfast in His covenant. (Ps. 78:34-37) He does not act in the same way toward the just. Why does He not do the same to them? Because they do not sin in the same way. For the just man falls seven times and rises again; but the wicked shall fall into evil (Prov. 24:16). For when the wicked has come into the depth of evils, he despises.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
