[[commentary]]
quote='''
For on every side the wretched were constrained by punishment, for whatever they perceived with their ears from sound, or sensed by any feeling, they feared that all was aimed at their destruction.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
