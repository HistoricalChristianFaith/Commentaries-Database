[[commentary]]
quote='''
For if those who harshly and mercilessly treated the ancient servants of God, who came to them out of profane necessity, received fitting punishments, so that, darkened in mind and hardened in feeling, they endured the obscurity of darkness and various idols in bodily sense, how much more will those who dishonorably reject and despise the servants of Christ and preachers of the Gospel be eternally tormented with immeasurable and unspeakable punishments. Therefore, Truth itself says to the disciples: Whoever does not receive you or listen to your words, as you go out from that house or city, shake the dust from your feet. Truly, I say to you, it will be more tolerable for the land of Sodom and Gomorrah on the day of judgment than for that city (Matt. 10:14-15). And it is rightly said that they were struck with blindness, just as those were blinded by darkness who wandered at the doors of the righteous man, that is, Lot, seeking the entrance to his door and not finding it; for whoever suffers the darkness of error within is hemmed in on all sides by the gravest losses, since he has not known the way of life. And that door of which the Gospel says, I am the door; if anyone enters by me, he will be saved, and will go in and out and find pasture, the one who wanders will not be able to find it (Jn. 10:9).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
