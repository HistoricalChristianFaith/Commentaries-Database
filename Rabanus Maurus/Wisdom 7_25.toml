[[commentary]]
quote='''
It is evident that the only-begotten Son of God, born from the substance of God the Father, is coequal, coeternal, and consubstantial with the Father, and therefore nothing impure is found in him, because no evil approaches the highest good, but the simple good always remains the same.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
