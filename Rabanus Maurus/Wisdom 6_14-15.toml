[[commentary]]
quote='''
This wisdom is Christ, the Son of God, of whom the Apostle says: I speak of Christ, the power of God and the wisdom of God, in whom all the fullness of divinity dwells bodily (Col. 2:9). Therefore, he anticipates all with his grace, whoever longs for his love, because he himself is the way, the truth, and the life; through him one goes, toward him one strives, to him one arrives. But he who has vigilantly watched with a devoted heart from the origin of dawning faith in himself is not consumed by empty labor but is crowned by him for the zeal of good works. For he will find her sitting at his doors, because he will always have her help ready. Therefore, in the Apocalypse he himself says: Behold, I stand at the door and knock; if anyone opens to me, I will enter to him, and will dine with him, and he with me (Rev. 3:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
