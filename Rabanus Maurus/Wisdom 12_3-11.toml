[[commentary]]
quote='''
It commemorates historically how the seven nations, which had possessed the land of the Canaanites, were driven out of their places by the Lord because of the infidelity and injustices they had committed, and how the children of Israel, namely the worshippers of His name, were brought into their place. Mystically, however, those seven most wicked nations signify the universality of vices which, after the transgression of the first man, began to possess the human race, but through the grace of Christ were expelled from the hearts of the faithful, and the multitude of sacred virtues was introduced there, so that, with the evil possessors expelled from the land of souls by the Gospel of Christ, legitimate inhabitants, that is, the fruits of virtues, might produce vital shoots there by the working of the Holy Spirit. If anyone thinks it necessary to ask how it is said that the Lord sent wasps before His army into the most depraved nations, so that they might gradually exterminate them, when nowhere in the history of the Old Testament is it read that this happened physically, let him know that many things can happen there in the punishment of the wicked, which the writer of history did not care to express throughout, or rather that wasps are placed here in a figurative expression for the terrors which the Israelites, fighting against the surrounding nations, brought upon them. For the fame of those wars, which were accomplished by the power of the Lord, pierced the hearts of the fearful with the sharpest stings of terror, so that it utterly destroyed in them all strength to resist, and this lasted as long as they faithfully rendered worship to God. But after they sinned and neglected to serve God, they were delivered into the hands of their enemies, so that those who had previously been subject to them afterwards became their superiors.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
