[[commentary]]
quote='''
that is, laying open the secrets of their hearts to them through confession—so that, by receiving the words of truth, they might learn from them the rule of justice.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 14"
