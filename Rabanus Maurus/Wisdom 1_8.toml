[[commentary]]
quote='''
For just as the elect receive the gift of knowledge and virtue through the grace of the Holy Spirit, so heretics and all the depraved, puffed up by their own pride and incited by the evil spirit, cannot hide before the Spirit of God the wickedness of their error, which they shamelessly proclaim, and therefore they cannot escape the just punishment of vengeance; for just as the eyes of the Lord are upon the righteous, and His ears are open to their prayers, so the face of the Lord is against those who do evil, to cut off the remembrance of them from the earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
