[[commentary]]
quote='''
But who are those who in the citadel were shutting in Israel around their own people and were always seeking evil for them to the strengthening of the nations, if not those who, raising themselves up in the citadel of pride, persecute true religion so that they may suffocate the word of God and restore error and idolatry? Against them Judas prepares to do battle, because the whole purpose of the holy teachers especially strives to arrange this: that errors may be driven out and that errors may be overcome by the preeminence of truth. But stirred by this zeal, certain people from the nations, such as the philosophers, and certain also from the ungodly in Israel, who are the heretics, provoke the dominion of this world to hatred of the servants of God, so that, helped by this support, they may be able to exalt their wickedness more easily.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
