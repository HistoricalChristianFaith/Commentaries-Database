[[commentary]]
quote='''
By Jonathan's passing beyond the river we can understand the preaching of the word to those who have not yet been cleansed by the baptism of Christ, because holy preachers sometimes summon the Gentiles to sacred baptism, and sometimes stir up the faithful to the advancement of virtues. When therefore Jonathan returns across the river, the army of Syria comes to him as help, because when the apostles had passed over from the Jews to the preaching to the Gentiles, immediately many from among the Gentiles came to the faith and baptism of Christ, who were helpers to the holy preachers in the Gospel of God, so that they might lead pagans to belief. He went on to Ascalon, which is interpreted "suspended" or "shameful fire," and they came out from the city to meet him with honor. When those who had been serving worldly ambition heard the word of God from the holy preachers, they immediately, having abandoned worldly greed, hurried to the obedience of the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
