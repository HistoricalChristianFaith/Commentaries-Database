[[commentary]]
quote='''
But for their senseless thoughts, their iniquities. According to their hardness and impenitent heart, they are storing up wrath for themselves on the day of wrath and revelation of the righteous judgment of God, for a hard heart will fare badly (Rom. 2:5). In the end, judgments are prepared for mockers and sinners will pursue evil, but good will be repaid to the just (Prov. 19:29). Was not at a loss to send upon them a multitude of bears or bold lions or newly created beasts full of rage, unknown, either breathing a fiery breath or hissing clouds of smoke or flashing terrible sparks from their eyes. It was fitting that those who worshipped the creature instead of the Creator should receive vengeance from the very source from which they sought help. For the world itself fights against the senseless on His behalf. But since in the history of the Old Testament these types of unknown beasts, which are listed, are nowhere else mentioned as being expressed, so that such monsters would punish sinners, it is better to transfer this to a spiritual sense, so that we may understand that all idol worshippers, as well as heretics and schismatics, who follow the sects of their errors as if they were truth, are deservedly punished by spiritual beasts, that is, by unclean spirits, from whom the Prophet prays that faithful souls may be delivered by divine grace: "Do not give the souls who confess to you to the beasts" (Ps. 74:19). Their appearance is terrifying, their cruelty excessive, and their rage immense, because their entire intention is to pursue the human race with hatred and to bring them to be tormented with themselves in the torments of Hades. But since God condemns no one unjustly, and subjects no one to punishment undeservedly. But you have arranged all things in measure, number, and weight. For He does all things according to truth, judgment, and justice, and there is nothing disordered or inappropriate in His works and deeds, but He moderates and arranges all His judgments by the balance of the highest equity. This statement can also be applied to the condition of all creatures; because the almighty Creator made all His works, which He created from the beginning, with a definite number, measure, and weight. Of Him it is written: He counts the multitude of the stars, and calls them all by their names (Ps. 147:4). Therefore also it is read in Job: For He looks to the ends of the earth, and sees all things under the heavens, who made a weight for the winds, and measured the waters, when He gave the rain its law, and a path for the thunderstorm (Job 28:24-26). Therefore also it is said by someone: All things whatsoever have been constructed from the primeval nature of things seem to be formed by the principle of numbers, for this was the chief pattern in the mind of the Creator. Therefore the multitude of the four elements was changed, therefore the succession of times, therefore the motions of the stars and the revolution of the heavens. Since these things are so, and since the state of all things is shaped by the connection of numbers, it is also necessary that number itself always remains in its own substance equally. Who then is sufficient to comprehend this measure, this number, and this weight of God, so as to be able to describe all His arrangements under these three definitions? In measure, I think, consists quality; in number, quantity; in weight, proportion. These are balanced in the judgment and mercy of God, because they are enclosed within these two holy boundaries, by which He established, governs, and will judge the world; in these, God the just Judge cannot be comprehended, cannot be reproved. Therefore, all that we have said above, or will say, now lie hidden from us within the enclosure of these three: which will then be unlocked only by the keys of God's judgment and mercy, so that they may be known, when at the coming of the Lord they will be revealed, so that praise or punishment may be from God to each one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
