[[commentary]]
quote='''
The story of the patriarch Joseph seems to recount both his slanders and later happiness, who, having been sold by his brothers, was brought to Egypt, and there, because of the accusation of his master's wife, was sent to prison, therefore, due to his interpretation of dreams, he was brought out by order of Pharaoh and made ruler of Egypt. But just as the wisdom of God delivered him from the hands of his enemies and made him lord of the land, so also, in a special way, He rescued the holy martyrs from the punishments of their persecutors and exalted them in the heavenly kingdom, where, enjoying eternal glory, they will come as judges with Christ over their enemies, so that they may assign to them eternal punishments for their crimes and lies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
