[[commentary]]
quote='''
For this reason, vengeance came upon the enemies of the people of God until the end, because in their morals and life there was no worthy amendment. Therefore, with pretended arguments they pretend repentance, and for this reason, from the inspector of hearts, they did not receive perfect forgiveness. Therefore it is read in Exodus that Pharaoh, when any plague was divinely inflicted upon him and his people, immediately promised to let the people of God go if he escaped the present danger, but after a short interval, he returned again to his former cruelty, until at last, when he was pursuing the departing people, he was drowned and perished in the waves of the Red Sea (Ex. 14). Such is indeed the stubbornness of the unbelieving and proud enemies of the name of Christ, that when they persist hopelessly in wickedness, they finally feel by experience how great is the justice of the omnipotent God in judging.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
