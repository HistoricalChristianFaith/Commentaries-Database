[[commentary]]
quote='''
The lover of wisdom said that he had chosen, invoked, and sought after wisdom, and for this reason, through the grace of the Holy Spirit, he obtained it, because, as the apostle James says: Whoever lacks this, let him ask of God, who gives to all abundantly and does not reproach (James 1:5); which is rightly preferred to kingdoms, thrones, and all riches, since all precious things of the world become worthless in comparison to it. Therefore, wisdom itself says in Proverbs: With me are riches and glory, heavenly wealth and righteousness; my fruit is better than gold and precious stone, and my gem than chosen silver (Prov. 8:18-19). Therefore, Truth itself in the Gospel likens the kingdom of heaven to a merchant seeking fine pearls; who, having found one precious pearl, went and sold all he had and bought it (Matt. 13:45-46); because whoever truly finds heavenly wisdom, that is, the word of God in the highest, despises all advantages of this present life, all human philosophy, and all eloquence of lecturers, and will rejoice to devote himself solely to divine contemplation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
