[[commentary]]
quote='''
Jerusalem was called the Holy City, for in it was the Temple of God, the Holy of holies, and the worship of the one God according to the law of Moses.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
