[[commentary]]
quote='''
The Word was with God, and the Word was God (Jn. 1:1), through whom all things were made, who elsewhere is also called the arm of the Lord, as Isaiah says: And to whom is the arm of the Lord revealed? (Isa. 53:1) The same is also called the right hand of the Lord because of the effective power of divine might. Therefore, the Word himself is to be understood as then executing judgment on the firstborn of the Egyptians through the ministry of the Gospel, who afterwards will sanctify for himself the firstborn of the Israelites, and now through the water of his baptism saves the multitude of believers, where he also destroyed the innumerable army of spiritual enemies. For it is said that the Lord's command carried a sharp sword; because the Word of the Lord is living and effective and more penetrating than any two-edged sword. In truth and without any deception, he judges and arranges all things; standing on earth, he reaches up to the heavens: for although incarnate he lived among men on earth, yet by his majesty he transcended all the heavenly realms.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
