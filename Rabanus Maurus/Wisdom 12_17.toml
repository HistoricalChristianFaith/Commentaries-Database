[[commentary]]
quote='''
For divinity indeed shows its power in the correction of wrongdoers, so that the stubbornness of the proud may not presume upon its own strength; yet it will do so without any passion or disturbance, because God is impassible, and is never changed by any alteration, but always remaining the same, He renews, arranges, and orders all things, as the following statement proves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
