[[commentary]]
quote='''
In the sixth, moreover, not only his courage, but also his humility must be proclaimed; that the martyr claimed nothing for himself, nor puffed up the honor of his confession with proud words, but attributed to his own sins the fact that he suffered persecution from the king, while he ascribed it to God that he would afterwards be avenged. He taught that martyrs are modest, that they trust in vengeance being taken, and that they boast of nothing in their passion. "Do not," he says, "deceive yourself in vain; for we suffer these things for our own sakes, in that we have sinned against our God. But do not think that you will remain unpunished, who have set yourself to fight against God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
