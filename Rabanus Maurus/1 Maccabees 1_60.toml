[[commentary]]
quote='''
The meaning of the story is clear, which explains the torments that wicked persecutors inflicted upon worshippers, both then in the Old Testament and now similarly in the New. Nor is it easy for anyone to name all the kinds of punishments which the most evil torturers inflicted upon the martyrs of Christ.

But according to the allegorical sense, what is shown by the women who were circumcising their sons, if not the honorable persons of the faithful, who, examining their actions, words, and thoughts with the utmost discernment, hurry to cut off with the sword of the spirit whatever they find unnecessary in them? This spiritual Antiochus desires to slaughter them, because he strives either to strike them physically through torture or to kill them spiritually in the soul through denial. Antiochus is interpreted as 'the silence of poverty', and he is rightly called by this name, who, lacking spiritual knowledge and deprived of sacred virtues, persecutes in others through envy that which he himself does not at all possess.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
