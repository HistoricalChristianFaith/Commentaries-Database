[[commentary]]
quote='''
But if sense is at work, which of these is more an artificer than that? If, therefore, wisdom is the creator of sound sense and profound understanding, how is it that she herself is not the producer of all good works, of sacred virtues, which offer lasting salvation to their lovers?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
