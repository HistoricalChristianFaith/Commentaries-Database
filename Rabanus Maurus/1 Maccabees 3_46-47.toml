[[commentary]]
quote='''
Those who had gathered to fight against the enemies came to Mizpah against Jerusalem. And what does Mizpah, which is interpreted as judgment, signify if not the Old Testament; Mizpah was a place of prayer, which always looks forward to the New Testament, and the Testament provides for the Gospel of Christ. For it is necessary that the spiritual soldiers of God turn the intention of their hearts there, so that they may be instructed by divine reading on how they ought to fight against spiritual enemies. For Mizpah was a place of prayer. Not, however, in Israel; because divine oracles were first made known to us through the books of the law and the prophets, then through the Gospel. They fasted that day. Because they devoted themselves to purity. They clothed themselves in sackcloth and put ashes on their heads. Because they worthily serve God by doing penance for their sins, which they have contracted through human weakness. And they tore their garments. When they discipline the body and degrade carnal desires within themselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
