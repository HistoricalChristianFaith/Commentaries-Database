[[commentary]]
quote='''
What is signified by Ptolemy, if not hypocritical and crafty men? These, then, with a insincere submission attaching themselves to good teachers, and pretending devotion, whose power they utterly ignore, generally attain to honor and ecclesiastical dignity, the teachers themselves granting it to them: for this is what it means to be the sons-in-law of the high priest, to take into the power of one’s own government those persons whom good teachers were regenerating by water and the word. But when, having received promotion, they begin to be under their own authority, each one, enslaved to his desires, strives by tricks and lies to trip up and overthrow the very authors of his honor; and they likewise destroy their sons and little children, since they spare no person living with them, but by means of money and flattery they subject secular powers to themselves.... They harass the Church with hidden snares and with open persecutions.

Nor is it surprising that such wickedness can sometimes prevail in the Church, since we read that the Church itself (so to speak) received the treachery of Judas the betrayer; a magician was baptized by Philip, but was not cleansed of the wickedness of his mind; Julian, the apostate, having been raised up from reader in the Church, persisted in his undertaking of evil as a savage enemy until the end of his life. The age of this present time likewise has some people of this sort who, although they do not kill their teachers with the sword, nevertheless do not cease to persecute them with envy and hatred.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 16"
