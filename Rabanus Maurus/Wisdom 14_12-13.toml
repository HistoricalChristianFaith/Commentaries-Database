[[commentary]]
quote='''
Although there are many kinds of fornication, the worst is that by which the soul fornicates, departing from God and worshipping idols. Similarly, that is also destructive which abandons the truth of divine doctrine and follows the falsehood of heretical opinion. For the Apostle Paul calls greed the service of idols (Eph. 5:5), from which it can be assumed that every evil desire may rightly be called fornication, when the soul, neglecting the higher law by which the lower is governed, is corrupted as if prostituted for a price to the base will of the natures. But all these things, just as they were not created from the beginning, so also they will not remain forever. For the Lord will destroy all deceitful lips, and will cut off all who speak lies (Ps. 12:3). Therefore, it is also said through Jeremiah: The gods who did not make the heavens and the earth will perish from the earth and from under these heavens. But the Lord is the true God, he is the living God and the eternal King (Jer. 10:10-11). Therefore idols first arose, the following sentence shows.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
