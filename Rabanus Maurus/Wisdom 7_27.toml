[[commentary]]
quote='''
Therefore, when something is pronounced or narrated in the Scriptures about wisdom, whether by wisdom itself speaking, or when something is said about it, the Son is especially indicated to us, by the example of whose image we also may not depart from God, because we too are the image of God, not indeed equal, for we are made by the Father through the Son, not born of the Father as that wisdom is; and we, because we are illuminated by the light, but that wisdom truly because it is the light illuminating, and therefore that wisdom is without an example, but for us it is an example. For it does not imitate anyone preceding it to the Father, from whom it is never separable, because it is the very same as He from whom it is; but we, imitating, imitate the one who remains, and we follow the one who stands, and walking in Him we strive toward Him: because He became for us a temporal way through humility, who is for us an eternal dwelling through divinity; for indeed, to pure intellectual spirits who have not fallen by pride, in the form of God and equal to God, and God, He offers the example, so that the same example might also offer a way of return to fallen man, who, because of the uncleanness of sins and the punishment of mortality, could not see God, He emptied Himself, not by changing His divinity, but by assuming our changeableness, and taking the form of a servant, He came to us in this world, who was in this world, because the world was made through Him, so that He might be an example above for those seeing God, an example below for those marveling at man, an example for the healthy to remain, an example for the weak to recover, an example for the dying not to fear, an example for the dead to rise again. In all things He Himself holds the primacy, for man ought not to follow anyone but God to attain happiness, and he could not perceive God by following, so he would follow God made man, at once both the one whom he could perceive and the one whom he ought to follow. Indeed, the Almighty Father begot almighty wisdom from Himself, which, remaining, renews all things in itself, because it, being absolute, rules and orders all changeable things by its will, which, transferring itself into the souls of the elect, by its grace makes them friends of God, and appoints them prophets. For all things were made through Him, and without Him was made nothing (Jn. 1:3). Therefore it is said: You have made all things in wisdom, because through His Son, that is, His Word and His wisdom, God made all things. (Prov. 3:9)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
