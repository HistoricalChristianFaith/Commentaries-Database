[[commentary]]
quote='''
By the merit of Egypt, they endured the punishments of darkness, who, blinded by the obscurity of envy, wished to keep the people of God, to whom the light of the divine law was to be handed down, in their prison, and although they intended not even to spare their infants, by the judgment of God, when one son, that is, Moses, was rescued from death by water, a multitude of adversaries was drowned in mighty water through his ministry. In the same way, now the spiritual enemies who strive to destroy the assembly of the faithful, when the elect of God are freed from their enemies through the water of baptism, only those enemies, together with their king the Devil, are overwhelmed in those very waters by the power of Christ. The reason for this mystery was both foreshadowed long ago in the deeds of the ancients, and is now fulfilled through the coming of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
