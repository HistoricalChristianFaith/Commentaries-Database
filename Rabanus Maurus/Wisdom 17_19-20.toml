[[commentary]]
quote='''
For only the wicked were in darkness; but the worshippers of God abounded in the most abundant light. Therefore, it is written: But wherever the children of Israel dwelt, there was light (Ex. 10:23). But it must also be considered what is said: Only for them there was a heavy night, an image of the darkness that was to come upon them, for they themselves were a heavier darkness to themselves. In this it is clearly shown that spiritual darkness, which the mind suffers, is heavier than bodily darkness, which the eye endures; for from these darknesses, that is, of unbelief and error and wickedness, a man is led to the outer darkness, where there will be weeping and gnashing of teeth; which darkness of the Egyptians prefigured, for just as there bodies were held useless for every good work, so here both bodies and souls are shut up in eternal prison, unfit for every good work, because neither reason, nor place, nor time for working is found among the dead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
