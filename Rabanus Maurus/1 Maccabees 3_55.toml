[[commentary]]
quote='''
He calls tribunes those who were in charge of a thousand soldiers (whom the Greeks call χιλιάρχους); centurions, those who were in charge of a hundred; decurions, those who were in charge of ten. For holy preachers arrange their subjects so that nothing disordered may be found among them, but that they may fulfill the service of Christ in a rational manner. Therefore Paul says to his hearers: Let all things among you be done decently and in order (1 Cor. 14:40); and again: No one, he says, will be crowned unless he has competed lawfully (2 Tim. 2:5).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
