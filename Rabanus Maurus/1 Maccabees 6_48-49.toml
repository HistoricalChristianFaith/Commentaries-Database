[[commentary]]
quote='''
The mystical Antiochus advances against Judea and Mount Zion, because he turns his entire war apparatus toward the overthrow of the Church of Christ and makes peace with those who were in Bethsura, since he does not offer true peace but false peace to those whom he wishes to deceive and mislead through fabrication. But only those go out to him from the city who had no food while shut in; for only those withdraw, seduced away from the protection of the Church, who do not have the nourishment of knowledge and love with which their soul may be fed. They also keep the sabbath badly, since they love not the pursuit of virtues but the idleness of sloth; and they themselves, seized by the enemy, return into his dominion, because they refuse to anticipate his snares. Now that it is said that the king turned his camp toward the place of sanctification for many days signifies that the persecutors of the faithful do not easily cease from the cruelty of persecution, but every day, up to the end of the age, wage wars, for the testing of some believers, for the deception of others. For while the mystical woman, who is expressed under the figure of Eve, crushes the serpent's head, that poisonous snake will never cease to lie in wait for her heel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
