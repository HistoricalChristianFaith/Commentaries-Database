[[commentary]]
quote='''
Therefore, the power of God, always joined with goodness, although it is in need of nothing, nevertheless does not despise His work in men on account of their sins, but by granting forgiveness through repentance, He washes them from sins, and with fatherly compassion, He encourages and nourishes them to be gathered back to Himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
