[[commentary]]
quote='''
For the Almighty God judges all things with the peacefulness of His nature, but in the patient vengeance of God He seems to restrain His anger, which in fact does not exist, but human emotions, just as bodily members, are ascribed to God in figurative language, so that the divine words may be adapted to our manner and understanding. Therefore, it is also read in the Scriptures: the eyes of God, and ears, mouth, hands and feet, anger and fury, and other emotions which are diverse in men, whereas the simple nature has no division, nor does true unity admit any division, but the one and the same God always works diverse and varied works, of whom it is said through the Prophet: All things shall grow old like a garment, and as a clothing you will change them, and they shall be changed; but you are the same, and your years shall not fail (Ps. 102:25-28). For in the prophet Micah it is written in this way: The Lord shall go forth from His place, and shall come down and tread upon the high places of the earth, and the minds under it shall be consumed, and the valleys shall be cleft (Micah 1:3). Also in Isaiah: The Lord of hosts shall go forth and crush war, and will stir up the heavens, and will cry out over His enemies with strength (Isa. 42:13). Therefore, God will go forth from His place when He is compelled to break His rest and gentleness and mercy for the correction of sinners, who, though by nature He is sweet, becomes bitter through our fault, not to Himself, but to those who endure, for whom the torments are bitter. Concerning His nature, He Himself speaks otherwise through the prophet, saying: I am God and I do not change (Mal. 3:6). Therefore, it is also said through James: With whom there is no change, nor shadow of alteration (James 1:17). Therefore Paul also says of Christ: Who is the image of the invisible God (Col. 1:15). And again: Now to the King of ages, immortal, invisible, the only God (1 Tim. 1:17). And in the Gospel it is written: No one has ever seen God. The only-begotten Son, who is in the bosom of the Father, He has declared Him (Jn. 1:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
