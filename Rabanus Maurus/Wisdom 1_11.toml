[[commentary]]
quote='''
How wicked grumbling and detraction are can be proven by many statements of the Holy Scriptures and by examples of the judgments of the Lord; especially since the Lord Himself is often found to have sent vengeance upon those who grumble and complain. And Scripture says that every scoffer is an abomination to the Lord (Prov. 24:9). The Apostle also says: Whisperers and detractors are hateful to God (Rom. 1:30). Therefore, the psalmist also says: Whoever slanders his neighbor in secret, him I will destroy. And elsewhere it is read: Whoever slanders anything binds himself for the future, and just as a serpent bites in silence, so does he who secretly slanders his brother. (Ps. 101:5) Death and life are in the power of the tongue. He who is of a perverse heart finds no good, and he who twists his tongue falls into evil. And it is well said that an obscure answer will not go in vain, because it will be reserved for the judgment of the Lord. Therefore, that saying of the Lord: Every idle word that men shall speak, they shall give account thereof in the day of judgment. (Matt. 12:36) For by your words you shall be justified, and by your words you shall be condemned. and a lying mouth destroys the soul. Therefore, a lying mouth kills the soul of the liar himself, because it pierces it with the sword of sin; therefore, every lie must be most carefully avoided, although sometimes there is a kind of lie that is a lesser fault, if someone lies in order to do a good deed. This is clearly expressed by Father Augustine in his book On Lying, where he mentions that there are eight kinds of lies; anyone who wishes can find out how he discusses this there. But whoever thinks that any kind of lie is not a sin deceives himself disgracefully, while he considers himself to be an honest deceiver of others. Therefore, when examples of lying are presented to us from the Holy Scriptures, either they are not lies, but are thought to be so because they are not understood; or if they are lies, they are not to be imitated, because they cannot be just, but as it is written: God did well to the Hebrew midwives and to Rahab the prostitute of Jericho, not because they lied, but because they were merciful to the people of God. Therefore, it was not their deceit that was rewarded, but their goodwill; the kindness of their mind, not the wickedness of their lying. For just as it would not be strange or absurd if God wished to forgive evil deeds previously committed by them because of their later good deeds, so it is not surprising that, at one time and in one case, God, seeing both aspects of the same act, mercifully rewarded the act as good and, because of this good, forgave the evil in it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
