[[commentary]]
quote='''
Then indeed the righteous will stand with great determination against their persecutors, who afflicted them here with undeserved punishments and reproached their labors as foolish; for, being raised by heavenly brightness, they will judge according to truth those who had previously condemned them unjustly. Therefore, when these persecutors see themselves suddenly changed from glory to humiliation, and equally see their adversaries transferred from temporal affliction to heavenly honor, they will then seek with late and fruitless repentance what they could previously have obtained fruitfully, if they had wished, while it was permitted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
