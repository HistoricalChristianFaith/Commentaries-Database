[[commentary]]
quote='''
For many are those who, by flattery, favor princes; whose chain-linked breastplates mean that they are entangled with one another in the deceits of wicked counsel; and they have a bronze helmet on their heads when they surround their minds with the hardness of iniquity; and there the horsemen are arranged, because the puffing up of pride will not be lacking where, through lack of mercy, the equality of common nature is not considered, but the vanity of worldly favor is sought. And the wooden towers, which, placed upon the beasts, contained thirty men within them, express the delicateness of that power by which persecutors always trust that they prevail over the martyrs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
