[[commentary]]
quote='''
By the just judgment of God, those who are condemned and repent too late recognize what, while living before, they refused to believe; therefore also the Psalmist bears witness, saying: The Lord will be known by executing judgments; the sinner is caught in the works of his own hands. The sinners shall be turned into Hades, all the nations that forget God (Ps. 9:16-18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
