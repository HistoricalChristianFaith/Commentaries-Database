[[commentary]]
quote='''
Indeed, the proud enemies of the people of God and all enemies of justice, although they may seem to rule on earth for a time, yet because they are foolish, they consider the senseless idols of the nations to be gods, which have neither sight, nor hearing, nor touch, nor any sense of life; they are most unhappy, awaiting the destruction of their souls in Gehenna, where there will be perpetual punishment of torment; for their worm does not die, and the fire is not quenched, because they did not give honor to the living and true God, and served carved images which they themselves wickedly made (Mark 9:44-48).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
