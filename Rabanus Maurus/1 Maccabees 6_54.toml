[[commentary]]
quote='''
That, when the persecution of unbelievers burns hot, many of those who persisted in the Church only in outward appearance, and not in the constancy of faith, are scattered because of fear of punishment, according to that which the Lord foretold in the Gospel would happen in the last times: For there shall be, he says, great tribulation upon the earth and wrath against this people. And they shall fall by the edge of the sword, and shall be led away captive into all nations, and Jerusalem shall be trampled by the Gentiles, until the times of the nations be fulfilled. And unless those days had been shortened, no flesh would be saved; but for the sake of the elect those days will be shortened (Luke 21:23-24).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
