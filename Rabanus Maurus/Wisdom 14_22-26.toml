[[commentary]]
quote='''
For they exchanged the glory of the incorruptible God for the likeness of the image of corruptible man, and of birds and quadrupeds and serpents, and they exchanged the truth of God for a lie and served the creature rather than the Creator, who is blessed forever; although they called themselves wise, they became fools: for they were given over to a reprobate mind, so that they dishonored their bodies among themselves, and those who refused to enter into a covenant with God through right faith and good works, being placed under the worship of the Devil, could in no way have true peace among themselves. Therefore they sacrificed their own children, as the pagans themselves did in the rites of Saturn, who sacrificed to Saturn out of hatred for Jupiter, and extinguished tender and innocent souls, which is the age most sweet to parents, without any regard for virtue. Others, indeed, offered human blood to the virtue they called Bellona; for the priests themselves sacrificed not with another's blood, but with their own, striking themselves with drawn swords. About this, Quintilian rightly says: "If God requires this, He is angry." Others, performing obscure rites, held vigils full of madness, as they were accustomed to do in the rites of Egyptian Isis and Eleusinian Ceres; for just as Osiris was sought there with the lamentation of his mother, so here Proserpina, abducted for the incestuous marriage of her uncle, was sought. Because Ceres is said to have searched for her in Sicily with torches lit from the summit of Etna, therefore her rites are celebrated with the tossing of burning torches. Likewise, in the rites of Father Liber, vigils full of madness were held; also in the festival of the Great Mother, where, following the example of their gods, who spent the night in feasting and games during her festival, these people consumed the whole night in useless play. Neither life nor marriage was kept pure by the pagans themselves, because they thought they could please their gods through lust and impurities of life; for all things were confused where reason and true religion held no place, but the more wicked someone was, the more he thought he pleased his god.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
