[[commentary]]
quote='''
In what he says about the robe of the ephod, which the high priest wore, that it contains the whole world, and the great deeds of the ancestors engraved on the four rows of stones, and the magnificence of God in the crown which the high priest himself wore on his head, although these express the series of all virtues which the priest of God ought to have in his teaching and conduct, nevertheless, the meaning which the Hebrews characteristic to the priestly garment, placing here its mystical significance, we reserve for discussion elsewhere. Therefore, the four colors refer to the four elements from which all things subsist: they assign linen to earth, because it is produced from the earth; purple to the sea, because it is dyed from its shellfish; blue to air, because of the similarity of color; scarlet to fire and ether, which in Hebrew is called sani; and they recall that it is just that the high priest of the Creator should pray not only for Israel, but also for the whole world. Indeed, this world consists of earth, water, air, and fire, and these elements belong to all things. Therefore, the first linen garment signifies the earth; the second, the blue one, shows the color of air, because from earthly things we are gradually lifted to the heights, and the blue robe itself, coming from the head down to the ankles, indicates the air stretched from the heavens down to the earth. The pomegranates and bells placed at the lower parts represent lightning and thunder, or earth and water, and the harmony of all the elements among themselves, and therefore all things are so intertwined that everything can be found in each part. As for the aforementioned colors being interwoven with gold, they wish it to be understood that the vital color and the providence of divine sense penetrate all things. Over the ephod and the two stones, either emerald or onyx, which are above and cover each shoulder, they interpret as two hemispheres, one above the earth, the other below, or as the sun and moon which shine above. That belt by which the priest's chest is tightened, and the linen tunic, that is, the earth, is bound, they interpret as the ocean. The breastplate placed in the middle they explain as the earth, which, like a point, although it contains all things in itself, is nevertheless surrounded by all the elements. The twelve stones are interpreted as the circle of the zodiac, or the twelve months, and to each verse is assigned a particular time, and to these are given three months each. Fittingly, this very thing in the middle is called the breastplate of judgment; for all things are full of reason, and earthly things are connected to heavenly things. The intermingling of earthly things and the times of heat and cold, and the double temperance between each, descends from the course and order of the heavens, therefore also the breastplate is more tightly bound with the ephod. Furthermore, what is said in the breastplate, "and analogy," that is, indicator and teaching or truth, signifies that there is never any falsehood in the reason of God, but that truth itself is shown to men by many signs and arguments, and comes even to mortals. Therefore it has come about that we know the course of the sun and moon, and of the year, and of the months, and of the times, and of the hours, and also of the sowing seasons and winds and all things, receiving the wisdom implanted by God, and with God himself, the inhabitant and teacher of his own dwelling, showing us also the knowledge of the structure; above all, the mitre and the blue ribbon represent the heavens, and the plate of gold which is on the forehead of the high priest, and the name of God written on it, show that all things below are governed by the will of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
