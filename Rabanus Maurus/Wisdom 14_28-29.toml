[[commentary]]
quote='''
Their whole life is established in errors; if they rejoice, either at festivals or in their games, they act madly, while they either commit murders or defile themselves obscenely with lust; while they prophesy, they deceive and lead their listeners astray; while they live unjustly, they are dead in soul; if they swear falsely, they are quickly led to hell; when they swear by idols, they pollute the name of God, who commands in the law, saying: You shall not take the name of the Lord your God in vain (Ex. 20:7). And again: By the name, he says, of foreign gods you shall not swear, but by the name of the Lord your God (Ex. 23:13). But when they think they can mock God, they cast themselves into eternal death. Allegorically, however, heretics, worshipping the images of their errors, are themselves the cause of their own destruction, whose doctrine is false, life unjust, joy insane, and death abominable. For when they swear unjustly by an idol and do not hope in the true God, despising justice, they will receive the just punishment of their deeds. This is also consequently implied.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
