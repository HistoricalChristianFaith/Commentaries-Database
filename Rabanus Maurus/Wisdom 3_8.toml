[[commentary]]
quote='''
The saints will judge the nations, but through them God judges, who presides over their minds. They will rule over peoples, for no adversity of opposition resists them. Their Lord will reign forever, because the kingdom of Christ will endure without any end. Concerning this, the angel said to Mary: The Lord God will give him the throne of David his father, and he will reign over the house of Jacob forever, and of his kingdom there will be no end (Luke 1:32-33). Therefore, it is also said through Isaiah: His dominion will be multiplied, and there will be no end of peace (Isa. 9:7). The saints will also reign with their king, that is, the members with their head, as the words of the angel testify to Daniel in prophetic vision, saying: But the kingdom and power and greatness of the kingdom under all heaven will be given to the people of the saints of the Most High, whose kingdom is everlasting, and all kings will serve him and obey him. (Dan. 7:27)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
