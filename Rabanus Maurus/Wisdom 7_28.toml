[[commentary]]
quote='''
If God loves no one except him who dwells with wisdom, then surely He hates all followers of foolishness. Therefore, it is declared in this statement that anyone who hates discipline cannot be a partaker of the grace of God, because the Lord is far from the wicked, and he who hates rebuke will die (Prov. 15:29). Therefore, the heart of the wise seeks doctrine, and the mind of the just will meditate on obedience. But he who trusts in his own heart is foolish; and he who walks wisely, this one will be saved (Prov. 15:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
