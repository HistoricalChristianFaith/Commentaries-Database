[[commentary]]
quote='''
From the Scriptural account of the Kings, we have learned that Solomon, in his youth, asked the Lord for wisdom and a teachable heart so that he might rightly judge the people of the Lord and discern between good and evil, which he obtained, to such an extent that no king before him was like him, nor would any arise after him. Therefore, in a certain way, this statement can be applied to him, because he was granted a good soul, in that he possessed a wise and understanding heart. But it must be considered whether what is added afterwards can pertain to him. Since Scripture itself in many places reproves him, because he loved foreign women, who turned his heart away, and he offended the Lord by building idols for the sake of foreign wives, who burned incense and sacrificed to their gods, therefore it seems to me more fitting, according to the allegory, to refer this to the people of the saints, who, regenerated by the washing of holy baptism and filled with faith in the Savior, received the childhood of good character and similar innocence, and, intent on sacred studies, strive to make progress and to reach the summit of virtues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
