[[commentary]]
quote='''
He commemorates the blessings of God, which were bestowed upon the former people through divine mercy, when, as they thirsted, He brought forth water from the rock and refreshed them with abundant drink. Likewise, on the contrary, he recounts the punishments which their enemies suffered in the slaughter of their firstborn and the various calamities that, by the just judgment of God, came upon them. Mystically, however, it signifies that the people of God and the sheep of His pasture, whom the supreme shepherd redeemed at the price of His own blood, quench their thirst at the fountain of living water, and their persecutors, failing in eternal want, will be delivered to perpetual death. Similar to this is that which the Lord speaks through the prophet Isaiah against His adversaries, saying: Behold, my servants shall eat, but you shall be hungry. Behold, my servants shall drink, but you shall be thirsty. Behold, my servants shall rejoice, but you shall be put to shame. Behold, my servants shall sing for gladness of heart, but you shall cry out for pain of heart, and shall wail for breaking of spirit (Isa. 65:13-14). But that drink is to be understood here, which will spring from the fountains of Israel, which whoever drinks will have within himself a fountain of water springing up into eternal life, which also the Savior promises to drink with the apostles in the kingdom of the Father, which gladdens the heart of man, so that those who drink may say: Blessed are those who hunger and thirst for righteousness (Matt. 5:6). And the mother of the Lord, full of the Holy Spirit, prophesied: He has filled the hungry with good things, who previously did not have the food of the Lord, and the rich He has sent away empty (Luke 1:53), who were given for His burial, and whom, though they promised a prophet, they rejected. Concerning whom also in another place the Psalmist sings: The rich have lacked and suffered hunger (Ps. 30:10), that is, the people of the Jews. But those who seek the Lord, that is, the multitude of the Gentiles, will not lack any good thing. And when those serving Christ and believing in Him shall have rejoiced and praised the Lord for gladness of heart and joy, then those others will be put to shame, seeing others received into their place, and will cry out for pain of heart, fulfilling that which is written: There will be weeping and gnashing of teeth (Matt. 13:42), when the lambs of the Gentiles and the righteous will stand at the right hand, and the goats of the Jews and the wicked at the left, the former receiving eternal rewards, the latter everlasting punishments. But the regret of spirit, through pain of heart, is to be understood in the conscience of sinners, according to that which is written: Those who err in spirit will come to understanding (Isa. 29:24), and a contrite and humbled heart, O God, you will not despise (Ps. 51:17). The spirit is crushed when it is lifted up, as is written of the wicked king of Israel: The Lord hardened his spirit. And of the prince of the Babylonians, when his heart was lifted up and his spirit was hardened, so that in pride he said: This is Babylon, and I have made it (Dan. 5:20).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
