[[commentary]]
quote='''
He shows what should be sought in old age, because it is not the age of the body, but the maturity of the mind and the uprightness of character that are praised in it. Therefore, in the Book of Numbers, the Lord commanded Moses to choose seventy elders, whom He Himself knew to be elders, so that He might appoint them as teachers and judges of the people. (Num. 11:16-17) And Paul, writing to Timothy, says: Let no one despise your youth; but be an example to the faithful in word, in conduct, in love, in faith, in purity. (1 Tim. 4:12)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
