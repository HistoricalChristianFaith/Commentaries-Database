[[commentary]]
quote='''
Therefore, righteousness is rightly said to be perpetual and immortal, because it frees those who obey it from eternal death. Unrighteousness, on the other hand, is the purchase of death, because the torments of Hades are the certain reward of sinners. The immoral have summoned unrighteousness with their hands and words, because they follow it in their deeds and speech, and, deceived by error, confidently believe they can sin with liberty, in no way consenting to be separated from its company, since, already condemned by the just judgment of God, they do not strive to escape it. Therefore the saying from the Gospel: But he who does not believe is already judged, because he has not believed in the name of the only-begotten Son of God (Jn. 3:18). And again: He who believes in the Son of God has eternal life. But he who does not believe in the Son will not see life, but the wrath of God remains upon him (Jn. 3:36).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
