[[commentary]]
quote='''
For Antiochus the spiritual one sends into the city of Modin, which is interpreted as judgment: namely, into the holy Church, where the judgments of God are most diligently kept; so that those who had fled there seeking the remedy for their souls may be forced to depart from the law, to offer the sacrifice of sins and the worship of wickedness to the Devil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees 2"
