[[commentary]]
quote='''
By the goodness of the Creator, the first man was created and placed in paradise, and by the order of his Maker, he was set above all living creatures, so that Scripture relates that after all the creatures of the earth and all the birds of the sky were formed, God brought them to Adam to see what he would call them, and Adam named all the animals, all the birds of the sky, and all the beasts of the earth (Gen. 11). But when, because of the transgression of the command, he was cast out of paradise and plunged into the misery of this world, he was again restored through divine wisdom, through which he was first created, that is, Christ; and this is the sign of the great mercy of almighty God, that He decided to restore the man who, having been deceived by another's persuasion, fell into sin, so that His work would not perish, which from the beginning He had made in His own image and likeness. For He made the nations of the world able to be healed (Wis. 1), and He who did not do evil, lest His work should become worthless, that is, lest His work in man should utterly perish.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
