[[commentary]]
quote='''
There is great salvation in Israel when the number of believers in the Lord among the peoples increases, who recognize the Savior by faith, confess with their mouths, and glorify Him together in one work. Or otherwise, then there will be great salvation in Israel, when in the Church of Christ there will be no hardship. And it is notably added, on that day; on the day, indeed, of the resurrection, because the most noble bride will be joined to the bridegroom in the heavenly kingdom above, when all the saints in the sight of God will rejoice not only in the rest of their souls, but also in the immortality of their bodies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
