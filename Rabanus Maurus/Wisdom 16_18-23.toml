[[commentary]]
quote='''
Here wisdom commemorates for the people of Israel in the desert the manna, the sweetest and healthiest food given from heaven, so that they might render greater thanks to their Redeemer, who not only mercifully freed them from their enemies when they were oppressed, but also generously fed them with heavenly provisions when they were in need (Ex. 16). If anyone thinks it necessary to inquire what is meant by saying that snow and ice withstand the force of fire and do not melt, let him understand that it was not made known there, that two contrary elements, namely fire and frozen water, struck the wicked in harmony, or that some quality of the heavenly food given as food to the people of God was expressed there, which endured the force of fire where it was necessary, and yet, when it was necessary, melted in the heat of the sun. It is also read in Exodus that in the wilderness appeared something white, small, and cut like hair, resembling frost upon the ground, the taste of which was like flour mixed with honey, nor did it suffer any loss from the force of fire. Therefore it is written in the book of Numbers: Now the manna was like coriander seed, the color of bdellium; and the people went about gathering it, grinding it in mills or pounding it in mortars, cooking it in pots and making cakes of it, the taste of which was like bread made with oil. But when the sun rose, it melted (Num. 11:7-15). Mystically, just as in the scourge of hail and fire there is a harsh rebuke, so divine Scripture is understood to torment sinners, so also in the heavenly food there is a heavenly comfort, which daily refreshes the righteous and those devoted to God. Otherwise, manna signifies that bread which in the Gospel says: I am the bread of life who came down from heaven, and I give life to the world. Whoever comes to me shall not hunger, and whoever believes in me shall never thirst. And again: The bread, he says, which I will give is my flesh for the life of the world. And again: Whoever eats my flesh and drinks my blood abides in me, and I in him (Jn. 6:35-40). Whoever therefore truly attains to the participation of this bread will undoubtedly possess eternal life without end. Therefore, the reprobate are tormented by spiritual hunger, and the elect are healthily fed by the heavenly bread: the former are daily prepared by various labors for future punishment; the latter, however, are daily nourished by divine help for eternal life. Which the Prophet also testifies, saying: Many are the sorrows of the wicked; but mercy shall surround those who hope in the Lord (Ps. 32:10).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
