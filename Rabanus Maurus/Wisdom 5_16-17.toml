[[commentary]]
quote='''
But when he described the punishments of sinners and their late repentance in Hades, he consequently recounted the glory and reward of the just with the Lord in heaven, who, having been received into the heavenly kingdom, enjoy a blessed life in the contemplation of God; and this is because they placed all their hope and the intention of their mind in the goodness of their Creator, by whose hand they are also crowned and protected by the right hand of His strength. For the hand of God, and the right hand, and the arm, because of their effective power, signify the only-begotten Son of God: through whom all things were made, in whom we have redemption through His blood, the forgiveness of sins, whom the Father raised from the dead and set at His right hand in the heavenly places, above every principality and power and virtue and dominion, and every name that is named, not only in this age but also in the one to come, and He subjected all things under His feet and gave Him as head over all things to the Church, which is His body and the fullness of Him who fills all in all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
