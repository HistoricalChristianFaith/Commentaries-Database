[[commentary]]
quote='''
What is signified by the number twenty and five, except those who, entangled by the five senses of the body in carnal desires, act and think contrary to the law of God, which consists in the two Testaments and in the two commandments, namely, the love of God and of neighbor.

Therefore, twenty-five is produced by multiplying five by itself, and rightly this number is compared to the deserters of the law, who, through each sense of the body, that is, through sight, hearing, taste, smell, and touch, oppose the divine precepts written in the Pentateuch. And therefore it is said that they sacrificed on the altar which was against the altar, because on the altar of wickedness, which pride had erected against the altar of the Catholic faith, all the wicked offer to the Devil the ill-fated sacrifices of their actions and words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_1_Maccabees.html'
source_title="Commentary on 1 Maccabees"
