[[commentary]]
quote='''
Whoever is guided in all things by wisdom, which leads and governs him in all his counsels and actions, is truly happy in everything; but it is remarkable how he says that he was ignorant that she is the mother of all these things, when previously he said that she anticipates those who desire her and shows herself first to them. Unless perhaps, in the course of his meditation, he realized that he had advanced so much that, by equating his former knowledge with the latter, when he saw that the latter excelled the former, he considered the former as ignorance in comparison to the latter. It is like that passage in the Gospel: for John the Baptist, proclaiming the coming Lord and pointing to him present with his finger, after he had baptized him, said that he did not know him before, but that it was revealed to him when the Holy Spirit descended upon him, saying therefore: "And I did not know him, but he who sent me to baptize with water said to me: 'He upon whom you see the Spirit descending and remaining upon him, he it is who baptizes with the Holy Spirit.' And I have seen and have borne witness that this is the Son of God" (Jn. 1:33-34). So also among the lights of the world, although the other stars are bright in themselves, in comparison to the sun they are found to be by no means bright. Therefore, the sun itself, because it alone shines with daylight among the other stars, is so named.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
