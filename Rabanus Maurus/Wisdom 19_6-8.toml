[[commentary]]
quote='''
Every creature from the beginning is restored to its own kind when it obeys the commands of its Creator and serves His will in all things. For this is the purpose of creation: that it might become subject and obedient to its Creator. How the cloud covered the camp of the Israelites, shining for them at night and shading them against the heat of the sun by day, and how the Red Sea, divided, prepared a way for the people of God and, when it returned upon itself, drowned their enemies, is clearly explained in the history of Exodus. Nor is it any less clear that the cloud which led the people of God signifies the incarnation of Christ, who enlightens believers in this world with the light of the Gospel and protects and guards them by His grace from their persecutors. The Red Sea, moreover, bears the ritual of baptism, where the faithful are saved and the opposing powers are drowned; just as then the children of Israel, having been delivered, sang praises to the Lord, rejoicing with great exultation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
