[[commentary]]
quote='''
The infinite therefore calls wisdom a treasure, because the more diligently one learns it, the deeper one realizes it to be; and the more one advances by meditating on it, the more one understands that it is sought at greater depth; and therefore those who meditate on it become participants in the friendship of God, because they become true knowers of the commandments and will of God. Concerning this, Truth itself says to the disciples in the Gospel: "I no longer call you servants, because a servant does not know what his master is doing. But I have called you friends, because everything I have heard from my Father I have made known to you" (Jn. 15:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
