[[commentary]]
quote='''
It is read in the Book of Numbers that when the Israelite people desired to eat meat in the desert, the Lord provided them with a multitude of quails, which they ate until they were satisfied to the point of nausea; nevertheless, the punishment for their desire was not far from them, for the wrath of the Lord, stirred up against the people, struck them with a very great plague, and the place was called the grave of desire (Num. 11). Therefore, wisdom now remembers this, alternating its discussion about the destruction of the Egyptians and the correction of the Israelites, because those who resisted God and exercised tyranny over His people perished suddenly without excuse. However, these were corrected for a time and punished three times in a manner suitable for discipline, yet they were not entirely deprived of divine comfort.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
