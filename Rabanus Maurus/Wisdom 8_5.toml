[[commentary]]
quote='''
And if riches are sought in life, what is richer than wisdom, which accomplishes all things? Therefore, the wisdom and power of God is the Lord Christ, through whom all things were made, and who, together with the Father, arranges and governs all things by his own will, according to the saying of the Gospel: My Father, he says, works even now, and I work (Jn. 5:17). He contains within himself the riches of all virtues, and distributes them to his lovers according to his will, as is equally declared in both the New and the Old Testament. Therefore, as wisdom itself speaks in Proverbs, saying: With me are riches and glory, lofty sheep and righteousness. My fruit is better than gold and precious stone, and my produce than chosen silver. I walk in the ways of righteousness, in the midst of the paths of judgment, that I may enrich those who love me, and fill their treasures (Prov. 8:18–21). So also in the Gospel, the same cries out and says: I am the light of the world. Whoever follows me does not walk in darkness, but will have the light of life (Jn. 8:12). Come to me, all you who labor and are burdened, and I will refresh you. Take my yoke upon you, and learn from me, for I am gentle and humble in heart, and you will find rest for your souls. For my yoke is easy, and my burden is light (Matt. 11:28-30). And elsewhere: Everyone, he says, who has left house or brothers, or sisters, or father, or mother, or wife, or children, or fields for my name's sake, will receive a hundredfold, and will possess eternal life (Matt. 19:29). This saying can also especially pertain to those who meditate on the divine law, who meditate on it day and night properly, and are constant in contemplation, because whoever seeks it with attentive heart and good determination will be filled with the indescribable sweetness of its inner truth, and will enjoy the abundance of all good things.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
