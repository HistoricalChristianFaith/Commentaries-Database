[[commentary]]
quote='''
If you refer this to the Egyptians, who, being idolaters and given to various errors, also unjustly persecuted the people of God, in those ten plagues with which the Lord punished them because they were unwilling to let His people go, it can be understood that they experienced the viciousness of beasts; for there, too, flies of various kinds and locusts are described as having devastated them, likewise frogs and reptiles and other creatures of the earth, of which it is written in the psalm: He sent among them swarms of flies, which devoured them; frogs, which destroyed them; and He gave their fruits to the caterpillar, and their labors to the locust (Ps. 78:45-47). In another sense, heretics and schismatics and all the wicked are also torn, scattered, and destroyed by spiritual beasts, that is, by evil spirits, to whose will they consented and, by the just judgment of God, were subjected to their power, so that they might torment and scatter them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
