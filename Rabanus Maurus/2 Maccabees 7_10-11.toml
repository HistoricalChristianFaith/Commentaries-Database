[[commentary]]
quote='''
The third, when his tongue was demanded, promptly put it out; for from his brother he had already learned to despise the punishment of cutting out the tongue. He also steadfastly stretched forth his hands to be cut off, greatly blessed in this kind of punishment, to whom it befell, with hands extended for suffering, to imitate the likeness of the Lord's passion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary%2520on%25202%2520Maccabees.html'
source_title="Commentary on 2 Maccabees"
