[[commentary]]
quote='''
Therefore, wisdom displays its virtue through a vessel suited to itself; first, it makes its own preacher humbly recount the origin of human condition, so that everyone may know what they possess from the origin of the flesh and what from divine gift. For when he says that he was formed in blood and the seed of man during a period of ten months, and by the agreeable pleasure of sleep, he demonstrates the difference of the two sexes. For, as the natural philosophers say, the seed of man is white, and the seed of woman is bloody. Their mixture, within certain periods of time, causes the body of the infant to be formed, until it becomes animated and reaches the time of birth in the tenth month, although not all reach the tenth month, since some are born in the seventh, others in the eighth, others in the ninth; but they assert that the birth which occurs in the tenth month is more perfect, more vital, and healthier than that which occurs in the eighth or ninth month. For this, he says, is the beginning of birth common to all men, both noble and immoral, and he shows that there is one entrance for all into life and a similar exit for all: because every earthly man, sprung from the seed of man and woman, receives the beginning of temporal life, and passes from this world through the death of the body. However, the heavenly Adam, who was born without male seed from a virgin mother, has his own manner of birth, and he also arranged the manner of his death by his sovereign power. Nevertheless, the seriousness of his birth is celebrated by Christians in the tenth month after his conception, when from the eighth day before the Kalends of April, when he is believed to have been conceived, to the eighth day before the Kalends of January, when he is said to have been born, two hundred and seventy-six days are counted, which number of days joins nine months and six days, and therefore that evangelical saying, by which the same Savior foretold to the Jews that the temple of his body, built in forty-six years, would be destroyed, shows the perfection of his incarnation by the multiplication of the number six: because two hundred and seventy-six contains forty-six sixes. From this it is clearly evident that just as he is perfect God, so also is Jesus Christ our Lord perfect man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
