[[commentary]]
quote='''
Love righteousness, you who judge the earth. Divine wisdom admonishes the rulers of God's people, to whom the power of judging has been given, that they should love righteousness and preserve equity in judgment. Otherwise, this statement may generally pertain to all who are endowed with reason and have an understanding mind, so that, judging the earth, that is, their own flesh, they may love righteousness; namely, that they do not make provision for the flesh in its lusts, but, subjecting it to the command of the spirit, devote themselves especially to the virtues by which the soul is nourished; then let them care for their body according to necessity, and not according to pleasure, always recalling that saying of the law: For man does not live by bread alone, but by every word that proceeds from the mouth of God (Matt. 4:4). think about the Lord with goodness, and seek him with simplicity of heart. But he thinks about the Lord with goodness who reads and understands Sacred Scripture according to piety, and he seeks Him in simplicity of heart who humbly submits himself to His will, namely to keep His commandments. For he who devoutly seeks the Lord honors Sacred Scripture, and does not criticize what he does not yet understand, and therefore does not resist: this is to be meek, of whom in the Gospel Truth itself says: Blessed are the meek, for they shall possess the earth (Matt. 5:5). Therefore, philosophers of the world and their heretical followers are excluded, who think that by human reason they can grasp divine secrets, since it is written: Who shall investigate the wisdom of God that precedes all things? (Rom. 1:33) And the Apostle clearly says: The judgments of God are incomprehensible, and His ways unsearchable; He is to be worshipped in this present life with right faith, rather than with reckless conflict.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
