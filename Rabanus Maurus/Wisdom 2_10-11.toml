[[commentary]]
quote='''
Although these things may generally pertain to those who, despising God, spare neither sex nor age, but through injustice and greed wish to oppress all, nevertheless, in a deeper sense, they can be applied to the treacherous persecutors of Christians and to heretics, who burden the poor people of the Church with their wickedness and persecutions, and that widow of whom it is written: "Blessing, I will bless his widow, I will satisfy his poor with bread," (Ps. 132:15) they intend to crush with the worst will, and strive to find fault with the prophets and apostles, whom he here calls elders, in their words; by no means do they endeavor to keep the statutes of the divine law, but strive to proceed in the unorthodoxies of their own error, nor do they themselves obey our Head, but presume to utter such words of wickedness against Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on Wisdom, PL 109"
