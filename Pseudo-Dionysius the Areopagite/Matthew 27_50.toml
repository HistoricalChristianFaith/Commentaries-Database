[[commentary]]
quote='''
Say to him, however, "What do you affirm concerning the eclipse, which took place at the time of the saving Cross?" For both of us at that time, at Heliopolis, being present, and standing together, saw the moon approaching the sun, to our surprise (for it was not appointed time for conjunction); and again, from the ninth hour to the evening, supernaturally placed back again into a line opposite the sun. And remind him also of something further. For he knows that we saw, to our surprise, the contact itself beginning from the east, and going towards the edge of the sun's disc, then receding back, and again, both the contact and the re-clearing, not taking place from the same point, but from that diametrically opposite. So great are the supernatural things of that appointed time, and possible to Christ alone, the Cause of all, Who worketh great things and marvellous, of which there is not number.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Pseudo-Dionysius%2520the%2520Areopagite%2FWorks%2FThe%2520Letters.html'
source_title="The Letters, Letter VII"
