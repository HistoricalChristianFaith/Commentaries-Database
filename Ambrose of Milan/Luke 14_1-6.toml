[[commentary]]
quote='''
First, Christ cures the man with dropsy. The abundant flow of the flesh had oppressed the functions of his soul and had quenched the glow of his spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Exposition of the Gospel of Luke"
