[[commentary]]
quote='''
How blessed is he who can extirpate avarice, the root of all evil! he truly need not fear this balance. For avarice is wont to deaden man's senses, and pervert his judgement, so that he counts godliness a source of gain, and money the reward of prudence. But great is the reward of piety, and the gain of sobriety to have enough for use. For what do superfluous riches profit in this world, when you find in them neither a succour in birth nor a defence against death? For without a covering are we born into the world, without provision we depart hence, and in the grave we have no inheritance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FLetters%2FLetters%25201-10.html'
source_title="Letter 2.15"


[[commentary]]
quote='''
Therefore the man of good counsel says, "I have learned in whatever state I am to be content." For he knew that the root of all evils is the love of money. Therefore he was content with what he had, without seeking for what was another's. Sufficient for me, he says, is what I have. Whether I have little or much, to me it is much.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FON%2520THE%2520DUTIES%2520OF%2520THE%2520CLERGY%2FBook%25202.html'
source_title="On the Duties of the Clergy 2.17.89"
