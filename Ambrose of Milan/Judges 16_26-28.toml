[[commentary]]
quote='''
Desirous therefore either of consoling himself by avenging so great an indignity, or of forestalling it for the future by death, he pretended that from the weakness of his limbs and the weight of his fetters he could not support himself, and desired the boy who guided his steps to bring him to the nearest pillars by which the whole house was supported. Being brought near, he grasped with both hands the props of the building, and while the Philistines were intent on the sacrificial feast which they were offering to Dagon their god, by whose help they deemed their adversary had been delivered into their power, reckoning a woman's perfidy as a gift from above, he called unto the Lord, and said, "O Lord God, remember me I pray Thee this once, that I may be avenged of the heathen for my two eyes, and that they give not glory to their gods as if by their help they had gotten me into their power. Let me die with the Philistines, that they may find my weakness to have been no less fatal to them than my strength."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FLetters%2FLetters%252011-20.html'
source_title="Letter 19"
