[[commentary]]
quote='''
But the unjust will perish together; the remnants of the wicked will be destroyed. The remnants of the righteous are virtues; the remnants of the wicked are wickedness and the sin of treachery. They will be wiped away, so that they will not exist.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentaries%2520on%2520the%2520Twelve%2520Davidic%2520Psalms.html'
source_title="Commentaries on the Twelve Davidic Psalms"
