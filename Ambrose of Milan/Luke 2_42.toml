[[commentary]]
quote='''
Or the twelfth year was the commencement of our Lord's disputation with the doctors, for this was the number of the Evangelists necessary to preach the faith.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
In the twelfth year, as we read, the beginning of the Lord's discussion is taken; for here the number of evangelizers who were to preach the faith was owed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title='EXPOSITION OF THE GOSPEL OF LUKE 2.63'
