[[commentary]]
quote='''
But the luxurious say: Let us fill ourselves with costly wine and perfumes. For they anoint themselves with perfumes, who seek the pleasure of bodily fragrance. Yet those perfumes are accustomed to stir up the allure of lust. There is a different perfume of sobriety, about which the Church says to her spouse: Your name is poured out like perfume (Songs 1:2); and another oil by which the limbs and certain members of the soul are made fat. Therefore, David also says: You have made my head fat with perfume (Ps. 22:5). And this is the oil of gladness, with which Christ was anointed by God the Father, so that He might stand out above all His companions. This He commands to anoint our head, so that all insincere sadness may be covered with the oil of gladness; lest you appear to sell your fasting to men, lest you seem to grieve over the salvation of your soul. For no one who is sad is crowned, no one who is sorrowful triumphs. Therefore anoint your head, where the senses of the wise are; for the eyes of the wise are in his head. You are called to mysteries, and you do not know: you learn, when you come. And remember this: Like ointment on the head, which descends upon the beard of Aaron (Ps. 132:2), then you know what it means: Anoint your head; how you have pleased God, so that He might reveal His mysteries to you, and grant you spiritual grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="On Elijah and Fasting, PL 14.10.36"
