[[commentary]]
quote='''
On the next day the Levite arose at daybreak but was detained by his father-in-law, that he might not so quickly lose the pleasure of his company. Again on the next and the third day the maiden's father did not allow his son-in-law to start [his journey], until their joy and mutual regard was complete. But on the seventh day, when it was already drawing to a close, after a pleasant meal, having urged the approach of the coming night, so as to make him think he ought to sleep among friends rather than strangers, he was unable to keep him, and so let him go together with his daughter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FON%2520THE%2520DUTIES%2520OF%2520THE%2520CLERGY%2FBook%25203.html'
source_title="On the Duties of the Clergy 3.19.111-12"


[[commentary]]
quote='''
Although the man wanted to depart, he kept him a fourth day, offering him excuses of civility, devising delays. In his desire to add a fifth day as well, he found new reasons for delaying them, while the husband, unwilling to thwart the father's affection of its desire to keep his daughter, though he was at last promised an opportunity for setting forth, postponed it to midday so that they would start out well fortified with food. Even after dinner, the father wished to find some delay, saying that evening was now approaching. At last he acquiesced, though reluctantly, to the entreaties of his son-in-law.
'''
source_url=''
source_title="LETTER 33"
