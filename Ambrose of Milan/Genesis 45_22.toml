[[commentary]]
quote='''
Therefore, Paul excels, and his portion is abundant: but nevertheless, other preachers have their grace. They receive two tunics. Which ones? Surely, those about which you should not doubt, because you have read the saying from Wisdom: She has made for her husband two garments. One is mystical, the other moral. But not all apostles, not all prophets, not all pastors, not all virtues, not all have the grace of healings, not all speak in tongues. Where the merits are different, the rewards are different.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FOn%2520Joseph%2520the%2520Patriarch.html'
source_title="On Joseph the Patriarch"


[[commentary]]
quote='''
To whom two stoles are given. And he cites Paul, when he sets forth his statements, to whom three hundred gold coins, and five multicolored robes are given by Christ. He who proclaims the cross of Christ possesses three hundred gold coins. Therefore, he says: For I determined not to know anything among you except Jesus Christ, and Him crucified. And he rightly receives the gold coins, because he preached not in persuasive words of human wisdom, but in the demonstration of the Spirit. However, he receives the five robes, either the diverse disciplines of wisdom, or because he was not captured by the allurements of bodily senses, where others may find danger, he held victory; he conquered all pleasures of the flesh by singular self-restraint and virtue, his intellect and study not dulled by any weakness of the body, to the point that even though he is in the body, he does not know that he has a body. Finally, caught up in paradise, whether in the body or outside the body, not knowing, he heard unspeakable words, which it is not allowed to speak to a human being: in the end, he smelled nothing earthly on earth, as he himself teaches, saying: For we are the good fragrance of Christ to God among those who are being saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FOn%2520Joseph%2520the%2520Patriarch.html'
source_title="On Joseph the Patriarch"
