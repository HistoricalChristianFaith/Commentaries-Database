[[commentary]]
quote='''
But what is he who is at once the Most High and man, what but "the Mediator between God and man, the man Christ Jesus who gave himself as a ransom for us"? This text indeed refers properly to his incarnation, for our redemption was made by his blood, our pardon comes through his power, our life is secured through his grace. He gives as the Most High; he prays as man. The one is the office of the Creator; the other of a redeemer. Be the gifts as distinct as they may, yet the Giver is one, for it was fitting that our Maker should be our Redeemer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FExposition%2520of%2520the%2520Christian%2520Faith%2FBook%25203.html'
source_title="Exposition of the Christian Faith 3.2.8"


[[commentary]]
quote='''
Nor has the Apollinarian venom any cause for complaining because it is thus written, "And being found in fashion as a man," for Jesus is not hereby denied to be man, for in another place Paul himself calls Him, "The Mediator between God and man, the man Christ Jesus," but rather His manhood is established. For it is the custom and manner of Scripture so to express itself, and we read also in the Gospel, "And we beheld His glory, the glory as of the Only-begotten of the Father." In the same way therefore that He is called as the only-begotten, yet it is not denied that He is truly the only-begotten Son of God, so He is said to be as man, yet it is not denied that the perfection of manhood existed in Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FLetters%2FLetters%252041-50.html'
source_title="Letter 46.8"
