[[commentary]]
quote='''
People are the authors of their own tribulation. If someone did not live like a swine, the devil would never have received power over him. If he did receive power, it would be power not to destroy but to test him. After the Lord’s coming, the devil could already not corrupt the good, so perhaps he now does not seek the destruction of all people but only of the fickle. A mugger does not lie in wait for armed men but for the defenseless. He who understands that the strong will despise him or the powerful destroy him troubles only the weak with wrongs. Someone says, “Why does God permit this to the devil?” I say, “So that good people may be tested and the wicked punished, for this is the punishment of sin.” This is also according to the law, because the Lord sends fever, trembling, evil spirits, blindness, and all scourges according to the punishment of sinners.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Commentary on Luke"


[[commentary]]
quote='''
They are carried violently down, for they are reclaimed not by the contemplation of any good deed, but thrust as from a higher place to a lower, along the downward path of iniquity, they perish amidst the waves of this world, shut out from the approach of air. For they who are carried to and fro by the rapid tide of pleasure cannot receive the communication of the Spirit; we see then that man himself is the author of his own misery. For unless a man lived like the swine, the devil would never have received power over him, or received it, not to destroy but to prove him. And perhaps the devil, who after the coming of our Lord can no longer steal away the good, seeks not the destruction of all men, but only the wanton, as the robber lies in wait not for armed men, but the unarmed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
