[[commentary]]
quote='''
It is not without reason that He is arrayed by Herod in a white robe, as bearing a sign of His immaculate Passion, that the Lamb of God without spot would take upon Himself the sins of the world.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
It is not idle that he is dressed in a white robe by Herod, giving clear indications of his passion; for the great God, without spot, with glory, received the sins of the world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="EXPOSITION OF THE GOSPEL OF LUKE 10.103"
