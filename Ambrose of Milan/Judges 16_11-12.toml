[[commentary]]
quote='''
Samson, still firm of purpose, intimated to her that, if he were bound by seven ropes which had never been used, he would fall into the hands of the enemy, but this also was in vain.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FLetters%2FLetters%252011-20.html'
source_title="Letter 19"
