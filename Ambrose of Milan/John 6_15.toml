[[commentary]]
quote='''
If these acts looked like tyranny, that I had arms, but only in the Name of Christ, that I had the power of offering my own body. Why, I said, did he delay to strike, if he thought me a tyrant? That by ancient right imperial power had been given by bishops, never assumed, and it was commonly said that emperors had desired the priesthood, rather than priests the imperial power. That Christ withdrew lest He should be made a king. That we had our own power; for the power of a bishop was his weakness. "When I am weak," says the Apostle, "then I become strong." But let him against whom God has not stirred up an adversary beware lest he make a tyrant for himself. That Maximus did not say that I was the tyrant of Valentinian, he complained that by the intervention of my legation he had been unable to cross over into Italy. And I added that priests had never been tyrants, but had often suffered from them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FLetters%2FEpistle%252020.html'
source_title="Epistle 20 (To Marcellina) 23"
