[[commentary]]
quote='''
When some little progress was made, though night was threatening to come on, and they were close by the town of the Jebusites, on the slave's request that his lord should turn aside there, he refused, because it was not a city of the children of Israel. He meant to get as far as Gibeah, which was inhabited by the people of the tribe of Benjamin. But when they arrived there was no one to receive them with hospitality, except a stranger of advanced age. When he had looked upon them he asked the Levite: Whither goest thou and whence dost thou come? On his answering that he was travelling and was making for Mount Ephraim and that there was no one to take him in, the old man offered him hospitality and prepared a meal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FON%2520THE%2520DUTIES%2520OF%2520THE%2520CLERGY%2FBook%25203.html'
source_title="On the Duties of the Clergy 3.19.113"


[[commentary]]
quote='''
The Gabanites lived there, unfriendly, harsh, unbearable people, who could stand anything but to receive people hospitably. Indeed, it would have been much more suitable had the Levite not sought hospitality in Gaba [Gibeah]. That his treatment be utterly offensive, he found on entering the city that there was no inn. And when he sat on the road imploring the mercy of these strangers, an old man from the fields happened to stumble on him, for evening had compelled him to leave his work in the fields at night. Seeing him, he asked where he was from and where he was going.
'''
source_url=''
source_title="LETTER 33"
