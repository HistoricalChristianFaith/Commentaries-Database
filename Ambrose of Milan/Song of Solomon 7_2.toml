[[commentary]]
quote='''
His navel is described as a round bowl that never lacks mixed wine, because in all knowledge it is rounded, not lacking in spiritual drink. And his belly is not only nourished by a heap of wheat, that is, by more powerful nourishment of the celestial mystery, but also filled with the sweetness of certain lilies of moral virtue. Hence, she herself is crowned with the blood of Christ as a well-deserving queen, as it is written: And the ornament of her head is as purple. The blood of Christ is a purple dye, which stains the souls of the saints, not only with color but also with power; for it makes kings, and better kings to whom it grants eternal kingdom.

Your navel is like a rounded goblet never lacking mixed wine. The navel is the seat of one's soul and the subtle belly of her who ascends to Christ; and therefore it is praised by the voice of the Bridegroom saying: Your navel is like a rounded goblet, never lacking mixed wine; your belly is a heap of wheat encircled with lilies. It is indeed turned in all doctrine, and a spiritual drink never lacking in fullness, and knowledge of heavenly mysteries. The stomach is also a mysterious soul, like a navel, from which the stomach not only takes in strong food by which hearts are strengthened, but also a sweet and flowering one by which they are delighted.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520the%2520Song%2520of%2520Songs.html"
source_title="Commentary on the Song of Songs"

[[commentary]]
quote='''
"Your navel is like a round bowl, not wanting tempered wine. Your belly is like a heap of wheat, set about with lilies. Your neck is like a tower of ivory. Your eyes are a pool in Heshbon." The good navel of the soul, capable of receiving all virtues, is like a bowl, fashioned by the author of faith himself. For in a bowl wisdom has mixed her wine, saying, "Come, eat my bread and drink the wine which I have mingled for you." This navel, therefore, fashioned with all the beauty of the virtues, does not lack mixed wine. His belly also was filled not only with the wheaten food of justice, as it were, but also with that of grace, and it bloomed with sweetness like a lily.
'''
source_url=''
source_title="CONSOLATION ON THE DEATH OF EMPEROR VALENTINIAN 69"
