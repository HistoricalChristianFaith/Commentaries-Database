[[commentary]]
quote='''
Or judgment, because they do not bring to examination every thing that they do; charity, because they love not God with their heart. But that He might not make us zealous of the faith, to the neglect of good works, He sums up the perfection of a good man in a few words, these ought ye to have done, and not to leave the other undone.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
However, he briefly exposes their many sins who devote all their effort to contributing the tithes of cheaper fruits: they have no fear of the future judgment or any love for God, since their works are worthless without faith; for they disregard the judgment and love of God: the judgment, because they do not bring everything they do under judgment; the love, because they do not love God out of devotion.

But so that it does not make us diligent in faith, neglectful of works, he concludes the perfection of a faithful man with a short discourse; so that he may be approved both by faith and works, saying: These things you ought to do, and not leave the others undone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Exposition of the Gospel of Luke, 7.103-104"
