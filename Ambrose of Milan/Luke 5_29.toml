[[commentary]]
quote='''
But he who receives Christ into his inner chamber, is fed with the greatest delights of overflowing pleasures. The Lord therefore willingly enters, and reposes in his affection.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
He also prepared a great feast, because he who receives Christ in the house inside him eats the finest foods—plentiful pleasures. So the Lord enters willingly and reclines in the character of one who has believed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Commentary on Luke"


[[commentary]]
quote='''
People are hungry when Christ is absent and they lack the abundance of good desserts. Truly, one for whom his own virtue suffices for pleasure, who receives Christ in his own home, prepares a great feast. It is a spiritual banquet of good works, at which the rich people go without and the poor one feasts. It says, “The sons of the Bridegroom cannot fast while the Bridegroom is with them.”
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Commentary on Luke"
