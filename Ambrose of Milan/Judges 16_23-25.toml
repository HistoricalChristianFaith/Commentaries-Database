[[commentary]]
quote='''
On the occasion of a great feast Samson is brought out of prison to the assembly of the Philistines, and set in sight of the people. There were nearly three thousand in number, men and women; and they insulted him with bitter reproaches, and carried him about in mockery, a trial harder to be borne than the very reality of captivity by a man conscious of innate power. For to live and die is natural, to be a laughing stock is counted a disgrace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FLetters%2FLetters%252011-20.html'
source_title="Letter 19"
