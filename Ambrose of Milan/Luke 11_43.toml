[[commentary]]
quote='''
He reproves also the arrogance of the boasting Jews in seeking the preeminence: for it follows, Woe unto you, Pharisees, for ye love the uppermost seats in the synagogues, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
He also criticizes the arrogance and boasting of the Jews, as they seek the places of honor at banquets.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Exposition of the Gospel of Luke, 7.105"
