[[commentary]]
quote='''
Therefore began he to be in want and to suffer hunger, because nothing satisfies a prodigal mind. He went away therefore, and attached himself to one of the citizens. For he who is attached, is in a snare. And that citizen seems to be a prince of the world. Lastly, he is sent to his farm which he bought who excused himself from the kingdom. (Luke 14:18.)

But he feeds those swine into whom the devil sought to enter, living in filth and pollution. (Matt. 8, Mark 2, Luke 8.)

But he desired to fill his belly with the husks. For the sensual care for nothing else but to fill their bellies.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
“He went and attached himself to one of the citizens.” Whoever attaches himself is in a snare. That citizen is the prince of this world. He is sent to the farm bought by the man who excused himself from the kingdom. He feeds the swine, those into which the devil sought to enter, those he cast into the sea of the world as they lived in filth and foulness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Exposition of the Gospel of Luke"


[[commentary]]
quote='''
There are those who interpret the swine as being the flocks of demons, the husks as the lack of virtue of worthless people and the boastful words of those who cannot do good. By the empty allure of philosophy and the noisy applause for eloquence, they show ostentation rather than any usefulness. These cannot be lasting pleasures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Exposition of the Gospel of Luke"
