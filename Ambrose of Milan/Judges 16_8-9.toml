[[commentary]]
quote='''
When the Philistines learnt this from Delilah, they bound him while asleep with green withs, and then awoke him as though on a sudden, but found that he had not fallen off from his accustomed fortitude, but bursting its bonds his freed strength was able to resist and drive back a host of assailants.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FLetters%2FLetters%252011-20.html'
source_title="Letter 19"
