[[commentary]]
quote='''
The Lord wishing to save sinners shows Himself to be God, by His knowledge of the secret thoughts; as it follows, But that ye may know.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
