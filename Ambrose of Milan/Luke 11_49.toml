[[commentary]]
quote='''
The wisdom of God is Christ. The words indeed in Matthew are, Behold I send unto you prophets and wise men.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Therefore Wisdom sends apostles and prophets to them. Who is Wisdom if not Christ? Finally, in Matthew you have: Behold, I send you prophets and wise men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Exposition of the Gospel of Luke, 7.107"
