[[commentary]]
quote='''
Not unreasonably do they seek the pardon of a murderer, who were themselves demanding the death of the innocent. Such are the laws of iniquity, that what innocence hates, guilt loves. And here the interpretation of the name affords a figurative resemblance, for Barabbas is in Latin, the son of a father. Those then to whom it is said, Ye are of your father the Devil, are represented as about to prefer to the true Son of God the son of their father, that is, Antichrist.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
But what about those who crucified the Lord of majesty? It is not without reason that murderers seek absolution, as they sought the destruction of the innocent. Such unjust laws have the quality of hating innocence and loving crime. However, in the interpretation of the name, it gives the appearance of a figure; for Barabbas is translated to mean 'son of the father' in Latin: therefore, those to whom it is said, 'You are of your father the devil,' are shown to prefer the son of their father, Antichrist, over the true Son of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="EXPOSITION OF THE GOSPEL OF LUKE 10.102"
