[[commentary]]
quote='''
After three days He is found in the temple, that it might be for a sign, that after three days of victorious suffering, He who was believed to be dead should rise again, and manifest Himself to our faith, seated in heaven with divine glory.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25202.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
Nor is it unimportant that, mindful of his earthly parents, who were certainly filled with the wisdom and grace of God according to the flesh, he is found in the temple after three days; so that he might provide evidence that after three days of his triumphant passion on the heavenly throne, and with divine honor, he would offer himself as resurrected for our faith, who was believed to be dead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title='EXPOSITION OF THE GOSPEL OF LUKE 2.63'
