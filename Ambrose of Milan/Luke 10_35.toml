[[commentary]]
quote='''
“The next day,” what is this next day, if not that day of the Lord’s resurrection, of which it was said, “This is the day which the Lord has made”? “He took out two coins, and gave them to the host, and said, ‘Take care of him.’ ”
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Commentary on Luke"


[[commentary]]
quote='''
What are those two coins, unless perhaps the two Testaments that contain revealed within them the image of the eternal King, at the price of whose wounds we are healed? Precious blood redeemed us, that we may avoid the sores of final death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Commentary on Luke"


[[commentary]]
quote='''
Blessed is that innkeeper who can care for another’s wounds. Blessed is he to whom Jesus says, “Whatever you shall spend over and above, I will repay you.” A good steward is one who also spends over and above. Paul is a good steward, whose sermons and epistles overflow with the knowledge that he received. He followed the moderate command of the Lord with almost immoderate effort of mind and body, so that he raised many from deep sorrow by the stewardship of spiritual exhortation. He was a good keeper of his inn, in which the ass knows his master’s crib and the flocks of lambs are enclosed. He feared that the way would be easy for ravening wolves howling outside the corrals to attack the sheepfolds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Commentary on Luke"


[[commentary]]
quote='''
But as the Samaritan had not time to stay longer on the earth, he must needs return to the place whence he descended, as it follows, And on the morrow he took out two pence, &c. (Ps. 118:24.) What is that morrow, but perchance the day of our Lord's resurrection? of which it was said, This is the day the Lord hath made. But the two pence are the two covenants, which bear stamped on them the image of the eternal King, by the price of which our wounds are healed.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
Blessed then is that inn-keeper who is able to cure the wounds of another; blessed is he to whom Jesus says, Whatsoever thou hast spent more, when I come again I will repay thee. But when wilt thou return, O Lord, save on the Judgment day? For though Thou art ever every where, and though standing in the midst of us, art not perceived by us, yet the time will be in which all flesh shall behold Thee coming again. Thou wilt then restore what Thou owest to the blessed, whose debtor Thou art. Would that we were confident debtors, that we could pay what we had received!
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
