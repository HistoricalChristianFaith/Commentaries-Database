[[commentary]]
quote='''
The war remained doubtful with an uncertain issue, but in the third engagement the people of Benjamin were delivered to the people of Israel, and being condemned by the divine judgment [they] paid the penalty for their widely immoral behavior.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FON%2520THE%2520DUTIES%2520OF%2520THE%2520CLERGY%2FBook%25203.html'
source_title="On the Duties of the Clergy 3.19.115-16"


[[commentary]]
quote='''
Begging the Lord's peace, they returned more boldly to war, and they to whom prayer had given courage and who had entertained much hope were now able to do what they planned. On a pretext of withdrawing their front lines, setting ambushes at night in the rear of the city, where a segment of the enemy was located, they followed as some retired and thus were provided with an opportunity for invading the unprotected city. Fires were quickly set and flared up while raging flames and waves of heat revealed the sight of the taken city.
'''
source_url=''
source_title="LETTER 33"
