[[commentary]]
quote='''
Not because the Lord is two, but one. For although there are who serve mammon, yet he knoweth no rights of lordship; but has himself placed upon himself a yoke of servitude. There is one Lord, because there is one God. Hence it is evident, that the power of the Father and the Son is one: and He assigns a reason, thus saying, For either he will hate the one, and love the other; or else he will hold to the one, and despise the other.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
“No servant can serve two masters,” not because there are two, but the Lord is One. Although there are those who serve mammon, he still does not possess any rights to sovereignty, but they impose on themselves the chains of slavery. Power is not just, but slavery is unjust.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Exposition of the Gospel of Luke"
