[[commentary]]
quote='''
Indeed, we are often deceived by sight, and we see things for the most part other than they really are. We are deceived by hearing too. And so, if we do not wish to be deceived, let us contemplate not what is seen but what is unseen…. On this account the apostle also cries out: "Do not touch, nor taste, nor handle, things which must all perish"; for things which are for the body's indulgence are also for its corruption.
'''


[[commentary]]
quote='''
With the knowledge of what Paul had seen and heard in paradise, he cried out saying: "Why, as if still viewing the world do you lay down rules: 'Do not touch; nor handle; nor taste!'—things which must all perish in their very use!" He wished us to be in the world in figure, not in actual possession and use of it. We are to use the world as if we did not use it, as if we were but passing through, not residing in it, walking through as in a dream, not with desire, so that with the speed of thought we might pass through the shadow of this world.
'''


[[commentary]]
quote='''
But they even fear lest their former fasting should be reckoned against them. Let them choose whichever they like: if they ever fasted, let them repent of their good work, if never, let them confess their own intemperance and luxury. And so they assert that Paul was a teacher of excess. But who can be a teacher of temperance if he was a teacher of excess, who chastised his body and brought it into subjection, and recorded his performance of the service he owed to Christ by many fastings; and this not for the purpose of praising himself and his doings, but that he might teach us, what example to follow. Did he then teach excess who said, "Why, as though living in the world, are ye subject to ordinances? Touch not, taste not, handle not, which all are to perish with the using;" who also says, "Not in indulgence of the body, not in any honour to the satisfying and love of the flesh, not in the lusts of error; but in the Spirit by Whom we are renewed."

If what the Apostle has said is not enough, let them hear the Prophet saying, "I chastened myself with fasting." He therefore who fasts not is uncovered and naked and exposed to wounds. And if Adam had clothed himself with fasting he would not have been found to be naked. Nineveh delivered itself from death by fasting. And the Lord Himself says, "This kind goeth not out but by prayer and fasting."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FLetters%2FLetters%252041-50.html"
source_title="Letter 42"
