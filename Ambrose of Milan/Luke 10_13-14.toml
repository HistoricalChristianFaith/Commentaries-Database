[[commentary]]
quote='''
He also teaches that those who judged that the gospel should not be followed should be subjected to a harsher punishment than those who thought that the law should be dissolved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FCommentary%2520on%2520Luke.html'
source_title="Commentary on Luke"


[[commentary]]
quote='''
Our Lord warns us that they will meet with a heavier punishment who have refused to follow the Gospel than those who have chosen to break the law; saying, Woe unto thee, Chorazin! woe unto thee, Bethsaida!
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
