[[commentary]]
quote='''
The Philistines having discoverd through her means the man's weakness, bring her the reward of her perfidy, thus binding her to the commission of the crime.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ambrose%2520of%2520Milan%2FLetters%2FLetters%252011-20.html'
source_title="Letter 19"
