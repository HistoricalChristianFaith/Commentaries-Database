[[commentary]]
quote='''
Worst of all in "The Lord is my shepherd" (Ps. 23), after the green pasture, the waters of comfort, the sure confidence in the valley of the shadow, we suddenly run across (5) "Thou shalt prepare a table for me against them that trouble me"—or, as Dr Moffatt translates it, "Thou art my host, spreading a feast for me while my enemies have to look on." The poet's enjoyment of his present prosperity would not be complete unless those horrid Joneses (who used to look down their noses at him) were watching it all and hating it. This may not be so diabolical as the passages I have quoted above; but the pettiness and vulgarity of it, especially in such surroundings, are hard to endure.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 3: The Cursings'
