[[commentary]]
quote='''
All the others, we admit, have to be bridled. Absolute obedience to your instinct for self-preservation is what we call cowardice; to your acquisitive impulse, avarice. Even sleep must be resisted if you're a sentry. But every unkindness and breach of faith seems to be condoned provided that the object aimed at is "four bare legs in a bed".

It is like having a morality in which stealing fruit is considered wrong — unless you steal nectarines.
'''
source_url=''
source_title='We Have No Right to Happiness, from God in the Dock'
