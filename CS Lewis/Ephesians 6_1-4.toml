[[commentary]]
quote='''
I do not believe that God created an egalitarian world. I believe the authority of parent over child, husband over wife, learned over simple, to have been as much a part of the original plan as the authority of man over beast. I believe that if we had not fallen Filmer would be right, and patriarchal monarchy would be the sole lawful government. But since we have learned sin, we have found, as Lord Acton says, that "all power corrupts, and absolute power corrupts absolutely". The only remedy has been to take away the powers and substitute a legal fiction of equality. The authority of Father and Husband has been rightly abolished on the legal plane, not because this authority is in itself bad (on the contrary, it is, I hold, divine in origin) but because Fathers and Husbands are bad.
'''
source_url=''
source_title='The Weight of Glory, Membership'

[[commentary]]
quote='''
We hear a great deal about the rudeness of the rising generation. I am an oldster myself and might be expected to take the oldsters' side, but in fact I have been far more impressed by the bad manners of parents to children than by those of children to parents. Who has not been the embarrassed guest at family meals where the father or mother treated their grown-up offspring with an incivility which, offered to any other young people, would simply have terminated the acquaintance? Dogmatic assertions on matters which the children understand and their elders don't, ruthless interruptions, flat contradictions, ridicule of things the young take seriously—sometimes of their religion—insulting references to their friends, all provide an easy answer to the question "Why are they always out? Why do they like every house better than their home?" Who does not prefer civility to barbarism?
'''
source_url=''
source_title='The Four Loves, Chapter 3: Affection'
