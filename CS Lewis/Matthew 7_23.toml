[[commentary]]
quote='''
St. Paul promises to those who love God not, as we should expect, that they will know Him, but that they will be known by Him (1 Cor. viii. 3). It is a strange promise. Does not God know all things at all times? But it is dreadfully re-echoed in another passage of the New Testament. There we are warned that it may happen to any one of us to appear at last before the face of God and hear only the appalling words: "I never knew you. Depart from Me." In some sense, as dark to the intellect as it is unendurable to the feelings, we can be both banished from the presence of Him who is present everywhere and erased from the knowledge of Him who knows all. We can be left utterly and absolutely _outside_—repelled, exiled, estranged, finally and unspeakably ignored. On the other hand, we can be called in, welcomed, received, acknowledged. We walk every day on the razor edge between these two incredible possibilities.
'''
source_url=''
source_title='The Weight of Glory'

[[commentary]]
quote='''
Here it will be enough to say that the Heavenly Society is also an earthly society. Our (merely natural) patriotism towards the latter can very easily borrow the transcendent claims of the former and use them to justify the most abominable actions.... Large areas of "the World" will not hear us till we have publicly disowned much of our past. Why should they? We have shouted the name of Christ and enacted the service of Moloch.
'''
source_url=''
source_title='The Four Loves, Chapter 2: Likings and Loves for the Sub-human'

[[commentary]]
quote='''
How is it that people who are quite obviously eaten up with Pride can say they believe in God and appear to themselves very religious? I am afraid it means they are worshipping an imaginary God. They theoretically admit themselves to be nothing in the presence of this phantom God, but are really all the time imagining how He approves of them and thinks them far better than ordinary people: that is, they pay a pennyworth of imaginary humility to Him and get out of it a pound's worth of Pride towards their fellow-men. I suppose it was of those people Christ was thinking when He said that some would preach about Him and cast out devils in His name, only to be told at the end of the world that He had never known them. And any of us may at any moment be in this death-trap. Luckily, we have a test. Whenever we find that our religious life is making us feel that we are good—above all, that we are better than someone else—I think we may be sure that we are being acted on, not by God, but by the devil. The real test of being in the presence of God is, that you either forget about yourself altogether or see yourself as a small, dirty object. It is better to forget about yourself altogether.
'''
source_url=''
source_title='Mere Christianity, The Great Sin'
