[[commentary]]
quote='''
Though the raven was an unclean bird to Jews, God "feedeth the young ravens that call upon him" (147:9). The thought which gives these creatures a place in the Psalmist's gusto for Nature is surely obvious. They are our fellow-dependents; we all, lions, storks, ravens, whales—live, as our fathers said, "at God's charges", and the mention of all equally redounds to His praise. The Jewish feeling is vivid, fresh, and impartial—an appreciation of, almost a sympathy with, creatures useless or hurtful or wholly irrelevant to man, reached through the idea of God as Creator and sustainer of all.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 8: Nature'
