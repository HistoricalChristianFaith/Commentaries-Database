[[commentary]]
quote='''
The human spirit will not even begin to try to surrender self-will as long as all seems to be well with it. Now error and sin both have this property, that the deeper they are the less their victim suspects their existence; they are masked evil. Pain is unmasked, unmistakable evil; every man knows that something is wrong when he is being hurt. The Masochist is no real exception. Sadism and Masochism respectively isolate, and then exaggerate, a "moment" or "aspect" in normal sexual passion. Sadism exaggerates the aspect of capture and domination to a point at which only ill-treatment of the beloved will satisfy the pervert--as though he said, "I am so much master that I even torment you." Masochism exaggerates the complementary and opposite aspect, and says "I am so enthralled that I welcome even pain at your hands". Unless the pain were felt as evil--as an outrage underlining the complete mastery of the other party--it would cease, for the Masochist, to be an erotic stimulus. And pain is not only immediately recognisable evil, but evil impossible to ignore. We can rest contentedly in our sins and in our stupidities; and anyone who has watched gluttons shovelling down the most exquisite foods as if they did not know what they were eating, will admit that we can ignore even pleasure. But pain insists upon being attended to. God whispers to us in our pleasures, speaks in our conscience, but shouts in our pains: it is His megaphone to rouse a deaf world. A bad man, happy, is a man without the least inkling that his actions do not "answer", that they are not in accord with the laws of the universe.
'''
source_url=''
source_title='The Problem of Pain, Ch. 6'
