[[commentary]]
quote='''
By the conversion or sanctification of family life we must be careful to mean something more than the preservation of "love" in the sense of natural affection. Love (in that sense) is not enough. Affection, as distinct from charity, is not a cause of lasting happiness. Left to its natural bent affection becomes in the end greedy, naggingly solicitous, jealous, exacting, timorous. It suffers agony when its object is absent—but is not repaid by any long enjoyment when the object is present. Even at the vicar's lunch table affection was partly the cause of the quarrel. That son would have borne patiently and humorously from any other old man the silliness which enraged him in his father. It is because he still (in some fashion) "cares" that he is impatient. The vicar's wife would not be quite that endless whimper of self-pity which she now is if she did not (in a sense) "love" the family: the continued disappointment of her continued and ruthless demand for sympathy, for affection, for appreciation has helped to make her what she is. I do not think this aspect of affection is nearly enough noticed by most popular moralists. The greed to be loved is a fearful thing. Some of those who say (and almost with pride) that they live only for love come, at last, to live in incessant resentment.
'''
source_url=''
source_title='The Sermon and the Lunch, from God in the Dock'

[[commentary]]
quote='''
It is a terrible thing that the worst of all the vices can smuggle itself into the very centre of our religious life. But you can see why. The other, and less bad, vices come from the devil working on us through our animal nature. But this does not come through our animal nature at all. It comes direct from Hell. It is purely spiritual: consequently it is far more subtle and deadly. For the same reason, Pride can often be used to beat down the simpler vices. Teachers, in fact, often appeal to a boy's Pride, or, as they call it, his self-respect, to make him behave decently: many a man has overcome cowardice, or lust, or ill-temper, by learning to think that they are beneath his dignity—that is, by Pride. The devil laughs. He is perfectly content to see you becoming chaste and brave and self-controlled provided, all the time, he is setting up in you the Dictatorship of Pride—just as he would be quite content to see your chilblains cured if he was allowed, in return, to give you cancer. For Pride is spiritual cancer: it eats up the very possibility of love, or contentment, or even common sense.
'''
source_url=''
source_title='Mere Christianity, The Great Sin'

[[commentary]]
quote='''
First, as to the meaning of the word. 'Charity' now means simply what used to be called 'alms'—that is, giving to the poor. Originally it had a much wider meaning. (You can see how it got the modern sense. If a man has 'charity', giving to the poor is one of the most obvious things he does, and so people came to talk as if that were the whole of charity. In the same way, 'rhyme' is the most obvious thing about poetry, and so people come to mean by 'poetry' simply rhyme and nothing more.) Charity means 'Love, in the Christian sense'. But love, in the Christian sense, does not mean an emotion. It is a state not of the feelings but of the will; that state of the will which we have naturally about ourselves, and must learn to have about other people.
'''
source_url=''
source_title='Mere Christianity, Book 3 Chapter 9: Charity'
