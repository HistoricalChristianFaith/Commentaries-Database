[[commentary]]
quote='''
At the end, I know, we are told that an angel appeared "comforting" him. But neither _comforting_ in Sixteenth Century English nor ἐνισχύων in Greek means "consoling". "Strengthening" is more the word. May not the strengthening have consisted in the renewed certainty—cold comfort this—that the thing must be endured and therefore could be?
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 8'
