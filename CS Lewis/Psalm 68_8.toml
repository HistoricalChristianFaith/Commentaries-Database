[[commentary]]
quote='''
The assignment of Psalm 68 to Whitsunday has some obvious reasons, even at a first reading. Verse 8, 'The earth shook and the heavens dropped at the presence of God, even as Sinai also was moved,' was, no doubt, for the original writer a reference to the miracles mentioned in Exodus, and thus foreshadows that very different descent of God which came with the tongues of fire.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
