[[commentary]]
quote='''
And in there, in beyond Nature, we shall eat of the tree of life. At present, if we are reborn in Christ, the spirit in us lives directly on God; but the mind, and still more the body, receives life from Him at a thousand removes—through our ancestors, through our food, through the elements. The faint, far-off results of those energies which God's creative rapture implanted in matter when He made the worlds are what we now call physical pleasures; and even thus filtered, they are too much for our present management. What would it be to taste at the fountain-head that stream of which even these lower reaches prove so intoxicating? Yet that, I believe, is what lies before us. The whole man is to drink joy from the fountain of joy. As St. Augustine said, the rapture of the saved soul will "flow over" into the glorified body.
'''
source_url=''
source_title='The Weight of Glory'
