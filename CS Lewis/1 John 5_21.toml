[[commentary]]
quote='''
But then a love like Mrs. Fidget's contains a good deal of hatred. It was of erotic love that the Roman poet said, "I love and hate," but other kinds of love admit the same mixture. They carry in them the seeds of hatred. If Affection is made the absolute sovereign of a human life the seeds will germinate. Love, having become a god, becomes a demon.
'''
source_url=''
source_title='The Four Loves, Chapter 3: Affection'
