[[commentary]]
quote='''
For instance, He went about saying to people, "I forgive your sins." Now it is quite natural for a man to forgive something you do to him. Thus if somebody cheats me out of £5 it is quite possible and reasonable for me to say, "Well, I forgive him, we will say no more about it." What on earth would you say if somebody had done you out of £5 and I said, "That is all right, I forgive him"?
'''
source_url=''
source_title='What Are We to Make of Jesus Christ?, from God in the Dock'

[[commentary]]
quote='''
I could never see how one escaped the dilemma aut deus aut malus homo by confining oneself to the Synoptics. Moderns do not seem startled, as contemporaries were, by the claim Jesus there makes to forgive sins; not sins against Himself, just sins. Yet surely, if they actually met it, they would feel differently. If Dr Pittenger told me that two of his colleagues had lost him a professorship by telling lies about his character and I replied, "I freely forgive them both", would he not think this an impertinence (both in the old and in the modern sense) bordering on insanity?
'''
source_url=''
source_title='Rejoinder to Dr Pittenger, from God in the Dock'

[[commentary]]
quote='''
One part of the claim tends to slip past us unnoticed because we have heard it so often that we no longer see what it amounts to. I mean the claim to forgive sins: any sins. Now unless the speaker is God, this is really so preposterous as to be comic. We can all understand how a man forgives offences against himself. You tread on my toes and I forgive you, you steal my money and I forgive you. But what should we make of a man, himself unrobbed and untrodden on, who announced that he forgave you for treading on other men's toes and stealing other men's money? Asinine fatuity is the kindest description we should give of his conduct. Yet this is what Jesus did. He told people that their sins were forgiven, and never waited to consult all the other people whom their sins had undoubtedly injured. He unhesitatingly behaved as if He was the party chiefly concerned, the person chiefly offended in all offences. This makes sense only if He really was the God whose laws are broken and whose love is wounded in every sin. In the mouth of any speaker who is not God, these words would imply what I can only regard as a silliness and conceit unrivalled by any other character in history.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 3: The Shocking Alternative'
