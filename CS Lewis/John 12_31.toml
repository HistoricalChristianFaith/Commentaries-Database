[[commentary]]
quote='''
There was, perhaps, no necessity for such an excess of the sexual impulse: the Lord of this world thought of it as a response to carnivorousness--a double scheme for securing the maximum amount of torture. If it offends less, you may say that the "life-force" is corrupted, where I say that living creatures were corrupted by an evil angelic being. We mean the same thing: but I find it easier to believe in a myth of gods and demons than in one of hypostatised abstract nouns. And after all, our mythology may be much nearer to literal truth than we suppose. Let us not forget that Our Lord, on one occasion, attributes human disease not to God's wrath, nor to nature, but quite explicitly to Satan.
'''
source_url=''
source_title='The Problem of Pain, Chapter 9: Animal Pain'

[[commentary]]
quote='''
Christians, then, believe that an evil power has made himself for the present the Prince of this World. And, of course, that raises problems. Is this state of affairs in accordance with God's will, or not? If it is, He is a strange God, you will say: and if it is not, how can anything happen contrary to the will of a being with absolute power?

But anyone who has been in authority knows how a thing can be in accordance with your will in one way and not in another. It may be quite sensible for a mother to say to the children, 'I'm not going to go and make you tidy the school-room every night. You've got to learn to keep it tidy on your own.' Then she goes up one night and finds the Teddy bear and the ink and the French Grammar all lying in the grate. That is against her will. She would prefer the children to be tidy. But on the other hand, it is her will which has left the children free to be untidy. The same thing arises in any regiment, or trade union, or school. You make a thing voluntary and then half the people do not do it. That is not what you willed, but your will has made it possible.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 3: The Shocking Alternative'
