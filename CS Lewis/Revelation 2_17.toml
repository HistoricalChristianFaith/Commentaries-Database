[[commentary]]
quote='''
"To him that overcometh I will give a white stone, and in the stone a new name written, which no man knoweth saving he that receiveth it". What can be more a man's own than this new name which even in eternity remains a secret between God and him? And what shall we take this secrecy to mean? Surely, that each of the redeemed shall forever know and praise some one aspect of the divine beauty better than any other creature can. Why else were individuals created, but that God, loving all infinitely, should love each differently? And this difference, so far from impairing, floods with meaning the love of all blessed creatures for one another, the communion of the saints. If all experienced God in the same way and returned Him an identical worship, the song of the Church triumphant would have no symphony, it would be like an orchestra in which all the instruments played the same note.
'''
source_url=''
source_title='The Problem of Pain, Ch. 10'
