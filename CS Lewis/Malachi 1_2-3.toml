[[commentary]]
quote='''
Consider again, "I loved Jacob and I _hated_ Esau". How is the thing called God's "hatred" of Esau displayed in the actual story? Not at all as we might expect. There is of course no ground for assuming that Esau made a bad end and was a lost soul; the Old Testament, here as elsewhere, has nothing to say about such matters. And, from all we are told, Esau's earthly life was, in every ordinary sense, a good deal more blessed than Jacob's. It is Jacob who has all the disappointments, humiliations, terrors, and bereavements. But he has something which Esau has not. He is a patriarch. He hands on the Hebraic tradition, transmits the vocation and the blessing, becomes an ancestor of Our Lord. The "loving" of Jacob seems to mean the acceptance of Jacob for a high (and painful) vocation; the "hating" of Esau, his rejection. He is "turned down", fails to "make the grade", is found useless for the purpose.
'''
source_url=''
source_title='The Four Loves, Chapter 6: Charity'
