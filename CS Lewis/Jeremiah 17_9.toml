[[commentary]]
quote='''
What assurance have we that our masters will or can keep the promise which induced us to sell ourselves? Let us not be deceived by phrases about 'Man taking charge of his own destiny'. All that can really happen is that some men will take charge of the destiny of the others. They will be simply men; none perfect; some greedy, cruel and dishonest. The more completely we are planned the more powerful they will be. Have we discovered some new reason why, this time, power should not corrupt as it has done before?
'''
source_url=''
source_title='Is Progress Possible? Willing Slaves of the Welfare State, from God in the Dock'

[[commentary]]
quote='''
It had turned from God and become its own idol, so that though it could still turn back to God, it could do so only by painful effort, and its inclination was self-ward. Hence pride and ambition, the desire to be lovely in its own eyes and to depress and humiliate all rivals, envy, and restless search for more, and still more, security, were now the attitudes that came easiest to it. It was not only a weak king over its own nature, but a bad one: it sent down into the psycho-physical organism desires far worse than the organism sent up in to it.
'''
source_url=''
source_title='The Problem of Pain, Chapter 5: The Fall of Man'

[[commentary]]
quote='''
In an instant of time--while your friend hesitates for a word--what things pass through your mind? We have never told the whole truth. We may confess ugly facts--the meanest cowardice or the shabbiest and most prosaic impurity--but the tone is false. The very act of confessing--an infinitesimally hypocritical glance--a dash of humour--all this contrives to dissociate the facts from your very self. No one could guess how familiar and, in a sense, congenial to your soul these things were, how much of a piece with all the rest: down there, in the dreaming inner warmth, they struck no such discordant note, were not nearly so odd and detachable from the rest of you, as they seem when they are turned into words. We imply, and often believe, that habitual vices are exceptional single acts, and make the opposite mistake about our virtues--like the bad tennis player who calls his normal form his "bad days" and mistakes his rare successes for his normal. I do not think it is our fault that we cannot tell the real truth about ourselves; the persistent, life-long, inner murmur of spite, jealousy, prurience, greed and self-complacence, simply will not go into words. But the important thing is that we should not mistake our inevitably limited utterances for a full account of the worst that is inside.
'''
source_url=''
source_title='The Problem of Pain, Chapter 4: Human Wickedness'
