[[commentary]]
quote='''
Where ancient Gentile literature (in some measure) anticipates the nature poetry of the Jews, it has also (in some measure) anticipated their theology. The one ancient Gentile poem which provides a fairly close parallel to Psalm 104 is an Egyptian Hymn to the Sun dating from the fourteenth century B.C., authored by the Pharaoh Akhenaten, who broke away from the Polytheism of his fathers and tried to establish the worship of a single God. His Monotheism appears to have been of an extremely pure and conceptual kind: he did not even identify God with the Sun—the visible disc was only His manifestation.

The Hymn to the Sun is magnificently like Psalm 139 (13–16) when it praises God for making the embryo grow in the mother's body, so that He is "our nurse even in the womb": or for teaching the chick to break the egg-shell and come forth "chirping as loud as he can". A certain kind of nature-poetry seems to go with a certain kind of theology—and where Akhenaten anticipates the Psalmist in seeing God as the maker who knits us in the womb, it is precisely because his religion, too, had grasped (in its own way) that God stands above and outside Nature as her Creator.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 8: Nature'
