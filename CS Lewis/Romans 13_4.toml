[[commentary]]
quote='''
My contention is that this doctrine, merciful though it appears, really means that each one of us, from the moment he breaks the law, is deprived of the rights of a human being.

The reason is this. The Humanitarian theory removes from Punishment the concept of Desert. But the concept of Desert is the only connecting link between punishment and justice. It is only as deserved or undeserved that a sentence can be just or unjust. I do not here contend that the question 'Is it deserved?' is the only one we can reasonably ask about a punishment. We may very properly ask whether it is likely to deter others and to reform the criminal. But neither of these two last questions is a question about justice. There is no sense in talking about a 'just deterrent' or a 'just cure'. We demand of a deterrent not whether it is just but whether it will deter. We demand of a cure not whether it is just but whether it succeeds. Thus when we cease to consider what the criminal deserves and consider only what will cure him or deter others, we have tacitly removed him from the sphere of justice altogether; instead of a person, a subject of rights, we now have a mere object, a patient, a 'case'.
'''
source_url=''
source_title='THE HUMANITARIAN THEORY OF PUNISHMENT, from God in the Dock'

[[commentary]]
quote='''
According to the classical political theory of this country we surrendered our right of self-protection to the State on condition that the State would protect us. Roughly, you promised not to stab your daughter's murderer on the understanding that the State would catch him and hang him. Of course this was never true as a historical account of the genesis of the State. The power of the group over the individual is by nature unlimited and the individual submits because he has to. The State, under favourable conditions (they have ceased), by defining that power, limits it and gives the individual a little freedom.

But the classical theory morally grounds our obligation to civil obedience; explains why it is right (as well as unavoidable) to pay taxes, why it is wrong (as well as dangerous) to stab your daughter's murderer. At present the very uncomfortable position is this: the State protects us less because it is unwilling to protect us against criminals at home and manifestly grows less and less able to protect us against foreign enemies. At the same time it demands from us more and more. We seldom had fewer rights and liberties nor more burdens: and we get less security in return. While our obligations increase their moral ground is taken away.
'''
source_url=''
source_title='DELINQUENTS IN THE SNOW, from God in the Dock'

[[commentary]]
quote='''
Now it is certain, in some sense, that 'no duty of obedience can justify a sin', as Mr Mascall says. Granted that capital punishment is compatible with Christianity, a Christian may lawfully be a hangman; but he must not hang a man whom he knows to be innocent. But will anyone interpret this to mean that the hangman has the same duty of investigating the prisoner's guilt which the judge has? If so, no executive can work and no Christian state is possible; which is absurd. I conclude that the hangman has done his duty if he has done his share of the general duty, resting upon all citizens alike, to ensure, so far as in him lies, that we have an honest judicial system; if, in spite of this, and unknowingly, he hangs an innocent man, then a sin has been committed, but not by him.
'''
source_url=''
source_title='THE CONDITIONS FOR A JUST WAR, from God in the Dock'

[[commentary]]
quote='''
Other correspondents have pointed out that a theory of punishment which is purely exemplary or purely reformatory, or both, is shockingly immoral. Only the concept of desert connects punishment with morality at all. If deterrence is all that matters, the execution of an innocent man, provided the public think him guilty, would be fully justified. If reformation alone is in question, then there is nothing against painful and compulsory reform for all our defects, and a Government which believes Christianity to be a neurosis will have a perfectly good right to hand us all over to their straighteners for 'cure' to-morrow.
'''
source_url=''
source_title='CAPITAL PUNISHMENT, from God in the Dock'
