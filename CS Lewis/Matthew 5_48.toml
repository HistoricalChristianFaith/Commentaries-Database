[[commentary]]
quote='''
It is very misleading to call moral perfection an ideal... it is dangerous to describe a man who tries very hard to keep the moral law as a 'man of high ideals', because this might lead you to think that moral perfection was a private taste of his own and that the rest of us were not called on to share it. This would be a disastrous mistake. Perfect behaviour may be as unattainable as perfect gear-changing when we drive; but it is a necessary ideal prescribed for all men by the very nature of the human machine just as perfect gear-changing is an ideal prescribed for all drivers by the very nature of cars.
'''
source_url=''
source_title='Mere Christianity, Book 3, Chapter 1: The Three Parts of Morality'

[[commentary]]
quote='''
We can only do it for moments at first. But from those moments the new sort of life will be spreading through our system: because now we are letting Him work at the right part of us. It is the difference between paint, which is merely laid on the surface, and a dye or stain which soaks right through. He never talked vague, idealistic gas. When He said, 'Be perfect,' He meant it. He meant that we must go in for the full treatment. It is hard; but the sort of compromise we are all hankering after is harder—in fact, it is impossible. It may be hard for an egg to turn into a bird: it would be a jolly sight harder for it to learn to fly while remaining an egg. We are like eggs at present. And you cannot go on indefinitely being just an ordinary, decent egg. We must be hatched or go bad.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 8: Is Christianity Hard or Easy?'

[[commentary]]
quote='''
Some people seem to think this means 'Unless you are perfect, I will not help you'; and as we cannot be perfect, then, if He meant that, our position is hopeless. But I do not think He did mean that. I think He meant 'The only help I will give is help to become perfect. You may want something less: but I will give you nothing less.'
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 9: Counting the Cost'

[[commentary]]
quote='''
The command Be ye perfect is not idealistic gas. Nor is it a command to do the impossible. He is going to make us into creatures that can obey that command. He said (in the Bible) that we were 'gods' and He is going to make good His words. If we let Him—for we can prevent Him, if we choose—He will make the feeblest and filthiest of us into a god or goddess, a dazzling, radiant, immortal creature, pulsating all through with such energy and joy and wisdom and love as we cannot now imagine, a bright stainless mirror which reflects back to God perfectly (though, of course, on a smaller scale) His own boundless power and delight and goodness. The process will be long and in parts very painful, but that is what we are in for. Nothing less. He meant what He said.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 9: Counting the Cost'

[[commentary]]
quote='''
He meant what He said. Those who put themselves in His hands will become perfect, as He is perfect—perfect in love, wisdom, joy, beauty, and immortality. The change will not be completed in this life, for death is an important part of the treatment. How far the change will have gone before death in any particular Christian is uncertain.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 10: Nice People or New Men'
