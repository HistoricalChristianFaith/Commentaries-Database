[[commentary]]
quote='''
The Impassible speaks as if it suffered passion, and that which contains in Itself the cause of its own and all other bliss talks as though it could be in want and yearning. "Is Ephraim my dear son? is he a pleasant child? for since I spake against him I do earnestly remember him still: therefore my bowels are troubled for him."
'''
source_url=''
source_title='The Problem of Pain, Ch. 3'
