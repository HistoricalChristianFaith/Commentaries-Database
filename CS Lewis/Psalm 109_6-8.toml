[[commentary]]
quote='''
In some of the Psalms the spirit of hatred which strikes us in the face is like the heat from a furnace mouth. In others the same spirit ceases to be frightful only by becoming (to a modern mind) almost comic in its naïvety. Examples of the first can be found all over the Psalter, but perhaps the worst is in 109. The poet prays that an ungodly man may rule over his enemy and that "Satan" may stand at his right hand (6). This probably does not mean what a Christian reader naturally supposes. The "Satan" is an accuser, perhaps an informer. When the enemy is tried, let him be convicted and sentenced, "and let his prayer be turned into sin" (7). This again means, I think, not his prayers to God, but his supplications to a human judge, which are to make things all the hotter for him (double the sentence because he begged for it to be halved). May his days be few, may his job be given to someone else (8).
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 3: The Cursings'
