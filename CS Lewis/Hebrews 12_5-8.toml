[[commentary]]
quote='''
As Scripture points out, it is bastards who are spoiled: the legitimate sons, who are to carry on the family tradition, are punished. It is for people whom we care nothing about that we demand happiness on any terms: with our friends, our lovers, our children, we are exacting and would rather see them suffer much than be happy in contemptible and estranging modes. If God is Love, He is, by definition, something more than mere kindness. And it appears, from all the records, that though He has often rebuked us and condemned us, He has never regarded us with contempt. He has paid us the intolerable compliment of loving us, in the deepest, most tragic, most inexorable sense.
'''
source_url=''
source_title='The Problem of Pain, Ch. 3'

[[commentary]]
quote='''
It is just here, where God's providence seems at first to be most cruel, that the Divine humility, the stooping down of the Highest, most deserves praise. We are perplexed to see misfortune falling upon decent, inoffensive, worthy people--on capable, hard-working mothers of families or diligent, thrifty, little trades-people, on those who have worked so hard, and so honestly, for their modest stock of happiness and now seem to be entering on the enjoyment of it with the fullest right. How can I say with sufficient tenderness what here needs to be said? It does not matter that I know I must become, in the eyes of every hostile reader, as it were personally responsible for all the sufferings I try to explain--just as, to this day, everyone talks as if St. Augustine wanted unbaptised infants to go to Hell. But it matters enormously if I alienate anyone from the truth. Let me implore the reader to try to believe, if only for the moment, that God, who made these deserving people, may really be right when He thinks that their modest prosperity and the happiness of their children are not enough to make them blessed: that all this must fall from them in the end, and that if they have not learned to know Him they will be wretched. And therefore He troubles them, warning them in advance of an insufficiency that one day they will have to discover. The life to themselves and their families stands between them and the recognition of their need; He makes that life less sweet to them. I call this a Divine humility because it is a poor thing to strike our colours to God when the ship is going down under us; a poor thing to come to Him as a last resort, to offer up "our own" when it is no longer worth keeping. If God were proud He would hardly have us on such terms: but He is not proud, He stoops to conquer, He will have us even though we have shown that we prefer everything else to Him, and come to Him because there is "nothing better" now to be had.
'''
source_url=''
source_title='The Problem of Pain, Ch. 6'
