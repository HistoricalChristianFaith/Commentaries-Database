[[commentary]]
quote='''
[On the suggestion that the animals may originally all have been herbivorous, and became carnivorous — that is, began to prey upon, to tear, and to eat one another — because of prior corruption:] Some mighty created power had already been at work for ill on the material universe, or the solar system, or, at least, the planet Earth, before ever man came on the scene... If there is such a power... it may well have corrupted the animal creation before man appeared.
'''
source_url=''
source_title='The Pains of Animals, from God in the Dock'
