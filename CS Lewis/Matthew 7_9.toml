[[commentary]]
quote='''
We can bear to be refused but not to be ignored. In other words, our faith can survive many refusals if they really are refusals and not mere disregards. The apparent stone will be bread to us if we believe that a Father's hand put it into ours, in mercy or in justice or even in rebuke. It is hard and bitter, yet it can be chewed and swallowed. But if, having prayed for our heart's desire and got it, we then became convinced that this was a mere accident—that providential designs which had only some quite different end just couldn't help throwing out this satisfaction for us as a by-product—then the apparent bread would become a stone. A pretty stone, perhaps, or even a precious stone. But not edible to the soul.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 10'
