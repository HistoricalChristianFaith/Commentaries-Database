[[commentary]]
quote='''
We are committed to it in principle by Our Lord Himself. On that famous journey to Emmaus He found fault with the two disciples for not believing what the prophets had said. They ought to have known from their Bibles that the Anointed One, when He came, would enter his glory through suffering. He then explained, from 'Moses' (i.e., the Pentateuch) down, all the places in the Old Testament 'concerning Himself'. He clearly identified Himself with a figure often mentioned in the Scriptures; appropriated to Himself many passages where a modern scholar might see no such reference. In the predictions of His Own Passion which He had previously made to the disciples, He was obviously doing the same thing. He accepted—indeed He claimed to be—the second meaning of Scripture.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter XI: Scripture'
