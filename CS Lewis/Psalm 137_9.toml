[[commentary]]
quote='''
Even more devilish in one verse is the, otherwise beautiful, 137 where a blessing is pronounced on anyone who will snatch up a Babylonian baby and beat its brains out against the pavement (9).

One way of dealing with these terrible or (dare we say?) contemptible Psalms is simply to leave them alone. But unfortunately the bad parts will not "come away clean"; they may, as we have noticed, be intertwined with the most exquisite things. And if we still believe that all Holy Scripture is "written for our learning" or that the age-old use of the Psalms in Christian worship was not entirely contrary to the will of God, and if we remember that Our Lord's mind and language were clearly steeped in the Psalter, we shall prefer, if possible, to make some use of them.

At the outset I felt sure, and I feel sure still, that we must not either try to explain them away or to yield for one moment to the idea that, because it comes in the Bible, all this vindictive hatred must somehow be good and pious. We must face both facts squarely. The hatred is there—festering, gloating, undisguised—and also we should be wicked if we in any way condoned or approved it, or (worse still) used it to justify similar passions in ourselves.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 3: The Cursings'

[[commentary]]
quote='''
From this point of view I can use even the horrible passage in 137 about dashing the Babylonian babies against the stones. I know things in the inner world which are like babies; the infantile beginnings of small indulgences, small resentments, which may one day become dipsomania or settled hatred, but which woo us and wheedle us with special pleadings and seem so tiny, so helpless that in resisting them we feel we are being cruel to animals. They begin whimpering to us, 'I don't ask much, but', or 'I had at least hoped', or 'you owe yourself some consideration'. Against all such pretty infants (the dears have such winning ways) the advice of the Psalm is the best. Knock the little bastards' brains out. And 'blessed' he who can, for it's easier said than done.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
