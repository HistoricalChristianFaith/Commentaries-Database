[[commentary]]
quote='''
How, then, are people to behave at home? If a man can't be comfortable and unguarded, can't take his ease and "be himself" in his own house, where can he? That is, I confess, the trouble. The answer is an alarming one. There is nowhere this side of heaven where one can safely lay the reins on the horse's neck. It will never be lawful simply to "be ourselves" until "ourselves" have become sons of God. It is all there in the hymn—"Christian, seek not yet repose." This does not mean, of course, that there is no difference between home life and general society. It does mean that home life has its own rule of courtesy—a code more intimate, more subtle, more sensitive, and, therefore, in some ways more difficult, than that of the outer world.
'''
source_url=''
source_title='The Sermon and the Lunch, from God in the Dock'

[[commentary]]
quote='''
The promises of Scripture may very roughly be reduced to five heads. It is promised, firstly, that we shall be with Christ; secondly, that we shall be like Him; thirdly, with an enormous wealth of imagery, that we shall have "glory"; fourthly, that we shall, in some sense, be fed or feasted or entertained; and, finally, that we shall have some sort of official position in the universe—ruling cities, judging angels, being pillars of God's temple. The first question I ask about these promises is: "Why any of them except the first?" Can anything be added to the conception of being with Christ? For it must be true, as an old writer says, that he who has God and everything else has no more than he who has God only. The variation of the promises does not mean that anything other than God will be our ultimate bliss; but because God is more than a Person, and lest we should imagine the joy of His presence too exclusively in terms of our present poor experience of personal love, with all its narrowness and strain and monotony, a dozen changing images, correcting and relieving each other, are supplied.
'''
source_url=''
source_title='The Weight of Glory'

[[commentary]]
quote='''
He saw not only Them; he saw Him. This animal, this thing begotten in a bed, could look on Him. What is blinding, suffocating fire to you, is now cool light to him, is clarity itself, and wears the form of a Man. You would like, if you could, to interpret the patient's prostration in the Presence, his self-abhorrence and utter knowledge of his sins (yes, Wormwood, a clearer knowledge even than yours) on the analogy of your own choking and paralysing sensations when you encounter the deadly air that breathes from the heart of Heaven. But it's all nonsense. Pains he may still have to encounter, but they embrace those pains. They would not barter them for any earthly pleasure. All the delights of sense, or heart, or intellect, with which you could once have tempted him, even the delights of virtue itself, now seem to him in comparison but as the half nauseous attractions of a raddled harlot would seem to a man who hears that his true beloved whom he has loved all his life and whom he had believed to be dead is alive and even now at his door. He is caught up into that world where pain and pleasure take on transfinite values and all our arithmetic is dismayed. Once more, the inexplicable meets us.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters'

[[commentary]]
quote='''
Now the point in Christianity which gives us the greatest shock is the statement that by attaching ourselves to Christ, we can 'become Sons of God'. One asks 'Aren't we Sons of God already? Surely the fatherhood of God is one of the main Christian ideas?' Well, in a certain sense, no doubt we are sons of God already. I mean, God has brought us into existence and loves us and looks after us, and in that way is like a father. But when the Bible talks of our 'becoming' Sons of God, obviously it must mean something different.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 1: Making and Begetting'

[[commentary]]
quote='''
At the beginning I said there were Personalities in God. I will go further now. There are no real personalities anywhere else. Until you have given up your self to Him you will not have a real self. Sameness is to be found most among the most 'natural' men, not among those who surrender to Christ. How monotonously alike all the great tyrants and conquerors have been: how gloriously different are the saints.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 11: The New Men'
