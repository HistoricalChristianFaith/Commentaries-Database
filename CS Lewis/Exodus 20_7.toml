[[commentary]]
quote='''
It will be exposed, in an aggravated degree, to that temptation which the Devil spares none of us at any time — the temptation of claiming for our favourite opinions that kind and degree of certainty and authority which really belongs only to our Faith. The danger of mistaking our merely natural, though perhaps legitimate, enthusiasms for holy zeal, is always great. Can any more fatal expedient be devised for increasing it than that of dubbing a small band of Fascists, Communists, or Democrats 'the Christian Party'?... If ever Christian men can be brought to think treachery and murder the lawful means of establishing the regime they desire, and faked trials, religious persecution and organized hooliganism the lawful means of maintaining it, it will, surely, be by just such a process as this. The history of the late medieval pseudo-Crusader, of the Covenanters, of the Orangemen, should be remembered. On those who add 'Thus said the Lord' to their merely human utterances descends the doom of a conscience which seems clearer and clearer the more it is loaded with sin. All this comes from pretending that God has spoken when He has not spoken.
'''
source_url=''
source_title='Meditation on the Third Commandment, from God in the Dock'
