[[commentary]]
quote='''
If you meant in your last letter that we can scrap the whole idea of petitionary prayer—prayer which, as you put it, calls upon God to "engineer" particular events in the objective world—and confine ourselves to acts of penitence and adoration, I disagree with you. It may be true that Christianity would be, intellectually, a far easier religion if it told us to do this. And I can understand the people who think it would also be a more high-minded religion. But remember the psalm: "Lord, I am not high minded." Or better still, remember the New Testament. The most unblushingly petitionary prayers are there recommended to us both by precept and example.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 7'
