[[commentary]]
quote='''
What man lost by the Fall was his original specific nature. "Dust thou art, and unto dust shalt thou return." The total organism which had been taken up into his spiritual life was allowed to fall back into the merely natural condition from which, at his making, it had been raised... Thus human spirit from being the master of human nature became a mere lodger in its own house, or even a prisoner; rational consciousness became what it now is--a fitful spot-light resting on a small part of the cerebral motions.
'''
source_url=''
source_title='The Problem of Pain, Chapter 5: The Fall of Man'
