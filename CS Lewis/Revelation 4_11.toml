[[commentary]]
quote='''
In the verse "Thou didst create the earth, according to thy desire" Akhenaten even anticipates the New Testament—"thou hast created all things, and for thy pleasure they are, and were created" (Rev. 4:11). This Egyptian Pharaoh of the fourteenth century B.C. had broken from the Polytheism of his fathers to establish the worship of a single God whose Monotheism appears to have been of an extremely pure and conceptual kind. Where ancient Gentile literature (in some measure) anticipates the nature poetry of the Jews, it has also (in some measure) anticipated their theology. The doctrine of Creation—that all things exist not by self-existence or accident but according to the desire and pleasure of a transcendent God—is what frees Nature to be celebrated as a magnificent achievement and a bearer of messages from her Maker.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 8: Nature'

[[commentary]]
quote='''
Man is not the centre. God does not exist for the sake of man. Man does not exist for his own sake. "Thou hast created all things, and for thy pleasure they are and were created." We were made not primarily that we may love God (though we were made for that too) but that God may love us, that we may become objects in which the Divine love may rest "well pleased". To ask that God's love should be content with us as we are is to ask that God should cease to be God: because He is what He is, His love must, in the nature of things, be impeded and repelled, by certain stains in our present character, and because He already loves us He must labour to make us lovable. We cannot even wish, in our better moments, that He could reconcile Himself to our present impurities--no more than the beggar maid could wish that King Cophetua should be content with her rags and dirt, or a dog, once having learned to love man, could wish that man were such as to tolerate in his house the snapping, verminous, polluting creature of the wild pack. What we would here and now call our "happiness" is not the end God chiefly has in view: but when we are such as He can love without impediment, we shall in fact be happy.
'''
source_url=''
source_title='The Problem of Pain, Ch. 3'

[[commentary]]
quote='''
There is joy in the dance, but it does not exist for the sake of joy. It does not even exist for the sake of good, or of love. It is Love Himself, and Good Himself, and therefore happy. It does not exist for us, but we for it.
'''
source_url=''
source_title='The Problem of Pain, Ch. 10'

[[commentary]]
quote='''
We are taught in the Prayer Book to "give thanks to God for His great glory", as if we owed Him more thanks for being what He necessarily is than for any particular benefit He confers upon us; and so indeed we do and to know God is to know this. But I had been far from any such experience; I came far nearer to feeling this about the Norse gods whom I disbelieved in than I had ever done about the true God while I believed. Sometimes I can almost think that I was sent back to the false gods there to acquire some capacity for worship against the day when the true God should recall me to Himself.
'''
source_url=''
source_title='Surprised by Joy, Ch. 5: Renaissance'

[[commentary]]
quote='''
The primal and necessary Being, the Creator, has sovereignty de facto as well as de jure. He has the power as well as the kingdom and the glory. But the de jure sovereignty was made known to me before the power, the right before the might. And for this I am thankful. I think it is well, even now, sometimes to say to ourselves, "God is such that if (per impossibile) his power could vanish and His other attributes remain, so that the supreme right were forever robbed of the supreme might, we should still owe Him precisely the same kind and degree of allegiance as we now do."
'''
source_url=''
source_title='Surprised by Joy, Ch. 15: The Beginning'

[[commentary]]
quote='''
Yet there was one really wholesome element in it. The Absolute was "there", and that "there" contained the reconciliation of all contraries, the transcendence of all finitude, the hidden glory which was the only perfectly real thing there is. In fact, it had much of the quality of Heaven. But it was a Heaven none of us could ever get to. For we are appearances. To be "there" is, by definition, not to be we. All who embrace such a philosophy live, like Dante's virtuous Pagans, "in desire without hope". Or like Spinoza they so love their God as to be unable even to wish that He should love them in return. I should be very sorry not to have passed through that experience. I think it is more religious than many experiences that have been called Christian. What I learned from the Idealists (and still most strongly hold) is this maxim: it is more important that Heaven should exist than that any of us should reach it.
'''
source_url=''
source_title='Surprised by Joy, Chapter 13: The New Look'
