[[commentary]]
quote='''
By the conversion or sanctification of family life we must be careful to mean something more than the preservation of "love" in the sense of natural affection. Love (in that sense) is not enough. Affection, as distinct from charity, is not a cause of lasting happiness. Left to its natural bent affection becomes in the end greedy, naggingly solicitous, jealous, exacting, timorous. It suffers agony when its object is absent—but is not repaid by any long enjoyment when the object is present. Even at the vicar's lunch table affection was partly the cause of the quarrel. That son would have borne patiently and humorously from any other old man the silliness which enraged him in his father. It is because he still (in some fashion) "cares" that he is impatient. The vicar's wife would not be quite that endless whimper of self-pity which she now is if she did not (in a sense) "love" the family: the continued disappointment of her continued and ruthless demand for sympathy, for affection, for appreciation has helped to make her what she is. I do not think this aspect of affection is nearly enough noticed by most popular moralists. The greed to be loved is a fearful thing. Some of those who say (and almost with pride) that they live only for love come, at last, to live in incessant resentment.
'''
source_url=''
source_title='The Sermon and the Lunch, from God in the Dock'

[[commentary]]
quote='''
It is idle to say that men are of equal value. If value is taken in a worldly sense—if we mean that all men are equally useful or beautiful or good or entertaining—then it is nonsense. If it means that all are of equal value as immortal souls then I think it conceals a dangerous error. The infinite value of each human soul is not a Christian doctrine. God did not die for man because of some value He perceived in him. The value of each human soul considered simply in itself, out of relation to God, is zero. As St. Paul writes, to have died for valuable men would have been not divine but merely heroic; but God died for sinners. He loved us not because we were lovable, but because He is Love.
'''
source_url=''
source_title='The Weight of Glory, Membership'

[[commentary]]
quote='''
St. John's saying that God is love has long been balanced in my mind against the remark of a modern author (M. Denis de Rougemont) that "love ceases to be a demon only when he ceases to be a god"; which of course can be re-stated in the form "begins to be a demon the moment he begins to be a god". This balance seems to me an indispensable safeguard. If we ignore it the truth that God is love may slyly come to mean for us the converse, that love is God.
'''
source_url=''
source_title='The Four Loves, Introduction'

[[commentary]]
quote='''
There is no reason to suppose that self-consciousness, the recognition of a creature by itself as a "self", can exist except in contrast with an "other", a something which is not the self. It is against an environment, and preferably a social environment, an environment of other selves, that the awareness of Myself stands out. This would raise a difficulty about the consciousness of God if we were mere theists: being Christians, we learn from the doctrine of the Blessed Trinity that something analogous to "society" exists within the Divine being from all eternity--that God is Love, not merely in the sense of being the Platonic form of love, but because, within Him, the concrete reciprocities of love exist before all worlds and are thence derived to the creatures.
'''
source_url=''
source_title='The Problem of Pain, Chapter 2: Divine Omnipotence'
