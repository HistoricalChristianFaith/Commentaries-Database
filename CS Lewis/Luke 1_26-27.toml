[[commentary]]
quote='''
We, with our modern democratic and arithmetical presuppositions would so have liked and expected all men to start equal in their search for God. One has the picture of great centripetal roads coming from all directions, with well-disposed people, all meaning the same thing, and getting closer and closer together. How shockingly opposite to that is the Christian story! One people picked out of the whole earth; that people purged and proved again and again. Some are lost in the desert before they reach Palestine; some stay in Babylon; some becoming indifferent. The whole thing narrows and narrows, until at last it comes down to a little point, small as the point of a spear—a Jewish girl at her prayers. That is what the whole of human nature has narrowed down to before the Incarnation takes place. Very unlike what we expected, but, of course, not in the least unlike what seems, in general, as shown by Nature, to be God's way of working.
'''
source_url=''
source_title='The Grand Miracle, from God in the Dock'
