[[commentary]]
quote='''
This analogy suggests to me that it must be absurd to give to the private citizen the same right and duty of deciding the justice of a given war which rests on governments; and I submit that the rules for determining what wars are just were originally rules for the guidance of princes, not subjects. This does not mean that private persons must obey governments commanding them to do what they know is sin; but perhaps it does mean (I write it with some reluctance) that the ultimate decision as to what the situation at a given moment is in the highly complex field of international affairs is one which must be delegated. No doubt we must make every effort which the constitution allows to ensure a good government and to influence public opinion; but in the long run, the nation, as a nation, must act, and it can act only through its government. (It must be remembered that there are risks in both directions: if war is ever lawful, then peace is sometimes sinful.)
'''
source_url=''
source_title='THE CONDITIONS FOR A JUST WAR, from God in the Dock'
