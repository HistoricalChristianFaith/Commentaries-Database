[[commentary]]
quote='''
A perfect practice of Christianity would, of course, consist in a perfect imitation of the life of Christ—I mean, insofar as it was applicable in one's own particular circumstances. Not in an idiotic sense—it doesn't mean that every Christian should grow a beard, or be a bachelor, or become a traveling preacher. It means that every single act and feeling, every experience, whether pleasant or unpleasant, must be referred to God. It means looking at everything as something that comes from Him, and always looking to Him and asking His will first, and saying: "How would He wish me to deal with this?"
'''
source_url='http://www.orcuttchristian.org/Lewis%20CS%20-%20God_in_the_Dock.pdf'
source_title='ANSWERS TO QUESTIONS ON CHRISTIANITY, from God in the Dock'

[[commentary]]
quote='''
[On how encountering a man of genuine moral principle during the war began to change him, even before his conversion]

To be ashamed of what you were about to say, to pretend that something which you had meant seriously was only a joke—this is an ignoble part. But it is better than not to be ashamed at all. And the distinction between pretending you are better than you are and beginning to be better in reality is finer than moral sleuthhounds conceive. I was, in intention, concealing only a part: I accepted his principles at once, made no attempt internally to defend my own "unexamined life". When a boor first enters the society of courteous people what can he do, for a while, except imitate the motions? How can he learn except by imitation?
'''
source_url=''
source_title='Surprised by Joy, Chapter 12: Guns and Good Company'
