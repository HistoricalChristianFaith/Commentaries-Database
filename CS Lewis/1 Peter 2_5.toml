[[commentary]]
quote='''
St. Peter speaks of the whole Church as a building on which God is at work, and of the individual members as stones. The limitation of such an analogy is, of course, that in the symbol the patient is not sentient, and that certain questions of justice and mercy which arise when the "stones" are really "living" therefore remain unrepresented. But it is an important analogy so far as it goes. We are, not metaphorically but in very truth, a Divine work of art, something that God is making, and therefore something with which He will not be satisfied until it has a certain character.
'''
source_url=''
source_title='The Problem of Pain, Ch. 3'
