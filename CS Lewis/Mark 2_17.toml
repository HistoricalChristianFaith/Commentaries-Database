[[commentary]]
quote='''
The greatest barrier I have met is the almost total absence from the minds of my audience of any sense of sin. This has struck me more forcibly when I spoke to the R.A.F. than when I spoke to students: whether (as I believe) the proletariat is more self-righteous than other classes, or whether educated people are cleverer at concealing their pride, this creates for us a new situation. The early Christian preachers could assume in their hearers, whether Jews, Metuentes, or Pagans, a sense of guilt. (That this was common among Pagans is shown by the fact that both Epicureanism and the mystery religions both claimed, though in different ways, to assuage it.) Thus the Christian message was in those days unmistakably the Evangelium, the Good News. It promised healing to those who knew they were sick. We have to convince our hearers of the unwelcome diagnosis before we can expect them to welcome the news of the remedy.
'''
source_url=''
source_title='God in the Dock, from God in the Dock'

[[commentary]]
quote='''
A recovery of the old sense of sin is essential to Christianity. Christ takes it for granted that men are bad. Until we really feel this assumption of His to be true, though we are part of the world He came to save, we are not part of the audience to whom His words are addressed. We lack the first condition for understanding what He is talking about. And when men attempt to be Christians without this preliminary consciousness of sin, the result is almost bound to be a certain resentment against God as to one who is always making impossible demands and always inexplicably angry. Most of us have at times felt a secret sympathy with the dying farmer who replied to the Vicar's dissertation on repentance by asking "What harm have I ever done Him?" There is the real rub. The worst we have done to God is to leave Him alone--why can't He return the compliment? Why not live and let live? What call has He, of all beings, to be "angry"? It's easy for Him to be good!
'''
source_url=''
source_title='The Problem of Pain, Chapter 4: Human Wickedness'
