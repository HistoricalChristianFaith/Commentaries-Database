[[commentary]]
quote='''
I think, too, it will do us no harm to remember that, in becoming Man, He bowed His neck beneath the sweet yoke of a heredity and early environment. Humanly speaking, He would have learned this style, if from no one else (but it was all about Him) from His Mother... is this the only aspect in which we can say of His human nature 'He was His Mother's own son'? There is a fierceness, even a touch of Deborah, mixed with the sweetness in the Magnificat to which most painted Madonnas do little justice; matching the frequent severity of His own sayings. I am sure the private life of the holy family was, in many senses, 'mild' and 'gentle', but perhaps hardly in the way some hymn writers have in mind. One may suspect, on proper occasions, a certain astringency; and all in what people at Jerusalem regarded as a rough north-country dialect.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 1: Introductory'
