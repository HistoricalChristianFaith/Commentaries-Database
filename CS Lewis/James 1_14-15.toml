[[commentary]]
quote='''
I know we have won many a soul through pleasure. All the same, it is His invention, not ours. He made the pleasures: all our research so far has not enabled us to produce one. All we can do is to encourage the humans to take the pleasures which our Enemy has produced, at times, or in ways, or in degrees, which He has forbidden. Hence we always try to work away from the natural condition of any pleasure to that in which it is least natural, least redolent of its Maker, and least pleasurable. An ever increasing craving for an ever diminishing pleasure is the formula. It is more certain; and it's better style. To get the man's soul and give him nothing in return--that is what really gladdens our Father's heart. And the troughs are the time for beginning the process.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters, Chapter IX'
