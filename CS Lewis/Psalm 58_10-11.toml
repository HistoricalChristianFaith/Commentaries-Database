[[commentary]]
quote='''
If the Jews cursed more bitterly than the Pagans this was, I think, at least in part because they took right and wrong more seriously. For if we look at their railings we find they are usually angry not simply because these things have been done to them but because these things are manifestly wrong, are hateful to God as well as to the victim. The thought of the "righteous Lord"—who surely must hate such doings as much as they do, who surely therefore must (but how terribly He delays!) "judge" or avenge, is always there, if only in the background. Sometimes it comes into the foreground; as in Psalm 58:10–11, "The righteous shall rejoice when he seeth the vengeance . . . so that a man shall say . . . Doubtless there is a God that judgeth the earth." This is something different from mere anger without indignation—the almost animal rage at finding that a man's enemy has done to him exactly what he would have done to his enemy if he had been strong enough or quick enough.

Different, certainly higher, a better symptom; yet also leading to a more terrible sin. For it encourages a man to think that his own worst passions are holy. It encourages him to add, explicitly or implicitly, "Thus saith the Lord" to the expression of his own emotions or even his own opinions. For here also it is true "the higher, the more in danger". The Jews sinned in this matter worse than the Pagans not because they were further from God but because they were nearer to Him. For the Supernatural, entering a human soul, opens to it new possibilities both of good and evil.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 3: The Cursings'
