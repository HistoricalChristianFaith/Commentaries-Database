[[commentary]]
quote='''
In 141:4–6, where our translation appears to be rather wrong, the general sense nevertheless comes through and expresses the same attitude [as the other Psalms warning against consenting to evil]...

The Psalmists were not quite wrong when they described the good man as avoiding "the seat of the scornful" and fearing to consort with the ungodly lest he should "eat of" (shall we say, laugh at, admire, approve, justify?) "such things as please them." As usual in their attitude, with all its dangers, there is a core of very good sense.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 7: Connivance'
