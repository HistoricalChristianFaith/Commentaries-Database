[[commentary]]
quote='''
'Religious experience' in the narrower sense comes and goes: especially goes. The operation of Faith is to retain, so far as the will and intellect are concerned, what is irresistible and obvious during the moments of special grace. By Faith we believe always what we hope hereafter to see always and perfectly and have already seen imperfectly and by flashes. In relation to the philosophical premises a Christian's faith is of course excessive: in relation to what is sometimes shown him, it is perhaps just as often defective. My faith even in an earthly friend goes beyond all that could be demonstratively proved; yet in another sense I may often trust him less than he deserves.
'''
source_url=''
source_title='IS THEISM IMPORTANT?, from God in the Dock'

[[commentary]]
quote='''
My own idea is that it occurs only when the one who prays does so as God's fellow-worker, demanding what is needed for the joint work. It is the prophet's, the apostle's, the missionary's, the healer's prayer that is made with this confidence and finds the confidence justified by the event. The difference, we are told, between a servant and a friend is that a servant is not in his master's secrets. For him, "orders is orders". He has only his own surmises as to the plans he helps to execute. But the fellow-worker, the companion or (dare we say?) the colleague of God is so united with Him at certain moments that something of the divine foreknowledge enters his mind. Hence his faith is the "evidence"—that is, the evidentness, the obviousness—of things not seen.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 11'
