[[commentary]]
quote='''
I had not supposed that 'temptation' (that is, solicitation of the will) was the only mode in which the Devil could corrupt or impair. It is probably not the only mode in which he can impair even human beings; when Our Lord spoke of the deformed woman as one 'bound by Satan', I presume He did not mean that she had been tempted into deformity. Moral corruption is not the only kind of corruption. But the word corruption was perhaps ill-chosen and invited misunderstanding. Distortion would have been safer.
'''
source_url=''
source_title='The Pains of Animals, from God in the Dock'
