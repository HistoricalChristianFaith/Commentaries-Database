[[commentary]]
quote='''
Notice how in Psalm 136 the poet passes from God's creation of Nature to the delivering of Israel out of Egypt: both are equally great deeds, great victories. Believing in Creation is to see Nature not as a mere datum but as an achievement. God has given to His works His own character of emeth; they are watertight, faithful, reliable, not at all vague or phantasmal.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 8: Nature'
