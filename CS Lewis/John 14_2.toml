[[commentary]]
quote='''
About the higher level—the crags up which the mystics vanish out of my sight—the glaciers and the aiguilles—I have only two things to say. One is that I don't think we are all "called" to that ascent. "If it were so, He would have told us."
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 12'

[[commentary]]
quote='''
About the resurrection of the body. I agree with you that the old picture of the soul reassuming the corpse—perhaps blown to bits or long since usefully dissipated through nature—is absurd. Nor is it what St. Paul's words imply. And I admit that if you ask what I substitute for this, I have only speculations to offer.

The principle behind these speculations is this. We are not, in this doctrine, concerned with matter as such at all: with waves and atoms and all that. What the soul cries out for is the resurrection of the senses. Even in this life matter would be nothing to us if it were not the source of sensations.

Now we already have some feeble and intermittent power of raising dead sensations from their graves. I mean, of course, memory.

You see the way my thought is moving. But don't run away with the idea that when I speak of the resurrection of the body I mean merely that the blessed dead will have excellent memories of their sensuous experiences on earth. I mean it the other way round: that memory as we now know it is a dim foretaste, a mirage even, of a power which the soul, or rather Christ in the soul (he "went to prepare a place for us") will exercise hereafter. It need no longer be intermittent. Above all, it need no longer be private to the soul in which it occurs. I can now communicate to you the vanished fields of my boyhood—they are building-estates today—only imperfectly by words. Perhaps the day is coming when I can take you for a walk through them.

At present we tend to think of the soul as somehow "inside" the body. But the glorified body of the resurrection as I conceive it—the sensuous life raised from its death—will be inside the soul. As God is not in space but space is in God.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 22'

[[commentary]]
quote='''
Your soul has a curious shape because it is a hollow made to fit a particular swelling in the infinite contours of the divine substance, or a key to unlock one of the doors in the house with many mansions. For it is not humanity in the abstract that is to be saved, but you--you, the individual reader, John Stubbs or Janet Smith. Blessed and fortunate creature, your eyes shall behold Him and not another's. All that you are, sins apart, is destined, if you will let God have His good way, to utter satisfaction. The Brocken spectre "looked to every man like his first love", because she was a cheat. But God will look to every soul like its first love because He is its first love. Your place in heaven will seem to be made for you and you alone, because you were made for it--made for it stitch by stitch as a glove is made for a hand.
'''
source_url=''
source_title='The Problem of Pain, Ch. 10'
