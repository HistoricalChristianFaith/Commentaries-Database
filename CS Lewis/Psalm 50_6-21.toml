[[commentary]]
quote='''
It will be noticed... that I make the Jewish conception of a civil judgement available for my Christian profit by picturing myself as the defendant, not the plaintiff. The writers of the Psalms do not do this. They look forward to "judgement" because they think they have been wronged and hope to see their wrongs righted. There are, indeed, some passages in which the Psalmists approach to Christian humility and wisely lose their self-confidence. Thus in Psalm 50 (one of the finest) God is the accuser (6–21); and in 143:2, we have the words which most Christians often repeat—"Enter not into judgement with Thy servant, for in Thy sight shall no man living be justified." But these are exceptional. Nearly always the Psalmist is the indignant plaintiff.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 2: Judgement in the Psalms'
