[[commentary]]
quote='''
As for the fact of a sin, is it probable that anything cancels it? All times are eternally present to God. Is it not at least possible that along some one line of His multi-dimensional eternity He sees you forever in the nursery pulling the wings off a fly, forever toadying, lying, and lusting as a schoolboy, forever in that moment of cowardice or insolence as a subaltern? It may be that salvation consists not in the cancelling of these eternal moments but in the perfected humility that bears the shame forever, rejoicing in the occasion which it furnished to God's compassion and glad that it should be common knowledge to the universe. Perhaps in that eternal moment St. Peter--he will forgive me if I am wrong--forever denies his Master. If so, it would indeed be true that the joys of Heaven are for most of us, in our present condition, "an acquired taste"--and certain ways of life may render the taste impossible of acquisition. Perhaps the lost are those who dare not go to such a public place. Of course I do not know that this is true; but I think the possibility is worth keeping in mind.
'''
source_url=''
source_title='The Problem of Pain, Chapter 4: Human Wickedness'
