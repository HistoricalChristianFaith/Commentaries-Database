[[commentary]]
quote='''
The Christian is called not to individualism but to membership in the mystical body... The very word membership is of Christian origin, but it has been taken over by the world and emptied of all meaning. In any book on logic you may see the expression "members of a class." It must be most emphatically stated that the items or particulars included in a homogeneous class are almost the reverse of what St. Paul meant by members. By members he meant what we should call organs, things essentially different from, and complimentary to, one another, things differing not only in structure and function but also in dignity. Thus, in a club, the committee as a whole and the servants as a whole may both properly be regarded as "members"; what we should call the members of the club are merely units. A row of identically dressed and identically trained soldiers set side by side, or a number of citizens listed as voters in a constituency are not members of anything in the Pauline sense. I am afraid that when we describe a man as "a member of the Church" we usually mean nothing Pauline; we mean only that he is a unit - that he is one more specimen of some kind of things as X and Y and Z. How true membership in a body differs from inclusion in a collective may be seen in the structure of a family. The grandfather, the parents, the grown-up son, the child, the dog, and the cat are true members (in the organic sense), precisely because they are not members or units of a homogenous class. They are not interchangeable. Each person is almost a species in himself. The mother is not simply a different person from the daughter; she is a different kind of person. The grown-up brother is not simply one unit in the class children; he is a separate estate of the realm. The father and grandfather are almost as different as the cat and the dog. If you subtract any one member, you have not simply reduced the family in number; you have inflicted an injury on its structure. Its unity is a unity of unliked, almost of incommensurables...

The society into which the Christian is called at baptism is not a collective but a Body. It is in fact that Body of which the family is an image on the natural level. If anyone came to it with the misconception that membership of the Church was membership in a debased modern sense - a massing together of persons as if they were pennies or counters - he would be corrected at the threshold by the discovery that the head of this Body is so unlike the inferior memberships that they share no predicate with Him save by analogy.
'''
source_url=''
source_title='The Weight of Glory, Membership'

[[commentary]]
quote='''
We are members of one body, but differentiated members, each with his own vocation. A man's upbringing, his talents, his circumstances, are usually a tolerable index of his vocation. If our parents have sent us to Oxford, if our country allows us to remain there, this is prima facie evidence that the life which we, at any rate, can best lead to the glory of God at present is the learned life.
'''
source_url=''
source_title='Learning in War-Time, from The Weight of Glory'
[[commentary]]
quote='''
If all experienced God in the same way and returned Him an identical worship, the song of the Church triumphant would have no symphony, it would be like an orchestra in which all the instruments played the same note. Aristotle has told us that a city is a unity of unlikes, and St. Paul that a body is a unity of different members. Heaven is a city, and a Body, because the blessed remain eternally different: a society, because each has something to tell all the others--fresh and ever fresh news of the "My God" whom each finds in Him whom all praise as "Our God". For doubtless the continually successful, yet never completed, attempt by each soul to communicate its unique vision to all others (and that by means whereof earthly art and philosophy are but clumsy imitations) is also among the ends for which the individual was created.
'''
source_url=''
source_title='The Problem of Pain, Ch. 10'

[[commentary]]
quote='''
Make his mind flit to and fro between an expression like "the body of Christ" and the actual faces in the next pew. It matters very little, of course, what kind of people that next pew really contains. You may know one of them to be a great warrior on the Enemy's side. No matter. Your patient, thanks to Our Father below, is a fool. Provided that any of those neighbours sing out of tune, or have boots that squeak, or double chins, or odd clothes, the patient will quite easily believe that their religion must therefore be somehow ridiculous. At his present stage, you see, he has an idea of "Christians" in his mind which he supposes to be spiritual but which, in fact, is largely pictorial. His mind is full of togas and sandals and armour and bare legs and the mere fact that the other people in church wear modern clothes is a real--though of course an unconscious--difficulty to him. Never let it come to the surface; never let him ask what he expected them to look like. Keep everything hazy in his mind now, and you will have all eternity wherein to amuse yourself by producing in him the peculiar kind of clarity which Hell affords.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters'
