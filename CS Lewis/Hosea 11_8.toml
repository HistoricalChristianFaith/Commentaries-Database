[[commentary]]
quote='''
The Impassible speaks as if it suffered passion, and that which contains in Itself the cause of its own and all other bliss talks as though it could be in want and yearning. ... "How shall I give thee up, Ephraim? How shall I abandon thee, Israel? Mine heart is turned within me."
'''
source_url=''
source_title='The Problem of Pain, Ch. 3'
