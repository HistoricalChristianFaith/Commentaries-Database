[[commentary]]
quote='''
We can, perhaps, conceive of a world in which God corrected the results of this abuse of free-will by His creatures at every moment: so that a wooden beam became soft as grass when it was used as a weapon, and the air refused to obey me if I attempted to set up in it the sound waves that carry lies or insults. But such a world would be one in which wrong actions were impossible, and in which, therefore, freedom of the will would be void; nay, if the principle were carried out to its logical conclusion, evil thoughts would be impossible, for the cerebral matter which we use in thinking would refuse its task when we attempted to frame them. All matter in the neighbourhood of a wicked man would be liable to undergo unpredictable alterations. That God can and does, on occasions, modify the behaviour of matter and produce what we call miracles, is part of the Christian faith; but the very conception of a common, and therefore, stable, world, demands that these occasions should be extremely rare. In a game of chess you can make certain arbitrary concessions to your opponent, which stand to the ordinary rules of the game as miracles stand to the laws of nature. You can deprive yourself of a castle, or allow the other man sometimes to take back a move made inadvertently. But if you conceded everything that at any moment happened to suit him--if all his moves were revocable and if all your pieces disappeared whenever their position on the board was not to his liking--then you could not have a game at all. So it is with the life of souls in a world: fixed laws, consequences unfolding by causal necessity, the whole natural order, are at once the limits within which their common life is confined and also the sole condition under which any such life is possible. Try to exclude the possibility of suffering which the order of nature and the existence of free-wills involve, and you find that you have excluded life itself.
'''
source_url=''
source_title='The Problem of Pain, Chapter 2: Divine Omnipotence'

[[commentary]]
quote='''
[On why a good God permits a world gone wrong — and His insistence that we participate in setting it right]

And, of course, that raises a very big question. If a good God made the world why has it gone wrong? And for many years I simply refused to listen to the Christian answers to this question, because I kept on feeling 'whatever you say, and however clever your arguments are, isn't it much simpler and easier to say that the world was not made by any intelligent power? Aren't all your arguments simply a complicated attempt to avoid the obvious?' But then that threw me back into another difficulty.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 1: The Rival Conceptions of God'
