[[commentary]]
quote='''
It makes God the centre of the universe and man the subordinate centre of terrestrial nature: the beasts are not co-ordinate with man, but subordinate to him, and their destiny is through and through related to his. And the derivative immortality suggested for them is not a mere amende or compensation: it is part and parcel of the new heaven and new earth, organically related to the whole suffering process of the world's fall and redemption.
'''
source_url=''
source_title='The Problem of Pain, Chapter 9: Animal Pain'
