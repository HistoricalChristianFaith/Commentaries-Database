[[commentary]]
quote='''
Our Lord speaks of Hell under three symbols: first, that of punishment ("everlasting punishment," Matt. xxv, 46); second, that of destruction ("fear Him who is able to destroy both body and soul in Hell," Matt. x, 28); and thirdly, that of privation, exclusion, or banishment into "the darkness outside", as in the parables of the man without a wedding garment or of the wise and foolish virgins.
'''
source_url=''
source_title='The Problem of Pain, Ch. 8'
