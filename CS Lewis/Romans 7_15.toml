[[commentary]]
quote='''
There were two odd things about the human race. First, that they were haunted by the idea of a sort of behaviour they ought to practise, what you might call fair play, or decency, or morality, or the Law of Nature. Second, that they did not in fact do so. ... But if you turn to the Law of Human Nature, the Law of Decent Behaviour, it is a different matter. That law certainly does not mean 'what human beings, in fact, do'; for as I said before, many of them do not obey this law at all, and none of them obey it completely. The law of gravity tells you what stones do if you drop them; but the Law of Human Nature tells you what human beings ought to do and do not.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 3: The Reality of the Law'
