[[commentary]]
quote='''
The memory of that lunch worries me during the last few minutes of the sermon. I am not worried by the fact that the vicar's practice differs from his precept. That is, no doubt, regrettable, but it is nothing to the purpose. As Dr. Johnson said, precept may be very sincere (and, let us add, very profitable) where practice is very imperfect, and no one but a fool would discount a doctor's warnings about alcoholic poisoning because the doctor himself drank too much. What worries me is the fact that the vicar is not telling us at all that home life is difficult and has, like every form of life, its own proper temptations and corruptions. He keeps on talking as if "home" were a panacea, a magical charm which of itself was bound to produce happiness and virtue. The trouble is not that he is insincere but that he is a fool. He is not talking from his own experience of family life at all: he is automatically reproducing a sentimental tradition—and it happens to be a false tradition.
'''
source_url=''
source_title='The Sermon and the Lunch, from God in the Dock'
