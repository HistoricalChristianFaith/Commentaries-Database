[[commentary]]
quote='''
Of course it may be the duty of a particular Christian, or of any Christian, at a particular time, to abstain from strong drink, either because he is the sort of man who cannot drink at all without drinking too much, or because he is with people who are inclined to drunkenness and must not encourage them by drinking himself. But the whole point is that he is abstaining, for a good reason, from something which he does not condemn and which he likes to see other people enjoying.
'''
source_url=''
source_title='Mere Christianity, Book III, Chapter 2: The Cardinal Virtues'
