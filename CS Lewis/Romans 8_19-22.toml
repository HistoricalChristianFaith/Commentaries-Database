[[commentary]]
quote='''
The second class of miracles, on this view, foretell what God has not yet done, but will do, universally. He raised one man (the man who was Himself) from the dead because He will one day raise all men from the dead. Perhaps not only men, for there are hints in the New Testament that all creation will eventually be rescued from decay, restored to shape and subserve the splendor of remade humanity. The Transfiguration and the walking on the water are glimpses of the beauty and the effortless power over all matter which will belong to men when they are really waked by God.
'''
source_url=''
source_title='Miracles, from God in the Dock'

[[commentary]]
quote='''
We can, perhaps, conceive of a world in which God corrected the results of this abuse of free-will by His creatures at every moment: so that a wooden beam became soft as grass when it was used as a weapon, and the air refused to obey me if I attempted to set up in it the sound waves that carry lies or insults. But such a world would be one in which wrong actions were impossible, and in which, therefore, freedom of the will would be void; nay, if the principle were carried out to its logical conclusion, evil thoughts would be impossible, for the cerebral matter which we use in thinking would refuse its task when we attempted to frame them. All matter in the neighbourhood of a wicked man would be liable to undergo unpredictable alterations. That God can and does, on occasions, modify the behaviour of matter and produce what we call miracles, is part of the Christian faith; but the very conception of a common, and therefore, stable, world, demands that these occasions should be extremely rare. In a game of chess you can make certain arbitrary concessions to your opponent, which stand to the ordinary rules of the game as miracles stand to the laws of nature. You can deprive yourself of a castle, or allow the other man sometimes to take back a move made inadvertently. But if you conceded everything that at any moment happened to suit him--if all his moves were revocable and if all your pieces disappeared whenever their position on the board was not to his liking--then you could not have a game at all. So it is with the life of souls in a world: fixed laws, consequences unfolding by causal necessity, the whole natural order, are at once the limits within which their common life is confined and also the sole condition under which any such life is possible. Try to exclude the possibility of suffering which the order of nature and the existence of free-wills involve, and you find that you have excluded life itself.
'''
source_url=''
source_title='The Problem of Pain, Chapter 2: Divine Omnipotence'

[[commentary]]
quote='''
I am now going to suggest--though with great readiness to be set right by real theologians--that there may be a sense, corresponding, though not identical, with these, in which those beasts that attain a real self are in their masters. That is to say, you must not think of a beast by itself, and call that a personality and then inquire whether God will raise and bless that. You must take the whole context in which the beast acquires its selfhood--namely "The-goodman-and-the-goodwife-ruling-their-children-and-their-beasts-in-the-good-homestead". That whole context may be regarded as a "body" in the Pauline (or a closely sub-Pauline) sense; and how much of that "body" may be raised along with the goodman and the goodwife, who can predict? So much, presumably, as is necessary not only for the glory of God and the beatitude of the human pair, but for that particular glory and that particular beatitude which is eternally coloured by that particular terrestrial experience. And in this way it seems to me possible that certain animals may have an immortality, not in themselves, but in the immortality of their masters.
'''
source_url=''
source_title='The Problem of Pain, Chapter 9: Animal Pain'

[[commentary]]
quote='''
[On why a good God permits a world gone wrong — and His insistence that we participate in setting it right]

And, of course, that raises a very big question. If a good God made the world why has it gone wrong? And for many years I simply refused to listen to the Christian answers to this question, because I kept on feeling 'whatever you say, and however clever your arguments are, isn't it much simpler and easier to say that the world was not made by any intelligent power? Aren't all your arguments simply a complicated attempt to avoid the obvious?' But then that threw me back into another difficulty.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 1: The Rival Conceptions of God'

[[commentary]]
quote='''
When I stop doing that and still try to think of the Father begetting many sons 'before all worlds' I find I am not really thinking of anything. The idea fades away into mere words. (Was Nature—space and time and matter—created precisely in order to make many-ness possible? Is there perhaps no other way of getting many eternal spirits except by first making many natural creatures, in a universe, and then spiritualising them? But of course all this is guesswork.)
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 6: Two Notes'

[[commentary]]
quote='''
Century by century God has guided nature up to the point of producing creatures which can (if they will) be taken right out of nature, turned into 'gods'. Will they allow themselves to be taken? In a way, it is like the crisis of birth. Until we rise and follow Christ we are still parts of Nature, still in the womb of our great mother. Her pregnancy has been long and painful and anxious, but it has reached its climax. The great moment has come. Everything is ready. The Doctor has arrived. Will the birth 'go off all right'?
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 11: The New Men'
