[[commentary]]
quote='''
Scripture doesn't take the slightest pains to guard the doctrine of Divine Impassibility. We are constantly represented as exciting the Divine wrath or pity—even as "grieving" God. I know this language is analogical. But when we say that, we must not smuggle in the idea that we can throw the analogy away and, as it were, get in behind it to a purely literal truth. By itself, the abstraction "impassible" can get us nowhere. It might even suggest something far more misleading than the most naïf Old Testament picture of a stormily emotional Jehovah.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 10'
