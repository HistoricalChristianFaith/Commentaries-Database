[[commentary]]
quote='''
I agree with Mr W. R. Childe that it is no use to say 'Lord, Lord', if we do not do what Christ tells us: that, indeed, is one of the reasons why I think an aesthetic religion of 'flowers and music' insufficient. My reason for thinking that a mere statement of even the highest ethical principles is not enough is precisely that to know these things is not necessarily to do them, and if Christianity brought no healing to the impotent will, Christ's teaching would not help us.
'''
source_url=''
source_title="Mr C. S. Lewis on Christianity, from God in the Dock"
