[[commentary]]
quote='''
And this brings me to the other sense of glory—glory as brightness, splendour, luminosity. We are to shine as the sun, we are to be given the Morning Star. In one way, of course, God has given us the Morning Star already: you can go and enjoy the gift on many fine mornings if you get up early enough. What more, you may ask, do we want? Ah, but we want so much more—something the books on aesthetics take little notice of. But the poets and the mythologies know all about it. We do not want merely to _see_ beauty, though, God knows, even that is bounty enough. We want something else which can hardly be put into words—to be united with the beauty we see, to pass into it, to receive it into ourselves, to bathe in it, to become part of it. For if we take the imagery of Scripture seriously, if we believe that God will one day _give_ us the Morning Star and cause us to _put on_ the splendour of the sun, then we may surmise that both the ancient myths and the modern poetry, so false as history, may be very near the truth as prophecy.
'''
source_url=''
source_title='The Weight of Glory'
