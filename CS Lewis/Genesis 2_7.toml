[[commentary]]
quote='''
We read in Genesis 2:7 that God formed man of the dust and breathed life into him. For all the first writer knew of it, this passage might merely illustrate the survival, even in a truly creational story, of the Pagan inability to conceive true Creation, the savage, pictorial tendency to imagine God making things 'out of' something as the potter or the carpenter does. Nevertheless, whether by lucky accident or (as I think) by God's guidance, it embodies a profound principle. For on any view man is in one sense clearly made 'out of' something else. He is an animal; but an animal called to be, or raised to be, or (if you like) doomed to be, something more than an animal. On the ordinary biological view (what difficulties I have about evolution are not religious) one of the primates is changed so that he becomes man; but he remains still a primate and an animal. He is taken up into a new life without relinquishing the old. In the same way, all organic life takes up and uses processes merely chemical. But we can trace the principle higher as well as lower. For we are taught that the Incarnation itself proceeded 'not by the conversion of the god-head into flesh, but by taking of (the) manhood into God'; in it human life becomes the vehicle of Divine life. If the Scriptures proceed not by conversion of God's word into a literature but by taking up of a literature to be the vehicle of God's word, this is not anomalous.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter XI: Scripture'

[[commentary]]
quote='''
For long centuries God perfected the animal form which was to become the vehicle of humanity and the image of Himself. He gave it hands whose thumb could be applied to each of the fingers, and jaws and teeth and throat capable of articulation, and a brain sufficiently complex to execute all the material motions whereby rational thought is incarnated... Then, in the fullness of time, God caused to descend upon this organism, both on its psychology and physiology, a new kind of consciousness which could say "I" and "me", which could look upon itself as an object, which knew God, which could make judgements of truth, beauty, and goodness, and which was so far above time that it could perceive time flowing past. This new consciousness ruled and illuminated the whole organism, flooding every part of it with light, and was not, like ours, limited to a selection of the movements going on in one part of the organism, namely the brain.
'''
source_url=''
source_title='The Problem of Pain, Chapter 5: The Fall of Man'
