[[commentary]]
quote='''
It is no good quoting 'Thou shalt not kill.' There are two Greek words: the ordinary word to kill and the word to murder. And when Christ quotes that commandment He uses the murder one in all three accounts, Matthew, Mark, and Luke. And I am told there is the same distinction in Hebrew. All killing is not murder any more than all sexual intercourse is adultery. When soldiers came to St John the Baptist asking what to do, he never remotely suggested that they ought to leave the army: nor did Christ when He met a Roman sergeant-major—what they called a centurion. The idea of the knight—the Christian in arms for the defence of a good cause—is one of the great Christian ideas. War is a dreadful thing, and I can respect an honest pacifist, though I think he is entirely mistaken. What I cannot understand is this sort of semi-pacifism you get nowadays which gives people the idea that though you have to fight, you ought to do it with a long face and as if you were ashamed of it. It is that feeling that robs lots of magnificent young Christians in the Services of something they have a right to, something which is the natural accompaniment of courage—a kind of gaiety and wholeheartedness.
'''
source_url=''
source_title='Mere Christianity, Book 3, Chapter 7: Forgiveness'
