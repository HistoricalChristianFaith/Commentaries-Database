[[commentary]]
quote='''
The other phenomenon is the quite appalling nature of this Man's theological remarks. You all know what I mean, and I want rather to stress the point that the appalling claim which this Man seems to be making is not merely made at one moment of His career. There is, of course, the one moment which led to His execution. The moment at which the high priest said to Him, "Who are you?" "I am the Anointed, the Son of the uncreated God, and you shall see Me appearing at the end of all history as the judge of the Universe." But that claim, in fact, does not rest on this one dramatic moment. When you look into His conversation you will find this sort of claim running through the whole thing.
'''
source_url=''
source_title='What Are We to Make of Jesus Christ?, from God in the Dock'

[[commentary]]
quote='''
And of course all three Synoptics tell the story of One who, at his trial, sealed His fate by saying He was the Son of God.
'''
source_url=''
source_title='Rejoinder to Dr Pittenger, from God in the Dock'
