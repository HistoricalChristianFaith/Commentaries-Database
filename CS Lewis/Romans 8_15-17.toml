[[commentary]]
quote='''
Well, in a certain sense, no doubt we are sons of God already. I mean, God has brought us into existence and loves us and looks after us, and in that way is like a father. But when the Bible talks of our 'becoming' Sons of God, obviously it must mean something different. And that brings us up against the very centre of Theology.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 1: Making and Begetting'
