[[commentary]]
quote='''
When our ancestors referred to pains and sorrows as God's "vengeance" upon sin they were not necessarily attributing evil passions to God; they may have been recognising the good element in the idea of retribution. Until the evil man finds evil unmistakably present in his existence, in the form of pain, he is enclosed in illusion. Once pain has roused him, he knows that he is in some way or other "up against" the real universe: he either rebels (with the possibility of a clearer issue and deeper repentance at some later stage) or else makes some attempt at an adjustment, which, if pursued, will lead him to religion. It is true that neither effect is so certain now as it was in ages when the existence of God (or even of the Gods) was more widely known, but even in our own days we see it operating. Even atheists rebel and express, like Hardy and Housman, their rage against God although (or because) He does not, on their view, exist: and other atheists, like Mr. Huxley, are driven by suffering to raise the whole problem of existence and to find some way of coming to terms with it which, if not Christian, is almost infinitely superior to fatuous contentment with a profane life. No doubt Pain as God's megaphone is a terrible instrument; it may lead to final and unrepented rebellion. But it gives the only opportunity the bad man can have for amendment. It removes the veil; it plants the flag of truth within the fortress of a rebel soul.
'''
source_url=''
source_title='The Problem of Pain, Ch. 6'
