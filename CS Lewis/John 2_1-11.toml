[[commentary]]
quote='''
Christianity does not exclude any of the ordinary human activities. St. Paul tells people to get on with their jobs. He even assumes that Christians may go to dinner parties, and, what is more, dinner parties given by pagans. Our Lord attends a wedding and provides miraculous wine. Under the aegis of His Church, and in the most Christian ages, learning and the arts flourish.
'''
source_url=''
source_title='Learning in War-Time, from The Weight of Glory'
