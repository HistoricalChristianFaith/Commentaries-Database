[[commentary]]
quote='''
Servile fear is, to be sure, the lowest form of religion. But a god such that there could never be occasion for even servile fear, a safe god, a tame god, soon proclaims himself to any sound mind as a fantasy. I have met no people who fully disbelieved in Hell and also had a living and life-giving belief in Heaven.

There is, I know, a belief in both, which is of no religious significance. It makes these spiritual things, or some travesty of them, objects of purely carnal, prudential, self-centred fear and hope. The deeper levels, those things which only immortal spirit can desire or dread, are not concerned at all. Such belief is fortunately very brittle. The old divines exhausted their eloquence especially in arousing such fear: but, as they themselves rather naïvely complain, the effect did not last for more than a few hours after the sermon.

The soul that has once been waked, or stung, or uplifted by the desire of God, will inevitably (I think) awake to the fear of losing Him.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 14'

[[commentary]]
quote='''
Destruction, we should naturally assume, means the unmaking, or cessation, of the destroyed. And people often talk as if the "annihilation" of a soul were intrinsically possible. In all our experience, however, the destruction of one thing means the emergence of something else. Burn a log, and you have gases, heat and ash. To have been a log means now being those three things. If soul can be destroyed, must there not be a state of having been a human soul? And is not that, perhaps, the state which is equally well described as torment, destruction, and privation? You will remember that in the parable, the saved go to a place prepared for them, while the damned go to a place never made for men at all. To enter heaven is to become more human than you ever succeeded in being in earth; to enter hell, is to be banished from humanity. What is cast (or casts itself) into hell is not a man: it is "remains". To be a complete man means to have the passions obedient to the will and the will offered to God: to have been a man--to be an ex-man or "damned ghost"--would presumably mean to consist of a will utterly centred in its self and passions utterly uncontrolled by the will.
'''
source_url=''
source_title='The Problem of Pain, Ch. 8'
