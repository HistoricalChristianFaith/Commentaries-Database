[[commentary]]
quote='''
And mere quantity of praise seemed to count; 'seven times a day do I praise thee' (119:164). It was extremely distressing. It made one think what one least wanted to think. Gratitude to God, reverence to Him, obedience to Him, I thought I could understand; not this perpetual eulogy. Nor were matters mended by a modern author who talked of God's 'right' to be praised.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 9: A Word About Praising'
