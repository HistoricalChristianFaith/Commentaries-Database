[[commentary]]
quote='''
All Christians know that they must forgive their enemies. But "my enemy" primarily means the man whom I am really tempted to hate and traduce. If you listen to young Christian intellectuals talking, you will soon find out who their real enemy is. He seems to have two names—Colonel Blimp and "the businessman." I suspect that the latter usually means the speaker's father, but that is speculation. What is certain is that in asking such people to forgive the Germans and Russians and to open their eyes to the sins of England, you are asking them, not to mortify, but to indulge, their ruling passion...

The communal sins which they should be told to repent are those of their own age and class—its contempt for the uneducated, its readiness to suspect evil, its self-righteous provocations of public obloquy, its breaches of the Fifth Commandment. Of these sins I have heard nothing among them. Till I do, I must think their candor toward the national enemy a rather inexpensive virtue. If a man cannot forgive the Colonel Blimp next door whom he has seen, how shall he forgive the dictators whom he hath not seen?
'''
source_url=''
source_title='The Dangers of National Repentance, from God in the Dock'

[[commentary]]
quote='''
As the family offers us the first step beyond self-love, so this [love of country] offers us the first step beyond family selfishness. Of course it is not pure charity; it involves love of our neighbours in the local, not of our Neighbour, in the Dominical, sense. But those who do not love the fellow-villagers or fellow-townsmen whom they have seen are not likely to have got very far towards loving "Man" whom they have not.
'''
source_url=''
source_title='The Four Loves, Chapter 2: Likings and Loves for the Sub-human'

[[commentary]]
quote='''
The great thing is to direct the malice to his immediate neighbours whom he meets every day and to thrust his benevolence out to the remote circumference, to people he does not know. The malice thus becomes wholly real and the benevolence largely imaginary. There is no good at all in inflaming his hatred of Germans if, at the same time, a pernicious habit of charity is growing up between him and his mother, his employer, and the man he meets in the train.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters, Chapter VI'
