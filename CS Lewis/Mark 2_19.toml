[[commentary]]
quote='''
Here is another curious remark: in almost every religion there are unpleasant observances like fasting. This Man suddenly remarks one day, "No one need fast while I am here." Who is this Man who remarks that His mere presence suspends all normal rules? Who is the person who can suddenly tell the school they can have a half holiday? Sometimes the statements put forward the assumption that He, the Speaker, is completely without sin or fault. This is always the attitude. "You, to whom I am talking, are all sinners," and He never remotely suggests that this same reproach can be brought against Him.
'''
source_url=''
source_title='What Are We to Make of Jesus Christ?, from God in the Dock'
