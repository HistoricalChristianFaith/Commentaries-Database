[[commentary]]
quote='''
My reason for thinking that a mere statement of even the highest ethical principles is not enough is precisely that to know these things is not necessarily to do them, and if Christianity brought no healing to the impotent will, Christ's teaching would not help us.
'''
source_url=''
source_title="Mr C. S. Lewis on Christianity, from God in the Dock"

[[commentary]]
quote='''
To say this is to repeat what everyone here admits already—that we are saved by grace, that in our flesh dwells no good thing, that we are, through and through, creatures not creators, derived beings, living not of ourselves but from Christ.
'''
source_url=''
source_title='The Weight of Glory, Membership'

[[commentary]]
quote='''
Up to that moment the human spirit had been in full control of the human organism. It doubtless expected that it would retain this control when it had ceased to obey God. But its authority over the organism was a delegated authority which it lost when it ceased to be God's delegate... Thus the organs, no longer governed by man's will, fell under the control of ordinary biochemical laws and suffered whatever the inter-workings of those laws might bring about in the way of pain, senility and death. And desires began to come up into the mind of man, not as his reason chose, but just as the biochemical and environmental facts happened to cause them. And the mind itself fell under the psychological laws of association... And the will, caught in the tidal wave of mere nature, had no resource but to force back some of the new thoughts and desires by main strength, and these uneasy rebels became the subconscious as we now know it.
'''
source_url=''
source_title='The Problem of Pain, Chapter 5: The Fall of Man'

[[commentary]]
quote='''
I do not succeed in keeping the Law of Nature very well, and the moment anyone tells me I am not keeping it, there starts up in my mind a string of excuses as long as your arm. ... The truth is, we believe in decency so much—we feel the Rule of Law pressing on us so—that we cannot bear to face the fact that we are breaking it, and consequently we try to shift the responsibility.

These, then, are the two points I wanted to make. First, that human beings, all over the earth, have this curious idea that they ought to behave in a certain way, and cannot really get rid of it. Secondly, that they do not in fact behave in that way. They know the Law of Nature; they break it.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 1: The Law of Human Nature'

[[commentary]]
quote='''
What is the good of drawing up, on paper, rules for social behaviour, if we know that, in fact, our greed, cowardice, ill temper, and self-conceit are going to prevent us from keeping them? ... Nothing but the courage and unselfishness of individuals is ever going to make any system work properly. It is easy enough to remove the particular kinds of graft or bullying that go on under the present system: but as long as men are twisters or bullies they will find some new way of carrying on the old game under the new system. You cannot make men good by law: and without good men you cannot have a good society.
'''
source_url=''
source_title='Mere Christianity, Book 3, Chapter 1: The Three Parts of Morality'

[[commentary]]
quote='''
Now we cannot, in that sense, discover our failure to keep God's law except by trying our very hardest (and then failing). Unless we really try, whatever we say there will always be at the back of our minds the idea that if we try harder next time we shall succeed in being completely good. Thus, in one sense, the road back to God is a road of moral effort, of trying harder and harder. But in another sense it is not trying that is ever going to bring us home. All this trying leads up to the vital moment at which you turn to God and say, 'You must do this. I can't.'
'''
source_url=''
source_title='Mere Christianity, Book 3, Chapter 12: Faith'

[[commentary]]
quote='''
It is quite true that if we took Christ's advice we should soon be living in a happier world. You need not even go as far as Christ. If we did all that Plato or Aristotle or Confucius told us, we should get on a great deal better than we do. And so what? We never have followed the advice of the great teachers. Why are we likely to begin now? Why are we more likely to follow Christ than any of the others? Because He is the best moral teacher? But that makes it even less likely that we shall follow Him. If we cannot take the elementary lessons, is it likely we are going to take the most advanced one? If Christianity only means one more bit of good advice, then Christianity is of no importance. There has been no lack of good advice for the last four thousand years. A bit more makes no difference.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 1: Making and Begetting'

[[commentary]]
quote='''
In fact what I so proudly call 'Myself' becomes merely the meeting place for trains of events which I never started and which I cannot stop. What I call 'My wishes' become merely the desires thrown up by my physical organism or pumped into me by other men's thoughts or even suggested to me by devils... I am not, in my natural state, nearly so much of a person as I like to believe: most of what I call 'me' can be very easily explained.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 11: The New Men'
