[[commentary]]
quote='''
One is the apparent (and often no doubt real) self-righteousness of the Psalms: 'Thou shalt find no wickedness in me' (17:3), 'I have walked innocently' (26:1), 'Preserve thou my soul, for I am holy' (86:2). For many people it will not much mend matters if we say that sometimes the speaker was from the first intended to be Israel, not the individual; and even, within Israel, the faithful remnant. But of course there was to come a Sufferer who was in fact holy and innocent. All these assertions were to become true in His mouth. And if true, it was necessary they should be made. Our Lord therefore becomes the speaker in these passages when a Christian reads them; by right—it would be an obscuring of the real issue if He did not. For He denied all sin of Himself. (That, indeed, is no small argument of His Deity. For He has not often made even on the enemies of Christianity the impression of arrogance; many of them do not seem as shocked as we should expect at His claim to be 'meek and lowly of heart'. Yet He said such things as, on any hypothesis but one, would be the arrogance of a paranoiac.)
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
