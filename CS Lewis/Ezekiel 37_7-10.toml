[[commentary]]
quote='''
Of course I could do nothing—I could not last out one hour—without continual conscious recourse to what I called Spirit. But the fine, philosophical distinction between this and what ordinary people call "prayer to God" breaks down as soon as you start doing it in earnest. Idealism can be talked, and even felt; it cannot be lived. It became patently absurd to go on thinking of "Spirit" as either ignorant of, or passive to, my approaches. Even if my own philosophy were true, how could the initiative lie on my side? My own analogy, as I now first perceived, suggested the opposite: if Shakespeare and Hamlet could ever meet, it must be Shakespeare's doing. Hamlet could initiate nothing. Perhaps, even now, my Absolute Spirit still differed in some way from the God of religion. The real issue was not, or not yet, there. The real terror was that if you seriously believed in even such a "God" or "Spirit" as I admitted, a wholly new situation developed. As the dry bones shook and came together in that dreadful valley of Ezekiel's, so now a philosophical theorem, cerebrally entertained, began to stir and heave and throw off its gravecloths, and stood upright and became a living presence. I was to be allowed to play at philosophy no longer.
'''
source_url=''
source_title='Surprised by Joy, Chapter 14: Checkmate'
