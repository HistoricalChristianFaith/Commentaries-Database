[[commentary]]
quote='''
Life at a vile boarding-school is in this way a good preparation for the Christian life, that it teaches one to live by hope. Even, in a sense, by faith; for at the beginning of each term, home and the holidays are so far off that it is as hard to realise them as to realise heaven. They have the same pitiful unreality when confronted with immediate horrors. To-morrow's geometry blots out the distant end of term as to-morrow's operation may blot out the hope of Paradise. And yet, term after term, the unbelievable happened. Fantastical and astronomical figures like "This time six weeks" shrank into practicable figures like "This time next week", and then "This time to-morrow", and the almost supernatural bliss of the Last Day punctually appeared. It was a delight that almost demanded to be stayed with flagons and comforted with apples; a delight that tingled down the spine and troubled the belly and at moments went near to stopping the breath. Of course this had a terrible and equally relevant reverse side. In the first week of the holidays we might acknowledge that term would come again--as a young man, in peace time, in full health, acknowledges that he will one day die. But like him we could not even by the grimmest memento mori be brought to realise it. And there too, each time, the unbelievable happened. The grinning skull finally peered through all disguises; the last hour, held at bay by every device our will and imaginations knew, came in the end, and once more it was the bowler-hat, the Eton collar, the knickerbockers, and (clop-clop-clop-clop) the evening drive to the quay. In all seriousness I think that the life of faith is easier to me because of these memories. To think, in sunny and confident times, that I shall die and rot, or to think that one day all this universe will slip away and become memory (as Oldie slipped away into memory three times a year, and with him the canes and the disgusting food, the stinking sanitation and the cold beds)--this is easier to us if we have seen just that sort of thing happening before. We have learned not to take present things at their face value.
'''
source_url=''
source_title='Surprised by Joy, Ch. 2'

[[commentary]]
quote='''
[Lewis reflects on how the nature of Joy — a longing that is itself a kind of possession — mirrors the paradox of Christian hope, where wanting and having are not opposites]

What I never realised was that it had returned--that the remembering of that walk was itself a new experience of just the same kind. True, it was desire, not possession. But then what I had felt on the walk had also been desire, and only possession in so far as that kind of desire is itself desirable, is the fullest possession we can know on earth; or rather, because the very nature of Joy makes nonsense of our common distinction between having and wanting. There, to have is to want and to want is to have.
'''
source_url=''
source_title='Surprised by Joy, Ch. 11: Check'
