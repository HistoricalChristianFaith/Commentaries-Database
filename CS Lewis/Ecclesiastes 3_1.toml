[[commentary]]
quote='''
The humans live in time, and experience reality successively. To experience much of it, therefore, they must experience many different things; in other words, they must experience change. And since they need change, the Enemy (being a hedonist at heart) has made change pleasurable to them, just as He has made eating pleasurable. But since He does not wish them to make change, any more than eating, an end in itself, He has balanced the love of change in them by a love of permanence. He has contrived to gratify both tastes together in the very world He has made, by that union of change and permanence which we call Rhythm. He gives them the seasons, each season different yet every year the same, so that spring is always felt as a novelty yet always as the recurrence of an immemorial theme. He gives them in His Church a spiritual year; they change from a fast to a feast, but it is the same feast as before.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters, Ch. XXV'

[[commentary]]
quote='''
[On every human impulse having its proper season—none intrinsically good or bad, but each rightly ordered by the Moral Law]

It is a mistake to think that some of our impulses—say mother love or patriotism—are good, and others, like sex or the fighting instinct, are bad. All we mean is that the occasions on which the fighting instinct or the sexual desire need to be restrained are rather more frequent than those for restraining mother love or patriotism. But there are situations in which it is the duty of a married man to encourage his sexual impulse and of a soldier to encourage the fighting instinct. There are also occasions on which a mother's love for her own children or a man's love for his own country have to be suppressed or they will lead to unfairness towards other people's children or countries. Strictly speaking, there are no such things as good and bad impulses. Think once again of a piano. It has not got two kinds of notes on it, the 'right' notes and the 'wrong' ones. Every single note is right at one time and wrong at another. The Moral Law is not any one instinct or set of instincts: it is something which makes a kind of tune (the tune we call goodness or right conduct) by directing the instincts.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 2: Some Objections'
