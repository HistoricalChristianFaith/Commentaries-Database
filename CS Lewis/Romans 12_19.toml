[[commentary]]
quote='''
On yet a third level we get vindictive passion--the thirst for revenge. This, of course, is evil and expressly forbidden to Christians. But it has perhaps appeared already from our discussion of Sadism and Masochism that the ugliest things in human nature are perversions of good or innocent things. The good thing of which vindictive passion is the perversion comes out with startling clarity in Hobbes's definition of Revengefulness; "desire by doing hurt to another to make him condemn some fact of his own". Revenge loses sight of the end in the means, but its end is not wholly bad--it wants the evil of the bad man to be to him what it is to everyone else. This is proved by the fact that the avenger wants the guilty party not merely to suffer, but to suffer at his hands, and to know it, and to know why. Hence the impulse to taunt the guilty man with his crime at the moment of taking vengeance: hence, too, such natural expressions as "I wonder how he'd like it if the same thing were done to him" or "I'll teach him". For the same reason when we are going to abuse a man in words we say we are going to "let him know what we think of him".

When our ancestors referred to pains and sorrows as God's "vengeance" upon sin they were not necessarily attributing evil passions to God; they may have been recognising the good element in the idea of retribution.
'''
source_url=''
source_title='The Problem of Pain, Ch. 6'
