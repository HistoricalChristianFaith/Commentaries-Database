[[commentary]]
quote='''
In 40:12, all the sufferings of the guilty too—'my sins have taken such hold upon me that I am not able to look up.' But this too is for us the voice of Christ, for we have been taught that He who was without sin became sin for our sakes, plumbed the depth of that worst suffering which comes to evil men who at last know their own evil. Notice how this, in the original or literal sense, is hardly consistent with the surrounding verses, and what counterpoint of truth this apparent contradiction takes on once the speaker is understood to be Christ.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
