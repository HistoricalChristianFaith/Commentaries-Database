[[commentary]]
quote='''
When we meditate on the Passion while reading Plato's picture of the Righteous One, or on the Resurrection while reading about Adonis or Balder, the case is altered. There is a real connection between what Plato and the myth-makers most deeply were and meant and what I believe to be the truth. I know that connection and they do not. But it is really there. It is not an arbitrary fancy of my own thrust upon the old words. One can, without any absurdity, imagine Plato or the myth-makers if they learned the truth, saying, "I see...so that was what I was really talking about. Of course. That is what my words really meant, and I never knew it."...Or may we more charitably speak, not of what Plato and Virgil and the myth-makers "would have said" but of what they said? For we can pray with good hope that they now know and have long since welcomed the truth; "many shall come from the east and the west and sit down in the kingdom."
'''
source_url=''
source_title='Reflections on the Psalms, Chapter X: Second Meanings'
