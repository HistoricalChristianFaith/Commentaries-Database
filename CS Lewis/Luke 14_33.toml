[[commentary]]
quote='''
The Christian way is different: harder, and easier. Christ says 'Give me All. I don't want so much of your time and so much of your money and so much of your work: I want You. I have not come to torment your natural self, but to kill it. No half-measures are any good. I don't want to cut off a branch here and a branch there, I want to have the whole tree down. I don't want to drill the tooth, or crown it, or stop it, but to have it out. Hand over the whole natural self, all the desires which you think innocent as well as the ones you think wicked—the whole outfit. I will give you a new self instead. In fact, I will give you Myself: my own will shall become yours.'
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 8: Is Christianity Hard or Easy?'

[[commentary]]
quote='''
But there must be a real giving up of the self. You must throw it away 'blindly' so to speak. Christ will indeed give you a real personality: but you must not go to Him for the sake of that. As long as your own personality is what you are bothering about you are not going to Him at all. The very first step is to try to forget about the self altogether... Keep back nothing. Nothing that you have not given away will be really yours.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 11: The New Men'
