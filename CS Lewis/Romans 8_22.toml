[[commentary]]
quote='''
Century by century God has guided nature up to the point of producing creatures which can (if they will) be taken right out of nature, turned into 'gods'. Will they allow themselves to be taken? In a way, it is like the crisis of birth. Until we rise and follow Christ we are still parts of Nature, still in the womb of our great mother. Her pregnancy has been long and painful and anxious, but it has reached its climax. The great moment has come. Everything is ready. The Doctor has arrived. Will the birth 'go off all right'?
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 11: The New Men'
