[[commentary]]
quote='''
Now repentance is no fun at all. It is something much harder than merely eating humble pie. It means unlearning all the self-conceit and self-will that we have been training ourselves into for thousands of years. It means killing part of yourself, undergoing a kind of death. In fact, it needs a good man to repent. And here comes the catch. Only a bad person needs to repent: only a good person can repent perfectly. The worse you are the more you need it and the less you can do it. The only person who could do it perfectly would be a perfect person—and he would not need it.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 4: The Perfect Penitent'

[[commentary]]
quote='''
The business of becoming a son of God, of being turned from a created thing into a begotten thing, of passing over from the temporary biological life into timeless 'spiritual' life, has been done for us. Humanity is already 'saved' in principle. We individuals have to appropriate that salvation. But the really tough work—the bit we could not have done for ourselves—has been done for us.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 5: The Obstinate Toy Soldiers'
