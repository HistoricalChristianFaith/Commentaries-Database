[[commentary]]
quote='''
I doubt whether religious people have ever supposed that Faith-B [trust, or confidence, in God] follows automatically on the acquisition of Faith-A [a settled intellectual assent to God's existence]. It is described as a 'gift'. As soon as we have Faith-A in the existence of God, we are instructed to ask from God Himself the gift of Faith-B. An odd request, you may say, to address to a First Cause, an Ens Realissimum, or an Unmoved Mover. It might be argued, and I think I would argue myself, that even such an aridly philosophical God rather fails to invite than actually repels a personal approach. It would, at any rate, do no harm to try it.
'''
source_url=''
source_title='IS THEISM IMPORTANT?, from God in the Dock'

[[commentary]]
quote='''
The main thing we learn from a serious attempt to practise the Christian virtues is that we fail. If there was any idea that God had set us a sort of exam. and that we might get good marks by deserving them, that has to be wiped out. If there was any idea of a sort of bargain—any idea that we could perform our side of the contract and thus put God in our debt so that it was up to Him, in mere justice, to perform His side—that has to be wiped out... One of the very things Christianity was designed to do was to blow this idea to bits. God has been waiting for the moment at which you discover that there is no question of earning a pass mark in this exam. or putting Him in your debt.
'''
source_url=''
source_title='Mere Christianity, Book 3, Chapter 11: Faith'

[[commentary]]
quote='''
If you like to put it that way, Christ offers something for nothing: He even offers everything for nothing. In a sense, the whole Christian life consists in accepting that very remarkable offer. But the difficulty is to reach the point of recognising that all we have done and can do is nothing. What we should have liked would be for God to count our good points and ignore our bad ones.
'''
source_url=''
source_title='Mere Christianity, Book 3, Chapter 12: Faith'

[[commentary]]
quote='''
We have not got to try to climb up into spiritual life by our own efforts; it has already come down into the human race. If we will only lay ourselves open to the one Man in whom it was fully present, and who, in spite of being God, is also a real man, He will do it in us and for us.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 5: The Obstinate Toy Soldiers'
