[[commentary]]
quote='''
Now a step further. Does loving your enemy mean not punishing him? No, for loving myself does not mean that I ought not to subject myself to punishment—even to death. If you had committed a murder, the right Christian thing to do would be to give yourself up to the police and be hanged. It is, therefore, in my opinion, perfectly right for a Christian judge to sentence a man to death or a Christian soldier to kill an enemy. I always have thought so, ever since I became a Christian, and long before the war, and I still think so now that we are at peace. It is no good quoting 'Thou shalt not kill.' There are two Greek words: the ordinary word to kill and the word to murder. And when Christ quotes that commandment He uses the murder one in all three accounts, Matthew, Mark, and Luke. And I am told there is the same distinction in Hebrew. All killing is not murder any more than all sexual intercourse is adultery.
'''
source_url=''
source_title='Mere Christianity, Book 3, Chapter 7: Forgiveness'
