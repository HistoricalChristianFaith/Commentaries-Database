[[commentary]]
quote='''
They belong to a nation chiefly of peasants. For us the very name Jew is associated with finance, shopkeeping, money-lending, and the like. This, however, dates from the Middle Ages when the Jews were not allowed to own land and were driven into occupations remote from the soil. Whatever characteristics the modern Jew has acquired from millennia of such occupations, they cannot have been those of his ancient ancestors. Those were peasants or farmers. When even a king covets a piece of his neighbour's property, the piece is a vineyard; he is more like a wicked squire than a wicked king. Everyone was close to the land; everyone vividly aware of our dependence on soils and weather... The Psalmists, who are writing lyrics not romances, naturally give us little landscape. What they do give us, far more sensuously and delightedly than anything I have seen in Greek, is the very feel of weather—weather seen with a real countryman's eyes, enjoyed almost as a vegetable might be supposed to enjoy it. "Thou art good to the earth . . . thou waterest her furrows . . . thou makest it soft with the drops of rain . . . the little hills shall rejoice on every side . . . the valleys shall stand so thick with corn that they shall laugh and sing" (65:9–14).
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 8: Nature'
