[[commentary]]
quote='''
Every attentive reader of the Psalms will have noticed that they speak to us severely not merely about doing evil ourselves but about something else... In 50:18, God blames a man not for being a thief but for "consenting to" a thief (in Dr Moffatt, "you are a friend to any thief you see").

...

I am concerned here only with the problem that appears in our individual and private lives. How ought we to behave in the presence of very bad people? I will limit this by changing "very bad people" to "very bad people who are powerful, prosperous, and impenitent." If they are outcasts, poor, and miserable, whose wickedness obviously has not "paid," then every Christian knows the answer. Christ speaking to the Samaritan woman at the well, Christ with the woman taken in adultery, Christ dining with publicans, is our example.

...

The temptation is to condone, to connive at; by our words, looks and laughter, to "consent." The temptation was never greater than now when we are all (and very rightly) so afraid of priggery or "smugness." And of course, even if we do not seek them out, we shall constantly be in such company whether we wish it or not. This is the real and unavoidable difficulty.

We shall hear vile stories told as funny; not merely licentious stories but (to me far more serious and less noticed) stories which the teller could not be telling unless he was betraying someone's confidence. We shall hear infamous detraction of the absent, often disguised as pity or humour. Things we hold sacred will be mocked. Cruelty will be slyly advocated by the assumption that its only opposite is "sentimentality." The very presuppositions of any possible good life—all disinterested motives, all heroism, all genuine forgiveness—will be, not explicitly denied (for then the matter could be discussed), but assumed to be phantasmal, idiotic, believed in only by children.

What is one to do? For on the one hand, quite certainly, there is a degree of unprotesting participation in such talk which is very bad. We are strengthening the hands of the enemy. We are encouraging him to believe that "those Christians," once you get them off their guard and round a dinner table, really think and feel exactly as he does. By implication we are denying our Master; behaving as if we "knew not the Man."
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 7: Connivance'
