[[commentary]]
quote='''
More than once the Psalmists seemed to be saying, 'You like praise. Do this for me, and you shall have some.' Thus in 54 the poet begins 'save me' (1), and in verse 6 adds an inducement, 'An offering of a free heart will I give thee, and praise thy Name.' [...] As for the element of bargaining in the Psalms (Do this and I will praise you), that silly dash of Paganism certainly existed. The flame does not ascend pure from the altar. But the impurities are not its essence. And we are not all in a position to despise even the crudest Psalmists on this score. Of course we would not blunder in our words like them. But there is, for ill as well as for good, a wordless prayer.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 9: A Word About Praising'
