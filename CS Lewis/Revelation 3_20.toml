[[commentary]]
quote='''
You must have often wondered why the Enemy does not make more use of His power to be sensibly present to human souls in any degree He chooses and at any moment. But you now see that the Irresistible and the Indisputable are the two weapons which the very nature of His scheme forbids Him to use. Merely to over-ride a human will (as His felt presence in any but the faintest and most mitigated degree would certainly do) would be for Him useless. He cannot ravish. He can only woo. For His ignoble idea is to eat the cake and have it; the creatures are to be one with Him, but yet themselves; merely to cancel them, or assimilate them, will not serve. He is prepared to do a little over-riding at the beginning. He will set them off with communications of His presence which, though faint, seem great to them, with emotional sweetness, and easy conquest over temptation. But He never allows this state of affairs to last long. Sooner or later He withdraws, if not in fact, at least from their conscious experience, all those supports and incentives. He leaves the creature to stand up on its own legs--to carry out from the will alone duties which have lost all relish.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters, Chapter VIII'
