[[commentary]]
quote='''
In adoration, more than in any other kind of prayer, the public or communal act is of the utmost importance. One would lose incomparably more by being prevented from going to Church on Easter than on Good Friday. And, even in private, adoration should be communal—"with angels and archangels and all the company", all the transparent publicity of Heaven. On the other hand, I find that the prayers to which I can most fully attend in church are always those I have most often used in my bedroom.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 19'
