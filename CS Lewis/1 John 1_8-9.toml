[[commentary]]
quote='''
If we are beginners in the Christian life we have nothing to make the fatal flaw clear to ourselves. Does the person with a smelly breath know it smells? Or does the Club bore know he is a bore? Is there a single man or woman who believes himself or herself to be a bore or temperamentally jealous? Yet the world is pretty well sprinkled with bores and jealous people. If we are like that, everyone else will know it before we do. You ask why your friends have not told you about it. But what if they have? They may have tried again and again; but on every occasion, we thought they were being queer, that they were in a bad temper, or simply mistaken. They have tried again and again, and have probably now given it up.

What should be done about it? What is the good of my talking about the fatal flaw if one does not know about it? I think the first step is to get down to the flaws which one does know. I am speaking to Christians. Many of you, no doubt, are very far ahead of me in the Christian way. It is not for me to decide whether you should confess your sins to a priest or not (our Prayer Book leaves that free to all and demands it of none) but if you do not, you should at least make a list on a piece of paper, and make a serious act of penance about each one of them. There is something about the mere words, you know, provided you avoid two dangers, either of sensational exaggeration — trying to work things up and make melodramatic sins out of small matters — or the opposite danger of slurring things over. It is essential to use the plain, simple, old-fashioned words that you would use about anyone else. I mean words like theft, or fornication, or hatred, instead of 'I did not mean to be dishonest,' or 'I was only a boy then,' or 'I lost my temper.' I think that this steady facing of what one does know and bringing it before God, without excuses, and seriously asking for Forgiveness and Grace, and resolving as far as in one lies to do better, is the only way in which we can ever begin to know the fatal thing which is always there, and preventing us from becoming perfectly just to our wife or husband, or being a better employer or employee.
'''
source_url=''
source_title='Miserable Offenders, from God in the Dock'

[[commentary]]
quote='''
It is no good passing this over with some vague, general admission such as "Of course, I know I have my faults." It is important to realize that there is some really fatal flaw in you: something which gives the others just that same feeling of despair which their flaws give you. And it is almost certainly something you don't know about—like what the advertisements call "halitosis," which everyone notices except the person who has it. But why, you ask, don't the others tell me? Believe me, they have tried to tell you over and over again, and you just couldn't "take it." Perhaps a good deal of what you call their "nagging" or "bad temper" or "queerness" are just their attempts to make you see the truth. And even the faults you do know you don't know fully. You say, "I admit I lost my temper last night"; but the others know that you're always doing it, that you are a bad-tempered person. You say, "I admit I drank too much last Saturday"; but every one else knows that you are an habitual drunkard.
'''
source_url=''
source_title='The Trouble With X, from God in the Dock'

[[commentary]]
quote='''
The essential act of mercy was to pardon; and pardon in its very essence involves the recognition of guilt and ill-desert in the recipient. If crime is only a disease which needs cure, not sin which deserves punishment, it cannot be pardoned. How can you pardon a man for having a gumboil or a club foot?
'''
source_url=''
source_title='THE HUMANITARIAN THEORY OF PUNISHMENT, from God in the Dock'

[[commentary]]
quote='''
The demand that God should forgive such a man while he remains what he is, is based on a confusion between condoning and forgiving. To condone an evil is simply to ignore it, to treat it as if it were good. But forgiveness needs to be accepted as well as offered if it is to be complete: and a man who admits no guilt can accept no forgiveness.
'''
source_url=''
source_title='The Problem of Pain, Ch. 8'
