[[commentary]]
quote='''
[Responding to the question "Materialists and some astronomers suggest that the solar planetary system and life as we know it was brought about by an accidental stellar collision. What is the Christian view of this theory?"]

If the solar system was brought about by an accidental collision, then the appearance of organic life on this planet was also an accident, and the whole evolution of man was an accident too. If so, then all our present thoughts are mere accidents—the accidental by-product of the movement of atoms. And this holds for the thoughts of the materialists and astronomers as well as for anyone else's. But if their thoughts—i.e., of materialism and astronomy—are merely accidental by-products, why should we believe them to be true? I see no reason for believing that one accident should be able to give me a correct account of all the other accidents. It's like expecting that the accidental shape taken by the splash when you upset a milk jug should give you a correct account of how the jug was made and why it was upset.
'''
source_url=''
source_title='ANSWERS TO QUESTIONS ON CHRISTIANITY, from God in the Dock'

[[commentary]]
quote='''
For the first time in my life I began to look at the question with both eyes open. In the world I know, the perfect produces the imperfect, which again becomes perfect — egg leads to bird and bird to egg — in endless succession. If there ever was a life which sprang of its own accord out of a purely inorganic universe, or a civilization which raised itself by its own shoulder-straps out of pure savagery, then this event was totally unlike the beginnings of every subsequent life and every subsequent civilization. The thing may have happened; but all its plausibility is gone. On any view, the first beginning must have been outside the ordinary processes of nature. An egg which came from no bird is no more 'natural' than a bird which had existed from all eternity. And since the egg-bird-egg sequence leads us to no plausible beginning, is it not reasonable to look for the real origin somewhere outside sequence altogether? You have to go outside the sequence of engines, into the world of men, to find the real originator of the Rocket. Is it not equally reasonable to look outside Nature for the real Originator of the natural order?
'''
source_url=''
source_title='Two Lectures, from God in the Dock'

[[commentary]]
quote='''
One might argue that reason had developed by natural selection, only those methods of thought which had proved useful surviving. But the theory depends on an inference from usefulness to truth, of which the validity would have to be assumed. All attempts to treat thought as a natural event involve the fallacy of excluding the thought of the man making the attempt.

It is admitted that the mind is affected by physical events; a wireless set is influenced by atmospherics, but it does not originate its deliverances — we'd take no notice of it if we thought it did. Natural events we can relate one to another until we can trace them finally to the space-time continuum. But thought has no father but thought. It is conditioned, yes, not caused. My knowledge that I have nerves is inferential.
'''
source_url=''
source_title='Bulverism, from God in the Dock'

[[commentary]]
quote='''
Nature never taught me that there exists a God of glory and of infinite majesty. I had to learn that in other ways. But nature gave the word _glory_ a meaning for me. I still do not know where else I could have found one.... Of course the fact that a Christian can so use nature is not even the beginning of a proof that Christianity is true.... A true philosophy may sometimes validate an experience of nature; an experience of nature cannot validate a philosophy. Nature will not verify any theological or metaphysical proposition...; she will help to show what it means. And not, on the Christian premises, by accident. The created glory may be expected to give us hints of the uncreated; for the one is derived from the other and in some fashion reflects it.
'''
source_url=''
source_title='The Four Loves, Chapter 2: Likings and Loves for the Sub-human'

[[commentary]]
quote='''
People often talk as if nothing were easier than for two naked minds to "meet" or become aware of each other. But I see no possibility of their doing so except in a common medium which forms their "external world" or environment. Even our vague attempt to imagine such a meeting between disembodied spirits usually slips in surreptitiously the idea of, at least, a common space and common time, to give the co- in co-existence a meaning: and space and time are already an environment. But more than this is required. If your thoughts and passions were directly present to me, like my own, without any mark of externality or otherness, how should I distinguish them from mine? And what thoughts or passions could we begin to have without objects to think and feel about? Nay, could I even begin to have the conception of "external" and "other" unless I had experience of an "external world"? You may reply, as a Christian, that God (and Satan) do, in fact, affect my consciousness in this direct way without signs of "externality". Yes: and the result is that most people remain ignorant of the existence of both. We may therefore suppose that if human souls affected one another directly and immaterially, it would be a rare triumph of faith and insight for any one of them to believe in the existence of the others. It would be harder for me to know my neighbour under such conditions than it now is for me to know God: for in recognising the impact of God upon me I am now helped by things that reach me through the external world, such as the tradition of the Church, Holy Scripture, and the conversation of religious friends. What we need for human society is exactly what we have--a neutral something, neither you nor I, which we can both manipulate so as to make signs to each other. I can talk to you because we can both set up sound-waves in the common air between us. Matter, which keeps souls apart, also brings them together. It enables each of us to have an "outside" as well as an "inside", so that what are acts of will and thought for you are noises and glances for me; you are enabled not only to be, but to appear: and hence I have the pleasure of making your acquaintance.
'''
source_url=''
source_title='The Problem of Pain, Chapter 2: Divine Omnipotence'

[[commentary]]
quote='''
Total surrender is the first step towards the fruition of either. Shut your mouth; open your eyes and ears. Take in what is there and give no thought to what might have been there or what is somewhere else. That can come later, if it must come at all. (And notice here how the true training for anything whatever that is good always prefigures and, if submitted to, will always help us in, the true training for the Christian life. That is a school where they can always use your previous work whatever subject it was on.)
'''
source_url=''
source_title='Surprised by Joy, Ch. 9: The Great Knock'

[[commentary]]
quote='''
[Lewis argues that the resemblance between imaginative experience and Christian experience is not accidental, but that all created things reflect heavenly truth]

I do not think the resemblance between the Christian and the merely imaginative experience is accidental. I think that all things, in their way, reflect heavenly truth, the imagination not least. "Reflect" is the important word. This lower life of the imagination is not a beginning of, nor a step towards, the higher life of the spirit, merely an image. In me, at any rate, it contained no element either of belief or of ethics; however far pursued, it would never have made me either wiser or better. But it still had, at however many removes, the shape of the reality it reflected.
'''
source_url=''
source_title='Surprised by Joy, Ch. 11: Check'
