[[commentary]]
quote='''
The more a man was in the Devil's power, the less he would be aware of it, on the principle that a man is still fairly sober as long as he knows he's drunk. It is the people who are fully awake and trying hard to be good who would be most aware of the Devil. It is when you start arming against Hitler that you first realize your country is full of Nazi agents. Of course, they don't want you to believe in the Devil. If devils exist, their first aim is to give you an anesthetic—to put you off your guard. Only if that fails, do you become aware of them.
'''
source_url='http://www.orcuttchristian.org/Lewis%20CS%20-%20God_in_the_Dock.pdf'
source_title='ANSWERS TO QUESTIONS ON CHRISTIANITY, from God in the Dock'

[[commentary]]
quote='''
I know someone will ask me, 'Do you really mean, at this time of day, to re-introduce our old friend the devil—hoofs and horns and all?' Well, what the time of day has to do with it I do not know. And I am not particular about the hoofs and horns. But in other respects my answer is 'Yes, I do.' I do not claim to know anything about his personal appearance. If anybody really wants to know him better I would say to that person, 'Don't worry. If you really want to, you will. Whether you'll like it when you do is another question.'
'''
source_url=''
source_title='Mere Christianity, The Invasion'

[[commentary]]
quote='''
I feel a strong desire to tell you—and I expect you feel a strong desire to tell me—which of these two errors is the worse. That is the devil getting at us. He always sends errors into the world in pairs—pairs of opposites. And he always encourages us to spend a lot of time thinking which is the worse. You see why, of course? He relies on your extra dislike of the one error to draw you gradually into the opposite one. But do not let us be fooled. We have to keep our eyes on the goal and go straight through between both errors. We have no other concern than that with either of them.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 6: Two Notes'
