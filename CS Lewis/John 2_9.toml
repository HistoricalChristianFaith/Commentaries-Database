[[commentary]]
quote='''
There is an activity of God displayed throughout creation, a wholesale activity let us say which men refuse to recognize. The miracles done by God incarnate, living as a man in Palestine, perform the very same things as this wholesale activity, but at a different speed and on a smaller scale. One of their chief purposes is that men, having seen a thing done by personal power on the small scale, may recognize, when they see the same thing done on the large scale, that the power behind it is also personal – is indeed the very same person who lived among us two thousand years ago. The miracles in fact are a retelling in small letters of the very same story which is written across the whole world in letters too large for some of us to see...

God creates the vine and teaches it to draw up water by its roots and, with the aid of the sun, to turn water into a juice which will ferment and take on certain qualities. Thus every year, from Noah’s time till ours, God turns water into wine. That, men fail to see. Either like the Pagans they refer the process to some finite spirit, Bacchus or Dionysus: or else, like the moderns, they attribute real and ultimate causality to the chemical and other material phenomena which are all that our senses can discover in it. But when Christ at Cana makes water into wine, the mask is off. The miracle has only half its effect if it only convinces us that Christ is God: it will have its full effect if whenever we see a vineyard or drink a glass of wine we remember that here works He who sat at a wedding party in Cana.
'''
source_url='https://www.angelfire.com/ga4/readings/Lewis.html'
source_title='Miracles, from God in the Dock'

[[commentary]]
quote='''
Where, then, do we draw the line between explaining and "explaining away"? I do not think there is much difficulty. All that concerns the unincarnate activities of God—His operation on that plane of being where sense cannot enter—must be taken along with imagery which we know to be, in the literal sense, untrue. But there can be no defense for applying the same treatment to the miracles of the Incarnate God. They are recorded as events on this earth which affected human senses. They are the sort of thing we can describe literally. If Christ turned water into wine, and we had been present, we could have seen, smelled, and tasted. The story that He did so is not of the same order as His "sitting at the right hand of the Father." It is either fact, or legend, or lie. You must take it or leave it.
'''
source_url=''
source_title='Horrid Red Things, from God in the Dock'

[[commentary]]
quote='''
Dr Pittenger contrasts my view with that which makes miracles a sign of God's action and presence in creation. Yet in chapter 15 I say that the miracle at Cana manifests "the God of Israel who has through all these centuries given us wine" and that in the miraculous feedings God "does close and small... what He has always been doing in the seas, the lakes and the little brooks". Surely this is just what Dr Pittenger wanted me to say, and what Athanasius says (De Incarnatione xiv. 8, edited by F. L. Cross, 1939)?
'''
source_url=''
source_title='Rejoinder to Dr Pittenger, from God in the Dock'

[[commentary]]
quote='''
Of the natural conversion of water into wine, what I said was: "God creates the vine and teaches it to draw up water by its roots and, with the aid of the sun, to turn that water into a juice which will ferment and take on certain qualities." For completeness I should, no doubt, have added "with the aid of the soil", and perhaps other things; but this would not, from my point of view, have materially altered what I was saying. My answer to Mr May's question — where the other raw materials came from — would be the same, whether the list of raw materials be reduced to the mere vegetable and sunlight I mentioned, or extended to bring in all that the skilled botanist might add. I think they came from the same source at Cana whence they come in Nature... What I was doing was to combat that particular argument for its falsity which rests on the idea that, if it occurred, such an event would be arbitrary and meaningless.
'''
source_url=''
source_title='Miracles (letter), from God in the Dock'
