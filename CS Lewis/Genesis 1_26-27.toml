[[commentary]]
quote='''
When the author of Genesis says that God made man in His own image, he may have pictured a vaguely corporeal God making man as a child makes a figure out of plasticine. A modern Christian philosopher may think of a process lasting from the first creation of matter to the final appearance on this planet of an organism fit to receive spiritual as well as biological life. But both mean essentially the same thing. Both are denying the same thing—the doctrine that matter by some blind power inherent in itself has produced spirituality.

Does this mean that Christians on different levels of general education conceal radically different beliefs under an identical form of words? Certainly not. For what they agree on is the substance, and what they differ about is the shadow. When one imagines his God seated in a local heaven above a flat earth, where another sees God and creation in terms of Professor Whitehead's philosophy, this difference touches precisely what does not matter.
'''
source_url=''
source_title='Dogma and the Universe, from God in the Dock'

[[commentary]]
quote='''
The only rational line for the Christian vivisectionist to take is to say that the superiority of man over beast is a real objective fact, guaranteed by revelation, and that the propriety of sacrificing beast to man is a logical consequence. We are "worth more than many sparrows," and in saying this we are not merely expressing a natural preference for our own species simply because it is our own but conforming to a hierarchical order created by God and really present in the universe whether any one acknowledges it or not. The position may not be satisfactory. We may fail to see how a benevolent Deity could wish us to draw such conclusions from the hierarchical order He has created. We may find it difficult to formulate a human right of tormenting beasts in terms which would not equally imply an angelic right of tormenting men. And we may feel that though objective superiority is rightly claimed for man, yet that very superiority ought partly to consist in not behaving like a vivisector: that we ought to prove ourselves better than the beasts precisely by the fact of acknowledging duties to them which they do not acknowledge to us. But on all these questions different opinions can be honestly held.
'''
source_url=''
source_title='Vivisection, from God in the Dock'

[[commentary]]
quote='''
Neither Will nor Reason is the product of Nature. Therefore either I am self-existent (a belief which no one can accept) or I am a colony of some Thought and Will that are self-existent. Such reason and goodness as we can attain must be derived from a self-existent Reason and Goodness outside ourselves, in fact, a Supernatural.
'''
source_url=''
source_title='Bulverism, from God in the Dock'

[[commentary]]
quote='''
Their very kindness stings with intolerable insult. To be 'cured' against one's will and cured of states which we may not regard as disease is to be put on a level with those who have not yet reached the age of reason or those who never will; to be classed with infants, imbeciles, and domestic animals. But to be punished, however severely, because we have deserved it, because we 'ought to have known better', is to be treated as a human person made in God's image.
'''
source_url=''
source_title='THE HUMANITARIAN THEORY OF PUNISHMENT, from God in the Dock'

[[commentary]]
quote='''
For we did learn and achieve something. There is, hidden or flaunted, a sword between the sexes till an entire marriage reconciles them. It is arrogance in us to call frankness, fairness, and chivalry "masculine" when we see them in a woman; it is arrogance in them, to describe a man's sensitiveness or tact or tenderness as "feminine". But also what poor, warped fragments of humanity most mere men and mere women must be to make the implications of that arrogance plausible. Marriage heals this. Jointly the two become fully human. "In the image of God created He _them_." Thus, by a paradox, this carnival of sexuality leads us out beyond our sexes.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-agriefobserved/lewiscs-agriefobserved-00-h.html'
source_title='A Grief Observed, Chapter III'

[[commentary]]
quote='''
Wholly commanding himself, he commanded all lower lives with which he came into contact. Even now we meet rare individuals who have a mysterious power of taming beasts. This power the Paradisal man enjoyed in eminence. The old picture of the brutes sporting before Adam and fawning upon him may not be wholly symbolical. Even now more animals than you might expect are ready to adore man if they are given a reasonable opportunity: for man was made to be the priest and even, in one sense, the Christ, of the animals--the mediator through whom they apprehend so much of the Divine splendour as their irrational nature allows.
'''
source_url=''
source_title='The Problem of Pain, Chapter 5: The Fall of Man'

[[commentary]]
quote='''
A statue has the shape of a man but is not alive. In the same way, man has (in a sense I am going to explain) the 'shape' or likeness of God, but he has not got the kind of life God has. Let us take the first point (man's resemblance to God) first. Everything God has made has some likeness to Himself. Space is like Him in its hugeness: not that the greatness of space is the same kind of greatness as God's, but it is a sort of symbol of it, or a translation of it into non-spiritual terms. Matter is like God in having energy: though, again, of course, physical energy is a different kind of thing from the power of God. The vegetable world is like Him because it is alive, and He is the 'living God'. But life, in this biological sense, is not the same as the life there is in God: it is only a kind of symbol or shadow of it. When we come on to the animals, we find other kinds of resemblance in addition to biological life. The intense activity and fertility of the insects, for example, is a first dim resemblance to the unceasing activity and the creativeness of God. In the higher mammals we get the beginnings of instinctive affection. That is not the same thing as the love that exists in God: but it is like it—rather in the way that a picture drawn on a flat piece of paper can nevertheless be 'like' a landscape. When we come to man, the highest of the animals, we get the completest resemblance to God which we know of. (There may be creatures in other worlds who are more like God than man is, but we do not know about them.) Man not only lives, but loves and reasons: biological life reaches its highest known level in him.

But what man, in his natural condition, has not got, is Spiritual life—the higher and different sort of life that exists in God.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 1: Making and Begetting'
