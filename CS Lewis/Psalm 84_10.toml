[[commentary]]
quote='''
I want to stress what I think that we (or at least I) need more; the joy and delight in God which meet us in the Psalms, however loosely or closely, in this or that instance, they may be connected with the Temple. This is the living centre of Judaism. These poets knew far less reason than we for loving God. They did not know that He offered them eternal joy; still less that He would die to win it for them. Yet they express a longing for Him, for His mere presence, which comes only to the best Christians or to Christians in their best moments. They long to live all their days in the Temple so that they may constantly see 'the fair beauty of the Lord' (27:4). Their longing to go up to Jerusalem and 'appear before the presence of God' is like a physical thirst (Ps. 42). From Jerusalem His presence flashes out 'in perfect beauty' (50:2). Lacking that encounter with Him, their souls are parched like a waterless countryside (63:2). They crave to be 'satisfied with the pleasures' of His house (65:4). Only there can they be at ease, like a bird in the nest (84:3). One day of those 'pleasures' is better than a lifetime spent elsewhere (84:10).
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 5: The Fair Beauty of the Lord'

[[commentary]]
quote='''
Sometimes with no prompting from tradition a second meaning will impose itself upon a reader irresistibly. When the poet of Psalm 84 said 'For one day in thy courts is better than a thousand', he doubtless meant that one day there was better than a thousand elsewhere. I find it impossible to exclude while I read this the thought which, so far as I know, the Old Testament never quite reaches. It is there in the New, beautifully introduced not by laying a new weight on old words but more simply by adding to them. In Psalm 90 (4) it had been said that a thousand years were to God like a single yesterday; in 2 Peter 3:8—not the first place in the world where one would have looked for so metaphysical a theology—we read not only that a thousand years are as one day but also that 'one day is as a thousand years'. The Psalmist only meant, I think, that God was everlasting, that His life was infinite in time. But the epistle takes us out of the time-series altogether. As nothing outlasts God, so nothing slips away from Him into a past. The later conception of the timeless as an eternal present has been achieved. Ever afterwards, for some of us, the 'one day' in God's courts which is better than a thousand, must carry a double meaning. The Eternal may meet us in what is, by our present measurements, a day, or (more likely) a minute or a second; but we have touched what is not in any way commensurable with lengths of time, whether long or short. Hence our hope finally to emerge, if not altogether from time (that might not suit our humanity) at any rate from the tyranny, the unilinear poverty, of time, to ride it not to be ridden by it, and so to cure that always aching wound ('the wound man was born for') which mere succession and mutability inflict on us, almost equally when we are happy and when we are unhappy.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
