[[commentary]]
quote='''
You have often heard that, though in the world we hold different stations, yet we are all equal in the sight of God. There are of course senses in which this is true. God is no accepter of persons: His love for us is not measured by our social rank or our intellectual talents. But I believe there is a sense in which this maxim is the reverse of the truth. I am going to venture to say that artificial equality is necessary in the life of the State, but that in the Church we strip off this disguise, we recover our real inequalities, and are thereby refreshed and quickened.
'''
source_url=''
source_title='The Weight of Glory, Membership'
