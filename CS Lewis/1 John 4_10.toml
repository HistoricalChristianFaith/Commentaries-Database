[[commentary]]
quote='''
It is idle to say that men are of equal value. If value is taken in a worldly sense—if we mean that all men are equally useful or beautiful or good or entertaining—then it is nonsense. If it means that all are of equal value as immortal souls then I think it conceals a dangerous error. The infinite value of each human soul is not a Christian doctrine. God did not die for man because of some value He perceived in him. The value of each human soul considered simply in itself, out of relation to God, is zero. As St. Paul writes, to have died for valuable men would have been not divine but merely heroic; but God died for sinners. He loved us not because we were lovable, but because He is Love.
'''
source_url=''
source_title='The Weight of Glory, Membership'

[[commentary]]
quote='''
God is love. Again, "Herein is love, not that we loved God but that He loved us". We must not begin with mysticism, with the creature's love for God, or with the wonderful forestates of the fruition of God vouchsafed to some in their earthly life. We begin at the real beginning, with love as the Divine energy. This primal love is Gift-love. In God there is no hunger that needs to be filled, only plenteousness that desires to give. The doctrine that God was under no necessity to create is not a piece of dry scholastic speculation. It is essential. Without it we can hardly avoid the conception of what I can only call a "managerial" God; a Being whose function or nature is to "run" the universe, who stands to it as a headmaster to a school or a hotelier to a hotel. But to be sovereign of the universe is no great matter to God, In Himself, at home in "the land of the Trinity", he is Sovereign of a far greater realm. We must keep always before our eyes that vision of Lady Julian's in which God carried in His hand a little object like a nut, and that nut was "all that is made". God, who needs nothing, loves into existence wholly superfluous creatures in order that He may love and perfect them. He creates the universe, already foreseeing—or should we say "seeing"? there are no tenses in God—the buzzing cloud of flies about the cross, the flayed back pressed against the uneven stake, the nails driven through the mesial nerves, the repeated incipient suffocation as the body droops, the repeated torture of back and arms as it is time after time, for breath's sake, hitched up. If I may dare the biological image, God is a "host" who deliberately creates His own parasites; causes us to be that we may exploit and "take advantage of" Him. Herein is love. This is the diagram of Love Himself, the inventor of all loves.
'''
source_url=''
source_title='The Four Loves, Chapter 6: Charity'

[[commentary]]
quote='''
Hence I think that nothing marks off Pagan theism from Christianity so sharply as Aristotle's doctrine that God moves the universe, Himself unmoving, as the Beloved moves a lover. But for Christendom "Herein is love, not that we loved God but that He loved us".
'''
source_url=''
source_title='The Problem of Pain, Ch. 3'

[[commentary]]
quote='''
But this was a religion that cost nothing. We could talk religiously about the Absolute: but there was no danger of Its doing anything about us. It was "there"; safely and immovably "there". It would never come "here", never (to be blunt) make a nuisance of Itself. This quasi-religion was all a one-way street; all eros (as Dr. Nygren would say) steaming up, but no agape darting down. There was nothing to fear; better still, nothing to obey.
'''
source_url=''
source_title='Surprised by Joy, Chapter 13: The New Look'
