[[commentary]]
quote='''
Not all kinds of peace are compatible with all kinds of goodwill, nor do all those who say 'Peace, peace' inherit the blessing promised to the peacemakers. The real pacificus is he who promotes peace, not he who gasses about it. Peace, peace ... we won't be hard on you ... it was only a boyish prank . . . you had a neurosis . . . promise not to do it again . . . out of this in the long run I do not think either goodwill or peace will come. Planting new primroses on the primrose path is no long-term benevolence.
'''
source_url=''
source_title='DELINQUENTS IN THE SNOW, from God in the Dock'
