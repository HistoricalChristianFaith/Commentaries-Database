[[commentary]]
quote='''
There were in the eighteenth century terrible theologians who held that 'God did not command certain things because they are right, but certain things are right because God Commanded them'. To make the position perfectly clear, one of them even said that though God has, as it happens, commanded us to love Him and one another, He might equally well have commanded us to hate Him and one another, and hatred would then have been right. It was apparently a mere toss-up which He decided on. Such a view of course makes God a mere arbitrary tyrant. It would be better and less irreligious to believe in no God and to have no ethics than to have such an ethics and such a theology as this. The Jews of course never discuss this in abstract and philosophical terms. But at once, and completely, they assume the right view, knowing better than they know. They know that the Lord (not merely obedience to the Lord) is 'righteous' and commands 'righteousness' because He loves it (11:8). He enjoins what is good because it is good, because He is good.

[Note: Lewis cites Psalm 11:8 from the Coverdale/BCP numbering used in Reflections on the Psalms; this corresponds to KJV Psalm 11:7, 'For the righteous LORD loveth righteousness; his countenance doth behold the upright.']
'''
source_url=''
source_title='Reflections on the Psalms, Chapter VI: Sweeter Than Honey'

[[commentary]]
quote='''
The third stage in religious development arises when men identify them--when the Numinous Power to which they feel awe is made the guardian of the morality to which they feel obligation. ... Of all the jumps that humanity takes in its religious history this is certainly the most surprising. ... Perhaps only a single people, as a people, took the new step with perfect decision--I mean the Jews: ... it was the Jews who fully and unambiguously identified the awful Presence haunting black mountain-tops and thunderclouds with 'the righteous Lord' who 'loveth righteousness'.
'''
source_url=''
source_title='The Problem of Pain, Chapter 1: Introductory'
