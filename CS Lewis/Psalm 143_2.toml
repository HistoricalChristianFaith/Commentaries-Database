[[commentary]]
quote='''
[Nearly always the Psalmist is the indignant plaintiff, sure that his own hands are clean.] There are, indeed, some passages in which the Psalmists approach to Christian humility and wisely lose their self-confidence. Thus in Psalm 50 (one of the finest) God is the accuser (6–21); and in 143:2, we have the words which most Christians often repeat—"Enter not into judgement with Thy servant, for in Thy sight shall no man living be justified." But these are exceptional. Nearly always the Psalmist is the indignant plaintiff.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 2: Judgement in the Psalms'
