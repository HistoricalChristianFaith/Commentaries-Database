[[commentary]]
quote='''
Now the proper good of a creature is to surrender itself to its Creator--to enact intellectually, volitionally, and emotionally, that relationship which is given in the mere fact of its being a creature. When it does so, it is good and happy. Lest we should think this a hardship, this kind of good begins on a level far above the creatures, for God Himself, as Son, from all eternity renders back to God as Father by filial obedience the being which the Father by paternal love eternally generates in the Son. This is the pattern which man was made to imitate--which Paradisal man did imitate--and wherever the will conferred by the Creator is thus perfectly offered back in delighted and delighting obedience by the creature, there, most undoubtedly, is Heaven, and there the Holy Ghost proceeds. In the world as we now know it, the problem is how to recover this self-surrender. We are not merely imperfect creatures who must be improved: we are, as Newman said, rebels who must lay down our arms. The first answer, then, to the question why our cure should be painful, is that to render back the will which we have so long claimed for our own, is in itself, wherever and however it is done, a grievous pain. Even in Paradise I have supposed a minimal self-adherence to be overcome, though the overcoming, and the yielding, would there be rapturous. But to surrender a self-will inflamed and swollen with years of usurpation is a kind of death. We all remember this self-will as it was in childhood the bitter, prolonged rage at every thwarting, the burst of passionate tears, the black, Satanic wish to kill or die rather than to give in. Hence the older type of nurse or parent was quite right in thinking that the first step in education is "to break the child's will". Their methods were often wrong: but not to see the necessity is, I think, to cut oneself off from all understanding of spiritual laws. And if, now that we are grown up, we do not howl and stamp quite so much, that is partly because our elders began the process of breaking or killing our self-will in the nursery, and partly because the same passions now take more subtle forms and have grown clever at avoiding death by various "compensations". Hence the necessity to die daily: however often we think we have broken the rebellious self we shall still find it alive. That this process cannot be without pain is sufficiently witnessed by the very history of the word "Mortification".
'''
source_url=''
source_title='The Problem of Pain, Ch. 6'
