[[commentary]]
quote='''
Neither Will nor Reason is the product of Nature. Therefore either I am self-existent (a belief which no one can accept) or I am a colony of some Thought and Will that are self-existent. Such reason and goodness as we can attain must be derived from a self-existent Reason and Goodness outside ourselves, in fact, a Supernatural.
'''
source_url=''
source_title='Bulverism, from God in the Dock'

[[commentary]]
quote='''
A question at once arises. Is it still God speaking when a liar or a blasphemer speaks? In one sense, almost Yes. Apart from God he could not speak at all; there are no words not derived from the Word; no acts not derived from Him who is _Actus purus_. And indeed the only way in which I can make real to myself what theology teaches about the heinousness of sin is to remember that every sin is the distortion of an energy breathed into us—an energy which, if not thus distorted, would have blossomed into one of those holy acts whereof "God did it" and "I did it" are both true descriptions. We poison the wine as He decants it into us; murder a melody He would play with us as the instrument. We caricature the self-portrait He would paint. Hence all sin, whatever else it is, is sacrilege.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 13'

[[commentary]]
quote='''
Even within the Holy One Himself, it is not sufficient that the Word should be God, it must also be with God. The Father eternally begets the Son and the Holy Ghost proceeds: deity introduces distinction within itself so that the union of reciprocal loves may transcend mere arithmetical unity or self identity.
'''
source_url=''
source_title='The Problem of Pain, Ch. 10'

[[commentary]]
quote='''
In the second place he convinced me that the positions we had hitherto held left no room for any satisfactory theory of knowledge. We had been, in the technical sense of the term, "realists"; that is, we accepted as rock-bottom reality the universe revealed by the senses. But at the same time we continued to make for certain phenomena of consciousness all the claims that really went with a theistic or idealistic view. We maintained that abstract thought (if obedient to logical rules) gave indisputable truth, that our moral judgment was "valid", and our aesthetic experience not merely pleasing but "valuable". The view was, I think, common at the time; it runs through Bridges' Testament of Beauty, the work of Gilbert Murray, and Lord Russell's "Worship of a Free Man". Barfield convinced me that it was inconsistent. If thought were a purely subjective event, these claims for it would have to be abandoned. If one kept (as rock-bottom reality) the universe of the senses, aided by instruments and co-ordinated so as to form "science", then one would have to go much further--as many have since gone--and adopt a Behaviouristic theory of logic, ethics, and aesthetics. But such a theory was, and is, unbelievable to me. I am using the word "unbelievable", which many use to mean "improbable" or even "undesirable", in a quite literal sense. I mean that the act of believing what the behaviourist believes is one that my mind simply will not perform. I cannot force my thought into that shape any more than I can scratch my ear with my big toe or pour wine out of a bottle into the cavity at the base of that same bottle. It is as final as a physical impossibility. I was therefore compelled to give up realism. I had been trying to defend it ever since I began reading philosophy. Partly, no doubt, this was mere "cussedness". Idealism was then the dominant philosophy at Oxford and I was by nature "against Government". But partly, too, realism satisfied an emotional need. I wanted Nature to be quite independent of our observation; something other, indifferent, self-existing. (This went with the Jenkinian zest for rubbing one's nose in the mere quiddity.) But now, it seemed to me, I had to give that up. Unless I were to accept an unbelievable alternative, I must admit that mind was no late-come epiphenomenon; that the whole universe was, in the last resort, mental; that our logic was participation in a cosmic Logos.
'''
source_url=''
source_title='Surprised by Joy, Chapter 13: The New Look'

[[commentary]]
quote='''
Do not think I am going faster than I really am. I am not yet within a hundred miles of the God of Christian theology. All I have got to is a Something which is directing the universe, and which appears in me as a law urging me to do right and making me feel responsible and uncomfortable when I do wrong. I think we have to assume it is more like a mind than it is like anything else we know—because after all the only other thing we know is matter and you can hardly imagine a bit of matter giving instructions. But, of course, it need not be very like a mind, still less like a person.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 4: What Lies Behind the Law'
