[[commentary]]
quote='''
Thus when the Psalmists speak of 'seeing' the Lord, or long to 'see' Him, most of them mean something that happened to them in the Temple. The fatal way of putting this would be to say, 'They only mean they have seen the festival.' It would be better to say, 'If we had been there we should have seen only the festival.' Thus in 68 'It is well seen, O God, how thou goest . . . in the sanctuary . . . the singers go before, the minstrels follow after; in the midst are the damsels playing with the timbrels' (68:24, 25), it is almost as if the poet said, 'Look, here He comes.' If I had been there I should have seen the musicians and the girls with the tambourines; in addition, as another thing, I might or might not have (as we say) 'felt' the presence of God. The ancient worshipper would have been aware of no such dualism.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 5: The Fair Beauty of the Lord'
