[[commentary]]
quote='''
The things He says are very different from what any other teacher has said. Others say, "This is the truth about the universe. This is the way you ought to go," but He says, "I am the Truth, and the Way, and the Life." He says, "No man can reach absolute reality, except through Me. Try to retain your own life and you will be inevitably ruined. Give yourself away and you will be saved."
'''
source_url=''
source_title='What Are We to Make of Jesus Christ?, from God in the Dock'

[[commentary]]
quote='''
Here is another thing that used to puzzle me. Is it not frightfully unfair that this new life should be confined to people who have heard of Christ and been able to believe in Him? But the truth is God has not told us what His arrangements about the other people are. We do know that no man can be saved except through Christ; we do not know that only those who know Him can be saved through Him. But in the meantime, if you are worried about the people outside, the most unreasonable thing you can do is to remain outside yourself.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 5: The Practical Conclusion'
