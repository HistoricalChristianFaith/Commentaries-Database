[[commentary]]
quote='''
It is idle to say that men are of equal value. If value is taken in a worldly sense—if we mean that all men are equally useful or beautiful or good or entertaining—then it is nonsense. If it means that all are of equal value as immortal souls then I think it conceals a dangerous error. The infinite value of each human soul is not a Christian doctrine. God did not die for man because of some value He perceived in him. The value of each human soul considered simply in itself, out of relation to God, is zero. As St. Paul writes, to have died for valuable men would have been not divine but merely heroic; but God died for sinners. He loved us not because we were lovable, but because He is Love.
'''
source_url=''
source_title='The Weight of Glory, Membership'

[[commentary]]
quote='''
That is why the Christian is in a different position from other people who are trying to be good. They hope, by being good, to please God if there is one; or—if they think there is not—at least they hope to deserve approval from good men. But the Christian thinks any good he does comes from the Christ-life inside him. He does not think God will love us because we are good, but that God will make us good because He loves us; just as the roof of a greenhouse does not attract the sun because it is bright, but becomes bright because the sun shines on it.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 5: The Practical Conclusion'

[[commentary]]
quote='''
On the whole, God's love for us is a much safer subject to think about than our love for Him. Nobody can always have devout feelings: and even if we could, feelings are not what God principally cares about. Christian Love, either towards God or towards man, is an affair of the will. If we are trying to do His will we are obeying the commandment, 'Thou shalt love the Lord thy God.' He will give us feelings of love if He pleases. We cannot create them for ourselves, and we must not demand them as a right. But the great thing to remember is that, though our feelings come and go, His love for us does not. It is not wearied by our sins, or our indifference; and, therefore, it is quite relentless in its determination that we shall be cured of those sins, at whatever cost to us, at whatever cost to Him.
'''
source_url=''
source_title='Mere Christianity, Book 3 Chapter 9: Charity'
