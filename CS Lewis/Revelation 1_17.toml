[[commentary]]
quote='''
I fully agree that the relationship between God and a man is more private and intimate than any possible relation between two fellow creatures. Yes, but at the same time there is, in another way, a greater distance between the participants. We are approaching--well I won't say "the Wholly Other", for I suspect that is meaningless, but the Unimaginably and Insupportably Other. We ought to be--sometimes I hope one is--simultaneously aware of closest proximity and infinite distance. You make things far too snug and confiding. Your erotic analogy needs to be supplemented by "I fell at His feet as one dead."
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 2'

[[commentary]]
quote='''
At the beginning of our era it finds expression in the Apocalypse where the writer fell at the feet of the risen Christ 'as one dead'. ... Now this awe is not the result of an inference from the visible universe. There is no possibility of arguing from mere danger to the uncanny, still less to the fully Numinous. ... When man passes from physical fear to dread and awe, he makes a sheer jump, and apprehends something which could never be given, as danger is, by the physical facts and logical deductions from them.
'''
source_url=''
source_title='The Problem of Pain, Chapter 1: Introductory'
