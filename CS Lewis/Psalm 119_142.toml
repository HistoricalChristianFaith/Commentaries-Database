[[commentary]]
quote='''
On three occasions the poet asserts that the Law is 'true' or 'the truth' (86, 138, 142). We find the same in 111:7, 'all his commandments are true'. (The word, I understand, could also be translated 'faithful', or 'sound'; what is, in the Hebrew sense, 'true' is what 'holds water', what doesn't 'give way' or collapse.) A modern logician would say that the Law is a command and that to call a command 'true' makes no sense; 'The door is shut' may be true or false but 'Shut the door' can't. But I think we all see pretty well what the Psalmists mean. They mean that in the Law you find the 'real' or 'correct' or stable, well-grounded, directions for living. The law answers the question 'Wherewithal shall a young man cleanse his way?' (119:9). It is like a lamp, a guide (119:105). There are many rival directions for living, as the Pagan cultures all round us show. When the poets call the directions or 'rulings' of Jahweh 'true' they are expressing the assurance that these, and not those others, are the 'real' or 'valid' or unassailable ones; that they are based on the very nature of things and the very nature of God.

By this assurance they put themselves, implicitly, on the right side of a controversy which arose far later among Christians. There were in the eighteenth century terrible theologians who held that 'God did not command certain things because they are right, but certain things are right because God Commanded them'. Such a view of course makes God a mere arbitrary tyrant. It would be better and less irreligious to believe in no God and to have no ethics than to have such an ethics and such a theology as this. The Jews of course never discuss this in abstract and philosophical terms. But at once, and completely, they assume the right view, knowing better than they know. They know that the Lord (not merely obedience to the Lord) is 'righteous' and commands 'righteousness' because He loves it. He enjoins what is good because it is good, because He is good. Hence His laws have emeth 'truth', intrinsic validity, rock-bottom reality, being rooted in His own nature, and are therefore as solid as that Nature which He has created.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter VI: Sweeter Than Honey'
