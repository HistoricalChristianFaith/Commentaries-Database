[[commentary]]
quote='''
But the most surprising result of all is still to be mentioned. I said that the Jews, like nearly all the ancients, were agricultural and approached Nature with a gardener's and a farmer's interest, concerned with rain, with grass "for the service of man", wine to cheer man up, and olive-oil to make his face shine... But we find them led on beyond this. Their gusto, or even gratitude, embraces things that are no use to man. In the great Psalm especially devoted to Nature (104), we have not only the useful cattle, the cheering vine, and the nourishing corn. We have springs where the wild asses quench their thirst (11), fir trees for the storks (17), hill country for the wild goats and "conies" (perhaps marmots, 18), finally even the lions (21); and even with a glance far out to sea, where no Jew willingly went, the great whales playing, enjoying themselves (26).

Of course this appreciation of, almost this sympathy with, creatures useless or hurtful or wholly irrelevant to man, is not our modern "kindness to animals". That is a virtue most easily practised by those who have never, tired and hungry, had to work with animals for a bare living, and who inhabit a country where all dangerous wild beasts have been exterminated. The Jewish feeling, however, is vivid, fresh, and impartial. In Norse stories a pestilent creature such as a dragon tends to be conceived as the enemy not only of men but of gods. In classical stories, more disquietingly, it tends to be sent by a god for the destruction of men whom he has a grudge against. The Psalmist's clear objective view—noting the lions and whales side by side with men and men's cattle—is unusual. And I think it is certainly reached through the idea of God as Creator and sustainer of all. In 104:21, the point about the lions is that they, like us, "do seek their meat from God".
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 8: Nature'
