[[commentary]]
quote='''
[On whether the educated should submit to forms of worship — such as hymns — that they personally find aesthetically lacking, when those forms edify others]

I would agree that anything the congregation can do may properly and profitably be offered to God in public worship... If an improved hymnody — or even the present hymnody — does edify other people, of course it is an elementary duty of charity and humility for me to submit. I have never spoken in public against the use of hymns: on the contrary I have often told 'highbrow' converts that a humble acquiescence in anything that may edify their uneducated brethren (however frightful it seems to the educated 'natural man') is the first lesson they must learn. The door is low and one must stoop to enter.
'''
source_url=''
source_title='Correspondence with an Anglican Who Dislikes Hymns, from God in the Dock'

[[commentary]]
quote='''
We have quite removed from men's minds what that pestilent fellow Paul used to teach about food and other unessentials--namely, that the human without scruples should always give in to the human with scruples. You would think they could not fail to see the application. You would expect to find the "low" churchman genuflecting and crossing himself lest the weak conscience of his "high" brother should be moved to irreverence, and the "high" one refraining from these exercises lest he should betray his "low" brother into idolatry. And so it would have been but for our ceaseless labour. Without that the variety of usage within the Church of England might have become a positive hotbed of charity and humility.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters'
