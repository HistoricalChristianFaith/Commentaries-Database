[[commentary]]
quote='''
[Lewis: once a man has seen he is at enmity with the absolute goodness behind the Moral Law, Christianity begins to answer the question of how reconciliation is possible]

They offer an explanation of how we got into our present state of both hating goodness and loving it. They offer an explanation of how God can be this impersonal mind at the back of the Moral Law and yet also a Person. They tell you how the demands of this law, which you and I cannot meet, have been met on our behalf, how God Himself becomes a man to save man from the disapproval of God.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 5: We Have Cause to be Uneasy'

[[commentary]]
quote='''
Now what was the sort of 'hole' man had got himself into? He had tried to set up on his own, to behave as if he belonged to himself. In other words, fallen man is not simply an imperfect creature who needs improvement: he is a rebel who must lay down his arms. Laying down your arms, surrendering, saying you are sorry, realising that you have been on the wrong track and getting ready to start life over again from the ground floor—that is the only way out of our 'hole'. This process of surrender—this movement full speed astern—is what Christians call repentance.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 4: The Perfect Penitent'
