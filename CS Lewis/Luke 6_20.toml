[[commentary]]
quote='''
Of poverty--the affliction which actually or potentially includes all other afflictions--I would not dare to speak as from myself; and those who reject Christianity will not be moved by Christ's statement that poverty is blessed. But here a rather remarkable fact comes to my aid. Those who would most scornfully repudiate Christianity as a mere "opiate of the people" have a contempt for the rich, that is, for all mankind except the poor. They regard the poor as the only people worth preserving from "liquidation", and place in them the only hope of the human race. But this is not compatible with a belief that the effects of poverty on those who suffer it are wholly evil; it even implies that they are good. The Marxist thus finds himself in real agreement with the Christian in those two beliefs which Christianity paradoxically demands--that poverty is blessed and yet ought to be removed.
'''
source_url=''
source_title='The Problem of Pain, Ch. 6'
