[[commentary]]
quote='''
It must be admitted by anyone who accepts Christianity, that an increased interest in it, or even a growing measure of intellectual assent to it, is a very different thing from the conversion of England or even of a single soul. Conversion requires an alteration of the will, and an alteration which, in the last resort, does not occur without the intervention of the supernatural. I do not in the least agree with those who therefore conclude that the spread of an intellectual (and imaginative) climate favorable to Christianity is useless. You do not prove munition workers useless by showing that they cannot themselves win battles, however proper this reminder would be if they attempted to claim the honor due to fighting men. If the intellectual climate is such that, when a man comes to the crisis at which he must either accept or reject Christ, his reason and imagination are not on the wrong side, then his conflict will be fought out under favorable conditions.
'''
source_url=''
source_title='The Decline of Religion, from God in the Dock'

[[commentary]]
quote='''
Of course I could do nothing—I could not last out one hour—without continual conscious recourse to what I called Spirit. But the fine, philosophical distinction between this and what ordinary people call "prayer to God" breaks down as soon as you start doing it in earnest. Idealism can be talked, and even felt; it cannot be lived. It became patently absurd to go on thinking of "Spirit" as either ignorant of, or passive to, my approaches. Even if my own philosophy were true, how could the initiative lie on my side? My own analogy, as I now first perceived, suggested the opposite: if Shakespeare and Hamlet could ever meet, it must be Shakespeare's doing. Hamlet could initiate nothing.
'''
source_url=''
source_title='Surprised by Joy, Chapter 14: Checkmate'

[[commentary]]
quote='''
And so the great Angler played His fish and I never dreamed that the hook was in my tongue. But two great advances had been made. Bergson had showed me necessary existence; and from Idealism I had come one step nearer to understanding the words, "We give thanks to thee for thy great glory." The Norse gods had given me the first hint of it; but then I didn't believe in them, and I did believe (so far as one can believe an Unding) in the Absolute.
'''
source_url=''
source_title='Surprised by Joy, Chapter 13: The New Look'
