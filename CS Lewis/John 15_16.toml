[[commentary]]
quote='''
For then it will seem to us that we—we four or five—have chosen one another, the insight of each finding the intrinsic beauty of the rest, like to like, a voluntary nobility; that we have ascended above the rest of mankind by our native powers... But in Friendship, being free of all that, we think we have chosen our peers... But, for a Christian, there are, strictly speaking, no chances. A secret Master of the Ceremonies has been at work. Christ, who said to the disciples "Ye have not chosen me, but I have chosen you", can truly say to every group of Christian friends "You have not chosen one another but I have chosen you for one another". The Friendship is not a reward for our discrimination and good taste in finding one another out. It is the instrument by which God reveals to each the beauties of all the others.
'''
source_url=''
source_title='The Four Loves, Chapter IV - Friendship'
