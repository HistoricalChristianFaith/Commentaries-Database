[[commentary]]
quote='''
The real New Testament authority for assigning this Psalm to Whitsunday appears in verse 18 ('Thou art gone up on high, thou hast led captivity captive, and received gifts for men'). According to the scholars the Hebrew text here means that God, with the armies of Israel as his agents, had taken huge masses of prisoners and received 'gifts' (booty or tribute) from men. St Paul, however (Eph. 4:8) quotes a different reading: 'When He ascended up on high He led captivity captive and gave gifts to men.' This must be the passage which first associated the Psalm with the coming of the Holy Ghost, for St Paul is there speaking of the gifts of the Spirit and stressing the fact that they come after the Ascension. After ascending, as a result of ascending, Christ gives these gifts to men, or receives these gifts from His Father 'for men', for the use of men, in order to transmit them to men. And this relation between the Ascension and the coming of the Spirit is of course in full accordance with Our Lord's own words, 'It is expedient for you that I go away, for if I go not away the Comforter will not come unto you' (John 16:7); as if the one were somehow impossible without the other, as if the Ascension, the withdrawal from the space-time in which our present senses operate, of the incarnate God, were the necessary condition of God's presence in another mode. There is a mystery here that I will not even attempt to sound.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
