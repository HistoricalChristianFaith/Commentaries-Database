[[commentary]]
quote='''
Prayer is irksome. An excuse to omit it is never unwelcome. When it is over, this casts a feeling of relief and holiday over the rest of the day. We are reluctant to begin. We are delighted to finish. While we are at prayer, but not while we are reading a novel or solving a cross-word puzzle, any trifle is enough to distract us.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 21'

[[commentary]]
quote='''
And we know that we are not alone in this. The fact that prayers are constantly set as penances tells its own tale.

The odd thing is that this reluctance to pray is not confined to periods of dryness. When yesterday's prayers were full of comfort and exaltation, today's will still be felt as, in some degree, a burden.

Now the disquieting thing is not simply that we skimp and begrudge the duty of prayer. The really disquieting thing is it should have to be numbered among duties at all. For we believe that we were created "to glorify God and enjoy Him forever." And if the few, the very few, minutes we now spend on intercourse with God are a burden to us rather than a delight, what then? If I were a Calvinist this symptom would fill me with despair. What can be done _for_--or what should be done _with_--a rose-tree that _dislikes_ producing roses? Surely it ought to want to?
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 21'

[[commentary]]
quote='''
Much of our backwardness in prayer is no doubt due to our sins, as every teacher will tell us; to our avoidable immersion in the things of this world, to our neglect of mental discipline. And also to the very worst kind of "fear of God." We shrink from too naked a contact, because we are afraid of the divine demands upon us which it might make too audible. As some old writer says, many a Christian prays faintly "lest God might really hear him, which he, poor man, never intended." But sins--at any rate, our actual and individual sins--are not perhaps the only cause.

The painful effort which prayer involves is no proof that we are doing something we were not created to do.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 21'

[[commentary]]
quote='''
I am therefore not really deeply worried by the fact that prayer is at present a duty, and even an irksome one. This is humiliating. It is frustrating. It is terribly time-wasting--the worse one is praying, the longer one's prayers take. But we are still only at school. Or, like Donne, "I tune my instrument here at the door." And even now--how can I weaken the words enough, how speak at all without exaggeration?--we have what seem rich moments. Most frequently, perhaps, in our momentary, only just voluntary, ejaculations; refreshments "unimplored, unsought, Happy for man so coming."

But I don't rest much on that; nor would I if it were ten times as much as it is. I have a notion that what seem our worst prayers may really be, in God's eyes, our best. Those, I mean, which are least supported by devotional feeling and contend with the greatest disinclination. For these, perhaps, being nearly all will, come from a deeper level than feeling. In feeling there is so much that is really not ours--so much that comes from weather and health or from the last book read. One thing seems certain. It is no good angling for the rich moments. God sometimes seems to speak to us most intimately when He catches us, as it were, off our guard. Our preparations to receive Him sometimes have the opposite effect. Doesn't Charles Williams say somewhere that "the altar must often be built in one place in order that the fire from heaven may descend _somewhere else_."?
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 21'

[[commentary]]
quote='''
Last week, while at prayer, I suddenly discovered--or felt as if I did--that I had forgiven someone I have been trying to forgive for over thirty years. Trying, and praying that I might. When the thing actually happened--sudden as the longed-for cessation of one's neighbour's radio--my feeling was "But it's so easy. Why didn't you do it ages ago?" So many things are done easily the moment you can do them at all. But till then, sheerly impossible, like learning to swim... Finally, and perhaps best of all, I believed anew what is taught us in the parable of the Unjust Judge. No evil habit is so ingrained nor so long prayed against (as it seemed) in vain, that it cannot, even in dry old age, be whisked away.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 20 (Paragraph 1)'
