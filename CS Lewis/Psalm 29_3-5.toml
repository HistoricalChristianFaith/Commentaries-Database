[[commentary]]
quote='''
All this is of course in one way very close to Paganism. Thor and Zeus also spoke in the thunder; Hermes or Iris was the messenger of the gods. But the difference, though subtle, is momentous, between hearing in the thunder the voice of God or the voice of a god. As we have seen, even in the creation-myths, gods have beginnings. Most of them have fathers and mothers; often we know their birthplaces. There is no question of self-existence or the timeless. Being is imposed upon them, as upon us, by preceding causes. They are, like us, creatures or products; though they are luckier than we in being stronger, more beautiful, and exempt from death. They are, like us, actors in the cosmic drama, not its authors... Thus, when you hear in the thunder the voice of a god, you are stopping short, for the voice of a god is not really a voice from beyond the world, from the uncreated. By taking the god's voice away—or envisaging the god as an angel, a servant of that Other—you go further. The thunder becomes not less divine but more. By emptying Nature of divinity—or, let us say, of divinities—you may fill her with Deity, for she is now the bearer of messages. There is a sense in which Nature-worship silences her—as if a child or a savage were so impressed with the postman's uniform that he omitted to take in the letters.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 8: Nature'

[[commentary]]
quote='''
Nature never taught me that there exists a God of glory and of infinite majesty. I had to learn that in other ways. But nature gave the word _glory_ a meaning for me. I still do not know where else I could have found one. I do not see how the "fear" of God could have ever meant to me anything but the lowest prudential efforts to be safe, if I had never seen certain ominous ravines and unapproachable crags.
'''
source_url=''
source_title='The Four Loves, Chapter 2: Likings and Loves for the Sub-human'
