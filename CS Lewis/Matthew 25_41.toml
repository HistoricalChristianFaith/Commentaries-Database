[[commentary]]
quote='''
You will remember that in the parable, the saved go to a place prepared for them, while the damned go to a place never made for men at all. To enter heaven is to become more human than you ever succeeded in being in earth; to enter hell, is to be banished from humanity. What is cast (or casts itself) into hell is not a man: it is "remains". To be a complete man means to have the passions obedient to the will and the will offered to God: to have been a man--to be an ex-man or "damned ghost"--would presumably mean to consist of a will utterly centred in its self and passions utterly uncontrolled by the will.
'''
source_url=''
source_title='The Problem of Pain, Ch. 8'
