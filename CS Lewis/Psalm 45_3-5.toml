[[commentary]]
quote='''
For us gentile Christians it is rather the other way round. We are more likely to start from the priestly, sacrificial, and intercessory character of Christ and under-stress that of king and conqueror. Psalm 110, with three other Christmas Psalms, corrects this. In 45 we have again the almost threatening tone: 'Gird thee with thy sword upon thy thigh, O thou most mighty... thy right hand shall teach thee terrible things... thy arrows are very sharp.' All this emphasises an aspect of the Nativity to which our later sentiment about Christmas (excellent in itself) does less than justice. For those who first read these Psalms as poems about the birth of Christ, that birth primarily meant something very militant; the hero, the 'judge' or champion or giant-killer, who was to fight and beat death, hell and the devils, had at last arrived, and the evidence suggests that Our Lord also thought of Himself in those terms. (Milton's poem on the Nativity well recaptures this side of Christmas.)

What I took longer to see was the full richness of that Christmas Psalm, Psalm 45, which shows us so many aspects of the Nativity we could never get from the carols or even (easily) from the gospels. This in its original intention was obviously a laureate ode on a royal wedding... And simply as a marriage ode—what the Greeks call an Epithalamium—it is magnificent. But it is far more valuable for the light it throws on the Incarnation.

Read in this sense, the Psalm restores Christmas to its proper complexity. The birth of Christ is the arrival of the great warrior and the great king. Also of the Lover, the Bridegroom, whose beauty surpasses that of man. But not only the Bridegroom as the lover, the desired; the Bridegroom also as he who makes fruitful, the father of children still to be begotten and born. (Certainly the image of a Child in a manger by no means suggests to us a king, giant-killer, bridegroom, and father. But it would not suggest the eternal Word either—if we didn't know. All alike are aspects of the same central paradox.)
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
