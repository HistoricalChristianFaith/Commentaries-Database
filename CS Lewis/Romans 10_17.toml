[[commentary]]
quote='''
There first I became an effective believer. As far as I know, the instrument was the church to which we were taken twice every Sunday. This was high "Anglo-Catholic". On the conscious level I reacted strongly against its peculiarities--was I not an Ulster Protestant, and were not these unfamiliar rituals an essential part of the hated English atmosphere? Unconsciously, I suspect, the candles and incense, the vestments and the hymns sung on our knees, may have had a considerable, and opposite, effect on me. But I do not think they were the important thing. What really mattered was that I here heard the doctrines of Christianity (as distinct from general "uplift") taught by men who obviously believed them. As I had no scepticism, the effect was to bring to life what I would already have said that I believed.
'''
source_url=''
source_title='Surprised by Joy, Ch. 2'

[[commentary]]
quote='''
Believing things on authority only means believing them because you have been told them by someone you think trustworthy. Ninety-nine per cent of the things you believe are believed on authority. I believe there is such a place as New York. I have not seen it myself. I could not prove by abstract reasoning that there must be such a place. I believe it because reliable people have told me so. The ordinary man believes in the Solar System, atoms, evolution, and the circulation of the blood on authority—because the scientists say so. Every historical statement in the world is believed on authority. None of us has seen the Norman Conquest or the defeat of the Armada. None of us could prove them by pure logic as you prove a thing in mathematics. We believe them simply because people who did see them have left writings that tell us about them: in fact, on authority. A man who jibbed at authority in other things as some people do in religion would have to be content to know nothing all his life.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 5: The Practical Conclusion'
