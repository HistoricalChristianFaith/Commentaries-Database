[[commentary]]
quote='''
In this way then, the Christian life defends the single personality from the collective, not by isolating him but by giving him the status of an organ in the mystical Body. As the book of Revelation says, he is made "a pillar in the temple of God"; and it adds, "he shall go no more out." That introduces a new side of our subject. That structural position in the Church which the humblest Christian occupies is eternal and even cosmic. The Church will outlive the universe; in it the individual person will outlive the universe. Everything that is joined to the immortal Head will share His immortality.
'''
source_url=''
source_title='The Weight of Glory, Membership'
