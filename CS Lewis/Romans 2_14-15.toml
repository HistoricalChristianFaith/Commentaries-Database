[[commentary]]
quote='''
The same argument applies to our values, which are affected by social factors, but if they are caused by them we cannot know that they are right. One can reject morality as an illusion, but the man who does so often tacitly excepts his own ethical motive: for instance the duty of freeing morality from superstition and of spreading enlightenment.
'''
source_url=''
source_title='Bulverism, from God in the Dock'

[[commentary]]
quote='''
Classical political theory, with its Stoical, Christian, and juristic key-conceptions (natural law, the value of the individual, the rights of man), has died. The modern State exists not to protect our rights but to do us good or make us good — anyway, to do something to us or to make us something. Hence the new name 'leaders' for those who were once 'rulers'. We are less their subjects than their wards, pupils, or domestic animals. There is nothing left of which we can say to them, 'Mind your own business.' Our whole lives are their business.
'''
source_url=''
source_title='Is Progress Possible? Willing Slaves of the Welfare State, from God in the Dock'

[[commentary]]
quote='''
But of course that was not what Clare meant. She meant that he had not only a legal but a moral right to act as he did. In other words, Clare is — or would be if she thought it out — a classical moralist after the style of Thomas Aquinas, Grotius, Hooker and Locke. She believes that behind the laws of the state there is a Natural Law.

I agree with her. I hold this conception to be basic to all civilization. Without it, the actual laws of the state become an absolute, as in Hegel. They cannot be criticized because there is no norm against which they should be judged.
'''
source_url=''
source_title='We Have No Right to Happiness, from God in the Dock'

[[commentary]]
quote='''
All the human beings that history has heard of acknowledge some kind of morality; that is, they feel towards certain proposed actions the experiences expressed by the words 'I ought' or 'I ought not'. These experiences resemble awe in one respect, namely that they cannot be logically deduced from the environment and physical experiences of the man who undergoes them. You can shuffle 'I want' and 'I am forced' and 'I shall be well advised' and 'I dare not' as long as you please without getting out of them the slightest hint of 'ought' and 'ought not'. ... Morality, like numinous awe, is a jump; in it, man goes beyond anything that can be 'given' in the facts of experience. ... This consciousness is neither a logical, nor an illogical, inference from the facts of experience; if we did not bring it to our experience we could not find it there. It is either inexplicable illusion, or else revelation.
'''
source_url=''
source_title='The Problem of Pain, Chapter 1: Introductory'

[[commentary]]
quote='''
I know that the Enemy disapproves many of these causes. But that is where He is so unfair. He often makes prizes of humans who have given their lives for causes He thinks bad on the monstrously sophistical ground that the humans thought them good and were following the best they knew.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters'

[[commentary]]
quote='''
This law was called the Law of Nature because people thought that every one knew it by nature and did not need to be taught it. They did not mean, of course, that you might not find an odd individual here and there who did not know it, just as you find a few people who are colour-blind or have no ear for a tune. But taking the race as a whole, they thought that the human idea of decent behaviour was obvious to every one. And I believe they were right. If they were not, then all the things we said about the war were nonsense. What was the sense in saying the enemy were in the wrong unless Right is a real thing which the Nazis at bottom knew as well as we did and ought to have practised? If they had had no notion of what we mean by right, then, though we might still have had to fight them, we could no more have blamed them for that than for the colour of their hair.

I know that some people say the idea of a Law of Nature or decent behaviour known to all men is unsound, because different civilisations and different ages have had quite different moralities. But this is not true. There have been differences between their moralities, but these have never amounted to anything like a total difference. If anyone will take the trouble to compare the moral teaching of, say, the ancient Egyptians, Babylonians, Hindus, Chinese, Greeks and Romans, what will really strike him will be how very like they are to each other and to our own.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 1: The Law of Human Nature'

[[commentary]]
quote='''
The law of gravity tells you what stones do if you drop them; but the Law of Human Nature tells you what human beings ought to do and do not. In other words, when you are dealing with humans, something else comes in above and beyond the actual facts. You have the facts (how men do behave) and you also have something else (how they ought to behave). In the rest of the universe there need not be anything but the facts. Electrons and molecules behave in a certain way, and certain results follow, and that may be the whole story. But men behave in a certain way and that is not the whole story, for all the time you know that they ought to behave differently.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 3: The Reality of the Law'

[[commentary]]
quote='''
Consequently, this Rule of Right and Wrong, or Law of Human Nature, or whatever you call it, must somehow or other be a real thing—a thing that is really there, not made up by ourselves. And yet it is not a fact in the ordinary sense, in the same way as our actual behaviour is a fact. It begins to look as if we shall have to admit that there is more than one kind of reality; that, in this particular case, there is something above and beyond the ordinary facts of men's behaviour, and yet quite definitely real—a real law, which none of us made, but which we find pressing on us.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 3: The Reality of the Law'

[[commentary]]
quote='''
I do not succeed in keeping the Law of Nature very well, and the moment anyone tells me I am not keeping it, there starts up in my mind a string of excuses as long as your arm. The question at the moment is not whether they are good excuses. The point is that they are one more proof of how deeply, whether we like it or not, we believe in the Law of Nature. If we do not believe in decent behaviour, why should we be so anxious to make excuses for not having behaved decently? The truth is, we believe in decency so much—we feel the Rule of Law pressing on us so—that we cannot bear to face the fact that we are breaking it, and consequently we try to shift the responsibility. For you notice that it is only for our bad behaviour that we find all these explanations. It is only our bad temper that we put down to being tired or worried or hungry; we put our good temper down to ourselves.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 1: The Law of Human Nature'

[[commentary]]
quote='''
[Arguing that the Moral Law is not reducible to herd instinct, but is a higher principle that judges between instincts]

Now I do not deny that we may have a herd instinct: but that is not what I mean by the Moral Law. We all know what it feels like to be prompted by instinct—by mother love, or sexual instinct, or the instinct for food. It means that you feel a strong want or desire to act in a certain way. And, of course, we sometimes do feel just that sort of desire to help another person: and no doubt that desire is due to the herd instinct. But feeling a desire to help is quite different from feeling that you ought to help whether you want to or not. Supposing you hear a cry for help from a man in danger. You will probably feel two desires—one a desire to give help (due to your herd instinct), the other a desire to keep out of danger (due to the instinct for self-preservation). But you will find inside you, in addition to these two impulses, a third thing which tells you that you ought to follow the impulse to help, and suppress the impulse to run away. Now this thing that judges between two instincts, that decides which should be encouraged, cannot itself be either of them. You might as well say that the sheet of music which tells you, at a given moment, to play one note on the piano and not another, is itself one of the notes on the keyboard. The Moral Law tells us the tune we have to play: our instincts are merely the keys.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 2: Some Objections'

[[commentary]]
quote='''
[Arguing that the existence of moral progress proves an objective moral standard independent of human convention]

The other reason is this. When you think about these differences between the morality of one people and another, do you think that the morality of one people is ever better or worse than that of another? Have any of the changes been improvements? If not, then of course there could never be any moral progress. Progress means not just changing, but changing for the better. If no set of moral ideas were truer or better than any other, there would be no sense in preferring civilised morality to savage morality, or Christian morality to Nazi morality. In fact, of course, we all do believe that some moralities are better than others. We do believe that some of the people who tried to change the moral ideas of their own age were what we would call Reformers or Pioneers—people who understood morality better than their neighbours did. Very well then. The moment you say that one set of moral ideas can be better than another, you are, in fact, measuring them both by a standard, saying that one of them conforms to that standard more nearly than the other. But the standard that measures two things is something different from either. You are, in fact, comparing them both with some Real Morality, admitting that there is such a thing as a real Right, independent of what people think, and that some people's ideas get nearer to that real Right than others. Or put it this way. If your moral ideas can be truer, and those of the Nazis less true, there must be something—some Real Morality—for them to be true about. The reason why your idea of New York can be truer or less true than mine is that New York is a real place, existing quite apart from what either of us thinks. If when each of us said 'New York' each means merely 'The town I am imagining in my own head', how could one of us have truer ideas than the other? There would be no question of truth or falsehood at all. In the same way, if the Rule of Decent Behaviour meant simply 'whatever each nation happens to approve', there would be no sense in saying that any one nation had ever been more correct in its approval than any other; no sense in saying that the world could ever grow morally better or morally worse.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 2: Some Objections'

[[commentary]]
quote='''
[On how the very attempt to argue against God from the injustice of the universe presupposes an objective standard of justice — and thus points back to God]

My argument against God was that the universe seemed so cruel and unjust. But how had I got this idea of just and unjust? A man does not call a line crooked unless he has some idea of a straight line. What was I comparing this universe with when I called it unjust? If the whole show was bad and senseless from A to Z, so to speak, why did I, who was supposed to be part of the show, find myself in such violent reaction against it? A man feels wet when he falls into water, because man is not a water animal: a fish would not feel wet. Of course I could have given up my idea of justice by saying it was nothing but a private idea of my own. But if I did that, then my argument against God collapsed too—for the argument depended on saying that the world was really unjust, not simply that it did not happen to please my fancies. Thus in the very act of trying to prove that God did not exist—in other words, that the whole of reality was senseless—I found I was forced to assume that one part of reality—namely my idea of justice—was full of sense. Consequently atheism turns out to be too simple.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 1: The Rival Conceptions of God'

[[commentary]]
quote='''
We have two bits of evidence about the Somebody. One is the universe He has made. If we used that as our only clue, then I think we should have to conclude that He was a great artist (for the universe is a very beautiful place), but also that He is quite merciless and no friend to man (for the universe is a very dangerous and terrifying place). The other bit of evidence is that Moral Law which He has put into our minds. And this is a better bit of evidence than the other, because it is inside information. You find out more about God from the Moral Law than from the universe in general just as you find out more about a man by listening to his conversation than by looking at a house he has built.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 5: We Have Cause to be Uneasy'

[[commentary]]
quote='''
Suppose someone asked me, when I see a man in blue uniform going down the street leaving little paper packets at each house, why I suppose that they contain letters? I should reply, 'Because whenever he leaves a similar little packet for me I find it does contain a letter.' And if he then objected—'But you've never seen all these letters which you think the other people are getting,' I should say, 'Of course not, and I shouldn't expect to, because they're not addressed to me. I'm explaining the packets I'm not allowed to open by the ones I am allowed to open.' It is the same about this question. The only packet I am allowed to open is Man. When I do, especially when I open that particular man called Myself, I find that I do not exist on my own, that I am under a law; that somebody or something wants me to behave in a certain way.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 4: What Lies Behind the Law'
