[[commentary]]
quote='''
Others again would say that Friendship is extremely useful, perhaps necessary for survival, to the individual. They could produce plenty of authority: "bare is back without brother behind it" and "there is a friend that sticketh closer than a brother". But when we speak thus we are using friend to mean "ally". In ordinary usage friend means, or should mean, more than that. A Friend will, to be sure, prove himself to be also an ally when alliance becomes necessary; will lend or give when we are in need, nurse us in sickness, stand up for us among our enemies, do what he can for our widows and orphans. But such good offices are not the stuff of Friendship. The occasions for them are almost interruptions.
'''
source_url=''
source_title='The Four Loves, Chapter IV - Friendship'
