[[commentary]]
quote='''
For the essence of religion, in my view, is the thirst for an end higher than natural ends; the finite self's desire for, and acquiescence in, and self-rejection in favor of, an object wholly good and wholly good for it. That the self-rejection will turn out to be also a self-finding, that bread cast upon the waters will be found after many days, that to die is to live—these are sacred paradoxes of which the human race must not be told too soon.
'''
source_url=''
source_title='God in the Dock: Religion Without Dogma?'

[[commentary]]
quote='''
For union exists only between distincts; and, perhaps, from this point of view, we catch a momentary glimpse of the meaning of all things. Pantheism is a creed not so much false as hopelessly behind the times. Once, before creation, it would have been true to say that everything was God. But God created: He caused things to be other than Himself that, being distinct, they might learn to love Him, and achieve union instead of mere sameness. Thus He also cast His bread upon the waters.
'''
source_url=''
source_title='The Problem of Pain, Ch. 10'
