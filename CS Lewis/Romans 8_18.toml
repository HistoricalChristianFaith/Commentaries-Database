[[commentary]]
quote='''
"I reckon", said St. Paul, "that the sufferings of this present time are not worthy to be compared with the glory that shall be revealed in us." If this is so, a book on suffering which says nothing of heaven, is leaving out almost the whole of one side of the account. Scripture and tradition habitually put the joys of heaven into the scale against the sufferings of earth, and no solution of the problem of pain which does not do so can be called a Christian one. We are very shy nowadays of even mentioning heaven. We are afraid of the jeer about "pie in the sky", and of being told that we are trying to "escape" from the duty of making a happy world here and now into dreams of a happy world elsewhere. But either there is "pie in the sky" or there is not. If there is not, then Christianity is false, for this doctrine is woven into its whole fabric. If there is, then this truth, like any other, must be faced, whether it is useful at political meetings or no.
'''
source_url=''
source_title='The Problem of Pain, Ch. 10'

[[commentary]]
quote='''
Life at a vile boarding-school is in this way a good preparation for the Christian life, that it teaches one to live by hope. Even, in a sense, by faith; for at the beginning of each term, home and the holidays are so far off that it is as hard to realise them as to realise heaven. They have the same pitiful unreality when confronted with immediate horrors. To-morrow's geometry blots out the distant end of term as to-morrow's operation may blot out the hope of Paradise. And yet, term after term, the unbelievable happened. Fantastical and astronomical figures like "This time six weeks" shrank into practicable figures like "This time next week", and then "This time to-morrow", and the almost supernatural bliss of the Last Day punctually appeared. It was a delight that almost demanded to be stayed with flagons and comforted with apples; a delight that tingled down the spine and troubled the belly and at moments went near to stopping the breath.
'''
source_url=''
source_title='Surprised by Joy, Ch. 2'
