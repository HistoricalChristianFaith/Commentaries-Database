[[commentary]]
quote='''
In the same way an early peasant Christian might have thought that Christ's sitting at the right hand of the Father really implied two chairs of state, in a certain spatial relation, inside a sky palace. But if the same man afterwards received a philosophical education and discovered that God has no body, parts, or passions, and therefore neither a right hand nor a palace, he would not have felt that the essentials of his belief had been altered. What had mattered to him, even in the days of his simplicity, had not been supposed details about celestial furniture. It had been the assurance that the once-crucified Master was now the supreme Agent or the unimaginable power on whom the whole universe depends. And he would recognize that in this he had never been deceived.
'''
source_url=''
source_title='Horrid Red Things, from God in the Dock'

[[commentary]]
quote='''
The dazzlingly obvious conclusion now arose in my mind: in the whole history of the universe the Laws of Nature have never produced a single event. They are the pattern to which every event must conform, provided only that it can be induced to happen. But how do you get it to do that? How do you get a move on? The Laws of Nature can give you no help there. All events obey them, just as all operations with money obey the laws of arithmetic. Add six pennies to six and the result will certainly be a shilling. But arithmetic by itself won't put one farthing into your pocket. Up till now I had had a vague idea that the Laws of Nature could make things happen. I now saw that this was exactly like thinking that you could increase your income by doing sums about it. The laws are the pattern to which events conform: the source of events must be sought elsewhere.

It is certainly a possible supposition that behind this mystery some mighty will and life is at work. If so, any contrast between His acts and the Laws of Nature is out of the question. It is His act alone that gives the laws any events to apply to. The laws are an empty frame; It is He who fills that frame—not now and then on specially "providential" occasions, but at every moment.
'''
source_url=''
source_title='The Laws of Nature, from God in the Dock'

[[commentary]]
quote='''
In the same way we must think of the Son always, so to speak, streaming forth from the Father, like light from a lamp, or heat from a fire, or thoughts from a mind. He is the self-expression of the Father—what the Father has to say. And there never was a time when He was not saying it. But have you noticed what is happening? All these pictures of light or heat are making it sound as if the Father and Son were two things instead of two Persons. So that after all, the New Testament picture of a Father and a Son turns out to be much more accurate than anything we try to substitute for it. That is what always happens when you go away from the words of the Bible. It is quite right to go away from them for a moment in order to make some special point clear. But you must always go back. Naturally God knows how to describe Himself much better than we know how to describe Him. He knows that Father and Son is more like the relation between the First and Second Persons than anything else we can think of. Much the most important thing to know is that it is a relation of love. The Father delights in His Son; the Son looks up to His Father.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 4: Good Infection'
