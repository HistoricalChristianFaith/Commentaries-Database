[[commentary]]
quote='''
You tell me "she goes on". But my heart and body are crying out, come back, come back. Be a circle, touching my circle on the plane of Nature. But I know this is impossible. I know that the thing I want is exactly the thing I can never get. The old life, the jokes, the drinks, the arguments, the love-making, the tiny, heartbreaking commonplace. On any view whatever, to say "H. is dead", is to say "All that is gone". It is a part of the past. And the past is the past and that is what time means, and time itself is one more name for death, and Heaven itself is a state where "the former things have passed away".
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-agriefobserved/lewiscs-agriefobserved-00-h.html'
source_title='A Grief Observed, Chapter II'
