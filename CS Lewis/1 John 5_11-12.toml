[[commentary]]
quote='''
The Biological sort which comes to us through Nature, and which (like everything else in Nature) is always tending to run down and decay so that it can only be kept up by incessant subsidies from Nature in the form of air, water, food, etc., is Bios. The Spiritual life which is in God from all eternity, and which made the whole natural universe, is Zoe. Bios has, to be sure, a certain shadowy or symbolic resemblance to Zoe: but only the sort of resemblance there is between a photo and a place, or a statue and a man.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 1: Making and Begetting'
