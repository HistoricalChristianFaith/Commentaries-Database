[[commentary]]
quote='''
As everyone knows, the Psalm specially devoted to the Law is 119, the longest in the whole collection. And everyone has probably noticed that from the literary or technical point of view, it is the most formal and elaborate of them all. The technique consists in taking a series of words which are all, for purposes of this poem, more or less synonyms (word, statutes, commandments, testimonies, etc.), and ringing the changes on them through each of its eight-verse sections—which themselves correspond to the letters of the alphabet. In other words, this poem is not, and does not pretend to be, a sudden outpouring of the heart like, say, Psalm 18. It is a pattern, a thing done like embroidery, stitch by stitch, through long, quiet hours, for love of the subject and for the delight in leisurely, disciplined craftsmanship.

Now this, in itself, seems to me very important because it lets us into the mind and mood of the poet. We can guess at once that he felt about the Law somewhat as he felt about his poetry; both involved exact and loving conformity to an intricate pattern. This at once suggests an attitude from which the Pharisaic conception could later grow but which in itself, though not necessarily religious, is quite innocent. It will look like priggery or pedantry (or else like a neurotic fussiness) to those who cannot sympathise with it, but it need not be any of these things. It may be the delight in Order, the pleasure in getting a thing 'just so'—as in dancing a minuet. Of course the poet is well aware that something incomparably more serious than a minuet is here in question. He is also aware that he is very unlikely, himself, to achieve this perfection of discipline: 'O that my ways were made so straight that I might keep thy statutes!' (5). At present they aren't, and he can't. But his effort to do so does not spring from servile fear. The Order of the Divine mind, embodied in the Divine Law, is beautiful. What should a man do but try to reproduce it, so far as possible, in his daily life? His 'delight' is in those statutes (16); to study them is like finding treasure (14); they affect him like music, are his 'songs' (54); they taste like honey (103); they are better than silver and gold (72). As one's eyes are more and more opened, one sees more and more in them, and it excites wonder (18). This is not priggery nor even scrupulosity; it is the language of a man ravished by a moral beauty. If we cannot at all share his experience, we shall be the losers.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter VI: Sweeter Than Honey'
