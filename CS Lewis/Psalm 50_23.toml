[[commentary]]
quote='''
Worst of all was the statement put into God's own mouth, 'whoso offereth me thanks and praise, he honoureth me' (50:23). It was hideously like saying, 'What I most want is to be told that I am good and great.' [...] But the most obvious fact about praise—whether of God or anything—strangely escaped me. I thought of it in terms of compliment, approval, or the giving of honour. I had never noticed that all enjoyment spontaneously overflows into praise unless (sometimes even if) shyness or the fear of boring others is deliberately brought in to check it. The world rings with praise—lovers praising their mistresses, readers their favourite poet, walkers praising the countryside, players praising their favourite game [...] I had not noticed how the humblest, and at the same time most balanced and capacious, minds praised most, while the cranks, misfits, and malcontents praised least. [...] I had not noticed either that just as men spontaneously praise whatever they value, so they spontaneously urge us to join them in praising it: 'Isn't she lovely? Wasn't it glorious? Don't you think that magnificent?' The Psalmists in telling everyone to praise God are doing what all men do when they speak of what they care about. My whole, more general, difficulty about the praise of God depended on my absurdly denying to us, as regards the supremely Valuable, what we delight to do, what indeed we can't help doing, about everything else we value.

I think we delight to praise what we enjoy because the praise not merely expresses but completes the enjoyment; it is its appointed consummation. It is not out of compliment that lovers keep on telling one another how beautiful they are; the delight is incomplete till it is expressed. [...] The Scotch catechism says that man's chief end is 'to glorify God and enjoy Him forever'. But we shall then know that these are the same thing. Fully to enjoy is to glorify. In commanding us to glorify Him, God is inviting us to enjoy Him.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 9: A Word About Praising'
