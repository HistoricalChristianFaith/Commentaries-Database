[[commentary]]
quote='''
Most of the man's psychological makeup is probably due to his body: when his body dies all that will fall off him, and the real central man, the thing that chose, that made the best or the worst out of this material, will stand naked. All sorts of nice things which we thought our own, but which were really due to a good digestion, will fall off some of us: all sorts of nasty things which were due to complexes or bad health will fall off others. We shall then, for the first time, see every one as he really was. There will be surprises.
'''
source_url=''
source_title='Mere Christianity, Book 3, Chapter 4: Morality and Psychoanalysis'
