[[commentary]]
quote='''
In one respect, as many Christians have noticed, contemporary science has recently come into line with Christian doctrine, and parted company with the classical forms of materialism. If anything emerges clearly from modern physics, it is that nature is not everlasting. The universe had a beginning, and will have an end. But the great materialistic systems of the past all believed in the eternity, and thence in the self-existence of matter. As Professor Whittaker said in the Riddell Lectures of 1942, "It was never possible to oppose seriously the dogma of the Creation except by maintaining that the world has existed from all eternity in more or less its present state." This fundamental ground for materialism has now been withdrawn. We should not lean too heavily on this, for scientific theories change. But at the moment it appears that the burden of proof rests, not on us, but on those who deny that Nature has some cause beyond herself.
'''
source_url=''
source_title='Dogma and the Universe, from God in the Dock'

[[commentary]]
quote='''
For the first time in my life I began to look at the question with both eyes open. In the world I know, the perfect produces the imperfect, which again becomes perfect — egg leads to bird and bird to egg — in endless succession. If there ever was a life which sprang of its own accord out of a purely inorganic universe, or a civilization which raised itself by its own shoulder-straps out of pure savagery, then this event was totally unlike the beginnings of every subsequent life and every subsequent civilization. The thing may have happened; but all its plausibility is gone. On any view, the first beginning must have been outside the ordinary processes of nature. An egg which came from no bird is no more 'natural' than a bird which had existed from all eternity. And since the egg-bird-egg sequence leads us to no plausible beginning, is it not reasonable to look for the real origin somewhere outside sequence altogether? You have to go outside the sequence of engines, into the world of men, to find the real originator of the Rocket. Is it not equally reasonable to look outside Nature for the real Originator of the natural order?
'''
source_url=''
source_title='Two Lectures, from God in the Dock'

[[commentary]]
quote='''
Evidently, then, something beyond Nature exists. Man is on the border line between the Natural and the Supernatural. Material events cannot produce spiritual activity, but the latter can be responsible for many of our actions on Nature. Will and Reason cannot depend on anything but themselves, but Nature can depend on Will and Reason, or, in other words, God created Nature.
'''
source_url=''
source_title='Bulverism, from God in the Dock'

[[commentary]]
quote='''
I won't admit without a struggle that when I speak of God "uttering" or "inventing" the creatures I am "watering down the concept of creation." I am trying to give it, by remote analogies, some sort of content. I know that to create is defined as "to make out of nothing," ex nihilo. But I take that to mean "not out of any pre-existing material." It can't mean that God makes what God has not thought of, or that He gives His creatures any powers or beauties which He Himself does not possess. Why, we think that even human work comes nearest to creation when the maker has "got it all out of his own head."

Nor am I suggesting a theory of "emanations". The differentia of an "emanation"—literally an overflowing, a trickling out—would be that it suggests something involuntary. But my words—"uttering" and "inventing"—are meant to suggest an act.

This act, as it is for God, must always remain totally inconceivable to man. For we—even our poets and musicians and inventors—never, in the ultimate sense, make. We only build. We always have materials to build from. All we can know about the act of creation must be derived from what we can gather about the relation of the creatures to their Creator.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 14'
