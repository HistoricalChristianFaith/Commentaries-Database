[[commentary]]
quote='''
A perfect love, we know, casts out fear. But so do several other things—ignorance, alcohol, passion, presumption, and stupidity. It is very desirable that we should all advance to that perfection of love in which we shall fear no longer. But it is very undesirable, until we have reached that stage, that we should allow any inferior agent to cast out our fear.
'''
source_url='https://web.archive.org/web/20240515192922/https://singjupost.com/c-s-lewis-the-worlds-last-night-transcript/?singlepage=1'
source_title="The World's Last Night (Essay)"

[[commentary]]
quote='''
But hatred is best combined with Fear. Cowardice, alone of all the vices, is purely painful—horrible to anticipate, horrible to feel, horrible to remember; Hatred has its pleasures. It is therefore often the compensation by which a frightened man reimburses himself for the miseries of Fear. The more he fears, the more he will hate. And Hatred is also a great anodyne for shame. To make a deep wound in his charity, you should therefore first defeat his courage.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters'
