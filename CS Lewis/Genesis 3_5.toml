[[commentary]]
quote='''
Someone or something whispered that they could become as gods--that they could cease directing their lives to their Creator and taking all their delights as uncovenanted mercies, as "accidents" (in the logical sense) which arose in the course of a life directed not to those delights but to the adoration of God. As a young man wants a regular allowance from his father which he can count on as his own, within which he makes his own plans (and rightly, for his father is after all a fellow creature) so they desired to be on their own, to take care for their own future, to plan for pleasure and for security, to have a meum from which, no doubt, they would pay some reasonable tribute to God in the way of time, attention, and love, but which nevertheless, was theirs not His. They wanted, as we say, to "call their souls their own". But that means to live a lie, for our souls are not, in fact, our own. They wanted some corner in the universe of which they could say to God, "This is our business, not yours." But there is no such corner. They wanted to be nouns, but they were, and eternally must be, mere adjectives.
'''
source_url=''
source_title='The Problem of Pain, Chapter 5: The Fall of Man'
