[[commentary]]
quote='''
The idolatry I speak of can be seen in the popular misinterpretation of Our Lord's words "Her sins, which are many, are forgiven her, for she loved much" (Luke 7:47). From the context, and especially from the preceding parable of the debtors, it is clear that this must mean: "The greatness of her love for Me is evidence of the greatness of the sins I have forgiven her." (The "for" here is like the "for" in "He can't have gone out, for his hat is still hanging in the hall"; the presence of the hat is not the cause of his being in the house but a probable proof that he is). But thousands of people take it quite differently. They first assume, with no evidence, that her sins were sins against chastity, though, for all we know, they may have been usury, dishonest shopkeeping, or cruelty to children. And they then take Our Lord to be saying, "I forgive her unchastity because she was so much in love." The implication is that a great Eros extenuates—almost sanctions—almost sanctifies—any actions it leads to.
'''
source_url=''
source_title='The Four Loves, Chapter 5: Eros'
