[[commentary]]
quote='''
The examples which (in me at any rate) can hardly fail to produce a smile may occur most disquietingly in Psalms we love. Even more naïvely, almost childishly, 139, in the middle of its hymn of praise, throws in (19) "Wilt thou not slay the wicked, O God?"—as if it were surprising that such a simple remedy for human ills had not occurred to the Almighty.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 3: The Cursings'
