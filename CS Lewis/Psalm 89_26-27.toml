[[commentary]]
quote='''
In 89 we have the promises to David (who would certainly mean all, or any, of David's successors, just as 'Jacob' can mean all his descendants). 'David' will call God 'Father', and God says 'I will make him my first-born', that is 'I will make him an eldest son', make him my heir, give him the whole world. All this emphasises an aspect of the Nativity to which our later sentiment about Christmas does less than justice. For those who first read these Psalms as poems about the birth of Christ, that birth primarily meant something very militant; the hero, the 'judge' or champion or giant-killer, who was to fight and beat death, hell and the devils, had at last arrived, and the evidence suggests that Our Lord also thought of Himself in those terms.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
