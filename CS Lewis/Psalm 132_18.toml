[[commentary]]
quote='''
In 132 we have 'David' again; 'As for his enemies, I shall clothe them with shame, but upon himself shall his crown flourish'. All this emphasises an aspect of the Nativity to which our later sentiment about Christmas (excellent in itself) does less than justice. For those who first read these Psalms as poems about the birth of Christ, that birth primarily meant something very militant; the hero, the 'judge' or champion or giant-killer, who was to fight and beat death, hell and the devils, had at last arrived, and the evidence suggests that Our Lord also thought of Himself in those terms. (Milton's poem on the Nativity well recaptures this side of Christmas.)
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
