[[commentary]]
quote='''
[Reflecting on his own atheism as a schoolboy, Lewis describes the self-contradictions of the antitheist position as evidence that knowledge of God persists even in denial]

I was at this time living, like so many Atheists or Antitheists, in a whirl of contradictions. I maintained that God did not exist. I was also very angry with God for not existing. I was equally angry with Him for creating a world.
'''
source_url=''
source_title='Surprised by Joy, Chapter 7: Light and Shade'
