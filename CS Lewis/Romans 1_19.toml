[[commentary]]
quote='''
[Reflecting on his own atheism as a schoolboy, Lewis describes the self-contradictions of the antitheist position as evidence that knowledge of God persists even in denial]

I was at this time living, like so many Atheists or Antitheists, in a whirl of contradictions. I maintained that God did not exist. I was also very angry with God for not existing. I was equally angry with Him for creating a world.
'''
source_url=''
source_title='Surprised by Joy, Chapter 7: Light and Shade'

[[commentary]]
quote='''
But the most remarkable thing is this. Whenever you find a man who says he does not believe in a real Right and Wrong, you will find the same man going back on this a moment later. He may break his promise to you, but if you try breaking one to him he will be complaining 'It's not fair' before you can say Jack Robinson. A nation may say treaties don't matter; but then, next minute, they spoil their case by saying that the particular treaty they want to break was an unfair one. But if treaties do not matter, and if there is no such thing as Right and Wrong—in other words, if there is no Law of Nature—what is the difference between a fair treaty and an unfair one? Have they not let the cat out of the bag and shown that, whatever they say, they really know the Law of Nature just like anyone else?

It seems, then, we are forced to believe in a real Right and Wrong. People may be sometimes mistaken about them, just as people sometimes get their sums wrong; but they are not a matter of mere taste and opinion any more than the multiplication table.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 1: The Law of Human Nature'

[[commentary]]
quote='''
[Arguing that the universality of the Moral Law across cultures proves it is a real truth discoverable in human nature, not a mere social invention]

I fully agree that we learn the Rule of Decent Behaviour from parents and teachers, and friends and books, as we learn everything else. But some of the things we learn are mere conventions which might have been different—we learn to keep to the left of the road, but it might just as well have been the rule to keep to the right—and others of them, like mathematics, are real truths. The question is to which class the Law of Human Nature belongs. There are two reasons for saying it belongs to the same class as mathematics. The first is, as I said in the first chapter, that though there are differences between the moral ideas of one time or country and those of another, the differences are not really very great—not nearly so great as most people imagine—and you can recognise the same law running through them all: whereas mere conventions, like the rule of the road or the kind of clothes people wear, may differ to any extent.
'''
source_url=''
source_title='Mere Christianity, Book 1, Chapter 2: Some Objections'

[[commentary]]
quote='''
I remember once when I had been giving a talk to the R.A.F., an old, hard-bitten officer got up and said, 'I've no use for all that stuff. But, mind you, I'm a religious man too. I know there's a God. I've felt Him: out alone in the desert at night: the tremendous mystery. And that's just why I don't believe all your neat little dogmas and formulas about Him. To anyone who's met the real thing they all seem so petty and pedantic and unreal!'

Now in a sense I quite agreed with that man. I think he had probably had a real experience of God in the desert. And when he turned from that experience to the Christian creeds, I think he really was turning from something real to something less real. In the same way, if a man has once looked at the Atlantic from the beach, and then goes and looks at a map of the Atlantic, he also will be turning from something real to something less real: turning from real waves to a bit of coloured paper. But here comes the point. The map is admittedly only coloured paper, but there are two things you have to remember about it. In the first place, it is based on what hundreds and thousands of people have found out by sailing the real Atlantic. In that way it has behind it masses of experience just as real as the one you could have from the beach; only, while yours would be a single glimpse, the map fits all those different experiences together. In the second place, if you want to go anywhere, the map is absolutely necessary. As long as you are content with walks on the beach, your own glimpses are far more fun than looking at a map. But the map is going to be more use than walks on the beach if you want to get to America.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 1: Making and Begetting'
