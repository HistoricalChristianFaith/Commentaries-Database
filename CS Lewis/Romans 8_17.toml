[[commentary]]
quote='''
The sense in which a Christian leaves it to God is that he puts all his trust in Christ: trusts that Christ will somehow share with him the perfect human obedience which He carried out from His birth to His crucifixion: that Christ will make the man more like Himself and, in a sense, make good his deficiencies. In Christian language, He will share His 'sonship' with us, will make us, like Himself, 'Sons of God': in Book IV I shall attempt to analyse the meaning of those words a little further.
'''
source_url=''
source_title='Mere Christianity, Book 3, Chapter 12: Faith'
