[[commentary]]
quote='''
The Ethiopian eunuch who met Philip (Acts 8:27–38) was reading Isaiah 53. He did not know whether in that passage the prophet was talking about himself or about someone else. Philip, in answering his question, 'preached unto him Jesus'. The answer, in fact, was 'Isaiah is speaking of Jesus'. We need have no doubt that Philip's authority for this interpretation was Our Lord. (Our ancestors would have thought that Isaiah consciously foresaw the sufferings of Christ as people see the future in the sort of dreams recorded by Mr Dunne. Modern scholars would say, that on the conscious level, he was referring to Israel itself, the whole nation personified. I do not see that it matters which view we take.)
'''
source_url=''
source_title='Reflections on the Psalms, Chapter XI: Scripture'
