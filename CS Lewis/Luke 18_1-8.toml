[[commentary]]
quote='''
Last week, while at prayer, I suddenly discovered--or felt as if I did--that I had forgiven someone I have been trying to forgive for over thirty years. Trying, and praying that I might. When the thing actually happened--sudden as the longed-for cessation of one's neighbour's radio--my feeling was "But it's so easy. Why didn't you do it ages ago?" So many things are done easily the moment you can do them at all. But till then, sheerly impossible, like learning to swim... Finally, and perhaps best of all, I believed anew what is taught us in the parable of the Unjust Judge. No evil habit is so ingrained nor so long prayed against (as it seemed) in vain, that it cannot, even in dry old age, be whisked away.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 20 (Paragraph 1)'

[[commentary]]
quote='''
Notice what He means by "an unjust judge". By those words most of us would mean someone like Judge Jeffreys or the creatures who sat on the benches of German tribunals during the Nazi régime: someone who bullies witnesses and jurymen in order to convict, and then savagely to punish, innocent men. Once again, we are thinking of a criminal trial. We hope we shall never appear in the dock before such a judge. But the Unjust Judge in the parable is quite a different character. There is no danger of appearing in his court against your will: the difficulty is the opposite—to get into it. It is clearly a civil action. The poor woman (Luke 18:1–5) has had her little strip of land—room for a pigsty or a hen-run—taken away from her by a richer and more powerful neighbour (nowadays it would be Town-Planners or some other "Body"). And she knows she has a perfectly watertight case. If once she could get it into court and have it tried by the laws of the land, she would be bound to get that strip back. But no one will listen to her, she can't get it tried. No wonder she is anxious for "judgement".

Behind this lies an age-old and almost world-wide experience which we have been spared. In most places and times it has been very difficult for the "small man" to get his case heard. The judge (and, doubtless, one or two of his underlings) has to be bribed. If you can't afford to "oil his palm" your case will never reach court. Our judges do not receive bribes. (We probably take this blessing too much for granted; it will not remain with us automatically.) We need not therefore be surprised if the Psalms, and the Prophets, are full of the longing for judgement, and regard the announcement that "judgement" is coming as good news. Hundreds and thousands of people who have been stripped of all they possess and who have the right entirely on their side will at last be heard. Of course they are not afraid of judgement. They know their case is unanswerable—if only it could be heard. When God comes to judge, at last it will.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 2: Judgement in the Psalms'
