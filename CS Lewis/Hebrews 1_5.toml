[[commentary]]
quote='''
One of the creeds says that Christ is the Son of God 'begotten, not created'; and it adds 'begotten by his Father before all worlds'. Will you please get it quite clear that this has nothing to do with the fact that when Christ was born on earth as a man, that man was the son of a virgin? We are not now thinking about the Virgin Birth. We are thinking about something that happened before Nature was created at all, before time began. 'Before all worlds' Christ is begotten, not created. What does it mean?

We don't use the words begetting or begotten much in modern English, but everyone still knows what they mean. To beget is to become the father of: to create is to make. And the difference is this. When you beget, you beget something of the same kind as yourself. A man begets human babies, a beaver begets little beavers and a bird begets eggs which turn into little birds. But when you make, you make something of a different kind from yourself. A bird makes a nest, a beaver builds a dam, a man makes a wireless set—or he may make something more like himself than a wireless set: say, a statue. If he is a clever enough carver he may make a statue which is very like a man indeed. But, of course, it is not a real man; it only looks like one. It cannot breathe or think. It is not alive.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 1: Making and Begetting'

[[commentary]]
quote='''
All Christians are agreed that there is, in the full and original sense, only one 'Son of God'. If we insist on asking 'But could there have been many?' we find ourselves in very deep water. Have the words 'Could have been' any sense at all when applied to God? You can say that one particular finite thing 'could have been' different from what it is, because it would have been different if something else had been different, and the something else would have been different if some third thing had been different, and so on. (The letters on this page would have been red if the printer had used red ink, and he would have used red ink if he had been instructed to, and so on.) But when you are talking about God—i.e. about the rock bottom, irreducible Fact on which all other facts depend—it is nonsensical to ask if it could have been otherwise. It is what it is, and there is an end of the matter. But quite apart from this, I find a difficulty about the very idea of the Father begetting many sons from all eternity. In order to be many they would have to be somehow different from one another. Two pennies have the same shape. How are they two? By occupying different places and containing different atoms. In other words, to think of them as different, we have had to bring in space and matter; in fact we have had to bring in 'Nature' or the created universe. I can understand the distinction between the Father and the Son without bringing in space or matter, because the one begets and the other is begotten. The Father's relation to the Son is not the same as the Son's relation to the Father. But if there were several sons they would all be related to one another and to the Father in the same way. How would they differ from one another? One does not notice the difficulty at first, of course. One thinks one can form the idea of several 'sons'. But when I think closely, I find that the idea seemed possible only because I was vaguely imagining them as human forms standing about together in some kind of space. In other words, though I pretended to be thinking about something that exists before any universe was made, I was really smuggling in the picture of a universe and putting that something inside it. When I stop doing that and still try to think of the Father begetting many sons 'before all worlds' I find I am not really thinking of anything. The idea fades away into mere words.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 6: Two Notes'
