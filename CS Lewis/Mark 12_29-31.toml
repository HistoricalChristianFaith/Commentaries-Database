[[commentary]]
quote='''
Here is the paradox of Christianity. As practical imperatives for here and now the two great commandments have to be translated "Behave as if you loved God and man." For no man can love because he is told to. Yet obedience on this practical level is not really obedience at all. And if a man really loved God and man, once again this would hardly be obedience; for if he did, he would be unable to help it. Thus the command really says to us, "Ye must be born again." Till then, we have duty, morality, the Law. A schoolmaster, as St. Paul says, to bring us to Christ. We must expect no more of it than of a schoolmaster; we must allow it no less. I must say my prayers today whether I feel devout or not; but that is only as I must learn my grammar if I am ever to read the poets.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 21'

[[commentary]]
quote='''
And now that I come to think of it, there's no practical problem before me at all. I know the two great commandments, and I'd better get on with them. Indeed, H's death has ended the practical problem. While she was alive I could, in practice, have put her before God; that is, could have done what she wanted instead of what He wanted; if there'd been a conflict. What's left is not a problem about anything I could _do_. It's all about weights of feelings and motives and that sort of thing. It's a problem I'm setting myself. I don't believe God set it me at all.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-agriefobserved/lewiscs-agriefobserved-00-h.html'
source_title='A Grief Observed, Chapter IV'