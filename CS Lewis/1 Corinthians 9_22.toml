[[commentary]]
quote='''
The old Prayer Book prayed that the magistrates might 'truly and indifferently administer justice'. Then the revisers thought they would make this easier by altering indifferently to impartially. A country clergyman of my acquaintance asked his sexton what he thought indifferently meant, and got the correct answer, 'It means making no difference between one chap and another.' 'And what', continued the parson, 'do you think impartially means?' 'Ah', said the sexton after a pause, 'I wouldn't know that.' Everyone sees what the revisers had in mind. They were afraid that the 'man in the pew' would take indifferently to mean, as it often does, 'carelessly', without concern. They knew that this error would not be made by highly-educated people, but they thought it would be made by everyone else. The sexton's reply, however, reveals that it will not be made by the least educated class of all. It will be made only by those who are educationally in the middle; those whose language is fashionable (our elders would have said 'polite') without being scholarly. The highest and lowest classes are both equally safe from it; and impartially, which guards the 'middle' churchgoers from misunderstanding, is meaningless to the simple.

During the war I got into a discussion with a working man about the Devil. He said he believed in a Devil, but 'not a personal Devil'. As the discussion proceeded it grew more and more perplexing to both parties. It became clear that we were somehow at cross-purposes. Then, suddenly and almost by accident, I discovered what was wrong. It became obvious that he had, all along, been meaning by the word personal nothing more or less or other than corporeal. He was a very intelligent man, and, once this discovery had been made, there was no difficulty. Apparently we had not really disagreed about anything: the difference between us was merely one of vocabulary. It set me wondering how many of the thousands of people who say they 'believe in God but not in a personal God' are really trying to tell us no more than that they are not, in the strict sense, anthropomorphists and are, in fact, asserting, on this point, their perfect orthodoxy.

Where the revisers of the Prayer Book and I both went wrong was this. We both had a priori notions of what simple people mean by words. I assumed that the workman's usage was the same as my own. The revisers, more subtly but not more correctly, assumed that all would know the sense of indifferently which they were guarding against when they amended it. But apparently we must not decide a priori what other people mean by English words any more than what Frenchmen mean by French words. We must be wholly empirical. We must listen, and note, and memorise. And of course we must set aside every trace of snobbery or pedantry about 'right' or 'wrong' usages.
'''
source_url=''
source_title='Before We Can Communicate, from God in the Dock'
