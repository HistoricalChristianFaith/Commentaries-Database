[[commentary]]
quote='''
There is a rather amusing instance of the same thing in Acts XXIV. The Jews had got down a professional orator called Tertullus to conduct the prosecution of St. Paul. The speech as recorded by St. Luke takes eighty-four words in the Greek, if I've counted correctly. Eighty-four words are impossibly short for a Greek advocate on a full-dress occasion. Presumably, then, they are a précis? But of those eighty-odd words forty are taken up with preliminary compliments to the bench—stuff, which, in a précis on that tiny scale, ought not to have come in at all. It is easy to guess what has happened. St. Luke, though an excellent narrator, was no good as a reporter. He starts off by trying to memorise, or to get down, the whole speech verbatim. And he succeeds in reproducing a certain amount of the exordium (the style unmistakable. Only a practising rhetor ever talks that way). But he is soon defeated. The whole of the rest of the speech has to be represented by a ludicrously inadequate abstract. But he doesn't tell us what has happened, and thus seems to attribute to Tertullus a performance which would have spelled professional ruin.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 9'
