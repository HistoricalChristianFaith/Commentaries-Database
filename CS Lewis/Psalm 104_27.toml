[[commentary]]
quote='''
All these creatures, like us, "wait upon" God at feeding-time (27). It is the same in 147:9; though the raven was an unclean bird to Jews, God "feedeth the young ravens that call upon him". The thought which gives these creatures a place in the Psalmist's gusto for Nature is surely obvious. They are our fellow-dependents; we all, lions, storks, ravens, whales—live, as our fathers said, "at God's charges", and the mention of all equally redounds to His praise.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 8: Nature'
