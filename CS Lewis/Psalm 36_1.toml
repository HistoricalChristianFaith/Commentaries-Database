[[commentary]]
quote='''
Of the cursing Psalms I suppose most of us make our own moral allegories—well aware that these are personal and on a quite different level from the high matters I have been trying to handle. We know the proper object of utter hostility—wickedness, especially our own. Thus in 36, 'My heart showeth me the wickedness of the ungodly,' each can reflect that his own heart is the specimen of that wickedness best known to him. After that, the upward plunge at verse 5 into the mercy high as heaven and the righteousness solid as the mountains takes on even more force and beauty.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
