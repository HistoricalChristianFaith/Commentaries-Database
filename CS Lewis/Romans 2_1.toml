[[commentary]]
quote='''
He sees (like you) how all the people in your home or your job are in various degrees awkward or difficult; but when He looks into that home or factory or office He sees one more person of the same kind— the one you never do see. I mean, of course, yourself. That is the next great step in wisdom—to realize that you also are just that sort of person. You also have a fatal flaw in your character. All the hopes and plans of others have again and again shipwrecked on your character just as your hopes and plans have shipwrecked on theirs.
'''
source_url=''
source_title='The Trouble With X, from God in the Dock'
