[[commentary]]
quote='''
I can't say for certain which bits came into Christianity from earlier religions. An enormous amount did. I should find it hard to believe Christianity if that were not so. I couldn't believe that nine hundred and ninety-nine religions were completely false and the remaining one true. In reality, Christianity is primarily the fulfillment of the Jewish religion, but also the fulfillment of what was vaguely hinted in all the religions at their best. What was vaguely seen in them all comes into focus in Christianity—just as God Himself comes into focus by becoming a man.
'''
source_url='http://www.orcuttchristian.org/Lewis%20CS%20-%20God_in_the_Dock.pdf'
source_title='ANSWERS TO QUESTIONS ON CHRISTIANITY, from God in the Dock'

[[commentary]]
quote='''
We must not be ashamed of the mythical radiance resting on our theology. We must not be nervous about "parallels" and "pagan Christs": they ought to be there—it would be a stumbling block if they weren't. We must not, in false spirituality, withhold our imaginative welcome. If God chooses to be mythopoeic—and is not the sky itself a myth—shall we refuse to be mythopathic? For this is the marriage of heaven and earth: perfect myth and perfect fact: claiming not only our love and our obedience, but also our wonder and delight, addressed to the savage, the child, and the poet in each one of us no less than to the moralist, the scholar, and the philosopher.
'''
source_url=''
source_title='MYTH BECAME FACT, from God in the Dock'
