[[commentary]]
quote='''
In Psalm 22, the terrible poem which Christ quoted in His final torture, 'they pierced my hands and my feet' is a striking anticipation. Yet it is not this detail that really matters most. It is the union of total privation with total adherence to God, to a God who makes no response, simply because of what God is: 'and thou continuest holy'. All the sufferings of the righteous speak here. If Christ 'tasted death for all men', became the archetypal sufferer, then the expressions of all who ever suffered in the world are, from the very nature of things, related to His. Here we feel that it needed no Divine guidance to give the old texts their second meaning but would rather have needed a special miracle to keep it out.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
