[[commentary]]
quote='''
Now the very Pagans knew that any beggar at your door might be a god in disguise: and the parable of the sheep and the goats is Our Lord's comment. What you do, or don't do, to the beggar, you do, or don't do, to Him. Taken at the Pantheist extreme, this could mean that men are only appearances of God—dramatic representations, as it were. Taken at the Legalist extreme, it could mean that God, by a sort of Legal fiction, will "deem" your kindness to the beggar a kindness done to Himself. Or again, as Our Lord's own words suggest, that since the least of men are His "brethren", the whole action is, so to speak, "within the family." And in what sense brethren? Biologically, because Jesus is Man? Ontologically, because the light lightens them all? Or simply "loved like brethren." (It cannot refer only to the regenerate.) I would ask first whether any one of these formulations is "right" in a sense which makes the others simply wrong? It seems to me improbable. If I ever see more clearly I will speak more surely.

[...] Simple faith leaps to this with astonishing ease. I once talked to a Continental pastor who had seen Hitler, and had, by all human standards, good cause to hate him. "What did he look like?" I asked. "Like all men," he replied, "that is, like Christ."
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 14'

[[commentary]]
quote='''
And as all Christians know there is another way of giving to God; every stranger whom we feed or clothe is Christ. And this apparently is Gift-love to God whether we know it or not. Love Himself can work in those who know nothing of Him. The "sheep" in the parable had no idea either of the God hidden in the prisoner whom they visited or of the God hidden in themselves when they made the visit. (I take the whole parable to be about the judgment of the heathen. For it begins by saying, in the Greek, that the Lord will summon all "the nations" before Him—presumably, the Gentiles, the _Goyim_).
'''
source_url=''
source_title='The Four Loves, Chapter 6: Charity'

[[commentary]]
quote='''
It would be quite false, therefore, to suppose that the Christian view of suffering is incompatible with the strongest emphasis on our duty to leave the world, even in a temporal sense, "better" than we found it. In the fullest parabolic picture which He gave of the Judgement, Our Lord seems to reduce all virtue to active beneficence: and though it would be misleading to take that one picture in isolation from the Gospel as a whole, it is sufficient to place beyond doubt the basic principles of the social ethics of Christianity.
'''
source_url=''
source_title='The Problem of Pain, Ch. 7'
