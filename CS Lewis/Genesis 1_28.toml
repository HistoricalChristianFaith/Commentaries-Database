[[commentary]]
quote='''
Man was appointed by God to have dominion over the beasts, and everything a man does to an animal is either a lawful exercise, or a sacrilegious abuse, of an authority by divine right. The tame animal is therefore, in the deepest sense, the only "natural" animal--the only one we see occupying the place it was made to occupy, and it is on the tame animal that we must base all our doctrine of beasts. Now it will be seen that, in so far as the tame animal has a real self or personality, it owes this almost entirely to its master. If a good sheepdog seems "almost human" that is because a good shepherd has made it so.
'''
source_url=''
source_title='The Problem of Pain, Chapter 9: Animal Pain'
