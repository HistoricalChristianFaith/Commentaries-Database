[[commentary]]
quote='''
In a certain sense Our Lord's interpretation of the Psalms was common ground between Himself and His opponents. The question how David can call Christ 'my Lord' (Mark 12:35-37), would lose its point unless it were addressed to those who took it for granted that the 'my Lord' referred to in Psalm 110 was the Messiah, the regal and anointed deliverer who would subject the world to Israel. This method was accepted by all. The 'scriptures' all had a 'spiritual' or second sense. Probably all instructed Jews in the first century saw references to the Messiah in most of those passages where Our Lord saw them; what was controversial was His identification of the Messianic King with another Old Testament figure and of both with Himself.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
