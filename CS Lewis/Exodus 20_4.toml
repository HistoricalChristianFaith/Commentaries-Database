[[commentary]]
quote='''
If you examine the object to which he is attending, you will find that it is a composite object containing many quite ridiculous ingredients. There will be images derived from pictures of the Enemy as He appeared during the discreditable episode known as the Incarnation: there will be vaguer--perhaps quite savage and puerile--images associated with the other two Persons. There will even be some of his own reverence (and of bodily sensations accompanying it) objectified and attributed to the object revered. I have known cases where what the patient called his "God" was actually located--up and to the left at the corner of the bedroom ceiling, or inside his own head, or in a crucifix on the wall. But whatever the nature of the composite object, you must keep him praying to it--to the thing that he has made, not to the Person who has made him.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters'
