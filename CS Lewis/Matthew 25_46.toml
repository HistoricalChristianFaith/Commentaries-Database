[[commentary]]
quote='''
Our Lord speaks of Hell under three symbols: first, that of punishment ("everlasting punishment," Matt. xxv, 46); second, that of destruction ("fear Him who is able to destroy both body and soul in Hell," Matt. x, 28); and thirdly, that of privation, exclusion, or banishment into "the darkness outside", as in the parables of the man without a wedding garment or of the wise and foolish virgins. The prevalent image of fire is significant because it combines the ideas of torment and destruction. Now it is quite certain that all these expressions are intended to suggest something unspeakably horrible, and any interpretation which does not face that fact is, I am afraid, out of court from the beginning. But it is not necessary to concentrate on the images of torture to the exclusion of those suggesting destruction and privation.
'''
source_url=''
source_title='The Problem of Pain, Ch. 8'
