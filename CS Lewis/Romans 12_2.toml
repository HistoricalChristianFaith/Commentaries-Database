[[commentary]]
quote='''
[On conformity to the world as the natural default — specifically, the drift toward becoming an "inner ringer" that will happen to every man who does nothing to prevent it, because the desire to be inside is one of the great permanent mainsprings of human action]

My main purpose in this address is simply to convince you that this desire [the desire to be inside an Inner Ring] is one of the great permanent mainsprings of human action. It is one of the factors which go to make up the world as we know it—this whole pell-mell of struggle, competition, confusion, graft, disappointment and advertisement, and if it is one of the permanent mainsprings then you may be quite sure of this. Unless you take measures to prevent it, this desire is going to be one of the chief motives of your life, from the first day on which you enter your profession until the day when you are too old to care. That will be the natural thing—the life that will come to you of its own accord. Any other kind of life, if you lead it, will be the result of conscious and continuous effort. If you do nothing about it, if you drift with the stream, you will in fact be an "inner ringer". I don't say you'll be a successful one; that's as may be. But whether by pining and moping outside Rings that you can never enter, or by passing triumphantly further and further in—one way or the other you will be that kind of man.
'''
source_url=''
source_title='The Inner Ring, from Transposition and Other Addresses'

[[commentary]]
quote='''
Again, many of us have had the experience of living in some local pocket of human society--some particular school, college, regiment or profession where the tone was bad. And inside that pocket certain actions were regarded as merely normal ("Everyone does it") and certain others as impracticably virtuous and Quixotic. But when we emerged from that bad society we made the horrible discovery that in the outer world our "normal" was the kind of thing that no decent person ever dreamed of doing, and our "Quixotic" was taken for granted as the minimum standard of decency. What had seemed to us morbid and fantastic scruples so long as we were in the "pocket" now turned out to be the only moments of sanity we there enjoyed. It is wise to face the possibility that the whole human race (being a small thing in the universe) is, in fact, just such a local pocket of evil--an isolated bad school or regiment inside which minimum decency passes for heroic virtue and utter corruption for pardonable imperfection.
'''
source_url=''
source_title='The Problem of Pain, Chapter 4: Human Wickedness'
