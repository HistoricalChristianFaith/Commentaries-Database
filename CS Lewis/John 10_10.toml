[[commentary]]
quote='''
[On how conversion revealed the true value of existence, which his former pessimism had been unable to perceive]

I have, almost all my life, been quite unable to feel that horror of nonentity, of annihilation, which, say, Dr. Johnson felt so strongly. I felt it for the very first time only in 1947. But that was after I had long been re-converted and thus begun to know what life really is and what would have been lost by missing it.
'''
source_url=''
source_title='Surprised by Joy, Chapter 7: Light and Shade'

[[commentary]]
quote='''
The Biological sort which comes to us through Nature, and which (like everything else in Nature) is always tending to run down and decay so that it can only be kept up by incessant subsidies from Nature in the form of air, water, food, etc., is Bios. The Spiritual life which is in God from all eternity, and which made the whole natural universe, is Zoe. Bios has, to be sure, a certain shadowy or symbolic resemblance to Zoe: but only the sort of resemblance there is between a photo and a place, or a statue and a man. A man who changed from having Bios to having Zoe would have gone through as big a change as a statue which changed from being a carved stone to being a real man.

And that is precisely what Christianity is about. This world is a great sculptor's shop. We are the statues and there is a rumour going round the shop that some of us are some day going to come to life.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 1: Making and Begetting'
