[[commentary]]
quote='''
It will be exposed, in an aggravated degree, to that temptation which the Devil spares none of us at any time — the temptation of claiming for our favourite opinions that kind and degree of certainty and authority which really belongs only to our Faith... The demon inherent in every party is at all times ready enough to disguise himself as the Holy Ghost; the formation of a Christian Party means handing over to him the most efficient make-up we can find. And when once the disguise has succeeded, his commands will presently be taken to abrogate all moral laws and to justify whatever the unbelieving allies of the 'Christian' Party wish to do.
'''
source_url=''
source_title='Meditation on the Third Commandment, from God in the Dock'

[[commentary]]
quote='''
Long before [the Christian movement] became as important as that the real opposition would have begun, and to be on the Christian side would be costing a man (at the least) his career. But remember, in England the opposition will quite likely be called Christianity (or Christo-democracy, or British Christianity, or something of that kind).
'''
source_url=''
source_title='The Decline of Religion, from God in the Dock'

[[commentary]]
quote='''
No doubt you have often practised transforming yourself into an angel of light as a parade-ground exercise. Now is the time to do it in the face of the Enemy. The World and the Flesh have failed us; a third Power remains. And success of this third kind is the most glorious of all. A spoiled saint, a Pharisee, an inquisitor, or a magician, makes better sport in Hell than a mere common tyrant or debauchee.
'''
append_to_author_name=' (via the character Screwtape, a devil)'
source_url=''
source_title='The Screwtape Letters, Ch. XXIII'
