[[commentary]]
quote='''
I do _not_ think that the life of Heaven bears any analogy to play or dance in respect of frivolity. I do think that while we are in this "valley of tears", cursed with labour, hemmed round with necessities, tripped up with frustrations, doomed to perpetual plannings, puzzlings, and anxieties, certain qualities that must belong to the celestial condition have no chance to get through, can project no image of themselves, except in activities which, for us here and now, are frivolous. For surely we must suppose the life of the blessed to be an end in itself, indeed The End: to be utterly spontaneous; to be the complete reconciliation of boundless freedom with order—with the most delicately adjusted, supple, intricate, and beautiful order? How can you find any image of this in the "serious" activities either of our natural or of our (present) spiritual life?—either in our precarious and heart-broken affections or in the Way which is always, in some degree, a _via crucis_? No, Malcolm. It is only in our "hours-off", only in our moments of permitted festivity, that we find an analogy. Dance and game _are_ frivolous, unimportant down here; for "down here" is not their natural place. Here, they are a moment's rest from the life we were placed here to live. But in this world everything is upside down. That which, if it could be prolonged here, would be a truancy, is likest that which in a better country is the End of ends. Joy is the serious business of Heaven.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 17'

[[commentary]]
quote='''
When I began to look into this matter I was shocked to find such different Christians as Milton, Johnson and Thomas Aquinas taking heavenly glory quite frankly in the sense of fame or good report. But not fame conferred by our fellow creatures—fame with God, approval or (I might say) "appreciation" by God. And then, when I had thought it over, I saw that this view was scriptural; nothing can eliminate from the parable the divine _accolade_, "Well done, thou good and faithful servant." With that, a good deal of what I had been thinking all my life fell down like a house of cards. I suddenly remembered that no one can enter heaven except as a child; and nothing is so obvious in a child—not in a conceited child, but in a good child—as its great and undisguised pleasure in being praised. Apparently what I had mistaken for humility had, all these years, prevented me from understanding what is in fact the humblest, the most childlike, the most creaturely of pleasures—nay, the specific pleasure of the inferior: the pleasure of a beast before men, a child before its father, a pupil before his teacher, a creature before its Creator. And that is enough to raise our thoughts to what may happen when the redeemed soul, beyond all hope and nearly beyond belief, learns at last that she has pleased Him whom she was created to please. To please God . . . to be a real ingredient in the divine happiness . . . to be loved by God, not merely pitied, but delighted in as an artist delights in his work or a father in a son—it seems impossible, a weight or burden of glory which our thoughts can hardly sustain. But so it is.
'''
source_url=''
source_title='The Weight of Glory'
