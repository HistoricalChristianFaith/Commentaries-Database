[[commentary]]
quote='''
Remember, I had always wanted, above all things, not to be "interfered with". I had wanted (mad wish) "to call my soul my own". I had been far more anxious to avoid suffering than to achieve delight. I had always aimed at limited liabilities. The supernatural itself had been to me, first, an illicit dram, and then, as by a drunkard's reaction, nauseous. Even my recent attempt to live my philosophy had secretly (I now knew) been hedged round by all sorts of reservations. I had pretty well known that my ideal of virtue would never be allowed to lead me into anything intolerably painful; I would be "reasonable". But now what had been an ideal became a command; and what might not be expected of one? Doubtless, by definition, God was Reason itself. But would He also be "reasonable" in that other, more comfortable, sense? Not the slightest assurance on that score was offered me. Total surrender, the absolute leap in the dark, were demanded. The reality with which no treaty can be made was upon me. The demand was not even "All or nothing". I think that stage had been passed, on the bus-top when I unbuckled my armour and the snow-man started to melt. Now, the demand was simply "All".

You must picture me alone in that room in Magdalen, night after night, feeling, whenever my mind lifted even for a second from my work, the steady, unrelenting approach of Him whom I so earnestly desired not to meet. That which I greatly feared had at last come upon me.
'''
source_url=''
source_title='Surprised by Joy, Chapter 14: Checkmate'
