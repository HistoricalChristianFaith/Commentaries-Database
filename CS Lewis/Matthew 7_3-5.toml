[[commentary]]
quote='''
Now take a step further. When God looks into your office, or parish, or school, or hospital, or factory, or home, He sees all these people like that, and of course, sees one more, the one whom you do not see. For we may be quite certain that, just as in other people, there is something on which our best endeavours have again and again been shipwrecked, so in us there is something quite equally fatal, on which their endeavours have again and again been shipwrecked. If we are beginners in the Christian life we have nothing to make the fatal flaw clear to ourselves. Does the person with a smelly breath know it smells? Or does the Club bore know he is a bore? Is there a single man or woman who believes himself or herself to be a bore or temperamentally jealous? Yet the world is pretty well sprinkled with bores and jealous people. If we are like that, everyone else will know it before we do. You ask why your friends have not told you about it. But what if they have? They may have tried again and again; but on every occasion, we thought they were being queer, that they were in a bad temper, or simply mistaken. They have tried again and again, and have probably now given it up.

Does that sound very gloomy? Does Christianity encourage morbid introspection? The alternative is much more morbid. Those who do not think about their own sins make up for it by thinking incessantly about the sins of others. It is healthier to think of one's own. It is the reverse of morbid. It is not even, in the long run, very gloomy. A serious attempt to repent and really to know one's own sins is in the long run a lightening and relieving process. Of course, there is bound to be a first dismay and often terror and later great pain, yet that is much less in the long run than the anguish of a mass of unrepented and unexamined sins, lurking in the background of our minds. It is the difference between the pain of the tooth about which you should go to the dentist, and the simple straight-forward pain which you know is getting less and less every moment when you have had the tooth out.
'''
source_url=''
source_title='Miserable Offenders, from God in the Dock'

[[commentary]]
quote='''
There are two respects in which God's view must be very different from ours. In the first place, He sees (like you) how all the people in your home or your job are in various degrees awkward or difficult; but when He looks into that home or factory or office He sees one more person of the same kind— the one you never do see. I mean, of course, yourself. That is the next great step in wisdom—to realize that you also are just that sort of person. You also have a fatal flaw in your character. All the hopes and plans of others have again and again shipwrecked on your character just as your hopes and plans have shipwrecked on theirs.

It is no good passing this over with some vague, general admission such as "Of course, I know I have my faults." It is important to realize that there is some really fatal flaw in you: something which gives the others just that same feeling of despair which their flaws give you. And it is almost certainly something you don't know about—like what the advertisements call "halitosis," which everyone notices except the person who has it.

That is one way in which God's view must differ from mine. He sees all the characters: I see all except my own.
'''
source_url=''
source_title='The Trouble With X, from God in the Dock'

[[commentary]]
quote='''
A reaction--in itself wholesome--is now going on against purely private or domestic conceptions of morality, a re-awakening of the social conscience. We feel ourselves to be involved in an iniquitous social system and to share a corporate guilt. This is very true: but the enemy can exploit even truths to our deception. Beware lest you are making use of the idea of corporate guilt to distract your attention from those hum-drum, old fashioned guilts of your own which have nothing to do with "the system" and which can be dealt with without waiting for the millennium. For corporate guilt perhaps cannot be, and certainly is not, felt with the same force as personal guilt. For most of us, as we now are, this conception is a mere excuse for evading the real issue. When we have really learned to know our individual corruption, then indeed we can go on to think of the corporate guilt and can hardly think of it too much. But we must learn to walk before we run.
'''
source_url=''
source_title='The Problem of Pain, Chapter 4: Human Wickedness'
