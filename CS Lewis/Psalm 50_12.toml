[[commentary]]
quote='''
Either at some period in Judaism, or else in the experience of some Jews, a roughly parallel situation occurred. The unity falls apart; the sacrificial rites become distinguishable from the meeting with God. This does not unfortunately mean that they will cease or become less important. They may, in various evil modes, become even more important than before. They may be valued as a sort of commercial transaction with a greedy God who somehow really wants or needs large quantities of carcasses and whose favours cannot be secured on any other terms. Worse still, they may be regarded as the only thing He wants, so that their punctual performance will satisfy Him without obedience to His demands for mercy, 'judgement', and truth. To the priests themselves the whole system will seem important simply because it is both their art and their livelihood; all their pedantry, all their pride, all their economic position, is bound up with it. They will elaborate their art more and more. And of course the corrective to these views of sacrifice can be found within Judaism itself. The prophets continually fulminate against it. Even the Psalter, though largely a Temple collection, can do so; as in Psalm 50 where God tells His people that all this Temple worship, considered in itself, is not the real point at all, and particularly ridicules the genuinely Pagan notion that He really needs to be fed with roast meat. 'If I were hungry, do you think I would apply to you?' (50:12). I have sometimes fancied He might similarly ask a certain type of modern clergyman, 'If I wanted music—if I were conducting research into the more recondite details of the history of the Western Rite—do you really think you are the source I would rely on?'
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 5: The Fair Beauty of the Lord'

[[commentary]]
quote='''
The miserable idea that God should in any sense need, or crave for, our worship like a vain woman wanting compliments, or a vain author presenting his new books to people who never met or heard of him, is implicitly answered by the words 'If I be hungry I will not tell thee' (50:12). Even if such an absurd Deity could be conceived, He would hardly come to us, the lowest of rational creatures, to gratify His appetite. I don't want my dog to bark approval of my books. Now that I come to think of it, there are some humans whose enthusiastically favourable criticism would not much gratify me.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 9: A Word About Praising'
