[[commentary]]
quote='''
I have often, on my knees, been shocked to find what sort of thoughts I have, for a moment, been addressing to God; what infantile placations I was really offering, what claims I have really made, even what absurd adjustments or compromises I was, half-consciously, proposing. There is a Pagan, savage heart in me somewhere. For unfortunately the folly and idiot-cunning of Paganism seem to have far more power of surviving than its innocent or even beautiful elements. It is easy, once you have power, to silence the pipes, still the dances, disfigure the statues, and forget the stories; but not easy to kill the savage, the greedy, frightened creature now cringing, now blustering, in one's soul—the creature to whom God may well say, 'thou thoughtest I am even such a one as thyself' (50:21).
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 9: A Word About Praising'
