[[commentary]]
quote='''
We are often told that education is a key position. That is very false in one sense and very true in another. If it means that you can do any great thing by interfering with existing schools, altering curricula and the like, it is very false. As the teachers are, so they will teach. Your 'reform' may incommode and overwork them, but it will not radically alter the total effect of their teaching. Planning has no magic whereby it can elicit figs from thistles or choke-pears from vines. The rich, sappy, fruit-laden tree will bear sweetness and strength and spiritual health: the dry, prickly, withered tree will teach hate, jealousy, suspicion, and inferiority complex — whatever you tell it to teach. They will do it unknowingly and all day long.
'''
source_url=''
source_title='ON THE TRANSMISSION OF CHRISTIANITY, from God in the Dock'

[[commentary]]
quote='''
We are all trying to let our mind and heart go their own way—centred on money or pleasure or ambition—and hoping, in spite of this, to behave honestly and chastely and humbly. And that is exactly what Christ warned us you could not do. As He said, a thistle cannot produce figs. If I am a field that contains nothing but grass-seed, I cannot produce wheat. Cutting the grass may keep it short: but I shall still produce grass and no wheat. If I want to produce wheat, the change must go deeper than the surface. I must be ploughed up and re-sown.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 8: Is Christianity Hard or Easy?'
