[[commentary]]
quote='''
I think we must introduce into the discussion a distinction between two senses of the word Faith. This may mean (a) a settled intellectual assent. In that sense faith (or 'belief') in God hardly differs from faith in the uniformity of Nature or in the consciousness of other people. This is what, I think, has sometimes been called a 'notional' or 'intellectual' or 'carnal' faith. It may also mean (b) a trust, or confidence, in the God whose existence is thus assented to. This involves an attitude of the will. It is more like our confidence in a friend. It would be generally agreed that Faith in sense A is not a religious state. The devils who 'believe and tremble' have Faith-A. A man who curses or ignores God may have Faith-A. Philosophical arguments for the existence of God are presumably intended to produce Faith-A. No doubt those who construct them are anxious to produce Faith-A because it is a necessary pre-condition of Faith-B, and in that sense their ultimate intention is religious. But their immediate object, the conclusion they attempt to prove, is not.
'''
source_url=''
source_title='IS THEISM IMPORTANT?, from God in the Dock'
