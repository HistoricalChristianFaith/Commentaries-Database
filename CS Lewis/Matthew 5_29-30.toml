[[commentary]]
quote='''
No doubt there are already, even in the unregenerate self, faint hints of what mould each is designed for, or what sort of pillar he will be. But it is, I think, a gross exaggeration to picture the saving of a soul as being, normally, at all like the development from seed to flower. The very words repentance, regeneration, the New Man, suggest something very different. Some tendencies in each natural man may have to be simply rejected. Our Lord speaks of eyes being plucked out and hands lopped off—a frankly Procrustean method of adaptation.
'''
source_url=''
source_title='The Weight of Glory, Membership'

[[commentary]]
quote='''
All natural affections... can become rivals to spiritual love: but they can also be preparatory imitations of it, training (so to speak) of the spiritual muscles which Grace may later put to a higher service; as women nurse dolls in childhood and later nurse children. There may come an occasion for renouncing this love; pluck out your right eye. But you need to have an eye first: a creature which had none—which had only got so far as a "photo-sensitive" spot—would be very ill employed in meditation on that severe text.
'''
source_url=''
source_title='The Four Loves, Chapter 2: Likings and Loves for the Sub-human'
