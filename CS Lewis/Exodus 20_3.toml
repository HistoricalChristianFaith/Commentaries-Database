[[commentary]]
quote='''
And to me in particular there came back the memory of a corrugated iron hut used as an R.A.F. chapel — a few kneeling airmen — and a young chaplain uttering the prayer, 'Teach us, O Lord, to love the things Thou standest for.' He was perfectly sincere, and I willingly believe that the things in question included something more and better than 'the Western values', whatever those may be.

And yet... his words seemed to me to imply a point of view incompatible with Christianity or indeed with any serious Theism whatever. God is not, for it, the goal or end. He is (and how fortunate!) enlightened; has, or 'stands for', the right ideals. He is valued for that reason. He ranks, admittedly, as a leader. But of course a leader leads to something beyond himself. That something else is the real goal. This is miles away from 'Thou hast made us for Thyself and our heart has no rest till it comes to Thee.' The Maenads were more religious.
'''
source_url=''
source_title='Revival or Decay?, from God in the Dock'

[[commentary]]
quote='''
The longer I looked into it the more I came to suspect that I was perceiving a universal law. The woman who makes a dog the centre of her life loses, in the end, not only her human usefulness and dignity but even the proper pleasure of dog-keeping. The man who makes alcohol his chief good loses not only his job but his palate and all power of enjoying the earlier (and only pleasurable) levels of intoxication. It is a glorious thing to feel for a moment or two that the whole meaning of the universe is summed up in one woman — glorious so long as other duties and pleasures keep tearing you away from her. But clear the decks and so arrange your life (it is sometimes feasible) that you will have nothing to do but contemplate her, and what happens? Of course this law has been discovered before, but it will stand re-discovery. It may be stated as follows: every preference of a small good to a great, or a partial good to a total good, involves the loss of the small or partial good for which the sacrifice was made.
'''
source_url=''
source_title='First and Second Things, from God in the Dock'

[[commentary]]
quote='''
This love, when it sets up as a religion, is beginning to be a god—therefore to be a demon. And demons never keep their promises. Nature "dies on" those who try to live for a love of nature.
'''
source_url=''
source_title='The Four Loves, Chapter 2: Likings and Loves for the Sub-human'
