[[commentary]]
quote='''
But unless Christianity is wholly false, the perception of ourselves which we have in moments of shame must be the only true one; and even Pagan society has usually recognised "shamelessness" as the nadir of the soul. In trying to extirpate Shame we have broken down one of the ramparts of the human spirit, madly exulting in the work as the Trojans exulted when they broke their walls and pulled the Horse into Troy. I do not know that there is anything to be done but to set about the rebuilding as soon as we can. It is mad work to remove hypocrisy by removing the temptation to hypocrisy: the "frankness" of people sunk below shame is a very cheap frankness.
'''
source_url=''
source_title='The Problem of Pain, Chapter 4: Human Wickedness'
