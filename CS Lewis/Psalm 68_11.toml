[[commentary]]
quote='''
Verse 11 is a beautiful instance of the way in which the old texts almost inevitably charge themselves with the new weight of meaning. The Prayer Book version gives it as 'The Lord gave the word, great was the company of the preachers.' The 'word' would be the order for battle and its 'preachers' (in rather a grim sense) the triumphant Jewish warriors. But that translation appears to be wrong. The verse really means that there were many to spread 'word' (i.e., the news) of the victory. This will suit Pentecost quite as well.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 12: Second Meanings in the Psalms'
