[[commentary]]
quote='''
The lowest type, and one which is "love" at all only by an extension of the word, is that which an artist feels for an artefact. God's relation to man is pictured thus in Jeremiah's vision of the potter and the clay, or when St. Peter speaks of the whole Church as a building on which God is at work, and of the individual members as stones. The limitation of such an analogy is, of course, that in the symbol the patient is not sentient, and that certain questions of justice and mercy which arise when the "stones" are really "living" therefore remain unrepresented. But it is an important analogy so far as it goes. We are, not metaphorically but in very truth, a Divine work of art, something that God is making, and therefore something with which He will not be satisfied until it has a certain character. Here again we come up against what I have called the "intolerable compliment". Over a sketch made idly to amuse a child, an artist may not take much trouble: he may be content to let it go even though it is not exactly as he meant it to be. But over the great picture of his life--the work which he loves, though in a different fashion, as intensely as a man loves a woman or a mother a child--he will take endless trouble--and would, doubtless, thereby give endless trouble to the picture if it were sentient. One can imagine a sentient picture, after being rubbed and scraped and re-commenced for the tenth time, wishing that it were only a thumb-nail sketch whose making was over in a minute. In the same way, it is natural for us to wish that God had designed for us a less glorious and less arduous destiny; but then we are wishing not for more love but for less.
'''
source_url=''
source_title='The Problem of Pain, Ch. 3'
