[[commentary]]
quote='''
What is good in any painful experience is, for the sufferer, his submission to the will of God, and, for the spectators, the compassion aroused and the acts of mercy to which it leads. In the fallen and partially redeemed universe we may distinguish (1) The simple good descending from God, (2) The simple evil produced by rebellious creatures, and (3) the exploitation of that evil by God for His redemptive purpose, which produces (4) the complex good to which accepted suffering and repented sin contribute. Now the fact that God can make complex good out of simple evil does not excuse--though by mercy it may save--those who do the simple evil. And this distinction is central.
'''
source_url=''
source_title='The Problem of Pain, Ch. 7'

[[commentary]]
quote='''
Sometimes I can almost think that I was sent back to the false gods there to acquire some capacity for worship against the day when the true God should recall me to Himself. Not that I might not have learned this sooner and more safely, in ways I shall now never know, without apostasy, but that Divine punishments are also mercies, and particular good is worked out of particular evil, and the penal blindness made sanative.
'''
source_url=''
source_title='Surprised by Joy, Ch. 5: Renaissance'
