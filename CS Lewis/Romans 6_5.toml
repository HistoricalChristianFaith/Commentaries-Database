[[commentary]]
quote='''
The perfect surrender and humiliation were undergone by Christ: perfect because He was God, surrender and humiliation because He was man. Now the Christian belief is that if we somehow share the humility and suffering of Christ we shall also share in His conquest of death and find a new life after we have died and in it become perfect, and perfectly happy, creatures.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 5: The Practical Conclusion'

[[commentary]]
quote='''
And then, after being thus killed—killed every day in a sense—the human creature in Him, because it was united to the divine Son, came to life again. The Man in Christ rose again: not only the God. That is the whole point. For the first time we saw a real man. One tin soldier—real tin, just like the rest—had come fully and splendidly alive.
'''
source_url=''
source_title='Mere Christianity, Book 4, Chapter 5: The Obstinate Toy Soldiers'
