[[commentary]]
quote='''
Within Judaism itself the corrective to this natural reaction already existed. "Thou shalt not hate thy brother in thine heart . . . thou shalt not avenge or bear any grudge against the children of thy people, but thou shalt love thy neighbour as thyself," says Leviticus (19:17, 18). "Rejoice not when thine enemy falleth, and let not thine heart be glad when he stumbleth" (Prov. 24:17). And I shall never forget my surprise when I first discovered that St Paul's "If thine enemy hunger, give him bread," etc., is a direct quotation from the same book (Prov. 25:21). But this is one of the rewards of reading the Old Testament regularly. You keep on discovering more and more what a tissue of quotations from it the New Testament is; how constantly Our Lord repeated, reinforced, continued, refined, and sublimated the Judaic ethics, how very seldom He introduced a novelty. As if we supposed Him to be a cheapjack like Nietzsche inventing a new ethics! Every good teacher, within Judaism as without, has anticipated Him. The whole religious history of the pre-Christian world, on its better side, anticipates Him. It could not be otherwise. The Light which has lightened every man from the beginning may shine more clearly but cannot change.
'''
source_url=''
source_title='Reflections on the Psalms, Chapter 3: The Cursings'
