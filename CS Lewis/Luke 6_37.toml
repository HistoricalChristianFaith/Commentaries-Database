[[commentary]]
quote='''
Last week, while at prayer, I suddenly discovered--or felt as if I did--that I had forgiven someone I have been trying to forgive for over thirty years. Trying, and praying that I might. When the thing actually happened--sudden as the longed-for cessation of one's neighbour's radio--my feeling was "But it's so easy. Why didn't you do it ages ago?" So many things are done easily the moment you can do them at all. But till then, sheerly impossible, like learning to swim. There are months during which no efforts will keep you up; then comes the day and hour and minute after which, and ever after, it becomes almost impossible to sink. It also seemed to me that forgiving (that man's cruelty) and being forgiven (my resentment) were the very same thing. "Forgive and you shall be forgiven" sounds like a bargain. But perhaps it is something much more. By heavenly standards, that is, for pure intelligence, it is perhaps a tautology--forgiving and being forgiven are two names for the same thing. The important thing is that a discord has been resolved, and it is certainly the great Resolver who has done it.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 20 (Paragraph 1)'
