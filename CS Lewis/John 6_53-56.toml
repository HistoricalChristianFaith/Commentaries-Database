[[commentary]]
quote='''
Some people seem able to discuss different theories of this act as if they understood them all and needed only evidence as to which was best. This light has been withheld from me. I do not know and can't imagine what the disciples understood Our Lord to mean when, His body still unbroken and His blood unshed, He handed them the bread and wine, saying they were His body and blood. I can find within the forms of my human understanding no connection between eating a man—and it is as Man that the Lord has flesh—and entering into any spiritual oneness or community or koinonia with him.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 19'

[[commentary]]
quote='''
It explains why this new life is spread not only by purely mental acts like belief, but by bodily acts like baptism and Holy Communion. It is not merely the spreading of an idea; it is more like evolution—a biological or superbiological fact. There is no good trying to be more spiritual than God. God never meant man to be a purely spiritual creature. That is why He uses material things like bread and wine to put the new life into us. We may think this rather crude and unspiritual. God does not: He invented eating. He likes matter. He invented it.
'''
source_url=''
source_title='Mere Christianity, Book 2, Chapter 5: The Practical Conclusion'
