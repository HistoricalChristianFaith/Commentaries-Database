[[commentary]]
quote='''
The most unblushingly petitionary prayers are there recommended to us both by precept and example. Our Lord in Gethsemane made a petitionary prayer (and did not get what He asked for).

You'll remind me that He asked with a reservation—"nevertheless, not my will but thine." This makes an enormous difference. But the difference which it precisely does not make is that of removing the prayer's petitionary character. When poor Bill, on a famous occasion, asked us to advance him £100, he said, "If you are sure you can spare it," and, "I shall quite understand if you'd rather not." This made his request very different from the nagging or even threatening request which a different sort of man might have made. But it was still a request.

The servant is not greater, and must not be more high-minded than the master. Whatever the theoretical difficulties are, we must continue to make requests of God.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 7'

[[commentary]]
quote='''
It is clear from many of His sayings that Our Lord had long foreseen His death. He knew what conduct such as His, in a world such as we have made of this, must inevitably lead to. But it is clear that this knowledge must somehow have been withdrawn from Him before He prayed in Gethsemane. He could not, with whatever reservation about the Father's will, have prayed that the cup might pass and simultaneously known that it would not. That is both a logical and a psychological impossibility. You see what this involves? Lest any trial incident to humanity should be lacking, the torments of hope—of suspense, anxiety—were at the last moment loosed upon Him—the supposed possibility that, after all, He might, He just conceivably might, be spared the supreme horror. There was precedent. Isaac had been spared: he too at the last moment, he also against all apparent probability. It was not quite impossible... and doubtless He had seen other men crucified... a sight very unlike most of our religious pictures and images.

But for this last (and erroneous) hope against hope, and the consequent tumult of the soul, the sweat of blood, perhaps He would not have been very Man. To live in a fully predictable world is not to be a man.
'''
source_url=''
source_title='Letters to Malcolm: Chiefly on Prayer, Letter 8'

[[commentary]]
quote='''
As the friend is above the servant, the servant is above the suitor, the man praying on his own behalf. It is no sin to be a suitor. Our Lord descends into the humiliation of being a suitor, of praying on His own behalf, in Gethsemane. But when He does so the certitude about His Father's will is apparently withdrawn.

After that it would be no true faith—it would be idle presumption—for us, who are habitually suitors and do not often rise to the level of servants, to imagine that we shall have any assurance which is not an illusion—or correct only by accident—about the event of our prayers. Our struggle is, isn't it?—to achieve and retain faith on a lower level. To believe that, whether He can grant them or not, God will listen to our prayers, will take them into account.
'''
source_url='https://gutenberg.ca/ebooks/lewiscs-letterstomalcolm/lewiscs-letterstomalcolm-00-h.html'
source_title='LETTERS TO MALCOLM: CHIEFLY ON PRAYER, Letter 11'

[[commentary]]
quote='''
War threatens us with death and pain. No man—and specially no Christian who remembers Gethsemane—need try to attain a stoic indifference about these things.
'''
source_url=''
source_title='Learning in War-Time, from The Weight of Glory'
