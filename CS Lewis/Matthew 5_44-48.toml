[[commentary]]
quote='''
He loves the people in spite of their faults. He goes on loving. He does not let go. Don't say, "It's all very well for Him; He hasn't got to live with them." He has. He is inside them as well as outside them. He is with them far more intimately and closely and incessantly than we can ever be. Every vile thought within their minds (and ours), every moment of spite, envy, arrogance, greed, and self-conceit comes right up against His patient and longing love, and grieves His spirit more than it grieves ours.

The more we can imitate God in both these respects, the more progress we shall make. We must love "X" more; and we must learn to see ourselves as a person of exactly the same kind.
'''
source_url=''
source_title='The Trouble With X, from God in the Dock'
