[[commentary]]
quote='''
And this brings me to the other sense of glory—glory as brightness, splendour, luminosity. We are to shine as the sun, we are to be given the Morning Star. I think I begin to see what it means. We do not want merely to _see_ beauty, though, God knows, even that is bounty enough. We want something else which can hardly be put into words—to be united with the beauty we see, to pass into it, to receive it into ourselves, to bathe in it, to become part of it. At present we are on the outside of the world, the wrong side of the door. We discern the freshness and purity of morning, but they do not make us fresh and pure. We cannot mingle with the splendours we see. But all the leaves of the New Testament are rustling with the rumour that it will not always be so. Some day, God willing, we shall get _in_. When human souls have become as perfect in voluntary obedience as the inanimate creation is in its lifeless obedience, then they will put on its glory, or rather that greater glory of which Nature is only the first sketch.
'''
source_url=''
source_title='The Weight of Glory'
