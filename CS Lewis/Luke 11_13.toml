[[commentary]]
quote='''
The statement that I do not "care much for" the Sermon on the Mount but "prefer" the "Pauline ethic" of man's sinfulness and helplessness carries a suggestion of alternatives between which we may choose, where I see successive stages through which we must proceed. Most of my books are evangelistic, addressed to tous exo. It would have been inept to preach forgiveness and a Saviour to those who did not know they were in need of either. Hence St Paul's and the Baptist's diagnosis (would you call it exactly an ethic?) had to be pressed. Nor am I aware that our Lord revised it ("if ye, being evil. . .").
'''
source_url=''
source_title='Rejoinder to Dr Pittenger, from God in the Dock'
