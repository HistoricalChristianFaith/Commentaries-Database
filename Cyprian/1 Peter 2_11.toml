[[commentary]]
quote='''
...as it is written, the Lord Himself forewarning and saying, "Let your light so shine before men that they may see your good works and glorify your Father which is in heaven." And Paul the apostle says, "Shine as lights in the world." And similarly Peter exhorts: "As strangers," says he, "and pilgrims, abstain from fleshly lusts, which war against the soul, having your conversation honest among the Gentiles; that whereas they speak against you as evil-doers, they may by your good works, which they shall behold, glorify the Lord." This, indeed, the greatest part of you, I rejoice to say, are careful for; and, made better by the honour of your confession itself, guard and preserve its glory by tranquil and virtuous lives.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyprian%2FLetters%2FEpistle%25206.html"
source_title="Epistle 6"
