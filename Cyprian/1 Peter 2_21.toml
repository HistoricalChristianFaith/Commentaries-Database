[[commentary]]
quote='''
Whosoever hates, says he, his brother, walketh in darkness, and knoweth not whither he goeth. For he goeth unconsciously to Gehenna, in ignorance and blindness; he is hurrying into punishment, departing, that is, from the light of Christ, who warns and says, "I am the light of the world. He that followeth me shall not walk in darkness, but shall have the light of life." But he follows Christ who stands in His precepts, who walks in the way of His teaching, who follows His footsteps and His ways, who imitates that which Christ both did and taught; in accordance with what Peter also exhorts and warns, saying, "Christ suffered for us, leaving you an example that ye should follow His steps."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyprian%2FTreatise%252010.%2520On%2520Jealousy%2520and%2520Envy.html"
source_title="Treatise 10. On Jealousy and Envy"
