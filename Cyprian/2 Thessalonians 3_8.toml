[[commentary]]
quote='''
Let them imitate the Lord, who at the very time of His passion was not more proud, but more humble. For then He washed His disciples' feet, saying, "If I, your Lord and Master, have washed your feet, ye ought also to wash one another's feet. For I have given you an example, that ye should do as I have done to you." Let them also follow the example of the Apostle Paul, who, after often-repeated imprisonment, after scourging, after exposures to wild beasts, in everything continued meek and humble; and even after his rapture to the third heaven and paradise, he did not proudly arrogate anything to himself when he said, "Neither did we eat any man's bread for nought, but wrought with labour and travail night and day, that we might not be chargeable to any of you."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyprian%2FLetters%2FEpistle%25205.html"
source_title="Epistle V"
