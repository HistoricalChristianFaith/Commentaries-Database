[[commentary]]
quote='''
Moreover, that masters should be the more gentle. Also in the same place: "And, ye masters, do the same things to them, forbearing anger: knowing that both your Master and theirs is in heaven; and there is no choice of persons with Him."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyprian%2FTreatise%252012.%2520Three%2520Books%2520of%2520Testimonies%2520Against%2520the%2520Jews.html"
source_title="Treatise XII Three Books of Testimonies Against the Jews"
