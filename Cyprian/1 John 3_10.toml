[[commentary]]
quote='''
That charity and brotherly affection are to be religiously and stedfastly practised. ...Of this same thing in the Epistle of John: "In this appear the children of God and the children of the devil. Whosoever is not righteous is not of God, and he who loveth not his brother. For he who hateth his brother is a murderer; and ye know that no murderer hath eternal life abiding in him."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cyprian%2FTreatise%252012.%2520Three%2520Books%2520of%2520Testimonies%2520Against%2520the%2520Jews.html"
source_title="Treatise XII. Three Books of Testimonies Against the Jews."
