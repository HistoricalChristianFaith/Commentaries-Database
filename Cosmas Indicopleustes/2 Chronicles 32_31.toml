[[commentary]]
quote='''
But when his prayer was heard, and 185,000 men of the Assyrian army had been destroyed in one night by the angel, and when a victory so great and so marvellous had been wrought for him by God, he held more firmly than ever the estimate of himself which he had formerly entertained, claiming that he was beyond all doubt the Christ who had been predicted. Wherefore, as he was again uplifted in mind by this conception of himself, he did not go after his victory into the temple, as was his duty, to render thanks and give glory to God, but he was uplifted with pride, as it is recorded in the second Book of Chronicles (xxxii, 26): That he humbled himself for the pride of his heart, and, God left him, to try him, that he might know all that was in his heart
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25208.html"
source_title="The Christian Topography, Book 8"

[[commentary]]
quote='''
But the Chaldaeans and the Medes and Persians, having a somewhat wider knowledge, were instructed by the building of the Tower, and the deluge, and by what happened in the case of Hezekiah and Jonah, and by the Captivity, and by Daniel and the Three Children, and also partly by the writings themselves. In like manner also the Egyptians were instructed by the affairs of Joseph and of Moses, and by the people of Israel, and these nations were thus better prepared for a ready acceptance of Christianity.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
