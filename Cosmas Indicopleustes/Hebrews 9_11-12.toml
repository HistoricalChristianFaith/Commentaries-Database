[[commentary]]
quote='''
And then when explaining the second Tabernacle he speaks thus: But Christ having come a high priest of the good things to come, through the greater and more perfect Tabernacle, not made with hands, that is to say, not of this creation, nor yet through the blood of goats and calves, but through his own blood, entered in once for all into the Holy place having obtained eternal redemption; as if he said: Just as the high priest once a year enters into the inner Tabernacle through the blood of goats and calves, making propitiation for the people, so also Christ entered into the Tabernacle not made with hands, that is, into heaven, having once for all procured eternal redemption.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
