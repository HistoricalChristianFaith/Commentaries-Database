[[commentary]]
quote='''
as often as He wished, He at once vanished from them, how by way of instructing her He said to Mary: Touch me not, teaching her by these words that intercourse between immortals and mortals is not fitting, but rather intercourse with immortals must be in heaven. Wherefore also He directed her to go away and tell the disciples: I ascend into heaven into which ye also are to ascend.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
