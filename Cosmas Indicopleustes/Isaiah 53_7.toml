[[commentary]]
quote='''
He was led as a sheep to the slaughter, and as a lamb before the shearer, so was he dumb. The Ethiopian eunuch on reading this passage asked Philip to interpret it to him, and he at once explained that it was spoken by the Prophet with reference to the Lord Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
