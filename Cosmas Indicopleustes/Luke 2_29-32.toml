[[commentary]]
quote='''
This is the righteous Simeon who, when he had taken up the Lord Christ in his arms, prayed to God to let him depart this life, as it had been revealed to him by the spirit, saying thus: Lord, now lettest thou thy servant depart, in peace, according to thy word, for mine eyes have seen thy salvation, which thou hast prepared before the face of all people—a light for revelation to the gentiles, and the glory of thy people Israel.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
