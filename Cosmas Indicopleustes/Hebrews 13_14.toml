[[commentary]]
quote='''
For we have here no abiding city, but we seek that which is to come, meaning: We seek that ever-abiding and eternal heavenly Jerusalem, which is free and the mother of all the faithful.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
