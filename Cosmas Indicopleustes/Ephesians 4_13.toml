[[commentary]]
quote='''
Till we all attain unto the unity of the faith and of the knowledge of the Son of God, unto a full-grown man, unto the measure of the stature of the fulness of Christ. But they will yet again question us on this point: How does one who is diminutive in body rise perfect? And how can the maimed and the lame or he that is mutilated in one of his limbs rise up sound and quite perfect? Let them listen to us replying from scripture and from what is seen in Nature thus: Just as God took Adam's rib, a very small member of his body, and constructed out of it a perfect woman, mysteriously supplying what was deficient; and just as a man and woman copulate, of whom one or the other is, as is often the case, blind or maimed, and their offspring is born sound and entire, so it is to be believed and understood with respect to the resurrection of the dead, in which we are born anew from the tomb into a better birth than from the womb.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
