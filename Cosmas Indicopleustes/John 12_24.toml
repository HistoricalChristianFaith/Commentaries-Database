[[commentary]]
quote='''
Except a grain of wheat fall into the earth and die, it abideth by itself alone, but if it die, it beareth much fruit; as if he said: Why do they wish to see me now, when I am despicable in appearance and alone, like a grain of wheat; for except I die like a grain, and rise up like the wheat in ear and in the fulness of its bloom, having become incorruptible and immortal and immutable, and except mighty deeds and wonders shall be wrought in My name, they will not know My power and glory.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
