[[commentary]]
quote='''
By the word of the Lord were the heavens made solid; because made from the waters—for in no passage elsewhere is the [heaven] said to be solid; it is one thing to be made solid, and another to be solid. The expression being made solid is used when that which is rarified and attenuated becomes consolidated.
'''
append_to_author_name='(quoting Severianus of Gabala, Hexaemeron)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
