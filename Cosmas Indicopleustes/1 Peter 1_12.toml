[[commentary]]
quote='''
Into which things the angels desire to look; as if he said: They also have not yet obtained the good things laid up for us in heaven—yea, they have not so much as the privilege of seeing them.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
