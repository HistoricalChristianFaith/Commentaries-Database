[[commentary]]
quote='''
But let us consider the words now spoken by Him to His illustrious disciples—namely: It is expedient for you that I go away. For your salvation have I come down to the earth, for your benefit it is well that I go up into heaven. For your sakes did I, hitherto bodiless, come down—it is expedient for Me to be there with the body; your race did I resolve to draw up to heaven; it behoves Me in the flesh to take My seat on the right hand of the Father. It behoves Me to open up a way that before was strange, as a new way, and to show that heaven is accessible to man. I take my way first through the air, in order that you also afterwards may be caught up into the air in clouds to meet Me. And I fancied I heard him, as he was reading, expressly proclaim how that this man shrinks from departure from life, and how that He through suffering and the resurrection received incorruption and renovation of His nature and vivification—how that through prevailing infirmity He was formerly subject to sufferings and fatigue—how that moreover He was drawn to heaven and deemed worthy of the seat on the right hand, and was the first to traverse the strange way, and the first to make heaven accessible to men.
'''
append_to_author_name='(quoting Timotheus of Alexandria)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
