[[commentary]]
quote='''
This is Daniel who prophesied in Babylon and who was also privileged to utter predictions concerning the Lord Christ, and he speaks thus: And thou shalt know and discern that from the going forth of the commandment to the response and the building of Jerusalem, until the anointed one a prince, shall be seven weeks and three score and two weeks.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
