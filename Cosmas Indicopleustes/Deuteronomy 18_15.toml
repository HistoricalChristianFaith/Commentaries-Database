[[commentary]]
quote='''
A prophet shall the Lord your God raise up unto you—him ye shall hear. And that man who shall not hear what ever that prophet shall speak in my name, that soul shall be cut off from his people.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
