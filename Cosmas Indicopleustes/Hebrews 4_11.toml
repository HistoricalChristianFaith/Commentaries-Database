[[commentary]]
quote='''
Let us be eager to enter into that rest; speaking of that rest as if there is no other after it, but a kingdom that cannot be shaken, meaning one that has no successor.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"

[[commentary]]
quote='''
Let us give diligence to enter into that rest; calling it a rest as not admitting of succession, and because when we are there, we shall not be transferred thence, but shall for ever rest in heaven itself.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
