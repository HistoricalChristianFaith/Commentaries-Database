[[commentary]]
quote='''
And when she had conceived, she bare a son and called his name Sêth, for, said she, God hath raised me up another seed instead of Abel whom Cain slew; implying by this that Abel has died childless, and the seed of Cain is to perish; this hath God given me as a new foundation for the human race. So far Eve.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
