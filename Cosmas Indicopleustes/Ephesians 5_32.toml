[[commentary]]
quote='''
the Apostle Paul has used this as an illustration, explaining it in a mystical manner, concerning the Lord Christ and the Church, saying: This mystery is great, but I speak of Christ and of the Church. For just as Adam is the head of all men in this world, as being the cause of their existence, and their father, so also the Lord Christ according to the flesh is the head of the Church, and the father of the future age.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
