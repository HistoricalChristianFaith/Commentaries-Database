[[commentary]]
quote='''
This is Melchisedek — that so great priest of God most high, who received tithes from the priests under the Mosaic law. This is the King of peace and righteousness, and at the same time a priest of God most high, who was made like to the Son of God — who neither received the priesthood in succession to other priests, nor transmitted it to other priests. This is he who did not perform the rites of divine worship according to the law of Moses, but exercised his priestly office with other and more excellent symbols. This is he who blessed the patriarch Abraham, he who was without father and without mother and did not trace his descent from them; the only person who was priest and king, who was made like to the Son of God, and was held worthy to be the revealer of so many good things.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
