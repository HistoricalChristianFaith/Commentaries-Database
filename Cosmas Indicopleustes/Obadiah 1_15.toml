[[commentary]]
quote='''
This is Obadiah (Abdiou) the fourth in order, who also was privileged to prophesy concerning the mystery regarding Christ, and who speaks thus: Because the day of the Lord is near upon all the nations. This taken in its obvious meaning is spoken of the Scythians, that is, of Gog and Magog, but it is most properly applicable to the Lord Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
