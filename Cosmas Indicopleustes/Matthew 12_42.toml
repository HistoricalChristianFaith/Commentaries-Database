[[commentary]]
quote='''
the Queen of Sheba, that is, of the Homerite country, whom afterwards our Lord in the Gospels calls the Queen of the South, brought to Solomon spices from this very Barbaria, which lay near Sheba on the other side of the sea, together with bars of ebony, and apes and gold from Ethiopia which, though separated from Sheba by the Arabian Gulf, lay in its vicinity. We can see again from the words of the Lord that he calls these places the ends of the earth, saying: The Queen of the South shall rise up in judgment with this generation and shall condemn it, for she came from the ends of the earth to hear the wisdom of Solomon.—Matt, xii, 42. For the Homerites are not far distant from Barbaria, as the sea which lies between them can be crossed in a couple of days, and then beyond Barbaria is the ocean, which is there called Zingion
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
