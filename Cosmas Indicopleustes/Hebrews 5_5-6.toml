[[commentary]]
quote='''
The Apostle also mentions this passage, saying in the Epistle to the Hebrews: Even as Aaron, so Christ also glorified not himself to be made a high priest, but he that spake unto him, Thou art my son, this day have I begotten thee; as he saith also in another place, Thou art a priest for ever after the order of Melchisedec; thus extracting all that referred to the humanity of Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
