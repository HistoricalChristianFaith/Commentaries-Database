[[commentary]]
quote='''
To whom again the blessed Paul in his Epistle to the Hebrews bears witness in these words: And of the Son he saith, thy throne, O God! is for ever and ever; the sceptre of uprightness is the sceptre of thy kingdom. Having said this concerning his divinity, he forthwith speaks of his humanity and says: Thou hast loved righteousness and hated iniquity, wherefore God, even thy God, hath anointed thee with the oil of gladness above thy fellows. For it is not his divinity which is anointed on account of his loving righteousness and hating iniquity, nor is it in any case anointed, nor has it another God [for fellow], for God exists by himself. But it is his humanity which is anointed with the oil of gladness (by which is meant, with the Holy Spirit) above its fellows—that is, above all the anointed. For his divinity has no other fellow, for God is one, the Father and the Son and the Holy Ghost, but the humanity of Christ has for its fellows all men, especially those who have been anointed. For by reason that the humanity of Christ was anointed above all others, since it was anointed with the Holy Spirit and with power, a distinction accorded to none of the others who were anointed, he used the words: Above all thy fellows. The whole psalm, moreover, he wrote with reference to Christ and the Church, speaking of the one as a royal bridegroom and of the other as a royal bride.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
