[[commentary]]
quote='''
In that day will I raise up the tabernacle of David that is fallen and close up the breaches thereof; and I will raise up his ruins, and I will build it as in the days of old, that the rest of men and all the nations may enquire who have been called by my name, saith the Lord who doeth these things. A passage of which James the Apostle makes mention in the Acts of the Apostles.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
