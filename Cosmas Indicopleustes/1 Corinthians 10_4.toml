[[commentary]]
quote='''
the Apostle says: For they drank of that spiritual rock which followed them, and that rock was Christ; by which he meant that, just as the flood of water from the rock which followed them gave them without stint water to drink, so Christ supplies to us life-giving waters, through the mysteries of which the rock was a type.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
