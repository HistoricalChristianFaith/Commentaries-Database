[[commentary]]
quote='''
Yea, and we are found false witnesses of God, because we have testified of God that he raised up Christ whom he raised not up, if so be the dead are not raised. But we, he says, who have testified unto you that God raised up Christ shall be found to be liars and impostors.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
