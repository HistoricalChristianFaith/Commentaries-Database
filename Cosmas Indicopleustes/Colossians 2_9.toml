[[commentary]]
quote='''
For God made his dwellings among men partly in the prophets, but has now made them wholly and uninterruptedly and universally in the Lord Christ, who according to the flesh was descended from Shem, in the same way as it is written concerning the Lord Christ according to the flesh: In whom dwelleth all the fulness of the Godhead bodily. By these visions therefore Noah was privileged to predict what was fulfilled in the dispensation of the Lord Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
