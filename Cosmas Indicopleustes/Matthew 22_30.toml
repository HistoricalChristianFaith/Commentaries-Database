[[commentary]]
quote='''
For God divided the one place which extends from the earth to the higher heaven by interposing in the middle the second heaven, and thus made two places; and to this mortal and mutable state he assigned the lower place, and to the immortal and immutable state the higher, which is called also the Kingdom of Heaven, and about which the Lord Christ speaks thus in the Gospel of Matthew: For in the resurrection they neither marry nor are given in marriage, but are as the angels of God in heaven;
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"

[[commentary]]
quote='''
when the Lord in arguing with the Pharisees and Sadducees concerning the resurrection he speaks thus: For in the resurrection they neither marry nor are given in marriage, but are as the angels of God in heaven.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"

[[commentary]]
quote='''
the Jews acknowledge a resurrection for men, but say that we shall live upon the earth and eat and drink and marry and be given in marriage, as, in the Gospels, the Sadducees proposed a question to the Lord, saying: In the resurrection of which of the seven shall she be the wife? These the Lord very summarily convicted of error and of not knowing divine scripture, in which there is the power of God, saying to them: For, in the resurrection, they neither marry, nor are given in marriage, but are as the angels of God in heaven. It is therefore proved against these, both from what is written and from the figure of the world prepared from its foundation, that the upper place was not made without occasion—but that there is a second heavenly state prepared from the foundation of the world.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25206.html"
source_title="The Christian Topography, Book 6"
