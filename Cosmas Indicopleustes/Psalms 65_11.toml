[[commentary]]
quote='''
For that these bodies have a circular motion David shows when he says: Thou shalt bless the crown of the year with thy goodness; here with wonderful propriety styling the circle of the twelve months a crown, as crowning the face of the earth with beauty, whence he added: And the fields shall be filled with thy fatness. For by the circular motion and the succession of returns from the tropics, the fruits of the earth grow and reach maturity.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25209.html"
source_title="The Christian Topography, Book 9"

[[commentary]]
quote='''
David moved by the Holy Spirit thus in a psalm addresses God: Bless thou the crown of the year of thy goodness; thus in a remarkable way styling the cycle of the twelve months of the year a crown of goodness, as crowning the surface of the earth with beauty, and fostering the growth and maturity of its monthly fruits through the tempering of the elements which the invisible powers accomplish. Wherefore he further adds: And the plains shall be filled with thy fatness
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25208.html"
source_title="The Christian Topography, Book 8"
