[[commentary]]
quote='''
Eighthly, a second time through Isaac and Rebecca, when twins were born, it was said: The elder shall serve the younger, thereby again showing there are two states, one of bondage and the other of freedom.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25206.html"
source_title="The Christian Topography, Book 6"
