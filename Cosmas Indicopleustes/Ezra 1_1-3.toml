[[commentary]]
quote='''
The decree of Cyrus, which is committed to writing and recorded in Chronicles and in Esdras (Ezra), and which enjoined all the people to go up, runs thus: In the first year of Cyrus King of Persia, that the word of the Lord by the mouth of Jeremiah might be accomplished, the Lord stirred up the spirit of Cyrus King of the Persians that he made a proclamation throughout all his kingdom and put it also in writing, saying: Thus saith Cyrus King of the Persians, all the kingdoms of the earth hath the Lord, the God of heaven, given me, and he hath charged me to build him an house in Jerusalem which is in Judaea. Whosoever there is among you of all his people, be God with him and let him go up! See, my admirable friend, how he acknowledges that he had read the book of Isaiah, and believed in what was written, and fulfilled what was written in scripture with all diligence and without sparing the expense
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25208.html"
source_title="The Christian Topography, Book 8"
