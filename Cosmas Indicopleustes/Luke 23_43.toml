[[commentary]]
quote='''
just as Adam had on the sixth day sinned by eating about mid-day of the fruit of the tree, and was cast out of the garden in the afternoon, so also on the sixth day and at the sixth hour, the Lord Christ for his sake endured in the flesh the Cross, by which we are saved. And just as again from the time of the transgression to the expulsion from the garden, all the angels were filled with great dismay, expecting nothing else than the destruction of man and of themselves and of the universe, so also during the Passion from the sixth hour until the ninth the whole creation was shrouded in darkness at the wickedness that was being perpetrated. And just as the two, Adam and Eve, were at the ninth hour cast out of Paradise, so also at the ninth hour the Lord Christ in the spirit and the thief entered into Paradise. On the same day, therefore, in which Adam was made, that is, on the sixth, there occurred both the Fall and the grief of the angels, the sentence of death and the expulsion from Paradise, so also at the time of the Passion, on the same day, there occurred the death of the Saviour by the tree of the Cross, the mourning of the creation, and in the afternoon the putting away of the mourning and the entrance into Paradise. Verily I say unto you, saith the Saviour to the thief, to-day shalt thou be with me in Paradise. Glory to God for ever and ever, Amen
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"

[[commentary]]
quote='''
to the thief who believed in him he gave this promise: Verily I say unto you, to-day shall thou be with me in Paradise. Here as evidently as possible he speaks of the soul as in a place. And that he speaks with reference to the soul and not to the body, is evident from the fact that the body of the Lord was buried by Joseph of Arimathea in Jerusalem, and that of the thief was buried there also. Most manifestly therefore he speaks of the soul when saying: To-day shalt thou be with me in Paradise. Besides, most of the evangelists when speaking of the death of the Lord say: He gave up the spirit—that is, the spirit within—namely, the soul, which went out of the body. Another of the evangelists says: Having bowed his head, he gave up the spirit
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
