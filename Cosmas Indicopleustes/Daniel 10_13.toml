[[commentary]]
quote='''
And the prince of the Kingdom of Persia withstood me one and twenty days, but lo! Michael one of the chief princes came to help me, and I left him there with the King of the Persians. Now I am come to make thee understand what shall befall thy people in the latter days. The expression he withstood me, and that other, he came and went away and I left him there, and others of like import, refer to beings whose natures are circumscribed
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
