[[commentary]]
quote='''
the whole creation groaneth and travaileth together in pain until now, thereby again showing that the whole creation, and especially the angels themselves, are burdened in this state of existence from being subservient to corruption and mutation. For since they are themselves mutable they are constantly absorbed in reflections about mutation, thinking over and hoping for liberty and longing to obtain it; and obtain it they shall, as has been stated, when men rise from the dead
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
