[[commentary]]
quote='''
The same prophet again says: Lo! the days are coming, saith the Lord, and I shall make a new covenant with the house of Israel and with the house of Judah. etc. This passage is cited by the Apostle in the Epistle to the Romans.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
