[[commentary]]
quote='''
The writers again of Egyptian history, namely, Manethô, and Chaerêmôn, Apollonius surnamed Molôn, Lysimachus and Apiôn the Grammarian mention Moses and the departure of the children of Israel from Egypt. For, as being Egyptians and the historians of Egypt, they also agree in their relations of local transactions, and traduce Moses as a promoter of sedition, who stirred up a mob of rascally beggars and lepers, and say that these had gone away to Mount Sinai and Jerusalem, and were called Jews. And in a word the Chaldaeans and Egyptians, as being older nations than the Greeks, testify in a manner to divine scripture, asserting that both the deluge in the days of Noah did occur, that a Tower was built, and that there was a departure of the children of Israel from Egypt.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
