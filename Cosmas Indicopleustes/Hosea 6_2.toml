[[commentary]]
quote='''
This is Hosea, the first of the twelve prophets who was privileged to speak concerning the Lord Christ in these terms: When they are afflicted, let them rise early to seek me saying, Come and let us return unto the Lord our God, for he hath smitten us and he will heal us; he that hath struck us will bind us up. After two days will he heal us. On the third day we shall be raised up again and we shall live! With reference to this passage the Apostle Paul says to the Corinthians: For I delivered unto you first of all that which also I received, how that Christ died for our sins according to the scriptures. For that he was buried, and that he was raised up on the third day according to the scriptures, is not to be found anywhere else.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
