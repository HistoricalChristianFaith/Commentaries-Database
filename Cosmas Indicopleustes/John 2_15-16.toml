[[commentary]]
quote='''
What is alleged is false, for it was not at all to the human being he applied the scourge, but he adopted an admirable and becoming and appropriate course, for he scourged the brute beasts only, as it is written: And having made a scourge of small cords he drove all out of the temple, both the sheep and the oxen, as much as to say: He scourged animals, but only the irrational, driving also out of the temple even those that were brought for sacrifice according to the law, showing by this means that the Judaic dispensation was coming to an end. Things, again, that had neither life nor sensation he pushed away and overthrew, as it is written: And he poured out the money-changers' money and overthrew their tables. The rational beings, however, he neither scourged nor drove away, but he chastised the irrational, as it is written: And to those that sold doves he said: Take these things hence, and make not my Father's house a house of merchandise—showing by all these words and acts that the things offered for sacrifice in the first tabernacle according to the law were to cease, and that another dispensation would be introduced in its place, harmonising with the inner tabernacle, which was a type of the things in heaven—that is, of the future dispensation.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"
