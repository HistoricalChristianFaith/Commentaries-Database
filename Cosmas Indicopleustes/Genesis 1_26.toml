[[commentary]]
quote='''
the Old Testament says: Let us make man in our image and after our likeness. Here in both the words it expresses plurality, but the phrases in our image and after our likeness do not mean the same thing, but the former of them means one thing, and the other a different thing. The expression in our image has this sense, that man and man alone, as having all things in himself—things visible and things invisible, things perceived by the intellect and things perceived by the senses, things corruptible and things incorruptible, indicates that there is one Creator of all things that are, even God, and man is in this respect the image of God, through his knowing that there is one Creator of the universe, as the Apostle exclaims: For a man ought not to cover his head, being the image and glory of God; thus expressly declaring that man was made for the glory of God, and, in accordance with this, calling him His image, as man alone is capable of knowing that there is one Creator of the universe, even God, who formed man as the only living creature in whose composition are found all the natural qualities. But the other expression after our likeness has this sense, that Adam was a father and not a son, and, from his own substance by procession produced Eve, who is called neither a son nor a sister, and by generation produced his own son Sêth, who again was of his own substance, producing him by generation, and her by procession.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
