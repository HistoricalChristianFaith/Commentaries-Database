[[commentary]]
quote='''
This is Habakkuk the ninth in order, who was also privileged to speak concerning the resurrection of Christ in these terms: Behold, ye despisers, and regard, and wonder marvellously, and vanish for ever, because I work a work in your days which ye will not believe though it be told you. This passage Paul cited at Antioch of Pisidia as having reference to the resurrection of the Lord Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
