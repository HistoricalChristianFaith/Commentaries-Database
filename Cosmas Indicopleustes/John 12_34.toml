[[commentary]]
quote='''
The blessed Hezekiah then, who was King of the Jews, and a very pious and virtuous man and an object of God's especial care, entertained the idea that the blessed David had spoken of him prophetically in many of the Psalms, such as the nineteenth, the twentieth, and many others besides, and having moreover applied to himself the prophecy which had once been made in his father's time by Isaiah: Behold a virgin shall conceive and bear a son, he was uplifted in mind by the workings of human passion, and imagined himself to be the Christ who had been predicted. He was in consequence at first unwilling to take a part in the common offices of life, through the existence of another opinion among the Jews, that Christ when He comes, never dies, but abides for ever, as they also said in the Gospel: We have heard out of the Law that Christ abideth for ever. So Hezekiah being of this opinion abstained from taking a wife and providing for the succession of his line by having children, being under the belief that he would live always
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25208.html"
source_title="The Christian Topography, Book 8"
