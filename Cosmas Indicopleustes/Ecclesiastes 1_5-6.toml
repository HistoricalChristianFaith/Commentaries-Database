[[commentary]]
quote='''
And Solomon says: The sun ariseth, and the sun goeth down, and hasteth to his place. Arising he goeth there towards the south and wheeleth round in his circuit, and the wind goeth on its circuits. He also, in what he says, agrees with Moses and David, namely, that the sun proceeding from the east ascends to the south, and by making a circuit through the north, causes the tropics, and completes the great circle of the year in his passage through the air; for this is what the expression the wind goeth on means, as if he said, in the air.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25209.html"
source_title="The Christian Topography, Book 9"

[[commentary]]
quote='''
By the blessed Solomon then, when in the book of Ecclesiastes, a book attested [to be inspired], and not rejected [from the canon] he says: The sun ariseth, and the sun goeth down, and hasteth to his place; arising there he goeth to the south, and wheeling in his circuits, wheels towards the north; the wind goeth and turneth about in its circuits. Behold then the sun running his course in the south, and wheeling round to the north, and be instructed.
'''
append_to_author_name='(quoting Severianus of Gabala, Hexaemeron)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
