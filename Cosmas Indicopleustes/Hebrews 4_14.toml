[[commentary]]
quote='''
Having therefore a great high priest who hath passed through the heavens, Jesus the Son of God, let us hold fast our confession —the expression who hath passed through the heavens, that is heaven, according to the idiom of the language, means that He is within the two heavens, as in a Tabernacle not made with hands.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
