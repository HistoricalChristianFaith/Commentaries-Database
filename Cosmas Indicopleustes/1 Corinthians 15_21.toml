[[commentary]]
quote='''
For just as he ordained to introduce death on account of the sin of the first man, so also, through the obedience of the Lord Christ according to the flesh, he ordained the resurrection and the renovation and the gathering together of the whole creation. For, as Paul says, as by man came death, so by man the resurrection from the dead has been brought into the world. This is the great salvation, and dispensation and wisdom of God, who has produced all things and has again restored them.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
