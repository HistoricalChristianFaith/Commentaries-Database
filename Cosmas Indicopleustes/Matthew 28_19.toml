[[commentary]]
quote='''
Go ye, and make disciples of all the nations, baptizing them into the name of the Father and of the Son and of the Holy Ghost, speaking indeed of one name, but distinguishing them into three Persons.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
