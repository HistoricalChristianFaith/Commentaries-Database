[[commentary]]
quote='''
Depart from me, ye cursed, into everlasting fire prepared for the devil and his angels, as if he said, to the righteous, come above to the inner heaven beyond this visible firmament, and to the impious, go down to the place about the earth, into which the devil also was hurled down.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
