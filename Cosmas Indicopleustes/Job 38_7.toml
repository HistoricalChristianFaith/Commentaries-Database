[[commentary]]
quote='''
When God Almighty had along with the heaven and the earth produced all the angels, who had not hitherto existed, they stood all of them mute with surprise, being distinguished by the possession of reason from all around them, and were at once filled with amazement, and bent on considering who he was, the Creator who had called themselves and everything with them into existence. For they saw themselves existing in the midst of these things, and that they did not exist before them, and further reflected: The Creator of these and those things is surely one, or each must have had a different creator—or again: Were all things produced spontaneously of themselves, or who then is greater than the other? But when they were revolving such thoughts in their minds for the space of that night (for, as it is written, God called that darkness, night) God entering into their thoughts, all at once without being visible, said in clear tones: Let there be light; and the production of the light from nothing, following instantaneously with the word, struck them all with astonishment, and at the same time taught them that he who had produced this light out of nothing had produced also themselves and the things existing with them out of nothing. Then all bending down worshipped the invisible God, who had produced themselves and all things out of nothing. This, moreover, divine scripture declares in Job speaking in the. person of God: When I made the stars all my angels praised me with a loud voice and celebrated me with hymns, from one indicating all successively.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"

[[commentary]]
quote='''
For the angels having been created beings were not co-workers with God, but His ministers who praised Him in song, and expressed their gratitude for being brought into existence, being aware that, as they had no previous existence, they had been created by the Spirit of goodness. So they stood as spectators merely, beholding the things made along with them, and after them; for they beheld the heaven made of nothing, and were struck with astonishment; they beheld the sea parted off, and were lost in wonder; they saw the earth in her beautiful apparel, and were thrilled with delight. But that the angels were not co-workers, but admiring spectators, God says in Job: When I made the stars, all the angels praised me and celebrated me in song;
'''
append_to_author_name='(quoting Severianus of Gabala, Hexaemeron, Book 4)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
