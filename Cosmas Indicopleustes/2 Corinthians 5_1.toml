[[commentary]]
quote='''
The Apostle Paul, then, speaks to this effect: For we know that if the earthly house of our Tabernacle be dissolved, we have a building from God, a house not made with hands, in the heavens, in order that he may show that the earthly state here shall be dissolved, but that the future state, which is also a heavenly, is indissoluble and eternal.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
