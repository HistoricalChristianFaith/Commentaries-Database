[[commentary]]
quote='''
We have neither devised fictions of our own nor invented new fables; but from revelation and from what God who created the world has ordained, have beheld the pattern of the whole world—namely the Tabernacle prepared by Moses, which the New Testament consistently with this view has pronounced to be an image of the whole world; and which also by means of the vail Moses divided, and so made one tabernacle into two, just as God also in the beginning divided what was one region, extending from the earth to the highest heaven, into two regions, by means of the firmament; and just as in the tabernacle there was an outer and an inner place, so here there was a lower and an upper. Now the lower is this world, and the upper is the world to come, into which also the Lord Christ, after having risen according to the flesh from the dead, ascended the first of all, and into which the righteous shall in their turn afterwards ascend. And since from Adam to Moses, and from Moses to John, and from John all the Apostles and Evangelists, have each and all in harmony, and both by words and types spoken of these two states; and since not one of them has uttered a discordant note, either saying that there was a state before the first, or supposing that there is a third after the second; but all of them, as if inspired by the Holy Ghost, have proclaimed that there are but two states only, we, therefore, putting our confidence in the scriptures, which are truly divine, have not only sketched the figures of the whole world, but also of those very places by which you will find the Israelites made their exodus, also the mountain on which they received the law in writing, and were instructed in the knowledge of writing; also the delineation of the Tabernacle and the settlement in the Land of Promise; until he who was expected to arise from among them, and who was predicted by all the men of old and by the Prophets, did actually appear, proclaiming the future second state, which on his coming he showed in himself to us all, having entered into the inner Tabernacle, into the upper celestial region, into which at his second coming he shall call the righteous, saying: Come, ye blessed of my Father, inherit the Kingdom prepared for you from the foundation of the world.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25201.html"
source_title="The Christian Topography, Book 1"

[[commentary]]
quote='''
for Christ is not entered into the holy places made with hands, which are the figures of the true, but into heaven itself, now to appear in the presence of God for us. In this last passage he says that heaven is the true tabernacle, while the things which were prepared by Moses are antitypes. He therefore calls the things of Moses things made by hands, but the real things not made with hands.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"

[[commentary]]
quote='''
In order that, having again drawn back the veil of the word, we may with unveiled face behold the festival of the divine Passover, appealing thus to Jesus: Where wilt thou that we prepare to eat the Passover with thee? On receiving his reply that this feast was to be celebrated in an upper chamber, a chamber, that is, of second things, the disciples with alacrity of heart betook themselves with all speed to enter the Holy of Holies, into which Christ Himself hath entered for us, and hath done away with any further need of the typical High Priest, having obtained eternal redemption for us, and on our behalf presenting Himself before the face of God. Formerly indeed the High Priest alone once a year entered into the Holy of Holies, the people remaining without by reason of the littleness of their power. But the Saviour having entered in, has given full liberty of access to all who wish.
'''
append_to_author_name='(quoting Theophilus of Alexandria, First Festal Epistle)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"

[[commentary]]
quote='''
For Christ entered not into a holy place made with hands like in pattern to the true, but into heaven itself; calling heaven the true holy place, and the inner tabernacle its antitype.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
