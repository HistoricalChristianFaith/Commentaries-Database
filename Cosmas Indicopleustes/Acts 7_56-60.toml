[[commentary]]
quote='''
This is Stephen the first martyr of the New Testament and the first Deacon, who had for his slayer the great Paul while he was as yet zealous for the law—who alone by himself contended against the whole synagogue and made the Judge of the contest rise from his seat to witness the spectacle. This is he who saw the heavens opened and the Son of Man standing on the right hand of God. For while the whole of divine scripture speaks of Him as sitting, this man saw Him standing; for the vehemence of the contest made the Judge rise up for the view. Wherefore also on being invited to ascend to that glory, he prayed for those who were stoning him, saying: Lord, lay not this sin to their charge, but do thou thyself receive my spirit. Lo! he also saw and preached the same things with the others, namely that Christ, the Prince of the second state, is in heaven, and of Him he entreated that He would receive him into that place.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
