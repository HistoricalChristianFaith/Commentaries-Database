[[commentary]]
quote='''
This is the first heaven, shaped like a vaulted chamber, which was created on the first day along with the earth, and of it Isaiah speaks thus: He that hath established the heaven as a vaulted chamber. But the heaven, which is bound to the first at the middle, is that which was created on the second day, to which Isaiah refers when he says: And having stretched it out as a tent to dwell in. David also says concerning it: Stretching out the heaven as a curtain, and indicating it still more clearly he says: Who layeth the beams of his chambers in the waters.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25204.html"
source_title="The Christian Topography, Book 4"

[[commentary]]
quote='''
He made therefore the heaven, not a sphere, as those vain babblers conceive—for He did not make a rolling sphere, but, as the prophet says: Who hath made the heaven as a vaulted chamber and stretched it out as a tent to dwell in; for none of us is so impious as to be persuaded by these triflers, and not by the words of the Prophet, which declare that the heaven has a beginning and an end.
'''
append_to_author_name='(quoting Severianus of Gabala, Hexaemeron)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"

[[commentary]]
quote='''
For the very Prophet through whom the retrogression of the sun was effected, when, by means of the dread sign, he had in reality confuted the theory of the Babylonians, by showing that the heaven is not a revolving sphere, and that they held an opinion that is erroneous, this very Prophet not long afterwards speaks thus of the figure of the heaven: He that established the heaven as a vaulted chamber; and again: The Lord God who made the heaven and fixed it, thus declaring at once that it is a vault, and that it is established and fixed and not in revolution
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25208.html"
source_title="The Christian Topography, Book 8"

[[commentary]]
quote='''
For, contending against the divine words, which say: He that established the heaven as a vault, these most superior persons cry out in opposition and say: "It is not so, for it is spherical, and this is manifest from the eclipses which we have already adduced."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
