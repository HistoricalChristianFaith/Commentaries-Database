[[commentary]]
quote='''
Man of old having sinned when the serpent in Paradise assailed him, it was said to him: He shall lie in wait for thy heel, but thou for his head; that is, Ye shall be divided and at enmity against each other, that man may not be under obedience to him. So the warfare was then waged on equal terms, each having the power to hurt the other; for the serpent watching for the heel of man, that is, besetting his path in order to hurt him on finding him out of the path, as he could do by creeping about his heel; while man being of upward stature and on his guard, and not straying from his path, was able to bruise the head of the serpent. And now having conquered the serpent and brought him finally to shame, and having through his agency unjustly endured death for the whole race, and nailed the bond against it to the cross and blotted it out, I rose again on the third day victorious over death, and became the champion who has achieved victory for all the human race, for through me the victory has been extended to all humanity. Be ye therefore of good courage. Behold, I have given you power to tread upon serpents and scorpions and on all the power of the enemy. He says in effect the serpent is no longer able to hurt your heel, being himself trampled down under your feet
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
