[[commentary]]
quote='''
But we all with unveiled face beholding reflected as in a mirror the glory of the Lord, are transformed into the same image from glory to glory even as from the spirit of the Lord; as if he said, when the Lord is nigh, all we the faithful, in the most manifest manner, without any veil, behold the glory of the Lord as in a mirror—and are transformed into the same image as the Lord has, partaking of his glory for our own glory. For the partaking of the mysteries indicates also our partaking of his glorified body, just as we behold him reflected as in a mirror and partake his glory. For out of his fulness do we all receive, nor does he, in giving liberally, suffer any diminution of his fulness. But the expression as from the spirit of the Lord is intended to show us, that just as Moses received [glory] from the Lord, so do we receive [glory] through the Holy Spirit.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
