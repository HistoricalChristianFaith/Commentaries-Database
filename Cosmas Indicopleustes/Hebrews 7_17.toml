[[commentary]]
quote='''
For it is testified of him, Thou art a priest for ever after the order of Melchisedec. Behold how in the clearest terms he speaks of Christ as a perpetual priest in virtue of His power and indissoluble life. How then is it possible for the Priest to be indissoluble whilst the Tabernacle, of which He is the minister, is subject to be dissolved? For he says: A minister of the sanctuary and of the true Tabernacle which the Lord pitched and not man, thus here, as also in Heb. vi, 16, 17, and 20, and x, 34, expressly declaring it to be true and indissoluble.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
