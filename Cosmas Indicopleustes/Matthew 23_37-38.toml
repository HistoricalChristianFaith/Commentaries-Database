[[commentary]]
quote='''
the Lord Christ, who in those days when he had come down from the Mount of Olives, and beheld Jerusalem and wept over it as it lay opposite, said: How often would I have gathered thy children even as a hen gathereth her chickens under her wing, and ye would not. Behold, your house is left unto you desolate.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"
