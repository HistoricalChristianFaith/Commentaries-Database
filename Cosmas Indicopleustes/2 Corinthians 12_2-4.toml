[[commentary]]
quote='''
the rapture of the Apostle Paul even into the third heaven, that is, to a third of the distance of the height of heaven from the earth—namely, as far as the firmament; then his rapture into Paradise where he was privileged to be the hearer of the unspeakable words which it is not lawful for a man to utter.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"

[[commentary]]
quote='''
He therefore sets forth from these things for us two causes [of the visions], one pointing to labour, and the other to reward. For what does he say? I know a man in Christ fourteen years ago (whether in the body I know not, or whether out of the body I know not, God knoweth), how that he was caught up into the third heaven; and again he says: And I know such a man that he was caught up into the third heaven and heard unspeakable words which it is not lawful for a man to utter; here manifestly setting forth things concerning himself in the person of another. I know, he says, O Corinthians, if I needs must myself come to visions and revelations of the Lord, that I was, in a wondrous manner beyond all conception, caught up to a vast height, that of the distance from the earth to the firmament, two-third parts, so that only one third of the whole height of heaven remained to me to be ascended. And what was the cause of his being thus caught up I will with God's help explain. Since the invisible powers in this height up to which Paul was caught, in obedience to the divine ordinance, for the sake of man move the heavenly bodies unceasingly and unhesitatingly by night and by day, He therefore caught up Paul, and conducted him thither, to show him the incessant service which they perform for the sake of men—to show him in what a rational, orderly, rhythmical and intelligent a manner, and with what toil and assiduity and solicitude, they render their service, and fulfil their work, that he might thus in a measure comfort Paul, so that in labouring for the Church, he might not give way to despondency, but persevere in his ministry, as he saw the angels were doing in theirs. Paul therefore had the boldness to reveal how they ranked in dignity, naming Principalities, and Powers, and Virtues, and Thrones, and Dominations. For some of them perform the work while others superintend the workers, and others exercise power as commanders of squadrons; and to say all in a word, all of them alike, groaning and travailing in pain together, perform their labour with great anxiety and solicitude, and in rational order, all of them being together desirous to gain their freedom from that bondage under which they serve for the sake of men.

I shall here speak again, God helping me, concerning the being caught up into Paradise. Since, after their departure from the body, the souls of the righteous, who are thought worthy to enter into the kingdom of heaven, are consigned to Paradise (as we learn from the case of the thief who was crucified along with the Lord), until the resurrection, being there kept as in a choice and honoured place by the invisible Powers, who entertain them with hymns and every mark of honour; God caught up Paul thither, and by way of comforting him, showed him, but in part only, the crowns which were the prizes of his toils and struggles; whence he was unable to give a perfect description of the things there; yea, he rather declared them to be unspeakable and incomprehensible, but he had the boldness to write, that for him, as one who had finished his course of service, and had kept the faith, there was laid up a crown of righteousness by the Lord, and not for him only, but also for all who are like him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25209.html"
source_title="The Christian Topography, Book 9"

[[commentary]]
quote='''
Lest therefore you should be led into error when you hear that the blessed Paul had been caught up into the third heaven, I must point out that there are not three or more heavens, and that he neither means to say this, nor contradicts Moses—but he means to say that he was caught up from the earth all the distance to the height of heaven except a third of it—as if he said: I was caught up from the earth so very far that there was left to me but a third of the distance to the height of heaven.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
