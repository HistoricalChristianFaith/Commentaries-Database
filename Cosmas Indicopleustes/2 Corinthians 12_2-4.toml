[[commentary]]
quote='''
the rapture of the Apostle Paul even into the third heaven, that is, to a third of the distance of the height of heaven from the earth—namely, as far as the firmament; then his rapture into Paradise where he was privileged to be the hearer of the unspeakable words which it is not lawful for a man to utter.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"
