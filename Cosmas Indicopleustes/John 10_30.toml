[[commentary]]
quote='''
Since therefore He is at once both God and man He is proved to be both by His works, and this cannot escape the notice of the spectators. For, that He is by nature God, is shown both by His works and His signs, cleansing the lepers, giving sight to the blind, strength to the paralytic, and life to the dead—and what is greatest of all (for the Prophets also equally succeeded in doing these things) He expressly and unreservedly said: I and my Father are one. But, by the things mentioned, the might of His divinity is fully proved—and that He is also truly man, this He does not wish to go unobserved; thus in anticipation refuting those who erroneously think He assumed a body in appearance only, for He showed clearly that He submitted to sufferings—and to what kind of sufferings? to those, forsooth, which are assigned to flesh by reason of its infirmity and not by reason of sin—I mean, for instance, hunger and thirst and the need of sleep, and fatigue. For as these things happen to us by nature and not by our choice, they do not affect with sin those who have to endure them. By these sufferings then which were not incurred by sin the Lord declared that His flesh obeyed, showing clearly that He had become man in nature and in truth, and not in seeming.
'''
append_to_author_name='(quoting Timotheus of Alexandria)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
