[[commentary]]
quote='''
This is the prophetess Elisabeth, who by the Holy Spirit was privileged to prophesy both concerning the Lord Christ and the Holy Virgin, speaking thus: And whence is this to me that the mother of my Lord should come to me? Thus both the father and the mother of the forerunner were privileged to announce beforehand the Lord Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
