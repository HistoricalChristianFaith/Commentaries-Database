[[commentary]]
quote='''
Thou, Lord, in the beginning didst lay the foundation of the earth, and the heavens are the work of thy hands; they shall perish, but thou shalt remain. This they distort, not understanding that here also in contrast to the uncreated deity he speaks of created things as perishable, because these things, having been previously non-existent, afterwards came into being; and if he wished the annihilation of existence, then, just as he produced these things when non-existent, so now that they exist, he is able to destroy them. For that which has not been made by any one cannot be destroyed by any one; but that which has been made can also be destroyed, especially if its Maker should so wish.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
