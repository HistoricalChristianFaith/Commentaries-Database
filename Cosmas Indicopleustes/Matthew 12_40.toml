[[commentary]]
quote='''
This is Jonah the fifth in order, who not by words, but by what he did and by what he typified, predicted the resurrection of Christ. For the Lord says: as Jonah was three days and three nights in the belly of the whale, so shall the Son of Man be three days and three nights in the heart of the earth. For as the whale vomited out Jonah uncorrupted, so also did the sepulchre vomit out the Lord to a better life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
