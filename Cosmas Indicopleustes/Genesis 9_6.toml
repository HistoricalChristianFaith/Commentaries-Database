[[commentary]]
quote='''
Whoso sheddeth man's blood, by man shall his blood be shed, for in the image of God have I made man. Hence it is manifest that God, both before the transgression and long after its occurrence, gave to man the same honour and power and dominion.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
