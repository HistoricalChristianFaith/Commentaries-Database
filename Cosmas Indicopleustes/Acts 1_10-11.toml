[[commentary]]
quote='''
Any one who takes into view the ascension into Heaven of our Lord Christ, and the angels clothed in white raiment announcing to the Apostles his second coming, would never cease magnifying Jesus who showed and opened up to men the ascent into the future heavenly state, which He had prepared from the foundation of the world;
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25206.html"
source_title="The Christian Topography, Book 6"

[[commentary]]
quote='''
And to speak briefly they were trained by wars and miracles and dreams and their sacred books, and were thus taught to know Him who was truly God, Him whom the Jews revere and worship, in order that they also might be the better prepared for the reception of Christianity, so that, at the time when our Lord sojourned upon earth, many nations of Greece, seeing the signs wrought by the Apostles, assented to the faith of Christ, confessing His resurrection and His ascension into heaven. But now, after a long lapse of time and the cessation of signs, they have fallen into a sort of oblivion of that faith, and have reverted to the former superstition, declaring it impossible that there can be a resurrection of the dead and an ascent into heaven. Wherefore you find them observing baptism, and yet thinking that the heaven has a spherical form, in order that the resurrection of their bodies and their ascension into heaven may be denied.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
