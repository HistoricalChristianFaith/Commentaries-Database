[[commentary]]
quote='''
And every priest indeed standeth day by day ministering and offering oftentimes the same sacrifices, the which can never take away sins; but this man, when he had offered one sacrifice for sins, for ever set down on the right hand of God, from henceforth expecting till his enemies be made the footstool of his feet. For by one offering he hath perfected them that are sanctified. If, as He says, he sits for ever at the right hand of God after His Passion and Sacrifice, and for ever sanctifies those coming unto Him, how is it possible that heaven can be dissolved when He sits there for ever, and those coming unto Him are sanctified.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
