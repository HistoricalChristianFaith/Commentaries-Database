[[commentary]]
quote='''
For the earnest expectation of the creature waiteth for the revealing of the sons of God. For the creation was subjected to vanity not of its own will, but by reason of him who subjected it, in hope because the creation itself also shall be delivered from the bondage of corruption into the liberty of the glory of the children of God. By the creature he here designates the angels, and by the sons of God the human race. By the term apokaradokia (earnest expectation), he represents the creature as straining its neck to scan the distant horizon in hope of descrying some help coming to man. For if the angels had not been subjected to servile ministrations they would not have longed for liberty; for when man had sinned and received sentence of death, they were smitten with sore grief, concluding that all was hopelessly lost; for since man was the bond uniting the whole creation, as well as the image of God, they abandoned after his sentence all hope both of themselves and of the universe, and were unwilling to be his servants and subordinates without resulting advantage. By the words, however, in the passage cited, by reason of him who hath subjected it in hope, the Apostle would have us understand that God did not permit the wish of the angels to prevail, but gave them some hope that they might not despair, but be cheered with the prospect that in the course of time some good would accrue to man
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
