[[commentary]]
quote='''
For the earnest expectation of the creature waiteth for the revealing of the sons of God. For the creation was subjected to vanity not of its own will, but by reason of him who subjected it, in hope because the creation itself also shall be delivered from the bondage of corruption into the liberty of the glory of the children of God. By the creature he here designates the angels, and by the sons of God the human race. By the term apokaradokia (earnest expectation), he represents the creature as straining its neck to scan the distant horizon in hope of descrying some help coming to man. For if the angels had not been subjected to servile ministrations they would not have longed for liberty; for when man had sinned and received sentence of death, they were smitten with sore grief, concluding that all was hopelessly lost; for since man was the bond uniting the whole creation, as well as the image of God, they abandoned after his sentence all hope both of themselves and of the universe, and were unwilling to be his servants and subordinates without resulting advantage. By the words, however, in the passage cited, by reason of him who hath subjected it in hope, the Apostle would have us understand that God did not permit the wish of the angels to prevail, but gave them some hope that they might not despair, but be cheered with the prospect that in the course of time some good would accrue to man
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"

[[commentary]]
quote='''
For the earnest expectation of the creation waiteth for the revealing of the sons of God; and, as if some one was uncertain as to his meaning and asked him: For the sake of what or by doing what, does the creation await this? he proceeds and says: because the creation was subjected to vanity not willingly; as if he said: in this corruptible and mutable world. For this he calls vanity—when creatures by the command of God were ordered to serve even against their will. Whence we learn by the expression not willingly that he is speaking of rational beings, and this is the law laid down for them. Should some one, he then says, put the question, And how again shall they serve, they who now move all things? They do serve, he replies, but as far as concerns the sin of Adam through which he was condemned to death, they could not endure to serve longer and toil in vain on our behalf. But I say this, he adds, on account of him who hath subjected them in hope, this namely, that God has given them a hope that some good will result to men in the course of time, and for this reason they were subjected, and do render service in expectation of their freedom, when men also are freed from death and corruption and these vanities, and shall receive the hope of God, and the glory which is reserved for them. Accordingly he adds: Because the creation itself shall be delivered from bondage, into the liberty of the glory of the sons of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
