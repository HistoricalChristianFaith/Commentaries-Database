[[commentary]]
quote='''
He saw a vision of an angel which also said unto him: Fear not, Zacharias, because thy supplication is heard, and thy wife Elizabeth shall bear thee a son; as if he had said, "Thou hast entered here to ask for the people remission of their sins, lo! I bring to you the good tidings that your prayer will be fulfilled, for there shall be born to thee a son by Elizabeth to be the forerunner of Him who of his grace will bestow upon the world a complete remission of their sins."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
