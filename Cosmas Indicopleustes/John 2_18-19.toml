[[commentary]]
quote='''
But the Jews having perceived how he was shadowing forth to them the cessation of the Jewish dispensation, questioned him, saying: What sign showest thou that thou dost these things? But taking appropriate advantage of the question, he promised them that he would do something darkly to foreshadow the answer. I refer to the destruction of the temple and to its renovation, because the destruction of the temple—that is, of his body—is the destruction of this world, while the renovation and change made upon the temple—that is, upon his body—is a manifestation of the future state.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"
