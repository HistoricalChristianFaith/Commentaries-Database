[[commentary]]
quote='''
First of all, it is proved from the account of the creation that God divided the one place which extends from the earth to the first heaven, by placing in the middle the firmament, that is, the second heaven, thus making the one place into two places.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25206.html"
source_title="The Christian Topography, Book 6"
