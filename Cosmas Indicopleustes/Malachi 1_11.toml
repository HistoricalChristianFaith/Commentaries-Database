[[commentary]]
quote='''
For, from the rising of the sun even unto the going down of the same, my name is great among the nations; and in every place incense is offered unto my name and a pure offering, for my name is great among the nations, saith the Lord Almighty.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
