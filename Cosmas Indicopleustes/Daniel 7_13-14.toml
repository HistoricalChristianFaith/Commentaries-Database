[[commentary]]
quote='''
And he came even to the Ancient of days and they brought him near before him—and there was given him dominion and glory and a kingdom, that all people, nations and languages should serve him; his dominion is an everlasting dominion, and his kingdom that which shall not be destroyed (Dan. vii, 13, 14). This is one instance more of his saying the same thing both in the image and the vision, namely, that at the coming of the Lord Christ those kingdoms shall pass away and be destroyed, but his kingdom shall be indissoluble and eternal
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"

[[commentary]]
quote='''
Behold one like unto the Son of Man coming with the clouds of heaven, and he came even unto the Ancient of days, and he was brought near before him. And there was given unto him dominion and glory and a kingdom, and all the peoples and nations and languages shall serve him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
