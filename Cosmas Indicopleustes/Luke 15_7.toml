[[commentary]]
quote='''
the angels being lost in wonder were taught by their own eyes through man the glory and the power and the greatness and the wisdom and the goodness of the one and only God, and that all the elements and what had been brought into existence after themselves had been prepared before on account of man. With alacrity therefore did they obediently serve and minister in moving everything that conduced to assist the image of God as being themselves members thereof, whence again they greatly rejoice over the welldoing and the righteousness of men, but are on the other hand greatly distressed by his evil-doing and by his sinning, as saith also the Lord himself: For there is great joy in heaven over one sinner that repenteth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"

[[commentary]]
quote='''
since man is the bond which unites the whole creation, and is also the image of God, the dispensation under which he lives is a school for his own instruction, and for that of all rational beings. For when he had sinned and had received the sentence of death, these other beings began to lament, deeming all hope to be lost both for themselves and for the universe; but when again they saw that God cared for him, they were led to conceive a good hope both for him and for themselves. This, moreover, the Lord declares in the Gospels when he says: There is joy in heaven over one sinner that repenteth, as on the other hand it is clear there is sorrow when any one sins.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
