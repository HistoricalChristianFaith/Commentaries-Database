[[commentary]]
quote='''
But John the Evangelist thus speaks: Many of his disciples went back, and walked no more with him. Jesus said, therefore, unto the twelve: Would ye also go away? But Peter immediately answering on behalf of all said: Lord, to whom shall we go away? Thou hast the words of eternal life, and we have believed that thou art the Holy One of God; meaning this: What thou teachest us we see even by the works which are done by thee, for thou promisest us life and a heavenly kingdom, and we see all things that are done by thee to have regard to the life of men. How then can we leave thee and attach ourselves to another? Our portion is therefore with thee, Lord Jesus Christ. Amen!
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"
