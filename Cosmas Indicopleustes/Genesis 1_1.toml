[[commentary]]
quote='''
For on the first day He made the matter out of which things were created; but on the other days He gave their form and arrangement to the things created. For example, He made the heaven which was before non-existent—not this visible heaven, but the one above it, for the visible was made on the second day. God made the higher heaven—the heaven of heavens to the Lord, and it is higher than this visible heaven, and, as in a house of two stories, between it and the earth another heaven is interposed. God having thus created the world as one house, placed this visible heaven as a roof in the middle, and the waters above it. Wherefore, David says: Who covereth his upper chambers with waters. God then made the heaven when it was not, the earth when it was not, the abysses when they were not, and wind, air, fire, water; of all the things that came into existence He made their matter on the first day.
'''
append_to_author_name='(quoting Severianus of Gabala, Hexaemeron, Book 1)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"

[[commentary]]
quote='''
Two and twenty works, O lover of the good and the beautiful, did God make from the beginning until the seventh day, namely these. On the first day He made the higher heaven, the earth, the waters from which come snow, ice, hail, frost and dew; then the spirits which minister before His face, such as these—the angels standing in His presence, the angels of glory, the angels of the clouds and darkness and snows and hail and frost—the angels of sounds, of thunder and lightning; the angels of cold and heat, of winter and autumn, and the angels of all the spirits of His creatures which arc in heaven and upon earth and in Chaos; then the darkness and the brooding over the abyss, the waters which once covered the earth, out of which darkness comes evening and night, the light of day and of the dawn. These seven mighty works did God make on the first day. On the second day was made the firmament which is in the midst of the waters. On the same day the waters were divided, one half of which ascended above the firmament, while the other half was underneath the firmament, upon the face of all the earth. This was the only work which God made on the second day.
'''
append_to_author_name='(quoting Epiphanius of Cyprus, On Measures and Weights)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
