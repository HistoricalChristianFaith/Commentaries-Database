[[commentary]]
quote='''
The river Phison separates all the countries of India [lying along its course] from the country of the Huns. In scripture the Indian region is called Euilat (Havilah). For it is thus written in Genesis: Now the river goeth out from Eden to water Paradise. And from there it was parted and became four heads. The name of the first is Phison (Pishon); that is it which compasseth the whole land of Euilat, where there is gold; and the gold of that land is good; there is the carbuncle and the jasper stone; where the writer clearly calls the country Euilat. This Euilat, moreover, is of the race of Ham. For thus again it is written: The sons of Ham, Cush and Misraim, Phut and Caraan the sons of Cush, Sabâ and Euilat; that is the Homerites and Indians, for Sabâ is situated in the Homerite country, and Euilat is in India. For the Persian Gulf divides those two countries. And that country has gold according to sacred scripture. It has also the pezerôs which Scripture calls anthrax (carbuncle) and the jasper stone, by which it designates the leek-green stone. Clearly therefore does divine scripture, as being really divine, relate these things, even as the whole of our treatise goes to show.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252011.html"
source_title="The Christian Topography, Book 11"
