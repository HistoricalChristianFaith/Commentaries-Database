[[commentary]]
quote='''
And as we have borne, he says, the image of the earthly, that is, the mortality and infirmity and corruption of Adam, we shall bear also the image of the heavenly, that is, of Him who hath already gone before and ascended into heaven after the resurrection from the dead. I speak of Christ according to the flesh, who has become powerful and incorruptible and immortal and glorified, and we in like manner have, with Him, become heavenly.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
