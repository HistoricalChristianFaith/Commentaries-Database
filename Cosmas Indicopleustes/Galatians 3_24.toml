[[commentary]]
quote='''
Yet one nation after another made a gradual advance to a fixed and authoritative code of laws, not imposed from the beginning like that of Moses of old, who educated his nation in the knowledge of letters and of fixed law, being the first who showed both by word and deed the firm and permanent nature of the law and of letters, until, after a long course of time, he conducted the nations, guided and guarded by the firm nature of the law, to the predicted Lord Christ and his teaching.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
