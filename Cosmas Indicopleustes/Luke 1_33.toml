[[commentary]]
quote='''
if that expression for ever be taken as applying to the Lord Christ, it signifies endless duration, in accordance with what Gabriel also says to the Virgin: And he shall reign over the house of Jacob for ever, and of his Kingdom there shall be no end
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
