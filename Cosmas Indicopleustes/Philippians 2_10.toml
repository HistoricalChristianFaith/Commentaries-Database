[[commentary]]
quote='''
That in the name of Jesus every knee shall bow, of beings celestial and terrestrial and subterranean; where by beings celestial are meant the angels, by the terrestrial men, and by the subterranean those that are buried in the earth. For the Apostle says that this is to take place at the resurrection, when all, alike angels that are in heaven, men that are upon the earth, and the dead that are buried in the earth, shall all rise and bow the knee in the name of Jesus the Son of God
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
