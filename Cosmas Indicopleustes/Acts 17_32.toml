[[commentary]]
quote='''
But further, when they hear the resurrection preached to them, they pronounce this to be impossible, for how, say they, can one who has been used up to form countless bodies in succession, rise up? And, to be brief, they attack with sophistries the Giver of their speech in their endeavour to overthrow the doctrines of His Church.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
