[[commentary]]
quote='''
This is Joel the second in order who was privileged to prophesy concerning the mystery of the Lord Christ, for he speaks thus (chap. ii, 28-32): And it shall come to pass afterward that I will pour out my spirit upon all flesh; and your sons and your daughters shall prophesy, your old men shall dream dreams, your young men shall see visions; and also upon the servants and upon the handmaids in those days will I pour out my spirit. And I will show wonders in the heavens and in the earth, blood and fire, and pillars of smoke. The sun shall be turned into darkness, and the moon into blood, before the great and terrible day of the Lord come. And it shall come to pass that whosoever shall call on the name of the Lord shall be delivered—a passage which the blessed Peter mentions in the Acts of the Apostles as having been fulfilled when the descent of the Holy Spirit upon the Apostles occurred on the day of Pentecost.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
