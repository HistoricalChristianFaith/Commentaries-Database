[[commentary]]
quote='''
The spirit of the Lord is upon me—a passage which the Lord having read in the synagogue on the Sabbath said: Verily I say unto you, to-day is this scripture fulfilled in your ears.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
