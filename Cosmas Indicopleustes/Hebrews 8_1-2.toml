[[commentary]]
quote='''
We must here again observe that he (Paul) speaks of the Tabernacle which was pitched by God, namely heaven, as the true. Moreover he calls heaven that perfect Tabernacle not made with hands, as it was created by God. For he calls the Tabernacle which Moses prepared made with hands. And further in contrast with the Tabernacle prepared by Moses, he calls the other the true, because it abides for ever, while the former is dissolved.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"

[[commentary]]
quote='''
Where are those who say that the heaven is in motion? Where are those who think it to be spherical? For both these opinions are here swept away.
'''
append_to_author_name='(quoting John Chrysostom, Commentary on Hebrews)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"

[[commentary]]
quote='''
We have such a high priest, who sat down on the right hand of the throne of the Majesty in the heavens, a minister of the sanctuary, and of the true Tabernacle which the Lord pitched and not man —as if he said: the Lord Christ had been taken up into the heavens, into the true Tabernacle, that is, one which is permanent and indissoluble. For the expression true indicates that it is indissoluble, since that which was prepared by Moses was dissolved; this one as being indissoluble, by way of distinction and in contrast with the other, he calls the true—as being permanent and firm and indissoluble.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
