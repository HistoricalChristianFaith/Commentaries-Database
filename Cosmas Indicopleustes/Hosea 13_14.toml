[[commentary]]
quote='''
Yet again the same prophet says: From the power of the grave will I ransom them. Where is thy victory, O death! Where is thy sting, O grave!—a passage which the Apostle has used concerning the resurrection.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
