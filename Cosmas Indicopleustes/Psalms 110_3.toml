[[commentary]]
quote='''
Farther down again in the same psalm he saith with reference to his deity: Out of the womb before morning have I begotten thee, as if the Father were saying to the Son, with reference to his deity, Thee before all creation have I brought forth from the womb (thus showing him to be consubstantial) and not afterwards, but having thee in myself without beginning and without limit, as if from the womb, from my own substance have I begotten thee, being with me and co-existing with me.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
