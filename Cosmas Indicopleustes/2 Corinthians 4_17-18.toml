[[commentary]]
quote='''
For our light affliction which is for the moment worketh for us more and more exceedingly an eternal weight of glory, while we look, not at the things which are seen, but at the things which are not seen; for the things which are seen are temporal, but the things which are not seen are eternal. By this he means that if you weigh in the balance against the afflictions of this world the good things of the future state, these will be found to surpass in glory and to outweigh beyond measure the lightness and insignificance of the afflictions of this world, which in comparison are of exceeding brief duration, and which at last utterly disappear. For, he says, the things which are seen, that is, the things of this world, are temporary, but the things which are not seen, that is, of the heavenly place or world on high, are eternal.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
