[[commentary]]
quote='''
Else what shall they do which are baptized for the dead? If the dead are not raised at all, why then are they baptized for the dead? Why do we also stand in jeopardy every hour? As if he said: Since we are baptized mystically for our dead bodies, being submerged in the holy water and emerging therefrom, thus imitating death and resurrection, from the hope and promise of the resurrection from the dead, why, he says, do we perform these acts in vain by not walking in accordance with them? And why, besides, do we stand in jeopardy every hour, proclaiming these things to so great a multitude, and fighting against the prejudices which prevail in the world?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
