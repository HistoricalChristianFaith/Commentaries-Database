[[commentary]]
quote='''
This Haggai was also privileged to utter predictions concerning the Lord Christ, as, under the person of Zerubabel, he says things which are applicable to the Lord Christ: And I will make thee as a signet, because I have chosen thee, saith the Lord God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
