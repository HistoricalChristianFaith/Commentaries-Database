[[commentary]]
quote='''
This is Anna the daughter of Phanuel, who gave thanks to God concerning Him in the temple, when His parents brought Him up into the temple in the days of their purification, to present Him to the Lord, as it is written.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
