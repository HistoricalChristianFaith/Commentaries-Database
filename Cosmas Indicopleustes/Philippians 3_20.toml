[[commentary]]
quote='''
Our citizenship is in heaven, from whence also we expect the Saviour the Lord Jesus; as if he said: I speak of those heavens from which we expect the Lord will come, who will transform us from corruption to incorruption, and take us up where He himself has entered before us.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
