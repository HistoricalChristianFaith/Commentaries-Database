[[commentary]]
quote='''
Wherefore he again admonishes us in these words: Having therefore, brethren, boldness to enter into the Holy place by the blood of Jesus, by the way which he dedicated for us, a new and living way through the veil, that is to say, his flesh; and having a great high-priest over the house of God, let us draw near with a true heart.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"

[[commentary]]
quote='''
Having therefore boldness to enter into the holy place by the blood of Jesus, by the way which he dedicated for us, a new and living way; the entrance into the Holies made by the blood of Jesus, he calls His entrance into the heavens, which He made after his Passion and Resurrection, when He was taken up into heaven; which also he calls a new and living way, dedicated for us, because He himself first of all in a new and fresh manner trod that living and holy way, leaving us an example for us to follow.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
