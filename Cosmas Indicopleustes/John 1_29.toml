[[commentary]]
quote='''
He proclaimed the presence of the Lord, saying: Behold the lamb of God which taketh away the sin of the world, calling him a lamb as being a sacrificial victim, and taking away the sin of the world—as delivering the world from sin, rendering men incorrupt, and immortal and immutable through the resurrection. This great John was privileged to be the herald of such a ministry and of such great things.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
