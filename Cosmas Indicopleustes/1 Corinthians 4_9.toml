[[commentary]]
quote='''
for as this world consists of men and angels: We, saith the Apostle, are made a spectacle to the world, to angels and to men, so also the higher place again has been prepared beforehand for angels and men.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25206.html"
source_title="The Christian Topography, Book 6"
