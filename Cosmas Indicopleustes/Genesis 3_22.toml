[[commentary]]
quote='''
For when God said: Lest he should put forth his hand and take of the tree of life and eat, and live for ever, he inspired man with a longing desire, and a love, and a good hope of immortality, and through him similarly inspired the invisible powers. For he did not exclude man from any of the promises given before the transgression, nor deprive him of them; nay, after having chastised him, he even gave him more, and through Noah augmented the dignity of his title as the image of God, for he said: Because in the image of God made I man.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"

[[commentary]]
quote='''
Again, the two trees in the middle of Paradise mystically presignify the present state and the future, and the tree of the knowledge of good and evil is a type of this world which is mortal and mutable, having pleasures and pains, and being a school of discipline, just as Adam was taught by this tree both good and evil. Now the tree of life is a type of the future heavenly world, in which life and blessedness reign, for the saying: Lest he stretch forth his hand and take of the tree of life, signified the vast height of the tree and thereby signified the mansions above. As therefore He commanded the Cherubim with the flaming sword which turned every way, to guard the way to the tree of life, so He commanded the angels and the luminaries which revolve round the height of the firmament, to guard the way which is there that leads into the kingdom of heaven; intending to signify that the mansions above are meanwhile inaccessible to men. At His Passion therefore the Lord Christ carried with Him the soul of the thief into Paradise, having suspended the guardianship of the Cherubim and of the flaming sword, which turned every way. But after His resurrection, when He came to his ascension, He opened a passage through the host of the invisible Powers, and the luminaries and the firmament itself, and entered into the kingdom where immortality, and immutability, and blessedness reign. At the final consummation therefore, when the angels cease to make the luminaries revolve and when the stars fall, then the Cherubim and the flaming sword waving both ways no longer prevent men from entering into the true life, but the righteous, raised on high and traversing the new way and piercing the firmament with the Lord Christ, shall inherit the kingdom of life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25209.html"
source_title="The Christian Topography, Book 9"

[[commentary]]
quote='''
Fourthly, because the expulsion of the man from the Garden, by God, and his warning him and saying: Lest he should stretch forth his hand and touch the tree of life and eat and live for ever; these are the words of one who imparts knowledge, and obscurely hints that some gift of life eternal is reserved for men after the life of conflict here.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25206.html"
source_title="The Christian Topography, Book 6"
