[[commentary]]
quote='''
Then immediately again with reference to his humanity he says: The Lord hath sworn and will not repent, Thou art a priest for ever after the order of Melchisedec; for deity does not exercise the priestly office or render worship, but is rather itself worshipped and the recipient of sacred services.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
