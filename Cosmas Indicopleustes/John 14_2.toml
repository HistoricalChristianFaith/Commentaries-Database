[[commentary]]
quote='''
In my Father's house are many mansions; if it were not so I would have told you. I go to prepare a place for you. He calls the habitation which is in the heavens, His Father's house. In this then, He says, is your habitation, which has been prepared for you by my Father.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
