[[commentary]]
quote='''
For Deity alone is uncircumscribed, existing everywhere, and as the same and in the same manner. For if I ascend, saith David, into heaven, thou art there; if I descend into Hades thou art present there; if I should take to myself wings at morning—that is, in the east—and dwell in the uttermost parts of the sea—that is, in the west—even there shall thy hand lead me: evidently indicating here the uncircumscribed nature of the Deity
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
