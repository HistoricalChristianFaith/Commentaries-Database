[[commentary]]
quote='''
In the Chaldaean books of Bêrôsus and certain others it is thus written: that ten kings reigned over the Chaldaeans 2242 myriads of years, but, under their tenth king Xisuthrus, as they called him, there was a great flood, and that Xisuthrus being warned by God embarked in a ship with his wife and kindred and cattle, and that having been brought over in safety, as their story goes, to the mountains of Armenia, he offered sacrifices of thanksgiving to the Gods after the flood. These writers have thus presented in a new form nearly all the account given by Moses; for men continued to live in the earth beyond [the Ocean] 2242 years for a course of ten generations, and, under Noah who was the tenth the flood having occurred, they passed over to this earth by means of the Ark. For Noah is he whom they call Xisuthrus. But by having changed the days into years, they asserted that those ten kings had lived 2242 myriads of years, since the number of years reckoned by Moses to have elapsed from Adam to the deluge of Noah was 2242.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
