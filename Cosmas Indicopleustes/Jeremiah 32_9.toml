[[commentary]]
quote='''
This is Jeremiah the tenth in order, who was also privileged to prophesy concerning the mystery respecting Christ, saying thus: And they took the thirty pieces of silver, the price of him that was priced, whom certain of the sons of Israel did price, and they gave them for the potter's field as the Lord appointed me. The evangelist Matthew mentions this passage as having been fulfilled at the time of the passion.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
