[[commentary]]
quote='''
And no one hath ascended into heaven, but he that descended out of heaven, even the Son of Man which is in heaven —thus very clearly showing that no one at all had ascended into the upper place except the Lord Christ Himself.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
