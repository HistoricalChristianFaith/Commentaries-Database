[[commentary]]
quote='''
And elsewhere he thus speaks concerning our most necessary food, which the summer tropic perfects, and continues to give us for three months successively: They have been increased with their corn and wine and oil —here again in a remarkable way, in the giving of thanks, observing the order in nature and mentioning first corn, then wine, and thirdly oil, in accordance with the order, in which by the blessing of God, they are produced during the three summer months, by the agency of the rational orders, namely, angels and men
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25208.html"
source_title="The Christian Topography, Book 8"
