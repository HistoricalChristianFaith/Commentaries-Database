[[commentary]]
quote='''
This is Micah the seventh in order, who also was privileged to prophesy concerning the coming of the Lord Christ, and he says: And thou Bethlehem, the house of Ephratha, art the least to be among the thousands of Judah. From thee, there shall come forth to me one who shall be for a ruler over Israel, whose goings forth have been of old from everlasting. The chief priests and scribes of the Jews, taking this passage, when Herod asked them where the Christ should be born, replied, In Bethlehem of Judaea, upon which he sent the Wise Men away to Bethlehem.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
