[[commentary]]
quote='''
In the first epistle to the Romans the Apostle has declared Adam to be a type of Christ, saying: Who is a figure of him that was to come; and in like manner he has called Adam the first man, and Christ the second. Since God threatened the first man with death that very day should he transgress the commandment, and yet when he did transgress did not immediately visit him with death in accordance with the threatening, but was long-suffering towards him, and having disciplined him by means of the law, and cast him out of Paradise, and permitted him to live to a good old age before he died, God showed great forbearance and kindness towards man, particularly in having provided him with clothing, and in that he did not in wrath inflict death upon human nature, but instructed man in prudence and wisdom, and made sin hateful to him, and righteousness the object of his desires. Then, through the guarding of the tree of life, he taught men to love and hope for immortality. Glory to him who from the beginning to the end has bestowed his provident care upon man.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
