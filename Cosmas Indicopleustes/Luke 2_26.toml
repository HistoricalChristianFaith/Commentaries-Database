[[commentary]]
quote='''
The salvation of God here signifies Christ; for thus also Symeon, when he took up Christ in his arms, prayed God to be allowed to depart from this life, since his eyes had seen the salvation of God, namely Christ himself for it had been revealed to him by the Spirit that he should not see death, until he had seen the Lord Christ
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25208.html"
source_title="The Christian Topography, Book 8"
