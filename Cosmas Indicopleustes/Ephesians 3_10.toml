[[commentary]]
quote='''
And again the Apostle testifies that the angels are taught the things that pertain to God by the dispensation under which man has been placed, for he says: To the intent that now unto the principalities and the powers in the heavenly places might be made known, through the Church, the manifold wisdom of God: thus clearly showing that they are taught through the Church the wisdom of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
