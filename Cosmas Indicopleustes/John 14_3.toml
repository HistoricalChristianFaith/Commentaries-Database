[[commentary]]
quote='''
And if I go and prepare a place for you, I will come again and take you unto myself that where I am there ye may be also. And whither I go ye know, and the way ye know. And again to the mother of James and John, who asked that the one of them should sit at His right hand and the other on the left in His kingdom, He answered, saying: It is not mine to give, but for whom it has been prepared by my Father. Those that are worthy, therefore, shall obtain these things before I bestow them whether on your sons or on others that are worthy. But the expression that where I am there ye may be also, shows very remarkably that that place is indissoluble, and has been aforetime prepared, and not that another place is substituted (as those wise men imagine), in which we are to dwell after the resurrection, when this place of the heavens shall have been dissolved. And to speak briefly, the passages in divine scripture are almost innumerable which show that the heaven, into which Christ has entered and into which we also shall enter, is indissoluble.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
