[[commentary]]
quote='''
They say however that, until men become equal in number to the angels, the consummation of the world will not take place. For Moses says: He set the boundaries of the nations according to the number of the angels of God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
