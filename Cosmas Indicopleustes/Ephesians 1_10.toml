[[commentary]]
quote='''
the whole world has its circumscription in man, because man, as has been frequently stated, is the bond which holds all the world together. When man, therefore, rose again on the same night of the Lord's day, incorruptible and immortal and unchangeable, he gave a pledge to the whole creation visible and invisible that it would obtain like benefits. Wherefore the Apostle saith: To sum up all things in the Christ, both the things that are in heaven and that are in the earth; and: If any one be in Christ he is a new creature. Old things are passed away, behold all things have become new
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
