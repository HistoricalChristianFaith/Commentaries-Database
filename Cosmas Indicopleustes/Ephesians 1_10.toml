[[commentary]]
quote='''
the whole world has its circumscription in man, because man, as has been frequently stated, is the bond which holds all the world together. When man, therefore, rose again on the same night of the Lord's day, incorruptible and immortal and unchangeable, he gave a pledge to the whole creation visible and invisible that it would obtain like benefits. Wherefore the Apostle saith: To sum up all things in the Christ, both the things that are in heaven and that are in the earth; and: If any one be in Christ he is a new creature. Old things are passed away, behold all things have become new
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"

[[commentary]]
quote='''
According to his good pleasure, he says, which he purposed in him; that is, He longed for this, He was in throes, as one may say, to bring forth this mystery. And of what nature is this? It is that it is His will to set man on high, and this He desires with a view to a dispensation of the fulness of the times to sum up all things in Christ, the things in the heavens, and the things upon the earth.
'''
append_to_author_name='(quoting John Chrysostom, Commentary on Ephesians)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"

[[commentary]]
quote='''
For if man, who is the bond of the whole creation, shall be renewed, becoming incorruptible and immortal in body, and immutable in soul, is it not evident that all the elements of which the body of man is composed, and all rational beings, as being akin to the soul of man, shall be renewed and brought into a better state? For all things, saith the Apostle, are summed up in Christ, both the things that are in the heavens and the things that are on the earth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
