[[commentary]]
quote='''
the five who were wise went in with the bridegroom into the bride-chamber, that is, into heaven, because, since they were wise, they chose virginity and alms-giving—but the foolish virgins who had chosen the one of these but despised the other, remained outside of the bride-chamber, having found the door shut, and heard these words: Depart from me, I know you not; being neither permitted to enter, nor condemned along with the impious, but remaining outside of the bride-chamber.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
