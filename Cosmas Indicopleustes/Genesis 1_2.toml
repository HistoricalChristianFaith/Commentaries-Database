[[commentary]]
quote='''
But some one will say that it is recorded that He made the heaven and the earth, while nothing is recorded of waters and fire and air. In the first place then, brethren, when He said that the heaven and the earth were made, He indicated by the things which contain, the things that are contained. Then after the interposition of a few passages, hear Him next relate when the air was made: And the spirit of God moved upon the face of the waters. Here He does not speak of the Holy Spirit, for the uncreated is not numbered along with what is created, but it is the motion of the air which He calls spirit.
'''
append_to_author_name='(quoting Severianus of Gabala, Hexaemeron, Book 1)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
