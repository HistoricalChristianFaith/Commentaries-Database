[[commentary]]
quote='''
For we know in part and prophesy in part; but when that which is perfect is come, then that which is in part shall be done away; for we shall then know perfectly, as we ought to know, when we have all risen from the dead perfect.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
