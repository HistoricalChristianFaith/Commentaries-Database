[[commentary]]
quote='''
The sufferings of this flesh—and the tokens of suffering, anguish, and sweat, grief and perturbation of soul—all these are indicative of human nature.

Oh what a marvel is here! They say such things and yet they quarrel with us, making divisions in the Churches in defiance of all authority. For where is it written that He was in agony and sweated, if not in Luke where it is said: And being in an agony he prayed more earnestly, and his sweat became as it were great drops of blood falling down upon the ground—and there appeared unto him an angel from heaven strengthening him.
'''
append_to_author_name='(quoting Theodosius of Alexandria)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
