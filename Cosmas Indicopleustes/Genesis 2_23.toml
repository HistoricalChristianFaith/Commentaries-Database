[[commentary]]
quote='''
God moreover made the woman from the man's side, because the two sides bind the whole body close together; for he neither made her from the front of man lest the woman should exalt herself above him, nor from his back parts that he might not exalt himself above the woman; but from his side, as being in her nature his equal, although the man, as the cause, is first in point of time, but not, however, in his nature itself. And still further—since the hand always protects and guards the side to which it belongs, so when he had made the female from the male, and the male from the earth, God pronounced the two to be one flesh, both from the constitution of the two sides, and from the fruit that springs from their connection. Wherefore the fornicator sins by estranging his own flesh and sowing illegitimate progeny; nay, he that commits adultery is ranked with the homicide, since he divides what is one flesh, and thus perpetrates murder.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"
