[[commentary]]
quote='''
This is Nahum the eighth in order who was also privileged to prophesy concerning the resurrection of the Lord Christ, and he says: Feast, O Judah, keep thy feasts, perform thy vows, for they shall add to pass through thee no more. It has been consummated, it has been taken away. He went up breathing upon thy face, delivering thee from affliction.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
