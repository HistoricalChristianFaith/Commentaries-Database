[[commentary]]
quote='''
The gates of hell shall not prevail against the church; and again he declares that all the world shall be filled with his doctrine, even as the three measures of meal, in which the woman hid the leaven, were all leavened throughout and made one by that leaven. And again: The Gospel shall be preached throughout the whole world: and along with it shall the woman too be told of who did him a kindness—and we see that all these predictions have been fulfilled. For the Christians who were at one time persecuted by the Greeks and Jews have conquered, and drawn their persecutors over to their own side. In like manner we see that the Church has never been destroyed, but that its adherents have been greatly multiplied, and that similarly the whole earth has been filled with the doctrine of the Lord Christ, and is still being filled, and that the gospel is preached throughout all the world.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"
