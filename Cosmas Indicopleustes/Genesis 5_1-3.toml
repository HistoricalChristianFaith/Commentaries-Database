[[commentary]]
quote='''
This is the book of the generation of mankind. In the day that God created Adam, in the likeness of God made he him; male and female created he them. And he blessed them and called his name Adam in the day when he created them. And Adam lived 230 years and begat a son in his likeness and after his image, and called his name Sêth. In this place likewise he called his name Sêth, as being the foundation of the human race, and as bearing his own characteristics and the proper dignities.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"

[[commentary]]
quote='''
Of these the first was Alorus, that is, Adam; the second Alaaprus, Seth; the third, Almêdôn, Enoch; the fourth, Ammeôn, Cainân: the fifth, Ammegalaros, Mahalaleel; the sixth, Daonus, a keeper of sheep, Jared; the seventh, Euedôrachos, Enoch; the eighth, Amempsinachus, Methuselah; the ninth, Otiortes, Lamech; the tenth, Xisuthrus, Noah. In his time they say the great flood recorded by Moses occurred.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
