[[commentary]]
quote='''
The Kingdom of heaven is likened unto a certain King who made a marriage feast for his son, having selected the highest of the good things of this life, and likened them to the good things of the future life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
