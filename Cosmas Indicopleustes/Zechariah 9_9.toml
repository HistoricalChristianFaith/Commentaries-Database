[[commentary]]
quote='''
Rejoice greatly O daughter of Sion, shout O daughter of Jerusalem; behold thy King cometh unto thee; he is just and having salvation; lowly and riding upon an ass—even a young colt. This passage he uttered with reference to Zerubabel, in a strain of hyperbole as regards him, for it had properly its accomplishment in the Lord Christ, whom Zerubabel as it were, personified.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
