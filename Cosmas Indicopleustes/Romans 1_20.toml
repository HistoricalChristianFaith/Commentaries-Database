[[commentary]]
quote='''
For the invisible things of him, saith the divine Apostle, are clearly seen, being perceived through the things that are made, even his everlasting power and godhead; so that they may be without excuse; as if he said: The invisible things of God, namely, His power and wisdom and providence and goodness and His eternal godhead, we apprehend and see from things existent and visible, and through all His works we, in our measure, perceive the Creator, so that we cannot offer any excuse of ignorance (for this is what without excuse signifies) since we have it in our own hands to know from all these things in our measure the Creator of ourselves and of the universe.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
