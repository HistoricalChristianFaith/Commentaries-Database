[[commentary]]
quote='''
The Lord will come suddenly upon them, and will utterly destroy all the gods of the nations of the earth, and men shall worship him, every one from his place, even all the isles of the nations! From beyond the rivers of Ethiopia shall they bring offering to me.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
