[[commentary]]
quote='''
In the inner place was set the Ark of the Propitiation, which was concealed behind the veil, and was not seen by any one. The Propitiatory was a type of the Lord Christ according to the flesh, as saith the Apostle: Whom God set forth to be a propitiation by his blood; and again the high priest was himself a type of the Lord Christ, according to the Apostle: For, saith he, just as the high priest once a year entereth into the inner Tabernacle, so Christ, having come a high priest of the good things to come through his own blood, entered in once for all into the Holy place, having obtained eternal redemption, as methinks I have frequently mentioned.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
