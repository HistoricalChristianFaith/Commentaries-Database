[[commentary]]
quote='''
This is Amos the third in order, who also was privileged to tell of the coming of the Lord Christ and in these words: Lo! I am he that confirms the thunder and that creates the wind and that announces to men his Anointed.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
