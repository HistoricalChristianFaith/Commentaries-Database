[[commentary]]
quote='''
at the same time obscurely hinting that he did not take by robbery the things which belonged to God, since he was God; as the Apostle also declares: He counted it no robbery to be on an equality with God, but emptied himself, taking the form of a servant.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
