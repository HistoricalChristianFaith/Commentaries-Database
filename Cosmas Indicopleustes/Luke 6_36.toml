[[commentary]]
quote='''
A human being is a great thing, and a man, if merciful, is to be honoured. Behold, how great a thing is mercy—the merciful man God likens to Himself; for He saith: Be ye merciful, even as your Father which is in heaven is merciful. Should death come, there your riches abide.
'''
append_to_author_name='(quoting John Chrysostom, On Alms)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
