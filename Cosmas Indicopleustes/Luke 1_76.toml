[[commentary]]
quote='''
This Zachariah the priest, who was himself thought worthy of the power of prophecy, spoke both concerning his own son and the Lord Christ together, in these words: And thou, child, shalt be called the Prophet of the Highest; for thou shalt go before the face of the Lord to prepare his ways.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
