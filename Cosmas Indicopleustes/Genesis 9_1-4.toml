[[commentary]]
quote='''
And the Lord blessed Noah and his sons and said to them: Be fruitful and multiply and replenish the earth; and the fear of you and the dread of you shall be upon every beast of the earth, and upon every fowl of the air, upon all that moveth upon the earth, and upon all the fishes of the sea; into your hands are they delivered. Every moving thing that liveth shall be food for you; as the green herb have I given you all; but flesh with the blood thereof shall ye not eat.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
