[[commentary]]
quote='''
According to his good pleasure, he says, which he purposed in him; that is, He longed for this, He was in throes, as one may say, to bring forth this mystery. And of what nature is this? It is that it is His will to set man on high, and this He desires with a view to a dispensation of the fulness of the times to sum up all things in Christ, the things in the heavens, and the things upon the earth.
'''
append_to_author_name='(quoting John Chrysostom, Commentary on Ephesians)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
