[[commentary]]
quote='''
And yet He has not left them without a witness to Himself, that He was working for their good and taking thought for it beforehand, for He manifested to them some tokens of His goodness, some four hundred years or more before the coming of Christ, in the days of Alexander the Macedonian, long after the Trojan war, when the Greeks were still flourishing. Let me give an instance of this: When Alexander the Macedonian was passing by Jerusalem in prosecution of his war against Darius, the High Priest of the Jews, arrayed in the robes of his office, came forth to meet him, whereupon Alexander dismounted from his horse and in a very kindly manner embraced him. And when his attendants reproached him for so doing and said: Why hast thou done so? he excused himself and said: When I set out at first from Macedonia, a man dressed in this style was seen by me in a dream who said to me: Go forth and conquer. The result was that the King himself offered sacrifices to God and bestowed many gifts on the Temple, and accorded many privileges to the country of the Jews.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252012.html"
source_title="The Christian Topography, Book 12"
