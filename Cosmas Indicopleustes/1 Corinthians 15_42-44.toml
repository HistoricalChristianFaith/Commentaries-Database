[[commentary]]
quote='''
So also is the resurrection of the dead. It is sown in corruption, it is raised in incorruption; it is sown in dishonour, it is raised in glory; it is sown in weakness, it is raised in power, and so forth. Then again he says: But this I say, brethren, that flesh and blood cannot inherit the Kingdom of God, neither doth corruption inherit incorruption. Having here recourse to arguments from analogies in the natural world, he endeavours to convince of this those conversant with the wisdom of the world, and from the example about grain turns to the resurrection of the dead, saying: Just as corn is sown and is dissolved, so also the bodies of men, when planted as corpses in the earth, are dissolved; and just as the grain sprouts up with large increase, stability and beauty, so also the bodies of men are raised up with great honour and glory and power and beauty unspeakable, being discriminated by the omnipotent wisdom and ineffable might of God, who made and who renovates all things.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
