[[commentary]]
quote='''
Then when he had passed sentence on the temple, his disciples who were still under the influence of Judaic sentiment were sorrow-struck; and scripture afterwards says: When descending from the Mount they showed him the building of the temple, in order no doubt that they might move him to pity, and that he might recall what he had said with regard to the temple, for they knew and believed that everything spoken by him would come to pass. But he knowing [what would be] said to them: Do you see all these things? Verily, I say unto you, there shall not be left here one stone, upon another that shall not be thrown down. Then were they possessed with fear, and remained silent, and said nothing further on this matter. Accordingly thereafter came the Romans, and levelled with the ground the temple and the city, and made it an utter desolation, executing as if by compact what had been commanded by the Lord. And up to this day we see with our very eyes that lo! for more than five hundred years it has lain so desolate that it cannot be renovated.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"
