[[commentary]]
quote='''
For the kingdom of God is not in word but in power; as if he said that the word of the kingdom of heaven surpasses all words, and that some are in vain puffed up while endeavouring to establish themselves by word. For that word only, which comes from the power of the Holy Spirit and from the signs which accompany it, merits belief.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
