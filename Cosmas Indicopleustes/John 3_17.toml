[[commentary]]
quote='''
My argument, accordingly, good reader, holds sure that he never wrought for the punishment of man but for his benefit, and he himself elsewhere exclaims: For the Father hath not sent the Son to condemn the world, but that the world through him might be saved.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"
