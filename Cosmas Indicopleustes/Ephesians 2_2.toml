[[commentary]]
quote='''
the divine Apostle, speaking of the Adversary, teaches what was his work from the beginning in these words: According to the prince of the power of the air, of the spirit that now worketh in the sons of disobedience —words which clearly show him to have been formerly a prince endowed with the power of moving the air and changing its place, but one now cast out for ever from this dignity; yea, rather, one who from sheer depravity works upon sinners, as is evident from the fact that he stood not alone in having the power to do this, but shared it in common with many others. For some of the angels were commissioned to move the air, some the sun, some the moon, some the stars, while others prepared the clouds and the rains, and rendered many other services— for this is the work, the appointed duty, of the angelic orders and powers—to minister to the well-being and honour of the image of God, that is, of man, and to move all things like soldiers obeying the commands of the king. This work they were commanded to do on the fourth day, when God adorned the heaven with its stars. The work of the adverse demons, as rebels against God, is to do what will mar his image, for on the fourth day they transgressed the command and were cast out of heaven
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
