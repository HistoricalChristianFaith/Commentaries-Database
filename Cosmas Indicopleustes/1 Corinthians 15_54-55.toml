[[commentary]]
quote='''
But when this corruptible shall have put on incorruption, and this mortal shall have put on immortality, then shall be brought to pass the saying that is written, Death is swallowed up in Victory. Where, O Death, is thy sting? As if he said: Death being swallowed up shall disappear, life in us having become more than victorious. Wherefore let us exclaim: Where, O Death, is thy overweening pride? And where, O Hades, thy strength?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
