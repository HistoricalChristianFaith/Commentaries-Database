[[commentary]]
quote='''
When God said: In what day thou eatest of the tree, thou shalt surely die, he pronounced him to have become mortal, for we see that he did not die immediately according to the threat, so that it is evident the words hinted this: Immortal though thou art, thou shalt become mortal.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
