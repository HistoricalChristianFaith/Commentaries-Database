[[commentary]]
quote='''
It is appointed by God unto all men once to die, as saith the Apostle, speaking of them in general; for neither do all die, nor did Lazarus and others whom the Lord raised die only once, but he refers to all men that are in this state of existence, and are mortal as God created them.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
