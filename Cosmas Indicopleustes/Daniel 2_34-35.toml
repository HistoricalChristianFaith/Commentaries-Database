[[commentary]]
quote='''
he speaks of a stone cut out of the mountains without hands, and, in the vision, of the Son of Man coming on the clouds of heaven, whereby he indicates the Lord Christ on both sides of his descent—from Abraham and from the Virgin without human seed, for here the words without hands mean without human seed; while the words on the clouds of heaven are employed because the clouds without human hands carry as it were in their womb the rains to which they give birth. Then again, in the image, the words: And he smote the clay, the iron, the brass, the silver and the gold, and they became like the chaff of the summer threshing-floors, and the wind with its gusts swept them away and there was no more place found for them (Dan. ii, 35); and in the vision the words: I beheld till the beast was slain and his body destroyed, and given to be burned with fire; and as for the rest of the beasts their dominion was taken away, yet their lives were prolonged for a season (Dan. vii, ii), signify respectively the same thing—namely, that at the coming of the Lord Christ all these empires would be taken away—the Babylonian, the Median, the Persian and the Macedonian, while all the kingdoms that arose from the partition of the last would become of no account. And such was the very condition of things in the time of Christ, for neither did the Babylonian, Median, Persian nor Macedonian empires then exist, but they had all been destroyed
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"

[[commentary]]
quote='''
A stone was cut without hands, and it brake in pieces the clay, the iron, the brass, the silver and the gold, and it filled the whole earth.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
