[[commentary]]
quote='''
when Cain petitioned for death through horror at his fratricide, did God not give it, but rather delivered him over to a still heavier punishment, namely, to remain on the earth lamenting and trembling—an evil from which he said death would be a deliverance? God therefore said: Whosoever slayeth Cain, vengeance shall be taken on him sevenfold.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
