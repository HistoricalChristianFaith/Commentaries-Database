[[commentary]]
quote='''
And in those days came John the Baptist preaching in the wilderness of Judaea and saying, Repent, for the kingdom of heaven is at hand; as if he said, the mansion in the heavens is now ready to be revealed, as the Christ is now near.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
