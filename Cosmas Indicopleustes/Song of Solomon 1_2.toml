[[commentary]]
quote='''
For the son of God assumed humanity, which He put on [received] from the Church, and in return gave back His sacred flesh to be partaken of in the sacrament.
'''
append_to_author_name='(quoting Philon of Carpathus, Commentary on Canticles)'
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%252010.html"
source_title="The Christian Topography, Book 10"
