[[commentary]]
quote='''
when the most faithful Abraham wished to make his servant swear with more than usual solemnity by the circumcision as being a seal royal, Place, he said, thine hand under my thigh, instead of under the seal royal, that is, the circumcision
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
