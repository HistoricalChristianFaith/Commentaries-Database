[[commentary]]
quote='''
For, I saw, saith the Lord, Satan like lightning fall from heaven; for being puffed up because of the service entrusted to him by God for the good of men, and because it was his office to move the air for man and regulate its motion for his uses, and deeming that he had of himself advanced of his own will to this height, he usurped to himself the worship due to God, and was forthwith hurled down. For the Apostle again when instructing Timothy not to be hasty in conferring office on a neophyte—one, that is, who has but recently been converted to the faith, thus addressed him: Not a neophyte, lest being puffed up he fall into the condemnation of the devil; which, says the Apostle, the devil suffered through being puffed up, and has hereby clearly shown why he was hurled down, namely, by his being puffed up, deeming himself to be God, whence also he had the wish to communicate his own disease to man, saying: Ye shall be as Gods.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25203.html"
source_title="The Christian Topography, Book 3"

[[commentary]]
quote='''
Those consequently who transgressed were cast down from on high to the earth, for I saw—it is the Lord who speaks—Satan like lightning fall from heaven
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
