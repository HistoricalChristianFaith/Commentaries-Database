[[commentary]]
quote='''
On the sixth day the demon who hates good, seeing man honoured and thought worthy to have great care bestowed on him, became envious, and formed a design to drag him down to ruin with himself. But when he was at a loss how to assail him, he happened to perceive the beasts running straightway to their food, while the object of his envy, looking around him at such of the trees as were pleasant to the eye, remained quite unmoved the while by the calls of appetite; whence he concluded he had received some command from God about them. Having then approached nearer in the form of the serpent, he sought to learn the nature of the command, and craftily says: What! hath God said ye shall not eat of every tree in the Garden? Then the woman who had just been brought into the world, and was far inferior to the other in quickness of intelligence, answered his enquiry. Then, pretending he had already known the command (which he had only that moment learned), he began to accuse God of giving grudgingly, and to entice man to eat of the fruit, advising him at the same time to transfer his allegiance to himself; and thus, forsooth, become as God, infecting him in this way with his own disease. The man was, in fact, persuaded in the afternoon, and was that same day cast out of the garden, just as his tempter had himself, as soon as he sinned, been cast out of Heaven. Then the man heard the sentence of death pronounced upon him: Dust thou art, and unto dust shalt thou return
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"
