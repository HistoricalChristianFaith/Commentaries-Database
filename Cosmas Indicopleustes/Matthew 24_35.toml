[[commentary]]
quote='''
Since, therefore, some corrupting the meaning of the divine scriptures have misinterpreted the saying of our Lord, namely: The heaven and the earth shall pass away, but my words shall not pass away, failing to recognize that the mode of expression is hyperbolical, we shall interpret what their meaning properly is; for he says: It is possible for them to be dissolved, but for my words, never.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25207.html"
source_title="The Christian Topography, Book 7"
