[[commentary]]
quote='''
At the birth, particularly, of the Lord Christ according to the flesh, the whole multitude of the invisible powers, having seen him born through whom comes the destruction of death, the beginning of the renovation and the resurrection, and their own freedom, lifted up their voices in hymns of praise to God, the cause of all, exclaiming: Glory to God in the highest, and on earth peace, good will towards men. Then away were thrown at last all the sorrow and dejection which at one time they had suffered on account of man, and they gave expression to their joy at the birth of the second Adam. Wherefore they also, at the time of his temptations, remembering how in the days of old they had witnessed the discomfiture of the first Adam, which had filled them with dismay, but seeing now the victory of the second Adam, and how fairly not once but thrice in close grip with his tempter he had flung him out of the lists—they, I say, rejoiced with a great joy, and were eager in bestowing their services, as scripture has recorded, not now as if prompted by some hope, but because, having seen with their own eyes the victory of the second Adam, they came to minister to him with joyful alacrity
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"

[[commentary]]
quote='''
he again who noted down the doxology of the multitude of the host of the angels, who were rejoicing and exulting at the birth of the Lord Christ according to the flesh, and saying: Glory to God in the highest, and on earth peace, good pleasure among men, now putting away from themselves the old dejection brought upon them through the first-made man, and rejoicing at the birth of the second Adam.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"

[[commentary]]
quote='''
Any one who heard the multitudinous host of the heavenly ranks singing in chorus and rejoicing and exulting at the birth of our Lord Christ according to the flesh, and saying: Glory to God in the highest, and on earth peace and good-will to men, would be astonished beyond measure as he reflected that the inhabitants of heaven and of earth had joined in making one confession, and that God was well pleased with men.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25206.html"
source_title="The Christian Topography, Book 6"
