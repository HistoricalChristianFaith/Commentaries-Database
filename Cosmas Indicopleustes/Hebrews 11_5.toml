[[commentary]]
quote='''
This is Enoch on whom the sentence of death did not take effect, for he was translated by God that he should not see death, as is recorded in divine scripture, in order that thereby it might be declared to us that death shall not have power over man, but that his power over him shall be dissolved, as was exhibited in the case of the Lord Christ, when his power was entirely broken. This is Enoch who was translated to life, as a proof of the power of God to after generations, a power capable of warding off death from mortals, yea even of permitting them while living to undergo the change to a better state. This is he who along with Elias will in the last days withstand the Antichrist, and refute his error, according to the ecclesiastical tradition. This is he who through faith escaped the way of death.

In this case also it is shown still more distinctly that death has not been brought on man in wrath, nor even the sentence of death; but in order that, as we have said, God might make sin hateful to him, and righteousness the object of his desire. Wherefore neither the sentence of death, nor death itself has had power over him, nor will have power, for By faith, saith the Apostle, Enoch was translated that he should not see death; clearly showing that he did not see death, yea even that while living he underwent the change to a better state, as shall also all those that are left alive at the coming of the Lord, and do not die before the resurrection and the future state.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"

[[commentary]]
quote='''
If any reflects about the translation of Enoch, who because he pleased God, was translated that he should not see death, knows with the utmost certainty that there will be a better state, from an occurrence of this nature.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25206.html"
source_title="The Christian Topography, Book 6"
