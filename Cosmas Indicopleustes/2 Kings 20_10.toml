[[commentary]]
quote='''
It is a light thing for the shadow to decline ten steps; nay, but let the shadow return backward ten steps. Accordingly after the shadow of the sun, as he proceeded [from mid-heaven] had declined the ten steps, then by the divine power, through the prayer of the Prophet, the sun returned backward till he was again in mid-heaven, and the shadow was found to have gone back the ten steps, according to sacred scripture. For if, on the contrary, it had been the third hour of the day, the shadow having by this time gone forward, could neither have gone back, nor could the sun have moved backward, if even it had so happened that the door and the steps of the house of Hezekiah looked to the west. And so much with regard to the position of the house. But the reason for such a sign being accorded was this—that most of the nations and perhaps all of them, serving especially the host of heaven, honour the sun as a greater god than all the others, and, as the father of lights. God therefore by ordering him to go backward, showed to all the nations that He himself was Lord of all, and that the sun was His servant, and was not God. For if He ordered so great a luminary to go back contrary to his use and wont, much more can He order those that are smaller, and treat them as His servants. But with God's help I shall now declare what advantage thence accrued. When the sun then went backward, the circumstance became known to all the nations, even to the ends of the earth, so that even the King of Babylon, Merodach, the son of Baladon, who lived far off and yet beheld the sign, was struck with consternation, and a desire of searching into the nature of this dread and strange miracle. For amazement and terror overcame the king himself and his courtiers, who eagerly sought to learn from all that were conversant with astronomy the cause of this dread and mighty sign. And after much inquiry had been made, he learned that Hezekiah the King of Judaea having fallen into a sickness, and been brought to despair of his life, made prayer unto God, and God restored him to health and gave him an extension of his life of fifteen years, and with a view to give him a sure belief in the promise, He wrought for him this dread and mighty sign because He is the God of gods, who made heaven and earth and all things that therein are
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25208.html"
source_title="The Christian Topography, Book 8"
