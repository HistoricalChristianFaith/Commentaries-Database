[[commentary]]
quote='''
from the prophecy of Lamech, the father of Noah, we learn that Noah, by means of the world-carrying Ark, was to convey men and the brute beasts into this earth of ours, for the prophecy runs somewhat to this effect: This same shall give us rest concerning our work and toil of our hands, because of the ground which the Lord God hath cursed. For this reason also Lamech gave Noah his name, which means rest
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25202.html"
source_title="The Christian Topography, Book 2"

[[commentary]]
quote='''
Fifthly, again, we are taught through Lamech the father of Noah, who prophesied and said that his son would deliver us from toils and the curse, and would conduct us to the enjoyment of a better condition.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25206.html"
source_title="The Christian Topography, Book 6"
