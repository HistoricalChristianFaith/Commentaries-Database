[[commentary]]
quote='''
He therefore calls the Law the shadow of these things while the image and its characteristics are the mysteries celebrated by the Christians, as for instance, the lamb offered in sacrifice—a type of the Passion of Christ, in accordance with what the Apostle Paul says: For Christ our Passover was sacrificed; and John the Baptist thus speaks: Behold the Lamb of God which taketh away the sin of the world. Then after this, for the Israelites of that time there was their deliverance from the destroying angel and from the bondage to Pharaoh; for us, our deliverance from the devil and from our bondage to the very burdensome law. Then for them, their passage through the sea and their sojourning in the wilderness, and the giving of the law and the setting up of the Tabernacle; for us, our passage through baptism and our sojourning in the Church, and the gift of the Holy Spirit. For them, a copious supply of water from the rock to sustain their life; for us, the life-giving mysteries; for them, the land of promise as a place of rest; for us, heaven not made with hands as our place of rest; for them, temporal life; for us, life eternal and righteousness, and sanctification, and redemption and blessedness.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Cosmas%2520Indicopleustes%2FThe%2520Christian%2520Topography%2FBook%25205.html"
source_title="The Christian Topography, Book 5"
