[[commentary]]
quote='''
What therefore God has joined together, let not man separate. What God has joined, making one flesh out of man and woman, man cannot separate, except perhaps God alone. Man separates when, due to the desire for a second wife, he dismisses the first. God separates whom He has joined, when by mutual consent, for the service of God, because the time is short, thus we have wives as though we had none.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) What therefore God hath conjoined by making one flesh of a man and a woman, that man cannot separate, but God alone. Man separates, when we dismiss the first wife because we desire a second; but it is God who separates, when by common consent, for the sake of serving God, we so have wives as though we had none.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
