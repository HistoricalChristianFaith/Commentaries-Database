[[commentary]]
quote='''
And you, Capernaum, will you be exalted to heaven? You will be brought down to hell. There is a double meaning in this sentence. Either you will be brought down to hell because you have most arrogantly resisted my preaching; or because, having been exalted to heaven by my residence, from my signs and miracles having had such privilege, you will be punished with greater torments, since you refused to believe even these. And lest anyone think that this rebuke applies only to those cities or persons who, seeing the Lord in the flesh, despised Him, and not to all who even today despise the words of the Gospel, He added, saying:
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"


[[commentary]]
quote='''
This sentence admits of two meanings: Either for this reason shalt thou be thrust down into hell, because thou proudly resisted My preaching; that in truth she might be understood to have raised herself up to heaven by her pride. Or, because thou art exalted to heaven by My dwelling in thee, and by My miracles, shalt thou be beaten with more stripes, since even these thou refusedst to believe. And that no one should suppose that this interpretation applied only either to the cities or the persons who, seeing our Lord in the flesh despised Him, and not to all also who now despise the words of the Gospel, He proceeds to add these words, He that heareth you, heareth me.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
