[[commentary]]
quote='''
And they were more astonished, saying to themselves, "And who can be saved?" To which this response refers, although the crowd of the poor, which could have been saved by the ruin of the rich, is incomparably greater, unless they understood that all who love riches, even if they cannot obtain them, are counted among the number of the rich.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
It goes on; And they were astonished above measure, saying among themselves, Who then can be saved? Since the number of poor people is immeasurably the greater, and these might be saved, though the rich perished, they must have understood Him to mean that all who love riches, although they cannot obtain them, are reckoned in the number of the rich.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
