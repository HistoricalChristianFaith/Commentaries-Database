[[commentary]]
quote='''
(ubi sup.) But while Peter asks only concerning the disciples, our Lord makes a general answer; wherefore it goes on: Jesus answered and said, Verily I say unto you, There is no one that hath left house, or brethren, or sisters, or father, or mother, or children, or lands. But in saying this, He does not mean that we should leave our fathers, without helping them, or that we should separate ourselves from our wives; but He instructs us to prefer the glory of God to the things of this world.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
