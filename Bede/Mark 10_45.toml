[[commentary]]
quote='''
For even the Son of Man did not come to be served, but to serve, and to give his life as a ransom for many. Note what we have often said, that he who serves is called the Son of Man, and to give his life as a ransom for many; when he assumed the form of a servant, to shed his blood for the world. And he did not say, to give his life as a ransom for all, but for many, that is, for those who were willing to believe.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
Then He proposes an example, that if they lightly regarded His words, His deeds might make them ashamed, saying, For even the Son of man came not to be ministered unto, but to minister, and to give his life a ransom for many.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
(ubi sup.) He did not say, however, that He gave His life a ransom for all, but for many, that is, for those who would believe on Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
