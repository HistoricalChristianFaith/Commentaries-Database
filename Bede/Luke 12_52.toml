[[commentary]]
quote='''
For from now on, in one house, there will be five divided, three against two, and two against three. They will be divided, father against son, and son against father, mother against daughter, and daughter against mother, mother-in-law against her daughter-in-law, and daughter-in-law against her mother-in-law.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
Or in another way. By three are signified those who have faith in the Trinity, by two the unbelievers who depart from the unity of the faith.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
