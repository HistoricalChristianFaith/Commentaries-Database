[[commentary]]
quote='''
For this cause shall a man leave his father and mother, and shall cleave to his wife. Similarly, He said, Cleave to his wife, not to wives.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) And in like manner, because He says, he shall cleave to his wife, not wives. It goes on: And they twain shall be one flesh.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
