[[commentary]]
quote='''
The Son of man must be delivered into the hands of sinful men, and be crucified, and on the third day rise again, &c. For on the day of the preparation at the ninth hour giving up the ghost, buried in the evening, early on the morning of the first day of the week He rose again.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
One day and two nights also He lay in the sepulchre, because He joined the light of His single death to the darkness of our double death.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252024.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
God’s Son saw fit to become Son of man to make those of us who believe in him sons of God. He was delivered into the hands of sinful human beings to separate us from the company of sinful human beings and at the same time to free us from the power of malignant spirits. He was crucified and rose on the third day, so that he might grant us the virtue of suffering for him and the hope of rising and living with him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bede%2FHomilies%2520on%2520the%2520Gospels.html'
source_title="Homilies on the Gospels 11.10"
