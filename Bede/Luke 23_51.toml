[[commentary]]
quote='''
From Arimathea, a city of Judea, who also awaited the kingdom of God. From Arimathea, the same is Ramathaim, the city of Elkanah and Samuel in the Thannite region near Diospolis.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
Of Arimathæa, a city of the Jews, &c. Arimathæa is the same as Ramatha, the city of Helcanah and Samuel.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252023.html'
source_title='Catena Aurea by Aquinas'
