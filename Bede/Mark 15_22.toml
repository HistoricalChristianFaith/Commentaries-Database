[[commentary]]
quote='''
And they bring him to a place called Golgotha, which is interpreted as the place of the Skull. Outside the city gate are places where the heads of the condemned are cut off, and they have taken the name Calvariae, that is, of those beheaded. For this reason, the Lord was crucified there, so that where there was once the ground of the condemned, the banners of martyrdom might be raised. And just as for us, He became the curse of the cross, and was scourged and crucified, so for the salvation of all, He is crucified as a guilty one among the guilty.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) There follows: And they bring him unto the place Golgotha, which is being interpreted, the place of Calvary. There are places without the city and the gate, in which the heads of condemned persons are cut off, and which receive the name of Calvary, that is, of the beheaded. But the Lord was crucified there, that where once was the field of the condemned, there the standards of martyrdom might be lifted up.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
