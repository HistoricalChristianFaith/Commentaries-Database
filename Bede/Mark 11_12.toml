[[commentary]]
quote='''
And the next day, when they went out from Bethany, he was hungry. He was hungry, either showing the truth of human flesh or desiring the salvation of believers, burning with zeal against the unbelief of Israel.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
It goes on, And on the morrow, when they were come from Bethany, he was hungry.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
