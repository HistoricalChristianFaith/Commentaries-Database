[[commentary]]
quote='''
Throwing off his cloak, he sprang up and came to him. Indeed, he throws off his cloak and springs up so that, arriving, he might be illuminated by Christ, who, casting off the fetters of the world, hurries toward the giver of eternal light with an unencumbered mind.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
Again, he throws away his garment and leaps, who, throwing aside the bands of the world, with unencumbered pace hastens to the Giver of eternal light.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
