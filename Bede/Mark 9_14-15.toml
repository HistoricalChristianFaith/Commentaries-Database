[[commentary]]
quote='''
(in Marc. 3, 38) In all cases, the difference between the mind of the Scribes and of the people ought to be observed; for the Scribes arc never said to have shown any devotion, faith, humility, and reverence, but as soon as the Lord was come, the whole multitude was greatly amazed and feared, and ran up to Him, and saluted Him; wherefore there follows, And running to him, saluted him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
(ubi sup.) Again, in a mystical sense, on high the Lord unfolds the mysteries of the kingdom to His disciples, but below He rebukes the multitude for their sins of unfaithfulness, and expels devils from those, who are vexed by them. Those who are still carnal and foolish, He strengthens, teaches, punishes, whilst He more freely instructs the perfect concerning the things of eternity.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
It is noteworthy that the places always correspond to the circumstances. On the mountain, the Lord prays, is transformed, and reveals to his disciples the secrets of his majesty. Descending to the lower parts, he is met by the crowd and struck by the tears of the wretched. Above, he unveils the mysteries of the kingdom to his disciples; below, he reproaches the sins of infidelity of the crowds. Above, he reveals the Father's voice to those who can follow him; below, he expels evil spirits from those who are tormented. He still continues to do so now according to the quality of merits, letting some ascend while ceaselessly descending for others. For those who are still carnal and beginners, he strengthens, teaches, and chastises, seeking the low places. But he glorifies the perfect, whose conversation is in heaven, by exalting them more highly, instructing them more freely about the eternal matters, and often teaching them things that cannot even be heard by the crowds.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"
