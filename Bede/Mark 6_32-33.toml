[[commentary]]
quote='''
(in Marc. 2, 26) But when Christ goes to the deserts of the Gentiles, many bauds of the faithful leaving the walls of their cities, that is their old manner of living, follow Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25206.html'
source_title='Catena Aurea by Aquinas'
