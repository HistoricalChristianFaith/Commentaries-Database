[[commentary]]
quote='''
And into whatever city you enter, and they receive you, eat what is set before you, etc. Having described the various entertainments of different houses, he teaches what they ought to do even in cities, namely, to communicate with the pious in all things, but to separate themselves entirely from the society of the impious.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"


[[commentary]]
quote='''
Now having described the reception from different houses, he teaches them what they ought to do in the cities; namely, to have intercourse with the good in all, but to keep from the society of the wicked in every thing; as it follows, But into whatsoever city ye enter, and they receive you, eat such things as are set before you.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
