[[commentary]]
quote='''
He commands them therefore that they exact no more than what was presented to them, as it follows, And he said unto them, Do no more than what is appointed to you. But they are called publicans who collect the public taxes, or who are the farmers of the public revenue or public property? Those also who pursue the gain of this world by traffic are denoted by the same titles, all of whom, each in his own sphere, he equally forbids to practise deceit, that so by first keeping themselves from desiring other men's goods, they might at length come to share their own with their neighbours.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'
