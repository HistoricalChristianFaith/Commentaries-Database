[[commentary]]
quote='''
Again, when the maid saw him, she began to say to those standing around: This man is one of them. But he denied it again. The one accusing him now should not be believed to be the same as before. For Matthew says very clearly: When he went out to the gate, another saw him and said to those who were there (Matthew 26), etc. From this denial of Peter, we learn not only that Christ is denied by someone who says He is not Christ, but also by someone who, when He is, denies that he himself is a Christian. However, the Lord did not say to Peter: You will deny my disciple, but: You will deny me. So he denied Him when he denied being His disciple.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) By this denial of Peter we learn, that not only he denies Christ, who says that He is not the Christ, but he also, who although he is a Christian, denies himself to be such. For the Lord did not say to Peter, Thou shalt deny thyself to be my disciple, but, Thou shalt deny me; he therefore denied Christ, when he said that he was not His disciple.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
