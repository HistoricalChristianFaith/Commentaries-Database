[[commentary]]
quote='''
And some of those standing by, hearing this, said: "Behold, he calls Elijah." Not all, but some. I think these were Roman soldiers, not understanding the Hebrew language, but from what he said "Heloi, Heloi," thinking Elijah was being invoked by him. But if you prefer to understand Jews saying this, they also do it as is their custom, to dishonor the Lord with weakness, who is seen as seeking Elijah's help.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) These however I suppose were Roman soldiers who did not understand the peculiarity of the Hebrew tongue, but, from His calling Eloi, thought that Elias was called by Him. But if the Jews are understood to have said this, they must be supposed to do this, as accusing Him of folly in calling for the aid of Elias.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
