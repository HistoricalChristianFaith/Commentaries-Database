[[commentary]]
quote='''
And he said to them: You are those who justify yourselves before men. But God knows your hearts, for what is exalted among men is an abomination before God. They justify themselves before men, who indeed despise sinners as if they were infirm and hopeless, but consider themselves as perfect in everything and without any weakness, not believing that they have need of the remedy of alms. But this height of noxious pride, how justly it is to be condemned, is seen by Him who will bring to light the hidden things of darkness and manifest the counsels of hearts.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"


[[commentary]]
quote='''
They justify themselves before men who despise sinners as in a weak and hopeless condition, but fancy themselves to be perfect and not to need the remedy of almsgiving; but how justly the depth of deadly pride is to be condemned, He sees who will enlighten the hidden places of darkness. Hence it follows, But God knoweth your hearts.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
