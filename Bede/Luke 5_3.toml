[[commentary]]
quote='''
But ascending into one of the boats, which was Simon’s, he asked him to put out a little from the land. And sitting down, he taught the crowds from the boat. Simon’s boat is the early Church, about which Paul says: "For he who worked through Peter for the apostleship of the circumcised worked also through me for the Gentiles" (Galatians II). It is aptly called one, because the heart and soul of the multitude of believers were one (Acts IV). From which he taught the crowds, because he teaches the nations today through the authority of the Church.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
The ship of Simon is the primitive Church, of which St. Paul says, He that wrought effectually in Peter to the Apostleship of circumcision. (Gal. 2:8.) The ship is well called one, for in the multitude of believers there was one heart and one soul. (Acts 4:32.)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
