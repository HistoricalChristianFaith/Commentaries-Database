[[commentary]]
quote='''
(ubi sup.) An example of confessing their sins and of promising to lead a new life, is held out to those who desire to be baptized, by those words which follow, confessing their sins.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title='Catena Aurea by Aquinas'
