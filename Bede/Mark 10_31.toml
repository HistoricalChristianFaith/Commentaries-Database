[[commentary]]
quote='''
"But many that are first shall be last, and the last first. For example, see Judas, who turned from an apostle into an apostate, and you will say that many that are first shall be last; see the thief on the cross, who became a confessor, and on the same day he was crucified for his sins, rejoicing in paradise with Christ by the grace of faith, and you will say that the last shall be first. But also every day we see many in lay attire excelling in the great merits of life, and others who, from their earliest age, have been fervent in spiritual zeal, yet at the end become sluggish in idleness, growing weak, and finishing in the flesh what they began in the spirit with lazy foolishness.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
But because all do not accomplish a virtuous course of life with the same ardour as they began it, it is presently added, But many that are first shall be last, and the last first; for we daily see many persons who, remaining in a lay habit, are eminent for their meritorious life; but others, who from their youth have been ardent in a spiritual profession, at last wither away in the sloth of ease, and with a lazy folly finish in the flesh, what they had begun in the Spirit.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
