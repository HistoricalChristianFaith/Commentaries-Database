[[commentary]]
quote='''
And they themselves began to inquire among themselves who it might be from them who was going to do this. And certainly, the eleven apostles knew that they had not conceived such a thing against the Lord, but they believed the teacher more than themselves, and fearing their own weakness, they sorrowfully inquired about the sin, of which they had no consciousness. Judas also shamelessly inquires, as Matthew and Mark mention, in order to falsely feign a good conscience with boldness.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
Although the eleven Apostles knew that they were meditating nothing against their Lord, yet notwithstanding because they trust more to their Master than themselves, fearing their own infirmities, they ask concerning a sin of which they had no consciousness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252022.html'
source_title='Catena Aurea by Aquinas'
