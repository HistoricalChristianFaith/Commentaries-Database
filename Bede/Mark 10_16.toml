[[commentary]]
quote='''
And embracing them and laying His hands on them, He blessed them. By embracing, He blessed the children to signify that the humble in spirit are worthy of His blessing, grace, and love.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) Having embraced the children, He also blessed them, implying that the lowly in spirit are worthy of His blessing, grace, and love.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
