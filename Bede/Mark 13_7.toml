[[commentary]]
quote='''
But when you hear of wars and rumors of wars, do not be troubled. For such things must happen, but the end is not yet. Wars pertain to enemies, seditions to citizens. Both of these abounded abundantly from the time of the Lord's Passion among the people of the Jews, who chose a seditious robber for themselves instead of the Savior Christ. However, the apostles, as these events draw near, are warned not to be terrified, not to abandon Jerusalem and Judea, because evidently the end, which should rather be deferred until the fortieth year, namely the desolation of the province and the ultimate destruction of the city and temple, is to follow.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) Now from the time of the Passion of our Lord there ceased not amongst the Jewish people, who chose the seditious robber and rejected Christ the Saviour, either external wars or civil discord; wherefore it goes on: And when ye shall hear of wars and rumours of wars, be ye not troubled. And when these come, the Apostles are warned not to be afraid, or to leave Jerusalem and Judæa, because the end was not to come at once, nay was to be put off for forty years. And this is what is added: for such things must needs be; but the end shall not be yet, that is, the desolation of the province, and the last destruction of the city and temple.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
