[[commentary]]
quote='''
With one and the same voice of confession and praise, they exalt the Lord, both those who go before and those who follow: because there is indeed one faith of those who were proven before the Lord's incarnation and those afterward, although they had different sacraments according to the times, as Peter attests, who says: But we believe that through the grace of the Lord Jesus we shall be saved, even as they (Acts 15). And what they say, Hosanna to the Son of David, this is what is read in the psalm: The salvation of the Lord is, and upon your people is your blessing (Psalm 3), this is, what in great devotion of praise the chorus of saints resonates in the Revelation: Salvation to our God who sits upon the throne, and to the Lamb (Rev. 7).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bede%2FHomilies%2520on%2520the%2520Gospels.html'
source_title="Homilies on the Gospels 2.3"


[[commentary]]
quote='''
But the crowds take up a verse of praise from the one hundred and seventeenth psalm, which no one doubts is sung about the Lord. Whence it is beautifully stated about Him in the same psalm: The stone which the builders rejected has become the cornerstone; because indeed Christ, whom the Jewish builders rejected with their decrees of traditions, has become the foundation of the believing people, namely the Jews and the Gentiles. For what is called the cornerstone in the psalm is Christ, who is praised in the Gospel by the voices of the preceding and following crowds.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bede%2FHomilies%2520on%2520the%2520Gospels.html'
source_title="Homilies on the Gospels 2.3"


[[commentary]]
quote='''
Blessed is he who comes in the name of the Lord. In the name of the Lord signifies in the name of God the Father, which He elsewhere says to the unbelieving Jews: I have come in the name of My Father, and you did not receive Me; if another comes in his own name, him you will receive (John V). For Christ came in the name of God the Father, because in all that He did and said He took care to glorify the Father and proclaim Him as to be glorified by men. The Antichrist will come in his own name, who, although the most wicked of all men and full of the devil as his companion, will not disdain to call himself the Son of God: for he opposes and exalts himself above all that is called God or that is worshipped.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bede%2FHomilies%2520on%2520the%2520Gospels.html'
source_title="Homilies on the Gospels 2.3"

[[commentary]]
quote='''
It is a compound of two words; Hosi is shortened into save; Anna a mere exclamation, complete. Blessed is He that cometh in the name of the Lord. The name of the Lord here is the name of God the Father; though we may understand it as His own name; inasmuch as He also is the Lord. But the former sense agrees better with the text above, I am come in My Father's name. (5:43) He does not lose His divinity, when He teaches us humility.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
