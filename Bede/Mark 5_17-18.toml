[[commentary]]
quote='''
(ubi sup.) Or else, conscious of their own frailty, they judged themselves unworthy of the presence of the Lord. It goes on: And when he was going to the ship, he that had been tormented, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
