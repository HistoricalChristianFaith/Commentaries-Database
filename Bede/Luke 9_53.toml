[[commentary]]
quote='''
And they did not receive him, because his face was set to go to Jerusalem. Because the Samaritans saw he was going to Jerusalem, they did not receive the Lord. For the Jews do not associate with Samaritans, as the Evangelist John shows.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
Or the Samaritans see that our Lord is going to Jerusalem, and do not receive Him. For the Jews have no dealings with the Samaritans, (John 4:9.) as John shows.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
