[[commentary]]
quote='''
Because he commands unclean spirits with authority and power, and they depart. For holy men also can expel demons, but they do so by the word of God, whereas the Word of God itself performs miracles by its own power.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"


[[commentary]]
quote='''
Holy men were able by the word of God to cast out devils, but the Word Himself does mighty works by His own power.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
