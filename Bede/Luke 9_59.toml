[[commentary]]
quote='''
But he said to another: Follow me. But he said: Lord, allow me first to go and bury my father. He did not reject discipleship, but first, with the piety of completing his father's funeral, he desired to follow him more freely, worthy in all things in whom the Son of Man may lay his head, that is, in whose humble heart divinity may rest with a certain familiar dwelling.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
He did not refuse the discipleship, but his wish was, having fulfilled the filial duty of burying his father, to follow Christ more freely.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
