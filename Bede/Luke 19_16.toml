[[commentary]]
quote='''
But the first came, saying: Lord, your mina has gained ten minas. The first servant is the order of teachers sent to the circumcision, who received one mina to trade with, because they were commanded to preach one Lord, one faith, one baptism, one God. But this same mina gained ten minas, because the people under the law came to be united to him through teaching.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"


[[commentary]]
quote='''
The first servant is the order of teachers sent to the circumcision, who received one pound to put out to use, inasmuch as it was ordered to preach one faith. But this one pound gained ten pounds, because by its teaching it united to itself the people who were subject to the law.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252019.html'
source_title='Catena Aurea by Aquinas'
