[[commentary]]
quote='''
And he prayed that if it was possible the hour would pass from him, and said: Abba, etc. What was that voice, except the sound of our weakness? Many still frail ones grieve at the future death; but let them have a right heart, let them avoid death as much as they can; but if they cannot, let them say what the Lord himself, not for himself, but for us said. For what did he say? Father, if it is possible, let this cup pass from me. Behold you have the human will expressed. Now see the right heart.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
But going forward a little, He falls on His face, and shows his lowliness of mind, by the posture of His body. Wherefore there follows: And he went forward a little, and fell on the ground, and prayed that, if it were possible, the hour might pass from him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
