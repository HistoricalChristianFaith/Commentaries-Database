[[commentary]]
quote='''
The Son of Man did not come to destroy souls, but to save them. And you, therefore, he says, by whose Spirit you are signed, follow His deeds, now advising piously, but justly judging in fury.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
After that He had taught them what it was to love their neighbour as themselves, and the Holy Ghost also had been infused into them, there were not lacking these punishments, though far less frequent than in the Old Testament, because the Son of man came not to destroy men's lives, but to save them. As if He said, And do you therefore who are sealed with His Spirit, imitate also His actions, now determining charitably, hereafter judging justly.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
