[[commentary]]
quote='''
(ubi sup.) There follows: But Jesus yet answered nothing; so that Pilate marvelled. He was unwilling to give an answer, lest He should clear Himself of the charge, and be acquitted by the judge, and so the gain resulting from the Cross should be done away.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
