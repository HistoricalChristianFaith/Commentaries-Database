[[commentary]]
quote='''
(ubi sup.) By which He shows that no one is to be driven away from that partial goodness which he possesses already, but rather to be stirred up to that which he has not as yet obtained.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
