[[commentary]]
quote='''
For all of them have contributed out of their abundance. But she, out of her poverty, has given all she had, her whole livelihood. The Jew contributes to the gifts of God out of his abundance, who, presuming upon his own righteousness, prays to himself thus: God, I thank you that I am not like other men, extortioners, unjust, etc. (Luke 18). But the Church gives all her living to the gifts of God, understanding that all she lives is not by her own merit, but by divine grace, saying: God, be merciful to me, a sinner (Ibid.). And again: I will keep my strength for you, because you are my protector, my God; his mercy will precede me (Psalm 58).
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) Wherefore He adds, For all they did cast in of their abundance, but she of her want did cast in all that she had, even all her living.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
(ubi sup) The Jew sends of his abundance into the treasury, because he presumes on his own righteousness; but the Church sends her whole living into God's treasury, because she understands that even her very living is not of her own desert, but of Divine grace.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
