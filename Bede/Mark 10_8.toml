[[commentary]]
quote='''
And the two shall become one flesh. Therefore now they are no longer two, but one flesh. The reward of marriage is that two become one flesh. Chastity joined to the spirit becomes one spirit.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) The reward then of marriage is of two to become one flesh. Virginity being joined to the Spirit, becomes of one spirit.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
