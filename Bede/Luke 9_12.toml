[[commentary]]
quote='''
The day began to decline, and the twelve, approaching, said to him, "Send the crowds away, so that they may go into the villages and countryside around and find food." As the day declined, the Savior feeds the crowds, because either with the end of the ages approaching, or when the Sun of righteousness has set for us, we are saved from the wasting away of long spiritual famine.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"


[[commentary]]
quote='''
Now when the day was going down, he refreshes the multitudes, that is, as the end of the world approaches, or when the Sun of righteousness sets for us.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
