[[commentary]]
quote='''
Behold, I cast out demons and accomplish healings today and tomorrow, and on the third day I am perfected. These words are understood mystically and figuratively as spoken by the Lord, for he did not suffer on the third day from this day, as he follows by saying:
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
Because of his wiles and stratagems He calls Herod a fox, which is an animal full of craft, concealing itself in a ditch because of snares, having a noisome smell, never walking in straight paths, all which things belong to heretics, of whom Herod is a type, who endeavours to destroy Christ (that is, the humility of the Christian faith) in the hearts of believers.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
