[[commentary]]
quote='''
(ubi sup.) For many came forward, when destruction was hanging over Jerusalem, saying that they were Christs, and that the time of freedom was now approaching. Many teachers of heresy also arose in the Church even in the time of the Apostles; and many Antichrists came in the name of Christ, the first of whom was Simon Magus, to whom the Samaritans, as we read in the Acts of the Apostles, listened, saying, This man is the great power of God: wherefore also it is added here, And shall deceive many. (Acts 8:10)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252013.html'
source_title='Catena Aurea by Aquinas'
