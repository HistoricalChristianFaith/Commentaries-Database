[[commentary]]
quote='''
And he, answering, said, "Teacher, I have observed all these things from my youth," etc. This man should not be thought to have tempted the Lord with any vow (as some have thought), nor to have lied about his life when he said that he had kept the commandments of the law, but simply to have confessed how he lived. Because if he were held guilty of lying or hypocrisy, by no means, having looked into the secrets of his heart, would Jesus be said to love him. For the Lord loves those who keep the commands of the law, although lesser; but nonetheless, he shows them what in the law was lesser, to those who wish to be perfect because he did not come to abolish the Law or the Prophets, but to fulfill. To which indeed pertains what is consequently joined here.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) On which there follows, And he answered and said unto him, Master, all these have I observed from my youth. We must not suppose that this man either asked the Lord, with a wish to tempt him, as some have fancied, or lied in his account of his life; but we must believe that he confessed with simplicity how he had lived; which is evident, from what is subjoined, Then Jesus beholding him loved him, and said unto him. If however he had been guilty of lying or of dissimulation, by no means would Jesus, after looking on the secrets of his heart, have been said to love him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
