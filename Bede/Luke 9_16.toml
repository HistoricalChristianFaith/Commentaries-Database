[[commentary]]
quote='''
After taking the five loaves and the two fish, he looked up to heaven, blessed them, broke them, and gave them to his disciples to set before the crowd. The Savior, seeing the hungry crowds, does not create new food, but blesses what the disciples have brought, because, coming in the flesh, he preaches nothing other than what has been foretold, but demonstrates the sayings of prophecy filled with the mysteries of grace. He looks to heaven to teach that the gaze of the mind should be directed there, and that the light of knowledge is to be sought there. He breaks the loaves and distributes them to his disciples to set before the crowd, because he reveals the closed sacraments of the law and prophecy to those who will preach throughout the world.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"


[[commentary]]
quote='''
Now our Saviour does not create new food for the hungry multitudes, but He took those things which the disciples had and blessed them, since coming in the flesh He preaches nothing else than what had been foretold, but demonstrates the words of prophecy to be pregnant with the mysteries of grace; He looks towards heaven, that thither He may teach us to direct the eye of the mind, there to seek the light of knowledge; He breaks and distributes to the disciples to be placed before the multitude, because He revealed to them the Sacraments of the Law and the Prophets that they might preach them to the world.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%25209.html'
source_title='Catena Aurea by Aquinas'
