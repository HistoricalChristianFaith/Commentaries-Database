[[commentary]]
quote='''
(ubi sup.) But observe that the righteousness of the law, when kept in its own time, conferred not only earthly goods, but also eternal life on those who chose it. Wherefore the Lord's answer to one who enquires concerning everlasting life is, Thou knowest the commandments, Do not commit adultery, Do not kill; for this is the childlike blamelessness which is proposed to us, if we would enter the kingdom of heaven.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
