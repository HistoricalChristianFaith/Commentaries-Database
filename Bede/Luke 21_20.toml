[[commentary]]
quote='''
But when you shall see Jerusalem surrounded by an army, then know that her desolation is near. Thus far these things which were to be for forty years, with the end not yet coming; here the very end of the desolation, which was made by the Roman army, is explained by the Lord's words.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
Hitherto our Lord had been speaking of those things which were to come to pass for forty years, the end not yet coming. He now describes the very end itself of the desolation, which was accomplished by the Roman army; as it is said, And when ye shall see Jerusalem compassed, &c.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252021.html'
source_title='Catena Aurea by Aquinas'
