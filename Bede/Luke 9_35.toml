[[commentary]]
quote='''
And they were afraid as they entered into the cloud, and a voice came from the cloud, saying: This is my beloved Son, hear him. Human fragility cannot bear the sight of greater glory, and trembling with the whole mind and body, it falls to the ground. The more one seeks greater things, the more he collapses to lower things, if he does not know his own measure. Indeed, the voice of the Father speaking from heaven is heard, which bears witness to the Son, and teaches Peter the truth, removing his error, and indeed teaches the other apostles through Peter. This is (he says) my beloved Son, it is he who should have a tabernacle built, it is him who should be obeyed. This is the Son; Moses and Elijah are servants to him, they too should prepare a tabernacle for the Lord in the inner rooms of their hearts along with you. And note, just as when the Lord was baptized in the Jordan, so also on the glorified mountain, the mystery of the whole Trinity is declared, whose glory we confess in baptism, and which we will see in the resurrection. Nor is it in vain that the Holy Spirit appears here in a bright cloud, there in a dove, because he who now keeps the faith which he perceives with a simple heart, will then behold what he had believed with the clear light of vision, and by the same grace will be protected forever.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
The Father’s voice did not forbid them to listen to Moses and Elijah (that is, to the Law and the Prophets). It rather suggested to all of them that listening to his Son was to take precedence since he came to fulfill the Law and the Prophets. It impressed on them that the light of gospel truth was to be put ahead of all the types and obscure signs of the Old Testament. By the benevolent, divinely arranged plan when the moment of the cross was drawing near, he strengthened them so that the disciples’ faith might not falter when the Lord was crucified. He revealed to them how also his humanity was to be lifted up by heavenly light through his resurrection. The heavenly voice of the Father gave assurance that the Son was coeternal to the Father in his divinity so that when the hour of the passion approached, they would be less sorrowful at his dying. They remembered that after his death he would soon be glorified as a human being, although in his divinity he had always been glorified by God his Father.Since the disciples were fleshly and still fragile in substance, they were afraid and fell upon their faces when they heard God’s voice. Since the Lord was a benevolent master in everything, he consoled them at the same time by his word and his touch, and he lifted them up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Bede%2FHomilies%2520on%2520the%2520Gospels.html'
source_title="Homilies on the Gospels 1.24"
