[[commentary]]
quote='''
(ubi sup.) In which He teaches, that he is the greater, who is the less, and that he becomes the lord, who is servant of all: vain, therefore, was it both for the one party to seek for immoderate things, aud the other to be annoyed at their desiring greater things, since we are to arrive at the height of virtue not by power but by humility.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
