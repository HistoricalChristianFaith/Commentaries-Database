[[commentary]]
quote='''
Peter began to say to Him, "Behold, we have left everything and have followed You." Great confidence—Peter was a fisherman, he was not rich, he sought food by hand and skill, and yet he speaks confidently, "We have left everything." And because it is not enough only to leave, he adds what is perfect: "And have followed You." We have done what You commanded, what then will You give us as a reward?
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) And because it is not sufficient to have left all, he adds that which makes up perfection, and have followed thee. As if he said, We have done what Thou hast commanded. What reward therefore wilt Thou give us?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252010.html'
source_title='Catena Aurea by Aquinas'
