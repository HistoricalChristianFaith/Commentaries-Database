[[commentary]]
quote='''
Joseph of Arimathea, a noble councilor, who also awaited the kingdom of God, came and boldly approached Pilate and requested the body of Jesus. This Joseph indeed is praised for his great standing in the world but is lauded even more for his merit with God. For it was fitting that such a man should exist who would bury the body of the Lord, one who by his righteousness of merits would be worthy of such a ministry, and by the nobility of his secular power would have the capacity to obtain the ability to minister. For not just anyone, unknown or of moderate status, could approach the governor and request the body of the crucified.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"


[[commentary]]
quote='''
(ubi sup.) But the man who buried the body of the Lord must needs by his righteous merits have been worthy, and by the nobility of worldly power able to perform this service. Therefore it is said, An honourable counsellor, which also waited for the kingdom of God. He is called in Latin, decurio, because he is of the order of the curia, and served the office of a provincial magistracy; this officer was also called curialis, from his care of civic duties. Arimathæa is the same as Ramathain, the city of Elkanah and Samuel.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'


[[commentary]]
quote='''
(ubi sup.) But it was not an obscure person, nor a man of mean rank, who could come to the governor and obtain the body. There follows: And he bought fine linen, and took him down, and wrapped him in the linen.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
