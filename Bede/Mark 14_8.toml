[[commentary]]
quote='''
What she had, she did; she has anointed my body beforehand for burial. What you consider to be the waste of ointment is the duty of burial. It is not surprising if she gives me the good scent of her faith, since I am going to shed my blood for her.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Mark.html"
source_title = "On the Gospel of Mark"

[[commentary]]
quote='''
(ubi sup.) As if the Lord said, What ye think is a waste of ointment is the service of my burial.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
