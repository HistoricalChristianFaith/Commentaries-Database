[[commentary]]
quote='''
Lest perhaps someone more honorable than you has been invited by him, and the one who invited both him and you comes and says to you, "Give this man your place," and then you begin with shame to take the lowest place. He gives place to the one invited after, who, made more secure by the confidence of his long conversation, is surpassed by the swiftness of those who have followed Christ. And with shame, he holds the lowest place when, recognizing better things in others, he humbles whatever high thoughts he had of his own works, saying with the Prophet, "I am poor and in labor from my youth, yet having been exalted, I am humbled and confounded" (Psalm LXXIII).
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"


[[commentary]]
quote='''
For he will have to give place to one more honourable who is bidden afterwards, seeing that he is overtaken by the activity of those who followed him, and with shame he occupies the lowest place, now that knowing better things of the others he brings low whatever high thoughts he once had of his own works.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
