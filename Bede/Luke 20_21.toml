[[commentary]]
quote='''
And they questioned him, saying: Master, we know that you speak and teach rightly, and do not show partiality, but teach the way of God in truth. Is it lawful for us to give tribute to Caesar, or not? The flattering and deceitful question provokes the respondent to fear God more than Caesar, and to say that tributes should not be paid, so that immediately the governor's officers, who are recorded to have been present according to other evangelists, could hold him as a leader of sedition against the Romans.
'''
source_url = "https://historicalchristian.faith/by_father.php?file=Bede%2FCommentary%2520on%2520Luke.html"
source_title = "On the Gospel of Luke"

[[commentary]]
quote='''
This smooth and artful question was to entice the answerer to say that he fears God rather than Cæsar, for it follows, Neither acceptest thou the person of any, but teachest the way of God truly.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
