[[commentary]]
quote='''
This they say, to entice Him to tell them that they ought not to pay tribute, in order that the servants of the guard, (who according to the other Evangelists are said to have been present,) might immediately upon hearing it seize Him as the leader of a sedition against the Romans. And so they proceed to ask, Is it lawful to give tribute to Cæsar, or not? For there was a great division among the people, some saying that for the sake of security and quiet, seeing that the Romans fought for all, they ought to pay tribute; while the Pharisees, on the contrary, declared, that the people of God who gave tithes and first fruits, ought not to be subject to the law of man.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Luke%2FChapter%252020.html'
source_title='Catena Aurea by Aquinas'
