[[commentary]]
quote='''
All the disciples then are touched by the Lord; so that there is amongst them the harmony of the harp, all the well attuned strings answer with accordant tone; for it goes on: And they began to be sorrowful, and to say unto him one by one, Is it I? One of them however, unstrung, and steeped in the love of money, said, Is it I, Lord? as Matthew testifies.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
