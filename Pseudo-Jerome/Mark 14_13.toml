[[commentary]]
quote='''
But the Lord points out with whom He would eat the Passover, and after His custom He sends two disciples, which we have explained above; wherefore it goes on, And he sendelh forth two of his disciples, and he saith unto them, Go ye into the city.

And in a mystical sense the city is the Church, surrounded by the wall of faith, the man who meets them is the primitive people, the pitcher of water is the law of the letter.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
