[[commentary]]
quote='''
But He appeared when all the eleven were together, that all might be witnesses, and relate to all men what they had seen and heard in common. It goes on: And upbraided them with their unbelief and hardness of heart, because they believed not them who had seen him after his resurrection.

But He rebukes their want of faith, that faith might take its place; He rebukes the hardness of their stony heart, that the fleshy heart, full of love, might take its place.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
