[[commentary]]
quote='''
But the ears are opened to hymns, and songs, and psalms; and He looses the tongue, that it may pour forth the good word, which neither threats nor stripes can restrain.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
