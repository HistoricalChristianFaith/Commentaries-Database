[[commentary]]
quote='''
There follows: And he cometh, and findeth them sleeping. For as they are asleep in mind, so also in body. 1But after His prayer, the Lord coming, and seeing His disciples sleeping, rebukes Peter alone. Wherefore it goes on: And saith unto Peter, Simon, steepest thou? couldest not thou watch with me one hour? As if He had said, If thou couldest not watch one hour with me, how wilt thou be able to despise death, thou who promisest to die with me?
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
