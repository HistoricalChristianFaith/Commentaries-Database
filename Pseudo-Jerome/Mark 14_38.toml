[[commentary]]
quote='''
It goes on: Watch and pray, that ye enter not into temptation, that is, the temptation of denying me.

But he is said to enter into temptation, who neglects to pray. There follows: The spirit indeed is willing, but the flesh is weak.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
