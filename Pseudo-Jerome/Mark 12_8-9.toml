[[commentary]]
quote='''
Or else, they cast Him out of the vineyard, that is, out of the people, saying Thou art a Samaritan, and hast a devil. (John 8:48) Or, as far as in them lay, they cast Him out of their own borders, and gave Him up to the Gentiles that they might receive Him. There follows, What then will the Lord of the vineyard do? he will come and destroy those husbandmen, and give the vineyard unto other.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252012.html'
source_title='Catena Aurea by Aquinas'
