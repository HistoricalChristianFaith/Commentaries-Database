[[commentary]]
quote='''
By the four thousand is meant the year of the new dispensation, with its four seasons. Fitly also are there four thousand, that in the number itself it might be taught us that they were filled with the food of the Gospel.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
