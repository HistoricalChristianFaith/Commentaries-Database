[[commentary]]
quote='''
There follows: But Peter said unto him, Although all shall be offended, yet will not I. Lo, a bird unfledged strives to raise itself on high; but the body weighs down the soul, so that the fear of the Lord is overcome by the fear of human death.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
