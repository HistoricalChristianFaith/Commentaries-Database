[[commentary]]
quote='''
It goes on: And Peter followed him afar off, even into the palace of the High Priest. For though fear holds him back, love draws him on.

He warms himself at the fire in the hall, with the servants. The hall of the High-Priest is the enclosure of the world, the servants are the devils, with whom whosoever remains cannot weep for his sins; the fire is the desire of the flesh.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
