[[commentary]]
quote='''
For he that hath, to him shall be given; that is, he who hath faith shall have virtue, and he who hath obedience to the word, shall also have the understanding of the mystery. Again, he who, on the other hand, has not faith, fails in virtue; and he who has not obedience to the word, shall not have the understanding of it; and if he does not understand, he might as well not have heard.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25204.html'
source_title='Catena Aurea by Aquinas'
