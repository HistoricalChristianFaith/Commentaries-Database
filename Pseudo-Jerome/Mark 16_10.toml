[[commentary]]
quote='''
They mourn and weep because they had not yet seen, but after a short time they shall receive a consolation. For blessed are they that weep now, for they shall be comforted.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
