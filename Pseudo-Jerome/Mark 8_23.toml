[[commentary]]
quote='''
And He brings him out of the town, that is, out of the neighbourhood of the wicked; and He puts spittle into his eyes, that he may see the will of God, by the breath of the Holy Ghost; and putting His hands upon him, He asked him if he could see, because by the works of the Lord His majesty is seen.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25208.html'
source_title='Catena Aurea by Aquinas'
