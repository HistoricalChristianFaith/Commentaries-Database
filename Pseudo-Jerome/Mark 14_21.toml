[[commentary]]
quote='''
But Judas does not withdraw his foot from his traitorous design though once and again pointed at, wherefore his punishment is foretold, that the death denounced upon him might correct him, whom shame could not overcome; wherefore it goes on: The Son of man indeed goeth, as it is written of him.

But because many do good, in the way that Judas did, without its profiting them, there follows: Woe to that man by whom the Son of man is betrayed! good were it for that man if he had never been born.

That is, hidden in his mother's inmost womb, for it is better for a man not to exist than to exist for torments.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252014.html'
source_title='Catena Aurea by Aquinas'
