[[commentary]]
quote='''
Mark has, as he is wont, expressed seven verses of the Lord's prayer in one prayer. But what can he, whose sins are all forgiven, require more, save that he may persevere in what has been granted unto him.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252011.html'
source_title='Catena Aurea by Aquinas'
