[[commentary]]
quote='''
A city, however, placed on a hill cannot be hid, and lowliness always comes before glory. Wherefore it goes on, But the more he charged them, so much the more a great deal they published it.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25207.html'
source_title='Catena Aurea by Aquinas'
