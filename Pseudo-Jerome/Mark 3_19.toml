[[commentary]]
quote='''
But Judas Iscariot is one who does not do away his sins by repentance. For Judas means 'boaster,' or vain-glorious. And Iscariot, 'the memory of death.' But many are the proud and vain-glorious confessors in the Church, as Simon Magus, and Arius, and other heretics, whose deathlike memory is celebrated in the Church, that it may be avoided.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'

[[commentary]]
quote='''
But mystically, the house to which they came, is the early Church.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25203.html'
source_title='Catena Aurea by Aquinas'
