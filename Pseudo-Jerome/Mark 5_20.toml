[[commentary]]
quote='''
But the man who is healed preached in Decapolis, where the Jews, who hang on the letter of the Decalogue, are being turned away from the Roman rule.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25205.html'
source_title='Catena Aurea by Aquinas'
