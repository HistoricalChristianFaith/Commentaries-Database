[[commentary]]
quote='''
The white robe is also true joy, now that the enemy is driven away, the kingdom won, the King of Peace sought for and found and never let go by us. This young man then shows an image of the Resurrection to them who feared death. But their being frightened shows that eye hath not seen, nor ear heard, neither have entered into the heart of man to conceive the things which God hath prepared for them that love Him. (1 Cor 2:9)
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
