[[commentary]]
quote='''
Here Abel is brought out into the field by his brother, to be slain by him. Here Isaac comes forth with the wood, and Abraham with the ram caught in the thicket. Here also Joseph with the sheaf of which he dreamed, and the long robe steeped in blood. Here is Moses with the rod, and the serpent hanging on the wood. Here is the cluster of grapes, carried on a staff. Here is Elisha with the piece of wood sent to seek for the axe, which had sunk, and which swam to the wood; that is, mankind, which by the forbidden tree, fell down to hell, but by the wood of the cross of Christ, and by the baptism of water, swims to paradise.z Here is Jonah out of the wood of the ship sent down into the sea and into the whale's belly for three days.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252015.html'
source_title='Catena Aurea by Aquinas'
