[[commentary]]
quote='''
For the fever means intemperance, from which, we the sons of the synagoguek, by the hand of discipline, and by the lifting up of our desires, are healed, and minister to the will of Him who heals us.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%25201.html'
source_title='Catena Aurea by Aquinas'