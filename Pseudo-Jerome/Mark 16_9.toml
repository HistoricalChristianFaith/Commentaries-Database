[[commentary]]
quote='''
Again, He is shown to her, out of whom He had cast seven devils, because harlots and publicans shall go before the synagogue into the kingdom of heaven, as the thief reached it before the Apostles.
'''
time=1274
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Mark%2FChapter%252016.html'
source_title='Catena Aurea by Aquinas'
