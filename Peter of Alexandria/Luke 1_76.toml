[[commentary]]
quote='''
For thus will they be the rather profited, meditating upon the prophet's words, and saying, "Unto us a child is born, unto us a Son is given; and the government shall be upon His shoulder: and His name shall be called the Messenger of My mighty counsel." Who, as ye know, when another infant in the sixth month of his conception had preached before His coming repentance for the remission of sins, was himself also conceived to preach repentance.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Peter%2520of%2520Alexandria%2FThe%2520Canonical%2520Epistle.html"
source_title="The Canonical Epistle"
