[[commentary]]
quote='''
For they gave themselves up to be afflicted for the name of Christ, even though in their dungeon they enjoyed much consolation from their brethren; which, indeed, they shall return many fold, desiring to be set free from that most bitter captivity of the devil, especially remembering Him who said: "The spirit of the Lord is upon me, because He hath anointed me to preach the Gospel to the poor; He hath sent me to heal the broken-hearted, to preach deliverance to the captives, and recovering of sight to the blind, to set at liberty them that are bruised; to preach the acceptable year of the Lord, and the day of recompense unto our God."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Peter%2520of%2520Alexandria%2FThe%2520Canonical%2520Epistle.html"
source_title="The Canonical Epistle"
