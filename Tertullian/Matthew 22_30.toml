
[[commentary]]
quote='''
The ogdoad, or eightfold number, therefore, is not concerned in our formation; for in the time it represents there will be no more marriage. We have already demonstrated the conjunction of the body and the soul, from the concretion of their very seminations to the complete formation of the f£tus.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FA%2520Treatise%2520on%2520the%2520Soul.html"
source_title="A Treatise on the Soul"

[[commentary]]
quote='''
"For this corruptible"-and as he spake, the apostle seemingly pointed to his own flesh-"must put on incorruption, and this mortal must put on immortality," in order, indeed, that it may be rendered a fit substance for the kingdom of God. "For we shall be like the angels." This will be the perfect change of our flesh-only after its resurrection. Now if, on the contrary, there is to be no flesh, how then shall it put on incorruption and immortality? Having then become something else by its change, it will obtain the kingdom of God, no longer the (old) flesh and blood, but the body which God shall have given it.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FThe%2520Five%2520Books%2520Against%2520Marcion%2FBook%25205.html"
source_title="Against Marcion Book V"

[[commentary]]
quote='''
To this discussion, however, our Lord's declaration puts an effectual end: "They shall be," says He, "equal unto the angels." As by not marrying, because of not dying, so, of course, by not having to yield to any like necessity of our bodily state; even as the angels, too, sometimes were "equal unto" men, by eating and drinking, and submitting their feet to the washing of the bath-having clothed themselves in human guise, without the loss of their own intrinsic nature. If therefore angels, when they became as men, submitted in their own unaltered substance of spirit to be treated as if they were flesh, why shall not men in like manner, when they become "equal unto the angels," undergo in their unchanged substance of flesh the treatment of spiritual beings, no more exposed to the usual solicitations of the flesh in their angelic garb, than were the angels once to those of the spirit when encompassed in human form? We shall not therefore cease to continue in the flesh, because we cease to be importuned by the usual wants of the flesh; just as the angels ceased not therefore to remain in their spiritual substance, because of the suspension of their spiritual incidents. Lastly, Christ said not, "They shall be angels," in order not to repeal their existence as men; but He said, "They shall be equal unto the angels," that He might preserve their humanity unimpaired. When He ascribed an angelic likeness to the flesh, He took not from it its proper substance.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520the%2520Resurrection%2520of%2520the%2520Flesh.html"
source_title="On the Resurrection of the Flesh"

[[commentary]]
quote='''
With what consistency do we mount that (future) judgment-seat to pronounce sentence against those whose gifts we (now) seek after? For you too, (women as you are, ) have the self-same angelic nature promised as your reward, the self-same sex as men: the self-same advancement to the dignity of judging, does (the Lord) promise you.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520the%2520Apparel%2520of%2520Women%2FBook%25201.html"
source_title="On the Apparel of Women Book I"

[[commentary]]
quote='''
"But if 'in that age they will neither marry nor be given in marriage, but will be equal to angels,' is not the fact that there will be no restitution of the conjugal relation a reason why we shall not be bound to our departed consorts? "Nay, but the more shall we be bound (to them), because we are destined to a better estate-destined (as we are) to rise to a spiritual consortship, to recognise as well our own selves as them who are ours. Else how shall we sing thanks to God to eternity, if there shall remain in us no sense and memory of this debt; if we shall be reformed in substance, not in consciousness? Consequently, we who shall be with God shall be together; since we shall all be with the one God-albeit the wages be various, albeit there be "many mansions", in the house of the same Father having laboured for the "one penny" of the self-same hire, that is, of eternal life; in which (eternal life) God will still less separate them whom He has conjoined, than in this lesser life He forbids them to be separated.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Monogamy.html"
source_title="On Monogamy"
