[[commentary]]
quote='''
Whose kingdom shall I wish to come-his, of whom I never heard as the king of glory; or His, in whose hand are even the hearts of kings? Who shall give me my daily bread? Shall it be he who produces for me not a grain of millet-seed; or He who even from heaven gave to His people day by day the bread of angels? Who shall forgive me my trespasses? He who, by refusing to judge them, does not retain them; or He who, unless He forgives them, will retain them, even to His judgment? Who shall suffer us not to be led into temptation? He before whom the tempter will never be able to tremble; or He who from the beginning has beforehand condemned the angel tempter? If any one, with such a form, invokes another god and not the Creator, he does not pray; he only blasphemes.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FThe%2520Five%2520Books%2520Against%2520Marcion%2FBook%25204.html"
source_title="Against Marcion Book IV"

[[commentary]]
quote='''
"But you remit, in order that remission may be granted you by God." The sins which are (thus) cleansed are such as a man may have committed against his brother, not against God. We profess, in short, in our prayer, that we will grant remission to our debtors; but it is not becoming to distend further, on the ground of the authority of such Scriptures, the cable of contention with alternate pull into diverse directions; so that one (Scripture) may seem to draw tight, another to relax, the reins of discipline-in uncertainty, as it were,-and the latter to debase the remedial aid of repentance through lenity, the former to refuse it through austerity.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Modesty.html"
source_title="On Modesty"

[[commentary]]
quote='''
For the completeness of so brief a prayer He added-in order that we should supplicate not touching the remitting merely, but touching the entire averting, of acts of guilt-"Lead us not into temptation:" that is, suffer us not to be led into it, by him (of course) who tempts; but far be the thought that the Lord should seem to tempt, as if He either were ignorant of the faith of any, or else were eager to overthrow it. Infirmity and malice are characteristics of the devil. For God had commanded even Abraham to make a sacrifice of his son, for the sake not of tempting, but proving, his faith; in order through him to make an example for that precept of His, whereby He was, by and by, to enjoin that he should hold no pledges of affection dearer than God. He Himself, when tempted by the devil, demonstrated who it is that presides over and is the originator of temptation. This passage He confirms by subsequent ones, saying, "Pray that ye be not tempted;" yet they were tempted, (as they showed) by deserting their Lord, because they had given way rather to sleep than prayer. The final clause, therefore, is consonant, and interprets the sense of "Lead us not into temptation;" for this sense is, "But convey us away from the Evil One."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Prayer.html'
source_title="On Prayer"
