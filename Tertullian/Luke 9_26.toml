[[commentary]]
quote='''
At all events, whether in the latter or the former way, you are guilty of being "ashamed of God." But "whosoever shall be ashamed of Me in the presence of men, of him will I too be ashamed," says He, "in the presence of my Father who is in the heavens."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Idolatry.html"
source_title="On Idolatry"

[[commentary]]
quote='''
It is, however, a jealous God whom He here presents to me one who returns evil for evil. "For whosoever," says He, "shall be ashamed of me, of him will I also be ashamed." Now to none but my Christ can be assigned the occasion of such a shame as this. His whole course was so exposed to shame as to open a way for even the taunts of heretics, declaiming with all the bitterness in their power against the utter disgrace of His birth and bringing-up, and the unworthiness of His very flesh.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FThe%2520Five%2520Books%2520Against%2520Marcion%2FBook%25204.html"
source_title="Against Marcion Book IV"

[[commentary]]
quote='''
Whatsoever is unworthy of God, is of gain to me. I am safe, if I am not ashamed of my Lord. "Whosoever," says He, "shall be ashamed of me, of him will I also be ashamed." Other matters for shame find I none which can prove me to be shameless in a good sense, and foolish in a happy one, by my own contempt of shame. The Son of God was crucified; I am not ashamed because men must needs be ashamed of it. And the Son of God died; it is by all means to be believed, because it is absurd. And He was buried, and rose again; the fact is certain, because it is impossible.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520the%2520Flesh%2520of%2520Christ.html"
source_title="On the Flesh of Christ"

[[commentary]]
quote='''
"Him who will confess Me, I also will confess before My Father." How will he confess, fleeing? How flee, confessing? "Of him who shall be ashamed of Me, will I also be ashamed before My Father." If I avoid suffering, I am ashamed to confess. "Happy they who suffer persecution for My name's sake." Unhappy, therefore, they who, by running away, will not suffer according to the divine command. "He who shall endure to the end shall be saved." How then, when you bid me flee, do you wish me to endure to the end?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Flight%2520in%2520Persecution.html"
source_title="On Flight in Persecution"
