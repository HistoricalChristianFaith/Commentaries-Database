[[commentary]]
quote='''
In all other respects the Father did not forsake the Son, for it was into His Father's hands that the Son commended His. spirit. Indeed, after so commending it, He instantly died; and as the Spirit remained with the flesh, the flesh cannot undergo the full extent of death, i.e., in corruption and decay.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FAgainst%2520Praxeas.html"
source_title="Against Praxeas"

[[commentary]]
quote='''
He Himself, when tempted by the devil, demonstrated who it is that presides over and is the originator of temptation. This passage He confirms by subsequent ones, saying, "Pray that ye be not tempted; " yet they were tempted, (as they showed) by deserting their Lord, because they had given way rather to sleep than prayer. The final clause, therefore, is consonant, and interprets the sense of "Lead us not into temptation; " for this sense is, "But convey us away from the Evil One."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520Prayer.html'
source_title="On Prayer"
