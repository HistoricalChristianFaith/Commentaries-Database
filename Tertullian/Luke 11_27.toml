[[commentary]]
quote='''
Now, as Marcion was apprehensive that a belief of the fleshly body would also involve a belief of birth, undoubtedly He who seemed to be man was believed to be verily and indeed born. For a certain woman had exclaimed, "Blessed is the womb that bare Thee, and the paps which Thou hast sucked!" And how else could they have said that His mother and His brethren were standing without? But we shall see more of this in the proper place. Surely, when He also proclaimed Himself as the Son of man, He, without doubt, confessed that He had been born.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FThe%2520Five%2520Books%2520Against%2520Marcion%2FBook%25203.html"
source_title="Against Marcion Book III"

[[commentary]]
quote='''
Besides, how could His kingdom be still standing, with its boundaries, and laws, and functions, whom, even if the whole world were left entire to Him, Marcion's god could possibly seem to have overcome as "the stronger than He," if it were not in consequence of His law that even Marcionites were constantly dying, by returning in their dissolution to the ground, and were so often admonished by even a scorpion, that the Creator had by no means been overcome? "A (certain) mother of the company exclaims, `Blessed is the womb that bare Thee, and the paps which Thou hast sucked; 'but the Lord said, `Yea, rather, blessed are they that hear the word of God, and keep it.'" Now He had in precisely similar terms rejected His mother or His brethren, whilst preferring those who heard and obeyed God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FThe%2520Five%2520Books%2520Against%2520Marcion%2FBook%25204.html"
source_title="Against Marcion Book IV"

[[commentary]]
quote='''
But there is also another view of the case: in the abjured mother there is a figure of the synagogue, as well as of the Jews in the unbelieving brethren. In their person Israel remained outside, whilst the new disciples who kept close to Christ within, hearing and believing, represented the Church, which He called mother in a preferable sense and a worthier brotherhood, with the repudiation of the carnal relationship. It was in just the same sense, indeed, that He also replied to that exclamation (of a certain woman), not denying His mother's "womb and paps," but designating those as more "blessed who hear the word of God."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FOn%2520the%2520Flesh%2520of%2520Christ.html"
source_title="On the Flesh of Christ"
