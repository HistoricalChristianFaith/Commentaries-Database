[[commentary]]
quote='''
In hell the soul of a certain man is in torment, punished in flames, suffering excruciating thirst, and imploring from the finger of a happier soul, for his tongue, the solace of a drop of water. [Luke 16:23-24] Do you suppose that this end of the blessed poor man and the miserable rich man is only imaginary? Then why the name of Lazarus in this narrative, if the circumstance is not in (the category of) a real occurrence? But even if it is to be regarded as imaginary, it will still be a testimony to truth and reality.
'''
source_url='https://www.newadvent.org/fathers/0310.htm'
source_title="A Treatise on the Soul, Chapter 7"




[[commentary]]
quote='''
So far as the philosophers are concerned, we have said enough. As for our own teachers, indeed, our reference to them is ex abundanti-a surplusage of authority: in the Gospel itself they will be found to have the clearest evidence for the corporeal nature of the soul. In hell the soul of a certain man is in torment, punished in flames, suffering excruciating thirst, and imploring from the finger of a happier soul, for his tongue, the solace of a drop of water. Do you suppose that this end of the blessed poor man and the miserable rich man is only imaginary? Then why the name of Lazarus in this narrative, if the circumstance is not in (the category of) a real occurrence? But even if it is to be regarded as imaginary, it will still be a testimony to truth and reality. For unless the soul possessed corporeality, the image of a soul could not possibly contain a finger of a bodily substance; nor would the Scripture feign a statement about the limbs of a body, if these had no existence.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FA%2520Treatise%2520on%2520the%2520Soul.html"
source_title="A Treatise on the Soul"

[[commentary]]
quote='''
Thus it happens that the rich man in hell has a tongue and poor (Lazarus) a finger and Abraham a bosom. By these features also the souls of the martyrs under the altar are distinguished and known.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FA%2520Treatise%2520on%2520the%2520Soul.html"
source_title="A Treatise on the Soul"

[[commentary]]
quote='''
Our answer to this is, that the Scripture itself which dazzles his sight expressly distinguishes between Abraham's bosom, where the poor man dwells, and the infernal place of torment. "Hell" (I take it) means one thing, and "Abraham's bosom" another. "A great gulf" is said to separate those regions, and to hinder a passage from one to the other. Besides, the rich man could not have "lifted up his eyes," and from a distance too, except to a superior height, and from the said distance all up through the vast immensity of height and depth. It must therefore be evident to every man of intelligence who has ever heard of the Elysian fields, that there is some determinate place called Abraham's bosom, and that it is designed for the reception of the souls of Abraham's children, even from among the Gentiles (since he is "the father of many nations," which must be classed amongst his family), and of the same faith as that wherewithal he himself believed God, without the yoke of the law and the sign of circumcision. This region, therefore, I call Abraham's bosom. Although it is not in heaven, it is yet higher than hell, and is appointed to afford an interval of rest to the souls of the righteous, until the consummation of all things shall complete the resurrection of all men with the "full recompense of their reward."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Tertullian%2FThe%2520Five%2520Books%2520Against%2520Marcion%2FBook%25204.html"
source_title="Against Marcion Book IV"
