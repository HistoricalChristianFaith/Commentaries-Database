[[commentary]]
quote='''
The meaning of the saying is clear; the wise men of God are above the earth, not being of it; therefore, there was famine in it; for those who have their minds set on earthly things, famine often happens if they are deserving, and later on when they are worthy of this, it is given to them again. In this way, Abram went to Egypt to "sojourn," not to live there, coming to the rescue of those suffering from famine, not to dwell there; for even the companions of Daniel did not become corrupt in Babylon, but they were sent there to help those who had been carried away because of their sins. For God is patient with sinners as long as it is possible for them to repent. And just as doctors are sent where there is much harm or disease not to share in the disease themselves, but in order to heal those who are sick, so the saints went to Babylon and confusion, not being inhabitants of it; for they obtained nothing worthy of it, which is the characteristic of those who dwell there.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Didymus%2520the%2520Blind%2FOn%2520Genesis.html'
source_title="On Genesis"
