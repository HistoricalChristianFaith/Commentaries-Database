[[commentary]]
quote='''
Since, however, in the preceding [passage], the Paradise was understood by us as a divine dwelling place of blessed powers through an allegory, appropriately also things concerning man and woman must be understood. Therefore, we have the beginnings leading to the assimilation brought forth by the blessed Paul, who said, "This is a great mystery, but I speak concerning Christ and the church." Therefore, the church gives birth to children in labor pains, for the toil of virtue precedes and is accompanied by sorrow, accomplishing unchangeable repentance unto salvation. But she gives birth to them through the bath of regeneration.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Didymus%2520the%2520Blind%2FOn%2520Genesis.html'
source_title="On Genesis"
