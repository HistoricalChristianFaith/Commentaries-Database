[[commentary]]
quote='''
Because there is no ignorance in Him, Daniel makes this clear, saying about Him: "He who knows what is in the darkness, and light is with Him," (Dan. 2:22) and also: "Blessed is the knower of secrets, knowing all things before they happen." (Dan. 13:42) For if He has knowledge of secrets and things hidden in darkness and of all things that are to be done, of what could He still be ignorant? Therefore, this light has no communion with ignorance of intelligible things. Therefore it is written: "What communion has light with darkness?" (2 Cor. 6:14) If the heretics wish to say, in order to detract from the divinity, that the presence disagrees with what was said: "He made darkness His hiding place" (Ps. 18:12), this is God; and also: "Moses entered the cloud where the Lord was" (Ex. 24:18), let them know that in these passages, darkness signifies the obscurity of His incomprehensibility. For it is possible that this obscurity arises for us through our ignorance of the reasons, not in God, who is light. Attention must also be paid to the very words, because what is meant by saying that God is in darkness and in a cloud or gloom, and that He made darkness His hiding place, is signified by these words: "And in Him there is no darkness at all." (1 Jn. 1:5) Therefore, in Him there is no darkness, because it is not in His nature to have any; but He seems to us to be in darkness and gloom, since we do not have comprehension of Him, whose substance is known to exist.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Rabanus%2520Maurus%2FCommentary_on_the_Wisdom_Of_Solomon.html'
source_title="Commentary on the first epistle of John 2:4, PG 39"
