[[commentary]]
quote='''
He who honours the bishop shall be honoured by God, even as he that dishonours him shall be punished by God. For if he that rises up against kings is justly held worthy of punishment, inasmuch as he dissolves public order, of how much sorer punishment, suppose ye, shall he be thought worthy, who presumes to do anything without the bishop, thus both destroying the [Church's] unity, and throwing its order into confusion? For the priesthood is the very highest point of all good things among men, against which whosoever is mad enough to strive, dishonours not man, but God, and Christ Jesus, the First-born, and the only High Priest, by nature, of the Father.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Smyrnaeans.html"
source_title="Epistle of Ignatius to the Smyrnaeans"
