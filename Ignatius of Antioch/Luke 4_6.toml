[[commentary]]
quote='''
Yea, thou even darest, most accursed one, to appropriate the works of God to thyself, and to declare that the dominion over these was delivered to thee. And thou dost set forth thine own fall as an example to the Lord, and dost promise to give Him what is really His own, if He would fall down and worship thee. And how didst thou not shudder, O thou spirit more wicked through thy malevolence than all other wicked spirits, to utter such words against the Lord?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FPseudo-Ignatius%2FEpistle%2520to%2520the%2520Philippians.html"
source_title="Epistle of Pseudo-Ignatius to the Philippians"
time = 400
