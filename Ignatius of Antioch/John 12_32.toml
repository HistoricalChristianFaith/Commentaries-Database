[[commentary]]
quote='''
Nevertheless, I have heard of some who have passed on from this to you, having false doctrine, whom ye did not suffer to sow among you, but stopped your ears, that ye might not receive those things which were sown by them, as being stones of the temple of the Father, prepared for the building of God the Father, and drawn up on high by the instrument of Jesus Christ, which is the cross, making use of the Holy Spirit as a rope, while your faith was the means by which you ascended, and your love the way which led up to God.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Ephesians.html"
source_title="Epistle of Ignatius to the Ephesians"

[[commentary]]
quote='''
Now, He suffered all these things for us; and He suffered them really, and not in appearance only, even as also He truly rose again. But not, as some of the unbelievers, who are ashamed of the formation of man, and the cross, and death itself, affirm, that in appearance only, and not in truth, He took a body of the Virgin, and suffered only in appearance, forgetting, as they do, Him who said, "The Word was made flesh;" and again, "Destroy this temple, and in three days I will raise it up;" and once more, "If I be lifted up from the earth, I will draw all men unto Me." The Word therefore did dwell in flesh, for "Wisdom built herself an house." The Word raised up again His own temple on the third day, when it had been destroyed by the Jews fighting against Christ. The Word, when His flesh was lifted up, after the manner of the brazen serpent in the wilderness, drew all men to Himself for their eternal salvation.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Smyrnaeans.html"
source_title="Epistle of Ignatius to the Smyrnaeans"
