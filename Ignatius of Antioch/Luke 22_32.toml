[[commentary]]
quote='''
They are the offspring of that spirit who is the author of all evil, who led Adam, by means of his wife, to transgress the commandment, who slew Abel by the hands of Cain, who fought against Job, who was the accuser of Joshua the son of Josedech, who sought to "sift the faith" of the apostles, who stirred up the multitude of the Jews against the Lord, who also now "worketh in the children of disobedience;" from whom the Lord Jesus Christ will deliver us, who prayed that the faith of the apostles might not fail, not because He was not able of Himself to preserve it, but because He rejoiced in the pre-eminence of the Father.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Smyrnaeans.html"
source_title="Epistle of Ignatius to the Smyrnaeans"
