[[commentary]]
quote='''
For there is one flesh of the Lord Jesus Christ; and His blood which was shed for us is one; one loaf also is broken to all [the communicants], and one cup is distributed among them all: there is but one altar for the whole Church, and one bishop, with the presbytery and deacons, my fellow-servants. Since, also, there is but one unbegotten Being, God, even the Father; and one only-begotten Son, God, the Word and man; and one Comforter, the Spirit of truth; and also one preaching, and one faith, and one baptism; and one Church which the holy apostles established from one end of the earth to the other by the blood of Christ, and by their own sweat and toil; it behoves you also, therefore, as "a peculiar people, and a holy nation," to perform all things with harmony in Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Philadelphians.html"
source_title="Epistle of Ignatius to the Philadelphians"
