[[commentary]]
quote='''
...attain to a full assurance in Christ, who was begotten by the Father before all ages, but was afterwards born of the Virgin Mary without any intercourse with man. He also lived a holy life, and healed every kind of sickness and disease among the people, and wrought signs and wonders for the benefit of men; and to those who had fallen into the error of polytheism He made known the one and only true God, His Father, and underwent the passion, and endured the cross at the hands of the Christ-killing Jews, under Pontius Pilate the governor and Herod the king. He also died, and rose again, and ascended into the heavens to Him that sent Him, and is sat down at His right hand, and shall come at the end of the world, with His Father's glory, to judge the living and the dead, and to render to every one according to his works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Magnesians.html'
source_title="Epistle of Ignatius to the Magnesians"
