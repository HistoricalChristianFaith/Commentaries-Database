[[commentary]]
quote='''
Do not seek to avenge yourselves on those that injure you, for says [the Scripture], "If I have returned evil to those who returned evil to me." Let us make them brethren by our kindness. For say ye to those that hate you, Ye are our brethren, that the name of the Lord may be glorified. And let us imitate the Lord, "who, when He was reviled, reviled not again;" when He was crucified, He answered not; "when He suffered, He threatened not;" but prayed for His enemies, "Father, forgive them; they know not what they do." If any one, the more he is injured, displays the more patience, blessed is he. If any one is defrauded, if any one is despised, for the name of the Lord, he truly is the servant of Christ.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Ephesians.html"
source_title="Epistle of Ignatius to the Ephesians"
