[[commentary]]
quote='''
...ye come together man by man in common through grace, individually, in one faith, and in Jesus Christ, who was of the seed of David according to the flesh, being both the Son of man and the Son of God, so that ye obey the bishop and the presbytery with an undivided mind, breaking one and the same bread, which is the medicine of immortality, and the antidote to prevent us from dying, but [which causes] that we should live for ever in Jesus Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Ephesians.html'
source_title="Epistle of Ignatius to the Ephesians"
