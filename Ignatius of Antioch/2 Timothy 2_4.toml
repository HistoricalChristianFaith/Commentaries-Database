[[commentary]]
quote='''
Give attention to reading, that thou mayest not only thyself know the laws, but mayest also explain them to others, as the earnest servant of God. "No man that warreth entangleth himself with the affairs of this life, that he may please him who hath chosen him to be a soldier; and if a man also strive for masteries, yet is he not crowned except he strive lawfully." I that am in bonds pray that my soul may be in place of yours.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FPseudo-Ignatius%2FEpistle%2520to%2520Hero%252C%2520a%2520Deacon%2520of%2520Antioch.html"
source_title="Epistle of Pseudo-Ignatius to Hero, a Deacon of Antioch"
time = 400


[[commentary]]
quote='''
Give ye heed to the bishop, that God also may give heed to you. My soul be for theirs that are submissive to the bishop, to the presbyters, and to the deacons, and may my portion be along with them in God! Labour together with one another; strive in company together; run together; suffer together; sleep together; and awake together, as the stewards, and associates, and servants of God. Please ye Him under whom ye fight, and from whom ye receive your wages. Let none of you be found a deserter. Let your baptism endure as your arms; your faith as your helmet; your love as your spear; your patience as a complete panoply. Let your works be the charge assigned to you, that ye may receive a worthy recompense. Be long-suffering, therefore, with one another, in meekness, as God is towards you. May I have joy of you for ever!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520Polycarp.html'
source_title="Epistle of Ignatius to Polycarp"
