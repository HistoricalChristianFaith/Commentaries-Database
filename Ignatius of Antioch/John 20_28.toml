[[commentary]]
quote='''
And I know that He was possessed of a body not only in His being born and crucified, but I also know that He was so after His resurrection, and believe that He is so now. When, for instance, He came to those who were with Peter, He said to them, "Lay hold, handle Me, and see that I am not an incorporeal spirit." "For a spirit hath not flesh and bones, as ye see Me have." And He says to Thomas, "Reach hither thy finger into the print of the nails, and reach hither thy hand, and thrust it into My side;" and immediately they believed that He was Christ. Wherefore Thomas also says to Him, "My Lord, and my God." And on this account also did they despise death, for it were too little to say, indignities and stripes.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Smyrnaeans.html"
source_title="Epistle of Ignatius to the Smyrnaeans"
