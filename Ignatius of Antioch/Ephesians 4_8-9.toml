[[commentary]]
quote='''
If, therefore, those who were brought up in the ancient order of things have come to the possession of a new hope, no longer observing the Sabbath, but living in the observance of the Lord's Day, on which also our life has sprung up again by Him and by His death-whom some deny, by which mystery we have obtained faith, and therefore endure, that we may be found the disciples of Jesus Christ, our only Master-how shall we be able to live apart from Him, whose disciples the prophets themselves in the Spirit did wait for Him as their Teacher? And therefore He whom they rightly waited for, being come, raised them from the dead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Magnesians.html'
source_title="Epistle of Ignatius to the Magnesians"

[[commentary]]
quote='''
He really, and not merely in appearance, was crucified, and died, in the sight of beings in heaven, and on earth, and under the earth. By those in heaven I mean such as are possessed of incorporeal natures; by those on earth, the Jews and Romans, and such persons as were present at that time when the Lord was crucified; and by those under the earth, the multitude that arose along with the Lord. For says the Scripture, "Many bodies of the saints that slept arose," their graves being opened. He descended, indeed, into Hades alone, but He arose accompanied by a multitude; and rent asunder that means of separation which had existed from the beginning of the world, and cast down its partition-wall. He also rose again in three days, the Father raising Him up; and after spending forty days with the apostles, He was received up to the Father, and "sat down at His right hand, expecting till His enemies are placed under His feet."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Trallians.html"
source_title="Epistle of Ignatius to the Trallians"