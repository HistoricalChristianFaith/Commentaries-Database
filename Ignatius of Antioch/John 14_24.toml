[[commentary]]
quote='''
Nevertheless, I have heard of some who have passed in among you, holding the wicked doctrine of the strange and evil spirit; to whom ye did not allow entrance to sow their tares, but stopped your ears that ye might not receive that error which was proclaimed by them, as being persuaded that that spirit which deceives the people does not speak the things of Christ, but his own, for he is a lying spirit. But the Holy Spirit does not speak His own things, but those of Christ, and that not from himself, but from the Lord; even as the Lord also announced to us the things that He received from the Father. For, says He, "the word which ye hear is not Mine, but the Father's, who sent Me."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Ephesians.html"
source_title="Epistle of Ignatius to the Ephesians"
