[[commentary]]
quote='''
My love has been crucified, and there is no fire in me desiring to be fed; but there is within me a water that liveth and speaketh, saying to me inwardly, Come to the Father. I have no delight in corruptible food, nor in the pleasures of this life. I desire the bread of God, the heavenly bread, the bread of life, which is the flesh of Jesus Christ, the Son of God, who became afterwards of the seed of David and Abraham; and I desire the drink of God, namely His blood, which is incorruptible love and eternal life.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Ignatius%2520of%2520Antioch%2FEpistle%2520to%2520the%2520Romans.html"
source_title="Epistle of Ignatius to the Romans"
