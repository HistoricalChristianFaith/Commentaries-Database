[[commentary]]
quote='''
Then, as for the Gentiles who used to go after gods which were no gods, He Who was God went after them, and by His words, as by a bridle, turned them from many gods to the One. This is that Mighty One, Whose preaching became a bridle in the jaws of the Gentiles, and led them away from idols to Him that sent Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="HOMILY ON OUR LORD 5:1"
