[[commentary]]
quote='''
While he was asking who it was, they said to him, “Jesus, the Nazarene.” He knew that they were not saying that to him with love. He left what pertained to enemies and grasped hold of what pertained to friends. “Son of David, have mercy on me.”
'''
source_url=''
source_title="COMMENTARY ON TATIAN’S DIATESSARON 15.22"
