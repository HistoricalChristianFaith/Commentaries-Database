[[commentary]]
quote='''
Saul, Saul, why persecutest thou me? He who had conquered His persecutors in the world below, and ruled over the angels in the world above, spoke from above with humble voice. And He Who while He was upon earth had denounced ten woes against His crucifiers, when He was in heaven, did not denounce even one woe against Saul, His persecutor. Now, our Lord denounced woe to His crucifiers, that He might teach His disciples not to be dismayed by His murderers. But our Lord spoke in humility from heaven, that in humility the heads of His church might speak.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord, 26"
