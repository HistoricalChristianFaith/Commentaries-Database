[[commentary]]
quote='''
Now our Lord bestowed great gifts through small means; that He might teach us of what they are deprived who have scorned great things. For if from the hem of His garment, healing like this was secretly stolen, could He not assuredly heal when His word distinctly granted healing? And if defiled lips were sanctified by kissing His feet, how much more should not pure lips be sanctified by kissing His mouth? For the sinful woman by her kisses received the grace of His sacred feet, which had come with toil to bring her remission of her sins. She was refreshing the feet of her Healer with oil freely, for freely had He brought her the treasure of healing for her sickness. For it was not for the sake of his stomach that He Who satisfies the hungry was a guest; but for the sake of the sinful woman's repentance He Who justifies sinners made Himself a guest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord, 14"
