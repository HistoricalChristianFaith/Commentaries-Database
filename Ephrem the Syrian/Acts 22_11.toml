[[commentary]]
quote='''
But our Lord spoke in humility from heaven, that in humility the heads of His church might speak. And if any one should say, "Wherein did our Lord speak humbly with Paul? for lo! the eyes of Paul were grievously smitten;" let him know that it was not from our merciful Lord that this chastisement proceeded, who spoke those words in humility; but from the vehement light that vehemently shone forth there. And this light did not strike Paul by way of retribution on account of his deeds, but on account of the vehemence of its rays it hurt him, as he also said: When I arose, I could discern nothing for the glory of the light. But if that light was glorious, O Paul, how did the glorious light become a blinding light to thee thyself? The light was that which, according to its nature, illuminates above, but contrary to its nature, it shone forth below. When it illumined above, it was delightful; but when it shone forth below, it was blinding. For the light was both grievous and pleasant. It was grievous and violent towards the eyes of the flesh; and it was pleasant and lightful to those who are fire and spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord, 26"
