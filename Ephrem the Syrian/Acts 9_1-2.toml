[[commentary]]
quote='''
But again for another reason the meek voice accompanied the overpowering light; namely, that as it were from meekness unto exaltation our Lord might produce help for the persecutor; in like manner as also all His helps were produced, from lowliness unto greatness. For our Lord's meekness continued from the womb to the tomb. And observe that greatness comes close upon His lowliness, and exaltation on His meekness. For whereas His greatness was observed in divers things, His Divinity was revealed by glorious signs; that it might be known that the One Who stood amongst them, was not one but two. For His nature is not humble nature alone, nor is it an exalted nature alone; but there are two natures that are mingled, the one with the other; the exalted and the humble.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord, 33"
