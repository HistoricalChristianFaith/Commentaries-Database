[[commentary]]
quote='''
Put sorrow far from thy flesh, and sadness from thy thoughts; save only that for thy sins thou shouldst be constant in sadness. Cease not from labour, not even though thou be rich, for the slothful man gains manifold guilt by his idleness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Admonition%2520and%2520Repentance.html'
source_title="Homily - On Admonition and Repentance"
