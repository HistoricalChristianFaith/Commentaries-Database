[[commentary]]
quote='''
Therefore the praise of the physician is the healing of the diseased;—that the shame of the Pharisee who reproved the praise of our physician may be greater. But our Lord used to show signs in the streets; and also when He entered into the house of the Pharisee, He showed signs which were greater than those He had shown outside. For in the street He made whole the bodies that were sick, but within He healed the souls that were diseased. Outside, He raised to life the mortality of Lazarus: but within, He raised to life the mortality of the sinful woman. He restored the living soul to the corpse from which it had gone out; And He expelled from the sinful woman the deadly sin which dwelt within her. But the blind [Pharisee] who was insufficient for great things, because of the great things which he saw not, belied those small things which he had seen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord, 41"
