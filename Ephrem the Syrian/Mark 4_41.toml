[[commentary]]
quote='''
So likewise the ship that carried our Lord; it was He that bare it, in that He stayed from it the wind that would have sunk it. Peace, for thou art shut up. While He was on the sea, His arm reached even to the fountain of the wind, to shut it up. The ship bare His manhood, but the power of His Godhead bare the ship and all that was therein. But that He might show that even His manhood needed not the ship, instead of the planks which a shipwright puts together and fastens, He like the Architect of creation, made the waters solid and joined them together and laid them under His feet. So the Lord strengthened the hands of Simeon the Priest, that his arms might bear up in the Temple the strength that was bearing-up all; as He strengthened the feet of Simeon the Apostle, that they might bear themselves up on the water. And so that name which bore the first-begotten in the Temple was afterwards borne up by the first-begotten in the sea; that He might show that as in the sea the drowning was borne up by Him, He did not need to be borne by Simeon on the dry ground. But our Lord bare Simeon up openly in the midst of the sea to teach that also on the dry land He supported him secretly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord, 50"
