[[commentary]]
quote='''
For he who by the outward eyes was not able to see the Lord in His signs, he when those bodily eyes were closed, saw with those within. And because he had received the proof in his own person, he wrote to those who had their bodily eyes full of light—May He illumine the eyes of your hearts. Therefore the signs manifested to the external eyes of the Jews, profited them not at all; but faith of the heart opened the eyes of the heart of the Gentiles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord"
