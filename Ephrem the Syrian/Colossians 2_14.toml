[[commentary]]
quote='''
At the Birth of the Son the king was enrolling all men for the tribute-money, that they might be debtors to Him: the King came forth to us Who blotted out our bills, and wrote another bill in His own Name that He might be our debtor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FNineteen%2520Hymns%2520on%2520the%2520Nativity%2520of%2520Christ%2520in%2520the%2520Flesh%2FHymn%25204.html'
source_title="Nineteen Hymns on the Nativity of Christ in the Flesh, Hymn 4"
