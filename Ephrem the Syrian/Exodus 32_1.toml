[[commentary]]
quote='''
For he was of the sons of Israel, whom terrible signs accompanied up to the sea, that they might fear; and blessed miracles surrounded in the waste desert, that they might be reconciled; but through lack of faith, for a slight cause, they rejected them, saying: As for this Moses who brought us up, we know not what has become of him. For they ceased to regard the mighty works that had been surrounding them. They perceived that Moses was not near them; so that for this cause that had come near, they drew near to the heathenism of Egypt. For Moses was for a little removed from before them, that the calf that was before them might appear, that they might worship it openly also; for they had been secretly worshipping it in their hearts. But when their heathenism from being inward became open, then Moses also from being hidden openly appeared; that he might openly punish those whose heathenism had revelled beneath the holy cloud which had overshadowed them. But God removed the Shepherd of the flock from it for forty days, that the flock might show that its trust was fixed upon the calf. While God was feeding the flock with all delights, it chose for itself as its Shepherd the calf, which was not able even to eat. Moses who kept them in awe was removed from them, that the idolatry might cry aloud in their mouths, which the restraint of Moses had kept down in their hearts. For they cried: Make us gods, to go before us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord"
