[[commentary]]
quote='''
Accordingly, our Lord placed a word of conciliation at the beginning of His speech, that by conciliation He might pacify the Pharisee, into whose mind discord and division had entered. He was the physician who ranged His cures against the things hurtful [to men]. Our Lord then shot forth this word as an arrow, and set in the head of it conciliation as the barb. And He anointed it with love, that soothes the members; so that when it flew into him who was full of discord, he was at once changed from discord to harmony. For straightway upon hearing that humble voice of our Lord, saying,—Simon, I have somewhat to say unto thee, that secret despiser returned his answer, Say on, Lord. For the sweet voice entered his bitter mind, and begot of it pleasant fruit. For he who before this voice was one that secretly despised, after this voice became one that openly honoured. For humility, by its sweet utterance, subdues even its adversaries into rendering it honour. For it is not over its friends that humility tests its power, but over its enemies it exhibits its victories.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord, 24"


[[commentary]]
quote='''
She, through her love, brought into the open the tears that were hidden in the depths of her eyes, and the Lord, because of her courage, brought into the open the thoughts that were hidden in the Pharisee.… Our Lord, standing in the middle, worked out a parable between the two of them, so that the sinful woman might be encouraged through his pronouncing the parable and the Pharisee may be denounced through the explanation of the parable.
'''
source_url=''
source_title="COMMENTARY ON TATIAN'S DIATESSARON 7.18"
