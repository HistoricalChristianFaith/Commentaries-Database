[[commentary]]
quote='''
But our Lord bestowed the most part of His helps rather by persuasion than by reproof. For the gentle shower softens the earth and penetrates all through it: but violent rain binds and hardens the face of the earth, so that it does not receive it. For a harsh word excites wrath, and with it are bound up wrongs. And when a harsh word has opened the door, wrath enters in, and at the heels of wrath, along with it enter in wrongs.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="HOMILY ON OUR LORD 22:3"
