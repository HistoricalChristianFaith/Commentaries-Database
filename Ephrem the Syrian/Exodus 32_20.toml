[[commentary]]
quote='''
For Moses ground to powder the calf and caused them to drink it in the water of ordeal; that by drinking of the calf all those who were living for its worship might die. For the sons of Levi ran upon them, those who ran to help Moses and girded on their swords. For the sons of Levi did not know whom they should slay, because those that worshipped were mingled with those that worshipped not. But He, for Whom it was easy to distinguish, distinguished those who were defiled from those who were not defiled; so that the innocent might give thanks that their innocence had not passed unseen by the Just One; and the guilty might be convicted that their offence had not escaped the eye of the Judge. But the sons of Levi were the open avengers. Accordingly Moses set a mark upon the offenders, that it might be easy for the avengers to avenge. For the draught of the calf entered those in whom the love of the calf was dwelling, and displayed in them a manifest sign, that the drawn sword might rush upon them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Ephrem%2520the%2520Syrian%2FHomily%2520-%2520On%2520Our%2520Lord.html'
source_title="Homily - On Our Lord"
