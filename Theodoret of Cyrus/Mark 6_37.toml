[[commentary]]
quote='''
This incarnation was effected, not in seeming and unreality, but in reality. He did not only pass through the Virgin, as through a channel, but was verily made flesh of her. Like us He really ate, and of the Virgin was really suckled. For if the incarnation was an unreality, then our salvation is a delusion. The Christ was twofold—the visible man, the invisible God. He ate as man, verily like ourselves, for the flesh that He wore was of like passions with us; He fed the five thousand with five loaves as God. As man He really died. As God He raised the dead on the fourth day. As man He slept in the boat. As God He walked upon the waters.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theodoret%2520of%2520Cyrus%2FDialogues%2FDialogue%25202.html'
source_title="DIALOGUES 2"
