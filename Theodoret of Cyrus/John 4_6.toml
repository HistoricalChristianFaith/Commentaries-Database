[[commentary]]
quote='''
Of the divine nature the prophet Isaiah said, "He shall neither be hungry nor weary" and so on. But the Evangelist says "Jesus being weary with his journey sat thus on the well;" and "shall not be weary" is contrary to "being weary." Therefore the prophecy is contrary to the narrative of the gospels. But they are not contrary, for both are of one God. Not being weary is of the uncircumscribed nature which fills all things. But moving from place to place is of the circumscribed nature; and when that which moves is constrained to travel it is subject to the weariness of the wayfarer. Therefore what walked and was weary was a body, for the union did not confound the natures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Theodoret%2520of%2520Cyrus%2FDemonstrations%2520by%2520Syllogisms.html'
source_title="DIALOGUES, EPILOGUE 1.7"
