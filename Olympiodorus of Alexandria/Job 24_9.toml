[[commentary]]
quote='''
"They have snatched the fatherless from the breast." They have lamentably and mercilessly taken away the child who still nursed and hanged from his mother's breast. "And they have deprived the outcast," that is, they have also deprived the outcast of his properties by taking away what he had.
'''
source_url=''
source_title="COMMENTARY ON JOB 24:9-12"
