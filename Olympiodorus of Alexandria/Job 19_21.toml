[[commentary]]
quote='''
"Pity me, pity me, O friends, for it is the hand of the Lord that has touched me." "You are not ashamed before the one who says righteous words. As benevolent persons, you have compassion upon me and take pity by considering also the respect due to what has been inflicted on me by God. You will not be tested by God through the same calamities."
'''
source_url=''
source_title="COMMENTARY ON JOB 19:20-22"
