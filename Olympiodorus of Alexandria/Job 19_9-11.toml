[[commentary]]
quote='''
He says that his crown was taken away from him, that is, he also was a king before, or … "He tore me off," he says, "and like a tree he cut away all my hopes from the roots. Like an enemy who is inflamed with anger, he destroyed all my prosperity." Job correctly says "like an enemy," because God does not inflict torments with an angry or hostile mind. He says these things in order to persuade his friends and himself that his punishment exceeds the limits of human crimes. Indeed, that righteous man was suffering not because of his crimes but in order that his patience might be tested.
'''
source_url=''
source_title="COMMENTARY ON JOB 19:8-11"
