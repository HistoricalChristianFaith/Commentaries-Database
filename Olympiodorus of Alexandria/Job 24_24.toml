[[commentary]]
quote='''
"For his exaltation has hurt many." For this reason, "let him perish," because his exaltation has hurt many. "But he has withered as mallows in the heat or as an ear of corn falling off of itself from the stalk." Other examples [from the Greek Bible] read "like grass." In a similar way, the psalmist also says, "Quick as the grass they wither, fading like the green in the field." And he rightly says, "falling off of itself," indeed, for everybody sin itself becomes a punisher.
'''
source_url=''
source_title="COMMENTARY ON JOB 24:22-24"
