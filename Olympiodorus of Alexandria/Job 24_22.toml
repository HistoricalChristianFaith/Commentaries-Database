[[commentary]]
quote='''
"Therefore when he has risen, he will not feel secure of his own life." For these reasons the impious, after rising every day not really believing that he will live, remains in fear and is frightened. As the wise Solomon stated, "Fear, indeed, is nothing other than the abandonment of the supports offered by reason."
'''
source_url=''
source_title="COMMENTARY ON JOB 24:22-24"
