[[commentary]]
quote='''
"They have unjustly laid ambush in narrow places." They have laid ambush in hidden places; in fact, in larger places and roads they wait in ambush for those who have no chance to escape. "And they," that is, all the impious persons, "have not known the righteous way." "They have been cast forth from their cities and their houses." This refers to those who wantonly sleep without clothing. They [the fatherless] have, in fact, suffered these things from these criminals, after being driven out of their city and their houses.
'''
source_url=''
source_title="COMMENTARY ON JOB 24:9-12"
