[[commentary]]
quote='''
But is it not absurd to say that these members will exist after the resurrection from the dead, since the Saviour said, "They neither marry, nor are given in marriage, but shall be as the angels in heaven?" And the angels, say they, have neither flesh, nor do they eat, nor have sexual intercourse; therefore there shall be no resurrection of the flesh. ... Now it is indeed evident that the members which discharge functions discharge those functions which in the present life we see; but it does not follow that they necessarily discharge the same functions from the beginning. ... And our Lord Jesus Christ was born of a virgin, for no other reason than that He might destroy the begetting by lawless desire, and might show to the ruler that the formation of man was possible to God without human intervention. And when He had been born, and had submitted to the other conditions of the flesh,-I mean food, drink, and clothing,-this one condition only of discharging the sexual function He did not submit to; for, regarding the desires of the flesh, He accepted some as necessary, while others, which were unnecessary, He did not submit to. For if the flesh were deprived of food, drink, and clothing, it would be destroyed; but being deprived of lawless desire, it suffers no harm. And at the same time He foretold that, in the future world, sexual intercourse should be done away with; as He says, "The children of this world marry, and are given in marriage; but the children of the world to come neither marry nor are given in marriage, but shall be like the angels in heaven." Let not, then, those that be unbelieving marvel, if in the world to come He do away with those acts of our fleshly members which even in this present life are abolished.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Justin%2520Martyr%2FOn%2520the%2520Resurrection%2520-%2520Fragments.html"
source_title="On the Resurrection - Fragments, Chapters II-III"
