[[commentary]]
quote='''
The crowd is not of a single mentality, for each person has a different frame of mind. He therefore speaks to them in many parables so they may receive different teachings depending on their frame of mind. Further, it should be noted that he did not speak everything to them in parables, but many things. For if he spoke everything to them in parables, the people would go away without gaining anything. Jesus mixes what is clear with what is obscure, so that through the things they understand they may be drawn toward the knowledge of the things they do not understand.
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 2.13.3"

[[commentary]]
quote='''
He was indoors, staying at the house, where he spoke to the disciples about that which is holy. He who sows the word of God then went out of his house that he might sow among the crowds. This means that the sower who sows is the Son of God the Father, sowing the word among the ordinary people. Note too that this is the first parable that was given with an interpretation. Furthermore, whenever the Lord speaks to his disciples and answers their questions indoors, he sows words that give us to understand nothing more or less or other than what he has accurately explained.
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 2.13.3"


[[commentary]]
quote='''
(Verse 3.) And he spoke many things to them in parables, saying: The crowd is not of one mind, but of various desires in each person. Therefore, he speaks to them in many parables, so that they may receive different teachings according to their various desires. And it should be noted that he did not speak all things to them in parables, but many. For if he had said everything in parables, the people would have left without benefit. He mixes the clear with the obscure, so that through what they understand, they may be provoked to understand those things which they do not understand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
And it is to be noted, that He spake not all things to them in parables, but many things, for had He spoken all things in parables, the people would have departed without benefit. He mingles things plain with things dark, that by those things which they understand they may be incited to get knowledge of the things they understand not. The multitude also is not of one opinion, but of divers wills in divers matters, whence He speaks to them in many parables, that each according to their several dispositions may receive some portion of His teaching.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
By this sower is typified the Son of God, who sows among the people the word of the Father.

Or, He was within while He was yet in the house, and spake sacraments to His disciples. He went therefore forth from the house, that He might sow seed among the multitudes.

Note that this is the first parable that has been given with its interpretation, and we must beware where the Lord expounds His own teachings, that we do not presume to understand any thing either more or less, or any way otherwise than as so expounded by Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
