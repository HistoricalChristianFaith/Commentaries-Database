[[commentary]]
quote='''
For he has strengthened the bars of your gates. Is it, then, of this Jerusalem that he speaks? Of this Zion? Praise your God. Why? For he has strengthened the bars of your gates. There are no gates: and how, then, are the bars kept safe? He has blessed your children within you. How has he blessed, he who said, Your house shall be left to you desolate? For he has strengthened the bars of your gates. The Lord loves the gates of Zion above all the tabernacles of Jacob. We said the gates of Zion are the prophets. Since, then, we know the gates of Zion are called the prophets, let us see what the bars of the gates are. For truly the prophets are the gates of the Church: we cannot enter the Church except through the prophets. Manichaeus wanted to enter without the gates, and did not enter. Marcion does not receive the Old Testament, and without the gates of the Old Testament he could not enter into the Gospel. We, then, receive the gates, the prophets, and through the gates we enter. But let us see what the bars of the gates are. Many robbers, many thieves long to enter through the gates. All who came before me were thieves and robbers. Oh, if only the Lord would grant to me too that I might be a bar of the gates of Zion! If any of the heretics wished to enter through them into the arrangement of the Gospel, I would stand in the gates, and I would keep him out. For he has strengthened the bars of your gates. He has strengthened them. Give me some churchman learned in the heavenly Scriptures: let Eunomius come, let Arius come, wanting to take away something from the prophets against us — does he not stand like a bar, does he not conquer like a bar? For he has strengthened the bars of your gates. Beautifully he said, he has strengthened: so that when you see a churchman disputing, you should not think that it is he who disputes, but he who strengthens the churchman. He has blessed your children within you. As many as received him, he gave them power to become children of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_057.html'
source_title="Homily 57, on Psalm 147"
