[[commentary]]
quote='''
Blessed is he who shall take hold of and dash your little ones against the rock. The "little ones" are said to be thoughts. For example: I have seen a woman, I have desired her: at once, if I do not cut off that desire, and, as it were, take it by the foot and dash it against the rock while the desire is small, it cannot afterwards be cut off when it has grown. Blessed, then, is he who cuts it off at once, and dashes it against the rock. And the Rock is Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_048.html'
source_title="Homily 48, on Psalm 136"
