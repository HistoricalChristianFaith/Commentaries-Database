[[commentary]]
quote='''
All these things, indeed, we have said concerning the mercy of the Lord, since He came for this purpose, to save the human race. Nevertheless we ought to know that He Himself is to judge the living and the dead, He Himself will come to judge. Righteousness shall walk before Him. Do not be negligent: Righteousness shall walk before Him. And He shall set His steps in the way. See what it says, His steps: where there are no stones, where there are no thorns and thistles, where the way is level, where He can walk, where He cannot stumble. Let us, then, also make a way for the Lord in our heart: the way over which John labored, and cried out in the wilderness, that we should make a way for the Lord. Therefore now too this is said. And He shall set His steps in the way. Where He finds a way, He will walk. Although before we had thorns and thistles, although stones, it is said to us in Isaiah: "And cast the stones out of the way." And He says this for the reason, that when He wishes to walk about in our way, He may not stub His foot. The stones which are in the way, and are commanded to be cast out, are our sins. Christ does not walk in our heart, if there be any sin: at once He stumbles against the stones. And He shall set His steps in the way. Let us make a way, and Jesus will set His steps in the way.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_017.html'
source_title="Homily 17, on Psalm 84"


[[commentary]]
quote='''
There are many things which might be said, but the hour compels the sermon to reach its end. Let us together pray to the Lord, that both my speech and your hearing may be turned into work. "For not the hearers only are just before God, but the doers." For he who speaks or hears, and does not do, either listens or speaks unto his own condemnation. For what does he say in the gospel? "If you were blind, you would not have sin." Let us turn that around in another way: If you were deaf, and did not hear, you would not have sin. But because both to speak and to hear without work are each of them sin, let us ask the Lord to set his steps upon the way — that is, that he may accompany us in the perils of this life, and, walking in our heart without the offense of our sin, may delight to dwell in us always. To whom is glory unto the ages of ages. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_064.html'
source_title="Homily 64, on Psalm 84 (Alternate Series)"
