[[commentary]]
quote='''
It follows: "A Redeemer will come to Zion, and to those who turn from wickedness in Jacob," says the Lord. For this reason, the Seventy translated it: "A Deliverer will come from Zion, and will turn away wickedness from Jacob." Therefore, if He will come from Zion to turn away wickedness from Jacob, we understand that a man will be born in Zion, and the Most High will establish it, He who turns away the crimes of Jacob. But if the Redeemer of Zion shall come and those who return from iniquity in Jacob, says the Lord, this is the meaning: Christ will come who will redeem Zion with his blood. Or according to Hebrew custom, who is near to Zion and born of the lineage of Israel, for this is what Goel (i.e., άγκιστεὺς) means. And lest we think that all of Zion is redeemed and delivered from the bloody sins of the Lord, he significantly adds: those who return from iniquity, if they are willing to repent, in whom the Lord's prayer is fulfilled: Father, forgive them, for they do not know what they are doing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
