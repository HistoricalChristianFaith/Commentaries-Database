[[commentary]]
quote='''
Sing to God, sing a psalm to his name. "Sing" — in Scripture this always signifies contemplation (theoria): that is, consider the mysteries and the meaning of divine Scripture. But "to make melody" (psallere) Scripture signifies as a good work: for example, that the hearing should furnish its own work, and likewise the mouth, and the eyes, and the hands, and all the members should as it were agree, and thus strike the psaltery in the virtues. Make a way for him who ascends above the sunset: the Lord is his name. If the sun of iniquity does not set for us, the sun of righteousness cannot rise for us, whose healing is in his wings.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
