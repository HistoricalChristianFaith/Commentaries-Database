[[commentary]]
quote='''
(Verses 8, 9) And they had four wings, and their wings were joined one to another. They did not turn back when they walked, but each one moved forward before its face. The Gospels are joined to each other and cling together, and they fly to and fro throughout the whole world, running here and there, without end to their flight, never surpassing or receding, but always proceeding to further things. And both Paul and Virgil say: Forgetting the things that are past, and reaching forth towards those things that are still to come.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
