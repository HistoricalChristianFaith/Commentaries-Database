[[commentary]]
quote='''
They shall still be multiplied in a plentiful old age. Happy is he who grows daily, who grows old in age, and grows old also in virtues.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_021.html'
source_title="Homily 21, on Psalm 91"
