[[commentary]]
quote='''
The earth has given its fruit. First it gave a flower. He says in the Song of Songs: "I am the flower of the field and the lily of the valleys." This flower, then, has been made fruit, that we might eat him, that we might feed on his flesh. Do you wish to know what this fruit is? A virgin from a virgin, the Lord from a handmaid, God from man, a son from a mother, fruit from the earth. See what this fruit himself says. "Unless a grain of wheat falls into the earth and dies, it cannot bear much fruit." The earth has given its fruit, it has given the grain of wheat: which grain of wheat fell into the earth and died, and therefore brings forth much fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_006.html'
source_title="HOMILIES ON THE PSALMS 6 (PSALM 66)"

[[commentary]]
quote='''
[Christ] himself says in the Song of Songs, "I am the rose of Sharon, and the lily of the valley." Our rose is the destruction of death, and [that rose] died that death itself might die in his dying.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_075.html'
source_title="LETTER 75.1"
