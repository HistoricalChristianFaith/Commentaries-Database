[[commentary]]
quote='''
(Verse 69.) But Peter was sitting outside in the courtyard. He was sitting outside to see the outcome. And he did not come near Jesus, so that no suspicion would arise among the servants.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
Peter sat without, that he might see the event, and not excite suspicion by any approach to Jesus.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"
