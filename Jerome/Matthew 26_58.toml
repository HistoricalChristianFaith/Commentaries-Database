[[commentary]]
quote='''
And entering inside, he sat with the ministers, to see the end.... Whether out of love for his disciples or out of human curiosity, the high priest wanted to know what he would decide about the Lord: whether he would condemn him to death or release him after beating him. And there was a difference of opinion among the ten apostles and Peter. Those (people) flee, but this one, although far away, still follows the Savior.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"


[[commentary]]
quote='''
(Verse 58.) But Peter followed Him from afar off, even unto the palace of the high priest. He followed Him from afar off, who was to deny the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"


[[commentary]]
quote='''
He went in, either out of the attachment of a disciple, or natural curiosity, seeking to know what sentence the High Priest would pass, whether death, or scourging.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"
