[[commentary]]
quote='''
As the thickness of the earth. Everything thick is near to the earth: and the soul that sins clings to the earth. For the Lord from the beginning made all things thin. By his own fault, therefore, each one is made thick, and is drawn down to the earth. Let us give an example. As a wound in the body, swelling, is thick, and is full of pus, when the physician comes he cuts it, and heals it and makes it thin, then it is brought back to its own nature, as it was also created. Therefore he says: As the thickness of the earth has been broken up over the earth.

And the Savior — Our bones are scattered beside hell — in the twenty-first psalm says: 'All my bones are scattered.' If we understand according to the letter, it does not stand: since he was only crucified. When you see Arius, Eunomius outside the Church, understand the bones of the Lord to be scattered beside hell. The bone, which is strong: those very greater ones, who seem to be something through their much talking and philosophy and contention, are led astray by the heretics.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_051.html'
source_title="Homily 51, on Psalm 140"
