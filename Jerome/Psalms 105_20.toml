[[commentary]]
quote='''
The king sent, and loosed him. According to the letter, Pharaoh sent, and loosed him. In another sense: if anyone is tempted by lust, unless the Lord appears and looses him, he cannot escape sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_031.html'
source_title="Homily 31, on Psalm 104"
