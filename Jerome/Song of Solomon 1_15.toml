[[commentary]]
quote='''
So that it may be that which is said in the Song of Songs: "You are wholly beautiful, my love, and there is no spot in you." And again: "Behold, you are fair, my near one, behold, you are fair, your eyes are doves." You who are fair and strong, when you have become like him of whom it is sung, "In your beauty and your comeliness," you will hear from the Bridegroom: "Forget your people and your father's house, and the King will desire your beauty."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15 (Alternate Series)"
