[[commentary]]
quote='''
And there are four tables made of square stones, and these themselves are for sacrifice and burnt offering (also called holocausts). These are living stones that are rolled upon the earth, and they have with them a corner stone, by which the walls of the old and new Covenant are held together. Now the number four signifies the Gospel sacraments, having in length and width one and a half cubits, that is, a square, which, when joined together, make three cubits, which three cubits have one cubit in height, so that the mysteries of the Trinity may preserve the measure of one cubit, that is, the divine majesty, as the Lord tells the disciples: Go, baptize all nations in the name of the Father, and of the Son, and of the Holy Spirit (Matthew 28:19)... Above these, however, are four tables of holocausts built with living stones, the length, width, and height of which have been described; vessels are placed in them in which the holocaust of the martyrs is offered, of whom it is said: Precious in the sight of the Lord is the death of his saints (Ps. 116:15)... I believe that the meaning of these tables is contained in the books of Matthew, Luke, Mark, and John, which are about the apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
