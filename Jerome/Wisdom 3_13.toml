[[commentary]]
quote='''
The Prophet prays to the Lord and says: "Give them, O Lord." And he himself answers: "What will you give them?" and immediately adds: "Give them a barren womb, and dry breasts," so that they would have no reason for pride and may be confounded in that which they used to glory. It is clear that even teachers with contrary doctrines can be understood, who boast in the multitude of people and in those children whom they have raised to destruction, that they might lead them out of the Church and into the midst of the slayer. For as many children as heretics have produced in error, the devil has killed. Of such a soul it is said: "Blessed is the chaste woman, who has not known the bed of sin." For the Ecclesiastic man is blessed, who in comparison with a heretic, does not beget children in error. And in another place we read, "It is better to not have children with virtue. For from an unlawful union, offspring will perish": and when they have been long gone, they will be considered as nothing and ignoble in their final old age. For the fecund multitude of the impious is unto nothing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Hosea.html'
source_title="Commentary on Hosea 9:14"
