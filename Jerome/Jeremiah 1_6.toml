[[commentary]]
quote='''
But what is sanctified in the womb, we should understand according to the words of the Apostle: But when it pleased him, who separated me from my mother's womb, and called me by his grace, to reveal his Son in me; that I might preach him among the Gentiles (Galatians 1:15). John the Baptist is also sanctified in the womb, and receives the Holy Spirit, and is stirred in the womb, and speaks through the mouth of his mother (Luke 1).

(Verse 6.) And I said: Ah, ah, ah, Lord God, behold, I do not know how to speak, for I am a child. LXX: And I said, O Lord God, I do not know how to speak, for I am young. He detests the office that he cannot sustain due to his age, with the same modesty that Moses himself says he has a thin and weak voice (Exodus IV and 6). But he, as if he were seized with great and robust age, is caught up; forgiveness is given to this childhood, which is adorned with modesty and shame.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Jeremiah.html'
source_title="Commentary on Jeremiah"
