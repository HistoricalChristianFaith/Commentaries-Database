[[commentary]]
quote='''
(Verse 34) Do not think that I have come to bring peace on earth: I have not come to bring peace, but a sword. Above, he had said: What I tell you in the dark, say in the light; and what you hear in your ear, preach on the housetops. Now he explains what follows after preaching. By the faith of Christ, the whole world is divided against itself: every household had both unbelievers and believers, and therefore a good war was sent, so that a bad peace would be broken. It is written that in Genesis God did a certain thing against the rebellious men who had been moved from the East and were hastening to build a tower (Gen. XI) through which they might penetrate the heights of heaven, in order to divide their languages. Therefore, in the psalm, David prays: Disperse, O Lord, the nations who desire war (Ps. LXVII, 32).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
He had before said, What I say to you in darkness, that speak ye in the light; He now tells them what will follow upon that preaching, saying, Think not that I am come to send peace upon earth; I am not come to send peace, but a sword.

For in the matter of belief in Christ, the whole world was divided against itself; each house had its believers and its unbelievers; and therefore was this holy war sent, that an unholy peace might be broken through.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
