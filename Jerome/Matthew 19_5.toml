[[commentary]]
quote='''
In like manner He says his wife, and not wives, and adds expressly, and they twain shall be one flesh. For it is the reward of marriage that one flesh, namely in the offspring, is made of two.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"
