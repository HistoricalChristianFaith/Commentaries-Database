[[commentary]]
quote='''
And just as he had said to the people, "Do not let Hezekiah deceive you," he speaks the same blasphemy to the king, saying, "Do not let your God deceive you." And he gives examples from the past, how their gods were unable to deliver other lands from their hands, and therefore Jerusalem will not be able to be delivered either.… We pass over what is clear, so that we may dwell on uncertainties. Herodotus relates that Sennacherib, the king of the Assyrians, fought against the Egyptians and besieged Pelusium. And when the mounds for capturing the city had been built, Taracham, the king of the Ethiopians, came to their aid, and in one night, near Jerusalem, 185,000 of the Assyrian army perished from plague. This is reported by Herodotus and most fully by Berosus, a writer of Chaldean history, whose credibility must be sought from his own books.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
