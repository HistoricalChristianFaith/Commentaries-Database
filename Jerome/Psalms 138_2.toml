[[commentary]]
quote='''
I will worship toward your holy temple. If this is the temple which now is seen to be deserted, in which one ought to worship: then the Jews ought not to worship, since the temple has been overthrown. But by "temple" he means the holy and heavenly Jerusalem.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_049.html'
source_title="Homily 49, on Psalm 137"


[[commentary]]
quote='''
Upon your mercy and your truth. Let the sinner hear "mercy," but let the just and proud man hear "truth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_049.html'
source_title="Homily 49, on Psalm 137"
