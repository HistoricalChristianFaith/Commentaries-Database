[[commentary]]
quote='''
Your animals dwell in it; that is, in the inheritance. But by "animals" he meant those who live in God, that is, the holy ones. You have prepared in your sweetness for the poor man, O God. "Blessed are the poor in spirit." You have prepared the rain, that is, the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
