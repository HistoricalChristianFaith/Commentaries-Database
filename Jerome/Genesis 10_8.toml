[[commentary]]
quote='''
(Verse 8) And Cush begot Nimrod. He began to be powerful in the land. And after a little while:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHebrew%2520Questions%2520on%2520Genesis.html'
source_title='Hebrew Questions on Genesis'

[[commentary]]
quote='''
"And Chus [Cush] begat Nimrod. This man began to be powerful in the earth." Nimrod, son of Chus, was the first to seize despotic rule over the people, which men were not yet accustomed to.
'''
source_url=''
source_title="HEBREW QUESTIONS ON GENESIS 10.8-10"
