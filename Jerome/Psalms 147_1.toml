[[commentary]]
quote='''
Praise the Lord, for a psalm is good. The one hundred and forty-sixth psalm is headed with the title "Alleluia." Those who do not know the Hebrew language, when they see "alleluia" set at the head of a psalm, are wont to ask what it means. This psalm, then, has "alleluia" not only in its title, but also at the very opening of the psalm. For where it says "Praise the Lord," in the Hebrew it says "alleluia." For God among the Hebrews has ten names: he is called Sabaoth, he is called Saddai, he is called Eloim, he is called El, he is also called Iao, he is called Eser Iaia. Among the other names there is one name which is called "Ia." Now "Ia" is interpreted "invisible." Where therefore we say "praise," in the Hebrew it says "allelu." So here it says "allelu Ia," just as if one were to say "allelu Sabaoth," "allelu Saddai," "allelu Eloim": so therefore even now it says "allelu Ia." Finally Theodotion, who is one of the translators, wishing to declare the truth of the interpretation, says "praise Ia." Why have we said all this? So that we may know that in this psalm "alleluia" is set at the head. Praise the Lord. This interpretation, once we have gone out, will be pondered in your hearts; but for now the discourse will be extended further.

Praise the Lord, for a psalm is good. He did not say "a good psalm," but absolutely, "a psalm is good": that is, it is a good thing to sing psalms. But to sing psalms not with the voice, but with the heart. How many have a good voice, and, because they are sinners, sing badly! He sings well who sings in his heart, who sings to Christ in his conscience. Let praise be pleasant to our God. Let the praise be pleasant, not with the voice, but with the conscience. Finally, Noah too offered victims, and the Lord smelled the odor of sweetness. There are many things that might be said: but we ought briefly to touch on the highest points, so that we may point out the meaning rather than broader words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_056.html'
source_title="Homily 56, on Psalm 146"
