[[commentary]]
quote='''
And he shall come down and tread upon the high places of the earth. The descent of God is, and his majesty runs down to lower things, to tread upon the earth, and to crush even the powerful. And they shall be consumed, he says, whether the mountains waste away, and the valleys beneath him, whom we understand to be the leaders and the people. And just as nearby fire does not sustain wax, and flowing water is carried headlong: so shall the pride of all the wicked, when the Lord comes, be dissolved and flow away.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Micah.html'
source_title="Commentary on Micah"
