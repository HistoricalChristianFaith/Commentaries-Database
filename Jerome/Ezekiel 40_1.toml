[[commentary]]
quote='''
Your prayers, daughter Eustochium, and the Lord's promises have overcome my fear of explaining the temple of Ezekiel, or rather my determination to remain silent, as it says: Ask, and it will be given to you; seek, and you will find; knock, and it will be opened to you. And as we made excuses in the conclusion of the previous volume, it is better to say nothing than to say little; you have turned it around so that you consider it better to say little than to say nothing: because in the former, the will is eager, in the latter, there is despair of the entire work... Therefore, I will comply with your will, and with the Holy Spirit blowing, I will hoist the sails, ignorant of the shores I will reach, and along with this same prophet I exclaim, 'Come, spirits, from the four winds'...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
