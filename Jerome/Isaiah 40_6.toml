[[commentary]]
quote='''
We are still alive, but part of us has already perished in old age. Even though our soul is the same, nevertheless, we who suffer the loss of the pristine vigor of youth are, in a real sense, other than we were.
'''
source_url=''
source_title="HOMILIES ON THE PSALMS, ALTERNATE SERIES 67 (PSALM 89)"


[[commentary]]
quote='''
And in truth, if anyone were to consider the frailty of the flesh, and how we grow and decline in a matter of hours, and do not remain in the same state: and that which we speak, dictate, and write, passes quickly from our lives: he will not hesitate to call the flesh hay, and its glory as the flower of hay, or the meadows of the fields. For the one who was recently an infant suddenly becomes a child; the child suddenly becomes a young person; and throughout the uncertain passage of time, he is transformed into old age; and he realizes himself to be old before he marvels at no longer being young. A beautiful woman who drew after her flocks of young men, is contracted in her countenance: and she who was once for love, afterwards is for disdain. Which an excellent orator among the Greeks writes: The beauty of the body either fails with time, or is consumed by sickness. Therefore the flesh is withered, and the beauty is fallen off; because the spirit of the madness of God and of his sentence has blown upon her (that I may return from a general discourse to the order of the Scripture), of him who bears the image of the earthly, and serves vices and luxury; and he is like hay and a passing flower. But whoever has and keeps the image of the heavenly, that person is the flesh which sees the salvation of the Lord, which is daily renewed in knowledge according to the image of the Creator, and receiving an incorruptible and immortal body, changes glory, not nature. But the word of our Lord, and those who are associated with the word, endure forever.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
