[[commentary]]
quote='''
The sun therefore and the moon and the stars are for our sake, they serve us. The apostle too says that the very creation groans together and is in travail for the deliverance of the sons of God. But when the sons of God shall have been taken up, then the creation itself also is set free from this servitude.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_058.html'
source_title="Homily 58, on Psalm 148"
