[[commentary]]
quote='''
I set no unjust thing before my eyes. I put nothing before the Lord, nor did I consent to iniquity; but I was wholly turned to God. I have hated those who commit transgressions. Whether it was my father, or my mother, or brother, or sister, or friend: nevertheless, if he had turned aside from the fear of the Lord, I held him in hatred, and I did not approach him at all. I did not set kinship or friendship before devotion to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"
