[[commentary]]
quote='''
Bringing forth hay for the cattle. Attend carefully, since the cattle eat hay. And grass for the service of men. Since he created all things for his own glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"


[[commentary]]
quote='''
That he may bring forth bread out of the earth. He speaks of the Lord, who deigned to become man, as it is written: "I am the living bread, who came down from heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"
