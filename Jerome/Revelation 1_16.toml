[[commentary]]
quote='''
And two-edged swords are in their hands. These who exult in their beds—it is said of the saints, it is said of perfect men—what else do they have? And two-edged swords are in their hands. Two-edged swords. The swords of the saints are two-edged. We read in the Apocalypse of John, which is read in the churches and is received—for it is not held among the apocryphal scriptures, but among the ecclesiastical—it is said there, then, of the Lord Savior: "And a sword, he says, sharp on both sides went forth from his mouth." You see, therefore, that these saints received those two-edged swords, which they have in their hands, from the mouth of the Lord. The Lord, therefore, gives a sword from his mouth to his disciples: a two-edged sword, that is, the word of his teaching. A two-edged sword: both according to history and according to allegory, both according to the letter and according to the spirit. A two-edged sword: which both kills adversaries and defends its own. A two-edged sword. This two-edged sword has two edges: it speaks both of the present age and of the age to come: and here it kills adversaries, and in heaven it opens the kingdoms of heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_059.html'
source_title="Homily 59, on Psalm 149"
