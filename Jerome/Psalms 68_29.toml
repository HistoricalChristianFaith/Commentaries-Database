[[commentary]]
quote='''
To you the kings shall bring gifts. He says "kings," those who reign over their own selves, according to what is written: "The heart of the king is in the hand of God." These shall bring gifts to God. The virtues of the holy ones are gifts to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
