[[commentary]]
quote='''
Our fathers in Egypt did not understand your wonders. They saw, and they did not see: they saw with the eyes of the flesh, and with spiritual eyes they did not see. He did not say, they did not see: but, they did not understand. For just as those men saw the wonders, and did not understand: so also in the Gospel, if anyone indeed sees and hears carnally, but does not understand spiritually, he does not see. Blessed therefore are we who have not seen and yet have believed, more than those who saw and did not believe. They saw the Red Sea, they saw Pharaoh drowned, and understood only this, which they saw. But we, who have not seen him, understand better. In Pharaoh we understand the devil, in his army we understand the demons, in the sea we understand baptism. They understand Marah to be bitter waters, and they pass through Marah: but we daily see the baptism of heretics to be bitter waters. They hang up the bronze serpent in the desert. Let the anchorites hear, let those who dwell in the wilderness hear. But we, what have we done? We too have hung up the true and ancient serpent in the wilderness. Although the apostle does not interpret this of the Lord in the way we suppose. But what does he say? On the cross of the Lord the devil was hung up and fastened. The Lord indeed was crucified, but the devil died. This one fulfilled the mystery, and appeared as victor: but the other did not appear, but was spiritually slain, just as the apostle also signifies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_032.html'
source_title="Homily 32, on Psalm 105"
