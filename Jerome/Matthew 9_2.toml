[[commentary]]
quote='''
And they brought him, as we said before, a paralytic lying on a bed, because he himself was not able to enter. But Jesus, seeing not the faith of the one who was being offered, but of those who were offering, said to the paralyzed man: Have confidence, my son, your sins are forgiven you. Oh, wonderful humility! He calls despised and weak, dissolved in the joints of all his limbs, his son, whom the priests did not consider worthy of touching. Or certainly he calls him son because his sins are forgiven him. According to the allegory, sometimes the soul, lying in its body, with all the powers of its limbs dissolved, is offered to the Lord to be healed by the perfect teacher, and if it is healed by his mercy, it receives such great strength that it immediately carries its bed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"


[[commentary]]
quote='''
On a bed, because he could not walk.

not the sick man's, but theirs that bare him.

O wonderful humility! This man feeble and despised, crippled in every limb, He addresses as son. The Jewish Priests did not deign to touch him. Even therefore His son, because his sins were forgiven him. Hence we may learn that diseases are often the punishment of sin; and therefore perhaps his sins are forgiven him, that when the cause of his disease has been first removed, health may be restored.

Figuratively; the soul sick in the body, its powers palsied, is brought by the perfect doctor to the Lord to be healed. For every one when sick, ought to engage some to pray for his recovery, through whom the halting footsteps of our acts may be reformed by the healing power of the heavenly word. These are mental monitors, who raise the soul of the hearer to higher things, although sick and weak in the outward body.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"
