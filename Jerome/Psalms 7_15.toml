[[commentary]]
quote='''
'He hath opened a pit and dug it out, and he is fallen into the ditch which he made.' The pit is the devil's own, which is also the ditch. 'He hath opened a pit': but since it cannot hold water, according to Jeremiah, therefore his pit has been turned into a ditch. 'He hath opened a pit, and dug it out.' All the conventicles of heretics are ditches of the devil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
