[[commentary]]
quote='''
But why should that be hard to bear which we must one day ourselves endure? And why do we grieve for the dead? We are not born to live forever. Abraham, Moses and Isaiah, Peter, James and John, Paul, the "chosen vessel," and even the Son of God have all died; and are we vexed when a soul leaves its earthly tenement? Perhaps he is taken away, "lest wickedness should alter his understanding … for his soul pleased the Lord; therefore he hastened to take him away from the people"—lest in life's long journey he should lose his way in some trackless maze. We should indeed mourn for the dead, but only for one whom Gehenna receives, whom Tartarus devours and for whose punishment the eternal fire burns. But we who, in departing, are accompanied by an escort of angels and met by Christ, should rather grieve that we have to tarry yet longer in this tabernacle of death. For "while we are at home in the body, we are absent from the Lord." Our one longing should be that expressed by the psalmist: "Woe is me that my pilgrimage is prolonged, that I have dwelled with them who dwell in Kedar, that my soul has made a far pilgrimage." Kedar means darkness, and darkness stands for this present world (for, we are told, "the light shines in darkness; and the darkness comprehends it not"). Therefore we should congratulate our dear Blaesilla, that she has passed from darkness to light, and has in the first flush of her dawning faith received the crown of her completed work. Had she been cut off (as I pray that none may be) while her thoughts were full of worldly desires and passing pleasures, then mourning would indeed have been her due, and no tears shed for her would have been too many. As it is, by the mercy of Christ she, four months ago, renewed her baptism in her vow of widowhood, and for the rest of her days spurned the world and thought only of the religious life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_039.html'
source_title="LETTER 39.3"


[[commentary]]
quote='''
Woe is me, that my sojourning is prolonged. This the holy man says, who does not desire the body, who does not seek the earth, who longs for heaven. Woe is me, that my sojourning is prolonged. When we are sick, when we are feverish, when we suspect we are dying, when we throw about our arms, when we are afraid, when we beg for a respite, we cannot say this little verse. This man was healthy, he was not sick, and what does he say? Woe is me, that my sojourning is prolonged. For as long as we are in the tabernacle of this body, we are pilgrims away from the Lord. Woe is me, that my sojourning is prolonged. My sojourning: he did not say, my dwelling. My sojourning: for in the present age we do not have a dwelling, but a pilgrimage. Hence the apostle too says: 'As strangers and pilgrims.' 'I am a stranger and a pilgrim.' Woe is me, that my sojourning is prolonged. What he says is this. Unhappy am I, as long as I am in this body. Which of us can say this? If we are eighty years old, we fear to die; if we are a hundred and are sick, we still beg for a respite and a span of time. Why do we do all this? because the consciousness of our sins gnaws at us. For we know that if we depart from the body, we do not go to Christ, but to gehenna. What does the apostle say? 'I desire to be dissolved and to be with Christ.' Give me the security that after death I shall be with Christ, and even now I desire to die. So then this man, because he is holy, therefore says: Woe is me, that my sojourning is prolonged. I have dwelt with the inhabitants of Kedar. Kedar in our language is interpreted as darkness. See then what he says. In what kind of place are we? in what kind of world are we? I have dwelt with the inhabitants of Kedar. Long have I been in darkness, long have I lived in darkness, long have I been in the body of this death. My soul has long been a sojourner. See what the holy man says. Even if I have lived ten years, my soul has long been a sojourner. For what happiness is it, in comparison with the heavenly things, to be among earthly ones? There are many things that might be said, but the sermon already hastens to its end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_041.html'
source_title="Homily 41, on Psalm 119"
