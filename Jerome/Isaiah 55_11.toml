[[commentary]]
quote='''
Based on what has been said earlier, the meaning here is briefly: may the people of the nations not be incredulous, that after so many wicked deeds the impious may suddenly be saved. For my thoughts are not the same as human thoughts, and as far as the heavens are from the earth, so are my thoughts separated from human thoughts. For I am most merciful and abundant in forgiving. Would you like to hear another similarity? Just as rain and snow descend from the sky and do not return there but drench the earth, and make it bring forth and sprout, giving seed to the sower and bread to the eater, so shall my word be that goes forth from my mouth; it shall not return to me empty, but it shall accomplish what I purpose, and shall succeed in the thing for which I sent it. According to the twofold interpretation of anagoge, the word of the Lord can refer to that one of whom it is written: In the beginning was the Word, and the Word was with God, and the Word was God (John 1:1). He who does not turn to him empty, unless he has done the will of the Father; and has completed all things for which he was incarnate, and has reconciled the world to God. He who is said to come forth from the mouth, and from the womb and birth canal: not that God has these members, but that we learn the nature of the Lord through our words. Or certainly this must be said, that the sermon of the Gospel doctrine is called a shower, and the rains that are poured out upon good earth, spiritual clouds, to which the truth of God reaches.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
