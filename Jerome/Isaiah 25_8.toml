[[commentary]]
quote='''
For which reason the Apostle placed: "Death has been swallowed up in contention; where is your contention, death? Where is your sting, O death?" And explaining the power of the testimony, he said: "But the sting of death is sin, and the power of sin is the law; but thanks be to God, who has given us victory through our Lord Jesus Christ." Therefore, what he interpreted as the resurrection of the Lord, we cannot nor dare interpret differently. Death, hell, and the devil may be understood, who was killed by the death of Christ, about whom Isaiah also speaks: "Death has been swallowed up by victory" (Isaiah 25:8, LXX translation). And afterwards it follows: "The Lord hath taken away every tear from every face." Now, however, some understand that the two brothers who were separated by death, according to the history of that time, are Israel and Judah, so that what was then prefigured partly may now be felt in its entirety, and that with every human race Israel and Judah must be liberated and redeemed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Hosea.html'
source_title="Commentary on Hosea"
