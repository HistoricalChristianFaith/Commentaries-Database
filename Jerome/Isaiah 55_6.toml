[[commentary]]
quote='''
Seek him while he can be found, while you are in the body, while there is a place for repentance, and seek him not only in place, but in faith. However, how God is to be sought is more fully explained in another place: "Taste and see that the Lord is good; blessed is the man who seeks refuge in him. Fear the Lord, you his saints, for those who fear him lack nothing." … It is not enough to seek the Lord, and while it is the time of penance, to find and invoke Him when He is near, unless the wicked person has abandoned their former ways and the old thoughts by which they had turned away from the Lord. For then we will return to the Lord, who will have mercy on us, and to the most merciful Father, who is abundant in mercies and ready to forgive, when we have abandoned our former thoughts and ways, so that we may deserve to hear afterwards: "Blessed are those whose iniquities are forgiven, and whose sins are covered."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
