[[commentary]]
quote='''
'Let the wickedness of sinners be consummated, and thou shalt direct the just.' My justice cannot be directed, unless their iniquity — namely, of the Jews — be fulfilled.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
