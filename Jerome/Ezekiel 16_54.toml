[[commentary]]
quote='''
For of whom is it doubted that among three sinners, rather sinners, a gentile, a heretic, and a churchman, he is more deserving of greater punishments, who is deserving of greater dignity? For the powerful, as we have said, endure torments powerfully (Wisdom 6:7). But he who is least deserving is deserving of mercy. And the servant who knows the will of his master, and does not do it, will be beaten with many (Luke 12:47). Therefore Peter also says: It is time for judgment to begin with God's house (1 Peter 4:17).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
