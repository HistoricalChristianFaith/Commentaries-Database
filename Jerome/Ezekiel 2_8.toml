[[commentary]]
quote='''
Do not be exasperating, as the house is exasperating... Therefore, what he says is this: You should not imitate those whom you are sent to correct, lest you deserve a similar sin and punishment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
