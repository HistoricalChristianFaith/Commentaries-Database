[[commentary]]
quote='''
This head is closely connected with the preceding. It is directed against the Pharisees, who, despising the commandments of God, set up traditions of their own, and means that their teaching the people would not avail themselves, if they destroyed the very least commandment in the Law. We may take it in another sense. The learning of the master if joined with sin however small, loses him the highest place, nor does it avail any to teach righteousness, if he destroys it in his life. Perfect bliss is for him who fulfils in deed what he teaches in word.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
(Verse 19 and following) Therefore, whoever shall break one of the least of these commandments, and shall teach men so, he shall be called the least in the kingdom of heaven: but he who shall do and teach them, the same shall be called great in the kingdom of heaven. This chapter, sticking with the previous testimony, in which he said: Not one iota, or one apex, will pass from the Law, until all things are fulfilled. Therefore, he seals the Pharisees, who, despising the commandments of God, establish their own traditions, which do not benefit them in teaching the people if they destroy even a small thing that is commanded in the Law. However, we can also understand that the education of teachers, even if subject to a small sin, leads them down from the highest rank, and it does not benefit them to teach righteousness, which the smallest fault destroys. And let perfect happiness be to fulfill with action what you have taught in words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
