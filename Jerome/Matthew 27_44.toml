[[commentary]]
quote='''
(Verse 44) Now even the robbers who were crucified with him were reviling him. Here, in a figurative sense known as σύλληψις, both robbers are depicted as blaspheming him. However, Luke asserts that while one blasphemed, the other confessed, and contrary to expectations, rebuked the blasphemer (Luke 23). It is not that the Gospels are inconsistent; rather, both robbers initially blasphemed, but then, as the sun set and the earth shook, and with rocks splitting and darkness descending, one believed in Jesus and rectified his previous denial with a subsequent confession. Among the two thieves, both the Gentiles and the Jews initially blasphemed the Lord. Later, one of them, struck by the magnitude of the signs, repented and to this day scolds the Jews for blaspheming.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
Or it may be said that at first both reviled Him; but when the sun had withdrawn, the earth was shaken, the rocks were rent, and the darkness increased, one believed on Jesus, and repaired his former denial by a subsequent confession.

Or, in the two thieves both nations, Jews and Gentiles, at first blasphemed the Lord; afterwards the latter terrified by the multitude of signs did penitence, and thus rebukes the Jews, who blaspheme to this day.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252027.html'
source_title="Catena Aurea by Aquinas"
