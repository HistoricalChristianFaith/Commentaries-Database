[[commentary]]
quote='''
Leaving aside the clear things, let us discuss only those in which the hidden meaning is present. They tear their clothes because they hear Rabshekah blaspheming. The king himself tears his own clothes because he believed it to be his and the people's sins that Rabshekah has come all the way to the gate of Jerusalem and has spoken such things against the Lord. Whereupon, the high priest, because he believed that he had blasphemed the Savior, tore his garments (Matt. XXVI); and Paul and Barnabas, when the people of Lystra wanted to worship them as gods, tore their garments (Acts XIV). Therefore, he wrapped himself in sackcloth for the royal worship, and as he walked from the palace to the temple, he sent Eliakim the high priest, and Shebna the scribe, and the elders of the priests to Isaiah the son of Amos the prophet.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
