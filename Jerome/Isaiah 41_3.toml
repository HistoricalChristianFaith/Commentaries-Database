[[commentary]]
quote='''
He will pursue them, namely the kings and princes of each nation, and he will pass by in peace, calling all to peace so that they may be reconciled to God. His path will not be visible, that is, he will not feel the labor of the journey or any weakness or fatigue of human nature; but he will drink from the stream on the way, and therefore he will lift up his head.… Some report that we, interpreted as the ones above all others, through the calling of the Gentiles and the preaching of the Gospel and the condemnation of idols, led Cyrus, the king of the Persians, to rise up against the Babylonians from the East, and made him submit to his command, prostrating many nations before him and subjecting everything to his sword and bow.… Some Hebrews believe that Abraham was called righteous from the East, that is, from the Chaldeans, because he alone was found to be righteous. He followed God, leaving his homeland to a land that he did not know, and he delivered kings into his hand who had come against Sodom and Gomorrah. He made them like stubble and dust before his sword and bow. He pursued them, returned in peace, and did not feel the effects of the long journey, and all this was not by his own strength but by the mercy of the Lord, who knew these things from the beginning.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
