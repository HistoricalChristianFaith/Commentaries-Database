[[commentary]]
quote='''
But those who want to believe will be redeemed, not with silver and money, but with the precious blood of Christ, so that they may hear through the apostles: Grace to you and peace (Romans 1:7). For we are reconciled to God, not by merits, but by grace and faith in Christ. It is also said of the soul, which, defiled by the filth of vices, had lost the brightness of its former conduct, that it shakes off the dust with the Apostles, who clung to His feet (Matthew 10). For it could not be that the soul, which had submitted its neck to those passing by and had mingled with the earth, saying, 'My soul is humbled even to the dust, my belly has adhered to the earth' (Psalm 43:25), should receive the likeness of the earth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
