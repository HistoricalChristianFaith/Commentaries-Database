[[commentary]]
quote='''
Make melody to the Lord on the harp. Let all your strings have voice. There cannot be a harp if one string is missing. What does it profit you if you are chaste, and yet greedy? What does it profit you if you are both chaste and generous in almsgiving, and yet envious? What does it profit you if you have six strings whole and one broken? If one string is lacking, the perfect sound of the harp cannot exist.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_025.html'
source_title="Homily 25, on Psalm 97"
