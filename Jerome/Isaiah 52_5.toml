[[commentary]]
quote='''
Furthermore, according to the anagogical sense, we can say that the people of God of this age willingly descend into Egypt when they are more lovers of pleasures than of God, and do not heed that prophetic message: Woe to those who go down to Egypt for help (Isaiah 31:1). When someone is stained with vices and dwells in a place of waters and rivers, not having the dryness of chastity, then they will be violently handed over to the Assyrians to be ruled by them, who will later accuse and convict them of sin. For they are both enemies and avengers, of whom he speaks to Israel: And now what is to you and the way of Egypt, that you drink the water of Geon: and what is to you and the way of the Assyrians, that you drink the water of the rivers (Jer. II, 18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
