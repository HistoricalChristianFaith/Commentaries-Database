[[commentary]]
quote='''
For here is where only the glory of the God of Israel enters; but there it is said that the fullness of the glory of the Lord was in the temple, as Isaiah also writes: I saw the Lord sitting on a high and lofty throne, and the house was full of his glory; when we contemplate the revealed face of the glory of the Lord, we are transformed into the image of the Creator.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"


[[commentary]]
quote='''
And the earth shone with his majesty. Which properly happened at the coming of Christ; when the sound of the apostles went out into all the earth, and their words to the ends of the world: and it is fulfilled daily in believers, and will be fulfilled completely, when this corruptible shall have put on incorruption, and this mortal shall have put on immortality.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
