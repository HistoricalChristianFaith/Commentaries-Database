[[commentary]]
quote='''
Rebuke the wild beasts of the reed, that is, the heretics, who compose and write against you, so as to deceive us. "For there must also be heresies among us." For they are called "wild beasts" from the fact that they seize souls and kill them. But it can be understood also of the devil and his angels. The assembly of bulls among the cows of the peoples. It signifies the heretics themselves, because they can deceive no one, except the simpler ones and the little ones, that is, the lesser cows: for they cannot deceive the bulls, that is, the great ones. That they may shut out those who have been proved with silver. And for this reason they deceive the simpler ones, that is, the multitude, so as to come even to the holy ones, and shut them out from the kingdom of heaven. Scatter the nations that desire wars: that is, scatter the heretics, who attack the church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
