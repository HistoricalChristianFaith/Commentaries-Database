[[commentary]]
quote='''
The Apostle Paul, desiring the Ephesians to understand more sacred things, prays that they may be filled with the wisdom and love of the Lord, so that rooted and founded, they may be able to know and comprehend the breadth, and length, and depth, and height, and the profound riches of Him. And he speaks to them: Therefore, you are by no means strangers but fellow citizens of the saints and domestics of God, built upon the foundation of the apostles and prophets, with Jesus Christ Himself as the cornerstone, in whom the whole structure grows together to form a holy temple in the Lord. In Him, you also are built together to be a dwelling place of God in the Holy Spirit. Peter the Apostle also speaks in almost the same words, because of the same spirit, in his Epistle: For if you have believed that the Lord is good, approaching him as to a living stone, rejected indeed by men but chosen, and honorable before God, and be yourselves built up as living stones into a spiritual house, a holy priesthood, offering up spiritual sacrifices acceptable to God through Jesus Christ. From this it is clear that the Lord and Savior, who is the true architect, tests the stones that can be placed in the foundations of the temple, both in the middle and in the higher places, and whether they are of a less solid strength in the wall and whether they can be placed outside the temple in the circuit of the enclosure.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
