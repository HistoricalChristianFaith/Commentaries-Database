[[commentary]]
quote='''
And my people did not hear my voice. I stand before the door, I knock. I want you to open, and I will come in: and you are unwilling to open. And Israel did not attend to me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_013.html'
source_title="Homily 13, on Psalm 80"
