[[commentary]]
quote='''
The Jews refer this to Zerubbabel's time, because after the devastation of Babylon, Zion was restored, the Temple was built, and the ancient religion was restored.… thus the Lord also speaks here to those who persecute what is just, according to what is said elsewhere: Seek peace, and pursue it (Psalm XXXIII, 5); and again: Pursuing hospitality (Romans XI, 13). And they seek the Lord, so that from past events he may infer his presence: since much more difficult things have already happened, they should not doubt the future things that are promised. Furthermore, it is said by the persecutors of justice according to the Septuagint, that they may look upon the most sturdy rock, which they have cut down, and the pit of the trap they have dug, that is, the Lord as Savior, about whom the Apostle speaks: And that rock was Christ (I Cor. X, 4).… We can call the rock that was hewn out the sepulcher of the Savior, in which he was buried, and rising from the dead, he begot innumerable children. And he was called Abraham, that is, the father of many nations. Just as Sarah, once barren, is interpreted as the Church, which is also called Zion, whom the Lord has comforted, and has made her desolate places like a paradise. For she has more children of the desolate than of her who has a husband.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
