[[commentary]]
quote='''
Who said: Let us possess the sanctuary of God by inheritance. They said it, but they did not accomplish it: for the Lord was fighting for his people.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"
