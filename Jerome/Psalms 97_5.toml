[[commentary]]
quote='''
The mountains flowed away like wax. To me these mountains seem to be the powers of the demons. Or certainly the mountains are proud men, whoever they be. This fire does not consume the humble, but whoever are mountainous. And indeed, whenever a lightning-bolt is sent forth, it strikes with difficulty those who are in the valley, but always those who are on the mountain.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_024.html'
source_title="Homily 24, on Psalm 96"

[[commentary]]
quote='''
"The mountains flowed like wax before his face." By "mountains" he means the lofty powers. Those who before were raised up to heaven through pride, at the coming of the Lord were humbled; and those who were hardened by too great a boasting of vanity, afterward were softened by the heat of divine wisdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_073.html'
source_title="Homily 73, on Psalm 96 (Alternate Series)"
