[[commentary]]
quote='''
And they have surrounded me with words of hatred. Not that they might believe, but that they might war against me. And they have warred against me without cause. "Without cause" is understood in two ways. That is, without reason: for I had not sinned, and I did not deserve that they should make war upon me. And what worthy cause was there that they should war against me? Because I had healed their sick? because I had raised their dead? because I had done other signs? See therefore that they warred against him without cause. And it is understood in another way as well: They wished to extinguish and blot out my name, and yet they were not able. When someone persecutes another, and gains nothing, and does not fulfill his desire, he persecutes without cause.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_035.html'
source_title="Homily 35, on Psalm 108"
