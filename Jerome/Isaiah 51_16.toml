[[commentary]]
quote='''
And He says that He has placed His words in his mouth. For whatever the Son speaks, the words are of the Father, and He will protect him in the shadow of His hand. And for this reason he will be protected so that he may plant new heavens and pour out a new earth, and say to Zion, that is, to the Church: You are my people. Therefore, Zion is none other than the people of God.… In that place also we translate the words in the Hebrew and Aquila: I have set my words in your mouth, and I have covered you with the shadow of my hand, that you may plant the heavens and lay the foundations of the earth and say to Zion: You are my people. He translated it in this way: I will put my words in your mouth, and I will protect you with the shadow of my hand, in which I have planted the heavens and laid the foundations of the earth, and that I may say to Zion: You are my people. According to the LXX, it is said to the soul of every believer, because it, having been created in the image and likeness of God, has ignored its own dignity; but it fears man and the son of man, who can only kill the body, and has not known that it is immortal, nor has it said with the Prophet: The Lord is my light and my savior, whom should I fear? The Lord is the protector of my life; from whom shall I be afraid? (Psalm 27:1, 2)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
