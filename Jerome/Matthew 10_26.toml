[[commentary]]
quote='''
(Verse 26) For nothing is hidden that will not be revealed, and nothing secret that will not be known. And how in the present age the vices of many are not known? But about the future time it is written, when God will judge the secrets of men, and will illuminate the hiding places of darkness, and will make manifest the counsels of hearts. And the meaning is: Do not fear the cruelty of persecutors, and the rage of blasphemers, for the day of judgment will come, in which both your virtue and their wickedness will be demonstrated.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
How is it then that in the present world, the sins of so many are unknown? It is of the time to come that this is said; the time when God shall judge the hidden things of men, shall enlighten the hidden places of darkness, and shall make manifest the secrets of hearts. The sense is, Fear not the cruelty of the persecutor, or the rage of the blasphemer, for there shall come a day of judgment in which your virtue and their wickedness will be made known.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
