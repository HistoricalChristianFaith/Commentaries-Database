[[commentary]]
quote='''
O Lord of hosts. See what he says, O Lord of hosts. Therefore when we have any sins in us, God, who is the Lord of hosts, is not our Lord: because the Lord is not the Lord of sinners, but of the righteous. Blessed is the man who hopes in you. He hopes in the Lord, who has no conscience of sins, who lifts free eyes to heaven. This man hopes, who knows that he has not offended his Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_016.html'
source_title="Homily 16, on Psalm 83"
