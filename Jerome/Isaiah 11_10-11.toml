[[commentary]]
quote='''
On that day the root of Jesse shall stand as a signal to the peoples; the nations shall inquire of him, and his dwelling shall be glorious. LXX: On that day the root of Jesse shall stand as a signal to the peoples; the nations shall seek him out, and his dwelling shall be honored. For his resting place has been chosen in Hebrew, Mnuatho, which all have likewise translated. And for his honor, in Hebrew it is read as Chabod, which clearly signifies glory. And the meaning is: his death will be glorious, so that what the Savior prays for in the Gospel may be fulfilled: Father, glorify me with the glory which I had before the world was with you (John 17:5). It has been said about his birth, it has been said about the others in the midst of the Sacraments: he came to death, which is not called by the usual name of mortals, but because eternal life was in Christ, it is called rest. But we, in order to make the meaning clear to the reader, translate it as dormition and rest, with another word but the same meaning, we turn it into a tomb. Therefore, in that time, when the Gospel of Christ will shine forth throughout the whole world, and the knowledge of the Lord will fill all the earth like the waters cover the sea, the root of Jesse will be and the one who will rise from his lineage as a sign for all peoples, so that the nations may see the sign of the Son of Man in heaven (Matt. 24). He will have horns in his hands, in which his strength will be hidden, so that when exalted, he may draw all things to himself (Hab. 3).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html#tocuniq140'
source_title="Commentary on Isaiah 11:10"

[[commentary]]
quote='''
Long before this tomb [of Christ] was hewn out by Joseph, its glory was foretold in Isaiah's prediction, "his rest shall be glorious," meaning that the place of the Lord's burial should be held in universal honor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_046.html'
source_title="LETTER 46.5"

[[commentary]]
quote='''
And in that day, the Lord will stretch out his hand a second time to possess the remnant of his people, which will be left behind by the Assyrians, and by Egypt, and by Phut, and by Ethiopia, and by Elam, and by Shinar, and by Hamath, and by the islands of the sea. And He will lift up a signal for the nations, and will gather the outcasts of Israel, and assemble the scattered ones of Judah from the four corners of the earth. The jealousy of Ephraim will depart, and the enemies of Judah will be destroyed. Ephraim will not be jealous of Judah, and Judah will not fight against Ephraim. They will swoop down on the Philistines' shoulder through the sea, together they will plunder the sons of the East. And Edom and Moab will be under their control, and the sons of Ammon will obey them. In that day, which is the time mentioned before, when the Root of Jesse rises as a signal for the peoples, in order to rule over the nations, the Lord will stretch out His hand a second time, so that not according to our Jewish understanding at the end of the world, when the fullness of the Gentiles has come in, then all Israel will be saved (Rom. XI); but let us understand all these things in relation to His first coming. For we cannot, when the same day is said both now and above, refer it to the first coming, and the one below to the second: lest by these things which follow, and those which precede, Christ whom the Jews contend has not yet come but is to come, should be referred to him. After the calling of the Gentiles, therefore, which were formerly reckoned in the tail, Israel shall be reckoned in the tail, in order that the Lord may again put forth his hand a second time, and possess the remnant of his people, of whom we have read above, not all Israel, but the remnants are to be saved, which shall be left by the Assyrians and by Egypt, and by the various nations around. For first the Twelve Apostles, and seventy, and one hundred twenty souls, and five hundred, who were gathered together, the Lord appeared to them, then three thousand, and five thousand Jews believed in the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html#tocuniq140'
source_title="Commentary on Isaiah 11:11-16"
