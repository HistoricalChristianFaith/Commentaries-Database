[[commentary]]
quote='''
However, through the life-giving spirit, understanding is easy. For Paul, formerly a persecutor and destroyer of the Church, is like a wolf, of whom it is said: Benjamin is a ravenous wolf; he dwelt with the lamb, or like Ananias, by whom he was baptized, or like the Apostle Peter, to whom it was said: Feed my lambs. And the leopard, who previously did not change its spots, lies down in the fountain of the Lord with the kid, not the one on the left, but the one sacrificed on the Lord's Passover. And this must be noted, that neither the lamb nor the kid dwell and lie down with the wolf and the leopard, but the wolf and the leopard imitate the innocence of the lamb and the kid. The lion also will dwell together with the most ferocious, and the sheep, and the calf. This we see daily in the Church, the rich and the poor, the powerful and the humble, kings and commoners dwelling together, and being ruled in the Church by little children, whom we understand to be the Apostles, and by Apostolic men, unskilled in language, but not in knowledge. When those who are bound together in the discipline of the Lord are united among themselves, so that their families are also joined, then this will be fulfilled: their young ones will rest together. The lion will also not eat meat, but straw, so that it may feed on simple food. And here it must be observed that it is not the ox that eats meat, but the lion that eats straw. I think that in Holy Scriptures, straw is understood as simple words. However, wheat and the inner marrow represent the meaning that is found in the letter: and it often happens that people of the world, who are ignorant of the mysteries, feed on simple reading of the Scriptures. The infant, who is small in wickedness, also puts his hand into the snake's hole and drives away the demons from the bodies of those possessed. But the child who is weaned is no longer nourished by milk but now eats solid food. He puts his hand into the cave of the ruler, that is, into the dwelling place of Satan himself, and from there he pulls him out. Hence, the power was given to the Apostles to tread on serpents and scorpions and over all the power of the enemy. However, poisonous animals will never be able to harm or kill those who dwell in the holy mountain of God, which is interpreted as the Church, as it is said in the Gospel: A city set on a hill cannot be hidden.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"

[[commentary]]
quote='''
Not of course that the ox may learn ferocity from the lion but that the lion may learn docility from the ox.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_130.html'
source_title="LETTER 130.8"

[[commentary]]
quote='''
And I will strike a deal with them in that day, with the beasts of the field and with the birds of the sky and with the creeping things of the ground; and I will shatter from the land, the bow, the sword, and war. And I will cause them to sleep with security. (LXX) And I will make a covenant with them in that day, with the beasts of the field, and with the birds of the sky, and with the creeping things of the earth; and I will break the bow, and the sword, and war out of the land, and I will cause them to dwell in hope. When all the words of the opposing religion have been taken away from the people confessing the Lord, and he calls me, "my husband," and not "Baal," that is, "my idol," then I will strike a deal and agreement with them with the beasts of the field and the birds of the sky and with the creeping things on the ground. From this time on, Isaiah speaks: "The wolf will live with the lamb, and the leopard will lie down with the goat. The calf, the lion, and the sheep will live together, and a small child will lead them all. The calf and the bear will graze and their young will rest together. The lion will eat straw like an ox." He desires neither flesh nor blood, but feeds on clean and simple foods. When Peter was instructed to welcome Cornelius among the nations, it was revealed and commanded that he should eat all kinds of animals and recognize nothing as unclean, which he received with thanksgiving. Later, he was told: "What God has cleansed, you must not call common." Therefore, at the coming of the Lord and Savior, after his triumphs in the resurrection, and his ascent to the Father, two walls were joined together by a corner stone, made one by him who made both: and he called her who was called, "Without mercy, mercy obtained": and those who were said, "Not my people," his people: and with all things pacified, the bow and sword shall be brought to nothing, and war shall cease. For there will no longer be a need for weapons of those who fight, when those who fight no more exist. Israel shall be joined to the Gentiles, and that of Deuteronomy shall be fulfilled: "Rejoice, ye Gentiles, with his people". "God is known in Judah; his name is great in Israel."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Hosea.html'
source_title="Commentary on Hosea"
