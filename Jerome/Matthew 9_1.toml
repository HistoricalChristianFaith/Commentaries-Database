[[commentary]]
quote='''
And Jesus got into a boat and crossed over, and came to his own city. By his city, we understand none other than Nazareth, from where he is also called the Nazarene.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"


[[commentary]]
quote='''
Or; This city may be no other than Nazareth, whence He was called a Nazarene.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"
