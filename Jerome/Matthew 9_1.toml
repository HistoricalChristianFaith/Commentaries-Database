[[commentary]]
quote='''
We should understand his town as none other than Nazareth, for he was called a Nazarean.
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 1.9.2"


[[commentary]]
quote='''
Or; This city may be no other than Nazareth, whence He was called a Nazarene.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25209.html'
source_title="Catena Aurea by Aquinas"
