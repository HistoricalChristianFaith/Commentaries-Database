[[commentary]]
quote='''
There are many things that might be said. But to sinners the devil stands at the right hand. Yet that discussion is another matter. Whoever is a sinner, the devil stands at his right hand. But someone says: How is it that in Zechariah it is said to stand also to Jesus the son of Josedech? "And the devil was standing at his right hand." How is it written in Zechariah that the devil stands at the right hand of the Savior? You see that there is a question here. But at that time when the devil was standing at the right hand of the Savior, "Jesus," it says, "had filthy garments." He was bearing our sins, he was wrapped in our vices: therefore the devil was standing at his right hand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_036.html'
source_title="HOMILIES ON THE PSALMS 36"
