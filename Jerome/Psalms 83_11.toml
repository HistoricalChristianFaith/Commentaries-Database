[[commentary]]
quote='''
Make their princes. Whose? Of those who fight against your people. As Oreb and Zeeb, and Zebah and Zalmunna, all their princes. I think you have read the history in the book of Judges, that Gideon, who is called by another name Jerubbaal, fighting on behalf of the people of God, conquered these four kings, and slew them. And see what sort of men the princes of the Midianites are, who forsook the judgment of God. Oreb and Zeeb and Zebah and Zalmunna. Who thinks that in these words there are mysteries of the Savior? The philosophers read this, and mock; the rhetoricians read it, and now think it to be nonsense. And not only the rhetoricians, but the Jews also: they have not the key of knowledge, since a veil is placed before their eyes. Oreb is interpreted "a hole," into which a snake enters; Zeeb is interpreted "a wolf." See the names of the princes who are adversaries of Christ. Zebah, "a victim," that is, those whom the wolf has strangled; and Zalmunna, "perfected in malice." See, therefore, the mysteries of the names.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"
