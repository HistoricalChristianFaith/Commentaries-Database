[[commentary]]
quote='''
Before the mountains were made, and the earth and the world were formed. At this place a heresy creeps in: If he was made a refuge for us before the mountains were made and the earth and the world were formed, then souls existed before the world came to be. For what does Scripture say? Lord, you have been made a refuge for us: from generation, it says, to generation: from the beginning of the world, before the beginning of the world. This is what they say. And do not think, he says, that I am the one saying it. Before the mountains were made, and the earth and the world were formed, you, he says, have been made a refuge for us. But if you were our refuge before the world was made, then souls existed before the world came to be. You divide the sentence wrongly, O heresy. Why do you slander the Holy Spirit? Speak in the way the Holy Spirit spoke. It should therefore be read thus: Lord, you have been made a refuge for us from generation to generation: and the pause is up to this point. Then another fresh beginning: Before the mountains were made, and the earth and the world were formed, from age to age you are God. You are God before the mountains were made, you are God before the earth and the world were formed, from age to age you are God, you always are, you are eternal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_019.html'
source_title="Homily 19, on Psalm 89"


[[commentary]]
quote='''
From generation to generation. In this place the serpent hisses. For those who say that souls were made before the world and before they were put into bodies, say this: Lord, you have become a refuge for us from generation to generation, before the mountains were made or the world was formed — that is, before this world was created, you were our refuge — punctuating badly, understanding badly. For we ought to say it thus: Lord, you have become a refuge for us from generation to generation. And the pause of the sentence goes this far. Then, what follows, thus: Before the mountains were made, and the world was formed, from age to age you are God. This, then, is said, not that man's soul existed before the age, but that the Lord God is shown to have always existed and to be before the ages. Finally the following verse too speaks fittingly, And from age to age you are God. From eternity to eternity you abide, having neither beginning nor end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"
