[[commentary]]
quote='''
Our God is the God of saving, and the outcomes of death belong to the Lord: because he himself rose from the dead, and made us rise together with him. Otherwise, the devil is the entrance of death: but the Lord leads out.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
