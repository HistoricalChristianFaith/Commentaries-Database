[[commentary]]
quote='''
If fasting then pleases you, why were you not satisfied with John? If fulness, why not with the Son of man? Yet one of these ye said had a dæmon, the other ye called a gluttonous man, and drunkard.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
