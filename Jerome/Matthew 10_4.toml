[[commentary]]
quote='''
(Verse 4.) Simon the Cananaean. He is the one who is referred to in another Gospel (Luke VI) as Zealot. For Chana means zeal. Thaddaeus the apostle is said in the Ecclesiastical History to have been sent to King Abgar of Edessa, who is called by the evangelist Luke Judas, the son of James; and elsewhere he is called Lebbaeus (Acts I), which means little heart. And it is believed that he had a triple name: just as Simon was also called Peter (Mark III); and the sons of Zebedee were called Boanerges (or Banerges), because of the firmness and greatness of their faith.



And Judas Iscariot, who also betrayed him. He took his name either from the village or city where he was born, or from the tribe of Issachar, so that it was born by some prophecy into the condemnation of itself. For Issachar is interpreted as wages, to signify the price of the traitor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
Simon Chananæus is the same who in the other Evangelist is called Zelotes. Chana signifies 'Zeal.' Judas is named Scarioth, either from the town in which he was born, or from the tribe of Issachar, a prophetic omen of his sin; for Issachar means 'a booty,' thus signifying the reward of the betrayer.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"


[[commentary]]
quote='''
Simon the Cananaean is the one whom another Evangelist calls the Zealot. In fact, Cana interpreted means "zeal." Church history relates that the apostle Thaddaeus was sent to Edessa, Abgarum in the region of Osroene. The person whom Luke the Evangelist calls Jude the brother of James, elsewhere called Lebbaeus, which interpreted means "little heart," is believed to have been referred to by three names. Simon Peter and the sons of Zebedee (called sons of thunder) were named for their strength of mind and great faith. Judas Iscariot took his name either from his hometown or from the tribe of Issachar. By a certain prophecy he was born in condemnation of himself, for Issachar interpreted means "reward," as to signify the price of the traitor.
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 1.10.2"
