[[commentary]]
quote='''
For behold, says the Lord, he shall come in fire, and like a whirlwind or storm shall be his chariot. Which we should understand as the angelic powers, when the Lord is coming in the glory of the Father with his angels, to judge the living and the dead: not that the Lord is fire, but that to those who endure punishment, he appears to be fire. And although Moses said (Deut. IV, 24), the same thing is confirmed by the Apostle (Hebr. XII, 29): God is a consuming fire. However, the Savior, expressing the substance of divinity, says: God is Spirit (John IV, 24). But between spirit and fire, according to corporeal understanding, there is much difference. For if fire or spirit, how is it said that they have eyes, ears, hands, feet, a stomach, and other members of the body, when these do not belong to spirit or fire? Therefore, the consuming fire is called God, so that it may consume whatever vices are in us, like hay, wood, and straw, and thorns, that is, the anxieties of this world, which the unfruitful earth brought forth instead of good seed, of which it is said to the Hebrews: But that which brings forth thorns and thistles is rejected, and is near to being cursed: whose end is to be burned (Hebrews 6:8). The Lord also spoke of this fire in the Gospel: I came to cast fire upon the earth (Luke 12:49). And above we read: Iniquity will burn like fire, and dry grass will be consumed by the fire (Isaiah 9:18), and all the weeds that the enemy sowed will grow while the father of the family sleeps (Matthew 13). I believe this fire sat upon the tongues of all the apostles and believers when they spoke in various tongues, and it dispelled the darkness of error and illuminated the hearts of those who received the word of the Lord (Acts 2).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
