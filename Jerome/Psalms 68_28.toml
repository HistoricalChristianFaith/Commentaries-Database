[[commentary]]
quote='''
Confirm this, O God, which you have worked in us. This salvation, which you have granted us through your passion, confirm, and give aid; because we are men, and we cannot advance in the virtues, if we have not obtained your help.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
