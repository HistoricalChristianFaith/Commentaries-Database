[[commentary]]
quote='''
The Apostle Paul: Those who serve the altar, he says, partake of the altar and live by it (1 Corinthians 9:13). It is permitted for you, O priest, to live by the altar, not to indulge in luxury. The mouth of the ox that treads out the grain is not muzzled (ibid., 9). We know these things, and yet the Apostle does not abuse this permission: he is content with food and clothing. He labors night and day with his own hands so as not to be a burden to anyone. And he swears in his letters that he has lived in a holy and unselfish manner in the gospel of Christ, and not only of himself, but also of his disciples. He asserts that he has not sent anyone to ask for anything from the churches, nor has he desired to receive anything (1 Thessalonians 3). But if he rejoices in certain Epistles, and calls the gifts of those who send them the kindness of God, he does not collect them so much for himself as for the poor of the saints, who were in Jerusalem. But the holy poor, these were in Jerusalem, who first believed in Christ from the Jews, and were driven out by their parents and relatives, as well as by their affinities, wasting both possessions and all the furnishings of the temple, and had lost everything. If they are such poor people, let them receive. But if a few houses become enriched under the guise of the poor, and we eat gold with glass and clay dishes, or exchange treasures and clothing, or if a poor person does not seek the riches of senators in their attire. What profit is there in not having a linen cloth around the neck to wipe away sweat? What good is it to be a monk and prefer poverty in dress, when our purse is envied by the entire crowd of the poor? Because of this, the reason for our existence, we who are such, who build Zion with blood, and Jerusalem with iniquity, who judge for bribes, who answer for rewards, who divine in money, and claiming a false sanctity for ourselves, we say: No evil will come upon us. Let us heed the judgment of the Lord that follows: Zion and Jerusalem, and the mountain of the temple, a watchtower, and a vision of peace, and the temple of Christ in its fulfillment, and in the end, when charity grows cold, and faith becomes rare, as if a field were plowed and turned into mounds, and it will become a high forest or a keeper of fruits: so that where once there were spacious houses and countless heaps of grain, there will scarcely be a small hut preserving the appearance of food, providing nourishment for those who have none.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Micah.html'
source_title="Commentary on Micah"
