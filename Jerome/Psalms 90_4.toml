[[commentary]]
quote='''
For a thousand years before your eyes are as yesterday's day, which has passed. Compared to the eternity of God, all the time of man is short: although it seems long to us, yet in comparison with eternity, because it is bounded by an end, it is reckoned as nothing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"


[[commentary]]
quote='''
And as a watch in the night. The night has four watches, marked off in periods of three hours each, as it is said in the Gospel, "In the fourth watch of the night" Jesus "came to them," which is understood to be about cockcrow. This, then, is what he says: a thousand years with you are to be compared not only to the shortness of a day, but to the span of three hours.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"
