[[commentary]]
quote='''
And what it brings forth, I will not give my glory to another, this signifies that it should not be thought that idols have oppressed the people of God. Certainly, when he says, 'I will not give to another,' he indicates that he has already given to another, for he is said to have given to another in order to distinguish the first. Many of our people, as I will briefly mention in accordance with the Seventy Interpreters, think that the coming of Christ is prophesied, that he will come suddenly, unexpectedly, and demonstrate his presence to a very stubborn people; to whom the Lord has never revealed, because their heart has become fat and their ears have become heavy. And immediately, as the Lord came forth from the virgin womb, he was called a transgressor and unjust, seeking to kill him. And he connects: For My name's sake I will show thee My fury, and My glory I will bring upon thee. He abuses the sense of the Apostle Paul, or the Apostle Paul takes testimony from this passage, so that the wrath of God may be revealed to terrify those who sin, and afterwards glory may be given to those who are converted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
