[[commentary]]
quote='''
Let the apostle too give his testimony: "Whoever are in the flesh cannot please God." If all who are in the flesh cannot please God, how did Paul himself, who is speaking, please God? How did Peter or the rest of the apostles and the saints please him, whom we cannot deny to have been in the flesh? Just as the same apostle again says: "But you are not in the flesh, but in the spirit." They were in the flesh: and how does he say, You are not in the flesh? Because you do not live according to the flesh, because "our citizenship is in heaven." For we who in this age "are pilgrims away from the Lord" do indeed walk on the earth, but we hasten toward the things of heaven: because here we have no home of our own, but are strangers and pilgrims, just as all our fathers were.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_063.html'
source_title="Homily 63, on Psalm 83 (Alternate Series)"
