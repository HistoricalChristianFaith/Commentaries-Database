[[commentary]]
quote='''
In the morning let it pass like grass, in the morning let it flower and pass away: in the evening let it fall, harden, and wither. O the mysteries of the Scriptures! In the morning let it pass like grass. Our Lord and Savior also speaks in the Gospel about the hay, which springs up in one day and withers in one day. Just as grass that is green and flowers seems in the morning to be, as it were, a flower and green: yet when the sun comes and scorches it, toward evening it wilts, as it were, and falls; so too all our life seems to be, as it were, a flower while it is green, and it withers. Ten years ago you saw a young lad: nothing more beautiful than he, he ran this way and that. If you look at him now, he seems in old age to be, as it were, dead. Though he lives in old age, yet his youth has perished. In the morning let it pass like grass, that is, our youth: for that is the morning. Let it pass like grass, in the morning let it flower and pass away. We flower in youth, we wither in old age. In the evening let it fall, harden, and wither.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_019.html'
source_title="Homily 19, on Psalm 89"


[[commentary]]
quote='''
Their years shall be counted as nothing. What he says is this: since man from the beginning of the world lived nearly a thousand years, and a thousand years before God are as a watch in the night. Nay, I have said enough: the ages of men are as nothing in comparison with the divine eternity. Do you wish to know more fully how human life is nothing? Hear what follows. In the morning let it pass like grass. As the morning dew passes swiftly, so is the life of men. Our morning is youth. In the morning let it flower and pass. In youth and full age we flowered, but in old age we fall down, and the flower of our strength has withered. For which of us knows how our age passes by? While we scarcely know it, old age steals up on us from behind. In the evening let it fall, harden, and grow dry. Our evening is old age, which, when the flower of youth has been shaken off, is hardened by the manifold horror of diseases. "For all flesh indeed is grass, and its glory is as the flower of grass: it withered and fell; but the word of the Lord abides forever." We still live, and part of us has already perished in old age: though the mind is the same, yet we who feel that we have lost the vigor of our former youth are in a manner become other men.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"
