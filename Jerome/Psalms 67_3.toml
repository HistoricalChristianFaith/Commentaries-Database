[[commentary]]
quote='''
Let the peoples confess to you, O God, let the peoples confess to you. The Jews? No: all peoples. Just as all the nations, so also all peoples. Let the peoples confess to you, O God. What should they confess? Surely their sins — or at least let them confess that your image is in you: let them confess you in the Son, in him let them see you, in him let them adore you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_006.html'
source_title="Homily 6, on Psalm 66"
