[[commentary]]
quote='''
A depraved heart did not cling to me. There was in me nothing difficult or anything perverse, but fairness and justice. As the malignant one turned aside from me, I did not know him: that is, if he was a friend to me or a neighbor, whether a bishop or a presbyter, or one established in any rank whatever: nevertheless, if he perverted his ways, I so fled from him that I made no mention of him at all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"
