[[commentary]]
quote='''
But perhaps an inquisitive reader will object this too: how we can assert that God stands at the right of the just man, and the devil at the left of the sinner, when concerning our Lord it is read in Zechariah, "And the devil was standing at his right hand to oppose him." Let him, then, who objects this read also what follows: that when the devil was standing at his right hand, Jesus had filthy garments. Rightly did he who had taken up our sins and was bearing our offenses have the devil at his right hand, not so much for himself as for the filthy garments. And at the same time let him consider that it is not said, "The devil was standing as victor and triumphing," but as still set in the contest and in the battle-line and in doubt—indeed, when he had not yet begun to fight. For it follows, "That he might oppose him." But the devil was opposing him, as we said, because he had filthy garments from our sins. But after he heard, "May the Lord who chose Jerusalem rebuke you," he did not stand at the right, but went behind his back and under his feet, and at once Jesus the great priest receives the ankle-length robe (poderis), and is clothed in white vesture, and, royal dignity being joined to him—that is, Zerubbabel being coupled with him—builds the Church, and constructs the spiritual Jerusalem.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="HOMILIES ON THE PSALMS, ALTERNATE SERIES 61"
