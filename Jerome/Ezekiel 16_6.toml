[[commentary]]
quote='''
And when she was prepared for marriage, and had the beauty of the body, she did not have the coverings of clothing, nor was she protected by the help of God. If anyone does not have the clothing of Christ, they are naked. If anyone is not clothed with the bowels of mercy, goodness, humility, modesty, meekness, patience, they lie face down on the ground: and their beauty is marred by shame and nakedness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
