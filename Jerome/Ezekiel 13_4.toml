[[commentary]]
quote='''
The prophets of Israel are like foxes, committing thefts of domestic birds every day: those who live, according to Aquila and the Septuagint, in the deserts; according to Symmachus and Theodotion, in walls and ruins: who cannot advance opposite, nor oppose a wall for the house of Israel. We read that Aaron stood in the middle against the fire devouring the people of Israel, and opposed a wall for the salvation of the people. It is also said of Jeremiah, 'Do not confront the Lord, nor stand against His wrath with persevering prayer.' Just as a wall is set against an enemy and is usually met head-on by the adversary, so the will of God is weakened by the prayers of the saints. These people cannot stand in battle on the Day of the Lord, to fight for the people with prayers and resist the judgments of God's pleas. Therefore, because they see in vain and falsely prophesy, and claim to be sent by the Lord when they are not sent by Him, and persist in their errors, and desire to affirm their own words; they are accused of preaching empty things, saying that their lies are the words of the Lord. Furthermore, according to the Septuagint, the sense here is: All heretics are like foxes because of their deceit and wickedness, about whom the Savior speaks: Foxes have dens, and birds of the air have nests. And it is written about Herod: Say to this fox. And about those same foxes that deceive the innocent and plunder the vineyard of Christ, Solomon speaks: Catch for us the little foxes, who spoil the vineyards.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
