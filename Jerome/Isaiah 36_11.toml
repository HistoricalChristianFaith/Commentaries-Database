[[commentary]]
quote='''
And as Eliakim, Shebna, and Joah humbly implore, 'Speak to your servants in the Syrian language, for we understand; and do not speak to us in the language of Judah in the hearing of the people who are on the wall,' it means: 'Why is it necessary to stir up the people with false terrors and boast of empty power?' Speak the language that the people do not understand. For if we have knowledge of your language: and we know the Syrian language, which is common to both. To which Rabshakeh replied arrogantly: Did my master send me to your lord and to you, and not rather to the men who sit on the wall? And he increased the threat, saying that they should eat their own feces and drink the urine of their own feet with them? By these means he showed that they were to be taken by hunger, scarcity, and thirst.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
