[[commentary]]
quote='''
You who cover its upper parts with waters. Just as it is written in Genesis, that there are waters above the firmament, and likewise beneath. You who walk upon the wings of the winds. He signifies that God is present everywhere.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"
