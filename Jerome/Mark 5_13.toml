[[commentary]]
quote='''
Was it just that two thousand swine perished so one soul might be saved? One seeking purity of heart had best not become preoccupied with the natural prerogative of the demonic legion or animals. It is better that each single reader reflect upon his own soul, his own way of life, and the rarity of true excellence. Remember when the whole of Judea was led into captivity when Nebuchadneser came, and thousands were displaced into Babylonia as prisoners—Jeremiah alone was left praising God. And they threw him into a muddy cistern. Nevertheless, the soul of this one man was more decisive for the destiny of Israel than all the rest.
'''

[[commentary]]
quote='''
But the old man declared to them how the devil, for men's sake, seizes even beasts of burden; that he is inflamed by such intense hatred for men that he desires to destroy not only them but what belongs to them. As an illustration of this he added the fact that before he was permitted to try the saintly Job, he made an end of all his substance. Nor ought it to disturb anyone that by the Lord's command two thousand swine were slain by the agency of demons, since those who witnessed the miracle could not have believed that so great a multitude of demons had gone out of the man unless an equally vast number of swine had rushed to ruin, showing that it was a legion that impelled them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FThe%2520Life%2520of%2520S.%2520Hilarion.html'
source_title="THE LIFE OF S. HILARION 23"
