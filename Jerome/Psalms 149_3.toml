[[commentary]]
quote='''
Let them praise his name in the choir. Wherever there is a choir, there diverse voices are gathered together into one song. For just as diverse strings produce the one sound of a song, so also diverse voices — that is, when they have been gathered together at once — make the choir of the Lord. Let them praise his name in the choir: where there is dissension, where there is envy, there is no choir. Let them praise his name in the choir: let them sing praise to him on the timbrel and the psaltery. Let this choir have a song, and have a timbrel and a psaltery. Let us crucify our bodies to Christ, and with such a timbrel let us sing to God. Let them sing praise to him on the timbrel and the psaltery. A timbrel does not have flesh, but a skin: and we, as long as we are fleshly, are not a timbrel. It is not a timbrel unless it has no flesh, unless it is stretched taut: a timbrel cannot be shrunken, but stretched out. And let sins not shrink us up, but let righteousness stretch us wide. Let us run through the rest. Let them sing praise to him on the timbrel and the psaltery. What we say in the choir, let us say this on the psaltery. The psaltery properly is a kind of musical instrument, which is like a lyre. It has a resemblance to a lyre, but it is not a lyre. Between the psaltery and the lyre there is this difference: the lyre is struck below, whereas the psaltery is struck above, which in the common word is called polyphthongon (many-toned). This, then, is the psaltery. Here, therefore, it is enjoined upon us that in the new song we should not sing to the Lord from below on the lyre, but from above, that is, on the psaltery.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_059.html'
source_title="Homily 59, on Psalm 149"
