[[commentary]]
quote='''
With his shoulders he will overshadow you. But this is according to that passage of Deuteronomy: The Lord protects us with his wings like his own chicks, as an eagle does. For it is said there that he protects his chicks like an eagle. Although, therefore, we can say this, that God protects us like a father, and protects us like a hen protecting her chicks, lest they be seized by the hawk: nevertheless we can also say something else. With his shoulders he will overshadow you: he will be lifted up on the cross, he will stretch out his hands, and will protect us. And under his wings you shall hope. You shall look, he says, upon his crucified hands, and if the serpent bites you, you shall be healed. Although you walk in the desert of this world: if a scorpion strikes you, if a basilisk, if an asp, if the other venomous creatures, be secure concerning your healing: the serpent has been lifted up in the wilderness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="Homily 20, on Psalm 90"

[[commentary]]
quote='''
His truth shall surround you with a shield. Our shield is round, that is, it hedges us in on every side. Not only is it a shield, but it is also a wall. "Lord, as with a shield of your good will you have crowned us." Does someone crown with a shield? See what he says: Lord, as with a shield of your good will you have crowned us. What does he say? You will protect us, and make us conquer, and after the victory you will crown us. His truth shall surround you with a shield. Since he had said "from the harsh word," and by the harsh word we can understand also that of the heretics, and of the philosophers, and of the Jews, and this, as it were, harsh word is not true, but is false. For it is turbid precisely because it is false; it is turbid precisely because it disturbs our souls through its lie. The Lord therefore, who is truth, and says "I am the truth," his truth surrounds us with a shield, lest we be struck by the burning arrows of the devil. Therefore Christ, who is the truth, sets his shield against them, so that by the shield of truth he may overcome the lie.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="Homily 20, on Psalm 90"

[[commentary]]
quote='''
With His shoulders He shall overshadow you. Who shall overshadow? Surely the God of heaven, as a hen her chicks, and as an eagle its nest. Hence also in the song of Deuteronomy it is said that He carried the people of Israel upon His shoulders, and protected them as an eagle. It can also be understood of the Savior, that upon His cross He protected us with His wings. And under His feathers you shall hope. "All the day long I have stretched forth my hands to a people that did not believe and that contradicted me." The hands of the Lord raised to heaven did not ask for help, but were protecting us wretches.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"

[[commentary]]
quote='''
His truth shall surround you with a shield: that is, you shall be encircled round about with truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"
