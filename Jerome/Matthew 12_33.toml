[[commentary]]
quote='''
(Verse 33.) Either make the tree good and its fruit good, or make the tree bad and its fruit bad. For the tree is known by its fruit. It constrains them with an unassailable argument, which the Greeks call ἄφυκτον and we can call inevitable: it concludes from questions asked here and there, and presses with both horns. If, he says, the devil is evil, he cannot do good works. But if the works you see are good, it follows that the one who does them is not the devil. For it is not possible for good to arise from evil, or for evil to arise from good. But as follows:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
Thus He holds them in a syllogism which the Greeks call 'Aphycton,' the unavoidable; which shuts in the person questioned on both sides, and presses him with either horn. If, He saith, the Devil be evil, he cannot do good works; so that if the works you see be good, it follows that the Devil was not the agent thereof. For it cannot be that good should come of evil, or evil of good.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
