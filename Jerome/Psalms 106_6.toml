[[commentary]]
quote='''
We have sinned with our fathers. As sons we have followed our fathers: we have done what our fathers also did. 'For he has shut up all under sin, that he might have mercy on all.' We have acted unjustly, we have committed iniquity. Note carefully what he says: We have sinned with our fathers, we have acted unjustly, we have committed iniquity. Did he say, we have acted impiously? It is one thing to be a sinner and unjust, another to be impious. The sinner is frequently overcome by the weakness of the body: but the impious man denies God. Therefore, then, because I am not impious, but a sinner, therefore I dare to pray for my sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_032.html'
source_title="Homily 32, on Psalm 105"
