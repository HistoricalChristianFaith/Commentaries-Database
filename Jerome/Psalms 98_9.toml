[[commentary]]
quote='''
Because he comes to judge the earth. By no means did he come only lowly in the flesh, but he comes glorious in his majesty. Because he comes to judge the earth. He did not say 'to destroy,' but 'to judge.' He comes to judge, that he may separate the tares from the wheat: he comes, that he may separate the bad little fish from the good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_025.html'
source_title="Homily 25, on Psalm 97"

[[commentary]]
quote='''
He shall judge the world in righteousness, and the peoples in equity. Righteousness is set down, and equity. If righteousness is set down, and afterward equity, it is properly called εὐθύτης (euthytēs), 'straightness,' which makes the crooked straight. So he comes to judge in his righteousness, that what is crooked may in him be made straight. To whom be glory forever and ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_025.html'
source_title="Homily 25, on Psalm 97"
