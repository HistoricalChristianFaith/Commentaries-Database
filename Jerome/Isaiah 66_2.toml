[[commentary]]
quote='''
With the altar and earthly temple removed, which human hands had built, the Jewish victims are rightly taken away, lest they should say: We are not so foolish as to think that God can be confined to a place; but in a separate place for sacrificing, we offer to God the victims that are commanded by the law. Therefore, the Inhabitant of heaven, indeed the Creator of all, who refuses to have a temple on earth, willingly assumes a humble, peaceful, and trembling human being into the temple, according to the words of the Apostle: But you are the temple of God, and the Holy Spirit dwells in you. If anyone defiles the temple of God, God will destroy him. For the temple of God is holy, which you are (I Cor. III, 16, 17). Therefore, whoever is humble and peaceful, and trembles at the words of God, the Lord looks upon him; and it can be understood from this saying that he is prophesied under the name of "earth": The earth trembled and was still when God arose to judge (Psal. LXXV, 9, 10). For its inhabitants, for whom the land is metaphorically called 'earth,' considering the judgment of God, they rest from evil works; and sitting in their house, they rest on the eternal Sabbath, so as not to engage in the servile work of sin. This is a humble and poor person, with a contrite spirit, and trembling at the words of the Lord, about whom it is written in the Gospel: Blessed are the poor in spirit, for theirs is the kingdom of heaven (Matthew 5:3). And elsewhere: Blessed is he who understands the needy and the poor (Psalm 41:1). And again: The Spirit of the Lord is upon me, because he has anointed me to bring good news to the poor (Isaiah 61:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
