[[commentary]]
quote='''
Nothing makes God so angry as when people from despair of better things cleave to those which are worse; and indeed this despair in itself is a sign of unbelief. One who despairs of salvation can have no expectation of a judgment to come.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_122.html'
source_title="LETTER 122.1"

[[commentary]]
quote='''
This is really what the Prophet Amos says: 'For three crimes and for four, I will not revoke my word, says the Lord.' Moreover, he says this same thing eight times. Now, this is what he actually is saying: you have entertained sin, I have pardoned you; you have done evil, I have forgiven you; you have not repented of your sins, I have excused you: did you also have to teach evil? What the Scripture implies is this: For three sins and for four, I shall not be angered against you, says the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2Fhomily_001.html'
source_title="Homily 1, on Psalm 1"
