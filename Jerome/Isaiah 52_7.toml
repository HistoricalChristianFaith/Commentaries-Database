[[commentary]]
quote='''
He has announced and preached peace to those who were far off, that is, to the Gentiles; and near, that is, to the Jews: reconciling the world to God… For he is our peace, who has made both one, and has broken down the middle wall of partition between us… These are the good things that the Lord promises to those who believe: Hear me and you will eat good things; and your soul will delight in good things; and not only good things, but also salvation he announced to all, which he himself gave who says to Zion, that is, to the Church: Your God reigns. … Paul, following the sense of the Hebrew Truth, puts in his Epistle to the Romans: How beautiful are the feet of those who bring good news, who bring the message of peace (Romans 10:15): intending the Apostles, whose feet the Lord washed (John 13), so that they might be clean and beautiful for preaching, and go throughout the whole world, and quickly fill the world with the teaching of Christ. Now, ὥρα, that is, hour, according to the Septuagint, and the ambiguity of the Greek word can mean either time or beauty. … But if we refer beauty to that which is said in the psalm: You are fairer than the sons of men (Ps. 45:2); for what is more beautiful than for the form of a servant to become the form of God, and to sit and reign with Christ in the heavens?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
