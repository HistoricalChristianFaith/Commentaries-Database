[[commentary]]
quote='''
For before the Savior assumed a human body and humbled himself, taking on the form of a servant, the Law and the Prophets, and all the knowledge of the Scriptures, were closed, and paradise was closed. But after he hung on the cross, and spoke to the thief, 'Today you will be with me in paradise' (Luke 23:43), immediately the veil of the temple was torn, and everything was opened; and with the veil removed, we say: But we all, with unveiled face, beholding the glory of the Lord, are being transformed into the same image, from glory to glory (2 Cor. 3:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"


[[commentary]]
quote='''
Some understand beautifully that the closed gate through which only the Lord God of Israel enters, and the leader to whom the gate is closed, to be the Virgin Mary, who both before childbirth and after childbirth remained a virgin. Indeed, at the time when the angel spoke: The Holy Spirit will come upon you, and the power of the Most High will overshadow you. And behold, you will conceive in your womb and bear a son, and you shall call his name Jesus (Luke 1:35), and when he was born, the virgin remained eternal; to confound those who claim that after the birth of the Savior, she had other sons by Joseph, based on the occasion of his brothers who are mentioned in the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"


[[commentary]]
quote='''
Could it be possible that in that entrance there were both seven steps and eight? Just notice what he says: the east gate, the gate from which the light enters—our Lord and Savior. There is indeed a gate, and no one enters it except the high priest. And what does holy Scripture say about it? "This gate is to remain closed"; it is not opened, moreover, except to the priest. Even so the Covenant, both Old and New, has always been closed; it has not been opened except to the Savior.… One gate, then, has both seven steps and eight. In the Old Testament, for example, the divine mysteries point to the Gospels, and in the New Testament back to the law.
'''
source_url=''
source_title="HOMILIES ON THE PSALMS 19 (PS 89)"
