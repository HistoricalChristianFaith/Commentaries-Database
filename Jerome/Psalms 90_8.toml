[[commentary]]
quote='''
You have set our iniquities in your sight. Nothing is hidden from you: that is, neither does night hide our sins, nor do shadows envelop them: all things shine bright before you. Our age in the illumination of your countenance. It stands better in the Hebrew: "Our faults in the illumination of your countenance." Whatever we do, whatever we think we are doing in secret, lies open in your eyes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_019.html'
source_title="Homily 19, on Psalm 89"


[[commentary]]
quote='''
You have set our iniquities in your sight. Nothing of our sins has been hidden from you: all the evils we have committed are manifest before you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"


[[commentary]]
quote='''
Our age in the light of your countenance. All that we live, or that we do, is not hidden from your eyes: the very darkness is not concealed from you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"
