[[commentary]]
quote='''
"He who chastises the nations, shall he not reprove?" He who teaches others, does he then himself not know? "He who teaches man knowledge." It is understood: does he then himself not have knowledge?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_022.html'
source_title="Homily 22, on Psalm 93"

[[commentary]]
quote='''
"He who instructs the nations, shall he not reprove?" This is what he says: he who gave the law, gave it for this purpose, that he might instruct those who hear, or punish those who despise. "He who teaches man knowledge." He did not add, "Shall he himself not have knowledge?" But what did he say?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_071.html'
source_title="Homily 71, on Psalm 93 (Alternate Series)"
