[[commentary]]
quote='''
(Verse 23.) And when he came into the temple, the chief priests and the elders of the people approached him as he was teaching, saying, 'By what authority are you doing these things, and who gave you this authority?' In different words, they construct the same accusation as before, when they said, 'He casts out demons by Beelzebub, the prince of demons.' For when they say, 'By what authority are you doing these things?' they doubt the authority of God and want it to be understood that what he does is by the power of the devil. Moreover, they added: Who gave you this authority? They openly deny the Son of God, whom they consider to be not working by his own power, but by the power of others, to perform miracles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
Or in these words they urge the same cavil as above, when they said, He casteth out demons through Beelzebub the Prince of the demons. (Mat. 12:24.) For when they say, By what authority doest thou these things? they doubt concerning the power of God, and would have it understood that the things He does are of the Devil. But when they add, Who gave thee this authority? they most clearly deny the Son of God, whom they suppose to work miracles, not by His own, but by others' strength.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title="Catena Aurea by Aquinas"
