[[commentary]]
quote='''
Who made heaven and earth. This God who made heaven and earth, the sea and all the things that are in them. In comparison with heaven and earth and the sea, we men, according to the condition of the flesh, are as if ants and fleas. He therefore who made heaven and earth, can he not deliver the man whom he made? Who keepeth truth forever. If a lie oppresses us, let us not be saddened: the Lord keepeth truth forever. Someone or other has lied against us, and the one lying is believed more than we who speak the truth. We ought not to despair: the Lord keepeth truth forever. Beautifully he said, keepeth. He keeps it, and holds it in his treasury: he will give back to us what he has preserved. Who keepeth truth forever. Christ is truth: let us speak truth, and truth preserves truth for us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_055.html'
source_title="Homily 55, on Psalm 145"
