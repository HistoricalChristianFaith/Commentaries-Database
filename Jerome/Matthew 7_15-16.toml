[[commentary]]
quote='''
(Verse 15 and following) Beware of false prophets, who come to you in sheep's clothing but inwardly are ravenous wolves. You will recognize them by their fruits. Are grapes gathered from thornbushes, or figs from thistles? It is possible to understand all things, as those who promise one thing in appearance and speech but show another thing in action. But especially, this should be understood about heretics, who seem to clothe themselves in the appearance of piety through continence, chastity, and fasting, but inwardly they have a poisoned heart and deceive the minds of the simple brothers. Therefore, from the fruits of the soul, which drag innocence to ruin, they are compared to ravenous wolves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
What is here spoken of false prophets we may apply to all whose dress and speech promise one thing, and their actions exhibit another. But it is specially to be understood of heretics, who by observing temperance, chastity, and fasting, surround themselves as it were with a garment of sanctity, but inasmuch as their hearts within them are poisoned, they deceive the souls of the more simple brethren.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25207.html'
source_title="Catena Aurea by Aquinas"
