[[commentary]]
quote='''
And he said to me: You are my servant, Israel, in whom I will be glorified. A servant, because although he was in the form of God, he chose to take on the form of a servant (Philippians 2), and Israel, because he was born from the seed of the Jews. And what can be understood about no other servant is joined together: In you I will be glorified (or I will be glorified). For he himself says in the Gospel, Father, glorify your name (John 12:28). He who speaks in the psalm to the Son: Arise, my glory, and arise, psaltery and harp (Ps. 56:9), that is, the chorus of all virtues. But when I said these things to my Father, I responded to him: How have you been glorified in me, Father, because I have labored in vain, and I have not been able to bring back a great part of the Jewish people to you? But all these things are said in order to show the free will of man. For it is God's job to call and our job to believe; and if we do not believe immediately, it does not mean that God is impossible; but he leaves his power to our free will so that the righteous will receive the reward of their will.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
