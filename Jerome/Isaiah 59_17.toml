[[commentary]]
quote='''
But God has strengthened him with his arm and righteousness, and confirmed him with mercy, so that those who desire to turn from error may be saved not by their own merit, but by God's mercy. Finally, he has put on the armor of righteousness, and the helmet of salvation, and the garments of vengeance, and has wrapped himself in the cloak of zeal. Thus, armed, he has gone forth to battle, to exact vengeance upon his enemies. Without a doubt, this signifies the Jews, who persist in blasphemies, and the Roman army surrounding their enemies. When they are conquered, the Lord is shown to have fought. Paul used this testimony when writing to the Ephesians, and wanting us to put on the armor of Christ, by which we may be able to resist the fiery darts of the devil. And this is not found in the Septuagint: He will repay the islands, that is, he means the cities of Judea, which the Roman army devastated. For also above, the Lord speaks to the inhabitants of the island, that is, to Jerusalem, through the Prophet.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
