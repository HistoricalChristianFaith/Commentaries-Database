[[commentary]]
quote='''
He will feel within himself that which is written: The powerful endure torments powerfully. And: To whom much is given, much will be demanded from him. Therefore, it is specifically said to priests that if they refuse to listen and hold it in their hearts, so as to give glory to the name of the Lord through good conduct; but on the contrary, his name is cursed among the nations because of them, he will send upon them poverty of all good things, and will turn their blessings into a curse. Those who abuse their health for pleasure, and turn their wealth into luxury, and tarnish their good reputation with impure conduct, they change the blessings of God into curses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Malachi.html'
source_title="Commentary on Malachi 2:1-2"
