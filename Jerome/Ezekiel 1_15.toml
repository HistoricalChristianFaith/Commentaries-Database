[[commentary]]
quote='''
All things celestial and terrestrial, and whatever falls under human understanding, are turned by the wheels of the Sun. The Sun travels through its yearly circle, with the Moon coursing through each month. The Morning Star itself, known as Lucifer, as it twinkles from East to West, tempers the darkness of the night with a small light and completes its course in two years. The four other wandering stars, called planets, and everything that shines in the sky, as well as the varieties of crops, trees, and herbs, follow their courses in four seasons on their own respective wheels; and we behold nothing that has not existed before. The spirit moves by whirling and returns to its own circles. All rivers run into the sea, yet the sea is not full (Ecclesiastes 1:6-7). Why? Because they return to their sources from the deep abyss. But of the Gospels, that is, of the four living creatures that breathe, live, and understand, if anyone considers the wheel and its course, in a short time he will see the world to be complete with the Apostolic proclamation. The wheel is also within a wheel, or the joining of the two Testaments, which indicates the ladder of Jacob (Genesis 28) and the prophetic word of Isaiah (Isaiah 6) and the double-edged sword. Or it represents the harmonious Gospels whose course and stature tend towards heaven and touch the earth only briefly, always hastening towards the heights.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
