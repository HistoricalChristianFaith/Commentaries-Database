[[commentary]]
quote='''
(Verse 26) But if we say, From men, we are afraid of the multitude: for all held John as a prophet. If they had wanted to say that it was a human invention and had nothing divine, they feared the rebellion of the people. For all the crowds had received John's baptism in groups, and they held him as a prophet.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
But should they reply that it was an invention of human device, and had in it nothing divine, they feared a tumult among the people. For all the assembled multitudes had received John's baptism, and held him accordingly for a Prophet.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title="Catena Aurea by Aquinas"
