[[commentary]]
quote='''
'Let the enemy pursue my soul, and take it.' 'The last enemy, death, is destroyed.' 'And let him tread down my life into the earth.' Life cannot be trodden down. 'And let him bring down my glory into the dust.' 'If,' he says, 'I have rendered evils to my enemies for evils, may I not rise again.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
