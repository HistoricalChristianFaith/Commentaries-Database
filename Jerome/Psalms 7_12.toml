[[commentary]]
quote='''
And so many say that this is said of the devil; that is, unless ye be converted, unless ye do penance, ye will be in his power. 'He hath bent his bow, and made it ready.' The devil always has his bow ready, he shoots arrows with which to strike us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
