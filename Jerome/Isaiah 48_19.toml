[[commentary]]
quote='''
And what follows: and your offspring would have been like the sand, and the descendants of your womb like its grains: indeed, it seems to remain in the Jewish people, who to this day, like worms, produce children and grandchildren; but how is this to be understood in terms of the promise, when they do not have peace and righteousness? For either he is angry with them, or appeased. If he is angry, how is his seed multiplied every day? If he is appeased, how do they serve and not possess peace and justice? From this it is clear that it is said now of the apostolic seed, of which we also read above: Unless the Lord of hosts had left us seed, we would have become like Sodom. And because it seems at that time not to have been fulfilled, it is fulfilled in the coming of Christ: and before his face the seed of Israel remains.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
