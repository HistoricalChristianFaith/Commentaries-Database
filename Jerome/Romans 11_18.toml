[[commentary]]
quote='''
Believe me: as often as I see synagogues, I always have in my mind that which is said by the apostle, that we ought not to exult over the olive tree whose branches were broken, but to fear; since if the natural branches were cut off, how much more should we, who are grafted in from the wild olive, fear lest we become like our fathers, "a generation crooked and provoking, a generation which did not direct its heart, and whose spirit was not held faithful with God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_011.html'
source_title="Homily 11, on Psalm 77"
