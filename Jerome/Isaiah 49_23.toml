[[commentary]]
quote='''
Then they shall bring in their arms, or on their shoulders, the sons of Zion, and her daughters shall be carried on their shoulders. Such was Lazarus, and all the saints who rest in the bosom of Abraham, and the souls of the believers, to whom the Apostle Paul spoke: I have fed you with milk.… The queen stood at your right hand in a gold embroidered garment; she nourishes Christ's little ones daily, and leads them to perfect age: and every age, sex, and dignity, will adore Zion because of Him who dwells in it. For if Christ is the head of the Church, the head is worshiped in the body. And if it is said to some: Exalt the Lord our God, and worship at the footstool of His feet (not that the footstool is to be worshiped; but that the majesty of His feet is revealed), why should not the Church, which embraces the whole body of Christ, be worshiped? And what follows: and they shall lick the dust of thy feet, signifies that kings and princes should wipe and wash away with their words whatever earthly work adheres to the feet of the Church.… Through all these things the Church learns that there is no other Lord besides Him, and those who have awaited Him will possess eternal glory.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
