[[commentary]]
quote='''
(Verse 35) A good man brings forth good treasures. And an evil man brings forth evil treasures. Either it shows the Jews themselves blaspheming the Lord, from what wicked treasure they bring forth blasphemies, or with the previous question, the opinion clings that just as a good man cannot bring forth evil things, nor can an evil man bring forth good things, so Christ cannot do evil things, and the devil cannot do good works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
What He says, The good man out of the good treasure of his heart, & c. is either pointed against the Jews, that seeing they blasphemed God, what treasure in their heart must that be out of which such blasphemy proceeded; or it is connected with what had gone before, that like as a good man cannot bring forth evil things, nor an evil man good things, so Christ cannot do evil works, nor the Devil good works.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
