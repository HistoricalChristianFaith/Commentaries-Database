[[commentary]]
quote='''
It is remarkable how he spoke to dry bones, which before nerves, flesh, and skin, and the life-giving spirit of God, could hear his word. And first, the bones are bound together with the ligaments of the nerves, then they are filled with flesh, and the skin is stretched over them for beauty, which covers the ugliness of the exposed flesh; and then they receive breath, which makes them alive, and after they have lived, then they know that He is the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
