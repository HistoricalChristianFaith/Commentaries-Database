[[commentary]]
quote='''
(Verse 12) But he answered and said, Amen I say to you, I do not know you. The Lord knows those who are His, and those who do not know, will not be known (2 Timothy 2:19). The Lord does not know the workers of iniquity: and although they may be virgins, and boast of their bodily purity and true confession of faith (1 Corinthians 14:38); yet because they do not have the oil of knowledge, it is enough for them as punishment that they are unknown by the Bridegroom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
For the Lord knoweth them that are his, (2 Tim. 2:19.) and he that knoweth not shall not be known, and though they be virgins in purity of body, or in confession of the true faith, yet forasmuch as they have no oil, they are unknown by the bridegroom.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title="Catena Aurea by Aquinas"
