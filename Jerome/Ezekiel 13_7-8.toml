[[commentary]]
quote='''
Under the guise of prophets, this speech is against heretics, who speak empty words and see falsehood, and they persist in establishing their own doctrine. May the Lord Himself come against them and rise up, and may He stretch out His hand against them to strike, and may He not hold back in sparing them. And He threatens that they will not be among the assembly of the people of the Lord in the future, nor in His Church, but in the synagogue of the devil, nor will they be written in the house of Israel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
