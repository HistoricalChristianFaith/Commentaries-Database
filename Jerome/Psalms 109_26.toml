[[commentary]]
quote='''
Save me according to your mercy. He says also in the Gospel: "I have power to lay down my soul and to take it up again." And again: "No one takes it from me." And how does he ask for mercy? He himself asks for mercy, and he himself bestows it; he himself as man asks, and as God bestows.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_035.html'
source_title="Homily 35, on Psalm 108"
