[[commentary]]
quote='''
Therefore, the Lord who judges those who oppressed Zion, whether he judges their judgement or liberates the children of those who were captured by the giant, he will save and feed his adversaries with their own flesh, and he will make them drunk with wine, so that they will be satisfied not with the death of others, but with their own death. And those who are flesh, because they have lost God's spirit, let them feed on their own flesh. Indeed, the Holy One speaks of this in the Psalms: When those who afflict me come near, to devour my flesh. For it is not the incorporeal spirit, but the flesh that is devoured by the bites of fierce beasts. And then Zion will say: truly all flesh that sees the salvation of God, that the Redeemer and Savior is the one who struggled with Jacob, or the one who helped the strength of Jacob: so that in his suffering, he would bless those who crucify him: Father, forgive them: for they do not know what they are doing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
