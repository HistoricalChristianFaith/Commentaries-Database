[[commentary]]
quote='''
Like ointment upon the head, which runs down upon the beard, the beard of Aaron. Oh, if there were time for us to discuss each detail, a day could not suffice us. We read in Exodus how the priestly ointment is prepared; then we read how there was another ointment, with which the kings were anointed. There was also another ointment with which the prophets were anointed. And why do I say more? All the ointments had their own distinctions and mysteries. Do we marvel about holy persons? A leper, after he has been cleansed, after he has been sprinkled with hyssop and with the blood of a bird, and one bird is released into the wilderness, he too has his own proper ointment. Nothing is sanctified except through ointment. Therefore the young maidens also say in the Song of Songs: "Thy name is ointment poured out. After thee we will run in the fragrance of thy ointments."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_045.html'
source_title="HOMILIES ON THE PSALMS 45 (Psalm 132)"
