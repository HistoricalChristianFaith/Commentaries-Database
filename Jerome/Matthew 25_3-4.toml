[[commentary]]
quote='''
The virgins that have oil are they who, besides their faith, have the ornament of good works; they that have not oil, are they that seem to confess with like faith, but neglect the works of virtue.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
Virgins have oil, who are adorned with faith and good works. Those who appear to confess the Lord with a similar faith do not have oil; but they neglect the works of virtue.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
