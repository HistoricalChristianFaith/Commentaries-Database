[[commentary]]
quote='''
In his sight the malignant man is brought to nothing. See what he says. In his sight the malignant man is brought to nothing. Even if he is an emperor, even if he is a prefect, even if he is a bishop, even if he is a presbyter (for in the church these are the dignities), whoever is evil is counted for nothing in the sight of the holy man. And at once there follows, But he glorifies those who fear the Lord. This holy man, who enters without stain, who despises the powerful who are evil, if he sees anyone fearing God, though he be poor, yet him he glorifies. He who swears to his neighbor, and does not deceive. And here too we ought to understand "neighbor" as above.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_005.html'
source_title="Homily 5, on Psalm 14"
