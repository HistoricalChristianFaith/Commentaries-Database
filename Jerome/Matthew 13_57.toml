[[commentary]]
quote='''
(Verse 57.) But Jesus said to them: A prophet is not without honor, except in his own country and in his own house. It is almost natural for citizens to envy each other. For they do not consider a man's present deeds, but they remember his fragile infancy, as if they themselves had not also passed through the same stages of age to mature adulthood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
For it is almost natural for citizens to be jealous towards one another; for they do not look to the present works of the man, but remember the frailties of his childhood; as if they themselves had not passed through the very same stages of age to their maturity.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
