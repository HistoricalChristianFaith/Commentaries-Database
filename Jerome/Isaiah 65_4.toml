[[commentary]]
quote='''
But what is read in the Septuagint, which is not found in Hebrew, is to be understood in the sense that, according to the letter and the spirit, demons do not exist, because they have already fallen from God, who truly is. Nor do heretical sects, which hold no truth, but pass away and perish like shadows. Hence Esther also speaks to the Lord: Do not give your inheritance to those who do not exist. And the saint prays in the psalm: Forgive me, so that I may be refreshed before I depart and no longer exist (Ps. XXXVIII, 14). For whoever, while living in this body, has not obtained the forgiveness of sins, and thus departs from life, perishes to God and ceases to exist, although they may continue to exist in punishment. … We must understand fury, forgetfulness, anger, repentance in God in the same way as we understand feet, hands, eyes, ears, and other bodily members which are said to belong to an incorporeal and invisible God. Not in the sense that these perturbations are open to Him, Who, by His gift of grace, extinguishes them in us, but in the sense that we understand by our words the affection of God toward us. For anger is not defined in God as it is in men, who find its material in our vices rather than in the will of the Lord, Who will heap His anger on us on the day of wrath and of the revelation of His just judgment, to burn up our thistles, thorns, and tares, which we have brought forth instead of the seed of God, and also the wood, hay, and stubble which we have built on the foundation of Paul (I Cor. 3). We read of this perpetual fire in the song of Moses: A fire is kindled in my anger, and shall burn unto the lowest hell. It shall consume the earth and its produce, and shall burn the foundations of the mountains, and my arrows shall pierce them (Deut. XXXII, 22). The meaning of this testimony is that the fire of God's wrath always burns against sinners and pursues them even to the depths of hell.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
