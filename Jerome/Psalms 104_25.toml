[[commentary]]
quote='''
This great and spacious sea with its arms. Is this not a matter of wondrous wisdom, how in the sea there are creeping things beyond number, and fish both greater and smaller: and how they are in the deep, and there draw their life, where, if a man should fall in, he dies, while they themselves, if they come onto the land, die?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"
