[[commentary]]
quote='''
This chapter, sticking with the previous testimony, in which he said: Not one iota, or one apex, will pass from the Law, until all things are fulfilled. Therefore, he seals the Pharisees, who, despising the commandments of God, establish their own traditions, which do not benefit them in teaching the people if they destroy even a small thing that is commanded in the Law. However, we can also understand that the education of teachers, even if subject to a small sin, leads them down from the highest rank, and it does not benefit them to teach righteousness, which the smallest fault destroys. And let perfect happiness be to fulfill with action what you have taught in words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
