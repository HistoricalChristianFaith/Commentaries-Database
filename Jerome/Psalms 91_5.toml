[[commentary]]
quote='''
You shall not fear the terror of the night. The devil is always in darkness: "that he may strike," he says, "the innocent in secret." You see, therefore, that whoever is simple and innocent is always struck in secret. You shall not fear the terror of the night. What he says is this: Although you may be in terror, which is night, nevertheless you shall not fear, because you have the shield of truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="Homily 20, on Psalm 90"

[[commentary]]
quote='''
Of the arrow that flies by day. To this sense there seems to be, as it were, a contradiction: Of the arrow that flies by day. The flying arrow of the devil seems to me to be the discourse of the heretics and philosophers. For these too promise the light of knowledge, and say that they have day; and they cannot deceive unless they promise light. But that light which they promise is from burning arrows. And therefore it is said, Of the arrow that flies by day.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="Homily 20, on Psalm 90"

[[commentary]]
quote='''
You shall not fear from the terror of the night. The just man has no terror of the night, but of the day. "Come, children, hear me, I will teach you the fear of the Lord." Those who are the children of the prophets have no terror of the night, nor of the darkness, but of the light and of the day. "That they may shoot in secret at the upright of heart." The devil does not send his arrows in the day, lest he be seen. For everything that is done in the light is made manifest by the light.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"

[[commentary]]
quote='''
But someone may say: If the devil does not shoot in the day, how then in the following little verse does the psalmist say, From the arrow that flies by day? What is this arrow that flies by day? It is the teaching of the heretics: which, as it were through the day—that is, the law of God—flies here and there, while they anxiously gather up testimonies searched out against us, which by their own interpretations they corrupt away from the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"
