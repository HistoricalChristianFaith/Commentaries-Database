[[commentary]]
quote='''
Fill their faces with shame, that they may be confounded. Why this? And they shall seek your name, O Lord. You see, then, that he prays not against them, but for their salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"
