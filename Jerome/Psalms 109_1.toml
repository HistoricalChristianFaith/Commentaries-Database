[[commentary]]
quote='''
To the end, a psalm of David. When it says "to the end," let us understand that it is spoken not of the present, but of the future. And if it is spoken of the future, then the prophecy is about Christ.

O God, do not keep silent about my praise. That is: Judas betrayed me, the Jews persecuted me and crucified me, and they thought that they would destroy me utterly, to the end. But you, O God, do not keep silent about my praise. All the churches, day by day, praise the Lord, and the prayer of the Lord has been fulfilled, when he said: O God, do not keep silent about my praise. See of what dignity the priests are. The priests speak: and in the priests God does not keep silent about the praise of his Son.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_035.html'
source_title="Homily 35, on Psalm 108"
