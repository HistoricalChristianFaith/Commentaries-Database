[[commentary]]
quote='''
You will send forth your spirit, and they shall be created. On the day of consummation. If the Spirit creates, therefore he is God: for he creates in the same way as the Father also does.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"
