[[commentary]]
quote='''
And after seven full weeks of festivity and joy, the first day of the Octave begins, which is the Day of Resurrection, and it brings us close to the temple. For when we have done all things, repenting for our previous errors, then we become neighbors and close to God, so that in the outer atrium, the order of creatures teaches us knowledge of the Creator with constancy, and in the inner atrium true jubilation, in which all our debts are forgiven, instructs us in the theology, and introduces us to the Holy of Holies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
