[[commentary]]
quote='''
[Daniel 10:16] "O my lord, at the sight of thee my joints are loosed..." Theodotion interprets it this way, in accordance with what we read in the One Hundred and Second Psalm: "Bless the Lord, O my soul, and all that is within me, bless His holy name." (Psalm 103:1) For our inward nature must direct its gaze without, before we deserve to behold a vision of God; and when we actually have beheld a vision of God, then our inward nature is converted within us and we become wholly of the number of those concerning whom it is written in another Psalm: "All the glory of the daughter of kings is within, in golden borders" (Psalm 45:13).
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title="St. Jerome, Commentary on Daniel, CHAPTER TEN"


[[commentary]]
quote='''
Bless the Lord, O my soul, and all that is within me, bless his holy name. It is said also in another place: "Know that the Lord himself is God." And now it is said, And all that is within me, bless his holy name. If we have said, Bless the Lord, O my soul, and the Lord is Lord, what name of the Lord does he seek here? If he is called Lord, the Lord, why does he say, And all that is within me, bless his holy name? The coming of the Son is the name of the Father. Before the coming of Christ, God was known, but the Father was unknown. Indeed, he himself says in the Gospel: "Father, I have revealed your name to men." We cannot linger over each individual little verse, since the psalm is long; but we ought to fit brief little remarks to the individual verses, expounding the sense rather than weaving together the words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_029.html'
source_title="Homily 29, on Psalm 102"
