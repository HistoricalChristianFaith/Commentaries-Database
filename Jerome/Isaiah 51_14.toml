[[commentary]]
quote='''
My son will come quickly, treading on and trampling your adversaries, to open for you the way of victory: whether to open the abyss, which he will not destroy until complete annihilation; but he desires to save the converted. Finally, the bread of him, who is interpreted by the Gospel, the teaching proving, will never fail, but will always be open to those willing to partake.… Symmachus, in that place where we said, "He will come quickly, walking to open," and he will not kill until extermination, he interpreted it thus: Hell will open quickly, and he will not die into corruption. Christ is understood, who speaks in the fifteenth psalm: You will not abandon my soul to hell, nor will you allow your Holy One to see corruption.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
