[[commentary]]
quote='''
But as he says: My eye will not spare you, and I will not have pity, like a most merciful physician who wants to cut away putrid flesh and burn festering wounds with a cauterizing iron, he does not spare in order to spare; he does not have pity in order to have more pity; so that nothing putrid and corrupting remains in the body to infect the living flesh nearby. The Lord strikes those whom he loves, and he chastises every son whom he receives. Of this understanding, it is said: I will strike and I will heal. For every medicine has bitterness in the beginning, but afterwards the fruits of pain are revealed, and health is shown. This is what God speaks through Amos: 'Because I have known you from all the tribes of the earth, therefore I will avenge upon all your sins.' For the Lord knows those who belong to Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
