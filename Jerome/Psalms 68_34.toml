[[commentary]]
quote='''
Behold, he will give to his voice a voice of power; his magnificence is over Israel. The magnificence of God is in Israel, who sees God. And his power is in the clouds, that is, in the prophets and apostles. "I have commanded my clouds, that they rain no rain upon Israel."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
