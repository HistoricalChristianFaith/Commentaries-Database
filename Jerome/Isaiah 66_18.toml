[[commentary]]
quote='''
By horses, and chariots, and litters, and mules and wagons, and vehicles of various kinds, we can understand Angelic ministries, of which elsewhere it is said to God: Ascend upon your horses, and your riding is salvation (Hab. 3:8). With these horses, chariots, and chariots, Elijah was taken up to heaven, and Elisha showed himself to be surrounded and protected by them, demonstrating to the unaware boy (2 Kings 2). And Zacharias saw in the night: Behold a man ascending upon a red horse, and he stood in the midst of two shady mountains: and after him there were red, black, and white horses. And I said: What are these, my Lord? And he said to me: I will show thee what these are. And the man that stood in the midst of the mountains answered, and said to me: These are they, whom the Lord hath sent to walk through the earth (Zach. I, 8-10). John also testifies in the Apocalypse that he saw these things: I saw heaven opened, and behold, a white horse: and he who sat upon it was called Faithful and True, and in righteousness he judges and makes war. His eyes are like a flame of fire, and on his head are many diadems; and he has a name inscribed which no one knows but himself. He is clothed in a robe dipped in blood, and the name by which he is called is The Word of God. And the armies of heaven, arrayed in fine linen, white and pure, followed him on white horses. From his mouth issues a sharp sword with which to smite the nations (Rev. 19:11-15). The Lord and Savior was sitting on a red horse, assuming a human body, to whom it is said: Why are your garments red? And: Who is this that comes from Edom, with dyed garments from Bozrah (Isaiah 63:2). And there followed him horses of various colors, either red in martyrdom, or starlings in flight, or varied in virtues, or white in virginity. But he was sitting on a white horse when he took on an immortal and incorruptible body after the resurrection. And whoever followed him used white horses, clearly with incorruptible and immortal bodies. It would take a long time, if we wanted to explain both testimonies: I will only say this, that the different vehicles by which people are led to faith are angels, or holy men who have progressed from being human to being angels. That each of us has angels is taught by many Scriptures, among which is this: Do not despise one of these little ones, for their angels behold the face of the Father who is in heaven (Matthew 18:10). And when Rhoda, a girl, announced that Peter was at the door, others believed that he was his angel (Acts 12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
