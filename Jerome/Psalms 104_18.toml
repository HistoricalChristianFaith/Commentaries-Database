[[commentary]]
quote='''
The high mountains for the stags. This animal kills serpents and eats them. Therefore it fittingly dwells in the mountains, this one that slays the intelligible serpent — the one who was wiser in paradise than all the beasts, who deceived Eve. The rock is a refuge for the hedgehogs. He who is timid has the rock as his refuge: and the rock is Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"
