[[commentary]]
quote='''
Son of man, see with your eyes, and hear with your ears (Zech. XI): not with the eyes of the flesh, but with the spirit; not with the ears of the body, but with the soul. Lift up, he says, your eyes, and see that the fields are already white for harvest (John 4:35). And: He who has ears to hear, let him hear (Luke 8:8). The construction of the city is visible, and the order of the ceremonies and priests, and the description of the land can be heard.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"


[[commentary]]
quote='''
But it is not enough to command to see with the eyes and hear with the ears; but he added: And place your heart in all things; or, place in your heart all that I will show you. For nothing is of benefit to have seen and heard, unless you place those things that you have seen and heard in the treasure of memory. When, however, he says, 'all things that I will show you', he makes the listener attentive, and he prepares the eyes of the heart, so that he may hold in his memory those things that are to be shown to him, for you have been brought here so that all things may be shown to you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
