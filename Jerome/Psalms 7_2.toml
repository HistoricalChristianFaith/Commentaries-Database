[[commentary]]
quote='''
'Lest at any time he seize my soul like a lion.' This fits Saul, it does not fit Absalom. For how could he call Absalom a lion, of whom he says, 'Spare my boy Absalom'? If there he calls him a boy, and as it were a little child and one that knows nothing, how here does he proclaim him a lion? This, so far, according to the history. And there are many things that might be said, and the whole psalm can be interpreted historically in the person of Saul. But since it is our concern to interpret not only according to the history, but according to the spiritual understanding, we interpret this Chusi the Ethiopian as none other than the devil. It is asked how this Chusi is the son of Jemini, how the devil, an Ethiopian, is the son of the right hand. That he is an Ethiopian, is by his own fault; that he is the son of the right hand, is because he was created by God. Rightly is it said of him: 'Lest at any time he seize my soul like a lion.' 'Our adversary the devil, like a roaring lion, seeking whom he may seize.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
