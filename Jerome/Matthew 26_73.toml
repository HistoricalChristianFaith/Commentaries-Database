[[commentary]]
quote='''
(Verse 73.) Truly, you are also one of them: for even your speech gives you away. Not that Peter spoke a different language or came from a foreign nation. For all of them were Hebrews, both those who accused and those who were accused. But each province and region has its own peculiarities, and cannot avoid the sound of their native language. Hence, even the Ephraimites in the Book of Judges (chapter 12) could not pronounce the word σύνθημα.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
Not that Peter was of a different speech or nation, but a Hebrew as his accusers were; but every province and every district has its peculiarities, and he could not disguise his native pronunciation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"Certainly you are also one of them, for your accent betrays you." Not that Peter spoke a different language or belonged to a foreign nation … but since each province and region had their own characteristics and vernacular, one could not help having a certain sound to his speech. For instance, the Ephrathites in the book of Judges cannot pronounce the word synthema.
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 4.26.72-75"
