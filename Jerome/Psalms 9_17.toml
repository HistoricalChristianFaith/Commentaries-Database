[[commentary]]
quote='''
We ought to understand the whole psalm as being about the death of the Savior. Concerning the calling of the Gentiles: 'All the nations that forget God.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_004.html'
source_title="Homily 4, on Psalm 9"
