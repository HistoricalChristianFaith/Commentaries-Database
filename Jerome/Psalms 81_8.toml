[[commentary]]
quote='''
Hear, my people, and I will testify to you. God is speaking to us. Whatever he said to the people, he speaks also to us. Israel, if you will hear me. Why do you ask that I hear you? Let us see what he commands.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_013.html'
source_title="Homily 13, on Psalm 80"
