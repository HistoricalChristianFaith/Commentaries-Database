[[commentary]]
quote='''
The Jews, separating this chapter from the previous ones, want to refer it to Isaiah, who says he received a word from the Lord about how to sustain and call back the weary and wandering people to salvation. And, in the manner of little children who are instructed in the morning hours, let him hear what the Holy Spirit says.… Therefore, concerning the person of the Lord, in whom also the previous book ends, these things must also be mentioned: that, according to the arrangement of the assumed body, he was trained and acquired the language of learning, so that he would know when he should speak and when to be silent. Finally, he who was silent in his suffering now speaks through the Apostles and the men of the Apostolic age throughout the whole world.… To this was added an ear through grace, which he did not have by nature: so that we understand that ears should not be received from the body, but from the mind, about which the Lord also spoke in the Gospel: He who has ears to hear, let him hear (Luke VIII, 8). The discipline and education that opened his ears, so that he might transmit the knowledge of the Father to us; who did not contradict him, but became obedient even unto death, and death on a cross (Philippians 2). So that he would offer his body or back to the blows; and his chest, capable of receiving the scourges of God, would not turn away from the blows. It is clear that he endured this from the minister of the chief priests: so that both the Jewish people and the priests would mock him. He who was struck and spat upon did not blush, but was led to the victim like a lamb; and like a sheep before the shearer, he did not open his mouth. But what the Son heard from the Father regarding the mystery of his assumed body, we learn more fully in the Gospel, where he himself says: And he who sent me, the Father, has given me a commandment, what I should say and what I should speak. And again: As I hear, I judge.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
