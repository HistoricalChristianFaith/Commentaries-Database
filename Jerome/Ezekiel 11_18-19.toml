[[commentary]]
quote='''
And when you have entered, you shall remove all idols, because of which you have offended God, and I will give you a unified heart of fear and servitude to God, so that you may not serve diverse idols, or any other than what you had before. And I will give a new spirit in your midst, according to what is written: Create in me a clean heart, O God, and renew a right spirit within me (Psalm 51:12). And I will remove from you a heart of stone, that is, a hard heart, according to what Stephen, the first martyr in Christ, spoke: Stiff-necked and uncircumcised in heart (Acts 7:51). And the heart of Pharaoh was hardened, and he would not let the people of Israel go (Exod. VII). And I will give them a heart of flesh, a soft and tender heart, that they may receive the commandments of God, so that they may be written on the tablets of their carnal hearts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 3:11.17-21"
