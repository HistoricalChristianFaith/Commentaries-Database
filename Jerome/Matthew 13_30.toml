[[commentary]]
quote='''
In that He says that the bundles of tares are to be cast into the fire, and the wheat gathered into barns, it is clear that heretics also and hypocrites are to be consumed in the fires of hell, while the saints who are here represented by the wheat are received into the barns, that is into heavenly mansions.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
But what is said, 'Lest while you gather up the tares, you root up also the wheat together with them,' gives place to repentance, and we are warned not to cut off our brother immediately, because it may happen that he who is corrupt in his understanding today, may tomorrow begin to be sound and to defend the truth. Also that which follows: 'Allow both to grow until the harvest,' seems to be contrary to this precept: 'Take away the evil from among you'; and there is to be no fellowship with those who are called brethren, and are adulterers and fornicators. For if eradication is prohibited, and patience must be maintained until the harvest, how are certain ones to be expelled from among us? Between wheat and weeds, which we call darnel, as long as it is grass and the stem has not yet come to the ear, there is a great similarity, and in distinguishing, either no difference or a very difficult one. Therefore, the Lord warns us not to quickly pronounce judgment when there is any ambiguity, but to reserve the judgment of God: so that when the day of judgment comes, he may expel not suspicion of crime, but a clear guilt from the assembly of the saints.

But what he said, that the bundles of weeds are to be burned with fire, and the wheat is to be gathered into barns, it is clear that the heretics and hypocrites are to be burned with the fires of hell; but the saints who are called wheat are to be received into the barns, that is, the heavenly mansions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
