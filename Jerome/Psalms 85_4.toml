[[commentary]]
quote='''
Turn us, O God of our salvations. See what he says. You, for Your part, have turned away from wrath on account of Your clemency. Turn us, O God. You have turned away from wrath; turn us away from sins. Turn us, O God of our salvations. Why did he not say, "of our salvation," but, "of our salvations"? If we sinned but once, we would need one salvation. We have sinned in many things, therefore we need many salvations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_017.html'
source_title="Homily 17, on Psalm 84"


[[commentary]]
quote='''
Convert us, O God of our salvations. He did not say, "of our salvation": because we have sinned much, we have need of many salvations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_064.html'
source_title="Homily 64, on Psalm 84 (Alternate Series)"
