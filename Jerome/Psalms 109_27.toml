[[commentary]]
quote='''
And let them know that this is your hand, and you, O Lord, have made it. What is it that he says, And let them know that this is your hand, and you, O Lord, have made it? Let the Jews understand that they did not prevail against me by their own strength: but my will and your will was done, that I should suffer. And I willed to suffer; therefore I say, according to what I am as man: "My God, I willed to do your will." And your will was also mine, that I should suffer. It was not, then, their treacheries and strength that brought it about: but I and you willed that I should suffer. For you struck your shepherd, and the sheep were scattered. This is written in Zechariah: "I will strike the shepherd, and the sheep will be scattered." That I should suffer, was my will and yours. What you willed, I too willed. The scandal had to come, but woe to him through whom it comes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_035.html'
source_title="Homily 35, on Psalm 108"
