[[commentary]]
quote='''
It seems that what he said elsewhere runs counter to this point: “Abraham desired to see my day. He saw it and rejoiced.” He did not say all the prophets and righteous people desired to see what you see, but many. Among many it may be that some see and some do not see, although in our interpretation we seem to be making a distinction between the merits of the saints. Therefore Abraham saw dimly as though in a mirror, but you now have and hold your Lord and question him freely and eat with him.
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 2.13.17"

[[commentary]]
quote='''
This place seems to be contradicted by what is said elsewhere. Abraham rejoiced to see my day, and he saw it, and was glad. (John 8:56)

But He said not, 'The Prophets and the just men,' but many; for out of the whole number, it may be that some saw, and others saw not. But as this is a perilous interpretation, that we should seem to be making a distinction between the merits of the saints, at least as far as the degree of their faith in Christ, therefore we may suppose that Abraham saw in enigma, and not in substance. But ye have truly present with you, and hold, your Lord, enquiring of Him at your will, and eating with Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
