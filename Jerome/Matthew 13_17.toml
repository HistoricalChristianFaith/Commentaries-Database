[[commentary]]
quote='''
(Verse 17, 18.) Truly I say to you, many prophets and righteous men desired to see what you see, and did not see; and to hear what you hear, and did not hear. Therefore, listen to the parable of the sower. It seems that this passage is contrary to what is said elsewhere: Abraham desired to see my day, and he saw it, and rejoiced (John 8:56). However, it is not said that all the prophets and righteous men desired to see what you see, but many. Among many, it can happen that some have seen it, while others have not seen it: although even in this interpretation is dangerous, as we seem to make any discretion among the merits of the saints. Therefore Abraham saw in an enigma, he did not see in form: but you hold him in the present, and you have your Lord, and you question him at will, and you dine with him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
This place seems to be contradicted by what is said elsewhere. Abraham rejoiced to see my day, and he saw it, and was glad. (John 8:56)

But He said not, 'The Prophets and the just men,' but many; for out of the whole number, it may be that some saw, and others saw not. But as this is a perilous interpretation, that we should seem to be making a distinction between the merits of the saints, at least as far as the degree of their faith in Christ, therefore we may suppose that Abraham saw in enigma, and not in substance. But ye have truly present with you, and hold, your Lord, enquiring of Him at your will, and eating with Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
