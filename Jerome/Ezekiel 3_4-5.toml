[[commentary]]
quote='''
(Verse 5, 6.) For you are not being sent to the people of deep and difficult language, to the house of Israel, nor to many people of unknown language, whose language you cannot understand. And if I were to send you to them, they would listen to you. Because they do not want to come to you, you go to them. For they do not have a need for a healthy doctor, but for ones who are sick (Luke 5:31). Nor can you say: I cannot speak to them, because they speak a different language, and we are barbarians to each other, and we cannot understand each other's speech. What shall I speak of one people? If I were to send you to different nations, nevertheless my authority and power would conquer all difficulty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
