[[commentary]]
quote='''
Therefore, Isaiah delivers the judgment of God's word: 'Listen to the word of the Lord of Hosts: A time will come when all these things that are in your house, acquired not by your own labor but by the labor of your fathers, will be transferred to Babylon, and from your descendants they will become eunuchs in the royal palace.' From where the Hebrews want Daniel, Hananiah, Mishael, and Azariah, who were of royal descent, to become eunuchs, it is beyond doubt that they served in the ministry of King Nebuchadnezzar. So Hezekiah said: It is a good word of the Lord that he has spoken. In this, he is criticized by the Hebrews for not imitating the goodness of Moses, who said to the Lord: Either forgive them this crime, or if you do not, then erase me from your book which you have written (Exodus 32:32). And so the Apostle Paul wishes to be accursed from Christ for his brethren who are Israelites (Rom. IX); and therefore, Hezekiah was not approved by God in His words who spoke in the following: 'Console, console my people,' says your God, so that by whom He had not prayed, they may be consoled by the mercy of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
