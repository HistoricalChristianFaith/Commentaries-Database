[[commentary]]
quote='''
I will hope in Him, for He Himself shall deliver me from the snare of the hunters. In this world there are many hunters who long to capture our souls, just as is said by the prophet: "Our soul has been snatched away like a sparrow from the snare of the hunters." Now that hunters are taken in a sinister sense in the holy Scriptures, we have already said often. For that Nimrod, the giant, always a rebel against God, was a hunter. Esau too was a hunter. For He Himself shall deliver me from the snare of the hunters. We read in Proverbs: "The eye of the harlot is the snare of the sinner." "For whoever shall look upon a woman to lust after her has already committed adultery with her in his heart." As many as are the sins, so many are the snares; as many as the snares, so many the hunters. The doctrines of the heretics are the snares of death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"
