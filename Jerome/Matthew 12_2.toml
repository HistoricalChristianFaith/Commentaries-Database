[[commentary]]
quote='''
(V2.) But the Pharisees, seeing this, said to him: Behold, your disciples do what is not lawful for them to do on the Sabbath. Note that the first apostles of the Savior destroy the letter of the Sabbath against the Ebionites, who, while accepting the other apostles, reject Paul as a transgressor of the law.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
Observe, that the first Apostles of the Saviour broke the letter of the sabbath, contrary to the opinion of the Ebionites, who receive the other Apostles, but reject Paul as a transgressor of the Law.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
