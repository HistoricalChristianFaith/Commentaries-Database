[[commentary]]
quote='''
Until his word should come. He speaks of the word of the Lord himself, who set him free. The utterance of the Lord inflamed him. For unless he had been inflamed by the Holy Spirit, he could not have conquered lust. For the Spirit of the Lord inflamed him, and extinguished the fire of lust.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_031.html'
source_title="Homily 31, on Psalm 104"
