[[commentary]]
quote='''
Every heretic dwells in walls and deserts, and believes himself to possess the land of Israel, and says: If Abraham, by his faith alone, came into such great blessedness that his descendants were multiplied like the sand of the sea and like the stars of heaven, how much more will we, who are many, possess the land of Israel, that is, those who see God, and the confession of the Lord's Day? To whom the Lord replied: He deservedly possessed the land of faith; but your infidelity, or rather blasphemy, will not be able to possess the land of Israel, that is, the Church. For first you eat in blood, shedding their blood whom you scandalize. Then you lift your eyes to your impurities or abominations, which you have fixed in your mind: when you ought to imitate the ecclesiastical man, and say: To you I lift up my eyes, you who dwell in heaven (Ps. CXXII, 1). Thirdly, you shed blood, not giving life to those whom you have deceived, but killing them. It is not enough for you to have done these three things, but you stand with your swords, that is, you persevere in the wickedness of your opinions, and you are ready for murder, and you commit abominations, doing those things in your beds which are shameful to speak of, and you defile the wife of your neighbor, namely, the ecclesiastical conversation, eagerly snatching away those who are daily deceived from the embrace of Christ. And when you have done these things, do you think you will possess the land of Israel as an inheritance?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
