[[commentary]]
quote='''
(Verse 32.) For it is written: I will strike the shepherd, and the sheep of the flock will be scattered. But after I have been raised, I will go ahead of you into Galilee. This is also written in different words by the prophet Zachariah; and (if I am not mistaken) it is said by the voice of the prophet to God: Strike the shepherd, and the sheep of the flock will be scattered (Zech. 13:7). In the sixty-eighth Psalm, which is completely devoted to the Lord, this meaning is also in agreement: For those whom you have struck, they have pursued. But the good shepherd is struck, so that he may lay down his life for his sheep; and out of many flocks of errors, one flock is made, and one shepherd (John 10). This testimony is further explained in the book that we wrote about the Best Way of Interpretation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"


[[commentary]]
quote='''
(Verse 31.) Then Jesus said to them: All of you will be scandalized by me in this night. He predicts that they will suffer, so that when they have suffered, they will not despair of salvation, but by repenting, they will be freed. And he specifically added, in this night you will be scandalized; for just as those who get drunk, get drunk at night: likewise those who are scandalized, endure in the night and in darkness (I Thess. 5). But let us say: The night has passed, and the day is at hand (Rom. 13:12).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"


[[commentary]]
quote='''
He foretels what they should suffer, that they might not after it had befallen them despair of salvation; but doing penitence might be set free.

And He adds emphatically this night, (1 These. 5:7.) because as they that are drunken are drunken by night, so they that are scandalized are scandalized by night, and in the dark.

This is found in Zacharias in words different; it is said to God in the person of the Prophet, Smite the shepherd, and the sheep will be scattered abroad. (Zech. 13:7.) The good Shepherd is smitten, that He may lay down His life for His sheep, and that of many flocks of divers errors should be made one flock, and one Shepherd.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"
