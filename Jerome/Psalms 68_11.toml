[[commentary]]
quote='''
The Lord will give the word to those who preach the gospel with great power. In the Hebrew it has "the women who preach the gospel"; that is, to those women who were made evangelists to the apostles, where he says "Go, tell my brothers," and the rest. Or else it signifies the souls which have believed in Christ. But according to the Seventy translators he speaks to the apostles, because the Lord gave them the power to preach the gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
