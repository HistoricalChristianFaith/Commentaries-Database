[[commentary]]
quote='''
But if they repent and I am sanctified in their midst, then all the multitude of the nations will know that I will remove them from the lands where they were dispersed and bring them back to the land of the Church, and I will pour out upon them not the waters of saving Baptism, but the waters of teaching and the word of God; and I will cleanse them from all their uncleannesses, and from all the idols and errors which they had secretly conceived in their hearts. And I will give them a new heart, which they had lost through sin, and I will renew a right spirit within their hearts. And I will remove the stony heart, that is, the unbelieving heart; and I will give them a fleshy heart, soft and tender; that they may receive the commandments of God; so that they may walk in my commandments, and observe my judgments; which they had previously neglected, and they shall dwell in the land which I had given to their fathers, namely, the masters and teachers; and once again, they shall be the people of God, and the Lord shall be turned to them as God, whom they had previously offended.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
