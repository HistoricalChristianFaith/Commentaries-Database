[[commentary]]
quote='''
For all our days have failed. Our lifetime has run its course: and while we are unaware, it slips away, we perish; and this very thing that we are speaking is part of death, and we do not understand. Our years will be pondered like a spider. See what he says. Just as a spider casts out its threads, as it were, and runs this way and that, and weaves all day long, and the labor indeed is great, but the result is nothing: so too the life of men runs this way and that. We seek possessions, we prepare riches, we beget sons, we labor, we are raised up to kingdoms, and we do everything: and we do not understand that we are weaving a spider's web.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_019.html'
source_title="Homily 19, on Psalm 89"


[[commentary]]
quote='''
For all our days have failed. So do the days pass and death draw near, that in a manner, while we know it not, our whole age and life itself is stolen away, scanty as it is. This very thing, which I now speak and you hear, is cut away from a part of our life; and although we believe there to be in it some advancing of the soul, yet because it uses up the span of hours, it is a loss of time and of age. And thus it comes about that where we think we have gain, there rather loss is brought upon us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"


[[commentary]]
quote='''
Our years shall be pondered like a spider. He could have said nothing more beautiful than to describe human life and all our anxiety and pursuits, in which we run this way and that and lay up wealth, seek riches, build houses, beget children: and see to what a thing they are compared. Our years shall be pondered like a spider. For just as we see the spider draw out its threads on the walls and weave its webs, which are undone by a sudden wind; so every act of our life is scattered by the sudden onset of tribulation or of death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"
