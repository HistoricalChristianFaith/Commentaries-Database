[[commentary]]
quote='''
Why do you suppose the curdled mountains? This he says to the Jews, who think that Moses and the prophets are like the Savior. The mountain in which it is well pleasing to God to dwell. It signifies the fleshly presence of the Savior, that the deity dwelt in a body: for in no other did the Holy Spirit dwell continuously, except in the Savior, John saying, "He upon whom you shall see the Spirit descending and remaining on him, this is he." For indeed the Lord shall dwell unto the end: in the body which he took from holy Mary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
