[[commentary]]
quote='''
The rivers shall clap their hands together. Let us ask the Jews, who understand according to the letter. Do rivers have hands? Do rivers have voices? Do rivers have feet? Do rivers have a belly? Someone may say: It is not written about a belly, about feet. But I say to you: from one member we understand the rest as well; for we cannot understand hands without feet, without a belly, without the other members. The rivers shall clap their hands together. The rivers, which have drunk from the fountain of Jesus. 'They have forsaken me,' he says, 'the fountain of living water.' The rivers themselves run from the fountain of Christ. He is the fountain, we are the rivers — if indeed we deserve to be rivers. Christ is the fountain, and the saints are the rivers; but those who are lower are little streams. Others, however, are torrents. Who are the torrents? Those who have waters for an hour, and when temptation comes are dried up. The rivers shall clap their hands together. It is not one river, there are many rivers: as many as the saints are, so many also are the rivers. But these rivers have no dissension among themselves: since they are the rivers of Christ, therefore they have concord among themselves. The rivers shall clap their hands together. They clap with the hand: the works of the saints are the praise of God. Christ is praised not by voice, but by work; he does not hear the voice, but the works. The rivers shall clap their hands together. Therefore he himself says in the Gospel: 'He who thirsts, let him come and drink; and rivers,' he says, 'shall flow from his belly.' The mountains shall exult in the sight of the Lord. What likeness is there between rivers and mountains? But since he speaks of the perfect saints, he did not say, 'the little streams shall clap their hands together,' but, 'The rivers shall clap their hands together.' See the order. Let the sea be moved, and the whole world: the rivers clap their hands together, his saints: the mountains no less, who have attained to the highest righteousness. Let us say it also in another way. Let the sea be moved, which before had been unmoved — let it be moved at the coming of Christ. Let the sea be moved: we have already said, this is the law of Moses. The rivers clap their hands together: this is the prophets. The mountains shall exult before the sight of the Lord: this is the apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_025.html'
source_title="Homily 25, on Psalm 97"
