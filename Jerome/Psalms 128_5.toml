[[commentary]]
quote='''
May the Lord bless you out of Zion. Out of this Zion? And how does another prophet say 'Zion shall be plowed like a field'? The Lord also says: 'Jerusalem, Jerusalem, who kill the prophets, and stone those who are sent to you.' Indeed, when the Lord had drawn near to Jerusalem, and had seen it, he wept. But when he wept over it, surely he wept over it because it was about to fall, as though about to perish. Indeed, what does he say? 'Rise, let us go from here.' And in another place, what does he say? 'Your house shall be left to you desolate.' So then, in what it says, May the Lord bless you out of Zion, it does not mean this Zion, which we see to be desolate. The gates themselves and the field itself and the ruins themselves signify the wrath of God. Even if we do not know it, the very eyes cry out the wrath of the Lord. May the Lord bless you out of Zion. Zion is translated watchtower, Jerusalem is translated vision of peace. If our soul has a watchtower, if it is on high, if it thinks not of earthly things, but of things sublime: if our soul has the vision of peace, that is, if Christ, who is true peace, dwells in it, he himself will bless us. If Christ dwells in us, we too will be Zion, and we too will be Jerusalem.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_042.html'
source_title="Homily 42, on Psalm 127"
