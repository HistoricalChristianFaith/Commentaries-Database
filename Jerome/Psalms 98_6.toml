[[commentary]]
quote='''
On beaten trumpets and with the sound of the horned trumpet. We read in the book of Numbers that there are two kinds of trumpets: one kind of trumpet beaten out of silver, and another kind of trumpets made of horn. So here both are named: On beaten trumpets and with the sound of the horned trumpet. What is said is this. The trumpet beaten out of silver is the word of God. 'The words of the Lord are chaste words: silver tried by fire, purified sevenfold.' Again, in 'the sound of the horned trumpet,' here the man of God is brought in reigning. In the scriptures 'horn' is properly said for kingship and for power, as it is written there: 'He has raised up a horn of salvation for us.' And in another place it is written: 'In you we will toss our enemies on the horn.' So see here what he says. Have two trumpets, both the silver and the horned: the silver, that you may have the word; the horned, that you may have power. Do you want to know that 'horn' is always put in a good sense? We read in Leviticus: 'Let no animal be offered except whatever is horned.' Three kinds of animals are offered: the ox, which has horns, and the ram, which has horns, and the he-goat, which has horns. Do you suppose it is said without reason, that no animal be offered except what is horned? So we too, as long as we have a horn, deserve to be a victim of God. But if our horn has been struck off, we are as it were feeble, and we cannot come among the priests of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_025.html'
source_title="Homily 25, on Psalm 97"
