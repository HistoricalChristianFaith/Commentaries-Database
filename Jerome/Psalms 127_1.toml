[[commentary]]
quote='''
And someone may say, as Epicurus and Aristippus and the Cyrenaics do, and the rest of the beasts called philosophers. But reflecting carefully within myself, I find that not, as some mistakenly believe, everything is done by chance, and that fortune plays a varied role in human affairs, but rather that everything is done by the judgment of God. For even if a swift runner were to think that he determines his own course with his feet, he does not. Nor let the strong trust in their own strength, nor let the wise esteem riches and wealth as being gathered by prudence; nor let the eloquent and learned think that they can find favor with the people through eloquence and learning; but let them consider that everything is done by God's disposition. And unless He governs all things according to His will, and builds the house, in vain do those labor who build it. Unless He keeps the city, in vain do those watch who keep it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ecclesiastes%2520v2.html'
source_title="Commentary on Ecclesiastes"

[[commentary]]
quote='''
Atticus: Therefore, they are wrong in their thinking who rule out the help of God in every single action that we perform and who seek to twist the true meaning to other meanings by putting forth interpretations that are perverted, nay more, worthy of ridicule, on the following passage: "Except the Lord build the house, they labor in vain that build it. Except the Lord keep the city, he watches in vain who keeps it."
'''
source_url='https://www.newadvent.org/fathers/30111.htm'
source_title="Against the Pelagians 1.2"
