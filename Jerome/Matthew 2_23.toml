[[commentary]]
quote='''
Matthew, also called Levi, apostle and aforetimes publican, composed a gospel of Christ at first published in Judea in Hebrew for the sake of those of the circumcision who believed, but this was afterwards translated into Greek though by what author is uncertain. The Hebrew itself has been preserved until the present day in the library at Caesarea which Pamphilus so diligently gathered. I have also had the opportunity of having the volume described to me by the Nazarenes of Beroea, a city of Syria, who use it. In this it is to be noted that wherever the Evangelist, whether on his own account or in the person of our Lord the Saviour quotes the testimony of the Old Testament he does not follow the authority of the translators of the Septuagint but the Hebrew. Wherefore these two forms exist "Out of Egypt have I called my son," and "for he shall be called a Nazarene."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FLives%2520of%2520Illustrious%2520Men.html'
source_title="Lives of Illustrious Men, Chapter 3"

[[commentary]]
quote='''
(Verse 23) And coming, he lived in a city called Nazareth, so that what was spoken by the prophets might be fulfilled, that he would be called a Nazarene. If he had set a fixed example from the Scriptures, he would never have said, what was spoken by the prophets; but simply, what was spoken by the prophet: but now, calling them prophets in the plural, he shows that he did not take words from the Scriptures, but the meaning. Nazarene, interprets as holy. But all Scripture testifies that the Lord would be holy. We can also say in another way, that even in the same words, according to the Hebrew truth, it is written in Isaiah: There shall come forth a rod out of the stem of Jesse, and a Nazarene shall rise out of his roots (Isa. 11:1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
Had he meant to quote a particular text, he would not have written 'Prophets,' but 'the Prophet.' By thus using the plural he evidently does not take the words of any one passage in Scripture, but the sense of the whole. Nazarene is interpreted 'Holyd,' and that the Lord would be Holy, all Scripture testifies. Otherwise we may explain that it is found in Isaiah (c. 11:1.) rendered to the strict letter of the Hebrew. There shall come a Rod out of the stem of Jesse, and a Nazarene shall grow out of His rootse.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"
