[[commentary]]
quote='''
(Verse 15, 16.) But who do you say that I am? Simon Peter answered and said: You are the Christ, the Son of the living God. Wise reader, take note that from the following text and the discourse, the apostles are not called men, but gods. For when he had said: Who do men say that the Son of man is, he added: But who do you say that I am? To them, who are men, forming their opinions based on human things; but to you, who are gods, what do you think of me being? Peter, speaking on behalf of all the apostles, declares: You are the Christ, the Son of the living God. He calls Him the living God, in distinction from those gods who are thought to be gods but are dead: Saturn, Jupiter, Venus, Minerva (or Ceres), Bacchus, Hercules, and other monstrous idols.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
Observe how by this connection of the discourse the Apostles are not styled men but Gods. For when He had said, Whom say ye that the Son of Man is? Ho adds, Whom say ye that I am? as much as to say, They being men think of Me as man, ye who are Gods, whom do you think Me?

He calls Him the living God, in comparison of those gods who are esteemed gods, but are dead; such, I mean, as Saturn, Jupiter, Venus, Hercules, and the other monsters of idols.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252016.html'
source_title="Catena Aurea by Aquinas"
