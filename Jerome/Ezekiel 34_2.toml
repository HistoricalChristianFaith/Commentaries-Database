[[commentary]]
quote='''
But the word is directed to the shepherds of Israel, whom we must understand as either kings, or princes, scribes and Pharisees, and teachers of the Jewish people. Or certainly in the Gospel people, the bishops, presbyters, and deacons: or according to mystical understanding, the Angels of the individual Churches, to whom John wrote in his Apocalypse (Apoc. I), and whose Angels daily see the face of God (Matthew XV). And it is said first: Woe to the shepherds of Israel, who, although they should feed the Lord's flock and provide for its salvation, hasten to satisfy their own luxury. Therefore, great caution must be taken, and those precepts must be observed: Do not seek to become a judge, lest you may not be able to remove injustices (Eccli. VII, 6). And again: The greater you are, the more you should humble yourself, and in the sight of the Lord you will find favor (Ibid. III, 29). And again: They have made you a leader, do not be exalted, but be among them as one of them (Eccli. XXXII, 1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
