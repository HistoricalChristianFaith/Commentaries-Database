[[commentary]]
quote='''
He who has not given his money at usury. There are many things that might be said, but the hour shuts us out. But since the day before yesterday we spoke about the beginning of the catechesis (κατήχησις), and, with God's favor, you came out of Chaldaea with Abraham, and you remember what we had said: how you came out of Chaldaea, and came into the land of promise — nay rather, the land of promise is promised to you. And indeed, after Abraham came into the land of promise, adversaries were on this side and that, enemies held the land. The Lord came, and led him outside, and set him on a mountain, and showed him the whole land, and said: 'All this I will give to you and to your seed.' To him he promised it, to us he will give it in return.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_005.html'
source_title="Homily 5, on Psalm 14"
