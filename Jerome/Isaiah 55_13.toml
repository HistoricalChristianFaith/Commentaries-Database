[[commentary]]
quote='''
And as for the nature of proper names, it must be said that evil things are turned into good things, and virtues are born from vices, that is, justice from injustice, fortitude from temerity, temperance from luxury, and prudence from foolishness.… Therefore, what is said in the Gospel: "A good tree cannot bear bad fruit," does not refer at all to the nature of things, as the heretics want it to, but to the choice of the mind. Finally, it is inferred: "Either make a good tree and its fruits good." From this it is clear, each one by their own will makes their soul a good or bad tree, whose fruits are varied.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
