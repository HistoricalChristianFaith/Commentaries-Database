[[commentary]]
quote='''
The cause of joy and confession of the true God is that the eternal oblivion will follow the previous sorrows, so that they will not remember the idols and the former errors, but will pass from darkness to light, so that they may enjoy eternal blessedness. For they will forget the past evils, not by the forgetfulness of memory, but by the succession of good things, according to what is written: 'In the day of prosperity be joyful, and in the day of adversity consider: God has made the one side by side with the other, so that man may not find out anything that will be after him.' (Eccles. 7:14). And elsewhere it is said: 'Affliction makes joy forgotten in an hour' (Eccles. 11:29): because while they are in distress, they will not enjoy the former pleasures, according to the mistaken mind of Epicurus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"


[[commentary]]
quote='''
Moreover, those who embrace change, improvement, and do not consider the destruction of elements to be a demise, use this example: In the beginning, you established the earth, O Lord, and the works of your hands are the heavens. They will perish, but you remain, and all of them will wear out like a garment, and you will change them like clothing, and they will be changed (Psalm 102:26-27). This clearly demonstrates a transformation for the better, not an annihilation into nothingness, but a change. For the scripture that is written in another place, 'The moon shall shine as the sun, and the sun shall receive sevenfold light' (Isaiah 30:26), does not indicate the destruction of the former things, but their transformation for the better. In order to understand this, let us consider examples from our own condition: when an infant grows into a child, and a child into a youth, and a youth into a man, and a man into an old man, each age does not perish completely. It is still the same person as before, but gradually changes and is said to have perished from its former state. What the intelligent and Apostle Paul said: For the figure of this world passeth away (1 Cor. VII, 31). Let us consider what he said: The figure passeth away, not the substance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
