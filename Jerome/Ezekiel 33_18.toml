[[commentary]]
quote='''
Hence those who say that the way of the Lord is not just are argued against because their opinion is unjust, possessed of a very evil eye, and not at all new, but of those who have passed judgment in the past. To all of whom it is shown that the sinner should not despair of salvation if he repents; nor should the righteous person place confidence in his righteousness if he negligently loses what he had earnestly sought after.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
