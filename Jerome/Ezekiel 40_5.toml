[[commentary]]
quote='''
While reading the description of the mystical temple (which the Jews believe should be built literally upon the coming of their own Christ, whom we believe to be the Antichrist, but we refer to the Church of Christ, which we see being built daily in his saints), whenever the eye of the heart opens, it happens to me that I think I see and possess the bridegroom and joyfully say: 'I have found him whom my soul loves; I will hold him, and not let him go.' (Song of Solomon 3:4). Then again, the divine word deserts me, the bridegroom flees from my hands, and my eyes are blinded by darkness, so that I am compelled to say: 'O the depth of the riches and wisdom and knowledge of God!' How inscrutable are His judgments, and His ways past finding out! (Rom. 11:33)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
