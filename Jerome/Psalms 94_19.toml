[[commentary]]
quote='''
"According to the multitude of my sorrows in my heart, your consolations have gladdened my soul." This very thing the Apostle too speaks of, namely that according to the labors and miseries which we suffer in this world, we have a reward with God in the heavens. The greatness of the tribulations is the greatness of the rewards. As many wounds as we suffer, so many crowns do we also deserve. This is what he says: The more I did penance, so many times did you console me. I shed one tear, I deserved one consolation: I shed ten tears, I deserved ten consolations. However great the weight of penance was, so great also was the number of consolations.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_022.html'
source_title="Homily 22, on Psalm 93"

[[commentary]]
quote='''
"According to the multitude of my sorrows in my heart, your consolations have gladdened my soul." This is what he said above: he pursues the same sense, the same intention. "According to the multitude of my sorrows in my heart, your consolations have gladdened my soul." As great a sorrow as you saw in my heart from the groaning of repentance, so great a measure of your mercy will you minister: for the greatness of the sorrow became the material of consolation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_071.html'
source_title="Homily 71, on Psalm 93 (Alternate Series)"
