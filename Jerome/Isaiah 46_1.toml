[[commentary]]
quote='''
These idols, he says, which cannot save those who carry them, are nothing more than burdens for the priests, weighing them down to exhaustion. And when captivity comes, as payment for the metals from which they are made, the first captive is taken, and they cannot free their own soul or those who carry them. Not that the lifeless images have a soul and some sense of pain, which are devoid of sensation; but that the soul is erroneously called soul, and the limbs of those things which are without sensation and limbs. Otherwise, it is also written in the Proverbs: In the hand of the tongue is death and life. Or it must be said that the heaviest burden among the nations was the error of idolatry, which brought down its worshippers to the ground, and could not save them, but made their souls captive to the devil and demons.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
