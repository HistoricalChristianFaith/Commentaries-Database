[[commentary]]
quote='''
"Then shall the dust return to the earth as it was: and the spirit shall return unto God who gave it."  He goes on more clearly: "the dust will return to the earth, whence
it was taken, and the spirit is returned to God, who gave it". From which there is enough to smile at in
those who think that spirits are produced with bodies, not from God, but are
made from the parent's body. For when
the flesh is returned to the earth, and the spirit goes back to God, who gave
it; it is obvious that God is the parent of all spirits, not man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ecclesiastes.html'
source_title='Commentary on Ecclesiastes'
