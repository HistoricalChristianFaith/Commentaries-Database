[[commentary]]
quote='''
To the saints who are in his land, he made all his wishes wonderful in them. In place of which it is written in the Hebrew: "To the saints who are in the land, and to my exalted ones, is all my will in them." These goods of which you have no need, O Father, my saints do need—the saints in whom I have made all my wishes to be wonderful. But I made my wishes wonderful not outside them, but in them: so that, while each one is corrected, and understands both who he was before and who he has now begun to be, my wonderful wishes may be brought about in them; yet only if, going out from Egypt and crossing the desert, they are able to enter the land of promise, which land is the beginning of the land of the living. Nor is this at once contrary to it—that wonders are said to be done only in the land of God—namely that in the field of Tanis, that is, in Egypt, wonders were done. For there is a great distance between the wonders done by Moses and those done by Jesus. There one flees from Egypt, here one enters into Judea; there lord Pharaoh is avoided, here those who are to serve are taken captive; there frogs and gnats and soot and hail and darkness are employed among the wonders, here command is given to the sun and to the moon; there God goes before the people in a pillar of cloud and of fire, here the Savior himself comes to meet them holding a sword and declaring that he will fight for his army. Do you see how the wonders that were in the land of promise are greater than those done in Egypt or in the desert? But we may understand the land of God as the Church, since to the saints who are in the Church all the wishes of God seem to be wonderful; for to those who are outside the Church nothing seems wonderful which by its own nature is wondrous. Let us therefore be in the land of God, and let us be transformed into the image of the Savior, and he will make all his wishes wonderful in us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15"
