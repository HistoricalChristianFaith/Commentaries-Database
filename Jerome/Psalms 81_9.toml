[[commentary]]
quote='''
There shall be no new god in you. He whose god is his belly, a new god is his. As many vices as we have, as many sins, so many new gods do we have. I have been angered: anger is a god to me. I have seen a woman, and I have lusted: lust is a god to me. For each one, whatever he desires and reveres, this is his god as well. The greedy man has gold for his god. Nor shall you adore a strange god. Our God is virtue; the god of others, vices and sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_013.html'
source_title="Homily 13, on Psalm 80"
