[[commentary]]
quote='''
Also, our Jerusalem, if it is supplanted by heretical deception, takes away her sons, who are stronger in faith, and daughters who do not have such great strength of faith. Or indeed sons, who know mystical things: daughters who follow a simple history; and delivers them to be devoured by demons, and when she kills them, she believes she is giving them life, and appeasing the idols, with whose slaughter they are satiated.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
