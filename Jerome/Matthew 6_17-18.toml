[[commentary]]
quote='''
But He speaks in accordance with the manners of the province of Palestine, where it is the custom on festival days to anoint the head. What He enjoins then is, that when we are fasting we should wear the appearance of joy and gladness.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25206.html'
source_title="Catena Aurea by Aquinas"


[[commentary]]
quote='''
(Verse 17 and following) But when you fast, anoint your head and wash your face, so that you may not appear to be fasting to men, but to your Father who is in secret: and your Father who sees in secret will repay you. He is speaking according to the custom of the province of Palestine, where they usually anoint their heads on festive days. Therefore, he commanded us to show ourselves joyful and festive when we fast. Those reading it from the Psalmist: The oil of the sinner shall not anoint my head (Ps. 140:5), on the contrary they want the good oil, about which it is said elsewhere: God, thy God, hath anointed thee with the oil of gladness above thy fellows (Ps. 44:8). And He commands that we, who practice virtues, should anoint the principal (ἡγεμονικὸν) oil of our hearts with spiritual oil.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
