[[commentary]]
quote='''
They have said: Come, and let us destroy them from the nation. Let there be no nation, for it is the people of God. And let the name of Israel be remembered no more. Let him be remembered no more who sees God with his understanding.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"

[[commentary]]
quote='''
They have said, Come, let us destroy them out of the nation. I see a strange thing. So great is the multitude of the heretics, and such the diversity of their teachings, that their opinions differ among themselves, and yet they agree in this alone — in their hatred of us. For just as Herod and Pilate were enemies, and, acting against Christ, they made peace, and their concord was worse than their enmity had been; so these too fall out wickedly and league together yet more wickedly.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_062.html'
source_title="Homily 62, on Psalm 82 (Alternate Series)"
