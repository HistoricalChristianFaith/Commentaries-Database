[[commentary]]
quote='''
He had said above: your father is Amorrhæan, and your mother Chethæan; here with the order and number changed: Your mother is Chethæan, and your father is Amorrhæan. For when they have advanced in wickedness, they are divided into parts; and deserted unity, they make progress into a tumult and multitude, which is not able to ascend to the mountains with Jesus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 5:16.45-47"
