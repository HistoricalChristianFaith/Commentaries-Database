[[commentary]]
quote='''
Indeed, you are just, O Lord, if I argue with you; however, I will speak to you about judgments. What is it that the way of the wicked prospers? It is well for all who break the law and act unjustly. You have planted them and they have taken root, they grow and bear fruit. You are near their mouths, but far from their hearts. Truly, this is a discussion of all those who act unjustly, and the meaning is summarised in the 72nd Psalm, in which the Prophet says: How good is the God of Israel to those who are upright in heart! But my feet were almost moved; my steps had well nigh slipped. For I was envious of the wicked, seeing the prosperity of sinners, etc. However, this is especially said against heretics, who, though they are impious, prosper in their ways; and they beget children whom they have deceived in their heresy, and they act deceitfully and unjustly, so as to rob the Church. And while they persist in their wickedness of opinion, they boast that they are planted by God, and that they have sent forth roots, and have begotten children and brought forth fruit. But although they often repeat the name of Christ, they do not have God as their dweller, according to that of Isaiah: This people honors me with their lips: but their heart is far from me.
And you, Lord, you know me: you have seen me, and you have tested my heart with you. Gather them together like a flock for the sacrifice, and sanctify them on the day of slaughter. There is no scandal, it is said, that the wicked, or all heretics, flourish for a time: For you, Lord, know me, and you have seen me, and you have tested my heart with you.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Jeremiah.html'
source_title="Commentary on Jeremiah"


[[commentary]]
quote='''
But if we are impure and unfaithful, all things are profane to us, either due to heresy inhabiting our hearts or to a sinful conscience. Moreover, if our conscience does not accuse us and if we have pious trust in the Lord, "we will pray with the spirit and we will pray with the mind; we will sing with the spirit and sing with the mind," and we will be far removed from those about whom it is here written: "their minds and consciences are polluted.""They claim to know God, but they deny him with their deeds. They are accursed, disobedient and repelled by every good deed." It is about these persons whose minds and consciences are polluted, who claim to know God but deny him with their deeds, that it is said in Isaiah: "This people honors me with their lips, but their heart is far from me." See how they honor God with their lips while fleeing from him in their heart; professing belief in God with words, their works deny him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Titus.html'
source_title="Commentary on Titus 1:15-16"
