[[commentary]]
quote='''
But why have we said all this, both once and a second time, that the peoples should confess to God? Why do we say this? Why do we urge this? The earth has given its fruit. The earth — holy Mary — from our earth, from our seed, from this clay, from this mud, from Adam. "You are earth, and into the earth you shall go." This earth has given its fruit: what it lost in paradise, it has found in the Son. The earth has given its fruit. First it gave a flower. He says in the Song of Songs: "I am the flower of the field and the lily of the valleys." This flower, then, has been made fruit, that we might eat him, that we might feed on his flesh. Do you wish to know what this fruit is? A virgin from a virgin, the Lord from a handmaid, God from man, a son from a mother, fruit from the earth. See what this fruit himself says. "Unless a grain of wheat falls into the earth and dies, it cannot bear much fruit." The earth has given its fruit, it has given the grain of wheat: which grain of wheat fell into the earth and died, and therefore brings forth much fruit. It was multiplied in the ear of corn: what had fallen as one thing, rose again with many. For the grain of wheat fell into the earth, and an abundant harvest sprang up. The earth has given its fruit. Therefore Let the peoples confess to you, O God, let all the peoples confess to you: the earth has given its fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_006.html'
source_title="Homily 6, on Psalm 66"


[[commentary]]
quote='''
What is this fruit? May God bless us, our God; may God bless us. God — the Father; our God — the Son. For he himself is our God. "And you shall call," he says, "his name Emmanuel" — that is, God with us. Our God. May God bless us — the Holy Spirit. See the mystery of the Trinity comprehended in one little verse, The earth has given its fruit with many; in this fruit the mystery of the Trinity is contained. May God bless us, our God. He who is the God of all by nature has been made our God in a proper sense. May God bless us. May he drive out the old curse. The curse cast us out of paradise: may the blessing bring us back. May God bless us, our God; may God bless us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_006.html'
source_title="Homily 6, on Psalm 66"
