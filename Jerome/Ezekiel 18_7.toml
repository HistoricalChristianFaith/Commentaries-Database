[[commentary]]
quote='''
The tenth is: He gives his bread to the hungry. From this we are taught that alms should not be given to the satiated, but to the hungry; and not to those who belch from fullness, but to those who suffer from emptiness. For in bread is contained all food. And it is significantly said, his: so that we do not turn bread acquired from rapine, usury, and ill-gotten gain into mercy; for the redemption of a man's soul (Prov. XIII, 7) is his own riches. What we see many people doing, both clients and the poor, and farmers; not to mention the violence of soldiers and judges, who oppress by power, or commit thefts, so that they may give little things to the poor, and boast in their own crimes. And let the public deacon in the Churches recite the names of those making offerings: so much is offered by this person, so much is promised by that person, and they please themselves with the applause of the people, while their conscience torments them. And let us give material to the miserable, so that they may rejoice in what they give, and not mourn over what they have taken away. It is more fitting, however, that we understand the just bread to be the one who says: I am the living bread, which came down from heaven (John VI, 51); and which we pray to be given to us in prayer: Our substantive bread, or that which will come to us (Matthew VI, 11); so that we may deserve to receive what we will always receive afterwards, in the present world, every day. He gives this bread to the hungry, of whom it is written: Blessed are those who hunger and thirst (Matt. V, 6). For the righteous person makes the common bread of all his own, which had failed in Judea, as the prophet says: I will take away from them strength, or the staff of bread. What we are speaking of, if indeed we are of Christ, or rather, as the prophet commemorates, it is the bread of believers and the hungry. It is not to be given at all to those who have eaten and drunk and been satisfied, and have grown fat and kicked, of whom it is said: Woe to you who are full now, for you shall hunger (Luke VI, 25), lest they vomit it up, as Solomon says: For he will vomit and corrupt your good words (Prov. XXIII). What the Savior says in other words: Do not give what is holy to dogs; nor cast your pearls before swine (Matthew 7:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"


[[commentary]]
quote='''
He holds the eleventh place: And covered the naked with clothing. This statement, according to the explanation of the previous verse, should be discussed in two ways: that we give clothing to the naked, as the Savior says: I was naked and you clothed me (Matthew 25), and that we give the clothing of Christ to the naked in faith and virtues, of whom it is written: For as many of you as were baptized into Christ have put on Christ (Galatians 3:27). He was naked in this garment, not having a wedding garment, and was thrown out of the banquet. Concerning this nudity, the Lord speaks to Jerusalem: But you were naked and filled with confusion (or shame).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
