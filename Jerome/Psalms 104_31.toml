[[commentary]]
quote='''
Let the glory of the Lord be for ever. If the glory of the Lord is for ever, then we too, who glorify, shall be everlasting. The Lord shall rejoice in his works. For it is the Lord's joy, when we, his creation, bless him on the day of resurrection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"
