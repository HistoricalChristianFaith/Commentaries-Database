[[commentary]]
quote='''
But the house and law of all the commandments of God, and the city which is situated on the top of the mountain, that is to be believed, as it is written: A city cannot be hidden when it is situated on a mountain. And: The rushing of the river makes the city of God rejoice: which clearly refers to the Church, and is located on that mountain, which is at the top of all mountains, and from which the prince of Tyre was wounded: and all the borders and boundaries of this house are holy of holies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
