[[commentary]]
quote='''
But nevertheless God will shatter the heads of his enemies: of the devil, and all his powers. "You have shattered the heads of the dragon in the water." As many as the sins are, so many heads does the devil have. The crown of the hair of those who walk in their own trespasses. For his head is so shattered, that there does not remain in him any power by which he may goad those who sin. The topmost of the head is the hair, and the crown of the hair: therefore he says this, that there should not remain in the devil even the least thing that is not shattered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
