[[commentary]]
quote='''
'O Lord my God, if I have done this.' 'Behold, the prince of this world comes, and finds nothing in me.' 'If there be iniquity in my hands.' 'Who did no sin, neither was guile found in his mouth.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
