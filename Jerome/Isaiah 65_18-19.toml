[[commentary]]
quote='''
For it will not be fitting that in the city of Jerusalem, the people of God, who will receive the eternal creature of exultation and joy, should any longer hear the voice of weeping and shouting; when pain, sorrow, and groaning have departed. For indeed, opposites cannot be present at the same time. And where there is exultation and joy, which are the fruits of the Holy Spirit, there can be no weeping and lamentation, which are suitable for those who lament and mourn, especially the shouting, which Paul expels from the Church of believers, so that we do not make a clamor resembling that of the Jews (Ephesians 4). In such a city, there will be no diverse ages: infant and old, small and great, who do not fulfill their days; but like children of the resurrection, all will reach perfect adulthood, to the measure of the fullness of Christ's age, so that no one lacks the span of years, nor exceeds it, and one who does not yet have solid strength may cease to be what he was, and with advanced age may wither away; and all will reach the number of one hundred years, such as Abraham was, who received the promise of his son Isaac at this age (Gen. XXI). Of the praises of which number, it is not necessary to mention many, lest the discussion be superfluous. We only say this, that the tens have equal sides and possess the firmness of square shapes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
