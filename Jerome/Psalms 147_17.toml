[[commentary]]
quote='''
He sends his crystal like morsels. As his loaves are broken and become morsels, so too this crystal is broken and turned into morsels. Crystal has this nature: it forms whenever waters are frozen — what we call ice. Between crystal and water, then, there is the same difference as between water and ice: for water is poured out, as it were, very broadly, whereas crystal is, as it were, compacted into itself, and reduced into one form. Whenever water freezes, it makes crystal. Since, then, we cannot grasp the flesh with the whole word, it is broken, so that we may grasp it through those parts. The matters are obscure, and the difficulty of interpretation does not allow us to speak more broadly. Before the face of his cold, who shall stand? Whose? Some say the crystal's, but others say God's. To me, however, it seems that Before the face of his cold, who shall stand? is said of God. Of God I say it, Before the face of his cold, who shall stand? What torments are said in the holy Scriptures to be prepared for the sinner? Nothing is hotter than Gehenna, and yet it itself is cold. Gehenna is of fire: but if anyone has grown sufficiently cold, he is cast into the fire of Gehenna. It is written that in the last days the love of many shall grow cold. Whoever, then, has grown cold in this way, this man is cast into the fire. May the Lord grant to us that cold may never enter our hearts: we do not sin unless love has first grown cold. Then, what does the apostle also say? Fervent in spirit. Our God is a fire. If, then, God is fire, he is fire for this reason: to cast out the cold of the devil. The north wind, the coldest wind; but by name it is called "the right." Beautifully he said, is called: it has taken to itself a name, though it is on the left. If, then, anyone's soul has grown cold, like the north wind, the coldest wind — if ever the warmth of love grows cold in our heart, if it has sinned, if it has grown cold, if it has died... Attend diligently to what I say: if it has grown cold, if it has died. To grow cold belongs to the dead, to be warm to the living.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_057.html'
source_title="Homily 57, on Psalm 147"
