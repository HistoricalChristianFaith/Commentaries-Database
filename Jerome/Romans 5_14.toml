[[commentary]]
quote='''
Nor do I say this, but I say it according to the apostle, who affirms that we were all, in the transgression of Adam, cast down from paradise through sin. This the apostle says, that Adam fell even in us, who were afterward to be. Therefore now in Christ, that is, the heavenly Adam, we believe, so that we who through the sin of the first Adam fell from paradise, may now through the righteousness of the second Adam return to paradise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_066.html'
source_title="Homily 66, on Psalm 88 (Alternate Series)"
