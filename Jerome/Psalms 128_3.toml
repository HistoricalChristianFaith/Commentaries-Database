[[commentary]]
quote='''
Your wife like a fruitful vine on the sides of your house. Solomon says that he wished to take wisdom as his bride. He says also in another place concerning wisdom: 'Love her, and she will embrace you: encompass her, and she will keep you.' Let us too, therefore, take this wife; let us hold her in our embraces, let us never let her go from our bosom, let her never flee from our hands. If this wife is always in our embrace, we will make from her sons: not daughters, but sons. Indeed, it is said here too: Your sons like young olive shoots around your table. Could it not have said, your daughters? or could it not have said τὰ τέκνα σου (ta tekna sou), so that both men and women might be understood? But see what it says, your sons. He who has wisdom as his wife does not make from her daughters, but sons. He has nothing soft, nothing dainty, nothing tender, nothing effeminate in his mind. Do you suppose it is for some other reason that the saints are written to have had not daughters, but sons? Let us read Genesis: for there the order of the generations is preserved. Holy Abraham had Sarah as his wife, had Hagar as his concubine, had afterward Keturah. From two wives he begets sons, he makes no daughters. Let us come to Isaac. Isaac too makes two sons, he has no daughters. For he was holy, and had in himself nothing soft and tender and effeminate, but all manly and firm. Blessed Jacob has twelve patriarchs as sons; and he has one daughter by the name of Dinah, which is translated cause, quarrel, strife. Indeed he had one daughter, and twelve sons; and on account of one daughter such great wars arise in Shechem. Jacob had never said: 'I am afraid, you have made me hateful.' He speaks to Levi and Simeon: 'Levi and Simeon, let my soul not come into their counsel.' Why? because as men they wished to plead the cause of a woman. Why have I said all this? Because the saints do not have daughters, but have only sons. I tell you a new thing, new to those who do not know it; but for those who read the scriptures, and read them diligently, not new, but the very thing they know. Jacob had twelve sons as patriarchs: Reuben, Simeon, Judah, Levi, Issachar, Asher, and the rest up to twelve. Read in the account of the generation, and you will never find that any of those twelve great patriarchs made a daughter, but all of them sons. I will tell you one, lest perhaps you forget. Asher had a daughter, Sarah. Jacob had twelve sons and one daughter: so among the twelve patriarchs one patriarch had only one daughter. Why have I said all this? So that we ought to understand sons and daughters in the scriptures spiritually. Your wife like a fruitful vine on the sides of your house. Like a fruitful vine. A fruitful vine has very many clusters, so also our wife, that is, wisdom our wife, who is the bride. Indeed, it is written in another place: 'Come my sister, my bride.' Lest in the fact that it had said, bride, you should understand something shameful, sister is joined, so that all shameful love may be excluded. Come my sister: for the love is holy, and therefore I call you sister. And my bride: therefore I call you bride, so that I may have a wife, and from you make many sons, many sons like clusters from a vine. Just as a vine has various clusters, and there is indeed one root, but it spreads its tendrils far and wide, here and there, and the tendrils themselves have their own fruits, and in the fruits themselves are the clusters, and one cluster is larger, another smaller, some grapes are larger, others smaller; so also from wisdom, which is our wife, provided that we never let her go, many clusters are born, that is, very many virtues, holy thoughts, splendid works. Your sons like young olive shoots around your table. We read in another place: 'And wine gladdens the heart of man.' We read also in the Song of Songs: 'Come, brothers, drink and be inebriated.' And wine which gladdens the heart of man. This fleshly wine does not gladden the heart of man, but overwhelms it, and makes it mad. Indeed, it is written that those who are powerful should not drink wine. The apostle too writes that we ought not to drink wine and eat flesh. Again it is said to us: And wine gladdens the heart of man. But it speaks of a spiritual wine, which, if anyone drinks it, he is immediately inebriated. All of you, that you might let go of your possessions and your parents and your children and your kinfolk, drank wine, and being inebriated for Christ began to be mad. Does it not seem to you to be drunkenness, does it not seem to you to be spiritual madness, to despise delights, to seek out squalor, to flee the cities, to pursue the deserts, to know no affections, to ignore the nearness of the flesh, and to know Christ alone? Indeed, the apostles were inebriated with this wine, and therefore it is said of them: 'They are full of new wine.' For they had not been inebriated from the old law, but from the gospel. Noah too, I think, was inebriated in this way with this wine. Your sons like young olive shoots. To nothing else are our sons compared except to young olive shoots. It did not say, to the old olive tree, but to the young olive. Just as there too, concerning the drunkenness of the apostles, it does not speak of old wine, but of new wine, so here too it says young olive shoots: young olive shoots, which are wholly green in the youth of the gospel, young olive shoots full of light. Oil has this nature, that it seasons food, that it provides fuel for light, that it restores an anointed body wearied by a long journey, as it were, to its former toil and to health. Indeed, whoever is weary, and is anointed, as it were recovers his former vigor. Do you think that wine and oil are named here without a reason? It could not have said honey, nor other aromatic spices, nor another tree, but only the vine and the olive. These are the remedies of our life, the vine and the olive, wine and oil. In wine, severity; in oil, mercy. Indeed, that man who was going down from Jerusalem to Jericho, who had been wounded, the Samaritan, that is, the guardian, poured into him nothing except wine and oil. Wine, the severity of the precepts, astringent wine; so that whatever there is of bad humor, it may burn out and consume. But since human frailty cannot bear the truth—'for if you should mark iniquities, Lord, Lord, who shall endure it?' for if the Lord should be only just, we cannot live—therefore to his justice, that is, to the wine, the oil of mercy has been added.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_042.html'
source_title="Homily 42, on Psalm 127"
