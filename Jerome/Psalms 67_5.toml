[[commentary]]
quote='''
Let the peoples confess to you, O God — he had already said this above, and in this little psalm he repeats these two verses again. For he had said above, "Let the peoples confess to you, O God, let all the peoples confess to you. Let the nations be glad and rejoice," and so on: and now again he repeats these very verses. It is as though the apostles lead the chant for all the nations. "Often have they fought against me from my youth, let Israel now say: often have they fought against me from my youth." See how they lead the chant, and the throng of all the nations responds. So too now, when they say at the beginning "Let all the peoples confess to you," and when they urge the peoples and say "Let the peoples confess to you, O God, let all the peoples confess to you" — because they see them falling silent, therefore they rebuke them with the same words, and say, Let the peoples confess to you, O God, let all the peoples confess to you. Once we have said it, and you did not hear; let us say it again, that you may sing.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_006.html'
source_title="Homily 6, on Psalm 66"
