[[commentary]]
quote='''
And it had, it says, fifty cubits in length and twenty-five in width, so that eternal rest might be demonstrated after fifty weeks following seven weeks: extending during the day of resurrection to the kingdoms of heaven, in which true rest is found. But in twenty-five, of which number we spoke earlier, let the measurement of the five senses be preserved through the five orders of the square, of which one is adapted to length and another to width, so that in length there may be rest and delight of a more sacred knowledge; in width, a demonstration of present things that pertain to the senses.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 12:40.20-23"
