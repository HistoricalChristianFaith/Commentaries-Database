[[commentary]]
quote='''
Finally, in what follows also, see what he says. Let them be ashamed and troubled for ever and ever, and let them be confounded and perish. Let them perish according to that which is evil in them, and let that which is good be saved. Finally, see that "perdition" here does not signify abolition, but salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"
