[[commentary]]
quote='''
The promise of all good things is eternal life. But if you wish to hear and your soul will live forever, I will make with you an everlasting covenant, the faithful mercies of David.… But this pact, which the Lord promises, will not be brief and of one time, as it was for the people of the Jews, but it will remain forever, so that the true David may come, and what has been promised from the person of God may be fulfilled in the Gospel: "I have found David my servant, with my holy oil I have anointed him." … Whom, according to Ezekiel, David, who has been sleeping for many centuries, calls his servant and shepherd, saying: "I will raise up for you one shepherd, my servant David."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
