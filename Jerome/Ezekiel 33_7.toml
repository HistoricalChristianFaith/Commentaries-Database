[[commentary]]
quote='''
However, we can discuss this passage in three ways: as the land that appoints a watchman for itself, either according to the literal sense, that is, the land of Judea, or according to the spiritual interpretation, the Church, which often chooses a watchman for the last things of its people, namely the one whom the Apostle, writing to the Corinthians, takes as a judge (1 Corinthians 15), or certainly the soul of the believer, which sets its mind and reason above the people and crowd of its thoughts, so that it does not accept all the incentives of thoughts, but judges and discerns what should be followed by itself and what should be avoided. A watchman of the land of Judea, either a king, or a prophet: a watchman of the Church, either a bishop, or a presbyter, because he is chosen by the people, and knowing the reading of the Scriptures, and foreseeing what is to come, he announces to the people and corrects the wrongdoer. Therefore, it is greatly to be feared that we approach this office unworthy and chosen by the people, giving ourselves to neglect and idleness: and what is worse, serving pleasures, the belly, and laziness, we think that we have received honor, not ministry. For indeed the Son of Man came not to be ministered unto, but to minister (Matthew 20:28); and he washed the disciples' feet (John 13), to show that all filth and vices must be washed and purged from the masters in the disciples.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
