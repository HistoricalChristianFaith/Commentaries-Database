[[commentary]]
quote='''
That your foot may be dipped in blood. Because his own foot was dipped in his own blood. "I have trodden the winepress alone, and of the nations there was no man with me." And again: "Who is this who ascends from Edom? his garments red from Bosor." Edom is interpreted "blood," Bosor "flesh": it signifies our Lord himself crucified. The tongue of your dogs from the enemies, from him. By "dogs" he means the Jews themselves, who cried out: "Crucify, crucify such a one: we have no king but Caesar." And "from the enemies": prompted by the demons to deny the Savior, and to blaspheme him. Otherwise: because you yourself came of your own will and suffered, and of your own will you were crucified by the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
