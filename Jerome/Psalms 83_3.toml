[[commentary]]
quote='''
Against your people they have dealt maliciously in counsel. It is enough for anyone, if he be the people of God. And they have taken counsel against your saints. This needs no interpretation: to have read it is to have understood it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"

[[commentary]]
quote='''
Against your people they have devised a malicious plan. This they speak, that they may snatch away from your Church. They have plotted against your holy ones. Each day they think of nothing else, save how they may deceive the men of the Church and trip them up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_062.html'
source_title="Homily 62, on Psalm 82 (Alternate Series)"
