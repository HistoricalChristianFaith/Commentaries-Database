[[commentary]]
quote='''
"He who fashions toil in the commandment." No one is crowned while sleeping, no one at ease possesses the kingdom of heaven, no one with a stuffed belly can worthily discourse about fasting. You see, then, what he says: "He who fashions toil in the commandment." All the commandments of the Lord have toil: without toil we cannot possess the kingdom of heaven. Do you want to know that it is so? "If you wish," he says, "to be perfect, go, sell all that you possess, and give to the poor, and come, follow me." He who wants, he says, to attain the kingdom of heaven, let him pray day and night, keep vigil, fast, lie on a rush mat, not on a feather cushion, not on silk. Penance does not love luxuries. "For I ate ashes," he says, "like bread, and mingled my drink with weeping." "He who fashions toil in the commandment: they will hunt the soul of the righteous." See how it seems not to be consistent. For what is the logical connection: "He who fashions toil in the commandment: they will hunt the soul of the righteous"? But what the fleshly ear does not understand, the spiritual ear understands. What then does he say? "He who fashions toil in the commandment": therefore, he says, we toil in the commandments of the Lord day and night, we keep vigil, we pray, we fast, because we have many adversaries who hunt the soul of the righteous. See what he says: they hunt the soul of the righteous, not of the unrighteous. For they do not want to deceive those who have been deceived, but the righteous. Whence it is said in Habakkuk: "His food is choice." "And they shall condemn innocent blood." Some are accustomed to say: That man who was killed would not have been killed, unless he were a fornicator, or had had some sin; the collapse would not have overtaken him, unless he had been a sinner; the shipwreck would not have overwhelmed him, unless he had been a sinner. See, then, what holy Scripture says: "And they shall condemn innocent blood." As long as we are in this world, we suffer all things in common. The righteous man and the sinner are shipwrecked alike, they have equal flesh, and equal conditions of the flesh. The righteous man and the sinner perish alike: the righteous man and the sinner have a similar end, but different rewards. One is led to Gehenna, another is led to the kingdom of heaven. "And they shall condemn innocent blood." Your conscience is enough for you, O righteous man: and even if you are condemned, let your blood be innocent, and it will cry out to the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_022.html'
source_title="Homily 22, on Psalm 93"

[[commentary]]
quote='''
"Shall the seat of iniquity cling to you?" You who judge righteousness, can you have iniquity for a neighbor? "You who fashion sorrow in a commandment?" The commandments of God have the sorrow of repentance; but that sorrow itself is good, because it furnishes the medicine of sinners. For unless with sweat and toil, we shall not do the commandments of God. Let no one, then, suppose that he will be crowned amid delights. "The widow who is in delights, while living, is dead." What the apostle said of one person, let us apply to all: for the apostle's care was not for widows alone, since he stood forth as the teacher of the whole Church. Now, because he did not name the virgin, nor the monk, nor the churchman, ought a man for that reason not to hold himself back from delights? For if the widow is a human being, I think the rest are human beings too: who, on account of the common frailty, can incur through delights that which the widow dreads. Listen, then, to what he says, "You who fashion sorrow in a commandment." For it is commanded us that we fast, it is commanded us that we be sober, that to the one striking our cheek we offer the other, that to the one taking away our tunic we let go our cloak also. All these commandments are not accomplished without toil. "For on account of the words of your lips I have kept hard ways." You see, then, that no one is crowned amid delights. "For narrow and strait is the way that leads to life." For whatever virtues there are, they are not accomplished without difficulty. With immense toil we reach the summits of a mountain: how much more into heaven? This is what is said in the Gospel: "The kingdom of heaven suffers violence." It suffers violence, because that which is not subject by nature is made subject to us through grace: so that from where the angels fell, men may ascend: so that where bodies did not fall, souls together with their bodies may go. Let someone say: How then will these same bodies of ours go into heaven? If Christ reigns, we reign with Christ: what he already possesses, he promises to us after the resurrection. If the firstfruits reign, the remnant also will reign. The flesh which reigns in Christ, why should it not reign in those who believe in Christ? "For when Christ shall appear, then we also shall appear with him in glory." If the flesh is adored by the angels in heaven, why should it not reign in men, who have merited the dignity of the kingdom? It is said elsewhere: "And adore his footstool, for it is holy." Some suppose it was said of the earth, "his footstool": but to me it seems that, in comparison with the divine majesty, the incarnation of the Savior is rightly named a footstool on account of the subjection of its lowliness; but because it is Christ's, it is adored. For nothing is lacking to the divinity: for whatever is οἰκονομία (the dispensation) in Christ is not added to him, but profits us: he is taken up into glory, so that the grace of our future hope may be shown to us, who have reigned with him. To whom is glory and dominion for ever and ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_071.html'
source_title="Homily 71, on Psalm 93 (Alternate Series)"
