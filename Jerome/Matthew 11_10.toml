[[commentary]]
quote='''
In him, John is greater than the other prophets, because while they had predicted someone who was to come, he pointed to the one who has already come, saying: Behold the Lamb of God, behold him who takes away the sins of the world. And because to the privilege of being a prophet, John added the reward of baptizing his Lord, it follows that he increased in merits, fulfilling the testimony of Malachi, in which even an angel is prophesied (Mal. II). However, here the term 'angel' cannot be understood as referring to John by nature, but rather by the dignity of his office, that is, as a messenger who announced the coming of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
To add to this great worthiness of John, He brings a passage from Malachias, in which he is spoken of as an Angel. (Mal. 3:1)) We must suppose that John is here called an Angel, not as partaking the Angelic nature, but from the dignity of his office as a forerunner of the Lord.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252011.html'
source_title="Catena Aurea by Aquinas"
