[[commentary]]
quote='''
He cast away the weight of impiety from the greatness of his greed. Seeing that the Lord was condemned to death, Judas returned the price to the priests, as if he had the power to change the sentence of those who persecuted. Therefore, although he changed his will, he did not change the outcome of his first intention.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
Judas, when he saw that the Lord was condemned to death, returned the money to the Priests, as though it had been in his power to change the minds of His persecutors.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252027.html'
source_title="Catena Aurea by Aquinas"
