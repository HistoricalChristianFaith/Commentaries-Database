[[commentary]]
quote='''
But the cause of such great crimes is that they believed there is no providence over the earth, nor does God care about mortal things... They either thought that there is no providence, or that which was in other nations has now abandoned its own people: on account of this, the eye of God will not spare, nor will it have mercy: so that raging against vices, it may be appeased by virtues, and may repay their ways and sins upon their heads, either upon the principal of the heart, or upon the leaders of the people, according to the book of Numbers, in which the leaders of the people are said to be the heads of the people.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
