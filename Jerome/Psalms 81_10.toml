[[commentary]]
quote='''
I would therefore beseech you, Pammachius, as a foremost lover of learning, and Marcella, as an outstanding examplar of Roman virtue, men who are bound together by faith and blood, to lend aid to my efforts by your prayers, in order that our Lord and Savior might in His own cause and by His mind make answer through my mouth. For it is He who says to the prophet, "Open thy mouth and I will fill it" (Psalm 81:10). For if He admonishes us, when we have been hailed before judges and tribunals, not to ponder what answer we are to give to them (Luke 12:11-12), how much more is He able to carry on His own war against blaspheming adversaries and through His servants to vanquish them?
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title="St. Jerome, Commentary on Daniel, Prologue"


[[commentary]]
quote='''
For I am the Lord your God, who brought you out of the land of Egypt. It is we who have been brought out of the land of Egypt — if indeed we have gone out, if we are in the wilderness, if we long to see the land of promise. If we have left Sodom, let us not look back to Sodom: we have been saved on the mountain. Let us not desire the flesh-pots of Egypt, let us not say: How well off we were in Egypt, when we ate flesh in the cauldrons, and the rest, and the cucumbers. Do you wish to receive the Lord's foods? do you wish to eat your Lord and Savior himself? Hear what he says. Open wide your mouth, and I will fill it. Open wide your mouths: he himself is both the Lord and the bread. He himself exhorts us to eat, and he himself is our food. As much as you open wide, so much will you receive: it is therefore not in my power, but in yours. If you are willing, you will receive me whole; if you are unwilling, you will receive at least a part.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_013.html'
source_title="Homily 13, on Psalm 80"