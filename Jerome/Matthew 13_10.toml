[[commentary]]
quote='''
The question may be raised as to how the disciples came up to Jesus when he was sitting in the boat. Perhaps we should understand by this that they had gotten into the boat with him a short while before and were now standing there asking him to interpret the parable.
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 2.13.10"

[[commentary]]
quote='''
We must enquire how they could come to Him at that time when Jesus was sitting in the ship; we may understand that they had at the first entered into the ship, and standing there, made this enquiry of Him.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252013.html'
source_title="Catena Aurea by Aquinas"
