[[commentary]]
quote='''
Also in Isaiah: The Lord of hosts will go out and fight against the nations, and stir up zeal, and cry out against his enemies with strength (Isaiah 42:13). Therefore, God will come out of his place when he is compelled to break his peace, meekness, and clemency for the sake of correcting sinners. Although he is naturally sweet, he becomes bitter due to our fault, that is, he becomes bitter not for himself, but for those who are suffering, for whom bitter torments are. He who speaks elsewhere through the prophet: I am God, and I do not change (Malachi III, 6). And it is said to him: But you are the same, and you remain (Psalm CI, 28). And in the letter of James: With whom there is no change (James I, 17): now he goes out and fights as in the day of battle, when he submerged Pharaoh in the Red Sea, and fought for the people of Israel (Exodus XIV).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Zechariah.html'
source_title="Commentary on Zechariah"

[[commentary]]
quote='''
(Verse 13) The Lord shall go forth as a mighty man, as a warrior he shall stir up zeal: he shall shout and cry out: he shall strengthen himself against his enemies. LXX: The Lord God of hosts will go forth and crush the battle, he will stir up zeal, and he will cry out against his enemies with strength. And the prophetic discourse describes the glorious advent of the Savior, about which even the Apostle Paul speaks: According to the illumination of the glory of the great God and our Savior Jesus Christ (2 Corinthians 4; 2 Timothy 1:10); and he compares him to a mighty man who will fight against his adversaries, arousing zeal. Of whom it is also prophesied in the Song of Deuteronomy: They have made me jealous with what is not a god; they have provoked me with their idols. So I will make them jealous with those who are not a nation; I will provoke them with a foolish nation (Deuteronomy 32:21). He will also shout and cry out against his enemies, openly condemning their faithlessness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
