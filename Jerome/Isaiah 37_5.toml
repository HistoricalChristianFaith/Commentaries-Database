[[commentary]]
quote='''
And when the servants of King Hezekiah came to Isaiah, the name of the Prophet was silent again, so that he would preserve the humility that had been started. And Isaiah anticipated them: for with the same spirit with which he knew the future, he had also heard the absent king: and he said what they should respond to their Lord, humbled in this trust of conscience. He said, 'Say to your master, who is your Lord; for my Lord says these things: Do not fear the words by which not you, but I am blasphemed. Nor do I say that I am going to do all the things that the king of the Assyrians wishes, lest it seem that I am boasting of my power; but that a spirit, not of God, but an adversary, is to be given to him. And upon hearing the message, let him return to his own land, and let him fall by the sword in it, so that both things which Hezekiah desired equally, he would hear: that he would be freed from the siege and danger, and that the angry and hostile king would die in his own land.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
