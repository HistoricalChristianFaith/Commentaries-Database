[[commentary]]
quote='''
We ought to understand the whole psalm as being about the death of the Savior. Finally, that you may know it is spoken of the Savior, it is said of the Jews: 'In this snare which they stretched out, their own foot has been caught.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_004.html'
source_title="Homily 4, on Psalm 9"
