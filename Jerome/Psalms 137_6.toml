[[commentary]]
quote='''
Let my tongue cleave to my jaws, if I do not remember you. That is, let me have neither works nor speech, if the memory of you is not continually turned over in my heart.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_048.html'
source_title="Homily 48, on Psalm 136"
