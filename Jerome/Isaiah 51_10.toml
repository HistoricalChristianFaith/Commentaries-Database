[[commentary]]
quote='''
For it is you who struck down the proud, wounded the dragon, the king indeed of Egypt Pharaoh, who is also called the great dragon in Ezekiel (Ezek. XXIX). You dried up the Red Sea, so that through the raging waters and deep sea, your people could find a way and escape the pursuing Egyptians. Therefore, you who did these things: now also bring back those redeemed and liberated by your blood to Zion and the heavenly Jerusalem, or to the Church which you prepared for yourself with your blood. In this place, when they are present, they will rejoice with eternal joy and say: Lord, you have crowned us with the shield of your good will. For they shall have joy and gladness, with sorrow and sighing fleeing away. This is according to the Hebrew. However, according to the Septuagint, Jerusalem, that is, the sinful soul is provoked to put on the strength of its arm and to take up its former works, just as it was before it fell: when it turned about in the day and in the light.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
