[[commentary]]
quote='''
Although you, o heretic, may seem great and despise the smallness of the Church, you are nonetheless small among the nations, and contemptible, and not only contemptible, but also very contemptible with arrogance. The pride of your heart has lifted you up. For who among heretics is not lifted up in pride, despising the simplicity of the Church and considering faith as ignorance? Dwelling in the clefts of the rock, and exalting his throne. Although the rock is often seen as representing the Lord Himself or His steadfastness (hence the prophet says, He set my feet upon a rock (Ps. XXXIX, 5)) and is also said to Peter, You are Peter, and upon this rock I will build my Church (Mat. I, 8), yet it is often interpreted in the opposite sense: I will take away the stony heart, and will give you a heart of flesh (Ezek. XXXVI, 26). And do not presume to say to yourselves, 'We have Abraham as our father,' for I tell you, God is able from these stones to raise up children for Abraham (Matt. 3:9). Especially here, where it does not say dwelling upon the rock, upon which the wise builder builds his house, but in the clefts of the rock, in order to signify the heresies that arise from Christ the rock and from the Church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Obadiah.html'
source_title="Commentary on Obadiah"
