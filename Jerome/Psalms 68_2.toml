[[commentary]]
quote='''
As smoke fails, let them fail: not that they should be reduced to nothing, but that they should rest from their sins. As wax flows away before the face of fire. Just as wax is melted, and does not lose its nature, but grows soft: so let these too not perish, but lay aside their hardness, and thus turn to repentance, and be saved. So let sinners perish from before the face of God: because sinners are not worthy to see God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
