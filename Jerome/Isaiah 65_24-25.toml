[[commentary]]
quote='''
Or certainly it must be understood that the devil, who previously fed on the deaths of men, will only devour those who are dust and earth: through which everything demonstrates the transformation of evils into good, those who are innocent will be, with the ancient ferocity abandoned: not outside, but on the holy mountain of the Lord, that is, in the Church, and in the confession of that mountain, from which the prince of Tyre was wounded, and having been cut from the mountain without hands, grew into a great mountain, and filled the world (Daniel 2). Let us ask in this place the Jews, and all those who still eat the chaff of the Scriptures under the name of Christian, which will be separated from the wheat in the Lord's winnowing fan and will be delivered to the wind and the flames, how the beatitude is to be estimated, namely in the thousand-year kingdom, on Mount Zion, the city of present Christ's Jerusalem; and in the most august Temple, will wolves and lambs, lions and oxen, serpents and humans eat together and live together in harmony? And will these (i.e. the holy ones) alone be harmless, who have dwelt on the holy mountain of the Lord? From which we understand that all who are outside the mountain are to be killed. Therefore, the entire world will be laid bare for wolves, lions, bears, leopards, and serpents, and all other beasts; and the vast forests, and the Egyptian wilderness, which is fertile with venomous animals, and the city of the holy ones will be a dwelling not only for humans, but also for beasts and serpents, as according to the earlier prophecy, the wolf shall dwell with the lamb, and the leopard with the goat, the calf and the lion, and the sheep shall all die together. And a little child shall lead them, and an infant shall put his hand into the hole of the asp, and shall destroy the brood of the reptile in its lair. (Isaiah 11) And the cause of such great happiness is because the whole earth is filled with the knowledge of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
