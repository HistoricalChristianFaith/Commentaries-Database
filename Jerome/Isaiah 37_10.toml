[[commentary]]
quote='''
These words were written in the Book of Kings and Chronicles, that the commander Rabshekah had left the siege of Jerusalem according to the will of the Lord, and went to his master, who he had learned was besieging Lachish, having either abandoned or captured it, to attack Libnah. He also, upon hearing that Tarachamregem, the king of the Ethiopians, was preparing to make war against him, went out to meet him, and yet sent messengers to Hezekiah and letters, in order to frighten those whom he had not yet conquered by force. And just as he had said to the people, "Do not let Hezekiah deceive you" (2 Kings 18:29), he speaks the same blasphemy to the king, saying, "Do not let your God deceive you" (2 Kings 19:10). And he gives examples from the past, how their gods were unable to deliver other lands from their hands, and therefore Jerusalem will not be able to be delivered either. In his enumeration of the other nations, Ana and Ava are mentioned, which the Seventy mixed, saying, anavegava, and they called it a conjunction, that is, vau, between the two nations Ana and Ava, in the Hebrew language, so that to those unaware it seems one nation or city.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
