[[commentary]]
quote='''
But what follows—"I said to the Lord, You are my God"—he directs his speech to the apostles and to the disciples and to us, if indeed we deserve to be disciples, teaching what he has said to the Lord of the universe. What, then, does he say he has spoken to the Lord? "You are my Lord": that is, you who are the Lord of all have become peculiarly mine, that is, the Lord of my own. He was the Lord of all even in the Old Testament, since he had created all things; but he became peculiarly the Lord of the saints, saying: "I am the God of Abraham and the God of Isaac and the God of Jacob." As, then, you are theirs, so you are now especially my Lord, because you deign to be the Lord of my own. And the reason why he is his Lord is added: For you have no need of my goods. For God almighty has no need of a man's goods, nor do our virtues contribute to God's advancement, since God receives no increase: but whatever we labor at and strive for, he receives and requires it of us for this reason, that he may restore to us what he has received. For that man too in the Gospel who from one mina had made ten minas not only received back what he had given, but was even granted the other mina, which another could not multiply. It is said also to Job: "What does it profit the Lord, if you make your way blameless?" Other masters, however powerful they may be, cannot yet say to their servants, "We have no need of your works": for indeed they make full use of their service. But God alone is a Lord who needs the service of his servants only for this, that he may have occasion to give more. And at the same time we are taught that if the Savior prays for us (for he did indeed pray also for the apostles in the Gospel, and therefore permitted those whom he had earlier urged to keep watch to sleep), we surely ought all the more to pray for ourselves: because, although we run, yet without him we cannot arrive at our goal, according to the interpretation of Symmachus and of the fifth edition, who said "My good is not apart from you"; so that this translation may be referred to that saying: "Unless the Lord build the house, they labor in vain who build it. Unless the Lord guard the city, he keeps watch in vain who guards it."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15"
