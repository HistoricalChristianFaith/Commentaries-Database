[[commentary]]
quote='''
He executeth judgment for them that suffer wrong. Even if it comes late, do not despair: coming he shall come, and shall save. He executeth judgment for them that suffer wrong. Let this alone be in our conscience, that we suffer unjustly. Let us hold this in our conscience, that we do not suffer on account of our sins, and that we do not do that of which we are accused. He giveth food to the hungry. And according to the letter it is profitable; and even if it be understood simply, it edifies the hearer. Behold the birds of the air, for they neither sow nor reap, and your heavenly Father feedeth them. He giveth food to the hungry. To the hungry he gives, not to those who belch. He therefore who as a monk has nothing, let him confidently receive: he who has and is belching, let him not receive. You know that you are hungry, you know that you have nothing: if you are hungry and have nothing, you rather confer a benefit, if you receive, than is bestowed on you. But if you have and are not hungry, you ought not to take away the food of the hungry, so that you, being sated, may receive. Receive what you may put into your belly, not what goes into your purse: receive a tunic that may cover your body, not one that may fill your chests. He giveth food to the hungry. This according to the letter. Let us speak also in another way. Let us hunger for Christ, and he himself gives us the heavenly bread. Give us this day our daily bread. Those who say this, hunger: those who desire bread, hunger. He who says, Give us this day our daily bread, surely speaks as one hungering. He giveth food to the hungry. Someone supposes that he speaks of the heavenly bread from the mysteries. And this indeed we receive, since it is truly the flesh of Christ, and truly the blood of Christ. But let us speak also in another way. The bread of Christ and his flesh is the divine word and the heavenly teaching. Whoever shall have received this bread and been sated, what will happen? What? The Lord looseth them that are fettered. If this bread shall have refreshed our soul, that is, the divine word and the heavenly teaching, at once our feet, which had been bound, are loosed. The Lord looseth them that are fettered. Lazarus too was bound; and he said: Loose him. The Lord looseth them that are fettered. And the daughter of Abraham had been bent over and bound for eighteen years; she is loosed, and looks up to heaven. See what is said there in the Gospel. And behold, it says, there was a certain woman, who had a spirit of infirmity for eighteen years: and she could not, it says, lift up her neck. Because she had a spirit of infirmity, she could not lift her neck upward. The Lord looseth them that are fettered. These same fetters are also works: since indeed the same sins, which take our necks captive, also bind our feet. Whoever is fettered cannot run. Whoever is fettered cannot run in the stadium of Christ: for the feet are weighed down by fetters, and are pressed to the ground, and fasten us to the earth. The Lord looseth them that are fettered. See the order. He giveth food to the hungry: first we hunger, then we receive food. But when we shall have been sated, our feet, which had been fettered, are loosed. And when they shall have begun to walk freely, what follows?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_055.html'
source_title="Homily 55, on Psalm 145"
