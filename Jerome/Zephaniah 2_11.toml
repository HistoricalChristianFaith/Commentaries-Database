[[commentary]]
quote='''
But let us also call the churches islands. And indeed it is said in another place too: "Many islands shall be converted to me." Do you wish to know that the churches are called islands? It is said in the prophet in the person of the Lord: "Speak," he says, "to the inhabitants of this island." Let the many islands be glad. For just as islands are set in the midst of the sea, so also the churches are set as it were in the midst of the sea of this world, and thus they are battered by persecutions as if by diverse waves. But these islands are battered daily, yet they are not overthrown. They are indeed in the sea, but they have Christ for their foundation, who cannot be moved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_024.html'
source_title="Homily 24, on Psalm 96"
