[[commentary]]
quote='''
(Verse 42, 43.) Give to him who asks of you, and do not turn away from him who wants to borrow from you. You have heard that it was said: Love your neighbor and hate your enemy. If we understand this saying to mean only about almsgiving, it cannot apply to most of the poor. But even if the rich give constantly, they cannot give constantly. Therefore, after the good of almsgiving, instructions are given to the apostles, that is, to the teachers, so that those who have received for free may give for free (Matthew 10). Money of this kind never runs out; but the more it is given, the more it is doubled. And when it waters the fields under its control, the spring's waters never dry up.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
If we understand this only of alms, it cannot stand with the estate of the most part of men who are poor; even the rich if they have been always giving, will not be able to continue always to give.

But it maybe understood of the wealth of doctrine: wealth which never fails but the more of it is given away, the more it abounds.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"
