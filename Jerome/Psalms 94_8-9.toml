[[commentary]]
quote='''
"Understand, you who are foolish among the people, and be wise at last, you fools. He who planted the ear, shall he not hear?" He who is a potter, is he ignorant of his own vessel? He who makes another hear, shall he then himself not hear? He who gave me eyes, shall he then himself not see? He who is the author of my understanding, shall he himself not understand? This passage tells especially against those who are Anthropomorphites, who say that God has the members that we too have. For example, God is said to have eyes: "The eyes of the Lord look upon all things"; "the hand of God makes all things." "And Adam heard," it says, "the sound of the Lord's feet walking in paradise." These things they hear simply, and refer human weaknesses to the majesty of God. But I say that God is wholly eye, wholly hand, wholly foot. He is wholly eye, because he sees all things; wholly hand, because he works all things; wholly foot, because he is everywhere. So see what he says: "He who planted the ear, shall he not hear?" He did not say, "He who planted the ear, does he then himself not have an ear?" He did not say, "Does he then himself not have eyes?" But what did he say? "He who planted the ear, shall he not hear? He who formed the eyes, does he not consider?" He took away the members, he bestowed the functions.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_022.html'
source_title="Homily 22, on Psalm 93"

[[commentary]]
quote='''
"Understand, you who are foolish among the people; and you fools, at last be wise. Shall he who planted the ear not hear? Shall he who fashioned the eye not consider?" By an argument from nature he rebukes and convicts the sinners. O you who suppose that mortal things do not pertain to the Lord, you who, along with Epicurus, say that God's care is kept apart from human affairs, listen to the argument from nature: because you are little children, I will offer you little examples. He who gave hearing to man, shall he himself not hear? And at the same time, see what he says. He did not repay like with like: for he did not say, "Shall he who planted the ear not himself have an ear?" or "Shall he who fashioned the eye not himself have an eye?" But because in God there are no members, therefore he speaks in such a way that we, as often as we read such things about God as are frequently found in the Scriptures, may understand that an operation is signified, not members. In Solomon we read: "In the hand of the tongue are death and life." Does the tongue then have a hand? But in order that we may come more easily to the understanding of the sense above, we have brought forward this testimony: for by the same reasoning by which you would give the tongue a hand, by that same reasoning you are going to give God all members.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_071.html'
source_title="Homily 71, on Psalm 93 (Alternate Series)"
