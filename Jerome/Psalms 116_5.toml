[[commentary]]
quote='''
The Lord is merciful and just, and our God has mercy. Prick up your ears, sinner: the Lord is merciful. But do not be careless: for there follows, and just. If you are a great sinner, listen, the Lord is merciful: if you are careless, listen, he is also just. But it seems to be as it were equal, the Lord is merciful and just: for instance, he is merciful in ten parts, and just in ten parts, and I speak thus for the sake of the simpler folk. Let someone say: If my sins are weighed, I cannot have as many good things as I have evil ones: but now it is said that he is merciful and just, merciful toward sinners, just toward the good: my sins begin to weigh me down, and he conquers in his mercy. Therefore he put "just" once, and "merciful" a second time. Merciful. He could also have spoken of the past. And our God, he says, has mercy: that he may always show him to be merciful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_039.html'
source_title="Homily 39, on Psalm 114"
