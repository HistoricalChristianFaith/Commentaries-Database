[[commentary]]
quote='''
And when the glory of the Lord was lifted up from the cherub, who was about to deliver coals of fire to the man; and it passed over to the threshold of the house, immediately the cloud, darkness, and gloom fill the inner courtyard. For in the presence of the majesty of the Lord, no punishments are carried out, and the glory of the Lord is seen in the courtyard, of which it is written: The sound of the wings of the cherubim was heard as far as the outer courtyard. ... Note, reader, in which they agree, and in which they differ, so that from the comparison of both, without our admonition, you may understand the divine sacraments, and that which I mentioned before, that both in the firmament and on the throne, and in the hand of man, it is not called untruth but resemblance. For now we see in a mirror, dimly, but then face to face. Now I know in part, but then I shall know just as I also am known. (I Corinthians 13)
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 3:10.2-8"
