[[commentary]]
quote='''
He has also made His mouth like a sharp sword, in order to kill the wicked with the breath of His mouth. Regarding this sword, he himself speaks in the Gospel: I have not come to bring peace upon the earth, but a sword, separating the wicked from the good.… And in shadow, he says, his hand protected me, so that the lowliness of flesh would be covered by the power of divinity, as the Angel announced to the Virgin: The Holy Spirit will come upon you, and the power of the Most High will overshadow you. He has set me like an arrow chosen, in his quiver he has hidden me. When he says "an arrow chosen," he shows that God has many arrows, but not chosen ones: which arrows are the Prophets and Apostles, who run throughout the whole world. Of whom it is also sung in another place: Your arrows are sharp, O mighty one; the peoples fall beneath you. But Christ, out of many arrows and many sons, is the chosen arrow, and He is the Only Begotten Son: whom He has hidden in His quiver, that is, in a human body, so that the fullness of divinity might dwell bodily in Him. And rare indeed is the faith of believers, to whom it is also said above: You are a hidden God, and we did not know.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
