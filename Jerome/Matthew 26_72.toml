[[commentary]]
quote='''
(Verse 72.) And again he denied it with an oath, 'I do not know the man.' And after a little while those standing there came up and said to Peter, 'Surely you also are one of them, for your accent betrays you.' Then he began to invoke a curse on himself and to swear, 'I do not know the man.' And immediately the rooster crowed. And Peter remembered the saying of Jesus, 'Before the rooster crows, you will deny me three times.' And he went out and wept bitterly. Some pious people have interpreted this passage in such a way that they say Peter did not deny God but only a man, and the meaning is: 'I do not know the man, for I know God.' A discerning reader understands how frivolous this interpretation is; they defend Peter in such a way as to make God guilty of lying. For if he did not deny, then the Lord lied, who said, 'Truly I tell you, this very night, before the rooster crows, you will deny me three times.' See what he says, you will deny me, not a man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
And again he denied with an oath, I do not know the man. I know that some out of a feeling of piety towards the Apostle Peter have interpreted this place to signify that Peter denied the Man and not the God, as though he meant, 'I do not know the Man, because I know the God.' But the intelligent reader will see that this is trifling, for if he denied not, the Lord spoke falsely when He said, Thou shalt deny me thrice.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252026.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
"And again he denied it with an oath, 'I do not know the man.'" I know that some people with a soft spot in their hearts for the apostle Peter have interpreted this passage to the effect that Peter did not deny God but man, and what he meant was "I do not know the man, because I know God." The wise reader realizes how frivolous this interpretation is, for those who thus defend the apostle make the Lord guilty of a lie. If Peter did not deny him, then the Lord lied in saying, "Truly, I say to you, this very night, before the cock crows twice, you will deny me three times." Notice what he says: "You will deny me"—not "the man."
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 4.26.72-75"
