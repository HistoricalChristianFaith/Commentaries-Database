[[commentary]]
quote='''
For the mouth of the sinner and the mouth of the deceitful man has been opened against me. Let us see how the mouth of Judas the betrayer was opened against the Lord. He comes to the Lord in order to betray him, and he says: Rabbi — that is, master. Behold, the mouth of the sinner and the mouth of the deceitful man. I in my clemency wish to save him, and I offer him a kiss, and I wish to overcome his malice; yet he persists in doing evil, so as to betray me. In a particular sense it is understood of Judas; but in a general sense of the Jews. In that time in which they were saying, "Crucify, crucify such a man," the mouth of the sinner was opened against the Lord. And that you may see that he speaks of all the Jews, you will recognize it from what follows. For what does he say? They have spoken against me with a deceitful tongue. I was being crucified for them, and they were mocking me. My wounds were their medicine, and I seemed to them a thing of derision.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_035.html'
source_title="Homily 35, on Psalm 108"
