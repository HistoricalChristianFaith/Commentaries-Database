[[commentary]]
quote='''
(V. 2.) The names of the twelve apostles are as follows. The catalog of apostles is provided in order to exclude those who will be false apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
The order in which the apostles were divided and the distinction of each one were given by him who plumbs the depths of the heart. The first to be recorded is Simon called Peter (to distinguish him from the other Simon, who is called the Cananaean from the village of Cana in Galilee, where the Lord turned the water into wine). He also calls James the son of Zebedee because he is followed by another James, the son of Alphaeus. And he associates the apostles by pairs. He joins Peter and Andrew as brothers not so much in the flesh as in the spirit; James and John, who left behind their natural father and followed the true Father; Philip and Bartholomew, Thomas and Matthew the publican.
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 1.10.2"


[[commentary]]
quote='''
A catalogue of the names of the Apostles is given, that all false Apostles might be excluded. The names of the twelve Apostles are these; First, Simon who is called Peter, and Andrew his brother. To arrange them in order according to their merit is His alone who searches the secrets of all hearts. But Simon is placed first, having the surname of Peter given to distinguish him from the other Simon surnamed Chananæus, from the village of Chana in Galilee where the Lord turned the water into wine.

The Evangelist couples the names throughout in pairs. So he puts together Peter and Andrew, brothers not so much according to the flesh as in spirit; James and John who left their father after the flesh to follow their true Father; James the son of Zebedee and John his brother. He calls him the son of Zebedee, to distinguish him from the other James the son of Alphæus.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
