[[commentary]]
quote='''
And so, that you may know that "righteousness" does not sound of cruelty, but of mercy, see what it says. For the Lord shall give loving-kindness. For this reason He looked down from heaven, that He might have mercy on His works. And our land shall yield its fruit. Truth indeed has sprung up out of the earth: this of the past. Now it is said of the future, And our land shall yield its fruit. Do not despair, because He was once born of Mary: daily He is born also in us. And our land shall yield its fruit. We too can bring forth Christ, if we will. And our land shall yield its fruit: from which is made the heavenly bread, of which He says, "I am the heavenly bread."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_017.html'
source_title="Homily 17, on Psalm 84"


[[commentary]]
quote='''
For indeed the Lord will give kindness. For this reason these kisses were given, that the Lord might give kindness. And our land will give its fruit. What was promised at that time, we now see fulfilled. Our land gives its fruit, when it is tilled with the plow of justice, when by fastings, when by abstinence and the other virtues it is uprooted from its old vices, so that it may render the grain of the gospel seed which it received into a hundredfold fruit. Peter and the rest of the apostles, because they cultivated their land with diverse labors, can confidently say, Our land has given its fruit. The martyrs too, when they are cut down, when they are crucified, their land will render its fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_064.html'
source_title="Homily 64, on Psalm 84 (Alternate Series)"
