[[commentary]]
quote='''
He shall say to the Lord: You are my upholder and my refuge, my God. For many enemies pursue me: therefore you are my refuge. I will hope in him. He did not say, "I hope"; but, "I will hope." For as long as we sin, we do not hope: if we cease to sin, we hope.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="Homily 20, on Psalm 90"

[[commentary]]
quote='''
My refuge is my God. Beautifully he said, "refuge," for there are many persecutors, and you alone are a refuge. Many are the wounds, but you alone are the physician.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"
