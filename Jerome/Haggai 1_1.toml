[[commentary]]
quote='''
It is called and introduced living speech of God, and effective, and sharp above every two-edged sword (Heb. IV), so that the neglectful soul (which is interpreted as a dry land, and desires to dwell more in hollows than to build the house of God) may be struck by its blade, and whatever fruits it thinks it has, may be scattered. The sword is also brought against the mountains that exalt themselves against the knowledge of God, and against the wheat, and wine, and oil, with which they deceive the people who have been deceived by the assemblies of heretics... But the sword of God strikes also other things which they find and fabricate without authority and testimonies of the Scriptures, by their own tradition of the apostles.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Haggai.html"
source_title="COMMENTARY ON HAGGAI 1:11"


[[commentary]]
quote='''
While you are reflecting upon this thought, meditate upon the mystery that is hidden within it. If we lift up our hands, Jesus triumphs. If we lift up our hands in good works, through our good works, Christ overcomes the devil. Hands, moreover, connote good works, whereupon it is written: "The word of the Lord came by the hand of Haggai"; "the word that came by the hand of Jeremiah the prophet." To be sure, the word of the Lord does not come by the hand but by the mouth, but grasp the mysticism of the Scripture. God does not come because of words but because of good works.
'''
source_url=''
source_title="HOMILIES ON THE PSALMS 46"
