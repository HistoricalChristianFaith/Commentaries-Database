[[commentary]]
quote='''
Truth has sprung up out of the earth. "I am the way and the truth and the life." He who said, I am the truth, has sprung up out of the earth. What is this truth, which has sprung up out of the earth? "There shall come forth a rod out of the root of Jesse, and a flower shall rise up from his root." And in another place: "For God has wrought salvation in the midst of the earth." What do you say, Manichaean, who deny that the Savior had flesh? Behold, the truth, the Savior, has sprung up out of the earth, that is, out of Mary. And righteousness has looked down from heaven. For it was righteous that the Savior should have mercy on His people. See what it says. O righteous judgments of God, and His ways past finding out! Truth has sprung up out of the earth, that is, the Savior. And again, And righteousness has looked down from heaven. Righteousness is the Savior Himself. How has He sprung up out of the earth? How has He looked down from heaven? He has sprung up out of the earth, because He was born a man: He has looked down from heaven, because as God He is always in the heavens. That is, He was indeed born of the earth: but He who was born of the earth is always in heaven. That is, He so appeared on earth that He did not leave the heavens. For God is everywhere. He looked down: because, as long as we were sinning, He turned His eyes away from us. What He says is this. It is righteous that the potter should have mercy on his works, that the shepherd should have mercy on his flock. We are His people, we are His creation. Therefore, then, He sprang up out of the earth, and looked down from heaven, that He might fulfill His righteousness, and have mercy on His work.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_017.html'
source_title="Homily 17, on Psalm 84"


[[commentary]]
quote='''
Truth has arisen from the earth, and justice has looked down from heaven. The truth of the promise has arisen from the earth, and the sun of justice has looked down from heaven: that he might lavish his light upon men set in darkness and in the shadow of death.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_064.html'
source_title="Homily 64, on Psalm 84 (Alternate Series)"
