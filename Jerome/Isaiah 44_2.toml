[[commentary]]
quote='''
Do not fear their cruelty, my servant Jacob, whom I have chosen. He is also called Israel; Isurun in Hebrew, and the others, the most upright or the straightest. Only the LXX called him the most beloved, combining it with their own, Israel. Specifically, according to the Hebrews and the faith of the scriptures, Israel is called the upright one of God. But a man who sees God is not in the elements, but in the sound of his voice. And the book of Genesis is called εὐθεῖς, that is, the book of the righteous: Abraham, Isaac, and Israel. Therefore, do not be afraid, Jacob and Israel, for I will pour out water on the thirsty and the dry land... He also compares those who are reborn in baptism to evergreen herbs and willows that grow by flowing waters, and he brings forth fruits against nature, which was previously barren, or whose seed, when consumed as food, renders them barren.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
