[[commentary]]
quote='''
Who dwells in the help of the Most High. "Help" is what Ezra means. Indeed, the prophet Ezra is called βοηθός (boēthos), "helper." This is the one who led the people back from the captivity of Babylon and brought them into the land of promise. Whoever, therefore, dwells in Ezra, whoever dwells in Jesus (for the moment according to the tropological sense), who built for himself a house without hands, as the apostle says — that house which the Lord had built even for the midwives in Egypt: he shall abide under the protection of the God of heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="Homily 20, on Psalm 90"

[[commentary]]
quote='''
The praise of a song, by David himself. First we ought to know this: that from the eighty-eighth psalm up to the hundredth—that is, eleven psalms—have no title in the Hebrew; and that they belong, as we treated most recently in the previous psalm, to the same person to whom that one belongs as well which is headed with this title: "A prayer of Moses, the man of God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"

[[commentary]]
quote='''
He who dwells in the help of the Most High. Ours it is to begin, God's it is to help; for He does not crown those who sleep, but those who labor. He shall abide in the protection of the God of heaven. In place of what we read, "of the God of heaven," the Hebrew has saddai. Hence that which is said in Ezekiel, "And I heard the voice of the Lord Saddai speaking," can be understood thus: that he heard the voice of the Lord, the God of heaven, speaking; for Saddai is interpreted "God of heaven."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"
