[[commentary]]
quote='''
Who gives snow like wool, who scatters mist like ashes. He sends his crystal like morsels. See how great is the difficulty, how obscure are the things that are said. Before the face of his cold, who shall stand? Whose? Nothing is said. Let us see, then, from the beginning what is said. And he fills you with the fat of the wheat: he sends forth his word to the earth, swiftly runs his word. Suddenly, what follows? Who gives snow like wool. The word of the Lord, which runs swiftly, is given as it were like snow, and that snow is as it were like wool. See the mercy of the Lord. The food of the Lord is turned for us into a garment. John had said of the Lord the Savior: Behold the Lamb of God, behold him who takes away the sins of the world. And in another place Isaiah: Like a sheep he was led to the slaughter. Of this lamb, then, and of this sheep, this wool is as it were like snow. Isaiah says: If your sins be like scarlet, they shall be made white like snow. You shall sprinkle me with hyssop, and I shall be cleansed: you shall wash me, and I shall be made whiter than snow. Who gives snow like wool. Take away, O Lord, my filth, take away whatever vice there is. Grant your snow and your purity to Christian minds. Unless you give us the snow of your cleansings, we cannot have your garment. Christ is our garment. If we wish to have the garment of Christ, let us be clean like snow. He scatters mist like ashes. The Latin translated badly, "mist": for what is called ὁμίχλη in Greek, in Hebrew has "hoarfrost." And so it follows thus: He scatters hoarfrost like ashes. He teaches us, and makes for us a garment like snow; and when he has clothed us with his garment, then he grants us nourishment. He scatters hoarfrost like ashes. See what he says, like ashes. Do you wish to be clean? Do penance. I ate my bread like ashes, and mingled my drink with weeping. Do you not see how he scatters his hoarfrost like ashes? A great change of things: out of ashes snow is made, out of penance one is made clean.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_057.html'
source_title="Homily 57, on Psalm 147"
