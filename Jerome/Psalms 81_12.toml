[[commentary]]
quote='''
And I let them go according to the desires of their heart: they shall go on in their own devices. Unhappy is he who is not corrected by God. If anyone sinning is not struck, he is wretched. Therefore he says: I let them go according to the desires of their heart. For this reason I let them go, because I often struck them and they did not accept discipline. I entreated, they did not hear; I struck, they did not feel the pain. I let them go in their own wishes, so that, sated with their vices, they might even so do their repentance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_013.html'
source_title="Homily 13, on Psalm 80"
