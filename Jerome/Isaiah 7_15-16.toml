[[commentary]]
quote='''
I will say something even more amazing, so that you do not think that he is born in a fantasy, he will use foods of infancy, he will eat butter and milk. And although many centuries later the Evangelist testifies about him: But the child grew in wisdom and age and grace before God and men (Luke 2:52): and this is said to confirm the truth of the human body: yet still wrapped in swaddling clothes, and fed with butter and honey, he will have the ability to judge between good and evil, so that he may reject evil and choose good. Not because he did or disapproved or chose this, but because he knew how to disapprove and choose, so that through these words we may know that the infancy of the human body did not hinder divine wisdom. Lastly, the Angels announce to the shepherds the laying in the manger: The Magi adore coming from the East, whom it is to be believed were certainly chosen. And on the other hand, Herod, the scribes, and the Pharisees are disapproved, (Matthew 2), because they killed many thousands of infants for the sake of one child.

(Verse 16) For before the boy knows how to reject evil and choose good, the land that you detest will be abandoned by the face of its two kings. In the sixth year of the reign of Hezekiah, Samaria was captured by the Assyrians (2 Kings 18), that is, in his thirty-first year of age. Therefore, this one who is to be born, either from a Virgin, as we believe, or from a young woman, as the Jews claim, will eat butter and honey, and will be so young that he cannot discern between evil and good, and before he leaves infancy, the land of Syria and Samaria will be laid waste by the Assyrians. Let the Hebrews answer how Hezekiah is proclaimed an infant at the age of thirty-one, and of such a young age that he, eating honey and butter, like the children of Nineveh, does not know left from right, that is, does not know evil from good. But in regard to Emmanuel, which means 'God is with us,' he will have an easy understanding. As for the mystery and invocation of his name, let the land of Syria and Samaria be laid waste, even by the Assyrians who prevail, and let the house of David be freed from the two kings whom he fears, namely, Rezin and Pekah.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
