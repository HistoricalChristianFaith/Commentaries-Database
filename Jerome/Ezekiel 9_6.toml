[[commentary]]
quote='''
And what follows: 'And begin from my sanctuary,' or as the Seventy have translated, 'begin from my saints,' which means the priests who served in the temple and worshipped idols; or those who were called holy due to their merit in the priesthood among the people, and who were the first to deserve punishment for the sins of the people. For it is time, as it is written in I Corinthians 7, that judgment begin from the house of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
