[[commentary]]
quote='''
"And he shall set his face to come and possess all his kingdom, and he shall make upright conditions with him. And he shall give him the daughter of women, that she may overthrow him" (Vulgate: it). That is to say, the intention is to overthrow him, that is, Ptolemy, or else to overthrow it, that is, his kingdom. Antiochus not only wished to take possession of Syria, Cilicia, and Lycia, and the other provinces which had belonged to Ptolemy's party, but also to extend his empire to Egypt. He therefore used the good offices of Eucles of Rhodes to betroth his daughter, Cleopatra, to young Ptolemy in the seventh year of his reign; and in his thirteenth year she was given to him in marriage, professedly endowed with all of Coele-syria and Judaea as her marriage-portion. By pleonasm she is called a daughter of women, just as the poet says:

...Thus she spake with her mouth... And with these ears did I drink in her voice.

"And she shall not stand, neither shall she be for him." For he was unable to take possession of Egypt, because Ptolemy Epiphanes and his generals detected the strategem and followed a cautious policy. And besides, Cleopatra inclined more to her husband's side than to her father's.
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title="St. Jerome, Commentary on Daniel, CHAPTER ELEVEN"
