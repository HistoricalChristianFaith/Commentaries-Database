[[commentary]]
quote='''
Once it is said in Hebrew: 'Listen,' and secondly according to the Septuagint: 'Hear me, hear me,' so that it may teach us that we should hear with the ears of the body and the understanding of the soul. And a multitude of nations, which is the people of God, is called upon to diligently listen to what is said about it, as Zacharias says: 'Many nations will take refuge in the Lord, and they will become his people' (Zech. II, 11). They are called a people, as some will have it, the remnant of believers of Israel; and for tribe, or race, those who have believed from the multitude of nations, as Moses in Deuteronomy says to the nations in his song: 'Rejoice, O nations, with His people' (Deut. 32:43). For tribe, which we have interpreted as Theodotion, means 'race'; Symmachus translates it as 'nation'; the Seventy, as 'kings'. For we are both tribe and race, and people, and a royal and priestly lineage of the Lord, just as Abraham, who was called a king, and the other saints, of whom it is written: 'Touch not my anointed ones' (Ps. 105:15). What is it that is commanded to be heard? Because the law, he says, will go forth from me, and my judgment into the light of the people, or nations. This law of the Gospel is shown to be spiritual, which will go forth from Zion; not of Moses, which was given of old on Sinai; and my judgment will proceed into the light of the nations, through which it has been established and decreed that all nations will be saved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
