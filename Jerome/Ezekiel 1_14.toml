[[commentary]]
quote='''
But the burning coals and the lamps running among the animals are interpreted from that place of Isaiah: And the fire shall eat the flesh as the grass, and I will sanctify them in the burning fire (Isaiah 5:24). And it is written elsewhere: Burning coals shall fall upon them (Psalm 140:11). And against deceitful lips, it is said in another psalm: 'What shall be given to you, or what shall be added to you, to a deceitful tongue? Sharp arrows of the powerful, with coals of desolation.' (Psalm 119:3-4). And in another place: 'You have coals of fire, you shall sit upon them, they shall be to you for help.' (Isaiah 47:14). Whatever creature we behold, it reflects the knowledge of God, as the Creator is recognized through his creatures. And from the midst of living beings comes the splendor of fire and lightning. For if you study the Gospels, amidst the letters and humble history, you will discover the sacraments of the Holy Spirit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
