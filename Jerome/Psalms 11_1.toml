[[commentary]]
quote='''
What the phrase "unto the end" signifies — for which Symmachus rendered ἐπινίκιον (a song of victory), while Aquila and the sixth edition rendered τῷ νικοποιῷ (to the giver of victory) — has been discussed more fully above. Now let us return to the order of the tenth psalm: a number which is both an end and a beginning, in which every reckoning is rolled around, and to which the decalogue also — that is, the first law — is owed. The just man too, on account of the Lord's money doubled in the Gospel, received cities of this number to govern. And, to bring in something rather curious: from this the name of Jesus, that is, of the Savior, begins, and that ineffable name of four letters among the Hebrews takes its start from here, being written with ioth, he, vau, he; into which, through its tens, the hundredth number unrolls, and again the thousandth grows through ten hundreds, and as far as human reason can proceed, always this number is both an end and a beginning, according to that sense: "I am Alpha and Omega, the beginning and the end."

In the Lord I trust; how do you say to my soul: Flee away to the mountains like a sparrow? Those who eat the raw flesh of the lamb and follow the letter that kills would have this psalm understood of the person of David, when he fled from the face of Saul and was compelled to dwell in the deserts of Judah. And they say that it is spoken by him thus: Although Saul and all his army do not permit me to dwell in my homeland, and I flit or run to and fro, here and there, wandering and roving after the manner of birds and beasts, yet I have God as my protector, in whom trusting I shall not fear your snares. And in truth, if only the beginning be read, their exposition does not appear frivolous. But what follows — "For they have destroyed the things which you have perfected" — and the rest down to the end does not agree with this exposition. Therefore the spiritual man, who judges all things and is himself judged by no one, says that this psalm was sung by our Lord and Savior according to a twofold understanding: either he was speaking to the angels who ministered to him, or to the adverse powers, which desired to mock and terrify him. If to the angels, this is the sense: Why do you exhort me to return to heavenly things, and, leaving behind earthly and lowly things, to dwell in my mountains, because of the snares of the devil and all his army, which you behold stirred up against me? Why do you wish that I take up the wings of my deity, and desert human converse, and dwell secure in the heavens, when I have come for this purpose: that in the Lord — that is, having confidence in my own divinity — I may overcome my exulting adversaries? But if his speech is to the adverse powers, it is to be understood thus: In vain do you think that I am to be terrified by your voices and by the wedge of battle drawn up against me, since I have come for this purpose: that I may fight, and by fighting overcome — as is also shown by the very title of the psalm, according to Aquila and Symmachus. Furthermore, another (since this psalm has nothing so special that it cannot also be understood under the person of any just man) will indeed accept the holy intention of those who refer the psalm to Christ, but will also assert that the whole context can be understood from the person of the prophet — that is, of the just man. In the Lord I trust; how do you say to my soul: Flee away to the mountains like a sparrow? The crafty adversary both tempted the Lord and Savior in the wilderness, and wishes all the saints to depart from the land of Judah and to dwell in the desert of the virtues, that there he may more easily strike them down. But even his very counsel is deceitful: for he does not exhort that one take the wings of the dove — a bird gentle, simple, and domestic, said to lack gall, and which is offered for the Lord in the temple — but the wings of a sparrow, a bird chattering and roving, which after the rearing of its young knows nothing of the fidelity of wedlock; although Aquila and Symmachus rendered "bird" generally in place of "sparrow." By the mountains, however, we can understand those of which it is said in another place, "Draw near to the eternal mountains," and in the second psalm of the steps, "I have lifted up my eyes to the mountains from whence help shall come to me": and to which, after the abomination of desolation shall stand in the holy place, we ought to migrate.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_060.html'
source_title="Homily 60, on Psalm 10 (Alternate Series)"
