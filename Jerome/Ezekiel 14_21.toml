[[commentary]]
quote='''
Concerning all these, neither the teaching of spiritual parents, whom we understand as masters, nor the rulers will be able to free them, unless there is agreement of the sons, and their petitions have aided their efforts. For the justice of the just person will be upon him, and the iniquity of the wicked person will dwell in him: Each person will die for their own sin, and their righteousness will save them (Deut. XXIV, 16).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
