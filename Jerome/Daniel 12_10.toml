[[commentary]]
quote='''
"Many shall be chosen and made white and shall be tried as fire; and the wicked shall deal wickedly. And none of the wicked shall understand, but the learned shall understand." But he comments that when the end comes, the ungodly will lack comprehension, whereas those who are learned in the teaching of God will be able to understand. "For wisdom will not enter the perverted soul, nor can it impart itself to a body which is subject to sins."
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title="St. Jerome, Commentary on Daniel, CHAPTER TWELVE"
