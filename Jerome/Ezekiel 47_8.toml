[[commentary]]
quote='''
(Verse 8) These waters that come out, either into the Galilee of the Gentiles, according to the Septuagint, or (as it is more accurately contained in Hebrew) into the hills of the eastern sand, and they descend to the plains of the desert, or to Arabia, they will enter the sea, or to the ends of the sea, and the waters will be healed. We previously said that waters either signify the grace of baptism or the Evangelical doctrine. If these waters leave the threshold of the Lord's temple and hold fast to the Apostolic discipline, they make the previously barren and infertile hills fruitful and turn everything flat and deserted into a well-watered land, so that they embody the sacrament of the Jordan River. This river, which Elisha cured with Evangelical and Apostolic salt, transformed barrenness and death into abundance and life. Not only did they heal the deserts, but they entered the Dead Sea, a sea in which nothing living could exist, and the most bitter sea, which in Greek is called λίμνην ἀσφαλτῖτιν, that is, the lake of bitumen. And in a wonderful way, the dead waters are healed by the waters of the Gospel, which, because they have nothing living in them, are given the name of death. For they had not known Him who says: I am the way, the truth, and the life (John 14:6).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
