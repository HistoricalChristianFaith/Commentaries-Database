[[commentary]]
quote='''
The Lord enlighteneth the blind. See what it says. If he were speaking of these blind men, he ought to have said, The Lord enlighteneth the blind. But he did not say this: but according to the Hebrew and Greek truth, what did he say? The Lord maketh the blind wise. If he were speaking of these eyes of the flesh, he ought to have said, The Lord enlighteneth the blind: but now indeed he says, The Lord maketh the blind wise. If ye were blind, he says, ye should have no sin. Our heart has been blinded by the darkness of sins. Foolishness and stupidity are the darkness of our eyes. When therefore we hungering shall have been refreshed, and our feet shall have been freed, then also the eye of our heart will begin to see the light which it had once lost, and to have wisdom. If one shall have been made wise, what follows? The Lord raiseth up them that are cast down. And if you were lying down, be secure: the Lord stretches out his hand. The Lord loveth the just. I see two things: he loves, and he guards. He who loves, loves it as his own: but he who guards, guards him who is set in danger. The Lord loveth the just. Whoever is just and perfect, he is loved; but whoever is a stranger, and has not come to the servitude of the Lord, he is preserved.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_055.html'
source_title="Homily 55, on Psalm 145"
