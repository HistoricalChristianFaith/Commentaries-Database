[[commentary]]
quote='''
And because he rains snares upon sinners, and gives them to drink the goblet of torments which they deserve, God himself, being just, loves justices. For just as there is one true God, even if there are many gods who are so called by participation in him, and there is one only-begotten Son of God, while others are called so by adoption; so also there is one true justice, as is written in the beginning of the Proverbs, but from communication of it the Lord loves many things called justices.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_060.html'
source_title="HOMILIES ON THE PSALMS, ALTERNATE SERIES 60 (PSALM 10)"


[[commentary]]
quote='''
To confess that we are imperfect, and have not yet apprehended, nor yet obtained, this is true wisdom in man: know thyself to be imperfect; and, if I may so speak, the perfection of all who are righteous, so long as they are in the flesh, is imperfect. Hence we read in Proverbs: "To understand true righteousness." For if there were not also a false righteousness, the righteousness of God would never be called true.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FAgainst%2520the%2520Pelagians%2FBook%25201.html'
source_title="Against the Pelagians 1.14"


[[commentary]]
quote='''
But "panourgia," that is, cleverness, may be taken either in a good or in a bad sense: in a good sense, according to Proverbs, "That he may give," it says, "shrewdness to the innocent, and to the younger boy sense and understanding"; in a bad sense, as in the apostle, "But I fear lest, as the serpent seduced Eve by his shrewdness, your minds may be corrupted from the simplicity that is in Christ." What he says, then, is this: my instruction and deep thought and the inner affection of the heart was not only with me in the heavenly places, but even while I dwelt in the night of this world and in darkness, it was engaged with me in the man, and instructed me, and was never absent from me, so that whatever the weakness of the flesh could not do, divine thought and power might accomplish.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="HOMILIES ON THE PSALMS, ALTERNATE SERIES 61 (PSALM 15)"
