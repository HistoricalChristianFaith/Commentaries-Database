[[commentary]]
quote='''
Some interpret it differently, as the exalted humbled and the humble exalted, referring to the passion of the Lord Savior. Who, being in the form of God, did not consider it robbery to be equal with God: but emptied himself, taking the form of a servant (Philippians 2:6-7); and after the resurrection, the same tree was exalted, which was first green, dried up by death, and then revived, regaining its original greenness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
