[[commentary]]
quote='''
And what follows: I will clothe the heavens in darkness, and its covering will be like sackcloth; or everything that is above us, let us understand as heaven, just as those flying creatures that are in the air are called celestial; and the opposing powers are said to be celestial, which move between heaven and earth. Or certainly, the heavens are clothed in darkness when they are covered with clouds. According to what is written: Who covers the heavens with clouds, and gives rain to the earth (Psalm 147:8). And in the threat of drought, God says: I will make the sky bronze and the earth iron (Deut. XXVIII, 23). Not that the nature of the elements is changed, but that the magnitude of the punishment is shown through bronze and iron. Philosophers say that clouds are lifted no more than ten stadia above the earth and hide the brightness of the sun. Therefore, the sky is not wrapped in a sack, but the air beneath, with the light of the sky blocked, is darkened by the darkness of the clouds. We can interpret that the heavens are covered with darkness, and being covered with a sack, in such a way that we say all are under sin, and even the holy ones need the mercy of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
