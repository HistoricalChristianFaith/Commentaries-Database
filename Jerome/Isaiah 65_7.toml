[[commentary]]
quote='''
For we should not accept those fathers, whose injustices and sins are now being repaid to us, from whose seed our bodies are born. Otherwise, Moses himself, who said that the sins of the fathers are to be repaid to the third and fourth generation, interprets his own statement, saying: The children shall not die because of the sins of the fathers, but each one shall die in his own sin. With the approval of the same Ezekiel, it is said that the parable 'The fathers ate sour grapes, and the children's teeth were set on edge' (Ezek. XVIII, 2) should not be spoken in that way, but only the teeth of the one who eats are set on edge, and the sinful soul perishes without expiating external sins. From this we understand, either in a positive or negative sense, that each father to whom one is assigned is to be taken when he has departed from this life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"

[[commentary]]
quote='''
But Abraham, preserved from the fire of the Chaldeans by the integrity of his faith (Genesis 11). In this sense, the words of Jeremiah, spoken from the perspective of the Lord, agree: 'I have found Israel like a warm desert, with those slain by the sword' (Jeremiah 38:2 in the Septuagint; in the Vulgate, Jeremiah 31:2). For when, he says, the whole world lay wounded by idolatry as if slain by the sword, Israel was found to have the warmth of faith in Abraham, like a physician who, after a battle among the dead bodies, where he perceives some vital signs in the pulsing veins, applies care to the wounds in order to restore health. For it is written, ὡς θερμὸν, that is, like something warm, deceived by the ambiguity of the word, the Latin interpreter translated it as "lupinum," in which even many of the Greeks err. And yet it should be known that in Hebrew it is written as 'Thoda', which means grace; namely, that Israel is saved by the grace of God and not by the merit of their own works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
