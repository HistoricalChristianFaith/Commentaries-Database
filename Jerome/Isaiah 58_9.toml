[[commentary]]
quote='''
[Daniel 9:21] "While I was still speaking in my prayer, behold the man Gabriel, whom I had seen at the beginning of the vision." He calls the previous vision preceding this one the beginning. The effect of his prayer was considerable, and the promise of God was fulfilled which says, "While thou art yet speaking, lo, I am at hand" (Isaiah 58:9). And Gabriel appears not as an angel or archangel, but as a man (vir), a term used to indicate the quality of virtue rather than specifying his sex.

"...he quickly flew to me and touched me at the time of the evening sacrifice." It is stated that he flew, because he had made his appearance as a man. It is said that it was at the time of the evening sacrifice, in order to show that the prophet's prayer had persisted from the morning sacrifice even unto the evening sacrifice, and that God for that reason directed His mercy towards him.
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title="St. Jerome, Commentary on Daniel, CHAPTER NINE"

[[commentary]]
quote='''
It is difficult to find someone who is not bound by these chains. It is rarely found a soul that does not have this heavy burden encircling its neck, weighing it down with earthly pursuits, so that it does not look to the heavens but only to the earth. This is also reflected in the Gospel story of the woman whom Satan had bound for eighteen years, so that she was bent over and could not see the heavenly things. Therefore, it is said, if you remove this chain from the midst of your heart and break these kinds of bonds, and if you also extend your hand, as three other interpreters render this phrase, and refrain not only from thinking or doing evil, but also from speaking ill of your neighbor and pointing out each person's faults as if with a finger, and if you avoid speaking what does not benefit your soul, considering not your own faults but the errors of others, then you will receive what the following passage adds. … Therefore, if we do not do those things which are said, and if we do those things which are to be said, let us not give our bread to the hungry as before, but our soul, so that we may help him however we can, and let us not do it with sadness and necessity, but willingly, receiving more than giving charity. For God loves a cheerful giver, so that we may not refresh the hungry or the afflicted partially, but fully satisfy them; and let us grieve with those who grieve and mourn with those who mourn, then our light shall rise in the darkness, he who says: I am the light that came into the world, so that everyone who believes in me does not remain in darkness, but has the light of life. For the eye is the light of our body: if it is simple, our whole body will be full of light. … We can say that this spring is none other than the one to whom it is said, With you is the fountain of life: which continually waters His Church and the hearts of all believers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
