[[commentary]]
quote='''
For he had spoken earlier about a woman's desire, and now correctly referred to the wandering of thought and sense as an eye. On the right hand, as well as other parts of the body, the beginnings of the will and emotions are demonstrated: such as what we conceive in our minds, we accomplish in our actions. Therefore, we must be careful that what is best in us does not quickly turn into vice. For if the right eye and right hand cause stumbling, how much more those things that are on the left in us! For if the soul falters, how much more the body, which is inclined towards sin! Otherwise, in the right eye and in the right hand, the affections of brothers, wives, children, relatives, and close ones are shown, which if we see as an impediment to contemplate the true light, we must cut off such portions, so that while we desire to make others gain, we ourselves do not perish forever. Where is it said, concerning the high priest, whose soul is dedicated to the worship of God: 'He shall not defile himself for the dead among his people, except for his close relatives.' (Lev. 21:11), that is, he shall not experience any emotions except for those related to his dedication.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
