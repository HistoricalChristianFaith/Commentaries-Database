[[commentary]]
quote='''
They humbled his feet in fetters. Because he refused to consent to the Egyptian mistress. They humbled his feet in fetters: but they could not humble his righteousness. For when he was sixteen years old, he was loved passionately by the mistress, and though set in such an age, which is more given over to pleasure, he refused to consent to iniquity, but rather feared the peril of his soul. The iron passed through his soul. By the iron he means sin itself, which slays the soul. In another sense: because he was in peril, accused by the mistress of such a crime. For the mistress burned for him, as it is written: 'All the adulterers, their hearts are like an oven.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_031.html'
source_title="Homily 31, on Psalm 104"
