[[commentary]]
quote='''
(Verse 8.) But lifting up their eyes, they saw no one except Jesus alone. Reasonably, after they had risen, they saw no one except Jesus alone: lest if Moses and Elijah had continued with the Lord, the uncertain voice of the Father would be seen, to whom he would give the testimony. Therefore, they see Jesus standing, the cloud having been taken away, and Moses and Elijah had vanished: because after the shadow of the Law and the Prophets had departed, which had covered the apostles with its veil, both lights are found in the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
And when they lifted up their eyes, they saw no man, save Jesus only; which was done with good reason; for had Moses and Elias continued with the Lord, it might have seemed uncertain to which in particular the witness of the Father was borne. Also they see Jesus standing after the cloud has been removed, and Moses and Elias disappeared, because after the shadow of the Law and Prophets has departed, both are found in the Gospel.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252017.html'
source_title="Catena Aurea by Aquinas"
