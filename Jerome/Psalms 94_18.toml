[[commentary]]
quote='''
"If I said, My foot has slipped." Considering my frailty and human weakness, I did not think my foot stood on firm footing: wherever I set my foot, I feared a fall. Again I thought of your name, and I stood with firm foot.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_022.html'
source_title="Homily 22, on Psalm 93"

[[commentary]]
quote='''
"If I said, My foot has slipped: your mercy, O Lord, was helping me." The confession of weakness quickly earns God's help, and by however much pride gives offense, by that much is he appeased by humility. "If I said, My foot has slipped": if I confess my sins, if I say that my foot has stood on slippery ground, if I do not trust in my own strength, if I acknowledge that I am not, though fallen, strong, at once "your mercy helps me."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_071.html'
source_title="Homily 71, on Psalm 93 (Alternate Series)"
