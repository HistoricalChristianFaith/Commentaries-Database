[[commentary]]
quote='''
Let us come to spiritual understanding. He who is in a tabernacle does not possess a firm and permanent dwelling; but he always changes places and hastens to go further, saying in the psalm: 'I will pass to the place of the wonderful tabernacle' (Ps. XLI, 5), forgetting the things that are past and extending himself into the future, until he reaches the reward of the heavenly calling. We read about this tabernacle and in another place: How lovely are your dwelling places, O LORD of hosts! My soul longs, yes, even faints for the courts of the LORD (Psalm 84:1). And it continues: Blessed are those who dwell in your house; they will praise you forever and ever (Ibid., 6). For the end of the tabernacles is the possession of the eternal house, which does not change its foundations, nor is it moved from one place to another. For those who are planted in the house of the LORD, they will flourish in the courts of our God, that they may go from flowers to fruit, and may say: But I am like a fruitful olive tree in the house of God (Psalm 52:10). Finally, the holy man, hastening to pass by the tabernacles and desiring to see the house of God, says that he has one wish, that he never leaves the house of God: One thing I have asked of the Lord, this I will seek: that I may dwell in the house of the Lord all the days of my life (Ps. 26:1). Therefore, the tabernacle must be enlarged, and curtains and skins must be stretched, and ropes of various and diverse discourses must be extended further, and nails must be firmly fixed on the right and left, so that the seed of the word, that is, the teaching of God, may be able to possess the nations; and to make habitable cities, which he received who doubled the mina.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
