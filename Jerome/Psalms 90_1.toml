[[commentary]]
quote='''
A prayer of Moses, the man of God. There are four psalms that are headed with the title "prayer": the sixteenth, and the one that follows it, and the eighty-ninth, and the hundred and first. In the hundred and first it says: "A prayer of the poor man, when he is downcast, and pours out his prayer in the sight of God." This one: A prayer of Moses, the man of God. We read the song of Moses in Exodus, at that time when the people crossed the Red Sea, and when Pharaoh and all his army had been drowned, Miriam and Moses sang. Then we read one in Deuteronomy also, since he had written that song in Deuteronomy. If therefore these psalms and these songs belong to Moses, why are they not found in his own books? So we have already explained how the hundred and first psalm is inscribed, A prayer of the poor man: and it is another who wrote about him, and that poor man who intercedes for us is the Lord, "who, though he was rich, became poor for our sake," and the rest. So too here is Moses, since from the very beginning of the human race he himself wrote the history: for he himself wrote how heaven and earth were made, how man too was made, about the creation of man; and this psalm speaks about the creation of man, what man is, and why he was born. He therefore who in Genesis wrote about the creation of men, is now himself also brought in by the Holy Spirit to discourse on what man is.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_019.html'
source_title="Homily 19, on Psalm 89"


[[commentary]]
quote='''
Lord, you have been made a refuge for us from generation to generation. He who seeks a refuge, seeks it either from excessive heat and scorching, or because a beast is pursuing him, or because enemies are pursuing him, to kill him. We too, then, are in the heat of this world; and a beast pursues us too, of which we say, "Do not hand over to the beasts a soul that confesses to you"; and enemies pursue us too; and therefore we flee for refuge under your wings. From generation to generation: both in the past, and in the present, and in the future. In another sense, From generation to generation: both in the old people of the Jews, and in our own people of Christians.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_019.html'
source_title="Homily 19, on Psalm 89"


[[commentary]]
quote='''
The eighty-ninth psalm has been read, whose title is this: A Prayer of Moses, the man of God. It is the beginning of the fourth book, for we ought to know that the psalter is divided into five books. From the first up to the fortieth is the first book; from the fortieth up to the seventy-first is the second book; from the seventy-first up to the eighty-eighth is the third book; from the eighty-eighth up to the hundred and fifth is the fourth book; from the hundred and fifth to the end is the fifth book. And therefore this is the opening of the fourth book: A Prayer of Moses, the man of God. The Hebrews think that not only this psalm, but also the other ten that follow, since they bear no title, were composed by Moses. And for that reason they think that those which are without a title belong to the same author as the one that has a title, because they seem to lie adjacent to the one that is inscribed with a title.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"


[[commentary]]
quote='''
A Prayer of Moses, the man of God. If all men were men of God, it would never have been added, A Prayer of Moses, the man of God. Do you wish to know that not all men are men of God? "Man, when he was in honor, did not understand: he was compared to the senseless beasts of burden, and was made like unto them." It is a great thing, therefore, to be called men of God or servants of God. For when this is said of someone, it is a token not of lowliness but of dignity; nor is the condition of servitude shown, but the dignity of one who serves well is displayed. A Prayer of Moses, the man of God. By Moses the law was written down, by Moses the nature of the world is shown, by Moses it was told how man was fashioned in the image of God. What, then, is this that he says, A Prayer of Moses, the man of God? Moses indeed writes how man was made; he himself also writes how man fell. Now, therefore, he prays that the one who fell into death may be lifted up to life, and that the one who fell through sin by the devil's doing may again rise through Christ to glory. For this reason, then, Moses makes a prayer to God, and says:
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"


[[commentary]]
quote='''
Lord, you have become a refuge for us. A refuge is never spoken of unless there has been persecution: for unless someone else persecutes us, we have no need to flee to another for refuge. Lord, you have become a refuge for us. Since a great swelter of tribulations and heat wearies us, we take refuge under the shadow of your wings. Lord, you have become a refuge for us. Therefore we flee to your help, because a great beast persecutes us; and since we have many adversaries and enemies, be you at least our one refuge.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_067.html'
source_title="Homily 67, on Psalm 89 (Alternate Series)"
