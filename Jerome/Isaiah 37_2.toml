[[commentary]]
quote='''
Therefore, he wrapped himself in sackcloth for the royal worship, and as he walked from the palace to the temple, he sent Eliakim the high priest, and Shebna the scribe, and the elders of the priests to Isaiah the son of Amos the prophet. In this, the humility and prudence of the king are worth considering. He himself proceeded to the Temple; the leaders of the people and the elders of the priests, not dressed in priestly garments but covered in sackcloth, sent to Isaiah son of Amos, the prophet. Concerning him, it is read in the Book of Kings: "He himself was covered with a mantle, and entered the house of the Lord, Eliakim the steward of the house, and Shebna the scribe, and the elders of the priests sent covered in sacks to Isaiah the prophet, son of Amos." Here, because Isaiah himself was writing the history about himself, he did not call himself a Prophet, but the son of a Prophet; there, because another person was writing the history, he writes about him as a Prophet. Indeed, we read this also concerning the Evangelist Matthew, that Matthew himself said that he was a tax collector; but the other Evangelists remained silent about the name tax collector, and only mentioned his apostolic dignity; and that in the ranks of the Apostles, he is second in his own account and first in the others'.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
