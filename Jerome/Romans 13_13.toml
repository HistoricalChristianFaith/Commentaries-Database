[[commentary]]
quote='''
Whence the apostle also says: "The night is past, and the day is at hand." Therefore this present age is the night: but the age to come is the day. Whence the apostle says: "The night is past, and the day is at hand. Let us walk honestly, as in the day," he says. As we are to live in the day, that is, in the age to come, so let us now live.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_046.html'
source_title="Homily 46, on Psalm 133"
