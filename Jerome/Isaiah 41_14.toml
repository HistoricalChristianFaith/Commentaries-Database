[[commentary]]
quote='''
I say to you, Do not be afraid: I have helped you; do not fear, worm of Jacob, who are dead from Israel, or as the LXX says, very few from Israel. But the worm which is said in Hebrew, Tholath, is called the chorus of the Apostles because of their humility and contempt, imitating the Savior, who speaks in the psalm: I am a worm, and not a man: the reproach of men, and the despising of the people (Psalm 22:7). For just as the worm penetrates the earth, so the apostolic word penetrated the cities of the nations and first entered the hardest hearts. And what follows: I have set thee as a new threshing cart, having tearing beaks, signifies that the preaching of the Gospel crushes the opposing powers and lifts up the spiritual wickedness that exalts itself against the knowledge of God; which, according to the variety of pride, are called mountains and hills. And when these are taken away and scattered like a whirlwind, let Israel exult and rejoice in the Holy Lord of Israel. We can also say that an ecclesiastical man, having the serpents of evangelical preaching on a new wagon, which does not work at all in the oldness of the letter, but in the freshness of the spirit, crushes the hardest hearts of unbelievers: separating the wheat from the chaff, and breaking mountains and hills, that is, all the leaders of heretics, who, being crushed and broken, are reduced to dust and taught that they are nothing, so that those who were gathered wickedly may be divided into their own good.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
