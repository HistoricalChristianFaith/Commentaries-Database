[[commentary]]
quote='''
Whatever is said about idols can also be applied to the leaders of heresies, who create images of their doctrines and lies with cunning hearts and worship things that they know are made by themselves. And their own error is not enough for them, unless they deceive even the simplest of their followers with their worship. Those who think that gain is godliness and devour the homes of widows (I Tim. VI), taking advantage of the ignorance of the common people, in this way, with dialectic art, as if with an axe and drill, they shape their own god, and they forge with a hammer, and they gild with the elegance of rhetorical language: of whom their god is their belly, and their glory is in their shame (Philipp. III).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
