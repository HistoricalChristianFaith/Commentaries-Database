[[commentary]]
quote='''
Who ascends above the heaven of heaven to the east. Because above he said, Who ascends above the sunset; here he says, to the east. For when the passions and the sun of iniquity set for us, the sun of righteousness rises for us: that is, the Lord ascends over us, and dwells in us. Behold, he will give to his voice a voice of power. "Lazarus, come forth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
