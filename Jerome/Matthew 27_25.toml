[[commentary]]
quote='''
(Verse 25) And all the people answered and said, 'His blood be on us and on our children.' This curse persists upon the Jews until the present day, and the blood of the Lord is not removed from them. Hence, Isaiah speaks: 'If you raise your hands to me, I will not listen to you. For your hands are full of blood' (Isaiah 1:15). The Jews leave the best inheritance to their children, saying, 'His blood be on us and on our children.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
Then answered all the people and said, His blood be on us and on our children. This imprecation rests at the present day upon the Jews, the Lord's blood is not removed from them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252027.html'
source_title="Catena Aurea by Aquinas"
