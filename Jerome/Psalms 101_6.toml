[[commentary]]
quote='''
My eyes were upon the faithful of the earth, that they might sit with me. He did not say the rich, or emperors, or bishops, or presbyters, or deacons, but the faithful: with these I sat. A bishop, a holy man, can also say this: that I did not ordain as presbyter the man who was obsequious to me, or my kinsman, but the one whom I knew to be faithful. And again the same man can say: that I held all my clerics and laity to be faithful. This little verse can also be spoken in the person of the Lord. He who walked in the unspotted way, this one ministered to me. For I did not ordain those who were my kinsmen, but the just and the faithful.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"
