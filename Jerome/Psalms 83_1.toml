[[commentary]]
quote='''
O God, who shall be like unto you? Since there is none like you, we seek no other author but you. Be not silent, neither be still, O God. We keep silent; do you speak on our behalf. It is the voice of the righteous man: he who says, "Neither be still, O God," is confident of his own righteousness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"

[[commentary]]
quote='''
O God, who shall be like you? None shall be like you. Do not keep silent, nor be restrained, O God. It is a man of the Church who speaks, from whose belly flow rivers of living water. For he sees that the harvest is great and the laborers few: a vast multitude of believers, and only a modest teaching from the masters; many heretics, many adversaries, and few warriors to do battle for Christ. Do not keep silent, nor be restrained, O God. Why this?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_062.html'
source_title="Homily 62, on Psalm 82 (Alternate Series)"
