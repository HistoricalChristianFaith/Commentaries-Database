[[commentary]]
quote='''
Thou wilt destroy all who speak a lie. I see a new thing. He who works evil is held in hatred; he who lies, perishes. Let us see which is more, to be held in hatred by the Lord, or to perish. He who is held in hatred by God is indeed unhappy, because he is held in hatred by the Lord: but he still lives. But he who speaks a lie and perishes, has already ceased to be. Therefore he who speaks a lie is more unhappy than he who works iniquity: for he who works iniquity is held in hatred; but he who speaks a lie, perishes. 'For the mouth that lies kills the soul.' And how is it written, 'That God may be truthful, but every man a liar'? But if whoever speaks a lie already perishes, and kills his own soul, and yet we all lie, then shall we all perish? Therefore, from what he says here, Thou wilt destroy all who speak a lie, and from what follows in the psalm, and from the very order, we can understand that he is speaking of heretics. For he who works iniquity kills only his own soul; but he who is a heretic, and speaks a lie, kills as many men as he has led astray.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_002.html'
source_title="Homily 2, on Psalm 5"
