[[commentary]]
quote='''
It can also be understood of the Savior, that upon His cross He protected us with His wings. And under His feathers you shall hope. "All the day long I have stretched forth my hands to a people that did not believe and that contradicted me." The hands of the Lord raised to heaven did not ask for help, but were protecting us wretches.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"
