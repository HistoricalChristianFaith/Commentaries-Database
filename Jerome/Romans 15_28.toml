[[commentary]]
quote='''
One poor man, already old, preached from Jerusalem all the way to Illyricum, and swiftly runs his word. Since, then, it had come from Jerusalem all the way to Illyricum, and his word had run swiftly, next it follows, and that very word which had said, From Jerusalem all the way to Illyricum, says: But I wish to go even to the Spains. This the apostle Paul speaks. See the swiftness of the word. He is not content with the east: he longs to run to the west.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_057.html'
source_title="Homily 57, on Psalm 147"
