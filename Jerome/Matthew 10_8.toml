[[commentary]]
quote='''
[Daniel 5:17] "To this Daniel made answer before the king, saying: 'Thy gifts be unto thyself, and bestow the presents of thy house upon someone else...'" We should follow the example of a man like Daniel, who despised the honor and gifts of a king, and who without any reward even in that early day followed the Gospel injunction: "Freely have ye received, freely give." (Matthew 10:8) And besides, when one is announcing sad tidings, it is unbecoming for him willingly to accept gifts.
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title="St. Jerome, Commentary on Daniel, CHAPTER FIVE"

[[commentary]]
quote='''
And let no one among the rural and uneducated people doubt, for those who promise the kingdom of heaven are given the power to heal the sick, cleanse the lepers, and cast out demons, in order to prove the greatness of the promises by the greatness of the signs. And because spiritual gifts (if the reward is of medium value) always become less valuable, condemnation of greed is added. Freely you have received, freely give. I, as the master and Lord, have bestowed this upon you without cost, and you give without cost, so that the grace of the Gospel is not corrupted.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
And because spiritual gifts are more lightly esteemed when money is made the means of obtaining them, He adds a condemnation of avarice; Freely ye have received, freely give; I your Master and Lord have imparted these to you without price, do you therefore give them to others in like manner, that the free grace of the Gospel be not corrupted.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
