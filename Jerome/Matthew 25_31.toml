[[commentary]]
quote='''
But when the Son of Man comes in his glory, and all the angels with him, then he will sit on the throne of his glory. And all the nations will be gathered before him, and he will separate them from one another, as a shepherd separates the sheep from the goats. And he will place the sheep on his right hand, but the goats on the left. Then the king will say to those on his right hand: After two days I will celebrate the Passover, be handed over to the cross, mocked by men, and be given vinegar and gall to drink, for he rightly precedes the glory of the triumphant, so that he may compensate for the scandals that will follow with the reward of his promise. And it should be noted that the one who is to be seen in majesty is the Son of Man.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
He who was within two days to celebrate the passover, to be delivered to the cross, and mocked by men, fitly now holds out the glory of His triumph, that He may overbalance the offences that were to follow by the promise of reward. And it is to be noted, that He who shall be seen in majesty is the Son of Man.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title="Catena Aurea by Aquinas"
