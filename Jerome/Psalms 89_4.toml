[[commentary]]
quote='''
And I will build up your throne from generation to generation. In two generations, as we have said, the throne of God is set, namely in the circumcision and among the Gentiles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_066.html'
source_title="Homily 66, on Psalm 88 (Alternate Series)"
