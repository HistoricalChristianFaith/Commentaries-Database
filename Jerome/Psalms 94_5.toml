[[commentary]]
quote='''
"They have humbled your people, O Lord." Always the people of God are humbled, the people of God are oppressed. "They have humbled your people, O Lord." The people of God are humbled, and imitate God who was humbled and meek of heart.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_022.html'
source_title="Homily 22, on Psalm 93"

[[commentary]]
quote='''
"Your people, O Lord, they have humbled, and your inheritance they have harassed." Who? The proud.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_071.html'
source_title="Homily 71, on Psalm 93 (Alternate Series)"
