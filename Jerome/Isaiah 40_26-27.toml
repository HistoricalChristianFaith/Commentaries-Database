[[commentary]]
quote='''
So with such great power and majesty of the Creator, how can you compare God to the likeness of a creature? And do you not rather understand the Creator from the magnitude of the creatures? If you do not believe in words, believe at least in your own eyes; and consider the power of the Lord from the service of the heavens and all the elements. He summons their army, that is, the heavens, in number; and he calls them all by name, and it is understood, the stars. Of which it is also sung in the Psalms: He counts the multitude of the stars: and he calls them all by name (Ps. 46:4). Whether we interpret the hosts of heaven as the army of angels and all the heavenly hosts of which Daniel speaks: Thousands of thousands ministered to Him, and ten thousand times ten thousand stood before Him (Dan. VII, 10). Hence the Lord of hosts is called, which in our language is called the Lord of armies and forces, or powers. He brings forth his host according to the number of the heavens: so that the sun, and the moon, and the other stars, which Abraham could not number, are numbered by Him, and serve the assigned function (Gen. XV): while the same course of the heavens is completed by the sun in one year, by the morning star and the evening star in two years, by the moon in each month, and all the stars follow their appointed times, and some of them are called wandering, and we see their movements with our eyes, not with our minds, nor do we understand them as much as we marvel at them. For the magnitude of God's strength makes all things serve in its own order. Whether according to the Seventy, by the multitude of his glory and the power of his virtue, nothing can escape him; but he knows all the ways, plans, and courses of the Creator by his majesty.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
