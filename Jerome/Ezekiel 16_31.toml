[[commentary]]
quote='''
Or according to the Septuagint: You were not like a prostitute gathering wages, but you gave what you should have received, so that you would not be protected by the help of those with whom you fornicated and followed demons, but rather, oppressed by various captivities, you would feel your calamities. And this can indeed be applied to every Christian soul, which, having abandoned the worship of God, has given itself over to vices and luxury, and pursuing a worldly life, did not even thrive in it, but lost the riches of religion and did not receive the riches of the world. And there was no difficulty at all in prostituting yourself to it, but you yourself embraced your lovers.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 5:16.30-31"
