[[commentary]]
quote='''
(Verse 40.) Whoever receives you, receives me; and whoever receives me, receives the one who sent me. A most beautiful order. It sends for preaching, teaches not to fear dangers, and subjects one's feelings to religion. He had carried gold above, and had shaken off bronze from his belt. The condition of the evangelists is difficult. So, where does the income come from, where does the necessary sustenance come from? Hope moderates the severity of the commandments with the promises. Whoever receives you, he says, receives me; and whoever receives me, receives the one who sent me, so that in receiving the apostles, each of the believers may consider that they have received Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
The Lord when He sends forth His disciples to preach, teaches them that dangers are not to be feared, that natural affection is to be postponed to religion—gold He had above taken from them, brass He had shaken out of their purses—hard then surely the condition of the preachers! Whence their living? Whence their food and necessaries? Therefore He tempers the rigour of His precepts by the following promises, that in entertaining the Apostles each believer may consider that he entertains the Lord.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
