[[commentary]]
quote='''
[Daniel 5:19] "'He slew whomever he would and smote to death whomever he wished to; those whom he wished he set on high, and brought low whomever he would.'" Thus he sets forth the example of the king's great-grandfather, in order to teach him the justice of God and make it clear that his great-grandson too was to suffer similar treatment because of his pride. Now if Nebuchadnezzar slew whomever he would and smote to death whomever he wished to; if he set on high those whom he would and brought low whomever he wished to, there is certainly no Divine providence or Scriptural injunction behind these honors and slayings, these acts of promotion and humiliation. But rather, such things ensue from the will of the men themselves who do the slaying and promoting to honor, and all the rest. If this be the case, the question arises as to how we are to understand the Scripture: "The heart of a king reposes in the hand of God; He will incline it in whatever direction He wishes" (Proverbs 21:1). Perhaps we might say that every saint is a king, for sin does not reign in his mortal body, and his heart therefore is kept safe, for he is in God's hand (Romans 6:1-23). And whatever has once come into the hand of God the Father, according to the Gospel, no man is able to take it away (John 10:28). And whoever is taken away, it is understood that he never was in God's hand at all.
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title="St. Jerome, Commentary on Daniel, CHAPTER FIVE"

[[commentary]]
quote='''
The kings of the earth are those who reign in sin. Therefore let those very ones confess, who reign in sin. For he is not speaking of the kings of this world. For it is written: "The heart of the king is in the hand of God." Do you suppose that the heart of the most impious Julian was in the hand of God? God forbid. Or of Nero, or of the persecutors Maximian and Decius? God forbid. But he is speaking of those who reign in sin, because those who conquer the vices and passions of the soul and reign over sin, their heart is in the hand of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_049.html'
source_title="HOMILIES ON THE PSALMS 49 (PSALM 137)"

[[commentary]]
quote='''
Who gives salvation to kings. To what kings? "The heart of the king is in the hand of God." Even of Julian the persecutor, and of Nero, and of Decius? The heart of the king is in the hand of God. Those who reign over their own body, who subject their body and reduce it to servitude, lest, while preaching to others, they themselves be found reprobate. These are the kings of whom wisdom says in Proverbs: "She gives a kingdom to kings."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_054.html'
source_title="HOMILIES ON THE PSALMS 54 (PSALM 143)"


[[commentary]]
quote='''
And in another place it is written: "The heart of the king is in the hand of God." Was the heart of Julian the persecutor in the hand of God? Was the heart of Saul in the hand of God? Was the heart of Manasseh in the hand of God? Was the heart of Ahab in the hand of God? And were the hearts of all the impious kings of Judah in the hand of God? You see that it cannot stand according to the letter. Kings, then, are the saints, and the heart of these is in the hand of the Lord. Let us therefore also ask God that we may be kings, and may rule over our flesh, that it may be subject to us. Whence the apostle also says: "Therefore I chastise my body and bring it into servitude, lest by chance, while preaching to others, I myself should become a castaway." Let our soul rule, let the body serve: and at once Christ will come, and will dwell in us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_009.html'
source_title="HOMILIES ON THE PSALMS 9 (PSALM 75)"
