[[commentary]]
quote='''
This is a divine message to those who were captive in the land of Babylon, to the brothers of the prophet Ezekiel, and to the near ones to whom the inhabitants of Jerusalem (or Israel) said: 'You have gone far from the Lord, the land has been given to us as a possession.' But these are the words that follow: 'I will gather you from the peoples and give you the land of Israel.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 3:11.17-21"
