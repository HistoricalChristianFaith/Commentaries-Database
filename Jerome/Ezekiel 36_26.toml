[[commentary]]
quote='''
And it is to be considered that a new heart and a new spirit are given through the effusion and sprinkling of water. When, however, a new heart and a new spirit are given, then all hardness, which is compared to stone, will be removed from the Jewish heart, so that the heart may be a fleshy, soft, and tender one, which can receive the spirit of God within itself and be inscribed with saving words. Then they will walk in the precepts of the Lord and keep His judgments, and they will dwell in the land of confession, which He had given to their fathers Abraham, Isaac, and Jacob, and to all the holy ones and prophets, and they will become the people of God, and the Lord will be their God, as is proven in the present time.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
