[[commentary]]
quote='''
And the pavement was laid with stone, so that the feet of the inhabitants, who were sinners, would not be polluted by mud, dirt, and the dust. But rather, the stones on which the temple of God is built, were walked upon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 12:40.17-19"
