[[commentary]]
quote='''
Who, he says, is like me? Let him call those things which are not as though they were, and explain the order of my creation, which I have balanced with reason, since I made man upon the earth. And not only do I desire this, but I also seek knowledge of the future. Therefore, you, Israel, of whom I am both king and redeemer, do not fear the images that you have learned are nothing on Mount Sinai. Is there perhaps another Creator, whom I do not know? Or is there another world beyond this one, which reveals the power of an unknown God?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
