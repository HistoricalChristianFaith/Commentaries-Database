[[commentary]]
quote='''
But otherwise the footstool of the feet of Jesus is the soul of the believer. Happy is he in whose breast the feet of Jesus are daily placed. Would that his feet were placed in my breast too, would that his footprints might ever cling in my heart, would that I too might say with the bride: "I will hold him, and I will not let him go." The bridegroom is quickly offended, he ever loves cleanness: wherever he sees filth, he quickly withdraws.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_026.html'
source_title="HOMILIES ON THE PSALMS 26 (PSALM 98)"
