[[commentary]]
quote='''
For they have destroyed the things which you have perfected. And this too those who above still speak either to any just man or to the Lord: Therefore you must return to the heavenly things, because both the adversaries are so bravely prepared for the fight, and whatever you build up, they demolish. For daily they undermine your precepts and the law written in the hearts of believers, and by persuading diverse things they overturn them. But what did the just man do? This is understood in various ways. Either concerning the person of the just man, in this manner: While they strive to destroy the laws of God, the just man has done nothing worthy of ruin, and in vain suffers their snares; or certainly, while they oppose and attempt to destroy God's commandments, the just man does this one thing only: that he implore the help of him who dwells in his holy temple, whose throne is in heaven, and whose eyes look upon the poor man, that he may rescue him from the snares prepared. But concerning the person of God in this manner: Although the adversaries are prepared for battle, and lie in wait in secret like a lion in his den, that in hidden places they may kill the innocent and destroy the temple of God, yet the Lord dwells in his holy temple, and never is either temple or throne wanting to him, because as some fall others rise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_060.html'
source_title="Homily 60, on Psalm 10 (Alternate Series)"
