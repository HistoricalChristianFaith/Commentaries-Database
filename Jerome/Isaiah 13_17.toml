[[commentary]]
quote='''
Therefore, the prophet is commanded to speak to the sons of Ammon, and to their reproach, that they themselves are to be captured, and he directs the same sword speech to them: Oh sword, sword, which is ready for slaughter, which is sharpened, so that you may shine and kill... nevertheless, after completing your work, which you have done against the sons of Ammon, return to your sheath, that is, to Babylon, to the place where you were made and created: so that in the land of your birth I may judge you, and I will pour out my indignation upon you, and you shall be captured by the power of the Medes and Persians. What is said more fully in the book of Isaiah, in a vision against Babylon: Behold, I will stir up the Medes against them. And a little later: And Babylon, that glorious one among kingdoms, renowned for its pride among the Chaldeans, as God overthrew Sodom and Gomorrah, it shall never be inhabited until the end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"


[[commentary]]
quote='''
(Verse 17) Behold, I will raise up the Medes against them, who do not seek silver and do not desire gold. What was hidden is now revealed: that the mighty and giant ones are not angels or demons, but rather the people of the Medes, whose leader Darius, the first king of the Babylonians, destroyed the empire after killing Balthasar, the grandson of Nebuchadnezzar, who was the son of Evilmerodach. (Daniel 5) However, it is written about the cruelty of the Medes and Persians that they despise gold and silver in their burning desire to shed blood, considering wealth offered to them as worthless dirt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
