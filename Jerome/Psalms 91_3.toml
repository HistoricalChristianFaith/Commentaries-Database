[[commentary]]
quote='''
For he himself will free me from the snare of the hunters. There are many hunters in this world, who try to hunt down our soul. Indeed even that giant Nimrod was a great hunter in the sight of the Lord: and Esau was a hunter, because he was a sinner; and nowhere in the holy Scriptures do we find any holy hunter. Fishermen we find to be holy. For he himself will free me from the snare of the hunters. "Our soul, like a sparrow, has been snatched from the snare of the hunters: the snare has been broken, and we have been set free." What is this snare that has been broken? "The Lord," he says, "will crush Satan under our feet speedily." And the apostle says: "That you may be freed from the snare of the devil." You see, therefore, that this is a hunter, who desires to hunt our souls to their destruction. The devil has many snares, and he has diverse snares. Greed is a snare of the devil, slander is a snare of the devil, fornication is a snare of the devil. And from the harsh word. As long as we are in holiness, our soul is tranquil; but when we begin to think about sins, our soul is troubled, and is shaken as though by certain waves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="Homily 20, on Psalm 90"

[[commentary]]
quote='''
I will hope in Him, for He Himself shall deliver me from the snare of the hunters. In this world there are many hunters who long to capture our souls, just as is said by the prophet: "Our soul has been snatched away like a sparrow from the snare of the hunters." Now that hunters are taken in a sinister sense in the holy Scriptures, we have already said often. For that Nimrod, the giant, always a rebel against God, was a hunter. Esau too was a hunter. For He Himself shall deliver me from the snare of the hunters. We read in Proverbs: "The eye of the harlot is the snare of the sinner." "For whoever shall look upon a woman to lust after her has already committed adultery with her in his heart." As many as are the sins, so many are the snares; as many as the snares, so many the hunters. The doctrines of the heretics are the snares of death. Finally there follows: and from the harsh word. You see that it is spoken concerning the heretics. In place of what we have, "harsh," the Hebrew has "hidden." For heretics always promise certain secret and great things, so that they may snatch away those things which are true and manifest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"
