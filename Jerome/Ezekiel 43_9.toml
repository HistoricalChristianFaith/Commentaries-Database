[[commentary]]
quote='''
And yet the merciful Lord again commands the prophets to tell them to remove their former fornications from themselves and to abandon the ruins of their kings and rulers, and to not only reject them from themselves, but also from God. And he immediately promises rewards for good deeds, saying: 'And I will dwell among them,' as it is written in the Gospel: 'There stands among you one whom you do not know' (John 1:26). And he will dwell not for a short time, like in the Synagogue, but forever, as is confirmed in the Church of Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
