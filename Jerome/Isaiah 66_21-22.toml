[[commentary]]
quote='''
And I will select, says the Lord, priests and Levites from among them, so that those who are saved may proclaim the message to the nations. Of whom one spoke: Thus let a man consider us as ministers of Christ and stewards of the mysteries of God (I Cor. IV, 1). And Luke the evangelist says: Just as they handed down to us, who from the beginning saw and were ministers of the word. Of whom we also read above: You shall be priests to me, says the Lord (Isaiah LXI, 6). For just as a Jew is hidden, who is circumcised in spirit (Rom. II), of whom it is written: We are the circumcision, who serve God in spirit (Philipp. III, 3), and offer spiritual sacrifices pleasing to God, and sing with spirit and understanding: thus also the priests and Levites are hidden, who do not follow the order of their lineage, but the order of faith. Or certainly he does not speak of the Apostles and apostolic men, who were the leaders of the Church from the Jewish people, but of those mentioned above the nations, from the sea, from Africa, from Libya, from Cappadocia, from Italy, from Greece, from all the islands, the inhabitants of which had not first heard the Lord, nor seen His glory, and afterwards they turn into priests, so that those who were tail become the head, and those who were the head, turn into the tail.
For as the new heavens and the new earth, which I will make to stand before me, saith the Lord: so shall your seed stand, and your name. And there shall be month after month, and sabbath after sabbath: all flesh shall come to adore in my sight in Jerusalem the Lord. When he says: 'Assume from among them priests and Levites,' he indicates that the old priesthood was passed over, which was owed to the Levitical tribe, where there is not an election, but a natural order, and it is a succession of a family descending through offspring. For with the translation of the priesthood, it is necessary that both the translation of the Law be made, and the election pertain to those to whom priesthood is conferred, not according to blood, but according to merits and virtues, who will come from the islands of the Gentiles and announce the glory of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
