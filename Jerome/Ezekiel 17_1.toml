[[commentary]]
quote='''
When it is said of the prophets: Present an enigma, tell a parable, or as the Septuagint translated: tell a narration, it is shown that what is said is obscure. For there is no doubt that to present an enigma and a parable is to express something in words and hold something in meaning. And indeed the Savior spoke to the people in parables, which he explained in secret to the apostles. Therefore, we must understand enigma and parable in such a way that... Two enigmas and parables are presented in the prophecy of Ezekiel at present. Now we must first speak: we will discuss the other in the following...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
