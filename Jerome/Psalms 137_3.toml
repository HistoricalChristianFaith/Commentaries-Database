[[commentary]]
quote='''
For there they that led us away captive asked of us the words of songs. The demons, who deceived us and led us away captive, now, as though mocking us and boasting, say to us: "Give us back a word about your faith, and just as when you were in Jerusalem, sing a hymn to God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_048.html'
source_title="Homily 48, on Psalm 136"
