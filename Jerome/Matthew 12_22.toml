[[commentary]]
quote='''
(Verse 22.) Then a demon-possessed man who was blind and mute was brought to him, and he healed him, so that he could speak and see. All the crowds were amazed and said, 'Could this be the Son of David?' But when the Pharisees heard this, they said, 'This man does not cast out demons except by Beelzebul, the prince of demons.' Three signs were performed simultaneously in one man: the blind see, the mute speak, and the one possessed by a demon is set free. This was indeed done in a physical sense at that time, but it is also fulfilled daily in the conversion of believers, so that after the demon is expelled, they first see the light of faith, and then their mouths are opened in praise of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
Three miracles were wrought in one and the same person at the same time; the blind sees, the dumb speaks, the possessed is delivered from the dæmon. This was at that time done in the flesh, but is now daily being fulfilled in the conversion of them that believe; the dæmon is cast out when they first behold the light of the faith, and then their mouths which had before been stopped are opened to utter the praises of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
