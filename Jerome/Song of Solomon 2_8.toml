[[commentary]]
quote='''
We therefore, first let us flee the valleys of Zion, let us come to the plains, from the plains let us come to the hills, from the hills let us come to the mountains, let us follow Christ upon the mountains. For our cousin, like a roe and a fawn of the harts, leaps over the hills, and springs across the mountains. Whence also, according to the truth of the ascension, he did not ascend into the heavens after the resurrection from a valley, but from a mountain. Unless we are mountains in virtues, we cannot ascend to heaven. For there, that is, in the mountains of Zion, in the virtues, in the confession of faith, in the truth of the doctrines, there is the blessing and life for evermore.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_045.html'
source_title="HOMILIES ON THE PSALMS 45 (PSALM 132)"
