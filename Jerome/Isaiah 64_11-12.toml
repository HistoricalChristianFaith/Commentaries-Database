[[commentary]]
quote='''
Moreover, your house, that is, the sanctuary of our sanctification and glory, in which our fathers praised you, has fallen into ruins and ashes, and has been destroyed by a raging fire, so that no victims are offered in it, no Passover is celebrated, nothing is done of the ceremonies that you commanded to be done, but all our desires have been turned into ruins. ... We can refer these things to the Church, or to the soul of a holy man, which can rightly be called a mirror and vision of peace, when the Father and the Son and the Holy Spirit dwell in it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"


[[commentary]]
quote='''
But if, by our fault or the fault of the people, such a Zion is abandoned by the Lord, immediately the fire of ignited devilish arrows will become evident: for all who commit adultery are like a burning oven in their hearts. And with the coldness of chastity expelled, the flame of lust will rage in the temple of God, so that whatever was glorious and renowned in us before will fall, be destroyed, and perish. And let that which is said in the Psalms be fulfilled: They have burned your sanctuary with fire, they have profaned the tabernacle of your name on earth. Which only He can extinguish, from whose belly flow the rivers of living water.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
