[[commentary]]
quote='''
Their infirmities have been multiplied; afterward they made haste. Whose infirmities have been multiplied? Surely those of the saints who above are recorded as being in the land of the Lord. When they were foolish, unbelieving, straying, and serving various desires and pleasures, passing their lives in greed and envy, their infirmities were being multiplied. But when they were washed and were sanctified and, turned to repentance, abandoned their past sins, then they made haste. I have read in the Epistle of Barnabas (if anyone is pleased to accept testimony from it) that God chose apostles who were more wicked than every sin. And surely, if they were more worthless than all sinners, their infirmities were nonetheless being multiplied in them; but see how quickly they afterward withdrew from them. To Peter and to his brother Andrew it is said: "Come and follow me." Likewise to James and John, who leave both their father and the boat and the net. Matthew rises up from the tax-booth, and at once is an apostle. Zacchaeus comes down from the tree, and is holy. Paul, persecuting the Church, suddenly believes, is washed, teaches, is subjected to persecutions, is beheaded. What is swifter than this conversion? The people of the Gentiles too, before they were converted to the Lord and heard through Isaiah, "Drink this first, do it quickly," was in all infirmities—or, as Symmachus translated, "hardships," or, as more fittingly Theodotion and the fifth edition, "idols." But when the cults of idols had been multiplied, believing at the first word of the apostles, it was quickly converted to the Lord. Which indeed Aquila too, translating "diaponēmata" (laborious things), according to his custom signifies as idols. For in the Hebrew it says ASABOTH, the very same word that is placed also there: "The idols of the Gentiles are silver and gold." Further, in that he says "proikisamenōn," which the Seventy had rendered "they made haste," he seems to me to show a lofty meaning: namely that the apostles, or the people of the Gentiles, after they were converted to the faith of Christ, and the Lord had forgiven them their sins (for this is what "proikisamenōn" means, that as by a "proikia"—that is, as a free gift—their vices were reversed), their "diaponēmata," that is, their pains, were increased in them, since they knew in how great a sea's waters they had been and from what an abyss they had been freed; according to that which is written in Ecclesiastes: "He who adds knowledge, adds sorrow." And Paul: "I who am not worthy to be called an apostle, because I persecuted the Church of God." But it can also be discussed otherwise, since "strength is made perfect in weakness"; and when an apostle is weaker, then he is stronger. We too, if we wish to come quickly to the Lord, ought to multiply our infirmities, so that, made weak in the flesh, we may be stronger in the spirit. I will not gather their assemblies out of bloods. Clearly he who speaks is the Savior. For who else could say, "I will not gather their assemblies out of bloods"? But "their"—understand it either of the nations or of the apostles. If of the nations, this will be the meaning: Although they are guilty of blood, and have perpetrated many crimes, yet because after their infirmities they hastened to me, their assemblies will be pure and utterly foreign to blood. If of the apostles, this will be the meaning: They will by no means offer me victims as in the old Law, but there will be the spiritual religion of the New Testament. But according to a higher understanding, this must be said: That the Lord will abhor the man of bloods and the deceitful one; and the blood of the wicked is required from the hand of the watchman who has refused to preach the coming wrath of God; and whoever shall scandalize the least, he will slay him; and those whose hands are full of blood—it is certain that they cannot be gathered into the synagogues of the Lord, who must first be purged by the spirit of burning. As for "the synagogues of the Lord," let us understand either the churches in the present, or, as I think better, the various dwellings with the Father in the heavens, which he will not be able to enter who has been sprinkled with the gore of sins. Nor will I be mindful of their names through my lips. The saints, whose infirmities have been multiplied, and whose assemblies I will not gather out of bloods, because they hastened to me—I will by no means call them by their former names, but by new ones: that is, after I have washed them in my fountain, I will not call them, as before, sons of men, but sons of God. Or otherwise: I will change, he says, their names, and out of Simon I will make Peter, because upon his rock my Church is founded; out of the sons of Zebedee, sons of thunder, for I am about to entrust to them the sublime mysteries of my Gospel. And not only to these, but to Abraham too of old and to Sarah were their names changed; nor is it fitting that those whose life is different from their former manner of living should keep the same names. But another will interpret this—"Nor will I be mindful of their names through my lips"—thus: I will not name them lightly and as it were in passing, but I will hold them in the depth of my heart, I will keep them in my soul. So that, just as it is said to the unbelieving people, "This people honors me with its lips, but its heart is far from me," so, on the contrary, the Lord names his saints not with the lips only, but holds them with the inmost affection of his mind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15"
