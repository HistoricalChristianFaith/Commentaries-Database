[[commentary]]
quote='''
Jerusalem and Zion are understood in four ways in the holy Scriptures, as we have often mentioned. One, according to the Jews, which the Lord laments in the Gospel, "Jerusalem, Jerusalem, who kills the Prophets, and stones those who are sent to you."… Secondly, the congregation of the Saints, who are established in the peace of the Lord and in the towers of virtues, are rightly called Zion, of whom it is said: "Its foundations are on the holy mountains: the Lord loves the gates of Zion more than all the dwellings of Jacob." For the foundations of the Jewish Zion, which we see to be destroyed, were not loved by the Lord, nor could that which was loved by the Lord be destroyed. Thirdly, Jerusalem is called the multitude of Angels, Dominions, and Powers, and everything that is established in the ministry of God.… Fourthly, Jerusalem is called the one which the Jews and our Judaizers, according to the Apocalypse of John, think should be placed in the celestial realm as a golden and bejeweled one, which they do not understand, whose boundaries and infinite breadth are also described in the final part of Ezekiel. Therefore, since these things are so, let us now examine more closely what Zion has said: The Lord has forsaken me, and the Lord has forgotten me. There is no doubt that the congregation of the saints, which was once among the Jews and was abandoned by the Lord, laments this and bitterly mourns that it has been deserted and deprived of the Lord's help.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
