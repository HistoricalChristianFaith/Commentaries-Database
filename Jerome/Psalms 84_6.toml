[[commentary]]
quote='''
In the valley of tears, in the place which he has set. Where "in the valley" is said, it is necessary that we understand, by contrast, also the mountain. Therefore whoever arranges ascents in his heart, where has he been placed? In the valley of tears. Let us consider that we are in the valley: we are not on the mountain, we are not in paradise, in the height of paradise; but in the lowliness of the earth, the accursed earth, which brings forth for us thistles and thorns, which is the serpent's food, of which it is said to Adam, "You are earth, and to earth you shall go." As long, therefore, as we are in the valley of tears, we ought not to laugh, but to weep. For this reason the Lord also says: "Blessed are they who weep, for they themselves shall laugh." For the time being, therefore, we are in the valley of tears, and this world is a world of tears, not of joy. We ought not to laugh, since this world and this time is of tears, that other is of joy. In the valley of tears, in the place which he has set. What is it that he says, In the place which he has set? In the place, that is, in the valley of tears. In the place which he has set: God has set us for the contest, that we may always fight in this. This place, therefore, that is, the valley of tears, is not of peace, is not of security, but of contest and of wars.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_016.html'
source_title="Homily 16, on Psalm 83"

[[commentary]]
quote='''
Let us see where he arranged the ascents. Listen to what he says: In the valley of tears, in the place which he has set. We read in the book of Judges, when the angel came and preached repentance to the people, saying, You have forsaken the Lord, and the Lord will forsake you; and when the people heard this they wept, and that place was called the Valley of Tears. We have recalled the old history, so that we might flee heresy. But by the valley of tears we can understand, spiritually, this present age. For we are not on the mountain, that is, in the kingdom of heaven, but in the valley, that is, in the darkness of this world; and by our error we have been cast out of paradise with Adam into the valley of tears, where there is repentance, where there are tears. In the valley of tears, in the place which he has set. What did he say? The place which God has set for the contest: so that here we may contend against the devil, against sins, that in the heavens we may be crowned. Why, then, did he give a contest of fighting? Could God not have given us life without a contest? But he gave it as a president of the games; he gave a stadium, where we might wrestle against the vices: so that afterward he might deservedly crown us, not sleeping, but laboring. What follows?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_063.html'
source_title="Homily 63, on Psalm 83 (Alternate Series)"
