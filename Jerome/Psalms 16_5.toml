[[commentary]]
quote='''
He who in his own person is the Lord's portion, or has the Lord for his portion, must so bear himself as to possess the Lord and to be possessed by him. He who possesses the Lord and who says with the prophet, "The Lord is my portion," can hold to nothing beside the Lord. For if he holds to something beside the Lord, the Lord will not be his portion.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_052.html'
source_title="LETTER 52.5"

[[commentary]]
quote='''
The Lord is the portion of my inheritance and of my cup: it is you who will restore my inheritance to me. Our Savior in the Scriptures is called both high priest and king. High priest, in this: "You are a priest forever according to the order of Melchizedek." King, as in that place: "But I have been established as king by him over Zion, his holy mountain." According, then, to the fact that he is a priest, the Lord is his portion. For it is written in the Law: "To the sons of Levi you shall not give an inheritance in the midst of the children of Israel, for I am their portion, says the Lord." Hence from Jesus they received no portion in the land of Judah, but were dispersed throughout the tribes, that prophecy being fulfilled: "I will divide them in Jacob, and scatter them in Israel." But if the Levites had no portion except the Lord, how much more does this one who is high priest, and who dares to say "The Father abiding in me does his works," have the Father as his special and proper portion. But according to the fact that he is king, it is said to him: "Ask of me, and I will give you the nations as your inheritance, and the ends of the earth as your possession." And note how elegantly the wording is measured in both cases. Of the Father it is said, "You are the portion of my inheritance." "You are," he says, not "you were": for the Son always remained in the Father, and the Father in the Son. But of the nations, "You," he says, "will restore to me my inheritance": for they ceased to be the Lord's inheritance when their infirmities were multiplied, and their assemblies were being gathered out of bloods. Although some think that the lower verse too should be referred to God the Father, so that the meaning is: Because I emptied myself, taking the form of a servant, and came down from my majesty to the earth, restore to me my inheritance; that is, yourself, in whom I always was, and glorify me with the glory which I had with you before the world was made. For you will not give me any new possession, but you will restore my inheritance, namely the divinity and nature of God, which I seemed not to have for the reason that I had taken the form of a man. Further, in that he says "and of my cup," it is doubtful to no one that in the Scriptures the cup is sometimes taken for a longed-for drink and joy, as in that place, "How excellent is your inebriating cup," and elsewhere, "I will take the cup of salvation, and I will call upon the name of the Lord." So that, just as our Savior is our food and drink (for indeed we feed on his flesh and drink of his blood), so of that man who was assumed by the Savior the food and cup is the Father, that is, the one common divinity with God the Father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15"
