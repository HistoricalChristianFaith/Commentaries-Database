[[commentary]]
quote='''
'And in it he hath prepared the vessels of death.' They fit the person of the devil. 'He hath made his arrows for them that burn.' Beautifully he said, 'for them that burn': for those whose hearts burn with lust and passions, these have been conquered by the devil. 'He hath made his arrows for them that burn.' Beautifully he said 'for them that burn'; he did not say 'for those about to burn,' that is, those who are about to burn with his arrows; but whosoever's hearts he sees burning, those he strikes. The Apostle too says that the devil has burning arrows.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
