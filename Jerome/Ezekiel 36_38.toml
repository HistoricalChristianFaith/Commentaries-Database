[[commentary]]
quote='''
And again the prophetic word exhorts the repentant, that even when they have returned to the Church, they should always seek the Lord, and find Him: so that the flocks of the Lord may multiply with the multitude of those who return: not of horses and brute animals, but of flocks of men, who are full of faith and reason, the holy flocks, the flocks of the city of Jerusalem, on all the solemnities, which they have received through the mercy of God; so that when the multitude of such flocks has filled the cities of the Lord, then all may know that He is the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
