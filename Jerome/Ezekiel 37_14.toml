[[commentary]]
quote='''
But we spiritually commemorate the completion after the cross of the Lord and Savior; and this happens daily, especially to those who, like Lazarus, bound by the bands of their sins, are raised up at the voice of the Lord (John 11); and truly they are the house of Israel, once desolate and without hope of salvation: but as the spirit of grace enters into them and the Lord stretches out his hand, they are liberated from the depths of Hell: and those who previously said, 'Lord God, you know these things,' afterwards hear, being freed: 'O you of little faith, why did you doubt?' (Matthew 14:31).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
