[[commentary]]
quote='''
"Thou hast put my acquaintances far from me." In the passion of the cross even the apostles fled from me, so much so that Peter himself said, "I know not the man." You see that we run with brief sentences rather than with expositions, because the hour so compels. "They have made me an abomination to themselves." The Jews, namely, saying, "Crucify, crucify such a one: we have no king but Caesar."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_065.html'
source_title="Homily 65, on Psalm 87 (Alternate Series)"


[[commentary]]
quote='''
"I was delivered up, and came not forth." What is this that he said, "I was delivered up, and came not forth"? The Jews delivered me up, and yet on account of my clemency I did not forsake them, but I dwelt among them with affection. I was delivered up to Pilate by them, and I came not forth from them, saying on the cross, "Father, spare them, they know not what they do." Let us say it also otherwise. "I was delivered up, and came not forth." In the Gospel it is written that, when they sought to cast Him down from the brow of the mountain, He escaped safe and free from their midst. This, then, is what He says: Could I not even then, when I was delivered up, have escaped the snares of men and the perils of death by my divinity? But because I had come for this, that I might suffer, therefore I willed nothing except that I might suffer. That I was delivered up was of my will, and that I came not forth was of my will. Let us say it also otherwise. I was delivered up as a man, and I came not forth from the majesty of my divinity. Let us say it also otherwise. I was delivered up by men, and I came not forth from the bosom of the Father. Let us say it also otherwise. I was delivered up as a man upon the earth, and as God I had not left heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_065.html'
source_title="Homily 65, on Psalm 87 (Alternate Series)"
