[[commentary]]
quote='''
And when, through the weapons of justice, on the right and left, through glory and disgrace, through good and bad reputation, through praise and blame, we have obtained victory over this world: then palms are given to us on both sides, which neither joys have changed, nor sorrow, nor prosperity, nor adversity have overcome: and not by seven degrees, as in the region of the North, nor by seven and eight, as in the South, are we contained, but by only eight degrees do we ascend to the highest: because the number eight is sufficient for us, that is, the sacrament of the Gospel; so that we may say with the Apostle: And though we have known Christ according to the flesh, yet now we know him no more, it is understood, according to the flesh.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 12:40.32-34"
