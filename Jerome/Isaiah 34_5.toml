[[commentary]]
quote='''
To us this life is a race course: we contend here, we are crowned elsewhere. No one can lay aside fear while serpents and scorpions beset his path. The Lord says, "My sword has drunk its fill in heaven," and do you expect to find peace on the earth? No, the earth yields only thorns and thistles, and its dust is food for the serpent. "For our wrestling is not against flesh and blood but against the principalities, against the powers, against the world rulers of this darkness, against the spiritual hosts of wickedness in the heavenly places." We are hemmed in by hosts of foes; our enemies are upon every side. The weak flesh will soon be ashes: one against many, it fights against tremendous odds. Not till it has been dissolved, not till the prince of this world has come and found no sin therein, not till then may you safely listen to the prophet's words: "You shall not be afraid for the terror by night nor the arrow that flies by day; nor for the trouble which haunts you in darkness." … When the hosts of the enemy distress you, when your body is hot with fever and your passions roused, when you say in your heart, "What shall I do?" Then Elisha's words shall give you your answer, "Fear not, for they that be with us are more than they that be with them." He shall pray, "Lord, open the eyes of your handmaid that she may see." And then when your eyes have been opened, you shall see a fiery chariot like Elijah's waiting to carry you to heaven, and you shall joyfully sing, "Our soul has become free like a bird out of the snare of the fowlers: the snare is broken and we have been set free."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_022.html'
source_title="LETTER 22.3"

[[commentary]]
quote='''
In Deuteronomy we read of arrows and a sword: "I will make my arrows drunk with blood, and my sword shall devour flesh." And because God did not spare the angels who sinned, but cast them down to hell and delivered them into chains of darkness, to be reserved for judgment; and spared not the old world, but saved Noah the eighth person, a preacher of righteousness, bringing in the flood upon the world of the ungodly; and turning the cities of Sodom and Gomorrha into ashes condemned them with an overthrow, making them an ensample unto those that after should live ungodly; and delivered just Lot, vexed with the filthy conversation of the wicked. The Lord knoweth how to deliver the godly out of temptations, and to reserve the unjust unto the day of judgment to be punished. And in Jeremiah we read: "How long will you cut with the sword, or the sword of the Lord? How long will you not rest? Return to your sheath." This sword is not only called a sickle, which cuts hay, straw, and thorns; but it is also called an axe of trees, which will cut down those who have not made themselves worthy of the fruits of penance. And about whom John the Baptist proclaimed: "Behold, the axe is laid to the roots of the trees: every tree that does not produce good fruit will be cut down and thrown into the fire."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Zechariah.html'
source_title="Commentary on Zechariah"
