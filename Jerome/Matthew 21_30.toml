[[commentary]]
quote='''
(Verse 30) Going to the second, he said similarly. But he, answering, said: Yes, sir, and he did not go. However, the second son, who is the people of the Jews, replied to Moses: 'We will do everything that the Lord has spoken' (Exod. XXIV), but he did not go into the vineyard because, thinking himself the heir after the son of the household had been killed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
The second son is the Jewish people who made answer to Moses, All that the Lord hath said unto us we will do. (Exod. 24:3.)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title="Catena Aurea by Aquinas"
