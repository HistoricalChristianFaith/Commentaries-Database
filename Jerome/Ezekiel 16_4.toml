[[commentary]]
quote='''
It follows: And you were not washed in water for salvation. The bodies of babies, as soon as they are born from the womb, are usually washed with water: so too does the spiritual generation require the saving washing. For no one is clean from filth, not even if his life were of only one day. And in the Psalms we read: In iniquities I was conceived, and in sins my mother conceived me. The second birth dissolves the first birth. For it is written: Unless one is born of water and the Holy Spirit, he cannot enter the kingdom of God. Many are the baptisms that the Pagans have in their mysteries, and the heretics promise: they all cleanse; but they do not cleanse for salvation. Therefore, it is added: and in which you have not been cleansed for salvation. This can be understood not only about heretics, but also about ecclesiastics who do not receive baptism with full faith. It must be said about them that they receive water, but they do not receive the spirit, just like Simon Magus who wanted to buy the grace of God with money. He was indeed baptized in water, but he was by no means baptized unto salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 4:16.4-5"
