[[commentary]]
quote='''
(Verse 20) And when the disciples saw it, they marveled, saying, 'How did the fig tree wither at once?' However, according to the letter, the Lord, who was to suffer among the peoples and bear the scandal of the cross, had to strengthen the hearts of his disciples with the anticipation of a sign. And the disciples were amazed, saying: How did it wither immediately? Therefore, by the same power, could the Savior also dry up his enemies, unless he had awaited their salvation through repentance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
