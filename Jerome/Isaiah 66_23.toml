[[commentary]]
quote='''
Physicists, who are concerned with discussing celestial matters, say that the moon does not have its own light, but is illuminated by the rays of the sun. It is always filled and shines by a part of it, from which it is closer to the sun, and it is not hidden by the shadow of the earth, as the poet also demonstrated in a single verse (Virgil, Georgics Book I). Nor does the moon rise under the rays of her brother. If this is true, and we can also say in a metaphorical sense, that the Church which grows and diminishes in times of peace and persecution, and once again takes on its original light, shining with the radiance of the sun of justice, and this is what is meant by: 'The moon will shine like the sun' (Isai. XXX, 26); and its inhabitants will shine like the sun in the kingdom of their father. And during these months, the seed of the Lord, which is renewed forever, comes to its solemnities, which the holy one proclaimed with mystical words, saying: 'I have considered the eternal years, and I have meditated' (Psal. LXXVI, 6). … And what follows: All flesh shall come to adore in my sight in Jerusalem, it should be known that it is not written in Hebrew, Jerusalem, so that we may deride the pride of the Jews, but only 'in my sight', so that the word of the Lord may be fulfilled, saying in the Gospel: Amen, amen, I say to you, that the hour comes when you shall neither on this mountain, nor in Jerusalem adore the Father (John IV, 21). And again: The Spirit is God. And those who worship Him must worship in spirit and truth (John, 4:24). And the Apostle also said: Lifting up holy hands in every place (I Tim. II, 8). But all flesh does not signify the Jewish people, but every kind of people, according to what was said above: All flesh shall see your salvation (Isaiah, 40:5). And in Joel: I will pour out my Spirit upon all flesh, and your sons and daughters will prophesy (Joel, 2:28). And in Zechariah: Let all flesh fear before the Lord (Zech. II, 13). And in the Psalms: To you all flesh will come (Ps. LXIV, 2). Which in other words is said in another psalm: All the nations you have made shall come and worship before you, O Lord, and shall glorify your name (Ps. LXXXV, 9). They interpret from month to month, and from Sabbath to Sabbath, when all flesh will come to worship God, the "chiliasts," who we can call the Milestones: so that those who are nearby come to Jerusalem every Sabbath; those who are far away come through months, that is, completing the cycle of the calendar; those who are very far away come through individual years, that is, on the days of Passover or Tabernacles, according to what is said in Zechariah: And it shall come to pass that everyone who is left of all the nations which came against Jerusalem shall go up from year to year to worship the King, the Lord of hosts, and to keep the Feast of Tabernacles (Zech. XIV, 16). And to provide greater laughter to the hearers, which is written in the last volume of the same prophet: 'And there will no longer be a merchant in the house of the Lord of hosts on that day,' thus they interpret, that merchants will cease to exist for a thousand years, because everything will be produced in all places, so that neither will we need the leaf of amomum and pepper, nor will the Indians desire pennyroyal from us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
