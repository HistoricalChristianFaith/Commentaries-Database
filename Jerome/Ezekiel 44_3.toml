[[commentary]]
quote='''
Such is the greatness of his goodness and the prince of his mercy, that even though he alone sits at the closed door and eats bread before the Lord, he desires to have more companions at his table and feast, and says: 'Behold, I stand at the door and knock; if anyone opens to me, I will enter in and dine with him, and he with me' (Rev. 3:20). But he alone eats bread in the presence of the Lord, because his substance and divine nature are separate from all the substances of creatures. He himself enters and exits through the same gate of the vestibule: for he is both inside and outside, that is, infused and encompassing all; entering through the gate in order to bring with him those who cannot enter without his teaching and help; and exiting in order to bring in others again.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"

[[commentary]]
quote='''
Christ himself is a virgin, and his mother is also a virgin; though she is his mother, she is a virgin still. For Jesus has entered in through the closed doors, and in his tomb—a new one hewn out of the hardest rock—no one is laid either before him or after him.… Mary is the east gate, spoken of by the prophet Ezekiel, always shut and always shining and either concealing or revealing the Holy of Holies.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_048.html'
source_title="LETTER 48.21"
