[[commentary]]
quote='''
The Apostle Paul, writing to the Corinthians, takes a paraphrase, as it were, of this testimony from a Hebrew of the Hebrews, from the authentic books, not rendering word for word, which he altogether despises, but expressing the truth of the sense, which he uses to strengthen what he wants to say. Hence, let the delirium of the apocryphal writings be silenced, which are foisted upon the Churches of Christ on the occasion of this testimony. Of which it can truly be said that the devil sits in ambush with the rich in the apocrypha, in order to kill the innocent. And again: He lies in wait in the apocrypha like a lion in his den; he lies in wait to seize the poor (Psalm IX, 8). For the Ascension of Isaiah and the Apocalypse of Elijah bear witness to this. ... But what the people say at present is that they have never known, neither with their ears nor with their eyes, what God has prepared for his saints in the future: that it happens to those who practice righteousness and remember His ways. Moreover, according to the Septuagint, they say that they never knew any other God except for the one who truly is God, nor have they seen any other works so great that He will do for those who wait for His mercy, and they will do justice and remember His ways. And as it is written: No one has ever seen God (John 1:18). And again: No one can see My face and live (Exodus 33:20). Therefore, God is not explained by words, nor is He visible to the eyes, but He is seen by those about whom it is written: Blessed are the pure in heart, for they shall see God (Matthew 5:8).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
