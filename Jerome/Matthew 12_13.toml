[[commentary]]
quote='''
(Verse 13) Then he said to the man, \"Stretch out your hand.\" And he stretched it out, and his health was restored like the other. In the Gospel used by the Nazarenes and Ebionites (which we recently translated from Hebrew into Greek, and which some call the authentic Gospel of Matthew), this man, who has a withered hand, is said to be a mason, praying for help with these words: \"I was a mason, seeking food with my hands. I beg you, Jesus, to restore my health, so that I may not shamefully beg for food.\ Until the coming of the Savior, the hand of God was dry in the synagogue of the Jews, and His works were not performed in it: but after He came to the earth, His right hand was restored to the believing apostles, and the former work was renewed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
In the Gospel which the Nazarenes and Ebionites use, (vid. note, p. 433.) and which we have lately translated into Greek out of the Hebrew, and which many regard as the genuine Matthew, this man who has the withered hand is described as a builder, and he makes his prayer in these words, 'I was a builder, and gained my living by the labour of my hands; I pray thee, Jesus, to restore me to health, that I may not disgracefully beg my bread.'

Until the coming of the Lord the Saviour, there was the withered hand in the Synagogue of the Jews, and the works of the Lord were not done in it; but when He came upon earth, the right hand was restored in the Apostles who believed, and given back to its former occupation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
