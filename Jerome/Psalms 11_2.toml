[[commentary]]
quote='''
For behold, the sinners have bent the bow, they have prepared their arrows in the quiver, that they may shoot in the dark the upright of heart. For which it is written in the Hebrew, "For behold, the impious have bent the bow, they have set the arrow upon the string, that they may strike in the dark the upright of heart." Therefore, he says, you wish me to migrate to the mountains, because the sinners, or the impious, burning, have prepared arrows, which must be repelled with the shield of faith. And in their quivers they have darts to strike the just, not in the day, not in the faintly-lit night, when the darkness is tempered by the solace of the moon, but when the night is full, and the darkness is palpable — that is, ψηλαφητὸν σκότος (touchable darkness, psēlaphēton skotos). Know that for this very reason I do not heed your counsels: because the adversaries are prepared for battle, and desire to wound not so much me, whom they cannot overcome, as my just ones; and since I have come from heaven for their salvation, I ought not to leave them orphans. For behold, as you say, they have set their arrow upon the string, and they wish to capture my boys, the sons of my ripening youth, my little young men, with the sweet enticements of pleasures. For all the strength of the devil is in the loin: for which cause also, when Jacob wrestled with me in the struggle, I made his γλαφυρόν (sinew, glaphyron) wither — that is, dry up. Since, therefore, they wish to strike the upright of heart in the darkness, let my just man speak and say: "Your word is a lamp to my feet, O Lord, and a light to my paths." But I, standing in the battle-line and placed in array, do not forsake the contest once begun, especially when you say that they have bent the bow, prepared arrows in the quiver, wish to wound my saints in the darkness, and yet have not yet been able to strike. For they have bent the bow, they have prepared arrows in the quiver, that they may shoot in the dark the upright of heart. Since, then, they are thus prepared, I will set myself in the midst, I will receive their arrows, that my servants may not grieve at my grief, may be healed by my wounds, may not suffer while I suffer, and may say: "O Lord, you have crowned us as with a shield of your good will." But it can also be understood otherwise: that the heretical or adverse powers, through the dogmas of the heretics, have aimed their blasphemies, and desire to deceive my just ones with varied fraud. For they are archers who, through the occasion of their darkness — which they understand as hidden mysteries — wish to strike the upright hearts of the just. Therefore I and my saints must migrate to the sublime testimonies of the Scriptures, as it is also written in the Gospel: "If he strike you on the right cheek, offer him the other also." He does not say, offer him the left, but the other — that is, the other right — because the just man has nothing left-handed in himself. If, he says, he confounds you in one testimony of the Scriptures, do you overcome him from another, and fulfill that which is written in another psalm: "Deep calls to deep at the voice of your cataracts": so that each Testament may be a defense to the other in turn, and in such a way the snare of the heretics may be broken by the opposing of the other right hand, and by migration to the mountains, and by the calling of deep to deep.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_060.html'
source_title="Homily 60, on Psalm 10 (Alternate Series)"
