[[commentary]]
quote='''
For there are five senses which hasten towards heavenly things, and seek after things above. Of sight, hearing, and touch, it is specially said, That which we have heard, which we have seen with our eyes, and our hands have handled. (1 John 1:1.) Of taste, Taste and see that the Lord is good. (Ps. 34:8.) Of smell, Because of the savour of thy good ointments. (Sol. Song, 1:3.) There are also other five senses which gape after earthly husks.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252025.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
We can interpret the five virgins, wise and foolish, as the five senses: some hasten to heavenly things and desire heavenly things; others, gaping at earthly dregs, do not have the ointments of truth with which to enlighten their hearts. It has been said spiritually by sight, hearing, and touch: What we have seen, what we have heard, what we have beheld with our own eyes, and what our hands have touched (1 John 1:1). As for taste: Taste and see that the Lord is sweet (Psalm 34:9). As for smell: We run after the fragrance of your ointments (Song of Solomon 1:3). And: We are the sweet fragrance of Christ (2 Corinthians 2:15).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
