[[commentary]]
quote='''
But while the animals were standing, their wings were lowered. For they could not bear the resonating voice of Almighty God in the heavens, but they stood and marveled; and with their silence, they demonstrated the power of God, who sat upon the firmament.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
