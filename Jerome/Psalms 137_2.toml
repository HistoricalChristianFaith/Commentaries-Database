[[commentary]]
quote='''
On the willows in the midst of it we hung up our instruments. The willow has such a nature: it is indeed a barren tree, and it is said that if anyone takes a drink from it or eats of it, he does not beget children. There, then, we hung up our instruments. Now the instrument is the body of man. For just as an instrument is put together out of many pipes, yet sends forth one melody by its tuning, so too we have our instrument, the sense of touch: through it, that is, through works, we render back to God melody and song and hymn. Likewise through hearing, and through smell, and through taste, and through sight, and through all these faculties, as though from one instrument, we render back hymn and song to the Lord. It is said, again, that the willow has no root; but if a branch is cut off, and is planted beside the water, it at once grows green. So too the sinner, although he has sinned, although he has fallen: nevertheless, if he is beside the waters — that is, if he reads the holy Scriptures, and hears the divine word from a holy man — his soul grows green, and is turned to repentance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_048.html'
source_title="Homily 48, on Psalm 136"
