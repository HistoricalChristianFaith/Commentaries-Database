[[commentary]]
quote='''
Therefore, the prophet prophesies to the spirit, and says: Thus says the Lord God: Come, O spirit, from the four winds; come, that is, from the four corners of the world, so that just as in the first creation of man God breathed into his face and he became a living soul (Genesis 2:7), so in the second creation, that is, the resurrection of the dead, being breathed upon by the spirit, they may be brought to life again; for when the spirit entered the human bodies, immediately they lived, and stood upon their feet.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
