[[commentary]]
quote='''
And what they cry out, one to another, or according to the Hebrews, this one to that one, that is, one to one, they encourage each other in the praises of the Lord and say: Holy, Holy, Holy, Lord God of hosts, in order to demonstrate the mystery of the Trinity in one Divinity; and they testify that the glory of God fills not just the Temple of the Jews, as before, but the entire earth, which He deigned to assume a human body for our salvation and descend to the earth. Finally, when Moses prayed to the Lord on behalf of the people, asking Him to spare the sinful people, the Lord responded: 'I will be merciful to them.' However, as surely as I live and as surely as my name lives, my glory will fill the whole earth (Num. 14: 20, 21). The seventy-first psalm also declares: 'His glory will fill the whole earth' (Psalm 71:19). That is why the angels proclaimed to the shepherds: 'Glory to God in the highest, and on earth peace to people of good will' (Luke 2:14). Therefore, some impiously understand the two Seraphim to refer to the Son and the Holy Spirit: as we teach according to the evangelist John and the Apostle Paul, that the Son of God was seen in the majesty of his reign, and the Holy Spirit spoke. Some Latin scholars understand the two Seraphim to refer to the Old and New Testaments, which speak only of the present age. Hence, they are said to have six wings and to veil the face and feet of God, and eagerly bear witness to the truth, and show forth all the sacraments of the Trinity that they proclaim. And they marvel at each other because the Lord of hosts, in the form of the Father, took on the form of a servant and humbled Himself even unto death, death on a cross (Philippians II), so that not only heavenly beings, but also earthly beings may know Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
