[[commentary]]
quote='''
(Verse 27) He also said to them: Neither do I tell you by what authority I do these things. They answered and said to him: We don't know. Then Jesus also replied to them: Neither do I tell you by what authority I do these things. But the Truth cannot lie, and he said: Neither do I tell you. From this, he shows that they know but refuse to answer, and he knows but refuses to say, because they keep silent about what they know. And immediately he tells a parable that not only condemns their impiety, but also teaches that the kingdom of God will be given to the Gentiles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
And answering Jesus, they said: We do not know. Therefore, the most impious faction responded and, using the word of humility by which they claimed not to know, used it to plot deceit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
This godless party therefore make answer, and by a seeming humility of speech confessing that they know not, turned to hide their insidious designs. And they answered Jesus, and said, We know not. In saying that they knew not, they lied; and it might have followed upon their answering thus, that the Lord also should say, I know not; but truth cannot lie, and therefore it follows, And he said unto them, Neither tell I you by what authority I do these things. This shows that they knew, but would not answer, and that He also knew, but would not answer, because they would not speak what they knew.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title="Catena Aurea by Aquinas"
