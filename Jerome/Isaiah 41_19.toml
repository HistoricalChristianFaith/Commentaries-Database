[[commentary]]
quote='''
These varieties of trees signify the diversity of spiritual grace. And because the nature of them is well known to all, we will now explain the Setta, which Theodotio translated as a thorn. It is a type of tree that grows in the desert and resembles a white thorn. From this tree, all the wood for the ark and the tabernacle was made, which is called Settim (Exodus 37). This wood is incorruptible and very light, surpassing all other types of wood in both strength and beauty. But cedar and cypress, and myrtle, of excellent fragrance and incorruptible, are joined with elm and poplar, or with boxwood, or they are most suitable for grafting vines or for various works. All these things are placed together in solitude, so that at least one string of the Lord's lyre and some virtue of the Church's graces may not seem to be lacking. That all may understand and know together in their minds that the hand of the Lord has brought forth all these things, so that in the dryness of the nations the streams of virtues may be found, and in a once deserted and full of saltiness land, cedars and cypresses, and other trees may be born, whose height and top reaching toward the heavens would be illuminated by the wood of the olive, which is the nourishment of light and rest for those who labor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
