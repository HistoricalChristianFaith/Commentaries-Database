[[commentary]]
quote='''
The day of the Lord is near, O heretic, over all nations: the time of judgment is near when all nations will be judged. Just as you have done against the church, your pain will turn against you, and your wickedness will descend upon your head. For how you have rejoiced in their death, and celebrated a feast, and on my holy mountain, that is, the Church, you have drunk not from my cup, but from the devil's: of whom it is said in Habakkuk, 'Woe to him who gives drink to his neighbor, pouring it from the wineskin till they are drunk' (Habakkuk 2:15): so too, all the nations, or opposing powers subjected to punishment, or every opposing virtue, will drink and consume your blood, and in the end, when torment comes upon all, they themselves will be as if they do not exist. For he who perishes, is counted as not being, and he who said to Moses: I am who am sent me to you (Exod. III, 14), according to the rule of the Scriptures, is said not to be. Hence, we also read in Esther: Do not give, O Lord, your kingdom to those who are not (Esth. XIV, 11). We can interpret this passage differently: Because you have rejoiced in the ruin of my servants, the same persecution will come against you also, and you will suffer for whatever you have done. And just as you rejoiced against my people with the rest of the nations, so all nations will rejoice against you, and they will devour and drink, and crush with a similar persecution.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Obadiah.html'
source_title="Commentary on Obadiah"
