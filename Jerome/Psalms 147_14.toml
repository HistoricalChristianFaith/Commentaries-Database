[[commentary]]
quote='''
Who has set your borders as peace. Where has peace been set, which was overthrown by war? And he fills you with the fat of the wheat. Does wheat have fat? Answer, O Jew, does wheat have fat? If, then, wheat does not have fat, and you are compelled by necessity to understand it spiritually, then according to this verse the rest too must be understood. And he fills you with the fat of the wheat. Unless, he says, the grain of wheat shall fall, it alone shall be saved; but if it itself shall fall, it makes many to be saved. Our Lord, the grain of wheat, fell into the earth, and multiplied us. But this grain of wheat is very rich; it has marrow, it has fat, it has richness. And he fills you with the fat of the wheat. Happy is he who understands the fat in this wheat. We read the holy Scriptures. I hold the Gospel to be the body of Jesus; the holy Scriptures I hold to be his teaching. And when he says, He who has not eaten my flesh and drunk my blood — although it can also be understood in the mystery, yet truly the body of Christ and his blood is the word of the Scriptures, is the divine teaching. If ever we go to the mystery — he who is faithful understands — if a little crumb falls, we are in peril. If ever we hear the word of God, and the word of God and the flesh of Christ and his blood is poured into our ears, and we are thinking of something else, into how great a peril do we run? And he fills you with the fat of the wheat. The divine word is very rich; it has in itself all delights. Whatever you wish is born from the divine word: just as the Jews hand down that the manna, when they ate it, tasted in the mouth according to each one's desire. For instance, he who ate the manna, if he desired apples, or a pear, or grapes, or bread, or meat — according to the kind and the desire of the one eating, so too was the taste in the manna. So too in the flesh of Christ, which is the word of teaching, that is, the interpretation of the holy Scriptures, as we wish, so also do we receive the food. If you are holy, you find refreshment; if you are a sinner, you find torment. And he fills you with the fat of the wheat. He leaves no remnants. Who has set your borders as peace. In another psalm we read: And his place was made in peace. My peace I give to you, my peace I leave to you. My peace: not as the world has peace, since indeed the peace of the world is our war. My peace I give to you. Have war with the world, and you will have my peace. Who has set your borders as peace. He, then, who is not at peace with his brother, this man is not within the borders of Jerusalem. Let someone say: What am I to do? My brother does not want to be reconciled with me — am I then outside the borders of Jerusalem? As much as it lies in you, he says, having peace with all men. With those who hated peace, I was peaceable. You, keep the peace: if another is angry, he has war, and through his war peace is born for you. Do you want to know how there can be both war and peace? The wretched Judas was coming to the betrayal, and the Lord offers him peace by a kiss: he creates war out of the kiss.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_057.html'
source_title="Homily 57, on Psalm 147"
