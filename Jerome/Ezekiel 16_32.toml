[[commentary]]
quote='''
And while all women usually receive payment from their lovers, Jerusalem did the opposite, giving more than she received. And to show the extent of her generosity, she would burden them, saying, 'Come to me often,' so that there would be no neighbor who would not be mixed up in her dishonor. And indeed, Jerusalem surpassed other prostitutes in this as well, not only giving what she had earned through the shameful practice, but also giving marital gifts to her lovers and her adulterers. So great was the example of the adulteress in all its magnitude of shame, that it is preferred not only to those present, but also to future prostitutes.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 5:16.32-34"
