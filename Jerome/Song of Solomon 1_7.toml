[[commentary]]
quote='''
I linger long in the land of the midday sun, for it was there and then that the spouse found her bridegroom at rest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_108.html'
source_title="LETTER 108.12"

[[commentary]]
quote='''
Because Abraham received the angels at noon, and Joseph invited his brothers to a meal at noon. For both Abraham and Joseph were holy, and therefore their banquet was in clear light and full sun, therefore they feed at noon. And I too, if I have full knowledge of the Scriptures, although it be the third hour, nevertheless I feed you at noon. Indeed even the bride in the Song of Songs says: "Where do you feed, she says, where do you lie down at noon?" You see that the bridegroom does not feed, does not recline at the third hour, but at noon. Where do you feed, where do you lie down, where do I find you, where do you take your delight, where can I find you, O my bridegroom? Do you wish to find me? At noon, in perfect knowledge, in good works, in clear light. Since therefore we have our noon, therefore the devil too transforms himself into an angel of light, and he himself pretends that he has light, that he has noon. When the heretics promise, as it were, certain mysteries, when they promise the kingdom of heaven, when continence, when fasts, when holiness, when renunciation of the world, they promise noon. But since it is not the light of Christ, it is not noon, but the noonday demon.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="HOMILIES ON THE PSALMS 20 (Psalm 90)"
