[[commentary]]
quote='''
Attend to my supplication, for I have been humbled exceedingly. Unless someone has been humbled, he is not heard by the Lord. For what does it profit anyone to pray with words and to keep his neck held erect? But if we understand it of the Lord: "Learn from me, for I am gentle and humble of heart."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_052.html'
source_title="Homily 52, on Psalm 141"

[[commentary]]
quote='''
Deliver me from those who persecute me, for they have been made stronger than I. Those who fight against us are stronger than we are, that is, the princes of this world.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_052.html'
source_title="Homily 52, on Psalm 141"
