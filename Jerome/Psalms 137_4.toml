[[commentary]]
quote='''
How shall we sing the Lord's song in a strange land? They answer, those who have sinned and been deceived, and they say: "How shall we sing you the Lord's song in a strange land, set as we are in our sins, we who have fallen from Jerusalem into Babylon?" Therefore no one can praise the Lord unless he is holy. For the sinner ought not to sing to the Lord, but to mourn his sins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_048.html'
source_title="Homily 48, on Psalm 136"
