[[commentary]]
quote='''
(Verse 34) Truly I say to you, this generation will not pass away until all these things happen. Above, we mentioned the generations of the righteous and, on the contrary, the wicked being separate. Therefore, it either signifies all types of people or specifically the Jews.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
Or, by generation here He means the whole human race, and the Jews in particular.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252024.html'
source_title="Catena Aurea by Aquinas"
