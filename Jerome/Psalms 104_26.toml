[[commentary]]
quote='''
There the ships shall pass through. Which of us is a strong ship, able to flee from this world, and not be submerged, nor strike upon a rock — but let him have understanding to steer him, that he may be able to be saved?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"


[[commentary]]
quote='''
This dragon which you formed to mock him. The Jews say: God made a great dragon, which is called Leviathan, and it is in the sea; and when, they say, the ocean recedes, the dragon turns. But let us say: This is the dragon who was cast out of paradise, who deceived Eve, and was given into this world to mock us. For how many monks and clerics has he cast down!
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"
