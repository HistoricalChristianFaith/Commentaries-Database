[[commentary]]
quote='''
Before their face they divided and passed through the gate, and went out through it. Their king went out before their face: but the Lord their prince (Heb. shall be) before them. Therefore I said to you: Ascend through the division, you who have risen with Christ, and seek those things that are above: because the Angels, whether the Father and Son, and Holy Spirit, have divided what seemed to obstruct, and have made a way for those who wish to enter, and because they have invaded the path, not only have they entered the gate, but they have also passed through it. But they entered because their king also entered the same gate, and he opened for them the way, so that they could walk without any difficulty. For he himself is the Lord, and king, and shepherd, and the way and the gate, and he says: I am the gate: through me whoever enters will be saved: he will enter and he will go out, and he will find pastures (John 10:9). Concerning this gate, it is also prophesied elsewhere: This is the gate of the Lord, the righteous shall enter through it (Psalm 117:20). But whoever enters, should not remain in the state in which they entered; but should go out to the pastures, so that in entering there may be a beginning, in going out and in finding pastures, there may be the perfection of virtues. Whoever enters is still in the world, and through creatures understands the Creator. But whoever goes out, transcends the whole creation, and considering all that can be seen as nothing, will find pastures above the heavens, and will feed on the word of God, and will say: The Lord feeds me, and I shall lack nothing (Psalm 23:1). This is why, in order to understand the Gospel testimony: He will enter and He will go out, and will find pasture; and what is now said through the Prophet: And they passed through the gate, and went out through it: which passage and going out, however, cannot be attributed to our king and Lord Christ, who is king and Lord. For immediately it is connected: But the Lord shall be the Prince.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Micah.html'
source_title="Commentary on Micah"
