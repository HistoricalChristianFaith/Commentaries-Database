[[commentary]]
quote='''
Whence his blood will come upon him, that is, he will be the cause of his own death, according to what David says to him who reported to him the death of Saul, and remembered that he had killed the king of Israel: "Your blood be upon your own head" (2 Kings 1:16). Not my opinion, but the blood of Saul (i.e. "Al" for Saul) will be spilled because of your blood.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Hosea.html'
source_title="COMMENTARY ON HOSEA 3.12"
