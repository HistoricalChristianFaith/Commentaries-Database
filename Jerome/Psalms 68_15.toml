[[commentary]]
quote='''
The mountain of God, a rich mountain. This is the mountain which in Ezekiel wounds the prince of Tyre. And by "mountain" they mean the Lord himself.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
