[[commentary]]
quote='''
The upright shall dwell with your countenance. And what is the countenance of God, if not Christ? 'Who thought it not robbery to be equal with God.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_050.html'
source_title="Homily 50, on Psalm 139"
