[[commentary]]
quote='''
And lest this seem difficult to you, I myself will come to you, and those who had departed from you will return to you, so that you may regain your former culture and all things may be fulfilled, so that there may be many people among you, and cities, which were previously destroyed, may be inhabited. And not only will I multiply people, but also animals will multiply and increase, and I will make you dwell as in the beginning, when Moses, leading the two and a half tribes across the Jordan (Numbers 32), and under Joshua, son of Nun, the other nine and a half tribes possessed the land of Judah (Joshua 1 and 13): and I will give you much greater possessions than you had in the beginning before you experienced various captivities. And when I have done this to you, then you will know that I am the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"


[[commentary]]
quote='''
Therefore, we will say that the mountains of Israel are the prophets and apostles, who hear the word of God, and to whom the enemy devil insulted, saying: 'Well done, once lofty mountains, about which it is written: The mountains are round about it, and the Lord is round about His people' (Ps. 124:2), have been given to me as a possession, when they were desolated by the narrowness of persecution, and trodden down round about, and have become an inheritance to the rest of the nations, and have been blasphemed by all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
