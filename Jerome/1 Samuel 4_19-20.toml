[[commentary]]
quote='''
Let us read the Scriptures, and we will never find that holy women, except Rachel, gave birth with pain: because she was on the way and in the hippodrome, that is, in the race of horses, which are sold in Egypt, she gave birth to a son of pain, whom later the father called the son of his right hand. Eve, expelled from paradise and hearing: "In pain you will bring forth children," is said to have given birth in pain. The wife of Phineas, contracted and unable to straighten herself, like the woman whom the devil bound in the Gospel, gave birth after she learned of the capture of the ark of God and the ruin of the people. But Sarah, because she was holy and had ceased to menstruate, after the birth of Isaac said: "God has made me laugh; whoever hears will laugh with me." Therefore, those who occupied the tower of the flock, they are pains of the underworld and pains of death, who indeed surrounded and encircled even the Savior; but they were by no means able to obtain him, as he himself speaks in the seventeenth Psalm: Pains of death surrounded me, and rivers of iniquity troubled me, and pains of hell enclosed me.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Micah.html'
source_title="COMMENTARY ON MICAH 2.4"
