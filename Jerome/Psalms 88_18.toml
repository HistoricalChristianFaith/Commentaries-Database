[[commentary]]
quote='''
"Thou hast put far from me friend and neighbor, and my acquaintances because of misery." Because of the confusion of the passion, even the apostles themselves were put far from him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_065.html'
source_title="Homily 65, on Psalm 87 (Alternate Series)"
