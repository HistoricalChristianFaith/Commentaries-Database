[[commentary]]
quote='''
(Verse 35.) Heaven and earth will pass away, but my words will not pass away. Heaven and earth will pass away by change, not by their destruction: otherwise, how will the sun be darkened, and the moon will not give its light, and the stars will fall, if the heaven in which these things are, and the earth, do not exist?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
And He adds, Heaven and earth shall pass away, but my words shall not pass away, to confirm their faith in what has gone before; as though He had said, it is easier to destroy things solid and immovable, than that aught should fail of my words.

The heaven and the earth shall pass away by a change, not by annihilation; for how should the sun be darkened, and the moon not give her light, if earth and heaven in which these are should be no more?
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252024.html'
source_title="Catena Aurea by Aquinas"
