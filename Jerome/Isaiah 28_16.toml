[[commentary]]
quote='''
And immediately we encounter the gate of the corners, where the corner stone is, which the builders rejected and has become the head of the corner. This corner stone connects both walls and brings two peoples into one, about which God speaks through Isaiah: Behold, I will place in Zion a corner stone, chosen and precious in its foundation; and whoever believes in him will not be put to shame. Here the cornerstone and other cornerstones wanted to be built, so that the apostle Paul might freely say: Built upon the foundation of the apostles and prophets, Jesus Christ himself being the chief cornerstone.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Zechariah.html'
source_title="Commentary on Zechariah"


[[commentary]]
quote='''
Jesus said to them: Have you never read in the Scriptures: The stone which the builders rejected, the same has become the head of the corner? This is the Lord's doing, and it is marvelous in our eyes. Various parables and different teachings are woven into this story. For those whom he previously called workers, vine-dressers, and farmers, he now calls builders, that is, masons. Hence the Apostle says: You are God's field, you are God's building. So just as bricklayers and vine-growers take possession of a vineyard, they also took possession of a stone, which they either place in the foundations, next to the architect Paul, or in the corner, to join together two walls, that is, both peoples, who were rejected by them, became the cornerstone. And this was done by the Lord, not by human strength, but by the power of God. Peter also confidently speaks of this stone of support: This stone, which was rejected by you builders, has become the cornerstone. And Isaiah said: Behold, I will send a chosen, precious, corner stone into the foundations of Zion: and he that believeth in him, shall not be confounded.
Therefore I say to you, that the kingdom of God will be taken away from you, and it will be given to a nation producing its fruits. I have said many times that the kingdom of God is to be understood as the holy Scriptures, which the Lord took away from the Jews and gave to us, so that we may produce their fruits. This is the vineyard that is entrusted to the farmers and winegrowers, and those who do not work in it, having only the name of the Scriptures, will lose the fruits of the vineyard.
And whoever falls on this stone will be broken; but on whomever it falls, it will grind him to powder. It is one thing to offend Christ through evil works, another to deny Him. Whoever is a sinner, yet believes in Him, falls indeed on the stone and is broken, but is not utterly crushed; for he is preserved through repentance for salvation. But on whomever the stone falls, that is, on whom the stone itself will crash down, and who completely denies Christ, it will grind him to powder, so that not even a shard remains, in which a little water could be poured.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
(Verse 16). Thus says the Lord God: Behold, I will send in the foundations of Zion a tested, corner, precious stone, founded on a foundation: he who believes shall not hurry. LXX: Therefore, thus says the Lord: Behold, I will lay in Zion a precious stone, a chosen, cornerstone, and whoever believes in it will not be put to shame.

I had said, he says, to you: Listen to the word of the Lord, men who mock, or troubled rulers of my people, and do not have a covenant with death, nor an agreement with the underworld, who, despising my commandments, have put your hope in lies, and boasting, or rather despairing, say: with lies we will be protected. Therefore, the merciful and compassionate Lord, patient and greatly merciful (Ps. 145), says that he will send an elected, tested, precious, and corner stone into the foundations of Zion for those who do not want it. About which the Apostle also speaks: Like a wise architect, I have laid the foundation (I Cor. III, 10); and again: For no one can lay any other foundation than the one that's been laid, which is Christ Jesus (Ibid., 11). This stone is truly and again called a stone, just as in Leviticus, a man is called man twice and a corner stone, because it has united the people of the Circumcision and the Gentiles, about which it is also said in the psalm: The stone which the builders rejected, has become the head of the corner (Ps. CXVII, 22). But these are the builders and masons, who are now called deceivers and leaders of the people who are in Jerusalem. Concerning this stone, we read in Daniel that it was cut from a mountain without hands, and it filled the whole earth (Dan. II): because the divine dispensation of the divine seed assumed a human body, and the fullness of Divinity dwelt in it bodily. Upon this stone, which is also called rock, Christ built the Church, and according to the Hebrew, he established the foundation on a firm rock, on which anyone who believes will not be put to shame, or, according to the Hebrew, will not hasten, lest the coming of Christ appear slow to him. For if it delays according to Habakkuk, let no one despair: for it will surely come, and it will fulfill its promises (Hab. II).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
