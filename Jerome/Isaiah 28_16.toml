[[commentary]]
quote='''
This cornerstone joins together both walls and restores two peoples to unity, concerning which God said through Isaiah: “Behold, I will lay a cornerstone in Zion as its foundation, elect and precious; the one who believes in it will not be ashamed.” It was his will to build further upon this cornerstone and other cornerstones, so that the apostle Paul would be able to say boldly, “built upon the foundation of the apostles and the prophets, with Jesus Christ himself being the chief cornerstone.”
'''
source_url=''
source_title="COMMENTARY ON ZECHARIAH 3:14.10-11"


[[commentary]]
quote='''
Peter also spoke confidently about this stone of assistance: “This is the stone rejected by you builders, which was made the cornerstone.” And Isaiah said, “Behold, I will lay a cornerstone in Zion as its foundation, elect and precious; the one who believes in it will not be ashamed.”“Therefore I say to you that the kingdom of God will be taken from you and given to the people who produce its fruit.” As I have said, the kingdom of God is often to be understood as sacred Scripture, which the Lord removed from the Jews and gave to us that we might produce its fruits. This is the vineyard that was given to the tenant farmers and vinedressers who did no work in it; possessing the Scriptures in name only, they will lose the fruits of the vineyard.
“Whoever falls on this stone will be broken, but the one upon whom it falls will be destroyed.” It is one thing to offend Christ through evil deeds but another thing to deny him. The sinner who nevertheless still believes in him is the one who falls on the stone and is broken but not altogether destroyed, for he is preserved for salvation through patience. But the one upon whom it falls, that is, the one upon whom the stone itself rushes, is the one who denies Christ inwardly. He is destroyed so completely that not even a shard with which to draw a little water will remain.
'''
source_url=''
source_title="COMMENTARY ON MATTHEW 3 (21:42-44)"

[[commentary]]
quote='''
(Verse 16). Thus says the Lord God: Behold, I will send in the foundations of Zion a tested, corner, precious stone, founded on a foundation: he who believes shall not hurry. LXX: Therefore, thus says the Lord: Behold, I will lay in Zion a precious stone, a chosen, cornerstone, and whoever believes in it will not be put to shame.

I had said, he says, to you: Listen to the word of the Lord, men who mock, or troubled rulers of my people, and do not have a covenant with death, nor an agreement with the underworld, who, despising my commandments, have put your hope in lies, and boasting, or rather despairing, say: with lies we will be protected. Therefore, the merciful and compassionate Lord, patient and greatly merciful (Ps. 145), says that he will send an elected, tested, precious, and corner stone into the foundations of Zion for those who do not want it. About which the Apostle also speaks: Like a wise architect, I have laid the foundation (I Cor. III, 10); and again: For no one can lay any other foundation than the one that's been laid, which is Christ Jesus (Ibid., 11). This stone is truly and again called a stone, just as in Leviticus, a man is called man twice and a corner stone, because it has united the people of the Circumcision and the Gentiles, about which it is also said in the psalm: The stone which the builders rejected, has become the head of the corner (Ps. CXVII, 22). But these are the builders and masons, who are now called deceivers and leaders of the people who are in Jerusalem. Concerning this stone, we read in Daniel that it was cut from a mountain without hands, and it filled the whole earth (Dan. II): because the divine dispensation of the divine seed assumed a human body, and the fullness of Divinity dwelt in it bodily. Upon this stone, which is also called rock, Christ built the Church, and according to the Hebrew, he established the foundation on a firm rock, on which anyone who believes will not be put to shame, or, according to the Hebrew, will not hasten, lest the coming of Christ appear slow to him. For if it delays according to Habakkuk, let no one despair: for it will surely come, and it will fulfill its promises (Hab. II).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
