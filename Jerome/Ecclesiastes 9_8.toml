[[commentary]]
quote='''
Because they can do no more under the sun, now he introduces the idea of human madness and habit, whereby men of this world encourage themselves in turn to enjoy good things; and prosopopoiian, using this in the manner of rhetoricians and poets, saying: "O man, since there is nothing for you after death, and death herself hears not my complaint, and while you live this brief life, take pleasure in enjoyment, hold feasts, suppress your worries with wine, and understand, since they are all given by God to be used by you. Wear white clothes, and let your head smell of ointments, and whichever woman pleases you, enjoy her embrace, thus lead this empty and vain life in empty and vain pleasure. For you will not have anything more than this, which you enjoy. Whatever you like, grasp quickly, lest it disappears. You shouldn't fear the vain things mentioned, for the reason for each individual work, either good or bad, will be given to you in the world of the dead. And there is no wisdom in death, no sense of this life after passing away."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ecclesiastes.html'
source_title="COMMENTARY ON ECCLESIASTES 9:8"
