[[commentary]]
quote='''
He who speaks unjust things has not prospered in the sight of my eyes. For I so turned aside from him who disparaged his neighbor, that I neither believed such a one nor listened to him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"
