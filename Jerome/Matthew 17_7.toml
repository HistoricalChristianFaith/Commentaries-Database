[[commentary]]
quote='''
(Verse 7) And Jesus came and touched them. Because they were lying down and unable to rise, he kindly approached and touched them, so that fear would flee with the touch and their weakened limbs would be strengthened.

And he said to them: Rise up, and do not be afraid. He who healed with his hand, heals with his command. Do not be afraid. First, fear is expelled, so that later, knowledge may be given.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
And whereas they were laid down, and could not raise themselves again, He approaches them, touches them gently, that by His touch their fear might be banished, and their unnerved limbs gain strength; And Jesus drew near, and touched them. But He further added His word to His hand, And said unto them, Arise, fear not. He first banishes their fear, that He may after impart teaching.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252017.html'
source_title="Catena Aurea by Aquinas"
