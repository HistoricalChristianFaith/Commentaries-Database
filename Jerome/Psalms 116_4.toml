[[commentary]]
quote='''
O Lord, deliver my soul. Neither the Greek nor the Latin can express the peculiar force of the Hebrew. For "O" the Hebrew has ANNA. Now anna is interpreted "I beg" and "I entreat." And what he says is this: I entreat you, Lord, deliver my soul. For it is not the feeling of one wondering, but of one entreating: for he is set in enormous peril.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_039.html'
source_title="Homily 39, on Psalm 114"
