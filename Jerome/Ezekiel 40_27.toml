[[commentary]]
quote='''
And lest we think there is only one atrium to the south, it is said about the second atrium: And the entrance of the inner atrium is on the southern road: and it is measured from the entrance to the entrance on the southern road one hundred cubits; so that after a week and the sacraments of the old covenant, she may reach the good land and the grace of the Gospel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 12:40.24-31"
