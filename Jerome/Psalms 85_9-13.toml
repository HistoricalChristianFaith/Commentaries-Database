[[commentary]]
quote='''
You have covered all their sins, and right up to the end the psalm is about the coming of the Savior, as I said. Mercy and truth. Nevertheless His salvation is near to those who fear Him, that glory may dwell in our land. For truly the glory of God dwelt in our land, and thereafter righteousness looked down from heaven. For the Lord shall give loving-kindness. What loving-kindness? Our land shall yield its fruit. Mary, our land, our flesh, yielded her fruit. Righteousness shall walk before Him. The virgin land gave forth its righteous fruit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_017.html'
source_title="Homily 17, on Psalm 84"
