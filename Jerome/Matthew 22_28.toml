[[commentary]]
quote='''
(Verse 28) Therefore, in the resurrection, whose wife will she be? For they all had her. They oppose the absurdity of the story in order to deny the truth of the resurrection.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
They conclude with asking, in the resurrection whose shall she be? Though it might be that such an instance might really occur in their nation.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252022.html'
source_title="Catena Aurea by Aquinas"
