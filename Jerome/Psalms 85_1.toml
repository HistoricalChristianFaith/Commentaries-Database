[[commentary]]
quote='''
Unto the end, a psalm of the sons of Korah. The eighty-fourth psalm is headed with this title. I have often said: wherever there is the title "Of the sons of Korah," nothing is sorrowful, but always joyful. For the sorrow of the father is consoled by the joy of the sons. Read the psalms through carefully, then, and wherever you find the title "Of the sons of Korah," you will find nothing sorrowful. I have often said: Korah, which is interpreted as "the place of the Skull," must signify something joyful. So then, who is this Korah? He is the one who was going up from Jericho to Bethel. Bethel, "the house of God." Note this carefully. Whoever is in Jericho, and wishes to go to the house of God, must go up. Therefore our Korah went up from Jericho — that is, Elisha — to the house of God, Bethel; and there come out from Bethel, that is, from the house of God, that is, from the synagogue, where formerly there had been the house of God, there come out forty-two boys, and they mock Elisha, our Korah, and say, "Go up, baldhead, go up, baldhead." He comes to his own house, and is mocked by the little children of Bethel. But that most patient Elisha, who had come to Bethel for this very purpose, to save it, at length turned round upon them: he turned round, and gave orders that two bears should come out of the wood, and they killed forty-two boys. So too our Lord, that is, our Korah, when He had come to Bethel and wished to go up, mocked by the little ones, gives orders that two bears come out — that is, Vespasian and Titus — and they killed forty-two boys. Who are these forty-two boys? From the ascension of Christ up to the overthrow of Jerusalem there are forty-two years. Look carefully, and you will find it so. And so He gave them room for repentance for forty-two years, even after His resurrection, when He went up to Bethel. But because they kept mocking, "Go up, baldhead, go up, baldhead," the two bears came out and killed them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_017.html'
source_title="Homily 17, on Psalm 84"


[[commentary]]
quote='''
You have blessed, O Lord, Your land. This is spoken of the coming of the Savior. This properly according to the history; but according to the tropology, after we have spoken of the history, we shall discourse afterwards. You have blessed, O Lord, Your land. This we have said of the coming of the Savior. The land which had offended You, which had been defiled with idolatries, was saved when You came. You have blessed, O Lord, Your land. Let the sinner speak, and then, having obtained pardon: You have blessed, O Lord, Your land. Although it brought forth thistles and thorns, yet it is Your creation, and therefore it was saved. You have turned away the captivity of Jacob: of those who have believed in Christ. You have turned away the captivity of Jacob. Whoever is in sins is held captive.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_017.html'
source_title="Homily 17, on Psalm 84"


[[commentary]]
quote='''
To the end, a psalm for the sons of Korah. Korah is interpreted as "Skull," the place of the Lord's passion. We are all sons of Korah, we who believe in his resurrection. What then do we say, and what do we sing with harmonious voice?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_064.html'
source_title="Homily 64, on Psalm 84 (Alternate Series)"


[[commentary]]
quote='''
You have blessed, O Lord, your land. It is better said in Greek, Εὐδόκησας Κύριε, that is, "It has well pleased you, O Lord, in regard to your land"; it has pleased you, this has seemed good to you, this you have decreed, that through your mercy you might fulfill what is said in the following verse: You have turned away the captivity of Jacob, you have forgiven the iniquity of your people, you have covered all their sins. But we can also understand it according to the Latin sense. You have blessed, O Lord, your land. The land, which before had been cursed, has been blessed by your coming. That which before had heard, "Thorns and thistles shall you bring forth," now is called, as is written in the Song of Songs, "the flower of the field and the lily of the valleys." The land, which before brought forth thorns, hears in Isaiah: "There shall come forth a rod from the root of Jesse, and a flower shall rise up from his root." You have turned away the captivity of Jacob. The Lord therefore came to preach release to the captives. This is what is said in another place, "He led captivity captive": that is, we who before had been taken captive by the devil unto perdition, are now taken captive by the Savior unto salvation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_064.html'
source_title="Homily 64, on Psalm 84 (Alternate Series)"
