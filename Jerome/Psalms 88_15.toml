[[commentary]]
quote='''
"I am poor, and in labors from my youth": from the time of the flesh assumed. "Being exalted": that is, upon the cross. "I have been humbled": that is, in the sepulchre.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_065.html'
source_title="Homily 65, on Psalm 87 (Alternate Series)"
