[[commentary]]
quote='''
Rabshekah addressed them as follows: "Tell Hezekiah: This is what the great king, the king of Assyria, says..." and so on, as recorded in the history. In this, we can see the arrogance of Rabshekah, who, in a manner contrary to true strength, imitates the custom of the prophets. While they usually begin their pronouncements with "This is what the Lord says," he now says, "This is what the great king, the king of Assyria, says."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"

[[commentary]]
quote='''
The testimony of Rabshakeh is that he relies on the Lord, who has captured all the cities of Judah and said to the people: Do not be afraid and do not be dismayed before the king of Assyria and all the multitude that is with him, for there are more with us than with him. With him is an arm of flesh; with us is the Lord our God, our helper, who fights for us. And the people were strengthened by the words of Hezekiah, king of Judah. But Sennacherib wants to destroy what Hezekiah has built; and he speaks to the people, "Do not let Hezekiah deceive you, and do not put your trust in the Lord our God."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
