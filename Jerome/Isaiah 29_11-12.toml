[[commentary]]
quote='''
[Daniel 12:4] "But Thou, O Daniel, shut up the words and seal the book, even to the time appointed. Many shall pass over, and knowledge shall be manifold." He who had revealed manifold truth to Daniel now signifies that the things he has said are matters of secrecy, and he orders him to roll up the scroll containing his words and set a seal upon the book, with the result that many shall read it and inquire as to its fulfilment in history, differing in their opinions because of its great obscurity. And as for the statement, "Many shall pass over" or "go through," this indicates that it will be read by many people. For it is a familiar expression to say: "I have gone through a book," or, "I have passed through an historical account." Indeed this is the idea which Isaiah also expressed in regard to the obscurity of his own book: "And the sayings of that book shall be like the words of a book that is sealed. And if they shall give it to an illiterate man, saying, 'Read it,' he will reply, 'I do not know how to read.' But if they give it to a man who does know how to read and say, 'Read the book,' he will reply, 'I cannot read it, because it is sealed up'" (Isaiah 29:11-12). Also in the Revelation of John, there is a book seen which is sealed with seven seals inside and outside. And when no one proves able to break its seals, John says, "I wept sore; and a voice came to me, saying, 'Weep not: behold the Lion of the tribe of Judah, the Root of David, has prevailed to open the book and break its seals'" (Revelation 5:1-5). But that book can be opened by one who has learned the mysteries of Scripture and understands its hidden truths, and its words which seem dark because of the greatness of the secrets they contain. He it is who can interpret the parables and transmute the letter which killeth into the spirit which quickeneth.
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title='St. Jerome, Commentary on Daniel, CHAPTER TWELVE'

[[commentary]]
quote='''
(Verses 11-12) And the vision of all will be like the words of a sealed book, which when they give to one who knows letters, they will say: read this, and he will answer, I cannot, for it is sealed. And a book will be given to one who knows not letters, and it shall be said to him, read; and he shall answer, I know not letters.

Therefore, it is significant that he did not say that the vision of all the prophets is sealed to all readers, but to you he says, it will be sealed to those to whom I am now speaking, to whom I am foretelling these things that are to come: or He will forever shut the eyes of your leaders, who boasted of being able to see the hidden and secret things according to the Septuagint. And he said to them, 'All the holy Scripture will be closed and sealed to you, so that you, who consider yourselves knowledgeable in the letters of the Law and the prophecies of the prophets, and who constantly meditate on the volumes of Scripture day and night with tireless mouths, may not understand what you read, as it is written in the Book of Revelation of John: 'Who is worthy to open the book and to break its seals?' (Rev. 5:2) And when no one was found worthy to open the seals, he says that he wept; and that he deserved to hear the word of God: 'Do not weep; behold, the lion of the tribe of Judah, the root of David, has conquered, so that he may open the book and break its seals.' But the lion of the tribe of Judah, the Lord Jesus Christ, is he who unseals the seals of the book, not properly of one, as many suppose, of the Psalms of David, but of all the Scriptures, which are one Scripture of the Holy Spirit; and for that reason they are called one book. Concerning which Ezekiel testifies in mystical discourse (Ezek. II), that it was written within and without; in meaning and in letter. Concerning which also the Savior speaks in the Psalms: In the chapter of the book it is written of me (Ps. XXXIX, 9); not of Jeremiah, not of Isaiah, but in all the holy Scripture, which is called one book. Therefore, the Jewish leaders, up to the present day, being unable to read and open the seals, and to reveal the mysteries of the Scriptures, if you were to give them a book to the unlearned people who are devoured by their own teachers, they would admit to not knowing letters and therefore being unable to read. And out of the two evils, it is much lighter to confess ignorance of the law than to boast of prudence and not be able to understand what is said.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'