[[commentary]]
quote='''
I will sing psalms and understand in the unspotted way. That a person should understand what he is singing, and that his mind should contemplate the psalm itself, so that his thoughts do not wander outside, and he seem indeed to sing psalms with his body, while his mind is without fruit. In the unspotted way: that as I walk in this world I may act justly, and have no spot. When will you come to me? But when I have received understanding, and have acted justly, then with confidence I say to the Lord: "When will you come to me?" And "you will come" is to be understood of his second coming.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"


[[commentary]]
quote='''
I walked about in the innocence of my heart in the midst of my house. Nothing so pleases God as simplicity and innocence. And so among the other winged creatures the Holy Spirit was well pleased in none but the dove, on account of its simplicity, and among the four-footed beasts in the sheep, on account of its meekness.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"
