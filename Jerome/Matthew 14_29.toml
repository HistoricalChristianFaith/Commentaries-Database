[[commentary]]
quote='''
Let those who think that the Lord's body was not real, because He walked upon the yielding waters as a light æthereal substance, answer here how Peter walked, whom they by no means deny to be man.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252014.html'
source_title="Catena Aurea by Aquinas"
