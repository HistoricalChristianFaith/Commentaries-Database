[[commentary]]
quote='''
First, let us discuss the Hebrew text, which differs greatly from the LXX in this passage. As mentioned above, to the place where it says: 'You have set your bed on a high and lofty mountain,' and it accuses and rebukes her as a prostitute, in the entrance of houses and in dark places, a harlot behind the doors, so that anyone who wished to enter the house would have the pleasure exposed before their eyes. Now it accuses and refutes her as an adulterous wife, because while she was sleeping with her husband, she secretly received an adulterous man and uncovered his cloak, or even widened her bed and made an agreement, composing instruments of deception with adulterers. But he says this to show that not only in the fields and houses did they worship idols, but also in the Temple they placed the image of Baal, which Ezekiel also says he saw when the wall was pierced. 'You loved their bed,' he says, 'with an open hand' (Ezek. VIII), so that you would not be ashamed of your sin and desire to hide the shame of your fornication, but rather sin freely. And you adorned yourself with royal ointment and multiplied your idols. And the meaning is this: You sought various ornaments, so that you could attract adulterers both by sight and by smell. But what is said, 'You have adorned yourself with ointment for a king,' is understood in two ways: either for the king God, when you adorn yourself with those things which he has given you and prostitute yourself to idols; or certainly for the idol king of the Ammonites, who is called Moloch, and in our language, 'king sounds': which we read as Melchom in other places according to the LXX (Zephaniah 1). And you sent your ambassadors far away, so that you would have an inclination for fornicating not only with the idols of nearby nations but also with those of distant nations. But the Babylonians and Egyptians have their own meaning. And you have been humbled, it says, even to the underworld. Not the humility that is praiseworthy, but the one in which Ammon humbled his own sister Thamar (2 Kings 13). And truly great is this humility, or rather a descent even to the underworld, from the light and pinnacle of chastity into the darkness of a brothel, or rather a plunge into the abyss of lust. To whom it is said in another place: You will be led even to the underworld. According to the Septuagint, in those things which differ, this seems to me to be the meaning: You thought, O harlot, that if you had left me and joined yourself to your lovers, you would have found something more. To whom also God speaks through Ezekiel: Every harlot receives wages; but you, on the other hand, have given wages, and that act has become perverse for you (Ezek. 16:33). For not only did you receive nothing from your lovers, but you also lost what you had received from your husband. And what follows: You have enlarged your bed, and made a covenant with them; you love their bed where you see their blind spies and mute dogs dreaming vain dreams while they sleep. And you have multiplied your prostitution, so that you have not only slept with one, but frequently and with many. Because of this, you have caused many to withdraw from you: angels who were in your protection, or holy men who have departed from the company of such a harlot. Indeed, we can say the same about heretics who, having abandoned God, follow their own errors and believe they have something more when they embrace falsehood. They have lost the truth and multiplied their fornication, not in one doctrine, but in many. They have even caused the leaders of the Churches, who were like angels, to depart from themselves. Not satisfied with the fornication in their own vicinity, they send messengers beyond their own borders to spread the doctrines and errors of barbarian nations, in order to deceive those who listen with the novelty of their words.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
