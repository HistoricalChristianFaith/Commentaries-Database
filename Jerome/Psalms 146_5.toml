[[commentary]]
quote='''
Blessed is he whose helper is the God of Jacob. These trust in chariots, and these in horses: but we will call upon the name of the Lord our God. They have more helpers: but they are princes, but they are men, but they collapse. We have one, who is able to save. His hope is in the Lord his God. Let us see what the three young men say in the Babylonian furnace, when Nebuchadnezzar summons them, and compels them to worship Bel: what do they answer Nebuchadnezzar? O king, we have no need to answer thee concerning this word. God indeed is able to deliver us from the burning furnace: but even if he shall not deliver us, know, O king, that we do not worship the image which thou hast set up. See their faith. We believe, they say, that he is able to deliver us: but if perchance our sins should hinder it, nevertheless we believe also in him who is unwilling to deliver. For we do not believe in this life, but in the life to come: we do not believe in him so that we may not burn here, but so that through these fires we may not pass over to other fires. Set us aflame therefore, prepare the furnace: this burning, this consuming, is our purgation. Blessed is he whose helper is the God of Jacob. See the significance of the words. His helper. And he could not work any sign there because of their unbelief. God is our helper. He delivers and labors alongside those who are willing and who labor: those who sleep and lie idle and are unwilling he does not deliver. His hope is in the Lord his God. Excellently he said, hope: even if in the present he does not deliver, nevertheless there is hope concerning the future.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_055.html'
source_title="Homily 55, on Psalm 145"
