[[commentary]]
quote='''
The earth was moved, for the heavens dripped down from before the face of the God of Sinai. The heavens dripped down: that is, the manna. Sinai is interpreted as "temptation." Therefore God dwells in those who are tempted and overcome; but in those who are among delights, he does not dwell.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
