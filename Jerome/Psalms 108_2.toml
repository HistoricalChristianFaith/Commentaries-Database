[[commentary]]
quote='''
"Arise, O psaltery and harp." O psaltery, O harp, you were made and created to make melody to God: arise and make melody, why do you lie idle? O monk, you who stand upright in body, why does your soul lie idle, and you do not make melody to the Lord? "Cursed is the man who does the work of God negligently." If you are a psaltery, if you are a harp, why are you deaf, and do not glorify God? "I will arise at daybreak." God cannot be blessed and praised in the darkness, but he is blessed in the light. I say a wondrous thing: even if we rise in the night, we bless God in the light. For a Christian it is never night: for a Christian the sun of righteousness always rises.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_034.html'
source_title="Homily 34, on Psalm 107"


[[commentary]]
quote='''
"Arise, O psaltery and harp." The Lord speaks to his own body: O psaltery and harp, you who descended into hell and lay there, arise and praise the Lord. And you see what he says. It is not he himself, who moves the harp and psaltery, that praises; but the harp and psaltery themselves, they themselves bless the Father. For he is God, and is blessed and praised by others; but his body, and the man whom he took upon himself, this itself praises the Lord. And so that you may know that the prophet speaks in the person of the Lord, and that I do not say this of myself, see what follows.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_034.html'
source_title="Homily 34, on Psalm 107"
