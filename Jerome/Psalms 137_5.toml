[[commentary]]
quote='''
If I forget you, Jerusalem, let my right hand be given over to forgetfulness. Therefore, because he has sinned and fallen, he calls to mind his former way of life and Jerusalem, and he sets before himself this resolve: that unless I shall always be mindful of you, and always hold you in mind, let my right hand be given over to forgetfulness — that is, my works. He did not say the left hand, but the right: for the left hand is always in forgetfulness. Do you wish, then, always to be in remembrance of the Lord? Do works of the right hand.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_048.html'
source_title="Homily 48, on Psalm 136"
