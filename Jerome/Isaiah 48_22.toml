[[commentary]]
quote='''
And so, they say, it is not about Christ, but about Cyrus that it is prophesied: There is no peace for the wicked, says the Lord. And it is understood to mean that perfect happiness will not exist except under Christ, which is reserved for the last time. Moreover, those who interpret this more truly and rightly refer it to the coming of the Savior, of whom it is said: He has sent me to announce good news to the poor, to proclaim freedom for prisoners. They understand it as an exhortation for those who proclaim the Gospel of the Lord Savior himself, so that we may come out of Babylon, that is, the confusion of this world, and flee from the Chaldeans, of whom it is often said: For the Lord has redeemed his servant Jacob with his precious blood and led him through the desert of the world and split the rock to give water. The Apostle speaks excellently: But the rock was Christ. … And so that it may not be thought that this preaching is directed to all the descendants of Jacob and not only to those who will believe through the Apostles, it is added and connected: There is no peace for the wicked, says the Lord, namely those who have remained in their original error; those who do not deserve to drink from the rock. Whose side pierced with a spear, flowed with water and blood, giving us baptism and martyrdom.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
