[[commentary]]
quote='''
The dwelling and plantation of the righteous will be eternal, so that the days of the life of my people may be compared to the days of the life of the tree, about which it is said in the Psalms: The righteous will flourish like a palm tree (Psalm 92:13), triumphing over their adversaries daily and displaying the emblem of victory. However, if we read it according to the Septuagint, we understand 'the days of the life of the tree,' which conveys more the meaning from the Hebrew rather than the words, and we understand it as the tree of life that was situated in paradise. So that Adam would not extend his hand to live, he was driven out of paradise (Genesis, III). In the custody of which, Cherubim, that is, a multitude of knowledge, and a fiery sword was placed to guard the way of the tree of life, so that Adam, who was in sin and not yet aware of his sins, would not eat from it and die from the death of impenitence, desperation, and pride. Solomon explains more clearly what this tree of life is, who, discussing the wisdom of God, says: The tree of life is for all who approach it, and who rely on it, as a firm foundation on the Lord (Proverbs III, 18); there is no doubt that it signifies the Word of God, who himself is the way and wisdom, and speaks of himself: I am the life (John XI, 25). … The works of the people of God will also not grow old, but will be renewed daily, so that they do not walk in the oldness of the letter, but in the newness of the spirit (Romans 7). … Does it not seem to you that their works grow old every day, who, forgetting the past, extend into the future? Both the old and the new are called the Testament: not that the old one perishes, but that the new one does not succeed it.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
