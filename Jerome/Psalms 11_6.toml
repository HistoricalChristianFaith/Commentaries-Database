[[commentary]]
quote='''
He shall rain snares upon sinners. There is no doubt but that the Lord does this even for the sake of the sinners themselves, so that those who were badly abusing their liberty, being ensnared in the Lord's snares, may walk in the right path as if under his bridle, and may be able to advance through him who says, "I am the way." Whence also fishermen are sent, and hunters, in Jeremiah, that they may hold with their nets the fish that wander and toss about in the depths, and may capture unto salvation the beasts straying about on all the mountains and hills. Therefore it is not, as many suppose, punishments that are promised to sinners from this little verse and from those that follow, but remedies. Fire, brimstone, and the spirit of storms is the portion of their cup. It is said to Babylon: "You have coals of fire, you shall sit upon them, and they shall be for a help to you." The brimstone rouses the fire of these coals into a flame; which flame is fanned by the rushing wind, by the whirlwind of the tempest, so that whatever is filthy in our gold, and whatever — according to the prophecy of Ezekiel — consuming the silver in us, the bronze, the tin, and the lead, may reduce us into gold. Whence also it is written in Isaiah: "The Lord shall wash away the filth of the sons and daughters of Zion, and shall cleanse the blood from their midst by the spirit of judgment and the spirit of burning." And in Malachi: "Behold, the Lord enters in like the fire of the smelting-furnace and like the herb of the fullers, and he shall sit smelting his people like gold and silver." The cup of sinners is full of fire, brimstone, and the spirit of tempest. "A cup of pure wine full of mixture," from which "all the sinners of the earth shall drink." I judge that from this cup of fire and brimstone Sodom had drunk, and therefore it is prophesied concerning her through Ezekiel: "Sodom shall be restored to her former state." And in the Gospel: "It shall be more tolerable for the land of the Sodomites." "For the Lord will not take vengeance twice upon the same thing." Whence also Lazarus, who had received his sins in his lifetime, and had drunk the cup of the Lord's fury, in the bosom of Abraham drinks that cup of which it is written: "I will take the cup of salvation, and I will call upon the name of the Lord." Jerusalem too had drunk the cup of punishments for her remedy; whence it is said to her: "Rise up, rise up, Jerusalem, you who have drunk the cup of ruin, the goblet of fury." And Jeremiah received this same cup of pure wine from the hand of the Lord, that he might give it to Jerusalem to drink, and to all the nations round about; who, drinking, vomit, and fall down, and, their pride broken, are laid low in repentance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_060.html'
source_title="Homily 60, on Psalm 10 (Alternate Series)"
