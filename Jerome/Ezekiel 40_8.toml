[[commentary]]
quote='''
He also measured the width of the threshold of the ten-cubit gate, which is a perfect number and is contained either in the Decalogue or in the sacraments of the four Gospels. Whoever begins with one, reaches four in such a way as to fill the number ten.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
