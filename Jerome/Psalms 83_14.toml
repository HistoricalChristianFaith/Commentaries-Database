[[commentary]]
quote='''
As fire that burns up a forest. He did not say "fruitful trees," but "forest," which has no fruit. If anyone, then, is stubble, and has no wheat; if anyone is a forest, and has no fruit — let this perish. As a flame burning up the mountains: let the pride in them perish.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"
