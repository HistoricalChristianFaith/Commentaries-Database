[[commentary]]
quote='''
Three, however, are indicated both in the animals and in the wheels, when they stood, when they walked, when they were lifted up, which both the animals and the wheels did in common. For neither could animals that were standing walk on wheels, nor could animals walking on the ground lift themselves on wheels, but of those actions, one was rest, one was motion, and elevation.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
