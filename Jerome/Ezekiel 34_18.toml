[[commentary]]
quote='''
But these things he spoke against the shepherds: now he speaks to the sheep, that is, to the people: and to the flock of both kinds of livestock, that is, the sheep and the goats: and not only to the sheep and goats, but also to the rams and the bucks, who are the leaders in the flocks, to whom he says: Was it not enough for you to feed on the good pastures of the Scriptures? But in addition, you were trampling on the remnants of your pastures with your feet. And while you were drinking the purest waters of God's teachings, you were disturbing the remaining waters with your feet, so that my people would eat and drink trampled pastures and tainted waters because of your fault, which in itself was good but became corrupted and violated. Indeed, this is what all heretics do, they pick apart the words of the Scriptures and, to the best of their ability, stain them. But even the ecclesiastical men who do not preserve the truth of the doctrines, but instead fabricate them from their own hearts, and hold their presumption as a teacher, are held captive by a similar error.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
