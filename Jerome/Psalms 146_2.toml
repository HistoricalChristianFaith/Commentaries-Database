[[commentary]]
quote='''
I will praise the Lord in my life. See what it says: it exhorts itself, and it itself answers. What does it say? It says to me, Praise the Lord, O my soul: I myself answer, I will praise the Lord in my life. At present I cannot praise, I am weighed down by sins. As often as I open my lips in the praises of God, so often does the consciousness of my sins glue them shut. I will praise the Lord in my life. Beautifully he said, I will praise, not I praise. When I shall have been with my Lord, then I will praise my Lord in my life. Now I am in death, I cannot praise. I will praise in my life. Our life is Christ: let us praise the Lord in life. I will sing to my God as long as I shall be. See what it says. When we do something righteously, we are: but when we sin, we cease to be. There are many things that might be said, but the discourse hastens to its end.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_055.html'
source_title="Homily 55, on Psalm 145"
