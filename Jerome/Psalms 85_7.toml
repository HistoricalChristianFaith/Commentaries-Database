[[commentary]]
quote='''
Show us, O Lord, Your mercy, and grant us Your salvation. That the Savior came down is a matter of God's mercy: the physician would not have come, had not very many been sick. Because very many were sick, therefore the physician came: because we were in need of mercy, therefore the Savior came.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_017.html'
source_title="Homily 17, on Psalm 84"


[[commentary]]
quote='''
Show us, O Lord, your mercy, and give us your salvation. What in Latin is called "salvation" (salutare), in Hebrew is called "Jesus." Therefore in Hebrew it is said thus: Show us, O Lord, your mercy, and give us your salvation: Unless you first be merciful toward the human race, your Jesus will not be given to us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_064.html'
source_title="Homily 64, on Psalm 84 (Alternate Series)"
