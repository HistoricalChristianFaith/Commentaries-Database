[[commentary]]
quote='''
But if he who handed over the innocent blood sinned, how much more did the Jews sin, who bought the innocent blood, and by offering a price, provoked the betrayal of the disciple? Let those who attempt to introduce different natures and say that Judas, the traitor, had an evil nature, and could not be saved by election, answer how an evil nature could have repented.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
