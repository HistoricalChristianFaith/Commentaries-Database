[[commentary]]
quote='''
Him who secretly disparaged his neighbor, this one I persecuted. So far ought we not to consent to the disparager, that we should even, as far as it lies in us, pursue such a person, providing for what is useful in both cases: that we neither listen willingly, nor permit him to sin. For so great is the distance between the fornicator and the disparager: that he who fornicates kills only himself, but he who disparages plunges to ruin both himself and the one who listens.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"


[[commentary]]
quote='''
With the proud of eye and the insatiable of heart, with such a one I did not eat. If anyone was proud or greedy, with such a one I did not eat at all.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"
