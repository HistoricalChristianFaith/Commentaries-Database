[[commentary]]
quote='''
Therefore Evangelic verity does not admit an oath, since the whole discourse of the faithful is instead of an oath.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25205.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
(Verse 37) Let your word be 'Yes, yes' or 'No, no'; anything more than this comes from evil. However, evangelical truth does not require an oath, since every faithful statement is considered as if made under oath.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
