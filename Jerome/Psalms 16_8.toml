[[commentary]]
quote='''
I foresaw the Lord in my sight always: for he is at my right hand, that I may not be moved. In place of what we read in Latin, "I foresaw," and what in Greek is written "proōrōmēn," it stands better in the Hebrew SEBETHI, which we may render "I set before myself." So that it means: I set the Lord before me always at my right hand, and I could be overthrown by no fraud of my enemies. And at the same time consider that it is in our power to set the Lord before our eyes. He who is just and is like the Savior places God at his right hand, and says, "Because he is at my right hand, that I may not be moved." But he places him at the right hand for this reason, that he has before his eyes the one whom he follows as he goes before. But he who is a sinner casts the word of the Lord behind his back, and the Lord becomes for him at the left hand. And when the devil has looked at him on the left of the sinner, he at once moves to the sinner's right, so as to possess the place of God: and that is fulfilled which is written of Judas: "Let the devil stand at his right hand." Why this is put not as in narration but as in prayer belongs to another place to discuss. For the Lord Savior, then, or through the Lord for his saints, God always stands at the right hand. But the just man has no left hand, and wherever he turns, "the angel of the Lord encamps round about those who fear him, and will deliver them." Do you wish to know that the just man has no left hand? When Moses, in the type of the cross, lifted both his hands to heaven, it is not written, "Aaron was at his right and Hur at his left," but that on this side stood Aaron and on that side Hur. In the book of Judges too, that leader Ehud, whose mystery is manifold and great, who had a sword upon his thigh, and had cut off desires, and had also run through with his blade his very fat and gross adversary, is for that reason written "amphoterodexios," that is, having both hands as a right hand, whom in Latin we may call "ambidextrous." Someone may object: If the just man has no left hand, how is Wisdom written to have both a right hand and a left? A diligent reader will very easily judge how great is the difference between the right hand of Wisdom and the left, when he has noticed what things are said to be in her right and what in her left. For it is said: "Length of eternity and years of life are in her right hand, but in her left hand riches and glory." You see eternal time and perpetual life placed in Wisdom's right hand; but the carnal things which pass away, which flee off while they are thought to be held—that is, riches and glory—placed in her left hand, according to that, that on the day of judgment some will stand at the right, and others at the left: the lambs, that is, and the saints at his right, but the goats and the sinners at his left. But perhaps an inquisitive reader will object this too: how we can assert that God stands at the right of the just man, and the devil at the left of the sinner, when concerning our Lord it is read in Zechariah, "And the devil was standing at his right hand to oppose him." Let him, then, who objects this read also what follows: that when the devil was standing at his right hand, Jesus had filthy garments. Rightly did he who had taken up our sins and was bearing our offenses have the devil at his right hand, not so much for himself as for the filthy garments. And at the same time let him consider that it is not said, "The devil was standing as victor and triumphing," but as still set in the contest and in the battle-line and in doubt—indeed, when he had not yet begun to fight. For it follows, "That he might oppose him." But the devil was opposing him, as we said, because he had filthy garments from our sins. But after he heard, "May the Lord who chose Jerusalem rebuke you," he did not stand at the right, but went behind his back and under his feet, and at once Jesus the great priest receives the ankle-length robe (poderis), and is clothed in white vesture, and, royal dignity being joined to him—that is, Zerubbabel being coupled with him—builds the Church, and constructs the spiritual Jerusalem.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15"
