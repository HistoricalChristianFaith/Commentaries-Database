[[commentary]]
quote='''
(Verse 38) Then some of the scribes and Pharisees answered him, saying, "Teacher, we want to see a sign from you." They demand a sign as if the signs they had seen were not enough. But in another Gospel it is explained more fully what they are asking for: "We want to see a sign from heaven" (Mark 8:11). They either wanted fire to come down from above like Elijah, or they wanted thunder to roar, lightning to flash, and rain to pour down in the summertime against the natural order of the place, so that they could not accuse Jesus of working these wonders in secret or attribute them to various natural phenomena. For those who calumny the things which they see with their eyes, hold with their hand, and experience through usefulness: what will you do with those things which have come from heaven? Surely you will respond that the magicians in Egypt performed many signs from heaven (Exod. VII).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
They require a sign of Him, as though what they had seen were not signs; and in another Evangelist what they required is more fully expressed, We would see of thee a sign from heaven. Either they would have fire from heaven as Elias did; or after the example of Samuel they would that in summer-time, contrary to the nature of the climate, thunder should be heard, lightnings gleam, and rain descend; as though they could not have spoken falsely even against such miracles, and said that they befel by reason of divers hidden motions in the air. For if thou cavillest against what thou not only beholdest with thine eyes, but feelest with thine hand, and reapest the benefit of, what wilt thou do in those things which come down from heaven. You might make answer, that in Egypt the magi also had given many signs from heaven.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
