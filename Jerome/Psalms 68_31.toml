[[commentary]]
quote='''
Legates shall come out of Egypt. Egypt is interpreted "darkness": out of the darkness of this world. Ethiopia shall stretch out her hand before to God. Because we who were black with sins and passions went before the Israelite people, and believe in the Savior: just as she who had a flow of blood went before the daughter of the ruler of the synagogue, and is healed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
