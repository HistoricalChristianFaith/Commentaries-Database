[[commentary]]
quote='''
This we have said in a general way: but let us speak also in particular of the inner man. The wheel stands upon the earth with only some small trace of contact, and it not only stands, but as it were runs on: it does not stand still, but touches and passes by: finally, when it is rolled, it always mounts up to higher things. So too the holy man, because he is in the body, has the necessity of thinking some things about earthly matters; and when he has come to food and clothing and the rest of such things, having food and clothing, with these he is content, touching the earth, and he hastens to higher things. In him who runs and hastens to higher things, in him is your word. We read also in the prophet: "Holy stones are rolled upon the earth." See what he said: Holy stones are rolled upon the earth. For because they are wheels, therefore they are rolled upon the earth and hasten to higher things. Do you wish to know of more wheels? We read: "And a wheel within a wheel"; we read in Ezekiel: "The wheels cling one to another." The two wheels are the new and the old testament. This wheel clings to that, and that to this. Yet see what is said in Ezekiel: "And wherever," it says, "the spirit was leading, thither the wheels also followed." This is said also in Ecclesiastes, at the consummation of the world: "And the wheel," it says, "shall be rolled over the cistern." There are many things that might be said about wheels: but the discourse hastens on to the rest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_010.html'
source_title="HOMILIES ON THE PSALMS 10"
