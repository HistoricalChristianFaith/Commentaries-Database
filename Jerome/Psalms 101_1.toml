[[commentary]]
quote='''
Mercy and judgment I will sing to you, O Lord. Let sinners hear of mercy, those who despair of their salvation, those who are doing penance; let those who scorn hear of judgment, who say: "The Lord is merciful, let us sin, he pardons us."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"
