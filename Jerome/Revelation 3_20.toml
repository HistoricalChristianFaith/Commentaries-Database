[[commentary]]
quote='''
To the terrible one among the kings of the earth. This is understood also according to the letter. But may God grant to us also that we may be kings of the earth: kings of the earth, that we may rule over our flesh. Whence the apostle also says: "Let not sin reign in your mortal body." And in another place it is written: "The heart of the king is in the hand of God." … Kings, then, are the saints, and the heart of these is in the hand of the Lord. Let us therefore also ask God that we may be kings, and may rule over our flesh, that it may be subject to us. Whence the apostle also says: "Therefore I chastise my body and bring it into servitude, lest by chance, while preaching to others, I myself should become a castaway." Let our soul rule, let the body serve: and at once Christ will come, and will dwell in us. Indeed, what does he himself say in the Gospel? "I will come," he says, "and will stand before the door, and will knock: and if anyone shall open to me, I will come in," he says, "and will sup with him." Every day Christ stands before the door of our breast, he desires to enter. Let us open, he enters into us, and he is our guest and our fellow-diner: that is, he both dwells in us and eats with us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_009.html'
source_title="Homily 9, on Psalm 75"
