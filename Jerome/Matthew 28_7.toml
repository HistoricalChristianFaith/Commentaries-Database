[[commentary]]
quote='''
Mystically; He shall go before you into Galilee, that is, into the wallowing stye of the Gentiles, where before was wandering and stumbling, and the foot had no firm and steady resting-place.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252028.html'
source_title="Catena Aurea by Aquinas"
