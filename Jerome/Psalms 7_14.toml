[[commentary]]
quote='''
'Behold, he hath been in labour with injustice: he hath conceived sorrow, and brought forth iniquity.' Such a mother, such a father is the devil: thus he conceives, thus he is in labour, thus he nurses, thus he exalts.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
