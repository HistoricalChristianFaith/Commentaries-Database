[[commentary]]
quote='''
Gradually, the glory of the Lord departed from Jerusalem. First leaving the temple, it stood in the courtyard or at the threshold of the house, and afterwards at the entrance of the Eastern Gate; finally, with its wings and accompanying wheels lifted up, it stood upon the mountain, which is towards the east of the city, no doubt signifying the Mount of Olives, from where the Savior ascended to the Father. And the glory of the Lord stood and went from the city of Jerusalem over the Mount of Olives, as a sign of resurrection and light, so that from there it might behold Jerusalem about to perish and be consumed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 3:11.22-23"

[[commentary]]
quote='''
And to this present day, in a wondrous manner, the glory of the Lord, which abandoned the temple, stands upon the Mount of Olives, shining forth in the sign of the cross, gazing upon the once-Jewish temple, dissolved into ashes and rubble.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 3:11.22-23"
