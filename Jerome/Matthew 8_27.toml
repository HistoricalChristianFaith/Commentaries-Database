[[commentary]]
quote='''
(Verse 27) And men marveled, saying: What manner of man is this, that even the winds and the sea obey him? Not the disciples, but the sailors and others who were in the boat, marveled. But if anyone wants to argue that those who marveled were disciples, we will answer that they were rightly called men who had not yet known the power of the Savior.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
But if any shall contend that it was the disciples who wondered, we shall answer they are rightly spoken of as 'the men,' seeing they had not yet learnt the power of the Saviour.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25208.html'
source_title="Catena Aurea by Aquinas"
