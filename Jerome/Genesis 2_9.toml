[[commentary]]
quote='''
But we shall combine spiritual things with spiritual things and read of the tree of life that was planted in Paradise, the tree of life and the tree of the knowledge of good and evil. This tree of life was planted in the Garden of Eden and in Eden there rose a river that separated into four branches... Likewise we read in Solomon—if one accepts that book as Solomon's, for he speaks there of wisdom (Christ the power of God and the wisdom of God)—then, as I was saying, where Solomon says: "She is a tree of life to those who grasp her," he is speaking of wisdom. Now, if wisdom is the tree of life, Wisdom itself, indeed, is Christ. You understand now that the man who is blessed and holy is compared to this tree, that is, he is compared to Wisdom. Consequently, you see, too, that the just man, that blessed man who has not followed in the counsel of the wicked—who has not done that but has done this—is like the tree that is planted near running water. He is, in other words, like Christ, inasmuch as He "raised us up together, and seated us together in heaven." You see, then, that we shall reign together with Christ in heaven; you see, too, that because this tree has been planted in the Garden of Eden, we have all been planted there together with Him.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2Fhomily_001.html'
source_title="Homily 1, on Psalm 1"
