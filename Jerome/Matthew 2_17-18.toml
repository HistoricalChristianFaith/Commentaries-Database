[[commentary]]
quote='''
(In Hierem. 31:15.) This passage of Jeremiah has been quoted by Matthew neither according to the Hebrew nor the LXX version. This shows that the Evangelists and Apostles did not follow any one's translation, but according to the Hebrew manner expressed in their own words what they had read in Hebrew.

By Ramah we need not suppose that the town of that name near Gibeah is meant; but take it as signifying 'high.' A voice was heard 'aloft,' that is, spread far and wide.'

Rachel's son was Benjamin, in which tribe Bethlehem is not situated. How then does Rachel weep for the children of Judah as if they were her own? We answer briefly. She was buried near Bethlehem in Ephrata, and was regarded as the mother, because her body was there entertained. Or, as the two tribes of Judah and Benjamin were contiguous, and Herod's command extended to the coasts of Bethlehem as well as to the town itself, we may suppose that many were slain in Benjamin.

This may be understood in two ways; either she thought them dead for all eternity, so that no consolation could comfort her; or, she desired not to receive any comfort for those who she knew had gone into life eternal.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"

[[commentary]]
quote='''
(Vers. 17 seqq.) Then was fulfilled what was spoken by the prophet Jeremiah, saying: A voice was heard in Ramah, sobbing and loud lamentation; Rachel weeping for her children, and she would not be consoled, since they are no more (Jerem. XXXI, 15). From Rachel was born Benjamin, in whose tribe Bethlehem is not (Genes. XXXV). Therefore, it is asked how Rachel mourns the sons of Judah, that is, Bethlehem, as if they were her own. We will answer briefly, because she is buried near Bethlehem in Ephrath, and from the maternal womb, she received the name of the mother's lodging. Whether because Judah and Benjamin were two joined tribes, and Herod had ordered not only the killing of children in Bethlehem, but also in all its borders. By the slaughter of Bethlehem, we understand that many from Benjamin were also killed. But she wept for her children, and she did not receive consolation, according to a twofold interpretation. Either because she considered them dead for eternity, or because she did not want to console herself about those whom she knew would survive. But what is said in Rama, let us not think that this is the name of a place, near Gabaa, but 'rama' is interpreted as 'an elevated place', so the meaning is: A voice was heard in an elevated place, that is, far and wide dispersed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'
