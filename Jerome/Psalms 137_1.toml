[[commentary]]
quote='''
By the rivers of Babylon, there we sat down and wept, when we remembered Sion. If someone is not sick, he does not know how much health is worth. And again, a lame man does not know how much he is worth who is sound of foot. Likewise the blind man does not know the one who sees. All this has been said because the psalm says: "By the rivers of Babylon, there we sat down and wept, when we remembered Sion." Babylon is interpreted as "confusion": therefore Babylon is this world. So the sinner who fell from paradise, and came into the valley of tears — that is, into Babylon, into this world — says (or rather the prophet, in the person of the one who fell, says): "By the rivers of Babylon." Now, the rivers of Babylon. When you see someone who is beautiful for a moment, and being sick he loses his beauty, and his flower withers — this passes like a river, and the waters that follow one another, coming and receding, perish, and again others rise up, and these too perish: so also in this world, because for a moment or for some short time we are either enriched, or we are strong, or we are beautiful, and after a little while it passes like water, and perishes. There, then, we sat down and wept, when we remembered Sion. Granted that it was indeed by our own fault that we fell from paradise, nevertheless we call to mind our former happiness, and we do not forget it. And that man who went down from Jerusalem to Jericho — which is interpreted "moon," that is, that which is always changing (and this is understood to mean this world) — fell among robbers, and the Samaritan takes him up, and heals him with oil and wine, mingling severity with mercy.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_048.html'
source_title="Homily 48, on Psalm 136"
