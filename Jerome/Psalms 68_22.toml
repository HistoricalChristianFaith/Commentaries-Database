[[commentary]]
quote='''
The Lord has said, From Basan I will turn back: that is, from the confusion of this world I will turn back the human race; that is, through my passion and cross, which these people think foolishness and confusion, I will turn back my people. Since indeed Basan is interpreted "confusion." I will turn back in the depths of the sea: that is, from the deep vices and sins of this world, from the commotion and the waves I will turn back my people.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
