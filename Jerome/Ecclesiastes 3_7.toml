[[commentary]]
quote='''
"A time for silence and a time for speaking." I think that the Pythagoreans, whose discipline is to remain silent for five years and afterwards to speak to learned men, took the origin of their decree from this. Let us learn therefore and so remain silent first, so that afterwards we open our mouths only to speak. Let us be silent for a set period and depend on the utterances of our teacher. Nothing seems right to us unless we learn that after much silence we are made into teachers by our pupils. Now though instead of the world slipping day by day into a far worse situation, we teach in churches what we do not know. And if by composing words or at the bidding of the devil, who is the patron of madness, we have aroused the applause of the common people, then we think we understand, (contrary to our conscience), what it is we were able to dissuade others from. We do not learn all the arts without a teacher, only those which are so common and easy that they don't require a tutor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ecclesiastes.html'
source_title="Commentary on Ecclesiastes"
