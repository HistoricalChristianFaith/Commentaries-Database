[[commentary]]
quote='''
Therefore, this is the man, and the son of the inner man, of whom it is frequently said in Leviticus: "Man, man": in him is blessedness, because he accomplishes the first and grasps these things: judgment, namely, and justice, and the salvation of the Lord, which is near, and is to be revealed to all nations: so that he not only does what is commanded, but holds fast with a strict hand; and keeps the Sabbath, lest he defile it. Now what the Sabbath is, which he commanded to be observed, the following verse shows: Observing his hands, lest he do any evil. It profits nothing to sit idly on the Sabbath, or to sleep, and to long for feasts. But if one does good, let them rest from evil, and let them have a constant Sabbath of injustice, that is, leisure, and let them only do those things which pertain to the salvation of the soul, and not engage in any servile work. For whoever commits sin, is a servant of sin. But we have been called to liberty, by which liberty Christ has given us, so that we may not labor for food that perishes; but by cleaving to the Lord, let us say with the Prophet: "It is good for me to cleave to God." Let us be of one spirit with Him, and let us observe the dedicated Sabbaths, so that we may not be of the six days in which the world was made.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
