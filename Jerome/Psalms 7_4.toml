[[commentary]]
quote='''
'If I have rendered evils to them that repaid me.' They say, 'Crucify, crucify such a one'; I say, 'Father, forgive them, for they know not what they do.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
