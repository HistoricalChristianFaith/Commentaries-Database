[[commentary]]
quote='''
It is fitting that the person who has been estranged from me, and has placed his thoughts in his heart, and the torment or punishment of his wickedness before his face, should receive witness that it is written in Isaiah: Walk in the light of your fire, and in the flame that you have kindled (Isaiah 50:11). For each person kindles the ardor of flames for himself, and prepares punishments, while he does not want to correct the errors of his mistaken heart with repentance, but remains in errors, deserving the burning of flames.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
