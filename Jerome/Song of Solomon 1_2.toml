[[commentary]]
quote='''
Mercy and truth have met each other: justice and peace have kissed. I see two things, which by coming together and meeting become one. Justice and peace have kissed. All this is fitted to the mystery of the Lord and Savior: this is the Son of God and of man, who is for us truth, mercy, peace, and justice, in whom the justice of the former people and the mercy of the latter are joined together into one peace. "For he himself," says the Apostle, "is our peace, who has made both one." This is the mystery which the Church desires, and cries out in the Song of Songs, saying, "Let him kiss me with the kiss of his mouth." This is the kiss of which the Apostle Paul says, "Greet one another with the kiss of peace."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_064.html'
source_title="HOMILIES ON THE PSALMS, ALTERNATE SERIES 64 (PSALM 84)"
