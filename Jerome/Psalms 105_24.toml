[[commentary]]
quote='''
And he increased his people exceedingly. For they went down into Egypt in seventy-five souls, and six hundred thousand went out of Egypt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_031.html'
source_title="Homily 31, on Psalm 104"
