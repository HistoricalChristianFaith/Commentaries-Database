[[commentary]]
quote='''
Let us understand this according to the letter of Moses and Aaron. Moses indeed was led out, and Aaron, but not led into the land of promise. Jesus succeeded him. See what is written. Moses died in the desert, Aaron died, Miriam died; and this is what is written in the prophet: "And I will strike," it says, "three shepherds in one month." They died: for they could not enter into the land of promise. They only saw over against the land of promise, and could not enter. The Jews saw the land of promise, and could not enter. For they died in the desert, and their corpses are in the wilderness, of those who died in the desert. We, the sons, under Jesus as leader, came to the Jordan, and entered into the land of promise, and came to Gilgal, and were a second time circumcised with a spiritual circumcision, and the reproach of Egypt was taken away from us. Then Jesus himself our leader holds the sword, and always goes before us, and fights for us, and conquers our adversaries, and for seven days we go around Jericho, that is, this world. We sing with the priestly trumpets, and we go around Jericho, that is, this world, and its walls fall, and we enter in, and we are the victors. Then we conquer the city of Ai: afterward we come to Jebus, we come to Hazor, we come to other cities; we conquer the adversaries whom under Moses we could not conquer.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_010.html'
source_title="HOMILIES ON THE PSALMS 10"
