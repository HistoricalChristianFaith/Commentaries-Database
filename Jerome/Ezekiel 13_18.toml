[[commentary]]
quote='''
Woe, therefore, to these heresies and doctrines which, promising rest, deceive people of every age and sex, in order to capture the souls of the wretched and lead me away from my people, while I am believed to love pleasure. And this not because of their barley, or the barley of the half-farsang, as we read in Hosea, but because of a handful of barley, by which animals are intoxicated, and a fragment of bread. Not whole bread or solid testimonies of the Scriptures, but those which have been broken, cut, and diminished by heretical depravity; so that they deceive and lead astray even the holy ones, and drag them to death; and they claim to give life to sinners with empty promises. Therefore, the merciful and compassionate God does not kill the prophetesses themselves, but he breaks their spindles, which like nets capture flying souls, so that once they are broken, they have the freedom to fly. And they would tear the veils or kerchiefs, in which the principal soul would recline, and with which the heads of the deceivers would be covered.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
