[[commentary]]
quote='''
'Judge me, O Lord, according to my justice, and according to my innocence upon me.' This David cannot say; this fits properly the Saviour, who did not sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
