[[commentary]]
quote='''
And they said to him: Thus says Hezekiah, not a king, not swollen with the name of empire: The day of tribulation, and the day of corruption, and the day of blasphemy: the day of our tribulation, the day of God's correction, the day of the enemies' blasphemy. And the likeness of a woman in labor and in distress, that she has come to labor and cannot give birth, nor can she say: We have conceived, O Lord, from fear of you, and we have grieved and given birth to the spirit of salvation. It follows: As how should the Lord your God hear the words of Rabsaces. For we do not dare to say O Lord, Lord of all, when such great wrath is upon us; but we say, your Lord. And we have this confidence of vengeance: because the living God is blasphemed by the worshipper of dead idols. And they reproached with the words, which the Lord your God heard: Therefore, lift up our prayer: not for all the people who have already perished, but for the remnants that are besieged.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
