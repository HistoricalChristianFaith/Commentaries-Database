[[commentary]]
quote='''
And to make what he said more serious, he follows it with the verse: 'And there was a wall between me and them'; so that a very short wall would separate the priestly sacrifices and the places of the sacraments of the body and blood of Christ. 'And they have polluted,' he says, 'my holy name, in the abominations which they have committed.' What is the advantage of dwelling near, and a wall, the wall of the Lord's altar, between our cell and the altar of the Lord, when in those things which we do in secret, and which it is even shameful to speak of, the name of the Lord is defiled and polluted?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
