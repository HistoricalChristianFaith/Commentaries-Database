[[commentary]]
quote='''
(Verse 9) Be astonished and amazed: fluctuate and waver, become drunk, not with wine, be moved, not with intoxication.

But all prophecy after the destruction of Jerusalem and the temple, that is, Ariel, is against the scribes and Pharisees, who, possessing the key of knowledge, do not enter themselves, nor do they allow others to enter. And it is commanded to them, that they should be amazed and astonished, rather according to the septuagint dissolution of the whole body and the excess of the mind, and that they should be moved and fluctuate: staggering not from wine or from strong drink, but from the spirit of sleep or of the Lord's compunction, so that understanding their evil, they may at some point repent, and say with the prophet: I am troubled in my weakness, while the thorn is being fastened to me (Ps. XXXI, 4).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title='Commentary on Isaiah'
