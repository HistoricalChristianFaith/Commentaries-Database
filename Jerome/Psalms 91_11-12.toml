[[commentary]]
quote='''
For he has given his angels charge concerning you, to guard you in all your ways. This passage the devil interpreted concerning the Lord. For at the time when he tempted the Lord, "If," he says, "you are the Son of God, cast yourself down. For it is written concerning you, that he has given his angels charge concerning you, to guard you in all your ways. In their hands they shall bear you up, lest perhaps you dash your foot against a stone." The devil said nothing more than this: For he has given his angels charge concerning you, that in their hands they may bear you up, lest perhaps you dash your foot against a stone. He left out the middle part. For here it is said, For he has given his angels charge concerning you, to guard you in all your ways. This he did not say, To guard you in all your ways: for he knew it was against himself. For the Lord could have answered him: If the Lord guards me in all my ways, then I am guarded from you too. He was silent, therefore, about what he knew was against himself, and set down what was in his favor.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="Homily 20, on Psalm 90"

[[commentary]]
quote='''
For He has given His angels charge concerning you, that they may keep you in all your ways. In their hands they shall carry you, lest ever you dash your foot against a stone. If ever the heretics interpret certain things from the Scriptures against us, we ought not to be disturbed: because the devil too used this testimony against the Lord and Savior, saying, "If you are the Son of God, cast yourself down; for it is written that He has given His angels charge concerning you," and the rest. The devil interprets the Scriptures like a devil: for he was applying this psalm to the person of the Lord, which is spoken not of the Lord, but of any just man. But I grant you, O devil, that it be written concerning the Lord Himself, "in their hands the angels shall carry you": why did you not say what follows, "Upon the asp and the basilisk you shall tread"? O the cunning of the crafty, shape-shifting enemy! What seemed to pertain to the frailty of the Savior and to the temptation of the man, he spoke; but what he understood to be against himself, with his ancient craftiness he kept silent. You err, O devil, and by your deceit you ensnare your very self. In this place your lie profits the Church: although you did this in order to tempt, you have shown that the children of God, all the just, are carried by the hands of the angels—that is, by their help—at the command and bidding of the Lord.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_068.html'
source_title="Homily 68, on Psalm 90 (Alternate Series)"
