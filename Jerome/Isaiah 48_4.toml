[[commentary]]
quote='''
Behold, you have heard all things that are to come, and yet you conceal the truth in silence. I do not speak of past events, in which my power has often been proven, such as when I led the people out of Egypt, drowned the Egyptians in the Red Sea, gave them the promised land, and subjected various nations to you. But I announce the new things that I am going to do against Babylon, so that the impudence of your mouth may be refuted, you who claim to know what you do not know. From the beginning you have been a transgressor of my commands; and from the womb you were called a transgressor by God, when you were delivered from Egypt, as if you were conceived in my womb, and brought up, and taught. You desired the head of the Egyptian bull, saying: These are your gods, O Israel, who brought you out of the land of Egypt. Therefore, not by your merit, but by my mercy, I have delayed my anger, so that you would not be completely destroyed, and for the sake of the praise of my name, I will restrain you, so that you will follow me like a beast and an unwilling horse with reins.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
