[[commentary]]
quote='''
And they will no longer be a prey to demonic nations; nor will the beasts of the earth devour those of whom we have spoken: but they will dwell confidently without any fear, according to the above explanation. And I will raise up for them a named offspring, or a planting of peace, which is spoken of in the Gospel: I am the true vine (John 15:1). And they will no longer be diminished by hunger on the earth. Therefore, hunger is on earth: the hunger to hear the word of God, which, under a good shepherd and a named branch, and celebrated in the speech of all, and the planting of peace, will never be on earth; nor will they be subjected any longer to the reproaches of the nations, saying: Where is their God (Psalm 113, 10)?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
