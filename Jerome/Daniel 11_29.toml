[[commentary]]
quote='''
"At the time appointed he shall return and shall come to the South; but the latter time shall not be like the former." And then two years later he gathered an army against Ptolemy and came to the South.
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title="St. Jerome, Commentary on Daniel, CHAPTER ELEVEN"
