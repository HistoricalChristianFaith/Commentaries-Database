[[commentary]]
quote='''
The tents of the Edomites and the Ishmaelites. Since once we have begun, leaving behind the lowliness of the literal history, to raise our understanding to a higher manner of the spiritual meaning's exposition... For the history is a simple one, in which the Jewish people speaks against the other nations that were fighting against it. But whatever was done, was done as a type of us. Israel was attacked, and its victory profited us. Let us see, then, who they are that fight against the Church. The tents of the Edomites. The Edomites are interpreted as "earthly." Beautifully did he say, tents: for they have no foundations nor houses, but tents, seats forever unstable. And of the Edomites and the Ishmaelites. The Ishmaelites are interpreted as "as if hearing." Beautifully did he say, as if hearing: for they do not hear God, but pass on by.

Moab and the Hagarenes, Gebal and Ammon. Each single name holds its single sacred meaning: for as many words, so many mysteries. Moab, which is interpreted, "from the father": for they are not in the father, but from the father, because they have forsaken their former father. And the Hagarenes, who are interpreted "proselytes" and "newcomers," who were formerly citizens and afterward became strangers: for they are not of the household, but are aliens, seeing that they assail the house of the father.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_062.html'
source_title="Homily 62, on Psalm 82 (Alternate Series)"
