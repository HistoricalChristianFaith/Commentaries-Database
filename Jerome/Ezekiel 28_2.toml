[[commentary]]
quote='''
And you will no longer say, 'I am God,' but, having learned through your downfall, you will recognize that you are a human, not God. But if we wish to call the prince of Tyre the same power to whom the city itself, or the province, was given by God, let us accept that testimony. I said, 'You are gods, and all of you are sons of the Most High. But you will die like men, and fall like one of the princes' (Psalm 82:7). For power was given to them to govern the provinces, like judges appointed by the Emperor. However, they, forgetting their honor and being driven by a tyrannical mindset, rose up against their king and Lord. Dispersed throughout the whole world, they took on the names of idols and, filled with pride, fell into the judgment and snare of the devil. About this, Jesus spoke in the Gospel: I saw Satan falling like lightning from heaven (Luke 10:18).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
