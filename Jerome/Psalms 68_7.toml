[[commentary]]
quote='''
O God, when you went out in the sight of your people. This is according to the history, when God went before his people as they went out of Egypt. When you passed through in the desert. God does not linger in the desert, but passes through.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
