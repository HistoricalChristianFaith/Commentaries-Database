[[commentary]]
quote='''
And when, he says, I had fallen, the majesty of the Lord entered the temple through the gate facing east, and immediately the spirit lifted me up (for I could not go on lying down), and he led me into the court of annihilation, for I had fallen outside; and behold, I saw the glory of the God of Israel coming from the east, and I saw the glory of the Lord filling his house, and I heard a voice speaking to me from inside the house. What this is spoken about, the Scripture does not narrate, unless perhaps that of the Apostle: And I heard unspeakable words, that it is not lawful for a man to utter.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
