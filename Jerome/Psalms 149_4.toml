[[commentary]]
quote='''
For the Lord is well pleased with his people, and he will exalt the meek in salvation. "Blessed are the meek, for they shall possess the earth." If, therefore, it is said there, Blessed are the meek — that is, the gentle — for they shall possess the earth; and here it is said, And he will exalt the meek in salvation; and these meek shall possess the earth by inheritance: therefore this earth is not below, but is above. For what does he say? He will exalt the meek in salvation. For if these meek were to possess the earth that is below, he would not say, He will exalt.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_059.html'
source_title="Homily 59, on Psalm 149"
