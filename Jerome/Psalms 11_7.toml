[[commentary]]
quote='''
For the Lord is just and has loved justices; his countenance has beheld equity. For which the Hebrew has: "For the Lord is just and loves justice; their faces shall behold equity." The Lord, he says, is just for the causes stated above: because he both, leaving the just man in the present age to temptations, does not punish but proves him, and his soul hates the impious man who loves injustice. For it is one thing to sin overcome by the necessity of the flesh, another to pass over into the disposition of the sinner. Whence also such men, whose heart is impenitent, the soul of God hates. And because he rains snares upon sinners, and gives them to drink the goblet of torments which they deserve, God himself, being just, loves justices. For just as there is one true God, even if there are many gods who are so called by participation in him, and there is one only-begotten Son of God, while others are called so by adoption; so also there is one true justice, as is written in the beginning of the Proverbs, but from communication of it the Lord loves many things called justices. But in that he says, His countenance — that is, God's — has beheld equity, so that the sense is, He judges the things that are right; in the Hebrew, according to that understanding, it is said: Those very ones who shall be judged, both the just and the impious and sinners, shall behold the justice of God, and their faces shall contemplate the equity of the Lord, and they shall say, "You are just, O Lord, and your judgment is right."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_060.html'
source_title="Homily 60, on Psalm 10 (Alternate Series)"
