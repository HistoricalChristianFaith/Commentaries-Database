[[commentary]]
quote='''
Let God arise, and let his enemies be scattered. This psalm is understood both in a special sense and in a general sense. In the special sense, of the Lord himself, that he should rise from the dead and scatter his enemies — that is, the devil and his army, or the Jews. But in the general sense, whenever we are in tribulation and distress, and we say, "Arise, why do you sleep, O Lord? and help us"; just as the apostles too, in the little boat, wake the Lord who was sleeping, saying: "Master, save us, we perish." And let those who hate him flee from before his face. He did not say, let them perish, but, let them flee: because sinners cannot stand in the sight of God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
