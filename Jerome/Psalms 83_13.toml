[[commentary]]
quote='''
O my God, make them as a wheel. See the clemency of the prophet: he does not pray against them, but for them. See what he says. O my God — you who are the God of all, but properly my God: O my God, make them as a wheel. Those who have, as it were, a foundation in malice, let them have no foundation, but let them totter, and not stand firm in malice. As stubble before the face of the wind. As stubble: not as wheat, but as stubble. What he says is this: if there is among them anything that is stubble and chaff, let it perish.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"
