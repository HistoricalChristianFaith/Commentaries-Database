[[commentary]]
quote='''
If someone asks why the book of Prophecies, which is written in the volumes of Kings and Chronicles, seems mixed, let them consider that the prophecy of history is linked, both concerning the liberation of the city and the destruction of Assyria, and concerning the return of the sun with ten and fifteen years elapsed, which is both prophecy and history.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
