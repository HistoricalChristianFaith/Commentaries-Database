[[commentary]]
quote='''
Praise the Lord, O Jerusalem; praise your God, O Zion. Just now we heard the holy presbyter preaching that, because of its transgression of the law, the Jewish people has been forsaken; and how is it that now it is said, Praise the Lord, O Jerusalem; praise your God, O Zion? Praise the Lord, O Jerusalem. Jerusalem, "vision of peace." Praise your God, O Zion. Zion is interpreted "watchtower." You see, then, what he says: Praise the Lord, O Jerusalem. Wherever there is a vision of peace, wherever there is contemplation of God, there let there be praise of God. Praise the Lord, then, O Church, when you have begun to believe in him and to have peace, and have begun to see peace: this is Jerusalem, "vision of peace." You who were formerly of the idols have been made the servant of God: praise, then, your God. But when you have begun already to have knowledge, and to be a watchtower — this is Zion — praise the Lord: that is, you praise Jerusalem, you praise Zion, you soul of the Church, you Church. Let not the heretics praise, let not the synagogue praise, but you praise.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_057.html'
source_title="Homily 57, on Psalm 147"
