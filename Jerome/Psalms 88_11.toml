[[commentary]]
quote='''
"Shall anyone declare in the sepulchre," and so forth. He shall not praise thee who is buried in the riches of the world, nor he who dwells in the ruin of sin.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_065.html'
source_title="Homily 65, on Psalm 87 (Alternate Series)"
