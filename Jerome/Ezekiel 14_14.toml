[[commentary]]
quote='''
Noah, because of the impending flood that would cleanse the earth, could not prevent or delay it as the whole earth had corrupted the ways of the Lord (Genesis 6:7). However, he had preserved his sons who might have possessed the same virtue, as a seed for the human race. Daniel also mitigated the imminent captivity of the people of Judah with no tears (Dan. 1). But Job, not because of sins, but because of testing, did not save neither his house nor his children (Job 1).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
