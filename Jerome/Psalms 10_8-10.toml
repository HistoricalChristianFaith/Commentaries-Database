[[commentary]]
quote='''
And lastly, against the devil: 'God is not before his eyes, he sits in ambush with the rich.' Unhappy the rich, with whom the devil sits. Finally, see what is said of the devil: 'He sits in ambush with the rich.' For whoever is rich, unless he has stripped the poor man, cannot be rich: for this reason he said, 'He sits in ambush with the rich.' Whenever the rich persecute Christians, let us say: 'The devil sits in ambush with the rich.' He lies in wait to seize the poor man, to seize the poor man while he draws him in: 'in his snare he will humble him.' This is the impious man, this is the devil. The poor man not only in riches, but also in spirit: 'for blessed are the poor in spirit.' 'In his snare he will humble.' Whom? The poor man is understood. See what is said. 'He will humble'; not, 'he will slay': but when he has humbled the poor man, the humbling of the poor man is the ruin of the devil. For what follows? 'He will bow himself down and fall, while he has dominion over the poor.' Does not the devil seem to you, in persecution, when he would kill Christians, when he would slay the martyrs, to be slain in the very act of slaying? 'He will bow himself down and fall, while he shall have dominion over the poor.' The martyr who is slain goes to heaven; that slayer is humbled and falls.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_004.html'
source_title="Homily 4, on Psalm 9"
