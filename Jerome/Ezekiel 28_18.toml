[[commentary]]
quote='''
Therefore, he defiled his sanctification which he had when he dwelt on the mountain and conversed among the burning stones. It follows: I will bring fire in the midst of you which shall devour you. This fire was kindled in the heart of the king of Tyre by him whose arrows are kindled, as it is written: All those who commit adultery are like an oven, their hearts (Hosea). About this fire, Isaiah also speaks: Walk in the light of your fire, and in the flame you have kindled (Isaiah 50), so that when you go out, it may devour the possessor, according to what is written in the same Isaiah: It consumed like the grass the fuel (Isaiah 5). On that day the mountains and hills and forests will be extinguished, and it will devour from soul to flesh. This fire, which is called alien, Nadab and Abihu offered to the altar of the Lord, and for this reason they were consumed by divine fire (Leviticus 10). Hence Moses says: This is the word that the Lord spoke: In those who approach me, I will sanctify myself. But the sanctification of God is the punishment of sinners. After this it is said: And I will turn you into ashes, so that all that you have built will be consumed by the fire of your guilty conscience. When you should have rested on the Sabbath, and should not have done any servile work, you gathered wood on the Sabbath so that you would have something to fuel the fire in your heart. He will also destroy all evil works, reducing them to ashes, so that the harmful fire may be completely extinguished, so that all may see and marvel at the destruction of the king of Tyre, and that it has become nothing, not for many centuries, but in one instant, or certainly forever, so that what is written may be fulfilled: I will not spare you, and I will not have pity.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
