[[commentary]]
quote='''
"And the galleys shall come upon him, and the Romans, and he shall be dealt a heavy blow." Or, as another has rendered it, "...and they shall threaten him with attack." And while he was besieging his two nephews, the brothers of Ptolemy and sons of Cleopatra, at Alexandria, some Roman envoys arrived on the scene, one of whom was Marcus Popilius Laenas. And when he had found Antiochus standing on the shore and had conveyed the senatorial decree to him by which he was ordered to withdraw from those who were friends of the Roman people and to content himself with his own domain, then Antiochus delayed his reply in order to consult with his friends. But Laenas is said to have made a circle in the sand with the staff which he held in his hand, and to have drawn it around the king, saying, "The senate and people of Rome give order for you to make answer in this very spot as to what your decision is." At these words Antiochus was greatly alarmed and said, "If this is the good pleasure of the senate and people of Rome, then I must withdraw." And so he immediately set his army in motion. But he is said to have been dealt a heavy blow, not that he was killed but that he lost all of his proud prestige. As for the Antichrist, there is no question but what he is going to fight against the holy covenant, and that when he first makes war against the king of Egypt, he shall straightway be frightened off by the assistance of the Romans. But these events were typically prefigured under Antiochus Epiphanes, so that this abominable king who persecuted God's people foreshadows the Antichrist, who is to persecute the people of Christ. And so there are many of our viewpoint who think that Domitius Nero was the Antichrist because of his outstanding savagery and depravity.

"And he shall return and shall be angry at the covenant of the sanctuary, and he shall succeed; and he shall return and take thought concerning (Vulgate: against) those who have abandoned the covenant of the sanctuary." We read of these matters at greater length in the exploits of the Maccabees (1 Maccabees 1:20-64), where we learn that after the Romans expelled him from Egypt, he came in anger against the covenant of the sanctuary and was welcomed by those who had forsaken the law of God and taken part in the religious rites of the Gentiles. But this is to be more amply fulfilled under the Antichrist, for he shall become angered at the covenant of God and devise plans against those whom he wishes to forsake the law of God. And so Aquila has rendered in a more significant way: "And he shall devise plans to have the compact of the sanctuary abandoned."
'''
source_url='https://www.ccel.org/ccel/pearse/morefathers/files/jerome_daniel_02_text.htm'
source_title="St. Jerome, Commentary on Daniel, CHAPTER ELEVEN"
