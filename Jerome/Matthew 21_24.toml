[[commentary]]
quote='''
(Verse 24) But Jesus, answering, said to them: I will also ask you one question, which if you tell me, I will also tell you by what authority I do these things. This is what is commonly said: A bad knot of a tree, a bad nail or wedge must be driven in. The Lord could have refuted the calumny of the tempters with an open response, but He wisely asks a question, so that they themselves, either by silence or by their answer, may be condemned.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
The Lord could have confuted the calumny of His tempters by a simple answer, but He put a question to them of such skilful contrivance, that they must be condemned either by their silence or their knowledge; Jesus answered and said unto them, I also will ask you one question.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252021.html'
source_title="Catena Aurea by Aquinas"
