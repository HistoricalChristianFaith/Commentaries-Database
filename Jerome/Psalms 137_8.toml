[[commentary]]
quote='''
Wretched daughter of Babylon. The daughter of Babylon is the soul which is always in motion and in confusion, and has no stability, but is in vices and in sins — which is truly wretched. "Blessed is he who shall repay you your recompense which you have repaid to us." Blessed is he who shall repay her what she herself has done. For example: she cast me out of paradise; I, through abstinence, bring her back there. She deceived me into fornication; I, through chastity, bring her back into Jerusalem, and out of vices into virtue. Therefore I do this not as an enemy, but as a friend.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_048.html'
source_title="Homily 48, on Psalm 136"
