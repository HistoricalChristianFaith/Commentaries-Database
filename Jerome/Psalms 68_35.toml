[[commentary]]
quote='''
God is wonderful in his holy ones. In this God is wonderful, because he so loved the human race that he works signs through his holy ones. In these God is more wonderful than in the rest of the creatures.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
