[[commentary]]
quote='''
"Then I said to myself concerning men: God has chosen them out, but only to see that they themselves are as beasts."  I considered the eloquence of
the sons of man, whom God chose. Only
this eloquence, he says, God wanted to be between men and beasts, since we
speak, they are mute; we possess the will for conversation, they are stupefied
with silence. And though we only differ
from beasts in language, though it is shown to us, how we are like the beasts -
weak in body.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ecclesiastes.html'
source_title='Commentary on Ecclesiastes'
