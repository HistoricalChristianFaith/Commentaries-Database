[[commentary]]
quote='''
Therefore, he gives these precepts to the evangelizers of truth, to whom he had said before: Freely you have received, freely give. For if they preach in such a way that they do not accept payment, the possession of gold, silver, and money is superfluous. For if they had gold and silver, they seemed to preach not for the sake of the salvation of souls, but for the sake of profit. Nor is there money in their purses. He who cuts off wealth, almost cuts off the necessities of life, as the apostolic teachers of true religion, who taught that all things are governed by the providence of God, showed themselves to think nothing of tomorrow.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
