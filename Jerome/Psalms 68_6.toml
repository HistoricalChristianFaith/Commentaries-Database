[[commentary]]
quote='''
God makes those of one manner to dwell in a house: those who are of one manner, and are not changed. Since indeed the just man is not changed, because once for all he has resolved to remain in righteousness. But the sinner is changed: "for the fool shall be changed like the moon." In the Hebrew, however, it has "The Lord makes monks to dwell in a house": that is, in those in whom sin does not dwell alongside. Who leads out the bound ones in strength. God himself by his own power leads out those who are bound by the devil in sins: like that woman in the Gospel, who had been bound eighteen years by the devil. Likewise those who provoke him, who dwell in the tombs. God is by nature sweet: but those who lead him to bitterness are sinners, and they make God bitter for themselves. He does not change his own nature, but the sinners themselves make God bitter for themselves. Who dwell in the tombs. "Woe to you, scribes and Pharisees, for you are like whitewashed tombs." Just as the holy man is a temple of God, so the sinner makes himself a tomb.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
