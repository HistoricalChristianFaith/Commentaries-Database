[[commentary]]
quote='''
An inscription of a title, to David himself. In place of this the fifth edition put the Hebrew word itself, "MACTHAM David," which Aquila translated as "of the humble and simple David," and Symmachus as "of the humble and unstained David." And Aquila himself again, in the fifty-fifth psalm and in the rest as far as the fifty-ninth, rendered this very thing so as to say "of the humble and perfect David." From this we understand that one word signifies both "simple" and "unstained" and "perfect," yet in such a way that humility is always set before each of them; for among the Hebrews it is compounded of two whole words, so that, just as we say "almighty" (omnipotens), enclosing two words in one utterance, so also the word MACTHAM in the syllable which is called MAC shows humility without ambiguity, while in the following one which is called THAM it signifies the three things we mentioned above. Now there are six psalms, unless we are mistaken, which are headed by this title: the fifteenth psalm, and the fifty-fifth, and the fifty-sixth, and the fifty-seventh, and the fifty-eighth, and the fifty-ninth. All of these refer to the dispensation and passion of our Lord and Savior; and although in their headings they have among themselves certain things added, or removed, or varied, yet in this one phrase they agree, namely, in "the inscription of a title," which here stands alone by itself only in the fifteenth psalm. For in the remaining five certain historical notices too are prefixed, so that the prophecy concerning the Lord Savior might be shown not only in word but also in deed. And I think there are six psalms containing this mystery and headed with such a title for this reason, that the Savior, crucified for all on the sixth day of the world, dying and rising again, left us this as it were the title of his victory; so that we may inscribe upon our hearts these psalms which are marked with these headings, and press into them the words of God, and that our minds may be mindful of the Lord's death; so that, just as Jacob made a monument for Rachel and it remains to this day, so we may mark in our heart the memorial and remembrance of his passion. Nor indeed let that be thought contrary to our exposition which the Lord commanded in the Law: "You shall not make for yourself a monument, things which the Lord your God hates"; but to the singular number "a monument" he joined a plural of the neuter gender, saying, "things which the Lord your God hates," that is, you shall not do such works as remain for your condemnation forever. For these things the Lord your God hates. If perchance, through our negligence, he who oversows tares should erect such monuments in the land of promise, the clear-sighted ones (dioratikoi), namely the teachers, command the children of Israel to overthrow them and undermine them and banish them from the land that flows with milk and honey. Such a monument Absalom too built for himself, an empty tomb, which remains to this day for the disgrace and testimony of the parricide. Into such a monument Lot's wife too was turned, because she wished to look not at what lay ahead but behind her back. After this it is asked why the Seventy translators wished to translate otherwise than it stands in the Hebrew and in the other editions. This can be understood from many other passages too, but especially from the heading of the ninth psalm. For whereas among the Hebrews it is headed LAMANASSE ALMUTH LABEN, which Symmachus translates "the triumph of the youth of the son," but the fifth edition "the triumph of the flowering youth of the son," the Seventy translators, unwilling to disclose so openly to King Ptolemy and to the Gentiles the passion and resurrection of the Savior, translated "Unto the end, for the hidden things of the son"; and by the very title showing that certain hidden things lay concealed which they were unwilling to translate. So now too, because humility, simplicity, spotlessness, and perfection pointed not to a man (for there is no one who would dare to head himself with such a title) but to the Son of God, therefore they chose to translate "stelographia" (stēlographian), that is, a thing worthy to be marked with an inscription; so that we might understand one thing shut up in the title, and another uttered aloud in the word. Now a title is also placed for brave men upon their tombs in memory of their former courage, and for those who fell for their fatherland, and wherever there are trophies and victories, and where public laws are inscribed. The interpretation of all of which is easier when applied to the person of the Lord Savior.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15"

[[commentary]]
quote='''
Preserve me, O Lord, for I have hoped in you; I said to the Lord: You are my God, for you have no need of my goods. If one apostle were to interpret this psalm, if two, the authority even of one and of two would be great. But now (a thing written of no other of the psalms) we have found concerning this in the Acts of the Apostles that Peter, together with the apostles of Christ—when Matthias had already been taken in as one of the twelve in place of Judas—expounding it lifted up his voice, and after many words said: "Men and brethren, let it be permitted to speak boldly to you concerning the patriarch David, that he both died and was buried, and his tomb is among us to this very day. Therefore, being a prophet, and knowing that God had sworn to him with an oath that from the fruit of his loins one would sit upon his throne, foreseeing this he spoke of the resurrection of Christ, that he was neither left in hell, nor did his flesh see corruption. This Jesus God has raised up, of which we all are witnesses." Since then all the apostles alike have referred this psalm to the Lord Savior, we, who wish to be Christians, must surely follow their opinion. And no wonder that he who was equal to God and humbled himself, taking the form of a servant, now speaks with the words of a servant. Hence in the very title he is inscribed as humble and simple and unstained and perfect; because he who needed no one's help humbled himself so far as to entreat the Lord on our behalf, on behalf of the Church, that is, on behalf of his own body. And in very truth it is great humility—for God to pray for men, for the Lord to pray for servants, for the Holy One to pray for sinners: so that he not only says that he himself is clothed and given drink and visited in his servants, but even, when they have prayed and have been heard, confesses that he himself has prayed and been heard. Therefore, taking on a human body, he saw the hostile powers, he saw too the army of the devil, drawn up in a wedge-formation against him, doing battle; and therefore he now says: Preserve me, O Lord; for unless you preserve my body, the Church which hopes in you, they who guard her keep watch in vain.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15"
