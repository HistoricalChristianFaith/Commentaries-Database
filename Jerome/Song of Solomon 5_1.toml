[[commentary]]
quote='''
Indeed, it is written in another place: "Come my sister, my bride." Lest in the fact that it had said, bride, you should understand something shameful, sister is joined, so that all shameful love may be excluded. Come my sister: for the love is holy, and therefore I call you sister. And my bride: therefore I call you bride, so that I may have a wife, and from you make many sons, many sons like clusters from a vine. Just as a vine has various clusters, and there is indeed one root, but it spreads its tendrils far and wide, here and there, and the tendrils themselves have their own fruits, and in the fruits themselves are the clusters; so also from wisdom, which is our wife, provided that we never let her go, many clusters are born, that is, very many virtues, holy thoughts, splendid works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_042.html'
source_title="HOMILIES ON THE PSALMS 42 (PSALM 127)"

[[commentary]]
quote='''
We read also in the Song of Songs: "Come, brothers, drink and be inebriated." And wine which gladdens the heart of man. This fleshly wine does not gladden the heart of man, but overwhelms it, and makes it mad. Indeed, it is written that those who are powerful should not drink wine. The apostle too writes that we ought not to drink wine and eat flesh. Again it is said to us: And wine gladdens the heart of man. But it speaks of a spiritual wine, which, if anyone drinks it, he is immediately inebriated. All of you, that you might let go of your possessions and your parents and your children and your kinfolk, drank wine, and being inebriated for Christ began to be mad. Does it not seem to you to be drunkenness, does it not seem to you to be spiritual madness, to despise delights, to seek out squalor, to flee the cities, to pursue the deserts, to know no affections, to ignore the nearness of the flesh, and to know Christ alone?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_042.html'
source_title="HOMILIES ON THE PSALMS 42 (PSALM 127)"
