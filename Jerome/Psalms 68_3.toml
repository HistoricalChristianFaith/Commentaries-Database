[[commentary]]
quote='''
And let the just feast. Those who remain in their righteousness, who have no vices, let them be delighted in the Lord. Let them exult in the sight of God, and let them be delighted with gladness. It is great confidence, to exult in the sight of the Lord. Just as a steward who has badly handled and lost the substance entrusted to him by his master fears his master's presence; so also he who has managed it well exults in his master's presence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
