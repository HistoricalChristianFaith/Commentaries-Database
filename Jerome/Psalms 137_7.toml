[[commentary]]
quote='''
Remember, O Lord, the children of Edom, in the day of Jerusalem. Edom is interpreted as "earthly" and "bloody." Who then is this, if not the devil? See, then, what he says. This is spoken in the person of Adam: "Lord, remember how the serpent, the devil — who is understood to be Nebuchadnezzar — deceived me and dragged me off, and cast me out of paradise. Remember and repay him, and let him feel the punishment which he by his own malice brought upon me, dragging me and leading me into Babylon and to the Assyrians."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_048.html'
source_title="Homily 48, on Psalm 136"
