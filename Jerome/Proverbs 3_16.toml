[[commentary]]
quote='''
Someone may object: If the just man has no left hand, how is Wisdom written to have both a right hand and a left? A diligent reader will very easily judge how great is the difference between the right hand of Wisdom and the left, when he has noticed what things are said to be in her right and what in her left. For it is said: "Length of eternity and years of life are in her right hand, but in her left hand riches and glory." You see eternal time and perpetual life placed in Wisdom's right hand; but the carnal things which pass away, which flee off while they are thought to be held—that is, riches and glory—placed in her left hand, according to that, that on the day of judgment some will stand at the right, and others at the left: the lambs, that is, and the saints at his right, but the goats and the sinners at his left.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="HOMILIES ON THE PSALMS, ALTERNATE SERIES 61 (PSALM 15)"
