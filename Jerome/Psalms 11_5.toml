[[commentary]]
quote='''
The Lord questions the just and the impious: but he who loves iniquity hates his own soul. For which it is better written in the Hebrew: "The Lord tests the just, but the impious and the one who loves iniquity — his soul hates him." So that the sense is joined with the foregoing: In vain are the adversaries prepared, that they may shoot in the dark the upright of heart, and so on; because the Lord is a just judge, and nothing can be hidden from him, and he does both: that he both prove his just ones by tempting them, and hate those who are impious. The impious and the one who loves iniquity — his soul hates him: that is, he hates them with his whole heart and his whole soul. But let us understand "soul" in accordance with the eyes and eyelids, according to that: "My soul hates your new moons and feast days and sabbaths." Furthermore, according to those who say, with the Septuagint, The Lord questions the just and the impious, the sense is far different: that he himself is the judge of the just and the impious, and that the impious are to be judged in this, that by loving iniquity they hate their own soul. And in a certain way the last part of a syllogism is knit together, which is called the conclusion. For although a man may deny that he hates his own soul, yet from the fact that he loves iniquity, he is convicted of hating it. As Solomon also says in the Proverbs: "He who rejects discipline hates himself." But if he who loves iniquity hates his own soul, contrariwise he who loves justice loves his own soul, according to that: "He who possesses prudence loves himself." Whence also the Savior says: "He who loves me keeps my commandments." For he himself is justice. Nor indeed is it to be thought, according to the Septuagint interpreters, that something contrary is now said — The Lord questions the just and the impious — to that which is written in the first psalm, "Therefore the impious shall not rise again in the judgment": because just as there is a difference among the just, so also among the impious; and just as the just, differing among themselves, possess mansions, so also the impious who are perfect in malice and iniquity and who fight with their whole mind against the Lord shall not rise again in the judgment; but other impious ones, who are sometimes understood as sinners, because they are of lesser malice, are reserved for God's judgment.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_060.html'
source_title="Homily 60, on Psalm 10 (Alternate Series)"
