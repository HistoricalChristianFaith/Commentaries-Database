[[commentary]]
quote='''
And Melchizedek, king of Salem, brought forth bread and wine; and he was the priest of the most high God. And he blessed him. Because our work, either the Hebrew Questions or the Collection of Traditions, is once for all, therefore let us infer what the Hebrews think of this. They say that he is the son of Shem, Noah's son; and by calculating the years of his life, they show that he lived until Isaac, and that all the firstborn of Noah, until Aaron assumed the priesthood, were priests. Furthermore, Jerusalem is called the king of Salem, which was previously called Salem. However, blessed Apostle to the Hebrews, mentioning one without a father or mother, refers to Christ, and through Christ to the Church of the Gentiles. For all the glory of the head is referred to the members, because he, having a foreskin, blessed the circumcised Abraham, and in Abraham the Levites, and through the Levites Aaron: from whom later the priesthood. From this he wants to gather that the priesthood of the Church, having a foreskin, blessed the synagogue with the circumcised priesthood. But as he says: You are a priest forever, according to the order of Melchizedek: our mystery is signified in the word of the order: not by offering irrational victims through Aaron, but by offering bread and wine: that is, the body and blood of the Lord Jesus.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHebrew%2520Questions%2520on%2520Genesis.html'
source_title="HEBREW QUESTIONS ON GENESIS 14.18-19"
