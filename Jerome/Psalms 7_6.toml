[[commentary]]
quote='''
'Arise, O Lord, in thy wrath.' Since they did not perceive thee through kindnesses, let them perceive thee through anger. 'Be exalted in the borders of my enemies.' He prays for his enemies, that he may be exalted in the borders of his enemies. For when they have ceased to be enemies, then thou, O Lord, wilt be exalted in them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_003.html'
source_title="Homily 3, on Psalm 7"
