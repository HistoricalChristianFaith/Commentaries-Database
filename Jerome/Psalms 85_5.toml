[[commentary]]
quote='''
Will you be angry with us forever? or will you extend your wrath from generation to generation? Your wrath has profited unto salvation: for this reason you were angry with the former people, that you might have mercy on ours.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_064.html'
source_title="Homily 64, on Psalm 84 (Alternate Series)"
