[[commentary]]
quote='''
Whence in what follows it is written: The Lord is in his holy temple, the Lord's seat is in heaven. By the seat — that is, the throne of God — let us, according to the custom of the Scriptures, understand the kingdom, as in that place: "God shall give him the throne of David his father." And elsewhere: "With justice is the throne of dominion prepared." And: "When a just king shall sit upon the throne." The Lord is in his holy temple, the Lord's seat is in heaven. Before the bodily temple was built by Solomon, the prophet knows the spiritual temple of the Lord and his throne in heaven. Whereupon it is asked, how it is said elsewhere, "Heaven is my throne." When the throne of the Lord is in heaven, his throne is encompassed by heaven, and the throne of the Lord is in a part of heaven; when heaven is the throne of the Lord, the whole heaven is turned into the throne of the Lord. From which, according to the ἀναγωγήν (higher spiritual sense, anagōgē), the Lord dwelling in his holy temple — that is, in the soul of the believer — dwells either in a part of it or in the whole. When we are still imperfect, and there is in us both something good and something evil, God dwells only in a part of our soul, that is, in heaven. But when we are consummate and perfect, we are wholly turned into a dwelling-place of God, and we are made heaven, his throne. But the temple of God, properly, is understood either as our Lord and Savior, who says, "I am in the Father and the Father in me": or as that man who was assumed by the Savior, or generally the Church, or specially each one of the saints. His eyes look upon the poor man, his eyelids question the sons of men. Against those who understand the wrath and fury of God simply, let us set forth the eyelids and eyes of the Lord. For if they understand those things ἀνθρωποπαθῶς (after the manner of human passions, anthrōpopathōs), they will be compelled to take these things likewise. But if it is absurd to place eyes and eyelids in the almighty Lord, they will equally be compelled to seek some spiritual interpretation for wrath also and fury. For it is exceedingly unfitting not to understand both those and these alike, either spiritually or carnally. Whence in this place it is to be perceived that the just man does not dread the assault of the adversaries, having God as his helper, who beholds and sees all things, and does not permit his poor man to be deceived by their frauds and wounded by their darts. The poor man: that one of whom it is said above, "To you the poor man is left." And at the same time it is to be observed, that God opens his eyes, bringing an open judgment, to the lowly with help, though he be one and poor, and always watches over him with his regard. But where he is judge, and those who are judged are sons of men (for they do not deserve to be called sons of God), there he does not look with his eyes, but examines with his eyelids, in a manner half-closing them and dissembling, and unwilling to know what he knows. "For if you, Lord, will mark iniquity, who shall endure?" Varro relates that eyelids (palpebrae) are so called from the fact that they move and quiver (palpitent), that is, ὀνοματοποιῶς (by onomatopoeia, onomatopoiōs).
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_060.html'
source_title="Homily 60, on Psalm 10 (Alternate Series)"
