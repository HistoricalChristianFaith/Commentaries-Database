[[commentary]]
quote='''
"But to those who love God all things work together for good." Job, the holy man, was tempted: he lost his sons and daughters, his house collapsed, he lost everything, he lost all things suddenly — neither father nor master; for nothing sound remained to him in his body, except only his tongue with which he might blaspheme. See the tempter, the devil. "From the sole," he says, "of his foot to the crown of his head he struck him with a most grievous wound" — that is, with elephantiasis. From it worms flowed over his whole body, and gore, and rottenness. His tongue alone he kept intact for him, that he might be able to blaspheme his God. "In all these things Job did not sin with his lips." See the greatness of the temptation, see the greatness of his virtue. See and consider that the apostle's saying is fulfilled: But to those who love God all things work together for good. At the time when he was losing his possessions, when he was losing his sons, the things that had happened did indeed seem to him to be adverse: but because he loved the Lord, those evils, which he brings upon him, work together to his good. Those worms of his body were preparing for him the crown of heaven. Before he was tempted, God had never spoken to him: but after he was tempted, God came to him, and speaks familiarly, as a friend with his friend. Let the plagues come, every kind of punishment, so long as after the plagues Christ arrives.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_006.html'
source_title="Homily 6, on Psalm 66"
