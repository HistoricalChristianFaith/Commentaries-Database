[[commentary]]
quote='''
Therefore, as I have said above, we must apply our faith to what has been explained by the Lord. And those things which have been left unspoken and neglected by our understanding must be briefly touched upon. Understand that the men who are asleep are the leaders of the Churches. Do not welcome servants of the household of the father except for the angels, who daily see the Father's face (Matt. XVIII). But the devil is called the enemy of man because he stopped being God. And it is written of him in the ninth psalm: Arise, O Lord, let not man prevail (Psalm IX, 20). Therefore, let the one who is placed over the Church not sleep, lest through his negligence the enemy sows weeds, that is, the dogmas of heretics. But what is said, 'Lest while you gather up the tares, you root up also the wheat together with them,' gives place to repentance, and we are warned not to cut off our brother immediately, because it may happen that he who is corrupt in his understanding today, may tomorrow begin to be sound and to defend the truth.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
