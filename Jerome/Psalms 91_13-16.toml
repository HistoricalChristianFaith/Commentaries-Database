[[commentary]]
quote='''
Truly the devil, like a devil, interprets concerning the Savior what is not concerning the Savior. For if the whole psalm is about the Savior, as you interpret it, O devil, then it is about him too what is said: I will protect him, because he has known my name. That is, I the Father will protect my Son. Let me interpret it, devil, as you understand it. Let us see whether the sense holds. I will protect him, because he has known my name: that is, I the Father my Son. He shall cry to me, and I will hear him: that is, on the day of the cross. I am with him in tribulation, I will rescue him and glorify him: that is, I will make him rise again. With length of days I will fill him. That is, he shall live forever. And let us understand this concerning the Son of God, With length of days I will fill him. But this that follows, how does it hold with respect to the Savior, And I will show him my salvation? The salvation of God is the Son of God. If therefore it is said about the Son, how can it hold? For the salvation of God is the Son of God. You see, therefore, that you have interpreted badly, O devil. But grant that it be interpreted as you say. You said, For he has given his angels charge concerning you, that in their hands they may bear you up, lest perhaps you dash your foot against a stone. Say also what follows. Why are you silent? Upon the asp and the basilisk you shall walk, and you shall trample under foot the lion and the dragon: Christ our Lord, who lives and reigns forever and ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_020.html'
source_title="Homily 20, on Psalm 90"
