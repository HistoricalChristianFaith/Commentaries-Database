[[commentary]]
quote='''
Their judges have been swallowed up, joined to the rock. As elsewhere he says: 'Blessed is he who shall take hold of and dash your little ones against the rock.' 'And the rock was Christ.' Now the little ones are the lesser and small thoughts before they grow up. And now these very heretics, although through Aristotle and Plato they seem to despise the simplicity of the Church, yet when they have come to the Scriptures they are at once swallowed up by the rock, that is, by Christ, and are converted to him. For 'swallowing up' is said for victory, as the Apostle says: 'Death is swallowed up in victory. Where, O death, is your victory? where, O hell, is your sting?' Now he calls that very swallowing up a victory, the victory which it had in swallowing.

They shall hear my words, for they have prevailed. The Lord himself says: Those who have come to me have been overcome, and have been delighted by my words, and have been converted to me in my Church.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_051.html'
source_title="Homily 51, on Psalm 140"
