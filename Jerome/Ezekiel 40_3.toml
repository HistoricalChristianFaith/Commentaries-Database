[[commentary]]
quote='''
There was also a line made of twine in his hand, as it is written in Zechariah, that he had a measuring line to measure the width and length of the city. And the workers of masonry, either the angels who served under God's command, or Moses, and all the prophets and apostles who build the city of God, and are helpers or ministers of the Lord's will. Hence, the Apostle Paul also said: We are God's field, God's building. And what follows: And the pen of measurement in his hand signifies prophetic grace, of which it is written in the forty-fourth psalm: My tongue is the pen of a swift scribe.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 12:40.1-4"


[[commentary]]
quote='''
This man spoke to the prophet, in whose hand was a cord, and whose appearance was like bronze, and he held a reed in his hand. He spoke to Ezekiel, a true architect, whom Paul the apostle imitated, saying: Like a wise architect, I have laid the foundation. But he calls him the wise architect, to distinguish him from the foolish one, who is called an unworthy shepherd in Zechariah.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="COMMENTARY ON EZEKIEL 12:40.1-4"
