[[commentary]]
quote='''
I said to the Lord: You are my God. Unless a man is holy, he cannot say this little verse; he who is not reigned over by sin, he it is who says, 'The Lord is my portion.'
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_050.html'
source_title="Homily 50, on Psalm 139"
