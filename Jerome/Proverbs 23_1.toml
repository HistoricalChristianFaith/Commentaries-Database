[[commentary]]
quote='''
Divine Scripture commands that, when we have been invited to a rich man's banquet, we should with understanding put forth our hand to the dishes. And so for us too the banquet of Scriptures has been set out as a rich man's feast. We have come into a meadow; it has very many flowers: here the rose is red, there the lilies gleam white, there are flowers of every kind. Our soul is drawn this way and that, to gather from wherever it may the more beautiful flowers. If we pick the rose, we leave the lily behind; if we take the lily, the violets are still left for us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_011.html'
source_title="HOMILIES ON THE PSALMS 11 (PSALM 77)"
