[[commentary]]
quote='''
He shall send forth his word, and shall melt them. Of that one of whom he had said, He sends forth his word to the earth: He shall send forth his word. Who shall send it forth? God the Father. And the Word was with God, and the Word was God. We have named the Father, we have named the Son: we cannot believe in a twofold number, unless the Trinity be completed. His spirit shall blow, and the waters shall flow. You see that where the Father and the Word of God are, at once the Holy Spirit is there too. If anyone, then, has grown cold and died, God will send his word, and will melt him. May the Lord grant that our cold too may be melted, that that crystal may be dissolved and become soft. He shall send forth his word, and shall melt them. Give me a sinner who does not look to God, who has no warmth, but is wholly cold, and dead: if at the word of God he is pierced with compunction, and begins to do penance, and the hardest things of his heart are softened, at that time is fulfilled, He shall send forth his word, and shall melt them. The Father sends forth, the Word is sent, the Holy Spirit is joined. His spirit shall blow. Fervent in spirit. The cold is not driven out except by the warmth of the Holy Spirit. Where are the Eunomians, the Arians, where are the Macedonians, who say: We do not number the Holy Spirit with the Father and the Son? God the Father sends, the Word is sent: and yet there is no full healing, unless the Holy Spirit shall have blown. His spirit shall blow, and the waters shall flow. The waters. What before was hard shall become soft. He who before could give righteousness to no one, this man is now a disciple. But since we have spoken at length, and the things that follow are plain, let us pray the Lord that our hardness too may soften, that our sins too may be purged, that we may be made as it were fire, that the cold of the devil, whatever there is of it in our hearts, may be driven out, that we may grow warm with the Holy Spirit. For there is also an evil warmth. All the adulterers, their hearts are like an oven. But that warmth is driven out by the warmth of the Holy Spirit. To whom be glory unto the ages of ages. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_057.html'
source_title="Homily 57, on Psalm 147"
