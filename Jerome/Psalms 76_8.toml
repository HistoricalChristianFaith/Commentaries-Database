[[commentary]]
quote='''
From heaven thou didst make judgment to be heard. Thou didst speak from heaven, all the people heard and trembled: and yet they did not believe in thee. The earth feared and was still. But Israel neither feared nor was still.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_009.html'
source_title="Homily 9, on Psalm 75"
