[[commentary]]
quote='''
(Vers. 1, 2.) For they do not wash their hands when they eat bread. Hands, that is, works, are to be washed, not of the body for sure, but of the soul, so that the word of God may be made in them.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
But the hands that are to be washed are the acts not of the body, but of the mind; that the word of God may be done in them.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252015.html'
source_title="Catena Aurea by Aquinas"
