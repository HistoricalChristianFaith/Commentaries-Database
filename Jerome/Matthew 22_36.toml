[[commentary]]
quote='''
Or he enquires not for the sake of the commands, but which is the first and great commandment, that seeing all that God commands is great, he may have occasion to cavil whatever the answer be.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252022.html'
source_title="Catena Aurea by Aquinas"
