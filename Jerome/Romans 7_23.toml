[[commentary]]
quote='''
If Paul the apostle, the vessel of election, chastised his body and brought it into subjection, lest, having preached to others, he himself should be found a castaway: if he says 'But I see another law resisting the law of my mind and leading me into captivity,' and afterward says 'Unhappy man that I am, who shall deliver me from the body of this death?' — if he fears the snares of the body, are we secure?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_041.html'
source_title="Homily 41, on Psalm 119"
