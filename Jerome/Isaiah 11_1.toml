[[commentary]]
quote='''
Chapter XI - Verses 1, 2. And there shall come forth a rod out of the root of Jesse, and a flower shall rise up out of his root. And the spirit of the Lord shall rest upon him: the spirit of wisdom, and of understanding, the spirit of counsel, and of fortitude, the spirit of knowledge, and of godliness. And he shall be filled with the spirit of the fear of the Lord. Up to the beginning of the Vision or the weight of Babylon, which Isaiah the son of Amos saw, all this prophecy is about Christ, which we wish to explain in parts so as not to confuse the reader's memory by presenting and discussing it all at once. The rod and the flower from the root of Jesse are interpreted as the Lord Himself of the Jews: so that in the rod, the power of the reigning one may be shown, and in the flower, the beauty. But we understand the rod from the root of Jesse to be the holy Virgin Mary, who had no fruit cohering to herself; of whom we also read above: Behold, a virgin shall conceive and bear a son (Isa. VII, 14). And the flower is the Lord and Savior, who says in the Song of Solomon: I am the flower of the field and the lily of the valleys (Cant. II, 1). Concerning the root which alone the LXX translators turned into Hebrew script, it has (in Geza) which Aquila and Symmachus and Theodotio interpreted as κορμὸν, that is, trunk. And concerning the flower which is called (in Hebrew) Neser, they translated it as germ to show that much later after the Babylonian captivity, with no one from the line of David possessing the glory of the ancient kingdom, Christ arose as if from the trunk of Mary, and from Mary Christ was born. That which in the Gospel of Matthew everyone seeks the words of the Ecclesiastics, and does not find where it is written, 'He shall be called a Nazarene' (Matt. 2:23), the learned Hebrews think is taken from this place. But it should be known that here 'Nazarene' is written with the letter 'Sade', which the Latin language does not express the sound and property of between 'z' and 's'. It is, in fact, a strident sound and is barely pronounced with the tongue against the teeth: from which the city of Zion is also written.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html#tocuniq138'
source_title="Commentary on Isaiah 11:1-2"


[[commentary]]
quote='''
The land that before brought forth thorns, hears in Isaiah the blessing: "A shoot shall sprout from the stump of Jesse, and from his roots a bud shall blossom." "You have turned away the captivity of Jacob." The Lord has come, therefore, to proclaim pardon to captives. There is a parallel to this in another passage of Scripture: "He led captivity captive," that is, we, who in former times had been captured by the devil to perdition, now are led away by the Savior to salvation.
'''
source_url=''
source_title="HOMILIES ON THE PSALMS, ALTERNATE SERIES, PSALM 84"
