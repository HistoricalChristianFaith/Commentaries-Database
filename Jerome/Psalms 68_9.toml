[[commentary]]
quote='''
You will set apart a voluntary rain, O God, for your inheritance. He speaks of the law, which was given through Moses. And it was weakened, but you have perfected it. The law was weakened, because no one was able to fulfill it except the Lord, who said: "I have not come to abolish the law, but to fulfill it." And according to the apostle: "For what was impossible for the law, in that it was weakened, God sent his own Son," and the rest.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_007.html'
source_title="Homily 7, on Psalm 67"
