[[commentary]]
quote='''
The cords have fallen to me in excellent places: for indeed my inheritance is excellent to me. In place of that one people, I have possessed the whole world as my inheritance; and from the world, not just anyone, but the strong. For this is what "in excellent places" means, which in Greek is said "among the strong": according to that, "The Lord is my strength and my refuge and my deliverer," and in another place, "The Lord is my strength and my praise." If, then, anyone is excellent and strong, he is of the Lord's inheritance. Hence that Theophilus, "friend" or "lover of God," because he was such as to request that a Gospel be written to him, is called "kratistos," that is, excellent, strong: which was more simply translated by the Latins as "most excellent Theophilus." Further, the measuring-cord is used in the division of fields, and wherever possessions are distributed, or a census of earthly revenues is conducted, land is divided, as also in Joshua the son of Nun. An angel holding a measuring-cord is shown to the prophet who is about to build Jerusalem, so that first of all he may measure the extent of the city by reason and order, and thereafter build up what has been measured. And in the canticle of Deuteronomy we read: "The Lord's portion became his people Jacob, the cord of his inheritance Israel." In the second book of Kingdoms too, when David overcame the Moabites, the Scripture records two cords set apart for putting to death, and two for keeping alive. But what it means that of the Moabites some are set apart for death, others for life, Orpah shows, and Ruth: of whom the one, turned back to the idols and to her ancient homeland, is destined for death; the other, following her mother-in-law—whose name means "sweet"—says, "Your people is my people, and your God is my God." And so we too, if we wish to be of the Lord's inheritance and of his cord, let us be strong and robust, and let us say: "I can do all things in Christ who has strengthened me." Let there be nothing weak in us, nothing feeble, nothing that the heir would not deign to receive. Since indeed Christ glories in his saints, and says: For indeed my inheritance is excellent to me. Do you wish to know that the Savior's inheritance was excellent? Consider Peter, look at Paul, all the apostles and saints, since indeed they believed throughout the whole world, and you will see the inheritance of Christ, and an excellent one. In place of which Aquila translated: "For indeed my inheritance is most beautiful to me." So that it may be that which is said in the Song of Songs: "You are wholly beautiful, my love, and there is no spot in you." And again: "Behold, you are fair, my near one, behold, you are fair, your eyes are doves." You who are fair and strong, when you have become like him of whom it is sung, "In your beauty and your comeliness," you will hear from the Bridegroom: "Forget your people and your father's house, and the King will desire your beauty."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15"
