[[commentary]]
quote='''
(Verse 19.) Neither will anyone hear his voice in the streets. For the way is broad and spacious that leads to destruction, and many enter through it (Mat. 7:13). Those who do not hear the voice of the Savior are many, because they are not on the narrow path, but on the spacious one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'


[[commentary]]
quote='''
For the way is broad and wide which leads to destruction, and many walk in it; and being many, they will not hear the voice of the Saviour, because they are not in the narrow but in the broad way.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252012.html'
source_title="Catena Aurea by Aquinas"
