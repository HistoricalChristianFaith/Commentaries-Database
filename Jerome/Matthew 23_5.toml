[[commentary]]
quote='''
(Verse 6.) For they enlarge their phylacteries and magnify their fringes. They love the places of honor at banquets, the chief seats in the synagogues, greetings in the marketplaces, and to be called Rabbi by men. Woe to us, miserable ones, to whom the vices of the Pharisees have been passed on. When the Lord gave the commandments of the Law through Moses, He added at the end: Bind them upon your hand, and they shall be before your eyes (Deut. VI, 8). And the meaning is: Let my precepts be in your hand, so that they may be fulfilled in action: let them be before your eyes, so that day and night you may meditate on them. The Pharisees, by misinterpreting this, wrote the Ten Commandments of Moses on scrolls, folding them up and binding them on their foreheads, making them like a crown on their heads so that they would always be before their eyes. This is still done today by the Indians, Persians, and Babylonians, and those who do this are considered religious among the people. Moses also commanded (Num. XV) that the Israelite people should make blue tassels on the corners of their garments, to distinguish them as the chosen people, just as circumcision is a sign for the Jewish people's bodies, so their clothing should have some distinction. Superstitious teachers, seeking popular applause, and pursuing gains from women, made large phylacteries and bound the sharpest thorns in them so that, as they walked or sat, they would be punctured and, as it were, be drawn by this admonition to the duties of the Lord and to the ministries of his service. Therefore, because the Lord had said that they do all their works to be seen by men, which he had accused in general, he now divides them into parts. Those little tablets of the Decalogue were called phylacteries, which whoever had them would have as a safeguard and a reminder of themselves: the Pharisees not understanding that these things should be carried in the heart, not on the body; otherwise, even cabinets and chests have books, but do not have knowledge of God. This is done among us by superstitious women, in little Gospels, and in the wood of the cross, and in similar things (which indeed they have zeal for God, but not according to knowledge). (Romans 10) Even today, they strain out a gnat and swallow a camel (Below, in the same place). Such was the fringe, small and short, from the Law and the precepts, which was touched by the woman who was flowing with blood, in the cloak of the Lord (Luke 8, above). But she was not moved by the superstitious thorns of the Pharisees; rather, she was healed by touching it. And when they excessively enlarge their phylacteries and make large fringes, seeking glory from men, they are accused in the rest, why they seek the first places at dinners, and the first seats in synagogues; and in public they cut throats and glory; and they are called Rabbi by men, which is said in Latin language, teacher. ...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"


[[commentary]]
quote='''
(Verse 5.) All their works they do to be seen by others. Therefore, whoever does anything to be seen by others, is a scribe and a Pharisee.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"

[[commentary]]
quote='''
For the Lord, when He had given the commandments of the Law through Moses, added at the end, And thou shalt bind them for a sign upon thine hand, and they shall be ever before thine eyes; (Deut. 6:8.) the meaning of which is, Let my precepts be in thine hand so as to be fulfilled in thy works; let them be before thine eyes so as that thou shalt meditate upon them day and night. This the Pharisees misinterpreting, wrote on parchments the Decalogue of Moses, that is, the Ten Commandments, and folding them up, tied them on their forehead, so making them a crown for their head, that they should be always before their eyes. Moses had in another place given command that they should make fringes of blue in the borders of their garments, to distinguish the people of Israel (Numb. 15:39.); that as in their bodies circumcision, so in their garments the fringe, might discriminate the Jewish nation. But these superstitious teachers, catching at popular favour, and making gain of silly women, made broad hems, and fastened them with sharp pins, that as they walked or sat they might be pricked, and by such monitors be recalled to the duties of God's ministry. This embroidery then of the Decalogue they called phylacteries, that is, conservatories, because those who wore them, wore them for their own protection and security. So little did the Pharisees understand that they were to be worn on the heart and not on the body; for in equal degree may cases and chests be said to have books, which assuredly have not the knowledge of God.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252023.html'
source_title="Catena Aurea by Aquinas"
