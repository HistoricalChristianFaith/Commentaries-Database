[[commentary]]
quote='''
In the mornings I slew all the sinners of the earth. Well did he say, the sinners of the earth: for sinners are earthly. This is what he means, that the promptings of the devil, which he was suggesting to me, I cast out of my heart, and did not take up. For when evil thoughts are cast out, the demons are slain. The Jews, hearing this verse, and following the letter that kills, and desiring to shed blood, if anyone has transgressed against the law, put him to death. Since indeed they are not content with the slaying of the prophets: but they even crucified the Lord himself. That I might destroy out of the city of the Lord all who work iniquity. Would that we too may destroy out of the city of the Lord those who work iniquity. The city of the Lord is the church of the saints, the congregation of the just. That I might destroy: that is, I will reprove and rebuke him who sins, that he may do penance, and destroy iniquity out of his heart. For he did not say, that he may be cast out.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_027.html'
source_title="Homily 27, on Psalm 100"
