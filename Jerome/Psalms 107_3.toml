[[commentary]]
quote='''
"From the rising of the sun and from its setting, from the north and the sea." He seems indeed to have named four climes: the east, the west, the south, and the north — that is, the four climes of the world. But the psalm does not contain it so. For here it has: "from the rising of the sun and from its setting" — behold, two climes; "from the north," that is, from the region of the septentrion — behold, three climes. "And the sea." The sea, surely, is in the west. So then see that he named the west twice, and the south not even once. Why then did he name three climes, and refuse to mention one? We read in Habakkuk: "God will come from the south, and the Holy One from the shady mountain." "God will come from the south." It is said of the Savior: because God was born in the south. For by the situation of Jerusalem, Bethlehem is set to the south: therefore it is said, "God will come from the south." But if "God will come from the south," how is it now said, "From the rising of the sun and from its setting, from the north"? The south wind, the auster and the notus, is passed over in silence. "From the rising of the sun and from its setting." "Amen, amen, I say to you, that many will come from the east and the west, and will recline in the bosom of Abraham: but the sons of this generation will be far off." "From the rising of the sun and from its setting" — the foreigners, surely. "And from the north": "The north wind is the most hardened wind, but by name it is called the right hand"; "From the north," he says, "evils will blaze forth over the earth." The sea is read of in Numbers and in Exodus and in all holy Scripture; and wherever you hear "the sea," according to the climes it is always understood as the west. For by the situation of Jerusalem this great sea, as it is called, is in the west. See therefore the mystery of the Scriptures: in this place the west is named twice, and the notus not even once. Why is this said? Because in this psalm the people of the Jews is not written as to be called, but only that of the Gentiles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_033.html'
source_title="Homily 33, on Psalm 106"
