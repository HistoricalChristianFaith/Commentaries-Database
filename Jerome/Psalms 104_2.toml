[[commentary]]
quote='''
Stretching out the heaven like a skin. This means that from the beginning God stretched out the heaven, just as when someone opens a scroll and again rolls it back up, as is written elsewhere: "And the heaven shall be rolled up like a scroll."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"
