[[commentary]]
quote='''
Let the nations be glad and rejoice. Because they have been freed from the captivity of the devil; because those who before were bent down to adore idols, wood and stones, now with upright face look upon the heavens. Because you judge the peoples in equity. Wherever there is equity and judgment, there is not gladness, but the dread of sinners. And how did he say, May God have mercy on us and bless us; and now he says, Let the nations be glad and rejoice, because you judge the peoples in equity? It seems to be contradictory. For if they need mercy, how are they glad and rejoice, because you judge the peoples in equity? For wherever there is mercy, there is no judgment; but where there is judgment and the equity of judgment, there mercy is far off. But this is the sense. Let the nations be glad and rejoice: why should they be glad? Because you judge the peoples in equity: because you in no way show favoritism to one nation, but are the God of all. Not the Jews alone are pleasing to you, but the whole world is yours. Someone may say: You are doing violence to Scripture; it did not speak in this sense. Let Scripture interpret itself, which says, Because you judge the peoples in equity. Which peoples? And you direct the nations upon earth. The nations which before did not walk with upright foot, the nations which before did not walk on an upright path, you made them to walk in your way: that we might know your way upon earth, that we might walk in the way, not in the ways, that through one way we might come to you, from whom the way is born. For we do not go to the Father except through the Son. Someone may say: This is the doctrine of the Arians. So, then, one comes to the Father through the Son? I say this: that through the image we go to the face, and in the light we see the light, in the Son we see the Father. It is the mystery and the dispensation that speaks. But if anyone thinks it blasphemous that we have called the Son the way, and that through the way we go as it were to God, let us see what this very way says. "No one comes to me, unless my Father draws him to me." So, just as the Son leads to the Father, so also the Father leads to the Son. These are human words. But both the Son leads to the Father, and the Father leads to the Son: and there is one nature, one substance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_006.html'
source_title="Homily 6, on Psalm 66"
