[[commentary]]
quote='''
He who avenges himself is not worthy of the vengeance of the Lord.
'''
source_url='https://www.newadvent.org/fathers/27103.htm'
source_title="Against Rufinus 3.2"

[[commentary]]
quote='''
We are not to revile and condemn our enemy, as the world does, but rather we are to correct him and lead him to repentance so that, being won over by our good deeds, he may be softened by the fire of charity and may cease to be an enemy.
'''
source_url='https://www.newadvent.org/fathers/30111.htm'
source_title="Against the Pelagians 1.30"


[[commentary]]
quote='''
Therefore the apostle too says that we should give our enemies to eat and to drink. And what does he say? "Doing this," he says, "you heap coals of fire upon his head." Someone may say: Enemies do this; do I therefore do good to my adversary in order to heap coals of fire upon his head? But something else is meant. If he has done you evil, and you have done him good, you heap coals of fire upon his head: that is, you cleanse his vices, and you boil away his malice, so that he may turn to repentance.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_041.html'
source_title="Homily 41, on Psalm 119"
