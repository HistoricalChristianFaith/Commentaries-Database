[[commentary]]
quote='''
But those who have confidence not in their own strength, but in God, and always await His mercy, let them change their strength and go from virtue to virtue: and let them take wings like eagles, and hear: Your youth will be renewed like the eagle's (Psalm 103:5); let them run to the Lord, and not grow weary of desiring Him; let them walk, and never grow faint. We have frequently said that the eagles' old age is rejuvenated by a change of feathers, and only those eagles can look upon the sun's rays and behold the splendor of its shining with sparkling eyes: and they should prove their noble offspring, by means of this experiment. And so even the saints are made young again, and with an immortal body, they do not feel the toil of mortals, but are caught up in the clouds to meet Christ, and never go hungry according to the LXX, because they have the Lord himself as food.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
