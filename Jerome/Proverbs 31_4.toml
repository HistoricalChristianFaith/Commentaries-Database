[[commentary]]
quote='''
We read in another place: "And wine gladdens the heart of man." We read also in the Song of Songs: "Come, brothers, drink and be inebriated." And wine which gladdens the heart of man. This fleshly wine does not gladden the heart of man, but overwhelms it, and makes it mad. Indeed, it is written that those who are powerful should not drink wine. The apostle too writes that we ought not to drink wine and eat flesh. Again it is said to us: And wine gladdens the heart of man. But it speaks of a spiritual wine, which, if anyone drinks it, he is immediately inebriated. All of you, that you might let go of your possessions and your parents and your children and your kinfolk, drank wine, and being inebriated for Christ began to be mad.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_042.html'
source_title="HOMILIES ON THE PSALMS 42 (PSALM 127)"
