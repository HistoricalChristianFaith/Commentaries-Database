[[commentary]]
quote='''
And to make us secure: As I live, says the Lord (which is said according to the custom of swearing in the Old Testament), you will be clothed with all these as with ornaments, and you will surround yourself with them, as a bride adorns herself with a necklace. Blessed is he who has such great merit and virtue that he is called an adornment of the Church. I think, however, that these various spiritual graces are signified, by which the bride is adorned. And this is sung about in the forty-fourth psalm: The queen stood at your right hand, in a garment adorned with gold, surrounded by variety.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
