[[commentary]]
quote='''
This is not found in most codices: it is clear that from the arrangement and stability of the elements, both fair and rainy days can be predicted. However, the scribes and Pharisees, who seemed to be experts in the law, could not understand the advent of the Savior from the prophecy of the prophets.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
