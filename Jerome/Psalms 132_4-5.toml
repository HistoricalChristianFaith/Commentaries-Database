[[commentary]]
quote='''
If I shall give sleep to my eyes, and slumber to my eyelids, And rest to my temples, until I find a place for the Lord, a tabernacle for the God of Jacob. Many think this is said of the Church: but to me it seems to be said not so much of the Church as of holy Mary.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_044.html'
source_title="Homily 44, on Psalm 131"
