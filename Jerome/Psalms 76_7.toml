[[commentary]]
quote='''
From then thy wrath. From what time is the wrath of God? When the people cried out to Aaron in the wilderness, saying: "Make us gods whom we may follow: for this Moses, who brought us out of the land of Egypt, we know not what has become of him." Thou didst bring them out of the land of Egypt, and immediately they denied thee.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_009.html'
source_title="Homily 9, on Psalm 75"
