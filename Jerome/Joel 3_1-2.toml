[[commentary]]
quote='''
With the believers saved on Mount Zion and in Jerusalem, and with the rest of the people of Judaea called, who believed with the apostles and through the apostles, at that time after the Lord had turned the captivity of Judah and Jerusalem, who had come to preach sight, and to the captives, remission, and delivered those who confess the Lord, and who are in the Church, in which there is a vision of peace, will gather all the nations that did not want to believe: and will lead them into the valley of Jehoshaphat, which more significantly, according to the Hebrew truth, is said in Greek κατάξω, that is, I will lead them down, and I will draw them from the highest to the lowest. At the same time, consider when the Lord summons unbelievers, even hostile powers, to judgment and disputes with them on behalf of his people: 'I will bring them down to the Valley of Jehoshaphat.' But when he encourages believers to battle, he says: 'Stir up the strong ones: let all the warriors come forth and ascend.' The nations are urged not to descend, but to ascend into the Valley of Jehoshaphat. For everyone who is judged because of their sins is placed in the valley, which is called Jehoshaphat, that is, the judgment of the Lord. For whoever believes in the Lord will not be judged.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Joel.html'
source_title="Commentary on Joel, Chapter 3"
