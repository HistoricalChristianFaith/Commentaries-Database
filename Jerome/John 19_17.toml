[[commentary]]
quote='''
And they came to a place called Golgotha, which is the place of Calvary. I have heard someone explain the place of Calvary, where Adam was buried, and therefore it is called that because there the head of the ancient man is buried, and this is what the Apostle says: Awake, you who sleep, and arise from the dead, and Christ will give you light. A favorable interpretation that pleases the ears of the people, but not true. For outside the city and beyond the gate, there are places where the heads of the condemned are severed, and they took the name of Calvary, that is, beheaders. Therefore the Lord was crucified there, so that where there had been a place of condemnation, there might be erected the banners of martyrdom. And just as He was made a curse for us, and was scourged, and was crucified, so for the salvation of all, even though guilty among the guilty, He would be crucified. But if someone should wish to argue, why was the Lord crucified there, so that His blood might drop upon the tomb of Adam, let us ask him why, then, were the other thieves crucified in the same place? From which it is clear that Calvary does not signify the tomb of the first man, but the place of the beheaded, so that where sin abounded, grace might more abound. But we read in the volume of Jesus son of Navé that Adam was buried near Hebron and Arbee.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew, Chapter 27"

[[commentary]]
quote='''
Well, then, to bring forward something still more out of place, we must go back to yet remoter times. Tradition has it that in this city, in fact, on this very spot, Adam lived and died. The place where our Lord was crucified is called Calvary, because the skull of the first man was buried there. So it came to pass that the second Adam, that is, the blood of Christ, as it dropped from the cross, washed away the sins of the buried one who was first formed, the first Adam, and thus the words of the apostle were fulfilled: "Awake, you who sleep, and arise from the dead, and Christ shall give you light."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome/Letters/letter_046.html'
source_title="LETTER 46.3"

[[commentary]]
quote='''
(super Matt. c. xxvii.) An apt connection, and smooth to the ear, but not true. For the place where they cut off the heads of men condemned to death, called in consequence Calvary, was outside the city gates, whereas we read in the book of Jesus the son of Nave, that Adam was buried by Hebron and Arbah.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520John%2FChapter%252019.html'
source_title="Catena Aurea by Aquinas"
