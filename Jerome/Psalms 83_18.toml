[[commentary]]
quote='''
What follows? And let them know that your name is Lord: you alone are the Most High over all the earth. Let him who wishes exalt himself, and let him be exalted: let us say, You alone are the Most High over all the earth. However much anyone exalts himself, we have God, than whom there is none higher.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_015.html'
source_title="Homily 15, on Psalm 82"
