[[commentary]]
quote='''
A disorder of priorities. Not because you are angry, we have sinned; but because we have sinned, you are angry. And because we have sinned, you are angry with us, O Lord: therefore we have gone astray and have left the right path. Whether according to the Hebrew, who we have always been in sins, we shall be saved only by your mercy, who we are defiled through ourselves.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
