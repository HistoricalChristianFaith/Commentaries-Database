[[commentary]]
quote='''
And this whole vision is: a Spirit lifting up, and a great cloud, and four living creatures, and wheels following the same creatures, and the spirit, which deserve to be under the firmament of God. And after they were lifted up, and heard a voice like many waters, and like the sublime word of God, and the voice of camps and armies, they let down their wings, and showed astonishment in silence.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ezekiel.html'
source_title="Commentary on Ezekiel"
