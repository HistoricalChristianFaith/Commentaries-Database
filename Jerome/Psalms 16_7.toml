[[commentary]]
quote='''
I will bless the Lord who has given me understanding: moreover even until night my reins have rebuked me. He who speaks below, "My flesh shall rest in hope, for you will not leave my soul in hell, nor will you give your holy one to see corruption," consistently now too says: I will bless the Lord who has given me understanding, moreover even until night my reins have rebuked me. For he who is Wisdom, how does he receive understanding? But because "Jesus advanced in age and wisdom and grace before God and men," the Son was instructed not so much by the Father as the man was instructed by his own divinity. Hence too, concerning him who flowered from the root of Jesse, there is the prophet's oracle: "The Spirit of the Lord shall rest upon him, the Spirit of wisdom and of understanding." Which indeed, for beating back the madness of the Arian heresy, Aquila and Theodotion translated better, saying: "I will bless the Lord my counselor"; so that the Father did not so much give the Son wisdom and understanding which he did not have before, as join his own counsel to the Son's judgment. So that, just as in Proverbs Wisdom says that she was a counselor to God when he rejoiced in the completed world, and she rejoiced in herself daily; so also that same Wisdom, in the fact that he assumed a human body, that he died and rose again, shows that he was not without the Father's counsel, but according to that saying, "That I might do your will, my God, I willed it." But this too which follows, "Moreover even until night my reins have instructed me," must be taken thus, that we understand "reins" for hidden thoughts and deep affection, which is properly an idiom (idiōma) of the Scriptures. For as far as is in my memory, neither in any of the philosophers nor among the rhetoricians, nor among the poets, nor even among the physicians themselves, who promise a knowledge of the nature of bodies, do I recall ever having read that "reins" are put for the understanding and for deep thought. But Scripture uses this custom, so that when it wishes to indicate something secret and hidden or mystical, it says, "God who searches hearts and reins"; so that, since the heart is secret, the reins are the more secret parts of the heart. In Wisdom too, which is inscribed with the title of Solomon, I have found written: "God is the witness of his reins, and the true beholder of his heart, and the hearer of his tongue." In the book of the Patriarchs too, although it is counted among the apocrypha, I found it thus, that as the gall was created for anger, so the reins for cleverness and for shrewdness. But "panourgia," that is, cleverness, may be taken either in a good or in a bad sense: in a good sense, according to Proverbs, "That he may give," it says, "shrewdness to the innocent, and to the younger boy sense and understanding"; in a bad sense, as in the apostle, "But I fear lest, as the serpent seduced Eve by his shrewdness, your minds may be corrupted from the simplicity that is in Christ." What he says, then, is this: my instruction and deep thought and the inner affection of the heart was not only with me in the heavenly places, but even while I dwelt in the night of this world and in darkness, it was engaged with me in the man, and instructed me, and was never absent from me, so that whatever the weakness of the flesh could not do, divine thought and power might accomplish. Or at least thus: my reins instructed me, who possess the inner wisdom of divinity, by which I was taught, when the passion was imminent, not to yield to human frailty through the terror of the cross. Moreover, what else does this declare (since the Savior's life is our example) but that he, not only waking but even sleeping, was free from every sin, and remained pure from every phantasm of the flesh: so that the saints too, who desire to be like their Lord and Master, may guard their heart with all watchfulness, and be overcome not only when waking, but not even in sleep—that is, not only by day, but not even by night. This too must be noted, that he said, "Moreover even until night my reins have rebuked me": to show that before night came, or before the Savior himself began to be in the night, he was always instructed by his own wisdom. There is another interpretation: because divine Scripture always speaks of God's powers after the likeness of human limbs—for example, when it says he has feet, eyes, ears, hands, and other things of this kind—that here "reins" should be taken for the places of the seed; so that, just as the beginning of men and the element of human flesh is founded in the seed, so our judgments too, and the beginnings of our thoughts, have their reins: so that, before we handle anything either in deed or in word, silent thought may hold this in its own movement and consider it within itself. So that the meaning is: our Lord and Savior could not sin—not only in deed and word, but not even in thought or in the beginnings of thoughts, which they call "propatheiai" (pre-passions)—he whom the Word of God was daily instructing. Not that God is one and the man another; but so that one and the same Son of Man and Son of God may now, as man, pray, now, as Lord, hear.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_061.html'
source_title="Homily 61, on Psalm 15"
