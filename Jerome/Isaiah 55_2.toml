[[commentary]]
quote='''
Therefore, the goods that are promised to the soul are not riches, and bodily health, and worldly honors, which even the philosophers call indifferent, that is, neither good nor bad, and vary according to the quality of the users.… But if the soul is said to be good, then honesty and virtues are also said to be good. Therefore, not poverty, bodily infirmity, and low social status should be considered as evils, but rather all vices that are truly bad. In conclusion, Abraham was not considered good because he was wealthy, but because he made good use of his wealth. And Lazarus, who later rested in his bosom, did not endure evils because he suffered the torment of diseases in poverty, but he attained true good through the evils that were considered in the world. And so that rich man, clothed in purple, received his good things in his life, which were good to him, who thought them good, and of Lazarus it is not said on the contrary: "He received his evil things in his life"; but he received his evil things in his life, which were not evil to him, who suffered, but seemed evil to others. The blessed Job gives us an example of both things, who was not conquered in the good things or the evils of the world, but endured everything with equal strength of mind.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
